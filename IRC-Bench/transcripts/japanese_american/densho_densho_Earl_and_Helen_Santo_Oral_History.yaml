collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Earl could you introduce yourself? Just say your full name and where you were born, where you grew up.
- speaker: Respondent
  text: Earl Shizuo Santo. Born in San Jose, March 2nd 1931.
- speaker: Interviewer
  text: So tell me what a typical day was like for you growing up in San Jose before the war.
- speaker: Respondent
  text: Well all my life we were on the farm. My family raised vegetables. So everyone worked something or other. It might
    have been just folding newspapers. And they don't do it anymore but the newspapers were actually folded and sewn together
    and made a sleeve around the celery to keep it bleached, more or less. So we were one of the crew that had to straighten
    those out during the off-season and I learned to drive our truck, I think I must have been only eight or nine out on the
    field, and so you know, a lot of open spaces. As Pearl Harbor came, I recall I was with my older brother, John, who was
    four years older than I, and it was just bad news for us. And I really don't remember much after that, what we did.
- speaker: Interviewer
  text: And your parents were Issei?
- speaker: Interviewer
  text: And where were they from in Japan?
- speaker: Respondent
  text: They were from Shimane-ken. And that's actually over the hill from Hiroshima towards Japan's seaside. And that's what
    they call in aka country. Their living was more farming and whatever.
- speaker: Interviewer
  text: And did you have a big family? A lot of siblings?
- speaker: Respondent
  text: Well, yes. There actually were seven of us, all boys. Yeah, poor mom, huh? But two of the brothers, I think they were
    about three or five but they got sick. Oh, what kind of illness? Whatever it was, both of them passed away about a week
    apart. As young kids. So there was five of us boys left. I guess the oldest, gee we must have had about not quite 20 years
    difference in age.
- speaker: Respondent
  text: I think. So I guess in those days the families were big. I think they liked the help on the farm, I guess.
- speaker: Interviewer
  text: Right. You were farming and it really helped the parents. And so when Pearl Harbor happened, you were how old at the
    time?
- speaker: Interviewer
  text: You were ten. So you were in school. You were in about fifth grade?
- speaker: Respondent
  text: Yes, that's right. Sixth grade, I guess.
- speaker: Interviewer
  text: Did you experience anything at school? Did anything change for you after that?
- speaker: Respondent
  text: Not really, I really don't recall any of the - what do you call it, discussions or whatever. Nothing much happened
    at school that I could remember. And we were a majority. The Japanese were majority because the farmers that surrounded
    the school district were farmers.
- speaker: Interviewer
  text: And Japanese.
- speaker: Interviewer
  text: And since we're doing this for the museum, where exactly in San Jose was your farm? Where were you living?
- speaker: Respondent
  text: Actually on North First Street which was called Alviso Road in those days, and actually it's not too far from the
    freeway. The freeway and First Street. I don't think we were probably a mile down north of the intersection there.
- speaker: Interviewer
  text: Wow. So right here.
- speaker: Respondent
  text: Right here. San Jose.
- speaker: Interviewer
  text: And so when the Executive Order came out, what did your family do to prepare for evacuation?
- speaker: Respondent
  text: I don't know. There seemed to be a lot of I guess - everyone's talking about it and trying to gather up things that
    we were asked to have with us. I guess eating utensils and stuff. I remember my parents having to go gather up some things
    like that. And then the destination to Heart Mountain, I don't know when it was given, but we had to get some cold weather
    clothes.
- speaker: Interviewer
  text: So you knew, your parents prepared for harsh, cold weather?
- speaker: Respondent
  text: I think we must have got the information.
- speaker: Interviewer
  text: I see. And did your parents talk to you and your siblings before you left?
- speaker: Respondent
  text: Boy. No, I don't recall any of that. But I know they were, I guess, throwing away different things of value to us.
    But we shouldn't have them on hand, I guess. I guess anything pertaining to the Japanese government was not allowed. And
    then I didn't think about it but when we left, we left the house as is pretty much so the beds were there, the tables
    were there, refrigerator and everything. We had no idea who - well, I'm sure they made use of it, whoever farmed.
- speaker: Interviewer
  text: Do you remember your first impressions of the assembly center in Santa Anita? And living there?
- speaker: Respondent
  text: Oh boy. I guess we knew there were horse stables that people were going to be living in. I guess we were lucky ones.
    We moved into the new barracks. And our barrack I remember was located right on the edge of the camp buildings and stuff.
    Right across the fence was a road to Arcadia, that's the city that's close by.
- speaker: Interviewer
  text: So you were not in the stables, but you heard of people living there?
- speaker: Respondent
  text: Right. Like I said we were lucky there, the people in the stables, I know they complained about the smell. To me that'd
    be pretty awful to have to live in that.
- speaker: Interviewer
  text: And then what do you remember about leaving Santa Anita and making that trek to Heart Mountain?
- speaker: Respondent
  text: Not too much, as far as I remember. But we did board a train. And I guess on the train they had restrictions on using
    the blackout curtains and I guess there were soldiers, security on there. And a sad part of this is one of the family
    friends, older man, he passed away. It could have been that he was a heavy drinker. And who knows what may have happened
    to cause this death.
- speaker: Interviewer
  text: On the train, you mean?
- speaker: Respondent
  text: On the train.
- speaker: Interviewer
  text: And that was a family friend of your parents?
- speaker: Interviewer
  text: I see. So at this point you were about eleven now. Right?
- speaker: Interviewer
  text: So did you have a sense that this was all really bad or negative or were just kind of confused?
- speaker: Respondent
  text: Well yes, the latter. More confused and really listening to what was really going on. We at least had our family.
    We were all together. And I heard there were some of the families, the father or brother, they were put in these separate
    camps, I guess. And I guess eventually they were able to get together with their family.
- speaker: Interviewer
  text: But you were lucky your family stayed together as one. So what were your first impressions of Heart Mountain?
- speaker: Respondent
  text: Well, let's see. Barren, I guess you might say. There were a lot of sagebrushes and sand and stuff, but nothing growing
    at that time. After getting used to things, we were able to make friends. See, as people coming from the farm, we weren't
    able to play with other kids and it brought a lot of new friends. So that's where being at my age at that time wasn't
    the awful things that's happening.
- speaker: Interviewer
  text: Right. You had more friends you could play with.
- speaker: Interviewer
  text: And were your parents working in camp? What did they do?
- speaker: Respondent
  text: My dad was assigned or maybe it was his job, he took care of the boiler rooms. He had to make sure the charcoal was
    there to heat up the water. I'm not sure what else he did but my mother didn't do any work.
- speaker: Interviewer
  text: And had she been farming, helping with the farming before in San Jose?
- speaker: Interviewer
  text: Do you feel that in some ways, looking at a silver lining, it was a positive thing for her? I've heard a lot of people
    say that since the women had to raise the children and work the farm -
- speaker: Respondent
  text: Yes. I was number seven. Yes, she worked hard out on the field. One of the things she was doing a lot of was, cauliflower.
    It's a white flower and leaves. So they used to tie the cauliflower on top, to keep them from getting sunburned. I think
    as time went on they improved the seeds where it would grow and cover it much better. And what else did she do? Well,
    of course, the boys were all big enough to take care of themselves, I guess. Two brothers, one was too old for the draft
    and then the other one had a 4-F designation, which is a handicap.
- speaker: Interviewer
  text: I see. But he was draft age, basically?
- speaker: Respondent
  text: Yes, right.
- speaker: Interviewer
  text: So when the loyalty questionnaire came out, what do you remember about the way that your father and mother answered?
- speaker: Respondent
  text: You know, I really don't know how that questionnaire affected us. I don't remember too much of that. I think I mentioned
    that I did have relatives that were resisters, too.
- speaker: Interviewer
  text: Were they relatives of your mother or your father?
- speaker: Respondent
  text: My mother's side.
- speaker: Interviewer
  text: I see. But you stayed in Heart Mountain so they must have answered yes/yes?
- speaker: Respondent
  text: Yes, I guess so. I don't know.
- speaker: Interviewer
  text: Are there any other standout memories from Heart Mountain that you have?
- speaker: Respondent
  text: Cold winters. I think we were down to -28 or something. And then one of the other things that everyone had to do was
    wrap the door handles because the metal would freeze and stick. And we'd go to the bathroom and brush our teeth and wash
    our hair and the hair gets all frozen [laughs]. So the weather was bad, I'd say. Summer was on the hot side and dry and
    dusty.
- speaker: Interviewer
  text: Two extremes coming from the Bay Area. Now health-wise, was everyone in your family okay?
- speaker: Interviewer
  text: That's good, because some people got really sick from the weather.
- speaker: Interviewer
  text: So you went through school and did you finish middle school?
- speaker: Respondent
  text: Yes, that's it, I guess. Seventh, eighth, ninth grades. When I came back I was a sophomore I guess.
- speaker: Interviewer
  text: So coming back to San Jose, you resettled back here?
- speaker: Interviewer
  text: Was the reason because your parents were already familiar with it or did they just feel like it would be better to
    come back? Or do you know why they chose -
- speaker: Respondent
  text: I think they were familiar with it and we had farm equipment that was being held by a very good family that helped
    us. It's not that they didn't use it, so they in turn benefited some, using the equipment.
- speaker: Interviewer
  text: But they held onto it for you.
- speaker: Interviewer
  text: They were really good people. But you lost the house though that you were in?
- speaker: Respondent
  text: Oh yes. The house that we lived in, I don't know what happened. But when you start building a house, a lot of help
    comes from your friends and relatives. So they helped build the house that I remember, and that house travelled quite
    a bit. They put it on wheels and towed it over about half a mile through the fields and then situated there. And then
    we stayed there for probably about three or four years and then we moved again. Same deal. Put the house on wheels and
    moved it across to where Fry's Electronics is on Brokaw. We were farming that area just when the war started.
- speaker: Interviewer
  text: And coming back to San Jose, what do you remember about those first few months? Where did you live?
- speaker: Respondent
  text: Well, it wasn't really nice quarters but my auntie, dad's older sister, had property and they had a nice house, modern.
    And they had a workers' house and that wasn't very nice, but I think we might have spent around two months before they
    found a place to buy and continue farming.
- speaker: Interviewer
  text: Wow, they got on their feet pretty quickly.
- speaker: Interviewer
  text: Do you remember, now that you were in high school, coming back and being a young teenager, do you remember any backlash
    or discrimination that faced you or your family?
- speaker: Respondent
  text: Not, hardly any discrimination at school, but I remember this one thing that I guess we had homerooms and the first
    fellow I met, in fact I ran into him last year sometime. I really think he helped the Japanese a lot. Like my family,
    my second oldest brother was involved in sports and this fellow was a basketball player. And in fact he did real well
    at San Jose State. But anyway, he turned out to be the most nicest person. And in school, I've never heard of anyone having
    problems with discrimination. So outside of school, I recall we went to the movies, I guess, with, it must have been three
    or four of us kids and I guess we did get some of those loud people calling us names. But that was the extent of it, yeah.
- speaker: Interviewer
  text: That was it. And a lot of people came back to San Jose.
- speaker: Interviewer
  text: So when you moved back here, were you still near Japantown?
- speaker: Respondent
  text: We were on Tenth Street, which is a couple miles from Japantown. And I guess my uncle, he's the one that bought the
    small grocery store. And he started the Santo Market.
- speaker: Interviewer
  text: So your uncle was the one.
- speaker: Respondent
  text: Yes. I guess he didn't want to farm anymore.
- speaker: Interviewer
  text: Because it was a natural link between farming and then opening a grocery store for him?
- speaker: Interviewer
  text: This was which uncle? On which side of the family?
- speaker: Respondent
  text: My dad's younger brother.
- speaker: Interviewer
  text: And so where was the first original market?
- speaker: Respondent
  text: At the corner of 6th and Jackson. It was owned by this Filipino man and a lot of the products were not for the Japanese
    people but my uncle bought the business, and then after a few months moved over to a larger space right next door. And
    he fixed it up to sell regular groceries. Japan import items were very scarce then. But I guess eventually things like
    soy sauce and rice we had to get on the list for. Not rations, but to able to get some products to sell. Even rice was
    sort of scarce. At that time, I don't know if you heard of, they had these coupons for meat and sugar and different things.
    And that was a hassle I would say.
- speaker: Interviewer
  text: Right. So how did your uncle, as far as you know, get all these items? Like how was he able to get his inventory to
    sell?
- speaker: Respondent
  text: At first, I'm not sure. But the Japanese items, we then started seeing these Japanese wholesalers come around and
    they were handling whatever they had available. I guess the important things were shoyu, the soy sauce, and rice. I remember
    even the rice wasn't too plentiful. And especially the kind of rice the Japanese like, the sticky California rice. I guess
    they brought in a lot of rice from Arkansas. And I do recall, when I started to help him, we had to take the truck to
    the warehouse. And these were 100 pound bags of rice. And we loaded onto the pickup and back into the store warehouse.
    So it wasn't for anyone with a bad back, I'll tell you that.
- speaker: Interviewer
  text: How old were you when you started helping?
- speaker: Respondent
  text: I think I did a little bit when I was probably around a senior in high school. So 17, 18.
- speaker: Interviewer
  text: And I'm assuming that it successful from the start, right? Was he one of the first people to open, re-open a grocery
    store?
- speaker: Respondent
  text: No, actually there was Dobashi market.
