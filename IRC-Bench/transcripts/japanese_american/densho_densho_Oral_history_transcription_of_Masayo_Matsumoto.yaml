collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Masayo Matsumoto. I was born the second daughter of Matasaku and Toshi Matsumoto, in Nagano prefecture.
    There were four children in the family.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1893, the 26th year of Meiji.
- speaker: Interviewer
  text: What was your family in Japan like?
- speaker: Respondent
  text: When I was thirty, I was told our family story by my father. According to the story, our father had been within the
    Shinto priesthood for years. We had been given the surname "Minamoto" by our local lord. My father had attended school
    with two swords around his waist. When he was in his twenties, the train was invented. He went down to Tokyo to study
    against the will of his father. My father worked and studied simultaneously. He and some other working students went to
    Hakubun Ito's house in search of work. There, he met an old rickshaw driver, who was from the same village as my father.
    In the meantime, my father was forced to return to his home because he had contracted beri-beri. Being a poor student,
    he had to borrow five yen from the rickshaw driver. The driver told him to return the money to his daughter in the village.
    The eighteen-year old daughter was very pretty and she sang a beautiful song in the Obon festival. My father fell in love
    with her and married her. Their marriage was not easy. His family and relatives were all against the girl because she
    was from a tenant farmer's family. My father had been married to another girl formerly, but their marriage did not work
    out. Then, he married my mother. After I was born, my mother became so sick that she could not move. My father, a public
    office employer, took care of me as soon as he came back from his office. He took me to a hot spring and took me other
    places with him all of the time. When I visited Japan from the U.S., he showed me his diary. He named me Masayo which
    means to give politics, because he was interested in politics very much. During my teaching days, my father sent me to
    a tea ceremony school and a flower arrangement school. Having been raised by my father, I was kind of boyish. He hoped
    that I would acquire femininity through the learning of the tea ceremony and flower arrangement.
- speaker: Respondent
  text: The tea ceremony teacher had served tea to the Meiji emperor. My father, being himself involved in village politics,
    had a hard time repaying the debt handed down by the former village chief. The former chief had borrowed a hundred thousand
    yen in order to improve the road and streets in the village. Feeling sympathy for our father, I and my younger brother
    decided to go abroad to earn money and help our father. My mother was herself an uneducated woman, but she forced us to
    study hard. She made her children pray before the Shinto altar at home so that we could become bright students. Whenever
    we passed a shrine at the foot of Mt. Ontake, my mother told us to bow there. She let us take our worn brush pen to the
    heavenly gods so that we could improve our penmanship. My younger brother was the only son in our family. I was in charge
    of wrapping rice in paper and putting it on the altar of the heavenly gods. My sister, being such an outstanding young
    lady, was called "Murasaki Shikibu" by others. She entered a girl's school in Ima county. My mother did not let me go
    to school until I finished the duties given me by her. My father taught me reading as soon as he came back home from his
    office. Whenever I did not read clearly, my father forced me to read over and over.
- speaker: Respondent
  text: Being a good reader at school, I was accused by my classmates of being a teacher's pet. I remember that my father
    hit me with tongs when he found me sleeping at a desk. Having a lot of rooms, we always rented some of them. One tenant
    was amazed to see me studying by a torn shoji where a cat got through very often. After having attended a teacher's college
    for two years, I became very sick. My father sold his mountain and other properties in order to send me to the Nagoya
    University Hospital for six months. I had rheumatism, pleurisy, dilatation of the heart, and nervous debilitation. Though
    there had been no returning students at the college, I was accepted as a returning student. I graduated in the fourth
    year of the Taisho period. My father was struggling between his family religion --Shintoism-- and his own beliefs. He
    could not believe in Shinto gods and goddesses, which were made by human beings. He was about to leave my mother and younger
    brother and move to Nagoya with me. I respected him because of his strong conviction. He became interested in the Tenri
    sect at that time.
- speaker: Respondent
  text: When I was a child, I stopped eating my favorite food, yellowtail, and prayed at Suwa shrine that my mother could
    recover in exchange for my sacrifice. My father was the one who bought medicine for me and mixed egg and milk for me to
    drink. There were a few maids and two farm laborers working for us. My mother directed all of the workers. My father was
    working for a public office and made ten yen a month. Being a member of a famous family, I was treated rather courteously
    by the people in our community. The only grief I had was over my health.
- speaker: Respondent
  text: I was sick while I was attending the teacher's college and also after graduating from it. I was employed by a county
    office and got paid nineteen dollars a month. Then I happened to read about Christianity. I was amazed that it was completely
    different from Shintoism. Our family religion--Shintoism-- was so strict that I could not feel secure with it. For example,
    I was told not to sleep with my legs pointing toward the Shinto altar. I was also told that women should not appear in
    front of the altar when they had a menstrual period. One day, a farmer's daughter told me about a hymn-lesson held at
    church.
- speaker: Respondent
  text: As I was interested in any kind of singing, I went to the hymn-lesson. Reverend Kanzo Ogawa, who was one of Reverend
    Kagawa's followers, was the assistant minister there. I was moved by reading the Bible given to me by the congregation
    at church and also by the several kindhearted people there. I was surprised to see such different people from Shintonists.
    Though the church was located eight miles from my work, I visited the church once in a while. I read the verses in Matthew,
    Chapter 34, and felt confused.
- speaker: Respondent
  text: When I was nineteen, I was told by my teacher that I looked like my mother, while my sister looked like my father.
    Then, I realized that my mother was not a step-mother. My mother was fond of my sister because she looked like my father.
    My father was fond of me because I looked like my mother. I always wanted to do something to serve my country. When I
    was in the teacher's college, I was in charge of guarding the pictures of the emperor and empress. I was supposed to direct
    people to protect the pictures in case of an emergency. I was grateful for the duty, because I was assigned such an honorable
    duty, although I was absent from school very often due to my health.
- speaker: Respondent
  text: One teacher during my childhood days threw a piece of chalk at a pupil who did not listen to him. Education in those
    days was that strict. My physics and mathematics teacher invited me for dinner at his home. He said that I was so weak
    that I should eat good food. His wife gave me a raw egg and other nutritious food. The assistant minister and his mother
    were both great. His mother said that she had dedicated her son to the Lord's work and that she should serve him as much
    as she could. She was the daughter of one of the higher Byakko-tai members. She was related to the Tokugawas. Reverend
    Kagawa was fond of the assistant minister throughout his life.
- speaker: Respondent
  text: Reverend Hiraiwa of the Methodist Church came to Nagano prefecture as a superintendent. His sermon moved me deeply.
    He said, you might feel guilty when you become a Christian against your parents' will. However, you will find yourself
    making your parents and others happy after you are baptized. I was extremely happy to hear that. Later on, when I attended
    a Thursday evening meeting, I spoke about Reverend Hiraiwa's meaningful sermon. The meetings at church were held in the
    evening. On my way back home from the meetings, I had to walk on a mountain trail for a mile or so. I was living in Gifu
    prefecture at that time. Being scared of foxes, I sang a song which I had learned at church, in a loud voice. I saw foxes
    drinking water from my house. Walking in the darkness, I did not feel scared at all. I looked up at the shiny moon and
    felt that the Lord was protecting us all of the time.
- speaker: Respondent
  text: I crossed a bridge, which my father as village chief, and a neighboring village chief had built across the Kiso River.
    Since it was only ten p.m., my parents assumed that I had checked into an inn owned by a friend of my father's. When I
    knocked at the front door, my parents wondered if a fox was knocking at the door. They opened the door after I had knocked
    on it three times. It was said that a fox never knocked at a door three times. I made up my mind to become a Christian
    the following day after I had listened to the sermon given by Reverend Hiraiwa.
- speaker: Respondent
  text: When I told our minister of my desire to become a Christian, I was warned that six months of Bible study was not good
    enough to get baptized and that it was rare for a teacher's college graduate to become a Christian. However, I did not
    yield. I spoke up and said that I would be able to overcome my parents' opposition eventually and I would make myself
    and my parents happy. After coming back home, I told my father that I would like to become a Christian while both of us
    were folding the hakama. He got so angry that he hit me twice with a two-foot ruler. He asked me why I had graduated from
    a teacher's college. I answered that the education I had received at college was visual whereas the teaching I was getting
    from Christianity was spiritual.
- speaker: Respondent
  text: I had many problems at that time. My illness, grandfather's mistress and my father's hardship as a village chief were
    my heart-felt concerns. I did not know how to overcome my worries without the Lord. My father finally understood my seriousness.
    On the following morning, he told me not to be late for Church. I was baptized by Reverend Kunihara from Nagoya Central
    Church. Everything looked cheerful and gay after having been baptized. On the way to work, I enjoyed the birds singing
    and the beautiful day. I told a teacher in a faculty room that I had been baptized. I asked him if he would like to attend
    church the following Sunday. He asked me who had baptized me.
- speaker: Respondent
  text: Though I was renting a room six miles away from my home, I stopped there every time I went to church. The assistant
    minister's mother was kind enough to fix lunch for me when I visited her. She was a kind, graceful lady from an aristocratic
    family. She was used to feeding the members of the Byakko-tai. As I could not attend church during the school term, the
    minister gave me his written sermons every week. I attended the prayer meetings and taught a kindergarten-age Sunday school
    during school vacations. The minister praised my father. He said that my father had been helping a lot of people in need.
    My father delivered bamboo shoots, walnuts and yams to the minister very frequently. Though my father never became a Christian,
    he was positive about my being a Christian. He even wanted my younger sister to become a Christian.
- speaker: Respondent
  text: It was me who suggested that my father not let my sister become a Christian. I did that, because I saw terrible things
    among the ministers in Los Angeles. My sister married a man from a Shinto family, but she was not happy at all. When I
    returned to Japan, I felt guilty and tried to share my faith with her. Her husband's uncle was a Shinto priest. She said
    that my God watched me from heaven but the Shinto gods needed to be taken care of by human beings. One stormy day, people
    became soaking wet when they moved the Shinto altar to a dry place. I prayed for my parents in my daily prayers. My father
    tried to learn the Bible however, he felt it difficult to understand the Bible.
- speaker: Respondent
  text: My best friend during my teaching days married a high ranking Zen priest. Her husband, who used to be a logic teacher,
    came to the U.S. for a visit and met the President of the U.S. He opened a branch church in the U.S. He became a Buddhist
    priest after marriage according to his father's will, though he wanted to become a Christian. He and his wife were invited
    by the present emperor to the coronation ceremony. They rode in a car with the emperor. Before I left for the U.S., I
    stayed at Reverend Kawasumi's home in Tokyo for eight months. I was to marry Mrs. Kawasumi's brother. It was my second
    marriage. Reverend Kawasumi was in charge of giving sermons at Aoyama University and was also a leader of a Christian
    church. I met him when he returned to Japan from Manchuria.
- speaker: Respondent
  text: I was one of the rare persons who was a teacher and Christian at the same time. I was asked to hand in my resume for
    a teaching position in Yamanashi prefecture. They were looking for a Christian lady. My resume impressed them so much
    that I was hired. I was told to come to Tokyo at once. When I left Kiso, my parents fixed delicious food and my students
    saw me off. I was a leader of a youth group and my sister-in-law was vice-president of a Christian women's association
    in Japan. My sister attended meetings almost every day. I had to take care of five girls. Not only her daughter but also
    a few of a count's daughters were under my care. I myself had been brought up with a few maids and I had to serve like
    a maid there.
- speaker: Respondent
  text: In the meantime, Mrs. Kawasumi recommended me as her younger brother's bride. Her brother was in the U.S. I was serious
    about her recommendation because I wanted to be away from my mother who I did not get along with. I thought that being
    away from her might bring a better relationship between us. My home was located in an area with fresh air, but I did not
    like the wet climate. I was anxious about going to California where a lot of oranges were produced. I completed the procedures
    for marriage in Tokyo and waited a while. I attended Aoyama University, taking a Bible class and an embroidery class.
    As I have mentioned before, I was employed by Reverend and Mrs. Kawasumi as a tutor-maid. I took care of children as well
    as housekeeping. Their only son was a student at Azabu Junior High School. He was a bright student.
