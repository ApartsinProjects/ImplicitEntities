collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: So Pearl Harbor happened right around your birthday. Do you remember the day that it happened?
- speaker: Respondent
  text: I was about 14 or 15, somewhere around there. I still remember the day, you know how you were treated. One day, just
    like that. They outballed you, meaning they don't talk to you, or play with you like we were playing baseball or anything.
    And one of my friends said that the thing that hurt him most - he was from another school - he said everybody was friendly
    but on that day, even the teacher called him a 'Jap boy.' And he was really tee'd off on that. To be called a Jap boy,
    that day of the war. He said 'I didn't do nothing.' And he just let it go. But at that time, even the school didn't care.
    We were Japs.
- speaker: Interviewer
  text: Were you living in a predominantly Japanese community?
- speaker: Respondent
  text: No, there weren't that many Japanese around. If you accumulate them from Japantown to inaka [countryside]. Basically
    it's a small town, or it was. God it was beautiful, before all these cars came in. It was all country. It was very much
    country. Even the rural routes, there were very few roads.
- speaker: Interviewer
  text: So you found there was some backlash when you went to school?
- speaker: Respondent
  text: Where my dad was working, they were from Switzerland. But they were very good, they weren't hostile. They were just
    ordinary people. They were very good people.
- speaker: Interviewer
  text: Kind. So do you remember anything that your parents said to you and your siblings when Pearl Harbor happened? Or do
    you remember anything about their reaction to it?
- speaker: Respondent
  text: 'No. We were way out, like today it feels like a jungle. So nobody bothered us. Close by our coach lived there, you
    know, our high school coach. And of course we played for him. He was a really nice guy. He was Swiss too. Mostly the hakujin,
    they lived, like the Japanese too: Kumamoto, from Kumamoto, Fukuoka, from Fukuoka, you know. So, they kind of held together.
    On their side. I mean my folks, they held on their side mostly from Kumamoto.'
- speaker: Interviewer
  text: Right, so many people came from Kyushu too and were here. And so, were your parents shocked that Japan had bombed
    Pearl Harbor?
- speaker: Respondent
  text: No, I think my mother and my father unknowingly, they used to talk together, you know like bedtime, or whatever. And
    they kind of had a hunch, I think, how Japan was gonna come. Not to Pearl Harbor but they knew somewhere close by, the
    war was coming.
- speaker: Interviewer
  text: They had a feeling?
- speaker: Respondent
  text: Yeah, they had a feeling.
- speaker: Respondent
  text: Because I remember, around our area there was a lot of Kumamoto. Not a lot, but you know, what there were. My father
    used to be quite a drinker. So all his Kumamoto buddies used to come over. And I kind of picked it up because we were
    going to Japanese school. And I could understand what they were saying, so I kind of picked it up too from them that war
    was coming. It wasn't close, but it was when? They kind of knew. And my grandfather, he was a small fella, I remember
    he was a small fella, but very, very smart. So he made a lot of money here and he took off to Japan.
- speaker: Interviewer
  text: Oh, before the war started?
- speaker: Respondent
  text: Before the war started. How long ago was that? Under a year anyway. And I think on his back shoulder he knew, too.
    We didn't want to have to go back but he wanted to take my sister back, you know. But he knew that my mother was [against
    it].
- speaker: Respondent
  text: And I was supposed to go Colorado. You know when time came, when they kind of had a hunch, [they thought] I go be
    adopted with this family of her's. It's kind of relation, far. But my mother said, "No. I don't care how many we have,
    you're not going to break up the family."
- speaker: Interviewer
  text: She wanted to keep everyone -
- speaker: Respondent
  text: Yep, all together.
- speaker: Interviewer
  text: So when the executive order came out, 9066, and you had to leave San Jose, where did you go? What assembly center
    did you go to?
- speaker: Respondent
  text: We had to be pushed into Santa Anita. You know where the horse runs?
- speaker: Interviewer
  text: Were you in the stables or were you in the barracks?
- speaker: Respondent
  text: Well we were in the barrack, but some uncomfortable ones [were in the stables]. You know, they didn't like it. They
    ended up in the stables. I used to tell them, my friend, "Oh, you guys smell!" You know, rub it in.
- speaker: Respondent
  text: Yeah, it was awful.
- speaker: Respondent
  text: We were in a pretty good place. We had a lot of fun there. You know, there was a real popular guy. He was one of the
    top bowler at the time. A guy named Fuzzy Shimada. And he is a sleeper. He used to sleep all the time, a lot of the time.
    And he was sleeping with a bunch of boys, you know, athletes? And they pushed him right into the worst place, right out
    where everybody was walking back and forth! [laughs]
- speaker: Interviewer
  text: But he was a sleep?
- speaker: Respondent
  text: Yeah he was a sleep. He was a good sleeper! And I don't know what happened after, you know, he woke up. I just knew
    the guy and I knew the guy that pushed him out, too.
- speaker: Interviewer
  text: That is really funny. Now when you left San Jose, did your parents have anyone to watch their things? Did they just
    lose the house?
- speaker: Respondent
  text: At the train depot, a few hakujin were there. But they were saying "bye" to other people. And of course everyone was
    busy though, they had their children to watch and make sure they're there, make sure they had their little hats and they
    don't wander off. And you know, we weren't treated the best, apparently, you know. And there was soldiers there, huh.
    And after three months we got pulled out and had to go to Heart Mountain.
- speaker: Interviewer
  text: So do you remember that trip? That trip from Santa Anita to Heart Mountain? Because I mean that was long.
- speaker: Respondent
  text: Yeah, that was a wicked one! Oh Jesus! You know, it wasn't, I'll tell you, it wasn't the streamliner one. It was an
    old; rattles and everything. And you could hear the kids crying and, you know kawaisou, huh? [Poor things]. And they made
    a couple of stops. And you know, my father and his group, the first thing they think about more faster than milk, is booze.
    They tried to get or buy beer or whatever it was. But they wouldn't sell it to them.
- speaker: Respondent
  text: And while traveling, the train? Bad as it was they had a curtain, lo and behold, and they never had that open. I guess
    safety wise, or, something.
- speaker: Interviewer
  text: Right. Did you ever peek out the curtain?
- speaker: Respondent
  text: Oh yeah, everybody peeked out. I didn't want to see the outside. But I saw a real lighted place, and I was telling
    my friend, "That must have been Reno." You know, when we passed it. I saw a lot of lights and I didn't even bother to
    look out. We never bothered to look out. There was a few of our groupy friends were sitting there and says, "Oh we don't
    care." We didn't, I didn't know anything about Reno then.
- speaker: Interviewer
  text: Let's talk about Heart Mountain. What was your first impression of Heart Mountain?
- speaker: Respondent
  text: When we got off of the train? Lo and behold there was dust flying all over the place and I thought, "God look at me
    here. An angel like me getting thrown in" [laughs]. No, no. But it was dusty and there were little kids walking by their
    parent and grandparents, crying like heck. And the grandparents got a handful by themselves. So we went right with them.
    And we were told what to do because they all had rifles, you can't buck a rifle. I think they would've done something
    if there were no bullet because they were just young soldiers, yet. My brother and I were thinking after a while, 'How
    come we treat those soldiers bad? Look at their faces, they're young.' They don't know either what the heck's going on.
    Still that didn't stop us, they were still hakujin you know [laughs].
- speaker: Interviewer
  text: You were still on this side of the fence with the rifles pointing inside.
- speaker: Respondent
  text: Oh yeah, and the towers were already there. They had their facilities and what they want up there with guns and down
    below they're walking. I don't think they meant really no harm. They didn't really know how we would act.
- speaker: Interviewer
  text: So you couldn't blame them, huh?
- speaker: Interviewer
  text: When you went into Heart Mountain you were about 14 or 15?
- speaker: Respondent
  text: Yeah maybe a little older.
- speaker: Interviewer
  text: 16 or so? So you were still in high school. Did you start school?
- speaker: Respondent
  text: Yeah. You didn't start for a while, but I went for so many months, I guess.
- speaker: Interviewer
  text: Before the loyalty questionnaire came out, were you having a good time? Were you meeting new friends?
- speaker: Respondent
  text: Oh yeah, met a lot of friends. Some kind of rough - you eye each other, not liking each other because you know, they're
    from L.A. And you don't know what to expect and they didn't know what to expect. So we looked at each other in a rotten
    way. Sometimes we fought. [laughs]
- speaker: Interviewer
  text: And were your parents working in camp?
- speaker: Respondent
  text: Yeah. My mother couldn't work, because she had a whole handful herself. But my father worked at, believe it or not,
    mess hall, that was the first time I saw my father with apron on, and a hat. First time I looked at my brother and laughed
    said, 'Papa's in the [in audible].'
- speaker: Interviewer
  text: Yeah that was a job a lot of parents did. They were cooking in the mess hall.
- speaker: Interviewer
  text: That was a farce, huh? The food must have been pretty mediocre.
- speaker: Respondent
  text: As far as I know and my father knows, we had a lot of egg foo young. And people used to monku [complain]. My father
    would come home and say, 'I don't know why they're complaining,' he said. "At home before they probably didn't have anything
    better than that.' Maybe that was true. I know we didn't. You know, my mother had to plant her own vegetables. That's
    one thing she did, she planted vegetables as big as this room. And she took care of that, took care of all of us, took
    care of the house.
- speaker: Respondent
  text: My mother had that kind of personality where all the other ladies used to come see her. She was busy but she welcomed
    them. They always got together. You know when Japanese people, menfolk, they gather, even obasans, they would play hana
    [card game] and things. My folks never knew how expect my father. My mother would say, 'Don't belittle your father because
    that's how we used to eat.' He played pool and hana, he was good at it. Maybe he had to be good, not 'was' good, he had
    to be, to feed 13 of us. But I enjoyed every bit of it, growing up with that many. My father used to love sports, he used
    to kick the ball, throw the ball, it depends on the season on the ranch. So we got pretty good at sports.
- speaker: Interviewer
  text: You had a warm family, it sounds like.
- speaker: Respondent
  text: We were very, very poor, but we didn't know it. We thought we were wealthy. But other people I guess, I don't know
    how they felt but that's how we felt. We thought we had a lot, maybe not the best meat or things but now when you think
    about it, we were lucky. Meat's not good for you.
- speaker: Interviewer
  text: Right you were eating your own vegetables.
- speaker: Respondent
  text: Right, uh huh.
- speaker: Interviewer
  text: So you're in camp and there for a couple of years, and then the loyalty questionnaire is put forth to everybody. What
    do you remember about getting that questionnaire and seeing those two questions, 27 and 28? Can you talk about what you
    did?
- speaker: Respondent
  text: They didn't tell us about doing away with our citizenship or nothing. But they didn't warn us. I don't think there
    was any warning or nothing. But they had a big cafeteria or gym that we met in, the whole camp. That was all full. The
    people of draft age, some with their parents. They were all outside, too, saying 'ra ra ra' every time Frank Emi spoke.
    And well, Frank Emi was kind of a leader, huh? To us anyway, to my brother. And I think I myself kind of went with my
    brother.
- speaker: Interviewer
  text: So your brother was the one who said 'I'm not going to answer.'
- speaker: Respondent
  text: Yeah they were the first bunch. And they had no question. And people were saying, 'Gee at their age, they mean it.'
- speaker: Interviewer
  text: What was your brother's name?
- speaker: Respondent
  text: My brother Kazuto.
- speaker: Interviewer
  text: How old was he?
- speaker: Respondent
  text: He was a year or year and a half older than me.
- speaker: Interviewer
  text: So you went along mainly because of him.
- speaker: Respondent
  text: I think behind my head it was mainly that. Because I always felt wishy-washy.
- speaker: Interviewer
  text: Did you care one way or the other? Did you feel this is wrong and you were angry?
- speaker: Respondent
  text: Oh yeah, I knew this war was wrong. And the way people react to you when you were in school. The very next day we
    went to school and you could feel the chill. And the teacher calling out, "Mitsuko [in audible], you 'Jap boy.'" Oh, he
    couldn't - I think he died with that in his head. He was a self-made family, they really made out good. But that was one
    thing I think he carried with him.
- speaker: Interviewer
  text: So it was you and your brother. Do you remember answering no/no to those two questions?
- speaker: Respondent
  text: I think we were in the second bunch, so I don't think they even bothered asking us that. Frank was the closest thing
    to us. He was a judo teacher I think. Although I never took up judo, that was a little too rough for me.
- speaker: Interviewer
  text: So what do you remember about Frank Emi and his personality?
- speaker: Respondent
  text: Oh yeah, he had everything. He was a man of everything. He had his family to take care of. He almost put us in front.
    Yeah that's how he believed in us, Frank Emi. And his brother, Art Emi. He's another one, he was a solid guy, too. There
    was quite a few solid people. And there was a real old, well, he looked really old to me, I forgot his name. There were
    quite a few leaders but they stayed behind the limelight.
- speaker: Interviewer
  text: So do you remember talking with your brother about this and what was going on?
