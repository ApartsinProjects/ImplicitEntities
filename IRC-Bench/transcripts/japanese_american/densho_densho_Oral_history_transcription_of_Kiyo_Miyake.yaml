collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please state your name first.
- speaker: Respondent
  text: My name is Miyake, Kiyo.
- speaker: Interviewer
  text: Where were you born?
- speaker: Interviewer
  text: That is very interesting. I have not met anyone who came from Hokkaido. Do you know anyone?
- speaker: Respondent
  text: No. I don't know any, except Rev. Goto who came from Sapporo. I came from Senin, Hokkaido. My father was organizing
    minister there.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In 1898. So I will be 77 years old this year.
- speaker: Interviewer
  text: What kind of person were your father? Was he very strict?
- speaker: Respondent
  text: My father was a very quiet person. He did not talk too much. He loved young people, though. So when he was ministering
    in Yamada or Kisarazu, many young people became ministers. It's not that he took all the credit for it, but that this
    was the fact, even though he was not a famous preacher.
- speaker: Respondent
  text: My mother was the first graduate of Kyoritsu women's High School. She was born on the 1st year of Meiji. It's an ancient
    story! Because I have been in this country over 60 years.
- speaker: Interviewer
  text: Did your father stay in Hokkaido for a long time?
- speaker: Respondent
  text: No. He wanted to create a Christian model farm in Hokkaido. You know Mr. Takechi who is the partner of Mr. Ishimaru
    at Stockton. His relative donated a large sum of money for this project. So he was able to buy a piece of land in Hokkaido
    and invited newly converted people to the land. So the farm looked like a puritan farm. It was by Ishikawa River. My mother
    was teaching English for the young people. During the winter when they could not do too much outside, they invited lecturers
    to come and held various classes.
- speaker: Respondent
  text: However, the benefactor died and he could not continue the farm because of the lack of fund. My father was a disciple
    of Rev. Uyemura, Masahisa, so Rev. Uyemura asked my father to work in Kisarazu. So he lived in Kisarazu. Then he went
    to Yamada. When he went to Yamada, there was no church there. However, within two years he was able to build a church.
- speaker: Respondent
  text: There were 2 missionaries there, Mrs. Helport and Miss Riker who operated Kindergarten. His ministry was very successful
    and congregation membership became over 100. It was a very difficult place to evangelize. However, strange thing about
    it was that they produced many young ministers. Do you know Miss Kawaye, Michiko? who was the secretary of YWCA in Japan?
    My father became a good friend with her. I was attending Osaka Jogakuin (Osaka Women's College) at that time. It was called
    Wilmina Jogakuin at that time. As you know, there were 3 Jogakuin (Women's College) in Osaka; Ferus, Riker and Wilmina.
    My father became ill, so he took a leave of absence at that time.
- speaker: Interviewer
  text: Do you remember things you learned from your parents?
- speaker: Respondent
  text: Yes, I do. My father was a very quiet person, so he never said, "Do this! or Do that!" He has nothing to do with good
    or bad. However, he must think I was a little hasty person. As I was leaving for the school, he said this to me, "Kiyoko,
    you are entering dormitory now. When you carry your chawan (bowl) back to the kitchen, be careful not to break them."
    He never complained anything to me before. When I bring home a report card, he said, "Well, your teacher was very generous."
    However, my father was a person of dignity. You could not violate his feeling.
- speaker: Respondent
  text: My mother was also a very gentle and quiet person. When I was attending at Wilmina I stayed at the dormitory. It was
    the world of women. So there were lots of things happened there. I was not that smart woman. I was studying there with
    scholarship. So I had to study hard. When I was studying hard, they came to distract me from studying. I was teaching
    Sunday school, too. I was asked by many churches to teach their Sunday School.
- speaker: Respondent
  text: There was a time when I went through a certain struggle. At that time my mother was living in Kobe. (They moved to
    Kobe by that time, because my father could not continue his ministry because of his illness. They said it could be a cancer.)
    In any case, I wrote a letter to my mother saying, I wanted to move to Kobe Jogakuin (Kobe Women's College) even if I
    had to work. I also wrote my problems in the letter.
- speaker: Respondent
  text: My mother used to write letters with big letters like that of men. She did not reply for a long time. So I was wondering
    why. I even thought my letter might have not reached her. Then, she sent me a post card. At that time letters came to
    the dormitory master and she would hand them to us in the dining room. She called my name, finally, so I went up to her
    and received it. I was wondering what was written in it. Well, it said, "Thou shalt love your enemies!" That's all. I
    just could not say anything. The message was very loud and clear.
- speaker: Respondent
  text: My mother used to tell us stories about Tolstoy and other writers as we warm ourselves around hibachi. My mother was
    an idealist, so in one way it became my handicap.
- speaker: Respondent
  text: My mother took care of my father after he became ill. She also took care of many other sick people, too. So she was
    a very busy person. However, she studied very hard all the time. She read all the books my father had. She also knew English,
    so she could read new things in English, too and helped my father.
- speaker: Respondent
  text: Many people came to her and consulted with her with many problems. When she had a few minutes to herself, she took
    out a book and read it. One day I asked her, "What are you going to do with your learning? Besides, you are an old woman
    now." Then she said this to me, "You see many people have all kinds of pains in their heart. They want to take it out,
    so I want to study all kinds of things to become a good listener."
- speaker: Respondent
  text: It was the time when communism was coming into Japan and some of the young people who came from good families were
    affected and caused many heartaches. Some people even had nervous breakdown and were staying with my family, because she
    could handle those people. I thought it was very strange answer. I would understand it if she wanted to know as many things
    as possible so that she could discuss things with them whatever subject matter they wanted to talk about. But to become
    a good listener...
- speaker: Respondent
  text: I was very young and did not understand it at all. However, after 60 years I began to understand it. You must know
    lots of things before you can hear God's voice.
- speaker: Respondent
  text: My mother also said that in order for her to be quiet and let others speak, she had to have broad knowledge. For instance,
    a stock broker would come to talk with her. However, she can't talk to him about stock in order for him to start talking
    about it. Then, the conversation would come to an end. So she would talk just a little bit about a political thoughts
    and did not know God from the beginning.
- speaker: Respondent
  text: My mother was able to listen to him and understand him.
- speaker: Respondent
  text: My mother was very well versed in literature. Her father was a graduate of literature from Waseda University. His
    name is Kanegaki, Robun. He read all kinds of literature, Russian and others. So she was well educated in that field.
    Besides, she had to meet with highly educated people as well as wife of my father's rikisha man or a wife of a grocery
    store owner who lived in a very difficult father-in-law. She had to learn kinds of things which could not be learned from
    the wives of rich men, or highly educated people.
- speaker: Respondent
  text: She asked me when I was leaving for America, "Please become a kind of person who learn things from the people you
    come in contact with." My mother was more than my mother. She was my teacher and also my confidant.
- speaker: Interviewer
  text: Then, what do you remember the most?
- speaker: Respondent
  text: Well, I was in the dormitory for 4 years, so I remember that very well.
- speaker: Interviewer
  text: What did you learn there?
- speaker: Respondent
  text: English, music and other subject matters. This was a mission school, so it was administered and taught by white people.
    It was built by American fund. In any case there were about 4 to 5 American teachers. Others were those who graduated
    from Koto Shihan (higher normal school). English translation was taught by a teacher who was a graduate of Aoyama Institute
    (college).
- speaker: Interviewer
  text: How about math and other subjects?
- speaker: Respondent
  text: Yes, I learned them, too, but I've forgotten everything. I don't know how I had received a diploma.
- speaker: Interviewer
  text: What kind of enjoyments did you remember?
- speaker: Respondent
  text: Oh, yes. There were lot of them. Well, I was very young. I participated in the school drama. The one I remember most
    would be singing in a big choir. I had a job in the school YWCA. I liked this job, very much. After the morning assembly,
    we gathered for the worship. I had to take care of all the details of these meetings.
- speaker: Respondent
  text: When I was a freshman, I worked with one other person, however, after that I did all by myself. Mainly I had to take
    care of the lower class people, moderating meetings, helping to write speeches, and others.
- speaker: Respondent
  text: The big one was a weekly gathering where students presented speeches on flower arrangements, choir presentation or
    dramas and everything that students had prepared. Once a year a school presentation was made by selected individuals.
    This was the biggest one. These were very enjoyable.
- speaker: Interviewer
  text: Do you remember anything from Hokkaido?
- speaker: Interviewer
  text: Do you remember wars? Nishin Senso (Sino-Japan war)?
- speaker: Respondent
  text: Yes, but not very much. You know the song "Kokowa Okunino nanblyaku ri" (This is hundreds of miles away from home)?
    We sang this song very often and cried a lot.
- speaker: Interviewer
  text: Your mother had passed on already?
- speaker: Respondent
  text: Yes, both of my parents are gone now.
- speaker: Interviewer
  text: Your mother was a very able person. You know ministers didn't get paid very much at that time. How were they able
    to sustain themselves? Especially when your father was sick?
- speaker: Respondent
  text: Well, he was able to work later on, so...
- speaker: Interviewer
  text: How many children did they have?
- speaker: Respondent
  text: Five of us. But now we have only three of us left. I'm in the middle. Two boys and three girls.
- speaker: Interviewer
  text: What was the reason why you came to the USA?
- speaker: Respondent
  text: I never thought that I would come to America to make money. I'm a little different in this respect. However, when
    I was a student, I liked Millet's painting, the Angelicus. I thought marriage in Japan was not quite right for me. I was
    associating with teachers who came from America. I also wanted to continue my study even after graduating from Japan.
    I was not very healthy.
- speaker: Respondent
  text: So I took a leave of absence one year and stayed behind and continued next year to finish my school. I also taught
    Japanese to an American who knew a little Japanese. I wrote a letter for him for ordering materials. I also was a teacher's
    assistant. Because of these experiences my thinking became very westernized. You see I was living in Wilmina and my parents
    were living in Kobe.
- speaker: Respondent
  text: I used to come back for the summer vacation. One day when I went back to my home, there was a middle aged woman who
    was a wife of a large wholesale dry good store owner. However, she had such a mean mother-in-law and was very exhausted.
    So they decided that she stay with my mother for a while. Her brother was a famous theologian by the name of Kenji Ashida.
    He wrote many books.
- speaker: Respondent
  text: In any case, he was such a fine person. At that time about 40 salesmen used to come to her store and check out textile
    materials for sale. Salesmen used to carry materials on their back and walk on streets to sell.
- speaker: Respondent
  text: She was taking care of those 40 salesmen, so she was really exhausted and needed a rest. I didn't know anything about
    it. I was such a simple person. I didn't understand all these things at that time. Soon this woman became well and strong
    and regained her health.
- speaker: Respondent
  text: So she went home.
- speaker: Respondent
  text: This woman said to me later on, "If my son is a little bit older, I would like you to marry him. But he is just a
    little too young. There is a fine young man I know. I have been looking for a nice girl for him. In some way he is a very
    hard person, but he is a very good person, too. If you are willing, I would like to make an occasion for you two to meet.
    I think you two will make a very good couple."
- speaker: Respondent
  text: I told her, "I would like to associate with him for 6 months and then I'll make up my mind." It was a modern style.
    My children say it was a romance. Well, it was not quite like that. But at least it was an American style courtship. We
    laughed about that. Some make a joke about it by saying, "I failed! I made a big mistake! I should have done better than
    this."
- speaker: Respondent
  text: However, you can't hope to match your dream and reality that you are faced with. So I really didn't expect to make
    too much money. My dream was to live like the picture of Bansho (The Angelus) to work and able to pray together to God
    and return thanks at the end of each day. I thought that this was the most beautiful life that I could hope for.
- speaker: Respondent
  text: So when I came here first, I was taken to Imperial Valley. People told us, "You'll die if you go there and farm!"
    But it didn't bother me a bit. Even if I had to sleep in a tent, I could see the stars and I thought it was very tasteful.
    So you see, if you have that kind of wife, you'll never be successful in your business.
- speaker: Interviewer
  text: So you did go with him for 6 months?
- speaker: Respondent
  text: Yes. He did come back and we dated for 6 months. It was just like those of young people.
- speaker: Interviewer
  text: Then you liked him.
- speaker: Respondent
  text: There is a little bit of difference between American style courtship and ours. You see American style is that
