collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: I would like to hear about your experiences that is if you remembered the hardships and about your jobs you had while
    in Japan or the United States.
- speaker: Respondent
  text: I have a little hearing difficulty so please speak louder.
- speaker: Interviewer
  text: Please tell me frankly. It doesn't have to be an exact story and forget about the microphone. First, where is your
    home town?
- speaker: Respondent
  text: It is Hiroshima Ken.
- speaker: Interviewer
  text: How about you Mrs. Domoto?
- speaker: Respondent
  text: It is Hiroshima Ken.
- speaker: Interviewer
  text: Is it the same village?
- speaker: Respondent
  text: A different village. To be exact, I was born in Hawaii. Because I was not registered in Hawaii I became Japanese born.
    I am Hiroshima Ken Asa Gun and my husband is Asa Gun Tomomura.
- speaker: Interviewer
  text: What year were you born?
- speaker: Respondent
  text: Meiji 14, December 14.
- speaker: Interviewer
  text: And then Meiji 14 is?
- speaker: Interviewer
  text: Oh, 1881, well, then you are 92 years old. That is great! You are in good health too aren't you?
- speaker: Respondent
  text: I can't do anything now.
- speaker: Interviewer
  text: How old are you?
- speaker: Respondent
  text: I was born February 10, 1898.
- speaker: Interviewer
  text: I see. Then, it's 75 years old isn't it?
- speaker: Respondent
  text: I am 75 years old.
- speaker: Interviewer
  text: What was your family like in Japan?
- speaker: Respondent
  text: A poor farmer.
- speaker: Interviewer
  text: Oh, I see. At Hiroshima?
- speaker: Respondent
  text: At Hiroshima Ken Asa Gun.
- speaker: Interviewer
  text: What were your father and mother like?
- speaker: Respondent
  text: They were farming.
- speaker: Interviewer
  text: Were they strict?
- speaker: Respondent
  text: No, not especially.
- speaker: Interviewer
  text: Oh, he was a gentle person. How about your mother?
- speaker: Respondent
  text: She was all right.
- speaker: Interviewer
  text: Was that so? How old were you when you came to the United States?
- speaker: Respondent
  text: I crossed the ocean to Hawaii when I was 19 years old and came to the United States in 1903. I landed at San Francisco.
- speaker: Interviewer
  text: You came here from Hawaii. How long have you lived in Hawaii?
- speaker: Respondent
  text: About two years in Hawaii, I think.
- speaker: Interviewer
  text: What did you do, sugar canes?
- speaker: Respondent
  text: I worked at a sugar cane company and used a horse.
- speaker: Interviewer
  text: Was it hard work?
- speaker: Respondent
  text: No, rather easy job.
- speaker: Interviewer
  text: How long did you go to school in Japan?
- speaker: Respondent
  text: I only graduated from a grade school.
- speaker: Interviewer
  text: Was that the only school there?
- speaker: Respondent
  text: The grade school was the only school in the village and no upper grades.
- speaker: Interviewer
  text: What did you learn at the school? Do you remember anything?
- speaker: Respondent
  text: At the school... well, anyhow, at first I learned I RO HA. You people would understand Japanese grade school in the
    old days, and present days are not much different.
- speaker: Interviewer
  text: Did you like the school or you did not like it very much?
- speaker: Respondent
  text: I liked it very much.
- speaker: Interviewer
  text: What was your family religion?
- speaker: Respondent
  text: It was Buddhism.
- speaker: Interviewer
  text: Is it Nishihonganji?
- speaker: Respondent
  text: It is Nishihonganji.
- speaker: Interviewer
  text: Have you heard about Christianity in Japan?
- speaker: Respondent
  text: No, I haven't heard much. The village flourished with Buddhism and it did not have room for Christianity to spread.
    Anyway I have heard about Christianity in Japan. Christianity is on the surface approaching very gentle like but it is
    said to be the way to conquer the country. Therefore, they said you believe the religion that will make you a traitor.
    All this kind of talk. Even as children we had what you called a patriotic spirit. The Christians were the traitors and
    I hate it. When I left Japan, my mother bought an amulet from somewhere. There was Buddha's Namiamu dabutsu, but the amulet
    was called Omyobusama. I made it small and put it around my neck. Mother said you are going to some kind of an island
    in a foreign country that you don't see the mountains and the rivers. There won't be any shipwreck when you wear this
    and in case of a shipwreck you'll be saved. So I put it on my neck and I still had it when I came to the U.S.. The amulet
    gets wet by the perspiration and gets dirty and it could not be washed. I was worried at that time. Finally, I decided
    to take that off. There was a medicine called Senkintan in Japan. That was the same size as the amulet. I was not a Christian
    at that time.
- speaker: Interviewer
  text: Shall I tell you about when I became a Christian and my job?
- speaker: Respondent
  text: I came to San Francisco and during the summer I worked on a Stockton farm. In the winter I came to San Francisco and
    worked at the houses. I went to a night school and learned the ABC's. There was an earthquake in San Francisco about that
    time. Quite some time later from the earthquake, I was at some boarding house and failed some examinations. At that time
    someone sent me the new testament. From that time there was a bible on a reading table. It's there but looks like nobody
    is opening the bible. Like an old saying 'A shut mouth keeps out of strife.' At first I wanted to know what is written
    in the book. When I opened it a little it looked easy. The book's Kanji had Japanese syllables (furigana). Since nobody
    was reading the book I asked the boss for permission to read it. I took the book to my room every day after working hours
    and read it. I borrowed it and I glanced it through. The boss said go over the book quickly and return it. So I glanced
    through the book and returned it to him. Right afterward I went to a store to buy me a new one with my own money. And
    again I wanted to look into Christianity so I have read the books of Iwamori Sensei's 'Heimin No Sukui' and 'Jinsei No
    Kozu' etc. And about this time Uchimura Sensei had issued a little magazine called 'Seisho No Kenkyu'. The magazine was
    issued weekly or monthly from Japan. I bought and read them, and Uchimura Sensei's books and let's see, the books names
    were 'Shisho Gokoro', 'Nihon no Kunino Danjo' etc. I have read the distinguished scholar's books at random. They were
    not very difficult books. I can read but the writing is pretty difficult. I read newspapers too. I have read the distinguished
    scholar's books that were all religious books. And before long I was saved. I was saved by the God before I went to a
    pulpit.
- speaker: Interviewer
  text: What year did you go to the church for the first time?
- speaker: Respondent
  text: And by that time the church had Reverend Mori from Japan. He was from Japan and finished the school here and started
    to preach in San Francisco. I went to that church but I was saved before I went to church. And once or twice I went to
    the reverend's sermon. After a while they found me and I joined the church. Under the circumstances I was to be baptized
    and I became a Christian with Mr. Kenji Okamoto. It was Mori Reverend's second baptismal ceremony since his Christian
    mission work started, I think. I was baptized with Mr. Kenji Okamoto. The name of the church was Japanese 'Rikyo Kai'.
    There were lots of Rikyo Kais. Everybody was devoted to the church. The people sang the songs so cheerfully. I sang with
    them. Everybody got together and held meetings and sang the songs again. It was a joyous affair.
- speaker: Respondent
  text: Those days I was still young. Even when I had a new job I wasn't tired so at nights I went to listen to Mr. Smith,
    the Evangelist. In those days there was an English hymn called 'I can hear your savior calling.' Just listening to that
    song I felt like I could hear Christ's heart or heard Christ's voice. I was crying with the enthusiasm. We had 'Keshincho'
    (meaning not clear), which was who became Christian but want to know a little more came to listen. The Salvation Army
    did come and helped. The beginning of 'Yokokusho' (the text of prophecies). They were the Salvation Army officers. We
    sure were devoted to the religion in those days. It is hard to pray but I was praying before I became Christian. The reverend
    took a couple young leaders to one room and I had to prepare for a ceremony for baptism. I was praying I remember the
    words 'Oh, God, I appreciate you let me become a disciple'. Well, that is about the story that I was baptized and became
    a Christian. I returned to Japan after that and came back again a couple of years later.
- speaker: Interviewer
  text: I am going back on your story. You came to San Francisco and what kind of job did you do at first?
- speaker: Respondent
  text: When I came, in summer, I was at a farm.
- speaker: Interviewer
  text: Where about?
- speaker: Respondent
  text: That was Watsonville area. Sacramento and Stockton.
- speaker: Interviewer
  text: Kawashimo? (Courtland, Walnut Grove area)
- speaker: Respondent
  text: I went Kawashimo also.
- speaker: Respondent
  text: Yes Salinas area.
- speaker: Interviewer
  text: Stockton area?
- speaker: Respondent
  text: Watsonville area.
- speaker: Interviewer
  text: Mr. Salinas direction, Vacaville?
- speaker: Respondent
  text: I went to faraway.
- speaker: Respondent
  text: And he was a cook for caucasian family.
- speaker: Respondent
  text: I was a cook, Ten dollars a week and forty dollars a month and could save some money.
- speaker: Interviewer
  text: How much did you get when you worked at the farm?
- speaker: Respondent
  text: Working at farm, well....
- speaker: Interviewer
  text: Being a cook made more money?
- speaker: Respondent
  text: Of course, the grape harvest at summer time etc., made more money than being a cook. I could not save money those
    days. It was not easy to save hundred of dollars. I worked little while and after saved up for two to three hundred dollars
    went to a hotel and stayed. Spent it all up and started work again. We have a house now to live with but those days not
    very many owned a house.
- speaker: Interviewer
  text: What kind of the difficulties have you had?
- speaker: Respondent
  text: The difficulties were around 1919, they were all handling the vegetables like present day gardeners. And there were
    no big chain markets. All Japanese got up early in the morning and went to the market bought the fresh vegetables and
    displayed in the store. So neighbors came to shop. Anybody and everybody sold vegetables for a while. When we came to
    Los Angeles, we sold vegetables and bought store at ? street and operated vegetable store. We had three children by that
    time. That time we did not have sister, grandma nor anybody but the present day we have brothers, sisters, grandmothers
    and friends so it is not lonely. In those days we did not have anybody. Maybe it was the second, maybe the third child's
    birth, my wife went to the hospital but I had a store that I could not take days off. I put two children into my car and
    went to the market at three in the morning. I did not put them inside the market. I put them by the back and I did my
    business as usual. After it was done put children top of merchandise, came home and unpacked the load. I was in a trouble
    times like that. A friend of mine did the laundries for me and asked baby sit for a couple of days. They took my children
    but said the children were crying a awful lot. Because the children were tottering age, they did not know what to do.
    I did my business as usual. Get up in the morning and get some fresh vegetables and had to take care the children. I needed
    help. I was distressed. I asked a friend of mine to keep a child for me and I went to get the child after my work was
    finished. The child cried awful lot, they said. I could not blame the child. I did not know what to do. When things happen
    like this, people here now, even Japanese have a grandmother, sisters and so forth, but when my wife's child birth I had
    take care unreasonable three or four little children and managed the store. That was the most rough time I ever had.
- speaker: Respondent
  text: And I was already a Christian at that time. Rikyo Kai was near by the store and it was called - - ?-- . I was invited
    to this one. For a while later my wife and Mr. Sakai, the laundry owner, had their baptism. She was not a Christian until
    then. There were lots Japanese church put no church buildings. They changed a house little into the church, and put some
    chairs in it. The poor church had the benches instead of the chairs. Put the card table in and put a big bible and the
    reverend preached.
- speaker: Interviewer
  text: When did you come to Los Angeles?
- speaker: Respondent
  text: 1919, by highway 101.
- speaker: Interviewer
  text: Mrs. Domoto, when did you marry?
- speaker: Respondent
  text: We married 1917 and came here from Japan.
- speaker: Interviewer
  text: Then, you went back to Japan 1915?
- speaker: Respondent
  text: Yes, I was in Japan.
- speaker: Interviewer
  text: How long have you stayed in Hawaii?
- speaker: Respondent
  text: At Hawaii, until 14 years old. I return to Japan and stayed five years, got married and came over here.
- speaker: Interviewer
  text: You knew English when you returned?
- speaker: Respondent
  text: I remembered English.
- speaker: Interviewer
  text: Then, you knew about United States?
- speaker: Respondent
  text: I knew Hawaii little bit. I came to America 1917, for the first time.
- speaker: Interviewer
  text: Was America different from Hawaii? Living in here and living in Hawaii?
- speaker: Respondent
  text: It is different.
- speaker: Interviewer
  text: How different?
- speaker: Respondent
  text: Well, speaking about how different.....I don't g
