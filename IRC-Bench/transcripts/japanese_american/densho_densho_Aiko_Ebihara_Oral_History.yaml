collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Could you just give me or start with a little bit of your background of where you were growing up before the war?
    And what your parents were doing at the time.
- speaker: Respondent
  text: I was born in 1935 in Salem, Oregon and my father had a restaurant there called Tokio Sukiyaki. And they were very
    busy. At the time they had my sister and my brother and were living with them upstairs in the restaurant. And then I came
    along, and soon after my birth, they were looking for someone to take care of me. And I was only like three weeks old,
    and Mr. and Mrs. Williams volunteered, I guess, or they got a hold of them and they decided they could take me in and
    take care of me while my mother and dad were busy at the restaurant. And they had a daughter who was eleven years old
    and her name was Velora. And Velora has always thought of me as a little sister. And always called me her sister.
- speaker: Interviewer
  text: That's so sweet.
- speaker: Respondent
  text: So it was more like an adopted family. So I grew up with them. And I don't remember but I assume that my mother would
    stop by and see me. At least I hope she did.
- speaker: Interviewer
  text: She probably did!
- speaker: Respondent
  text: I'm sure she did, but I don't remember any of this at all. So Velora really took care - at that time she was eleven
    years old and I was three weeks old when I was first brought to her family. So for the next three years, I stayed with
    them. And so she had written about her experience with me and how she took care of me and she said several interesting
    things that I never knew that she did with me, and that's all in the book.
- speaker: Interviewer
  text: And so your parents, because they were working so hard and they had a lot to do, they just felt it was easier if you
    lived with this other family?
- speaker: Interviewer
  text: So were the Williams good friends with your parents before that?
- speaker: Respondent
  text: I don't know. I think a friend of theirs found out that my mother was looking for someone to take care of this baby.
    And they suggested that Mr. and Mrs. Williams may be a good choice. I don't know whether they wanted some extra money,
    maybe? But anyway, so that's how that came about. Mrs. Williams was suggested by a mutual friend who knew the Tanakas,
    and was encouraged to take the job of caring for Aiko.
- speaker: Interviewer
  text: I see. And how long did you live with them?
- speaker: Respondent
  text: Well, I would say at least three years. Three or four years.
- speaker: Interviewer
  text: And so when your parents said, "We're going to have everyone live together again," were they still operating the restaurant?
    Or did they do something else?
- speaker: Respondent
  text: No, they were operating the restaurant at the time until we were interned, until we went to camp. They had to sell
    the restaurant if they could.
- speaker: Interviewer
  text: So you were about four or five when you left. But did you stay in touch with this family?
- speaker: Respondent
  text: Yeah, I was. We were interned in Tule Lake, so I must have been like three years old. But I always wrote letters to
    them while I was in camp. And those appear in the book too. My letters appear in large print like a child would write.
    And actually I'd never seen, I'd never seen them until she showed them to me. And she said that one of the letters was
    censored. She only got the envelope and so she can't imagine what I had written in, you know, what I said about the camp.
    So, it might have been that the food was terrible or about the soldiers standing guard. And my sister Hazel, who is three
    years older than I, also wrote letters.
- speaker: Interviewer
  text: It just shows how paranoid they were, to censor a letter from a child.
- speaker: Respondent
  text: Right. I still don't know what was in that letter. But, you know, then we'll never know what was in the letter. So
    we have no idea.
- speaker: Interviewer
  text: Do you know who your parents sold the restaurant to?
- speaker: Respondent
  text: I have no idea. I don't think they got any - I don't think they sold it to anybody. I don't think they received any
    money for it. We just had to pack up Williams' home at 740 Chemeketa Street in Salem and leave as soon as possible. And
    then I think we probably left some things with the Williams family, hoping they could keep it for us for when we eventually
    came out of camp.
- speaker: Interviewer
  text: Were you living in a Japanese American neighborhood or were you kind of the only family, as far as you remember in
    Salem?
- speaker: Respondent
  text: Well it was, as far as I know, no. It was just American families, Caucasian families.
- speaker: Interviewer
  text: And what assembly center did you go to before Tule Lake?
- speaker: Respondent
  text: We went to Tule Lake and we were there for about a year and then we were transferred to Topaz.
- speaker: Interviewer
  text: What do you remember about writing to Velora and getting her letters in camp?
- speaker: Respondent
  text: I don't remember anything about that. You know, about receiving the letters or anything. I hardly remember anything
    about camp.
- speaker: Interviewer
  text: Did the Williams family come visit your family in Tule Lake?
- speaker: Respondent
  text: Yes they did. Velora writes about how they had to go through a lot of security to get into camp. And they had to do
    a lot in order to get in and visit us.
- speaker: Interviewer
  text: So the war ends and you're a little bit older by that point. Did your family go to Ohio immediately? Or what happened
    after?
- speaker: Respondent
  text: Yeah we went to Cleveland, Ohio. Actually, my brother came out first. They did not want to go back to Salem so they
    went east and went to Cleveland. A lot of interned people were coming out to Cleveland and Chicago on the east side. And
    since my dad had a restaurant in Salem, he was able to find a job as a cook.
- speaker: Interviewer
  text: Was it a Japanese restaurant?
- speaker: Respondent
  text: No, it was American food. And then they finally found a job at the fraternity house in Cleveland. That was connected
    with Case Western Reserve University. He was a cook.
- speaker: Interviewer
  text: I see, how interesting.
- speaker: Respondent
  text: So I actually grew up in a fraternity house [laughs]. On the side they had like an apartment attached to the fraternity
    house. And the pledges were really nice; they had the pledges build us swing sets in the yard for us. I know all about
    fraternity life [laughs].
- speaker: Interviewer
  text: I am curious about your relationship with the Williams family after camp. You obviously moved pretty far away. Did
    you stay in touch?
- speaker: Respondent
  text: It's amazing we did stay in touch. It was mostly during the holidays. I would send Christmas cards and I would tell
    her about what I was doing from the time I was in elementary school, junior high. I would tell her everything about my
    grades, and what subjects I liked, what I was doing, my hobbies. And this went on until I was in high school. And then
    I would send her my graduation picture. I mean, she kept everything. You can't believe the pictures that she kept. And
    most of it is also in the book, too. So I have several of the pictures. But she followed me, I followed and I wrote to
    her throughout college, marriage and my children. So we kept in touch.
- speaker: Respondent
  text: And then when we were in California we decided we would like to visit her. And so I wrote to her that we were going
    to be visiting and she was so excited because by then it's been over thirty years that we had actually seen each other.
- speaker: Respondent
  text: And she had always considered me as her little sister. So she said to me that she would cancel all her doctor's appointments
    and everything. But you know, I wanted to see her but I didn't feel that closeness like she did towards me. And so when
    we went to her house, she was there and I mean she just hugged me and wouldn't let me go for the longest time. So it was
    a very nice reunion. And then we also went another time. Whenever we went to California, we'd make a special trip to see
    her in Medford. And then eventually she was in assisted living, when we last saw her.
- speaker: Interviewer
  text: When did she pass away?
- speaker: Respondent
  text: She passed away in 2009. But the last time that we saw her, she showed me what she was doing. And at that time it
    was all hand-written that she had made stories about myself. And her handwriting was very small, very hard to read, and
    she eventually found someone that would do it on the computer. And somewhere in 2010, I received two large boxes. It was
    all her writings. But nothing was in order, like there were a lot of repetitions of things that she had written. Hand-written,
    computerized a lot of it was done by chapters the best she could. But it was just a lot of things. I mean she saved everything
    about my life.
- speaker: Interviewer
  text: You know, that's kind of amazing, since you were so young and you don't have those memories, she almost documented
    that time of your life for you.
- speaker: Respondent
  text: That is true. So it was actually very interesting for me to read about myself. Things that I did with her, you know,
    and it was just amazing. It was really something else.
- speaker: Interviewer
  text: Which family member sent it?
- speaker: Respondent
  text: That would be Velora's daughter, Carla. So Carla was evidently supposed to help publish this book with her mother.
    And it never happened because she passed away. So therefore Carla said she didn't know how to organize or how to publish
    a book. Well, I didn't either. So she sent me the two boxes of all her writings. And so it took us close to over a year
    that I worked with Lee Drickamer and we organized the book for publication. So it was in November 2017 when we first published
    125 books. And then I had to go back again and publish 50 more books.
- speaker: Interviewer
  text: Velora obviously had such affection towards you and felt very warm towards you and your sister. Did she ever speak
    about her overall perspective of the camps and how you being uprooted affected her?
- speaker: Respondent
  text: Yeah, she did. From what I understand, she was very outspoken about the camp. She was interviewed by a reporter from
    Medford, Oregon after the 9/11 incident and they wanted to know how she thought about the talk about putting the Muslims
    into internment camps. And so he got a hold of her and she said that she couldn't talk about that, but she said she was
    very much against the internment camps for the Japanese Americans. So there's an article that he wrote that was published
    in the Medford paper. It has a picture of me standing in front of a Tule Lake barrack.
- speaker: Interviewer
  text: This is such an amazing story of your friendship, between you and her. I mean you are almost like a second family.
- speaker: Respondent
  text: That's right. You know, you can't imagine, I learned a lot about myself in this book, I really did.
- speaker: Interviewer
  text: Are you still in touch with her daughter?
- speaker: Respondent
  text: No. I did send her the book. And that's the last time I have been in touch with Carla.
- speaker: Interviewer
  text: And she was very happy to receive the book and she complimented me on how we did a very good job with the book and
    that her mother would be so proud that it was finally published.
- speaker: Respondent
  text: It's very meaningful for both of your families to have that.
- speaker: Interviewer
  text: Right. And all of our nephews and nieces and of course my children, too.
