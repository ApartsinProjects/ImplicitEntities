collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Please tell me your name first, from you.
- speaker: Respondent
  text: Otoshi, Jitsuo.
- speaker: Interviewer
  text: What is your home town?
- speaker: Respondent
  text: It is Hiroshima Prefecture.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on February 20, 1904, so I am 70 years old this year.
- speaker: Interviewer
  text: When did you come to America?
- speaker: Respondent
  text: I came here in 1920.
- speaker: Interviewer
  text: So you were 16 years old then?
- speaker: Respondent
  text: Yes, I was 16 years old.
- speaker: Interviewer
  text: Did you come here alone?
- speaker: Respondent
  text: Yes, I did. My sister was married and living in America, so I went to my brother-in-law's place.
- speaker: Interviewer
  text: Was it in Seattle?
- speaker: Respondent
  text: No, it wasn't. It was about 20 miles away from there.
- speaker: Respondent
  text: Like this, I'm going to ask about yourselves and come back to him again. Next is you please.
- speaker: Respondent
  text: I am from Iwami, Shimane Prefecture, and Shigeru Hidaka is my name. It is written (heavy) for Shigeru. I was born
    on May 28 in 1904, that is Meiji 37 and the same year that Mr. Otoshi was born.
- speaker: Interviewer
  text: Oh, then, you'll soon have your birthday. In 10 days or so?
- speaker: Respondent
  text: Now it's my turn to be a senior at last! Seventy years old—It's relatively young for issei. To me, it seems like I
    have still a long way to go. We were probably among the last people that were sent for from America.
- speaker: Interviewer
  text: When did you come to America?
- speaker: Respondent
  text: Returning from the Russo-Japanese War, my father went to America and had lived for 11 years before he came back to
    Japan to take us to America. During those years, my mother and I remained at home in Japan. Then I came to Seattle in
    1918 with my parents via Victoria, and have been living here almost all the time.
- speaker: Interviewer
  text: When was it?
- speaker: Respondent
  text: It was 1918 when I was 14. It was just during the World War.
- speaker: Interviewer
  text: Why did your father come to Seattle? He moved up here from Southern California, didn't he?
- speaker: Respondent
  text: Before coming here, my father had been in California, Wyoming, Nevada, and New Mexico working as a cook of railroads.
    He also picked up oranges and cherries in California. I don't know the reason, but by some reason he came up here to Seattle.
    Since money is the first consideration, and you can't move anywhere without money, he got settled here. Since then, I
    have been here for nearly 60 years.
- speaker: Interviewer
  text: How about you?
- speaker: Respondent
  text: I am from Iyo, in Ehime Prefecture of Shikoku.
- speaker: Interviewer
  text: Just a moment please. Rev. Noji told us that you were coming, and I was expecting rather an old pastor. We were expecting
    an older person, so we were really surprised. Your family name, Takarabe reminded me of an old shrine, Takarabe Shrine.
    I often stay at some member's house when I attend Nenkai. They look for an issei, thinking that I am an issei. I was often
    mistaken. I was really surprised.
- speaker: Respondent
  text: Really? But in the true sense, I am an issei. Please start from your name again.
- speaker: Interviewer
  text: My name is Kotaka Uomoto. I am from Yahata-hama (beach), Iyo, in Ehime Prefecture.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on December 11 in 1896.
- speaker: Interviewer
  text: So you are 77 years old.
- speaker: Respondent
  text: Yes, I am 77 and a half years old.
- speaker: Interviewer
  text: When did you come here from Japan?
- speaker: Respondent
  text: I came to America in May of Taisho 5 (1916).
- speaker: Interviewer
  text: You came here as a bride?
- speaker: Respondent
  text: Yes. I was taken from Japan directly. My husband was working as a cook at Mr. Julian's house who was a statesman.
    By the time we returned there, he had been elected as the Secretary of the Treasury. It was a Christian home, and whenever
    an important thing occurred, he invited a pastor to his house to pray for the family and did something after that.
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: I'm afraid that I can't pronounce clearly, because I don't have any teeth. I am now under dental treatment.
- speaker: Interviewer
  text: That's all right... I can understand.
- speaker: Respondent
  text: I was born in Osaka-fu. My husband Tomita was born in Nara and I am used to thinking myself from Nara, since I came
    to America. Whenever I was asked where I was from, I unconsciously answered that I was a Nara-Ken jin (a person from Nara
    Prefecture).
- speaker: Interviewer
  text: Did you also come here as a bride?
- speaker: Respondent
  text: Well, when our marriage was arranged, Tomita was in Yakima, which was a little bit more interior from Seattle. He
    came back to Japan to take me. We got married in autumn, 1920, and left for America in the spring of 1921 by boat. Then
    we went to Yakima and worked as farmers for eight years before moving to the suburbs of Seattle.
- speaker: Interviewer
  text: Before asking, I had better write your names down. Your name is...
- speaker: Respondent
  text: Otoshi. -toshi means useful.
- speaker: Interviewer
  text: And your name is...
- speaker: Respondent
  text: Shigeru Hidaka.
- speaker: Interviewer
  text: There is also a man named Hidaka who is a friend of my father and living in Kagoshima. Are there a lot of surname
    Hidaka where you came from?
- speaker: Respondent
  text: Yes, there are quite a few of them, even if there is no family relationship. A list of the people who graduated from
    a school and went abroad was sent to me once. In it, I saw quite a few Hidakas.
- speaker: Interviewer
  text: What was the most impressive experience you have had in Japan while you were young?
- speaker: Respondent
  text: When I was little, I was very sickly. I was sickly for a while even after coming to this country. My mother said that
    I had been always suffering from diarrhea and troubled her a lot. When I was nine years old or so, I got pneumonia and
    had to have a leave of absence from school for one year. I was so pale, and almost dying. At school, pupils said that
    I had consumption, and did not come close to me. They used to make fun of me and leave me out. This is the most impressive
    memory I remember now. It was a miserable experience, but I began to lead a religious life because of this. Later, I finally
    got tuberculosis. From suffering this, I got to know Jesus Christ, and it is my testimony.
- speaker: Interviewer
  text: How about you?
- speaker: Respondent
  text: One of them is when I went to Minatogawa in Kobe area, which is famous for Masashige Kusunoki (a historically famous
    and brave samurai). I felt that it was a very nice place, and that impressed me. Another impressive memory is when I went
    to Osaka, taken by my grandmother to see a plane fly for the first time in Japan. The airplane fell to the ground, but
    I thought that Osaka was also a nice place. These are my memories that I was impressed so much by.
- speaker: Interviewer
  text: How about you, Mrs. Tomita?
- speaker: Respondent
  text: I hardly had a hard time in Japan, so I don't have any particular memory to talk about except one. I remember this
    clearly although I was very young at that time. My father went to the Russo-Japanese War. I heard that he had been to
    the Sino-Japanese War, too, before I was born in Meiji 29 (1896). It was in 1904 and 1905 that the war occurred. In Japan,
    at that time, people were not supposed to cry in public even when their family member went to war, because it was supposed
    to be an honor to fight for the country as a loyal man of the Emperor. Even so, we used to cry secretly within our home
    and go to a shrine to do Ohyakudo-mairi, to pray for his coming back safe. All the family members who were able to walk,
    used to go to the shrine every day by turns. When my father was fighting in Russia, I was only seven years old and just
    started going to elementary school. When my turn came, I used to go to the shrine to do ohyakudo.
- speaker: Interviewer
  text: What is ohyakudo?
- speaker: Respondent
  text: Ohyakudo means that we go around a shrine a hundred times alone praying for a thing. We go around the shrine building
    once first, then we go to pray at the shrine to return our father safe from the war. Then we go around the building again.
    We repeat this a hundred times. This is what we call ohyakudo. Therefore, I felt, although I was too little to understand,
    that a war was an awful thing. I often saw my grandmother and my mother crying in secret. On the contrary, when we sent
    him to the war with our villagers, we used to hurrah joyously, singing songs and saying that it was a happy event. To
    my little heart, it seemed very strange, and I wondered which was true at first. After we sent him to the war, I had to
    do ohyakudo-mairi to pray for his safety. This made me realize that a war was a very sad and awful thing because we didn't
    know if he could survive or not. I felt strongly the sadness of a war.
- speaker: Interviewer
  text: What happened to your father?
- speaker: Respondent
  text: He came back safe. How happy I was when he came home! I still remember it. All the people of the village went over
    to the outskirts of the village to meet him, and indeed this time everybody was happy, drinking, and singing loud. Yes,
    I keenly realized how awful a war would be, and would never forget the experience. Later, when I got older, I have encountered
    wars some times, including the World War II, 30 years ago. The bitterness of wars sank into my mind through these so deeply
    that I keenly think that we should not make a war any more. My father, after coming back from the war, often told me that
    we had to win the war by all means once we started it. I asked him why. Then he said, "Those who lost a war could not
    say anything even if they were treated awfully by those who won. They have to stand all the unreasonable things, while
    the side that won the war can do anything bad." To think of his words, he was wrong. Although Japan lost the World War
    II, America didn't do anything so bad, did it? I realized that he was wrong. Even if they won a war, they should not kill
    or hurt innocent women. I think the Japanese military at that time was wrong.
- speaker: Interviewer
  text: How about you, Mr. Otoshi?
- speaker: Respondent
  text: When I was in the sixth grade of elementary school, a teacher took us, totally three classes, to the downtown of Hiroshima
    to show new buildings and novel things such as illumination, since we didn't have an opportunity to see them where we
    were living. We visited Chinretsukan Museum, which became later the only building remained standing after the atomic bomb
    was dropped over the city while everything else was burned to ashes. The building was made by reinforced concrete, and
    the iron frame of a dome of the building remained as it was. Last year, I went to Japan and visited the place, which reminded
    me of those days when I was young.
- speaker: Interviewer
  text: Do you have any memory when you were little or going to school?
- speaker: Respondent
  text: There is a memory about the time when I finished schooling. All my cousins entered Jogakko (Women's high school),
    and I couldn't because my family was poor. I used to cry whenever I saw my friends going to Jogakko wearing a hakama,
    which was a symbol of Jogakko students. I wished I could have gone. I was so sad.
- speaker: Interviewer
  text: How many members were there in your family?
- speaker: Respondent
  text: There were nine. When my father was 47 years old, he became blind because of a cataract. For eight years after this,
    he had tried everything to recover his sight, going on a pilgrimage to Shikoku or consulting a doctor in Kobe. He lost
    his sight anyway. We became poorer and poorer after this, so I couldn't have so much schooling, just for four years.
- speaker: Interviewer
  text: They had seven children, didn't they?
- speaker: Respondent
  text: No, they had six children and a grandmother. I was the third child from the top.
- speaker: Interviewer
  text: How many boys did they have?
- speaker: Respondent
  text: They had four boys.
- speaker: Interviewer
  text: Therefore, they had two girls, didn't they?
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I had eight brothers and sisters, and I was the second child. The eldest child was a girl, then me, and seven more
    children under me; a boy, a girl, a boy, a girl, a boy, a girl and a boy. Totally nine children they had, four boys and
    five girls. Two were killed by a war, and one died from illness. At the time when I went back to Japan, six years ago,
    six children including me were still alive. They said it was very rare to find a family where six children were still
    alive and got together. Two years ago, my direct younger sister died, so at present five children are remaining.
- speaker: Respondent
  text: A memory of my school days was a sad one. My mother was a sickly person, maybe that was because she had had nine children,
    one after another, and her body got weaker. She suffered from every kind of trouble. When she was about to recover from
    one disease, another one was getting worse. Every part of her body was in trouble, and even a doctor was amazed at her.
    She was ill all the time. Therefore, I keenly felt that nothing was more precious than health.
