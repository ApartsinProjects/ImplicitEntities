turns:
- speaker: Respondent
  text: My father came to the United States in 1903 when he was 18 years old. And he came into Seattle and came down into
    California as a farm laborer and he was up and down the Valley for a number of years. I think between 1910 and 1913 he
    settled here in Livingston. My mother was a picture bride, basically. I think the families knew each other in Japan and
    it was arranged there. She was teaching in Japan and she left teaching and came to the United States and stayed here all
    the rest of her life.
- speaker: Interviewer
  text: Do you know why your father came to the United States?
- speaker: Respondent
  text: I know the reason. My father went with his cousin to Tokyo from Wakayama to take a test to get into the military,
    to be officers in the military. And he passed the written test very well but he had one deaf ear. So he was rejected for
    service, thank goodness. So he didn't go home to Wakayama before he left for the United States. He was so disappointed,
    I guess. And the cousin that he had was inducted into the military and became a general before the war. He just left Japan.
- speaker: Interviewer
  text: So your father was completely by himself?
- speaker: Respondent
  text: Yes, as far as I know by himself.
- speaker: Interviewer
  text: So he made it down to this area, and he began to farm because that's what everyone else was doing?
- speaker: Respondent
  text: Up and down the valley was lots of farming, seasonal of course. They commuted up and down the valley and he made friends
    as he was doing that.
- speaker: Interviewer
  text: So he bought this property?
- speaker: Respondent
  text: This area is called Yamato Colony. Mr. Abiko from San Francisco came to the United States in about 1885 and he was
    a relatively well-educated man and became involved in the newspaper. In fact he started the Nichi Bei. He and some friends
    saw these migrant workers going up and down and spending their money in San Francisco, blowing it. So I guess that's why
    he thought he'd start a community. And several of them talked about it and became friends and decided they'd look for
    a place to start a community. And they came down into the valley, looked around, and decided on Livingston because the
    water was so good. And so they bought I think 2,000 acres to begin with and opened it up for Japanese people to immigrate
    into. And they sold the land to the people who came in. It actually started with two communities--there's a Cressy, which
    is adjacent to Livingston. This is in 1906 that it began just at the time of the earthquake. And so there were about six
    or seven families who came after the earthquake into Livingston. And it's interesting that this is one community that
    never had a Buddhist Church in it. In all the years we've been in it, it's always been a Christian church. Abiko was also
    a Christian and so, it became a Christian community. It's been that way ever since.
- speaker: Interviewer
  text: And why the name Yamato?
- speaker: Respondent
  text: Yamato of course is Old Japan. But that's not why they started it that way. There was what they called a yam station
    just north of Atwater and Abiko had gone up and down the area looking for a place to settle. So he took that name - the
    "yam station" plus Atwater - and made a "Yamato out of it. That's the story that we hear. This area is very famous for
    sweet potatoes. It's probably the center of sweet potatoes for California. And California raises probably the third state
    in sweet potato production.
- speaker: Interviewer
  text: So what do you grow on your farm?
- speaker: Respondent
  text: Things change over the years. When they first started, they first started with grapes, that was the main crop in the
    old, old days. In order to survive until the grapes came into the bearing, they used to raise sweet potatoes and strawberries
    in-between. Before the war, the grape price became so bad, it rarely made any money. But during the wartime years, the
    price went sky high and people with grapes made a lot of money. We were gone but fortunately in Livingston, Cressy and
    Cortez, we were very active in cooperatives. Livingston had its first selling cooperative started in 1915. When 9066 was
    signed, there was a curfew and they said you can't go more than five miles. But Livingston is about five miles from Cressy,
    and Cortez was about four miles; it was about four miles from each side. So they got together and decided that they would
    form a trusteeship. They hired a gentleman who worked for Bank of America for many years and he ran the trusteeship and
    so all the land that was in the cooperatives was protected during the war years. They leased it out to other people and
    they had a couple of two or three friendly men that were the trustees and there was a manager who was hired to operate
    all this. And he ran it and did very well. There was a very trusted secretary that was part of the co-op before the war
    and she watched it carefully and made sure that everything was okay. And everyone got their land back, we all had our
    property back. And actually, the manager of the trusteeship came to the camp several times during the war years to report
    on what he was doing.
- speaker: Interviewer
  text: All the way to Colorado?
- speaker: Respondent
  text: All the way to Colorado, yep. So that worked out very well. Some ranches weren't kept up too well, others were kept
    up quite well. But the mortgages that had to be paid were paid, and the taxes were paid so nobody lost their land. It
    was very well thought-out and worked out very well in Livingston, Cortez and Cressy.
- speaker: Interviewer
  text: Because of that, was your father and your family more relaxed when they went into camp?
- speaker: Respondent
  text: They didn't know how it was going to work out, basically. They hoped it would work out well, I'm sure. But at least
    something was done to all the farms, as opposed to individual farmers trying to do what they could. So that worked out
    very well. But my father had a little out with the cooperative before the war.
- speaker: Interviewer
  text: So he wasn't a part of the co-op?
- speaker: Respondent
  text: No. But we found a teacher at the high school and we didn't know he was a Mormon, a Latter Day Saint. And we asked
    him to run our ranch for us and he did a good job and put money in the bank for us. So we were very fortunate and had
    all our land back.
- speaker: Interviewer
  text: When they came to recruit in the camp, the first group that came in was to recruit was for the 442. And a lot of my
    friends went into the 442nd Regiment. And they came in just shortly thereafter looking for people for MIS, Military Intelligence
    Service. They started that school in the Presidio in San Francisco, and before the war. I think in October of 1941, the
    school was started and it became the head of the language part was John Aiso, he became a Lieutenant Colonel in the end.
    Soon as the Japanese people moved, they had to do something. So they moved the camp to Camp Savage in Minnesota. When
    I enlisted in November of 1943, I was sent to Camp Savage to learn the language.
- speaker: Interviewer
  text: When the loyalty questionnaire came out, how did your family answer?
- speaker: Respondent
  text: I think my family all answered yes. I'm not sure what my father did, because they were Isseis. If they answered yes,
    especially on the second question, they wouldn't have a country, since they couldn't become citizens. I'm not sure how
    he answered. But I did talk to my father before I went into the service and he said, "This is your country. If that's
    what you want to do you just go ahead." So he accepted my going into the service.
- speaker: Interviewer
  text: Were your parents ever worried for you going into the military?
- speaker: Respondent
  text: I have no idea how they felt about it, really.
- speaker: Interviewer
  text: So you had friends that were also going to the MIS?
- speaker: Respondent
  text: Most of my MIS friends. The draft was cut off when 9066 happened, there was no longer a draft for the Japanese. And
    it didn't come back until January of 1944. So I volunteered before the draft was started. After the draft was started,
    there were quite a number of people who went to MIS language school in '45 and '46, and of course the war was over in
    '45. So there were friends of mine that went to language school but I'm not sure how much they learned or anything, I
    was gone by then.
- speaker: Interviewer
  text: Can you describe your training for this intensive Japanese school?
- speaker: Respondent
  text: That was the toughest school I ever went to--it was tough. We had to learn a set number of Kanjis, in a certain period
    of time. Now the Hawaiian kids had no problem really because they learned a lot of Japanese in Hawai'i. So most of my
    friends were Hawaiian kids but those of us from the states and didn't have much Japanese, we studied with flashlights,
    in the bathroom after lights went out. Oh yeah, we did a lot of that.
- speaker: Interviewer
  text: Was Kanji the hardest part for you?
- speaker: Respondent
  text: Oh yeah. It was very difficult.
- speaker: Interviewer
  text: And who were the teachers?
- speaker: Respondent
  text: The teachers were almost all Kibeis who had gone to Japan and were educated. This John Aiso, who became the head of
    the language school, was really a well-educated man. He had gone back to Japan, went to college, learned Japanese, and
    also went to college here. They found his record and got him. They had to convince him to stay in the service because
    he was almost out of the service, I think he was well in his late 20s. So they convinced him to stay and become the head
    of the language school. He became a judge later after the war.
- speaker: Interviewer
  text: After you were in training, you were aware that it was leading up to the occupation of Japan?
- speaker: Respondent
  text: Yes, we expected that all along. The first thing was we got shipped out of San Francisco in July of 1945 and we were
    sent to the Philippines. They had ATIS--Allied Translation and Interpreter Section--part of the U.S. army and we were
    stationed close to Manila. We were there about the end of July and of course the atom bomb was dropped in the middle of
    August. So in September they sent us right into Japan as part of ATIS.
- speaker: Interviewer
  text: What were some of your memories of being there?
- speaker: Respondent
  text: Well, one of the most vivid memories I have of it is when we went by ship to Yokohama, and it's about 20 miles from
    Tokyo. They had some of the big government buildings still standing there in Tokyo. We were stationed in the NYK (Nippon
    Yusen Kaisha) building. That trip from Yokohama to Tokyo was by train. And for 20 miles it was all black, all burnt out.
    It was incredible. I think actually the death toll in Tokyo was worse than in Hiroshima because of the incendiary. Everything
    in Japan was made out of paper and wood so everything burnt up like paper. They say it was so bad that there was just
    no oxygen and people died from a lack of oxygen. It was so severe, the fires that they had.
- speaker: Interviewer
  text: A lot of MIS veterans remember the children wandering around, looking for food. Do you remember seeing a lot of kids?
- speaker: Respondent
  text: Yes I remember that, I remember those kids. They used to go into the subway at nighttime because it was so cold. We
    went into the first winter there in Tokyo. There were a lot of homeless kids, small kids, just running around looking
    for whatever they could find. It was pretty sad. Interestingly, us Nisei, we looked just like the Japanese people but
    we were wearing American uniforms. And so they treated us really well. We got to be friendly with quite a few of them.
- speaker: Interviewer
  text: Did you ever get a sense if they were grateful for you being there?
- speaker: Respondent
  text: Well I don't know if they were grateful for our being there [laughs]. We beat them. They were vanquished. They accepted
    those of us who could speak their language quite well. And we visited quite a few people who we got to know over there.
- speaker: Interviewer
  text: Your services were required to translate Japanese military documents?
- speaker: Respondent
  text: Yeah, all military stuff. There were code books and things that we translated. I don't know how much I translated,
    I don't think very much, I just didn't have that much Japanese background.
- speaker: Interviewer
  text: Were you part of any interrogations?
- speaker: Respondent
  text: I was assigned to a British major. I was in the General Headquarters building, which was the Daiichi building, where
    General MacArthur was. That thing was only about six stories high. I was stationed on the bottom floor, interpreting for
    this British major. We went to the prison there and saw quite a few of the prisoners. I had to interpret for this British
    Major who was looking into the Black Dragon Society. That was a famous sort of a secretive society in Japan before the
    war. I'm not sure if it had military people but this guy was a civilian that we went to interview, he was the head of
    it. They offered us tea, the British Major wouldn't drink it, he was so scared he was going to get poisoned. I had no
    problem drinking the tea. [laughs]
- speaker: Interviewer
  text: How would you characterize your experience in Japan? Was it upsetting to see what the military did or did you just
    feel like you had a job to do?
- speaker: Respondent
  text: I think I just really felt like I had a job to do and if we had some translating or interpreting we did that. Nothing
    profound, I'm sure. We just enjoyed our stay in Japan. Right before I left Japan, I got a leave and went to visit my relatives
    in Wakayama in 1946. Of course I had never met any of them. And my father, he came in 1903, but he never came back to
    Japan even once. Apparently he just didn't care to go. But I went to visit them, and I just felt like I went home.
- speaker: Interviewer
  text: They welcomed you.
- speaker: Respondent
  text: Yeah, they did. They were very poor, everybody was very poor in Japan. There was nothing there, you know. When we
