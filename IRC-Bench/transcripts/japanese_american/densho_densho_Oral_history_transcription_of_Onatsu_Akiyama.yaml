collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What was your mother like?
- speaker: Respondent
  text: She was a very able woman. She was able to do anything that a man could do. For example, she was able to climb up
    on the roof and nail down singles. The only thing she couldn't do was to write. My father was able to do that. He was
    a tax collector in the village and had a right to vote.
- speaker: Respondent
  text: Even though my mother was not able to write, she did everything else. So my nephews were also able people, too. My
    husband used to say, "Mama, you aren't worse a little finger of your mother?"
- speaker: Respondent
  text: One of my nephews went to Korea to teach Kendo. At that time my mother went alone with him. She stayed with him for
    3 years. She went alone because he didn't have a wife yet. While she was in Korea, she went around and taught farmers
    how to make "mino" and "Mushiro" in the nearby villages. When I visited her, she showed me a newspaper article about her.
    It described about 60 years old woman serving Korean villages. They used to dry red beans on the bridges, and pebbles
    got into the beans.
- speaker: Respondent
  text: When I brought "azuki" (red beans) the sand used to be mixed in it, so my mother taught them how to make Mushiro so
    that they could dry beans on the mushiro. After that there were no more sand and pebbles mixed in red beans.
- speaker: Respondent
  text: She was really an able person. She taught them how to make 'Goza', 'Mino', 'Mushiro' and 'Waraji' and others.
- speaker: Respondent
  text: Her activities were written up on a newspaper, so I know she was a really able person. She died at the age of 91.
    She was a very healthy person. I went back to Japan after the war and then came back here 13 years afterwards. So I think
    I'll live to be an old age.
- speaker: Interviewer
  text: What else do you remember about your mother?
- speaker: Respondent
  text: She was a diligent person. She was a very kind person, too. When a beggar came around, she used to feed them. I was
    really impressed by her. You see, I am only daughter, though I had an older brother and a younger brother. My older brother
    got married. So my sister-in-law used to go out early in the morning to gather up grass for horses. We also had some farming
    to do to feed ourselves. My brother used to tell me to get up because his wife would come home soon from early morning
    work. He used to pull "Futon" away from me. I was such a wee little girl. However, when I came to America, I really regretted
    the fact that I was such a spoiled girl, because I really had a rough time making adjustment.
- speaker: Interviewer
  text: Was your mother very strict?
- speaker: Respondent
  text: Yes, she was. I learned how to sew for 6 years. So I had to go shopping fabric, thread, buttons and the rest. There
    was only 5 cho (5 blocks) to the store. So she knew exactly how long it would take for me to walk. When I got delayed,
    she would already be on her way to look for me. She was very short tempered. However, I used to go to see shows often.
    My older brother was a very kind person. He took me to the shows and also came to pick me up, too.
- speaker: Interviewer
  text: Who scolded you? Your mother or father?
- speaker: Respondent
  text: I never was scolded by my father. He used to drink Sake a little every night. My father invited me to drink with him,
    just one sakazuki though, now and then. So I learned to like drink Sake. I also like to drink wine, beer, or other drinks,
    a little bit at a time.
- speaker: Interviewer
  text: How did you like school?
- speaker: Respondent
  text: Yes, I went up to "Khoto Ka" (2 years after elementary school). You see in order to go to Middle School, we had to
    take an entrance examination. However, I felt that it would be shame if I didn't pass, so instead, I asked my parents
    to send me to sewing school. I went to that school over a year. So I worked as a dressmaker and I felt that I didn't have
    to get married, because I heard that it would be very tough if I were married.
- speaker: Respondent
  text: So I used to tell my parents that I didn't want to get married. I accumulated a lot of money from my work. So I was
    single until I was 21 years old. In my home town girls used to get married when they were 16 and 17 years old. However,
    because I didn't get married until I was 21, people used to say, "Tokosa Mise's girl is a 'tomtoy'" They used to call
    our store, "Yokosa Mise". They used to laugh at me.
- speaker: Interviewer
  text: What did you do to play when you were in elementary school?
- speaker: Respondent
  text: I don't remember well, but I was a very spoiled girl, and was very sickly. So my older brother used to bring me back
    from school on his back when it snowed or rained. It used to snow up to my knee. When I got back, they had a hot water
    ready in a wash tub and soaked my feet.
- speaker: Respondent
  text: My brother was a very gentle brother. I also had a younger brother. He was a huge man, over 250 lb., just like my
    third son.
- speaker: Interviewer
  text: Did you like school very much?
- speaker: Respondent
  text: Yes, I did. I wasn't that good in history because I didn't have that much of memory, however, I was very good at "Soroban".
    I used to stand in front of the class and call out numbers for addition as I also did it on my soroban. It was my best
    subject. I can do it still. When I go to stores, I can calculate a lot faster than they do on machines.
- speaker: Respondent
  text: I sure didn't have much memory. However, I got A+ on my drawing and chat currency. My older brother was also very
    good at it. He was asked to write words on grave stones. He was that good. My younger brother was also very good at it,
    too. He is over 80 years old now. He still writes to me with a very neat handwriting.
- speaker: Interviewer
  text: What was the most memorable event in your childhood?
- speaker: Respondent
  text: I suppose it would be that everybody took care of me very well. I might even be spoiled because of that. I was also
    well liked by my teachers, too. I used to go over to her (my teacher) house and ate dinner and slept there. These things
    would be the ones which I remember the most.
- speaker: Interviewer
  text: How about your friends?
- speaker: Respondent
  text: Yes, I still have friends from this period. Masayo san, for example, lived very close to us. So we were constantly
    visiting one another. She was a very earnest person and she still is. I went back to visit my home town about 13 years
    ago and met with my old friends. It was such a wonderful experience.
- speaker: Interviewer
  text: Then you graduated from 8th grade.
- speaker: Respondent
  text: Yes, I did. I think my husband did the same. I think it was from my time that elementary school became 6 years. After
    that I attended Kotoka (school after elementary school). I was not good at running. I still have a bad leg. When I was
    small, my mother used to take me to visit shrines. However, I was so tired that I wouldn't move. I would sit down and
    asked my mother to hire "Rickshaw". I was such a spoiled girl. However, when I came to America I had to learn a lot, because
    Papa (my husband) was having a very rough time. He used to tell me, "You, look very good, having big bones like that of
    a man, but you can't do a thing!!" A human being must be disciplined, polished and trained wherever he is through sickness,
    poverty, pain, suffering and hardship, and then for the first time he can become a part of human race. So you can say
    that going smooth looks good, but it's not so good from this point of view of becoming a real human being.
- speaker: Interviewer
  text: You said that you were a dressmaker for 6 years.
- speaker: Respondent
  text: Yes, I was. You see I was taught how to sew by my mother. I used to charge 15 sen for sewing a pant and shirt. I used
    to keep a book and at the end of the month I would add them up and I would give a half to my mother and keep the other
    half for myself and saved it in a bank. During that 6 years I accumulated a little over 800 Yen. It's a big money, isn't
    it. It's the money I saved after buying thread and everything I needed for my business.
- speaker: Respondent
  text: Well, when I got married, we left home town and went to Yokohama. I didn't know that my husband didn't have much money.
    We left home early, 9 days ahead of time, because my mother kept saying to me that I didn't have to go to America to get
    married. She could have found a good husband in Japan, near home town. Well, we left home early and stayed in an inn in
    Yokohama. However, my husband didn't go out into the town. Instead, he slept all day. He pretended that he was drunk and
    sleepy with Whisky, I think it was Whisky when I come to think or so.
- speaker: Respondent
  text: Actually he didn't have enough money to take me out. I must have been very difficult for him. You see, I came here
    with the idea of staying only 3 years. In case we failed here, then we could open a store to sell school materials such
    as pencils, papers and others. That's what I was thinking. However, I could not come home in 3 years, nor in 5 years.
    I was able to visit home on the 9th year.
- speaker: Interviewer
  text: Just a minute, please. When you were a dressmaker what kind of dress did you make?
- speaker: Respondent
  text: You remember seeing a man who pulls "Rickshaw"? I used garments like that. It had pants which looked like horseback
    riding pants, and various kind of shirts, similar to what we have now. So I must have made at least 6 pairs like that
    a day. Of course I charged 25 sen for those which needed more time and more difficult stitches. It's a long time ago,
    60 years ago that I did all these things.
- speaker: Respondent
  text: Well, you see, it's very interesting. This is the money that nobody knew about. I went to a bank at a time when no
    one was around, so none of my family knew about it. There was a very honest man in the village by the name of Mr. Kakuichi
    Harada. When I left the village I asked him to hold that money for me saying that I would be back in three years.
- speaker: Respondent
  text: When I visited Japan after 9 years, my father cried and said, "I'm very sorry. I've done something wrong." So I said,
    "I don't know what you are talking about, unless you tell me." Then he said, "When Toichi (the oldest brother) failed
    in business, Mr. Harada told me that he held 800 yen for you. He could not keep it secret any more because we were having
    such a difficult time."
- speaker: Respondent
  text: So I said, "Please don't feel so bad. It was the money I earned before I married into Akiyama family. And I'm glad
    that it helped you." Then he said, "Thank you for your understanding and concern." My husband's father had a stroke a
    year after that, so I also helped him to come back, too.
- speaker: Respondent
  text: We were very poor at that time when Papa borrowed some money from his friend and sent me home. I took 50 days vacation.
    When I came back for the 2nd time, I didn't go out at all (for sight seeing or even entertainment). Instead, I made contributions
    to village school, improved family grave site (we had 2 of them), and also made a contribution to many places including
    building of a strong wall to prevent mud sliding behind the shrine in the village. I contributed all over the place in
    Akiyama's name. You see, I knew my father-in-law wasn't able to live long with his condition. So, I also made a "Rekidai
    Bako" (a large grave with a large room to store bones of many generations) for the Akiyama family. I think it cost me
    20,000 yen at that time.
- speaker: Respondent
  text: They said that there were other brothers there and the cost should be shared by them all. However, I said that they
    were going to take care of my father-in-law and also take care of the grave, too. I wasn't able to do that because I was
    coming back to America. My father-in-law said that I should do something for my own village, school or something. I spent
    all the money I had for the memorial of Akiyama family. However, I did not leave the house at all, for 50 days. They were
    really happy about that.
- speaker: Respondent
  text: I also contributed something for the village fire station, too.
- speaker: Respondent
  text: When we went back to Japan after the war, we were very poor and couldn't do anything for the village. So we should
    contribute to the community when we can. I was very happy that I was able to do something for other people.
- speaker: Respondent
  text: When I think about our life, I regret that I did not keep a diary of our life.
- speaker: Interviewer
  text: What was the circumstance which you and Mr. Akiyama got married?
- speaker: Respondent
  text: Well, it's very interesting. You see I was an old maid, being single at the age of 21. There were 22 stores like ours
    in the village. So I felt that there was no future for our business. So that's why I went to Kobe and learned how to make
    Men's garments for 9 months. That's when I was 18 years old. I went there because my aunt was there. When I went there
    for the first time my mother came to take me home, because I hadn't had my parents permission.
- speaker: Respondent
  text: My aunt asked me why I didn't get my parents permission. So I said, "If I didn't leave home now, my older brother
    would leave home to go to army. Then I surely have to stay home." Well, then they promised me that when my older brother
    came home from the Army, then I could come to Kobe. My aunt became my witness to this. My brother came back in 2 years.
    So I was able to go to Kobe again.
- speaker: Respondent
  text: In Kobe, about 9 months after I arrived, a palmist took a look at my palm. He said, "OH, this is very strange. You
    should have left Japan for foreign country a long time ago." He also said that I had rejected many offers for marriage
    in the past. It seemed as if this man knew everything about my past. He said, "There is one more proposal left. If you
    reject this one, then you will not have another opportunity at all."
- speaker: Respondent
  text: It was in September when this happened. It's interesting isn't it. I returned to my home in November and in the first
    of December my husband to be came back from America. He came to see me with a go-between. This go-between came over and
    said that Mr. Akiyama came back to Japan all of sudden. He was very much interested in bringing us together for "Omiai"
    (looking over for prospective spouse).
- speaker: Respondent
  text: I was hearing this conversation from the store. You see, we had a fairly comfortable life and marriage proposals were
    coming to us from very well to do families. As you know, family life in those well-to-do families were very rigid and
    felt very stifling. On the other hand I was raised as a spoiled girl and didn't know too much about rigid family style,
    so going to America was very attractive, because I felt that I could be free of such family rigidity.
- speaker: Respondent
  text: You know, it's funny, usually I didn't work with "Tofu" but I was so interested in the discussion that I pretended
    that I was working with "Tofu", because I could hear their conversation from there very well. I heard the go-between saying,
    "Then, I'll come to see you tonight. I'll bring the man over."
- speaker: Respondent
  text: They said that this man was a big man. My younger brother said, "You want to marry him? even if he was a giant, ha?"
    I was very shy talking about him with my brother. When he came over, he was indeed a huge man. He had to lower his head
    to come through the door. Then we went upstairs to "Omiai". I was very fat and when I got to the upstairs, I was out of
    breath. They, of course, did not eat beef at that time. They felt that cows were farmers' treasures, because they did
    the works for them. So we did not eat meat, consequently I was very fat.
- speaker: Respondent
  text: Well, we cooked meal outside and brought them back into the house. I was 21 and he was already 27. I wanted to come
    to America very badly. So I tried to let him know that I was interested in him. So as I was pouring tea for him I touched
    his knee, hoping that he would get my message.
- speaker: Respondent
  text: Well, I didn't know how he felt about it.
