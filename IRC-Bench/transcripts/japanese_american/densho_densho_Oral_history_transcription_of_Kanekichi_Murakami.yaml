collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: Incident to recall. Even though I was young, I prayed for victory. World War I; 1914, I was in America. I was working
    at Highland Inn, near Monterey. Although I could not do anything to help America, I brought victory bonds to show my thanks
    to America. As to Manchurian event, I was too far away - I have no particular impressions.
- speaker: Respondent
  text: When I left Japan to come to America, I was only 18 years of age so I don't have any recollection of any events as
    sad or joyful. During Kanto Daishinsai it was such a national disaster that Japanese in America got together and contributed
    money and merchandise to send to Japan. So, I too helped as much as I could.
- speaker: Respondent
  text: Our family religion was Buddhist - Zen Shu. I didn't hear any rumor about Christianity but one young Japanese man
    was involved in a movement to go to America, and he said that if you become Christian it will be easier to enter America.
- speaker: Respondent
  text: At the time I left Japan, my family condition was not ideal and they could not live up to the standard. Even in Japan,
    there were not enough jobs for everyone so socially, it was not ideal.
- speaker: Respondent
  text: In Japan, I graduated grammar school - 6 years. I studied for two years in a trade school.
- speaker: Respondent
  text: While in Japan I didn't have any idea of what I was going to do but if I went to a rich and wealthy country like America,
    I could open a future for myself.
- speaker: Respondent
  text: I didn't come directly to Hawaii but went to Mexico first. In order to gain entrance into America, I made every effort
    to obtain clearance but was unsuccessful. At that time, Mexican tourist bureau was advertising for tourists so I applied
    and was admitted as a free immigrant into Mexico, not as a contract immigrant.
- speaker: Respondent
  text: The boat was a very old 4-ton freighter. Not being a regular passenger ship, the freighter was converted into one
    suitable of carrying 800 immigrants with beds. We took 30 days sailing across the Pacific Ocean. Sometimes due to engine
    trouble, the freighter stopped in the middle of the ocean for repairs. Rumors began to fly saying that we could not make
    it to Mexico and that we would have to turn back to Japan. However, after 30 days later we finally landed in the southern
    end of Mexico, Salina Cruz harbor.
- speaker: Respondent
  text: As I mentioned before, it was an old freighter and due to long voyage, food and water ran out, especially water was
    very scarce. Because all kinds of people were on the ship, there was gambling every day and every night, and some people
    lost their pocket money. I went to see the gambling couple of times but fortunately I did not go to the point where I
    lost money, and arrived safely. At any rate, not being a regular passenger ship, we encountered many inconveniences and
    I was very happy when I landed in Mexico.
- speaker: Respondent
  text: Before I set my foot on American soil, I was in Mexico until October trying to get permission to enter America. I
    went to the American immigration office and met a Japanese, Mr. Hasegawa, working as an interpreter. He advised me to
    enter the States as a student so I decided to do so. At that time my father was living in Idaho, so without much trouble,
    and through Mr. Hasegawa's efforts, it was arranged to have me admitted to America as a student.
- speaker: Respondent
  text: As I mentioned, I passed immigration and was able to enter United States as a student. I stayed two months in El Paso,
    Texas, waiting for my father, who was in Idaho, to send me money since I had no money. My father mailed me train ticket
    and I came to Idaho, where I lived for a while without worrying about living expenses. At first I lived in Boise, Idaho,
    then I moved to Nampa, a new electric railroad was being built, so I applied for work as a helper.
- speaker: Respondent
  text: I have no particular recollection but the immigration officers at El Paso, Texas, immigration office treated me with
    kindness and there I received my passport to enter United States.
- speaker: Respondent
  text: I thought my American friends were very kind to me. Although I have no deep impression, I have no complaints.
- speaker: Respondent
  text: Since I came to America I have no particular memories concerning any special sad events, nor suffering or joy. At
    first I went to a Japanese camp and there every Sunday I had to launder lots of clothes for the men in camp. This to me
    was very hard.
- speaker: Respondent
  text: When I settled in America it was after World War I. I felt lonely being alone. There are many inconveniences and in
    order to get my better half I began corresponding with family regarding my marriage. I decided to get married to my acquaintance
    and it was to be a picture bride wedding.
- speaker: Respondent
  text: After all arrangements were made, my new wife came to America in April 1915. She was sent to Angel Island because
    she had intestinal worms. She was in the hospital two weeks and I went every day to see her.
- speaker: Respondent
  text: At that time there were many picture bride weddings and the wedding ceremonies were performed at either Bukkyo Kai
    and by Christian ministers. I was baptized already and was a member of the San Francisco Presbyterian Church. Rev Kohachiro
    Miyazaki performed a mass wedding in the office of the Japanese Association. I was one of them.
- speaker: Respondent
  text: I was homesick for Japan and thought of Japan and thought of my family and relatives. Even after my marriage, I thought
    of Japan and always felt lonesome for Japan.
- speaker: Respondent
  text: I did not have any trouble getting used to American way of life.
- speaker: Respondent
  text: Since I was working for a family, I did not experience any discrimination. As a group there was discrimination, but
    as an individual, I experienced no discrimination.
- speaker: Respondent
  text: I did not go to any formal school, but during spare times, for example, during winter when there is no work, I attended
    night school and learned English little by little.
- speaker: Respondent
  text: For several years I lived in the country. I received only ten cents an hour - that's about all they gave me. There
    was not much work during winter, but somehow we managed to earn enough for food. In summer we worked so we were able to
    meet our expenses.
- speaker: Respondent
  text: My present house, I bought in 1950 for $8,500. I had no problem in purchasing the house but we spent two or three
    years looking for a suitable house to buy. There were many houses to buy but because of financial condition, we had to
    stay within our limited amount of money, so we spent two or three years looking for a good house yet within our financial
    limits.
- speaker: Respondent
  text: We did not receive any financial help from our children but when we moved they helped us move and gave us moral support.
    I did not receive any help from any groups, either.
- speaker: Respondent
  text: I don't have any particular hobby, so I haven't paid any particular attention to that phase.
- speaker: Respondent
  text: To see my children grow up day by day, that in itself was my great joy, but it was regretful that in many instances
    I could not do as much as I would have liked to have done because of our limited financial condition.
- speaker: Respondent
  text: Because the children are mine, I wanted to raise them myself in spite of any hardships I may encounter. I think it
    is a wrong idea to entrust the rearing of your own children to someone else.
- speaker: Respondent
  text: I did not make any contribution to the World War I but I did my best.
- speaker: Respondent
  text: I have no comments regarding segregated schools.
- speaker: Respondent
  text: I became a Christian in 1914. I lived in an apartment with some businessmen whose main objective was to make money
    and were involved in unscrupulous exploits. After I witnessed this, I resolved to move out. There was a Presbyterian youth
    group nearby so I moved and lived with them and resolved to enter the Christian faith.
- speaker: Respondent
  text: During depression days, I was working in a Caucasian family. When my employer was in Japan, the stock market crashed.
    Banks were barely able to pay pocket money and finally they couldn't even pay the interest to the depositors. To us, laborers,
    there was no special impact and we did not lose any money in the banks. Although the whole country felt the depression,
    we experienced no suffering.
- speaker: Respondent
  text: Before marriage, in 1914 I resolved to become a permanent resident.
- speaker: Respondent
  text: On a person to person basis, there were no special ill feelings toward us but between country and country basis, I
    felt there was hostile feeling though they didn't express it in words.
- speaker: Respondent
  text: I heard about the attack over the radio and was shocked and wondered why it happened and what will become of it and
    I was worried.
- speaker: Respondent
  text: The newspapers even before the evacuation notice was announced, I read and heard rumors. I learned about the evacuation
    date from the Japanese Association.
- speaker: Respondent
  text: I was sad because we had to leave the familiar places and relocate to an unknown area. And also we could take only
    our own personal belongings and when I thought of these things I was very saddened.
- speaker: Respondent
  text: Besides my personal belongings, I owned a small variety store and I didn't even have time to dispose of it. I was
    very busy. At any rate, I sold as much merchandise as I can cheaply and what I could not sell, I decided to take with
    me as much as I can. We and the members of our church borrowed the church building to store our belongings there.
- speaker: Respondent
  text: My employer and friends were very sympathetic and offered to help us and to store our belongings at their places.
    However, we had the church building so we stored everything we could not take with us there.
- speaker: Respondent
  text: My oldest daughter, 22 years old; oldest son, 18 years old; my next son, 16 years old; and my youngest daughter, 13
    years old.
- speaker: Respondent
  text: The Caucasian Congregational Church in Berkeley were very good to us. All the evacuees assembled in front of this
    church and from there we were transported to Tanforan. I was deeply impressed and was thankful to the Caucasian church
    for showing such good will.
- speaker: Respondent
  text: First, we were taken to Tanforan Assembly Center. When we arrived there it was not completed and we experienced many
    inconveniences. We heard many rumors so we were constantly in a state of anxiety. Then we were moved to Topaz in Utah.
    There our biggest trouble and annoyance was dust. When we left in the morning and came back at night, the barrack was
    full of dust. We were at our wit's end. But as we adjusted our life to camp ways, we were comforted by various activities
    and as we look back, I even feel nostalgia toward the camp life.
- speaker: Respondent
  text: Nearly 10,000 Japanese were in the camp, each with his own feelings, thinkings and ideals and many stories were spread
    by rumors. Some wandered to the restricted area and were shot by the sentry. Also within camp, there were troubles between
    individuals but as a whole there weren't too much trouble.
- speaker: Respondent
  text: There were many Japanese there so naturally the question of loyalty came up. Niseis naturally should be loyal to America.
    Many Japanese nationals affirmed their loyalty to Japan. As for myself, living in America and being taken care of by America,
    my being loyal to America is in some way also means being loyal to Japan. So when it comes to the question of loyalty,
    I cannot say that I will not be loyal to America.
- speaker: Respondent
  text: I have no complaint as to the fact that America treated us as enemies, but as an individual, I do not have good feelings
    about being placed in a concentration camp.
- speaker: Respondent
  text: I think Niseis as citizens of America should volunteer and become soldiers.
- speaker: Respondent
  text: Since there were all kinds of Japanese assembled in camp, each having his own unique talent, art and interest, it
    was interesting and enjoyable when they were all brought together for entertainment or shows.
- speaker: Respondent
  text: I worked in camp as chief cook for the administration staff - of 80 Americans.
- speaker: Respondent
  text: Due to the nature of my work, I could not attend church on Sundays very much but I am thankful that I have tasted
    Christian church life in camp.
- speaker: Respondent
  text: My eldest son went to our church affiliated junior college near Rochester, New York - Chaseville School. He left after
    staying in camp two or three weeks.
- speaker: Respondent
  text: My youngest son and daughter attended Topaz High School.
- speaker: Respondent
  text: I don't have any special impressions about relocation center. Some people lead camp life from one to three years and
    to each individual it is different. As for me having led camp life should have been of some value but there was nothing
    specially meaningful.
- speaker: Respondent
  text: My faith did not change much. It was same as usual but because of my work I did not go to church often so I think
    my faith diminished a little.
- speaker: Respondent
  text: After camp early, I went to camp in 1942 and toward the end of May, I moved to Salt Lake City. It is no good to stay
    long in a camp too long, so if I had a chance I wanted to go outside and find a job for the future.
- speaker: Respondent
  text: My son and daughter left camp after staying about a month, my daughter was in Salt Lake City about the time I decided
    to leave so I went to Salt Lake City.
- speaker: Respondent
  text: The chief steward, with whom I worked while I was in camp, found a job for me in Salt Lake City so I left camp. I
    found a job before I left camp so I did not have any trouble. One thing that bothered me was that my sleeping quarters
    was so unsanitary.
- speaker: Respondent
  text: I don't have any American church so I have no particular comment.
- speaker: Respondent
  text: I attended the Salt Lake City church which was already in existence so in that respect, I did not have any trouble.
- speaker: Respondent
  text: Our association with Caucasians was not very wide, so I have no comment.
- speaker: Respondent
  text: Our children were grown up and finished their normal education so I have no comment.
- speaker: Respondent
  text: In order to find a house I contacted many Japanese real estates but they could not find a house that I liked so I
    let it go for a while. Later through an American real estate I was able to find a house that satisfied me and that is
    where we are still living.
- speaker: Respondent
  text: After relocation there was no particular experience that I could say was difficult.
- speaker: Respondent
  text: As a Christian, I pray that since we are in our twilight years that our growing Nisei, Sansei, and Yonsei will faithfully
    work for the kingdom of God - each individual to give his best and pray for this country.
