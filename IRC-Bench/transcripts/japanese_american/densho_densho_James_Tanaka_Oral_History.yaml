collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What was your childhood like before the war?
- speaker: Respondent
  text: I grew up in Portland. I attended Elliot Elementary school until the third grade. We roller skated on clamp on skates.
    We built a club house using the wooden crates from the glass company. I went to the library and checked out books to read.
    We went down to the Willamette River and threw rocks into it. So most of the Japanese Americans lived on the west side
    of the Willamette so the neighborhood I grew up in didn't have a lot of Japanese people in it except my family and my
    great uncle and aunt and their three sons. They ran the small mom and pop grocery store there and they competed with the
    Safeway one block away and they were able to make a go of it because they did two things that Safeway did not do. They
    extended credit to most of their patrons which were African American because we were mixed and a lot of African Americans
    were living in that section of Portland. And they also prepared the food that they ate, so one of the sons would go down
    to the produce market in the morning and pick up fresh mustard greens, turnip greens, collard greens and they would trim
    it and put it all out so people could just buy it, and wash it and cook it. And eventually the main meat that went with
    it was salt pork. And on Sunday morning they would sell lots of chicken. So they would buy chickens by the crate and the
    other son would quarter the chickens and that was their fancy meal for the week.
- speaker: Interviewer
  text: So they really had a good business set up.
- speaker: Respondent
  text: Yeah. And then after the war I ended up being there for a year while my dad came down to LA to get trained in machine
    work. He didn't have any real formal training with all the different machines.
- speaker: Interviewer
  text: How did your family end up in that area of Portland?
- speaker: Respondent
  text: Because of the great uncle and aunt living in that side of the area. Their house was about two houses down from the
    store. All four of my grandparents died before I was born and they were in Hawaii, and so my parents left around the early
    '30s and went to Portland. I ended up being born there so I didn't grow up with Japanese kids, or Japanese grandparents
    and I'm Sansei. There weren't a lot of us in that time frame. A lot of the Niseis were born in the '20s. And a lot of
    the Sanseis were born in the '40s. Culturally growing up in eastern Portland, I was an all-American kid.
- speaker: Interviewer
  text: Did you have any siblings?
- speaker: Respondent
  text: Only after I was very old. My mom passed away in '48 and then later my dad remarried so that lady could stay in America
    as a Japanese national and got an annulment, so I have a half sister in the Seattle area. And later, when my son was born
    in the '60s, my dad remarried and so that lady could stay here in America as a Japanese national, he married her just
    so she could get her green card. So my half brother is as old as my eldest son.
- speaker: Interviewer
  text: That's an interesting family dynamic.
- speaker: Respondent
  text: My grandfather left a small island that was in the Southeastern inland sea in the early 1900s and he went to Hawaii.
    That's because they had that two year drought in Japan so they couldn't pay their taxes or landlords. So they lost their
    tiny farm. In digging I found out the average farm in Japan was 2.1 acres. In Hiroshima prefecture it was 1.9 acres. I
    was pursuing Discover Nikkei and I found out that in Japan once you paid your rent and your taxes, any profit above that
    was all yours. So that's when they took marginal land around them, expanded their farms, produced more money and that
    was in their pocket. So when they came to the U.S. they had the opportunity to lease land, which was always the poor farm
    land but because they knew how to make it fertile and productive in Japan, they just transferred the techniques here,
    and they ended up making lots of money.
- speaker: Interviewer
  text: I found another article from 1917, that said the average California farm had $42 of profit per acre and so if you
    had 100 or 200 acres in one harvest, the Japanese controlled 90% of the asparagus and strawberries, and those crops had
    multiple harvests during the growing season. I remember last year I was still getting strawberries from Watsonville and
    Salinas in August, so the growing season is extra long. So they didn't make the same amount-and their farms were under
    125 acres - they made not double, but $141 an acre. And other farmers were envious, saying they got the best land which
    they did not get. And the government was concerned when the Japanese were being excluded and evacuated, they ended up
    saying, 'Can you take over their farm and produce the same amount of food?' And the other farmers' corporations who took
    them over said, "No problem." But they couldn't because they didn't have the farming technique, and the wife wasn't working
    in the field. [laughs] I read a statement once working where a farmer said, "I can't compete with the Japanese farmer!
    He's got his wife working in the field with him. So those women were really hard workers because they did everything in
    the house and worked in the field, also.
- speaker: Interviewer
  text: So you came from this farming family but they also owned a store.
- speaker: Respondent
  text: My grandfather when he was in Japan was not only raising satsuma tangerine oranges but he also was a blacksmith so
    that sort of led down to the kids learning the blacksmith trade. So they learned how to work with metal. My great Uncle
    and Aunt and sons started their grocery store and after my dad and mom moved from Hawaii to Portland. They tried their
    hand in running a grocery store, but failed.
- speaker: Interviewer
  text: I was seven when they opened the Portland Assembly Center, which was the exposition stockyard. They opened that May
    3rd, I went in May 5th until September 4th. And then took a two day train ride to South Central Idaho, Minidoka Relocation
    Center. But I don't remember having to pull the shades down.
- speaker: Interviewer
  text: You were one of the few Japanese families in your town. Was there any sense of discrimination especially when Pearl
    Harbor happened?
- speaker: Respondent
  text: No I had friends, and I had African American friends. Going to public school, I remember the name, Elliot Elementary.
    I don't remember having any problems.
- speaker: Interviewer
  text: So people in your community were pretty sympathetic to your family when you had to leave.
- speaker: Respondent
  text: That part I have no recollection. I don't even remember getting on a bus and going to the assembly center, I have
    little tidbits after I got there in terms of our room conditions, which was like an office type cube. The walls only provided
    privacy, since they did not reach the ceiling, and a cloth door. No privacy in the rest room, and the fact that there
    was a fence with barbed wire and a guard tower. And the guard tower had a heavy duty machine gun. It was pointing down,
    of course no one was standing directly behind it but it looked in. Later as an adult I learned another reason they locked
    us up was for our protection. If somebody's going to hurt us, shouldn't it be pointing out?
- speaker: Interviewer
  text: When you were at Minidoka, what do you remember about that center and your impression of it as a young kid?
- speaker: Respondent
  text: It was very different than being in wet Portland, and here it was hot and sunny. And initially, when I first started
    volunteering at the museum I said to people that when I first got there, this man had a dried rattlesnake skin. So two
    of my friends and I went walking out into the desert to look for rattlesnakes, of course we never found any. But we walked
    out, there's no fence. Later I'm doing research and I learned that the museum had microfilms of the newspapers of the
    centers. And going through the October issue of the Minidoka Irrigator, I found that the Army required that a fence be
    put in. And in November, they said they were putting in fire watchtowers. Of course all the other centers had guard towers,
    so that was one of the euphemisms they used at our center. I remember having to wait in line to eat the American style
    cooking from the large cans of food. During 1942 people cleared the sagebrush and other plants and dug a large irrigation
    canal to water the fields to be planted in 1943 outside the residential area. And then we ate more Japanese style cooking.
    In my digging I found that a tofu maker plied his trade as did a miso maker from the soybeans that were grown. A pig farm
    was set up to breed pigs so we would have a supply of meat. A chicken farm was also set up for the eggs. For the holiday
    season we got to eat the older chickens. I spent about six to seven months outside of the center after my parents got
    approved for a seasonal leave. The application was approved December 24, 1942, so we left the center in the spring of
    1943 after the FBI gave us clearance; Mr. Seaver hired my parents and we lived in a slightly better barrack apartment
    than the center in the Twin Falls FSA Farm Labor Camp. I remember seeing other Japanese Americans from the center living
    next to us. There were the migratory workers from the dust bowl days and I found out the Mexican laborers were on contract
    with a carrot to get them to go back to Mexico after the fall harvest of potatoes, Idaho's fame, and sugar beets, which
    was to withhold 10% of their wages and be sent to a bank in Mexico near their home. Again in digging, I also found that
    Jamaicans and Bahamians were from England under the Lend Lease program with Europe. We were called "Evacuees" and the
    migratory workers were called transient whites. The farm labor camp was about 17 miles southwest of Minidoka.
- speaker: Interviewer
  text: Did you get the sense that Minidoka's security felt more relaxed than the other camps?
- speaker: Respondent
  text: In my diggings I found the April 7th meeting of DeWitt, Eisenhower, and the ten Western governors in Salt Lake City.
    And on page four it says 'distinction between internment and evacuation.' It spelled out clearly the difference between
    the two. And then, poor Milton Eisenhower had a problem with sleeping because knowing American citizens were locked up
    behind barbed wire and armed guards, he couldn't sleep at night. So in June, he turned the duties over to Dillon Myer,
    that's how he got involved. The Washingtonians were evacuated to Minidoka first. We entered the Portland assembly Center
    May 5th, two days after it opened. we stayed there until September 4, 1942 when we were placed on a train to go to south
    Central Idaho. We arrived at the train stop on the 6th, and rode the bus to the Center. We were in Block 37, Barrack 9
    and apartment a which held our luggage and three folding canvas cots and three bags which we used as mattresses after
    filling them with poky straw. Eventually, three of us kids saw a man with a dried rattlesnake skin. We decided to go out
    into the sagebrush to look for a rattlesnake, but fortunately did not find one.
- speaker: Interviewer
  text: And I didn't get to go to it, but there was a conference here in L.A. in 2010. And they could not agree upon whether
    internees was separate from evacuees. They were discussing the terminology, and yet, if you look at the original definitions
    of internment and evacuees, they're two separate tracks. I found fifteen differences between the two groups. But all these
    authors are copying everybody else. In fact in one book I thumbed through, they used evacuee and internee in the same
    chapter, as being in the same group of people. So they were interchanging the two. What would you say about the terminology,
    if you were to call the camps for what they were - incarceration?
- speaker: Respondent
  text: 'Yeah. We were first excluded, and they also had restrictions and prohibited areas where any aliens could not go.
    And I also found another government document that said ''there are several groups we''re concerned about that could be
    involved in spy and sabotage and could be a threat to our internal security: German aliens, Japanese aliens, Italian aliens,
    people who might be involved in sabotage and espionage and American-born Japanese. That''s in that government document.
    So they labeled us and that they didn''t put American Germans or American Italians in there. And later I found two other
    documents that gave them special privileges, but they didn''t include Japanese Americans in any of these. And one was
    the curfew law that Hirabayashi and Yasui tried to confront. I''m going through the brief of Hirabayashi, and it spelled
    out that people could get a permit to stay out beyond the curfew hours or to travel more than five miles from their home.
    German or Italian, no Japanese listed. And later when the exclusion order came out on the West Coast, they had an exclusion
    from evacuation order. If you''re over seventy years of age, you were German or Italian, if you have someone in the military
    service or relative or someone who died in the service from December 7th on, all three of these categories had two boxes
    to check, ''I''m German, I''m Italian,'' but no Japanese. It just shows you how much it was only about race.'
- speaker: Interviewer
  text: Well it was money. Also adding to that fact, there's a big misnomer about, 'Oh my gosh we lost everything.' Well,
    in my digging, I found a government document that said "We're not liable but we're providing you with free warehouse space."
    And on the flip side of the sheet it has by room all the different furniture you'd have. And then, I found another document
    that said with some humility tied into it, 'If we're going to remove these people from their homes, it's onl
