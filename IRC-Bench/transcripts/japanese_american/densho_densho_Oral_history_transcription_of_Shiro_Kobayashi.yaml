collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I stayed in Japan until I was old enough for draft, and I did not experience any hardship. As I spent my childhood
    in Tokyo happily under my parents' love, I did not know any hardships.
- speaker: Interviewer
  text: Do you remember any big earthquake or tidal waves?
- speaker: Respondent
  text: I don't remember any such disasters.
- speaker: Interviewer
  text: What was the religion of your family?
- speaker: Respondent
  text: It was, Jodo Shinshu.
- speaker: Interviewer
  text: Have you heard about Christianity while you were in Japan?
- speaker: Respondent
  text: I was young, so I was interested in schools but I had no interest in religion.
- speaker: Interviewer
  text: What was the condition of your family when you left for America?
- speaker: Respondent
  text: Lord Mito's influence was strong in our district, and we emphasized that we have to live up to our principles. Our
    family practiced it.
- speaker: Interviewer
  text: How much education did you have in Japan?
- speaker: Respondent
  text: I attended a high school in Tokyo when I was a boy.
- speaker: Interviewer
  text: What was the reason for coming to America?
- speaker: Respondent
  text: I came to America to study.
- speaker: Interviewer
  text: When did you leave Japan to come to America?
- speaker: Respondent
  text: I came to America in 1907. I have many memories. The passengers were mostly young men, and there were many who were
    going back to America, and then there were the immigrants.
- speaker: Interviewer
  text: Do you have memories about the voyage?
- speaker: Respondent
  text: Yes, I do. As the passengers were mostly young men, they were in high spirit and talked big.
- speaker: Interviewer
  text: What kind of a ship was it?
- speaker: Respondent
  text: It was Shinano Maru of Miken Yusen Company.
- speaker: Interviewer
  text: What kind of a country did you think America was, and what did you want to do in America?
- speaker: Respondent
  text: I longed to come to America as I thought it was a democratic country and a rich country.
- speaker: Interviewer
  text: What was your first impression of America when you landed here?
- speaker: Respondent
  text: I thought America was a big country.
- speaker: Interviewer
  text: Do you have memories about the Immigration office?
- speaker: Respondent
  text: No, I don't.
- speaker: Interviewer
  text: What did you do first after coming to America?
- speaker: Respondent
  text: I worked as a schoolboy for about a month.
- speaker: Interviewer
  text: What was your impression of the white people, and how were you treated?
- speaker: Respondent
  text: I was not discriminated.
- speaker: Interviewer
  text: Did you have sad, happy, regrettable, funny, troubled or distressing experience when you first came to America?
- speaker: Respondent
  text: I do not have such memories.
- speaker: Interviewer
  text: How did you find your wife and marry her?
- speaker: Respondent
  text: My father became ill 9 years after I came to America, so I took a leave and went back to Japan to visit him. At that
    time I was at the marriageable age, so I married my present wife.
- speaker: Interviewer
  text: What kind of a wedding did you have? Where were you married?
- speaker: Respondent
  text: As I was a Buddhist we were married in Buddhist style at home inviting go-betweens and relations.
- speaker: Interviewer
  text: Do you have recollection of picture marriages?
- speaker: Interviewer
  text: Did you get homesick?
- speaker: Respondent
  text: I became homesick in America, as I led an easy life when I was in school in Japan. On the other hand, I had a desire
    to succeed, so I did not get too homesick.
- speaker: Interviewer
  text: What kind of difficulties did you have in getting used to the life in America?
- speaker: Respondent
  text: I did not have any special difficulty.
- speaker: Interviewer
  text: Do you have experience of getting discriminated as a Japanese in America?
- speaker: Respondent
  text: I do not have any special experience of getting discriminated, but it didn't bother me as I thought we could not help
    it if we get discriminated as foreigners in America.
- speaker: Interviewer
  text: How did you learn English? Did you go to school in America?
- speaker: Respondent
  text: I did not have a chance to go to schools, I just learned it from Japanese.
- speaker: Interviewer
  text: About how much was your income a few years after you came to America?
- speaker: Respondent
  text: I came to America to study, but I started farming. I just had income from farming.
- speaker: Interviewer
  text: When did you buy your house? About how much did it cost? Was there any trouble when you bought the house?
- speaker: Respondent
  text: I bought the present house after the war. I bought it in my son's name, so there was no trouble.
- speaker: Interviewer
  text: Did you buy land? How much was it? What did you use the land for?
- speaker: Respondent
  text: I used the land for growing small vegetables.
- speaker: Interviewer
  text: What kind of help did such Japanese organizations as the Japanese Association, the kenjin-Kai, the churches, the consulate
    and the Farmers' Association give you?
- speaker: Respondent
  text: I did not get help from any of them.
- speaker: Interviewer
  text: What kind of hobbies did you have?
- speaker: Respondent
  text: I did not have any special hobby. I just attended the church.
- speaker: Interviewer
  text: Do you have recollection of joy, happiness and agony in bringing up your children?
- speaker: Respondent
  text: Fortunately, I took them to church and tried to give them spiritual education.
- speaker: Interviewer
  text: Did you send your children back to Japan?
- speaker: Respondent
  text: No, I didn't.
- speaker: Interviewer
  text: What kind of contribution did you do to the World War I, and what kind of recollections do you have?
- speaker: Respondent
  text: I don't have any.
- speaker: Interviewer
  text: Do you have any experience at the segregated school or Japanese language school?
- speaker: Respondent
  text: When I went to Watsonville there was a special school for Japanese, but it was integrated soon after that.
- speaker: Interviewer
  text: When did you come in contact with Christianity, and why?
- speaker: Respondent
  text: When I was farming in 1921, Rev. Arima was preaching gospel at a small church. When Bishop Hiraiwa came from Japan,
    I was baptized by him.
- speaker: Interviewer
  text: What kind of difficulties and experience did you have during the Depression?
- speaker: Respondent
  text: I remember the Depression came the year after I went to Watsonville and started farming. The crops became so cheap
    that I never felt comfortable even once.
- speaker: Interviewer
  text: When did you make up your mind to settle down in America?
- speaker: Respondent
  text: I made up my mind to settle down in America not long after I came here.
- speaker: Interviewer
  text: What was the attitude of the white people towards Japanese during World War II?
- speaker: Respondent
  text: It was not too bad, but as they were attacked not too far away, Japanese in California seemed to be given suspicious
    eyes.
- speaker: Interviewer
  text: How did you feel when Pearl Harbor was attacked?
- speaker: Respondent
  text: I was in Watsonville then. It was after the worship service that we heard Pearl Harbor was attacked. My opinion was
    that Japan had made an unwise move. Christian teaching say that those who stand by sword will be destroyed by sword. I
    thought sneak attack was especially unfair. My senior said that in front of many people.
- speaker: Interviewer
  text: How did you learn about the evacuation order? What were you doing then?
- speaker: Respondent
  text: I was farming when we got the evacuation order. I learned about the evacuation order at the church.
- speaker: Interviewer
  text: How did you feel when you received the evacuation order?
- speaker: Respondent
  text: I was not shocked too much.
- speaker: Interviewer
  text: How did you evacuate?
- speaker: Respondent
  text: Fortunately we had relations in Central California, so we went there.
- speaker: Interviewer
  text: What kind of attitude did your white friends show towards the evacuation?
- speaker: Respondent
  text: In their looks I could imagine that they were thinking Japan had done a terrible thing.
- speaker: Interviewer
  text: What did you do with your work and property at the time of evacuation?
- speaker: Respondent
  text: I sold all my property before I evacuated.
- speaker: Interviewer
  text: How old were your children when you evacuated?
- speaker: Respondent
  text: All my sons have grown up. The youngest son had graduated from high school and was going to college. We had enough
    money to buy land when the war broke out, so we were shocked.
- speaker: Interviewer
  text: What was the attitude of the white churches toward the evacuation?
- speaker: Respondent
  text: One thing I regret is that when our Watsonville Presbyterian Church was closed down and had to evacuate, we asked
    the American church if we could use their church as we did not have a place for worship, but we were refused. We were
    disappointed by the action of the friends who had the same Christian faith.
- speaker: Interviewer
  text: Which camp did you go to?
- speaker: Respondent
  text: I evacuated on my own.
- speaker: Interviewer
  text: What was the condition of the camp?
- speaker: Respondent
  text: I do not have experience of going to a camp.
- speaker: Interviewer
  text: Do you have any recollection concerning the loyalty of American citizens during the war?
- speaker: Respondent
  text: I do not have any knowledge of the loyalty problem, but as a parent I felt sorry for them.
- speaker: Interviewer
  text: What is your opinion about the military service of Niseis?
- speaker: Respondent
  text: As they are American citizens, I think it is natural that they respond to the draft.
- speaker: Interviewer
  text: Do you have recollections about the entertainment, recreation and hobbies?
- speaker: Respondent
  text: No, I don't have any.
- speaker: Interviewer
  text: When did you come back after the war?
- speaker: Respondent
  text: I came back to Watsonville in January of the year after the war ended.
- speaker: Interviewer
  text: Where did you go first?
- speaker: Respondent
  text: I came back to Watsonville. Fortunately, by the help of my Christian friend, Mr. Shikuma, I found a house and rented.
- speaker: Interviewer
  text: Where did you go after you evacuated from here?
- speaker: Respondent
  text: I went to my relation's in Dinuba in Central California.
- speaker: Interviewer
  text: Where did you go from there?
- speaker: Respondent
  text: People there had to evacuate, too, so I went to Ogden, Utah.
- speaker: Interviewer
  text: Why did you move to that destination?
- speaker: Respondent
  text: Because I wanted freedom of action. I could not stand living in a place surrounded by barbed wire.
- speaker: Interviewer
  text: What kind of work did you find?
- speaker: Respondent
  text: I grew daikon.
- speaker: Interviewer
  text: How did the white church help you?
- speaker: Respondent
  text: There were many churches, but to my regret, Presbyterian pastors and church members did not welcome us. Only the Methodist
    pastor was kind to us, and let us hold worship service in his church.
- speaker: Interviewer
  text: How did the Japanese church get back on its feet after the war?
- speaker: Respondent
  text: A few members of Watsonville church came back, but a little after we came back we held worship service.
- speaker: Interviewer
  text: What was the attitude and treatment of Americans towards you after the war?
- speaker: Respondent
  text: When we came back to Watsonville, the thing that I felt most was that their attitude towards us was very cold. For
    instance, when we wanted to get jobs, they would not give us jobs. Only a few people of German or Italian origin gave
    us jobs.
- speaker: Interviewer
  text: What was your educational principle towards your children?
- speaker: Respondent
  text: I wanted to bring up my children as good Americans by religious education, so I considered going to church as most
    important.
- speaker: Interviewer
  text: How did you find a home and a job after the war? Who helped you?
- speaker: Respondent
  text: After I came back to Watsonville I worked for a while. Then a man who sympathized with me sold us his home saying
    that I could pay him later.
- speaker: Interviewer
  text: What was the hardest thing after you came back?
- speaker: Respondent
  text: I did not experience any hardship after I came back, but it was an undeniable fact that the Americans' attitude towards
    Japanese was cold. I thought it was a regrettable thing for people of such a great nation.
- speaker: Interviewer
  text: What is your wish as a Christian?
- speaker: Respondent
  text: I spent over 60 years in America, and 50 years out of it as a Christian. Although America is a democratic country
    with equal rights to everyone, I spent my life in distress because I was not treated equally because I was a foreigner.
    Fortunately I was saved by Christ in the church. At the time of difficulties I found strength to live by looking up to
    Christ. At present there are only a few Isseis in our Presbyterian church, and the age of Niseis has come. I hope the
    Nisei and Sansei Christians will defend the church with their strong faith in God at this confusing age when people deny
    God. I hope they will defend the church believing in Jesus' words that "Those who believe in God till the end will win
    victory."
