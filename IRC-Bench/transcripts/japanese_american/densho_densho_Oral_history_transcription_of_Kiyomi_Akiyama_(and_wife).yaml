collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Where did you rank among your brothers and sisters?
- speaker: Respondent
  text: I was the 6th child.
- speaker: Interviewer
  text: What kind of a person was your father?
- speaker: Respondent
  text: Frankly speaking, my father did not like to work too much. He worked because he had to.
- speaker: Interviewer
  text: What kind of a person was your mother?
- speaker: Respondent
  text: She was the only daughter of the Akiyama family, and my father was adopted into her family. She was a very serious
    person, and I respected her very much.
- speaker: Interviewer
  text: Did you learn things from your mother or from your father?
- speaker: Respondent
  text: Looking back, I think I was influenced more by my mother than father.
- speaker: Interviewer
  text: Do you remember anything that your mother taught you?
- speaker: Respondent
  text: What I remember most is that she told me that I should be the first to start working after taking a break and set
    an example to hired hands as I am the son of a farmer. She told me that even when I went to help other farms I should
    take a lead in going back to work after a break. My parents did not have much education but I remember that much.
- speaker: Interviewer
  text: Do you have childhood memories, such as happy memories and sad memories?
- speaker: Respondent
  text: I do not have any especially sad memories as we were not needy, and I had many friends. On the other hand, I did not
    have any especially happy memories.
- speaker: Interviewer
  text: What kind of games did you play?
- speaker: Respondent
  text: As we were a farming family we were busy and did not have time to play. The only time I played was at the athletic
    meet at school.
- speaker: Interviewer
  text: When you played, what kind of games did you play?
- speaker: Respondent
  text: We had long winter. From November to February it was cold and we could not work outside too much, so young people
    gathered and talked and sang. I think that was the most fun I had. During the summer the farmers had to work from morning
    till night so I did not have much time to play.
- speaker: Interviewer
  text: Does it snow much in Nagano Prefecture?
- speaker: Respondent
  text: It does not snow as much as in Niigata Prefecture but it was very cold because it was around 2,000 to 2,000 feet above
    sea level.
- speaker: Interviewer
  text: How much schooling did you have?
- speaker: Respondent
  text: I went as far as the 8th grade.
- speaker: Interviewer
  text: Did you like school?
- speaker: Respondent
  text: I did not like it too much.
- speaker: Interviewer
  text: Do you remember about your teachers?
- speaker: Interviewer
  text: Were there any interesting teachers?
- speaker: Respondent
  text: Japanese teachers were fearful rather than interesting.
- speaker: Interviewer
  text: Did you study moral science?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Are you glad you studied moral science?
- speaker: Respondent
  text: Looking back, I think it was good.
- speaker: Interviewer
  text: Were you unimpressed then?
- speaker: Respondent
  text: No, I thought it was the code of life.
- speaker: Interviewer
  text: Do you remember being scolded by your parents?
- speaker: Respondent
  text: I don't remember being scolded severely. I was only admonished once in a while.
- speaker: Interviewer
  text: Were you spoilt as you were the 6th child?
- speaker: Respondent
  text: No, I wasn't. There were 5 boys and two girls. As my brother was born as the 4th child he was taken good care of,
    but I was ignored.
- speaker: Interviewer
  text: What did you do after you graduated from school?
- speaker: Respondent
  text: Schools were far from our house and I could not afford to go to a high school. It happened to be during the Russo-Japanese
    War and my brother had gone to war, so I had to work as a foreman. I had just graduated from grammar school, but as my
    brother had gone to war and my father was too old and could not work well, I had to work as a boss until my brother came
    home. That is why I could not get education as I wanted.
- speaker: Interviewer
  text: Do you remember anything else that happened in your village?
- speaker: Respondent
  text: It was a very peaceful village and nothing special happened.
- speaker: Interviewer
  text: Did your grandparents live with you?
- speaker: Respondent
  text: My grandfather died when I was about 5 years old, so I don't remember him well.
- speaker: Interviewer
  text: Did you learn lessons about life from your parents?
- speaker: Respondent
  text: I think I was taught about life by my mother. I am deeply impressed with her teaching to be honest.
- speaker: Interviewer
  text: Were there books in your house?
- speaker: Respondent
  text: There were hardly any books in my house.
- speaker: Interviewer
  text: Was the story of Ninomiya Sontoku popular in those days?
- speaker: Respondent
  text: I learned about him at school.
- speaker: Interviewer
  text: What was the religion of your family?
- speaker: Respondent
  text: It was Buddhism.
- speaker: Interviewer
  text: What sect was it?
- speaker: Respondent
  text: It was Zen Sect.
- speaker: Interviewer
  text: Was your village a big village?
- speaker: Respondent
  text: It was an average size village.
- speaker: Interviewer
  text: Were there festivals in the village?
- speaker: Respondent
  text: Yes, there were.
- speaker: Interviewer
  text: What kind of festivals were there?
- speaker: Respondent
  text: There was a tutelary deity of the village. Once a year the villagers visited the shrine and the priest gave prayers.
    Relatives from other villages visited the families of the village, and had feasts.
- speaker: Interviewer
  text: Was there a harvest festival?
- speaker: Respondent
  text: No, there wasn't.
- speaker: Interviewer
  text: Was that festival only once a year?
- speaker: Respondent
  text: Yes, it was. There was Bon. It was not a festival but people stopped working and held services for the dead.
- speaker: Interviewer
  text: What about Tanabata (the Festival of the Weaver Star)?
- speaker: Respondent
  text: Yes, we wrote poems on narrow sheets of paper. Most festivals in the country came from Buddhism. Most funerals in
    the country were held in Buddhist style, and hardly any in Shinto style.
- speaker: Interviewer
  text: How about the weddings? Were they in Shinto style?
- speaker: Respondent
  text: No, they were neither Buddhist nor Shinto style. They were held at homes.
- speaker: Interviewer
  text: Don't Shinto priests or Buddhist monks officiate the weddings?
- speaker: Respondent
  text: No, they don't come. They might have come in Tokyo, but not to farming families in the country.
- speaker: Interviewer
  text: Why don't the Buddhist priests come to the weddings?
- speaker: Respondent
  text: They do not go to any other ceremonies except the funerals. Only in America the Buddhist priests go to the weddings.
- speaker: Interviewer
  text: What kind of subjects did you like at school?
- speaker: Respondent
  text: I liked music. I liked geography a little.
- speaker: Interviewer
  text: Did you long to go to big cities like Tokyo or Osaka then?
- speaker: Respondent
  text: When I was in grade school I did not have such ideas, but around the time my brother came back from the service I
    read about foreign countries in magazines and wanted to go to such places.
- speaker: Interviewer
  text: At that time what kind of a country did you think America was?
- speaker: Respondent
  text: I didn't know too much about America then. I heard that it was a good place but I did not have intention of going
    abroad.
- speaker: Interviewer
  text: Were there any people who went to America from your village?
- speaker: Respondent
  text: There were one or two, but I did not know then.
- speaker: Interviewer
  text: Do you remember about the Sino-Japanese War?
- speaker: Respondent
  text: Just vaguely. I remember people saying we won the war.
- speaker: Interviewer
  text: Did you know of anybody who was killed in the War?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: Were you in America when the World War I started?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: How did it happen that you came to America?
- speaker: Respondent
  text: My sister's husband was an intellectual. He had knowledge of America and told me that America is a good place to live
    and earn money so he encouraged me to go. As my family was not needy but could not afford to send me to America I was
    not too anxious to come. But when my brother came back from service he told me that as I was 19 years old I had to go
    into service sooner or later, so if I want to go to America I should go before that time comes. As I was the second son,
    if the property was divided between my brother and I my brother's share will be reduced, so I thought I should go to America.
    My second sister's husband encouraged me by saying that he would collect money from other brothers and sisters for my
    passage, so I decided to come to America. Nagano Prefecture is in the country and people were not financially badly off
    so we lived in comfort, and did not think about going abroad.
- speaker: Interviewer
  text: Did you get in contact with Christianity for the first time then?
- speaker: Respondent
  text: I did not attend that school, but I heard about Mr. Iguchi from my friend.
- speaker: Interviewer
  text: Was it agreed that you come to America then?
- speaker: Respondent
  text: My brother collected 50 yen from each brother and sister and gave me 300 yen for my passage to come to America.
- speaker: Interviewer
  text: Did you need 300 yen then?
- speaker: Respondent
  text: Yes, the passage was 200 yen and show money was 50 yen.
- speaker: Interviewer
  text: Did you know then what kind of a country America was?
- speaker: Respondent
  text: I heard that it was a nice place.
- speaker: Interviewer
  text: What year did you leave Japan?
- speaker: Respondent
  text: It was December of 1906.
- speaker: Interviewer
  text: Where did the ship sail from?
- speaker: Respondent
  text: From Yokohama.
- speaker: Interviewer
  text: How did you feel when you left Japan?
- speaker: Respondent
  text: I did not have any special feeling. I just wanted to go to America as soon as possible.
- speaker: Interviewer
  text: Did you think about going back to Japan then?
- speaker: Respondent
  text: No, I didn't. But I thought I would go back to Japan when I had enough money saved.
- speaker: Interviewer
  text: About how much was enough money?
- speaker: Respondent
  text: I thought 10,000 yen would be enough.
- speaker: Interviewer
  text: How was it on board the ship?
- speaker: Respondent
  text: The passengers were mostly young men so I had a good time.
- speaker: Interviewer
  text: What did you do on board the ship?
- speaker: Respondent
  text: We talked, sang and some people recited Shigin.
- speaker: Interviewer
  text: Was there a party?
- speaker: Respondent
  text: No, we did not have such thing. I missed the ship I was supposed to have caught because they were strict about trachoma
    in those days.
- speaker: Interviewer
  text: Did you wait for the next ship at Tokyo?
- speaker: Respondent
  text: I waited at Yokohama. When I came back to the hotel I heard that the head of the Rokkaku Hospital would guarantee
    us if we go to America via Canada, so I stayed at the Rokkaku Hospital for 2 weeks with 3 other men who failed the eye
    examination.
- speaker: Interviewer
  text: What ship did you take to Seattle?
- speaker: Respondent
  text: The ship to Seattle was Nippon Yusen Line, but the one that went to Victoria, Canada was a British cargo ship, so
    I got on board that ship.
- speaker: Interviewer
  text: About how many Japanese were on board the ship?
- speaker: Respondent
  text: About 30 Japanese. They were almost all around my age, and there were 2 or 3 people from Nagano Prefecture.
- speaker: Interviewer
  text: Did you arrive at Victoria?
- speaker: Respondent
  text: Yes, I did. After we landed there we were told to stay there for a week. After that they gave each of us a bottle
    of medicine and we came to America via Vancouver without any trouble. On the train an immigration officer gave us passports
    and entered America.
- speaker: Interviewer
  text: How did you feel when you arrived at Victoria?
- speaker: Respondent
  text: I was relieved that I arrived there safely.
- speaker: Interviewer
  text: How was your English?
- speaker: Respondent
  text: I didn't even know the alphabet.
- speaker: Interviewer
  text: How did you know where to go when you arrived at Victoria?
- speaker: Respondent
  text: There were Japanese hotels there and I had friends so we helped each other. I had the hardest time as I could not
    speak English.
- speaker: Interviewer
  text: Did you go from Victoria to Vancouver?
- speaker: Respondent
  text: We went to Vancouver by a ship. From Vancouver we came to America.
- speaker: Interviewer
  text: Did a Japanese put you on a train?
- speaker: Respondent
  text: I don't remember what I did, but I came to America without getting lost.
- speaker: Interviewer
  text: What did you do after you arrived at Seattle?
- speaker: Respondent
  text: After I got off the train I went to a Japanese hotel. There were many Japanese there, so they helped me.
- speaker: Interviewer
  text: When you saw the city how did you feel?
- speaker: Respondent
  text: I was not particularly impressed. The scenery was pretty, with big trees and wide open space.
- speaker: Interviewer
  text: Did you get off at Seattle?
- speaker: Respondent
  text: I stayed there for about 6 months.
- speaker: Interviewer
  text: What did you do during that time?
- speaker: Respondent
  text: I came here to work and make money and pay back the passage I borrowed so I went looking for a job. People told me
    there were jobs here and there, but my predecessor was here, I decided to go there.
- speaker: Interviewer
  text: What kind of work did you do in Seattle?
- speaker: Respondent
  text: I worked at a sawmill.
- speaker: Interviewer
  text: Where was the sawmill?
- speaker: Respondent
  text: They were at Redmond, Keystone and other places. I worked there for about 2 months.
- speaker: Interviewer
  text: What kind of work did you do at the sawmill?
- speaker: Respondent
  text: We put away sawdust.
- speaker: Interviewer
  text: Were many Japanese working there?
- speaker: Respondent
  text: Yes, most workers were Japanese.
- speaker: Interviewer
  text: Were you 18 years old then?
- speaker: Respondent
  text: I was 18 years and about 10 months, not quite 19 yet.
- speaker: Interviewer
  text: Weren't you lonesome?
- speaker: Respondent
  text: I never got homesick... I just thought about my friends. I wrote letters.
- speaker: Interviewer
  text: What did you write about?
- speaker: Respondent
  text: I wrote about America and what we did in Japan. They wrote back to me. I looked forward to the letters from Japan
    most.
- speaker: Interviewer
  text: Did anything special happen during the six months while you stayed in Seattle?
- speaker: Respondent
  text: Nothing special happened.
- speaker: Interviewer
  text: About how much did you earn in those days?
- speaker: Respondent
  text: The wages at the sawmill was 15 cents an hour, so I made $1.50 working 10 hours a day.
- speaker: Interviewer
  text: About how much did it cost to live one day in those days?
- speaker: Respondent
  text: Food was about $6.50 to $10.00 a month.
- speaker: Interviewer
  text: How much for a place to sleep?
- speaker: Respondent
  text: It was free. We just paid for the food.
- speaker: Interviewer
  text: Did you have about $20 left every month?
- speaker: Respondent
  text: Yes, easily.
- speaker: Interviewer
  text: It didn't take you too long to earn $50, did it?
- speaker: Respondent
  text: No, not long.
- speaker: Interviewer
  text: Did you pay your debts back from Seattle?
- speaker: Interviewer
  text: Was the work at the sawmill a pretty rough job?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: Did you get injured?
- speaker: Respondent
  text: Yes, some people cut their hands with saw, but that didn't happen to me.
- speaker: Interviewer
  text: Were you young among them?
- speaker: Respondent
  text: Yes, I was.
- speaker: Interviewer
  text: Were most men in their 30s and 40s?
- speaker: Respondent
  text: Yes, they were. There were many men who came from Hawaii. They said they were going back to Japan after they saved
    some money. They were old and were used to work, so they taught me work kindly.
- speaker: Interviewer
  text: Were there any single Issei who gambled?
- speaker: Respondent
  text: There was a group of people who gambled, but I have never been to such a place so I don't know about it. I just heard
    about it.
- speaker: Interviewer
  text: Weren't there some people who lost what they earned?
- speaker: Respondent
  text: Yes, they gambled and lost what they earned. I think there were many people like that. There were no other recreation
    so they gambled.
- speaker: Interviewer
  text: Did they gamble among themselves or did they go out in town to gamble?
- speaker: Respondent
  text: They went out to town, but a group of people in the camp gathered at night time and gambled with the money they earned.
    Those people were quite old. I never went to such a place.
- speaker: Interviewer
  text: Were there any professional gamblers who took money people earned?
- speaker: Respondent
  text: I heard there were such people, but as I stayed away from them I don't know about such thing.
- speaker: Interviewer
  text: Didn't prostitutes come to camps as most men were single?
- speaker: Respondent
  text: No, I didn't hear such thing.
- speaker: Interviewer
  text: Where did you go from Seattle?
- speaker: Respondent
  text: I came here via San Francisco.
- speaker: Interviewer
  text: Did you come here straight?
- speaker: Respondent
  text: Yes, I did. I came here in August.
- speaker: Interviewer
  text: How was the train ride?
- speaker: Respondent
  text: I went to San Francisco from Seattle by a ship and from San Francisco I came to Los Angeles by a train.
- speaker: Interviewer
  text: Did you know how to transfer from the ship to the train?
- speaker: Respondent
  text: I was given the direction so I could guess what to do. I did not feel lost.
- speaker: Interviewer
  text: Do you have any recollection?
- speaker: Respondent
  text: I don't have any special recollection of the voyage or the train ride.
- speaker: Interviewer
  text: Did anything interesting happen while you were in Seattle, or while you were working at the sawmill?
- speaker: Respondent
  text: In those days I didn't think anything but to save money and pay back the debt.
- speaker: Interviewer
  text: What did you do for recreation in those days? Did you just work?
- speaker: Respondent
  text: I read books and magazines. I learned alphabets from my senior.
- speaker: Interviewer
  text: Did you go and see movies?
- speaker: Respondent
  text: No, never. I did not go to a movie while I was in Seattle. After I came here I did not go to a movie as I lived in
    the country.
- speaker: Interviewer
  text: You didn't have any contact with the white families, didn't you?
- speaker: Respondent
  text: After I came here I had
