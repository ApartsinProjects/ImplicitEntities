collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: She was a very kind-hearted person. When she was young her family was well-to-do, so they had tutors come to the house
    to teach her samisen. Her family made so much money in lumber business that her great grandfather had a reserve seat in
    the theater, and ordered food to be delivered to the theater. He also owned much land. When this great grandfather died
    his second son became an heir, and the oldest son established a branch family. The reason why the oldest son did not become
    an heir was that he was a scholar of Chinese literature and did not have any interest in business, so if he became an
    heir they might lose the fortune. The younger brother felt sorry for his older brother, and opened a wine store for him
    so that he can make a living. But the older brother did not have any interest in business and let the servants take care
    of the store, so the servants pocketed the money and he lost all the money. For two years after that the younger brother
    bought rice for him to make wine. Since then the family became poor.
- speaker: Interviewer
  text: Was he your grandfather?
- speaker: Respondent
  text: No, he was my mother's father.
- speaker: Interviewer
  text: How much schooling did you have?
- speaker: Respondent
  text: I came here right after I finished high school. My father started farming here with my uncle about 70 years ago when
    this area was not yet developed. I came here 62 years ago when I was 18.
- speaker: Interviewer
  text: What was your father doing?
- speaker: Respondent
  text: He was a farmer growing grape.
- speaker: Interviewer
  text: Where was he farming?
- speaker: Respondent
  text: About 5 miles north of here, near Fresno.
- speaker: Interviewer
  text: Where did you land?
- speaker: Respondent
  text: I landed at Seattle in 1913, and came to Fresno by train. My father and uncle met me at the train depot in Fresno.
- speaker: Interviewer
  text: When you took a ship from Japan...
- speaker: Respondent
  text: In those days there were no airplanes, just ships. I was coming to San Francisco, but they found out that I had hookworms
    at the Immigration Office in Kobe. I went to doctors in Hiroshima and other places to get rid of the hookworms, but it
    took a long time. Finally on December 14 I took a physical examination to come to Seattle. It was not as strict to come
    to Seattle as coming to San Francisco, so I passed the physical. In those days ships coming to San Francisco were about
    12,000 tons, but for Seattle line ships of Nihon Yusen Company were used. Japan was not known well to other countries
    in those days, so 5,000 ton ships were about the largest Japan had. When the New Year's Day, so we had a long time to
    go from Vancouver to Seattle.
- speaker: Interviewer
  text: What kind of people were on board the ship?
- speaker: Respondent
  text: There were many picture brides and men who went back to Japan to take wives. There were about 300 passengers on board
    the ship which was about 5,000 tons.
- speaker: Interviewer
  text: Did you talk to picture brides?
- speaker: Respondent
  text: We all became friendly on the ship.
- speaker: Interviewer
  text: What kind of things did you talk about? Were they worried?
- speaker: Respondent
  text: They were not too worried. They were matched by relations or friends from the native town, and if they think they
    were suitable by looking at pictures they decided to marry. That is why when they come to Seattle or San Francisco they
    don't know their husbands, as they only seen their pictures.
- speaker: Interviewer
  text: Were their marriages going on smoothly?
- speaker: Respondent
  text: Yes, most of them went smoothly.
- speaker: Interviewer
  text: Were there any cases where the picture and real person was different?
- speaker: Respondent
  text: Yes, there were some such cases.
- speaker: Interviewer
  text: What kind of story did you hear?
- speaker: Respondent
  text: Once in a while there was such case as a bad man sending a photograph of his friend instead of his. When the bride
    came here and found out that the husband was not the one in the photograph the trouble started.
- speaker: Interviewer
  text: What kind of a country was America before you came here?
- speaker: Respondent
  text: I had general idea about America through my father's letter.
- speaker: Interviewer
  text: Then you were not surprised when you came here, weren't you?
- speaker: Respondent
  text: No, I wasn't.
- speaker: Interviewer
  text: What was your first impression of Seattle?
- speaker: Respondent
  text: The thing that impressed me most in Seattle was that some streets were made by burying Oregon pines about 6 feet long.
    I hear that concrete will crack when it is too cold, and gets slippery where it rains too much. As there were much lumber
    in Seattle the streets were made of Oregon pines. I thought big country as America is, it does things in big scale. Then
    when I took a train from Seattle, I saw many tall trees over 200 feet tall standing in rows for miles in Oregon. We cannot
    see such a sight in Japan.
- speaker: Interviewer
  text: Did your father have a house in Fresno?
- speaker: Respondent
  text: Yes, he had a house with a living-room, bedrooms and a kitchen. My father and uncle owned a 100 acre as partners.
- speaker: Interviewer
  text: Did they buy it?
- speaker: Respondent
  text: They brought money from Japan and bought it. It may sound conceited but my father brought money from Japan and bought
    the land. 99% of Japanese here saved money by working and bought land.
- speaker: Interviewer
  text: Could they buy land in those days?
- speaker: Respondent
  text: Yes, they could. There was no land law in California yet. People wrote in Sacramento Bee that Japanese are diligent
    people who work even on Sundays, so the Mongolian race might take over the society if the white people don't watch out.
    To make good news story it was best to criticize foreigners as it did not offend any Americans. That is why Japanese were
    used to make news stories. MacLarty attacked Japanese on the paper, but he had Japanese gardeners and cooks as they were
    hard workers. Japanese were used in selling more papers. When the readers read the story they thought Japanese were bad
    people, and that is how the Japanese exclusion was started.
- speaker: Interviewer
  text: How was the work of growing grapes? Was it hard?
- speaker: Respondent
  text: I never worked in Japan, so I wondered why I came to such a place. I went to a white family and asked them to hire
    me as a schoolboy. They promised to hire me, but my father and uncle talked me out of it. In those days raisins were only
    $40 a ton. Of course everything was cheap in those days; bread was 8 cents a loaf, and ham and egg dish with as much bread
    as you want was 20 cents. The grapes were still young and did not have much crop. It was hard to manage a ranch, so if
    I left they would be shorthanded. That is why they talked me out. They let me go to a grammar school for 4 months, and
    after that I had to help the ranch.
- speaker: Interviewer
  text: My younger brother came from Japan about 13 years later. As I was helping the ranch, he went to a grammar school for
    about 3 months and then went to a high school in Caruthers. He was the first graduate of that high school.
- speaker: Interviewer
  text: About what time did you start working in the morning?
- speaker: Respondent
  text: I was young so I slept till somebody kicked me out of bed. Then I hardly had any time to eat before I started working.
    I think I started working around 7 o'clock.
- speaker: Interviewer
  text: What time did you quit in the evening?
- speaker: Respondent
  text: I worked till dark. If we worked from 7 in the morning to 6 in the evening it would be 10 hours, but we worked longer.
    For about a year after I came here I came to a wrong place as I was not used to the labor.
- speaker: Interviewer
  text: What do you remember was hard?
- speaker: Respondent
  text: Unlike Thompson seedless grapes, muscat grapes were very low, so when I worked bending my back all day long, my back
    hurt as if it was pricked with pins. It was painful. Then my uncle told me to prune the branches he left. He had pruned
    all the branches on the top part, and I had to cut the ones on the lower part. I had to prune with my head down all day
    long, so my back hurt. If he was a kinder man he could have asked me if my back hurt, or told me to take a break, but
    as he was a lieutenant who fought in the Russo-Japanese War he had no consideration for me.
- speaker: Interviewer
  text: Wasn't Fresno hot?
- speaker: Respondent
  text: Yes, it was hot. I am used to the heat now. The houses have air conditioners now and it is easier to live, but in
    those days it was different. There were wide open spaces with dead grass as it was not irrigated. Nowadays the land is
    developed and green plants absorb the heat so it has become cooler. When I came here there were cases of malaria in Fresno,
    but as the land was developed and it became cooler, there isn't any more malaria in Fresno.
- speaker: Interviewer
  text: Were you stricken with malaria?
- speaker: Respondent
  text: No, I wasn't.
- speaker: Interviewer
  text: Were many Japanese stricken with malaria?
- speaker: Respondent
  text: Yes, many. Those patients shiver with chills when it is hot, then they get hot and they drip with sweat.
- speaker: Interviewer
  text: How was the relationship with the white people in early days?
- speaker: Respondent
  text: The relationship with the white people in the neighborhood was very smooth. The reason why Japanese exclusion started
    was because MacLarty wrote anti-Japanese articles in the paper. The fear and contempt for Japanese was started by reading
    the paper.
- speaker: Interviewer
  text: How long did you help your father?
- speaker: Respondent
  text: My father and uncle owned 100 acres and worked as partners for about 5 years. My uncle's wife was a graduate of the
    girls' higher normal school, and was teaching a girls' high school in Kochi. At that time my father went back to Japan,
    picked her as my uncle's wife and brought her to America with him.
- speaker: Interviewer
  text: Was your brother the only one who came to America from your family?
- speaker: Respondent
  text: I was the oldest son, and my brother came here about 15 years after I came here. I have another younger brother in
    Japan who has never been in America.
- speaker: Interviewer
  text: Did your father return to Japan after a while?
- speaker: Respondent
  text: He had 160 acres which he left with us two brothers and went back to Japan around 1924 with no intention of coming
    back to America. Then my wife died leaving twin babies, so he came back to America to help us, and he died here.
- speaker: Interviewer
  text: When did you get married?
- speaker: Respondent
  text: I got married around 1925. Mine was not a picture marriage. I went back to Japan to take a wife.
- speaker: Interviewer
  text: Who acted as a go-between?
- speaker: Respondent
  text: My father did. I went back to Japan while my father was there, and he picked a wife for me. At the wedding the bride
    pays homage to the family Buddhist shrine first, then takes her seat.
- speaker: Interviewer
  text: Is the groom's side already seated?
- speaker: Respondent
  text: The parents, brothers and sisters, uncles and aunts of both sides are already seated. In a wedding the go-betweens
    are the most important people, so they take the top seat.
- speaker: Interviewer
  text: Which side facing the family shrine do they sit?
- speaker: Respondent
  text: The family shrine can be in the living-room or in the Buddhist room. If the family shrine is in the Buddhist room
    the bride pays homage in there first and then comes to the room where the ceremony is going to be held. The go-betweens
    sit on the top seat, then the bride's family sit on the left side, and the groom's family on the right side.
- speaker: Interviewer
  text: How long did you stay in Japan then?
- speaker: Respondent
  text: I stayed there for about 7 months.
- speaker: Interviewer
  text: Did your uncle take care of the ranch during that time?
- speaker: Respondent
  text: My brother did.
- speaker: Interviewer
  text: Was the ranch in your uncle's and your name?
- speaker: Respondent
  text: My brother and I were managing the ranch together, but I was married and my brother was married, so we were separated
    before it became complicated. My brother bought land in Parlier and moved there. At that time big depression came and
    29 banks in 4 counties in Central California (Fresno, Madera, Kings and Tulare) went bankrupt. In the meantime my wife
    died, and I could not hire people to take care of 160 acres, so I put the land in mortgage. Later I bought back half of
    it.
- speaker: Interviewer
  text: Was the land in your uncle's and your name?
- speaker: Respondent
  text: No, it was in my name this time.
- speaker: Interviewer
  text: What happened to your uncle?
- speaker: Respondent
  text: He moved to Parlier.
- speaker: Interviewer
  text: Your wife died...
- speaker: Respondent
  text: My wife died at childbirth leaving two children, and I lived here alone for 33 years. My two sons went to Europe during
    the World War II. The oldest son went to Germany right before the war was over, so he stayed there as a member of the
    occupation force.
- speaker: Interviewer
  text: How many years after you got married did your wife die?
- speaker: Respondent
  text: Three years after we got married. For 33 years after that I farmed here alone.
- speaker: Interviewer
  text: Was it at this house?
- speaker: Respondent
  text: Yes. I leased the house to a white family while I was in the camp. About 5 years after I came back from the camp I
    built this house.
- speaker: Interviewer
  text: Was it at the site?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: What other kind of hardship did you experience during the depression?
- speaker: Respondent
  text: My parents came here, so I worked in the ranch and my parents took care of the children, cooked and washed clothes.
- speaker: Interviewer
  text: Did your mother come here, too?
- speaker: Respondent
  text: Yes, she did as my wife died.
- speaker: Interviewer
  text: Did you manage 80 acres all by yourself?
- speaker: Respondent
  text: When I was busy I hired people, but I managed mostly by myself.
- speaker: Interviewer
  text: What kind of difficulties did you have in growing grapes?
- speaker: Respondent
  text: Growing grape is the best work among farming. We can sell grape to Sun Maid Company, so we do not have to worry about
    market. Nowadays everything is done by machine except watering.
- speaker: Interviewer
  text: How was it during the depression?
- speaker: Respondent
  text: Around 1925 and 1926 a pound of grape was only 1.5 cents. When I came here the wages of laborer was $1 a day, but
    it went up to $2.50 a day. The price of grape was about $40 a ton, 2 cents a pound when I came here. While the wages went
    up 2.5 times, the price of grape went down to 13 cents a pound. There was no work, and all the banks except Bank of America
    went bankrupt.
- speaker: Interviewer
  text: Did you find it hard to make a living?
- speaker: Respondent
  text: Yes, I did, but we managed to live. When my wife died my relations did not have condolence money, so they came and
    helped my ranch 4 or 5 days instead. I had a balance of $3 in a bank in Caruthers but I could not cash it, so I took a
    loan for three months. Even when I worked near my house I took lunch with me because if I come home I would read the paper
    and waste time.
- speaker: Interviewer
  text: Did you do that so that you can work more?
- speaker: Respondent
  text: Yes, to save time.
- speaker: Interviewer
  text: Even though you worked you couldn't sell, couldn't you?
- speaker: Respondent
  text: I could sell them although they were cheap. At that time I also grew peach and apricot so I could make some money.
    When I made some money by selling apricot and write a check, it was endorsed by someone to pay a debt, and that person
    would in turn use it to pay a debt to another person. So one check circulated from one person after another. People were
    in debt that much. Normally a day's wage was $2.50, but there wasn't any work even for a dollar. Those who worked at the
    white families were better off because they were paid by the day, week or the month. On the other hand those who had business
    had the hardest time because their money came in once a year, and they had to make the living during the year.
- speaker: Interviewer
  text: How badly off were some people? Were there any who became beggars?
- speaker: Respondent
  text: No, there weren't such people. When they did not have money to buy bread they asked the people who worked at the white
    families to lend them some money. I have never borrowed money from people, because I had apricot and peach, and if I put
    the crop as collateral the banks would lend me the money. When I did not have money for the electricity or water I borrowed
    money from the bank, but at loan time I paid them back. Then they would lend me the money again. If we manage the business
    smartly we would not have difficulties. When I put the crop as security the bank lent me money for picking grape in advance.
- speaker: Interviewer
  text: Didn't rabbits damage the grape?
- speaker: Respondent
  text: We do not have to worry about rabbits when the tree becomes big, but when we plant the cuttings the rabbits eat the
    sprouts. Once the rabbits start eating the sprouts...
