collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: February 14, 1890.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Hiroshima Prefecture.
- speaker: Interviewer
  text: What do you remember about your parents?
- speaker: Respondent
  text: My mother died when I was 9, and I was brought up by a stepmother. That is why I came to America when I was 15 years
    old.
- speaker: Interviewer
  text: How much education did you have in Japan?
- speaker: Respondent
  text: I came here right after I graduated from grammar school.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: My father did not want me to go to high school, so I decided to come to America. I was going to stay in Japan if I
    failed the physical examination but I passed, so I came here.
- speaker: Interviewer
  text: Why didn't your father want you to go to high school?
- speaker: Respondent
  text: As I was the oldest son he was afraid I would not want to succeed the family trade if I went to high school.
- speaker: Interviewer
  text: Did you have brothers or sisters?
- speaker: Respondent
  text: Yes, 2 brothers and 2 sisters.
- speaker: Interviewer
  text: What do you remember about your childhood?
- speaker: Respondent
  text: In those days the compulsory education was 6 years, so they quit school after 6 years, and only a few went to high
    schools.
- speaker: Interviewer
  text: Was your father a farmer?
- speaker: Respondent
  text: Yes, he was growing rice and wheat.
- speaker: Interviewer
  text: What was the religion of your family?
- speaker: Interviewer
  text: Do you remember any war?
- speaker: Respondent
  text: I left Japan in 1905 after the Russo-Japanese War ended. I remember seeing Russian prisoners of war when I went to
    Yokohama.
- speaker: Interviewer
  text: What part of 1905 did you leave Japan?
- speaker: Respondent
  text: I left Japan in September.
- speaker: Interviewer
  text: What kind of people were on board the ship?
- speaker: Respondent
  text: There were many Japanese coming to America. The crew were mostly Chinese, but the captain was a white man.
- speaker: Interviewer
  text: Were there any picture brides on board?
- speaker: Respondent
  text: No, there were no picture brides in those days.
- speaker: Interviewer
  text: What did you do in Hawaii?
- speaker: Respondent
  text: I worked in a sugar plantation for 8 months.
- speaker: Interviewer
  text: Were you a contract laborer?
- speaker: Respondent
  text: No, I wasn't.
- speaker: Interviewer
  text: Did you go to Hawaii alone at the age of 15?
- speaker: Respondent
  text: A 16-year-old boy came with me.
- speaker: Interviewer
  text: Do you remember anything that happened on the ship?
- speaker: Respondent
  text: I was seasick, so there wasn't anything pleasant to remember.
- speaker: Interviewer
  text: What did you do when you arrived in Hawaii?
- speaker: Respondent
  text: I went to a sugar plantation, and worked under a Chinese boss. At that time I received only $18 a month.
- speaker: Interviewer
  text: About how many people were working in your plantation?
- speaker: Respondent
  text: About 600 to 700 people.
- speaker: Interviewer
  text: It was a big camp, wasn't it?
- speaker: Respondent
  text: No, it was not too big. Some camps had about 2,000 people.
- speaker: Interviewer
  text: Were the laborers all Japanese?
- speaker: Respondent
  text: No, there were Chinese and Koreans, also, but the living quarters were separated.
- speaker: Interviewer
  text: Tell me about the life in the camp.
- speaker: Respondent
  text: There were about 600 people in my camp at that time, and about 10% of them were married. These married people built
    something like a cafeteria in the center of the camp and cooked meals. I did not eat in the cafeteria because some married
    couples from Hiroshima cooked for us. I did not know English, so I went to church every evening and learned English from
    Rev. Rokuro Abe.
- speaker: Interviewer
  text: Was it a Japanese church?
- speaker: Respondent
  text: Yes, it was a Japanese church. Rev. Abe came to America later, and I met him here.
- speaker: Interviewer
  text: Did those 600 people live in the same camp all the time, or did they move around?
- speaker: Respondent
  text: They stayed there all the time because there was work in the sugar cane field all the year round. Rev. Abe did interpreting
    and negotiating. I did not attend church on Sundays, but I went to church to learn English.
- speaker: Interviewer
  text: Was the work in sugar cane field very hard?
- speaker: Respondent
  text: Yes, it was very hard because I was only 15 then.
- speaker: Interviewer
  text: How many hours did you work every day?
- speaker: Respondent
  text: Ten hours a day.
- speaker: Interviewer
  text: Did the foreman give you any consideration because you were young?
- speaker: Respondent
  text: No, but I did a man's job.
- speaker: Interviewer
  text: Why did you leave Hawaii after 8 months?
- speaker: Respondent
  text: In those days we had $50 show money besides the passage. Most people sent it back to Japan after arriving in Hawaii,
    but I didn't as I wanted to come to America. That is why I had enough money to come to America. I arrived in San Francisco
    on June 20, 1906 right after the big earthquake, and there were no regular beds in hotels.
- speaker: Interviewer
  text: Why did you decide to leave Hawaii?
- speaker: Respondent
  text: Hawaii is very small and noisy with many Japanese, so I didn't want to stay there. Anyway, I wanted to come to America,
    and Hawaii was a temporary place. I must have been on labor contract because I received a letter from my home telling
    me that they had to pay some fine for me as I broke the contract.
- speaker: Interviewer
  text: Did you come to America from Hawaii with your friend?
- speaker: Respondent
  text: I came here with the same friend I went to Hawaii with.
- speaker: Interviewer
  text: Where did you stay in San Francisco?
- speaker: Respondent
  text: At a Japanese hotel.
- speaker: Interviewer
  text: How long did you stay in San Francisco?
- speaker: Respondent
  text: A few days, then we went to the country.
- speaker: Respondent
  text: At first we went to Walnut Grove as my friend's uncle lived there. There were many Chinese in that area, and gambling
    houses had good business. We stayed there only one month pulling weeds in the beans. There were ten men in the group so
    I had to cook once in every ten days.
- speaker: Interviewer
  text: Was there any special place for Japanese or Chinese to sleep?
- speaker: Respondent
  text: There was a barn on the ranch, and we put our blankets on the floor of the barn and slept there.
- speaker: Interviewer
  text: Where did they go gambling?
- speaker: Interviewer
  text: How was the town where Japanese went to?
- speaker: Respondent
  text: It was very prosperous not only on Saturdays and Sundays but on weekdays, also. Those who did not have bicycles walked
    6 or 7 miles to get there.
- speaker: Interviewer
  text: Were there any Japanese restaurants?
- speaker: Respondent
  text: At first there were no restaurants, but there were boarding houses.
- speaker: Interviewer
  text: Where did you go after that?
- speaker: Respondent
  text: After a month I went to Lodi, but there was no work there, so I went to Marysville. There I worked on the railroad
    construction of Utah Construction Company.
- speaker: Interviewer
  text: How did you find out where to go to get a job?
- speaker: Respondent
  text: I heard from friends. Once while I was working on the railroad construction we camped near a river. There was a heavy
    rain and the camp was flooded, so we had to go around many miles to go back to Marysville.
- speaker: Interviewer
  text: When did you get married?
- speaker: Interviewer
  text: What kind of work did you do until then?
- speaker: Respondent
  text: I did not know English so I worked as a schoolboy in Sacramento. I also worked as a waiter, dishwasher and a cook.
- speaker: Interviewer
  text: You were young then so you must have not have much trouble in learning English.
- speaker: Respondent
  text: No, but the pronunciation was hard. I wished I had learned some more, but it is too late now.
- speaker: Interviewer
  text: Did you go to school since you came here?
- speaker: Interviewer
  text: How did you meet your wife?
- speaker: Respondent
  text: My parents found her. She was a relative, so I saw her before.
- speaker: Interviewer
  text: Then she wasn't a picture bride, wasn't she?
- speaker: Respondent
  text: She was called a picture bride, but actually I knew her before.
- speaker: Interviewer
  text: Where did you live after you got married?
- speaker: Respondent
  text: We lived in Reedley. Before I got married I lived in Clovis for 4 years. I worked for 2 years, then I farmed 60 acres
    by contract with a partner. After that I worked as a Japanese foreman of a 320-acre ranch for a year.
- speaker: Interviewer
  text: How was the life as a foreman?
- speaker: Respondent
  text: It was just a job. I was only 22 or 23 years old then, so it was hard to give orders to 25 to 30 year old men. After
    that I farmed 20 acres on contract. In 1919 I bought 40 acres.
- speaker: Interviewer
  text: Was there any trouble in buying the land then?
- speaker: Respondent
  text: Of course there was. I could not buy land in my name, so I bought it in a Nisei's name.
- speaker: Interviewer
  text: Did the Japanese Association or the Farmers' Association help you?
- speaker: Respondent
  text: No. They will help the general public, but not the individuals.
- speaker: Interviewer
  text: Did the white people consider you as a rival when you worked as a foreman or bought the land?
- speaker: Respondent
  text: I don't think they considered me as a rival.
- speaker: Interviewer
  text: How many children do you have?
- speaker: Interviewer
  text: When were they born?
- speaker: Respondent
  text: Two were born during the depression. The oldest daughter was born in 1916, then the second daughter was born in 1919.
    Two boys were born after that.
- speaker: Interviewer
  text: How was the life of Japanese in Central California during the depression?
- speaker: Respondent
  text: It was very miserable. No matter how hard we worked we did not have enough money to live on, so we had to borrow money
    from the bank. The bank would not loan us money just for growing grape, so we grew strawberry between grape to borrow
    money.
- speaker: Interviewer
  text: Did you have difficulties in educating your children?
- speaker: Respondent
  text: We wanted our children to learn Japanese, so we got together and built schools, hired teachers and sent our children
    to Japanese language schools. There were about 11 Japanese communities, and each community had a Japanese school.
- speaker: Interviewer
  text: How often did these Japanese language schools meet a week?
- speaker: Respondent
  text: Once a week on Saturdays.
- speaker: Interviewer
  text: What kind of subjects did they teach?
- speaker: Respondent
  text: I don't know what kind of subjects they taught.
- speaker: Interviewer
  text: Did you send your children to Japan?
- speaker: Respondent
  text: No, I didn't.
- speaker: Interviewer
  text: What do you think about sending the children to Japan?
- speaker: Respondent
  text: I might have if I could afford it, but I couldn't. I think it was better I didn't because some children and their
    parents do not get along well after they were separated for a long time.
- speaker: Interviewer
  text: How was the housing in those days?
- speaker: Respondent
  text: People who bought land with good houses were lucky, but most people lived in shabby houses. We could not help it because
    we could not afford nice houses.
- speaker: Interviewer
  text: What is your present religion?
- speaker: Interviewer
  text: Have you been a Buddhist since you were in Japan?
- speaker: Interviewer
  text: Is there any difference in Buddhist churches before the war and now?
- speaker: Respondent
  text: No, I don't think so.
- speaker: Interviewer
  text: How many children did you have at the time of depression?
- speaker: Respondent
  text: I had four.
- speaker: Interviewer
  text: Now, about Pearl Harbor.
- speaker: Respondent
  text: I was associated with the Japanese Association, so I was prepared to be arrested. Fortunately no staff members from
    this district was arrested. I think it was because Rep. Gerhardt who was a friend of Mr. Setsu Sakamoto who was the director
    of the Japanese Association wrote a letter to the president saying that the Japanese Association would not oppose America
    or disturb the peace. I think it worked because while the staff members of the Japanese Association from other districts
    were all arrested, we were spared. Only the staff members of Judo or Kendo Associations were arrested.
- speaker: Interviewer
  text: When and where did you hear the news of Pearl Harbor attack for the first time?
- speaker: Respondent
  text: I don't remember well. I think I was fishing.
- speaker: Interviewer
  text: How did you get the evacuation notice?
- speaker: Respondent
  text: We had some time to get ready. At that time I was the president of a strawberry association. There were over 120 growers,
    so I had to take care of them. Then I sold the rights of the association to the Pacific Fruit Company. In these days we
    could travel only 5 miles by car, and if we wanted to go over that limit we had to get a permission. I had to go 10 to
    15 miles to collect money, and then they would give me checks for deposit only, so I did not cash to give to the growers.
    I finally entered the assembly center on Fresno Fairground on Apr. 18, 1942.
- speaker: Interviewer
  text: What did you do with your property and furniture?
- speaker: Respondent
  text: I leased the 80-acre land to a white man. I leased the house, and left the furniture in one room. Many people stored
    their belongings in government warehouses. We took only things we could carry.
- speaker: Interviewer
  text: How old were your children?
- speaker: Respondent
  text: The oldest one was in the service. When the children all grew up and were going to help me, the war broke out. At
    that time people living on the west side of Highway 99 had to go to the assembly center, but the east side of Hwy. 99
    was free zone, so those living there did not have to go. Later they had to go, too.
- speaker: Interviewer
  text: What do you remember most that happened after the Pearl Harbor and before you entered the assembly center?
- speaker: Respondent
  text: I worked for the strawberry growers' association every day, and never stayed home in the daytime. But there was a
    curfew, so I had to stay home after 6 o'clock. There were all kinds of posters on the poles. People who did not like Japanese
    must have thought it was a good chance to do that kind of things, but my good friends showed sympathy towards us.
- speaker: Interviewer
  text: What kind of attitudes did Chinese, Koreans and Filipinos have?
- speaker: Respondent
  text: I did not have any dealings with them. Only once when I came back here from Denver after the war and stopped at a
    Chinese restaurant, we were told that we would not be served because we were Japanese.
- speaker: Interviewer
  text: Which camp did you go to?
- speaker: Respondent
  text: Jerome, Arkansas.
- speaker: Respondent
  text: October '42.
- speaker: Interviewer
  text: Wasn't it a cold place?
- speaker: Respondent
  text: Yes, it was very cold.
- speaker: Interviewer
  text: How did you get to Jerome from here?
- speaker: Respondent
  text: It took 4 days to get to Arkansas by train. Once in a while it stopped and let us exercise, but armed soldiers watched
    us so that we wouldn't escape. It was an old train, and it took a southern route via Los Angeles.
- speaker: Interviewer
  text: About how many people went to Jerome from Fresno?
- speaker: Respondent
  text: Almost all the Japanese from Fresno city went to Jerome. People who lived in the country on the eastside did not have
    to go at first, so they used to come and visit us in the assembly center. But they came to the camp around September.
- speaker: Interviewer
  text: Who went to the camp with you?
- speaker: Respondent
  text: My wife, brother, sister and her daughter. Others were all married or in the service.
- speaker: Interviewer
  text: Were your children all grown up?
- speaker: Respondent
  text: Yes, they were all grown up. My younger son also went into service after we went to Denver. We left Jerome after six
    months because there was too much trouble as a block manager.
- speaker: Interviewer
  text: Were there 'Yes' group and 'No' group?
- speaker: Respondent
  text: Yes, they were divided into those two groups. As I was a block manager I could not be in 'No' group. Because of it
    my good friend became my enemy. One of my friends asked me if I was going out of the camp to help American soldiers, so
    I said maybe so, but if I stayed in camp I would not be able to help Japanese soldiers when they come here. My son-in-law
    was in 'No' group so my daughter went back to Japan with her children.
- speaker: Interviewer
  text: Wasn't he a Nisei?
- speaker: Respondent
  text: Yes, he was a Nisei. There were many such Niseis. They were mostly ones who went to Japan when they were little.
- speaker: Interviewer
  text: Do you remember anything special that happened while you were in Jerome for 6 months?
- speaker: Respondent
  text: In other camps they burned coal, but in our camp there were many trees so we went out in the wood and cut down trees.
    We piled the logs on wagons pulled by mule. It was hard to hitch the wagon on the mule without a harness. Luckily there
    were no wild mule. It rained all the time, and the water did not drain, so we had...
