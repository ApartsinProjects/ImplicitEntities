collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Who is sponsoring this project?
- speaker: Respondent
  text: Well; Uts us'
- speaker: Interviewer
  text: Are you a minister?
- speaker: Respondent
  text: Yes, I am. It's also sponsored by Japanese Presbyterian Conference.
- speaker: Interviewer
  text: Well then, I would like you to state your name, please.
- speaker: Respondent
  text: My name is Tokushige Kizuka.
- speaker: Interviewer
  text: Where is your home town?
- speaker: Respondent
  text: Fukuoka Ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on 1901, the 34th year of Meiji.
- speaker: Interviewer
  text: Well then you are 73 years old.
- speaker: Respondent
  text: I'm almost 74 years old.
- speaker: Interviewer
  text: When did you come to this country?
- speaker: Respondent
  text: I came to this country when I was 16 years old.
- speaker: Interviewer
  text: What was your father like?
- speaker: Respondent
  text: My father was here in Watsonville. He leased an apple orchard and managed it.
- speaker: Interviewer
  text: When you were born, was your father still in Japan?
- speaker: Respondent
  text: Yes, but he came to America when I was about 5 years old. So it must have been the 38th year of Meiji that he came
    to America.
- speaker: Interviewer
  text: Do you remember about your father?
- speaker: Respondent
  text: Yes, I do. When I came to America I stayed with my father for 3 years. I remember him from that time, but not in Japan.
    The only thing was that my father went to the Russo-Japan War and came back victorious. We went to welcome him back. Well,
    there was a long parade and I was carried with a big drum on a handcart. However, I don't remember anything about my father
    from that time.
- speaker: Interviewer
  text: How about your mother?
- speaker: Respondent
  text: My mother died a year after I was born. So I was raised by my stepmother.
- speaker: Interviewer
  text: Was your stepmother a kind person?
- speaker: Respondent
  text: No, she was not.
- speaker: Interviewer
  text: Were you scolded by her often?
- speaker: Respondent
  text: No. It's not that she was mean or anything. I just didn't have a real intimate relationship with them, that's all.
    In America, I lived with them for 3 years; but even then, it was not very intimate. When you were raised apart from each
    other, you will lose intimacy, even if it were parents and child relationship.
- speaker: Interviewer
  text: How far did you go in your education?
- speaker: Respondent
  text: School? I graduated elementary school, 6 years, and then 2 more years after that. Then, I went to one more year where
    they trained teachers. However, I could not complete that course because I came to the USA.
- speaker: Interviewer
  text: Do you remember anything from elementary school or middle school?
- speaker: Respondent
  text: I was a good student, so when the entire student body gathered in the playground, I used to give command for bowing
    heads to the principal. Other thing was that teachers used to pin my report card on the wall, so I was very proud.
- speaker: Interviewer
  text: Do you remember your teachers?
- speaker: Respondent
  text: Yes, I do. When I was in elementary school, there was no special teachers. One teacher taught everything. I remember
    a teacher by the name of Tokan. He was a prodigy of a very famous teacher. However, he had such a new ideology and he
    even demonstrated outside of school. So he could not advance to a good position. So this teacher was sent to a school
    in Taiwan. I really respected him very much. His thought was just too advanced for that time. He was not a socialist,
    either.
- speaker: Interviewer
  text: What was interesting and fun events?
- speaker: Respondent
  text: Well, it must be a school picnic. We used to climb mountains. Or at that time there was this thing called 'Chutai
    Undo'. We used to go into a deep mountain with some food. It was a military training. Those were very interesting.
- speaker: Interviewer
  text: Do you have any sad memory?
- speaker: Respondent
  text: No, I can't remember off hand. However, when my father didn't send money to us from America, we had to suffer hardship.
    This was very hard.
- speaker: Interviewer
  text: You must live with your stepmother, right?
- speaker: Respondent
  text: Yes. However, my stepmother left Japan for America when I was the third grade in elementary school. So I don't remember
    too much about her, either. So I lived with my grandmother, my father's side. I also had a sister, so three of us lived
    together. I also remember that my grandfather who was a carpenter. He was a good carpenter and he had 5 or 6 apprentices.
    However, he had a stroke and he could not work anymore and died when I was in the second grade. After that we, three of
    us, lived together. The only impression I have about him is that he was ill in bed, that's all. He could not work. My
    grandmother was a good mother. She was like my mother to me.
- speaker: Interviewer
  text: When you were going to school, did you want to come to the USA?
- speaker: Respondent
  text: No. I never thought I would come to America. At that time the government was encouraging us to go to South America.
    However, I didn't have any definite idea at that time.
- speaker: Interviewer
  text: Then what was the reason why you came to the USA?
- speaker: Respondent
  text: Oh, I was summoned by my father. I really didn't want to come, though. However, my father sent me all the documents
    necessary for me to come to the USA. My grandmother didn't want me to come, either. So I extended it as long as possible,
    but I had to come here after all. I was 16 years old then.
- speaker: Interviewer
  text: What did you think America might be?
- speaker: Respondent
  text: Well, I really didn't think about it. I came where because I had to come. I was very sad. I came with 2 other boys,
    my classmates, and also a boy who lived right in front of us. Three of us left our home town together. One went to Canada.
- speaker: Interviewer
  text: You said you came from Fukuoka, but were there many people from Fukuoka?
- speaker: Respondent
  text: I think so. I know 6 or 7 people from my own village. There was one in Watsonville from my village, but he passed
    away.
- speaker: Interviewer
  text: Where did you get on the ship?
- speaker: Respondent
  text: Nagasaki. The name of the ship was Tenyo Maru. However, she ran aground near Yokosuka. So we had to stay on the ship
    for about one week. Then we came to Yokohama and then to America. The ship must have been OK. There were many divers checking
    on the bottom of the ship. It must not have been damaged. Well, actually from Nagasaki, it went to Kobe, Yokosuka and
    then to Honolulu and then to San Francisco.
- speaker: Interviewer
  text: How was it on the ship?
- speaker: Respondent
  text: It was very enjoyable. At that time there were many women who were picture brides. There were many of them on the
    ship.
- speaker: Interviewer
  text: Did you have a chance to talk to them?
- speaker: Respondent
  text: Yes. They were marrying to men whom they never seen. So they were talking to each other about their husbands. They
    were all happy, though, on the ship. However, after they landed, many of them experienced tragedy. The husbands who came
    to pick them up were different from the picture, or they were older than women thought them to be. There may be those
    men who lied about their age, too. So I've heard about the tragedies of their lives. One of them cried all day long, because
    on the picture his profile was shown. So she could not see the other eye which was damaged. You couldn't help these things
    to happen because they were matched by pictures. It was parents or older brothers or sisters who made the decision for
    their marriage. There were also those who sent the picture dressed like respectable businessmen, even though they were
    manual laborers. I know there were many of those cases, too. Not all the people were like that, though. However, there
    were many cases like that.
- speaker: Interviewer
  text: What happened to those women who were really disappointed?
- speaker: Respondent
  text: Well, hotel owners, or friends who came with them comforted them. I really don't know what happened to them afterwards.
- speaker: Interviewer
  text: How long were you on the ship?
- speaker: Respondent
  text: 17 days. If I count the day I left Nagasaki, it would be more, including the days of the ship when it was aground.
- speaker: Interviewer
  text: Did you make any friends on the ship?
- speaker: Respondent
  text: No, I didn't make any. I had friends from the village, so three of us played together.
- speaker: Interviewer
  text: What did you do?
- speaker: Respondent
  text: We ran around the deck, or talked. That's about all. We were seasick, too. I wasn't too sick, but I was feeling a
    little nauseated.
- speaker: Interviewer
  text: What else do you remember from the ship?
- speaker: Respondent
  text: Well, you see, the lifestyle is a lot different from that worth village. The 'Ofuro' (bath) was salt water, and even
    that we could bathe only once or twice a week. So we had to wipe our bodies with the fresh water. It was just like going
    to swimming in the ocean. Food was very good. We didn't have that much of an appetite, because we had enough exercise.
    Sometimes those sailors made 'sushi' or other things and sold them to us. So if one had money, he could buy them.
- speaker: Interviewer
  text: Were there any drinking on the ship?
- speaker: Respondent
  text: No, I didn't know any. There were quite few people who were going back to America for the second time. They told us
    many things about America. I really appreciated that. We were on the third class cabin, on the bottom of the ship, so
    our beds were arranged like silkworm beds. Men's room and women's room were separated.
- speaker: Interviewer
  text: What did these people who were going back to America tell you?
- speaker: Respondent
  text: Well, they told us kinds of jobs they had. Some told us that they had laundry business. At that time people who came
    back were those who came back to Japan to look for wives.
- speaker: Interviewer
  text: How did you feel about America when you heard from those returnees?
- speaker: Respondent
  text: Well, you know, I didn't know my parents very well, so I was very uncertain. I was also expecting a great deal of
    changes in my life.
- speaker: Interviewer
  text: What did you do at Honolulu?
- speaker: Respondent
  text: We stayed in Honolulu for overnight. Those returnees could speak English, so they took us around. We went sightseeing
    in the town, ate dinner at Chinese restaurant. They took care of us well. There were lots of bananas there. I took out
    50 cents and asked for bananas. Then they gave me a big bunch. So we put a stick through it and carried it back to the
    ship on our shoulders. However, it was still green and we could not eat even one. On top of that Americans did not allow
    us to bring it with us. So we had to leave it on the ship.
- speaker: Interviewer
  text: How much money did you have with you?
- speaker: Respondent
  text: At that time we had to have 'Misekin' (Showing money) which was not so high, then. I think it was less than $50. Other
    than that I had some American money, so I didn't have to worry about spending money in Hawaii. It was sent to me by my
    father.
- speaker: Interviewer
  text: Was that Chinese food very good?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: You didn't go through the physical there?
- speaker: Respondent
  text: No, I didn't. However, the thing which surprised me most was that there was a Japanese Shinto Shrine there. It was
    very strange that I would see a shrine in the USA. I also saw Japanese people wearing Kimono. It looked very strange to
    me. I didn't expect to see this in America. They were speaking in Japanese, too.
- speaker: Interviewer
  text: Then you left for the Mainland, right?
- speaker: Respondent
  text: Yes. It took about a week, thank God. It took about 10 days to Hawaii. We arrived at San Francisco. There, at the
    Immigration Office, we had complete physical examination, from stool to eyes and everything.
- speaker: Interviewer
  text: Was it at Angel Island?
- speaker: Respondent
  text: Yes, it was. We stayed there for about 3 to 4 days.
- speaker: Interviewer
  text: Were you afraid?
- speaker: Respondent
  text: No. I was with my friends, so I wasn't that afraid. Then my father came to pick me up. I could not recognize him,
    though. He couldn't recognize me, either. In the waiting room, we were brought together, then I knew he was my father.
    I felt like meeting with a stranger. I didn't feel like meeting my father, because we were separated for 13 to 14 years
    and I just couldn't remember anything about him. I felt strange, and also there was no intimacy as a father and his son.
    He said, 'You must be Tokai.' I said, 'Yes.' That's it. Then we went to Oakland and visited our family friend from the
    same village. He had a shoe repair shop. We went to greet him and stayed over there for a few days. Then we went to Watsonville.
- speaker: Interviewer
  text: What did he do in Watsonville?
- speaker: Respondent
  text: My father was managing an apple orchard. I worked for him. My first impression was that America was a big country.
    However, it was hard work. I started out with pruning, because it was that season. There were many Japanese people in
    a camp who did just that. I was near sighted and had glasses on already. I was collecting brush and one of the branches
    wiped my glasses down and broke it. I was really in trouble because of that. I lived with my father and stepmother for
    3 years until he and my stepmother went back to Japan. After that I stayed with my uncle for 3 more years because my father
    was in partnership with him.
- speaker: Interviewer
  text: What were the sad or bad experiences in those days?
- speaker: Respondent
  text: I really wanted to go back to Japan. I really don't remember anything good from that time. I was only 16 years old
    then, and I didn't have even muscle power, either. You see, I hadn't had work experience in Japan, so it was doubly difficult.
    My father used to get up early in the morning. We started working about February and we worked 10 hours a day. I was still
    a young boy, so they didn't demand too much from me. They gave me spending money, too. They gave me enough to spend, but
    I didn't get paid, though. They also had a packing shed, so they had quite a few people working for them. They used to
    ship them out to England and other places. Of course they exported them through a white middleman. They also had horses
    and trucks. The workers they hired were all Japanese. All the apples were graded and wrapped in paper and packed. There
    must have been over 50 people during the season. It lasted from September to December. During the winter trees had to
    be pruned, so we had a few workers who stayed with us all the year around. There were 6 to 8 of those people. You see,
    my father wasn't very straight with me. I didn't know what kind of arrangement my father made with my uncle and left me
    behind. I worked very hard and yet I wasn't given the status as his partner. So I decided to leave.
