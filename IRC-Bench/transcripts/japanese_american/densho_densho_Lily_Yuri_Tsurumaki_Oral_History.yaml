turns:
- speaker: Respondent
  text: One day, a classmate saw my name is Lily Oki and she was surprised she says, 'You know I asked my mother, you disappeared
    you didn't come back to class to school.' And someone remembered me all those years? I thought my gosh, it was touching
    but she said no one talked about it.
- speaker: Respondent
  text: This was the last picture before we went to camp. That was my mother, my brother - he's two years younger than me
    - and my father. The war started what, December 7th wasn't it? We had our Christmas tree and my dad said we would take
    the last family picture before he had to turn in all the cameras, swords and everything into the police station. And he
    was developing his own pictures at home in the bathtub. He would do it in the bathroom, a dark room. So that's one of
    the last pictures we had all dressed up.
- speaker: Interviewer
  text: That's incredible. This changes a lot, just looking at the photo that way.
- speaker: Respondent
  text: So I was in the third grade at the school down the hill. And in third grade, I had to leave for camp. It wasn't until
    we came back and we were finished with high school, there was a high school event, gathering. And one day, a classmate
    saw my name is Lily Oki and she was surprised she says, 'You know I asked my mother; you disappeared, you didn't come
    back to class, to school.' And someone remembered me all those years? I thought my gosh, it was touching but she said
    I guess no one talked about it.
- speaker: Interviewer
  text: So you just left and the teachers didn't explain?
- speaker: Respondent
  text: Just didn't say anything. I thought for someone to remember you, she said she wondered what happened, I just disappeared,
    I didn't come to school anymore. I guess no one talked about it. So I thought everybody went to camp somewhere, but I
    found out it's just the West Coast. So I thought everybody on the East Coast went to camp.
- speaker: Interviewer
  text: But you knew it was just Japanese people?
- speaker: Respondent
  text: Yeah at that age I knew it was just the Japanese because of the war. Well, I know when we came back going to school,
    a lot of people used to say, 'Hey Jap, get back home,' or 'We don't want you here,' kind of thing, you know? So I used
    to go home on a hillside, you know finding hiding places to go back on because you were scared. They would throw rocks
    or do things, you know. I mean they were all kids, your classmates so-to-speak. So I guess we weren't wanted right away.
    We didn't come back right after the war because we went to Pomona Assembly Center. So my mother and brother, we went down
    to the place where the bus came down by Alvarado and Sixth Street, isn't it?
- speaker: Interviewer
  text: It's called MacArthur Park now.
- speaker: Respondent
  text: We went by bus and my father drove his work truck, and they said he could bring it in and he took my mother's sewing
    machine because we could only carry what we had on, that was all we could take with us. So my father took my mother's
    sewing machine and some of the goods that we might need. The rest of the stuff we had to put under the house basement,
    what we could keep.
- speaker: Interviewer
  text: He was allowed to take his truck into the assembly center?
- speaker: Respondent
  text: Yes. He had to drive it in and then, you can't keep the car there. So he said he had to sell it for ten dollars. What
    could we do with a car? I mean, we couldn't bring it back again. But my mother had her sewing machine so she was able
    to make curtains for our rooms. Little things like that. She didn't do too much sewing for boys things but she made all
    my clothes.
- speaker: Interviewer
  text: She was resourceful bringing in her sewing machine.
- speaker: Respondent
  text: I guess so, I don't think everyone had those kinds of things.
- speaker: Interviewer
  text: I've heard of a few people smuggling in a sewing machine but it sounds like that was pretty open for your family,
    like they were allowed to do that.
- speaker: Respondent
  text: We knew Pomona because we used to go to their fairground every year. It was in the parking lot. I realized because
    they had a main street with eucalyptus trees planted. They must have put fence around it to make it into a temporary camp.
    So all we had was our little room. They called it an assembly center, I don't know why.
- speaker: Interviewer
  text: So if you were going to start at the beginning with this Christmas picture almost, can you describe what your parents
    were doing at the time and what was your life like before the war broke out?
- speaker: Respondent
  text: He was a gardener and Mother was just a domestic. Mrs. Long I know was an artist, and she worked for her, and she
    helped her a lot. And my dad was a gardener. So he came around Larchmont and I didn't know where it was as a kid, you
    know. So he was working down on those fancy homes with front lawns because he's talking about cutting grass on the front
    lawn. She worked at a doctor's home, but otherwise she was home.
- speaker: Interviewer
  text: And were they themselves Issei?
- speaker: Respondent
  text: My father be Issei but my mother be Nisei. She was born in Long Beach. But I guess when she was about three or four,
    her father was a restaurant cook. When the children were ready to start school, he realized if he doesn't let them go
    to a Japanese school or a decent school in Japan you will never be able to marry right or go into the right family, that
    kind of thing. So he took all the family home.
- speaker: Respondent
  text: So my mother's side, she had a brother, Setsuo, was he younger or older? He used to live with us all the time so I
    used to always look at him as Superman. He used to do judo. So he was husky, and he looked tall and big and handsome.
    After the war, I guess he went home on the last ship. I guess they said his mother was ill, come home immediately. They
    must have known that the war was going to begin. And he took the last ship home.
- speaker: Interviewer
  text: So he was over there during the war but before he was living with you?
- speaker: Respondent
  text: He was here. I don't know how long he was here but I remember making mochi things like that down on Sunset. But he
    did judo, so he was a strong man, so I always looked up to him as a superhuman. But he did take the last ship home and
    that's the last we heard. We had no further contact because you couldn't write or anything.
- speaker: Interviewer
  text: No correspondence.
- speaker: Respondent
  text: No, you couldn't correspond or anything. I guess he said he was taken into the Japanese army immediately and because
    he spoke and read English; it was an advantage to them. He was sent to Burma and that's where he got malaria, that's where
    he was. He looked scrawny when I went back to Japan to meet him for the first time with the family after the war. He had
    all this curly hair. I thought it didn't look like my uncle at all. But I guess after his malaria illness, his whole body
    got small and changed.
- speaker: Interviewer
  text: What prefecture were your parents from?
- speaker: Respondent
  text: My father's from Etajima. But my mother's Hiroshima, the city of Hiroshima and Hiroshima-ken. That's where they dropped
    the atomic bomb but they were on the other side of the hill. There was an old house from long ago but there was a little
    mountain and on the other side was Hiroshima city, and this side was a little bit country. And that's where they lived.
    Maybe that's why they were protected from the atomic blast or energy.
- speaker: Respondent
  text: My dad worked up north toward Modesto or some place? I guess there was a lot of farming. And then my father became
    ill, something with a stomach thing and he couldn't go to the hospital here. So he finally came home and since then he's
    been never strong with his stomach, he'll get sick easy. And when he came home he was there in Japan for a while, and
    that's where he met my mother.
- speaker: Interviewer
  text: Was that arranged at all?
- speaker: Respondent
  text: No it wasn't. As far as I know they were introduced by a friend, another family friend, Morioko-san. And I guess Pop
    liked her. I don't know, he wanted to come back to America. And he came back and left mom there, she was still going to
    school.
- speaker: Interviewer
  text: There was a big age difference. There was like a 15 year age difference. She was a teenager still when they met. I
    think my great-grandmother was 16 or 17 when my grandma was born.
- speaker: Respondent
  text: Yes, she was young. The age difference was quite a bit.
- speaker: Interviewer
  text: So your father came back. Or did they come back together to California?
- speaker: Respondent
  text: No, my father came back after he got this bad illness in his stomach, he wanted to come back. But he was introduced
    to my mother in Japan. And she said it was embarrassing when she was betrothed to someone but he didn't care to come back,
    she didn't think that he would ever earn enough money to come back after her. So one day she just told her father she's
    going to America and she got on the boat herself, somehow. And she came to America to look for him. And they got married
    actually at the place where I was born. He was in his gardener's clothes that he was working in and they just got married
    there. So my mother used to feel so sad when you'd see all the new weddings that we were doing and the children were having.
    And they had a minister come and marry them so they could live together.
- speaker: Respondent
  text: And Mrs. Marshall, I guess she was awfully good to my parents because every Christmas we always went to her house.
    And I still remember the stairs though, it was funny. It was on the hillside and you had to climb up stairs to their house
    level. But she had a wooden stairway all the way up to her house. And we lived down the stairs. And my mother was saying
    that Mrs. Marshall taught her how to play the piano and cook, taught her English, and did a lot of things for them. So
    every Christmas we would go visit her, take some Christmas gifts and visit them. I always remember the stairs. My mother
    used to say I used to climb up the stairs but I never could come down. I was scared to come down, so I would be sitting
    up there crying. So she said she had to go and get me every time, she said she was with her second child, my brother.
    So she said it was it was getting to be awful.
- speaker: Respondent
  text: She said that she used to lock the door but I'd be gone again. I used to go and love to pick flowers, she said. I
    don't remember that but I go down the driveway and go up the street on Virgil and go up to people's backyards. And I guess
    I was just picking them, I was breaking all the stems, bending the flower stems and the neighbors were getting so upset
    but she said she couldn't watch me. So she put a hook on the door but she said somehow I found a way to open it, so she
    kept putting the hook up higher and higher to the top of the door.
- speaker: Interviewer
  text: She was trying to keep you in.
- speaker: Respondent
  text: Yeah to keep me in from always going out, running out again, or whatever work she's doing around the house. And I
    guess, she'll find a broom on the floor. I found a way to knock it open. I used to sneak out and she said she had to go
    look for me she'll find one sock here, somewhere down the sidewalk she'll follow the shoes. And she'll find another sock
    somewhere else. And she said she always followed my path only because I didn't like to wear shoes and socks for some reason.
- speaker: Interviewer
  text: It's like a game between you two.
- speaker: Respondent
  text: I drove my mother nuts. She said I really was too rambunctious. You kept her on her toes. She must have been tired.
- speaker: Respondent
  text: Yeah it was too much for her and I guess she had a big stomach, so it made it harder.
- speaker: Interviewer
  text: And how was the relationship between your parents? Did they have a good marriage?
- speaker: Respondent
  text: I think so but my father was much older than she, but they were introduced by a family friend in Japan but because
    he never came after her she said it was embarrassing. They were sort of like betrothed.
- speaker: Interviewer
  text: Were they still corresponding though?
- speaker: Respondent
  text: I think so. I can't figure it out how she would have known where to go. But she said she was stuck at Terminal Island,
    after you get off the boat for so many days, I don't know for inspection or whatever. But she said she was terrified but
    Pop didn't come after her for three days or something, and she was very upset.
- speaker: Interviewer
  text: Did they explain to you and your brother what was happening after Pearl Harbor? You were very young but did you know
    there was something wrong?
- speaker: Respondent
  text: We didn't know, we heard something about maybe a war starting.
- speaker: Interviewer
  text: When you were in elementary school before you left, were there other Japanese students?
- speaker: Respondent
  text: No, I was the only one in my class. So the teacher probably didn't say anything and probably my parents never went
    down to tell them either.
- speaker: Interviewer
  text: You just left.
- speaker: Respondent
  text: Yeah, I was just gone. The parents probably never talked about it, you know? Because of the war. After I came back
    though, after the war ended and I was now ready for junior high school not grammar school. And they'll call you 'Jap.'
    You're trying to find a way to come home, so I found all kinds of hideaways, bushy places. There was a stairway. It's
    also almost half covered with trees and bushes that you could hardly tell, and I used to go sneaking up those stairs to
    go home. Yeah, all the students walking to school say, 'Hey Jap you don't belong here.' Or they'll throw rocks at you.
- speaker: Interviewer
  text: And were you still the only Japanese when you came back or were there other Japanese students?
- speaker: Respondent
  text: No, not in my particular school area. Maybe if I was in Boyle Heights or something it'd be different, maybe. But where
    I was was all Caucasian.
- speaker: Interviewer
  text: You were picked on.
- speaker: Respondent
  text: Yeah, because I was the only Japanese. So what's sad was down below on Sunset Boulevard, there was A&P Market and
    there was also a grocery
