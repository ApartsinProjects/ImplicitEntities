collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: Our family was Christian, a Christian home. Father was a physician. He was born in Tokyo when it was still called
    'Yedo,' and one of the first graduate-class of Chiba Medical School; Chiba Medical University of today. He took an exam
    for the military academy held for the first time of its kind in Japan, while he was still at the Yamaoka Tesshu's. In
    his youth he had pleurisy, that's what I heard, and because of that he couldn't pass the exam, even though he passed the
    written tests. Being a stouthearted man, he then told the examiner that he was all well at the time, but he still couldn't
    pass the physical exam. In the following year he was enrolled into the Chiba Medical School when it was founded. He would
    often tell us that it was better for him to have become a medical doctor than a serviceman. The one who passed the military
    academy's exam was the man with the poorest record among the students, called 'shosei' in those days, at the Yamaoka Tesshu's
    private school. When this man came to our town sometime later, I don't quite remember whether it was for maneuvers practice
    or what, he already had it made to a Lieutenant general himself in his rank. The town has become a city now, but being
    an ordinary doctor there, he would tell us, "I used to be with him, and he is now a lieutenant general. I have to be grateful.
    It's God's grace that I am what I am; a medical doctor." That was how my family was.
- speaker: Respondent
  text: She was not a Christian. I suppose she must have been a little bit hesitant about marrying a Yaso at that time, and
    so she didn't come to church in the beginning. We learned later on, when we all grew up, that she was finally led to be
    a Christian. Such was our life. So, all the children, myself at that time, we were affiliated to the Nihon-Kirisuto-Kyokai,
    it's Presbyterian here. A missionary used to come from time to time to our church; Kogisho, equivalent of Mission. Such
    was my father, and he invited a minister from Tokyo, and then the whole church was on the go.
- speaker: Interviewer
  text: When was your father introduced to Christianity?
- speaker: Respondent
  text: Around the 45th year of Meiji. He was still a Yedovst at that time. At one of the bookstores in Nihonbashi he found
    "Pilgrim's Progress" and the Bible both in classic Japanese. He probably read "Pilgrim's Progress" first, and then the
    Bible. The freedom of faith was not yet recognized in Japan at the time. He talked to Yamaoka Tesshu, his sensei, about
    the books. And he told my father in reply, "It's good to have a faith, but don't tell anybody about it now." Such was
    the time. After graduating from the Medical School in Chiba, we set up his practice in Kemigawa, now a part of Chiba City.
    But being a Christian practitioner, he started losing his clients gradually, for people were afraid of Yaso to a point
    where they suspected that a Yaso doctor might give them poisonous drugs, or do some harmful things to them. Anyway, no
    patients came to see him in the end. In those days there was such an epidemic as dysentery and others in Japan. And yet
    there weren't many doctors around at that time, because my father was only one of the first few of Western-trained doctors.
    He managed to make his living being assigned to those epidemic areas. Then later on he came to Kisarazu, and made a prison
    doctor. And also he was appointed to be a courthouse doctor. So, he was a doctor of that kind in those days. I can recall
    the time he was a prison doctor, and later on he became a regular practitioner in the town at the same time. The technical
    skills is what counts with a doctor, and by then people began to have education and know more, and so gradually—whether
    the doctor was a Yaso or not made less difference to them—came to see my father.
- speaker: Interviewer
  text: Chinese-trained doctors were much more popular in those days, weren't they?
- speaker: Respondent
  text: Yes. My father was of the class of the first graduates as far as the Western-trained doctors were concerned. Such
    was the day. I remember there was a Chinese-trained doctor, well, just one in our town. Anyhow, my father was one of the
    very first ones in the field. Our family being in that way, we know very little of the Japanese custom, that is, the custom
    that has to do with the Shinto shrine and/or the Buddhist temple.
- speaker: Interviewer
  text: What's your school educational background?
- speaker: Respondent
  text: After an elementary school in town, I studied at a women's school for four years, then came to Tokyo. Being a doctor,
    my father went to lots of different places, and knew that—having seen some women's school graduates nursing their parents—those
    with a degree only in home economics were of little help in his field. So I took an exam to a hospital of obstetrics and
    gynecology, where I eventually obtained a certificate of midwife, and then later became a registered nurse. That's why
    I came to Tokyo. I used to be a rather quiet and shy girl, although now I am this way—well, Koga was and still is very
    lively, but I wasn't—but anyhow it was even hard for me to believe that I actually did go to such a place myself, and
    I became a supervisor of the dormitory with around sixty to sixty-five nurses. Some were to become registered nurses,
    and others only midwives after this school. At any rate, I became the supervisor of that dormitory. Given such a position,
    I attended the people of high-class from Tokyo at the time of childbirths, and in the case of operations, I was usually
    served the big ones. Probably because of my father's influence I knew more than average students there, and I was like
    that in a natural way without myself noticing it. I was very quiet and didn't talk much, so people there were surprised
    at first that, beside being the supervisor of the dormitory, I was involved in those things despite the presence of some
    senior co-workers there. After three to four years there, I came over here.
- speaker: Interviewer
  text: What is Kasei-ka?
- speaker: Respondent
  text: You learn about housekeeping and things of that sort.
- speaker: Interviewer
  text: Something like home economics, then?
- speaker: Respondent
  text: That's also included. You see, at the women's school in Japan at that time you take courses of that nature in general.
    It's a little bit higher education than the elementary level. That's what I took.
- speaker: Interviewer
  text: What is your maiden name?
- speaker: Respondent
  text: Makino. Father was Makino Tomozo, and knew the Rev. Masahisa Uyemura very well. Before I came here, I was at the Uchimura
    Kanzo's for more than full two years. I was invited to do some work at the Kenkyu-sha, which was publishing Seisho-no-Kenkyu
    (The Study of The Bible). My older brother was going to the meetings there, he was a student at the Meiji-gakuin then.
    While I was there, a lot of things happened.
- speaker: Interviewer
  text: How many brothers and sisters do you have?
- speaker: Respondent
  text: Five of us; three girls and two boys. I am the third from the top, so two older ones I have; a sister and a brother,
    who served at Rekisen Church at Koishikawa after Meijigakuin, and later on he worked for an Independent Church in Hokkaido.
    Ever since he has been on his own in independent evangelism. He turned to eighty-two at the end of last year, yet he is
    still in on it. Then follows me, and Koga's mother. The youngest one became a medical doctor in Tokyo having succeeded
    to the family business. Each one of us has a Christian family.
- speaker: Interviewer
  text: What kind of things do you remember in your young days? Trends and the situations of the society, wars and so on and
    so forth?
- speaker: Respondent
  text: When I was eleven or twelve, or maybe ten or eleven, the Russo-Japanese war broke out. Russia was Greek Catholic,
    unlike the present day, and people at that time said Yaso's are no different from them, thus we were persecuted in Japan,
    well, maybe the same thing might have happened this time, too. So, as to visits to patients in the outskirts of the town
    my father had to ask for special alibis but other than that he went out on foot all over. I felt sorry for jinrikisha
    drivers. At the times of town festivals people carry a mikoshi, don't they? Well, at such debauchery with a help of over-exciting
    atmosphere they knowingly knock the mikoshi against the eaves of our house, or break the glasses of the front doors. The
    townspeople who were in charge of the festival knew what was happening; to them we were only Yaso's also. Even so, they
    couldn't just leave it all alone, therefore, they came and stood in a line right in front of our house, and told my father,
    "Very sorry. It was because of the lack of supervision on our part. Please let us pay for the repair." I still remember
    father sitting at the front door and replying to them by saying, "No, never mind at all. We will take care of it." Later
    a man from a glass shop in town came and fixed it. Then, when we were about to pay him the fee, he said, "They are going
    to give me a scolding if I accepted it from you." And he just ran away home. This is only one example of the many. In
    my own case, I was thrown stones at while going to school. Even snakes, which I hate most, were thrown at me. After all,
    it made me feel reluctant to go to school any more, I was only ten or eleven years old. And so in the mornings my parents
    prayed special prayers because of this and so did I myself. I should think there aren't many people in this country who
    had similar experiences as I did. Nor in Japan, either, for there were only a small number of Christians at that time
    in Japan. When this kind of hard days come, some Christians begin to obscure what they are. My father, contrary, made
    his stand very clear even in those days, and my mother followed him.
- speaker: Interviewer
  text: What sort of enjoyable things do you remember in the days of your youth?
- speaker: Respondent
  text: '[No direct answer in transcript]'
- speaker: Interviewer
  text: Now what were your motivations behind your coming here?
- speaker: Respondent
  text: The reason why I came to America was, of course, because of the faith. This is a Christian country; I have the same
    Christian faith, so did my parents. Father had a lot of clients in Japan as a doctor, but he wanted Christian clients
    by all means, and it was the biggest reason of all. I was doing several different things, yet did not have good health.
    My younger sister, Mrs. Koga, was better in this respect. When she got married, I was in Tokyo. They said either one of
    us could come and she did in the end. I liked Tokyo when I was still young, rather than coming to America. I wanted to
    be one of the Tokyoites myself. Therefore, I didn't have any intention whatsoever to come to America even when the matter
    was talked about around me. My husband and Koga—Mrs. Koga's father—were real good parents; and through him my father apparently
    trusted Mr. Igarashi. So he came to meet me in Japan. My elder sister was very reluctant to see me go away, but Koga finally
    withdrew her feeling saying that since he had come to meet me, I came over here. Before all these, I could've come with
    some VIPs that were Igarashi's relatives. For example, Mr. Kikujirô Ishii, ex-Minister of Foreign Affairs was a friend
    of my cousin's in their childhood, though their ages are different. He also was close to Igarashi's parents. Originally
    I was to come with him to America, but he had to go to London as an ambassador, not via Hawaii. Because of this my departure
    from Japan was delayed. Next one was Mr. Tasuku Harada—president of the Kyoto University and he was about to come to Hawaii
    to take up the president's post at the Hawaii University. He said he was coming up till Hawaii, but I thought if I had
    to be on my own from there. If Mr. Igarashi was going to come to meet me and if both of us could leave Japan together,
    and he did come to Japan. Around that very time The World's Sunday School Convention was held in Poke, and Mr. Igarashi
    came for that as one of the delegates. The timing was good, and so we married in Japan—at our church—and after that I
    came here.
- speaker: Interviewer
  text: When was it?
- speaker: Respondent
  text: The year was 1920.
- speaker: Interviewer
  text: I understand Mr. Mitsumori was also at the Convention. Do you know him?
- speaker: Respondent
  text: Yes, I know of him, although I didn't meet him. Mr. Igarashi and he came back together, I was told.
- speaker: Interviewer
  text: He also got married in Japan then, was that not?
- speaker: Respondent
  text: When I met him in Pasadena—last year or the year before—I greeted him, which reminded him of old days that passed.
- speaker: Interviewer
  text: Did you by any chance come directly home without stopping over at Hawaii?
- speaker: Respondent
  text: Although we were married in Japan, I had to get on board one boat later for some reasons. We stopped in Hawaii just
    for a while. I knew someone on board who was also coming over here. I asked Mr. Igarashi to come and meet me in San Francisco.
    Since we were already married in Japan and on the Christmas Eve of 1920 we came to Sacramento. Our Baptist Church was
    founded exactly one month before I came.
- speaker: Interviewer
  text: Do you remember the name of the boat?
- speaker: Respondent
  text: '"Shun-yo-maru." (''Shun'' of spring, ''yo'' of ocean.) There were a lot of people then who came on this particular
    boat.'
- speaker: Interviewer
  text: What kind of people were with you on board?
- speaker: Respondent
  text: Well, Mrs. Mihara of San Francisco, Tokinobu Mihara, was with me on the first class; following her graduation from
    the Waseda University, she came with her mother.
- speaker: Interviewer
  text: Weren't there many picture-brides also with you?
- speaker: Respondent
  text: Well, there might have been, but I'm not sure because I wasn't one of them.
- speaker: Interviewer
  text: Others might have been on the second and the third class section?
- speaker: Respondent
  text: Probably so.
- speaker: Interviewer
  text: Do you remember something interesting while on board?
- speaker: Respondent
  text: Well, I did not remember it, but Mrs. Mihara—Tokinobu's mother—told me a story. She was forty-five or forty-six years
    old at that time, she looked older to me probably because I was a lot younger then. I was with her at the Heart Mountain
    Camp during the war. When saying good-bye to everyone upon leaving the camp, she told me that—there was a record-player
    and some other things on the first class section—It came up to her and she went and listened, becoming good friends with
    her instantly. She also took other care of me. I don't remember any more but Mihara's mother told me that. A person whom
    I became little well acquainted with got off boat at Hawaii. Other than that and those people, I don't remember any. The
    rest were practically all white people, I mean, of those who came on the first class. Few Japanese.
- speaker: Interviewer
  text: Before leaving Japan, what was your idea about America?
- speaker: Respondent
  text: I never thought of such a matter. For me, I was told to learn English when I got there. Even for that it was an on-and-off
    thing because I ruined my eyesight after having a baby, ever since I haven't really mastered it yet, and that's how I
    am now more or less.
- speaker: Interviewer
  text: Then, when you landed here what was your first impression?
- speaker: Respondent
  text: There was a big Japanese town at that time. Japanese Issei's were very much there.
