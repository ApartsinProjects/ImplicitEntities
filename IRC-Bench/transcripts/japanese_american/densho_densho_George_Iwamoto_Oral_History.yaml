collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: There was this one American Indian guy who did a Native dance, and when he left he said something like, ‘Don’t tell
    anybody my name. Don’t tell anyone I did this.’ He kind of acted like he didn’t want to be there. I’m sure he was paid
    to put on a show.
- speaker: Respondent
  text: Their choices of clothes and provisions from the outside world was severely limited, due to the rampant prejudice.
    You could order from the Sears and Roebuck catalogs. The other ones wouldn’t take your order.
- speaker: Respondent
  text: My dad used to fish. But we didn’t have any equipment so he caught fish with his hands. He would walk along the stream
    and he would stick his hand in. First it was trial and error. He would grab them and they’d swim away but he found out
    if you cradled them and gently took them out of the water, they wouldn’t move.
- speaker: Respondent
  text: George’s “tank,” creatively made out of a wooden spool and piece of soap. We used to have races with it. Or play war.
- speaker: Respondent
  text: On receiving his redress, George expressed that the money didn't mean much to him, for he was just a child and relatively
    shielded from the atrocities at hand. The people most deserving people of the apology, like his parents, had already passed.
