collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Did you have something at your church?
- speaker: Respondent
  text: Yes, we had a thanksgiving party at our church. Three people received awards at that party. There were seven elderly
    people over eighty. Unfortunately I could not attend the party because I was sick.
- speaker: Interviewer
  text: Do you have a prospectus of this project with you?
- speaker: Respondent
  text: Yes, I do. There is also an Issel project at UCLA. This is one of Sacramento.
- speaker: Interviewer
  text: Your church in Sacramento is fairly old, right?
- speaker: Respondent
  text: It was founded in 1920. That was called Japanese Christian Church. But I understand that even before that in 1912,
    a minister by the name of Rev. Koga worked at the Japanese Mission. Do you know about Yamato Colony?
- speaker: Interviewer
  text: Yes. It was founded by Mr. Kyutaro Abiko of Nichibei through hardships. Mr. Abiko, too, embarked upon the newspaper
    business. Nobody would have lost in this business then. The circulation of Japanese paper is now fixed, but people then
    kept coming in from Japan as immigrants. There must have been quite a profit. Mr. Abiko invested all that he earned in
    the colony. Those who worked for the paper must have sacrificed for him. It was a great achievement, though. Some people
    who bought the land in the colony died in the process of building up the colony. It is now a fine ranch, although there
    used to be coyotes. The land was not only sandy soil but they did not have enough water, either. They started the colony
    despite all these. They must have struggled with difficulties. Quite unexpectedly, they were all Christians.
- speaker: Interviewer
  text: Is that right? Was Mr. Abiko a Christian, too?
- speaker: Respondent
  text: Yes, Mr. Abiko was one of the founders of Japanese Christian church. He was a man of conviction and one of the leaders
    in Japanese community here. He recruited people and sold land in lots. There was also a plan to make a colony by the state,
    but it failed. It is not easy to cultivate the land and establish a colony. You have to have a strong will and conviction.
    The whole area is now well cultivated and the soil has improved greatly. We are proud of this Japanese colony in the United
    States.
- speaker: Interviewer
  text: May I start the interview now? Will you mind telling me your name again?
- speaker: Respondent
  text: My name is Shichinosuke Asano.
- speaker: Interviewer
  text: Where were you from?
- speaker: Respondent
  text: I am from Morioka, Iwate Ken.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born on November 29, 1894, the 27th year of Meiji. My birthday will be the day after tomorrow.
- speaker: Interviewer
  text: How old will you be?
- speaker: Respondent
  text: I will be seventy nine.
- speaker: Interviewer
  text: That's great.
- speaker: Respondent
  text: I myself do not feel at all that I am that old. I still feel the same way as I did when I first came to the United
    States. However, people around me treat me as an old person.
- speaker: Interviewer
  text: When did you leave Japan?
- speaker: Respondent
  text: It was 1918. I was 23 years old.
- speaker: Interviewer
  text: I would like to ask you about the time when you were still in Japan.
- speaker: Respondent
  text: I was nineteen when I left my home town. I went to Tokyo, looking up a person who was senior to me in my home town.
    I went to school while I worked as a doorkeeper at his place. It was when I was 22 years old that I started to think I
    liked to come to the United States. My brother was here already. Then, I started working for the Tokyo Maiyu newspaper.
    I worked for this newspaper office for about a year. There is no such a paper now. As an evening paper it was doing pretty
    well in those days. It was arranged that I would come to the United States as a special correspondent of this paper.
- speaker: Respondent
  text: There was a new treaty with the United States and nobody was allowed to emigrate. Those who were allowed to go abroad
    were students, newspaper correspondents, and international merchants. It was rather difficult. To gain prestige, I decided
    to come over here. Fortunately, I had my brother here. Thus, I finally came over here but I gained rust rather than prestige.
- speaker: Interviewer
  text: What kind of school did you go to?
- speaker: Respondent
  text: I went to Seisoku Preparatory School first and then entered Chuo University, although I quit halfway. I worked for
    the Tokyo Maiyu Office until I left Japan at the age of 23. By the way, my older brother is a fine, pious man. I still
    respect him most.
- speaker: Interviewer
  text: How old is he?
- speaker: Respondent
  text: He is already eighty-eight years old. He will be eighty-nine next year. In Morioka he worked for the prefectural government.
    He used to practise Kendo and built up his constitution by playing sports.
- speaker: Respondent
  text: There were so many Japanese who wanted to come over to the United States at that time. We, too, wished to come over.
    My brother thought that he had better learn English if he wanted to come to the United States. Thus, he started going
    to a missionary to learn English. He used to drink and smoke, but after going to see this missionary he quit both drinking
    and smoking.
- speaker: Respondent
  text: When he came over here, he went to the countryside. Thus, I secured a footing by which to come to the States. We planned
    to work together for a while, save money, study and go back to Japan. We never thought of staying in the United States
    permanently. Somehow, however, I failed to go back to Japan.
- speaker: Respondent
  text: In those days, Japanese who came over here as an immigrant or as a student did not have any idea of residing here
    permanently. They all planned to go back after they made money or finished their study. The standard of life to them was
    one in Japan.
- speaker: Interviewer
  text: Let me go back to your earlier period. Do you remember any incident during your elementary school, high school or
    college days?
- speaker: Respondent
  text: I cannot remember much of my school days.
- speaker: Interviewer
  text: Do you remember your teachers?
- speaker: Respondent
  text: Yes, I do a little. Anyhow I studied hard and wished to come to the United States. As for my newspaper work I used
    to stop at the office of the Seiyukai, the largest political party at that time, every day. I brought back some news to
    be reported to the newspaper office.
- speaker: Interviewer
  text: What did your father do then?
- speaker: Respondent
  text: He was a businessman and manufactured candles and hair oil. We did not have electricity yet and used candles. When
    we went out at night, we used a candle in a lantern. My father was a wholesaler.
- speaker: Interviewer
  text: How many brothers and sisters do you have?
- speaker: Respondent
  text: There were seven children in our family. To be exact, it was eight because the last one died before it became a year
    old. I am the seventh child. The brother I talked about earlier is the fourth one. Five out of seven children have already
    passed away. Myself and this brother are the only ones still alive. It may be because the climate here and hygiene are
    good for our health. We must have built up immunity from disease. All my other brothers and sisters died from some sickness.
    In Japan public health is very poor.
- speaker: Interviewer
  text: What was your family's religion?
- speaker: Respondent
  text: My family's religion was Zen Buddhism. Zen Buddhism was quite popular in Morioka. My brother, the fourth one, became
    the first Christian in my family in Morioka. He is in Utah now.
- speaker: Interviewer
  text: Did you hear about Christianity before your brother became a Christian?
- speaker: Respondent
  text: Not much, although I was aware that there were Catholic nuns then. When I was little, I used to follow them around,
    and say bad things to them.
- speaker: Interviewer
  text: Why did you come to the United States? Was it because of your career in newspaper or for political reason?
- speaker: Respondent
  text: I did not have anything to do with politicians directly, although I wished to become a politician in the future. Because
    I was exposed to great people in that area every day, I felt that I had to study more to become like them. However, to
    become like these men I had to have more learning. They seemed to be so unreachable. I, thus, decided to gain prestige
    by coming to the United States.
- speaker: Interviewer
  text: Did you come to the States by boat? I guess it was the only way of transportation in those days. Did you stop in Hawaii?
- speaker: Respondent
  text: I stopped there briefly on my way here.
- speaker: Interviewer
  text: Were there all kinds of people aboard?
- speaker: Respondent
  text: Most of the passengers were Japanese. Quite a few brides were aboard at that time. It was the time when marriage arrangement
    by pictures was still popular. There were quite a few women who were going to get married in the United States. Picture
    brides were later abolished.
- speaker: Interviewer
  text: How did you feel toward these picture brides you met on board?
- speaker: Respondent
  text: Since I was used to watch rather refined young girls in Tokyo, I wondered how those girls from the countryside who
    did not know good manners would adjust themselves to American life. But I suppose that some of them made it all right
    and had some fine children. I know one of these women. That family has a bicycle shop in Fresno.
- speaker: Interviewer
  text: I know that you were able to get education. How about other people? I understand even men did not have much education
    in those days.
- speaker: Respondent
  text: Most Japanese men came to the United States at that time to earn money. Immigration was then prohibited. There were
    also some merchants, students and ministers. So-called laborers were unable to come in those days. A lot of picture brides
    for laborers were also coming.
- speaker: Interviewer
  text: I understand that there were quite a few number of incidents about marriages arranged by pictures.
- speaker: Respondent
  text: I heard some tragic stories. Although they seem to be settled down now, some men pretended as if they were very successful
    over here instead of receiving their new brides sincerely. Some men even put moustache so that they would look dignified
    and sent their photos. Thus, some women found their husbands rather different from what they expected. A lot of Japanese
    workers who looked successful were so-called blanket laborers. They did not live in a certain place, but went from one
    farm to another, looking for jobs and carrying their blankets. So, they couldn't possess many things. There were jobs
    all year around; pruning trees, planting seeds in the farm, etc. Thus, they wandered from one place to another for jobs.
    We used to call this blanket labor.
- speaker: Interviewer
  text: What was your first impression of the United States when you first landed?
- speaker: Respondent
  text: I was not particularly impressed with her, but I found her more advanced and culturally superior than what I expected.
    Although I had seen almost everything in Tokyo before I came over here, I noticed a lot of things here such as better
    roads. I suppose Tokyo then was not quite developed yet. I came to America about the time when they finished the construction
    of a new tall building called Kaijoh Biru in front of Tokyo Station. However, I found a building like that all over here.
    I thought it was a tremendous building when I was still in Japan. I was surprised to know how culturally developed the
    United States was.
- speaker: Interviewer
  text: What did you do first in the States?
- speaker: Respondent
  text: I went to my brother's. He was then in Central California. He had his own land and was engaged in farming. I developed
    an interest in farming and worked with him. We soon decided to grow seedlings for olive trees since they were not available
    in those days. We must have planted about 200,000 cuttings in hot beds. We started in winter and the budding in spring.
    We then transplanted them in the field and grew them. Thus, we planned to earn a lot. We made hot beds and worked really
    hard.
- speaker: Respondent
  text: I don't know how I could work so hard even though I didn't have such a labor experience. With about 200,000 seedlings
    we were able to get 60 or 70,000 cuttings, although we did not have any experience. From the beginning we had a contract
    to sell 20,000 seedlings. So, we had a good prospect. Since we did well with seedlings and the price was good, we thought
    we would do well.
- speaker: Respondent
  text: However, the price of grapes went up all of a sudden. The reason was that it was priced at two cents per pound, but
    the price went up more than twice as much. For this reason, those who used to grow and sell trees in Fresno area turned
    up the ground and started growing grapes. While it takes five or six years to harvest good sized olives, you can harvest
    some grapes in the second year.
- speaker: Respondent
  text: Therefore, we were unable to sell olive plants even though we had good plants. However, the price of live cuttings
    did not go down. We could not make any money by selling 100 or 200 plants as we had thousands of them. While we were having
    a difficult time selling them, the year was over and they grew rapidly. We could not sell them as seedlings any more.
    We, therefore, had to dig them up and cut the part of them in order to keep them small. Thus, we completely failed in
    olive business. I gave up the idea and went to San Francisco.
- speaker: Interviewer
  text: Was it the following year?
- speaker: Respondent
  text: No, I was there for about a year and a half. I carried blanket also for about a year. After I came out here in San
    Francisco, I wanted some experience as a school boy. I must have stayed with one family for half a year as a school boy.
    While I was working as a school boy, Hara Sensei came from Tokyo. I was then writing articles for the paper, Shinsekai.
    Because of this, I was asked to work for the Nichibei Times.
- speaker: Interviewer
  text: Did you write articles for the paper Nichibei Times?
- speaker: Respondent
  text: No, it was the paper here.
- speaker: Interviewer
  text: What kind of articles did you write?
- speaker: Respondent
  text: I wrote about my memories on Hara Sensei for the Shinsekai, but the offer came from the Nichibei Times. Although I
    used to work for the newspaper before, I felt I was not qualified. First of all, I didn't have a good command of English.
    I felt it was a little bit tough for me to work as a newspaper man in the United States when my English was not perfect.
- speaker: Respondent
  text: However, I was told not to worry about English because I could even learn it after I started working for the paper.
    I was further told that my assignment would be to interview those noted people who came to visit the United States from
    Japan by boat in those days, and to write articles about interview with them. As I used to know quite a few noted people
    in Japan, I felt confident about writing such articles. Thus, I became a member of that press. I worked for them a long
    time.
