collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: My name is Gen Goto.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Fukushima Prefecture.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was born in 1899. I am 76 years old now.
- speaker: Interviewer
  text: What did your father do in Japan?
- speaker: Respondent
  text: I was born in February, and father came to America in July of that year. Before I graduated from junior high school
    mother came to America by a ship to join her husband. She was separated from father for 13 years. I went to Tokyo to attend
    Iwakuni Railroad School, but as that school was not recognized by the Ministry of Education I could not go to a higher
    school, so I attended a high school. When I graduated from high school and was thinking about going to college, my father's
    farming partner came back to Japan and asked me to come to America. That is how I came to America.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: I was 18 years old.
- speaker: Interviewer
  text: How was the life in Japan without your father?
- speaker: Respondent
  text: I was 5 months old when he left home so I did not know his face, but my grandparents took good care of me, so the
    life was good.
- speaker: Interviewer
  text: What kind of a person was your mother?
- speaker: Respondent
  text: She was such a model woman that she was written up in the newspaper.
- speaker: Interviewer
  text: What did the newspaper write about her?
- speaker: Respondent
  text: She was a virtuous woman who took good care of her in laws, and also worked like a man in the field as grandfather
    was old. When her story came out in the paper, our neighbor sent a copy to my father. In those days many Isseis in America
    gambled, and so did my father, but when he read that paper he thought he was wrong, and he quit gambling right away. I
    heard that it is hard to quit gambling, but as my father quit it completely I admire him for that.
- speaker: Respondent
  text: I came to America not to farm but to study. When I went to school they put me in the 4th grade of a grade school.
    I had studied calculus in Japan, but as girls said, "NO talk, no talk" to me I got angry and quit school after 5 days.
    It was the time the World War started and the business was getting brisk, so I thought I would make a fortune and started
    working as my father's partner.
- speaker: Interviewer
  text: Was your mother a gentle person?
- speaker: Respondent
  text: She was a stouthearted woman. I was an only child but she did not spoil me. Neighbors used to say, "Oshin-san, why
    don't you treat Kenchan with more love." But my grandparents spoilt me. When mother came to America 4 children were born
    in 4 years one after another. I thought my parents were doing well in America, but with 4 children and father changing
    land he leased year after year it was not easy. Yet they kept on sending me school expenses. I still shed tears of gratitude
    when I think about that. I thought my parents made good money in America, so I thought nothing about my parents sending
    me school expenses, but when I came here I was thankful to them for the first time.
- speaker: Interviewer
  text: Your father was a man of strong character, too, wasn't he?
- speaker: Respondent
  text: He was a very scrupulous and fastidious man. I did not want to farm but father forced me to do it, so it was very
    hard. In those days there were many yobiyose youth like me. As there was not much parental affection, 7 or 8 out of 10
    youths left their homes.
- speaker: Interviewer
  text: Where did you get on board the ship to come to America?
- speaker: Respondent
  text: From Yokohama. In those days there were strict examinations of Trachoma and roundworms. I had Trachoma before, so
    I failed the examination twice. If I failed one more time I was going to give up coming to America, but I passed. I came
    to San Francisco on Nihon Maru.
- speaker: Interviewer
  text: Do you remember things that happened on board the ship?
- speaker: Respondent
  text: Nothing much but I remember landing in Hawaii and bought banana. As banana was cheap another young man and I bought
    a big bunch of banana, took them back to the ship and ate them all before we arrived at San Francisco. I drank soda water
    for the first time in Honolulu. I cannot forget how good it tasted. When I was a student a bowl of noodle was 2 sen but
    I could not afford it, so I bought 1 sen worth of baked potato and shared it with friends in the dormitory.
- speaker: Interviewer
  text: What kind of people were on board the ship?
- speaker: Respondent
  text: There were many yobiyose people.
- speaker: Interviewer
  text: Were there many brides on board the ship?
- speaker: Respondent
  text: Yes, there were some. I came to Madera in 1920. In 1921 the picture brides could not come here any more, so my father
    told me to go back to Japan to find a bride. In those days there were Nisei women of marrying age but they were not suitable
    for us. We could stay in Japan only 2 weeks and had to find brides during that time. As I could not find one I was disappointed
    and was coming back when I found one. When I was coming back with my wife, Yokohama was full of young couples.
- speaker: Interviewer
  text: You married quite young, didn't you?
- speaker: Respondent
  text: I was not going to get married until I was 30, but I married at 25.
- speaker: Interviewer
  text: What year did you come to America?
- speaker: Interviewer
  text: Who found a bride for you in Japan?
- speaker: Respondent
  text: My grandmother did.
- speaker: Interviewer
  text: When you met your father for the first time in San Francisco, did you recognize him right away?
- speaker: Respondent
  text: I had seen his photograph before so I could recognize him. Later my father told me that when he took me around San
    Francisco sightseeing, I was not a bit impressed. As I lived in Tokyo, Marunouchi district was not much different from
    San Francisco so I was not surprised. My father used to tell his friends, "I showed my son around San Francisco thinking
    he would like it, but he was not impressed."
- speaker: Interviewer
  text: Did you call your husband, "Otosan" (Dad) then?
- speaker: Respondent
  text: I called him "Otosan" but not with affection. I don't think we should send away our children. In those days many Isseis
    sent their children back to Japan to get Japanese education. Doctor Okonogi of Fresno used to tell me, "People send their
    children to Japan, but that is out of the question. They may become great, but there is nothing worse than losing affection
    between parents and children, so don't send your children to Japan." As the years went by we feel more affection towards
    the parents.
- speaker: Interviewer
  text: When you came to America, where did you go first?
- speaker: Respondent
  text: I went to Selma first. Father was leasing land there, but as he did not get good results there we moved to Parlier.
- speaker: Interviewer
  text: What did he grow?
- speaker: Respondent
  text: Grape and peach. At Parlier he farmed 80 acres. When the World War I broke out he made profit. In those days we could
    not buy land because of the anti-Japanese land act, but he took all kinds of measures to evade the law and bought the
    land here. Many Japanese came to Madera in 1918 and 1919.
- speaker: Interviewer
  text: Did you come here then?
- speaker: Respondent
  text: We came here in 1920.
- speaker: Interviewer
  text: How many acres did you buy?
- speaker: Respondent
  text: Mr. Ishizaki and my father bought 100 acres as partners. There was no trouble for 7 years, but as children were growing
    older they decided to divide the land in two to avoid any trouble in the future, and each got 50 acres. Then the Depression
    came. Our side was all right as we had grape and my brothers helped, but Mr. Ishizaki could not manage it so he was going
    to abandon the land. If he abandoned the land we had to abandon the land or take over his land as there was one deed.
    One night our whole family got together and discussed what to do. With tears in his eyes my father said, "I came here
    after experiencing hardship in Hawaii, and built it up to what it is today. If we abandon this land I came to America
    for nothing. I am going to turn back the clock 10 years and try hard, so I want you to hold out." My brothers and sisters
    all agreed to do so, and gradually things got better.
- speaker: Interviewer
  text: Didn't you have a hard time during the Depression?
- speaker: Respondent
  text: Of course. Many people sold their land and moved to Los Angeles area as they could not make a living. We planted the
    grape saying, "Grape cost at least 3.5 cents a pound. We hope it will not go under 3 cents. If it is 3 cents we can barely
    manage to live." The price of the grape tumbled down to 35 dollars a ton at the lowest time. We could make a living because
    we did not hire people, but if we hired people we could not have made it. My brothers used to go to work as soon as they
    came home from school.
- speaker: Interviewer
  text: What was growing on the other half of the land?
- speaker: Respondent
  text: They had grape and apricot and other small things. The soil was not too good, so we put higher price on this half.
    We drew lots in front of a lawyer to decide which half to get, so there was no complaint. Most partners quarrelled and
    split, but we were partners for 7 years and we did not quarrel and split. We are still associating with each other.
- speaker: Interviewer
  text: What other problems were there besides the price of grape dropped?
- speaker: Respondent
  text: I could not make a living with grape, so I grew vegetables and took them to the market for 4 years. One brother went
    to U.C. Berkeley, and the other brother helped, so I gave him half of the land. We could not make a living on grape so
    we grew vegetables for 4 years. I picked vegetables and took them to the market at midnight. In summer we were stung by
    mosquitoes. If we could not sell all the vegetables I went around stores in Fresno selling the leftovers. Women were not
    in good mood if we didn't sell all, but they were in good mood if we sold all the vegetables. After I slept for about
    an hour it was time to get vegetables ready for the market. I did this for 4 years. When I think back on that time I am
    amazed how I could do that.
- speaker: Interviewer
  text: What kind of vegetables did you grow?
- speaker: Respondent
  text: Cucumber, burdock, onion and most any kind of vegetable.
- speaker: Interviewer
  text: What time did you get up in the morning?
- speaker: Respondent
  text: I didn't hardly sleep. In those days people from stores came to market around 1 a.m., so we had to be there before
    then. I stayed in the market till around 8 a.m., and if there were any leftovers I went to town to sell them. Sometimes
    I did not get home till 2 p.m. Then I slept about an hour. Of course the market is closed on Sundays so I slept, but I
    had to take care of vegetables even on Sundays. Not only vegetable but I had to take care of grape.
- speaker: Interviewer
  text: Then you didn't hardly sleep, didn't you?
- speaker: Respondent
  text: Yes, I am amazed at myself for working so hard as small as I am. I was young and strong then.
- speaker: Interviewer
  text: How many children did you have?
- speaker: Respondent
  text: I had 3 children. One son lives here and two of them live in Los Angeles now.
- speaker: Interviewer
  text: Did things gradually get better?
- speaker: Respondent
  text: Yes, it did.
- speaker: Interviewer
  text: What did you do about grape when you were growing vegetable?
- speaker: Respondent
  text: I was growing grape, too.
- speaker: Interviewer
  text: But you couldn't sell grape, couldn't you?
- speaker: Respondent
  text: Yes, we could. At grape harvest time we did not sell much vegetable as we were busy.
- speaker: Interviewer
  text: You couldn't live just on grape as the price was low, couldn't you?
- speaker: Respondent
  text: No, we couldn't. There were 10 people in my family. In those days they sold rice cheap before the New Years, so we
    bought 20 to 30 sacks of rice for the whole year. In those days we ate just rice. After we went to camp we learned to
    eat bread and drink coffee. Before the war people used to give us tea and coffee as return for obituary gifts. We had
    a shelf full of coffee, so we used to give them away. Now I eat rice only for supper.
- speaker: Interviewer
  text: Things became better, didn't they?
- speaker: Respondent
  text: Yes, it did. In 1921 Shinwa Kai was organized in Madera, and celebrated the New Years in the storage room. In 1923
    the Japanese Language School was founded. When I was 26 years old I was recommended as one of 3 directors of Fresno Japanese
    Association. Three young men from Central California were recommended for the post and I was one of them.
- speaker: Interviewer
  text: What kind of work did you do?
- speaker: Respondent
  text: I took care of Fresno Japanese Association, the work of the consulate, such as death and marriage reports. Also made
    efforts at the time of the Land Act, and worked as a mediator if there were trouble among Japanese. Since I was 26 until
    the war broke out I served as a director of the Fresno Japanese Association, president of the Shinwa Kai and principal
    of the Japanese Language School.
- speaker: Interviewer
  text: Were you the only director?
- speaker: Respondent
  text: There were two directors.
- speaker: Interviewer
  text: What kind of work did you do as a director?
- speaker: Respondent
  text: When the anti-Japanese Land Act came up in California Assembly we needed money to lobby in order to stop the passage
    of the bill. We also needed money to hire secretaries to do the work. When some prefectures in Japan had disaster we had
    to collect money to send to them. We had to collect donations for all kinds of things. We had 3 teachers for the Japanese
    Language School. When one of them quit we had to meet and discuss what to do. Before the war I used to attend meetings
    every night.
- speaker: Interviewer
  text: What other work did the Japanese Association do?
- speaker: Respondent
  text: We had to report the death, marriages as we were all Japanese citizens. We also had to buy land and make a Japanese
    cemetery. We had meetings all the time, but moreover we had to collect donation. At the time I came here Mr. Nakatsuchi
    was working hard for the Japanese Association. Whenever we saw him we used to say, "Mr. Nakatsuchi must have come to ask
    for donation again." Later I used to say, "You must be saying Goto must have come for donation." I don't know how much
    I walked collecting donation. Last year I received the Sixth Order of Merit.
- speaker: Interviewer
  text: How did you feel when Pearl Harbor was attacked?
- speaker: Respondent
  text: I thought, "They did it!" Before the war started Dr. Okonogi was angry at America for not selling oil to Japan. We
    thought, "Well done!" We shouldn't have felt that way as we owe to America, but we could not help feeling that way. Three
    days later the stand still order was out and it was posted on telephone poles. In May we were taken to the Assembly Center
    in Fresno and then sent to Jerome Arkansas.
- speaker: Interviewer
  text: What were you doing on December 7, 1941?
- speaker: Respondent
  text: I don't remember what I was doing.
- speaker: Interviewer
  text: Did you find out about the war that Sunday for the first time?
- speaker: Respondent
  text: I forgot, but when I found out about the attack I thought, "They did it!" and I felt good. It took 5 days and 4 nights
    to go from Fresno to Arkansas by a slow train. I thought the war would end in no time. When the train climbed to the top
    of Rocky Mountain I saw hundreds of people were gathered there. I found out that they were going to be trained for the
    winter flights. Then I realized that the war would last a long time. America started training soldiers after the war broke
    out.
- speaker: Interviewer
  text: Did you think the war would not last long because you thought Japan would lose the war?
- speaker: Respondent
  text: No, I thought Japan would win the war. I didn't think Japan would lose the war. I thought the Marines would run away,
    but I found out that Americans have American spirit just as Japanese have Japanese spirit.
- speaker: Interviewer
  text: What did you do with your land when you went to camp?
- speaker: Respondent
  text: I leased it to our neighbor with the agreement that I would receive one fourth of the profit. Fortunately, he was
    a good man, but when we came back our land was confiscated due to the Land Act. After we came back from the camp I worked
    7 years to kill the Land Act, but what helped dissolve the problem was the distinguished service of the 442 Battalion,
    so I am very grateful to those who died. Without them the land problem could not have been solved.
