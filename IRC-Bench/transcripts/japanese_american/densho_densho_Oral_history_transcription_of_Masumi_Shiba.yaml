collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: I was born in the city of Niimiya, Wakayama, on March 10, in the 26th year of Meiji. I have no recollection of the
    Sino-Japanese War. During the Russo-Japanese War, I remember the gay victory celebration. I have no impression of World
    War I because I was then in Japan and had no direct relationship with it. I read about the Manchurian events in the newspapers.
    The happy time was my school days, and I have never been visited by a calamity.
- speaker: Respondent
  text: My family was Christian. No, I didn't hear any rumour about Christianity. Condition of my family and society was peaceful
    when I left Japan. I graduated from girls' high school.
- speaker: Respondent
  text: The reason why I came to USA - my husband asked me to come to America.
- speaker: Respondent
  text: On the ship, I remember I suffered with sea sickness. I arrived in San Francisco toward the end of July, 1921. The
    ship 'Rakuyo-Maru' was making its maiden voyage bound for South America and the passengers were mostly going to South
    America.
- speaker: Respondent
  text: I thought that America was a cultural country. I expected to make a good home with my husband.
- speaker: Respondent
  text: My first impression was I thought that streets were beautiful.
- speaker: Respondent
  text: I do not like to recall the sufferings I experienced during this period.
- speaker: Respondent
  text: I decided to stay here permanently after my children started attending high schools.
- speaker: Respondent
  text: The attitudes of the whites toward Japanese were cold.
- speaker: Respondent
  text: I was very sorry that the war started between Japan and America.
- speaker: Respondent
  text: I was not relocated because I lived in Utah then.
- speaker: Respondent
  text: I hope that churches have force to enlighten the people of society.
- speaker: Respondent
  text: 'I pray for the passage from the Lord''s Prayer: ''Thy will be done on earth as it is in heaven.'''
