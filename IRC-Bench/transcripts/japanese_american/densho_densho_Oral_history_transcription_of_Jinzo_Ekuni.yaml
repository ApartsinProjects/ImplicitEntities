collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Do you want me to talk only about the things I did, or shall I also tell you about the problems concerning my profession?
- speaker: Respondent
  text: You may tell us about those problems, also. Please tell us in order about interesting stories, experiences or things
    you discovered.
- speaker: Respondent
  text: I would like to hand down these stories to the posterity. The managing editor of this newspaper, Mr. Hibiya wants
    me to write my stories as a novel, because if I write them as history it might offend the relations.
- speaker: Interviewer
  text: I understand it very well. Japanese society is very small.
- speaker: Respondent
  text: He said I would be in bad position then. He told me to write, but as my hands hurt from arthritis I cannot write.
    I don't know if I tell you this. It is about medals. Mr. Mihara had about 20 medals sent from Japan through the Foreign
    Ministry and sold them. I know the inside story, but I do not have the evidence. There are about 20 people who have medals
    here. I have been in Los Angeles, San Francisco, Sacramento and Fresno, but there is no place like here where people are
    crazy about medals. When there is a ceremony at the consulate about 20 people come wearing their medals. I wonder if it
    was all right to talk about such thing.
- speaker: Interviewer
  text: We are very careful about these things so that we do not put anybody in trouble.
- speaker: Respondent
  text: He did not only send for the medals by recommending people to the Emperor, but he received money. People tell me that
    it is about coming time I should get a medal, so I say, "Wait a minute, I am not senile enough to get a medal." We joke
    about it, but a medal costs 500 to 600 yen. Mihara built a villa on Mercer Island. He did not work, but has been the president
    of the Japanese Association for 30 years. I don't want you to say that I said so. Everybody here knows that. He built
    a villa on Mercer Island. The president of the Japanese Association does not receive salary, only the secretary receives
    $375. People in the Northwest are very lenient. I know that because I lived in California for about 15 years. Nowhere
    the people are as generous as over here. They are all nice people. The people in the consulate and the merchants are all
    nice people. When I start talking I may mention about these things.
- speaker: Interviewer
  text: What is your name?
- speaker: Respondent
  text: Ekuni, Jinzo.
- speaker: Interviewer
  text: Where are you from?
- speaker: Respondent
  text: Okayama Prefecture.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: I was really born on Nov. 25, 1883, but I am registered as born on Jan. 16, 1884.
- speaker: Interviewer
  text: Then you are 94 years old now. You look very well. Not many people in their 70s look as young as you are.
- speaker: Respondent
  text: I wanted to write something while I am alive, so I wrote this long time ago. But my hand hurts, so I could not write
    well.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: He was a contractor of public works, so he travelled around. When the Army, Navy and Justice ministries were built
    in Tokyo, my father had the contract, so we went to Tokyo with him. At that time I was 5 years old and my older sister
    was 7.
- speaker: Interviewer
  text: Did you live in Tokyo?
- speaker: Respondent
  text: We lived in Tokyo for 4 years, and then we went back to the native town because of my father's business. He had a
    contract to build an irrigation canal or something, but it was flooded and he failed. Since then his business started
    to go downhill. I am embarrassed to talk about my family.
- speaker: Interviewer
  text: Was your father a very strict man?
- speaker: Respondent
  text: Strangely enough he did not drink or smoke. His weakness was that he was too honest. I am the same way. I cannot say
    'no' when I am asked to do something. That is why I am still poor. While I was in Tokyo from age 7 to 9 I studied Chinese
    literature at a school, the principal of which was a teacher of Chinese literature at Aoyama Gakuen High School. When
    I was 9 years old I was brought back home, and was put in the first grade with little children. As I just sat and listened,
    the teacher thought I was mentally retarded, and asked me if I was 'aho'. I did not know what 'aho' meant because in Tokyo
    we say 'baka'. When I went home and told my mother that the teacher called me 'aho', I found out that 'aho' meant 'baka'.
    I was angry so I did not go to school for 2 years. Finally, the principal of the school put me in Junior high school.
- speaker: Interviewer
  text: Did you skip all 6 grades?
- speaker: Respondent
  text: No, I skipped 4 grades. I was in a junior high, but I was not happy. In those days there was a school managed by the
    Nichiren sect where the apprentices of temples studied Chinese literature. I attended that school for 5 years. When I
    was 17 I came to America. I have not attended any school after that.
- speaker: Interviewer
  text: Was there a definite school system in those days?
- speaker: Respondent
  text: The elementary school was 4 years, and junior high was 4 years. Then you go to high school and then to college. I
    attended a school run by the temple for the apprentices of temples.
- speaker: Interviewer
  text: Then you were trained at a private school, weren't you?
- speaker: Respondent
  text: I was hit on the head for 5 years. These apprentices came from Kagawa, Hyogo, Tottori, Hiroshima and Shimane prefectures,
    and local temples after graduating from high schools. I was put there with 18 of them, and was hit over the head for 5
    years. If a teacher strikes a student's head over here it will cause some trouble, but in Japan the teachers hit us with
    bamboo whips. Anyhow, I went to school for 5 years, and then decided to come to America.
- speaker: Interviewer
  text: Have you been tall since you were young?
- speaker: Respondent
  text: My father was tall, so I have been about pie ie.
- speaker: Interviewer
  text: How many brothers and sisters do you have?
- speaker: Respondent
  text: I have one older sister. As she lived in Tokyo when she was young, she did not like to live in the country. When she
    was about 17, she went to a relation's in Tokyo, and got married there.
- speaker: Interviewer
  text: What kind of a woman was your mother?
- speaker: Respondent
  text: She was a very strong-willed woman.
- speaker: Interviewer
  text: What kind of thing do you remember of your schooldays?
- speaker: Respondent
  text: I don't have any recollection of my schooldays because I was put in the first grade when I was 9 years old. I did
    not go to school because it was too foolish. Then the principal put me in a junior high school. I quit it in a year, and
    attended a Danrin run by the Nichiren church. It isn't there any more. When I went home in 1930, I found it was taken
    down. I attended Danrin for 5 years as a student, and not as an apprentice. When the apprentices graduated from the school
    they went to Kyoto and became monks.
- speaker: Interviewer
  text: Did you go to school while you stayed in Tokyo till you were 9?
- speaker: Respondent
  text: I attended a grade school.
- speaker: Interviewer
  text: On what circumstance did you decide to come to America?
- speaker: Respondent
  text: I had a quarrel with a teacher. In those days the temple school was very strict, I attended the school for about 5
    years getting scolded all the time. Finally, I had a fight with a teacher. He was about 25 and I was about 16. He was
    too strict, so I talked back to the teacher. When I pushed him he fell and had a nosebleed, so I was expelled from the
    school. My father asked me what I was going to do, so I said I would go to Tokyo. Then he told me to go to America, instead,
    so I came to America on March 23, 1900 at the age of 17. The name of the ship was Izumi-Maru. It was used for blocking
    Port Arthur during the Russo-Japanese War.
- speaker: Interviewer
  text: What kind of people were on the ship?
- speaker: Respondent
  text: They were immigrants who had only about 4th grade education. They were poor people compared to now. When they came
    to America they worked 10 hours a day on the railroad for $1, and had to pay 5¢ commission. I worked on the railroad,
    too.
- speaker: Interviewer
  text: About how many people were on the ship?
- speaker: Respondent
  text: I don't know.
- speaker: Interviewer
  text: Were there many young men like you on board the ship?
- speaker: Respondent
  text: No, they were mostly farmers around 30 years old. It was a hard time to make a living in Japan, so they came to America.
    It cost only about 55 yen to come to America. It was like loading garbage on the ship. They just load them, feed them
    and unload them.
- speaker: Interviewer
  text: I am surprised your father let you go. Since you were the only son.
- speaker: Respondent
  text: Father had failed by the flood and spent the money that belonged to his father's family, so he was discouraged, and
    did not care what I said. Mother was very disappointed.
- speaker: Interviewer
  text: Where did you come first?
- speaker: Interviewer
  text: What kind of a place did you think America was before you came here?
- speaker: Respondent
  text: There were many people who came to America from our village, and I had heard about America from them, so I thought
    I would make it when I get here.
- speaker: Interviewer
  text: At that time did you think you can make money in America?
- speaker: Respondent
  text: I did not have any idea about making money. I just thought I could make it, if I get here. There were many people
    from Okayama in Portland. I did not do anything for 2 weeks after I came here.
- speaker: Interviewer
  text: Did you go to the Immigration office?
- speaker: Respondent
  text: No, we did not go to the Immigration office. We had a physical examination at Victoria. They sterilized our clothing
    and everything. They didn't treat us as human beings. When we came here we received our show money which we turned in
    before we got on board the ship. Then we could go anywhere we wanted.
- speaker: Interviewer
  text: Did you arrive in Victoria, got sterilized there, and then came to Seattle?
- speaker: Respondent
  text: Yes, we came from Victoria by the ship and landed here.
- speaker: Interviewer
  text: Could you land right away?
- speaker: Respondent
  text: Yes, we did not have to go to the Immigration office. There is an interesting episode. When I went to a hotel, old
    men said, "Don't come here young men, there are too many lice and bedbugs here. Go to another hotel." So I went to another
    hotel. There we had to sleep on the mattress laid on the floor with our own blankets. It cost 10¢ a night.
- speaker: Respondent
  text: I don't know if my father wrote to him or not, but an older man from our village came from Portland to pick me up.
    When I went there I found many people from our prefecture. After I stayed there for a while they asked me what I wanted
    to do. I wanted to go to school, I said I did not want to go to school. I wanted to work on the railroad but I did not
    know if they would let me work as I was only 17. I went to Pendleton and stayed there for 2 to 3 months. When April came
    I went to work in thinning sugar beets. We slept on upstairs of a barn on the hay. We were not allowed to smoke, but I
    didn't smoke anyway.
- speaker: Interviewer
  text: Was this in Portland?
- speaker: Respondent
  text: No, it was a place called La Grande, about 8 miles from Portland. I worked there for a couple of months, then I went
    to work on the railroad. As I was young I did not know what to do, so I was fired. Then I moved to another job on the
    railroad, and by the end of that year I was working on the railroad in Idaho. But I thought I wasn't going anywhere doing
    that, so I went to Oregon and started working as a dishwasher in a white family.
- speaker: Respondent
  text: After that I changed my course and decided to go to Portland. In those days they let Japanese boys ride trains free,
    because they thought we were boys working on the trains. When I went to Portland, a man from my village told me that they
    were hiring railroad gang to go to Sacramento. In June 1901 I went to San Francisco with the gang, and then went to Sacramento.
    I stayed there for a while.
- speaker: Interviewer
  text: What kind of thing do you remember about the days in Portland?
- speaker: Respondent
  text: While I was in Portland I wanted to learn English, but I did not know how, so I had to depend on my friends.
- speaker: Interviewer
  text: Was the railroad work very hard?
- speaker: Respondent
  text: There are many people working together, so if you play smart you don't have to work hard.
- speaker: Interviewer
  text: How was schoolboy?
- speaker: Respondent
  text: I was paid about $2.50 a week, so it was very good.
- speaker: Interviewer
  text: Did you understand English well?
- speaker: Respondent
  text: No, I had to study reading and writing after I came home. If there were any children around I talked to them. They
    used to teach me.
- speaker: Interviewer
  text: How long did you work as a schoolboy?
- speaker: Respondent
  text: I did not work as a schoolboy at one place, but mostly in Sacramento. I went from San Francisco to Nevada, and by
    November of 1901 I went to Sacramento as I had a friend there, and worked as a schoolboy.
- speaker: Interviewer
  text: Was it in Sacramento City?
- speaker: Respondent
  text: Yes. There was Sambo Hotel on 3rd and M Street. Many Japanese were staying there, and I stayed there for a long time.
    It was a boarding house. As you know, if you don't have the money you stay there free until you work and pay back the
    money. At night I went to the Buddhist church on 4th Street to learn English. There was a man named Kageyama who used
    to teach me English.
- speaker: Interviewer
  text: What kind of work did you do?
- speaker: Respondent
  text: I worked as a porter at a bar.
- speaker: Interviewer
  text: Was it a white bar?
- speaker: Respondent
  text: Yes, it was a white bar. I used to work there from 6 o'clock in the morning. I came home after the lunch was served.
    Then I went back around 4 o'clock in the afternoon, cleaned a little and came home. They paid me $7 a week. It was good
    pay. At night I went to the Buddhist church to learn English. Five or six of us learned English from Kageyama who stayed
    in the same boarding house.
- speaker: Interviewer
  text: Was it a Japanese bar?
- speaker: Respondent
  text: No, it was a white bar. The white people hired Japanese.
- speaker: Interviewer
  text: How was the Japanese community around 1900 to 1905?
- speaker: Respondent
  text: Around that time some Japanese started to open restaurants and grocery stores. In order to do so, the friends got
    together and put up the capital because most people were making only about $1 a day. Later it went up to $1.15 a day.
    Some people opened restaurants and some worked there. They became better in a few years.
- speaker: Interviewer
  text: Were the men mostly single in those days?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: Were there any women?
- speaker: Respondent
  text: There were some women who came from Hawaii and other places. They worked at the white people's houses for about $15
    a month. They worked hard waging and cooking.
- speaker: Interviewer
  text: Were there gambling houses in Sacramento in those days?
- speaker: Respondent
  text: Yes, there were gambling houses in Chinatown, and many people went there. They went into smelly houses and gambled.
    In those days there was a woman who took $500 from her lover with whom she was going to elope, and ran away from here
    to Sacramento with her real husband. The lover found it out and chased her to Sacramento and demanded the money back.
    There were many racketeers in those days, and they gathered around him and beat him up. This man became furious, and he
    went to a grape ranch in Fresno and learned to shoot pistols. Around November he went back to Sacramento where this woman
    was working at an eating house on I Street. There was a man named Sasaki who came over with me, and we used to go
