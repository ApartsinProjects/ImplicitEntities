collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Not too many books have been published on the Issei, especially books written in English. We're trying to collect
    information on various experiences the Issei had and make it available to the Sansei and Yonsei.
- speaker: Interviewer
  text: We're making our best efforts.
- speaker: Respondent
  text: Are you going to send the materials to Japan?
- speaker: Interviewer
  text: Japanese people in Japan don't know about the Issei either.
- speaker: Respondent
  text: They don't.
- speaker: Interviewer
  text: We'll show it to the Sansei, Yonsei and students at first. I'd like to ask you a favor in answering various questions.
- speaker: Respondent
  text: Yes, I will. I came here as a student at first.
- speaker: Respondent
  text: There was a minister of the Methodist Church named Yamaha at that time. He was in Los Angeles. He was good at leading
    young people. I attended school during the week and visited him on Sundays. I'm from a Buddhist family. Being from Hiroshima
    where Buddhism was widely propagated, my father was an ardent Buddhist. As you'll see in the history, there were seven
    in Seattle. Three out of the seven are known at present; however, four of them aren't. My brother is one of the above
    mentioned three. As you may know, it's been fifty years since the Buddhist Church was started in the U.S. A celebration
    will be held in San Francisco. I'll attend it. As a memorial project, we are compiling the Church history and will publish
    a book, which is going pretty well. I possess almost all of the Church history.
- speaker: Interviewer
  text: Do you have a copy? Shall I take it with me? I'll return it to you after copying it.
- speaker: Respondent
  text: I'll copy it and give you a set.
- speaker: Interviewer
  text: I'd like to have it.
- speaker: Respondent
  text: Everything will go to a publisher. These are all history, from the beginning to the present. These are the successive
    chairmen. This is Chojiro, the first president. This is Yoshito Fujii, myself. This is Hisato Fujii, my brother.
- speaker: Interviewer
  text: Is Chojiro your brother?
- speaker: Respondent
  text: Yes, he is my older brother. He worked hard to establish the Church in 1901. He was twenty-three years old then.
- speaker: Interviewer
  text: If it's possible, I'd like to borrow it.
- speaker: Respondent
  text: Here are the originals. Not the distinguished services, but all of the history will be written. I'll give it to you,
    for I have some copies.
- speaker: Interviewer
  text: It'll be helpful.
- speaker: Respondent
  text: I made it recently.
- speaker: Interviewer
  text: I appreciate it.
- speaker: Respondent
  text: I was taking a look at the old records written in my school days. I was majoring in Sociology at the University of
    Washington. I happened to find the records written in 1925. I had forgotten all about them. They are about the Buddhist
    Church at that time.
- speaker: Interviewer
  text: I'll make a copy for you.
- speaker: Respondent
  text: I just have one. It's fun just to take a look at the records of those days. There are copies of reports and information
    on membership.
- speaker: Interviewer
  text: I'd like to take time and read it.
- speaker: Respondent
  text: Looking back, it was fifty years ago. I wrote a conclusion in the back. I'm not sure whether or not my opinions at
    that time were right. I felt Buddhism was too difficult for the Nisei and Sansei to understand. Of course, everything
    was done in Japanese then. It was impossible for them to understand it. They couldn't appreciate it no matter how well
    preachers advocated it. They attended the church and joined in some activities, but all of them left after reaching a
    certain age. Things like that are all recorded. The number of Sunday school children is recorded. The number decreased
    gradually. How to keep the young people with the church was a problem. Thinking it over now, I daresay that offering a
    sports program did the most toward that end. We started it after 1925. There were about forty members on our baseball
    team. A football team and a basketball team were also formed after that. Thus, we attracted young people to the church.
    The small children were no problem. Their parents forced them to attend Sunday school. We gave them some candy and 'osenbei.'
    However, when they reached a certain age, they were no longer satisfied with it and ceased to attend the church. I myself
    was that way. I came here at the age of nineteen. I went to senior high school and then a university. I attended the Methodist
    Church I've mentioned before, a Baptist Church and another small church every Sunday. I remember all about those days.
    People stood up and talked about their experiences. Three or four people were appointed to talk about the accidents and
    incidents they'd had. They expressed their feelings. They felt they were protected by God.
- speaker: Interviewer
  text: Let me ask to copy it.
- speaker: Respondent
  text: I'll copy it for you.
- speaker: Interviewer
  text: I'd like to look into it. Do you have anything else?
- speaker: Respondent
  text: Here's the Buddhist Church's... I made it myself. These are the successive presidents with the distinguished services.
    Later on, I'll recognize other presidents and also the church officers.
- speaker: Interviewer
  text: Was it included in this?
- speaker: Respondent
  text: This is about the history. I can't include such details in it. This is the list of preachers. I sent it to Mr. Hirota
    of 'Nishi Hongan, jr.' He approved and notarized it and sent it back to me. I wanted to know for sure if my records were
    correct or not.
- speaker: Interviewer
  text: '''Jodo Shinshu?'''
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: It's quite a pocket notebook, isn't it?
- speaker: Respondent
  text: The church members making the history now call me on the phone concerning the records I have.
- speaker: Interviewer
  text: Nobody else has it.
- speaker: Respondent
  text: It's very valuable. I have all of the records - from the rewards for the retiring people to the happenings of the
    past. It's very precious. This is the list.
- speaker: Interviewer
  text: Yes, the one in Sacramento is.
- speaker: Interviewer
  text: Is the church here a branch? The one in Sacramento...
- speaker: Interviewer
  text: How many branches do you have?
- speaker: Respondent
  text: We have five branches.
- speaker: Interviewer
  text: You have one in San Jose.
- speaker: Respondent
  text: Yes. In Sacramento, Fresno, Los Angeles and here - five in all. I have more records. This is just a part.
- speaker: Interviewer
  text: This is really great.
- speaker: Respondent
  text: It's a good reference to keep. Other people don't appreciate its value, but people studying in this field do. I'm
    organizing the various records of our history. The memorial service is coming now. When I constructed a monument... Do
    you know?
- speaker: Respondent
  text: I took charge when we constructed that. I was a president of that committee. By the time we have a memorial service,
    it will have been twenty-five years ago. I was asked to explain it briefly during the program. I need materials for it
    and I am recalling my faint memories. Fortunately, I have some records about it.
- speaker: Interviewer
  text: Great! Few people have records.
- speaker: Respondent
  text: I have all of the records about the relocation camp during the war. The camp in Minnesota... The library of the University
    of Washington wants them very badly.
- speaker: Respondent
  text: Three volumes of this thickness are completely filled. Eventually I'll donate them.
- speaker: Interviewer
  text: You don't have to donate them, but just let the library keep them. You can take them back any time you want to. You
    might have book worms at home, whereas you don't have such a danger in the library. However, once you put them in, it's
    complicated getting them back. You have to sign papers and so on.
- speaker: Respondent
  text: I take a look at them once in a while. The documentaries, information about the community council, and other things
    are in it.
- speaker: Interviewer
  text: It's worth a fortune.
- speaker: Respondent
  text: If I had enough time, I'd like to publish a book. I don't have enough time, though.
- speaker: Interviewer
  text: What do you do at present?
- speaker: Respondent
  text: As the name card I've given to you shows, I own apartments. I leave the business to other people, but I still have
    one business after another, somehow.
- speaker: Interviewer
  text: Church business keeps you busy, doesn't it?
- speaker: Respondent
  text: I'm sort of retired from the church. However, people consult me and ask my opinions. They want me to attend meetings;
    therefore, I do.
- speaker: Interviewer
  text: You're an adviser, aren't you?
- speaker: Respondent
  text: I'm the first president and also serve in an advisory capacity. It's just like being in the active service. I have
    to compile the history.
- speaker: Interviewer
  text: You'll feel satisfied after you achieve it.
- speaker: Respondent
  text: Yes. It'll contribute something to the world later on. I'd like to do my best as long as I'm able to move. I just
    hardly have enough time.
- speaker: Interviewer
  text: I'll ask you about your life in Japan, in the U.S., during the war, in the camp, and after the war - I'll ask the
    questions in chronological order. Are you ready?
- speaker: Interviewer
  text: What's your name?
- speaker: Respondent
  text: Fujii... Yoshito.
- speaker: Interviewer
  text: Are you from Hiroshima?
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: In 1901. On the 14th of April.
- speaker: Interviewer
  text: You're seventy...
- speaker: Respondent
  text: I'm seventy-three years old. My birthday is fifteen days different from the Japanese emperor's.
- speaker: Respondent
  text: Mine is fifteen days earlier. His birthday is on April the 29th.
- speaker: Interviewer
  text: Was your family religion Shinshu?
- speaker: Respondent
  text: Yes, it was Buddhism. My father came here for the first time when the children were little. I hadn't been born yet.
- speaker: Respondent
  text: Yes. It was in 1894, the twenty-seventh year of the Meiji period. He brought my elder brother here, who was sixteen
    years old then. My father stayed for two years to have a look at the U.S. He looked here and there in the northern part
    of the U.S. with Chojiro for two years. Two years later, he returned to Japan and urged young people to go to the new
    world. According to the records, he got five hundred and thirty young people. He sent them from Hiroshima to the U.S.
    It is one of the reasons why there were so many immigrants from Hiroshima.
- speaker: Interviewer
  text: What was your father's occupation?
- speaker: Respondent
  text: He was a farmer. Our family was an old one. My father represented the 42nd generation, and I represent the 43rd, according
    to the statistics. According to the Japanese family history, there were a lot of children in our main family. If you were
    to divide the property among all of us, though we had a pretty large piece of property, how little each would get. The
    Japanese family system then was that an heir should succeed to a family house. Property was divided among the children.
    What can you do in the future with such a limited amount of property? My father visited each village, canvassing for young
    people to go abroad. He left Chojiro in Seattle in order to let him take care of the young people from Japan. First of
    all, my brother started Fujii Hotel. Our first business here was running a hotel. He was the originator of the Japanese
    hotel business here. He built a hotel and opened it in 1899. It was about seventy years ago. The young people from Japan
    - Hiroshima - stayed in the hotel. My father met with a lot of danger while visiting various places. He got on a boat
    from (unintelligible) he had to stay on board overnight on the way because a storm stopped the boat. It was a dangerous
    experience. While he was walking on a mountain trail from here to (unintelligible) by himself, he was attacked by a thief.
- speaker: Respondent
  text: I think so. He said that man was a thief. He couldn't rely on anything else but 'namuamidabutsu.' He wrote it down
    and kept it inside his clothes. That was his belief. He had a strong faith in Buddha, for his life had been saved many
    times. When I was a child, I wasn't allowed to eat meals without saying 'namuamidabutsu.' My elder brother was here. I
    graduated from a junior high school and was planning to go to senior high school in Japan. My brother, who was back in
    Japan for the time being, asked me if I'd like to get a higher education. I asked him if I could go to the U.S. for study.
    He said, 'yes.' I said I'd be happy to do so. I graduated from a junior high school in April and came here in June. It
    was destiny for me to come here.
- speaker: Interviewer
  text: When was it?
- speaker: Respondent
  text: Yes. It was right after World War I. It broke out in 1914. I came here in the year after it was over.
- speaker: Interviewer
  text: Did your father live in Japan continuously after that?
- speaker: Interviewer
  text: Instead of coming here himself, he sent young people.
- speaker: Respondent
  text: Yes. But it was when he was young. By the time I left Japan, he had already stopped doing it. He did it around 1900.
- speaker: Interviewer
  text: Around the time you were born?
- speaker: Respondent
  text: He continued it till 1905. He may have sent some people even after that, but I'm not sure. Mr. Kawasaki, who came
    here in 1906, has the record on it at home. Other records say that my father sent over five hundred people.
- speaker: Interviewer
  text: You and your brother had quite a big age difference.
- speaker: Respondent
  text: That's right. If he were alive, he would be in his nineties. He was sixteen years old when he came here in 1894. How
    long ago was it? It was in the eleventh year of the Meiji period. He was twenty-three or four years older than I. He would
    have been ninety-seven or eight years old now - almost a hundred.
- speaker: Interviewer
  text: Did you hear about any of the experiences your brother had had?
- speaker: Respondent
  text: My brother was healthy and I was busy attending school. So, I didn't hear about his experiences too much. He was an
    aggressive man, and was active in the church, prefectural association, and the Japanese association.
- speaker: Interviewer
  text: He started a hotel business at the age of sixteen?
- speaker: Respondent
  text: He came here at the age of sixteen. He opened a hotel five years later when he was twenty-one.
- speaker: Interviewer
  text: Still, he was young. That's great.
- speaker: Respondent
  text: He established the Buddhist Church here at the age of twenty-three. He overcame a lot of economic hardship. He could
    compete with others, because he had been working and had established his foundation in life. This, together with his experiences,
    had been very helpful.
- speaker: Interviewer
  text: You came here when you were nineteen years old. Did you go to high school right away?
- speaker: Respondent
  text: Yes, I did. I entered Broadway High School, which is a community college now. I transferred to Franklin High School
    later. I graduated from it in 1924. I got into the University of Washington in 1924 and graduated in 1928. I was in a
    post-graduate program for a year after that. I studied sociology.
