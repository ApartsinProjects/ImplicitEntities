collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Do you remember anything that happened in your village or in the country while you were in Japan, such as war or earthquakes?
- speaker: Respondent
  text: It was peaceful when I was little, and nothing special happened. I grew up in a quiet country village.
- speaker: Interviewer
  text: Did many people come to America from Yamanashi Prefecture?
- speaker: Respondent
  text: Quite a few from the foot of Mt. Fuji where I lived. Many people came from Kofu which is on the other side of the
    mountain range. When I came here, most people from Yamanashi Prefecture lived in big cities like San Francisco and Los
    Angeles.
- speaker: Interviewer
  text: How did your father happen to come to America?
- speaker: Respondent
  text: It was mostly from financial reasons. In those days his wife was ill, the silk growing was not doing well. He might
    have decided to come here because his friends were coming here. I think he came here leaving his wife and children home
    in order to try his fortune.
- speaker: Interviewer
  text: Was your mother here when you came here?
- speaker: Respondent
  text: My father came here alone at first, and then my mother joined him. My mother and 3 children lived in Japan for ten
    years.
- speaker: Interviewer
  text: Was your father a hard worker?
- speaker: Respondent
  text: Yes, he worked hard.
- speaker: Interviewer
  text: Weren't there many Isseis who could not summon their wives and children from Japan?
- speaker: Respondent
  text: I think there might have been such people. My father went back to Japan to pick up my mother. As the children were
    getting big he left us with our uncle and aunt.
- speaker: Interviewer
  text: Where did you sail from?
- speaker: Respondent
  text: From Yokohama.
- speaker: Interviewer
  text: Did you come on board the ship alone?
- speaker: Respondent
  text: I don't remember well. We were on board the ship called Korea-Maru for two weeks. In those days there were picture
    marriages. I saw many picture brides in the hotel in Yokohama.
- speaker: Interviewer
  text: Did you have a chance to talk to them?
- speaker: Respondent
  text: No, I didn't. I was only 16 years old.
- speaker: Interviewer
  text: Did you know that they were picture brides?
- speaker: Respondent
  text: I landed there and stayed there overnight.
- speaker: Interviewer
  text: What do you remember about Hawaii?
- speaker: Respondent
  text: I thought it was a hot place. I stayed at a hotel named Kome-Ya. It was very hot.
- speaker: Interviewer
  text: Did you come to San Francisco from there?
- speaker: Respondent
  text: I arrived in San Francisco, and then came to Sacramento with my father who came to meet me.
- speaker: Interviewer
  text: You didn't see your father for about 6 years, didn't you?
- speaker: Respondent
  text: I think we didn't see each other for 4 to 5 years.
- speaker: Interviewer
  text: Did your father recognize you right away as you were grown?
- speaker: Respondent
  text: Yes, he did.
- speaker: Interviewer
  text: Were you happy when you saw your father?
- speaker: Respondent
  text: I was very happy. I was happier when I saw my mother.
- speaker: Interviewer
  text: Did you come to Sacramento straight from San Francisco?
- speaker: Respondent
  text: We stayed in San Francisco overnight. I thought it was a beautiful place. I also thought it had many hills. When I
    saw from the ship I saw only hills.
- speaker: Interviewer
  text: Were you disappointed when you came to Sacramento as there were all farms?
- speaker: Respondent
  text: No, I didn't. I thought the American farms were better than those in Japan. Where I lived in Japan we had to go up
    the hills to the farm. There were hills in Fair Oaks, too, but they were not as steep, so I thought it was a nice place.
    Fair Oaks is now in the city, and I cannot imagine where we used to live.
- speaker: Interviewer
  text: How long did you live in Fair Oaks?
- speaker: Respondent
  text: About 3 years.
- speaker: Interviewer
  text: Did you farm there?
- speaker: Respondent
  text: Yes, we moved to West Sacramento, and stayed there for about two years.
- speaker: Interviewer
  text: Did you help your father since you came to Fair Oaks?
- speaker: Interviewer
  text: What did you do in West Sacramento?
- speaker: Respondent
  text: We grew tomatoes for 2 to 3 years. Then we moved to Salinas, and from there we came here.
- speaker: Interviewer
  text: What did you do in Salinas?
- speaker: Respondent
  text: We grew strawberry there.
- speaker: Interviewer
  text: How many years did you stay in Salinas?
- speaker: Respondent
  text: I don't remember too well about those days, but I think we stayed there 2 to 3 years.
- speaker: Interviewer
  text: Did you think the work here is very hard?
- speaker: Respondent
  text: No, I didn't think so. I came to America in 1918, and came here in 1923. During that time we went from Fair Oaks to
    West Sacramento to Salinas and here.
- speaker: Interviewer
  text: In what year did you come to America?
- speaker: Interviewer
  text: How did you happen to come here?
- speaker: Respondent
  text: In those days Japanese could not own land or lease land. My parents had two children since I came here. In order to
    raise children we had to get a place where we could live permanently. At that time we had a chance to buy land here, so
    we decided to do so, and we came here.
- speaker: Interviewer
  text: Could you buy land here?
- speaker: Respondent
  text: Yes, we could.
- speaker: Interviewer
  text: Why could you buy land here?
- speaker: Respondent
  text: Mr. Abiko thought Japanese should have land for future development. He had already bought Yamato Colony in Livingston,
    so he started a sister colony here.
- speaker: Interviewer
  text: Was the land bought in Mr. Abiko's name?
- speaker: Respondent
  text: We bought it in our children's name. Children were still too young, so the parents were their guardians until they
    were grown up.
- speaker: Interviewer
  text: What did you grow on the land you bought?
- speaker: Respondent
  text: We planted grape.
- speaker: Interviewer
  text: About how many acres?
- speaker: Respondent
  text: We bought 20 acres and planted grape on it.
- speaker: Interviewer
  text: Did 20 acres give you enough income?
- speaker: Respondent
  text: It was not enough, so I leased land and grew vegetables. Gradually grape business became dull. In the meantime, vegetables
    underwent changes, and I came to grow almonds which is most profitable.
- speaker: Interviewer
  text: What did you do when you did not get enough income from the grape?
- speaker: Respondent
  text: I had a trucking business, transporting vegetables from here to San Francisco.
- speaker: Interviewer
  text: Did you have to know English when you drove the truck?
- speaker: Respondent
  text: Of course. I managed to get along with a little English I knew. I still do not speak it well enough.
- speaker: Interviewer
  text: About how many years did you drive the truck?
- speaker: Respondent
  text: I think I drove for about ten years.
- speaker: Interviewer
  text: Did you make a living by driving the truck?
- speaker: Respondent
  text: Yes, I did. I bought the truck and transported vegetables from here to San Francisco.
- speaker: Interviewer
  text: How did you get the money to buy a truck?
- speaker: Respondent
  text: I managed to buy it somehow. In those days trucks were not well developed yet. It was the first time Dodge Motor Company
    used air in truck tires so they could run faster. Before then, they used just rubber tires. I commuted to San Francisco
    every day.
- speaker: Interviewer
  text: How long did it take you to go from here to San Francisco in those days?
- speaker: Respondent
  text: It took about 4 hours.
- speaker: Interviewer
  text: Did you drive at night?
- speaker: Respondent
  text: Yes, I did. I drove at night time. The farmers picked vegetables until dark. Then I took them to San Francisco during
    the night, and came home in the morning.
- speaker: Interviewer
  text: Did you take them to one place or did you peddle them?
- speaker: Respondent
  text: I delivered them to wherever the farmers wanted me to take. Of course different companies are gathered in the market
    place.
- speaker: Interviewer
  text: About what time did you come back?
- speaker: Respondent
  text: About 8 o'clock in the morning.
- speaker: Interviewer
  text: Is the market open all night?
- speaker: Respondent
  text: No, they are not, but I unloaded them at certain places.
- speaker: Interviewer
  text: When did you sleep?
- speaker: Respondent
  text: I slept from morning till about 4 o'clock in the afternoon.
- speaker: Interviewer
  text: Your night and day were reversed, weren't they?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: Since your night was long, did you have any recreation?
- speaker: Respondent
  text: I had some recreation when I had time.
- speaker: Interviewer
  text: How many days a week did you work?
- speaker: Respondent
  text: I did not have time for recreation during the week, only on Saturdays.
- speaker: Interviewer
  text: Was Saturday your day off?
- speaker: Respondent
  text: Yes, it was. I was young then, but I did that kind of work even after I was married and lived in Pismo Beach. I used
    to transport lettuce from Imperial Valley to San Francisco.
- speaker: Interviewer
  text: When did you get married?
- speaker: Respondent
  text: No, I was in Oakland at that time, and then we went to Pismo Beach.
- speaker: Interviewer
  text: When did you quit commuting to San Francisco?
- speaker: Respondent
  text: I think it was around 1929.
- speaker: Interviewer
  text: Did you go to Oakland after that?
- speaker: Respondent
  text: I think we stayed in Oakland less than a year. Then we went to Pismo Beach.
- speaker: Interviewer
  text: Did you find your wife by yourself?
- speaker: Respondent
  text: She was in Japan. Many people helped me find her. My uncle helped me find her.
- speaker: Interviewer
  text: Was she from your village?
- speaker: Respondent
  text: She lived a little ways from my house, but we could say that she was from the same village.
- speaker: Interviewer
  text: Did you know him?
- speaker: Respondent
  text: Kajiwara's uncle and my aunt were married. They had children but they died, so they wanted me to marry into the Kajiwara's
    family. At the time I came here Japanese were not allowed to come to America by the immigration law, but with everyone's
    help I managed to come here. When Kajiwara was on his way to America at the age 16 he stopped at my house. I was only
    10 years old then. I remember hearing that he was going to America, but I did not know him. Kajiwara was 16, so I think
    he knew me.
- speaker: Respondent
  text: I could not come to America then, so I was summoned here as a maid to Ambassador Sato in Washington D.C. I worked
    there for 3 years before I married Kajiwara.
- speaker: Interviewer
  text: Do you think it was good that you came to America?
- speaker: Respondent
  text: At the time I came here I wondered why I came here.
- speaker: Interviewer
  text: Was the life hard for you?
- speaker: Respondent
  text: Yes, because I was brought up in the country, and then I came to work in the family of a high ranking diplomat in
    America. It was different in every way. Sometimes I cried as I missed my parents, but after a few months I got used to
    the life there.
- speaker: Interviewer
  text: Did you come to Pismo Beach when you got married?
- speaker: Respondent
  text: I came here first, and went to Pismo Beach after we got married.
- speaker: Interviewer
  text: Were you happy when you came here?
- speaker: Respondent
  text: I was happy and relieved. When Ambassador Sato became a consul in Los Angeles, I resigned from my service and married
    Kajiwara. When I came to Cortez Kajiwara's mother and father greeted me. I was brought up in the country, but I went to
    Washington and Los Angeles, so it was the first time I saw the country in America. I thought what a hilly countryside
    I came. I wonder how far we have to go before we could see a house. Since then children were born one after another, and
    then the war broke out and we were put in the camp.
- speaker: Interviewer
  text: How old were you when you got married?
- speaker: Respondent
  text: I was 19 years old when I came from Japan. I was 23 when I got married.
- speaker: Interviewer
  text: What was difficult when you delivered vegetables to San Francisco?
- speaker: Respondent
  text: There wasn't anything hard. Everything went well.
- speaker: Interviewer
  text: Did you ever spill vegetables or anything like that?
- speaker: Respondent
  text: The truck had a couple of collisions.
- speaker: Interviewer
  text: What did you do then?
- speaker: Respondent
  text: I had insurance. At one time, when I stopped by the road with flat tire, a truck loaded with eggs hit the rear of
    my truck. I cannot forget the scene of broken eggs all over the place. At another time my truck fell about 12 feet down
    the cliff and was smashed.
- speaker: Interviewer
  text: Didn't you get hurt?
- speaker: Respondent
  text: No. There were two white drivers, but they were not hurt.
- speaker: Interviewer
  text: Wasn't it your truck?
- speaker: Respondent
  text: Yes, it was.
- speaker: Interviewer
  text: Weren't you driving then?
- speaker: Respondent
  text: No, I wasn't. The white drivers were. When I was in Pismo, too, I did not drive much. Four people as partners organized
    a company, and the white people drove the truck. Going from the Imperial Valley to San Francisco 3 white drivers took
    turn in driving; one drove from the Imperial Valley to Los Angeles, then the second one drove from Los Angeles to Pismo
    Beach, and the third one drove from Pismo Beach to San Francisco. They did the same coming back.
- speaker: Interviewer
  text: What did you transport from the Imperial Valley?
- speaker: Respondent
  text: Lettuce. Sometimes we drove from San Francisco to Pescadero, or picked up artichokes from Davenport and took them
    to Los Angeles. Four people worked in parties.
- speaker: Interviewer
  text: Then you had a business?
- speaker: Respondent
  text: It was a trucking business.
- speaker: Interviewer
  text: About how many years did you continue that business?
- speaker: Respondent
  text: I did it for about 10 years.
- speaker: Interviewer
  text: Did that kind of business give you good income?
- speaker: Respondent
  text: Not too good, but it brought in good income.
- speaker: Interviewer
  text: What kind of problems did you have in that business?
- speaker: Respondent
  text: As in any kind of business it has problems such as the insurance premium going up, the price of fuel going up and
    the drivers' wages going up.
- speaker: Interviewer
  text: Did you use the truck half the time?
- speaker: Respondent
  text: Yes, it takes more than 40 hours for a truck to go to San Francisco and back.
- speaker: Interviewer
  text: Then half the time it is running without any load, isn't it?
- speaker: Respondent
  text: Of course it is. That is only in winter time when there is not much work. In spring we delivered peas from Pismo to
    San Francisco and Los Angeles, and in summer lettuce to both markets. They went to the markets and came back the next
    day. Some trucks came back with bad engines, bad brakes or flat tires, so only about 8 out of 12 trucks would be running
    well. Always some trucks were in repair.
- speaker: Interviewer
  text: Did you have your own mechanics?
- speaker: Respondent
  text: Yes, I did. But when a truck is broken in Los Angeles it was repaired there so that it could come back. We had a special
    garage there to fix our trucks.
- speaker: Interviewer
  text: Was that a big business?
- speaker: Respondent
  text: Yes, it was. I came back here in 1937, but my partners continued it after that. They had to close it when the war
    broke out.
- speaker: Interviewer
  text: Were the partners all Japanese?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: How many partners were there?
- speaker: Respondent
  text: There were four partners.
- speaker: Interviewer
  text: How many drivers did you have?
- speaker: Respondent
  text: More than ten of them.
- speaker: Interviewer
  text: How was the business during the Depression?
- speaker: Respondent
  text: President Roosevelt gave a week's holiday and closed the banks. It was better then because we did not have to pay.
    Of course we did not get any money.
- speaker: Interviewer
  text: Didn't your business become dull?
- speaker: Respondent
  text: Of course it became dull, but people had to eat even during the Depression, and the farmers had to ship whatever they
    produced in order to get some money. It was not bad enough that we could not make the ends meet. Sometimes the grape around
    Cortez sold for only 5 or 6 dollars a ton, and that didn't even pay for the pickers. But I don't think vegetables were
    that bad.
- speaker: Interviewer
  text: Did the transporting fee go down?
- speaker: Respondent
  text: A law prohibited the cutting of the fee and wages.
- speaker: Interviewer
  text: Didn't it affect your business too much?
- speaker: Respondent
  text: No, it didn't.
- speaker: Interviewer
  text: Weren't there many people who did not have jobs and were in difficulties?
- speaker: Respondent
  text: I think there were. Many white people were without jobs. We could not just give them money, so we had them repair
    the road and paid them so that they can make living.
- speaker: Interviewer
  text: Were you in Pismo then?
- speaker: Respondent
  text: Yes, I was. Around here, too, people could not sell grape, so they did not pick them for about 3 years. But the grape
    had to be cut so that they could burn the brush in winter time.
- speaker: Respondent
  text: In those days we burnt the brush on a steel wagon. We could not burn the brush unless we cut the grapes, so we dropped
    the grape we could not sell on the ground, and pruned the tree for the following year's crop.
- speaker: Respondent
  text: I went to work in Guadalupe in 1930, so I know that around there, Pismo and Santa Maria area they grow much vegetables
    and ship them to the East and to the market in Los Angeles. Japanese farmers were growing fine vegetables and were shipping
    them out, so Mr. Kajiwara and others had much work in delivering vegetables. They were better off than farmers around
    here in spite of the Depression.
