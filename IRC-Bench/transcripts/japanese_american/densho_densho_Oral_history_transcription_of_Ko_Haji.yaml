collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Interviewer
  text: Will you please tell me your name?
- speaker: Respondent
  text: My name is Ko Haji.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In a small country village in Ashimori, Kirigun, Okayama Prefecture, Japan. I attended elementary school, junior high
    school and one year in girls high school there. Then I entered a mid-wife's school and graduated. After graduation, I
    went to work at the Prefecture Hospital. Took a leave for a while because of illness but after recovery went back to work
    again and was employed there until I got married in 1920.
- speaker: Interviewer
  text: When were you born?
- speaker: Respondent
  text: In 1896 (Meiji 29).
- speaker: Interviewer
  text: How old are you now?
- speaker: Respondent
  text: I will be 78 years old when my birthday comes.
- speaker: Interviewer
  text: What was your family occupation?
- speaker: Interviewer
  text: What was your religion?
- speaker: Respondent
  text: Nichiren Buddhist.
- speaker: Interviewer
  text: Do you remember something of your childhood days?
- speaker: Respondent
  text: My father was in America. My grandfather sat down and made ropes and slippers out of straw during the winter months.
    He made me sit beside him and told me the life story of Nichiren Shouin (St. Nichiren) over and over and told me to believe
    in him. While I was at the hospital, the head nurse was a faithful Christian and she took me to hear a caucasian missionary
    who spoke fluent Japanese. This is when I was exposed to Christianity for the first time and I began to attend such meetings.
    Although I had the opportunity, I didn't become a Christian before my marriage. After marriage, I came to this country
    but my husband worked for the railroad and we lived where there were no Japanese. My children started to go to church
    school and the minister asked me to come to church but I didn't have the courage to go because I couldn't understand English.
    Time passed and WWII broke out and we had to evacuate and go to camp. As soon as I entered the camp, I started to attend
    Christian Service in Japanese. My husband was baptized in 1914 in a Catholic Church. The reason he was baptized in a Catholic
    Church was because he started to take English courses at Gonzaga College in Spokane. He said that once he made that decision,
    he took the path that he thought God wanted him to take and it was a great strength to him. I was quite moved by what
    he said but I did not become a Christian before WWII. After we entered the camp, we both started to go to church meetings
    regularly. After a while, the ministers kept coming to persuade us to receive baptism. I attended English classes in camp
    because my children thought I should learn English. One day, coming home from class, Mrs. Iwatsuki (Hood River, Oregon)
    mentioned that it was about time I received baptism and become a Christian. I felt something change in me so I went directly
    to a church leader in our ward and mentioned about baptism. He suggested not to wait until Sunday but receive baptism
    on Wednesday night at the prayer meeting because my daughter was leaving camp to relocate on Thursday. Thus I was baptized
    by Rev. Kitagawa at Rev. Kuroda's living quarter witnessed by many friends. I left camp soon after that. At that time,
    there was a shortage of railroad workers so my husband decided to go out and work. I waited for my son to finish his high
    school course for graduation. Then we left camp before the graduation ceremony was held.
- speaker: Interviewer
  text: Where did you go to?
- speaker: Respondent
  text: We went to Spokane, Washington. The main office for the railroad company was there and they accepted responsibility
    of looking after us. My son, my younger daughter and I left Tule Lake together. The elder daughter was already relocated
    in Washington D.C. My son attended college one year and was inducted into Army service. He was killed in action only 4
    months after he was inducted. In those days, they were short of soldiers and boys were sent overseas after only 4 weeks
    of training. Then they were sent to the front line in 4 days. His last letter to us was written on Easter Sunday, April
    end, and he died on April 9th. I was shocked when I heard that Japan attacked Pearl Harbor on December 7, 1941 and I was
    also shocked when America dropped A-bombs on Hiroshima and Nagasaki, Japan. However, a thought Japan had to take the fate
    because they started the war. Because of the war, I think I was able to find God and became a Christian. I was given the
    opportunity to listen to messages in Japanese by Japanese ministers. Losing my only son in the war was a great sadness
    to me but it also helped me find God. When my son was leaving, I said I wished he could stay even a day longer with me.
    His reply was, "Mother, don't you think I should go as soon as possible to relieve those who are already there?" He also
    told me not to go to work because I was not healthy. He wanted me to attend church meetings and pray. He was 18 years
    old when he left. My son's words, I cannot forget.
- speaker: Interviewer
  text: Going back again, what was your maiden name?
- speaker: Respondent
  text: My maiden name was Kawata.
- speaker: Interviewer
  text: Was your father in America?
- speaker: Respondent
  text: He came to America when I was 9 years old.
- speaker: Interviewer
  text: Did he return to Japan?
- speaker: Respondent
  text: He came back to Japan when I was in nursing school.
- speaker: Interviewer
  text: Do you know where he was in America?
- speaker: Respondent
  text: Somewhere in California. He rented a place and farmed with my brother.
- speaker: Interviewer
  text: Do you know why he came to America?
- speaker: Respondent
  text: In those days, many Japanese came to this country to work and make money, then return to Japan and invest the money
    into something.
- speaker: Interviewer
  text: Did your father succeed?
- speaker: Respondent
  text: I think he just made enough to get by.
- speaker: Interviewer
  text: Did your brother come back to Japan?
- speaker: Respondent
  text: He did but he died soon after he returned.
- speaker: Interviewer
  text: What sort of a person was your father?
- speaker: Respondent
  text: My father was a "Yoshi" (adopted son-in-law). My mother was quiet and Father was rather arrogant but he was a good
    father to me.
- speaker: Interviewer
  text: Were there just 2 children?
- speaker: Respondent
  text: I had another elder brother but he also died when he was young.
- speaker: Interviewer
  text: Do you remember your elementary school days?
- speaker: Respondent
  text: There were 18 blocks to my school. In the winter, we walked in the snow. When I was older, I led about 20 students
    to school. When the cords on their clogs broke on the way to school, I repaired it for them. I was an honor student all
    through elementary school and my father was very happy about it. He was strict towards mother but tender towards us. I
    think I was influenced by my grandfather greatly.
- speaker: Interviewer
  text: What did you do in Nursing School?
- speaker: Respondent
  text: I completed nursing and mid-wife's course and received a license to practice in Japan. However, after I came to America,
    I did not apply for a license to practice because I started to have my family and I did not want to hire maids to take
    care of my children.
- speaker: Interviewer
  text: Do you remember any happy occasions you had in Japan?
- speaker: Respondent
  text: I don't remember any happy or sad occasion.
- speaker: Interviewer
  text: How did you get married?
- speaker: Respondent
  text: When my husband-to-be returned from America to visit his mother, arrangements of marriage between us was brought up
    among our relatives. We were distantly related. A person, I called 'Uncle' came to see me at the hospital where I was
    working to find out if I would go to America. He said my brother consented to give me away if I was willing to go. I consented
    and the preparation for marriage was hurried and we were married at this man's home. We went on our honeymoon for about
    a week and he had to return to his job in America as a section foreman for a railroad company. He couldn't wait until
    I got my passport and etc. I resigned from my job soon after he left, made preparations and came to America by myself.
- speaker: Interviewer
  text: How old was your husband when you got married?
- speaker: Respondent
  text: He was 29 and I was 23 years old.
- speaker: Interviewer
  text: He was rather young for a foreman, wasn't he?
- speaker: Respondent
  text: Yes, he didn't know English very well but he started out as a bookkeeper and when a foreman retired, he was asked
    to take his place. He worked 40 years as a foreman and retired at the age of 65.
- speaker: Interviewer
  text: Where did you arrive in America?
- speaker: Respondent
  text: Harrington, Washington. It's about 250 miles from Seattle, Wash. That's where my husband was working.
- speaker: Interviewer
  text: Where did the ship arrive?
- speaker: Respondent
  text: At Seattle, Washington by Hawaii Maru.
- speaker: Interviewer
  text: What sort of persons were on the ship?
- speaker: Respondent
  text: There were some picture brides. They were met by husbands whom they were meeting for the first time. I think one bride
    rejected to go to her husband and was deported back to Japan. I stayed at the immigration office 5 weeks because they
    suspected I had intestinal worms. It was so long I cried. When they were ready to release me, they sent a telegram to
    my husband. He came after me and took me to his home near Spokane, Wash. My life in America began then.
- speaker: Interviewer
  text: What was your first impression of America?
- speaker: Respondent
  text: I was treated very well wherever I went.
- speaker: Interviewer
  text: Were your neighbors all caucasians?
- speaker: Interviewer
  text: Did your husband own a home?
- speaker: Respondent
  text: We were provided with a company house. The company took care of the upkeep of the house also. I didn't go through
    hardship as some others did.
- speaker: Interviewer
  text: Did your husband stay there until WWII?
- speaker: Respondent
  text: When the war broke out, we were living in Monroe, Wash. about 40 miles from Seattle. My husband was replaced by an
    Italian man. People couldn't understand why they had to replace him. The company had to explain that the war was between
    Japan and America.
- speaker: Interviewer
  text: Do you remember something about the Depression?
- speaker: Respondent
  text: Yes, I do. My husband's section was divided in two and his salary was cut in half but we were able to get by. He was
    still receiving more than others in that small town. Many went through hardships.
- speaker: Interviewer
  text: Who worked under your husband?
- speaker: Respondent
  text: There were Italians, caucasians and Filipinos. In Harrington, there were two young Japanese boys. But most of the
    time, he had caucasians working under him. The mothers were happy to have their boys work under my Christian husband because
    he never drank liquor. He said he was glad he made his pledge to God. Now, he is hard of hearing and can't go to church
    but he reads Christian books and literatures.
- speaker: Interviewer
  text: Were you ever homesick for Japan?
- speaker: Respondent
  text: No, I never was.
- speaker: Interviewer
  text: Was there any comical happenings?
- speaker: Respondent
  text: I didn't understand English very well but I got along well with caucasians. When my children started going to school,
    I went to PTA meetings and couldn't converse but the other ladies came near me and conversed in the manner that I didn't
    have to say much and kept me company.
- speaker: Interviewer
  text: How many children did you have?
- speaker: Respondent
  text: I had one son and 2 daughters.
- speaker: Interviewer
  text: Is there anything that happened before the war that stands out in your memory?
- speaker: Respondent
  text: No. About the end of the war, when we were living in Monroe, we were thinking of buying a home there for our son,
    Tom. When he was killed in action, we decided to go to Spokane and buy a home there.
- speaker: Interviewer
  text: What are your hobbies?
- speaker: Respondent
  text: I don't have any. I learned a little "Ikebana" (flower arrangement) but it conflicted with my schedule so I had to
    quit.
- speaker: Interviewer
  text: When you were raising your children, were there any hardship?
- speaker: Respondent
  text: Yes, it wasn't like now. We had to heat our room with a wood stove, boil our water and heat our iron over the stove.
    It was hard but it was good for the children. They offered to help. I taught Japanese to my children. My daughters still
    write to me in Japanese.
- speaker: Interviewer
  text: Did you worry about your children's friends?
- speaker: Respondent
  text: I never have. We lived in a small town and we didn't have to worry about our children like they do now.
- speaker: Interviewer
  text: How old was your eldest when the war broke out?
- speaker: Respondent
  text: My children were all grown by then.
- speaker: Interviewer
  text: Do you remember your neighbors having hardships?
- speaker: Respondent
  text: I have helped some people but there weren't much hardship. I suffered three major illnesses and when I had a major
    surgery, the company offered to help us but we managed to pay the bills. Friends were very good to us.
- speaker: Interviewer
  text: What kind of illness did you suffer?
- speaker: Respondent
  text: When I was in the 7th month of pregnancy carrying my eldest child, I suffered high fever and had to go to a hospital.
    Just before I was to go into surgery, I expelled a large round worm (intestinal worm) and the fever came down. Second
    illness was the surgery for gallstones. Post-operative condition wasn't good and I had to have a second surgery a year
    later. A Japanese couple took care of the children while I was ill.
- speaker: Interviewer
  text: Was that your last illness?
- speaker: Respondent
  text: I haven't been in a hospital since. I have diabetes now which I am taking care of.
- speaker: Interviewer
  text: How did you feel when Pearl Harbor was attacked?
- speaker: Respondent
  text: My husband was out fishing that day. We had a television and I was watching it. I didn't understand English well but
    I could tell something had happened by the excitement on the television pictures. A caucasian neighbor's son was with
    me but he went home. I realized that Pearl Harbor was attacked by Japanese.
- speaker: Interviewer
  text: Did you feel that you were in danger?
- speaker: Respondent
  text: I thought something may happen.
- speaker: Interviewer
  text: What happened after that?
- speaker: Respondent
  text: We were living in the section house with a large yard. I heard footsteps at nights. Some were watching so that we
    would not get hurt but on the other hand some may have been watching to see what we would do. Our neighbors were good
    and tried to comfort us by saying the war was over there and we had nothing to do with it.
- speaker: Interviewer
  text: What did you do with your household goods at the time of evacuation?
- speaker: Respondent
  text: A friend who had a hardware store, stored our appliances in his basement and other furniture were stored with two
    other families. When we were in camp, someone wanted to buy our washing machine and vacuum cleaner but I didn't sell anything.
    When we got out of camp and went to Spokane, our stored appliances and furniture were brought there at government expense.
- speaker: Interviewer
  text: Did you go to an Assembly Center?
- speaker: Respondent
  text: We went directly to Tule Lake War Relocation Center from home.
