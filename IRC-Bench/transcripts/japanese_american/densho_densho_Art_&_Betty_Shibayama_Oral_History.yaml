collection: densho
source_url: https://ddr.densho.org/
turns:
- speaker: Respondent
  text: The reason I went into the service is that I was fighting deportation and some people went to Japan and my dad didn't
    want to go to Japan, there wasn't enough food. So I figured, if I go into the army, there's less chance for deporting
    me.
- speaker: Respondent
  text: Because he was considered an enemy alien and he was fighting deportation and he couldn't return to Peru. Citizens
    could return but the parents couldn't. And he was a minor so, he wouldn't go back alone.
- speaker: Respondent
  text: I was in bad shape [laughs].
- speaker: Interviewer
  text: Well, that's what I was curious about. How could you even be drafted if you weren't a citizen? It doesn't make sense
    but also shows the injustice of the government.
- speaker: Respondent
  text: And usually if you get drafted, they give you citizenship, if anything. But in my case, they denied my citizenship
    because I didn't have legal entry. Now, the government brought us here forcibly, on the U.S. army transport, put us in
    a justice department camp that was administered by the immigration. So, where's the place where it says I'm illegal?
- speaker: Interviewer
  text: It was like you were without a nation.
- speaker: Respondent
  text: Yeah, at one point, he had no country. He was a man without a country.
- speaker: Interviewer
  text: If we were going to start with your childhood in Peru, what are some of the highlights of being young and growing
    up there?
- speaker: Respondent
  text: Going to school, playing sports.
- speaker: Respondent
  text: They were well-off. Because they had maids. And chauffeurs that drove them to school.
- speaker: Respondent
  text: We used to go to Japanese private school and they were teaching Spanish every other period. And the younger kids were
    small, so my father told my chauffeur to take us to school and pick us up.
- speaker: Interviewer
  text: That makes this even more tragic.
- speaker: Respondent
  text: Yeah. Because everything was taken away when he came to the U.S.
- speaker: Interviewer
  text: Your father wanted to go back to Peru but what kept him from going?
- speaker: Respondent
  text: The Peruvian government wouldn't take us. The only people that were allowed to go back were people that had Peruvian
    wives or Nisei wives, because Niseis were Peruvian. But if both parents were Issei, they wouldn't take us. Because actually,
    Peru wanted to get rid of all the Japanese. That's why they were taking 2,600 people from 13 different countries. But
    out of the 2,600, 80% were from Peru. Because President Prado wanted to get rid of all of the Japanese.
- speaker: Respondent
  text: Because they were successful.
- speaker: Interviewer
  text: So they didn't have Peruvian citizenship. What about your grandparents?
- speaker: Respondent
  text: It didn't even matter because my grandfather had Peruvian citizenship but they still took him. And he was sent to
    Japan before the end of the war. So actually, if he was still in the U.S. after the war, he would've been able to go back
    because he was a Peruvian citizen but he was already in Japan. He wasn't voluntarily, he was forcibly sent.
- speaker: Interviewer
  text: And your grandparents just lived there for the rest of their lives?
- speaker: Respondent
  text: Yeah. He never saw them again after they were taken. Because he was the oldest in the family, and he was the first
    grandchild. So his grandparents had a shop in the port of Callao. You actually lived with them, didn't you?
- speaker: Respondent
  text: I lived with my grandparents before I started school. My parents were in Lima, and my grandparents were in Callao.
    I used to spend my summer vacations there because Lima doesn't have any water. Callao is the port for Lima actually. So
    I used to stay there and went swimming every day in the ocean.
- speaker: Interviewer
  text: Did your grandfather go swimming too?
- speaker: Respondent
  text: Yeah, they went before they opened the store and I used to go with them, then come home and I eat breakfast, lunch.
    Then I used to go back again to the beach to meet my friends.
- speaker: Interviewer
  text: You were living the life. And so were your grandparents. Where in Japan were they from?
- speaker: Respondent
  text: Fukuoka. He had a brother in Japan but they never came.
- speaker: Respondent
  text: And his father's parents were gone.
- speaker: Respondent
  text: That's the reason he went to Peru because his father died when he was 15. And he went because he had an uncle in Peru.
- speaker: Interviewer
  text: That's hard to imagine that you never saw your grandparents again.
- speaker: Respondent
  text: I was almost closer to them than my own parents for a while. When I started kindergarten or first grade, we started
    playing baseball against the other classes. Naturally I needed a baseball glove so instead of asking my father I called
    my grandfather and told him. He came all the way from Callao to Lima and got me a glove and a bat.
- speaker: Interviewer
  text: He was your parent, they raised you. So when they left Peru, you were twelve by that time?
- speaker: Interviewer
  text: What do you remember about them leaving?
- speaker: Respondent
  text: I don't even know when they were taken. I really don't remember anything. I was living in Lima and they were taken
    from Callao.
- speaker: Interviewer
  text: It's more heartbreaking to hear about all of these ways you were plucked from where you lived and how your family
    was scattered. And you've mentioned in many interviews that your father went into hiding right after the war started.
    What do you remember about that?
- speaker: Respondent
  text: When people found out that the U.S. army transport came into the port of Callao, word got around. So a lot of the
    head of the family went into hiding.
- speaker: Interviewer
  text: Where did they go?
- speaker: Respondent
  text: I don't know. But my father went near the mountains, near the Andes, because he had a friend up there.
- speaker: Respondent
  text: So he figured they wouldn't go looking for him.
- speaker: Respondent
  text: Yeah, by then, they took my mother and put her in jail. So then my younger sister, Fusa-san's godfather was a Peruvian,
    so he went and told my father what was happening. So he gave himself up.
- speaker: Respondent
  text: Yeah because they arrested the mother, and the sister right below [Art] was 11 years old, didn't want the mother to
    go to jail alone. So they were put in jail. And she told me that all she did all night long - because she was thrown in
    with prostitutes and thieves - all they did was hug each other and cry all night.
- speaker: Interviewer
  text: Do you know how long they were in jail?
- speaker: Respondent
  text: I think overnight or a couple of nights.
- speaker: Respondent
  text: I think Fusa told me that your father said that he would come out of hiding and if they could go as a family. They
    probably figured the more hostages the better.
- speaker: Interviewer
  text: Did your parents explain to you and your siblings what was happening? Did you ever understand that you were basically
    being kidnapped?
- speaker: Respondent
  text: No. You know how the Japanese - the old Japanese parents are. They don't communicate with their kids. It was the same
    with my dad.
- speaker: Interviewer
  text: Were you scared, or did you feel like something bad was happening?
- speaker: Respondent
  text: No, because we were all together.
- speaker: Interviewer
  text: Some other people have said the same thing, they didn't remember it being scary. It was only after the fact that they
    understood what their parents went through. Betty, what was your experience like?
- speaker: Respondent
  text: Well, I lived on a farm in Oregon. And I was the youngest of eight kids. So late at night after Pearl Harbor, my parents
    thought all the kids were sleeping. I couldn't go to sleep but I heard my parents talking to my oldest sister and oldest
    brother. They said that because they're not citizens, they might be sent back to Japan. So they told the oldest two that
    they would be responsible for the rest of the family. And when I heard that I just couldn't imagine life without my parents.
    So I just dreaded what was going to happen. And when we found out that we were going as a family I was so happy, I didn't
    care where we were going, as long as we were going as a family. Thinking you were going to be separated from your parents
    but you get to go as a unit, I'll go anywhere they go.
- speaker: Respondent
  text: You thought it was going to be much worse, that you'd be separated.
- speaker: Respondent
  text: People ask me, 'Weren't you scared when you got on the train?' And I say no, I was happy. I didn't care where we were
    going, as long as we were going with my parents.
- speaker: Interviewer
  text: What city did you grow up in?
- speaker: Respondent
  text: It was a town, Hood River. It was about 50 miles east of Portland, along the Columbia River. Beautiful country there.
    It's like, what they say, like redneck country [laughs]. Well, they wanted to get rid of the Japanese, right? But our
    neighbors - I only found this out recently from one of my brothers - when the evacuation notice came out, our neighbor
    who maybe lived a mile away from us had told my father, 'Don't report for the evacuation.' Because he was a hunter and
    a fisherman, and he would go in the mountains and he says, I know where I can hide you. And he said, "They won't find
    you." And he would provide food and shelter and he said, 'Don't go, don't go.' But my dad said, 'I can't expect someone
    to do that.' And our family was so huge. I mean he really appreciated that offer. He was really a good friend. So there
    were a lot of people that wanted to get rid of us but then there were good friends.
- speaker: Interviewer
  text: Did that neighbor offer to keep your house for you?
- speaker: Respondent
  text: Well, it was leased. But our possessions, I don't know where my father put them, we must've put it in storage. I don't
    know where they stored it.
- speaker: Respondent
  text: Because he went back. While we were in camp, he went out to work. My father said he didn't decide whether to go back
    to Oregon because people who went back said there was so much prejudice. And so my two older sisters had moved to Chicago
    because there were jobs out there and they were hired as housemaids. And my two older sisters said, "Why don't you just
    move to Chicago and forget about Oregon and start a new life?" And that's why my dad went to check Hood River before.
    And when he went into town, he went into a restaurant during lunch. And they wouldn't serve him. And he tried a few places
    that said "No Japs." So then my best friend's aunt had an electric store in town and she was friends with my dad. And
    so my dad went in there and he was visiting with her. And she says, "By the way did you have lunch?" And he says, "No,
    I couldn't be served." And she told him to stay there and she went and got food for him.
- speaker: Interviewer
  text: And she was hakujin?
- speaker: Respondent
  text: Yes, she was. And there were some Japanese Americans who were in the 442, and from Hood River. There was one that
    went to visit his family and he had his uniform on and he stopped to eat at a restaurant. And anything he ordered, they
    said they don't have. So he saw some guys drinking beer - he didn't drink beer but he ordered a beer - and they said they
    don't have any. And he said, 'How come you served them beer?' The guy said, 'Didn't you see the sign when you came in?
    We don't serve Japs.' And he had his uniform on. That's how bad it was. And a friend of my sister's, one of her best friends,
    wouldn't even talk to her. I said, what a friend. That's not a friend.
- speaker: Interviewer
  text: Well it shows also that it's the parents that instill that in the kids. How did your family end up in Tule Lake?
- speaker: Respondent
  text: From Oregon my father saw in the paper that people of Portland are being sent to the fairgrounds, stockyards or whatever.
    Well they sent us all the way down to Fresno, I think for three months. The camp wasn't even ready. My brother said we
    were living in tents and it was hot. We had to stand in these lines for the mess hall in the heat, and a lot of the Issei
    women standing in line would faint. I'd stand in line with my mother and I'd think, please don't faint.
- speaker: Respondent
  text: We were there for about three months and then they sent us to Tule Lake, and they had the so-called loyalty test.
    And I guess they considered my father loyal. So after Tule Lake became a segregated camp, we were sent to Minidoka. They
    were supposed to have sent us to Heart Mountain but then my Dad said he wanted to go back to Oregon and since Idaho was
    closer to Oregon than Wyoming, we went to Minidoka.
- speaker: Interviewer
  text: What do you remember about the food?
- speaker: Respondent
  text: We had it better than them because we didn't go to a mess hall, we cooked at home. According to the size of the family,
    they gave us a kerosene stove and an ice box. And we would go to the market. And we used to get a quart of milk for each
    kid a day.
- speaker: Interviewer
  text: Wow, that's a lot, right?
- speaker: Respondent
  text: Oh yeah. And in those days, the cream used to float, rise to the top. So when it was a birthday my mother used to
    ask for extra milk because it was delivered by the internees. And extra ice. So my mother used to make ice cream from
    that cream.
- speaker: Respondent
  text: His mother was a good cook and I'm sure she made substitutions. There at Crystal City you eat together as a family.
    But in camp my brother said he'd roam and go to different mess halls and find out which one had the best cook and they'd
    go eat there.
