turns:
- speaker: Interviewer
  text: Tell me, before we get started, tell me a little bit about yourself.
- speaker: Respondent
  text: Okay. My name is John Manley, but nobody knows me by that. Everybody calls me Chip because that's the nickname I've
    had since I was a kid. I was born and raised here in Mount Sterling. My family has been in the county here for generations.
    So we've got a long local history here, um, I am a third generation or was a third generation public school teacher. I
    just recently retired in 2023 after about 28 years teaching social studies at the high school. My mother was an elementary
    teacher. My grandmother, her mother was a middle school teacher, and both of them taught for over 40 years.
- speaker: Respondent
  text: So we've got a long history here in the county, I think when I retired last year, we figured out that there had been
    somebody in my family teaching in Montgomery County since 1934.
- speaker: Respondent
  text: So it was right at ninety years that one of us was employed in the school system. I don't know that I was as much
    of a troublemaker as my grandmother was, but I tried to live up to her reputation sometimes.
- speaker: Interviewer
  text: Troublemaker. In what way?
- speaker: Respondent
  text: She got moved around a lot because, especially with
- speaker: Respondent
  text: Spoke truth to power?
- speaker: Respondent
  text: Exactly. And so she got, she knew people all over the county because the superintendent tried to move her back then
    in the 30s and to try to make her quit. And she wouldn't do it. But yeah, so that was kind of the spirit that I had. My
    mother was always one of, you know, keep your head down. Don't make any trouble.
- speaker: Respondent
  text: I kind of wavered between the two.
- speaker: Interviewer
  text: Yeah, you were a good, uh--
- speaker: Respondent
  text: As the situation determined. So.
- speaker: Interviewer
  text: Yeah. And your grandmother, did she teach a particular subject in school?
- speaker: Respondent
  text: She taught middle school. And I think it was science for quite a bit, towards the end. But she started off teaching
    in one and two room schoolhouses.
- speaker: Respondent
  text: And before she ever graduated from college. She didn't graduate from college until the 1960s. But back then, Kentucky
    let you teach without a college degree, as long as she had her certification.
- speaker: Interviewer
  text: Fascinating.
- speaker: Respondent
  text: So my mother actually graduated college before my grandmother did. When the state passed new laws in the early 60s,
    she had to actually go back and get her college degree.
- speaker: Interviewer
  text: That's amazing. And they both taught a full thirty years?
- speaker: Respondent
  text: Grandma for forty-two and mom for forty-one.
- speaker: Respondent
  text: And I considered myself lucky to get to my twenty-seven.
- speaker: Interviewer
  text: Tell me, you said that you have a long local history in Montgomery County. How long have the Manley's, or your mother?
    What's your mother's maiden name?
- speaker: Respondent
  text: My mother was a Caudill.
- speaker: Respondent
  text: And my dad's family- my dad was actually the first Manley born in Montgomery County. His family was mostly from Bath
    County, Sharpsburg area, just a few miles away. Mom's family had come from a couple of different areas. My grandmother
    was from Nicholas County. My Grandfather Caudill was born here. But his family, the Caudill's, went back into eastern
    Kentucky, down towards Breathitt County and Letcher County. And they had moved here to Mount Sterling quite a bit earlier.
    But in researching our genealogy, I'm a direct descendant of ones who were attacked at Morgan Station in 1794.
- speaker: Respondent
  text: In fact, my, I believe, sixth or seventh great-grandmother was actually murdered by the Shawnee.
- speaker: Interviewer
  text: At Morgan Station?
- speaker: Respondent
  text: At Morgan Station.
- speaker: Respondent
  text: And her son, my ancestor, George Becraft, was kidnapped and taken and sold in Michigan, up in Detroit to a Scottish
    merchant, who basically taught him how to read and write. And when he was released after, the treaty of, uh, it was the
    Battle of Fallen Timbers, 1794, when they actually had to release all the captives. He was released and-
- speaker: Interviewer
  text: And he made his way back--
- speaker: Respondent
  text: Made his way back to his father, who was still here, Abraham Becraft.
- speaker: Interviewer
  text: Oh, my gosh.
- speaker: Respondent
  text: So I've got, you know, not every line of the family, but we do have roots that go back literally to the beginnings
    of Montgomery County.
- speaker: Interviewer
  text: Right. That's amazing.
- speaker: Respondent
  text: Yeah, it was a big surprise because growing up hearing about the Morgan Station attack and everything that happened,
    and then doing family research just a few years ago, and we found that direct connection back. So it was quite the, quite
    the eye opener.
- speaker: Interviewer
  text: And that's something, I mean, as a history teacher and as a lover of history, it's really special knowing that, you
    know, you've got that connection to the land, to the history, to the early families.
- speaker: Respondent
  text: So, yeah, my Manley ancestors came to Kentucky in the early 1800s and settled up around Mason County originally before
    they gradually moved south into Fleming and Bath County and then here to Montgomery.
- speaker: Interviewer
  text: Are you the genealogist of the family?
- speaker: Respondent
  text: Well actually, I inherited that interest from my Aunt Doris Nolan. And she had been kind of the family genealogist
    for decades, going back to the 50s, before the internet, before computers, when you actually had to write to the libraries
    and get them to send you the, you know, copies of the census on microfilm. So she had been, that had been a hobby of hers
    for many years. Me being a lover of history and later a teacher of history, that always had interested me too. So, I was
    always asking questions and trying to find out things. And then with the pandemic and everybody being stuck at home, I
    threw myself kind of into-
- speaker: Interviewer
  text: Oh that's cool. Yeah.
- speaker: Respondent
  text: -the research, three, four, or five years ago and started trying to develop it using online tools, more so than what
    I'd ever been involved before.
- speaker: Interviewer
  text: Right. Yeah. That's fascinating. You have a book to write? You have a book?
- speaker: Respondent
  text: And, you know, ancestry DNA actually helped us fill in a couple of spots when, you know, we were kind of stuck, and,
    you know, we weren't quite sure who a certain individual's father might have been.
- speaker: Interviewer
  text: Really? Yeah.
- speaker: Respondent
  text: And we were able to make connections through DNA with a family of who we thought we were related to. And sure enough,
    that traces it right back.
- speaker: Interviewer
  text: That's amazing.
- speaker: Respondent
  text: That was, you know, something we'd always kind of [knew]. My great-grandmother was born out of wedlock up in Carter
    County, and we always kind of knew who her dad was said to be.
- speaker: Interviewer
  text: Right. From an oral tradition. Exactly. From an oral tradition Exactly. From an oral tradition
- speaker: Respondent
  text: Exactly. From an oral tradition
- speaker: Respondent
  text: Exactly. From an oral tradition Exactly. From an oral tradition Just stories
- speaker: Respondent
  text: Yeah passed down, but we didn't have a firm connection. We didn't have anything other than his name. And managed to
    connect up with descendants of actual descendants of him as well as his family through Ancestry DNA. And were able to,
    I've reached out to him. I haven't heard anything back yet, so I'm not sure they want to admit that certain things happen
- speaker: Interviewer
  text: Right, right. So that's fascinating. Yeah. Once, if you're like me, once you start down that road, it's all-consuming.
    You have, you know.
- speaker: Respondent
  text: And then, you know, you find out why, you know, that her father was apparently married four times.
- speaker: Respondent
  text: Yeah, maybe. And had at least two children out of wedlock.
- speaker: Interviewer
  text: Right, right, right. That's amazing.
- speaker: Respondent
  text: Fits the character. Let's just say.
- speaker: Interviewer
  text: Well. So you have, you've been here, your family's been here, you've been here a long time. And the topic for today
    is Court Day, and it is a long-standing festival, 1794, in Mount Sterling. I'm really interested because people who grew
    up here have such a different take on the Court Day. So I kind of want to start with you describing the Court Days of
    your youth. Okay. Kind of what you remember about what that was like.
- speaker: Respondent
  text: For us, it was kind of I know well, I should say, you know, for me and my friends, it was kind of a, you know, a highlight
    of the year that we always looked forward to because not only did we get out of school for a couple of days, we were able
    to kind of go and see, and it was just something special about all these people showing up and, you know, in our little
    town for for something. As a kid, probably nine or ten years old, in some ways it was a little bit of a taste of freedom
    as well, because, you know, our parents would often take us downtown and they'd go one way and we'd go another. And they'd
    say, meet up here at this corner at this time. And we were kind of left to, you know, $20 or $10 in our pocket to wander
    around and, you know, look at things and pal around with our friends and not have to worry about, you know, really anything
    because we were in a place that we knew. Even though there were a lot of people around we didn't know, but, you know,
    we'd go hunting for baseball cards and comic books at people's stands, you know, things like that that interested us.
    I can remember one year that we all got, me and my friends, all bought these switchblade combs that looked like a switchblade,
    looked like a switchblade knife. But when you extended it, instead of a knife blade, a comb came out, and you know, so,
    needless to say, the school wasn't very happy when we all showed up with those at school the next year.
- speaker: Interviewer
  text: And what year would that have been?
- speaker: Respondent
  text: That would have been close to probably 82. Because I remember we had a, we did a school trip to Washington, DC, and
    everybody.
- speaker: Interviewer
  text: Had their comb
- speaker: Respondent
  text: One of my friends brought his comb and we tried to go through. We had to go through security to tour the White House,
    and he pulled out what looked like a switchblade knife, and the guards at the White House, um, reacted very negatively
    towards that, let's say. And he lost it that day. They did not give it back to him, but the rest of us, I think, had left
    ours at home or had already had them taken by our parents.
- speaker: Interviewer
  text: Right, right.
- speaker: Respondent
  text: By that time. But you know, so it was Court Day was always a little bit of freedom and allowing us to kind of, you
    know, be ourselves for a while with our friends. And sometimes as we got into being teenagers, that may not have always
    been a good thing. So to explore around. But, I mean, we would spend ten, twelve hours a day, wandering around downtown,
    going up maybe to a friend's house who lived close by to rest and eat and use the bathroom, and then head back downtown
    again until, you know, our parents picked us up, you know, when it got dark or at a certain time.
- speaker: Interviewer
  text: So your parents weren't worried? I mean, you know, in the 80s, we had crowds of over 100,000 people here. Were your
    parents never afraid?
- speaker: Respondent
  text: I just think it was a different time, you know, that there wasn't, there wasn't a fear of outsiders and a fear of
    things like, you know, we've kind of grown into now. I mean, we still trick or treated in neighborhoods instead of going
    to one location. You know, it was nothing for them to just hand us some money and, you know, tell us to stay out of trouble.
    And let us kind of just wander around as we saw fit, you know, we didn't have cell phones or-
- speaker: Respondent
  text: -anything to get in touch if we, you know, we knew there were, uh, we were going to see people we knew pretty much
    everywhere we went. So I just don't think that element of, of danger or really element of concern was there, you know.
    As a kid, I mean we'd get cut loose in a department store. You know, but we knew, you know, where we were going to be
    on the toy aisle or in the music aisle or something like that. And you know, we could almost always count on, you know,
    being found in no time. But Court Day was, you know, that on a much bigger scale.
- speaker: Interviewer
  text: Right. Right.
- speaker: Respondent
  text: Letting us kind of run around a little bit more.
- speaker: Interviewer
  text: Describe for me - and to someone who's never been, let's say someone's never been to Court Day. What did Court Day
    actually look like in those days? Describe exactly, maybe even from a bird's eye view, what would it have looked like?
- speaker: Respondent
  text: The main city parking lot, which is between Main Street and Locust, that whole area would have been filled with vendors.
    Then, of course, the gravel down by the railroad tracks area where now they've got the Farmer's Market building and all
    of that, all the way over to McCormick Lumber, which was on Queen Street, all that area would have been filled with vendors
    and then a little bit down to closer to the viaduct there from South Bank over. So it always seems to me that there was
    more, much more kind of handmade items. It was stuff that you might find at yard sales. Um, definitely people who would
    do this for a living, but a lot of it, it just seemed like people who would kind of come out and and set up stuff.
- speaker: Interviewer
  text: Local people?
- speaker: Respondent
  text: Local people to some degree, of course, you always had your food vendors around, and that was one thing I have to
    say that we were always told was, you know, um, if you're going to get food, get it from somebody that's local. So go
    to one of the, you know, places that like, um, the Kiwanis or, um, not Kiwanis, but like the Masonic Lodge and Eastern
    Star would have had their booths or one of the churches might have had a booth. You know, it was always kind of, you know,
    trust the locals when it comes to food type thing. And of course, there were guns and guns of all sorts and shapes and
    sizes And, um, again, not the concern that we have today. And I can remember, you know, classmates, when we were middle
    school, um, buying pistols and, you know, of course, we all had, you know, rifles and things, but, you know, buying a
    pistol at Court Day when you were, you know, under 15 years old was I mean, it'd be unheard of today.
- speaker: Interviewer
  text: And that was a normal occurrence?
- speaker: Respondent
  text: Yeah. Yeah. And they traded knives and.
- speaker: Interviewer
  text: Traded knives, um, walking around one thing I always recall from that time was guys walking around with ax handles.
    And I never knew there were that big of a call for ax handles, but seems to be there was. I always think of guys with
    an ax handle over their shoulder that they had just had just bought.
- speaker: Respondent
  text: Like I said, you know, we were always, uh, scrounging around, looking for comic books and baseball cards and things
    like that. And, um, you know, there were antiques and there were, you know, and probably when I was 13 or 14, um, I actually
    was the only time I was actually a vendor at Court Day. Um, my aunt got a small area. She had a consignment antique store
    here in town, and she brought down some
