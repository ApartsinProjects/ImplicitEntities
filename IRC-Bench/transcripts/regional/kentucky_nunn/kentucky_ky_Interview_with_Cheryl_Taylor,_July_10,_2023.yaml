turns:
- speaker: Interviewer
  text: So, Cheryl, how are you today?
- speaker: Respondent
  text: I'm doing fine.
- speaker: Interviewer
  text: You're doing fine?
- speaker: Interviewer
  text: I mean, it's a beautiful day and you live on a beautiful lake, so.
- speaker: Respondent
  text: Yeah, it was a horse farm. I guess that there's a bit of guilt with that but, you know, Ken--Fayette County is developed
    inside that urban planning zone and they're gonna take every piece they can get before they try to destroy their land
    around it, so.
- speaker: Interviewer
  text: Well, it's pretty and I'll say this is the prettiest spot I've probably ever done an oral history interview in.
- speaker: Respondent
  text: Oh, really? Well, good.
- speaker: Respondent
  text: I'm glad you feel comfortable here.
- speaker: Interviewer
  text: So, I always like to start with some biography. So, just tell me a little bit about yourself.
- speaker: Respondent
  text: 'Well, I was born actually in Laurel County because there was no facility in Clay. But as a child, I lived in Manchester,
    Kentucky and Clay County, Eastern Kentucky. My dad worked for the local coal company. He was a World War II veteran and
    went to college on the GI Bill. So, he was an accountant for the mine where--actually, most of my male ancestors were
    coal miners of some--or farmers. There were some farmers, but, but anyway. My mom was from that area, and he was from--born
    in Pineville and lived in Harlan. So, they both grew up in coal communities and, you know, that kind of thing. And--but
    the coal company started to decline. I was born in 1956, so they started declining in the sixties. And work was scarce,
    so my dad took the big step of getting a job, and we moved from Manchester to Louisville, which was quite a culture shock.
    I struggled when I got to the Jefferson County School system because I just was not even closely, you know, ready to,
    to make that academic step. We were so much--they were so behind. But eventually I--we lived there until I was in high
    school. My dad got another job, and we moved to Knoxville, Tennessee. So, I actually graduated from high school in Knoxville.
    I started college a year early, University of Tennessee, and then quickly transferred back to UK, because I like blue
    better than orange, so. But I went to UK. My first degree was in social work, and I worked in mental hospitals, different
    sorts of things and as a--I was twenty, twenty-one years old, and I didn''t feel like I could make much of a difference.
    I, I was a little overwhelmed with what the--you know, the serious mental illnesses (laughs) and I decided I wanted to
    do something in school where I could actually predict it. Where humans are somewhat unpredictable, science is a little
    bit more easy. Yeah. So, I went back to school and I got a mechanical engineering degree. So, with the two degrees, I
    started working right out of college for Procter & Gamble, and I worked for them for almost twenty-four years in manufacturing.
    Most of the work early on was engineering, operations, maintenance. I did a lot of technical work, but about halfway through
    my career they needed somebody to pick up the Environmental Permitting programs. (cheerful instrumental music) I have
    no idea what that is. The Environmental Permitting programs, safety programs, that kind of thing. And then all the permits--the,
    the whole--every time we put in a new piece of equipment you had to permit it and that sort of thing. So, I picked it
    up and learned it and found I just really enjoyed it. It''s kind of a nice combo of the social work and the engineering,
    because I worked with a lot of people and their behaviors. You know, we set up the very first recycling systems. We worked
    on content of materials that we brought in, we planted trees, we celebrated Earth Day. Things that had never been done
    there before. But Procter & Gamble is a very accommodating company. And they promoted women, which was also kind of unusual
    back in the seventies and early eighties. So, I was allowed to really gain a lot of skill. They sent me to many--I went
    to classes. I''m certified in a lot of different areas: storm water, hazardous waste, and air quality. I mean, they really
    train you well there. I had to pass a lot of tests and certifications. So, I was well prepared, but then after working
    there for so many years, I had the opportunity to go to work in government. And I took an enormous pay cut, but I went
    to work for Lloyd Cress, who was the commissioner--state commissioner for the environment and for Kentucky, as a special
    projects manager, technical advisor kind of role, and loved it. I loved working in the public realm. We did all kinds
    of educational things promoting--you know, trying to get the public to understand the impact that they had. Trying to
    make sure regulations were easy to understand for people and fair, trying to help business comply. I got several grants.
    We started some arts kinds of things, related to the arts and environment. And we started a program called Kentucky EXCEL,
    which was a voluntary leadership program you could join for, for people that wanted to promote environmentally conscientious
    work and behavior, and did a lot of things. And then Lloyd (sighs) was promoted and the next thing I knew I was the commissioner.
    So, I got promoted into his spot and I was the first female--I think it''s still the only female commissioner for state
    of Kentucky for the environment. So, there''ve been a couple of female secretaries. Actually, three that I know of. But
    I was the only commissioner, which is kind of, "you run the operations." And so, from a state level I had the opportunity
    to write regulations, explain to the community, represent Kentucky on a national level. EPA Region 4 met regularly, so
    I met the leaders of other states in the south. You know, it was, it was eye-opening, I mean, how much, how much opportunity
    there is to improve, and especially if we work together. And I really enjoyed it, but what I did discover is politics
    is fickle, and so as different leadership changes your job is no longer stable. And so, I--at that time my personal politics--I''m
    a very liberal Democrat. You know, I just--that''s how I--it is. My mom was a Liberal, my dad was more of a Republican,
    but not too--not like Republicans today. Eisenhower era, I like to call him, you know? But I, I worked for a Republican
    governor. He, he didn''t care. He thought I did good work and he didn''t care about my party. So, I worked for Ernie Fletcher,
    who was a, a nice guy and who actually helped support a lot of environmental initiatives. But then when he lost the election,
    I was hired by Jim Newberry to be the first environmental commissioner for the city of Lexington. Which sounds--it''s,
    it''s, it''s--that was one of the finest jobs I''ve ever had, because you''re impacting things at a local level and you
    can see the result. So, I took over right as Lexington went under an EPA consent decree, because--I don''t know if you
    know this, but back in--gosh! I don''t remember the year? It was 2000--early 2000s. Two young women drowned right across
    from the football stadium because the storm water here was so--it was unmanaged. There--development happened but there
    was no plan. And we went under a federal consent decree to clean up our act with storm water and get--there were no maps,
    even, you know? Where storm water went is just where it went. Nobody knew. So, I, I came into that job to help get us
    back into compliance and federal law, and then we also worked on our sewer systems. That was my personal favorites. Weird.
    Garbage, we did all kinds of--we put in the first energy and air programs in Fayette County. Recycling, we, we, (sighs)
    we bought twenty-seven brand new garbage trucks and initiated a recycling. I bought--the big machine that they used at
    the recycling center was bought when I came in the office. And, and it was a wonderful job. I enjoyed it. But again, fickle
    fate. You know, when the, when the mayor didn''t get reelected, I stayed for a little while working for Jim Gray. He was
    not nearly as supportive of environmental initiatives. Just not. Lots of things I could say, but I won''t. And so, I left
    there and then I, I did several things after that. I went to work for University of Kentucky. I had managed hospital maintenance
    planning for UK. I learned a lot about hospital environment and waste streams and things. I also went to work for an--a
    private engineering company based in Cincinnati, and did environmental consulting for them. Didn''t like that kind of
    work as much. I left--I went to Kentucky American Water company. I''ve just done a lot of different things and I guess
    finally I wound up at Wild Turkey Distillery. So, I did the environmental and safety management for them. So, in each
    one of those circumstances, I''ve had the opportunity to impact the results of the place I worked by making sure they
    were complying with the law, they were a head of the game, they were recycling, they were minimizing waste. You know,
    they were reporting accurately, representing to the public that, you know, we were a conscientious place or business.
    So, I''ve had a lot of fun jobs, a lot of things, and then finally I retired. But my unfortunate timing was I retired
    literally two weeks before the world shut down for COVID, and after a couple of months of pure boredom, I went back to
    the state. They, they needed help and so they hired me into the enforcement division. So, I was an environmental law enforcer
    for the state for about two years. We mostly worked remotely, but because I''d worked at the state I could ramp up fast
    and I was able to start working productively in a matter of about six weeks. They said most of the beginners coming in
    take a year to two years. So, I was able to help them fill a gap, and I learned a lot about the enforcement side while
    I was doing it. So, I''ve had a little bit of everything. I know that''s long-winded, but that''s kind of my environmental
    connections, I guess, all the way through. Lots of different types of work.'
- speaker: Interviewer
  text: Yeah, this is awesome. Jim Newberry, obviously, is the one who gave me your name. And he said--
- speaker: Respondent
  text: He was a magnificent person to work for--
- speaker: Interviewer
  text: She has done all the things. And I am very impressed by this list. I will admit, I don't a thousand percent know what
    some of this stuff entails, so maybe I'll ask you.
- speaker: Respondent
  text: Well, that's not your area. So, yeah.
- speaker: Interviewer
  text: Yeah. So, like, tell us a little bit about, like, what does environmental enforcement look like as a job?
- speaker: Respondent
  text: Well, environmental--the, the way that this state is set up, and it varies from state to state, but this state has
    the division of air, waste and water. And of course, you have labs and other things that work at state government level.
    And air, waste, and water in Kentucky are authorized by the federal government to act as a federal agent. So, I don't
    know if you follow that, but, but the feds--ultimately, the federal law is king, but they allocate the actual program
    management and operation to states if the state demonstrates it has the capacity to do that correctly and well. So, those
    three groups in Kentucky have field offices. There's--well, it's thirteen--they're kind of consolidating right now but
    I think they're still thirteen. But offices at different locations. London, for example. London, Kentucky has a field
    office. And for most--in most cases, there's an air, waste, and water office, and those offices house inspectors. So,
    the inspectors are all trained. Kind of managed centrally, but they're all trained and they're all on the job and they
    do the real hands-on work for state. You know, monitoring what's going on and making sure things are done correctly. And
    if they find a place where there's an outage or something being violated, they attempt to get that corrected at that point.
    But there's a lot of people and companies that are just--either they, they don't understand, which is kind of one end
    of the spectrum, or they do understand and they deliberately violate and do not care. Coal companies are its own thing.
    It's, it's a very difficult group. But once they recognize they've got an issue and they can't control it through their
    own means locally, then they report that back to the division of enforcement. And that's when we take over. And partly
    because of my age and attitude, nothing intimidates me. So, I, I mean, I've tackled some big cases. They gave me a lot
    of really messy cases because I've got the background of pol--you know, excuse my language, bullshit. I mean, they'll
    give you smoke, they'll give you--there's excuses, but a lot of it is just somebody's cutting money. Somebody's trying
    to promote themselves. There's some greed involved. They're too lazy. They don't believe--whatever reason, they're not
    gonna comply unless you force them. So, there's a process that you go through. Once the inspector reports that, that there's
    this violation that can't get corrected, then enforcement takes that and makes a case, and then you get a case manager
    assigned. So, I was working kind of at the basic level, but I've done so many things. They gave me all the weird--we have
    weird cases in Kentucky. There's coal, there's--well, there's munitions, there's, you know, all kinds of things. And so,
    once you get the case, you do the background research, you compare it with the regulations and make sure that it's valid.
    And then you start to gather your data and then you contact the party and say, "You're in trouble. We're gonna--we need
    to talk with you about what you're gonna do to come back into compliance or--." Then there will be--mostly it's monetary
    fines. Now, you can get something that goes beyond that, but monetary fines are the biggest. The biggest fine I remember--not
    during my tenure, but while Lloyd was still--was Rockwell was fined almost ten million dollars. And of course there's
    still a lot of stuff going on in western Kentucky with Paducah, gaseous diffusion, and weapons. You know, there's a lot
    of big cases here, but there have been some pretty hefty fines levied. But, but some of the cases were as simple as, you
    have empathy, but it's some farmer that lives in Clay County or wherever and they just like to burn their trash. You know,
    they burn it and burn it and burn it and burn it. And you can't just burn it. You know, it, it, it leaves a sediment in
    the air, a particulate. It, it's--or, or hoarders that live on a property and they've collected every junk car, trailer,
    whatever, you know? I mean, so sometimes I was dealing with a person who literally did not even understand that there
