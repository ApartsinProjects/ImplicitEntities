source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself.
- speaker: Respondent
  text: Well, I love to talk about myself. The truth is I am at heart a girl of the mountains. And now it's only years later
    that I have come to realize how significant growing up in a very remote, isolated area, for the time, what an impact that
    had on my life. And so, we were always busy. We were always doing things. And I came out of those mountains, and you look
    back and understand these things. At the time, you're just growing up. You're just, you know, existing and having fun
    and little dramas. Looking back, I realize that many of the things that I did successfully, relate back to Benham. For
    example, my ability to work with people in all strata definitely comes from Benham because there in this little remote
    town, a coal camp, International Harvester's, only captive coal mine. Captive meaning that all the product went strictly
    to International Harvester, not to any other companies. But we all were together all the time. There were no real class
    distinctions. I mean, everybody knew whose father was the superintendent or the doctor, this type of thing, but it really
    did not play a part. As a result, I came out understanding that people of all walks of life have importance, and should
    be treated accordingly. At I also think that maybe because in my life I have ended up doing tremendous amount of travel
    on a very high level, and, uh, I think my ability to work with people at all levels also is a result of not being afraid
    to do that after having come from the mountains.
- speaker: Interviewer
  text: How would you describe Benham to me? Like, walk me through the streets visually during that time when you're growing
    up.
- speaker: Respondent
  text: I think it's important for the audience to understand that the time period we're talking about is primarily focused
    on the 1940s, 1950s, and the 60s. We are starting we'll use me as an example. I'm starting life with a home that's more
    remote than the town because I live outside the town. Now, in a little town, little area called Clutts. Now, I'm growing
    up.
- speaker: Interviewer
  text: How do you spell that?
- speaker: Respondent
  text: C-L-U-T-T-S. There's a real debate on whether it's S or Z, but either one. But I'm growing up in the middle of what
    were the Gilliam clan. Now, Brunner Gilliam was a mountain man of the true tradition. We're talking about he the man who
    walked with the gun, who did the hiking, who took us, he and he would take, there were about four of his children, including
    his grandson that we called Little Joe. Joe McCauley. And he would take us all over those mountains. You know, show us
    all the rattlesnake holes, all these kind of things. So I'm growing up there but we didn't consider ourselves isolated.
    It's only on reflection that I can say it's remote. But growing up out when we're I'm learning to churn butter with Gran
    sitting there. I'm uh, uh we're doing hog killings. We're doing all these what you think of today as pioneer times in
    a certain sense. But we always had a telephone. But we did not get television until I was a junior in high school.
- speaker: Respondent
  text: So the whole concept of any kind of technology having a major impact on our lives, it did not. It also meant that
    we were not as aware of what was going on in the world as you would be today. But the greatest gift we had, and again,
    this is on reflection, At the time, it was just part of my life. We were always outside. We were roaming those mountains
    either by myself or later with some of the playmates. We were swinging on grapevines over ravines. How we lived through
    it, I don't know. You know, riding a horse up and down, learning to shoot guns doing all these things. It's a whole different
    era. And I In every interview I had, without exception, they all talked about how they wish their children or their grandchildren
    could have lived the life that they lived because now all they do is sit inside and they live with fear. We never lived
    with fear.
- speaker: Respondent
  text: You know the only fear we might have is somebody got in a scuffle, and they might be bigger than you were.
- speaker: Respondent
  text: But that was, that was it.
- speaker: Interviewer
  text: I was born in the 70s, and I do feel like I was that last free-range generation. We'd go out and, you know, I was
    in the suburbs, but we still had hundreds of acres of forest around where we were, and we'd be gone twelve hours straight,
    no cell phones, no tracking, no nothing.
- speaker: Respondent
  text: You know, another thing that fits right into what you're talking about, in Benham, everyone knew everyone. There was,
    at the time, the population was about 3,500. Now, for the audience, we're living in an area that's in Harlan County, and
    it is called the Tri-City Area. It's Cumberland, which is the trade area, Benham, which is the International Harvester
    coal camp area, and then Lynch, which is the U.S. Steel coal camp. And IH had sold the land to U.S. Steel, from which
    came Lynch. So all of this had happened, but interestingly enough, you did not date outside your community. Oh, no. That
    did not happen because you had all these rivalries in sports and all this. And it they were slightly different cultures.
    The base was the same, but it was slightly different. But in your communities, and this was true in Lynch and it was true
    in Benham, I can't speak as much to Cumberland being the trade area. The whole town raised you. If you were somewhere
    and you were doing something that was not the right thing to do, whoever was standing there, they disciplined you and
    by the time you got home, your parents knew about it, without telephones now. Because there weren't telephones just throughout
    the town until I would say the fifties.
- speaker: Respondent
  text: Okay. So, we that, that context of being raised by a village, we were. Absolutely. And, uh, there was never any question
    that you obeyed what every adult was around. And that, I think, was a beautiful way to grow up because it kept you on
    the straight and narrow as to what was the correct behavior and what was not.
- speaker: Interviewer
  text: Well, forgive me for asking this question but I have to ask this question because this is for history. When were you
    born?
- speaker: Respondent
  text: Oh, do I have I've told people I've been forty-nine several times now. I was born.
- speaker: Interviewer
  text: Where exactly were you born?
- speaker: Respondent
  text: I was born in the Benham Hospital.
- speaker: Respondent
  text: But now there's a story around that.
- speaker: Respondent
  text: You've heard the term Bloody Harlan.
- speaker: Respondent
  text: Bloody Harlan comes because there were major labor union wars. Wars between United Mine Workers and in Benham, for
    example, the Progressive Mine Workers, so that you have different labor unions that are competing. On the day that I was
    born, it was right in the middle of these labor union wars. My dad came to the hospital and helped deliver me. I even
    have a letter that he wrote to his mother on that day. And when she talks about, I have I think this is correct, that
    six men have been shot. The whole town is armed. You know, this was and during that time, people were killed.
- speaker: Respondent
  text: But it was Bloody Harlan comes because of the union wars. And I don't think most people realize that's how that term
    evolved. But I was literally born in the middle of those. And Dad has blamed my personality on that fact ever since.
- speaker: Interviewer
  text: Oh, I love that.
- speaker: Respondent
  text: But he literally, in the Credit Union, had been converted from a former apartment. There were three different sites,
    but at this particular site, it had a cast iron tub in it. And that's where he slept.
- speaker: Respondent
  text: Because on the mountains, they were shooting from the ridges down into the town.
- speaker: Respondent
  text: Well, speaking of your dad, let's talk about your parents. Who were your parents?
- speaker: Respondent
  text: My father is Robert B. Hern, now senior. And my mother, Pauline Ruth Pauline Parker, was her maiden name. There were
    twelve years difference in their age. And we never realized that growing up.
- speaker: Respondent
  text: Never entered our minds. The other thing, my dad came from New York State. He came down. He had a brother who was
    already in the mountains. And he came down, and they were just creating the Credit Union. Well, he's coming from New York
    State, and he has two years of education at Cornell University in Ithaca. Well, that's a lot of education in 1937 or thereabouts
    in the mountains of eastern Kentucky. So he became manager of the Credit Union. Was hired, and served for forty-one years.
- speaker: Interviewer
  text: Mm. So he really, I see, I thought he had been there for some time before the Credit Union began but he really came
    down oh, wow.
- speaker: Respondent
  text: In fact, in the documents that we have discovered, it would appear, that they filed in 1935 for the to institute.
    This is something that might be of interest. A credit union could only exist if a company sponsored a credit union. So
    Benham International Harvester chose to sponsor a credit union for its employees. Now stop and think of when we're talking
    about. We're talking about the mid-1930s. We're in the middle of the big depression. And so the whole intent is that their
    employees have a banking type of situation in which they can save, borrow, do normal banking activities because the one
    local bank at the time had collapsed.
- speaker: Respondent
  text: Now, interestingly enough, Lynch did not U.S. Steel did not sponsor a credit union for Lynch until we get to, I think
    it was the 1960s.
- speaker: Respondent
  text: Because my dad went up to do the first credit union. Now, how long that lasted, honestly, I don't remember. But here's
    the key to this. Whereas International Harvester wanted a financial institution available. 1960, '61, '62 is a time when
    both U.S. Steel and International Harvester decided they wanted to sell the company-owned town, the houses, to those employees
    miners who were there. That's when Lynch then asked that I don't know whether it was a little branch from Benham, I don't
    know whether it was independent, I'm not certain, but that was when Lynch instituted theirs.
- speaker: Interviewer
  text: Interesting.
- speaker: Interviewer
  text: We're going to talk about that. I'm going to go backwards to the family stuff first. And, um, your father was from
    New York. Where was your mother from?
- speaker: Respondent
  text: My mother was a little girl from the mountains. Her she had actually been born on that fine line between Harlan County
    and Bell County. Her dad, my grandfather, Charles Ross Parker Sr., he had come from a family his father had married twice
    and had twelve children. The father died, so my grandfather at age twelve goes into the mines to support.
- speaker: Respondent
  text: The rest of the family. And for years, you know, almost everyone's gone now, but they would talk about how Charlie
    made all the difference, in those years for them. Now stop and think about a twelve-year-old going into the mines and
    worked there for the rest of his life. But he moved to Benham fairly, uh, soon after I think Mother was born. There were
    three children there, Mother the eldest, Pauline Parker Hern, and then her sister, Onlee, O N L E E, and then the son,
    the junior, that we called C.R. And C.R. is only seven years older than I am. So, you know, it's really a whole family
    evolution, in a way.
- speaker: Respondent
  text: In terms of the mountains. But to go back to what, what we were talking about, mining is the core. You have my mother,
    now, who is very active in everything. In those days, the women, the idea of working outside the home it just wasn't possible
    unless you were a nurse, possibly working in an office, but very rarely, or a teacher, you did not work outside the home.
    And let me give you an example that no one today can possibly relate to. I have cookbooks from the Benham Community Church,
    and it has all the signatures of who it is, and it's always Mrs. Charles Parker, Mr. Robert Hern, Mrs. Robert Hern. They
    were referred to officially by the name of their spouse their husbands. My grandmother, and I would guess now we're talking
    about mid-fifties, she decided to have her own little dress shop called Joanna's down in Cumberland. And I can remember
    it was a very it, it was very small. But that was a step out of the norm.
- speaker: Respondent
  text: Big step out of the norm. Now, the very next generation is when you see, the evolution of women starting, but for
    the mountains again this is reflection, I hadn't understood how important this was growing up. It's just that Mother Parker
    was doing this and how much fun to go down and play with all the clothes and all that. But I'm sorry I
