collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Ruthie, what is your full name?
- speaker: Respondent
  text: Ruthie May Wilson.
- speaker: Interviewer
  text: And you were born?
- speaker: Respondent
  text: I was born in Lynch, Kentucky. The hospital was known at that time--the Notre Dame Hospital. Now it's called Meridzo
    Center or--either Solomon's Porch.
- speaker: Interviewer
  text: What year were you born?
- speaker: Respondent
  text: I was born in 1949.
- speaker: Interviewer
  text: Who were your parents?
- speaker: Respondent
  text: My parents was Katie Quarles. My father--we were raised by--my mom was with us, but we were raised by our grandparents
    more or less. My mom stayed with us. Robert Lee Quarles, Gertrude Quarles, Gertrude Quarles.
- speaker: Interviewer
  text: Was your father a coal miner?
- speaker: Respondent
  text: My father, as we called him "Daddy," he was a retired coal miner. And we lived--we resided in a camp called Number
    Three.
- speaker: Interviewer
  text: And this was in Lynch?
- speaker: Respondent
  text: Lynch, Kentucky.
- speaker: Interviewer
  text: 'For the purposes of this interview, what we have is a situation where we are interviewing a woman from Lynch. There
    were three towns: Cumberland, Benham, and Lynch.'
- speaker: Respondent
  text: Tri-Cities.
- speaker: Interviewer
  text: Cumberland was the trade area.
- speaker: Interviewer
  text: Benham was the International Harvester Mine, and Lynch was the U.S. Steel Mine.
- speaker: Interviewer
  text: Both U.S. Steel and International Harvester were, in fact, having coal camps. And there were, I would think, great
    similarities between the two towns because they literally ran into each other. Was that your impression at the time?
- speaker: Respondent
  text: That was my impression.
- speaker: Interviewer
  text: Now, Ruthie, do you prefer to be African American or Black? What's your preference for this interview?
- speaker: Interviewer
  text: One of the differences in terms of Lynch and Benham was that we each had our own school systems. Is that your memory?
- speaker: Respondent
  text: That's my memory.
- speaker: Interviewer
  text: What was it like in Lynch? What did you have in Lynch?
- speaker: Respondent
  text: With our school system?
- speaker: Respondent
  text: Okay, I went to--it was called West Main. But back, I guess, in my mom's and them's days it was called Lynch Colored
    School. But as I went there it was West Main. And it was--consisted of from the first to the twelfth grade. And I'm thinking
    it might have been '64, '65, whenever they integrated. And I attended West Main from the first to the ninth. But as we
    had to move--because when you retire from the mines, you know--they were company houses, and we had to relocate to Cumberland.
    So, my mom let my sister Cheryl stay at Lynch. She used the residence of my aunt, and she was even the first Black queen.
    And my brother played football. So, they stayed with my Aunt Ruth and Uncle Snow so that they could still finish their
    schooling at Lynch. But the other three of us had to go to Cumberland.
- speaker: Interviewer
  text: So, when you have this division between the two schools--and we're talking about the fact that your sister and your
    brother are staying in Lynch at a time of integration--
- speaker: Interviewer
  text: So, what did they call the Lynch school at that time?
- speaker: Respondent
  text: The--you're talking about the Black school or the--
- speaker: Respondent
  text: They still considered us as--it was still West Main. But then, Lynch--it was Lynch Independent.
- speaker: Interviewer
  text: Lynch Independent. So, your sister was the queen, football queen.
- speaker: Respondent
  text: She was first Black queen.
- speaker: Interviewer
  text: In the integrated school--
- speaker: Respondent
  text: In an integrated school--
- speaker: Interviewer
  text: In the early years of integration.
- speaker: Interviewer
  text: Do you find that amazing?
- speaker: Respondent
  text: I find it amazing.
- speaker: Interviewer
  text: What were your thoughts at the time?
- speaker: Respondent
  text: Oh, at the time, we were so overjoyed and so happy and, you know--but at one particular time, I think they did not
    even want to have a parade. But different ones in the community, ones and--you know, the guys, different ones said, "If
    they don't have the parade, we're not going to play." So, they did have the parade and, you know--and that same particular
    year, I think it was like UMWA chose her as a candidate or queen for, you know--for the UMWA, you know. Other than that,
    I--I don't--I don't recall too much prejudice or, you know, if it was, we wasn't aware because, like I say, we went to
    different schools.
- speaker: Interviewer
  text: What did your brother go ahead and do after high school?
- speaker: Respondent
  text: He enlisted in--it was--it wasn't the Navy. It was--he was--went to the Army. He went to the Army.
- speaker: Respondent
  text: He went into the coal mines at Lynch and--as well as my husband. They went to Lynch in--I think--they were called
    thirty--let's see thirty-one is the portal--thirty-five at--in Gap Branch, at Gap Branch.
- speaker: Interviewer
  text: Because they named different areas of the mine different numbers. Is that correct?
- speaker: Respondent
  text: Different numbers, right.
- speaker: Interviewer
  text: And so, they were at Portal Thirty-five.
- speaker: Respondent
  text: They was at thirty--yeah, they just called it thirty-five mines.
- speaker: Interviewer
  text: So, it's thirty-five.
- speaker: Interviewer
  text: Tell us about your childhood growing up. What was it like? Where did you live? Who did you play with?
- speaker: Respondent
  text: Okay. I lived in--like I say, it was called Camp Number Three, number three. I still remember our address 457 Kearn
    Street, K-E-A-R-N is Kearn Street. And everybody was like--it was so close, you know. As a matter of fact, we never left
    from over our camp unless it was to go to school, go to church, or maybe one a month some--they would take us to Cumberland,
    get shoes or something to that effect. But as living over there, we was just--it was like freedom, but we wasn't out at
    night. You know, everybody knew the sound of the parents' voice. And when it was time to come in, all they had to do was
    just whisper--whistle or say your name and you all--you know, but we played together in that community even with the whites--white
    children. We were all just like close-knit, you know.
- speaker: Interviewer
  text: My memory is that during the day, in your neighborhood, whether it was a street or two or three streets, whatever
    it was, everybody played together, and you ate at whoever's house you happened to have been at at the time.
- speaker: Respondent
  text: Right, right.
- speaker: Interviewer
  text: But when you came nighttime--
- speaker: Respondent
  text: You was home--
- speaker: Interviewer
  text: You were home. Is that your memory?
- speaker: Respondent
  text: That's my memory. That's my memory.
- speaker: Interviewer
  text: What were Sundays like?
- speaker: Respondent
  text: Our Sundays was like you know--well, first of all, we'll get back to like--we didn't have the--like the bathrooms.
    We had what you called the outhouses. And they were kept clean. I know my grandmother--she was--she--she really was, I,
    I'll say, a fanatic on cleanliness. And some of the traits--I guess me, and my sisters took up that trait--I think it's
    called the linoleum rugs--she was so--she would do the lye soap to disinfect the bathrooms. And the leftover linoleum--she
    would even put it on the floors in our out toilets. Okay, as we got older, my grandfather--because the toilets--the outdoor
    toilets connected. The neighbors' side was there, and ours was like there. And my grandfather said--he had the leftover
    plywood, different things. He made us a little stall where we would have to use it because he didn't want us outside.
    He said that's how boys and girls like, you know. So, we would have to take the waste and then take it during the day.
    But he did that and made the stall. We had the--a sink. You know, no commodes, nothing like that. But we had what you
    called the number two tubs.
- speaker: Interviewer
  text: What were the number two tubs?
- speaker: Respondent
  text: That was what you bathed in. It was--they were sort of like--we washed up, took care of the hygienes every day. But
    Saturday, we had to get the, you know--and the, they had another little bucket called the foot tub, and that's how we
    were rinsed off, you know.
- speaker: Interviewer
  text: I remember the big--not cast iron--metal--
- speaker: Respondent
  text: It was silver. They were like the big silver tubs. Yeah, that's right--
- speaker: Respondent
  text: You're right.
- speaker: Interviewer
  text: And that--that's what you bathed in.
- speaker: Respondent
  text: By the warm morning heater.
- speaker: Interviewer
  text: What were your Sundays like?
- speaker: Respondent
  text: Our Sundays--like I said, we had to attend, you know, Sunday School, church. And even in the evenings, we would stay
    busy because they would have like BTU.
- speaker: Respondent
  text: That's Baptist Training Unions, you know. And even as we got older, if we did not go to church, Sunday school, you
    know, we couldn't go--we had a little place called the pool room. And that's where kids would gather and, you know, dance
    and, you know, eat and socialize. But if we did not attend, we could not go. You know, we couldn't even fake sickness
    and then think we could go, you know--
- speaker: Interviewer
  text: In Benham, they had the youth center that I think is the equivalent of your pool room.
- speaker: Interviewer
  text: And that's where the kids went. And the parents were the ones who served as the chaperones. Was that the same way?
- speaker: Interviewer
  text: The parents were not going to permit any kind of foolishness--
- speaker: Interviewer
  text: My memories--and even if they didn't chaperone, the people that ran it during my time--it was called--Miss Gussie
    and her husband. And Miss Gussie was your parent away from home. Miss Gussie will tell on you if you go out that door
    or you didn't come back because I've been told on many times. (both laugh)
- speaker: Interviewer
  text: Well, Ruthie, what were you doing? (laughs)
- speaker: Respondent
  text: I was like--my husband that's deceased now--you know, my brother drove us to the pool room, and it closed at twelve.
- speaker: Interviewer
  text: Where was it located?
- speaker: Respondent
  text: It was located in Lynch right--not too far behind the, you know--the West Main School. But it's toward down--as a
    matter of fact, it was a barbershop at the bottom. And the guys and stuff played pool and did pool or whatever. That's
    why they called it the pool, uh, the pool room. But we was not allowed down in the basement part where the men gathered,
    you know.
- speaker: Respondent
  text: And Miss Gussie--she had--you know, she sold hot dogs, the little orangeades, and the chips and, you know, we couldn't
    get it every day. Some could, but we couldn't on our income my mom, as a parent's, income. But we could go maybe on the
    first of the month, and it was a treat because we could get it, you know.
- speaker: Interviewer
  text: Talking about Miss Gussie would tell on you--at the Benham youth center, we had Miss Robinette. And if we called over
    to the police station, which of course was just across the street in downtown Benham. Let me tell you, they were there,
    and nobody was getting out of line for very long. And if you did, you were not permitted to come back.
- speaker: Interviewer
  text: A very different world--
- speaker: Interviewer
  text: From what we see today. I would imagine you never thought about talking back to your parents.
- speaker: Interviewer
  text: What would they have done?
- speaker: Interviewer
  text: All but killed you--
- speaker: Respondent
  text: All but killed you. And guess what? We still alive. But now, if you touch a child, it's child abuse. But I--I guess
    I'm from--I'm from the old school. And even when they stopped the discipline in school--when they stopped the discipline
    in school--
- speaker: Respondent
  text: I didn't let that stop me. I would go to the school--I always taught my children, "If you have the problem with the
    teacher, whatever, any adult, bring it to me, and I'll take care of it." And a lot of parents it's like--want to jump
    the teachers, do this. But me as a parent--everybody know their child and what they might do and what they might not.
    But I disciplined mine. I have gone in the school, got my grandson--I raised five of my grandchildren. And he didn't have
    a belt on this particular time. I think he was either in kindergarten or first grade. And he got in trouble, him and another
    little boy, on the bus. But he said that little boy threw a spitball or hit him with a spitball, and he threw it back.
    And I said, "First all, it's nasty." So, I took him in the bathroom. I asked one of the teachers, "Please." They said,
    "You can't do that." I said, "That's mine," and I took him in. Had the belt, wore him out.
- speaker: Interviewer
  text: He didn't do that again?
- speaker: Respondent
  text: Huh? No, no, no. I've had him again in his school. But I would go, and I'd hit him in the principal's office, slap
    him or chastise him right there. As one time Mr. Dick--do you remember Mr. Dick?
- speaker: Interviewer
  text: Oh, absolutely.
- speaker: Respondent
  text: And there he said, "All I can do--you don't chill out or sit down I'm going to call 848-5585 or 848-5555." Those were
    my telephone numbers. So, I go over. And he--you know, he said, "Mama, you embarrassed me." That's my grandchild, but
    he called me "Mama." And I said, "What do you mean?" He said, "You come over there right in front of all the kids and
    you"--I said, "Don't you think I was embarrassed for them to call me?" I said, "So, check it up."
- speaker: Interviewer
  text: You are a wonderful, wonderful woman and mother.
- speaker: Respondent
  text: I--you know, I didn't say they didn't go astray. Some of them did. But they say, "Train a child in the way
