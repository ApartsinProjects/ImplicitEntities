collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So, for us getting started, I thought we would keep things kind of broad and general. And, of course, this is really
    all an opportunity to sort of reflect on 250Lex, really. And so, if you would care to introduce yourself and state your
    role.
- speaker: Respondent
  text: Well, I'm Linda Gorton, and I am the mayor of Lexington, Kentucky. I'm in my seventh year as mayor.
- speaker: Interviewer
  text: Your second term, I think, right?
- speaker: Respondent
  text: My second term, right.
- speaker: Interviewer
  text: And I was looking at something recently, and I mean, you just steamrollered into your second term, right?
- speaker: Respondent
  text: I think it was 71 percent of the vote.
- speaker: Interviewer
  text: Seventy-one percent, yeah. Congratulations on that.
- speaker: Respondent
  text: Well, you know, I'm a real people person, if you don't know that yet. And, um, I work for people. That's my whole
    purpose, so. It was pretty exciting to do that. I never thought I'd do that, but—
- speaker: Interviewer
  text: You mean run for political office?
- speaker: Respondent
  text: Well, that in the beginning, and then get 71 percent of the vote.
- speaker: Interviewer
  text: Oh, right, yeah.
- speaker: Respondent
  text: Yeah. So, it's very exciting.
- speaker: Interviewer
  text: Well, you have gotten to do something pretty interesting, which is create this anniversary for the city of Lexington.
    Obviously, the anniversary was coming regardless, but—
- speaker: Interviewer
  text: But being at the head of the table and kind of planning this kind of thing, I'm sure there were many, many, many irons
    in the fire.
- speaker: Respondent
  text: Many irons in the fire, and, um, so we looked—we started talking a couple years ago, and we looked at what the city
    did for its two hundredth birthday. They had a weekend celebration. And I said, "Well, that'll never work." We have too
    much to celebrate, right—
- speaker: Respondent
  text: And to recognize. Some of it wasn't exactly a celebration, because most cities in the South have a piece of their
    history that's not a happy piece. But we want to recognize our history, celebrate our history, and look into the future.
- speaker: Respondent
  text: So, I said, "How about a year-long celebration?" I don't remember how my staff reacted right then. But it has worked
    out beautifully and has touched, really, literally thousands of people over the year. We're, you know, we'll soon be finished
    with our year.
- speaker: Interviewer
  text: I know, it's just kind of—
- speaker: Respondent
  text: Yeah. Mm-hmm. Yeah.
- speaker: Interviewer
  text: It's whizzed by, I believe. Now, planning, if I remember correctly, I think planning started almost exactly two years
    ago.
- speaker: Respondent
  text: Yes, it did. Yes.
- speaker: Interviewer
  text: In September of 2023?
- speaker: Respondent
  text: Could—that could be. Um, so I—the way—I'm a fairly, um—I think in a very organized way, which most nurses do. I'm
    a registered nurse. And I thought, okay, I'm gonna have a commission. We'll call it the 250Lex Commission. I'll have co-chairs—'cause
    I think it's always good with a big effort to have two people leading—and appoint people to it. And so, that's what I
    did. And it was—it has turned out to be a really good thing that we had a commission of people who were willing to work
    on this. And then, we got really organized and there are ambassadors for each month of the year who take it upon themselves
    to help plan and execute the various activities. And every month had a theme.
- speaker: Respondent
  text: I mean, it got very organized that way. And it's worked out beautifully. I've loved it.
- speaker: Interviewer
  text: And it also maybe feels nice to have sort of set this in motion and put people in place who—I feel like you're big
    on kind of empowering people to do their job.
- speaker: Respondent
  text: Oh, yes. I can't do everything, right? And my—
- speaker: Interviewer
  text: Can you tell that to some other leaders?
- speaker: Respondent
  text: I, I—yeah. I should do that. Um, and I realize I cannot micromanage everything. So, what I like to do is put people
    in places of leadership who have skills and abilities and let them go. And I do that in my own staff with my senior leaders.
    You know, I'm not micromanaging them. But yes, I like to empower people. The more people we get empowered on different
    issues and different activities like this, the better. Because this was for all of Lexington, right? Not just a few people.
    And it was about all of Lexington and about all of our history and about looking into the future. And so, I'm very excited
    about the way it's all played out. We've had bumps in the road. Every good effort does, right? Everything. It's human
    beings, and it's life, but it has worked very well. I'm very proud of the effort that it turned out to be.
- speaker: Interviewer
  text: Yes. And I was thinking about, you know, having delegated this so well to other people, how does it feel to you to
    lead Lexington at this point in its history, during this 250Lex year? How does that feel to you to have done that as this
    year sort of closes out?
- speaker: Respondent
  text: Well, we won't have another 250, will we?
- speaker: Interviewer
  text: I guess we won't.
- speaker: Respondent
  text: And more than likely, a lot of us will not be around for the three hundredth. It has been a wonderful honor. It really
    has. And, um, you know, I have really enjoyed seeing people's reaction to a lot of the things that we have done. People
    want more of it. They want it next year.
- speaker: Interviewer
  text: Two fifty-one.
- speaker: Respondent
  text: But it's very—it is very special for me to be able to do this. And I take it as a great responsibility, but a really
    good one for people. So, I'm really honored to have been able to do this.
- speaker: Interviewer
  text: You mentioned a few minutes ago that you maybe polled some of other southern cities who said, yeah, we're doing a
    weekend. We did a year here in Lexington. Did you feel like that was too far in the other direction? Did you feel like
    you hit the right spot? The distance between a weekend and a year is a lot.
- speaker: Respondent
  text: It is a lot, but I think it's just right because it allowed us to have things like Music Month, Culinary Month, Come
    Home Month, which brought loads of people back to Lexington, and that was confirmed by the Hotel and Visitors Bureau.
    You know, we've had all kinds of focus—Equine Month, Arts Month. That, I think, is what people have loved the most, is
    there was pretty much something for everyone. I don't know how you do that in less than a year.
- speaker: Respondent
  text: Because there's so many things to celebrate. And so, it actually worked out well. At first we were going, okay, what
    are we gonna do? And then we started getting ideas from everybody who was serving on the commission and from folks in
    my office, and it became a huge collaboration. Now, I'm big on collaborating. You know, I come from that healthcare background
    where just about everything is teams, team-oriented. That's how you accomplish a lot of good things. I think a lot of
    cities would have said, oh, there's no way we can do a year, but we took it on. And I actually have another city soon
    coming to talk with me because they're getting ready to celebrate a big birthday in a couple years. How cool is that?
    We get to have a conversation about how we did this, what worked, what didn't work, you know. And so, it's worked well.
    And throughout the year, in every month, a lot of people have had a favorite activity. And they've said, we need to do
    this every year. That's like a legacy. That is bringing something really good to the city more often. So, I think it's
    all good.
- speaker: Interviewer
  text: It occurs to me, too, that for those of us who have lived in Lexington for a long time, whenever we interact with
    people not from here, horse racing comes up.
- speaker: Interviewer
  text: Bourbon comes up. Maybe a couple other things. But it must have been fun on a certain level, because as a Lexington
    resident, I always want to be like, but, but, but—there's more. There's lots more that you don't know about.
- speaker: Respondent
  text: There is a lot more. And that's what we tried to do. Think about literature. Lexington is a huge hub for writers,
    really good writers. We have had several Poets Laureate for Kentucky come from right here in Lexington. So, we highlighted
    literature and writing one month. I mean, those are things that people don't necessarily think of every day. But it is
    true, there is a lot of good that has come from Lexington. And I actually have been here long enough that I remember a
    day when there was nothing going on here except maybe sports.
- speaker: Interviewer
  text: I left that out. Sorry, I left out basketball.
- speaker: Respondent
  text: We had a Sports Month. And so, both Kenny Brooks—the women's basketball coach—and Mark Pope—the men's basketball coach—and
    I had a bunch of high school basketball coaches for basketball week. We did the same for football week. I mean, it's pretty
    cool when you can highlight, pick out those things that make us special here.
- speaker: Interviewer
  text: And really give those a little boost.
- speaker: Respondent
  text: An oomph, right. That's how we did it. And they all loved it.
- speaker: Interviewer
  text: I want to go back to healthcare some, and I have thought a lot about your previous career as a nurse. And I was curious,
    how do you feel these concepts in nursing—there's care, there's listening, there's a lot of listening. My daughter's a
    nurse, actually.
- speaker: Respondent
  text: Oh, I didn't know that.
- speaker: Interviewer
  text: Right, it just occurred to me to tell you.
- speaker: Respondent
  text: That's great. That's great.
- speaker: Interviewer
  text: And so I know she's a very caring person. I'm curious how the values that you were instilled in you through nursing
    have manifested themselves, particularly in the course of the 250Lex years. Are there aspects, are there personality aspects
    for you about nursing and being a nurse that have been helpful to you as you transitioned into being a civil servant?
- speaker: Respondent
  text: It's a really interesting question because I never—as a nurse, I had a long career in nursing and I was still working
    part-time nursing when I was a council member. And I never really thought about how that might translate, but—your daughter's
    a nurse. If you know nurses, you know that as a registered nurse, I'm highly trained to assess things. We are all trained
    to observe, to listen, to look at body language. So, we already do that as nurses. And we also—when we're doing that,
    it's with a patient, right? And so then, we make assessments and we develop what we call care plans to make the health
    of the patient even better, hopefully, and then take action. So, assessment, a care plan, action. What does a mayor do
    every single day? I mean, I sort of half joke, I have one big patient now—the city. And it's not really a joke because
    we are constantly assessing the things that are working really well in Lexington and the things that may need a little
    tweaking, they're not as healthy as the ones that are really healthy. And so then, we get to work and we make a plan.
    We talk among ourselves, bring people in from the community, and then we take action. It is a—it transfers directly. And
    I love that because it allows me to get a lot done, because my team is involved in that, just like a nursing healthcare
    team would be. And I first realized it when I was on the council and I was involved with Lexington's first in Kentucky
    comprehensive smoking ordinance. And I thought, oh man, I bring a lot of knowledge and experience to this issue. And then
    the first year I was mayor, when everybody thought I was crazy because I said, "Let's put hand sanitizer on our conference
    tables." And they said, what? 'Cause people come to a conference table to a meeting and they shake hands and then they
    do this, and, you know. Well, lo and behold, the next year COVID came. But I was already in tune with sanitary practices
    for where you're shaking hands and close to a lot of people. It works. And so, I have really—plus, plus nurses—in my experience,
    most nurses are people persons. They're very keyed in on people. They like people. We like people. You know, we like to
    learn about people. We want to know what makes you tick. And that's a good thing for a mayor to like people, right? It's
    good, and we can have good conversations and that sort of thing. So, it all transfers very well.
- speaker: Interviewer
  text: Is there anything about nursing in your experience that you wish more public figures understood? Are there any nursing
    values that you kind of wish you could impart to a public figure here or there that you think might help them do that
    public figure job better?
- speaker: Respondent
  text: That's a great question. Well, nurses are highly ethical. We deal with patients and very private information. I think
    that elected officials should be held to that same high standard. High ethics. Everything we do is about people, or it
    should be about serving people. Government doesn't exist, in my estimation, for any other purpose than serving people,
    if you think about what we do. And so, those kinds of things, I think every public servant, elected official, should strive
    for high ethical behavior, transparency, honesty, people serving people. I mean, there's some real basic things that I
    expect of myself that I really expect of other elected officials. And it's a lot to say that because we have all kinds
    of examples around the world and at different levels of government. But it is a—
- speaker: Interviewer
  text: Examples of?
- speaker: Respondent
  text: Of ethical behavior and serving the people. And when you veer off of that mission, then you're not a public servant
    anymore. And I tell people that in Lexington all the time. If we veer off of serving people, we've lost our mission. That
    is our mission. And, you know, paying attention to the dollar. The dollar isn't mine, it's the taxpayers'. Who, who—pay
    attention to whose money it is.
