collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Before we get started talking about Court Day, just tell me a little bit about yourself.
- speaker: Respondent
  text: Um, so I grew up here. I've been a lifelong resident of Kentucky. Um, grew up here in Mount Sterling. Uh, went off
    to college at U.K. Um, I've been in the financial sector my whole career, basically, basically doing lending. And, um,
    uh, most people who know me will tell you I'm fairly eccentric. [laughter] I'm an incurable collector of all kinds of
    stuff--antiques, oddities. Uh, my mind is full of random, useless trivia, and, uh, so that's probably me in a nutshell.
- speaker: Interviewer
  text: That's awesome. That's great. What do you collect in particular? What's your favorite thing to collect?
- speaker: Respondent
  text: Um, if I have two or three of one thing, that's a start of a collection. So I have--there's no telling how many different
    things I collect. I don't even know if I have a favorite. I mean, I--
- speaker: Interviewer
  text: Like guns or books or?
- speaker: Respondent
  text: I've got a bajillion books, I've got guns. I like history, um, sports memorabilia, um, random stuff. I have a random
    collection of turn-of-the-century autographed postcards of circus giants who are eight feet and older.
- speaker: Interviewer
  text: Are you kidding me? That is so random. That is so--
- speaker: Respondent
  text: Yeah. No, there's--
- speaker: Interviewer
  text: And wonderful.
- speaker: Interviewer
  text: That's great.
- speaker: Interviewer
  text: Have you always been a collector, or is this just something you're--
- speaker: Respondent
  text: I think I have. I don't know when I got the bug, but I've always enjoyed going to antique malls, and flea markets,
    and yard sales, and all of that.
- speaker: Interviewer
  text: Yeah. And then once you get one or a couple of something, you are looking for that thing.
- speaker: Respondent
  text: I'm thinking that's the start of a good collection. I think I'll keep going. Yeah.
- speaker: Interviewer
  text: That's great.
- speaker: Respondent
  text: Much to my wife's chagrin.
- speaker: Interviewer
  text: It's hard to have a collection without storage issues, right?
- speaker: Respondent
  text: That's true. And, and I--I've created lots of storage issues for myself over the years.
- speaker: Interviewer
  text: So you're here today in your capacity as a historian and a lover of Court Day. So, first of all, tell everybody kind
    of your role on the first Friday of Court Day. You, you dress up as someone. Tell me a little bit about that. How did
    that come about? Whose idea was that?
- speaker: Respondent
  text: You know, I think it was Pam Murphy who sits on the city council here. I think it might have been her idea that they
    wanted to create, um, sort of a mascot for Court Day. And, um, someone who could maybe portray an original judge from
    the earliest Court Day, which would have been 1794. And I do reenactments, Civil War reenactments. I'm right now, in the
    process of joining the Sons of the American Revolution and--and have just had an extensive collection of costumery for
    years. [laughter] And a lot of local people knew that. So they called me and [said,] "Do you have anything that would
    look like a judge from the colonial times?" So I said, "I think I do." So, um, I think we shot a few commercials in 2022
    and just took some pictures. But then I think we decided to actually kick off Court Day last year in 2023. That Friday
    morning, Channel 36, uh, came down. And so it was me, and my friend Herb Triplett, who's a realtor here with Keller Williams
    and also is a sales rep for WMST and a radio personality for the football games. He dressed up as a town crier and had
    the bell, and I dressed him up in a tricorn hat and a frock coat and, and he pulled out a big scroll and did the "Hear
    ye, Hear ye!" And, and, and then I kind of gaveled in and declared Court Day officially in session for 2023.
- speaker: Interviewer
  text: That is fantastic. That's wonderful. So you'll reprise your role this year?
- speaker: Interviewer
  text: Yes. And we'll be doing it at--on the courthouse steps.
- speaker: Respondent
  text: Uh, we've, uh, last year we did it at the Main Soundstage down by the Farmers' Market Pavilion, where they had a lot
    of stuff set up. So we'll be doing that again this year.
- speaker: Interviewer
  text: Okay. At the Market Pavilion.
- speaker: Respondent
  text: Yeah, at the, the Main Soundstage, actually, where they have the bands and stuff.
- speaker: Interviewer
  text: Um, in your role as a historian, how--has your family been in Montgomery County for years and years or--
- speaker: Respondent
  text: No. Um, my, my family has been in Kentucky for many years, but primarily in eastern Kentucky, Carter County and that
    vicinity. But we moved here when, when I was just a three or four years old. My, my dad took a job here. And but it's
    like the best place I could ever imagine growing up.
- speaker: Interviewer
  text: What year was that?
- speaker: Respondent
  text: It was either 1974, 1975. I'm a little fuzzy, but I think I was right around my fourth birthday.
- speaker: Interviewer
  text: Okay. All right, so in your capacity as a historian, kind of, uh, describe to people who are not familiar with the
    history of the concept of Court Day in Kentucky. And then from there, let's move on also to what it meant specifically
    to Mount Sterling. But just start generally talking about what the court day concept was in Kentucky.
- speaker: Respondent
  text: Yeah. So obviously Kentucky became a state--the Commonwealth of Kentucky became a state--in 1792. That was also the
    year Mount Sterling became incorporated. We wouldn't become a county for at least three or four more years, I think in
    1796, if I'm not mistaken. But as soon as we became a state and Mount Sterling was incorporated, they decided to establish
    some court systems in--in certain hub areas. And so I think it was around 1793, 1794, they designated Mount Sterling as,
    I guess what we now probably know as a Circuit Court, and they would hold court the third Monday of every month. And so
    we became one of the, the main little hubs that I--I've tried to do some research to find out who exactly the names of
    some of the judges were. I think there were potentially as many as three different judges, but so many of the records
    got destroyed during the Civil War and during those periods. So even--I even tried to contact the Kentucky court system
    and see if they could find anything. But they--they were having trouble finding anything really specific. I'm sure it's
    find-out-able, but it probably takes some digging.
- speaker: Interviewer
  text: So when you act like the judge, when you dress up like the judge up here, you're not acting like a particular judge.
    It's just the generic circuit judge.
- speaker: Interviewer
  text: So you don't actually bear the name of a historical figure?
- speaker: Interviewer
  text: Okay. So there were three judges during that period. So what would the judge do the third Monday of every month? What
    kinds of cases would they be settling? What kind of things would they be?
- speaker: Respondent
  text: Well, there at the courthouse--or whatever version of the courthouse they had at the time. It was probably more of
    a log home type, log structure, because I think there have been six courthouses since, since our inception. Um, there
    were obviously our, our town was just starting to grow--there was lots of land settlers, so there would be a lot of land
    surveys, a lot of deeds, a lot of things like that that would come up. I mean, the population wasn't that large, you know,
    in the early 1790s. So it was primarily, I think, land acquisitions and things like that, and I'm sure some legal disputes.
- speaker: Interviewer
  text: Six courthouses. That's so interesting. I mean, I know this is kind of going down a rabbit hole, but where were they?
    Are they all--were they all right here where we have our present--
- speaker: Respondent
  text: I think most historians think they were right about where they are right now. Pretty close to it. So our town was
    situated the, the--what they called Little Mountain Town--there was the big Indian mound right close to where the Civic
    Center is right now. And, um, the first courthouse was probably a log courthouse. Then they built a brick structure. If
    my memory serves me correctly, it was burned in 1851. And then the third courthouse would have been burned in December
    2nd, 1863, during the Civil War. It was burned by Confederate troops. Um, another one was built. And then I think they
    built another one in 1890, which we have some more modern photos of today. And then, um, the courthouse as it stands today,
    I believe, was built in between 1960 and 1961.
- speaker: Interviewer
  text: That's fascinating. So then, as a result of having court every third Monday of every month, and that--that time was
    not--that was just for Mount Sterling? So would other--would other counties have it like on the second Monday or the first
    Monday? Was it or was it always across the state?
- speaker: Respondent
  text: Well, keep in mind, in 1792 there weren't that many counties.
- speaker: Interviewer
  text: True. That's true.
- speaker: Respondent
  text: So, as a matter of fact, when we were first created as a county in 1796, if I'm not mistaken, Montgomery County stretched
    almost to what is now the West Virginia line.
- speaker: Respondent
  text: Yeah. It was. It was an enormous piece of land. So, um, I can't remember how many was there. I want to say there were
    maybe five or six counties initially when Kentucky became a state, and then those kept becoming further subdivided. So
    there just weren't that many counties. So because it was such a large area, you had people coming in from eastern Kentucky
    and southeastern Kentucky.
- speaker: Interviewer
  text: Yeah. So truly. Yeah. It wasn't just like the, the occupants of the county parameters that we know today would have
    been coming. It would have been like hundreds and thousands of people from all over. I mean, from Pikeville. And what
    we know now today is Pikeville.
- speaker: Respondent
  text: Yeah, probably as far as Ashland. I think that might have been among the far reaches of where we were coming from--in
    parts of southeastern--I don't know if we went--if Montgomery County quite went far to Pike County, but it was pretty
    far down there. So I mean, it was, you know. It was 100, probably 100-mile radius at least, maybe 150.
- speaker: Interviewer
  text: So what would people do when they would come? They would come to have their land disputes settled or any legal thing.
    But what else would they do when they got there?
- speaker: Respondent
  text: Well, obviously, um, they--a lot of people would barter. You know, that was just a time in our, uh, our state's history
    where obviously there was currency. But, um, bartering was such an important part of life, and particularly as it relates
    to Court Day--why October kind of became the official month. That's the time of the year where you've already completed
    all of your harvest. You know exactly what surpluses you have. You know exactly what you need to get through the winter.
    So you come and you show up and people would come with horses, mules, chickens, potatoes--you know what vegetables they
    had--corn, hay. Um, you know, they would--they would load up the wagons and--and come to sell what extra they have that
    they don't need and hopefully bring home what they don't have that they do need to get through the winter.
- speaker: Respondent
  text: Textiles, you name it. Wool.
- speaker: Interviewer
  text: Where would they stay? I mean, like where--
- speaker: Respondent
  text: Well, that is probably one of the reasons Montgomery County, because we were one of the central hubs of the court
    systems. We had developed a network of boarding houses and taverns and, and things like that. So, you know, of course,
    these were early settler days. So a lot of people would probably pitch a tent or had a covered wagon. I'm not exactly
    sure what it was like back then, but, but eventually our town kind of grew around that. And, you know, we did become known
    for having taverns and, and entertaining. You know, eventually we had two theaters here. Um, you know, there were places
    to stay. There was--were lots of stores we had. It was a very industrious town, very resourceful town. We were--during
    the Civil War, as a matter of fact--we were kind of a known place that, that had so many resources, both agriculturally,
    um, so many different things that we were kind of a target. And so we became sort of a supply depot at that time. And,
    you know, we, we probably changed hands--we know, at least a dozen times during the Civil War because it was a hotly contested
    area just for our richness and supplies.
- speaker: Interviewer
  text: So if every county or even the, you know, the five or six counties that existed at that time, if they all had the
    court, why did Montgomery County's or specifically Mount Sterling's Court Day last, if every county were having some kind
    of, you know, session monthly, what is it about Mount Sterling that has endured?
- speaker: Respondent
  text: That-that is a good question. And, you know, if you, if you dig into it, there are still other places, I think maybe
    in Kentucky and maybe other states that, that still, um, have what they call a "court day." And it's kind of just a big
    trading day. Um, it seems like ours has just remained a really big one. And, and seems like we've only grown in stature
    over the years. But, um. yeah, I'm not exactly sure what ours was better than the others, but I'm glad it is.
- speaker: Interviewer
  text: It is unique because I feel like, um. Well, I mean, I grew up in Bourbon County. We talked about it before we started
    our interview, and, you know, it feels like that there were a lot--it's a lot of in flux from eastern Kentucky. You know,
    a lot of the counties, you know, Powell and Menifee and, you know, coming, coming west toward Mount Sterling. Um, so,
    and--
- speaker: Respondent
  text: That may be part of it, too. We're the, um, we're both the gateway to the bluegrass and the gateway to the Appalachians.
    So once you get into the more hilly, mountainous area, you do have areas where people don't have large flat spaces to
    grow, large row crops to grow big tobacco crops. So over here you have more space for crops; over there, they may have
    other things horses, livestock, that sort of thing. So it--there is probably a bigger need for certain supplies in eastern
    Kentucky than they would have in central Kentucky, where things tend to be a little more flatter and there's more tillable
    land, I guess.
- speaker: Interviewer
  text: Yeah. That's interesting.
- speaker: Respondent
  text: And pasture land.
- speaker: Interviewer
  text: And so people would come here and trade and they would go, go home and would they come back and do the same thing,
    like in the spring, or was it mostly just a fall thing?
- speaker: Respondent
  text: I--from my understanding, you know, it was every third Monday, but the fall was obviously the biggest--
- speaker: Interviewer
  text: The biggest.
- speaker: Respondent
  text: But usually if people were, you know, keep in mind, uh, you know, if you're just traveling 45 miles, but you're doing
    it on foot or on horseback--everything--you know, you're going ahead and planning a day or two around that. So if you're
    going to waste a day or two, you might as well make the most of it. You know, it's kind of like us--if you're going to
