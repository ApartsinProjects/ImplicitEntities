turns:
- speaker: Interviewer
  text: Yeah. So, if you wanna start out just by telling us a little bit about yourself, where both y'all are from, what's
    your daily life like, those sorts of things?
- speaker: Respondent
  text: My name is Missy White, and, um, I work at a factory, and, um, it's, it's really awesome, and, uh, I can freely talk
    about god, and, um, I stay in god's word every day, and, um, I, I like helping people and being a, a positive light to
    everybody around me, and I love telling people about god and the things that he's done in my life and the things that
    he can do for other people. And that--you know, to let people know that anything that you're going through, god can help
    you with it. And he can lead you down the right path in your life.
- speaker: Respondent
  text: And I'd have to say the same thing. Um, considering how my life used to be, um--I, I lived for myself. I lived for
    what I wanted, how I wanted it. Um, always going down the wrong path, following the footsteps of people making the same
    mistakes that they told me not to. Uh, pushing god out of my life, always in a constant, back-and-forth battle, uh, trying
    to serve two masters. Um, I've struggled with, you know, a little bit of everything, everything under the sun. Uh, and
    I was just on this repeated cycle, this, uh, endless loop. Um, every time I'd start to do good, I'd fall right back off.
    And now, as I see it, I know that that was god, that--you know, he never gave up on me and, uh, delivered me time and
    time again, even though I would time and time again push him away. Um, you know, I'm not going to get into the specifics
    right now, but, you know, everybody makes, you know, bad decisions. And, uh, about three or so years ago, I finally had
    went to jail. And, when I got out a month later, I met my wife. And we lived together within the first two or three weeks
    of knowing each other. And we've never looked back since. And we was both going through a lot of the same things. And
    our, you know, worldly ways, you know--we still had things we couldn't let go of, things that still brought us down. Addictions,
    uh, you know, trauma from things of our past, in securities, you know, distrust, you know, looking for another way other
    than god. Truly--and we was a lot like other people. I mean, we would, you know, be back and forth until one day, um,
    you know, god really did open our eyes. And he really did save us and pull us out of everything. And he freed me from,
    uh, bondage and chains that I had went through, uh, ever since I was a little kid. Things he delivered me from--you know,
    fifteen plus years, any and all addictions. I was able to let go of everything that ever haunted me. I was able to be
    not only just a good man to her, even though I still struggled. And I let a lot of my old ways and even, even ways of
    my, my dad, um, shine in, in a negative light. And, and I, I didn't just become a husband, I, I became a father myself.
    I became a dad. You know, I don't have no kids of my own, but I took her daughter in, Jasmine, as my own, and I look at
    her just as a daughter, and just as my dad looked at her as a granddaughter. He took all--I was his only son, but he took
    all of his kids in--step kids, other people's grandkids, he called them all--or other people's kids, he called them his
    grandkids. He never turned nobody a side. He always went above and beyond to help people. And he was the one that actually
    had--(White clears throat)--introduced me, you know, to some teachers, you know, of god's word and ways, you know, outlets
    of people to study with and, you know, away from a lot of traditions and, you know, church doctrines, um, because--we
    can't cover up the truth, because it, it does happen, you know, there are a lot of churches that--I'm not saying that
    I don't love each and every one of them, you know, they're all my brothers and sisters in Christ, but, you know, there,
    there are false teachings out there, and, you know, god really delivered us from that because we was caught up in a lot
    of that. And the fact that it, it--how much of a blessing it is for god to, you know, start to reveal his truth, uh, you
    know, to his children, you know, and it's much more of a blessing to be able to share it in a way that they can easily
    understand it. And just the impact that we've been able to make, even this week as an example with the death, um--it's
    not that I didn't want to cry. It's not that I did not feel sad. But as I try to remind people, Jesus Christ set us free.
    Why would you go back to those chains? Why would you put yourself back into bondage? Why would you go back to Egypt? And
    to remind everybody what god's word says to help strengthen them. And when I got up to the podium, and I had some words,
    you know, from my heart--I didn't know what to say, I just got up there and I put my head down and I just, you know, I
    asked god, you know, I don't know, just, you know, just lead me. And I reminded everybody that, um, you know, despite--and
    this goes for anybody, you know, despite how anybody may live or, you know, what you think, you know, as f--in, in terms
    of, you know, where they are now, that we are not the judge, that god is the judge, and god knows our hearts and he knows
    our every thought and, you know, and if people--they, they do cry out to them, or out, out to him--even if it's just in
    their head, if they're just thinking it in their last moments, you know, and they, and they, and they cry out to Jesus
    that, uh, you know--they can be forgiven and they can, uh, you know, be redeemed from that. And, and today, they live
    forever, you know, to remind people of those things, you know, to not look at what you think somebody's life is--(White
    coughs)--in your eyes, but what god says. And what god says goes. And just the fact that, uh--when you know somebody,
    especially a loved one, how comforting it is to know that they did have a relationship with Jesus and they did know god
    and they did study, you know--how much more so, you know, you know, is god going to hear them, you know? But like I try
    to tell people, even if they didn't, we are not the judge, and god loves us so much, and he is forgiving if you're sincere,
    and he will help you. And every day we clock into work, we don't go there with, with, uh--doing our jobs, performing,
    you know, the way we need to do to provide for our family. We--our number one job when we go into work is, god, how can
    I--how can you use me today? You know, give me opportunities. I--who can I talk to today? Who, who can I help out? I mean,
    if it's just a smile, you know, sometimes that--that's a gift from god. Just, sometimes, somebody's smile can, can really
    change somebody's day. And we're always seeking, you know, who can I help out? You know--I mean, I've stopped work all
    together many times, and worked extra hard to try to get caught back up, just to pull up a verse, or try to take the time
    to talk to so mebody, or try to pray with somebody, or something like that. And that's been my number one job this week,
    with the loss of my, my father, is I want people--not because I'm anything special, but because I want people to, to see
    the power of god, and when they ask, "How are you okay? How are--you don't have to be so strong. It's okay to cry. It's
    okay to be weak." And I say, "Well, you're right. There's nothing wrong with that. And I am weak, but it's god that gives
    me strength." And I want people to see that if you truly know what god's word says, that you can know that, you know,
    this is not the end. And there is a far better life and a better place after this life is over--this life is so short.
    It's temporary. It's not our home. And when someone passes away, I don't want them to come back. I wouldn't want another
    day with them, because where they're at is where I want to be. And we make it our duty every day--our number one job as
    parents is to raise our daughter up in god's word, and show her the examples and, to be honest with her. Not let the age
    gap, or the intellectual gap, uh, cause a division, you know, we try to open up our hearts to her as if we're talking
    to one another--just because she's a kid--she's thirteen. We try to level with her. We try to tell her, you know, "This
    is really how I feel. This is why I did this. This is why that happened." We always try to come down to her level, and
    let her know that, you know, none of us are really any different, that we're all in this world and we're all trying to
    do our best job. And even the people that don't care, or that do bad things, um--if we really love god, we love them enough
    to at least tell them the truth, and if they reject it--or they reject others because they rejected Christ--and as I told
    Olga in here the last time I had seen her--the medical practitioner--um, I was telling her somethings about, um, some
    negative responses I've gotten at my job in the past. And she said, "That's okay. You know, they did it to Jesus, too."
    And then I sent her a--(Walters clears throat)--a verse in Matthew--I think it might have been chapter five, verse eleven,
    maybe--you know, it says, uh, you know, when people mock you, you know--cast your name out as evil, you know, for Christ's
    sake--it says, "Rejoice in that day, for your reward is great in heaven." So, you know, I, I would like to encourage people
    to, to never, uh--to never back down, but to be respectful, you know? It's not our job to force anything on anybody. We
    let god lead us. We say what we feel led to say. And not to beat yourself up if you didn't feel like you did a good enough
    job in doing that, you know. And the hardest part for me--before I truly started to serve god--was every time I would
    sin, or make a mistake, or do something stupid, or do something out of a selfish reason, I couldn't forgive myself, because
    I began to see how good god was to me. After the life that I was living, that he--that he freed me. And not only freed
    me, but gave me a family, and blessed me with an amazing job where people absolutely love both of us. They're there for
    us so much. They constantly hug us, tell us they love us, that we're here--that they're there for us. And the fact that,
    you know, we can freely talk about god at our jobs is, is such a blessing. And the fact that our--that our daughter--now
    she wants to study god's word. It's not just like, "Oh, well, I gotta do this." And we don't make her. You know, we tell
    her, you know, "If you really don't want to do this tonight, I'm not going to make you do it. That's, that's up to you."
    But she wants to, because she sees that it's very important, and she sees that the impact that it's made on her, her mom--(Walters
    clears throat)--and me--how our difficulties when we first met have went away because of god's word. And to have such
    a support system and family that--we don't have a lot of family, because a lot of family is--most families split up, or
    quit talking, or move away, get caught up in their own lives. But the fact that there are still some that remain, uh,
    that truly, you know, you could say is a--is a strong family, you know, that's there for each other to the end. And we
    don't have no problems with any family members. We don't have any problems at work. The problems that we do have at home
    are over as quick as they come. We go to prayer. We have everything we need. We never worry about money. I haven't looked--I
    went almost two months here, from the middle of January until just yesterday--I haven't even looked at my account, how
    much money I make. I have everything I need. God blesses us so much. He blesses our health. We--we're, we're never truly
    sad, when--I, I forgot what depression is. I forgot what, uh, being left wanting feels like, because Jesus Christ does
    not leave us wanting. And, everything that we go through, god gets us through it. We come together as a family and we
    remind ourselves what's important, and realize that, you know, when god truly forgives, he forgets and he doesn't want
    to hear about it anymore. He for--it doesn't exist. So, we need to move on as well--the only reason we remember is so
    that we know not to do that again, and we move forward. I don't care how guilty you feel, or how a shamed you feel, or
    how stupid you feel. You get up and you be a good soldier in Jesus Christ like in Second Timothy, I think, chapter two.
    For we are good soldiers in Jesus Christ. You march like a soldier, because we're in a spiritual warfare. The devil is
    real, and Jesus Christ--in Luke chapter ten, verse nineteen, he said, "I give you power over Satan and all of the enemy
    through my name." And it's up to us Christians to use that name, because without god, we're hopeless and defenseless.
    Like in Ephesians six, to keep that gospel armor on, ready and in place, ready to do battle. Christians are not second
    class citizens. They're champions. And there's a lot of people--not that they're better than anybody. There's a lot of
    people that play church and there's a lot of people that are fake. And there's a lot of people that don't believe in god,
    or don't care, and I don't hate them. I love them. Other religions, I don't mock them. I don't call anything out by name.
    I don't call any individual out by name. It's my job--it's our job to set the example, and to show people that there is
    a god, and he is real, and he can save you from anything, and he will bless you, and he will help you through anything
    you go through. And if our--and if our lives are not living proof of that, I don't know what is. And that's my number
    one--that I would say for us both, as one flesh, you know, husband and wife--I would say that it is our number one job
    to try our very best to set that example. To realize that life can be so, so good, even in the hard times--
- speaker: Respondent
  text: --because god is with us--
- speaker: Respondent
  text: --if you want him to be.
- speaker: Interviewer
  text: That's a beautiful story. I'm glad you're both able to be here with us today. And, uh--
- speaker: Respondent
  text: --thank you.
- speaker: Interviewer
  text: Just, um, in that story, um, where does the Post Clinic fit in? How'd you, uh, first hear about it, what's your experience
    with it been, those sort of things, if you'd like to start.
- speaker: Respondent
  text: (White clears throat) Um, well, it started out because my husband was having problems with his ears and, um, I had--my
    stepmom had actually told me about it. And, whenever he had first came here, um, it was just really awesome because, you
    know, you could freely talk about god here, and they--everybody talks about god to you. And it's just, um--and everybody,
    you know, like Olga, like--she takes her time to talk to you, um, the people at the front desk--
- speaker: Respondent
  text: --to really understand, you know--
- speaker: Respondent
  text: --what is going on with you. "I'm, I'm, I'm genuinely concerned. I want to know your history. I want to know every
    little thing that's going on with you, so I can best treat you." And just the time, and the patience, and the, uh, urgency
