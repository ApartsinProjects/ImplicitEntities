turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself.
- speaker: Respondent
  text: Sure, sure. I, uh, well, let's see. I'm originally from Kentucky. I'm originally from Bullitt County near Shepherdsville,
    Kentucky. And I grew up there. Uh, and at the age of eighteen, went off to college at St. Louis University, which at the
    time was the closest university to where I lived with the meteorology program. I actually visited Western Kentucky because
    I was given a full scholarship to here, but they didn't have a meteorology program at the time, and, uh, Glenn Conner,
    the state climatologist, was out of town that day, so I didn't get to meet him on my visit. So I ended up going to St.
    Louis University for undergraduate, and then I went on to University of Oklahoma for my master's and PhD in meteorology.
    And after graduating in 2000 with a PhD, I stayed at University of Oklahoma, where I worked for what was called the Center
    for Analysis and Prediction of Storms, CAPS. And I did, uh, some numerical modeling work for them. And I should say, during
    my graduate work at Oklahoma, I went there to do weather radar work. And in the first semester, my advisor actually had
    a pretty serious heart attack. And so he was in the hospital, it would be a fairly long recovery for him. So I needed
    a new advisor and looked around the department, and the Oklahoma Mesonet had some funds. They were just starting out,
    had just installed a network there. And so, uh, I was brought on as one of the new graduate students. And so that's kind
    of how I got into the observations and Mesonet field--
- speaker: Respondent
  text: --so now when I started working for OU, for CAPS, I wasn't doing, I was basically taking observations and improving
    numerical models using those observations and testing the models. And then in, uh, nine years ago, in twenty--what year
    was it?--twenty--
- speaker: Interviewer
  text: Fourteen? According to the internet, 2014--
- speaker: Respondent
  text: --yep 2014 I--the state of New York wanted to start a Mesonet of their own. And at the time, there were maybe two
    dozen, maybe twenty states with Mesonets of some kind. And New York had just received some funding from FEMA to start
    up a program. And so I had some experience with Mesonets. And so I applied and, uh, got the position there and so moved
    to New York in 2014 and started up a statewide Mesonet there of one-hundred and twenty-six stations. And also a Micronet
    in New York City and some other, uh, observational networks there in New York. And then, and through that, I got to know
    quite a few state climatologists. I got to know, uh, Stu Foster here in Kentucky. And--
- speaker: Interviewer
  text: --who we also have an interview with in this collection, so--
- speaker: Respondent
  text: --great, great--
- speaker: Interviewer
  text: --yeah. For the listener--[laughs]--
- speaker: Respondent
  text: --and so, and because I knew him, I was, and because I was from the state of Kentucky, I saw this position open and
    then applied and of course got the position. So, so that's how I ended up here.
- speaker: Interviewer
  text: And that's how you ended up here. I have many, many things I want to follow up with. Okay, let's start with a factual
    one that might sound dry, but I think is very interesting and I love hearing you talk about this, which is what is a Mesonet?
- speaker: Respondent
  text: Sure, sure. So Mesonet stands for Mesoscale Network. And in meteorology, the term Mesoscale refers to things at the
    scale of meso, which means middle. And in meteorology, when we think of like middle scale, we think of something bigger
    than a single thunderstorm, but smaller than a whole entire frontal system. So basically we're trying to design a network
    that can measure those things in the middle. And by that we usually mean a network spacing of about twenty miles.
- speaker: Interviewer
  text: Okay. So it isn't a geographic scale. It's a like weather phenomenon scale.
- speaker: Interviewer
  text: Oh, I actually as many times as I have heard, I mean this is on me for not picking that up. I think I had, I think
    I just always defaulted to thinking of it as geographic but that makes a lot of sense. So how, backing up quite a lot.
    You know, you said you selected St. Louis University, because they had the meteorology program. How did you know you wanted
    to be a meteorologist and, um, did you ever want to be a weatherman on TV?
- speaker: Respondent
  text: '[Laughs]--uh, the second question, no, I never wanted to be on TV.'
- speaker: Respondent
  text: But I had an uncle, so I always liked the weather. I like thunderstorms and being in Kentucky you have one wonderful
    thing about Kentucky is you have four equal length seasons. Every three months you're in a new season, new weather, you
    have winter weather and storms. We really get a little bit of everything here. And so I always liked the weather. But
    I had an uncle who was a forest ranger in, uh, Letcher County, Kentucky. And on--they had a museum there at the forest
    where he worked, but they also had a little weather station. And so a co-op station, what they call a co-op, cooperative
    observer network. And, and so whenever I visited him, I was able to go out with him to the weather station and record
    the data and see how all the instruments worked.
- speaker: Interviewer
  text: That's very cool.
- speaker: Respondent
  text: So that's how, that was my introduction.
- speaker: Interviewer
  text: Yeah. And what did you think you were going to be doing then? So you go and decide to study meteorology. Did you have
    a sense of, I want to do research, I want to do--
- speaker: Respondent
  text: --I was a terrible student in that way--
- speaker: Respondent
  text: --I really had no idea what I wanted to do and so I went to school, I did my undergraduate work and I still didn't
    know what I wanted to do. So I just stayed in school--
- speaker: Interviewer
  text: --classic--
- speaker: Respondent
  text: --it's a terrible way to go about your career--[both laugh]--
- speaker: Respondent
  text: --but I think most meteorologists are actually in that position. I knew that I didn't want to do shift work. So the
    weather service was not really something I was aiming for, even though a lot of my colleagues did. And, uh, I knew I didn't
    want to be on television. So that kind of narrowed the scope down to research. And so I just kind of pursued that.
- speaker: Interviewer
  text: What exactly is shift work in the context of the weather service?
- speaker: Respondent
  text: Right, right. So every, as I understand it, every three weeks, they start a different shift. So it's either the night
    shift or evening shift or daytime shift. And so they do that, uh, partly, as I understand it, it's union rules, and they
    didn't want anyone to make more than another. So it was kind of a way to keep the salaries equal.
- speaker: Interviewer
  text: Oh, interesting. Yeah, I can see where that wouldn't be appealing, necessarily. Um, especially if you have a family,
    right? So you, I know in your various like biographies and things online, you talk about enjoying traveling and spending
    time with family. Yeah--
- speaker: Respondent
  text: --right, right--
- speaker: Interviewer
  text: --yeah. Yeah. So, um, how did, how does that fit into kind of the history, your personal history, rather, especially
    as you're making these big moves from Oklahoma to New York and then back to Kentucky?
- speaker: Respondent
  text: Right, right. Well, a lot of meteorologists, uh, are somewhat used to moving. And in fact, if you're in the National
    Weather Service, you almost have to move to a new office to advance. And so, uh, that's somewhat part of being a meteorologist
    and very few people in meteorology get to live where they're originally from. And so that's kind of, you kind of know
    that going in--
- speaker: Respondent
  text: --that's part of it--
- speaker: Interviewer
  text: --right. And you can prepare your family for that, I would assume.
- speaker: Respondent
  text: Right, right.
- speaker: Respondent
  text: --you kind of know that going in--
- speaker: Interviewer
  text: --yes. Not that different from academics, which you are now, sort of.
- speaker: Respondent
  text: Right, right--
- speaker: Interviewer
  text: --yeah, yeah. Okay. So, I'm trying to think. Like I said, I have so many follow-ups that I want to talk about. Well,
    let's, let's go there then. So the current gig, uh, you have at least three titles--[both laugh]--Right. So do you want
    to talk us through how those sort of what those titles are and how they sort of fit together?
- speaker: Respondent
  text: Sure, sure. So the, I guess the more mundane title is professor. And, uh, so, historically, the, uh, director of the
    Climate Center and the state climatologist have been a professor as well here at WKU. And, and as part of that, I teach
    one class per semester. I, uh--and, but, but really I'm in front of the students in order to get them engaged into the
    Climate Center, into the Mesonet. And so, so that's why that's really the prime reason why, why I'm teaching is to help
    with that connection, connecting students to the research.
- speaker: Interviewer
  text: Does it, I mean, how many students are involved in it? I don't know anything about student involvement, actually.
- speaker: Respondent
  text: Oh, sure. I, it's, it's as much as they want to be involved or as many students as we can take on. And for, for this
    semester, I think we have a total of five students involved between the Mesonet and the Climate Center. But we expect
    that number will grow over time to at least ten to fifteen.
- speaker: Interviewer
  text: Yeah. Oh, that's awesome.
- speaker: Interviewer
  text: --yeah. Well, and also, you know, sort of harkens back to that's what you were doing at, at University of Oklahoma,
    right? As--
- speaker: Respondent
  text: --that's right--
- speaker: Interviewer
  text: --working with the Mesonet. Yeah. Yeah. So, okay. So that's the professor title. Then you have the state climatologist
    title and the director title, which are intermingled.
- speaker: Respondent
  text: Right, right. So--
- speaker: Respondent
  text: --we have, so the way the structure is here in Kentucky, we have what's called the Kentucky Climate Center. We call
    it the KCC. And, uh, under that umbrella, we have both the state climate office, as well as the Kentucky Mesonet. And
    so the state climate office of Kentucky is an unfunded, uh, group. We have a physical room. We have lots of old records.
    We have, which are mostly digitized now. And we have, of course, students that either volunteer or work in the KCC under
    a paid arrangement, uh, for research, um, usually in collaboration with the Kentucky Mesonet. And so that's the state
    climate office and that's mostly service oriented. I mean, we do some research with students, but it's primarily as a
    service to the state and stakeholders and users--
- speaker: Respondent
  text: --and so the other side of the umbrella within the KCC is the Kentucky Mesonet. And we have a staff currently of about
    a dozen employees and staff. Uh, almost nearly all scientists, most with meteorology backgrounds. And they're actually
    located off campus at what's called the Innovation Center, also called the CRD, the Center for Research and Development
    here at WKU. And that's actually in an old mall off of Nashville Road, for those familiar with Bowling Green, located
    a couple of miles south of campus. And the current makeup of our staff is, uh, of course, I'm the director. We have a
    program manager. We have a research scientist. We have quality control scientists. We have four field technicians, two
    of whom live remotely. One lives in Georgetown, Kentucky, and a new employee who will live in Corbin, Kentucky--
- speaker: Interviewer
  text: --yeah, yeah--
- speaker: Respondent
  text: --and they service the eastern half of the state--
- speaker: Respondent
  text: --which saves us time and money and really is a good use of state resources. And then we have a calibration manager
    in-house and two IT staff that handle all the software and web design.
- speaker: Interviewer
  text: That's--how many Mesonet stations are there across the state?
- speaker: Respondent
  text: So currently we have eighty-two--
- speaker: Respondent
  text: --and our goal is really to have one station in every county. Of course, there are one-hundred and twenty counties
    in Kentucky. Currently, we have about seventy-four counties covered with at least one station. Uh, we have a couple of
    larger counties with two, even three stations. But eventually we want to have at least one station in every county--
- speaker: Respondent
  text: --so, yeah--
- speaker: Interviewer
  text: --go ahead--
- speaker: Respondent
  text: --so, yeah, we want to have in the end when we're done building out, we hope to have somewhere between one-hundred
    thirty and one-hundred forty stations.
- speaker: Interviewer
  text: That's really ambitious. I love it. Do you have a sense of the timeline for that? What--how long that might take?
- speaker: Respondent
  text: We think we can start adding roughly five stations per year.
- speaker: Interviewer
  text: That's a lot.
- speaker: Respondent
  text: We can usually install a station within a few days. You have to wait a couple of weeks for the concrete to dry once
    you put the tower in. But after that, after that dries, then you can finish the tower in a day--
- speaker: Respondent
  text: --so, yeah. What takes so long is just finding the place to put it. And the site host is willing to have a station
    on their property. And we couldn't do it without a site host.
- speaker: Interviewer
  text: Yeah. So how does that relationship work? So you're not purchasing land, right? But is it a leasing arrangement or
    just purely voluntary? Yeah. How does that work?
- speaker: Respondent
  text: Yeah, purely voluntary. And typically we work with a station host that's willing to have the station there permanently
    at least thirty years so we can get that official climate record. And, and the good thing is, you know, usually the site
    host or almost all cases, the site host is someone that wants weather data on their property. And so that--so we work
    with them to find a nice open level location and if we're able to do it, then we put the station in. And we provide them,
    of course, with free access to everything collected. And then they give us the space.
- speaker: Interviewer
  text: That's awesome. The data that's collected, do all Kentuckians have free access to all the data? Or is there some that
    the site hosts are getting sort of additional access to then?
- speaker: Respondent
  text: They do. Because Kentucky is really only one of two states that I know of that actually supports their Mesonets through
    public funding. And so because of that, we uh, we make the data freely available to everyone in Kentucky. Uh, no strings
    attached. And that is really just a huge, huge, uh, benefit for everybody in the state. I just can't say enough about
    that support.
- speaker: Interviewer
  text: Wait, which is the other state?
- speaker: Interviewer
  text: It is Oklahoma. I thought so. Yeah. Why do you think that is, that there's only the two?
- speaker: Respondent
  text: I think it's a combination of factors. I think probably the most important reason is both states are susceptible to
    a lot of high impactful weather. And, uh, not to say other states aren't, but we do have tornadoes and flash flooding
    and high wind events and hail a
