collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So before we get started on the interview proper, let's hear a little bit about who you are and where you're from
    and a little bit about your childhood.
- speaker: Respondent
  text: Well, my parents were in the restaurant business in Mount Sterling, but previous to that, they moved to Fort Worth,
    Texas, and was in the barbecue business in the early 50s--
- speaker: Respondent
  text: --where I was born.
- speaker: Interviewer
  text: You were born in Fort Worth?
- speaker: Respondent
  text: 1954. Moved back to Mount Sterling in 1955. And they opened up the Midland Trail Hotel downtown on Main Street. And
    I've lived here basically the rest of my life. Went to Mount Sterling High School. Graduated in 1972. Married the first
    time in 1974 and did live in Bourbon County for a short period, about 14 years.
- speaker: Respondent
  text: Came back to Montgomery County and, well, in the process of living in Bourbon County, decided to start a business
    and started Barnes Blacktop Sealing in 1978. Then when I moved, divorced and moved back to Mount Sterling, bought a home
    here on Garden Springs, and, uh, remarried in 1991 to my wife, Rosemary. She was from Irvine, Kentucky, and I have two
    daughters, and she has three daughters. So five daughters between us, five son in laws, 15 grand babies and two great
    grandbabies.
- speaker: Respondent
  text: So, I decided to run for city council in 1996 and have been on there ever since.
- speaker: Interviewer
  text: Wow, that's a long run.
- speaker: Interviewer
  text: Yeah. Midland Trail Hotel. Tell me where that was.
- speaker: Respondent
  text: Okay. Down, uh, if you go down Maysville Street, hit Main Street and take a left.
- speaker: Respondent
  text: It's down to the end of the block. Just before you get to Wilson Alley, I think it's Wilson Alley. I'm not sure. Right
    there.
- speaker: Interviewer
  text: Yeah. Where the Art Center is?
- speaker: Respondent
  text: Well, it's, well, the Art Center was actually in that building for a while. The old Midland Trail, when they first
    opened up the Art Center.
- speaker: Interviewer
  text: Oh, okay. So it's on the right there.
- speaker: Respondent
  text: Right next to it, there's an empty parking lot which used to be a laundromat.
- speaker: Respondent
  text: And then of course, the Downtown Athletics was the original Kroger in Mt. Sterling.
- speaker: Respondent
  text: So, they had that restaurant and hotel from 55 to about 1970. They sold.
- speaker: Respondent
  text: And out where O'Reilly's Auto Parts is in Mt. Sterling, they opened the first fast food restaurant in Mount Sterling.
    Which was Big T Burger.
- speaker: Interviewer
  text: Big T Burger.
- speaker: Respondent
  text: Uh-huh. And it was the first franchise fast food in Montgomery. Ran it for a year and they were just decided they
    were too old to do that. My dad worked at the bank at Montgomery National Bank at the time and retired from there. Mom
    kind of worked around as a nurse for the different surgeons and doctors that were in town.
- speaker: Interviewer
  text: Yeah, so you had a restaurant in the hotel? What was the name of that?
- speaker: Respondent
  text: It was just Midland Trail.
- speaker: Interviewer
  text: Midland Trail Restaurant.
- speaker: Respondent
  text: They did all the Lions clubs, the Rotary clubs. If you had a meeting, you had it at the Midland Trail Hotel.
- speaker: Interviewer
  text: Wow. Do you. Did you work there as a kid?
- speaker: Respondent
  text: I did, I did. I grew up mopping floors and started out when they'd have private parties, I would. It was when I was
    like 12. They wouldn't let me do much, but I could pour water and stuff. At the time, I was 13 or 14, it got to where
    I could serve. You know, because there would be 40 or 50 people. And they'd need, need servers. And they even got to split
    the tips with me and all that stuff. It was interesting.
- speaker: Interviewer
  text: What was Mount Sterling like at that time in the 60s and 70s? What was it like?
- speaker: Respondent
  text: It was just a little town you came through, I mean, really. They built, I can remember them building, the interstate
    out here in the early 60s. So everybody had to come through before the interstate was open. They had to come through Mount
    Sterling to go to get to Ashland. Or from Ashland, they had to come through Mount Sterling. We used to feed Western Kentucky
    basketball team when Ed Diddle was the coach there. He and my mom and dad were good friends, and I can remember as a kid,
    the bus pulling up in front of the hotel and all their players getting off. They'd be going to Morehead or Marshall or
    somewhere. They always stopped in Mount Sterling with Mom and Dad. They would feed the kids.
- speaker: Interviewer
  text: What a great memory.
- speaker: Respondent
  text: I mean, it's just neat. And with all the pipelines that came through Mount Sterling, there were really no hotels.
    There was like, Littles, maybe Littles, Littles Motel, and there wasn't anything out in, you know, toward the interstate.
    There was no hotels or anything. So everybody stayed in the hotel, and it was a hotel that you didn't have a restroom
    in your room. You went to the end of the hall, and the women's restroom was on the left with a bathtub, and the men's
    was on the right with a bath tub. And you had like you see on the old Western, you had the big bowl and pitcher in the
    room where you could go get water if you wanted to wash your face before you went to work, so I can.
- speaker: Interviewer
  text: Wow. That's amazing. And so, yeah, that's like on a movie, you know, that's kind of.
- speaker: Respondent
  text: Had radiator heat in the rooms. You know, the old radiators.
- speaker: Respondent
  text: I can remember being on the—we walked out on the roof and I'm -- my dates may not be right on this, but when the warehouse
    burned down where one of the city lots is now, there was a tobacco warehouse, and when the stockyards burned down, we
    stood on the back porch, or we stood on the back roof, and watched the fire. Hoping the wind wasn't going to blow toward
    the hotel and burn it down. We were that close. We were within 100 feet of the fire.
- speaker: Interviewer
  text: Sure. Yeah.
- speaker: Respondent
  text: And it was—
- speaker: Interviewer
  text: That's scary.
- speaker: Respondent
  text: —seeing a lot of things. And I just seen a lot of things that have happened in Mount Sterling and know a lot of things,
    and a lot of people don't realize there's really a catacomb underneath the sidewalks on Main Street—
- speaker: Respondent
  text: —where all the plumbing, city plumbing and everything is. You could go out of our hotel, go through a little door,
    and you could walk up, and I have done it, where the old Western Auto was.
- speaker: Interviewer
  text: Underneath the sidewalk?
- speaker: Respondent
  text: Underneath the sidewalk, just like a cave. I don't know that they're still there, but they should still be there.
- speaker: Interviewer
  text: Were they there - I guess- from the original city planners, they just needed wanted some way to get.
- speaker: Respondent
  text: Kind of underground plumbing. Yeah, all the different things instead of having it in the dirt.
- speaker: Interviewer
  text: Yeah. Interesting. How many rooms do you remember? How many rooms you all had?
- speaker: Respondent
  text: Probably had maybe 20, 15 or 20.
- speaker: Interviewer
  text: And the restaurant just served.
- speaker: Respondent
  text: Well, when they bought it in 55, they were doing breakfast, lunch and dinner seven days a week. And they finally got
    to where it wasn't feasible to do breakfast. So they did lunch and dinner. And the same old people. Okay. I mean, Mr.
    Nesbitt that owned Clay, Green, and Nesbitt store, Jack Carrington and the Howells that had the Howell Hardware Store.
    Same people came every day and ate lunch. I just remember that as a kid, if I was there. And Miss Ruth Hunt that had Ruth
    Hunt Candy factory, sometimes she would be there. And I might be there at night, and she'd say, "Sarah Martha, y'all going
    to be a while?" And they'd say, "yeah, yeah." "Well, could I take Roger out to the candy factory with me out on Main Street?"
    "Oh, yeah. We'll pick him up." And she'd take me and she'd say, now you just go downstairs and you eat whatever you want
    to eat.
- speaker: Interviewer
  text: I want to go back in time.
- speaker: Respondent
  text: I was a kid in a candy store. It was a neat time.
- speaker: Interviewer
  text: That's wonderful. Sarah Martha was your mom?
- speaker: Respondent
  text: Yes, ma'am.
- speaker: Interviewer
  text: Okay. Um, yeah, that just sounds like an idyllic childhood.
- speaker: Respondent
  text: It was. It was perfect.
- speaker: Interviewer
  text: So tell me a little bit about what Court Day was like when you were a kid. So you had a front row seat to the Court
    Day celebration being right there on US 60 Main Street.
- speaker: Respondent
  text: I remember it being just- it was the busiest days of the restaurant. I mean, absolutely time they open till they close.
    it was wall to wall people standing in line to come in and have a sit-down meal. Three days straight. I would stay with
    my grandmother, which lived at the top of the hill at Trojan Avenue. I'd stay with her on Sunday night because school,
    the city schools went to school on Monday at that time.
- speaker: Respondent
  text: So I'd stay with Grandmother Barnes so I could walk. When she'd get me up on Monday morning, and I walk across the
    street to the school. And you know, later on got to where Mount Sterling was out. But I just remember as a kid walking
    down through around where the railroad was, and it was just real nostalgic. Everybody had their boxes of-we call it junk-but
    it was antiques and things, and Daddy always wanted to go down and buy a shovel handle. I was telling somebody this morning
    at breakfast, I said, I don't remember my dad ever owning that many shovels, but he always bought a shovel handle, and
    he had a certain man he bought it from. And the animals on the track and if the train came through, you had to get everybody
    had to get out of the way for the train to come through. Sold everything. They sold everything there. And it kind of got
    to be a health hazard and a little bit with the dogs and the horses and things, and they kind of moved that to Preston.
    And that's what kind of got Preston started with, uh, with their court days.
- speaker: Interviewer
  text: Yeah. What would you buy?
- speaker: Respondent
  text: As a kid, I don't remember. It was mostly food. You know, we always wanted an elephant ear or something, you know,
    like that.
- speaker: Interviewer
  text: And people were already at that time selling food.
- speaker: Respondent
  text: Yeah, it was mostly at that time, it was mostly the local churches and Rec Clubs and Girl Scouts or Boy Scouts or,
    you know, cheerleaders or kind of like some of what it is now, but not as much commercial as it is now. I mean, or not
    as much- there's a lot of traveling vendors, you know, with the food vendors now.
- speaker: Interviewer
  text: Yeah. Do you have a special memory from that time?
- speaker: Respondent
  text: Well, I remember 1974, my first wife and I just had our first child, and we've been stripping tobacco on Sunday morning.
    And we came down and it snowed. And the old stockyards were still there. They hadn't torn it down. They had rebuilt it
    after it burned in the 60s. But everybody rushed--they didn't have any animals in it--and everybody rushed to be inside
    the stockyards, and it snowed about an inch of wet snow. It was so cold. And it's the only day I got to go that Court
    Day. And my father-in-law told me, he said, "Y'all, we won't strip tobacco this afternoon. You all go enjoy Court Day."
    And we didn't get to enjoy it. We brought our baby to Mom's house here, and she kept the baby. And we were trying to walk,
    and it's snowing. Oh, that was not a good year.
- speaker: Interviewer
  text: That's a rare occurrence on Court Day.
- speaker: Respondent
  text: It's a very rare. A lot of floods down there seemed like when it would rain a bunch. You know, I think I've only missed
    one Court Day, and that would have been the Court Day of 1972. We're working in Sutton, West Virginia, putting up guardrail,
    and they told us that we can go home this weekend or we can stay and work through the weekend, and we won't have to come
    back next week. We missed it. We came across the viaduct that night on Monday night and everybody was leaving and I said,
    I'll never miss another one. And I haven't. I've not missed another one since 1972.
- speaker: Interviewer
  text: Wow. Wow. So the Court Day now is a lot different.
- speaker: Respondent
  text: A lot different.
- speaker: Interviewer
  text: So how would you characterize the change?
- speaker: Respondent
  text: Well, originally, it was farmers and people bringing handmade things in, stuff they had at the farm they didn't want.
    Just trade. A lot of trading. And then it finally went to the foreign sweatshirts, the knockoff shirts and purses and
    tools. Tools were a big thing one time, the cheap tools and the socks and things. It just got real knockoff ish.
- speaker: Respondent
  text: Instead of homemade handmade stuff, people didn't. And there's still some of that.
- speaker: Interviewer
  text: Sure. When do you think that changed?
- speaker: Respondent
  text: That was probably--you started really seeing that change probably--in the 80s, early 80s. I helped Mac McCormick with
    his Court Day. He took over down there in about 1990. The city started leasing their property to him. And we were really
    starting to see it come on real strong in the 90s. You know, just every other booth was selling a knockoff UK t-shirt
    or a Bengals jacket or hats or NASCAR. This NASCAR, you know. And it just kind of got to where a lot of people were complaining,
    golly, all it is, is just foreign stuff down there. But a lot of people liked that. They could buy a knockoff $50 sweatshirt
    for $20, you know, and the kids loved it. You know, they wore it. I mean, they even if they were the off-color, you know,
    it wasn't the right color. They didn't spell Bengals exactly right. The kids didn't care. And we just saw a lot of that.
- speaker: Respondent
  text: Of course, it's just kind of- in that process- it was a- and during that times, it was a Saturday, Sunday, and Monday.
    Court Day was a three-day event. Let people come in on Fridays and set up. Well, me helping Mac and kind of knowing what
    was going on and helping vendors set up, we had a lot of vendors started telling us, we need an extra day, we need more.
    You know, we can go up to Covered Bridge, Indiana, or I can go over here. I'm not not sure with all the names, but different
    places, and we can set up for a whole week for the same amount of money you all are charging us for three days. We just
    need an extra day of sales. So I'm not even sure if I was on the City Council at that time when we pushed for it, but
    we decided that we will start letting them sell on Friday. And that worked good for a while, but now -- Back at that time,
    these people that sold at Court Day, a lot of them, they traveled the circuit, you know. They start out in Maysville,
    they came through Flemingsburg, they came to Mount Sterling, and I don't know where they went from here. Maybe the Woolly
    Worm Festival in Beattyville. They were people that made a living doing it. I mean, they did it every year and go south
    into Florida or go south during the winter. And spend the winter in Florida and then and come. Well, they, people- I don't
    think the people want to travel that much. I mean, I think it's Tommy and Billy and over here
