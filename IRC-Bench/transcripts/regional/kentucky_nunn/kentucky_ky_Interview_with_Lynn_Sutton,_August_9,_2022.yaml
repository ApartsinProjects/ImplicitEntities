source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Could you please tell me just a little bit about yourself, your background, and your education?
- speaker: Respondent
  text: Okay. I am from Michigan. I grew up in the metropolitan Detroit area, went to school at University of Michigan, both
    undergrad, and got my masters in library science there. Thought I would spend the rest of my life there, actually, until
    my husband showed me a posting for the Wake Forest University Library job and moved my whole family down to North Carolina,
    and we ended up here. So I'm currently living in Beaufort, North Carolina, which is heaven. I enjoy it very much. And
    I've been retired now for five years. Yeah. I also, when I worked at Wayne State, I got a PhD in education. So that also
    is significant.
- speaker: Interviewer
  text: So in your educational experiences, what prompted you to go into library science? What was the appeal there?
- speaker: Respondent
  text: Well, I was the first in my family to go to college. And often in those cases, I understand parents apply heavy pressure
    to do something practical, get a good job. And my parents did not do that at all. They just said, do whatever you want,
    take whatever courses you like. So I did. I took a language requirement, so I took Latin because I had taken Latin in
    high school and I loved it. Then I took Greek in my sophomore year, and I loved it even more. I ended up majoring in classical
    Greek, which is not practical at all. But my parents said, do what you like. So archaeology, classical Greek studies.
    When I was a junior, I was sitting in the undergraduate library at Michigan, and I thought, shoot, I'm going to have to
    support myself in a couple of years, so maybe I should figure out something practical. I literally got out a career guidebook
    and was paging through what I would possibly like, and I saw a librarian, which would require a master's in library science.
    Michigan had a program and I could stay in Ann Arbor for two more years. I thought, I think I'll do that. That's not very
    noble, but that's how it happened. Later I learned one of the great things about librarianship is you can have any background
    at all. In an academic library, you always need that vast breadth of knowledge. People with weird majors come in handy
    sometimes. So that was how I got into library science.
- speaker: Interviewer
  text: Does your knowledge of or did your knowledge of Latin and classical Greek ever come in handy during your career as
    a librarian?
- speaker: Respondent
  text: In fact, it did because my first job was in a hospital library. So many of the medical terms, I did not have a background
    in science at all, obviously. But I had taken a two course sequence in library school on medical libraries just because
    it seemed intrinsically interesting to me. My first job happened to be in a hospital library in Chicago and not having
    a science background, the Latin in particular helped me a lot with medical terms and terminology. I feel like I picked
    it up more quickly than I did elsewhere.
- speaker: Interviewer
  text: You mentioned your first job was at a hospital library in Chicago. What drew you to that position?
- speaker: Respondent
  text: It was the first job that would take me, really. I got out of library school, I was pretty interested in the medical
    field, and I went to the Medical Library Association conference right after graduation. There were people interviewing,
    and I interviewed for a couple of jobs, and this was the one that gave me the first opportunity. It was close to my home,
    only five hours away. When you live in Detroit, Chicago is like a real city, if you want big city experience, you go to
    Chicago. I love Chicago, but I only stayed there 14 months. I was 22 years old, and because I went right from undergrad
    to grad school, which is not very typical, many people work in between or have careers in between. I was very young and
    had no friends, so when a job came open in the Detroit area, I came home and got a job in a larger hospital library in
    Detroit. It was two hospitals, actually. Then my dream job came open, which was the head of the Harper Hospital Library
    in Detroit Medical Center. It was my dream job because one of the librarians there became president of the Medical Library
    Association as a hospital librarian, which was unheard of. Hospital libraries are very tiny, usually 1 or 2 person operations.
    Harper had nine people and it was very prestigious. I had just had my first child, and I heard she was going to retire,
    so I planned the conception and birth of my second child so I could be ready to apply for this job. Alexander is my second
    child, and he's a dream. It was a little Machiavellian, I guess. I got that job, but this was in the 70s and early 80s
    when healthcare was undergoing a harsh transformation and downsizing of hospitals all over. We thought Harper would be
    exempt because it was the largest hospital in Detroit, but it was not. One day consultants came in and I was told that
    tomorrow my library would go from nine people to three people. I was one of the three, fortunately. We had to lay off
    all those people, many working mothers, and they lost their health insurance that night. It was horrible.
- speaker: Interviewer
  text: That's terrible.
- speaker: Respondent
  text: 'It was terrible. It was so heartless. When that happened, I resolved to get out of the hospital library industry
    and started looking around. A friend of mine was at Wayne State University in the library system, head of medical library,
    and they had an opening for a science librarian. I was a Greek major, but they hadn''t been able to fill the position
    for a while. Because I had worked in healthcare, that was close enough for the sciences. They hired me. That was wonderful
    because it''s hard to change tracks from one type of library to another, especially in small special libraries like hospital
    libraries. Going to work in an academic library was a huge step. Fortunately, I was able to move on to that. Several years
    later, I was chosen to be the new director of an undergraduate library. Until 2011, this remained my most significant
    achievement: to design and build a new library from scratch, create the programs, policies, hire all the staff to accomplish
    a mission. We were told by administration, go build an undergraduate library because undergraduates were not being well
    served. Wayne State is a graduate heavy urban university with about 1,800 undergraduates but 30,000 graduate students.
    Undergraduates were left behind. We had a fabulous time designing that library, and I loved every minute of it. It opened
    in 1997. Our dean moved on, and I had an interim dean who was a friend. I said if you need an associate dean, I would
    be happy to be interim associate dean until things got sorted out. He said okay, so that''s how I got into administration.
    I was head of a library, but still. I did that for a couple of years. They hired a new dean who wanted to keep me on as
    permanent associate dean. Life was lovely. Another turning point came when I applied for the director of the library at
    Oakland University in Rochester, Michigan. It came down to me and one other finalist. When you''re a finalist and you
    don''t hear anything for weeks, it''s not a good sign. I wrote to my contact on the search committee and they said they
    had offered it to the other person because that person had a PhD. I said no one''s ever going to tell me that again, so
    I''m going to get a PhD. Luckily at Wayne State, all my tuition was paid and classes were on campus in the evening, which
    was pretty easy, although I had three school age children by then. It was tough. I was working on my PhD, and my husband,
    now second husband, worked for an online bookseller whose territory included North Carolina. He visited the Research Triangle
    libraries and Wake Forest. When he came home in 2004, he said if a job ever comes open at Wake Forest, I would really
    like it there. I had never heard of Wake Forest and didn''t want to live in the South, so I asked why he was telling me
    this. Their librarian died a couple months later and they posted a job. I would go online occasionally to see what was
    going on at Wake Forest library. It was a good library. She died and they had a search committee. Long story short, I
    was offered the job in spring 2004, which meant moving my entire family to North Carolina, which was hard, but I did so.
    My ex-husband came with me. That''s how I got the job at Wake Forest and was introduced to Israel.'
- speaker: Interviewer
  text: Going into administration, some librarians don't want to do that because it takes them away from their original specialty.
    You mentioned you had a terrific experience setting up an undergraduate library. Is that what prompted you to continue
    your path into library administration?
- speaker: Respondent
  text: 'I don''t know. Even when you''re a hospital librarian, I started out as a staff of one. It was just me. So you''re
    already the boss and the worker. You have to meet with administrators above you who are non-librarians, which to me is
    the definition of being an administrator: when your boss is not a librarian and you have to justify why this is important.
    I think I was good at it and enjoyed it. The higher you go, the more downsides you see, but I felt I was accomplishing
    a good thing. The experience with building the undergraduate library, working with architects, administration, and people
    in the university about learning outcomes was very interesting. It was new to me. I had been more research oriented. Talking
    to people in undergraduate education about learning was inspirational and worthwhile. We had a learning center right in
    the library.'
- speaker: Interviewer
  text: Let's talk about your transition to leadership at Wake Forest and your early involvement with Searle. Can you talk
    about some of your first experiences with Searle, your first meetings, your first contacts with colleagues, and how that
    influenced your work at Wake Forest?
- speaker: Respondent
  text: Sure. When you're a hospital librarian, you are very dependent on your networks. You're a tiny library with a few
    hundred journal subscriptions, but your patrons need all the information in the world. The most important thing is resource
    sharing and developing a network of colleagues that can help you achieve your ends. Searle was a lot like that. It was
    founded on a resource sharing ethos, which was perfect for me because that's the background I came from. I was comfortable
    with that. Other librarians care about getting resources to their patrons. That all felt very comfortable to me. I am,
    as many librarians are, rather shy at meeting people at first. I'm sure John Berger called or emailed me the first day
    I was hired to let me know about the group. I attended my first meetings, but I typically sit back and watch and observe
    the dynamics. I remember early on, I don't remember if it was 2004 when I came or shortly thereafter, we had a regular
    ACS meet...
