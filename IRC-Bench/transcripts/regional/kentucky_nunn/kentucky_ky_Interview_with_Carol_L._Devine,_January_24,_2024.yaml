source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself.
- speaker: Respondent
  text: Yeah, well, I'll just focus on the climate creation care environmental part of my life. But I am a middle aged woman.
    I'm an ordained minister in the Christian Church, Disciples of Christ, and before that was in education. I have three
    adult children. I still call them young adult, but they're getting near their thirties. None of them are here in the Lexington
    area anymore. I grew up with, particularly my grandparents and my mom as well, just what I would call a tree-hugger family,
    an environmental family, but it wasn't even really talked about. It's just the whole waste not want not. We always had
    a garden. My grandparents on my mother's side lived in the mountains of eastern Kentucky. So I always identified with
    that as just who you are, but it wasn't part of my faith. I was a teacher. I did Peace Corps and loved teaching, loved
    education. I had been accepted to the doctoral program at UK in the College of Education when I was called to ministry.
    I kind of came kicking and screaming to ministry because I really loved education. I loved kids. I loved teaching. I taught
    adjunct, loved teaching those who were going to be teachers. The whole education scene was my jam. I was super happy there.
    But I came kicking and screaming to ministry because it made no sense to me. Similar to all the biblical stories, I gave
    lots of reasons as to why not. But when I came to seminary, I took a class pretty early on called the Body of God. In
    that class on one particular day early in the class, for the first time, how I lived—at that time I was vegetarian, now
    vegan—but how I ate, how I lived, my whole composting, gardening, recycling, tree hugging self, it came together with
    my faith for the first time. I'd always been involved in church, always loved church, grew up in the church. But I had
    never heard a sermon or done any kind of Bible study or anything having to do with my faith and the environment. So in
    that class in seminary was the very first time that it all came together. I realized I was actually living out my faith
    in this way, but I had never connected it. No one had ever helped me connect it. So in that moment, that happened for
    me. At the same time, I realized that that's why I was being called to ministry was to help others connect their faith
    to creation care, creation, environment, all of the things to the earth. Also in that same moment, I was moved to talk
    to Disciples leaders in Kentucky. We had a regional minister at the time named Greg Alexander. I asked him what are we
    doing in Kentucky Disciples to support people's faith in this way? He said this is something important to me as well.
    Let's do something. The Christian Church Disciples of Christ was actually started in Kentucky at Cane Ridge in Bourbon
    County. At that time there were over two hundred Disciples congregations, a little less than two hundred now. So we're
    not talking about just a few churches, but how do we support all of these Disciples congregations and the people in them
    in making these connections with their faith? Greg called a 'y'all come' meeting and had pizza and people came. Disciples
    came from eastern Kentucky to western Kentucky and everywhere in between. It was really exciting to realize that this
    was a hunger that was had by lots of people and that this was really important to lots of Disciples. From that, what is
    now known as Green Chalice was born. Green Chalice is the creation care climate program ministry for the Christian Church
    Disciples of Christ. For its first four years, it was just a Kentucky thing. It was a group of us volunteers who had this
    passion. We led two green retreats, had workshops in church basements. At that time, I wasn't yet ordained. I was still
    in seminary and then was ordained as part of this process, so eventually it also became preaching. But at first it was
    just like, let's help others. It really took off. Disciples congregations in Kentucky were really excited about it. Then
    in 2011, some leadership in the denomination reached out to Greg Alexander and to myself and said, can we take this denomination
    wide? Can Green Chalice be not just a Kentucky thing but for the whole denomination in North America and Canada? We did.
    I did. It was a very part time, still is part time, but very part time thing. It has grown to have around two hundred
    and fifty congregations connected to Green Chalice across the U.S. and Canada. That work has been very life giving for
    me and for lots of others as well.
- speaker: Interviewer
  text: Literally in some way.
- speaker: Respondent
  text: Yes. Right.
- speaker: Interviewer
  text: Right. How did the calling feel before you understood where it was coming from?
- speaker: Respondent
  text: Oh, I thought I was crazy—it's a real common story, actually, but I didn't tell anybody for a while. I wasn't sleeping
    at night. I had a plan. I had been accepted to the doctoral program. I had an advisor and was moving forward with that.
    I'm a planner and really liked my plan. So I wasn't sleeping at night. I kept having these—well, one was like a voice
    that I heard that felt outside of me, not inside, and then others—just this wrestling. Finally, I started telling people,
    including my pastor, my minister at the time, as well as some other friends. I thought each of them would tell me I was
    crazy, maybe needed to get checked out—and all of them were like, that checks. We think that you would be a good minister.
    We think that you should explore this, etc. The first thing I did was reach out to my advisor and to UK and ask if I could
    just defer my acceptance to give me time and space to wrestle with this. As soon as I did that, I started sleeping. Then
    I just wrestled with God through the whole thing and gave God lots of reasons why it didn't make sense that I wasn't—that
    this—I had never read the Bible all the way through at that point in my life. While I always loved the church, I had zero
    desire to preach or lead in the church. I also couldn't afford to go to seminary. So I was giving all the reasons that
    it didn't make sense. But I reached out to the seminary—Lexington Theological Seminary. When I talked to them, they let
    me know that I would qualify for a full scholarship. So I kept putting up reasons and they kept falling. I started the
    next semester. I started seminary in the January, February semester, but I think it started in February anyway. It was
    a great ride. It was very hard. It's the hardest academic thing I've ever done. I'd never read the Bible. I was really
    active in church, but that didn't mean I was taking notes and paying attention. I was super stressed and overwhelmed by
    just imagining trying to learn all of that. It was a lot to learn, but it was also really fun and exciting and felt very
    right.
- speaker: Interviewer
  text: How early in the process was that class that you were describing?
- speaker: Respondent
  text: It was early, but I can't remember if it was my first semester. I would have been drawn to that topic for sure, but
    I can't remember if it was my first semester or second semester. I'm sure it's in my paperwork somewhere—I really don't
    remember—but it was early.
- speaker: Interviewer
  text: I asked because I was wondering if that then shaped how you approached reading and studying—and learning. How so?
- speaker: Respondent
  text: Oh, definitely. The theologian and the theology that I really connected with right away was an ecofeminist named Sallie
    McFague. She passed away just a couple of years ago, but she really helped me because she was a feminist but with that
    green lens—helped me to see my own life and my connection to God, to the divine, and be able to kind of put that. As soon
    as I connected with her and read her work and read all of her books, I realized you can't take that lens off. I don't
    know how else to describe it. Like once you see, you can't unsee kind of thing. So reading the Bible, I was then able
    to see all of the places that more than human world is there and the number of references to trees and water and even
    just focusing on Jesus and all of his references to the land and to the seasons of life. It just opened everything up
    for me. Ecofeminism isn't the only—there's ecowomanism. There's many other theologies, but that's the one that just really
    spoke to my own heart. That has also enabled me to share that lens with others who have never had that, who like me growing
    up just really didn't even read the Bible in that way if they read it at all. But that where it was always a separate—like
    I love to hike, but don't see that as part of my faith or I love to garden or I'm really connected to the land or to flowers
    or trees or any of that. So often people have those—either connected to, drawn to, even would say that they feel most
    close to God and still see it as separate from their Christianity, Judaism, Islam, whatever. So it's really nice to help
    others to put those lenses on and go, Oh my gosh. Yeah, it's all connected.
- speaker: Interviewer
  text: Yeah, thinking about my own experience—I was raised Episcopalian—and thinking about my experience with just like Sunday
    school. All the stories were about the people.
- speaker: Interviewer
  text: People were always at the center.
- speaker: Respondent
  text: Yeah. And then, you know, I'm not Catholic and I've never been Catholic, but there are so many things in the Catholic
    Church I've been drawn to once I went to seminary. One of them is St. Francis. I have really connected to St. Francis
    and I've been to a CC and did like a week long meditation retreat that was studying him, and I read all the things about
    him and having—I didn't have figures like that, right? There wasn't in the Protestant world in particular but now Protestants
    do. We didn't have those saints or figures that were shared with us really. I probably knew who he was, but I didn't really
    know anything about him. It didn't help me connect.
- speaker: Interviewer
  text: Is it overstating the case to say that you—not in a prideful way but just observationally—you have been central to
    helping make those figures available and make those kinds of readings available to particularly Protestants?
- speaker: Respondent
  text: Well, I hope so. I mean I think it is all of our hope that we're a pebble in a pond. My prayer is always that I get
    out of the way and I let God speak through me. So I hope—and when I'm successful at that, it goes well. That doesn't mean
    I'm always successful at that, but that's my prayer is that I'm an instrument of divine love, peace, work, mercy. So I
    hope so. But I definitely would say it's, you know, I hope that I have been an instrument for the divine. I hope that
    I have helped others restore their faith or deepen their faith or see their faith in a new light. I think that when we
    do have those connections— I know that when we have those connections in our heart, when it comes together like it did
    for me in that class, that it is life giving and that there's an energy and a depth of faith that comes from that. Then
    we can even connect with all people of faith, because we all stand on, live on, walk on, depend on this holy ground. It
    is a place—I do multi-faith and interfaith work now—and it is a place that we all can come together and hold hands. We
    don't—even within the Christian faith, we don't agree on baptism. We don't agree on communion. We don't agree on women
    being ordained. We don't agree on gay marriage or gay ordination. There's so many things that we don't agree on. But we
    can agree that we're called to care for all that God created, and that that is sacred, and that we can be in this place
    and do this work together and honestly set aside all of those other things.
- speaker: Respondent
  text: And then when you get into multifaith work then it's different. It's actually sometimes easier than within the Christian
    faith. We call God different things, we have different holy books, there's all of these things that are different, and
    yet, we all agree that the earth is sacred, and that we are called to care for it. We might disagree somewhat on what
    that looks like, but we can agree on that one thing.
- speaker: Interviewer
  text: How did—when you graduated seminary and were ordained, and then, did you become a minister? Because you have been
    the minister at Providence Christian Church, right, until you moved to ecoAmerica. Is that correct?
- speaker: Respondent
  text: Kind of yes.
