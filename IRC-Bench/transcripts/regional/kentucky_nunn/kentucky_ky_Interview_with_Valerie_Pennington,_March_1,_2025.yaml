collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So hi, can you just tell me a little bit about yourself--name, where you're from, what your day looks like, your job--anything
    you want to tell me.
- speaker: Respondent
  text: My name is Valerie Pennington. I live in Wellington, Kentucky, which is in Menifee County--near Frenchburg. Yeah.
    I've been coming here for about a--I'd say a little over a year.
- speaker: Interviewer
  text: Mm-hmm. So, how did you hear about the Post Clinic?
- speaker: Respondent
  text: I saw it in the newspaper--I saw it in the Rowan County News over in Morehead and the Menifee County newspaper--
- speaker: Interviewer
  text: --and that just made you come here?
- speaker: Respondent
  text: Uh-huh, when I seen it--
- speaker: Interviewer
  text: Can you tell me a little bit about your experiences accessing healthcare from the Post Clinic?
- speaker: Respondent
  text: Uh, yeah, I started coming here probably, like I said, a little over a year ago and I've seen Olga. She is wonderful.
    Then, I've been coming to the dentist a lot.
- speaker: Respondent
  text: Um, and, uh, I just appreciate this place so much. Yeah, because I don't have the insurance to cover what I need to
    have done. And they do a great job here.
- speaker: Interviewer
  text: Mm-hmm. So, can you tell me a little bit more about your experience, um, accessing healthcare before coming to the
    health clinic--uh, Post Clinic?
- speaker: Respondent
  text: Well, a lot of times I didn't go to the doctor when I needed to because I couldn't afford it.
- speaker: Respondent
  text: Um, so, now if I need anything, I can come here.
- speaker: Interviewer
  text: Mm-hmm. Um, are there any still--barriers that you face, like, just managing your health before here, like, because
    you couldn't go to the doctor?
- speaker: Respondent
  text: Um, well, this sure made it better because, yeah, there's times I couldn't go.
- speaker: Interviewer
  text: Mm-hmm. Um, how has the clinic impacted your health, or just your general well-being?
- speaker: Respondent
  text: They've helped me so much--yeah, yeah. Just by doing the blood work, and, uh, they, they've done a great job here--and
    the dentist, great.
- speaker: Interviewer
  text: Mm-hmm. Um, how has your relationship been with, like, the specific healthcare providers or, like, the dentists compared
    to, like, other places?
- speaker: Respondent
  text: They have been awesome. They have checked on me, they've text, uh, most people don't do that.
- speaker: Interviewer
  text: Mm-hmm. So, it's kind of like a family here, is that--
- speaker: Respondent
  text: --oh yeah--
- speaker: Respondent
  text: --oh I just--yep, I love everyone here--
- speaker: Interviewer
  text: --mm-hmm, mm-hmm--
- speaker: Respondent
  text: --they're great.
- speaker: Interviewer
  text: So, do you feel, like, connected or, like, a sense of community here at the clinic?
- speaker: Respondent
  text: Yep. I sure do.
- speaker: Interviewer
  text: Any other questions? Or do--is there anything else you want to tell us about the clinic?
- speaker: Respondent
  text: I just--I'm just very thankful and blessed to be able to come here. It's been a blessing to me.
- speaker: Interviewer
  text: Do you have anymore questions--
- speaker: Interviewer
  text: --yeah, does anybody else have any questions you want to add?
- speaker: Respondent
  text: Well, you know, I was thinking, um, I really find it, um, beautiful, like, the sense of community.
- speaker: Respondent
  text: And, in the Post Clinic and in hospitals like this, compared to like super large cold places--
- speaker: Respondent
  text: --it's different.
- speaker: Respondent
  text: --and they make you feel so comfortable here and they really try to help you.
- speaker: Interviewer
  text: --can you t--
- speaker: Interviewer
  text: --oh, sorry. I was gonna say, can you tell us, like, anything they do to help you feel comfortable, like, is there
    anything specific?
- speaker: Respondent
  text: Just all their personalities. They all just make you feel so welcome.
- speaker: Respondent
  text: You really do feel like family.
- speaker: Respondent
  text: Some of the staff, like, that we interviewed before talked about how, like, some staff know their pets' names--
- speaker: Respondent
  text: --or, like, they check up on you--like, with blood work and all that type of stuff--
- speaker: Respondent
  text: --like, you know, compared to giant hospitals that have--they really care about, like, the community--
- speaker: Respondent
  text: --yep. They do. They care--
- speaker: Interviewer
  text: --they care--
- speaker: Respondent
  text: --they care here a lot.
- speaker: Respondent
  text: Mm-hmm. And, how do you feel, like, that care--has it made you--it makes you want to come back--
- speaker: Respondent
  text: --oh, yeah--
- speaker: Respondent
  text: --this place--
- speaker: Respondent
  text: --oh, yeah--
- speaker: Respondent
  text: --and, it makes you wanna give, give back--
- speaker: Interviewer
  text: --yes, it does.
- speaker: Respondent
  text: The--this place is different. It's different than just a regular, you know--hospital and doctor's office, it's just
    different. And they, they just help you so much and they care, and, you know?
- speaker: Interviewer
  text: So, um, can you tell us, like, what made you, like, want to tell other people about the Post Clinic, like--
- speaker: Respondent
  text: Because they have done such a great job.
- speaker: Respondent
  text: Yeah, I've told many people over around where I live about it because I know a few people that don't have insurance
    or have a really high deductible and then I will tell them about the Post Clinic. And they say, "Well, I've never heard
    of that."
- speaker: Respondent
  text: But I saw it in the paper or I may not have known about it.
- speaker: Interviewer
  text: Mm-hmm. So, do you think, um, that seeing it in the paper--do you think people will trust, like, that source of media?
    Or, like, do you think that, like, word of mouth has helped get people--
- speaker: Respondent
  text: Yeah, I think word of mouth--
- speaker: Respondent
  text: When I first read it, I thought, oh, that's too good to be true--(Snow laughs)--but then I called it and I called,
    and they said, "Yeah, we'll see you," and--yeah. But word of mouth definitely helps.
- speaker: Interviewer
  text: So, when you're, um, talking to people about the clinic, like, what do you emphasize, like, about, like, to get people
    here? Like, is it the, the healthcare access, is it the community, is it a mix of both?
- speaker: Respondent
  text: Um, yeah, it's, it's a mix of both.
- speaker: Respondent
  text: And, you know, I know several people, like I said, that don't have insurance and they're glad to know about this place.
- speaker: Respondent
  text: And they're just excellent, the doctor and the dentist. They're great. And the assistants, I love the assistants--(Snow
    laughs)--all of them.
- speaker: Respondent
  text: I think they made our, you know--coming in to this place easy, and, and really made us feel the family connections--everyone's
    here for you.
- speaker: Respondent
  text: So, like, not only the doctor and the dentist, but--
- speaker: Respondent
  text: --it's also, like--it's the, the, the, assistants that really make places like this--
- speaker: Respondent
  text: --yes, it makes a big difference.
- speaker: Interviewer
  text: So, if there was, like, one thing or one story or one, like, observation that you had at the clinic, like, that you
    would want everyone to know, like, what would you, like, tell people, like, about the clinic?
- speaker: Respondent
  text: That it's, it's a blessing to be able to go there if you don't have insurance or a high deductible. It is--I just--I
    tell them every time I leave here, I said, "You all are a blessing. I couldn't have been treated, if it weren't for you
    all." And they just do a overall great job.
- speaker: Respondent
  text: And, you know, we'd really all like to thank you for, um, driving up here--
- speaker: Respondent
  text: --taking time out of your day.
- speaker: Respondent
  text: --well, I appreciate you for what you all are doing. You all make the world a better place, you know.
- speaker: Interviewer
  text: And so do you--
- speaker: Respondent
  text: --we need to help each other.
- speaker: Interviewer
  text: And so do you.
- speaker: Respondent
  text: Thank you so m--yeah--
- speaker: Respondent
  text: --well, thank you.
- speaker: Interviewer
  text: Thank you for telling your story.
- speaker: Respondent
  text: You're welcome--
- speaker: Interviewer
  text: --we really appreciate it.
- speaker: Respondent
  text: Thank you all for asking me. It, it was a privilege to do it. That's how much I love the Post Clinic (Snow laughs).
    Yeah, I drove fifty minutes, didn't mind a bit, to come down here to do this because this place means a lot to me.
- speaker: Respondent
  text: Thank you so much--
- speaker: Interviewer
  text: --thank you.
- speaker: Respondent
  text: Thank you all. Thank you all. I appreciate you all.
- speaker: Respondent
  text: Thank you so much, um--
