collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: All right, so, Jeremy, if you can introduce yourself and just give me a little bit about who you are and, you know,
    career, life, all those good things?
- speaker: Respondent
  text: Sure, my name is Jeremy Sean Camron. I was born December 3, 1973, in Owensboro, Kentucky, and in my fiftieth year,
    as we speak, coming up on it in this December. Majority of my life has been spent in Owensboro. I spent fifteen years
    away in the Navy, and then at Western Kentucky University, and then teaching in other communities around South Central
    Kentucky. And then I eventually became a college and-- well, an alternative teacher in my first job and in my second job
    when I moved back home to Owensboro, running a unit that dealt with short-term and long-term behavioral and drug violations
    that the district would place them. And I would, kind of--I oversaw that at the high school level and then that moved
    onto administration in Warren County. It didn't work out and ended up back here at Owensboro as a college and career coach
    at Apollo High School, my alma mater where I graduated in 1992. And created, basically from scratch, the position of College
    and Career Coach through a federal grant called Race to the Top with the Green River Regional Educational Cooperative.
    I was basically their employee, but I worked in a high school. There were about thirty of us across the state from Northern
    Kentucky all the way down to basically Bowling Green and Hodgenville area, and we created the job. Founded the College
    and Career Coaches Association here in Kentucky and then this happened to work out about six years into the job and, kind
    of, felt like everything leads back to alternative education for me. And that led to being here for the last six years
    and selected, you know, the 2022 Kentucky principal of the year last year, I think, kind of, based off some legislative
    work I had done with DJ Johnson, a local legislator here, to expand access to the graduate equivalency diploma to all
    students in traditional and nontraditional alternative education. And relieved them of the burden of compulsory attendance
    after they actually pass it, so they can move on with their life and, you know, transition into, you know, whatever it
    is they plan to do.
- speaker: Respondent
  text: Yeah, so that was really cool; that was a nice surprise last year. I serve on the board of the Kentucky Association
    of School Administrators for the last three years, which, kind of, led to that work around education policy. And I'll
    be the David Karem Educational Policy Excellence Award winner this year announced here soon, so--
- speaker: Respondent
  text: --that's just between us. (both laugh) I think they don't want anybody announcing it just yet.
- speaker: Interviewer
  text: Congratulations.
- speaker: Respondent
  text: Yeah, it's all of a sudden. I also was inducted in the Kentucky Veterans Hall of Fame this year, so that was--
- speaker: Respondent
  text: --I know, like, well, getting inducted in September, so it's pretty humbling the last couple of years. You never really
    sought out awards, just doing the job, and all of a sudden, it seems to be coming in stream, so it's pretty nice, pretty
    gratifying to, you know, be recognized for your work.
- speaker: Interviewer
  text: Recognized for your hard work. (laughs)
- speaker: Respondent
  text: Yes, of course.
- speaker: Interviewer
  text: And I'm sure caring too goes along way so--
- speaker: Respondent
  text: --a lot, a lot, it's all of it--
- speaker: Interviewer
  text: --well, thank you for that. As we talked about here earlier, you know, we want to get Kentucky stories and looking
    at the Kentucky experience, especially during the pandemic. And we're--you know, we're pretty much in the post-pandemic
    era now, but I'm just, kind of, wanting you to think back into that time, and just, kind of--just, you know, warm-up questions,
    if you will.
- speaker: Interviewer
  text: What would you say would be, like, a word that really encapsulates that time and--well, for you anyway?
- speaker: Respondent
  text: Are we talking personally or professionally?
- speaker: Interviewer
  text: Either or, I like, I love--
- speaker: Respondent
  text: --okay, all right, well, adaptability, I think, is what springs to mind--
- speaker: Respondent
  text: --like, as a word. So, I was sitting at this screen the same way I'm talking to you when the email came down that
    they were going to close schools the next Monday. I believe it was March 19, 2020, something like that, and March seventeenth,
    I believe, something like that. But long story short, we went into, you know, panic mode because, you know, nobody knows.
    This state's invested a lot of money unsuccessfully providing high-speed internet to rural and multiple areas, and I hope
    we can get better at that. But not knowing what the capabilities of the homes were, not knowing where our kids had access
    to, not knowing if they had food every day, not knowing all of that kind of stuff. And basically, I remember rushing,
    having the juvenile justice staff that helps us run the school cover the classrooms and say, "Okay, here's the deal, I
    don't know how long we're going to be out, it could be a couple of weeks--" we're all hopeful back then, right?
- speaker: Interviewer
  text: Right. (both laugh)
- speaker: Respondent
  text: '"But whatever you do, every kid in this building leaves with something to do, and you''re going to have a call list."
    And we basically planned out the next three weeks, because it was almost spring break, on the spot, how to successfully
    run distance education from--with kids that are in high trauma, very high poverty homes within, I don''t know, an hour
    or two basically, just it was like, Go, go, go. So they, at least, would walk out our doors with something in hand to
    provide the educational services that are required by the state of Kentucky and not knowing what that would look like
    or how we would do that or any of that.'
- speaker: Respondent
  text: The adaptability came with every turn when all of a sudden, it was, Oh, we're not coming back, okay.
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: Maybe in May, no.
- speaker: Interviewer
  text: Yeah. (laughs)
- speaker: Respondent
  text: Maybe in July, no. So continually trying to find ways to make sure our kids were safe and okay. Changing processes
    and trying to find the best way to educate and keep kids connected with somebody that cares about them. You know, because
    a lot of times in a school building, it's like their refuge from their homes sometimes, and that's sad but true. It might
    be the only place they eat that day, the only place they, you know, have somebody that smiles at them that day, cares
    about them that day and--you know. Some of the background noise you would hear in these homes with our kids, you're like,
    Okay, I don't know how we're going to teach them because it was so chaotic and so hectic.
- speaker: Respondent
  text: So it was just a continual process of adapting to what we were we were given.
- speaker: Respondent
  text: And then the game being changed about every two weeks or every week by somebody that--
- speaker: Interviewer
  text: --oh, okay--
- speaker: Respondent
  text: --they learned something else, Okay, well, now, we got to do this, or now, we can't do this or--you know--
- speaker: Respondent
  text: --figuring all that out on the fly all the time.
- speaker: Interviewer
  text: It's like a--not of the--it, obviously, was a possible task, but it's like an impossible task that you're constantly
    changing and redoing and-- yeah.
- speaker: Respondent
  text: Yeah, I basically told my teachers, "You need to get any kind of OCD tendencies you have out of your system, you're
    not going to be able to be perfect during, this is all new, this is a nationwide distance learning challenge." (laughs
- speaker: Respondent
  text: '"So forget what you know and let''s deal with what we can deal with."'
- speaker: Interviewer
  text: Wow, can you talk--well, it kind of leads up to kind of two questions, but since you--as you were talking there, can
    you give us or give, you know, just like a little understanding of alternative education in general? Like what's the population
    that you're working with, what does that, you know, necessarily mean? And then, you know, kind of, going back into--going
    a little bit more in depth in how the pandemic maybe affected those particular students a little bit differently than
    possibly other students?
- speaker: Respondent
  text: Sure. Well, when you hear alternative education across Kentucky, you're going to have a lot of range of what that
    actually means. The Kentucky Educational Cooperative for State Agency Children oversees multiple programs, anything from
    mental health hospitals, to DJJ group homes where kids may have been assigned to live for a certain amount of time out
    of their environment. It could be a youth detention center. It could be a long-term youth detention center where they're
    there for multiple months, for multiple criminal acts that they may have committed. Mixed into that, you also have non-DJJ
    kids that are more DCBS kids, child services, social services-type kids that are mixed into that whole spectrum. Either
    in foster care or in different homes because they don't really have one, they might be in custody. We've got a--for instance,
    we have a student now that's a placement here from the social services that lives in a place here in Owensboro called
    the Hayden Home. That was created for basically kids that don't have a place to be, and it's in their best interest to
    not be with their families anymore. So we have kids like that as well as kids that are--you know, our kids go out in a
    day treatment every afternoon back into the potential environment that they were in when they chose some of the--to do
    some of the things they did. There's also non-DJJ, so there's like district-run alternative education places where maybe
    there are kids in there that--anxiety issues with having like Daviess County High School here in Owensboro has eighteen
    hundred, nineteen hundred students, Apollo has fourteen hundred, Owensboro High has, shit, I don't know, eleven hundred,
    twelve hundred kids. And it's just an environment where there's too much chaos and lack of structure. So an alternative
    school can, a lot of times, provide either a higher structure or just a smaller group number structure. A lot of times,
    the student-teacher ratio is significantly less than a regular school. You know, when I taught arts and humanities at
    Apollo, some classes had thirty-four kids. Probably the maximum I would have at Heritage Park High School here in town
    is--one of our district-run alternative programs is twelve to fifteen give or take.
- speaker: Respondent
  text: A lot of times, you're dealing with kids that have truancy as a symptom of what's going on in their life, a lot, a
    lot of mental health issues whether that be, you know, anxiety-based bipolar, oppositional fights, behavioral disorders,
    I mean all kinds of stuff, there's a whole realm. That can also be kids that just need something different because they
    don't necessarily fit in the big, large system, and an alternative school, when done well, can be adaptive more to an
    individual student's needs.
- speaker: Respondent
  text: And provide them, you know, with what they need. A lot of times, kids are credit deficient when they come to an alternative
    program, so they're off track for graduation. A big goal is to get them back on track to be a high school graduate. And
    with the recent passage of the law I was telling you about earlier, now, we have the GED again as an option. It was off
    the table for alternative schools run by districts for a long time, only state agency children qualified, but now all.
    So about twenty-three thousand kids across the state are in alternative programs roughly. That was the count as of about
    a year ago. And now, those kids will, at least, have access, if they need another last ray of hope, to actually attain
    something, some kind of credential, so they can go to work. You know, a high school diploma is still, kind of, the standard
    that we strive for, but it's not necessarily the reality when you have a seventeen-year-old that has three credits and
    they need twenty-two, at least, to graduate. And at a minimum, most places want a GED, especially our factories and places
    around here and at a minimum. There are a minimum number of career and basic academic skills that a kid has to exit with
    to actually be hirable because, you know, a lot of these factories around town, you know, they're using the ACT WorkKeys
    test where a kid needs to be able to read and do basic career-based math and stuff like that, so.
- speaker: Respondent
  text: So your goal is to graduate them, but also to graduate them in hopes of, you know, getting them, at least, to a point
    where they can be self-sufficient.
- speaker: Respondent
  text: And that's always our goal as a regular ed, but especially an alternative ed, because the likelihood of those students
    being on their own sooner than others is a lot higher.
- speaker: Respondent
  text: It's a lot higher, so they need to be ready to go, and a lot of times, they're the most ill-prepared, unfortunately,
    because of the environments they grew up in. And some of them, it's just, you know, "I got into drug use, and here I am,
    and I love it, and now, how do I get off of it, right? And I'm fourteen, fifteen years old, and I'm an addict, and how
    do--?" You know? So you got--you're dealing with all that, too, and I mean, that's the other side of a lot of alternative
    education is dealing with a lot of substance issues and, you know, potentially lifelong charges that--you know. I've had
    two kids, three kids in the last four years that have left us that are dead now from gun violence or fentanyl, which is
    a big scourge in this side of the state--well, I think it's nationwide--but it's the largest growing. It's actually passed
    teen suicide as the largest killer of teens in Kentucky in the last year.
- speaker: Respondent
  text: But when you think about Kentucky per capita, we have the highest child abuse rate in the country and--
- speaker: Interviewer
  text: --I didn't know that--
- speaker: Respondent
  text: --yeah. So the need for an alternative program, you know, every one of those kids are going to have an attachment
    disorder of some kind, you know. So getting them to actually trust an adult, I mean it takes time and it takes smaller
    numbers because they got to be able to be--the--you got to be able to see them, you know--
- speaker: Respondent
  text: --on an individual basis, relationally, before you're ever going to make any progress.
- speaker: Interviewer
  text: And so - (clears throat)--how did that--how did COVID--I guess, did you see changes with your students? You know,
    I don't know, was there anything salient that really just, kind of, messed up things for those students?
- speaker: Respondent
  text: I think, I mean, we saw it across the board in all versions of education. I mean, you had kids that they just went
    missing. You know, they didn't show up to the Google Meets, they didn't--
- speaker: Respondent
  text: --you know? And then initially, you had contact limitations. I mean
