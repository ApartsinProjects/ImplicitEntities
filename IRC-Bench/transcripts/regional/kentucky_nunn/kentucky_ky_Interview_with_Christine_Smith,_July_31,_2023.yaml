source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So, I'm gonna start with either - this is either the easiest question or the hardest question, which is tell me a
    little bit about yourself.
- speaker: Respondent
  text: Well, my name's Christine. I am living in Lexington. I'm not from here; I'm from Miami, Florida. I'm currently 38.
    I live in Lexington largely because it's one of the most affordable places I've ever lived, and because Miami is sinking
    under the ocean slowly but surely. So, you know, in terms of long-term decision planning, that's why I've chosen this
    spot. And, and I garden for a living, or make gardening possible for others to do for a living.
- speaker: Interviewer
  text: Okay, there's a lot in there that I want to talk about. Let's start with Florida.
- speaker: Interviewer
  text: Okay. So, you grew up in Florida, Miami specifically, like in the city, or?
- speaker: Respondent
  text: So, it's a neighborhood called Opa-locka, which is, like, could be a whole other conversation, but it was - it's a
    city themed on One Thousand and One Nights, or the Arabian Nights stories that Shahar Azad tells to save herself. And
    so, there's lots of Arabian-style buildings. I grew up on Arabia Avenue. And so, it's about twenty minutes from North
    Miami, or getting to the beach, basically. And so, yeah, that's, that's -
- speaker: Interviewer
  text: So, it was a planned community then, if it was themed?
- speaker: Respondent
  text: Yeah. So, Glenn Curtis, who was a famous aviator, who probably no one remembers now - incredibly wealthy 1920s, and
    Florida was a site for a lot of developers to like, sort of create these fantastical communities to attract northerners
    to. So, Glenn Curtis, after reading a Thousand and One Nights, with architects based in New York City, they dream up a
    planned city that would encapsulate the storybooks. And, and yeah, so they build a theme city, where there's lots of domes
    and minarets and streets that are named after elements of the books. And there's old photos of lots of white people dressed
    up as - I don't know, not like anyone from the Middle East, but more like what you would see Jasmine as in Aladdin. And,
    (laughs) and that is - that, that was the city.
- speaker: Interviewer
  text: Wow. And so, how did your family end up there?
- speaker: Respondent
  text: So, my family is from Jamaica, but they came to the United States in the late seventies. And they were able to afford
    a home there. It was - I think it was affordable in part because of white flight. Like, as more and more black families
    were moving in, white folks departed tout suite, and I think it made it affordable for them to get a home.
- speaker: Interviewer
  text: Mm-hmm. That's pretty - classic story? I don't know, classic is not the right word. Not uncommon.
- speaker: Interviewer
  text: Yeah. And maybe we'll connect back to conversations about Lexington here in a minute. Yeah. Okay, so were you outdoorsy
    growing up? You did gardening?
- speaker: Respondent
  text: Uhm, so, I suppose - outdoorsy. So, I, I should say that, you know, growing up in an urban neighborhood, and also
    at a particular period in this country - or in our world history, right before technology was so widespread, not outdoorsy
    in sort of - in, you know, in the sense of like, we went hiking or camping or anything like that. We never did anything
    like that. But I was always outside playing. And we had lots of fruit trees, citrus trees. And so, with friends always
    either in like, you know, our backyard eating things, or in neighbors' backyard stealing fruits, or just being outside,
    was just part of growing up and trying to avoid one's parents. So, outdoorsy in the most literal sense, yes. Outdoorsy
    and kind of the sense of, you know, family trips outdoors into the Everglades, no. School trips to the Everglades, yes,
    but - (laughs)
- speaker: Interviewer
  text: Yeah, yeah. Well, and - so, I did my PhD in Florida, USF in Tampa. And my friend in the program there, who was from
    Florida, described it once to me as the state that nature is always gonna take back. And I was like, "Yeah, that seems
    about right." Like, the Everglades is this - it's a park, but it's not like a park in the sense that we think of parks,
    where you can just sort of stroll in, right? And yeah, yeah. So, actually, that was an, an observation that another interviewer
    from South Florida - or interviewee from South Florida told me not too long ago.
- speaker: Interviewer
  text: Yeah. So, Chris Keefe.
- speaker: Interviewer
  text: You know them? Yeah. So, a seed keeper. So, they're from South Florida and talked about that. So, you also had family
    in Jamaica, correct?
- speaker: Interviewer
  text: Yeah. And so, were you visiting a lot and experiencing, like - I actually don't know much about how different the
    sort of ecosystems are between South Florida and Jamaica.
- speaker: Respondent
  text: Yeah, so it's in the tropics. And I think Florida would be listed as subtropical, although that could be wrong. So,
    a lot of the same things grow in different places, like - I mean, the same places, so mango trees, orange trees. And so,
    yeah, I was visiting a lot as a kid. I would go in the summer times, and I would spend the time with my grandparents,
    Frank and Edna, who are both no longer, no longer here. But yeah, I would go and stay there in Kingston. And my grandmother
    - it's funny, I don't know so much about my grandpa. He was always a - he was a man who was literate, which is significant,
    because my grandmother wasn't. So, he was always reading the newspaper and always listening to the BBC and always commenting
    on politics. And he loved tennis. But that's all I really know. And that he was a carpenter and a salesman. He built their
    house in Kingston. My grandmother was the one who I spent the most time with, and she kept the garden. And she's from
    the breadbasket of Jamaica, which is St. Elizabeth. And so, they come from an agricultural community. And so, in Kingston,
    although she was far away from what she knew, she had this huge front yard garden. She had, like, a menagerie of animals,
    like goldfish, turtles. She kept pigeons, she had, like, seven dogs, there were chickens. And then - yeah, and her garden
    and what remains now of the house. There was breadfruit tree, guinep - sometimes people call it Spanish lime. There was
    pomegranate, there was Jamaica apple - or it's sometimes called Malay apple. I think its original name is Malay apple.
    She had different veg growing and, and, and yeah, and those are the things that remain. The house is no longer really
    there. But the trees are massive and overgrowing and neighbors salivate over the fruit, because there's just so much fruit
    coming out of the yard.
- speaker: Interviewer
  text: Yeah. So, do you go back now regularly, or?
- speaker: Respondent
  text: I haven't been there since my grandpa's funeral when I was in high school. And so, the dream has always been to somehow
    find a way to get back to visit. But as more and more family members have died, it's, like, less and less people to visit.
    So, like, you know, a lot of stories of Jamaicans, the diaspora has - there are more Jamaicans living outside of Jamaica
    than in it. And many of them, the nodal points where Jamaicans land up, end up is either England, Miami or Orlando - more
    so Miami - New York City, or Canada, in the eastern part, like around Ottawa. And so, yeah, those are sort of the traditional
    pathways and where many Jamaicans today live. And it's sad, because the island economy is so - sort of revolves around
    tourism and foreign dollars coming in and that. And, and yeah, there's just not a lot of opportunity for Jamaicans to
    stay in Jamaica. So, there's a lot of people who leave and send money back, or treat it then as their kind of vacation
    home or family meeting place. So, yeah. Yeah.
- speaker: Interviewer
  text: Yeah. I think - I mean, not that anything about us is reducible to one life experience ever. But I see, at least in
    part, maybe where your interest in geographies came from? (both laugh) Yeah, which we'll, we'll get on to. Okay, so you
    - actually, yeah. So, now maybe is a good time. So, you mentioned high school, and going back. I'm sorry about your -
    the passing of your grandparents. That's tough, especially at that age. I feel like for me, at least I - yeah, I lost
    several grandparents sort of around high school age. And it felt like it was just the time that I might have gotten to
    start knowing them as people, you know. So, you went off to university. How did you decide where to go and what to study?
- speaker: Respondent
  text: Well, I had a very good college counselor. I forget her name now, but she was great at encouraging us to look not
    only at local colleges, but like, a broad, not - a broad in the sense of outside of Florida, right? I have to say that
    Florida growing up felt - I never felt like we were part of America. (laughs) And so, when I got all the college brochures,
    (coughs) it was really exciting, because they all showed seasons, which was not a thing. And they showed things that look
    like TV, because my only - like, if we did not have television, you could not tell me that, just because our lives in
    Opa-locka were so - like, all of us were black, immigrant, brown kids. That was our life going to school. You know, we
    would, of course, go to the beach, and that's where we would see white people. But like, just our world, or the world
    at that time, in some ways, felt very small. And there were, like, black people from the south also there who migrated
    into Miami too. And so, there was that. But also, that just didn't feel like "America", quote, unquote. And, and so -
    what am I trying to say? So, when those brochures came in, it was - it looked like America, that (laughs) one saw on TV.
    So, anyway, it was fascinating. But um, and so, I got - I think I applied to, like, as many schools as I could afford,
    and that were free to me to apply to. So, I applied to, like, Reed College, which was wild. Like, I, I saw, like, photos
    of them having, like, a dog watering spot. Like, you could bring a pet to campus. And I was just like, "What? What is
    this? (laughs) This is wild. I have to see it." Because never, ever, ever, like - dogs stayed outside and they had their
    own little bowl and you didn't have them on college campuses, you know. Or I applied to Florida schools too. But I ultimately
    went to Syracuse. And that was really largely because of the Maxwell School, and this idea that I could be - at the time
    I was really into international relations. And I really wanted to be, like, an international lawyer or, you know, someone
    who was a bit of a, you know, sort of straggled the world of diplomats and, you know, and dealing with heavy international
    issues. And of course, it never came to pass. But that was the point. It was like, "Okay, this place has seasons, there's
    snow, and there's the Maxwell School." And so, that is why I went to so far away. And I had no idea what I was getting
    into. But the brochures just really look lovely. And, like, a totally different world.
- speaker: Interviewer
  text: How was the first winter?
- speaker: Respondent
  text: Dreadful. (laughs)
- speaker: Interviewer
  text: What did you - I mean, like, did you even own a jacket at that point? Because when I moved here, I had to buy an actual
    winter coat. So -
- speaker: Respondent
  text: Yes. No, I did not. So, I rode with my mom. We took the Greyhound up to Syracuse from Miami, and got there and I didn't
    have a winter coat. I remember having to go to the Carousel Mall. And - but my first coat was so impractical, but it was
    not very good. I must have gotten it from, like, Forever 21 or something there. But it was, like, this puffy white coat
    that was totally - like, didn't have any down. It had, like, something synthetic as its filler. But it was just big and
    white and not very warm. And that was my first one. I think I've gone through - like, I had to go through, like, several
    winter coats before I learned what was (laughs) good enough. Because I just didn't know. Didn't know how to shop for a
    winter coat. Yeah, there was lots of - there was lots of rounds of different coats before. I had to get winter boots that
    felt like, you know, like having sort of small children weighted on your back. (laughs) And, like, learning that ice is
    worse than snow. Like, I slipped - so, the thing about Syracuse is that - so, in the dormitories where I was, we were
    on Mount Olympus, and there was Flint, where I was a student, and you had to go down these stairs, like about - I think
    it was 144 stairs from Flint to get to the quad and camp - like, you know, the primary center of campus. And there was
    one morning where I slipped because I just - I wasn't aware that ice on the ground. I was just dumb when it came to weather.
    And I must have slipped down twenty of those stairs. My coccyx was so bruised. And, and so, I learned about ice and I
    learned about having good shoes with traction and, like, watching my - because I was just strolling around, like, ignorant.
    They don't cancel classes no matter what, because that's their - that's what happens. And so, like, the mornings of having
    to walk through, like, tunnels taller than me of dirty snow that had been plowed the night before, or. Yeah, it was an
    experience. (laughs)
- speaker: Interviewer
  text: Was - did it take the shine off the notion of seasons? Or did you grow to love it, or?
- speaker: Respondent
  text: No, I, I still grew to love it. Like, you know, summer became my favorite season. Um, I really loved the fall. I became
    accustomed or introduced to Nick Drake. And so, listening to Nick Drake in the fall, which just felt like such a classic
    college experience. (laughs)
- speaker: Interviewer
  text: I literally - this - I had the exact same experience, experience in college in Boston, and was introduced to Nick
    Drake by a friend who went to Berkeley School of Music.
- speaker: Respondent
  text: Yes, right? And I just felt like this is what - it's like, "This is America." Like, that's what it felt like. (laughs)
- speaker: Interviewer
  text: What was that show in the - around that - oh, Felicity.
- speaker: Respondent
  text: Yes. Yeah. (laughs)
- speaker: Interviewer
  text: Yes. Yeah. Where she - yeah. Because we - you and I are exactly - like, graduated '02. College '06. Yeah. Yeah, yeah.
    So, we're at the same, like, touch points, I guess. Yeah. So, at what point in there did you discover geography? Because
    you ended up graduating with a double major, right?
- speaker: Respondent
  text: Yes. So, uh, I was an international relations major and I decided that I absolutely hated it. Um -
- speaker: Respondent
  text: Largely because they saw the world as a game. So, there are several theories within international relations, um, that
    are kind of classic. Like, there's realist theory, there's liberalism, there's neoliberalism, which is, um, you know,
    one that we're now most familiar with, or perhaps not. Yes and no. Um, and realism or - and I should say in a lot of the
    classes, you know, human behavior, complex events, um, that happened, treated peop
