collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So I guess let's start off with your background. Like, tell me your--how'd you get involved in this? How'd you get
    started with this?
- speaker: Respondent
  text: Actually when I was 13 years old, my mom and dad had gotten into mass producing the ceramic pitcher and bowl sets,
    like back in the late 70s, early 80s when they were hot. And we made, uh, 800 sets a month. And then my dad would trade
    them to different warehouses that wholesaled all kinds of merchandise.
- speaker: Respondent
  text: So, since I was working for him, I would take my pay in other merchandise.
- speaker: Respondent
  text: So, then I started selling it on the weekend.
- speaker: Respondent
  text: You know, wherever a flea market or a festival. And start selling it that way.
- speaker: Interviewer
  text: And where was that? Were you--are you originally from Florida?
- speaker: Respondent
  text: No. I'm originally from Louisville, Kentucky.
- speaker: Interviewer
  text: And so you're born and raised in Kentucky?
- speaker: Interviewer
  text: And where what are some of the flea markets you would sell it at?
- speaker: Respondent
  text: Oh, we used to do, uh, like Stewart's Promotions. I don't know if you're familiar with them or not. They do like the
    fairgrounds, Rupp Arena.
- speaker: Respondent
  text: With the once a month ones. Mhm. And then I'd do small markets like Shepherdsville, Kentucky.
- speaker: Respondent
  text: Elizabethtown, Kentucky and stuff.
- speaker: Respondent
  text: And then you know when it would turn cold--which I started selling right about the time I was 14--and then when it
    would turn cold in the wintertime, by the time I was 19, I would travel to Florida for the cold months in Kentucky.
- speaker: Respondent
  text: And go down there and stay three or four months and run around and sell, and then come back when the weather broke.
- speaker: Interviewer
  text: Did you go to school?
- speaker: Respondent
  text: Yeah, but not that much. [laughs]
- speaker: Interviewer
  text: I mean, that's it--did you graduate high school?
- speaker: Interviewer
  text: Oh. That's amazing. You just had an entrepreneurial--
- speaker: Interviewer
  text: I mean, all the great entrepreneurs they don't go to, they don't finish school, right? I mean, Bill Gates, Steve Jobs,
    they didn't finish school, right?
- speaker: Respondent
  text: Yeah. I actually dropped out right before I turned 16.
- speaker: Respondent
  text: And that was mainly because I was just so busy working. I was more ambitious about working.
- speaker: Interviewer
  text: Yeah, absolutely. What is it about the road that appealed to you?
- speaker: Respondent
  text: I like going different places, seeing different things. You meet a variety of people. I mean, different parts, different
    states. Different parts of the United States are so different. Yeah, even the lifestyle. And, you know, it just depends
    on where you, you know, where you go. It's-- it's different. It's really, really neat.
- speaker: Interviewer
  text: Tell me some--like have you--have you sold in all 50 states.
- speaker: Respondent
  text: No, I would say about 13 or 14.
- speaker: Respondent
  text: Mainly. Mainly on the East Coast. I've been to Texas and out there, but mainly everything else on the East Coast.
- speaker: Interviewer
  text: Yeah. Okay. So when did you start coming to Court Day?
- speaker: Respondent
  text: 1982. I was-- I was 17 and a friend of my dad's was coming over here to set up. He was originally from here in Mount
    Sterling.
- speaker: Interviewer
  text: Huh. What was his name? Do you remember?
- speaker: Respondent
  text: John Smith.
- speaker: Interviewer
  text: John Smith. Okay.
- speaker: Respondent
  text: Easy one. Yeah. And he was like--he was like, in his 50s then, but I was building up a lot of merchandise from working
    for my dad, and he's like, "Hey, I'm going over here." He said, "I got room, you know, in my trailer if you want to take
    your stuff and go too." And I came over-- over here to Mount Sterling with him when I was 17, and I've been here every
    year since.
- speaker: Interviewer
  text: Wow. Describe for me what the Court Day was like that first Court Day.
- speaker: Respondent
  text: It was way different. I mean, it was-- I don't know, it's-- it's kind of hard to explain, you know, --to explain it.
    But it was-- everybody's super friendly. But I mean, it's still that way too.
- speaker: Respondent
  text: It's like there's not much difference, you know, there. Yeah. I don't know.
- speaker: Interviewer
  text: Where did you set up?
- speaker: Respondent
  text: Actually on Queen Street.
- speaker: Interviewer
  text: Same place you're at right now.
- speaker: Interviewer
  text: Okay. And so how long did you rent from John Smith?
- speaker: Respondent
  text: Uh, well, I just went with him for, like, two years.
- speaker: Respondent
  text: And then I just started renting my spaces right next to him and coming--
- speaker: Interviewer
  text: Yeah, doing that--
- speaker: Respondent
  text: Yeah. And we'd set up side by side.
- speaker: Interviewer
  text: Yeah. And what were you selling then?
- speaker: Respondent
  text: Oh, it could be anything. It could be from a variety of stuff all at the same time. Watches, tools, you know, the
    socket sets, the houseware stuff. It's like -- my dad would trade for, you know, just all kinds of stuff. And then I got
    to where I'd go with him when we'd be doing it. And anything he didn't trade for, you know, if it was items he didn't
    want, I did. I knew I could sell it. I would just flat out buy them, you know, from the--from the importer.
- speaker: Interviewer
  text: Yeah. So how did you find out in the sense that, like the other festivals, did you--did you go online to-- I mean--
    that was pre-internet, right?
- speaker: Interviewer
  text: .Oh, it's other vendors.
- speaker: Respondent
  text: Other vendors, you hear about it. And after hearing-- me, myself--after hearing about something so many times and
    watching the person get, you know, get excited about it.
- speaker: Respondent
  text: And it wasn't always about how much you could sell. It was just, you know, atmosphere. It was nice. You know, it's
    this. It's that.
- speaker: Respondent
  text: And like, I'd hear about something and-- like, for example, I had a friend he always talked about Shipshewana, Shipshewana,
    which is top of Indiana. And I-- what is this Shipshewana? And just listening to it and I'd want to go there.
- speaker: Respondent
  text: You know, I had to go at least once because I want to see it, you know?
- speaker: Interviewer
  text: Yeah. Yeah. And you go there now?
- speaker: Respondent
  text: Yeah. We used to. All the time.
- speaker: Respondent
  text: And hadn't been for probably about ten years now.
- speaker: Interviewer
  text: Yeah. How many festivals do you do a year?
- speaker: Respondent
  text: We used to do 42.
- speaker: Respondent
  text: 42 out of 52 weekends.
- speaker: Respondent
  text: And then the other ten weekends, we would just fill in, like, at a flea market or something in between.
- speaker: Interviewer
  text: So this is your entire life?
- speaker: Interviewer
  text: Your entire life-um, tell me about your wife. You met your wife at Court Day, is that correct?
- speaker: Respondent
  text: Well, actually, I met her--I came up from Florida. My uncle was telling me about a sale, a big event sale they were
    doing on Fort Knox. Oh. And he wanted. No, he told me about it. And he's like, if you want to come up and do it, I'll
    help you, you know. And I said, all right. So I came up and my cousin, his son and my cousin's wife, my-- his wife was
    my wife's best friend. We met, so we met like that.
- speaker: Interviewer
  text: Okay, through mutual friends.
- speaker: Respondent
  text: Yeah. I came up for two weeks to do a two-week big tent sale on Fort Knox. And then I ended up being here four months
    straight.
- speaker: Interviewer
  text: Oh, wow. Yeah. So you got to know her a little bit. Is it true that she proposed to you on Court Day?
- speaker: Interviewer
  text: Tell me that story.
- speaker: Respondent
  text: Yeah. [laughs] She proposed to me many times. Let me tell you many times. Every time I'd be getting ready to go back
    to Florida, here, it would come again, you know? I could tell something was wrong. And she's like, "I don't want you to
    leave. Marry me, marry me, marry me."
- speaker: Respondent
  text: And actually, when we met, it was perfect, you know? Everything was perfect. I mean, we just clicked. I told her when
    I met her, she was like a female me. And she's like, "No, I'm not. No, I'm not." But she didn't understand what I meant
    then, you know.
- speaker: Interviewer
  text: Yeah. Yeah.
- speaker: Respondent
  text: But, uh, we really clicked. But I was afraid to--to kind of-- jump and do something too quick, you know?
- speaker: Interviewer
  text: Yeah. Yeah. Four months.
- speaker: Respondent
  text: Yeah. Yeah. Yeah. I just-- I want--I wanted to make sure it was more than something that was just going to last for
    a summer.
- speaker: Respondent
  text: And then--but when I went back home, you know, for the winter. And, of course, we still talked every day on the phone
    several times a day.
- speaker: Respondent
  text: And it lasted through, you know, one winter. I come back and then the second winter, and yeah, it's going to happen.
- speaker: Interviewer
  text: Is she from here or from Louisville?
- speaker: Respondent
  text: She's actually originally from Wilmington, North Carolina.
- speaker: Interviewer
  text: Oh, okay. Okay.
- speaker: Respondent
  text: Yeah. But she had done--she considers herself from Kentucky.
- speaker: Interviewer
  text: Yeah. Yeah. It takes a special person to marry someone who's life is on the road, basically. I mean, it takes a special
    person. Uh, walk me through a typical -when does your season start?
- speaker: Respondent
  text: Well, I'd say, actually, about the first of September.
- speaker: Respondent
  text: Yeah about Labor Day. That's when summertime is always slow. So it's mainly from Labor Day to Memorial Day-- is the
    busiest time.
- speaker: Interviewer
  text: That's interesting. I would think summer would be really--but it's really more-- you're hitting the fall festivals,
    right?
- speaker: Interviewer
  text: So, um, do you do a lot of in door or--they're mostly outdoor?
- speaker: Respondent
  text: Mainly all outdoor.
- speaker: Interviewer
  text: Mainly outdoor.
- speaker: Respondent
  text: I've done in door ones, but it's way too much work getting all your stuff inside and back out.
- speaker: Respondent
  text: I'd rather just be outside.
- speaker: Interviewer
  text: Yeah. So tell me about your setup a little. Tell--describe to me what you have right now. You're-- with your RV and
    all that.
- speaker: Respondent
  text: Well, what we're-- what we're selling right now is leather belts, leather wallets, gun holsters. Um, and then sometimes
    we have some miscellaneous items that we come across, like we got some toys, unicorn toys and stuff in that, but we've
    gotten most of it down pat where it all rolls on and off the trailer, so it saves us-- where it would take us three, four
    or five hours to set up or tear down, we can do it in 45 minutes to an hour.
- speaker: Interviewer
  text: Wow. So, um, how big are your tents usually? Like-just describe your Court Day tent for me.
- speaker: Respondent
  text: Yeah, we use the little pop-up ten by tens.
- speaker: Respondent
  text: And then we can put them up-whichever, you know how we can double the row and make it twenty-foot-deep or however
    long, you know, in ten-foot increments. So it gives you more options depending on where you're setting up. And they're
    a lot easier to haul.
- speaker: Interviewer
  text: Yeah. And then you set up, uh, like, I guess, would you call them, for lack of a better word, display cases or--
- speaker: Respondent
  text: Yeah, Yeah, Yeah, we have all of our, like, wallets and stuff like that in stair step displays.
- speaker: Respondent
  text: And then they're all mounted on a table, and then have all your extra stock under the table, so you can roll it on
    and off.
- speaker: Interviewer
  text: Yeah. What do you do when bad weather comes and you have wind? How do you anchor your tents on an asphalt?
- speaker: Respondent
  text: We go out there and hold on to them. [laughs] Especially when something happens, you know, it comes up quick. We have
    everything anchored down.
- speaker: Interviewer
  text: Yeah. And what do you anchor it with?
- speaker: Respondent
  text: Well, we use-- we use rebar if we're on the grass, and if it's on, like the concrete or pavement, we use seven-gallon
    plastic jugs, like water jugs. And we haul them empty, so we're not hauling a lot of extra weight. And then when we get
    to where we're going, we fill them up with water.
- speaker: Interviewer
  text: Wow. That's smart.
- speaker: Respondent
  text: Yeah. Then when we get ready to leave, we let them go, you know, drain'em.
- speaker: Interviewer
  text: Yeah. So about-- it takes about an hour to set up?
- speaker: Interviewer
  text: And about an hour to break down.
- speaker: Interviewer
  text: Yeah. And then you're on the road again.
- speaker: Interviewer
  text: So on Labor Day, which-- what's the-- what's the festival that you kick off your season with?
- speaker: Respondent
  text: Hillsville. Virginia. And it's a-- it's a big one. Just like Court Days is here. It's four-days Friday, Saturday,
    Sunday, Monday. And it draws a lot of people, like 2.5 million people.
- speaker: Respondent
  text: It's-it's so many that they're bringing them in on tour buses and stuff and unloading them.
- speaker: Interviewer
  text: Wow. Yeah. What are they celebrating? Is it like a-- is it just the town or--
- speaker: Respondent
  text: It's just the town. It don't even have a name. It don't have nothing. They have it Memorial Day and Labor Day. But
    the Labor Day one is the big one.
- speaker: Interviewer
  text: Okay. How long have you been going to that one?
- speaker: Respondent
  text: I've been going to that one since, I think, 1998.
- speaker: Interviewer
  text: Okay. So you started here in 92 or 82? In 82. Were they still trading animals here?
- speaker: Interviewer
  text: Describe how did that work? I mean--
- speaker: Respondent
  text: That I don't really know too much about. Because where I am on Queen Street.
- speaker: Respondent
  text: I'm pretty much stuck there. Okay. You know, I can only--whatever's within my sight and stuff that I know what's going
    on. I never really get to walk around.
- speaker: Respondent
  text: And we get here-we get here and get set up. And having usually-- the Thursday before-- we set up on Wednesday and
    everything. So the Thursday before, you know, we get to rest, relax, and we'll walk around. But everybody else is setting
    up then.
- speaker: Respondent
  text: You know, so you don't really get to see much.
- speaker: Interviewer
  text: Yeah. And you all sleep-tell me where you sleep when you.
- speaker: Respondent
  text: Yeah. We've got a 40-foot toy hauler, and then the first-- I think the first twenty--Yeah, the first 24 feet is living
    quarters.
- speaker: Interviewer
  text: That's so cool.
- speaker: Respondent
  text: And then it's got 16-foot of cargo on the back.
- speaker: Respondent
  text: You know--to haul the setup, to haul everything in. But yeah, we've--when I was younger, it's what I dreamed of to
    have something, you know, I've roughed it. I slept in a truck or slept in a trailer and you know.
- speaker: Respondent
  text: 'Brush my teeth and stuff with a cup of water and really roughed it and saved. And actually the first ten years--the
    first ten years I did it-- I had a rule: I never spent more than $3 a day eating. Of course, everything was cheaper then,
    but that was still like a double cheeseburger meal from McDonald''s is usually what I would have.'
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: I wouldn't spend over $3 a day eating, and then, uh--uh, I wouldn't stay in a motel.
- speaker: Respondent
  text: I'd save the motel money-- because I always looked at-- any of the money I spent--you know, I'm trying to build up.
- speaker: Respondent
  text: You know, and have a better vehicle, better
