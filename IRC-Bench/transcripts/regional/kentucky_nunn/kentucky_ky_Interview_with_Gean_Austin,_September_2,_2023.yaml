collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Gean, where are you from?
- speaker: Respondent
  text: Lynch, Kentucky.
- speaker: Interviewer
  text: And where is Lynch, located?
- speaker: Respondent
  text: Northeast, in Harlan County, Kentucky.
- speaker: Interviewer
  text: Good old Harlan County, Kentucky--home of Benham and Lynch coal camps, one International Harvester, and Lynch with
    U.S. Steel.
- speaker: Respondent
  text: Yeah, right.
- speaker: Interviewer
  text: Right. Now, Gean, where were you born?
- speaker: Respondent
  text: In Chambers County, Alabama, 1930.
- speaker: Interviewer
  text: Oh my goodness. So you are one of the miners that came from Alabama.
- speaker: Respondent
  text: Kids. I came here a kid.
- speaker: Interviewer
  text: You were a kid, weren't you?
- speaker: Respondent
  text: Twelve years old.
- speaker: Interviewer
  text: So when you came from Alabama, who was it that was coming to mine the coal? Was it your father? Your grand--
- speaker: Respondent
  text: My dad had come a year or two before and got a job here, and then he sent for the rest of the family.
- speaker: Interviewer
  text: That was quite typical in those days, wasn't it?
- speaker: Respondent
  text: Right, right.
- speaker: Interviewer
  text: What town in Alabama did you come from?
- speaker: Respondent
  text: Well, sharecropping.
- speaker: Interviewer
  text: Sharecropping in Alabama.
- speaker: Interviewer
  text: Did you know when--or did your father know when he came other miners from Alabama?
- speaker: Respondent
  text: Well, the word was getting around, and they was recruiting people from different parts of the South to come here to
    work, and looking--they were looking for people.
- speaker: Interviewer
  text: And here we came.
- speaker: Interviewer
  text: Here we came. So you were about twelve years old when you arrived?
- speaker: Interviewer
  text: When you arrived, where were--where did you go to school?
- speaker: Respondent
  text: At West Main--well, then it was called Lynch Colored Public School, in Lynch, Kentucky, owned by U.S. Steel.
- speaker: Interviewer
  text: And was that grades one through twelve?
- speaker: Respondent
  text: Right, yes, yeah.
- speaker: Respondent
  text: Why -----(??), how different things was.
- speaker: Respondent
  text: During the thirties, as well as--I guess it started in the twenties and thirties and the forties, when--see, U.S.
    Steel would set these mines up, and they would build--they started building Lynch in 1917. They built the town, the mine,
    and everything. They set the whole thing up. And they went out and recruited people to work there. And most of these mines
    by these big companies was--was run by unions, too, and to have everything work good and get along, they had--they built
    set of houses for the white, Black, all, but all the houses was the same.
- speaker: Interviewer
  text: Were the houses for Blacks and whites all the same?
- speaker: Respondent
  text: Yeah. They built schools, a brick building for the white, a brick building for the Black school. They went out and
    hired they own teachers, they everybody. The pay scale in the mine was the same for everybody, and they--union preached
    harmony, and the company preached harmony. To mine the coal, everybody had to get along, to live in the town. So it was
    a good place to live and work, because there wasn't any problem. (laughs)
- speaker: Interviewer
  text: Did you feel like you felt any racism at all? Because I've heard mixed stories on that.
- speaker: Respondent
  text: Well, it all depends what you wanted to do. They white had their country club, swimming pool, golf course, which the
    Black didn't play golf, so it wasn't any problem. We had our own school, gym. We could get bands in. Baseball park, played
    baseball. The things we wanted to do, we had areas to do that, so it wasn't any problem there. (both laugh)
- speaker: Interviewer
  text: 'So basically, you had--you--actually, I guess, it''s almost true, you could say: Black was--and white were separate,
    but would you consider them equal in--'
- speaker: Respondent
  text: Right, right. All but the bosses. The big bosses, you know, they was a little--they was getting paid better than everybody
    else, absolutely (??). (laughter)
- speaker: Interviewer
  text: For sure, for sure.
- speaker: Respondent
  text: And, see, the other thing is half of the white that was brought there was brought in from Europe, Hungarians, the
    Polacks and all, and they had to go through the same thing that the Blacks, you know--'cause they wasn't accepted, either.
    (laughs)
- speaker: Interviewer
  text: Was there any discrimination for these Eastern European countries, in terms of going to movies at the Novo, or going
    to movies, or--
- speaker: Respondent
  text: They sat with the white, went to school, the white--they all were together, but the only real problem was in the neighborhood
    they didn't associate with the white that much, you know, so they would associate with us more than they did with them.
- speaker: Interviewer
  text: The, uh--When it came to--let's say that you were living in one of the camps, one of the sections, and it's my understanding
    that in Lynch, as well as Benham, that once you were in a particular area, you might be able to move around if a house
    became available--
- speaker: Interviewer
  text: But that you became a community within that particular segment of the camp.
- speaker: Respondent
  text: Yes, right.
- speaker: Interviewer
  text: At that point, did you have mixtures of Black, white, Eastern European, or were those separated?
- speaker: Respondent
  text: Well, the kids part--I can tell you more about the kids.
- speaker: Interviewer
  text: Yes, that's fine.
- speaker: Respondent
  text: See, we lived in, call them, camps. There was a camp here, mixed, and the camp there was mixed, and the camp different
    places. If you went out of your camp to the theater or to the ballpark, you know, some other area, the way it was set
    up, everybody in that camp, white or Black, they all were together, because that was--they all would protect you from
    the other camp. (both laugh)
- speaker: Interviewer
  text: So if you lived within a camp, it didn't matter what your race was, or your color, or--
- speaker: Interviewer
  text: What country you were coming from, you went together because you were really more concerned against the other camp.
- speaker: Respondent
  text: Yes, right.
- speaker: Interviewer
  text: That is very interesting.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: Yes. So no matter what the situation was, whoever lived in your camp was part of that community.
- speaker: Respondent
  text: Yeah, right. We had to protect each other.
- speaker: Interviewer
  text: Did you find that if there was any disciplining done that basically the whole community was involved, in the sense
    that if one mother saw something and called your--or didn't call, just sent the word to your parents--
- speaker: Interviewer
  text: That everybody--the grownups ruled when it came to--
- speaker: Respondent
  text: Yeah. Well, yes, that was a--you know, I tell a lot of people that--I tell it in a joking way, about this Bill Crosby
    [Cosby] thing in Hollywood, you know, and all them people. I said, when I first came to Lynch in 1943, and moved into
    the--one of those camps, that's the first thing the people in the community would tell us, "Whatever happened in that
    camp stayed in that camp," white or Black, -----------(??).
- speaker: Interviewer
  text: That's very interesting. So it wasn't--it wasn't based on your origins; it was based on the fact that you lived in
    a particular camp, and--well, now, when you moved from one camp to another, did your allegiance change? What--
- speaker: Respondent
  text: Yeah right.
- speaker: Respondent
  text: (laughs) Right.
- speaker: Interviewer
  text: So then all of a sudden you were protecting against maybe your old friends.
- speaker: Interviewer
  text: That's very interesting.
- speaker: Respondent
  text: And by us being kids, the biggest problem was each camp playing sports, you know, neighborhood sport, and going--you
    know, going to girls, going with girls was a problem.
- speaker: Interviewer
  text: You did not cross lines.
- speaker: Respondent
  text: Well, you did, but you did it in a protection way. (Curris laughs) If we went to Benham to see the Benham girls, there
    would be ten or twelve of us boys went together, and we would meet after we see the girls. You had to leave at eight,
    nine o'clock to get out from there. (laughs) But we'd meet at a certain area, and all of us come back together. And sometime
    you have to fight, and sometime you have to run. It all depends. (laughs)
- speaker: Interviewer
  text: I remember that there was very little dating between Benham and Lynch and Benham and Cumberland. There was a little
    more dating with Cumberland.
- speaker: Interviewer
  text: But that just wasn't part of what--you didn't cross out of your community very often.
- speaker: Respondent
  text: No, you didn't. But, see, I--I was a little different in my--when I was a senior in high school, I took a girl from
    Benham to my senior prom.
- speaker: Interviewer
  text: That was a shocker, I'm sure. (laughs)
- speaker: Respondent
  text: And that was because--excuse me--me and my girlfriend in Lynch had fell out, and I was going to show her. (both laugh)
    And then, later on, five years later, I married a girl from Benham. My first wife was from Benham.
- speaker: Interviewer
  text: Really? And was there very much race--marriage between the towns?
- speaker: Respondent
  text: Right, it--it soon after that, it did--it got to be accepted, you know--
- speaker: Respondent
  text: Among the white--more among the Blacks than it was the white.
- speaker: Interviewer
  text: Oh, now that's interesting.
- speaker: Interviewer
  text: So those cross-community things happened more quickly.
- speaker: Respondent
  text: '''Cause, see, a lot of us Blacks--like, if your family came from Alabama up there, Tennessee, and there were two
    or three brothers, maybe both, all of your brothers didn''t get a job. Maybe one or two of them would get one with International
    Harvester in Benham, but you still was a family, see. So, undercover, you had to still get along.'
- speaker: Interviewer
  text: Well, that make--I see what you're saying. I had never, until you said this, even thought about that possibility.
- speaker: Interviewer
  text: So let's say you have a family from Alabama that's coming up with two or three brothers. Two brothers work at Lynch.
- speaker: Interviewer
  text: One brother works in Benham, which means their housing is going to be two in Lynch, one in Benham. But because it's
    family, it gave you the ability to go back and forth.
- speaker: Respondent
  text: Well, what we would do--see, Lynch wasn't as bad as Benham. See, the Benham police didn't allow the Lynch people in
    Benham, to the stores and the movies, that much anyway. But, see, there was a--Cumberland was right there, and you could
    catch the bus and go to Cumberland, and the little malls and stores and things. You could sit down there and socialize,
    so it was--it was neutral, see, and nobody could say anything to you.
- speaker: Interviewer
  text: That's interesting. So when--so when you would have these circumstances, you would go to Cumberland.
- speaker: Interviewer
  text: Where would you go in Cumberland?
- speaker: Respondent
  text: We had clubs and boarding houses, they called them then, you know, places that--and the churches--that you could meet.
- speaker: Interviewer
  text: Well, now, we were talking about earlier--Slim and I were talking about the Corlee Theatre and the Novo Theatre.
- speaker: Respondent
  text: Well, the Novo Theatre didn't accept--early, it didn't accept Blacks, you couldn't go there, but the Corlee, you could
    go there--that was in Cumberland--but you had to sit upstairs. The theater in Lynch, you could go there, but you--you
    know, the Blacks sit upstairs and the whites sit downstairs.
- speaker: Interviewer
  text: So in Lynch you were also sitting upstairs.
- speaker: Respondent
  text: Yeah, right.
- speaker: Interviewer
  text: Did any of that change before integration?
- speaker: Respondent
  text: Yeah, uh-huh.
- speaker: Interviewer
  text: Well, that's a step forward.
- speaker: Respondent
  text: Well, you know, you could do different and nobody ever said anything to you, like--just like the city buses running
    from Lynch to Cumberland. Ordinarily, in the South, the Black had to sit in the back, and the whites sit in the front.
    If you got on that bus, you paid ten cent to ride to Cumberland, you got on the bus and sit on the first seat, nobody
    said anything to you.
- speaker: Interviewer
  text: So there was just no problem there.
- speaker: Interviewer
  text: Um-hm. See, I didn't remember any problem.
- speaker: Respondent
  text: Yeah, there wasn't no problem. See, everybody, they worked together, got along together. They, you know, drink together,
    party together. And, most of all, see, the union was one big union, and it was mixed. They was part white and part Black,
    and the Black had officers in there that had to deal with the white, and they all, you know--so it was a lot of getting
    along.
- speaker: Interviewer
  text: When you compare the communities that we're talking about--
- speaker: Interviewer
  text: With today, there may be more openness in some ways, but, as I've listened to various people talk now--I've done I
    think probably, like, twelve, thirteen interviews, all total, including your all's--it seems as if there was a greater
    sense of community back in the days that we were here--
- speaker: Respondent
  text: It was. And I'll tell you why. Nowadays, money--to everybody living, nowadays money is the most important thing in
    our life. Back then, family was the most important thing.
- speaker: Interviewer
  text: Wow. Survival.
- speaker: Respondent
  text: 'You wanted--see, I have--by two marriages, I had eight kids--well, seven kids--by two wives. I worked in the mine
    thirty-five years. I sent seven kids to college. Four of them graduated and three didn''t, but I told them like this:
    I said, "You were better than me, because I never had the opportunity to go. I wanted to go, but you had a chance to go
    to college and make it good, and you didn''t make it. That wasn''t my fault."'
- speaker: Interviewer
  text: You gave them the opportunity.
- speaker: Interviewer
  text: Well, now, this is interesting. When you talk about four graduated from college--
- speaker: Interviewer
  text: What were--what did they major in?
- speaker: Respondent
  text: One of my sons is a doctor, and his wife is a doctor, by my first marriage. My other son was going to be a teacher.
    He graduated from Richmond, you know, East Tennessee State.
- speaker: Respondent
  text: My oldest--my other boy's a doctor. He graduated from University of Kentucky, and got a medical degree at Louisville,
    and he's up in the biggest doctor's office in Fort Wayne, Indiana now, him and his wife both. They both doctors. And two
    of his kids are going to Hampton right now to be doctors.
- speaker: Interviewer
  text: You're leaving a beautiful legacy, a wonderful legacy, Gean.
