collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself.
- speaker: Respondent
  text: (laughs) Well, I would be happy to do that. I feel incredibly fortunate to have the life that I have. And to have
    the, the family legacy with our parents and grandparents and the life we have gotten to live and are continuing to get
    to live. I feel incredibly fortunate. I was talking with my son, one of my sons, yesterday about--life and realizing how
    incredibly fortunate we are to get to do something that is positive and joyful and makes connections. And I think the
    power of music in its, in its ability to help create, a community, is important and kind of needed--it now, but at all
    times in life. And I feel lucky to have gotten to be involved in that type of, type of life. Incredibly lucky.
- speaker: Interviewer
  text: So music obviously is very meaningful to you. So to take somebody off of the street and like myself, who--I didn't
    grow up in Kentucky, I did not grow up on bluegrass music. I was the generation that at age 11 or 12, saw MTV for the
    first time, you know, and so I grew up totally on pop music and had no awareness of, of of bluegrass music whatsoever.
    Describe for me the McLain Family Band.
- speaker: Respondent
  text: (laughs) As far as the type of music we play, you mean?
- speaker: Interviewer
  text: Um-hm. Yeah.
- speaker: Respondent
  text: That actually is, is--is one of the things that, I think is unique about the McLain Family Band is this style of music
    because, yes, we play bluegrass music and yes, we know the history and understand and appreciate and respect the, the
    history of bluegrass music and what it is. We also have the advantage of our father's musical background and our grandparents
    musical background. And because our father was a--was a music theory major at Denison University. And then he did, graduate
    work in Harvard, in composition. And he said one of the instructors criticized his compositions, saying that it sounded
    too much like folk music. And he was thinking. (McLain and Boyd laugh) Hmm, and what's wrong with that? And and he understood
    because he has this background in music theory and composition, but he also has a background in folklore with his mother's,
    our grandmother, Bicky's, background in folk dance and folk song and international music, folk music. And so he went to
    the University of North Carolina at Chapel Hill and studied folklore (laughs) and did graduate work in folklore. (laughs)
    And then, after a time, in San Antonio, in, in the Army, he went--moved to eastern Kentucky and that's where the our Hindman,
    Kentucky and Settlement School, connection really started. Our mother as recreation director and our father there as recreation
    director, and then as executive director of the Hindman Settlement School where we grew up. And so this musical influence
    that he could have done anything as we were growing up. But what the music that he shared with us was vast. It was everything.
    He, he played, ragtime piano. He played harpsichord, he played recorders. In high school. He had written recorder quartets
    that were published in--when he was a high school student. And, and he played for folk dancing, for country dancing. And
    he had, his, his record collection that we listened to included the Beatles, Three Dog Night, Bach, Beethoven, Joplin.
    It was just it was, Burl Ives. It was, music from different cultures and from different continents. And because his mother
    was an international folklorist, our grandmother Bicky. And so sh--he had all these influences. And so we had the advantage
    of all of that input as we were growing up. But the music that we played was the music from the region. And I think he
    probably did that with intention. Because if we were going to play music, it was brilliant to play music that other people
    in the region play. And so you can have buddies.
- speaker: Respondent
  text: And what a wonderful thing that in--with music. It, it involves people, you know, it's the connection with people.
    And so he appreciated all of these different musical cultures. And I think that's one of the advantages that the McLain
    Family Band had. We played bluegrass music, but we also have--and we also have all these other influences. And that's
    one reason that it was unique and original. And Bill Monroe was such our friend.
- speaker: Respondent
  text: He loved what we did. We had original songs. We had influences that--with harmonies that that our father knew and,
    and could input, like in Kentucky Wind. Not just exactly a traditional, triad harmony. It had some other elements.
- speaker: Respondent
  text: Because of his influences, I think that was a big advantage. Was our father's respect for all kinds of music. And
    then our immersion in and growing up in the mountain music of the region.
- speaker: Interviewer
  text: We mentioned my connection to Denison University.
- speaker: Interviewer
  text: And, but, you know, my PhD is in folklore, too.
- speaker: Interviewer
  text: And so I had this sort of like, you know, exploring that, you know, I'm--I've become this great fan of your father's
    because it just, just--I think listening to, to, you know, how you all have grown up through, through Raymond's eyes and
    such. But I do feel connected. I also feel like this is a person who, if you all had landed in South America, you would
    have done the same thing. You would--he would have picked up and figured out the local music and, and, you know, connected,
    in the--with the community that way. But it's also really wonderful because I think about when you say that about all
    the influences, which is absolutely correct. You know, bluegrass music is seen as like this thing that like, I know there's
    a tension in bluegrass where like, you know, you don't want to stray too far from the rules. You know, that that there's
    a, you know, and, and so innovation really tends to stand out, like when you guys do something a little bit different.
    But that's what Bill Monroe did in the first place.
- speaker: Respondent
  text: Exactly. Bill Monroe was a very creative person. Bill Monroe brought influences that were in his life and played music
    very naturally from music of his influences, and he appreciates creativity. I think his--the, the feel that people have
    continued, saying and feeling about Bill Monroe putting bluegrass music in a box. You know, it has to be this way--
- speaker: Respondent
  text: --isn't exactly how he was. I had lots of conversations with him about music and about his music, his band and creation
    of the music and our band. And he loved what we did, and he was such a friend. And sometimes, sometimes at festivals in
    the early 70s, we would go walking because everybody wanted to talk to Bill, of course, and he wasn't always comfortable
    talking with people. And, although he knew it was important, and sometimes he--we would be standing at a festival and,
    and he would kind of cocked his head like this. And so we'd go walking and we'd go walking in through the parking lot
    or behind the grandstand or whatever, wherever it was. And I think--and we would talk about music and we would talk about
    his animals. (laughs) And talk about his farm, and we would talk about life. And I think he was comfortable with me because,
    partly because I was too young to be a love interest. (laughs) You know, it wasn't, it wasn't--
- speaker: Respondent
  text: --that it also--it could be completely comfortable.
- speaker: Respondent
  text: And, and I--it was non-threatening. I wasn't trying to get anything or, you know, and what I--we were just friends.
    And so I think he told me things that weren't part of what he would say in an interview or say to other people, because
    we were just comfortable and sometimes we wouldn't say anything and we'd just walk. And he loved, loved it. But he loved
    that we were creative and loved that other bands were creative. Just like he was. His mother played accordion, his mother
    sang ballads. He he had, you know, people know about Uncle Pen and the and the fiddle and Arnold Schultz and the guitar
    and the blues influence and the gospel music influence that he had in creating the music that he was playing--part of
    that was his mother also, even though she died when he was young, he remembers.
- speaker: Respondent
  text: And that was influential. And our father at that point was playing accordion on a few songs, too--
- speaker: Respondent
  text: --and, and he thought that was just the coolest. He loved it.
- speaker: Respondent
  text: He loved it.
- speaker: Interviewer
  text: Yeah. You mean during performances?
- speaker: Respondent
  text: Yeah, yeah. We did several things that Daddy played accordion on. We did a few things sometimes that he played recorder
    on.
- speaker: Interviewer
  text: Oh no kidding.
- speaker: Respondent
  text: We played a Bach Brandenburg concerto (laughs) movement. (laughs) And we did different things.
- speaker: Respondent
  text: And he loved it. And we--and one time at his festival in, Jackson, Kentucky, in the early 70s, we had a television
    show on the Hazard television station. And so we were doing promotion. And so we asked if he wanted to come and he said,
    "Oh, yes." And so he was going to come be our guest on the Hazard TV show. And at that point it was--there was only a
    transmitter building, and he had to wind up the gravel road to get to the transmitter building that had a little studio,
    with a camera up on little, stairs and portable stairs propped up there. And Chuck would come and set the camera and then
    go back in to this--because it was just one person, you know, and he would go back in and set the--have the camera turned
    on. (Boyd laughs) And and so he would motion to us when it was time to play. But but Bill brought his band up.
- speaker: Respondent
  text: And so Chuck came in and interviewed and said, "Do you call what they do bluegrass?" Or said to Daddy, "Do you call
    what you play bluegrass?" And Bill Monroe was standing right there. And so, you know, Daddy said, "Well--" And he paused
    a little bit and Bill said, "I call it bluegrass. They better call it bluegrass." (laughs)
- speaker: Interviewer
  text: That's amazing. What a great moment.
- speaker: Respondent
  text: So he, he was very open to creativity.
- speaker: Respondent
  text: Within, within these--he didn't particularly want drums and electric instruments--
- speaker: Respondent
  text: --at that point, although he can play electric guitar. (laughs)
- speaker: Interviewer
  text: Nobody talks about that.
- speaker: Respondent
  text: Yes, he can--he could. And he likes all kinds of music.
- speaker: Respondent
  text: But at his festivals. It--you know, at that point it wasn't, it wasn't an electric bass and drums--
- speaker: Respondent
  text: --much. And then the Osborne Brothers did such a good job with it. (laughs)
- speaker: Interviewer
  text: Yeah. Yeah.
- speaker: Respondent
  text: And and so, you know, festivals changed
- speaker: Respondent
  text: But Bill was more open to, to influence other influences in the music than he gets credited with.
- speaker: Interviewer
  text: I know we're talking about answering the question, you know, describe the McLain Family Band, musically. But I do
    want to take a pause and just appreciate the moment of the fact that you have had these experiences with Bill Monroe,
    you know, that, that he would go for walks and he would talk to you and you would talk about things that were deeply personal.
    You know, that's so special that you have had that experience.
- speaker: Respondent
  text: Well, I realize it now. It just seemed normal at the time.
- speaker: Respondent
  text: It was just normal. I, I he wasn't on a pedestal for me at that point. It was a respect, you know, of course, respectful.
- speaker: Respondent
  text: But it was just normal. We grew up at a time and were playing at festivals at a time when the originals were there
    and still performing, and they were our friends. We were at festivals and traveling so much that those were our best friends.
    The musicians and the--their, their band members, they were our best friends.
- speaker: Interviewer
  text: That's amazing. We're going to circle back around to a lot of these
