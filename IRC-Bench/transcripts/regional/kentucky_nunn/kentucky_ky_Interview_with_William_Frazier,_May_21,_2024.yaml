collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Would you like to introduce yourself and tell me a little bit about yourself?
- speaker: Respondent
  text: Okay. I go by the name of Bill Frazier. The official name is William Lee Frazier. I've been in Daniel Boone since
    '83, and I was president in '91 and '92. I am from Barbourville, Kentucky, and officially with Daniel Boone. I worked
    with the Indians for most of the years. I'm a second generation. My father was the fourth president the year I was born,
    which is coincidental. He started maybe somebody in front of him, I don't know who or how, but my father started the Indians
    and we had one person in between and me. So basically the Fraziers have taken care of the Indians.
- speaker: Interviewer
  text: Wow. So multi, multi generational involvement with the festival. So you told me a little bit about how you got involved
    with the festival.
- speaker: Respondent
  text: Well, I was in the Jaycees and they had an age limit, and a bunch of us were at it or getting or slightly over. We
    got talking about we need to do something, have a dinner about once a year, meet about every month and do some kind of
    a project. I mentioned Daniel Boone and they said go check it out. So I went and checked it out, and they put me in that
    year as vice president. I came back and told the older Jaycees what I found, and I brought over roughly twelve Jaycees.
    The Daniel Boone membership at the time we came was only eight. Technically the Jaycees that I brought improved, changed,
    and got the Daniel Boone Festival back on its feet. The year I joined, they were talking about selling the rights to the
    name of Daniel Boone to two other counties and Daniel Boone, or Barbourville, trading it out every year. We had enough
    workers at that time to save it. We hired a deer from a carnival and started getting a little money. When we joined, they
    were basically broke. I'm not taking credit for doing it all because those others did their share of work.
- speaker: Interviewer
  text: Just for the recording, what does the Jaycee stand for?
- speaker: Respondent
  text: Junior Chamber of Commerce.
- speaker: Respondent
  text: We had to quit, I want to say about age of thirty-five or forty. We basically did the same thing as Daniel Boone,
    but Daniel Boone has a dinner in February and meeting. We do our big event in October, first full week, and then we meet
    once a month except for January and December and January. Let's say that group saved Daniel Boone, in my opinion, Festival.
- speaker: Interviewer
  text: The commitment of that group I'm hearing it's been really important and integral to the festival.
- speaker: Interviewer
  text: How has the festival shaped who you are?
- speaker: Respondent
  text: I'm in charge of the Indians since about my third year there. Mr. Sellards, Ed Sellers was in charge of it and he
    only brought six Indians and had a very small budget, and he couldn't do much. He just said to me, I'm just tired of it
    and are you willing to take it over? Because I expressed past experience with them, with my father, I took it over. I
    went to about four groups before I came up with Rick Bird. Rick's been with us a good 25 years, if not more.
- speaker: Interviewer
  text: Because the first time he was involved was probably in 1964 or something like that? A solid 25 years, probably, consistently,
    right?
- speaker: Respondent
  text: He started coming about '96, '97. He took off a year or two years in there, and I went through other groups and didn't
    work out. Somehow I went over there and Rick said he'd like to come back. He came when he was about eight or nine years
    old. I was in that festival which was quite older. Under the Welches they came for about twenty, twenty-five years. Through
    my father and other people, my father was president in the fourth Daniel Boone and he used to have a bus and he hired
    a person to drive locally and go up different directions. There were about four buses that went out of Barbourville, and
    he would take that bus and go get a group of Indians and take them back. Daniel Boone at that time paid the motel room
    and everything. Now I just pay them per person for the time they're here. I've had as many as fifteen different Indian
    nations represented. One time I went to Texas and I stopped in Oklahoma, made arrangements for the Eastern Band, President
    of the nation, and there's two in Oklahoma. I got all three to sign one treaty of the Daniel Boone, where we promised
    them cane, and they come here and do Indian representation. It grew from there.
- speaker: Interviewer
  text: You mentioned that was like a one time trip. Do you remember the whereabouts of where and when that might have been?
- speaker: Respondent
  text: Yeah, that was right at 15 years ago, I did that.
- speaker: Respondent
  text: They got a copy, each chief got a copy and we have one here I have. To my knowledge, that is the only official treaty
    that all three nations signed. As Rick Bird says, it's the only treaty that the white man has never broken throughout
    the years.
- speaker: Interviewer
  text: Does it bring you a lot of pride to be a part of that?
- speaker: Respondent
  text: Yeah. I got to know the two Eastern Band real good or fairly good. Chief Michell, I know him real good. A month ago,
    we went over to talk to him, and there is a possibility he'll come here. Most of the time, our event and their big event
    is the same weekend, but this year it's not. I'm hoping he'll be back. He's been here a couple of times and of course
    Rick represented some too.
- speaker: Interviewer
  text: So in different years you've had different numbers of people come in all the way from as far as Oklahoma?
- speaker: Respondent
  text: Well, most of them are out in the south and north and some of them were western. I don't know why, but I hired a group
    and it was multi-nation.
- speaker: Interviewer
  text: Wow. While we're on the topic of the Cherokee people, could you tell me about the role of the Cherokee people in this
    festival in particular? Tell me more about the River Cane Treaty and how they harvest.
- speaker: Respondent
  text: I think he was a doctor, a PhD doctor from the college. Karl Bleyl was going through Cherokee, and he noticed how
    bad off they were. Indians are famous for making baskets and everything, but they didn't have any river cane because at
    that time period it was the real demand for cane. Went to wicker furniture and it was very popular, and they went out
    and cut all their cane. Therefore they couldn't make baskets. Around here, especially around the river banks, we've got
    cane that just tries to take over the field. When Daniel Boone came through, even, it was hard for him to get through
    the cane. It was so thick and big, but he promised him that he would take them cane. Now they come over here to make baskets
    with, and that helped them financially quite a bit.
- speaker: Interviewer
  text: Do you feel like the places where the cane is collected from has changed over time within Knox County? Has it primarily
    been from more or less the same spot and how they...
- speaker: Respondent
  text: Yeah, it grows mostly around the Cumberland River and some of the creeks that are tributaries of the river. But it
    is just a nuisance to farmers because it will spread by the roots. I think it does bloom, but it basically is from the
    roots. Much maturity on it; the way they tell me is about 12 years and then it dies, but other cane comes up. I've taken
    them to three different locations and rotate them because if you thin it out, it gets the limbs on it growing. If you
    let it stay tight, it loses its limbs. That's what they want when they peel the outside of the cane to make the basket
    look different. Rick Bird also gets a large bundle of cane and he makes blowguns out of it and bows and arrows. Indians
    plus other nations developed blowguns. That's what they really hunted with was a blowgun.
- speaker: Interviewer
  text: So just a lot of different uses that were able to provide for them through making the river cane available in this
    treaty. Could you tell me a little bit about how the river has shaped your life in terms of living in Knox County your
    whole life and what the Cumberland River has meant to you?
- speaker: Respondent
  text: The only thing—I don't fish, and a lot of people in the early days swam in it different places. Before we had our
    local flood wall, water came and flooded. Around here, the creeks and stuff, because the rivers are up and not emptying
    very well, it backs up into the tributaries. That's called backwater. It affects a lot of people or nothing else, strands
    them and they can't leave for a few days. Most people are happy with it. One area close when it flooded, it brought mud
    into people's houses, and as they cleaned, all the neighbors would clean one house with the mud out and they just walked
    down the street as the water went down and cleaned everybody's house. Then we built a floodwall. Pineville, Kentucky,
    upriver from us, their floodwall broke and flooded downtown during '77. That basically saved Barbourville from being destroyed.
    At the same time, our floodwall had ups and downs, and it was sandbagged up to five sandbags high. People worked with
    it and saved Barbourville technically. Pineville people lost a whole lot. The Cumberland River here goes to Nashville
    Tennessee, south, then heads back north and empties into the Ohio River. A lot of people don't know that in western Kentucky.
    The floods that Nashville has come from here.
- speaker: Interviewer
  text: You drove me around some of the backwater regions around Flat Lick?
- speaker: Respondent
  text: Flat Licks. The Cumberland River starts at Harlan above Harlan, Kentucky, and comes through Harlan, Pineville, Barbourville,
    Williamsburg and beyond. It affects people quite often. When big rains come, especially in Harlan, one year it rained
    twelve inches in twenty-four to thirty-six hours, and that was '77 and caused problems for everybody. When they originally
    built the floodwall, my father was hired to put what's called field rock over the backside of the floodwall. They didn't
    use what they do now, the large clumps of limestone. One guy placed all of the stones on the back side of the floodwall
    for protection.
- speaker: Interviewer
  text: Wow. That's a lot of work and a lot of the community coming together.
- speaker: Respondent
  text: Yeah. The Army Corps of Engineers is responsible for construction and everything.
- speaker: Interviewer
  text: I remember when you were driving me around the Flat Lick area there was the Boone Trace.
- speaker: Respondent
  text: Boone Trace and the Wilderness Road intersection. You're going to have Steve Valentine come in. Him and two others,
    Mike Mills and another guy, put signs up along the Boone Trace. There is a group called something of the Boone Trace.
    I don't know their first name. That's somebody I would recommend you talk to too. Valentine can give you that information.
- speaker: Interviewer
  text: What does the festival mean to the community in your own words?
- speaker: Respondent
  text: Homecoming. Just simple as that. It's our big event. We had the May Festival years ago and it died. The past two years
    we've been trying to bring it back. The May Festival technically joined with the Daniel Boone and the Junior Study Club
    does the Queen's and Princess things. It's almost homecoming. There are probably three or four class reunions of the county
    school and the city school during that time period.
- speaker: Interviewer
  text: So this is a moment where multi generational families have come together and you probably have a lot of people coming
    in from outside of the county too. Right?
- speaker: Respondent
  text: Basically, the people around here in the fifties, after the Second World War, were making a lot of commercial things
    to sell, especially cars. We had a large group of ex-veterans and that age group up until about '70 went to Detroit and
    other large towns to build cars. They come home especially for the Daniel Boone and other holidays. It's homecoming for
    the county.
- speaker: Interviewer
  text: It seems like it was really reflecting the times when the automobile was surging post World War II and American identity
    forming. What are some different elements of the festival? I know there are booths and crafts. What do you think is the
    most important part of those different elements?
- speaker: Respondent
  text: The biggest thing that anybody really does is the Court Square where you meet people you haven't seen for a year or
    ten years. That's just where you walk around.
