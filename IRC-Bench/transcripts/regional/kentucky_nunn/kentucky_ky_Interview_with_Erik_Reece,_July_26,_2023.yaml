- speaker: Respondent
  text: I mean, you know, again, it's like you sort of find yourself in these odd situations, and it's like, I was in Robinson
    Forest just trying to get students excited about nature writing. I mean, I knew the strip mine was going on all around
    us. But I, I had never really sat down and thought, you know, I'm going to solve this problem. Um, you know, but when
    I had my students down there, um, you know, I wanted them to have these Thoreauvian, you know, what E.O. Wilson called
    the naturalist trance, those kinds of experiences. Um, and they were, but they were also just preoccupied with, you know--(laughs)--hearing
    blasting all day long. And so, you know, we all started writing about the strip mining and I started writing about it.
    Yeah, so, yeah. It's just one of those again, it's one of those things that just, you know, when something like that doesn't
    let go of you, it's probably a good sign you should focus your energy there.
- speaker: Interviewer
  text: Yeah, and you had mentioned you spent a lot of time outdoors with your granddad. Is that, I mean--tell me about where
    your passion comes from for doing this.
- speaker: Respondent
  text: (Clears throat)--there was a guy, um, who was part of our, part of our writerly crowd. Um, I don't know his name now.
    Um, anyway, it doesn't matter. Uh, he used to say he used to work with, with violent men. Um, and, you know, his thing
    was, you know, there are people who will destroy what they love, you know, but most people won't. You know, most people,
    if they love something, they won't destroy it. I mean, there are sociopathic people who will. You know, I mean, there's
    the Donald Trumps of the world. Um, and so, um, I think for me, I was trying to like--I really wanted to just--I wasn't
    a mining engineer, I wasn't a lawyer, I wasn't a hydrologist, I wasn't a sociologist, I wasn't any of these things that
    you're supposed to be to write about Appalachia. Um, the one thing I thought I had going for me was, I was a decent storyteller.
    I could like observe something and describe it. And so, you know, I started taking these long walks, just through Eastern
    Kentucky and just lots of places. And I just felt like, you know, if I can use--if I can parlay that--and, I started teaching
    a class called Nature Writing, and now I teach a class called Environmental Writing, and I think that's kind of the shift.
    You go from this Thoreauvian, isn't nature great, kind of writing to now that we know it's great, what do we do to preserve
    it? Uh, and so that's, that was the kind of trajectory that I followed. I never, like I said, I never started as an activist.
    Um, it was just, it was just this more sort of intuitive--my grandfather--I'll back up a second--my grandfather was a
    fundamentalist preacher, you know. And, you know, he believed that this world was falling and we're going to a better
    place. And it was weird, that just never made any sense to me. You know, I felt like all of it--all of the time we spend
    in the natural world, to me, was giving me a sense of, you know, uh, you know, this is what Jesus called in the Gospels,
    the Kingdom of God. You know, the Kingdom of God is before you. Um, and so, that kind of became my theology. Like, the
    Kingdom of God is before you, so let's do something to, you know, protect it. Um, and it was funny, because when you go
    to coal rallies, it's the religious argument that really rattles the opposition. You know, they can deal with a lot of
    other arguments, but once you start bringing up the Kingdom of God and the creation, you know, that, that, that--(laughs)--really
    seems to get them, get them going.
