- speaker: Interviewer
  text: Well, I'd like to start with a biography first. So, tell me a little bit about yourself.
- speaker: Respondent
  text: Um, I was born in, um, Virginia. I grew up in Louisville. I, uh, had a grandfather who was a country preacher in Tidewater,
    Virginia. Um, he and I spent a lot of time outside in the woods on the water in a canoe. Um, I bought a canoe from one
    of his fishing buddies when I was in grad school. Um, and so, that's--I think that's kind of where--my family in Louisville,
    we were very urban, suburban existence. There was never a whole lot of camping or anything like that, but I think I got
    that pull to the natural world from my grandfather. Uh, more?--(laughs)--
- speaker: Respondent
  text: --okay--(both laugh)--uh, let's see. I, um, I studied with Guy Davenport at the University of Kentucky. He was my
    main mentor here. And, um, just learned a whole lot about writing, particularly on the sentence level from him. Just how
    to really shape a sentence. How to, you know, really think about that. Uh, and he, he smoked three packs of Marlboros
    a day. He died of lung cancer. His body was left to the Markey Cancer Center, and we dedicated a tree to him at the Arboretum.
    And that's where I met Wendell Berry, and so, the day I buried one mentor, I got another one, strangely. Um, and I had
    just written Death of a Mountain for Harper's and Wendell had read it. And he was starting to put together at that time,
    um, a little tour for writers to get in planes and fly over the coal fields and have a look from above and just talk to
    people on the ground, talk to people who'd been affected. Um, kind of a reinvention of the John Dos Passos poverty tours
    from the thirties. And so, we did that and it was real effective. Um, we, we, we did a lot of writing about it. We really
    put the coal industry on their heels. Um, I don't think they saw it coming. Um, they started pouring millions of dollars
    into pushback against us. We were writing a lot of op-eds. Um, you know, and, you know, um, we, uh, we just talked to
    a lot of people, um, and were sort of just trying to be conduits for other people's stories, not trying to appropriate
    anybody's story, but, you know, just be a conduit. Um, and, yeah, it was pretty effective. Um, I think we really called
    a lot of attention to mount top removal. Um, the response from the coal industry was really funny. They just kept calling
    us emotional. You know, uh, I don't know if they were trying to emasculate us or, you know, whatever it was. Um, so we
    were like well--(laughs)--is it a bad thing to be emotional when somebody's pulling the top of a mountain off? So, um,
    that's how I met Wendell and Teri Blanton and Dave Cooper and all these great people that were involved in the fight,
    and I've never been an activist really of any kind. Um, I call what I do activism sitting on my ass. Um, I just, you know,
    I write about it mostly. I'm not very comfortable in crowds. Um, uh, but they were such a great group of people to be
    around. Uh, and, you know, it's nice to be part of a herd--(laughs)--you know, you can hide a little on the inside of
    the herd. Um, and so, uh, yeah, I mean, that was just one of those rare moments where I was surrounded by a bunch of writers
    who were great. I was surrounded by a bunch of activists who were great people. Dwight Billings, who we just mentioned.
    Just, just tons of Kentucky and West Virginians and Virginians and Tennesseans. And, um, yeah, I think we really, we really
    did a lot of good. Um, and, um, um, that eventually turned into my book, Lost Mountain. And it was really the first document,
    I think, that laid out for, like, an urban reader, just, you know, this is what it looks like when you blow a mountain
    up. You know, these are, these--this is who has to drink the water. This is whose foundation cracks. Um, you know, this
    is Patsy Carter, whose daughter was killed by an overloaded coal truck. You know, just that kind of thing. It's a short
    book. It's a quick book. Uh, and so I think a lot of people just thought, well, I'll get up to speed on this. And, um,
    when I first started working on the article, uh, I proposed to an editor at Harper's Magazine, sort of a convoluted story
    about how it moved back and forth between robins and forests and the strip mines, and he didn't think there was much of
    a story there. And he said, "why don't you just find one mountain and just write the story of that mountain." So, I went
    to the, um, office of surface mining and just started going through the mining permits there, which are, you know, they're
    two feet thick and written in this legalese--(laughs)--I just saw one that said, Lost Mountain. That's a perfect metaphor,
    so I didn't have to look any further. And it was small. It was a small mountain. I figured they would destroy it in a
    year, and they did. So, yeah, that's kind of--that's my kind of arc as a writer and a thinker about environmental issues.
- speaker: Interviewer
  text: Yeah, cool, and what was your academic journey to getting to teaching at UK?
- speaker: Respondent
  text: Well, it was a painful one--(both laugh)--it's not one I'd recommend to anybody. Um, I just worked as a lecturer.
    I worked at community colleges. I taught adult class, night school. I taught anything. Uh, and I didn't really want to
    get a PhD. I was kind of tired of academia after my master's degree. So I just thought, well, I'll just keep writing,
    and eventually I'll get recognized--(laughs)--it took a lot longer than I thought it would. But speaking of Dwight Billings,
    um, I had written a couple op-eds that were critical of UK's attitude towards coal. And Dwight contacted me one day, and
    he said, you know, if you're going to keep writing these things, you need tenure protection. I thought, "what a great
    idea." You know, my department has never supported that, but Dwight went to my department and got the ball rolling. Um,
    and I slowly got promoted to assistant professor, and then I kept writing books and kind of went up the chain. Um, so
    it's a very non-traditional path. I don't recommend it to anybody. I spent ten years just in the trenches, just, um, teaching
    a lot of freshman comp for very, very little pay. Um, but I always kept writing, um, through all that, and then, you know,
    just sort of--there was this--do you know this activist, Julia Butterfly Hill? Um, so she wrote a book about sitting in
    a tree for two years, um, to try to stave off the loggers, and I went to hear her talk one time, and she said something
    that I thought was, I thought was really good. I tell my students this a lot. She said, "find your tree." You know, and
    I thought, that's right. You know, everybody should find their tree. So, I just found my mountain, and that was, that
    was, you know, what I did. And you know, climate change is so overwhelming. I mean, you just you'll get thrown into inertia
    just overthinking it, but planting a tree is pretty easy. Um, you know, there's things that just individuals can do that,
    you know, we can all do. We can all find our own tree. Um, so that's kind of the way I stay sane thinking about that.
