collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So before we get started talking about Court Day, just tell me about yourself. Tell me a little bit about who you
    are and your history.
- speaker: Respondent
  text: Well, um, one, I'm mayor of the finest city in the Commonwealth of Kentucky. I like saying that. And I'm so blessed
    to be able to serve as mayor of this wonderful community, this beautiful, historic community. Um, and just proud to be
    a part of the team here. Um, I was raised here and born in Lexington, but raised in Montgomery County, graduated from
    high school here.
- speaker: Interviewer
  text: When did you graduate?
- speaker: Respondent
  text: 1987. And I actually, um, you know, I went away. I was gone for 20 years as a United States Marine, serving our country
    and serving all around the world. And when it came time to retire, I came back home. I brought my lovely wife here and
    my son. And I wanted them to experience small town life. And this was a great place for me to grow up. And I turned out
    okay--
- speaker: Respondent
  text: --being from Mount Sterling, Kentucky. So I wanted to share that with them, and it was probably one of the best decisions
    I ever made. I joke that it's one of the only arguments I've ever won with my wife to move here, but she kind of likes
    it, too.
- speaker: Interviewer
  text: Where is she from?
- speaker: Respondent
  text: She's from Jonesboro, Georgia. So if, you know "Gone With the Wind."
- speaker: Respondent
  text: Yeah. The whole story there, um, that's where she, uh, hails from. And, um. Yeah, it's been-- it's been nice. You
    know, one of the differences in those communities is--in our communities--is one, Mount Sterling is much like it was when
    I grew up, and it much like it was when my--my mom and my grandparents grew up. You know, not much has changed.
- speaker: Interviewer
  text: So your grand--so how many generations are you here?
- speaker: Respondent
  text: Well, as far back as we know, on my mother's side.
- speaker: Respondent
  text: Yes. Um, so, you know, that part of Mount Sterling, I think, is neat because it -- it's not changed. Jonesboro has
    changed a lot for my wife, and Atlanta has just kind of swallowed it. So it's kind of sad when she goes home that there's
    no one there that she knew growing up.
- speaker: Respondent
  text: And I think that's cool that when you come back to Mount Sterling, especially around Court Day.
- speaker: Respondent
  text: Uh, if you've not been here in a while, you know, graduated from here, went away. You've had a whole other career,
    a whole other life. You come home, and Mount Sterling is going to be much like it was, and you're still--you're going
    to run into people that you went to school with, grew up with. And, you know, I kind of like that.
- speaker: Respondent
  text: I think that's cool.
- speaker: Interviewer
  text: And Court Day is kind of the point on the map and the calendar, isn't it?
- speaker: Respondent
  text: It is absolutely. You know, there's a feel that you get with Court Day. Today as we're interviewing was-- is one of
    those days where you feel Court Day. It's chilly. Leaves are starting to fall. Um, it's just kind of something in the
    air that, you know, Court Day's coming.
- speaker: Interviewer
  text: Describe what that is. How do you know that? That's such an interesting--
- speaker: Respondent
  text: I don't know.
- speaker: Interviewer
  text: --interesting take on Court Day.
- speaker: Respondent
  text: You know, it's, um. I don't know, it's kind of like, you know, people say, well, it feels like, uh. Well, you know
    how spring feels?
- speaker: Respondent
  text: There's a feel about spring. There's a feel about fall and football and Friday nights at the football field, those
    type things. I think there's a Court Day feel, and I think it's just you get that little chill in the air and the leaves
    start falling and it just seems like, okay, it's time for Court Day.
- speaker: Interviewer
  text: That's great.
- speaker: Respondent
  text: And it's felt like that for the past week or so.
- speaker: Interviewer
  text: Yeah. That's great. Leading up to it and anticipation. Yeah. Um, I want to-- I want to talk about Court Day, but I
    do want to ask--in 20 years, you were in the Marines. Where did you go? What were some of the places that you were--[stationed]?
- speaker: Respondent
  text: Well, I was very fortunate to serve all around the world. So stationed. Let's see, I was in Camp Lejeune, North Carolina,
    and I was stationed in Washington, DC for a year. Fort Leonard Wood, Missouri. Camp Pendleton, California. Uh, Kaneohe
    Bay, Hawaii. And then Okinawa, Japan. Those were duty stations. Now, from those duty stations, you deploy, and you--you
    know, go around the world. So my career took me to 27 different countries, I believe, around the world.
- speaker: Respondent
  text: So just one of the best things that ever happened to me to be, you know, a small town kid from Mount Sterling, Kentucky,
    and then get to go experience, you know, this big, beautiful world that we have, these different cultures, you know, meet
    people from all across this great nation, serve with them, just have that experience. And I think that's helped me coming
    home and being mayor of a small town that I see, I see things differently maybe, than somebody that didn't have the opportunity
    to leave here, or that's been, you know, here their whole life. And, you know, certainly nothing wrong with that. The
    older I get, the more I like being where I'm at.
- speaker: Respondent
  text: Um, but I think it's helped me be a better leader. It's helped me see things from different perspectives that I may
    not have had I not had that great opportunity to just see the world.
- speaker: Interviewer
  text: What skills did you pick up in the Marines--in that---- that time of your life in the Marines that now serve you as
    mayor of a small town?
- speaker: Respondent
  text: Well, I think one, patience. Um, and learning to deal with adversity. Learning, you know, in the Marine Corps, no
    plan survives that initial enemy contact, we say. So you know, you're always having to adapt and to improvise, um, your
    plans. And you, also, I think the skill set, as I spoke about earlier, just being more open-minded, just understanding
    that there's a lot of different people that grow up a lot of different ways and see things a lot of different ways. And,
    you know, you've got to take that into consideration as a leader that, uh, you know, sometimes, sometimes the majority
    is not right in-- in the way they look at things. You know, sometimes you've got a--I think that's what we do as a society--look
    at, we've got to protect the most vulnerable of our society, and we've got to make sure that everybody is represented
    and every voice is heard. So, you know, I think that's the skill sets more than anything that I took away. And then, you
    know, just taking away that, um, life's-- life's good. And, you know, when you have those experiences that--that I've
    had, um, you know, I served in Iraq twice, in Afghanistan once. And then I was old school that first Gulf War, Desert
    Shield, Desert Storm. Um, you really appreciate what you have. You appreciate--you appreciate small town life. You appreciate
    great community festivals. You appreciate that people have the opportunity to come together here, and that we don't wake
    up and have some of the same struggles that so many around the world have--so many around the country are having right
    now. So it's just a good place to be.
- speaker: Respondent
  text: Right here in Mount Sterling.
- speaker: Interviewer
  text: Were your father or uncles or grandfather or-- or anyone in your family in leadership? In city government in any way?
- speaker: Respondent
  text: Um, no. We used to joke that my grandfather, he probably influenced a lot of elections. He was always one of those
    behind the scenes.
- speaker: Interviewer
  text: What did he do?
- speaker: Respondent
  text: He was a termite man, a Central Kentucky Termite. I don't know if you ever remember that, but, uh, Paul Toy, Central
    Kentucky Termite. He built a great little company here back when, you know, everything's become so corporate now. But
    back when you had all these little independent businessmen.
- speaker: Respondent
  text: And, uh, certainly learned a lot from him growing up. He gave me probably my work ethic. And, you know, he made me
    work, and in our family, everybody had to work. That's just the way it was.
- speaker: Respondent
  text: Um, but I so, you know, I-- I cherish some of those lessons that he taught me. And, um, you know, he-- although he--
    or no one in my family really served in local government, I like to think that both my grandparents, if they were still
    alive, would just be super proud.
- speaker: Interviewer
  text: Oh, yeah. I'm sure. Who--How did you decide to run for mayor? This is your second term.
- speaker: Respondent
  text: This is my second term.
- speaker: Interviewer
  text: So your term started when? What was your first?
- speaker: Respondent
  text: --was my first year, and --
- speaker: Interviewer
  text: --and your second?
- speaker: Respondent
  text: How did I--
- speaker: Interviewer
  text: Is it a four-year term?
- speaker: Respondent
  text: It's a four-year term. So I'm on my second term. I'm six years in now. It's my sixth well, fifth Court Day. We had
    one that was canceled due to COVID, which was a tough decision to make. We may talk about that later, but, uh. So how
    did I decide to get involved in local--local government? Uh, told you I'd retired from the Marine Corps, and all I wanted
    to do was just be Dad and just, you know, go to my son's football games, track meets, you know, just be there for him.
    I'd miss so much of his life being in the Marine Corps. And so, you know, that's what I did. I helped with the booster
    club. I was just, you know, just one of the parents that just was there to help out and just did my part. And then he
    was graduating high school, and I thought, well, why not run for city council? I'm going to have to have something to
    do. Actually, my wife said, you better--better find something to do or you're going to drive me crazy. So, uh, Mayor Gary
    Williamson actually called me. I had not thought about running for local office, and he said, "Why don't you run for city
    council? I think you'd--you'd be good."
- speaker: Respondent
  text: Little did I know, I think he was trying to set me up for running for office when he retired. Um, but I did that,
    and I served four years as a city council member and learned so much. And really, when I got into it, I just loved it.
- speaker: Interviewer
  text: What were your-- the years of the city council?
- speaker: Respondent
  text: That would have been--let's say, 2015, 2016, 2017, 2018. So--
- speaker: Respondent
  text: So those four years were on council, and then when Mayor Williamson decided to retire and not run, um, I just decided
    to put my name in the hat and see what happened, and it worked out.
- speaker: Respondent
  text: Had a-- had a good election, good opponent. You know, Curt Steger. Very good man. We-- we had those, uh, one of those
    elections that-- that the way it's the way it's supposed to be, very civil.
- speaker: Respondent
  text: Very kind. Um. You know.
- speaker: Respondent
  text: And no hostility whatsoever. And it's what small town elections are supposed to be about at the end of the day. You
    --you pat each other on the back and shake each other's hand and move forward. So, um, so it just I'm very fortunate that
    it just worked out.
- speaker: Respondent
  text: And that now I have the opportunity to lead this city. And I hate to say, you know, I know my job as a leader here,
    but I really look at what I do is I'm just a member of the team. I just jump in and help out where I need to. Um, just
    try to make sure that we have the best employees possible, that they have everything they need to succeed and do their
    jobs. And, you know, sometimes as a leader, I need to be a good follower. And sometimes that's what I do. I just jump
    in and help out where I can, and sometimes I get out of their way. Um, you know, sometimes I'm not one of those mayors
    that's going to speak my mind on every issue that comes up. But when-- when the time comes, if I feel strongly enough
    about it, even if it's not within kind of my role as mayor of the city, I will speak--speak on an issue to try to help
    influence where I can. But I'm a big believer that, you know, local government requires so many voices. Good local government
    requires so many voices and so many people to be involved. And, um, I probably do more listening than I do talking.
- speaker: Interviewer
  text: Uh-huh. So let's-- I could talk about this all day long because I think this is a fascinating--I, you know, just,
    uh, just a picture of small-town government. Everyone always talks about small towns being like, cesspools of gossip and
    backbiting. And this is not what your-- what you--your experience has been at all.
- speaker: Respondent
  text: Not at all.
- speaker: Interviewer
  text: And so, um, I think there's like a whole another oral history project that needs to be to be launched.
- speaker: Respondent
  text: I've got some interesting stories. [laughing] Yeah, we.. could have fun with it.
- speaker: Interviewer
  text: But today we're talking about Court Day.
- speaker: Respondent
  text: Yeah, absolutely.
- speaker: Interviewer
  text: Let's start with your personal childhood experience with Court Day. So you grew up here in Mount Sterling.
- speaker: Interviewer
  text: Do you remember your first Court Day? And just take me through, put me in a time machine and take me back to Little
    Al Botts. And what did he love?
- speaker: Respondent
  text: You know, um, so there's a few memories that stand out with Court Day for me. One would be just at an early age, I
    can remember coming downtown with my grandfather, and how big I thought that made me, you know, that I got to come downtown
    with him. And just how it seemed larger than life. Everything about it. You know, the--you know, we joke about how you
    can smell Court Day before you see it and just, you know, the smells, the sights, the activities. Um, just-- it seemed
    so busy, but, um, I don't know that age, but I had to be, what, five, six? Somewhere in there?
- speaker: Respondent
  text: And then, you know, after that, it became. It was like-- my wife and I were talking about the other day, you know,
    how Wizard of Oz, when you were little every year, that's a big thing you can't miss Wizard of Oz because you only had
    one opportunity to see it, right, growing- growing up...
- speaker: Interviewer
  text: Right. [laughing]
- speaker: Respondent
  text: Well, Court Day was the same. Like you look forward to that every year. Court day is coming, and you can't miss it.
    And you want to be there for every single moment.
- speaker: Respondent
  text: And of course, it was three days, a three day festival when I was younger. But, you know, I parked cars from a young
    age. I could not have been--you know, I wouldn't encourage this now with kids, but-- I'm probably, like nine years old
    or ten-- parking cars. My--my cousin and I
- speaker: Interviewer
  text: Like, getting in a car and--
- speaker: Respondent
  text: Oh no, we would park in our grandparent's backyard.
