turns:
- speaker: Respondent
  text: I'm Carol Buquo and my husband Jim Buquo, and we both have a history here in Over-the-Rhine. And, my name before I
    was a Buquo was Callahan, but the Callahans don't have history in Over-the-Rhine. But the other side of my family, the
    Nadler part of my family, has history here in the Over-the-Rhine. And, Jim, go ahead.
- speaker: Respondent
  text: Okay. I have, uh--
- speaker: Respondent
  text: --and you are?
- speaker: Respondent
  text: Jim Buquo, James Buquo and I have quite a bit of history here. The old St. John's Church, which is now the Transept
    Bar at Twelve and Elm, my great-great-grandparents, great-grandparents and grandparents were all married in that church.
    My great great-grandmother is Bertha Bertram who made the first uniforms for Cincinnati's baseball team in 1869. She invented
    the modern baseball uniform and the Cincinnati Red Stockings and she made the uniforms for ten years. She is in the Reds
    Hall of Fame and, and mentioned in Phil Nuxhall's book. And she grew up and they lived in this area. Her shop was just
    right--
- speaker: Respondent
  text: --We're not exactly sure--
- speaker: Respondent
  text: --we're not exactly sure
- speaker: Respondent
  text: --we're not exactly sure
- speaker: Respondent
  text: --but it's somewhere near Findlay Market
- speaker: Respondent
  text: It's listed as being at, um, Elm and Elder. Elm near Elder. So -
- speaker: Respondent
  text: --right up here.
- speaker: Respondent
  text: We suspect that is somewhere around in, in this area. And, she lived, when I looked at the city directories, she lived,
    um, in and around Elm Street. Okay, near the Transept Church or the St. John's Unitarian Church and, near Music Hall somewhere
    in that area between there and, and, and Findlay Market. And, she immigrated here from, uh, what was called Bohemia. Which
    is now the Czech Republic. And, so somewhere around the Prague area, city of Prague area. And her name before she married
    Charles Bertram was Bertha Wenzlick that was her name Wenzlick, W-e-n-z-l-i-c-k. And they got married, like Jim said,
    at St. John's Church and, they really never left that church, but she moved and married a lot. Her husband died and I'm
    not exactly the year, sure of the year he died, but she was a widow for a long time and, she ended up you know having
    to support herself. She came over in 1851, somewhere in that vicinity. And I don't know when he came over, Charles Bertram,
    but somehow or other they got together and got married. But he died fairly early. She didn't die until 1912.
- speaker: Respondent
  text: But her daughter married a Sterneberg.
- speaker: Respondent
  text: And he had come from Germany.
- speaker: Respondent
  text: And he had come from Germany.
- speaker: Respondent
  text: They lived up in the Clifton Heights area near Fairview, uh, School up there, in Fairview. So when she finally died,
    she died, she lived on Jefferson Avenue up in the Corryville area near UC (University of Cincinnati). And that's his history
    from this area that he can remember. Can you think of anything else that goes with that?
- speaker: Respondent
  text: No, other than the fact that, uh, there's still Sternebergs around and, and in the area.
- speaker: Interviewer
  text: In Over-the-Rhine or just--
- speaker: Respondent
  text: Just in the area, yeah. Uh, and of course, originally it was Von Sterneberg but then they dropped the Von.
- speaker: Respondent
  text: And we're not sure where, you know, uh, they, where they met or anything or whether that had anything to do with Over-the-Rhine,
    but we do know Bertha was part of the Over-the-Rhine for quite some time.
- speaker: Respondent
  text: Quite some time
- speaker: Respondent
  text: Yeah, before she moved to Clifton Heights. And then my family, the Nadler family, my, great-great grandfather was
    Ferdinand Nadler and he immigrated from a town in the Czech Republic or Bohemia as it was called at the time, part of
    the Austrian-Hungarian Empire. And, he immigrated around the same time Bertha Bertram immigrated here. And he lived on
    Main Street near where Japp's is now. And the building that he lived in is gone. It was torn down around 1927 and was
    made into a dime store or a five-and-ten store. I think it was like a Woolworths or something. But it's right near the
    Hanke Exchange area, in there. He ran a Turner shop. And he was a turner a wood turner. And so he lived there for quite
    some time, in fact I think he died there. He was also part of the Squirrel Hunters which was a group of Germans, uh, citizens
    who were commandeered by Lew Wallace, who was a general, uh, and Cincinnati was being threatened by, um, by the Confederacy.
    Um, Morgan's Raiders, and there were rumors that they were coming and so Roebling Bridge hadn't been quite completed at
    the time; they stopped anymore construction on it. They commandeered a whole bunch of African Americans to build a pontoon
    bridge across the Ohio River and then they rounded up, I don't know if they did it-- I guess they did it by patriotism
    or something--all these Germans that lived in Over-the-Rhine. And they were called the Squirrel Hunters because they all
    had their own guns, and they used them to go into the woods I guess to, to--I guess there were woods around here--and
    they would shoot squirrels and that's why they called them the Squirrel Hunters. Anyway my great-great grandfather was
    like forty something years old when he was made part of this army for one month and after that month they were told to
    go home and go back to their businesses. So eventually, he had children. His wife was Margaritha, I forget what her last
    name was before she got married to him. But anyway Margaritha also, Margaritha, died and she's buried at Spring Grove.
    And then he remarried and he remarried his brother's, um--
- speaker: Respondent
  text: Her name was Sophia. And so, so anyways, I found all this out. So anyway they had a son his name was Ferdinand also,
    that was one of his sons, and that was my great-grandfather. And they lived over up off of East McMicken.
- speaker: Respondent
  text: At Peete Street, um, and Peete Street, uh, is right behind Clifton Avenue, East Clifton, in that area there, near
    the Hude--old Hudepohl Brewery that was there. And he was a teamster. Now, I like to think that he was someone who drove
    the, the beer wagons, you know, through Over-the-Rhine. Because he was a teamster which means he did that. And then I
    guess when cars came into effect he became a chauffeur. Those were the jobs that were listed on the, on the city directories.
    So, they lived there for quite some time and then eventually they moved up to Clifton Heights. They first moved to Wheeler
    Street, and then they moved past Wheeler Street and they moved up to, Euclid near University and, and short Vine and all
    that. My grandfather had three brothers who all lived and he, my grandfather, was the youngest. His brother Ferdinand,
    Ferdinand seems to be a favorite name and George. And all three of them served in World War I. And they all went to France.
    So, that's--you go ahead and ask questions of me. I'm telling you my history here in Over-the-Rhine.
- speaker: Respondent
  text: So, as you can see she's done a whole lot of research.
- speaker: Respondent
  text: Yeah, I have.
- speaker: Respondent
  text: A lot of time at the library.
- speaker: Respondent
  text: That's why I'm interested in this. And, like, when this gets up and running. I will be so happy if I'm able to volunteer
    at the, at the museum and help get it ready and everything else. So, yeah.
- speaker: Interviewer
  text: Absolutely. You can do interviews too then. I'm just volunteering.
- speaker: Respondent
  text: Okay, all right.
- speaker: Interviewer
  text: Um, so I do want to clear up a couple of things that you were talking about. Bertha, she's your grandmother?
- speaker: Respondent
  text: Great-great grandmother.
- speaker: Interviewer
  text: Okay. Great-great. Okay. And then how long was she involved?
- speaker: Respondent
  text: She made the uniforms for the Reds for ten years.
- speaker: Respondent
  text: Single-handedly.
- speaker: Respondent
  text: Well there were only ten members of the team too. So I know it, it wasn't that many, but she made them.
- speaker: Respondent
  text: Well according to, um, the book The History of Baseball in Cincinnati, the owner of the Reds came to her and asked
    her to design the uniform. And so he wanted something different something flashy and so then she came up with the red
    stockings and the, the signature C that went on the front of it. And that's what she did that was her profession. So,
    I don't know if she was a she may have been a widow by then too. But I'm thinking because you know a lot of women didn't
    work outside the home if they had children and she did have a number of children. It wasn't just your grandmother.
- speaker: Respondent
  text: Or great-grandmother--
- speaker: Respondent
  text: great-grandmother.
- speaker: Respondent
  text: It was something, she, she had other children too I think. But, I don't know if she, I'd have to, I didn't bring my
    genealogy book with me and maybe I should have. But, because I didn't know if we would be able to have time to do this.
    I wasn't sure what was going on today. But anyway, but she worked as a seam--that must have taken some time to sew all
    those uniforms. I don't care, you know, and she sewed for other teams there were a lot of amateur teams in this area.
    So that's maybe why the owner of the Reds came to her because she had a history of making baseball uniforms. So we don't
    know anything else about that. And Charles Bertram I'm not exactly sure what his profession was, her husband. And I'm
    not sure if he was alive when she did this.
- speaker: Respondent
  text: Right, right.
- speaker: Respondent
  text: He could have, because she was a widow for a long time.
- speaker: Interviewer
  text: And then are you, do you know any of the rest of their descendants? Like any of the, their history after, after--
- speaker: Respondent
  text: Well she had a, Bertha had a daughter who was my grandmother's mother.
- speaker: Respondent
  text: And, and uh--
- speaker: Respondent
  text: Her name was Anna.
- speaker: Respondent
  text: Anna, Anna Sterneberg.
- speaker: Interviewer
  text: Okay, she was a Sterneberg.
- speaker: Respondent
  text: She was a Sterneberg.
- speaker: Respondent
  text: Right, well she was a Bertram and then she got married to a Sterneberg.
- speaker: Respondent
  text: Frank Sterneberg.
- speaker: Respondent
  text: Yeah, and her, her husband--
- speaker: Respondent
  text: --at St. John's.
- speaker: Respondent
  text: Her husband immigrated from Germany in 1888. His name was Frank X. Sterneberg. And he owned a stained glass, he did
    stained glass, he was a stained glass maker. And he had that profession. But I don't know how she met him or anything
    else. But, um--
- speaker: Interviewer
  text: They got married.
- speaker: Respondent
  text: They got married at the same place where her mother got married, St. John's. And then--
- speaker: Respondent
  text: My dad's mom and dad got married there too.
- speaker: Respondent
  text: And then his--
- speaker: Respondent
  text: --grandmother--
- speaker: Respondent
  text: --was Elsie Sterneberg.
- speaker: Respondent
  text: Married George Buquo.
- speaker: Respondent
  text: Married George Buquo.
- speaker: Respondent
  text: Buquo is a very unusual name.
- speaker: Respondent
  text: And his family, and Buquo family has nothing to do with Over-the-Rhine at all.
- speaker: Respondent
  text: Other than the fact that they moved up here from Chattanooga, Tennessee and they became film projection
- speaker: Respondent
  text: They ran movie houses.
- speaker: Respondent
  text: Yeah, my grandfather was--
- speaker: Respondent
  text: --silent movies.
- speaker: Respondent
  text: Silent movies that's how his grandmother, that's how his grandmother and grandfather met.
- speaker: Respondent
  text: She was the--
- speaker: Respondent
  text: And you know they didn't have any, they didn't have any sound. So you know when the hero would brr-uh-brr, you know
    that kind of music.
- speaker: Interviewer
  text: Was that at the Emory?
- speaker: Respondent
  text: No, it was I'm trying to think there was a lot of little movie houses all around. She grew up in Fairview. Up in,
    near Clifton, Clifton Heights. She grew up in that area. Near where the Nadlers, you know, moved to. And that in fact
    they even lived down near the same street. I can't believe they probably might of met or even known each other. But, there
    were movie houses all over the place. So--
- speaker: Respondent
  text: Right. Right. And, and like I said they were of course black and white, silent, so there's a person in there playing
    the piano.
- speaker: Respondent
  text: Charlie Chaplin type stuff.
- speaker: Respondent
  text: Charlie Chaplin and, my grandfather, then my grandfather wound up spending thirty-five years at the Keith's Theatre
    on Fountain Square.
- speaker: Respondent
  text: And that that was the theatre that showed the Walt Disney movies. That was and he was there for--until he retired.
    My dad was a projectionist, his brother was a projectionist. My dad was at the old Woodlawn Drive-in. His brother was
    at the Twin Drive-in. These are real Cincinnati names.
- speaker: Respondent
  text: But that has nothing to do with Over-the-Rhine. (laughs)
- speaker: Respondent
  text: That has nothing to do with Over-the-Rhine.
- speaker: Respondent
  text: But that's how the history evolved. And I don't know who, uh, other children, what a, I had it listed somewhere. I
    should have brought it, about the other children. But we don't know who those people.
- speaker: Respondent
  text: We don't know any of those descendants at this point. He has not kept in touch with, uh, any of the Bertrams or the
    Sternebergs.
- speaker: Respondent
  text: Or the Sternebergs. No. I graduated with a Sterneberg from Norwood High School.
- speaker: Respondent
  text: And he was related.
- speaker: Respondent
  text: But we're, but we're, haven't seen each other for a while.
- speaker: Respondent
  text: We never kept in contact.
- speaker: Respondent
  text: Even at the reunion.
- speaker: Respondent
  text: And that's the same way with me with the Nadlers. They moved to other parts of the country. One of Ferdinand's the
    Second, my great-grandfather's, one of his sons married a Prior or his daughter married a Prior and my grandfather's sister,
    and then they had a son Ferdinand. And he became, he played in the symphony orchestra. He played the oboe. So that's--
- speaker: Respondent
  text: Now an interesting fact, okay, is St. John's Church. Well, and then the Church basically across Washington Park, St.
    Paul's, broke away from St. John's. The high-German, low-German thing. And what's ironic is both churches had something
    to do with beer. St. John's is a bar but St. Paul's is Taft Ale House.
- speaker: Interviewer
  text: Oh, (laughs)
- speaker: Respondent
  text: Well and the interesting thing is where the Nadlers got married, they, my great-grandfather married Anna Wideman.
    The Widemans, which is part of my family, too, they lived right across the street from St. Peter's, Evangelical German
    Church which is where the annex of Rothenberg School is right now. The new Rothenberg School annex that was built when
    they redid Rothenberg School. Right there at the corner as you look up Main Street you can see it. That used to be St.
    Peters Church and, again, it was a break
