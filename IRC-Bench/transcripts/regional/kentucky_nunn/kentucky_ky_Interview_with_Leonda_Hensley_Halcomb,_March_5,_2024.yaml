collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: First of all, please give me your full name.
- speaker: Respondent
  text: Leonda Halcomb.
- speaker: Interviewer
  text: And, when and where were you born?
- speaker: Respondent
  text: Benham, Kentucky, 1945. October 24, 1945.
- speaker: Interviewer
  text: Where were you born in Benham? Were you at the hospital?
- speaker: Respondent
  text: I was at the hospital.
- speaker: Interviewer
  text: Explain to people what the Benham hospital was.
- speaker: Respondent
  text: A very small building as we look at today, but when we were growing up, it looked huge. It was where everybody went
    when they were sick, and it was a very family-oriented place.
- speaker: Interviewer
  text: It's my memory that International Harvester actually provided the hospital.
- speaker: Respondent
  text: Yes. We didn't have to pay anything for anything. We just went when we were sick, and they took care of us.
- speaker: Interviewer
  text: Did that include medicines?
- speaker: Respondent
  text: It did include medicines.
- speaker: Interviewer
  text: So, that's all company-provided.
- speaker: Interviewer
  text: For our listeners, Benham, Kentucky was International Harvester's captive coal mine. A captive coal mine meant that
    all the coal was used by International Harvester and not sold by others. So, did you attend Benham High School or the
    Benham School?
- speaker: Respondent
  text: I entered Benham grade school and the high school up to my tenth year. The school, we had to go to Cumberland or Lynch.
- speaker: Interviewer
  text: Well, let's talk about the Benham part first because, when it comes to going to Lynch, that's a whole separate story
    that we really need to explore. Tell me about Benham. What are your memories of being in grade school in Benham?
- speaker: Respondent
  text: Everybody was so close. Nowadays, you don't know hardly your neighbor, but everybody knew everybody. It was a great
    experience. I wish my children had went when I went. It was really, really nice.
- speaker: Interviewer
  text: What were your sports or clubs?
- speaker: Respondent
  text: I was in 4-H. I was in the choir. I did not do any kind of sports. I was just clumsy, I guess. I don't know.
- speaker: Interviewer
  text: Well, more than that, Leonda, in those days, there were no sports for women, for girls, at all.
- speaker: Respondent
  text: There was no sports.
- speaker: Interviewer
  text: I can remember my sister, Pat, playing when she was a freshman, they started up a basketball team.
- speaker: Interviewer
  text: Yeah, but that didn't go a whole lot. They just went down there and practiced and stuff. As far as going to other
    counties or anything like that, they didn't. But I can remember her being on that, and she was a cheerleader also.
- speaker: Respondent
  text: Well, so, approximately what year was this, or what range?
- speaker: Interviewer
  text: Let's see. I wanna say the late '59, maybe. '60. It would be after I left.
- speaker: Respondent
  text: Yes, after you left.
- speaker: Interviewer
  text: Who was your favorite teacher or teachers?
- speaker: Respondent
  text: Ms. Isom, and that's probably everybody's favorite because she was my first grade teacher, but I remember her actually
    at this church growing up, talking to her, and she was my children's teacher also, both of them.
- speaker: Interviewer
  text: And that was I-s-o-m, I believe, wasn't it?
- speaker: Respondent
  text: I-s-o-m. Yes.
- speaker: Interviewer
  text: Do you remember your favorite song in high school?
- speaker: Respondent
  text: Well, of course, it had to be the, our anthem.
- speaker: Interviewer
  text: The national anthem?
- speaker: Respondent
  text: Yeah, the national anthem. And then, we had a school song also. So, as far as remembering rock and roll and things
    like that, I can go on for days on that one.
- speaker: Interviewer
  text: Well, now, tell me about transitioning, then, to Lynch.
- speaker: Respondent
  text: When we heard that that was gonna happen, my father was so upset. He was so upset.
- speaker: Interviewer
  text: May I interrupt for just a second to say that International Harvester was closing the high school at Benham and that,
    as a result, the high school students had to then go to either Cumberland or Lynch.
- speaker: Interviewer
  text: But this was not a voluntary choice by the students or the parents.
- speaker: Respondent
  text: It was a have to thing. You either went to Cumberland, or you paid to go to Lynch. At that time and age, our my father
    was a coal miner, and where would you find the money to go to Lynch? But let me tell you, he did. He found the money for
    me to go to Lynch, and I actually didn't push it. I mean, he wanted me to go to Lynch.
- speaker: Interviewer
  text: Why did he want you to go to Lynch?
- speaker: Respondent
  text: I don't know. He just thought, well, let's see what they got up there, but I actually graduated up there. A lot of
    people left and went to Cumberland that went to Lynch with me, you know. We had several people to go up there with me,
    and a lot of them came back and went to Cumberland, but I stayed up there and graduated.
- speaker: Interviewer
  text: Well, the fact that your dad worked so hard—
- speaker: Interviewer
  text: To make sure because, when you say he was a miner, what was he doing in the mines?
- speaker: Respondent
  text: Digging coal. Digging coal.
- speaker: Interviewer
  text: And about what year are we talking about?
- speaker: Respondent
  text: My dad was born in '21, and he started working when he was 17 in the coal mines, so he worked till, actually, he was,
    like, fifty-six years old in the coal mines.
- speaker: Interviewer
  text: When we're talking about working in the coal mines, at the same time, I understand that your mother made a significant
    contribution for you to be able to go to Lynch.
- speaker: Interviewer
  text: Tell us about that.
- speaker: Respondent
  text: Well, she started working to help pay for the school, and she worked at the Pine View, and she made fifty cents an
    hour. Fifty cents an hour, and she cooked. Every day, she cooked, and she stayed there till after I was out of high school,
    and when I got married, I came back, and I would go up there and help her and learned a lot of things because they was
    some very talented ladies up there that taught me a lot.
- speaker: Interviewer
  text: The fact that your dad's a coal miner—he's working hard.
- speaker: Interviewer
  text: Your mother, in addition to all that she's doing at home, which we'll discuss, she is working at the Pine View, fifty
    cents an hour, all to help you go to Lynch School.
- speaker: Interviewer
  text: What about the other children? Did they have to face this same decision?
- speaker: Respondent
  text: No. After that, they all went to Cumberland. My brother Chuck started at Lynch, but then it got so bad that he had
    to go back to Cumberland, where it was free. So, financially, Chuck couldn't finish up there.
- speaker: Interviewer
  text: Tell me about growing up in Benham and your family particularly. First of all, describe your house.
- speaker: Respondent
  text: Our house was a four-room house. We had seven children, and Mom, and Dad. That was nine. You walked into the house,
    and there was a bedroom, and that was the girls' bedroom. You turned left. That was the living room. And then, straight
    ahead, there was the kitchen, and then there was Mom and Dad's bedroom. And, in that bedroom, they had bunk beds, and
    I had to sleep on top 'cause the three girls got the girls' room, and all the boys were little, so I had to—the smallest
    one, I would have to be on the top and hold him in there to all of them. One at a time as they grew. I was the one that
    slept in there so I could keep them from falling out.
- speaker: Interviewer
  text: And so, who would be on the bottom bunk?
- speaker: Respondent
  text: It would be Junior 'cause he's the oldest, and he would be either Chuck, and Ronnie was a baby, so I helped them grow
    up, I guess.
- speaker: Interviewer
  text: What a wonderful family unit.
- speaker: Respondent
  text: It was. We were close. We're close now. We're very family oriented, all of us.
- speaker: Interviewer
  text: That's fabulous. Well, we were talking about the kitchen. One of the aspects that I don't think we know enough about
    happens to be about the women, the wives of the miners. So, tell me, what was your kitchen like?
- speaker: Respondent
  text: We had a coal stove that they probably wouldn't even know what a coal stove was now, but it had—you had to put coal
    in it to burn to cook your food, and you had to—Dad had to get coal from the coal mines, and we would carry it in. My
    mom would carry it in. She'd make the fire. She'd cook three meals a day, and she was always busy. She was very busy.
- speaker: Interviewer
  text: When you're talking about—the company would provide the coal.
- speaker: Interviewer
  text: Where would they put the coal at your house?
- speaker: Respondent
  text: Well, it was in the backyard as long as we had coal, but we lived close to a tipple.
- speaker: Respondent
  text: And if we ran out, there we were, picking coal up around that tipple and bring it home. We'd carry it from there to
    there.
- speaker: Interviewer
  text: How do you spell tipple?
- speaker: Respondent
  text: T-e-m-p-l-e?
- speaker: Interviewer
  text: I don't know either. We'll check on that. But basically, the coal tipple, which is where they would run the coal through.
- speaker: Respondent
  text: Right. And it would drop off, and we would go and pick the coal up. Eventually, Dad had to pay for that coal. They
    charged a little bit, but who had the money to pay for it? So, we had to go over there quite often and get coal.
- speaker: Interviewer
  text: So, you have the company bringing some coal, leaving it in the yard, but that was not enough, so you would go over
    to the coal tipple and just pick it up from the ground.
- speaker: Interviewer
  text: And how far was that away from the house?
- speaker: Respondent
  text: Well, there was one neighbor, and then there was a coal tipple right beside that. So, it was a distance to carry a
    bucket of coal, which was heavy.
- speaker: Interviewer
  text: Now, would you do that in winter?
- speaker: Respondent
  text: All the time.
- speaker: Interviewer
  text: So, that was just part of it.
- speaker: Respondent
  text: Living. It was just an everyday thing.
- speaker: Interviewer
  text: Did all the children, when they were able, then, bring in the coal, or was it primarily your mother?
- speaker: Respondent
  text: It was the older ones. I can remember doing it, you know, and I was twelve when we left there, but I can remember
    carrying coal.
- speaker: Interviewer
  text: Well, then, when we talk about a coal stove, what time of day would your mother get up to start the coal, to start
    the stove?
- speaker: Respondent
  text: She'd have to get up before Dad went to work, and that was five, something like that, every day. She never complained.
    Just get up and do it. Fix the breakfast. Feed everybody. And then, they're gone.
- speaker: Interviewer
  text: What kind of breakfast would you have?
- speaker: Respondent
  text: We would have not a whole lot, but it was filling. She'd have oatmeal, maybe eggs, and bread, but as far as the meat
    thing, I always told people that was a Sunday thing. We had fried chicken on Sunday, stuff like that, but not always during
    the week, we didn't.
- speaker: Interviewer
  text: So, did your parents or mother raise a garden?
- speaker: Respondent
  text: We had gardens. We had several gardens. In the backyard was all garden. And then, up in the mountain, Dad had a garden
    up there that was fenced in, and Mom and I would walk up there and hoe the potatoes, the corn, or whatever. And then,
    we would go up there, and gather it all, and bring it back home, which was a very long distance. A long distance to go
    to.
- speaker: Interviewer
  text: Well, now, when you would bring things from the garden, what would you do with them?
- speaker: Respondent
  text: We could bring them in, shuck the corn or the potatoes, put them in the basement. And then, Mom would can and do things
    like that. We didn't have a place to freeze anything, but she would can things.
- speaker: Interviewer
  text: Did you have basically, when you say 'in the basement,' did you have some sort of storage cellar or—
- speaker: Respondent
  text: It was just dirt. A hole in the ground. You put your potatoes in there, and they would last quite a bit long. Long
    time. And then, she had a place for her canning jars and things like that. But, eventually, Dad built a shower down there.
    He concreted a part of that basement and had a shower because we had no bathroom, and he would come home from work, and
    he would shower, and he built us a little shower. So, that was a fun time for us 'cause we would think we're at a swimming
    pool or something like that, and always fun to take a shower down there.
- speaker: Interviewer
  text: So, he had his shower, and then a smaller shower for the children?
- speaker: Respondent
  text: No, it was all the same thing.
- speaker: Interviewer
  text: Oh, it was all the same thing.
- speaker: Respondent
  text: It was all boxed in, concreted, had a pipe going down, and we'd stop that pipe up, and put water in there, and act
    like we're swimming. But, yeah.
- speaker: Interviewer
  text: That is a terrific story.
- speaker: Interviewer
  text: But did that affect storing the food?
- speaker: Respondent
  text: No. It was cold down there. You have to remember how cold. In the old days, it was very cold, so the potatoes and
    things were over in the dirt, and then the canned food was in there.
