collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So I would like to start with first of all your full name.
- speaker: Respondent
  text: Okay. Porter, P-o-r-t-e-r, Porter, middle initial G, which is Geneal. Porter Geneal Peeples, P-e-e-p-l-e-s, Senior.
- speaker: Interviewer
  text: What is the--spell the Geneal for me.
- speaker: Respondent
  text: G-e-n-e-a-l.
- speaker: Interviewer
  text: N-e-a--is that a family name?
- speaker: Respondent
  text: Yes. My--my father was Roy. His--his father was O'Neal. My father was Roy O'Neal, and my oldest brother was Roy O'Neal,
    Jr.
- speaker: Interviewer
  text: So are you saying O'Neal, or Geneal?
- speaker: Respondent
  text: No. They were O'Neal.
- speaker: Interviewer
  text: Okay. Spell that one for me.
- speaker: Respondent
  text: All right. O with the little dash, N-e-a-l.
- speaker: Interviewer
  text: Right. Okay. Okay, so they were the O'Neals. Well, let's just jump into the family situation.
- speaker: Interviewer
  text: Now, tell me where your people came from--
- speaker: Interviewer
  text: --to Lynch.
- speaker: Respondent
  text: My father came from Bessemer, Alabama, to work in the coal mines in Lynch. I'm trying--I don't remember the exact
    year, but I've got the information on that he went to work and he and I stayed still in Lynch. Family?
- speaker: Respondent
  text: Family of nine kids. My mother came from Chattanooga, Tennessee. My mother's name was Carrie Lou Peeples. L-o-u.
- speaker: Respondent
  text: C-a-r-r-i-e. Carrie. Carrie Lou Peeples.
- speaker: Interviewer
  text: What was her maiden name?
- speaker: Respondent
  text: Conner. C-o-n-n-e-r. Conner.
- speaker: Respondent
  text: They both had been married before. My mother's husband was killed in the coal mines in Lynch. And my father was divorced
    before he left Alabama. And then, you know, nine kids later, yeah.
- speaker: Interviewer
  text: That is amazing.
- speaker: Respondent
  text: Five boys, four girls.
- speaker: Interviewer
  text: And that was the--that's between Carrie Lou and your father?
- speaker: Respondent
  text: And my father.
- speaker: Respondent
  text: And each one of them have had one.
- speaker: Respondent
  text: Now my mother's daughter was with us.
- speaker: Respondent
  text: And my father's daughter was still with her mother in Alabama. And she ended up moving to Cleveland.
- speaker: Interviewer
  text: Well I am fascinated by the fact that we have a whole contingent from Alabama.
- speaker: Respondent
  text: Yeah, Alabama.
- speaker: Interviewer
  text: Now how did your father know to come to Lynch?
- speaker: Respondent
  text: Well, I've heard stories about this man called Limehouse. What I understood is Limehouse used to bring African American
    men from the area in Alabama to Lynch because of the opportunities to work in the mine. And that's the story that I've
    heard. Now whether Daddy came with Limehouse or not, but--and then his brother, Harden Peeples, came after him to Lynch.
    That was probably the pattern, one brother come, then others come. Some were married after they got there. Some were married
    before. They would come, go back and get the families. But--
- speaker: Interviewer
  text: Tell me, if you know, what would life have been like in Alabama to make coming to Lynch, Kentucky a major step up?
- speaker: Respondent
  text: United States Steel had this--and still has--a reputation of taking such good care of their workers because of the
    union. So those were attractive features that United States Steel had about it that, as I said, attracted people to come
    there.
- speaker: Interviewer
  text: Well I have heard that story, and it's interesting because when you think about Lynch being US Steel, and Benham being
    International Harvester--
- speaker: Respondent
  text: International Harvester.
- speaker: Interviewer
  text: There are, again, similarities, but major differences.
- speaker: Respondent
  text: Differences.
- speaker: Interviewer
  text: But PG, tell me first, when were you born, and where? What year?
- speaker: Respondent
  text: I was born in Lynch at the Notre Dame Hospital October 29, 1945.
- speaker: Interviewer
  text: One of the things that I have found most fascinating, when I interviewed my sister Alice to talk about specifically
    the women of the mountains, there are three years' difference between the two of us. And there are about four years' difference
    between the--years between you and I. Just that short period of time has had a significant impact on what our memories
    were. What one of us remembers and the other doesn't. How one interpreted it and another doesn't. So I'm going to be very
    interested in--as we go along--
- speaker: Interviewer
  text: --in seeing all of that. Now when you talk about Lynch, Kentucky, did you--describe your hometown and area as you
    came to know it.
- speaker: Respondent
  text: Okay. The town was built by United States Steel. All of the houses were built by United States Steel. Built for the
    coal miners, and the miners would rent the houses from the company. For that time in history, there--I would say they
    were modern. United States Steel invested well in those houses that they built for the coal miners there. Like I said,
    we had the hospital as it did. We had three stores. Had a store in Number Five, a store in Number One, and then we had
    the Big Store in the middle. And the Big Store was just that, compared to the others, but it--for our town--
- speaker: Interviewer
  text: The company store?
- speaker: Respondent
  text: Yeah. For our town, that was huge. I always remember the Big Store at Christmas time, when you went upstairs where
    they had the toys set up. And, you know, you would go through there every day. And the Big Store also had a very nice
    drugstore, and--where you could go in and sit down and drink and eat. Very, very nice. The grocery store and the clothing
    store were on the first floor. Very modern clothing for that time, and there were--a lot of the men hunted and fished.
    My dad did. I started going fishing with my dad before I was in the first grade. And did it until he passed. But one of
    the things that--one of my precious memories is that I was able to purchase a boat for my father. And he died about nine
    months later. But the memories of that short period just all--
- speaker: Respondent
  text: Sure were. Just priceless. Yes.
- speaker: Interviewer
  text: Where did you take the boat?
- speaker: Respondent
  text: Well, the coal miners in eastern Kentucky all fished in Tennessee, at the Tennessee Valley Lakes. So the boat we kept
    at home, but we would go to North Lake, Douglas Lake, Cherokee Lake. Friday evenings when I got out of school, I was looking
    forward to Dad coming home by five o'clock and we're in the car and we're gone for the weekend, fishing Friday night,
    Saturday night, and then coming back home on Sunday.
- speaker: Interviewer
  text: Would you camp out? Or would you stay at hotels? How would you--
- speaker: Respondent
  text: No. No hotels that they had, not for Black people at that time. (Laughs) But what we did was during the daytime--if
    we were fishing at night, during the daytime we camped. And the nighttime we fished. And just the opposite in the spring.
    We did that. But--
- speaker: Interviewer
  text: Were there public camping grounds? Or did you just--or did it matter in those days--
- speaker: Respondent
  text: It didn't matter.
- speaker: Interviewer
  text: --since it was federal grounds?
- speaker: Respondent
  text: It didn't matter. When we were fishing, we just had certain places on the islands that we would camp--that we were
    used to. Like if it was--if the weather was cold or cool, Dad and them would find a stump, pour gasoline on it, (Curris
    laughs) light that stump, and it would heat up everything. In the daytime, there were certain islands that had certain
    trees, and that's where you'd sit under the shade trees. For eating, Dad and them had the little gas cookstove, and, you
    know, we ate a lot of sausage, eggs, bacon, and morning, noon, and night. And then the food that we would bring from home.
    But yeah, they'd cook. They'd cook coffee and make coffee and do all of that.
- speaker: Interviewer
  text: Don't you wish that your great-grandchildren had those opportunities?
- speaker: Respondent
  text: Oh yeah. I do. I do.
- speaker: Interviewer
  text: It was a marvelous way to have entertainment and be so close to your family and friends.
- speaker: Respondent
  text: There's an endearment I still have at my age from those memories. Bill Turner, a dear friend of mine--
- speaker: Respondent
  text: --his father took him fishing along--we all would fish together sometimes. Bill and I still go down the memory lane.
- speaker: Interviewer
  text: Do you really?
- speaker: Respondent
  text: Oh yeah, we still do. Now I still go to Tennessee, and I've got--see, the Griffith family from Benham. Wolfram (??)
    Griffith and his son Stevie, Stevie and Major. Well they're fisherman. And so those are my fishing buddies now. It's interesting
    that we all have followed in our fathers' footsteps. In fact, this morning I was communicating with Major because he was
    on his way fishing. So Major and Stevie and I, and Paul Smith from Lynch, we all fish together.
- speaker: Interviewer
  text: Do you know, it's been very interesting. This whole fishing, whether you're Black, you're white, it didn't matter.
    Everybody went fishing.
- speaker: Respondent
  text: Everybody went fishing.
- speaker: Interviewer
  text: Everybody went fishing. And it just--it was another one of those types of activities that bound people.
- speaker: Respondent
  text: It bonded people.
- speaker: Interviewer
  text: Absolutely.
- speaker: Respondent
  text: It bonded--the fishermen would, you know you were always safe because somebody come all the way--if you had some issues
    with your boat, you were going to be given assistance by the cone (??)--by the other guys, all the time. If you--
- speaker: Interviewer
  text: Now, all of the fishing and so forth that we're talking about, PG, let's relate that back to the communities. What
    did the women do for entertainment? What did your mother do?
- speaker: Respondent
  text: (Laughs) For entertainment, you know, that's an interesting question that I don't think I ever thought about that
    much. But I know my mother--and I don't know this--my mother liked to sew. She had that little Singer sewing machine,
    and--that she would make things. The women--and this is still not recreation, but this is what--they--what's called canning,
    putting the peaches in the jar and the blackberries in the jar that we would live off of. They would--church. They were
    all involved in the church.
- speaker: Interviewer
  text: Were there flower clubs for the women?
- speaker: Respondent
  text: I know there were in Cumberland. I'm not so sure about Lynch. I'm not so sure.
- speaker: Interviewer
  text: Okay. I know my mother was always exchange--Pauline Hern--was always exchanging flowers with everybody. You know--
- speaker: Respondent
  text: They may have done more of that.
- speaker: Interviewer
  text: And they may have done that.
- speaker: Respondent
  text: I guess I wasn't--I was a father's son (both laugh).
- speaker: Interviewer
  text: That was so typical, wasn't it?
- speaker: Interviewer
  text: That was so typical.
- speaker: Respondent
  text: I was a father's son, and, you know, I walked in his footsteps.
- speaker: Respondent
  text: Not, obviously, no--not that I cared more about him than my mother, but we had more in common in terms of what we
    did.
- speaker: Interviewer
  text: That was the way of the age.
- speaker: Interviewer
  text: That is the way that it worked.
- speaker: Respondent
  text: It--rabbit hunting with my dad, fishing with my dad, and that was just the way it was.
- speaker: Interviewer
  text: Let me ask you--
- speaker: Respondent
  text: Wouldn't trade it for anything in the world.
- speaker: Interviewer
  text: No. What are the names of your wife and children?
- speaker: Respondent
  text: Okay, my first wife was Billye Morrow. Her mother was a nurse.
- speaker: Interviewer
  text: Okay. Spell her name for me.
- speaker: Respondent
  text: M-o-r-r-o-w, Morrow. B-i-l-l-y-e. Her mother was Dorothy Morrow, the Black nurse in Lynch.
- speaker: Interviewer
  text: Yes. Everybody knew Dorothy.
- speaker: Respondent
  text: Yeah, everybody knew Dorothy.
- speaker: Interviewer
  text: Oh my gosh, yes.
- speaker: Respondent
  text: Yeah. That was my first wife.
- speaker: Interviewer
  text: So wait, was Billye Morrow is your first wife.
- speaker: Respondent
  text: First wife. We had one son.
- speaker: Interviewer
  text: And his name?
- speaker: Respondent
  text: He was Porter.
- speaker: Interviewer
  text: Porter. Okay. And your second wife?
- speaker: Respondent
  text: She was from Hazard.
- speaker: Interviewer
  text: Oh my gosh. You left the county (both laugh). You went all across the mountain to Perry County.
- speaker: Respondent
  text: Met up after we both graduated from college. Both of us went to south--went to college. I went to Southeast, and she
    went to--they called it in an ad--community college.
- speaker: Interviewer
  text: The community college there.
- speaker: Interviewer
  text: Part of the UK system at that time.
- speaker: Respondent
  text: And we both transferred--yeah. Both of them. If the UK system had not developed and opened the college when I was
    in the ninth grade, I wouldn't have gone to college. My parents were not prepared to send me away. But when they opened
    the community college--and I would go away to my brothers and sisters in the summer, I saved my money. I remember--I think
    I'm right--tuition was like one hundred and ten dollars a semester. I could save that off my first couple paydays in New
    York. And that was what I did. And so when I came back, the money was already in the bank.
- speaker: Interviewer
  text: Well I want to come back to Southeast in a little bit because there is a whole story there, for sure. What was Wilma's
    maiden name, or her last name?
- speaker: Respondent
  text: Give me time. I'm thinking, in a minute.
- speaker: Interviewer
  text: No problem. No problem. But when we're talking about family and children, did you and Wilma have children?
- speaker: Respondent
  text: No. She had a daughter.
- speaker: Interviewer
  text: Okay. Okay. Now, let's jump to your educational background. Let's talk about first of all, grade school. Tell me where
    you went to grade school, and what were the activities, and what were some of the things you loved, and some of the things
    you hated (laughs)?
- speaker: Respondent
  text: Oh, I hated the spankings that the teacher gave you with the strap. That I hated. So I tried to be a good guy --------(??)
    I'd avoid that. First grade, you know, elementary school. One of the things I remember about every year for school was
    getting the new clothes to go to school. And because of my age, the way it fell, when school started in September, and
    my birthday in October, they--my parents thought I was goin
