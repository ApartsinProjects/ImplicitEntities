collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Just to start off with, like, a softball, can you tell us a little about yourself, where you're from, and, like, what's
    your daily life like?
- speaker: Respondent
  text: I was born right here in Mount Sterling and just a fairly regular life. I've been in the carpentry trade the whole
    time. Ryan was born in Chicago. And he went to school in Florida.
- speaker: Interviewer
  text: What did you do in high school? What team were you on?
- speaker: Respondent
  text: Osceola Cobbler Wrestling.
- speaker: Respondent
  text: Ryan was on the wrestling team at school. But, fairly normal lives.
- speaker: Interviewer
  text: That's really amazing, like, I really appreciate you telling us about your daily lives and everything. And I really
    find the wrestling thing interesting. Wrestling is a hard sport, I'm pretty sure, like, from what I know of it, it takes
    a lot of focus and physical strength and mental discipline as well.
- speaker: Respondent
  text: He loved it. He learned how to lose because he absorbed a lot of losses. But you had one win in Tampa, right? Is that
    where you won the wrestling match?
- speaker: Respondent
  text: I only pinned one person and the rest, some of them nobody showed up.
- speaker: Respondent
  text: Oh, okay. That's all right. But I know you pinned one person in Tampa, I remember that.
- speaker: Interviewer
  text: That's amazing. Thank you so much for telling us about it, I know wrestling is a difficult discipline to get into.
- speaker: Respondent
  text: You're welcome.
- speaker: Interviewer
  text: Speaking about discipline and commitment, bringing it to the Post Clinic in Mount Sterling, how did you hear about
    the Post Clinic? Like, firstly, your original hearing of that place.
- speaker: Respondent
  text: Before they got this new building my boss got called to fix a gutter on the old Post Clinic. There was a downspout
    leaking, and he was friends with a lady named Louise that works here. He just brought it up to her, and she's like, 'We'll
    see him, Brian.' She said, 'Have him come in and fill out an application.' So while he was fixing the gutter I came in
    and filled out an application, and I started getting treatment within days. Blood work. I hadn't had blood work done in
    years. I didn't know this place existed and that's the way it happened.
- speaker: Interviewer
  text: I really find it beautiful that it was by kind of happenstance almost.
- speaker: Respondent
  text: You know, serendipity, whatever you want to call it, but yeah, it was a big deal.
- speaker: Interviewer
  text: Do you feel like it was more luck or just really happened out of nowhere to come and find this amazing place? Because
    you said you didn't know it existed at first.
- speaker: Respondent
  text: I think I would call it luck. We got called to do a repair on the old building. It was raining and rain was coming
    down. My boss stayed out in that rain and fixed it while I got to go in and fill out the application. He knew I needed
    medical attention. That's the way it worked. Then Ryan, they also do dental work. The same lady said, 'Tim, bring your
    son in, have him fill out the application.' Ryan's received dental work. To me that's bigger. What they've done for me
    is a lot for sure. I haven't had blood work done in years. But what they've done for him cosmetically just melts my heart.
- speaker: Interviewer
  text: That's beautiful. I really am grateful for places like this that can give people an opportunity to just receive healthcare
    simply. Like, I think you said you received blood work within days?
- speaker: Respondent
  text: I did. I hadn't had blood work done in years. Olga Skinner is the lady who read my blood work. She calls me on the
    phone and called me in a couple of prescriptions. It was truly wonderful.
- speaker: Interviewer
  text: I think that's an amazing story, especially speaking about how hard it is to get healthcare, it's simple things.
- speaker: Respondent
  text: With Ryan, with the dental, I could get him appointments and then they wouldn't do some of the things he needed done.
    They rushed him through and they'd clean his teeth or whatever. He would get called back in like six months. I'm like,
    man, he's got problems in his mouth. We had real trouble with it. This facility here just changed the way he looks. When
    he smiles now, I wish we had before and after pictures. But he looks great now.
- speaker: Interviewer
  text: Thank you for telling us that. I truly think places like these really open up a lot of lives for a lot of people and
    save a lot of lives and transform a lot of lives. I know places that could take up to six months to a year to receive
    some basic healthcare. For the Post Clinic to do some vital mouth work and blood work for you two within days is truly
    inspiring.
- speaker: Respondent
  text: It was a big deal. They did an evaluation on his mouth and called him back in like a week or two later for his first
    real appointment. They fixed four teeth in one sitting.
- speaker: Interviewer
  text: Incredible.
- speaker: Respondent
  text: Yeah. It was amazing.
- speaker: Interviewer
  text: What has been your experience accessing healthcare from the Post Clinic overall?
- speaker: Respondent
  text: Accessing help from the Post Clinic has been super easy. I filled out the application and in a few days I was seen
    by a practitioner. It's just super easy. When you're done and they're walking you out, they take you to a window and you
    get your next appointment card. It's that easy. That's been my experience with the Post Clinic.
- speaker: Interviewer
  text: I truly find accessing healthcare for anyone should be simply easy.
- speaker: Respondent
  text: It's that simple here.
- speaker: Interviewer
  text: I love that the Post Clinic has made providing this vital healthcare for you easy.
- speaker: Respondent
  text: Absolutely. You are exactly right.
- speaker: Interviewer
  text: What has your experience been like accessing healthcare before coming here, facing any challenges or receiving healthcare
    before the Post Clinic, before that lucky moment?
- speaker: Respondent
  text: I didn't really get healthcare, but if I got a cut and needed stitches, I was able to go to the emergency and get
    treatment. But I didn't put a lot of effort into it because of the money. I could get care in this country if I needed
    stitches, but it cost a lot of money. So I just went when I had to. If I had a tooth that was killing me, I would make
    a dental appointment. I wouldn't say it was hard, but with the money, I didn't go a lot of times when I should have.
- speaker: Respondent
  text: I build computers and I got a gaming desk that you can put a computer inside of it.
- speaker: Interviewer
  text: I've always wanted one of those to make things more like—
- speaker: Respondent
  text: We're two bachelors, and he's my son and we're living a charmed life. He's got all the computers and the fancy discs.
    Life's good to us.
- speaker: Interviewer
  text: What type of games do you play? I know Mortal Kombat's one.
- speaker: Respondent
  text: Yeah. I also play Final Fantasy.
- speaker: Interviewer
  text: Final Fantasy?
- speaker: Interviewer
  text: Finally somebody knows what you're talking about.
- speaker: Interviewer
  text: Those anime series games are incredible.
- speaker: Interviewer
  text: I love Mortal Kombat. Those are dope games. I play a lot of story games like that. I know Injustice with superheroes
    like Superman and Batman fighting each other, those types of Mortal Kombat games are super dope. The setup you have sounds
    really cool. I've always wanted to improve my gaming experience.
- speaker: Respondent
  text: He's been able to move from gaming consoles to computers.
- speaker: Interviewer
  text: Oh, for real?
- speaker: Respondent
  text: We're advanced now.
- speaker: Interviewer
  text: Nice. I'm still on a console. I've always wanted a PC. That's dope. Thank you for telling me that, Ryan.
- speaker: Respondent
  text: I also got a PS5.
- speaker: Interviewer
  text: Oh, for real? PS5? What games do you have on PS5?
- speaker: Respondent
  text: I got the Demon's Souls remake.
- speaker: Interviewer
  text: Is that one good? I played Elden Ring but—
- speaker: Respondent
  text: I beat that game so many times.
- speaker: Interviewer
  text: For real? I can't even get past the first boss in Souls games.
- speaker: Respondent
  text: He's got time on his hands. Ryan, he's—oh, man.
- speaker: Interviewer
  text: That's dope. Those games require a lot of commitment, discipline, but they're super fun.
- speaker: Respondent
  text: You have to learn how to lose, and he's got patience with it. I can never stay with it. I don't play them.
- speaker: Respondent
  text: Good job, buddy.
- speaker: Interviewer
  text: Nice. I think a lot of things in life require patience. Those types of games are one of them.
- speaker: Interviewer
  text: Speaking of doing stuff like gaming that really helps your well-being and mental health during life, how has the Post
    Clinic impacted your overall well-being, health, mental health, and sense of safety?
- speaker: Respondent
  text: It feels good that I received blood work. I went for years without it. They call you a few days later and call you
    in a prescription. It makes me want to be a better person. It makes me feel good that somebody's looking after my health.
    When I go out into the world, I want to be better. It puts me in a good mood to be good to people and to be a better father
    to Ryan at night.
