collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So, for this interview, we want to talk a lot about your experiences with ASERL. But to begin with, can you tell me
    a little bit about your educational background and your early career experiences?
- speaker: Respondent
  text: Okay. Like I think many others that I have known in the profession, librarianship was not my first degree nor my first
    career. I've had a lot of colleagues over the years who came to librarianship perhaps a bit later in life, and I'm certainly
    in that category. My undergrad degree was in music performance with dual majors in cello and piano performance. I worked
    for many years as a professional musician and did a lot of studio teaching as part of that. So then the next question
    people usually have is, 'So, how did you end up being a librarian?' And it really is kind of a sounds like a made up story,
    but I swear it's the honest to god's truth. My last job as a professional musician was as a staff pianist for the Milwaukee
    Ballet. It was probably the worst sort of position I could have had, given the fact that going back many years, even to
    my college days, I had problems with recurring and what became chronic tendonitis. Ballet accompanying is very physically
    demanding. There's a lot of repetition. You're playing for classes and rehearsal often, repeating the same things over
    and over. Because of the nature of the music, there's a lot of very repetitive motion, particularly for the left hand.
    So ballet accompanying really kind of finished me off physically. I had been seeing an orthopedist who specialized in
    performing arts cases. After a whole variety of treatments, everything from a lot of steroids, injections, ultrasound,
    he sat me down one day and said, 'I think you need to reconsider what you want to be when you grow up.'
- speaker: Respondent
  text: So, because of needing a never ending source of music to play for ballet class, I was a frequent visitor at the Milwaukee
    Public Library because they had a fabulous sheet music collection. When I was getting bored with what I was playing, I'd
    go and look for new things, and I literally walked into the lobby—their downtown central lobby is a beautiful old building.
    Multi-story atrium, terrazzo, marble. It's gorgeous. I walked into that atrium and looked up into the dome, and it was
    like a bolt from the sky said, 'Maybe you should be a librarian.' Fortunately, the University of Wisconsin-Milwaukee had
    a great library and information science program. I was able to stay right at home and get the degree. This was long before
    online programs had even been imagined. I thought I was headed for special librarianship, or at that time there was still
    something sometimes referred to as information brokers.
- speaker: Interviewer
  text: Mm-hmm. Yeah. I remember.
- speaker: Respondent
  text: Before the time when everybody could do their own searching, businesses and corporations would contract with an information
    broker to carry out the research that they needed. I was fortunate to get a paid internship while I was working on my
    degree, working in the library at UW Milwaukee. That totally changed my thinking and my trajectory. I went into academic
    libraries and never left.
- speaker: Interviewer
  text: That's an amazing story. I think you're right. A lot of librarians start off as something else, and then they have
    some kind of formative experience, and they decide to go into librarianship.
- speaker: Respondent
  text: And I actually know probably at least a dozen people who have undergrad degrees in music, got their library degree,
    and only a very small number of those ever worked as a music librarian.
- speaker: Interviewer
  text: I was going to ask, was that something you thought about, given your background, trying to go into music librarianship?
- speaker: Respondent
  text: I think it was kind of in the back of my mind. But the opportunities that presented themselves early in my career
    really took me in completely other directions.
- speaker: Interviewer
  text: Right, right. So, let's talk about those other directions. You go through library school—can you talk about your first
    positions and what direction you went into in academic libraries?
- speaker: Respondent
  text: At the time I was getting my degree, the University of Wisconsin system was under a hiring freeze. The UW Milwaukee
    library had a number of people who were on half-time, one year appointments. That was the most allowed under the freeze.
    When I graduated, one of the other system campuses forty-five miles down the road, UW Parkside, had an opening for a general
    purpose reference librarian. I was liaison to a number of departments in the humanities and social sciences areas. This
    was also the time that the Web was just really starting to take hold. In that one year appointment at Parkside, I created
    the first Web site for the library.
- speaker: Respondent
  text: They had a long and very strong history of information literacy, and all of their freshmen were required to complete
    a course. Working with other librarians who had been teaching those courses for many years, we put the first version of
    that largely online. Those were two opportunities I had being in the right place when these things were just very much
    in their infancy. That kind of started me on a path to, as my brother has described it, I moved to the geeky side of librarianship
    fairly early on.
- speaker: Interviewer
  text: Well, I think it's great that all the students of that institution were required to take some sort of information
    literacy class, because that's still not universal. Certainly, it's often optional. So that's terrific. But you did the
    information literacy work and the Web site, but I think you also taught LIS classes at some point. Is that right?
- speaker: Respondent
  text: I did some adjunct teaching for the UW Milwaukee Library School. A lot of that was focused on the emerging technologies
    of the time. I did not teach in the degree program, but they had a very strong program that largely supported their previous
    graduates but was also open to any librarian in the area. They could, if they took enough of these classes, get a certificate.
    They had a number of different categories of certificate. One day I got called into the office and they said, 'We need
    somebody to teach basic Web development and design.' I said, 'Oh, that's nice.' They said, 'We think it should be you.'
    For people who were in the profession in the early to mid-nineties, I think would back me up in saying we were all just
    kind of making it up on the fly. I look back at some of those very early efforts and I guess I would say we were working
    with the tools that we had at the time, and we were doing the best we can, but of course, they looked so primitive when
    we see where we've come in the last thirty years.
- speaker: Interviewer
  text: Yeah, I agree. I think we all learned HTML skills and did Web sites, and I'm sure our work is still archived on the
    Wayback Machine somewhere if we wanted to go back and take a look at that. So, no, it was a great time, I recall. So,
    at some point in your career, you made a move to Oklahoma, right? Is that—
- speaker: Interviewer
  text: You went to the University of Oklahoma, and then Oklahoma State?
- speaker: Respondent
  text: I did some adjunct teaching for the University of Oklahoma, but my principal employment for the entire time I was
    in Oklahoma was Oklahoma State.
- speaker: Interviewer
  text: Mm-hmm. And that was in cataloging, technical services?
- speaker: Respondent
  text: Eventually, I moved into an associate dean position where I had oversight responsibility for cataloging. I gotta say,
    I myself was never a cataloger. But I'm incredibly grateful to catalogers that I worked with, particularly through some
    system migrations that I was a big part of. I honestly have to say from those migrations, I learned far more about cataloging
    than I ever learned in library school.
- speaker: Interviewer
  text: Hands-on experience, yeah, yeah. So, what drew you to a library leadership position at Oklahoma State? Because not
    everybody wants to do that, certainly. But what attracted you to that kind of position?
- speaker: Respondent
  text: To be perfectly honest, it was an accidental progression. It was not a conscious goal that I had set for myself. My
    first step along that path toward administration was being named a department head. This was very much tied to the changing
    technologies that we were implementing. I might have had some other colleagues who said we were confronted with the transition
    to online journals and periodicals. One day, the wonderful dean of libraries at Oklahoma State at that time, Ed Johnson,
    called me into the office and said, 'I want to create a new department to manage all this online stuff.'
- speaker: Interviewer
  text: Is that what he said?
- speaker: Interviewer
  text: Online stuff?
- speaker: Respondent
  text: All this online stuff. How do we know what we have, and how do people find it? He said, 'We're gonna call the new
    department digital library services.' I said, 'Okay, that's—yeah.' He said, 'And I want you to head it up.' I asked, 'What
    precisely do you envision for the role of this new department, and what are your expectations?' He said, 'I don't know,
    just do something. We need to be able to find this stuff, and we need to create programs to educate our users on how to
    find this stuff.' The department started off as me and one twenty-hour-a-week graduate student. Eventually, the scope
    of what this department was involved in went beyond just managing e-resources to including our digital collections that
    we were developing locally. Things grew from there. While I was head of that department, we were migrating from Notice
    to Voyager, and because of the e-resource component, I was made part of the implementation committee. Then, the associate
    dean who had oversight responsibilities for library systems and technical services retired. I was initially put in the
    position as an interim, and then eventually was the successful candidate for the job. It was not something I had said
    as a career goal or had in mind. I really thought having come into the profession at the age that I was, I would have
    been happy to get promoted and get tenure. I didn't have any real goals or expectations beyond that.
- speaker: Interviewer
  text: So, from the associate dean position at Oklahoma State, then a dean opportunity came available at Florida International
    University, and you became dean there in 2013, I believe. Can you tell me a little bit about that decision making process
    and what motivated you to make that pretty big change?
- speaker: Respondent
  text: It was. There was so much about Florida International University that appealed to me, as well as the physical location
    being in Miami. When I was interviewing for the position, I was asked repeatedly—sometimes in rather subtle ways, other
    times very directly—something along the lines of, 'You do understand that Miami is a really different place to live?'
    Finally, during my interview with the then provost, he posed that question to me, and I said, 'Why does everyone seem
    so concerned about this?' He said, 'I'll give you a very recent example. About three years ago, we recruited two faculty
    in the hard sciences to come to FIU as a team. They've done great work while I've been here. They have been extremely
    successful in grants and publishing and so on. I think it's been very good for them professionally, but they've submitted
    their resignations. They're both moving on because their families just can't deal with Miami.'
- speaker: Interviewer
  text: Oh, really?
- speaker: Respondent
  text: I said, 'Well, my husband's Cuban. We have spent a lot of time in South American countries. We embrace the multiculturalism
    of Miami and what it has to offer. We would make this decision very much with our eyes open and understanding the city
    that we're coming to.' The other key thing for me with FIU was its commitment to transforming students' lives. It wasn't
    just a slogan. The numbers of students at FIU who were first time in college, first generation in their family to go to
    college, every year—commencements were one of my favorite activities throughout the year, and for many years they featured
    what they called Worlds Ahead grads that were profiled. The stories were amazing of what some of these students had overcome
    in terms of how they got to the country in the first place, their economic and family situation. Being part of an institution
    that cared about students in the way that FIU did, at least at that point in time, was very meaningful to me.
