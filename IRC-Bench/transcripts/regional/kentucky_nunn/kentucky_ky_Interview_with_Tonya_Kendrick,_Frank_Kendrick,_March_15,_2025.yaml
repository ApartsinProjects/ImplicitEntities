turns:
- speaker: Interviewer
  text: Okay, uh, we're good to go. So, just to start off with a bit of, like, a softball, could you both, uh, tell us a little
    bit about yourself and, uh, what's your daily lives like, in relation to, like, The Post Clinic and what that means to
    you?
- speaker: Respondent
  text: I'll let you go first, young lady.
- speaker: Respondent
  text: Okay, so I am a general dentist. I was born in Hopkinsville, Kentucky. My dad was in the military for the first five
    years of my life, so we moved around a bit. But moved back to Georgia when I was five. I went to dental school at the
    Medical College of Georgia. Picked a place to live. That was Charlotte, North Carolina. We lived there, I lived there
    twenty-four years? Yeah, twenty-four years. Um, we decided to sell the practices, slow down a little bit, moved back here
    in August and we're trying to consider what we were going to do. And two houses down, a guy named Dan said, Hey, you want
    to come and see The Post Clinic? Came and we did a tour and next thing you know we were hooked up wanting to help out
    and give back to the community. So I work here on Mondays and Tuesdays, um, but I usually will come by here three or four
    times when I'm not working just because this is like family to us, um, all the volunteers and the staff here are just
    wonderful, and that sense of community and giving back is just, is just perfect. And so I leave here every day after seeing
    patients and just feel so rewarded and fulfilled that I have this purpose that I'm, I'm doing something that matters to
    people, and it just--it's so um--it just makes me feel great (laughs).
- speaker: Respondent
  text: I am born and raised in Lexington, Kentucky. I was born, and I, I lived on all the, quote, bad sides of town and went
    to the worst schools, appa--supposedly, but I graduated from Bryan Station High School in Lexington and I went to college
    because I had an engineering scholarship. So I--that's the only way I was going to go is if I could get a scholarship,
    so I was an electrical engineer, for a few years as a major. And then I decided that I absolutely hated it, and I wanted
    to kind of follow my dreams some. And my dreams were to do something in medicine. I would either want to do something
    with surgery or working with kids. And so I decided that what would fit for me best lifestyle-wise was not going to be
    a surgeon's life. It was (laughs) it was not going to be working with sick people all the time. So I opted not for medicine
    from the physician's standpoint and got into dentistry. And then I, uh, so I dropped my--I didn't drop my engineering,
    but I left that behind. It took about twenty-five hours a semester to get the credentials for getting into dental school,
    and then I got into dental school without my engineering degree. So I got accepted early to dental school. Finished at
    the University of Kentucky. I did a residency program for two years doing hospital dentistry at the University of Kentucky.
    So I've seen lots of sick people, people that are infectious disease department. A lot of the kids and--are adults that
    were recently transplanted with bone marrow transplants for the most part and, uh, seen a lot of bleeding disorder patients
    and so that was my primary, um, area of focus while I was doing the hospital dentistry sort of thing and through that
    I decided I hated to work with adults and I wanted to do only working with the pediatric because I had more fun and I
    thought if I'm gonna do this for thirty or forty years I need to have as much fun as I can get away with, and so, so I
    applied to a few, um, graduate schools and selected Ohio State I went there and did my master's degree and my specialty
    in pediatric dentistry. Uh, I came after that joined the faculty at the University of Kentucky but because of the tenure
    structure I was tenure locked meaning I had no place to go to be tenured because the other faculty had those positions
    that were tenure positions so I had to decide, um, either I'm going to go into private practice in Lexington or look for
    a place to go to teach in another university, or just if I'm going to be looking at other universities, I'll just look
    at other private practice opportunities in those cities where I go to look at job opportunities for, you know, for collegiately
    for the faculty positions. And I decided that, um, when I got to Charlotte, North Carolina, it was just, it was just growing
    so fast. I thought University of Kentucky had, um, graduate school for pediatric dentists. They had thirteen pediatric
    dentists living in the city. They were, um, you know, there was dental school here and Charlotte had eleven or twelve
    pediatric dentists and the city is four or five times bigger and I thought, there's no way I can fail here. So I selected
    that over Richmond, Virginia, Indiana. There was just, um, a few places, um, across the southeast. Georgia was in the
    Atlanta area. I went to Texas and Baylor and a few areas, but I selected Charlotte. It's where I met my wife, um, I hired
    her as an associate, and then a year or so later--
- speaker: Respondent
  text: I asked him to marry me (laughs).
- speaker: Respondent
  text: And apparently I said yes, and so--but nonetheless, we had, uh, two pediatric dentistry practices in North Carolina,
    and as we were, as we were considering the exit strategy, there's always the entrance strategy, going to school and [??
    WORD UNCLEAR] and doing a bunch of stuff and owning a business, you've got to have a way to leave it. So she ruined my
    exit strategy. My plan was to sell the business to the associate, but unfortunately she tagged along, and, um, so we,
    we did sell the practice and moved to North--from North Carolina to Mount Sterling in, um, August 2024. And so we've been
    here for several months, um, got licensed in Kentucky and Tanya got hired as the staffed dentist here. And I just come
    in as a--on a voluntary basis for the same days she's here to see patients. For the most part, doing the dental extractions,
    um, I had a lot of experience doing things like that thirty years ago when I was doing hospital dentistry, I cannot believe
    it's been that long, but it just seems to come back. So the daily life here at the--one of the, one of the things I've
    learned most about The Post Clinic that's inspired me is that there is absolutely a servant heart of the, the volunteers
    that come here. They really care about two things that I see that's really important. Providing the care for the patients
    that need the care, and number two, treating them with respect and dignity. I mean, they're so kind and polite, and it
    just fits for the way Tanya and I like to practice. And so, you know, at the end of the day, it's, people are leaving,
    the patients are leaving, and they're saying, You know, that dentist was really nice. They're not talking about me. They're
    talking about her. But I hear the, the comments, or that so-and-so was really nice. They were just nice to me. Apparently,
    people that don't have money or insurance don't get treated very well. And so, you know, philosophically, in the businesses
    we had in Charlotte, North Carolina, we saw patients that had Medicaid. We saw--we gave away a lot of dentistry, I would
    think, probably, on average in a year, probably 400,000 or 500,000 dollars, just, we know they can't afford it. We're
    making plenty of money doing what we're doing. We don't have to be gazillionaires. We have plenty to, to do okay. And
    so I think the, the folks that are volunteering their time here, also they're very qualified and skilled, and they could
    be making a lot of money, but it's clearly not the goal of the folks that are here. And it's just beautiful. It just warms
    my heart that we were able to, of all places, choose Mount Sterling, and then right here, ten minutes away from our house
    practically, is this clinic that--
- speaker: Respondent
  text: All just fell together, like it was meant to be.
- speaker: Respondent
  text: --that wants to give to the community, and it's just wonderful.
- speaker: Respondent
  text: There are hugs given out with the patients in the back. Someone comes in, hey, so-and-so, I--what about your child,
    your this? And, I mean, when the patients cry because they can't believe how nice they're treated here, or they shake
    your hand and just say, I don't know what I would have done if it wasn't for you guys. We laugh back there. I have patients
    that are scared to see the dentist, but they come in and tell me jokes now. It's, it's this whole environment that's just,
    you know, you can't, you don't find that in a lot of places, unfortunately. But here, it's from the time they walk in
    the door. I mean, Louise is out--in here making coffee and passing it out in the waiting room. She's (laughs) you know.
- speaker: Respondent
  text: You can imagine that, right? (laughs)
- speaker: Respondent
  text: Somebody needs something. Do you need a ride? You know, Wilma, she drives people places to appointments. And it's
    just to find that and know that we're here working together with these patients. It's, it's just so rewarding. It's--
- speaker: Respondent
  text: Yeah, the, the f--the folks, the patients here demonstrate a lot of gratitude. And I, you know, who doesn't want to
    keep coming back to help people when, you know, the audience you're providing the care for is so thankful for it, I mean
    it's, and I think more so in this clinic on average than I saw in private practice--
- speaker: Respondent
  text: --I think without a doubt. And sometimes you hear people, allude (??) their illusions that people who get things for
    free don't appreciate it. I don't see that here.
- speaker: Respondent
  text: I see a lot of people that appreciate. They don't have money. They don't have a place to go, I mean--
- speaker: Respondent
  text: They're apologetic that, Oh, it's been a while since I've been to the dentist. Um, great (??), I'm not going to be
    surprised. Or one of our things that we love, we say, There's no judgment here. There's no judgment here. And the patients,
    they feel that, and it's--
- speaker: Respondent
  text: We're here for the same purpose as they're coming. I mean, that's for their health, to try to give them the best care
    possible so they can improve their health. And not just their health. I mean, health is also, um, It's a psychological
    thing. I mean, you know, so someone's image of them self when they come in and their teeth are not nice and you're helping
    them. I mean, first, get them out of pain. And second, they--it's improving their appearance. And man, oh man, do you
    see, I mean, it's, what a value to see in their faces the gratitude.
- speaker: Respondent
  text: They, they walk in the first time like this and then afterwards they're smiling and, you know, we had one patient
    that said, My boss told me today how nice my, my teeth are starting to look and I'm so proud, and--
- speaker: Respondent
  text: And this is a guy, this was--(laughs)
- speaker: Respondent
  text: This is a guy (laughs).
- speaker: Respondent
  text: He was so proud of that. And his boss noticed the difference, you know.
- speaker: Respondent
  text: I think that's pretty cool.
- speaker: Interviewer
  text: So it sounds like you guys heard about The Post Clinic from word of mouth, which is pretty similar to how most of
    the patients hear about The Post Clinic, uh, which I think is pretty great.
- speaker: Interviewer
  text: Sounds like a great community in Mount Sterling. Um, do you have any other specific experiences with providing health
    care to The Post Clinic and patients? We love hearing those stories that you guys told, so if you have any more, we'd
    love to hear.
- speaker: Respondent
  text: Okay. You're the storyteller and jokester. Yeah, you always are telling stories, and--
- speaker: Respondent
  text: Well, I mean, I can just, I think of the patients, and there's like, the demeanor with some of them is different than
    the other ones because they, they are judging themselves with not being able to come. Or we have a lot of patients that
    are in rehab or have had histories with, you know, drug abuse. And they find that there's no judgment here. We're here
    to help them. And, so, I had one lady come in and she just said before I ever got in there, I'm usually so nervous going
    to the dentist, but I don't know just walking in here. I don't feel nervous. And she came back the next week, and we did
    her filling, and then she says, I'm coming back to get my teeth cleaned. I'm so excited. I'm coming in two weeks. She
    came in. We cleaned her teeth this last week, and she didn't have any more cavities, and she says, I'm glad I don't have
    any more cavities, but now I don't get to come back and see you guys for six months (laughs). So we hear that, and we've,
    you know, we've been here long enough now that we've finished treatment plans with several of our patients, and they're
    crying when they're leaving, and we're like, well, you don't have to wait for six months. You can just drop by. We're
    here on Mondays and Tuesdays. Just drop by and say hi. And so it's just, you know, to hear that.
- speaker: Respondent
  text: I've been surprised sometimes, with, well, not really surprised, but I've, I've watched the bewilderment of some of
    the, the patients, particularly that come from The Center that are in the rehab, because they are, I mean, they, sometimes
    have just come out of jail and gone into The Center and it's trying to help them to get off of drugs and trying to kind
    of guide them, get some principles to live by to help them to have a better life and to get away from those kind of problems.
    So they're taking bundles of medicines. Many of them are taking bundles of medicine. But, um, the first, one of the first
    guys I did extractions for, we finished the procedure and I said, well, I mean, I'm going to review all the instructions
    for care so you don't have complications after doing the extractions. We did a few. And so I'm in, and, I'm on the bottom
    of this envelope that has the extra cotton gauze. I'm going to put my cell phone number. He said, what? I'm going to put
    my cell phone number on the bottom of there. If you have any problems, just call me. You're going to give me your cell
    phone number? Yeah. So what are you going to do if you have a problem? You can call me, this is what--you know, you need,
    you need to be able to have that sense of peace that if something's going on and you don't understand what's going on,
    then you can call and I'll help guide you through what you need to do to take care of yourself or see if we need to see
    you again sooner. And so this happens over and over. Every patient that I do an extraction for, they get my cell phone
    number. And over and over that--
- speaker: Respondent
  text: Yeah I'll go to walk them out, Your husband gave me his cell phone number, that was so--I, but I'm not going to bother
    him. I said, you're not going to bother him if you need him. You text or call (laughs)
- speaker: Respondent
  text: I think they're just checking with you to make sure that they, you know, that I'm flirting or something and you--I'm
    giving aw--giving out my cell phone number. But I don't think that's what it is ye
