source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself. So a little bit about your background, your childhood. Tell us who Tracy Pearce
    is.
- speaker: Respondent
  text: Okay. Well, I was born in Middletown, Ohio, so my mom is from Bath County, actually. Preston.
- speaker: Respondent
  text: And my dad is from Menifee County. My dad's deceased. So when they met, he was-- had been in the army. And when he
    got back, he met my mother. And so they got married and moved to Middletown because that's where the work was. So there
    really wasn't much to offer as far as employment in Eastern Kentucky. So he went to Armco Steel and worked there. And
    so I was born there. And so he took an early retirement to move me back here where-- all my family was still here, but
    moved me back here. And so I was 13 at the time when I moved back here. And so I went to Bath County High School and graduated
    there. He wanted me to go to high school here, so instead of Middletown, and they wanted to come home, you know, because
    they'd been waiting all these, apparently, according to my mom and dad, it was-- they waited 25 years to get back home,
    you know, so everybody wants to come home.
- speaker: Respondent
  text: So at first, I wasn't happy about that. You know,
- speaker: Interviewer
  text: 13 years old.
- speaker: Respondent
  text: I was 13 years old, all my friends and everything. And, um, but I definitely settled in, and I loved, you know, just
    the people here made just made it great. And so I've, you know, been here pretty much ever since. I went to--graduated
    Bath County High School--went to Morehead State University, had a Radio, Television and Public Relations Advertising degree.
    And then when I graduated, I went to work in Lexington for basically the cable company selling TV commercials. So it would
    be like ESPN, CNN, things like that. So now we would know it as Spectrum around here. But, at the time, it was TCI is
    what it was called. So I did that. And then they offered me a position in Dallas, Texas. So I did that. So I went-- I
    moved to Dallas and worked in the TV market there. And then after about a year, I basically didn't even recognize I was
    homesick, but apparently I was. It's just all pretty much flat and concrete.
- speaker: Respondent
  text: Pretty much, you know, in Dallas. And I was used to, of course, beautiful Kentucky. So I called home one Sunday, talked
    to my dad, and my dad said, "I got an idea. Pack your clothes, leave your furniture, and come home." And I was like, "I
    can't come home. What are you talking about?" So I did, though. I went the next day to my-- on that Monday, and I was
    Rookie of the Year there, you know. But I went in there and I said, "I want to go home." And he said, "Listen, you can
    go home, but you're not going to leave the company." So they found me a position in Lexington. So I stayed there for another--selling
    TV commercials and other--probably six years. And then I went into radio, which is always my passion. So went into radio
    and started selling radio advertising and did some on-air work as well, which is what is now called iHeartRadio. But,
    at the time, we were bought and sold probably three or four times during that time. So did that for six years. And then
    that was right when the real estate market was hitting hard. I mean, like everyone was selling. It was just amazing. That's
    where the money was, I guess. So I went to-- and sold real estate and went to work for a builder. So, at one time, I had
    probably 50 houses under construction.
- speaker: Respondent
  text: It was [a] busy time. Things were great, that's for sure. But then the market crashed and, um, or, you know, the real
    estate market anyway. But it crashed. And so when it crashed, I was like, okay, now what do I want to do? And my dad was
    not, not well, um, and, you know, lived in Preston still. And so I just knew, you know, with my mom and everything, I
    needed to come home, you know. Again from Lexington. But, you know, actually come home.
- speaker: Respondent
  text: So I found a house on High Street here in Mount Sterling, bought it, and kept my real estate license, and sold real
    estate for a while. But within a year, I worked for the radio station. I went to work at the radio station here locally.
    I walked in and said, "Do you have a job? I got to pay a mortgage so I can move home."
- speaker: Interviewer
  text: This is WMST?
- speaker: Respondent
  text: WMST radio, right downtown. And so-- and they knew me from Bath County and they said, "Absolutely. Come on." And so
    I started working there. And then after a year, the tourism position opened up, and I was able to get this-- the tourism
    position, which I love. And so I went to turn in my resignation and-- to the radio--and the Tourism Commission said, "No,
    no, no, we want you to stay on the radio because it really helps with everything marketing and tourism." And it keeps
    me in the know. And plus, I love it. That's my passion is radio really, and so I did that. And so that's what I've been
    doing now over 15 years. That was January 2009. I started as the Tourism Director, so I've been doing it 15 years almost.
    It'll be 16 come January. Um, but I love it because it encompasses everything that I like. Um, it encompasses marketing,
    which is a passion. But the radio, the television, the print, the people, the organizing events and just trying to make
    the community better. You know, a better place or fun, you know, fun, you know, energetic, probably bring more people
    here. So I love it. Yeah.
- speaker: Interviewer
  text: Let's back up just a bit. What year did you graduate from Bath?
- speaker: Interviewer
  text: And what year did you move to Dallas?
- speaker: Respondent
  text: It would have been--I graduated Morehead in December of 91, so it would have been right--probably--we'll say I worked
    for three months after that, and then I got--and then I got the offer. So it would be this maybe, let's say the summer
    of 92. Yeah. Yeah.
- speaker: Interviewer
  text: And when did you move back here?
- speaker: Respondent
  text: Um, to Mount Sterling?
- speaker: Interviewer
  text: No. Back to Kentucky.
- speaker: Respondent
  text: Oh, back to Kentucky? A year after. Yeah. Yeah.
- speaker: Interviewer
  text: So you came back in '93 and then moved from radio to real estate and then back to radio.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Yeah. So, um, what is it about radio that kind of checks all your boxes? Pushes all your buttons? What is it?
- speaker: Respondent
  text: Completely checks all the boxes.
- speaker: Interviewer
  text: Yeah. What is it?
- speaker: Respondent
  text: Well, I just remember being, well, music. Deep down, it's music. But I just remember being as-- when I could barely
    walk.,I always carried a radio AM radio. Definitely showing my age, but I'd carry an AM radio everywhere I went. So all
    I did was listen to music. And I'm talking sleep with it on. And at one time I had the battery operated one, so I'd have
    to keep batteries going, but I'd sleep with. I mean, I carry it everywhere I go.
- speaker: Respondent
  text: And so. And I always did. And I just always loved the music. I just loved the whole idea that there was a box that
    has all this information and all this music, and it's just fascinating to me. And I love music. I sing, you know, not
    much, but I used to perform more. I used to be in a band and things like that too.
- speaker: Interviewer
  text: You were in a band?
- speaker: Respondent
  text: Yeah, I was.
- speaker: Respondent
  text: This was- well, we named ourselves several different things because if we were asked to be playing country, we would
    be- I think it was-Thunder Run or something kind of- I don't remember the name now. And then when it was, rock nroll was
    considered another name. Um, but I was always--always around musicians. I mean, that's always-- I have a passion for that.
    Um, I grew up, my dad would have bluegrass musicians all come sit in our living room. Mom would cook for them, and they
    would just sit in the living room and play all night long.
- speaker: Interviewer
  text: Now, was this in Middletown?
- speaker: Respondent
  text: Yeah, this was in Middletown.
- speaker: Interviewer
  text: Because there's a strong, huge cultural shift right from eastern Kentucky to that Ohio.
- speaker: Respondent
  text: A lot of people don't recognize that. And I-- and even with the marketing I do today, there's a lot of that.
- speaker: Respondent
  text: And people--when I market to the area of Middletown, Dayton, that area--some, some people are like, oh well, would
    they really drive [to] us? Like one thing, it's easy to get here from there
- speaker: Respondent
  text: And that's so even if they don't know anything about Kentucky, which they would, but if they don't, it's still such
    an easy drive. We can get them to come here and long enough where they could spend the night, which is what we want to.
    But there is that connection because so many people from eastern Kentucky, that's where they went. And really, I'll say
    it, Armco even, you know, but if not Armco, that area.
- speaker: Interviewer
  text: Or another steel mill or another...
- speaker: Respondent
  text: So, and when we lived there, my dad had lots and lots of friends from eastern Kentucky.
- speaker: Respondent
  text: So it's basically like, yeah, we just transport, you know, just got transported there. And so it was a neat thing.
    And I love bluegrass music too. Um, so, you know, I grew up with Paul Mullins, which is a really famous, you know, bluegrass
    musician actually. Um, Tom T Hall. I'm not- I don't remember if he was ever at my house, but I know that-- that he was
    around, um, a lot of times, you know, we would talk about Tom T Hall all the time, but anyway, just that background of
    music. So in high school, we had a Radio Club at Bath County High School.
- speaker: Respondent
  text: Yes. And WMST here, even though there is a station in Owingsville.
- speaker: Respondent
  text: But we would ride up here. Um, and we would do a radio show every Saturday morning.
- speaker: Respondent
  text: And so all my friends in high school and everything, and of course, we would do dedications and everything.
- speaker: Interviewer
  text: Yes. Oh. That's great.
- speaker: Respondent
  text: So-and-so liked so-and-so, and so-and-so wants to know if so-and-so will go to prom or whatever it is. But also we
    there was a real--we called it really famous, but JoJo's Jam Session. I don't know if this rings a bell.
- speaker: Respondent
  text: But very popular when I was, let's say 15 or 16, you know, about that age. Um, but that was something. Now, that was
    at night, and it really was like when, um, kind of the rap music was new. It was, it was soft rap, you know what I mean?
    But to us, it was like, so great. We just. You wouldn't hear it anywhere else.
- speaker: Respondent
  text: So that we all were glued to the radio. So that kind of came back around so WMST, and that's when I was in high school.
    So really, the first thing I thought of when I was looking at that transition of coming home is like, I would love to
    work at WMST, you know, for lots of reasons, but one of them is just I've got a bond there. And so and I've been there.
    Well, now that'll be almost 17 years now.
- speaker: Interviewer
  text: And tell us what you do there.
- speaker: Respondent
  text: Oh yeah. Well I used to do the morning show, so I would be there at 5 a.m. in the morning and would go until about
    12. Um, so Dan Manley, who is a mainstay, um, announcer you know, DJ, everything you can think of, he, um, he would take
    off because he writes for the sports for the newspaper here. So somebody would have to do his morning show because he
    was doing the newspaper. So I would do that. And then also I would come in in the afternoons and do just, you know, weather
    and commercials and things like that. But the morning show, you actually play music. It makes sense. You play music, you
    talk about community events. And really most importantly was the news though. So a half hour newscast on the top of every
    hour, it was a challenge.
- speaker: Respondent
  text: And I was really, uh, thinking I was pretty, you know, used to radio, been on the radio a lot in Lexington and things
    like that. So I wasn't, like, intimidated necessarily. But when you're the only person in the studio at five in the morning
    and at 6 a.m., you have to have a full newscast. And that includes sports, you know, actually news of the day, obituaries,
    which are very difficult names and things like that. So, um, it was a challenge and I did it. And so now it's funny where
    we've got Chris Irwin, who is an absolute the best radio guy in the world. I mean, he grew up in it, loves it. It's his
    passion. And so he is able to do that role now. And so and and frankly I'm happy that he does.
- speaker: Interviewer
  text: Yeah. Yeah.
- speaker: Respondent
  text: So now I'm there from 4 to 6 every day. So I basically end my day at the radio station.
- speaker: Respondent
  text: Which is two blocks from the tourism office, which is two blocks from my house, and two, you know, everything's right
    here. So I enjoy it so much because I stay connected to it. And also, you know, I mean, it's work. I mean, I go in there,
    finish my day. I do have a little time where I can look at the computer and answer some emails and make some phone calls
    if necessary, but, um, I do that every day, 4 to 6. So. Yeah, I love it. I mean, it's just part of what I do, and I don't
    think of it as work
- speaker: Respondent
  text: 00 at night and I'm on a computer working on a new graphic for a new something publication or something for an ad
    for our, you know, our advertising. You know, I don't think about it like, oh, I'm not supposed to be working right now.
    You know, it's a 24--I'll just say it--It's pretty much 24 hour job for me all the time.
- speaker: Respondent
  text: I don't think of--I don't break down it like that. I don't say 9 to 5 or or whatever it is. 8 to 4. I just work all
    the time. But I mean, but and it sounds like I'm being a martyr or something, but what I'm actually saying is that I like
    it that way. That's what I like about it, is that if for some reason my mind is just not on that for some reason right
    this minute, I can go do something else. I'm not a clock in, clock out person. Never have been, we'll never be able to
    be. And that's just how that is.
- speaker: Interviewer
  text: That's great. Well, I mean, it suits you.
- speaker: Respondent
  text: It does suit me.
- speaker: Interviewer
  text: It suits the life that you have here.
- speaker: Respondent
  text: Thank goodness everyone seems to. It suits them too. Thank goodness. You know, because it is hard when I watch people
    9 to 5 jobs. And like I said, I've just never been. That's just not something that's ever been in my blood to do. And
    I get restless and I like to think about something else or go do something else or. But when I see people that do that
    9 to 5 business, I'm like, I don't know how they do it. But then they also don't carry their work home with them.
- speaker: Interviewer
  text: Right, right.
- speaker: Respondent
  text: They clock out.
- speaker: Interviewer
  text: But it sounds like your work really isn't work. It's something you really enjoy.
- speaker: Respondent
  text: Absolutely. And nothing's perfect. You know, I mean, there's ups and downs for sure. And disappointments, but fun
    celebrations too. So it is an absolute
