turns:
- speaker: Interviewer
  text: So, I guess just to start, can you, can you say a little bit about yourself, where you're from, that kind of stuff?
- speaker: Respondent
  text: Sure. So, my name's Lou Hirsch. I'm an assistant professor in the Department of Plant Pathology in the Martin Gatton
    College of Agriculture, Food, and Environment, which is quite the mouthful. And--but I'm not from Kentucky, as most eagle-eared
    listeners could probably hear, I guess. I was born and raised in Phoenix, Arizona. And I lived my youth there and then
    went to college in New Orleans, Louisiana, where I majored in English and Religious Studies, which is quite a different
    set of disciplines of what I'm doing now. And then during my time in college and also a bit in high school and stuff,
    I got real active in scuba diving and I became a scuba instructor and in my summers in college, I got my boat captain's
    license from the Coast Guard, too. So, after college, with my English degree, which is difficult to find gainful employment
    in, I worked in the scuba industry in San Diego. I managed a scuba diving charter company and was very much in that industry,
    worked for a commercial diving company, cleaned municipal reservoirs and stuff in the off-season for the dive boat. And
    then my girlfriend, now wife, got into grad school at the University of Arkansas. So, that was kind of my fork in the
    road. I took that fork and then started working at Mariachi's Mexican Food Grill, serving margaritas to drunk college
    students. And I got real tired of that in like the first week. And then I re-enrolled with my English degree and boat
    captain's license at University of Arkansas as like a non-traditional biology student, because I wanted to do something
    with fish and water. It wasn't any more sophisticated than that. I mean, incredibly naive. And then one morning, because
    we didn't have any money, my wife found a job posting for a work-study dishwasher position in a plant pathology lab. And
    I felt pretty qualified in washing dishes, you know, with all my degrees and certifications. And so, I did that and I
    got in that lab and washed dishes pretty well. You know, just scientific glassware. And then there was a little science
    thing that they felt someone with my background could handle, just a cookbook sort of little science experiment. Did that
    pretty well. And I just kind of kept doing stuff well. And then that kind of manifested into a kind of a 'lean into it
    and just work really hard, but don't think too much' master's degree project. Just kind of a blunt force sort of thing.
    I did that pretty well. And then there was an opportunity to stay in for the lab on a different project for my PhD. So,
    I did that too. And then after graduating, I did a postdoc at the VA hospital in Charleston, South Carolina, at the Medical
    University of South Carolina, doing human genetics research. Because my project when I was in grad school was a plant
    pathologist focused on fungal molecular genetics, which is a bit of word salad, but fungi and humans are really closely
    related genetically. So, the fact that I could do research in fungi with comparatively far less infrastructure than there
    are for humans, it was a pretty easy jump for me to move from fungi to humans. And I worked for the VA hospital, working
    to try and identify different mutations that correlated with suicidality, PTSD, depression, stuff like that, and combat
    veterans as a means for the government to pre-screen recruits to figure out if they have any genetic predeterminants to
    frontline battle issues. And then my wife got in here—I've been following my wife the whole time, that's the thread throughout
    this whole story—and then she got in here. She was able to kind of negotiate a temporary position for me where I was split
    between biology and plant pathology. And then I've kind of made that my own thing. And I was a lecturer for a long time.
    Now I'm assistant professor, and I focus now on undergrad program management, both in my department doesn't have a major,
    but we feed into an interdisciplinary program called agricultural and medical biotechnology. So, it's just kind of this,
    just genetics, but on agriculturally relevant organisms instead of like mice and salamanders and stuff and like that they
    do over in our biology department here at UK. And I do a lot of science outreach to the community. And that's how I think
    I've encountered a lot of the folks kind of in your orbit. And I do some program admin and a lot of teaching.
- speaker: Interviewer
  text: Yeah. So, how long have you been in Kentucky?
- speaker: Respondent
  text: I've been in Kentucky—this is maybe my seventh or eighth year. I'm thinking eighth. One year as a postdoc, five years
    as a lecturer, and then I'm starting my third year as an assistant professor.
- speaker: Interviewer
  text: Okay. Can you talk a little bit more about the community outreach work that you do and some of the stuff that that
    entails?
- speaker: Respondent
  text: Sure. So, it's really focused on middle school and high school science. And I'm kind of coming at this from what I
    maybe not a unique, but an uncommon and I think helpful angle where it's like I never did any of these classes when I
    was a kid. I didn't have an aptitude for science or I never put myself in a position where I could learn if I did, I guess.
    And when I got into science professionally, it was all fun. It was all hands-on, it was in a lab, it was experiential.
    You know, I'd never owned too many science textbooks. But I noticed on the other side of the coin now, when I'm the one
    administering classes to people, it's all or it can be easily all textbook-based, which is so boring. And I don't think
    anyone likes textbook-based stuff. Certainly—or at least in the sciences—certainly scientists don't salivate at cracking
    open the next new textbook to read about it. They don't look at textbooks at all when they're not, you know. So, there's
    this huge disconnect between the process of learning science and the process of doing science. So, all of my outreach
    stuff seeks to kind of bridge that gap and provide teacher-friendly, kind of hands-on, easily accessible things for middle
    school and high school science classes and their teachers to do. Stuff that's not a cookbook lab by any means, because
    those aren't very exciting for the teacher after a while, but stuff that'll work every time. And it allows the students
    to have hands-on stuff and also kind of set up their own experiments in a way that is dependable in a classroom context
    when you have one hour every Friday to do your experiment. Yet, there's a lot of variables that go into kind of compressing
    actual science into a STEM context.
- speaker: Interviewer
  text: So, do these—so, what sort of disciplines are included within this outreach? Is it just ag, ag science related stuff,
    or—
- speaker: Respondent
  text: So, the cool—I'm gonna answer your question with, again, a longer, more verbose answer—what's cool about the agricultural
    sciences, or at least plant pathology specifically, is that we're not one thing. We can't be one thing. Most science isn't,
    I guess, when you really get granular with it. But for plant pathology—even those two words. A plant, everyone knows,
    but pathology is the study of disease. So, you have to know plants, you have to be a little bit of a botanist, you have
    to be a pathologist, so you have to know how to look at symptoms, for signs. You have to be a microbiologist, because
    almost all of the organisms that cause disease on plants—I'm not counting insects, because they have their whole other
    discipline called entomology—they're microscopic. So, we have to work with bacteria, we have to work with fungi, and I'm
    a fungal biologist. Most diseases of plants are caused by fungi. There's microscopic worms called nematodes, there's viruses.
    There are other diseases that have nothing to do with microbes. We call them abiotic, think like nutrient deficiency stuff,
    that's still a disease. So, yeah, my outreach is couched within agricultural sciences, but it's just good old-fashioned
    sort of life science biology stuff. We call ourselves agricultural scientists because we're in a different college. Our
    research is funded by the USDA, you know, instead of other agencies. But it's all the same, just sort of different target
    organisms we work with.
- speaker: Interviewer
  text: Gotcha. Can you give some examples of kind of like the—specifically some of the experiments, outreach experiments
    that you'll run, or—
- speaker: Respondent
  text: Yeah. So, I'll ask you a question. Have you ever had a potato go bad in your pantry?
- speaker: Respondent
  text: Okay. So, great. And probably everyone who has ever owned a potato or two has at some point. So, that's a disease
    called bacterial soft rot. It sounds terrible—it smells terrible, right? So, we don't have very creative names for our
    diseases. So, it's caused by a bacteria or bacterium, its symptoms are a soft rot, so that's it. And these bacteria are
    present in the soil, they're everywhere. We could go and take a spoon outside the Nunn Center right now and find some
    of these bacteria. They just eat old dead plant stuff. And they coat the exterior of the potato, from Idaho or wherever
    we got them from. When you buy them at home, then you get a bag, right, and they're in a plastic bag probably. And they
    sit on the bottom of your pantry or something, where over time, there's gonna be a potato that's pressed against that
    plastic bag. And then that allows a little bit of water to build up, because potatoes are still alive, so they're gonna
    be transpiring, so there's a little bit of moisture coming out of them. So, when you have a potato against that plastic
    bag, eventually you're gonna get a film of water, and these bacteria need water to start reproducing. So, at some point,
    they reproduce to the point where they can infect the potato, get in there, and they start breaking down—like, potatoes—if
    you think about cells like bricks, there's a type of chemical called pectin, which is the mortar. It keeps the bricks
    together in a potato. We use pectin a lot for jams and stuff like that, because it thickens things. These bacteria like
    to eat pectin. So, it's kind of like if you had a brick wall, but there was no bricks, or sorry, no mortar. It'd be great
    looking at it, but if you pushed it, it would collapse, because there's nothing keeping the bricks together. It's the
    same thing for soft rot. The potato looks fine until you touch it, and then it just gets all squishy because the cells
    collapse because there's nothing sticking them together. So, it's a long story. But these are bacteria that are present
    on every single potato that anyone buys ever, and they're really easy to culture, because all you have to do is just cut
    a potato in half, put them in a Ziploc bag with a bit of water, wait a week, and it's just mush. And there's trillions
    of these bacteria in that liquid. These bacteria are also pathogenic to probably every plant, in the right circumstance.
    So, then a middle school science teacher can just have one gross, ooey-gooey bag of potatoes, take a toothpick, kind of
    swoosh it in there, and then use that bacterium-inoculated toothpick as a source of pathogen to do other experiments on
    potatoes or onions or squashes. And you could then allow the students to start thinking about, well, like, would an apple
    be different than a potato? They're both energy storage tissues of a plant. But like, what's different from an apple to
    a potato? Well, potatoes have evolved to be underground, so they probably have some defense mechanisms against these things.
    Apples are sweet. They have acidity in ways that potatoes don't. So, based upon the amount of plant products that the
    teacher could buy at Kroger and how comfortable they are helping their students come up with hypothesis-based experiments,
    it's really the students who kind of do whatever they want and get some results. And I find that that is exciting for
    the students because they have ownership in the process. And it's exciting for the teacher, too, because they don't know
    what's gonna happen. And that's a little bit scary, too, pedagogically. But if you can focus on the process of science,
    not the outcome, then you can talk about the process to every single grade. It doesn't matter what they did. It doesn't
    matter how they did it. And that's just fun because I don't know—and every year, I always do this with some of my undergrad
    classes here at UK. It's no different when I do it to sixth graders than I do it to 22-year-olds. It's the same experiment.
    I don't tell them that, you know. But yeah, it's the same thing. And I'll go to Kroger at 6 o'clock in the morning before
    I come to school, and I'll spend 200 dollars on produce because I got a budget for my lab classes and stuff. And it's
    just two shopping carts overflowing with whatever I can. And if there's always a little tropical section. So, I always
    try and get something weird to me, you know, dragon fruit or something. And then it'll be, I don't know what's gonna happen.
    And so, that's also fun for me because I get bored, too, getting in a rut with the same things. And there's several different
    examples of stuff like that. But it's easiest, in my experience, to use—we call them post-harvest pathogens or post-harvest
    diseases, everyone else calls them just spoiled food—to use those microbes that cause food to spoil as a source of inoculum
    to set up experiments. Most normal people throw them away. Plant pathologists and some science teacher is like, 'ooh,
    we can do something with this.'
- speaker: Interviewer
  text: Wow, that's really, that's really great. So where—what are the different sorts of places that you've done this sort
    of outreach stuff? Is it across the state, or—
- speaker: Respondent
  text: Yeah. So, just because I'm in Kentu
