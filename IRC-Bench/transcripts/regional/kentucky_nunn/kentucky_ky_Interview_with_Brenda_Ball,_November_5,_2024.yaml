collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So we're sitting in this incredible home here. Can you tell me what about this house? What is this?
- speaker: Respondent
  text: This house was built by Doctor John Berry. He built this house in 1809. He was a very prominent person in our community.
    He didn't marry, didn't have any children. I bought the house in 2005.
- speaker: Interviewer
  text: How much land came with it?
- speaker: Respondent
  text: I have 120 acres.
- speaker: Interviewer
  text: What does an antiques dealer need with 120 acres?
- speaker: Respondent
  text: The love of the land. I actually do antique shows here. I do five shows here on the farm a year.
- speaker: Interviewer
  text: And you have people come into this home?
- speaker: Interviewer
  text: And they purchase antiques?
- speaker: Interviewer
  text: And you have a house up there. Is that where you all live?
- speaker: Respondent
  text: Yes. That was the tenant house. When we bought this farm, we lived there first in the tenant house. It took me seven
    years to do this house. After we got it finished, we moved here. Then after I was empty nest, we moved back to the tenant
    house.
- speaker: Interviewer
  text: How much work did you have to do? Was it in disrepair?
- speaker: Respondent
  text: It didn't have a roof. It was in deep disrepair. Very deep.
- speaker: Interviewer
  text: This house is amazing. Pre-Civil War, I mean.
- speaker: Interviewer
  text: When you first saw it, what did your husband say?
- speaker: Respondent
  text: He said, 'Absolutely not.' He knew there was going to be too much. I said, 'It don't hurt to pray to God.' On Monday,
    we bought it.
- speaker: Interviewer
  text: Have you ever regretted that decision?
- speaker: Respondent
  text: Maybe. No. We put in a lot of sweat, tears, and years. We didn't take vacations. We put everything we had back into
    the house. That's why it took so long. Now that the kids are gone, I probably wish I had done more time.
- speaker: Interviewer
  text: Tell me about your background. Are you from Bath County?
- speaker: Respondent
  text: I am from Mount Sterling. I was born and raised there.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was raised at the Levee and born in Mary Chiles Hospital.
- speaker: Interviewer
  text: When did you move to Bath County?
- speaker: Respondent
  text: In 2006. I bought this farm in 2005. We stayed until my son graduated high school.
- speaker: Interviewer
  text: This has been your dream?
- speaker: Respondent
  text: It was. After we bought this house, someone offered us quite a bit of money to walk off and leave it. I told him,
    'Money don't buy dreams.'
- speaker: Interviewer
  text: What did you do before?
- speaker: Respondent
  text: I worked in a factory when I was young. Then I had babies and couldn't afford a babysitter. I rented a building for
    two months to see if I could make it as an antiques dealer, and I could, so I bought a building.
- speaker: Interviewer
  text: What year was that?
- speaker: Respondent
  text: 2000 or 2001.
- speaker: Interviewer
  text: Was that the beginning of your life as an antiques dealer?
- speaker: Interviewer
  text: Had you always been interested?
- speaker: Respondent
  text: I've always loved it and went to auctions. A good friend and neighbor from Texas showed me the stuff and took me to
    antique shops. I just fell in love with them. She had every Country Living Magazine and let me take five at a time to
    look through. Her name was Diane Williams. She was a sweetheart.
- speaker: Interviewer
  text: So in 2001, you started?
- speaker: Respondent
  text: Yes. I bought a building in Frenchburg, Kentucky, because I lived in Jeffersonville at the time. I did that until
    my baby started kindergarten, then I sold it.
- speaker: Interviewer
  text: What was the name of the store?
- speaker: Respondent
  text: Raggedy Treasures.
- speaker: Interviewer
  text: Where was it?
- speaker: Respondent
  text: Main Street, Highway 460, Frenchburg, Kentucky.
- speaker: Interviewer
  text: Where did you go from there? Did you come here?
- speaker: Respondent
  text: We bought this farm in 2005. We moved everything here and had a shop in the little tenant house.
- speaker: Interviewer
  text: What does your husband Clifford do?
- speaker: Respondent
  text: He helps me on the farm. He's a farmer.
- speaker: Interviewer
  text: Tell me about your year as an antiques dealer. When do you start?
- speaker: Respondent
  text: I start in March. I do Vintage Market Days in March, a Spring Fling show here, then Vintage Market Days at the Kentucky
    Horse Park. In April, I do a garden show here and Vintage Market Days in Xenia, Ohio. In May, I do another show here called
    Red, White, and Bloom and other shows throughout Kentucky. I don't do shows in June or July. We start back in August.
- speaker: Interviewer
  text: How many shows do you do a year?
- speaker: Respondent
  text: About twelve.
- speaker: Interviewer
  text: What's the biggest one you do?
- speaker: Respondent
  text: At Kentucky Horse Park or here. They run close together.
- speaker: Interviewer
  text: Do you judge success by people or sales?
- speaker: Respondent
  text: I judge success by the people. Sales are always good. One year it was seventeen degrees for our Christmas show in
    the barn, and people lined up waiting to get in. To me, success is the customer.
- speaker: Interviewer
  text: You have relationships with customers?
- speaker: Respondent
  text: Absolutely. Clifford is amazed by the output. At Vintage Market Days in spring, people lined up from here to the car
    waiting to check out. Our host took pictures of me. I'm local, so people know me.
- speaker: Interviewer
  text: A friend told you, 'You have to buy cheap to sell cheap'?
- speaker: Respondent
  text: Yes. A happy customer is a return customer.
- speaker: Interviewer
  text: How do you prep for a show?
- speaker: Respondent
  text: I package everything. I buy stuff most people would throw away and reuse it. I do old frames, vintage Christmas, primitives.
    I'm one of those who will dig right under your feet at a yard sale. It doesn't bother me.
- speaker: Interviewer
  text: You have an eye for it?
- speaker: Respondent
  text: Yes. My daddy says I can find a needle in a haystack.
- speaker: Interviewer
  text: What are you looking for?
- speaker: Respondent
  text: Something that catches me. I think I got double-dipped in imagination. I see many things I can make out of something.
- speaker: Interviewer
  text: Reading every Country Living was an education?
- speaker: Respondent
  text: Yes. Diane was the sweetest lady. They moved back to Texas, but we're still in contact. She inspired me. She had a
    room full of Raggedy Ann stuff because she loved it as a child.
- speaker: Interviewer
  text: Is that how your shop got its name, Raggedy Treasures?
- speaker: Interviewer
  text: What is your shop called now?
- speaker: Respondent
  text: Ball-Tiques, because this is Ball-Tara Farm. It got its name from Scarlett's dream on Gone With the Wind, and this
    was mine.
- speaker: Interviewer
  text: How do you transfer all your antiques to the Kentucky Horse Park?
- speaker: Respondent
  text: I do a theme for each show. For spring, it's gardening stuff like flower pots, iron furniture, picture frames. Everything
    has a theme. I only take items that fit the theme.
- speaker: Interviewer
  text: Do you have a trailer?
- speaker: Respondent
  text: Yes, I have a trailer. I pack only the theme items. It works best for me.
- speaker: Interviewer
  text: Are you the only one working on the shows?
- speaker: Respondent
  text: Absolutely. Clifford helps load and unload but doesn't have the eye. I do all the setting up, tearing down, packaging,
    painting, cleaning, and fixing. I'm a carpenter's daughter, so I can make anything.
- speaker: Interviewer
  text: How long does it take to set up?
- speaker: Respondent
  text: About an hour and a half to two hours, depending on the show size. At Kentucky Horse Park, I do a two-space show.
    At Xenia, a one-space show. At Court Day, I have three spaces.
- speaker: Interviewer
  text: When did you start selling at Court Day?
- speaker: Respondent
  text: About six years ago.
- speaker: Interviewer
  text: You have three spaces. Is that three parking spots?
- speaker: Respondent
  text: Yes, three parking spaces.
- speaker: Interviewer
  text: Who do you rent from?
- speaker: Respondent
  text: I rent from the city of Mount Sterling.
- speaker: Interviewer
  text: Where exactly are the spots?
- speaker: Respondent
  text: I'm right behind the Athletic Club in city parking, on the corner in Wilson Alley.
- speaker: Interviewer
  text: Has that been good? Have you been there the entire six years?
- speaker: Respondent
  text: Yes, I love it. They put us there so customers can back down Wilson Alley and load out furniture. It's the only place
    they can do that.
- speaker: Interviewer
  text: It's been good?
- speaker: Respondent
  text: Very good. It's like a homecoming because I was born and raised there. Where I live now, there are no neighbors, so
    I don't see or hear from many people.
- speaker: Respondent
  text: Getting to know Mr. Botts, our little mayor in Mount Sterling, he does a very successful job. Most people don't realize
    I'm up there at 6:00 in the morning when we're doing a show, and they are out sweeping streets, putting out trash cans.
    It's amazing what they do before anyone sees it.
- speaker: Respondent
  text: Our city boys sweep, put out trash cans, and clean outhouses three times a day. When I was a kid, those outhouses
    were awful.
- speaker: Interviewer
  text: You were born in Montgomery County and probably went to Court Day every year?
- speaker: Respondent
  text: Absolutely. Except when I was very little, my mom and dad would go. They met at church, so I thought they were going
    courting when they went to Court Day, but they were actually going to Court Day. I thought they were going to church a-courting
    because that's how they met and started courting. I would have been mad if I'd known. But I love it. I've been going for
    many years.
- speaker: Interviewer
  text: What were some of your memories as a child?
- speaker: Respondent
  text: The best things are the elephant ears. The church made the best elephant ears, the country ham sandwich, and the Cattleman's.
- speaker: Interviewer
  text: Do you remember the church that did the elephant ears?
- speaker: Respondent
  text: No, it was down on Railroad Street on the railroads.
- speaker: Interviewer
  text: Did you go with your family or a group of friends?
