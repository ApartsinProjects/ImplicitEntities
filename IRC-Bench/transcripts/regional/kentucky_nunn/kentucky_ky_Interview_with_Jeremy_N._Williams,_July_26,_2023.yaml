turns:
- speaker: Interviewer
  text: One of the things I would like very much for you to consider doing is telling us about your family.
- speaker: Respondent
  text: Okay, yeah. My wife Robin, my daughter Ava, I have to thank them as well because of--they put up with my love of history.
    They put up with me dragging them from point to point to look at this, so they also get to hear stories of Benham, and
    I guess I could say I practice on them from time to time. So they understand it, thankfully, and I appreciate them listening
    to me and being drug from spot to spot--[laughs]--as we roam around the region.
- speaker: Interviewer
  text: Give me the background of your wife.
- speaker: Respondent
  text: Okay. My wife's an educator and--
- speaker: Interviewer
  text: Okay, and her full name again?
- speaker: Respondent
  text: Robin Williams.
- speaker: Respondent
  text: And she's an educator, and she--her father, grandfathers were coal miners as well. Her dad actually, actually worked
    here--
- speaker: Interviewer
  text: What was his name?
- speaker: Respondent
  text: At Benham. Her dad's Frank Orick is his name.
- speaker: Interviewer
  text: Oh, Frank Orick, yes.
- speaker: Respondent
  text: And so he worked here at--I guess it was under--it would've been under Benham Coal at the time. So it would've been
    the early '80s, early to mid-'80s when he worked here. He worked some with engineering, setting spads in the mines, that
    sort of thing, so--
- speaker: Interviewer
  text: Well, that's interesting. And your daughter, Ava, how old is she?
- speaker: Respondent
  text: My daughter Ava's five, so she starts kindergarten this fall.
- speaker: Interviewer
  text: Oh, this is exciting.
- speaker: Interviewer
  text: This is an exciting--
- speaker: Interviewer
  text: Time. Well, yesterday, one of the topics that we had discussed was the Benham housing and the Benham mines, and what
    I would like to do is more fully discuss the closing--
- speaker: Interviewer
  text: --of the Benham mine, and if known, describe that time. I believe we're talking about the mid-1980s, is that correct?
- speaker: Respondent
  text: Yes ma'am, the official closing, you know--yeah, we talked a little bit about the housing yesterday, and I'll just
    kind of segue into this. You know, as we know, the houses were built for the workers and what eventually became the town,
    which was very interesting that we've learned along the way. But as the company moved into the '70s, we started to see
    International Harvester as a company, not just Benham, just as a large company. Large company started to have issues financially.
    So that was one of the onsets of it. I guess you could say it started probably in the early '70s. In 1977, International
    Harvester sold the Wisconsin Steel Company to a company out of California that had no steel-making experience. It was
    a company by the name of Envirodyne, and when Envirodyne bought--when they purchased Wisconsin Steel, which that's what
    the company--that's what the steel mill--the company--or Benham fell under the steel mills. The coal works here fell under
    the steel mills, as we discussed earlier. So when they sold the Wisconsin Steel, which included the steel mills in Chicago,
    it also included the mines in Benham. They sold it to Envirodyne. That's E-N-V-I-R-O-D-Y-N-E. So they sold it to them
    and they--seems like the--they paid fifteen million up front, and I think there was a note of fifty million at that time
    in 1977 at the sale. So officially due to the sale, at that point, there was a change in things. You had a general superintendent
    up until this time, and the general superintendent before the city was actually incorporated, I guess you could say they
    were the mayor. They were the person that--they were in charge of everything. If it was the water plant, it was the construction
    crew, miners underground. They were in charge of everything, as their role as general superintendent. And then there was
    also mine superintendents and there was people under them. But they had kind of been the mayor of the town before the
    town was incorporated. So at that point in time, it was--began a phasing out of the general superintendent, although the
    general superintendent wasn't doing what it--I guess you could say the original intent prior to incorporating the town,
    the general superintendent position kind of phased out and became a general manager position of the mines because they
    no longer had a town to run in 1977. So it became a general manager. So the office of general superintendent had changed
    after the town of Benham was incorporated.
- speaker: Interviewer
  text: If I may, I want to jump back for jump a moment--
- speaker: Interviewer
  text: Because I want to talk about why the financial downturn and ultimate downfall? Which I believe will go back to the
    production of steel, but then has an impact on Benham.
- speaker: Interviewer
  text: I can remember in 1958, right before Christmas, there was a huge layoff of miners at Benham. This was duplicated again
    in 1959, and I have always considered that in retrospect as being the beginning of the fall of International Harvester
    and the closing or selling of Benham.
- speaker: Interviewer
  text: As you look at this historically, what are your observations about what happened? Was it demand? Was it technology?
    Was it foreign production? What were the various reasons that IH began to falter?
- speaker: Respondent
  text: I think as a whole, it was-- when you look at the parent company of International Harvester, when we think of International
    Harvester, we think of farm machinery, tractors, the Farmall tractors, the farm machinery. That was their intent. And
    then they dabbled in automobiles in the nineteen-teens. But then the Scout came about, trucks, machinery, school buses.
    The Scout, I heard--I saw a slogan not too long ago that said the Scout was the original SUV, and it was one of the first.
    So, you know, that was--the Scout was popular. But there were a lot. You know, pickup trucks, things like that.
- speaker: Interviewer
  text: Do you--were there trade names other than the Scout? And you mentioned Farmall for the tractor.
- speaker: Respondent
  text: Farmall tractors, then you had a Travelall, which was kind of a little bit longer Scout, little--had a more of a storage
    area, had a--it was a little bit more roomy, had a longer wheelbase on it. And then there were kind of different designs
    of the Scout, and that--what we now refer to as SUV, kind of that--there were different designs. Some of them had removable
    tops. Some of them were--you know, make them convertibles with the soft top, things like that. So then you had the pickup
    trucks. You had the different sizes of pickup trucks. You--
- speaker: Interviewer
  text: What were they named?
- speaker: Respondent
  text: They were a pickup, but I'm--I don't remember the name right off hand. But they would've come in things like half-ton,
    three-quarter-ton, one-ton pickups that you would typically see on the market today by some of your larger manufacturers.
- speaker: Interviewer
  text: So did the demand for these products simply reduce, disappear?
- speaker: Respondent
  text: And that's what was seen at International Harvester is the--they went from being the number-one farm implement, farm
    equipment manufacturer to--in the--started in the '60s, early '70s, and they were--it was all they could do to hang onto
    second and third place, so to speak. So they were being out-competed by competition.
- speaker: Interviewer
  text: Do we know which companies were coming strong?
- speaker: Interviewer
  text: Better marketing--
- speaker: Respondent
  text: I'm not sure. It could've been better marketing, something like that. I think there was a lot of things that went
    into the downturn of International Harvester as a whole, not just one specific item.
- speaker: Interviewer
  text: So we're talking about from the 1910s until the 1960s. So we have about fifty years of great profitability within
    IH because of its steel production and manufacturer--
- speaker: Respondent
  text: Yes ma'am--
- speaker: Interviewer
  text: --of these--of the farm equipment and the Scout and other trucks. So then competition enters in the 1960s. Tell me
    what you think happened at that point, or historically, what evolved?
- speaker: Respondent
  text: And I think--when I say competition as well, it's probably not necessarily competition against the product that was
    made, but it all goes back to that steel mill, which affects Benham, and which in turns--in turn, it's--you have layoffs
    because not as much steel is needed, and I think one of the things that happened is you started seeing steel produced
    cheaper overseas. At this point in time in the '60s, early '70s, International Harvester was--they were actually building
    farm machinery overseas that--at one point in time, my family owned a tractor. I think it was built it '74 and it was
    built in England. So we were seeing some overseas production of International Harvester tractors, farm implements, just
    because of the prices of steel, that steel could be made cheaper. They were finding that steel could be made cheaper overseas,
    used overseas, or imported into the states.
- speaker: Interviewer
  text: Well, you mention England, and I think, of course, about the coal mines, the Welsh coal mines. So what other countries
    were they producing--was IH using?
- speaker: Respondent
  text: I do know that England was one of them, and I'm thinking that may have been the only other country that they used.
    That's the only one that I've been able to research and find was England.
- speaker: Interviewer
  text: And then what evolved?
- speaker: Respondent
  text: So, you know, you're looking at the end of the '70s. The steel mills had not been updated. International Harvester
    had not updated the steel mills, and it was probably due to a couple of factors, the steel mills not being updated due
    to the lack of money coming in, the lack of steel production out of the steel mill. And so the steel mills were kind of
    falling down under themselves, falling down around, you know. So there were issues with that. Just--they were rusting
    away, I guess you could say, even into the '70s. So I think that's-- in my opinion, I think that's what happened is--and
    everything that I've read with the company is when the steel mills began to fade as well, that's what affected what took
    place in Benham.
- speaker: Interviewer
  text: Well, that would make sense because if they don't need the coke any further, then they don't need the coal.
- speaker: Respondent
  text: Exactly. So basically what was happening is they--International Harvester was backing off the coal production because
    they were backing off steel production at home. And this wasn't just happening at International Harvester and Wisconsin
    Steel, I should say. This was happening in places like US Steel, Bethlehem Steel, Inland Steel. These were companies that
    had coal mines, and so we were starting to see that, even at--on a larger scale at other steel manufacturers in the late
    '60s, into the '70s.
- speaker: Interviewer
  text: Did Bethlehem Steel have its own coal mines as well?
- speaker: Respondent
  text: They had mines. They had mines in Jenkins. I do know they had mines in Jenkins, Kentucky, which is just across the
    mountain.
- speaker: Interviewer
  text: Absolutely. [laughs] So that brings us forward, then, as we say, to the sale to Envirodyne in what year again?
- speaker: Respondent
  text: That was in '77.
- speaker: Interviewer
  text: Now, we say that there was a sale of Envirodyne with an outstanding note of considerable sum. What was the history
    from that time forward?
- speaker: Respondent
  text: So I think what--the research that I've done is the--International Harvester sold to Envirodyne. The Wisconsin Steel,
    which would be the steelworks, they sold it, and that was in '77. Envirodyne paid fifteen million in cash, which they
    had fifty million in note. Envirodyne had plans to upgrade the steel mills and--which never happened. Now, they did--they
    were able to start to improve things. I won't say they were making a profit, but they improved things initially at the
    steel mill. There were some issues along the way with the payment on the note, and therefore International Harvester basically
    foreclosed on the note and retained the steelworks, which included Benham, and I think that was in about 1980 or '81.
- speaker: Interviewer
  text: So if they were retaining the steel production, the mills, then that, of course, meant Benham.
- speaker: Interviewer
  text: When we're talking about this '77 to approximately '80, '81 period of time, what was happening in terms of the mining--in
    the mining that was happening in Benham during that time? Were there layoffs? Was it full production? What was happening?
- speaker: Respondent
  text: There were multiple layoffs. As part of the agreement between International Harvester and Envirodyne, Envirodyne through
    the steel mill would continue to provide steel to International Harvester. The mining, they were still mining during that
    time. They did not--I don't think they opened any new mines at that time, maybe one. But mining still took place. There
    were layoffs. There were hire-backs, there were layoffs. That became more numerous than it--than it had in history, but
    we were also seeing that in a lot of those mines. Like I mentioned, the past--some of those steel, those--I won't say
    captive steel mines, but some of those steel mines. At that point in time, due to the steel mills fading and not needing
    as much coal, Benham at that point in time was, for that first time in history--when I say Benham, the company, the coal
    company--
- speaker: Interviewer
  text: Wisconsin Steel?
- speaker: Respondent
  text: At that point in time--Wisconsin Steel, at that point in time, for the first time in history, not all the--not the
    entire batch of coal was going to Chicago. At that point in time, it was being put on the spot market or contract, and
