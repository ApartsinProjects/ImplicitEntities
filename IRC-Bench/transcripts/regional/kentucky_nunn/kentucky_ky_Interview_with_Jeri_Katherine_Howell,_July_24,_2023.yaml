collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Do you go by Jeri Katherine, by the way?
- speaker: Respondent
  text: I go by either.
- speaker: Interviewer
  text: So, Jeri, just to start, how are you today?
- speaker: Respondent
  text: I am, like, really curious about the kinds of questions you're gonna ask me. And I'm feeling good. My Mondays - I
    reserve Mondays for, like, creative work. So, this feels very much in line with that. And feeling excited. Had three cups
    of coffee, so a little jitter inside.
- speaker: Interviewer
  text: I'm doing well. I'm also excited about this interview. So, I usually like to start with a little - some biography.
    So, tell me a little bit about yourself.
- speaker: Respondent
  text: I'm from Frankfort. I was born here and grew up on, like, a hobby farm in the more rural side of Franklin County,
    on the west side. I grew up exploring the farm and scream singing to the fields and dancing and being very expressive
    as a child. Making music with my sister, making art with my sister, going to my brother's baseball games. I grew up in
    a household very focused on family and supporting each other's interests and talents. My parents really encouraged me
    to cultivate all my creative interests, like visual art, dance, music, playing guitar, writing songs, and performing.
    That cemented in my life how I experience the world and community, through music. I'm also a mega nerd. I've always loved
    school, research, and learning new things, especially ecology, sociology, and history. I love human-nature interaction
    and culture. I love Latin American culture and Kentucky's vast diversity of cultures. I love speaking Spanish and did
    a lot of work with the Backside Learning Center in college, running an after-school program for immigrant and migrant
    youth in Boyle and Mercer counties, bringing arts and music as a way of building community. I'm very rooted in Frankfort
    and Franklin County, in the geography and ecology of the creeks and the river, which is very green and inspiring to me
    as an artist and human being, but also being the capital. In high school, I would get out of class and go lobby and attend
    every I Love Mountain Day I could. That was huge for my development as a teenager and identifying as an activist young
    in my life. It was easy to plug into community initiatives growing up here. I have a very strong sense of community here
    and that's why I came back after some time away. I'm married; it's my five-year anniversary this year. Married to Nat
    Colton and we play music together a lot. We have a dog, who is upstairs. We both love plants and animals and have a ton
    of native plants in our yard. We live in a little carriage house and love to live interconnected with our neighbors and
    the environment and live a good life.
- speaker: Interviewer
  text: Can you talk just a little bit about your educational background? You got kind of a cool educational journey.
- speaker: Respondent
  text: 'I went to preschool in downtown Frankfort and then first through eighth grade at a Catholic school downtown. Growing
    up with a Catholic education impacted my life in many ways, some really awesome and some not. Being physically downtown
    gave me an early sense of independence because after school and middle school I could walk downtown to the coffee shop
    and hang out with friends or go on field trips within downtown. I really got into studying and sharing my own ideas and
    music during middle school. For high school, I went to Frankfort High, a public school within the city limits, which was
    a bit of culture shock coming from a private Catholic school. It was much more diverse and I experienced people with very
    different lives from me in a more intimate way every day. I loved it. The school had a rich culture and was very rooted
    in the community. I developed a lot of my environmental activism in high school, took as many AP and independent study
    classes as I could, and went to the capitol as much as possible. I participated in Kentucky Youth Assembly and Kentucky
    United Nations Assembly with the YMCA and did the Governor''s Scholars Program, which was important to meet people across
    the state who cared about social and environmental justice issues. After high school, I went to Centre College and majored
    in environmental studies and Spanish, minored in Latin American studies. I studied abroad in Merida, Mexico and Antigua,
    Guatemala, including rural areas of Guatemala. Every summer I did internships with nonprofits: first in Frankfort developing
    a community forest environmental education program, then at the Backside Learning Center at Churchill Downs working with
    migrant workers, and finally with the Nature Conservancy in Louisville helping run their youth program and urban forestry
    program. I was also involved with the Folk Ensemble and Kentucky Music Ensemble, which helped me get through school. I
    toured the Northeast and later went to Japan with the Kentucky Music Ensemble as an alumna. After Centre, I took about
    five years off to unlearn and grow. In 2020, I started a graduate program in Community and Leadership Development at UK,
    something I had my eye on since undergrad. The program was funded, which was important to me. I did it through the pandemic
    and graduated in 2022. Most classes and my research assistantship were online, which was different but worked well because
    I maintained my job as assistant director at Josephine Sculpture Park. It was a weird time but I learned a lot and met
    incredible people.'
- speaker: Interviewer
  text: Yeah. That's a really cool educational journey. You've done some super impressive things. I can sense that you identify
    as a musician, maybe first and foremost.
- speaker: Respondent
  text: I feel like it's much broader than that. I've used many umbrella terms like community builder and cultural organizer,
    which better encapsulate all the things I do including being a musician. Artist feels broader. I look at my community
    work as a creative practice, so sometimes it feels easier to say I'm an artist. When people ask about my art, I usually
    say singer-songwriter. I'm a hyphen person. One thing I didn't mention is that after school I received a Fulbright English
    teaching assistantship to Costa Rica for 10 months. I applied to Costa Rica because I wanted to come back to Kentucky
    and learn from what Costa Rica was doing as a country, get to know local communities in the school systems, learn about
    their environmental education, educational policies, health care, and what it's like to live there. Costa Rica is about
    half the size of Kentucky. It was eye-opening and I applied a lot of what I learned more in my personal life. I also learned
    about issues with the United States and our approach to public affairs. I didn't realize the program was part of U.S.
    public diplomacy before I went. So, I learned a lot about the U.S. being there too. There's a whole other topic.
- speaker: Interviewer
  text: You just said that you consider your community work as creative practice, which I would love for you to unpack that
    statement.
- speaker: Respondent
  text: I have been really grateful for the work of Adrienne Marie Brown in putting to print thoughts and feelings I've had
    my whole life, feeling validated in talking about community as ecology and joy. Through her books and blogs and some of
    my grad school research exploring the concept of nature, more-than-human nature, community, and ecology, I have solidified
    my concept of community. I keep coming back to the idea that the quality and diversity of our connections determine our
    resilience and ability to adapt to adversity or challenge. Quality and diversity means several strong-rooted relationships
    with people, place, other species, whatever, that allow us to adapt. This is similar to ecology where more diverse habitats
    allow species to adapt to disturbance and change. These are ancient ideas not taught due to white supremacy and colonization.
    I had to work to verbalize them because they felt radical or like I was insane, but more people talking about it publicly
    made me feel validated. Particularly now, as an artist and community member, I think a lot about arts and music as medicine.
    We are in a trying time with climate change, political challenges, the pandemic, and its repercussions. As a community
    builder, I think that it—
