turns:
- speaker: Interviewer
  text: Tell me a little bit about your family origins, where your parents are from.
- speaker: Respondent
  text: My family origins, my--actually quite interesting. My father was born in France. We have a Polish Jewish family. My
    grandfather was a man of great vision that left Poland because he thought that Eastern Europe wasn't for the Jews. Then
    he went to enlightened France, and then before the war, before the war, he realized that enlightened France was not so
    enlightened. So he picked up his whole family and moved to Australia, which was as far away from Europe as he could get.
    That's my father's side of the family. My mother's side of the family is almost the exact opposite. We recently discovered--we
    always thought they were free men that came out to Australia, but we seem to have been misled. It appears that my mother's--my
    mother's paternal side of the family came out as convicts from England in the 1830s.
- speaker: Respondent
  text: And so--yeah, so that's a pretty mixed bag. (both laugh) That's my family. I, I , I come from a family of food. That's
    to say that we owned a restaurant in Melbourne. My father was a chef and also a--what I describe as a food explorer. I
    hate the word foodie so I called--
- speaker: Interviewer
  text: --tell me why--
- speaker: Respondent
  text: --'cause it's so boring, it has no meaning. It's, it's passe. I like to call myself a food explorer or a food adventurer.
    Food adventurer is probably even better, and I certainly got that from my father.
- speaker: Interviewer
  text: I like that.
- speaker: Respondent
  text: Yeah, a lotta people, lot of people, have, have liked that. It's a bit more wordy than foodie, but it's--to me, foodie
    is a, is a, is a nothing term. It's just a, a blank sort of bland term. But anyway, so that was--so I became a chef. I
    was working as a chef now over 20 years ago, thereabouts, maybe 25 years ago, and gave that up because I had four young
    children and wanted to work when everyone else was working. I wasn't really hungry enough for the profession. Then I worked
    for a number of years, always more or less in and out of food, but not necessarily let's say, it was more in, you know,
    wholesale or whatever, selling spices or things like that. Then I had this idea to start the business, and since then
    I've become the--I think, I try to--I remain modest, but I think that I'm regarded as the expert in Israel for Galilean
    cuisine. and it's not--Galilean cuisine including the local Arabic cuisine, but not just.
- speaker: Interviewer
  text: Yeah, so wow. You gave me a great nutshell. (both laughs) Can we go back a little bit before we go forward?
- speaker: Respondent
  text: Yeah, you're the boss.
- speaker: Interviewer
  text: Tell me about the kind of restaurant that your dad owned, yeah, in Melbourne.
- speaker: Respondent
  text: We owned a, we owned a steak, we owned a steak restaurant, quite a good one. It wasn't--it was before the days of
    Wagyu beef. It was all good Australian, you know, Australian beef. It was essentially barbecue. It was called the Barbecue
    Inn and it was essentially a barbecue and steak restaurant. We did have a--at the time it was Yugoslavian. It was before
    the, the Yugoslavia fell a part. We had a Yugoslavian pastry chef and cold, and cold portion chef. She actually taught
    us a lot of the Central European dishes Cevacippi which is like sort of--
- speaker: Interviewer
  text: --how do you spell that?--
- speaker: Respondent
  text: --C-E-V-A-C-I-P-P-I, I think. Kabob, because Cevacippi and kabob, between the C's and the P's and the B's, they all
    get mixed up together, which is a traditional Central European Balkan--
- speaker: Interviewer
  text: --Balkan?--
- speaker: Respondent
  text: --Balkan sort of kabob full of garlic. You know? She used to make her own, her own sausages, and you know, so we learned
    a lot of that there. And so I was always exposed to, to, to interesting food, whether it was professionally from my father's
    restaurant or just my father would, you know, would hang--this was in the seventies, you know, would hang a duck up to
    dry it out to make Peking duck, you know, or would make wontons from scratch. It was always that, that thing of, of being
    inquisitive about food and being exposed to different types of food and different techniques.
- speaker: Interviewer
  text: And so did you grow up working in your dad's restaurant at all?
- speaker: Respondent
  text: I worked as--not as a chef. I didn't learn to cook in my father's, I was too young. I was studying, I was getting
    my undergrad degree, and so I didn't work--but I did work two nights a week so that my father didn't have to work. I was
    like the maître-d' for two nights a week, just to give my dad a couple nights off. But yeah, so I can see my whole life
    was--is--has always been pretty close to food.
- speaker: Interviewer
  text: Wow. Tell me how did you make your way here? Here being Israel from Australia. I understand you immigrated or made
    Aliyah when you were 25?
- speaker: Respondent
  text: That's right, in 1984. To put it literally and a bit jokingly, I actually, I actually walked it, is to say--(laughs)--
- speaker: Interviewer
  text: --really?--
- speaker: Respondent
  text: --yeah, well I left Australia--I went from Melbourne to Northern Australia by bus and then flew to Bali, and then
    from Bali I essentially went across, cross land as far as India. I actually wanted to go into Pakistan and Afghanistan
    and it was just too dangerous at the time. In 1984, it wasn't a really safe place to go into Afghanistan, so I flew into
    Italy. I essentially came Aliyah overland, but that's not--wasn't what you meant for your question. The question, in true
    answer to your question.
- speaker: Interviewer
  text: No, but it's a really interesting set of context, so I appreciate you--
- speaker: Respondent
  text: --it is a context because it just goes to that whole thing of experience and experiencing culture and food, which
    goes together. I--even in my, in my, in my profession, food and culture can't be separate. Aren't separated and can't
    be separated. At least I don't try to separate them. But in reality, I'd say I was in a Jewish youth movement. I came
    in a gap year program in 1978 when I finished--the year after I finished high school. I came back a second time, third
    time I stayed. Then I met the woman who was to become my wife. She was from Boston originally, and she was living in Israel.
    The rest is history. Four kids and, you know, and that's it.
- speaker: Interviewer
  text: Yeah, okay, well I, I feel like this is gonna be kind of chip-choppy because we're going to try to get through a lot.
- speaker: Respondent
  text: That's the way I am. You know. You have to stop me when you want to stop me 'cause I do tend to go on a bit.
- speaker: Interviewer
  text: So--okay, so you made--what--what--you said you came for a gap year in 1978 and then you were involved in a Jewish
    youth group.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: What was the name of the youth group?
- speaker: Respondent
  text: It was first Habonim. Then after that I actually met Ilya with Hashomer Hatzair, which are more, which are more left-wing.
- speaker: Interviewer
  text: Hashomer Hatzair?
- speaker: Respondent
  text: Hatzair, yeah, the Young Guard. Yeah.
- speaker: Interviewer
  text: Did you grow up in a house where people were connected to Israel? They'd talk about things in terms of Zionism? These
    are two pretty Zionist youth groups.
- speaker: Respondent
  text: I went to a Jew--yeah, not overtly. As I say, that, that--I grew up in a--I went to a Jewish school. I went to Mount
    Scopus College, which is the largest Jewish school in the diaspora.
- speaker: Interviewer
  text: Can you say it again?
- speaker: Respondent
  text: Mount Scopus College, Mount Scopus Memorial College, if you want to be exact.
- speaker: Interviewer
  text: And this is in Australia?
- speaker: Respondent
  text: Yeah, in Melbourne, Australia. It's the largest Jewish day school in the, in the diaspora.
- speaker: Interviewer
  text: Wow, and it's named after Mount Scopus here?
- speaker: Respondent
  text: I guess so, yeah. I don't know if it's named after or they're all like--they were both started up around the same
    time. I don't really know the history, but yeah, I guess it was. The Melbourne Jewish community in itself was an amazing
    Jewish--also today it's an amazing Jewish community. I grew up in Melbourne, again as an a side, there were still Landsmanshaftn
    in Melbourne in the seventies. And that's--they were nowhere else in the world, but they were still--the Polish micro-communities
    stayed together as micro-communities and gathered together in Landsmanshaftn. I remember my grandfather going to a big
    part of the, of the Warsaw Landsmanshaftn.
- speaker: Respondent
  text: Yeah, and that has continued, not Landsmanshaftn but certainly that community, that community feeling -----------(??)----------.
    So I came from a strong Jewish identity. My parents weren't amazing Zionists. They didn't--we didn't have Israeli flags
    in the dining room. But I had a strong Jewish identity and, I don't know, I fell into a Jewish youth movement because
    my parents thought it would be nice to meet as many Jewish kids and for the community to stick together. I don't think
    it was out of any like, you know, super-Zionist ideology. It's, it's what it is.
- speaker: Interviewer
  text: And that's how you got here.
- speaker: Interviewer
  text: What motivated you to stay after trip three? Did you meet your wife first and then you decided to stay?
- speaker: Respondent
  text: I met my wife first. I met Ilya. Well, no. Truthfully, I met Ilya with going out with a group of people from Hashomer
    Hatzair, so I had this--
- speaker: Interviewer
  text: --and this was in 1978--
- speaker: Interviewer
  text: 1994, sorry.
- speaker: Respondent
  text: 1984, yeah.
- speaker: Respondent
  text: Yeah, '84, yeah.
- speaker: Interviewer
  text: So you came in right as food was coming up.
- speaker: Respondent
  text: Before, before. When I first met Ilya our food was still--Israel was a third-world country. It was a third-world country
    maybe starting off as a developing country. It was on that borderline, but it was, you know, it was pretty, it, it was
    pretty developing or undeveloped, and certainly make Aliayah to a kibbutz and its dining room food every day. What made
    me--I just--I had the Zionist fervor at that point. I thought this was where--it just felt right to me. To put it more
    accurately in many ways, it just felt right. And there have been times when I've wanted to leave and there have been times
    where I've been very, very proud, let's say, that I'm staying here. Those times in some ways didn't coincide with my wife's
    feelings. That's to say that there were times when maybe my wife wanted to leave but I was, I was gung-ho to stay, and
    again, she's from Boston, I'm from Melbourne, so where are we gonna go? You know. I didn't wanna go to Boston and she
    didn't wanna go to Melbourne. So it doesn't mean necessarily that we've stayed out of default, but I think there was an
    element to it. But there was I think an element of I've got four children, and when they were young we were living on
    kibbutz and we still--
- speaker: Interviewer
  text: --what kibbutz were you--
- speaker: Interviewer
  text: Which is in the?
- speaker: Respondent
  text: In the--in Western Galilee, in the mountains of Western Galilee, where we still today, we're not members of the kibbutz.
    We live in the community neighborhood, but I think when our kids, it was more in the community neighborhood than--we had
    left the kibbutz already, but we were staying on Tuval. In terms of lifestyle choices with children, I honestly don't
    think there's anywhere in the world that I know of which is better to bring up children. And I think by the time we had
    kids and we had our--we've got four kids and they were young, we had four kids under ten years old, and I think--I think
    it was obvious to us that what we were getting in terms of a family, both our children as children, but us as a family
    on Tuval, living in Israel in a, in a community, we couldn't get anywhere in the world. Not in Melbourne, not in Boston,
    and not, not anywhere else.
- speaker: Interviewer
  text: When was your first born, just so that I can--
- speaker: Respondent
  text: --Gael was born in 1991, Suvan 1992, and then the twins were born in 1995 or '96, somewhere in there. They're 25 years
    old, so what does that make it? 1998 maybe they were born--
- speaker: Interviewer
  text: --math, I don't do fast. (laughs)
- speaker: Respondent
  text: Yeah, I do math in my head pretty well, but I think they were--I don't just--my long-term memory is--I think 1998
    the twins were born. Gael was about seven, so between 1991 and seven is 1998, yeah.
- speaker: Interviewer
  text: Wow. So these are some pretty big moments in history, if we're talking about Scuds in '91, '92--
- speaker: Respondent
  text: --Gael was born, Gael was born--
- speaker: Interviewer
  text: --and then Oslo and--
- speaker: Respondent
  text: Gael was born on the 15th of January, 1991. He's first, my--Susan, first, first, first--my firstborn child, Gael,
    Susan had a very long labor. She had a 36-hour labor. She was in hospital for 24 hours. They pushed her out of hospital
    because they had to get prepared for in coming casualties, which didn't happen. And my son was two days old and he spend
    his fir--his second night of life in a gas-proof tent.
- speaker: Respondent
  text: Now I look back, I don't know how I did it, but at the time we just shrugged, shrugged, and said that's what it is.
- speaker: Interviewer
  text: Yeah, in 1992, right Oslo was getting ready to come about.
- speaker: Respondent
  text: Mm-hmm, Oslo, yeah, yeah, yeah.
- speaker: Interviewer
  text: And in '98, what was happening in 1998?
- speaker: Respondent
  text: Maybe other wars, I don't know. Yeah, we've lived through some interesting times.
- speaker: Interviewer
  text: Yeah, so okay, I feel like we could do a whole interview about that and about what it's like to live on kibbutz as
    a young family. But you, you talked about the fact that you kinda gave up professional cooking as a chef it sounds like
    roughly around the time your twins were born?
- speaker: Respondent
  text: A bit later. Twins, I gave up--I don't remember the year, the twins are 25. Yeah, it must've been around when they
    were one or two years old, I guess.
- speaker: Interviewer
  text: So where were you working as a chef and where did you do your training? Here?
- speaker: Respondent
  text: Yeah, I did my training here in Israel. I was working as a chef in a vegetarian restaurant in, in, in the Galilee
    Mountains, a restaurant called Dalia's Restaurant in Amirim, which is a vegetarian moshav. Then I became the sous chef
    of, of the--what was in its day the Plaza Hotel in Tiberius, and that was where I finished my ca
