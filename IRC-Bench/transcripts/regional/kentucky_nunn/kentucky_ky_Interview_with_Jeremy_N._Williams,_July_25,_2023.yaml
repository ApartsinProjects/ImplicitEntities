collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Well, Jeremy, I just--as I've mentioned, I've been so greatly impressed with the breadth of your knowledge about Harlan
    County and its history. And so I want to begin with tapping your knowledge about Benham, the Wisconsin Steel International
    Harvester. However, let's start with information about you personally. When and where were you born?
- speaker: Respondent
  text: Nineteen seventy-six, here in, in Harlan County. Actually, in Harlan, Harlan Hospital.
- speaker: Interviewer
  text: Appalachian Regional Hospital.
- speaker: Respondent
  text: That's it. Yes ma'am.
- speaker: Interviewer
  text: And so where did you live when you were growing up?
- speaker: Respondent
  text: Growing up, I lived in Cumberland--still live here in Cumberland, so this is home. Cumberland's home.
- speaker: Interviewer
  text: So this is a native that we're speaking with. What was your educational background?
- speaker: Respondent
  text: My education, I have an associates from Southeast Kentucky Community and Technical College, but I also have a degree.
    My bachelors is in agriculture, animal science, from UK.
- speaker: Interviewer
  text: The University of Kentucky is predominant, isn't it?
- speaker: Respondent
  text: It is, it is.
- speaker: Interviewer
  text: And it should be.
- speaker: Respondent
  text: It is, yes ma'am.
- speaker: Interviewer
  text: Now, if you were from Cumberland, which school did you attend?
- speaker: Respondent
  text: I actually--I attended a private school, Victory Road Christian Academy. That's where I--
- speaker: Interviewer
  text: Tell me about--say the name again?
- speaker: Respondent
  text: Victory Road Christian Academy, and I, I'll--it was a small, small private school here in Cumberland--actually, in
    the community of Blair, just outside the city limits.
- speaker: Interviewer
  text: Well, did you go grades one through twelve?
- speaker: Respondent
  text: Actually, there, I went grades seven through twelve, so--
- speaker: Interviewer
  text: Okay, very interesting. Now, that as a private school, I would not anticipate that International Harvester or US Steel
    had any support of that as a private school. Do you know whether or not--
- speaker: Respondent
  text: No ma'am, no--
- speaker: Interviewer
  text: They might have?
- speaker: Interviewer
  text: The reason I ask, I know that International Harvester and US Steel paid stipends to the teachers at Benham and Lynch,
    but I doubted that they would have done that with it being really outside of Lynch and Benham--
- speaker: Respondent
  text: Exactly, yes--
- speaker: Interviewer
  text: For them to have done that. Well, what were your student activities?
- speaker: Respondent
  text: I don't know. That's been a while. That's been a while back, Jo. It probably--the student activity was probably getting
    out of school, you know. I was raised, I was raised on a farm, so that took up a lot of time, and then at one point in
    time during a mining layoff, my dad--my mom and dad, they actually had a small country store, kind of a produce store.
    So I spent some time in that as well, so, uh--
- speaker: Interviewer
  text: So you were working along with the family.
- speaker: Respondent
  text: Yeah, that, and then, you know, neighborhood kids out playing ball or, whatev--you know, fishing, that sort of thing.
    So that's kind of the activities at that time in my life.
- speaker: Interviewer
  text: Well, speaking of your parents, who were your father and mother?
- speaker: Respondent
  text: Okay, my mom and dad is Linda and Jerry Williams. My dad Jerry, he graduated from Cumberland High School. My mom Linda
    graduated from Lynch High School. So I tend to tell people I'm half Lynch. So--and especially if I'm in Lynch and people
    are talking about growing up in Lynch and stuff like that, I'll say, "Well, I'm kind of half Lynch," you know. And so,
    yeah, because of my mom being raised in Lynch--and my dad was actually--he spent the majority of his growing-up years
    in Blair, so, uh--
- speaker: Interviewer
  text: And what was his work?
- speaker: Respondent
  text: My dad, he was actually a coal miner at International Harvester, and then--
- speaker: Interviewer
  text: In Benham--
- speaker: Respondent
  text: In Benham. And then later on, he, uh--after, after things at Benham shuttered, he ended up getting a job at Great
    Western Resources, New Horizon Coal in, uh, in the Mary Helen community of Harlan County.
- speaker: Interviewer
  text: What did he do with the mines? There were so many--
- speaker: Respondent
  text: My dad started out as a general laborer, and then he worked his way up into management as a boss, and then when International
    Harvester of Benham--we'll stay specifically there with International Harvester in Benham--when it, uh, when it shuttered,
    he was actually safety director.
- speaker: Interviewer
  text: That's amazing.
- speaker: Interviewer
  text: That is amazing. Well, for the term shuttered, for those who are not from the coal area, explain what you mean by
    when Benham shuttered.
- speaker: Respondent
  text: Basically when it closed, when the final layoff took place, and that it, that it closed operations and became no more.
- speaker: Respondent
  text: After it was sold out and it, it just became no more, as what we know of as International Harvester, Wisconsin Steel,
    and Benham Coal Incorporated.
- speaker: Interviewer
  text: Well, yes, and we'll come back to that, but that--it's interesting we have a language of our own--
- speaker: Interviewer
  text: In the coal companies. As we would say, the coal camps.
- speaker: Interviewer
  text: So the--when you were in high school, what was your favorite song?
- speaker: Respondent
  text: I don't know that I had one. When I looked at that, I tried to come up with something, and I, I really don't--I don't
    know that I had a favorite song or anything like that or favorite singer. And--
- speaker: Interviewer
  text: See, mine was Elvis.
- speaker: Interviewer
  text: I just got Elvis and Johnny Mathis.
- speaker: Respondent
  text: Got you, okay.
- speaker: Interviewer
  text: I was in that particular period of time.
- speaker: Respondent
  text: Two good singers.
- speaker: Interviewer
  text: I lucked out. Exactly.
- speaker: Respondent
  text: Two good singers, yes.
- speaker: Interviewer
  text: Now, do you have other family members you want to discuss?
- speaker: Respondent
  text: I've got a brother, and he's three years younger than me, and so, you know, we both, both grew up sons of coal miners,
    that sort of thing. And my--you know, you mentioned my knowledge earlier. My knowledge, I have to thank two people. I
    have to thank my dad and then I also have to thank my dad's brother, my uncle, Raymond Williams, because of just their
    knowledge of International Harvester, Wisconsin Steel, and the inner workings of Benham, and what it meant not only to
    the town of Benham, but as to the region and to the world. I know we'll talk about that later, so--but I have--those are
    two people I have to thank because that's where I got my knowledge from, the stories that they gave me.
- speaker: Interviewer
  text: That is excellent. What prompted your interest in serving at the UK Cooperative Extension Service?
- speaker: Respondent
  text: Yeah. You know, I don't know. You know, I was actually working here at Southeast at the time. I was--
- speaker: Interviewer
  text: Doing what?
- speaker: Respondent
  text: I was their agricultural services manager is what was considered my title was when I left here. But I worked in their
    community, community development office here, and so did several things besides that. But one of the primary things was
    built an aquaculture learning center that was located at Lynch in a former US Steel warehouse, and what we, what we did
    there--actually, a shop building, a former US Steel shop building. What we did is we used--we raised trout using water
    coming from Mine Number Thirty, and so that was, that was my--that's what I did here. And then the position came open
    at the Extension Office. Matter of fact, the AG Agent who proceeded me came and told me about it and thought I might be
    interested in it, and I said, "Sure, I'd be interested. I'll apply." And I applied and, and got that job. That was in
    February of 2001. I've been here a little over twenty-two years.
- speaker: Interviewer
  text: Well, that is amazing because you did not have to ask to stay in Harlan County. The position was here and you were
    encouraged to apply for it. I think--that's wonderful.
- speaker: Respondent
  text: Yeah, I, I was--I'm blessed to be able to stay home.
- speaker: Interviewer
  text: Well, my memories of the Extension Service, both as a citizen and having been an employee at UK in the past, was truly
    it's--it was great service that were provided by the personnel. And I know the memories from 1960s era was that the emphasis
    was on farming, food maintenance, home care. Now, let's leap forward to 2001 when you assumed your position, and then
    we will move forward to 2023. Tell me about the evolution within the Extension Service of what the--what is offered by
    the Extension Service and how technology has impacted what you're able to provide.
- speaker: Respondent
  text: We--we're still doing those things. We're still providing information on canning. I just left the office and came
    up here and there was a group of quilters and they're making aprons at our office right now and finishing up a project
    that they started this morning, so we're still working with a lot of family consumer science homemakers, that sort of
    thing, of all different things.
- speaker: Interviewer
  text: That's excellent. What are some of the other things they're doing?
- speaker: Respondent
  text: We have a group of scrapbookers. We have a group of this vinyl design. You may see it on cups and, like, shirts, that
    sort of thing. That's big, so we've got a group that they're, they're experimenting with several different things, of
    new ideas, whether it be signage or coffee mugs or cups and stuff like that, maybe clothing, or even maybe welcome rugs,
    stuff like that. So basically a lot of homemaker things that we're still doing to this day. We still have 4-H.
- speaker: Interviewer
  text: Tell those in the audience what 4-H is because the new generation is not going to necessarily know that outside of
    the mountains.
- speaker: Respondent
  text: You know, 4-H and youth development is really big. You know, we're fortunate here in Kentucky. We have 120 counties
    that have an extension office in each county, so each county has a 4-H program. So with the 4-H, they, they go into the
    schools primarily. They go--that's one of the places they go in. They go into the schools and they will--they'll teach
    anything from leadership to, here in Harlan County, we--hatching eggs to chicks and students are learning about that.
    Grow your own tomato plant. Our 4-H group, they will--in the spring, they will grow probably thirty-five hundred plus
    tomato plants throughout the county--of each county, elementary, middle school, that sort of thing. And so teaching them
    how to grow, grow plants, that sort of thing. But--
- speaker: Interviewer
  text: That's excellent.
- speaker: Respondent
  text: It is, and, you know, like I said, they're learning leadership, parliamentary procedure. They're learning how clubs
    work because there's clubs in each school. There's also some clubs that they have outside of the school. So 4-H is really
    big in the county.
- speaker: Interviewer
  text: What are the four H's? I can't remember. I used to know.
- speaker: Respondent
  text: You've put me on the spot here. Hands, heart, health--
- speaker: Interviewer
  text: Hands, heart, health. There was one other.
- speaker: Respondent
  text: I'm drawing a blank, sorry.
- speaker: Interviewer
  text: Yeah, well, no, I'm drawing a blank too.
- speaker: Respondent
  text: I should know that.
- speaker: Interviewer
  text: But the fact that today in 2023, we are still making an effort through the Extension Centers to teach young people
    about growth of food, maintenance of self, you're really talking about the fact that the extension center--when you include
    all the activities we were talking about for the homemakers, you're dealing with social and cultural--
- speaker: Interviewer
  text: Issues as well.
- speaker: Interviewer
  text: Well, what about on the farming side? Has that changed at all?
- speaker: Respondent
  text: So on the ag and natural resources side, you know, it's fluid. It's very fluid, and you know, somebody calls my office
    and they've got bugs in their beans, so to speak, an insect. You know, you've got to help them solve that problem. If
    they have something going on with the lawn or an apple tree, things like that. I do a lot of backyard gardening, a lot
    of, you know, pest problems, that sort of thing. We are sitting here in timber, so we have--you know, there's the timber
    questions every now and then. One of the biggest things that I've worked with the last several years is maple syrup production.
- speaker: Interviewer
  text: Tell me about that.
- speaker: Respondent
  text: The demand is high, and--but the supply's not there. So encouraging people to become maple syrup producers is really
    big.
- speaker: Interviewer
  text: Well, where? When I think about Harlan County and the altitude, where are the trees able to sustain themselves, the
    maple trees?
- speaker: Respondent
  text: We have a large number of red and sugar maples in the mountains of Harlan, and so they could be in somebody's backyard
    to a wood lot that they may have. So we've got--the potential's there. We're seeing--
- speaker: Interviewer
  text: That's fascinating. How--what was--what would be the minimum number of maple trees you would need to actually have
    enough product to sell?
- speaker: Respondent
  text: Have enough product to sell? I would say somewhere in the neighborhood of twenty-five to forty. To have enough product
    to sell--
- speaker: Interviewer
  text: So what kind of acreage do you need for that?
- speaker: Respondent
  text: It just depends on how many maples you have per acre. You know, you may have--that twenty-five to forty may end up
    being a ten-acre spot, maybe in a five-acre plot. But it may be you cross over the next ridge over, and then you may have
    to look at forty acres to come up with fifty trees or something like that. It just depends on what you have in there.
    But--
- speaker: Interviewer
  text: That's--what about technology? Are you involved in any kind of technology training for the farmers, whether it's record
    keeping, communication, what--whatever?
- speaker: Respondent
  text: We do that. You know, like you mentioned, record keeping. I think the biggest thing recently, especially since the
    COVI
