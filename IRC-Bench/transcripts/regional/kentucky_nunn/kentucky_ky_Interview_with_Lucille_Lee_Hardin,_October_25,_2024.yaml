collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Tell me a little bit about who you are and where you came from.
- speaker: Respondent
  text: Oh my goodness. Well, I am a Montgomery Countian through and through, as were--actually I am--I'm going to say a sixth-generation
    Montgomery Countian. And uh, my--one of my ancestors, uh, Enoch Smith, was actually at Boonesborough with Daniel Boone.
    He-- the way I understand it--he had the very first, uh, land grant in Kentucky.
- speaker: Respondent
  text: And--and it was here in this county. There were 3 or 4 of them that came. He had the first stone home built in Montgomery
    County. And the cemetery is-- is not far from, uh, the, the county line.
- speaker: Respondent
  text: --or the city limits, I would say-- and in need of repair. And I've sort of been working on that, uh, trying to get
    a few together and perhaps a grant to--to get that done. We spent a little time physically working on it, but I spent--
- speaker: Interviewer
  text: He's buried in Machpelah?
- speaker: Respondent
  text: No, he is buried in a-- in a private family cemetery.
- speaker: Respondent
  text: And I remember back in the 50s that my father and, uh, at least one cousin did some, uh, cemetery renovation. Not
    positive that that was one, but it appears from what little research that we've done, we have found his stone.
- speaker: Respondent
  text: That, uh, maybe there was some renovation done there as well. Not positive it was his, but my sister and I both would--
    would like to see that restored. And there are a great, great number of Enoch Smith's descendants still-- still living,
    several in the area. But, uh, I just think for historical significance.
- speaker: Interviewer
  text: Absolutely.
- speaker: Respondent
  text: In--in Montgomery County, it would be well worth something to leave behind me. My-- I grew up with--with a lot of
    interest in family history. My--my grandmother was a member of the Daughters of the American Revolution. And--and it was
    Enoch Smith's father, actually, that she and I both went into the organization on. So we didn't do a lot of family reunions.
    But I do remember that my father would stand on the farm wagon and recite the lineage, none of which ever have I found
    in print. And I had a--I had a distant cousin who was also a good friend. And I know Jim called me one day and asked if
    I would send him a copy of what my father would recite, and, you know, I had to tell him, unfortunately, there was not
    a copy that--that we had ever found.
- speaker: Interviewer
  text: What was your father's name?
- speaker: Respondent
  text: John Newton Lee. He was John Newton Lee, the second. He was named after his great-grandfather. He never used --or
    his grandfather--he never used the second because his grandfather was not a live for the most of his for life.
- speaker: Interviewer
  text: But where do you think he did this? From memory? He didn't have anything written down?
- speaker: Respondent
  text: No, no, he did it from memory.
- speaker: Interviewer
  text: That's fascinating.
- speaker: Respondent
  text: He did it from memory. And--And one of his--of course-after we reached high school, we lived on the family farm, and
    Daddy had always farmed it. But when we were in high school, we had events and town school functions. And Daddy was always
    our--our taxi driver, and he would spend much of his time waiting on us driving through the cemetery. That was-- that
    was one of his little, little hobbies. And yes, he-- he was quite interested in family history. And I can remember probably
    one of my first recollections when-- when my sister, of course, Kentucky history used to be a staple in the curriculum
    in the seventh grade.
- speaker: Respondent
  text: And I can remember when-- when my sister had Kentucky History--Daddy standing at her bedroom door telling her more
    than what the book had to offer.
- speaker: Interviewer
  text: That's amazing. Right.
- speaker: Respondent
  text: So it was-- it was always of interest to to him.
- speaker: Respondent
  text: And just sort of stuck with me, I guess.
- speaker: Interviewer
  text: Yeah. Where was the family farm?
- speaker: Respondent
  text: Actually, within a rock's throw from where we are.
- speaker: Respondent
  text: Uh, as a crow flies, it's less than a mile. The--the actual entrance before Highway 11 was rerouted and--and, uh,
    the new section put in, it was accessed, uh, just about probably a little over half a mile on what is now called Old Highway
    11.
- speaker: Interviewer
  text: Okay, that comes out from Mount Sterling running to Sharpsburg and beyond?
- speaker: Respondent
  text: Between this residence here in North Ridge subdivision and the Somerset church.
- speaker: Interviewer
  text: Yes. Okay. The Disciples of Christ Somerset Christian Church there.
- speaker: Interviewer
  text: So six generations. So you've been around a long time and your family's been around a long time--
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: --and you've seen a lot of things. It's interesting. You only say it's a stone's throw from where you grew up, but
    the roots are deep here.
- speaker: Interviewer
  text: And so you've seen a lot. And today we're talking about Court Day. I'm really interested in some of those early memories
    that you have of when you were a child and your family would go. Tell me a little bit about what Court Day was like. Describe
    it to us.
- speaker: Respondent
  text: Well, strangely enough, you know, Court Day hasn't always been a festival, and I'm pretty much a history purist. And
    when we see Court Day advertised as being the oldest festival in Kentucky and running for so many years, I always sort
    of grin because it has not always been a festival, and I'm not real sure when, but I feel like it's certainly been in
    my lifetime that we recognized it as a festival. When I first remember Court Day--and now keep in mind our Court Day--was
    traders coming. Now, as I remember it, it was not a season of court necessarily.
- speaker: Respondent
  text: But traders would come from the mountains to Mount Sterling, which was their trade location, the first flat land,
    and where supplies were more readily available. And they would bring their sorghum, their honey, their axe handles, those
    things that they needed to trade. They had been working on all season, and they needed to trade for supplies to get them
    through the winter. And my understanding, the reason October happened to be the month that began to grow, was that it
    was the last month that they could be assured of good weather. And of course, Thanksgiving and Christmas would have interfered
    with that kind of activity anyway. So October it was. But keep in mind too-- and I started to say this a minute ago--that
    all of the gathering was on Locust Street. Even though Locust Street had been one of our original streets, it had certainly
    gone into a state of disrepair, and anything bad that happened in Mount Sterling happened on Locust Street.
- speaker: Respondent
  text: And shoot--there were bars, just every other building, and maybe even-- I was under the impression-- a house or two
    of ill repute. And that certainly wasn't where a child or a woman, a lady would be found, and certainly not anywhere that
    a mother and a father would let a young girl go. My first memories, really of understanding what Court Day was-- there
    again, my father even before-- we actually-- when I speak of the family farm, I did not move to the family farm until
    I was, I guess, about 12. We moved when my grandmother passed away, and my grandfather needed us to help care for him.
- speaker: Interviewer
  text: And that was your father's father?
- speaker: Respondent
  text: That was. Yes. Yes. And we had lived in a little house on Holt Avenue, and he farmed. And we went about our everyday
    lives from the little house there. But as we, even before we moved to the farm, Daddy would drive us--and I'm going to
    say this was probably the early to mid 50s--he would drive us down on Locust Street, probably on Sunday evening. And of
    course, there was parking on Locust Street. It was a narrow little street. And if I remember correctly, probably parking
    just on the north side, there were still a few homes. Most of them had been turned into businesses. We had a stockyards,
    right there on Locust Street.
- speaker: Interviewer
  text: Where was that on Locust Street?
- speaker: Respondent
  text: You know, I was thinking about that last night. We also had a--I don't know if it's a re-drier or an actual tobacco
    warehouse, but I think the stockyards was-- and I may have it confused--but I believe it was in the block where between
    the viaduct and what would be probably--I can't think of the name of the business, but it's to the left now of the Civic
    Center.
- speaker: Interviewer
  text: Monarch Mill? Is that the--
- speaker: Respondent
  text: No, no, it would have--Monarch Mill was there.
- speaker: Respondent
  text: But yes, it would have been probably between Monarch Mill and Queen Street on the south side.
- speaker: Interviewer
  text: Okay. Okay.
- speaker: Respondent
  text: I believe I'm right. You might find someone that's memory's a little keener there, but as I say, I did very little
    more than drive-- Now as I got a little older, I'll share some--
- speaker: Interviewer
  text: Well, tell me what those Sunday nights would be. So your father would bring you down, and you all would park, and
    it would be, you know.
- speaker: Respondent
  text: We would not park. We would see the people that had come from the mountains with their wares, parking their cars and
    sleeping in their cars overnight to get the best parking places for the trade day on Monday. Now, keep in mind, it hasn't
    always been several days.
- speaker: Respondent
  text: It was one day. It was the third Monday. And, at that point, it still was--so the growth had not really expanded like
    you would see today by any stretch. But it did quickly after that.
- speaker: Respondent
  text: And also keep in mind that I did not go downtown in Court Day. My mother kept pretty tight rein.
- speaker: Respondent
  text: And that was not the place for a little girl or a lady--
- speaker: Interviewer
  text: --a woman. So it was mostly a man's atmosphere. It was environment of men.
- speaker: Respondent
  text: It was particularly in the beginning. Now you had some people that came from afar because they were coming for supplies.
    But the best I remember from tales as we're told me as well. But then during the growth time, of course, you know, things
    began to change as people saw it as a way locally for groups to make money through fundraisers. School groups, as a matter
    of fact, probably the very first time that I could recall going to Court Day, I was probably a sophomore in high school.
- speaker: Interviewer
  text: Really? Yeah. What year would that have been?
- speaker: Respondent
  text: Oh my goodness. Probably around 61, 62. Simply my class had a booth. I cannot remember what we sold, but I had volunteered
    because we had a truck to take something that had to be taken in a truck. There again, preparing my mind for today, I
    cannot think what that thing was, but my mother was in awe that I would volunteer to work, and that I would volunteer
    to take the truck. She was so awe that I was going to Locust Street, that she went with me.
- speaker: Interviewer
  text: '[laughter] for protection?'
- speaker: Respondent
  text: She went with me and I could remember at that time there was very little traffic control or very little crowd control,
    and I had not been driving long, and she was so, so on edge that I was going to hit something or somebody. I don't know
    if she was concerned about the things or the truck because it was relatively new. But anyway, we made it and I can't remember
    the experience other than and of course I like crowds. It's a good thing I don't.
- speaker: Interviewer
  text: Not skittish at all.
- speaker: Respondent
  text: Not into the nightlife because neon lights really do a lot for me. But, I can remember the adrenaline flowing and
    just how much fun I thought it was to be in that big crowd. But on the downside, I also remember that there was a scouting
    group, and I do not remember the woman's name, but there was a woman that was severely burned in a grease fire. I think
    they were doing hamburger. I'm not real sure, but nonetheless it was and I don't know if it was that year or a year or
    so later, but I think that's probably when the city began to realize that they needed more crowd control.
- speaker: Interviewer
  text: What is a scouting group?
- speaker: Respondent
  text: Boy Scouts.
- speaker: Interviewer
  text: Oh, Boy Scouts. Okay.
- speaker: Respondent
  text: One of their sponsors that was there for a fundraiser, and they had trouble getting emergency vehicle into her. And
    also to get the fire out. So we began to see more regulations and more control with traffic and what was going on. And,
    of course,
- speaker: Interviewer
  text: How big would the crowd have been?
- speaker: Respondent
  text: Oh my goodness. Nothing like it is now.
- speaker: Respondent
  text: I'm going to say maybe like a Monday now.
- speaker: Respondent
  text: But then again--
- speaker: Interviewer
  text: Maybe 25,000-30,000 people.
- speaker: Respondent
  text: I think that would be large there. Again, I'm not sure. Liz. I was a child and numbers and I was not meander very
    far from where I was supposed to be.
- speaker: Respondent
  text: Now I do remember-- and I'm going back in history a little bit. My high school years were at Montgomery County. But
    through the eighth grade, I went to Mount Sterling.
- speaker: Interviewer
  text: And that's the city school?
- speaker: Respondent
  text: Yes, yes. And we were in session, but we would run down during lunch hour on that Monday.
- speaker: Respondent
  text: To see all the spectacular sights. One of the things that I remember most interesting is we would go to the stockyards
    to see the animals.
- speaker: Respondent
  text: And there were always a few of our boy classmates--and I can remember on one occasion, a girl--that would talk to
    the livestock owners into letting them sit on the animals that were in the pens and you know, that was-- What kind of.
- speaker: Interviewer
  text: What kind of animals are we talking?
- speaker: Respondent
  text: Oh, yeah. There were horses and cows and mules and donkeys and whatever they had to trade.
