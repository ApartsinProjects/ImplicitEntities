turns:
- speaker: Interviewer
  text: So why don't you tell me a little bit about yourself? You're, where you were born and raised, your, your date of birth,
    and anything you'd like to share.
- speaker: Respondent
  text: So, um, my name is Gwynneth Bird Wildcat. Um, and I am from Cherokee, North Carolina. Um, I was, um, born in Hendersonville,
    North Carolina, and I've actually was raised between here and Balsam Grove, North Carolina. Um, my dad is here, and my
    mom's family is in Balsam Grove. Um, so my grandparents and aunts and, um, my other side of the family was over there.
    Um, so I've kind of walked in two worlds. Um, for my entire life. Um, but both of them definitely here in the Appalachian
    Mountains. Um, my date of birth is 03/27/1981. Um, and I think that's pretty much it. Um--(laughs), I work here in Cherokee.
    I have, um, I got my bachelor's degree from Western Carolina University, and I'm currently a rising 2L. So officially
    a 3L now at Mitchell Hamline School of Law. So I'm finishing my last year of law school this year.
- speaker: Interviewer
  text: Congratulations. That's amazing.
- speaker: Respondent
  text: (laughs)--Thank you.
- speaker: Interviewer
  text: Um, just wondering if you could describe what the Daniel Boone Festival, um, is. If you could summarize it for somebody
    who's never been to the festival before. What, what does the festival entail?
- speaker: Respondent
  text: So I've been to the festival, um, many times throughout the years with my dad. Um, growing up from, you know, a young
    child through a teenager up into adulthood. Um, and the biggest thing was, um, what my dad always presented it to us as,
    is it was the only unbroken treaty. So there was a treaty between the Cherokee people and the residents of Barbourville
    for, um, river for, for a, um, collection of river cane. And um, so every year when we went there that there was a ceremony
    where they gave river cane to our people. Um, for us to bring back home, um, river cane has been used, um, historically--(clears
    throat)--in arts and crafts and making useful things as well, basketry and that kind of thing. Um, for our people. And
    so that was the big significance that was presented to me, um. As a kid, it was just cool because I got to go ride rides,
    carnival rides, and eat junk food. Um--(laughs), so, um, there's some there's some. Um, but as I got older, I realized,
    um, the significance of that and the ceremony, um, they always had, and they always took such good care of us when we
    were there, which was, um, really amazing, the hospitality. Um, we would go there and, um, they would feed us dinner and
    make sure that we had everything that we needed. Um, and then we would perform powwow dances, um, do street shows, um,
    participate in the parade, um, all of those kind of things. And, um, there were just some really kind, amazing people
    who made some, um, good impacts. I have some really fond memories, memories of Bill Frazier, um, and just how he was as
    an individual and, um, how he always, um-- you know, he, he was always, like, checking on the kids, making sure the kids
    are okay, making sure the kids have something to do. Um, and just that kindness that he portrayed was, um, really in credible.
    And I'm sure there's many more people. Um, but he's always someone who just sticks out in my mind when I think of, um,
    our time in Barboursville.
- speaker: Interviewer
  text: So it sounds like you got involved with the, the festival with, uh, with your dad, Rick Byrd.
- speaker: Respondent
  text: Mhm [affirmative].
- speaker: Interviewer
  text: Um, so you started at an early age. What did that look like for you over, over time? Did you get, uh, you have an
    increasing role and responsibility within different songs and dances, um, as time went on?
- speaker: Respondent
  text: Yeah. Well, I grew up, um, traveling to powwows with my dad and, um, dancing, um, and being a part of the drums, singing
    and that kind of stuff. Um, and so I've just always done that. That's always been a part of my life. Um, I don't really
    know, increasing responsibilities or anything like that. I mean, I'm sure that, you know, I was told to do more as I grew.
    Um, and, you know, of course, my own children, um, would come with us. As you know, they were born and, um, my, um, oldest
    daughter, Cara, has probably has been going to Barboursville since she was, um, probably about six months old. Um, and
    so that's pretty neat, you know, that they've seen, um, generations of our family up there. Um. But powwows is like a,
    um. I don't know, it was a way. It was an economic resource for us. Um, that's how my dad supported his family for a great
    number of years. Um, you know, my dad's always been, um, a performer--(laughs). Um, he's, um, really in credible, though.
    Um, he's always. He's one of those people that can quickly build relationships and make connections with individuals.
    Um, and just has this charismatic presence to him, um, where he just draws people to him. Um, but he's always done powwows
    and emceed and, you know, built relationships across cultures and boundaries and, um, which is really neat if you think
    about it. Um, especially with the state of our country throughout his life and how he's been able to make connections
    across cultures is pretty cool.
- speaker: Interviewer
  text: So would you say that the Daniel Boone Festival then for, for you is, uh, basically there isn't a like, a level of
    like a, a different form of, like a, essentially like a powwow. And in terms of how it, how it shaped, um, who you are
    and as well as your, your upbringing.
- speaker: Respondent
  text: I would not compare it to a powwow. Um, I would compare it kind of to, like, across cultural merge, um, where there's
    all these different pieces coming together to just create this multicultural vision, um, is what-- from my perspective,
    right? Um, because I've never been to a powwow where you could ride, um, carnival rides and then see Appalachian crafts
    and see people, um, you know. And, and really learn about that, that culture, like that true mountain culture of cultivating,
    you know, the land and, you know, just the Appalachian culture, like the things that they do, Cornhusk dolls and, you
    know, just all this real, you know, the Appalachian crafts and, um, dances, you'd see cloggers and, you know, just all
    these different things all melded together into one area. And so definitely not like a powwow, um, you know, in that aspect.
- speaker: Interviewer
  text: Yeah. Because I've, uh, been to a few powwows, and the, and the powwows and themselves are often-- that's, that's
    the, the center stage for, for the, for the entire festival. Right. And so has how is that-- has the Daniel Boone Festival
    changed in terms of how, how it's, um, positioned? Um, uh, the Native Americans, um, in terms of, uh, the, um, different
    locations, maybe with placement within the festival that that you, that you remember?
- speaker: Respondent
  text: We have kind of moved to different areas where, you know, our area was placed. Um, but, you know, powwows are, uh,
    they're, they're multicultural because it's intertribal. Right. Um, across different-- um, but you wouldn't go to a powwow
    and have, you know, dance, dances and then Appalachian crafts here. Right? You're going to have, you know, it's all going
    to be a similar theme of a intertribal. You're, you're going to have Navajo and, you know, all these different tribal
    crafts there. Um, so the Daniel Boone Festival is unique in that, um, as far as any other festival that I have been to,
    um, where everything's really integrated seamlessly and, um. It's just really neat, um, how all these different cultures
    come together and there's I, the-- I don't view the Daniel Boone Festival as having anything really as its center point,
    right, where it's, it's focused on one thing. There's just so many different things that come together to just form this
    truly unique event, right? Um, where nothing's really, you know-- they're not highlighting anything in particular, like,
    everything's pretty equal there, um.
- speaker: Interviewer
  text: That's an interesting point you, you make. Then what, what do you, you know, given that the name of the festival,
    the Daniel Boone Festival then, and the different elements that, that are present, right? You have the different, um,
    I know they've mentioned other interviews, they've mentioned, like a primitive village, primitive camp and, and a lot
    of dressing up. What do you feel is the most important aspect of the, of the festival? And you might have already alluded
    to this in your response, actually.
- speaker: Respondent
  text: Uh, yeah. And, and I, I mean, the treaty is important for us, right? Because you will hear that across culture is
    that there's so many broken treaties or, you know, and even, you know, like as a law student, I bring this different perspective
    because I've spent a few years reading, um, Supreme Court cases from way back in how these treaties were, um, fabricated
    and, you know, divided where we're we're going to honor this part, but not this part. Um, and, you know, you just see
    some truly racial, racial, despairing language and some, so many legal fictions. Um, like, there's a term that comes through
    the Supreme Court, um, that Native Americans are domestic dependent nations. Um, what does that mean? Um, what do you
    mean by that? Domestic dependent nation? Um, but there's all these legal fictions and these terms that come into these
    court cases, um, that are just really, that have had significant impacts. Um, so if a treaty is upheld and people uphold
    their word, um, it, it's something to highlight. So for me, that was the historical significance. But then as an adult,
    when I think about it, um, just the fact that all of these different elements could coexist together in harmony and create
    this unique, um, event that happens up there is the really significant part, right? Because when we think about how divided
    we have become, um, how divided we were, how divided we still are, um, so much division across cultures where we don't
    just treat, just accept people for who they are, um, and be open minded about other people's culture, even though we have
    our own. Um, the fact that all of this can coexist together in harmony is really a highlight for how we should be living,
    right? Um, just because you do things differently than me doesn't mean we can't coexist side by side together in this
    world, that there's enough for, there's enough space for everyone. Um, and I know that's getting really philosophical,
    but, um, it's just something that comes together in my mind now, thinking of this as an adult. Um, who has seen this happen?
    Um, since a child. Um, and now, you know, kind of come full circle with what I see happening in the world.
- speaker: Interviewer
  text: Well, that's a beautiful way to describe it. Do you so, so from, from your perspective as a, as a, as a law student,
    do you, what do you think about the the text of the, of the treaty and how it's, um, how it's been passed, uh, since it's
    started in 1948 and how it's signed every year?
- speaker: Respondent
  text: Yeah, that's pretty neat, right? Um, and it's not changing. It's just. And, you know, it's plain language. And no
    one's ever said, no one's ever created a legal fiction that made them not have to, you know? And that's really what happens,
    right? These legal fictions are created to make someone be able to, um, get out of their word, basically, um, to be able
    to go back on their word. Basically, um, to be able to go back on their word. Um, and Oh, no, I didn't say that because
    you're a domestic dependent nation or, you know, You gave up that right when we gave you this or whatever. Um, it's pretty
    neat that that's remained unchanged because there are not many of those. I mean, there are tribes up north that have had
    to fight for their ability to go catch fish. Um, you know, and when you think about, you know, me being, you know, involved
    in health care, and I've, I've worked here at the hospital since 2008. I started out as a dental clerk. Um, so I kind
    of started out at the, you know, the very bottom of the totem, totem pole here at the hospital. And, um, Casey Cooper
    is one of the most incredible human beings that I've ever met. And, um, he actually started out dancing for my dad as
    a teenager. And so there's some, um, there's, there's a relationship there from, um, that commonality. Um--(clears throat),
    and he actually is an incredible public speaker. And, um, he accredits my dad for, um, learning how to do, you know, to
    be charismatic and make that connection with his audiences. Um, and so, all of this stuff comes full circle when we think
    about that, right? Um.
- speaker: Interviewer
  text: So I've heard that, um, treaties are-- I, I attended a workshop where they're, treaties are treated as a living document,
    right? They change and then they can they can be subject to reinterpretation, as you just mentioned, all these legal,
    um, legal descriptions and word wrangling. Um, do you feel that the, the treaty itself, if, if it, uh, would, would stand
    up to like legal scrutiny, scrutiny if it were ever to be in a situation like that?
- speaker: Respondent
  text: Um, and I don't know, I mean, you know, you, I have seen them, like I just mentioned, the tribes up north having to
    fight for their rights to actually go fish. Um, I, I can't really answer that because we see treaties, um, that are plain
    language that are interpreted very differently. Um, and so, Native American law, that focus is to interpret those treaties
    as the tribal members who entered into them would have understood it at the time. Um, and so, (clears throat)--and a lot
    of courts are getting on board with that, you know, like we've went through these different eras of, um, Native American
    law. And a lot of, you know, the pendleton, the pendleton is going this way now, right? Like, but it swings back and forth
    where, you know, there's decisions made that are very against, um, Native American rights and self-determination. And
    then, you know, it goes back the other way. Um, but if you think about it on a whole, um, you know, there were lots of
    tribes who were removed from their homelands, like our, um, our, the other part of us, the Kituwa and the Western band
    of Cherokee. Um, they were removed from here where they knew what plants to eat. They knew what plants to harvest. They
    knew the, um, terrain. They knew how to fish. They knew how to hunt. They knew how to, um, survive, right? And they were
    moved into this very different environment in Oklahoma where they didn't know what plants were safe. They were removed
    from not only their food source, but also their medicine source, right? And then they're put on these reservations and
