collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Could you tell us a little bit more background about the Daniel Boone Festival for our listeners?
- speaker: Respondent
  text: Okay. The book begins with the founding of the festival and then goes decade by decade up to the 75th year of the
    festival. But you're more interested in the founding. Union College is really most responsible for the creation of the
    festival, and one man is the person that came up with the concept. His name was Dr. Karl Bleyl, B-L-E-Y-L. He was a native
    of Texas, hired at Union College as a professor of biology. But he had a strong interest in history, particularly frontier
    history of his native Texas. He saw connections with not only the movement of people from Kentucky to Texas, but the idea
    of Kentucky being, in essence, the first frontier after the thirteen colonies. He also saw that Appalachia was pretty
    much denigrated nationally. It was the one legitimate subculture that America seemed to agree that they could look down
    on and belittle. After World War II, that was pretty much the situation. Blame for that generally falls on the state's
    reputation for feuding and, of course, the assassination of Governor Goebel in 1900, or the death of him. He was killed
    a few days before 1900, but it took a little while dying. So, Bleyl had it in mind to do something to remind particularly
    the children of Kentucky's historic heritage and to instill in them a degree of pride in their origins and in their past,
    particularly since, at least in this section of the country, the average family pretty much goes back three, four, maybe
    even five generations of people living in the same area. That was ultimately the purpose of the festival. But the impetus
    for the festival was Karl Bleyl's visit to Cherokee, North Carolina, where he saw the situation that the Indians on the
    reservation were having difficulties because some organization had limited their use of natural resources, specifically
    cane, which they made chairs, baskets, and rugs, and other artifacts to sell. That was one of their primary economic sources,
    but one of my sources said that some organization was charging them three cents a cane for their cane. I can't verify
    that, but that was in a published report that appeared in a local paper. So Bleyl meets with the head of the reservation,
    a man named Chief Carl Standingdeer, and tells him, "I think we've got a solution to your problem. You come to Barbourville,
    and you can have all the cane you can carry back. It's a weed that grows on the Cumberland River. It's more of a nuisance
    than a benefit. So this would solve your problem, and at the same time, we can have a party, a celebration, a dinner,
    and this will be good for everyone. We can use this for education for our people." He agreed, and Union College—after
    this, Karl Bleyl talked to the senior class of 1948. Oh no it wasn't—well, I'll have to check—but he talked to a class
    to see if they would agree to sponsor this event and take part in it. At that time, Union College was predominantly southeastern
    Kentucky-based. Most of the students were Knox Countians, Clay County, Whitley, Laurel, the surrounding counties, a few
    in Tennessee. Not very many from outer states, as it became later. Since most of them had family that had these traditions
    in the past anyway, it was a good thing to be able to draw on these sources. One of the amazing things that they found
    once they started this was the incredible hoard of antique objects from the time of Daniel Boone that were still in Knox
    County houses. Of course, they took advantage of that, and we put them in windows in the various stores. Bill Frazier
    has told you about how in later years the arrangements changed, and the cane became more symbolic than actually needed.
    But it must be emphasized that in those first few years, this was a serious contribution, and it was meaningful. We know
    that because they wanted more, and they came back and got other loads for a couple of years, at least a few years. The
    next year after the first Daniel Boone Festival, a picture was published in the newspaper of a Cherokee student holding
    a basket made from Knox County cane, and that student was on a scholarship at Union College.
- speaker: Interviewer
  text: I was wondering if you could tell us a little bit more about the role of the Cherokee people in this festival then
    and now. Then it seemed like it was a really integral part to haul as much river cane to use for their crafts and for
    their day-to-day needs, and now it's become more symbolic. So how has that role also evolved, and in the people as well?
- speaker: Respondent
  text: Well, at first, in general, the Cherokee Indians from the reservation really enjoyed this. I have no records of their
    actually being paid. They probably were reimbursed for their traveling expenses in the first couple of years. I don't
    know if that's the case, but at any rate, now they are paid. Bill, I'm sure, has addressed that. It was a very close relationship,
    and Dr. Karl Bleyl actually wrote the Cane Treaty himself, and it was immediately described as the first treaty with the
    Indians which was solely in the Indians' interest. This was sort of a pledge of friendship between the people of Knox
    County in southeastern Kentucky and the Cherokee Nation. The next year, the treaty was called the Watauga Treaty, which
    was said to be a Cane Treaty in Cherokee. I don't think that is accurate, but that may be. In 1949, the Cherokee actually
    invited Barbourville citizens to come to Cherokee for the first year's performances of "Unto These Hills," which is the
    outdoor play that they've been doing ever since. They even called it Barbourville Day and invited people to come in costume
    with the outfits that we wore during that time on stage. They were a little bit disappointed in the turnout, but it was
    about twenty people, which I think is a fair representative. I should also point out in terms of the Daniel Boone Festival
    that this is the time that television, particularly the Disney Channel, had come up with Davy Crockett. The success of
    that miniseries spurred a longer series called Daniel Boone, both starring Fess Parker. The clichés of dress at that time
    with the coonskins and cap, which Boone vehemently denied, but Davy Crockett did wear one. Word has it that he wore it
    mostly to annoy congressmen when he was a representative of his state. So everybody started wearing coonskin caps and
    the students were advised to let their beards grow and the girls wear old-style bonnets and long dresses. Everybody was
    supposed to do something to represent the older times. The first festivals were held primarily with nothing but pioneer
    items. Yes, we did have a band, but the main event on Union College campus was a historic pageant, which culminated in
    the signing of the Cane Treaty, the first one.
- speaker: Respondent
  text: The first Daniel Boone Festival was in May of 1948. It was a terrible decision. You had all of the graduation ceremonies
    going on about the same time, high school, college, a May festival, the Mount Laurel festival had just gone on. It was
    frankly amazing that they had as big a crowd as they did for the first one. But they decided this is silly. Let's move
    it to a fall harvest festival instead. So they chose October. Initially the end of October, but we moved closer to the
    beginning of October, specifically the first full week that includes a Sunday. So that's the scheduling.
- speaker: Interviewer
  text: Was the fall date also a better period of time for the harvesting of the river cane and the location where they were
    chosen to harvest the river cane?
- speaker: Respondent
  text: I doubt that was a consideration. Cane is generally harvested when it's full grown and dry. It would be better working
    material that way than sprouts or something like that. I doubt that was a strong consideration. But they had the pageant
    for a number of years. Karl Bleyl wrote the first one. Marjorie O'Donnell wrote the second one. We do have a copy of that
    in the museum archives. The Knox Historical Museum is the archives for the Daniel Boone Festival and I'm the person that
    runs it.
- speaker: Interviewer
  text: And that's how you came to be involved with writing this book in the beginning? To be involved with it?
- speaker: Respondent
  text: Pretty much, yes. Another reason that I got involved was our family not only ran the movie houses, but at one time
    we produced a local newsreel called The Mitchell News. These were 16 millimeter films shot by initially the first photographer
    Raleigh Dixon, a projectionist at the Mitchell Theater. Later, my father, Paul Thomas Mitchell, took over the camera.
    They shot films that were at least locally done from about 1937 to the early forties. The earliest films were before they
    actually started showing them publicly, but they were edited into later shows. Anything that was of public interest got
    photographed during that time. Almost all parades, lots and lots of ball games, unfortunately. Some of the most popular
    things were just people on the street, usually in front of the Mitchell Theater going to the post office where the Board
    of Education is now housed. That was one thing my father still had those films, and they had them in my home. Occasionally
    he'd drag one out and I'd watch it with him. That was one thing I could offer that would be unique for the museum and
    our programs. So that first year, we scheduled a Mitchell Local News program in the municipal building upstairs next door
    to where the museum was. We opened the museum in 1988 during that festival year, during the Daniel Boone Festival. This
    was one of the programs, along with a number of state-produced programs that we had. Daniel Clink, Clinkenbeard and others.
    That was one of the programs. It proved to be a big hit with the public. We had to run it three times, and the next year
    we moved to Union College with that program and kept it up until the film began to show signs of wear. I called it off,
    I think the last year was around 2007 or so.
- speaker: Interviewer
  text: And how would you say that the festival shaped who you are and as a Knox Countian?
- speaker: Respondent
  text: Well, personally, the situation was different than the average person. For us in the theater business, Daniel Boone
    Festival was competition. We played along with it, and this is the case with a lot of the businessmen on the Court Square,
    particularly those who had businesses that would be blocked by events during the festival week. For many years, this was
    a serious gripe with a lot of the businessmen. My father pretty much played along with it. The Magic Theater, which still,
    the marquee is very viewable on the square, the marquee had...
