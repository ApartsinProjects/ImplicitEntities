turns:
- speaker: Interviewer
  text: Would you mind just introducing yourself a little bit and giving us a little background about your, uh, well, I'll
    just stop there. We'll continue from there.
- speaker: Respondent
  text: Okay. Okay. All right. Okay. Um. Excuse me. Uh, my name again is Roberta Johnson. Um, this is my, uh, I guess you'd
    say, my third name. I was married twice. (laughs) My first husband was Jim Leon, uh, my second, he passed, and then I
    married Dennis Johnson. So my name at the time I lived in Over-the-Rhine, my last name was Fledderjohn.
- speaker: Interviewer
  text: Wow. Do you mind spelling that out?
- speaker: Respondent
  text: F as in Frank, L-E-D-D-E-R-J-O-H-N.
- speaker: Interviewer
  text: Wow. That's--(??)
- speaker: Respondent
  text: Right. Yes. And although I was considered by many as, uh, the little Irish girl, my father had a Dutch name, so. (laughs)
    And I got stuck with it. (laughs)
- speaker: Interviewer
  text: That's great.
- speaker: Respondent
  text: Yes. Right. Yes.
- speaker: Interviewer
  text: Well, there were, I think most of us are familiar with the, uh, German immigration and it's kind of stamp on Over-the-Rhine.
    They were the largest group by far. But as I've done these interviews, we've got Irish, Romanian, Italian and Dutch names.
- speaker: Respondent
  text: Yes. Yes. Yes. Yes.
- speaker: Interviewer
  text: So it's nice to see that kind of--
- speaker: Respondent
  text: Yes. Yes. Well, my mother was through and through Irish. And I always have said if your mother is Irish, you're Irish,
    no matter what. But, um, but um, it, uh, but it, it--I really never cared for the name. In fact, some people said that's
    why I married so young to get rid of that name. (laughs)
- speaker: Interviewer
  text: (laughs) That's funny.
- speaker: Respondent
  text: So. But anyway.
- speaker: Interviewer
  text: Well, would you mind telling us a bit about, um, your, your parents or even earlier generations, if they first immigrated
    to the region or anything you know about, kind of, the big picture?
- speaker: Respondent
  text: Oh. Well, um, I don't know a lot about my father's side of the family. My mother and he divorced when, in around 1944,
    he was in the service. And, um, so I, I did his, his mother lived in Hyde Park and his brother lived in Hyde Park. Um,
    and I got to know them, uh somewhat. But mainly, um, it was my mother's family and they were--
- speaker: Interviewer
  text: Mind if I, just to cut in--
- speaker: Interviewer
  text: What, what was your father's first name?
- speaker: Interviewer
  text: Robert. Okay. Thank you. Yeah. Please continue.
- speaker: Respondent
  text: Um, they, um, uh, my mother's family was from Over-the Rhine. She-- her mother--she lived in Cleveland. She and her
    two brothers. And her mother died. And she was sent to Cincinnati to live with her grandmother, her paternal grandmother.
- speaker: Interviewer
  text: Okay. When she was a child, right?
- speaker: Respondent
  text: When she was a child. Yes. They lived at 1212 Broadway.
- speaker: Interviewer
  text: Yeah. When was that? And how old was she?
- speaker: Respondent
  text: (Throat clearing) Well, let's see. She was born in 1907. I think she was about nine or ten when her mother died. So
    we'd say around 1917, '16, around there.
- speaker: Interviewer
  text: Yeah. Okay.
- speaker: Respondent
  text: Uh huh. And they.
- speaker: Interviewer
  text: And what was her first name and last name?
- speaker: Respondent
  text: Her first name was Marie. And her maiden name was Hughes.
- speaker: Interviewer
  text: Yes. Thank you so much. Yeah.
- speaker: Respondent
  text: Um. So, um, so we were, um, for--
- speaker: Interviewer
  text: And she lived with her grandmother?
- speaker: Respondent
  text: She lived with her grandmother, yes. And so we were very familiar with, uh, that, whole area, um.
- speaker: Interviewer
  text: Yeah. Do you know how long her grandmother had been in Over-the-Rhine? Just to kind of go back and see if we can find
    an origin of your family's history in Over-the-Rhine.
- speaker: Respondent
  text: Oh. I, I can give you her name. But I think for, I think for many years, because, um, they went to Cleveland for work.
    We had done some genealogy and found out and, uh, they came back with the exception of my mother's father, who stayed
    in Cleveland and married there. And then his wife died in the flu, of the flu in 1918. So--
- speaker: Interviewer
  text: The big flu.
- speaker: Respondent
  text: The big flu. Yeah.
- speaker: Interviewer
  text: The so-called Spanish flu. Yeah.
- speaker: Respondent
  text: And he came--brought the children back for his mother to raise here in Cincinnati, in Over-the-Rhine.
- speaker: Respondent
  text: Yeah. So she, um, as I said, my mother was very familiar. She married my brother's father and lived on Main Street,
    1309 Main Street, which is now a, um, a thrift shop for women. I, we went looking for that.
- speaker: Interviewer
  text: That's great.
- speaker: Respondent
  text: --And my, my brother was born there. Now, my--that was in 1929 that my brother was born.
- speaker: Interviewer
  text: And, and his name is?
- speaker: Respondent
  text: Robert Jordan.
- speaker: Interviewer
  text: A lot of Roberts and Robertas.
- speaker: Respondent
  text: Yes. Yes, yes, yes.
- speaker: Interviewer
  text: (laughs) Robert Jordan. Good. Thank you.
- speaker: Respondent
  text: And his father died when he was two. So, um, my mother had a pretty rough life. Uh-hm. She, um, she, uh of course,
    was left alone with a son and then went to work at the Fenwick Club, which was in downtown Cincinnati. Uh, it was, uh,
    like a home for, uh, uh, I think it was a, a home for men who came into the city. Kind of like a hotel kind of place.
- speaker: Respondent
  text: But anyway, she went to work there and met my father and married him. In, um, oh, when did she marry him? Let's see.
    Bobby was twenty-nine, so it must have been the--I was born in '38, so it must have been the middle '30s, '35, '36, something
    like that.
- speaker: Interviewer
  text: Mm hmm. Yeah.
- speaker: Respondent
  text: So and then I was born, um, but the, the marriage didn't work so she divorced him. And it was her, uh, my brother,
    and I. My brother was nine years older than me.
- speaker: Interviewer
  text: And was this, uh, all at 1309 Main Street?
- speaker: Respondent
  text: At, um, no, we, um, I'm trying to think where she, she--no, I was born on, on Wheeler Street.
- speaker: Interviewer
  text: Oh yeah. I--when we talked on the phone I remember you mentioned that.
- speaker: Respondent
  text: Yes. Yes. In Clifton.
- speaker: Respondent
  text: (Clears throat) She had two or three different apartments in that building. And when I was born, she lived on the
    first floor of Wheeler Street, so--
- speaker: Interviewer
  text: Okay, so she'd been in Over-the-Rhine--
- speaker: Respondent
  text: She had been in Over-the-Rhine--
- speaker: Interviewer
  text: Some point before you were born she moved to Wheeler Street.
- speaker: Respondent
  text: Yes. Yes, now she, as my brother, and my brother told me, they moved a lot.
- speaker: Respondent
  text: She, they, in, in, within Over-the-Rhine. But then, um, somehow ended up after she married my father ended up on Wheeler
    Street, so.
- speaker: Interviewer
  text: Sure. Yeah.
- speaker: Respondent
  text: Um, and then. Okay, so then she was, um, again, um, by herself with my brother and I. And a friend of hers told her
    about work at the film company on Central Parkway.
- speaker: Respondent
  text: And she went there, got a job as an inspectress. That means she cleaned and cut the films. And. And in order--because
    I was still little, I was only about three or so. She looked for an apartment in Over-the-Rhine and got one in the Parkway
    Apartments.
- speaker: Interviewer
  text: That's great.
- speaker: Respondent
  text: That's how we got there. And at that time there was the nursery on the sixth floor.
- speaker: Respondent
  text: (throat clearing). And my brother would take me there every morning and then pick me up after school.
- speaker: Interviewer
  text: Is the, are, it the Parkway Apartment building still there?
- speaker: Interviewer
  text: Okay. I thought so, but they're, they're--
- speaker: Respondent
  text: They're building.
- speaker: Interviewer
  text: --torn somethings down right in that region.
- speaker: Respondent
  text: Yeah, they're, they're, I know--
- speaker: Interviewer
  text: But I just wasn't clear about the address.
- speaker: Respondent
  text: They're building on both sides of it.
- speaker: Interviewer
  text: Okay, okay. That's on both sides of it
- speaker: Respondent
  text: I believe it's, I believe it's a senior, uh, center home now.
- speaker: Interviewer
  text: Okay. I'm going to drive by.
- speaker: Respondent
  text: Yeah. There were ninety-four apartments in that building.
- speaker: Respondent
  text: Yeah, right. Uh.
- speaker: Interviewer
  text: Yeah, that's a big one.
- speaker: Respondent
  text: But I actually, I, I would say I--we didn't leave there till I was, like, thirteen. But, um, the whole young part
    of my life, we lived in the Parkway Apartments.
- speaker: Interviewer
  text: That's great.
- speaker: Interviewer
  text: That's great.
- speaker: Respondent
  text: Yeah. Um-hm.
- speaker: Interviewer
  text: And that's lovely. And you mentioned the, the daycare.
- speaker: Respondent
  text: The daycare. Yeah. I was in the daycare up until, um, let's see. I guess, I must have been five because my, um--Saint
    Joseph of Nazareth School was at Liberty and Logan. The building is still there, the school.
- speaker: Respondent
  text: And, uh, she went there and asked the nuns if they would take me in kindergarten. I was a late birthday, but, and
    they did.
- speaker: Respondent
  text: They took me. So I was there, uh, until I graduated from the eighth grade.
- speaker: Respondent
  text: And my brother went to seventh and eighth grade there, I believe.
- speaker: Interviewer
  text: Okay, That's great. Yeah. So that's a nice, stable period it sounds like.
- speaker: Interviewer
  text: Same apartment, same school.
- speaker: Respondent
  text: Yes. Same school. Right, yeah. Belong to the church. Saint Joseph of Nazareth Church was at Liberty and Elm. They're
    building something there now, I see, finally. They tore the church down. But I, I, saw that they're--I don't know what
    they're building, but they're building something, so. But anyway, that, yeah, that, that was a pretty, pretty stable,
    um, time in my life. Yeah.
- speaker: Interviewer
  text: Yeah, that's great.
- speaker: Interviewer
  text: And did your mother continue to work at the, the--
- speaker: Respondent
  text: --at the film. Yeah.
- speaker: Interviewer
  text: Is it the Warner? What's it called now?
- speaker: Respondent
  text: Hm. It, well
- speaker: Interviewer
  text: Universal. Universal.
- speaker: Respondent
  text: Well, yeah, she worked at Universal.
- speaker: Interviewer
  text: Universal. That's right.
- speaker: Respondent
  text: Universal. In fact, I think she worked at like two, three different ones, but, um, they were all in that same area.
- speaker: Interviewer
  text: Yeah. It's interesting that Cincinnati had a cluster of--
- speaker: Respondent
  text: Of of films--
- speaker: Interviewer
  text: --film businesses.
- speaker: Interviewer
  text: I didn't realize that
- speaker: Respondent
  text: Right. Yeah. Yeah. And our life kind of evolved around that. Me going to school and her working at the, at the film
    company. And, um, most of our friends were relatives, um, who lived in the area, uh, over on Thirteenth Street. The Hughes',
    you know, my, my uncle, my uncle Joe Hughes and his wife and two children. I spent a lot of time with them.
- speaker: Interviewer
  text: So, these, this is your mom's brother?
- speaker: Respondent
  text: My mother's brother, Yes. Uh-huh.
- speaker: Interviewer
  text: Yeah, okay. That's great. Yeah. Talk a little bit about the extended--so where there was Uncle Joe and you said there
    were other relatives?
- speaker: Respondent
  text: Well, um, uh it, uh, actually, they were his wife's relatives.
- speaker: Respondent
  text: I don't know if you, Arlene talked about them, but they all lived in that Thirteenth Street, Spring Street area.
- speaker: Respondent
  text: There were, the mother and dad in the house. And then, uh, the children, as they married, got apartments. So it was
    kind of like a cluster. Uh, their name was Cannon. Their last name was Cannon.
- speaker: Interviewer
  text: That's great. And are you related to Arlene or were you just friends?
- speaker: Respondent
  text: She's, Oh, yeah. She's my Uncle Joe's daughter.
- speaker: Interviewer
  text: Oh, you know, okay.
- speaker: Respondent
  text: Both she and her brother Bill. I grew--I literally grew up with them.
- speaker: Interviewer
  text: That's great.
- speaker: Respondent
  text: I spent a lot of time on Thirteenth Street because my mother worked, and (throat clearing).
- speaker: Respondent
  text: That, you know. So.
- speaker: Interviewer
  text: Oh, that's great.
- speaker: Interviewer
  text: That's, that's great. Thank you. I didn't--
- speaker: Respondent
  text: Okay. Yeah. Yeah, right. Yeah.
- speaker: Interviewer
  text: I knew there was a connection but I didn't have it, didn't have it nailed down in my mind yet.
- speaker: Interviewer
  text: Oh, so that's great. So you had. That's kind of a whole different section of Over-the-Rhine--
- speaker: Interviewer
  text: '---from Central Parkway.'
- speaker: Respondent
  text: It is. It is.
- speaker: Interviewer
  text: So you covered the neighborhood.
- speaker: Respondent
  text: It is. Yes. I did I, I, used to say I've walked that whole area.
- speaker: Respondent
  text: You know, as a child, um, my mother was a walker. So, like in the evening we'd go out and take a walk. I went to,
    uh, there were two theaters, The Imperial
- speaker: Respondent
  text: Which is up there. Yeah
- speaker: Interviewer
  text: It's still there.
- speaker: Respondent
  text: And, um, Up, the Uptown, which was right there on McMicken.
- speaker: Interviewer
  text: Yeah, that one I didn't know about. The Uptown
- speaker: Respondent
  text: I spent--well it, the building is there still. I was surprised.
- speaker: Respondent
  text: 'They--it''s, it''s bricked up in the front. '
- speaker: Interviewer
  text: Oh, maybe I'm mixing up the names. Maybe it's the Imperial that's gone.
- speaker: Respondent
  text: No, the Imperial's there too.
- speaker: Interviewer
  text: They're both still there.
- speaker: Respondent
  text: They're both still there.
- speaker: Respondent
  text: Yeah, yeah. I spent a lot of time there. And then the public library, on McMicken, where I spent a lot of time. And
    as I got older, when--by that I mean seven, eight, nine--I walked from Central Parkway up to McMicken. And went to the
    library and went to the movies and, um, walked to school, um, church. It was, it all evolved around that. Findlay Market.
    Findlay Market was a big part of our lives.
- speaker: Respondent
  text: You know, that, uh--when you're a single mother, you, um, and don't make a whole lot of money--I remember my mother
    used to get paid on Friday, and we would go to Findlay Market on Saturday and get the groceries for the week, or food
    for the week, and then, um, paid her rent, which at that time was $7.50 a week.
- speaker: Respondent
  text: (laughs) I remember because--
- speaker: Interviewer
  text: A week though.
- speaker: Interviewer
  text: Interesting, okay.
- speaker: Respondent
  text: She'd give it to me and we had to pay it weekly.
- speaker: Respondent
  text: She'd give it to me to take it to the lady who collected it in the building.
- speaker: Respondent
  text: And, um, um, and then whatever was left, we went to the movies.
- speaker: Respondent
  text: So it was. It was uh. (laughs)
- speaker: Interviewer
  text: (laughs) Boy.
- speaker: Respondent
  text: Yeah, it was, it was a good life. I, uh, you know, I always used to say I was poor, but I really didn't feel like
    I was poor.
- speaker: Respondent
  text: You know, I didn't, because, I didn't miss a whole lot or--
- speaker: Respondent
  text: Uh, you know, right, being right there in the neighborhood. The people in the Parkway Apartments were wonderful.
- speaker: Interviewer
  text: Yeah, talk about them a little bit.
- speaker: Respondent
  text: They, um, all, well, diverse only to the point of age and, um, and, and families or single people.
- speaker: Respondent
  text: But, um, they, the older people--there were, on our floor, there were one, two, three, four, five apartments. We lived
    on the second floor.
- speaker: Respondent
  text: There were five apartments. Um, they were all older couples. We became very good friends with the McSorley's. He worked
    at the Gaiety.
- speaker: Respondent
  text: Which was down on Vine Street.
- speaker: Interviewer
  text: I've heard about the Gaiety--a few people now.
- speaker: Respondent
  text: Yes. And her name--she was from England--her name was Maudie. And, um, she just, she loved my mother. And she kind--you
    know, uh, the people looked out for me. They knew I was--after my brother
