collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: To start off, can you tell me a little bit about yourself, your daily life, your role in the community, and we'll
    start from there.
- speaker: Respondent
  text: Okay. Well, I'm Chris Haddix. I'm the county judge executive here in Montgomery County. I was born and raised here.
    I went to Mount Sterling Elementary, graduated from Montgomery County High School in 1993. During that time, I decided
    I wanted to start serving the public. That was kind of my calling, to serve this community. After graduating in '93, I
    went to Eastern Kentucky University and graduated with a bachelor's degree in 1997 in police administration. I was a police
    officer. While in school, I dispatched during the summers, and once I graduated, I was promoted to police officer. I spent
    about twenty-five years in various roles serving this community as a police officer. I retired in 2019, then worked as
    a school resource officer for about ninety days, mentoring kids. I loved it, but then felt called to help in a different
    role, so I ran for county judge executive and won. I've been serving the community ever since.
- speaker: Interviewer
  text: When did you first hear about the Post Clinic?
- speaker: Respondent
  text: I first heard about the Post Clinic when there was an announcement from the mayor and Andy Barr came in to make a
    big announcement. At that time, Dr. Ralph Alvarado was our state senator and David Hale was our state representative.
    I had relationships with all of them. There was a lot of talk about it. I've known Dr. Ed Roberts since I was a kid and
    have a great relationship with him. I also know Ms. Louise Summers since I was a kid. They both have a heart for people,
    which helped the Post Clinic come to fruition.
- speaker: Interviewer
  text: Were you a patient of Dr. Roberts when you were a kid?
- speaker: Respondent
  text: Actually, we were family friends. My dad and Dr. Roberts were family friends.
- speaker: Interviewer
  text: You were talking about your experiences as a police officer and now as a judge and school resource officer. Did you
    have any experiences with the Post Clinic through those roles?
- speaker: Respondent
  text: I didn't have any experiences with the Post Clinic in those roles because it was starting up around the time I was
    retiring as a police officer. Now, in my role, I see a lot of people who are hurting and need help. The Post Clinic is
    a special place where people can get medical and dental help they need and deserve.
- speaker: Interviewer
  text: Do you come across that in your current role as the judge now?
- speaker: Respondent
  text: I do. I get to see and talk to some people, and I know our community and region are blessed because of the Post Clinic.
- speaker: Interviewer
  text: Do you have any stories from people you've worked with that particularly stuck out to you?
- speaker: Respondent
  text: There was one man who came in unhappy with his smile. The clinic helped him with dental needs, which really changed
    his life.
- speaker: Interviewer
  text: Could you dive a little bit more into the growth of your relationship with Dr. Roberts?
- speaker: Respondent
  text: Yes. We were family friends since I was probably five years old. Our relationship goes way back. It was more in particular
    with him and my dad, my mom and his wife. I really respect Dr. Roberts and what he stands for.
- speaker: Interviewer
  text: The Post Clinic has been here for almost three decades. Have you seen it shape anything around here?
- speaker: Respondent
  text: Yes, it has been here a long time and served many people in different ways. With the expansion of the building, more
    people recognized it and the word spread. It was able to help a lot more people. It's all about helping those less fortunate.
    You can tell a lot about the people who work here; they really have a heart to help people.
- speaker: Interviewer
  text: From your perspective, what do you see as the Post Clinic's role in the Mount Sterling community? Do they work with
    outside organizations? Where do they stand in the community?
- speaker: Respondent
  text: The Post Clinic is very involved in the community and works with many different groups. As county judge executive,
    our fiscal court was able to provide some funding for them, which I'm proud of. The funding helps a lot of people in need.
- speaker: Interviewer
  text: How often do you work with the Post Clinic in your role?
- speaker: Respondent
  text: I talk to Ms. Louise Summers probably at least once quarterly and Dr. Roberts about the same amount. I'm always the
    guy who says, 'Whatever we can do to help, please let us.' They let us help. Our role is minor, but I'm proud of it. The
    things they are doing are amazing; they're helping people every day.
- speaker: Interviewer
  text: Has it changed your outlook on healthcare and healthcare access?
- speaker: Respondent
  text: It has. In my role, we deal with everyone in the county and see needs some wouldn't see otherwise. When you look a
    person in the eye and know they need help, you start to shape educated opinions. This place has really changed my way
    of thinking about healthcare.
- speaker: Interviewer
  text: Do you see the clinic as a source of unity in the community?
- speaker: Respondent
  text: Yes. The Post Clinic is a source of unity. Helping others isn't political; it's about someone in need. It brings everybody
    together.
- speaker: Interviewer
  text: It's unique how bipartisan the clinic is, receiving funding from different political leaders and unifying the community.
- speaker: Respondent
  text: Yes, that's right. Deep down, everybody really wants to help somebody, and this is a way we can all do that together.
- speaker: Interviewer
  text: What would you say to other city or government officials about the advocacy it takes to support something like this?
- speaker: Respondent
  text: Whether you're a county judge executive, commissioner, magistrate, mayor, or council member, this project helps people.
    It gives them a sense of self-worth by providing basic healthcare and dental needs. That makes people want to be more
    productive in society. We all work together to make our community better. The Post Clinic isn't just for Montgomery County;
    it affects the entire region. The work of Dr. Roberts, Dr. Tingle, and Ms. Louise Summers is something to be proud of,
    and I'm proud of them.
- speaker: Interviewer
  text: Is there anything else you'd like to share?
- speaker: Respondent
  text: I think that's about it.
