collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So, let's just start by, um, working backward in the genealogy, like, um, who was your dad, who was your mom, how
    was your dad related to Rebecca and Solomon Kabakoff. Let's just go back from there and get that established.
- speaker: Respondent
  text: Okay. Um, my dad was Abraham Albert Kabakoff. And, um, my mom was Evelyn J. Kabakoff, her maiden name was Gellman.
    And, um, my dad was one of five children, and, um, he was right in the middle. And so he had an older brother named Herman,
    and another brother named Meyer, um, a sister named Ida, then himself, and then a younger brother named Max. And they
    all grew up on that, uh, I believe it's 3 West McMicken. And, um, they, uh, my grandfather owned the building with my
    grandmother, Rebecca. And my grandfather was Solomon, and, um, I never got to meet my grandparents. They all passed prior
    to me being born. Almost--in my family, we like skipped a generation. My dad was born in 1914, and, um, I was born in
    1961. So, huge, huge, um, age gap.
- speaker: Interviewer
  text: Why did your dad wait so long, you think?
- speaker: Respondent
  text: You know, I, I, I think World War II had a profound effect on him. And, um, he was in combat in the Pacific, and he
    was in, um, battles in, uh, New Guinea, and he also was, saw McArthur's return on Leyte Island, the Philippines. And,
    um, he just, uh, waited until later in life to get married. And there was a sixteen year age difference between my mom
    and my dad.
- speaker: Interviewer
  text: So did he ever talk about the war? Did--when you say it had a profound effect on him, do you feel like it, um, caused,
    like, traumatic issues?
- speaker: Respondent
  text: He, um, would talk about the war. But it was always with my uncles. And I, I guess you could say I grew up in a little
    bit of a sexist type of family. Um, whenever we had family get togethers, all the men would congregate in the living room
    and they'd have football on. And all the women would congregate in the dining room or kitchen. And I just never dug the
    conversation that the women were having. (laughing) It just didn't interest me. But, um, with, um, my uncles and my father,
    they would talk about when they were growing up, they were talking about, um, World War II had an impact on all of them.
    And then, you know, every once in a while they would start talking about, um, Nixon, and, uh, you know, and current events.
    And--
- speaker: Interviewer
  text: And you have siblings, right?
- speaker: Interviewer
  text: One or two?
- speaker: Respondent
  text: No, I actually have two, and then my mom raised my cousin, um, Melody, and she's, like thirty-one days younger than
    I am.
- speaker: Interviewer
  text: Oh wow. So, would, can you run me through, I know you have a sister named Sandy, who's just recently passed away.
- speaker: Respondent
  text: Yes. Sandy, um, passed away recently at the age of sixty-four. Yeah, that was last year.
- speaker: Interviewer
  text: Such a shame.
- speaker: Respondent
  text: And then, I have my oldest sister Diane. And she's married to Fred, and, his name's Fred Smith. And they live down
    in Florida together, and they've carved out a very nice life for themselves.
- speaker: Interviewer
  text: Great. And do you think she would have other memories of, um, did she ever get, get to meet your grandparents, you
    think, or--
- speaker: Respondent
  text: No. She never got--now she was born, she's almost nine years older than I am. And so, when she was born, um, from
    what I understand, my, um, grandmother on my mother's side, was alive for a week, but she wouldn't have any memories of
    that. But she may have information that I don't have.
- speaker: Interviewer
  text: Awesome. Okay, thank you.
- speaker: Interviewer
  text: Okay, so, do--you never got to meet your grandparents.
- speaker: Interviewer
  text: Um, where did you grow up, in Avondale?
- speaker: Respondent
  text: No, I actually grew up in Golf Manor.
- speaker: Respondent
  text: And, um, we had a nice little Cape Cod house, and it was a, a great community to grow up in.
- speaker: Interviewer
  text: So, when I think of Golf Manor, I think of it as largely a Jewish community, where you in Golf Manor because it was
    a, um, a Jewish community?
- speaker: Respondent
  text: Yeah. Yeah. My parents, um, migrated out there. They actually had, um, lived in Avondale by the zoo at one point.
    And then, um, I guess, the 1950s, everything started, uh, moving out to suburbia.
- speaker: Respondent
  text: And so they, they moved to Golf Manor.
- speaker: Interviewer
  text: And did you grow up going to Temple there?
- speaker: Respondent
  text: I did. I went to Golf Manor Synagogue there.
- speaker: Respondent
  text: And, um, it was a neat little neighborhood experience. It was sort of like a, um, a Mayberry. And in many, many ways.
- speaker: Interviewer
  text: Yeah. So, when, when your family previously lived in Avondale, before you were around, do you know where they worshipped
    in Avondale?
- speaker: Respondent
  text: Whatever the Golf Manor Synagogue was before it was Golf Manor Synagogue. I, I, I--
- speaker: Interviewer
  text: I can look that up.
- speaker: Respondent
  text: Yeah, I don't remember.
- speaker: Interviewer
  text: Because I know that Solomon, who owned the building, um, moved to Avondale, um, when he moved out, just directly when
    he moved out of the building. Um, and I have always wondered, and kind of assumed, that that was because he was going
    to, you know, and be, because of his religious community was sort of centered there. Do you know if that's true?
- speaker: Respondent
  text: No, no. Uh, what happened, from what I've been told, is that Solomon married a woman named Bertha. Uh, none of Solomon's
    children really liked Bertha. And, um, Bertha got Solomon to change the will. So there was a lot of bitterness that the,
    the kids felt slighted by, uh, Bertha, and that, that she was like, I guess what encouraged him to move down there. But
    ironically, my uncle Meyer still resided in that building. And when my uncle Herman passed away, my dad hadn't spoken
    to Meyer in years. And I ended up going down there with my father to advise him that, that, you know, my uncle Herman
    had passed away. And the building looked vacant. Um, there was no electricity, it was in the middle of winter. And I remember
    it was bitterly cold. And, um, we were like banging on the door. And, and finally, this face pops up, and the window's
    all dirty, but it looked like it was casted in a mold of my father's face. All my fathers and his brothers and his sister,
    they all looked alike, like they were cast in the same mold. And I remember, it, it took me back. And, um, my uncle Meyer
    was living, um, very frugally. I mean, he was dirt poor, and, you know, was still in that same building.
- speaker: Interviewer
  text: Yeah. He was living on the Findlay Street side, in the 12 Findlay address. Yeah. So, did you get to go into his house
    at all, or--
- speaker: Respondent
  text: I was just shocked at--it was so cold, and, um, I, uh--there was not a lot of love between my father and Meyer. And,
    um, I remember my dad just gave him the necessary information. And I, I felt bad, I don't want to leave--Meyer was very
    upset when he heard Herman had passed. And I remember he was weeping. And, um, I wanted to stay there and, uh, make sure
    he was all right. My dad was very abrupt, and he was like, "We're going. Let's go, now." (laughs)
- speaker: Respondent
  text: And he, uh, that's the way my, my mother kind of described my, um, um, grandfather Solomon. As, she said he was a,
    a little guy and smoked, like, hand rolled cigarettes, and he--she used to compare him to, um, the old, um, Sargent Carter
    from Gomer Pyle. That, that he was a no nonsense guy. And, um, according to my dad, he, he had, he was a, a, really good
    tailor, and not only a tailor he was a furrier. And that he could've gone to work for Pogue's, which was a major department
    store, but he, he didn't, he had no interest, he wanted to be his own boss.
- speaker: Interviewer
  text: Interesting. So, uh, I have so many directions I want to go. We'll come back to all of them, but we found evidence,
    that in the 1930s, Solomon, actually hosted, um, a séance medium, like a, a spiritualist--
- speaker: Interviewer
  text: --he allowed her to hold her seances and meetings in his building, in his space. Do you know anything about that?
- speaker: Interviewer
  text: Or does that resonate with anything you've, you know about him or the family.
- speaker: Respondent
  text: No. Not at all.
- speaker: Interviewer
  text: Yeah. Okay.
- speaker: Respondent
  text: I mean, I, I, never knew that.
- speaker: Interviewer
  text: I mean, it could have been that he was just, literally, renting space to her. And it was just for money. Um, I, but
    we, there were, she was advertising in the newspaper, that it was in his shop.
- speaker: Respondent
  text: Wow. Yeah, I'm not aware of any of that.
- speaker: Interviewer
  text: Gotcha. So, also in that building, there was a dry goods store on the ground floor that Rebecca ran. Do you know anything
    about that store.
- speaker: Respondent
  text: I know a couple of things. Um, apparently there was one there, but then she had a dry goods store somewhere in Price
    Hill. And, you know, I don't the exact location. But I've had older folks ask me about her. And that, you know, that she
    apparently, you know, was a, a, you know, a hard working woman that had that store.
- speaker: Respondent
  text: All of them were hard working. Work was a, uh--
- speaker: Interviewer
  text: --so, I'm curious about the Price Hill thing, because one of Solomon's brothers, and I can't remember which one off
    the top of my head, definitely lived on the west side. And so, I had wondered if they might have also had a store called
    the Kabakoff store. And I didn't know--
- speaker: Interviewer
  text: --if it was Rebecca running both, or if it were the two separate brothers.
- speaker: Respondent
  text: I, I don't know. Yeah.
- speaker: Interviewer
  text: You don't know. We'll do, we'll do more research, we can check into that. Yeah. Um, okay. So, do you, um, do you know
    of any--one of the things we need to do when we interpret this apartment is, um, recreate what their life would have been
    like. Like, what kind of furniture they would have had, um, objects, and, and one--so, I'm curious if you can think of
    any things that you know of that are in your family that would have come out of the house and what that might have been.
- speaker: Respondent
  text: There, there was a bookcase. And I'm so sorry my mom got rid of it, but it was heavy. It was a heavy bookcase. And,
    um, and that's about it. Now, from what my, um, cousin Phil told me--Phil and Eileen are both still alive--they would
    have more information. They actually met, you know, my grandparents. And--
- speaker: Respondent
  text: --so they, but, um, apparently, um, my grandmother would always have like a pot of food on the stove. And, um, my,
    uh, grandfather loved cats.
- speaker: Respondent
  text: And, um, he would be--so apparently he smoked so much his fingers were yellow. And he had, like, wire rim, like, John
    Lennon glasses. And, um, everybody worked. I mean, work was a big, big - um, you, you took pride in your work, work gave
    you meaning. And so, so, he was a hard, hard worker. And was always selling, but, um, he didn't want to teach my dad to
    be a tailor. He didn't want my dad to be a tailor. He did teach my uncle Herman how to, um, alter uniforms, or alter,
    you know, make alterations. Which, my uncle used-- it was valuable when he was in the Navy.
- speaker: Interviewer
  text: So why do you think he didn't want your dad to be a tailor?
- speaker: Respondent
  text: I, the, um, I'm just speculating here. I think that he wanted him to do something else. That he just, um, wanted something
    better for his kids.
- speaker: Interviewer
  text: And do you know anything about, um, how Solomon became a tailor? Like, did he have, had he had training as a kid in
    the Ukraine. Or, did he--is that something he learned here?
- speaker: Respondent
  text: You know, I, I, don't know. But traditionally, you know, um, it like, it was usually a trade that was handed down.
    So, I, I don't know anything about my great grandparents. You know, um, I'm not sure exactly how he got it. In fact, I,
    when I went to your, um, um--
- speaker: Interviewer
  text: --the talk--
- speaker: Respondent
  text: --talk, um, I learned that he had came over on his own as a young man. I'm like, wow, I, I was under the impression
    that, um, he came over with his family and that--
- speaker: Interviewer
  text: I know his mom was here. And I don't know, with, I could, we could do some more research about who came first and
    when.
- speaker: Interviewer
  text: But I know that his mom, Fanny--
- speaker: Interviewer
  text: --you know, was here eventually, yeah. We--
- speaker: Respondent
  text: And my dad had said something about they came to Newport, Kentucky first. And, I don't know why or how long they were
    there--
- speaker: Interviewer
  text: Well, I've also wondered--that's a period where the Jewish, um, agencies in Cincinnati--so they came, I think, if
    I'm remembering correctly, it was your grandpa in 1905 and then your grandma in 1906. But it could be the other way around.
    Um, but in that period, the Jewish charities of Cincinnati had kind of gotten together to provide resettlement services
    for Russian immigrants, or Russian Jewish immigrants. They were--honestly, the German Jewish--Cincinnati was a little
    embarrassed at how poor the Russians were. And so, they were trying to help them get a leg up. Um, and, so, I've always
    wondered if maybe your family got some resettlement services through the Jewish social services.
- speaker: Respondent
  text: I, I, do not know. But I, I remember as a really little boy that there was a, a, there was a little bit of a rivalry
    that still existed between the, the German Jewish immigrants and the, um, Russian Jewish immigrants.
- speaker: Interviewer
  text: Yeah. How did that rivalry, like, come out, how did you see it or know about it?
- speaker: Respondent
  text: Um, when I started working for the Golf Manor police department, um, as a dispatcher, um, we had a guy that owned
    a business whose last name was Signor. And, um, I remember hearing him talk very derogatory about Russian Jews. And I
    kind of felt like, wow, you know, I never had heard that before. And he was an older gentleman.
- speaker: Interviewer
  text: Huh. Did he know what your last name was? Were you, like, hey, (laughs)
- speaker: Respondent
  text: No, no, he didn't. Did not know. But uh, he was actually talking to the, um, Golf Manor police chief at that, that
    time, and I just happened to be in earshot.
- speaker: Interviewer
  text: Uch. What a drag.
- speaker: Interviewer
  text: Sorry about that.
- speaker: Respondent
  text: Oh, it's all right.
- speaker: Interviewer
  text: So, um, let's talk a little bit about your, your grandma's family, so, Rebecca's family. Do you know--I know you're
    in touch with, or you maybe know your cousin
