collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: So I wanted to kick off and just ask you, what are some of those memories of you all playing together in that sort
    of pre-band phase at home?
- speaker: Respondent
  text: Just playing together in the living room, we did. There was always music in our house though. Daddy always had musicians
    in the house. And, in evenings there were frequently musicians. And Daddy loved all kinds of music and he played all kinds
    of music. And sometimes it would be recorder groups because there were people—Daddy had a whole set of recorders, a quartet
    of recorders. He had more than that, actually, because he had the soprano, the alto, the tenor, and the bass recorder,
    and he had a sopranino, which is a very high recorder. And people in Hindman had, at the Settlement School, had recorders.
    Ruthie White was one. I think Alice Beaman. And there were people there that had recorders, and they'd play those sometimes.
    Not very often, but sometimes. And there was beautiful music that was—and Daddy made arrangements when he was in high
    school, even, that are still available through, I used to know the publishing company, maybe Schirmer Music, but I'm not
    sure.
- speaker: Respondent
  text: I used to know.
- speaker: Interviewer
  text: Still available?
- speaker: Respondent
  text: Yeah, still available.
- speaker: Respondent
  text: Recorder quartets.
- speaker: Interviewer
  text: And that's kind of back to his roots right because I mean we were just talking off-camera about how he would write
    these recorder arrangements very early in high school.
- speaker: Respondent
  text: He did, even before he was in high school he would take he would ride his bicycle out John Jacob Niles asked him to
    come teach music lessons for his children. And sometimes it would be recorders or sometimes other things. And Daddy would
    ride his bicycle from Lexington out to Boot Hill.
- speaker: Interviewer
  text: Yeah. I mean, you know you're kind of different if John Jacob Niles is asking you to come teach his children music.
    [laughs] And that's—okay, so take me back to the living room. So you had this sort of organic formation, of, of musicians
    playing, you know, pretty regularly. How would—take me back to one of those moments when you're reflecting as a young
    man at that point, um—
- speaker: Respondent
  text: It was just natural, it was so natural. When all the time growing up—uh, many nights as I was going to sleep listening
    to music in the other room, it was just part of life. It wasn't different. It wasn't a different thing. And frequently
    it would be country music or folk music or whatever Daddy was playing with, you know, whoever he was playing with. And
    sometimes it would be, dance music. or sometimes it would be just country songs. I mean it would be—it wasn't surprising
    whatever it was. And it was always good. It always felt—Daddy loved music and he had a real feeling for music. So whatever
    he played, it always had heart. For Daddy, it was not about technically difficult or technically—I like this piece because
    it's challenging or because it's that—it wasn't about that for him. It's, does it feel?
- speaker: Interviewer
  text: Mm-hmm. Hmm. It just sounds like he had such a wide range too, that he could, he was so versatile that he could—
- speaker: Respondent
  text: It wasn't about style, it was about feel.
- speaker: Interviewer
  text: —that if there were jazz musicians who lived down the, the road coming by the house, he could pull that off as well
    probably.
- speaker: Respondent
  text: Yeah, I don't think he, he just wasn't around a lot of jazz, I don't think. So that was never part of our, of our
    experience as much as other styles.
- speaker: Interviewer
  text: But, but if there were, he could have pulled it off.
- speaker: Respondent
  text: Well, yeah—
- speaker: Respondent
  text: —he would have known something to do.
- speaker: Respondent
  text: He didn't improvise like jazz players do. Jazz players improvise on chord structure.
- speaker: Interviewer
  text: That's right.
- speaker: Respondent
  text: Country musicians improvise on melody. And, uh, the difference is that you have to really have that melody in your
    mind, when you're, when you're playing. It’s not a matter of playing scales over something. It doesn't work like that.
    It—you’re making—it’s a lot more like composing, in my opinion. Composing or songwriting is about taking whatever boundaries
    you set up, if it's a theme or a style, or a, I mean, whatever in your mind it's going to be, and then sort of creating
    within that. And when you improvise in country music or folk music or, uh, in our musical styles, you're improvising on
    melody. Melody is strong, melody is important. It's hard, for me to think about trying to do something that's gonna be
    better or stronger, than playing the tune, than playing the melody. That's, that, that unyielding sense of melody is part
    of our music. And it's important. So even when you're playing something else, when you're improvising, you're remembering.
    And the person listening should remember it.
- speaker: Interviewer
  text: Yeah, right.
- speaker: Respondent
  text: It's not a matter of trying to get so far away from it that you're, that you're going somewhere else.
- speaker: Interviewer
  text: The point is to actually—
- speaker: Respondent
  text: The point is to, to augment or to, or to, uh, yeah, to make the song strong. If you're going to produce a country
    record, you want that to be, the sense of melody is important. You want to do everything you do to enhance the, the song,
    the whatever the vocalist is singing. That's an important thing in country music, in my opinion.
- speaker: Interviewer
  text: So you get all these people coming by the house, playing music. You, at this point are fairly mature in your playing,
    and, and such. You've got younger siblings who are starting to play. When, would you, would the kids sit in with these
    organic sessions? Or were the kids sort of separated from that and then you guys would have your own sessions?
- speaker: Respondent
  text: By the time we, by the time you're bringing us up now to about '68. By that time, there were not as many people coming
    over in the evenings. We were just singing and playing, uh, the four of us, really.
- speaker: Interviewer
  text: So tell me about those sessions.
- speaker: Respondent
  text: We would decide, we're going to try to sing this song or that song. Uh, we had some that we just loved, um, we sang
    "The Angels Singing in Heaven Tonight." It's a Stanley Brothers song. We sang, uh, "Roll Muddy River," the Osborne Brothers
    song. We sang, uh, we sang Bill Monroe songs. We sang a lot of bluegrass songs at that time. And early country songs,
    a lot of Carter family songs. We sang, we just sang what was on our hearts.
- speaker: Interviewer
  text: And so, who would play what instrument during those years?
- speaker: Respondent
  text: Before that I played the bass. I started playing bass when I was nine and I played that with my father all up till
    the time that Ruth started playing the bass and that was about the time I was playing the banjo. So I started playing
    the banjo, Daddy played guitar, Ruth the bass, and Alice hadn't started playing the mandolin yet. Matter of fact we had
    already had our television show for about a year before Alice started playing mandolin. And she said she started because
    she felt awkward not playing an instrument. And then, so she, said she wanted something to, and she did so well at it
    that immediately you missed her if she wasn't there.
- speaker: Interviewer
  text: Yeah, that's great. So during these years, pre-television show, when you're just kind of playing, she was in there
    harmonizing and...
- speaker: Respondent
  text: Yeah, she was singing. She had a very good sense of pitch, of harmony, of... She's just a good singer.
- speaker: Interviewer
  text: She still does have that.
- speaker: Respondent
  text: Yes, she does. She never lost that.
- speaker: Interviewer
  text: So, what—your mother during this time?
- speaker: Respondent
  text: Uh, Mother, uh, did a lot of baking, cooking. She, uh, was interested in things. She and Miss Thacker started the
    first, I think the first in Eastern Kentucky, Girl Scout—she and Miss Thacker started Girl Scouts in Eastern Kentucky.
    She started a Brownie troop when the girls were old enough to be Brownies. [laughs] And then, then they started Girl Scouts
    when they were that age. Mother did a lot of things. She loved dancing, always. Right up until she couldn't dance anymore,
    she loved dancing. And she, even after she couldn't dance, she stayed in the dance group and would help and talk.
- speaker: Interviewer
  text: But during these living room sessions with the family, what was she up to?
- speaker: Respondent
  text: Being hard of hearing, she didn't sing with us or play with us. And I don't know that our music sounded great to her
    through the hearing aids.
- speaker: Interviewer
  text: Mm, hmm. That makes sense.
- speaker: Respondent
  text: She was very supportive. And she wanted us to do well. But I don't know personally that the music, she loved music
    and she was very musical. But through her hearing aids.
- speaker: Interviewer
  text: The frequencies probably were harsh.
- speaker: Respondent
  text: It didn't, yeah, and hearing aids in the 60s were not what they are today either.
- speaker: Interviewer
  text: Yeah. Yeah. Okay, so you talked about some of the songs. You're playing together, I presume. It's going pretty well.
    Who comes up with the idea that we're gonna start performing out of this living room [laughs] and we're gonna call ourselves
    a band?
- speaker: Respondent
  text: We didn't decide that. We didn't decide that. Ms. Osborne had the Maytag dealership in Hindman, uh, Sloan Maytag Company,
    and she asked us if we'd come play. She wanted to have an open house. And she asked, and so Sloan Maytag Company, that
    was our first, uh, engagement. And we just came and sang all afternoon. [laughs] That was the first. And then we sang
    at the PTA meeting. Someone asked us if we'd do that. And we did a few things like that in Hindman. And our first paid
    engagement was for Uncle Charlie's Meatpacking Company in Hazard, Kentucky. And that was after we'd been on the television
    for a while. A few weeks, probably. It was about Christmas time, and they were having their Christmas party, and that
    was our first paid engagement. And I don't remember why. It was some odd amount, like $97 and some cents. [laughs] And
    I don't remember why. And Daddy said, "Well here, you need to have this." And he split that up amongst us kids. And I
    think Ruth, at that time, the First National Bank of Jackson was our sponsor on the television show and Ruth put that
    money in the First National Bank of Jackson and I don't think she ever took it out.
- speaker: Interviewer
  text: That's great, that is great.
- speaker: Respondent
  text: Ask her about that.
- speaker: Interviewer
  text: Yeah I will, I will for sure. Um, so you know when you were playing these things you weren't really calling yourselves
    anything at that point.
- speaker: Respondent
  text: Well, when we started the television show, we, started calling ourselves The Bluegrass State. And we did that because
    we were traveling at that time over to Belfry, Kentucky and playing—Sam King and his sons, Greg and Jerry, had, uh, a
    band. They had several bands, actually, and they ran the Pike County Jamboree and they had all these bands and the Pike
    County Jamboree is going to figure in the next few years so this would be about '67 probably, I imagine. And we made good
    friends with the Kings and we went to see them and they came to see us in Hindman and it was a lot more difficult traveling
    from Hindman to Belfry, Kentucky at that time than it is now because there are a lot of new roads since that time. But
    my gosh, it used to take hours on little roads and there were about three or four ways we'd go and at that time they were
    working on 23 and it was all torn up. And so we'd try to avoid most of the construction. And I mean, they were, it's hard
    to build a road and drive on it at the same time. And that's what they were having to do because there just weren't other
    ways to go that were very good. And so everybody was all going through this construction phase and it was so, so it wasn't
    easy to drive but we we started going over on Saturday nights and W, I think it was IXI. That's close, and Pikeville played
    all afternoon on Saturday afternoons, they'd alternate and play a song by the Carter family and a song by the—was it the
    Delmore Brothers? I think, and it was... We'd listen to that show all the way over driving to Belfry and we'd go play
    with our friends and there were some wonderful people there. We met Jimmy and Ada McCown there. This was before their
    children were, uh, later their children played with them too, and they were wonderful. But they got COVID during the pandemic
    and passed away. But they were, oh my gosh, amazing musicians. Snake Chapman and Paul David Smith and, and, and, um, um,
    uh, sorry names are flying out of my head like crazy. Uh, there were some wonderful singers and players there. We just
    loved playing with them. We did that for quite a while.
- speaker: Interviewer
  text: What were some of the songs that you would play?
- speaker: Respondent
  text: At that time, we played songs like, uh, the Sons of the Pioneers song, "Cimarron", and "Cool Water". Um, The Coasters,
    "Charlie Brown", we sang that. It wasn't just bluegrass songs and country songs that we sang, we didn't care. We sang
    everything that we liked.
- speaker: Interviewer
  text: That's great. I bet those were wonderful.
- speaker: Respondent
  text: It was a wonderful experience. It was a wonderful experience. And nobody ever said to us, well you shouldn't do that,
    it's not bluegrass, you shouldn't do that, it's not bluegrass, you shouldn't do that, it's not this or it's not that.
    At that time, people were a little more accepting than they were later. People became more rigid about what was exactly
    this or exactly that. I mean, by and large, I mean, I say that I'm speaking in generality. Some people thought very definitely
    it should be this or that. And some—but a lot of people—
- speaker: Respondent
  text: the people we were around did
