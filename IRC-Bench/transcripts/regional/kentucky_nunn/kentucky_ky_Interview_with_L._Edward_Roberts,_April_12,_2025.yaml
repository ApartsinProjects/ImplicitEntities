collection: kentucky_nunn
source_url: https://kentuckyoralhistory.org/
turns:
- speaker: Interviewer
  text: Would you mind telling us a little bit about who you are and your name and your relationship with the clinic?
- speaker: Respondent
  text: I'm Edward Roberts. I'm a physician. I've practiced medicine in Mount Sterling since 1979. I helped found the clinic
    in the nineties, around 1996. Since then I've been on the board of directors, the president chairman of the board of directors,
    and then the medical director. I've been volunteering at the clinic until late 2024 when I stepped aside. I'm still the
    medical director and chairman of the board but I don't volunteer as a physician here anymore. We have another full-time
    person now.
- speaker: Interviewer
  text: So you have a very nice career in medicine. Do you want to tell us a little bit about how you got into it and your
    story of becoming a doctor and a physician?
- speaker: Respondent
  text: My father was a physician who practiced family medicine here in Mount Sterling. He had practiced in Eastern Kentucky
    before as a physician working for Inland Steel in a coal mining town called Wheelwright. He moved to Central Kentucky
    in the fifties. I watched him practice and he was definitely a role model. When I went to undergraduate school, I had
    no intention of being a physician. It was a time of great turbulence with the Vietnam War and protests, which I participated
    in. I decided I couldn't go into law and be a politician, which I had intended, and that I had to do something useful,
    so I became a physician. I shifted my career, studied organic and inorganic chemistry, then went to the University of
    Kentucky School of Medicine and graduated in 1976. I wanted to go into internal medicine and thought I would go to Danville,
    Kentucky to be away from family but was persuaded that they didn't need extra doctors, so I ended up in Mount Sterling
    where my family was.
- speaker: Interviewer
  text: What's it been like being able to be a physician here in your hometown and with a community that you were familiar
    with and connected to?
- speaker: Respondent
  text: It's wonderful and frustrating at the same time. It's wonderful to know so many people and be casual acquaintances
    with many. But it's frustrating that I need to talk about the little white pill at Kroger's when shopping because I can't
    remember what it is. Most things are great and wonderful. In a small town, it's easy to see that you are having an impact
    on the quality of life of the people you live with. To me, that's important and makes it worthwhile to see that you've
    made a difference, usually small but a little difference.
- speaker: Interviewer
  text: So The Post Clinic started in the nineties. What was practicing like here before then? Did you work in a private practice
    or at a hospital?
- speaker: Respondent
  text: I had my own private practice, which is very unusual today. Most physicians now are employed. I had an arrangement
    with other private physicians in town to take call so I wasn't on call 24/7. I had a little office and saw people. I recognized
    in the eighties that many people couldn't afford what I thought they needed. I remember a patient with thyroid disease
    who refused a new antibody test because it cost $1,200. Health care is just not affordable for a lot of people. I tried
    to figure out how to address the issue. If you take on many patients who can't pay and don't charge them, it becomes cumbersome
    for you and others covering for you. There were complaints about free care from some associates who couldn't afford it.
    I thought maybe as a group of physicians we could say there was a need for free access to primary care. We formed the
    Montgomery County Medical Society. There had been a medical society many years ago but nothing after that. We had mostly
    social meetings but discussed the need for access to healthcare and decided to start a free clinic. I was a member of
    the Presbyterian Church, which had an empty building next to the church on Main Street. I asked if we could start a free
    clinic there and they said yes and supported us by paying janitorial service, utilities, and insurance. Many volunteers
    who checked patients in were church members. The Presbyterian Church partnered with volunteer physicians from the local
    medical society to have a clinic, usually one day a week. We advertised by word of mouth and it got overwhelming quickly.
    We needed a clinic director and volunteer nurses to do EKGs and finger stick blood tests for blood sugar, hemoglobin A1C,
    and cholesterol. We began casting about for more volunteers. Many local physicians participated, some a couple of times
    a year, some weekly. It gave physicians a way to give back to the community with their skills. That's how it got off the
    ground. Dr. Tingle, our dental director, approached us about setting up a dental clinic. It was difficult to put a dental
    clinic in the old post office building, so we talked to Dr. Razor who had a dental building with a vacant office. He let
    us use it. Twenty volunteers cleaned the building, painted, and moved in used dental equipment Dr. Tingle found. We had
    a medical clinic in one building and a dental clinic in another, both under the Post Clinic umbrella. Bob Klink, a retired
    social worker, was our clinic director for many years until Louise Summers took over about 15-20 years ago. Then the dental
    building owners wanted us to leave because they had a renter. A local physician who owned the building next door gifted
    it to us for a tax break. Twenty to thirty people cleaned and moved us in. Both clinics were in one building built in
    the 1950s as a medical building, more suitable for our needs. We had trouble with handicapped accessibility. A patient
    in a wheelchair couldn't use the toilet and a patient on a walker fell entering the building. We sought money to make
    it accessible but learned federal money requires the whole building to be accessible. The architect said it was better
    to build a new building. We got two federal grants with help from local and state officials to build a new fully accessible
    structure. The clinic operates without federal money but gets small stipends from the city and county. Individuals in
    the community donate money. We have a part-time employee, Louise Summers, a paid dentist two days a week, a nurse practitioner
    five days a week, and a paid receptionist for dental scheduling. All others are volunteers. Paid staff are not highly
    paid. The group has been around about 30 years, treated thousands of patients, and is growing. With expected Medicaid
    cutbacks, we expect more patients. We don't turn anyone away. Even if you have insurance but no doctor, we see you free
    of charge. We apply an income scale. If people make less than the threshold, we don't require documentation. If they say
    they need care, we believe them and take care of them.
- speaker: Interviewer
  text: You shared a little bit about the original building that was next to the church that the clinic started in. That building
    helped the clinic get its name. Do you want to talk about that a little bit?
- speaker: Respondent
  text: It was a beautiful building, the old post office, built in the 1920s, around 100 years old. It has a beautiful granite
    foundation and a stained glass skylight inside. The church, when the post office was moving out, wanted to use it for
    parking.
