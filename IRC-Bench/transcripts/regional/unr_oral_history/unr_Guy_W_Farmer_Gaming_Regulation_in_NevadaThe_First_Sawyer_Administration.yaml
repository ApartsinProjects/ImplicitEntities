collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: When I went to work for the state, my position was with the Gaming Commission. In reality, however, I performed as
    public information officer and press spokesman for both the Gaming Commission and the Gaming Control Board.
- speaker: Respondent
  text: Right from the beginning, I reported primarily to the Gaming Control Board chairman, Edward A. Olsen, and, to a lesser
    degree, to the commission. As chairman of the Gaming Control Board, Ed held one of the most important positions in state
    government. Governor Grant Sawyer had run for election on a "hang tough" gaming control policy, and Ed was the right guy
    for that job. The other members of the board were Ned Turner, who'd been a clerk of the Nevada Supreme Court, and a former
    Clark County sheriff, Butch Leypoldt.
- speaker: Respondent
  text: 'During my time, the membership of the commission and the board remained the same. Milton Keefer of Las Vegas was
    chairman of the commission throughout. He was an attorney in private practice in Vegas. Another member was James Hotchkiss,
    who ran an armored car service in Vegas. There were two Reno members: F. E. "Pete" Walters, a realtor; and Pete Petersen,
    former Reno postmaster. Norman Brown, a rancher in Smith Valley, was also on the commission.'
- speaker: Respondent
  text: Milt Keefer was definitely the leader of the commission and a strong chairman. He was kind of a tough customer, quite
    demanding, and he closely scrutinized recommendations made by the board. On occasion he questioned their decisions, but,
    for the most part, the commission went along with the actions the board took - most particularly, in the Sinatra license
    revocation case.
- speaker: Respondent
  text: 'Milt was backed up very firmly by Jim Hotchkiss. They had similar backgrounds: they were both former FBI agents,
    and they didn''t like the mob. They believed in the Black Book concept and the idea of weeding the hoodlums out. We''re
    not just talking about people who may have been illegal gamblers prior to coming to Nevada - I mean, we would have lost
    everyone! [laughter] But as we used to say, and maybe they still do today, "Who do you want running a casino, a gambler
    or an accountant?"'
- speaker: Respondent
  text: Jim Hotchkiss was a strong member, but the Reno members were less memorable to me. Pete Walters kept up with things
    pretty well and knew what was going on, and I viewed him as a good member of the commission. Pete Peterson, the ex-postmaster,
    was probably the political appointee - a good fellow, but he didn't exercise any leadership that I remember.
- speaker: Respondent
  text: Norman Brown was a pillar of integrity. He was the kind of old-line Nevadan that you really like to have on the Gaming
    Commission. There was no way to bribe a fellow like this - he just cared very deeply about Nevada. I really admired him
    for his character and the kind of person that he was. He was a Smith Valley rancher, and sometimes he'd miss a meeting
    because he was driving his cattle from Smith Valley to Bridgeport or back, because that was his priority at the time.
    When it came time for the cattle drive, that's where you'd find Norman Brown. I actually arranged some speaking appearances
    for him, and he was great, talking about the need for strong gambling control and for keeping the mob out.
- speaker: Respondent
  text: The members of both the board and the commission were appointed by the governor. The Gaming Commission was given final
    authority for gaming licenses and all disciplinary actions, and the board was the administrative body that did everything
    else - all of the license investigations, the enforcement investigations - and administered the gaming laws on a daily
    basis. Basically, the commission met once a month, unless there was some kind of emergency.
- speaker: Respondent
  text: The Gaming Control Board members were full-time employees, whereas the commission was a part-time body. What you were
    looking for in the commission were distinguished Nevadans with reputations for honesty and integrity, who would act in
    the best interests of the state on their decisions on gaming licenses and enforcement actions.
- speaker: Respondent
  text: It's my understanding that before the board and commission were created, gaming control in Nevada was named "Robbins
    Cahill." [laughter] Bob Cahill was it! He was the executive secretary of the Tax Commission, and the only hammer the state
    had on licensees was really through the Tax Commission. Bob Cahill did attempt to do some background investigation, and
    he was a towering figure of his time, during the 1950s. I think he paved the way for the tougher gaming law that came
    with the election.
