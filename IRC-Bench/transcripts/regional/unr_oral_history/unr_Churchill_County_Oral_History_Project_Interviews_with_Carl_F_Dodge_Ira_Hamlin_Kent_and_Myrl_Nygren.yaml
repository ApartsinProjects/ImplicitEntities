collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about the early days of agriculture in Churchill County?
- speaker: Respondent
  text: In 1900 Churchill County was Nevada's poorest and least populated county, with fewer than 850 residents. It had no
    appreciable mining industry, and its arid valleys and basins could not support agriculture. Two federal projects would
    eventually transform Churchill County. The first brought water; the second brought military spending and payrolls.
- speaker: Interviewer
  text: What role did Francis G. Newlands play in the development of Churchill County?
- speaker: Respondent
  text: Francis G. Newlands represented Nevada in Congress from 1893 until his death in 1917, serving five terms in the House
    of Representatives and three in the U. S. Senate. Newlands was an enthusiastic proponent of several Progressive Era notions,
    including the idea that rigorous, public-financed water resource management could bring agriculture and civilization to
    the arid, rough reaches of the West. With Theodore Roosevelt's support, Newlands authored the Reclamation Act of 1902
    to achieve this purpose, and then succeeded in making Churchill County the target of the first such effort.
- speaker: Interviewer
  text: How was the water delivered to the farms in Churchill County?
- speaker: Respondent
  text: Through a system of canals, dams, and reservoirs, close to 90,000 acres of desert were eventually irrigated by water
    from the Carson and Truckee rivers. Land offered for sale by the U. S. Reclamation Service attracted settlers to the area,
    and the communities of Fallon and Fernley formed.
- speaker: Interviewer
  text: What challenges did the farmers face after the Newlands Project began delivering water?
- speaker: Respondent
  text: The pace of agricultural development was slower than had been anticipated. The irrigated soil was excessively alkaline,
    and there were other problems, such as distance from markets. At first alfalfa was practically the only cash crop; later,
    beef cattle and feed lots were tried, as were small dairies and poultry farms. Cantaloupes, sugar beets, and potatoes
    were also cultivated with varying degrees of success.
- speaker: Interviewer
  text: Did the Newlands Project bring prosperity to Churchill County?
- speaker: Respondent
  text: Most Newlands Project farmers could make a modest living from the land, but real prosperity eluded the county's residents
    until the U. S. Navy built a large aviation gunnery and training base at Fallon during World War II, freeing the area
    from its almost total dependence on agriculture. The facility was briefly closed following the war, reopening when the
    Korean War broke out. It has remained active ever since.
- speaker: Interviewer
  text: How has Churchill County changed since the early 20th century?
- speaker: Respondent
  text: The area served by the Newlands Project has come a very long way from its depressed state at the opening of the twentieth
    century. However, the growth and development Churchill County currently enjoys derive less from Newlands agriculture than
    from the presence of the military and increasing numbers of retirees and commuters attracted by a mild climate, outdoor
    recreational opportunities, and the relative safety and convenience of life in small rural communities.
