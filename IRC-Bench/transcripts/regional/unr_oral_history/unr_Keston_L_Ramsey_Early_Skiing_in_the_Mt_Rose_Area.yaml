source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: I wanted to ask you about the Sky Tavern facility. The first thing would be the purchase of the land. How did you
    purchase the land and when?
- speaker: Respondent
  text: Well, we purchased the land on the twenty-fifth of May, 1945 from Robison Neeman. At that time there was only the
    T-bar, which had been installed in 1944. A small building with a bedroom and a bath was all the facilities that were there
    at the time. We started building the hotel around the first of September of 1945 and had it open for business by December
    fifteenth of the same year.
- speaker: Interviewer
  text: We had talked about how you built it and who you used on the crew and something like this.
- speaker: Respondent
  text: The material was pretty hard to get a hold of, so we had to scrounge around and there wasn't too much available, as
    it was right after the war. We had a hard time finding plumbing materials and electrical materials although lumber was
    in plentiful supply. I had two crews of men from Reno which I brought up with me; we framed the building in after the
    foundation was in thirteen days from the time we started the framing until we had the roof on. After that, the plumbing
    and electrical work were done. In doing the outside, we had to build the parking lot, put the sewage system in, and put
    the water supply in. Labor was pretty short so we used some of the GIs from the Reno Army Air Base. The boys worked on
    night shift and we picked them up in the morning, took them up to Sky Tavern and worked them during the day. We would
    return them at night so that they could return to the base for their night shift.
- speaker: Interviewer
  text: Did you have some problems putting in the water, also putting in the sewer? That was quite a challenge.
- speaker: Respondent
  text: That was quite a job. It took a lot of time and hand labor. We had to pack all of the water tank and parts up the
    hill by hand and the three-inch sections of water pipe. It took four men to pick one up and pack it up there, and that's
    what we used the GIs for on that type of work. And the sewage system, we had a backhoe that did most of the excavating
    for that, but we built our own septic tank. We built a redwood ten-thousand-gallon septic tank, and then we dredged out
    the lake to obtain the soil to build the parking lot in front of the hotel. We ended up with parking for about three or
    four hundred cars, which was very limited with the full capacity crowds that we had on weekends.
- speaker: Interviewer
  text: You built a skating rink?
- speaker: Respondent
  text: We leased the area out to a party that tried to use the little lake for a skating rink, but there were so many problems
    with the wind blowing the snow after the first couple of weeks, he gave it up, and decided that it wasn't the right place
    to have a skating rink.
- speaker: Interviewer
  text: And you had some storms up there that kind of interfered with it too.
- speaker: Respondent
  text: Yes, it was a very wet fall, and during October and November, we averaged two storms a week. In October it mostly
    rained, and in November we had several snowstorms. In December we had several snowstorms. We had to haul all of our furniture
    up there in the blizzard. We finally had everything ready to go on the fifteenth of December. That's when our first guests
    started arriving.
- speaker: Interviewer
  text: There was more acreage involved than just Sky Tavern.
- speaker: Respondent
  text: Yes. When we purchased it, we purchased approximately eight hundred acres of land which included some land below Galena
    Creek at the edge of the timber; it also included the parcel where Reindeer Lodge is now and another parcel where the
    Christmas Tree is, that included two hundred and eighty acres up above which is now part of the Mount Rose Ski Area.
- speaker: Interviewer
  text: Did you want to discuss what Sky Tavern was before you developed it? What was the history on that?
- speaker: Respondent
  text: As far as previous development, in 1939 and 1940, there was a small rope tow on the hill that was put in by Wayne
    Poulsen and another fellow - I can't think of his name right now - Ed Health. They started from where the old highway
    crosses the middle of the hill and went two-thirds of the way toward the top. After Mr. Neeman bought it, he kicked them
    off, and in 1941 I built a two-section rope tow for him, which he operated just one season and then they used the little
    building down below to serve sandwiches and hot dogs.
- speaker: Interviewer
  text: You might want to talk about why you wanted to go into this business. What was your motivation?
- speaker: Respondent
  text: I had been skiing for a few years and really enjoyed it. I thought it would be fun to get into the business. It ended
    up being nothing but a lot of hard work. Being a contractor, the construction part of it was no problem at all.
- speaker: Interviewer
  text: You enjoyed skiing as well. And you had skis when you were younger?
- speaker: Respondent
  text: I'd been skiing approximately four or five years. I mostly walked at that time, there being no ski tows in the area.
    In 1938 they had a rope tow over at Donner Summit which we used to go over there and ski. And that fall they started building
    the Sugar Bowl Resort which had the first chair lift in the Sierras, I believe, the first one in the West.
- speaker: Interviewer
  text: Did they have trouble getting access into Sugar Bowl?
- speaker: Respondent
  text: The Sugar Bowl was closed on account of the war years. They had to cross the railroad tracks, which was a restricted
    area for several years. The Sugar Bowl didn't reopen again until 1946-47 season.
- speaker: Interviewer
  text: The community was pretty happy to get this resort, weren't they?
- speaker: Respondent
  text: Reno and the Chamber of Commerce were very supportive of the efforts we made up there, but the only problem was it
    was a small area we had when the crowds were so large, so that every year we had to increase the facilities to take care
    of the extra people. Of course the highway, at that time, was closed at Sky Tavern and the road couldn't be kept open
    to Incline and Lake Tahoe. At that time there was nothing at Incline except three or four homes. That development all
    came later. The existing highway, which bypassed Sky Tavern, was not completed until 1960.
- speaker: Interviewer
  text: We might want to talk about the everyday work week on the hill. What did the people do who worked on the hill, what
    was their schedule?
- speaker: Respondent
  text: The first year that we were in operation, we had no electricity; we had a generator, which generated our power. All
    the ski lifts had to be operated with gasoline motors, which meant that we had to pack the gasoline up every morning,
    and we had no grooming equipment. Everything had to be done by hand. We had to dig out the bottom and top terminal every
    morning, when we had heavy snows. We had no telephone for two years, so the conditions were pretty primitive there the
    first two or three years. It wasn't until five years after we opened before we got three-phase power so that we could
    convert the lifts over to electricity.
- speaker: Interviewer
  text: What did the people have to do on the hill every day to get the slopes ready?
- speaker: Respondent
  text: We'd have to round up a bunch of skiers and the ski patrol and take them up on the T-bar and let them sideslip down
    the hill, in order to pack the slope. We usually started out with a limited area during the day where we could ski, and
    then during the day as more area got skied out, we could expand and ski more of the slopes.
- speaker: Interviewer
  text: Did they start work about eight a.m. in the morning?
- speaker: Respondent
  text: The employees would get there at eight, but we ran the lifts from ten until four. There was usually a few hours work
    in the morning, getting everything ready. We had to get the gasoline up there and get the lifts going.
- speaker: Interviewer
  text: How many employees did you have on the hill?
- speaker: Respondent
  text: We had two regular full-time employees, one at the bottom and one at the top, and on weekends, we had quite a few
    volunteer people who worked part-time. Some were from the University of Nevada and some of the local ranchers and their
    sons came up and helped us.
- speaker: Interviewer
  text: Who did you have working in the end?
