collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Can you tell me about your early life and where you were born?
- speaker: Respondent
  text: I was born in 1917 in a small town in racially segregated Mississippi.
- speaker: Interviewer
  text: What was it like growing up in Mississippi during that time?
- speaker: Respondent
  text: It was a time when the U.S. Supreme Court ruled that ordinances compelling residential segregation of the races were
    in violation of the Fourteenth Amendment. But despite that, there was more Jim Crowism than Jim Crow laws. Segregation
    and discrimination were still very much a part of life.
- speaker: Interviewer
  text: When did you and your family move from Mississippi?
- speaker: Respondent
  text: In 1922, my mother took me and joined the swelling flood of blacks migrating to Northern industrial cities. We moved
    first to New York, then to Philadelphia, to Detroit, and finally to a relatively stable life in Hamtramck, Michigan.
- speaker: Interviewer
  text: What was your experience like in those cities?
- speaker: Respondent
  text: We experienced poverty, racism, and de facto segregation everywhere. But we were also introduced to the color-blind
    power of political patronage and to the economic opportunities of illegal enterprise for those shut out of the mainstream
    economy.
- speaker: Interviewer
  text: How did your mother influence you during your upbringing?
- speaker: Respondent
  text: My mother taught me to be outspoken and to work hard in school. I was always better at being outspoken than at schoolwork,
    but I became a reasonably good student and an outstanding athlete in high school.
- speaker: Interviewer
  text: Did you receive any scholarships for college?
- speaker: Respondent
  text: Yes, I was awarded an athletic scholarship to the University of Detroit, where I was the only black on the football
    team. But in my junior year, for reasons associated with race, I lost the scholarship and could only continue my studies
    by working full time in an automobile factory.
- speaker: Interviewer
  text: What did you do after college?
- speaker: Respondent
  text: I persevered and went on to earn a degree from Meharry Medical College's School of Dentistry in 1944.
- speaker: Interviewer
  text: Did you serve in the military?
- speaker: Respondent
  text: Yes, I served in the U.S. Army during World War II and was recalled to service at the end of the Korean War.
- speaker: Interviewer
  text: What happened after your military service?
- speaker: Respondent
  text: After being discharged, my wife and I relocated to Las Vegas. I liked Las Vegas from the beginning—it was a twenty-four
    hour town with lots of live entertainment, gambling, sunshine, and money—but I encountered the same types of racial discrimination
    there that I had lived with all my life.
- speaker: Interviewer
  text: How did you respond to the discrimination in Las Vegas?
- speaker: Respondent
  text: I would not put up with it. Within a year of my arrival, I was speaking out and attacking segregation in Las Vegas
    with such passion and vehemence that I was elected president of the local branch of the NAACP.
- speaker: Interviewer
  text: What actions did the NAACP take under your leadership?
- speaker: Respondent
  text: Following the example of civil rights activists in the South, the branch soon took direct, confrontational action
    to end overt segregation in Las Vegas. And in 1960, we succeeded in ending it in dramatic and surprising fashion.
- speaker: Interviewer
  text: What has been your involvement in civil rights since then?
- speaker: Respondent
  text: I stepped down as president of the Las Vegas NAACP in 1961, but for over forty years I have continued to speak for
    the interests of the black community. I have been appointed to various boards and commissions, served on advisory councils,
    and even ventured into election politics.
- speaker: Interviewer
  text: Can you tell me about your political involvement?
- speaker: Respondent
  text: I was too outspoken to have much success in politics, but in 1992 I was elected to the non-partisan Clark County School
    Board. For the next four years, I spent my free evenings and weekends poring over the mountain of paperwork associated
    with school board affairs.
- speaker: Interviewer
  text: What are your thoughts on the progress made in civil rights since the 1950s?
- speaker: Respondent
  text: Tremendous progress has been made toward the betterment of my people, but I worry that those gains will be wiped away
    by a rising tide of conservative reaction similar to the one that doomed the first reconstruction era. I remain an unwavering
    supporter of affirmative action and majority-minority voting districts.
