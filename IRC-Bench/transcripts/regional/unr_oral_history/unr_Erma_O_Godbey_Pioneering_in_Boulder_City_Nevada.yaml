turns:
- speaker: Respondent
  text: Drumm and Martha McFalls. They were tobacco tanners in Lancaster County, Pennsylvania. My grandfather Drumm was killed
    in the Civil War at the second battle of Manassas. My father was just a baby at this time, the youngest of twelve children.
    After Grandfather died, Grandmother had an awfully hard time with the farm and it went into litigation.
- speaker: Respondent
  text: All the older children began to go out on their own. Some of them got married, and some went to work. Then when my
    father was five, his mother's health was failing, and his older brothers didn't feel like taking care of him. So when
    he was eight, my grandmother bound him out to a dairy farmer, and he was to stay with this dairy farmer until he was sixteen.
    Grandmother died when he was about nine or ten, just soon after she bound him out.
- speaker: Respondent
  text: Then, although this dairy farmer was good to him and all, he didn't stay to finish his period of being a bondman.
    He left and came west when he was about fourteen or fifteen; he just worked his way west with teams and things like that.
    Then he became a lumberjack, and worked in the logging camps. Later he became a millwright.
- speaker: Respondent
  text: Now, I'll tell about my mother's side of the family. My mother's father, Thomas Milton Morris, went to California
    in the Gold Rush of '59 (not '49). His mother and her mother's sister and her grandmother were all in Missouri. Great-grandmother
    was a nurse and the two daughters, my grandmother and her sister, were schoolteachers. They worked quite a bit with the
    "underground" of the slaves coming through. They nursed those that were sick and taught those that were not sick. So they
    helped with that smuggling.
- speaker: Respondent
  text: After the Civil War, Grandfather Morris decided to go back and marry his sweetheart, and he went down the coast of
    California. There were so many highwaymen in those days, especially preying on men who were coming back from California,
    that he was afraid to go cross-country. So he went down the coast of California and across the Isthmus at Tehuantepec
    and up through Texas and on up into Missouri. There, he married my grandmother, who was Samantha Monroe.
- speaker: Respondent
  text: They lived there in Missouri just a little while and moved on to Texas. They had a farm there with cattle, and they
    raised sweet potatoes and all kinds of things like that.
- speaker: Respondent
  text: In 1880, Grandfather Morris decided to go further west and he, in some way, got a lineup on some land that some family
    hadn't quite proved up on. He could get it and finish the initial proving up on the homestead, so they started to Colorado.
    Mother, by that time, was eleven years old. Her little brother had died with membranous croup and there were two little
    sisters, Clara and May. Clara was about seven and May, four-and-a-half at this time.
- speaker: Respondent
  text: My mother and Grandfather drove cattle and Grandmother drove the team with the babies in the wagon. They had a pretty
    rough trip - Indian fights and all and cooked their meals over the campfire. They used buffalo chips to build a campfire
    because, on the prairie, there was not much of anything except grass, and you couldn't use that to build a fire very well.
- speaker: Respondent
  text: When they got to Alamosa, Colorado, here's where some old crooks come in. There were some men that told Grandfather
    that where he was going there wasn't any grass, that the grass wouldn't support his cattle. So after they had driven them
    all that way, Grandfather sold all but a few of them, just for practically nothing to this man there. Alamosa, Colorado,
    was, at this time, the end of the railroad.
- speaker: Respondent
  text: So, they went on their way to Mancos, Colorado, and they took up a homestead and, of course, built their log cabin
    and settled down there. Grandmother was the fifth white woman in the valley. There were probably about thirty men, but,
    in those days there were few women in the west. Of course, they had to grub sagebrush and everything like all the westerners
    did. Mama being the oldest, always had to be Grandpa's "boy" so she had to get out and work just like a boy would and
    help cut the fenceposts and everything.
- speaker: Respondent
  text: It was so far to go for their supplies - they had to go clear to Alamosa - and there were no roads - they had to ford
    streams and everything - it would usually take anywhere from a month and a half to three months to make a trip for supplies
    to Alamosa.
- speaker: Respondent
  text: One time when Grandfather was gone for supplies, Mama was out by the woodpile and a group of young Indian braves just
    came riding by - I think they were Navahos - and there were about six of them. So they decided she was going to sharpen
    their knives on the grindstone. She started to sharpen their knives and when she'd get tired and try to run, they'd grab
    her and act like they were going to cut her throat. So she'd go back and then they'd laugh. They thought it was great
    - making her sharpen their knives.
- speaker: Respondent
  text: Then, all of a sudden, instead of making a run for the house like she'd been trying to do before, she saw the double-bitted
    axe on the woodpile and she made a dash for it and grabbed it. Then, she just came back and ran for the house and scattered
    them, and they all just jumped on their horses and they ran off, just laughing.
- speaker: Respondent
  text: Of course, in the meantime, Grandmother had the other children in the house and she was scared, but she was calling
    to Mama, trying to get her to break away and come. They had heard Grandmother call my mother - Lina was my mother's name
    - but they couldn't say Lina, they said Launa, so they told it all through the Indian villages and everything that "little
    white squaw heap much fight."
- speaker: Respondent
  text: Then, another time when Grandfather was gone, some Indians came to the house again. By this time, Mama was about sixteen,
    and Clara must have been around thirteen. Mama was chopping cabbage in a great, big wooden bowl with one of those old-fashioned
    choppers, and one of the young bucks just came and stood right there inside the house.
- speaker: Respondent
  text: He came over and he started teasing her and he'd stick his hand under the chopper. She would tell him to take it out
    and he would stick his hand under, and finally, she chopped his hand and he went for his knife. Aunt Clara stuck Grandfather's
    big, old shotgun right in his belly. Well, the others took him and they went off.
- speaker: Respondent
  text: It wasn't long after that incident when the chief of them - evidently his son was in this bunch - came to Grandpa
    and he wanted to give him 200 horses and a whole batch of sheep if Mama would marry his son. Well, of course, Grandpa
    was really upset about such a thing as that and told him to get out of there, that his daughter wasn't going to marry
    any Indian.
- speaker: Respondent
  text: I can remember as long as my mother lived, she always said an Indian was as good as a coyote and a dead Indian was
    the only good one. So those are things that happened. However, the Indians never did really hurt the family, but they
    did come by like that.
- speaker: Respondent
  text: The Wetherill boys were out hunting for wild horses and they found Mesa Verde - the ruins of Mesa Verde. Later on,
    my Aunt May, who was the youngest of Mother's sisters, married a sheep man whose name was Arthur Ames. He had used Navaho
    and Ute herders and he understood both Navaho and Ute language.
- speaker: Respondent
  text: He, one time, bought up a whole lot of sheep and he took them back to (this was after the railroad had gotten in to
    Mancos) Kansas City on the railroad to sell. He was going to sell them and take a chance on making a profit on them, but
    he had guaranteed all these sheep men so much money per head.
- speaker: Respondent
  text: Well, when he got to Kansas City, the stockyard had blackleg and so he wasn't allowed to unload the sheep. He had
    to negotiate then for a train to bring them back and clear the sidings. By the time he got them back into Colorado to
    an area where they would be allowed to be unloaded (because cattlemen wouldn't allow sheep on their land) many of them
    had died of starvation and lack of water.
- speaker: Respondent
  text: Uncle Arthur was always such a tenderhearted man, it just nearly killed him, besides ruining him financially.
- speaker: Respondent
  text: After that, he went down to Towoac, which was an Indian reservation and he taught the Indians - there were Navahos,
    Utes, and one or two Blackfeet. He was teaching them herding and some agriculture and my aunt was cooking for the other
    men that were working with the Indians.
- speaker: Respondent
  text: She also had some Indian women in the kitchen with her and she taught them some domestic sciences and canning. After
    that, Uncle Arthur became the Government Sheep Inspector for the four corner states, Utah, Arizona, Colorado, and New
    Mexico. He would oversee all the dipping of the sheep and things like that.
- speaker: Respondent
  text: But in between the time he had helped these people learn better ways of doing things, they were beginning to open
    up Mesa Verde, but there was no road. So, as he could talk Navaho and Ute, he had Navaho and Ute workers and worked on
    the building of a road to Mesa Verde from the Cortez side.
- speaker: Respondent
  text: Uncle Arthur, in his travels with his sheep and different things up and down McElmo Canyon, ran on to quite a lot
    of Indian artifacts. There were the mound people down in this area, close to where McElmo River empties into the San Juan
    River. At the base of a cliff, which they called Battle Mountain, he found just hundreds of bones of people.
- speaker: Respondent
  text: There were men, women, and children. Of course, they figure that all of these jumped off the cliff, rather than be
    taken prisoner by some other tribe at some time. Also in that area, he found a very large skeleton. Now, most of these
    people were rather small, but this skeleton was over seven feet long and he managed to get it all.
- speaker: Respondent
  text: It hadn't been pulled apart by wild animals or anything and that he sent to the Smithsonian Institute in Washington.
    The mound people buried their dead usually in the birth position and they put their babies in earthen jars with a sealed-on
    lid.
- speaker: Respondent
  text: Going back to the Mesa Verde story - this is something that is very interesting. Dr. Nordenskold of Norway and the
    Crown Prince of Sweden were in the Mesa Verde area several summers and they took back a large group of artifacts that
    the Wetherill brothers had found. These were found long before the park Mesa Verde had been made a national park.
- speaker: Respondent
  text: These artifacts they took back and they put them in the Helsinki museum in Finland. A forest ranger, Roger Busted,
    was working at that time to try to get the area declared a national park because he was afraid that all the artifacts
    would be taken out of it before there were any real scientists there to catalogue how they'd found them and everything.
- speaker: Respondent
  text: An interesting thing about these artifacts that were in that Helsinki museum after World War I, when Finland was paying
    back her debt to the United States, she wanted to send back some of these artifacts as part of the debt. The United States
    didn't want to accept them because they had no records of exactly where they were found or anything about them, and they
    felt that they would do very little good.
- speaker: Respondent
  text: But, if you remember, after World War I, Finland was the only European country that paid all of its reparations.
- speaker: Respondent
  text: Grandfather was the first judge of Montezuma County, and he named the county seat Cortez. Then, my mother married
    a young cowpuncher by the name of Jesse Nash and Grandfather didn't approve of the marriage, so they ran away and he decided
    to disown her.
- speaker: Respondent
  text: After several years of her husband being a cowpuncher, he had accumulated quite a few horses. By that time, the mining
    towns were getting started and they needed a lot of teamsters and freighters, so he went into the freighting business
    and that's how my mother came to be in Silverton, Colorado, where I was born.
- speaker: Respondent
  text: She and Jesse Nash were divorced and she was a widow for five years, when my father came to Silverton as a millwright.
    They were married in 1904, on my father's forty-fourth birthday.
- speaker: Respondent
  text: As I said before, the women were scarce in the mining communities, as well as in the farming communities of the old
    west, so there were about three men courting Mama at the time, and she just kind of watched them to see how they got along
    with her three little girls.
- speaker: Respondent
  text: My father seemed to get along the best with them, so she decided that he would be the man that she would marry. He
    was always a very good stepfather to my three half-sisters.
- speaker: Respondent
  text: My oldest half-sister, Alice Nash - I call her Allie - was thirteen when they were married, and she baked the wedding
    cake. It was quite a production, from what I hear, because in those days they didn't have egg beaters or anything and
    the egg whites had to be beaten with a whisk.
- speaker: Respondent
  text: She made frosting and she used beet juice to color the syrup pink and made some decorations on it with a toothpick
    and the pink syrup; so it was quite a production.
- speaker: Respondent
  text: In those days, all the girls learned to sew real well and my sister was a very good seamstress. Later, she was an
    apprentice to a seamstress, but she was only going on fourteen then. She was fourteen when I was born and she made quite
    a few of my baby clothes.
- speaker: Respondent
  text: The half-sister younger than Allie was named Corinne. She was just mainly a tomboy. The younger half-sister, Euterpe,
    was just a little girl, but she was always very jealous of me because people teased her about her nose being out of joint
    when I came along.
- speaker: Respondent
  text: I was about the most spoiled baby there ever was. Papa just thought I was "some punkins," you see, so he was always
    getting pictures taken.
- speaker: Respondent
  text: In those days, every time a photographer showed up in town - and they'd show up every once in a while - why, Papa
    always had to have a picture taken of the baby, of Mama and of him.
- speaker: Respondent
  text: In those days, too, the women wore these great, big picture hats and the high pompadours and, although my mother had
    all kinds of hair - she had the longest hair and heavy hair - she had still had to wear a great, big rat to make the high
    pompadour.
- speaker: Respondent
  text: Also in those days they thought when a woman was pregnant, she should read good books and then her child would be
    intellectual. So Mama, of course, always read these good books and all of our names prove it.
- speaker: Respondent
  text: Before my sister Terpie was born, she read Greek mythology and so the name Euterpe is after the goddess of harmony.
    Then when I was born, she had just read "Under Two Flags," which was written by a Frenchwoman during the Franco-Prussian
    war by the name of Ouida, so my middle name is Ouida.
- speaker: Respondent
  text: I had a younger sister, Fina Acte Drumm. Mama had read "Quo Vadis," which was all about Rome and Nero burning Rome,
    Acte was Nero Caesar's second wife. So you see, we all had these fancy names.
- speaker: Respondent
  text: My little sister, Fina, was just a darling baby, but when she was 17 1/2 months old, she died of telescoping of the
    bowels. At the time, no one could diagnose it, and her death was very violent with convulsions.
- speaker: Respondent
  text: Now, they can give relaxant drugs to stop it from happening and perform an operation, but, at that time, there was
    nothing that could be done. Well, the whole family was just absolutely devastated when little Fina died.
- speaker: Respondent
  text: When I was about four, I was playing with the boy next door and we were jumping in the seat of a wagon. We were playing
