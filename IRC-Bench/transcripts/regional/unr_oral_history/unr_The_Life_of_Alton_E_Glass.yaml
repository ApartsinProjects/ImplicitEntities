  text: My father was Frederick Elmer Glass, a farmer and rancher in the San Ramon Valley in Contra Costa County in California.
    The family consisted of father and mother and two sisters at the time I was born. The family lived in a little community
    called San Ramon where father operated a small farm and ranch of his own. It was a portion of the original Glass ranch
    which grandfather, David Glass, took up in the year 1848. The property was a part of the old Vallejo Spanish Grant which
    consisted of an empire that went from the Bay area inland as far as Vacaville of the present time; and from north to south
    from Marysville almost to Stockton, California. Father raised beef. He butchered and sold this beef in Berkeley, California,
    which was the headquarters of most of the beef industry around the Bay area at that time. At one time, Father was veterinary
    for the big Miller and Lux ranching concern of the West Coast. He was subsequently offered the job as superintendent for
    the T. B. Rickey enterprises with headquarters at Topaz, California. In 1893, when I was six weeks old, the family moved
    from San Ramon to Topaz, where father took up his duties as superintendent for the Rickey company. The T. B. Rickey spread
    was a concern which represented 200,000 acres under fee simple title, and controlled some 10,000,000 acres of land from
    Bishop, California, to Lake Tahoe. The last count made on the cattle was in 1900. At that time, the overall count was
    35,000 head of animals. There is no question in my mind but that some 4,000 to 5,000 animals were never counted in this
    figure. Where Father had been a veterinarian for Miller and Lux, he was not a trained veterinarian inasmuch as he did
    not have a degree; however, he had a peculiar knack of being able to handle almost any animal disease that showed up.
    Before the turn of the century, anthrax and black leg were two of the most vicious diseases in livestock at that period.
    It is my recollection that in 1898, the summer saw 1,800 head of cattle die from this anthrax. It was necessary to hire
    a special crew which covered the carcasses as they dropped and burned the animals on the spot to try to eradicate the
    disease. At that time, there were no vaccines which were absolute certain disease-proof controls. Mr. T. B. Rickey was
    a very dynamic character, but he was also a very ruthless man. It was Mr. Rickey's ambition to control or own the entire
    Antelope Valley area. However, there were many stubborn farmers in the area who were just as adamant in controlling their
    little areas as Mr. Rickey was in controlling and augmenting his areas. Mr. Rickey, during the period that we were in
    the Topaz Valley, broke many of the small farmers and subsequently acquired their property to add to his acreage in his
    effort to control the entire area. Some of the local people who were operating in the valley were the old Chichester family,
    the Pitts family, the Radley family, the Hardy family, the Trumble family, the McKay family, the Powell family, and the
    McAllister family. Some of these operators were sheep men as well as cattlemen, and sheep were simply taboo as far as
    T. B. Rickey was concerned. His main effort to control the valley was to get rid of all the sheepmen that he possibly
    could. However, some of these old operators were men who had priorities over T. B. Rickey and it was impossible to buy
    or force them out of the picture. In the actual cattle operation, the steers were marked as soon as possible in the late
    spring. These animals were never disturbed until four years later, when they were gathered, put into feed yards, fed loose
    alfalfa and some grain for 100 to 140 days and driven from the Topaz area to Carson City, Nevada, where they were sold.
    Beef, before the turn of the century, was from big-boned, high-shouldered Durham animals. The steers, when driven to market,
    would be the light end at 1,600 pounds, and the heavy end up to 2,000 pounds. It took four days to drive the beef from
    the Topaz areas into Carson City, which was a distance of 42 miles. The beef delivered at Carson City brought 4.5 cents
    live weight. In 10 years time, Mr. Rickey made a sizeable fortune on the sale of this beef. I do not recall ever seeing
    a cow or a heifer go to the market. They were saved for replacements for the animals, because the death loss was way in
    excess of today's averages. A good cow could be purchased for $25 to $30, and an excellent bull could be purchased at
    $100. At the start of the operation in that particular valley they did have the Mono National Forest which went from the
    Bishop area almost to Lake Tahoe. However, the forest control was not too big a problem at that time, as the campers and
    summer residents had not discovered the magnificent areas in the Bridgeport and Bishop countries. The Forest Service was
    practically started in the year 1888 in this particular area. Mr. William Mall was the chief Forest Ranger, and he controlled
    the region from Bishop to Lake Tahoe. At the inception of the Forest Service in that area, there were some 45,000 head
    of cattle which were summered on the summer ranges which now comprise the June Lakes area, the Bridgeport areas, and the
    Long Valley area where Crowley Lake is now located. At the present time, some of the fine areas such as June Lakes, the
    Twin Lakes in the Bridgeport area have been taken out of grazing use and are now used for recreational purposes. It is
    my understanding that in the year 1960 the maximum permits for livestock on the Mono National Forest - now called the
