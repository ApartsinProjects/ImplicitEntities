collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Dad, lets start off with Elko in the thirties and your early political development. Who were some of the major political
    figures in Elko at that time?
- speaker: Respondent
  text: Well, I wasn't very knowledgeable state-wise then, for I was eighteen years old. But my neighbor was John E. Robbins
    who had long been senator, state senator from Elko County, a close friend of mine. He was conscious of my inability to
    get a job during the depression, and, in fact, I approached him about it several times. One thing led to another, and
    he did finally land me a job in Reno with the State Park Service, emergency conservation work under one of Roosevelt's
    original government spending programs. We had a CCC camp operating at Fort Churchill with the restoration of the old camp
    walls of the old fort there. I was hired as a procurement clerk there for the Reno office to buy all the merchandise,
    tools, and so forth for that camp. That was my introduction to government work.
- speaker: Interviewer
  text: Was unemployment high in Nevada during the depression?
- speaker: Respondent
  text: Oh yes, tremendously so, particularly so in Elko County where the sheep men and cattle men had been so incredibly
    so hard hit. We had a couple of hard winters on top of it and the railroads of Elko being the Western Pacific terminal,
    the Western Pacific was extremely hard hit not being a transcontinental railroad like the Southern Pacific it was hurt
    worse than most railroads. So, they curtailed operations greatly and many WP railroaders living in Elko were out of work.
    The competition was pretty tough for a young eighteen to twenty year old.
- speaker: Interviewer
  text: What were these CCC camps like?
- speaker: Respondent
  text: 'Well, the CCC, Civilian Conservation Corps, the full term for them was a program envisioned in Washington, to bring
    the youth off the streets from the big cities: particularly out in the West, all over the country, but mainly in the West
    to give them a new insight in life, a little change of scenery. It was patterned off the army operation, the army camps,
    with more lax, more lenient rules to live by. But they received their board and room and lived in the camps much in army
    style. They wore khakis, army style clothes, and they were in groups of around two to three hundred that would constitute
    a camp. There were many in Nevada. I just happened to be associated with the one at Fort Churchill. There were a couple
    operating out of Vegas and a couple operating out of Reno, and I think Ely and Elko too. But I was procurement clerk for
    the state park service and Fort Churchill had been declared a state park. They had petitioned for federal funds to rebuild
    and formalize the old ruins that were at Fort Churchill as a state park. And my job was a desk job working in an office
    which happened to be a spare office in the district highway offices of the Nevada State.'
