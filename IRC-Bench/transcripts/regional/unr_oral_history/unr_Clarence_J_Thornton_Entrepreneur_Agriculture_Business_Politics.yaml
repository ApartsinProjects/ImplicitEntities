turns:
- speaker: Respondent
  text: I, Clarence J. Thornton, was born on March 12, 1898, in the city of San Francisco, California.
- speaker: Respondent
  text: Michael Thornton, my grandfather, was born in County Cork, Ireland, in 1839, and died in Merced, California, in 1924.
    He came to the area about one year before the end of the Civil War, and was conscripted into the Army - no questions were
    asked, but he was not a citizen of the United States at that time.
- speaker: Respondent
  text: My grandmother was Ellen Hamlon Thornton, born in Ireland, 1848, died in 1900, Merced, California.
- speaker: Respondent
  text: My father, Michael Thornton, was born in Merced County, California, August 1869, and he died in Reno, Nevada in 1932,
    at the age of sixty-three years. He was a livestock foreman for large cattle companies most of his life in Nevada. He
    came to Nevada from Merced in 1906.
- speaker: Respondent
  text: My father married Miss Margaret Joyce, my mother, in 1897. She came from Ireland, and was born on the high seas. She
    died in San Francisco, California in 1900, when I was two years old. I was an only child. Apparently, the Joyce family
    settled in Massachusetts before moving to the West.
- speaker: Respondent
  text: My grandfather and grandmother settled in Merced County, California. He was a grain farmer, and the family consisted
    of ten boys and three girls.
- speaker: Respondent
  text: My grandfather's brother, John William Thornton, came on the same boat as Michael Thornton from Ireland, at the same
    time. He also settled in Merced County and was a grain farmer. He and his wife raised twelve children. William Thornton
    also died in Merced County, California.
- speaker: Respondent
  text: He was also conscripted into the Northern Army, before he was a citizen of the United States. I can remember him telling
