collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: I am Rene Watt Lemaire of Battle Mountain, Nevada. We are making a recording of not only my own life perhaps, but
    also of my grandparents'. Some of the information that will be given in this recording will be factual and some of it
    will probably be hearsay, but nonetheless should prove interesting to those who are interested in the Lemaire family and
    the Watt family. If they wish to do some research relative to this information that I will give in this autobiography,
    it is their prerogative.
- speaker: Respondent
  text: I will start with my mother's side, which was the Watt family. In the Watt family was my grandfather George Watt,
    Sr., who came from Scotland. He was a native of Dunfermline, a city of Fife County. I believe it's close to Edinburgh.
    He was born in 1831; he passed away January 5, 1899 at the age of 67 years, 11 months, and 24 days. When he was a young
    fellow, he married my grandmother. Her maiden name was Isabel Litster.
- speaker: Respondent
  text: Getting back to my Grandfather Watt, when he first started out as a young fellow, from what I was told, he started
    out as a cabin boy. He was working for some person that had two or three ships, and he started to follow the sea. I think
    that was characteristic of a lot of the people that came from the British Islands. He made several trips under this captain,
    and the captain was very well impressed with his ability as far as seamanship was concerned.
- speaker: Respondent
  text: And about the time that this captain was going to give him, perhaps, a boat of his own to run and operate, gold was
    discovered in California. So he decided right then and there that, being a young fellow, the best thing for him to do
    was to go out to California. So I think he got off the boat at New York, and he worked his way across the United States
    to the California gold fields.
- speaker: Respondent
  text: He was quite active in the handling of livestock. It seems as though he loved livestock. According to my understanding,
    he used to run mule trains from Sacramento up into the Mother Lode country in and around Grass Valley. I think he made
