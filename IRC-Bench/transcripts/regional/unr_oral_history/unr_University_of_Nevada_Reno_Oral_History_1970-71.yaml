collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: Our major programs in Alumni Association are a giving program, and this year is headed by Neil Romero. There are somewhere
    in excess of 10,000 alumni from the University of Nevada, Reno, and last year they gave $29,000 for the campus to use.
    This year's chairman will be trying to exceed this. This giving program has gone on for about four years.
- speaker: Respondent
  text: Our other major committee is the Homecoming committee, and this year is headed by Art Kess. This year, Art is trying
    very hard to change the program of Homecoming. In the past it's been a parade, a cocktail party on a Friday night, and
    a dance and a party on Saturday night, and not too much participation with students in the University. And this year,
    I think that his goal is to get more participation among the alumni and the students and the faculty. So this will be
    happening in October, and next year's president can report and say what has happened there.
- speaker: Respondent
  text: We have another major committee. It's small, it's just been formed a couple of years, and we call this the Morrill
    Hall committee. The Board of Regents has given the Alumni Association the right to use Morrill Hall and to rebuild it,
    and it has been estimated that this will cost up to $400,000. With a giving program that would only attain $29,000 in
    one year and to run all our other programs from it, we have a major task ahead of us.
- speaker: Respondent
  text: So the people many years from now will be able to tell if we've been successful or not in rebuilding Morrill Hall
    into an Alumni Center. There is talk of a plan of making the third floor of the Morrill Hall into a museum, so this will
    be of interest in the future. Mrs. Virginia Phillips is the chairman of this and has been working very hard for about
    three years. To this point, we have a rough drawing of what we want done to the building, and we have a pretty painting
    to show anyone who is interested in seeing what we expect it will look like when it is finished.
- speaker: Respondent
  text: This year also, as in past years, and in every year to come, we hope, the Alumni Association sponsors a Graduation
    Tea for all the graduates, and also, at the same time, the Golden Reunion for people who have graduated fifty years or
    more ago. Last year's participation at Golden Reunion I believe was somewhere around maybe twelve people, and this year
    already we've had up to thirty people make reservations. So it's becoming more successful. The Graduation Tea is a major
    item for the Alumni Association and we feel that it is very worthwhile, but each year as the University grows, the cost
    grows and we don't know how many more years we'll be able to support this.
- speaker: Respondent
  text: One major item that the Alumni Association participated in this year was in the redevelopment of the tram. The redevelopment
    of the tram was brought about by the students. And the Alumni Association was pleased to participate in it in a way of
    donating money for the rebuilding of it. The existing tram has been there many years and people can look back through
    history and I'm sure that the tram that they're going to build is going to be there for many years, because the wooden
    deck that is there now is going to be replaced with concrete. Only one side will have a rail toward the ditch, while the
    other side will be a bench so people could sit in the Manzanita Bowl.
- speaker: Respondent
  text: Also, along with our giving program, we have a special projects portion, and this year, one of the special projects
    that was brought about was the replacing of the lighting at the Lake Street and Center Street entrances. This was done
    by Sierra Pacific Power Company and it was, I believe, in the amount of about $3,000. So this will be a lasting thing
    for people to observe in the next few years (probably not as lasting as the tram, however).
- speaker: Respondent
  text: And finally, the University is changing, the students, especially, are changing their views and their outlook, and
    along with it they're forcing, I think you might say, a change in people. This is reflected in the Alumni Association
    in that at our last meeting we had a motion to form an ad hoc committee to make a report by October 1 on what the actual
    goals of the Alumni Association are and how we want to spend our money. In the future, we may want to change some of our
    targets that we've had in the past, maybe change our Homecoming event and other things. I believe that this is just following
    along with the trend of the students, and so this will be another thing that we'll find out by October, if our views have
    been changed radically or otherwise by the students.
- speaker: Respondent
  text: The purpose of the AAUP is to bring to the local campus, the local campuses throughout the United States, the benefit
    of a century of profound concern with higher education. The information and the traditions, these various solutions to
    a multitude of problems facing higher education are assembled by this organization and made available to all campuses
    throughout the country through the more than 90,000 faculty members in the United States who are members of the association.
