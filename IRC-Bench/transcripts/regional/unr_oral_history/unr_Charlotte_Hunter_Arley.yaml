collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Ms. Arley, I'd like to talk about your early years. Maybe you can start by talking a little bit about your parents.
- speaker: Respondent
  text: My mother was very genteel and literate. Her name was Lottie, translated from the Yiddish Zlateh. My father, Morris,
    had come to this country from Russia, probably, about 1909 or 1910, and I'm judging that by my own birth and my older
    sister's birth date. Records from Russia were too difficult to obtain then. There were some other family members here,
    not closely related, but enough so that at least there was a place for my father to come. I think he stayed a little while
    in New York with a man who was not a relative. We had relatives in common.
- speaker: Respondent
  text: 'That man, whose name was Nathaniel Harvey, was one of the first and best lawyers in Springfield, Massachusetts, where
    I grew up. Nathaniel Harvey had a thing about women in this way: that women were lesser. Nonetheless, when I got into
    law school, he took great pride in that. When I became a member of the bar, it was very unusual at that time for young
    women. I kind of understood that Mr. Harvey was really pleased about my situation, in spite of his attitude about women
    kind of being down the road a little bit.'
- speaker: Respondent
  text: In New England we have clam roasts, where you dig a hole and put the corn and the clams in to roast them. Well, the
    bar had a clam roast, and Mr. Harvey took me. My goodness! That had quite an effect on me. Those are the memories. You
    have to understand, I think, that it wasn't so much my age. I was only twenty when I got out of law school. I had to wait
    till I was twenty-one to get my certificate. I was very unsophisticated. We, in our family, were not prepared to be out
    of school and be married. We just grew up and knew we were going to school, whatever that meant.
- speaker: Interviewer
  text: You're talking about beyond high school?
- speaker: Respondent
  text: Oh, yes, but we weren't geared toward, "Now you can go get married. Then you'll have a house, and then you buy the
    furniture. Then there'll be a baby," which - in a good way I'm saying this - was what was usually happening with women,
    but we weren't put in that direction, possibly because of my older cousins, who were ahead of their time. There were three
    sisters - as we are in my family. They were called the Sherman girls. They were into politics. The next couple of generations
    are out West now, too.
- speaker: Interviewer
  text: The Sherman girls had a big influence on you?
- speaker: Respondent
  text: Yes, they had a real influence on us, especially the eldest one. There was Susan, Minnie, and Rebecca.
- speaker: Interviewer
  text: Tell me about your father's influence on you.
- speaker: Respondent
  text: Oh, my father was the dominant parent. My mother was a wonderful cook and baker and homemaker. She sewed our clothes.
    My father had done almost everything else, including buying clothes for us - three of a kind in different sizes. My sister
    Suzanne was two years older than I, and then I'm a year and a few months older than my surviving sister, Anne. Neither
    sister married. I was the one who surely was thought never to be married, not they!
- speaker: Interviewer
  text: Do you think this expectation of going on to school came from your father?
- speaker: Respondent
  text: Oh, yes. My mother was caring, but it just came from my father. I'm sure my mother was very happy to follow along.
