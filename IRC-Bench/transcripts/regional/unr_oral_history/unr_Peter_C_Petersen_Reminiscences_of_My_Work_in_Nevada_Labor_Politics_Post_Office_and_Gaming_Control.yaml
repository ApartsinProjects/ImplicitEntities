collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: I was born in a small town in Denmark by the name of Thisted. And I grew up in Thisted, and I went to school in Thisted.
    My mother died when I was fifteen years of age, and my father when I was sixteen. That, of course, changed my whole life.
    Some of the things that I wanted to do I couldn't do because I had to take care of myself to some extent, although my
    father did leave enough money where I didn't have anything to worry about.
- speaker: Respondent
  text: Of course the school system in Denmark is considerably different from the school system in this country. In the first
    place, the hours in schools in Denmark were eight hours a day, including Saturday. In other words, a kid goes to school
    for forty-eight hours a week, which, of course, changes the length of time that it's necessary for him to get an education.
- speaker: Respondent
  text: After graduating from school, I went to work as an apprentice in a bakery. Inasmuch as my parents had passed away,
    I had to depend entirely on myself and the good will of the men, one of whom I was working for as an apprentice. After
    I had been working about three years for him, he was called into the Army, and although I was only seventeen years of
    age, I was put in charge of the bakery and had some kids that was younger than I was to learn the bakery. Apparently,
    it worked out all right because at least the bakery was there when he come back.
- speaker: Respondent
  text: I will tell about how this apprenticeship was put together. It's your father that signs up the apprenticeship, you
    know. When my father signed me up as an apprentice in this particular bakery, you sign an agreement where you have to
    work there for a period of four years. And you get a raise in pay for each year. In other words, the first year, you get
    120 kroner; the next year 140 kroner; and from there on and out for the next two years, you get 160 kroner. But you do
    learn the business because you put in in the neighborhood of from twelve to fourteen hours a day of actual work in the
    bakery, and you learn it from one end to the other one, which, incidentally, was a great help to me when I came to this
    country.
- speaker: Respondent
  text: It has always been my ambition to come to the United States. And after I had learned my trade, I had sufficient money
    where I could pay my passage to come to this country. And I also helped a friend of mine to pay his fare. I came to this
