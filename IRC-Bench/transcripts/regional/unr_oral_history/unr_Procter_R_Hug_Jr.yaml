collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Interviewer
  text: Maybe you could just tell us where and when you were born.
- speaker: Respondent
  text: I was born on March 11, 1931, in St. Mary's Hospital, in Reno, Nevada.
- speaker: Interviewer
  text: Obviously you don't remember the circumstances [laughter], but maybe you can tell me a little bit about your parents.
- speaker: Respondent
  text: Sure. My father was born in Oregon but as a teenager, I think he was probably about thirteen or fourteen, he moved
    to Tonopah, Nevada, with his mother and her second husband, Mr. Kind, and went to high school in Tonopah, Nevada. He was
    an outstanding athlete there, and then he went to the University of Nevada, where he was also a very outstanding athlete,
    particularly football. He then was elected student body president of the University of Nevada and he became a coach. He
    coached at Sparks High School and later became principal of the high school and superintendent of the schools in Sparks,
    Nevada, and then ultimately Superintendent of Schools for Washoe County. My mother was born in Kansas but moved to Ely,
    Nevada, when she was about two years old and went to high school there and also went to the University of Nevada, where
    they met. I remember my dad saying that she was the prettiest girl he'd ever seen when he saw her coming down the stairs
    for their first date. She taught for a year and they were married right after that and lived in Sparks, Nevada. She was
    a big help to him always in dozens of ways, but one of them, for example, would be in coaching. She would always keep
    the charts. In basketball games, she would show all the shots, keep track of the plays and so forth, so she was always
    a real fine helpmate.
- speaker: Interviewer
  text: Did you develop your interest in sports from your father?
