collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: My dad, Giovanni Ginocchio, came to this country in 1864, when he was 17 or 18 years of age. Back in the old country,
    they tried to sneak out of there before it was time to go serve in the army. If you left the country after 18 years of
    age, it was like deserting the army, and you stood the chance of going to jail for desertion.
- speaker: Respondent
  text: He came out; he was in the neighborhood of between 17 and 18 years of age when he came to the United States. He came
    in the company of a cousin of his, whose name was also Giovanni Ginocchio. They landed in San Francisco; from Genoa to
    San Francisco it took them 6 months out on the water.
- speaker: Interviewer
  text: Where was your dad staying? Did he stay with any relatives or friends in San Francisco? Was there anybody for him
    to stay with when he came here?
- speaker: Respondent
  text: No. He had to walk up toward North Beach, and he saw the name of an Italian on the front of a building, and he walked
    in, and he made himself at home. He stayed in there till he found a job. He stayed in there about a week. It was an Italian
    restaurant and hotel.
- speaker: Interviewer
  text: Did he know anybody or have any relatives in San Francisco?
- speaker: Respondent
  text: No, he didn't have a soul to go to. But he made up his mind at the time that if he'll ever get married and have a
    child and a family, that he would make his son a blacksmith, because his cousin got a job the second day and my dad was
    walking the streets! [laughter] So, when, 10 years later, after he went back to the old country and he got married, and
    I happened to be the first one of 6 children in the family, then he sure enough made a blacksmith out of me when I was
    still going to school. I had half a day of school and the other half a day of working in the shop learning the trade as
    a blacksmith. I had 2 1/2 years work as a blacksmith before I came to this country. And then after I came here, I did
    have relatives in a blacksmith shop in Reno, and I got a job through them.
- speaker: Respondent
  text: He landed in North Beach, and in some Italian restaurant they told him that people were looking for men to go to work
    for the Central Pacific Railroad. They were building up the railroad from Sacramento to Salt Lake City, Utah. He got a
    job, and he worked for them 5 or 6 years.
- speaker: Interviewer
  text: Do you know what he was doing? In what capacity was he working?
- speaker: Respondent
  text: First he was sent to help unload a railroad engine which had arrived on an English ship. He was a general helper (common
    laborer) but after he got onto it, he became a cook. For the next 3 or 4 years he was a cook. On Thursday of every week
    he was giving an Italian food with spaghetti and different Italian..., so he became quite famous among the gang, for the
    reason that they had to eat Chinese dishes. Since he was able to produce an Italian dish, why, he was quite welcome to
    be a cook, [laughter]
- speaker: Respondent
  text: As a laborer, he began laying track in. They had a bunch of men to lay 30- or 40-foot rail, and they had to all pack
    it by hand and get it in place and nail it down so that they make a railroad. But there was a gang ahead of him that were
    cutting down trees, and there were engineers that would design the location, the heights, and so on and so forth, of the
    railroad to be built, you understand.
- speaker: Respondent
  text: He would tell me that in the summertime, from Sacramento up on top of the hills [the Sierra Nevada] that they had
    to have a fire through the night to keep the wild animals away - the lions and all kind of wild animal that would come
    and eat everything that they can get a hold of.
- speaker: Respondent
  text: So there was a gang each night that would stay up for the night to watch...to keep a fire burning and to watch so
    that the animal don't get in. However, in the summer he said that they were sleeping outside in their blanket, and the
    snake...they would crawl right alongside of it; when they wake up in the morning, they found a snake and sometimes 2 of
    them in the blanket rolled up with them. He said they didn't like the looks of it; they didn't like the idea of having
    a snake, but if you didn't harm them, they didn't hurt you.
- speaker: Interviewer
  text: Was he working with other Italian laborers?
- speaker: Respondent
  text: Oh, yes, there was other Italians. There was all nationalities there - the Chinese, most of them. The majority of
    the people that was working there was Chinese people. But they had all sorts of nationalities - German, French and Swedes
    and Spaniard and Mexican. He thought it was almost every nationality in the country, there was somebody there.
- speaker: Interviewer
  text: Was he learning to speak English at that time?
- speaker: Respondent
  text: Well, he was learning through the associating with the people that he had to work with. They had a key man that was...
    understand English and explain to them in Italian to do a certain job. But he was quite eager and anxious to learn the
    language the best he can by working with others.
- speaker: Interviewer
  text: And he had other Italian friends with him, I take it?
- speaker: Interviewer
  text: Did he talk to you about when they got over the summit, finally and reached Nevada?
- speaker: Respondent
  text: Oh, yes. Well, when they got to Reno...at that time Reno hasn't any name yet. However, he discovered that there was
    a country road that was coming in north and south and east and west. And he said at that particular time that someday
    - since they're building a railroad - at that crossroads there may be a town.
- speaker: Respondent
  text: The officials of the Central Pacific, when they got to this point in Nevada, they were selling lots for $100 a piece.
    But they were not taking any money outside of gold; you had to pay $100 in gold, and you can have a lot. My dad was anxious
    to have a lot all right, but he didn't have the gold; he had the currency, and he had the silver that they give to him
    - once a month he would receive pay. They were not spending any money because they were eating along with the railroad
    as they would travel. So they were working 7 days a week from sunup to sunset for one dollar. And at that, he had enough
    money to buy a lot, but, as I say, he didn't have the gold. He had the money in currency and silver, but he couldn't buy
    it because he didn't have the gold. But those that was able to buy lots, they were buying lots in that railroad crossing
    for $100 per lot.
- speaker: Interviewer
  text: Did he know any other people who bought a lot there?
- speaker: Respondent
  text: Oh, yes, he knew a lot. There was some Italians.... See, most of the people that bought were German people. He said
    the German had managed to get a hold of the gold somehow or other. They bought most of the lots.
