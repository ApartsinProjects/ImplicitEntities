collection: unr_oral_history
source_url: https://archive.org/search?query=university+nevada+oral+history
turns:
- speaker: Respondent
  text: I wanted to start in today with being born, which, as you know, is May 14, 1893, in San Jose, California. And as a
    sidelight right there, at one time one of my relatives, an aunt, living in San Jose had died, and my mother wanted to
    go to her funeral. So I took Mother to the funeral, and afterwards, I asked her if she would show me where I had been
    born (which was on Third Street, just off St. James Park). And she took me over there, and on that site was a garage of
    the Osen Motor Sales Company. And in Reno, at the same time, I was putting a new floor in the Osen Motor Sales garage
    [laughing].
- speaker: Respondent
  text: Well, shortly after I was born, we moved to Watsonville, California, where we evidently lived with my mother's parents,
    whose name was Hamm. Grandfather Jeremiah Hamm made his living by training horses for the San Francisco fire department.
    When they were trained, he sold them to the department.
- speaker: Respondent
  text: My early days, as I remember them in Watsonville, was a matter of swimming in the Pajaro River and stealing watermelons
    and strawberries from the Chinese. They had lots of Chinese there. And also, at that time, they had boats which came to
    Watsonville from San Francisco and loaded up with fruits and vegetables, and so forth. And it was always interesting to
    go down and watch the boats come in.
- speaker: Respondent
  text: From Watsonville, we went to Cripple Creek, Colorado. All I can remember of Cripple Creek, Colorado is digging little
    holes in the ground and putting up a little headframe and having a little mine of my own. Don't remember much of anything
    else. I do remember, though, when we moved to Colorado Springs. And my grandfather was a live there. That was Grandfather
    Ferris.
- speaker: Respondent
  text: Grandfather Edward Ferris had a linen establishment, silk and linen, which he sold both in Colorado Springs and in
    Philadelphia. And he made trips to Europe every year to buy these linens. I can remember playing pinochle with my grandfather.
    He'd get so mad when he lost. We'd play it on a lap board that went around. You set it down when you were sewing across
    a chair. It fitted around you here and went out like this [gesture].
- speaker: Respondent
  text: I took long walks with Grandfather, out to the Garden of the Gods, even. And on one occasion, my father took me on
    top of the highest rock in the Garden of the Gods, a collection of tall 200-300 feet rocks a few miles from Colorado Springs,
    and I could still remember looking down at one spot where there was a rather narrow ledge. I don't know whether it was
    three feet wide or five feet wide, but in my memory, this was a narrow ledge. And it was nine miles down to the ground.
    [Laughing] I can remember when I got on top of it, I laid down on the top of the rock and put my hands out like this [gesture]
    to make sure that I wasn't going to topple. Then I got over that, then came down in nice shape.
- speaker: Respondent
  text: Also, at that time in Colorado Springs, something that might be interesting to somebody - The main hotel of Colorado
    Springs was called the Antlers Hotel. And during the time we were there, the Antlers Hotel burned down. And it was a terrific
    fire, great big, wooden building. And there was a lumber yard next to it, and the lumber yard caught fire, too, so it
    was a real spectacle.
- speaker: Respondent
  text: One other thing I remember. In 1900, we were in Colorado Springs. At twelve o'clock midnight, my father got me out
    of bed, wherever I was. I remember his picking me up. He took me outside and held me in his arms, and the whistles were
    blowing and the bells were ringing, and he said, "This is the only time thee will hear the century bells." I remember
    that just as plainly.
- speaker: Respondent
  text: From Colorado Springs, we went to Trinidad, Colorado. Trinidad was, at that time, a coal mining town. And I can remember
    two things there. There were a group of Indians called Penitents. And they had a yearly festival at which they whipped
    one another on their bare backs with some sort of thorny twigs that they got from the surrounding country. And this was
    very private. No one was ever supposed to see it. But us kids got out and hid in the sagebrush. And I can remember witnessing
    that. I wasn't close enough to get sick or anything. I'd see the red on their backs, and that sort of thing.
- speaker: Respondent
  text: The other thing I remember about Trinidad is that one of the main streets went from a high level of the town down
    to the railroad station. And we had lots of snow, and sledding was a real activity. And we used to sled down this hill.
    And I can remember some of the more crazy, I might say, lads, taking cans with little holes punched in 'em, loaded with
    water. And they would go down the sidewalk and sprinkle this water. And this would freeze. And then they'd try to go down
    the sidewalk on skates. And that was the time of broken legs and arms, and all kinds of trouble. I can remember the uproar
    that this finally caused, and they finally put an end to it.
- speaker: Respondent
  text: We moved to Pacific Grove, California. My father at that time was a sign painter by trade. And as a matter of fact,
    he earned his living as a sign painter until we came to Reno. He was also a musician; he played the flute in the local
    orchestra. Outside of that, though, he didn't seem to have very many contacts outside of the people he met in the orchestra.
- speaker: Respondent
  text: In Pacific Grove, I learned to fish a bit. I earned some money cleaning out the boats of fishermen who came in after
    a day's sport.
- speaker: Respondent
  text: We played all over that peninsula. One of the games we used to play was "hare and hounds." And we would wind up usually
    at Carmel. And at that time, which was 1905, about, roughly, Carmel Mission was just a deserted building with one priest
    and the smell of dead animals. There were no homes or anything of that sort around there. I remember the shipwrecks that
    we used to have, and I can remember playing hare and hounds one time. There was a shipwreck that was loaded with telephone
    poles. And these telephone poles had all drifted into a little inlet. And I thought that as I was being chased (I was
    a hare, and the hounds were close), that I'd simply scale down this little cliff (it was only twenty or thirty feet high)
    and run across on those poles. Well, I got down, all right. And when I got on the poles, I started to run on them, they
    were turning on me. And I had the darnedest time getting across. It was only perhaps fifty or sixty feet across this little
    bunch of water. I nearly went in sometimes [laughing]. These things - I don't care whether you put them in or not, but
    they just keep coming to me as things that have happened.
- speaker: Respondent
  text: I can remember, too, whenever there was a Chinese funeral, we used to go down to the graveyard after the funeral and
    eat the roast pork that they left for the dead man [laughing] on his journey to Heaven.
- speaker: Respondent
  text: We stayed in Pacific Grove, where I went to finally the eighth grade, I guess. I was in the eighth grade when we moved
    in 1906, right after the earthquake. And I can remember coming up on top of the stable. Well, this had a better name than
    that, but it was a stable. And it had a tower. And from that tower, you could see the smoke of the San Francisco fire
    on a good day [laughing].
- speaker: Respondent
  text: And another odd thing about that (which nobody'll be interested in) was that my present wife, Bunny, lived in Pacific
    Grove at the time. Of course, we never saw each other. I was four or five years older than she was. But the two of us
    lived there, and then we finally met again in Reno.
- speaker: Respondent
  text: Well, from there, we came to Reno. I was in the eighth grade and went to the old Southside school. From there, we
    moved into the old high school, which was on West and Fifth Street, I guess. This was 1890 type of building with high
    steps to the first floor and very steep steps to the second floor. I went to school there in 1907. It must've been 1907.
    I graduated from high school in 1910 and a half. That's at Christmas. I was three and a half years in high school.
- speaker: Respondent
  text: Nothing transpired. There was one little incident in high school that I have remembered with a little amusement, that
    in the physics class. During that time, the bell system went out of order. And our physics teacher said it would be a
    good exercise for the class to find out what happened and to repair it. So we went around to find out what happened. We
    found a break in the wire in the attic. And the attic of that building must've been fifteen feet high, the old roofs,
    you know, that went way up. And it was rather dark up there. And one of our boys who hadn't been too smart in physics
    was with us, and we told him that if he would take the two ends of that wire and put them on his tongue, that when we
    got current in the wires, he could taste it because it would taste salty. So he sat up there and kept the wires on his
    tongue while we went down and got all the batteries we could find. In those days, the battery was a little circular battery,
    about three inches in diameter and about eight inches high, had one and a half volts, is all. We got two cases of them
    and connected all the batteries up in a series. And when the juice went through, Chester [laughing] stuck his foot through
    the ceiling! And where should he be located, but right over Dr. Ed Dopey Chase's office. He was the principal of the high
    school. So who got blamed for it but me, and I was forced from then on to study in Dopey Chase's office and carry messages
    around to the various teachers. And I had really a ball for a while.
- speaker: Respondent
  text: There was also, at that high school, the one good well for water for that entire area. People used to come there with
    buckets and get water by the hour.
- speaker: Respondent
  text: Well, the eraser-throwing incident was in high school. I threw this eraser at Van Camp, I think his name was. And
    he was standing, reading a book during a study session. We were doing all kinds of things in those days, a little stuff
    in the inkwells which made gas. And I can remember Frank Golden would lift his seat top, this was the seat, and as he
    brought it down, he'd go, "Aw me-e-e-e," tried to make believe it squeaked. And he'd yell [laughing] like nobody's business.
    Well, then, we'd also put a little cayenne pepper in the stove. They got it heated with stoves. And that also gave us
    a little respite once in a while from studies.
- speaker: Respondent
  text: And on this particular day, I thought that I would startle this Mr. Van Camp. And they had erasers that were soft,
    had a stiff back and then a lot of soft - I don't know what they call them. Anyhow, they were soft and hard, both. I thought
    that I would just throw this eraser as hard as I could and hit the blackboard alongside of Van Camp and watch him jump.
    Well, I didn't hit the blackboard. I hit him right on the jaw with the chalky side of this eraser. And I could throw!
    That didn't go easy. And that man stood there, chewing his lip [laughing], and read his book. And he never said a word
    about it.
- speaker: Respondent
  text: Our principal at that time was named E. E. Winfrey. One day, I had gone out in the hall to get a drink of water. They
    had a tank with a little faucet that you got your drinking water from, and Chump Seitz, another fellow, was out there,
    and we got into a bit of a wrestling match. And I couldn't think of anything to do but throw the water cooler at him,
    which I did. [Laughing] He was running down the stairs and the water cooler bounced down the stairs after him. Winfrey
    got me into his office and he started talking to me, and then he called me a whelp and an imp of Satan. And I thought
    that if anybody called you a whelp, you had to do something about it, so I hit him [laughing] and left, fast. And I was
    immediately barred from school and required to come to Miss Goodwin Doten, a relative of the Doten at the University,
    I believe; she also had study periods, and apologize to her. And this, I refused to do. My father at the time was designing
    a couple of schools for the school board. And naturally, they talked to him, and he talked to me, and I don't remember
    that he just talked to me, as a matter of fact. But [laughing] he wanted me to go and apologize. And finally, after a
    week, I went in and apologized to Miss Doten. I've forgotten what I said or whether I was sullen or what it was. But anyhow,
    I got back to school.
- speaker: Interviewer
  text: Let's see, do you want to talk about Father a bit?
- speaker: Respondent
  text: Dad, his family - we have a family tree of Dad. His family came over to this country, we'll say, about 1700. There
    were four branches of the family. I was sure - I think Ann has that family tree, by golly. Anyhow, I'd better not give
    dates, and so forth, because I don't know really what I'm talking about. It has never been something about which I was
    concerned, my family background, and so forth. Some people are obsessed, almost, with their ancestors, and so forth, and
    I'm not. And I didn't pay much attention to it.
- speaker: Respondent
  text: But anyhow, they came over and settled in Baltimore, in Wilmington, and in Philadelphia. They were Quakers, ultimately.
    Maybe they were not Quakers when they came over here. Dad was born in Philadelphia, I believe. He had two sisters, Katherine
    and Edith. He went to the usual schools and wound up in a University, Swarthmore, from which he was ejected, I think,
    in about his freshman year for prankishness. He was a really up and coming, go-getter sort of a guy. He was on the move
    all the time, never in one place for long.
- speaker: Respondent
  text: And I think that at nineteen, about, he left home and came out West, where he became a sign painter and a painter
    of, oh, buggies, and all sorts of things.
- speaker: Respondent
  text: At one time, his father was a linen merchant with stores in Philadelphia and Colorado Springs - Colorado Springs much
    later, however. And he ran away and came out here to this country, and the stories that I have heard from - an old-time
    gunman was his partner - not the gunman himself, but the gunman's nephew Kit Carson, who was also very fast with a gun.
    This gunman in his later years came here and promoted the Black Panther mine, which I think was perhaps a promotional
    scheme. And while he was here, he told me a number of stories about Daddy.
- speaker: Respondent
  text: And Dad, at the time that he had his cancer treatment in San Francisco (we were there for two weeks together) - at
    least we told him that he did not have cancer, although he did have it. But the doctor said that his metabolism was so
    slow that he could keep him alive for four or five years with X-ray treatments, and there was no need to tell him because
    he never in the world would live four or five years. He only lived half a year after that, as a matter of fact.
- speaker: Respondent
  text: Well, while we were in San Francisco, he told me some stories, too. They jibe, by the way. He came out here, and he
    became a sign painter, painted buggies, and all that. He was a painter, is what he was. And he would go to a town and
    immediately buy some paint and get a little shop and start doing some work, and when he got broke he hightailed out of
    there and go to another town. And his pal was a dentist who had also run away from home. And when they came out here,
