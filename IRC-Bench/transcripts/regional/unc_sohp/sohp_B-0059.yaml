source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: This is not the same Committee of 100 that was with the 1898 massacre. I used to feel like it was the same. I still
    feel like in some ways that they could be the same in their execution because they have the same powers, but right now
    the Committee of 100 serves the purpose of finding industry coming into Wilmington. You know, the city committee of 100
    in 1898 was like the controlling families in Wilmington.
- speaker: Interviewer
  text: But aren't these the descendants, the same people that are in this now?
- speaker: Respondent
  text: Yes. These are one hundred people who had the most authority, the most money, the most property in Wilmington. They
    made all the decisions. Like the Trask family, the Bellamy family. These people still exist and they could have a profound
    effect on the total existence of Wilmington then because they controlled Wilmington, the day-to-day life, the future life,
    the overall life of Wilmington. Most of the city officials to me just represent these people; these are their puppets.
    They are put out there and say, "Look, you represent this particular group of the committee, you represent this particular
    group of the committee." The committee itself is broken up into groups, each one puts somebody out there, and everybody
    who runs as a city official generally represents the feelings and attitudes of the committee, the Committee of 100 or
    400 or whatever.
- speaker: Interviewer
  text: They run this city?
- speaker: Respondent
  text: Oh, yeah. Definitely. It's a known fact that Trask himself as an individual has stopped a lot of industry from coming
    to Wilmington. There's a known fact that the Sprunts and the Kings. They used to own Standard Oil Company. You know that.
    These people are there, but you don't hear about them. When things are happening—on a large political scale and some of
    them on a small scale—they just push their buttons, they just open their mouths, and things are done—or things are not
    done.
- speaker: Interviewer
  text: You know what happened in 1898—the same thing I guess that happened in '71, too—poor whites were actually the initiators
    of the violence.
- speaker: Respondent
  text: Definitely. Well, it's a known fact. It's been explained by many black educators, many aware black leaders, that poor
    whites hate us more than upper-class whites because of the fact that they're being treated the same way and they feel
    like their color gives them a superiority over us, and they hate to be treated the same way as us. So they feel like they
    have to lash out their hostilities and violence toward us rather than their own people. That's what that situation is.
    They did initiate the ROWP—which we'll get into later—that was one of the fine organizations there which was a vigilante
    organization of white people here, basically made up of nothing but poor white people.
- speaker: Interviewer
  text: Where were they from?
- speaker: Respondent
  text: Basically from Sunset Park, a lot from Winter Park, some from around the park area.
- speaker: Interviewer
  text: What do you think they considered their purpose was when they were …
- speaker: Respondent
  text: Oh, to sustain the white order. To sustain the order of this community, the tradition of this society, and to keep
    the niggers in their place. They wasn't going to let things just transgress or transcend to a new era or a new level of
    understanding and development because we wanted it that way. They say, "The niggers might be demanding, but we're not
    going to let them have it." They fought to sustain things as they were.
- speaker: Interviewer
  text: Let's go back to Friday.
- speaker: Respondent
  text: Oh, yeah, sure. Chili got shot in the chest. We had to fix him up, and we didn't have any medical supplies. This was
    about seven o'clock Friday night, February the fifth, 1971. We had to search around to find some stuff to fix the brother
    up, so we had to go across the street to this brother's house named Mr. Cannady. We got some alcohol from him and Brother
    Templeton's wife happened to have some gauze and a bandage and some hydrogen peroxide. We cleaned the brother's wound
    and fixed him up because we didn't want to send him out to the hospital because some brothers say they already gone to
    the hospital the night before and the crackers tried to arrest them for getting shot. So we didn't want to take a chance
    on sending anybody out there because the first thing they was going to do was evidently had to be doing something wrong,
    so they either tried to arrest them or tried to get them to squeal on somebody or something like that.
- speaker: Interviewer
  text: Somebody got injured because of Caucasians going through there prior to …
- speaker: Respondent
  text: '… prior to when my man came out there? Oh, yeah. You know I told you that Thursday night some people had got shot
    already. A few people got shot: a brother and a sister got shot walking on Castle Street, some people got shot walking
    down Dock Street. There were a lot of isolated incidents. The white folks was just riding through the black neighborhood
    and they found a lone nigger or one or two lone niggers, and just fired on them. It wasn''t that many. We found out about
    them—they never came to us because I guess they were too scared. There were just as many incidents at the church. We tried
    to handle our own casualties. We set it up like a military base almost, like a bivouac or something, headquarters or something
    …'
- speaker: Interviewer
  text: At the church?
- speaker: Respondent
  text: We had a perimeter, we had men watching with binoculars to make sure that we knew when anybody was coming. We had
    a code word, a signal, a password, so if somebody was coming, he'd use the right word—we'd know if it was a brother, that
    kind of thing.
- speaker: Interviewer
  text: Would you consider these survival techniques, or what?
- speaker: Respondent
  text: Survival techniques, definitely. Because at that particular time we were definitely on the defensive. We were just
    defending the church and defending the rights of the students to be in the church. There wasn't nothing about us going
    out attacking anybody. We were just making sure that nobody was going to attack us or the people in that neighborhood.
    When Chili got shot, kinda knocked the doors of the church down getting in because everybody tried to get out of the way.
    All the girls in the church were hollering and screaming, and the brothers were running around. We calmed everybody down
    and tried to get some order. We told everybody to lay up under the bleachers, to stay down. We made sure the brothers
    got out a little bit further on the perimeter. We sent them out about two blocks a piece to make sure the white folks
    didn't come through there. All that night was gun fire. I myself and a few of my friends slept on the sidewalk that night,
    watching out and stuff like that. It was because of this night—I know for a fact—that Connie Tindall as well as a few
    others who I'll get to wasn't involved in the incident at Mike's Grocery.
- speaker: Interviewer
  text: You know this for a fact?
- speaker: Respondent
  text: Connie's birthday has got to be February 6th or 7th because he told us that Friday night, "I don't know about y'all
    but I ain't going to be here tomorrow night. I'm going to be partying"—you know, celebrating his birthday. He didn't come
    back the next day. He wasn't there. Bunn or James McCoy wasn't there. Left there that third night and didn't never come
    back.
- speaker: Interviewer
  text: He left and didn't come back?
- speaker: Respondent
  text: Joe was a kind of scared brother. Joe always thought about some violence. He just didn't come back to the church until
    the funeral for Steve. Of all the people in the Wilmington Ten that I know of, Wayne Moore wasn't there that Saturday
    night, and I know that Reginald Eppes wasn't there. All the people that I know was at the church, at the Templeton house,
    that Saturday night was February sixth, the night of Mike's Grocery's burning, was Ben and Chili. We were all in the house
    …
- speaker: Interviewer
  text: Y'all were not in the church?
- speaker: Respondent
  text: We were all in the house; nobody was in the church that Saturday night because they had put us out.
- speaker: Respondent
  text: That Friday night … people slept outdoors that night to keep an eye on the church. One of the most important things
    that need to be brought up—the cops were trying to sneak up on the church. We're up there protecting the church. Instead
    of calling us and telling us, "Well, look, we know you're having problems. We want to come check out things and assist
    you or whatever," they come trying to sneak up on us, trying to shoot at us from behind the church. We like to blow their
    brains out.
- speaker: Interviewer
  text: The police were trying to off you?
- speaker: Respondent
  text: Yeah, seriously. We had the whole block divided, but contrary to popular belief that we had a whole lot of guns—I
    know we didn't have over fifteen pieces. But we just spread the brothers out …
- speaker: Interviewer
  text: Were they students?
- speaker: Respondent
  text: Everybody was a student or younger. The average age of the students there was eighteen or below. Most of them were
    like seventeen and below because of the time of the year.
- speaker: Interviewer
  text: Was Ben in there?
- speaker: Respondent
  text: Where? Ben stayed in the house. Ben didn't do no fighting, man. Ben came down and organized. He was in the house.
    You know, the main thing he did was encourage us to be careful, to protect ourselves, but he didn't try to initiate anybody
    into doing anything, or nothing like that. Now the main thing he was concerned with was that nobody get hurt, to be careful
    about what we did. He stayed in the house to protect the Templetons. He'd walk in the church every now and then to see
    that everybody was all right, but as far as being outside on the street or in the yard doing anything, he wasn't out there.
    On Saturday it started off with this white man on the corner of Fifth and Nun Street sniping. Everybody moved on that
    block of the church, he sniped them, tried to shoot them. So they kept calling the detectives, the sheriff to check this
    house out on the corner. The police went up there several times and every time they went in, they came out. They said
    nobody didn't have no gun, and every time after they left, the white man kept on shooting. We just thought from that point
    on, "Well, the pigs are working with them. They ain't looking out for our interest too."
- speaker: Interviewer
  text: What did you think about the barricades? Do you think that was a good move?
- speaker: Respondent
  text: It was a good move. If it hadn't been for the barricade, I'm quite sure that we'd have lost ten, twelve, or more brothers
    there at the church because white folks were coming through in caravans and in cars—carloads of people—up the street trying
    to turn, to come around the front of the church. They probably would have come to the front of the church and had a shoot-out
    with the brothers, but the barricades were there. They were concrete, those big five-feet conduits that the city has—the
    big ones. That's what we used as a blockade in the street—and some logs that we found. Like I was saying about that Saturday—the
    white man was shooting at us, and everybody was running and hiding and stuff like that. One of the members of the church
    came up there and told us to get out …
- speaker: Respondent
  text: Saturday, February sixth. By the name of Herb Butler. We told him, "Look, Mr. Herbert, we're not doing anything to
    the church. We're up here to protect the church." He said, "Damn it, let the white folks blow it up. We got insurance
    on it."
- speaker: Interviewer
  text: What would cause him to say something like that?
- speaker: Respondent
  text: A stupid nigger, that's what.
- speaker: Interviewer
  text: How old was the man?
- speaker: Respondent
  text: Mr. Herbert was about fifty years old at that time, I imagine. At that time, he been a good friend of my father's,
    but after that he wasn't no more.
- speaker: Interviewer
  text: Was this Saturday morning, brother?
- speaker: Respondent
  text: He was standing right around the corner from y'all, man. Herbert Butler. At the same time he was asking us to leave,
    some white folks came by and shot at the house, the one facing Seventh Street.
- speaker: Interviewer
  text: What you're telling me is that there was constant firing Caucasians? Ever since when?
- speaker: Respondent
  text: Ever since that Thursday night.
- speaker: Interviewer
  text: Ever since they got situated in the church?
- speaker: Respondent
  text: They started Thursday night, February fifth.
- speaker: Interviewer
  text: What was Rose doing at this time?
- speaker: Interviewer
  text: The police.
- speaker: Respondent
  text: Nothing. They say they arrested some people that night—that's what the newspaper said. But I didn't see no evidence
    of it, and I don't remember no white folks going to jail.
- speaker: Interviewer
  text: Y'all stayed in the church the whole while?
- speaker: Respondent
  text: The majority of the kids were in the church except the brethren who were outside pulling guard duty. We pulled guard
    duty in turn, in shifts. Those were the only people outside the church. People were sneaking back and forth every now
    and then and going home, you know, like a few kids. Everybody wanted to be there because of the boycott. That Friday night
    most of the people stayed in the church—Thursday night and Friday night.
- speaker: Interviewer
  text: There was constant firing on the church?
- speaker: Respondent
  text: Yes, day-time and night-time. So the white men they fired at the church. We said that's why we're here, brother—to
    protect the church. And he said, "We don't need to be protected." So we left and went over to our headquarters, the BYBBC
    which I have spoken about before, on Eleventh Street by the old Community Hospital. At that time a lot of people had given
    up hope because being put out of the church… I'm trying to defend you and you done kicked me in the behind—what am I going
    to do? Like it killed a lot of brothers and sisters fear. So everybody went on home, I guess to get something to eat.
    At that time, Ben didn't have nowhere to stay because they didn't even want him to stay in the parish house. So I went
    to find a cot because at that time my wife and I only had a three-room apartment with one bedroom. I went to get a cot
    so he could stay with us that night. By the time I came back, the rest of the board of trustees had met at the church—in
    fact, my grandfather was one of the members of the board of trustees—and they decided to let the students back in. By
    that time
