collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Did you go to school in Nashville?
- speaker: Respondent
  text: Oh yeah, I went to Hume-Fogg High School.
- speaker: Interviewer
  text: Then where'd you go to college?
- speaker: Respondent
  text: Maryville [Tennessee].
- speaker: Interviewer
  text: And you came out a Presbyterian preacher, or you went in a Presbyterian preacher, which one?
- speaker: Respondent
  text: Well, I was Presbyterian all the time on my mother's side. My Dad was nothing, except. He was my favorite, of course.
- speaker: Interviewer
  text: But how did it happen that you went to Maryville. That must have been about 1920 or '25?
- speaker: Respondent
  text: Yeah, I was in Arkansas, I guess, where I was selling. Oh, I was with my Dad. He wanted me to go to college.
- speaker: Interviewer
  text: Is that about right?
- speaker: Respondent
  text: Oh, I went to St. Louis and . . . I just wanted to leave home. I'd never been away from home.
- speaker: Interviewer
  text: Right around 1920?
- speaker: Respondent
  text: January 8, 1906.
- speaker: Interviewer
  text: So you would have gotten out of high school maybe about 1922 or 1923 or something like that.
- speaker: Interviewer
  text: I know you came to Richmond [Virginia] in 1929 to the seminary.
- speaker: Respondent
  text: Yeah, I went with my father. I had a cafe in San Antonio. He had what we called itching feet. He just liked to travel.
    He bought a cafe in San Antonio. Then he got excited about a hotel in Cotulla, and he got excited about getting something
    else. So I ended up with a cafe and a hotel. It was lots of fun.
- speaker: Interviewer
  text: This was all after high school or before?
- speaker: Respondent
  text: Yeah, I didn't know what I wanted to do.
- speaker: Interviewer
  text: In those years, like in the '20s, before you went to Richmond—you said that was '29—did you ever run across any of
    these guys that you later knew like Buck Kester or . . .
- speaker: Respondent
  text: I don't think so. Now, in Burnsville, Buck came up one time.
- speaker: Interviewer
  text: If you knew her [Dorcas] though, when he did, that was after Richmond.
- speaker: Respondent
  text: I think the fellowship time was the first year.
- speaker: Interviewer
  text: What kind of experience was Maryville for you? Was that a pretty conservative place?
- speaker: Interviewer
  text: Didn't change your outlook much at all?
- speaker: Respondent
  text: Well, intellectually, no. I didn't have much intellectual change there. They were too strict with rules. You had to
    be in the dormitory at, I don't know, something like eight o'clock, and study for an hour, and then you could converse
    with people, and then you go to bed and lights at ten. All this sort of stuff.
- speaker: Interviewer
  text: So by the time you got through with that you were ready to have a little freedom?
- speaker: Interviewer
  text: How did it work out that you decided to go to Richmond to seminary?
- speaker: Respondent
  text: Well, I was in Texas, and a Mr. Bates was a Presbyterian. I sort of pumped his organ, pipe organ that you had to pump.
    He got interested in me, and he wanted me to go to Austin.
- speaker: Interviewer
  text: Was this in San Antonio?
- speaker: Respondent
  text: Yeah. And I didn't want to go to Austin because it was too far from home. I wanted to get back to home base. So that's
    why I came on back.
- speaker: Interviewer
  text: I see. So he told you about the seminary in Richmond and you decided to do that?
- speaker: Respondent
  text: In music education.
- speaker: Interviewer
  text: What happened to you over there? You said that was sort of a big change in your life.
- speaker: Respondent
  text: Well, it was, I guess. Intellectually, it wasn't so much, really, but for the first time not to have somebody tell
    me, "Be sure and comb your hair," and that kind of thing. I was socially free.
- speaker: Interviewer
  text: How'd you handle that?
- speaker: Respondent
  text: Well, she ought to know. I did all right. It didn't worry me. I didn't worry about it.
- speaker: Interviewer
  text: You were pretty grown by then. You had been around. I bet he was pretty mature by then.
- speaker: Respondent
  text: Oh yeah, he must have been about twenty-three.
- speaker: Interviewer
  text: That was '29 until the spring of '32. Then where did you go from there?
- speaker: Respondent
  text: I went to Clarkesville, Virginia, and they had a home mission secretary there, like most Presbyterians, name of Garrison,
    and he took me on for summer work, Vacation Bible School work. I stayed with him, and then he told me I ought to get a
    church in the Presbytery. He wanted me to, and then I got two churches. Soon expanded that to a place called Madison.
    From there, I went to Brevard College [North Carolina] because I think Dr. Thompson—two Thompsons there, Ernest Trice,
    he was professor of history, and E.T. in education. I was special friends to both of them. In fact, Dr. Thompson gave
    me the same series of lectures he gave at Harvard.
- speaker: Interviewer
  text: Were you all married by then?
- speaker: Respondent
  text: We married that fall of '32 after he finished seminary.
- speaker: Interviewer
  text: You had lived in the city of Richmond all your life. So then you were a minister, and you all lived in different communities,
    mainly in Virginia and North Carolina through the '30s.
- speaker: Respondent
  text: Yeah, in Virginia about five years, I guess, and then in Brevard about five.
- speaker: Interviewer
  text: Okay, and then came to Chapel Hill. That was in what year?
- speaker: Respondent
  text: See, Brevard had Brevard College, and Dr. Thompson at the seminary thought that I would be nearer them because, well,
    I somehow another appealed to them. I never started my sermons [by saying], "My sermon this morning is from Isaiah," so
    and so. I started it with a situation and then went on. To start with the scripture itself used to turn me off.
- speaker: Interviewer
  text: That's a sign to close your ears [laughter].
- speaker: Respondent
  text: Yeah, well, you were asleep.
- speaker: Interviewer
  text: You came to Chapel Hill during the war, or had the war started? Earlier that year [1941]. And you all have lived here
    ever since?
- speaker: Respondent
  text: With the exception of one year, we went away when the Presbyterian Church was having those difficulties.
- speaker: Interviewer
  text: Yeah, I wanted to get to that in a minute. What's the Presbyterian Church here called that you served?
- speaker: Respondent
  text: Well, they called it the First Presbyterian most of the time.
- speaker: Interviewer
  text: Was it US or USA Church?
- speaker: Respondent
  text: Oh, it was Southern [U.S.].
- speaker: Interviewer
  text: I guess everything was in North Carolina, wasn't it? You know, Tennessee had some northern Presbyterian churches.
- speaker: Respondent
  text: I'd belonged to a northern.
- speaker: Interviewer
  text: I don't know how that worked, why that happened.
- speaker: Respondent
  text: Well, it came with the Mason-Dixon Line.
- speaker: Interviewer
  text: Yeah, but what I don't understand is why Tennessee would end up with some of both, whereas most other parts of the
    South would only have the Southern Church.
- speaker: Respondent
  text: Well, I think people had strong sympathies. It broke up families.
- speaker: Interviewer
  text: Yeah, it really did, I guess. It was pretty much tied to the whole Civil War.
- speaker: Respondent
  text: I think the Presbyterian Church [in Chapel Hill] now calls itself the University Presbyterian Church.
- speaker: Interviewer
  text: Okay, so you became pastor at that church, a fairly sizable and thriving church at that time.
- speaker: Respondent
  text: Oh yeah, I had two services on Sunday.
- speaker: Interviewer
  text: What was at the heart of the dispute that you got into there with the people?
- speaker: Respondent
  text: Well, it had to do with the Creed.
- speaker: Interviewer
  text: Apostle's Creed?
- speaker: Respondent
  text: No, I didn't use it in church because students didn't come there knowing it, and wouldn't stand up and say something
    they didn't believe. I dropped that a long time ago. But the reason I had so many people, frankly, is it's right across
    the street from the campus.
- speaker: Interviewer
  text: Oh what street?
- speaker: Respondent
  text: On Franklin Street. And it's so close, all they had to do was step out of the dormitory and get to church. That really
    is the reason, because when I changed to Community Church, I didn't have people flocking through the doors. In other words,
    I had a ready made population [at the Presbyterian Church].
- speaker: Interviewer
  text: Would it be fair to summarize the conflict by saying that you were too liberal for the congregation at that Presbyterian
    Church?
- speaker: Respondent
  text: Oh my Lord, no.
- speaker: Interviewer
  text: Well, why did they jump on you?
- speaker: Respondent
  text: It wasn't the local church. It was the Presbytery.
- speaker: Respondent
  text: A fellow named T. Henry Patterson, [a church executive].
- speaker: Interviewer
  text: Of the North Carolina Presbytery or whatever. What did he do to initiate the conflict?
- speaker: Respondent
  text: I don't know what would be fair to say. I think he really started it.
- speaker: Respondent
  text: Well, I don't know what you would say to that. It was just a combination of liberal things. One was race. This church
    was the first one to let blacks come.
- speaker: Interviewer
  text: What year was this, that the trouble really kind of came to a head?
- speaker: Respondent
  text: When the Presbytery finally took all the power away from the church and didn't let its officers act, and they [Presbytery]
    took control of controlled everything, that was in 1952.
- speaker: Interviewer
  text: When did the trouble with the Presbytery really start, as you look back on it, when did you first begin to feel that
    you really had a problem on your hands?
- speaker: Respondent
  text: I guess when Patterson came.
- speaker: Respondent
  text: I'm sure there were feelings and grumblings and all kind of things for some period of time, but the real situation,
    I think, didn't happen too long before that. There's a book here that's written on that whole situation. It's a thesis
    done by a Presbyterian minister.
- speaker: Interviewer
  text: Would it be in the library at the University?
- speaker: Respondent
  text: No. I'm sure it would be in the University of Virginia library, and then I think there's one at the seminary.
- speaker: Interviewer
  text: I'd love to see it.
- speaker: Respondent
  text: I meant to review it. It's been so long since I've read it now. I've forgotten a lot of it, but he did his whole thesis
    on that situation.
- speaker: Respondent
  text: Read the preface to that, give you an idea.
- speaker: Interviewer
  text: I'll just read this aloud so it'll be on my tape. "My first knowledge of Charles M. Jones was in 1952 when, as a teenager
    of thirteen, I became fascinated with the newspaper accounts of the controversy in Chapel
