collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: Bill, I guess, talking about the roots of things that happened to me and where my roots are in Madison County and
    the mountains, I'd go back to my heritage, my family. I was one of thirteen children. As a matter of fact I was the thirteenth.
    My mother didn't give up easily, but when she saw me, that was it. We had one sister and twelve of us boys. We didn't
    know that we were living in poverty, so we were very happy. I guess there is a great deal of truth in ignorance truly
    being blissful. Because we just simply didn't know what the outside world was. When I grew up during the '20s over across
    the river west of Marshall, when school was out we worked all summer long. Not once did us children go to the big town
    of Marshall, just six miles away. We didn't have money to go to the show. Maybe a couple of times a year, special occasions.
    So I guess poverty really . . . sleeping at the foot of the bed, knowing what its like to eat beans twice a day and cornbread
    twice a day, to gather your own eggs from the hens' nest, and figure out whether there was enough to give one egg per
    child the next morning or two eggs per child. Those things motivate you to maybe not want to get cold when you get old.
    You want to have a little bit of something for security. And if you're built out of the right kind of stuff you want your
    neighbors to have some of the better things of life.
- speaker: Interviewer
  text: So your father was a farmer?
- speaker: Respondent
  text: My father was a farmer. He went six weeks to school and immediately after the Civil War. My father was fifty-four
    years old when I was born. So I practically didn't get here at all, being the thirteenth child and my father was fifty-four
    years of age.
- speaker: Interviewer
  text: Did he . . . was he a subsistence farmer? Did he plant some tobacco and have a few hens, that kind of thing?
- speaker: Respondent
  text: My father bought thirty-two acres of land, long before he was married. He didn't marry until he was thirty-four. Batched
    on this thirty-two acres of land. And he did do diversified farming. And he owned his own land. He accumulated more land
    as he went along. When my father died at the age of eighty-seven he owned about eight or nine hundred acres of land.
- speaker: Interviewer
  text: In Madison County?
- speaker: Respondent
  text: In Madison County, all of it, yeah.
- speaker: Interviewer
  text: So your father's motivation pushed him from the lowest, poorer class of people into the landed, more middle-class
    part of the county.
- speaker: Respondent
  text: Yes, when he died he was in considerable . . . in the upper bracket of the economy or economic improvement of Madison
    County. So he was a product of the Civil War. Born in 1866. His father, Robert Ponder, came home from the Civil War, Battle
    of Chickamauga. Mustered out in Greeneville, Tennessee, and lived about eighteen months. Died with what was considered
    then a run-down condition. I can imagine a lot of Civil War dysentery and undernourishment and he just couldn't get back
    on his feet physically.
- speaker: Interviewer
  text: Was . . . the family feuds and the Democratic-Republican split, a lot of it is rooted in the Civil War in the mountain
    counties. Did that have any influence on your family?
- speaker: Respondent
  text: Well, certainly it had an influence on my family. My father, son of Robert Ponder, was one who fought with the Union,
    not because of the Democratic-Republican element but because he just did not believe in slavery. My grandmother, bless
    her heart, I guess she was destitute and being a widow with two children to bring up during that era, I don't fault her,
    but she married Josh Reams, who was part Indian. And he was a veteran of the southern element. He had fought for slavery
    and fought with Lee's forces.
- speaker: Interviewer
  text: This is your . . .
- speaker: Respondent
  text: This is my step-grandfather. My father's stepfather.
- speaker: Interviewer
  text: Your father's stepfather.
- speaker: Respondent
  text: Now when my father grew up, of course his mother talked to him about what his father had done. Robert Ponder. Josh
    Reams, his stepfather talked to him about what he had done. So there was a woman who had lived and given birth to two
    sons of the Union and, incidentally, she gave birth to two sons of Josh Reams, a Confederate soldier. The political implication
    as I see it, coming from . . . through my father and on down to the children, was simply that we took the view that we
    had very little if anything to conserve. We were liberal and the Democratic Party was liberal in its views nationally,
    state, and county. So we were for that form of government which would give us a better opportunity to involve ourselves
    and enjoy some of the goods, some of the good things of life.
- speaker: Interviewer
  text: A lot of the people that were on the Union side in the Civil War, they continued in the Republican tradition. Isn't
    that right?
- speaker: Respondent
  text: Well, it's true, and a good many of the people here in Madison County were not, up until the Civil War—they had no
    roots here in Madison County. They came in from the Piedmont, retreating back into the hills where they were less likely
    to be picked up and put in prison or put on one side or the other. So they were renegades. They were good people, they
    just didn't believe in fighting. You know, we had people during Vietnam who didn't believe in fighting. We had people
    during the Civil War. We've had them during every war. So Madison County, I guess, was receiving maybe more than our share
    of people who just didn't believe in fighting, just didn't believe in the cause of the war. And they came here and they
    stayed after the war. And they were very strong in favor of the Union forces. And then to cap the whole thing off I'm
    sure you've heard about the massacre on Laurel. And that was the stronghold of the Republican Party—that was up until
    I became active in politics—Laurel community, five townships over there. And they can still tell you and show you right
    to the spot where these people were lined up and shot in the back of the head off a poplar log. Because they thought they
    had raided Marshall and taken some sugar illegally.
- speaker: Interviewer
  text: These were Union sympathizers.
- speaker: Interviewer
  text: And who shot them. The Civil War, the confederate troops, the militia?
- speaker: Respondent
  text: No. I'm not too familiar with the history. I'm sorry, I'm not sure. I can't recall the names. I've read it. A Union
    captain came in and had what appeared from my reading of the articles, different articles, a stump trial you would call
    it. Very little military trial to it, but he lined up and shot these people. Some of them as deserters and some of them
    because they were corroborating with deserters. Some of them were children, actually twelve or thirteen-year-old boys.
- speaker: Interviewer
  text: So it was actually the Union killed them?
- speaker: Interviewer
  text: So that heritage is actually very much a part of both families and the way children grow up, whether they end up being
    in politics or not. But also particularly for politicians.
- speaker: Respondent
  text: Well, actually, Mr. Finger, the politician in my family came in more through my mother than through my father. My
    mother was a Ramsey, Emma Ramsey. She was the oldest of a family of some eleven children. My mother's father, John Ramsey,
    was Republican sheriff of Madison County on two different occasions—each a two year term. Her brother, my uncle Chaney
    Ramsey, who lived here, incidentally, on this same farm that later I bought. It went out of the family at his death and
    then I bought it back some twenty-five years later. He was sheriff on two different occasions, each a two-year term. And
    he was a Republican sheriff.
- speaker: Interviewer
  text: That's your uncle?
- speaker: Respondent
  text: That's right. And my grandfather. They were both sheriffing this county. Both Republican. And little did my grandfather
    know, I guess, that his grandson—E. Y. Ponder, my brother—would serve twenty years as Democratic sheriff. The second one,
    the second Democratic sheriff in the history of the county. There was only one before him, for a two-year period. That
    was Mack Burnett. Nobody thought he could be elected. He was plowing corn all day the day of the election. But he got
    elected. I should say he was plowing for corn. He was plowing the land in the fall of the year for the corn crop.
- speaker: Interviewer
  text: So your mother's side of the family was really steeped in mountain Republicanism.
- speaker: Interviewer
  text: Whereas your father was less interested in politics than in farming and trying to provide for his thirteen kids.
- speaker: Respondent
  text: That's right. He was, had very little interest really in politics and never ran for any office. He voted an independent
    ticket. He was registered as a Democrat but I know that he supported his brother-in-law, Chaney Ramsey, who was running
    for sheriff on the Republican ticket. He supported his father-in-law, John Ramsey. He supported Jesse James Bailey. I
    remember that very well. He signed some documents as a school committeeman at Pleasant View School stating that Jesse
    James Bailey was a good, forthright young man worthy and capable of being high sheriff in Madison County. So my father
    was really nonpartisan.
- speaker: Interviewer
  text: That gives me a good feel then for some of the influences of your parents, both of them, and also the traditions of
    mountain politics as they affect lots of people. You, you went to high school during the Depression? Or was it . . .
- speaker: Respondent
  text: Well, yes, I went to high school. I finished in '36. So when I entered high school in '32 it was right at the depth
    of the Depression. And so my very interesting memories of things that a good many kids of today just couldn't conceive
    of. We had no such thing as a lunchroom program. My lunch consisted of two biscuits. And part of the time there was ham
    meat between those two biscuits; part of the time an egg fried between those two biscuits. And occasionally my mother
    would have enough money to buy sugar and take apple juices, blackberries we would gather, pick, and from these make jellies
    or jams. But that was our lunch. And I was in style, too. I ate right along with the rest of them. I had just as nice
    a biscuits as my deskmate did.
- speaker: Interviewer
  text: Some people probably had less, didn't they?
- speaker: Respondent
  text: Oh sure. In fact I thought my mother did a better job than most of those kids' mothers. Some of them, they'd bring
    cornbread and not anything else, you know.
- speaker: Interviewer
  text: But people did keep going to school. They didn't . . .
- speaker: Respondent
  text: Well, many of us did. We had a lot of dropouts, I guess, back then. But again, I
