collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I want to kind of pick up about the time when you were an undergraduate at Fisk in the '30s, and ask you first, well,
    a couple of things. One, do you recall any meeting, interracial meetings, that took place on the Vanderbilt campus during
    those years?
- speaker: Interviewer
  text: Never happened?
- speaker: Respondent
  text: No, never happened so far as I know.
- speaker: Interviewer
  text: At Fisk, yes, but at Vanderbilt, no?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: The people from Vanderbilt would come over there, but not the other way around?
- speaker: Respondent
  text: That's right. And I don't know whether you remember the famous meeting—maybe then I would have to back up and say
    I know of one—where a number of people, distinguished sociologists, probably Robert Park, people like that. I'm not certain
    who they were. They had a meeting out at Vanderbilt and invited E. Franklin Frazier. It might even have been a luncheon.
    And I think Chancellor Kirkland learned about and simply blew his stack.
- speaker: Interviewer
  text: This would have been in that period when you were an undergraduate.
- speaker: Respondent
  text: Yes. It would have been because, you see, Frazier left at the end of my junior year. Went to Harvard in 1934. Other
    incidents that I remember in Nashville and at Vanderbilt was when, in my senior year, the spring of my senior year, I
    was an applicant for admission to Harvard to go to graduate school. This is before the GRE's, you see. So they wanted
    me to take a Scholastic Aptitude Test, and, of course, it was scheduled, like the GRE's, at a certain time and place.
    And it was at Vanderbilt, and it was in a certain room on Vanderbilt campus. I went there. I'll never forget—of course,
    I had never been on Vanderbilt campus before—I don't really quite remember how I got there. I don't think Ted Currier
    took me, my professor and my sponsor. But I got there and I got in the room, and this white professor—I don't need to
    say white, he was a professor at Vanderbilt—looked at me and he could not imagine what I was doing there. I said, well,
    I wanted to take the Scholastic Aptitude Test. He threw the test at me. I was usually quite comfortable in most situations,
    but I really was most uncomfortable [then]. I often wonder what I made on that test [Laughter].
- speaker: Interviewer
  text: You remember what his name was?
- speaker: Respondent
  text: No, I never did know what his name was. I remember he had on a Phi Beta Kappa key. I saw that dangling down. I was
    familiar with that because Currier was, of course, Phi Beta Kappa. That's the only time. The other was what I heard about
    Frazier going over to Vanderbilt. The other was what I experienced. Now, on the other side, of course, people came to
    Fisk all the time.
- speaker: Interviewer
  text: Yeah, sure. There was Currier and there were others.
- speaker: Respondent
  text: Oh, but I meant public affairs, concerts, lectures, everything—white people just came. And nobody felt anything about
    it. They just came and sat where they pleased. And you would be interested in this, John, in the fall of my senior year
    I was president of the Student Government. It was in either late October or early November that two things happened in
    Nashville that were really spectacular. One was that a young black was lynched, Cordie Cheek, who was lynched. He really
    was not a Fisk student.
- speaker: Interviewer
  text: But he was right close to the campus.
- speaker: Respondent
  text: He lived in a house, I think it was owned by Fisk as a matter of fact, one of those rentals. But he was taken off
    campus, out of town and lynched. Apparently for running over a white girl on his bicycle. Hitting her. And the students
    were up in arms and everything. All hell broke loose. Awful. And the other thing was—these things come together—the announcement
    of Franklin D. Roosevelt that on his way to Warm Springs, Georgia, he was going to stop in Nashville. He wanted to do
    two things in Nashville. He wanted to visit the Hermitage, and he wanted to visit Fisk and hear the Fisk choir sing. I
    was right in the middle of all of it. One, because of this protesting in behalf of his boy, and the other because, as
    the chairman of the Student Government, I had a real responsibility in connection with the Secret Service and all the
    rest who were coming down. They came out and they had advance parties to see how everything was going. Instructed me what
    had to be done, and they were hoping I would interpret to the students. For example, no student could be upstairs in Jubilee
    Hall looking out the window because the President was going to come up around that oval there.
- speaker: Interviewer
  text: And these two events happened contemporaneously?
- speaker: Respondent
  text: Well, within weeks of each other. The Cordie Cheek lynching may be coming—you can check it—in October. The president
    came in early November. So we had these two things going. The curious thing about it is the Nashville citizens could not
    imagine that the President of the United States would come to Nashville to see a bunch of "niggers," you know [Laughter].
    I remember even the radio that morning, describing his tour of the city, did not include Fisk in it, although he had announced
    that he was coming to Fisk, and the people knew he was coming. We had made arrangements, the choir would be on the steps
    of Jubilee Hall. I have pictures of that. And there would be bleachers all around where citizens could come and sit and
    see the president when he and Mrs. Roosevelt came up around there. And as big man on the campus, I'm right around everything.
    I remember a white man coming up to me and he said, "Where do the white people sit?" "Oh, you sit anywhere. We don't have
    any special place for you to sit." He said, "You mean to tell me, we don't have any place where white people can sit and
    not black people?" I said, "No, no, no, we don't have, there's no segregation at Fisk at all. Just make yourself at home."
    And he sounded, he was so upset, not angry with me, by the way, but upset. And he told me, as though I were his friend,
    he said, "You know, I have voted the Democratic ticket every time of every election since I was old enough to vote, but
    if the President of the United States comes here and speaks to a group of people and there's no special place for white
    people, I will never vote the Democratic ticket again." [Laughter]
- speaker: Interviewer
  text: He just told you that?
- speaker: Respondent
  text: Yeah. Like he thought I would understand. Like nobody else, you know, it was almost like we were in this together
    [Laughter]. He said, "I'll never vote for the Democrats again."
- speaker: Interviewer
  text: That was in '34?
- speaker: Respondent
  text: November of '34.
- speaker: Interviewer
  text: Then you went to Harvard and you came back in '36-'7, is that right, to teach?
- speaker: Respondent
  text: Yes, I came back to teach.
- speaker: Interviewer
  text: Can you recall any racially oriented incidents or contacts or anything through that time?
- speaker: Respondent
  text: No, not any across town, the same kind of interracial events went on at Fisk all during this time.
- speaker: Interviewer
  text: Still nothing going on at Vanderbilt?
- speaker: Respondent
  text: No. When did the YMCA graduate school close?
- speaker: Interviewer
  text: I'm not sure. I need to check on that.
- speaker: Respondent
  text: Yes, this is significant in this connection because when the YMCA graduate school closed, Tom Jones, president of
    Fisk, bought a lot of the equipment and materials from the school, out of date, even mattresses and tables and chairs
    and things like that. And, what's his name, later president of...
- speaker: Interviewer
  text: Harvey Branscome?
- speaker: Respondent
  text: No, president of Berea.
- speaker: Respondent
  text: He wrote a book on race relations, too. Weatherford.
- speaker: Interviewer
  text: Yeah. W.D. Weatherford.
- speaker: Respondent
  text: Weatherford came out to Fisk and taught, you see, when that place folded up. I don't know when this was, whether it
    was while I was still a student or whether I was already graduated. But I learned about it. The town was very incensed.
    People were very upset that this man would come. You know, it goes to show his colors, he was never straight. He must
    not ever have been straight. One, to write a book on race relations, which was a similar kind of statement, and two, to
    come over there and teach. I remember that, but I can't place the dates.
- speaker: Interviewer
  text: Okay, let me move you just a little farther ahead. When we went to St. Augustine and taught, and then to Durham. You
    went to St. Augustine in '39 and stayed about four years, and then you came to Durham.
- speaker: Respondent
  text: And stayed here four years.
- speaker: Interviewer
  text: The time you were at St. Augustine was the time that the Southern Conference for Human Welfare met in Birmingham,
    1938. Did you have any connection with any of that? Do you remember that?
- speaker: Respondent
  text: Well, I knew that they met there. I don't know, I would have to look up. I don't know how I'd find it. I joined the
    Southern Conference of Human Welfare and was a member, but I don't know when I joined.
- speaker: Interviewer
  text: It subsequently had a meeting in Chattanooga and one in Nashville.
- speaker: Respondent
  text: Yes, and we had one here. I must have been teaching at North Carolina College by this time in Durham because there
    was one at the Washington. I don't think it was a national meeting, maybe a North Carolina group. Maybe Frank Graham was
    there, I'm not sure. I got to know him in this general period. Very, very fond of him. But this group met at the Washington
    Duke Hotel, the old Washington Duke Hotel downtown. Everybody there was rip roaring, you know, egalitarians. I remember
    it got to be lunch time, and they tried to get us all in to have lunch in the Washington Duke Hotel in the dining room.
    Of course, they said "no you can't bring those people in here."
- speaker: Interviewer
  text: Okay to meet but not to eat?
- speaker: Respondent
  text: Yeah, they might not even, up to that point, I don't know whether they knew we were up there meeting as far as that's
    concerned, but certainly not to eat. So everybody got up in arms and furious, said, "Well, nobody will eat down there
    then." They went out somewhere and got food and brought it in, so we could all eat together. This is the period of people
    like Charlie Jones over at Chapel Hill. He's now quite old. Have you met him?
- speaker: Respondent
  text: Then there was a group—I don't think it was the Southern Conference of Human Welfare—but there was a group, there
    was a Unitarian Church in Raleigh where there was a lot of interracial goings on, meetings, you know, and everything.
    They would have a big symposium every spring, and that's the first time I saw Lillian Smith. She spoke at the sort of
    closing night thing. There were a lot of blacks and whites at these meetings. I'm trying to think of the pastor of that
    church in Raleigh. But that was a very lively group, and so was the group, the North Carolina chapter of the Southern
    Conference for Welfare. I'll call it that for want of a better name. It was not the national group yet. They were very
    lively and active, but it wasn't large. Those meetings in Raleigh would draw a large number of people. The Southern Conference
    meetings, well, were working meetings. Trying to make some plans about how to approach this problem.
- speaker: Interviewer
  text: Then there was a meeting here in October of '42, a group of blacks, to plan, to write what call to be called the "Durham
    Statement"
