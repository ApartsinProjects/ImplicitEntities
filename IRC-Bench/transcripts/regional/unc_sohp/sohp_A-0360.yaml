collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: When did you come here as a student?
- speaker: Interviewer
  text: Where was your home?
- speaker: Respondent
  text: Down the street here.
- speaker: Interviewer
  text: Oh, you grew up in Chapel Hill? Oh, when you were a youngster where did you grow up?
- speaker: Respondent
  text: In Auburn, Alabama.
- speaker: Interviewer
  text: You came here as a graduate student then?
- speaker: Interviewer
  text: In sociology?
- speaker: Respondent
  text: Yes. Melville was here too.
- speaker: Respondent
  text: I came here as an undergraduate and I was in sociology and we met in grad school. I graduated in '40 here at Carolina.
    I was working for my master's degree here when he came to work.
- speaker: Interviewer
  text: What was your maiden name?
- speaker: Respondent
  text: My name was Melville Corbett.
- speaker: Interviewer
  text: Melville Corbett.
- speaker: Respondent
  text: I was named after my great-grandfather. I don't know who he was named after.
- speaker: Interviewer
  text: Where was your home?
- speaker: Respondent
  text: Kinston, North Carolina.
- speaker: Interviewer
  text: You came here and you knew Bob Anderson before.
- speaker: Respondent
  text: I brought him up here.
- speaker: Interviewer
  text: He actually came after you.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: I see. What about Folger? When did you meet him?
- speaker: Respondent
  text: Through his father. I offered him a fellowship to come here to graduate school.
- speaker: Respondent
  text: All those boys because John brought all of them up and they all came up together.
- speaker: Interviewer
  text: Where was Folger an undergraduate?
- speaker: Respondent
  text: He was an undergraduate at Georgia State College.
- speaker: Interviewer
  text: Georgia State in Atlanta?
- speaker: Interviewer
  text: Well, you knew his father when he was working for the Resettlement Administration?
- speaker: Interviewer
  text: That far back you did?
- speaker: Respondent
  text: Yes, John had known him as an undergraduate and graduate student.
- speaker: Interviewer
  text: Where did you encounter him?
- speaker: Respondent
  text: I don't recall.
- speaker: Respondent
  text: He traveled so much.
- speaker: Interviewer
  text: Yes, I'm trying to figure out how you would have run into him. You were an undergraduate at Auburn from '35 to '40,
    in that period?
- speaker: Respondent
  text: I graduated in '40.
- speaker: Interviewer
  text: So, you must have started in '36 and Dag Folger was head of the Resettlement or at least active in the Farm Security
    Administration.
- speaker: Respondent
  text: Well, John might have run across him when he worked. No, that would have been much later. We knew John before then.
    I was getting ready to say when John went to. During the War John worked for the Tennessee Valley Authority. He did war
    work over there. But, you knew John before then.
- speaker: Interviewer
  text: John Folger and Dag.
- speaker: Respondent
  text: Yes, you came across Dag working as a first year graduate student. I think you have to know a little bit about John.
    When John came up here to get his master's degree Dr. Odum and Rupert Vance took an interest in him and they didn't want
    him to get his master's they wanted him to skip his master's and go on into his doctorate. They worked with him and took
    him almost as a special student. They took him everywhere. Dr. Odum took him practically everywhere he went. He was connected
    with Morgan over in western North Carolina and at the Tennessee Valley Authority. He could have run across Dag at Brevard
    or at the white mountain group, or.
- speaker: Interviewer
  text: Sure, all kinds of places. Did you know Odum and Vance before you came here as a graduate student? You must have known
    their reputation at least.
- speaker: Respondent
  text: Yes, I knew of them.
- speaker: Interviewer
  text: But, you didn't know them personally?
- speaker: Respondent
  text: I didn't know them personally.
- speaker: Respondent
  text: I was Dr. Odum's teaching assistant when I was getting my master's degree.
- speaker: Interviewer
  text: A couple more people I want to ask you about. Winfred Godwin is a little bit younger than this group, is that right?
- speaker: Interviewer
  text: Was he a graduate student here also?
- speaker: Respondent
  text: He was a graduate student after I left. I didn't know him here.
- speaker: Respondent
  text: We didn't know Winfred until we got to Atlanta.
- speaker: Interviewer
  text: What about Phil Hammer?
- speaker: Respondent
  text: I knew Phil Hammer through.
- speaker: Respondent
  text: He was here long before we were.
- speaker: Respondent
  text: No, I don't think so, Mel.
- speaker: Respondent
  text: He was in the postgraduate school around here when I was an undergraduate because I knew his wife, Jane. Jane worked
    for Horace Williams. She had a teaching assignment just like I did for Horace Williams in the philosophy department. We
    both knew of Phil.
- speaker: Interviewer
  text: But, he wasn't involved in any of these regional planning programs?
- speaker: Interviewer
  text: The sociology department?
- speaker: Respondent
  text: No, not at all. He came along later and was interested in the North Carolina state planning.
- speaker: Interviewer
  text: Are there any other individuals that I have not named but that you think of as being kind of present at the creation
    of SREB? Not politicians but staff people.
- speaker: Respondent
  text: Woodrow Breland.
- speaker: Interviewer
  text: Tell me about him.
- speaker: Respondent
  text: Woodrow was a graduate student. I picked him up at Auburn and brought him up here and gave him a fellowship. He went
    on through and got his doctorate.
- speaker: Interviewer
  text: Would it have been during the war in the early 40's?
- speaker: Respondent
  text: Yes, it was during the 40's. Woodrow came up here and his wife, Peggy Breland, Margaret James Breland. Margaret James
    Breland was very important in the movement too. Margaret James and Woodrow worked very close with my husband and working
    with students and writing and that kind of thing. Bill McGlochlin, of course, was very important in the SREB movement
    at that time. John had known Bill in the Tennessee Valley Authority. Bill was director of personnel. Then we ran across
    him when John went to Knoxville for eighteen months. John was a full professor here and he left to go do war work in Knoxville.
    That's when he started working with Bill McGlochlin. He went to the University of Louisville, and was a vice-president
    there before he died. Bill was still at the Tennessee Valley Authority when he came over to the SREB.
- speaker: Interviewer
  text: You came here as a graduate student in 1940. How old were you then?
- speaker: Respondent
  text: About twenty.
- speaker: Interviewer
  text: Twenty years old.
- speaker: Respondent
  text: I was born in 1919.
- speaker: Interviewer
  text: Okay, so you were twenty or twenty-one at the oldest. You went straight into the doctoral program?
- speaker: Respondent
  text: Not only that, they devised a special curriculum for him. [laughter] Oh, yes, the rest of us were plodding through
    but they developed an interdisciplinary curriculum for him. That poor soul was. All the time he was taking his doctoral
    work he was boning up on things he hadn't read or hadn't had any contact with it. They just skipped him over it and made
    him get it on his own. [laughter]
- speaker: Interviewer
  text: How long did it take you to get the doctorate?
- speaker: Respondent
  text: I got my degree in 1944.
- speaker: Interviewer
  text: Does that seem right?
- speaker: Respondent
  text: No, that doesn't seem right. wait a minute. Yes, that's about right.
- speaker: Interviewer
  text: Were you in the military at all?
- speaker: Respondent
  text: He was one of the head cadets at the ROTC in Auburn. He got all kinds of honors but they wouldn't let him in the military.
    [laughter] He went to the Army, the Navy, the Marines, and everything else and they wouldn't let him in because of his
    eyesight and he had a bad ankle and a bad leg. He was in a polo accident. He played polo when he was at Auburn and two
    horses collided and he hurt his leg and after that they wouldn't touch him. [laughter]
- speaker: Respondent
  text: You are probably telling him more than he wants to know.
- speaker: Interviewer
  text: You were born in Auburn?
- speaker: Respondent
  text: I was born in Raleigh.
- speaker: Interviewer
  text: In Raleigh, but your father had gone to Auburn to teach.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: How old were you when you moved there?
- speaker: Respondent
  text: I was about five.
- speaker: Interviewer
  text: Just a young kid. So, that's really your home.
- speaker: Interviewer
  text: By the time you got there Howard Odum had been here for a long time. He was an institution here by then.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Rupert Vance was practically as well.
- speaker: Respondent
  text: Rupert Vance had been Odum's student.
- speaker: Interviewer
  text: He was his understudy.
- speaker: Respondent
  text: He took him and shaped him and Zimmerman over in the economics department, they shaped him practically. Harriet Herring,
    Rupert Vance, Katherine Yaca, Guy Johnson—all of them were in that group.
- speaker: Interviewer
  text: And in effect what they singled you out for was what they had gone through. Isn't that right?
- speaker: Interviewer
  text: Were there other people that they singled out like you, the next generation, your generation, to be sort of their
    proteges?
- speaker: Respondent
  text: I got most of the people through the TVA. I got fellowships for them. Odum just engulfed the whole operation.
- speaker: Interviewer
  text: In effect, you were a recruiter for him. You were helping him locate and identify and bring in new graduate students.
- speaker: Respondent
  text: And new generations, that's right.
- speaker: Interviewer
  text: Would that be a correct assessment?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Let's talk about Odum and Vance as personalities for a minute. Did they always work closely together? Were they always
    good friends, not rivals, but real associates?
- speaker: Respondent
  text: I think so.
- speaker: Respondent
  text: Dr. Vance had great respect for Dr. Odum. He was like a father figure.
- speaker: Interviewer
  text: How did Odum relate to Frank Porter Graham and some of the other institutions around the campus here?
- speaker: Respondent
  text: Graham in his orbit got tied up with the cattle breeders and Odum through Vance and different people with the WPA,
    whose names I don't recall.
- speaker: Respondent
  text: Frank Alexander, Guy Johnson and his wife Guion Johnson, Harriet Herring was in labor relations in the South. They
    were all graduate students that came through the curriculum. Zimmerman, I don't know where Eric Zimmerman who was over
    in the economics department was very sympathetic to regional studies and he and Dr. Odum together were a very strong influence
    in the University. Frank Graham was.
