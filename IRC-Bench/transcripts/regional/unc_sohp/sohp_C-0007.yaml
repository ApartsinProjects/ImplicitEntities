collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: Certainly, Jay. But let me first of all express appreciation for the honor of this visit and this interview, and to
    know that there's some interest in my little career over at Carolina and in the preservation of it. I'm grateful to you.
    I was born in the little town of Louisburg in Franklin County. My father was a railroad conductor for the Seaboard Railroad,
    and he was conducting a little branch line that made three round-trips a day between Louisburg and Franklinton. And his
    train went forward one way and backward the other way; there was no way of turning it around in Louisburg. It's interesting
    that my father, when he was doing that, was also reading law under a judge in Louisburg, and though he never finished
    high school he was hungry for knowledge. He had read enough law while he was railroading to go to Wake Forest law school
    for some summer courses, and to take the bar exam in Raleigh and pass. And he practiced law as well as railroading, which
    indicates that my background then was a father who was interested in learning and in growing and in improving his mind.
    We moved to Raleigh after about three or four years, so that I entered the public schools in this city. I went to Murphy
    school, and then the old Raleigh Junior High School, and then Hugh Morson. After graduation from Hugh Morson High School
    I went to Wake Forest College for four years. And then upon graduation I went to Southern Baptist Seminary in Louisville.
    I came back to North Carolina and have been pastor of different churches in eastern North Carolina through all my career;
    I never moved away. Had the first church in Pittsboro, over in Chatham County, and along with that a little church in
    Randolph County in Liberty. Two part-time churches.
- speaker: Interviewer
  text: That's where you met Mrs. Finlator, I believe.
- speaker: Respondent
  text: 'That''s where I met Mary Lib, because she was teaching English and French in the public schools in Pittsboro. She
    lived in the home of the county superintendent, a wonderful man named W. R. Thompson. He is the father of Reid Thompson,
    who became a well known public figure in North Carolina and now lives in Washington. And then we went to Weldon for the
    second pastorate, for five years, then to Elizabeth City First Baptist Church for ten years. And then, in 1956, we came
    to Raleigh to Pullen Memorial Baptist Church, succeeding the great Dr. Edwin McNeill Poteat at Pullen Memorial. And I
    was there some 26 or 27 years until I retired a couple of years ago. So that is largely my ministerial career, always
    in the Southern Baptist Convention. With this addition: Pullen Memorial joined (while I was pastor) the American Baptist
    Convention, which is a rare thing for a Southern Baptist Convention church to do. We were dually aligned, and the reason
    the church did that was symbolic as much as anything else. The Mason-Dixon line divided the Baptist Church prior to the
    Civil War. And once there was one major Baptist Convention and slavery was a division. And so we said we need to transcend
    that Mason-Dixon line and so we joined both Baptist Conventions, which was an exciting thing to do. Incidentally, it''s
    quite fascinating to return to your home, where you were brought up, where you went to public school, became pastor, and
    see all your old colleagues around there and grow old with them.'
- speaker: Interviewer
  text: You, of course, have been active in civil rights activities for nearly 40 years. Did any individuals have any particular
    influence on you in this respect?
- speaker: Respondent
  text: 'Yes, very definitely. I mentioned my father a while ago. He was a rare character. He had a very deep sense of justice
    and fairness; we learned this as children. And nothing is learned so quickly by a child as in equity or unfairness. He
    taught us the value of every person. He never let us say a slurring word about a black person. He had a tender feeling
    for poor people—people we call today "marginal" and "disenfranchised." There were words we did not use in those days,
    but we learned this from my father. And later on I learned from him the value and meaning of a labor union, because he
    was a member of a labor union with the railroad called the Order of Railroad Conductors. So that all through my life my
    father—more than I was aware at the time—was a role model for the sense of fair play and justice and tenderness for the
    rights of people. But when I came to Raleigh, Jay, I had gone only to Baptist schools and I had a traditional upbringing
    in my home: it was a Southern, puritanical background. My church was Southern Baptist, Wake Forest is a Baptist institution,
    the Louisville Seminary another Baptist institution, so my education in some ways was restricted. Though neither of these
    schools I went to put a bar on my curiosity and my inquisitiveness. When I came to Raleigh there was a man here in the
    United Church, named Carl Voss. He was fresh out of Union Seminary. You remember Union Seminary in the days of Harry Ward,
    Reinhold Niebuhr and Henry Sloan Coffin, the great intellectual and rebellious Christian leaders. And my association with
    him was a fascinating thing. He opened up to me worlds of reality that I had just not known about, what with my conventional
    education. And he told me the things I was supposed to read. He told me I should read The Progressive Magazine, and The
    Nation, and The New Republic, The Christian Century, and later on I discovered Christianity and Crisis. And these magazines
    coming to me in the late 1930s and early 40s had a transforming influence on my life. They opened up to me vast worlds
    of injustice and economic repression, of unfairness, and I began to deal with these issues and relate them to the Bible.
    And I went through a great revolutionary experience; it was exciting. It was exhilarating. And thereafter I could never
    be the same. And so this man, Carl Voss, his friendship, his courage, his intellectual integrity, his dashing verve, was
    a thrill—all that was a thrill to me. But then after my father, and after Voss and after the writers I became acquainted
    with in The Nation and The New Republic and so on, "way leads on to way," as Robert Frost would say. These things that
    made for other things. But at that time, the great Dr. Frank Porter Graham was at his height of influence and leadership
    in North Carolina. The man I mentioned in Pittsboro, Dr. W.R. Thompson, superintendent of schools, was a personal friend
    of Dr. Graham and he and I used to talk about Dr. Graham. You can imagine me: I was 23, 24 and 25, unmarried, first church
    and living in company with a man who was introducing me, personally, to Dr. Frank Porter Graham. And I saw what Dr. Graham
    was doing then and many years afterwards. I saw that, first of all, he was a loyal alumnus to the great University of
    North Carolina. I saw that he loved the South—the southern traditions. I saw that he was deeply devoted to his Presbyterian
    church. I saw that he loved all kinds of people: people who were in the establishment, people who were rejecting him,
    criticizing him, excoriating him. I saw that he loved people who were black, people who worked in textile mills, people
    who were on the farm sharecropping, people who were migrants, welfare people and that he identified with all these people
    and tried to bring them into the mainstream of American opportunity. And I saw that he was a man of sensitivity, of inflexible
    courage. I saw the way he stood behind his pastor in the Presbyterian Church, Reverend Charles Jones, in the days when
    the Presbyterians were in the process of removing him from his church, largely because of some of the social stands this
    young minister was taking. I learned that every time somebody left his church Frank Graham would find out how much contribution
    he offered to the church and try to make it up himself personally, if he couldn''t persuade other people to do it. I saw
    how he dealt with organizations that were supposed to have been charged with being communist infiltrated. I remember one
    time there were 8 people on a committee and 2 were declared to be communists. And therefore everyone said, "You must get
    off of that committee." He said, "Well, if 6 good, American capitalist people couldn''t handle 2 communists, we ought
    to be ashamed of ourselves. These communists were Americans, and we''re going to work with them and we''ll not let both
    of them take charge." And I saw the way he loved Thomas Jefferson. He had a great sense of American history and he was
    devoted to the Constitution. He had almost a sense of veneration for the Bill of Rights. And all of these things together—culture,
    religion, tradition, background, love of people, intellectual acumen, identification with the disadvantaged people—all
    these things swam into my ken, and I said, "That''s my man. That''s my hero. That''s my Frank Graham."'
- speaker: Interviewer
  text: When you came to Pullen in 1956, were you already active in civil rights matters, at that time?
- speaker: Respondent
  text: Well, not as pronounced Jay, as I was at Pullen. But I had run afoul some of the members of our churches in former
    years because of my concerns about poor people, about the migrants over in the eastern part of the state, about black
    people in general. And I had run into some difficulty with identifying with the laboring people in Elizabeth City during
    a strike. And incidentally the man who was the manager of the industry—where some of the people were striking and trying
    to form a union—was a member of the church. And that was a very delicate situation. But all of this was inchoate, it was
    in the making even in the very first church, but it was accelerated a great deal after coming to Pullen Memorial where
    the pulpit was traditionally a free pulpit—something I did not make but that I inherited.
- speaker: Interviewer
  text: In the 1950s we had desegregation in North Carolina, special legislative session and so forth and so on. What are
    your recollections of your activities roughly in that era?
- speaker: Respondent
  text: 'Well, along about that time I was a member, of the North Carolina Advisory Committee of the U.S. Commission on Civil
    Rights. And we were forced to take action and we regarded that as our proper concern. And so through that committee (of
    which I later became chairman), I became active. There were times when we supported the protests, the vigils. And incidentally
    I was pleased with the marches down Fayetteville Street, for example, here in Raleigh, in which we were trying to get
    the old S&W Cafeteria—which was down on one end of Fayetteville Street, very close to Shaw University—to open up to blacks,
    particularly Shaw students. And then we were trying to get one of the major theatres downtown to integrate, and two or
    three stores. And I actually was not a loner. A number of people at Pullen Memorial Baptist Church, such as Dr. H. M.
    Freeman, and others, Larry Highfill, etc. were down there walking and demonstrating. So I actually joined members of my
    congregation, which was to me a thrilling thing: to be led by your own people. There were organizational meetings held
    at Shaw University. And by that time the blacks of North Carolina had accepted me into their fellowship. From the very
    beginning of my ministry I made friends with black ministers, and black superintendents of schools. They would have me
    in their churches and their schools. Embarrassing, because in those days, your own church would not allow them to come
    and preach but that did not deter them from their kindness. I began to know black dentists and black physicians and the
    NAACP began to allow me to be a part of its activities.'
