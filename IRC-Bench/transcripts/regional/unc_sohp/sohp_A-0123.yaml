turns:
- speaker: Respondent
  text: I can tell you about the election what I know about it but as far as citing trends - .
- speaker: Interviewer
  text: We understand that. We are really more saying that this is one of the things which we are seeking but in the last
    year and one half, which has been a very important time, and you know what is happening, and you've read enough to put
    it in some perspective
- speaker: Respondent
  text: Ask me specific questions about what you want so I don't run all over the place.
- speaker: Interviewer
  text: How do you analyze the senate race in 1972? And also what you've heard.
- speaker: Respondent
  text: My view of it is that it was a special case of the right person in the right place at the right time. By right, I
    mean the pun in all. I think the politicians around, the ones I've talked to, even the Republicans, consider it a case
    of their party, Republican Party, putting up a guy who had a particular attraction to a region, the east, that their party
    had never done well in and that they overcame that simply because Jesse Helms, first off, had built in exposure there
    and Jesse's people will tell you that they went into rural counties and in a fact exploited his having been on the air,
    the word of mouth and the way they campaign was to accentuate that this is the guy that you've been seeing on television
    or that you've been hearing over the tobacco network, TN or whatever they call it out there. He was just a person and
    I think he won because he did well in the east and I think it was a case of his ultraconservatism, his seeming to speak
    the frustrations of the people out there. It just carried it and I don't think it's any grand strategy about it that you
    could point to. Particular things like his McGovern-Galifianakis ads where he wrote him as one word and that kind of stuff
    helped a little and I suppose the Nixon helped a little.
- speaker: Interviewer
  text: Is McGovern-Galifianakis just one word? How much of his appeal is based on race?
- speaker: Respondent
  text: It's my view almost all of it, but that's a biased view there. I think that the racial issue had a lot to do with
    it.
- speaker: Interviewer
  text: Kind of rock-bottom, you might say.
- speaker: Respondent
  text: I think that deep down, if you really get down to it, Jesse Helms was going to take the cheats off welfare, he's going
    to get the federal government out of our business, and he's going to stop busing and he's going to return things to local
    control and all that kind of stuff and I just think that deep down he was . . . that's it. He talked about foreign affairs,
    he talked about his relationship to Nixon, he talked about a lot of that. But I think deep down his race symbolized and
    his winning was a symbol of the racial issues still having an appeal in the South. I think other races show that other
    people can overcome that by running a good campaign or by going to certain issues but I think Jesse Helms, I think the
    race issue there was a very heavy factor.
- speaker: Interviewer
  text: Then is there a special case? He won on the basis of race or racial causes?
- speaker: Respondent
  text: I think he's a special case in terms of the way he's a special case in that he won as a Republican. OK. I think Jesse
    Helms could have won in the other party. OK. I say a special case because he's the first senator elected in seventy-two
    years as a Republican. OK. And I think that the reason that he won that was that by being a special case as a Republican.
    You understand what I mean? OK. But -
- speaker: Interviewer
  text: So you think that the racial politics would have been enough in either case, either as the Democrat or as the Republican,
    to have won it?
- speaker: Respondent
  text: It's my guess, yes. It's totally a guess.
- speaker: Interviewer
  text: That's assuming one could have gotten a Democratic nominee on that slate. How big of a factor -
- speaker: Respondent
  text: You know, Wallace won a primary. I think he was appealing to the same people. I haven't looked at each precinct he
    won and Wallace won. I guess I could spend a few days doing that, but that would be something for you to look into, where
    his vote was and where Wallace's vote was. He probably could have won a Democrat, given his exposure and everything else.
- speaker: Interviewer
  text: So I would suggest to you that the Democratic Party in 1974 with any kind of candidate is going to want it back. That
    will not be another special case with a Republican elected as the senator in this state.
- speaker: Respondent
  text: Yes, but the Republicans keep telling me they can win with somebody like Mizell, I don't think they can. I think the
    Democrats run a smart race, they can beat -
- speaker: Interviewer
  text: How big a factor was the -
- speaker: Respondent
  text: I haven't seen any of their polls. OK. But their polls say that Mizell is close enough to Ervin that they can beat.
    They feel that Mizell can pull the east too, not so much on a racial issue, though I'm sure that would have something
    to do with it, there too, I'm sure he could make a racial -
- speaker: Interviewer
  text: of Jesse Helms?
- speaker: Respondent
  text: Not exactly with Jesse Helms, but close enough to it. I could see Mizell running a campaign, "I could work well with
    Jesse." I can see him going out east and telling his baseball stories and saying, "I'm one of you." And I think the undercurrent
    of race could be there, too. I don't see the Republican Party making a poor man's economic campaign out of these. I just
    don't see him doing that in my view and people that I talk to don't talk about it in the blatant terms that I'm talking,
    but I think all the code words and the undertones are there.
- speaker: Interviewer
  text: So getting back to what Key said, it's overall about the South about race being the basic factor in elections. Do
    you think that's changed substantially?
- speaker: Respondent
  text: I don't know about the South as a whole. I suppose it's in the process of changing. I don't think it's been left out
    yet.
- speaker: Interviewer
  text: In North Carolina, you said it was different, and North Carolina was more progressive, and in North Carolina race
    wasn't much of an issue, and North Carolina was a great progressive state. Do you think that still holds?
- speaker: Respondent
  text: From what I can tell, I think North Carolina's progressive image is more outside the state than inside the state.
    North Carolina's image increases the further you get away from it.
- speaker: Interviewer
  text: In other words, North Carolina is not really that different.
- speaker: Respondent
  text: I found a lot of stuff here that I didn't expect, the low wages, I'm totally unprepared for the low wages that they
    pay here. Textile industry and all that. As much as I've read about it, I was just totally unprepared of that. To be honest
    with you. I'd been led to expect, and I suppose it's true if you compared a lot of things, that North Carolina state government
    is progressing, moving forward and everything, and I suppose that Sanford and Bob Scott and Kerr Scott were progressive
    men, and within Republicans, Jim Holshouser I think fairly a progressive guy, but I think the government as a whole and
    especially the General Assembly and you got to focus on it a little too, because what it says becomes law no matter what
    the governor says about it, he doesn't have the veto power, he can't succeed himself so there is no way to test by the
    vote or all those kind of things. What the governor proposes other than by the General Assembly. In this state, the governor
    comes in at the beginning of the session, he makes a speech, and then he can pull and tug, he can trade jobs, try to convince
    people one way or the other. But when it comes down to it, the power's in the General Assembly because it passes law,
    and when the speaker or the lieutenant governor as presiding officer of the senate says, "I order this bill enrolled,"
    it becomes law. It doesn't make any difference what the governor says or anything else. As soon as they do that it is
    law. My experience with the legislature now runs about a year and I don't find a whole heck of a lot of vision there.
    There are some good people in there, some good young people who, if they emerge as leaders and all that kind of stuff,
    could make a significant effect on the state. But I find the legislature much more conservative than the progressive image
    of the state leads you to expect. Their rhetoric notwithstanding because I find this state - Key talks about it about
    how it's oriented to businessmen and all that kind of stuff and how the business sort of ethic has sort of kept it honest
    but at the government has always protected the business interests of the state. I find it sort of works another way too,
    in my experience. They're always worried about the bond market and about whether we can sell our bonds and whether we
    stay with the budget has to be balanced, but how they estimate tax collections very conservatively, how they're very careful
    to balance out. And we get all this talk about can we live within our means, or can we afford to float bond issue, or
    do we have a triple-A bond rating and all that, and there is no connection between all that talk and the fact about half
    the blacks, according to a study I was just looking at, in the state live in substandard housing, about four hundred thousand
    families in this state live in substandard housing. You don't get any relationship to this conservative financial thing
    and how that affects whether you're paying teachers enough or whether mental health care here is adequate enough. They
    always worried first about the bond market, about the conservative financial estimates, and all that instead of, in my
    view, they ought to switch it around they ought to see what people need first, and then work that out. So that they set
    up a housing corporation for four years ago, and they didn't put the faith and credit of the state behind the bonds or
    anything. They made the bonds, they backed the bonds with the mortgages they sold. Big deal, that's no power to go out
    there and solve problems. It was a very conservative sound financial thing. So how much housing did they provide, $250,000
    worth of loans, that's all, nothing, practically nothing. So that's how I see the General Assembly. You know, it's a very
    limited sort of group of people because they don't take a big vision of things, they don't - they just see what they can
    work out, what they can get by with. They don't have a good staff, the lobbyists there have great power, not because they
    buy and sell but just because they are the only people there with information and the regular folks in the state just
    don't have any voice up there, don't have any ongoing way to get their views and needs known.
- speaker: Interviewer
  text: What are the most powerful lobbies in the state?
- speaker: Respondent
  text: I think the banks are undoubtedly the most powerful. Senator Gordon Allen said the other day that in the '73 session,
    there was a bill to put collision coverage in a plan to shift from the assigned risk plan to what they call a facility
    plan. It was a distinction between ways, how to handle high-risk drivers, the details are unimportant. Well, anyway, the
    banks oppose putting collision under the thing because the banks run a lot of these side firms that have collision. Well,
    anyway, something Gordon Allen said that over one weekend, from Friday when the session was over to Monday night when
    it was thirty-nine votes out of fifty, just cut it out. That's not bad.
- speaker: Interviewer
  text: Who would be number two?
- speaker: Respondent
  text: Well, I don't know if the banks are number one but they're pretty high up there. Number two, I don't know. Textile
    people keep a low profile but the state takes care of it as much as it can.
- speaker: Interviewer
  text: How about tobacco people?
- speaker: Respondent
  text: I don't know. In my experience they haven't been overpowering at all. Bob Scott got the tobacco tax through and the
    legislature has withstood pressure to take it off. That's the only thing in my experience. They are obviously aren't going
    to do anything to endanger the tobacco interests and they all run around with little tobacco leaves in their ties saying
    that I say support cancer and all that kind of stuff. But they aren't going to do any of that. Textiles, you remember
    when I was telling you about when Holshouser meeting with those southern chairmen when they went up to Washington and
    Clarke Reed went up there? He said in the interview I had with him the other day that that was one of the main things
    that he was involved in and was assuring that federal policy took care of the tobacco growers and textiles. You know the
    import fight they had in the early days -
- speaker: Interviewer
  text: I presume the electric utilities is a powerful lobby, insurance industry.
- speaker: Respondent
  text: No, the insurance industry I wouldn't say. Insurance industries is sort of mixed. The attorneys there have been able
    to fight the insurance people off. The insurance people have been the ones supporting the no-fault insurance thing. But
    they haven't gotten it passed. And if they were as powerful as the banks or utilities it certainly would have gotten passed.
    I don't see a lot of activity in the utilities in the General Assembly but I think it's clear that the utilities have
    a lot of force in other agencies of the state.
- speaker: Interviewer
  text: Who are the real powers in the legislature?
- speaker: Respondent
  text: There are very few real leaders. I -
- speaker: Interviewer
  text: If I were a guide or representative of special interests and really had some legislation I wanted to get through,
    who would I do see?
- speaker: Respondent
  text: Jim Ramsey, you'd go see first, the speaker of the house, Roxboro, Person County. He's got ambitions, I guess, to
    run statewide in '76, probably for governor. Ramsey's undoubtedly an important man.
- speaker: Interviewer
  text: What's the source of his power, as speaker of the house, he's able to do what, appoint committees?
- speaker: Respondent
  text: Yes, he appoints committees and names the chairmen. The speaker, too, as I understand it has been traditionally sort
    of been the leader, too. The caucus leader. When the Democrats have a caucus the majority leader, named William Watkins
    from Granville County, presides over the meetings. Because everybody knows that Watkins is Ramsey's man and they work
    very close together. And it's pretty clear that Ramsey's the central man there. So that he has sort of an intangible power
    you know, to set the agenda, to know what's going to be discussed, this tax reduction package that they voted the other
    day, Rams
