collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: The first thing I want to ask you is, how extensive an organization was the ASWPL really? How many members and how
    active was it? I know generally the numbers that they claim to have, but I am still not sure whether to emphasize that
    it was pretty much a one woman organization run by Jesse Daniels Ames or to emphasize how many signatures they had and
    how extensively they really did reach women missionary societies and women all over the South. That's kind of a basic,
    central judgement that I wish I could come down on.
- speaker: Respondent
  text: Well, O.K. This would be my estimate. There were about a half a dozen women who worked with Mrs. Ames and worked with
    her very faithfully.
- speaker: Interviewer
  text: About half a dozen?
- speaker: Respondent
  text: About a half a dozen. And then the others were more or less peripheral, they came on call and they did what they were
    asked to do. They but then, I think that happens with most organizations.
- speaker: Respondent
  text: But, there were about a half a dozen. Mrs. Tilly was, I guess, the most outstanding one and I could dredge up all
    the other names, but I know about a half a dozen that were very active and they were responsive and they were on call
    and it wasn't a matter of her deciding something and then telling them what she had done. They, it was pretty much a committee
    process.
- speaker: Interviewer
  text: Uh-huh. How many people on the average would attend annual meetings?
- speaker: Respondent
  text: I couldn't tell you.
- speaker: Interviewer
  text: You spoke at some of them.
- speaker: Respondent
  text: I spoke at I have records of having spoke to two of them. I have notes on what I said and since I talked with you,
    I had that sort of in the back of my mind and looking out for it when I was going through some papers the other day. And
    I know I talked to the group two or three other times in addition to that. But these two times, I have notes on what I
    said.
- speaker: Interviewer
  text: I have minutes of one of the minutes that you spoke to. Minutes on your...
- speaker: Respondent
  text: Do you remember what I was talking about?
- speaker: Interviewer
  text: You were talking about, the general subject they were trying to deal with was whether to concentrate on mob violence
    or to begin trying to talk about legal lynchings and the prosecutions of the courts.
- speaker: Interviewer
  text: And you gave a really excellent speech about the complexities, I mean about the legal oppression of blacks. But, even
    though you were working in the CIC offices as research director, you didn't have too much contact with the ongoing activities
    of the ASWPL. Was it really that autonomous?
- speaker: Respondent
  text: It was fairly autonomous. That's the way Alexander worked. He let me do about the way I wanted to do. He didn't have
    me under his thumb. I hope I did what he wanted me to do, but I did it more or less on my well, in other words, it's,
    if some program was started, and he said, "Now, you'll take charge of this." Why, some people don't mean it when they
    say that, but he did. And Mrs. Ames carried this on oh, he was in and out from the minutes I'm sure, he was talking now
    and again. And Mr. Eleazer did too, to a lesser extent. But, it was somewhat more separate than it might have been. For
    the reason that Mrs. Ames was an excessive feminist and she had a theory that women worked very differently from the way
    that men work and of course, this will turn most men off. They just say, "Well, if that's your way of doing it, just go
    on and do it." But, Alexander didn't take that position. I thought maybe she knew what she was talking about in part,
    well, she thought that the women's missionary work and the women's political work and what not all had to be in a separate
    compartment. That it was silly for a man to try to do anything about a women's organization.
- speaker: Interviewer
  text: Why did she think that women why did she want women to be I mean, you could be a feminist and want women to be integrated
    into male organizations, or you could be a segregationist...
- speaker: Respondent
  text: Well, she wanted them to be integrated out. She wanted them separate.
- speaker: Interviewer
  text: Why was that? Why did she?
- speaker: Respondent
  text: Well, I don't know. It was just some women are that way and some women are not that way. And I usually know when I
    meet a woman very quickly which way she is going to expect me to go. And I try to accommodate her, if there's any reason
    why I shouldn't...
- speaker: Interviewer
  text: Well, was it partly because that enabled her to exercise leadership. I mean, it gave her a certain, it gave her a
    constituency and power over her own organization.
- speaker: Respondent
  text: Yes, yes, that was clearly part of it. See, she came there, she had been secretary of the Commission in Texas, as
    you know, of the state committee. And then, she came up there because she had succeeded in a way.
- speaker: Interviewer
  text: Because she had succeeded?
- speaker: Respondent
  text: She had succeeded in Texas and she came over to the central Interracial Commission office. And, well, she in some
    ways looked upon the Interracial Commission as something she was going to take over sometime.
- speaker: Interviewer
  text: She wanted to take over the whole thing?
- speaker: Respondent
  text: Well, yes. She had an inclination in that direction. I think that if you'll look around, you'll find that most people
    around here have a notion that maybe they'll come into the leadership. These things are placed so if that does happen,
    why they are there when the door is open. Well, she did that and a little beyond that I think. See, when Alexander went
    to Washington, I think that she had the definite feeling that she should have been put in charge of the Commission. But,
    she wasn't.
- speaker: Interviewer
  text: Who was really in charge of it while he was gone?
- speaker: Respondent
  text: Well, all of us, and nobody.
- speaker: Interviewer
  text: But you were more closely in touch with Alexander, weren't you?
- speaker: Respondent
  text: Well, I was closer in touch with Alexander than Mrs. Ames was. Partly because of this sort of pushy way that she had
    in meetings and office work and all that. I was, well, I worked very closely with it.
- speaker: Interviewer
  text: This will really get into the basic problem that I have it's this. I think, I have gone through all of her public
    papers, I've gone through many of her private family papers and journals and interviewed her daughter and friends of hers
    and I have a pretty good sense, in a way, of what this woman was like, the complex motives that she had. And yet, this
    is something that my second reader objects to about my dissertation and I don't think that it's altogether justified.
    I think it's sort of simple-minded. He wants to know, he says that I am ambivalent about her, sometimes I portray her
    as a you know, "do you like her or not?" That's a question he asked me. Whereas I don't think that's really, you know,
    that's not what I'm trying to say in the end. Either "Yes, I admire her, she's a wonderful person," or "Jesse had all
    these weaknesses and faults,". I think that people are very complicated and yet I agree with him finally that I have not
    been able to portray her very clearly. What was she like? Can you give me some sort of, you know, specific ideas...
- speaker: Respondent
  text: I will say this. That anybody who portrayed her as I knew her, because that's all I can say, as I knew her would not
    come out with too attractive a character.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: That's correct. Now, after I talked with you, no, it wasn't you, after I talked with Miss Thrasher, I got to thinking
    about this. And when I was writing up these Southern notes which I bored you all to death with, but then, you might find
    them more interesting than you think. I wrote up about six pages on Mrs. Ames in the framework that Miss Thrasher had
    raised that you was writing your dissertation on. And, "did I know Jesse Daniel Ames?" So, if you don't mind, I'll just
    it may be better the way I wrote it than I state it. But, it was along these lines. That, I thought Mrs. Ames did a marvelous
    job in organizing the women and she did that and she had them coming there, she had them geared right straight to the
    point, namely that lynchings do not protect Southern white women. And that was a very significant point and that's the
    one she drove on and she kept her eyes on the real point. Now, she could do that after we had done this tremendous amount
    of research at Tuskegee Institute and after we had made these first case studies. She could then, with security, take
    the position they took. It couldn't have been taken until that time without somebody taking pot-shots at it. Well, as
    it was, nobody, so far as I know now, you've been through all the materials nobody took pot-shots at them that these dear,
    white women didn't know what they were talking about.
- speaker: Interviewer
  text: A few, small town papers but, generally...
- speaker: Respondent
  text: O.K., O.K. But, generally, it was accepted. And she could do that because of this very solid, careful research that
    had been done on this thing. O.K., now, she organized these women. They did come to Atlanta, they were subject to responding
    to telephone calls. She did have about a half a dozen women who were genuinely committed and available and worked on this
    thing. Not all of them lived in Atlanta. But, there was a core there. Now, she did that and she did it remarkably well.
- speaker: Interviewer
  text: Why was she able to do that so well? Would you say that she was a good administrator, she was a good organizer? The
    women did like her, I mean, or at least, were very loyal to her and very admiring of her. Why is that?
- speaker: Respondent
  text: Well, she could do it because she took this lead that resulted in the organization of these very strong church women's
    associations. And particularly the Methodist women's association. The core of it was the Methodist women.
- speaker: Interviewer
  text: But, if she was so aggressive in meetings and tended to offend people, why didn't she offend the women?
- speaker: Respondent
  text: Well, she was able to do what she wanted. They were doing what they she was doing what they wanted her to do.
- speaker: Interviewer
  text: Uh-huh. But her personal style was not...
- speaker: Respondent
  text: She sensed this thing and she got in front of it, there was a followship there and she got in front of it. She created
    it to some extent, but it was already created. It was there in the women's missionary societies, in some of the studies
    they'd had, some of the speaker's they'd had, some of the goals they had set. And it...
