collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Let me begin the interview by asking if you will speak a bit about the election of 1948, both about your own reelection
    to the House and the national election of that year.
- speaker: Respondent
  text: As you will recall in that election Mr. Strom Thurmond, former governor of South Carolina - maybe he was then governor
    of South Carolina - ran as an independent on, I believe he called it, the States' Rights ticket. Whatever the name of
    the ticket and whatever the status of Mr. Thurmond at the time—of course he later became United States senator, but I
    don't recall his exact status at the time; I think that he was either governor of South Carolina or had been governor—it
    was an anti-civil rights ticket. It was a racist ticket; it was a racist campaign, ultra-rightist in other respects too
    (on economic issues). It had a very important bearing in Tennessee. Now you will also recall that at that time Edward
    H. Crump was the undisputed political boss of Shelby County, Tennessee, which is our largest county - in fact, almost
    twenty percent of the population of Tennessee then and now lives in Shelby County. Crump supported the Strom Thurmond
    ticket, thus taking his organization and the many, many people who had long been affiliated with the Democratic Party
    but who, because of political persuasion of the Crump machine or because of political affinity with Crump and with the
    things that Strom Thurmond was saying, likewise left the Democratic Party. Those people have not yet returned, in the
    main, to the Democratic Party. They supported the George C. Wallace independent campaign; otherwise they have for the
    most part supported Republican candidates. For a long while they did not support Republican candidates for state offices
    - I'm referring to the presidential campaign. But come 1960, 1964, they began to support the candidates for governor and
    the candidates for the United States Senate bearing the Republican label. Then in 1970 they went overwhelmingly in this
    particular group for the Republican candidate for governor and the Republican candidate for the United States Senate.
    So far as Tennessee was concerned this breakaway of Crump and his machine from the Democratic Party in 1948 was a very
    significant milestone in the breakup of the preponderancy of the Democratic Party in Tennessee political affairs. Another
    significant thing, later on of course, was the murder of Martin Luther King Jr., and the strife and the riots and the
    racial and economic polarization in the Memphis area. So '48 was a watershed; it had great importance and great bearing.
    Also in 1948 I believe Estes Kefauver was elected to the United States Senate here in Tennessee, and Gordon Browning (then
    very anti-Crump) was elected as governor of the state. So Edward Crump had suffered severe defeats in the Democratic primary,
    and I had a significant part in that. Other than Kefauver and Browning themselves I made far more speeches than anyone
    else in that campaign. As I recall I supported Browning very strongly and opposed the Crump machine by name, et cetera.
    I made forty-some speeches in the last three weeks of that campaign, so I recall it vividly. It was a turning point in
    the politics of Tennessee, not only in presidential politics (as I have already outlined) but also it ended the domination
    of the whole state by Crump. I should like to point out that neither Browning nor Kefauver carried Shelby County in 1948,
    but I did carry it four years later in 1952.
- speaker: Interviewer
  text: Senator, your use of the figure "watershed" for Tennessee in referring to the significance of the election of 1948
    seems to me to be a very apt phrase. Let's pursue that a bit further. Would you say that the reaction, the dissent and
    rebellion, the opposition on the part of Crump and the others in Tennessee in 1948 resulted from President Truman's civil
    rights program and what came to be known as "Fair Deal" proposals? Or would you think that this cleavage in the Democratic
    Party was the result of long-developing trends or issues? Would you comment on that?
- speaker: Respondent
  text: I don't think you can draw the line that way. It was a part of all those things. Mr. Crump (most people called him
    that) was aligned with the business element in Memphis. Now he used the vote of blacks to exercise his control, but his
    alignments and his affinities were with the business elements. Crump himself became a very rich man in the insurance business—and
    maybe otherwise. I'm not saying that there's anything wrong about it, but it just happened that with all of his political
    power his insurance agency became a very popular and a very profitable agency, again without implying that any venality
    was involved. So Crump himself, both as a local leader and as a congressman, was very conservative; I mean by that he
    was aligned in his sympathy and in his votes with the rightist element in the Democratic Party. Then what Strom Thurmond
    had to say must have sounded very good to Crump. I do not know (and no one will ever know) just what part the victories
    of Kefauver and Browning in the Democratic primary had to do with Crump's defection through the Democratic presidential
    ticket in November. I don't think that can be underrated. Truman's advocacy of civil rights was strident. It did not comport
    with the views of Mr. Crump, who, as you will recall, was originally from Mississippi and oriented Delta-wise in his political
    views. So I think it was a mélange of all these things.
- speaker: Interviewer
  text: Mr. Crump's biographer, William Miller, has suggested a rather odd reason for Crump's opposition to Truman. He says
    that Crump opposed Truman because he was aligned with the Pendergrast machine in Kansas, [Laughter] that he led Tennessee's
    opposition to Truman for the vice presidential nomination in 1944. Tennessee withheld its vote for Truman after all the
    other states fell in line behind him. This was even before the Fair Deal. What would have caused a man like Crump to oppose
    Truman at that stage, before he'd really become well-known for liberal views? This opposition to a machine candidate seems
    rather odd.
- speaker: Respondent
  text: I'm unable to rationalize that one. [Laughter]
- speaker: Interviewer
  text: I was just wondering. The opposition appeared so early, as early as '44, to Truman on the part of Crump. I believe
    there had been at one time an investigation; Truman had led a Senate investigation that somehow touched one of the Crump
    people. I don't know whether there might have been more personal animosity.
- speaker: Respondent
  text: There may have been, but I'm not aware of it.
- speaker: Interviewer
  text: Could you say a bit more, Senator Gore, about your relationship with Kefauver, both as he made the decision to run
    for the Senate in 1948 and as you may have been able to help him in his campaign? Or perhaps you thought that was not
    your business to interfere in a Democratic primary? So perhaps the question doesn't have very much meaning.
- speaker: Respondent
  text: 'Well, Estes Kefauver and I were congressmen before we ran successfully for the Senate. We were personal friends.
    There was then and throughout our careers an element of competition - competitiveness, so to speak; not animosity, but
    competitiveness. Both of us thought about running for the Senate in 1948. Each of us knew that the other was thinking
    about it. We had no understanding as to which would run and which would not run. We talked about it from time to time
    in the cloakroom and over coffee in the dining room and so forth, and kidded about it. He decided to run and made his
    announcement, which meant that I could not run. But I had not decided to run, and I never thought that I was going to
    do it. I was tempted to do it, but I didn''t think that I was ready for it. So I don''t mean to imply that Senator Kefauver
    beat me to the punch, so to speak, and announced surreptitiously and beat me to the draw. That was not the case. He did
    not consult me about his announcement, but the announcement was no surprise to me and no particular disappointment to
    me because I had not reached the conclusion to make the race. I did even then intend to run in 1952, if not in ''48. I
    had then been in the House for ten years, and the time had come when I was looking for other political preferments or
    maybe private life. That''s the choice one must take as a congressman: he either goes up or out most of the time, at least
    as far as the Senate is concerned or as far as the governorship is concerned. Some man can run for mayor in an off-year
    election and still be a congressman, as Congressman Fulton later did successfully in becoming the mayor of Nashville.
    I did not help Kefauver in his 1948 campaign directly. I campaigned very vigorously for Gordon Browning. I did not campaign
    for Estes Kefauver. Number one, my political obligation and my political loyalty was to Gordon Browning. I had managed
    his first campaign for the United States Senate; I had served in his cabinet as governor. I admired him; and my political
    loyalty was there, my political obligation was there. I went from his cabinet to the Congress. Then there were two other
    elements: one was that I was personally attacked by a first lieutenant in the Crump machine (his name for the moment escapes
    me, of all times) and I was responding and retaliating for that. And another thing: one of the opponents of Representative
    Kefauver was a personal friend and a neighbor of mine, Judge Mitchell, who lives in an adjoining county. So I directed
    my fire and my efforts to the gubernatorial campaign. I must say that I was well aware that Browning and Kefauver were
    more or less running together, and that if I helped one I indirectly helped the other. But I did draw that line: I campaigned
    for Browning and did not campaign, did not make mention in the primary of the senatorial campaign. That may appear at
    this distance as drawing the line finely, but that''s how I drew it and I''ve given you the reasons for it. I also knew,
    I should add, that the key to power, to political turnover in the state, was the governor''s office, not the Senate office.'
- speaker: Interviewer
  text: Before turning to the election of 1952, I wonder if we could ask you to recall your attitude toward and any significant
    positions you took during President Truman's Fair Deal, beginning with his inaugural in 1949 and the program that he presented
    from time to time during the following years.
- speaker: Respondent
  text: By and large I was a supporter. Doubtless there were issues on which I did not support him; I just don't recall. But
    generally speaking I was a supporter of the Truman program.
- speaker: Interviewer
  text: This would not include civil rights,
