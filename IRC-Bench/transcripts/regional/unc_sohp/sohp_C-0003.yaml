collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: When were you born and where?
- speaker: Respondent
  text: I was born on January 30, 1908, in the St. Andrew's Hotel in New York City. It was located on the northwest corner
    of Broadway and Seventy-second Street. The hotel was torn down, I guess, in the twenties or thirties.
- speaker: Interviewer
  text: How did you happen to be born there?
- speaker: Respondent
  text: Well, that's where my mother was. [Laughter] My father spent a good deal of time in New York, but actually she went
    up there to give birth to me because she was from New York originally. My father met my mother when the old Cone Export
    and Commission Company was first organized and they started an office in New York about 1890. My father, of course, was
    not married at that time, but he met my mother and they were married in 1893, I think it was. Her old family doctor, of
    course, who took care of my grandparents' family, probably presided when she was born. She went up there to have all of
    us. My two older brothers, Herman and Ben, were both born in New York. Ben was born in the summertime. This doctor, who
    was getting along in years, had a summer place up in the Catskill Mountains, so my mother took a house up there that summer.
    He was born in August. Of course, children were all born in homes, not in hospitals, and so I was born in a hotel.
- speaker: Interviewer
  text: That's very interesting. Do you know how your parents met each other?
- speaker: Respondent
  text: They met in New York. My mother lived to be ninety. She just died twenty years ago, in 1962. She was born in 1872.
    She and my father did considerable courting, I understand, at the World's Fair in Chicago in 1892 before they got married.
    I think they had met in New York before that. Both her parents and my father's parents took their families out to this
    World's Fair. That was the Columbian Exhibition.
- speaker: Interviewer
  text: Yes, that was in 1893, I believe.
- speaker: Respondent
  text: Ninety-two or three.
- speaker: Interviewer
  text: When did you all move back to Greensboro?
- speaker: Respondent
  text: They brought me down here after I was a week or so old. They moved to Greensboro in 1895, some thirteen years before
    I was born.
- speaker: Interviewer
  text: Where did you grow up in Greensboro?
- speaker: Respondent
  text: I grew up in my parents' home on Summit Avenue. At that time, our place was outside the city limits. You see, my folks
    bought the defunct Carolina Steel and Iron Company, several thousand acres northeast of Greensboro. That was organized,
    I think, around 1880 to make steel in Greensboro. Greensboro was going to be the southern Pittsburgh. But the company
    went bust, and when my folks decided to go into manufacturing they bought this big piece of property which was outside
    the city limits. They built the plant there, and they built their home there. We had a farm when I was growing up, and
    we had our own cows, made our own butter, and had our own chickens. But we didn't have any beef cattle, and we didn't
    have any hogs, but we had everything else. We had horses, of course; that was before tractors. We had a bunch of horses
    and had a silo. It was a regular farm.
- speaker: Interviewer
  text: Where did you go to school?
- speaker: Respondent
  text: In Greensboro. I went to grammar school and high school for two years, and then I went out to Oak Ridge Military Academy
    for my last two years, and then the University of North Carolina, and then the Harvard Business School.
- speaker: Interviewer
  text: You're smiling about that. Why did you decide to go to Harvard?
- speaker: Respondent
  text: I didn't decide.
- speaker: Respondent
  text: My father died when I was nine years old, but my older brothers and mother more or less decided where I should go
    to school. After all, I think that used to be the case. I don't know whether it is today or not. I guess children are
    more independent than they used to be, but you used to do what you were told to do.
- speaker: Interviewer
  text: Did they go to the Harvard Business School?
- speaker: Respondent
  text: No. My oldest brother, who passed away in 1955—he was born in 1895, and he was sixty when he died—only went to the
    University of North Carolina for two years. He was in the Class of 1916, but he only went for two years. And my other
    brother, Ben, graduated in 1920. He was interviewed previously. He was in school with this famous Thomas Wolfe. I graduated
    in 1928 from the University.
- speaker: Interviewer
  text: What did you major in when you were in college?
- speaker: Respondent
  text: I guess it was history.
- speaker: Respondent
  text: I took a lot of courses in history. Maybe economics. I don't know. I think I probably had more courses in history
    and economics than anything.
- speaker: Interviewer
  text: Was business school much use to you?
- speaker: Respondent
  text: Yes, I think it was very helpful. It taught me to realize that if you had ordinary intelligence it was worth more
    to you than brains, because some of the Phi Beta Kappa students up there had nervous breakdowns and committed suicide,
    whereas some of us that were not too smart in undergraduate school did a pretty good job up there at the business school
    because we weren't scared to make mistakes. In my experience up there at graduate school, where they had the case system,
    I found that the Phi Beta Kappa student who studied hard and learned right or wrong… Up there at the business school,
    there wasn't any right or wrong; it was your reasoning that counted. You could answer a question one way, and I could
    answer it another. The guy who had the best reasoning got the good grade. Those poor fellows were used to reading a book
    with the right answer and retaining it in their head and making Phi Beta Kappa, but they were scared to reason and come
    up with an answer because they couldn't find an answer in the library. They'd study in that library all day and all night.
    I roomed with a boy from the University from Raleigh—he's long been dead, a boy named Shepard—and he and I got through
    in pretty good shape. Because we decided how we were going to answer a problem, and then we'd go to the library and get
    some statistics to prove our point. And we'd go through in pretty good shape and not take too much time and worry too
    much about it. So from that standpoint, I think I got pretty good training up there.
- speaker: Interviewer
  text: How about the company's policy in years following? Have you preferred to recruit your executives from business schools
    or from within the company?
- speaker: Respondent
  text: Mostly from within the company. You might say I got my job through nepotism; it was shot through with nepotism. Not
    just Cone family, but by the time I came along it was second generation, pretty much, and third generation all through
    the employees. In other words, a job with the Cone organization was a job for life and a job for your children if they
    wanted to go to work for you. We didn't do much recruiting. About my time, just before my oldest brother died—I’d say
    by the time we got listed on the New York Stock Exchange in 1951, and I was Treasurer at that time; he was President—we
    decided that since we'd become public, although the family owned about fifty percent of the company, that we couldn't
    afford to run it as we had theretofore for the company, the family, etcetera, and we'd better get out of nepotism. So
    we didn't have any revolution, but through evolution and attrition… My brother died, and I was made Chief Executive. My
    children didn't go into the company. My oldest brother's children were already in the company. But we put the sign up,
    "No More Nepotism," and over the years it's become pretty much professional management. We started recruiting, I'd say,
    about that time. Prior to that, it was pretty much the buddy system. A fellow who worked for us had a son, and he went
    to college, maybe, or to textile school, so he went to work for us when he got out. We didn't do any recruiting. It was
    a question of pretty much finding a job for most any employee's son. It was before the days of the females getting into
    the business. But the same thing was true as far as secretaries; it was the daughters of employees, etcetera.
- speaker: Interviewer
  text: Did that system work well?
- speaker: Respondent
  text: I'd say no.
- speaker: Respondent
  text: It probably worked well back before my time, but as government got involved, all kinds of legal problems, rights,
    etcetera, came along, and I'd say that that old system of nepotism was bad. It meant probably you were missing one or
    two real good people, but on the other hand you were upsetting a heck of a lot of people, and you were stuck with a lot
    of folks that weren't worth a damn.
- speaker: Interviewer
  text: Was it a hard decision to change the policy?
- speaker: Respondent
  text: Not for me. We also instituted mandatory retirement at age sixty-five. Of course, we had put in a pension plan along
    the road which we didn't have in the beginning, of course; nobody else did. But mandatory retirement at age sixty-five
    was something that came along about my time. When I got sixty-five, I got out of there. I didn't want to. I think I could
    still be there. I'm seventy-five now. But I got out and got this office so that I've been up here ten years. Now some
    companies let their retired executives still have office space, etcetera, and I think that's bad.
- speaker: Interviewer
  text: Why do you think that's bad?
- speaker: Respondent
  text: I'm afraid they get in the hair of the younger generation. Listen, if the younger people can't run things—I don't
    care whether it's a business or a college or a government—why, it's going down the drain. My only commercial job in business
    was with Cone, but I was active with our Airport Commission for many years in Greensboro; I was President of the Greensboro
    Chamber of Commerce; I was President for a while of the Moses Cone Hospital. Most everything I had anything to do with,
    when I see how it's run today, I'm upset.
- speaker: Interviewer
  text: Not as good, huh?
- speaker: Respondent
  text: Well, it's not a question of not as good. They spend too much money on things.
- speaker: Respondent
  text: I mean structures, buildings, and they borrow into the future. Spend more, and it'll be corrected. My feeling is that
    spending money is the last thing you ought to do. You want to be sure that your procedures are correct and that the goal
    that you're heading for is going to be met through procedures, and if you need to construct something to do that, okay.
    But it seems to me that today, even during this depression, that ever since Mr. Roosevelt the idea is throw more money
    at a project, whether it be a business project, a civic project, whatever, and all the future problems will be solved.
    The trouble is, we don't have that much money. We're loading the future generations to pay for it, plus the interest.
    In the old days, anybody that was fortunate enough to borrow money, whether it was a business or a civic need, a hospital
    or whatever, or as a home owner, he was so grateful, the first thing he wanted to do was tear up the mortgage, pay it
    back. Today it's a case of going out and borrowing, borrowing. The government makes it easy with guarantees in certain
    areas. Paying this kind of price for money the last few years is ridiculous. And to slow this thing down, why, we've got
    to decide that we're going to take it easy. For instance, look at the subways in New York. They were built at a time when
    we didn't have any inflation, and the people today have the benefit of those subways, that today would cost billions to
    build. Nobody realizes that. But think of the people a few years down the road. Those subways now
