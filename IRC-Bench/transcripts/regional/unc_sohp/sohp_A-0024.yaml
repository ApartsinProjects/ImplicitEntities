collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: First wanted to ask you just how do you view your impact on Alabama politics and southern politics and national politics?
- speaker: Respondent
  text: I think it's hard for any individual to point out or put his finger on any impact he has had, personally. In our representative
    form of government an individual represents a segment of the voters or a viewpoint. And the viewpoint and the people he
    represents has the impact. I don't think that I individually have had all that impact, because one person in our system,
    in my judgment, is not worthy of all that much attention. It just so happens that I've been the governor of a state and
    that's been a good forum. Whereas many people have eloquently spoken more so than myself about matters that I've spoken
    of. But they were not in the governor's office and therefore their viewpoint, which was in many instances the same as
    mine, didn't get as broad circulation and dissemination. I would say the people that feel as I do in Alabama and in the
    country have had broad, strong impact on affairs within this state and within this country. And I think they're having
    . . . the impact is even greater today in view of the fact that many of the people who years ago would say, "I don't agree
    with anything he says," now will ask you, "If you're in my state will you put in a good word for me." Or, "Will you come
    speak to . . . " I've already been invited this fall to speak in some states way away from our part of the country for
    the ticket. As I was in 1972. I was invited to go, even by one governor . . . called me on the phone. I was unable to
    go because of my physical condition. But I was asked. And maybe a few years beyond that I would have been asked not to
    come. So I would say that our administration here in Alabama and the people who supported it have had an impact on the
    industrial growth of the area, on the development of waterways, on the development of an educational system that today
    provides probably an easy enough opportunity at a minimal cost for higher education for all people, especially in low
    income groups than any other state in the union. With our comprehensive junior college and technical school program. The
    building of an additional medical school and two family physician programs at two other branches of our—one at the main
    University of Alabama and the other at the branch. And the other day the report came out we would be soon graduating 300
    doctors a year instead of 100, as we were in 1970 when I became governor that term. I think the impact of this administration
    here in the field of public health and the field of highway building, the field of industrial development and education
    has been great for all the people of our state. And at the same time we've maintained a very low per capita tax in Alabama.
    We have the lowest property taxes of probably any state in the union. An average $10,000 home costs today about $35-45
    in taxes, up to 50. $20,000 home anywhere, from $75-100 maybe. Which is about $1,000 less than you'll find in many states
    in the union. I think the impact on national affairs has been that the people I represented have many folks in both parties
    talking about the things they wanted talked about for a long time. I think you all recognize that yourselves. I would
    say that they had the impact. I was only the instrument and their representative or their agent. What I'm saying is if
    I just got up by myself and talking to hear myself talk . . . if I hadn't had the following, then the impact would have
    been just the impact of one man talking. But I think it's had tremendous impact.
- speaker: Interviewer
  text: How would you characterize that following? What do they believe? Have their beliefs changed?
- speaker: Interviewer
  text: You say you represent a certain segment. What do they believe?
- speaker: Respondent
  text: I think they represent the majority viewpoint in the country. I think people have grown tired of big government. I
    feel that they feel that government has been pretty much aloof from them. I think they felt that about the Democratic
    Party in 1972 . . . was just aloof from them. Was just foreign to them. They couldn't relate to it at all. So many things
    happen to them that they are opposed to. And I don't like to bring up busing because that's not the biggest issue or the
    only issue. It's a big issue in different places. But when Gallup polls show that 75-80% of the people of both races oppose
    this particular sort of school maneuver yet it's still forced on the people. They wonder why is it we always have to do
    what we don't want to do. Is it because a certain few in the country? Do we have an elitist government that a few in the
    bureaucracy which is stronger, as I said, than the government itself. Stronger than the president and stronger than the
    Congress. They've decreed that it's good for the people to do certain things. And even though the people don't like to
    do it, they must do it because this super elite group is so determined. I think that's the way they feel. And they feel
    that the government's aloof. They've found the Democratic Party in '72 adopting a platform that they did not relate with.
    The great middle class of our country that today is being probably subjected to the most abuse in the tax system of any
    group in the country. And if you ever destroy the middle class, I think you destroy the group that defends your system
    and supports the system and holds the system together. And I think they're all recognizing that. Didn't you hear them
    all talk that way the other day to the Democratic chairman? Same thing I used to talk about. So I think that I represent
    a broad spectrum of people. In fact it turned out in the governor's race that I represented a pretty broad spectrum of
    people of all races in this state.
- speaker: Interviewer
  text: Is that how you explain your continued popularity in this state? I mean you've been around now since 1958. You've
    been in office since 1962. How do you explain your own hold?
- speaker: Respondent
  text: Well, it's hard to explain because it's very difficult for a governor to stay in a long period of time.
- speaker: Interviewer
  text: What do people tell you is the reason they keep supporting you?
- speaker: Respondent
  text: I believe one reason . . . people have been satisfied with the things we do in state government. They're very satisfied.
    Not completely satisfied. I don't think there's any way to completely satisfy everybody and have a utopia. But I think
    they've been pretty, generally appreciative of the feeling that this government has had for the great mass of our people.
    Working extra hard for more employment and utilize our natural resources for good. Providing more educational opportunities
    for people's children who, when I first became the governor, had no opportunity to acquire an education because of its
    cost and the fact that we didn't have the regional community college concept in Alabama. A technical school concept which
    now puts everybody within bus distance of one of these institutions. I think they felt that I had been, our administration
    was successful in that way. I think otherwise, also, is that when you deal with people in our region you're dealing with
    people who are very proud people. You can't find any people who are any more proud of their heritage or their region or
    their country than you do people here. Not that people in other regions aren't themselves proud of their own heritage.
    But I think one reason it probably is more pronounced is because we were the number one economic problem of the nation,
    according to Mr. Roosevelt in 1932 in one of his speeches. Which was probably true because of the restrictions and regimentations
    that had been imposed upon the economy of our part of the country after the war between the states. A region of the country—and
    I'm not trying to bring up sectionalism because that's gone and we're all one country and the people of Michigan want
    to see the people of Alabama prosper the same as we want to see them - but the effects of that . . . freight rate in equities
    in Pittsburgh Plus and making us purely agrarian in the days after the war. Plus the occupation. Instead of lend-lease
    and Marshall aid to rebuild us. And all the schools burned and all the railroads destroyed. All of the livestock gone.
    And people just trying to live. Eke out a living, just eat from day to day. The white and the black. That in spite of
    those handicaps they did come back. Which I think is one of the great epics in American history. Is the comeback of the
    people of our region under so many adverse circumstances. And in those days . . . even in the '20s and '30s, we still
    were feeling the effects of lack of education in the '70s and '80s and '90s. Because everybody was poor. And that spilt
    over into the twentieth century. And so in the '30s we still had thousands and thousands of our people who were proud
    people, good blood. Of course people got good blood all over the country. I'm not saying some blood's good and some's
    bad. Don't get me wrong. But a way of describing strong people with great pride. I used to know people that were illiterate
    in the sense that they couldn't read and write. But they were proud people, you know. They had pride. Many of them would
    never admit they were poor. Such as my own family. My father went to two years to college. My mother was a college - she
    went to college and she taught music. But my father farmed and he was just as poor as the next person. Because farming
    was on the bottom and everybody's . . . farm tenant, landlord, or whoever was just devoid of money. People ate because
    we were agricultural. But my mother would never admit that . . . she had to go to work as a stenographer after my father
    died in '37, at the age of 40 after he'd been farming a part of his life that was very short. And she would never admit
    to this day that we were poor people. She was too proud to admit it. And the whole community was poor. But there was a
    great pride. You know, you'd have church services . . . be jam-packed and they'd sing that song, "Some Day We'll Understand."
    And really, I think they used to sing that because they not only had a spiritual feeling but it also told the story to
    them that someday things were going to be better. I can remember . . . I was in a similar position, but I never felt sorry
    for myself and I never did want to destroy the country. I just prayed and . . . like my folks . . . things is going to
    get better. And things begin to get better. But we were looked down upon. And people that came from other regions of the
    country said, "Why aren't you as progressed as other people are progressed?" And when you would explain all of the restrictions
    that had been placed upon us, then I'd say we're really further progressed. Probably no other region could have come and
    overcome what we overcame. You know what I'm talking about when I talk about freight rate in equities and Pittsburgh Plus.
    It was designed to keep us from not having . . . agriculture and caused an influx of our people to leave, outmigration,
    in the '20s and '30s by the hundreds and hundreds of thousands in find industrial job employment in other parts of the
    country. And so in the presidential campaigns . . . the South, you know, backwards, they said, you know. Yet it was more
    forward, under the circumstances, than probably anybody. Considering all of the circumstances. And yet we were talked
    about. You know, rednecks, hillbillies, backward, ignorant, illiterate, racist. And the people developed a complex. They
    knew it wasn't true, but they had a hard time proving it, you know. And when I became the governor of the state of Alabama
    we still had that viewpoint about our region. And I took advantage since those early days and my political career to travel
    the country. And I think they feel that my position as governor was used to help restore the pride that today sees people
    visiting us, sees the president come to see us. Come to see me. But they feel like they're coming to see them. I'm only
    their representative. And Senator Kennedy and Senator Humphrey. And you name them. And I feel that's one reason we've
    been successful, too, in Alabama and in the region. And I also feel that the average citizen of Michigan also feels that
    I have expressed his viewpoint whereas the other politicians . . . for so long most of them have expressed the viewpoint
    of the noise makers of the far left. And I express the viewpoint of that mass citizenry that in 1968 erupted into the
    largest crowds that any candidate drew. But a third party ticket was something they didn't think could win. But it sort
    of got the other candidates around to begin to say what we were saying. Had I been on a major party ticket in 1968, there
    would have been a very close race. On either ticket.
- speaker: Interviewer
  text: Is it their identity with you that gives you the strength? If you look at the other southern states, there's been
    no politician that has lasted as long in the executive office as you have. Right?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: How do you explain that? Because in all the other states this has not happened. But in Alabama it does happen.
- speaker: Respondent
  text: Well, I cannot explain . . . I can't tell you about other governors or other people. You do know that governors have
    a hard time being reelected. Or at least beyond a four-year . . . maybe two two-year terms. You can go to the Senate and
    the House and it's been a custom in our part of the country because of the seniority system that people have stayed there
    longer. And they've understood that and that's not difficult to do. But in the executive office it is difficult to do.
    I think that I've explained it to you in talking about not only the projects and progress we've made in our own state
    but the fact that they've been represented and they appreciated the fact that you stood in Madison Square Garden and told
    them you came from a great state. And have the people to stand up and give you a standing ovation. Let them know that
    even though the newspapers have been writing and making fun of them, the people in New York like them, and knew they were
    good folks.
