collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Well, let's start in 1902. You were born in Georgia?
- speaker: Respondent
  text: Born right here in Atlanta, just a few blocks from the Biltmore.
- speaker: Interviewer
  text: Was your Atlanta background important to you in your early years? The influence of your grandfather?
- speaker: Respondent
  text: Well, I don't remember it except what I've heard. My grandfather was the founder and publisher of the Atlanta. My
    grandfather on my mother's side. My grandfather on my father's side was a farmer in Washington, Georgia.
- speaker: Interviewer
  text: That's Clark Howell, right?
- speaker: Respondent
  text: No, Evan Howell was my grandfather. His son was Clark Howell. My mother's brother. For whom I was named.
- speaker: Interviewer
  text: So you grew up in Atlanta and went to the University of Georgia.
- speaker: Respondent
  text: I grew up in Atlanta and I went to the public schools of Atlanta and then to the University of Georgia.
- speaker: Interviewer
  text: Was there an expectation that you would go into the Atlanta?
- speaker: Respondent
  text: No. My oldest brother was the one who was interested in writing and he had ideas of going into that field, but I never
    did.
- speaker: Interviewer
  text: When did you go to college?
- speaker: Respondent
  text: In 1916. Wait a minute. I guess it was 1917.
- speaker: Interviewer
  text: You were pretty young, then.
- speaker: Respondent
  text: Yeah. I graduated when I was 19 in 1921. See, I was born in 1902.
- speaker: Interviewer
  text: What was your experience at the University of Georgia like?
- speaker: Respondent
  text: Well, I guess it was a pretty ordinary experience at college. I took a regular liberal arts course, so to speak. Latin,
    Greek and so forth. Very little science. No economics. But the most important thing that happened to me at the University
    of Georgia was that in my second year there one morning at the Chi Phi chapter house where I was living—Chi Phi fraternity—I
    came down for breakfast. There was a lot of talk about a rape that occurred outside of the town of Athens. Where they
    said that some Negro man had raped a pregnant white girl and then killed her. Well, all day long on the campus there was
    talk about this going on. And that afternoon I went up to the court house, which was supposed to be a mob-proof court
    house. Athens was very proud of having a mob-proof court house. Which in itself is an indication of the spirit of the
    times. But when I got there a mob was all around the court house and very soon after I got there the cry went up "Well,
    we've got him, we've got him." Cars started out in kind of a motorcade. I jumped on the running board of one of the cars
    to see what was going on. They drove out to the country. I suppose it was about five or ten miles outside of Athens. And
    there all the people lined up single file and went through this country house where inside, in a coffin, was this dead
    woman. They all passed by this bier and then crossed this road to what was a kind of a natural amphitheater. People were
    sitting all around on the side of the bank and below, in the middle, tied to a small pine tree was this Negro man. They
    built a fire around his feet and slowly burned him to death. Every time the fire would spring up, catch his clothes on
    fire, they'd beat them down so he was slowly burned to death. Well, naturally, this had a very traumatic effect on me.
    My correspondence with my family for the next year or so was filled back and forth about this event. The papers, of course,
    in Athens were very much against it, of course, and my Greek professor I remember denounced it in class as barbarism.
    But it had, nevertheless, a very profound effect on me.
- speaker: Interviewer
  text: What kind of things did you say about it in your letters to your family? How did they respond to your concern?
- speaker: Respondent
  text: Well, I just said what a terrible, barbaric thing it was. And they wrote back, very sympathetically. My family was
    broadminded. Both my mother and my father were very broadminded, liberal minded people. Strictly bourgeois people. But
    they believed very strongly in free speech and the right of the individual.
- speaker: Interviewer
  text: How did the Atlanta treat lynchings?
- speaker: Respondent
  text: I don't remember what the Atlanta did, but I suppose they were pretty good about it. The Athens, which was the local
    paper in Athens, was very good on the subject and denounced the lynching. I didn't do anything about it then. I went on
    to Harvard. The next year, after graduating at the University of Georgia I went on to Harvard. I went to Harvard for a
    year.
- speaker: Interviewer
  text: That's where you met Corliss Lamont, isn't it?
- speaker: Respondent
  text: To show you the state of my mind at that time, just across from me in the dormitory where I lived was Donald Culross
    Peattie, who later became quite a writer on botanical matters. And he invited me to go and hear W.E.B. DuBois at the Liberal
    Club. So I said okay, I accepted. When he came to call for me it was about 6:30 and I said "Well, isn't it awfully early
    to be going." He said "Well, we're going for dinner." "Going for dinner? I didn't understand that. I can't go." "Why not?"
    "Well, I can't go and have dinner with a Negro." He thought that was pretty silly and so did my roommates. And we argued
    about it until I had no rational defense. So I said okay and went. That was my first break, so to speak, from the southern
    tradition.
- speaker: Interviewer
  text: What other events in Cambridge do you remember from that year that pushed you into further breaks from your southern
    tradition?
- speaker: Respondent
  text: I don't remember anything else on the Negro question. W.E.B. Dubois was very fine and made a great speech and I was
    very impressed by him at the time. I don't remember anything else on the Negro question.
- speaker: Interviewer
  text: You went on to London from Harvard?
- speaker: Respondent
  text: Yes, after a year at Harvard my family gave me $1,000 to go to Europe for a trip. So I said "Can I just take the $1,000
    and make it last as long as I want to, not go on one of these special tours." They said yes. So I did. And as I left my
    mother gave me a copy of H. G. Wells' which I read going over on the boat and was greatly impressed by it. Particularly
    the last chapter when he talked about what could be. He talked about the kind of society that should be. So when I got
    to London I thought I ought to talk to him. I wrote him a note and said I'd like to come talk to him. He didn't answer.
    I looked him up in the telephone book and found that I had sent it to his country place instead of the place he had in
    town. So I called up. His secretary said "Who's calling." I said "Mr Foreman." She put him right on. I said "Mr Wells,
    I wrote you a letter but I sent it to your country place and I haven't received a reply so I thought maybe you didn't
    get it." He said "Oh, then you're not the Mr Foreman I talked to this morning." Apparently the only reason I got through
    right away to him was that he thought I was somebody else. Anyway I did and he told me how busy he was and how he couldn't
    take time away from his writing and so forth, but wanted to know what I wanted to talk to him about. I said "I can't go
    into it on the telephone, but I would like very much to have a little while with you." He said "Well, you write me another
    letter and send it here and I'll see." I did write another letter and sent it over by special messenger to his apartment
    and he replied very promptly and said I could come a few days later. He gave me an appointment for 15 minutes. When I
    went over to see him for the 15 minutes, he was very cordial, very nice and I told him why I'd come to him. I'd read his
    book and I was very much impressed by it and I wanted him to advise me what he thought would be the best thing for me
    to do. I really was coming to him just the way I would come to a doctor, for advice as to what I should do with my life
    to carry out the ideas he had in that last chapter in the book. He said "Well, no doctor would diagnose on the basis of
    such a small amount of information. I can't really tell you what you should do. But do you speak French?" I said no. "Do
    you speak German?" I said no. I said I studied a little French but German was not taught in the schools during the First
    World War. So he said "Well, my advice, in a general way, is to go to Germany for the winter and learn German and then
    go to France, next summer, and polish up your French, and then go to the London School of Economics." So I thanked him
    and left. Oh, I forgot to say that in the course of the conversation he said "Well, what were you planning to do before
    you read my book?" And I said "Well, my family had a job for me in the bank in Atlanta, but I don't want to be a banker."
    He said "Well, you could do a lot of good as a banker. Look at Thomas W. Lamont, how much good he's done." I said "Well,
    in the first place, I don't see any chance of my becoming a Thomas W. Lamont. And in the second place, I don't want to."
    So I went on to Germany, spent the winter in Germany. My mother had a stroke so I had to come home in the spring. I didn't
    spend a summer in France. After spending a summer at home I decided I would go back to the London School of Economics.
    My family was very much against it because they were afraid I was staying away too long and I'd just be another one of
    these lost Americans in Europe and I should go to work. It was a little bit difficult because the only reason I could
    give for going was because H. G. Wells had recommended it. Anyway, my father then played a last card and said that the
    expenses of my mother's illness had been so great that he couldn't really afford to send me for another year. I said that
    I could understand that very well but I was going anyway.
- speaker: Interviewer
  text: What did your father do for a living?
- speaker: Respondent
  text: He was the state director of the Mutual Benefit Life Insurance Company. The time came, I got ready to leave, father
    said well, he couldn't give me the money but he would lend it to me. Which turned out to be very good because when I got
    to London one of the first things I found out was that I couldn't work there. I had expected to work my way through, you
    know, the way they do over here. But that wasn't possible in London. So I went to the London School of Economics and there
    I had a very different kind of experience. Of course there were all kinds of people there from all over the world. A great
    many Negro students, some of whom I got to know quite well. One of the crucial things that happened was that I was given
    a book to review for the school paper. The book was J. H. Oldham's. Now my parents had been writing me all the time urging
    me to come on home and get to work, you know, don't just stay over in Europe indefinitely. But when I read Oldham's book,
    he told about the starting of the Interracial Commission, the Commission on Interracial Cooperation, it was called, and
    what a good job they were doing in Atlanta. Well, here I was from Atlanta, reading a book in London, learning about what
    was happening here in my own home town that I had never heard of before. So I decided to come home and go to work for
    the Interracial Commission. When I came home I told father that's what I wanted to do and he said "Well, I know the head
    of it very well, Dr Ashby Jones. He's a very close friend of mine. And I will arrange for him to see you." So he did.
    I went to see Dr Jones and he was very kind, but he said I should see Will Alexander, the director. I went to see Will
    Alexander and told him that I wanted to work with the Commission. He said they would like to have me but that they didn't
    have any money. There was nothing in the budget to provide for a job. So he couldn't pay me until January. I could start
    in January. Well, this was in August. I said "Well, look, I don't want to just sit around here from now until January
    waiting to work. Why don't I just come and work for nothing. I'll come to the office and work for no salary." He said
    okay, but then he found the money and to my great surprise I was getting $250 a week. I don't believe it was a month.
    I think it was $250 a week, maybe a month, let's see. It came to about $3,000 a year, so I guess that was $250 a month.
- speaker: Interviewer
  text: On the basis of reading one book you were interested enough in race problems to come back and go to work for the Interracial
    Commission?
- speaker: Respondent
  text: Well, I was interested enough to do it before I read the book, I guess. But the book only showed me where I could
    work. Anyway, I went to work and I was very pleased with that salary because it was quite a good salary at that time.
    The first one I'd ever earned.
- speaker: Interviewer
  text: What did you do?
- speaker: Respondent
  text: I became the secretary for the Committee for Georgia. Arthur Raper talked about it yesterday a little bit. And set
    up these committees around the state. For instance, I went to Augusta, Georgia, and went to see some people there. I went
    to see the leading white people that I knew about and talked to them. And they said "Look, we don't have any trouble in
    Augusta. Everything is fine here. We have the best niggers in the South. No trouble at all." Then I went to see the Negro
    leaders and talked to them and they said more or less the same thing. "We don't have any trouble in Augusta. Everything's
    fine here. The white folks just treat us fine. Everything's good." I said "Well, I noticed when I came out here, that
    the paving stopped when it got to the Negro part of town." "Oh yes, that's
