turns:
- speaker: Respondent
  text: You take a look at that. I don't know whether you've come across that kind of information anywhere or not.
- speaker: Interviewer
  text: I've never seen this.
- speaker: Respondent
  text: And I have excerpts from his will, where it's recorded and everything.
- speaker: Interviewer
  text: Annabell, who he's talking about, is his sister, Debra. She's my mother's sister; Annabell was my mother.
- speaker: Respondent
  text: That goes all the way.
- speaker: Interviewer
  text: So what relationship would that make your mother, then, to Henry Berry Lowery?
- speaker: Respondent
  text: I don't know. For three hundred years. No, two hundred years. No, Henry Berry was… he may have been her uncle.
- speaker: Interviewer
  text: I believe the figure he was talking about was legendary in the county….
- speaker: Respondent
  text: Oh yeah. Well, he was not only legendary; he was a real person. But there was a lot of legend around him. And he is
    writing a book, around this whole Lowery family. He (Dr. Earl Lowery) was in Roberson County at a funeral, of my mother's
    oldest and last-living brother. And he was there for the funeral and he got to talking. And he was telling about he was
    working on a book. I told him when he was finished with it, I wanted to get a copy of it, because I wanted to trace my
    family connections.
- speaker: Interviewer
  text: Does the Lowery family see itself as Indian on black, or a combination of the two?
- speaker: Respondent
  text: No. They didn't ever consider themselves black. As a matter of fact, that's why they have their own separate school.
    Even way back when they had segregated travelling on the trains, they always sat in the white section. Never.
- speaker: Interviewer
  text: So they declared themselves Indians. Your mother, then, saw herself as Indian?
- speaker: Respondent
  text: 'Well, she was one of them, and yet she married my father, who was about my color. But the way she got into Columbus
    County was: her first husband was A. McL. Moore. He was one of the Moores from down there. And he was a preacher. And
    I understand he was quite a speaker. And they used to invite him up there (Pembroke) to preach, at the churches. And that''s
    where he met her. And they married, and he brought her back to Columbus County. Later he died. And my father was her second
    husband. And there was quite an age differential between her and him (twelve years). She was 100 year old - would have
    been a hundred-and-one if she''d lived three more months - when she passed in 1965.'
- speaker: Interviewer
  text: Your mother?
- speaker: Interviewer
  text: When did she pass?
- speaker: Respondent
  text: In nineteen and 65. I have that information somewhere. But it's been within the last 14 years. My father was eighty
    - he was always overweight - when he died in February, 1956.
- speaker: Interviewer
  text: Do you remember your mother telling, then, about this Lowery family?
- speaker: Respondent
  text: Well, I visited Roberson County with her.
- speaker: Interviewer
  text: But when you were growing up, would she tell you about them?
- speaker: Respondent
  text: No. Well, you know, there's one thing about them - I guess the Indian characteristic - they didn't talk much.
- speaker: Interviewer
  text: When you were growing up, were you aware, though, that she was Indian?
- speaker: Respondent
  text: Oh, yes. Because…is this on?
- speaker: Respondent
  text: Well, put it off for the time being [Laughter].
- speaker: Respondent
  text: 'I have so many pictures that are really of historical value, with no dates, or no places on them. Because I did not,
    at that time, ever think that I would want them to refer to for any particular reason. And now that''s very important.
    Because, in my autobiography, if you take pictures, people have to know: when, why, where, who. And while I knew the people
    at the time, and all, some of them have been so long, that their faces are not so sure. And when you meet so many people
    in so many different parts of the world, it''s hard to reconstruct them after twenty-five, thirty, or forty years.'
- speaker: Interviewer
  text: You have photographs of your family going way back?
- speaker: Respondent
  text: 'No. Of people along my way, where I''ve been, and people I''ve met. Just like Chief Justice Warren, when I presented
    him to receive the citation from the National Conference of Christians and Jews. I remember it happened, and I think it
    was at the New York Hilton. But I''m not sure. And then others, in the city, and you''d go through the [unclear]. Way
    back. Have a lot of pictures in there. I can identify most of them, even before then. That was probably in the nineteen
    fifties. When I became a trustee of Shaw University, succeeding C.C. Spaulding, not too long after that, I started looking
    around to see what I could do to make a contribution, other than being a trustee, to the development of the student fund.
    Most of them (students) were from the rural areas of North Carolina. Limited exposures. And the thing that caused it to
    mean so much to me: it was my exposures that were liberating experiences for me, through which I learned how large the
    world is, and start the people in it. And why so many prejudices were in the white man. So many of them didn''t get out
    of their own state; didn''t know what was going on in other parts of the world. Some, you know, of the elite and all did;
    but the others didn''t. It''s the masses of the people where your problems are. I won''t say not any of them had them,
    too, but they had more of them to contend with. So I started a discussion with the president. And I had good white contacts
    at that time - not only on the state, but also the national and international level. They were corporate heads. If he
    was interested, I''d be glad to extend invitations to some of my acquaintances to appear there and speak to the student
    body. And have a question-and-answer period following that. In other words, the idea was to open the windows of their
    minds to the outside world, and what was taking place in it. So I had people from the state; I had people from other parts
    of the country; had ambassadors there; had cabinet officers there. So they got across-section of world-happening events
    and people [unclear]. And I guess in an eleven-year period, I had over a hundred people of that type. I remember when
    I had the chief executive officer of Continental Oil Company to come there. He had never spoken to a black audience before.
    I was able to get him [unclear]. His public relations man came ahead of him, and spent a day-and-a-half over there on
    the campus, sizing it up, talking with the faculty, talking with the students, and getting some ground-work. So he could
    go back and report to him, you know, as to where he was going and what he would find, and so forth. And he came over there
    to see me, and asked me a lot a questions. He said, "Mr. Spaulding, you mind me asking you a personal question?" I said,
    "No." He said, "How were you able to get Mr. McCollum to come and speak?"'
- speaker: Interviewer
  text: This is the man from Continental Oil?
- speaker: Respondent
  text: Yes. See, because he came over on his own private plane, with communications. As a matter of fact, he could fly to
    different parts of the world and conduct exec. committee meetings from his plane. They'd be meeting in Houston, and he'd
    be presiding on his plane [Laughter]. He was that kind of a person. Because he said, "Shaw?" He hadn't heard of Shaw before,
    his corporation. It was a black school. And he wanted to know who I'd got to get him. I said, "Nobody. I wrote him a letter,
    extending an invitation, and he accepted it." That was just a mystery to him. Well, he came. He made a good speech. He
    was well received. Had a question-and-answer period. And I know it was a refreshing experience to him, because, you know,
    when you do something that you've never done before, and you feel like that, that it's out of the common. I look upon
    it as a soul refreshing experience to have. You know,
