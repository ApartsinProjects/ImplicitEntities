collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: How about first giving me just a little bit about your own background and political involvement.
- speaker: Respondent
  text: Well, I guess it goes back maybe twenty or thirty years ago when I started out driving people to the polls to vote,
    under the sponsorship of what was then the Durham Committee on Negro Affairs. Now it's the Durham Committee on the Affairs
    of Black People. And I've sort of grown up in it. Have watched it closely. Done some work, you know, for politicians prior
    to this, prior to my becoming actively involved in politics. I guess it was a thing I just grew into, sort of. I think
    my first actual active political fling was in 1964, the year I graduated from law school.
- speaker: Interviewer
  text: You were how old then?
- speaker: Respondent
  text: I was thirty-four years old then. I ran for the North Carolina House of Representatives and lost. I repeated in '66
    and '68 and repeated losses in '66 and '68. In '70 I didn't bother to get involved, and '72 I got back into it and won.
    Went through a primary. I think I came out third in the primary, out of the three seats that were available, with no opposition
    in the general election. I came out second in the primary this year, '74, and had no opposition in the general election
    again. So that's very short and very concise.
- speaker: Interviewer
  text: Can you tell me a little about black political activity in Durham? Durham has a reputation of being one of the most
    politically active cities, both in North Carolina and in the South, in so far as black political development is concerned.
    I get the impression that Durham's role in North Carolina politics, at least within the black community, is very central.
- speaker: Respondent
  text: The reason for that being that we've got a pretty good, active political machinery operating. The Durham Committee
    on Negro Affairs, now the Durham Committee on the Affairs of Black People, has always played a key role in politics in
    that we've been able to make recommendations to a majority of the black community which they follow. The structure of
    the committee is such that everybody in the community, particularly the black community, participates. It's a nonpartisan
    effort. They've been able to have these meetings, meet with the candidates, talk with the candidates. Then sit down with
    the political committee of that committee, make a decision, and give it to the committee as a whole to make the decision
    on. And once the decision is made, whether you agree with it or not, the people seem to have followed the decision. It's
    a sort of a unifying type effort. In other words, prior to the final decision being made, we argue, we back and support
    our favorite candidate. Once that decision is made, however, the entire community seems to follow it. As a result, we've
    been very effective in putting a bloc vote together.
- speaker: Interviewer
  text: They put out a sample ballot. Does it ever include Republicans?
- speaker: Respondent
  text: Right. It has included Republicans, yes.
- speaker: Interviewer
  text: Do you interview each candidate?
- speaker: Respondent
  text: Yes, we talk to each candidate.
- speaker: Interviewer
  text: Is it similar to what goes on in Greensboro?
- speaker: Respondent
  text: I don't know how they operate in Greensboro. I'm not too familiar with that. But I would assume that it's possibly
    the same thing. Most of the black organizations have patterned themselves after our program here in Durham.
- speaker: Interviewer
  text: How do you disseminate the ballot?
- speaker: Respondent
  text: We have workers who work the polls. In other words, we will meet the night before the election. The ballots will be
    printed up. We'll have all the poll workers, all the precinct workers at that meeting and distribute the ballots to them
    so that when they go out in the morning they can work the polls, work the precincts. We send the cars out with the ballot
    with the slate in it. It is handed out on an individual basis. We also get computer printouts of voter registration lists
    for each of the predominantly black precincts in the city, to make sure . . . and we get them checked off as they . .
    . we have one person sitting outside of the precinct, and as they come in, we check them off on that list. And about two
    or three o'clock in the afternoon, those who haven't shown up, we start making an effort to get them out. As a result,
    it's been fairly successful.
- speaker: Interviewer
  text: Is there any sort of a central telephone number that can be called for rides?
- speaker: Respondent
  text: Right. We use the office for that.
- speaker: Interviewer
  text: How is that number disseminated?
- speaker: Respondent
  text: By radio. The radio that's beamed to the black community. Just by word of mouth. Everybody knows now that the office
    is central headquarters on election day. There's no problem there at all. It's also put on the ballot. Sometimes we will
    send out leaflets about a week before stating that the campaign headquarters are at . Then we have a speaker bureau that
    goes out on the Sunday prior to the election to make all of the churches. We also remind them of the number that way.
- speaker: Interviewer
  text: How many members on the committee?
- speaker: Respondent
  text: There is no set number, simply because the committee is an open committee. In other words, we ask that everybody in
    the community—actually, we consider everybody in the community a member of the committee. Normally the way it works is
    that each group, like a church, social or civic club, flower club, garden club, this type, will send a representative
    and comprise the committee as a whole. Then from the committee as a whole we've got four basic committees. The economic
    committee, the civic committee, the political committee, legal redress committee, and, oh yes, the housing committee.
    Five committees. The membership of that committee are chosen from the committee at-large membership.
- speaker: Interviewer
  text: Are they elected by the at-large membership?
- speaker: Respondent
  text: No, they are chosen by the chairman, who is elected by the at-large membership. The chairman is John Wheeler, president
    of Mechanics and Farmers Bank. He's been chairman at least sixteen years. John Stuart was chairman prior to his going
    on the city council. Wheeler took over after that.
- speaker: Interviewer
  text: And the political committee consists of roughly how many people?
- speaker: Respondent
  text: About twenty.
- speaker: Interviewer
  text: They basically screen candidates and reach a decision on recommendations for support.
- speaker: Respondent
  text: Right. In other words, the political committee will screen the candidates and will make a recommendation to the committee
    as a whole.
- speaker: Interviewer
  text: Are they invariably followed?
- speaker: Respondent
  text: Yes. We've had arguments right and left. Once the political committee brings back a decision, everybody doesn't necessarily
    agree with it. The recommendations by the political committee can be overturned by the body as a whole. In one or two
    instances they have, yes, that I can recall. I know two specific instances where this happened.
- speaker: Interviewer
  text: Where does the financing come?
- speaker: Respondent
  text: Individual contributions.
- speaker: Interviewer
  text: Does it come from within the black community entirely?
- speaker: Interviewer
  text: Isn't this unusual? Not unusual for Durham, but unusual for the South?
- speaker: Respondent
  text: Yes, I would assume . . . we try to maintain our independence. And therefore we wouldn't accept contributions from
    outside of the community. If we can't do it on our own then, you know, there's really no way of doing it. But we can do
    it on our own and we have done it on our own. So I guess it would be a unique type situation.
- speaker: Interviewer
  text: Durham is unusual in having a basically strong black economic base.
- speaker: Respondent
  text: Right, that's true. The fact of the matter is that with the independent institutions that we have and with the type
    of income, for instance, blacks have enjoyed within the city of Durham as a result of the tobacco factories and the hosiery
    mills and whatnot, we've done pretty well.
- speaker: Interviewer
  text: There are some basically strong black institutions. The banks, insurance, university. Is there a dues structure?
- speaker: Respondent
  text: There is no dues structure. We take up a collection at the annual meeting. When it comes time for political moving
    we get contributions, individual contributions. In terms of services in a lot of instances and in terms of money.
- speaker: Interviewer
  text: How about poll workers, drivers, so forth. Do they get paid?
- speaker: Respondent
  text: They get paid a very modest amount. Some get paid. Others do it on a volunteer basis. A driver will get some gas for
    his car. He won't be able to take along trip on the gas that he gets for his car, but he does get gas.
- speaker: Interviewer
  text: Roughly what would somebody get paid as a driver?
- speaker: Respondent
  text: Oh, he'd get maybe ten gallons of gas plus ten dollars.
- speaker: Interviewer
  text: That's for the whole day. That's certainly less than he could make on his job.
- speaker: Respondent
  text: It's more dedication, I think, than anything else. It's a way of life with most of the people who work. I mean, they
    know that they are expected to do this. They know that they have the support of the entire community behind them. It really
    boils down to just a way of life. Around political time, around campaign time, people become very active. They become
    very involved, very concerned.
- speaker: Interviewer
  text: What percentage of the white vote did you get? And the change from the first time you ran to the last time.
- speaker: Respondent
  text: The first three times I ran my white vote was practically nil. What happened was in the interim, I was appointed assistant
    district attorney and stayed in that position for three and a half years and built up something of a base. I'd say that
    thirty percent of the vote that I got was white.
- speaker: Interviewer
  text: Did you campaign differently in the white community the last time than the first three times?
- speaker: Respondent
  text: No. I may have campaigned more in the white community than I did the prior three times. I concentrated my efforts
    in the white community. In '72, for instance, I had entrees to civil clubs, to garden clubs, to all types of people in
    the white community. And as a result I used those contacts that I had to do that. Not neglecting the black community at
    all. Because irrespective of the fact that I was a black candidate, I still had to go get the black vote. I couldn't take
    it for granted. I could never take it for granted. Because it could kill me just as well as it could kill somebody else,
    kill off somebody else. See, the black vote can't elect anybody. We can doggone sure swing that vote. What it is is just
    a swing vote. Look at Ike Andrews's '72 race against Jack Hawk. Ike won by eleven hundred votes. We concentrated our efforts
    on Ike. As a result, that eleven hundred votes came basically from the black community here in Durham. He had solid black
    support. This is one reason, I guess, why Ike now says that Durham has sort of adopted him. When Jack Hawk challenged
    the vote, the only vote that was challenged was the vote in the black precincts in Durham County. Nowhere else. And they
    couldn't overturn it, so Ike went on and won by eleven hundred.
- speaker: Interviewer
  text: In round numbers, what is the black vote in Durham county?
- speaker: Respondent
  text: The black vote could be fourteen to sixteen thousand. I don't say that we turn out that many. It's very obvious that
    we don't turn out that many. We turn out in many instances sixty to sixty-five percent of the vote. In a good year, we
    can turn out eighty-five percent of the vote. But I'd say we average about sixty to sixty-five percent of that vote. And
    when you compare it on the same level as the white vote, then we're far above the average white voter turnout. Percent
    of registered voters.
- speaker: Interviewer
  text: Do you know what percent of eligibles are registered?
- speaker: Respondent
  text: No I don't, not right offhand. I did have those figures somewhere. Right now it's in a state of flux. We've had a
    purging of the books. We're having new registration periods all along the way. It's building back up. It's not what it
    once used to be. This is true among the white and black community.
- speaker: Interviewer
  text: Has there been any active move in the last year to organize any sort of statewide black political organization in
    North Carolina?
- speaker: Respondent
  text: There has been a move afoot to do that, yes. And there will be efforts made in the next year and a half to do that.
    We have been able to get some groups together, but it hasn't been quite as successful as we would like to see it be.
- speaker: Interviewer
  text: Is there any effort to organize an elected black officials' organization?
- speaker: Respondent
  text: No, not yet.
- speaker: Interviewer
  text: Do you see that coming?
- speaker: Respondent
  text: No, I don't. Not right now I don't. Maybe if we had a statewide elected candidate, or statewide elected official,
    it would probably work in that instance. But the only black elected officials we have now, of course, are local black
    elected officials. If we could, for instance, have a Council of State member, I think we could get a viable organization
    going then.
- speaker: Interviewer
  text: Georgia has a very active association of black elected . . .
- speaker: Respondent
  text: Yeah, that's true. That's a part of the national arm too, because there is a national black elected officials' organization.
    It's odd that we don't have one in North Carolina simply because we have the fourth highest number of black elected officials
    in the country. I'm not sure that Mississippi has one, and Mississippi has the second highest number of black elected
    officials in the country. The first highest number in the South.
- speaker: Interviewer
  text: Most of the Mississippi ones are very lower level.
- speaker: Respondent
  text: That's true. I think I'm right on this. Mississippi has more representation in their state legis—they don't have it?
- speaker: Interviewer
  text: They only have one.
- speaker: Respondent
  text: I thought I saw more than that.
- speaker: Interviewer
  text: South Carolina and Alabama this year both went to single member legislative districts and the result was a substantial
    increase in the number of black legislators. From three to thirteen in South Carolina and something like two to fifteen
    in Alabama. Do you see any move afoot to challenge the present apportionment in North Carolina and go to single member
    districts?
- speaker: Respondent
  text: Not yet. We are due for a reapportionment, I think it's '75. I know we're supposed to do the congressional districts
    every ten years, which would make it 1980. I think the last one we had for congressional districts was 1970. But for state
    representation, it's either '75 or '76 when we're due for reapportionment again. I'm not sure
