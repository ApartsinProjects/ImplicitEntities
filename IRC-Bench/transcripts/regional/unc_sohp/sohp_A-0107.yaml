turns:
- speaker: Interviewer
  text: And you think these intimacies between individuals of both races go both ways?
- speaker: Interviewer
  text: You're how old now?
- speaker: Respondent
  text: 52. I've been called worse names by better men.
- speaker: Interviewer
  text: Okay, but in the NAACP you're what?
- speaker: Respondent
  text: I served as president of Mississippi state conference of the NAACP.
- speaker: Interviewer
  text: Since when?
- speaker: Respondent
  text: Since 1960. I serve as president of the local branch of the NAACP since 1952. Served on the national board of directors
    of the NAACP. This is my third three-year term, for nine years. And this year I served as chairman of Willy Stone's southeast
    other fifth region of the NAACP, which includes North Carolina, South Carolina, Georgia, Tennessee, Florida and Alabama.
- speaker: Interviewer
  text: —the Loyalist faction of the Democratic Party in your opinion.
- speaker: Respondent
  text: In the Loyalist faction there are Democrats and there are ex-Democrats.
- speaker: Interviewer
  text: In the Loyalist faction view. In the Democratic Party of Mississippi that is recognized by the Democratic Party of
    the United States, your title is what?
- speaker: Respondent
  text: I serve as chairman of the party and chairman of the executive committee of the party.
- speaker: Interviewer
  text: What is it like in Mississippi now politically compared to what it was like when you got started? Twenty years ago,
    right?
- speaker: Respondent
  text: Well, when you say you got started . . . I really became a member of NAACP as a senior in high school back in '41.
    Graduated in June of '42.
- speaker: Interviewer
  text: You a native of Clarksdale?
- speaker: Respondent
  text: I was born in this county. I was born on Flowers brothers' plantation. My parents moved into the town of Clarksdale
    for better educational opportunities for me and my sister. From the genesis of time that you remember Mississippi has
    grown from an era where whites were automatically superior to an era where superiority is not necessarily reflected in
    whiteness. Of course, being white does give one a head start. But there are several blacks who outrank whites in various
    areas of relationship. And I think in terms of change from then to now, I think the biggest change is in attitudinal relations.
    You were over at Charlie Sullivan's before you came here. Charlie picked up the phone and said, "Aaron, this is Charlie.
    Tell a friend of ours how to get to your house." Well now, Charlie Sullivan is a former lieutenant governor of this state,
    former district attorney from this area. There was a time, say ten years ago or more, when he would say "Aaron, this is
    Mr. Charlie." But it's . . . no . . . as I say, the way one responds to the other today as compared to then is grossly
    different.
- speaker: Interviewer
  text: And you told me earlier that there was a time when he prosecuted you—
- speaker: Respondent
  text: Oh sure, Charlie put me in jail. Like everybody else. He was district attorney. That was his job. I was violating
    laws that I didn't feel were just laws. And in that context, the discipline of the movement demands that you be willing
    to pay the cost for violating laws, you know, that you don't feel are just. So I don't believe one without penalty can
    afford to obey only those laws that he believes in. But if he's willing to pay the penalty for the laws he violates, you
    know, I think that that compensates for a conscious difference between the two.
- speaker: Interviewer
  text: What were the type of laws involved in those cases?
- speaker: Respondent
  text: Well, I was advocating to people, particularly black people, not to patronize certain stores in the community because
    they didn't hire blacks. You were guilty of parading without a permit as they called it at that time. Which meant that
    you had invoked what is a traditional First Amendment right of carrying a picket sign in front of a business and in front
    of an individual. Frankly, we picketed Charlie Sullivan himself, as district attorney for this county. Because of the
    fact that he was instrumental in getting affidavits against us who were involved in the picketing. This was the kind of
    stuff, largely, that I was involved on the opposite side from Charlie.
- speaker: Interviewer
  text: How did you feel toward him then?
- speaker: Respondent
  text: Oh, well, I just said Charlie was a lawman, you know. That the fracas between blacks and whites at that time was underscored
    that whites are in the master role, blacks are in the servant role. And consequently the master-servant role prevailed.
    You know, I've had to deal with Charlie on the question of involvement in the Democratic Party and trying to be sure that
    rules and regulations that were set up by in the Democratic Party then would no longer be in vogue. We had a series of
    deposition sessions where our lawyers were present and his lawyer and him were present and consequently there was this
    kind of. Really, my attitude about Charlie and many other whites who I feel have turned a corner . . . I don't think that
    I've changed. I think that they've changed their way of action that accommodates my position. Regardless of how bad they've
    been, when they convince me or some of the others of us, that they are no longer a part of what they used to be, then
    I'm for forgiving what their past has been. Because, you see, if blacks continue to hold against whites all of the charges
    that they are guilty of in terms of their negation of the black community . . . if we continue to hold that as an issue
    of hatred, an issue of confrontation, then we're never going to get over this situation of racial injustice and racial
    bigotry. So if ten years ago you had come here, you would have found a couple people outside with shotguns and maybe one
    man inside. You know, the house had been bombed and all. Knocked the store down a couple times. And of course we responded
    to the cruels in these areas. But I would say within the last four or five years there has been, in my mind, no real concern
    about being dealt with physically in a way that would deprive me of life or limb.
- speaker: Interviewer
  text: How much fear did you feel, say ten years ago?
- speaker: Respondent
  text: Well, you know, I don't really know. I just know this, that it's not whether or not you're afraid, but it's what do
    you do when you are afraid. Now my activity ten years ago is the same as it is now. Continuing to try to convince as many
    members of the total community as I could that there was a situation of a one-way structure where all men were men, where
    nobody was inferior to another. This is pretty much the line that I learned from the NAACP when I first became involved
    in it, which was further structured by my years of identity, close association with Martin Luther King, Malcolm X, those
    kind of activity. I've never known a time when I didn't feel as I do now. That in the question of violence I was certainly
    much more concerned about if it affected my family, my children, my wife, myself. Then the guards that we had. As soon
    as my wife got to the point where she felt comfortable with them not being here, then I was very happy to say, "We don't
    need you anymore." Because I would just like to not have to have somebody with me everywhere I go. Now I still maintain
    one bit of caution, I guess you would call it domestic caution. Because my wife insists that I don't travel by myself,
    you know, around in the car. She'd rather have somebody there tell a story. So just to be sure her mental attitude is
    not all stirred up about me driving by myself, I capitulated to that. I don't drive alone. But other than that I don't
    have any . . .
- speaker: Interviewer
  text: You said you've always felt the same way you feel now.
- speaker: Interviewer
  text: How is that? What is that?
- speaker: Respondent
  text: Well, that mankind is placed on this earth by a deity that we all are bound to respect. And that although we find
    ourselves to be the grandsons of former slaves and the grandsons of former slave owners, but neither of us had, really,
    anything to do with that period of our nation's history. And it is our responsibility, because those scars still remain,
    to bind up the wounds of that era. And that's what I think I'm about every day and that's what I'd like to see everybody
    about everyday, to help erase the years of dehumanization that has taken place in America for some time. But you see,
    where some of us get lost in chronology . . . many of us think that segregation has been with us for a long, long time.
    Well, Mississippi didn't have segregation until 1890. From 1865 to 1876 was the freest period which blacks have ever witnessed
    in America and particularly in Mississippi. It was after the Tilden-Hayes compromise, the presidential race of 1876 where
    Rutherford Hayes told the southerners that, "If you'll make me president, I'll remove the troops from the South and turn
    the blacks back over into the hands of the white landowners." Now between 1865 and 1876 Mississippi sent two blacks to
    the Senate of the United States—Bruce and Revels. The fact that the constitutional convention in Mississippi did not meet
    until 1890 and it was in 1890 that the Jim Crow laws were written into our structure. From 1865 until 1890—you had black
    and white kids going to school together, you had no segregation. Because the Thirteen, Fourteenth, and Fifteenth Amendments
    had just passed and all of these were about black rights in the black community. And it was really 1890 when we finally
    got around to making segregation legal. It was really 1896 before the Supreme Court took a position on separate and equal.
    That was in the case that grew out of Louisiana in regard to a dining room car on a train where a black refused to sit
    behind a curtain. And this case came before the United States Supreme Court and it there ruled that separate but equal
    was legal. And from 1896 until 1954 we lived with that doctrine in this country.
- speaker: Interviewer
  text: With that historical perspective, how do you compare the administration of Richard Nixon . . . how do you compare
    it in contrast to this Tilden-Hayes decision?
- speaker: Respondent
  text: Well, to me it's quite an analogy. I think Mr. Nixon became president by playing to the base, biased prejudice of
    white America. You see, of the votes that Richard Nixon got for president, sixty-five percent of those votes. . . well,
    sixty-five percent of the vote in the country went to Richard Nixon. Of the other thirty-five percent that was left, twenty-five
    percent of that that went to George McGovern was black. George McGovern got less than ten percent of the white vote in
    this country. So, you see, every time Nixon used the word busing, that was nothing but a code word for nigger. Every time
    he used welfarism, permissiveness. You see, it gave Americans who felt chagrined to say that they were for segregation
    of the races, segregation forever, and all that bull . . . but when he gave them a convenient umbrella under which to
    stand and say, "I'm against busing," well, what they're really saying . . . it ain't the bus, it's who's on the damn bus.
    It's us. That's, you know, that's the question about busing. And if they were busing nothing but white kids, there'd be
    no problem. See, busing has been used as a tool for getting children to school as long as the public school system has
    been a part of America. But as long as they were using busing to maintain segregation, there was nothing wrong with busing.
    And now that we're using busing to effect integration, then the president and everybody—not everybody—the president and
    several other people get the impression that busing is so wrong. It's really an issue that is attempting to return America
    to the days when segregation, when racial segregation had a legal foundation in this country. If we return to the neighborhood
    school idea with housing as segregated as it is, with many of the larger cities where whites have moved to the suburbs,
    et cetera . . . if there is not the tool of busing, black children and white children again are going to be separated.
    You don't learn from books. You don't learn from movies. You don't learn from osmosis that other people are just like
    you. Except you have the opportunity of dealing man-to-man or person-to-person with them meeting. White boys get the idea
    that they're better than black boys because they are separated from black boys. And they don't have any way of comparing
    their ability with black children. And of course black children begin to feel that they are less than white children because
    they have no positive way of identifying their abilities with white children. And the textbook structure of this nation
    so ignores the black contributions that it helped make America the kind of country that it is today. That the textbooks
    expose the virtues of the whites and either plays down or absents the activities of blacks. So consequently, without models,
    without heros, without persons of black stature for black kids to look up to, they are going to be brainwashed by the
    textbooks of this country that only white men have been involved in building America the way it is today. It's subtle.
    But if you look at the elementary books of your and my time where Dick and Jane was always white, you know. There was
    no blacks involved in any of the primary books that were around when you were in grammar school or when I was in grammar
    school. The nearest thing you had to it was little black Sambo. And of course black Sambo was always a buffoon. He was
    a very unsavory character. And as long as these are the kind of models we are going to give children to emulate, you're
    bound to get a master-servant philosophy, you're bound to justify Gunnar Myrdal's position in when he says that when you
    separate children from others because of their race, that you commit an act that is calculated to warp their minds in
    a manner never likely to be undone. And the warping of the mind suggests to the white child that he's better than the
    black child, suggests to the black child that he's less than the white child. And consequently this master-servant thing
    prevails.
- speaker: Interviewer
  text: How do you characterize race relations in Mississippi today?
- speaker: Respondent
  text: Well, I characterize them as being better than they were twenty ye
