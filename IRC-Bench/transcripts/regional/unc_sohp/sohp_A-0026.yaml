turns:
- speaker: Interviewer
  text: Let me start by asking you this. Commentators and editorial writers within a few months will probably be writing about
    your administration, the past four years. What are they going to be saying about it?
- speaker: Respondent
  text: I think they're going to be saying . . . you know it's very difficult for me to answer that without answering what
    I hope they'll be saying, the things that I—
- speaker: Interviewer
  text: Was going to ask you that next.
- speaker: Respondent
  text: Yeah. The things that I consider to be relevant. And I can tell you what the more astute observers, who have really
    been on the scene while it was all taking place, are going to be writing. I think they're going to be, first of all, saying
    that I surrounded myself with some very capable, dedicated people. You know, the success of any administration depends
    on both the intelligence, the dedication, and the integrity of the people you surround yourself with. Every administration
    that winds up getting in trouble, you find that the man who's been doing the personnel selection has, shall I say, been
    a poor judge of character. Or, on the other hand, they have picked people that they thought would not overshadow them
    or people that they thought would never constitute a political threat to them. I've done my best, even with our limited
    salaries, to pick the people I thought who could do the job and would do the job. Now that is sort of subjective analysis
    of the administration. To get down to the point, what you're asking me is what part of my administration do I think future
    generations will appreciate most. I think, obviously, one is going to be the tax reform package we put through in 1971
    which gives the state an opportunity to wax and wane with the economy. I've been very fortunate because the economy's
    been waxing since I've been governor. I don't take any credit for that. But it has and therefore the coffers of the state
    have waxed with it. We've been able to do so many things that I'm sure predecessors have wanted to do but simply didn't
    have the money to do. And secondly, that ties in with the reorganization that we made and did in fact accomplish. The
    reorganization of state government because two things happened. One, a reorganization in and by itself would have been
    a very significant accomplishment simply because from an administrative standpoint, when I came in, the governor had 165
    department heads reporting to him. He couldn't possibly stay on top of a situation operating the government with that
    many people reporting to him. So what we did, we took 65 of the major departments, the big ones, and consolidated them
    into 13 departments. So I now have 13 people reporting to me. And of course this has given us an opportunity to implement
    personnel policies and other broad policies in cabinet meetings and implement those policies. Secondly, it has given the
    governor the opportunity to keep his mandate with the people because in the past the governor would go out and tell the
    people in the state what he believed, what his philosophy was and the specific things he wanted to accomplish, only to
    arrive at the capital and find that these 165 people had their own ideas about what the state was doing and how it was
    going to be operated and what we were going to do. And in many of those instances you had virtually autonomous boards
    and commissions for each one of those departments. And these department heads and those boards and commissions which had
    this autonomy, they were making policy decisions and it may or may not, it would be a pure coincidence if it tied in with
    what you'd been saying and what you wanted the policy of the state to be. So when you have thirteen men around a table
    who are responsible for about 90% of the functions of the state and you say this is going to be the policy and you have
    the right to hire and fire those people, they're going to be responsive. And that's the way it ought to be. They're part
    of the executive branch. They should be responsive to the governor because the governor is the guy who made the commitment
    and went out and got himself elected. And then finally . . . you can say to these people . . . you have the fiscal responsibility.
    Of course now when I talk about policy I'm sort of separating fiscal policy from say other policy of all kinds. But so
    far as fiscal policy is concerned, the governor is the one who has to sit there and either veto or sign bills on the basis
    of how much money we're going to have to spend. And so I sit down and go through all these thirteen department budgets
    and I cut where I think the priorities ought to be. So that there's enough money, for example, for the medical center.
    And maybe some other program over here has two or three exotic programs in it that we can do without because it's not
    as important, for example, as health care. And you know when it comes to making the money fit in the pie, that's the governor's
    responsibility. And reorganization has, for the first time, given the governor the opportunity to see that overview so
    that he knows before the legislature comes in what those budgets are, what he will accept, and what he cannot accept.
    So those are the things, the reorganization of state government coupled with the tax reform programs. See, we put a fairly
    stiff progressive income tax into effect. And the upper income levels now pay a significantly bigger share of income tax
    in this state than they used to. We took away some privileges the utilities had. Tax exemptions, which they never had
    any right to except they just happened to have the political clout back in 1949 to get it. And it took just about all
    the power of my office to get those things repealed because they were out there fighting, scrapping, to keep them. But
    those two things, plus I think the significant accomplishments we have begun to make in the fields of prison reform and
    health care . . . to me those are the really outstanding things of this admin—
- speaker: Interviewer
  text: What about your impact in the Democratic Party?
- speaker: Respondent
  text: You're going into politics now.
- speaker: Interviewer
  text: I'm just trying to get an assessment, looking back.
- speaker: Respondent
  text: I don't know how to evaluate that and I don't know what impact I have had on the Democratic Party. I do believe this.
    I believe there have been many . . . I think there are probably more myths that surround the profession of politics by
    far than any other profession. Since I've been in office I have heard and I've watched the commentators wax eloquently
    about all kinds of things and party politics and about politicians that are pure myths.
- speaker: Respondent
  text: Well, for example . . . let's take the election I just completed. I was interested for example in saying Senator Fulbright
    has all the money tied up. That if the governor decides to run for the Senate, he'll find raising money very difficult
    because, you know, all the big money in the state's tied up. That's a myth. Nobody ever ties up all the money. Another
    myth is, you know, that you have to have this name and face recognition, that you'd have to run once to learn how. And
    secondly, this business about organization in politics. I remember hearing that. All the commentators said, well, if the
    governor decides to run for the Senate he'd be way behind organizationally. And they write for weeks on end about this
    very sophisticated organization Senator Fulbright had. He didn't have any organization. Just one of those myths that float
    around. For that matter, one of the—well, I don't want to get into this. But there're a lot more. The truth of the matter
    is, there are so many commentators writing about what's on people's minds and they miss the mark by such a wide margin
    that . . . those are the things I consider myths. For example . . .
- speaker: Interviewer
  text: You think you shattered some of those myths?
- speaker: Respondent
  text: I hope so. I like to think I have. I think that the more of those myths that are shattered . . . it seems to me though
    . . . the funniest thing is, they continue to crop up. In 1976 and 1978 you're going to hear all these same things said
    again because it's just been done for so many years. But for example, some people said well, the governor's too liberal
    for the people of Arkansas. This doesn't mean anything, the people of this state. You can say I'm too conservative or
    I'm too liberal or I'm indecisive or you can make all those subjective judgments which are made by people who, incidentally,
    indulge themselves in the luxury of an attitude of moral and intellectual superiority. The truth of the matter is, the
    people will base their judgments on specific acts of specific conduct while you're in office. They aren't looking at you,
    and they're not going to base their judgment of you, based on whether they think you're too liberal or too conservative
    or moderate or anything else. They're going to judge you based on your day-to-day activities. And at election time they're
    not going to go back and say I'm against him because of this or I'm for him because of this. It's the overall picture.
    And this is the reason politicians should always, in each individual case, do what he thinks is right. Even though it
    may be intensely unpopular and particularly unpopular with some very vocal minority group or some very vocal vested interest
    group. Because if he's concerned about being elected next time he'll be admired and respected more because he did what
    he thought was right than he would by succumbing to small pressures. Those are some of the myths. This last one in particular,
    I think is important, because in southern politics right now there probably isn't 5% difference in the thinking of the
    people of this state and the thinking of the people in any state in the nation. I think probably Frank Sargent, the governor
    of Massachusetts, could come to Arkansas and be elected essentially on what he has tried to do in Massachusetts. And I
    think I could go to Massachusetts and be elected on the same things I talked about and did in Arkansas.
- speaker: Interviewer
  text: So the voters in Arkansas aren't that different from other voters in the South?
- speaker: Respondent
  text: They're not. There are some things that . . . well, you've seen . . . busing for example. You've seen a lot of the
    people in the North who had no feelings one way or the other about busing, right. It was unique in the South simply because
    the Supreme Court had made a distinction between those states that had had segregation in the past and those that had
    not. And for a while the South bore the brunt of that and everything was lovely in the rest of the country. But the minute
    the courts began to extend their orders to Michigan, for example, you heard that same hue and cry that you heard in the
    South. The point I'm trying to make is people are very much the same all over the nation.
- speaker: Interviewer
  text: Is another one of the myths that, if you have the backing of the county courthouse and the so-called organization
    Democrats, that you automatically win in the primary?
- speaker: Respondent
  text: There was a time, not very long ago, during the days of the poll tax, when that was not a myth. That was fact. If
    you had the backing of the courthouse crew back during the old poll tax days, you know, you were a serious candidate.
- speaker: Interviewer
  text: But in neither of the campaigns, the three you've been in—
- speaker: Respondent
  text: No. No, as you've said, I've never had any significant backing. As a matter of fact, in 1970, I had little or no backing.
- speaker: Interviewer
  text: Didn't you prove in 1970 and 1974 that you could take the nomination away and quote that group?
- speaker: Interviewer
  text: So you shattered that myth.
- speaker: Respondent
  text: Absolutely. Absolutely. But in all fairness I think it should be known that I did have . . . the county judges who
    have been considered usually the most powerful influence in the county courthouses in Arkansas. I'd have to . . . in all
    fairness I had probably ten to fifteen of the seventy-five county judges in my corner. But I had . . . this was an interesting
    thing. Probably the most controversial, certainly one of the most controversial things that came up in 1973 in the legislature
    was a bill which the municipal league and the organization of Arkansas counties had fought for a year to get. And it would
    have allocated 7% of all money that came into the state treasury to the counties and cities. I told them, when I realized
    that that thing had begun to move, you know, more dramatically than I thought it would, and I realized that it was probably
    going to pass. I injected it in my inaugural address just thirty minutes before I delivered that address. And I just said,
    you know, we're not going to do this. We're not going to destroy the fiscal integrity of this state with such a bill.
    Allocating money out on a percentage basis. So we had quite a fight. And they passed it by a landslide. And I vetoed it
    and they were never able to override that veto even though it requires a simple majority to override a veto in Arkansas.
    None of that two-thirds stuff. You veto a bill and it just takes that same majority to override that it took to pass them.
    But the point I'm saying is I incurred the animosity of an awful lot of so-called powerful influences in this state, namely
    the county judges and the mayors. You'd be amazed how many of the county judges and mayors understood, even though they
    wanted it, they understood the veto and were still back my friends at election time. But you're right. One of the myths
    about the county courthouse has been shattered.
- speaker: Interviewer
  text: Was the reason the poll tax, when it was in effect, made a difference because of the electorate or because of the
    purchase of the poll tax in controlling the vote?
- speaker: Interviewer
  text: It was the latter?
- speaker: Respondent
  text: No, it was the purchase of poll taxes by some of the landed gentry in certain areas, you know, would go out and buy
    two or three thousand poll taxes receipts. Almost in blank. Fill the names in later. And they did constitute a big bloc
    of votes in this state.
- speaker: Interviewer
  text: We've asked a lot of people about your strengths and weaknesses. In fact, we don't find too many weaknesses. The only
    one, the one you said, that you're indecisive.
- speaker: Interviewer
  text: Then we try and probe. What's the basis of his indecisiveness? Is it because he's thinking through a decision or what
    is it? Maybe you—
- speaker: Respondent
  text: Two things. One is I have a long-standing policy of not commi
