collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: But the lieutenant governor really gets no salary.
- speaker: Respondent
  text: No, no salary. It's not intended to be a full-time job. It's a legislative position.
- speaker: Interviewer
  text: He has no executive branch responsibility?
- speaker: Interviewer
  text: Just a presiding officer.
- speaker: Respondent
  text: That's one of the problems, and one of the reasons he was unsuccessful in getting his full-time resolution through
    the legislature. Because he wanted to continue to be the presiding officer in the senate, continue to name the committees
    in the senate and the committee chairmen in the senate—that's the power of the lieutenant governor—plus having the gavel,
    plus also being a full-time executive branch member. The number two man in the executive. And that's, you know, the conflict.
    The fellow who names the committees and who wields the gavel, who recognizes the people seeking recognition and who routes
    the bills to various committees. As in every legislature, we have graveyard committees and favored committees. And there
    was one bill, Commerce and Transportation, that got I would say over 50% of the hotly contested bills, last year. Before
    this last session, it was a nothing committee. But it just happened to be one that was completely dominated by state senators
    who were loyal to Beasley.
- speaker: Interviewer
  text: His authority to appoint committees, is that by tradition or is it statutory or is it in the constitution?
- speaker: Respondent
  text: It's either statutory or in the rules of the senate. It might be in the rules of the senate that the committees are
    appointed by the presiding officer... by the lieutenant governor and by the chairman designate. Now they have threatened...
    and there's been some talk if a Republican were elected to lieutenant governor... that the senators would then change
    the rules and would come up with a committee on committees and also designate the chairmen of various committees themselves.
    Now... but that's never been done.
- speaker: Interviewer
  text: But by tradition—
- speaker: Respondent
  text: By tradition, certainly, the lieutenant governor has always named the committees, usually in consulting with the governor.
- speaker: Interviewer
  text: Doesn't the governor usually pick the people?
- speaker: Interviewer
  text: On the key committees.
- speaker: Respondent
  text: On the key committees. See, this is what happened. The governor had picked most of the people on the key committees
    in the senate. But then when Beasley split a little bit from the governor, he had one committee completely dominated by
    his own people, Commerce and Transportation. So that became Foushee, state senator who is chairman of that committee...
    his alter ego for Beasley. And so that suddenly became the hot committee. That's the one where—
- speaker: Interviewer
  text: Can a senator protest the assignment of a bill?
- speaker: Respondent
  text: Yes! But they don't do it.
- speaker: Interviewer
  text: They don't do it.
- speaker: Respondent
  text: They kowtow to him. The saddest—
- speaker: Interviewer
  text: But you can overturn that, can't you? The assignment of a bill?
- speaker: Respondent
  text: Yes, and they have done once or twice. But generally, with a few exceptions, Richard Dominick... I don't know whether
    you've talked with him. He was an unsuccessful candidate for lieutenant governor. But if you're in Birmingham and have
    some time, even by telephone, I think you'd find it profitable. He has been the chief spokesman for reform in the state
    senate now for eight years or longer. He did not seek reelection. Ran for lieutenant governor. Unfortunately, he doesn't
    come across well to the electorate. Very, very well qualified. Has the endorsement, I would say, of 80% of the newspapers
    in the state. Most of them. Well, he had the endorsement of two Birmingham papers, the local paper here—two papers here
    locally—I think he had the Montgomery papers. One of the Huntsville papers. Still only got 20% of the vote. He was eminently
    qualified, but he just couldn't relate to the average man in the street and he was also underfinanced.
- speaker: Interviewer
  text: Where does Senator Pelham fit in?
- speaker: Respondent
  text: Pelham is a brilliant intellectual, in a way. He's from a family... old line Washington County family. This is the
    Piney Woods section... north of Mobile County. As you came down from Tuscaloosa, if you remember crossing the Tombigbee
    River? You went through from Jackson... the Tombigbee River on the south until you got to the four-lane highway. Most
    of that area was Washington County. It's very poor land. You've got a few large family estates, but mostly it's people
    struggling. The Piney Woods section. That's where he's from. His father is an old line circuit judge up there from sort
    of family in that area. Judge Pelham, Joe Pelham was a big political power. The way he went, Washington County usually
    went. For years, back in the '30s and '40s. Pierre went off to Harvard where he was a graduate or maybe graduate at Harvard.
    Came back here to practice law. Been immediately tied in with Wallace. He was Wallace's floor leader at the Democratic
    convention when Hubert Humphrey was nominated for vice president and Lyndon Johnson was nominated for his full term, in
    Atlantic City. When was that?
- speaker: Respondent
  text: '''64. And Pelham was on the platform committee and the spokesman for Wallace at that convention. He ran for the state
    senate. In fact I ran against him as a Republican, first time. We had been with the same law firm. When I came to Mobile
    he had already left the law firm I came with. No, in ''64 was when I ran against him for the state senate. Think it was
    in ''62, the Atlantic City convention. Anyway, he was elected to the state senate in... ''66. You''re right. ''64 was
    the Atlantic City. ''66 he ran for the state senate. Was elected. And for eight years he was up there. Probably the outstanding
    orator in the senate. Brilliant man, but erratic. He jumps from one thing to another. He''s got a lot of populist in him.
    And yet he''s also conservative and very much of a ham. If you hear him talk... well, people would pack the galleries
    during one of his filibusters. He was a great person to block legislation. But he really got out of his element this last
    term when he accepted the position as president pro temp of the senate and Wallace''s floor leader. That gave him the
    responsibility of pushing bills through. And he found that just contrary to his style. He couldn''t whip up enthusiasm
    for the passage of something. He could singlehandedly block a bill or obstruct something. Brilliant when it came to that.
    Or a rousing public sentiment against it. But he''s abrasive. He can describe a person beautifully. For example, Mobile
    has a Mardi Gras tradition. Mobile is a very old community. Very much establishment minded. We change very slowly down
    here. A group of us, two years ago, tried to change the form of city government. We have a troika system, a three-man
    city commission. And generally it''s been unsuccessful. You''ve got three people constantly vying with the other two for
    the roles of leadership. No one person responsible. A group of us, mostly young people... most of them Democrats, but
    a few Republicans like myself... were active in it. And we had things... we felt like we were going to make a change until
    the establishment, at the last minute, really put the money in an effort to defeat it. And did, overwhelmingly. Just say
    this about Pelham. One of the people who fought against that change, Max Rogers, who is president of American National
    Bank here. A young fellow who had been in the legislature. I say young, about 40, 42. Was making a speech attacking, rebutting
    Pelham''s accusation that Mobile wasn''t going anywhere, that we were sitting on our duff not doing anything and the rest
    of the South was passing us by. We needed some new leadership. So Max just made a polite rejoinder, very genteel way.
    Graduate of Williams College in the east. And Pierre came up... asked him, what about the facts and figures that Max Rogers
    cited, newspaper reporter asked Pelham. And he made one comment. He said, "Well, Max Rogers wouldn''t recognize progress
    if it picked him up by the ears." He''s got big ears, like me. "And Max Rogers measures progress by the size of Mardi
    Gras floats." He completely devastated Rogers'' entire position, you see, just with two clever statements. People still
    laugh. That was eight or nine months ago. Pelham has the way of striking at a person''s vulnerable point. What normally
    people wouldn''t do. You know, that''s hitting below the belt. Something like that. Referring to a person''s big ears.
    But he''s successful in it and has done phenomenally well. He''s lost interest, though, in the legislature. He has wanted
    to go to Congress, but Jack Edwards blocks him there. Very popular congressman who is a solid follower with just about
    every... with the rank-and-file votes. And so Pelham''s never run against Edwards. He came within an ace of beating Frank
    Boykin before Edwards was elected in ''64. Pelham had run against Boykin in the primary, in ''62 I think. Came very close
    to beating him. But that''s a question as to what he''s going to do.'
- speaker: Interviewer
  text: Does he have any statewide interests?
- speaker: Respondent
  text: I don't think so. He's had some problems lately. Some financial problems. Sort of tied in with some subdivision deals
    here and there. He, I think, is probably jockeying more on the national scene as a possible liaison man between the Wallace
    group and Kennedy. That's what he'd like to do. He was at Harvard this past year teaching.
- speaker: Interviewer
  text: Was he at the Kennedy Institute?
- speaker: Respondent
  text: Yes, at the Kennedy Institute last fall and early part of the winter. And thoroughly enjoyed that. I think made quite
    a few waves up there. Those people are not accustomed to his style of debating, I think. There was a story in the local
    paper and Pierre was telling me a little bit about it last spring. He debated one of the McGovern leaders who also was
    at the Kennedy Institute or maybe on the faculty full time. And they were discussing McGovern vs. Wallace relative to
    the '72 election. And again, Pelham used his regular style and completely devastated the fellow.
- speaker: Interviewer
  text: Where is he vis-a-vis Beasley?
- speaker: Respondent
  text: He was opposed to Beasley and then Beasley got an endorsement out of him this last time. So it's... Pierre's erratic.
    He jumps back and forth.
- speaker: Interviewer
  text: On that Kennedy Institute, before we get through with this tape remind us to talk about that again. It was a fellow
    there, '69. And they're always looking for good Republicans to come up there for three months or six months or a year
    or whatever. If you're interested in that sort of thing, the procedure is that the former fellows—
- speaker: Interviewer
  text: What is your own background? Are you a native of Mobile?
- speaker: Respondent
  text: No, I was born in Monroeville. Did you ever read? That was my hometown. It's about ninety miles north of Mobile between
    here and Montgomery. It's a small county seat town. I lived there. Born and raised there. Then I went to Alabama for undergraduate
    and law school. University of Alabama at Tuscaloosa. Then I went with the attorney general's office for a year. With MacDonald
    who was then attorney general for the state. That was in '60. Came down here in '61 with a law firm. Then was elected
    to the... was not active in politics at all until '66 when I ran against Pierre Pelham as the Republican nominee. Pierre
    was... one of these wild sort of things. Republicans thought after '64 we could pretty well elect people without any difficulty,
    that this had become a Republican area. Of course, we immediately became aware of the fact that '64 was a one-time shot
    and no Republicans were elected in '66 other than Jack Edwards as congressman, who had entrenched himself in two years
    time and was reelected. But Pierre and I had a good race. I raised one or two issues that got my name known. The control
    board here is a problem. State milk pricing. Big racket in Alabama. And our race was closer than any of the other twelve
    legislative races. Then I became active in the Republican Party after that time. Was elected to the county committee.
    In 1968 I served as chairman of the state Republican convention. Then in '69 there was a special election which was ideally
    suited for a Republican winning countywide office. We had two vacancies. One member of the house was named to county commission
    and another to the judgeship. And I ran for one of the two vacant spots and was elected, overwhelmingly. I was fortunate
    in running against me. One had been a Wallaceite and a black. And I got about 53% of the vote. We had a very large turnout
    for a special election. Was reelected in '70 for a full term. One other Republican was elected in '70. At the time of
    the special election I was the only Republican in the state legislature. In '70 we—
- speaker: Respondent
  text: The first one from here, in south Alabama, since Reconstruction. We had had a Republican senator elected in '66 from
    Birmingham, but he changed after... after one session he changed, not his registration, but reidentified as a Democrat.
    So when I went to the legislature, by then it had reverted back. Traditionally there had always been one Republican in
    the legislature from Winston County, a north hill county up in... north of Birmingham, which had threatened or attempted
    to secede from Alabama during the War Between the States. And then in '72 I ran for U.S. Senate for the Republican nomination.
    We had a big interparty fight. The young Republicans... some of the leadership... a lot of the leadership were unhappy
    with Red Blount and Jim Martin and felt that neither one could win against John Sparkman. We were uncertain that Blount
    would come back and run. We knew he wanted to.
