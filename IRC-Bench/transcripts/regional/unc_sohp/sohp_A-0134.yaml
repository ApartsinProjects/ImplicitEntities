source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: I've been active in North Carolina politics I think since I was about sixteen or seventeen, in high school. And shortly
    after high school. I've just been involved in politics . . . I was in the NAACP when I was twelve.
- speaker: Interviewer
  text: You graduated from high school when?
- speaker: Respondent
  text: In 1939, in Asheville, North Carolina. And from that time on, I was in politics in Asheville, North Carolina, and
    wherever I went. I went to school in Atlanta, Morehouse College, and I was in politics there and I was in the Progressive
    Party, the Wallace party and I worked actively there, and I think probably the first real politicalization came when the
    city council of Asheville, North Carolina, refused to permit Paul Robeson to speak at the city auditorium, and this small
    delegation of an integrated group went to the meeting of the city council in Asheville to ask them to change the policy
    to permit Paul Robeson to speak. And I ended up that . . . I just went there as one of the group, but I ended up being
    the spokesman, practically the spokesman, for the group.
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: Oh, check your records . . . this is the same thing I was telling you earlier . . . check your records during the
    Progressive campaign at that time . . .
- speaker: Interviewer
  text: This was during the Wallace campaign?
- speaker: Respondent
  text: Henry Wallace.
- speaker: Interviewer
  text: Henry Wallace, yeah.
- speaker: Respondent
  text: Yes, be sure, this is Wallace in this campaign. So, at any rate, I was active up to that time in voter registration
    drives and working with the Progressive Party and I was president of the Atlanta University chapter. Atlanta University,
    of course, includes Morehouse, Spelman, and Morris Brown at that time. Now it includes Clark University in Atlanta. And
    I ended up being elected president of that group of Wallace for President people, where you had all five universities,
    well, actually, the three major universities and two other schools, including the Atlanta School of Social Work and the
    Atlanta School of Mortuary Science at that time. Anyway, I ended up having the presidency at that time in Atlanta. We
    had voter registration drives and there was another fellow by the name of Don West from Oglethorpe University who was
    quite active in the movement and basically the politics was to bring out a great number of blacks that could be calculated
    to influence the Progressive Party at that time. Certainly young people, and that was the movement that I was in at that
    day. I think we had the first integrated party . . . to raise funds, we had the first integrated party at the old Morehouse
    College gym and it was predicted that hell was going to break loose because of it, because of this integrated party in
    those days. This was in the '39, '40, and '41 school years. During that period of time. Some of these specific dates could
    be run down.
- speaker: Interviewer
  text: Were you the first black student at the University of North Carolina law school?
- speaker: Interviewer
  text: And you brought suit to gain admittance, right?
- speaker: Interviewer
  text: And this was what? You entered in . . . ?
- speaker: Respondent
  text: I entered in 1951.
- speaker: Interviewer
  text: You mentioned Frank Porter Graham's campaign for the Senate and you had a role in that. How would you describe that
    campaign?
- speaker: Respondent
  text: Well, I think that Frank Porter Graham had a massive appeal as an educator. He was a very progressive man. At that
    time, it was . . . how you used terms and labels was much different from now. A great effort in the campaign was not to
    bill him as a liberal. It would have been better, and I think possibly because he was a natural, very warm human who held
    compassion for people, enabled the strict conservative forces to organize against him. You remember he was defeated in
    the runoff, he won in the first election. And at that time, it was . . . the primary, he won the primary and then the
    runoff election, he was defeated because they had then decided to really launch into an attack upon him because of the
    strong black support that he had. That fact was used against him. And they organized along racial lines. That campaign
    was done that way. Bad literature went out making him to be everything that he wasn't. At that time, to associate with
    blacks openly in this part of the country . . . a certain amount of association was permissible, but then some other forms
    were not. And it was a very bad campaign, bad in the sense that he lost, but it was bad for the state because I think
    that he would have played a hell of a force in moving the South and the nation forward.
- speaker: Interviewer
  text: 'You mentioned Key''s book. Key refers to North Carolina as a progressive tradition, being open in ideas and advanced
    from the rest of the South in attitudes toward blacks and generally just being far more progressive. Now, since Key''s
    book, you not only had Graham''s defeat, you had the defeat of the two North Carolina congressmen who refused to sign
    the Southern Manifesto in 1956, you had the victory last year of George Wallace in the presidential primary over Terry
    Sanford and you had the victory of Jesse Helms for the U.S. Senate. My question is this: was Key right and if he was right,
    has there been change since in so far as there is a progressive attitude in North Carolina?'
- speaker: Respondent
  text: Well, I think that Key was correct. I think that there have been some changes and the changes on the national level
    also affect your statewide changes. You could also add to the defeat of Galifianakis by Jesse Helms to the list of changes
    and attitudes, but then one must look to the adequacy of a campaign, how it was financed, the organizers, the sentiment
    of the people, the times. Then, you've got to look at the backdrop of the civil rights movement and its major effect upon
    the United States was a very positive one, but the nation moves into fads and it was "do good to the black people" during
    the '60s, '61 and '62, and then it fades. And then the riots came about and then you had that reverse trend. The urban
    riots created a "this is as far as we are going" attitude and "we will stop here." And that was in all of the major cities
    and then that attitude, the rebellions and the riots came to smaller communities and southern communities after it had
    left the big urban society. Which means that you've got a delay in a period of time and I think that all of these and
    the war, the Vietnam crisis at that time, all of these have an effect or influence candidates to posture their positions
    on the attitudes and sentiments of the people. On the other hand, you could point to say, the recent election of Jim Holshouser,
    who was a liberal Republican as opposed to a very conservative Republican. And you can contrast the difference between
    a Holshouser and a Jesse Helms. I think that you could find more individual patterns like that. I think that North Carolina
    is a state of constraint. It never had people to stand in the school doors and say, "Thou shalt not pass," for example.
    I think that it's always been an attitude to move forward. Not only was I the first black to attend the University of
    North Carolina, I turned around and sued to open up the undergraduate school of the University of North Carolina and you
    were able to reach a compromise . . . I broke down segregation in the mental hospitals in North Carolina, too . . . and
    there's been an attitude of, "Well, I'm willing to do it, but go ahead and sue me so I can do it." It's been that kind
    of an attitude. "The public makes me do it." In other words, "I'm safe in doing it when I'm forced. If I do it beforehand,
    I'm classified as a liberal, and I can't."
- speaker: Interviewer
  text: . . . 1948 to 1973 in terms of the civil rights movement in North Carolina. If you were to think of gains made in
    that time, there may be lots of moving forward and backwards, but does it separate into periods? Or is it pretty much
    a steady progression? Is there anyway to look at that twenty-five year period?
- speaker: Interviewer
  text: And is North Carolina just part of the overall South?
- speaker: Respondent
  text: Well, I think that certainly, it would be part of the overall South, but I think that North Carolina . . . one way
    you could examine that period, one could easily examine from the type of lawsuits for the advancement of the cause of
    black people in the various areas to get an index of what occurred. And I would think that during that period of time,
    the emphasis was on education, primarily. The education and upward mobility of educators is basically concerned, I think,
    with education and I think also with some integration of labor unions. Once again, you are looking at a number of attitudes
    that influenced the attitudes of those in power . . . their ability to do things without a force of law, was also important.
    During Terry Sanford's time, I think he used general orders or just put good people in spots to try to make things happen,
    who would move along. Once you had a Civil Rights Act passed, it was easier to do things. So, North Carolina has had an
    attitude of once it is put in a position to do something along racial lines, most of the time, it cheerfully accepted
    the mandate and went on and did it. And then, I think there's a difference in attitudes between the larger metropolitan
    areas . . . of course, we have an agrarian state basically and we have no major big cities, our largest cities are around
    100,000; Charlotte may be up to 150,000 now. Greensboro, Raleigh, Durham, High Point, Asheville, Wilmington, places like
    that are around 100,000. But I think that in most of the middle Piedmont area, there's an attitude to go forward, to do
    more.
- speaker: Interviewer
  text: Did the biggest gains occur in the last ten years, say, compared to the fifteen years before that? Are is there any
    way to mark it off in terms of periods?
- speaker: Respondent
  text: I think that most black people automatically distinguish, even by organizations, I think we start in 1960 . . . the
    1954 Supreme Court decision, I say you follow those suits, the pattern of those suits and how they were brought . . .
    and then you come to the second Supreme Court decision in and then you've got to take into concern the Freedom Rides that
    occurred in the '40s. Then, you've got to take into consideration the sit-in movements of the '60s, which in my mind,
    was the real force in American society to really change American society. The demonstrations which went to bring about
    a substantial change in North Carolina in the line of public accommodations and moving up. So, I think that you could
    divide that movement on the basis of . . . I think if I were to divide it generally now, I'd divide it as the legal movement
    as one, in which you sought to get your rights and this legal movement bogged down. Then you had the protest movements
    that moved it forward.
- speaker: Interviewer
  text: Beginning with the sit-ins?
- speaker: Respondent
  text: Well, I don't say beginning with the sit-ins, because you had the Freedom Riders prior to the sit-ins. You had two
    sets of Freedom Riders. The first one I was part of, I think, and another guy at Asheville by the name of Joe Feldman
    I think, was part of it, Rustin, Jim Houser, on the original Freedom Rides that happened about '46 or '47. These were
    the original Freedom Rides and that's where kids, when that bus came down, got beaten. And Chapel Hill, Jim Peck was the
    white guy that got beaten at the bus station in Chapel Hill. That was the first Freedom Ride and of course that took about
    that much item in the newspaper at that time. The climate wasn't ready to see blacks take that kind of step. I think the
    outward climate had moved and attitudes had changed to recognize that the Freedom Rides would make a front page item later.
- speaker: Interviewer
  text: You were a major participant in the Meredith march, what followed after James Meredith got shot in the continuing
    march in Mississippi.
- speaker: Respondent
  text: Yeah. I led that, I organized that march. We issued the call to bring all the organizations together to continue the
    march at the spot where he fell.
- speaker: Interviewer
  text: Then, there was that split with , when Roy Wilkins and Whitney Young came down and split as to whether or not to make
    a black unity movement and later Carmichael got arrested and speeches and black power slogan developed, which is I think,
    usually associated with the beginning of black awareness. Did the idea of Soul City sort of grow out of that development?
- speaker: Respondent
  text: Soul City was an idea before the movement. Soul City actually started after World War II, in my mind. And it was first
    talked about when we saw the use of the Marshall Plan, and all like that. See, I've always been in real estate and I've
    always been a businessman. I was projected into national prominence as a civil rights leader, not as one who had a vitae
    in business. Because, at that time, this is what people wanted to know . . . who was speaking, who was leading, who was
    a spokesman in the movement, not what is the resume of Floyd McKissick. But I'm doing what I advocated, I doing right
    now the same thing I was doing since I've been twelve years old and since I've been talking about it, even though I've
    gone through a civil rights movement.
- speaker: Interviewer
  text: But do you see Soul City as an extension of the civil rights movement? With legal fight and protest and economic development?
- speaker: Respondent
  text: Oh yeah. Absolutely.
- speaker: Interviewer
  text: Is that the way you see it, legal, then protest, then economic development?
- speaker: Interviewer
  text: Is there a physical part here too, to the movement? One part is more physical and more violent than another part?
- speaker: Respondent
  text: Oh yeah, protest. You would subdivide your protest, most likely.
- speaker: Interviewer
  text: How significant do you see the Voting Rights Act? In its effect on southern politics?
- speaker: Respondent
