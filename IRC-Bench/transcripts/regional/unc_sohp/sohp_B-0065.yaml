collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: What I'm trying to do is to look at some of the recent happenings in Charlotte especially the consolidation attempt
    you made down there in 1971. I'm wondering, who raised it? Was it primarily the Chamber of Commerce who pushed the idea?
- speaker: Respondent
  text: You mean originally?
- speaker: Respondent
  text: Well, it was a combination of city leadership, some of it chamber-oriented, yes, that were the motivators back of
    our first attempt at consolidation.
- speaker: Interviewer
  text: Was that... I've heard it said that the chamber initiated a lot of the talk about it, got some study committees established,
    pushed to get the enabling legislation passed in the legislature, got the Charter Commission established. But, on the
    whole, maybe they realized, divided they had more on their hands than they had initially wanted. That perhaps the Charter
    Commission, through various of its recommendations, maybe went beyond what the chamber had hoped for initially.
- speaker: Respondent
  text: Well, that may have been the general idea of some people, but I cannot see how the Charter Commission could not have
    gone in the direction in which it did. In the manner in which the enabling legislation was brought about. The fact that,
    if you were going into a new charter, that it was fitting and proper that you discuss all of the elements involved in
    such a charter. I would think this is what happened. Perhaps all of the areas we touched meant that you were covering
    a broad spectrum of community philosophies that maybe nobody wanted to touch. I don't think it grew out of the fact that
    they had bit off more than was expected. I think of course once you got into it you realized how much it really involved.
    The work of the commission, as such, I think was a dedicated effort.
- speaker: Interviewer
  text: You think that it was the type of people who were chosen to serve on the Charter Commission that brought up these
    ideas? The broader suggestions about the district representation and the equal representation.
- speaker: Respondent
  text: Well, I think that there were many persons on the committee at its beginning that perhaps had not foreseen the depths
    of community problems that they would move into in attempting to resolve a charter. I think they grew in stature with
    their responsibility from the point of view of knowledgability and acceptance and, at least, a willingness to listen if
    they did not agree. As far as representation is concerned, I think that the majority of the members of the commission
    certainly realized that no form of new government could be implemented that did not give an expanded opportunity for total
    community representation. I think whatever consolidation they go into at such time that they ever do it will still have
    to accept the fact that a broader spread of representation will have to be a part of the charter of consolidation. As
    I was saying, any attempt at consolidation will have to consider an expanded form of government. It will have to be a
    broad spectrum of representation that will put into the government a more representative group than we have now. As it
    is now, most of the representation comes from a certain section of the town. This is where we are now. This is the way
    it was then.
- speaker: Interviewer
  text: You have supported consolidation all along?
- speaker: Interviewer
  text: The argument was made by some that a lot of times consolidation is an effort by the white power structure or whatever,
    seeing an increasing black population in the city, perhaps to dilute the strength of that black vote. Was that not the
    case in Charlotte?
- speaker: Respondent
  text: I would think that that was a part of the thinking through some of our citizenry, and you must recognize that. That
    was a strong factor in its defeat. I would not say that was the main factor in its defeat, but certainly it was a strong
    factor in its defeat. Not that it would afford more black representation solely, but it would afford more general representation.
    It would dilute what had been.
- speaker: Interviewer
  text: You see as much of a class sort of...
- speaker: Respondent
  text: Exactly. Exactly. You must understand that. The problem of increased black representation is to be there. Some of
    it that district representation is bad because it will bring a weakened structure into the government. Which they infer
    from that is that you will get representatives from some sections of your community who do not have the capacity to govern.
    This is their thinking. Well, I've seen some of all kinds of representatives in government regardless of where they come
    from. I just can't subscribe to the philosophy that district representation gives you bad government.
- speaker: Interviewer
  text: Was this consolidation attempt made... The chamber started out with it. Due to the nature of the situation, especially
    because of the people who were appointed to the Charter Commission. Got into broad issues concerning...
- speaker: Respondent
  text: The Charter Commission was composed of across-section of citizens. I think it was well representative of citizens,
    both city and county.
- speaker: Interviewer
  text: What do you see as being the real reason behind consolidation at this time? I mean it had been an issue that had been
    talked about for a number of years, but it seems to have sort of sprung fairly suddenly when it did. Was there a crisis
    of any sort that prompted...
- speaker: Interviewer
  text: Why did consolidation... What prompted the issue to come up when it did?
- speaker: Respondent
  text: Well, I think it was a general recognizance of the fact that consolidation is necessary to resolve many of the problems
    that affect a growing community like Charlotte. There are many problems that face Charlotte that can't be resolved on
    a city-county level, as such. The restrictions of two governments comes into play. The complexity of the philosophy of
    peoples in two areas comes into play. You take transportation, for instance. We cannot adequately resolve our transportation
    problems from a community point of view unless we are dealing with a total area. You follow. The stricture or the constraints
    of laws that permit counties to only do so methings and cities to only do so methings, and the crossing of boundary lines
    which have the constraints of law. It makes it impossible to arrive at solutions to some of the problems that are necessary
    to move the community forward.
- speaker: Interviewer
  text: Was the water and sewer situation one of the major...
- speaker: Respondent
  text: Yes. All of these... We have, in a sense, consolidated situations as it is now, but a total consolidation sets up
    the fact of dealing with one government. You begin to develop a one-government thinking. Certainly... Specially with many
    of the people problems that will affect not only the country but our local communities can be resolved from a one-government
    approach rather from a two-government approach. You follow?
- speaker: Interviewer
  text: Some of the opponents say, "That's just going to be another level of government. They're all passing the buck down
    there now. That's just going to make them one step higher up someway and less in touch someway with the people." You contradict
    that view.
- speaker: Respondent
  text: Yes, I do. I say that you come closer in contact with the people from a consolidated government than you do in two-level
    government as we have today because your representation is broader. You get inputs in government from elements of your
    communities that you don't get otherwise. So, I'm not a believer in the fact that that type of philosophy would cover.
- speaker: Interviewer
  text: What do you think... The broader representation, the meeting the needs of the people, more equitable, perhaps, taxation,
    better able to plan and provide services... A lot of these sound very idealistic, in a way. There have been those who
    say, "Maybe what we should have done was just sort of combine the... Do away with the city council and just let the county
    commission run the county, and, then, maybe, eventually we could work out some of the problems." Why was such a thorough
    and, if it was, idealistic attempt made?
- speaker: Respondent
  text: Well, I think it was, regardless of what some may tell you prompted the move, I think it was the acceptance of a general
    philosophy growing, as I said, out of a sense of dedication of those who assumed that responsibility and community to
    work for a consolidation. Bear in mind there were many people who didn't know what they were going to wrestle with when
    they set out. There were many who had no idea of the concept of consolidation. There were many...
- speaker: Interviewer
  text: Sort of a nebulous idea?
- speaker: Respondent
  text: Yes. There were many who learned much from the act or the attempt of consolidation. There were some who were convinced
    on more levels of it being worthwhile. See? Now, when you speak of idealism, you must bear in mind that the whole concept
    of government is idealistic. It's a question of whether you try to make it work to serve peoples' needs, or whether you
    feel that you've already developed everything that is necessary and let nature take its course from this point on. I say
    that, if you destroy the idealism back of government, then you destroy government, and you become decadent in your philosophies
    and your existence. Your communities will die on the vine.
- speaker: Interviewer
  text: I think, perhaps, what was behind the choice of the word idealistic is that neither of the two party chairmen were
    on the Charter Commission, and, maybe, that the Charter Commission in going so thoroughly into all areas of government
    built up a lot of opposition among the employees and the various groups of government by going so thoroughly into...
- speaker: Respondent
  text: You must bear in mind that change is the hardest thing in the world in our society to accept. It's a strange thing.
    The philosophy of a democratic society is based on an acceptance of change. The structure of our government grew out of
    a document that was so well written until it allowed for change. I don't know whether they had the real wisdom to how
    thorough their intellect and their... Put upon the tressel board a document that was malleable, that could adjust itself
    and stretch to change as our document has done. I think it's a marvelous thing. It's the people that can't change. Who
    live under that document. This is the struggle of government today. Trying to accept and wrestle with changes.
- speaker: Interviewer
  text: Do you think that one of the problems in getting this charter passed was just the general reluctance of the electorate
    to change. I mean a lot of the opponents made a...
- speaker: Respondent
  text: A part of that was it. Then, I think that, too, was a part, as you say, of a realization that maybe, of some citizens,
    that "we don't want to do all this changing we thought we wanted to do." The strong desire to support the change, or to
    bring the baby you have birthed to manhood, was lacking.
- speaker: Interviewer
  text: I've heard the comment that Charlotte in a way made a mistake in that. Of course, this apparently was Jacksonville's
    second attempt, but they had commitments from the power structure, had money in the bank as it were, before they wrote
    their charter. That Charlotte went about it somewhat differently and didn't have the commitment from a lot of the powerful
    forces in the city.
- speaker: Respondent
  text: But, you must bear in mind that comparing Jacksonville's structure with our structure is a different situation. Jacksonville
    was forced into a consideration of consolidation because of the problems that they had in government. The beautiful thing
    about Charlotte's attempt at consolidation is that Charlotte did not go into it because it was forced to go into it by
    a corrupt government.
- speaker: Interviewer
  text: Charlotte has had...
- speaker: Respondent
  text: Fortunately, we have had a clean government. We have had the luxury of existence under a political leadership where
    we have not had corrupt governmental officials or corruption existing in departmental heads or corruption in government
    totally that was such a cancer that the only way to get rid of it was to cut out the cancer. Charlotte went into consolidation
    clean, and, maybe, that was its mistake. That we had no corruption to force us into an acceptance of a new form of government
    to get rid of the corruption. You see? So, I don't fall over backwards when people attempt to compare or make a comparison
    of our consolidation with Jacksonville because... Or any other place. In fact, Charlotte is the only place that went into
    a consideration of consolidation or a study of consolidation not being forced to do it to get rid of some internal problem
    that, as I say, was a cancer to their governmental operation. We were going into it clean.
- speaker: Interviewer
  text: You think that made it difficult to persuade people that a change was necessary?
- speaker: Respondent
  text: Well, you are attempting to persuade people from a philosophy rather than from a cause celebre that said, "Looka here,
    this is the only way we can get rid of the problem that we got." So you see, we did not start out saying, "Here's our
    problem. We've got a problem that we've got to resolve." It was just a question of philosophy. Whether or not we are ahead
    of the game and we can do by consolidation some of the things that we find that legal constraints, for instance, keep
    us from doing as it is. Some of the things that we need to do to improve the community can be easier done through a consolidation
    rather than two levels of government. You see? Things perhaps being practically, in a sense, alright as they were, who
    wants to bother with change? That's one element of it. Then, you find that you've got
