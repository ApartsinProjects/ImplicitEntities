collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: So the firm started with you and Clement and Partlow in '30. Clement came in '34, y'all in '33.
- speaker: Respondent
  text: Partlow and I started in August of 1933 and Clement joined us in 1936, '34. Gewin graduated and was a friend of ours,
    who, close contact. He didn't practice in Tuscaloosa till about 1949 when he joined the firm, he had practiced in Greensboro
    during the meantime and had been in the legislature for two terms, as I recall, and was also county solicitor down there
    and was prosecutor . . .
- speaker: Interviewer
  text: Who was it, was it Clement who wanted to run, what were you saying, wanted to run for something?
- speaker: Respondent
  text: No, Gewin wanted to run for the seat which was the 6th district of U.S. Congress. He mentioned that several times,
    but he never did. The last time he mentioned it was when Armistead Selden ran and was elected, because he felt certain
    that he could beat Selden, who also was from Greensboro. Selden of course was a student in Law School when I was teaching
    there. He was a Sewanee undergraduate and also a Naval officer and had come back to law school after the war.
- speaker: Interviewer
  text: Yeah, it was after the war when he was here. I wasn't in school then but I just was working some with fraternity affairs
    when I was on the faculty here. So I knew some of those famous and infamous SAE's. But now, Clement never ran for an office
    at all. Did he hold positions in the party as such?
- speaker: Respondent
  text: Not as such. Only office that was anywhere near political that Clement ever held was the head of the savings bond
    drive. He set all kinds of records for the Treasury Department in selling savings bonds both before and after the war.
    The way the firm broke up was in 1940 when Partlow, who was a member of the National Guard, was called into service—when
    they called the National Guard into service early in 1940.
- speaker: Interviewer
  text: Now which Partlow was this?
- speaker: Respondent
  text: Billy. William D. He went into service I think in January of 1940 after he had run unsuccessfully against Pete Jarman
    for House of Representatives the year before and then in '41 prior to Pearl Harbor and prior to the declaration of war,
    Clement was called to work full time for the Treasury Department and in December '41, I was the only one here.
- speaker: Interviewer
  text: So you were left.
- speaker: Respondent
  text: Left with the firm when Pearl Harbor happened. I had already gone into the Naval Reserve and when Roosevelt was speaking
    to the Congress in his famous speech, "We will hit them again and again and again." Just as he said again the third time,
    the phone rang and they told me to report to New Orleans the next day. So I had to close the law office up and get down
    there.
- speaker: Interviewer
  text: So that was when the firm disappeared—disintegrated.
- speaker: Respondent
  text: Well, actually it didn't. E. W. Skidmore came in and operated his practice, wound up our practice, too. Of course,
    none of us came back until 1945. When we did come back, Clement and I started out practicing together and Partlow did
    not come back.
- speaker: Interviewer
  text: So it was after the war, you and Clement were back together. So those files were there in the office and would cover
    all those years.
- speaker: Respondent
  text: As a matter of fact, if you could find the newspaper accounts of the race between Hill and John Crommelin and between
    Sparkman and Crommelin you would find that somebody broke into those files and purloined some of Clement's letters, and
    Crommelin published some of them attempting to prove that there was some kind of a hidden veil for Clement. It wasn't
    much of a conclusion that could be drawn from it and the letters obviously didn't hurt the man they were run against.
    But, we never did know who actually broke into those files. We had a young man working for us at that time who had recently
    graduated, and his subsequent conduct leads me to believe he was probably the one who did it. Mainly because he has never
    been back or called any one of us since he left the firm. Nobody has ever had any contact with him and yet no one ever
    accused him.
- speaker: Interviewer
  text: He wasn't actively political?
- speaker: Respondent
  text: He became actively political later as a Republican down in Florida.
- speaker: Interviewer
  text: Well, that would lead you to that conclusion almost.
- speaker: Respondent
  text: But at any rate you would think that anybody who ever worked for six to eight months in a law office at least would
    call up and speak to people in the firm at some time after that. It would be rather unusual for thirty years to go by
    and never have any contact. But I don't know that he took those papers out. What happened was he took pictures of them
    and put them back. Things that were run were the photostats. Actually Bull Connor's big buddy in Birmingham head of the
    detectives—was his name Darnell?
- speaker: Interviewer
  text: That sounds vaguely familiar. I think that was his name.
- speaker: Respondent
  text: There's a Darnell in the police force here that has nothing whatsoever to do with it. This man, whatever his name
    was, was head of detectives up there, came down and conducted an investigation and said he knew who did it, but we never
    did know for sure. At least I never did. But these were letters from people like Estes Kefauver and Kefauver's law partner.
    There was a letter in there from one man had written in Tennessee and asked how he could spend that much time in politics
    and how in the world he could afford to do it without taking a political appointment or running for office. Clement had
    written back about the contacts he made and how they were fruitful in producing business that the others in the firm looked
    after. And this man took this to mean that he was selling his services for legal work that was brought to the firm, although
    that was not exactly correct. As far as I know we never had a case out of Tennessee. At any rate that file if we could
    have located it would have a great deal of information. I don't know whether I ever told you or not but Clement's law
    books were worth examining. The margins of the books were all filled up with tallies showing how many would vote for something,
    how many against. Other people would make notes about what the case was about, but Clement spent all his time worrying
    about the political things that were going on the campus. How many Wallaby had, how many Garrett had, how many so and
    so had. He spent the entire time thinking about politics.
- speaker: Interviewer
  text: Well, now just to round out this chronology, you and Clement and Gewin were together from '49 to 1960 when you went
    to City National.
- speaker: Respondent
  text: That's when I left the law practice—in September of 1960. Clement died one year later. Approximately one year after
    that Gewin went on the bench. That would have been about '62, I think he went—early '62 or late '61. Clement died in September
    '61.
- speaker: Interviewer
  text: I can't remember the date—seeing Gewin in Houston.
- speaker: Respondent
  text: That was after '62 but Gewin was on the bench when the Meredith case came up in Mississippi. I remember when Jack
    Kennedy went on nation-wide T.V. He referred to the judges being Southern lawyers and referred to him as Judge Gerwin.
- speaker: Interviewer
  text: That would have been before September '62.
- speaker: Respondent
  text: Because that was when the actual order had been issued requiring him to be admitted and that came from the Circuit
    Court of Appeals.
- speaker: Interviewer
  text: Was that the 9th?
- speaker: Respondent
  text: At that time it was the 5th circuit. It's now the 11th. Alabama is in the 11th. Mississippi is in the 5th.
- speaker: Interviewer
  text: Ours is in Atlanta now. So the law firm (I mean you three) itself continued in a way, I mean in the legal records.
- speaker: Respondent
  text: Actually, what happened, the young lawyers who were with us continued together for about a year and then they split
    into two law firms.
- speaker: Interviewer
  text: I see. Was Perry one of them?
- speaker: Respondent
  text: Perry Hubbard and Vann Waldrop stayed with the original firm with about five or six lawyers. Gordon Rosen and Bernie
    Harwood went into another firm.
- speaker: Interviewer
  text: I didn't realize Gordon Rosen was originally—
- speaker: Respondent
  text: Gordon came in just about the time Gewin did. Bernie Harwood was Bob Harwood's son. He is still practicing here. He
    and Gordon and George Wright started a firm and since that time the Hubbard firm has split into two. Split into three.
    The young tax man they had there, Bob Tanner, and two or three others pulled out and started their own firm.
- speaker: Interviewer
  text: Well back in 1933-'34 when you all started, how many law firms were there in Tuscaloosa?
- speaker: Respondent
  text: There were not over 20 lawyers in Tuscaloosa. Now there must be 200 or at least 180 I would think. You could count
    the law firms in town on one hand—at least at that time.
- speaker: Interviewer
  text: But Foots was the most politically active?
- speaker: Respondent
  text: He was. He was 100% politically active. He didn't profess to look up law or write legal documents or anything of that
    sort. He spent all his time working on politics. I must say, very successfully. He was probably the best political organizer
    that ever worked in this state. He was such a good organizer that when Ed Livingston ran for the Supreme Court, after
    about three weeks E.L. dodged Foots. When he'd see him coming down the street, he would cross over to go around the block
    to keep from meeting him because Foots would have another job for him to do, somebody for him to see in another county.
    He just couldn't stand it, he said. He wasn't able to do all the things that Foots thought up for him.
- speaker: Interviewer
  text: Foots died in '61. He wasn't too old. Just about 50?
- speaker: Respondent
  text: He was born about 1910 so just about 50.
- speaker: Interviewer
  text: I remember. It was rather sudden wasn't it?
- speaker: Respondent
  text: Well, he'd been sick for a long time but of course he was so much overweight that from time to time he'd lose 50 pounds,
    put back 60, lose 40, then put back 50 and over his career he lost at least a ton. His heart just wouldn't take that sort
    of thing.
- speaker: Interviewer
  text: And I guess they weren't as sensitive to that problem as they are now. I guess it's just as well—you'd enjoy life
    more.
- speaker: Respondent
  text: His first successful political race really began before he graduated and that was Chester Walker defeating Fleetwood
    Rice for probate judge and that was in Tuscaloosa. Judge Rice had the support of all the politicians, every single county
    official and all the rest of them were out working. Foots organized a group that met every night at Pug's after Pug's
    closed. They'd sit at the counter, Pug'd give them coffee or coca-cola—whatever they wanted—while they made plans for
    the next day's work. They divided the voting list up into small segments and each man had a certain list
