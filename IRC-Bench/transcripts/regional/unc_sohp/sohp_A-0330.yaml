source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: To start with, to put some of this media analysis and impressions and so forth, into context, why don't you tell us
    a little bit about your earlier years, how you grew up in Nashville and . . .
- speaker: Respondent
  text: I was born here, I was the oldest of eight children. My father was a contractor who almost went broke during the Depression.
    I grew up in this town with middle-class parents. I'd say that in terms of economics, middle-class income from the Depression
    until the 40's. I served in the war and came back. My uncle was an executive of the newspaper, vice-president and circulation
    director. I started at Peabody and he got me a job here as a cub reporter and part-time copy boy. My family was Roman
    Catholic, traditionalist Roman Catholics. I think that I grew up almost unaware that the South was "different." I was
    not exposed to that many blacks. I think that I probably led a more sheltered life than most. My mother was Irish and
    my father was German-Irish. After Christmas, the big holiday in our family was St. Patrick's Day. I was aware that there
    was a difference in being a Catholic in the South, but I never can honestly say that I felt any sort of persecution or
    prejudice. As for other minorities, Nashville has never had that many blacks . . . it is about 30% inside of what we call
    the "old city" of Nashville, but we have metropolitan government—city and county consolidation—and it's about 17% now
    in the total community.
- speaker: Interviewer
  text: You say that your uncle worked with the newspaper?
- speaker: Respondent
  text: He was vice-president and director of circulation for both Nashville newspapers.
- speaker: Interviewer
  text: Is this your father's brother?
- speaker: Respondent
  text: My father's brother.
- speaker: Interviewer
  text: Was the newspaper then a kind of a part of your family? Were you close to that particular uncle?
- speaker: Respondent
  text: 'I was close to him, but not that close. I always wanted to write. I really thought that I was going to teach school.
    I came back from service and went to Peabody College here with an eye on teaching school. But I got into this, the newspaper,
    and I was good at it. I liked it. I was fascinated by it. I was a control tower operator during World War II. I think
    that I became aware of absolute separation of the races in the Air Force and it struck me. I remember in the early mornings
    that I used to look down on that field—the barracks—and it was a physically, racially separated Air Force. It always fascinated
    me, as I looked down from the tower, that the blacks could march so damn much better than the whites. I mean, they really
    had it, you know. And if I ever had expressed it in those days the way that I saw it, I would have been accused of overt
    racism. But they just were better at marching than the white troops. They took more pride in the way they marched: they
    had more fun when they marched. They enjoyed it . . . God, it sounds like I''m saying, "I listen to them out front, picking
    the banjo and singing ''Mammy''." But the inequity of it all began to dawn on me then. I did some writing about that—essays
    for myself more than anything else. Shortly after I came out of service my sister was a finalist in a statewide speech
    contest and she asked me to help her with some ideas for her speech. I was very much concerned about this whole racial
    thing by that time. I had been exposed to blacks in Tampa, in service, but also the reality of Spanish-speaking Americans
    there and their problems. So, I remember that we sat down to work on this speech I talked her into writing on racial injustice.
    It was a religious-oriented contest. The first line of the speech that I gave her was, "The Man on the Cross had slanted
    eyes, his skin was black and they called him a Jew." I thought that was a hell of a line. It''s controversial as hell,
    but she won with it. That year there were blacks in that contest for the first time. And my mother said, "They''re coming
    from Memphis, and where will they stay, or who will entertain them? We will have to have someone to have a party?" And
    so, we took two blacks home and had a party for them. I remember the great furor about that.'
- speaker: Interviewer
  text: Is this '45 or '46?
- speaker: Respondent
  text: About '45 or '46. My mother is still alive and, at 72, a beautiful woman. I never have understood why she wanted to
    do that—have a party for blacks. I put a lot of pressure on her, maybe. It was beginning to get to me by then—racial injustice
    issues, in '46. It was beginning to get to me, heavy.
- speaker: Interviewer
  text: So, it was a race question, more than a kind of a newspaper heritage that was starting to be more of a driving thing
    . . .
- speaker: Respondent
  text: Right. Then, I started here as a copy boy and part-time reporter I guess, in '48, and that was sort of off and on
    until 1949 when I became a full-time reporter while I was going to school.
- speaker: Interviewer
  text: So, there wasn't much, say, overt politics in your family, around the dinner table discussions?
- speaker: Respondent
  text: Well, my grandfather . . . and we lived during one period with him, was intimately involved with local politics, really
    up to his ass in it. But . . . it was always local politics. I remember my grandmother—my mother's mother—saying that
    on election night she used to worry about him. He'd always put on his pistol and go out.
- speaker: Interviewer
  text: Right here in Nashville?
- speaker: Respondent
  text: That's right. And he used to tell great stories about the old days in politics. On my father's side, his brother,
    Louis, was the son-in-law of Bill Jones, who was Nashville's agent of Boss Crump. So politics was always there. Periodically,
    Uncle Louis' job with the state government would come up for family discussion. Every election, Uncle Louis' job was either
    in jeopardy or safe. He was either going to get promoted or he was going to get fired, depending on how Crump did. And
    in those days, Crump always did very well. I always was aware of politics at the very base level.
- speaker: Interviewer
  text: Having a job and that kind of thing?
- speaker: Respondent
  text: That kind of thing. Or literally running the town for four years, which I always thought Bill Jones did. I mean, he
    was literally Boss Crump's boss in town.
- speaker: Interviewer
  text: Crump controlled Nashville?
- speaker: Respondent
  text: Yes, Crump controlled much of Nashville politics through Bill Jones. And usually, they won. Later on, Uncle Louis
    had a tough time with his job. As a matter of fact, when I came here as editor in 1962, he was working in our press room.
    As a boy he had started out in the press room, and that's where he died. He came to see me and asked if he could come
    back, he still held his union card. Uncle Walter was circulation director and he and I were both helpful to Uncle Louis,
    and he came back.
- speaker: Interviewer
  text: So your sense of politics was more local than state?
- speaker: Respondent
  text: 'By far. Another thing that stands out in my mind going back: I remember those conventions about Uncle Louis. I remember
    conversations with my grandfather. My grandfather used to tell stories about how he was helping some guy get elected county
    registrar or county trustee. He once was helping a veterinarian named Boots Brown in a race for some office. This was
    one of the great stories that he used to tell. He was helping Boots. And they ran a man against Boots who didn''t have
    any legs. He told this story many times . . . My grandfather Brew''s home place was right up here at 12th and Broad just
    within two hundred yards from where we are sitting in my office on the other side of the street. They had a parade on
    election eve that came down Broad Street toward town. I guess that it started right around here. And they put this fellow
    running against Boots Brown up in a buggy. And they propped the stubs of his legs over the edge of the buggy, and started
    down across the viaduct. And my grandfather and Boots, the candidate, were standing in the background of this crowd across
    the viaduct there. And my grandfather said, "Boots, you are beaten. Your own mother wouldn''t vote for you if she sees
    that son-of-a-bitch like that." Well, I remember that story and I can recall dozens of stories of his involvement in local
    politics. I remember that he was involved in such things as getting people to pay their poll taxes, or telling people
    that they should pay their poll taxes. He was sort of a precinct politico for many years. By the time that I got old enough
    to know anything about it, he had gotten older himself and was out of a good deal of it. But again, it was all local and
    not state. One of the other things that I remember . . . it''s funny, the things that I remember are things that come
    back to me as things that I''m proud to remember about my family. My father was a contractor and he had a man working
    for him named Gene Woodruff. And Gene Woodruff had a brother named Horace Woodruff. I remember as a child, hearing around
    the table that Horace was an animal. I didn''t know what that meant until suddenly, Horace killed a policeman named Mike
    Mulvehill and was sentenced to go to the electric chair. I remember my father and my grandfather and my Uncle Louis sitting
    down in the living room, and I don''t know where I was, but I was somewhere around there, talking about arranging to go
    to see the governor to ask for Horace Woodruff''s life. They did do that and Horace Woodruff''s life was spared. Well,
    then a year or two later, he led a break in which three or four people were killed. Another inmate, Lonnie Taylor had
    his arm shot off. Again they went and again . . . they helped save him. Horace Woodruff spent twelve years on death row
    after that. I became a reporter and got involved in prison reform and went out there to do some stories. I had been out
    there maybe six months doing stories and one day, I was going through and the warden, a fellow named Droupie Edwards,
    said, "The fellow who runs our radio shop would like to see you." I went into the shop. He said, "I''m Horace Woodruff,
    your father helped save my life." I became . . . an intimate friend of his. And later . . . I think t'
