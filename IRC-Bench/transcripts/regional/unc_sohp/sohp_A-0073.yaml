collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: John Lewis played a very essential role in all of this, and I really just wanted to talk about this whole change and
    what are some of your experiences and what you have seen, what you feel is significant in what has come about. How did
    you actually begin, what was your first involvement in what is referred to as "the Movement"?
- speaker: Respondent
  text: I grew up in rural Alabama on a farm in Pike County about forty or fifty miles from Montgomery in a strictly segregated
    world. You had the white world and the black world. Segregated school bus. In '57, I went to Nashville to attend the American
    Baptist Theological Seminary to study, with my great desire to come to Atlanta to study at Morehouse but my parents couldn't
    afford it. I could go to the Seminary and work and so I enrolled in it. The first year I tried to organize a local chapter
    of NAACP, but the American Baptist Seminary is jointly owned and supported by the Southern Baptist Convention and they
    didn't like Nashville Baptist and the faculty particularly. The president of the school had some real questions about
    trying to organize a local chapter of the NAACP on the campus. During the school year of '58 and '59, I started attending
    some nonviolent workshops conducted by James Lawson who was then a student at Vanderbilt Divinity School. That went on
    during the second year, through '59 and '60, and these workshops dealt with the question of philosophy, the discipline
    of nonviolence, the whole history of the struggle in India led by Ghandi and his attempt to organize in South Africa—building
    it on the whole idea of Christian faith and that type of thing. Late November 1959, we had what we considered test sit-ins
    in large department stores in downtown Nashville. We had a group of black and white exchange students, African students,
    students from India who went down and tested the restaurants and lunch counters. When they denied us service, we left.
- speaker: Interviewer
  text: Was this before Greensboro?
- speaker: Respondent
  text: It was before the Greensboro sit-in of 1960. We came back after the Christmas holidays and continued to have the workshops.
    Right after February first, second, or third we received a telephone call from students in North Carolina saying, "What
    can you do to support the students in Greensboro?" It was not until February 7 that we had the first mass sit-in in Nashville.
    That was really the beginning of my involvement.
- speaker: Interviewer
  text: What happened when you sat in?
- speaker: Respondent
  text: Well, the first time we took a seat at a lunch counter and we were denied service, they said, "We don't serve you;
    you can't be served." It was a great feeling; it was my first real act of protesting against this system of segregation.
    I sort of had this feeling for some time that you just wanted to strike a blow for freedom and this was a great sense
    of pride to be able to sit down and at the same time become part of an organized effort. We continued the sit-in efforts.
    We had what we called Tuesdays and Thursdays. We didn't have any classes on those days and we continued to go down to
    the lunch counters and restaurants to sit in.
- speaker: Interviewer
  text: What would happen when you were denied?
- speaker: Respondent
  text: We would continue to sit and some days we would stay all day and take turns. A shift of students would stay there
    until they were forced to close the lunch counters completely. Or we would occupy all of the seats. In some instances,
    stores like Woolworth's and Kress's, McClelland's, would just close the stores. And that continued for a period of time.
    We had mass meetings going on in the larger communities.
- speaker: Interviewer
  text: Were there any arrests?
- speaker: Respondent
  text: No. The first arrest in Nashville didn't occur until February 27. This was a day when we had been warned by a local
    white minister, Will Campbell, who had told us he had word from a reliable source that we would be arrested and that there
    would be some form of violence. A small group of us, on that day—it was a cold day in Nashville, we even had snow—on that
    particular day, went down and started sitting in at Woolworth's and later during the day there was some violence on the
    part of a young white teenager who pulled students off the seats or put lighted cigarettes down their backs, that type
    of thing. We continued to sit.
- speaker: Interviewer
  text: Was any of that done to you?
- speaker: Respondent
  text: I was hit, but never a lighted cigarette or anything like that.
- speaker: Interviewer
  text: Was it painful?
- speaker: Respondent
  text: Oh, yes. We refused to strike back. The night before we had prepared some leaflets and I had written the leaflets
    myself. A series of do's and don't's that we prepared for the students. We got paper from the American Baptist Seminary
    and one of the secretaries there ran them off on the mimeograph machine. Each of the students had a leaflet saying what
    to do and what not to do. As a matter of fact, Senator Javis has a little book and he used these dos and don'ts in his
    book that we had prepared for that particular demonstration. Most of the people that went to jail that day had those leaflets
    on them. In Nashville, Tennessee, on that following Sunday—I guess, that was the 28th—they reprinted the leaflet. But
    that was my first arrest, after the violence occurred on February 27.
- speaker: Interviewer
  text: Was that the first violent episode?
- speaker: Respondent
  text: Yes, that was the first violence.
- speaker: Interviewer
  text: Do you remember how you felt then, both about the violence and the arrest?
- speaker: Respondent
  text: Well, I think studying and attending the nonviolence workshops we had been disciplined to understand, to be willing
    to adjust to the violence, the pain and the hurt. At the same time we didn't concentrate on what happened to us. But we
    were there for a purpose and the arrest. It just sort of inspired us. I didn't have any bad feelings about it. I didn't
    necessarily want to go to jail. But we knew, in a sense, using that particular method really as a tactic at that point
    that it would help solidify the student community and the black community as a whole. The student community did rally.
    The people heard that we had been arrested and before the end of the day, five hundred students made it into the downtown
    area to occupy other stores and restaurants. At the end of the day ninety-eight of us were in jail. There were mass meetings
    all over the city that Sunday. We refused to come out of jail. We didn't want anyone to go our bond. But early Sunday
    morning, the colleges and universities there had put up the necessary bail money and we were let go.
- speaker: Interviewer
  text: How do you see it now, thirteen years later? Do you feel the same way about it.
- speaker: Respondent
  text: I feel that what we did was necessary. It helped to start something. And if I had to do it all over again, I would.
    To me, it gave the feeling of being part of a crusade, sort of a movement. It was just not another angle. It was part
    of a process and after that particular demonstration, there was a series of other demonstrations in Nashville. There were
    other arrests, other acts of violence, particularly during the month of March and April. We had a bombing. One of the
    attorneys that had been defending us, I think it was April 19, 1960, about six o'clock in the morning, the home of Z.
    Alexander Looby, he was one of the attorneys for the Legal Defense Fund, who taught part-time at Fisk, his home was bombed.
    He lived across the street from Meharry Medical College and the bomb impact broke the windows of the school. About seven
    o'clock we had a meeting with this group of students called the Central Committee of the Nashville Student Movement, which
    represented students from Fisk, American Baptist, Tennessee State, Peabody, Vanderbilt. We all met and decided that we
    would have a mass march on City Hall in response the the bombing of Attorney Looby's home. We sent the mayor a telegram
    saying to him to meet us on the steps of the City Hall by noon. By noon, we had more than five thousand students and community
    people marching on City Hall and the mayor came and spoke. It was at that point that the mayor of Nashville made the point
    that he thought that the merchants should agree to desegregate downtown Nashville. That was the turning point. In early
    May, the lunch counters and restaurants in question did desegregate. It was period of negotiation and we had a period
    where we didn't demonstrate at these particular restaurants.
- speaker: Interviewer
  text: V. O. Key wrote in his book that if you understood racial politics in the South, you understood southern politics.
    There are basically two periods—the fifties and the sixties. If you look at it in terms of civil rights, were much more
    gains made in one period than another?
- speaker: Respondent
  text: Oh yes, there is no question in my mind.
- speaker: Interviewer
  text: How would you describe the period from 1948 to 1960?
- speaker: Respondent
  text: In terms of progress, real progress. Of black people in the political arena in terms of civil rights, there is very
    little progress. You had very few organizations, very few groups. You had on the national level the NAACP fighting, for
    the most part involving a small segment of the black community. You had a few professionals here and there but it was
    not until the first real effort to involve the masses in the struggle came with the Montgomery boycott bus boycott in
    1955. In my estimation, not until 1960, when the whole sit-in started, did you see a total community, every segment of
    the black community, get involved. I think today what is happening since 1955 and particularly since 1960, black people
    see their involvements an extension—see their involvement in the political movement as an extension of their involvement
    in the civil rights movement.
- speaker: Interviewer
  text: During the period of the sixties?
- speaker: Interviewer
  text: So that the gains made between 1960 and 1973 are not more than any other period?
- speaker: Respondent
  text: I would think so.
- speaker: Interviewer
  text: Could you personally visualize that 1960 when you were involved during your student days?
- speaker: Interviewer
  text: Could you see what the gains might have been?
- speaker: Respondent
  text: I think we had some idea. A great many of us thought that maybe just being able to go into a lunch counter and get
    a hamberger and a Coke, that would end certain forms of segregation, racial discrimination—being able to take a seat on
    a bus or in a waiting room. There were certain barriers, physical barriers, that we wanted to remove. I think that a great
    many of us thought that in a short period of time, maybe within a matter of a few months, certain things would happen
    in terms of removing some of the barriers, some of the legal barriers. But I don't think for the most part that in 1960
    we see some of the changes that we see now.
- speaker: Interviewer
  text: There were more political barriers than social barriers?
- speaker: Respondent
  text: There were physical barriers, removing some of the social barriers. And I guess in 1960 we had no idea that in many
    parts of the South people would be registering and voting and being elected to office. It was not really a part . . .
- speaker: Interviewer
  text: Could you have foreseen that Governor Wallace would crown, just this past Sunday, the first black queen of the University
    and address a conference of black mayors?
- speaker: Respondent
  text: No, I don't think so.
- speaker: Interviewer
  text: What do you think now?
- speaker: Respondent
  text: I think that Wallace recognized that black people are registering and that they are voting. In a state like Alabama,
    when in the early sixties there was only about sixty-five to seventy thousand registered black voters and today there
    are over two hundred thousand registered black voters in the state. In many counties in Alabama, you didn't have any black
    voters in the sixties, and now they have black elected officials.
- speaker: Interviewer
  text: Do you think Wallace's action is symbolically important?
- speaker: Respondent
  text: I think it is in a sense. I think the action of Governor Wallace is saying that the politics have raised. The politics
    that we knew during the fifties and sixties is gone. If it's not gone completely, it's on its deathbed. I think that's
    what it symbolizes.
- speaker: Interviewer
  text: Do you think that Wallace has changed because he recognized the political power involved in registration of blacks,
    or more fundamental changes? Is it a change in his attitudes toward blacks?
- speaker: Respondent
  text: I'm not so sure that I am prepared to say that the governor has changed his attitude. Wallace is apparently a very
    smart and clever politican. At one time, when he first ran, he was much more progressive and he sort of inverted to a,
    I guess you might call, conservative position code after he became a sort of fighting. Apparently he is going through
    some changes, and I'm really not prepared to say that he has changed his attitudes. No question about it there are changes.
    Changes are occuring in the South on the part of white elected officials, white politicians. But I can recall that in
    1961, some of the places we visited on the Freedom Ride in Mississippi, in '62 and '64 in Mississippi, some of the white
    officials that we came in contact with, like the sheriff in Amite County down in McComb, Mississippi. Some of the people
    that harassed some of the SNCC people are some of the same people today that are out campaigning for the black vote. They
    come to the voter registration rallies, the mass meetings. When Julian and I went on tour in Mississippi in '71, the same
    people came to welcome us to the city and that was only in Mississippi. In June of '71, the mayor of Belzoni - and this
    is the same place in Humphreys County when in the late fifties two NAACP people were shot there - came to welcome us to
    the city. These guys, I think, can count; they know that black people are registering and they are voting and they want
    to be reelected.
- speaker: Interviewer
  text: What does it mean in terms of public policies for blacks, and the way in which blacks are treated, and the way in
    which resources are distributed and the way government services are provided, what does it mean in those terms?
- speaker: Respondent
  text: I think, without question, a growing number of white elected officials recognize that the black vote is a vote to
    be reckoned with and that they must be able to produce so
