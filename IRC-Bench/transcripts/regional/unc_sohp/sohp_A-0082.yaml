collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: There is one story that I heard in New Orleans, except no one else seemed to know about it, so I wanted to ask you
    about it - whether it is true and if it is, if you would elaborate and tell the whole story. The story I heard was that
    you and your husband, your husband in particular, and you back in graduate school and in law school were more or less
    the leaders of a young group in the late thirties that really went to Washington and got federal action to come down and
    prosecute to prosecutions that eventually came, and that out of that group developed a more or less, a cadre of people
    who went on in Louisiana politics.
- speaker: Respondent
  text: Well, Hale was the leader. It was called People's Week, and there were a great group of young people in an organization.
    You know, there still exists a multi-factional organizational situation in politics in Louisiana, and there was no one
    faction with which they seemed to identify. They did form a group called People's League and Hale was the chairman or
    the president or whatever the chief officer was.
- speaker: Interviewer
  text: Was he in law school at that time?
- speaker: Respondent
  text: Yes. I think by the time that they were formally organized with a name and officers he may have been out of law school.
    He got out of law school in '37 and they didn't have any formal outward organization until perhaps '38 or '39. Several
    state senators, Lawrence Eustis was a member of the group, Chuck Morrison, who became mayor and then ambassador to the
    Organization of American States, was a member, as was his brother Jake. Raymond Monroe, who was not a political officeholder
    but who, from that time on, was very active in political organizations and all the ensuing races for governor. Goodness,
    I should remember them all. They were just an enormously effective group of young people who felt that they couldn't identify
    especially with any particular faction in order to do a job that they felt was necessary, and that was to establish a
    feeling that the government could have integrity and could serve the people well without having any monetary difficulties.
    They did very effective work legally and they did, of course, talk with various governmental agencies that should have
    been involved, Justice and Post Office. They staged large rallies conducted by the People's League on the White House
    steps. There was a grand jury investigation going on and the grand jurors felt that the district attorney was not rewarding
    their efforts of justice with a thorough investigation, and from that time on the People's League was identified as a
    political entity, non-factional political entity, and they went on to work effectively and affirmatively in the political
    organization. The first major effort was the gubernatorial election of 1940. I suppose the campaign started in the fall
    of 1939. They were able to elect the governor of their choice, Sam Jones, and Sam has become a very conservative person
    in the way that he is. He was the candidate of the People's League and all of us went into very active ward-precinct organizational
    politics. We had ward leaders and precinct captains and poll watchers. We worked very hard on voter registration drives.
    At that time you had to register every year and by the time you had cleansed the rolls it was time to start all over.
    I think it gave all of us a sense of responsibility at the precinct level, which is extremely helpful all through your
    political life. If you go back to the essentials it is there. The issues are explained and the votes registered and voters
    translated into the polls and counted. So, it was a very valuable lesson. Then, of course, there was no longer a need
    for a separate organization. They had done their work in exposing scandal and trying to reestablish integrity in government
    and to attract good people into running parties, making themselves available as candidates and officials. Then they went
    on. The various members of the League were just absorbed into other factions which they felt compatible with their political
    feelings. Of course, World War II came along and disbursed a great many of them.
- speaker: Interviewer
  text: Was there any coming back together after World War II of the same people?
- speaker: Respondent
  text: No, but they more or less remained together, I hate to use the word ideologically, but I guess for want of a better
    word, they seemed to always react, more or less, the same way to political situations and to political candidates' platforms.
- speaker: Interviewer
  text: As you think back over the period to 1948, both in terms of Louisiana and the Congress, what are the major changes
    that you have seen occur in terms not only the state politics, but also the politics of the southern delegation?
- speaker: Respondent
  text: As you have said, our state politics are different. They are very interesting. I think that generally that state politics
    from that time on there has been a great deal of citizen participation. Some of the so-called reforms of that era are
    probably registration, voting machines in larger cities. Larger areas, I think, led to more active participation by a
    larger number of people from different economic, racial, ethnic backgrounds. That probably could be so of every southern
    state.
- speaker: Interviewer
  text: Did the issues change during that time?
- speaker: Respondent
  text: Of course, the issues, the national issues always change. We were hampered for many years from doing many other things
    because we had to strengthen integration. It was always hanging over our heads, I mean the South's head. The South has
    always produced, I think, remarkable congressional leaders mostly because people of ability offer themselves for election
    and their constituencies from the years gone by have kept them in office long enough for them to gain an expertise and
    power and effectiveness in Congress.
- speaker: Interviewer
  text: In other words, do you see that changing?
- speaker: Respondent
  text: I think that no seats are any longer safe. There was a time when various seats were considered safe, if it were a
    one-party state. Louisiana was and several of the southern states were and as you well know, that has changed considerably
    in the last seven years.
- speaker: Interviewer
  text: But isn't the tradition of sending the same person to Congress, is that changing too? It used to be, at least we have
    heard in some southern states that once you got the nomination, the election was assured.
- speaker: Respondent
  text: I don't really think that is true anymore. I think that rapid communication, particularly television communication,
    has changed the voting patterns, well, the lifestyle of a great many people because instantly, everywhere all over the
    country at the same time, people are hearing the same things, seeing the same things, evaluating the same things from
    a national viewpoint, projected from a national viewpoint. There are so many particles that go into what makes a campaign
    click and how a person is elected that it is impossible really to pick out any one thing. In our area, in Louisiana, of
    course, the growth factor, people in suburbia more or less have the same problems that they have everywhere else, and
    they have almost the same attitudes. We have been fortunate in New Orleans that we still have a viable inner-city situation,
    and that hasn't been depleted. Of course, the downtown business district is a live and well. Mostly, I think, because
    it is the local shopping center to the French Quarter, which is really a year-round residential community as well as a
    tourist attraction. In so many cities, of course, you have all the urban problems from the people paying taxes fleeing
    the inner city and the people who need tax money spent on them overcrowding the inner city. The urban problems are so
    much the same as they are in any other city in the country, that it is hard to think of them as a southern problem.
- speaker: Interviewer
  text: How did the removal of the race issue affect what your husband did and what you are doing now?
- speaker: Respondent
  text: I don't think it is completely removed. But of course it is being removed more and more. I also think that you are
    going to find, as we have in the last seven years, the many constituencies where there is going to be a large percentage
    of black voters and have more black candidates and more black officials. Perhaps this has helped change some of the attitudes
    of some of the white politicians. I always felt that Hale held great contribution in that regard, that as he grew in thinking
    and in stature, that he was able to lead people from our own area along with him, and perhaps all of them didn't catch
    up with him, but he could say that these are the realities of life and certainly of the future, and to lead them as far
    as they could go at the time. Also, to be able to give courage to other white politicians of the South, that you could
    take these stands and be elected. So often, I think, people were afraid to take stands that would perhaps defeat them.
- speaker: Interviewer
  text: Neal Peirce is coming out with a new book on that we have seen the proofs of, and it includes an interview with Hale
    Boggs in which he referred to his last victory after his votes on civil rights measures and it sort of gave him a new
    sense of freedom to act, to vote for his convictions even though he felt in the past that they were dangerous. The fact
    that he was able to survive that election.
- speaker: Respondent
  text: I think he may have said that in the context of what I have said, "Survive to be an example to others that you could
    survive." I don't think that he, saying that he didn't mean it just about his own survival, because he often took stands
    that were, as far as his own survival was concerned, that he often times disregarded. But I do think that the fact that
    he had no opponents, everything was going along very well, we had had a year and a half of more or less political stability
    within the Democratic Party in our area, and he had been able to go home a great deal more than he had been able to in
    the last several years. Then along came the open housing legislation and his vote on it almost defeated him. The fact
    there was no serious challenge to his leadership and to his political survival at the moment was not successful. It did
    give him the feeling that the area was ready for him to move forward in the field of civil rights. But I don't know how
    he could have felt much more free on voting rights and open housing.
- speaker: Interviewer
  text: How do you and Congressman Treen get along?
- speaker: Respondent
  text: Very well. He is an extremely kind and polite and gracious and whenever there has been any kind of testimonial for
    me or anything in my honor, he has always participated very actively. We've worked together on two or three projects for
    the districts, which particularly are on the coastline.
- speaker: Interviewer
  text: Does the Louisiana delegation meet as a delegation?
- speaker: Respondent
  text: We meet occasionally. We meet often through our administrative staff members. We try to set up a meeting for the delegation
    and/or administrative assistants for people from home with various problems or ideas or promotions.
- speaker: Interviewer
  text: Is it structured?
- speaker: Respondent
  text: It's a loosely structured thing. We cooperate very well together, and we have felt this year that it has more impact
    if we write a joint delegation letter, for instance, on what we consider a serious problem. This has worked very well.
    A joint letter always received immediate attention from the highest official of whatever department to whom it is addressed,
    and we have had action, sometimes solutions to problems.
- speaker: Interviewer
  text: Is this House and Senate meeting?
- speaker: Interviewer
  text: Can you give us one example of that?
- speaker: Respondent
  text: For instance, we have joint meetings on NASA projects. We do have a sixteen million dollar contract at. We've had,
    we were very concerned, of course, last year with the flooding of the Mississippi, concern this year, the water is higher
    than it was last year at this time. There were various members of the delegation who felt that certain things weren't
    happening in their own districts that should be, and so we had a very fine meeting with the Corps of Engineers and other
    people, and actions were taken to relieve situations in particular districts and out of the entire meeting evolved a reevaluation
    by the Corps of Engineers of the data on which the flood insurance rates had been predicated. They were, the actuarial
    rates for flood insurance were predicated on the Corps' belief that the levies were paper levies and they withstood the
    longest, highest, hardest flood pressure that had ever been recorded and held in our area. So we were able to get a reevaluation
    of the rates completed in time to, for the implementation of the new bill. Those are two positive examples. I could probably
    think of a lot more.
- speaker: Interviewer
  text: Can we talk a little bit about the southern delegation if there is such a thing, but a group of congressmen and senators
    from the eleven southern states, and their influence in Congress in the last twenty-five years. Some give us the hypothesis
    that it is on the increase, some say that the power is waning, some say that it has leveled off. Do you have any thoughts
    on that?
- speaker: Respondent
  text: I think the power has been there, and certainly the southern states had a direct influence on the actions of Congress.
    The seniority system, of course, placed many southerners. We said earlier that the people did continue to elect a person
    who was well-qualified and who had the desire to remain in office and naturally they became ranking members or chairmen
    of the committees and directed decisions of the Congress. Everybody on those committees and everybody on other committees
    who has business with those committees naturally must deal with them in the nice sense of that word. But the resignation
    and death of a lot of older members of Congress, or the long-term ones, have changed the committee picture somewhat. As
    a matter of fact, I read recently where the head of the House had been in Congress less than six years. So that certainly
    is changing.
- speaker: Interviewer
  text: Is that reflected in their philosophy and influence?
- speaker: Respondent
  text: Well, the House this year, as you well know, has operated under new caucus rules, where there is a great deal more
    openness of all the committee hearings, and meetings are open. Even mock-up sessions in many committee meetings are open
    sessions. The Rules Committee has certainly become much more liberal in granting rules than the previous one was.
