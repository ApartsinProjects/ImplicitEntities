collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Let me just start with the early period and home life. You were born in 1902 and I wonder if you could think back
    to what the house was like, the size.
- speaker: Respondent
  text: My wife was there yesterday, that's where I was born, Edgefield. I was born in the town of Edgefield, Columbia Street,
    I guess about three quarters of a mile from the court house. But we moved—it was three boys and three girls—and my father
    wanted the boys to work on a farm so we moved out of town, moved out to the country. So we grew up on the farm.
- speaker: Interviewer
  text: He specifically wanted you to have the farm experience, is that right?
- speaker: Respondent
  text: That's right. He wanted us to see how hard it was to make a living on a farm.
- speaker: Interviewer
  text: How large a farm was it?
- speaker: Respondent
  text: I was only about, probably four years old when we moved out there but I remember when I lived on the other street.
- speaker: Interviewer
  text: How many acres, do you recall?
- speaker: Respondent
  text: Well it was in several different tracts. I guess it must have been thirty or forty acres there and pasture, maybe
    ten or fifteen acres at the other place and then about seven acres I believe, right at the house. Then we had land in
    the country, we had about six or seven more acres, one place about a thousand and another. After I got older, why, he
    would take me out in the buggy before automobiles came in.
- speaker: Interviewer
  text: I was going to ask you, did you have a car, do you remember when you got your first car?
- speaker: Respondent
  text: We bought our first car in 1916, a Dodge automobile.
- speaker: Interviewer
  text: You remember that. And you were fourteen, did you drive it then?
- speaker: Respondent
  text: Yes I did. Before then we'd get in the buggy and ride out to these farms in the country. One known as Nicholson Place
    which is about seven miles from Edgefield. The other was the Hilgal Place, that was about twelve, fifteen miles from Edgefield.
- speaker: Interviewer
  text: Did you have a lot of farm equipment to run that farm?
- speaker: Respondent
  text: No, we didn't have any equipment at all, we didn't have any tractors.
- speaker: Interviewer
  text: So you had a lot of hired help, right?
- speaker: Respondent
  text: Well, the land out in the country was done on division of the crops. My father would furnish the fertilizer and the
    seed, and finance and everything and split the crop with the man who worked it. We would go out and talk with these people
    every few weeks—ride the buggy out and talk with 'em. My father would talk to me going out there and back. At the time,
    sometimes I thought I'd rather be playing, but after going with him several times I learned it was so much fun and I found
    it very interesting to be with him, and enjoyed being with him.
- speaker: Interviewer
  text: Did anybody else live with your family in the house, other than family?
- speaker: Respondent
  text: Well, except a man. We did have a white man—Logan, cousin of my mother's who lived with us and worked there on the
    place some. But we had some other people that worked there—I'm speaking now of near Edgefield—we had other people. We
    had a cook, and we had a man who worked in the field. When I got big enough my job was to milk the cows, so I milked the
    cows up until I went off to college.
- speaker: Interviewer
  text: How many cows did you have?
- speaker: Respondent
  text: Anywhere from three to half a dozen.
- speaker: Interviewer
  text: So what did you grow on these number of acres here and there. You had diverse agriculture?
- speaker: Respondent
  text: Cotton and corn chiefly, some grains. We generally grew enough oats to feed the horses, corn and oats.
- speaker: Interviewer
  text: So you didn't have any farm equipment for cotton, so it all had to be hand labor, right?
- speaker: Respondent
  text: Oh yeah. And when my neighbor went to war in about 1917, World War I, I bought his crop and worked it myself—I was
    about fourteen years old. I bought his crop and it helped him out, and then I thought I'd make some money. My brother
    and I actually bought it. He later became a doctor, obstetrician. He's delivered more babies than any doctors in Georgia
    or South Carolina, the older brother. At any rate, he didn't like to work much in the farm. I soon saw I wasn't going
    to get much work out of him so I bought him out. But it turned out he cleared about as much as I did because we had a
    drought that year. [laughter] But he was always cutting old frogs and snakes and things like that.
- speaker: Interviewer
  text: Did you ever get an allowance. You know, kids today want an allowance. Did you get a weekly allowance for doing these
    jobs around the place?
- speaker: Respondent
  text: No, I don't believe we got an allowance. But I worked—I clerked in the store some on Saturdays. Clerked for Mr. Bob
    Dunovant Mr. J. D. Kemp. Also worked in a garage for George Adams on Saturdays in the summer time—not all summers but
    some times, maybe for a month. I had to work on the farm chiefly. When I clerked—well, I guess I was about fourteen, fifteen—I
    worked on the farm until I got big enough, then do that. And I still did some, my father required us to work on that farm.
- speaker: Interviewer
  text: Do you have a nickname?
- speaker: Respondent
  text: No I don't.
- speaker: Interviewer
  text: They just called you that Thurmond boy. What did they say, they didn't call you . . .
- speaker: Respondent
  text: I don't think any special nickname. I have an unusual first name. My mother was a Strom—S.T.R.O.M. they pronounce
    it, back then it was S.T.R.U.M.
- speaker: Interviewer
  text: Tell me about holidays at home, Christmas, Thanksgiving. Can you remember, think back, what that was like, what was
    served, any special dishes.
- speaker: Respondent
  text: Well we always had good meals at our house. My father was a good lawyer and made considerable money practicing law.
    And we grew our own vegetables and we produced our own meat—hogs, hams.
- speaker: Interviewer
  text: Did you slaughter them right at the place?
- speaker: Respondent
  text: Yeah, once a year, slaughtered at the farm.
- speaker: Interviewer
  text: Almost self sufficient.
- speaker: Respondent
  text: Self sufficient. We grew our wheat and took it to the mill and we got whole wheat flour. He was way ahead of himself
    I guess that's the reason that today I still get bran from a mill to use—you know, it kind of puts hay in your stomach.
    [laughter] That bran's the kind we used to feed the calves when I was growing up. But we'd get the whole wheat—I mean,
    we'd grind the wheat into whole flour. And we also had corn and ground that in the mill; and produced the hams and shoulders
    and sausage and everything of that kind—we cured in the smokehouse. [laughter]
- speaker: Interviewer
  text: Tremendous. You know, it's just impossible to do that today.
- speaker: Respondent
  text: We used salt and some salt peters.
- speaker: Interviewer
  text: Did you have any pets yourself, a dog?
- speaker: Respondent
  text: Well, my father gave me a calf once. Then that calf grew up and she had calves and he started me off that way in business—livestock.
    And then he later bought a horse for me—it was the prettiest little red horse you ever saw—a little mare. But she jumped
    the fence one day and got in the field where we'd cut some hay recently, hay, and she ate too much and puffed up and died.
    Nearly broke my heart. At any rate, we produced just about everything we needed. We'd kill a calf occasionally.
- speaker: Interviewer
  text: Chickens too, I suppose?
- speaker: Respondent
  text: Oh, we had chickens. The chickens run under the house as soon as they could tell when you were going to pick one to
    kill. I'd have to go under there and get 'em out.
- speaker: Interviewer
  text: I'd like to switch to your parents, if I could now. Your father was an attorney, can you give me a little background
    on his education?
- speaker: Respondent
  text: He grew up down in what is known as Hawkins Creek—it's between Steven's Creek and Savannah River. And he rode about
    six to eight miles to school every day on a horse. His mother taught him, he said—he learned more from her than anybody
    else. She was English descent, born in New Orleans. She was well educated, I don't know whether she went to college or
    not. But, I remember her quite well—she died December 13, 1913—I was eleven years old. She was excellent in grammar. And
    he accepted his ambition and his ideals from her. His father fought in three wars. He fought in the Indian wars, in the
    Mexican wars, and the Confederate war.
- speaker: Interviewer
  text: That's George Washington Thurmond, isn't it?
- speaker: Interviewer
  text: He fought in three wars. Cherokee war?
- speaker: Respondent
  text: That's right, the Indian wars, yeah. He went out, way out to Texas, lived out there awhile—Houston, Texas. What's
    that town right near Houston, a fort town.
- speaker: Respondent
  text: Galveston. He lived there a while. I think he's still got some—he was married twice—some of his children or descendants
    are out there. At any rate, he came back to New Orleans and met my grandmother and married her. And that's when it took
    a long time to get around, well he got around somehow. He was an outdoorsman, kind of a roaming sort of fellow, and just
    went all around. He could drink liquor and work out in the open, had all of his teeth at eighty four, his hair too. Died
    at eighty four. But didn't seem to hurt him.
- speaker: Interviewer
  text: Now that was your father's father.
- speaker: Respondent
  text: Yeah. G. W. Thurmond. He was tough, he was really an outdoors man. His wife was a very literary woman. Miss Felter,
    she was a Felter.
- speaker: Interviewer
  text: Mary Felter.
- speaker: Interviewer
  text: Did your father go to college for long?
- speaker: Respondent
  text: He went to school out there in the country. Then later he went to the University of South Carolina for one year. That's
    the only college education he had. He studied law in the office of Governor Shepherd.
- speaker: Interviewer
  text: John C. Shepherd.
- speaker: Respondent
  text: Yeah. He stood the bar and they cited three of those who stood the bar for having excellent papers, and he was named
    first. Supreme Court cited three of 'em, just having such excellent papers. He was a good student, he had a very able
    mind, a blest lawyer I ever knew.
- speaker: Interviewer
  text: Do you think he viewed himself as a success, your father?
- speaker: Respondent
  text: Well, I don't know whether he did or not. I think, it was unfortunate, one time he had to kill a man. If it hadn't
    been for that I think he would have been governor or come to the senate or something. After that, I think he probably
    felt that he was hampered. Although he was appointed—he was solicitor at the time—he shot this man and killed him. And
    then after that he didn't run, he'd but he finished out his term, that was about the middle of his second term. Only later
    he was appointed here as District Attorney by Woodrow Wilson, so that did not keep him from getting that appointment.
    Benjamin R. Tillman recommended him for it. He was a best friend of Benjamin R. Tillman, he was his attorney, his personal
    attorney. Tillman relied on him, he was his campaign manager.
- speaker: Interviewer
  text: That's coming up. So I just want to ask a couple of more things about your father. Was he home much of the time?
- speaker: Respondent
  text: Well, he travelled. He had a branch office in Saluda, he had one in Lexington. He could go by train to Lexington,
    but he had to go by a buggy to Saluda at that time. He was home later a good deal, later in life.
- speaker: Interviewer
  text: Did you do a lot together, you told me about those buggy rides, but besides that?
- speaker: Respondent
  text: Not so much, he was so busy.
- speaker: Interviewer
  text: Hunting together, or fishing, or anything like that?
- speaker: Respondent
  text: Well, occasionally he went hunting, but I didn't go hunting with him very much. I was away in college. After I came
    back and started practicing law he started having—one attack before then—he started having heart attacks and had 'em for
    six to eight years. He was too stout, didn't take enough exercise, and he was writing this law book—Thurmond's key cases.
    In other words, he didn't follow a course that was healthy that he should have done. Every time he'd have a heart attack,
    why his pulse would go down to about fifteen. First time we thought he was going to die, but the doctor'd come, give him
    a puncture. He'd get over it in ten minutes, he's just as normal as ever before.
- speaker: Interviewer
  text: Give him a puncture?
