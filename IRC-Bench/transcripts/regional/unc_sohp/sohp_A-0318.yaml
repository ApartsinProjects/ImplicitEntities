turns:
- speaker: Interviewer
  text: Are you what types of activities are you involved in now that you're not in the legislature? Continuing with education
    in the?
- speaker: Respondent
  text: That's right. And causes like social services and world hunger, and also North Carolina hunger. After all, we have
    a lot of people right here in Mecklenburg County who are hungry.
- speaker: Respondent
  text: And we went from the food stamp I mean, from the commodities to the food stamp program. But as of July 1, the last
    nineteen counties of the one hundred will come under food stamps, whether they like it or not.
- speaker: Respondent
  text: Mental health, the whole bit.
- speaker: Interviewer
  text: If we may, let's sort of take the general view, you might say, of Charlotte, and try to identify sort of some of the
    competing groups or the competing blocs. Like, for instance, how powerful do you think the Chamber of Commerce is, this
    sort of thing?
- speaker: Respondent
  text: Well, I'm the wrong person for you, at that part, because I was a member.
- speaker: Interviewer
  text: Then, what is your view, then, of?
- speaker: Respondent
  text: I was a member for a long for a good many years. But I was a member because I thought they were a reputable organization,
    and I liked what they were trying to do. But never once did they recognize the fact that we had a lot of executive women
    here, and they weren't giving us a fair show, and so some of us just pulled out. And my company didn't pay my way, as
    most of the men function. You see, most of the companies pay a company membership and then send so many men. But some
    of us who were trying to work through them, paid our own way.
- speaker: Interviewer
  text: And what is your business?
- speaker: Respondent
  text: Well, right now I'm forced to be at home because my husband's ill, I have to be home because of him I won't be able
    to see him. I don't want him to hear my voice.
- speaker: Interviewer
  text: Okay. Well, to the Chamber then. Does the Chamber a lot of folks say, you know, the Chamber's the most powerful group
    in the town.
- speaker: Respondent
  text: No, the Chamber is not the most powerful group, except that it gathers together the money group, and I think the money
    group has to learn that the people that make the money for them are important.
- speaker: Interviewer
  text: Do you it was said at one time that in the late '50s or early '60s that for getting something done in Charlotte, it
    was more important to be president of the Chamber than to be mayor of the city.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Do you agree with?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Do you think it's still that important?
- speaker: Respondent
  text: No, I think the Chamber has been reduced in stature considerably.
- speaker: Interviewer
  text: Is this because of other groups sort of coming in?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Would this include the blacks and?
- speaker: Respondent
  text: No, I think Central Piedmont Industries has more clout than the Chamber now. Do you know that organization?
- speaker: Interviewer
  text: That's sort of the industrial organization?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Does that actively recruit candidates for the local elections?
- speaker: Respondent
  text: No. But it does support.
- speaker: Interviewer
  text: And those that it supports?
- speaker: Respondent
  text: Usually make it.
- speaker: Interviewer
  text: That's sort of interesting that you would mention Central Piedmont Industries, 'cause the next thing I was going to
    ask is how powerful are certain downtown interests. I mean, with the urban redevelopment, what not, it would seem that
    downtown interests would have a very important desire to get in there with the decision-making.
- speaker: Respondent
  text: As individuals.
- speaker: Interviewer
  text: But not as an organization.
- speaker: Respondent
  text: Not as an organization.
- speaker: Interviewer
  text: That doesn't have any let me ask you this. Is there what maybe sociologists or political scientists might call a power
    structure in Charlotte?
- speaker: Respondent
  text: Well, I question the structure the term "power structure," because a group of individuals will get together and be
    a self-appointed power structure. Actually, they have no power other than amongst themselves. Let's I thought I had here
    something that would point that out.
- speaker: Interviewer
  text: So you think that it's more of a position where there are various competing groups, but there's not really one collection
    of people, or whatever, that?
- speaker: Respondent
  text: The Central what do I call it? Let me see.
- speaker: Interviewer
  text: Central Piedmont? Central Charlotte Association?
- speaker: Respondent
  text: Yes. They used to be called the Downtown Merchants Association. If I say it wrong, it's because I can't quite of course,
    I can check it. I've got a silver bowl they presented me with in there. But then it changed names, and I think it's now
    called the Central Charlotte Association, if I'm right. I hope I am. They took upon themselves the task of elevating women
    to their proper state, in recognition purposes. And they united all of the downtown merchants, as you say, to do that,
    and have been most successful with it. But, see, I'm what? I don't if you were a candidate running for office, they'll
    tell you they don't participate in politics. The fact that they're in business, to me, makes them participate in politics.
- speaker: Interviewer
  text: By the nature of where certain things might be located, or certain streets might?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Is there a chance that the power structure is not so visible, I mean, that maybe there is something there, but it's
    not visible because they don't run for public office? It's sort of a behind the scenes structure, or something?
- speaker: Respondent
  text: They would like to be the king-makers. They would really like to be the king-makers. But it ends up that whoever puts
    in the money gets to be what that so called "power structure" one man just died about last year, he put in a good bit
    of money and he wanted to control candidates. Needless to say, he never controlled me and I didn't.
- speaker: Interviewer
  text: Who was this?
- speaker: Respondent
  text: Dwight Phillips.
- speaker: Interviewer
  text: Dwight Phillips, the big real estate?
- speaker: Respondent
  text: Real estate. He used to be a chauffer for the original U. S. senator. And you've got to go into the background of
    these people in order to really understand how they got where they are. It was the almighty dollar that got them there,
    it wasn't their academic training or their brains in most instances.
- speaker: Interviewer
  text: Mentioning Dwight Phillips brings up sort of the question about real estate interests in Charlotte. You take him,
    Mr. Paul Younts was involved in real estate.
- speaker: Respondent
  text: Charlie Ervin.
- speaker: Interviewer
  text: Charlie Ervin is.
- speaker: Interviewer
  text: Have they exerted a good deal of influence over?
- speaker: Respondent
  text: Younts did. He was the king-maker of the Democratic Party for many, many years, from the time he was indicted by the
    federal court.
- speaker: Interviewer
  text: For campaigning for Roosevelt and?
- speaker: Respondent
  text: No, what he actually did was that he as postmaster made the employees ante up funds to the party. And he was indicted
    and got a suspended sentence because he joined the military.
- speaker: Interviewer
  text: I've heard that he marched into court with his uniform on and the judge suspended the sentence. What about Charles
    Ervin, is he still?
- speaker: Respondent
  text: He seems to have sold his business to some outsiders and turned loose if he is pulling the strings from behind the
    curtain, OK, but he's not being very evident, to public view.
- speaker: Interviewer
  text: He seemed to have been important perhaps with Brookshire to some extent. There was a question when Gib Smith ran in
    '65, I think, as to which way Charles Ervin was going to go. He had promised his support to Brookshire, and, then, to
    Smith, had just gone into business with him, ah, Ervin had just left Belk's. Now, let me ask you this. In 1961, the campaign
    for mayor, it was said that it looked like you would probably win and that the downtown didn't want you and they recruited
    somebody else.
- speaker: Respondent
  text: They recruited three others and then Brookshire. They didn't want me because at that time I was considered a wild-eyed
    radical and all I was doing was giving the Negros an equal opportunity and they didn't want it and now they have more
    than I ever anticipated.
- speaker: Interviewer
  text: And you think that was the sole reason really that?
- speaker: Respondent
  text: That I lost the campaign. Because the vote was so small, plus the fact that when I went to some polling places, as
    you do, visiting them on election day, some of the workers said, "Here she comes. Here's the nigger-lover." And so, I
    called the police and demanded a citizen's arrest and I called Mr. Brookshire and said, "If you don't get these people
    off the polls, I'm going to subpoena you."
- speaker: Interviewer
  text: Did that work?
- speaker: Interviewer
  text: But you think that was the major factor?
- speaker: Respondent
  text: That's the major factor. But today, we don't have the cohesive black group that we had then. They are dissipated as
    much as anybody else today and there is no real power structure, single power structure.
- speaker: Interviewer
  text: In either community, or the co
