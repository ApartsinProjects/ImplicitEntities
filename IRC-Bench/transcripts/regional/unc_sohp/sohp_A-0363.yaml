collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: The SRC [Southern Regional Council] could only do so much and it did it not because it could itself generate the power
    to change and so on, but that it could opportunistically piggyback on the real forces of change that were really working
    on the South. Amplify and popularize—and some of it was illusion, but—popularize the amount of change that was taking
    place in order to try to get some momentum and creditability behind it. This is an obligato to the main theme and the
    main theme had to played by the forces that wielded power. As it turned out—it became increasingly clear to me—that the
    real sine qua non went on was to reach the point at which a sufficient number of blacks simply said, "we're not going
    to have it anymore, we won't take it anymore. We'll break all the rules, we just won't do it."
- speaker: Interviewer
  text: That point came in 1955?
- speaker: Respondent
  text: It came in different forms. It came first in the form of litigation. I would date it from 1950 when the school cases
    were switched, equalization cases to desegregation. That was the beginning of it. Up to that point the whole thing was,
    as you know, they were all equalization cases. Equalization of teachers' salaries and. . . . They hit them first on higher
    education. Those were equalization suits, too. The strategy there was a little different because you couldn't achieve
    equalization in higher education. There was no way to it. it. you had too few. . . . They tried by establishing black
    state colleges, universities and law schools, graduate schools. Remember the Texas thing?
- speaker: Interviewer
  text: Maybe Thurgood Marshall and them knew that it couldn't be done at the elementary and secondary level either and that
    the ultimate result would be . . .
- speaker: Respondent
  text: That was absolutely the strategy. From the time I got involved in it in mid-'47 it was absolutely clear to me that
    the really serious people in that movement, however cautious and however qualified and moderate a stance they might adopt,
    there wasn't a damn one of them that didn't know that desegregation had to happen, and not a one of them that didn't know
    that that was the right thing to happen. All these other things were stratagems and ploys. There were some people who
    were around on the fringes of the movement who perhaps felt that it never had to come to that. They were so few they were
    meaningless. What you had in the case of a V. [Virginius] Dabney and so on, these were not people who really felt that
    you could achieve a just and decent society and a stable new order based on segregation. They knew you couldn't do that;
    they just didn't want to pay price of saying it out loud. They hoped somehow it could come to pass simply by exposing
    the weaknesses of the racist South or without ever having to say, "Jim Crow must go."
- speaker: Interviewer
  text: Or it is possible, I think, that some of them really just could not abide the thought that segregation was going to
    go, that there was going to be a mixing of the races in the South and therefore, they just really joined the other side.
    They joined the opposition. John Temple Graves in Birmingham would be an example of that and George port Milton in Chattanooga.
    I also think V. Dabney was another person who really never was ever able to be comfortable with the notion that that was
    the goal, even long term.
- speaker: Respondent
  text: I think people like that really wanted to moot it. They wanted to let that remain ambiguous. Let's work on these very
    limited goals today to make this a less unjust and more humane society and system and let the future take care of all
    that. Sure, sometime in the future the people will do things that we don't want to do and that we don't know how to do.
    But, we want to work at today's little problems, and let's satisfy ourselves. It's not going to happen in our lifetime,
    anyway. There was this belief in a very, very so slow a march of change that nobody would get hurt in the process. Everybody
    would have time accommodate. Most people alive at the time would never have to deal with the naked reality of it in the
    end. Future generations. It was that kind of gradualism that took the edge off. I don't think there was anybody to speak
    of in the movement who ever was a part of that movement, who broke at all out of the purely paternalistic mold of, "we're
    good to our slaves, our peons, and our servants"—anybody who got beyond that who didn't begin to see and really feel deep
    down that sometime it was going to have to happen, and that the movement was in that direction. It was a terrible price
    to pay to cut yourself off from your society, your tradition, and to be ostracized. Everybody knew that was what was involved.
    To be a pariah. To have people to shun you. . . . The most awful example of it was Waites Waring. This was the awful spectre
    that haunted people like that. To be cut off and renounced and a pariah in their society.
- speaker: Interviewer
  text: Can you think of anybody white who took that position by the time SRC was formed?
- speaker: Respondent
  text: Took what position?
- speaker: Interviewer
  text: The position that Jim Crow had to go and that we might as well face up to that and deal with it.
- speaker: Respondent
  text: Sure, there were a few around. Lillian Smith.
- speaker: Interviewer
  text: She's the only one that I can find. Will Alexander did in an article in The Atlantic in 1945.
- speaker: Respondent
  text: Yes, but he wasn't much interested in playing that prophetic role. His interest was in strategy. There were some,
    like Clifford and Virginia, the Durrs, Dombrowski, Clark Foreman—and they were generally regarded as the people on the
    left. They didn't have much time for the Southern Regional Council because it was seen as too wishy-washy. Well, you know,
    Lillian Smith. . . . That's a fascinating business. I guess you read all that about Lillian Smith and Guy Johnson going
    at it.
- speaker: Interviewer
  text: And Saunders Redding.
- speaker: Respondent
  text: Saunders Redding.
- speaker: Interviewer
  text: Saunders Redding was a very good writer.
- speaker: Respondent
  text: Yes, he was.
- speaker: Interviewer
  text: Did you know him?
- speaker: Respondent
  text: No, only by reputation and performance.
- speaker: Interviewer
  text: He was a good writer and he was one of the best.
- speaker: Respondent
  text: Yes, he was. You could find them, but most of them when they got to that point left. They got out of the South, which
    was exactly what I was planning to do when I went back after college. But then I ran into McGill [unclear] to think there
    might be something more to it.
- speaker: Interviewer
  text: Odum wasn't out there in the . . .
- speaker: Respondent
  text: Odum had a very interesting approach. In many ways he was the godfather of the southern regional idea stemming from
    his great work, Southern Regions. His idea was to bypass race entirely. He never envisioned a racial advocacy organization.
    He wanted to see a Southern Regional Council that was addressed to the whole broad development, 20th century development
    of the South, economically, socially, culturally, in which race would sort of get lost in the grand design, the euphoria
    of marching into the future. He wasn't really very happy about what happened to the Southern Regional Council when it
    turned out that. . . . It's funny that a man of his intellect couldn't have seen that there was no way you could stand
    in some broad ground. A lot of people wanted to do this. They wanted to be a Fulbright, take the high ground, the world
    view, the grand international role for this country and the South fulfilling its grand tradition in the nation on these
    broad issues of industrial development. Henry Grady was a perfect prototype for all this.
- speaker: Interviewer
  text: You don't get any mud on your spats.
- speaker: Respondent
  text: No, and it's beneath you to sit around and be screeching about water fountains and busses and bus stations and things
    like that. That's beneath you. Fulbright would never. Hell, he's a man of renown, a world leader.
- speaker: Interviewer
  text: Odum sort of falls in that category.
- speaker: Respondent
  text: Well, Odum was in a different line of country from Fulbright and Henry Grady. He wasn't a journalist, he wasn't an
    international figure, he wasn't a senator.
- speaker: Interviewer
  text: He was a scholar.
- speaker: Respondent
  text: He was a major scholar and I think, unlike the others, he was not really in this for his personal aggrandizement.
    That wasn't what he was about. He was living in his head and he had built the body of work and a vision of the South moving
    toward a grand destiny of developing and modernizing and leading in the nation. Drawing on all its good traits, so to
    speak, its good traditions, its insights, its intellectual leadership, its cultural resources. There's a lot to that.
    But, drawing on those things and in the process without ever having to look at it straight on and talk about it straight
    out, transcending the race thing, rising above it.
- speaker: Interviewer
  text: In contrast to him, think of somebody like his boss, Frank Porter Graham, the head of the University. A man who by
    all rights should have been on a loftier plane, more remote, more aloof, more distanced and yet he was in the thick of
    everything that went on. How do you account for that, the differences? Is it just personality, the two of them? Or were
    they ideologically, philosophically separated?
- speaker: Respondent
  text: Oh, I think it's to be viewed in the totality of the personal development of the people involved. That's the only
    way I know to account for it. You have to look at the person's whole formative history to figure that out as to why they
    react in a certain way. Dr. Frank was a remarkable guy. Another guy who was not nearly as saintly in some ways as Graham,
    but take this tortured, ambivalent creature, wonderful guy, Ralph McGill. McGill suffered over this stuff a lot and his
    ambivalence which most people today, particularly the younger people, just cannot yet fathom. I can't tell you how many
    of them I have talked too say, "why did he do this, why did he fink out on this occasion, why did he say this at one time,
    why didn't he stand up consistently?" It's like saying, "why didn't that quarterback Montana throw the ball that way all
    the time?" The answer is that he was ambivalent, he didn't want to cut himself off from his society. He was devoted to
    his journalistic career and he was interested in a whole lot of things. He didn't want to be narrowly defined as a race
    mixing advocate as Rastus McGill, which is what they called him in Georgia, the segs. But, he couldn't help himself. He
    would see these naked examples of absolute cruelty and injustice and he would just respond spontaneously. He couldn't
    help it. Frank was like that too. He was less ambivalent than McGill and was much more willing and more readily accepted
    his moral imperatives. I think it was sort of a ‘with God helping me I can do no other, I've reached this stage of preception
    about it and I just can't duck it, I can't evade it.’
- speaker: Interviewer
  text: When do you think McGill reached that point?
- speaker: Respondent
  text: He reached it very incrementally, and gradually. I don't think he reached it fully until very late in his career,
    his life.
- speaker: Interviewer
  text: Around Brown time or later?
- speaker: Respondent
  text: Later. When you say fully he was like most of us, he was still reaching it. It's like saying, when have you fully
    matured? You don't ever fully mature. But he had gotten very comfortable with the role by the bus, I would say. Comfortable
    for him, anyway.
- speaker: Interviewer
  text: Think of him in contrast to Dabney. They were moving almost in opposite directions. They kind of passed out there.
    If you look at Dabney's record he was liberal on paper. In the early 30s he wrote a book called, Liberalism In The South.
    He was a classic civil libertarian. He took a lot of positions in those early years that were in defense of individual
    liberties.
- speaker: Respondent
  text: He didn't take any position against segregation, though.
- speaker: Interviewer
  text: No, he never did, except for one time—and even this you have to qualify—in 1943, he took an editorial position i
