collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I would like to begin by getting you to give me some personal background about where you were born and raised and
    where you went to school.
- speaker: Respondent
  text: Well, that's interesting because I have just been turning out some stuff—I'm working on a project myself—I start with
    Martin Luther King, but I go back to the days when I was a boy working as a carhop for an American naturalized Greek in
    Memphis. My wife and I both grew up in Memphis.
- speaker: Interviewer
  text: Were you born there?
- speaker: Respondent
  text: No, I wasn't born there. I was born in Mississippi.
- speaker: Interviewer
  text: Where in Mississippi?
- speaker: Respondent
  text: At a place called Bentonia, Mississippi, about twenty miles from Jackson. In fact, my wife and I were just there this
    past summer. I went back to this small town and the curious thing about it is that we pulled into the little square of
    the town where as a boy—six or seven years old—I remember that my father and I used to come into town and in that square
    we used to sell watermelons and everything. The old stores, some of them are still there. The old railroad track is still
    there and the railway station is still there, a little weather-beaten place. But anyway, I asked some chap who was standing
    there by his car about some people that my parents knew whom I was trying to find. He said, "you know, people your age
    either have all died or they have moved away." Then he pointed across the track and said, "go over to that undertaker
    parlor and you will meet a young woman who can tell you who is still here and who isn't." There was one man there that
    I grew up with as a boy but he was away at the time.
- speaker: Interviewer
  text: You found very little . . .
- speaker: Respondent
  text: Very, very little. . . . Some of them knew my parents especially this man we tried to find. Just about everybody had
    moved away.
- speaker: Interviewer
  text: Is it Bentonia?
- speaker: Respondent
  text: Yes, that's correct. Very small town.
- speaker: Interviewer
  text: What county is it in?
- speaker: Respondent
  text: I think it is in Hinds County. The other thing that struck me was the attitude of the people. Of course, this takes
    in most of the South, I guess, how those things have changed over the few years in contrast to when I was there. When
    we moved away from there I was about eight or nine years old. We moved to a place called Ruleville, Mississippi. Of course,
    we were farmers. My parents were sharecroppers. In those days I still remember a man riding around on a horse with a gun
    on his hip. He was the overseer and you never argued with him about anything. He just said this and you did it. We would
    be in the fields chopping, my mother and others. My mother married again—I was her child and I had three stepsisters and
    one stepbrother. All of them are gone now except one. We would be working along in the fields and this man would ride
    up on his horse. This was not only true in our case but true for just about everybody there. I remember one day we had
    just started to school—I was about eight—and it was held in a rural church for blacks, and the whites went into town where
    they had their school. We came across a house and there was a big sheet lying over a man's body and his feet were protruding,
    we could see that. That frightened the heck out of us and we ran all the way to school which was about another mile. When
    we got there the teacher told us that this was a man who was killed because he had some words with the overseer. Nobody
    ever investigated the killing.
- speaker: Interviewer
  text: That must have frightened you to death.
- speaker: Respondent
  text: Yes. That's the kind of atmosphere we grew up in. About a year later we moved away.
- speaker: Interviewer
  text: What year were you born?
- speaker: Interviewer
  text: You were born in 1919?
- speaker: Interviewer
  text: The year 1919 came to be called the red summer because of all the blood that was shed by blacks in riots and whatnot
    right after the world war I.
- speaker: Respondent
  text: Yes. All those cases were down in Texas.
- speaker: Interviewer
  text: Yes. A huge big riot in Texas and in Chicago and Detroit and in Knoxville, Tennessee.
- speaker: Respondent
  text: I didn't remember that. Isn't that interesting!
- speaker: Interviewer
  text: Also, across the river there in Arkansas up around Elaine, Arkansas, there was a big riot. It was over essentially
    what you're saying that somebody dared to . . .
- speaker: Respondent
  text: You didn't talk back, you never talked back to. . . . No blacks could ever talk back to whites. When a white person
    said something that was it and you'd just say, "well, sir, what do you want me to do?", or something like that and go
    ahead then you'd mind your own business. We left Ruleville. I remember one night we heard a knock at the door and it was
    one of our neighbors' who came from a nearby farm. He told my mother that he had heard from Oliver. See, our father left
    quickly after that because he had had a word with the overseer and it was best for him to get away quickly.
- speaker: Interviewer
  text: Out of Bentonia or out of Ruleville?
- speaker: Respondent
  text: This was Ruleville. We had moved to Ruleville. We hadn't heard from him in two or three weeks. He just disappeared
    and that was pretty typical of the black sharecroppers in those days, you just went away and then send for your family
    later. He said, "I'll come for you and take you to Ruleville so you can get away." About three nights later, about midnight,
    he came with a wagon and we loaded a few things on it. Then we drove to Ruleville and escaped that way by train. We went
    into Helena, Arkansas, and from there over to a place called Forrest City and then from there to a place called Marked
    tree. In Marked Tree—I was getting older—we met a different kind of overseer. This man was a white man, Mr. Shaw, who
    ran a small farm near Marked Tree. He worked in the fields with everybody else.
- speaker: Interviewer
  text: This would have been about when?
- speaker: Respondent
  text: This would have been in the early 1930s.
- speaker: Interviewer
  text: You would have been about eleven years old?
- speaker: Respondent
  text: Exactly. We worked on the farm there. There was a church school not far from where we lived. Whenever the crops were
    laid by and there was a break in the spring or summer, we could always go to school. He was very liberal in that respect.
    He had three kids himself, a daughter and two sons. They went into Marked Tree to school. He used to say, "Learning is
    good for you, so go to school. I send my kids to school, so you go." We went to school and we had no problem there. We
    stayed with that man about four or five years. Then, a few of the young fellows—older than I was at the time, seventeen,
    eighteen or twenty—would disappear, go some place and come back and say, "oh, we found work here, work there, where you
    can make money." Then we heard about Memphis. I did very well at the school I was attending. The teacher, Miss Olla Walker,
    whose name I will never forget, came by to see my parents. She said, "Why don't you see if you can arrange for Willie
    to go to school somewhere I have taught him just about all I can teach him and I think he has good possibilities. If you
    can find a school for him someplace in a big town where he can live with somebody until school is over, do that." My mother
    and father agreed to that. About a year later when I was fourteen I left Marked Tree one Saturday with a couple of other
    boys and we caught a cotton truck heading to Memphis.
- speaker: Interviewer
  text: Let me ask you a couple of things. When you lived in Arkansas did you or your family have any connection with or knowledge
    of The Southern Tenant Farmers Union?
- speaker: Respondent
  text: We had heard about it but . . .
- speaker: Interviewer
  text: It didn't affect you, it didn't reach to where you were?
- speaker: Respondent
  text: It didn't reach to where we were. It was vague to see something like that. We lived on a farm and to show you what
    happened in Marked Tree, there was a white family that moved across the road from us, two white families. We always got
    along fine with them. For some reason there was a comradeship.
- speaker: Interviewer
  text: Different atmosphere than you found in Mississippi?
- speaker: Respondent
  text: Oh, in Mississippi it was completely different. It was different entirely. They would come to our house and if we
    had something that they needed and didn't have, my mother would let them have it. We would go to their house and it was
    the same way. The only skirmish we had with a white family at that time was one night. . . . They used to come to our
    church, because they had no church there. It was the same place where we went to school. At this church they would come
    in and sit on the front row and listen to the minister. There were two or three of them. Then the next Sunday some more
    would come. We got quite a few and they kept coming and coming. They liked the singing and they liked the preaching. That
    always amazed me why they would come to our church. It was a kind of friendliness there that existed. On one occasion
    the whites were holding a church service in an empty house and we went to that. We went there and stood up through the
    service. After it was finished we left—one of our white neighbors took us there—and on the way back in the dark a group
    of youngsters threw rocks at us. We didn't run and the next day we told this white man who was with us, Mr. Armstrong,
    and he said he would find out who did that. Several days later he came up and told my father that we wouldn't have any
    more problems with this anymore. Apparently it was somebody in the neighborhood and he just explained everything to them.
    When I left and came to Memphis it was the first time I had ever seen neon signs. It was so exciting and I looked at those
    lights going around, it was fascinating. I never saw so many people in one group and in one place. Everybody congregated
    on Beale Street, all the blacks did.
- speaker: Interviewer
  text: That was a very exciting thing, wasn't it?
- speaker: Respondent
  text: It was extremely exciting. We didn't have any place to stay. One of the fellows with us had an aunt there and we went
    to her house.
- speaker: Interviewer
  text: Just you and two other fellows?
- speaker: Respondent
  text: Yes, that's all.
- speaker: Interviewer
  text: Young boys?
- speaker: Respondent
  text: Young boys, fourteen and fifteen years old. That's all we were. The oldest one, the man who had his aunt, was about
    seventeen. He took us to his aunt's house, but she had no room. So, we spent the first night under a bridge on the highway.
    The next day we went back to her place and washed up and then we started looking for jobs. To show you how naive I was
    in those days, I went to the fire department—there was a fire station on the corner of one of the streets—I walked in
    there and asked them if they had anything to do, I could do anything. The man looked at me and said, "no, you go right
    there on the corner and there's a Greek who runs a drive-in place there and you might ask him. He might give you something."
    So, sure enough, I went there and I confronted him and he said, "oh, yes, what can you do?" I told him I was from the
    country. He said, "can you pick up those dishes off the table that are outside?" He had this large terrace outside. I
    told him I could, so I started as a busboy. A couple weeks after that he said, "you do so well at that, maybe you can
    wait tables." I had watched the other fellows do it and I said, "yes." I stayed with that man almost fifteen years.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: I mean off and on. All the way through high school and partly through college—LeMoyne College in Memp
