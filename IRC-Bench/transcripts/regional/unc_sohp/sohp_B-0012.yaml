collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Can you tell me more about this period of your life when you were at the Printery and interested in making money?
- speaker: Respondent
  text: Yes; I saw that that wasn't my main like.
- speaker: Interviewer
  text: No, wait a minute. I think what we were talking about is this period in your life when you knew the moneyed people.
    Can you tell me a little bit about that?
- speaker: Respondent
  text: 'Yes, I can tell you a lot about it. I just was sitting around the fringes, but I saw how insincere it was, and how
    everybody was scrambling to get something for himself. There was a man named Reuben Rink that lived at Kernersville. He
    had been Buck Duke''s salesman; he''d been ordered to go all over the world, and paint signs on the pyramids and everywhere
    in sacred places. And he became quite famous: Reuben Rink.'
- speaker: Interviewer
  text: Did you know him?
- speaker: Respondent
  text: I knew his daughter, and nearly married her.
- speaker: Interviewer
  text: Didn't you also know Bill Erwin's daughter Margaret? Bill Erwin, the man who headed the Erwin Cotton Mills?
- speaker: Respondent
  text: Yes. They were very snooty, and thought they were lords of the manor and everybody ought to bow down. She finally
    married a policeman in Charlotte.
- speaker: Interviewer
  text: Did you go to their house? Did you ever go to the Erwin mansion calling on the daughter?
- speaker: Respondent
  text: Yes, I've been in the mansion.
- speaker: Interviewer
  text: And did you meet Mr. Erwin?
- speaker: Respondent
  text: I don't know; it was unimportant to me. I never had any love for him or any adoration. He was clean out of my world;
    he was part of the Dukes. And the other cotton mills and the Duke Power Company and all that stuff was simply to grind
    money out of people any way you could.
- speaker: Respondent
  text: Linotype had been invented, and their representative (I forget his name right now) came down from Brooklyn and sold
    my father one for ten thousand dollars—went in the hole for quite a while with payments. But meantime he turned out the
    type. And I hung around and watched the thing, and he put me to work on the machine; he thought that would be a good spot
    for me.
- speaker: Interviewer
  text: On linotype?
- speaker: Respondent
  text: On linotype. It had a little dummy keyboard, and I practiced at night in my room and soon became proficient at it;
    it was interesting. And then he had a man from the factory that came down, and he was quite unscrupulous—I forget his
    name right now.
- speaker: Interviewer
  text: Was it old man Whittaker? You were telling me about old man Whittaker, who was the chief typesetter, who wanted a
    union. Can you tell me about him?
- speaker: Respondent
  text: Yes. Old man Whittaker was disgruntled and tired, and he'd worked hard all his life in a printing office. He needed
    a rest and he wasn't getting it; and he thought he ought to have more money and he wasn't getting it. And Henry Whittaker,
    his son, raised rabbits, and I bought rabbits from him and started me a rabbit hutch.
- speaker: Interviewer
  text: Is old man Whittaker the one who wanted a union?
- speaker: Respondent
  text: Yes. He was one of the bosses of the union. So he had a quarrel with me; and this fat boy from an orphanage, he wanted
    him to take my place and run the linotype machine and get the advantage of it. And my father didn't want that to happen;
    he wanted me to have it. He bought the machine and paid ten thousand dollars; he ought to have a say-so—you can see how
    the clash . . . And then the strike came on very suddenly and violently. They withdrew and put these ribald signs on the
    door.
- speaker: Interviewer
  text: What kind of signs did they put on the door?
- speaker: Respondent
  text: 'Oh, they drew them in the night, you know: "Old man Seeman and his boys are trying to run the town," and I don''t
    know just what all. But pulling fun at him, you know. And he was a hard-working man.'
- speaker: Interviewer
  text: What kind of wages was he paying them? What kind of wages was your father paying these people?
- speaker: Respondent
  text: Oh, he was paying good wages; he was paying full union scale.
- speaker: Interviewer
  text: And how many people were working in the printery about then?
- speaker: Respondent
  text: I reckon about fifty.
- speaker: Interviewer
  text: Did they all go out on strike?
- speaker: Respondent
  text: Not quite all, but a good deal of them.
- speaker: Interviewer
  text: And what did your father do?
- speaker: Respondent
  text: He put an ad in the Statesville paper, I think it was, saying he wanted all the hands that he could get (you know,
    good printers), and we would pay them good wages. And they began to come in; that's when that Robert Patterson came in.
    He was a good printer and he hung on for several years.
- speaker: Interviewer
  text: Did your father lock the other workers out? Did your father have a lock-out?
- speaker: Interviewer
  text: Ok. And how did you feel about this strike in the Seeman printery?
- speaker: Respondent
  text: Well, I was mixed up. I was trying to straighten out my ideas of right and wrong. From our side that was right; everything
    we did was right, and everything they did was wrong. But from their side it was different.
- speaker: Interviewer
  text: But did you feel angry at them? What were your own feelings?
- speaker: Respondent
  text: Yes, we'd been very friendly, and they'd come out to our house for Sunday dinner.
- speaker: Interviewer
  text: The workers?
- speaker: Respondent
  text: And then suddenly to turn against us, we didn't see the sense in that, but they did. They were bound by union rules.
- speaker: Interviewer
  text: Did you have strong angry feelings about it? I mean, did you feel they had wronged your father, or how did you feel?
- speaker: Respondent
  text: 'Well, that''s the difference: that''s the clash between union and non-union, between right and wrong.'
- speaker: Interviewer
  text: How did you personally feel about unions at the time of the strike?
- speaker: Respondent
  text: Well, I dealt so largely in fantasy and romance and travel and books that I was kind of aloof from the rest. I wanted
    the whole thing; I figured I'd build a business and be socially inclined, and freeze them all out—one of those big mistakes.
- speaker: Interviewer
  text: Because this is the period when you were interested in making money?
- speaker: Respondent
  text: And it didn't work. So I started a suit against my brothers, and got the same Bob Gant.
- speaker: Interviewer
  text: The lawyer, your family lawyer.
- speaker: Respondent
  text: And I figured that Bob Gant could buy them out. So after weeks and weeks he finally did, and got me twenty-two thousand
    dollars for my share. Then I invested it right away badly — lost it all. Some printers in Raleigh heard about my tangle.
    In our new company, called Seeman and Blacklaw, there on Roxboro Street, I believe it was, I had a big sign painted "Seeman
    and Blacklaw"—I was after advertising, the art. I was very impractical.
- speaker: Interviewer
  text: Was this at the point when the Dukes were beginning to expand the American Tobacco Company, and more and more business
    was leaving Durham, whereas before you had done a lot of their printing? Is this the time when Toms set up his own printery
    for the Dukes?
- speaker: Respondent
  text: He threatened to move out when they wouldn't do like he wanted; he threatened to move out of Durham and carry it somewhere
    else. Then where would Durham be, if he was going to take all our Duke interest away? There was a lot of friction going
    on all the time, to make money. If we just had it all, I could do business.
- speaker: Interviewer
  text: Can you tell me a little about when you were still a printer, and still in business but very dreamy? The strike at
    Erwin was going on; and did you tell me that you used to walk late at night after work and go over there and see the strikers,
    and see bonfires?
- speaker: Interviewer
  text: Can you tell me a little about that?
- speaker: Respondent
  text: It was cold, and fires all around, and these strong men hob-knobbing and talking. They were valiant.
- speaker: Interviewer
  text: Did you go out of curiosity? Why did you go? Or did you feel sympathetic towards them? Why were you there?
- speaker: Respondent
  text: 'It''s very clear in my mind, the fires and the reflections on the mill. That was something new for Durham; it was
    in all the papers, and the state papers. It was kind of like the Bolshevists'' movement: it was something new for unions
    to be stepping out like Communists. In fact, they were tangled up a good deal, and still are.'
- speaker: Interviewer
  text: Did you go many nights or many times to see the strikers at Erwin?
- speaker: Respondent
  text: 'Not so many, but several, to see what was happening. And there was action going on, and there was a clash between
    two ideals: the worker and the big rich.'
- speaker: Interviewer
  text: What were your views to the strikers at this point? You had told me earlier about when there was a strike in your
    own company.
- speaker: Respondent
  text: Yes, that's when I began to admire Paul Robeson.
- speaker: Interviewer
  text: Can you tell me a little more about Erwin?
- speaker: Respondent
  text: Well, I was told that this man was the key to the union in west Durham. And he said, "Yes. Come and have dinner with
    me at my factory, my little company shack where I live with my children and my wife." So I went there. He thought there
    would be eavesdroppers at his table. And he said, "Well, there's nothing that these people won't do to beat us down. They've
    bought this union out. The union has won, but they won't let them win. They're keeping them dangling by shoestrings to
    be sure they don't have any influence." And then he went out and stayed quite a while, and came back and said, "I wasn't
    sure but what you were a spy, and I went out to try out several letters to be sure you were Ernest Seeman, that you were
    who you say you were (because so much deceit goes on, and they'll do anything to beat us out)."
- speaker: Interviewer
  text: Were you there to interview him for a story, or were you getting information as part of your own development?
- speaker: Interviewer
  text: Why were you there?
- speaker: Respondent
  text: Then he explained that they really had no power; it was a powerless union, just in name only.
- speaker: Interviewer
  text: Which union was it? Do you remember?
- speaker: Respondent
  text: No, I don't; I didn't pay much attention. It was the cotton mill workers; it was organized into some union.
- speaker: Interviewer
  text: Were you there to interview him for an article, or were you there to get information for yourself? Why were you talking
    with him?
- speaker: Respondent
  text: I wanted to see how it was stacked up, see what progress they were making. It was satisfactory, and he did all he
    could do. But he followed me to the corner and said, "I've no power, and I'm afraid I never will have. They've got us
    sewed up in a bag, with every kind of crooked dealing. You can't expect us poor cotton mill workers that live in these
    shacks in poverty to have any power."
- speaker: Interviewer
  text: Was this a period in your life when you were going through change yourself?
- speaker: Respondent
  text: 'Yes, I think so: one of those periods—I''ve been through many, many changes. Well, about this time I married Julia
    Henry; and those people, their ideals and mine were not the same. He had come up from the farm . . .'
- speaker: Interviewer
  text: Her father?
- speaker: Respondent
  text: . . . and was a skinflint moneylender.
- speaker: Interviewer
  text: Her father was a moneylender?
- speaker: Respondent
  text: Julia's grandfather. And he had two sons. One son, Bob Henry, had kowtowed to a man named Walker, I think, a tobacco
    buyer, and he had helped him to get him onto the Phillip Morris cigarettes. And he had a big fine house in East Orange,
    New Jersey (Bob Henry did).
- speaker: Interviewer
  text: Did you tell me that her father at one time was Buck Duke's lead bookkeeper?
- speaker: Respondent
  text: Yes, he was chief bookkeeper. (He had them all graded). And he wanted more money (he wasn't getting enough); figured
    he could work more so he could get more somewhere else. So he told Mr. Duke, and he said, "I don't raise wages; when I
    think you're worth more to me I'll tell you." Meantime he fired him. And he went to somewhere in South Carolina; he had
    a little family then, and he had to support them. He said, "I can't live on this. I've got my girls to send to college."
    Right at the moment I don't remember the little town in South Carolina, but it'll come back to me some time.
- speaker: Interviewer
  text: Did he become a tobacco importer after he left Duke? What is Mr. Henry's first name (Julia's father)? Do you remember?
- speaker: Respondent
  text: Well, Julia's father had started a little export business. And he would buy cheap stuff (sweepings off the floor and
    all kinds of stuff) and sell it in Belgium and some other country where the poor people couldn't afford real cigarettes.
    And they smoked this trash export tobacco. He was making a pretty good living. He had a stemmery and used a lot of Negroes,
    and they went through the performance of stripping tobacco. And he had a man named Mr. Baldwin who was his overseer. Every
    Christmas Mr. Baldwin would send Mr. Henry (to curry his favor)—he represented some fish company in Norfolk on the side—a
    keg of oysters. Mr. Henry didn't especially care anything about oysters and know anything about them, and it was too much
    trouble opening them. So he would just have his man take them down in the garden and dump them in the ground and cover
    them up to get rid of them.
- speaker: Interviewer
  text: Did you tell me that at one point Mr. Henry was a man who had more ready cash than anyone in Durham?
- speaker: Respondent
  text: Yes. In his heyday he inherited some money from his skinflint father, and he could muster more cash than any man on
    Main Street.
- speaker: Interviewer
  text: Did the Dukes ever borrow money from him?
- speaker: Respondent
  text: Yes, Washington Duke did.
- speaker: Interviewer
  text: You were one of his sons-in-law; but I think you mentioned that his other son-in-law was a man named Arthur Ligon
    who headed the Arcadia Mills.
- speaker: Respondent
  text: Yes, Ligon cotton mills.
- speaker: Interviewer
  text: What was he like?
- speaker: Respondent
  text: Well, he was an awkward, fat, foxy-looking fellow, awkward in his talk. Everything was artificial. I can tell you
    a lot about Arthur Ligon. He dropped dead at his country club—he went with all the rich, and organized the Saint Cecilia
    dances in Spartanburg for Easter, I think it was, or Christmas. He and his wife (Julia's sister, Cecilia) led the cotillions,
    and they were the upper class. And then he had a brother; I forget his name, but he was upper class too. He had big stock
    in mills. And they were always building new mills; they added them all around Spartanburg (I forget the names right now,
    but four or five at least).
- speaker: Interviewer
  text: Was it before or after your marriage to Julia Henry that you became the head of Duke Press? Can you tell me how that
    came about?
- speaker: Respondent
  text: Well, his girls had all gone to Converse to be socially trained, you know
