collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Mr. Dabney, I wondered if you would mind beginning with just a brief comment about your ancestry?
- speaker: Respondent
  text: Well, of course, my father was a Dabney and my mother was a Davis. My father was the grandson of Thomas S. Dabney
    who was the subject of a very interesting book by Susan Dabney Smedes, who wrote this book about her father, Thomas S.
    Dabney, my great-grandfather. He lived in Gloucester County, Virginia, and moved to Mississippi in 1835 because his tobacco
    lands were worn out. He started a cotton plantation in Hinds County, Mississippi, and was extremely successful and one
    year he was said to have cleared $50,000, which in those days was really money. I don't know how much more you want me
    to say about that, he was ruined in the war and everything was wiped out. On my mother's side, John A. G. Davis, who was
    the chairman of the faculty of the University of Virginia, my great-grandfather, was murdered on the lawn by a student.
    They were having riots at that time and Davis went out on the lawn to see what was going on and one of the students had
    on a mask, and Davis went up to him to try to pull the mask off to see who it was, and the fellow pulled out a pistol
    and shot him.
- speaker: Interviewer
  text: What year was that?
- speaker: Respondent
  text: 1840. The year before, the previous chairman of the faculty had been horsewhipped by the students. It was really a
    lively era.
- speaker: Interviewer
  text: What was his middle name?
- speaker: Respondent
  text: John A. G. Davis. John Anderson Gardner Davis. I am a collateral descendant of Thomas Jefferson, I don't know how
    much of this you want me to put in. I am a direct descendant of Martha Jefferson and Dabney Carr. I guess that is enough.
- speaker: Interviewer
  text: Well, there is a Huguenot strain in your ancestry, isn't there?
- speaker: Respondent
  text: Well, it isn't Huguenot, we might clear that up. For a long time, we thought that we were Huguenots, but Dr. Charles
    W. Dabney, who was president of the University of Tennessee and of the University of Cincinnati, after his retirement,
    did a lot of research and went to England and looked at a lot of graveyards and records and found that they spelled it
    various different ways. It was d'Aubigne in France, and then they came to England and it became Daubney, or [unclear]
    or various things. He wrote an article in the Virginia Magazine of History and Biography for April 1937, which clearly
    proves to my mind that we were not Huguenots, but were Norman French and then English.
- speaker: Interviewer
  text: You have a grandfather, I believe, who was a newspaperman and for whom you are named?
- speaker: Respondent
  text: Yes, my unusual name, Virginius. A lot of people ask me how I got it, so I'll tell you for the record. My grandfather
    was just born at the time that his father moved to Mississippi from Gloucester County. His father was so distressed at
    leaving the grand old state of Virginia that he named his son Virginius. That's how I happened to inherit the name, which
    is regularly misspelled by everybody. I have gotten seventy-five different misspellings of my first and last names. You
    wouldn't think that was possible. [Laughter] I have a collection upstairs in a file. But that's the way that the thing
    started out and how I came to have that name. Shall I get to my birth now?
- speaker: Interviewer
  text: I think that you might mention a little bit about your mother and father. Your father was a historian?
- speaker: Respondent
  text: I was going to mention them after I was born, but . . .
- speaker: Respondent
  text: My father was a Heidelberg Ph.D. who came back to this country and taught in his father's New York Latin School for
    a year or so, and then went to Indiana University and was professor of history there. Then he came to the University of
    Virginia in 1889 as a low-ranking member of the faculty and succeeded the famous "Daddy" Holmes, George Frederick Holmes,
    when he became so old that he had to retire. And so, my father taught for forty-nine years at the University of Virginia,
    thirty-four of which he was the only history professor. He taught all the history and for nine of those years, he taught
    all the economics and for twenty-three years, he was Dean of the Graduate School. And at the height of his fame, he got
    $6000 a year. [Laughter]
- speaker: Interviewer
  text: He was a friend of Woodrow Wilson, I believe.
- speaker: Respondent
  text: He was a very good friend of Woodrow Wilson. One of Woodrow Wilson's nieces, I believe it was, wrote a book in which
    she says that my father was one of five intimate friends of Woodrow Wilson. He had a lot of letters from Wilson, which
    as you probably know, are in the University library, quite remarkable letters that are quoted by all the biographers of
    Wilson. He and Wilson had a very informal and relaxed relationship and kidded each other. Wilson was an entirely different
    individual in the company of his friends from those who saw him in public life and thought that he was very austere and
    difficult to get along with and aloof. He would write Father these very jocose letters and the only one that is not in
    the University of Virginia Library is the one that he wrote my father when I was born. He starts off, "O Thou Very Ass
    . . . " [Laughter] That's typical of their relationship.
- speaker: Interviewer
  text: How did this relationship start?
- speaker: Respondent
  text: They were at the University of Virginia together and became acquainted there, and Father got close to him in the fraternity,
    he was his protege in the Phi Kappa Psi's.
- speaker: Interviewer
  text: Did your father have any particular points of view or convictions that made an impression on you and about which you
    can talk?
- speaker: Respondent
  text: Well, yes, I think he did, definitely. He was, above all, extremely honest and honorable. He was so much so that I
    was very much impressed with that characteristic. I remember that I did something once that shocked him very much. I was
    supposedly trying to be a violinist - I never got to first base with the violin. I had to go downtown, walk down with
    my violin and take lessons and walk back. I was supposed to come straight home so that Father could teach me German or
    French; he was teaching me both of them. I got sidetracked. A friend of mine, John Staige Davis, lived on the way, going
    up Rugby Road, and I saw him in the yard and I decided that I wasn't going straight home, I was going to go in there and
    pitch baseball with him, which I did. We were throwing the ball back and forth and I looked up and saw Father coming up
    the road. I didn't think he saw me, so I ducked behind a hedge, like a fool. He went on by and I didn't think he had seen
    me at all. When I got home, I went to the water cooler that always stood in the hall, to get a drink. He was in his study,
    and he was very much hurt by my having ducked behind the hedge and he said, "Why did you hide from me?" I was so stunned
    that I said, "I don't know." I was so upset by that, and he was too. He never mentioned it again and I was careful not
    to do anything like that again. That's a very trivial incident, but it had significance for me. [unclear] was not only
    a historian, but a very fine linguist, not only in French and German, but in Latin and Greek, and he read Sophocles about
    as easily as he did Shakespeare. He tried to transfer the latter capacity to me, which was an utter failure. I wasn't
    good at all at Greek. I did very well in French and German, thanks to his method of teaching, which was quite unusual
    and maybe unique for that era. He didn't go for grammar at all and memorizing grammatical rules. It was his thought that
    you could learn a foreign language in the way that you learned your own language. That is, start very young and stress
    reading and conversation and just forget about rules of grammar. So, we started out with French and German that way. I
    was about seven or eight years old and it came so quickly and easily that by the time I was thirteen or fourteen, I had
    read probably ten times as much French and German as the average college graduate, and for no good reason except that
    I had such a fine teacher. I was mediocre at Greek, but I was pretty good at French and German. He did it. If I had started
    learning grammar, declensions and conjugations and all that, I would have been right back where everybody else was.
- speaker: Interviewer
  text: Don't you think that it's a little unusual . . . I read someplace that you didn't go to a formal type of school until
    you were thirteen.
- speaker: Respondent
  text: Yes, my father and my aunt taught me until I was thirteen and went to Episcopal High School. It was an advantage because
    I was in a much higher form when I went there than the other boys my age. I graduated at sixteen, which was the youngest
    that anybody had graduated from Episcopal High School at that time. It took graduates through the first year of college
    so they could get advanced standing and get off a year. So, I got my B.A. in three years.
- speaker: Interviewer
  text: Was this your father's idea, that he teach you?
- speaker: Respondent
  text: Yes, it was. You'd think that it would be bad in some ways and maybe it was. I didn't see other boys during the morning,
    I never had to do any night work at all, which was extraordinary, now that I think of it. I seemed to get a head faster
    than the other boys who were going to private schools around there and yet, I didn't do any homework at night and wasn't
    supposed to, thanks to the instruction that I had. I got along more rapidly than I would have, and the the sort of isolation
    during the morning didn't seem to make any difference. I played all kinds of sports and was pretty large for my age and
    really was better than most of the other boys. I didn't turn out to be any athlete later, but when I was younger . . .
    we had a track meet between the Boy Scouts of Richmond and Charlottesville. You'd think that Richmond would have much
    better athletes than Charlottesville, which then had about five thousand people or thereabouts. I was in the youngest
    group, which was, I think, up to fourteen and I was twelve. I won everything. I won the 50, 100, 220 and the 440, but
    I never won any more track meets after that. I was bigger and longer legged or something.
