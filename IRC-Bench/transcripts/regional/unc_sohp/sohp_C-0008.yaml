collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: Well, I was born in Charleston County, on one of the islands surrounding Charleston, Young's Island to be exact. My
    family, my mother and father, were very young—my father was twenty-one, my mother was eighteen. We moved immediately to
    Charleston when I was an infant. I lived in public housing in the City of Charleston then, as opposed to the county. My
    father got a job working in the war industries. At that time, Charleston was a big naval base; it still is. For the first
    four years of my life I lived in public housing. Then my father decided to move out of public housing as things got better
    for him and he got a leg up on the economic ladder. And as the war wound down, we moved to the center of Charleston in
    our own house. Probably I got my first interest in architecture by remembering that he built the house himself and started
    off and the house sort of grew with our family. I ultimately had four sisters, me being the oldest in the family. I went
    to public schools; first went out to a kindergarten school that I remember very vividly because I somehow didn't like
    the idea of going to school and the teacher was rather mean. But I went to public school and never went to first grade—I
    always remember that, I never was a first grader. I went from kindergarten to second grade.
- speaker: Interviewer
  text: Why was that?
- speaker: Respondent
  text: Well, because the first day or two that they put me in first grade they found that I had done so well in kindergarten
    that there was no point in keeping me there and so they put me in second grade. My mother was very pleased about that.
- speaker: Interviewer
  text: You were a high achiever from early on.
- speaker: Respondent
  text: I didn't call it a high achiever then but, yes, I guess you could say that. I remember her being so very happy about
    me going into second grade after only about two days in school. But apparently they tested me, I don't remember the test,
    and I moved to second grade.
- speaker: Interviewer
  text: Let me turn you back and ask you about your family background a little more. Had your family's families lived in the
    sea islands off Charleston? Is that where they had come from?
- speaker: Respondent
  text: Yes, they all came from Young's Island. My mother's family, as far back as they can remember, and my father's family
    came from two different sections of the island. My father came the Adams Run area of Young's Island and my mother came
    from the Oakville area of Young's Island. She was an only child but my father came from a big family of Gantts that were
    there. I would assume, you know, we got into this thing with Alex Haley, but we assume that there must have been some
    Gantts that owned a plantation or something in that area maybe a couple of generations or more back. My father's father
    had considerable landholdings, or at least it was considered amongst the folks in that area to be fairly large.
- speaker: Interviewer
  text: Do you know how he acquired that?
- speaker: Respondent
  text: I think he was given it, or at least earned it in some fashion. As a matter of fact, this last July 4th, we all took
    a sort of historical tour of the family holdings and went back into some deep sections of the islands to see land that
    was still being held by our family and had been passed on.
- speaker: Interviewer
  text: Had you visited the island regularly as a child to visit relatives?
- speaker: Respondent
  text: Oh, yes. I visited my grandmother; it was a yearly trip that my sisters and I would go and spend the summer or at
    least two or three weeks of the summer where my father grew up. Very few trips to my maternal grandfather's home. He had
    a rather small farm and he died when I was about eleven years old. We spent most of our time with my paternal grandmother's
    homeplace. And so we got an appreciation for the rural life of South Carolina. We were always kidded as being the city
    kids because my father's brothers and children, our cousins, all grew up in the country so to speak.
- speaker: Interviewer
  text: So your forebears were farm owners rather than tenants on Young's Island?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: One question I had wanted to ask you was to kind of characterize your family's social and economic status when you
    were growing up.
- speaker: Respondent
  text: Well, I would have to say that my folks were economically the lower, lower income family, what I call salt of the
    earth working people, not a lot of frills, a great deal of love and attention of course to their children, and a great
    deal of belief in America as the land of opportunity if you work hard and you get an education. We had a high degree of
    emphasis on education. So we were middle class in concept. You know, we believed in the country and believed in those
    goals of the middle class that I think is the stuff that America is probably made of, which is a certain degree of education
    to gain a certain level of material acquisition to live comfortably and of course to do the same thing over and over again
    with your children. My father worked two or three jobs. In retrospect, probably at relatively low wages except in the
    latter parts of my stay at home he started to move up the ladder in the naval shipyard.
- speaker: Interviewer
  text: What kinds of different jobs did he have?
- speaker: Respondent
  text: He would do a little carpentry work on the side because he had taught himself carpentry when he built our house, so
    he would assist a small contractor on weekends. Oftentimes he held a job picking up dry cleaning for a dry cleaners. Things
    that you could do on the weekend. His most stable job, obviously, was the one he had working as a rigger mechanic at the
    navy yard, and as I started to say, he did generally that kind of laborious work for quite a few years until the latter
    part of my stay at home, which was when I was about sixteen or seventeen years old. He started to move up in the ranks
    to supervisor, etc., and I would say most of the years away from home before he retired he had entered some kind of supervisory
    position within the same group of people, where the physical work was not nearly as intense.
- speaker: Interviewer
  text: Was your mother employed?
- speaker: Respondent
  text: My mother was a housewife for all of our time. We have these strong standards about women. My father had a strong
    feeling for the fact that with five children that my mother needed to be home with them. It's a value that I sort of carry,
    I'm kind of old-fashioned about that. I still feel very strongly about children coming home from school because when I
    used to come home from school, beginning as a little kid in kindergarten, the first thing I'd say when I hit the door
    was "Mama" and she would answer back and it was so reassuring to me. I didn't realize it was reassuring until later years
    looking back on it. And that really happened all the way through high school. I'd come home, whether it was from a football
    game or football practice or senior high club meeting or something and holler out that same "Mama." She was always home
    and I always tell the story about my father. The role of a father I think I probably emulate from the way my father treated
    us. He was never a pal to me and I was an only boy. You know, he didn't try to get out and play Little League baseball
    with me, occasionally he'd come to the games when I played football in high school and they would come as a family to
    the game. But he didn't get very gung ho and never tried to be a pal; he was always there, sort of reassuring. He would
    always be stern on discipline at the appropriate times. But he was a great talker about the weightier issues of the time,
    politics, etc., and it really is in my father that I got more of the inspiration to enter the world of politics first
    as a pioneer involved in other kinds of activities during the civil rights era. My mother, on the other hand, was always
    there. So it is in the little but important things about life that value transmissions occurred with my mother. My father
    was, for example, a very religious man but my mother said, "yes, your dad believes in God, I do too, but you shall study
    your homework and you shall put two hours of work into that because that is how you are going ultimately to be successful
    as an architect one day," and so forth and so on.
- speaker: Interviewer
  text: How young were you when you first realized that you wanted to be an architect?
- speaker: Respondent
  text: I'm one of those fortunate people who early on recognized that I wanted to be an architect and that was in ninth grade.
    I consider that to be early, I mean, you toy around with a lot of things and I did probably as most kids do, wanting to
    be everything from a pharmacist to a doctor to a preacher to a lawyer. But finally it was putting together my aptitude
    for drawing and my interest in the technical aspects of putting things together that led me to architecture.
- speaker: Interviewer
  text: What church did you go to?
- speaker: Respondent
  text: I attended Morris Street Baptist Church with my family. I literally grew up in that church. My father and mother came
    from the island and they were members of a small Baptist church that we revisited this summer also. They came right in
    and settled into that church and that's the only church that our family has known. They were both very active in it and
    we grew up in it literally to speak, you know, being members of the choir and the Boy Scouts and all the central things
    I think you go do there.
- speaker: Interviewer
  text: What do you remember about drawing and what kinds of things did you do mechanically?
- speaker: Respondent
  text: Well, I first of all remember about third grade one of my teachers noticed that I doodled in my pad quite a bit, and
    I would try to draw the prettiest girl in the class. She thought she would take that stray energy that was always doodling
    and drawing and get me to draw the Christmas scene or the Thanksgiving scene or the pumpkin and horn, etc. And I would
    do right well at it. She'd tell other teachers that "he can draw," you know, "let him draw this." I did that all the way
    through elementary school and people started to know me as a person who really could sketch very well. As I look back
    on it they weren't all that good in terms of sketches but they were probably better than most of the kids could draw.
    And I stuck to doing that. I did that all the way through high school for my own edification, just sketches, just drawing
    things that I saw and I do it even in city council meetings when I'm sitting down, just drawing things—doodling.
- speaker: Interviewer
  text: But you were rewarded for it early on, too, at least teachers recognized.
- speaker: Respondent
  text: Well, they recognized the talent there and I guess by their pushing it, it gave me confidence. It was pulled out of
    me more so. My mother was concerned. She didn't want me to be an artist. She thought that that wasn't really a stable
    enough career. As I said, she was a very practical person who looked at things that way. So when I landed on architecture,
    it seemed to be the perfect blend. It seemed to make sense, too.
- speaker: Interviewer
  text: Can you talk a little about the social atmosphere in Charleston in the '50s when you were growing up?
- speaker: Respondent
  text: Changing! You know, for the first ten years of my life I paid no attention to it. The things that happened around
    me were accepted. From our little house that my father built, I would walk past an elementary school—I mean, I'd walk
    up to the corner and I'd look to my left and there was a white elementary school, but I would turn to my right and go
    four or five blocks to a black elementary school. But they looked no different in my opinion and I thought nothing of
    it except that that's the way things were. If my mother took us on Saturdays shopping, we got on the bus, we as young
