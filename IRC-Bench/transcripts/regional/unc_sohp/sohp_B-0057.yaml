collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: At one time the state council directors were invited to the annual meeting, and their presidents or vice-presidents
    were members of our board. And each year the field director for the state council, that was of the regional council, had
    an institute for the state directors. And they would all gather at maybe some beach or resort place, and they would meet
    for three, four, or five days and find out what each other were doing, what they were going to do next to improve the
    state council. But we didn't have a state council director for two or three years at SRC. You didn't meet Ed Stanfield,
    because he had gone.
- speaker: Interviewer
  text: He was the last one?
- speaker: Respondent
  text: Yes, he was the last state field representative, and he took a job in Texas. I think Ed was a little dogmatic about
    what he thought the state council director should do, and he and Paul sort of clashed on that. Alice Spearman. She married
    Marion Wright, who's retired, one of our ex-vice-presidents who was the president when I first went with the Council.
    She was the director of the South Carolina Council at the time, and they just had heated words, so Ed just resigned from
    that job. He said he thought that they should follow some sort of grand pattern the way they had said they would the year
    before. But I think Alice was out doing some of everything in the community and was doing a beautiful program. Got plenty
    of money. And when the new guy came in, Tom, who's a real bright young guy. I don't know whether you've met him.
- speaker: Interviewer
  text: I've heard of him, but I don't think I've ever met him.
- speaker: Respondent
  text: Well, when he came she had money saved up that nobody, that the board didn't even know she had. She just put the money
    away and saved it. She was a practical woman, just going about haphazard but doing some good. And so we never did hire
    anybody else as a field director.
- speaker: Interviewer
  text: In about '51 or so, I think, is when they first set up the state councils, isn't it, and gave them so much money and
    everything?
- speaker: Respondent
  text: They had so-called state divisions. It was 1954 when we got the Fund for the Republic grant, and I think it was beginning
    July 1 within the eleven southern states. I think Oklahoma was the only one who didn't want to be called a southern state.
    They didn't have any problem.
- speaker: Interviewer
  text: Is that right? That's interesting. That's where I grew up.
- speaker: Respondent
  text: They had said first there would be twelve state councils, but Oklahoma was the one who said that they didn't need
    one.
- speaker: Interviewer
  text: That's amazing.
- speaker: Respondent
  text: So there were eleven. And each state council was given money to hire a fulltime director and an associate director
    or assistant director, whatever they wanted, and a secretary, rent office space, buy office equipment. And we had to report,
    I think, every six months to the Fund at that particular time. The first grant was an eighteen-month grant.
- speaker: Interviewer
  text: And it was especially to set up the state councils?
- speaker: Respondent
  text: Right. It was separate from what they gave the Southern Regional Council. And they were to be affiliated organizations.
    We hired the directors; they came, they were interviewed by the Southern Regional Council. And all the payroll was made
    from here. We gave them a lump sum, I think, every council, and I can't remember exactly what that figure was, to rent
    office space and buy equipment like typewriters, desks, file cabinets, and so forth. And they did that. And of course
    they were hoping that all of these state councils could have an integrated staff. Now in some instances it was almost
    impossible to get this in 1954.
- speaker: Interviewer
  text: Where was it impossible?
- speaker: Respondent
  text: Well, in Louisiana, New Orleans, I don't think they ever had a negro anywhere on that staff in New Orleans. It was
    a very young guy who was working with that; I don't know what ever happened to him.
- speaker: Interviewer
  text: Why couldn't they do it then?
- speaker: Respondent
  text: I guess it was just the climate in the town, and there really wasn't much said about some of the state councils, but
    some of them were afraid to even let people know what they were doing or what they were. Like in the case of Mississippi,
    there was never any publicity although there was a negro woman who directed that in the beginning. I can't even think
    of her name now. I can't remember all these names.
- speaker: Interviewer
  text: I saw some stuff about that in the files. It was almost a secret organization. Nobody knew it existed.
- speaker: Respondent
  text: Right. This was true in several instances. And even here in Atlanta, the Georgia Council didn't have a mixed staff
    until… Oh, it was a long time before the Georgia Council had a mixed staff. And it was just because of the director, and
    somebody'd come in applying and they got the job. And there was no effort made. They did, however, hire some black consultants
    that were at Atlanta University. They had people doing some consulting work for them.
- speaker: Interviewer
  text: Were there any black directors of the state councils besides her?
- speaker: Respondent
  text: John McCowan came in in '66 or '67, I believe, with the Georgia Council. Let me see if there was another black one.
    Yes, he was the assistant director in Arkansas, Little Rock, Elisha Coleman. And he is the director now. The director
    was white. He was past middle age and became sort of feeble, and he did retire. And I think it's been a pretty healthy
    state council. They've never cried, "We don't have a nickel. We don't have a dime." And I think I remember hearing that
    he's gotten some federal money and that they're working with some federal program and it's been quite effective.
- speaker: Interviewer
  text: What are the state councils supposed to do?
- speaker: Respondent
  text: They are supposed to do almost the same thing that the Southern Regional Council is doing here, and sort of keep the
    Council informed as to what was happening in the smaller communities, because most of the state councils had little branches
    in small towns and counties. Oh, they were strung all out throughout the state of Georgia, in very small towns. And they
    would report to the central body what was happening, and of course a lot of research that we needed, and needed stuff
    documented, they'd do that for us, which was quite helpful. And they were supposed to become self-sustaining after three
    years.
- speaker: Interviewer
  text: They were supposed to get money in the states where they were?
- speaker: Respondent
  text: Oh, yes, they have memberships. In Virginia there was a minister, a very fine guy, Jack Marion, who got I don't remember
    how many one-hundred-dollar memberships from people in Virginia. And he really built his up. And he did real well moneywise,
    but didn't quite keep this up. And of course when he got a job and left, you see, the next person couldn't quite do what
    he'd done, so they just sort of went down. The South Carolina Council and the Arkansas Council and I guess the Tennessee
    Council, because the Tennessee Council, I don't think, ever got that much money until maybe recently they got a couple
    of grants from foundations. The Mississippi Council was able to get grants out of Rockefeller and …
- speaker: Interviewer
  text: They tried to raise money independently.
- speaker: Interviewer
  text: So, completely on their own, they wrote their own proposals and …
- speaker: Respondent
  text: We went to Ford, you know, we first got the Ford grant, and they gave us money for the state councils, but not enough
    to keep them running.
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: In 1965. And of course we went back to them for more money for the next three years, and they gave smaller amounts
    on a descending scale. That was the end of that last year, so this year we don't have anything to give the state councils.
    But, fortunately, some of them have gone to foundations, and we got copies of three letters where Leslie Dunbar had funded
    three of them, Field Foundation.
- speaker: Interviewer
  text: And that was altogether separate from you all. You didn't even know?
- speaker: Respondent
  text: No, he just sent us a copy of the letter stating that he funded them. Two of them got $25,000, and the other one got
    $14,000, this year.
- speaker: Interviewer
  text: What councils got them?
- speaker: Respondent
  text: Twenty-five to Mississippi, twenty-five to Tennessee, and fourteen-and-some-odd-figure to South Carolina. It was something
    special that South Carolina wanted to do, so he gave them that much. But he has always given money to the Mississippi
    Council. I think it's because he has faith in the guy who was there, Ken Dean, who is no longer there, but was quite effective.
    Just did some of everything. I think he went there before Les Dunbar left the Council. And Les got to know him real well.
    And of course he would go to New York and talk to Les. Les had visited Mississippi in so many places, and got to know
    what Ken Dean was doing.
- speaker: Interviewer
  text: What kind of things did he do?
- speaker: Respondent
  text: He got involved with the young people who went down during the summers to help register people to vote. He worked
    day and night with people who were trying to integrate the schools or get people registered to vote, just year around.
    He was really quite active and quite vocal. And once he was there as a director, he did actually hire negro secretaries,
    and they were in the First Federal Building there in Jackson, Mississippi. So he worked at least five long years, because
    he's just left there, and he's in New York studying. I think he's in Syracuse studying. He did marry while he was there.
    He married a girl who was teaching in Mississippi. She was from Tennessee originally. When I went up to Gatlinburg to
    a meeting, she brought her mother over to the meeting. A very pretty girl.
- speaker: Interviewer
  text: There were, then, a lot of differences in what the different councils did.
- speaker: Respondent
  text: Oh, yes, right. Some of them worked solely for membership, and others worked to see what they could do about certain
    things in certain places to help ease tensions and so forth. They did all sorts of things, according to what area, what
    was happening.
- speaker: Interviewer
  text: Did they act as lobbying agents?
- speaker: Respondent
  text: Not really. All of them had their tax exemptions, which said that they could not play politics. Because I think some
    of them almost got in Dutch messing around.
- speaker: Interviewer
  text: But most of them weren't able to sustain themselves?
- speaker: Respondent
  text: No, not really. There were some of them that were just existing then. But the Louisiana Council just never did do
    anything. And then finally, I guess while Ed was there, not long ago, there was a span of about eight years when there
    was nobody doing anything in Louisiana. And this black woman who's a contractor there in Baton Rouge decided she wanted
    to try it. But she hasn't done anything; she hasn't been able to do anything with it.
- speaker: Interviewer
  text: It's a tough state.
- speaker: Respondent
  text: It really is. You know, I didn't know that.
- speaker: Interviewer
  text: You don't think of it as being as bad as Mississippi or something.
- speaker: Respondent
  text: No, you don't, but it is, and it has been. A lot of people don't know that, though. They just hear so much about Mississippi,
    though; they think that's the worst place.
- speaker: Interviewer
  text: But they know there's been a lot going on in Mississippi.
- speaker: Respondent
  text: Right. Well, Alabama. I know I'd rather live in some parts of Mississippi than to live in Alabama. But a lot of people
    don't feel that way about it, not because of George Wallace but because of so many other things and so many other people.
- speaker: Interviewer
  text: There was some conflict along at different times between the council and the state councils, was there? The state
    councils thinking that they weren't getting enough support or that there should be more money or …
- speaker: Respondent
  text: Yes. Many heated meetings.
- speaker: Interviewer
  text: I kept coming across a lot of stuff here and there.
- speaker: Interviewer
  text: But I don't know exactly… What were the…
- speaker: Respondent
  text: You see, you got a lot of young people in as directors or working with a state council. They had different ideas,
    different views about what the state council should be doing. Like resolutions against the war in Vietnam, and so many
    things; we spent nights… I remember when we were in Gatlinburg, that was one of the issues.
- speaker: Interviewer
  text: What meeting was that?
- speaker: Respondent
  text: That was in September of '67. We met a whole week up there, the state councils and the Southern Regional Council.
- speaker: Interviewer
  text: The staff of the regional council?
- speaker: Respondent
  text: Not the full staff. There must have been about eight of us up there. Some of the senior staff people were there that
    knew what the state councils were …
- speaker: Interviewer
  text: And the state councils themselves were passing resolutions against the War or they wanted SRC to?
- speaker: Respondent
  text: They wanted the Council to come out and make a statement. And of course they knew how the Council felt about the War
    in Vietnam, but this was no time to deal with something like that, they thought, when they were trying to find out where
    the state councils were going and what they were going to be able to do after. Because we didn't know then that they were
    going to get more money in '68 for the state councils at that time, because Ford had said they wouldn't give any more
    money to the state councils.
- speaker: Interviewer
  text: Did the Ford Foundation think that the state councils had not been worthwhile or successful?
- speaker: Respondent
  text: Evidently, yes. In a way, they really hadn't done some of the things that they wanted to do and could have done. And
    it was because, I think, they were understaffed, and there are so many people who will not volunteer to give you their
    free time, even though they like what you're doing. But occasionally some people came across people who were willing to
    do things like that without any money. But a lot of them just weren't able to do all the things that they wanted to do
    programwise, because their boards weren't strong, their committees… They had lousy committees, people who just didn't
    do anything but come and meet once a year. Like the Southern Regional Council's board met. Some of them don't read their
    mail. They'd say, "Well, I never knew this happened." But you know, you know you send them everything, and it doesn't
    come back so they must have received it, but they don't pay any attention to it. So that's why we have that little newsletter
    now every month, from Southern Regional Council. It goes out to every board member, telling what's happening.
