collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: Well, I feel that I ought to tell you that I started using the tape recorder because I thought that if I didn't use
    it, it wouldn't be scientific, it would be based on what I felt I ought to do to be able to continue to do this work.
    But I was never a great enthusiast of the tape recorder. I have tape recorded, I know it, because there are certain people
    whom I've grown to know and like and I thought it would be nice to be able to listen to them sometimes. I don't think
    that I have ever learned anything from the use of a tape recorder that I haven't learned much earlier from just being
    with the people. I do not lug a tape recorder around as part of my work, I should tell you. I do believe very strongly
    in the Bible and particularly the serpents and doves admonition that Christ gave us, so I'm not beyond guile and this.
    I am certainly willing to talk about tape recorded interviews knowing that many of the interviews are not tape recorded,
    in order to persuade anyone that I might be worried about that I am scientist. But I am getting increasingly fed up with
    that and I am glad to be in a position to feel strong enough to be fed up with it. You can read in between those lines
    whatever you wish. I hope you'll take a very jaundiced view of my insincerity. But I don't think there has been any difference,
    because I haven't really used the tape recorder as a constant part of my life. What I have done is gotten to know these
    people. And what they are therefore impressed with is me, a pain in the neck doctor who they can't quite figure out and
    who, believe me, at times can't quite figure himself out, notwithstanding all the apparent coherence of those books, which
    I do not mean to decry per se, but simply indicate that behind the book is confusion and turmoil as well as brilliant
    insights. And one is entitled to that. I suppose that you don't want to undercut yourself to the point that no one reads
    your book, which has to do with style. I'm not going to publicly acknowledge that I'm a damned fool. I don't really think
    that I am a damned fool, as a matter of fact, but I do think it is absurd to invest in people that write these books a
    kind of brilliant, knowing, day-to-day-confident-this-and-that-formulated-thought-out thing which distinguishes them from
    the craziness of the writer. Now, Faulkner, how did he get it all on paper without a tape recorder? And believe me, with
    word for word accuracy. Word for word. He is something that kept what came in and it came out through the hand holding
    a pen, or maybe the typewriter, another gadget. Word for word, if he had had a tape recorder, it doesn't make any difference
    if there is a tape recorder or there isn't a tape recorder. A retentive memory with a maybe Piaget could tell us something
    about Faulkner's cognitive development. Well, that is a curse, to be interested in someone's cognitive development. I'd
    much rather be Faulkner pouring out the words, but you know not everyone is gifted that way. Now, look, I'm not going
    to say that I haven't carried a tape recorder and put things down, but never, never as a primary source of being with
    some people. And I again urge upon you, these are pre-tape recorder documents in the history of western civilization.
    always of course, improving itself. And someone, that Agee, even with bourbon in his mind, or maybe because of bourbon
    in his mind and head, was able to go there into that little county located between Birmingham and Montgomery and he picked
    it all up. It's all there, what goes on between the people. Now, you say, "I want the literal word." O.K., no one is saying
    that you shouldn't have that, but I would think that the last thing that any of us would want to do in going to visit
    people is to behave in a crude an uncivilized way. I am urging civility in my pompous, smug way. And I mean civility,
    not you see, the whole damn profession of psychiatry has been based on unmasking and tearing down civility, tearing down
    those day to day adjustments that we all have to have with one another in the interests of these group therapy-sensitivity
    training things where people strip themselves in order to lose all these so-called inhibitions so then a kind of truth
    will come out. Well, what truth? The banal truth that we are all a bunch of murderers and cut-throats, rapists and God
    knows what? What we find out from that and therefore what distinguishes us, it seems to me, ought to be some willingness
    to behave ones self and therefore when one goes up a mountain hollow or goes into a migrant camp or goes to visit some
    people in a log cabin, I think they are entitled not to be suddenly confronted with this machine and someone pressing
    that Sony thing and "Wait a minute, testing, testing." "Would you mind saying something? I'll say something." For what?
    Now, if one falls in love with someone and hears a lovely voice and hears some words and spends a number of months with
    a person and says to the person out of friendship and camaraderie, "Look, I would like to have something. Would you just
    mind, would you put up with me, having put up with me all this time, put up with me in one more way." Is this being tape
    recorded? "with one more way." Then, o.k., but to drag this thing around in the name of some mixture of Freud and Oscar
    Lewis and I don't know who else, and the New History and the latest psychology as, you know, part of these ugly windows
    and this terrible building, then I think, nonsense, really.
- speaker: Interviewer
  text: Well, when I was going over, I did an interview, and then I would listen.
- speaker: Respondent
  text: You talked with someone.
- speaker: Interviewer
  text: Yes, I talked with someone and the recorder was on. And I just wrote down a lot of the things. And when I got back,
    by just re-listening, some of the things he said, I just sort of got in the entire mood again. There were two or three
    things that I forgot that we had even mentioned.
- speaker: Respondent
  text: O.K., well, you're right.
- speaker: Interviewer
  text: I just wondered if you use it like that?
- speaker: Respondent
