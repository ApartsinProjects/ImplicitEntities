turns:
- speaker: Respondent
  text: John L. Lewis as his PR man. So she [Lucy Randolph Mason] was also a great friend of Mrs. Roosevelt. Then, at the
    same time, Joe Gelders, who was at the University of Alabama, a professor of science of some kind, he got interested in
    the labor union movement too, and he got to be head of something called the Southern something. Anyway, the two of them
    met over in Mississippi. They were having terrible strife over there, labor strife, and the unions. And old Rankin was
    raising hell and high water, and Jim Eastland, and that awful [Theodore] Bilbo. So there was a terrific lot of bad labor
    going on over in Mississippi. So Joe Gelders and Miss Lucy were, you know, together. So Miss Lucy, who is...
- speaker: Interviewer
  text: How old was she at that time?
- speaker: Respondent
  text: Oh, Miss Lucy, I reckon, was in her fifties.
- speaker: Interviewer
  text: You describe her in your book as already being a white haired lady.
- speaker: Respondent
  text: Well, she was, but I would say fifties. They lived right down the road from me. Her brother-in-law was the head of
    the bank, and her sister was the leader of the, [Laughter] what fashionable set there was in Alexandria, Virginia. She
    had the biggest parties and biggest luncheons. But Miss Lucy had gone into good works early, you know, and tried to help
    the little girls who worked in the tobacco factory. But anyway, the gist of the matter is that she got hold of Mrs. Roosevelt,
    and she got a promise out of Mrs. Roosevelt that the President of the United States, Mr. Roosevelt, would see them. So
    Joe and Miss Lucy went up to Hyde Park or whatever and had tea or dinner or something with them. See, the thing about
    Miss Lucy was that she was a lady par eminence, if you know what I mean.
- speaker: Interviewer
  text: Yes, she was a real Virginia lady, wasn't she?
- speaker: Respondent
  text: She was a lady if there ever was one. So they talked a great deal. So the idea was conceived of having this—the president
    already was furious at the southern senators because they were kicking in the teeth everything he was trying to do. So
    they got the idea of forming a South-wide group of people. He was all for it. It was right after he had tried to get rid
    of [Senator Walter] George of Georgia, you know, and they had beaten him. So he was still fuming about it. So anyway,
    sure enough, they got it going, and all the labor unions went into it. Bill Mitch, particularly, of the Miners was very
    active. See, it was in Birmingham. And then Joe Gelders, of course, was stationed there, and he had been beat up there,
    you know. That awful beating. Then there was one communist, I remember, his name was Rob Hall. Boy, you should see him
    now. He's married to this rich girl up in New York and he has a Caddy. [Laughter]
- speaker: Interviewer
  text: Ain't no revolution, is there?
- speaker: Respondent
  text: Revolution, he didn't want to speak about it. He called me up, said he wanted to see how I was.
- speaker: Interviewer
  text: There were some sisters, too, you mentioned in your book, a couple of women who were communists, and they passed out
    literature and stuff. I'm trying to call up their names.
- speaker: Respondent
  text: Jane and Dolly Speed. There were very few, only two or three communists in the whole South. And it really was a tremendous
    undertaking because, you see, it was the beginning of Roosevelt's anger. Very few realize, maybe they do realize it, Roosevelt
    was a man of great, strong anger.
- speaker: Interviewer
  text: He had a hot temper, didn't he?
- speaker: Respondent
  text: Not only that, he wanted to get back at you. If you'd done him wrong, boy, he wanted to get you back.
- speaker: Interviewer
  text: He was vindictive.
- speaker: Respondent
  text: Yes, he really was. And thought those southerners had just really hurt him in every possible way, you know, by ruining
    all the things that he wanted to get done. So Frank Graham got to be the president of it [the Southern Conference for
    Human Welfare]. Then, of course, it really went along for several years very well until they began to red bait it. Then
    it got to be just a mess after that because of this continuous series of red baiting. It continued really up until the
    war. Then after that it...
- speaker: Interviewer
  text: Let me back you up to the time before that big meeting. You tell in your book about the group of young southerners,
    New Deal Southerners, around Washington while you all were living in Alexandria. They called themselves the Southern Policy
    Committee, and they would meet occasionally at people's houses just to talk about problems and whatnot.
- speaker: Respondent
  text: The Southern Policy Committee, it met on a regular basis. It met downtown. That was Lister Hill and Jonathan Daniels.
    They were all strictly male, and they all met downtown. They were the ones that started that pamphlet about the South,
    you know.
- speaker: Interviewer
  text: The number one economic problem.
- speaker: Respondent
  text: Now, the other group was a group of young southerners who were working on the Hill mostly.
- speaker: Interviewer
  text: Like Clark Foreman?
- speaker: Respondent
  text: Who were trying to get rid of the poll tax, and who were politicking.
- speaker: Interviewer
  text: Ted Goldschmidt. Who was he?
- speaker: Respondent
  text: He was with the Committee of...
- speaker: Interviewer
  text: What state was he from?
- speaker: Respondent
  text: He was from Illinois. But he was one of those big—Secretary of the Interior, connected to them. That's how I met Lyndon
    Johnson. If you'd been reading about us in the...
- speaker: Interviewer
  text: I've heard about it, but I haven't been reading that.
- speaker: Respondent
  text: Well, he's got all this stuff about us, and people we knew. Well, we met them all through Lyndon Johnson, and we met
    Lyndon Johnson through Ted Goldschmidt. He was with the Interior Department, and he and Clark Foreman were in the Interior
    Department. They were in charge of the dams, you know, and water. Of course, Lyndon lived for nothing in the world but
    the rural Colorado River.
- speaker: Interviewer
  text: Now, Goldschmidt was not from the South, though?
- speaker: Respondent
  text: Yeah, from Texas.
- speaker: Interviewer
  text: Oh, Goldschmidt was from Texas, and Abe Fortus was from Memphis, and Clark Foreman was from...
- speaker: Respondent
  text: His uncle was the editor of the Constitution, Clark Howell.
- speaker: Interviewer
  text: And Arthur Raper was from Virginia, wasn't he?
- speaker: Respondent
  text: No, he was from North Carolina.
- speaker: Interviewer
  text: And Cliff Durr was from here, and Hugo Black was from Alabama. All of these people were, in one way or another...
- speaker: Respondent
  text: Lister Hill.
- speaker: Interviewer
  text: Part of that Southern Policy Committee group. Including Lyndon Johnson?
- speaker: Respondent
  text: No, I don't think Lyndon was really part of that. Lyndon never was a person who'd go to regular meetings, [Laughter]
    unless he ran them.
- speaker: Interviewer
  text: Aubrey Williams, was he in there?
- speaker: Respondent
  text: Yeah, Aubrey would go sometimes. But it was a lot of southerners, and they all got together and they all were responsible
    for getting that pamphlet out.
- speaker: Interviewer
  text: That was in '38. It came out in June, I think, of that year.
- speaker: Respondent
  text: And the Southern Conference [for Human Welfare], it—I think what people have never understood and taken seriously
    enough is the fact that it was backed by the president of United States and it was his idea actually to begin with. He
    did it because he was mad as hell, to use the expression, at the way they had been treated by the southern senators. He
    really was angry with them.
- speaker: Interviewer
  text: To make matters worse, not only did they give him a hard time in the 1936 election and right on past there, but after
    that pamphlet came out in June, they had the off-year elections in '38 and the Republicans made big gains that fall. So
    just about three weeks before this meeting in Birmingham, there had been an election at which several senators were defeated
    and a whole bunch of House seats were lost. So it was like rubbing salt in the wound, you know.
- speaker: Respondent
  text: Well, it was rubbing salt in the wound. I'm not just saying this because he's my brother-in-law, but I always felt
    Roosevelt used Hugo [Black] as one method of getting back at them.
- speaker: Interviewer
  text: Now, he was in the Senate, wasn't he?
- speaker: Respondent
  text: He was in the Senate but he had stood by Roosevelt all the way. But he had particularly stood by him in that court
    packing. So that was the thing that I think probably made Roosevelt more grateful.
- speaker: Interviewer
  text: When was he appointed to the court?
- speaker: Respondent
  text: He was appointed to the court, it seems to me, in '38.
- speaker: Interviewer
  text: Could it have been '37? I can check this.
- speaker: Respondent
  text: He was about to run for the Senate, and we were down in Alabama. My little sister was being insulted all the time.
    I remember that. Then all that big to-do came about the Ku Klux Klan. I think that was, when was the first meeting of
    the Southern Conference for Human Welfare?
- speaker: Interviewer
  text: It was in the fall of '38.
- speaker: Respondent
  text: Well, this was '37, the year before.
- speaker: Interviewer
  text: And when he went on the court, is that when John Sparkman was appointed to take his place, or how did Sparkman get
    in the Senate? Who took Hugo's place as a senator?
- speaker: Respondent
  text: I thought it was John Bankhead, wasn't it?
- speaker: Interviewer
  text: Did they move Bankhead from the House? Did he get appointed to the Senate?
- speaker: Respondent
  text: Well, I have to think way back. Let's see. Lister took his old place.
- speaker: Interviewer
  text: Well, who was the other senator then?
- speaker: Respondent
  text: John Bankhead.
- speaker: Interviewer
  text: I thought he was in the House.
- speaker: Respondent
  text: That was Bill Bankhead, you're thinking about. This is John Bankhead. Bill Bankhead was the Speaker of the House,
    but John Bankhead was the brother. Rather crooked people, too.
- speaker: Interviewer
  text: And which one was Tallulah's father?
- speaker: Respondent
  text: Bill Bankhead. Tallulah and Eugenia.
- speaker: Interviewer
  text: And he was the Speaker of the House?
- speaker: Respondent
  text: Yes. And they used to always say, "You can always tell Eugenia and Tallulah apart. Eugenia is the one that marries
    and Tallulah doesn't." [Laughter] Eugenia married five or six times.
- speaker: Interviewer
  text: So John Bankhead was a senator, and Hugo was a senator, and Hugo went to the Supreme Court, and Lister Hill was...
- speaker: Respondent
  text: And that's just as much as I remember. You know, you ought to check.
- speaker: Interviewer
  text: Yeah, I will.
- speaker: Interviewer
  text: So the report came out, the pamphlet, about the number one economic condition in the summer of '38. Was it already
    determined at that time, had the Southern Conference for Human Welfare actually been organized by then?
- speaker: Respondent
  text: We organized it at the meeting in Birmingham. Frank Graham was elected president.
- speaker: Interviewer
  text: And that was the first time that anybody had ever come together?
- speaker: Interviewer
  text: Who planned all that?
- speaker: Respondent
  text: I just told you, Mrs. Roosevelt and Lucy Randolph and Joe Gelders, and the president of the United States.
- speaker: Interviewer
  text: Yeah, but, I mean, those are the people who had the big idea. I mean, who were the people who made all those plans.
- speaker: Respondent
  text: Oh, Joe Gelders was one. He was right there, and Miss Lucy. But I think that largely it was supported by the Miner's
    Union and Bill Mitch.
- speaker: Interviewer
  text: The CIO and all of that?
- speaker: Respondent
  text: Yeah. Because, you see, the unions were just coming south, if you remember, and they were being fought pretty hard.
    And John L. Lewis was extremely generous as far as helping was concerned, any way he could. And Bill Mitch is dead now,
    but he was very active and very supportive. And another person that was very active was Myles Horton, who just died.
- speaker: Interviewer
  text: Right. He was there, wasn't it, that November?
- speaker: Respondent
  text: Yes, and he was very active. And Maury Maverick was there. He got to be the head of the anti-poll tax committee.
- speaker: Interviewer
  text: I went to that auditorium not long ago. You know, it's still there just exactly like it was then. The building's been
    remodeled and all that, but you can walk inside there and it looks exactly like it must have looked right then. That long
