collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Mr. Dabney, we'll be talking today about massive resistance. To set the stage, we first talked about Virginia on the
    eve of the '54 decision. For example, there is a notion that the Byrd organization in 1954 was in trouble. Is that a valid
    observation?
- speaker: Respondent
  text: Yes, I think that it was in trouble. The campaign between Battle and Miller had shaken things up considerably and
    the fact that Battle was saved by the Republicans going into the Democratic primary showed that there was a pretty ticklish
    situation.
- speaker: Interviewer
  text: How about the Young Turks?
- speaker: Respondent
  text: Yes, they had realized that there was a real question in the legislature as to the validity of the machine's policies.
    They felt that the organization had been too parsimonious in supporting necessary services, schools, welfare, health,
    and so on.
- speaker: Interviewer
  text: Would it be fair also to say that Stanley was not among the stronger of the Byrd governors?
- speaker: Respondent
  text: I would say that was the understatement of all time. [Laughter]
- speaker: Interviewer
  text: The organization, nonetheless, was based on southside Virginia?
- speaker: Respondent
  text: Yes, it always had been. That was the center of its strength and the real core of the massive resistance to improvement.
- speaker: Interviewer
  text: Long after the fact, Benjamin Muse wrote that he thought the chance of compliance in Virginia in '54, before the decision
    was announced, was fairly good. He based that on the fact that Virginia had a good history of race relations and he had
    interviewed some officials. Would your recollection be along those same lines?
- speaker: Respondent
  text: Yes. I didn't think that we were going to have all this trouble that we did have and in the early stages of the period
    before massive resistance actually began and after the decision of 1954, it looked as if we were going to have a fairly
    smooth reception of the decision.
- speaker: Interviewer
  text: What was the immediate official reaction to the decision of May 17th?
- speaker: Respondent
  text: There was calm, I think. Stanley was not excited and he spoke in a restrained way about it and gave the impression
    that he was going to be working to make it effective without any hullabaloo, and he said he was going to consult both
    races and sounded very conciliatory.
- speaker: Interviewer
  text: Was that the mood as well throughout the state, were there immediate defiant cries in Virginia?
- speaker: Respondent
  text: I don't remember any, I don't think there were.
- speaker: Interviewer
  text: In a delayed reaction, there was defiance in the southside section of the state.
- speaker: Respondent
  text: Later on, yes, indeed.
- speaker: Interviewer
  text: And there is a famous meeting at the Petersburg Fire House.
- speaker: Interviewer
  text: Would you tell us a little bit about that?
- speaker: Respondent
  text: I really don't know much about that, I just have heard of a meeting and I think it was mostly the hard-core resisters
    from southside who decided that they were not going to take it.
- speaker: Interviewer
  text: And even later in '54 an organization was created called The Defenders of State Sovereignty.
- speaker: Respondent
  text: Yes, [unclear] and then they gradually branched out with branches all over the state. The head of it was a very mild-mannered
    man named Crawford, and Barrye Wall, the publisher of the Farmville Herald, who was also a mild-mannered individual. Both
    of them made it a point not to let anybody wave the Confederate flag, which I thought was quite astonishing from that
    group at that time. So, they weren't out to murder anybody like the Ku Klux Klan, or even to whip anybody at night or
    anything like that. They were quite within the law and were determined never to integrate.
- speaker: Interviewer
  text: How would you compare the Defenders with the White Citizens Councils that were popular in many of the deep southern
    states at this time?
- speaker: Respondent
  text: I'm not that familiar with the White Citizens Councils, so I really can't say. I don't know whether they ever condoned
    violence or not.
- speaker: Interviewer
  text: Well, they were very militant and drew their constituency from all classes in southern society.
- speaker: Respondent
  text: Including some Ku Klux Klansmen, I suppose?
- speaker: Interviewer
  text: Including some Klanners.
- speaker: Respondent
  text: They were more questionable than the Defenders in Virginia.
- speaker: Interviewer
  text: What was the makeup of the individuals in the Defenders?
- speaker: Respondent
  text: Oh, I think they were just average citizens, businesspeople and professional people who were not willing to take this
    decision and were determined to do everything they could to prevent it from going into effect.
- speaker: Interviewer
  text: Would you say that they were mostly middle class and up?
- speaker: Respondent
  text: I would say that they were, yes. The ones that I knew were. I didn't have any contacts with them, really. Jack Kilpatrick
    was very close to them and went to their meetings and all that. I never saw anything of them at all except that occasionally
    Crawford came into the office and made a few remarks as to what they were doing.
- speaker: Interviewer
  text: Governor Stanley in August of '54 appointed a committee that became known as the Gray Committee. What was the public's
    notion of what the committee was supposed to be doing?
- speaker: Respondent
  text: I think they were trying to work out some kind of plan that would meet this decision and obey it without causing too
    much disruption in the state. As far as I know, when it was first appointed, the prevailing view was that it was not going
    to defy anybody or shut down schools or anything like that.
- speaker: Interviewer
  text: It was an all white committee. Was there a sense that this was a mistake, that Stanley should have in fact brought
    black leaders into it?
- speaker: Respondent
  text: Yes, I think it was a bad mistake. The way they did it was to make a rule that the whole commission had to come from
    the General Assembly and that eliminated the blacks because there weren't any in the General Assembly. Stanley had said,
    as I mentioned, that he was going to consult both races. He called in about four or five leading Negroes to his office,
    and his consultation consisted of asking them not to pay any attention to the Supreme Court's ruling. [Laughter] Not to
    try, therefore, to integrate.
- speaker: Interviewer
  text: Now, the NAACP was very active in Virginia at this period. Do you recall your reaction to it, and do you recall the
    statewide reaction to the work of the NAACP?
- speaker: Respondent
  text: I think that most Virginians felt that the NAACP was too far to the left and was pushing things too hard, and we couldn't
    live with the kinds of things that they were trying to do right away.
- speaker: Interviewer
  text: Was the NAACP working mainly in the courts?
- speaker: Respondent
  text: Yes, I think so.
- speaker: Interviewer
  text: What about the Virginia Council on Human Relations, which was created in February of '55? A group of moderates, as
    I understand it.
- speaker: Respondent
  text: I've forgotten who was the head of that, do you remember?
- speaker: Interviewer
  text: I don't believe that they had any notable Virginians, but they included a lot of ministers and a lot of educators,
    and the notion was that they would somehow or another create a climate that would make possible better race relations
    and acceptance of integration when it came to it.
- speaker: Respondent
  text: I remember their operations in a sort of hazy way. I think I know some of the people who were in it. Nowadays, what
    they were trying to do sounds reasonably proper. At that time, most people were opposed to it.
- speaker: Interviewer
  text: Another group was the Virginia Society for the Preservation of Public Education. I believe that Armistead Boothe was
    involved in that.
- speaker: Respondent
  text: Yes, that's right. I believe that came along after the massive resistance thing started, didn't it?
- speaker: Interviewer
  text: It sort of picked up at that point. Do you recall its impact or the public reaction to that?
- speaker: Respondent
  text: I think most people felt that they were out of step with the majority sentiment, and that what they were trying to
    do was premature, that you couldn't bring the state along right away with these things that they were trying to put into
    effect.
- speaker: Interviewer
  text: A couple of leaders of this Society for the Preservation of Public Education, Armistead Boothe and Robert Whitehead,
    who were also a couple of the Young Turks in the '50s. Was this generally true with the people who made up this society,
    could you categorize them as anti-Byrd people?
- speaker: Respondent
  text: They were independents, at least you could say that. And they were ready to oppose Byrd when they felt they should,
    which got them in trouble with the organization permanently. This was one of the shortcomings of the organization, they
    couldn't take any dissent of that sort.
- speaker: Interviewer
  text: About this point in time, the Richmond Press Club appointed a committee to evaluate the busing of the students and
    I believe that it was headed by a man by the name of Hugh Rudd, and its report suggested that Richmond could handle the
    problem and that desegregation could be a reality without violence. Do you recall that report and the response to it in
    Richmond?
- speaker: Respondent
  text: Very vaguely. I knew Hugh Rudd and he had been on the paper and left to practice law. I do not remember the details
    of that. I think it is remarkable how much you know about all of this; and I am impressed.
- speaker: Interviewer
  text: In May of 1955, the Supreme Court issued its supplemental decision and suggested that action had to be taken with
    all deliberate speed and the district courts would supervise the implementation. Do you recall Virginia's reaction to
    that decision? Some say that it is a sort of a victory for the South in a way, that it would be left to the district courts
    and no set timetable?
- speaker: Respondent
  text: Yes, I think that there was a sort of mild sigh of relief, we were getting a little time to get ready for this and
    it wouldn't go into effect immediately. Yes, I think that was helpful.
- speaker: Interviewer
  text: Now, the Gray Commission issued its report in November 1955. Would you characterize its recommendations?
- speaker: Respondent
  text: Well, they were for token integration and local option. An area that wanted to integrate could do so, and where they
    opposed it, as in the southside, they could segregate.
- speaker: Interviewer
  text: Was this a surprising conclusion, given the composition of the committee? I understand that there were a lot of southside
    legislators in it. Garland Gray was, of course, a key man in the Byrd organization, and yet this seems in retrospect a
    rather moderate recommendation.
- speaker: Respondent
  text: It does. It is a little bit puzzling to me now. I can see how some of those on that commission wanted to have token
    integration but I don't understand how some of the others went along, especially Gray. Of course, he later on completely
    reversed himself, but that was under pressure from Senator Byrd. I don't really understand how they got that through.
