source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: You've retired from business?
- speaker: Respondent
  text: January 2 of this year.
- speaker: Interviewer
  text: That was a happy day, I expect.
- speaker: Respondent
  text: It surely was.
- speaker: Interviewer
  text: How would you characterize your political philosophy? Are you on the more liberal side, or the more conservative side?
- speaker: Respondent
  text: I'm from middle-of-the-road to liberal, I would say.
- speaker: Interviewer
  text: What's the status of the local Democratic party? Somebody's commented that maybe the Boy Scouts in the area were about
    as influential as the party organization.
- speaker: Respondent
  text: Well, we have had some problems in the Democratic party, locally, state-, and nation-wide, but we have made a strong
    come-back locally. Dave Kelley has been elected chairman. Dave is a man about thirty-eight years old whom we can all rally
    around, the whites, the blacks, the rich, the poor, the liberals, and conservatives. I just talked with him a few minutes
    ago. I think we're well on the way to rebuilding the Democratic party locally.
- speaker: Interviewer
  text: For a number of years it's been pretty much splintered. Without necessarily mentioning any names, would you say that
    is because of personalities or because of real philosophical conflicts?
- speaker: Respondent
  text: Because of philosophical conflicts. The Democrats don't fence anybody out. They fence everybody in. The Republicans
    just take a few people in who are conservatives and are for things. The Democrats are for people. When you take everybody
    in and let everybody speak, well, naturally, you're going to have some wide differences of opinion, but, after it all
    shakes down, the Democrats do get together and work at things and work well and effectively. This is America. It's not
    like a dictatorship. In the long run, it's far and away the best form of government we know of.
- speaker: Interviewer
  text: The Republicans have been quite successful. Strong organization, do you think, is the primary... Concentrating on
    a certain type of person. Or, are they maybe getting a backlash from some of the racial?
- speaker: Respondent
  text: Well, it's a combination of things. Part of it is... You do get a backlash, of course, from racial things. The Republicans
    do concentrate, and the Republicans are together. They're well organized. They're well financed. They stand behind their
    candidates. They turn out on election day. At the same time, this is their weakness, too, because, when their candidates
    or their philosophy goes against them, they have nothing to fall back on because they have given their all to begin with.
    They have no reserves. This is the weakness of the Republicans and the strength of the Democrats. We can bring victory
    out of defeat. They can't. When they go down, they go down hard, and it's a long time coming back.
- speaker: Interviewer
  text: One thing I'm interested in as far as the consolidation effort... I'm wondering if there were partisan reasons, maybe,
    either for supporting or for opposing. Was one party more likely to support than the other?
- speaker: Respondent
  text: Yes. The Democrats were more likely to be for consolidation than the Republicans. The Republicans did not want district
    representation. They did not want blacks. They wanted things to be at large, in the way of election. They wanted to feel
    that their party could get a majority. That the white, influential, well-educated would be a majority. Consequently, they
    were not for it. That's not really what defeated this. What defeated this was two things. One, school system had had quite
    a blow, and everybody was in a turmoil about this. The second thing, if you study consolidation over the country, I don't
    know anywhere it has succeeded the first time. Consolidation is something that you have got to study and understand and
    appreciate because, when it all boils down, it's two things. It's better planning, and, while the tax rate rises, it doesn't
    rise as rapidly. Most people want something more simple, more directly related to them. They want to see more of what
    they are going to get out of it. They want their notions in it more. This was a thing of reasoning. You don't have as
    many reasoning people as you do emotional people. This was the real problem. There was nobody really pushing it except
    a few enlightened people and a few people on the Chamber of Commerce. The blacks were for it but not too strongly. The
    rural people were against it. The affluent white didn't see where they were going to get anything out of it. The school
    board members were against it. The Republicans were against it. And, the Democrats were lukewarm. So we were lucky to
    get any vote at all.
- speaker: Interviewer
  text: If so many different groups were either opposed or lukewarm, what got the idea started in the first place? I mean,
    the idea had been kicking around for a number of years.
- speaker: Respondent
  text: Well, the chamber had been pushing this idea since about 1962. It does make sense, consolidation. I mean, the buckpassing
    does stop. You do do better planning. There's no question about it, and there's no question but what, while the tax rate
    increases, it does not increase as fast. These are things that most people are not concerned about. Most people are concerned
    about their garbage, their sidewalks, their tax rates, where their kids go to school. These sort of things, what we call
    bread-and-butter or gut issues, and the high issues? That doesn't really concern them. Really, the chamber and the thinking
    people, which were in the minority, were pushing it. They got it on the ballot and got it going, but we just had too few
    of these, unfortunately.
- speaker: Interviewer
  text: Some people, in looking at consolidation, see it, to an extent, as sort of an urban or civic imperialism. The city
    seeking to control more area, to control more people. Could that... Would the chamber leaders have been interested in
    that? I mean, seeing a lot of white people moving out into the suburbs beyond the city limits, seeing their voting strength
    in city elections and referenda declining because of that?
- speaker: Respondent
  text: Not really. I think just the opposite is true. I think we could have sold consolidation had we gone about it the wrong
    way. I think if we had told the people "Look, if you don't have consolidation, you're going to have another Atlanta in
    Charlotte. It's going to be predominantly black. The whites are going to move out. You're going to have a decaying tax
    base, and you're really going to be in trouble. Consolidation is really the only answer how to get a handle on this thing,
    and have the whites where they want to be, and maybe where they should be, overall. In the driver's seat." But, we didn't
    choose to take that route. We tried to sell it on the democratic route of everybody getting fair representation, the whites,
    the blacks, the men, the women, the rural, and the city. Of doing it right. Well, they didn't buy this. I talked to one
    of the opponents afterwards, and he said, "Lord, if you had told me what you're now telling me, I would have voted for
    it." But, we just didn't want to sell it on that basis. We didn't think that was the proper approach.
- speaker: Interviewer
  text: Somebody said. It was in a couple of newspaper commentaries just before the election and afterwards that a lot of
    chamber leaders were behind consolidation as the idea of consolidation, but, once you went to the open meetings and the
    district representation and the anti-discrimination devices, that a lot of people in the chamber got cold feet, and, in
    point of fact, a lot of the powers in the chamber actively opposed the charter. Perhaps because they saw some of their
    influence... Perhaps they had been able to get people elected that they had influence with, and they were afraid maybe
    that the types of people who would be elected by district representation would not take their influence.
- speaker: Respondent
  text: I think there's some validity in what you're saying. I think, to a large extent, in Charlotte and Mecklenburg County,
    there are some noblesse oblige, that some people feel they are born to be of service and that they serve for that reason.
    I think this has helped, to a certain extent, to have good government. As you mature and you go down the road in life
    you realize you do have to have everybody, white, black, rich, poor, young, and old men and women, all together to really
    get a community involved and to really get them to do the things they really want and need to do. When I talk to young
    people today, I tell them that when I was young how impatient I was with the old leadership and how I wanted to change
    things. Now that I'm older, I find myself on the other end of the spectrum. I want things status quo. This is human nature,
    and what you're saying is true. Some of the leadership did look at it and back off. They were for it in theory, but they
    weren't for it in practice. I think it will take probably another generation, another ten or twenty years before we get
    consolidation for the very reason you mentioned.
- speaker: Interviewer
  text: Somebody's also said that this campaign, the Charlotte-Mecklenburg campaign, was handled differently from that, say,
    in Jacksonville. Apparently what they did in Jacksonville was to get the commitment of the leadership and to get the war
    chest up before they actually put the charter down on paper, so they had the commitment and they had the funds to wage
    the campaign before they actually wrote the charter.
- speaker: Respondent
  text: Jacksonville did do it better than we did, but, if I remember correctly, this was their second approach, and this
    was our first approach. Also, we started out very idealistically that we would have these open hearings and we would let
    everybody be heard, and we would come up with the very best answers we could to the questions. That we would not have
    any preconceived answers. I think theoretically we were right. I think practically we were wrong from the standpoint of
    getting it done. Had we gotten it done, we would have had an ideal situation and an ideal government. You realize as you
    go through life you don't get things perfect. You start with them imperfect and, then, improve them as you go along. I
    say today that now, if I had it to do over again, I would respectfully say that we just abolish the city government of
    Charlotte and just let the Mecklenburg County commissioners be the government for Charlotte and Mecklenburg and, then,
    improve it as we go along.
- speaker: Interviewer
  text: Any chance for that?
- speaker: Respondent
  text: I think there is some chance of that in the near future, yes.
- speaker: Interviewer
  text: One thing I'm wondering about. I see the argument for efficiency and providing services and whatnot and the idea of
    the broad representation and groups perhaps not presently represented in the government having a voice through district
    representation and whatnot. That sounds, as you say, very idealistic and humanitarian. Now, a power structure generally
    does not, the influential group generally does not divulge itself of some of its power willingly. What brought some of
    you folks to want to, perhaps, to spread some of the representation and the power?
- speaker: Respondent
  text: Well, I think we had some very fine, very able men such as Jones Pharr, such as Cliff Cameron, and men of this caliber,
    who came up the hard way. Yet, they were broad of mind and broad of thought and well-educated, and they realized, in the
    final analysis, that only the strong can afford to be kind and fair and understanding. They realized, from their own business
    experience, that, when you give people input into something, you don't make something weaker. You make something stronger.
    After studying it carefully, they came up with this was the proper way to do it, not to do it halfway or halfheartedly
    or just get it through, but get it through right. I don't think they were wrong in what they tried to do at all. I think
    they were right. I think it was the fact that people were not working with their minds. They were working with their emotions.
    I think history will prove them right. I just don't think we got it as quickly as we could have gotten it otherwise, had
    we pursued it on a different basis.
- speaker: Interviewer
  text: Was there any crisis, sort of, in government that sort of prompted the push towards consolidation? I remember reading
    in the... The chamber had brought up the discussion of consolidation somewhere '62 or '63 somewhere program of work in
    there for that year. There were several comments in the paper from the mayor and other people that "This would be a nice...
    We want to work towards this. This is a good idea. But it will probably be ten or fifteen or twenty years before we actually
    get to it." Then, all of a sudden, sort of, in '67, '68, '69, there was a much increased interest. Then, there's the study
    commission and the charter commission. What... Did the water and sewer situation or anything along this line really prompt
    this?
- speaker: Respondent
  text: I think there were a good many things. I think some other communities had done it. I think this was part of it. I
    think the fact that we'd put schools together was part of it. I think that we were studying, putting together and did
    later put together, the police departments. I think this was part of it. I think a few people who were thinking and being
    active in government in various ways, whether as elective candidates or on boards, saw that there's bound to be a certain
    amount of buck-passing where you have two bodies who are overlapping. I think they could see the difference in the planning,
    whether it be water and sewer, whether it be schools, whether it be police departments, or whether it be such things as
