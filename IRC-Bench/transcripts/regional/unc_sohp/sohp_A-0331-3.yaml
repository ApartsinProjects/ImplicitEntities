collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: I think that Hoover is a man that has enjoyed tremendous respect over the years.
- speaker: Respondent
  text: In his lifetime, I suspect that he was one of the most admired Americans.
- speaker: Interviewer
  text: Was he also one of the most powerful?
- speaker: Respondent
  text: Yes, he was.
- speaker: Interviewer
  text: And do you think that would . . . did he have too much power?
- speaker: Respondent
  text: Possibly did have. I believe that it is one of the English lords who said, "Power corrupts and absolute power corrupts
    absolutely." There is some truth in that.
- speaker: Interviewer
  text: You know, I incidentally filed earlier this year and got my own FBI file under the Freedom of Information Act, and
    found that they had kept a file because I had written various articles that Hoover didn't like or that the FBI didn't
    like. They've also found that a number of political figures and civil rights figures and so forth had files. Did you ever
    have any idea that they kept a file on you?
- speaker: Respondent
  text: I supposed that they did have. I visited Japan in 1939 as a guest of the Japanese government and when Ellis Arnall
    was running against my father in 1942, he portrayed me as somewhat of a traitor at that time, even though I was engaged
    in combat in the South Pacific, for having gone to Japan as a guest of the Japanese government. I presume that might have
    triggered an FBI investigation on me, I don't know. I never cared, really.
- speaker: Interviewer
  text: You know, I was probably . . . like an awful lot of people say at my age, when I was a kid, I not only looked up to
    the FBI but I even applied for a job with them when I got out of high school and was accepted for a clerical job. I went
    into newspapering instead and I know that you had tremendous respect, and so did everyone else, for the Bureau. What do
    you think about disclosures of both the FBI and the CIA, what they did? For example, the plots to assassinate foreign
    leaders and the information that has come out on that?
- speaker: Respondent
  text: It undoubtedly has adversely affected the morale of both agencies, the CIA and the FBI. Senators who have been overseas
    during the past year tell me that the CIA's sources of information are drying up. All these disclosures have undoubtedly
    affected the efficiency of both departments, in my judgement. Particularly the CIA, whose primary sources of intelligence,
    of course, are foreigners.
- speaker: Interviewer
  text: Do you think that the disclosures have been good overall?
- speaker: Respondent
  text: Overall, in the end, I think that it will have a salutary effect. These things have a way of cleansing themselves
    and I don't think that you will ever see circumstances occur like that again in your lifetime.
- speaker: Interviewer
  text: Would you ever have had any idea at all, for example, going back to J. Edgar Hoover, that he would have been supplying
    presidents from Franklin D. Roosevelt on up with political information on various people?
- speaker: Respondent
  text: Oh, I had assumed they had done that. I remember back during my father's lifetime, he was probably the first Democrat
    to get at odds with President Roosevelt. They set the tax people on him and investigated him for ten years, going into
    all of his farms and counting chickens and hogs and cows and searching for concealed bank accounts in Cuba, Mexico and
    Canada. They completed their investigation about the time that I returned from the Navy. One of them came up and presented
    him with a bill, I think, of something like two thousand plus dollars and he used some profanity and told them that if
    they thought he owed any income tax to go over to the courthouse and get him indicted and he would meet them there. That
    was the end of it and when he died, they never even presented the bill.
- speaker: Interviewer
  text: And he never paid the bill?
- speaker: Respondent
  text: He never paid it.
- speaker: Interviewer
  text: Well, was that accepted then as just sort of hard boiled politics?
- speaker: Respondent
  text: Yes. Roosevelt was a hard boiled politician and probably one of the hardest boiled in the history of the country and
    I think that he thought deep down that all politicians were crooks. Of course, they had moved in on the Long dynasty,
    as you remember, in Louisiana and sent several of them to the penitentiary, but they never did find anything wrong with
    my father.
- speaker: Interviewer
  text: Have there ever been any investigations aimed at you that you know of? I mean, were they out in the open?
- speaker: Respondent
  text: Not that I know of. They have denied some depreciation on our ham plant down there many years ago. I think that I
    could have gone to court and won, but politicians can't get into litigations about their income taxes.
- speaker: Interviewer
  text: I think that President Nixon learned that, didn't he?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Let me ask you, going back to Nixon, and I guess that we can skip around on some of these subjects, we never talked
    about the Ford pardon of Nixon.
- speaker: Respondent
  text: I think that all Americans had somewhat of an ambivalent feeling on that and that was my own reaction. I don't think
    many, if any, Americans wanted to see a former President of the United States serving in the penitentiary, but they were
    indignant that Ford pardoned Nixon before an indictment or trial. From his standpoint, it was a grave political error.
    From the standpoint of the country at large, getting that issue behind us probably was a good thing.
- speaker: Interviewer
  text: And you still think that? Even the timing of the pardon?
- speaker: Interviewer
  text: You don't think that there was a deal or anything?
- speaker: Respondent
  text: No. I think that Gerald Ford is a completely honorable man.
- speaker: Interviewer
  text: Another issue that I think we didn't touch before, Senator, were your feelings on the Vietnam war.
- speaker: Respondent
  text: Well, from the very outset I thought that we were making a mistake getting in there. My own patriotism is somewhat
    like Stephen Decatur's, I believe it was, who said, "My country, in her intercourse with a foreign country, may she always
    be in the right, but my country right or wrong." My loyalty follows the flag and troops wherever they may be.
- speaker: Interviewer
  text: Well, did you think when we did get out that we got out as gracefully or the only way that we could?
- speaker: Respondent
  text: We got out about the only way that we could. It was a no win proposition. The country was not behind the war effort.
    The President was not behind the war effort. When you get involved in a war, the only way to fight it is with every resource
    that the country possesses and go for the jugular vein. We didn't do that. We had our troops over there fighting with
    one or both hands tied behind them, the country badly divided and generally nonsupportive of the war.
- speaker: Interviewer
  text: You think that we should have moved in earlier, then, and won the war?
- speaker: Respondent
  text: Once we committed troops there, we should have gone all out to win and in my judgement, if we had utilized the full
    resources of the country at that time, we probably could have won it in ninety days to six months.
- speaker: Interviewer
  text: Currently, there is a discussion going on about how much aid or whether there should be any aid at all of the United
    States put into Angola, the feeling being that it could be another Vietnam. Did you see it not only there, but a possibility
    of our getting into other Vietnams?
- speaker: Respondent
  text: I don't think that there is a possibility of us committing troops there. I think that we learned too great a lesson
    from Vietnam on that ground. I do think it is a mistake for this country to get involved in these tribal wars and when
    Russia moves in, we move in and vice-versa, because in the long run, I don't think that any white power can gain any advantage
    in Africa under present conditions. They are intensely nationalistic and I think that those countries will either go Communist
    or have some local variety of a dictatorship. I think that we have nothing to gain by getting involved there.
- speaker: Interviewer
  text: Well, do you see the possibility of our ever getting involved in any other Vietnams or do you think that the country
    has really learned that lesson? Not just Africa, but . . .
- speaker: Respondent
  text: I think that we have learned that lesson. I can only speak for myself and I am not in favor of getting involved anywhere
    with any power at any time anywhere in the world, unless our own national security is involved.
- speaker: Interviewer
  text: Senator, we talked quite a bit over these previous interviews about your past stand on racial issues and so forth.
    Is race dead as a political issue in this country?
- speaker: Respondent
  text: Well, it depends on how you mean "race as a political issue." If you resort to compulsion to move people around to
    try to get some sort of mythical racial balance, it is the most volatile issue there is in America today. Race as such,
    arraying blacks against whites or whites against blacks is, I think, relatively dead, unless you resort to this business
    of compulsion which all people resent, black and white.
- speaker: Interviewer
  text: But that's not an issue today in Georgia, your own state?
- speaker: Respondent
  text: No, it's not an issue in Georgia except that the overwhelming majority of people in Georgia and everywhere else in
    the nation, both black and white, are violently opposed to this forced busing. They think that it is a denial of their
    basic freedoms and I certainly think so.
- speaker: Interviewer
  text: Are there any other areas at all where you see that as an issue?
- speaker: Interviewer
  text: One thing that we did talk about quite a bit before was when you, in 1966 I believe it was, considered returning to
    Georgia to run for governor. I've had some people tell me that that was the one political mistake that you made, getting
    involved in that whole exercise of thinking you were going to run and then deciding that you weren't going to run. Do
    you agree with that assessment, that it was a big political mistake?
- speaker: Respondent
  text: Well, I don't know what you mean by "mistake." I didn't run. In fact, it would have been a mistake if I had run. Here's
    what happened in that regard. Vandiver, who had been governor and was expected to run again, was an odds on favorite to
    win overwhelmingly and he had no great substantial opposition, as a matter of fact. He called me one day and said, "Senator,
    I need to see you and I am coming up to Washington tomorrow morning, arriving at Dulles Airport at such-and-such a time
    . . ." It was five or six o'clock in the morning as I recall. I said, "Well, Ernie, I'll meet you out there and bring
    you in for breakfast at the house." So, he told me coming in that his doctor told him that he had serious heart trouble
    and if he ran for governor, he would be taking his life in his hands and he had some young children that he had to educate
    and couldn't afford to sacrifice his family and that he thought I ought to come home and run for governor. He knew that
    I had been somewhat unhappy in the Senate. All former governors are. A governor can make a decision and execute it. A
    Senator can make a decision and talk about it. There is a tremendous difference between the roles of the two. I gave it
    some thought and about the next day, I announced the fact that I was considering coming home and running for governor.
    I had an amazing reaction. Telephones in the office, all of them, and in my residence were ringing constantly twenty-four
    hours a day and every two minutes, a stack of telegrams would come in a foot high. Within forty-eight hours, the mail
    started arriving and in the course of two or three days, we received something like 10,000 communications from Georgia.
    Politicians, black and white, liberal and reactionary and moderate were of one choice only, "For God's sake, come home."
