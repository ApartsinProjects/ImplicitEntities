collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Senator, can we go back to Georgia politics and the Democratic party? I believe that it was in 1964, wasn't it, that
    several of your colleagues in the Democratic party decided to change parties?
- speaker: Respondent
  text: I believe that it was '64. That was the Goldwater race, I believe, and that was '64. Five statehouse officials who
    were elected as Democrats switched over to the Republican party.
- speaker: Interviewer
  text: There was Crawford Pilcher and . . .
- speaker: Respondent
  text: Crawford Pilcher, who was a member of the Public Service Commission, Alpha Fowler, who was a member of the Public
    Service Commission, Jack Ray, who was State Treasurer, Phil Campbell, who was Commissioner of Agriculture and Jimmy Bentley,
    who was Comptroller General.
- speaker: Interviewer
  text: The State Insurance Commission.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Now, at least one of those office holders came to talk to you about it.
- speaker: Respondent
  text: Yes, Jimmy Bentley . . .
- speaker: Interviewer
  text: Who had been your executive secretary.
- speaker: Respondent
  text: He was visiting Washington and in his capacity as president of the National Insurance Regulating Commission and he
    came by to see me about two days before that letter was made public in the news media in Georgia. He informed me of what
    these five statehouse officials were going to do. I spent about an hour trying to dissuade him from making that switch
    from the Democratic to the Republican party. I got the impression that my arguments were penetrating his mind but that
    all of them had crossed the Rubicon together at a previous meeting and he would not change his mind.
- speaker: Interviewer
  text: Was there any pressure on you at that time or any other time to ever get out of the Democratic party?
- speaker: Respondent
  text: No . . . well, of course, when Strom Thurmond switched from the Democratic party to the Republican party, I got several
    hundred letters and telegrams from Georgians urging me to do likewise and in my reply to them, I pointed out that we had
    two elements in the Democratic party and two elements in the Republican party, that the Republican party of Javits and
    Case and Earl Warren was no more attractive to me than some elements in my own party.
- speaker: Interviewer
  text: So, you never really gave any serious consideration to it?
- speaker: Interviewer
  text: In other words, you never really felt that the party was leaving you either, because it is such a diversified party?
- speaker: Respondent
  text: Oh, the Democratic party has always covered every segment of the American society and it boxes the compass of all
    political opinion. I find myself comfortable with some members of the Democratic party and uncomfortable with others.
    The same thing is true in the Republican party.
- speaker: Interviewer
  text: You would describe yourself generally as a conservative?
- speaker: Respondent
  text: 'Oh, it depends on your point of view. I think that this "liberal-conservative" term has been much abused. Some people
    would consider me a wild-eyed radical on many issues and other people would consider me a reactionary beyond redemption.
    I usually have three rules on voting on measures: one is, is it constitutional? Two is, is it in the state and national
    interest? Three, can we afford it? If I resolve all those issues in the affirmative, I usually vote "aye." If I resolve
    them in the negative, I usually vote, "no."'
- speaker: Interviewer
  text: Well, you are a fiscal conservative, there's not much question about that?
- speaker: Interviewer
  text: When I was talking to you before, Senator, we were talking about President Truman and you said that you felt that
    history would record President Truman as one of the great presidents. What about some of the other presidents, particularly
    since your own time in politics?
- speaker: Respondent
  text: Since I have been in the Senate, I have served under President Eisenhower, President Kennedy, President Johnson, President
    Nixon and President Gerald Ford. Dwight Eisenhower was a very attractive individual personally. He was a great military
    hero. He didn't know much about government. He meant well and I think that his subordinates made most of his decisions,
    called the shots and he would ratify them. Then of course, we had President Kennedy. He was a very charming, attractive,
    witty and personable fellow, but he had almost a complete failure in getting Congress to adopt his programs. Then after
    he was assassinated, of course President Johnson took over. He and I had been very close when he was majority leader of
    the Senate and when I first came to the Senate, he went out of his way to be as cordial and pleasant to me as he possibly
    could. I was made chairman of the Calendar Committee my freshman year in the Senate. It is the responsibility of that
    committee to look over the bills on the calendar call and to object to those that may be controversial and should not
    pass on a consent calendar. That was about the most choice assignment that a freshman Senator could have. He put me on
    the Agricultural Committee the first year that I came to the Senate. He put me on the Finance Committee the third year
    I was in the Senate, which is a much sought after post. He did everything for me that he possibly could. Johnson was the
    most able majority leader, probably, in the history of the country. He knew the legislative process very well. He knew
    the personalities in the Senate, and more about them than any member of that body. He knew their hopes and dreams and
    pet peeves and prejudices. He knew which ones could be driven like an ox. He knew which ones could be led with a carrot.
    He knew which ones could be motivated by certain special interests in their own state. He was a very artful majority leader.
    When he got to be President, he over committed himself on social programs and the programs and policies that were started
    during his administration, I feel certain, are piling up these huge deficits that are the cause of most of the monetary
    problems that we have and the fiscal problems that we have in this country at the present time. And of course, he was
    succeeded by President Nixon. Nixon was Vice-President of the United States when I came to the Senate. My personal relationship
    with him was very, very cordial. I always gave President Nixon extremely high marks for being a total Machiavellian type
    politician who could read the mood of the country very well and react thereto. But his actions in this Watergate thing
    are a mystery to me today because a ten year old child should have known better. When that thing first came into public
    domain, if he had gone on nationwide television and made a speech and said substantially that in politics, "loyalty is
    the name of the game, I have been in politics virtually all my adult life. My friends have been exceedingly loyal to me.
    I have been exceedingly loyal to them and in this instance, too loyal. I am discharging everyone responsible for it today.
    I apologize to the American people and pledge that it won't happen again," well, it would have been forgotten. Then, too,
    as soon as Butterfield blurted out before the Watergate Committee about those tapes, it is still a mystery to me why he
    didn't destroy them within fifteen minutes.
- speaker: Interviewer
  text: He could almost have held a bonfire on the White House lawn and done it in the name of national security, couldn't
    he?
- speaker: Respondent
  text: Of course he could. It was his property, he could have done anything with them that he wanted to. Instead of that,
    he had this wild conceived notion about executive privilege and that was the only corroborating evidence of John Dean's
    there was. If he had first pled what we lawyers call "confession and avoidance" in a statement and then secondly, if he
    had burned his tapes, he would be President today. Now, of course, Gerry Ford succeeded him and . . .
- speaker: Interviewer
  text: Let me ask you this. It is hard to see Nixon outside of Watergate, but outside of that, how do you think Nixon did?
- speaker: Respondent
  text: I think that many of his policies were good for the country. He tried to discourage enormous spending, with limited
    success, I may say. Only history will determine how this policy of detente is going to work, but the Soviet Union and
    the Red Chinese and the United States all live in the same world. All three of them are nuclear powers. It is in the interest
    of all three of those nations to avoid any confrontations, particularly a nuclear confrontation that could destroy civilization
    as we know it today.
- speaker: Interviewer
  text: And you were going to say about Ford.
- speaker: Respondent
  text: I've known Gerry Ford since I came to the Senate. I didn't know him extremely well until he became Vice-President
    of the United States. You can't be around Gerry Ford without liking him. He is a patriotic, loyal, God-fearing American.
    I think that his candor and his openness have impressed the American people. It comes through on television and that is
    a particularly desirable trait in the aftermath of Watergate and the Nixon years. Now, this country has so many problems
    today that I don't think any President of the United States could make a good president. I think that Gerry Ford is doing
    the best that he knows how. No one can predict what will happen in 1976, but if our economy recovers rather rapidly, I
    think that he may well be difficult to defeat.
- speaker: Interviewer
  text: I've heard a lot of people, Senator Talmadge, say that around the country President Ford is respected for his openness
    and for his being candid and so forth, but he is also perceived as a man who is just not quite up to the job of President,
    he just doesn't quite have the ability.
- speaker: Respondent
  text: I don't think that he is the smartest president that we have ever had in the United States by any means, but I think
    that the people are not necessarily looking for the smartest man in the world today. They are looking for a candid man
    who is forthright and will lay it on the line like it is and Gerry Ford pretty much does that.
- speaker: Interviewer
  text: What about one of your fellow Senators who was the nominee of the Democratic party once and was Vice-President, Senator
    Humphrey?
- speaker: Respondent
  text: Hubert Humphrey is a very brilliant man. I think that he probably has the best coordination of mind and tongue of
    any man that I ever saw. He can make a brilliant speech on any side of any subject with or without notice. Hubert thinks
    that somehow the government possesses all the wealth in the world and they ought to distribute it to the people. He had
    not yet realized that the government possesses no wealth until they first take it away from the people.
- speaker: Interviewer
  text: What about another of your colleagues, Senator Edward Kennedy?
- speaker: Respondent
  text: Ted Kennedy is a very attractive fellow and of course, I guess that the Kennedys were born to run for public office,
    I don't recall that ever in history have we had three brothers, all having served in the United States Senate. I am not
    convinced as yet that Teddy won't run if the convention starts yelling for him about the fifth or sixth ballot.
- speaker: Interviewer
  text: Do you think that he could overcome Chappaquidick and be elected if he was nominated?
- speaker: Respondent
  text: I don't know how serious Chappaquidick has effected his political future. Evidently it hasn't hurt at all in Massachussetts.
    The polls show him overwhelmingly in the lead with the Democrat
