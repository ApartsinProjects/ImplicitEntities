collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: If you would, I'd like you to tell me just a little bit about your own background, just a summary. Are you a native
    of Birmingham?
- speaker: Respondent
  text: Yeah, I'm a native of Birmingham, was educated in Birmingham. Talladega College. University of Kansas. Attained a
    couple of honorary degrees from Miles College, Daniel Payne College. I'm married with two children. One's an associate
    clinical psychologist at the medical center. And my younger daughter, who is outside pinch-hitting for my secretary who
    is on a vacation, has a master's in social work and she's doing work on her doctorate at the University of Illinois. My
    wife's a former school teacher, so she's a housewife now.
- speaker: Interviewer
  text: And the beginnings of your political involvement began when?
- speaker: Respondent
  text: Well, the first time I ran for public office was in 1942. I ran for the legislature and at that time, of course, it
    was merely to encourage blacks to register because we had less than 1,000 voters in this county, entire county.
- speaker: Interviewer
  text: How many are there now in Jefferson County?
- speaker: Respondent
  text: About 80,000 I guess now. About 80,000 in Jefferson County now. And then of course in 1952—I believe it was '52—six
    of us filed for the county executive Democratic committee and we were denied the right to qualify, so we filed a suit
    in federal court and got an injunction against the entire election. In which election the governor of the state, senator,
    and sheriff . . . in fact the entire state election was enjoined. And then of course they permitted us . . . as a settlement
    they permitted us to qualify and run for the county executive Democratic committee. And the six of us won. Of course after
    that I ran for the legislature again. Made a creditable showing that time. Got some approximately 60,000 votes in the
    runoff, but it wasn't quite enough to be elected.
- speaker: Interviewer
  text: When was that?
- speaker: Respondent
  text: That was in 1964, I believe it was. '64. Then of course in 1968 there was a vacancy on the city council and I was
    appointed to fill an unexpired term of a man on the council who had died.
- speaker: Interviewer
  text: The appointment was made by whom?
- speaker: Respondent
  text: By the city council. Then of course the following year I ran for election and was elected by the second highest vote
    of all candidates running. And this year . . . No, these years get by so . . . it was last year . . in the runoff, I was
    elected again for a second four-year term. Also was elected president pro temp of the city council. In the last primary
    I ran for the state executive Democratic committee and had no opposition. So this is my second term on the state executive
    Democratic committee. I was also a member of the 1968 delegation to the national Democratic convention in Chicago and
    in '72 I was a delegate to the convention in Miami. The '68 convention, I was one of the two persons from Alabama who
    was a member of the credentials committee. So I guess that sort of brings you up to date.
- speaker: Interviewer
  text: All right. And in addition to your political involvement, how about other civil rights activities?
- speaker: Respondent
  text: Well, you probably have heard that for about 15 years I was the only black lawyer in the state practicing. And all
    of the early civil rights cases, matter of equalization of teachers' salaries, suits against board of registrars to require
    them to register blacks, voiding zoning ordinances. Whereas in the South you had laws or zoning ordinances in cities that
    restricted the use and occupancy of property based on race. Whereas in the North you had restricted. During the 1963 demonstrations,
    I represented King in the groups here in Birmingham and also one of the lawyers who represented him in Montgomery. But
    here we had over 3,000 who were arrested and I was counsel for.
- speaker: Interviewer
  text: Was Charles Morgan still here then?
- speaker: Respondent
  text: Yes. Charles Morgan was still here then.
- speaker: Interviewer
  text: Did you work with him at all?
- speaker: Respondent
  text: Yes we worked with him, or he worked with us on the case against the election officials when we filed application
    to enjoin the state election.
- speaker: Interviewer
  text: Am I correct that your house was bombed?
- speaker: Respondent
  text: Twice. Yeah, house been bombed twice. And there were a couple of attempts.
- speaker: Interviewer
  text: How much damage was there?
- speaker: Respondent
  text: Well, about $18,000 damage in the two bombings.
- speaker: Interviewer
  text: Were you home at the time?
- speaker: Respondent
  text: I was home each time.
- speaker: Interviewer
  text: When you were asleep, or what?
- speaker: Respondent
  text: No. The first time I was back in my recreation room, which was at the far end of the house. My house is 106 feet long,
    ranch style house. And no one was injured. The far end of the house was damaged. And two weeks later I was sitting in
    my living room and decided I would go out on the porch and kind of watch. And just as I got up to go outside . . . If
    I'd been a moment or two earlier, the glass would have caught me full in the face. Just as I got up to go outside. My
    front door was blown in. That time my wife was injured. She had retired. She had a concussion. Brain concussion. But that
    was the only injury. My daughter was in Europe at the time.
- speaker: Interviewer
  text: What year was that?
- speaker: Respondent
  text: That was in '63. Both times in '63.
- speaker: Interviewer
  text: Were any arrests ever made on those?
- speaker: Respondent
  text: No, I don't believe there ever was. And yet I'm not too sure. It seems as though they did pick somebody up for questioning.
- speaker: Interviewer
  text: How did you feel about that . . .
- speaker: Respondent
  text: Well, the only thing it did was to anger me that I couldn't at least get a pot shot at the persons who were perpetrating
    these bombings. I was never frightened or anything. But as I say, it angered me that I couldn't retal—I wasn't of the
    nonviolent type. I had a sufficient arsenal there at my house that if I had gotten a chance I would have retaliated in
    kind. But I never was able to . . .
- speaker: Interviewer
  text: Did your wife have any permanent . . .
- speaker: Respondent
  text: No, no. No permanent injury. And later, on a Sunday morning, during '63 also, I was, started to church. There's a
    Catholic church about one block from my home and persons who had gone out from mass were coming back said that we found
    a box of dynamite with a time in it to go off at a certain time. I said well, I might look around the church that I was
    attending, which was right across the street from there. And it occurred to me, I said I better go and look around my
    own home. And went back and there was a box with 48 sticks of dynamite, just enough out of the box to set a time clock
    in it. And it was set to go off at 12 o'clock. And they had to send over to Anniston, to army camp over there, to get
    some demolition experts to come and deactivate it. So they got there five minutes before 12. The officers had come and
    had everybody to move out of that block. There was that much dynamite . . . the force . . . anybody in the block would
    probably . . . would have destroyed their houses. So that was the last attempt on my house. Immediately after '63, then
    in '64 you had the Civil Rights Act and in '65, the Voter Rights Act and things really began to change. This city . .
    . no comparison now in this city with what it was prior to 1963.
- speaker: Interviewer
  text: How is it now?
- speaker: Respondent
  text: Well, just like any metropolitan city. Much better than . . . it's not considered one of the twenty most segregated
    cities in the country. And prior to that it was considered one of the worst cities for race relations in the whole country.
    Three years ago the city was awarded the distinction of being one of the so-called All-American cities. There were no
    blacks on any of the boards or commissions. And of course, as you probably have found out, we've got two blacks out of
    five on the city board of education. There are two of us that are on the council and we were elected at large out of our
    districts.
- speaker: Interviewer
  text: Out of how many?
- speaker: Respondent
  text: Two out of nine.
- speaker: Interviewer
  text: So that means both of you have to have white support.
- speaker: Interviewer
  text: How do you campaign in a white community?
- speaker: Respondent
  text: Well, I campaign in a white community on the basis of trying to have them to know that we're going to represent the
    citizens of the city for the best interests of the citizens and the city. And the services that the city's required to
    give, they'll all get a fair shake. And I had the distinction, they tell me, that I've been able to get more done for
    them than anybody else prior to my being elected to the council. That is, certain city services . . .
- speaker: Interviewer
  text: What would be some examples?
- speaker: Respondent
  text: Well, the matter of . . . for the first four years I was chairman of the public works committee. I had charge of streets,
    street lighting, traffic engineering, where they wanted a traffic light and where they wanted some paving done or sewers
    installed.
- speaker: Interviewer
  text: Did that make a real difference, particularly in black areas?
- speaker: Respondent
  text: Oh yes, yes it did. Then of course so far as the blacks were concerned, as has happened in this city like in many
    other cities, whites would move out of certain sections and blacks are moving in. And where blacks moved in they begin
    to build apartments and blacks were under the impression that it was single family . . . property was zoned for single
    family. And of course I had an ordinance passed to require sales to indicate how the property was zoned. Whether it was
    single family or multiple family. The majority of the employees in the public works department—street, sanitation—were
    black. And they were denied many of the things that the employees who were under civil service - for instance, a person
    that had been working for ten or fifteen years received the same pay as a person who was hired today. No distinction.
    They had no sick leave and that sort of thing. The few whites who was in that department along with blacks came to me
    and I had them to meet with the entire council and we had that situation changed. So, you see, I have represented all
    of the citizens. Make no distinction. But in many instances where blacks were shortchanged I did see that they got a fair
    shake.
- speaker: Interviewer
  text: Tell me a little about . . . what's it called?
- speaker: Respondent
  text: Operation Birmingham. Operation New Birmingham?
- speaker: Interviewer
  text: Right, Operation New Birmingham.
- speaker: Respondent
  text: Well, Operation New Birmingham had its origin in that a group of blacks listed several things that really needed attending
    to in the city. One, there were no blacks on the police force. And by concerted effort . . . it was through Operation
    New Birmingham that we were able to get blacks on. So now we have about thirty-eight.
- speaker: Interviewer
  text: This was beginning when?
- speaker: Respondent
  text: Oh, it was shortly after this . . .'63. I don't know exactly.
- speaker: Interviewer
  text: Were you involved directly in Operation New Birmingham?
- speaker: Respondent
  text: Oh yes. Still am. I'm on the board of directors and on the executive committee.
- speaker: Interviewer
  text: Was that sort of a prelude before your appointment to city council? Your involvement in Operation New Birmingham.
- speaker: Respondent
  text: Yes, I was a member of Operation New Birmingham at the time.
- speaker: Interviewer
  text: What are some of the other areas of concern? Let me ask you—get back to the police. That's thirty-eight out of how
    many?
- speaker: Respondent
  text: Oh, five hundred. Between five and six hundred.
- speaker: Interviewer
  text: Are you satisfied with that rate of progress?
- speaker: Respondent
  text: No, we also had an ordinance passed requiring the city to institute what is known as an affirmative action program
    for not only hiring in the police department but in all of the departments. And to make periodic reports as to how it's
    coming along. Now one of the problems really was getting blacks to apply. See, blacks have had sort of reluctance to come
    [into] police work. And those who did have the qualifications were in the position to get better paying jobs being paid
    by the police department. But now they are able to . . . they're gradually increasing the number.
- speaker: Interviewer
  text: How about the fire department?
- speaker: Respondent
  text: Well, it's been . . . it's very slow. I don't think we have over two in the fire department. There haven't been applicants.
    For so long . . . I mean blacks have been conditioned on certain jobs that it's just been hard to interest them in certain
    jobs. I might also mention that after the last primaries you had several contests or challenges by defeated candidates.
    And I have served as one of the hearing officers, or members to determine. The last one we had was two persons where one
    was nominated for supreme court and the defeated challenger. That was the last hearing we have had.
- speaker: Interviewer
  text: Was the hearing held before the Democratic executive committee?
- speaker: Interviewer
  text: How many people serve on the hearing?
- speaker: Interviewer
  text: So how would you characterize the state Democratic Party today?
- speaker: Respondent
  text: Well, under Bob Vance's leadership, I would say it's fairly liberal in that it's been loyal to the national Democratic
    Party and it was one of the first states to have its plan, so far as including blacks, young and women . . . one of the
    first states and its plan has been used as a model by some of the other states. In the last Democratic convention about
    a third of the delegates were black. And now we've got, well, in this county, about a third of the members of the county
    Democratic committee are black.
- speaker: Interviewer
  text: And what's the population ratio?
- speaker: Interviewer
  text: So it's pretty much on line.
- speaker: Respondent
  text: Yeah. And we have elected nine members of the state legislature. Two of the senate and seven in the house, from this
    county. Out of twenty-seven. But out of that twenty-seven now, all are not in Jefferson County because under the redistricting
    plan some of them run across county lines. So blacks have fairly good representation.
- speaker: Interviewer
  text: What is the black political organization in Jefferson County?
- speaker: Respondent
  text: The Progressive Democratic Council.
- speaker: Interviewer
  text: Is the Progressive Democratic Council affiliated—
- speaker: Respondent
  text: With the Alabama Democratic Conference.
- speaker: Respondent
  text: I was the first president of the Alabama Democratic Conference. For twenty-six years I was president of the Jefferson
    County Progressive Democratic Council. Finally gave it up
