collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: We felt we were moving in the right direction.
- speaker: Interviewer
  text: You characterize yourself and others as being naive—idealistic would be another way to put it.
- speaker: Respondent
  text: Idealistic, I suppose, would be a better term.
- speaker: Interviewer
  text: One of the first things that fascinated me about you was your leadership of that G.I. revolt in Garland County in
    '46.
- speaker: Respondent
  text: '''46, that''s right.'
- speaker: Interviewer
  text: There were other very similar things happening in the South almost simultaneously. There was one in a rural county
    in Tennessee, around Athens, Tennessee, that turned into a gun battle really.
- speaker: Respondent
  text: Yeah, I think that was a sheriff, wasn't it?
- speaker: Interviewer
  text: Yeah, guys ended up surrounding the jail. They had hand grenades and automatic weapons, and they brought them out
    like prisoners.
- speaker: Respondent
  text: '''Course, this was right after the war, and service men coming back were rather displaced, you know. They didn''t
    have any deep roots, and they were in a transition. So they were willing to take on these hot spots. In Garland County,
    of course, the McLaughlin machine had been entrenched, well, throughout the 19th century anyway. ''Course, he had inherited
    it and strengthened it, and it was based upon illegal gambling. The gambling, as such, didn''t bother me, but all the
    things that it led to in order to operate an illegal gambling establishment was what led to so many of the evils. It being
    illegal, they had to control the law enforcement officers. Had to control the sheriff''s office, the district court, the
    mayor''s office, the marshal. They even controlled the jury system. He was a lawyer, and, ''course, he practiced law.
    They would select the juries from employees of the gambling establishment—the bookies in Belvedere and these other casino
    places. Unless you had the administration with you in a case, you couldn''t win it. In order to protect their empire,
    they resorted to almost any type of coercion that''s imaginable, and even shooting people. I remember the last man that
    really impressed and made me aware of the situation in Garland County—I was in high school, I guess I was a senior in
    high school. I was going with a girl named Evelyn Smith, and her uncle on her father''s side, Brad Smith, ran for sheriff
    against the gang, and, of course, he was defeated. Then they assassinated him, killed him. Another man ran for mayor against
    McLaughlin, and they bought up the mortgage on his home and foreclosed on it. ''Course, they even got into the school
    system, the employment of teachers. So it was a bad situation that I had an ambition to try to correct. Then when we came
    back from the war, ''course we had been through some battles, you know, and so forth. So it wasn''t intimidating to us.'
- speaker: Interviewer
  text: You knew how to play rough too.
- speaker: Respondent
  text: Knew how to play rough too. So we organized, and on election day in the primary of, I guess, July-August of 1946,
    we had a platoon of people in a central area at the Ricks Automobile Agency ready to move anywhere that they needed to
    move.
- speaker: Interviewer
  text: Just like a platoon in the military.
- speaker: Respondent
  text: That's exactly right.
- speaker: Interviewer
  text: Armed and ready to move out.
- speaker: Respondent
  text: That's exactly right. The second ward was one of the wards that they used for transients, repeaters, and so forth.
    They would vote those people several times, whether or not they were qualified to vote or residents or anything. Then
    they'd move them around to other polling areas. But the second ward was the worst. We put the word out that the FBI agents
    were in there checking on the election. Hoover, really, gave us some backhanded support. He couldn't get directly involved
    in anything, but he gave us some information and so forth, the agents did. So we set up cameras at the second ward and
    started taking pictures of these people coming through, and they disbursed. So it cut down tremendously on their vote
    in that ward. However, all of our candidates were defeated in that first primary. I was elected because we had another
    county in the district that was over in Mount Ida, Montgomery County. I carried Montgomery County handsomely. We had the
    telephone lines cut so that the people who were supporting them in Montgomery County couldn't call in and tell them what
    the count was so they'd know how many votes in Garland County to get in addition in order to win the election. That kind
    of saved the situation for us, and, of course, when the votes were published by the newspaper, the newspaper people got
    it, then we knew exactly how many votes we'd gotten in Montgomery County. So I was nominated, and then we had the general
    election coming up. The poll tax was the worst thing in the world for a fair election. It was just used by these machine
    counties in order to perpetuate themselves in office. Of course, the poll tax originally was enacted, as you know, to
    keep the blacks from voting, but then it kept a lot of white people from voting. Not only did you have to pay the poll
    tax, but you had to get your poll tax a year before. In order to have voted in the August primary of 1946, they would
    have had to have gotten a poll tax by November 1, the preceding year.
- speaker: Interviewer
  text: Have to have paid their poll tax.
- speaker: Respondent
  text: Paid their poll tax, see, and 'course, you can't generate much interest. The professional politicians know about that,
    and go out and buy them up. 'Course, in Garland County they bought up blocks of poll tax. They just went down the telephone
    book and had them issued, you know. And they held those in reserve, and, of course, the judges and clerks, people who
    worked in the gambling establishments, when the poll closed, they could count out whatever votes they needed in order
    to win the election.
- speaker: Interviewer
  text: It's amazing, considering all that, that you guys were able to . . .
- speaker: Respondent
  text: Well, I tell you how we did it. We had a boy by the name of—what was his name, he was from Fort Smith—and we got him
    to run as a write-in candidate for Congress. The time had passed to file. I'll think of his name in a minute. But he was
    a write-in candidate for Congress. So that created a federal question. So we brought suit in United States District Court
    to avoid the poll taxes which they had purchased illegally, which they had obtained illegally. They had a very complicated
    formula that they used. It took us a long time to break that formula, as a matter of fact. My wife did it. She's a good
    bridge player.
- speaker: Interviewer
  text: You're referring now to the November election where all of the defeated candidates ran as Independents.
- speaker: Respondent
  text: That's right. They all ran as an Independent, and I supported them. We launched a poll tax drive to get people registered,
    because we could register them up until a week or two, a year before the election, see. And the people began to see, well,
    maybe we can win this. Maybe we can defeat this organization. My election gave us one law enforcement officer, so it was
    tantamount to nomination in the primary. So we went to work, and we avoided those illegal poll taxes. That was we were
    able to elect all the G.I. candidates.
- speaker: Interviewer
  text: Well, now, if you had not . . .
- speaker: Respondent
  text: Pat Mullis was the lawyer in Fort Smith who ran for Congress as a write-in candidate, and gave us a federal issue.
- speaker: Interviewer
  text: Did he win?
- speaker: Respondent
  text: No, no, we didn't even expect him to win.
- speaker: Interviewer
  text: It was just for the purpose of getting into it.
- speaker: Respondent
  text: Getting into federal court. And Judge John Miller was the federal judge who decided that case.
- speaker: Interviewer
  text: And also if the G.I. faction had not bolted the Democratic Party and run as Independents, you couldn't have done that
    either.
- speaker: Respondent
  text: Couldn't have done it. The Democratic primary was over. In order to have a shot, they had to run as Independents.
    Then you could file as an Independent twenty days before the election. So they all ran as Independents and fortunately
    were elected.
- speaker: Interviewer
  text: Now, that propelled you into the state picture.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: The visibility that you gained on that, and in '48 you ran for governor, and got elected in a run-off primary against
    a man who raised the race issue.
- speaker: Respondent
  text: That's right. As a matter of fact, we had several opponents. One of them was Jack Holt, and one was Uncle Mack McCrill.
    I forget who the others, several others.
- speaker: Interviewer
  text: But it was Holt that made the run-off?
- speaker: Respondent
  text: Holt made the run-off. I got into the run-off by 12,000 votes. McCrill was eliminated, but McCrill had a very strong
    following. He was a radio preacher, had a little orphanage, and he would go out and give out flour and things. He had
    a strong following among rural people. In the last days of that election, which was in August, they raised the race issue.
    They told the people I was going to hire black policemen and so forth and so forth. It was catching fire. As a matter
    of fact, our lead was cut down because of that.
- speaker: Interviewer
  text: Well, if you put that in the context of what was going on, that was Dixiecrat summer.
- speaker: Interviewer
  text: Even the governor of Arkansas at that time, Ben Laney, had effectively left the Democratic Party to help run a campaign
    for Thurmond and . . .
- speaker: Respondent
  text: They walked out of the convention with Strom Thurmond and Fielding Wright. Strom Thurmond was running for president,
    Fielding Wright for vice president, on the Dixiecrat ticket.
- speaker: Interviewer
  text: Which was a racist thing?
- speaker: Respondent
  text: A racist thing. That's right.
- speaker: Interviewer
  text: That's clear and simple, what it was.
- speaker: Respondent
  text: That's right. And they were against Truman because of his attitude toward race and fair employment and these other
    things that finally became a matter of course later on, this social legislation. Of course, Ben Laney joined them as—he
    was governor. When the primary was over, the gubernatorial primary, that was tantamount to election, in August, 1946.
    Well, I started campaigning for Truman, and he carried Arkansas by a large plurality. As a matter of fact, I think he
    got a better percentage vote, I know, than any state in the South, because I don't think he carried any states, maybe
    Arkansas and Texas. I'm not sure he carried Texas.
- speaker: Interviewer
  text: I don't believe he did.
- speaker: Respondent
  text: Anyway, he carried Arkansas by a large plurality vote, and he never forgot it. Truman came back to Arkansas. He came
    to Arkansas three times during his presidency. People were very helpful to us in our water development program and extending
    our rural electrification program and so forth. I got to know him quite well, and he was a great president.
- speaker: Interviewer
  text: Right, he was. What concessions did you feel you had to make in that primary campaign to this notion that all the
    charges . . .
- speaker: Respondent
  text: I didn't make any concession. I didn't even deal with the issue.
- speaker: Interviewer
  text: Well, I mean, like on the question of the Truman civil rights and that kind of thing?
