source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Just to sort of establish a little bit of a statewide relationship initially . . . In '64, you were Mr. Beverly Lake's
    campaign manager?
- speaker: Respondent
  text: Yes. I participated in his campaign in 1964.
- speaker: Interviewer
  text: Have you participated in other . . . I believe you were active for Pat Taylor?
- speaker: Respondent
  text: Yeah. I participated in the last gubernatorial campaign. I've participated one way or another, mostly on a statewide
    basis, in all the elections since 1960.
- speaker: Interviewer
  text: That was the first Lake campaign?
- speaker: Interviewer
  text: On the local scene . . . Oh, also on the state scene, is this your . . . have you been president of the State Baptist
    Convention? Is that this year?
- speaker: Respondent
  text: Yes. I'm president of the Baptist State Convention. I was vice-president for two years, and I'm now president of the
    Baptist State Convention.
- speaker: Interviewer
  text: Locally, I guess maybe the two big things that I'm interested in is the consolidation, which I believe you were one
    of the major figures in that, and at least touch tangentally on the school busing issue, but I haven't really . . . I've
    been reading the . . . I started in '57 and I'm now up into '66, so the more recent period I'm not especially clear on.
    As far as local politics, is your orientation more towards state or more towards local politics?
- speaker: Respondent
  text: Well, I participate in support of candidates on the local level. You know, every time we have an election as far as
    that's concerned, I make my financial contribution and work for the local candidates of my choice. I do this. I'm not,
    I've not taken office, that is campaign chairmanships and so forth, of local candidates over the years, but I've aided
    and assisted those candidates.
- speaker: Interviewer
  text: Is this mainly within the local Democratic party, or this also involves the local nonpartisan city elections?
- speaker: Respondent
  text: Well, I'd say it involves the nonpartisan city elections, also.
- speaker: Interviewer
  text: One thing I'm sort of wondering about . . . is the activity more sort of a . . . would be with a candidate who is
    sort of philosophically agreeable or . . .
- speaker: Respondent
  text: Well, any candidate I support has got to be kind of philosophically agreeable with my views . . .
- speaker: Interviewer
  text: But, I mean . . . this isn't because of some connection with an organization like the Democratic party . . .
- speaker: Respondent
  text: No, no, has nothing to do with that.
- speaker: Interviewer
  text: What types of candidates, maybe, would you be more likely to support? I mean as opposed say to a downtown candidate
    . . . I don't exactly know how to characterize some of the . . . Would it be maybe more of an anti-establishment sort
    of some way?
- speaker: Respondent
  text: No. That has nothing to do with it, I don't think. I . . . when you try to put labels on candidates you start getting
    in trouble, but certainly I would . . . I'm a fiscal conservative as far as that's concerned, and I'm not very much in
    favor of wasting money, taxpayers' money and putting it where it's not needed or where people can provide for themselves.
    I think people ought to be given an opportunity to provide for themselves and in the event of course where they cannot,
    why then they ought to be assisted. But . . . so from that standpoint, I characterize myself as a fiscal conservative.
    When it comes to basic human needs and human rights, individual rights, I'd probably classify myself as a liberal . .
    .
- speaker: Interviewer
  text: The more historical, traditional liberal as opposed to the more recent . . .
- speaker: Interviewer
  text: Along the line of a sort of fiscal conservatism . . . What was your stand on urban renewal? Were you in favor?
- speaker: Respondent
  text: Yes. I felt like that . . . the urban renewal program had something to offer to the cities, and here is where individual
    property rights and the overall need of the cities and the welfare of the community as a whole came into conflict. But,
    so where that happens, one or the other has to give and here I saw the overall good to the city outweighing the individual
    right of property ownership. So I support it and do support urban renewal, urban renewal projects. Not on a . . . I mean
    in situations in which there's a real need for rebuilding and restructuring the city and a community . . .
- speaker: Interviewer
  text: What about the use for downtown commercial redevelopment?
- speaker: Respondent
  text: Well, I think here we get into a grayer area. I think a lot of the people in our city have felt that here individuals
    or individual corporations have prospered as a result of the downtown urban renewal projects that are proposed and have
    been undertaken. But I suppose that this would be true in any city where you have an urban renewal project in the downtown
    area. Some businesses that have remained there would be benefitted. So I don't know if this is a real objectionable feature.
    I . . . there may possibly have been conflicts within our city . . . those in political positions and some of the urban
    renewal projects downtown . . . I think that may be what has caused some of the complaints . . .
- speaker: Interviewer
  text: One group wants a certain thing done and maybe another group wants another thing done, ah, something along that line
    . . . where the civic center should be, and things along that line?
- speaker: Respondent
  text: Yes. Yes. Right.
- speaker: Interviewer
  text: I reckon you find that most . . .
- speaker: Respondent
  text: You find that most . . . most places. Like I say, the thing that our people have complained about or have recently
    complained about it, some probably to a greater degree than ordinarily would be the case is that some of the people who
    have benefitted downtown are in the political structure.
- speaker: Interviewer
  text: Is this, when you say the political structure . . . are we talking about, say, the Belks?
- speaker: Respondent
  text: Oh, yeah. You're talking about the Belks basically. I think that's what the basic complaint is.
- speaker: Interviewer
  text: Do you . . . I mean, do you think that one reason that John Belk is in the political process is in order to . . .
    or do you think this sort of comes as a part of . . .
- speaker: Respondent
  text: I think it's probably twofold. I think it would naturally come as a result of urban renewal projects. The Belks are
    so totally financially in the city in so many different ways until I think that any program of upgrading will of course
    increase their interest, enhance their interest. I think also that they're not blind to the fact that being in public
    office gives one an opportunity to feather his own nest to a certain degree. I do not say that that's the reason for John's
    being in political office. I think that he honestly and sincerely thinks that he has some time and ability to give and
    Charlotte has been good to him and he has given a lot. Any mayor of the city of Charlotte sacrifices a lot.
- speaker: Interviewer
  text: Takes a lot of time . . .
- speaker: Respondent
  text: Takes a lot of time. I have to say that the mayor has been most diligent in that respect.
- speaker: Interviewer
  text: They have so many interests that it's almost impossible to do anything in Charlotte . . .
- speaker: Respondent
  text: That's true . . . without affecting their interest.
- speaker: Interviewer
  text: I was told one time that he would like to have been state highway commissioner, but the people in Raleigh said "no
    way" 'cause we can't buy any right-of-way anywhere without getting close to some of your property.
- speaker: Respondent
  text: Yeah, that's true.
- speaker: Interviewer
  text: You said that there had been some resentment about the urban renewal in the downtown. Is there any sort of organized
    resistance, somebody like Albert Pearson or somebody like that . . . I mean, is there any organized group?
- speaker: Respondent
  text: Yeah. In the downtown, in the business community downtown, there was some organized resistance led by Albert Pearson
    and some of the others. I do not know that this was resistance against the program as much. I think it was resistance
    against, I know it was resistance against some of the smaller merchants being ejected without compensation or plans made
    for their relocation.
- speaker: Interviewer
  text: They saw the bigger interests as the ones who were profiting
- speaker: Interviewer
  text: and they were, to some extent losing
- speaker: Respondent
  text: Yes, I think this was true.
- speaker: Interviewer
  text: How would you characterize . . . Who makes the decisions in Charlotte? Is there a power, this is sort of a political
    science question . . . is there such a thing as a cohesive power structure, real estate interests or something like that
    controls to any extent?
- speaker: Respondent
  text: Well, I'd say there is a strong cohesive real estate lobby, if you will, or power structure. I do not know that they
    themselves wield a great deal of influence. I'm sure they do some. It's always been felt that here in Charlotte the Chamber
    of Commerce exercised a greater influence, I believe, on local government than most people felt that they should. All
    of the people that we're talking about, the real estate folks and people of this nature, by and large, are members of
    the Chamber of Commerce, and I think there is probably where the input is . . .
- speaker: Interviewer
  text: At one time it was said that it was more important if a man really wanted to do something in Charlotte that he be
    president of the Chamber . . . that is was more important to be president of the Chamber than to be mayor of the city.
- speaker: Respondent
  text: I think probably that this still remains true to some extent. I know that time has been in this city that unless you
    were a member of that august body or at least subservient to it that you, your chances of political success were not as
    good as otherwise. I have a feeling that, to some extent that is, the political influence of the Chamber of Commerce.
    . . I have a feeling that it has probably eroded some in the last few years due to, I think, a more independency of mind
    of the average voter. I don't think he any longer relies upon the word from the Chamber or the word from the media to
    make up his mind about what he wants to do. I think he does his own thinking, votes what he wants to more than ever before.
- speaker: Interviewer
  text: This may not necessarily be a connection . . . also, I wonder . . . there are more people living in the suburbs, and
    they've got shopping centers nearby, and they don't see the need for the rebuilding downtown or whatever.
- speaker: Respondent
  text: Yeah. You have this. Matter of fact, a lot of people contend, you know, why spend these millions downtown when the
    people don't even come downtown anymore to do their shopping . . . do it in the suburbs. I think there's a lot to be said
    for that. By and large, our downtown community is as it is being rebuilt, is being rebuilt to where an office, institutional
    type (Those big bank buildings?), yes, complex, more than shopping center, more than a shopping area.
- speaker: Interviewer
  text: I've noted on just a couple of occasions where you have represented . . . Let me ask you, how much time?
- speaker: Respondent
  text: All you want. I'll give you all you want.
- speaker: Interviewer
  text: Now this was several years ago and, like I said, I haven't read recent years, represented groups, neighborhood groups
    or whatever, fighting zoning changes and things like this. Is this . . . I mean, do you get this business, I mean, because
    you're a lawyer or is there . . . Do you enjoy this sort of thing, sort of fighting city hall?
- speaker: Respondent
  text: Well, I think . . . I never have really been a joiner. I went for twenty years and the only thing I was a member of
    in the city of Charlotte, besides the bar association offices and so forth that I have . . . that I belong to in connection
    with my profession, was First Baptist Church, so I'm not a (That's the big downtown . . . ), yeah. So I'm not a joiner
    as such, and I never was much for inside power politics through the Chamber or through any other organization. So I guess
    I could say that I got a great deal of joy out of, you know, taking on the power structure from time to time as the representative
    of the so-called classes or people. I guess this is the way it came about.
- speaker: Interviewer
  text: Do you see yourself, to some extent, attempting to represent . . .
- speaker: Respondent
  text: I think I have seen myself from time to time as representing an interest that was not represented in the power structure
    and giving a voice to them in the community.
- speaker: Interviewer
  text: I am wondering, too . . . I was just reading over some notes last night, this doesn't necessarily follow at all from
    what we were talking about but . . . The comment was made that the firemen are an important political factor.
- speaker: Respondent
  text: Yes. I'd say, you know, any group that constitutes a few hundred in number in a city, if they're really joined together
    in a cohesive group, have a tremendous amount of political impact. Firemen have had the capability of organizing themselves
    into a very sophisticated political group over the years.
- speaker: Interviewer
  text: They've tried on occasion to unionize . . .
- speaker: Respondent
  text: They've tried on occasion to unionize. That's right, and of course, there's always been some problems there. But,
    even so, they have political influence to wield and have very effectively used it from time to time.
- speaker: Interviewer
  text: What about the police? Are they in a different situation?
- speaker: Respondent
  text: They're a little bit different situation. Of course, they never . . . it appeared to me, they never have been able
    to quite organize themselves in the same way, make sacrifices. They're sacrifices to make by individuals whenever groups
    start getting together and wielding political power . . . Individual considerations have to go out the window for the
    benefit of the whole. It doesn't seem to me th
