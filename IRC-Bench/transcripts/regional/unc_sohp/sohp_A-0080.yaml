collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: If twenty years ago, somebody would have told you that in 1974 you'd be introduced by a senator from Mississippi as
    a congressman from Georgia at a presidential prayer breakfast, what would you have said?
- speaker: Respondent
  text: I would have said they were crazy. I mean, that would have been 1954. That was before the Supreme Court decision.
    And we couldn't even vote very well in the South. It was not long after that that my younger brother came back from the
    Navy, where he'd been a lieutenant. He's a graduate of Harvard University's dental school. He passed the state dental
    examination, and went around the corner in the courthouse to register to vote, and they told him he flunked the literacy
    test. So, I mean, that's what it was like in the South.
- speaker: Respondent
  text: This was in New Orleans.
- speaker: Interviewer
  text: The progressive city of New Orleans.
- speaker: Respondent
  text: Yeah. Now, Atlanta was a little better than that. But in '55, I went to Thomasville, Georgia, and one of the first
    things I did there as the pastor of a little church was try to organize a voter registration drive. And I guess it was
    just about '48, in that town, a black man had tried to register. And he was lassoed on the courthouse steps, and tied
    to the back of a pickup truck, and dragged around the black community until he was dead. And then he was cut loose again
    in front of a jail where he was left to die... well, he was dead by that time. In '55, when I tried to run a voter registration
    drive, the community... Thomasville had a lot of northern presence, in big plantations. Eisenhower used to come down there
    to shoot quail. Secretary Treasurer Humphry had a plantation. The northern influence kind of quieted down that sort of
    overt violence, and they would let us register. But there was a big Klan rally the night before we were supposed to have
    the beginning of our voter registration drive. Interestingly enough, the man I asked to come down and speak for that voter
    registration drive was Maynard Jackson's grandfather, John Wesley Dobbs, who was instrumental in filing the suits—the
    Primus King case—that put an end to the Democratic white primary in Georgia. And led to, amongst other things, the beginnings
    of voter registration in the big cities of Georgia, through the Masonic lodges. That also was a period in which Ellis
    Arnold was governor, and we got the eighteen-year-old vote. And that moved Georgia ahead. I think that's one of the reasons
    that we are now a little ahead of the rest of the deep South. See, North Carolina was the liberal state then. But folks
    never got around to organizing politically in North Carolina. Georgia was the headquarters of lynching, and blacks knew
    they had to turn to politics to survive. And it was a life... voting was understood very early in Georgia as a life-and-death
    issue. Whereas in more liberal to moderate North Carolina and Virginia, that wasn't perceived, back in the early '50s,
    nearly so well. They are just beginning... in fact, North Carolina blacks are just now beginning to wake up politically,
    you almost think. I have a tendency to feel that they are behind Mississippi, Alabama, Georgia, and South Carolina. That's
    in spite of the fact that they've elected Mayor Lightner. I think every other state has had a long history of statewide
    political organization. And I don't know about any in North Carolina.
- speaker: Interviewer
  text: There is none.
- speaker: Respondent
  text: I suspect one of the reasons is that there were always some white liberals you could trust. And, in the long run,
    that proved to be a detrimental factor. Because there was always, you know, Frank Graham or Sanford—along stream of guys
    that... I mean, whereas we were dealing with an early Gene Talmadge, who was really horrible, and Marvin Griffin, and
    Lester Maddox. Well, that was a long way to answer that question. This is a subject you've got to turn me off on, because
    that's all I've done in the last... Well, I started in southern politics just about that time, 1955.
- speaker: Interviewer
  text: Well, that's the basic question we ask everybody. What was the major change in the last twenty-five years? And essentially
    what comes down, unless you're talking to Republicans, is the removal, in some sense, of the race issue. The change, I
    mean, in the issue.
- speaker: Respondent
  text: You've got to give Republicans some credit, though. You've got to give the Eisenhower administration some credit for
    the justices in the South. Because they appointed... the Republicans in the Eisenhower administration tended to be the
    liberal southerners. And they were not tied to the old Democratic machine. So you really got the best trained, brightest
    lawyers in the South, quite often, moving into judgeships. For instance, in Atlanta, you had blacks on the Republican
    state committee that were approving and recommending the judges. And there was a strong Republican Party in Atlanta, that
    carried Atlanta for Nixon in 1960, in spite of the fact that Martin Luther King was resident of Atlanta. And that King
    incident, you know, tended to swing the big cities of the North. But they appointed judges that were not a part of the
    old southern oligarchy. And so when we came along in the '60s, there really was a progressive and independent judiciary.
- speaker: Interviewer
  text: Who were the judges that stand out in your mind?
- speaker: Respondent
  text: Oh, Judge Tuttle, of course. Judge Wisdom in New Orleans. Judge Frank Johnson in Alabama. Who was the judge in Saint
    Augustine? Jacksonville? He's still there. Can't think of it offhand. Simpson, Bryan Simpson, I think his name is. And
    those are the ones that immediately come to mind. And that's the basis of the Fifth Circuit. And I would imagine the Fifth
    Circuit Court of Appeals is the most liberal wing of the judiciary in America. For two reasons. One, you've got some of
    the brightest, independent jurists that were available. But second, they were constantly under pressure to make decisions
    on human rights cases. And they were almost the victims of their own precedents and their own principles. And one thing
    led to the next and to the next and to the next, and you could always count on justice in southern courts, where you couldn't
    count on justice even in the federal courts of Illinois. Because they were interlocked with the Daley machine. I would
    suspect the same thing would have been true in Washington. Although, who was the judge—Skelly Wright, from New Orleans,
    who came to Washington—brought that same kind of liberal spirit to the Court of Appeals here in Washington.
- speaker: Interviewer
  text: If Jack had asked you that first question ten years ago, what would you reply?
- speaker: Respondent
  text: Same thing.
- speaker: Interviewer
  text: So then what is the period where it has changed in that last twenty-five years? The past ten years?
- speaker: Respondent
  text: 1967. I would say the Voting Rights Act was it, more than anything. I mean, the bus boycott, you'd have to say was
    an awakening of the black community. And it built up a series of social changes that led right up to the passage, the
    legalization of those social changes in the 1964 Civil Rights Act. But that '64 Civil Rights Act, while it changed traditions
    and customs, didn't do anything to challenge the power relationships in the South. And in a sense it was far less consequential
    than the passage of the '65 act, which began to give blacks access to political power.
- speaker: Interviewer
  text: What made it move so fast? When you think back to 1967, that's seven years, six or seven years ago.
- speaker: Respondent
  text: Well, it was ready, you see. What you had is, you had a steady buildup of a black middle class. I go all the way back
    to the founding of these predominantly black colleges across the South. In Atlanta, you had six of them that were about
    a hundred years old. You had produced a Nobel Peace Prize winner out of Atlanta, before you produced a mayor or a congressman.
    I mean, the political lid was on, but the talent was emerging. You produced scholars like W. E. B. DuBois, and John Hope
    Franklin. And Horace Mann Bond, Julian's father. I mean, the level of intellectual achievement in the South had been constantly
    rising, and it had expressed itself. I mean, you had a half dozen black millionaires in Atlanta in 1954. And you had a
    black bank, four black insurance companies, black savings and loans. You had a well-developed community that was denied
    a political opportunity. And once the law changed with the '65 Civil Rights Act, and the masses of blacks began voting,
    that leadership just began to express itself politically. And that was, it seems to me, the reason for the tremendous
    change in such a hurry.
- speaker: Interviewer
  text: Yet you had the same type of situation, up to a point, say in Durham. Smaller community, but still, relatively speaking,
    you had the large insurance company, you had the bank, you had the colleges, you've got a solid middle class. And you
    did have active political participation in Durham, but it didn't spread out. Was it because of the success of the blacks
    in Durham?
- speaker: Respondent
  text: Well, I think you were not surrounded by the hostile environment. I mean, the Klan was at our doorstep in Georgia.
    I mean, it was right there in Stone Mountain every Saturday night. Whereas the Klan was pretty far removed in North Carolina
    until just recently. I mean, you never heard much about the Klan until the late '60s in North Carolina. Whereas in the
    '40s and '50s in Georgia, the Klan was rampant. And they would drive down the middle of the streets in the black community,
    shooting and stuff. That was as late as '44, '45.
- speaker: Interviewer
  text: Is that all that explains such a rapid amount of change, social change, that occurs. If you come from the North, if
    you go down and look at it, it's really astounding that...
- speaker: Respondent
  text: Another thing happened. I think you had genuine racists in Atlanta, who were nevertheless intelligent people, making
    no pretense of liberalism. And they knew they had a problem to deal with. In Ivan Allen's book, he tells a story which
    is extremely significant to me for that whole community. He says that when his father, who had established this big business,
    office supply company, and who had been president of the Chamber and everything, when Ivan Allen Jr. took over as president
    of the Chamber of Commerce, part of his father's marching orders were, "Look, we've done a good job in our generation.
    There's one problem we've ignored, though. And I suspect your generation will have to face that. That's the race problem."
    And he says it, you know, we've been side by side with blacks, yet we've acted like they didn't exist. We've never treated
    them right, you know. And I place a great stock in the kind of, say, the legacy one receives from his ancestors. And I
    think that Ivan Allen, because of that kind of charge from his father, was probably the figure in moving Atlanta's white
    community forward. Now, you also had another thing that Durham doesn't have, I think, and that is Coca-Cola as a corporation
    doing business all over the world. And I've always sensed a kind of sophisticated internationalism amongst Coca-Cola's
    executives, that you just don't find amongst the average southern businessman. They've been selling Coke all over Latin
    America, Africa, Asia. They've got bottling plants in Russia now. And they're extremely... that lent an extremely cosmopolitan
    power center to the Atlanta area. When Ivan Allen took his charge to the Chamber of Commerce and started talking about
    integrating Atlanta, you know, everybody was shocked. And he spells it out in his book. Everybody was shocked, until Mr.
    Woodruff of Coca-Cola leaned over and whispered, "Ivan, you're right." And then it was voted unanimously, you know, just
    on the basis of three words from the president of Coca-Cola. He had been to school with... I mean, he and the presidents
    of three of the five major banks had been high school buddies. And so when Ivan Allen and Coca-Cola get together and decide
    that the white community needs to move, there's a personal tie with the power structure there, to make things move in
    the white community. At least on things like keeping schools open. In terms of facing up to integration of public accommodations.
    Of the acceptance of black candidates. I mean, Ivan Allen's endorsement of my candidacy, that made it possible for me...
    otherwise, the business community would have been putting millions of dollars behind my opponent. They didn't really support
    me, but neither did they really support my opponent. They sort of played it both ways, really.
- speaker: Interviewer
  text: First election, or second, or both?
- speaker: Respondent
  text: Almost both times. They were not against me the first time, either. I mean, I didn't think of them as hostile, or
    really they just didn't consider me any particular threat the first time.
- speaker: Interviewer
  text: That explains, perhaps the Atlanta situation. I think one thing that struck us... we interviewed John Lewis the day
    after he came back from the Black Mayor's Conference. The question we asked him, because we wouldn't have thought five
    years ago (a) of a black mayor, (b) having a conference. It'd be enough to be having a conference. We raised the same
    question with him. How do you explain such a rapid change all over the South?
- speaker: Respondent
  text: Well, that's it. All of these guys, almost every one of them, is third-generation middle class. Their parents and
    grandparents were college-educated. They come from long lines of doctors and lawyers and businessmen. And they had been
    allowed to achieve in every other area but politics, see. And all of a sudden, the '65 Civil Rights Act broke down that
    political barrier. And it was like, you know, a rush of talent that had just been waiting, you k
