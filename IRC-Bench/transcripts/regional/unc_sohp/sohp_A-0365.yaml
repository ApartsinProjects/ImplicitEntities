collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: '... the man who ran the Warm Springs Inn at the time when Roosevelt was in power. Frank used to tell me a little
    bit about Roosevelt and some of his father''s experiences. His father, as a matter of fact, became fairly close to Roosevelt
    later on just before Roosevelt died. I started playing around with the idea of, why did Frank come to Atlanta? And I tried
    to make a little mystery out of it. With my own mind I said the reason he was dispatched to Atlanta to live with his aunt
    and uncle was that his father was concerned that he was going to get exposed to the Lucy Mercer affair. As it turns out
    historically I was wrong because Lucy Mercer really didn''t get to Warm Springs until sometime after this, so the whole
    idea went out [laughter]... From that point on I started developing a really quite complicated plot. I hadn''t really
    lost sight of the Warm Springs idea and so I began to read an awful lot about Roosevelt. Are you familiar with Kenneth
    Davis?'
- speaker: Respondent
  text: He's done three books on Roosevelt and to my mind they are by all means the best.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: Yes. The biography which came out about two years ago goes through the New Deal period. He has one, I think, that
    deals with Roosevelt's childhood and takes him up through his career with the Navy as the Assistant Secretary of the Navy.
    Then he has another volume that deals with governorship of New York. The one I just finished reading deals with the New
    Deal period. I'm sure he has one more. In volume three—at least you might want to dip in the index—he deals quite a lot
    with the Roosevelts' coming to Warm Springs and the South, what being in Warm Springs and being exposed to the South for
    the first time meant to him. I think that he talks about how Eleanor Roosevelt had one reaction and Franklin had quite
    another. Eleanor was so appalled at what she saw in white and black relations in Warm Springs. She pondered it and she
    really didn't want to go to Warm Springs. She wouldn't visit there.
- speaker: Interviewer
  text: She didn't go all that much, did she?
- speaker: Respondent
  text: No, she didn't. He was many times down there by himself. She was with him, of course, when he bought Warm Springs
    and during the early times.
- speaker: Interviewer
  text: What's the biographer's name?
- speaker: Respondent
  text: Kenneth C. Davis.
- speaker: Interviewer
  text: I'll take a look at that.
- speaker: Respondent
  text: I'm not too sure about this, but I think it was because of that exposure that Roosevelt commissioned that study on
    the South.
- speaker: Interviewer
  text: Well, I've got a fairly elaborate version of how that originated.
- speaker: Respondent
  text: How did it originate?
- speaker: Interviewer
  text: Well, the best account that I can find is that it originated with some people like Joseph Gelders of Birmingham and
    Aubrey Williams and others who had Eleanor's ear and who got her interested in it. She's essentially the one who persuaded
    him.
- speaker: Respondent
  text: Maybe she was more receptive having them down there. I don't know, but it would be worth exploring.
- speaker: Interviewer
  text: Yes, it's worth looking at some more.
- speaker: Respondent
  text: You know, the curious thing is that Warm Springs had originally been called Bullocksville and Bullock was a man who,
    I think, was Eleanor Roosevelt's great-grandfather.
- speaker: Interviewer
  text: There is a real strong connection of FDR to Harlan County, Kentucky, in the mountains of Appalachia.
- speaker: Respondent
  text: I didn't know that.
- speaker: Interviewer
  text: Going back to some early days some of the Delanos' owned a big chunk of mineral rights in eastern Kentucky. That's
    a fascinating story, they owned a big chunk of Harlan County all the way up until recent years.
- speaker: Interviewer
  text: You've obviously had an interest in all of this for a very long time. Were you born in Atlanta?
- speaker: Respondent
  text: No, I was born in Columbia, South Carolina. My father was a travelling salesman and we moved from there when I was
    about six. I lived five years in North Carolina. I came to Atlanta when I was eleven.
- speaker: Interviewer
  text: Did you stay there pretty much?
- speaker: Respondent
  text: I stayed there until I went into the Army in 1941. I was there almost ten years. I came back and was teaching at Emory.
    When I came back Elizabeth and I got married and we stayed there about two and a half years and then we moved to Ohio
    in 1949.
- speaker: Interviewer
  text: How long were you gone? Did you ever go back?
- speaker: Respondent
  text: Never for any length of time.
- speaker: Interviewer
  text: You never went back to live after '49?
- speaker: Interviewer
  text: What year were you born?
- speaker: Interviewer
  text: So, when the War broke out you were twenty-one years old. Had you been to college at that point?
- speaker: Respondent
  text: I had finished Emory.
- speaker: Interviewer
  text: You had just finished Emory?
- speaker: Respondent
  text: Finished Emory in June of '41.
- speaker: Interviewer
  text: Where is Elizabeth from?
- speaker: Respondent
  text: She's from Charleston.
- speaker: Interviewer
  text: When did you first meet her?
- speaker: Respondent
  text: We met in the summer of '41 because I went to work for the National Youth Administration and she was there having
    come up from Valdosta. She was director of a materials bureau in Atlanta. The National Youth Administration in Georgia
    at the time I joined it was run by Boisfeuillet Jones. Have you heard of Boisfeuillet Jones?
- speaker: Interviewer
  text: I don't know anything about him but I have heard of his name.
- speaker: Respondent
  text: He was an interesting character. John A. and he had a terribly unhappy experience together. I have always sided with
    John A. Boisfeuillet and John A. were together at Emory as assistants to Goodrich White who was then president. Boisfeuillet's
    son is now general counsel to the Washington Post.
- speaker: Respondent
  text: His first name is John but when he went to the first grade he told his teacher his name was Boisfeuillet, which it
    wasn't. He didn't want to be called John Jones. He has been Boisfeuillet ever since then.
- speaker: Respondent
  text: He's one of those quiet, scheming, political—you have a feeling there is something very tight inside Boisfeuillet.
    He's very ambitious, and very bright. Unfortunately, he had a lot of ambitions that never were realized including being
    Secretary of Health, Education, and Welfare and also being president of Emory. He ended up being Bob Woodruff's number
    one assistant. The only reason I bring this up is because of your friendship with John A. Boisfeuillet, in his own kind
    of sinister way, somehow either turned, I don't think he had to really turn Goodrich White against John A. because John
    A. is too superior a person for anybody to be turned against, but he somehow convinced Goodrich White that John A. would
    not really be an effective administrator and as a consequence Boisfeuillet went up in the administration and John A. just
    stayed where he was. That's why John A. left Emory. When I went to NYA Boisfeuillet was running it. It really was a very
    unusual agency at that time. It had benefited from Mrs. Roosevelt's blessing and Aubrey Williams was running it, had run
    it.
- speaker: Interviewer
  text: Was he at that time running it?
- speaker: Interviewer
  text: He had already gone back to Montgomery?
- speaker: Respondent
  text: To think of it, I think he was.
- speaker: Interviewer
  text: Was he in '41?
- speaker: Interviewer
  text: He was still there and it was about '45 that he went back.
- speaker: Respondent
  text: He was still there and there were an awful lot of very interesting people. It was a great experience for us. That's
    how we met.
- speaker: Interviewer
  text: What was the make-up of NYA from a racial perspective? Was everything segregated straight across? Was there a Negro
    division of NYA? Was there much cross-fertilization between the two?
- speaker: Respondent
  text: Yes, there were separate sections.
- speaker: Respondent
  text: There are two things that I remember and one was that Mr. Shell was head of the Negro division—that was the polite
    word then—and there was one person in the state office who would not call him Mr. Shell and that was Chelsey Barker from
    Texas who was in charge of the shop program for the whole thing. He always addressed him as Shell. He just would not say
    Mr. Shell. The other thing I remember is that Moss Kendrick, who was some kind of syndicated news... where is he now?
- speaker: Respondent
  text: I don't know what he's doing now. He ended up as being the information officer for Liberia.
- speaker: Respondent
  text: Well, anyhow, there was a book he wanted and he was not allowed in the Carnegie Library. He came in the office one
    day and asked me if I could get him a book from the library. That just bowled me over. I did it and I had to check it
    out in my name and pass it to him and he brought it back to me and I returned it. That was what it was like.
- speaker: Interviewer
  text: You were in the service. When did you come out?
- speaker: Respondent
  text: About December of '45.
- speaker: Interviewer
  text: Elizabeth, were you in Atlanta when the war was over?
- speaker: Respondent
  text: Yes, I had left Josephine Wilkins and gone because I had found out that with the new tax raise I would have five dollars
    left over after I paid my board and keep. I went out to work at the Marietta at the Bell Bomber Plant in the public relations
    office.
- speaker: Interviewer
  text: What do you mean you left Josephine Wilkins?
- speaker: Respondent
  text: Well, I worked with her at the Citizens Fact Finding Movement after the NYA and I left the NYA after I told Boisfeuillet
    Jones a monkey could do my job, and Calvin and Jack Tarver said, "You better go look for work." So, I went to work for
    Josephine whom I'm sure you know about.
- speaker: Interviewer
  text: Yes, I do. I don't know much though about the Citizens Fact Finding Movement. Who started it?
- speaker: Respondent
  text: Well, it was a wonderful thing that she invented and ran. It was a social-educational thing, I guess. She published
    pamphlets on all kinds of phases of Georgia, the penal system, the educational system, the tax system.
- speaker: Interviewer
  text: This was just all on her own?
- speaker: Respondent
  text: No, she got together the heads of all the civic organizations in the state. She was really the moving spirit and she
    did it, but it was the heads of all the civic organizations over Georgia. Each one of these pamphlets was done by an authority
    in his field. Ellis Arnall said that he used those things as a basis for Georgia's new constitution. They were used for
    that purpose. She did a remarkable thing because nobody ever had a dime. Just never worked for anything until the bomber
    plant. Very worthy but poverty-ridden organizations including the Georgia State Women's College. I worked there after
    I finished in Valdosta...
- speaker: Interviewer
  text: Do you happen to remember the day the War ended? Any personal recollection of that day?
- speaker: Respondent
  text: I remember when it started.
- speaker: Interviewer
  text: It was August 14, 1945.
- speaker: Respondent
  text: No, I don't. What I remember is the day the atom bomb was dropped.
- speaker: Interviewer
  text: Yes, that was about the eighth, I think.
- speaker: Respondent
  text: The public relations office was the first thing that was done away with because the War was over. I worked for six
    more months for Davis and Paxton doing a little teeny house organ thing. That was where I was working when Calvin came
    back in December of '45.
- speaker: Interviewer
  text: Do you all have any particular reflections on Ellis Arnall's tenure as governor? I'm struck by the curious contrast
    of his national persona, primarily because of pieces under his byline in Collier's and Look and Saturday
