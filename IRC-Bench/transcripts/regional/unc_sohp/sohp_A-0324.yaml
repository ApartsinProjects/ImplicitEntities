turns:
- speaker: Interviewer
  text: What do you think were the major reasons for the defeat of the Equal Rights Amendment?
- speaker: Respondent
  text: Well, it's somewhat complicated. I think that probably the majority of the legislators simply didn't want to have
    to be recorded on it one way or the other. I think it would have gone on through if groups of preachers and women who
    were making a lot of noise in opposition hadn't gone down and started lobbying against it. It had not appeared to be controversial
    when it was first introduced. We knew that it had been fought in other states, of course, we tried to get it up as soon
    as possible, but anyway, they came down there. I think that once it became somewhat controversial, the fact of the matter
    was that the majority just didn't want to have to vote one way or the other. They tried, the Democratic leadership, tried
    to provide them with an out. I believe that had nothing to do with whether they were for it or against it. Because the
    Democratic leadership, i.e., Ramsey through Watkins, requested Tom Sawyer of Greensboro to put in a bill which would call
    for a referendum and that wasn't because they wanted to give the people an opportunity to vote; if they wanted to give
    the people an opportunity to vote on issues of real concern to the state, they'd do a referendum on coastal issues and
    things like that, like they do in California and other states. And no fault, we're getting nothing. Special interests
    are running the legislature and it was just an out for them. And that lies directly at the feet of the Democratic leadership.
    Then, beyond that, the Women's Political Caucus and the ERA Ratification Council, which had a number of women's organizations
    as a part of it . . .
- speaker: Interviewer
  text: Was that a part of the Women's Caucus, the Ratification Council?
- speaker: Respondent
  text: We formed it and we paid for it. There were many women's groups that were in there. The Federation of Women's Clubs,
    the League of Women Voters, the AAUW, Association of Women Deans for North Carolina, the North Carolina Secretaries Association,
    United Church Women, just about every women's organization that was of significance in the state. But we of the Caucus,
    and those organizations . . . and the BPW, they were in there, the Business and Professional Women, they've been working,
    educating their membership on the Equal Rights Amendment for fifteen or twenty years. And they were a big help in terms
    of trying to something with the legislature. And then present and past women party officials helped working the party
    route. What happened was that a great deal of pressure was put on the house to defeat the referendum bill. You see, we
    had extra work to do that we didn't count on. And I think one reason that it was thrown from the house to the senate was
    that we were too successful in that effort. Because they expected it to be about even-steven, even a few days before,
    they were saying that it would be about fifty-fifty . . .
- speaker: Interviewer
  text: You mean the referendum bill?
- speaker: Respondent
  text: Yes, that's what people in the legislature were telling us. Give or take a few, with the weight being thrown to the
    side of the defeat of the referendum bill. The vote, however, was something like eighty-six to thirty-two and I think
    that . . . I don't know whether to use the word "scared" . . . but it scared them that the women knew how to use the tools
    of politics that effectively. I mean, that when you begin to move toward the real challenge of power, those that have
    the power get challenged. The real channels of power is what I started to say . . . and I think that probably was it.
    I never went over there and interviewed people, but my guess would be that there was a little surprise that it wasn't
    accepted cheerfully in all quarters. Because what they did immediately was to throw it to the senate. And they did that
    by subterfuge . . . I call it subterfuge, I don't know what they would call it. They persuaded the people who were working
    for the bill in the house and mainly those who were on the house committee that would have to vote it out, that the chairman
    of that committee was ill and that the eighty-two to thirty-six vote or whatever, he was against the bill, thanks to Judge
    Susie Sharp . . .
- speaker: Interviewer
  text: Yes, I've run into her in my research.
- speaker: Respondent
  text: Yeah, well, this guy told me.
- speaker: Interviewer
  text: Now, was this Folger, Senator Folger was head of the senate committee . . .
- speaker: Respondent
  text: No, it was Kitch Josey.
- speaker: Interviewer
  text: Yeah, Kitch Josey.
- speaker: Respondent
  text: Now, Kitch is a nice guy, I've known him for years, but he was against it and he told me that Susie Sharp's opinion
    influenced him more than anything else.
- speaker: Interviewer
  text: And that was brought up at the February 8 hearing, the letter was read, was that the main expression of her opinion?
- speaker: Respondent
  text: She made some telephone calls. This is my understanding, now. She didn't tell me, but I understood him to say that
    she had made a telephone call. I believe that Kitch used to live in Greensboro before he moved east, and it seems to me
    that maybe he had lived in Reidsville for a while, which is where Susie Sharp is from. And it's my understanding, and
    I didn't try to track it down, but that she did make some, quote "discreet" unquote, telephone calls. At any rate, Kitch
    Josey has had a couple of heart attacks, but he was able to run for the legislature and was serving and they persuaded
    one of the very nice legislators that was trying to steer it through the house that . . . of course, they put him in a
    box and I'm sure that he consulted with others, but they put him in a box, that the vote had been a big blow to Kitch
    Josey and that he had a couple of heart attacks and that he just wasn't able to call his committee meeting on the following
    Friday. And the vote was on about a Wednesday, I believe. So, as soon as that young man told me that, I said, "You've
    been had." However, what can you say, you know, there's a kind of a courtly gamesmanship that goes on and you don't question
    somebody if they say that someone is ill and they wish to do . . . of course, Charlie Phillips from Greensboro says that
    he would have. In other words, that he would have questioned that. "Well, too bad, then let the vice-chairman run it.
    Too bad, I'm sorry he's sick, we'll have the meeting anyway." Someone who had had more experience, you know, like . .
    . I said Charlie Phillips, isn't Charlie from Greensboro?
- speaker: Respondent
  text: I believe that he made that comment, that that was just really wild, "just too bad . . . "
- speaker: Respondent
  text: Well, at any rate, as I say, with a more experienced legislator . . . however, this young man, he is young, it's only
    his second session. He has ambitions, you know, to either stay in the legislature and work up the ladder, or run for statewide
    office or something, and therefore, you just don't throw your weight around. Besides, he accepted it as genuine, you know
    and it just didn't occur to him to say . . . he just didn't have the experience to come back with what Charlie Phillips
    later said he would have done. So, at any rate, they got by with it. Because, you see, it would have passed in the house,
    clearly. Although, we know that there were some people who voted against the referendum bill because they felt that it
    was wrong. They had been told very clearly in testimony that it was the duty of the legislature to vote . . .
- speaker: Interviewer
  text: I think that John Sanders mentioned that to me . . .
- speaker: Respondent
  text: Yes, I'm sure he did. He didn't mention much, but he mentioned that. So, that was very clear, that it was their duty
    and no matter how the state voted, they would have to take a vote on it sooner or later. Of course, we knew that it really
    didn't have anything to do with that. And then, they pulled this maneuver and . . .
- speaker: Interviewer
  text: So, by copping out with the referendum, it prevented them from bringing it back up in the house before the senate
    . . .
- speaker: Respondent
  text: Back up? It hadn't been up.
- speaker: Interviewer
  text: Well, I mean putting it before the floor of the house.
- speaker: Respondent
  text: And they were sure by the eighty-six, thirty-two vote, as we were, that it would pass. And as I say, the whole thing
    was, "I guess that we better give the boys an out." Those were the words used when Sawyer was asked to put the referendum
    bill in. And so, since that didn't give them an out, they had to give the boys an out by saying that Kitch Josey wasn't
    able to have this committee meeting. It was due to come up that day and without question would have been referred out
    that day. Which meant that it would have gotten to the floor of the house the next week. Since it wasn't held that day,
    I believe the senate committee either met that very same day or shortly thereafter, and they voted it out.
- speaker: Interviewer
  text: The very next day, following the referendum vote.
- speaker: Respondent
  text: Yeah, that's what it was, the house committee, I believe, had been scheduled to meet on Thursday. I remember now,
    because it was Thursday night that I got the message that it had been postponed and it was Friday morning that I called
    up Whichard and asked him what the hell had happened, about 7:30. Or maybe he called me that night. It doesn't matter.
    At any rate, then the senate committee met on Friday and I believe that it was voted out by an eight to seven favorable
    majority. But you see, the house knew we were worse off in the senate than we were in the house, they knew that. The senate
    all year long, last year and this year has been, as H. L. Mencken used to say, "a Sahara." I mean that it has just been
    devoid of leadership, character, you know, the whole smear. They have been perfectly awful. The legislature hasn't been
    good, but the senate has been dreadful. Also, we had worked on the senators, we had worked on those committee members
    very hard to get a favorable vote. Because a bill that doesn't get a favorable vote is hardly ever voted on favorably
    and they would have used that for an out on ERA. We worked very hard on the committee. But, we had not lobbied the senators,
    we had spent, I don't know, five or six weeks or whatever the time period was, doing nothing but working on house members.
    Nothing. I mean, I could pull out my . . . that's what I had marked. We just went over and over them. I called people
    like Pat Taylor to call Hightower. I mean we used everybody, I mean, we've been doing it for years, we just haven't gotten
    credit for it. If I was to pull out my phone bill, you'd see . . . my phone bill one month was three hundred dollars.
    We raised money, fortunately, we raised money, so I didn't have to pay for this one, although I've paid for plenty. I
    imagine that I called at least six hundred dollars worth. And see, we had, she's a Republican woman, and he was assigned
    to her, and she reported back to here that Locke, no. See here, I marked on this, this one is signed yes. See, we sent
    out things and over fifty percent of them were signed yes before they walked in the door. We know who signed and then
    who chickened, which is a kind word for it. At any rate, here they are, signed "yes", signed "yes", . . .
- speaker: Interviewer
  text: Would you comment on Mike Mullins and Gordon Allen backing out at the last minute?
- speaker: Respondent
  text: OK. Just let me finish this. So, we had done all that work, as you can see, and so we were fearful. However, we went
