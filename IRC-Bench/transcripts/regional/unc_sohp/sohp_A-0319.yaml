collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: We thought that we might begin by getting you to talk some about your background and what you remember and what you
    have been told about where your people came from, and about growing up in south Alabama.
- speaker: Respondent
  text: Well, of course, my Folsom people, they originally landed in Boston. My Folsom forebearer and his wife and his wife's
    family, along with several families, left Hingham, England. I guess a port near Hingham, over some difference in the church.
    They got stood up in the church and they left in 1638 and landed in Boston the same year. They are pretty well scattered
    over New England, they are pretty dominant in New Hampshire now. His wife's name... I forget their name, but it is a very
    prominent one in New England. His wife's name... from 1638, there would be a lot of hand-down from now, you see.
- speaker: Interviewer
  text: How did your family come South?
- speaker: Respondent
  text: I imagine... the Folsom family history is full of Revolutionary Folsoms in there, and I imagine that there was a lot
    of them that came down and had land granted to them on account of their war service and so forth. And my great-grandaddy,
    he come to Georgia. He was in the Revolutionary War, a veteran. He came after the war and then his family spread on out...
    He had a brother, I think, that settled somewhere else. But they started scattering out from New Hampshire and Massachusetts
    a long time before the Revolution.
- speaker: Interviewer
  text: Well, how did you all get settled around Elba, Alabama?
- speaker: Respondent
  text: Well, you see, Georgia was a state and the state of Georgia extended to the Mississippi River. And then they set up
    the Mississippi Territory and there was a big fuss about that. The Yazoo Fraud, they called it. My great-granddaddy operated
    a ferry boat over there between Alabama and Georgia, as I understand it, right across from Abbeville, Alabama. And he
    raised three boys. One was named Thomas Jefferson Folsom, the other one was named David Something Folsom and the other
    was named Elisha Folsom. That's who I'm named after. I am named after my granddaddy, Elisha Folsom. But there were three
    of them and their daddy had run off with one of the Indian maids, as I understand it, to Oklahoma, when they shipped them
    to Oklahoma. I don't know about that, I know that the Oklahoma Indians in about 1914, I believe it was, or '15. Before
    my first grade... it was when a Packard automobile was the automobile. Now, you don't remember that far back. But back
    in 1915, '16, '17, the automobile. There just wasn't no such thing as a Cadillac, we never heard of one. And the first
    time that I remember any of them coming to Alabama was with a group of Indians who had three Packard automobiles and they
    stopped in front of the house. Pa was in the courthouse. And of course, being Indians, part-Indians, I guess that they
    felt it was best to walk over to the courthouse rather than to ride. And they stopped in front of the house and I got
    to know them all. I mean, I got to play with them while... strange to me though, they were Indians. They went on to the
    courthouse and then come on back and I imagine that they were going over to the old homeplace. When Indians come back
    there, they like to do that. They came from around Macon, Georgia, originally. He commanded a company of Cherokee Indians
    during the Civil War. I mean, during the War of 1812. I don't know whether he was a Revolutionary or not. Either his daddy
    was or he was or one or the other. But he commanded a... my great-granddaddy did...
- speaker: Interviewer
  text: Your father was a tax collector for several years, wasn't he?
- speaker: Respondent
  text: Yeah. Three times. County Commissioner one terms or two terms, I don't know which, and his brother was sheriff. My
    Pa was deputy sheriff. And my granddaddy on the other side, I know more about him than I do about my Folsom people. His
    name was Dunavent. I thought that it was Irish, but it's not. It's bound to be Dutch. He got into some of the mix-ups
    whenever the Spanish had charge of the Dutch. I don't know, but he got to America and he was in the first class of William
    and Mary. He and his grandsons were in on Benedict Arnold's courtmartial. I don't know what position they played, but
    they served on the courtmartial. I don't know what they did, but that's... then my granddaddy come to Alabama and he is
    descended from that bunch. That's how I got to be in Alabama and got to be governor of Alabama.
- speaker: Interviewer
  text: I'd like to hear about your growing up in Elba, about your mother and father and how you decided to run for political
    office and what influenced you to do that and how you first began to think that you might do that when you were growing
    up.
- speaker: Respondent
  text: Well, going from school to the house was right by the office, we walked right across the square and right by my Pa's
    office. And I would go to Papa's office before I ever started to school. It was a matter of necessity, I guess. My mama
    was having a baby, my younger sister and she had a hard time with her for five or six months, seven months, something
    like that, the baby and Mama, too. And I spent a lot of time over at Pa's office. We had a black woman there keeping the
    house. And she would be busy and I would get into motion and go over to the courthouse with Papa. And I would go with
    him everywhere he went, just about. For a long time before I ever started to school. I just learned it right there, before
    I ever started to school... I learned politics before I ever started to school. I don't know how I got started at it.
    I guess that it was going to the courthouse for those eight or nine months that Mama was disabled.
- speaker: Interviewer
  text: Now, you went for several years... you sailed out from Mobile, you took a trip for about three or four years. You
    were about seventeen or eighteen years old and...
- speaker: Respondent
  text: Another thing I want to say about that disabled... about my Pa. For just as long as I can remember, politicians from
    all the county... you see, Pa moved to the county seat when I was one year old and politicians from all over the county
    would come there and spend the night. And they would sit up by the fire and talk politics and spit tobacco juice and I
    would sit right there. Well, I went to sleep every night as a young'un right there. But, I did it. I don't know why I
    did it, but I did. And I've got a boy that's like that. He's here in the office now. He was acting just like I was when
    I was a boy. Well, he is working... going to the University in Birmingham and working for Senator Sparkman and now he
    has shifted over and is working for Jim Allen, in the School of Education and working in the Senator's office at the same
    time.
- speaker: Interviewer
  text: Well, what did you think about going to school? Did you like to go to school?
- speaker: Respondent
  text: Oh yeah, yes. I enjoyed it. I wasn't a brilliant scholar. I just made routine grades and probably from just being
    there regular. But I had the same schooling privileges and so forth that the average boy or girl does in the average county
    seat in the United States. So, there was nothing unusual about it, just the same as the average. You were talking about
    when I went to sea...
- speaker: Interviewer
  text: That's right.
- speaker: Respondent
  text: Well, we had a major flood in my hometown of Elba and it washed the town away, the banks went broke and just left
    Mama with the farm, no other assets. And I just never did go back to school. Papa had an old friend down at Mobile and
    I went down there and he knew the steamship line down there and got me a job... me and another boy there in town, he got
    us a job on the ship sailing out of New Orleans, this company that he was a gent for. They called it the Dixie Steamship
    Line and we went to Italy, Naples and Leghorn and a lot of other places and I liked it. And I just kept on going until
    the Hoover Depression was over. And when it was over, I came home and began to look around and try to locate myself a
    job. They were just starting this relief program and I got, I just went up and asked them in Montgomery. I went to the
    State Manager... the State Work Relief Director, they called him. I looked at that and said, "Well, now, he's the State
    Director, he's the head man. I will just go see the damn head man." He had just appointed a man in my county as county
    director and incidentally, the second man he appointed was in this county. My county was the first county on account of
    it being a flood county and the second county was this county right here, Cullman County, which I didn't know at that
    time. And I went up and told him that I wanted a job. He asked me if I knew anything about road building and I told him
    that, "Yeah, my Pa was a county commissioner. He was a county commissioner before I was born." He died when I was ten
    years old and I didn't know nothing about road building, but I told him that I did. So, I went back home and the next
    day, they called me on the telephone. They had some trouble up in Guntersville, the adjoining county from here, right
    on Guntersville Lake. They called me and they promised me a job for thirty days, that's all they could do. I didn't know
    how long I was going to be there. They put me in at County Work Relief Director up there and they created this Civil Works
    Administration and I was the director of that. So, I stayed there for two years. They then also created the Works Project
    Administration and I was a director for that. Then, I maneuvered around and got up to Washington.
- speaker: Interviewer
  text: How did that happen? You had been working on these government jobs, how did you get up to Washington?
- speaker: Respondent
  text: Well, I was pretty independent about my work, I made a pretty good record, and they knew it. And they were reorganizing
    it into the Farm Security Administration and turned it over to another group. And the other group wanted their crowd,
    you see, and I saw that they were going to leave me out. So, I just went up to Washington and when they were setting up
    the WPA up there... that's when they were organizing the WPA nationwide, the Works Projects Administration they called
    it, with rural rehabilitation and everything down there. And they split it all up and made one the Farm Security Administration
    and the other the Works Projects Administration. So, I just went up to Washington and got a letter of endorsement from
    the congressman and went up there and told them I was a candidate for a director's job. I just told the head man that
    was in charge of the whole business in the United States, and they had me there in the front office. Of course, I was
    a clerk, but I was in the front office. I knew it from the ground up, you see. That's the way I got up there.
- speaker: Interviewer
  text: How long did you stay in Washington?
- speaker: Respondent
  text: Long enough to get fired. [Laughter]
- speaker: Interviewer
  text: How was it that you got fired?
- speaker: Respondent
  text: I was going to night school, taking public speaking at George Washington University. I went to school and worked in
    September and got fired in January. But it really was a changeover. Did you ever hear of a fellow named Eisenhower? He
    was working under General MacArthur, who was going to the Philippines. A fellow, Daniel C.
