collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: I never met him [Robert Vann, editor of the Pittsburgh Courier, a black newspaper]. I always thought of him as coming
    by his name in the way you might suspect. He came from North Carolina. My family came from there, the Vann part of it
    did, were slave-owning planters. Let's see, there's several generations, I think, the first one was the one that surfaced
    in Philadelphia, of any importance.
- speaker: Interviewer
  text: Right. Did you ever see his picture?
- speaker: Respondent
  text: I may have, but I don't know.
- speaker: Interviewer
  text: That's Robert Vann of Ahoskie.
- speaker: Respondent
  text: Well, he sure looks white to me.
- speaker: Interviewer
  text: Yeah, he really does. This is an interesting piece out of a local history from Ahoskie, in Hertford County, and he
    talks about growing up there.
- speaker: Respondent
  text: That's my people's country all right.
- speaker: Interviewer
  text: He was quite a good journalist, and hard hitting. Pretty tough fellow.
- speaker: Interviewer
  text: I believe that's right. I just thought I'd bring that along to show it to you in case you haven't seen it.
- speaker: Respondent
  text: Probably the nearest kin I've got [laughter] for all I know. [laughter]
- speaker: Interviewer
  text: It's quite possible. Do you remember, by chance, election night in November of '32? I believe you probably were at
    Emory. Were you there by then?
- speaker: Respondent
  text: I would have been teaching at Georgia Tech.
- speaker: Interviewer
  text: You were teaching at Tech. So you were in Atlanta. Do you by any chance have any particular recollection of that election
    or that victory of Roosevelt, and whether it represented any significance in your mind?
- speaker: Respondent
  text: Nothing that flatters the historical mind because I had been influenced, I think, by Walter Lippmann and other commentators
    who underestimated Roosevelt. I didn't expect much of him, and I guess I'm not alone in that. He really was vague, and
    his plans were indefinite. I do [remember], as part of the anecdote, winning five bucks very easily. It was the day of
    his inauguration in March, and at lunch with my colleagues at Tech, we were talking about the future and some of them
    were saying, "Things are looking up, you know." 'Course, every bank in the country was closed that day. So I said, "So
    you're all optimists? Well, I've got five dollars to bet here that every bank in this country will be closed next year
    at this time." I have to correct that story. I said, "I'll be happy to bet anybody here five bucks that four months from
    today every bank will be closed." Would be July 4th. That was a cheap trick I played on them.
- speaker: Interviewer
  text: In that early period when you had gone from Arkansas to Atlanta, you speak of the influence of your uncle Comer and
    of Rupert Vance and Will Alexander. Will Alexander at that time was in Atlanta and head of the Interracial Commission.
    I remember the little anecdote about some disparaging remark you made about him that got used to embarrass both of you.
    Something having to do with the Angelo Herndon case, and someone asked you if Will Alexander could be depended on, and
    you sort of dismissed him as a conservative.
- speaker: Respondent
  text: That's right. This was in a private conversation and this turned out to be a communist who published that in the [laughter]
    . . . . [laughter]
- speaker: Interviewer
  text: Somewhat to your embarrassment?
- speaker: Respondent
  text: Somewhat to my embarrassment then. Dr. Will sent me a clipping from it. Said, "The cut of a friend is the unkindest
    of all." [Laughter] [Laughter]
- speaker: Interviewer
  text: Was he, in fact, sort of a hopelessly paternalistic man as you look back on him, or did he have some vision about
    what this country needed?
- speaker: Respondent
  text: No. We're talking about 1933-4. He was talking to black leaders and knew them. He wasn't paternalistic. Of course,
    nowadays he would be judged, and I judged him then, as a conservative, and he was a conservative compared with a young
    nut like myself. But that's no discredit to him at the time. He's like my uncle. My uncle introduced me to John Hope,
    president of Atlanta University, and similarly I met Arthur Raper in Will Alexander's office and got to know him very
    well. Those acquaintances meant a great deal to me.
- speaker: Interviewer
  text: And as you think back on them now, were they men who saw down the road enough to recognize that the South, and indeed
    the country, was going to have to address the racial issue in some substantive way, or was it just too early for that?
- speaker: Respondent
  text: Well, they were notable because they were informed and were seeking to inform themselves, and Raper was writing some
    interesting monographs, at that time, on lynching, tenant farmers, property system, and all that. Yeah, that was unusual.
    But this is a very relative matter. To think, at that time, of abolishing segregation. . . .
- speaker: Interviewer
  text: It was an unthinkable thought, wasn't it, at that time?
- speaker: Respondent
  text: Well, maybe in a hundred years or more, but not within a few years. And I would never have predicted, myself, what
    would actually happen.
- speaker: Interviewer
  text: Another of the friends you made along about that time was Saunders Redding. Was he teaching at one of the Atlanta
    universities then?
- speaker: Respondent
  text: At Atlanta University, I think, in the English Department.
- speaker: Interviewer
  text: Was he about your age?
- speaker: Respondent
  text: About. I think he's still living.
- speaker: Interviewer
  text: No, I don't think so. At least, John Franklin told me that he was not.
- speaker: Interviewer
  text: Then you went to Columbia and you traveled some. I can't remember if you came back to Atlanta before you went to Chapel
    Hill, or did you go from Columbia to Chapel Hill?
- speaker: Respondent
  text: I came back and taught a year at Georgia Tech and then another year after that I lost my job there. That was the year
    of Angelo Herndon.
- speaker: Interviewer
  text: Right. Do you think there was any connection between your losing the job and that incident?
- speaker: Respondent
  text: I honestly couldn't claim it so. I was called in by the President. "You know where we live and how things are down
    here, I've got a job to hold," things like that. Mr. Britton was his name, but the thing was about thirty of us lost our
    jobs at one time.
- speaker: Interviewer
  text: And it was an economic thing.
- speaker: Respondent
  text: Yes, rather than my action.
- speaker: Interviewer
  text: When you went to Chapel Hill you had already known Howard Odum through a family connection. Is that right?
- speaker: Respondent
  text: Yes, but just. I met him and his parents lived about a mile down the road from my father who was then the head of
    Emery junior College at Oxford. I must have had some correspondence with him. At any rate, I wrote him about the Tom Watson
    project and that I wanted to get money to go to the University and he'd said he'd be in Oxford visiting his parents and
    why didn't I drop in. I did.
- speaker: Interviewer
  text: And had you known Vance before also, again through a family connection?
- speaker: Respondent
  text: Yes, much earlier because his father lived in Marrilton, Arkansas, and while I was in high school there in the twenties,
    his father built and ran a swimming pool. He hired me as one of the flunkies; not a lifesaver, but a bath-towel man. I
    knew Vance, but not very well. I knew him after I got to Chapel Hill.
- speaker: Interviewer
  text: And you spent four or five years at Chapel Hill?
- speaker: Interviewer
  text: Three years through the middle of the thirties where Odum and Vance and Guy and Guion Johnson were, and W.T. Couch
    and Paul Green. Chapel Hill was sort of a beacon in the South, wasn't it, in those years?
- speaker: Interviewer
  text: . . .Frank Graham. Was there any other university in the South of that stature?
- speaker: Respondent
  text: Well, it depends on what you are looking for. There was certainly an intellectual community of a thriving kind at
    Vanderbilt in the same years, and a little earlier the Fugitive poets were there. Later on, about in the thirties, Cleanth
    Brooks and Red Warren went to LSU and started the Southern Review, so it [UNC] wasn't unique.
- speaker: Interviewer
  text: But in terms, again, coming perhaps back to the focus on social issues and a more progressive way of looking at problems
    and whatnot, practically all these people I've named took some interest in those things one way or another. The Regionalists
    did, certainly Frank Graham did. Paul Green did. Couch had probably more black writers published at UNC Press than anybody
    in New York was publishing at that time.
- speaker: Respondent
  text: That wouldn't have taken a lot, you know.
- speaker: Interviewer
  text: That's true. Nevertheless, it's sort of an unusual thing to see that interest.
- speaker: Respondent
  text: He published one book that shocked the hell out of him and that was called, What the Negro Wants.
- speaker: Interviewer
  text: I'm coming to that because in a way, I'm sort of building up to a point here that I want to make in that I keep running
    into people who tell me now that when they were thinking of going to college or thinking of going to graduate school in
    the thirties that was their aspiration, to go there and work under Howard Odum, to go there and be a part of that whole
    social science thing.
- speaker: Respondent
  text: Well that wasn't true of me.
- speaker: Interviewer
  text: It wasn't in your case, I know.
- speaker: Respondent
  text: I didn't take any work with Vance or Odum. I knew them and I feared Odum and I loved Vance.
- speaker: Interviewer
  text: The sort of running scrap that was going on between the Fugitive-Agrarian school and the Regionalist school kind of
    continued through that period. They debated one another and so forth.
- speaker: Respondent
  text: Yes, they needled each other.
- speaker: Interviewer
  text: Did you think of the Agrarians, then or now, as a. . . . Would it be too much of as a simplification to think of them
    as sort of arch conservatives in this sort of philosophical construct?
- speaker: Respondent
  text: Well, some of them. They were different from each other. I knew some of them. I knew that they were not reactionaries
    like Warren. But I knew that Donaldson [Donald Davidson] was as conservative as you get. Some others were. But then there
    was that economist.
- speaker: Interviewer
  text: H.C. Nixon? He turned out to be pretty-liberal.
- speaker: Respondent
  text: We had the same ideas at that time. So I was glad to meet them. I did meet them in connection with an exchange of.
    . . . We had a debate. Actually, Couch did the debating, but I went along and met them all.
- speaker: Interviewer
  text: Another sort of contentious relationship in that same period had nothing to do with Chapel Hill. I don't know if you
    knew either of these men, but Erskine Caldwell and James Agee had a running dislike for each other that centered on their
    interpretations of the poor South. You remember in addition to his novels, Caldwell wrote that book, You Have Seen Their
    Faces, that Margaret Bourke-White took the photographs for about two years before Agee and Evans went and did their thing.
    Agee was absolutely livid at this jerk going down there and doing that, you know, sort of flying in and flying out. So
    he went and stayed four weeks which supposedly made a difference. Do you have any reflections on either one of those kinds
    of interpretations?
- speaker: Respondent
  text: Well, I met Caldwell, but much later, and he was pretty old. I was too. And I never met Agee. I liked his book but
    thought he was somewhat of a nut.
- speaker: Interviewer
  text: Yes, he had a kind of an eccentric reputation. Strange fellow.
- speaker: Respondent
  text: So I never sought him out, though he was about my age, I think. A little younger maybe. I did not know either of the
    two photographers.
- speaker: Interviewer
  text: Some journalists out of this period who called themselves liberals in a sort of classic sense—Virginius Dabney being
    maybe the most prominent because he wrote a book called Liberalism in the South in '32, and George Fort Milton in Chattanooga
    and John Temple Graves in Birmingham. These were men who didn't shrink from the tag "liberal" at that time. They called
    themselves that and yet, as events were to prove, they became increasingly disaffected with the notions of liberalism
    that had anything to do with any kind of racial change, so that by the time Brown came along they were in the
