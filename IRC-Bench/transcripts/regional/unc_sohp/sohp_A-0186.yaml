source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: You served how long in the legislature?
- speaker: Interviewer
  text: And that first has been referred to as the "reform session"?
- speaker: Respondent
  text: That's right. It was the makings of the reform session. The stuff that I used to introduce in that first session were
    just reforms of rules changes, because we didn't have a chance to begin to get anything else. The so-called "reform session"
    came after that in 1973. But the impetus and the makings of it were in the 1971 session.
- speaker: Interviewer
  text: What were these basic changes that occurred in the legislature at that time?
- speaker: Respondent
  text: Really, where it started, I think, was the total controls that the speaker had. That was one of the things that we
    were starting out against. If you weren't on the team, if you didn't vote, regardless of what your constituency might
    be, if you didn't go along with the team, you were just ostracized. It didn't matter what the merit of your legislation
    was, you couldn't get started. And then, of course, early in the term, so far as I was concerned, I could see conflict
    of interests every place you turned. Because there was a kind of climate up there that if you didn't exploit your public
    office, you really weren't with it, you were sort of a square. For example, the things that you were hearing about were
    appearing before agencies of your clients and so on, on down the line. Investing in companies that might have something
    going on, all that type of thing. There wasn't even criticism of it. I remember that on the floor of the house, a legislator
    telling me how much a group in a big city here had turned over to the speaker, who didn't have any "serious" opposition,
    as a campaign fund. These were all campaign funds for people that didn't have opposition, to speak of. It is all this
    stuff that you read about, but you just saw it firsthand there. So, it was a multi-faceted thing. It wasn't in the beginnings
    of it, but the impetus for it came out of the so-called Sharpstown Banking Bills and the disclosures made by the SEC about
    a year and a half after their passage. And you know, you can look back and say, "Oh, it looks all cut and dried and this
    was the reform session of the legislature," but it didn't start out that way, that is all hindsight. You look at one thing.
    I know that we were working for rules changes. For example, such things as that the conference committee on appropriations
    would have to use the guidelines of what came out of the house and senate bill, rather than going outside those guidelines,
    which has been what happened. For all practical purposes, the appropriations bill was written by the conferees. We went
    through the exercise in the house and senate, but it didn't mean anything. And this kind of thing didn't mean . . . and
    this wasn't the first session that that had been pushed. I can recall that in my first session, I had attempted as a rules
    change, to have at least a record of the committee testimony. Because I had had firsthand experience with my experience
    with the land commissioner where witnesses would take an oath and then there was no record of what they testified to,
    which made the matter meaningless. So, it came from different problems like that, but then the substantive matter came
    with the Sharpstown Bills. And again, we stay with procedure because the procedure was so much a part of what went on
    and what didn't go on. For example the consent calendar where one time and we were passing something that averaged a bill
    a minute. So that you had to do something about correcting the procedure before you could get to the substantive matter.
    What happened in a sense with the Sharpstown Bills, the speaker's head lieutenant got up and said that it was a good bill,
    that it would help the small banks and that was it. And because it was a speaker's bill, automatically, there would be
    whatever number of committee chairmen that we had and the vice-chairmen. That was part of getting those positions, so,
    I mean that there was no substantive discussion. And in a way, that's why I want to say that the procedural part was so
    much a part of what we were trying to do. But again, you didn't know where it was going to lead in the beginning and I
    still sometimes have second thoughts about where it has led now. I think we have the veneer of much, but I don't know
    if we have anything else. It wasn't cut and dried in the beginning. When we tried to get an investigation of . . . all
    I wanted when I asked the resolution, was to study the legislative history of those two bills. I did that in March of
    '71. Because I really wanted to know and I thought that it would be very informative to all of us, if we could just find
    out what went into the passage of a piece of special legislation. Who drafted it, where it came from, how it was manipulated,
    if you want to call it that. And of course, we were stopped there and I didn't intend to be stopped there. So, we went
    all different directions around the problem. I don't think that we know very much today.
- speaker: Interviewer
  text: This is a bill that would have done what?
- speaker: Respondent
  text: It would have gotten banks that wanted to get out from under the regulation of the federal FIDC and substitute state
    insurance, but in effect, without regulation. They didn't know what it meant. And that was why I was so curious to find
    out what I had voted on twice. Because there had been two bills on the subject. But let's say that it was the catalyst.
- speaker: Interviewer
  text: Was that the beginning of the Sharpstown scandal?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Well, we've been told that it really emanated out of the SEC.
- speaker: Respondent
  text: That's right, but it was the information from the SEC. We wouldn't have even known about it. This was one of the reasons
    that I wanted that legislative history of the matter. Because it was in effect, I think in August of '69, vetoed by Smith
    and still, there was only one political reporter that made some comment about it. And again, had it not been the SEC investigation,
    it would have gone and we wouldn't have known anything about it. It was interesting, because I . . .
- speaker: Interviewer
  text: What has happened in so far as procedural reforms in the legislature? You said that before, am I correct, that the
    conference committee on appropriations held in effect . . .
- speaker: Respondent
  text: Yes, those rules were changed during one of our special sessions in '71. I thought that here, you try and try and
    then when there is a complete turnover in attitude or pressure, things just float in. For example, it may appear to be
    a very small thing, but if you are going back to try and find the legislative history, it is very important to find out
    what witnesses testified. That came in as a rules change, limiting the conferees to the two bills came in as a rules change
    in the special session . . .
- speaker: Interviewer
  text: Before that, the conference committee could add or subtract anything? They could change anything? And now, they have
    to go to . . .
- speaker: Respondent
  text: That's right. And also . . .
- speaker: Interviewer
  text: Is there also provision for a pre-conference? In other words, they can go beyond that and with both houses?
- speaker: Respondent
  text: That's right, yes. They can do that. And even by the special session, when Gus had been deposed or stepped down, the
    hearings were open. Before, they weren't. Secrecy was . . .
- speaker: Interviewer
  text: What hearings are these?
- speaker: Respondent
  text: Appropriations, the conferees. I remember one time the reporters and I tried to track them down and they were meeting
    in somebody's apartment. So much went on . . . for example, posting. We had just such a battle in that session just to
    get the posting of committee hearings. I have now pushed most of it out of my mind, but it was a matter in 1971 of everyday,
    pounding on it. That's why I say that the reform session was really 1973, when the four or six so called "reform statutes"
    and . . .
- speaker: Interviewer
  text: What were these basic statutes?
- speaker: Respondent
  text: Oh, they are everything ranging from lobby control to financial disclosure. I think that probably the most significant
    is a public information act, by far.
- speaker: Interviewer
  text: Was that fashioned after the Florida sunshine law?
- speaker: Respondent
  text: All I know is that much of them came from the work of the Texas branch of Common Cause. So, there may be . . .
- speaker: Interviewer
  text: Who is the chairman or whatever of that group in Texas?
- speaker: Respondent
  text: The man that was the executive director was Buck Wood, but he has resigned. And so, he was the one that went through
    all this. He worked with Price Daniel Jr. The new executive director is a young man named John Hannah, from Lufkin. He
    was in the legislature at the time that I was.
- speaker: Interviewer
  text: Is it sort of a generalization to say that Sharpstown affected the politics of the '70s?
- speaker: Respondent
  text: Superficially.
- speaker: Interviewer
  text: What do you mean? Didn't it get a different governor?
- speaker: Respondent
  text: But what did you get? That's why I say it's superficial. At least that's my thinking, and I may have all kinds of
    preconceptions, but I think . . .
- speaker: Interviewer
  text: Well, it wiped out a whole lot of statewide officers, didn't it?
- speaker: Respondent
  text: Yeah, but I sometimes think that that is pretty superficial, too. Because I don't know if the personality of those
    that go on make that much difference.
- speaker: Interviewer
  text: Well, let me ask you this question . . .
- speaker: Interviewer
  text: But the procedures are different than they were in the '60s.
- speaker: Respondent
  text: Yeah, in the house it is. I think the house and the people . . . I was not there in '73, but they told me that it
    was different. As I said, the only way that you could describe the situation in those two terms that I was in there, was
    that you were just in a straitjacket. You could do a lot of stuff, maybe, but it wasn't legislative. I said that I never
    went up there to be a private detective. Half of our time was spent on this here and something there and that type of
    stuff. But I understand that procedurally that everyone got a hearing on their bill. That may not seem so important, but
    during my time, it was.
- speaker: Interviewer
  text: Ralph Yarborough made a comment in an interview with him, he said, "Texas is a happy hunting ground of predatory wealth."
- speaker: Respondent
  text: What kind of wealth?
- speaker: Interviewer
  text: He said, "The last happy hunting ground of predatory wealth."
- speaker: Respondent
  text: I don't know if it is the last, but it certainly is that.
- speaker: Interviewer
  text: He said that of all the fifty states, it is the happy hunting ground of predatory wealth. You would not consider that
    an overstatement?
- speaker: Respondent
  text: No. I only say that I don't know if it is the last. I don't know that and I don't know that much about the other forty-nine
    states. I mean, I go around frequently and people will ask me about things, about experiences that I have had here and
    then they will say, "Well, it's not too different from our state." Which may be true. I think that there is a distinction
    in that there is so much money here. There's a lot.
- speaker: Interviewer
  text: When did you first get involved in politics?
- speaker: Respondent
  text: I guess that that depends on what you mean by politics. If you mean running for elective office . . .
- speaker: Interviewer
  text: Or just involved in the interests of it?
- speaker: Respondent
  text: All my life. But I didn't run for public office until '68.
- speaker: Interviewer
  text: In the period that we are looking at, from 1948 until 1974, what major changes have taken place? In Texas politics?
- speaker: Respondent
  text: Not much. We have seen one thing . . . I am now referring to the legislature, but I think that you can refer to this
