turns:
- speaker: Interviewer
  text: About your father, I've read that he had a great deal of influence. Your father.
- speaker: Respondent
  text: Well, yes. He taught me some of the basic principles of life, you know. Like one of the lessons was if you want to
    hoe a little corn, hoe it clean. He did everything, as near as he could, exactly right. I remember, he and his brother
    used to make cross ties, you know, railroad ties. Larry would make about three while my father was making two, simply
    because my father took more pains using these we use in the hills. More careful about it. He got them as near as he could
    to the exact size. Hewed them very smoothly. Same way building a fence, clearing a field or cultivating a field. He could
    have gone through and plowed it and hoed it without being so meticulous. Made more profit from his labor. But he was just
    more particular and careful. Whether those traits are taught or inherited, I don't know. I sometimes think they're more
    inherited than taught. He was that way and I was that way too. But I admire him very much for that. And then he said,
    "Always make your word good. If you tell a man you'll do something, be sure and do it. If you're not sure you can, don't
    tell him." He was known as an honest man. He always tried to pay his debts and it was very difficult in those days. His
    was a very liberal philosophy. He went beyond the old populists, I guess. In fact, he became a member of the socialist
    party back when it was considered radical. Quite unpopular. But he would be appalled now at the, some of the ideas of
    the so-called liberals of this age. You know, when they let down in their morals or their way of doing things. I never
    shall forget . . . he was in the hospital with his fatal illness when Medicare became effective. He died in late July.
    So with his final bill, he was eligible for Medicare. I was visiting in the hospital with him and he was worrying about
    it. He said, "I'd like to go home. I'm just laying here running up a bill." He always worried about bills and it would
    be difficult to pay. And I said, "Well, Dad, you don't have to worry so much about that, now. You're eligible for Medicare.
    They'll take care of all of it except 10%," I believe it was, or 20%. He said, "Yes, but a good thing shouldn't be abused."
    He'd simply be appalled now at handing out food stamps to able-bodied young people. Now he would be in favor of some kind
    of work program for them. You know, if they were in need. Because he thought there was enough work to do in this country.
    It ought to be done and people could be paid for it. But to give an able-bodied person who's able to work, just give them
    cash or food stamps, which is the same thing, I guess what you'd call the dole, as an old-time socialist who believed
    in work, he'd be appalled by that. So the liberalism of today has gone far beyond what even the populists or the socialists
    believed in at that time. Incidentally, I feel the same way about it. No nation has ever survived that started giving
    away the earnings of working people to those who don't work if they're able. Now for those who are unable, you know, disabled
    persons, old people . . . I never shall forget when he got his first social security check. Twenty-one dollars, I think
    it was. He was proud of it as he could be because he felt like he'd earned it. He'd paid in the tax when he was working.
    And here was something he could count on every month that he lived. And that's something my father had never been able
    to look forward to. Because making a living in this country was rather uncertain during the times he was active. There
    were increases. I guess he was getting up close to forty dollars a month by the time he died. But he still worked. In
    fact, when he got to be an invalid, he'd crawl from one end of the garden to the other, hoeing a row. Crawl back doing
    hoeing, weeding. Then get his crutches and go to the house. I came by to visit him once when I was governor and he and
    his wife—my stepmother, my mother died in 1936—and they were fixing a chicken house to raise broilers. Some old buildings
    that they were repairing. Putting them in shape to raise broilers. And he couldn't stand without crutches. So they had
    a chair and they'd move that chair along and he would sit and his wife was handing him nails and holding the planks while
    he did the nailing, did the work. The farthest thing from his mind was a person who was able-bodied and could work should
    decline or refuse to work and then live on the labor of others. Yet he was known as a radical. I guess now he'd be a conservative.
    With those views.
- speaker: Interviewer
  text: How would you describe yourself, philosophically?
- speaker: Respondent
  text: That's a little difficult. You know I've been labeled everything. One of my buddies in the army one time . . . we
    were going through basic training. We were privates in basic training Camp Walters, Texas. And he said I was a practical
    idealist. I guess if I had to apply something which I think comes nearer to describing me that that would be it. I've
    never been a conservative in that, you know, I wanted the few to still be rich and the poor not have an opportunity to
    advance. Opportunity for everyone. And yet I was classed as a liberal in my early days. Quite liberal. Because I was I
    guess what you'd call populist. Many have labeled me that. But now I'd be called conservative by some because I don't
    believe in going so far with some of these programs as to abuse the program in such a way as to destroy them when they're
    good programs if administered properly. Like the food stamp program. It's very fine to help these old people, help the
    disabled, help, you know, widows with children. Need somebody to take care of them. I advocated old age pensions. The
    first one in this county, running for county office. You know, before anybody else thought of that. It was considered
    radical. But I've seen all that come to fruition. Social security. What you call welfare grants or old age pensions, whatever
    people call them. Private pension plans, governmental pension plans. Didn't have any for state employees when I became
    governor. They weren't even under social security. So I put all of them under social security and we expanded it to county
    officials and employees, city officials and employees. And then the nonteaching personnel in the public schools; like
    bus drivers, cooks, janitors and so forth. They didn't have any retirement benefits. And then we extended social security
    to school teachers and college people, which gave them two systems, their teacher retirement system and social security.
    Then two years later we set up a state retirement plan for all state employees and later expanded it to all these others.
    So that now anyone who works for government in Arkansas, when they get ready to retire, when they're too old to work anymore,
    they have the benefit of two retirement systems. And both of them are actuarially sound. We had to revise the teacher
    retirement system to make it actuarially sound while I was governor. No one could have been stronger for the great social
    programs that Roosevelt advocated and put into effect. Unemployment insurance, old age pensions which is welfare, the
    work projects. Well, the CCC, NYA, WPA, PWA, all those. But each one required that you do something to earn what you got
    except for the welfare grants which were for the old and disabled and blind, which is a form of disability, and dependent
    children.
- speaker: Interviewer
  text: At the end of your sixth term, having been governor for twelve years, were there any major things that you thought
    you hadn't accomplished that you still wanted to get done?
- speaker: Respondent
  text: Oh, one in particular. We'd made considerable progress but we hadn't got enough done. That's prison reform. Still
    relied mainly on the trustee system which may or may not work about as well as the other if you have the right prison
    head and it's administered properly. You know, system, I don't care how well you draw it up on paper, is any better than
    the people who administer it. The administrators. Under Lee Hensley we had a very good system. He was firm as a rock but
    fair. Every convict respected him. Bad ones feared him and the good ones sought refuge and sanctuary for their difficulties.
    But many of them come back and visit him, write letters to him afterward. But we didn't have any means except his iron
    rule for fairness and certain punishment if they were caught violating the rules. To protect the prisonmates from each
    other. And that's what your biggest prison problem is. They still don't have because, some time after I left office—in
    fact I think it's during Governor Bumpers' administration—four inmates beat another to death. And they heard his cries
    for help, but the paid prison guard I don't think was armed at the time and he was afraid to interfere, afraid to go in.
    But they just beat him to death. Now if that had happened during my administration you'd have had a big hue and cry, you
    know, and big headlines in papers. It goes back to that old adage, you know, it all depends on whose ox is gored, what
    happens. I'd like to see more construction there. Now we built a new hospital, we built new barracks, we built a theatre.
    We set up an athletic program. We set up an educational program where they were, you know, earning an eighth grade diploma.
    High school credits. All approved by the Department of Education. Furnished free textbooks. We began a program of furnishing
    free dentures and dental care for those who needed it as well as improved medical care. And then we started building up
    a prison welfare fund for the inmates out of the commissary where they did their trading. And it amounted to, I've forgotten
    how many thousand dollars, when I left office. That was done under Dan Stevens. Most of these reforms were done when Dan
    Stevens became the superintendent. One defect of Hensley was, he didn't believe in coddling them, therefore he didn't
    do enough for the inmates. He protected them from each other and made them work, but, you know, there's something to life
    besides that, even if you're in prison. And through the welfare fund you could send funds to a prisoner's family if they
    were in difficulty or you could buy him suitable clothing when he left prison and put money in his pocket to leave with.
    Otherwise, just used to turn them out and some of them that didn't get any money were out on the road hitchhiking. But
    to protect them from each other, which is needed more now, I guess, than before, you need a system of . . . I'd prefer
    to call them rooms. More than a cell. Where a man can have his own hobbies. If he wanted a library or material to paint,
    draw, woodcarving, whatever he'd like to do. And that would be his own private place. And there he would be safe, when
    he wasn't working or when he was out, any activity that required he would be outside. That hasn't been accomplished yet.
    It should be as soon as possible. Of course it's a big project. Cost a lot of money for that much construction. But we
    did more new construction while I was governor than I guess all the other administrations combined. They've had some new
    construction since then. Prison reform has continued since I left office. Under Governor Rockefeller and under Governor
    Bumpers. I think mostly due to the personnel there rather than their active interest, although any progress has had their
    approval. They must be given credit for that.
- speaker: Interviewer
  text: Any other major goals that you wanted to get done that you didn't finish? Other than prison reform.
- speaker: Respondent
  text: Well, of course, we hadn't gone far enough in many fields, like highway construction, financial support of education.
    There was something else, I can't think of it now. But we came from so little, so little, when I was first inaugurated
    to the point we were when I left office, that it's been comparatively easy to build on that since I left. Man, if we'd
    had the funds they have now . . .
- speaker: Interviewer
  text: If you think back over that twenty-five year period from 1948 to 1974, what are the major changes that occurred in
    Arkansas politics and government in that twenty-five years? You're one of the few people that was active throughout that
    entire period.
- speaker: Respondent
  text: First, we changed from one of the most backward states in the union to one of the most progressive. You'd had a progressive
    attitude in Arkansas for some time among some of the political leaders. But the state was virtually held in bondage by
    the economic interests. The Arkansas Power and Light Company dominated the state from one end to the other. They played
    a dominant role in the field of education. It was culturally, economically, and politically. Scarcely anyone who ever
    wanted political office survived without the support of that group. Wasn't just the company itself, but those allied with
    it. McMath didn't have their favor. I was in his administration. But he was unable to overcome their opposition. They
    could beat him in the legislature. Keep him from getting projects approved. They couldn't do that to me. I was strong
    enough that I got my program. Two of the hardest fights they've had in the legislature were between the rural electric
    cooperatives and the Arkansas Power and Light Company and their allies. We won both battles, but they were the hardest
    that were fought. And the general assembly split right down the middle and we just won by a small margin both times. Well,
    that broke the back of what I guess Franklin D. Roosevelt would have called economic royalists in Arkansas. And from then
    on the people had a say, the progressive people and the people that wanted to do things. They then, that leadership took
    a subdued role, tried to get along and take care of their company and their stockholders and ceased to attempt to dominate
    completely or control the political life of the state as well as the cultural life of the state. They still played a leading
    role economically. Now there were many things that were done in my administration that they joined in wholeheartedly,
    such as the industrial program. Naturally, it meant more business for them. Each new plant that came was a big paying
    customer. And all the employees were new customers, individual customers in their homes and small busines
