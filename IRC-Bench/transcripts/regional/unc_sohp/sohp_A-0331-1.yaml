collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Senator, would you go back to when you really first became aware of politics and so forth. I know that you were thirteen
    years old, I believe, in 1927 when your father, Eugene Talmadge, was first elected Secretary of Agriculture.
- speaker: Respondent
  text: Yes, he was elected Commissioner of Agriculture in 1926.
- speaker: Interviewer
  text: I meant Commissioner.
- speaker: Respondent
  text: Prior to that time, he had run for local office three times and was defeated. He ran for the legislature, the House
    of Representatives twice and the State Senate once. My father was somewhat of a maverick and they had a courthouse political
    machine in Telfair County and they knew that my father wouldn't take orders and they didn't want him to go to the legislature
    and he didn't go. However, when he ran for statewide office, they got behind him and supported him and supported him loyally
    until his death, in all of his races thereafter.
- speaker: Interviewer
  text: When were you first really caught up in his political career? Even in his earlier races when he lost?
- speaker: Respondent
  text: Of course, I knew little about them at that time, I was quite young. The first time, I guess that I was really reasonably
    active in his political career was the first race for Commissioner of Agriculture in 1926. At that time, I was twelve
    years old, about thirteen about the time that he was elected and I remember his famous debate with J.J. Brown in McRae,
    Georgia, I attended that. We had sent some wagon loads of watermelons up there to help feed the crowds. After the debate
    was over, my father and Mr. Brown were shaking hands and he introduced Mr. Brown to me and I went and got him the biggest
    watermelon out of the pile and he said,
- speaker: Interviewer
  text: Can you tell us something about the debate?
- speaker: Respondent
  text: Well, of course, J.J. Brown at that time was one of the most powerful political factors in the state. He had a vast
    organization of employees that did little but politic and they were selected from influential families and because of
    their political awareness. They were supposed to be an unbeatable machine. My father was an unknown country lawyer and
    farmer there that lived five miles south of McRae, Georgia. No one took him seriously at the outset. Mr. Brown made the
    mistake of challenging him into a series of debates, the first one in my father's hometown of McRae, the second one in
    Mr. Brown's hometown of Elberton, Georgia, the third one in neutral territory in southwest Georgia at Dawson, Georgia
    and my father was a very forceful debater and speaker. He just cut Mr. Brown to ribbons in all three debates. The press
    gave it a good deal of prominence and that was what elected my father Commissioner of Agriculture.
- speaker: Interviewer
  text: Were you active in his later campaigns as well?
- speaker: Respondent
  text: Yes. About the time that he ran for governor, in 1932, I had just finished my freshman year at the University of Georgia
    and one of my duties was to advertise his speeches. In those days, you would go to all the little towns around there and
    nail up placards, paste signs on trees and on the placards in courthouses and things of that nature. I remember one time
    that I was advertising a speech that he was to make at Cedartown, Georgia. I went in the meat market. In those days, the
    meat markets had sawdust on the ground and had a big round trunk of a tree there that they used as a table to cut up the
    meat when the housewives would come in to buy it. I handed this butcher a circular there announcing my father's speech
    and he said, "I wouldn't vote for that goddamned son of a bitch for nothing." I didn't know whether to hit him or run
    or what to do. I learned then that all you can do is turn the other cheek. So, I walked on out and kept on delivering
    circulars. Then, thereafter, in 1934 when he was seeking reelection as governor, I made my first political speech. I had
    a friend in college named Aubrey Evans from Sycamore, Georgia, and he decided to have a big Talmadge rally down in Turner
    County, near Sycamore. We had an old cotton warehouse and he had three or four hundred people there with a great big sign,
    "Welcome, Herman Talmadge". I was only twenty years of age.
- speaker: Interviewer
  text: This was sort of heady stuff.
- speaker: Respondent
  text: Yes, it was heady stuff. That was my first political speech. Incidentally, Turner County is the county where I afterwards
    met my wife, Betty, and I must say that my father carried the county overwhelmingly but I don't think that any of it was
    attributable to my speech. At that time, he carried every county in the state except Fulton, DeKalb and Clarke.
- speaker: Interviewer
  text: Did he ever carry Fulton and DeKalb?
- speaker: Respondent
  text: Yes. He never did carry DeKalb for governor. He carried Fulton in one of his races for governor and strangely enough,
    he was always very strong in Clarke County until he and Abit Nix ran against each other for governor in 1932. My father
    had a good many relatives in Clarke County named Talmadge. They were widely respected students, he had been a student
    there and was known by a good many of the families. My grandfather had been a student there and he was known to a good
    many of the families. So, he was very popular until he defeated Mr. Nix, who was Clarke County's favorite son. Thereafter,
    my father never carried Clarke County as long as he lived. I didn't carry it in my first two races for governor, but Abit
    Nix got to be my friend and he introduced me when I ran for the United States Senate and I carried Clarke County that
    time and I have carried it every race that I have made since.
- speaker: Interviewer
  text: Didn't your father used to have . . . I can remember some of the quotes attributed to him about never wanting to carry
    a county that had streetcars in it?
- speaker: Respondent
  text: You know, it's strange how things alleged to have been said become facts and become history. Now, here is what happened.
    The first speech that my father made after he was nominated for governor in 1932 was at a fair in Chattooga County at
    Summerville, Georgia and he stated that he didn't carry any counties where streetcars ran and that statement of fact came
    to be a legend and he was afterwards quoted as saying that he didn't want to carry any counties where streetcars ran.
- speaker: Interviewer
  text: It didn't sound like a statement that any politician would make.
- speaker: Respondent
  text: No politician would ever make a statement like that. As a matter of fact, he carried many counties where streetcars
    ran. He carried Richmond County most of the time. He carried Chatham County most of the time and he carried Muscogee County
    most of the time. Streetcars ran in all those counties.
- speaker: Interviewer
  text: What about your father, Senator Talmadge, can you describe what you think his impact on the state was?
- speaker: Respondent
  text: 'Before I get into that, let me give you another myth that was alleged to have been a statement of my father''s and
    that was not a fact. He has repeatedly been quoted as having said that "The farmer has only three friends: God Almighty,
    Sears Roebuck and Gene Talmadge." He never made that statement. Some individual, in introducing him to an audience once,
    made that statement and it was attributed to my father. Well, getting back to my father as an individual . . .'
- speaker: Interviewer
  text: Were there other myths? I'm sure that there were.
- speaker: Respondent
  text: Oh yes, many of them, but I don't recall any at the moment except those two. I've read them both a thousand times
    and I don't know how things can get so . . . the press will pick it up once or twice, you know and then some fellow will
    write an article about it and he will quote from the press and then some man will come along and write a book about it
    and he will pick it up from the articles and after one or two errors, it becomes embedded in history as a statement of
    fact.
- speaker: Interviewer
  text: I wouldn't doubt that there are a few about you like that.
- speaker: Respondent
  text: Oh, I'm certain of it. I remember one about me. I am alleged to have written the then Attorney General Eugene Cook
    whether or not, after I had served an unexpired term as governor, whether I could seek a full term as governor. I was
    alleged to have ended it up by adding another paragraph that "If I am ineligible to run for governor, am I eligible to
    run for Attorney General?" [laughter]
- speaker: Interviewer
  text: I remember that. You never wrote that? It was a good story.
- speaker: Respondent
  text: It was a good story. [laughter] Getting back to my father, my earliest memory of my father was that we had a white
    horse named Maude and a buggy in those days. I was born in 1913 and I guess that this must have been probably 1917 or
    even 1918. As a young boy, we lived on a farm and I would walk about on the farm and I remember one time that my father
    picked me up out of the road, I had gone to meet him as he was coming back from town and I laid down in the road and went
    to sleep. He picked me up in the buggy and brought me on home. In those days, times were awfully hard in southeast Georgia.
    Most of neighbors had only one crop and that was cotton. We did raise some hogs and cows and we started trying to protect
    our timber early. Most of them burned it up early in those days to get grass for grazing cattle. Some of my earliest recollections
    were fighting fire. My father some days would go to town and practice law and try cases and some days he would put on
    his overalls and go to the fields and plow. We ran what was commonly referred to as a "twelve horse" farm in those days.
    As farms went in our section, that was a relatively large farm. Most of them had two and three and four horse farms and
    some of them, one horse farms. About half the people in that area at that time were tenant farmers or sharecroppers, as
    they were known at that time. Times were extremely hard. My father was a very forceful and vigorous man. He was also quite
    an athlete. I would remember that as a young man he would sometimes take a plow line in the yard and jump the rope. I
    remember that when he was about forty years old, he could jump the rope about as high as his head. He was about five feet
    nine or ten,
