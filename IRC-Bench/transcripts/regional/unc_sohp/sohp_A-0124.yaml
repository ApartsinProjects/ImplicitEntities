collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: Senator Helms, basically how did you get active in the Republican Party and in politics? You don't have a tradition
    of being a "politician".
- speaker: Respondent
  text: Well, I've been on the perimeter of politics, I guess, all my life, all my adult life. As you know, I was a Democrat
    by registration until September of 1970, even though I never voted for a Democrat nominee for president. Never had that
    experience. I was in Washington two or three years in the early fifties as administrative assistant to two Democratic
    senators, as you know, and when the conservative faction of the Democratic Party prevailed in North Carolina, I did do
    some work for the party. I did some writing, I wrote speeches for a number of prominent Democrats from time to time, helped
    in other ways. But the party veered so far to the left nationally, and was taken over by the people whom I'd describe
    as substantially left of center in North Carolina. And I think I felt, as many other Democrats felt and feel, that really
    I had no real faith in the party. But I didn't do anything about it. Changing parties, changing party registration, is
    like moving from a church. But President Nixon's speech at Kansas State, I think it was, persuaded me that maybe the Republican
    Party in North Carolina and in the nation had a chance to restore the two-party system. Not merely in terms of electing
    a president, but in getting a Congress that could be reasonably expected to pull us back to the point of fiscal sanity.
    And in other matters. So I quietly switched my registration, with no idea at all of ever being a candidate. I thought
    I would be able to contribute something, perhaps, to this two-party system. I'd done a little writing, or other things.
    And then, as soon as my registration switch had been made public, delegations of citizens - most of them Democrats - started
    coming to see me, and they wanted me to run for the Senate. And I laughed at them. The idea seemed absurd to me in terms
    of any real possibility, and in any case, I had a good job which I enjoyed. And I sent them away, with gratitude, of course,
    for the compliment. But it persisted. And finally, along about the first of January there came a group of people, Republicans
    and Democrats, with the same story. And they were so persistent that finally I said, "Well, you folks would like for me
    to run, but you know that I don't have a chance to win the Republican nomination, being in the party just a little over
    a year." They said, "Well, you're wrong about that. We think that you'd be surprised at the support you'd have if you
    would just come out." And I said, "Well, I don't agree with you." So as a parting shot, one of them said, "Would you object
    to our sending out some letters to test what might be the strength that you would have?" I said, "Well, you're going to
    invalidate what I've said to you, waste your postage and your time, but you can do that if you'd like. Just so long as
    it does not imply any commitment to run." Well, they sent out, as I recall, about four thousand letters of the customary
    type, saying that Jesse might run if you write to him and get three or four of your other friends to write. And maybe
    send him a dollar or two, on the condition that it be sent back to you if he does not run. Well, I thought that was the
    end of it, but within about two weeks we had, as I recall, about fifteen thousand pieces of mail and about $19,000 or
    $20,000 worth of money. And then I began to look at it seriously, and ultimately I got into it. That's a long answer to
    your question, but you asked for it.
- speaker: Interviewer
  text: You said initially Democrats came to you, though?
- speaker: Interviewer
  text: Were they interested in you running as a Democrat?
- speaker: Interviewer
  text: In the primary.
- speaker: Respondent
  text: Yes. They came for two reasons. One was an apprehension, which I did not share, that Senator Jordan would be defeated
    in the primary. Or that he might not survive. Now, that's a delicate thing, and I want you to be careful how you handle
    that, putting it in the book.
- speaker: Interviewer
  text: Right. Okay. Because of his health situation at that time.
- speaker: Respondent
  text: Yes. I ask you, especially, that you handle this with care, because Senator . . . is still alive. He's in bad shape,
    but . . . there were many of his friends who were fearful that he could not survive the campaign. Of course, they were
    proved wrong. Then there were others who were disenchanted with Senator Jordan because they disagreed with him on his
    handling of the Bobby Baker case and for a variety of reasons. But they wanted some fire insurance in the event that something
    should happen to Senator Jordan, either defeat or worse, and that Mr. Galifianakis should prove to be the nominee. I didn't
    think that Mr. Galifianakis would be the nominee. I thought Mr. Jordan would. But they were right and I was wrong.
- speaker: Interviewer
  text: Do you see a realignment developing in North Carolina? Where do you see the conservative Democrats in North Carolina
    going? And by conservative Democrats, I think I'm really speaking of the kind of Democrat that you see in eastern North
    Carolina.
- speaker: Respondent
  text: Well, I think that . . .
- speaker: Interviewer
  text: Who frequently, say, votes for George Wallace, who has a large following in the east.
- speaker: Respondent
  text: Well, I think that Governor Wallace is a symbol to a vast number of people in our state. I don't necessarily say that
    they're conservatives or moderates or liberals. I simply say that they are frustrated, because what they want, in my judgment,
    is somebody who will tell . . . who will level with them. Whether they agree with him or not. But who will tell them what
    he thinks and what he will do, and then do it. And George Wallace comes through as a man of that image. I'm sure that
    a lot of people who don't fully agree with George Wallace voted for him, simply because they felt that they could rely
    on his word. I hope, of course, that some of them voted for me for that reason. And . . . to answer your question, I don't
    think there's going to be any realignment until there is a persuasive force in the political life of our state, that can
    get across this message that I'm going to tell you the truth, and I'm going to do what I say to the best of my ability.
    Now, whether the Republican Party can do that, or whether the Democratic Party can do that, I don't know. It remains to
    be seen.
- speaker: Interviewer
  text: Do you think politics in North Carolina, then, are more likely to revolve around personalities than parties?
- speaker: Respondent
  text: No, I think they revolve around issues. And a complete disenchantment with headstrong government that intruded into
    the lives of every citizen, whether it be in North Carolina or otherwise. And the people basically, both consciously and
    subconsciously, are rejecting the kind of government that deprives them of their decision making right. They are unhappy
    about inflation, and why shouldn't they be? They are unhappy about forced busing. You could pull any thread from the fabric,
    and you can find discontent. There's just a welling up of sentiment against too much government.
- speaker: Interviewer
  text: When you use the term forced busing, what do you refer to specifically?
- speaker: Respondent
  text: Well, I am speaking, of course, of government assignment of students on the basis of race. Now, we've got discrimination
    in reverse now, in this forced busing. In the idea of children being assigned to schools on the other side of town, just
    to achieve some sort of "racial balance" that satisfies the whims or caprice of some bureaucrat or judge or both. And
    that's the way I'd describe forced busing.
- speaker: Interviewer
  text: So with the Supreme Court mandate what it is at the moment, so far as school desegregation is concerned, and in urban
    areas where housing patterns tend to be based predominantly on race, how . . . what other means would be available to
    desegregate the schools?
- speaker: Respondent
  text: Well, I'm not saying that desegregation is the important thing. I think education is the important thing, and one
    thing that everybody agrees on is that the quality of education is deteriorating. Now, I know you've seen the same polls
    that I've seen, that not . . . this is not a racial issue any longer, because black parents object to forced busing just
    as much as the white parents. And the hostilities in the schools and the frustration of the teacher in trying to cope
    with the situation, when the psychology of the classroom is just one of destruction and apathy and all the rest of it.
    Now, our schools are going to pot. Now, I think that my dear colleagues on the floor of the Senate are mistaking the mood
    of the people, and this may well affect their futures. I hope it will, because if they can't change their mind in the
    face of obvious fact, when they have been proved wrong, then they need to be eliminated from the Senate. If I'm wrong,
    they well may eliminate me. But I don't think I'm wrong.
- speaker: Interviewer
  text: Insofar as the Republican Party in North Carolina is concerned, how do you view your role in the party?
- speaker: Respondent
  text: Well, I think my first duty is to be as effective a senator in espousing and defending the principles which I believe.
    I don't want a faction in the Republican Party. I don't want to control the Republican Party, and I've never done anything
    to indicate otherwise. But if I have a role in the Republican Party, I hope it is one of persuading all Republicans that
    we have got to stand for principles. That we can't be honest, let alone win an election, by being a little bit liberal
    than the Democrats. We can't be all things to all men. We have got to take our stand. Now, if I can to any degree persuade
    the of the Republican Party that this is the way to go, in terms of being intellectually honest and politically successful,
    that I accept that role, if I can do it.
- speaker: Interviewer
  text: What do you see as the formula for growth of the Republican Party in North Carolina? There're two patterns that we
    keep hearing, talking to the Republicans throughout the South. One is the talk of realignment, attracting conservative
    Democrats who are uncomfortable in the Democratic Party. The other is broadening the base of the Republican party by attracting
    blacks, by attracting urban moderates, they usually refer to. By expanding their base in that direction.
- speaker: Respondent
  text: Well, I think it's sheer folly to try to expand the base on any ethnic ratio. I would hope that we would expand the
    base by attracting all people, whatever their race, whatever age, religion, and all the rest of it, who share the fundamental
    concerns of what I believe the Republican Party should be . . . I think we should take our stand, win or lose, and let
    it all hang out. If we try to cajole and compromise, that's the road to defeat. The Republican Party has no future because
    the Democratic Party has demonstrated through the years, for a generation now, that it intends to buy votes any way that
    they can be bought. These giveaway programs, welfare and all the rest of them. Now, I don't want to be a Republican, a
    successful Republican, on that basis. I would rather be a private citizen. The Republicans may as well make up their mind
    that the left-wing spectrum has already been preempted. It's not available to them. Furthermore, if they . . . even if
    they could move in there, it would be intellectual dishonesty.
- speaker: Interviewer
  text: How do you view the party . . . define the fundamental concerns of the Republican Party, as you see them.
- speaker: Respondent
  text: Well, I'm trying to articulate them, as a United States senator. Ask me specific questions and . . . that would launch
    . . . to answer that question in a general way would take up forty-five minutes. If you ask me specific questions . .
    .
- speaker: Interviewer
  text: If you had to encompass your basic philosophy, as you see it, applying to the Republican Party. If you had to summarize
    it, say, in one or two sentences, how would you summarize it?
- speaker: Respondent
  text: Well, I couldn't do it, and no man alive could. But . . . and that's the trouble, trying to get a short cliche that'll
    fit. I think you've got to go on this . . . you've got to go, for example, with the absolute that this government cannot
    survive if it continues this fiscal irresponsibility, that has been practiced for a generation now. We have got to balance
    the budget. We have got to reduce government spending. We have got to remove the federal government from the lives of
    the people. The federal government was never envisioned to be a provider, a welfare organization. The Constitution very
    clearly tells us what the purpose of the federal government, the government was intended to be. And so, to . . . in the
    broadest possible sense, I think we've got to look at the historic fundamentals of this country. And to realize what government
    can do successfully, and should do. And what it cannot do. Now, that encompasses ten thousand things. The question is
    evident in practically every roll call vote we have. Price controls. The Republican Party ought to be against them, because
    they won't work, and the free market system is the only thing that is going to work. In gasoline or beef or anything else.
    Wage . . . minimum wages. This is a purely political device. Anybody who is honest with himself knows that every time
    you raise the minimum wage, either on the state level or on the federal level, you do nothing but lop off thousands upon
    thousands of jobs and put those people out of work. The free market must prevail, and the Republican Party, if it's going
    to mean anything, has got to take that position.
- speaker: Interviewer
  text: Now, what does the . . . when the Constitution refers to one of the roles of the federal government, to promote the
    general welfare, what does that mean to you?
- speaker: Respondent
  text: It has nothing to do with the welfare system. Implicit, or perhaps explicit, in your question is the fact that you
    realize that. It would never envision that we'd have welfare payments, doles and handouts. I do think that the truly needy
    and worthy of society ought to be taken care of. I try to practice that in my private life as well as in my public life.
    But . . .
