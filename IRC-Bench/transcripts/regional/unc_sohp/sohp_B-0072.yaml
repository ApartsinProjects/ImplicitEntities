source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: You, as I understand it, were, at one time, a U. S. District Attorney?
- speaker: Respondent
  text: I was an assistant.
- speaker: Interviewer
  text: Assistant. Was that in this district?
- speaker: Respondent
  text: This was here in Charlotte. It was in days, well, I guess it still is, then the home office of the U. S. Attorney
    of the Western District is in Asheville. He had another office down here, and one assistant was in this office, and I
    was the Charlotte assistant.
- speaker: Interviewer
  text: Are you a Charlotte native?
- speaker: Respondent
  text: No. I've never lived here. Still don't.
- speaker: Interviewer
  text: You live up at Davidson?
- speaker: Respondent
  text: Live up at Davidson, yes. I came from Statesville where I practiced law before I came here, or before I came to Davidson
    with an office here. I came from Alamance County. The little town of Graham where I first began the practice of law.
- speaker: Interviewer
  text: One of these days they are going to get that road finished between Graham and Chapel Hill.
- speaker: Respondent
  text: Perhaps. I keep watching.
- speaker: Interviewer
  text: After you were U. S. District Attorney, then, now you're with Duke Power Company?
- speaker: Interviewer
  text: And are a resident of Davidson?
- speaker: Interviewer
  text: How did you get involved in the consolidation? I mean, why would they, Mr. Sadler or whoever, pick you as the Davidson
    representative?
- speaker: Respondent
  text: I can't tell you. I think that probably Mr. Frank Jackson who was the mayor before Mr. Sadler had something to do
    with it. I also think that it was easy for me to be a member since I was here frequently. To pick someone who had his
    office in Charlotte and who was here frequently made it easy for him to meet with the Charter Commission. Someone from
    Davidson would have had more difficulty. We happen to be the only part of the county without an adequate highway into
    Charlotte, which makes travelling a great difficulty. Still is.
- speaker: Interviewer
  text: You had been on what the Davidson Planning Board?
- speaker: Respondent
  text: That's the only thing I had been on, the Davidson Planning Board. I guess at that time I was probably the only attorney
    who lived there, also. That could have had something to do with it. I really don't know what the reason was.
- speaker: Interviewer
  text: You hadn't been involved in any of the prior discussion of consolidation?
- speaker: Respondent
  text: No. I had not.
- speaker: Interviewer
  text: Who instigated the talk about consolidation? Was it strictly the Chamber of Commerce? I mean, the idea had been sort
    of knocking around for some time.
- speaker: Respondent
  text: As far as I know, it had been, and we had had two men from Davidson prior to that time who had had discussions or
    had something to do with the committees and whatever groups considered consolidation prior to that time. Grier Martin
    who had been president of Davidson had something to do with it. I think he'd been chairman of a committee.
- speaker: Interviewer
  text: There was a study committee.
- speaker: Respondent
  text: Then, another man. H. B. Naramore who was on the town board had had something to do with it. I don't remember… some
    of the enabling legislation. He had set in on the approval of that. Those were the two men prior to me who had had something
    to do with the planning of it.
- speaker: Interviewer
  text: Was consolidation, then, largely a chamber effort?
- speaker: Respondent
  text: I do not know. It had been discussed for quite some time in the press, perhaps in the chamber, perhaps by other groups.
    I don't… I had paid very little attention myself to the beginnings and how it originated.
- speaker: Interviewer
  text: Your first real contact and knowledge of it, in other words, really came with your appointment to the Charter Commission?
- speaker: Interviewer
  text: Why did, do you suppose, the issue came up when it did? I mean, it had been knocking around for some time, but there
    were some comments in the newspaper from Mr. Brookshire and from some others, "Consolidation would be a good thing, but
    it will probably be ten or fifteen years before we actually attempt to consolidate the governments". Then, all of a sudden
    in '68 and '69, the thing sort of snowballed. You have the study group and the enabling legislation, charter commission,
    and the vote in '71. Was there something which sort of prompted this, not really hasty but…brought it up at that particular
    time?
- speaker: Respondent
  text: Nothing that I know of. Being a resident of the county rather than the city, I am one of those who have been suspicious
    of the motives behind it. When I have received what I think is the frank or candid opinion, the reason from some people
    in government, and it's difficult to get this and I'm sure all of them are well-intentioned… But one member of the present
    city council, for example, told me, "Bill, we have to get somebody to help us pay for those things". I've been one who
    has felt that there was some of that motive behind it. They wanted to get the county people in to help pay for some of
    the things that Charlotte was interested in. Many of us There were who were suspicious that this probably motivated it.
    Now, why it came at this particular time, I don't know.
- speaker: Interviewer
  text: I've noticed that there was a big question about providing water and sewer service at this time. Some of the county
    residents that were on the board of commissioners threatened… There was a threat to establish a county authority or whatever
    to provide. This was when the Westinghouse plant was being built and there was development in that end of the county.
- speaker: Respondent
  text: There was some interest in that. Perhaps about this time, the county water system… It was done, I believe, in cooperation
    with the city… Water was provided to Westinghouse, and, I believe, to the research park north of Charlotte and also to
    the little community of Smithville which was…
- speaker: Interviewer
  text: Out of Huntersville.
- speaker: Respondent
  text: Right outside of Cornelius. It was in right bad shape. So, water was provided in some instances in those three areas.
    However, as a practical matter, water could not be provided over the entire county.
- speaker: Interviewer
  text: My understanding is there's a ridge that runs through the northern part, and the water towards the Yadkin or the Peedee
    as opposed to flowing into the Catawba. And this really makes some problems for the northern end of the county as far
    as water.
- speaker: Respondent
  text: Well, it never has been a problem. Davidson has historically, as has the town of Mooresville north of that, Huntersville,
    they have taken water from the Catawba watershed and placed water back in the Peedee watershed cause they were on a ridge.
    They placed the sewage back in the Peedee watershed. No one has ever raised a question about it until recently. I don't
    recall, at the time the consolidation effort was discussed, that anyone raised that point. Only recently, in the last
    two or three years, has that point been raised. That's in connection with what they call, I believe, the 201 project for
    providing sewage to the northern part of the county.
- speaker: Interviewer
  text: I understand there's some talk under way of perhaps at least Cornelius, Davidson, and Huntersville combining government
    in some way.
- speaker: Respondent
  text: Yes. To distinguish from consolidation… Perhaps about two years are, some of the people in the northern part of the
    county, extreme northern part, considered the possibility of seeing whether it would be wise to form one municipality.
    The study has been made. Number one, well, I think we have three possibilities. One was the strip unification of Davidson,
    Cornelius, and Huntersville. Davidson and Cornelius being contiguous and there being a several-mile span between Cornelius,
    gap between Cornelius and Huntersville. Whether to have a strip municipality, or whether to attempt to have one municipality
    in the northern part of the county beginning roughly at North Mecklenburg High School and going northward, or whether
    to have a lease federation or, perhaps, a utility district consolidation. That study has been completed. The report has
    been made to, I guess you'd call it a group that was created about two years ago called the North Mecklenburg Association
    and also to the three town boards. I do not think as of yet there's been any official reaction from the three town boards
    nor from the Association. Perhaps that will come in the next few weeks.
- speaker: Interviewer
  text: I'm interested in why the interest among the three towns in the possibility of some type of consolidation whereas
    that area went so overwhelmingly against the proposal to consolidate the whole county government.
- speaker: Respondent
  text: Yes. The… Those who… Perhaps there is some feeling that if they have one municipality in the northern part of the
    county they will avoid a consolidation of city and county government in the future. Many of us have told them that that
    is not true, and those who are realistic about it and actually know the facts know that that would not really prohibit
    consolidation or keep them from being included in consolidation of city and county. Davidson realises that they must upgrade
    their sewerage system by 1980-81 if it continues to grow and must have more capacity. They must meet higher standards,
    have a manned sewage disposal system that will have a greater capacity than what it has now. Cornelius is in… it has a
    sewage system that is must be… and I think they are operating now I think, on borrowed time. They must have a sewage system
    that is updated now, but they're getting by simply by grace of the authority. So, they are up against it. Huntersville,
    I think, is in somewhat the situation that Davidson's found itself in. They realise that the three together can cooperate
    in certain ways, and already some of them are cooperating with police departments. Particularly Davidson and Cornelius
    with contiguous boundaries. It doesn't make sense for them to each have a separate police department and separate water
    systems and separate utility and electric system, separate schools. They could put it all together and perhaps be more
    efficient. The people who live outside the three towns recognize that with growing development particularly in the lake
    area it would be advisable to have a sewage disposal system and the 201 plan only provides the main sewer lines. There
    will have to be connecting laterals to get many of the new residential developments on the lake to the main sewer lines
    that will be provided by the 201 plan. Then, if they were all in one community, Davidson has really a superior pumping
    system and water mains have a large line underneath I 77, as perhaps does Huntersville. They can provide water to the
