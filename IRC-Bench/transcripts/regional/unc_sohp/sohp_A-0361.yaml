collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: My first visit to Atlanta was about 1935 or maybe a little bit earlier. I was at Howard and I was working with Abram
    Harris and Ed Lewis in the economics department. I had just finished a year of graduate work at the University of Chicago.
- speaker: Interviewer
  text: In sociology?
- speaker: Respondent
  text: Sociology and economics, yes. Then I went to work with Abram Harris and I did the statistical work on The Negro as
    Capitalist, one of the earlier books that Abram did. I also taught courses in the economics department at that time as
    an assistant, so, as both colleagues and friends of Abram Harris and Ed Lewis. Ed Lewis is an economist who has done a
    considerable amount of work on rural economics. He had never been South. He's from London. He was a person who had polio.
    So, we cooked up a trip to... I was going to introduce him to the South. We bought a secondhand car.
- speaker: Interviewer
  text: In a way it was your own introduction?
- speaker: Respondent
  text: No, at that time I had lived in Virginia. It was my own introduction to the deep South, but I knew the South. I had
    lived in Hampton, Richmond, in fact, I went to school in Richmond.
- speaker: Interviewer
  text: Malcolm x said one time, "The South is anywhere South of the Canadian border."
- speaker: Respondent
  text: That's correct, if you are black. [laughter] I knew Washington. So, anyway, Ed and I with our little 1935 or '33 Ford
    Roadster, which was good at oil burning—we drove and after making other stops we wound up in Atlanta. We went on from
    there to Mississippi and came back up to New England and so on. [laughter] That summer, summer school was in session,
    and it so happened that Atlanta University was kind of a mecca at that time and even later. For students, particularly
    doing not only undergraduate but graduate work as well in the various social science disciplines. Billy Geeter, names
    you probably know, Ann Cook Reed, who later married Ira Reed, they were there. They conducted a very important and well-known
    theater repertory. John Mack Brown was there. Also, there were people who were visitors there. Sterling Brown was there
    that summer and Harold Lewis. I remembered because we had a wonderful time with this group of people in Atlanta. The things
    that I remember, the comraderie, but also the kinds of paradox which grew out of the fact of this oasis, this very stimulating
    oasis there which was Atlanta University and Spelman College. I remember we would spend our evenings sometimes just getting
    in the car and riding up. These little vignettes would stick in your mind, again, I mention the paradoxes here. We would
    drive out into rural Georgia and park the car at one of these little taverns or roadhouses or we would go in and get beer.
    Again, in the Georgia which is the Georgia of... I had been in Atlanta before that. I had been in Atlanta for the Department
    of Labor which is another thing which I will mention about my coming in there. We can come back to that. From Washington
    and Richmond, working for the Bureau of Labor Statistics and the cost of living study later on. I had government vouchers
    and I would go up into the... If you remember that period, I don't know whether you remember, but in order for me to get
    pullman or sleeping car arrangements I had to go into the "white waiting room." So, I walked in there with my friend Fisher,
    who was a Mormon from Utah, just as naive as you could be. I said, "Look, be careful." I said, "I don't know what kind
    of you have in my luggage and so on. So, I walked into the white waiting room and walked up to the counter. This little
    cop said, "What are you doing here?" I turned and very quietly said, "I'm getting accommodations, I have government orders
    here." I used the word government and he didn't know how to handle that. He walked back and stood and watched me the whole
    time.
- speaker: Interviewer
  text: Was that a practice that worked to say I have government orders here?
- speaker: Respondent
  text: Well, it's such an unusual thing that you would use any leverage, and I did. It worked in the sense that this person
    was not used to that, he didn't know it and it was enough to throw him off. This worked both ways. We will have a rambling
    conversation if you ask these kinds of questions. To give you another point of that particular picture, that same trip
    with Ed Lewis, I took an examination for junior social economist in New Orleans at the customs house. That is where it
    was held. It was to be held in Washington but I got it transferred there. It was out of that that I got this later appointment.
    But, the point is that when this group of interviewers left Washington we met in the Labor Department there. I will never
    forget this guy's name, administrator, Fitzgerald. He said to me particularly, he said, "Look, you're going South, you
    are traveling with the government but in a sense you are on your own." This is diverting but if you want to get into these
    little vineyards and what the South was like and my particular, really interesting, kind of ventures that involved me
    as a young college graduate. I was lucky enough to have a great variety of kinds of experiences. Again, when you talk
    about, as you know so well, one of the aspects of living and coping is the dealing with the paradoxes.
- speaker: Interviewer
  text: The inconsistencies and learning how to play the game.
- speaker: Respondent
  text: Precisely, but there again, they are part of the picture. They make the system work so to speak. In any situation
    where there were rules and pretend rules. Again, how do you do it, who does it, what happens?
- speaker: Interviewer
  text: Had you gone to Howard as an undergraduate?
- speaker: Interviewer
  text: Where did you go?
- speaker: Respondent
  text: I went to undergraduate at Virginia Union University in Richmond. I taught at Howard. I went to Howard to work with
    Abram Harris.
- speaker: Interviewer
  text: After you finished Virginia Union did you go to Chicago then?
- speaker: Respondent
  text: Yes, I had a Social Science Research Council Fellowship. One of the first again to stick with the South. Ah, another
    paradox. The Social Science Research Council at that time, by dint of the urging of Charles S. Johnson, established a
    special set of fellowships for the South. Charles Johnson was a student of Robert Park in Chicago. Charles Johnson was
    a member of the board of the Social Science Research Council for New York. They had a big fellowship program. But, Charles
    Johnson was able to get them to establish a special program for southern students, the disadvantaged southerners. He didn't
    say black or white, but just that the South was disadvantaged. The first set of fellowships, graduate fellowships, under
    that aegis, there were three of us from Virginia Union, a student from Fisk, and Sarah Alice Mayfield from Birmingham
    Southern, who later on married Stuart Weiss, and we all wound up at the University of Chicago. That's another story.
- speaker: Interviewer
  text: That would have been in the 20s.
- speaker: Respondent
  text: No, I finished in '32, so this would have been in '33.
- speaker: Interviewer
  text: You finished at Union in '32.
- speaker: Respondent
  text: 'The fellowship was established in 1932. It indicates something about what the times were like and it indicates something
    too about the fact and the perception of the South and the beginnings of higher education. Again, the South was beginning
    to get Huey Long, you have Frank Graham and you have... '
- speaker: Interviewer
  text: Things going on down there...
- speaker: Respondent
  text: When North Carolina gets to be known and honored because it has some of the best roads of the South.
- speaker: Interviewer
  text: That has something to do with it.
- speaker: Respondent
  text: These are the kinds of things, this is the South of shacks and you're still in the tobacco road tradition. It was
    a South of interest. A lot of things happened on that trip that Ed Lewis and I made, not only in Atlanta but also in Mississippi.
- speaker: Interviewer
  text: If you went to Chicago in '32 how long were you there?
- speaker: Respondent
  text: I was there at the University of Chicago on the Social Science Research Council Fellowship... The munificent sum of
    $1,000 which permitted me to pay tuition, pay room and board and actually the Depression struck and all the banks were
    closed. I was able to lend my landlord, who was charging me the magnificent sum of $20 a month... [laughter] [laughter]
- speaker: Interviewer
  text: You actually had money in your pocket.
- speaker: Respondent
  text: I had money. I remember the attempted assassination of the mayor of Chicago. I spent that year there, 1932–'33, I
    spent three quarters there and my money was beginning to run out. Virginia Union asked me to come and teach summer school.
    I went back to teach summer school. It was after teaching summer school that I teamed up with Abe Harris at Howard.
- speaker: Interviewer
  text: It was the summer of '33.
- speaker: Respondent
  text: I taught the summer of '33.
- speaker: Interviewer
  text: Then you went to Atlanta with Harris in the fall?
- speaker: Respondent
  text: No, not Harris. It was Ed Lewis. It would have been, I guess, '34, the next summer.
- speaker: Interviewer
  text: The following summer.
- speaker: Respondent
  text: Yes, the following summer. I worked at Howard that year so it was '34.
- speaker: Interviewer
  text: You were just a young guy then, twenty-three, twenty-four years old.
- speaker: Interviewer
  text: A couple years into the New Deal and you had your introduction to the South and the deeper South and to Chicago and
    you're beginning to spread out. Lots of things happening.
- speaker: Respondent
  text: In Washington and in Chicago and in Richmond.
- speaker: Interviewer
  text: Do you by chance remember election day in 1932?
- speaker: Respondent
  text: Yes, I was in Chicago.
- speaker: Interviewer
  text: You would have been there in November '32.
- speaker: Respondent
  text: I remember Roosevelt.
- speaker: Interviewer
  text: Did you have any sense that this was a sea change for America and for blacks in particular?
- speaker: Respondent
  text: Oh, yes. I think, again, it was sea change in the sense that one had this sense and in some ways the realization,
    expectation that something important is happening. Of course, the cue comes with the fact that Roosevelt was able to pick
    other coalitions at which those blacks who could vote and could express themselves politically really sought to move away
    from the legacy of the Republican party. That was important. I think it was also important that things were happening.
    We had a Depression, people were out of work, ‘Buddy, can you spare a dime?’ Blacks and whites were feeling the pinch
    and so on. Roosevelt had a presence and an aura, an aura about him, which said, ‘happy days are here again.' I think,
    for me at least, again you are talking about youngsters. When you are young, I don't remember personally any hardship.
- speaker: Interviewer
  text: But they didn't impinge upon you.
- speaker: Respondent
  text: In that sense of depressing me or...
- speaker: Interviewer
  text: Your family was in Washington?
- speaker: Respondent
  text: At that time both my mother and father were dead.
- speaker: Interviewer
  text: By then they were?
- speaker: Interviewer
  text: You were on your own?
- speaker: Respondent
  text: More or less. One of the problems that we are going to have is that you mention something and it triggers something
    else.
- speaker: Interviewer
  text: By the time you got out of Virginia Union you were on your own. You were pretty much...
- speaker: Respondent
  text: Well, on my own in a sense, I think the longer you live, especially as a kid, you think you are on your own. But in
    retrospect you know how damn lucky you are because there has to be somebody there. I didn't have any fear or compunction
    about venturing whether it's professional or personal. A lot of that relates to me, myself, personally what kinds of things
    develops... You were asking about the Depression and the... Again, I was very fortunate because I knew what the Depression
    was in the Chicago context. I knew what it meant to be related to people who went to put people back in the houses after
    they had been evicted. I knew what was happening with the communist and the would-be communist. I knew about the labor
    situation. Also, I was in Washington where I was at Howard.
- speaker: Interviewer
  text: You went to Howard in '34?
- speaker: Respondent
  text: No, I went to Howard in '33. I went there in the
