source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Respondent
  text: I finished high school in 1931 right here in Ackerman, you see. There were not but twenty-four of us in the graduating
    class. Of course, the Depression, the Great Depression. . . .
- speaker: Interviewer
  text: Was right on you.
- speaker: Respondent
  text: It was on us, but it set in, you know, on Black Thursday, or whatever day it was, in November of '29. The fallout
    didn't really get down here until 1930-31, and by '32 it was absolutely critical. So I grew up here and finished high
    school here under what you might correctly call the "old regime." Segregation was so ironclad, if you want to put it that
    way. Of course, segregation, in the first place, is a misnomer—there was a heck of a lot of non-segregation—but it was
    so completely accepted, at least, almost by the black people as much as the whites. It wasn't even much of an issue. There
    was no turmoil. There was no uproar. Of course, we had the separate systems of schools, and you had the separate social
    taboos, and yet you worked right along in the field with them or at the sawmill or in the woods. Had no industrial development,
    you understand, so it was purely an agrarian society, and that has its points. The only thing, it couldn't be maintained
    as such, sheer economics, especially after World War II. You'd have an occasional politician who'd try to make hay out
    of it, particularly folks like Theodore G. Bilbo, for example. If you'll go back and study his real record and so forth,
    he didn't get rabid on the subject until on up when it was getting ready to boil.
- speaker: Interviewer
  text: Matter of fact, he was a pretty strong New Dealer when Roosevelt first came in, wasn't he?
- speaker: Respondent
  text: Oh yeah, he darn sure was. Well, of course, along came 1932 and I was a freshman at Ole Miss. I well remember election
    night, November 8, 1932. I remember it rained all day that day. We didn't have anything in the dormitory to find out what
    had happened about the election, except somebody had a little old radio—it probably cost five dollars maybe—and we all
    gathered around it and listened to the returns. Of course, it wasn't long until it was well known that Roosevelt had beat
    Herbert Hoover.
- speaker: Interviewer
  text: Was this in the dorm or in the fraternity house?
- speaker: Respondent
  text: The dorm. I didn't have any money to be in a fraternity.
- speaker: Interviewer
  text: You were a freshman?
- speaker: Respondent
  text: That's right. Well, I'll go back now. I'm going to take you back in time just a minute to 1928. 1928, of course, was
    the famous campaign between Al Smith and Herbert Hoover. I was fourteen years old. Our next door neighbor, Mr. Boyd Robinson,
    not having a big family to support and so forth, he had more ready money, and he had an Atwater-Kent radio. I heard every
    speech that was made in that campaign by Al Smith and Herbert Hoover in Boston or San Francisco or Oklahoma City or wherever.
    I was a very rabid Al Smith man although I wasn't but fourteen years old. Well, of course, Hoover just beat the cush out
    of him. Had a great uproar here in Mississippi over the wet and dry issue in 1928. I don't think Hoover got in 1928. I
    haven't looked at the figures in a long time. But a lot of people, they called it, "bolted the ticket." We had two counties
    in Mississippi that went Republican.
- speaker: Interviewer
  text: First time ever, I would think.
- speaker: Respondent
  text: Yeah, one of them was Forrest County down here at Hattiesburg and I've forgotten what the other was. So the campaign
    of 1932 was pretty well foreshadowed by what had happened in 1928. The thing that always stuck in my mind was that in
    1928 there were two prominent United States senators who bolted the ticket and refused to vote for Al Smith, not only
    because he was a wet, but because he was a Catholic and other things. One of them was old Senator Heflins of Alabama and
    one of them was Senator Simmons in North Carolina who'd been the undisputed boss of North Carolina. He named governors
    just like I'd hire somebody to go to the field for me. And they both got beat in the 1930 election. See, revulsion had
    set in.
- speaker: Interviewer
  text: What was Simmons' first name?
- speaker: Respondent
  text: Furnifold M. Simmons. He had been governor of North Carolina before 1900, and the boss of the state ever after. Until
    he made that mistake politically. When Bilbo became United States senator in 1935, elected in '34, I was working in Washington
    as secretary to the congressman from this district, who lived here in Ackerman, Mr. Ford. He'd been elected, too, in '34.
    So I left law school at Ole Miss and went up there with him. In fact, I'd helped him every campaign but he used to sit
    around and listen to Bilbo talk. Bilbo was a real genius in some respects and totally unbalanced in others. I remember
    he said, "Three things don't ever, ever do. Never bolt the party. Never bolt the ticket. Never become involved in a schoolhouse
    dispute." [Laughter] I've forgotten what the third one was. Anyway, '32, of course, Roosevelt was nominated, but not on
    the first ballot. I well remember, Mississippi was split wide open. Governor Conner, who's probably the best governor
    the state's had in the 20th century—I say that most sincerely—for some reason he just wasn't for Franklin D. Roosevelt.
    Pat Harrison was. The Mississippi delegation was under the union rule, and they were just about equally divided. Mississippi
    was just getting ready to vote for Baker for the nomination, and Pat Harrison, who was in his hotel room, they said, put
    his clothes on in the taxi going to break the tie. What I'm saying to you is that as I recall it, and my grandfather,
    my mother's father, he was keenly interested in politics. That's all he talked about. Politics was just as red hot and
    interesting and explosive back then as they've ever been since. There's one difference. People back then would tell you
    who they were for and how they stood and why they were, and have a fist fight about it over here on Front Street, too.
    Nobody's bothered that much anymore, of course. [Laughter] Well, my impression of the time up until World War II was that
    the white people and the black people got along real well on an individual basis, except once and a while there would
    be an inflammatory rape or something else. I was always so ashamed of Mississippi's record on lynchings, and I hoped while
    I was governor to see if I could put through one four years without Mississippi having a lynching, and dern, if we didn't
    have one in a matter that I didn't know anything about until after it was over with, but that's a different story. The
    thing that started the pot to boiling was absolutely World War II, when everything mixed the troops and all that sort
    of thing. 'Course, there had been shadows of things to come. You had the Oklahoma College decisions right after World
    War II. It was Oklahoma and. . . .
- speaker: Interviewer
  text: Missouri was another.
- speaker: Respondent
  text: Missouri, that's right. Yes sir, somebody ex rel. Gaines vs. Missouri, and the other was Sipuel vs. Oklahoma, as I
    remember. [Pause] I have to admit that I think on the facts and on the evidence, that here was Mississippi, the poorest
    state in the Union economically, on economic figures, and one of the richest, as far as I'm concerned, in many, many other
    values of life that were so important then, and as far as I'm concerned, still are important. Trying to maintain two school
    systems. Barely able to maintain one, see. [Pause]
- speaker: Interviewer
  text: When it really couldn't afford one. Always struck me as an ironic thing.
- speaker: Respondent
  text: And of course, we had the separate but equal, but we didn't live up to the equal. The main reason being we were not
    economically able to do so. Couldn't afford it. Even then we were, at least I was and a lot of other people—and of course
    I was twenty-one years old in 1935—we didn't feel good about that kind of situation. The thinking people knew that they
    were not being treated right and all that. Of course, way back before then, forty years before then, you had Jim Vardaman
    and his dogma that if you educated the black man, you ruined him, you know, and so forth. But as I look back on it, it's
    just sort of like going from a period of very clear weather over quite a number of years, but with no remedies being advanced
    to take care of the situation. So all of a sudden, the cyclone came up and nobody had any storm cellar. Of course, I remember,
    you know, all about the school desegregation cases. I was Attorney General of Mississippi at that time.
- speaker: Interviewer
  text: What years were those that you served in that. . .?
- speaker: Respondent
  text: From 1950 'til '56. You know, your segregation cases were Prince Edward County, Virginia, and Clarendon County, South
    Carolina, and Topeka, Kansas.
- speaker: Interviewer
  text: Washington, D.C.
- speaker: Respondent
  text: Which is a different legal question on the national scene.
- speaker: Interviewer
  text: There was one more.
- speaker: Respondent
  text: Let's see. Anyway, they got up a grave uproar, but I went to Washington, and I sat in the Supreme Court of the United
    States. I was a member of the bar of the Supreme Court. I heard all those arguments, the ones they had while Vinson was
    still the chief. You know about his being found dead on the floor, and then Warren was appointed and so forth. Then they
    re-argued them and I went back and heard those. However, all the southern states, most of them, they joined in an amicus
    curiae brief supporting South Carolina and Virginia. I refused to sign it. I refused to participate in it. My position
    was that the problem had not yet arisen in Mississippi, and there wasn't anything to be gained by rushing forward to become
    embroiled in a problem that might be many years away. At least we'd have more time to think and to plan and to provide.
    Well, I well remember the day, May 17th, '54, when the decision came down. When people have been told by the Supreme Court
    of the United States, that's it all right as long as you treat them equally, as they had back there in Plessy against
    Ferguson, later on in Gum Long against Rice. That was a Mississippi case. With men like Holmes and Brandeis and all those
    supposed liberals sitting on the court at the time, unanimous decisions. They held that Mississippi could exclude a Chinaman
    from going to school with white students. That was in '28 or close to it. So then to have it just turned abruptly and
    absolutely around, and naturally that was going to foment a lot of trouble. What a lot of people overlook is that, of
    course, the federal courts in that situation were sitting as a court of equity to redress and remedy constitutional deprivation.
    Even the Supreme Court itself, to start off with, deferred any implementation [of Brown] for a year. Came back and had
    arguments on that a year later. I heard those as well. There wasn't a suit filed against Mississippi until after I left
    office as governor. Of course, we then got us a governor named Ross Barnett who kept throwing a match to every gasoline
    barrel he could find until we had a magnificent explosion. I found, at that time—and I would go around and make speeches
    to the black school events and things like that—I found that, course, the black people ordinarily are very gentle, easy
    to get along with, and non-violent people. 'Course, all the violent ones, they get the publicity, and they sound like
