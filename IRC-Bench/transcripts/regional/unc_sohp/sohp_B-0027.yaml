collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: 'What I''d like to do first is try to get your mind back on those events, as I understand them. Now I just read an
    explanation of the Albany thing, and I jotted down a list of events. And you tell me if this is basically how you remember
    it: that in September of 1961 SNCC sent a team to Albany to register black voters. On November 1, in response to the freedom
    rides, the Interstate Commerce Commission has a ruling that all train and bus facilities used for interstate commerce
    are to be desegregated. Almost on that same day, I gather, the first test takes place when two SNCC workers ride from
    Atlanta to Albany, and the police (including you, I gather) are waiting at the station. And they avoid the test at that
    time; somehow or another they slip away and run down a street or something. You don''t remember that at all?'
- speaker: Respondent
  text: That didn't happen.
- speaker: Respondent
  text: No. December 16, 1960 or '61 . . .
- speaker: Interviewer
  text: '''61, right.'
- speaker: Respondent
  text: Now, the Albany movement started prior to that, which was made up of Dr. W. G. Anderson and local blacks. And they
    had started trying to deal with the city council; they wouldn't talk with them at that time, you know. So Dr. Anderson
    (well, he's a real close personal friend of mine), the Tates and Manly Tates, Tennessee B. King, Slater King, his brother,
    all of them started what they called (it was a loose-knit organization at that time) the Albany Movement. Then Charles
    Sherrard and some others (I forget), they was with SNCC; they came in. Bonnie Bevonovich—her father was a well-known attorney
    in New York; I think he handled the Cuban affair—and some other students from Colorado, they came in and joined Sherrard
    and Jones. And then December 16—they were pushing for fuller restoration, that's what they were—1961 . . . And we had
    prior knowledge to this, and we knew that they were going to make Albany a vocal point for some reason. And we'd been
    training for it and getting ready for whatever. On December 16 they came in on the train; and there wasn't two, there
    was a group of them. And the population had found out about it; they were all down at the train station.
- speaker: Interviewer
  text: 'Yes. Now he''s got that listed, yes, as December 10, 1961: "eight SNCC workers, black and white, took Central Georgia
    Railroad from Atlanta to Albany."'
- speaker: Respondent
  text: It was somewhere around there. It might have been the trial that was on December 16; but somewhere along there . .
    .
- speaker: Interviewer
  text: '"Sat together in a white car. Then several hundred Albany blacks gathered at the Union Railway Terminal to meet them.
    They got off the train, went to the white waiting station and sat down. Chief Pritchett told them to get out. They did,
    and went to the waiting room." Then he says this about you. He says, "As they were going into the waiting room Chief Pritchett
    said, ‘I told you to get off the streets. You are all under arrest.’"'
- speaker: Interviewer
  text: And later he quotes your version to the press. "I told the demonstrators to move away from the terminal three times.
    Then we called the paddy wagon, and I gave the order to arrest them. We will not stand for these trouble-makers coming
    into our city for the sole purpose of disturbing the peace and quiet in the city of Albany."
- speaker: Respondent
  text: Now that is right. I made that statement. But the arrest resulted from the fact that when they came in, as I say,
    there was a large group of whites and a large group of blacks in there. And the people who were coming in to pick up passengers
    and things of this nature couldn't get to the terminal, because they just went into the streets, you know. And we had
    asked them to disperse out of the streets and onto the sidewalks and the parking lot so that the people could get into
    taxis and all this business, to pick up passengers. And they refused to do it. And the local blacks moved back; but these
    people refused to move, and they were arrested. And that's basically what happened.
- speaker: Interviewer
  text: Now, when you say that you had trained for it, you knew that they were going to make Albany a focal point, what kind
    of training do you remember you had at that time?
- speaker: Respondent
  text: 'Well, as you remember, we had information that Dr. King was coming into the Albany Movement with the Southern Christian
    Leadership. And you know his philosophy was non-violence. So we were going on the same philosophy as that. My men would
    train on non-violence: not that we had police dogs; they were deactivated. The men were instructed that if they were spit
    upon, cussed, abused in any way of that nature, that they were not to take their billyclubs out. And they would act in
    a non-violent approach in that. And this is what they did; you know, there was no bloodshed. It went on from ''61 to ''64,
    I think June or July of ''64. There was never any violence on the part of over-reaction of the police. We arrested Dr.
    King twice, I think. We arrested some twenty-four hundred people. There was never any violence on our part. In talking
    to Dr. King (who was a close personal friend of mine) . . . Well, there was Dwight T. Walker, who was with Dr. King at
    that time (he''s a big preacher in New York now), Andrew Young, who was a legislator from Georgia; Dr. Abernathy; all
    those were there. And we were real close friends; you know, we sat and talked a lot about it. Even after he left there,
    I went to Montgomery and seen him. We corresponded with each other for a long time; still get Christmas cards from his
    wife. But anyway, he said many times that this is what turned them around in Albany. His quote is that, as he stated to
    the and the and and Magazine (all of them that was there), it was non-violent, that there wasn''t any violence. The federal
    troops or marshals couldn''t come in; they couldn''t have accomplished the goal.'
- speaker: Interviewer
  text: 'Yes. OK, let me carry this on a minute here. "December 12: the trial of the eleven." Now who would that have been,
    the eleven people involved in the original arrests, the December 10 arrests? "Over four hundred black students march downtown
    to protest. Police guards with loud speakers order them to disperse." It talks about a fifteen foot alley that ran alongside
    of City Hall, where they were . . .'
- speaker: Respondent
  text: 'Let''s get this into focus, now, because actually what happened: the mayor at that time was Asa Kelly. He was a judge
    in Georgia now, and he was a practicing attorney, Asa Kelly. And unknown to anybody, unknown to me or I don''t guess any
    other city council, he had given permission for these blacks to parade in an orderly fashion in downtown. And they did.
    No one bothered them. The police were there. There were always up in the thousands of whites on one side of the street,
    and the police were in the middle. And they marched. After they come up, you know, the mayor said he had given permission,
    so they did. And he told them they had permission to circle the block twice, and then after that they were to go back.
    And they continued to circle. And then they begin to move off the sidewalk; they were blocking pedestrians. There were
    so many of them that people couldn''t get in or out of the stores on the street. And that''s when we asked them to disperse.
    And I don''t think any was arrested that day. That alley they''re talking about, they called it Freedom Alley. It was
    just an alley between the police headquarters and some other buildings, and they called it Freedom Alley, because that''s
    where most of them ended up. And we would book them, fingerprint them, mug them, put them on buses and ship them out.
    We never did what they intended to do. And King''s philosophy, you know, was on Gandhi on overpower them by mass arrests.
    He knew our jail facilities were limited, and he felt if he brought four hundred people, with four hundred arrests we''d
    have no place to put them. But they''d already bought part of the buses; they were out of business, so the city buses
    brought the buses in. We''d fill them up, send them to Camilla or surrounding cities around Albany, and they would put
    them in their jails and we''d leave personnel there to watch them. So we never had any in ours.'
- speaker: Interviewer
  text: Now who worked out that plan?
- speaker: Interviewer
  text: Of course it was your idea to do it that way.
- speaker: Respondent
  text: Yes, because, like I say, I'd studied the thing. I'd read a lot about King and used his . . . on Gandhi on overpower
    them by mass arrests. He knew our jail facilities were limited, and he felt if he brought four hundred people, with four
    hundred arrests we'd have no place to put them. But they'd already bought part of the buses; they were out of business,
    so the city buses brought the buses in. We'd fill them up, send them to Camilla or surrounding cities around Albany, and
    they would put them in their jails and we'd leave personnel there to watch them. So we never had any in ours.
- speaker: Interviewer
  text: Well now, that had to be worked out with who, with the governor?
- speaker: Respondent
  text: No, it was worked out with the local people, and the sheriffs in the surrounding cities, police chiefs in the surrounding
    cities, the commissioners and local government. And they said, "Look, you're fighting our battle. We know if Albany falls
    all of us fall, so we're with you." And they didn't charge us for upkeep or anything. We'd have been about sixty miles
    from Atlanta, the last place we could have kept them. And like I say, we'd have twenty-four hundred.
- speaker: Interviewer
  text: At this time?
- speaker: Respondent
  text: Oh, over a period of time. You know, we had mass marches in '61, from '61 continuously. We'd arrest seven or eight
    hundred people in marches every march they made. I guess at one time we had about fifteen hundred in jail at that time.
- speaker: Interviewer
  text: Did you ever have to get to the seventy-five perimeter?
- speaker: Respondent
  text: 'No, no. And then our bonds were set at two hundred dollars cash and no security bonds; that''s the only way they
    could get out. Then the preachers came in: you know, seventy-five ministers from all over the United States come in, and
    they were arrested. At one time they had, oh, seven or eight hundred thousand dollars down there in escrow; I guess it''s
    still there.'
- speaker: Interviewer
  text: OK. Well then, the trial takes place on the twelfth, and you booked four hundred people or so. On the thirteenth there
    was a prayer meeting with Slayter King, whom he defines as from a distinguished black family in Albany, arrested in a
    prayer meeting where, on the steps of City Hall?
- speaker: Interviewer
  text: He was sentenced to five days for contempt of court.
- speaker: Respondent
  text: That's true.
- speaker: Interviewer
  text: And you say to the press, or are quoted as saying you can't tolerate the NAACP or SNCC or any other Negro organization
    to take over this town with mass demonstrations.
- speaker: Respondent
  text: 'Now that''s what they said. They quoted me as saying that "We would not tolerate the NAACP or SNCC or any other nigger
    organization." And it was misquoted; I did not say "nigger," and I didn''t say anything about the NAACP. I said that they
    should take the right of the NAACP and go to court and not the street. And as a result of not going to the courts we would
    not tolerate them taking over the city of Albany by force or any other intimidation. We would not tolerate it: this is
    what I said, but they took it out of context. That was not the national media; that was the with McGill, you know. You
    know he never did write us up right. The , the and all this, they was right down the middle. But that''s the only one
    that quoted me as saying that we would not let this town be taken over by a bunch of niggers.'
- speaker: Interviewer
  text: Were you conscious at that time of press relations?
- speaker: Interviewer
  text: Were you very careful about your language?
- speaker: Respondent
  text: Sure. You know, the press had been to other places and been intimidated (cameras broken, they were not able to walk
    the streets), and so we had set up that every day, twice a day we'd have news conferences. They'd come to my room at the
    hotel. You know, we were living in the two downtown hotels in Albany; we had commandeered them. All my police officers
    were living in the hotels. We lived in the hotels for months at a time. They'd come to my room at night and we'd sit down
    and talk. But they could go anywhere they wanted to. We kept them alerted as to what was going to happen, because we had
    sources of information. We knew when they were going to march, where they were going to march, what they were going to
    do. Some of the news reporters, Fred Miller from the , and one other one (he's down in Raleigh now with the ) . . .
- speaker: Interviewer
  text: Claude Seaton?
- speaker: Respondent
  text: Yes. He was with the at that time. They'd come and call me. They'd come and say, "Look, chief, they're going to do
    such-and-such." And we had a mutual understanding. I remember one night Dr. King came to my office. It was about five
    o'clock, and my secretary come in with a telegram. I opened it up, and it was from my wife. It was in July; it was our
    anniversary. And I read it, and then Dr. King says, "Did something disturb you, Chief Pritchett?" I said, "Well yes, in
    a way. This telegram's from my wife. It's our anniversary, and I haven't been home in two or three weeks." Dr. King looked
    at me and he says, "All right. You go home tonight, enjoy your anniversary, do anything you want to. There'll be nothing
    happening in this town tonight." And he said, "In the morning we'll take up where we left off." So I said, "Do you mean
    this?" He said, "You have my word." So I got in my truck and went home. We went out to dinner. When we came back to my
    house after we left the Victory Club (a steak house) there was a bunch of cars out in front, and I thought something had
    happened. And it was the news media. This one you just mentioned from Raleigh was standing there, all of them. They'd
    went and got my wife a gift certificate and brought it back to the house to us. And we sat there and had a few drinks
    and talke
