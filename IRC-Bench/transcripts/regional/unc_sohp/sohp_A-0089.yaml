collection: unc_sohp
source_url: https://docsouth.unc.edu/sohp/
turns:
- speaker: Interviewer
  text: The first question that I would like to ask is about the changes in New Orleans politics since 1948, and especially
    in the sense that New Orleans at least had a reputation at the beginning of that period of probably being, more than any
    other southern city, as a city of machine politics. I don't mean that necessarily as a majority phrase. To what extent
    has there been change in New Orleans and what has taken place? What is the situation in so far as the kind of New Orleans
    politics and how it operates?
- speaker: Respondent
  text: I don't know if I am really competent to comment on the period prior to 1960, which was the date that I became actively
    engaged in politics. In any event, with that disclaimer I would then go back, you see, I don't think you can quite measure
    it from '48, you may be able to do so. But you have to put it in the perspective of what New Orleans was before 1946,
    which was sort of a turning point for this city. Prior to 1946, there was a very strong tie between the city administration
    and the state administration. They had sort of dominated the state-city politics. Then, in 1946, Chep Morrison, a thirty-six-year-old
    reform governor, returning war colonel, ran for mayor and was elected, which began sixteen years of what you might say
    was progressive government. I don't mean reform in the sense of . . . in the general sense that it is usually accepted.
    But nonetheless he was a bright, intelligent, aggressive, good politician. I think it was about that time that the racial
    attitudes began to change a little bit. I don't suggest that it was anywhere approaching equality, but I think that a
    definite shift began to take place. It was at that point too, I think, roughly about 1948, if my memory serves correctly,
    and I was quite young at the time, that blacks began to get registered in any numbers at all in the city of New Orleans.
    Prior to that time, while they always had significant numbers of blacks living in the city, there were very few registered
    to vote in the city of New Orleans. As that registration began to build, they became, if not a significant force, they
    nonetheless became a voting group that certainly had extended. So the politics from a racial standpoint became more liberal.
    Morrison in 1948 also, while he was a progressive reform-minded mayor, nonetheless, was an excellent politician. He believed
    very strongly in the ward-precinct system which he had come up through. Not because he came up as a member of that system,
    but nonetheless he had watched it work and he believed in it. He aligned himself with incumbent officeholders; ward leaders
    traditionally had department head jobs, clerks of court, some of the parochial officers. He had an organization known
    as the CCDA, which was his city-based organization. He actively participated in every election, with candidates across
    the board, that kind of machine politics. I would say that that system lasted until Mayor Schiro came into office. The
    first big change, I think, really came in 1962, when Adrian Duplantier, who is now a state senator, and was at that time
    a state senator, ran for mayor. I ran on that ticket also as a councilman-at-large. We lost the election in the runoff
    with the racial issue being the predominant issue. Heretofore you have to bear in mind that although race had been raised
    as an issue, Morrison had won four straight elections with people saying, that were advocates for the blacks. But he hadn't
    gotten elected on the black vote. Chep first got elected when there were virtually no black votes in the city. He got
    elected by white votes and the black registration began to build up and because he was moderate on the subject in terms
    of those days, in terms of perspective of that era, the black vote always was with Chep Morrison. So, he was the incumbent
    and that is the way it lasted for sixteen years. Two years . . . a year prior to the end of his terms, which would have
    been the fifteenth year of this administration, he became Ambassador for the American States, and the city council then
    had to select the mayor from one of the two councilmen at large and they selected Vic Schiro, and he had to run the following
    year. But he was running then as an incumbent, not having been elected now. When Adrian and I ran, Vic Schiro was one
    of the principal opponents and we got to the second primary with him and we had gotten all of the black vote or at least
    a significant portion of the black vote, and he proceeded to say, you know, "Go against the old southern bloc voting."
    That issue was raised in that campaign and we lost. So, we went through the next eight years of the Schiro administration.
    It was sort of a conservative regime. Then I ran and won with maybe ninety-five percent of the black vote.
- speaker: Interviewer
  text: This was what year?
- speaker: Respondent
  text: This was 1970. I won, and politics then changed very radically in this city. Because for the first time a candidate
    openly solicited, met with, discussed black votes in an openly, publicly, televised and a dramatic change in the political
    forces in the city. I think it became evident that no one would ever win an election in this city again based on race,
    and of course, I just ran for reelection again and was elected. There really wasn't a great deal of opposition. I don't
    mean that to be sounding self-serving, but it is just the way the political thing developed, no major candidates qualified.
    I had three opponents, but they really didn't make any great effort at it and weren't terribly serious candidates.
- speaker: Interviewer
  text: Was the Voting Rights Act of 1965 a significant factor in this change? Did that result in a considerable increase
    in stimulating the black vote and black recognition?
- speaker: Respondent
  text: My recollection is that it did, but not as significant as many people thought. As I recall we had about 35,000 registered
    voters, registered black voters out of maybe 210,000 in 1962. But black registration was increasing all the time. I think
    there are about 80,000 now. While a sizable portion of that increase could be attributable to the Voting Rights Act, I
    think much of it is also attributed to the changing state administration. The state administration got more liberal; therefore,
    the registered voters became more liberal and they weren't discouraging blacks from registering. As we got more liberal
    politicians in office, those who were enjoying a certain rapport with the black community and support, there wasn't what
    had been before, a most unified effort to prevent blacks from voting and from registering. But I would have to say that
    it accounted, the Voting Rights Act accounted for a significant change.
- speaker: Interviewer
  text: There were three periods since World War II. The close connection between the state politics and city politics to
    1946, then, in a sense, kind of the Morrison machine politics during the thrust of his administration. Then, a breaking
    away from that, say, since Schiro.
- speaker: Respondent
  text: Well, Mayor Schiro really didn't have the capacity, I don't want to be quoted, but he just didn't have the capacity
    to hold together a machine. He could never elect anybody. He got elected himself very successfully all the time, but each
    election he won each time by a half breath himself. Then the moment he got elected, he then had no power whatsoever to
    elect anyone else in off-elections, even if they were running with him. He somehow would win, almost miraculously in many
    people's view.
- speaker: Interviewer
  text: But did the white political organizations, in a sense, break down during that period?
- speaker: Respondent
  text: The white political organizations, I think, had been weakening all along. The old regulars, in so far as the city
    politics were concerned, were getting weaker and weaker. They were at the strongest during the Maestri years, right before
    Morrison came into office. When Morrison came in he dominated the scene for sixteen years. So, whatever patronage the
    other political organizations had, they would have to get through the state. There were only two predominant political
    organizations in the city, the Old Regulars and the Morrison forces, the CCDA. But, he beat them so badly in the mayorality
    elections, and they had no entree at City Hall, so they existed basically on patronage, and if they didn't have the governor,
    they didn't have anything. Inevitably they ended up with the governor. But I think the economy had as much to do with
    breaking down that system too. At one time political jobs in the South were sought after. In many instances now, the pay
    is not very attractive. Everything was under Civil Service. The pay scale is not as attractive as it is in private enterprise,
    so that we actively solicit employees. We are out in the labor market trying to get the people to come to work for the
    government, advertising. For instance, there was a time, I guess several years ago, we found it virtually impossible to
    hire policemen or firemen. The pay scale was so bad that you just couldn't hire anybody to come to work for the city.
    Contrast that with the early forties, before Civil Service and when the pay was pretty good and the work very light. You
    really had to know a precinct captain or a ward leader to get a job and you did it because you were favorable to the administration.
    So with the improvement, I should say the entrenchment of Civil Service, the economy changing, people getting better education,
    more job opportunities outside of government, he ended up with a gradual breakdown of the political organization and the
    political structure. Today, you know, if you look at the structure here around City Hall, it is just very highly professionalized.
    My feeling was that the old ward system just couldn't work any longer. It isn't that I don't appreciate a good politician,
    it is just that ward leaders had nothing to hold a group together with. He had no jobs, or if he did have jobs, the job
    holders were so independent that commanded very little loyalty.
- speaker: Interviewer
  text: Well, while this was happening in white politics the reverse was happening in . . .
- speaker: Respondent
  text: That is absolutely true. Blacks who had been out of the system then began to get into the system. They got into the
    system in very, very minor numbers prior to our administration. To the best of my knowledge, Chep had no blacks working
    in the administration. When I say he was a moderate, it was more an expression of doing separate but equal. Before, it
    was separate but unequal. During Chep's years, Chep at least tried to build black playgrounds and black swimming pools
    and began to share some of the city's revenues with the blacks. Looking back at that, you know, in the terms of today's
    perspective, you say, "My God, how backward can you be? How conservative can you get?" But that was frankly, a moderate
    position. Most moderate in the entire state by far. I think Chep would have done a great deal more. In other words, I
    think philosophically he was more liberal on the racial issue than his record would indicate simply because he always
    wanted to run for governor, which he did do three times, and knew quite well that one of his major handicaps was that
    he was looked upon as a racial liberal in this state. Well, you can fairly well understand that if you are running against
    a Jimmie Davis kind of statewide candidates who just traditionally ran against blacks. You know, just ran against the
    old southern way of life and against integration. That was the battle cry in this state as it has been in every southern
    state for any successful office seeker.
