turns:
- speaker: Respondent
  text: This little girl that finished at Duke and then worked on the paper downtown about the first year I got there, she
    came out to interview me and she was unusually nervous. She got through with the interview, and the machine hadn't worked
    at all.
- speaker: Interviewer
  text: Well, that has happened to me.
- speaker: Respondent
  text: She hadn't remembered a thing because she was nervous. She later served as my press secretary briefly, so we got along
    fine. But she had to do it all over.
- speaker: Interviewer
  text: Well, I hope that you won't have to do it all . . . I know that you've been interviewed many times, and I was reading
    the transcripts of the interview that you did for the LBJ Library. I assume that was for the . . .
- speaker: Interviewer
  text: And also you've done so much writing about your own career and reminiscing in the rough sketches you had done. I tried
    to organize this interview in a way that you approach some of these things, and at the same time, maybe go over some old
    ground in different ways, from different angles. I thought I would want to start by asking you a little bit about where
    you grew up and what you remember of Laurinburg, North Carolina.
- speaker: Respondent
  text: Well, I grew up in Laurinburg, was born there on Church Street, as a matter of fact. Then I lived there all my life
    until I went away to college and legally lived there, I suppose, until through the war. And I remember everything about
    it. I probably remember every house and everybody in every house.
- speaker: Interviewer
  text: Why was that?
- speaker: Respondent
  text: I just do. I spent so much time there selling Saturday Evening Post and Ladies Home Journal and delivering Postal
    telegraphs, later Western Union telegraphs. So I remember very much about Laurinburg and the people and the then-dusty
    roads and the gradual changes. Of course, Laurinburg has changed dramatically. It was a dusty little farm trading town,
    at least it appeared to me to be dusty always, maybe because I lived on a dirt road. There weren't many paved roads. A
    sleepy little town, for the most part. A town obviously without much opportunity for advancement, typical of most towns
    in this part of the country then, in the 30's. But very great people, a great tough kind of an individual, mostly of Scottish
    heritage, and they all came through the Depression fairly well. It's a town that was financially not dominated but at
    least most of the wealth was in the hands of one family. They owned the bank, they owned most of the farm land, much of
    which they acquired when all the farms went broke during the Hoover depression. They owned the flour mill and the cottonseed
    oil plant and textile mills. But they were a very unusual kind of dominating force, not the "big daddy" type at all. They
    were, and still are in the fourth or fifth generation now, carrying on their businesses in a very modest way. But there
    was that one element financially in the town that was not pervasive but nevertheless was there.
- speaker: Interviewer
  text: What family would this be?
- speaker: Respondent
  text: This would be the McNair family that now has various other names—Evans, Jones, McCoy.
- speaker: Interviewer
  text: What are some of your strongest visual memories from Laurinburg, being that you can . . .
- speaker: Respondent
  text: Well, most of it is childhood memories, the youthful memory of the Roper's Creek where we swam all through the summer
    in spite of the fact that today's standards would not only put it off limits for being polluted but probably build a barbed
    wire fence around it. It went on down below the railroad and through the mill village. It was in a swamp. It was later
    in the WPA days that they dug out all those swamps so they'd drain more rapidly. I suppose that was progress, but the
    swamps are gone. The area of Newton, where I sold vegetables, which meant where most of the black people lived in shacks,
    without indoor toilets, of course, locally called "Nigger Town" as all such places, southern towns, maybe all towns, but
    called Newtown in polite society. And that was a pretty dreadful kind of existence. Even then you could tell that it was
    dreadful although my chief memory of that place was that it was occupied by relatively happy people in appearance, though
    I don't think they could have been all that happy. But I think they had a way of making the best of a very, very bad situation
    and, for the most part, being happy. Now, I've also seen them hungry. I also, at that time, developed a very deep concern
    for people that are left out of the system, though I'm sure it wasn't conscious development of concern. But I never have
    forgotten the plight that they found themselves in and obviously the plight that many are still in today, mostly, as a
    matter of fact, out of the South. Certainly mostly in the cities when it would remind you of some of the places I've seen
    in Chicago and Harlem, the human waste in the streets and in the backyards, in this case, and probably in those cases,
    because there weren't any toilets. The outdoor johns sometimes were not only in disrepair, but I imagine awfully smelly
    places. But the living conditions in that little section were very, very bad. In the 30's everybody else was just keeping
    a stiff upper lip because there weren't many jobs and there wasn't much money. The people in the mill section, which was
    a category better than the Newtown but not much better, company houses again with outdoor toilets. For a good period of
    time, it changed later, both as to outdoor toilets and outdoor water. There wasn't any water running inside the houses.
    Originally there were pumps mid-point in each block, and later spigots when running water was put in. You'd see people
    walking with their bucket to the pump to get a bucket of water that they'd take back home, I suppose, to drink and bathe
    in and cook with or wash dishes . . .
- speaker: Interviewer
  text: This is in the 30's, as late as the 30's?
- speaker: Respondent
  text: Well, certainly the early 30's. I wouldn't want to take an affidavit as to when running water was put in, but I clearly
    remember the pumps. Of course, I also remember into the 20's, so it's somewhere along that period of time.
- speaker: Interviewer
  text: Had the exodus of black people to the North started up in your section of the state in the 20's?
- speaker: Respondent
  text: I wasn't looking at it from the point of view where I could tell whether there was an exodus or not. There were plenty
    left. I suppose I was taking "Rural Sociology" in Chapel Hill before I knew about the exodus. But I remember a great many
    people. I actually remember more white people leaving to go to, as they called it, "De-troit" to get jobs in the automobile
    industry. And I don't remember a great many, but I remember one family of Coopers where one of the brothers went up there,
    then several others went. They seemed to do very well. They certainly had high-paying jobs compared to what they were
    getting working on the farm. This, as a matter of fact, was an old family of Revolutionary ties that just, like so many
    people in the farming business, had fallen on bad days. There was a great deal of mobility among the blacks that was visible,
    but I had the impression mostly they were moving from farm to farm instead of leaving the country entirely, though I really
    wouldn't have had much way to get a feedback on that. I don't know that there was much feedback. They probably went and
    disappeared.
- speaker: Interviewer
  text: Where would you place your family within the Laurinburg hierarchy? What was your house like? What was your . . .
- speaker: Respondent
  text: My family was relatively poor, certainly on the down side of average but, on the other hand, very well respected,
    which was a compensating factor. My father and grandfather had been in the hardware business since the turn of the century,
    which went broke in the late 20's, '29 or so. It was one of the early victims of what was building up to be a depression.
    It was an old-style hardware store, very few of which survived.
- speaker: Interviewer
  text: What was your grandfather's name?
- speaker: Respondent
  text: He came there, incidentally, as a cabinetmaker with the Seaboard Railroad. His father had been killed in the Civil
    War as a relatively young man, and he must have been about ten or eleven years old at the mid-point of the Civil War.
    In any event, he wasn't old enough to be a soldier. His name was James D. Sanford. He never again worked after the store
    failed. He was a fairly old man then. In fact, he died at the age of, as I recall, eighty-five. So he was a fairly old
    man at that time. I would have to check to get my precise figures, but he died when I was in college at the mid-80's.
    My father, then, did various things because there were just not any easy jobs. He worked on WPA for a while and sold insurance
    first, which was a hard game when you're selling insurance for a quarter a week or whatever industrial insurance then
    was. He sold it, obviously, to very low-income people.
- speaker: Interviewer
  text: You say industrial insurance. You mean people who were working in . . .
- speaker: Respondent
  text: Well, that's a type of insurance that insurance people understand. They pay weekly premiums for the most part, or
    they did then. They had a little debit book, and the collector went around and picked up the quarter and probably made
    about $15 a week, which was not starvation wages but close to it. My mother went back to teaching school when I was in
    the fifth grade, which of course, was still in the Depression times—that would have been the early 30's. She'd come from
    Virginia as a schoolteacher from a fairly affluent family in her part of Virginia.
- speaker: Interviewer
  text: What family would that be?
- speaker: Respondent
  text: Well, it was a fairly common name, so you can trace it. Her father was David Terry Martin in Salem. She had taught
    school a great many people that then were young businessmen. My father had taught them all in Sunday school, at least
    those that were Methodists. And so in terms of what I suppose might be called even in Laurinburg "social acceptability"
    wasn't any problem on that side. The trouble is, we didn't have any money to go with it.
- speaker: Interviewer
  text: Did you ever have the feeling of being left out or an outsider in Laurinburg's society as the blacks might have or
    the cotton mill people?
- speaker: Respondent
  text: Not at all except there wasn't much to be in on. In any event, I wasn't outside of whatever it was.
- speaker: Interviewer
  text: What kind of influence did your parents have upon you? Is it possible to assess that?
- speaker: Respondent
  text: I think they had a tremendous amount of influence. You never quite understand it or realize it at the time, but you
    look back at things over the years and there's a lot of luck involved in it too. Every parent wants to be a good influence,
    and sometimes it works out all right and sometimes it doesn't. I suppose if I'd been caught and paid the penalty of everything
    wrong I did, I wouldn't be sitting here talking with you. That's true of almost anybody. But they were strict enough and,
    at the same time, lenient enough to allow us to roam around and do things that probably gave us some sense of initiative.
    I would hesitate before I'd let a twelve-year-old boy buy an automobile, but they let me buy one. Of course, I only paid
