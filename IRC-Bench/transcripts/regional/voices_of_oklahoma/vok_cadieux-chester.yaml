collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Your parents’ names and who they–
- speaker: Respondent
  text: My Father’s name was the same as mine, Chester Edward Cadieux. It’s pronounced Cadieux if you were French, but we’re
    not. And he was born in Chicago and he worked for Bell Oil and Gas here in Tulsa, Oklahoma, and my mother came from Texas.
    She was a secretary at one point in time and I was an only child, so she took a special interest in me, a heck of a mother.
- speaker: Interviewer
  text: So she had a big influence on your life.
- speaker: Respondent
  text: Oh yeah. My mother was a huge influence in my life. She took me and sat me down in Church when I was about two, and
    that’s why we give away money, why we do all these things. Why I support the seminary and–
- speaker: Interviewer
  text: Phillips Seminary you’ve supported, and that all came from her, she was a Godly woman.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: So you probably went to church three times a week?
- speaker: Respondent
  text: No, just once.
- speaker: Interviewer
  text: Okay. Right.
- speaker: Respondent
  text: We didn’t belong to one of those denominations where you had to go three times.
- speaker: Interviewer
  text: Yeah, but it sunk in even just once a week.
- speaker: Respondent
  text: Oh yeah, yeah.
- speaker: Interviewer
  text: Why did your Father come to Tulsa?
- speaker: Respondent
  text: He was in the railroad business in Chicago as a kid. He didn’t have an education. He started with one of the railroads.
    I don’t remember which one. And got into the traffic business and so we were pushing railcars around and keeping track
    of them and so forth for a train company. And he got a job opportunity in Arkansas City, Kansas, to run tank cars, because
    in those days we didn’t have product pipelines and so they ran out in unit trains primarily. So he did that. And then
    that got purchased by Bell Oil and Gas in Tulsa, and he moved to Tulsa. And my Mother was a secretary there, and they
    got married and…
- speaker: Interviewer
  text: And here you are.
- speaker: Respondent
  text: Yeah, and years later here I am.
- speaker: Interviewer
  text: You said your name, you pronounced it, Cadieux, but you’re not French, so where does the name come from? Or what kind
    of name is it–
- speaker: Respondent
  text: They we’re French-Canadian, from ten generations of French-Canadian and my grandparents moved to Chicago not knowing
    each other and they just met in Chicago, which was the place to be in the 1880s. That was a hot spot and there was, you
    know, there’s all sorts of areas that you move to where they spoke French or they spoke, you know, whatever language they
    spoke. And so they met and had a couple of kids in Chicago and grew up there and then when they retired they went back
    to Canada. My grandmother wanted to go to California, but (Laughter.) Granddad wanted to go back in the little town in
    Canada.
- speaker: Respondent
  text: And they ran a grocery store.
- speaker: Interviewer
  text: You’re an only child.
- speaker: Interviewer
  text: Where did you go to elementary school here in Tulsa?
- speaker: Respondent
  text: I went to Barnard, Wilson and then Central.
- speaker: Interviewer
  text: Central High. So you graduated in?
- speaker: Respondent
  text: The nifty class of ’50.
- speaker: Interviewer
  text: And then you went on to college?
- speaker: Respondent
  text: I went on to OU.
- speaker: Respondent
  text: Yes, I went to ROTC. I was a 2nd Lieutenant and went to flight school and but the Korean War was over and so they
    had too many pilots and so they were asking people if they would like to get out of flight school and do something else,
    cause they had too many pilots. And I had already had a child. I was married and had a child, and so I didn’t want that
    for my career so I got out of that and became and intercept controller.
- speaker: Interviewer
  text: What was that? What did you do?
- speaker: Respondent
  text: That was before you know that’s when bombers were bombers. There weren’t missiles going around, so we were there in
    the business to keep the Russians off our back. And I was in Bartlesville, Oklahoma which is kind of weird, and that wasn’t
    exactly a real strategic location and so what we did is SAC ran against almost every night with jamming and so forth.
    And we would sit at the radarscope and try to figure out where they were and scramble fighters. And the fighters, they
    had radar and so it was–
- speaker: Interviewer
  text: Explain what SAC was.
- speaker: Respondent
  text: Strategic Air Command
- speaker: Interviewer
  text: Right. So this was a practice, they were constantly–
- speaker: Respondent
  text: Constantly practicing–
- speaker: Respondent
  text: Their jamming ability because if you could see them, you could shoot them down.
- speaker: Respondent
  text: But if you couldn’t see them you had a hell of a time. And so SAC people would come and sit in the back of the room
    and see if we could see them and all that sort of thing.
- speaker: Respondent
  text: And they ran one time in the daytime and we shot them all down and we had a hell of a time. (Laughter) Those ol’ pilots
    were World War II guys and they just ate it up. The rest of the time they came at night with their jamming.
- speaker: Interviewer
  text: So you get out of the military of four years?
- speaker: Interviewer
  text: Three years in the military.
- speaker: Respondent
  text: Yes, I worked for Manica Kanzee Printing Company and they did business forms primarily. They did the whole business-printing
    thing but it was mostly special deals because they had technology at that time that you’d enter information and it would
    come down and stamp. It did all your accounting, not just as a computer but it would hit certain things when you put in
    that information that became the accounting base. That was a hot deal for a while.
- speaker: Interviewer
  text: What was your role there?
- speaker: Respondent
  text: I was a salesman.
- speaker: Interviewer
  text: You were an outside salesman to promote this throughout this area and probably the area beyond Tulsa. And then you’re
    probably married by that time?
- speaker: Respondent
  text: I was married yes, ‘cause I had a kid, I had two kids by then.
- speaker: Interviewer
  text: Now, you graduated from OU with a degree in what?
- speaker: Interviewer
  text: Did you do that by chance, by design you chose business? Did you have a seed planted?
- speaker: Respondent
  text: I was going to be an engineer. I was always going to be an engineer. There was a guy that lived next door to us that
    as 6 or 7 years older. And he was my hero and he was always real nice to me. And he was a Navy Pilot in World War II.
    And he came out (of the service) and he was going to go to Oklahoma A&M and be an engineer and be a Sigma Nu. And I was
    going to go to Oklahoma A&M and be an engineer. And I was good in math. I was in the elite kind of math class at Central
    High School which was hard as heck. And about the middle of my senior year I figured out that I was the dumbest kid in
    this class as far as being an engineer was concerned. And I thought well, I should be doing this, so I took a test and
    it was one of these psychological tests and it said I ought to be on sales. Well, Oklahoma A&M, the only kind of business
    classes they had were agricultural business, they didn’t even have business-business. So I went to OU.
- speaker: Interviewer
  text: Oklahoma A&M then became OSU.
- speaker: Interviewer
  text: So then that made sense then.
- speaker: Respondent
  text: So as a default, I became a businessman.
- speaker: Interviewer
  text: Was there a seed planted by your Father?
- speaker: Respondent
  text: Oh sure. Oh sure. Cause my Dad, he ran tank cars on the side. Bell Oil & Gas let him run tank cars in their service.
    And during the Depression when tank cars were going for scrap, he bought them and got them rehabbed and so forth and began
    to run tank cars and he still worked for Bell Oil & Gas. And it was no big deal for them because you had to pay railroad
    companies for the mileage, so he built that and he built a business in St. Louis with a friend of his, and ran tank cars
    out of there. When he passed away, and he passed away just before the first QuikTrip opened, and he loaned me about $5,000
    to get in (to the business) which is worth about $80,000 or $90,000 now. I mean when you say $5,000 that seems like nothing,
    but because he was an entrepreneur.
- speaker: Interviewer
  text: And he probably told you–
- speaker: Respondent
  text: Sure. Growing up, he said, “If you want to make any real money, you need to be in business for yourself.” And I always,
    from Junior High School on, I always wanted to be in business for myself. And you’re never really in business for yourself.
    You’re in business for a whole lot of people. But that’s what I wanted. And being in the Air Force in Bartlesville and
    having all these two neighbors that always worked for the two oil companies there and always got transferred, and always,
    you know. And I thought man I thought I’m going to be in business for myself. But I didn’t know anything and I didn’t
    have any money, so.
- speaker: Interviewer
  text: And you didn’t know what business it was going to be?
- speaker: Interviewer
  text: But then one day you had a chance meeting?
- speaker: Respondent
  text: Well, Burt Holmes and I, you know Burt Holmes started QuikTrip. I mean he had raised some money. He had asked two
    or three other people if they would like to be the President of QuikTrip and work the night shift and you know get started
    and all that sort of thing. All of them had better jobs than I did and they didn’t want to do that and I just jumped on
    it I mean it was like … because I had these rules. I had the rule that it had to be simple, cause I didn’t know anything.
    It had to be low-cost, cause I didn’t have any money. And I didn’t like competition, because if you’re a printing salesman,
    everybody in the world had a printing press in their garage, I mean that’s a dog-eat-dog business. And I didn’t want to
    get into something with real tough competition cause you couldn’t survive. And here comes Burt. Duh.
- speaker: Interviewer
  text: He was also in the insurance business wasn’t he?
- speaker: Respondent
  text: Oh yeah. He worked for his Dad and then later was in the insurance business and as time went on he got into all sorts
    of businesses. Burt loves to start businesses. He still, at 77 almost 78 he’s still starting businesses with people.
- speaker: Interviewer
  text: It’s the Holmes Group Insurance that he has.
- speaker: Respondent
  text: Well, he sold out of that a few years ago.
- speaker: Respondent
  text: But he has a little insurance company of his own that’s an actual insurance company.
- speaker: Interviewer
  text: In Dallas, he had watched the 7-11 Stores there?
- speaker: Respondent
  text: Yes he had. And I knew about 7-11 cause my Mother had family down there. But I kept looking at businesses in Tulsa.
    Just driving around doing my sales work. I’d see a junkyard, or I’d see a trash truck. I mean I knew it had to be a really
    down-to-earth cheap business to get into. So when he came with this ready-made deal that was small, but at least it wasn’t
    dirty, (Laughter) I mean you know.
- speaker: Interviewer
  text: And that’s when he said, “You can get in for $5,000.”
- speaker: Respondent
  text: Yeah, yeah and I talked to my Dad and–
- speaker: Respondent
  text: And he thought I was crazy. But he loaned me $5,000 and then like I said, he died. I mean he passed away before we
    got the first store open.
- speaker: Interviewer
  text: Burt had maybe a couple of other guys that put in maybe a few thousand dollars apiece?
- speaker: Respondent
  text: Yeah, we had three people that put in $2,000 apiece, and then Burt put in $5,000 and I put in $5,000 and that was
    $16,000 and that’s what we started with.
- speaker: Interviewer
  text: Now the name QuikTrip–
- speaker: Respondent
  text: He had that.
- speaker: Interviewer
  text: That was his idea.
- speaker: Respondent
  text: He had it and it was with a “K” and not a “Q” and then the sign company guy said we ought to have it so that it balanced,
    and so you couldn’t have a “C” in there and so it was (spelled) Quik, which is okay with me.
- speaker: Interviewer
  text: English teachers were upset with you probably.
- speaker: Respondent
  text: Yeah, everybody for years spelled it right.
- speaker: Interviewer
  text: Did you try to maintain an investment and try to start this business while you were still working at the print shop?
- speaker: Respondent
  text: No, no they fired me because they did business with one of the companies that was doing what I was doing. And they
    heard about it cause we bought some equipment that knew about and they told and he asked me, and I said yes, and he said
    well, you’re fired, so. So then Burt decided that they could pay me and so we were getting a store opened and so they
    paid me and we didn’t starve.
- speaker: Interviewer
  text: So then, to try to get a hang on this, didn’t you work for some grocery stores for nothing?
- speaker: Respondent
  text: Yeah, for the summer.
- speaker: Interviewer
  text: And why did you do that?
- speaker: Respondent
  text: Well just so I could run a cash register and knew about groceries and knew how to order and how to stock and how to,
    you know, it was pretty simple. But I worked all summer in various and sundry grocery stores.
- speaker: Interviewer
  text: They’re asking why would you work for us for free?
- speaker: Respondent
  text: No, cause they knew what I was doing because we had figured out who our wholesaler was going to be and the wholesaler
    just arranged it.
- speaker: Interviewer
  text: So they understood?
- speaker: Respondent
  text: Yeah, I was there to learn the business. I learned how to peel onions and all sorts of important things.
- speaker: Interviewer
  text: Then was there a point where you discovered that grocery stores and convenience stores really have little in common?
- speaker: Respondent
  text: We didn’t understand what we were getting into, absolutely. We stocked it like a grocery store. Which was not atypical
    then because we were filling grocery stores because grocery store hours were short they were 8am – 8pm or they were open
    16 hours a day they weren’t open early, they weren’t open late, and so your fill-in business was kind of what you lived
    on because we kind of really just had groceries. Git-n-Go started just a few weeks before we got our first store opened.
    And when I went to it to see what it first looked like, they had brought a guy from Texas. He knew what he was doing.
    He was the best C-store guy you could imagine. He just talked fast and moved fast and had a feather duster in his back
    pocket and he’d run around and worked all the time and he knew the business. And when I walked into that store I thought,
    “Oh … shoot.” (Laughter) We’ve done everything wrong and we did. We did everything wrong. And that became our company
    motto was “We always do everything wrong the first time.” And we did. We lost money you know and we were on the edge for
    two or three years.
- speaker: Interviewer
  text: Had Git-n-Go been up and running in other parts or in Texas?
