collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So, Bill, would you state your full name, please?
- speaker: Respondent
  text: William Stanley Atherton.
- speaker: Interviewer
  text: Your date of birth?
- speaker: Respondent
  text: I was born April 12, 1933.
- speaker: Interviewer
  text: That makes your present age?
- speaker: Respondent
  text: 88 years old, John.
- speaker: Interviewer
  text: And you’re going strong!
- speaker: Interviewer
  text: In fact, you have deals going today, as a matter of fact. We could be interrupted maybe.
- speaker: Respondent
  text: I hope not.
- speaker: Interviewer
  text: Right. Where are we recording this interview?
- speaker: Respondent
  text: In an office in our building in midtown Tulsa and we’re on the 10th floor.
- speaker: Interviewer
  text: Alright. Where were you born?
- speaker: Respondent
  text: Ponca City, Oklahoma.
- speaker: Interviewer
  text: Alright, let’s talk about your mother. Your mother’s maiden name, where she was born, and that type of thing.
- speaker: Respondent
  text: My mother’s maiden name was Frances Conine. She was actually born in Stilwell, Oklahoma, but her mother was over there.
    They were from Bentonville. She always said she was born in Bentonville, Arkansas (laughs).
- speaker: Interviewer
  text: What kind of person/personality was she?
- speaker: Respondent
  text: Oh she was wonderful, a very good housewife, a very good mother. She had…everything had to be done just right, you
    know, and we always had dinner and everybody had to be there. You had to have proper manners (laughs). She was a wonderful
    person.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I’ve got two sisters. The 6 years is Lynn and Patty is 12 years younger than me—two sisters.
- speaker: Interviewer
  text: So you talked about your mother…everybody had to have manners. You had meals together then, right?
- speaker: Interviewer
  text: That was important to be together.
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: Your father’s name?
- speaker: Respondent
  text: He was Jess William Atherton. He was also a great, great guy. Everybody respected him and admired him.
- speaker: Interviewer
  text: Where was he born and raised?
- speaker: Respondent
  text: He was born in Caney, Kansas in 1890.
- speaker: Interviewer
  text: What was his personality like, what was he like?
- speaker: Respondent
  text: He was a very…he was one of the type of guys that could do anything, fix anything. People really admired his ability
    to accomplish any item he tried to do. He was an engineer by trade but he did everything from…back then you would call
    it dirt moving. But he was a dirt contractor. He had teams of horses and mules and they would build everything, you know,
    for everybody where they had to move dirt.
- speaker: Interviewer
  text: So he was always looking for ways to make money.
- speaker: Respondent
  text: Correct, yeah. He had various enterprises. He not only had a company called Atherton Grading Company, he had multiple
    interests in real estate, oil and gas, other businesses.
- speaker: Interviewer
  text: Didn’t he even have a business where he cleaned up the oil patch?
- speaker: Respondent
  text: He did because he had the equipment to do it with. So he would go in and when they would build a location for the
    rig, he would build all the necessary roads and everything to get the rig in there. Then after they finished, he would
    come in and clean it up.
- speaker: Interviewer
  text: He opened a laundry service?
- speaker: Respondent
  text: He did. He and his brother when they were very young went to Drumright. That was the big oil boom then around Drumright
    and Cushing. They roughnecked for a while. Of course, those were cable tool rigs back in those days. I think they were
    in their late teens to early 20s and they decided there had to be a better way to make a living, so they put in a cleaning
    establishment and cleaned the roughnecks’ clothes. Back then they had Levis and that was about it, you know. Probably
    10–12 years ago, I went through Drumright and actually saw the old building where he had that cleaners.
- speaker: Interviewer
  text: Did Clark Gable make an appearance there?
- speaker: Respondent
  text: Clark Gable was primarily working around Barnsdall because that was another big discovery. But he did come to Drumright
    and Cushing and worked. Dad was just a roughneck so he cleaned his clothes (laughs).
- speaker: Interviewer
  text: He didn’t know he was going to go on to become a major Hollywood star…
- speaker: Respondent
  text: No they didn’t.
- speaker: Interviewer
  text: I’m getting…maybe the seed was planted for you to always look for ways to make money. That comes from your father.
- speaker: Respondent
  text: And his father…they were both real entrepreneurs, various businesses. They both loved real estate. They both loved
    working outdoors. So I would say it came from my father more than anybody because I worked with him.
- speaker: Interviewer
  text: And was he a pilot?
- speaker: Respondent
  text: He was a pilot, one of the very first in Oklahoma. They founded an airline called Bluebird Airways. They had three
    airplanes. They had a Jenny and two WACOs and they would fly the oil guys from Pawhuska back to Bartlesville or Tulsa.
    Back in those days, to keep a plane flying, you had to be a real good mechanic.
- speaker: Interviewer
  text: I can imagine, right. Also, he was in the development business—the Indian Hills Lake Development?
- speaker: Respondent
  text: John, that was a very unique idea. It was five miles out east on Ponca City on the way to Pawhuska. He had the idea
    of kind of a country club at the time. So he built this lake—a beautiful lake. Back in those days, you didn’t have to
    get any permits or anything so he took his mules and his horses and built the dam—a beautiful dam. In fact, the lake is
    still there today. It was called Indian Hills Lake. Then he sold lots for people to build cabins.
- speaker: Interviewer
  text: And just exactly where is that located?
- speaker: Respondent
  text: Basically it’s on the Arkansas River. If you come out of Ponca City on the way to Pawhuska, it was actually five miles
    out of Ponca City. He had a ranch out there of about…I think it was originally about 20,000 acres. He was able to carve
    out enough for the lake. Later on, he built a house. He built a smaller lake down below the big lake and that’s where
    we lived. He built a house there for us.
- speaker: Interviewer
  text: Wow. So you would have been when that was happening about how old?
- speaker: Respondent
  text: 4, 5, 6. We actually left Ponca City when I was 8 years old in the 3rd grade and moved to Joplin, Missouri.
- speaker: Interviewer
  text: Let’s go back to your grandparents because that leads us to the Oklahoma Land Run. They were in the Land Run of 1893.
    We should point out for history’s sake, the first one was, of course, April 22, 1889. About 50,000 people were involved.
    Then another one in 1892. So then we come to the one with your grandparents. It was the largest land run in U.S. history,
    over 8,000 acres, known as the Cherokee Strip. The land was purchased from the Cherokees. Did you hear stories about that
    and how he accomplished this?
- speaker: Respondent
  text: I did. They were in Caney, Kansas at the time and, of course, everybody wanted to participate in the land run. So
    my grandfather…my dad was born in 1890 and his brother was born in 1893, early in January or February, I think. So he
    was a baby. They made the run and settled close to Stillwater in a little town called Glencoe, Oklahoma.
- speaker: Interviewer
  text: Do you know the mechanics of how that would work, how they would get land? Would they go out there and search for
    it or how did they do that, ahead of time?
- speaker: Respondent
  text: The surveyors had surveyed out 160 acres. There was a post on each one of the 160 acres. In it was the copy of the
    survey describing the property. So when you would find the piece you wanted, you took that survey back to the recording
    agent. I think it was in Perry, Oklahoma, for all that area around Stillwater.
- speaker: Interviewer
  text: It sounds like maybe it was a little more organized than the first land run?
- speaker: Respondent
  text: The third one was much more organized in that respect but it was still a very cumbersome deal, you know, because everybody
    either rode a wagon or they had horses or they were trying to get to the best piece of land as quick as they could.
- speaker: Interviewer
  text: Okay, so there was a chase for the land but he had been able to go out earlier and know where he was going?
- speaker: Respondent
  text: To some degree, not exactly but approximately.
- speaker: Interviewer
  text: Then we should point out, the final big land run was in 1895. So then your grandfather was very enterprising. How
    did he come to have Atherton Moving Company?
- speaker: Respondent
  text: Oh my golly. They homesteaded out by Glencoe. Then they eventually moved into Stillwater and he bought a lot of property
    down on what is Main Street today and built a building. It’s currently 503 and 505 South Main in Stillwater. He bought
    a big truck and they moved people, which was a pretty good business back then. They became known as the only…I remember
    my granddad telling me this…the only furniture company that could move pianos because they had some big dollies and (laughs)
    some strong guys, I guess, working.
- speaker: Interviewer
  text: How fortunate you were to be able to be around your grandfather.
- speaker: Respondent
  text: Well, he died when I was very young, like 3 or 4 years old, maybe 5. I hardly remember a lot of his stories. But then
    the grandmother, she would tell me a lot of the stories.
- speaker: Interviewer
  text: I don’t think we’ve mentioned their names. Let’s give their names.
- speaker: Respondent
  text: His name was James Thomas and her name was Henrietta.
- speaker: Interviewer
  text: Did she live then beyond him. Do you remember her longer?
- speaker: Respondent
  text: Yes I do. He died in 1935-36, somewhere around there I think. So I was 3 or 4 years old. She died, I think, after
    the second world war.
- speaker: Interviewer
  text: Okay, about you, your education. What was the first school you attended, where was that?
- speaker: Respondent
  text: That was in Ponca City and it was McKinley Grade School. I went to the first and second grade there only.
- speaker: Interviewer
  text: And then the first house you remember?
- speaker: Respondent
  text: We lived in Ponca City and then my father built the house out on Indian Hills Lake where I lived.
- speaker: Interviewer
  text: Alright. So by that time, you had electricity and plumbing and all that by living in town?
- speaker: Respondent
  text: We did, yeah. We had electricity out at Indian Hills Lake because back then, everything was a rural electrical deal
    but dad talked them into running electricity because he was going to build all of those cabins around the lake, so we
    were one of the few rural houses that had electricity.
- speaker: Interviewer
  text: You just have to admire him to have that kind of thought—I’m going to build a lake and then I’m going to sell property
    around it (laughs).
- speaker: Respondent
  text: Yeah (laughs). There was great water there so you didn’t have to drill down too far to get good water, you know. And
    then he had electricity which was a big thing.
- speaker: Interviewer
  text: As a child or a teen, things you did for entertainment? Radio—did you listen to radio much?
- speaker: Respondent
  text: We did. That was…you know, there wasn’t any television or anything. Radio was your main source of information and
    amusement.
- speaker: Interviewer
  text: Do you remember some of the radio programs? Fibber McGee & Molly?
- speaker: Respondent
  text: I was just going to say—Fibber McGee and Molly, The Great Guildersleeve (laughs).
- speaker: Interviewer
  text: Amos and Andy.
- speaker: Respondent
  text: Amos and Andy—those kind of programs were very entertaining, you know. You couldn’t wait for them to come on.
- speaker: Interviewer
  text: Right, probably laying on the floor…looking at the radio.
- speaker: Respondent
  text: Oh yeah, looking at the radio…yeah, you couldn’t wait.
- speaker: Interviewer
  text: Those were good days, weren’t they?
- speaker: Respondent
  text: They were good days—simple but good.
- speaker: Interviewer
  text: What was the first car you remember that your parents had, do you remember?
- speaker: Respondent
  text: He had a Hudson Terraplane it was called…beautiful car. It was small. The front seat… and I would sit up where the
    back window was. So it was only a one-seat car.
- speaker: Interviewer
  text: So it was a couple then probably?
- speaker: Respondent
  text: It was a coupe, yeah. But he had trucks, you know. They had a lot of pickup trucks.
- speaker: Interviewer
  text: Would you say then that your family was…you always had money…I don’t know if you were well to do, or how would you
    categorize?
- speaker: Respondent
  text: Medium. Dad kind of made the impression that he had money but he was always scraping around getting things done…yeah.
    I’d say medium, yeah.
- speaker: Interviewer
  text: So the Dust Bowl days come along here because they were from 1930–36, and you would probably remember some of that.
- speaker: Respondent
  text: I do, John. I remember the sky getting so dark as a kid that you couldn’t see the sun. And I remember my mother having
    me wet towels and put them around the window to keep the dust from coming in and under the doors. That’s how dusty it
    was.
- speaker: Interviewer
  text: And I imagine when you go inside, it was hard to keep the dust from coming in your mouth.
- speaker: Respondent
  text: Not inside as much as outside. You just couldn’t really breathe. Inside you were able to block it off some.
- speaker: Respondent
  text: But yeah, you still had that odor, you know, and the smell of the dust when you were inside.
- speaker: Interviewer
  text: Oh there was a smell that came with it?
- speaker: Respondent
  text: Well, heavy…it depends on where the wind was blowing from (laughs), yeah.
- speaker: Interviewer
  text: And so that was your Dust Bowl experience. So then we come to The Depression which started in 1929 and up into the
    late ’30s.
- speaker: Respondent
  text: The late ’30s.
- speaker: Interviewer
  text: Right. How did that affect your family and your father?
- speaker: Respondent
  text: Well that’s what precipitated our move to Joplin. Because dad’s…oil had gone down to you couldn’t even hardly sell
    it. And he had worked for Lou Wentz and E.W. Marland and Skelly and Sinclair and all them, and they quit drilling. They
    quit doing everything. So his grading company…but you still had to feed the horses and the mules but he lost all his good
    employees because he couldn’t pay them. Then the people that he’d sold the cabins to and the lots, they quit paying. So
    basically, he decided that we would leave Oklahoma and go to Missouri because there was talk about the war and Missouri
    was the big lead and zinc company. He figured he’d get into mining so he sold his cattle. He had about 1,000 goats, he
    said (laughs) down there and he sold the goats, sold the ranch. We packed up our pickup truck and moved to Joplin, Missouri,
    when I was in the third grade.
