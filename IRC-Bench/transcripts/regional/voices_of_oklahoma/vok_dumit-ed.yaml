collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Ed, let’s start talking about your family. Do you have any recollection of your grandparents?
- speaker: Respondent
  text: My grandparents were in Syria, where my parents were born and never came to this country. All I know about my mother’s
    father is that he was the keeper of the vineyards in Tripoli, but it’s not the famous Tripoli in Libya. In Arabic, it’s
    Troblos. Oddly enough, nothing much more was told me about mother’s parents. On the other hand, my father was growing
    up at the Presbyterian Mission School in Antioch, Syria, which was at that time partly under the Turks. I suspect that
    my father came to this country when he did because the Turks were about to conscript him into the Turkish Army, which
    of course would be definitely Muslim. My family for generations and generations has been Christian. Dad came to this country
    in 1908 or 1907. Mother came about the same time to join her brother who had come in 1898 to find a better life here.
    I have pictures of my dad’s parents. His father was a minister and teacher. Then Dad also taught in that same mission
    school. He taught in the girl’s school because the sexes were separated. As a result, since he was single he was not allowed
    to have a housekeeper so he became very domestic out of necessity. While Mother, in the meantime had come when she was
    13 years old to this country to be with her brother, and they were immediately going door-to-door selling fancy linens
    out of suitcases. In those days, there were not many shops that carried imported table clothes and handkerchiefs and so
    on. Most of the wealthier people were accustomed to buying from the peddler who came to the door. They did much of that
    in the Great Lakes area because there were so many resort spots there. So, Mother never grew up to learn how to cook or
    do many other domestic things. As a result, when Mother and Dad married he immediately became responsible for the food.
    Mother simply cleaned the house, because they were working from 8:00 in the morning until 6:00 at night six days a week
    at the store that Mother and her brother had set up. I suppose I need to clarify how it is that mother’s maiden name was
    Dumit. mother’s name was Anisa Dumit. There was never any reference to a middle name.
- speaker: Interviewer
  text: That was her maiden name?
- speaker: Respondent
  text: That was her maiden name. That confused people here in Tulsa because mother and her brother, Elias Dumit came to Tulsa
    in 1912 after spending a few years going door-to-door. Immediately when they got here, they joined the First Presbyterian
    Church. My father didn’t arrive on the scene for 12 more years. Everyone then became confused at the church as to who
    my father was because all those first years I was growing up I was sitting on that front pew at First Presbyterian with
    Uncle and Mother. Father, who was the most religious of all, most spiritual, preferred to do his own devotions at home,
    so people at church just assumed that Uncle was my father. It was not a case of cousins marrying. These were two different
    Dumit families, one in Tripoli, the other one in Antioch. They didn’t know each other before they came to this country,
    so they were both legally Dumits and were destined to be together. Their citizenship papers for both of them were in 1908
    or 1907. Since Mother and her brother kept moving across the country and ended up in Butte, Montana, a mining town and
    didn’t get to Tulsa until 1912, this indicates that next year it will be 100 years that my family will have been in Tulsa.
    When Mother and her brother came, the population was about 20,000. Just as at Butte, Montana, Uncle had noted that there
    was a gold rush going on, and that might be a good place to be, he soon decided they didn’t want to live that far north.
    He left Mother, who was only 18 years old at the time to take care of the shop they had set up in Butte while he took
    a train down south. He discovered Tulsa, Oklahoma, wired Mother to close up the shop and come on down to Tulsa, which
    she had probably never heard of because that’s where they were going to settle. Tulsa’s oil boom was the big attraction.
    During the 1920s, they sold oriental rugs to most of the people settling the Maple.
- speaker: Interviewer
  text: Maple Ridge?
- speaker: Respondent
  text: Yeah, that grand neighborhood, while the oilmen were furnishing their homes with oriental rugs. The store that Mother
    and Uncle set up was E & A Dumit for Uncle Elias and Mother Anise’s name. When Dad was invited to come down from Kansas
    City, in 1924, and became the third partner in January of 1924 the name was changed to Dumit’s Rugs and Linens. We, in
    the front half of the store, sold fancy linens from Madeira, Portugal and mostly from China. We also had quite beautiful
    lamps. For some reason, they also carried at that time Kimonas, which were very popular for the ladies as bathrobes. And
    then oil paintings, fancy vases, lots of cloisonné and cinnabar from India and other places in the South Pacific area.
    Then in the back two-thirds of the store was filled with stacks of beautiful oriental rugs. Uncle and my father, Salim,
    would lift the rugs off the pile to the ones that the customers were most interested in, and take them to an open area
    so the customers could examine them more carefully. You had some customers who would look at two or three and immediately
    make a decision, and others who would stay for hours with practically every rug in the store being shown. My father developed
    quite a few muscles and was very good at moving rugs around. Uncle was the front man—his name was Elias. In Arabic, it
    was (El-e-as).
- speaker: Interviewer
  text: Where was Dumit’s Rugs and Linens located in Tulsa?
- speaker: Respondent
  text: That’s a good question because although the family did fairly well in the ’20s, after the depression they never quite
    recovered. The result was they were never able to build a building of their own or have a store in a building that they
    had a financial interest in. So during the 44 years that the store was in existence, from 1912 to 1956, we were in six
    different locations downtown, because every time the landlord would increase the rent the folks would move to another
    location. Their first location in Tulsa was at 4th and Main right on the corner. The Majestic Theatre was right next-door.
    Mother said that there was a hole in the bathroom wall. At times of the day when there were no customers, she could look
    through that hole at the movie being shown in The Majestic. Anyway, they were there for several years, and then moved
    to 414 South Boston, which was directly across the street from the entrance to the Philtower. They were there for something
    like 13 years or more, and then moved the next time there was an increase in rent next door to Jenkins Music Company at
    517 South Main. We were there for nine years. When I was born, they were in the Boston Avenue location, but I remember
    more about being right next door to Jenkins. I could go into the store, and listen to records, and doodle on the piano
    that sort of thing. Well, after nine years there, they moved right straight across the street next door to the Elephant
    Trunk Company. That address, instead of 517 was 516 South Main. We were there for a bunch of years. I wrote a reader’s
    report about that for the Tulsa World several years ago showing each place we had been. We then moved next to Harold’s
    New Stand, which was between 6th and 7th on Main Street. We were always right in that area between 4th and Main and 7th
    and Main, and on Boston just that one time when we were at the Philtower building. From that location by Harold’s, we
    moved to our final location, which was right across the alley east of the Ritz Theatre, at I think it was 12 West Fourth.
    Then in 1956, my uncle was crossing 3rd Street after he, Mother and Dad had taken the bus from downtown. They would’ve
    gotten off the bus at 3rd and Olympia on the way to the new lot swimming pool in the new lot park. Uncle was in his own
    world in his older years. He just started walking across 3rd Street without paying any attention to the traffic. A young
    man whose wife had just gone into labor struck Uncle and he was killed almost instantly. Then it was necessary to sell
    the store to settle the estates of the two principle owners, Mother and Dad and my Uncle. By coincidence, I had just been
    hired in September of 1955 by The University of Tulsa. Uncle’s accident was a month later in October. I was coping with
    a new job at TU, which I was responsible half of my time for running the student-operated noncommercial station KWGS,
    then the other half time teaching courses in broadcasting. If you can imagine what it would be like to go from being a
    radio announcer into a university situation, where you were running a station and teaching courses, and then Uncle’s accident,
    and I had to go downtown frequently toward the end of the day while the going out of business sale was being carried on.
    It took six months from October until, I think April of 1956 before everything had been sold to the bare walls. It was
    sad because no one had been interested in buying the store and keeping it going. So when it was finally sold, I was tremendously
    relieved because then I could concentrate on TU.
- speaker: Interviewer
  text: State your father’s full name and where he was born.
- speaker: Respondent
  text: Dad’s name was Salim Jacob Dumit. Jacob was his father’s name. He was born in Latakia, L-A-T-A-K-I-A. But while he
    was just a few months old, the family moved just a little further away to the big city of Antioch. He grew up in Antioch
    and came to this country when he was 33 years old—I think it was.
- speaker: Interviewer
  text: Did he come with other members of the family?
- speaker: Respondent
  text: Yes, he and his two brothers, Dad was the oldest. The second was Sam Dumit and the third was Hanna Jacob, which in
    this country was John, Hanna is similar to Johanahan or whatever the pronunciation is in German of John—named after John
    the Baptist, I guess. John and his two brothers somehow, and I’ve never gotten a satisfactory explanation of this, went
    all the way from New York to Los Angeles. The three brothers set up a jewelry store there. Then, eventually, they moved
    to Kansas City, Missouri where the family has been for a very long time. I have 25 cousins living in Kansas City. At first,
    in Kansas City, they all three I think were working at a lamp factory, very ornate lamps, some with fringe on them or
    hanging jewels. Then, Uncle decided, that’s Sam, to set up a rug-cleaning establishment, which to this day is still operating
    in Kansas City, Missouri. His son worked with him and then the son’s son and now it’s the son of the son of the son of
    Uncle Sam. It’s thriving in Kansas City. John formed his own church. The whole family was very religious. John set up
    a church that is still in existence in Santa Monica, California. That’s where their headquarters is. He set up followers
    in Kansas City. Then about 1939 or so, his doctor suggested that he move to California because of his asthma. They set
    up the church in Santa Monica. They had other satellite groups in New Mexico and as far up as Canada. When he moved from
    Kansas City, I think something like 40 families moved with him. At home, in my library, I have all the issues of the Truth
    Review, which was a monthly magazine that they published and then several books by my uncle. They believed deeply in healing
    through prayer. Now, the church is operated by Uncle’s daughter and Uncle’s granddaughter and her husband. The husband,
    Reverend Newton, is the minister of the church now. His wife and then my cousin Psyche, P-S-Y-C-H-E and the last name
    that Uncle took was the French version of Dumit, D-O-U-M-E-T-T-E. That branch of the family is Doumette. If we had taken
    that name, I would not have heard my last name being mispronounced every day of our lives because D-U-M-I-T, for some
    reason, strikes the majority of the population as “dumb-it.” Very few people look at it and say, “Dew-mitt.” Now, I just
    laugh about it, but it used to bother me no end.
- speaker: Interviewer
  text: How was it your father came to Tulsa?
- speaker: Respondent
  text: He had somehow made a connection with Uncle Elias. Uncle was accustomed to taking a couple of buying trips a year
    to New York. He would go to the importers there and select the individual rugs or other items that he would have them
    send to Tulsa. Somewhere along the way, they heard about each other. Uncle wanted to have a third partner. I was never
    told this, but I have a sneaking feeling Uncle was also looking for a husband for his sister. As I said, Dad came down
    in January of 1924. Then he and Mother were married in July about six months later.
- speaker: Interviewer
  text: They were married in which church?
- speaker: Respondent
  text: First Presbyterian Church, Mother and Uncle had joined the First Presbyterian Church the first week they got here.
    Our life these 100 years has all been centered around the First Presbyterian Church.
