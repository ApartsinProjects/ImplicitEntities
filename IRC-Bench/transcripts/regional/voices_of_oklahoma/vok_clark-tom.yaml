collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Let's talk about your mother first. Your mother's name, maiden name, where she born, where she came from.
- speaker: Respondent
  text: That's Leota Groh, G-R-O-H. That's a German name from her father who had emigrated over here from Germany, I'd say
    probably in 1907, 1908. He and his wife…
- speaker: Interviewer
  text: Came to Oklahoma?
- speaker: Respondent
  text: Well, they originally went to Missouri and he was a Missouri dirt farmer. Why he moved to Enid, Oklahoma, I do not
    know, but as a young child, I used to go out to his farm. They didn't have a freezer or a refrigerator. They had a box
    - they poured ice into it, so it truly was an icebox. Milk came from cows. I'd go out and watch them milk the cows. It
    wasn't homogenized, so I thought it tasted horrible. When they wanted something to eat that night, they'd go out and chop
    the head off a chicken and we'd have chicken. I watched it one time and I thought I was going to pass out. I guess I can't
    stand the sight of blood. At least I couldn't then so I never did it again. He had some fields he plowed out there and
    had two mules. He'd plow the fields and plant corn or wheat or something. I'm not for sure what he was planting, but these
    are thoughts I remember from 1944, '45, '46, '47. So it was a wonderful experience to be at a true farm and watch him
    work that during that time period.
- speaker: Interviewer
  text: And his name again was?
- speaker: Respondent
  text: Bob Groh. G-R-O-H.
- speaker: Interviewer
  text: So that's your mother's father.
- speaker: Interviewer
  text: Tell us about your mother, then. So then she grew up in Enid.
- speaker: Respondent
  text: When they moved from Missouri to Enid, they were farmers as young children, but once she grew into a lady, she lived
    in Enid and she basically was working at a small companies and selling clothes or something. This was just right before
    World War II, probably 1935, '36, '37, '38. My father met her in Enid when he was working there.
- speaker: Interviewer
  text: Your mother's personality and what was she like?
- speaker: Respondent
  text: She was a beautiful, beautiful woman. Very loving, very kind, very gentle. I'll tell you, my favorite story is when
    I eat chili - if you were over at my house and I said "chili", you'd see me put vinegar in it. Now I use Splenda, but
    I used to put sugar into the chili and people would look at me, "Are you out of your mind? What are you doing?" One of
    my favorite stories of my mother was in some restaurant in Enid, Oklahoma - they're in the Depression now, so the owner
    thought that my mother was putting too much ketchup on her chili, so he forbid her to use anymore ketchup without paying
    for it. My mother was so upset about it that just to make him mad she put sugar and vinegar on it and it really tastes
    very well. Some of my friends in Oklahoma here have used the recipe I have and they've won every single time they've used
    it. So, she was kind of feisty, too. She met my father there. He was working for National Sash and Door Windows, selling
    windows in Enid, Oklahoma.
- speaker: Interviewer
  text: So they met there at that company?
- speaker: Respondent
  text: No, they just met each other in Enid. Through what process, I don't know.
- speaker: Interviewer
  text: So, then, your father's name?
- speaker: Respondent
  text: Thomas Gale Clark. He was born in Scotts City, Kansas, and was raised there until a young man. His grandfather owned
    the movie theater. My grandfather, Thomas Harry Clark, they became farmers. For some reason, they moved from Scotts City,
    Kansas, to Wellington, Kansas, which is a town 30 miles south of Wichita, and there he became a barber. And my father
    - they got there about when they were starting high school - my father played football for Wellington High School and
    I have all of the programs from when he played football and he was all-state and that sort of stuff, and so he got a scholarship
    when he graduated from Wellington to play football for the University of Colorado. One thing very interesting, the person
    he roomed with at Chi Omega was Wizard White who became Supreme Court Justice, and he roomed with Wizard White, who became
    a Supreme Court Justice of the United States of America and they served in a Chi Omega house serving them dinner and keeping
    the house clean. So they did that for two years and then my grandfather came down with - well, they'd had too much iron
    in their blood. I forget what they call it - disease. He got very sick and so he moved back and finished college at Wichita
    University. I think he probably got the thought about airplanes because, as you say, Clyde Cessna and Walter Beech were
    starting to develop airplanes. Beechcraft started in 1932. So here they were just south 30 miles of those towns where
    the aviation would begin. The birth of aviation, you might call it, manufacturing these airplanes in Wichita, Kansas.
- speaker: Respondent
  text: Which is 30 miles north. I always thought that his love of flying came from being so close and I'm sure that he probably
    drove up there and saw the planes and saw them test-flying them and I think that's where his desire for aircraft came
    from while he was taking care of his father just prior to World War II.
- speaker: Interviewer
  text: So, then, how does he get to Oklahoma?
- speaker: Respondent
  text: As the war drew closer and my father saw it coming, he didn't really want to fight on the ground and he saw this aviation
    was taking place so he decided that he wanted to fly, so he went and applied as a cadet to the Army Air Corp, which changed
    in 1941 to the Army Air Force. But he went through that program and he got his wings, the World War II started, the Army
    made him a flight instructor and a PT - well, it's a PT-19, might have been a PT-16, 17, 19 - flew those three different
    airplanes. There was no glass bubble above them, it was an open cockpit. The student sat in the front and the instructor
    sat in the back. Those are pretty famous airplanes and he married my mother about 1938, then I was born in '41, six months
    prior to the war starting. He was in flight instructing and I don't remember any of it because I was so young, but all
    over Texas and Oklahoma, the military was moving to training schools where he would teach. The military moved him around
    and throughout World War II, he was a flight instructor. They let him go - released him - in March of 1945 because the
    war was coming to an end and they didn't want to retrain him to fight overseas. The war was about done. So he left the
    Army Air Corp in March and got a job with Beechcraft. My mother and father, they moved to Wichita, Kansas, myself and
    my sister, who's two years younger than I am, and he mainly was working on the manufacturing line. He was in charge of
    a group of men. He would be kind of the boss of that particular group for putting the wings on or the accessory equipment
    or something's on, so they were manufacturing aircraft. Then the famous stories. Walter Beech, who started Beech Aircraft
    in 1932, came walking through the production line. My dad was a very handsome man. Beech had heard that he had all this
    experience flying from World War II and when he came by, he started talking to him and my dad had this incredible personality.
    He was so impressed with his personality, he asked him, "Would you like to sell airplanes?" And he said, "Oh, I'd love
    to!" And then he said, "Well, what town would you like to go to?" And I think two things influenced his dream and that
    was, one, that he loved football since he had played for Colorado and Wichita, and that year, January 1945, the University
    of Tulsa played in the Orange Bowl - and I'm trying to remember who they beat - some major school, which I still have,
    I can find, but it's not on the top of my mind now, but he was so thrilled by Tulsa winning the Orange Bowl that that
    was just a couple hours' drive from Wellington, so that, "Well, I better go to Tulsa," and secondly, he still wanted to
    kind of be near home, which was Wellington, where all of his family lived as far as sisters and brothers and his mother
    and father, and it was only a couple hours from Tulsa to Wellington, which is 30 miles south of Wichita, and so he picked
    Tulsa, and he could have had Denver, Colorado, get offered any place in the United States, but one thing we were blessed
    with was that the oil business was just being released. Most of the oil that was produced during World War II went to
    - most all of it - went to the military. When the war was over, they allowed the people to go out and the people who drilled
    the oil during that time, the Laughlin Brothers, the Williams Brothers. Their biggest problem was they didn't have a fast
    mode of transportation to get someplace quickly because the oil was spread every place they went to and so, anyway, the
    famous story is my dad drove from Wellington, Kansas, to Tulsa, Oklahoma, on September 1, 1945, spent the night in his
    car because he didn't have any money. He did have a little bit. He borrowed fifty dollars from his father. He stopped
    in Wellington on the way down and borrowed fifty dollars. My grandfather was cutting hair at fifteen cents a head at that
    particular time. And he woke up the next morning (chuckles), went to a service station, brushed his teeth and shaved and
    combed his hair and said, "I'm going to go sell an airplane." He started walking around downtown Tulsa and that, by the
    way, was Labor Day, but for some reason Tulsa didn't celebrate Labor Day on September 2, 1945. I have no idea why. So
    everybody was at work even on Labor Day and he said, "There's got to be somebody and I wonder where they would be," and
    he looked around and he said, "They've got to be in the tallest building here," because that shows they've a lot of money
    or something and it was the Philtower, so he goes over there and he said, "They must be at the top." People that had the
    most money would be at the top of that building, so he got on the elevator and rode to the top of the Philtower, and it
    just so happens that it was Stanolind Oil and Gas, which eventually became Pan American Oil and Gas which was here in
    Tulsa, and then Standard of Indiana bought them out and then Amoco and they were bought out by, really now, ExxonMobil.
    But at that time it was Stanolind Oil and Gas. He went in there and they bought thirteen airplanes.
- speaker: Interviewer
  text: On that visit?
- speaker: Respondent
  text: On that visit. They actually - they had a lease. It really was a lease with an option to purchase. They were so desperate
    for airplanes and that's exactly what they wanted. This was the first time they could now buy civilian airplanes and they
    wanted to get their hands on the first that they could so they could beat the competition to the drilling sites. He couldn't
    have walked into a better deal at a better time. So they signed a deal. He went there with fifty dollars borrowed from
    his dad. By the time he got his money from Beech Aircraft, it was $100,000, which was a fortune. That's a lot of money
    even in today's world. But he's twenty-five years old, so he thought about retiring. Thought about it deeply - he thought,
    "I have enough money to last the rest of my life," and actually if he would have put it in the bank and draw on it, he
    probably would have made more money than being in aviation, but he wanted to be in aviation, so he went out and started
    an office in Hangar Number 5 and started selling airplanes and the oil companies from all over came in and bought airplane
    after airplane after airplane. The finally, by 1947, he'd made enough money and built a very spectacular hangar, which
    was Hangar Number 8 at Tulsa International, which was torn down last year to make room for a clear zone - the east/west
    runway. It's a mandatory clear zone because of what happened in Chicago and Little Rock when planes skid off the runway
    and hit some obstructions, so all of the obstructions have to go, so they bought Hangar 8 from us and they also bought
    Hangar Number 10, which was built in 1928 when the Tulsa International Airport was built. But anyway, he did that and
    was very successful. That was really the start of Tulsair - at that time was called Tulsa Air, Inc. Later on in his career
    he changed the name to Tulsair Beechcraft. And I had the original document from Walter Beechcraft assigning him - by the
    time he got the paperwork, it was December of 1945, giving the distributorship to Tulsa Air, Inc., which was my father's
    company, and that was the birth. The only other aviation at that time was over at Spartan Aviation.
- speaker: Interviewer
  text: Bill Skelly owned Spartan.
- speaker: Respondent
  text: Skelly sold that to the gentleman that…
- speaker: Interviewer
  text: J. Paul Getty.
- speaker: Respondent
  text: J. Paul Getty. That's exactly correct.
- speaker: Interviewer
  text: And then J. Paul Getty operated Spartan.
- speaker: Respondent
  text: Really, to be honest with you, Skelly was mainly flight training. They weren't really selling aircraft as I remember.
    They had a few things that they tried to sell, but they weren't really into airplane sales like Beechcraft was and like
    Cessna was. So far as the first really true aviation there for aircraft sales, maintenance, parts, storage, fuel sales,
    was my dad's company, Tulsa Air, Inc. as it was then.
- speaker: Interviewer
  text: And then Getty kept the plant running at full capacity and subcontracts with major aircraft firms and through most
    of 1945, Spartan workers turned out wings, bomb bay doors, fuselages and other parts for companies like Grumman, Curtis
    Wright, Lockheed, Boeing and Martin. Well, can you imagine the phone call, I suspect, or however your dad told Walter
    Beech, "Hey, I just sold thirteen airplanes."
- speaker: Respondent
  text: It must have been incredible
