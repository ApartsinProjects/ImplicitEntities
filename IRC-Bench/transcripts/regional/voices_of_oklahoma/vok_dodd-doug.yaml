collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So let's talk about your education. Where did you go to grade school?
- speaker: Respondent
  text: I started at Alice Robertson Elementary School in Carbondale on the west side and went there up through the 4th grade,
    I believe. Then we moved across the river, we deserted the west side and bought a new house, and went to John Marshall
    Elementary for my 5th and 6th grade years. Went to junior high school at Orville Wright Junior High School near 45th and
    Peoria, and had always planned to go to Edison. That was the high school. But in the meantime they messed me up and built
    Memorial. Since we lived south of 51st Street, they said, well, you go to Memorial, and I spent a totally miserable sophomore
    year there.
- speaker: Interviewer
  text: Why was it so miserable?
- speaker: Respondent
  text: My story then, and probably still is, that was not part of the wealthy family type deal. You draw those lines whether
    they're true or not, but I didn't have a great number of friends. My future wife was there, same class, but told her later
    that she was a 'soc'. So never had an opportunity.
- speaker: Interviewer
  text: Your wife's name?
- speaker: Respondent
  text: Elaine Elslow. Elaine Elslow Dodd.
- speaker: Interviewer
  text: Then you transferred out of Memorial.
- speaker: Respondent
  text: I did. Transferred to Central High School, the big red TP downtown.
- speaker: Interviewer
  text: You were actually allowed to do that?
- speaker: Respondent
  text: Yes, it was the only high school at the time to which you could transfer. You couldn't transfer from Memorial to Edison
    or Will Rogers or whatever. And the reason that I asked for a transfer was transportation. I said my parents both work
    downtown, they can drive me to school every day, and I was at that time too young to drive. And they bought it. So I finished
    my last two years at Central.
- speaker: Interviewer
  text: You're an only child then, aren't you?
- speaker: Respondent
  text: I'm an only child.
- speaker: Interviewer
  text: Right. All right, so then how was your experience at Central?
- speaker: Respondent
  text: Central was great. I loved that school. Loved the kids. It had a little bit of everybody there. It had really rich
    kids and really poor kids and a lot of kids in the middle. It had all races. At that time it was just Black and white,
    African Americans and Caucasians. Although we had some Native Americans, but you didn't call them that. They were just
    kids. But it was wonderful. I had opportunities. Got into the drama club, sang in the opera club, participated in the
    school musicals and the all-school show, The Daze. Loved it.
- speaker: Interviewer
  text: So you were a performer back then, weren't you?
- speaker: Interviewer
  text: Didn't know you were a singer.
- speaker: Respondent
  text: Yes, I was a singer. I was a member of a barbershop quartet called The Highlights. There were four of us who used
    to practice in the boys' room at Central because it was all marble in there and it had great acoustics.
- speaker: Interviewer
  text: All right, so that was a good experience. What year did you graduate?
- speaker: Interviewer
  text: And then what did you do?
- speaker: Respondent
  text: I went to college. My first semester was at John Brown University in Siloam Springs, Arkansas. I had intended to go
    either to OU or TU, but John Brown offered me a scholarship and my parents thought that was a really good thing because
    I didn't have to pay tuition. So I went there for one semester and found out that they had a broadcasting department,
    and I liked it. At John Brown, as a freshman you don't really major in anything, but I took broadcasting classes. And
    then after one semester, I'd had about as much of Siloam Springs, Arkansas as I could take, so I transferred back to TU
    in January of '68 and finished my undergraduate degree at TU.
- speaker: Interviewer
  text: Broadcast was fascinating to you early on, or did you ever think, want to be on the radio? What were those thoughts?
- speaker: Respondent
  text: Yes. When I graduated from Central, a classmate of mine's brother was an ad salesman for a radio station. You may
    remember the call letters of KOME. He called me one day and said, 'Hey, you want to be an announcer?' The summer of '67.
    And of course, I was just drooling. I said, yeah, that'd be great. The reason he wanted me was because I had a third-class
    license, a third phone, which meant that I could take transmitter readings and all of that business. KOME by that time
    had been a big station decades before, but it was kind of a crummy station. They didn't spin records. Gave station breaks
    live, as we all did, and played tapes or network. We had CBS and ABC, the Arthur Godfrey Show, Don McNeil's Breakfast
    Club out of Chicago, and we played individual 15-minute things like Conservative Viewpoint by Robert Welch. I didn't know
    until decades later that Robert Welch was the head of the John Birch Society. But learned later. But that's what I did
    that summer. It was great. Loved it.
- speaker: Interviewer
  text: So then you had thoughts about, well, this is maybe what I want to do in my career?
- speaker: Respondent
  text: Yes. I thought this is great. I'm not out digging ditches. If it's raining, I'm indoors. I thought it was great. So
    when John Brown had this program, I went with it. And when I went from there to TU, found that TU also had a radio and
    television production program, and that's what I got into.
- speaker: Interviewer
  text: Well, they had KWGS then.
- speaker: Respondent
  text: They did. KWGS - William Grove Skelly of Skelly Oil was the benefactor of that radio station at TU. I think it started
    the year before I was born, 1948.
- speaker: Interviewer
  text: I believe it was the first FM station in Tulsa.
- speaker: Interviewer
  text: So Ed Dumit was a name?
- speaker: Respondent
  text: Ed Dumit was my professor of broadcast studies. Ed Dumit was fantastic. If you knew Ed -
- speaker: Interviewer
  text: We've interviewed him for our series.
- speaker: Respondent
  text: Magnificent guy, and miss him to this day. A class like broadcast announcing - the book was written by Ed Dumut and
    Ben Henneke, who later became president of TU. It had the basics of broadcast announcing, but the real chore in broadcast
    announcing with Ed was you had to be able to pronounce every classical piece in the world and their composers and the
    orchestras. We ran the Texaco Metropolitan Opera broadcast live on Saturdays and the station played nothing but classical
    music. There was no real news, no NPR back then. It was just KWGS, or as we called it, Queegis.
- speaker: Interviewer
  text: So as a student you could participate on that station?
- speaker: Respondent
  text: You had to, yes, and loved it. It was great.
- speaker: Interviewer
  text: Oh, that was part of your curriculum, wasn't it?
- speaker: Respondent
  text: It was part of the class.
- speaker: Interviewer
  text: Right. So further energizing your thinking, I'm gonna do this now. For some they might think, why do I need college?
    I can go out and get a job at a radio station and jump into it right now. That was not the way you thought.
- speaker: Respondent
  text: No. I had been raised, you're gonna go to college.
