collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So okay, in 1929, he came to Tulsa?
- speaker: Respondent
  text: Came to Tulsa. And the main reason there, they were doing well in Bristol, but Louie Grant was the head of Home Federal
    Savings and Loan. Louie had moved from Bristol to Tulsa and they had just kept after Dad to move over here. So finally
    a storefront became available, it was Crews Kelly, at 317 South Main in downtown Tulsa. Crews Kelly there was the father
    of Ira Crews that had Crews Lumber Company, the person to heirs down on I believe it was 2nd Street. I've still got the
    original bill of sale, eighteen thousand dollars is what he paid.
- speaker: Interviewer
  text: So your dad bought it from Crews Kelly?
- speaker: Respondent
  text: Yeah, Crews Kelly was two people and they ran the store. Kelly worked for us a long time after.
- speaker: Interviewer
  text: So Crews is one person?
- speaker: Respondent
  text: Crews and Kelly, those were the two partners in the business that he bought.
- speaker: Interviewer
  text: So they already had a clothing store?
- speaker: Respondent
  text: There was a clothing store there. They weren't doing too well.
- speaker: Interviewer
  text: So your father, his name again was?
- speaker: Respondent
  text: Harry Clarke.
- speaker: Interviewer
  text: So you're Junior?
- speaker: Respondent
  text: Well, I'm really not. Dad was Walter Harry Clarke and I'm Harry Alfred Clarke. Dad didn't like Walter so he went by
    Harry. And so when I came along I didn't like my nickname so I became Harry Junior.
- speaker: Interviewer
  text: So you bought the clothing store, Crews Kelly, and then revitalized the business.
- speaker: Respondent
  text: Yes. He came in and went to work on it and built it, really built the business. Madge, my sister, came into the business
    a little ahead of me. She went to TU and worked in the business. We both grew up in it. Every Saturday I was down in the
    stockroom wiping boxes, helping mark merchandise, so you kind of come by it naturally. Madge was the hardest, the talent
    there and later was my partner and ran the promotional end of the business.
- speaker: Interviewer
  text: And clothes were for all ages?
- speaker: Respondent
  text: Yeah. Well, originally we were Men's, Women's and then we had a Boy's Department. And then in '61, we were having
    a tough time because we didn't have a suburban store. Utica had opened in '51.
- speaker: Interviewer
  text: Utica Square?
- speaker: Respondent
  text: Utica Square, the first group of stores that opened there. And we were not there. And in '61, a furniture store and
    another store were going out of business, King Dickson was the furniture store. He was an early pioneer furniture merchant.
    He always kind of liked me and King called me, and said, "Do you need that store?" And we did. So we got a lease and opened
    in November of '61.
- speaker: Interviewer
  text: In that location?
- speaker: Respondent
  text: In the location we had at Utica Square for all those years. And later we got the corner, which I think was called
    The Sportsman, was a sporting goods store. That's where we put the men's store.
- speaker: Interviewer
  text: Then you had your downtown store?
- speaker: Respondent
  text: Kept the downtown store.
- speaker: Interviewer
  text: And Utica Square?
- speaker: Respondent
  text: Opened Utica Square. Southland was supposed to open in '62, I think, and it didn't. It was '65 before it opened and
    that, of course, was the big store, the main store.
- speaker: Interviewer
  text: So then you had three stores going?
- speaker: Respondent
  text: Three stores.
- speaker: Interviewer
  text: How long were you able to have three stores?
- speaker: Respondent
  text: Well, I see Woodland came along, somewhere along in there we opened the store in Joplin. And then we ended up opening
    up two in Oklahoma City.
- speaker: Interviewer
  text: How many stores did you have at one time?
- speaker: Respondent
  text: Seven. A couple too many. When they built the mall at Joplin we had a chance to get in there. Joplin, at that time,
    was really growing and booming. And then later it hit a slow patch. We had a chance to get out of Joplin and we did.
- speaker: Interviewer
  text: So you had three stores when Woodland Hills came about?
- speaker: Respondent
  text: Yeah. Three stores and going very strong in Tulsa. The downtown was going down but Utica and Southland were both very
    strong. Both did about the same performance in square footage sales. Utica was more Women's than it was Men's, just because
    of the configuration of the store. Southland was really the balance store. Our business was about 65 percent Women's and
    Girl's and 45 percent Men's and Boys.
- speaker: Interviewer
  text: When you went to high school you were the best dressed guy in school, weren't you?
- speaker: Respondent
  text: No. I went to military school.
- speaker: Respondent
  text: Yeah. During the war it looked like we were going to be in there a while so I think Dad and Mom figured that I would
    have a better chance if I had a better military education. Western Military Academy in Alton, Illinois. That's where I
    went to high school.
- speaker: Interviewer
  text: All four years?
- speaker: Respondent
  text: Yeah. Really was up there five years and it paid off well, because what I learned there really helped keep me alive
    in Korea. I missed World War II but spent thirteen months in Korea. It was there I read the "Cease fire" to my command
    July 27, of '53, if I remember right.
- speaker: Interviewer
  text: What was your job?
- speaker: Respondent
  text: I was the second lieutenant. I was the supply platoon leader for the Second Division.
- speaker: Interviewer
  text: You were a commissioned officer because of your high school military age?
- speaker: Respondent
  text: I had a commission out of high school and the Illinois National Guard. But then I spent a year in New York going to
    school, and retail school. Then went over to Stillwater and finished up and was in advanced ROTC. So I had a commission
    coming out of there. And the pattern was, shortly after you'd graduate they'd take you into the service and they would
    send you for four months to school. They sent me to Fort Lee, Virginia. Then they would send you close to home for four
    months, Fort Sill, Oklahoma. And then off to Korea.
- speaker: Interviewer
  text: What year was that?
- speaker: Respondent
  text: I got there in February of '53. And then I think the "Cease fire" was July 27, of that same year. Then I got out of
    there in March of '54, came back into the business. You got a readjustment coming out of that and back in. But Madge was
    there-she was doing the promotion. She wasn't running the promotions yet but she was there. In '57, Dad had a pretty serious
    heart attack, and, ready or not, Madge and I had to pretty much take over.
- speaker: Interviewer
  text: How old would you have been about that time?
- speaker: Respondent
  text: Twenty-eight, I guess.
- speaker: Interviewer
  text: When your father had the heart attack?
- speaker: Respondent
  text: Yeah, yeah. Now he was still there but we kind of picked up the reins along in there.
- speaker: Interviewer
  text: You had the single store downtown?
- speaker: Respondent
  text: Single store downtown.
- speaker: Interviewer
  text: Let's talk about the downtown store for a bit here.
- speaker: Respondent
  text: Oh, yeah, those were the days.
- speaker: Interviewer
  text: Those were good days, weren't they?
- speaker: Respondent
  text: Oh yeah, everything was downtown. John Duncan was still there.
- speaker: Interviewer
  text: What was John Duncan?
- speaker: Respondent
  text: Brown Duncan.
- speaker: Interviewer
  text: Brown Duncan?
- speaker: Respondent
  text: Mrs. Brown, Oklahoma City, that was her relative I think, but he was the partner over here. He ran the store. And
    there was two big department stores, Brown Duncan's and Vandevers. The Vandever brothers were still alive at that time.
    I'd met them but I didn't know them that well.
- speaker: Interviewer
  text: There were five Vandever brothers. They were the department store and Brown Duncan was a department store.
- speaker: Respondent
  text: Two major department stores, yes.
- speaker: Interviewer
  text: And they sold clothes as well?
- speaker: Respondent
  text: Oh yeah, oh yeah, they sold everything.
- speaker: Interviewer
  text: So were they competitors then of yours?
- speaker: Respondent
  text: Oh yeah, they were competitors. Renberg's was right next-door.
- speaker: Interviewer
  text: Right next door to you?
- speaker: Respondent
  text: Yeah, and George was right next-door. I'll tell you, the retail community ran the credit bureau, you know, we competed
    like the dickens for business but we worked together. At one point, Tulsa had its own credit card, had a little blue credit
    card and there were six people, the department stores, Renberg's, Clarke's, Froug's, which was another department store
    right across the street. Mike Froug's and a couple of other stores later joined in. But you could have that credit card
    - this is before the MasterCard and Visa and all that began.
- speaker: Interviewer
  text: Were you then a head of your time, in a way? Were other cities doing -
- speaker: Respondent
  text: Well, it wasn't me, it was just the -
- speaker: Interviewer
  text: No, I meant the community.
- speaker: Respondent
  text: Well, I think most communities did. Tulsa was a very aggressive, progressive community. You know, Tulsa and Dallas
    were considered the two kind of fashion, upscale communities in the Southwest. It was exciting to be a part of.
- speaker: Interviewer
  text: And this was in the '50s and early '60s?
- speaker: Respondent
  text: '''50s, ''60s, well, on up into the ''70s.'
- speaker: Interviewer
  text: What were some of the restaurants downtown? Where would you go for lunch?
- speaker: Respondent
  text: Nelson's Buffeteria. Now at that time it was located down in the Skelly building, down on 3rd Street. And then Frank
    had the Coney Island's on down on 3rd, west of 3rd there.
- speaker: Interviewer
  text: The Greeks.
- speaker: Respondent
  text: Oh the Greeks, yeah, they're down there. When I was younger we had an hour for lunch and you never went to lunch from
    twelve to one because that was when everyone had lunch hour. So you either went to lunch early or went to lunch late.
    We'd go down and get a couple of Coney's and a pop and then we'd go over to Sears, which was a block away, and go down
    to the Tool Department and spend the rest of the lunch hour looking at all the tools and fishing tackle and all like young
    kids will. But Sears was a major factor. I think George Thompson was the head of the Sears at that time. But they were
    all, you know, they were the civic part of the town at that time. The civic stuff was pretty much run by the merchants.
- speaker: Interviewer
  text: You personally were involved in the city.
- speaker: Respondent
  text: Oh yeah. Yeah, I loved it. Madge and I both, Dad believed in that. He was president of the Chamber when he was thirty-five
    years old and kept on a second year at thirty-six. When I came back I got very involved in the Junior Chamber of Commerce.
    Was president in '57. My first project was getting an elephant for the Tulsa Zoo. And Gunda is still there. We talked
    to Leroy Sipes Grocery Store, very fine grocery store, into giving us a thousand dollars worth of groceries and we raffled
    it off. We raised enough money, and I think Hugh Davis was heading the zoo at that time. They went to Florida and brought
    that elephant back.
- speaker: Interviewer
  text: That would have been in?
- speaker: Interviewer
  text: And Gunda the elephant?
- speaker: Respondent
  text: He's still there. I was laughing because they were talking about it had been in the zoo fifty years. And yeah, I remember
    that.
- speaker: Interviewer
  text: Why was the elephant a project?
- speaker: Respondent
  text: Well, the zoo needed an elephant. The Junior Chamber's whole concept was helping young men at that point to develop
    the skills to be civic leaders. We sold fair tickets, was another thing we did to raise money. And we did a Christmas
    Shopping Tour for needy kids. There was twenty-two standing committees. I headed membership for one year. We had over
    eight hundred members and about 150 that were really involved in a state organization. George and I was involved. You
    know, I remember Georgy Boy way back then. I was first governor; he was still in his twenties at that time.
- speaker: Interviewer
  text: What was he doing in his twenties?
- speaker: Respondent
  text: I don't remember what he was doing but he was very involved.
- speaker: Interviewer
  text: Involved in Tulsa?
- speaker: Respondent
  text: State organization, Junior Chamber of Commerce.
- speaker: Respondent
  text: We had a national convention; I went to three of those. And they had state conventions and we were involved in those.
    You'd make friends, well, in fact, the year I was president here, Wendell Ford, who is now the Senator from Kentucky,
    I believe, or has been, I don't know if he still is or not, was the national president. He and I became good friends.
    When he and his wife were here, when he wasn't traveling, well, they were out at the house. We had a little old swimming
    pool. We were kind of their family away from home.
- speaker: Interviewer
  text: So as you were involved then other merchants were involved too?
- speaker: Respondent
  text: They were, they were involved long before I was. You know, I just came in and the credit bureau was run by the merchants.
    Bill Ricent headed that. He had to have someone check the credit out, and so everyone really kind of swapped the credit
    through the credit bureau. And that's where this credit card came up. Then the Christmas Parade was put on by the merchants.
    Downtown Tulsa Unlimited, Bud Loost, that grew out of an effort to save downtown when everything was going suburban. So
    the merchant group was kind of the leaders.
- speaker: Interviewer
  text: Even though you were competing it was never a hostile competition of any sort?
- speaker: Respondent
  text: It was dog eat dog on the day, but it's like most things, there are things you've got to work together on. Mike Froug
    had Froug's Department Store, and that was the third department store, kinda. Right across from us. I think Orin Smelion
    was his son-in-law and he got me involved in United Way. He called me and he was kind of cantankerous, but he and I always
    got along great. He headed the United Way, the retail part of it for a number of years. Then he shoved that off on me
    and I did it and it ended up going through all the chairs. If I've got to pick one thing that I did that I'm most proud
    of - head the United Way drive. You know, the biggest single job in Tulsa. Spend the best part of the year doing it.
- speaker: Interviewer
  text: How much money do you think you were raising back then?
