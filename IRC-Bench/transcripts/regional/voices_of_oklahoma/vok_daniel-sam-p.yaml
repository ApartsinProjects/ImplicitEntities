collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: P stands for what?
- speaker: Interviewer
  text: Were you named after someone?
- speaker: Respondent
  text: Yes, I was named after my father, who is named after Samuel Phillips who is the first Dean of the North Carolina University
    College of Law and was Solicitor General of the United States under Ulysses S. Grant. So, that's my name so P stands for
    Phillips.
- speaker: Interviewer
  text: So, Samuel Phillips would have been your…?
- speaker: Respondent
  text: Great grandfather.
- speaker: Interviewer
  text: Great grandfather and he practiced law and…?
- speaker: Respondent
  text: That's right. And was the dean at the North Carolina College of Law.
- speaker: Interviewer
  text: The pressure was on you, I guess to stay in law then with that kind of lineage, right?
- speaker: Respondent
  text: Well I never really thought about it. I always wanted to be a lawyer.
- speaker: Interviewer
  text: Your date of birth?
- speaker: Respondent
  text: 12/20/1932.
- speaker: Interviewer
  text: December 20th, 1932. That would make you how old today?
- speaker: Respondent
  text: Eighty-four.
- speaker: Interviewer
  text: Since that was dustbowl depression days, did they talk about when you were born, what it was like back then?
- speaker: Respondent
  text: Not really. I was born at home. I know that.
- speaker: Interviewer
  text: Right. You were born at home and where were you born?
- speaker: Respondent
  text: 16th in Carson.
- speaker: Interviewer
  text: Here in Tulsa?
- speaker: Interviewer
  text: 16th in Carson.
- speaker: Respondent
  text: That's correct.
- speaker: Interviewer
  text: There was one hospital here perhaps?
- speaker: Respondent
  text: I don't know. St John's was here. I don't know whether Hillcrest was here then. It was called Morningside Hospital
    when it got started.
- speaker: Interviewer
  text: A lot of people were born at home at that time?
- speaker: Respondent
  text: Yes, they were.
- speaker: Interviewer
  text: And where are we recording this interview right now?
- speaker: Respondent
  text: We're at this corner of 2nd and Boulder in downtown Tulsa. We're in the Williams Tower II.
- speaker: Interviewer
  text: Here in your law firm?
- speaker: Respondent
  text: Doerner, Saunders, Daniel & Anderson.
- speaker: Interviewer
  text: You mentioned your great grandfather whose name was Samuel Field Phillips. Let's go to your grandparents, like your
    grandfather.
- speaker: Respondent
  text: My grandfather on my father's side was RT Daniel. Richard Tevia Daniel.
- speaker: Interviewer
  text: What did he do?
- speaker: Respondent
  text: He was a real estate developer.
- speaker: Interviewer
  text: Was he a builder?
- speaker: Respondent
  text: He built the Tulsa Hotel and the Daniel Building.
- speaker: Interviewer
  text: Where were they located?
- speaker: Respondent
  text: Tulsa Hotel is located at 3rd & Cincinnati. And the Daniel building was located at 3rd & Boston. It was the first
    10-story office building in Oklahoma.
- speaker: Interviewer
  text: Do you have any remembrance of those buildings?
- speaker: Respondent
  text: Oh yes, very much so.
- speaker: Interviewer
  text: Family…you would go there and the hotel?
- speaker: Respondent
  text: I went to my high school prom in the Tulsa Hotel.
- speaker: Interviewer
  text: Built by your grandfather?
- speaker: Respondent
  text: Yeah. The movie Tulsa was made principally inside the Tulsa Hotel with Susan Hayward and Preston Foster?
- speaker: Interviewer
  text: Yes. You don't recall being around when the movie was made or being…standing outside or anything like that?
- speaker: Interviewer
  text: And, of course, both those buildings are gone today. Your mother's name?
- speaker: Respondent
  text: Mary Rumley.
- speaker: Interviewer
  text: Where was she born and raised?
- speaker: Respondent
  text: She was born and raised in Tulsa.
- speaker: Interviewer
  text: What did she do?
- speaker: Respondent
  text: She was what the Tulsa world used to call a club woman.
- speaker: Interviewer
  text: Oh, really? What did that mean?
- speaker: Respondent
  text: Just a society girl. She didn't work for a living.
- speaker: Interviewer
  text: What was her personality like?
- speaker: Respondent
  text: She was charming and beautiful. I remember her well. I was her only child.
- speaker: Interviewer
  text: Your father's name?
- speaker: Respondent
  text: Sam P. Daniel. I was junior until he died.
- speaker: Interviewer
  text: Where did he grow up?
- speaker: Respondent
  text: He grew up in Miami, Florida and Tulsa, Oklahoma.
- speaker: Interviewer
  text: What was he like?
- speaker: Respondent
  text: My main memory of him was he was a disciplinarian in our household. Mother never hit me [laughs] but my father spanked
    me on a regular basis, which was okay.
- speaker: Interviewer
  text: Back then a lot of that kind of discipline and punishment was accepted, wasn't it?
- speaker: Respondent
  text: Oh, very acceptable. The teachers could spank you.
- speaker: Interviewer
  text: Did he use a belt?
- speaker: Respondent
  text: He did. And mother used switches, which she stacked in the corner and all she had to do is look at them. She never
    had to use them.
- speaker: Interviewer
  text: Do you think you were an ornery young boy?
- speaker: Respondent
  text: Well, I was active. You'd have to ask my mother that question because she's the one that really raised me.
- speaker: Interviewer
  text: You've talked about alcoholism and your parents.
- speaker: Respondent
  text: Yes, my parents were both alcoholics.
- speaker: Interviewer
  text: Did that come on as you grew up? When did you sense that something wasn't right?
- speaker: Respondent
  text: Oh, when I was probably in the first or second grade.
- speaker: Interviewer
  text: And what did you notice?
- speaker: Respondent
  text: Well, I noticed mother would lose control of her physical presence. She would fall down a lot and she and my dad would
    argue a lot. It was not a Partridge family environment at my house.
- speaker: Interviewer
  text: Again, how old were you when you noticed all that?
- speaker: Respondent
  text: First grade. I guess I was six or seven.
- speaker: Interviewer
  text: So, you lived with that? Were you with her in public or your father and you would be embarrassed by the way they acted?
- speaker: Respondent
  text: I was very embarrassed by the way my mother acted, because my father acted like so many other men in Tulsa. He'd just
    get drunk and I never paid much attention to it, but back in the '40s and '50s, a woman who was drunk was totally unacceptable.
    I was terribly embarrassed by my mother and very solicitous of her when she was inebriated.
- speaker: Interviewer
  text: Were there school functions that she would go to because you were there?
- speaker: Respondent
  text: No, not school functions so much, but other social events.
- speaker: Interviewer
  text: What effect do you think that it had on you as a young boy?
- speaker: Respondent
  text: I really don't know except that it allowed me to be very independent, because my parents were drunk all the time and
    I got away with murder [chuckles]. To coin a phrase.
- speaker: Interviewer
  text: Right. Did you try to stay away from the house, go to other kid's houses?
- speaker: Respondent
  text: I tried to stay away from Mother and Dad. It upset me very much.
- speaker: Interviewer
  text: You think some of the punishment from your father was because he was drunk and that added to it?
- speaker: Respondent
  text: It had to do with the severity of the punishment, not just the punishment. I probably deserved the punishment.
- speaker: Interviewer
  text: How long did your dad live? How old was he when he died?
- speaker: Respondent
  text: He was 81 when he died.
- speaker: Interviewer
  text: Did he remain an alcoholic till his death?
- speaker: Interviewer
  text: That's pretty remarkable that he lived that long.
- speaker: Respondent
  text: Yes, it is. And alcohol didn't get him, lung cancer got him.
- speaker: Interviewer
  text: Huh? Your mother, how old was she when she died?
- speaker: Respondent
  text: She was very young? 51. She died from an accident.
- speaker: Interviewer
  text: Did alcohol contribute to that?
- speaker: Respondent
  text: Yes, it did.
- speaker: Interviewer
  text: What was the accident?
- speaker: Respondent
  text: She was dressed in a World War II night gown, which was inflammable. They took them all off the market eventually.
    And she had the DTs - the delirium tremens - was shaking and caught her sleeve of this nightgown she had on on the gas
    stove in our house and she went up in flames.
- speaker: Interviewer
  text: You were at home?
- speaker: Respondent
  text: I was living in Tulsa at the time, married with two children. She called me and said, "Sammy, I've had an accident.
    Would you please come over?" And so, I got my car and I drove over. She opened the door and this nightgown had just melted
    black all over her body. I picked her up in my arms, put her in my car and took her Hillcrest burn center. And uh, she
    died about four days later.
- speaker: Interviewer
  text: Wow. Can't imagine all the emotions that went through your mind.
- speaker: Respondent
  text: Oh yeah. I loved my mother dearly. And I was very protective of her.
- speaker: Interviewer
  text: And then to die at so young an age. Certainly, you had a certain attitude or prejudice against alcohol because of
    your parents?
- speaker: Interviewer
  text: I don't know what it did to you. You could drink socially and obviously you didn't have an alcohol problem.
- speaker: Interviewer
  text: Maybe you were sensitive to those who you heard about who were alcoholics, and families, and know what it can do.
    Yet you didn't let this disrupt your life. You were able to move on.
- speaker: Interviewer
  text: You lived in Tulsa for some time, but you lived in Oklahoma City?
- speaker: Respondent
  text: I was living there when Pearl Harbor was bombed. As a matter of fact, I remember listening to the radio driving home
    from church when Roosevelt came over the radio and said that we've been attacked by the Japanese on Sunday, December 7.
    I'll never forget that. In 1941, I was nine years old.
- speaker: Interviewer
  text: Do you remember the adults and any fears or what everybody talked about then after that?
- speaker: Respondent
  text: People talked about the bombing and the surprise attack and the fact that there were Japanese ambassador in the President's
    offices when it happened. The Japanese were trying to figure out a way to dance around the United States embargoes and
    they were attempting to negotiate the possibilities of hostility at the time the Japanese attacked.
- speaker: Interviewer
  text: Did anybody in your family join the war effort?
- speaker: Respondent
  text: No. My father built some houses in East Tulsa for the bomber plant personnel to live. Douglas was the bomber plant
    at the airport in Tulsa and he built FHA housing for workers who worked at the bomber plant and as a result, he received
    a deferment and didn't have to go to war.
- speaker: Interviewer
  text: The building your father built, he would be considered wealthy at that time, wouldn't he?
- speaker: Respondent
  text: I think he was.
- speaker: Interviewer
  text: Why did you move to Oklahoma City?
- speaker: Respondent
  text: My mother's brother, Edgar Romley, was in the oil business and he convinced Dad to move Mother and me and him to Oklahoma
    City to get in the oil business with Uncle Edgar.
- speaker: Interviewer
  text: And that didn't work out?
- speaker: Respondent
  text: That didn't work out.
- speaker: Interviewer
  text: But while you were there, you stayed in the home of a very famous name, Attorney…
- speaker: Respondent
  text: A.P. Murrah, after whom the Murrah Building in Oklahoma City was named.
- speaker: Interviewer
  text: Alfred P. Murrah.
- speaker: Respondent
  text: Alfred P. Murrah.
- speaker: Interviewer
  text: And you stayed at his home? Did he live nearby or what?
- speaker: Respondent
  text: He lived about three houses down from us. Mother and Dad traveled a lot and I spent probably two nights a week in
    his home.
- speaker: Interviewer
  text: Did he have children?
- speaker: Respondent
  text: He had two daughters and a son. His son was my best friend, Paul. Paul's gone now.
- speaker: Interviewer
  text: Talk about Mr. Murrah. What kind of person was he?
- speaker: Respondent
  text: He was the sweetest man I have ever known. Gentle, kind, serious. He was the youngest United States District Judge
    appointed when he was appointed to federal judge. He was in his early 30s. He was a graduate at the University of Oklahoma
    College of Law, had a reputation for being an excellent jurist, and he ended up as Chief Justice of the United States
    Circuit Court of Appeals headquartered in Denver.
- speaker: Interviewer
  text: And then as you've alluded to, it was the Alfred P. Murrah Federal Building which was the target of the Oklahoma City
    bombing…
- speaker: Respondent
  text: That's correct.
- speaker: Interviewer
  text: …at April 19, 1995, which killed 168 people, 19 of whom were children under the age of six. Alfred Murrah's person
    and his profession, did that have an influence on your early life?
- speaker: Respondent
  text: Yes. I wanted to be a lawyer like Judge Murrah. And I told my 2nd grade teacher I wanted to be a lawyer when she was
    asking all the people in the class what they wanted to do. I remember her name. Her name is Mrs. Pope. She asked the same
    question you asked me. Why did I want to be a lawyer? And I said because I wanted to be like Judge Murrah. I loved that
    man.
- speaker: Interviewer
  text: About the April 19th, 1995 bombing, how did you hear about it? And what were your feelings knowing that the Alfred
    P. Murrah Federal Building had been targeted?
- speaker: Respondent
  text: Well, I was shocked.
- speaker: Interviewer
  text: Did you go over there and see?
- speaker: Respondent
  text: No, I didn't. I had seen Judge Murrah periodically over the years on a fairly regular basis. When I went to Oklahoma
    City, I always visited him in the Federal Building.
- speaker: Interviewer
  text: When he died - his funeral - were you able to attend?
- speaker: Respondent
  text: No, I was not able to attend. As a matter of fact, I recall I had a court appearance that day.
- speaker: Interviewer
  text: So you lived in Oklahoma City until…
- speaker: Respondent
  text: 1942. We moved to Miami, Florida in 1942. Early '42.
- speaker: Interviewer
  text: And why to Miami?
- speaker: Respondent
  text: Because my grandfather on my father's side, R.T. Daniel, had had a stroke and was living in a two-story hotel upstairs
    in downtown Miami with full-time help. He'd had a serious stroke. He couldn't talk, couldn't walk. He was about 84 years
    old. We moved down there for Mother and Dad to take care of him.
- speaker: Interviewer
  text: How long did you stay in Miami?
- speaker: Respondent
  text: A couple of years.
- speaker: Interviewer
  text: Then, you decided to come back to Tulsa?
- speaker: Respondent
  text: I didn't decide. Mother and Dad decided.
- speaker: Interviewer
  text: Right. What elementary school did you attend then, when you came back?
- speaker: Respondent
  text: I went to Elliot for a year and then went to Lee school until I graduated from grade school.
- speaker: Interviewer
  text: Then, you went on to junior high?
- speaker: Respondent
  text: Junior high at Cascia Hall and high school at Cascia Hall.
- speaker: Interviewer
  text: And high school as well? Why did you attend the Catholic schools?
- speaker: Respondent
  text: Cascia Hall was an excellent prep school. My mother had a number of Catholic friends. She became familiar with Cascia
    Hall and she wanted me to go there. I didn't care one way or the other.
- speaker: Interviewer
  text: Because you weren't Catholic?
- speaker: Respondent
  text: No, I was a Methodist.
- speaker: Interviewer
  text: Methodist? Okay. You graduated from Cascia Hall High School in what year?
- speaker: Interviewer
  text: So a little bit about that experience, were you a good student, an active student?
- speaker: Respondent
  text: I was an active student. I was not the top student in my class at all, but I made good grades.
- speaker: Interviewer
  text: Do you recall the music, the dances, where you hung out when you were a high school student back then?
- speaker: Respondent
  text: The Quaker Drug Store. That was the place where all the kids went. It had a jukebox. You could sit at the counter.
    He had chocolate ice cream, sodas, and malts, and dance at the end of the room. Remember that song, Put Another Nickel
    In in the Nickelodeon?
- speaker: Interviewer
  text: The name of the drugstore was, again?
