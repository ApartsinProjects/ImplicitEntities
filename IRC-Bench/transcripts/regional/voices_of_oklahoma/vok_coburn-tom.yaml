collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Casper, Wyoming.
- speaker: Interviewer
  text: Your mother's name?
- speaker: Respondent
  text: Her maiden name? Anita Joy Allen.
- speaker: Interviewer
  text: Where did she grow up and describe her personality for me.
- speaker: Respondent
  text: Oh, neat lady. She grew up in a small farming town in mid-central Oklahoma, Drummond, outside of Enid. Her parents
    ran a café. Her father was a World War I hero. Got the French Croix de Guerre. But had a difficult childhood because of
    alcohol. But nevertheless, grew up, met my dad. My dad was an errand boy for American Optical.
- speaker: Interviewer
  text: And your father's name?
- speaker: Respondent
  text: Went by Bill Coburn, O. W. Coburn. He started working when he was eleven years of age because of family needs. And
    met my mother, I think, at Crestor.
- speaker: Interviewer
  text: Your father's personality, what kind of personality?
- speaker: Respondent
  text: He was outgoing, aggressive, go-getter, hard worker, taught us all how to work in our family. He had to, he had three
    siblings and a mother to support.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I had two brothers and a sister, one has since passed.
- speaker: Interviewer
  text: Where are you in the birth order?
- speaker: Interviewer
  text: Your mother again, she was a nurturing type of woman, I -
- speaker: Respondent
  text: Oh, yeah, great woman. Lived until she was eighty-nine, just died four or five years ago.
- speaker: Interviewer
  text: Your father then again, he was an optician?
- speaker: Respondent
  text: No, what he was, was a wholesale laboratory operator, but he started out as an errand boy for American Optical. Got
    a job with Tom Brown Optical, and then got a job with some other people, Bausch & Lomb, and American Optical. And he was
    in Casper working with a guy by the name of Jack Lamb in an independent wholesale laboratory up there. That's why I was
    born in Casper.
- speaker: Interviewer
  text: But then he founded a company?
- speaker: Respondent
  text: Um-hmm, he did.
- speaker: Interviewer
  text: And the name of that was?
- speaker: Respondent
  text: Coburn Optical.
- speaker: Interviewer
  text: Did he operate that for many years?
- speaker: Respondent
  text: Yes, he did, he built a rather successful business and had his brother join him about halfway through that. He was
    an optometrist who came and ran the sales side of it. And then three of us joined him, three boys joined, at one time,
    some was success and some not. But it was a family business; eventually went public and was sold.
- speaker: Interviewer
  text: Interesting to note that the Oral Roberts law school was named in honor of your father. The O. W. Coburn School of
    Law, dedicated 1979. How did that relationship come about?
- speaker: Respondent
  text: That was through Charles Coffey, who was a brilliant lawyer here in Tulsa. And was his lawyer and thought that they
    needed a law school where they taught reconciliation instead of alienation. And my dad bought into that.
- speaker: Interviewer
  text: So he must have contributed a significant amount of money.
- speaker: Respondent
  text: Yeah, I don't know what that was.
- speaker: Interviewer
  text: If you have a name after him.
- speaker: Respondent
  text: Well, it didn't last because the law school was sent to Pat Robertson's school.
- speaker: Interviewer
  text: Right, it was closed in 1985.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: Professors included Anita Hill, interestingly enough.
- speaker: Interviewer
  text: Who, of course, became part of the story of the nomination of Clarence Thomas. Did you ever meet her?
- speaker: Interviewer
  text: Back to your education, the first school you remember attending? Elementary?
- speaker: Respondent
  text: Longfellow in Muskogee.
- speaker: Interviewer
  text: Okay. In Muskogee.
- speaker: Interviewer
  text: Okay, how do I get your family to Muskogee?
- speaker: Respondent
  text: They moved there from Casper, Wyoming. My father took a job for Tom Brown Optical in Muskogee.
- speaker: Interviewer
  text: So then into high school, junior high school -
- speaker: Respondent
  text: Junior high, high school, all the way through.
- speaker: Interviewer
  text: In Muskogee?
- speaker: Interviewer
  text: When did you graduate from high school?
- speaker: Respondent
  text: '''Sixty-six.'
- speaker: Interviewer
  text: Then on to college?
- speaker: Interviewer
  text: And what was your degree to be in?
- speaker: Respondent
  text: Accounting.
- speaker: Interviewer
  text: In accounting?
- speaker: Interviewer
  text: What were you thinking you were going to be?
- speaker: Respondent
  text: Business management, management. If you can account for it, you can manage it.
- speaker: Interviewer
  text: Because you knew the family business was there.
- speaker: Respondent
  text: Well, yeah, and my dad wanted us to come in, so I did.
- speaker: Interviewer
  text: This would be before your time, but December 7 1941, you weren't born, did it affect any of your family or hear any
    stories how it may have affected?
- speaker: Respondent
  text: Oh, sure. My dad and his two brothers were all in the military. My dad didn't stay long. When he was a young boy he
    got run over by a milk wagon and had some real bad vertebrae in his back. He was in the navy and they found out he couldn't
    scrub ships very well because of his fused back. So they decided they didn't want him. But my other two brothers both
    fought in the Pacific, significant fights in the Pacific. And returned home.
- speaker: Interviewer
  text: What year did you graduate from Oklahoma State?
- speaker: Respondent
  text: Nineteen seventy.
- speaker: Interviewer
  text: Somewhere along the line you met a lady who was the 1967 Miss Oklahoma.
- speaker: Respondent
  text: Oh, I met her in the first grade.
- speaker: Interviewer
  text: Oh, really? And her name?
- speaker: Respondent
  text: Carolyn Denton.
- speaker: Interviewer
  text: You met her in the first grade?
- speaker: Interviewer
  text: Was she the apple of your eye?
- speaker: Respondent
  text: Yeah, pretty much so. I mean, I never really seriously dated anybody other than her. I mean, she was my best friend
    for years before I ever asked her out on a date.
- speaker: Interviewer
  text: Then somewhere in college or something you decided the two of you -
- speaker: Respondent
  text: Well, we decided we'd get married. We got married during the middle of her junior year.
- speaker: Interviewer
  text: From your marriage you have three daughters?
- speaker: Respondent
  text: I have three daughters.
- speaker: Interviewer
  text: And their names?
- speaker: Respondent
  text: Oldest is Callie, she is forty-six, she'll be forty-six this summer. Middle is Katie and she'll be forty-three. And
    Sarah, who will be thirty-eight, I guess, or thirty-nine.
- speaker: Interviewer
  text: Sarah has become about as famous as you have through her operatic soprano singing.
- speaker: Respondent
  text: Hopefully more so.
- speaker: Interviewer
  text: And she's quite accomplished, isn't she? national grand finalist in 2001, the Metropolitan Opera National Council
    auditions, voice was described as silvery, resonant soprano. Obviously you're terrible proud of her. Did she get all her
    singing skills from you?
- speaker: Respondent
  text: None. She gets them all from her mother and her mother's side of the family.
- speaker: Respondent
  text: You wouldn't even want me to sit next to you in church.
- speaker: Interviewer
  text: '[laughs] So does your wife sing?'
- speaker: Respondent
  text: She did, I mean, when she was Miss Oklahoma that was her talent. She can sing, she just doesn't.
- speaker: Interviewer
  text: But anyway, it's traced through -
- speaker: Respondent
  text: It's not traced through the Coburn lineage at all.
- speaker: Interviewer
  text: In your days in college, the Vietnam War was on.
- speaker: Interviewer
  text: From 1955 to the fall of Saigon on April 30, 1975. What are your recollections of the Vietnam War and the protests?
    Because America was in not a very favorite war.
- speaker: Respondent
  text: There was a lot of consternation, but my observations are is that it was poorly handled leadership.
- speaker: Interviewer
  text: Do you think it could have been presented to the -
- speaker: Respondent
  text: Well, they could have told the truth, they weren't telling the truth. The casualty rates weren't accurate, they weren't
    telling the truth. They weren't telling the ground game truth, they weren't telling about not winning the hearts and minds
    of a lot of the South Vietnamese people. They just weren't telling the truth. When government doesn't tell the truth everything
    goes to pot. Integrity is what the rule of law is based on. You saw civil disobedience during that time. You saw more
    than civil disobedience during that time. You saw bombings, you saw all this other stuff. You know, it's very similar
    to where we find ourselves today, in terms of lack of trust, and lack of confidence in the federal government.
- speaker: Interviewer
  text: Right. So did you make any stands on it, public, I mean, were you -
- speaker: Respondent
  text: No, I was too busy trying to get an education. And, you know, I had a deferment up until my junior year. Then got
    drafted. I was going through induction the November that they did the first lottery. My induction was held in abeyance
    until after that lottery. And I drew 353.
- speaker: Respondent
  text: So I didn't go. But my brother served but he didn't go to Vietnam. They sent him to South Korea. And my older brother
    served in the air force.
- speaker: Interviewer
  text: You're talking about leadership. Lyndon Johnson was President through much of that.
- speaker: Respondent
  text: And so was Nixon.
- speaker: Interviewer
  text: So was Richard Nixon, yes. And between both of them you're saying we didn't get the truth.
- speaker: Respondent
  text: You didn't get the truth out of McNamara, and you didn't get the truth out of the generals. You know, truth really
    matters. When you don't see that things fall apart.
- speaker: Interviewer
  text: And then they were so mired in it, what could they do to get out?
- speaker: Respondent
  text: They just got out.
- speaker: Interviewer
  text: Just ended it, right.
- speaker: Respondent
  text: Yeah, they just got out. With lots of lives sacrificed, lots of lives lost. And I'm not just talking Americans.
- speaker: Interviewer
  text: It was a major disruptive force in the '68 Democratic Convention.
- speaker: Respondent
  text: Um-hmm. Yeah.
- speaker: Interviewer
  text: And that was it. People left, ran to Canada, burned their draft cards. No war is popular but certainly that was a
    very unpopular war. And then it was interesting because as you heard about it, you just talked about it while you were
    in college. And as you were a senator you dealt with an issue from it and Agent Orange.
- speaker: Interviewer
  text: Talk to us about that because Agent Orange was a herbicide sprayed by the military for several years. And then maybe
    veterans were that they came back with a lot of problems as a result of it.
- speaker: Respondent
  text: Yeah. Yeah.
- speaker: Interviewer
  text: You were opposed?
- speaker: Respondent
  text: Well, I thought science ought to determine who got benefits and who didn't. There's three specific - if I can recall
    - three specific disease conditions associated with Agent Orange. But the VA, through the decision of one VA administrator,
    started giving Agent Orange funds to everything that the cow brought home. It's one thing to compensate people for an
    error, it's another thing to use it as a social program, which is what we've done when it comes to Agent Orange. We ought
    to compensate those people truly injured by Agent Orange. But we shouldn't be compensating people who weren't. It's just
    like social security disability, it's a game. You know, how do you get the money out of the government to help you?
- speaker: Respondent
  text: And one of the oversight things I did in the Senate, they finally have just had a grand jury indict the doctor, a
    lawyer, and an administrative law judge and I hope they rot in jail. They're going to. And it happens all over this country.
    So character and truth, they're malleable terms anymore in our country and we're seeing the consequences of it. Just look
    at the VA system. It's worse now than it was after all the stuff that came forward. So Agent Orange was a real causative
    effect. We should have directed it toward those people who had direct proven scientific effects from it. And everybody
    else shouldn't have gotten the money.
- speaker: Interviewer
  text: Right. The overall bill was approved 97 to 2.
- speaker: Interviewer
  text: They said that veterans that have diabetes, prostate cancer, lung cancer, and blood-borne diseases would be now in
    care and benefits under the amendment that you're talking about.
- speaker: Respondent
  text: Yeah, except none of those diseases are associated with Agent Orange. Just go look at the medical history. You know,
    it's the principal, when you start giving money away for things that are not necessarily required, the downfall of true
    republics is hurried. They all fail, the question is, can you cheat history and have them live longer?
- speaker: Interviewer
  text: From 1970 to '78 you served as manufacturing manager in the family business.
- speaker: Respondent
  text: In one region of that family business, yeah.
- speaker: Interviewer
  text: Talk to us about that. I believe you grew that company and did you enjoy that work?
- speaker: Respondent
  text: Yeah, we had a fun time. We started a little facility out in Virginia where we knew we could probably find skilled
    employees that were in that industry. My dad's business was making machines and we decided to vertically integrate to
    make lenses. We started that and had about a 50 million dollar business when I left. Which was a good business, it was
    a growing business. But that industry has so been taken over by the Italians and the Japanese. There's not an American
    owned company left. That just shows you another incidence where the federal government has failed, because you go buy
    a pair of frames today, it's all price-fixed because one company owns 80 percent of the frame production in this country.
    And none of it is produced in this country.
- speaker: Interviewer
  text: So you were in at the right time and got out at the right time?
- speaker: Respondent
  text: Oh, yeah, and it was great. We had a ball. I built a great team. I was inspected by the US Department of Justice because
    I wouldn't fill out their discrimination forms. Because I knew I wasn't discriminating. So they came down and said, "You
    have to fill out." I said, "No, I don't. Go out and check. Come inspect me but I'm not filling out your form." And, of
    course, I had a black systems manager, I had all sorts of women supervisors, I had an African American department manager.
    You know, I had immigrants, I had the whole kit and caboodle and there wasn't any discrimination anywhere. And they said,
    "You still have to fill out the forms." I said, "Take me to court, I'm not filling out the form." Never heard from them
    again.
- speaker: Interviewer
  text: Could that be possible seeds planted?
- speaker: Respondent
  text: You know, one of the things that I've noticed that's changed during m
