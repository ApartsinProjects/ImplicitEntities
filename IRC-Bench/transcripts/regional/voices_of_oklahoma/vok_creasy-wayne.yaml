collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Your date of birth?
- speaker: Respondent
  text: Two/nineteen/'twenty-six.
- speaker: Interviewer
  text: February 19, 1926. So yesterday . . .
- speaker: Respondent
  text: Was a holiday and also a birthday for me. [both laughing]
- speaker: Interviewer
  text: And all of Oklahoma celebrated it, didn't they?
- speaker: Interviewer
  text: You were ninety-four years old.
- speaker: Interviewer
  text: That make you feel good?
- speaker: Interviewer
  text: You never thought you'd ever live to be this age?
- speaker: Respondent
  text: I really didn't think much about it one way or the other.
- speaker: Interviewer
  text: Nobody would take you for ninety-four years old.
- speaker: Respondent
  text: Oh, thank you.
- speaker: Interviewer
  text: Right. Where are we recording this interview?
- speaker: Respondent
  text: In my home in Bolewood Acres, Tulsa.
- speaker: Interviewer
  text: And this lady beside us, who is she?
- speaker: Respondent
  text: She is my wife.
- speaker: Interviewer
  text: And her name is Martha. Martha, thank you for joining us.
- speaker: Interviewer
  text: How long have you and Wayne been married?
- speaker: Respondent
  text: Forty-three years on the 28th of this month.
- speaker: Interviewer
  text: All right, celebration time here again, going back many, many years, I don't know what you were doing. But in time,
    didn't you become an educator?
- speaker: Interviewer
  text: Can you tell us what you did?
- speaker: Respondent
  text: I was a reading diagnostician originally in Stillwater, after I got my master's at OSU. And I worked in the high school
    there. Then I came to Jenks and worked in the grade school system there. Before Jenks I was at Whitney Junior High, behind
    Hale, here in Tulsa. And they lost their funding. So I called my dad, who was director of placement at OSU, and he said,
    "They've got an opening at Jenks tomorrow." So I went from one to the other. The last I worked was in Jenks as the reading
    diagnostician for the grade school - when I met my husband.
- speaker: Interviewer
  text: What made you go into teaching?
- speaker: Respondent
  text: My dad [laughs].
- speaker: Respondent
  text: My dad had been a teacher, then a principal, then a superintendent, then he worked with OSU as director of placement.
    And he had three daughters and one son. And to the daughters, he said, "Be a teacher, so if your husband becomes ill,
    you'll have a job." And I'm the only one who did what he wanted. The other one became an artist, a very good well-known
    artist. And the other one became an architect. And I kept going, "Gosh, I could have maybe done something else." But I
    really did love teaching.
- speaker: Respondent
  text: So it worked.
- speaker: Respondent
  text: And of course, my brother had the option of, now he has to go and do something, well, he got a National Merit scholarship
    and went to MIT, was a physics major. And our dad told us, "You get a scholarship and you can go wherever you want to."
- speaker: Interviewer
  text: But you enjoyed a career over there?
- speaker: Interviewer
  text: Wayne, where were you born?
- speaker: Respondent
  text: Carthage, Missouri.
- speaker: Interviewer
  text: Tell us about your mother, her maiden name and what kind of a person she was.
- speaker: Respondent
  text: She was a great woman. We only lived in Carthage, Missouri, for about six months. And my father gathered up the other
    two kids besides me and we all went out to California. I was less than a year old. We settled in Fresno, California.
- speaker: Interviewer
  text: And your mother's name was?
- speaker: Interviewer
  text: And your father's name?
- speaker: Respondent
  text: Bernard Creasy.
- speaker: Interviewer
  text: Why did they move from Missouri to California?
- speaker: Respondent
  text: Well, I was told that the business he was in, which was the barber business, they had a great demand for people trained
    that way, and had good wages. Of course, I didn't know what was going on, I was just a baby. But anyway, we all packed
    our stuff, went out there, and was very happy about it.
- speaker: Interviewer
  text: Frank Phillips, at one time, was a barber. I didn't know if you knew that or not.
- speaker: Interviewer
  text: Frank, early on.
- speaker: Respondent
  text: You went to California, and what happens to the family out there? Is that where you stay and grow up?
- speaker: Respondent
  text: Well, they had a hard time. My father started drinking. He had just been out of the service, he thought he was going
    to go back and join the service, but he didn't do that. And this causes a lot of friction in the house, I was told. At
    some point, they really hated each other, couldn't stand each other, which precipitated my father just drinking more and
    more. So my mother decided she could come back to Joplin, Missouri, where her mother lived and pull me out of school.
    I was in the first grade. The feud between my mother and my father was getting very intense. So we got on a train and
    come back to Joplin and stayed with my grandmother. Her names was Jones. She didn't drink at all. We settled down there
    and I went through the fifth grade, sixth grade, and then we went to North Junior High School and had a good relationship
    with the teachers and so forth. The war come along, one of my two brothers had already been in the service. The CCC and
    several other government enterprises allowed him to go ahead and go to work for them. He went down there when he was fifteen
    or sixteen. And then to follow through his life, he went into the Marine Corps, Hickam Field, December 7, 1941. And that
    was Bill Creasy. And he didn't get hurt, he was very lucky. The other brother had already been in the service in the army
    and there wasn't too many people, or too many young men, at that time, trained to get on a ship or start getting acquainted
    with what you do on land [laughs]. Anyway, Leslie and Bill both were in the service and I'm back in Joplin, Missouri,
    with my grandmother. Right off the bat, my Grandmother Grant, she's Nordish, I think, Nordic, and she was very tight with
    her money and my mother wasn't. So this precipitated a conflict of interest over this. We got by. But my mother sold Fashion
    Frocks. That was about three or four years she was with Fashion Frocks, which was two dollars and a half.
- speaker: Interviewer
  text: And what that, Fashion . . . ?
- speaker: Respondent
  text: It's like a pattern, like they used to have dress patterns, they still do, probably. I can remember myself getting
    a dress pattern and then cutting out the pattern. His mother would sell those patterns on the street corners, you said,
    and stuff.
- speaker: Respondent
  text: Well, she was all over Joplin.
- speaker: Interviewer
  text: And she'd take an order for a dress and then the people would write it up and they would send it in. And the people
    would make the dress for the people. But that was what his mom was doing to make money.
- speaker: Interviewer
  text: So did she earn enough money to help?
- speaker: Respondent
  text: She didn't earn enough money but she would go down to the WPA or something like that -
- speaker: Respondent
  text: . . . and get flour and dry goods and so forth, which helped out the budget. It was a very nice home, it's still up
    there in Joplin. I think it sold for $145,000. Anyway, they completely disassembled it and put it back together because
    somebody lived there, liked the house, and wanted to do something with it if they could.
- speaker: Interviewer
  text: And this was your grandmother's house, right?
- speaker: Respondent
  text: It was my grandmother's house.
- speaker: Respondent
  text: And when she died, then my mother took charge of it. It was a two-story house. It was about six blocks to Columbia
    Grade School, so from where we lived to Columbia Grade School, where I went for the full six years, was about six, seven
    blocks from the grade school. Went to the junior high, which was North Junior High, was very happy at North Junior.
- speaker: Respondent
  text: Tell about the shoes, how when your shoes would get holes in them, his mom would put the shoe down on a piece of cardboard,
    trace it out, and cut it out, and put it in the shoe, to let it last a little longer.
- speaker: Respondent
  text: Well, that was a very common practice.
- speaker: Respondent
  text: My grandmother was at the time, working at Crispen's Dry Goods, which was at 6th and Main Street, there in Joplin.
    And she had occasion to bring home scraps of the various types of wool, especially suede and things like that, pieces
    of it. And she would at night, with a sewing machine, put them together and come out with a pretty nice pair of pants.
    I really resented the fact I almost had to dress like a girl, but, of course, who didn't? But we had pieces of material
    all over the floor, up on the second floor. The second floor wasn't heated or air-conditioned or a fan, so we stayed up
    there. My mother and I stayed up there in that second floor. And there was a basement runs a real small coal furnace.
    My job was to keep coal in the furnace. As I got older, I was able to make money. I started making money at age twelve.
    Then went down to the drugstore, and this was when, I remember, and I didn't read that good, so they just let me go. And
    that was the first time I was let go, because I didn't read fast enough. When I went to North Junior High School, that
    was the grades seventh, eighth, and ninth, I got really interested in chemistry. That's where I got the big scar on my
    hand now, it's still there. We were doing some experiments in front of the class of about thirty kids, showing how the
    fire extinguisher worked, by putting water in a glass container - so you could see what was going on - which was crazy.
    And we went ahead and put the water in the glass container and a cap at the top had a little partition there we could
    put sulfuric acid or any type of acid. And so we put the acid in there. And my job then was to demonstrate how great this
    fire extinguisher is. Sulfuric acid in the bottom and about an inch from the top was sodium bicarbonate, or maybe it was
    the other way around, if whichever one you had. But one of my helpers, at the time, he went ahead and put too much acid
    in. It didn't work out - it just blew up in my hands and was quite a cut there. That defer me from my idea of chemistry
    and it was so much fun to have in a laboratory and have good teachers. From the ninth and the tenth, eleventh and twelfth,
    after school, I always went in and helped the teacher out. In fact, in the twelfth grade, I was able to grade papers.
    And it was not only chemistry, they had biology and zoology in Joplin, it was a good school.
- speaker: Respondent
  text: Tell about your chemistry lab.
- speaker: Respondent
  text: The laboratory was made up various doctors' surplus of old bottles, things that they didn't need any more and so forth.
    So I was able to get a lot of lab equipment. And a lot of times they just felt sorry for me and said, "Here's some stuff
    you might want to wash out, or whatever. Be careful, because it can harm your skin," and so forth. So we had a good time
    in the laboratory, ninth, tenth, eleventh, and twelfth.
- speaker: Respondent
  text: Then the day after graduation, out of the twelfth grade, I, and about half of the high school, were all put on a Greyhound
    bus and we went up to Leavenworth, Kansas.
- speaker: Interviewer
  text: What year was this?
- speaker: Respondent
  text: That was 1944, '42, '3, and '4 was the high school. And then got on the bus, went up to Leavenworth, Kansas. And that's
    where we were indoctrinated, or that's where we examined and so forth to see if there's any problems.
- speaker: Interviewer
  text: You went in the service then, that's what that was about?
- speaker: Interviewer
  text: You went to Leavenworth to be inducted into the army?
- speaker: Interviewer
  text: Do you remember that day, December 7, 1941, Pearl Harbor Day?
- speaker: Interviewer
  text: What was going on? What were you doing that day, Sunday?
- speaker: Respondent
  text: A friend of mine, John Gray, and I were on a sidewalk doing something with a gasoline mower and fiddling around.
- speaker: Interviewer
  text: Do you remember what your family thought? Did it make you afraid or nervous?
- speaker: Respondent
  text: Yes, my mother was nervous because at that time, Wesley was up at the Aleutian Islands with the army. They didn't
    have too many soldiers -
- speaker: Interviewer
  text: Your older brother?
- speaker: Respondent
  text: . . . up there, but anyway, he was up there, Wesley was. And Bill was in the Marine Corps. He was down at Camp Pendleton,
    and John Gray, and I were out there fooling around on the sidewalk when Mother came running out, saying, "Wesley, Bill,
    they're going to get killed, they're going to get killed!" I wasn't too caring, I didn't think it was that big a deal.
    Well, they'll be able to wipe out the Japanese in no short time. But -
- speaker: Interviewer
  text: But you were fifteen or so when that happened, right?
- speaker: Respondent
  text: Yeah, I was fifteen.
- speaker: Interviewer
  text: So then the draft board came after you and then you had to enlist -
- speaker: Respondent
  text: Enlist in the army. Camp Barkeley in Texas is where we landed at. We had several occasions, which were very funny.
    Old Captain came out with a box and we had about fifty or sixty guys like us, all brand new to the army. I wasn't brand
    new because I had three years of ROTC, which was very helpful.
- speaker: Interviewer
  text: In high school?
- speaker: Respondent
  text: In high school.
- speaker: Respondent
  text: Yeah. So he put the box down, "Gather round, you guys, get as close as you can," and so forth. We all got gathered
    up there. He got the box lid open and took out a grenade, and he said, "Now this is one of your weapons." He went on and
    on about how the Germans had made one, probably better than this one, and so forth. He says, "This thing holds about,"
    I don't know about how many grams of gunpowder it'll hold and how many of those little knobs were on there. But he almost
    had us so scared we wanted to just get up and walk away. He was right there and there's a live grenade he had in his hand
    like this. So he said, "Never, never go ahead and grasp that grenade unless you intend to throw it away to the right place
    in the right time." And he says, "Now you guys on the front row, you can see that pretty good, can't you?" About that
