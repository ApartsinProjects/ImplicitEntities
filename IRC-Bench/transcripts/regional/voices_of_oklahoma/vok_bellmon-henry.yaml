collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born on a farm east of Tonkawa but my family always lived here. My mother went there to be with her sister-in-law
    when I was born.
- speaker: Interviewer
  text: Where is our conversation taking place?
- speaker: Respondent
  text: We are on our home place, which is seven miles east and one mile south from Billings. It’s 10 miles directly south
    of Tonkawa, 16 miles north and due west of Perry.
- speaker: Interviewer
  text: This is the family farm and then you were actually born…
- speaker: Respondent
  text: I was born on land my father owned up by Tonkawa, which is 10 miles north of here.
- speaker: Interviewer
  text: So I guess they say you were born in Tonkawa, right?
- speaker: Interviewer
  text: Let’s talk about your father. I think your father was born in 1874 and was a native of Kansas, is that true?
- speaker: Respondent
  text: That’s true.
- speaker: Interviewer
  text: Can you talk a little bit about how it was that he came to Oklahoma?
- speaker: Respondent
  text: Yes. He came in a roundabout way. His family lived near Pittsburgh, Kansas where his dad mined coal in a strip mine
    with horses. My dad was a teenager, or still in grade school when his father moved to what was then known as no-man’s
    land. It is now known as Beaver County, Oklahoma. They lived out there I think for five years in a dugout on the bank
    of the Beaver River. And my dad and his dad made a living by working for the local ranchers and by hauling buffalo bones
    that they picked up on the prairie to deliver them and sell them and bring merchandise back to the local storekeepers.
    After about five years, my father’s father became tired of pioneering so they went back to Kansas. In 1893, when the Cherokee
    Strip opened, my father was too young to make the run, but he came down in 1897 and bought another man’s rights to his
    claim and lived on the plain, which is across the road from where we are sitting today.
- speaker: Interviewer
  text: This dugout that you talk about, do you know much about it?
- speaker: Respondent
  text: It was in the bank of the river in the ground.
- speaker: Interviewer
  text: And they lived there the year-round?
- speaker: Respondent
  text: They lived there the year-round. They had no other materials to make a house from. There are no trees out there.
- speaker: Interviewer
  text: And to survive in the cold and the below-freezing temperatures…
- speaker: Respondent
  text: My dad talked about driving a team and hauling bones to deliver them in the winter and the wind blew out of the north.
    He said it was so cold that the only way they could stay alive was to get in behind the horses and walk behind the horses
    in the doubletree with what little protection the horses gave in the wind. It was hard to believe. I think there were
    three kids and their parents, so there were five people living in a dugout for five years.
- speaker: Interviewer
  text: And they survived. There were no deaths from that?
- speaker: Respondent
  text: No deaths. My dad talked about doing other things that were pretty deadly. The prairie rattlesnakes lived with the
    prairie dogs. My dad and his partner made a game of going into prairie dog towns about sundown and the rattlesnakes were
    coiled up outside their dens. They would take their lariat ropes and loop them over and make it into a kind of a club.
    And they killed as many rattlesnakes as they could before the snakes got wise and went down the holes. If they would have
    made a mistake and gotten bitten, they wouldn’t have had any way of getting treated.
- speaker: Interviewer
  text: Is there a covered wagon experience to all of this?
- speaker: Respondent
  text: They went from Pittsburgh, Kansas to no man’s land or Beaver County with a covered wagon and a herd of cattle with
    them. A small herd, I don’t know how many went but they went right down the main street in Wichita with a herd of cattle.
    Wichita was hardly more than a village at the time.
- speaker: Interviewer
  text: Talk about your mother Edith.
- speaker: Respondent
  text: She was from Iowa. Her family worked as farmers up by Clarinda, Iowa. They came here in 1907. I have the accounts
    from other members of the family telling about the trip, which I think took about three weeks. They came in two covered
    wagons and they shipped their farming machinery down by train, so it came later. They didn’t haul the machinery with them.
    But they made it into kind of a picnic. They came when the weather was nice. They had to forge some rivers and when they
    did they would go fishing and swimming and they made it into a pleasant experience. My mother who was one of the older
    children and I think she walked a lot of the distance from Iowa down to here. She walked alongside the wagon.
- speaker: Interviewer
  text: Was she educated?
- speaker: Respondent
  text: She had a teacher’s certificate that allowed her to teach in the country schools. She taught for 20 years in the one-room
    school here in this neighborhood.
- speaker: Interviewer
  text: About your father, what type of man was he? What do you remember about your dad?
- speaker: Respondent
  text: Well, I remember lots of things but he was a very hard-working man. He was not an educated man. When his family went
    from Kansas to no man’s land I think he was in the fifth grade. They didn’t have any schools out in the panhandle. When
    they went back to Kansas he said he was a head taller than the other kids of his age in his class but he felt out of his
    element and he didn’t go back to school. Even though he wasn’t educated, he had a great interest in education and insisted
    that my family go to school and get as much education as we could. He had 13 children. Nine children, seven girls and
    two boys by his first wife and then she died. Two years later he and my mother were married and I was born in 1921.
- speaker: Interviewer
  text: So then you had?
- speaker: Respondent
  text: Three brothers, there were four of us in the second family.
- speaker: Interviewer
  text: And have we said, your father’s name was?
- speaker: Respondent
  text: George Delbert Bellmon. He helped all of his kids get an education. I don’t know how many of my half-sisters were
    schoolteachers, but I think there were four who had college training or at least enough education to be teachers. And
    my brothers went to one brother is still living has a degree from OSU. There wasn’t easy for my folks to help us with
    education because during the Depression money was very tight. In fact, except for some lucky breaks, my dad would have
    had to give up the land and move off. An oil company came here and dug a well and gave my dad enough of the royalties
    that at least that let him stay on the land.
- speaker: Interviewer
  text: Isn’t there a story about an insurance salesman that wanted your father−
- speaker: Interviewer
  text: Can you tell us that story?
- speaker: Respondent
  text: At that time and I’m not sure what year this would have been, probably 1905 or so, the insurance went into effect
    when it was paid for. My dad was doing his normal farming in the spring, and an insurance salesman came to see him. And
    the insurance salesman was very insistent and he talked and talked and he argues with my dad that he should buy insurance.
    They talked for a couple of hours and finally my dad got tired of it and invited him to stay for lunch. They went in and
    had lunch and then they argued some more about insurance and when he came out, it was toward the middle of the afternoon.
    He looked up and there was a huge black cloud coming in and so my dad told this insurance man, “I’ll believe I’ll buy
    that insurance after all.” He did, and according to my dad’s version of the story, it was within 2 hours they had a hailstorm
    and everything was wiped out. So he got paid from the insurance and he was able to put out another crop on the same land.
- speaker: Interviewer
  text: So as a young boy you did chores and you milked cows?
- speaker: Respondent
  text: I did all kinds of farming work. I shocked wheat and scooped wheat and hauled bundles. I drove the horses on the plow.
    My main job during the school months was to keep the wood box full. We cooked with wood and heated the house with wood
    and it was a pretty major job to chop enough wood into logs and then I came in the house and stacked them in the wood
    box so my mother would have wood for the stove.
- speaker: Interviewer
  text: Where you are talking about, is that right here?
- speaker: Respondent
  text: It’s across the road.
- speaker: Interviewer
  text: It was across the road at Centennial Farm?
- speaker: Respondent
  text: Yes. That house was built about 1898. This house was built in 1961 or 1962.
- speaker: Interviewer
  text: So that young people know about milking cows, that was a tough job because I think even the calves were suckling…
- speaker: Respondent
  text: My sister and my dad used I’m not sure what was common practice, but he didn’t wean the calves he let him nurse the
    mothers. And the deal was the calves got two tits and the milker got two tits and the calf would butt up against you with
    its lower teeth, it didn’t have upper teeth, but its lower teeth would cut your knuckles. And the milk was a little salty
    and it made those sores hurt. It was a miserable job to milk cows and I’ve never liked milk since. But we were able to
    raise the calves as well as have half the milk.
- speaker: Interviewer
  text: So you would have been doing this when you were 12, 13 or 14 years old?
- speaker: Respondent
  text: I was doing it when I was in high school. I suppose I was doing it until I was at least 14. We also raised pigs. We
    would take the milk into the house and we would use what was called a separator. It was a machine that you turned with
    a crank. One person turned the crank and the other poured the milk up into the bowl. You separated it into cream and skim
    milk and the skim milk was fed to the pigs. It was a good source of protein. That was a good source of income. Usually
    when the pigs were big enough to sell we would have a little money from them. Also, my dad butchered by himself. He would
    kill the hogs and then bleed them and then put them in a barrel of hot water with a fire under it and he would pull them
    out and my dad would eviscerate them and cut them into hams and shoulders and loins. My mother would fry up the odds and
    ends and pieces and sausage and put them in a big crock and put in a layer of lard, a layer of sausage, a layer of lard,
    a layer of sausage until she had the crock full. We’d eat it in the wintertime when we had breakfast. She made soap out
    of some of the fat. We didn’t butcher beef so we had no way to preserve the beef because we didn’t have any refrigeration.
    We could preserve the pork with salt. It was a subsistence kind of living, but it was a good living.
- speaker: Interviewer
  text: Lots of hard work. As you went on in life and you thought about your father, what did you learn from him and your
    mother? What did you take from them?
- speaker: Respondent
  text: My mother was probably my greatest idol. She was one of the kindest women I have ever known. She was talented in lots
    of ways and among other things she was a great cook. She played the piano and sang. She put up with all of those children.
    Some of them were my dad’s when they got married, and some were older and gone, but some were young enough to be around
    her family. She was a great nurse. We had access to medical care. Doctors would come to the house if you called them at
    that time, but we had no way to pay them so we didn’t call doctors very often. She coaxed us into getting an education
    and she was even more determined than my dad was that we would go to school. My dad wanted me to go to law school and
    my mother didn’t care as long as you got enough education to understand the issues.
- speaker: Interviewer
  text: And then your father, what did you take from him?
- speaker: Respondent
  text: Well, maybe this is a bad choice of words but I think you’d call it stubbornness. A streak of … if you think you understand
    the issue and know what the proper course is, you stay the proper course until you succeed. He used to have saying, which
    he used frequently, “If at first you don’t succeed, try, try again.” It was one of his standard rules. He had a lot of
    sayings. My dad became an oil field contractor when they found oil over here on the neighboring farm. He hired muleskinners
    and owned horses and mules. I think probably as many as 50 head and had as many as 10 different drivers. The drivers used
    the horses to haul the rigs and the lumber to make the rigs and the wheels and the boilers. They dug the pits and the
    cellars with horses. My dad supervised the whole operation and he also did the same work himself. It doesn’t sound like
    a big deal in these days of bulldozers and trackhoes and 18-wheelers, but back then hauling a boiler which probably weighed
    a couple of tons… loading it from a railroad car to a wagon and hauling it across country roads and rickety bridges through
    mud and getting it where you needed it into order to drill oil was really a very major accomplishment.
- speaker: Interviewer
  text: Your education then, did you go to elementary school here?
- speaker: Respondent
  text: A little elementary school that you probably saw as you drove in. I went there for seven years. I skipped the second
    grade. When I started there the oil boom was at its height and we had 40 kids in that one-room school with one teacher.
    They gradually moved away and by the time I graduated we had only three in my eighth grade class. I went through grade
    school in that one-room school.
- speaker: Interviewer
  text: Which was kind of standard back then wasn’t it?
- speaker: Respondent
  text: Rural kids all went to one-room schools.
- speaker: Interviewer
  text: Yes. You went on to high school from there.
- speaker: Respondent
  text: When I went to high school I went to Moreland because Moreland had school buses and Billings didn’t have buses. Moreland
    was 12 miles away. Billing was 8 miles away. We were in the Moreland District so I went to Moreland School for three years
    and then Billings got buses so I changed and went to Billing for my senior year and graduated from Billings.
- speaker: Interviewer
  text: And after you graduated from Billings, did you go right on to Oklahoma A&M?
- speaker: Respondent
  text: Yes, in the fall.
- speaker: Interviewer
  text: Was that a four-year experience?
- speaker: Respondent
  text: Three and a half. I went there for seven semesters. My folks weren’t able to help me with expenses so I had to get
    a job. I didn’t have any social life to speak of, so I spent my time either working or studying. I carried up to 22 hours
    per semester. I transferred my coursework in the January after Pearl Harbor happened in December. So I didn’t go for my
    eighth semester.
- speaker: Interviewer
  text: But you completed the degree?
- speaker: Respondent
  text: Agriculture was my major.
