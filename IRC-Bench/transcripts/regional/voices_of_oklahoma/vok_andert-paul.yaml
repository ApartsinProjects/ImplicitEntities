collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Saint Louis, Missouri.
- speaker: Interviewer
  text: Your mother’s name?
- speaker: Respondent
  text: Her name was Marie and she was born in France. She was a French war bride from World War I.
- speaker: Interviewer
  text: So where did she grow up?
- speaker: Respondent
  text: She grew up in France until she was 16 and then she married early. My Dad went back and got her after WWI and brought
    her to the United States.
- speaker: Interviewer
  text: Your father’s name?
- speaker: Respondent
  text: Charles Andert.
- speaker: Interviewer
  text: Where did he grow up?
- speaker: Respondent
  text: He grew up in St. Louis, Missouri.
- speaker: Interviewer
  text: So your mother came here at the age of?
- speaker: Respondent
  text: She was only about 17 when they got married.
- speaker: Interviewer
  text: Your father met her in France?
- speaker: Respondent
  text: He met her in France during the war, when he was over there in World War I.
- speaker: Interviewer
  text: What did he do in the war?
- speaker: Respondent
  text: He was in an engineering outfit. He wasn’t wounded but he was affected in some way because he spent a long time in
    a veteran’s hospital later.
- speaker: Interviewer
  text: Did you learn French because you had a French-speaking mother?
- speaker: Respondent
  text: No, we were so little. We got put in an orphan home the two of us, but that’s another story. She was left with four
    boys and my dad went to the veteran’s hospital and he died in the veteran’s hospital. She couldn’t handle four boys by
    herself and not being able to hardly speak English, so the Catholic Church and the French Mothers took over. The two oldest
    boys, my older brother and I, went to St. Joseph’s Orphan Home in Saint Louis and spent eight years there.
- speaker: Interviewer
  text: Were you in touch with your mother during that period of time?
- speaker: Respondent
  text: Oh yes. She was allowed to come visit us once every two weeks. My grandfather usually brought her and helped out as
    much as he could.
- speaker: Interviewer
  text: Did she visit with you regularly over that eight-year period?
- speaker: Respondent
  text: Oh yeah, over that eight-year period she came on the visiting days when she could come.
- speaker: Interviewer
  text: Did you go home and stay for holidays?
- speaker: Respondent
  text: As we got a little older and in the later grades, we were able to come home for vacation if somebody could take care
    of us. We used to go out to see some friends in the country and stay out there with them and with their animals and the
    cows and all of that.
- speaker: Interviewer
  text: So after the eight years in the orphanage, were you able to reconnect with your mother, did you have a relationship
    with her?
- speaker: Respondent
  text: Yes, my older brother left the orphan home a year before I did, he went home and he found a job at a dairy and he
    was working. Then I got out of the home and I came home for a while and then I went to Hadley Vocational School.
- speaker: Interviewer
  text: You had brothers?
- speaker: Respondent
  text: I had three brothers. My older brother served in the Navy during World War II and the other two were too young to
    serve.
- speaker: Interviewer
  text: How old were you when you left the orphanage?
- speaker: Respondent
  text: I was about 13 when I left and went to Hadley Vocational School. I took up the printing trade. After being there almost
    ‘til the end, I was expelled one day. I was supposed to have made a face at some teacher on another floor, whom I never
    even knew. They had me turn in my books and everything and go to the principal and have all the teachers write up how
    I was. I had a good recommendation because I had been under nuns so long that I knew how to behave. So, he decided that
    since the teacher would never apologize, she said she would never apologize to me, he said, “Well, I am going to reinstate
    you anyway.” And I said, “Like hell you will, I quit.” So I went home and I told my mom I was out of the vocational school
    and told her I was going into the Army.
- speaker: Interviewer
  text: That happened when you were 16 or 17 years old.
- speaker: Respondent
  text: Yeah, right.
- speaker: Interviewer
  text: So you had been at this printing school for three or four years?
- speaker: Respondent
  text: Yes, I had been there for three years. I was just a little bit short of graduating, but I was just pretty mad after
    what that gal did. [Laughter]
- speaker: Interviewer
  text: Then, you enlisted in the Army in 1940.
- speaker: Respondent
  text: Right, that’s correct.
- speaker: Interviewer
  text: You were how old?
- speaker: Respondent
  text: I was 17 and they did not want to take me because they said you are too young and I said, “No, I am 18.” They gave
    me some papers to take home to my mother and have her swear to it that I was 18. The papers said I was born in 1922 instead
    of 1923. She signed them because there were four boys at home then and we fought all of the time and she had a hell of
    a time keeping us quiet and I figured that if she would do that I could get out of there, so they took me.
- speaker: Interviewer
  text: Did you go to basic training?
- speaker: Respondent
  text: There was no basic training in 1940. You went to the unit that you were assigned to and you trained in that unit.
    I was in Jefferson Barracks in the 6th Infantry. Some corporal would be marching you up and down every day and he would
    kick you in the butt when you got out of step. It was a lot different than it turned out later. The training camps came
    later.
- speaker: Interviewer
  text: So Jefferson Barracks was just outside of St. Louis?
- speaker: Respondent
  text: That’s correct.
- speaker: Interviewer
  text: And then you were attached to the 6th Infantry in Company F?
- speaker: Respondent
  text: Yes, that’s correct.
- speaker: Interviewer
  text: Tell us a little bit about that training for a young 17-year-old, how did that go?
- speaker: Respondent
  text: Well, [laughter] because I was so little, this corporal picked on me all of the time. We called him Hog Jaw. Every
    time I would get out of step in a formation he would kick me. He put me on cleaning spittoons in the barracks. I mean
    in those days they had spittoons. That was the dirtiest thing there was. He said he was going to make me want to get out
    because I was a volunteer at that time. I told him that nobody would make me get out. It even got to the point where they
    put me in a trashcan one time and tied the lid down on it and rolled me down the cobblestone street. I was screaming in
    this barrel and I finally hit a tree and the barrel busted open and I came flying out. These guys all came down there
    and they were all laughing. So I just jumped on all of them and I started scratching them and kicking them and doing everything
    I could to them. They finally realized they could have killed me. I realized they could have killed me too and I said
    I had better grow up fast because I was too little to be around that bunch. Those were tough days in a way. But for me,
    for some reason, it was so much fun. We had so much discipline and I was knocked around in the orphan home that I guess
    I was tough and I wanted to make it and I was going to make it.
- speaker: Interviewer
  text: The 6th Armored Infantry was divided up.
- speaker: Respondent
  text: The 6th Infantry, it wasn’t called Armored in those days. There was no Armored Infantry in those days until the 6th
    Infantry became divided into two regiments. The 6th went to Fort Knox to be part of the 1st Armored Division. My battalion
    went to Fort Benning. We were called the 41st Infantry to be part of the 2nd Armored Division and then that’s when the
    armored divisions were formed, which was about September of 1940.
- speaker: Interviewer
  text: So at Fort Benning, Georgia, what was your job there? Tell us about that.
- speaker: Respondent
  text: Well, first I was a Private First Class, just part of a unit. Then because we were moving so fast and getting in a
    lot of recruits and the draft was in effect, we had to help form the 3rd Armored Division in Camp Shelby, Mississippi.
    As a private first class though, I was sent to Fort Knox, Kentucky to learn to ride motorcycles so I could be a motorcycle
    scout. That was the most dangerous thing that there ever was. I didn’t like it. But I was a volunteer, so I had to do
    what they told me. We had several accidents riding these motorcycles. I went back to my outfit riding the motorcycle,
    but not wanting to do it. But because we were expanding so quickly, I was able to accept a corporal position in a mortar
    squad, so I accepted that and did away with the motorcycle. From there I went on to be the platoon sergeant of a weapons
    platoon. Then finally they organized that and every platoon had a weapons platoon. So then I became a platoon sergeant
    of an armored infantry platoon.
- speaker: Interviewer
  text: General Major George S. Patton was in command of the 2nd Armored Division.
- speaker: Respondent
  text: Yes. He was the brigade commander first. Well, the first time I ever met him he was a full colonel. Then he became
    a brigadier general, then a major general and he was then the division commander.
- speaker: Interviewer
  text: And you had an encounter with General Patton?
- speaker: Respondent
  text: I had several of them actually.
- speaker: Interviewer
  text: All right, let’s talk about those.
- speaker: Respondent
  text: One of the encounters I had with him was when he used to surprise you in the camps on Saturdays. He always had reviews
    on Saturday mornings. We had to march in parades and whatever he wanted. Then he would visit individual companies. He
    visited my company on this one Saturday morning. We knew he was coming, so I told one of the guys from New York who always
    did as he pleased, “You stay out of this formation. You go and hide and don’t be in there.” So when Patton came down to
    the group, he and I and company commander went walking along the line of the platoon and here was this guy who snuck in
    the ranks anyway. When Patton got to him he said, “Sergeant, bust this man because he looks like a slob.” I said, “Sir,
    he is already a private.” He said, “Make him a private and then bust him.” Another time I was with some guys who were
    practicing digging foxholes. We used to give them a 10-minute break every hour. So during the break I was down in the
    foxhole shoveling while the guys were on their break. He happened to come up and I knew I had it. He said, “Who’s in charge
    here?” I said, “I am sir.” He said, “Get out of that hole. If I ever catch you working while your men are sitting around,
    you’re busted.” So I said, “Yes sir.” Another time, some of us carried him on our shoulders doing the Louisiana Maneuvers.
    They would call a bridge and blow it out and then put a white flag on the bridge and they would say, “You can’t cross
    this bridge it’s blown out.” So we went to the edge of the water and we waded across to the other side and we found a
    not-too-deep spot to do it. We heard this siren coming and we knew it was Patton. We called him the Green Hornet in those
    days because the Green Hornet radio show was on and he wore a green uniform. He wanted us to wear green uniforms too,
    but they wouldn’t allow him to put us in green uniforms because the armored division was new. So here he came, the Green
    Hornet and he had a double turret light tank. He came sailing up this road and we thought let’s just see what he does
    at the bridge. Well, he stopped at the bridge like he was supposed to. He ordered his tank driver to cross it. He said,
    “Cross right now!” And so he and the tank got stuck in the creek. So here we are standing on the other side and we started
    laughing. So he gave us a real curse and said, “Come out here and get me out of here.” So we went out in the water and
    got him on our shoulders and three of us carried him to the bank. While we did that, another Lieutenant Colonel named
    Patton, who was his cousin, who was our battalion commander at that time, came along. He came sailing across that bridge
    and he went right on across. And General Patton screamed, “Get that SOB!” So they got him and brought him back to him
    and Patton cussed him out and told him, “You are out of this war! You’re a casualty.” Boy, he just gave it to him. While
    he was giving it to him, I looked at my guys and I said, “Let’s get the hell out of here. We are going to be next to get
    cussed out.” So we left. So he talked about it later on when he reviewed the division. He talked about that deal and yelling
    at his cousin and so forth.
- speaker: Interviewer
  text: Where was that again?
- speaker: Respondent
  text: That was in the Louisiana Maneuvers in 1941. We had maneuvers in Louisiana, then we went to Tennessee for a maneuver
    and then we went back to Louisiana and then we went to Carolina. So we had all of those maneuvers before we went overseas
    in 1942.
- speaker: Interviewer
  text: So they were training maneuvers?
- speaker: Interviewer
  text: Was General Patton a large man?
- speaker: Respondent
  text: Yes. He was at least 6’1’’ or 6’2”. Yes, he was a tall man. I’ve got pictures of him.
- speaker: Interviewer
  text: He was quite an imposing figure then?
- speaker: Respondent
  text: Oh yes. He made sure that he was imposing too. He was almost always immaculately dressed. I don’t remember him looking
    sloppily at any time and he demanded that of all his people to be that way.
- speaker: Interviewer
  text: There was an assembly bowl where he would speak to the troops?
- speaker: Respondent
  text: Yes, in fact I have a picture of that. In the October 1941, that was the first time he did it. He spoke to us as a
    whole group. He brought all 10,000 of us together into a boxing bowl and talked to us. He told us about how we were going
    to whip the enemy and we weren’t even in the war yet. This was in October 1941. He had a cameraman there that took a picture
    of the whole division. There were two different pictures and we were able to purchase them at the time. But the things
    he said to us have never been repeated in writing. He always says, “I didn’t say those things.” His speeches were always
    cleaned up, even though they’re still dirty. They’ve been cleaned up from some of the things that he did tell us.
- speaker: Interviewer
  text: So as we say, he had very colorful language?
- speaker: Respondent
  text: Oh, absolutely. His wife would sit in a staff car behind a podium behind big-screen he had up there where he could
    tell us what we were going to do. She wouldn’t come out because of the way he cursed.
- speaker: Interviewer
  text: Where was the assembly bowl?
- speaker: Respondent
  text: It was in Fort Benning, Georgia.
- speaker: Interviewer
  text: Then we come to December 7, 1941, the bombing of Pearl Harbor. Where were you and how did you hear about it?
- speaker: Respondent
  text: I was in Fort Benning, Georgia. That month, I was supposed to go home on leave for Christmas. In those days, we only
    had one radio. The whole company would be (hanging out) in what they called a dayroom. There were no televisions or anything
    so everybody went to the dayroom to hear what was going on, on the radio. So that’s how we found out that Pearl Harbor
    had been bombed. We were on all kinds of alerts. Those of us that had passes were called to the orderly room and those
    passes were revoked, which meant we didn’t go home for Christmas. Our training, of course picked up even more and then
    because we all thought we were going to Japan right away, but it didn’t end up that way.
