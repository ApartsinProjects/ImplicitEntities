collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Let’s go back, you had a traumatic experience when you were about 11 years old?
- speaker: Respondent
  text: I fell down on my way home from school one day and cut my knee. Like a kid will do, I wrapped my handkerchief around
    it to keep the blood from getting on my knickers. I got the knee infected with a staph infection. I was literally in bed
    for almost five months either at home or in the hospital. There was no penicillin and there was no sulfa in those days.
    The way they cured an infection like that was boiling it out of you with tubes running through your legs to take off the
    pus. So I had three different operations, which left 11 scars on that left leg. It finally got all under control. When
    I took an exam to get into the Navy, the doctors could not believe that my leg was normal. They had me do everything but
    climb the walls. Then I was living in Pittsburgh the Navy team for Naval aviation came over from Philadelphia once a month.
    The team that came over and examined me the first time wouldn’t pass me because of that leg, but the team that came over
    the next time verified that it was okay.
- speaker: Interviewer
  text: It was in high school that you kind of began your military career if we can say that, because you are in the Citizens
    Military Training Corps?
- speaker: Respondent
  text: That was after high school. That was a program called CMTC Citizens Military Training Corps, which was the equivalent
    to our ROTC as far as getting commission. If you went for four summers, you got a reserve commission. I went through the
    summer of 1940 because the literature said swimming, boating and recreation at beautiful Lake Fort Meade in Maryland.
    It wasn’t that way at all. I learned to slog through the mud and keep my rifle out of it. I learned to shoot and a few
    other things, but the experience made me decide that when the war started I wanted to go in the Navy.
- speaker: Interviewer
  text: When December 7, 1941 comes along, what were you doing then? Where were you?
- speaker: Respondent
  text: I was studying my accounting lesson for night school. I closed the book and I never opened it again. I had the radio
    on and I was sitting at my desk. I think it was 11am or Noon. I kept saying, “Where’s Pearl Harbor?” And nobody knew where
    it was. I started to try and get into the program (military) right away. I couldn’t get into aviation originally because
    you had to have a college degree. Within a matter of weeks they changed that. In the spring of 1942 they changed it to
    being able to pass exams, so I went in and took the exams and passed them. I was sworn into the Navy in August 1942. I
    was just barely 20 when I was sworn in.
- speaker: Interviewer
  text: You received an appointment to the U.S. Naval Academy?
- speaker: Respondent
  text: No, I did not receive an appointment. I went through the Navy Aviation Cadet Program. I wanted to get into the Academy
    when I got out of high school, but I could not get an appointment. Two years later, my neighbor who was a judge got me
    the appointment. So I got a tutor and I tried to cram for the exams for the Naval Academy. I took six tests and flunked
    one of them, physics, by 1/10 of a point, so I didn’t make it. But the irony of the whole thing is, I did not have to
    take that test and did not know it at the time. If you had a good high school record, you only had to take two tests,
    English and math. But I didn’t know that, so I took all six and because I flunked that one by 1/10 of a point, I didn’t
    make it.
- speaker: Interviewer
  text: But you did become an ensign in the Naval Reserve?
- speaker: Respondent
  text: Once I got in, in August and went on active duty, I was going in for aviation but I had a chance to switch from being
    a pilot to being a navigator. I got my commission about a year early and had a contract to come back to flight training
    in one year, which happened. So I got commissioned in August of 1943. The interesting thing is had I gone to the Naval
    Academy I would have been commissioned one year later.
- speaker: Interviewer
  text: So you became a Navy pilot?
- speaker: Respondent
  text: I became a navigator, a bombardier and a fighter pilot.
- speaker: Interviewer
  text: What kind of duty did you see?
- speaker: Respondent
  text: I didn’t have any combat duty. I went all over the U.S. in my training program, Iowa, Texas and all over Florida.
    Then I had a carrier cruise in the Pacific the year the war was over. I was out in the Pacific for a year on an aircraft
    carrier.
- speaker: Interviewer
  text: Is there a story from March 1947 about you taking an airplane?
- speaker: Respondent
  text: Why yes, there is a story there. I got my orders to go back to civilian life and get off active duty. My squadron
    had just come back from the South Pacific and was stationed on Maui. We had one two-engine plane in the fighter squad
    and that was to carry parts if somebody broke and all sorts of things. The plane was down for mechanical reasons. I went
    to the skipper and said, “I’ve got to get down to Pearl Harbor by the date on these orders to catch the USS Bairoko back
    to the United States. How am I going to get down there?” (Chuckle) He looked at me and said, “That’s your problem.” So,
    I thought, well, there’s just one way, so I flew down there and tied it up and got onboard ship and came back.
- speaker: Interviewer
  text: So you took a plane? (Chuckle)
- speaker: Respondent
  text: Yes, it was the only way I could get there.
- speaker: Interviewer
  text: That was pretty gutsy on your part.
- speaker: Respondent
  text: The funny part of it is that some years later after I had made Rear Admiral, I ran into that skipper. He looked at
    that big, broad gold stripe and he said, “How in the hell did you get that?” (Laughter)
- speaker: Interviewer
  text: Along the line you visited your sister in Hollywood?
- speaker: Respondent
  text: That’s right, just to see her and to get a little advice. I had decided for whatever reason John, I can’t trace it
    to anything, but I decided that I wanted to be in the advertising business. I was sitting on a truck on Saipan drinking
    beer with a buddy. He said, “What are you going to do when you get out?” I said, “I’m going to get into advertising.”
    My sister, being in public relations, I asked her for a little advice. She knew some people in the advertising agency
    business in Hollywood, so I visited with them. They all said to go work for a newspaper in a medium-sized city. On my
    way home to Pennsylvania from San Diego I stopped in OKC because I had an uncle, aunt and five cousins living here. I
    liked the looks of the city. I remember coming in from the west and seeing the sunshine on OKC with those two tall buildings
    we had at that time. I thought it looked clean and it was much warmer than Pittsburgh, which I thought was pretty good.
    My uncle had the same interest in me that a man would have in his son. He wanted to know what I wanted to do and I told
    him. Oklahoma City was a medium-sized city and it had a newspaper, so he lined up an interview for me. I went down there
    in my uniform and filled out an application with really no intention at the moment of coming here. But when we got back
    to Pennsylvania, I got a letter one day that said if I wanted the job to be there on June 12, 1947. I thought, well, it’s
    warmer and cleaner than Pittsburgh, which is something I wanted. I found out while I was visiting that I could get a degree
    at Oklahoma City University night school. I also found out I could fly in the Naval Reserve one weekend a month and they
    were stationed in Dallas, Texas. I went down and bought a used car and down I came to Oklahoma City. I put my electric
    train in the back seat with my clothes. (Chuckle)
- speaker: Interviewer
  text: So that was a hobby early on?
- speaker: Respondent
  text: Yes. (Laughter)
- speaker: Interviewer
  text: The newspaper you went to work for was?
- speaker: Respondent
  text: I went to work for The Daily Oklahoman and The Oklahoma City Times as an advertising salesman.
- speaker: Interviewer
  text: Then you were given some accounts while you were there at the newspaper, including B.C. Clark?
- speaker: Respondent
  text: B.C. Clark was probably my most famous original account. I was assigned to small companies that were already advertising
    to keep their programs going.
- speaker: Interviewer
  text: Along the way, you met a lady by the name of Lucille?
- speaker: Respondent
  text: One of my cousins worked in the record department at Harbour-Longmire. My office that I worked out of for The Daily
    Oklahoman was just a few blocks away. I went down to see my cousin one day and there was another girl in the department
    by the name of Lucille Frances Flanagan. I liked her looks. The second time I went down there I asked her if she would
    like to go to the Oklahoma City Indians baseball game that night and she said, “yes.” She was in a family of seven and
    there were three boys, but none of them liked baseball, but she did. Her dad used to take her to the games. So she was
    a baseball fan and that was a great beginning. (Laugh)
- speaker: Interviewer
  text: Then it went from there?
- speaker: Respondent
  text: Well, it went rather quickly from there. On July 4th, she invited me to a picnic that her family had been invited
    to at this little lake. I went along and I saw the lake and I thought, man, this is the first thing I’ve seen come along
    that looks like Pennsylvania. There were lots of trees, lots of lush green grass and a lake with water. I thought that
    if I ever got the chance that I would build a home on this lake. I might fast-forward about 10 years. At that time we
    had three children and we were ready to build that home. I called everybody on the lake to see if anybody wanted to sell
    me a piece of land and nobody wanted to sell me any. I knew Jack Johnson, who developed Quail Creek fairly well. I got
    Jack to get me a lot near a lake where I could look at someone else’s lake. (Chuckle) I bought a lot on Northwest 66th
    Street just east of May. Jack was getting ready to pour the slab, and the next morning somebody called me and said there
    was a guy who would sell me a piece of property on that lake. So I went out there and bought the land. Then I called Jack
    and asked if he would let me out of this deal. He said if he liked the new lot that I bought that he would. He came out
    and saw it and loved it and we built our home there and lived there for 25 years. Now, Jack didn’t charge me anything
    for that deal, but you know sometimes good deeds pay off. Jack discovered abandoned sandpits out on 50th across from Putnam
    City High School. He bought that land and developed them into upscale apartments, so that was his reward.
- speaker: Interviewer
  text: And the name of the lake?
- speaker: Respondent
  text: The name of the lake was Broadlawn.
- speaker: Interviewer
  text: You married Lou in 1948?
- speaker: Respondent
  text: Yes, that’s right. I took her into church on her birthday, September 3, 1947. I stepped over in front of the vigil
    lights and lit a couple of candles and said, “You might consider marrying me and before you answer that, how many children
    do you think you would like to have?” She said, “I think I would like to have about six.” I said, “That’s exactly what
    I was thinking. Will you marry me?” She said, “Yes,” and we got married the following June.
- speaker: Interviewer
  text: So you asked her to marry you in church?
- speaker: Respondent
  text: Yes and we had seven children. We lost one early on, but we had a big family.
- speaker: Interviewer
  text: Yes. So let’s go back to The Daily Oklahoman and B.C. Clark. Did you handle other accounts as well?
- speaker: Respondent
  text: Yes, Connolly’s Menswear and Parks Menswear are the ones I remember. I had a lot of accounts.
- speaker: Interviewer
  text: You were doing some of that work at night?
- speaker: Respondent
  text: That’s right. Those three accounts, Clark’s, Connolly’s, and Parks were actually paying me a little something to do
    a little extra work on the side for them.
- speaker: Interviewer
  text: Kind of in essence almost starting a little advertising agency at night?
- speaker: Interviewer
  text: And while working for the newspaper you were tired of suits and ties?
- speaker: Respondent
  text: (Laugh) I wasn’t really tired except that it was so hot in Oklahoma—particularly down on Main Street in those days
    there wasn’t a tree for a few miles around. I had to wear a hat a coat and tie and I would take my coat off, which I wasn’t
    supposed to do. Then anyhow, I was always griping to my ad manager that couldn’t we not wear a coat and not wear a hat
    on these hot summer days? I asked him this so many times and one day I went in and he said, “Mr. Gaylord wants to see
