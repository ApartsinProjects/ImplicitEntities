collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So where were you born?
- speaker: Respondent
  text: I was born in St. Louis, Missouri.
- speaker: Interviewer
  text: Your mother's name, maiden name, and where she was born and her personality, what was she like?
- speaker: Respondent
  text: Oh, she was a gracious lady. She was born on September 27th, 1901 in Saint Louis, Missouri, raised five children.
    She does have a picture of me in a baptismal dress with a look on her face that says, "What the heck happened here?" But
    anyway, she was a native of Saint Louis and went to Webster College way back when, now it's Webster University, but she
    was a gracious lady. She was very talented at decorating. She used to do her fancy store - a store there called Jacker's
    - she would set tables in the store and put up fancy dishes and stuff like that, so she was elegant at that kind of a
    talent, but she was a very good decorator. She became a painter, an artist in her old age, and she never sold them. They
    were after the Post-Dispatch would send articles asking her to display her paintings, so she finally did at that same
    store, but they're all with the family now.
- speaker: Interviewer
  text: Your father's name.
- speaker: Respondent
  text: His name is Eugene Alphonse Erker. He was born on June 25th, 1892. That sounds like a date in history, doesn't it?
- speaker: Interviewer
  text: And yes, and where did he come from? Where was that?
- speaker: Respondent
  text: That was in St. Louis.
- speaker: Interviewer
  text: What was his - what did he do for a living and his personality?
- speaker: Respondent
  text: Well, his father and uncle opened an eyeglass store—an optician's store in—typical of the Germans. He had a German
    background, and they opened up a store in those days that covered radios, weather instruments, hearing aids - I don't
    think they worked very well - all kinds of things like that, stereopticons, slides, photography, and they were the official
    photographers for the 1904 World's Fair in Saint Louis. So have some books and stuff like that and these are pictures
    it'll say. And another interesting thing that I've sort of collected are postcards and if you go to an old - these antique
    stores around here - you can find postcards in Saint Louis and it'll say on the back "Printed for Erker Brothers Optical
    Company," and they did that and they're way old postcards from way back when, but they had a store on in downtown Saint
    Louis. I have a picture of my office of it with streetcars in front of the store, no cars, and some horse and buggies,
    the streetcar that was founded in 1879. So and my dad's father died when my father was only years old, he had a heart
    attack. He was in his thirties. He had one sister. His mother was pregnant with her when her husband died. I happen to
    have this wedding band that I've got on has a date in it of September 2, 1891, so it's pretty old, and it was my dad's
    and his mother's wedding band. And since he died at a young age, it was putting - putting a velvet bag in a drawer for
    many, many years. So my older brother was an executive of the estate. He kind of sent it to me saying, "You might need
    this someday." So, but then Deborah and had our name put in it too, the same script, but the script is beautiful. It's
    inside of it, and they took it to Moody's used to have our date put in and they said, "Well, we haven't seen anything
    like that in years." It has a lot of sentimental values.
- speaker: Interviewer
  text: Absolutely. So it sounds like he was in business and as a personality. He was a salesman and...
- speaker: Respondent
  text: Well, he was - no, he wasn't a salesman. He was more of a tech, an optician. He was a technician, and he brought in
    my brothers. They did the business, but they built the business pretty big. They had stores all over St. Louis. And it's
    lasted all this time. It went to my brothers after he passed. They ran it and as things happen in families, they got into
    a big dispute, split the thing up, kind of created some real problems always in the families, but I'm still grateful,
    I'm always grateful to my mother for saying, "Don't get into the business. There's too many family members already." They
    built the business well and then my one brother Jack, his sons ran the business and now his sons run the business and
    they've grown it to be a lot bigger. It was big with all different kinds of products back then, but it kind of just strictly
    eyeglasses and sunglasses, and they manufactured - one of my first jobs was grinding lenses, sitting there with that thing
    going by, you would grind them so there's a dye that would match the lens you were putting in your glasses.
- speaker: Interviewer
  text: So they had you working at an early age.
- speaker: Respondent
  text: Oh, very young, yeah. I had older brothers and an older sister. My brothers were 12, 11, and years older than I, and
    then my sister was years older. They're all gone now, which is a disadvantage of being the baby. And my sister was - I
    was obviously a surprise. I was born in April. That must have been a fun summer vacation or something. A couple of us
    were born in April. A couple of others born in September.
- speaker: Interviewer
  text: So where was this? Where were you living? In Saint Louis?
- speaker: Respondent
  text: I grew up in Saint Louis, yeah.
- speaker: Interviewer
  text: And then your education, your grade school, where did you begin that?
- speaker: Respondent
  text: I've had a complete Catholic education from day one. I went to Our Lady of Lourdes grade school. All my brothers did.
    My sisters did. The pastor of that church who baptized us - I happen to have a little card they gave out at his funeral.
    I still have it. He was born in 1868. Now can you imagine you know somebody that was born in 1860? Yeah, but anyway, he
    was quite elderly when he passed away, but amazing.
- speaker: Interviewer
  text: That school then that took you through to where?
- speaker: Respondent
  text: 8th grade. That took me through to high school and then went to graduate high school in St. Louis. It's the oldest
    high school west of the Mississippi River in St. Louis. It was founded in 1818. Still exists today.
- speaker: Interviewer
  text: What's the name of that school?
- speaker: Respondent
  text: St. Louis University High School.
- speaker: Interviewer
  text: Were you active in organizations or did you…?
- speaker: Respondent
  text: Well, yeah, I was active in some organizations and stuff. I was the business manager of a yearbook, worked on the
    newspaper, that kind of stuff, and then I was on the swimming team. Wasn't a big star, but was on the team. It was a great
    school. There were only in my class. The amazing thing about it, can remember my father sweating paying the private tuition
    for that school because it was very expensive. Found a copy of the invoice of a semester in some old stuff I've got, and
    he was sweating paying that. His business had slowed down. He was in the retail business. He would go up and down. Tuition
    for that semester was $180. Can you believe it? That's hard to believe.
- speaker: Interviewer
  text: Well, that was a good experience for you there though at that high school.
- speaker: Respondent
  text: Oh, it was great. Yeah.
- speaker: Interviewer
  text: What year did you graduate?
- speaker: Interviewer
  text: So then what?
- speaker: Respondent
  text: Then life came on. There were in my class. They must have put something in the water. Some of us went into the seminary.
    I was studying. Went to a Catholic seminary studying. Thought I had a vocation to the priesthood. And spent years at Kenrick
    Seminary, now Cardinal Glennon College is what it's called. It was a great, it was a great experience.
- speaker: Interviewer
  text: Were you intending to be a priest?
- speaker: Respondent
  text: Totally, totally. I had every intention.
- speaker: Interviewer
  text: So then after that seminary, did you finish there or did you go on?
- speaker: Respondent
  text: It was - it's an interesting story, but in the wisdom of the Holy Brothers of the Church, the bishop decided maybe
    I ought to take a little sabbatical. I finished years. Didn't finish, didn't graduate, but in March of my 4th year, several
    of us got in a little trouble. Today it wouldn't be much, but -
- speaker: Interviewer
  text: Should ask what the trouble was?
- speaker: Respondent
  text: Well, can probably tell it. But we snuck out. We were cloistered, not all year long, but we were cloistered like any
    other school. You went to school, you got out for Thanksgiving, you got out for Christmas and Easter and that kind of
    stuff, but there was a movie in town at the High Point Theater. The word got out and we all wanted to go see it, so some
    of us snuck out. There was a cemetery next door. Cut through the cemetery. You got down to the street with a bus. We got
    on the bus, went down. We knew exactly where we're going, and we were going to see A Summer Place with Sandra Dee. And
    where we failed is the movie was not at the time we arrived, so we went to a little bar next door and had some beers.
    And then we picked up our phone and called or paid our quarters and called some of our friends that were - they were at
    Saint Louis University or other schools. And so pretty soon the word was out that we were out partying and here they all
    came. I have not really told this story much, but anyway, these guys showed up and so what we decided to do is go to the
    Tropicana Lanes and start bowling because it's open late at night, so we went to this bowling alley. We all bowled and
    goofed off. It was fun, but it was soon time to get back because we had morning prayers at o'clock in the morning. We
    got back here. We had an inside job. We had a guy that had something called the lower ambulatory, and you walked down
    below and there were windows up here that were ground level, and left a couple of those open and we were able to scoot
    down in there and go to - get up to our rooms and throw on a cassock over your old clothes and get - made it in time for
    church and we made it. We didn't get caught and nothing was smooth.
- speaker: Interviewer
  text: But you didn't see the movie.
- speaker: Respondent
  text: No, we didn't. I've never seen the movie. [Laughing]
- speaker: Interviewer
  text: You didn't get caught?
- speaker: Respondent
  text: Didn't get caught that day. But a few - closer to May, a couple of months later, we were at o'clock morning prayers
    before morning mass, and when you live in a quiet place like that, you recognize anybody's footsteps, everything else.
    I mean, it's a lot of silence, so you know who it was walking down and they always started the morning prayer - the dean
    of discipline would start in the back. They always started with a Latin. We had a lot of Latin in those - they De profundis
    clamavi ad te, Domine - "Lord cry out to you, Lord hear my voice." But anyway, that was every morning at that same time
    that same thing was said. This particular morning in May - I don't remember the date, but the guy walks up to the front.
    What's the world's going on, it was months later. Turned around and asked for some of us to stand up and said we were
    to go see -- meet the head honcho, the rector there who was pretty understanding, good friend of mine, but there was also
    dean of discipline. Anywho, these were young, pretty young priests, but I was a pretty young kid, but they went to school
    at Saint Louis University increasing their - getting their masters and all that stuff with the Jesuits. And the Vincentians,
    they all - they're all competitive orders and all that stuff. And when this guy went to Saint Louis U, the Jesuits had
    heard from all of our friends were at Saint Louis U that we had - that some had been out. And don't know how they did
