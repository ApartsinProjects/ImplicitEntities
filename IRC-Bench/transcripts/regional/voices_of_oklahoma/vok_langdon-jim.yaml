collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So Jim, would you state your full name, please?
- speaker: Respondent
  text: My name is Jim Langdon.
- speaker: Interviewer
  text: Is that as full as it gets?
- speaker: Respondent
  text: James Francis Langdon.
- speaker: Interviewer
  text: Okay. Your date of birth?
- speaker: Respondent
  text: December 10th, 1950.
- speaker: Interviewer
  text: Your present age?
- speaker: Respondent
  text: Will be in December.
- speaker: Interviewer
  text: And where are we recording this interview?
- speaker: Respondent
  text: We're in the conference room at Langdon Publishing. We're in Tulsa.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Henryetta, Oklahoma.
- speaker: Interviewer
  text: Is that where you were raised?
- speaker: Respondent
  text: I was not. My parents were working on the newspaper in Henryetta, the Henryetta Daily Free-Lance. It was their first
    jobs out of college. My mother graduated from Oklahoma A&M, now OSU, with a degree in English. My father graduated from
    OU with a degree in journalism, and they met working at the Free-Lance in Henryetta. It was their first jobs out of college.
- speaker: Interviewer
  text: Okay, let's talk about your mother. Your mother's name?
- speaker: Respondent
  text: Gloria Barry Langdon.
- speaker: Interviewer
  text: And where was she born and raised?
- speaker: Respondent
  text: Henryetta, Oklahoma.
- speaker: Interviewer
  text: Okay, you guys hung out over there, right?
- speaker: Respondent
  text: My grandparents were there. Yes.
- speaker: Interviewer
  text: And so she was a writer from your early recollection of her.
- speaker: Interviewer
  text: What was her personality like?
- speaker: Respondent
  text: My mother was a wonderful, wonderful person, very interested in her community, very involved in the community and
    her church, the Methodist Church. She was named the National Mother of the Year one year in 1977. She represented Oklahoma,
    went to the Waldorf, and was selected as the National Mother of the Year, which was really exciting for our family. She
    much deserved that recognition.
- speaker: Interviewer
  text: Did you ever wonder when she was reprimanding you -- "and you're the Mother of the Year?"
- speaker: Respondent
  text: Well, I was out of college in 1977, so kind of on my own by then, but had younger sisters who were still at home.
- speaker: Interviewer
  text: And then your father's name.
- speaker: Respondent
  text: My father's name was Francis Smith Langdon.
- speaker: Interviewer
  text: And where was he born and grew up?
- speaker: Respondent
  text: He grew up in Northern California. His father was a Methodist minister who traveled around to various churches in
    his career. My dad and his brother, Ben, who was years older, kind of did a reverse of The Grapes of Wrath. They had an
    uncle in Oklahoma City who was very successful in the insurance business. So at the time they finished high school, he
    invited them to come to Oklahoma, live with his family, and attend OU. So, my uncle Ben did it first and then years later,
    my father followed him and both graduated from OU with journalism degrees.
- speaker: Interviewer
  text: And so then he was a writer too when you were born and already in his profession.
- speaker: Interviewer
  text: And his personality, how would you describe that?
- speaker: Respondent
  text: He had a great personality, very warm, had a great sense of humor, was a great dad. Certainly, had every opportunity.
    I feel blessed that I feel like I was born with a golden spoon in my mouth. It was just a great upbringing. I feel very
    fortunate. I feel like I was born standing on 3rd base.
- speaker: Interviewer
  text: Yeah. Good. We'll talk about your education and so forth, but was writing of interest, did that sink into you at an
    early age or when did it begin to sink in for you?
- speaker: Respondent
  text: Probably when I was in junior high, worked at the family newspaper writing sports in the summer, using a camera, taking
    photos at athletic events, and just discovered that I really liked writing. I liked, at that time, sports writing. But
    later discovered I liked feature writing about people. So it just all happened for me. And I'm thankful to my parents
    for giving me that opportunity and that experience where I could discover that journalism was something I really liked.
- speaker: Interviewer
  text: Absolutely. So education then, your grade school experience, where was that?
- speaker: Respondent
  text: In Tonkawa, Oklahoma, which is a town of about 3,500 people in north central Oklahoma, about miles from the Kansas
    border. My parents owned the newspaper there, a weekly newspaper, the Tonkawa News. And so I grew up in that, in a newspaper
    family. I liked their involvement in the community. I liked the fact that they were known in the community and were just
    great people for their town.
- speaker: Interviewer
  text: So then junior high?
- speaker: Respondent
  text: I went to Tonkawa public schools in junior high and high school and graduated from high school in 1969.
- speaker: Interviewer
  text: When you were in high school, did you do any writing? Did you have a school newspaper or anything like that?
- speaker: Respondent
  text: Not really. And I was involved in sports and so really the only thing I did in high school was use the camera, take
    photos, action photos at basketball games. I was playing football, so I wasn't able to do that.
- speaker: Interviewer
  text: Okay, so you played football.
- speaker: Respondent
  text: Loved the small town life, you could do everything. Regret that I didn't learn to play an instrument in the band because
    of that athletic stuff, but it was - it's kind of like Mayberry. It was just a great place to grow up.
- speaker: Interviewer
  text: You said you were taking pictures and for where - where would they get published?
- speaker: Respondent
  text: In the local newspaper.
- speaker: Respondent
  text: Just action pictures of high school games, which was fun.
- speaker: Interviewer
  text: I suppose you were notable in your class too that you were associated with the newspaper and gave you some standing
    and your peers.
- speaker: Respondent
  text: It was such a small town, people. Of course, they knew me my whole life. And I think they respected the fact that
    my parents owned the newspaper and they would - people in the community would get recognition for good things that they
    were doing and all the sports coverage of the high school and the junior high, it was just a wonderful time.
- speaker: Interviewer
  text: Was - did your parents, when they owned the newspaper, they have an opinion section and so they would editorialize
    on issues?
- speaker: Respondent
  text: Not too much. My dad wrote a column, a front page column every issue where he could express his opinions about things
    and probably a softer way of approaching that. He served in the submarine service in World War II. So the heading on his
    column was "From the Conning Tower," and there was a kind of a graphic of a conning tower.
- speaker: Interviewer
  text: What's that, a conning tower?
- speaker: Respondent
  text: On a submarine, the periscope.
- speaker: Interviewer
  text: What you see...
- speaker: Respondent
  text: The periscope, seeing - seeing out his view.
- speaker: Respondent
  text: A summer ago my sisters and my wife visited his old submarine in Muskegon, Michigan. It's dry docked there.
- speaker: Respondent
  text: So we were able to actually go on the sub that he served on during the war. It was a highly acclaimed submarine in
    World War II in the Pacific.
- speaker: Interviewer
  text: When did your father die?
- speaker: Respondent
  text: 2003. My mother and father died within four days of each other.
- speaker: Respondent
  text: They - my father, the week of Thanksgiving in 2003. But it was beautiful. We were able to have a joint funeral for
    them in our hometown. It was very fitting. Obviously it's hard to lose your parents that close together, but it meant
    something to us that they were able to go together.
- speaker: Interviewer
  text: Absolutely. How old were they when they died?
- speaker: Respondent
  text: Dad was 80. My mother was a little bit younger, 77. And they've been in good health. My dad had diabetes - latent
    diabetes in his life, but he took really good care of himself. But it finally got him.
- speaker: Interviewer
  text: But then your mother had health issues that they would die within days of each other? Was she having a health issue
    leading up to that?
- speaker: Respondent
  text: She was in poor health at the end of her life. She didn't smoke. She took good care of herself, but it was just her
    time. It was also very fitting that they would go together, that we would be able to have that joint service for them
    in that little, little small town, and... so it was meaningful.
- speaker: Interviewer
  text: As well. Well, one did not have to be left behind, did they?
- speaker: Respondent
  text: True. Right, yeah.
- speaker: Interviewer
  text: Out of high school, then you go on to college.
- speaker: Respondent
  text: I went to college. Tonkawa has a community college, Northern Oklahoma College. I attended that school mainly because
    I wanted to get experience in journalism. And in addition to my education, I was able to be the editor of the student
    newspaper my freshman year. My sophomore year, I was the advertising manager on the student newspaper, so I was able to
    get some hands-on experience that was valuable to me. After I graduated, I went to OU and as a result of that, that work
    as manager of the newspaper, as advertising manager of the student newspaper, I was able to get a job as an advertising
    salesperson on the student newspaper at OU called the Oklahoma Daily, and that was a great experience. So those two experiences
    were invaluable to me.
- speaker: Interviewer
  text: So you did your final two years at OU and, then your degree was in…?
- speaker: Respondent
  text: Journalism.
- speaker: Respondent
  text: Advertising.
- speaker: Interviewer
  text: Did writing really just flow for you, come easy for you? Because not everybody's a writer. We all think we're writers
    and some are and some aren't.
- speaker: Respondent
  text: Writing is hard. I enjoyed doing it, but never felt like I was a really good writer. I could do the basics. I really
    liked advertising. I liked sales. I like meeting people. So I followed that path instead of the news communication side
    of journalism in the journalism school. I was on the advertising side.
- speaker: Interviewer
  text: Really? Even though you've been writing since very young?
- speaker: Respondent
  text: Right. And there's writing and advertising, of course, too, copywriting, and also felt like if I was destined to become
    a newspaper publisher, I would need that sales experience. I would need to know how to sell and make money.
- speaker: Interviewer
  text: So what years are we talking about that? You graduated from OU when?
- speaker: Interviewer
  text: 1977. So then what do you do?
- speaker: Respondent
  text: I interned at the Norman Transcript during my junior, the summer of my junior year at OU. At the end of that summer,
    they asked me if I would like to just stay on and work part-time my senior year and just continue to handle some advertising
    accounts and just continue working, which was a - it was a wonderful thing. And so that's what I did. I worked as a student,
    my senior year at the Norman Transcript, and then they - they asked me to stay. After my senior year, and stayed there
    another five years full-time. Then felt, John, that since my parents owned a newspaper, that I would probably regret not
    working with them as an adult in journalism. And so I returned to Tonkawa. As the associate publisher of the paper, worked
    with my mother, worked on the newspaper as well and worked with them for a couple of years, enjoyed that experience and
    would likely not have left there, but got a call one day from an old professor at OU and asked if I would consider coming
    back to the university and teaching for a professor going on sabbatical leave for a year. I thought that sounded like
    fun and a new, a new experience. So I did that. Went there for a year. And that kind of changed my trajectory, my career
    trajectory. Julie and I met in Oklahoma City when I was working at the state newspaper association. She was practicing
    law in Oklahoma City, and we met, married, and she continued her practice of law there while I worked for the state newspaper
    association. And then our lives changed. I was hired to manage American Newspaper Representatives in New York for the
    National Newspaper Association. So, Julie was expecting our first child, but we moved to New York. Our first child was
    born there.
- speaker: Interviewer
  text: And her name?
- speaker: Respondent
  text: Emily. Julie stayed home with Emily for a couple of years that we were in New York. And then she was ready to resume
    her career as an attorney, and it just - I moved Amer
