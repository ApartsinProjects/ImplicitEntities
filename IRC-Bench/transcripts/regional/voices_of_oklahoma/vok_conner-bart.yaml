collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Bart, would you state your full name, your date of birth, and your present age.
- speaker: Respondent
  text: My name is Bart Wayne Conner. I was born March 28, 1958, in Chicago, Illinois. As of today I am fifty-four years old.
- speaker: Interviewer
  text: Any significance to your name, Bart? Were you named after somebody?
- speaker: Respondent
  text: I was actually, it was during the era when Bart and Bret Maverick were TV stars and my mom just thought that was a
    cool name. So I became Bart. And people often ask me, “Is it short for Bartholomew or Barton?” And I go, “No, just Bart.”
    And I tell them the story. And unless you knew anything about the ’50s, you wouldn’t know Bart and Bret Maverick, but
    some people do.
- speaker: Interviewer
  text: Tell us where we’re recording this interview.
- speaker: Respondent
  text: This interview is being recorded here in Norman, Oklahoma, at my office, which is on the complex here of the Bart
    Conner Gymnastic Academy, as well as Paul Ziert and Associates. Paul Ziert was my former coach at OU, and we are business
    partners and we’re in this office building right now.
- speaker: Interviewer
  text: When was Bart Conner Drive set up?
- speaker: Respondent
  text: I guess it’s probably been about fifteen years ago. I think it was called Delores Drive or something, I think it was
    named after somebody’s wife, you know, a builder, a developer out in this area many years ago. Ben Fox, who is the director
    of our gymnastics academy, he appealed to the city to see if they’d consider naming it Bart Conner Drive, since our gymnastics
    academy was on this street and we have a thriving gymnastics business along here. So the city agreed. And it’s always
    a little embarrassing for me because people say, “Where shall I mail it?” And I say, “Well, 3214 Bart Conner Drive.” And
    they’re like, “What? You have your own street?” And then I have to explain the whole story. So, hey, no problem.
- speaker: Interviewer
  text: I bet, but it’s a nice honor, right?
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was actually born in Edgewater Hospital, which technically, I guess, is in Evanston, Illinois, which is just north
    of the city of Chicago.
- speaker: Interviewer
  text: Your mother’s name, maiden name, where she was born, and where she grew up.
- speaker: Respondent
  text: My mom was born in Web City, Missouri. Jackie May Holsey was her name. She grew up in Web City/Joplin area her whole
    life. She passed away in the year 2000, April 16 of 2000.
- speaker: Interviewer
  text: And then your father’s name and where he was born and grew up.
- speaker: Respondent
  text: My father, Harold Wayne Conner, was actually born in Locust Grove, Oklahoma, but he moved very shortly thereafter
    to Web City, Missouri, with his family. And that’s where he met my mom, and they were high school sweethearts at Web City
    High School. He’s eighty-two years old next week, and he lives here in Norman, Oklahoma, just a few miles from me now.
- speaker: Interviewer
  text: What did he do for a living?
- speaker: Respondent
  text: My dad was originally a structural engineer. When he left school he went to the University of Kansas. He went to California,
    and worked for a company called North American Aviation, which became North American Rockwell, which then became Rockwell
    International, and he designed airplanes. But with his degree in structural engineering he had an expertise in concrete
    and materials in general. So he got hired by Portland Cement Association and he moved from California, back to Chicago
    area, where he worked for a company called PCA. He was one of their engineers, but one of his most important projects
    was he was an early computer programmer, in the ’50s. You know, punch paper tape programs and Fortran and Cobalt programming
    language. So he was a pioneer in the computer industry and using computers to analyze strength of materials, tensile strength,
    the strength of steel and how it can affect the properties of concrete. So he had his career in Portland Cement Association
    for many years. But upon visiting me one time after I had been down here at OU for four years, and meeting some people
    from the university, he always loved teaching. So he came back and took a second career. He left Portland Cement Association
    and he worked in the College of Architecture here at the University of Oklahoma. And he created the first College of Construction
    Science under the School of Architecture and got it accredited twice. And then he retired about fifteen years ago. But
    his passion has always been teaching, so he really had two distinctly successful careers in two different areas.
- speaker: Interviewer
  text: Did you have brothers or sisters?
- speaker: Respondent
  text: I do, I have two brothers. I’m the middle of three boys. My older brother, Bruce, is two years older. Currently and
    for the last thirty years he’s been a captain with United Airlines. He flies a 747-400 all around the world. He’s based
    in Chicago where we grew up. Additionally, he happens to be the World Master Speed-Skating Champion.
- speaker: Respondent
  text: And has qualified for the last three Olympics. Made the cut at fifty-six years of age—to the qualifying time. Now
    he doesn’t race as fast as the twenty-year-olds, but he actually makes the cut to compete in the Olympic trials every
    year. And he just recently made the cut to compete in the Olympic trials for the next Olympics, which will be in Sochi,
    Russia. So it’s pretty remarkable at fifty-six he’s still in the lead level athlete. My younger brother, Michael, is three
    years younger and works for an electronics company in the Chicago area called Beuhler Electronics. They make analytical
    equipment to test the strength of materials. He was a soccer player, a short-lived gymnast and speed-skater as well. So
    we played a lot of sports growing up in the Chicago suburbs, but we ended up picking sports that were, let’s say, a little
    off the norm.
- speaker: Interviewer
  text: Does this athleticism come down through your parents? Are either one of them athletic?
- speaker: Respondent
  text: My dad played football but he’s my size. And, of course, you know, at Web City High he played both offense and defense.
    He was a center at five feet six inches tall and about a hundred and forty pounds. And my mom liked to play tennis, but
    they never had a league level athletic experience, although my dad was always quite a good golfer and played on his high
    school golf team. But with three boys in the house, and we grew up across the street from a public park in Chicago, we
    were very active. And my parents really saw the value in keeping us busy doing things that were productive, positive.
    And they really liked the concept of the lessons we could learn from participating in sports, about the direct connection
    between what you put in and what you get out; about the lessons learned about falling down and getting up and continuing;
    about fair play and good sportsmanship and respecting your competitors. These are the kind of things that my parents valued
    and they thought sports was a proper place to teach it to three sort of ambitious, energetic boys.
- speaker: Interviewer
  text: So you had great nurturing in that area, didn’t you, from the get-go?
- speaker: Respondent
  text: My first term paper, when I was in eighth grade, was about the history of the modern Olympics because my dad wanted
    me to understand that Baron Pierre du Coubertin, who created the modern Olympics after the original Olympics back in 1776.
    The whole foundation of the Olympics was to bring the world together in peace, try like crazy to win, but at the same
    time, foster acceptance, tolerance, relationships, friendships around the world, always with a sense of fair play and
    good sportsmanship at the core of it. That was my first term paper in school. And when I didn’t know what to write about
    my dad suggested, me having been in sports, he said, “I think there’s some value in what the Olympics are trying to teach
    people.” So I learned that at a very early age. And that really has defined my life in many ways. You know, I married
    a young lady from Romania. I mean, these are things that only happen because of the Olympics. My parents growing up in
    a time, and me for part of my life, in the Cold War period, we saw many countries as enemies. And yet the Olympics somehow
    bridged those gaps and said, “Come together and let’s foster a sense of acceptance and understanding that you might not
    otherwise get.” So sports is a great place to learn that.
- speaker: Interviewer
  text: When did you begin to show some talent for, I guess we used to call it, tumbling?
- speaker: Respondent
  text: Right, exactly.
- speaker: Interviewer
  text: Way back when. Was that in elementary? Was it even before you went to school?
- speaker: Respondent
  text: I think at a very early age. I was small and strong and pretty light. You know, the key to gymnastics is your strength
    to weight ratio. So because I was small and strong—you know, I had the school record in pull-ups. Every gymnast did. We
    always used to joke at every high school or grade school or elementary school, when they put up the record in the President’s
    Council on Physical Fitness and Sports, the kid at the top of the list was always a gymnast. Because we’re light and we’re
    really strong. So I could walk all around the house on my hands. I could walk around a basketball court perimeter on my
    hands. It’s just something I loved to do. When I was probably five, six years old, I’d see if I could hold a headstand
    for five minutes while I was watching TV. You know, just little physical challenges. It was an important sort of catalytic
    moment for me when I was ten years old because in school PE class in the Chicago area, you had six weeks of wrestling,
    six weeks of baseball, six weeks of gymnastics, six weeks of swimming. All the schools offered a variety of sports. And
    my fourth grade PE teacher, a gentleman named Les Lang, noticed that I was pretty skilled at the acrobatics and the tumbling.
    And he said, “How would you like to go see what gymnastics is all about? What if I get your parents’ permission and take
    you and your brother over to the high school on a weekend and you can see what gymnastics is. Because I think you might
    have some potential to do something in gymnastics.” So that was forty-four years ago, and to this day, I can remember
    what it looked like, what if smelled like, what it felt like to walk into that gym. I came around the corner behind the
    bleachers, I saw the rings and the parallel bars and the trampoline and the mats and the vaulting and I just thought,
    “This is where I belong.” Because to me, it looked like a high tech playground with cool stuff to swing on and fly off
    of. It didn’t look to me like a structured sport at the time, it just looked like the coolest place to play. So I was
    captivated right then at the age of ten. And I just felt like this is where I belong. And I’d played lots of sports growing
    up. Growing up in the Chicago suburbs, of course, we played football, basketball, baseball. I was in Pop Warner football.
    Played hockey because the Chicago Blackhawks were a big deal in Chicago at the time. But gymnastics was just the thing
    that, you know, made my heart soar, and I knew it from the beginning.
- speaker: Interviewer
  text: Because one man reached out to?
- speaker: Interviewer
  text: And spotted your talent.
- speaker: Respondent
  text: In a way, that moment, one man with good will, good intentions, it sort of set my life on a path that has defined
    everything about me and everything I stand for. I’m grateful for that. We work with a lot of kids and you don’t know who’s
    going to be that one person that might just say the right thing at the right time. So I’m grateful. We still remain friends.
    You know, I think your life is a series of small choices. Maybe there’s a few big choices along the way, but those small
    choices, that day when he said, “Hey, I want to see if I can help these kids, show them what gymnastics is about.” And
    then my parents saying, “Yeah, go, go on over there on Saturday morning at the high school and see what it’s about.” And
    then, you know, I walked in there. I look back now and I see what a monumental moment it was.
- speaker: Respondent
  text: But it was just a small choice to go over at ten o’clock on a Saturday morning and see what the high school kids could
    do on the rings. That has the set the direction of my life all these years later.
- speaker: Interviewer
  text: What was the name of your elementary school?
- speaker: Respondent
  text: I went to Grove Elementary School in Martin Grove, Illinois.
- speaker: Interviewer
  text: In the elementary school, you were then getting involved in gymnastics?
- speaker: Respondent
  text: Right, because typical in PE class we got exposed to lots of different sports. We had wrestling and we had track and
    field and baseball and dodgeball, scooter soccer. We did all those activities like every school did. When they had that
    little session on gymnastics kids were trying forward rolls and cartwheels and it just seemed natural for me. And I had
    already been, like I said, walking around the house on my hands. So when they asked kids to try a cartwheel or a forward
    roll I could do it easily because it’s something that I had been doing in the park for years already in advance of that.
- speaker: Interviewer
  text: So then you’re on to junior high school?
- speaker: Respondent
  text: Yes. I went to Parkview Junior High School. Once again, in the Chicago suburbs, we had great public schools and we
    had great opportunity to participate in school sports. So even at my high school, which was Niles West High School in
    Skokie, Illinois, we had a full-size Olympic pool. We had a full-on wrestling program, gymnastics, besides baseball, football,
    basketball as every school had. And swimming and diving, tennis, track and field, cross country, we had a lot of opportunities
    to participate in high school sports. Interestingly enough, the gentleman who was the high school PE teacher took me all
    the way to my first Olympics.
- speaker: Respondent
  text: Because we had facilities—he happened to be an expert in gymnastics, but he was employed as the PE teacher. He was
    not some kind of private club gymnastics guru, he was the PE teacher at the high school that also taught Driver’s Ed,
    and he took me all the way to the Olympics.
- speaker: Interviewer
  text: Yeah. What year did you graduate from Niles West High School?
- speaker: Respondent
  text: I graduated in the spring of 1976. And I went to my first Olympics in Montreal the summer of ’76. Then later that
