collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Ray, would you state your full name, please?
- speaker: Respondent
  text: My name is Raymond L. Bingham.
- speaker: Interviewer
  text: And your date of birth?
- speaker: Interviewer
  text: May 21st, 1938. And your present age is?
- speaker: Respondent
  text: years old. And mean old.
- speaker: Interviewer
  text: You're not old. I'm recording this here in our office of Voices of Oklahoma in Tulsa. And where are you?
- speaker: Respondent
  text: I'm in Claremore, Oklahoma, in my office, which is on my little tiny farm I have here in Claremore.
- speaker: Interviewer
  text: And COVID and snow has been keeping us home, right?
- speaker: Respondent
  text: I've been home so long, I'm fixing to take this ankle bracelet off and go somewhere.
- speaker: Interviewer
  text: And we didn't commit a crime. We were under house arrest.
- speaker: Respondent
  text: That's right. We're doing our time. So now we ought to have one coming. We ought to be able to go out and do a little
    crime. Right.
- speaker: Interviewer
  text: And COVID, what did it do to your lifestyle? Did it keep you home completely? Did you go to the grocery store or what
    did you do?
- speaker: Respondent
  text: Well, did stock up pretty good. And I've got some friends who last two days came and picked me up and took me shopping
    and whatever needed to do. That's because of the snow storm we're living under right now.
- speaker: Respondent
  text: And COVID, that didn't change my lifestyle except my livelihood. It closed down all my commercial jobs. But as far
    as staying home and all, did not stay home.
- speaker: Interviewer
  text: Well, now we're into the vaccination period and everybody's talking about that. Have you had your vaccination yet?
- speaker: Respondent
  text: Oh, it's been canceled twice, but it's scheduled again next Monday. So maybe this time I'll get it.
- speaker: Interviewer
  text: Well, hope so.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Emmett, California. Baker's Street labor camp.
- speaker: Interviewer
  text: In a labor camp? Wow.
- speaker: Respondent
  text: Baker's street labor camp in a (I can't understand what he's saying), you know they had the little tents. That's where
    my parents are living - picking grapes and whatever they did in California to survive.
- speaker: Interviewer
  text: Wow. Want to come back to that. Tell us your mother's name.
- speaker: Respondent
  text: Beatrice May Stoneburger.
- speaker: Interviewer
  text: Where did she grow up?
- speaker: Respondent
  text: Gore, Oklahoma.
- speaker: Interviewer
  text: What was her personality like?
- speaker: Respondent
  text: Well, she's very uneducated and just a hard worker. Had pregnancies. Raised six of us to adulthood. Didn't know anything
    but work.
- speaker: Respondent
  text: She died when I was nine years old.
- speaker: Respondent
  text: My father, Walter Kitt Bingham, is from Braggs, Oklahoma, close to Gore there. He was born in 1901 in Indian Territory,
    of course.
- speaker: Interviewer
  text: What did he do for a living?
- speaker: Respondent
  text: He did all kinds of things. He was a good fiddle player, and he played a lot of dances around the country, but he
    was an expert moonshine maker. It was where we lived, had to have a good little creek on it so he'd get water, and he
    made a lot of moonshine, and was arrested for it a few times, but that's what he did. But then he did a little painting,
    and he did barber work, and he was uneducated, also. They came here to Claremore. When they put the water line in from
    Spavanaugh to Tulsa, think it was a WPA project, made a dollar a day. Pretty good. And then when that project finished,
    they migrated to California, following the harvest and so forth, and that's when had another brother two years older than
    me, and then was born there. When I was four months old, they came back to Oklahoma. They had the original Grapes of Wrath
    trip to California, and they were from that same part of the world, think. Yeah. That's the one down there in the book,
    in the movie.
- speaker: Interviewer
  text: Tell us about this camp, again, that you were born in, and what they were doing there.
- speaker: Respondent
  text: Well, have you seen the movie Grapes of Wrath?
- speaker: Respondent
  text: All right. Those place where all the migrant farm workers lived. On my 50th anniversary after being born, went back
    there to see it, because it wasn't in existence anymore. The grocery store and parking lot, of course, that was, but that
    was just where they were living when came along.
- speaker: Interviewer
  text: And then, overall, you had brothers and sisters?
- speaker: Respondent
  text: She gave birth to children, yes.
- speaker: Interviewer
  text: They didn't all survive?
- speaker: Respondent
  text: Right. Six of us reached adulthood, but not so much with her help. Like said, I was nine years old when she passed
    away.
- speaker: Interviewer
  text: Then, as you said, they came back to Oklahoma when you were four months old, and then they settled there in Claremore.
- speaker: Respondent
  text: Yes, and moved quite often. They never owned the place. They moved from one place to the other. They go to school.
    They're either Chambers, Lone Elm, or Verdigris. My dad stayed in that area, because there's quite a few little branches
    of water that he could set up to make his whiskey. It's where I live now.
- speaker: Interviewer
  text: There are people listening to this don't understand what moonshine is. Describe that.
- speaker: Respondent
  text: It's the same thing as whiskey that comes from Jack Daniels distillery. They've made it out in somebody's barn or
    out in the woods. It's very illegal, because there's no taxes paid on it. And Oklahoma being a dry state even made it
    more illegal.
- speaker: Interviewer
  text: You said he was arrested.
- speaker: Respondent
  text: Oh, yeah. He got arrested several times for it they bust up his steel so he'd have to go to a real job somewhere like
    painting or playing a barber or something so he could get his steel put back together.
- speaker: Interviewer
  text: Do you remember people coming to the farm to buy the moonshine?
- speaker: Respondent
  text: Yeah, yeah. We did at night because if they saw the smoke coming from the fire they would know that somebody's in
    the woods doing something and they'd come and fire so you did it at night so they didn't see the smoke and bottle it up
    and take it wherever he would be hiding it out maybe a barn or something.
- speaker: Interviewer
  text: So then you needed the fire for what?
- speaker: Respondent
  text: The cooker, they call it. And could not make whiskey right now my older brothers could. I was so young when it was
    going on remember seeing know what it looked like the boiler and the coal and the signaling that comes out but couldn't
    make it - wouldn't have the knowledge to make it, but older brothers, they sure could.
- speaker: Interviewer
  text: Older brothers - let's get you into school. Elementary, junior high school, high school was that there in Claremore?
- speaker: Respondent
  text: Well, the Chamber School - it's about a mile from where I'm at now it's three miles south of Claremore. Eight grades
    in one room. Mrs. Lawrence is a wonderful teacher. Now, as we would move we'd go to Verdigris Fields for a while which
    is a little more modern and it had running water and everything. Or Lone Elm, or Justice. But always come back. See, always
    came back to this area and we'd love Chamber School. Don't know if you're aware, John, but the schools in Oklahoma - did
    a story one time and Carol Lester ran it in the Claremore paper about education in Oklahoma and these one room schoolhouses
    - found that idea very interesting so did some research and when they built these schools in Oklahoma they're no farther
    than six miles apart. The reason being that no kids had to walk over three miles to school and that's a pretty long walk
    on these cold mornings and look at it like you got Claremore then you got Justice out on Highway 20. And then you got
    Harmony Star each of these are six miles apart and then Osage school and then Pryor. Everyone of those are six miles apart
    and go the other direction on highway or 412, it is now, you go from Manola back to Catoosa and there's two schools in
    between. A lot of those schools are still standing there turn them into residence and so forth. Found that very interesting
    if you go north of Claremore you got Claremore, then Sequoia, then Foyle, then Bushya Head, and Chelsea right on up to
    Benita. They're all six miles apart. Some might find that interesting.
- speaker: Interviewer
  text: Yes that's very interesting. How many grades did you remain in the one room schoolhouse?
- speaker: Respondent
  text: Eighth. Now we were back and forth here and there so eighth grade wasn't living at home anymore. I was working on
    the dairy. Graduated from Justice School, eighth grade. Still got my diploma. There was eight of us in my class.
- speaker: Interviewer
  text: Where was high school?
- speaker: Respondent
  text: Went to Claremore High School. Then one year went to Collinsville. And then back to Claremore another year. Left the
    educated part of my life in the 11th grade and joined the Air Force.
- speaker: Interviewer
  text: What year would that have been?
- speaker: Respondent
  text: 1955. August 3rd, 1955.
- speaker: Interviewer
  text: When you left school and joined the Air Force.
- speaker: Respondent
  text: Yes. Ended up, there were five of us here in Claremore all joined together. And it was a great experience. As soon
    as basic training was over, we were scattered all over. Eisenhower was the president at that time. And there was no war
    going on. They were overstocked with things, so they gave you an option for discharge. So got discharged after two years
    instead of four. Had a younger brother and sister that needed my help. So, oh, my. Discharged after the hardship.
- speaker: Interviewer
  text: So then you were helping your brothers and sisters living on a farm in Claremore?
- speaker: Respondent
  text: Yeah, different farms. My dad, when my mom died, turned us over to the county. And they would find you a place to
    live. But draw back to it, you had to work.
- speaker: Interviewer
  text: He turned you over to the county?
- speaker: Respondent
  text: Welfare department, guess.
- speaker: Interviewer
  text: And then who did you live with?
- speaker: Respondent
  text: They had an orphanage in Pryor. And never chose to go there. We decided to do the other thing. And guess they still
    do it. People take these young people in, and they get paid so much a month for taking care of them.
- speaker: Interviewer
  text: Is that what you did? You went to live with foster parents?
- speaker: Respondent
  text: Seven different ones. Six of them had dairy, and milked cows. Then got tired of that.
- speaker: Interviewer
  text: What ages were you living in those seven different foster homes?
- speaker: Respondent
  text: Third and nine years old.
- speaker: Interviewer
  text: As you look back on that, what did that experience do for you? Was it always good? Or there was some ups and downs
    through all that?
- speaker: Respondent
  text: Had one place that felt they really wanted me there because they liked me. They were both school teachers. They retired
    and moved out of state. And I was with them for a little over a year. It was the best time of my childhood. However, none
    of the rest of them had an interest in me. It's what could do as far as milk and feeding hogs and doing things. Probably
    the best thing for me, though, because never have been scared of work. I've never been out of a job over half a day. Lose
    one, go find another one. So working like did for those people and getting nothing in return except a cot to sleep on,
    it was not a good life. I'm not here to complain. Think it was good for me because it taught me how to work.
- speaker: Interviewer
  text: That's a good lesson there. A lot of people will blame their childhood, and you chose not to do that. But you had
    that innate quality that work was it. And so work got you out of it.
- speaker: Respondent
  text: It worked for me.
- speaker: Interviewer
  text: It worked for you, right?
- speaker: Respondent
  text: Absolutely. It worked for all of us. All my brothers and sisters did well.
- speaker: Interviewer
  text: Did your father stay in touch with you while you were living in all these homes?
- speaker: Respondent
  text: Yeah, I'd take some place where he was playing music. And I'd go to watch him. We'd visit a little bit. And then every
    once in a while, I'll go stay a day or two with him. But he never took the responsibility to take care of us in any way.
- speaker: Interviewer
  text: As you got older, did you resent that?
- speaker: Respondent
  text: Don't think so. Kept hoping that, well, maybe on the phone, he'd say, And I'd set out on the porch where I was living
    at the time, waiting for him to come. And he wouldn't show up. Those things were not.
- speaker: Interviewer
  text: Yeah. But, uh, that's sad. How old was he? When he died?
- speaker: Respondent
  text: 53. He died of cirrhosis of the liver.
- speaker: Interviewer
  text: Was that alcohol that took him?
- speaker: Respondent
  text: Yeah. Uh huh. And I was years old when he died.
- speaker: Interviewer
  text: At 10:22 in the morning on this February 18th, did Leroy Van Dyke call you this morning?
- speaker: Respondent
  text: Leroy Van Dyke called me this morning at 8:30, which is what he's done for the last at least years. Maybe in a year,
    he might miss two or three times. Otherwise, can count on it. Like when he had a hip replacement two weeks ago, that morning
    he couldn't call me. It's something like that or if he's in Wyoming where he still doesn't have any phone service. But
    as soon as he gets to a phone, he calls me. Don't know why that started or how it started, but love it. I've heard his
    same stories a dozen times, and never get tired of hearing them.
- speaker: Interviewer
  text: How long do you guys talk every morning?
- speaker: Respondent
  text: About minutes, because Peggy Raines calls at nine o'clock. So he'll look at the time, he's about ready for "Miss Peggy"
    time.
- speaker: Interviewer
  text: Who calls at nine ten?
- speaker: Respondent
  text: Peggy Raines.
- speaker: Interviewer
  text: She calls every day too?
- speaker: Interviewer
  text: Well, we know Leroy Van Dyke from The Auctioneer and Walk On By. Think he's years old now.
- speaker: Interviewer
  text: Okay. Pretty amazing. That's a great story.
- speaker: Respondent
  text: Yeah. And he works about days a year with a full band. He works at California, Florida, wherever. And he's so young
    looking for his age.
- speaker: Interviewer
  text: Peggy Raines. Tell us about her.
- speaker: Respondent
  text: Well, Peggy, her husband's a dentist. They live in Pryor, Oklahoma. And several years ago, her husband called me and
    wanted me to take her to Nashville and record an album for their family. Her singing and the use the same type musician
    as Reba would use as she was going. And said, "well, we can do that. It's gonna be pretty expensive." And he said, "Well,
    want to do this for her for 25th wedding anniversary." So said, okay. So set it up. We went and recorded an album. It
