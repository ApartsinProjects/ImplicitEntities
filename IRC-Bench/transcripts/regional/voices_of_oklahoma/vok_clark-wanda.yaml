collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So you come to California, what's the first thing then that happens? You're ready for a job then, aren't you?
- speaker: Respondent
  text: I had a job for a civilian contractor on the Air Force base. And the first Christmas we were there we were at Gaviota
    Beach in bathing suits having a picnic at Christmas. So I decided I liked it there.
- speaker: Interviewer
  text: Yes, and you're twenty-five when you come to California?
- speaker: Respondent
  text: When my sister and brother-in-law came back to Oklahoma, soon as they were discharged from the Air Force they came
    right back. But I went to Los Angeles and started looking for a job. And I found one at Look magazine. I worked there
    a couple of years.
- speaker: Interviewer
  text: And what was your job at Look?
- speaker: Respondent
  text: In advertising, secretary to the Advertising Department. The home office was New York City, of course, but they had
    an Advertising Department, Publicity Department, and an Editorial Department, and I worked for the advertising guys. My
    bosses just sold ads. And if you ever watched Mad Men, that's exactly the way advertising was in the '60s.
- speaker: Interviewer
  text: But you didn't go looking for a job to be in advertising, you just came in and said -
- speaker: Respondent
  text: I just found a job at Look magazine.
- speaker: Interviewer
  text: Right. And so you could type and all that. Where did you learn your skills?
- speaker: Respondent
  text: High school.
- speaker: Interviewer
  text: So your first job then in Los Angeles is at Look magazine.
- speaker: Respondent
  text: Then I left Look and went to work for Queen for a Day, after a couple of years. And shortly after that Queen for a
    Day was canceled, after many, many years on radio and TV.
- speaker: Interviewer
  text: Who was the MC?
- speaker: Respondent
  text: Jack Bailey.
- speaker: Interviewer
  text: Jack Bailey?
- speaker: Respondent
  text: Wonderful man, wonderful man. The fashion director of Queen for a Day happened to be James Cagney's sister, Jean.
    She was a very nice lady and she was the Fashion Director of the show. And my job there, I worked for the Travel Department,
    the travel for the queens that encompassed everything from a trip to Disneyland to Japan.
- speaker: Interviewer
  text: That was their reward when they were crowned Queen for a Day.
- speaker: Respondent
  text: Yeah, whatever - and my job and the lady I worked for there arranged the travel for the Queen for the day.
- speaker: Interviewer
  text: Some interesting people came through there.
- speaker: Respondent
  text: Very interesting, and it was so much fun. I've been very, very lucky, I'll tell you that for sure with some of my
    other jobs.
- speaker: Interviewer
  text: That was a very big, successful television program.
- speaker: Respondent
  text: Very, but when I heard that Queen for a Day was being canceled I called my friend Cleo Smith. I met Cleo Smith at
    Look magazine. Cleo happened to be Lucy's cousin, actually, but she was raised as Lucy's sister. Lucy called her sister
    until the day she died. Cleo's mother and Lucy's mother were very close and loving sisters and Cleo's mother died when
    she was very young. In fact, Cleo's mother and Lucy's mother were living together at the time. Lucy's father died when
    she was four, so Dede was pregnant with her son Fred. Lucy was about four years old and Cleo's mother had left her husband.
    So the two sisters were living together with their families. And so Lucy really raised Cleo and called her sister. In
    those days, there was no question about Dede raising Cleo, she was already living with her.
- speaker: Respondent
  text: So she raised Cleo as a sister. And that's how Lucy and Fred both thought of her. So anyway, I called my friend Cleo,
    who by that time was working for Lucy at the studios. And I said, "I'll be looking for a job soon. If you hear of anything,
    call me." And she said, "Well, Lucy is looking for a secretary." They had shared a secretary, but he went with Desi when
    they split up. His name was Johnny Achison. I got to know him very, very well. So Lucy didn't have a secretary. She said,
    "What do I need a secretary for? I just do my job." But after a few department head meetings and questions that needed
    to be answered, she was head of the studio by that time, she had bought Desi out and he'd gone his own way. So she decided
    maybe she did need a secretary. Cleo said to her, "I know a girl, do you want to interview her?" And Lucy said, "No, if
    you like her she's hired." So I got the job without an interview and stayed twenty-eight years.
- speaker: Interviewer
  text: Tell me about your first meeting with your new boss, Lucille Ball.
- speaker: Respondent
  text: I was supposed to start work on a Monday, but that Saturday, Lucy had an interview with Look magazine, as a matter
    of fact. Doug Kirkland was the photographer, and oh, he's a brilliant photographer. Award-winning, beautiful photographs.
    So anyway, Lucy said if I wanted to come to the house and be there at the photo shoot I could but I didn't have to. I
    could wait till Monday. Well, do you think I'd pass that up? I went to the house, knocked on the door, the maid let me
    in, but Lucy hadn't told her I was coming so I said, "My name's Wanda Clark." And it wasn't that she didn't believe me
    but I waited in the hall while she went to tell Lucy I was there. And Lucy came down the stairs and said, "Hi, honey,
    I'm Lucy." And that's how I met her for the first time.
- speaker: Interviewer
  text: By that time, what show was she into then?
- speaker: Respondent
  text: The second season of The Lucy Show, which was the second series Lucy did. Still with Vivian Vance. Lucy had two children,
    Vivian had one, they shared a house. Gale Gordon was still there as Mr. Mooney, the head of the bank that handled Lucy's
    trust from her late husband. And it was a very cute show.
- speaker: Interviewer
  text: Yeah, so here is somebody that you had to be in awe of because this is a star.
- speaker: Respondent
  text: Yes, and I had not seen an I Love Lucy show before I started working for Lucy. Because my folks didn't have a TV in
    the '50s. And I was grown and gone from the house before they ever got a TV. But I certainly knew who Lucille Ball was
    because she'd done movies for twenty years before I Love Lucy ever started.
- speaker: Interviewer
  text: She must have had a way about her to put you at ease as you came into the house?
- speaker: Respondent
  text: Oh, she had a wonderful way. And the fact that Cleo brought me, Lucy was very family oriented. She loved her family,
    kept them close to her. When she first came to Hollywood, Sam Goldwyn's Goldwyn Girls, Lucy just lucked out and got that
    job. And as soon as she got there and started working she got a contract at RKO and she started bringing her family out
    from Jamestown, New York, because family was so close, so important to Lucy.
- speaker: Interviewer
  text: Family at that time would have been?
- speaker: Respondent
  text: It was her mother, a brother, and Cleo.
- speaker: Interviewer
  text: And hadn't had children yet by that time? Or -
- speaker: Respondent
  text: No, she hadn't met Desi by that time.
- speaker: Interviewer
  text: Okay. Through the course of this you met many, many stars. Bob Hope and Jack Benny.
- speaker: Respondent
  text: Everyone that ever did Lucy's show I got to meet and spend a little time with.
- speaker: Interviewer
  text: Any of them stand out in your mind as being -
- speaker: Respondent
  text: Well, Carol Burnett was just the nicest lady, the nicest lady. She still is, she was so nice. Bob Hope and Jack Benny
    were close friends of Lucy. Lucy loved working with them. Jack Benny was a neighbor, and Jimmy Stewart was a neighbor
    on the other side. There was a story in some magazine, it could have been Life, many years ago that that block on Roxbury
    Drive where Lucy lived had more celebrities than almost any other in LA. Lucy told stories all the time, she told the
    story about Jimmy Stewart. He bought two lots, his house was on the one, the other he kept for a beautiful garden of trees,
    plants, and even vegetables. He enjoyed that. He would come to Lucy's house, he never went to the front door, he'd come
    around to the side door, and he had a basket of vegetables, which she had a new Chinese cook at the time. And he opened
    the door and says, "Oh no, we have vegetable, man," and he shut the door. So Jimmy went back to his home and called Lucy
    and he says, "Wh-wh-what? You don't want my vegetables anymore?" Lucy told that story on Jack Paar and Johnny Carson and
    everything. And then she told the story about Jack Benny, who did live next door to Lucy's driveway and Jack's house.
    So one night the family was at dinner, the kids were still young and at home, I wasn't there, I wish I had been. But I
    know somebody who was there and they told me this too, in addition to Lucy telling the story on every show. Jack came
    across that driveway, came in the back door, through the kitchen and the dining room playing his fiddle. Walked around
    the dining room a couple of times and Lucy was falling on the floor she was laughing so hard. He never broke character,
    he walked out the kitchen door and went back home without saying a word, just played his fiddle while they were having
    dinner.
- speaker: Interviewer
  text: That's a great story.
- speaker: Respondent
  text: Oh it is a great story.
- speaker: Interviewer
  text: You were working in an office someplace, I would imagine. Right?
- speaker: Respondent
  text: We always had an office at Desilu Studios. When we were on hiatus, not shooting a show or something, and Lucy was
    home, I would take a folder full of work and go to the house and spend the day, just mainly to answer the phones. But
    after she sold Desilu Studios we went to Universal Studios and had an office there for about five years, I think. From
    Universal we moved to Warners Hollywood. It had been the Goldwyn Studios but while we were ther
