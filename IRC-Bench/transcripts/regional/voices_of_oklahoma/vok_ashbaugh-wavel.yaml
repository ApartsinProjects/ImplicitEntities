collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So how old are you today?
- speaker: Respondent
  text: A hundred and five.
- speaker: Interviewer
  text: Did anyone in your family live to be a hundred or ninety?
- speaker: Respondent
  text: My mother lived to be ninety-six.
- speaker: Interviewer
  text: And how about your father?
- speaker: Respondent
  text: Late sixties.
- speaker: Interviewer
  text: Everyone wants to know, did you ever think you’d live to be 105?
- speaker: Respondent
  text: No. No I didn’t think I’d live to be 105.
- speaker: Interviewer
  text: Why do you think you lived to be 105?
- speaker: Respondent
  text: Because I live a healthy life. I don’t drink or smoke ever and I eat good food and I’m a dancer, that’s for exercise.
    When I say a dancer, I’ve always moved around dancing. I think that is an exercise.
- speaker: Interviewer
  text: What advice do you give to people who want to live to be 105? What would be your advice to them?
- speaker: Respondent
  text: Just put one foot in front of the other, keep going, keep moving.
- speaker: Interviewer
  text: How about in your long life, did you have any health problems that you had to overcome?
- speaker: Respondent
  text: I had all child illnesses. I was very ill as a child. Whatever came along, I had it.
- speaker: Interviewer
  text: And where were you born?
- speaker: Respondent
  text: Tulsa, Oklahoma.
- speaker: Interviewer
  text: Were you born in a hospital or in a house?
- speaker: Respondent
  text: In a house, 11th Street.
- speaker: Interviewer
  text: And we should say, your great niece is with us.
- speaker: Interviewer
  text: And what is her name?
- speaker: Respondent
  text: Teresa Rodriguez.
- speaker: Interviewer
  text: So she’s helping you?
- speaker: Respondent
  text: She’s my pal.
- speaker: Interviewer
  text: That’s wonderful, I know that makes her feel real good. So your mother’s name?
- speaker: Respondent
  text: Addie Emma Perryman.
- speaker: Interviewer
  text: Was she of Creek descent?
- speaker: Respondent
  text: Creek, yes.
- speaker: Interviewer
  text: And then your father’s name?
- speaker: Respondent
  text: Oliver Edgar Davis Sr., and he’s also Creek.
- speaker: Interviewer
  text: What do you remember most about your mother? What kind of a personality was she?
- speaker: Respondent
  text: My mother was very strong, was a very good mother, and a very strict mother, very strict.
- speaker: Interviewer
  text: Did you have brothers and sisters?
- speaker: Respondent
  text: Yes, I had two-and-a-half-year younger sister, and my brother was born on my fifth birthday.
- speaker: Interviewer
  text: What did your father do for a living in Tulsa?
- speaker: Respondent
  text: The way it’s written in history is he was a landowner. That’s what they have him down as a landowner. Because I’m
    full-bred Indian and both he and my mother had their allotment, about 160 acres, I think.
- speaker: Interviewer
  text: A hundred and sixty acres?
- speaker: Respondent
  text: A hundred and sixty acres.
- speaker: Interviewer
  text: Some of the white settlers took advantage of the Indians and they traded food or junk cars—
- speaker: Interviewer
  text: Can you tell me about that?
- speaker: Respondent
  text: Yeah. They would buy land from the Indians and pay the Indians very little money because they didn’t know to ask for
    more. They just got some money, that’s okay.
- speaker: Respondent
  text: So the white people bought a lot of good land that way.
- speaker: Interviewer
  text: You’re half Creek?
- speaker: Respondent
  text: I’m mostly Creek, I have a little bit of Cherokee, but I’m really mostly Creek. The Perryman family are Creek.
- speaker: Interviewer
  text: Did you get any allotment?
- speaker: Respondent
  text: No I was born, I forget how many years too late, but not a long time. If I’d of been born just a little bit earlier
    I would have gotten 160 acres, but I didn’t make it.
- speaker: Interviewer
  text: So then where did you go to school?
- speaker: Respondent
  text: I went to grade school at Kindle, and I guess it’s still there.
- speaker: Respondent
  text: And I stayed at Kindle till the third grade. Then I went to a Catholic academy, Sacred Heart. And I was in the third
    grade and I stayed there through the eighth grade.
- speaker: Interviewer
  text: And that was a boarding school, wasn’t it? Sacred Heart Academy.
- speaker: Respondent
  text: Well, yes. It was a boarding school, but a day school too. But I lived in the boarding school. I lived there.
- speaker: Interviewer
  text: Did you like living there? Or did you—
- speaker: Respondent
  text: Oh yes. It was a Benedictine nuns, I’ve been with them always.
- speaker: Interviewer
  text: Were they nice to you?
- speaker: Respondent
  text: Yes, oh yes, yes.
- speaker: Interviewer
  text: Were they strict?
- speaker: Respondent
  text: Very strict. Sacred Heart Academy, the high school is Monte Cassino.
- speaker: Interviewer
  text: So then you graduated from Monte Cassino?
- speaker: Respondent
  text: Yes, uh-huh.
- speaker: Interviewer
  text: And how many were in your graduating class?
- speaker: Respondent
  text: Two. I wish I could remember her name, sometimes I can, today I can’t, but her father was a judge in Tulsa.
- speaker: Interviewer
  text: Let’s talk about some of your remembrances of Tulsa. Did you go downtown with your mother and father? Did you remember
    any of the stores that were downtown Tulsa?
- speaker: Respondent
  text: Yes. Yes we’d go downtown to the movie and then have ice cream at the parlor later. I think the movie was called the
    Majestic.
- speaker: Interviewer
  text: The theater?
- speaker: Interviewer
  text: Majestic Theater?
- speaker: Respondent
  text: Yeah. And then after that, we’d go, I don’t know the name of it but it was a place we had ice cream. We’d have ice
    cream afterward.
- speaker: Interviewer
  text: What would they do before the movie when you came there? Did they put on a show, did they?
- speaker: Respondent
  text: Yeah. They gave a stage show. I don’t know if every theater, but one main theater had a stage show, dancing, playing,
    singing, whatever, before the movie.
- speaker: Interviewer
  text: Do you remember Bob Wills and his Texas Playboys?
- speaker: Respondent
  text: Yes. My mother is a fan of country music, particularly Bob Wills and his Texas Playboys. My mother could square dance.
- speaker: Interviewer
  text: Did you learn to square dance?
- speaker: Respondent
  text: No. I never did learn to.
- speaker: Interviewer
  text: You said you danced, earlier. What kind of dancing did you do?
- speaker: Respondent
  text: Ballroom. Championship ballroom.
- speaker: Interviewer
  text: Championship? So did you win trophies?
- speaker: Interviewer
  text: Well, there I see, on the wall up there.
- speaker: Interviewer
  text: These trophies that you won. And you were dancing with your husband then?
- speaker: Interviewer
  text: He didn’t dance?
- speaker: Respondent
  text: No I was dancing with different partners. Those are different things.
- speaker: Interviewer
  text: You were in California, when you danced for championships?
- speaker: Interviewer
  text: Do you remember Cain’s Ballroom?
- speaker: Respondent
  text: Yes. My mother went there. There was square dancing and my mother went to Cain’s.
- speaker: Interviewer
  text: Did you go with her?
- speaker: Respondent
  text: No. I was too young.
- speaker: Interviewer
  text: Cain’s Ballroom is still there today.
- speaker: Respondent
  text: It had country music.
- speaker: Interviewer
  text: And now they have all sorts of music there.
- speaker: Respondent
  text: Yeah, I guess.
- speaker: Interviewer
  text: Country and everything else.
- speaker: Respondent
  text: Yeah, yeah. My mother would go there.
- speaker: Interviewer
  text: Cain’s Ballroom was built in 1924, served as a garage for W. Tate Brady’s Automobiles. And that’s why that building
    was built.
- speaker: Interviewer
  text: In 1921, you were eleven years old. And May 31 the Tulsa race riot broke out.
- speaker: Respondent
  text: Uh-huh. I remember it. I remember trucks would come and there was a lot of men standing up in them. Men coming to
    Tulsa, I don’t know why because they needed more white men or a white man?
- speaker: Interviewer
  text: I suppose that was the National Guard troops that came in.
- speaker: Respondent
  text: I guess, yeah, because they were all standing. It’d be a truck and a bunch of men standing. Where we lived was on
    a highway, so everything went by there. And I was eleven? Yes.
- speaker: Interviewer
  text: You were eleven, and I think that Oil Road is now 11th Street.
- speaker: Interviewer
  text: So you were fairly close to the Greenwood area.
- speaker: Interviewer
  text: Do you remember seeing smoke and fire?
- speaker: Respondent
  text: I remember…yes, a little bit. But I do know that there was trouble because we had a black man and his wife that worked
    for us. And my mother took them over back roads and get them to safety. I don’t know where she took them but they said,
    “Mama’s gone to take them to safety.” And she took them away someplace to be safe.
- speaker: Interviewer
  text: How did this make you feel? Were you afraid or nervous about what was going on?
- speaker: Respondent
  text: I was never frightened as a child because of my mother is a very strong person. And besides that, that’s my personality.
    I didn’t want to change anything, afraid, I knew I was being taken care of right then.
- speaker: Interviewer
  text: Yeah. Well, I’m sure you were a strong person too.
- speaker: Interviewer
  text: You inherited that from your mother.
- speaker: Respondent
  text: Yeah, I took care of my brother and sister.
- speaker: Interviewer
  text: Okay. Your mother was hiding the blacks because they were rounding the blacks up.
- speaker: Respondent
  text: Yes. She took them away.
- speaker: Interviewer
  text: Did that make you feel proud to know that your mother—
- speaker: Respondent
  text: I’m very proud. I loved it and I was very proud. And I knew it’s something that we had to be alone because Mama had
    to take them to safety.
- speaker: Interviewer
  text: Yeah, they were rounding them up. They were also shooting at blacks.
- speaker: Respondent
  text: Yes. But I don’t remember hearing guns. I remember a little bit of smoke where a house was. It was away from us but
    smoke and fire were coming up. It probably was a lot of them but I only recall one instance. I knew there was trouble
    but I didn’t know enough to know how bad it was of it.
- speaker: Interviewer
  text: You lived at 11th and Delaware, that’s where now the University of Tulsa is.
- speaker: Interviewer
  text: And Bama Pie is right there at that corner.
- speaker: Respondent
  text: That’s where I was born.
- speaker: Interviewer
  text: Nineteen twenty-nine was a depression, Wall Street crashed. Do you remember the days of the Depression when people
    didn’t have anything?
- speaker: Respondent
  text: Let me tell you something. I didn’t know there was a depression because we already had a depression. I didn’t know
    anybody else was poor, but I know that we were very bad off. So I didn’t know the word depression, but we were poor.
- speaker: Interviewer
  text: So when the depression came along—
- speaker: Respondent
  text: I didn’t know.
- speaker: Interviewer
  text: You—nothing changed—
- speaker: Respondent
  text: I found out later we went through a depression. I thought, “Oh, we did too, I thought we were the only ones.”
- speaker: Respondent
  text: We were very poor. Okay? But I didn’t know the word depression though.
- speaker: Interviewer
  text: Well, then, if you were poor what did you do for food?
- speaker: Respondent
  text: Well, my mother worked sometimes and we did have a garden. But my mother worked.
- speaker: Interviewer
  text: Do you know where she worked and what she did?
- speaker: Respondent
  text: She’s a cook.
- speaker: Interviewer
  text: And so she was able to earn enough money to buy food for you?
- speaker: Respondent
  text: Yeah. Not a lot of money but some. We were hungry sometimes. But then we also had a lot sometimes. I don’t remember
    being hungry too many times.
- speaker: Interviewer
  text: You probably sometimes went to bed hungry.
- speaker: Interviewer
  text: What was your husband’s name?
- speaker: Respondent
  text: Marvin E. Ashbaugh.
- speaker: Interviewer
  text: Where did you meet him?
- speaker: Respondent
  text: I met him at church, Holy Family Catholic Church. I saw him going to mass, hurrying and rushing up the steps to get
    to the late mass and I’d be going up to the late mass. Time after time, another girl and I. And I think he had a friend,
    we’d go up the long steps to get mass some times. And so one time he said, “Why don’t we all have coffee together?”
- speaker: Interviewer
  text: How old would you have been then?
- speaker: Respondent
  text: I don’t know.
- speaker: Interviewer
  text: And was he your age or much older than you?
- speaker: Respondent
  text: No. Everybody that I’ve ever known is younger than me. In my lifetime, most of my friends or thirty and forty years
    younger than me. Because they’re the ones that I talk to and the ones that I understand.
- speaker: Interviewer
  text: When did you get married?
- speaker: Respondent
  text: Nineteen thirty-four.
- speaker: Interviewer
  text: So you were married in 1934—
- speaker: Interviewer
  text: And you were twenty-four years old?
- speaker: Interviewer
  text: So you married a younger man?
- speaker: Respondent
  text: Always. I have younger friends.
- speaker: Interviewer
  text: But your husband was four years younger than you.
- speaker: Interviewer
  text: Your husband went into the military, into the service?
- speaker: Interviewer
  text: He was a musician.
- speaker: Respondent
  text: Yes, uh-huh.
- speaker: Interviewer
  text: What type of musician?
- speaker: Respondent
  text: Piano. Piano and a composer and orchestra leader. If you’re a piano man you have bands. He was excellent piano, and
    excellent as a composer.
- speaker: Interviewer
  text: Who did he work for when he was in California?
- speaker: Respondent
  text: Walt Disney, not always, otherwise, you just worked around in different clubs. You worked wherever they needed a piano
    around.
- speaker: Interviewer
  text: Right. So then he was a staff pianist for Walt Disney?
- speaker: Interviewer
  text: Did he ever meet Walt Disney?
- speaker: Respondent
  text: Did I ever meet Walt Disney? Yes.
- speaker: Interviewer
  text: What was he like?
- speaker: Respondent
  text: I just met him, that’s all. He was very nice.
- speaker: Interviewer
  text: But your husband worked for him.
- speaker: Respondent
  text: Yes, uh-huh.
- speaker: Interviewer
  text: And would have known him.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: And those two got along fine then?
- speaker: Interviewer
  text: There was a Mouseketeers Show, did he play for the Mouseketeers?
- speaker: Respondent
  text: Yes, he traveled with them and played for them.
- speaker: Interviewer
  text: Did you travel with him when he would—
- speaker: Respondent
  text: No. I worked, I worked all my life.
- speaker: Interviewer
  text: What kind of work?
- speaker: Respondent
  text: Secretary. Executive secretary work, always.
- speaker: Interviewer
  text: All right. And who would you work for? What kind of companies?
- speaker: Respondent
  text: Well, most of the time it was Chestnut and Smith.
- speaker: Interviewer
  text: And then you worked for a musician’s union in California?
- speaker: Interviewer
  text: How old were you when you retired?
- speaker: Respondent
  text: Ninety-six.
- speaker: Interviewer
  text: You worked until you were ninety-six years old?
- speaker: Interviewer
  text: And that was full time, wasn’t it?
- speaker: Respondent
  text: Well, because I was probably working with people forty years younger. I was moved with people forty years younger
    than me. Okay?
- speaker: Interviewer
  text: And maybe that’s what kept you so young is—
- speaker: Respondent
  text: I think so. Yeah.
- speaker: Interviewer
  text: …those younger people.
- speaker: Interviewer
  text: But you worked till you were ninety-six. Did you work just because you liked to be around people?
- speaker: Respondent
  text: No, I need the money.
- speaker: Interviewer
  text: At ninety-six you needed the money?
- speaker: Interviewer
  text: Well, that’s great.
- speaker: Interviewer
  text: Do you know how fortunate you were to go to work at ninety-three, ninety-four? Nobody could believe, I’m sure, that
    you were ninety-six years old.
- speaker: Respondent
  text: Well, I’m sure they didn’t know. I’d be thirty or forty years younger, or as young as I could get by with. Do I look
    like 105?
- speaker: Interviewer
  text: You do not at all.
- speaker: Interviewer
  text: You look like you’re eighty-five.
- speaker: Interviewer
  text: Nobody believed when you were working that you were ninety-five, I’m sure they didn’t know that.
- speaker: Respondent
  text: They didn’t know I was. No. I wouldn’t tell that.
- speaker: Interviewer
  text: No, you wouldn’t. How many years were you married to Marvin?
- speaker: Respondent
  text: Thirty-four years.
- speaker: Interviewer
  text: Thirty-four years. And you never remarried?
- speaker: Interviewer
  text: Is that him?
- speaker: Respondent
  text: I have a boyfriend.
- speaker: Interviewer
  text: Now you have a boyfriend?
- speaker: Interviewer
  text: Here at Forest Hills? Oh, you have a boyfriend in California.
- speaker: Interviewer
  text: And how old is he, 114?
- speaker: Respondent
  text: He’s nineteen—
- speaker: Interviewer
  text: Teresa says he’s nineteen years young than you.
- speaker: Respondent
  text: Yeah, okay.
