collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where were you born, Jenny?
- speaker: Respondent
  text: I was born in Tulsa, Oklahoma.
- speaker: Interviewer
  text: In what hospital?
- speaker: Respondent
  text: I was not born in a hospital. We don't know exactly where. My mother and father were reunited in 1922, and I was born
    in 1924.
- speaker: Respondent
  text: My father came to the United States in 1914; my mother and two brothers were unable to join him until 1922.
- speaker: Interviewer
  text: Okay, then let's go back. Your mother's name, maiden name, where she was born and lived?
- speaker: Respondent
  text: My mother was Briana, B-r-i-a-n-a, Foonberg, F-o-o-n-b-e-r-g. She was born in Oratov, a little bitty town in Kiev
    Gubernia in Russia. As was my dad.
- speaker: Interviewer
  text: Your father's full name?
- speaker: Respondent
  text: Harry Robinowitz, R-o-b-i-n-o-w-i-t-z.
- speaker: Interviewer
  text: Do you know anything about their meeting and how old they were?
- speaker: Respondent
  text: They lived in the same little bitty town, Oratov. My grandfather, my mother's father, managed, he didn't own, but
    he managed a sugar beet plantation. It was on a river site. They lived very well. They had servants. Of course, in those
    early years, they didn't have amenities. The river would freeze behind their home and they would dip ice, bring it on
    the premises, and that was their refrigeration. They had maids, they lived very well in Russia for a while. But they didn't
    own anything. My father worked at the sugar beet plantation for my mother's father. They married very young. They were
    married in Russia, Kiev Gubernia in the Ukraine. My two brothers were born there. My brother Mike was born in 1909. My
    brother Sal was born in 1911. My father came to the United States in 1914. My mother's oldest sister lived in Omaha, Nebraska.
    She signed the affidavit for my dad. In those years, Jews couldn't enter the United States unless an affidavit was signed
    that they would not become a public charge, that they would be financially taken care of. My aunt signed this for my father.
    He went to Omaha to be with her. The oil boom was on in Tulsa, Oklahoma, so they moved to Tulsa. I'm not sure when. My
    aunt and the family moved to California because the oil boom fell, it dropped. And my dad was afraid to move. They wanted
    him to go with them but he was afraid to move because he feared he would lose contact with his wife and children. They
    knew he was in Tulsa and were writing to him. He was afraid he'd lose contact with them so he did not go to California
    with them, he remained in Tulsa.
- speaker: Interviewer
  text: What did he do then in Tulsa?
- speaker: Respondent
  text: He was a peddler. He had a horse and a buggy and a wagon. He would find produce and then go up and down the streets
    selling it, from house to house. That was how he supported himself here.
- speaker: Interviewer
  text: That would have been in the 1914, '15, '16 -
- speaker: Interviewer
  text: The era, somewhere in there?
- speaker: Interviewer
  text: How long then did he do that before he was reunited with his wife?
- speaker: Respondent
  text: Well, my mother and the boys were unable to join him until 1922.
- speaker: Respondent
  text: Their departure from Russia is rather interesting. My mother's baby brother, his name was Jimmy Foonberg, he was in
    the Russian Army. He was injured, they wouldn't treat him because he was Jewish. His boots were stolen, they wouldn't
    replace his boots because he was Jewish. He deserted the army. He went back home to his mother. His dad had already died.
    He went back home to his mother and said, "We have to leave. If I am caught they will not try me, they'll just shoot me
    because I'm a deserter." He expected to be shot if he was caught. She said she would not leave Russia until all of her
    children could go. It took him a couple of years to make plans. Not all of her children wanted to come. Some were married
    and had families and they didn't want to leave. The younger brother of my mother, actually my uncle, took him two years
    to make the plans to leave. They would walk at night and sleep in haystacks during the day, until they got to the border
    of the Dnieper River. It was the border between Russia and Romania. He made plans. One boat got across, the second boat
    was fired upon and didn't make it, but my mother and my brothers were on that first boat. When they got to the Dnieper
    River they started making plans to come to the United States. Because it had taken so long my dad had earned enough money
    that they could come second class, they didn't have to come steerage. They emigrated to France. I'm not sure how they
    managed that, but they came across the Atlantic in a French boat. My mother and my younger brother were seasick and were
    in the cabin the whole time. My other brother whose name was Mike was all over the boat. And by the time the boat landed
    in New York he could speak French.
- speaker: Interviewer
  text: So how long a trip was that?
- speaker: Respondent
  text: I don't know. My mother and my brothers landed in New York. They had an address of another aunt who was living in
    New York. She welcomed them there and it took them a day or two before they could make arrangements to get to Tulsa, Oklahoma.
    But they did.
- speaker: Interviewer
  text: So they came through Ellis Island then?
- speaker: Respondent
  text: Yes. So far as I know. I have relatives who tried to check on it and couldn't find it.
- speaker: Respondent
  text: But I'm pretty sure it was Ellis Island, because I'm remembering my aunt was in New York.
- speaker: Interviewer
  text: So people were leaving Russia for better times in a bigger country? Or was it because of hardship living there?
- speaker: Respondent
  text: Well, I think it was everything combined. There was anti-Semitism, they were Jewish, that was part of a problem almost
    anywhere they were in Europe or wherever. And of course, many of them wanted to join relatives elsewhere. I also had relatives
    who went to South America. I had a cousin who later found those relatives. They were in Chile, in several countries in
    South America.
- speaker: Respondent
  text: Contact has been made with them. I don't know them but I know that contact has been made with many of those relatives.
- speaker: Respondent
  text: But these were relatives of my mother's that emigrated to South America at the time. They weren't always able to come
    here. I have another cousin who determined that my grandfather knew sugar beet planting and cultivation because somehow
    or other the family came from South America.
- speaker: Interviewer
  text: So your father is continuing in the produce business then?
- speaker: Respondent
  text: Yes, he eventually opened a grocery store.
- speaker: Interviewer
  text: Here in Tulsa?
- speaker: Interviewer
  text: What was the name of that, do we know?
- speaker: Respondent
  text: Well, the last name was Stop and Shop Market. I do not know what the earlier names were, they might always have been
    that, but Stop and Shop Market.
- speaker: Interviewer
  text: Do you know where that was located in Tulsa?
- speaker: Respondent
  text: One of them was located on 11th Street. The last one was in Brookside. My dad sold that store.
- speaker: Interviewer
  text: Sounds like an early convenience store, doesn't it? Stop and Shop. This would have been in the '20s. He was a head
    of his time.
- speaker: Respondent
  text: It was, well, my oldest brother ended up in Chicago. I had an aunt in Chicago and he ended up there. And when he came
    back to Tulsa he decided they should call the stores Stop and Shop Market. That was the name of a business in Chicago,
    I believe.
- speaker: Interviewer
  text: Then we come, obviously, to you. In 1924, here comes the first birth of a child in America and the first girl in the
    family.
- speaker: Interviewer
  text: So there had to be a lot of happiness.
- speaker: Respondent
  text: My dad had become an American citizen. My brothers had derivative citizenship from my dad. My mother did not.
- speaker: Interviewer
  text: How does that work, derivative citizenship?
- speaker: Respondent
  text: It was because of their age, they were still pretty young.
- speaker: Interviewer
  text: Your father then was in his thirties at this time? Brian, you just jump in there.
- speaker: Respondent
  text: Grandpa would have had to have been born in the 1880s.
- speaker: Respondent
  text: Yes, you're right. And my mother was born the same year, but my dad was born in January or February of that year;
    she wasn't born until August of that year.
- speaker: Interviewer
  text: All right, so we're estimating when you're born, say, he's approximately in his forties. What are your first remembrances
    of Tulsa? The first house you remember and where it was?
- speaker: Respondent
  text: Yes, the house I remember was around the corner from 11th and Harvard.
- speaker: Respondent
  text: It was on 11th Street. I remember that the house faced north. There was a street called Independence that was just
    to the left of our house. I remember living in that house. It was very hot in the summertime and I would sleep outside.
    My mother would put a blanket or something on the grass and I would sleep outdoors. We didn't have a fenced yard, nobody
    had. We didn't have a dog but nobody was worried or scared or anything. We didn't fear intruders, we didn't fear thieves.
    I slept there, I remember doing that. But I also remember that my mother would get a pan of water and put it on a kitchen
    counter. We had an electric fan. The fan would blow on this pan of water and I would stand receiving the benefits of the
    fan as it blew over the water. That's the way I got cool.
- speaker: Interviewer
  text: Yeah, that's good. This would have been in the early '30s that's you're talking about then, your first remembrances,
    I would imagine.
- speaker: Interviewer
  text: The first school you attended was?
- speaker: Respondent
  text: Sidney Lanier.
- speaker: Interviewer
  text: And where was that located?
- speaker: Respondent
  text: It was on Harvard, almost at 21st, something like that.
- speaker: Respondent
  text: Still there, I think.
- speaker: Respondent
  text: I went to junior high at Woodrow Wilson Junior High School, and I went to Central High School downtown, the old Central
    High School, the building that is now Public Service Company. I loved school, I did fine. I sure wasn't brilliant or anything
    but I was able to learn. My mother had broken English always. My father and my brothers had an ear for language. Did I
    mention that my mother and my brother were seasick on the ship coming across? My brother Mike was speaking French by the
    time they landed. My family had an ear for language. My dad had no accent. My mother had an accent till she died. But
    my dad and his family spoke absolutely perfect English.
- speaker: Interviewer
  text: Let's bring you to your high school time at Tulsa Central. Some remembrances.
- speaker: Respondent
  text: I wanted to go to college. My brother Mike told me that I would never be able to afford to go to college. I was taking
    Latin and French. He said, "That's ridiculous. You have to take bookkeeping and typing and shorthand." So I dropped the
    Latin and the French and I did take those at night school. I took the other classes and I was able to enroll at TU, at
    Tulsa University.
- speaker: Interviewer
  text: After graduating from Tulsa Central. In what year did you graduate?
- speaker: Respondent
  text: I skipped a half year in California. We were broke half the time. I remember that we left our house and would find
    other places. My brothers and my dad would sleep in the back of the store. But Mother and I would go live with somebody
    else. We couldn't pay our rent at the house. But after we had enough money saved up to pay the back rent we would move
    back to the house. Everything, the drawers, the closets, just the way we left them. Nobody moved them or touched them.
    But I remember that happened two or three times.
- speaker: Interviewer
  text: You said something about California.
- speaker: Respondent
  text: My mother's sisters, I think I told you that the woman that my dad had lived with in Omaha when they moved to Tulsa,
    they all moved to California.
- speaker: Interviewer
  text: Oh, that's, okay.
- speaker: Respondent
  text: They were in Los Angeles. I remember one year my mother and I went to Santa Monica. My aunt lived in Santa Monica.
    We lived with her in Santa Monica and I went to school there. While I was there I was promoted. They skipped a half a
    grade. In those years, they had A and B. Well, I got back to Tulsa, they promoted me another half grade because they no
    longer had half grades, they just had full classes. So I was a year ahead.
- speaker: Respondent
  text: Mother, why did you move? Why did you and Grandma go to California?
- speaker: Respondent
  text: Because we were broke.
- speaker: Respondent
  text: This is during the Depression?
- speaker: Respondent
  text: I think I skipped the second half of the second grade. So it was very early, yeah.
- speaker: Respondent
  text: It was Depression. One remembrance of California was that there was an earthquake when we were living in Santa Monica.
    My mother and I were upstairs. I came down the stairs during the earthquake and everybody on the first floor was screaming
    at me because of the earthquake. I didn't have any understanding of what was going on. But everybody was okay, we were
    all right.
- speaker: Interviewer
  text: In 1941, you're about seventeen years old. Pearl Harbor, do you have a recollection -
