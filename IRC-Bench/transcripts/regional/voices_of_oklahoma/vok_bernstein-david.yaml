collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: What did you do for entertainment in the 1930s? Did you listen to radio shows?
- speaker: Respondent
  text: Yes. Because I had an older brother and sister I liked the swing era and big bands and dances that we had at our house
    with a bunch of their friends. I learned how to Lindy Hop and Jitterbug and do all of that very early. We lived about
    10 miles from New York City. If you sat on the top floor of my high school, you could see all of the buildings in New
    York. That’s tough to go to school when you can see the buildings in New York City and that’s where you want to go. I
    used to go to New York to the Roxy Theater and the Capitol Theater. Paramount was the ultimate. If you had the money you
    went to the Paramount. You would get to see a movie in those days and a big band. Gene Krupa was my favorite band. We
    would see Benny Goodman, Tommy Dorsey and Jimmy Dorsey–all of the great bands. I was pretty young to get to do that, probably
    because my brother brought me along.
- speaker: Interviewer
  text: On December 7th, 1941–do you have a memory of that day?
- speaker: Respondent
  text: I do. We were living on the second story. We were having breakfast and my brother was working at the grocery store.
    I remember he ran all the way home and yelled up our step, “The Japanese just bombed Pearl Harbor!” Most of us didn’t
    have an idea of what that meant at that time. We used to hear a lot from my grandfather about what was happening in Europe.
- speaker: Interviewer
  text: Do you remember the rationing?
- speaker: Respondent
  text: My father owned a grocery store and he could still get a Hershey bar, but mostly you didn’t have Hershey bars unless
    it was a special party. My dad raised money for war bonds. He had a little horse and a little wagon. Whomever the politician
    was or the speaker or celebrities who would come to town, we would get on the back of that wagon and we would travel around
    Paterson and they would speak to people and raise money for war bonds. He used the horse and wagon to save gasoline. We
    delivered groceries with the horse and wagon too sometimes. We were all in the same situation. My father’s older sibling
    lived in Nyack, New York. At that time it was a non-Jewish community. His family was the only Jewish family there. He
    had a gas station on Route 9. We’d go there all the time because my grandmother thought they were starving all week because
    there was no Jewish place to buy food in Nyack. They weren’t starving of course, but we would go up on Sundays especially
    during the war when things were tight to take food up there. I remember we would go through Sleepy Hollow. At nights driving
    back through there, I remember my dad may have had a drink or two more than he should have. We would drive about 3 miles
    an hour all the through that area. (Chuckle) When all the boys were drafted in the Army, my uncle’s two boys were in and
    my brother eventually was in, we would all gather to listen to the 6 o’clock news. They would hear the news and they were
    scared to death because their sons were overseas at that time. My sister was a nurse, so she was at some military bases
    also so they were worried about everybody.
- speaker: Interviewer
  text: Do you remember hearing President Franklin Roosevelt on the radio?
- speaker: Respondent
  text: Yes I do. I was born under Herbert Hoover, one of the greatest presidents were ever had. (Laughter) it wasn’t until
    Roosevelt became president that we had something to eat!
- speaker: Interviewer
  text: Let’s talk about your education. Where did you go to school?
- speaker: Respondent
  text: In Paterson. Do you remember the movie Lean on Me? That was about my high school. When I went there though, it was
    a different environment and a different time. My principal wore a celluloid collar, so it was a little more reserved.
- speaker: Interviewer
  text: In high school, were you an athlete or a member of clubs?
- speaker: Respondent
  text: Can I lie now? I wasn’t an athlete, but I was 6’1”. I am less than 6’ tall now. The coach always wanted me to play
    center on the basketball team. I told him I couldn’t play, but he wanted me to come out anyway. So one time, I went out
    and he saw me play and that was the end of it. (Laughter.)
- speaker: Interviewer
  text: When did you graduate from high school?
- speaker: Interviewer
  text: That was the beginning of the Korean War.
- speaker: Respondent
  text: Let me go back if I could. In my pre-Bar Mitzvah year, it was 1945. My brother went into the service. He was already
    26. He worked in a war plant. He had some physical things that kept him from the Army and he wanted to join the Army very
    badly. All of his friends were in the Army. We lived in a non-Jewish neighborhood. He was 6’ tall too. People would see
    a big strapping guy and say, “Why wasn’t that Jew in the Army?” So my brother went and had surgery on his hernia and tried
    to get in the Army and couldn’t. He tried the Navy and he tried the Air Force. He was colorblind as can be, which I am
    also. He finally was able to get into the Army. He was in the Army for six months and then the Battle of the Bulge came.
    He was a replacement. They didn’t know anything. In New Jersey at Fort Dix they gave them all sharp shooter medals, but
    he couldn’t shoot a gun. We never had guns in our home. Anyway, my brother was killed in The Battle of the Bulge on January
    15th. The Battle of the Bulge was in the middle of the winter when our guys were snowed in and iced in and couldn’t leave–were
    surrounded by the German Army. I have letters from him actually the day before he died, where he was telling my mom not
    to worry about him and that he was okay and he was warm. Meanwhile, he would write my sister and tell her how his feet
    were frozen and how many guys had frozen feet, and lost their feet during that battle. Anyway, a telegram came to us.
    My grandmother lived with us and she received it. My mother and father were working at the corner store. She called my
    mom to come home and read this telegram that said that my brother was missing in action. That was usually the first telegram
    that you got. You can imagine what happens in a home when that happens to the oldest son. My dad had been waiting for
    him to come home from the Army to help build his grocery store into a stop-and-shop market with all of the new equipment
    for groceries. Anyway, it didn’t happen. It took a couple of weeks of us just being worried to death. My grandmother spoke
    only Yiddish. The Yiddish I know today is from playing cards with her. She never let me play cards in any language except
    Yiddish. My grandmother was home and the telegram comes. She thought it said that they had found my brother Paul. My mother
    ran home and read the telegram and it said that he was killed in action. That was a breakup of my family. My mom took
    it hard and my dad took it extremely hard. He could never sit down to any holiday meal without crying over his son. Three
    moths later was my Bar Mitzvah. No family would be in shape to have a Bar Mitzvah when something like that has happened.
    I had a quiet Bar Mitzvah. We had some relatives there I remember and we gave out Hershey bars, I remember that. My brother
    wasn’t buried in Belgium in the largest cemetery in Belgium, but was the first Jewish soldier to come back. My folks didn’t
