collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Let’s talk about your family a little bit. Your mother’s name and maiden name and where she came from?
- speaker: Respondent
  text: My mother’s name was Catherine Jones. She was a beautiful gal. We lived next door to her mother, my grandmother. I
    pause a little bit because I am not professional in this kind of business, but once I get started you can’t stop me. I
    grew up in Tulsa living next to my grandmother. My family had five boys and one girl. We all went to Central High School.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Right there in the house next to my grandmother. My mother had me in the front room of our house.
- speaker: Interviewer
  text: Do you remember the address?
- speaker: Respondent
  text: 4912 West 8th Street. The house is still there.
- speaker: Interviewer
  text: What kind of person was your mother?
- speaker: Respondent
  text: She was well-educated. She worked for the Tulsa World as an elevator operator when she was about 18 or 20 years old.
    She met my dad who was in the National Guard.
- speaker: Interviewer
  text: Your dad’s name?
- speaker: Respondent
  text: Earl Ray Calvert. He was about 20 years older than I am. Of course he has passed away. He was here when they had the
    Race Riot. Being in the National Guard, he was called in to quiet things down, because the Race Riot as you know was in
    1921.
- speaker: Interviewer
  text: It was in May 31 and June 1 of 1921. Did he talk about what he did during the Race Riot?
- speaker: Respondent
  text: Yes. They didn’t shoot a lot of people. He was guarding the railroad tracks. He and another man were stationed to
    keep that railroad track open. He laughs and tells the story about a stray bullet that ricocheted off a rock and hit his
    buddy on top of the head. His buddy said, “I’m shot.” He said, “No, you are not shot, it just grazed your skin.” Of course
    the guy was bleeding pretty good. My dad just laughs and tells that story, but that’s all he ever said to me about his
    National Guard efforts.
- speaker: Interviewer
  text: So he didn’t say anything about the burning and the shooting and killing?
- speaker: Respondent
  text: He didn’t say a word about it.
- speaker: Interviewer
  text: What did your father do in town?
- speaker: Respondent
  text: My father was an expert machinist. If you wanted anything done in machine work, you called him. He ran and owned a
    machine shop at 1st and Lansing. Dad was such a great machinist. He served his time with the people who made trains. So
    you had people that can teach you how to run machines when you are making a train engine. So when you served your time
    in that capacity, when you came out of there, you knew how to work machines and you could teach other people. So my dad’s
    job was making oil field pumps that could run the pressure up to several thousand pounds per square inch. You had to know
    what you were doing. The young machinists didn’t know, so his job was teaching them to do all of these things. During
    the war they made a lot of pumps. They worked 12 or 14 hours a day because Uncle Sam needed all of this equipment because
    we were fighting a war. My dad would give the men a vacation so they could go and rest up because they had worked many,
    many hours a day for weeks and weeks. They were about 80 or 90 men. They worked making pieces for the pumps and while
    they were on vacation my dad and his helper put the pieces together so Uncle Sam could have his pumps.
- speaker: Interviewer
  text: What was the first elementary school you attended?
- speaker: Respondent
  text: It was James Whitcomb Riley School on Charles Page Boulevard. That was the line that ran from Tulsa to Sand Springs.
    I rode that when I was a student. It was called a streetcar. Besides having flat cars with stuff, the streetcar would
    come every 20 minutes. That school has long since been torn down. I had graduated and had been through the war in the
    Pacific with the Marines when I got notice that the school was closing. So I went there and met all of my old teachers
    and hugged every one of them. They said they remembered me. I couldn’t spell so I didn’t advance to the second grade and
    they remembered that. My dad taught me how to spell and I made 100s from then on.
- speaker: Interviewer
  text: Then you went to high school?
- speaker: Respondent
  text: I went to Roosevelt Junior High, which is over near where I live now. That school is still there, but it’s a special
    education school. After I graduated there, in 1939 I went to Central High School at 6th and Cincinnati. My kids went to
    the new Central High School that was built out on West Edison.
- speaker: Interviewer
  text: What year did you graduate from Central?
- speaker: Interviewer
  text: So you were a senior in high school on December 7, 1941?
- speaker: Respondent
  text: Yes. I was a senior in high school and I was at 3rd and Main. In those days they put out an extra paper. These boys
    would stand on the street and yell, “Extra! Extra!” The Japanese had bombed Pearl Harbor. We said to each other, “Where
    in the world is Pearl Harbor?” Boy did we ever find out.
- speaker: Interviewer
  text: Was it a scary experience to hear that?
- speaker: Respondent
  text: I had no idea what that meant.
- speaker: Interviewer
  text: Did your teachers talk about it?
- speaker: Respondent
  text: Teachers did not seem to want to talk about it. A lot of the boys wanted to enlist right away and some of them did.
    Some of the boys were only 16 and they had to get their parents’ permission to join the service.
- speaker: Interviewer
  text: So you decided to stay in school and graduate?
- speaker: Respondent
  text: Yes, I wanted to stay in school. What does a kid who is 19 know about what’s going on in the world–I mean, what’s
    war? We weren’t trained to know anything about that.
- speaker: Interviewer
  text: So you went out and got your first job out of high school?
- speaker: Respondent
  text: I worked for Mid-Continent Petroleum Corporation. Later on it was called Sun Oil Company. I worked in their laboratory
    testing oil because in high school I was my chemistry teacher’s assistant. That was quite a big deal for me. I loved to
    figure out how things worked. I once made hydrogen, the lightest known gas and put it into a balloon. I signed my name
    to it and I cast it off, but I didn’t hear anything back about who found the balloon. (Chuckle)
- speaker: Interviewer
  text: So you graduated and then you worked for Sun Oil. Then one day in 1943 the war was on and you get a letter from Uncle
    Sam?
- speaker: Respondent
  text: Yes. I worked in that laboratory for about 10 months before I got that letter. They liked my work. By then, most of
    the men in that lab were gone to war and they had women doing that work. I got my letter and I was told to report to a
    place and that night I was gone.
- speaker: Interviewer
  text: Where did you go?
- speaker: Respondent
  text: Into the Marine Corps. There was Army, Navy and the Marines and they said, “Which one do you want? You can be in any
    one, which one do you want be?” I said, “I sure like that blue uniform.” So they suckered me into the Marine Corps and
    I was on my way. They said, “There are no trains leaving Tulsa for San Diego, they all leave from OKC.” So I had to catch
    a bus and go down there. They said, “You can have a Pullman car and they will feed you and take you to San Diego.” I got
    to OKC and they said, “They gave you the wrong information, there’s no Pullman car for you. I think that recruit man pocketed
    the money and gave me a coach car that didn’t have any seats. It was full of people going to the West Coast to see their
    husbands in the service. There were women in there with babies crying and vomiting and sour milk smell. There were dirty
    diapers on the floor. I had to stand up all the way to San Diego–two days and a night. The train stopped every mile or
    so to pick up a can of milk. You could not get the windows up. There was no air conditioning on the train and no place
    to sit down and all of these people in there. I hate to tell this kind of a story, but these are true facts.
- speaker: Interviewer
  text: That obviously wasn’t the worst part of your entire enlistment. You got to San Diego and you had boot camp right?
- speaker: Respondent
  text: You’ve probably seen shows and movies of how they treat the Marines who are new recruits. When we got off that train,
    that’s just about the way they handled us. They said, “This is the sorriest bunch of people I have ever seen. Where did
    you come from?” They just downgraded us. That’s a psychological thing that the Marines do. When you go in there are people
    there from rich homes that had three meals a day served them, and other people there that are there that hadn’t had a
    bath in weeks. So they had to break these people down into one group and tell them that they’re all the same. Then they
    build you up and tell you, “Now you’re a Marine!” Well, that began to mean something. That’s the psychological thing that
    they do. You can’t feed them ice cream and soda pop all day long and make killers out of them.
- speaker: Interviewer
  text: What did they teach you in boot camp?
- speaker: Respondent
  text: They taught us how to do close-order drill. That’s where they line you up and teach you how to make a right face and
    a left face and a forward march. Of course, we didn’t know our right from our left and they would say, “Your other left
    stupid!” There are people there that had just had teeth pulled. They would take you down there and the dentist looks at
    200 or 300 people in one day. You know with that kind of treatment he can’t do a very good job. But he could see rotten
    teeth and he could pull those out and it’s not too pleasant. So here’s this kid that had five teeth pulled, and here’s
    this sergeant out there trying to teach us on a hot day how to do close-order drill. So this kid is just hurting. He’s
    got blood running out of his mouth and he’s about ready to faint really. That sergeant said, “What’s the matter with that
    man? This is the sorriest bunch that I ever worked with!” One of the guys that had nerve enough said, “He just had five
    teeth pulled.” So he had him fall out and go to the tent. We had tents to sleep in. He went in there and lay down in the
    tent. I guess he got along okay–I don’t know. This one kid had zits all over his face. The sergeant said, “Fall out. I
    want you all to go down and shave.” He said, “Sergeant I don’t shave.” He said, “You heard me. I said go down there and
    shave. I want you back here in five minutes.” Well, the kid went down there and shaved. But if you shave the tops off
    of those, you are bleeding like a stuck hog. So he sent him to sickbay–which is a place that you go for treatment.
- speaker: Interviewer
  text: They taught you how to fire a weapon?
- speaker: Respondent
  text: They did. Yes.
- speaker: Interviewer
  text: And they taught you how to fight in many ways. What weapons did they teach you to use?
- speaker: Respondent
  text: We learn how to do stick fighting, knife fighting and bayonet fighting where you stab a dummy.
- speaker: Interviewer
  text: So they taught you how to kill?
- speaker: Respondent
  text: Yes, they taught us how to kill and by then we were mad. They planned that. I was going to tell you how they taught
    us to fire the rifle. We’ve spent three weeks on the gravel with sore elbows. Three weeks for eight hours a day. One day
    they came to us and said, “Guess what? We’re going to give you a bullet tomorrow and you will get to fire it.” Everybody
    looked to each other like oh boy! We had been practicing–they call it snapping in. They had a neat little way of teaching
    you how to sight in on the target. It consisted of the end of a tomato can with a hole punched right in the center with
    an ice pick. They would put it on a stake about 30 or 40 feet away. You are supposed to use the hole in the tomato can
    lid as the sight and put that little square right at the bottom of the whole teaching you how to sight the rifle, which
    by the way were M-1s that weighed about 8 pounds. Everybody before I used the 03 rifle which was an old-time rifle that
    was used in World War I.
- speaker: Interviewer
  text: So then you graduated from boot camp?
- speaker: Respondent
  text: Yes, after 8 weeks of downgrading. They just did everything in the world to us. We never had any sugar. They had Jell-O.
    I remember that first day when we went to the line, that old sergeant had a cigarette hanging out of his mouth. He had
    hairy arms and he was wearing a T-shirt and he said to me, “Where do you want your gravy?” I said to him, “Well, Mama
    usually puts it on my potatoes.” He had a ladle that must have held a quart, or maybe half a pint. He scooped that gravy
    up and he put it on my Jell-O. (Chuckle) Then he said, “Move on Marine.” The next day I thought, I can play that game
    too. So he said to me, “Where do you want your gravy?” I said, “On my Jell-O,” and that’s where he put it. He said, “Where
    do we get these people? We have a war to win! Where does he come from? Why does that kid one his gravy on his Jell-O I’ll
    never know!” (Laughter) He was downgrading me again. Gravy was running all over the floor and we were walking in it–but
    of course we were going to be the ones to clean it up. They treated you mean.
- speaker: Interviewer
  text: Obviously, all of the boys were about the same age, but you had to be terribly nervous because you didn’t know where
    you were headed.
- speaker: Respondent
  text: We never knew. We spent a year learning how to fire all of these different kinds of weapons, machine guns, mortars,
    flamethrowers and anti-tank guns. After a year, we spent a lot of time in the field eating junk. I was in Area 12. I don’t
    know what that meant, but it was a couple hundred men in these wooden barracks. They each had two floors. We had movies
    at night. We went down into the boon docks, into the creek bottoms where there was sand and we learned how to do judo.
    That’s where you take a guy and throw him over your shoulder. We had to know all of that stuff. We were perspiring and
    we had sand all down in us. We went up to the top floor of that barracks where they had a black board and an instructor
    who was a 1st Lieutenant. They were going to teach us mathematics, because if you are going to fire into the enemy you
    have to
