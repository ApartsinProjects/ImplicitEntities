collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So Howard, would you state your full name, please?
- speaker: Respondent
  text: Howard Gentry Barnett Junior.
- speaker: Interviewer
  text: Your birth date?
- speaker: Respondent
  text: June 10th, 1950.
- speaker: Interviewer
  text: Your present age?
- speaker: Interviewer
  text: And where were you born?
- speaker: Respondent
  text: Kansas City, Missouri.
- speaker: Interviewer
  text: Now there's a story about your birth. Why don't you tell us that?
- speaker: Respondent
  text: I was born in Kansas City. I was adopted at birth, and my parents flew up to Kansas City. I was or weeks old - no
    one ever told me exactly how old - and flew me back to Tulsa, so I had my first plane ride when I was weeks old. And lived
    here ever since.
- speaker: Interviewer
  text: Did you ever try to figure out, go back to who your biological parents were?
- speaker: Interviewer
  text: It was no interest to you?
- speaker: Respondent
  text: No interest. I mean, and think with most adopted people I've known, there really isn't an interest. It's kind of a
    TV thing, and I'm sure if you had a bad problem or something like that, it might be looking for any port in a storm kind
    of situation, but no, no, it wasn't. I mean, you think about it, John - in post-war, conceived 1949 - not likely to be
    a good story, frankly.
- speaker: Interviewer
  text: Your mother's name?
- speaker: Respondent
  text: Florence Lloyd Jones Barnett.
- speaker: Interviewer
  text: She had a nickname, didn't she?
- speaker: Interviewer
  text: Why Bisser?
- speaker: Respondent
  text: When she was born, Jenk Jones, who you have interviewed - Jenkin Lloyd Jones, my uncle - was years old, and he couldn't
    say "baby sister." He'd say, "bi-sser, bi-ser," and that warped into "Bisser", and that stuck for the rest of her life.
- speaker: Interviewer
  text: So who was her father?
- speaker: Respondent
  text: Richard Lloyd Jones.
- speaker: Interviewer
  text: And he was the owner-editor of the Tulsa Tribune?
- speaker: Respondent
  text: Owner, editor, publisher, yes. He bought it from Charles Page in 1919 and changed the name to Tulsa Tribune. It was
    the Tulsa Democrat. Stayed in the family 'til we had to close in 1992.
- speaker: Interviewer
  text: Let's talk about your mother - where she was born and grew up, and her personality. Go ahead and describe her.
- speaker: Respondent
  text: Well, she was born in Madison, Wisconsin, and of course the whole family is Wisconsin roots. They all went to University
    of Wisconsin - you know, both my uncles and my mom, my grandfather, grandmother, everybody went to University of Wisconsin.
    She moved to Tulsa, of course, in 1919 when her dad bought the Tulsa Tribune and, you know, went to school here, graduated
    from Central High School in 1930, went on to University of Wisconsin, of course. And then she actually started working
    in New York and then came back to Tulsa somewhere in the mid-thirties, met my dad. The rest, as they say, is history.
    She was a very, very, very interesting woman - well-read, well-educated, and just a lot of fun to be around. But she was
    also very - she volunteered, she did not work outside the home, but she volunteered in numerous charitable organizations.
    And remember when she was inducted into the Tulsa Hall of Fame - I'm not sure, but '98 or something like that - and did
    her introduction. It was really very much of a pleasure to be able to do that because she deserved it as much as anybody
    in Tulsa did. And she gave me the best advice ever got in my whole life. When I was a senior in high school - or junior
    high school, guess - I had got admitted to Rice University, early admissions. I was gonna be an engineer, because I liked
    math and science. And I met a girl, and she was gonna go to Sophie Newcomb in New Orleans, and so applied and got in to
    Tulane. And then we broke up. And told my mom I was gonna go back to Rice - that's my original - she said, "No, go to
    Tulane. Get a diversified education. Go to New Orleans." And did, and it certainly changed my personality totally, so
    it was a wonderful piece of advice. She was a very wise woman. Very wise woman.
- speaker: Interviewer
  text: And then your father's name?
- speaker: Respondent
  text: Howard Gentry Barnett Senior.
- speaker: Interviewer
  text: And then where did he grow up, and his personality?
- speaker: Respondent
  text: He grew up in Gregory, Texas, which is a little town about miles outside of Corpus Christi. His dad was a banker.
    Unfortunately, his parents died young. He was in school at SMU, and he had to leave school - so he never graduated college
    - to take care of his younger sisters. His family - he had sisters. One was a little bit older than him, and the other
    two were like years younger. So he had to do that. Like said, never graduated college. My dad was a very - I described
    him when he died in a little brief eulogy - I mean, a man of the highest integrity I've ever known. I mean, honest to
    a fault. Of course, he became a banker, started a bank in 1949 here in Tulsa - Brookside State Bank - basically ran that
    until we sold the bank in 1985. Describing his personality is really tough, John. He was not outgoing, and yet he was
    charming. People really liked being around him, but he really didn't seek out any kind of outward activities.
- speaker: Interviewer
  text: I wanna go through your family tree -
- speaker: Interviewer
  text: Because it's very interesting. It includes - not that you people are not famous - but there is someone here that is
    known maybe worldwide, so want to go from that. So let's start with your mother, Florence -
- speaker: Respondent
  text: Lloyd Jones Barnett.
- speaker: Interviewer
  text: And why was the Lloyd also applied to females?
- speaker: Respondent
  text: Well, the name was originally hyphenated as Lloyd-Jones, and many people in our wide family tree still use the hyphen.
    But in my part of the tree, they decided to drop the hyphen, but everybody still viewed that as kind of their name. I
    mean, all the women took Lloyd Jones as their middle names when they got married. So instead of like today - very often
    a woman with, you know, Jane Smith marries John Doe, she'll become Jane Smith Doe and give up whatever her middle name
    might have been - not in our family.
- speaker: Interviewer
  text: So Lloyd Jones was actually the last name?
- speaker: Respondent
  text: Last name, yes.
- speaker: Interviewer
  text: Then her father, as we said, was Richard Lloyd Jones, owner of the Tulsa Tribune. All right, then he had sons?
- speaker: Respondent
  text: Yes, two sons - Jenkin Lloyd Jones and Richard Lloyd Jones.
- speaker: Interviewer
  text: So Jenkin Lloyd Jones Senior -
- speaker: Interviewer
  text: Had a sister?
- speaker: Respondent
  text: My mother. My grandfather, Richard Lloyd Jones, was brother to Frank Lloyd Wright's mother. And they grew up in the
    same area in Spring Green, Wisconsin. Frank Lloyd Wright and Richard Lloyd Jones were first cousins. About the same age.
- speaker: Interviewer
  text: That's because - ?
- speaker: Interviewer
  text: Either his father or his mother…?
- speaker: Respondent
  text: His father and Frank's mother were siblings.
- speaker: Interviewer
  text: We have Frank Lloyd Wright buildings in our state…
- speaker: Interviewer
  text: …in our city.
- speaker: Respondent
  text: Westhope. Richard Lloyd Jones built Westhope.
- speaker: Interviewer
  text: And Richard Lloyd Jones didn't live there, did he?
- speaker: Respondent
  text: Yes, he did.
- speaker: Interviewer
  text: Oh, he did?
- speaker: Respondent
  text: Yeah, he lived there till he died.
- speaker: Interviewer
  text: Oh, really?
- speaker: Respondent
  text: Mm-hmm, mm-hmm. Yeah.
- speaker: Interviewer
  text: Richard Lloyd Jones Senior.
- speaker: Interviewer
  text: Then we have Bartlesville - the Price Tower.
- speaker: Interviewer
  text: Did a little research on this. You probably know that it comes from Harold C. Price Sr., who was head of the pipeline
    construction from HC Price Company. You're nodding your head - you knew that. Didn't have to tell you that. And he wanted
    to develop a headquarters in Bartlesville, so he hired Frank Lloyd Wright to design the headquarters for his company.
- speaker: Respondent
  text: Frank's only skyscraper.
- speaker: Respondent
  text: If you can call a 15-story building anymore a skyscraper.
- speaker: Interviewer
  text: Margaret and I were in Scottsdale several weeks ago, and we saw his winter home there. And his working lab, which
    - the whole thing was very interesting.
- speaker: Respondent
  text: At Taliesin West?
- speaker: Interviewer
  text: Yes, right. Very interesting place in a nice location. Frank Lloyd Wright died in 1959. You were years old. Were you
    ever around him or ever see him?
- speaker: Respondent
  text: My mother told me that did meet him, but did not know. Got to know his last wife, Olgivanna. And went out to Taliesin
    West, where she still literally held court. That was a training ground for young architects, but she would have, I mean,
    formal dinner every night. It was an interesting place.
- speaker: Interviewer
  text: In West, and were you there too? You visited that?
- speaker: Respondent
  text: Visited, yes.
- speaker: Interviewer
  text: What a remarkable man. But we're here to talk about you.
- speaker: Respondent
  text: It's all right.
- speaker: Interviewer
  text: But that's interesting - that lineage that you have there.
- speaker: Respondent
  text: Just for the record - I mean, Richard Lloyd Jones Senior's father, Jenkin Lloyd Jones, was a very famous, probably
    the most famous of all of them, in terms of "countrywide." He was the first Unitarian minister west of the Appalachian
    Mountains, rode on the Hope ship with Henry Ford, and he was a pretty big guy back in the day.
- speaker: Interviewer
  text: So is the name Westhope tied to your story there?
- speaker: Respondent
  text: Unfortunately, don't know it. It relates back to a place that my grandfather knew in Wisconsin, but I'm not sure exactly
    what the connection is.
- speaker: Interviewer
  text: When you were around your tables and eating and dinners and so forth, was there much talk around the table about the
    Tulsa Tribune and the paper business? Did they talk about that a lot at home?
- speaker: Respondent
  text: Not really. I mean, it came up, but that was not anywhere near the focus of conversation.
- speaker: Interviewer
  text: Your education - where did you go to grade school?
- speaker: Interviewer
  text: Junior high?
- speaker: Interviewer
  text: And that was through high school, and that was junior high and high together, weren't all -
- speaker: Respondent
  text: Full six years, yes.
- speaker: Interviewer
  text: And when did you graduate?
- speaker: Interviewer
  text: That was a remarkable year in our nation, wasn't it?
- speaker: Respondent
  text: Yeah, it was quite a year.
- speaker: Interviewer
  text: Robert Kennedy was assassinated.
- speaker: Respondent
  text: Martin Luther King -
- speaker: Interviewer
  text: '- was assassinated.'
- speaker: Respondent
  text: The crazy Democrat convention in Chicago.
- speaker: Interviewer
  text: And so you were aware of all that. I don't know if people talked about it in school or not. And then you went on to
    where - college after that?
- speaker: Respondent
  text: Started Tulane. Did a couple of years there and then transferred back to the University of Tulsa and graduated University
    of Tulsa in 1972.
- speaker: Interviewer
  text: And then, further?
- speaker: Respondent
  text: Law school, SMU. Southern Methodist University in Dallas. Graduated in '75.
- speaker: Interviewer
  text: Why did you choose law school?
- speaker: Respondent
  text: You know, wish could give you some really neat story about wanting to be a lawyer or having seen some lawyer that
    impressed me with - it just - I learned early on in my education that I liked arguing, and don't mean that in a negative
    sense. I mean just in terms of the logic involved. In school, when the teacher would ask, "Who wants an essay test versus
    a multiple choice?" - I'm the one kid raising his hand for the essay test. So it just - it, just sort of gravitated to
    it. Figured out in college that that's kind of the way my brain worked.
- speaker: Interviewer
  text: So then when you graduated in '75 -
- speaker: Interviewer
  text: Then what did you do?
- speaker: Respondent
  text: Practiced law.
- speaker: Interviewer
  text: And who were you with?
- speaker: Respondent
  text: I was with a small boutique law firm here in Tulsa. When I joined, it was called Sneedling and Trotter, and by the
    time I left it almost years later, it was Sneedling, Adams, and Barnett. It was a small firm - about six lawyers when
    I joined it, and when I left. So it grew during those wonderful days - you'll remember the '70s and '80s, the boom days
    of the oil business - and that's kind of how the firm was.
