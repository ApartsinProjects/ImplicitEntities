collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So, Denny, would you state your full name, please?
- speaker: Respondent
  text: My name's Charles Dennis Cresap.
- speaker: Interviewer
  text: Okay, everybody knows you as Denny. Got to ask you how it came about using Denny or Dennis rather than Charles.
- speaker: Respondent
  text: Well, my father and mother, especially my father, thought I'd go by my middle name, and it was Dennis, and he thought
    I might be an author someday, so he came up with the idea of my pen name would be Charles Dennis. But go by Denny.
- speaker: Interviewer
  text: Was he a writer himself?
- speaker: Respondent
  text: No, sir. He never wrote anything.
- speaker: Interviewer
  text: All right. What is your date of birth?
- speaker: Respondent
  text: October 20th, 1934.
- speaker: Interviewer
  text: And that makes your present age?
- speaker: Interviewer
  text: All right, and we're recording this interview here in the recording facilities of VoicesOfOklahoma.com. So tell us
    where you were born.
- speaker: Respondent
  text: I was born in Chicago, Illinois.
- speaker: Interviewer
  text: Let's talk about your mother, your mother's name, and where she came from.
- speaker: Respondent
  text: My mother's name was Gwendolyn Atchison, and she was born in Kansas City, Missouri.
- speaker: Interviewer
  text: What kind of personality would you give her?
- speaker: Respondent
  text: She was very vivacious and liked to meet people and be involved with people, and she worked for years when we lived
    in Veneta for the mental hospital in Veneta, placing people in nursing homes.
- speaker: Interviewer
  text: Do you think you draw any traits yourself from her?
- speaker: Respondent
  text: Yes, yes, probably do. I like to meet people and enjoy visiting with people and making connections.
- speaker: Interviewer
  text: And that's what she was like?
- speaker: Respondent
  text: She was like that.
- speaker: Interviewer
  text: All right, so then your father's name?
- speaker: Respondent
  text: Charles Laverne Cressop.
- speaker: Interviewer
  text: And where did he grow up?
- speaker: Respondent
  text: Well, he was born in Trenton, Missouri, and then he went to school at the Platt Business College in St. Joe, Missouri.
- speaker: Interviewer
  text: So then describe his personality.
- speaker: Respondent
  text: He liked people, and he played semi-pro basketball for the college there in St. Joe, Missouri.
- speaker: Interviewer
  text: All right, and so he too was outgoing.
- speaker: Respondent
  text: Yes, both of them were very outgoing, and he started his career working for Armour and Company in St. Joe, Missouri,
    and then after that he got transferred to Kansas City to the Stockyards.
- speaker: Interviewer
  text: So you couldn't help yourself? You couldn't help yourself by getting out there. If you had two people who wanted to
    get out and meet people, you were destined to do that.
- speaker: Respondent
  text: Right, and they met at the Kansas City Stockyards. My dad was with Armored, like said, and my mother worked for a
    commission company there in the Exchange Building.
- speaker: Interviewer
  text: So the Stockyards brought your parents together?
- speaker: Respondent
  text: Brought them together, and they started dating, and they used to go to, like to go to the Mule Bock Hotel in downtown
    Kansas City for lunch.
- speaker: Interviewer
  text: Yeah. So then how did they end up in Chicago, since you said you were born there?
- speaker: Respondent
  text: Well, Armour and Company transferred my parents to Chicago in the early 1930s, and he ended up being the head calf
    buyer for Armour and Company in Chicago.
- speaker: Interviewer
  text: Okay. Did you have brothers and sisters?
- speaker: Respondent
  text: I had one brother. I'm four years older than my brother, Henry Keith Cressip, and he goes by the name Keith.
- speaker: Interviewer
  text: And is he still living today?
- speaker: Respondent
  text: Yes, he is. He lives in Veneta, Oklahoma. He's retired from the insurance business.
- speaker: Interviewer
  text: All right. So how long were you around the Veneta area, your family?
- speaker: Respondent
  text: My parents moved to Veneta in 1951 after my dad retired from Armour and Company. I was in Chicago at Morgan Park Military
    Academy, and that was between my junior and senior year. So stayed in Chicago to finish my senior year of military school.
- speaker: Interviewer
  text: You were born in 1934. We had the stock market crash, the beginning of the Depression, ends in 1932. You weren't even
    born yet. But did your family get affected by the Depression, and how were they affected?
- speaker: Respondent
  text: Well, they really weren't affected very much. He had such a good job with the Armour and Company that we knew that,
    guess, the Depression was going on in Chicago, but he wasn't affected like a lot of people were.
- speaker: Interviewer
  text: Was there a foster child by the name of June?
- speaker: Respondent
  text: Yes. While we lived in Chicago, we would take in foster children, and they would live with us. June was one of the
    girls, and she went to Calumet High School and took care of my brother and me at this young age.
- speaker: Interviewer
  text: Okay. So you had foster children in and out of your home.
- speaker: Respondent
  text: Yes. And that was there on the south side of Chicago.
- speaker: Interviewer
  text: Many of them then went on to live good lives and all?
- speaker: Respondent
  text: Yes. There were two or three girls. They lived with us when my brother and I were younger.
- speaker: Interviewer
  text: So then your education, your elementary school, where was that?
- speaker: Respondent
  text: I was in Palos Heights, Illinois.
- speaker: Interviewer
  text: And then on to junior high and to high school. What high school did you graduate from?
- speaker: Respondent
  text: I went to Morgan Park Military Academy on the south side of Chicago.
- speaker: Interviewer
  text: Tell us about that, Morgan Park Military Academy. Why there, and what was that about?
- speaker: Respondent
  text: Well, friends of my parents, the Thralls that lived on Beverly Hills on the south side of Chicago, their son and son-in-law
    both went to Morgan Park Military Academy, and they suggested that my father and mother send me to the school. And it
    was kind of the in thing right after the Second World War for young men to go to military school. Some had to go because
    they got in trouble, and some went just to be able to go to the military school. And our uniforms were just like West
    Point.
- speaker: Interviewer
  text: Okay. So was that a good experience for you?
- speaker: Respondent
  text: It was an excellent experience. I learned a lot about discipline and out there again how to get along with people,
    make the connections, and met a lot of fellow students that I still know today. One lives in Chicago, and one lives in
    California.
- speaker: Interviewer
  text: Did that make you want to continue in the military as a result of that experience?
- speaker: Respondent
  text: Well, when first, after finished Morgan Park and graduated, went to move to Veneta that summer, and from there went
    to Oklahoma University in 1952.
- speaker: Interviewer
  text: So you graduated from Morgan Park in or 52?
- speaker: Interviewer
  text: 1952, right.
- speaker: Interviewer
  text: Pearl Harbor, December 7th, 1941. You would have been seven at the time. I don't know if what you might remember about
    rationing and all that at seven. There might be some things you remember.
- speaker: Respondent
  text: I remember gasoline being rationed. Rationed gasoline stamps, and there was also other items, tires. Certain types
    of food products were rationed, and my father had access to a lot of tubs, pound tubs of butter with Armour and Company,
    and he was able to take the butter, and he had a friend that had nylon hose, so they traded nylon hose in butter back
    in those days.
- speaker: Interviewer
  text: Do you remember the day of December 7th? December 7th, 1941, how that came about?
- speaker: Respondent
  text: Vaguely, remember the bombing of Pearl Harbor, and remember the day that the Second World War was over also. We happened
    to be in Michigan at Indian Lake, and everybody was celebrating, and some of the people were so happy and thrilled, they
    actually pushed over some outhouses and set them on fire to celebrate.
- speaker: Interviewer
  text: You would have been about years old.
- speaker: Respondent
  text: That's correct.
- speaker: Interviewer
  text: The Thralls, what are their first names?
- speaker: Respondent
  text: Art and Mildred Thrall became friends of my parents when they lived on the south side of Chicago, and Art Thrall,
    actually, when my mother and I came home from the hospital, he carried her up the stairs, and they carried me up the stairs
    also to a third-floor apartment. Art Thrall was a self-made man. He started out in the 1920s working for the Illinois
    Central Railroad, and later he and his brother-in-law started Thrall Car Company in Chicago Heights, Illinois, repairing
    railroad cars. During the Second World War, Art was a dollar-a-year man for the government, and his company manufactured
    a hospital train for the government.
- speaker: Interviewer
  text: Tell us what that means, a dollar-a-year man.
- speaker: Respondent
  text: During the Second World War, there were a lot of businessmen that were advisors to the U.S. government, and that's
    what they were paid, a dollar a year to be advisors.
- speaker: Interviewer
  text: So they had to be paid something, and so they were happy. So they just gave their time then, didn't they?
- speaker: Respondent
  text: They gave their time and expertise in whatever field they were experts in.
- speaker: Interviewer
  text: Back to the military academy, some of your classmates, you referred to them as people you know now, but some of them
    were the sons of some questionable character.
- speaker: Respondent
  text: Yes. During my time at military school, one of the young men, Charles O'Brien, came from Detroit. And years later,
    when my wife and I lived in Oklahoma City, on the o'clock news, they had a report that Chuckie O'Brien had been indicted
    for trying to bribe the jury in Tennessee for Jimmy Hoffa. And I told my wife that, "well, that's the same fellow went
    to military school," and she couldn't believe it. So I found them, got a yearbook, and pulled it out, and there he was,
    Charles O'Brien. And he had gone to military school with me for two years, and his mother was the personal secretary to
    Jimmy Hoffa. And he was like a son with Jimmy Hoffa Jr. And actually, he is the driver that drove Jimmy Hoffa to the luncheon
    that day when Jimmy Hoffa disappeared. And then after that, why, Chuckie and Jimmy Hoffa, the junior had a big falling
    out.
- speaker: Interviewer
  text: And that was like in 1975 when that happened.
- speaker: Interviewer
  text: Right. So then Chuckie became a person of interest then in the disappearance of Hoffa.
- speaker: Respondent
  text: Yes. They never were able to figure out what happened to Hoffa. And Chuckie said that he didn't know anything other
    than he just dropped him off for lunch at that restaurant that day.
- speaker: Interviewer
  text: He never had lunch with him. He just dropped him off.
- speaker: Respondent
  text: He just dropped him off. Yeah. Bet he got a lot of questions.
- speaker: Interviewer
  text: He got a lot of questioning, didn't he?
- speaker: Respondent
  text: A lot of questions.
- speaker: Interviewer
  text: What was speculation about where Hoffa might have ended up? Anybody? Even in the football field, think, at the end
    of the zone.
- speaker: Respondent
  text: Anybody's guess.
- speaker: Interviewer
  text: Right. Any other classmates that were characters that you might think of? Don Sweeney?
- speaker: Respondent
  text: Don Sweeney was a classmate also. His real name was Don Swinarski. And his father was a state representative from
    the West Side Block in Chicago. The West Side Block was the area on the west side of the stockyards, a very democratic
    stronghold. And that's also where Mayor Daley started his career as an attorney, was on the west side of Chicago. And
    Don Sweeney's father was in the refuge business with his relatives, which was a very lucrative business in Chicago. But
    in those days, the control of Cook County, with the Democratic Party, everybody had an assignment. And it was so well
    organized. They had precinct captains. They had block captains that were required to get everybody out to vote when they
    had elections.
- speaker: Interviewer
  text: There were those who said that dead people voted in Chicago.
- speaker: Respondent
  text: I think they still are to this day. They might be. But to show you how much influence Don Sweeney had, we decided
    to give our senior class, class president a gift. And we went down to the stockyards on the west side where they manufacture
    beautiful leather luggage. And we went into the plant and showed his father's business card to the owner. And he said,
    "oh, you're Swinarski's kid." He said, "you can pick out any luggage you want, and I'm going to sell it to you 50% under
    wholesale."
- speaker: Respondent
  text: And then another interesting situation was after our senior prom, which was out on the very far south side of Chicago,
    we wanted to go to Cicero out on the west side to one of the nightclubs. And we couldn't figure out how we were going
    to get from the far south side of Chicago way out to Cicero. And Swinarski said, oh, that's easy. "We'll get a police
    escort. My father got... We got connections with the state police." So after our dance at midnight, we all lined up on
    111th Street, and we had an escort across the city of Chicago with the state police to go to our after party.
- speaker: Interviewer
  text: So your family then, as you've alluded to, moved to Veneta because your dad's cattle buying business.
- speaker: Respondent
  text: Yes. Right. He had retired from Armour. Well, he had actually, in 1948, had moved from Chicago out to the suburbs
    to Palos Heights, which was halfway between Joliet and downtown Chicago, the Loop. And when he retired, he had a friend
    at the stockyards named Homer White. Homer White had a stockyards within the stockyards. And his stockyards fed cattle
    that were being shipped through Chicago from the east coast to the west coast. And he had a sale barn in Veneta, and he
    suggested it might... So my dad come down and look at buying cattle in Oklahoma after he retired. So my father spent 1951,
    two or three months in Veneta buying cattle. And when school was over in June of 1951, my brother, my mother, and I went
    to Veneta for a week to see what Veneta looked like. Well, after living in Chicago all my life, Veneta was kind of a big
    change. And while there, my father kept saying "you got to see Grand Lake, you got to see the dam." So we actually went
    out five miles on 66, 69, and 66, which before the turnpike was built. And we turned right to go to Langley and off of
    Highway 66, all the way to the dam was a gravel road. So we could hardly wait to get in the car and go back to Chicago.
- speaker: Interviewer
  text: I can understand.
- speaker: Respondent
  text: But they decided to move to Chicago.
