collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Can ask you where Gray comes from?
- speaker: Respondent
  text: So Gray is my mother's mother's maiden name. So they were all Grays. And think that our parents, when they name us,
    they're struggling with how to make everybody happy. They didn't really care. I was originally going to be called Sam.
    Then have no idea what my middle name would have been, but that would have been after Sam Gray, my great uncle.
- speaker: Interviewer
  text: Any story to East, the name East?
- speaker: Respondent
  text: No, not really. I mean, they were... They came over from France, France to Ellis Island, and then into the States.
    My grandfather, who never met, named Sam East. That was a confusing... I was going to be called Sam, but it was after
    my great uncle, not after my grandfather. I never met him. And he was a railroad man and worked for, primarily, the Missouri
    Pacific and then later the Midland -- Midland something or another -- based in Muskogee.
- speaker: Interviewer
  text: Your birth date?
- speaker: Respondent
  text: August 21st, 1954.
- speaker: Interviewer
  text: Your present age?
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Muskogee, Oklahoma. Baptist Hospital.
- speaker: Interviewer
  text: Is that where you grew up?
- speaker: Respondent
  text: Mm-hmm. Spent my first years there before went off to Oklahoma State University.
- speaker: Interviewer
  text: Your mother's name and where she was born, where she grew up?
- speaker: Respondent
  text: Marjorie Sugg, S-U-G-G, and she grew up in Ada, Oklahoma, and went to school there, then became a teacher, and eventually
    landed a job in Muskogee. And met my father, Paul East, who had recently returned from the war and was living in Muskogee
    with his mother and, think, two of his siblings. Think one had already left.
- speaker: Interviewer
  text: About your mother's personality, what kind of a person was she?
- speaker: Respondent
  text: I am a Sugg. And so I've always been told that by both the East side and the Sugg side. So the Suggs were extroverts.
    My grandfather, from Ada, was in the legislature for about three terms, primarily during the war, since all the younger
    legislators went off to fight. And my grandmother came from Tennessee. You know, they are... They were just hard-working
    people. My grandfather ran a... You know, I'm not really sure how he would describe it, but he did... He helped people.
    He sold some insurance. He helped a variety of Indians with their trust matters. So he got into a little bit of oil and
    gas. But he was just kind of a... He would just do things for people.
- speaker: Interviewer
  text: So your personality of your mother was then, since you're outgoing, she was outgoing and personable and...
- speaker: Respondent
  text: Very much so. So she was, and she had to be, since she was a public school teacher. You know, you had to stand in
    front of a group of children every day and get them interested. And so she was a Latin and a Spanish teacher, which usually
    meant, for the first couple of weeks, she's the only one doing the talking. So, yes, she was an extrovert.
- speaker: Interviewer
  text: Was she... Because of that, she was really watching… Peering over your work when you were elementary and going up
    the ranks?
- speaker: Respondent
  text: 'So I''m the youngest of three children. My oldest brother, David, was studious, a good student, and not a rabble
    rouser. My middle brother, John, who''s deceased, he similarly was a pretty good student and was anything but a rabble
    rouser. And then the third child. And so mother liked to -- and father both -- liked to explain it this way: That one
    day, one of my former teachers -- 6th grade teacher, Mr. Crouch -- came into my father''s store. And while they were going
    back in the warehouse to get whatever he wanted, Mr. Crouch started talking about the boys. And when he got to me, he
    said, ''Well, of course, did go to prison, but not by the courts.'' I went there to interview killers, murderers, etc.,
    etc. So, yes, that was the big joke in the family.'
- speaker: Interviewer
  text: Yeah. So then your father and where he grew up and what he did for a living?
- speaker: Respondent
  text: He grew up over in Arkansas, a little town called Norman, Arkansas, which is best located by 'it's about miles south
    of Mount Ida,' which people around Tulsa may know because they used to drive through it when they were on their way to
    Hot Springs. So he grew up in that area. The family were all farmers. And then his father started working for the railroad.
    That meant that he had to travel. And then eventually he got a good enough position that the whole family would with him.
    So he, father lived primarily in Pawhuska, maybe one other town, and then Muskogee. He eventually, after he came back
    from the war, partnered with another man to start a maintenance business to sell everything from toilet paper, to barrels
    of wax, to solo coffee cups. And while this was never a proven fact, the reality was that these businesses -- there were
    three of these businesses -- one in Oklahoma City, one in Arkansas, and then my father's in Muskogee. And they had an
    agreement that they would not get into either… each other's property. And so the former mayor of Newark, his parents owned
    the one in Oklahoma City, can't remember the person in Arkansas but they split it up. And so it was a profitable and a
    good business that father stayed with -- with Mr. Tackett, his partner -- until he sold it shortly before mother passed
    away and then lived off the proceeds.
- speaker: Interviewer
  text: You said earlier a store that your mother -- what store?
- speaker: Respondent
  text: My father had a… you would go by it and it was a very large warehouse, about a football field-size. And then that…
    all the product was in the back. And then up front, there was a kind of a retail. So you could actually pick the brush
    or you could say you wanted this cup and he had all that displayed in there.
- speaker: Interviewer
  text: So, but -- he primarily sold to…?
- speaker: Respondent
  text: Schools, states, corporations, businesses… very seldom did people come in. People came in that they knew that that
    was a place that could get a specific item. And so, but no, there wasn't a lot of commercial retail.
- speaker: Interviewer
  text: So you helped them sometimes in that business?
- speaker: Respondent
  text: All three of us. All three boys were tasked with loading large trucks. And my goal, my responsibility, primarily,
    was when we went to the rail yard, because a lot of this stuff would come in on in boxcars. And I was the shortest. So
    I was the only one that could climb up in the top of the boxcar and get those items that were squeezed in there by Fort
    Howard Paper. Georgia Pacific or whatever and get those out. So, yes, we loaded warehouses on Sundays and the trucks then
    left on Monday morning. We did a few deliveries during summer, but didn't do much of that. But it did give me my first
    glimpse into rural Oklahoma.
- speaker: Interviewer
  text: Yes, because you went to every small town there was.
- speaker: Respondent
  text: That's correct. In eastern Oklahoma.
- speaker: Interviewer
  text: Right. That type of business didn't continue, or did it?
- speaker: Respondent
  text: It kind of did for a while, and then it stopped, and then you could buy direct and so school systems would buy direct
    for barrels of wax, or a load of toilet paper, or whatever. And then you could also buy a lot of this stuff at Target
    and stores like that that really didn't exist back when I was a kid.
- speaker: Interviewer
  text: So… and the Walmarts, suppose.
- speaker: Respondent
  text: That's correct. Definitely a Walmart.
- speaker: Interviewer
  text: Right. So his personality must have been outgoing as well.
- speaker: Respondent
  text: No, it wasn't. He ran the store. Mr. Tackett was the more outside, the salesperson. But he was quiet. Mother was the
    social. And remember a time that we were on our way to Norman, Arkansas to see his grandmother who lived until she was
    102. And we stopped in Poteau at the Black Angus, which at the time was owned by Bob Kerr. And we're in a booth or whatever,
    getting some lunch or something before we finish the trip. And this very large man comes over. And looks at my mother
    and he goes, 'Marjorie Sugg.' And she says, 'Bob Kerr, nice to see you.'
- speaker: Interviewer
  text: Hmm. Senator Bob Kerr.
- speaker: Respondent
  text: That's correct. That's the only time ever met him. And didn't meet him really because he just came over to say hello
    to my mother.
- speaker: Interviewer
  text: And why would he have known her?
- speaker: Respondent
  text: Ada. So he grew up in Ada. He knew her. They were about the same age. It was kind of before he started getting into
    politics. By this time, he was the U.S. senator, but he was at his restaurant doing what he did.
- speaker: Interviewer
  text: The Black Angus.
- speaker: Respondent
  text: The Black Angus. Yes. In Poteau, Oklahoma.
- speaker: Interviewer
  text: How about that? He was a restaurateur. Didn't know that.
- speaker: Respondent
  text: Yeah. I'm not sure whether he started or he bought it. He was kind of known for… when people were in tough times,
    he'd come in and help them. And then frequently he'd own the thing eventually.
- speaker: Interviewer
  text: So you were exposed to the world of education, a teacher. You were exposed to business, salesmanship, and all that.
    And your young mind. Don't know if you were even when you began to think of what want to do, but maybe you knew what you
    didn't want to do?
- speaker: Respondent
  text: 'I knew did not want to go work in the warehouse and load trucks. I was not interested in manual labor. So that was…
    you''re exactly right. And think that is a great way to go through life: not just knowing what you want, but also what
    you don''t want. And we use that skill today. You know what we want to eat, what we don''t want to eat. But exactly. And
    as you mentioned, not just those things, but also was exposed to politics and government very early.'
- speaker: Respondent
  text: So, in part, talking to my grandfather. Because by this time he had been out of the legislature, but he still liked
    to talk about it. And so he would. And when I started into the newspaper business, he was a strong influence on me on
    a variety of things. And so I'm sure had discussions with him when I was 10, 11, 12, about government and politics. Don't
    remember specifics, but am sure did -- just knowing him and knowing me at that time.
- speaker: Interviewer
  text: Tell me about grandfather, Sam.
- speaker: Respondent
  text: His name was Harbord Presnell Sugg. Oh. So most people just called him 'HP.'
- speaker: Interviewer
  text: So was he a representative? Was he a senator?
- speaker: Respondent
  text: He was. He was a representative from…
- speaker: Respondent
  text: to… Yeah, he came in and they stayed during the war. And then in '46, he opted not to run and it was a mid-year redistricting.
    He was visited by a variety of powerful people from McAlester who came over and said they wanted to run a young man for
    representative. And they were going to gerrymander the district in Pittsburgh County, McAlester, to include Pontotoc County,
    which was Ada. They were just being polite by coming over and saying, That young man who actually told me the story, later
    in life, was Gene Stipe.
- speaker: Interviewer
  text: Oh, wow. Senator Gene Stipe.
- speaker: Respondent
  text: Senator Gene Stipe.
- speaker: Interviewer
  text: State Senator Gene Stipe.
- speaker: Respondent
  text: Who would interview periodically over many, many years. And while we didn't have a friendly relationship. We had a
    very cordial relationship. And at one point we were sitting out of a courtroom waiting for a trial or a jury to come back.
    Don't think it was his, but one of them. And he told me that story. And then confirmed it. My mother was still alive at
    the time.
- speaker: Interviewer
  text: So the politics side -- was that in your brain? You were curious about it and you were interested at a young age.
- speaker: Interviewer
  text: So let's take you, your education -- grade school?
- speaker: Respondent
  text: Irving Elementary, Muskogee, Oklahoma. No, did not have to go to prison. And then Alice Robertson Junior High, again
    in Muskogee. And then graduated from Muskogee High School, which was the second year that it was totally integrated.
- speaker: Interviewer
  text: So you went through integration?
- speaker: Respondent
  text: It was interesting.
- speaker: Respondent
  text: To say the least.
- speaker: Respondent
  text: Everyone was worried there was going to be a riot. And so they set up structures, and organizations, and things to
    respond in case there was a disturbance. And I was right in the middle of it all. And I was on all those boards and commissions
    and stuff. I was very active, again, going back to my interest in government. Got very interested in student government.
    And so participated in all that. And then rebelled and started my underground newspaper.
- speaker: Interviewer
  text: So in high school, you got really involved -- junior, senior probably?
- speaker: Respondent
  text: Junior year.
- speaker: Interviewer
  text: You got really involved in all that?
- speaker: Interviewer
  text: Were you supportive of the integration?
- speaker: Respondent
  text: Oh, very much so.
- speaker: Interviewer
  text: Was there a huge segment of the community that was against it?
- speaker: Respondent
  text: 'There was a vocal segment of the community that they would say they were more fearful. They weren''t against it.
    And so there were elements that were against it in Muskogee. But it went like clockwork. And give administrators -- our
    superintendent at the time -- John Tom Staten, who later became a legislator, did a couple of other things. But he handled
    it marvelously. While there were some administrators that disliked, there were also some that really rose to the occasion
    and helped guide us through it. Because it was tough. I mean, just explaining to the people in Muskogee why there was
    going to be a black basketball queen and a white basketball queen was tough. People didn''t understand. But we did that
    co-pairing through everything: high school president, the queens, the king -- all those things.'
