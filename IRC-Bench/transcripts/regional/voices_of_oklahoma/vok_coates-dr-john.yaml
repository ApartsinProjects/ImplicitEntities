collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Geary, Oklahoma.
- speaker: Interviewer
  text: Where is that?
- speaker: Respondent
  text: It’s west of El Reno by about 30 miles, 60 miles west of Oklahoma City.
- speaker: Interviewer
  text: Let’s talk about your mother. What was your mother’s maiden name and where she was from?
- speaker: Respondent
  text: Her name was Grace Blanche Spencer and she was born in Lamoni, Iowa in 1895.
- speaker: Interviewer
  text: She grew up there then?
- speaker: Respondent
  text: Yes, she grew up there and then came to Oklahoma in her late teens.
- speaker: Interviewer
  text: What brought her to Oklahoma?
- speaker: Respondent
  text: Her brother had moved out to this small town west of Oklahoma City and she followed her brother to work down there
    in this small town.
- speaker: Interviewer
  text: What was your father’s name?
- speaker: Respondent
  text: My father was Arthur Albert Coates. He was born in Madison, Wisconsin on October the 4th, 1878. He grew up in Madison
    and left there as a teenager to move to Rolla, Missouri where he opened a bakery. He built that bakery up into a prosperous
    business and then he sold it. He moved to Heavener, Oklahoma and did the same thing. He built that bakery up successfully
    and in 1901 he moved to Oklahoma City and did the same thing. His father was in business with him. His father died in
    1910. So he left Oklahoma City and that bakery and moved to Geary, Oklahoma where he opened a fourth bakery. He had $118,000
    saved up, which he put in the Oklahoma City Saving & Loan. I remember when I was 5 years old, the great crash and he got
    4 cents on the dollar from that investment, which sort of broke his heart.
- speaker: Interviewer
  text: As a matter of fact, I want to come to that and visit with you about that but then obviously your father and your
    mother met in Geary then?
- speaker: Interviewer
  text: Did she come into the bakery or how did they meet?
- speaker: Respondent
  text: He purchased a bakery where my mother worked.
- speaker: Interviewer
  text: So that’s how they met.
- speaker: Respondent
  text: Yes, they met and were married a year or two later.
- speaker: Interviewer
  text: Did you have brothers and sisters?
- speaker: Respondent
  text: I had one half-sister who was a great fan of yours.
- speaker: Respondent
  text: She has a picture signed by you on her dresser. She reminded me of that. She never missed your program. Her name was
    Mildred Owings.
- speaker: Interviewer
  text: You married in what year?
- speaker: Respondent
  text: I was married October 20, 1956.
- speaker: Interviewer
  text: Your wife’s name?
- speaker: Respondent
  text: Mary Emma Dailey.
- speaker: Interviewer
  text: Where was she from?
- speaker: Respondent
  text: She was born in Eddyville, Nebraska and moved to Oklahoma when she was a child with her parents. Her mother died when
    she was five, so she lived with her father then. There were three sisters, so the eldest sister raised her so to speak.
    She lived in Harrah, Oklahoma with her grandmother for a number of years. Harrah is east of Oklahoma City.
- speaker: Interviewer
  text: How did you meet?
- speaker: Respondent
  text: She was a nurse at Saint Anthony Hospital is Oklahoma City, the prettiest one there by the way, and I was an intern
    there. We met about June or July of 1955.
- speaker: Interviewer
  text: Do you have children from that marriage?
- speaker: Respondent
  text: Yes, I have five children. John Arthur Coates, Christopher Thomas Coates, Patrick Edward Coates, Stephen Michael Coates
    and Anne Elizabeth Coates — one girl. The eldest is 50 years old and the youngest is 38.
- speaker: Interviewer
  text: Let’s go back to when you were a child. Tell us about the first house you remember.
- speaker: Respondent
  text: I was born at home. Dr. John Browning came there and I was delivered on New Year’s Eve, so everyone celebrates my
    birthday. His name was John Browning, so he asked my father, “Are you naming him after me?” My father said, “No, we are
    naming him for a brother named John who was killed in the Civil War.” He said, “Oh, I am so sorry because if you name
    him for me there will be no charge for the delivery.” So my dad paid cash $25 for the delivery and the doctor said, “This
    is the first time in my life that I’ve ever been paid for my work on the day that I did it.”
- speaker: Interviewer
  text: So then you grew up in that house?
- speaker: Respondent
  text: I grew up in that house. We just had the one home that my father built there and it’s still there.
- speaker: Interviewer
  text: Do you have childhood memories of that house and things that you might have done or children that you played with?
- speaker: Respondent
  text: Oh yes. Most of the children in that particular neighborhood were friends of mine and we played all sorts of things
    out in our garden, which was north of the home. I recall walking to school when I was six years old and a man had been
    injured seriously and was lying on the street with his head caved in. I recall seeing that. I heard the family physician
    there in town say “send him to Oklahoma City to Dr. Harry Wilkins” who was a neurosurgeon. I thought, my, can you imagine
    repairing that? How difficult would that be and this local doctor can’t do anything like that. So that fellow in Oklahoma
    City must really be a miracle worker. That stuck with me. I never dreamed at the moment that I would be studying with
    him later when I became a neurosurgeon in Oklahoma City.
- speaker: Interviewer
  text: But at 6 years old the seed was planted wasn’t it?
- speaker: Respondent
  text: Yes. I was six years old when that occurred.
- speaker: Interviewer
  text: Did that stay with you?
- speaker: Respondent
  text: That sort of stayed with me, yes. It did and I thought it over. In World War II, when I was in the U.S. Navy, I met
    a dermatologist by the name of Silverstein, a Captain in the U.S. Navy. He invited me to come over and make rounds with
    him at the hospital and I took an interest there in the Philippine Islands in 1944.
- speaker: Interviewer
  text: I’m going to come back to that too, but let’s talk about your first school.
- speaker: Respondent
  text: It was called Willard Grade School in Geary, Oklahoma. I started there when I was five in kindergarten. I started
    a little early because I didn’t turn six until December 31 of that school year, so I was five.
- speaker: Interviewer
  text: So your experience in grade school—what was that like for you?
- speaker: Respondent
  text: Lillia Sisney was my first teacher there. She was a lovely lady who taught us well. It was a well-disciplined school.
    The superintendent was Mr. Ludwig Hove. The principal was a gentleman named Steigal. They were both wrestling coaches.
    So we had one of the finest wrestling teams in the country in Geary, Oklahoma. Many Olympic wrestlers came from there.
- speaker: Interviewer
  text: So your elementary experience was good and you went on to junior high school all there in the same school system?
- speaker: Interviewer
  text: You were a good student? Did you like school?
- speaker: Respondent
  text: Yes. I was always at least a B+ student. I often had A’s. I was interested in music. We had a bandleader that came
    there in 1939 that taught me a great deal about playing the trumpet. A year or so after he came I entered the state contest
    playing the trumpet and won first in the state. I was a junior in high school at that time.
- speaker: Interviewer
  text: Did you continue playing trumpet?
- speaker: Respondent
  text: Yes I continued playing the trumpet and I had a scholarship to the Cincinnati Conservatory of Music through the contest.
- speaker: Interviewer
  text: You must have been pretty good and pretty accomplished at it?
- speaker: Respondent
  text: I had a scholarship there and I went there when I was 17. It was June of 1942. I was there until December 31, 1943
    when I was drafted into the Armed Forces.
- speaker: Interviewer
  text: You were an accomplished musician at that time?
- speaker: Respondent
  text: Well, yes. This particular bandleader, Mr. Don McCarter inspired us all to work hard and study and practice. I enjoyed
    it so I really thought about music as a profession.
- speaker: Interviewer
  text: So in high school, this scene that you came upon when you were six years old and you saw that man’s brain bashed in…did
    that linger with you? Did you think about that in high school?
- speaker: Respondent
  text: Yes, I’ve never forgotten it.
- speaker: Interviewer
  text: So then you were thinking about what am I going to do with my life and you were leaning toward being a musician, were
    you weighing different professions? Or what were you doing?
- speaker: Respondent
  text: Well, when I got this scholarship to school, I thought I will go there and we will see how things go. During the summer
    of 1943 the Metropolitan Opera put on a nightly opera at the Cincinnati Zoo and we could go for the grand sum of 10 cents
    per night, so we went every night in the summer of ’43 to the Metropolitan Opera productions. There, I met a conductor
    named Fausto Cleva with the Metropolitan Opera and he invited us to come to rehearsals. At these rehearsals he was singing
    in European solfege. This is very difficult. It’s called the movable do system. Normally if you are in the key of C, do
    is C and remains as such. In this particular European Solfege system, whatever key you are playing in, do is the key.
    So if you are in the key of F, F is do. If you are in the key of A Flat, A Flat is do. So you have got to alternate this
    and ascending the scale, there’s a different syllable that you sing than when you are descending the scale. So C Sharp
    and D Flat are sung as two different syllables. This is a difficult system to sing in. I heard Fausta Cleva correcting
    them and singing in European solfeggio and I thought, my this is really something. So I got interested in that and I got
    interested in opera.
- speaker: Interviewer
  text: Were you singing too?
- speaker: Respondent
  text: Yes, I was singing and in fact we sang on the weekends in the synagogue for $50 every time we met. I enjoyed that
    immensely. That was like 50 days’ pay in that particular time. We used to get a dollar a day when I was a boy working.
- speaker: Interviewer
  text: So you were singing and playing the trumpet and you were having a good time weren’t you?
- speaker: Respondent
  text: I was having a great time.
- speaker: Interviewer
  text: And then you were drafted?
- speaker: Respondent
  text: I received a letter, greetings you are being drafted into the United Stated Armed Forces. So after receiving that
    letter on December 31, 1943 I went downtown and joined the Navy.
- speaker: Interviewer
  text: You were 18?
- speaker: Respondent
  text: I turned 18 that day.
- speaker: Interviewer
  text: Tell us about that experience and where you went for your training and that type of thing.
- speaker: Respondent
  text: Yes. I joined the Navy in Cincinnati and I was sent to Farragut, Idaho in January of 1944 where there was 8 feet of
    snow on the ground. I inquired about how a person would get into the band. They asked me if I could type and read and
    write and I said, “yes.” They said, “If you can do all those things you can’t get into the band. It’s for Italians who
    can’t do anything else but play music.” That was rather discouraging. So I went to the theater and asked to see the bandleader.
    He was the chief musician and he was named Hurt. They sent me in to see this fellow and he told me, “I have a 27-piece
    band. There are 250 trumpet players on this base. How in the world can I accommodate all those guys? Can you play the
    (indiscernible word) thing?” I said, “Yes sir.” He said, “There’s some music on that stand over there. Let’s hear you
    play it.” So I went over to the stand and opened the music. It was the selection that I played when I won first in the
    state. When I was 15 years old. (Laughing) So I told him, “This is difficult music. I thought we played marches and things
    like that in the Navy Band?” He said, “Why don’t you just shut up and start playing?” I could have closed the music and
    played it. It was called The Carnival of Venice. It was written in the 17th century and made popular by Paganini who played
    it on the fiddle. It’s a very difficult piece to play. It’s full of triple-tongue-ing. At the end of it, he said, “Have
    you ever seen that music before?” Is said, “No sir. I’ve never seen that music before in my life. I was sight reading.”
    He said, “You’re in the band.” (Laughter) So I could have stayed for the remainder of the war in Farragut, Idaho, but
    a fellow came along and asked, “Who would like to go to the South Pacific? They are making a band in Washington, D.C.
    called the 7th Fleet Band. It’s Admiral Kinkaid’s band, who would like to go?” I was sitting there in snow up to my ears
    and I said, “I would like to go!” (Chuckle) So my next trek was to Washington, D.C. where I joined up with the 7th Fleet
    Band. We left there in early 1944 and the first stop was Camp Pendleton, California where we played The Danny Kaye Show.
    The next stop was Hollandia, New Guinea. We had learned by then that we were not going to be Admiral Kinkaid’s band, but
    we were going to be the USO Touring Band. The USO had music, dancers, actors, conductors, but no bands—so they used the
    service bands—and once you get established with them, that’s where you are liable to remain. We were supposed to be stationed
    on the San Clemente, Admiral Kinkaid’s flagship in Manila Bay, but we toured the whole South pacific paying two shows
    a day, seven days a week for two and one half years.
- speaker: Interviewer
  text: Did you enjoy that then?
- speaker: Respondent
  text: Well, of course, how lucky could a fellow be to do that? They called us warriors (chuckle) with derision. But yes,
    I enjoyed it and I decided that if I ever got out of there, I was going to go to medical school.
- speaker: Interviewer
  text: Why did you think that?
- speaker: Respondent
  text: Two shows a day, seven days a week, two and one half years, moving all of that stuff…I thought, if this is the musician’s
    life, it’s not for me.
- speaker: Interviewer
  text: Since you were weighing both professions that got it out of your mind didn’t it?
- speaker: Respondent
  text: Yes. By making rounds with Captain Silverstein the dermatologist, we had a talk after seeing a Chief Petty Officer
    with blisters on both feet. Dr. Silverstein, while smoking, examined his feet carefully. His feet had blisters all over
    them, which puzzled me of course. I noticed his cigarette would often touch the foot as he smoked and I wondered I wouldn’t
    do that—although I had no training, instinctively I wouldn’t do that. But finally he asked me, “Have you ever seen anything
    like this?” I replied, “No sir, I’ve never seen anything like that in my life. Would it be his shoes or socks or something
    he has eaten? What in the world would do that?” He said, “Oh, no, no. Joe, would you please get a dark field on this?”
    A medical tech came over and withdrew a small amount of fluid from one of these blisters and took it to the laboratory.
    We went on our way, seeing other patients. This technician came in about half an hour later and said, “Sir, that’s loaded
