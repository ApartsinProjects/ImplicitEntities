collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where are we recording this interview?
- speaker: Respondent
  text: We are here in my office in Tulsa, Oklahoma.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in a little town in Virginia called Meherrin.
- speaker: Interviewer
  text: What was your mother's maiden name and where she grew up?
- speaker: Respondent
  text: Oliver is her maiden name and she grew up in West Virginia and northern Ohio, on the line between the two states.
- speaker: Interviewer
  text: Tell us about her. What kind of a person was she? Was she a musical person?
- speaker: Respondent
  text: I never knew that my mother played piano until I was in my early teens. I told her that I didn't know that she played
    the piano and she replied, "We didn't have one." This was back when salesmen traveled door to door to sell piano lessons
    to young ladies. My mother was one of those ladies that learned how to play piano that way.
- speaker: Interviewer
  text: Was she encouraging to you when you showed an interest in music?
- speaker: Respondent
  text: Her encouragement was only that of a typical mother. My musical influence came from my dad, but because she played
    piano I guess you could say I have music on both sides of my family.
- speaker: Interviewer
  text: What was your father's name?
- speaker: Respondent
  text: Hester Linwood Clark.
- speaker: Interviewer
  text: Tell us where he was born and where he grew up.
- speaker: Respondent
  text: My dad was also born in Meherrin, Virginia. He was involved in music very early. I heard music at the same time I
    heard human voices. It was always there. I was going to say from the time I was in a crib, but we couldn't afford a crib,
    but as a baby lying in bed I heard music. It always struck me as odd that hearing music from a very early age that I was
    relatively old before I decided that I wanted to learn to play.
- speaker: Interviewer
  text: What did he do for a living?
- speaker: Respondent
  text: My dad did everything it took to raise a family of five. I am the oldest of five children. My dad worked for the sawmill
    and he worked for the B&O Railroad, which took us to New York where I grew up several years. My younger brother was born
    on Staten Island. My dad took us to New York because of his job. I've often said that if I had the get up and go or the
    gumption that my dad had, I'd have been a big star years and years ago.
- speaker: Interviewer
  text: Did your father sing?
- speaker: Respondent
  text: He didn't sing. To my knowledge he never had the desire to be a professional musician. He played because he loved
    it. He was one of those people that sat on the front porch of the old home place. He had two brothers that played and
    they would get together in the evenings in the summertime. When the other kids were out chasing lightning bugs and putting
    them in a jar, I would be sitting there looking at my dad and his two brothers play music. I was smitten very early.
- speaker: Interviewer
  text: What instruments did they play?
- speaker: Respondent
  text: My dad played a tenor banjo, as opposed to a five-string banjo, which is very popular and has been for the last 30
    or 40 years. He also played the guitar and mandolin. My Uncle Paul played the fiddle and my Uncle Dudley played the mandolin.
    They played mostly at square dances or round dances as they called them then.
- speaker: Interviewer
  text: Tell us about your brothers and sisters.
- speaker: Respondent
  text: I am the oldest of five children. The second child was my sister Jean, then the third was my brother Dick, then my
    brother Dwight and then the baby of our clan is Susan.
- speaker: Interviewer
  text: Were any of your siblings musical?
- speaker: Respondent
  text: My brother Dick had the ability. He played the mandolin a little bit, but he wasn't really that interested. He had
    other things that he would rather do. I know from listening to him that he did have the ability, he just didn't pursue
    it. A salesman came by one time and was selling lessons on how to play the accordion. My dad signed up my sister Jean
    for lessons in learning how to play the accordion. Jean got this little bitty accordion. She was starting off with learning
    the fundamentals. One day, when it was sitting there, I picked it up and starting playing the Tennessee Waltz on it. It
    broke her heart and she never touched it again. (Chuckle) I just played it by ear and she was learning to play it by reading
    music.
- speaker: Interviewer
  text: She couldn't play it by ear?
- speaker: Respondent
  text: No, she was encouraged not to play by ear so she could learn the proper way.
- speaker: Interviewer
  text: Did you ever learn to play by reading music?
- speaker: Respondent
  text: No, and I wished I would have.
- speaker: Interviewer
  text: So your earliest memories would have been of watching your uncle and your father on the porch playing music?
- speaker: Respondent
  text: Yes, very much so.
- speaker: Interviewer
  text: Do you remember the first school you attended?
- speaker: Respondent
  text: Yes, I do. It's a volunteer fire department now, but it was a school until 1954.
- speaker: Interviewer
  text: How old were you when you began to pick out a tune on a guitar?
- speaker: Respondent
  text: Every time I think back on the age that I was when I wanted to learn to play, it was relatively late for me for having
    been raised around it. I was about 11. We lived in a government housing project in Washington, D.C. There were four units
    on each side and the doors were so close they were almost shared. I would be picking on my dad's banjo, which was very
    coarse sounding. Our neighbor heard me picking on this banjo and he said, "Have you ever played guitar?" I said, "No,
    I've never even held one." So he went in to his house and came back out with his guitar and let me hold it. I strummed
    down across those strings and that soft sound of the guitar flipped on a light switch in me that was loud and consistent.
    I had to learn to play. That was probably mid-season some time in June or July - about the time that we would get a Sears
    & Roebuck catalog. We would write our names down next to what we wanted for Christmas. My choice that year was a guitar.
    I was about 11 or 12 years old. I came down Christmas morning and there was the guitar and a book that came with it called
    Smith's 300 Chords for Guitar and How to Use Them. I took it up to my bedroom and I sat down and started playing on it.
    I played it until my fingers actually bled. I found out that if you dipped your fingers in ice water, it made it so that
    you could really stand the pain for a while. Two weeks after I got that guitar, I was playing a square dance with my dad.
    I would sit back in the back so when I made mistakes it wasn't really noticed. I've often thought there's no one who got
    the schooling I got - because it was on the job training. I could learn different chords and I could use them playing
    at a square dances on the weekends with my dad. The more experience I got, the closer to the edge of the stage I would
    get. One evening, I noticed they had moved my seat up right to the very front and I knew I had made it.
- speaker: Interviewer
  text: At 11 or 12 years old?
- speaker: Interviewer
  text: Did you bring any of that music to school? Did you play in school?
- speaker: Respondent
  text: I did, but I was not encouraged. We had a music department and I took music. I will never forget the teacher describing
    the different instruments to the class. She put them in different categories. One being brass, reeds, strings - she was
    naming cello and violin… one of my classmates said, "guitar?" and she said, "No, a guitar is not a stringed instrument,
    it's a threaded instrument. A pure stringed instrument is like a violin, cello or base." That really hurt me. It was like
    she was just saying don't talk about that because it's not a legitimate instrument. To this day, it still bothers me.
- speaker: Interviewer
  text: Do you think the guitar was associated with country music and she was putting it down for that reason?
- speaker: Respondent
  text: That could have had something to do with it, although it wasn't obvious at that time. She wanted to talk about the
    other instruments but she did not want to talk about the guitar. When she started putting down my guitar that really bothered
    me.
- speaker: Interviewer
  text: However, you continued to play with your father at square dances?
- speaker: Respondent
  text: Yes, and on local radio programs and local TV. Back then every sizable town had a live radio show. They had more live
    airtime than they had talent to fill it. So it wasn't too hard to get on radio or television when it came upon the scene.
    I grew up in television. To this day when I look at a television camera, I don't see a mechanical device - I see a person.
    I performed that person, which is really a camera. I've always felt very comfortable with television shows, so when television
    shows started to need talent - I fit right in. Besides everyone in our square dance group was older. None at that time
    was noted to be singers are performers. So when it came time, whomever putting shows together thought we should have somebody
    sing a song and they asked me. It scared me to death.
- speaker: Interviewer
  text: This was in the Washington, D.C. area and you attended high school there in D.C.?
- speaker: Respondent
  text: Yes. I found out that there was another boy at my school that played guitar. So one thing led to another and one day
    we had what we called Sadie Hawkins Day. It's where the girls pick out the guys that they went to dance with at the school
    dance. He and I brought our guitars and played at the dance and we were the heroes. That was the beginning of a guitar
    really helping me be accepted into society.
- speaker: Interviewer
  text: That was your favorite instrument at that point in your life?
- speaker: Respondent
  text: Yes, because it was more versatile.
- speaker: Interviewer
  text: The first song that you are performed on TV, do you remember what that was?
- speaker: Respondent
  text: (Laughter) Yes I do. Now keep in mind, I was about 15 years old. I played this song because it was so popular at the
    time. The song was called One Has My Name (The Other Has My Heart.) It was a song about infidelity. Later, I'm thinking
    what would a 15-year-old know about one guy that leaves his wife for another woman? It's always stayed in my mind.
- speaker: Interviewer
  text: Why did you pick that song to perform on television?
- speaker: Respondent
  text: Because it was the No.1 song and it was so popular - that's why I played it. I wanted to do a song that was going
    to be accepted. Everybody liked it and everybody knew it and I fit right in.
- speaker: Interviewer
  text: You were on television playing for square dances?
- speaker: Interviewer
  text: Then you started playing in bars and other venues just about every night?
- speaker: Respondent
  text: When I was 16 years old, everything just sort of blossomed. I started playing Saturday night square dances. Then I
    started playing Friday and Saturday night square dances. Then it was Thursday, Friday and Saturday. My dad was upset that
    my grades in school were suffering because of my playing. I was sleeping on my school desk the next morning after I was
    out playing a square dance the night before.
- speaker: Interviewer
  text: How late were you staying out?
- speaker: Respondent
  text: I was staying out until 11pm or Midnight. In fact, when I was 16 years old, I evidently was doing whatever it was
    enough people enjoyed, that I was offered all of these jobs. I was just a kid at 16 years old. I had to go and get a permit
    so I could play in bars, but I couldn't stay in the bar. We would do a set and when we took a break, I would have to go
    outside and wait until it was time to play another set. I think the minimum age to play in a bar at that time was 16 years
    old. I remember going down to fill out these forms. I'm sure my dad had to sign them to show his consent. I remember the
    age of 16 being a pivotal point in my life because I went from playing just square dances to nightclubs. Nightclubs, radio
    and television didn't leave a whole lot of room for anything else.
- speaker: Interviewer
  text: What about school? Did you continue on?
- speaker: Respondent
  text: No, and it always bothered me that I didn't. I remember I would miss a couple of days because I was tired. It was
    embarrassing that I wouldn't be in class. It got to the point that my classmates, a lot of them, didn't know who I was
    because I didn't show up that often. I remember the day I was walking from the bus stop to the school. I got halfway to
    the school and I said to myself "No, I don't want to do this. I want to play music." I turned around and went back home.
- speaker: Interviewer
  text: So how did that go over with your parents?
- speaker: Respondent
  text: They didn't like it at all. I was torn between the two, because I came from a very, very close family. I didn't want
    to do anything that would hurt them. But they understood and they laid down some rules. I wasn't allowed to stay out all
    night. I remember that. I still had to live under the same roof.
- speaker: Interviewer
  text: About that time, what music star was on the scene that you looked up to?
- speaker: Respondent
  text: Probably the one that made the biggest impression was Hank Williams. He was at the top of his career. At that point
    I didn't know about records, when I listened to music I heard what was on the radio and that was really what influenced
    me.
- speaker: Interviewer
  text: So we are talking about the years 1947, 1948 and 1949?
- speaker: Interviewer
  text: Did you play on a show with Hank Williams as a young boy?
- speaker: Respondent
  text: Yes. He came to a show in Baltimore, Maryland at The Hippodrome Theatre, which was one of those beautiful, old ornate
    theaters with velvet ropes. It would take your breath away to see the beauty of these old theaters. This was back when
    they used to do a live show in the theater and then also show movies. They showed movies about three times a day and then
    in between movies they did a live stage show. Hank Williams was the star of the stage show. We opened the show with a
    square dance. Then I would go sit in one of those beautiful boxes in the theater and I would watch every show. We did
    like three shows a day. I never missed a lick. I knew everything that everyone did. I could recite it. I was just in awe
    of Hank Williams. He was amazing. Elvis Presley had the same thing - it goes beyond talent. It's something that comes
