collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: And I got to ask you, why does everybody call you "Johnnie"?
- speaker: Respondent
  text: Well, my grandfather was a rancher down at Mounds. And the day I was born he came up to see his first grandchild.
    After looking me over he said to my mother, "Well, Bess, I don't care what you christen this child, but I want her called
    'Johnnie'." His name was John McAllister, so I have been Johnnie ever since. And when it came time to get my diploma at
    TU, Dean Langenheim asked me, "What name do you want on your diploma?" and I said, "Well, I better have Joan on there."
    I sign my checks "Joan," but otherwise I'm Johnnie.
- speaker: Interviewer
  text: Joining us here is Mary Ann Hille. Mary Ann, you're here because how is it you're associated with Johnnie?
- speaker: Respondent
  text: Johnnie and I got to know each other through First Presbyterian Church. We became friends just a couple of years ago,
    but very good friends. Johnnie had had a spell in the hospital and I went by to visit with her and we just had so much
    fun talking that we've stayed friends. That's how I got to know her.
- speaker: Interviewer
  text: Great. Johnnie, your date of birth?
- speaker: Respondent
  text: March 10, 1915.
- speaker: Interviewer
  text: That makes your present age?
- speaker: Respondent
  text: Ninety-eight and a half.
- speaker: Interviewer
  text: Ninety-eight and a half. Where are we recording this interview?
- speaker: Respondent
  text: At the Villages of Southern Hills rest home.
- speaker: Interviewer
  text: Here in Tulsa?
- speaker: Interviewer
  text: You were born in 1915. What was going on? World War I had just begun in July of 1914.
- speaker: Respondent
  text: What was going on? Yes.
- speaker: Interviewer
  text: That lasted until 1918.
- speaker: Interviewer
  text: A lot of things were happening in the year of your birth. In 1915, the United States House of Representatives rejected
    a proposal to give women the right to vote.
- speaker: Respondent
  text: My women folks were not interested in getting to vote. (laughter)
- speaker: Interviewer
  text: In Washington DC, the first stone of the Lincoln Memorial was put into place in the year that you were born.
- speaker: Respondent
  text: I didn't know that.
- speaker: Interviewer
  text: Babe Ruth hit his first career home run off Jack Worhop.
- speaker: Respondent
  text: There were several interesting things besides me.
- speaker: Interviewer
  text: Let me ask you at the outset. You're ninety-eight and a half. Why do you think you've been able to live so long?
- speaker: Respondent
  text: Well, I think I explain that sort of the fact that I spent my summers at a place called Gypsy Camp. A camp for girls
    that belonged to my grandfather and his wife. It was right on the bank of the Illinois River, where I lived every day
    in the river, in the boats, on the tennis court, or riding horseback, and eating good meals. I think that kind of gave
    me a good start.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born at 905 South Denver, Tulsa, Oklahoma.
- speaker: Interviewer
  text: Right here in Tulsa. In a house?
- speaker: Respondent
  text: The thing about it was, when my parents decided to get married they bought that little house before they were married,
    and they had the wedding. They were married there in that little house. We lived there until I was about seven years old.
    And the outstanding thing that I remember about that place was that my father took 4x4 timbers and built me a swing in
    the backyard. When mother bought her new house, well I, I was so sorry to go off and leave that nice swing in the backyard
    for the new family that bought that house.
- speaker: Interviewer
  text: What are your remembrances of that house? Did you have an outhouse outdoor?
- speaker: Respondent
  text: 'Oh no, this is 905 South Denver in Tulsa, Oklahoma. No, it would have full plumbing. But I do remember one fact:
    I enjoyed playing with building blocks. I would play with those blocks and I would go off and not put them away after
    playing with them. My dad would get up at night to go to the bathroom and he''d step on those blocks. Well he didn''t
    do anything but open the back window and throw them all out in the yard. That wasn''t fun -'
- speaker: Interviewer
  text: No, I'm sure.
- speaker: Respondent
  text: … to step on children's blocks with your bare feet, you know?
- speaker: Interviewer
  text: Your mother's name, her maiden name?
- speaker: Respondent
  text: Her name was Elizabeth J. McAllister. M-C-A-double L-I-S-T-E-R. They were an old Georgia family that came up here
    after the Civil War. Some of them settled here in Tulsa and some of them settled in Sapulpa.
- speaker: Interviewer
  text: Did your mother or any of your family talk about Civil War?
- speaker: Respondent
  text: Well, my grandfather, after I was a little bigger, he told me a few little things.
- speaker: Interviewer
  text: What was his name?
- speaker: Respondent
  text: John McAllister. For whom I was named. They lived in North Georgia. When the war was going on, Federal troops were
    rampant in that part of the country. They came into the house and went upstairs and tore up all of the bedding looking
    for money or silver or jewelry. He was about five years old at the time. They had one mule left from the stock that they
    had had on the farm. And it was his duty to take that mule down to a canebrake and keep a watch on it all day long so
    that they would have something to plow the garden when the spring came. His father was a Methodist preacher, so after
    the war and he was out of prison…
- speaker: Interviewer
  text: Out of prison?
- speaker: Respondent
  text: My great-grandfather was out of prison.
- speaker: Interviewer
  text: Why was he in prison?
- speaker: Respondent
  text: Because he was a Confederate Soldier!
- speaker: Interviewer
  text: Confederate? Okay.
- speaker: Respondent
  text: I forget the battle from which he was taken prisoner. But he said that they were on starvation rations. And a great
    treat to them was to catch rats and eat them. Said it was really something to eat. So, after he got home from the army,
    he had one of the hands kill a rat and cook it. He said naturally it was nauseating. He couldn't possibly eat it. He organized
    a wagon train of thirteen families and brought it out from North Georgia to Southwest Missouri. They settled around Springfield
    and Republic, Missouri.
- speaker: Interviewer
  text: It was your great-grandfather?
- speaker: Respondent
  text: The man that led the wagon train.
- speaker: Respondent
  text: His name was Wesley Mastin McAllister. He was born and reared there in North Georgia. They came from the old country
    before the Revolutionary War. Anyway, after they came out here, my grandfather grew up. As a young man, they go out to
    seek their fortune and he went to Colorado. He got into a freighting business. I've seen some pictures out at Gilcrease
    of the men got in those coaches and wagons at night. But anyway, other things were in the making. Over in Buckie, Banffshire,
    Scotland, a young lady had been raised as a very skilled musician. And as a graduation gift from her family, they sent
    her to America to visit some of her relatives out in Colorado. So, grandma came on the sailing ship and it landed somewhere
    on the Great Lakes. There was a port that her boat came to. She then came out to this town in southern Colorado. I will
    never forgive myself for not finding out from my grandfather the circumstances of their meeting and courtship, but anyway,
    they were married at Leadville, Colorado. When we took a trip out there when I was a child, we went to Leadville and saw
    all the remains of this little building where they were married. He thought, since he was going to be a family man, that
    he would get into something more substantial. His parents, and brothers and sisters, lived down in this part of the world,
    so they came down here and he went into business in Springfield, Missouri. Well, the Panic of 1893 came along and it wiped
    him out.
- speaker: Interviewer
  text: Tell us what that was, the Panic of 1893.
- speaker: Respondent
  text: Well, it was just where businesses went broke. They had lost their businesses and just out of luck, you know, for
    a job. He had a couple of children by then. He got acquainted with Mr. Dickerson of the Dickerson Goodman Company. Mr.
    Dickerson sent him to Tulsa and opened their business here. Which he ran very successfully for them until in the late
    1890's when he became postmaster of Tulsa.
- speaker: Interviewer
  text: Your grandfather?
- speaker: Interviewer
  text: John McAllister?
- speaker: Interviewer
  text: He came here to Tulsa?
- speaker: Interviewer
  text: And then he became the postmaster?
- speaker: Respondent
  text: Yes. But it was just a political appointment. Didn't last very long. I remember the man that was postmaster at the
    time calling mother and ask if she had a portrait of granddaddy. Said they were having a group of pictures of all their
    postmasters down there in the post office. So, mother found a good photograph we had. So, he is down at the post office.
    And, of course, he's around our house too.
- speaker: Interviewer
  text: Your father then. Your father's name?
- speaker: Respondent
  text: My father's name is Claude Coe. Emmett Claude Coe, which a name none of us liked. He was from a town called Parker's
    Landing, Pennsylvania. There was a good-sized family of them. I think Grandfather Coe, his name was Sammie Wallis Coe,
    came out here for the same reasons that Grand-daddy McAllister came to Tulsa. He lost his business in Parker, so he moved
    his family out here. The oil boom had just started here in Tulsa about that time. My dad had worked on the drilling wells
    as a young man, so when he came out here, he and his brother Ross went to work for some of the oil companies around town.
    Had a little company that they owned but they didn't get along very well so that was dissolved early on.
- speaker: Interviewer
  text: You said earlier you weren't sure how your mother and father met?
- speaker: Respondent
  text: 'Well, I think there''s only one answer to that, really: at the Presbyterian Church. Because that was the social meeting
    place for the young people of Tulsa. I''m positive that is where they met. Mother never said as much, but I feel sure
    that was it.'
- speaker: Interviewer
  text: So that was First Presbyterian?
- speaker: Respondent
  text: Oh, absolutely.
- speaker: Respondent
  text: Absolutely. My grandmother from Scotland was a very devout member of the Presbyterian Church.
- speaker: Interviewer
  text: Any other Civil War stories or anything beyond what you just said?
- speaker: Respondent
  text: Well, I just know that they came in wagon trains. To get out, they traveled on the military roads, and they were corduroy
    roads. The military in getting from place to place would cut down trees and lay them next to each other to get through
    the mud.
- speaker: Interviewer
  text: And then they'd drive across it.
- speaker: Respondent
  text: And then they'd drive across them with their mules.
- speaker: Interviewer
  text: It took a long time, didn't it?
- speaker: Respondent
  text: Well, that was a long time, that was a long time.
- speaker: Interviewer
  text: Did we mention your grandmother's name? You talked about your grandfather.
- speaker: Respondent
  text: Her name was Lizzie, that's all I ever heard it spoken of as, Lizzie Gettis McAllister. She was from Buckie, Banffshire,
    Scotland. She was born and reared, and she had an excellent education in music. That's why she came to America, because
    they gave her the trip to America as a graduation gift, her family. Her father came over for the marriage. He went back
    home and there were three Gettis brothers. They built fishing sloughs and they had a place where they salted down the
    cod. And another one, his business was making the casts for the cod. So David Gettis, that's my great-grandfather, went
    back home after Lizzie was married and sold his interest in the businesses and brought his family back to America, which
    consisted of a wife and son. They settled in Springfield, Missouri, where they lived the rest of their lives.
- speaker: Interviewer
  text: Did you have brothers and sisters?
- speaker: Respondent
  text: Yes, I have one brother. He was born in '21. He's a widower. He now lives on the family property there at the camp
    near Siloam Springs, Arkansas.
- speaker: Interviewer
  text: So, he's like ninety…
- speaker: Respondent
  text: He's ninety-two. August I think he was ninety-two.
- speaker: Interviewer
  text: So does this long living gene exist then in parents and grandparents?
- speaker: Interviewer
  text: You all lived to be a ripe old age as they say.
- speaker: Respondent
  text: Well, Grandpa McAllister, he lived in Sapulpa, he was the retired minister, and I think he was in his nineties when
    he died. And my aunt lived to be in her nineties; mother's only sister. Well, all McAllisters were fairly long-lived.
- speaker: Interviewer
  text: Let's talk about your education. The first school you attended?
- speaker: Respondent
  text: The first school I attended was Horace Mann Junior High School at 10th and Boston. And I couldn't have a bicycle because
    it was too dangerous for me to get from where we lived over to school on a bicycle. We lived on South Main by that time,
    across from J.E. Crosby's mansion. They said, "You can't have a bicycle. It's just too dangerous."
- speaker: Interviewer
  text: Because you were crossing a busy…?
- speaker: Respondent
  text: Crossing 15th and crossing Boston to get to school. My mother just thought that was too much traffic and they knew
    how to nail me down. She said, "Now, Johnnie, if you want to spend your bank account for a bicycle, you may do so." They
    knew Johnnie was not going to spend her money down in the bank for a bicycle. Consequently, I didn't have a bicycle till
    I was grown.
- speaker: Interviewer
  text: How old were you then?
- speaker: Respondent
  text: Oh, I was probably ten or twelve.
- speaker: Interviewer
  text: And where did you get that money for that bank account?
- speaker: Respondent
  text: Oh, my, well, I hesitate to tell this one. Of course, all the men in our family were in the oil field. We had a great
    big basement under our house and a washing machine with a wringer on it. So, naturally all those clothes were shed, were
    brought to Tulsa on the weekends when they were home and were washed. Well, that long underwear was fastened with buttons,
    and many of those buttons came off in the washing machine.
- speaker: Interviewer
  text: In the wringer?
- speaker: Respondent
  text: In the wringer, yeah. So, I was paid one cent for every button that I sewed on that long underwear. That was how I
    made my first million. (laughter)
- speaker: Respondent
  text: Oh, yeah. Well, Tulsa changed its school system around and then it started having junior high schools when I was in
    about the fourth or fifth grade.
