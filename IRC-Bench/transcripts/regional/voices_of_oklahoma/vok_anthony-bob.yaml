collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Bob, if you’ll state your full name please, your date of birth and your present age.
- speaker: Respondent
  text: This is Bob Anthony. My full name is Robert Holland Anthony. The name Holland is my mother’s maiden name. I’ll be
    62 years old next month–and I was born in Oklahoma City.
- speaker: Interviewer
  text: The date of your birth was?
- speaker: Respondent
  text: May 15, 1948.
- speaker: Interviewer
  text: Where are we recording this interview?
- speaker: Respondent
  text: We are currently in the Jim Thorpe Building at the State Capitol Complex. This is the office building for the Oklahoma
    Corporation Commission.
- speaker: Interviewer
  text: And you were born in what hospital?
- speaker: Respondent
  text: I was one of six brothers and we were all born at St. Anthony Hospital here in Oklahoma City.
- speaker: Interviewer
  text: Your mother’s name?
- speaker: Respondent
  text: My mother’s full name was Christine Holland Anthony.
- speaker: Interviewer
  text: And where was she born–where did she grow up?
- speaker: Respondent
  text: Actually she was born in Oklahoma City, not too far from the St. Anthony Hospital, but she was born in a home. And
    she grew up in Enid, Oklahoma because her dad worked for Champlin Oil Company, which was in Enid, Oklahoma.
- speaker: Interviewer
  text: And your father’s name and where he grew up?
- speaker: Respondent
  text: My father is Guy Mauldin Anthony. We’re big on having the middle names–that was his mother’s maiden name. He was born
    in Cleveland, Oklahoma in 1915– April 26 of 1915. And he went through some school in Cleveland, Oklahoma. But then, he
    and the family and the company headquarters moved Oklahoma City. So he graduated from high school here in Oklahoma City
    at Classen High.
- speaker: Interviewer
  text: Tell us just a bit about you and your education. Your elementary school was?
- speaker: Respondent
  text: I went to kindergarten, first and second grade in a public school called Nichols Hills Elementary. And then I transferred
    to Casady School, which was an Episcopalian church affiliated school. And I went from third grade through high school
    graduation with Casady School here in Oklahoma City.
- speaker: Interviewer
  text: And then your college work and beyond?
- speaker: Respondent
  text: For my college I went to The Wharton School of Finance and Commerce they called it in those days. That’s the oldest
    business school in the United States that’s part of the University of Pennsylvania in Philadelphia. I graduated in 1970.
    I was a Second Lieutenant also, and the Vietnam War was going on, but the Army deferred me, and a large number of our
    class. So I had a year and I spent that at The London School of Economics in London, England and got a Masters degree
    in monetary economics. I came back and worked for a year and then I did another graduate degree at Yale University, a
    Master of Arts in administrative science, that was the predecessor of their current school of management. And then I worked
    for little bit, and then I finally did a third Master’s degree at Harvard University. It was called the Master of Public
    Administration.
- speaker: Interviewer
  text: With all this education were you planning on coming back to work for the family business? What were your thoughts?
- speaker: Respondent
  text: Yes. I think that growing up, I pretty much just wanted to be a businessman. I think going to the Wharton School of
    Finance reflects that. My father also went to the Wharton School of Finance. People would say, “Well how could you ever
    go all the way to Philadelphia to school?” And if I say, “Well my father did that.” Then it seems to be natural, and so
    they think that that’s just fine. But from the time I was 10 years old I did various chores. I can tell you about that
    now if you want to. I guess that about the fourth grade, a lot of kids wanted to stay home and watch cartoons on TV, but
    I thought it was great to get up early and go to work with my dad. That was at the headquarters building of C.R. Anthony
    & Company, which was at 6th & Broadway in Oklahoma City. And I’d get to help sort the mail and so forth. And then when
    we got that done, I could walk just down the alleyway to the YMCA and play ping-pong or go swimming and so forth. And
    so that’s what I kind of started off with. Then, as time went on I got to do other things. I worked in the distribution
    center, some people call that the warehouse. Then I was 15 years old I needed somebody to drive me to work, but I went
    to the nearest store and I could do sweeping out and that sort of thing. But then when I got to be 16, I was able to wait
    on the customers. Now that was a really big thing to be able to do that. That’s how it started. Getting store experience,
    that’s a part of the culture of our company. There’s nothing better than getting store experience and waiting on the customers
    and being good with sales.
- speaker: Interviewer
  text: However, after your schoolwork you didn’t go directly to work for the company–was it in 1972 you were staff economist
    for the House of Representatives?
- speaker: Respondent
  text: Yes. That was during that period of time that I was Second Lieutenant. I was somewhat on hold, and I did do that.
    I was deferred another year from my service and I did get armed with a Master’s degree from the London School of Economics.
    I was on a special energy staff that the House Interior and Insular Affairs Committee put together to look into this rumor
    that there might be an energy crisis. And I had authored a committee print that analyzed energy demand studies. And it’s
    interesting now that I’m a Corporation Commissioner that all this energy stuff seems to have been around for a long period
    of time. So I’ll just quickly put in here that about a year and a half later, the Arab oil embargo occurred. I think that
    was October of 1973, and then everybody was more interested in these sorts of things. And John Dingell, Representative
    John Dingell of the State and Foreign Commerce Committee wrote the Library of Congress and said that he didn’t know where
    Mr. Anthony was, but that he ordered him to update his study. And I was back in Oklahoma working for my company at the
    time. But they agreed to mail me all the recent documents to be analyzed. And I did so. And they paid me more money than
    I thought it was worth, but it was a good experience.
- speaker: Interviewer
  text: So then you picked up permanently in C.R. Anthony stores in what year?
- speaker: Respondent
  text: I think he would say 1974. And during summers between years of school and years of high school and even a little bit
    of college I worked in the stores. And on holidays when they needed a little extra help. But 1974 would have been the
    time that I started more on a regular basis.
- speaker: Interviewer
  text: And you ran for Corporation Commissioner you’d actually served in Oklahoma City hadn’t you?
- speaker: Respondent
  text: I was elected to be the Ward 2 Councilman. Then I also became the Vice Mayor, that’s a rotated position. But in 1979
    I was the Ward 2 City Councilman they called it in those days, so that is correct. It’s interesting that I did not draw
    an opponent. I think even to this day I’m the only non-incumbent who’s ever announced to seek a spot on the City Council
    who didn’t draw an opponent. So I did do that now you mentioned state office. The only state office that I ever ran for
    was to go statewide the first time and that was for the Corporation Commission Commissioner. In April of 1987 the shareholders
    of C.R. Anthony & Co. sold control to Citicorp Venture Capital. I stayed on for a couple of years as Chairman of the Board.
    But in 1988 I ran, which means you start (campaigning) in early 1988. I ran for the statewide office as the Corporation
    Commissioner and then I was elected to that, and then started my service and was sworn-in in January 1989.
- speaker: Interviewer
  text: And here we are in 2010 you won reelection–
- speaker: Respondent
  text: I’m in my fourth six-year term, which means I been reelected three times. And I just completed 21 years. And just
    for trivia’s sake because Don Nickles has left the scene and Clifton Scott who’s the auditor has left the scene, I’m the
    longest-serving statewide elected Oklahoma official at this time. Even in the United States of America among all the 50
    states for the utility commissioners, I’m the longest serving with 21 years. Which may sound like a long time, but when
    I started there was Bruce Hagen from North Dakota I believe who had served 36 years. It’s interesting that elected commissioners
    seem to serve for a longer period of time. There’s a great debate on whether they ought to be appointed by the governor
    or elected, but the ones that are elected seem to have greater longevity.
- speaker: Interviewer
  text: And you are likely to continue this for some time?
- speaker: Respondent
  text: Well, I have two and a half years left on my current term. So I’ll certainly plan to complete that and as it gets
    to the end of that then we’ll have to decide what to do next.
- speaker: Interviewer
  text: Let’s talk about a gentleman by the name of Charles Ross Anthony. Tell us who he was.
- speaker: Respondent
  text: C.R. Anthony or Charles Ross Anthony was my grandfather. I think I have counted accurately and I’m one of 23 grandchildren
    that he had. And that means I’m among 23 first cousins, I didn’t count after that. In those days, that is either 1883
    or 1884, I’ve seen his birthday listed more than one way–it’s kind of interesting that sometimes you name people after
    famous folks. Like I have my one family group on my mother’s side and one of the brothers is named Orville and one is
    named Wilbur. The first kidnap for ransom in the United States was the son of Philadelphia banker. There is a book that
    is now out-of-print, but I have a copy of it and the little boy’s name was Charlie Ross. So his parents picked Charles
    Ross to be the name they gave to my grandfather. His father’s name was Zachariah Cicero, so maybe Charlie Ross was a little
    bit easier to deal with.
- speaker: Interviewer
  text: And so your grandfather was born where?
- speaker: Respondent
  text: He was born in middle Tennessee. The river cuts the state in three parts, and Nashville is in the middle, and he was
    in middle Tennessee. His parents were sharecroppers.
- speaker: Interviewer
  text: In 1885 he was born?
- speaker: Respondent
  text: I think it’s 1884.
- speaker: Interviewer
  text: I guess. Is that the correct date?
- speaker: Respondent
  text: I think August 10, 1884 is what I’ve seen. The date that we most recognize is August 10 of 1884.
- speaker: Interviewer
  text: So how does he come to Oklahoma and at what age?
- speaker: Respondent
  text: Well I am fortunate that he lived until almost age 92. In other words, I was more of an adult, I had many years to
    share with him and so I did get to hear some of his stories first-hand, and they’re also written down in a few publications
    as well. So I do want to throw this in, that given his birth and the number of years after the Civil War in the United
    States…there’s a period of time where things were very much in disarray in the South and he really didn’t like it. He
    also became an orphan I think he said at age 12. The economic times for very difficult and as you mentioned his parents
    were sharecroppers. So he had some relatives that he went to visit and they let him stay with them for a little bit. But
    they couldn’t afford another mouth to feed. And so he decided that he wanted to get as far away from there, as possible.
    And the furthest place in the whole earth that he could even imagine was Indian Territory. And he had some kind of relative
    that was in Holdenville. Anyway, he had a very small sum of money but he spent it on getting train passage to Indian Territory.
    So that’s how he got here, and he describes himself as being an orphan at that time.
- speaker: Interviewer
  text: And why was he an orphan? What circumstances led to that?
- speaker: Respondent
  text: Well, I think that his mother had died. Well he may have had a stepmother after that. But anyway, he was on his own
    and he headed West.
- speaker: Interviewer
  text: 12 years old?
- speaker: Respondent
  text: That is right.
- speaker: Interviewer
  text: So he comes to Holdenville, then Indian Territory and what goes on there and did he know anybody? I mean did he just
    show up?
- speaker: Respondent
  text: Well, I can tell you a couple of stories. He had grown up on a farm near horses and he had done all kinds of odd jobs.
    He had very little in the way of educational opportunities. I think he had been through the sixth of the McGuffey’s readers
    at one time. But there is a story that there was a widow lady in Holdenville named Mrs. Scales I believe. She had two
    or three daughters I believe. Somebody said that she was looking for a man. And so he (C.R.) went to the house and knocked
    on the door. And she says, “Well I am looking for a man.” He told the story lots of times so I remember it well. And she
    looked at him and said, “Yes I’m looking for a man, not a boy. She was shaking her head. And he said, “Well, I can do
    good work.” And she said, “Well, can you hitch a team?” And he said to himself he was sure glad that’s what she asked,
    because he could hitch a team. And so he went and hitched the team and she let him stay. Now, whether it was the chicken
    coop or the tool house, we aren’t sure. I’ve heard the story told both ways. But she was a Southern widow lady and a little
    bit on the formal side, and he stayed with their family for many years. And they never let him have any meal with the
    family because he was from a different white working-class background. And that always made an impact on him. And it makes
    an impact frankly to me, the way I see things too to this day. Mrs. Scales also had a little general store in town. And
    so eventually he got to work in the store and that’s where he gained some store experience and then from an early age
    he always gave the quote that he always wanted to be a merchant. At one time we had the company monthly magazine called
    The Trading Post but when I became president we started to call it The Merchant and we quoted his little line in there,
    that he always wanted to be a merchant. But anyway, it does go back to Holdenville and being able to work in that general
    store.
- speaker: Interviewer
  text: Did he just walk up to Mrs. Scales’ house and knock on the door?
- speaker: Respondent
  text: I think he did. In town he walked around saying he needed work and somebody gave him a tip to go try that lady.
- speaker: Interviewer
  text: So what was his first job then, working for that lady?
- speaker: Respondent
  text: I believe so. I think he was getting something like 50 cents a month and he always emphasized this, and this is a
    very important part of the family culture and the corporate culture of the stores. It’s the concept of savings. He always
    would say, “It doesn’t matter what you make, it matters how much you save from what you make.” And so he would save up
    his money.
