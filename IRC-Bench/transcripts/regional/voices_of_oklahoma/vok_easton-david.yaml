turns:
- speaker: Respondent
  text: What will I do? How will I manage my life? And I was lucky because I had an office that I could go to every day, because
    it's just myself and my assistant, Sean. So, he has his office, I have mine, so we felt very comfortable. He was being
    very safe because he had had a heart attack a few years ago, so he had to be careful, and I basically was a monk. [Laughing].
    So, I didn't do anything. I would see people, but, you know, I didn't go anywhere; I didn't do anything. So, I felt, you
    know, it was very strange doing it. But everybody managed through.
- speaker: Respondent
  text: I met a young guy who was in my class, Bill Martin, and his mother was Aline Martine, and she taught cooking, but
    she loved France, and she loved French interiors. And so, I remember going over to his house one day, and I walked into
    the entry hall, and there was this beautiful French commode and a blooming Azalea tree right next to it. And you looked
    out into the back yard and there were these French curtains that were tied back - all kind of pale blue, silk - and I
    thought, "Uh, this is how I want to live." [Laughing]. I just, a vivid, vivid memory of that.
- speaker: Respondent
  text: In New York, and he said, "No, you can't go," and I said, "Well, then I'll get my business degree, but when I finish,
    I'm going to go." And he said, "Okay," and I said, "Okay," and we kind of left it at that. And so, I went to Drury College
    and got a business degree like he wanted me to do.
- speaker: Respondent
  text: Shop. It was where the Helmerich & Payne building was, where now the Robert Davis building is, there on 21st and Utica.
- speaker: Respondent
  text: '[Laughter]. And so, I applied to Parsons, and, I mean, Pratt at that point, and I got in, and in a month, I moved
    to New York, and she made sure I had a job, which I had a job with Karl Springer, who was a great furniture designer,
    and I worked for him, while I was going to Pratt.'
- speaker: Respondent
  text: And I was Pratt going to school, and, you know, I would go out on jobs and took, helped deliver things, and just,
    I loved it because I got to see so much. I got to see so much of New York and apartments in New York. And all of a sudden,
    you get in to see things that, unless you knew who lived there, you wouldn't see it. But I got, you know when you deliver
    things, you get to see it. [Laughing].
- speaker: Respondent
  text: David said, "Well, you can draw. You can do interior renderings for decorators and there's plenty of people that want
    to have that done. Just start, and just, you know, you don't have to worry about making a living right now." And we were
    living together, and he said, "Don't worry about anything. Just do that." And I did. I was very fortunate.
- speaker: Respondent
  text: He likes a project, and he likes a challenge, and so it's fun to, you know, try to talk with him and say, "Can you
    do this?" And we talk it over and he can more than likely do it. [Laughing].
- speaker: Respondent
  text: Atlanta, and Susan Arnold called and said, "This is awful. We can't do this. Would you help?" And, you know, so I
    came out and met with Nick and, anyway, and I said, "This doesn't look like Southern Hills. It doesn't…It has nothing
    to do with what Charles did.
- speaker: Respondent
  text: Which it doesn't have to stay that way, but it, you have this all done and then all of a sudden this just doesn't
    look like anything. It doesn't look like the Club." And so, anyway, they, they had me do it, which was great fun.
- speaker: Respondent
  text: Basically the only child till his younger was born about eight, when he was about eight. So, they'd go up every summer
    to Chicago and be with his grandmother and aunts and they'd go to Marshall Field's, which was "the Store," and, they're
    on the, I don't know if it was the top floor, but one of the floors, they had, they always had a house that was completely
    set up on this floor and you'd walk in, you had to have a, they'd create a garden and you'd walk into the entry hall and
    you'd walk through all the rooms, and it was all decorated and it was, you know, this unbelievable kind of showcase. And
    David was just fascinated with that as a child and just, like, oh, this is what I like. [Laughing].
- speaker: Respondent
  text: Not a very good neighborhood. At one point, during the early 1900s, it was a beautiful section. It was called, it
    was, not called Bedford-Stuyvesant, maybe it was still called that, I can't remember. But there was wonderful big townhouses
    there that belonged to the Pratts and all kinds of different families of New York, and anyway, Pratt ended up there, and
    his parents were just horrified with it and just, sort of, kind of, said, "Okay, fine, this is what you're going to do.
    I guess you're going to do it." So, he, but he loved it. [Laughing].
- speaker: Respondent
  text: Office and work." And so, David was over the moon, because he knew Edward Wormley was very famous. He was, at that
    point he was at Dunbar Furniture and was their major designer, and any of Edward Wormley's furniture that comes on the
    market is very expensive now and, and quite beautiful. It's midcentury, but it's just absolutely beautiful. Beautifully
    made and beautifully designed.
- speaker: Respondent
  text: Work in that building, and it looks beautiful on the outside. It's probably maybe a little strange and cold on the
    inside, but it certainly is an incredibly beautiful building, or house, and, I mean, I think he liked that. I don't think
    he liked all of Wright's work. But he's pretty much a genius with certain things, that's for sure.
- speaker: Respondent
  text: Because you're so talented. There's other things that go into it. Really, life, which is just life, you should learn
    that. [Laughing].
- speaker: Respondent
  text: A fashion designer in New York, do the interiors. Well, I'm sure it probably horrified Philip Johnson, because he
    just, like, this, his is very clean, modern house, and here comes, he puts in these things, it all works. It just, it's
    a very magical house.
- speaker: Respondent
  text: Kind of consider maybe bow house, its very clean lines, and, I once had a teacher who said, "When a wall and meets
    the ceiling for decorators, it's a celebration," and the bow house is just very simple. It just meet, well, you get a
    decorator involved, it's going to be, you're going to have crown molding, you're going to have something happening to
    make this statement. But, yeah, David, the first project that David did was for a man by the name of Ralph Falk in Chicago,
    and he told, asked David if he'd design a Georgian house for him, which was a wonderful opportunity because David had
    never done that to just, and it was pretty good, I mean, it was a good-sized house, that's for sure. And, just beautifully
    detailed, and David loved, loved it, loved it.
- speaker: Respondent
  text: They were comfortable to live in, you know. He, yeah, he made sure that they were comfortable. You know, you came
    in and you felt like you were welcomed into a house.
- speaker: Respondent
  text: Good dealer, and anyway…John and Patricia said, "Who should we talk to if we want to build a house in Charlottesville?"
    And they said, Alastair said, "Well, you'll have to talk to David Easton." So, they called David, and Patricia and David
    met at the Carlyle Hotel and sat there over a drink and David sketched out what the house ought to look like. [Laughing].
- speaker: Respondent
  text: Financial difficulties and then the banks cause, you know, you got to, anyway, they basically were told they had to,
    she had to sell all their contents to meet the bank's demands, and anyway, so. So somehow, he bought it. Which he always
    buys things like on, on the cheap.
- speaker: Respondent
  text: And, but maybe, with a little, to ned down a bit, but making them somewhat American, I guess. But, yeah, so, somehow
    people still - they pick up things from everywhere.
- speaker: Respondent
  text: Was interested in and then he did, you know, so many lectures over the years that, you know, he'd have to, he'd do
    a lecture let's say on the Grand Tour so then he'd buy every book that he could find on the Grand Tour and he'd start
    to read about it and then he'd underline things and he'd start to figure out what to do and then he'd get the slides together.
    We had slides and all that had to be [Laughing] coordinated, and he would give a lecture, but he didn't. He also taught
    school for, oh, a couple of years when he was, when he first got out of Pratt, I think.
- speaker: Respondent
  text: Necessarily. I mean it would look the room didn't have a soul to him - that books are life.
- speaker: Respondent
  text: David never really wanted to retire but he thought well maybe I would teach. I would go to University of Virginia,
    and I would teach in the architecture school or the design school or whatever and, you know, teach a couple of courses
    and you know, I would still be working but that would be fun to do, I would like to do, which he probably could have done,
    we just never did it. We never - once they got a divorce and then it got, I don't know, it got sort of complicated, and
    we thought, "No let's not go do this." So, we didn't.
- speaker: Respondent
  text: So… [Laughing]. During that time, we then built a house in the country. So, we had this wonderful house in the country,
    and we thought, "Well, this is fine. We just need…," when we are in New York we just, this is, this works out fine, but
    we have a beautiful house in the country, and then finally David moved his, he wanted to move his office. So, we moved
    his office down to Spring Street in SoHo and the commute from 79th Street to SoHo would take forty-five minutes during
    the day and David was like, "I hate this. Let's look for an apartment downtown." So, we started to look, and we found
    something on 20th Street right off 5th Avenue. So, we moved there, and we were there for 16 years. So, we were very much,
    kind of, find a place and we would settle. We didn't move around a lot.
- speaker: Respondent
  text: I don't know that was like a Sunday and then on a Monday we bought the, and we didn't know anything about the, about
    the area except it had, we had 7.5 acres and it was a walled garden. It had this wonderful little stone cottage and it
    was originally owned by a lady named Louise Bebe-Wilder, who was a famous landscape designer in oh turn of the century,
    and she lived next door in this very kind of nice farm - American farmhouse and they had just, they had been dead for
    a while, but, so, anyway, but it was, this was, this walled garden was her garden that she experimented on and anyway
    she wrote a book called Color in my Garden, which we've got. And, anyway if you're interested in landscape architecture
    or designers, she's very well-known and we just didn't know anything about it when we bought this thing and David said,
    "Well, this is how we're going to build this house." So, we tore down one end of the walled garden of the house with porches,
    and it was, it was a very beautiful house. It still is there. It's a beautiful house.
- speaker: Respondent
  text: Do everything. But, I mean, David loved it. He loved building it. He likes the idea of island kind of house. That
    was very kind of fancy house, but it was very, you know, they had a huge, big center screen porch that a lot of rooms
    fed off of and it had, you know, nice gardens and everything going on and it was fun. And that was their main residence.
    They lived there all the time. That was the main, that was the big screen porch that was kind of in the middle of the
    house that the main living room came off of and the dining room came off of.
