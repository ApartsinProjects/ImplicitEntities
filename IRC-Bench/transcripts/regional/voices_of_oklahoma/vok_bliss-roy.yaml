collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Casper, Wyoming.
- speaker: Interviewer
  text: And your mother's name?
- speaker: Respondent
  text: Nellie Taylor.
- speaker: Interviewer
  text: And where was she born and where was she raised?
- speaker: Respondent
  text: She was raised in Wyoming, near Casper, and don't know if she was born in those days. She was born in '23, think,
    whether she was born at home or in a hospital in Casper, but they lived about minutes outside of Casper. Her dad was a
    rancher, built a huge ranch in Wyoming, one of the biggest ones. Taylor Ranch. Her maiden name was Taylor. His name was
    Bill Taylor. He was in the Legislature in Wyoming.
- speaker: Interviewer
  text: Okay. And what kind of person was she? Describe her personality, your mother.
- speaker: Respondent
  text: She was a fun-loving… She liked Ferris wheels and exciting things. She did a lot of… don't know where that came from,
    really, but she had brothers; maybe that was part of it. She was, in those days, yeah, she was pretty strict. Remember
    she would backhand me once in a while with her ring on and hit me in the mouth. But actually she was very, very nice.
    That didn't happen very often—only when I was probably badmouthing her.
- speaker: Interviewer
  text: Rambunctious, yeah. Back talking like, yeah. Your father's name?
- speaker: Respondent
  text: Roy Everett Bliss. He was born in Illinois. I know he was born at home. He was the youngest of boys.
- speaker: Interviewer
  text: You tell me he's years old?
- speaker: Respondent
  text: He's years old as of last March, still driving a car. Talked to him at least once a week, sometimes twice a week,
    and live more in Arizona than live here. Live in Scottsdale and try to have lunch with him at least once a week.
- speaker: Interviewer
  text: Yeah. Wow. years old.
- speaker: Respondent
  text: And we meet at a different restaurant all the time, so he drives. We're about minutes away, so he'll drive halfway
    and I'll drive halfway and meet somewhere.
- speaker: Interviewer
  text: Well, what was his personality like—if it changed in elder years or when you were growing up? What was he like?
- speaker: Respondent
  text: He's extremely religious. He was an accountant by trade, but an entrepreneur at heart. He started at least businesses.
    Grew up in Wyoming cause that's where my mom was from. That's where she drug him to, guess, after the service. He was
    in the Air Force where it was the Army Air Corps at the time; flew B-29s, flew all kinds of different airplanes, but ended
    up flying B-29s, but never made it overseas. He was suited up and ready, and they had issued him firearms, and all the
    gear that you would need to be in the Pacific. And half of his squadron had already gone to the Pacific. For some reason,
    he said they always started with the A's and went down. When they sent him to the Pacific, they started with the Z's and
    he's a B. And they dropped the bomb at the G's or somewhere in there; and so the war was over and he never had to go.
    Asked him one time… thought that when the war was over they just said, And he said, He said he never even got to say goodbye
    to his crew, which he always thought that was not fair or not right; but they sent him to Albuquerque—he and his co-pilot—for
    a month with nothing to do. They rented scooters and drove all around the Albuquerque area and then sent him to Denver
    and… What do you call it when they turn you loose? There's a word for it, but can't remember.
- speaker: Interviewer
  text: Yes, right.
- speaker: Respondent
  text: And he thumbed a ride up to my mom's—up to the ranch—where she and were. Must have been about 2, think, or something
    like that.
- speaker: Interviewer
  text: So you're talking about—when you said "drop the bomb on Nagasaki to end the war"—which was started in December 7th,
    1941, and dropped on Pearl Harbor. And, of course, you were born after that, so you have no recollection of it.
- speaker: Respondent
  text: Yeah, didn't remember that one. Well, don't remember, really. Do remember when I was maybe years old, we lived in
    Gillette, Wyoming for maybe a year and a half, and my dad worked for my mother's brother. He was an accountant; worked
    for him for a year or so.
- speaker: Interviewer
  text: 'Yeah. So, his business then: what did he do for a living?'
- speaker: Respondent
  text: Think, after the service, he bounced around a little bit because know we lived in Ogden, Utah for a little while and
    think he was a sales rep or something. Then he got the job with my mother's brother; think it was a Chevrolet dealership.
    It was a car dealership of some sort in—what did just say? Gillette, Wyoming. And then he got an opportunity. Don't know
    quite how it came up, but to start a Culligan soft water business in Worland, Wyoming, which was over the mountain from
    the ranch. We moved over there in a covered wagon, essentially, and lived for several months, and then my mom and came
    over and we lived in a trailer for think maybe a year; and then they built a… I've never seen it happen anymore, but in
    the old days, you saw it once in a while. They built a basement, and we lived in the basement for a couple of years before
    we built the house on top of the basement. It was one of those where you see that stairs—you kind of see the stairs going
    down into a basement. You used to see that once in a while. Haven't seen one for years, but.
- speaker: Interviewer
  text: And so that business then was the…
- speaker: Respondent
  text: Culligan soft water. The water was horrible in Worland, Wyoming, so he did very well, think, with that and sold it.
    He had a guy that worked for him and sold it to him when he got into the cable TV business. He was… he built the first
    cable TV system in Wyoming in 1951.
- speaker: Interviewer
  text: So he was laying groundwork for you, wasn't he?
- speaker: Respondent
  text: He didn't know it, but he certainly was.
- speaker: Interviewer
  text: Yes, absolutely. And he flew planes, too.
- speaker: Respondent
  text: He flew. That's how he got into the cable business. He had an airplane. Don't know how you could, how you can afford
    an airplane at the time because we didn't even have a real house, but he had an airplane and maybe we had built a house
    by then. Think my mother's dad, Mr. Taylor, loaned my parents some money and built the house because he came over to visit
    once and said, So he loaned them some money and they built a house, which thought was a wonderful house, but I've gone
    back to see it more recently and it was probably 1500 square feet or something like that. Have two sisters, so of us lived
    in that house with one bathroom and swamp cooler for the summers; but had a wonderful, wonderful upbringing. I was very
    happy there.
- speaker: Interviewer
  text: 'Right. Your sisters: are they, in age, to you…?'
- speaker: Respondent
  text: I'm the oldest. I've got a sister who's months younger than me and one that's years younger than me. The one that's
    months younger than me lives in Michigan—Mount Pleasant—and the younger one lives in California. Southern California.
- speaker: Interviewer
  text: So after Culligan, then, he went in the video business?
- speaker: Respondent
  text: Yes, he had. Well, started that story. He had an airplane and somehow he got hooked up with a couple of guys that
    were technical. And one of them had gone to MIT and lived in Worland, Wyoming. It's hard to believe. He is really good,
    smart, technically; and he had been reading, think, about cable TV and the possibilities and somebody started a TV station
    in Billings, Montana, which is miles north of Worland. And he said, "Can we borrow your airplane or use your airplane?
    We'll dangle an antenna out the door and we'll go look and see if we can pick up this TV signal," because you couldn't
    get it on the ground. So that's the way cable TV actually started everywhere. So they flew around and found a hill outside
    of town where they could get—
- speaker: Interviewer
  text: Outside of which town?
- speaker: Respondent
  text: Worland. Worland, Wyoming, which was named after a guy named Worland. Chief Washiki, who was a Shoshone chief—a very
    well known Indian at the time way back when—lived right in that area. That's a side story, but… So they found a signal.
    They landed, went out field strength meter and an antenna where they had located that signal from Billings, put up a little—don't
    know how tall it was—a tower of some sort—40 feet—with a TV antenna on it, and they could get Billings. And they built
    a little building there and started trying to raise money. Think that would have been 1950 or 1951. Think they were… They
    signed up a bunch of people at—as recall, could be way off on this—$100 for a pre-install. These people had to believe
    that my dad could actually pull this off, and he signed up quite a few people and $100 in '50 was probably a pretty good
    chunk of money on a hope that this would happen. And my first recollection of that, really, is going out there in this
    tiny little building that they had built, and a little round TV set that probably was maybe inches across, and people
    were crowded around the door trying to look at this little-bitty TV set. But he raised enough money to cable from there
    into town—which, you have to amplify it every so many hundred feet—and it must have been at least mile out of town, maybe
    miles out of town. So this cable wound into town and he took it to—not a hardware store, but in those days it was maybe
    a furniture store. One of the bigger stores in town and the guy had a TV set—a fairly large old, big, huge TV set, but
    still a little-bitty screen—and put it right in the window and we were getting Billings, Montana television.
- speaker: Interviewer
  text: How exciting for them, huh? And for him!
- speaker: Respondent
  text: That was a big deal. I mean…
- speaker: Interviewer
  text: How many miles is Billings from the town in Wyoming?
- speaker: Respondent
  text: 'I''m just guessing: It''s got to be more than 100, but probably less than a—something like that.'
- speaker: Interviewer
  text: Alright. So is it because of the topography of the land?
- speaker: Interviewer
  text: The signal—a TV signal—normally doesn't go that far.
- speaker: Respondent
  text: Oh, it'll go forever. But it's line-of-sight.
- speaker: Interviewer
  text: So it was because it was line-of-sight, and you weren't in mountainous areas, or big cities, or anything like that.
- speaker: Respondent
  text: 'There were mountains all the way around, but there wasn''t a mountain between Billings and Worland. And west of Worland
    were hills. Worland''s 5,000 ft to begin with, so that whole area is high mesa. Don''t know—the hill, would call it a
    hill rather than a mountain—had to be maybe feet higher than town and that was high enough to get the signal. But in our
    microwave business, we figured the curvature of the earth would—microwaves also line of sight—so you''d have a dish, you
    see those towers. You used to see them—hardly anymore, you don''t see them much anymore—because fiber optics has taken
    over that business. But you see these tall towers with a big dish on them, and they would each be feet tall and about
    miles apart, because that''s how you had to be: feet on each end, even on a flat area of the United States to get around
    the curvature of the earth, if that makes sense, you know what I''m saying?'
- speaker: Interviewer
  text: Yeah. Right.
- speaker: Respondent
  text: But in the mountains there's a lot of microwaves that you could even bounce the microwave signal off of—like a billboard
    made of metal—so you could bounce it and make an angle. Bounce it off of the top of a mountain and down to a town or something.
- speaker: Interviewer
  text: Right. Alright. So this was in the early 50s that your father did this. Was there cable? Was he the early forerunner
    of cable in the United States?
- speaker: Respondent
  text: He would have been. He was right there within or years. Supposedly the first—there's always a question of who actually
    did the first because there weren't really good records on that—but it was in Pennsylvania somewhere that claimed the
    first. And they were probably getting signals from some big city—Pittsburgh or Philadelphia or…
- speaker: Respondent
  text: They’re too far from New York. But Dad was in there pretty, pretty early.
- speaker: Respondent
  text: I'm sure he was the first one in Wyoming.
- speaker: Interviewer
  text: Or in the Midwest.
- speaker: Respondent
  text: Well, probably.
- speaker: Interviewer
  text: I mean, you go through all those states in the Midwest, probably he had to be the first, would think.
- speaker: Respondent
  text: 'Think that''s very exciting. So, then, a little bit about that then: How did it grow?'
- speaker: Respondent
  text: Well, once we had one signal and he started, you know, cable—cabling up and down all the alleys in town. Charging.
    It seemed like $5 a month for one signal. So then they started looking for a second signal, and we ha
