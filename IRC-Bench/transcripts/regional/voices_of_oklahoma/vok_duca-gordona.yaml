collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So Gordona, would you state your full name, please?
- speaker: Respondent
  text: Gordona Duca Heiliger.
- speaker: Interviewer
  text: Your birth date and your present age?
- speaker: Respondent
  text: June 6, 1940. I'm 85.
- speaker: Interviewer
  text: So where were you born?
- speaker: Respondent
  text: Altus, Oklahoma.
- speaker: Interviewer
  text: Let's talk about your mother. Her maiden name, where she was born...
- speaker: Respondent
  text: Lola May Mark-Moore. She was born in Chickasha, Oklahoma and grew up there.
- speaker: Interviewer
  text: And her personality, how would you describe her?
- speaker: Respondent
  text: Very outgoing, very independent. My mother and dad were divorced when I was 2, and she would not take child support
    from my father so that she could have control of me and when he saw me, etc. And she was the first woman manager of Dresser
    Industries.
- speaker: Interviewer
  text: What was that?
- speaker: Respondent
  text: I was trying to remember—some big politician was a big deal in Dresser Industries. She was with Manning, Maxwell and
    Moore here in Tulsa, and then they sold to Dresser Industries, so she had to move from Tulsa to Pineville, Louisiana.
- speaker: Interviewer
  text: Your father's name?
- speaker: Respondent
  text: Gordon Talmadge Moore.
- speaker: Interviewer
  text: I was gonna ask you about your different name, Gordona. That's a little bit unusual. How does that come about?
- speaker: Respondent
  text: Well, my mother named me after my dad and put an A on Gordon and got Gordona. She thought she was the original, but
    probably years ago or something we found out there's a Gordona in Italy spelled the exact same way and it was so sad because
    my husband and I were just a few miles from it. If we'd known about it, we would have gone there. And then my daughter
    found a Noritake China called Gordona and it was spelled the same way. How about that? So, Mother never knew she wasn't
    the original.
- speaker: Interviewer
  text: But very rare, that's for sure. Then your father's name again. Say that again.
- speaker: Respondent
  text: Gordon Talmadge—which is a weird name—Moore.
- speaker: Interviewer
  text: All right. And where did he grow up and where was he born?
- speaker: Respondent
  text: Chickasha, Oklahoma. They met there and got married there, and spent a lot of time in Chickasha during the summer
    so she wouldn't have to pay a babysitter. I would go to my grandmother's because my grandmother stayed there the rest
    of her life.
- speaker: Interviewer
  text: And your father's personality, what was that like?
- speaker: Respondent
  text: Compared to my mother, very dull. He wasn't sparkling. Every day was another day, so to speak.
- speaker: Interviewer
  text: What did he do?
- speaker: Respondent
  text: Well, he did many things. He worked for Mistletoe Express for many years. He worked for a newspaper for many years.
    And when he moved to Wichita, Kansas, don't really remember what he was doing there. But he was murdered.
- speaker: Interviewer
  text: Oh, really?
- speaker: Respondent
  text: He'd retired and was driving a taxi. One thing—he did like being around people, so he took a job as a taxi driver
    and someone that was riding with him robbed him. And he fought the person robbing him and they killed him.
- speaker: Interviewer
  text: Wow. And this happened where?
- speaker: Respondent
  text: In Wichita, Kansas.
- speaker: Interviewer
  text: But your mother and father were divorced...
- speaker: Respondent
  text: Yes. But kept up with my dad. Probably was better at keeping up with him than he was at keeping up with me.
- speaker: Interviewer
  text: But that was horrible for you to hear about that.
- speaker: Respondent
  text: Oh, it was terrible, and bless his—he was married and she was a sweetheart. Helped her a lot after that and kept going
    to Wichita to see about her. And then she finally moved to her daughters.
- speaker: Interviewer
  text: Are you an only child?
- speaker: Interviewer
  text: All right. Let's talk about your education, your grade school. Where did you start school?
- speaker: Respondent
  text: Whittier. Whittier Elementary, Cleveland Junior High, and Will Rogers—and today is his birthday—High school. And was
    in Central's district.
- speaker: Interviewer
  text: Central High School's District.
- speaker: Respondent
  text: Yes, was a half a block off and wanted to go to Will Rogers. My mother was... said, "I'm gonna change my address at
    the school and give them a Will Rogers address," and she was fine with it. And think it was because she preferred to drive
    me to Will Rogers than downtown to Central. And so at the beginning of my 9th grade year, worked in the office and went
    to my index card and changed my address. Towards the end of the year, many people changed their address because they wanted
    to go to Rogers and they checked all of them out. And so many of them didn't get to go, but they didn't check me out because
    I had done it the beginning of the year. And when I was put in the Hall of Fame at Will Rogers, confessed and told what
    had done.
- speaker: Interviewer
  text: And too late now.
- speaker: Interviewer
  text: What year did you graduate?
- speaker: Interviewer
  text: All right, well, we need to talk about Will Rogers. Why did these people want to go to Will Rogers other than Central?
- speaker: Respondent
  text: I don't know, but there was lots of them and maybe it was because they lived close to the Will Rogers line also. And
    had a really good friend who lived behind me, and it's so funny. He was in Central's district, but he went to Will Rogers,
    and said, "Jerry, how did you get to go there?" Well, he used an address across the street versus his own.
- speaker: Interviewer
  text: There are a lot of famous people that went to Will Rogers and in the Hall of Fame. Let's talk about some of them.
    Like, for instance, Anita Bryant. You tell us about—you had a friendship with her.
- speaker: Respondent
  text: Oh yeah, we were best friends. I'm gonna get choked up—she just recently died. Best friends from the time we were
    sophomores in high school. That's how we met. Her folks, her mother and stepdad moved to Tulsa. So she hadn't gone to
    any other school in Tulsa. And you know, John, the truth of the matter was Anita and I did not have money, didn't come
    from money. Upper crust at Will Rogers really didn't want anything to do with her because, basically, she lived on the
    north side—not far north, but on the north side. And so Anita and I bonded and oh my goodness, when her sister died, Sandy
    was buried here in Tulsa. She lived in Texas, but she was buried here in Tulsa. Anita came and Anita stayed with me versus
    her family. I mean, we were just really, really close.
- speaker: Interviewer
  text: Was that in recent years when her sister died?
- speaker: Respondent
  text: Yes, probably years ago.
- speaker: Interviewer
  text: Well, we always knew her as a singer, 2nd runner up Miss America. And of course she represented the orange juice people.
    She would have been 80 or 81 years old. Is that how you would have been?
- speaker: Interviewer
  text: Right. So was she a singer then, known to be a singer?
- speaker: Respondent
  text: Yes. Not known, but I mean, she sang with a band at Will Rogers, and so she was singing from that point on.
- speaker: Interviewer
  text: When she graduated, what happened to her after graduation after Will Rogers?
- speaker: Respondent
  text: Well, she went to Don McNeil's Breakfast Club, wasn't it?
- speaker: Respondent
  text: She went, was on it and did a lot of singing there, and she was engaged to Pat Boone's brother. And then she went
    to Florida and that's when she met Bob and Bob basically just used her. He was terrible.
- speaker: Respondent
  text: Bob Green, that was her husband.
- speaker: Respondent
  text: One time she had come back to Tulsa and was performing at Will Rogers. And would you believe that Bob stuck his head
    out from behind the drapes and made a face at everybody while she's performing. I mean, his ego was...
- speaker: Interviewer
  text: Well, she was quite young then. When you say Don McNeil's Breakfast Club, remember listening to that, and that was
    on ABC radio, I believe, and he was well known, so she did fine out of high school. Somebody discovered her here in Tulsa
    and brought her to the network. That's pretty remarkable.
- speaker: Respondent
  text: And then of course she was with Bob Hope and that was wonderful and he was so good to her.
- speaker: Interviewer
  text: Right. And they traveled overseas?
- speaker: Respondent
  text: All the troops.
- speaker: Interviewer
  text: All the troops, right. Well, that was a nice memory you have of her, but we have other people. Let me just—there are
    many that are very famous. Leon Russell certainly is one of them.
- speaker: Respondent
  text: Yes! He was a year behind us.
- speaker: Interviewer
  text: And what was he like? What do you remember?
- speaker: Respondent
  text: You'd think maybe looking at him, he was a nerd. And very quiet and nothing like he ended up being, so to speak. Sold
    his house when he moved out of Tulsa. It was just obviously full of drugs, everything. And in fact, we didn't put him
    on Will Rogers' Hall of Fame for years because of his drugs. And say "we" because I was in the first one and we then would
    serve on the committee to choose the next ones.
- speaker: Interviewer
  text: So until he became so famous, you just had to put him in there.
- speaker: Respondent
  text: That's really kind of what happened. And I mean, some of like Dave Rader and Roger Randall were on there and boy,
    they never voted for him to go on.
- speaker: Interviewer
  text: Was he known for music then? Do you remember him as...
- speaker: Respondent
  text: No, I mean, at least when I was a senior. I don't know, maybe his senior year he did, then I wasn't aware of it.
- speaker: Interviewer
  text: Won't take time to mention them all, but football people will remember Don Chandler, kicker NFL Giants and Packers,
    winner of first two Super Bowls.
- speaker: Respondent
  text: And also David Gates.
- speaker: Interviewer
  text: David Gates and Bread, and "Baby I'm-a Want You."
- speaker: Respondent
  text: Uh-huh, and he was always wonderful.
- speaker: Interviewer
  text: Did you—was he known for his music in high school?
- speaker: Respondent
  text: Yes, absolutely.
- speaker: Interviewer
  text: Was he—how was he in the same class as you?
- speaker: Respondent
  text: Yes, we were friends and his girlfriend went to Central. Jo, and one of the songs he did was "Jo Baby." She's very
    sick and he's in California and he's been taking care of her for several years.
- speaker: Interviewer
  text: And you—so you kind of keep up with him, don't you?
- speaker: Interviewer
  text: But he was a nice person?
- speaker: Respondent
  text: Oh, very, very.
- speaker: Interviewer
  text: Yeah, Paul Davis, artist, designed covers for Rolling Stone; Archie Goodwin, comic book writer; S.E. Hinton.
- speaker: Respondent
  text: Susie Hinton.
- speaker: Interviewer
  text: Susan Eloise. That's what the S.E. stands for, Hinton.
- speaker: Respondent
  text: She was in the first Hall of Fame.
- speaker: Interviewer
  text: And of course the author of The Outsiders and other books and so forth. And what do you remember about her?
- speaker: Respondent
  text: Well, actually she was quiet also, but very nice, of course. And always thought, well, maybe because she's a writer
    that's made her quiet.
- speaker: Interviewer
  text: But did you know she was a writer? Was she on the student newspaper or anything like that, do you think?
- speaker: Respondent
  text: I'm not aware she was on the student newspaper. We did know she would write. In fact, I think she wrote some poetry
    too.
- speaker: Interviewer
  text: I've interviewed this person, Russell B. Myers. He created Broom-Hilda. National Cartoonists Society, Best Humor Award.
    Don't know if you remember him or not.
- speaker: Interviewer
  text: But have interviewed him. And then of course David Rader, TU star, and now in the Oklahoma Senate; Roger Randall,
    Oklahoma Senate, mayor of Tulsa; and then we can't leave out Gaylord Sartain.
- speaker: Interviewer
  text: And what do you remember about him? Was he around your age?
- speaker: Respondent
  text: He's younger, but he was always funny.
- speaker: Interviewer
  text: Paula Unruh...
- speaker: Interviewer
  text: Senior executive in the Reagan administration. And there's some others here too, but that's a pretty stout list of
    people who go to Will Rogers.
- speaker: Interviewer
  text: And then you were in that beautiful facility of Will Rogers.
- speaker: Respondent
  text: It is, and it's still gorgeous.
- speaker: Interviewer
  text: It is because we were there recently for a function and every time we go in there, we just think, "These kids were
    so lucky to be in this school and this building."
