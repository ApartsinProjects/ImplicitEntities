collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Let's talk about your father first and your family and maybe a bit about the Borens coming to Oklahoma.
- speaker: Respondent
  text: Well, the Borens came to Oklahoma shortly after statehood. When they first came here my dad was about six years old.
    They came in a covered wagon. My grandfather was an entrepreneur of sorts. His family and my grandmother's family, my
    Grandmother Boren, who was a Weatherall, both families had come to Texas very early on. And my Grandfather Boren's father
    had come with Stephen Austin and the original colony to Texas. So that made me eligible to be a member of the Sons of
    the Republic of Texas, which I had a lot of fun saying to Texas audiences and then saying, "I realized the dream of every
    Texan when he got to come to Oklahoma." So he was an early Pioneer. He had another great grandfather on my grandmother's
    side that had the first subscription school in East Texas too.
- speaker: Respondent
  text: So there were early educators, entrepreneurs. My grandfather Boren had the first ice cream parlor in Texas, that was
    one of his ideas was to have ice cream. I'm not sure how successful that was but among other things he had head of a construction
    company and by subscription they built levees along the main rivers of Texas. I've forgotten which river that he was building
    a levee. He had a farm too, he had a cotton farm. And while he was trying to build the levee a huge flood came along and
    wiped out the levee. And with it, wiped out everything that my grandfather had, all of his financing. He had nine children
    and the farm, which was mortgaged, and they finally just lost everything and came to Oklahoma in a covered wagon. So they
    came across the Red River in a covered wagon with my dad had a little stick horse that he said he ran behind the covered
    wagon riding his stick horse. And I think spent the first night in Oklahoma at the wagon yard down around Waurika.
- speaker: Interviewer
  text: Hmm. Your father's name?
- speaker: Respondent
  text: Was Lyle Boren.
- speaker: Interviewer
  text: He went on to become?
- speaker: Respondent
  text: A congressman from Oklahoma. Well, he was a school teacher first at a rural school in Seminole County. Some of his
    students were older than he was. It was at an early age. And then he ran for Congress in 1936, and got elected. We're
    never quite sure how old he was. We think he was twenty-five at the time but we're not sure because his birth certificate
    was lost and my grandmother, he told her to put his age in the family Bible that would make him eligible to run for Congress
    that year. So we're not sure if he was really twenty-four when he was elected to Congress or twenty-five, but he was the
    third youngest since Henry Clay at the time he was elected.
- speaker: Interviewer
  text: But he was also a farmer and rancher at -
- speaker: Respondent
  text: He was a farmer and rancher and, in fact, after he left Congress and we came back home to Oklahoma, he operated cattle
    ranches fairly near Seminole and he was one of the founders of the Oklahoma Cattlemen's Association. So he has a long
    history there. And used to take me as a child around to go sign up all these ranchers in places like Woodward and all
    over the state, up in the Osage, just close friends of the Drummonds up there and others that were a part of the early
    formation of the Cattlemen's Association. So that was a fun experience.
- speaker: Interviewer
  text: That was a cute story about he sold a cow for forty dollars to finance his first year in college.
- speaker: Respondent
  text: Yeah I think that's true.
- speaker: Interviewer
  text: At East Central.
- speaker: Respondent
  text: That's right, at East Central, and that's where he met my mother. He was a student at East Central getting his teaching
    certificate. They used to have a practice school that was attached to East Central called Horace Mann School. And my mother,
    who had grown up in Maud, the schools weren't too adequate there at the time. My grandparents moved temporarily to Ada
    so she could go to the Horace Mann Teaching School at East Central. So she went to that high school at East Central and
    my dad turned out to be one of her teachers. She said she always remembered at the end of the semester and she had kind
    of fallen for him. And he obviously had, he told her, "You can't enroll in my class next semester." And she said, "Well,
    why?" And he said, "Because I'm not allowed to date any of my students and I intend to date you." So that was the beginning
    of that.
- speaker: Interviewer
  text: He attached himself to the Oklahoma Democratic party.
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: How did that come? Was that a natural progression?
- speaker: Respondent
  text: Well, I think that probably the feeling had been Democrats in Texas, and, you know, of course, Oklahoma was so overwhelmingly
    Democratic at that time. And he was very active. Then became active, even in college, in what was called the Young Democrats
    fraternity. We call it the Young Democrats today, college Young Democrats. He became very active in that. Virtually the
    whole state was Democratic, it was total one-party rule. The principal thing he believed in was giving equal opportunity
    to everybody. And he had a real sensitivity to those who were underprivileged. And, after all, my grandfather had to become
    a tenant farmer. He had been very successful but he lost everything. Came to Oklahoma, they lived over near Lawton, they
    lived in about seven or eight different locations. And he had all these kids and they had a struggle. My father went to
    all these different high schools. And he said he can remember they used to take in stray kids too that they needed to
    feed and so on. My grandmother and my grandfather, they had to put water in the gravy and everything else. They just literally
    barely had enough to eat so -
- speaker: Interviewer
  text: You're talking about the Great Depression time, aren't you?
- speaker: Respondent
  text: Yeah absolutely.
- speaker: Respondent
  text: 'So this was the ''30s, and Dad was first elected to Congress in 1936. A lot of it was sensitivity to people that
    had not had a lot of privileges. And I remember one rule in our household: You could never use the word class. You could
    never say, "He''s middle class," "He''s upper class," whatever, you could never use that word. He said, "Well, they have
    classes in Europe, places like Britain, they believe in the class structure. We''re Americans, we believe everyone is
    equal, we don''t believe in classes." So if you said the word class at the dinner table you were asked to get up and leave
    the dinner table, literally. I was asked once to leave the dinner table when I misused that word. He had very strong feelings
    about that.'
- speaker: Interviewer
  text: He was a very convincing speaker, wasn't he?
- speaker: Respondent
  text: Yes he was.
- speaker: Interviewer
  text: Yeah. And, as a matter of fact, he was called to campaign for Franklin Delano Roosevelt.
- speaker: Respondent
  text: He was and I still have some pictures of him on the back of the train, introducing President Roosevelt. He was very
    independent-minded, it was interesting, he was a very strong Roosevelt supporter, but at the same time, he was conservative,
    he was a conservative Democrat when it came to financial matters and other matters. Sometimes he didn't vote with Roosevelt,
    which caused some consternation from the President from time to time, but he never ceased supporting him, and, in fact,
    took me over to the White House when I was three years old and put me on the President's lap. I wish I could claim that
    I remember being on Franklin D. Roosevelt's lap but I don't. Just vaguely remember it.
- speaker: Interviewer
  text: You remember his aura or anything?
- speaker: Respondent
  text: All I can remember about him was he was very kindly in a wonderful warm way. As a child you sense that. One of the
    things Dad always did with me is he shared his political experience with me. One of his very close friends was Sam Rayburn,
    the Speaker of the House for so many years. Very often he took me to see Mr. Rayburn when he went. And then later on when
    I was in college and in high school, I would go out and Mr. Rayburn would tell my father to sit outside and wait on me,
    he had somethings he wanted to discuss with me. And then he would let me come into his office. We had these long conversations
    and he would tell me what he was working on and what did I think? Well, you can imagine, for a sixteen-year-old or seventeen-year-old,
    the Speaker of the House asking you these things in his ornate office in the capitol was quite an experience. And in fact,
    I tried to remember that all the rest of my life. When I got to the Senate a lot of days there would be FFA kids from
    Oklahoma, or other high school students and kids coming up. It would be a very busy day and my secretary would come in
    and say, "Well, there's this couple of young kids out here in the office that want to see you. But you don't have time
    to see them?" I said, "No, I have to." I always thought in my mind, "Well, I want to pay Mr. Rayburn back for the time
    he spent with me as a kid."
- speaker: Interviewer
  text: And I was reading where your father was that kind of person, would talk to everybody at every level, not class, level.
- speaker: Respondent
  text: Every level, yeah, he certainly wouldn't say class. See, that was another thing he taught me. I would go with him
    and we would be campaigning. And say, we'd see a mechanic under a truck or we'd see a farmer out in the field on his tractor.
    My dad would say, "We're going to go talk to this man," whether it was the mechanic or whether it was the farmer or whether
    it was the bank president. He'd take me in there too. He said, "Now when we get through I want you to tell me what you've
    learned from that person. Because," he said, "there's not a person in this world you can't learn something from because
    they all have different experiences than you do and different insights. So I want you to tell me what you learn from listening
    into our conversation. What did you learn from him or her?" And it was really a wonderful lesson.
- speaker: Interviewer
  text: You were known as a moderate Democrat.
- speaker: Interviewer
  text: You spoke about your father being that.
- speaker: Interviewer
  text: Is it where the seed of that was planted in you to be one?
- speaker: Respondent
  text: I think it probably is where the seed was planted and also kind of being a renegade, because I was a renegade certainly
    in the party. I remember my friend Frosty Troy once said about me on Halloween, "David Boren's going to come masquerading
    as a Democrat." I got a lot of teasing about it, but I think that's what I saw from him and I heard from him always was,
    "Think for yourself." And the other thing that I took from this, including thinking about young people especially, he
    had a real special interest in young people, was he used to say, "If you're ever going to run for political office keep
    your bags mentally packed." What he meant by that was, "Don't ever want to hang onto the office so badly that you cast
    a vote against your beliefs or your principles or you compromise yourself in a basic way. Don't ever do that. Always have
    your bags packed that you can say to yourself, 'I don't need this job, I can just pack up and go home,' because you won't
    stay true to your principles if you want the job more than you want to stay true to them." It was a really good lesson,
    and I've had to say to myself many, many times, "Are your bags really mentally packed?" when you had to take a position
    that maybe wasn't too popular.
- speaker: Interviewer
  text: And since you went on to be a public servant, how many times you meant to say to yourself, "How blessed I was to have
    this father who taught me all these lessons"?
- speaker: Respondent
  text: I was so much. You know, he was just a person of complete integrity. Sometimes almost to the point of being rigid
    because he had such strong beliefs about things and he just would not compromise an inch. My mother was pretty much the
    same way so I guess I came from hardheadedness naturally.
- speaker: Interviewer
  text: I was going to ask you a bit about her, her personality.
- speaker: Respondent
  text: Well, she was very gentle. He could be gruff, certainly I never wanted to displease him because if I did I heard about
    it in a hurry. She was more, I would say, the indulgent mother who thought her son could never do any wrong. You know,
    it's been interesting, I love to read biography. So often behind a lot of these great people are mothers that just dote
    on their sons. Well, I have to say, my mother did dote on me, and sometimes hid me from the wrath of my father over something
    I'd done. She was very kind, very, very kind, but she was also very strong-minded and stubborn when it came to something
    she really believed in or thought should be done.
- speaker: Interviewer
  text: Siblings of yours?
- speaker: Respondent
  text: I have a sister. My sister, Susan, who is seven years younger, who claims that I was a bossy brother because I was
    so much older and that I've never changed my ways. But she lives in Washington, DC.
