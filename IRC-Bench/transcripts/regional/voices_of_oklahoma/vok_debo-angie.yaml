collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: You wrote a book titled Hidden Treasures of the American West. When did you publish this?
- speaker: Respondent
  text: This book was published in 2005 by the University of New Mexico Press.
- speaker: Interviewer
  text: You’ve highlighted three treasures, and these treasures are people. Let’s name Muriel Wright.
- speaker: Respondent
  text: Muriel Wright was a Choctaw historian and a longtime editor of the Chronicles of Oklahoma, the state’s historical
    quarterly at the Oklahoma Historical Society.
- speaker: Interviewer
  text: And the other treasure is Alice Marriott.
- speaker: Respondent
  text: First woman to graduate from OU’s undergraduate degree in Anthropology, and went on to do incredible research among
    Kiowa people. For example, a longtime field worker for the Indians Arts and Crafts Board.
- speaker: Interviewer
  text: And then the person we’re here to talk about is Angie Debo, who is definitely a treasure. We’re going to be telling
    her story. She was an American historian. She wrote thirteen books.
- speaker: Respondent
  text: Thirteen books.
- speaker: Interviewer
  text: And hundreds of articles about Native Americans in Oklahoma history.
- speaker: Interviewer
  text: There were many historians who wrote about Native Americans but she came at it from a unique way that we will get
    into.
- speaker: Respondent
  text: Um-hmm, um-hmm.
- speaker: Interviewer
  text: And her legacy lasts forever, so that’s what we want to talk about. Angie was born January 30, 1890, and she died
    February 21, 1988. She was ninety-eight years old when she died. What was her full name?
- speaker: Respondent
  text: Angie Albertha Debo.
- speaker: Interviewer
  text: Where was she born?
- speaker: Respondent
  text: She was born outside of Beattie, Kansas, at home. The family came to Oklahoma when she was a child, as part of this
    migration story that many families experienced coming West and searching for better opportunities for their children.
- speaker: Interviewer
  text: Her parents, their names?
- speaker: Respondent
  text: Edward and Lena Debo.
- speaker: Interviewer
  text: Do we know anything about them and their personalities?
- speaker: Respondent
  text: And we’re still learning more about her parents. But what I can tell you is that both parents instilled an incredible
    work ethic in their children. Angie had a brother who was about two years younger; his name was Edwin. So the two children
    grew up with parents who instilled values and work ethic. Father was a farmer, mother worked in the fields and worked
    in Kansas. And then when they came to Oklahoma, her work continued but it was more in the home while the father was working
    in the fields. Her father had an incredible desire for reading. He would read a book once and then move on but he would
    remember that, he would memorize it. And then her mother really encouraged Angie to do well in school. She kept all of
    Angie’s report cards. We have a record where her mother signed all of her report cards and Angie kept all of those report
    cards. And her mother also encouraged her to keep a diary for three months at a time, when Angie was nine years old and
    eleven years old. Those kinds of foundational tools are so important when we think about Angie Debo.
- speaker: Interviewer
  text: So at home, she had a good base?
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: Pushing her to education and pushing her in that area. You said they came in covered wagon.
- speaker: Respondent
  text: Yes, I would say she was about eight, soon to be nine years old. She documented her experience coming from Kansas
    to Oklahoma Territory and starting a new life here.
- speaker: Interviewer
  text: She documented it, where do we have that?
- speaker: Respondent
  text: We have it in her oral history from the 1980s, we have it in letters that she would write to friends back in Kansas,
    and we have it in her diary.
- speaker: Interviewer
  text: Did she ever marry?
- speaker: Respondent
  text: She did not.
- speaker: Interviewer
  text: Which is one of the reasons you’re telling the story because there aren’t any family members, apparently, who were
    close enough to her to tell the story.
- speaker: Respondent
  text: Oh, that’s a great question because I think about all the citizens of Marshall, Oklahoma, where she spent quite a
    bit of time. And that’s where she did the majority of her writing, in her family home in Marshall. So I would say a lot
    of the residents of Marshall are very much her family members. And they would call her Miss Angie. And they knew that
    they should not bother her half the day because that half the day she was writing. So if you wanted to call on Miss Angie
    you needed to do it during the appropriate calling hours and do not trouble her until the appropriate hours. But they
    were very much her family.
- speaker: Interviewer
  text: But no heirs, and obviously, no children. Do you know if she ever had a romantic life? Did she have anybody that was
    a possibility?
- speaker: Respondent
  text: That’s a wonderful question. We think about women historians and the work that we do when we study their work, and
    I would say some women of means would have more opportunities to marry, have children, and continue their work. But many
    women made the intentional choice not to marry, not to have children, to dedicate their lives to their work, to their
    writings, to the research.
- speaker: Interviewer
  text: So that’s what she did?
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: How much of the pioneer’s spirit affect her writing?
- speaker: Respondent
  text: I think about that quite often. The pioneering spirit, her biographer is Shirley Lucky. In many ways, I’m borrowing
    from Shirley Lucky when I say, “Yes, this pioneering spirit is alive and well in Angie Debo’s life and her writings.”
    She studied under E. E. Dale at the University of Oklahoma, who in turn, had studied under Frederick Jackson Turner. Many
    of us consider him the father of western history. So if we think about the legacy, it begins with Turner, continues in
    Dale, and in a modified form continues this pioneering spirit with Angie Debo’s writings.
- speaker: Interviewer
  text: But isn’t she credited for being the forerunner of the new western history?
- speaker: Respondent
  text: Yes, the new Indian history, ethno history, and the new western history.
- speaker: Interviewer
  text: Let’s go back to her education, elementary, junior high, high school. Tell us about that in Marshall.
- speaker: Respondent
  text: When we think about Kansas and then moving to Oklahoma Territory we’re going to see some interesting things going
    on when we look at Marshall, Oklahoma. So she attended one-room schoolhouses in Kansas and in Oklahoma Territory in Marshall.
    She loved going to school, she enjoyed her teachers, she enjoyed her classmates, they were called scholars. She would
    ride her pony, Queen, to school with her brother, Edwin. So she loved to learn. She absolutely loved to learn. She graduated
    early and by sixteen she was teaching in the rural schools. Then we kind of come to a darker period of her life where
    she talks about waiting, waiting for the high school to open. Waiting for the high school to open. And then, finally,
    enrolling in the high school and graduating high school at the age of twenty-three.
- speaker: Interviewer
  text: Marshall did not have a high school when she was ready to go.
- speaker: Respondent
  text: Right. And to her—
- speaker: Interviewer
  text: And that’s why she was waiting for it to open.
- speaker: Respondent
  text: And to her, she found that as a detriment.
- speaker: Interviewer
  text: So that was a dark time for her?
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: And you kind of wonder, did she do any writing?
- speaker: Respondent
  text: She was working, she was teaching, but she felt like she had more to do. So she was waiting, she was waiting.
- speaker: Interviewer
  text: Might have been reading every book she could get her hands on, more than likely.
- speaker: Interviewer
  text: But didn’t she receive a school diploma when she was twelve?
- speaker: Respondent
  text: Yes. She went through the school system, she graduated, she worked in one-room schools as a teacher, and then waiting
    to get the high school diploma and then continue her training, continue her work at the college level.
- speaker: Interviewer
  text: And by the way, where is Marshall?
- speaker: Respondent
  text: Marshall is to the west of Stillwater, so if you go north on I-35 and then you head west at the Stillwater exit you
    hit Marshall.
- speaker: Interviewer
  text: So it’s how close?
- speaker: Respondent
  text: To Stillwater?
- speaker: Respondent
  text: I would say forty minutes.
- speaker: Interviewer
  text: Okay. So she goes on to college, attends the University of Oklahoma.
- speaker: Interviewer
  text: Did she graduate from there?
- speaker: Respondent
  text: Yes. She studies with E. E. Dale at the University of Oklahoma, really becomes dedicated to the historical profession
    through her mentor, Dale. He taught her the mechanics of good historical writing in his historical methods course, and
    she just really took to it. And she didn’t stop. Once she got started she just was a prolific writer.
- speaker: Interviewer
  text: So her interest in Native Americans hadn’t happened yet until maybe she met Dr. Dale?
- speaker: Respondent
  text: If I may, I would say from her undergraduate experience she continued to study at the University of Chicago. And she
    was interested in foreign policy, she was interested in a variety of topics. It was when she returned to the University
    of Oklahoma graduate program to study and receive the PhD in History that she really then focused on American Indian history.
- speaker: Interviewer
  text: Because Dr. Dale had added American Indian History to the course.
- speaker: Respondent
  text: Um-hmm, um-hmm, yes.
- speaker: Interviewer
  text: Since she was gone and when she came back it was there.
- speaker: Respondent
  text: Yes. He offered the very first American Indian History course at the University of Oklahoma.
- speaker: Interviewer
  text: So that’s then maybe—
- speaker: Interviewer
  text: …where this is all born.
- speaker: Respondent
  text: Um-hmm. I would say both of them are very interested in studying the American West, the Frontier West. But then listening
    to his lectures how he would also incorporate American Indian History. And then it’s time for her to think about a dissertation
    topic and it’s Dale who suggests that she take a look at the Choctaw Nation records.
- speaker: Interviewer
  text: Were there similarities between Angie and Dr. Dale in the way they viewed Oklahoma history?
- speaker: Respondent
  text: Um-hmm, um-hmm, um-hmm.
- speaker: Interviewer
  text: So there was kind of a bond there at the beginning?
- speaker: Respondent
  text: Yes, yes, absolutely. Both of them had that similar frontier experience. Dale too, was waiting for some of these high
    school institutions to open. And he also graduated later in life and then he graduated. He also taught in one-room schools
    and then was a superintendent and reached his undergraduate degree later in life as well. So yes, they come from similar
    backgrounds.
- speaker: Interviewer
  text: Was that the beginning as she saw the white settlement on Indian lands as not settlement but as a burden that these
    allotments were taken away. Which we’ll get in and talk more about.
- speaker: Interviewer
  text: But at the outset, she had that vision, didn’t she?
- speaker: Interviewer
  text: They were taking away land and she was there to right the story.
- speaker: Respondent
  text: Um-hmm. Yes, because whereas Dale might talk about some of these topics in class in his lectures, he would not write
    about these topics, he would not publish these topics. But she wanted to learn more. She conducted the archival research
    and wrote books about these topics.
- speaker: Respondent
  text: Wanted to share the expertise with the public.
- speaker: Interviewer
  text: I think you talked about graduate school, but wasn’t she a principal in Enid for a year?
- speaker: Respondent
  text: Um-hmm. And when I think about the other women we talk about in Hidden Treasures of the American West they too were
    educators. They too were principals or superintendents, administrators in the public school systems.
- speaker: Interviewer
  text: And so she taught four years at Enid High School?
- speaker: Respondent
  text: Um-hmm, um-hmm.
- speaker: Interviewer
  text: I hope they’re honoring her every day.
- speaker: Respondent
  text: I hope they are too.
- speaker: Interviewer
  text: When she was at the University of Chicago, is this the first time then she experienced gender discrimination? Because
    this is very much a part of her story.
- speaker: Respondent
  text: Um-hmm, um-hmm.
- speaker: Interviewer
  text: Is that true? And how does that come into her story?
- speaker: Respondent
  text: Yeah, I would agree with you, John. These are great questions to consider and discuss. She did very well in her graduate
    work at the University of Chicago. There were other women who were also students in the graduate program, but it was,
    I would say, majority male faculty and male graduate students. And when it’s time for finding employment, finding tenure-track
    positions, she really struggled and was actually told that it was detrimental that she was woman; that they were really
    looking for men to hire.
- speaker: Interviewer
  text: I think she wrote later on when she was applying maybe to the University of Oklahoma—I’m getting ahead of myself—she
    said, “This affliction—”
- speaker: Interviewer
  text: “…being a female.”
- speaker: Interviewer
  text: You know, right here might be a good place—describe her personality.
- speaker: Respondent
  text: What I really enjoy about studying Angie Debo is you see her humor. You see her humor in her writing. You see her
    humor in the way she would talk and tell stories in her Oral History interviews. And that humor was a live and well in
    her childhood writings as well, in her diaries she was funny, in her letters to friends in Kansas she was funny. So she
    had a wonderful sense of humor and she enjoyed life very much.
- speaker: Interviewer
  text: But she was also very assertive.
- speaker: Interviewer
  text: Which got her through and did the things that she did. Isn’t that true? And she had a personality, maybe, that could
    rub some people the wrong way?
- speaker: Respondent
  text: Absolutely. And this is where we need to talk about historians like Angie Debo and others through the lens of gender.
    Because women may have the same goals, pursuits, similar topics as men, and we can talk about the 1920s and ’30s and ’40s
