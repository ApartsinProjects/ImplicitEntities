collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So Fred, would you state your full name, please?
- speaker: Respondent
  text: Frederic Griffin Dorwart, Jr.
- speaker: Interviewer
  text: Your last name Dorwart. What's the significance of that, your ancestral story?
- speaker: Respondent
  text: Well, there are now a number of Dorwarts in the country, even though it's a fairly rare name. The family all started
    with two brothers named Dorwart who came over very early in the history of the country and settled in the Pennsylvania
    Dutch country.
- speaker: Interviewer
  text: And they came from where?
- speaker: Respondent
  text: And they came from - they were Huguenots - they came from France.
- speaker: Interviewer
  text: And where are we recording this interview?
- speaker: Respondent
  text: In Old City Hall in Tulsa, Oklahoma.
- speaker: Interviewer
  text: And why are we in Old City Hall?
- speaker: Respondent
  text: Old City Hall is my law offices.
- speaker: Interviewer
  text: And you own the City Hall, do you not?
- speaker: Interviewer
  text: Old City Hall, when was it constructed?
- speaker: Interviewer
  text: And they used this till what year?
- speaker: Respondent
  text: 1959, believe. It remained a derelict building for six to eight years, believe. And then a prominent Tulsa architect
    by the name of Coleman, who you may know, and lawyer rehabbed the building and for an early downtown building rehab, they
    did a really nice job.
- speaker: Interviewer
  text: So you've owned the building since when?
- speaker: Interviewer
  text: And we should point out we're at the corner of 4th and Cincinnati. It's been named Frederic Dorwart Way.
- speaker: Respondent
  text: Yes. [Laughing]
- speaker: Interviewer
  text: And you're embarrassingly laughing at that. How did that come about?
- speaker: Respondent
  text: Well, I'm not sure who originated it, but it was one of my law partners, and I think I know which one. [Laughing]
- speaker: Interviewer
  text: Who was it? [Laughing]
- speaker: Respondent
  text: Paul DeMuro. Yeah.
- speaker: Interviewer
  text: Your birth date?
- speaker: Respondent
  text: January 31, 1937.
- speaker: Interviewer
  text: Making your present age...
- speaker: Interviewer
  text: We should talk a little bit about 89. Your ancestors, parents, or whatever, do they live that long?
- speaker: Respondent
  text: Yes, my mother and father both lived into their 89th year. My two sisters into their 92nd year. My maternal grandfather
    lived to be, think, or something like that. Don't know about my paternal grandfather.
- speaker: Interviewer
  text: So you have that going for you, and then suppose that people ask you, "What is it you've done to live this long?"
    and what do you say?
- speaker: Respondent
  text: Well, don't know. I mean, just take a day at a time.
- speaker: Interviewer
  text: You've taken care of yourself, obviously.
- speaker: Respondent
  text: Yeah, have. As a young person, played a lot of athletics and have always been active, stayed away from stuff that
    you're supposed to stay away from. So I mean maybe that's it, or maybe it's just the good Lord decided this is what it
    was supposed to be.
- speaker: Interviewer
  text: And you have genes going for you too, so that's important. But you're working every day. You're putting in a full
    day, aren't you?
- speaker: Respondent
  text: No, normally work eight hours a day. Don't work on weekends anymore, though. Used to work on weekends. Don't do that
    anymore.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: In Muskogee. I'm the original Okie from Muskogee.
- speaker: Interviewer
  text: Your mother's name?
- speaker: Respondent
  text: Mildred Gibson.
- speaker: Interviewer
  text: And where was she born? Where did she grow up?
- speaker: Respondent
  text: She grew up in Culpeper, Virginia. My mother's family were early Virginians.
- speaker: Interviewer
  text: Describe her personality. What was she like?
- speaker: Respondent
  text: Well, she was highly educated, which is kind of unusual for women at that age. She had a Bachelor of Science degree.
    She was a chief nursing officer at the UVA medical school.
- speaker: Interviewer
  text: So this would have been back in approximately what years?
- speaker: Respondent
  text: 1925, something like that.
- speaker: Interviewer
  text: Yeah, few women would have attended college back then.
- speaker: Interviewer
  text: Your father's name?
- speaker: Respondent
  text: My father's - well, I'm a junior. His name was Frederic Griffin.
- speaker: Interviewer
  text: And where was he born and grew up?
- speaker: Respondent
  text: He grew up in Pennsylvania. His father was an Episcopalian minister there in a small town.
- speaker: Interviewer
  text: And what was his personality like?
- speaker: Respondent
  text: He was very even keeled. He was a doctor. People loved him. He practiced medicine when the doctors made night calls.
    He was one of those kind of doctors that said, "Why don't you go home, take an aspirin," or he was even known to give
    people a placebo from time to time, which I don't think doctors are allowed to do anymore, but it seemed to work really
    well for him, so he was an interesting guy. He was an Army Air Corps instructor in aviation at Kelly Air Force Base in
    San Antonio. Then he went to med school and came here because the Fite brothers - do you know the Fite family from Muskogee?
    The Fite family is an old family in Muskogee, and there were three Fite brothers, and two of them were doctors and they
    were in his med class in Virginia and they talked him into coming to Muskogee and practicing with them.
- speaker: Interviewer
  text: OK, so that brings your mother and father to Muskogee and the reason you were born there. Wasn't he a veteran of which
    war?
- speaker: Respondent
  text: World War and World War II.
- speaker: Interviewer
  text: Is that right?
- speaker: Interviewer
  text: Now that's amazing, isn't it? It must have been near the end of World War maybe, for him to be in both wars.
- speaker: Respondent
  text: You know, don't know what the years were. But yeah, he used to fly up here and land in the country in the old biplanes
    that the army had at that point in time.
- speaker: Interviewer
  text: He flew. Was he a pilot?
- speaker: Respondent
  text: He was, yeah. He was a flight instructor for the army in World War I. I still have these goggles - the goggles that
    go around there - I still have these goggles.
- speaker: Interviewer
  text: Well, you had parents that were wonderful role models for you, weren't they?
- speaker: Respondent
  text: They really were. I mean, they really were.
- speaker: Interviewer
  text: Did you have brothers and sisters?
- speaker: Respondent
  text: Had two sisters. They were both nurses. The older one married a Canadian in 1954 and lived in Canada and ultimately
    became a Canadian citizen. My younger sister was a nurse that trained at Saint John's Hospital when Saint John had its
    own nursing program here in Tulsa -
- speaker: Respondent
  text: Yeah, and was a nurse at Saint John's for her life.
- speaker: Interviewer
  text: Let's give their names. Your oldest sister first and the youngest...
- speaker: Respondent
  text: Carter. Carter was my older sister and Cynthia was my younger sister. Cynthia just died several months ago.
- speaker: Interviewer
  text: And how old was she?
- speaker: Respondent
  text: She was 92.
- speaker: Interviewer
  text: And then your older sister?
- speaker: Respondent
  text: She was when she died, but that was - she died during the pandemic, which was not what you would hope it would be.
- speaker: Interviewer
  text: OK, your education. Beginning of grade school there in Muskogee.
- speaker: Respondent
  text: Yes, Longfellow Grade School.
- speaker: Interviewer
  text: And to junior high?
- speaker: Respondent
  text: Junior high school. And then Tulsa Central High School.
- speaker: Interviewer
  text: You jumped on me now. How did you come from Muskogee to Tulsa? Why did that happen?
- speaker: Respondent
  text: Left-- when graduated from high school… Immediately that summer went to summer school at the University of Michigan
    because my debate coach, who was just a super fellow - he was getting his PhD there and he asked me just to go up with
    him to Michigan and did. Then went down to OU and then the fall of 1954, was going back and forth on weekends to OU and
    really didn't like OU. I was a prude and they chewed and they smoked and they went with women, and anyway, didn't get
    along down at OU. So my mother one weekend said, "Well, here's what you can do." And said, "What's that?" And she said,
    "Well, the representative" - oh gosh, I'm having a blank moment here. You would know him. His brother was governor - was
    giving tests for appointments to the service academies. At that point in time, the congressmen had all figured out that
    having the power to appoint someone was more a liability than it was an asset, so they started giving tests. So took this
    little test and a couple of weeks later got a letter from him saying that had the appointment. So then the question was
    what was going to do? And said, "Well, guess I'll go to the Naval Academy." My mother had gone to Sunday afternoon tea
    dances in Annapolis, and that's why she thought the Naval Academy would be the right thing to do.
- speaker: Interviewer
  text: OK, let me come in. What year did you graduate from high school?
- speaker: Interviewer
  text: And with honors too, as a matter of fact, magna cum laude?
- speaker: Interviewer
  text: But that's when you got involved in speaking?
- speaker: Respondent
  text: Yeah, my high school days were all spent in competitive debate and extemporaneous speaking with a school teacher by
    the name of J.W. Patterson, who was a terrific guy. Probably learned more from him than have anybody else. So that's how
    spent my high school days.
- speaker: Interviewer
  text: So that just came so naturally to you, apparently, even maybe as a freshman, sophomore - I mean, it was just an obvious
    thing that you would partake in?
- speaker: Respondent
  text: Well, he sought me out. He actually called my parents and said he wanted to talk to me because he wanted me to do
    it. Don't know why he picked me. I, frankly, never knew that. So yeah, guess it's kind of natural.
- speaker: Interviewer
  text: Because you hadn't thought about it. If that teacher hadn't reached out to you...
- speaker: Respondent
  text: Oh no, no, no. If he hadn't reached out to me, don't know what the course of my life would have been like.
- speaker: Interviewer
  text: Proving the importance of teachers, right?
- speaker: Respondent
  text: That's exactly right.
- speaker: Interviewer
  text: How they can change a course of a person's life.
- speaker: Interviewer
  text: And have several instances of my many interviews of a teacher who did exactly what yours did.
- speaker: Respondent
  text: Yeah, no, there's no question. There's no question about it. Learned more from that one person than any other person
    in my life, really, other than my parents - the influence of my parents.
- speaker: Interviewer
  text: So US Naval Academy, what did you graduate with from the Naval Academy? What degree?
- speaker: Respondent
  text: What do they call it? Excellence. It's not, they don't, they don't treat it like everybody else, but it was with excellence,
    which was in the top 10% of the class.
- speaker: Interviewer
  text: So isn't that where you had a BS in engineering?
- speaker: Interviewer
  text: And you graduated there in what year?
- speaker: Interviewer
  text: All right. Why engineering?
- speaker: Respondent
  text: Well, at the time, that was the only degree that the Naval Academy offered. It was interesting. We had a totally prescribed
    program. Every man or boy - because there were no girls - took the same classes, and there were 1000 of us, and we got
    an engineering degree. That was the only degree that the service academy offered at that point in time.
- speaker: Interviewer
  text: So you're going from Oklahoma to Annapolis. Was that a big jump, your first days at Annapolis? Was it difficult for
    you to adjust?
- speaker: Respondent
  text: Well, the summer was terrific because it was basically like basic training where you gained your physical strength
    and learned teamwork and learned how to fire weapons and all that sort of business. Really enjoyed that. Then the first
    year was really rough because that's when they had both physical and mental hazing in the academies, so it was really,
    really rough. At one point in time, around Christmas time, told my father, said, "You know, think really want to come
    home," and he said, "You know, you're not coming home until the end of the 1st year. You stay the year and then if you
    want to come home, we'll talk about it." Well, when got through that first year, then really enjoyed it and really realized
    what a value that plebe year was.
