collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So, Dan, would you state your full name, please?
- speaker: Respondent
  text: My name is Dan Boudreau.
- speaker: Interviewer
  text: You have a middle initial name?
- speaker: Respondent
  text: Daniel J. Boudreau.
- speaker: Interviewer
  text: Your birth date.
- speaker: Respondent
  text: My birthday is May 10th, 1947.
- speaker: Interviewer
  text: And your present age?
- speaker: Respondent
  text: I am years old.
- speaker: Interviewer
  text: And where were you born?
- speaker: Respondent
  text: I was born in Natick, Massachusetts. Didn't stay there very long, though.
- speaker: Interviewer
  text: Well, let's talk - we'll find out why. Let's talk about your mother, your mother's name, maiden name, where she was
    born and raised.
- speaker: Respondent
  text: My mother was born in Wellesley, Massachusetts. And her name is Mary Elizabeth Duffy, a good Irishman.
- speaker: Interviewer
  text: What kind of personality did she have?
- speaker: Respondent
  text: She was very warm and very affectionate but very old-fashioned Irish. I mean, I've obviously got no complaints with
    my mom or dad. My dad was Daniel J. Boudreau. He was born in East Boston, Massachusetts.
- speaker: Interviewer
  text: And that's where he grew up, in that area.
- speaker: Respondent
  text: That's right, East Boston. Surprisingly, although Boudreau is a French name and he was half French and half Irish,
    East Boston was an Italian community. So my mother grew up in a more refined community than my dad did.
- speaker: Interviewer
  text: They probably let each other know that. What did he do for a living?
- speaker: Respondent
  text: He got a master's degree in social work from Boston College and he basically was the executive director of Catholic
    Charities in Newburgh, New York, and also in Albany, New York.
- speaker: Interviewer
  text: So you grew up in the Catholic Church?
- speaker: Respondent
  text: Yes, very much so.
- speaker: Interviewer
  text: His personality then was like what, and what would you think you drew from him?
- speaker: Respondent
  text: He was emotionally restrained like a lot of dads at that time. But honestly, I mean, there was no doubt in my mind
    that he loved me and he wanted what was best for me. Back in those days they didn't treat the kids like treated my kids;
    they weren't as supportive and encouraging. And I think there was a sense - and it was a Catholic sense too - that you
    don't want to spoil the kids.
- speaker: Interviewer
  text: You never questioned that you were loved and cared for?
- speaker: Respondent
  text: Absolutely not.
- speaker: Interviewer
  text: I love that term, 'emotionally restrained.' So then your education, where did you begin grade school?
- speaker: Respondent
  text: I went to a little school called Saint Mary's School. It was taught by the Dominican nuns in Newburgh, New York. Newburgh
    is a little community about miles north of New York City on the Hudson River back in the late 50s and early 60s. It was
    an ideal place to grow up. Since that time it's fallen on very, very hard times, and it's not so ideal anymore. But back
    in those days, I mean, I went there, then went to a small Catholic high school for three years - three of my four years
    - and it was called Saint Patrick's. There were people in it aside from me. Probably the most well-known personality was
    the author James Patterson, who is my best friend for my sophomore and junior year of high school.
- speaker: Interviewer
  text: Okay, James Patterson, the one who's writing all these books. He wrote one recently with Bill Clinton.
- speaker: Respondent
  text: Right, right. Dolly Parton - he's writing these thrillers. He's the most prolific author, and he's had the number
    one bestseller more than known.
- speaker: Interviewer
  text: This is about you, but quickly, was he a writer then in high school? Could you tell that?
- speaker: Respondent
  text: No, but he read. He was an avid reader. There was something about him; he was a little more focused, a little more
    mature. He was different than the rest of us. I mean, you could see he was on a path to success.
- speaker: Interviewer
  text: So you graduated high school what year?
- speaker: Respondent
  text: 1965. And by the way, I went to the public high school my last year. Left this Catholic school and went over to the
    public high school.
- speaker: Interviewer
  text: Which begs me to ask why?
- speaker: Respondent
  text: Because the Christian Brothers who ran the Catholic high school were well known for their - I don't want to say physical
    abuse, but their use of physical discipline. My mother just didn't like it and kids were getting hit.
- speaker: Respondent
  text: No, but I mean the five or six - it was a small school, as I said, there were or people in my class - and four or
    five of the students exited for that reason, and I was one of them. In defense of the Christian Brothers, they had a convention
    in 1978, much later than I graduated from school, where they just decided that they weren't going to utilize physical
    corporal punishment any longer, that it wasn't productive and it wasn't helping. But that's essentially why I left.
- speaker: Interviewer
  text: So then that experience in public school, what was that like for you?
- speaker: Respondent
  text: Well, it was the first time since grammar school had been with women. This was an all-boys school, the Catholic one.
    And so it was remarkable in that respect. Another respect is if you were called on in a Catholic school, you stood up.
    I mean, if you were asked a question, you stood up and answered the question. The first time I was called on in the public
    school, immediately stood up and every head turns around and looked at me. I mean, you could tell they were thinking,
    'What is this guy doing?' and kind of slink back down into my seat. But in my view, it was just a much healthier environment
    for me - healthier in the sense I don't think it's that healthy to be going to a school with all boys. Boys can be jerks
    at times and I think having women in the class, females, kind of tempers that a little bit.
- speaker: Interviewer
  text: So did you feel your education was on par with your previous school?
- speaker: Respondent
  text: Yeah, I think actually I think the education in the public school was a tad better. My only concern is I wanted to
    go to Boston College. It ended up, I mean, it was a family school. My uncles went there, my father went there, and I wanted
    to go there. I was a little concerned that because I had left and was dependent on a couple of the brothers for recommendations
    for college, it caused me a little consternation in that regard. But as it turns out, they were very good and they gave
    me - because I was going to a Catholic school - they were willing to give me a good recommendation.
- speaker: Interviewer
  text: Again, you graduated from high school in what year?
- speaker: Interviewer
  text: 1965. All right, then on to Boston College.
- speaker: Respondent
  text: And went on to Boston College.
- speaker: Interviewer
  text: What was your major there?
- speaker: Respondent
  text: It was history, East European history.
- speaker: Respondent
  text: Just for the lack of anything else, really. I mean, I'm not going to say dissipated my four years in college, but
    certainly, if I had applied myself - Boston College is a good school, good institute - and if I applied myself could have
    gotten a lot more out of it than I did. But just think I was too immature at the time.
- speaker: Interviewer
  text: You graduated from Boston College?
- speaker: Respondent
  text: Yeah, I did.
- speaker: Respondent
  text: Then I was a Vista volunteer for a year.
- speaker: Interviewer
  text: And what is Vista volunteer?
- speaker: Respondent
  text: Vista was at the time - it was a domestic Peace Corps. Instead of going to other foreign countries, you had assignments
    within the United States, and I was in Central Virginia for about one year and two months. Normally the term runs one
    year. I stayed over for two months.
- speaker: Interviewer
  text: What was the nature of your work?
- speaker: Respondent
  text: We worked with a group called National Welfare Rights Organization. There was in Central Virginia - they just absolutely
    refused, I mean, to put anyone on the welfare rolls, whether or not you were blind or deaf. So we worked on that a little
    bit. We were organizing welfare recipients and the other thing we did is we worked with the University of Virginia in
    bringing a medical clinic to the county that I worked in, which was Buckingham County. The experience in Vista in Virginia
    was a maturing one for me. And it did far more for me than anything that I accomplished there. I met people that I'm still
    close to today. It was one of the best experiences of my life.
- speaker: Interviewer
  text: So I'm interested -- why did you do that? You could have gone on to further education.
- speaker: Respondent
  text: Well, I'm going to go on to further education…
- speaker: Interviewer
  text: But why did you choose to…?
- speaker: Respondent
  text: But just, as I said, I was pretty irresponsible about my college years. I think I use the word - I may have dissipated
    them. I really knew in a sense, John, that I wasn't ready. I didn't take school as seriously as I should have when I was
    in college. I don't want to embark on graduate school and do the same thing. I said, 'I need to take some time off and
    get a more mature perspective.'
- speaker: Interviewer
  text: So you grew up.
- speaker: Respondent
  text: I tried to grow up.
- speaker: Interviewer
  text: So then after a year and a few months with Vista -- then what?
- speaker: Respondent
  text: Then I went to graduate school of social work in Rutgers University and got an MSW, master's degree in social work.
- speaker: Interviewer
  text: And how did you end up deciding that?
- speaker: Respondent
  text: Well, my dad - both my parents were social workers. I mean, so it wasn't a big stretch.
- speaker: Interviewer
  text: Did they encourage you or you're just - ?
- speaker: Respondent
  text: No, no. I just thought, 'They've done it, and maybe I'll try it.' Two months into school when I met a young woman
    named Faith Santangelo.
- speaker: Interviewer
  text: Did you meet her in an elevator?
- speaker: Respondent
  text: Yes, I did meet her in an elevator.
- speaker: Interviewer
  text: Tell us that story.
- speaker: Respondent
  text: So we're in the elevator and we're in one class together - it was called group dynamics. She was as cute as a button
    and she was - she's a little Italian girl from Rochester, New York. I got in the elevator and said - we just started talking
    - and said to her, 'You're in my - you're in the group dynamics class.' So she played it a little coy, John, and she looked
    at me and said, 'Are you in that class?' But as it turns out, we ended up talking that evening for about three or four
    hours. I told her about Boston College and my Catholic upbringing. Now, interestingly enough, she was a Sister of Mercy.
    She was a nun for four and a half years. She had taken her temporary vows.
- speaker: Respondent
  text: Yeah. She had taken her temporary vows. When she started with the Boston College, and come from an Irish Catholic
    family - I mean, so she called her mom that night and she said, 'Mom, just met the boy I'm going to marry.' Her mom says,
    'Faith, don't do anything rash, please.' And she says, 'Oh, don't worry. Don't even - ' She says, 'I don't know - his
    name is Danny. I don't know what his name is.' She said, 'Let me look at the roster.' She goes, 'It's either Danny Boudreau
    or Danny Bernstein.' She said, 'I think it's Danny Boudreau.' I want to say right off the bat that had nothing to do with
    extricating her from the convent. She had left before and came down.
- speaker: Interviewer
  text: Did you feel the same way about her as she said to her parents?
- speaker: Respondent
  text: Yes, I mean it was that day we knew. It took two years to get married but basically we knew that that's where we were
    headed.
- speaker: Interviewer
  text: Isn't that nice?
- speaker: Respondent
  text: I mean it was really nice. She's - we're still married today. She's the luckiest thing that ever happened to me and
    she went a very long way towards maturing me.
- speaker: Interviewer
  text: So what year were you married?
- speaker: Interviewer
  text: Okay, let's continue her story right here because she had a diagnosis that was not pleasant.
- speaker: Respondent
  text: Yes, about years ago she was diagnosed with lymphoma and it implicated 40% of the bone marrow. It was stage 4. And
    honestly, I mean, thought at that point in time we're going to lose her. We went down to MD Anderson. There was a relatively
    new protocol available at that time for lymphoma. They provided the appropriate protocol;
