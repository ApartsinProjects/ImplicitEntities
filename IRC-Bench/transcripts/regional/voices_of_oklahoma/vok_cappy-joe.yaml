collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Chicago, Illinois.
- speaker: Interviewer
  text: Your mother's name?
- speaker: Respondent
  text: Antoinetta Mele. And then she became Antoinetta Mele-Cappy, after marrying my father, George Cappy.
- speaker: Interviewer
  text: Can you describe her personality?
- speaker: Respondent
  text: Well, my mother was extremely vivacious. And very attractive. When she entered a room, she took over the room because
    of her personality. My father, on the other hand, was more of a silent type. And he enjoyed watching his wife light up
    a room.
- speaker: Interviewer
  text: What was his name?
- speaker: Interviewer
  text: What did he do for a living?
- speaker: Respondent
  text: Well, he only had 2 years of community school after high school, and he started into the retail business, working
    in a department store chain. He very quickly rose to the number 2 job in a major chain in Chicago called Wieboldt's. Wieboldt's
    had—I think—maybe 7 or 8 locations throughout the Chicago metro area. Retail just got in his blood and he ended up working
    for two other chains there in Chicago. But then ended up always wanting to buy his own business. He became a store manager
    for a company called Spiegel's, which was a house furniture and appliance kind of focus. And while he was working for
    them, he got contacted about a business that was available for sale that were two partners that were ready to retire in
    Wisconsin Dells, Wisconsin. And it was a small department store. My father had previously looked at maybe buying a hardware
    store in Chicago, but that one didn't quite work out. He passed on that, but then he found this store very interesting
    in the Dells. Dells is a vacation destination for primarily Chicago people. And, you know, they'll get 250,000 people
    in there from Memorial Day to Labor Day. After that, the town drops down to its base of about 2,000 inhabitants. And most
    of those are gone in the winter. They go to Florida or they go to California, Arizona—where they keep warm. The population
    in the Dells is very limited in that time of year.
- speaker: Interviewer
  text: Well, would that be tough to have a business year-round?
- speaker: Respondent
  text: Well, it really was, and that's one of the things that was kind of fascinating; when we moved there, you know, we're
    of Italian heritage, and the people in the Dells were Swedish, they were German—they had really no ethnic—there was one
    family, it was a Jewish family that was there, and that was the only other one, other than Native Americans. They had
    a large selection of a tribe called Winnebagos. It was really the Native Americans, one Jewish family, and no Italian
    family. He was told that they were not going to be successful—that anybody that's come in from outside has never made
    it. Well, he made it. He developed an excellent business there and a wonderful reputation.
- speaker: Interviewer
  text: Describe the store. What was it that he was selling?
- speaker: Respondent
  text: Just like you would picture a Macy's, except small. It was a two-storey building, but all the retail business took
    place on the first floor. So it had all kinds of clothes, dry goods, it had blankets—it also had groceries, shoes, and
    every possible thing that you would need to put items in your house. He did not have furniture, though—or appliances;
    it was all dry goods.
- speaker: Interviewer
  text: What year would this have been? Years?
- speaker: Respondent
  text: Well, it was in 1948. I had just graduated from grade school in Chicago—getting ready to go to high school. In fact,
    the high school that I should have gone to was a very large school; it had 6,000 students. I wanted to go to something
    smaller and I got the okay to go to another one that was just slightly out of my area that had 2,000 students.
- speaker: Interviewer
  text: This was in Chicago?
- speaker: Respondent
  text: This was in Chicago. And then, when my father bought the business, we moved. I believe it was, like, in early October.
    I started school at Wisconsin Dells high school. Wisconsin Dells high school had about a little less than 200 students
    [chuckles]. So I avoided a 6,000, I started at a 2,000, and now I'm in one that—well, my class was about 50 students.
- speaker: Interviewer
  text: Did you like that?
- speaker: Respondent
  text: I thrived in it. I found that in the larger schools, it was so big that it was very difficult to get acclimatized
    quickly. And, in the smaller school, it was much easier. And it also allowed me to go out for sports, because in a school
    of 2,000 or 6,000, all the boys that got into sports were really well-developed; they were more men than they were boys,
    and in a place where you've only got 50 students in a class—half girls—you needed everybody you could get. If nothing
    else, then for tackling dummies for football or just somebody to play against in baseball.
- speaker: Interviewer
  text: What was the name of that department store that your father had?
- speaker: Respondent
  text: He right-away named it Cappy's Department Store.
- speaker: Interviewer
  text: But wasn't your original name Capizzi?
- speaker: Respondent
  text: 'Yes, it was. And when my father started in the retail business—you know, at that time, they didn''t have pagers;
    they didn''t have phones—and so in a large department store that was 5, 6, or 7 storeys, when they needed somebody, they
    would make an announcement through a microphone that was on all the floor levels and they would say: "Mr. Capizzi, would
    you please come to the third floor?" You know, bath and whatever the location was and he didn''t believe that sounded
    "business-like." Plus, everybody called him "Cappy." So, what he did is that he changed his name to George Cappy for all
    business purposes. And, in fact, he never had it officially changed. So, on my birth certificate, I was Capizzi, and it
    was never changed.'
- speaker: Interviewer
  text: So then, in school, you were Capizzi?
- speaker: Respondent
  text: No, in school I was Joe Cappy.
- speaker: Interviewer
  text: And that was at the same time that he changed the name because of the department store?
- speaker: Respondent
  text: Right. So, starting grade school, I was Joe Cappy. Joseph Cappy.
- speaker: Interviewer
  text: Okay. So you don't recall having to change your thinking about your last name?
- speaker: Respondent
  text: No. That was all I knew. For all I knew, my father had officially changed it.
- speaker: Respondent
  text: He did, except not legally.
- speaker: Interviewer
  text: (In agreement) Mhmm. But you, obviously, began the trend of legally calling yourself "Cappy."
- speaker: Respondent
  text: Yes. Matter of fact, when I went into the Army as a Second Lieutenant, I had to have my father write a number of paragraphs
    explaining the name change—and the difference between what my birth certificate said and what I was known as at the time.
- speaker: Interviewer
  text: Did you have brothers or sisters?
- speaker: Respondent
  text: I have a sister that's two years younger than myself and I have a brother that is "the surprise"—he was 13 years younger
    than I.
- speaker: Interviewer
  text: Right. Are they still living?
- speaker: Respondent
  text: Yes, they are—in Tampa, Florida.
- speaker: Interviewer
  text: What are their names?
- speaker: Respondent
  text: Grace Cappy—her husband passed away—and George Cappy.
- speaker: Interviewer
  text: The Great Depression, 1929, the crash of Wall Street—that all happened in a 10 year period, 1939. Did you hear stories
    on how that affected your family?
- speaker: Respondent
  text: Oh, absolutely. Absolutely. It was really a difficult time. You saw the result of that in my parents and other people
    at the time. You didn't buy anything unless you had the cash for it. It wasn't like you could buy things on credit. Everybody
    had to live within their means. It was something, though, that my father—now, my father and mother were both born in the
    United States. My father's family came from Sicily. My dad's father had been, like, a mason. He did a variety of everything
    from carpentry to, you know, painting and woodworking of sorts; and he was with other farm workers whether they were called
    "serfs" or what they were called by the landowners. And he felt that he could do better than that if he went to America.
    So, at that time, he took his family, which was made up of—I think—5 or 6 children. Now, they could not speak English
    or read English, but they had some other people who had gone to America that they had apparently exchanged letters with
    and they told them there were real great opportunities. Well, when they arrived [chuckles], at the port in New York—
- speaker: Interviewer
  text: Was that through Ellis Island?
- speaker: Respondent
  text: Yes, through Ellis Island.
- speaker: Interviewer
  text: And what year would that have been?
- speaker: Respondent
  text: Well, right around 1900.
- speaker: Respondent
  text: My father was born in 1904, so it had to be a little bit before the turn of the century.
- speaker: Interviewer
  text: Late 1800s, probably.
