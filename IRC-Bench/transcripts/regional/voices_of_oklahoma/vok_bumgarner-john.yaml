collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: When you say there was a guy by the name of James Garner. Well, think it was a Bumgarner. From Norman, Oklahoma and
    an actor. So, are you a second cousin to him? And you have acting abilities or what?
- speaker: Respondent
  text: 'No, I''m not sure. I was on a plane - this is several years ago - was on a plane to Los Angeles, and it stopped in
    Oklahoma City on its way to Los Angeles, and James Garner got on and he sat behind me on the window; I was on the aisle.
    And so took out my business card and scribbled on the back: And that started the conversation. And so we kind of switched
    seats until we were sitting next to each other and, we for 2.5 hours on the way to Los Angeles, we tried to figure out
    if we were related or not. And it finally came down to an aunt of his that had a book and it had the names of several
    cousins and nephews and so forth. And beside one of them, she just wrote: "a Democrat." And we thought,'
- speaker: Interviewer
  text: So there's no relationship?
- speaker: Respondent
  text: There probably is because his family came out of the Ohio Valley and that's where mine came out of. So there probably
    is some relationship.
- speaker: Interviewer
  text: And then there's Madison Bumgarner, pitcher for the San Francisco Giants.
- speaker: Respondent
  text: Well, we'd all like to be related to him because he's a terrific athlete. But he has a special place in my heart because
    he gave his wife, for a wedding present, a very valuable wedding present. It was a cow. Yeah. Well, they're from a town
    in North Carolina. Which - the Bumgarners either went to Ohio or they went south of North Carolina. And there's a village
    there called Bummyville. And there's a lot of Bumgarners there. And he, of course, was one of them, and a very famous
    pitcher. But when he got married, this cow, understand, was enormously valuable. But that was the wedding present.
- speaker: Respondent
  text: So he'll always be remembered in our family as having interesting taste.
- speaker: Interviewer
  text: And he must have known that his wife liked cows.
- speaker: Respondent
  text: I think she was in on the game. Yeah, yeah.
- speaker: Interviewer
  text: Your date of birth?
- speaker: Respondent
  text: May 2, 1942.
- speaker: Interviewer
  text: So your present age is?
- speaker: Interviewer
  text: And where are we recording this interview?
- speaker: Respondent
  text: This is at the Utica Plaza conference room, which was formerly an attic, and we converted it to an office.
- speaker: Interviewer
  text: And at the corner of 21st and Utica.
- speaker: Respondent
  text: And at the corner of 21st of Utica, diagonally across from Saint John Hospital.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Saint John Hospital.
- speaker: Interviewer
  text: All right, let's talk about your parents. Your mother's name, maiden name, and what kind of a person she was.
- speaker: Respondent
  text: 'Her maiden name was Susan Nall: N-A-L-L. She was a terrific homemaker, a great cook, and in hindsight, a good disciplinarian.'
- speaker: Interviewer
  text: In hindsight? And her personality then was outgoing?
- speaker: Respondent
  text: Yes, it was. And she was a hard worker. She was punctual. She was disciplined. She was steady-as-you-go.
- speaker: Interviewer
  text: Your father's name?
- speaker: Respondent
  text: 'Yeah. Well, I''m a junior. So his name was the same as mine: John Carson Bumgarner. He was born in Tulsa, went to
    Central High, and then went to University of Tulsa the first year on a tennis scholarship. And then he transferred to
    Illinois, also on a tennis scholarship. He was a pretty good tennis player.'
- speaker: Interviewer
  text: So, you do have athleticism in your family.
- speaker: Respondent
  text: Well, yes, some; a little bit.
- speaker: Interviewer
  text: And what was his personality like as you were growing up?
- speaker: Respondent
  text: He was a very good student. He became an accountant. He worked for some of the best accounting firms, and worked for
    Fred Lawson's firm here in Tulsa, and ended up working for [unintelligible] after we came back from Wichita. He was hired
    in '44 to work in Wichita for Fred Koch. And he was basically Fred Koch's numbers man. This was, of course, back before
    Fred Koch's empire became as valuable as it is today. And we lived in Wichita for years.
- speaker: Interviewer
  text: You draw anything from your parents that you think about today that strikes you?
- speaker: Respondent
  text: Well, my dad was probably one of the most honest people you'd ever know. He was so honest - our family's all been
    Presbyterians. He was so honest that after he retired, the Boston Avenue people hired him to keep their books.
- speaker: Interviewer
  text: A Methodist will hire a Presbyterian?
- speaker: Respondent
  text: Yeah. But for a very specific purpose, mean, to keep their financial books, which he did.
- speaker: Interviewer
  text: Any brothers and sisters you have?
- speaker: Respondent
  text: I had a sister. She's passed away. She was a fine arts lady - artist - and her career was that of interior design.
    She and her husband moved to Chicago, and then back to Dallas, and that's kind of where she ended up. She had a nice career
    as an interior designer.
- speaker: Interviewer
  text: And her name?
- speaker: Respondent
  text: Her name was Betty.
- speaker: Interviewer
  text: Now, let's go back to your grandfather.
- speaker: Interviewer
  text: What was your grandfather's name?
- speaker: Respondent
  text: On the father's side it was Aaron. Aaron Bumgarner.
- speaker: Interviewer
  text: Also known as A.A. Bumgarner?
- speaker: Interviewer
  text: And when did he come to Tulsa?
- speaker: Respondent
  text: He came to Tulsa in the early 1900s. He was in the mercantile business, grocery business. He got clobbered in the
    recession - or depression rather. He had a lot of receivables and anybody that had receivables in the depression had bad
    receivables. He came out of it. He was a democrat. My grandmother was a staunch republican, and he had to go on the porch
    to talk about politics and smoke cigars. He couldn't smoke cigars or talk about politics in the house. They would go to
    the polls and cancel each other's vote and smile.
- speaker: Interviewer
  text: Do you remember them?
- speaker: Interviewer
  text: And so you remember both of them, then? Did they take an interest in you?
- speaker: Respondent
  text: Yeah. Most grandparents do.
- speaker: Interviewer
  text: But he became involved in the community.
- speaker: Respondent
  text: Oh, he did. He came from eastern Kansas. Somewhere between Pittsburgh and Independence, there's a small, small town.
    My grandmother was the daughter of a famous guy up there. He's always been a huge believer in education and he got involved
    in Tulsa's education, and he was on the school board, and he was the chairman of the building committee that built Tulsa
    Central - the current Tulsa, mean, the PSO Tulsa Central. In 1882 there was a Presbyterian Mission school for Indians
    on 4th & Boston. And then, subsequently, they had that town grow so fast that they outgrew that; and there was a second
    central school - or, school. And then finally, there was a big controversy about the land. And so he was on the school
    board and they agreed to lease the land so that they could get the money to continue education. And they moved the school
    to where it is right now. After they moved the school there, it was still growing so fast, they had to double it and fill
    the whole park. So the school wasn't 100% built at the same time, but most of it was.
- speaker: Interviewer
  text: And he was chairman of that building committee.
- speaker: Interviewer
  text: And do believe his name is on the cornerstone.
- speaker: Respondent
  text: It is; it is.
- speaker: Interviewer
  text: So it shows the deep roots you and your family have in this town.
- speaker: Respondent
  text: We do; we do.
- speaker: Interviewer
  text: So tell us about where, then, your first education would have been. Like, let's take you to elementary and junior
    high, in that area.
- speaker: Respondent
  text: Well, elementary was all in Wichita. I had great teachers. I still remember some of their names.
- speaker: Interviewer
  text: What are they?
- speaker: Respondent
  text: Mrs Larson and Mrs Black; and they were great teachers. And so we moved back here when I was 12, when I was in the
    class - the first class - that went all the way through Edison Junior High and then Edison Senior High. So I was an Edison
    grad. I did well there. I was a National Merit finalist.
- speaker: Interviewer
  text: And you graduated from Edison.
- speaker: Interviewer
  text: You remember, in the 50s, there was this fear of communism. And, even in school, think we had these nuclear exercises
    where you get under your desk.
- speaker: Interviewer
  text: Do you remember any of that?
- speaker: Interviewer
  text: Tell us about it.
- speaker: Respondent
  text: 'Well, it was just as you stated: here''s what you do when there''s a warning of a nuclear attack. Nuclear weapons
    were not that old. I guess they were dropped in ''45. So it was still kind of a topic.'
- speaker: Interviewer
  text: And we had that fear, and when we think back on that, if a nuclear bomb had been dropped, say, outside of Tulsa, you
    getting under your desk wouldn't have helped you at all.
- speaker: Respondent
  text: That's correct.
- speaker: Interviewer
  text: But, boy, there were those exercises. After high school, you go on to college.
- speaker: Respondent
  text: That's correct. I went to the University of Kansas for four years. And after that, went to Stanford for two years.
- speaker: Interviewer
  text: Stanford for two years. And that was for what degree?
- speaker: Respondent
  text: 'That was an MBA: Master''s in Business Administration.'
- speaker: Interviewer
  text: So, in these days, did you know what you wanted to be when you grew up? Like, since, obviously, we're gonna be talking
    about real estate - did you like tall buildings or any kind of real estate at all at that time?
- speaker: Respondent
  text: Not really. You know Stanford trains you to be a problem solver. So I was interested in learning how to solve problems.
    That's always been my strength is the ability to look at problems from degrees and attempt to figure out how to solve
    them. My interest in real estate came about as a result of going to work for Skelly Oil in 1966.
- speaker: Interviewer
  text: Alright, in '66. And let's - we'll get to that - things happen to you. But when you were in University of Kansas,
    you had - must have - picked up on that and yourself.
- speaker: Respondent
  text: Well, I was an accounting major and took a lot of different courses. Took hours. It only took to graduate. So, basically
    took an extra semester. And so I was interested in lots of different things. Just - was there to sample it like a buffet.
- speaker: Interviewer
  text: So you went into accounting? Your father had been into accounting.
- speaker: Respondent
  text: That's correct.
- speaker: Interviewer
  text: And so you did follow that track.
- speaker: Interviewer
  text: You graduate from Stanford when?
- speaker: Respondent
  text: In '66; 1966.
- speaker: Interviewer
  text: We like to talk about things that are going on in the world while you're living your life. We have the Vietnam war
    going on.
- speaker: Respondent
  text: Yes, indeed.
- speaker: Interviewer
  text: And, so, how did the draft board treat you on the Vietnam War?
- speaker: Respondent
  text: Well, in that particular period of time when you were years old, you had to register with the selective service, otherwise
    known as the draft board. You got your selective service card, and you got a name, and a series of digits that now look
    like your social security digits, but they're not. And you were eligible to be drafted, but you were also eligible for
    deferments if you went to college; and then you got a second deferment if you went to graduate school - for one year.
    And then you got another deferment, if you were married, to finish your graduate degree. And in the second year at Stanford…
    And Stanford, by the way, is very much a Navy town, because of its location and proximity to the naval assets that are
    out there, including the airfield, there's a Moffett airfield, it's the Navy's airfield. And so, at the business school,
    they would bring in different recruiters to talk about your options, but they wouldn't let any - the only recruiter Stanford
    would let you have access to were the Navy recruiters. It's a Navy school. And so the scheme was you wanted to be a naval
    officer. You wanted to be a naval officer in the supply corp; and that was all based on your scores, your test scores,
    and your scores after you've gotten into the Navy, because they'd send you Newport, Rhode Island and then send you to
    Athens, Georgia. The waitlist to get into the Navy from California, It was like or months. The waitlist to get into the
    Navy from Oklahoma was the next day. I mean, not quite "next day," but very prompt. So two of my classmates and I, we
    all flew to Oklahoma City and took the naval officers test. And it's a hard test; It's not an easy test. And we all passed.
    And the naval recruiter there turns out to be a nephew of the draft board lady at local draft board - selective service
    draft board 76. And this lady had told me, and looked me in the eye and told me in no uncertain terms, So I was all set
    to enlist and get sworn in. Came back to Tulsa to drop off all my stuff, and my wife, and did that. So I was set to go
    enlist. Think got back to Tulsa around right after early June, right after Memorial Day. And I was scheduled to go over
    and enlist the fourth week of June. Got a phone call from the naval recruiter who was tasked with being the Fourth of
    July chairman for the inter-service picnic. And he asked me if I'd be alright if came after the Fourth of July. And said,
    "Sure." In the meantime, my wife turned out to be pregnant, which was another deferment. That's how escaped going to the
    war. And that was pure luck. And I've been lucky in my career as we get deeper into it, and you'll see some examples of
    that.
- speaker: Interviewer
  text: Okay. When were you married?
- speaker: Respondent
  text: The first time, was married in '64 between Kansas and Stanford.
- speaker: Interviewer
  text: Okay. And did you have children from that marriage?
- speaker: Respondent
  text: We did. I, my son, Chris, who was born, also, at Saint John.
- speaker: Interviewer
  text: And he's with you in the business today that we'll talk about.
