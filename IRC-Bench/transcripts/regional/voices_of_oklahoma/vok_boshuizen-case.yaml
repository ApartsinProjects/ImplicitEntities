collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: And what happened?
- speaker: Respondent
  text: 'That was a Friday morning. May 10. My father woke us up: "Boys, get up! War has started." And we looked out the window
    - there were the planes. The jets were shooting at them. One plane was on fire. And still remember the German paratrooper
    starting with the door opening - jumping out. And the second comes, jumps out. The parachutes caught fire - it must have
    been from some leaked gasoline, guess. And he jumped out and fell to the ground.'
- speaker: Interviewer
  text: So that was a German?
- speaker: Respondent
  text: Oh, yes. A German paratrooper. Fallschirmjäger.
- speaker: Interviewer
  text: So that was the first you knew that Germany had invaded the Netherlands.
- speaker: Respondent
  text: Yes, yes. Correct.
- speaker: Interviewer
  text: What do you recall after you see that? Did your father want to do something? Go someplace? Or just stay in place?
- speaker: Respondent
  text: No, we had to do something to calm down, so he went to work. While it was happening, he had to go to the hospital.
    But the war in the Netherlands didn't last long. In days, it was all over for us.
- speaker: Interviewer
  text: Because the Dutch planes - they were able to fight the Germans for days?
- speaker: Respondent
  text: Not the planes. How do you say this? Flak.
- speaker: Interviewer
  text: Flak. Right.
- speaker: Respondent
  text: The Dutch flak, shooting at the German planes, there were quite a few who caught fire and went down. As a matter of
    fact, as you look on YouTube, you can see how many planes were shot down.
- speaker: Interviewer
  text: And so for those days, you stayed there?
- speaker: Respondent
  text: We stayed in the house.
- speaker: Interviewer
  text: And the war - looking at it out your window.
- speaker: Respondent
  text: Yes. We were close to an airport called Edinburgh. We were or miles from the airport. And, of course, the paratroopers
    didn't land in one spot, because when they put… Understand that, to land at the airport - they were shooting at them.
    So the airport was completely blocked. And, so, planes had to land even in the street and along the highway. Behind our
    house was a bypass that went from Rotterdam to The Hague; and we lived almost right on that little bypass, close to the
    airport. And there were quite a few that dropped down. And so we even had a doctor, and a uniform, and an ambulance chief
    on a motorbike with a Dutch soldier who had no shoes on - and he had to get help. We had to get the doctor to his colleague
    and, I'm sure, to tend to his wounds. We had many Germans die in that place. It was fierce fighting.
- speaker: Interviewer
  text: So you're 11 years old and had to be very afraid.
- speaker: Respondent
  text: We were. Didn't leave the house for days, until the war was over. Went on my bike and looked around and saw all of
    those planes in pieces, burnt out, laying in the fields.
- speaker: Interviewer
  text: But did the Germans shoot at houses, or try to damage buildings and houses?
- speaker: Respondent
  text: No. Not really.
- speaker: Interviewer
  text: But that's when the invasion, then, began?
- speaker: Interviewer
  text: And that's when the soldiers were on the streets?
- speaker: Interviewer
  text: So, when you went out of your house, then, after the 5th day, were the Germans nice to you? Or how did they treat
    you?
- speaker: Respondent
  text: We didn't talk to them. Won't speak German and was still in shock; because we saw, the next day, the bombing of Rotterdam.
    You might have heard about that. They destroyed the whole inner part of Rotterdam. It was completely wiped out; even the
    American consulate was destroyed in Rotterdam. Anne Frank's father talks about that because he had a visa. People don't
    know that he had a visa to emigrate to the United States, but it was all lost. So he had to reapply again, so he never
    made it. But otherwise he could have made it to America.
- speaker: Interviewer
  text: Did you see the Germans beat up on citizens or not treat them very nice?
- speaker: Respondent
  text: Oh, yes. That was later, but not at first. They - much later - showed their true colors. Remember was with my mother,
    visiting an aunt, and there was an SS man beating up a man and look at him in disgust. Didn't say a word - couldn't speak
    German then. And he said, That's what he said. And I'd seen other instances. A guy who was kind of crippled who had to
    walk, and the SS man was on a bicycle. He told him to run fast in front of his bicycle. It was pretty sad.
- speaker: Interviewer
  text: What did you do about food during those days?
- speaker: Respondent
  text: The store was right around - we didn't have the big supermarkets. They didn't exist. We had a small grocery store
    around the corner. Maybe from here to the entrance, or less - from here to the elevator. That was all the distance. There
    was a grocery store, the was a butcher, a baker, and a place where they could cut your hair and where you could get a
    shave, where you could buy paint, and then there was a small - on the other side - a small parish church. So it was all
    compact. It's not like the States where everything's far apart. Everything's very compact.
- speaker: Interviewer
  text: So the Germans allowed you to go to that store and get food?
- speaker: Respondent
  text: Oh, yeah. Well, the Germans never controlled our street. They were there, but they had to go to the airport.
- speaker: Interviewer
  text: And you had a brother, then, that was older than you.
- speaker: Respondent
  text: Two-and-a-half years older.
- speaker: Interviewer
  text: Your father - was he able to go to work?
- speaker: Respondent
  text: Yeah, later in the day; yeah.
- speaker: Interviewer
  text: So there was some normalcy to your living?
- speaker: Respondent
  text: Yeah. But you couldn't get into town because Delft is like Venice canals. So there are places where it's like that
    (gesturing with his hands). So they couldn't rush in on their motorbikes or cars. It was such that they couldn't do that.
    Because if they're anywhere north of Delft, they were going to The Hague, which was the center of government and where
    the military was situated.
- speaker: Interviewer
  text: How far was Delft from The Hague?
- speaker: Respondent
  text: About kilometers at the most. About miles.
- speaker: Respondent
  text: 6, miles. Yeah.
- speaker: Interviewer
  text: Okay. Were you allowed to go - and did you ever go - to The Hague after the invasion?
- speaker: Interviewer
  text: Because that's the big city, too.
- speaker: Respondent
  text: Yeah, yeah.
- speaker: Interviewer
  text: So they invaded in 1940; you were liberated in 1945.
- speaker: Respondent
  text: Yes, because the part that was liberated was Sluis. Like, Maastricht and the cities way south between… Maastricht,
    Aachan, and Leest. And the Americans came through Leest on their way to Aachan, and then Maastricht. So that part was
    liberated in September, 1944. And then later you might have heard about Market Garden where the paratroopers - the British
    paratroopers - came in September 17, if remember well. And landed in Arnhem but they couldn't get to the bridge - too
    far. You might have heard a bit about it.
- speaker: Interviewer
  text: So you were then when…
- speaker: Respondent
  text: Was 16. Yeah.
- speaker: Interviewer
  text: Alright. So, years. That's a long time. Are you going to school?
- speaker: Respondent
  text: Sure. Went to school.
- speaker: Interviewer
  text: And… Let's see… Did you finish by 1944?
- speaker: Interviewer
  text: Err - 1945.
- speaker: Respondent
  text: It was in 19…
- speaker: Interviewer
  text: You had finished grade school?
- speaker: Respondent
  text: Yeah. But in October/November in 1944, school was stopped. There was no electricity; it was dark. You couldn't read
    because there was no lighting, no coal, no nothing. So didn't go to school for about months. As a matter of fact, remember
    the first weeks… Our math teacher simply didn't appear any more; he had to go into hiding. So there was a substitute teacher
    for mathematics for some weeks. And even after that, there was no more school. So had to go to [unintelligible]… We went
    on my bike. Sometimes you walked. It was tough to get food. People don't know that in September 1944, General Eisenhower
    asked the Dutch government in London if they would be willing to stop the trains. So the Dutch government told the people
    at the railroad no longer to go to work. And they didn't do that any more, so they stayed away. No more trains. So then
    the Germans said, "Okay. No work? No food." So they closed the supply of food. You couldn't go over the river any more
    - at least the part where there was food. It was all blocked. And it lasted for several weeks. And the people that stayed
    in and they didn't work, they went into hiding. Some were shot, but for most, there was just no more food. So we had to
    go - remember, sometimes, kilometers all the way to Nieuwoord in the Netherlands - to get some food. Did it several times.
    And not only that. You would knock on the door and you would ask, and so they would give you a meal. It was amazing what
    the people would do to help each other.
- speaker: Interviewer
  text: So you went to people you knew to -
- speaker: Respondent
  text: No! Didn't know them at all.
- speaker: Respondent
  text: Knew some. In 1942, the school and the church had arranged for us young people to go to the eastern part of the Netherlands
    to spend weeks on a farm or whatever. Spent weeks on a farm in Oldebroek. And kept contact with those people. Would -
    later on, could always go there and stay there. There was a point of trying to go to other farms to get some food. Knocked
    on the door - got eggs, got bread, potatoes, whatever could get. And had to go back to Delft - which was sometimes very
    dangerous. Had been stopped by security police. We called them the Geheime Ordnungspolizei. At one time, they stopped
    me and looked me and said [German phrase]. And they asked me, Kaffeebohnen. And said, "Where do you think you are, in
    Brazil? We have no coffee beans at home. It doesn't grow here!"
- speaker: Interviewer
  text: Did they ever take food away from you?
- speaker: Respondent
  text: Almost, but they didn't take it. At one time - it was in 1943 - when the west wall was going to be built, we had,
    behind those, between the coasts, [unintelligible] houses that had to come down. So that food was - they would let you
    have that. Also, there was the company that was building the fortifications. They gave us a lift and there was a bag of
    potatoes. Sat on the bag of potatoes. There were ladies, too, that would have food. We were stopped as we entered Delft,
    by the SS, and all the food, they took it all away. And just acted the dummy - "no potatoes here" - and didn't say a word.
    Didn't blink an eye. They didn't see it. So here am I, the little fella - and the ladies (clapping sounds) - But you had
    to do it that way. You had to be street smart.
- speaker: Interviewer
  text: Street smart. Right. Did you ever go days without food at all?
- speaker: Interviewer
  text: How long would have gone - your family
