collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: On May 30, 1921, Memorial Day, you are 18 years old. Do you remember that day? Say in the morning - what the day was
    like? What the weather was like?
- speaker: Respondent
  text: Oh, that was the earliest part of the summer. It was just getting warm at that time. Because I didn't have on anything
    but trousers when the riots started. Then I had to run off, a lot of the colored folks had to run off from their businesses
    to keep from being killed. The whites were taking over the colored city altogether.
- speaker: Interviewer
  text: Well let me just recap here what I know about this and then we'll talk about it. Because sometime that afternoon,
    Dick Rowland who worked on the ground of the Drexel building, at 319 S. Main, Dick Rowland, shining shoes, and he went
    on to the elevator and Sarah Page was the elevator operator. Dick Rowland was 19 and she was 17. And he had been to the
    top floor to use the restroom. When he came down, as he stepped out, we believe he put his hand on her arm, and Sarah
    screamed. He was black and she was white. That's what the history books say about this.
- speaker: Respondent
  text: That's about right too.
- speaker: Interviewer
  text: He was 19, so he was your age. Did you know Dick Rowland at all?
- speaker: Respondent
  text: No, I was in grade school, and I think he was probably in high school at that time. He was a little older than me.
    They arrested him for saying something to this little white girl. They said he said something to the girl and the white
    men didn't like it and they jumped on him. And they took him and arrested him and put them in jail. And while he was in
    jail, some of the colored boys, to the best of our knowledge, went down to the courthouse to try to keep the folks from
    killing him. At that particular time, we made up our mind to try to leave Tulsa to go where my father was. My father was
    a pullman on the Frisco Train. He had left and gone to the other side of Chicago - to Milwaukee, Wisconsin. He'd gone
    to Milwaukee, Wisconsin working for some of the leading white people on the train. He had sent letters to my grandmother,
    and I was staying with my grandmother, his mother. We went up there to try to catch him. We learned that he had left Wisconsin,
    and we came back to Tulsa. We were riding the freight train. We didn't have any money. But we got back to Tulsa, and found
    out that he had written to my grandmother that he was in California. So, my little-old Grandmother and me made up our
    minds we would try go to California too. So I went to California.
- speaker: Interviewer
  text: Otis, on that day of this elevator scene, do you remember the first time you heard something was wrong? Something
    was going on in town? Do you remember that moment?
- speaker: Respondent
  text: To tell the truth about it, we didn't get that news. We'd run off and left Tulsa going up to Milwaukee, Wisconsin.
- speaker: Interviewer
  text: But how did you know that day that something had happened?
- speaker: Respondent
  text: Because, they had gone and started what you might say is a little war so to speak. And the whites were running the
    colored folks out of town. We lived with a man that ran the little theater at that time on Greenwood. But, they didn't
    spare him either. They didn't spare any of the rich colored folks. If they were colored, they had to run off and leave
    their stuff.
- speaker: Interviewer
  text: 'The Tulsa Tribune, the afternoon newspaper, carried the headline: Nabbed Negro for Attacking Girl in Elevator. And
    it said that Dick Rowland tore her clothes and scratched her face. And it said that Dick Rowland had been arrested and
    they alluded to attempted rape.'
- speaker: Respondent
  text: I heard that.
- speaker: Interviewer
  text: Did you ever see that newspaper? Or know about that newspaper?
- speaker: Respondent
  text: No. I'd run off and left everything. I'd run off and tried to catch up with my father.
- speaker: Interviewer
  text: Whom did you live with?
- speaker: Respondent
  text: My grandmother. My father had built a home for my grandmother up on Archer Street, that wasn't too far up from Greenwood.
- speaker: Interviewer
  text: Did your mother live there too?
- speaker: Respondent
  text: No, she lived in different places. But, she worked downtown - down on 1st Street. I didn't get a chance to even see
    my mother very much. She hardly ever came out there to check on us.
- speaker: Interviewer
  text: Your grandmother had a garden?
- speaker: Respondent
  text: Oh yes. When I was a little boy she made me carry some of the stuff to sell to the sportin' folks, right back behind
    us on Archer. No, it was on 1st Street. The sportin' folk, what you might say sportin' women and stuff like that lived
    over on 1st Street. I remember carrying groceries and stuff over to the whites, they were sportin' women.
- speaker: Interviewer
  text: What do you mean by sportin' women?
- speaker: Respondent
  text: Back then what we knew was that they would sell their bodies to men, white men. They had a regular little settlement
    that they lived in, right across from the Frisco tracks, right behind us. Just the Frisco train tracks separated 1st Street
    from Archer Street. And I had to carry groceries that my grandmother would send over to these sportin' women.
- speaker: Interviewer
  text: And so you'd charge them for their vegetables?
- speaker: Interviewer
  text: And they would pay you then?
- speaker: Interviewer
  text: You'd bring that back to your grandmother?
- speaker: Respondent
  text: Yes. We were living well until the riot broke out. They tell me whites were jealous of us, of what you might say is
    - you some of the Colored people over on that side. Some of the main folk were working for the rich, white folks that
    were done on the south side of the city. And they were living well. And there was a jealousy they tell me. They were living
    too well, and they wanted to run them out of town, and take that part of town and give it back to the white folks.
- speaker: Interviewer
  text: On that day, Memorial Day of 1921, do you recall hearing bullets and shooting?
- speaker: Respondent
  text: Oh yes. I got shot at. Come to think about it, I had a friend there at the Jackson funeral home. He was what you might
    say was the father of my sisters two little boys. I was down there at the funeral home when the riot broke out.
- speaker: Interviewer
  text: When you went to the garage of that funeral home, tell me what happened as your friend was opening the garage store?
- speaker: Respondent
  text: While he was trying to open it, Jackson had come to the knowledge that we better get the colored folks out of that
    part of town. You see, we were the closest to the white section of town. Archer was the first street on what you might
    say is the north side of town.
- speaker: Interviewer
  text: When you were there at the garage, Otis is it true that somebody shot and a bullet struck your friend's hand?
- speaker: Respondent
  text: That's right. Just across the Frisco tracks, on 1st Street, there was a mill. And the white men worked in that mill.
    It was some kind of grain mill, three or four stories high. And they (white men) could get up at the top of that mill
    and look across the tracks and see what we colored folks were doing. And sure enough we got shot at from the men over
    across the tracks. And it hit the boy in the hand, and I'm standing right behind him. He dropped his keys and we left
    the old car in the garage, and ran off and left it.
- speaker: Interviewer
  text: You tried to run home?
- speaker: Respondent
  text: No, because the whites had then covered our home, which was about, three or four blocks up from the funeral home.
- speaker: Interviewer
  text: Did you stay with your friend? His hand had a bullet in it?
- speaker: Respondent
  text: No, I ran off and left him.
- speaker: Interviewer
  text: When you tried to go home, the whites were blocking your way home, is that true?
- speaker: Respondent
  text: Oh Lord. Yes. And they even burned it up.
- speaker: Interviewer
  text: They burned your house?
- speaker: Respondent
  text: Oh yes, they burned up where we lived.
- speaker: Interviewer
  text: But do you recall that night, you couldn't go to your house, it was burning. Didn't you go to your cousin's house?
    They were planning to go to Claremore?
- speaker: Respondent
  text: That was in the riot. The riot was just starting. The whites were taking over that section of the city, which was
    closest to them, just across the Frisco tracks. My cousin, they lived way out on Greenwood and had a little café way up
    out on Greenwood there. So we made up our minds to try to get out to where they lived. But when we got out there, they
    were fixing to go to Claremore to kind of get out of the troubled area. So we went to Claremore. But on our way to Claremore,
    after we lost cross the little old Verdigris River, and then came out with their guns and stopped the car.
- speaker: Interviewer
  text: When the white men stopped your car, where they asking for anything? Or did you think that was going to be the end
    of you there?
- speaker: Respondent
  text: We didn't know about all this race trouble that they had started. They knew about it, and so after they found out
    we didn't have anything, no guns and stuff, they let us go on to Claremore. But then in Claremore, at a little hotel where
    we stayed, they found out that the soldiers had come in there and stopped some of the riots, so we could come on back
    home. And the next morning we came back to Tulsa. But when we got back there, they had burned up everything. And so the
    little Salvation Army had come over and built some little-old building for the colored folks that were left there to live
    in. My mother and some of them had a little building and that's where I had to stay too, because all of the big buildings
    were burned up.
