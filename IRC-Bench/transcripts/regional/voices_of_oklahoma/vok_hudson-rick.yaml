collection: voices_of_oklahoma
source_url: https://www.voicesofoklahoma.com/
turns:
- speaker: Interviewer
  text: So Rick, would you state your full name, please?
- speaker: Respondent
  text: My name is Richard Lowe Hudson. I'm better known as Rick.
- speaker: Interviewer
  text: Your birth date?
- speaker: Respondent
  text: December 10th, 1943.
- speaker: Interviewer
  text: And your present age is?
- speaker: Respondent
  text: My present age is 80.
- speaker: Interviewer
  text: And where were you born?
- speaker: Respondent
  text: I was born in Ottawa, Ontario, Canada.
- speaker: Interviewer
  text: And we'll find out why you were born there in a minute, but let's talk about your mother. Your mother's name.
- speaker: Respondent
  text: Was Ruth May Lowe, and she was born and raised in Mahanoy City, Pennsylvania. It was a coal town in the coal region
    of Pennsylvania.
- speaker: Interviewer
  text: And what was her personality like? How would you describe her?
- speaker: Respondent
  text: My mother was wonderful. She was strong. Her father died when she was years old. She was born in 1922. Her father
    died in 1924. My grandmother worked at a department store every day and walked to the department store, didn't make very
    much money. So my mother grew up in tough circumstances. She was very strong. She was a loving, supportive mother. She
    didn't work. She was a stay at home mother, but she was always supportive of me all throughout my life.
- speaker: Interviewer
  text: Yeah. Then your father's name.
- speaker: Respondent
  text: My father was Lloyd Barry Hudson Jr. and he was raised in Washington DC.
- speaker: Interviewer
  text: And then his personality. What was he like?
- speaker: Respondent
  text: He was an outgoing personality. He was a loving man, funny, had a great personality. Everyone loved my dad. He was
    a strict father though. He didn't put up with any foolishness on the part of my brother or I.
- speaker: Interviewer
  text: So it was just you and your brother?
- speaker: Respondent
  text: No, we had sisters come along a little bit later, so there were of us. My brother just passed away last October, so
    still have sisters who live in the Atlanta area.
- speaker: Interviewer
  text: And your brother's name?
- speaker: Interviewer
  text: And how old was he when he died?
- speaker: Interviewer
  text: Then your sisters' names?
- speaker: Respondent
  text: My sister is Kathy. She lives in Loganville, Georgia. She's maybe, and have a baby sister who was a pleasant surprise.
    She's years younger than me, so think she must be 61.
- speaker: Interviewer
  text: But didn't your father's family live in the Washington DC area?
- speaker: Respondent
  text: Yes, my father was raised in Washington DC. My grandfather worked for the War Department. During the war he had previously
    fought in the Spanish-American War and then he was sent to Haiti with the government. I don't know in what capacity, but
    have a lot of his letters that he wrote while he was in Haiti. He also was a contractor after the war and built houses
    and developments in the Washington area. They moved to Falls Church, Virginia. And my mother and father were married in
    the Falls Church, which is an Episcopalian church in Falls Church, Virginia.
- speaker: Interviewer
  text: You had an aunt Clara?
- speaker: Respondent
  text: Did have an Aunt Clara.
- speaker: Interviewer
  text: And she managed a restaurant?
- speaker: Respondent
  text: She managed a restaurant in downtown Washington, and most days Clyde Tolson and J. Edgar Hoover would eat lunch there.
    Remember she told me one time that my cousin Georgia Dean was there and she had an opportunity to meet Mr. Hoover and
    he asked, "What would you like to do?" And she said, "I'd like to be an FBI agent," and he said, "Well, we don't have
    any female FBI agents." He smiled. She later became an architect and was one of the main architects for the Capitol.
- speaker: Interviewer
  text: I'm reading a book about women in the CIA in the early beginnings and how females were so instrumental in the CIA;
    and also knew that J. Edgar Hoover was kind of competing with the at the beginning of the CIA. Interesting how women were
    being used back then. Talk about your education, grade school. Where was that?
- speaker: Respondent
  text: Well, started off at Brookhaven Elementary School in the 1st grade. Don't remember much about that.
- speaker: Interviewer
  text: And that town was…?
- speaker: Respondent
  text: That's in Atlanta, a suburb of Atlanta. And then in the 2nd through the 4th grades, went to Chamblee Elementary High
    School, which was eliminated and transferred to Skyland Elementary School. In the 7th and 8th grades, went to Northwoods
    Elementary School and which was a junior high, more or less, kind of a middle school. We didn't call it middle school
    back then. And in 9th grade went to Chamblee High School in Chamblee, Georgia, which is a suburb of Atlanta.
- speaker: Interviewer
  text: All right, and you graduated in what year?
- speaker: Interviewer
  text: So were you interested in sports at all in high school?
- speaker: Respondent
  text: Loved sports in high school. Was the youngest kid in my class. Was when graduated, and was skinny and was slow, so
    never thought would - I was always the youngest one and was smaller than everybody else, but finally started to catch
    up. In the 8th grade, was still at Northwoods Elementary School and we were asked to try out for the Chamblee High School
    football team, which was a real honor. And we went over and they - Chamblee was a kind of lower middle income school.
    So we got our first uniforms and got a leather helmet with no face mask. And shoulder pads and hip pads and knee pads,
    they don't even wear knee pads now, they wear shorts out in the field. After about weeks, got a plastic helmet with bar
    for a face mask.
- speaker: Interviewer
  text: So you excelled then in football.
- speaker: Respondent
  text: Well, not at first. Tried hard. Was still younger and skinny. Tried hard. Chamblee had a terrible football history.
    We had a couple of really good players. Our quarterback was wonderful, and we had a guy that was an end and a tackle,
    and they were good. And tried hard and made the B team, and the Chamblee Varsity lost the first games of the year. Our
    great coach, Coach Tony Palma, he became frustrated, so he elevated all of us up to the varsity. We start, end up starting,
    and we promptly lost the last games a year.
- speaker: Interviewer
  text: But basketball and track too you were interested in.
- speaker: Respondent
  text: Yes, also played basketball and ran track.
- speaker: Interviewer
  text: After you graduate from high school, what happens to you?
- speaker: Respondent
  text: Well, grew up in Chamblee, Georgia, which the main employer was the Buick Oldsmobile Pontiac plant -- BOP plant --
    and most of my friends' parents worked there and thought, well, that's what I'll do. Wasn't subjected to opportunities
    other than I'll go to work for the BOP plant. Fortunately started to blossom as a football player. Made all-state. And
    then was offered a scholarship to a couple of schools, Chattanooga and Vanderbilt. Talked to West Point and Dartmouth,
    but accepted a scholarship to Vanderbilt University to play football.
- speaker: Interviewer
  text: OK, and how did that go?
- speaker: Respondent
  text: Not too well. Was skinny and was slow and had trouble competing against boys that were a year older than me and no
    matter how much ate, just couldn't gain weight. Don't have that problem now, but was - I'm actually bigger than was. I'm
    bigger now. Weigh 175. Weighed pounds and was ft inches when was at Vanderbilt. Did OK on the freshman team. Caught a
    touchdown pass against the University of Kentucky freshman football team, but that was otherwise a nondescript freshman
    season. The coach came to me. He said, "Rick, you're not gonna be able to play at this level." And lost my scholarship.
    And that was, as you can imagine, heartbreaking to me and heartbreaking to my parents because they weren't in a financial
    situation to send me to college. Did go back for my sophomore year and played on the B team at Vanderbilt there, but couldn't,
    had to pay. My parents had to pay, and it was an expensive school. So it was apparent that wasn't gonna go anywhere in
    football. So dropped out of Vanderbilt. Came back to Atlanta, and decided to go to Georgia Tech, where always wanted to
    go to college in the first place.
- speaker: Interviewer
  text: And then at Georgia Tech, did that click with you?
- speaker: Respondent
  text: Well, wasn't accepted at Georgia Tech at first. My grades at Vanderbilt were just average C's and D's. So when applied
    to Georgia Tech, they didn't accept me. They did say, however, that they would accept me to go to night school and if
    my grades after one year were acceptable, they would let me in day school. So got a job working at Rich's department store
    in the warehouse, and would price parts and take them out in the showroom and that's how worked during the day and then
    would go to school from o'clock to o'clock at night. And was up in the at Rich's department store. Was up in the TV area
    when heard about President Kennedy being assassinated. That's how heard it.
- speaker: Interviewer
  text: How did that affect you and the people around you?
- speaker: Respondent
  text: It was terrible. It was days of the worst times that we could imagine, equal, of course, to 9/11, but that was a terrible
    time. Was in the ROTC. And President Kennedy came to Vanderbilt to speak and so as such, we were an honor guard and was
    as close to the president as you and are and saluted him and he kind of gave me a little grin like "you, you're a little
    so and so," but it was nice to see him. He was a very handsome guy, very charismatic.
- speaker: Interviewer
  text: So then you did the night work.
- speaker: Respondent
  text: Worked hard. At that point, started to really begin to concentrate. Well, you need to start growing up and working
    on the rest of your life. And I - so started studying hard. Made A's and B's and was accepted into the day school and
    accepted to Georgia Tech, which is a wonderful school. But still had to work. My parents - I had my little sisters now,
    and there were children, and paying for college was pretty tough. They did help, but also had to work, so would go to
    school during the day and then went to work at DuPont. They had a dye laboratory. Georgia and the South was big in textiles
    and there were a lot of rug plants, textile manufacturing plants, and so there was a big demand for dyes. So worked in
    the dye laboratory and we would match colors. It was a real interesting job. That's how learned my love of chemistry was
    working in that laboratory matching colors and mixing them and then we would submit the recipes to the factories. And
    they would buy the DuPont dyes.
- speaker: Interviewer
  text: Your studies at Georgia Tech, what were they? What were you…?
- speaker: Respondent
  text: Studied industrial management. Now that's like a business, heavy in business with a minor in engineering. Took physics,
    chemistry, industrial engineering classes. It was a very good plant experience. It was oriented towards people that were
    gonna be in manufacturing and business.
- speaker: Interviewer
  text: Little did you know. That was your platform for what you ended up doing.
- speaker: Respondent
  text: 'Yes, it was. Had no idea what really wanted to do, but fortunately, Georgia Tech had a great employment program in
    the last quarter of my senior year. We were invited to sign up for various companies to interview, and must have done
    pretty well because got some wonderful trips. Interviewed these companies: Fairchild Semiconductor, and they brought me
    to San Francisco; First National City Bank took me to New York City; Nalco Chemical Company took me to Chicago; 3M took
    me up into Midland, Michigan. Monsanto took me to Saint Louis; US Steel to Birmingham; and then Parker Hannifin took me
    to Cleveland, and that''s who ultimately went to work for.'
- speaker: Interviewer
  text: You must have graduated with a pretty good grade point.
- speaker: Respondent
  text: Did. Had a 2.6 out of 3, which doesn't sound that impressive, but
