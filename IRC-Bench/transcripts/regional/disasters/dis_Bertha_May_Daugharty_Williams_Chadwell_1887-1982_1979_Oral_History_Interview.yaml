source_url: https://archive.org/
turns:
- speaker: Interviewer
  text: Do you mind if we say your age?
- speaker: Respondent
  text: Surely, I don't care. I'm proud of my age.
- speaker: Interviewer
  text: Ninety-three isn't it?
- speaker: Respondent
  text: Ninety-two. I will be ninety three in May, this year.
- speaker: Interviewer
  text: You are one of Boynton's best known long-time residents along with Freda Oyer and Glen Murray. I believe you told
    me you came to Boynton in 1907.
- speaker: Respondent
  text: From DeLand Florida.
- speaker: Interviewer
  text: First, where were you born?
- speaker: Respondent
  text: In the sticks at DeLand, Florida. I was born three years after they surveyed the town site of DeLand.
- speaker: Interviewer
  text: What year was that?
- speaker: Respondent
  text: I was born in 1887. DeLand is in the country, which we call the sticks. People always said that DeLand is three years
    older than I am.
- speaker: Interviewer
  text: What did your father do?
- speaker: Respondent
  text: My father was a citrus grower and a cattle man.
- speaker: Interviewer
  text: And where did he come from before he came to DeLand?
- speaker: Respondent
  text: He was born in Georgia. His father came to Florida when he was very young, about three years old.
- speaker: Interviewer
  text: And your mother, where was she from?
- speaker: Respondent
  text: My mother was born in Volusia County, DeLeon Springs, Florida.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I had one brother and one sister. My mother lost a baby girl when she was two years old. I was four at the time.
- speaker: Interviewer
  text: And are you the oldest?
- speaker: Respondent
  text: I am the oldest in my family.
- speaker: Interviewer
  text: How old were you when you left DeLand?
- speaker: Respondent
  text: I was twenty.
- speaker: Interviewer
  text: Why did you leave DeLand?
- speaker: Respondent
  text: My husband had been in the turpentine business with an uncle for several years out in the country near where I was
    born. After the uncle died he left the business to my husband (his nephew) and his wife. The two of them worked the place
    successfully for about three years after his uncle died and they had a chance to sell-sell for pretty good money-so, the
    turpentine business was sold. That put my husband out of a job. My aunt, by marriage, and he, began to wonder that they
    were going to do, what steps to take from there. He was with his uncle on a salary and on a commission on the profits
    that were made each year in the business. It was pretty nice living. When his aunt sold the place she had plenty to live
    on for the rest of her life and my husband was out of a job.
- speaker: Interviewer
  text: So, why did you come to Boynton?
- speaker: Respondent
  text: I had a great uncle and his son. They had come down the east coast through their association with Henry Flagler. This
    great uncle and his son had settled south of Miami at what is now called Florida City, and farmed. They saw quite an income
    from this farming business and it was something that would advance in the future. So, JJ having been very close to them
    and also my own uncle who lived in Boynton. JJ said he would go on a little vacation and visit with them down here and
    see what the prospects looked like- that he might be able to get into. My great uncle, living in Florida City, told him,
    "Well John, we have been very successful farming here but," he said, "I wouldn't let you bring Bertha down here at any
    price." The mosquitos and insects were bad and the type of people that they were living with were bad. They were living
    hard. While the uncle did not have to farm, he came down here with plenty of money, he told JJ, "I'm going to be honest
    with you, it's no place for Bertha."
- speaker: Interviewer
  text: Who was JJ?
- speaker: Respondent
  text: That's my husband. I always called him JJ. (Laughter) John Jackson was his name and I don't know how I ever started
    it but somebody in the family called him JJ so, I guess that's where I picked it up. He intended to visit with an uncle
    and an aunt that were living here. He left Florida City and came on up here. My uncle up here was anxious for him to come
    to Boynton. It was a wonderful opportunity, he thought, for him here in Boynton and they wanted me to be here with them
    anyway. So, my uncle talked him into renting a small acreage and plant tomatoes for a season and at the end of that season
    make up our minds what we would like to do. We could live in his apartment house, the house he was living in, because
    he had a small house which is still here, for his own. They had plenty of room for us to come and make it our home, we
    never thought of staying more than the one growing season. He rented this land and grew a crop of tomatoes which was very
    successful. It happened to be one of the progressive years. Everybody made money. Everybody was happy. Most of the people
    were here living very hard, in shacks. There were only about four or five really good homes in Boynton when I came.
- speaker: Respondent
  text: Yes in 1907. I could name each one who lived in them. Byrd S. Dewey of course owned a very nice home. Their name is
    on everything you get in Boynton because they subdivided Boynton. When summertime came, closing down the crop, we had
    made a payment on another turpentine business in Volusia County. This friend of ours, who owned the property and the business,
    had passed away and the son was going to sell it. We put a deposit up for the place when the year was up and we could
    own it ourselves. Unfortunately, the owner's brothers and relatives claimed an interest in it and took it to court. The
    first year we went back, we had done very well here, and went to court. We had put our money on the property so we thought
    we would just let it lay there and maybe it would be settled that year. Instead it went deeper and deeper into court.
    After three years the place was terribly run down. The buildings for the working people, in fact all of the buildings,
    had just gone down terribly.
- speaker: Interviewer
  text: You were still in Boynton?
- speaker: Respondent
  text: We were still in Boynton. We went away in the spring and came back in the fall in time to plant more tomatoes. We
    couldn't get that place because it was still in court.
- speaker: Interviewer
  text: The fall of 1908?
- speaker: Respondent
  text: We thought we would go back for another season anyway. We came back and instead of renting land we found some acreage
    for sale. One of the old timers or pioneers had bought considerable acreage and said he would sell us seven and a half
    acres of farming land that was very good. We had never paid rent on anything because we had always had the money to buy
    something we wanted. This man said he would sell it so we decided to buy it. It wouldn't hurt us to own it if we did close
    the deal with Volusia. We would still have an interest in this acreage.
- speaker: Interviewer
  text: What year was that?
- speaker: Respondent
  text: Our second year, 1909. So, that year we farmed our own land. We had quite a successful season, very successful.
- speaker: Interviewer
  text: Where was the land located?
- speaker: Respondent
  text: You have been over A1A and know where the clubhouse is?
- speaker: Interviewer
  text: The Gulfstream Clubhouse?
- speaker: Respondent
  text: The Gulfstream Clubhouse. Well our land came up to A1A one block from the club, from the ocean to the canal.
- speaker: Interviewer
  text: And that was Boynton Beach?
- speaker: Respondent
  text: That was Boynton then. We weren't Boynton Beach for a long time. Not incorporated anyway, but people called themselves
    Boynton Beach. The city limits of Delray, or the town of Delray, joined the acreage that we bought. The first acre south
    of us was owned by Delray people and was all Boynton people then. There were no incorporated towns here. That crop was
    also a success. We went back to Volusia County and still could not get the property we had put the deposit on because
    they were taking it to a higher court. We were so happy and pleased with the success we had in Boynton. Two winters crops
    of tomatoes, that's all we had tried to grow. The third year when we had gone back home the judge of the court, who was
    a relative, up there said, "Bertha, you just as well let me give you back the money while it is in my hands because it
    is going to higher court and you will never get your money back then. While I am here you had better get it." So he took
    care of that for us and we came right back to Boynton and started the third crop. Since then we have lived the rest of
    our lives in Boynton. That was where we started out making a living and buying a home, buying land and growing tomatoes.
    We had, in the meantime, bought a home and we bought this place I'm living now. But we did not buy it for a home. It was
    a well built wood house, a nice roomy house. We had some spare money and we thought we would just buy that little house.
    So we bought it to rent. Unfortunately, we did not rent it very much the first few years we owned it because there was
    a family here that needed a little help. They had six children and the church decided to take over and help a bit and
    we all donated towards it. So, JJ and I donated this house for seven years.
- speaker: Interviewer
  text: When was this house built?
- speaker: Respondent
  text: It was built before 1907. I don't remember how long the man who built it had lived in it. I know it had been here
    a couple of years and that he was a carpenter.
- speaker: Interviewer
  text: Where was your own home located?
- speaker: Respondent
  text: We were living upstairs in the first building on your right as you cross the railroad tracks. It is only one story
    now. Then it was two stories. My uncle owned it. The upstairs was all living quarters-big nice living quarters-because
    it was a big, big building. In the meantime the third year we were here we bought a home. There was a family living in
    it from Chicago. They had three daughters and they had been renting this house that we bought for quite some time. We
    had a nice place to live in this upstairs apartment that my uncle had let us have and they wanted to continue to live
    in the house we had bought. We had gone into the lumber business, in the meantime. We had plenty of lumber, so we remodeled
    that house quite a bit and made quite a comfortable home out of it. But the tenants wanted to stay in it. They were paying
    the same rent for it that we were paying my uncle. So, we were just breaking even and we didn't have to move and my uncle
    didn't want us to move. He liked for us to live over there and we lived there five years before we moved into our own
    home.
- speaker: Interviewer
  text: Tell me about bringing the car down from DeLand.
- speaker: Respondent
  text: In the first place, I was lonesome here. While I was born and raised in the country, I had grown up and DeLand was
    my home. I had been used to my own horse. From the time I was four years old I rode horseback. My father had given me
    a horse for my birthday and our hired man had to take care of my horse. He kept it ready for me to drive the buggy or
    ride horseback. It was a pony horse, what they called a quarter horse, a small horse. When I came down here there was
    nothing like that. Nobody rode horseback, nobody had horses. I know there were two horses in town and three or four mules.
    My uncle owned one of the mules. Anyway, we remodeled the house that we bought and after the people moved out making it
    a very attractive home. We lived in that until 1918 I guess it was. Then we bought the house on Ocean Avenue from my cousin.
- speaker: Interviewer
  text: You were going to tell me about bringing your car down.
- speaker: Respondent
  text: JJ bought the car for my birthday in the spring of 1908. It was a Ford car, a passenger car, and there was nothing
    but dirt roads from here to DeLand. He bought the car from George Barco in West Palm Beach. My sister was down here with
    me. She came down on the train-they had to go back and forth by train in those days-and we were making our trip back up
    to DeLand. No towns had paved roads. I think when we got to Titusville they had one street that had rock on it. Every
    now and then we would get into a sand bed and bog down so, we were two days and nights getting to DeLand from Boynton,
    because of trouble with the car. That was our first automobile trip out of Boynton.
- speaker: Interviewer
  text: You later used the car and took people around in it didn't you?
- speaker: Respondent
  text: There was no taxi and people began coming into Boynton pretty good. People had no transportation to West Palm Beach,
    only by boat or by train. When the Boynton hotel opened in the fall of that year, Mr. Boynton and Mr. Parker, the son-in-law
    of Major Boynton, asked if we would run a taxi service from Boynton to West Palm Beach, especially for the people at the
    hotel. During the summer JJ had nothing to do when his crop was harvested. He said "What do you think about it?" I said,
    "I think we'll try it." JJ said, "When I can't go, you can go." I could do it. So, we started a taxi service to West Palm
    Beach which proved to be pretty successful. We made pretty good money at it. You went up for twenty five cents. (Laughter)
    Wasn't that something. That was the price they paid for a ride. I was in Delray, I went to my Eastern Star meeting. We
