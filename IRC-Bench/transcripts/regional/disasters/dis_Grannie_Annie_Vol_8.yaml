turns:
- speaker: Respondent
  text: I can't believe that my mom said yes! Mary shouted.
- speaker: Respondent
  text: Yes, isn't it grand that we're going to the 1904 St. Louis World's Fair? And just the two of us! exclaimed Nell.
- speaker: Respondent
  text: Two days later they were on their way to the fair with high hopes. When they arrived, they decided to travel down
    the Pike. The Pike was a mile-long walkway where you could eat anything and just have fun. Mary and Nell tasted their
    first-ever hot dogs, hamburgers, ice cream cones, and iced teas. They also enjoyed something completely new called cotton
    candy. How could they ever convince their parents that cotton was now a candy! The girls strolled down the Pike, trying
    a little bit of everything - basically stuffing themselves and then eating even more. Along the Pike they also saw international
    stations, including an Eskimo Camp and the Geisha Girls, which thrilled them. By the time they got to the end of the Pike,
    Mary was feeling a bit queasy from eating too much.
- speaker: Respondent
  text: Then they saw the Ferris wheel.
- speaker: Respondent
  text: The girls hurried over and excitedly gave the carny 50 cents admission for two rotations. They climbed into a car
    with fifty-eight other people, the doors closed, and the Ferris wheel started its rotation. They sat together on fancy
    twisted-wire chairs, holding hands, anticipating the ride of their lives. In 1904 no one had been very far off the ground,
    because skyscrapers and airplanes had just been invented, so their ride up to 264 feet both thrilled and terrified both
    of them. At the top, they searched intently for their neighborhood and their houses in the skyline of St. Louis. Unfortunately,
    Mary's stomach started churning because of all of the food she'd eaten on the Pike. The conductor on their car was very
    nice and offered her some water. The ride was really long, taking forty minutes for them to complete two rotations before
    they were let out of the car.
- speaker: Respondent
  text: Mary shared this memory with my grandmother Catherine, who passed it to me. Neither Mary nor Nell is with us anymore,
    but they live on in our hearts through these loving stories.
- speaker: Respondent
  text: 'The date was January 15, 1913, the day my great-grandmother was born: Rebecca (Ruth) Shochet. It was such a happy
    day for Mr. Label and Mrs. Mariam.'
- speaker: Respondent
  text: Years later, in Russia, it wasn't so restful. Ruth was with her family and her cousins. They were having their Sabbath
    day meal when all of a sudden an ear-piercing gunshot interrupted their meal. They heard screams of terror coming from
    neighbors. Ruth and her family peered out of their snow-covered window, which revealed a horrifying sight. Everybody was
    running out of their homes, screaming in terror to take shelter from the Cossacks.
- speaker: Respondent
  text: Papa said, Those mischievous Russians! They always steal, and kill everyone that doesn't believe in their religion.
    He sighed. Everyone! Go and run away! he cried. We want everyone to be safe!
- speaker: Respondent
  text: But, Papa, Ruth heaved. I don't want to leave our home. Ruth began to cry.
- speaker: Respondent
  text: Don't worry, Ruthie. We will come back. Now, everyone! Let's go!
- speaker: Respondent
  text: They all ran with all their might, stomping on soft snow, making footprint by footprint. Mama was carrying baby Fagie.
    She glanced over her shoulder to find the Cossacks running after them, shouting in Russian.
- speaker: Respondent
  text: Ten minutes later, they all were gasping for breath as they entered a cave with dark walls and horrifying echoes.
    While everyone was hoping they could grab more of the cold air into their lungs, they heard faint cries, coming from...
    Mama?
- speaker: Respondent
  text: Mama, why are you crying? asked Ruth.
- speaker: Respondent
  text: Mama sniffled and said, Fagie... Cossacks chasing us... running... Fagie's cries... snow... She started wailing.
- speaker: Respondent
  text: Do you mean...? asked Papa.
- speaker: Respondent
  text: Mama nodded sadly.
- speaker: Respondent
  text: They gasped and started talking all at once. The baby - She dropped her in the snow???
- speaker: Respondent
  text: We have to go back! Ruth cried.
- speaker: Respondent
  text: No, we can't. The Cossacks could still be looking. We must stay in the cave, Papa said.
- speaker: Respondent
  text: Hours later they peered out of the cave. The Cossacks were gone. They crept out of the cave. They ran and ran until
    they found baby Fagie. They all thanked G-d that she was still alive, but she lost her hearing.
- speaker: Respondent
  text: 'Now always remember: No child left behind.'
- speaker: Respondent
  text: Gertrude, they're going to kill you! Gertrude's friend shouted frantically.
