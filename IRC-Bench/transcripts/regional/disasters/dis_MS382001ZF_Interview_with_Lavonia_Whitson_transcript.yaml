collection: disasters
source_url: https://archive.org/
turns:
- speaker: Interviewer
  text: Prior to the recording starting, you had indicated, Lavonia, that you were not from Fairview and that you had moved
    here at some time. So maybe that's where we could start with when you moved here and maybe why you came to Fairview.
- speaker: Respondent
  text: Okay. We moved to Fairview in May of 1973 and we were from the Asheville area and was looking to go to country. We
    thought we wanted country because we'd always lived basically in town so we wanted to go country. I woke the next morning
    to the sound of cowbells, that was so unusual because in town you don't hear cowbells. And so, the next morning we woke
    up to the sound of cowbells and that's just always made an impression on me because that's something you don't hear today.
    And at that time, it was unusual for me.
- speaker: Respondent
  text: To wake to sound of cowbells. I woke many mornings to the sound of Rupert Miller calling, "Soo cow, soo cow." He would
    get out early of the morning and he would call his cows in to milk and so I woke many mornings to that. And this generation
    gets their milk out of a bottle, so they have no idea what that was. But Rupert would get out and he lived across from
    us and so many, many mornings, we awoke to the sound of Rupert getting out and saying "Soo cow, soo cow." He's calling
    his cow in.
- speaker: Interviewer
  text: Okay, you want to continue.
- speaker: Interviewer
  text: If it pertains to why you moved here.
- speaker: Respondent
  text: Well, the next, it was the flood of 1973. It occurred one week.
- speaker: Interviewer
  text: Let's get to that a little bit later.
- speaker: Respondent
  text: Little later, okay.
- speaker: Interviewer
  text: Because we'll be very interested in hearing about that.
- speaker: Interviewer
  text: Okay. When you moved here, what area of Fairview, did you move to?
- speaker: Respondent
  text: Old Fort Road.
- speaker: Interviewer
  text: On Old Fort Road.
- speaker: Interviewer
  text: And you still have that property there today?
- speaker: Respondent
  text: Still have that property, still live there today.
- speaker: Interviewer
  text: Okay. And from your opening comment there, you were not disappointed at having moved to Fairview?
- speaker: Interviewer
  text: So very pleased-
- speaker: Respondent
  text: No, not at all. Very pleased.
- speaker: Interviewer
  text: '... overall. And I''m assuming that you still are today?'
- speaker: Respondent
  text: Very pleased.
- speaker: Interviewer
  text: From the '73 to now, what kind of changes have you seen in Fairview?
- speaker: Respondent
  text: Well, I've seen 74, that went from a two-lane road to what it is today. Let's see what other kind of changes that
    I've seen.
- speaker: Interviewer
  text: What was the sense of community like when you moved to this area?
- speaker: Respondent
  text: Okay, I have that down, I don't know if I should insert it here or not. But my daughter, when we moved here was 10
    years old. There was a country store up the road on up Old Fort Road and it was Sheet's Grocery. So, my daughter and her
    dog walked to the store every day, she went to get candy and ice cream and stuff like that. There was no sense that she
    was unsafe, it was just a good community and we just felt like it was safe. There wasn't a lot of traffic. She and the
    dog sometimes walked to the store and back without seeing a car or anything like that. And just had that sense of being
    safe and protected and-
- speaker: Interviewer
  text: Traffic wise, it's certainly different today, isn't it?
- speaker: Respondent
  text: It is very different today.
- speaker: Interviewer
  text: And very fast traffic.
- speaker: Respondent
  text: Very fast traffic going Old Fort Road, yes.
- speaker: Interviewer
  text: How would you describe Fairview today in terms of a child maybe going out to walk to a store?
- speaker: Respondent
  text: Oh, no. There would be no way that I could let a child walk from my house to a store today, no. The traffic is just,
    it's not bumper to bumper, but it's fast and there's a lot of it. And so, it's changed dramatically from the time that
    she could walk to the store at 10, 11 years old to what it is today.
- speaker: Interviewer
  text: In '73, in addition to feeling that your child was safe in doing what you described. What was the sense of welcoming
    or neighbors? Did you feel welcome?
- speaker: Respondent
  text: Felt welcome the day that we moved in, Mrs. Peak was my neighbor across the road. She came over and she said, "I have
    cooked." They called it dinner at that time. It wasn't lunch, it was dinner. She said, "I have cooked dinner for you folks."
    She introduced herself to us and she said, "I have dinner ready, you're to come across the road and eat dinner with us."
    And so, very welcoming. On Sunday, we went to church in Fairview Baptist Church, very welcoming, very open arms. We were
    embraced by the community. It was just a sense of you belonging from the start.
- speaker: Interviewer
  text: On a scale of one to 10, with 10 being high and positive, I would assume that that would be your sense of welcoming
    and it was a 10.
- speaker: Interviewer
  text: A perfect 10. What do you think about today? In terms of if there are any new people from out of Fairview or out state,
    out of town moving in. What do you think?
- speaker: Respondent
  text: I don't think it would be as welcoming today. I have neighbors that, I guess you could say I basically not met. And
    on my part that's not because I didn't try but that's because they didn't want to be bothered in that sense.
- speaker: Respondent
  text: That have moved in that just can remember one that I just... You know, you go and you're just standing there, you're
    not invited in and you just say, "Wanted to welcome you." And it's not too receptive.
- speaker: Interviewer
  text: Right. You said your daughter was 10.
- speaker: Respondent
  text: She was 10 when we moved here on Monday, on Saturday she turned 11.
- speaker: Interviewer
  text: Oh, 11. How would you describe her experiences from a parent's point of view at the Fairview School?
- speaker: Respondent
  text: It was positive. She just started school, didn't know anybody and so she was welcomed by the teachers and the students.
    And so, she...
- speaker: Interviewer
  text: What did you think about the school, Fairview Elementary School? Do you remember maybe some particular things that
    you liked about it? Because she had gone to school in Asheville?
- speaker: Respondent
  text: No, I can't really think of anything that stands out. I just remember that I guess it was smaller and I just remember
    that I was happy with the school.
- speaker: Interviewer
  text: You felt welcome.
- speaker: Respondent
  text: Yes, I felt welcome.
- speaker: Interviewer
  text: And that's key for sure. When you bought the property that you're still living on today, did you do any farming?
- speaker: Respondent
  text: Yes, we raised a garden. We raised what we called back then, a corn patch. So yes, we did do gardening.
- speaker: Interviewer
  text: Do you have any livestock?
- speaker: Respondent
  text: We did. We bought our daughter a pony. She had a pony and so that was different that-
- speaker: Interviewer
  text: Any fresh eggs. Did you have chickens?
- speaker: Respondent
  text: We didn't have chickens until later on. Not when we first moved, no.
- speaker: Interviewer
  text: Okay. But later you did. I think we've probably covered most of it in and maybe one of your opening statements about
    the best aspects of living in Fairview and I think you did a really good job of describing that. What do you think are
    the best aspects of today of living in Fairview? Memories are part of it, I know.
- speaker: Interviewer
  text: When you've lived in a place for a while. And I guess maybe if I clarified a little more in terms of, if you knew
    someone well who was going to move to Fairview, what would you tell them?
- speaker: Respondent
  text: Well, I would say that we still have that sense of living in the country, even though it's not country as it was in
    1973. But we still have that feeling of being in the country that you can still have a little bit of land and you're not
    right in on top of your neighbor. I would say that is still a positive. I would say another positive is being close to
    Asheville, that you're close to town.
- speaker: Interviewer
  text: Did you lock your doors when you first moved here?
- speaker: Respondent
  text: No, we didn't lock the doors. No.
- speaker: Interviewer
  text: Did it change? Do you lock your doors?
- speaker: Respondent
  text: Yes. Oh yes.
- speaker: Interviewer
  text: Roughly, when do you think that changed?
- speaker: Respondent
  text: When do I think that changed? Let's see. We moved here in 1973, probably in the latter '80s. I'm just guessing on
    that, probably the latter '80s.
- speaker: Interviewer
  text: What brought that on?
- speaker: Respondent
  text: Just hearing about crime in the community that we haven't ever necessarily experienced anything. But just hearing
    it happened over here, it happened over there. And just hearing that crime was and so you felt like that.
- speaker: Interviewer
  text: Became aware of.
- speaker: Respondent
  text: Became aware.
- speaker: Interviewer
  text: Of things that were going on.
- speaker: Respondent
  text: Of things that were going on in the community.
- speaker: Interviewer
  text: And that's certainly a good reason.
- speaker: Interviewer
  text: Could I ask a couple of questions.
- speaker: Interviewer
  text: Sure, jump right in.
- speaker: Interviewer
  text: This is kind of like going back a little bit, if you don't mind. I see that you were born in Madison County?
- speaker: Interviewer
  text: Is that where you were raised?
- speaker: Interviewer
  text: Were you raised on a farm?
- speaker: Interviewer
  text: And your parents were farmers?
- speaker: Respondent
  text: My parents were farmers. We raised tobacco and all that, yes.
- speaker: Interviewer
  text: Okay, so, you really were a country girl.
- speaker: Interviewer
  text: So, were you retired when you moved to Fairview?
- speaker: Respondent
  text: Oh no. We were... Let's see, '73. That would've been 44, 4, 64, I was 29 years old.
- speaker: Interviewer
  text: Oh, so you had moved from Madison County to Asheville?
- speaker: Interviewer
  text: And I assume you and your husband both were working?
- speaker: Interviewer
  text: In Asheville. Where did y'all work?
- speaker: Respondent
  text: He worked at Ball Corporation, he retired from there. Only job he ever had.
- speaker: Interviewer
  text: '... jar factory.'
- speaker: Respondent
  text: Yes. And I worked at Sears.
- speaker: Interviewer
  text: At Sears, wow. And did you continue working there after you moved to Fairview?
- speaker: Interviewer
  text: And you retired from both of those places?
- speaker: Respondent
  text: No, I didn't retire from Sears.
- speaker: Interviewer
  text: When you moved to Fairview in '73, do you have memories of what ethnicities were here in Fairview? Was everyone white?
    Were there people of different color? What was it like in '73 for that?
- speaker: Respondent
  text: You didn't see many colors, I remember that. And I think I'm telling this correctly that my daughter had one Black
    student in her class but no, it didn't. Ethnics didn't come in until later on, it was primarily white. But I do remember
    that she did have one Black student in her class but that's all I can remember when we first came to Fairview.
- speaker: Interviewer
  text: Let me ask you at this point so that we don't get totally off track, you have some items there that you want to share
    with us. So, would you like to share some of those now and we'll see how they tie in with this?
- speaker: Respondent
  text: Okay. The flood of 1973, I don't know if anybody has mentioned that.
- speaker: Interviewer
  text: Yes. And I'm dying of curiosity and I've been trying to research a little bit and finding it difficult to get information.
- speaker: Respondent
  text: I went online to make sure just that I had the dates and all correct. Couldn't find anything about it.
- speaker: Interviewer
  text: Did you get May 31st? It was Memorial Day weekend, 1973.
- speaker: Interviewer
  text: That's what I've come up with is May 31st.
- speaker: Respondent
  text: Well, I've got dates. I did go on Google and got dates for these. I thought I had it correct and when I went on Google
    and I did have that correct. But the flood of 1973 came one week after we moved to Fairview. We moved in on a Monday and
    on Sunday night the flood comes. So, it came one week later after we moved and should I give names here or just call it
    my neighbor or what?
- speaker: Interviewer
  text: As long as it's positive and just in identifying things, I don't see a problem with giving a person's name because
    most of the other people we've interviewed certainly do that in talking about experiences.
- speaker: Respondent
  text: Okay. I wasn't sure about that and I didn't call to verify it would be okay to do it. But my neighbor, Raymond Pressley,
    waded water to his neck trying to rescue his hunting dogs. He had hunting dogs. And so, the flood came so quickly and
    all that. He waded water to his neck trying to rescue those dogs.
- speaker: Interviewer
  text: Was that water in Cane Creek?
- speaker: Interviewer
  text: So, Cane Creek got way out of its banks.
- speaker: Respondent
  text: Cane Creek got way out. That's Cane Creek that goes down by my house and so it got way out of banks.
- speaker: Interviewer
  text: And it came up into Mr. Miller's pasture, I guess.
- speaker: Respondent
  text: Yes. And so, Raymond waded water to his neck trying to rescue his hunting dogs. Raymond and Betty's bridge that was
    going across Cane Creek, flooded out. So, they're on the side of the mountain there and there's no access into their house
    because they lost their bridge there. During the night, we heard this terrible, terrible noise. We could tell, it sounded
    like something hitting but we couldn't identify it and of course the lightning and the rain and all. Oh, it was just incredible,
    but we kept hearing this noise. So the next day we learned that Raymond's big rock truck, he's a rock mason, and his big
    rock truck that he has had washed away in the flood.
- speaker: Interviewer
  text: Oh, my goodness.
- speaker: Respondent
  text: And so, we determined that it was that truck hitting the rocks and the trees as it went downstream, was the noise
    that we were hearing.
- speaker: Respondent
  text: It was incredible. My neighbor, Archie Peak, which lives or did live directly across from me, his fence washed away.
    And Mr. Peak was probably in his 70s at that time and was a diabetic. So, he was so concerned that his cows was going
    to escape the pasture because there was no fence. And my husband had that day off because it was Memorial Day weekend
    and he had the day off so he helped Mr. Peak's son. Mr. Peak wasn't physically able to build a fence, so my husband helped
    his son build the fence, restore the fence so that they could keep the cattle back in the pasture.
- speaker: Interviewer
  text: Did you lose electrical power during that time? Because you mentioned the heavy rain and thunder and lightning and
    so forth.
- speaker: Respondent
  text: I don't remember losing power. We didn't even lose power during the blizzard of 1993. We very seldom lose power.
- speaker: Respondent
  text: Yes, very, very fortunate so we very seldom ever lose power. So, I don't remember losing power during the flood. I
    just remember that it was incredible. I do remember and I don't know if you would want this or not, but we had a friend
    that lived at Candler. And he had a trailer park at that time and his entire trailer park was destroyed and he said that
    he lost a $100,000 without insurance and that was 1973. Now, he wouldn't get a trailer park today for a $100,000. But
    he lost his entire trailer park, mobile home park in 1973 and he lost a $100,000 at that time.
- speaker: Interviewer
  text: Do you recall how long it took for the water to recede in this flood in '73?
