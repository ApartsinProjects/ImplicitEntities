collection: disasters
source_url: https://archive.org/
turns:
- speaker: Interviewer
  text: Grace, could you tell me your name, address, your date of birth and place of birth?
- speaker: Respondent
  text: My name is Grace Abbott and I live at 445 Twin Lakes Circle in Santa Rosa. That's the Oakmont Village and I was born
    October the 20th, 1907 in Sebastopol.
- speaker: Interviewer
  text: Were you born at home?
- speaker: Respondent
  text: Well, at my grandmother's home, up on Florence Avenue.
- speaker: Interviewer
  text: Which house was that on Florence?
- speaker: Respondent
  text: I don't know the number of it, but it's the second house from the corner.
- speaker: Interviewer
  text: Near Healdsburg?
- speaker: Respondent
  text: No, near the other end, by Bodega. The next block on Florence Avenue on the right hand side. And it's the second house.
    It's still there.
- speaker: Interviewer
  text: It's not the Strout House? It's near the Strout House?
- speaker: Respondent
  text: Yes it is, it's just this side, about three houses this side. In fact, Erma Strout, one of the daughters of that family
    is an aunt by marriage of mine, so I'm familiar with the old house.
- speaker: Interviewer
  text: I wanted to ask you, you mentioned that your parents came here. I would like to ask where they came from, how they
    came and when they came.
- speaker: Respondent
  text: That's the grandparents? My grandparents were the ones that came here. The grandparents on my father's side, the Winkler
    side, he came here when he was sixteen. He came here from Kentucky. And he came primarily to go to the gold fields, at
    that time in 1849. But after he got there, he decided that since he was a farmboy, he would prefer to farm rather than
    spend his time in the gold fields. Then on my mother's side, the Duer side, my grandfather came here, I'm not sure of
    the year, but it was sometime in the mid-1800's and he came from Missouri and he came first without his family. They didn't
    want to come. And then when he went back and brought his family a few years later, they came across the northern part
    of the United States and came down from Oregon and settled in California. Whereas my father's father came across the plains
    driving a team of oxen and came over the Sierras and into Sacramento and down into Sonoma County.
- speaker: Interviewer
  text: Did you hear any stories about them when they came by wagon train?
- speaker: Respondent
  text: I've heard, in fact it's in our history, that my grandfather Winkler, did have some skirmishes with the Indians, but
    it was not of a serious nature. Well, it could have been but the Indians stole their horses. They had a train of horses
    with them. But they were able to get them back without any great loss. They were more or less a friendly band of Indians
    that were just out to get the cattle if they could. And I haven't heard any particular story of my grandfather Duer coming
    down from Oregon. I think that was a few years later when things were just a bit more stable.
- speaker: Interviewer
  text: Did they describe what the living conditions were like when they came across by wagon train? The daily living?
- speaker: Respondent
  text: No, if they have, I've forgotten about it. I was a kid.
- speaker: Interviewer
  text: Did they have children at the time?
- speaker: Respondent
  text: No, because when my grandfather Winkler came across he was just a young boy, that is, we'd consider him a boy now.
    He was only sixteen. When my grandfather Duer came here, I didn't hear much about his first traveling to California alone.
    But when he brought his family, it was later and he came through the Oregon Trail and down into California. As I say,
    if I had heard tales, I've forgotten.
- speaker: Interviewer
  text: And your parents then were born here?
- speaker: Interviewer
  text: Where were they born?
- speaker: Respondent
  text: My mother was not born here. There were nine in the family and she was born in Missouri. Her two younger sisters were
    born in California, but the other seven of them were born in Missouri.
- speaker: Interviewer
  text: So how did she get across country?
- speaker: Respondent
  text: Well, they are the ones who came down through the Oregon Trail.
- speaker: Interviewer
  text: So did she ever describe to you what it was like? She was probably too young?
- speaker: Respondent
  text: Well, yes, she was old enough to know that she was delighted to come to California and get out of Missouri. They were
    people that didn't have an awful lot. My grandfather was a Civil War veteran and I think his education didn't go much
    further than the first few grades in elementary school.
- speaker: Interviewer
  text: Which wasn't that unusual at the time.
- speaker: Respondent
  text: No, it wasn't. In fact, I came across four letters that I had received from him just recently in going through some
    old papers. And, after he got there, and brought his family, he would be homesick for Missouri, and he had a brother and
    some of the family still back there, and so he would go back every once in a while. And so evidently, I must have written
    to him. Because he was answering my letters. And I could tell by his letters, they are difficult to read because of his
    education. His spelling is just terrible.
- speaker: Interviewer
  text: They are special gems. I hope you are going to do something with them.
- speaker: Respondent
  text: They are written in pencil and they've been put away. In fact, I had forgotten them completely. They were written
    in 1918. But they are in good condition. But the pencil is not too clear.
- speaker: Interviewer
  text: Does it talk about the Civil War or anything?
- speaker: Respondent
  text: In his letters, the only thing that he seemed to have on his mind was what he was doing and the weather. Mostly the
    letters were about the weather and crops. He did tell stories of the Civil War. They lived in the South, but they were
    Northern Sympathizers. And his dad had already been inducted into the Army and he had heard that they were going to be
    taking his age young man in the next draft. And that would have been in the Southern Army and he didn't want that, so
    he struck out through the underground to get to where his dad was. And he was just a young fellow, around 14 or 16 and
    he was too young to be a soldier. But he was a drummer boy and water boy where they took water onto the battlefield. So,
    he didn't talk a great deal about the actual war. Either he didn't remember, or it was too painful, one or the other.
- speaker: Interviewer
  text: So your mother, then, she wasn't born here, but she moved to Sebastopol? Is that where your mother and father met?
- speaker: Respondent
  text: And it's funny, I never did hear, I'm sure I would remember it, I never did hear how they met. I just don't know.
    My mother's family lived in town and my dad's family was out in the Green Valley area, out beyond Graton. It must have
    been at some social function where they met.
- speaker: Interviewer
  text: Do you know how old they were?
- speaker: Respondent
  text: Well, let's see, mother was a year older than dad. Mother was born in 1879 and dad was born in 1880. And they were
    married in 1903. So they were 23 and 24. I have a wedding picture that was taken of them in Santa Rosa. I have several.
    But one that I particularly liked. They were both standing. And mother had, of course, the old trailing skirts and big
    sleeves and a big pinched waist and a hat that must have been beautiful. It had a big white plume clear from the front
    to the back. And I took the picture to the fourth grade, the Outreach Program that we doing. And one little girl wrote
    afterwards that she thought my parents were just beautiful. And she said "I would have loved to have a hat like that."
- speaker: Interviewer
  text: Do you have any of the old clothing?
- speaker: Respondent
  text: No, just pictures. I have quite a number. I have my grandfather's Civil War picture in uniform. And so I have several
    of the old pictures.
- speaker: Interviewer
  text: Are you going to have them copied for the historical society?
- speaker: Respondent
  text: If they want them. There's one picture of the Winkler family, my dad's family. There were six boys and three girls
    in that family. And I have a photograph of the six boys together, which is kind of unusual at that age, that era. And
    I've often thought I wonder how grandmother got six boys together.
- speaker: Interviewer
  text: Well, are you familiar with what they had to do to take the pictures? The old pictures, because of the cameras, they
    had to leave their lenses open for a long time. So especially with kids, but all of them had to have braces behind their
    necks to keep them still. So can you imagine six boys with braces behind their necks?
- speaker: Respondent
  text: Well, I don't know what year this was taken, but they are all young men. The oldest brother was the only one that
    went on to college. The rest of them were farmers. And he was a surveyor in Santa Rosa. And he passed away at a fairly
    early age. The rest of them, they are all gone now, but they lived to be a ripe old age.
- speaker: Interviewer
  text: I want to ask you, you were born at your grandparents' house. Where were your parents living at the time?
- speaker: Respondent
  text: I don't know. Dad had a small ranch just a mile west of Graton. But there were no buildings on it. Because I remember
    we moved out there when I was about perhaps four or five years, maybe even younger than that. And I know that dad built
    the barn first and so we lived in the barn, then, until the house was built. So people say, shut the door, were you born
    in a barn? I lived in a barn.
- speaker: Interviewer
  text: Do you think that your parents lived with your grandparents?
- speaker: Respondent
  text: I don't think so. I just don't know.
- speaker: Interviewer
  text: So for the first five years, you were somewhere. But you don't know where. And then you were in Graton. For how long?
- speaker: Respondent
  text: Until I was married.
- speaker: Interviewer
  text: And I wanted to find out about the living conditions at the time. So this was from 1912 to 1929. You lived in Graton.
    And I wanted to find out what the house was like. You lived in a barn for a while, and what all the things were like,
    the lifestyle - the plumbing, the transportation of the time...
- speaker: Respondent
  text: Well, it was a rural area. We lived up on a little private road off of the county road and we were just a short ways
    above the Gillam Cemetery. And I think that is on what is called Sullivan Road now. And the house had two bedrooms and
    a screened porch, where in the summertime my parents slept. And then there was a kitchen, which had a pass cupboard, which
    we called it, from the kitchen into the dining room and a living room which we very seldom used. The parlor. And the fireplace
    was in the dining room. And there was bay windows, I remember that.
- speaker: Interviewer
  text: Did you have electricity?
- speaker: Respondent
  text: Yes, we did. And I don't know whether we had it when we were first there or not, but I know that the house burned
    down in around 1940, and they couldn't find any other reason other than they thought it might be the wiring. And I think
    the wiring was done later than when the house was first built. And it was a brown shingle house with quite a good sized
    porch, I remember. And then we had what we called the tank house. And it was so cool in the summertime. And when the pump
    was on and the tank would overflow then it would drip down onto the bottom, and it was... And my dad had one patch, one
    or two acres of cherries and the rest was grapes, and then he planted Gravenstein apples in the grape vineyards, so that
    when he pulled the grapes out the apples would be in production. And many times it would be a good year and everything
    would be fine. Then he would go and pay off the mortgage. And then he would have a bad year, and he would have to borrow
    for another year. But it was a good life. He never complained. There was a family of five boys just across the road. I
    was the same age as their middle boy, so I grew up more or less a tomboy. I had more boy cousins than I had girl cousins.
    But a lot of good memories of those days.
- speaker: Interviewer
  text: Did you have running water at the time?
- speaker: Respondent
  text: Yes, we did. We had one bathroom, which was between bedrooms. And the tub was the kind on little legs, but we had
    running water and we always had a cow for our own personal use. We didn't sell it, but it was for our own use. And I remember
    how nice and thick the cream would raise on the pans of milk. And I guess that's about all that I can remember.
- speaker: Interviewer
  text: Can you remember your mother's lifestyle? She probably didn't work in a regular paid job, did she?
- speaker: Respondent
  text: No, her social life is that she belonged to the Graton Women's Club.
- speaker: Interviewer
  text: What was her first name?
- speaker: Respondent
  text: Charlotte. And that club was still in operation there. They have in the springtime, a garden show, out there in Graton.
    but that was all she did. But she did all her canning. And I can't remember when we didn't have some kind of car for transportation.
    The first one was a Ford, of course, and dad didn't particularly want mother to drive. I guess he was afraid that she
    couldn't do it properly. And so one day she had observed and they were really simple things, and she determined that she
    could drive. And it was a touring car. So she put me in the back seat. And my dad was working over at one of his brother's
    ranches. And we were going to go over there. And so she was going too fast to make the turn. And so we went around I guess
    it was about a four mile loop to get back again. The second time she still felt she was going a little too fast. So she
    told me to listen to her and if she told me to get out, to drop over the back end of the car, and drop down into the road.
    But about the third time around she was aware enough and she was going slow enough to make the turn all right. After that,
    why she never had any more problems. But it was evidently kind of a wild ride that first one.
- speaker: Interviewer
  text: It sounds like she was one of the early liberated ladies.
- speaker: Respondent
  text: Dad had the reputation of always having the nicest horse and buggy in the county; and he was very particular about
    it. He didn't loan his horse out or any of his working stock, unless he was with them to take care of them himself. Because
    I did say a while ago, he did take his team to San Francisco to help in the cleaning up after the earthquake. So we did
    have a horse, but I don't remember that as much as the automobile. And later, dad bought me a little Ford Roadster that
    I drove to high school. That was quite the thing. Before that though, I had a horse and rode to both the Marshall School
    and to Oak Grove which is in Graton.
- speaker: Interviewer
  text: I wanted to ask you, we had talked before about the earthquake. You said your parents had gone through it and probably
    your grandparents.
- speaker: Respondent
  text: I don't remember hearing my grandparents talk about it at all. The only thing I remember is that one of my mother
    saying that she thought the house was taken up.
- speaker: Interviewer
  text: Can you say that over again?
- speaker: Respondent
  text: My mother and dad were just getting up on that April morning and mother having come from Missouri was familiar more
    with tornadoes than she was with earthquakes. And they looked out the window and saw the tops of the trees which were
    swaying and she thought that the house had been lifted up by a tornado. And she told dad, if the house just stuck together
    until they landed, they would be all right. And dad did take his horses to San Francisco. Anybody that had any stock that
    could help, went to San Francisco, because they were in desperate need.
- speaker: Interviewer
  text: So, it was much worse in San Francisco? Because I know the whole downtown here was supposed to be leveled.
