turns:
- speaker: Interviewer
  text: Can you tell me about your early family life and school days?
- speaker: Respondent
  text: I grew up in a family that valued education and hard work. My parents always encouraged me to pursue my interests
    and to be involved in the community. I attended grammar schools and high school in San Francisco, and I have fond memories
    of visiting my grandparents in Nevada City during the summers.
- speaker: Interviewer
  text: What was your experience like during the earthquake and fire in San Francisco?
- speaker: Respondent
  text: It was a terrifying time. The city was in chaos, and many people lost their homes and businesses. My family was fortunate
    to be safe, but the event left a lasting impression on me about the importance of community resilience and support.
- speaker: Interviewer
  text: How did your education continue after high school?
- speaker: Respondent
  text: I spent two years at the University of California, Berkeley, before transferring to the University of Pennsylvania's
    Wharton School. My time at Wharton was particularly formative, as it gave me a strong foundation in business principles
    that I later applied in my career.
- speaker: Interviewer
  text: Can you share about your engagement and marriage?
- speaker: Respondent
  text: Certainly. I was engaged and married to my wife Doris, who has been a wonderful partner throughout my life. Our relationship
    has been a source of great strength and joy for me.
- speaker: Interviewer
  text: Tell me about your early recollections working for the family paper business.
- speaker: Respondent
  text: Working for the Zellerbach Paper Company was both challenging and rewarding. I started in various roles, learning
    the ins and outs of the business. One of my key contributions was setting up a personnel department, which helped improve
    our operations and employee relations.
- speaker: Interviewer
  text: What was your experience with unions in the company?
- speaker: Respondent
  text: Unions played a significant role in the industry. We worked hard to maintain good relationships with union representatives,
    understanding their concerns while also ensuring the company's productivity and success.
- speaker: Interviewer
  text: Can you describe the dock strike of 1971 and its impact?
- speaker: Respondent
  text: The dock strike was a major event that affected many businesses, including ours. It disrupted shipping and logistics,
    causing delays and financial strain. However, it also highlighted the importance of fair labor practices and negotiation.
- speaker: Interviewer
  text: What roles did you take on in government commissions and political activities?
- speaker: Respondent
  text: I served on several commissions, including the California Beaches and Parks Commission. I was involved in managing
    bond issue campaigns and worked closely with political figures like Governor Pat Brown. These experiences deepened my
    understanding of public service and policy-making.
- speaker: Interviewer
  text: How did you support political candidates and causes?
- speaker: Respondent
  text: I supported candidates who aligned with my values and who I believed would serve the community well. For example,
    I backed Jack Javits and was active in various political circles, always aiming to promote good governance and civic engagement.
- speaker: Interviewer
  text: What was your involvement with the YMHA and the Jewish Community Center?
- speaker: Respondent
  text: I was deeply involved in supporting the YMHA and the Jewish Community Center, recognizing their importance in fostering
    community, culture, and education among Jewish residents and beyond.
- speaker: Interviewer
  text: Can you talk about your appointment as president of the San Francisco Art Commission?
- speaker: Respondent
  text: Being appointed president was a great honor. I worked to promote the arts throughout the city, supporting initiatives
    like the Municipal Band and proposing music festivals. We faced some criticism, but overall, we made significant progress
    in enhancing San Francisco's cultural landscape.
- speaker: Interviewer
  text: What were some challenges you faced with the Art Commission?
- speaker: Respondent
  text: One challenge was balancing diverse opinions and interests within the commission and the community. We also had to
    navigate budget constraints and political pressures while striving to support artists and arts organizations effectively.
- speaker: Interviewer
  text: How did you approach neighborhood arts and youth programs?
- speaker: Respondent
  text: We focused on developing new support for the arts at the neighborhood level, emphasizing youth engagement. Reports
    like the Hanks and McFadyen Reports guided our efforts to integrate arts into schools and community programs.
- speaker: Interviewer
  text: What was your relationship with Ruth Asawa and art in the schools?
- speaker: Respondent
  text: Ruth Asawa was a remarkable artist and advocate. We worked together to promote art education in schools, believing
    that exposure to the arts is vital for children's development and creativity.
- speaker: Interviewer
  text: Can you describe the development of the San Francisco Art Festival and the Art Commission Gallery?
- speaker: Respondent
  text: The festival was designed to showcase local talent and bring the community together through art. The Art Commission
    Gallery provided a space for exhibitions and helped raise the profile of artists in the city.
- speaker: Interviewer
  text: What were some problems of financing and organizing for the arts you encountered?
- speaker: Respondent
  text: Financing was always a challenge. We had to be creative in securing funds from both public and private sources. Organizing
    events and programs required careful planning and collaboration with many stakeholders.
- speaker: Interviewer
  text: Tell me about the need for a performing arts center in San Francisco.
- speaker: Respondent
  text: There was a clear need for a dedicated performing arts center to provide suitable venues for music, theater, and dance.
    We learned lessons from past bond defeats and worked on feasibility studies and community polling to build support.
- speaker: Interviewer
  text: What can you say about the San Francisco Opera Association and its seasons?
- speaker: Respondent
  text: The Opera Association has been a cultural jewel for the city. The 1971-72 season was notable, and we worked to support
    the star system and repertoire that would attract audiences and maintain high artistic standards.
- speaker: Interviewer
  text: How did you support young artists in the community?
- speaker: Respondent
  text: Supporting young artists was a priority. We helped promising violinists, sopranos, and pianists through scholarships
    and opportunities to perform, recognizing that nurturing talent is essential for the arts' future.
- speaker: Interviewer
  text: Can you discuss the development of the Zellerbach Paper Company over the years?
- speaker: Respondent
  text: The company grew significantly, expanding into export, boxes, paper bags, and paper towels. We invested in new machinery
    and reorganized systems to improve efficiency and profitability.
- speaker: Interviewer
  text: What was your role in coordinating the city's inter-agency council on the arts?
- speaker: Respondent
  text: I worked to improve coordination and administration among various arts agencies, promoting consolidation where appropriate
    and sponsoring festivals to increase public engagement.
- speaker: Interviewer
  text: How did you address issues related to artists selling in the streets?
- speaker: Respondent
  text: We had to balance supporting artists' livelihoods with city regulations. The commission took stands on these issues,
    aiming to find solutions that respected both artists and the community.
- speaker: Interviewer
  text: What was your involvement with the Newhouse Foundation?
- speaker: Respondent
  text: I served on the board and helped shape policies regarding foundation grants, ensuring that funds were used effectively
    to support arts and community projects.
- speaker: Interviewer
  text: Can you tell me about your connection to Temple Emanu-El?
- speaker: Respondent
  text: Temple Emanu-El has been an important spiritual and community center. I worked with successive rabbis and helped build
    membership and support for the congregation.
- speaker: Interviewer
  text: What were some developments related to the performing arts center project?
- speaker: Respondent
  text: We formed a nonprofit corporation to build a garage and explored revenue-sharing funds and public subscriptions to
    finance the center. We also focused on local facilities and expanding activities, paying attention to musical acoustics.
- speaker: Interviewer
  text: How did you contribute as a trustee of the University of Pennsylvania?
- speaker: Respondent
  text: As a trustee, I helped with alumni relations on the West Coast, contributed to building funds, and supported the development
    of theaters and athletic programs.
- speaker: Interviewer
  text: What can you say about your involvement with the San Francisco Better Business Bureau and Commercial Club?
- speaker: Respondent
  text: I was active in both organizations, promoting ethical business practices and supporting the commercial development
    of San Francisco.
- speaker: Interviewer
  text: How did you engage with companies like Fibreboard and Rayonier?
- speaker: Respondent
  text: I served on their boards, helping guide their strategies as they shifted from wood pulp to synthetic fibers, managed
    consolidations, and cooperated with other firms.
- speaker: Interviewer
  text: What was your experience with Joseph Magnin and going public?
- speaker: Respondent
  text: I was involved in managing depreciation and financing expansion, setting meeting days, and navigating offers like
    the Amfac offer, all aimed at strengthening the company's position.
