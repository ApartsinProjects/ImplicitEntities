turns:
- speaker: Interviewer
  text: So our first question that we have for you is how long have you lived in the Crisfield area and if you like moved
    here, when did you move here?
- speaker: Respondent
  text: Okay, I moved here in 2011 after I retired from Philadelphia. I'm a former school teacher, I taught in Philly. I taught
    grade- from grades preschool through middle school and precollege. So I have a wealth of educational experience. However,
    when I retired, I had bought a home here in 2003 from one of my relatives, and I just wanted the quiet kind of seashore
    life, you know, after the busyness and whatever of the city. I just wanted to kind of like just get away a bit, you know,
    even though I had been here previously when I was a little girl, my brothers, and I came here with one of my aunts. And
    we stayed here from maybe first, second to fourth grade maybe, you know, with family members, though, so it was a loving
    experience. But at that time, that's the first time I ever saw what I would call the water and the little flood, because
    you didn't get that in the city, you know? Not, not to that extent. We had, like, little water plugs that you could step
    on the side of the pavement or whatever. But here, I've never seen the water come up like that, like to a certain level
    of the homes, you know, and I mean like the first level of the home. But this was back in the day. But recently, just
    visiting some of my family members, sometimes down here it's so flooded, you can't come any further than McDonald's. I
    mean, your car, you would have to stop there. Definitely at one of the gas stations.
- speaker: Interviewer
  text: So other than the family connections that you had here and wanting to have a quieter life, are those the only reasons
    why you decided to move or were there any other reasons?
- speaker: Respondent
  text: I wanted the quietness and the serenity of being in this area and also coming back and- and just sharing with family,
    because most of my family is here, in this area.
- speaker: Interviewer
  text: Do you have children?
- speaker: Respondent
  text: I raised two, but I didn't have two of my own, but I have two. I raised my brother's two kids.
- speaker: Interviewer
  text: And did you, so you didn't raise them here in Crisfield?
- speaker: Respondent
  text: Yes, half here and half in Philadelphia.
- speaker: Interviewer
  text: So what was it like raising those children here?
- speaker: Respondent
  text: I felt the pace was a little slower. To keep it bluntly, I felt there was a whole lot of bias and like prejudice and
    subtle racism that they think you don't pay attention to, I saw. Because as soon as my nephew came, they wanted to put
    him back a grade, and I felt, why? I mean, I had an attitude immediately about it, but my mom, a little more docile than
    I am, you know, she accepted it. But I just didn't realize when he came here from Philadelphia, where we have a little
    bit of all the state of the art. I'm not bragging, but I mean, there's not too much we can't get our hands on before it
    fluctuates down here and I didn't know why they just put him back a grade. You know, I mean and that still bothers me
    till today even though now he's like 30 years old, but it still bothers me because I take it as a bias. It's like who
    else have you done this to that comes from maybe New York or New Jersey? I'm sure you don't do that to everyone.
- speaker: Interviewer
  text: So they're behind the times, is what you're saying?
- speaker: Respondent
  text: I'm not going to say behind the times, but I mean... [pauses]. Well, they could step it up a little bit, I mean, do
    something, and speak up more, and gather together more. It's like some of them are just so hushed and don't seem to know
    how to just come together. And the ones that come together, it's like a small core group that would speak up or say something,
    which is me, myself. And if I'm by myself to speak up, that's what I would do. I don't care who agrees or doesn't, and
    that's whatever political party they're in. Sometimes it's not about the political party. It's about you as a person and
    a human being, and you treating people how you want to be treated. That's how I basically see it. And here you see a whole
    lot of subtle, subtle racism, or let me keep it nice, biases on a daily basis.
- speaker: Interviewer
  text: And you can speak your mind freely, for real.
- speaker: Interviewer
  text: Now do those children that you raised, did they, do they still live here-.
- speaker: Interviewer
  text: Or did they end up moving?
- speaker: Respondent
  text: They moved, one is in North Carolina teaching and the other one's in Chester teaching special ed students. So, they
    did well. I didn't ask them to go into teaching though. I wanted them to just do what they wanted to do from their heart.
    It's not good to just throw things on children, you know. But I just left it like an open pier for them to, you know,
    venture out on their own and do what they needed to do, but for some reason they chose teaching. They're doing well.
- speaker: Interviewer
  text: What were your kids' experiences, I mean, other than being told that they should stay back a grade, what were their
    experiences growing up in Crisfield?
- speaker: Respondent
  text: I know every now and then, you get these little small groups, like families, depending on your last name, that puts
    you either in a upper, lower, middle-class level. And then, I have to admit, even though I didn't know exactly at the
    time, they have little affiliate [groups]. Whether, I'm supposed to say that or not, but they have little [groups]. And
    some of the kids don't come out and tell you, but you can see it's something that's beyond their eyes, that they don't
    want to share. And which, to me, fits under bullying. It's been small little assaults, but I guess families handle them
    on their own. But thank God we didn't stay long, long because we left later. Because when my mom passed away in '93, I
    took my nephew back with me. So the rest of his education was in Philadelphia. But we were always back and forth like
    the holidays, Memorial Day, 4th of July, any family events, you know, Christmas gatherings. Just like the majority of
    families, you know, do come together.
- speaker: Interviewer
  text: So speaking more of those like family events that you said, what are some of your most like cherished memories being
    in Crisfield?
- speaker: Respondent
  text: They have something called a Crab Derby every year and other little festivals. They even have a- a cruise every now
    and then right here at this building here. They have a cruise and it's usually a nice event. And, I like the- I call it
    my little beach back there, but I know it's not mine. They have a little cozy beach back there. Have y'all seen it? Okay,
    go that way. But, and that's nice, but basically family, just getting back together with family, you know, that was my
    main theme, you know.
- speaker: Interviewer
  text: It's really wonderful. Now, how do you entertain yourself in Crisfield?
- speaker: Respondent
  text: Me? I do whatever I want to do being retired. Some days I get up, I just walk my dogs. Some days, like I said, I may
    go to the beach. I exercise. I go out and eat. I visit former college friends. Just a little bit of whatever I feel like
    doing. I'm a say my life is about me now. So whatever I feel like doing. Sometimes it's just a walk. Then sometimes I
    just get up and pitter patter around the house and fix a corner here or something there and right in the middle of it,
    I'll leave that project alone and go walking or go out or meet some cousins and we go out for the day. You know-
- speaker: Interviewer
  text: Would you say that-
- speaker: Respondent
  text: '- so little things.'
- speaker: Interviewer
  text: Being by the water that- that keeps you here, or like that kind of influences the activities that you do, like could
    you imagine yourself not being by the water and doing different activities, or does it not make any difference?
- speaker: Respondent
  text: Yeah, I can imagine not being by the water, but the only way I see not being by the water is when the flood comes,
    and you're inconvenienced. But when it's a controlled environment, like, you know, out there by the beach, that's different.
    But I'm talking about when it rains and when you step out, it's like a whole puddle, or- or they may have to, the kids
    can't go to school for a few hours until a tide subsides a bit, you know. Which may be a couple hours. And then sometimes,
    when I'm at my niece's house, because my home is up this way, hers is down that way, on 4th Street. And some days, once
    it rains or that tide comes up, you can't go out your front or your back door. I mean, you're really wading through the
    water, but after a while I guess you get used to it, like I'm no longer afraid of it, but when the Sandy storm came I
    was actually afraid.
- speaker: Interviewer
  text: Because you had only been here for, you said you moved here in 2011?
- speaker: Respondent
  text: Yes, actually moved here. I was coming every year and doing various holidays with the family, but when I retired,
    I came here to stay in 2011. And the storm came, I think, either the end of September or that October. It was somewhere
    around that. I wrote it somewhere in my journal. But to me, I was actually afraid. I'd never seen the water come up like
    that. And then you had the servicemen, actually Army, coming in big boats trying to get people from their homes, whoever
    wanted to go, and at that particular time I just happened to be visiting my aunt and I'd never seen the water come up
    like that. I mean, it came, came as far as your car window, the door. So most of us had to get new cars and you couldn't
    come out for a while. I mean, it- all I said to myself when I actually saw the actual reality of the water is, "I didn't
    come here to die." That's what I said to myself, because it- it frightened me because water was, let's take this as far
    as that line is, that was in some people's homes, that right there. That was in people's homes. So you know they had to
    get out of there. But the majority may became half of that if you just use that as an example. And, some stayed, some
    got on, you know, when the servicemen came, well, I should give them their credit, the soldiers. When they came in the
    big boats, if you wanted to go, they took you there and took you to the school. Like, you know, it was one of the schools
    that you could go to if you wanted to, but my aunt at that particular time didn't want to go anywhere. So one of my cousins
    and I just stayed there with her. But I was actually frightened, but I stayed there with her because she was a good 80,
    I'm gonna say 80-some years old.
- speaker: Interviewer
  text: So her house was okay through that or-
- speaker: Respondent
  text: No not really.
- speaker: Interviewer
  text: -did she have damages?
- speaker: Respondent
  text: Yeah, she had damages and whatever, yeah.
- speaker: Interviewer
  text: Now, how did, from your perspective, the community respond after all of this?
- speaker: Respondent
  text: Well, they had meetings later when- when the water subsided and you could come out. I'm gonna say I can't even recall
    how many days, but I'm going to give it a good three, four days, because people were calling their insurance companies
    and whatever, you know. What was your question again?
- speaker: Interviewer
  text: How did the community respond?
- speaker: Respondent
  text: Well, they came together. We came- we- they had meetings at various churches and the schools, trying to let some of
    us know that you could either get grants to fix your home or contact your insurance company and they could help you in
    some kind of way. It was, they tried to give us a wealth of resources that we could use and then I think they had some
    kind of- I don't know if it was a grant or whatever. I'm not sure and then they start interviewing quite a few of us,
    you know, of our experiences. But, depending on your income, some people were eligible for their home to be repaired and
    some weren't. And I was the one who's- what didn't fit into the standard. They said that my income was too high, and I
    didn't even fit in the level of getting my home repaired.
- speaker: Interviewer
  text: So what did you do?
- speaker: Respondent
  text: Just went on and rented a place for a while and came back to my home every now and then just to keep it just up enough
    to survive. Yeah. Because, but I have to admit, you had a few of the Mennonites and some of the churches that came out
    and tried to help you. You know, we had quite a few churches that tried to us, as I think back and recall. And a few other
    companies, they would come and try to either help you fix your roof or your floor, but it was more like patchwork, you
    know. But they did the best they could. I appreciated it at the time, you know.
- speaker: Interviewer
  text: Now, speaking more broadly about flooding here, have you noticed changes in the land, weather, and water here in Crisfield?
    And if so, how have those changes kind of affected your your life here?
- speaker: Respondent
  text: Now when you say changes, the only changes I can see is it appears as if, first of all on the map, we're way below
    sea level. And, secondly, some of our homes still have the effect of the flow of the water where it either warped your
    floor or whatever. If it didn't come completely in your house, like I said, as high as that may be, for example, it warped
    you floors, you know.
- speaker: Interviewer
  text: So do you think that the amount of flooding that you've gotten since moved here, do you think it stayed the same?
    Or do you think that you're experiencing more flooding?
- speaker: Respondent
  text: I'm going to say almost the same, you know, depending on where your home is. Now I'm further up, so I didn't- I don't
    get the brunt of it as much as some of the people down here on Main Street and 4th Street. Like I said, from the gas station
    on, it's a gas station, Shore? Shore-whatever. From the gas station on, I have to admit, the people here, they have to
    take their cars up earlier, they'll tell you take your car up to McDonald's or they're trying to say a higher level. And
    then they just come back home. I don't know, because usually sometimes you can't get down here. Like if I'm trying to
    reach my niece, I have to meet her midway. So we put our boots on and we just slushed on through it.
- speaker: Interviewer
  text: And you've been doing that since you moved here in 2011?
- speaker: Respondent
  text: Yes, off and on depending on the weather and how the tide comes up because it varies. It's usually a hard rain sometimes,
    you know, but it depends on the tide itself and I mean you see it actually coming, you know, over the road, you actually
    see it coming.
- speaker: Interviewer
  text: So what are some other things that you personally do to prepare for flooding other than bringing your- your car up
    to higher ground?
- speaker: Respondent
  text: Get your boots and either deal with it and bail it on out and try to survive the best way you can in it, because there's
    nowhere else to go. And if you are, you're going miles away out of your way from your home. Because it's not ev
