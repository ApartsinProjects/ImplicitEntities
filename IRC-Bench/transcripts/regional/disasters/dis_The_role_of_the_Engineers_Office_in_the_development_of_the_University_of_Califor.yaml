collection: disasters
source_url: https://archive.org/
turns:
- speaker: Interviewer
  text: Since your maternal grandfather was James Sinclair of the Hudson Bay Company, perhaps you would like to begin by telling
    some of the family stories about the party he led across Canada to Port Walla Walla in 1851?
- speaker: Respondent
  text: Well, my mother, Mary Sinclair, was about four and a half years old at the time they all left. Her little sister Jennie
    was only about a year and a half. It is this sister Jennie who tells about a trip she later made east in 1923 to see an
    old half-sister who had kissed her goodbye and pinned a new bonnet on her as she was put in the packsaddle of the pack
    train at Port Gary - now Winnipeg, Canada.
- speaker: Interviewer
  text: Wasn't there a wagon train?
- speaker: Respondent
  text: No. It was all done on horseback and pack animals; like most of those trips out in those early days, they could not
    take wagons because there was no road. In places where the brush and timber were thick, they would have to cut the brush
    and trees down so the wide-horned cattle could get through.
- speaker: Interviewer
  text: Oh, they used longhorns then?
- speaker: Interviewer
  text: And although they were going on the trail?
- speaker: Respondent
  text: Well, I was just going to mention that there was really no established trail. They would go just in certain directions.
    They made their own trail mostly as they pursued their journey.
- speaker: Interviewer
  text: Oh, I see. Well, your grandfather James Sinclair had gone a few years before, hadn't he?
- speaker: Respondent
  text: He had been west on several trips previous to this one particular trip in 1851; he had made many trips starting in
    1830. He is known as the pathfinder of the Hudson's Bay Company.
- speaker: Interviewer
  text: And he was more or less the leader of the party, wasn't he?
- speaker: Respondent
  text: He was the leader of the party. Yes, he was in charge of the party.
- speaker: Interviewer
  text: Did your mother remember very much of this?
- speaker: Respondent
  text: Oh, I had heard some tales. I don't recall too much. You see, James Sinclair, after his education in Edinburgh, Scotland,
    returned to Port Gary; he took up the fight for free trade and individual liberty and reasonable government for those
    trafficking in furs.
- speaker: Respondent
  text: In Canada. And he was the accepted leader of this movement. And he carried it on with much sacrifice to himself. He
    even took the fight to the throne and Parliament in England. It is mentioned in the records-- "even to the steps of the
    throne." And that's how he got the name from Bryce - the title of "The Hampden of Red River." My cousin tells about it
    in a paper in Bancroft Library there at the University.
- speaker: Interviewer
  text: Do you know what this "free trade" refers to? Did he want fewer restrictions by the Hudson Bay Company?
- speaker: Respondent
  text: He wanted fewer restrictions by the Hudson's Bay Company so the trappers had a freer hand in their dealings with the
    Indians and with the American trappers that were coming up into that country. There was the fight with the Astor Company
    and with the American Fur Company. Then also the independent American trappers that were coming up into that country.
- speaker: Interviewer
  text: What were the restrictions? Do you know?
- speaker: Interviewer
  text: They were governmental?
- speaker: Respondent
  text: Yes. Governmental in the way that they were placed by the Hudson's Bay Company, which had originally received the
    grant from England.
- speaker: Interviewer
  text: Now, when your mother was in Walla Walla she went to school and completed her schooling at a missionary school, is
    that right?
- speaker: Respondent
  text: I think it was a Methodist convent at The Dalles on the south side of the Columbia River in Oregon.
- speaker: Interviewer
  text: That was around 140 miles away from Port Walla Walla?
- speaker: Respondent
  text: It was probably 100 miles downstream from Port Walla Walla. At her father's death she continued her schooling there
    and she was there during the time of the Civil War. I had heard her relate stories that the students within the walls
    of the school would listen for the town crier to come by to report the news of the Civil War activities. Incidentally,
    I heard my mother say that Ulysses S. Grant was stationed by the United States in some of the forts and areas in the North
    and lived for a time at Port Walla Walla.
- speaker: Interviewer
  text: Before the war?
- speaker: Respondent
  text: Yes, she had mentioned that she and her sisters used to sit on his knee; he was very fond of children.
- speaker: Interviewer
  text: He lived right in the Port Walla Walla, then.
- speaker: Respondent
  text: Both Walla Walla and Port Vancouver.
- speaker: Interviewer
  text: You say that after her father was killed by the Indians, your mother went ahead and finished her schooling. Did she
    continue to live at Port Walla Walla?
- speaker: Respondent
  text: I don't think so. I think after she finished her schooling she got a job with the school department of Multnomah County,
    Oregon, and taught in the Portland schools. I have in my records her first teacher's certificate for teaching in the Portland
    schools. It is dated December 11, 1870, and signed by E.G. Anderson, county school superintendent.
- speaker: Interviewer
  text: Do you remember any of her teaching experiences?
