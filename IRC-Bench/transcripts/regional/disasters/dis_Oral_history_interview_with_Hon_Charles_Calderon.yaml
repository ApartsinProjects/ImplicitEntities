turns:
- speaker: Interviewer
  text: Can you tell me about your early life and your parents?
- speaker: Respondent
  text: I grew up in East Los Angeles. My childhood was marked by some gang threats, which led my family to move to Montebello.
    Schooling in Montebello was a different experience, and I was influenced a lot by my teachers and coaches. Sports played
    a big role in shaping my career and character.
- speaker: Interviewer
  text: How did your early experiences influence your political interests?
- speaker: Respondent
  text: I was very interested in counseling Mexican students and volunteering in poverty and civil rights programs. These
    experiences helped shape my liberal orientation and early political interests. I also worked as a prosecutor for the Los
    Angeles City Attorney and later in private law practice, which gave me insight into legal and political systems.
- speaker: Interviewer
  text: What was your involvement with MALDEF and minority schools?
- speaker: Respondent
  text: I was involved with MALDEF and the NAACP, focusing on minority schools. One significant case was the Lennox High School
    segregation case. I also worked on campaigns related to school desegregation and served as a legislative aide before being
    elected to the Montebello school board.
- speaker: Interviewer
  text: Can you describe your experience in the 1982 legislative election?
- speaker: Respondent
  text: The 1982 election was competitive, with Gloria Molina running against Richard Polanco in the primary. My campaign
    had to navigate limited Latino political presence and organization. The Democratic Party's emphasis on environmental issues
    was something I criticized. Willie Brown played a significant role in my election, and Latino politics in Los Angeles
    were evolving at that time.
- speaker: Interviewer
  text: What was your role in the Assembly Democratic Caucus and your evaluation of Willie Brown as speaker?
- speaker: Respondent
  text: Willie Brown was a very skilled leader with unique leadership techniques. The Assembly Democratic Caucus was quite
    partisan after 1978. Lobbyists had a strong role, and I served on important committees like Finance and Insurance. I was
    also an assembly whip, which gave me insight into legislative processes and the impact of propositions like 13 and 4.
- speaker: Interviewer
  text: Tell me about the formation and significance of the Gang of Five.
- speaker: Respondent
  text: The Gang of Five formed as a group of moderate Democrats who often acted as a swing vote on liberal bills. We had
    disagreements with Willie Brown, which led to some tension and political maneuvering. The group was named the Gang of
    Five because of our size and influence. We played a key role in legislative battles over issues like gun control and workers
    compensation insurance.
- speaker: Interviewer
  text: How did the Gang of Five impact the Assembly and your political career?
- speaker: Respondent
  text: The Gang of Five challenged the established leadership, including efforts to unseat Willie Brown as speaker. I even
    ran for speaker myself in 1988. The fight for leadership affected the Assembly's dynamics and eventually led to the end
    of the Gang of Five as a cohesive group. Afterward, I was replaced as Democratic Whip but continued to be active in Latino
    causes and legislative work.
- speaker: Interviewer
  text: What were some key legislative issues you worked on in the Senate?
- speaker: Respondent
  text: In the Senate, I focused on family law, including child support and custody issues. I worked on the Subcommittee on
    Family Law and was involved in legislation related to joint custody and the feminization of poverty. I also dealt with
    campaign finance, banking reform, insurance regulation, and environmental issues like hazardous waste management.
- speaker: Interviewer
  text: Can you discuss your efforts related to child support and fathers' rights?
- speaker: Respondent
  text: I became known as a guru of fathers' rights, opposing some bills that increased child support payments without considering
    the realities of income. I advocated for parenting education as a way to address gang problems and supported licensing
    daycare centers and services for immigrant children. These efforts were sometimes controversial but important to me.
- speaker: Interviewer
  text: What was your involvement with environmental and hazardous waste legislation?
- speaker: Respondent
  text: I worked on consolidating waste agencies and supported programs like SWAT and CUPA to improve hazardous waste management.
    We faced challenges with out-of-state dumping and limited treatment facilities. I helped pass the Hazardous Waste Management
    Reform Act of 1995, which reformed state superfund laws and aimed to improve recycling and waste treatment technologies.
- speaker: Interviewer
  text: How did you approach issues related to welfare and poverty?
- speaker: Respondent
  text: I saw poverty among women and the growth of single-parent families as critical issues. I supported programs like GAIN
    and advocated for comparable worth laws. I also worked on reforming child support standards and joint physical custody
    laws. Over time, there was a shift toward workfare, and I supported policies that encouraged employment among welfare
    recipients.
- speaker: Interviewer
  text: What can you tell me about your work on crime and sentencing laws?
- speaker: Respondent
  text: I was critical of determinate sentencing and worked on the Victims of Crime program and the Victims Bill of Rights.
    I supported mandatory sentencing for repeat offenders and was involved in debates over the Three Strikes initiative. I
    also addressed issues like criminal defamation, sanctuary policies, and juvenile justice reforms, drawing on my own experiences
    with gangs as a youth.
- speaker: Interviewer
  text: How did Latino politics evolve during your career?
- speaker: Respondent
  text: Latino politics grew stronger with leaders like Ed Roybal, Richard Alatorre, and Art Torres forming a nucleus. The
    Latino Caucus became more influential, and we worked on issues like bilingual education, affirmative action, and naturalization
    of immigrants. There were challenges, including controversies over leadership and differing priorities between suburbs
    and central city areas.
- speaker: Interviewer
  text: What are your thoughts on term limits and campaign finance?
- speaker: Respondent
  text: I criticized term limits for weakening the legislature and reducing the importance of experience. Campaign fundraising
    often felt like extortion, and I supported public financing of campaigns. Willie Brown's techniques for controlling the
    Assembly were effective but also contributed to centralizing power. I also supported the idea of an open primary to improve
    the political process.
