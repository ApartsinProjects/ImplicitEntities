- speaker: Interviewer
  text: 'The discussion of music pales to in significance beside the onslaught of Nazism. When did it become clear to you
    that you would have to leave Vienna and Austria? ZEISL: Oh, that was clear from the first moment on because as I have
    probably told you before, the situation in Austria was very different [than] it had been in Germany, though it was leading
    to this in Germany, too. In Germany, there was still a remnant of order and maybe law left, but when Hitler came to Austria,
    all these vestiges fell. And the reason was that Hitler had prepared to in vade Austria for years. And he raised a legion,
    an army, which he trained in Bavaria. And all the people that were called "illegal Nazis" (political sympathizers), which
    was forbidded in Austria, went to Germany and joined that legion. Mostly everybody who feared the law, every criminal
    that was about to be caught by the police, went over the mountains into Bavaria and joined that legion. And with that
    legion of outlaws, he entered Austria and gave them free rein, because he hated Vienna especially. And it was a kind of
    triumph and pleasure for him to enter there with a regime of terror.'
- speaker: Respondent
  text: So from the start you heard all these terrible stories. People were picked up in the street, brought
- speaker: Respondent
  text: to Gestapo headquarters and tortured there, and imprisoned and shipped off to the concentration camps at night. The
    Nazis entered the apartments. Most of them were sixteen to seventeen years old. And they had given them all guns. And
    the population was peaceful and had no defense against this. And so it was quite clear to us, especially since we had
    already even planned to leave. The difficulty was that when Hitler came to Austria, everybody wanted to leave, and that
    caused such a storm that the other countries shut off their borders, because by then Depression had begun in all the countries,
    and they feared the competition of this tremendous in flux of people who needed work when their own people had no work.
    And so afterwards you couldn't get a visa; you couldn't get out of the country. It was very, very difficult, and you had
    to try all kinds of things.
- speaker: Respondent
  text: We had acquired quite a few visas. For one thing, Eric had a student by the name of Hong Pan[?], who was a nephew
