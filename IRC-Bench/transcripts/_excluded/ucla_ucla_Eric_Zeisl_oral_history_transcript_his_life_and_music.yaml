- speaker: Respondent
  text: 'Then there were of course the Kafkas, who lived here, and we became very great friends with them. We had already
    been in Paris: we had lived together with them in the villa, remember? And then through friends, the Rei tiers .... Professor
    Reitler was the director of the conservatory in Vienna. And the conservatory was, so to say, the next after the academy.
    You studied either at the academy or at the conservatory. And very fine teachers were at the conservatory, too, and a
    lot of students. And Eric had also studied at the conservatory. I think I have already mentioned that Professor Reitler
    had given him a contract'
- speaker: Respondent
  text: which was supposed to begin in the fall but never came out because of Hitler's arrival. Through the Reitlers, we met
    the Korngolds, And again, we became very, very good friends, and they were very good friends, and we made outings together
    We went to Santa Barbara together and spent very, very nice evenings together. And Eric was then the teacher of his son.
    George Korngold, the younger son, studied harmony with Eric. And Korngold was so taken with the things that Eric taught
    him that he did all the exercises, too, and he said he was fascinated. He had never done these kind of things.
- speaker: Respondent
  text: And then, of course, came [Alexandre] Tansman. We met Tansman at the house of Jakob Gimpel, the pianist, whom we also
    had already met in New York and now met again and were very good friends with. And Tansman really became perhaps the best
    friend Eric had, and he was the most interested in Eric's music. He was very, very encouraging to Eric and wanted him
    to compose and really kind of spurred him to go on and not let time go and not compose. And one day Tansman visited with
    his wife, and they had two little girls who were the same age as Barbara. And like little puppy dogs, the three girls
    - they were four and five years old at that time--did somersaults on our lawn. And the next day Eric composed a piece,
    and it was really like you could see this whole scene in that piece. It had come about not only by this impression; it
    had come about through the encouragement of Tansman, that he wanted Eric to compose, and that he
- speaker: Respondent
  text: loved the first act of Job and thought it was so wonderful. And all this brought confidence to Eric, who was really
    kind of crushed by this experience in the studios and the hostility of the people there.
- speaker: Respondent
  text: Through Tansman, we then met Stravinsky. And again, we became very good friends with Stravinsky. He loved Eric, and
    at one time, when Stravinsky lived on Wetherly Drive (and Wetherly Drive was just an equal distance from our house and
    Beverly Hills), we gave a little party, and Stravinsky, who almost never came to parties, came to that party. And Alma
    Mahler was quite jealous and said, "You didn't come to me, but you come here." And he said, "It's nearer to me." But it
    wasn't nearer in distance. [tape recorder turned off]
- speaker: Respondent
  text: 'Of course, we were in touch with Alma Mahler. Then Milhaud came and lived in San Francisco, but at that time he would
