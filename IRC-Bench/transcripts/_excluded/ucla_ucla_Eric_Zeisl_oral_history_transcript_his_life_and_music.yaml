    especially in Austria, were very cultured people wno dabbled in the arts, a side, because their offices left them a lot
    of time. And he befriended Eric. Because it was before my time, I really don''t know how he got to know Eric, but he must
    have been quite taken by his gift and probably was an admirer and audience for Eric, and Eric was very grateful for this
