- speaker: Interviewer
  text: They have men's and women's and mixed choruses.
- speaker: Respondent
  text: And mixed, and everything. And it's a way of life there. And so it was really a very fine performance there
- speaker: Respondent
  text: in the Burggarten. It was something, an achievement that he was happy about. It was done with orchestra.
