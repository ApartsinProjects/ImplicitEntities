  text: Index of Eric Zeisl Works 384 Gertrude S. Zeisl. October 1978. frontispiece Photograph by Marjorie J. Rogers.
- speaker: Respondent
  text: Eric Zeisl. Circa 1957. following p. 324 Residence at 8578 West Knoll Drive, Los Angeles. On the evening of February
    18, 1959, his teaching finished, the Austrian-American composer Eric Zeisl suffered a heart attack in the halls of Los
    Angeles City College. He died that night. Only fifty-three at the time and at the height of his creative power, Zeisl
    had overcome formidable odds to carve distinguished careers in two worlds. He left for posterity a precious legacy of
    art song, choral literature, dramatic work, and instrumental music. As a remarkable individual who lived a fascinating
    life, as an inspirational example of determination, perseverance, and resiliency, as an emigre artist, and as a composer
    who breathed new life into traditional forms and techniques, Zeisl merits attention and study.
- speaker: Respondent
  text: 'Eric was born in Vienna on May 18, 1905. A sensitive, misunderstood child, he burned with one ambition only: to compose.
    His parents, well-intentioned coffeehouse owners, found this desire in comprehensible. Thinking that he would surely starve,
    they attempted continually and even cruelly to dissuade him, to no a vail. At the age of fourteen, he entered the Vienna
    State Academy of Music. His professional career began just two years later, with the publication of three songs by Edition
    Strache.'
- speaker: Respondent
  text: His formative years provide the stuff of which novels are made. Offsetting fits of melancholy, depression and
- speaker: Respondent
  text: despair, resultant psychoanalysis, and a string of hopeless love affairs were an enormous zest for life, a gift of
    prophetic in sight, an irrepressible sense of humor, and a storybook romance. Gertrude Susan Jellinek, his sweetheart
    and eventually his wife, introduced Eric into a receptive circle of artistic friends. She directed his enormous energy
    into creative channels.
- speaker: Respondent
  text: Throughout this period (ca. 1920-30), song was Zeisl's constant preoccupation, the a rena in which his lyric-dramatic
    talent developed. Song was his stepping-stone to public acceptance also, as acclaim quickly followed the live concerts
    and radio broadcasts of his memorable dramas-in-a-page . From 1931 (Zeisl's song year) to 1936, the young composer attained
    ever-in creasing stature in Europe. Wishing to project his gifts on larger canvases, he branched into other compositional
    areas. Original and compelling choral works include the Three African Choruses, which reflect the influence of American
    jazz and spirituals, the Kleine Messe, and the Requiem Concertante, a large-scale symphonic mass for which he won the
    Austrian State Prize in 1934. Numbered a mong his first extended instrumental works are the Passacaglia-Fantasy for Symphony
    Orchestra and the widely celebrated Little Symphony on paintings by Roswitha Bitterlich. VJith efforts such as the grotesque
    ballet Pierrot in der Flasche and the folk opera Die Fahrt ins
- speaker: Respondent
  text: 'Wunderland, he further developed his dramatic-descriptive From the outset, Zeisl had one consuming artistic ambition:
    to write an opera. In 1937-38, with a Singspiel on Biichner''s Leonce und Lena, he finally realized his dream. However,
    as was to happen so often in his career, misfortune struck. The Hitler menace caused the cancellation of both the Prague
    Radio premiere and the Viennese theater premiere. The work which might well have secured Zeisl ''s European reputation
    became instead his farewell to Vienna.'
- speaker: Respondent
  text: Forced to flee in November 1938, the Zeisl family sought refuge in Paris. Here, Zeisl enjoyed the friendships of Alma
    Mahler-Werfel and Darius Milhaud. In addition, he encountered Joseph Roth's powerful novel Job, the Story of a Simple
    Man, the work that was to alter the course of Eric's artistic life. Seeing a parallel between his plight and that of the
    principal character, he cultivated from this time an Hebraic style, conveying a deep religious feeling through modal harmonies
    and soaring, chantlike
- speaker: Respondent
  text: Soon, Paris grew unsafe. Again, the Zeisls narrowly escaped. They sailed to America, arriving in New York in September
    1939. Life in the new world changed Zeisl dramatically. He exuded a new strength and determination. A daughter, Barbara,
    was born almost immediately.
- speaker: Respondent
  text: Artistically, success with performances and publishers came quickly and with deceptive ease. Renting a house in Mamaroneck,
    Zeisl plunged into tha composition of Job, Act I. Eventually, he would compose approximately half of his total output
    in America and the majority of his most extended compositions, compositions which in turn reflect Zeisl 's blend of an
    in tense Jewish awareness with impressions of America, its size and rawness.
- speaker: Respondent
  text: By 1941, negotiations with conductors and publishers were moving less smoothly. Lured by the siren song of Hollywood,
    the Zeisls moved to California. Sadly, the opportunity that had appeared so glamorous at a distance of 3,000 miles failed
    to materialize. A grim struggle for survival ruled out all serious composition for over two years. Then, between 1944
    and 1949, several major works were created. The Requiem Ebraico, still Zeisl 's most popular and widely performed composition,
    is a memorial to his father and to "the other countless victims of the Jewish tragedy in Europe." Inspired by meeting
    Schoenberg and horrified by the atomic bomb's potential for destruction, he wrote the ballet Uranium 235 .
- speaker: Respondent
  text: In 1945, Zeisl became an American citizen. Now permanently settled in Los Angeles, he met other emigre figures. Toch,
    Tansman, Korngold, Castelnuovo-Tedesco, and Stravinsky all became good friends. Disillusioned by the
- speaker: Respondent
  text: movie industry, Zeisl entered the teaching profession, first at the Southern California School of Music, then by fall
    1949 at Los Angeles City College, where he developed single-handedly a theory and composition curriculum for the evening
    division. The relative security of the new position allowed time to compose. More frequent performances led to in creased
    recognition.
- speaker: Respondent
  text: Between 1949 and 1955, Zeisl cast a series of chamber compositions in the monumental spirit of the dramatic and choral
    works. Initiated by the Sonata Barocca for piano, this series includes the Brandeis Sonata for Piano and Violin ( Zeisl
    's most famous chamber work), a viola sonata, a cello sonata which incorporates biblical cantillation formulas, and the
    Second String Quartet. Maintaining an exhausting pace of one major work per year, he composed a piano concerto and two
    dramatic ballets on biblical subjects. The Vineyard and Jacob and Rachel , the one of overwhelming power, the other of
    pastoral charm. Brightening these years were two events, the belated world premiere of Leonce und Lena in 1952 by the
    Los Angeles City College Opera Workshop and a commemorative concert on the occasion of his fiftieth birthday.
- speaker: Respondent
  text: The final years, 1956-1959, show Eric moving in new compositional directions. A concerto grosso for cello incorporates
    new sound resources. A trio for flute, viola.
- speaker: Respondent
  text: and harp (Arrowhead Trio) inaugurates a spare and compact approach to chamber music. On January 9, 1957, Zeisl was
    honored in observance of Jewish Music Month. The stipends, commissions, and fellowships received in these years furnish
    a reliable gauge of his growing recognition. Two are especially noteworthy. As composer-in-residence at the Brandeis Camp,
    he was free to explore at some leisure the compositional path he had chosen. Successive grants from the Huntington Hartford
    Foundation in 1957 and 1958 allowed him, after a hiatus of sixteen years, to resume work on his masterpiece. Job. Shortly
    after completing the orchestration for Act II, Zeisl died. From around the world, condolences poured in from musicians
    and artists. The warmth of these messages proves that Zeisl was in deed deeply loved and so rely missed.
- speaker: Respondent
  text: Following Zeisl 's premature death, his works fell into an obscurity from which only now they are beginning to emerge.
    Recent revivals of his music throughout Southern California indicate that it retains its freshness, charm, vitality, and
    appeal. Until 1972, however, this production lay dormant, largely unknown, unrecorded commercially, unpublished, and in
    some in stances a waiting a premiere. The contributory circumstances, objective and subjective, make a sad litany. At
    the time of Hitler's takeover, Zeisl was too young to have secured a lasting reputation in
- speaker: Respondent
  text: Europe. He arrived in this country with a wave of ^migr^ composers that America was ill -prepared to absorb. He belonged
    to no particular school; he left no great disciple. His highly individual style could not be typed easily. Too dissonant
    for guardians of the romantic tradition, this same style was branded overly conservative by the champions of a tonality.
    Most damaging, he never achieved permanent affiliation with a major publishing house.
- speaker: Respondent
  text: Eric Zeisl was destined to compose. A childhood friend, the novelist and critic Hilde Spiel, has characterized the
    results as "extremely melodious and yet undeniably modern, tonal and at the same time imbued with the spirit of his age."
    ("Eric Zeisl fiinfzig Jahre," Neues Oesterreich, May 22, 1955, p. 8) . That Zeisl chose to reinterpret traditional forms
    and styles in twentieth-century terms should in no way diminish his achievement. Never a slavish imitator, he simply used
    tradition to supply a firm foundation for his own expressive purposes. What were these purposes? Through his music, he
    championed the uniqueness of the individual in an age of depersonalization. In a complex age of anxiety, he pleaded for
    simple human values. His messages of love, mercy, and hope in deed offer, in Zeisl 's own words, "strong medicines against
    the ills of fate." (Albert Goldberg, "The Transplanted Composer," Los Angeles Times, Sunday, May 28, 1950) .
- speaker: Respondent
  text: In this oral history, the reader will encounter not one but two remarkable lives, because acting as respondent is
    Frau Dr. Gertrude Susan Zeisl, the person who knew the composer longer and better than anyone. The only daughter of an
    upper-middle-class family, she studied law, receiving a doctorate in 1930. In addition to her professional activities,
    she cultivated, appreciated, and understood the fine arts and moved in an exciting circle of talented young Viennese writers
    and painters.
- speaker: Respondent
  text: Through a mutual friend, she met Eric when she was seventeen (he was nineteen) . For several years, they were good
    friends and nothing more. When romance suddenly bloomed, Eric's song year of 1931 was a direct result. In his personal
    life, however, as in his art, nothing was easy. Eric had to struggle against overwhelming odds to obtain permission to
    marry from Trude's parents. At length he succeeded, and in 1935 they were married.
- speaker: Respondent
  text: From that time, they were in separable. Indeed, it is safe to suggest that the success or failure of Eric's career
    rested with her. For him to survive in a new world in a brutally competitive field, she abandoned her own career and devoted
    full time to furthering his. Because it was she who first mastered English, she had to speak for him on all his visits
    with publishers, conductors, and artists. She drafted and typed his extensive correspondence,
- speaker: Respondent
  text: translated song texts and librettos into English, and even copied his music. She managed an active social life as
    well, hostessing parties that are still celebrated in the Los Angeles artistic community. As Barbara grew up and as Eric
    assimilated English, Trude entered a new profession, language teaching (Latin, German. French) , and built another successful
    career. Now in active retirement as a translator and private tutor, she maintains a breathtaking pace.
- speaker: Respondent
  text: The impressive number of works dedicated to Trude testifies eloquently to her influence on Eric Zeisl's life and work.
    She was the first person he had met who expected him to compose, and compose he did in response. Her encouragement and
    support aided Zeisl substantially in the creation of his legacy. Her generosity now makes this legacy accessible through
    the Eric Zeisl Archive in the UCLA Music Library (established January 1976) . Together, this oral history and the archive
    supply the raw materials for a long-overdue study of Eric Zeisl, a fascinating personality, a representative of the emigre
    artists who so enriched American cultural life, and a distinguished composer who merits inclusion in any comprehensive
    study of twentieth-century music.
- speaker: Respondent
  text: 'Malcolm S. Cole Associate Professor of Music, UCLA INTERVIEWER: Malcolm S. Cole, Associate Professor'
- speaker: Respondent
  text: of Music, UCLA. BA, Music, University of California, Berkeley; MFA, PhD, Music, Princeton University.
- speaker: Respondent
  text: 'TIME AND SETTING OF INTERVIEW: Place: The dining room of Gertrude Susan Zeisl''s home, 11110 Montana Avenue, Los
    Angeles, California.'
- speaker: Respondent
  text: 'Time of day, length of sessions , and total number of recording hours : The interviews took place in the early afternoon.
    The sessions averaged three hours in length. Approximately twelve hours were recorded.'
- speaker: Respondent
  text: 'Persons present during interview: Cole and Zeisl. CONDUCT OF THE INTERVIEW: Together with the respondent, Frau Dr.
    Gertrude Susan Zeisl, the interviewer pursued a full biographical study of the Austrian-American composer Eric Zeisl (1905-59)
    . Attention was directed to three principal objectives: to obtain an overview of Zeisl''s life, personality, and career
    from the one person who knew him longer and better than anyone, his widow; to explore the case history of an emigre artist
    who was forced to start from the beginning in a new world; to discuss at some length each of his work categories, relating
    his principal compositions both to his background and to his life circumstances at any given moment .'
- speaker: Respondent
  text: Shortly before each session, Mrs. Zeisl was given a rough outline of the proposed time span and to pics to be covered.
    In general, each interview was directed to a chronological approach based on Zeisl's work list, with topical digressions
    suggested by each composition. During the sessions, the interviewee did not consult notes, outlines, or other prepared
    materials .
- speaker: Respondent
  text: For verification, the interviewer had access to Zeisl's complete legacy of published materials, autographs,
- speaker: Respondent
  text: copyists' scores, sketchbooks, working drafts, scrapbooks, correspondence, tapes, discs, and photographs .
- speaker: Respondent
  text: A verbatim transcript of the recordings was edited by Malcolm S. Cole between April and December 1976. In substance,
    the manuscript agrees closely with the tapes. There are no significant cuts. There is no rearrangement for chronology.
    For clarity, considerable shifting of clauses was done, in addition to minor editing for regular punctuation and small
    deletions,
- speaker: Respondent
  text: Mrs. Zeisl reviewed the manuscript, clarifying words and phrases, completing some unfinished thoughts, and making
    occasional word substitutions.
- speaker: Respondent
  text: Lawrence Weschler, Assistant Editor, Oral History Program, compiled the index. Malcolm S. Cole wrote the introduction
    and, with the assistance of Program staff, prepared the front matter.
- speaker: Respondent
  text: 'SUPPORTING DOCUMENTS: The original tape recordings and the edited transcript of the interview are in the University
    Archives and are available under the regulations governing the use of noncurrent records of the Universtiy.'
- speaker: Respondent
  text: 'Records relating to the interview are in the office of the UCLA Oral History Program. Tape number: I, side one august
    26, 1975'
- speaker: Interviewer
  text: In an attempt to understand Eric Zeisl, the man and the composer, perhaps it would be appropriate to begin with his
    family background.
- speaker: Respondent
  text: 'Yes, I think that would be very important, because there are several features in his music that reflect that family
    background. Both of his grandparents came from Czechoslovakia, and I think you probably noticed, because you are so familiar
    with his music, that there is a definite Slavic flavor in many of his pieces. COLE: Yes.'
- speaker: Respondent
  text: In the family of the father, the grandfather [Emanuel Zeisl] came to Vienna when he was thirteen years old as an apprentice
    Schlosser , which is a blacksmith who makes locks. And this was of course at that time a very expanding city - Vienna
    always had many beautiful palaces and gardens, and all these gates needed locks - and I think it was a lucrative profession.
    He made good, apparently, because - I don't know how his life went, but at the time I heard about it, he had a big house,
    which already seemed to be reserved for people who were doing well (because usually you lived in apartments and didn't
    have houses).
- speaker: Respondent
  text: He had six children. And each of the children - there were three girls and three boys; the girls got handsome
- speaker: Respondent
  text: dowries, and the boys each got . . . like a shop. It was either a restaurant or a liquor store. It was told in the
    family that he said - see, my father-in-law was the oldest - "Sigmund, I have to give something that goes by itself, because
    he's not smart enough to make a go of it otherwise." [laughter] And so the coffeehouse that Eric's family owned was set
    up by the [grand] father.
- speaker: Respondent
  text: Now, the grandmother [Rosalia Reichmann] later lived one floor below the family, in the same house. It must have been
    below, because they lived at the top. According to Eric, she couldn't read and write. She said to Eric when he was a child,
    "Eric, read me this in the paper, because I don't know where my glasses are." But Eric, as a little boy, knew that she
    said that because she couldn't read and write. My mother-in-law told me that she was the most fantastic cook that ever
    was, and that on a little alcohol burner, just one burner - in the war they had no coal or anything, and stoves were out
    of commission so to say - she could make a three-course dinner that would make you faint with joy.
- speaker: Respondent
  text: So both these grandparents on the father's side were kind of very folksy and sturdy. And you know, there is a certain
    strength in Eric's music, and I think it comes from that heritage. It was not at all an in tellectual heritage, but it
    was one of joy in life and of strength. And I think this tradition of the restaurant business
- speaker: Respondent
  text: came from this, partly from the grandmother. But though she seems to be such an illiterate type, it is through her
    that Eric is related to aver^' famous poet, Richard Beer-Hofmann, because she was born Beer-Hofmann, and I think that
    was like a cousin of Eric's. He was a very famous poet whose plays were played in the Burgtheater. And he's very well
    known.
- speaker: Respondent
  text: Now, the family of the mother was different. They also came from Czechoslovakia. The grandfather [Michael Feitler]
    was something like a Jewish scholar, and he was probably like [tape recorder turned off] one of those Hasidic types, you
    know. Eric told me that his best, or maybe only, friend in the village was the village priest, because he knew Hebrew
    and he would often come to this grandfather's house and converse and discuss with the grandfather. He seems to have been
    a very nice and joyous kind of person, but also studious. He introduced Eric at a very early age into the Bible and brought
    him to the synagogue and developed in him this religious feeling that his music expresses so often.
- speaker: Respondent
  text: 'Now, the grandmother [Rosa Bloch] was a very different type. She was a very negative person, it seems. And Eric said
    at one time that he hated three things: Hitler, the sun, and his grandmother, in this order. [laughter] (He could not
    stand sun, and as a matter of fact it was confirmed by the doctor that he had something in his skin'
- speaker: Respondent
  text: that let the ultraviolet rays through, you know - didn't defend itself. It was really very bad for him. So this was
    almost killing for him to be in this sunny California, which is for others so beautiful and so wonderful. He was constantly
    wishing for fog and rain and all these kinds of things that were denied here. Ever since his death, the temperature has
    very much changed. But when we lived here in the years that we were here, it was hotter than Africa
- speaker: Respondent
  text: (so we were told by people who came from Africa) . And he suffered very much from this. He has diaries where--every
    so often--every second day he writes down the temperature as the only event of the day--98, or something like this. And
    it was just terrible for him.
- speaker: Respondent
  text: 'Now, this grandmother--you know, the grandfather came to Vienna, got himself out of his poverty, and had a shop on
    the Mariahilf erstrasse . With sponges. It seems that his own brother betrayed him and somehow took the shop away from
    him by bad dealings, by underhanded dealings. And the grandmother was very, very bitter about this. They went to live
    with Eric, and Eric''s father supported them, but that made her even more bitter. She tried to be useful, and one of the
    things she did was darn the children''s socks. So she wouldn''t allow them to kneel: when they were playing at the table,
    she''d go, "Knie nicht!"'
- speaker: Respondent
  text: '["Don''t kneel!"] They would imitate her, you know. She seems to have been the bane of their childhood. And Eric
    didn''t'
- speaker: Respondent
  text: like her at all. She represented at a very early stage the negative force or in fluence of the stars that always appeared
    in Eric's life. She was the one that was always against him doing anything with music. For in stance, as a child he would
    sit at the piano and fantasize; and she would say, "Er spielt schon wieder statt zu uben"--"He plays instead of practicing"--instead
    of listening and being maybe delighted that a child could do such a thing, which was probably very unusual.
- speaker: Respondent
  text: Now, the father [Sigmund] was a very simple person, but he was not dumb. He had what you call common sense, a lot
    of common sense, and the strange thing was that Eric was his favorite son of all the four. He understood him better than
    the mother [Kamilla], who was very smart and clever but did not understand him at all. There was a very great friction,
    almost like a war between them. And I think Eric was probably naughtier than he would have been, just to get her attention.
    When I came into the family, when I was introduced and had dinners there, I was told that Eric's place was always next
    to the mother, and that in spite of the fact that this would result in countless Ohrfeigen--head cuffs--he would stick
    to this place. He was probably doing his best to get her attention. And she had this big family (she was the real mother
    hen) . And I think--I cannot say it dif ferently-- she resented Eric because he tried to be different than
- speaker: Respondent
  text: the other children, or maybe asked for more attention and by his talent demanded more attention. And she wasn't going
    to give in to this nonsense. She found that everyone deserved the same portion of her attention, and who was he to demand
    anything else than the others? I think the only way he could ever get her attention was when he was sick, and then she
    proved to be a marvelous mother, according to his tales. I liked her very much; she was a very clever person. When you
    speak .... We have in German a word that is called Mutterwitz, and that you could really say about Eric - I mean, that
    he got it from [her] . She was very quick and she hit the point.
- speaker: Respondent
  text: She was not an educated person, as the father wasn't either. But the father loved music. By the way, as I told you,
    the grandfather on the father's side had six children. The oldest girl, I was told, had a wonderful soprano voice and
    was studying singing, but she would never be allowed to go on the stage. That was just not allowed in these days. It was
    considered very low-class, as you would say. My father-in-law belonged to a music society, the merchantmen's singing group
    [Wiener Kaufmannischer Gesangverein] . And the youngest boy [Erich, Eric's uncle] became a famous tenor in the Nuremberg
    Opera. He was there for all his life until the Nazis came--no, he had retired before the Nazis came. On the mother's side,
    I was told, the grandfather wanted very badly to become a cantor, but that
- speaker: Respondent
  text: needed even more studying and money, which wasn't there. So he didn't become a cantor. But the love of music was there.
    Eric's mother had another brother who had absolute ear [perfect pitch] and could play by ear and sing from the piano,
    but he was as negative as the grandmother. And nothing became of him. There was the talent on both sides to give him this
    musical talent.
- speaker: Respondent
  text: I think that Eric's position as the third one was a very difficult one, because there were the two oldest [Egon, Walter]
    who were naturally doing everything already before him, and then there came the youngest [Wilhelm] who needed the mother's
