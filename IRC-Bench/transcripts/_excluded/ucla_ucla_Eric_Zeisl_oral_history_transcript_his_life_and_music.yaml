  text: It's true also that you have scrapbooks of reviews arranged in a roughly chronological manner.
- speaker: Respondent
  text: Oh, yes, I have most of the reviews, both in Europe and here, where you can see that he had very many performances,
    and it just shows how much is necessary to establish your name and to keep it a live.
- speaker: Interviewer
  text: Yes. There's a great deal of critical acceptance, and very often a Zeisl work is singled out as the memorable work
    on a program.
- speaker: Respondent
  text: Ja . I think the more knowledgeable critics have recognized him as a great talent, as really did practically
- speaker: Respondent
  text: everybody who came in contact with him. There was never too much question about this. You know, everybody gets rejected
    once in a while, by certain people, but on the whole I don't think there was a question. But there is a difference [between
    knowing] that somebody has great talent and wanting to go to all this difficulty that it meant to perform one of his works.
    And his works are difficult; they are difficult to perform, whether they are solo works that pose tremendous difficulty
    for the performer [or or chestral works]. For the conductor, the fact that they were not printed posed a tremendous difficulty
    because conductors don't like to work that hard and read written scores. There were very few that would do that.
- speaker: Respondent
  text: 'You also have extensive holdings of correspondence and papers from which scholars can reconstruct a marvelous network
    of associations in Eric''s life and times. ZEISL: Oh, yes, I mean, you can certainly see that. And for myself it was yielding
    in formation that I had forgotten. I had forgotten about the Feuchtwanger and the Crockett Johnson project, and then I
    saw the letters and it brought the whole thing back to mind. You know, one easily forgets, and so many things happen during
    a year. If I had the time to read more through these letters, I am sure I will have forgotten quite a few important things.
    COLE: And do you also have a number of photographs that'
- speaker: Respondent
  text: 'give a picture of Eric in his surroundings over the years? ZEISL: Oh, yes, I have very darling photographs, for in
    stance, that show him in St. Wolfgang. The Salzkammergut is famous for the fact that it rains all the time. Once in a
    while there is a sunny day and everybody goes around gloriously happy. And I have these pictures [of] Eric with a big,
    black umbrella against the sun, making an unhappy face because the sun was his enemy. And then he was sentenced to live
    in Hollywood, where the sun shines all the time. It was really an irony of fate. COLE: Mrs. Zeisl, thank you very much
    for sharing your knowledge and your in sights about this remarkable man and artist.'
