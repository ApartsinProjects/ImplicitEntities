- speaker: Respondent
  text: NOW, during this thing of Ulysses, we met Ernst Toch for the first time, and it was at Ludwig ' s house, who gave
- speaker: Respondent
  text: 'a New Year''s Eve party. And Eric and Ernst Toch clicked immediately. Tape number: vi, side one september 18, 19
    7 5'
- speaker: Respondent
  text: As the tape ran out last time, we were talking about Eric's adjustment to Los Angeles. We had just gotten to the circle
    of friends you cultivated here and Eric's assimilation in general into the emigre community. At a New Year's Eve party
    he had met Ernst Toch for the first time .
- speaker: Respondent
  text: Yes. It was at the home of Emil Ludwig, and Emil Ludwig was a fabulous host. He had a very beautiful home in the Pacific
    Palisades, and he said himself that he felt like an ancient Roman, like maybe Vergilius, and over the hill was Horace--and
    he pointed to the home of Thomas Mann, who was just opposite, and there was a kind of valley in between. And his hospitality
    was sumptuous, like at some French king ' s--wonderf ul cooking, and the most rare and exquisite dishes. And he also provided
    all this entertainment and had musicians there who played quartets. Now, on this New Year's Eve, he had invited Eric,
    and there was Ernst Toch, and the two became friends almost immediately. And they sat down at the piano, and without talking
    about it they began to play four hands, in a kind of funny way, and went through the waltzes of Vienna and so on and had
    this kind of New Year's Eve mood. And it was very funny. But Ludwig, unfortunately, had another program in mind. He had
    already given the sign to a quartet to play some
- speaker: Respondent
  text: very sad Schubert quartets. So that broke up that mood, which I felt was sad. I love Schubert, but at that point I
    would have much rather listened to what Eric and Toch would have improvised.
- speaker: Respondent
  text: A great number of in teresting people lived in Los Angeles at that time. For in stance, we already knew Hanns Eisler,
    and the way we knew him was that .... Of course, when we were in New York, Eric tried to contact the people his friends
    told him were there. And he was always very fond of dramatic music and also always on the lookout for a text. And he had
    contacted Piscator, Erwin Piscator, who was at the New School of Social Research and had there a theater department. And
    he thought that maybe he could compose for him. We had written him a letter. I say "we" because I was always the letter
    writer because Eric didn't know a word of English then. So he told me what to say and I wrote it. And Hanns Eisler called
    us. Piscator apparently wanted him to--maybe Eric sent some scores, I don't remember anymore. Well, anyway, he seemed
    already to know, and he called and said that he has seen immediately that there was a real composer there and he wanted
    to meet us.
- speaker: Respondent
  text: And we met, and again, Hanns Eisler and Eric became friends immediately. He was very much taken with Eric's music,
    and very funny, and he said, "Oh-oh! Competition!" And they played together and played each other's things, and he liked
    Eric's music very much. And [he] gave Eric
- speaker: Respondent
  text: at the time, because he was in New York, a lot of recommendations for Hollywood, which, however, we didn't use. \<le
    tried one in the time when the contract with MGM didn't come out, as I told you. It was a Mr, Vorhaus at Republic, but
    it was completely negative, and then we were too intimidated to try any of the other things. So Hanns Eisler came then
    to Hollywood, and he was a friend whom we saw now and then. [He] came to our house, and we came to his house on the beach,
