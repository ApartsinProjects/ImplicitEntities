    "Nachts, " the opening song, was dedicated to a mysterious Frau Dr. T.J. Who could this have been? ZEISL: [laughing] It
    was me, because my name was Jellinek when I had my parents'' name. And he loved the night song especially. And of course
    [in] all this time which I describe, it is hard to describe what went on in his soul and all the anxieties that he had
    to endure. Part of it was his poverty, and [part] that we couldn''t marry, and that he couldn''t see me when he wanted
    to, and that we had to meet, so to say, always on the sly. And he was a very open person. And all this, I think, must
    have weighed very heavily and produced great turmoil in his soul. And so the night song was one way of so ftening all
    this, of bringing peace to himself. So in this time, there [are] a great many night songs. As a matter of fact, four of
    these songs deal with the night.'
- speaker: Respondent
  text: Right. And there are many others unpublished that also deal with the night. Another song of in terest in this collection
    is "Bin Stiindlein wohl vor Tag, " one of his most excellent settings, I believe, and a poem that had been set earlier
    by Hugo Wolf. This raises an in teresting question, because this is not the only text Eric set that had been set by earlier
    composers. Did he have
- speaker: Respondent
  text: 'a reason for picking such poems, or was he a ware? ZEISL: Well, one of the reasons, I would say, is a very practical
    one. When Eric went to concerts--and of course he went very often to concerts - he would keep the programs. And along
    with his very sparse library, they were there. And when he was in need of composing, he would leaf through the texts,
    and so he would consider this just as a text and would probably maybe not even notice whether it was composed by Hugo
    Wolf or by somebody else. And sometimes right there in the concert, when it was a minor composer, he so metimes felt,
    "I could do this much better." Or, "I want to do this, but in another way."'
- speaker: Respondent
  text: There's a song that is almost frightening in its impact. It's called "Schrei." It has to do with a locomotive that's
    driving and wailing in the night. This is the earliest example I know of machine music in Eric. Machine music was quite
    popular at one time in this century in general. There are three or four other pieces by Eric that also involve the machine,
    and all but one are frightening. How did he view machinery and twentieth-century technology?
- speaker: Respondent
  text: I don't know about the train. I have told you that [the] train was one of the things that had to do with going away,
    and how this was his trauma, and a very strong trauma. It was really a kind of sickness with him. So in this case, the
    locomotive that puts terror into the
- speaker: Respondent
  text: 'souls of men was very mucli the reaction that he had when somebody said, "Going away." Because even when we were
    married and we would go to places .... One thing I must say: it put terror in him, but he wanted to go away. I mean, it
    wasn''t that he didn''t want to go away. It was just so terribly hard for him. And even after we had been married a long
    time, when we would go to Lake Arrowhead, he would be just awfully unhappy the first night. And it lasted about twenty-four
    hours, and then he was adapted to it. But it was not being where he usually was. This was a very, very great pain and
    trauma.'
- speaker: Interviewer
  text: He had a very strong sense of place, it seems, and a very localized sense, too.
- speaker: Respondent
  text: The funny thing is that when we actually emigrated and went so far away to America, he was happy all the time. On
    the ship he couldn't have been happier. And that was really kind of strange.
- speaker: Respondent
  text: 'In addition to the serious and (in the case of "Schrei") frightening songs in this cycle, there are two that are
    absolutely hilarious. One rarely uses the term in connection with art songs, but in the case of these two it fits. The
    "Stilleben" you mentioned last time was more autobiographical than I had dreamed, and "Der Weise" is a marvelous setting
    of a poem by Wilhelm Busch. Did other song composers use the texts of Busch? ZEISL: If they did, I really don''t know
    of it. But Eric'
- speaker: Respondent
  text: had a great similarity with him in his nature and in his way of composing. As Busch was able to draw a very simple
    line to express humor and hit the mark marvelously, so that in just a few strokes of the pen you could recognize the type,
    so he had that same in music. So the two were a like in this.
- speaker: Respondent
  text: And just a brief remark about a couple of the unpublished song sets from this same year. There's a set of three songs
    by Nietzsche, two of which are a mong Eric's very best. These all plumb the more pathetique side of his personality. Was
    there anything about Nietzsche that he responded to in particular?
- speaker: Respondent
  text: No, I think he had a very poetic nature, and it vibrated at the same level as certain poetry. And this apparently
    was a poem that brought his soul into vibration. And he had, as I have often said, very good taste in poetry. And cheap
    poetry would not do it.
- speaker: Respondent
  text: 'One of the Nietzsche songs had been used in Mahler''s Third Symphony, which came as a surprise to me, too. Eric sets
    it in a much different way, and, I think, a very effective way. He makes a set of three songs by Ringelnatz, too. Who
    was Ringelnatz? I don''t know much about him. ZEISL: Well, Ringelnatz was a typically Berlin figure, whose fame, I think,
    grew up in the cabaret. And he had been a jack-of-all-trades, but mostly a sailor. And he had this kind of scurrilous
    pathetic humor that very much'
- speaker: Respondent
  text: 'appealed to Eric. And I think the "Briefmark" really very charmingly expresses the sense of the poem. COLE: Yes.
    Well, this was an amazing song outpouring from the year 1931. Never again in his career was he to write as many songs
    in a single year, but the flood was to continue for many more years.'
- speaker: Respondent
  text: Ja . You know, his great love and desire was for opera. He meant to write dramatic music, and he was desperate for
    a text. There is a cute anecdote that he met a common friend, who is still also quite a well-known writer in Vienna, Friedrich
    Torberg. And he asked him if he couldn't write a libretto for an opera. And he was willing. So he went to the bookstores
    and he bought several volumes of Rabelais. He knew Eric mostly from his humorous side, and he thought that this would
    be the right thing. And he had these three secondhand volumes in his hand, and he met another friend, who said, "What
    are you doing with this?" And he said, "From this, I want to write a libretto for a composer friend of mine." And the
    friend said, "You will never make as much from it as these three volumes cost. I advise to give them back!" And so he
    did that and didn't write the libretto. And he was right. Because at that time, you know, there were two opera houses,
    true, but it was almost next to impossible to get in, and Germany already was closed at that time. And so the opportunities
    for operas were in deed nought,
- speaker: Interviewer
  text: And somehow a text from Rabelais might have been a little difficult to sell in this opera house.
- speaker: Respondent
  text: We can begin the year 19 32 with another kind of composition altogether, the Kleine Messe, a fascinating work which
    today sadly exists only in skeletal form. This is an early example of Eric's sacred music. Something that's fascinating
    to me, in view of what was to happen in his American production, is that here he's setting the traditional Christian mass
    text. Was it the drama of the text that appealed?
- speaker: Respondent
  text: 'I think it was the drama. The text of the Messe in its simplicity contains a marvelous dramatic story. And it has
    really all the ingredients of a first-class libretto. And so in his desperation of having somebody write him a real operatic
    text, he found the Mass, and it helped him express this dramatic flair of his and this urge to do dramatic music. And
    I love the Mass, and it is really a great shame that it is lost and cannot be performed, because I think it has very,
    very beautiful spots in it. Of course, it''s also in Latin, and Eric didn''t know Latin. I think he had found friends,
    and perhaps I helped, too--I don''t remember - to tell him about what it meant. Tape number: iii, side two september 8,
    1975'
- speaker: Interviewer
  text: When the tape ran out, we were just talking about the Kleine Messe, and you had mentioned that there were some marvelous
    sections in this.
- speaker: Respondent
  text: 'Yes. As I said, Eric didn''t know Greek or Latin, and it was translated. I do not know whether "Kyrie Eleison" was
    ever translated to him (it means, "Lord, have mercy"), because the first [movement] begins with that and it is like a
    marching song that he composed there. And it doesn''t fit with the text at all. Or maybe it does, because Eric needed
    and had a lot of courage. And maybe he was challenging God, so to say, in this "have mercy." And it was like his answer:
    "If I will have the courage, you will have the mercy." It could be that, but I rather think it was that this was in his
    soul, and maybe it was again one of those curious prophetic things, because the war was before the door and it was a martial
    thing he composed there. But that curious Kyrie was always interesting to me.'
- speaker: Respondent
  text: As we pointed out, this is a work that exists in skeletal form only because, as happened with a couple of pieces we've
    seen already, at least a part of it disappeared in the United States. Maybe you could talk about what happened to the
    score. Now all we have is a
- speaker: Respondent
  text: 'torso; the solo parts seem to be lost. ZEISL: What happened was that Eric had a friend here by the name of Norman
    Wright, and he was organist of the First Methodist Church. And he turned out to be one of the most devoted friends that
    Eric had. He loved his music, and Eric was like a brother to him. He really understood him and understood his music. And
    the way we met him was the first performance of the Interfaith Forum, for which the Requiem Ebraico was composed. It was
    composed really as the Ninety-second Psalm, as you know. And it was a concert that had all the three faiths represented
    in music. And he was supposed to do the Ninety-second Psalm for the Hebrew section, and because it was the spring of 1945,
    and the war ended and he heard about the fate of his father and other friends, the Ninety-second Psalm, which is in its
    text an expression of hope and faith, became a very sad composition. And so he called it a requiem. And this was premiered
    at Norman''s church in a very small form, with fifteen singers, and Eric''s brother Willi as the cantor part. And Norman
    immediately, so to say, caught fire with it and became a great friend of Eric.'
- speaker: Respondent
  text: And he planned to do the Mass [Kleine Messe] with his church choir, which was a very great choir of sixty to eighty
    [voices] . He did a lot of Eric's works. He did the Requiem [Ebraico] later with his great chorus
- speaker: Respondent
  text: and orchestra and everything, and did it almost every year then with his church group. And he thought that the way
    the Mass was written would not be very legible for his chorus, and so he proposed that Eric should give him the score
    and he would have it copied. Eric gave him like a printed score, like a copied score. And then at one time for some reason
    he wanted another one. And so Eric gave him the only handwritten score that he had. And then at one time, even after Eric's
    death, I discovered that both were missing, and I remembered. And I asked him about it. And so he said that one of his
    students was supposed to copy that, and that there was a fire in his kitchen, and that the thing had burned. And I must
    say that it seemed very strange to me, because he had never told me about it. And so it is lost.
- speaker: Interviewer
  text: This is a tragedy. We simply can't reconstruct the solo parts from what we have.
- speaker: Respondent
  text: One notable unpublished song of 1932 is "The Dead Workman." This is certainly one of Eric's greatest songs. Were there
    any political overtones, or was this again simply a text that appealed to him?
- speaker: Respondent
  text: Eric was a completely unpolitical person. One funny remark that he made to illustrate how unpolitical he was was that
    he said he only knew that a war was on because Pearl Harbor was announced in the Philharmonic. The Philharmonic was interrupted
    and they announced that.
- speaker: Respondent
  text: And he gave that as an example. But of course he was certainly a deeply social-minded person. And so there was again
    something in the text that appealed to him, rather [than] that he wanted to write social music. I think it is autobiographical,
    because [although] he was not working in a workshop, with machinery and so, his life, even after we married and everything,
    was in a way very dreary [because] he had to do this hack work. And it was very, very difficult and took so much energy
    out of him because he had to go to these children and take the streetcar, and they lived very far a part, and he was going
    all over town to reach them and then be there and listen to them play, v/hich must have been an or deal. So it was very
    much like a toil, the kind of thing that he described in the song.
- speaker: Respondent
  text: 'I see. Nineteen thirty-three was the year in which the Kinderlieder cycle was published. Several works quickly followed
    to print. Although it''s still some time before World War II will break out in Europe, is the German hinterland already
    being denied? ZEISL: Oh, yes. Hitler was already on the rise [in] 1930-31. He was considered the coming man. And with
    ''32 he became a certainty. And by the end of ''32, he had taken over. And from then on, publishers in Germany would not
    take anything. I must look for it, because I have kept it. (The way Eric kept things was that there''s'
- speaker: Respondent
  text: something written on the back, something I don't know what. And I think I have this letter of Schott's Sohne, you
    know, the representative in Austria, who was present at some of the concerts where the songs were played, and was very
    interested, and sent them to Schott's, to Germany, And back came a letter that they thought these were in deed very remarkable
    things, and they were very interested, but that the political situation was such - it was ' 32--that they could not consider
    print, but please keep an eye on him. They didn't know yet how things would develop, you know. They developed in the wrong
    direction. Now, Universal Edition and a few struggling publishers like Capriccio - Doblinger was also an old established
    house-- were still, so to say, struggling on, but they were of course very reluctant to do things that could not be played
    in Germany, because that was the big hinterland. Especially since the Germans are so musical, and it is there not only
    the rich concert life that is in every city, but it is also the public that bought chamber music, that bought songs and
    sang them at home. There was a Musikpf lege ["cultivation of music"] in the home that was very, very marked there and
    very developed all over Germany. And that was not accessible anymore, not accessible .
- speaker: Interviewer
  text: The year 1933 also witnesses a brand-new kind of composition, perhaps the first preserved instrumental
- speaker: Interviewer
  text: piece of Eric's that is nonprogrammatic as far as I know.* This is the Passacaglia-Fantasy . Can you talk about this
    piece a bit?
- speaker: Respondent
  text: 'Yes. It was Eric''s constant preoccupation to master these forms which he had, so to say, refused when he was studying
    with Stohr and the other teachers. They wanted him to do this, and he was too restless, perhaps, or too unsure of himself
    to tackle them. But it stayed there as a challenge. And now, because he was happy in some ways, reassured because of our
    relationship, he began to devote himself to his development, and he tackled these forms. And so the Passacaglia was an
    example of that. And it has an unusually long theme. COLE: This is his contribution [to the old form], isn''t it?'
- speaker: Respondent
  text: 'Ja, and whenever we went somewhere, in our circle of friends, I would play the theme and Eric would play all the
    orchestral voices for piano. It was a four-hands sort of thing. I had the easy part always. COLE: Had you had some musical
    training? ZEISL: Ja, the usual musical training that every welleducated child in a Vienna family that was halfway wellto-do
    had. But also I cannot type very well. I have a'
- speaker: Respondent
  text: '*A subsequent search turned up a much earlier fantasy for violin and piano, a product of his early teens. [M.C.]'
- speaker: Respondent
  text: certain thing that somehow my brain and my hands do not cooperate. And that presents a dif ficulty--so I never reached
    any prowess on the piano. But I think I am a very musical person, and I feel music, and I understand music, and sometimes
    I was quicker to understand something when we went to concerts and there was a new piece played. I was quicker to understand
    it and to feel it than Eric, who had to really study the thing and digest it and make it his own before he loved it.
- speaker: Interviewer
  text: 'I see. Did this piece find success in performance? ZEISL: The Passacaglia was played. It was accepted by Kabasta
    and was played over the radio with the Symphoniker, But again, to gain acceptance in Germany was not possible at that
    time anymore, and Eric had a curious thing: he could not change anything. And under no circumstances-- when something
    was done, that was it. And it was as good as he could do it. Then he would do something else, where he would maybe get
    rid of some mistakes or errors that would appear in the other piece, but he would not change. COLE: He wouldn''t revise,
    in other words.'
- speaker: Respondent
  text: No. He refused to do that. I know that [Eugene] Ormandy came to Vienna at that time, and we had some access to him.
    I think that Ormandy ' s wife was Viennese, and she had been a friend of his brothers. And so we met; and through her,
    Ormandy saw the score. He liked it, but he didn't like certain things about it, and he
- speaker: Respondent
  text: suggested to Eric to change that, but Eric wouldn't change it. That was, of course, bad, because he should have.
- speaker: Respondent
  text: And there's an in cident which I should tell, though it is not good; it's negative, like so many. He got an in terview
    with Bruno Walter, who was at that time a great conductor there. And he played him the Passacaglia. And Bruno Walter was
    in a bad mood. I don't think he wanted to give the interview in the first place, and so he was just awful to Eric, and
    Eric came from this interview just completely crushed. Oh, he was so downcast because Walter said he should immediately
    give up composing, and he was no composer, and how could he dare to play something to him? And Eric called Alvin, who
    was a great protector of his and a friend of Bruno Walter (they were fellow colleagues at the opera) , and Alvin called
    Walter immediately, and then he called Eric back and said, "I can't do anything. He really means it." And I don't know
    - there v;as something, I think, in Eric's behavior probably. Or maybe it was that when Eric was excited he would only
    play fortissimo, though there are very beautiful, poetic, soft parts in this Passacaglia. Well, anyway, for Eric it was
    one very niederschmetternd ["crushing"] experience. And much, much later, in America, we had already met Walter then,
    because he was a neighbor of Alma and so on and he had heard about Eric from Alma. And Fritz Zweig, who was also a friend
    of the Walters,
- speaker: Respondent
  text: was very, very fond of Eric and a great admirer of his music, and he told him of it. But he was too vain a person,
    and it was really like this. He was too vain a person to admit that he could ever have made an error. And so he remained
    this way. But you can't blame him
- speaker: Respondent
  text: No. In 1933 the Scherzo and Fugue for string orchestra was published. We've already talked about this work at some
    length. It is significant to point out here that it was Zeisl's first published instrumental work, and by no less a firm
    than Universal. Can you talk a little more about Eric's association with Kurt Herbert Adler? The piece is dedicated to
    him.
- speaker: Respondent
  text: Ja. We were invited to a party at a friend of Eric's who was a writer and later did the first libretto of Leonce und
    Lena. His name was Hugo von Konigsgarten. And he was a very elegant, refined person, and at that party we met two couples
    who later became very great friends and inner-circle people. One was Kurt Adler and his wife, and the other one was a
    lawyer by the name of Dr. Hanns Popper, who was the lawyer of the Swiss legation and led a great house, as you would say.
    There were always parties with very good people there, the cream of Vienna, so to say. And it turned out that the wife
    that Dr. Popper had married in the meantime was an old, old friend of Eric's brothers and he knew
- speaker: Respondent
  text: her. And so she was delighted to see him, and a great friendship developed v;ith all these people. [tape recorder
    turned off]
- speaker: Respondent
  text: Now, Kurt Adler had just come back from Germany. He had been a conductor in several of the smaller opera houses. I
    think his last one was Kaiserslautern . And there he had married a very vivacious, darling person whose name was also
    Trude . And she took to Eric like that, you know. (She liked men anyhow.) And they became great friends. Kurt at this
    point was very, very poor, [tape recorder turned off] Kurt had lost his position in Germany--he had nothing here yet--and
    he also had to support not only a wife but also his mother. But they had been extremely wealthy people, and he had this
    background and this youth behind him. And he was so proud that only when we became very, very good friends did we know
    about this at all. You would never know, and he would never talk about it, but it was a more critical situation that Eric's
    because Eric had been, so to say, brought up with proverty - not in his earliest years, but later on, from the war years
    on. And so he got used to it and knew how to fight the thing, but Kurt in the beginning didn't. But he then got certain
    jobs. He was conducting with the Volkstheater and so on, and finally landed a job as chorus director in the Volksoper
    . And he was very, very fond of Eric, as I have said, and
- speaker: Respondent
  text: whenever he had an opportunity, he did something of Eric's music. And even in this country, in the beginning - later,
    when he became director of the opera company, his commitments and his position didn't allow him anymore, I think, to go
    out for something like this, because everything costs so much money, and he was responsible for every cent and penny,
    so he couldn't dare go into experiments. And new music always is.
- speaker: Respondent
  text: Last time we pointed out that the Scherzo and Fugue were actually two movements from the First String Quartet, and
    we talked about how it came about that Eric scored them for small orchestra and they were published. [tape recorder turned
    off] Another movement from this first quartet was the Variations on a Slavonic Theme, and I thought we might talk about
    this for a couple of reasons. Did Eric ever tell you where this theme had come from, or is it a folk theme?
- speaker: Respondent
  text: 'Ja, that was a chorus that he had done. And it was a very beautiful Slavonic folksong. And he had at one time done
    several choruses like this. He was always writing for chorus; that was one of his favorite expressions COLE: And the other
    interesting thing to me about this piece is that looking at the manuscript, one sees a very lovely copy, and I understand
    you copied it. ZEISL: Ja, but it is very friendly of you to say that it was lovely, because it was awful, I think, and
    I have no'
- speaker: Respondent
  text: 'talent for it, but there was no other way. In the beginning, Eric [was] so used to copyists, because in Vienna nobody
    does it differently. You compose that, and you do it in your handwriting and don''t even try to be careful about your
    handwriting, and then you give it to a copyist. And at that time there were a number of very fine musicians who made a
    living by being copyists. And so this was the way it was done, and Eric thought copying was a terrible waste of time,
    which it is, in a way. COLE: Yes. Most composers would a gree. ZEISL: But here in this country it was impossible to afford
    a copyist, so he began copying. But in the beginning he wouldn''t hear of it, and yet one needed copies, so in desperation
    I began to do it. Now, I had begun this in Paris when he was working for this Spaniard, which I mentioned. And we had
    a kind of a factory going. Eric was composing these little things for him, and then Willi and I copied it. And the man
    was a millionaire, and he paid very handsomely, and we lived beautifully in Paris, and instead of starving to death, which
    was really what we could have done-because we came over, and we couldn''t take a penny of money with us out of Germany-Paris
    became a kind of a vacation to us because f this. And at the end of the year we were able to rent villa in Le Vesinet,
    where Eric then began to compose'
- speaker: Respondent
  text: That's amazing. In the period 1933 to 1934, Eric was occupied with the composition of a major work, a work that turned
    out to be of considerable importance to him, the Requiem Concertante . This work won the Austrian State Prize in 1934.
    Can you talk a little bit about what that entailed?
- speaker: Respondent
  text: Yes. I do not quite remember now whether the immediate start of it was the death of my father, because my father died
    rather suddenly. We suddenly discovered that he had cancer, and he was operated, and it was found that it was too late,
    and very soon afterwards he died. And it was a terrible blow for me. I was terribly, terribly sad. I loved my father dearly.
    And I think this great sadness that involved me was felt by Eric, and I think that started him. And then the thing was
    given momentum by the political events of the day, because it was that great clash between Dollfuss and the Socialists,
    which caused a lot of death and kept the thing going - from an outward stimulus. And I think it was foremost his need
    of dramatic expression that drove him to these texts, and perhaps a kind of prophetic feeling that a requiem was the thing
    that fitted - was the thing of the future. And I know when we came to America and America was in the Depression but otherwise
    in the full bliss of peace, nothing was farther [from] the American soul as any thinking of war, though it was already
    threatening in
- speaker: Respondent
  text: 'Europe. Well, he showed the Requiem to Erno Rapee, who became such a great promoter of Eric''s music and did almost
    everything, but he thought it was ridiculous to even write a requiem. And Eric was very much taken a back with that attitude,
    because he felt that this was really the thing that was to come. And he felt that. COLE: What were the circumstances of
    winning this Austrian State Prize? Was it a competition?'
- speaker: Respondent
  text: I think Stohr, who remained in contact with Eric, told him that this was like a prize, an a ward, that was open, and
    he should apply. And he did, and there was a commission at the academy that had to decide about this, and then Eric was
    notified of it. And he was quite happy, though the a mount of money was very small, and he was kind of disappointed because
    it didn't a mount to very much, and he needed money. And Stohr said, "You will find it higher if you think that the elevator
    in the academy is on the blink since two years, and we don't have the 200 schillings ($40) to have it repaired."
- speaker: Interviewer
  text: 'Did the a ward do anything to boost his career? ZEISL: No, not really. It was an honor, naturally, and it boosted
    his confidence and in this way made him happy, but it didn''t boost his career. But something else happened around this
    time and that is that he became a member of AKM [Autoren, Komponisten, Musikverleger J . And that was very important to
    him. He was not yet like a member.'
- speaker: Respondent
  text: but they called it a sustaining member or something, [and] then after three years of that, I think, or five years,
    he would have become a regular member. And it meant a certain security, and when you were old you got a pension, and everybody--especially
    when you think of later marrying and so on - steered for such a thing. And that made him very happy, to become a member.
    And I know that the first check he got was, I think, 125 schillings for something. And in American money that is translated
    to something like $250. It was a little bit more in Austria, but it a mounted to this. I was jokingly saying to him, "Now
    you are rich and powerful," and he took it literally and said, "Oh, no, not yet." In other words, he was so happy that
    really these 125 schillings seemed like a fortune, like something .
- speaker: Interviewer
  text: I can imagine. And this is a large, large work in the tradition of the Viennese orchestral Mass. Did Eric talk about
    any influences? Did he study other peoples' requiem settings?
- speaker: Respondent
  text: Yes, and he studied all the time while he was doing it. He was having the Mozart Requiem and the Verdi Requiem - or
    maybe even another one, but I remember especially these--at his side, so to say. And it isn't like either of them, but
    it was just really for the technique or the forms that he studied these things. And all this, I should mention, he composed
    in a room
- speaker: Respondent
  text: which he had rented. He stayed all the time now with his parents, but he had rented this room so that he should compose
    somewhere else and really have the peace and quiet. (And of course, he also needed a room where we could meet.) And this
