- speaker: Respondent
  text: Now, this worked this way. At that time a man by the name of Wilfred Pelletier, a very good conductor, was the conductor
    of that hour. Now about on Wednesday the
- speaker: Respondent
  text: program was fixed, what these young singers would get as their material. Very often, it didn't fit the orchestration
    that Pelletier had at his disposal, so it had to be changed. And sometimes a young singer would want to sing a certain
    song that he liked and that wasn't orchestrated at all, and so Eric had to do the orchestration. The problem was only
    that he got the material on Wednesday and had to give it to the copyist on Friday, no matter what. At one time, after
    he had done everything, on Friday, within one day, he had to do the whole thing over again, because a singer that was
    supposed to sing got sick and couldn't make it, and another one was substituted with a completely different program. So
    it was a kind of little hectic thing, but it was a livelihood, and while it lasted it was fine. Pelletier was very fond
    of Eric, and he also did his string suite [Scherzo and Fugue]. At that time, he was conductor of the Montreal Symphony
    and did his work there. But Eric could not do the copying, too, and so he gave this to a copyist of his, and this copyist
    made so many mistakes that Pelletier got angry, and this way we lost the job. But that was one of those things, you know.
- speaker: Interviewer
  text: 'When did you decide to move to California? ZEISL: Now, in the meantime, of course, we lived in the house, but it
    was a temporary assignment always because the lady really wanted to sell the house. And this house.'
- speaker: Respondent
  text: this wonderful house with fourteen rooms, filled with antiques, with Persian carpets, with twenty-four-people silver,
    with a huge billiard room in the basement, all this was on the market for $5,000. And we could not buy it because we didn't
    have any money. And she really wanted so badly for us to buy it, but we couldn't. And even [if] we would have found somebody--because
    all the down payment for it was $500 - my mother said, "How can we do that?" The taxes would be like a millstone around
    our neck. It was just not possible. So finally a neighbor bought it, and it was really very sad, because she sold everything
    that was in the house just out of it, like this, you know, and then sold the shell of it. And it was such a genteel, beautiful
    house (one of the sisters had been the wife of the Colombian ambassador) , and it was all done with great taste and very
    beautiful.
- speaker: Respondent
  text: 'In the meantime, Rapee was so fond of Eric''s pieces, as I told you, and they had all been broadcast nationwide.
    He did so many of his pieces: the Little Symphony three times, the Passacaglia, and all these pieces. And also a conductor
    by the name of [Howard] Barnett, who was conductor of the CBS Symphony, did the November pieces, which I think Eric orchestrated
    while we were still in this room in New York. And all these broadcasts were nationwide. And a talent scout--they were
    at that time always on the lookout for newcomers--had heard that, and she recommended Eric to'
- speaker: Respondent
  text: MGM, And so all of a sudden we got this call, if Eric was available. Of course he was available! And so we had Kafka
    there, and Kafka was supposed to be our go-between. And he talked with these people, and they seemed quite earnest about
    it. And he said that we had stuff, and when we had to move, they should pay for the moving, and they were all willing
    to do that.
- speaker: Respondent
  text: Now in the meantime, the house was sold. And we thought, why now move to New York and wait there for the contract?
    (The contract was just before the signing stage.) We could move the things directly to Hollywood and then not have an
    in terim, which would only cost us money and had no sense. But that was a big mistake, because the moment we were here,
    everything seemed to be off all of a sudden. Only later did we really know what happened. [tape recorder turned off] So
    the whole picture was completely changed. Our a gent was a Mr. Polk, who was the a gent of Heifetz and also other luminaries.
    And so he came to the hotel where we were, and we felt like kings; I mean, they treated us like royalty. And everything
    was fine, and then all of a sudden it was like the whole thing had broken off, and all the promises were gone.
- speaker: Respondent
  text: Now, after this, we went on for about four or five weeks. All of a sudden Mr. Polk called and said, "They want to
    see you at ten o'clock," say, "there and there."
- speaker: Respondent
  text: 'And it turned out that there was at that time a producer here in Hollywood who made travelogues, the famous Fitzpatrick
    Travelogues. They always ended in the same way: "And so we reluctantly take leave of beautiful ..." whatever he had just
    done, Samoa or "beautiful Mexico," and so on. At one time he all of a sudden got the idea of making pictures about the
    life of composers, you know. And then they all said, he would end it with, "And so we reluctantly take leave of beautiful
    Wolfgang Amadeus Mozart," and so on.'
- speaker: Respondent
  text: So we came to the studio where these travelogues were shown. There were about six of them. And I remember the first
    one. It showed Massachusetts. And it was the coast of Massachusetts, and a lot of seagulls, and the surf was thundering
    against the rocks. It was very beautiful, and Eric was delighted. He loved to do this kind of illustrative music. And
    so I think he did it very well, and you heard in the music the shrieking of the gulls and the thunder of the ocean. When
    he played it then to the producer and the head of the department, we could see that something was wrong. So then we heard
    that the man Fitzpatrick had said to the head there that Eric, being from Vienna, didn't know how to paint Massachusetts;
    and anyway, he proposed that the music that should be underlying this film should be the Blue Danube . And I thought that
    was so funny, because he thought he wasn't Massachusetts
- speaker: Respondent
  text: enough to do it, and then he wanted the Blue Danube ! And that was it. And the Blue Danube was then put into this
    particular scene.
- speaker: Respondent
  text: So this was our first encounter with the face of Hollywood that we hadn't known. But after these first six pictures
    were done, he gained confidence, and then Eric could do what he wanted, because he saw that the rest was very good, and
    he hadn't interfered with the rest. For composing and orchestrating these pictures, Eric got $600- They were ten minutes
    long, each. And the union price of this would have been probably $6,000 or something like this at that time, because especially
    the orchestration and scoring prices were very high. And so the real reason Eric had been sought for and hired was that
    the chairman of the department wanted to get this so cheap while he asked a tremendous price from the producer of this
    picture, and the rest went into his pocket. But of course all these things, we didn't know.
- speaker: Respondent
  text: Now, the contract with MGM was still not signed, and these travelogues were, so to say, on the side, but at least
    we had $600 in our hand and could live. And so one day, when this went on and on and dragged on--there was another series
    of pictures again with a few hundred dollars that kept us a live - finally Eric went to Polk and said, "If the contract
    isn't signed tomorrow, I will take my family and go back to New York, because I cannot wait here for
- speaker: Respondent
  text: these few pictures and have nothing to do otherwise. I came here for this contract; in New York I was doing fine and
    will do fine again. ' And when Polk saw that he would lose Eric, the contract was signed. But it was not the same contract
    that we had done before. But by then we were so down and had spent so much ....
- speaker: Respondent
  text: If you remember, we had sent our furniture on. I don't think I spoke about this. I said that we had paid the freight
    for the furniture, and the furniture was supposed to be sent to Hamburg, and then we could order it either to Australia
    or to America. And then still in Paris we got a message from Eric's parents, who said that in land, in Vienna, they had
    heard that the Nazis rifled these lifts, the closed thing (they opened them and took everything valuable out), and we
    should send it on. Now by this time we already had the affidavit and knew that we would come to America, so we sent it
    on to California, we had paid California, and we had arrived in New York and were for two years in New York. Now, in the
    meantime the furniture stayed here and accumulated rent, storage fee. And so we had to pay this when we were here. And
    the way we paid it was that we had, in this lift, two pianos. One was the piano of Eric's parents, a Bechstein, and the
    other one was Eric's own piano. There was a new firm, Schweighofer, which had opened. I think the man was the first workman
    of Bosendorf er; he came to Eric and had him
- speaker: Respondent
  text: choose which he thought was the most beautiful piano and he wrote something into a propaganda booklet that he thought
    it was very beautiful. And for this he gave it to him for half-price. But still, for Eric and in his circumstances, it
    meant a lot of sweat and a lot of lessons and so on that he had to give until he had that, and so he was very fond [of
    it] . But we had to sell both of these pianos in order to pay for the storage and then to pay for settling. We found a
    little house that we could rent and settle and bring everything in and live. And we sold quite a bit more of our belongings
    before everything was under the roof.
- speaker: Respondent
  text: 'And so we had to accept that contract though it was completely different. Now the contract in itself was not so bad:
    it promised Eric twenty-five dollars for a minute of music. Of this kind of music, Eric could make ten minutes in ten
    minutes, and he was guaranteed two minutes per week. This gave us fifty dollars a week. Of course, there were so many
    taxes, and in the meantime the war broke out and so there were--they didn''t ask, but there was Dutch relief and Russian
    relief, and all our allies had some relief, and the studio took that off, and what we got was really very little. And
    of course we needed a car, because the studio would call sometimes at nine o''clock: "Be there at nine-twenty." And they
    never did anything in advance or let you know; it was always like'
- speaker: Respondent
  text: this. It had to be very hectic, either at midnight or like this, so that we were always in a state of hysterics. They
    needed that. And so it was absolutely necessary to have a car. We got a secondhand Plymouth that promptly . . We got it,
    and the next time when we drove it, it stalled on the railroad tracks on Santa Monica Boulevard and was almost totally
    destroyed. Anyway, all these little things
- speaker: Respondent
  text: And so Eric thought that was a pretty good contract, but it didn't turn out to be a good contract because he could
    not get enough work. It was like a very closed thing. The people that were there were kind of like in a fear of him. And
    he was there a week when he called me and said, "You must come. I think I am paranoid, but when I come, I think they all
    don't want to sit with me." And so I came with him for the next luncheon, and I saw that this was truly happening. The
    moment he was sitting down, they got up and went somewhere else, and they didn't want to talk to him. They treated him
    just abominably, really bad. Years later I have heard that from one of the composers there, a man by the name of Franz
    Waxman, had gone to a soothsayer about two weeks before Eric came (when you knew Eric, you must only know what a child
    he was and completely greenhorn and not having any scheming or anything in his nature whatsoever), and this soothsayer
    had said, "Beware! Very soon now there comes to MGM a man
- speaker: Respondent
  text: who will take your job away." So when Eric came, that was it; he was that man. Nothing could be funnier when you really
    knew how Eric was, and all he wanted was to live.
- speaker: Respondent
  text: And so there was a group of people there who were really mean. For in stance, the first picture was shown, and I was
    always with Eric because he didn't know English. There was this funny story, how they explained to him about the dialogue
    which goes with low or high voices, and the dialogue which goes with this or that scene, and he later asked me, "What
    is ' loguewhich ' ?" And so I went along, and we were shown this picture. And usually, when they showed a reel, they would
    then show it in reverse, too, so that you could see it two times. And they were giving us stopwatches, where we should
    ourselves stop and see how many seconds each sequence lasted. And when they reversed it, the reversal went double as quick,
    and I was completely confused because it was the first time that I did anything like this. And of course Eric didn't even
    think of doing this himself; he was just watching. And so I turned to the composer behind me, who was supposed to do half
    of that picture, and I said, "Can you tell me what is the difference in the speed?"~or something like this; I wanted an
    explanation. So he said, "Find out for yourself! I had to find out for myself also." And later on I heard that this was
    not true, that he was immediately taken under the wing of an older colleague who explained
- speaker: Respondent
  text: all the ways to him. But he was very in tensely jealous and felt his job threatened by Eric, and so he behaved this
    way.
- speaker: Respondent
  text: There was such an atmosphere of suspicion there, of distrust, and everybody distrusted everybody else. And nobody
    would say any opinion, not even that the sky is blue. When one said, "Today is a beautiful day," they would answer, "Yes,
    how beautiful green the sky is," because they were afraid that if they said blue and maybe Mr. Mayer, or whoever was important
    there, would think it wasn't blue, then they would have said something wrong. So they would constantly joke, you know.
    Now, with his bad English, Eric caught on that the atmosphere was constant jokes and that he was supposed to laugh. But
    then they would suddenly say, "I had a very bad toothache yesterday, " and he would laugh, and this made him not any more
    popular than he was already.
- speaker: Respondent
  text: He really had a very rough introduction, and he really hated every minute of this. And at the same time, he would
    have loved to compose because these pictures presented some kind of drama that in some in stances appealed to him and
    brought things out of him, and he liked to do it. But when he said that, that again was something they didn't want to
    hear because it was for them a routine thing--a job, so to say--and when he was enthusiastic about something.
- speaker: Respondent
  text: 'they got very suspicious and they didn''t like that, either. So he couldn''t win them in any way. Sometimes he would
    come home, and I''d have the dinner prepared and the plates ready on the table, and he would not greet me or say anything
    before he had taken one of the plates and shattered it on the floor to get all this feeling out of him, this frustration
    and bitterness. COLE: Then this was a rough experience. ZEISL: Ja, it was.'
- speaker: Interviewer
  text: Was it in the movie work that he met [Erich] Korngold, who later became a friend, or was this outside of the movies?
- speaker: Respondent
  text: No, it was not through the movies, because Korngold was at Warner Brothers and the studio of which I am speaking is
    MGM.
- speaker: Respondent
  text: So this lasted for about one and a half years and in this time Eric made about forty of these travelogues. And he
    got his fifty-dollar check regularly. I mean, it wasn't fifty dollars, as I explained to you; it came to about forty-one
    dollars, and of this we had to pay thirty dollars a month for the car, and the rent for the house was sixty dollars, so
    there didn't remain too much, but at least we didn't go hungry. The unfortunate thing was that everybody knew that Eric
    was an MGM composer, so we were supposed to take out everybody to dinner and pay the bills. He was considered a rich,
    wealthy film composer. And you couldn't
- speaker: Respondent
  text: tell the people how your circumstances were really; that would have taken off your prestige again. So it was difficult
    this way, too. [tape recordex" turned off] After a year had gone by this way, Eric wrote a letter and said that he should
    get somewhat more, because we really couldn't make ends meet. And then the head of the department (who had really pocketed
    all the money that came from the Fitzpatrick and had not put them on the MGM roster, so that Eric was really in default
    and hadn't even made the two minutes, while in reality he had made so much more) said that he should give to the library
    every week a piece of I don't know how many minutes, I think probably of two minutes or something, and that then he would
    eventually be paid for this. And so he made another every week. They must still have these pieces, and some were quite
    charming. They were done for piano, and the library usually told him, "We need a fight, or a battle, or a sundown," something
    like this. And so he delivered this faithfully but never got paid. And after one and a half years, the head of the department
    was fired. This was not the only thing he had done, and so this became his undoing eventually. And so with him went everybody
    he had hired in the last two years. That ended Eric's contract, and he came home absolutely jubilant. I got pale when
    he told me, because there was of course no possibility to save money from forty-one dollars. And we had a child, naturally,
    but he was so
- speaker: Respondent
  text: happy to be rid of this horrible atmosphere there. And so I had been a lawyer, and I went to bat, and I wrote letter
    after letter, and I fought the thing out, and they had to pay us. There was money they owed, and it a mounted to about
    $1,100, I think, which at that time was a fortune to us. And I fought that through for him, and so at least we had no
    immediate worries. And in the meantime the war had broken out. [tape recorder turned off]
- speaker: Respondent
  text: So things were not too good financially, and we struggled along. We had this money that I had gotten, that brought
    us enough till that ran out. There were jobs here and there. At Universal, a composer there gave him half of the picture
    to make because he was at the same time also doing something else. And that was Invisible Man's Revenge, I remember. And
    Eric had to make these weird things where he disappears. And then he had a few private students; and his brothers, who
    had in the meantime settled in San Francisco, and were not too bad off, helped a bit, too, I think. And so we struggled
    through, but it was kind of difficult. I know that when the summertime came and the private lessons stopped, it was really
    a matter of life and death. I mean, we didn't have money for the next day's meal. At one time, for in stance, Eric got
    to do a ballet. The composer Ernst Toch had recommended the lady who wanted the ballet to Eric.
- speaker: Respondent
  text: Now, in the meantime, we had met Dr. Hugo Strelitzer. And at that time, there was here a very famous--in Europe--
    author by the name of Emil Ludwig, who had written mostly biographies. And he had made a stage play about Ulysses, about
    the Greek hero. And his idea was a very cute one. You know, Ulysses is the wanderer who longs for Ithaca, his home, and
    the winds always carry him somewhere else, and it takes him ten years to reach home. And Ludwig made it clear that he
    wasn't so eager to go home, but that these ladies, Circe and Calypso, the nymph, the other nymphs with whom he stayed
    there, were quite comely and pretty and that he liked to linger when he did. And the whole thing was a comedy, and he
    wanted music with it. Hugo had approached Ernst Toch to do the music, but Ernst Toch was at that time busy with other
    things. I think he also worked in the movies and had probably work there. And Emil Ludwig only wanted to pay $100 for
    the whole thing, and that was of course too little for [Toch]. And so Hugo came to Eric, and Eric was delighted. You know,
    that was what he liked to do anyhow. And there he got money for it. And so he did the music, and it was in deed a very,
    very charming music. It was only for five instruments. During the rehearsals, Ludwig at some time got quite angry because
    the music seemed to him to overwhelm the thing, but Hugo was of course a Prussian conductor, and you could not budge him.
    When everything was finished and the rehearsals were over, Ludwig was very delighted with it, and he sent
- speaker: Respondent
  text: us a telegram after the first performance that said that just like nobody knows who the author of Rosamunde was, [set
    by Schubert], so also they will not know his name, but only this delightful music will stay. He especially loved the Ithaca
    motif, which is very beautiful and really expresses in music the feeling of what we in German call Heimweh, and which
    was, of course, something that lingered in Eric's soul in spite of being happy here.
- speaker: Respondent
  text: 'In general, I must say that he was much happier in New York. In New York he was all the time happy. The American
    experience was one of hope and absolute joy and happiness, and it was only this horrible atmosphere of the studios that
    had kind of poisoned all this joy. And it was also the climate, because at that time it was very, very different from
    now, and you would not recognize it. It was hot like Africa, The sun was unbearably hot in the fall. And Eric never could
    stand sun and heat. He had said the famous saying that he had only three enemies: his grandmother, [Hitler], and the sun.
    And all this sun was just not what he needed and what was good for him. So all this together made him sometimes quite
    unhappy here .'
- speaker: Respondent
  text: This tape is about to end. Perhaps we can squeeze in one little story that I think helps explain this rather long
    creative silence of serious music. Obviously, this introduction to Hollywood and this involvement with the
- speaker: Respondent
  text: studios took a lot of his time, the whole idea of adjusting, but also he had a daughter, and you said he made a statement
- speaker: Respondent
  text: Ja, he said one time that he lost two years of his life because of Barbara, because she was so cute - and she was
    really an enormously cute baby. She was like a baby from the funnies, you know. She was this funny mixture of like Dennis
    the Menace. She was such a tomboy, and she was really funny and original. And he played with her all the time. And he
    said it cost him two years out of his life because he loved her so much.
- speaker: Interviewer
  text: He was certainly entitled to a little joy after all his frustrations.
- speaker: Respondent
  text: Ja. I should say that went on. The Kafkas were here and they were very good friends, but they also were involved in
