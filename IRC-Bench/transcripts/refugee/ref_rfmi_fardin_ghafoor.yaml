collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your childhood in Afghanistan?
- speaker: Respondent
  text: I grew up in Kabul, but my childhood was not peaceful. We were constantly moving between provinces because of the
    violence between different militant groups. It was a very fearful time, and I didn't have a normal childhood like children
    here in the United States.
- speaker: Interviewer
  text: What kind of violence were you experiencing?
- speaker: Respondent
  text: Different groups controlled different parts of Kabul and would fire rockets at one another. There were Russians, the
    mujahideen, and later the Taliban fighting. It was very dangerous to be outside, so I couldn't attend school because it
    wasn't safe.
- speaker: Interviewer
  text: How did this affect your education?
- speaker: Respondent
  text: I missed a lot of schooling because it was too dangerous to leave the house. The constant fighting made it impossible
    to have a normal education.
- speaker: Interviewer
  text: What kind of work did you do in Afghanistan?
- speaker: Respondent
  text: I worked for a contractor for the US military. I delivered fuel, food, and clothing to military bases, and I also
    taught the Afghan National Security Forces Dari and Pashto. I believed the projects the US military implemented were for
    the benefit of the people, and I felt I was helping to rebuild the country.
- speaker: Interviewer
  text: Did your work put you in danger?
- speaker: Respondent
  text: Yes, because I supported the US, I received death threats targeting me and my family. We had to travel in armored
    vehicles with security guards, and we were attacked several times. But the companies I worked for gave me security and
    shelter.
- speaker: Interviewer
  text: When did you decide to leave Afghanistan?
- speaker: Respondent
  text: I decided to leave in 2014 and applied for a special immigrant visa program. It took four years, but I was granted
    a visa and came to the US in November 2018.
- speaker: Interviewer
  text: How has the adjustment been for you and your family in the United States?
- speaker: Respondent
  text: It has been difficult, especially with the language barrier and cultural differences. My wife often feels lonely at
    home. Even though I had interacted with Americans before, it is still a big adjustment for all of us.
- speaker: Interviewer
  text: Do you plan to stay in the US permanently?
- speaker: Respondent
  text: If the situation in Afghanistan ever improves, my wife and I would definitely go back. But for now, we want to raise
    our children in a place where they can be happy and free.
