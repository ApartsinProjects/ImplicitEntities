source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: So why don't you start by telling me where you were born, who did you grow up with, and what was it like?
- speaker: Respondent
  text: Um, my name is Amina Ahmad, I am from Syria, I was born in Syria in 1971. I grow up there in Syria in Aleppo city.
- speaker: Interviewer
  text: Who were the members of your family that you lived with? Who did you live with? Parents, grandparents?
- speaker: Respondent
  text: With my family, with my parents and six siblings.
- speaker: Interviewer
  text: Six siblings, wow.
- speaker: Interviewer
  text: How many brothers and sisters?
- speaker: Respondent
  text: I have two brothers and four sisters. Two sisters passed away last year. We have, now, I have two sisters, me three.
- speaker: Interviewer
  text: What was it like growing up in Syria? What was school like? What was a day in your childhood like? Describe that.
- speaker: Respondent
  text: My childhood? It was hard life in my childhood. We...I grew up in the village in the beginning of my life. I grew
    up without a father. My father passed away in 1975. My mom, she was farmer. We were a farmer family. I go to school until
    sixth grade, then we decided to move to Aleppo. It was 1988. Then, we survived in Aleppo, so we start a new life, and
    that was our life.
- speaker: Interviewer
  text: So what was that change like, from village and farm life to a city like Aleppo?
- speaker: Respondent
  text: Village is like a limited income, we had the trees, the olive trees, we had a lot of things, grapes, many things.
    So as all the farmers. In Aleppo, we worked. I worked in the factory, my brother was working in Lebanon, he goes to Cyprus.
    We moved, the purpose of our moving was to get a better life, that was our purpose. And we worked very hard.
- speaker: Interviewer
  text: And what did you do in the factory?
- speaker: Respondent
  text: I am tailoring. It was sewing.
- speaker: Interviewer
  text: Oh. And how often did you work?
- speaker: Respondent
  text: I was working, I started to work in 1991. And so far, I'm working. Till now I'm working. Yeah, but since I got my
    [INDECIPHERABLE], I just stay home for kids.
- speaker: Interviewer
  text: Wow. Did you have multiple jobs in Aleppo, or were you just working there?
- speaker: Interviewer
  text: In Aleppo, were you just working in the clothing factory?
- speaker: Respondent
  text: Yeah, just working in the clothing factory, nothing else. We worked on sporting clothes, like Nike, something like
    that. We were working and we export to the French country. So yeah, I worked in the factory. And in the beginning, I worked
    there, but after a few years, I was administration. I was administration like of two lines of the machine. So I was organizing
    for the job and people were working and I just directed and gave them jobs of what to do.
- speaker: Interviewer
  text: Could you tell me a little bit more about your life outside of work, like what did you like to do in free time? Did
    you spend time with your family and friends?
- speaker: Respondent
  text: Mostly I was working 6 days a week, 12 hours a day. It was a very long time job. Mostly, we don't have free time except
    Friday is the weekend in Syria. So me and my sister, we'd go to do shopping, we buy stuff, whatever we want. We visit
    our friends. My sisters, which they get my... we visit them and we just have fun together. We go to picnics. Yeah, as
    all the people, normal, like yeah.
- speaker: Interviewer
  text: What was your favorite thing to bring to a picnic?
- speaker: Respondent
  text: Food. My favorite thing was to go out and have fun. That's what was favorite thing, and if I had a friend, we'd take
    a barbecue with so many things. Yeah, we did.
- speaker: Interviewer
  text: Is your family religious?
- speaker: Respondent
  text: Not really. My mom, she was. But we keep cultural more religious. My mom, she was religious, but not me. I wasn't
    really religious. I was praying and fasting, also. At the beginning, I would cover my head. Then, I take off, I didn't
    put scarves. I wasn't wear short sleeve or pants. It was cultural - religious also - but cultural. They don't allow me
    to wear that. But then, I like struggled about that, so I took off and I got more free.
- speaker: Interviewer
  text: Could you tell me a little bit more about that? Like, what provoked your decision to stop wearing a scarf, to not
    be so religious?
- speaker: Respondent
  text: As I said, it wasn't religious because our family is not a religious really family. It's cultural - in the village,
    it's a shame if they see the girl, her hair is short, or if the girl wears the pants or short sleeve, it was shame, you
    know? I mean, how she's grown and how she can wear short sleeve or not put scarf. That was the problem, not religious.
    Religious says should we cover our head or something, but in my family it was cultural. You know?
- speaker: Interviewer
  text: Okay, so did that change happen when you moved from the village area to Aleppo?
- speaker: Respondent
  text: Um, not really. When my brother, he was in the Cyprus, so I visit him, I saw his wife. She doesn't cover her head.
    So I said, why she doesn't cover and why do they want me to cover? I really don't like to cover my head. So that time,
    I decided to take off. It was 1994. Since that, I just take off. I was wearing short sleeve and pants.
- speaker: Interviewer
  text: Okay. How did your family react after that trip, when you came back?
- speaker: Respondent
  text: It was normal. It was a big challenge for my culture, because when I visit my brother, I was alone. I go to Cyprus.
    It was a really big deal for our social something, like how she can travel alone or how she can go? But my brother, he
    was there with his family. It was good thing, and I always liked to do something special. I want to break this routine.
    I don't want to follow the people, I want to be, have my own life, you know? I don't want "if they're religious, should
    I follow them? Or if they have a special culture, should I follow them?" I like to do whatever I believe or I think is
    right. I do that. And if something really not as usual over, I can change a little bit. But mostly I'm just, this routine,
    I don't want to follow it every day in general. That's what has happened.
- speaker: Interviewer
  text: So when did you decide or when did you know that you needed to settle to the United States? What was that like?
- speaker: Respondent
  text: We were in Malaysia, we travelled to Malaysia, 2012? We get there and we [INDECIPHERABLE], United Nations. So after
    two years and a half almost, I know I will come to America. We resettlement, 2016. The end of 2016, or beginning, I'm
    not sure about that.
- speaker: Interviewer
  text: So what was the change like, moving from Aleppo to Malaysia, first?
- speaker: Respondent
  text: We moved for the war situation happening in Syria. Change a lot of things, we missed a lot of things. New life, new
    situation, new challenges, new things with the family with the three kids, with the different country, with the different
    people, different... a lot of things, it was a very big challenge for us, until two years. After two years, we become
    a little bit, we're used this people, we see them, and we get a little bit okay. But we had a lot of anxiety about resettlement,
    because we're Kurdish in Syria. We lived in Syria and we had a special situation, so we were very anxious about that and
    we were afraid they would return us to Syria. Malaysia, it was our future there. You know? We're illegal. So we're illegal,
    we don't have any rights. If my kids have to go to school, they cannot go to school, we cannot go to a hospital. You have
    to pay everything, you know? And mostly, when you go to government, I have to put my kids so they have a visa, which we
    don't have. So it was a very big challenge, very big, hard situation.
- speaker: Interviewer
  text: So those, like three, four years in Malaysia -
- speaker: Respondent
  text: Five years, yeah.
- speaker: Interviewer
  text: Five years. How were the people around you? How did they treat you?
- speaker: Respondent
  text: People, most of them, very kind people, very helping people, very nice people. But like all the countries, maybe you
    can find 90 percent people good, 10 percent is not good. That's happening everywhere, maybe. But mostly, they are very
    nice people.
- speaker: Interviewer
  text: So the people were kind, but the services were just hard to...
- speaker: Respondent
  text: Yes. You have to pay and when you're a refugee, you cannot work illegal and a lot of problem we had.
- speaker: Interviewer
  text: So you said you had a lot of anxiety in Malaysia? Was that, were you worrying for family at home, the situation? Fearing
    that return?
- speaker: Respondent
  text: Many things. First thing, it was for resettlement. We don't know what was happening. Will we get resettlement or will
    they reject us? It was very big anxiety in Malaysia we had. And a big part was resettlement. Second thing, also in my
    country, we lost everything. My home, my furniture, my family, separate everywhere. My brother going to Turkey. My sister
    going to Turkey. My two sisters in Syria. It was very bad, dangerous area. My other brother, he goes to Vienna. It was
    very hard for us.
- speaker: Interviewer
  text: So was that split between your siblings very hard?
- speaker: Respondent
  text: We, you know, in our country, we used to always meet each other. Like, Friday we would meet in my mom's home and we
    really were close with each other. We have very strong relationships, and it's our home. When you grow up 40 years in
    this country, it's not easy to forget or just ignore it. The situation happening in Syria, it's our people, you know?
    Happening in my area, most of people I know there. Each family, they lose something. It's kind of sad, you know? What's
    happening? Why is it happening, this situation? We don't know. Those terrorists over there, I'm thinking about Syrian
    people. We weren't like that. We are not really a religious people in Syria. Syria is not a religious country. Why they
    do that? What is the purpose of that? A lot of things, you know? It's part of our life. The forty years we lived there
    is not easy to ignore. It was hard for us.
- speaker: Interviewer
  text: Do you still keep in contact with people in Syria?
- speaker: Respondent
  text: I still contact with my sister and most of people I knew them, they get out of Syria. Many people go to Germany, Europe,
    and America. All over the world, they go. But I'm still in touch with my sister.
- speaker: Interviewer
  text: So, going back to Malaysia, how was that cultural change from Syria to Malaysia?
- speaker: Respondent
  text: Malaysia is a Muslim country. For me, I don't care about religious. Just I'm looking at people about how they are
    kind or bad. You know? That, I just decide if they are okay or not. But I don't care about religious.
- speaker: Interviewer
  text: So, you said you moved to the United States towards the end of 2016.
- speaker: Respondent
  text: I moved to the United States 2017.
- speaker: Respondent
  text: Yes, I moved here, but I don't know when we got resettlement. I think it was the end of '16 or the beginning of '17,
    yeah.
- speaker: Interviewer
  text: Got it. So, how was that move from Malaysia, to where were you immediately resettled?
- speaker: Interviewer
  text: Like, do you remember what town or city you were resettled to?
- speaker: Respondent
  text: No, just before we moved, we have a cultural orientation, so they tell us until that, we didn't know anything. It
    was the last step before we come, fifteen days, twenty days, something like that? So we know we will come, we didn't know
    anything about that.
- speaker: Interviewer
  text: Could you tell me a little more about the cultural orientation, like what did they explain to you?
- speaker: Respondent
  text: In Malaysia? It's an office of UNHDR, any resettlement people and families, they have a cultural orientation. They're
    talking about this country, American country. They're speaking about rules here, about laws, about many things and we
    have to follow whatever they are. So yeah, that's in general, a general idea they give us, should we follow. Then also
    they say, for to get something cheap, is a new life, and how to start, and that's what they're trying to explain to us.
- speaker: Interviewer
  text: Did you find it helpful at the time?
- speaker: Respondent
  text: Yes, it was helpful.
- speaker: Interviewer
  text: So when you finally came to the United States, what was your first thought, when you were moving in with your family?
- speaker: Interviewer
  text: When you first arrived in the United States, what were some of your thoughts?
- speaker: Respondent
  text: It was also kind of an anxiety, when we came. So I will start from new, from zero. It's a new life, new people, new
    country, you know? So, it was easier from Malaysia. If I want to compare, it was easier for me, this country, because
    I found many people around us, the HIAS organization, they really helped. In the beginning, when I came, I was always
    worried about that, but when we saw those people around us, the sponsors, it was very nice. They made a place for me,
    they find jobs, they find apartments, they bring all the furniture and stuff we need, they brought everything. For kids
    to school, for health insurance, for many things, all the things, they help us, for English class, how to start to work,
    so many things.
- speaker: Interviewer
  text: So HIAS helped you get started?
- speaker: Respondent
  text: Yes, HIAS, they helped us.
- speaker: Interviewer
  text: So you've been here for almost two years now, do you still keep in contact with HIAS?
- speaker: Respondent
  text: Yes, I'm still talking if I need something, if I have questions, if I have questions, I am still talking to them.
    I'm still talking with my supervisor and all the group have become our friends of our family and then still we contact
    each other, we visit each other, we invite each other. They're really nice people. It's become like a, our family. Especially
    Susan Davis, she's super nice lady, yeah.
- speaker: Interviewer
  text: Were you surprised that those connections were like immediately there for you and people were so supportive?
- speaker: Respondent
  text: Um, I'm not surprised but it was good for me. Good feeling, gave me more, I don't know, more love. It's not like in
    Malaysia, it's more nice, more good for us. Nice people.
- speaker: Interviewer
  text: So what was the biggest cultural change that you've experienced here?
- speaker: Respondent
  text: Nothing changed. I have still some challenges, like cultural with my kids, so they start to ask many questions, like
    why are we like that and why cannot do that and why we have to follow this, like we're Muslim. We mostly eat Halal food.
    So especially meat, we don't eat the pork. They ask
