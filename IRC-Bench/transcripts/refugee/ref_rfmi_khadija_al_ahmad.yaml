collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Do you think maybe to start, you could tell me a bit about where you are from and what that was like before you resettled
    in the United States?
- speaker: Respondent
  text: Yes, sure. Absolutely. So, my name is Khadija. I'm from Aleppo, in Syria. I have a husband, Mohammed, and four children.
    You'd like to hear my story in the beginning?
- speaker: Interviewer
  text: Yeah, I would love that, whatever you'd like to share.
- speaker: Respondent
  text: Yeah, thank you so much. So, I started to write this one year ago, this is my story. One day I was in my country with
    my family and with my loved ones. I used to live with as anyone does. I always found someone near me in my happy and sad
    moments until I lived through a harsh experience. It's immigration. Our journey away from home begin with in Turkey. My
    husband, in Syria, he had been the manager of a small factory that made leatherbacks. In Turkey, he continued this work,
    managing a workshop there. Our surrounding in Turkey looked familiar. We understand the language, the religion. Culture
    and also the food were similar. But we knew that we were no longer home and that all had changed.
- speaker: Respondent
  text: Yeah. And then we didn't start learning a foreign language until January 22, 2017 and our way to the United States,
    to here. So, while we were in the plane, President Trump was holding his pen and destroying Syrian refugees' dreams, no
    more refugees.
- speaker: Interviewer
  text: Oh my gosh.
- speaker: Respondent
  text: Yeah, that day. I feel that my family and I were not welcomed in the United States. You know, feeling like, yeah.
    Despite my feeling, we were warmly welcomed by volunteers from JCARR. They took care of us by finding us home, finding
    school for kids, doctors. That makes our life is, it was easy, in the beginning, to have some friends helping us in a
    difficult time. I remember, during our first day in America, I used to look up from my window, I open the curtains, closed
    them several times, wishing that the appearance street will change and look like my old street. For a moment I felt I
    was in a dream, and things around me were not real. But as soon as I came back to reality by hearing my son telling me,
    Mommy, I want a pizza. I remember that everything changed. Khadija, you are in America. You know that feeling is different.
    Just in the beginning here. Also, we had studied English in Syria, but I had very little practice speaking. I was the
    contact person for our family. I had to help my husband understand all that was being said in conversation that I was
    having difficulty following. You know, it's difficult for him also, changing from being a manager to a worker. And from
    working as a craftsman to working in the industry. You know, this change already changed his relationship to himself.
    Also, it's difficult for all my family. And also, one of my sons, I told you about him, Ahmed, he is disabled. He had
    never been out of our home for very long. He wants to go to school, and before coronavirus to school hours a day away
    from home. He's doing well now with this change. I think he's the best person in my family, you know, he's loved this
    change.
- speaker: Interviewer
  text: With the coronavirus?
- speaker: Respondent
  text: No, to go to school. He didn't go to school in Syria or in Turkey. But it was a large adjustment for me to not having
    him always at my side, it's really difficult.
- speaker: Interviewer
  text: I can imagine. How old is he now, Khadija?
- speaker: Respondent
  text: He's 11 years old.
- speaker: Interviewer
  text: 11 years old. So, how old was he when you first moved from Syria to Turkey?
- speaker: Respondent
  text: We moved to Turkey; we ran away from Syria to Turkey in 2015. Now eleven, so you can do the math [both laughing].
    He's smart, but they don't accept him at school because we need some documents, doctors' documents also government documents.
    So, we had a difficult time to find school that fits his situation. And also, they want us to pay for schools, but we
    couldn't do that, so I keep him at home. And I do practice with him. I taught him a lot of Practice, but you know he needs
    school, he needs teachers.
- speaker: Respondent
  text: But my other kids, they are enrolled in Hamden School here. So, they made friends, they get things comfortable learning
    from their teachers.
- speaker: Interviewer
  text: That's wonderful.
- speaker: Respondent
  text: Yeah, you know, our family grew, and we welcomed a baby, baby girl.
- speaker: Interviewer
  text: Wow, congratulations! When was that?
- speaker: Respondent
  text: In July 2018. Her birthday is next Monday, the 24th.
- speaker: Interviewer
  text: Happy early birthday!
- speaker: Respondent
  text: Thank you so much. And as you know, she's already an American citizen. It's not like us. We have a difficult time
    to wait until five years to apply for passport to be citizen, We are happy for her. This birth of our new daughter forced
    us to think about how much space we needed. We found an apartment in a new building, across town in Hamden. And then when
    we moved during the school year, I'm talking about 2018, we were told by Hamden School Board that since we moving to a
    new district, our children would go to a different school, more change for us. It's very difficult. I had to do all this
    paperwork and at this point, I knew that I was tired of all these changes. I knew I had to fight this change. I wrote
    to the school board and petitioned them to allow our kids to study where they are. Thank God, I won to leave them that
    year. Also, I fight for my disabled son to receive more one-on-one therapy. I won again. It's about it's a longer story,
    to fight and go to the places and a lot of applications. Some people, they need more information about you. Sometimes,
    you are not feeling comfortable. Sometimes, it's okay. But yeah, thanks God and won and got one-on-one at home.
- speaker: Interviewer
  text: Oh, good. I'm so glad. It sounds like it must have taken a lot of courage, standing up for your children and for your
    family in many ways.
- speaker: Respondent
  text: I decided to try my hand at a job and started catering. I do catering and sharing my food of our home in Aleppo, from
    Syria. Even though when the phone would ring with first orders, I remember, I was afraid to answer, worried that I would
    not understand the conversation. Language can be complicated to translate and create a problem sometimes. I don't know
    if you'd like to hear this little example about what's happened with me.
- speaker: Interviewer
  text: Yeah, I'd love to hear.
- speaker: Respondent
  text: One time, when I was talking to this social security, to update some information. You know that every year, we should
    do that. I was talking to them and I said to the employee, I'm talking behind my husband. This in the beginning, when
    we arrived in America. She was shocked and told me to give the phone to my husband. I told her, I meant to apologize,
    I meant to say on behalf of him, not behind. She didn't believe me. She closed the phone call. I want to say that the
    immigration is a bittersweet experience. It's harsh and difficult but honestly, it has taught me many things I would not
    have learned, if I were still in my country. Immigration is not the end, but maybe the beginning of that impressive success.
    When you suddenly find the courage in yourself.
- speaker: Interviewer
  text: Yeah, absolutely. It seems like starting your catering business also took a lot of courage. Do you feel like you growing
    up in Aleppo and throughout your time in Turkey, you have always felt that kind of courage? Did it feel like a new thing
    when you arrived in the United States?
- speaker: Respondent
  text: No, absolutely. It's a new thing. In Turkey, also, even if we had a similar religion or culture or food. But it's
    still, the biggest feeling or different feeling is when we arrived here. Everything is not the same. It's not even like
    Turkey or Syria. The mosque there. We hear the, I don't know if you know that, the adhaan, to pray five times a day. We
    miss that here; we don't hear it. It's a little bit difficult here.
- speaker: Interviewer
  text: May I ask you a question about your time in Turkey?
- speaker: Respondent
  text: Sure, yes please.
- speaker: Interviewer
  text: Did it feel, when you moved to Turkey in 2015 in terms of your religious practice, did it feel like you were able
    to do most of the same practice that you did in Aleppo? Or did you feel like your religious practice had to change in
    Turkey? And then how has it changed since you arrived in Connecticut in 2017?
- speaker: Respondent
  text: Actually, in Turkey, yes, I can do most of my same practice that I did in Aleppo. And also, the people there more
    respect us, as we are Muslims and Arabic. I don't know why, not all people there, but most people. Some of them, they
    are happy to have refugee in Turkey, some not. About the religion, I completely feel comfortable to do and practice. All
    my religion practicing. But here I feel like a little difficult. In the beginning, I told you, we don't hear the adhaan
    five times to pray. Yeah, it's a little different. We downloaded an app in our phones so that's what happens now, to pray
    five times in our home. It's a little bit like the same feeling in Aleppo and Turkey, it's not like before. The mosque
    here, it's not the same, it's not looks like that in Turkey or in Syria. The people not speaking Arabic. They are from
    Pakistan, Afghanistan, and some from Morocco, in different places. So, they use English, not Arabic. Most people in Turkey,
    they speak Turkish, but they use the Arabic, the people in the mosque, the people there. I don't say in the street, but
    in the mosque, they are speaking classic Arabic. So, we can talk to them easily, not like here. I would like to send my
    little boy, my son, to learn some Arabic here, but I'm thinking if I send him, they will be able to speak to him in English,
    not Arabic. We found it a little difficult there to practice or do some courses in Arabic.
- speaker: Interviewer
  text: Right, yeah, that makes a lot of sense. How have you felt your experience has been raising your children in the religious
    practice in the United States? Have there been other things like the Arabic classes that have been difficult to find or
    easy to have access to, when it comes to like a religious or Arabic education for your children?
- speaker: Respondent
  text: Yeah, we do most of that at home. My husband and I we teach them. We sometimes use YouTube, yeah, many lessons on
    YouTube and courses. Yeah, we tried, but when the father and mother teach their kids, it's not the same teacher or outside.
    We try a lot, but it's very difficult.
- speaker: Interviewer
  text: Yeah, absolutely, that makes a lot of sense. Well, your children are obviously very lucky to have you as their mother.
    Khadija, would you mind sharing more about your catering business, and how you decided to set that up and everything?
- speaker: Respondent
  text: Yeah, sure. Absolutely. Thank you for asking me for that. Our family grows, and my husband, he has an accident at
    his work, three years ago. He did two surgeries, and he has a difficult time to find a job after that. So, I thought,
    like what about if I do catering, I know the people here. They love food. They keep searching now about the healthy food
    and what I'm thinking like Syrian food or especially Aleppo food is healthy. It's not like fried, or from a restaurant
    from like fast food, it's different. So, I studied, and I took a course and I passed the exam. And then I do the certificate
    and you know the documents and everything. And I called my business Khadija's Kitchen. My daughter, she's very perfect
    with this technology, as you said, like technology she created the website for me. She designed the business cards; she
    downloaded many apps and helped my business to grow. She's perfect with that. She's almost 13 years old, but she's perfect,
    she loves to do art, so that pushed her to say Mom, I can help you, I know how to do these tasks. And also, my husband
    helped me. He has business in Syria and Turkey, so he helped me to, I'm not good with math. So, he's doing the math one,
    percentage or how much this costs, how much you should take. I know how to cook and talk to people. So yeah, I do that,
    the catering. Before coronavirus, it was going very well, then I stopped. Then now I do, I have an idea to make just for
    four people, menu. The people are not meeting, so this idea came to have just a small group of people. And yeah, I do
    weekly menu that I send to my customers every Monday. The people are very happy to know new foods, new culture, and they
    came and asked me, how delicious and what a new thing we tried. They are very happy.
- speaker: Interviewer
  text: Wow, that's amazing. And so, you had said the coronavirus has had an impact on your business. How has it been with
    your life and family in general, I assume your kids have not been going to school for a while?
- speaker: Respondent
  text: Yeah, we all have a difficult time because of them. They want to go outside, and we are scared to take them outside
    every day because we live in the building. And, you know, a lot of people around us. We try to find many ways to make
    fun for them like practice, do hide and seek, music. Especially for the baby and especially for Ahmed who is disabled.
    It is very, very difficult for him to stay home away from school, he misses school a lot.
- speaker: Interviewer
  text: Yeah, I'm sure. And what has it been like having everyone at home together for so long?
- speaker: Respondent
  text: You know, that is the difference between Syria, the culture. I'm talking about the culture, not people. The family
    is very important in Syria. I think in the Middle East, not just in Syria. But we have to stay together for a long time.
    It's not a problem for us, you know, we meet every day at lunch or dinner, sometimes with breakfast. We had parties, a
    lot, a lot of parties between women, so the difference is just because kids stay home, not just because they stay with
    us. The mother as you know, the father works in Syria or the Middle East, they work. But the mom stays home, some mothers
    are not working. It's not difficult for us to have them, it's just because they don't go to school.
