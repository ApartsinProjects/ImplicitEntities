collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your experience immigrating to the U.S.?
- speaker: Respondent
  text: I came from Afghanistan in 2016. I worked with the US army there as an interpreter for ten years. It was a very dangerous
    position because people who worked for the US army, especially interpreters, were targeted. My wife was always worried
    when I was late coming home.
- speaker: Interviewer
  text: How did you get your visa and green card?
- speaker: Respondent
  text: Because of the work I did for the army, I was given a special immigration visa. After arriving in the US, I got my
    green card within 4-5 days.
- speaker: Interviewer
  text: What was your experience with learning English and working here?
- speaker: Respondent
  text: I worked on my English step by step and started working as an interpreter in 2006. There is a big need for interpreters
    and good job opportunities. The young generation wants to study and save the country.
- speaker: Interviewer
  text: Can you describe the immigration process after your commander asked if you wanted to come to the US?
- speaker: Respondent
  text: It took two years from that meeting to actually get to the US. I ended up living in Pennsylvania. They gave me six
    months' rent and a place to live. I got a job, but it was bad for my health because of the chemicals in the paint.
- speaker: Interviewer
  text: What happened with your health?
- speaker: Respondent
  text: I developed a tumor in my lung which was very painful even after treatment. The doctor gave me two places for treatment;
    I chose the DC area because I knew someone who could help me. I applied to Medicaid, had many tests, but the tumor kept
    growing and I felt very weak. The doctors decided to remove the tumor. I still have to go every three months for a CT
    scan. Sometimes I have trouble breathing and use a machine to help.
- speaker: Interviewer
  text: What are you doing now in terms of work and education?
- speaker: Respondent
  text: I just started going to school again for AC and heating. I received some financial help from social services to pay
    for my education because the jobs we found before couldn't support my family. My wife has been studying English. I want
    her to be part of the community and not stay at home all day alone. She is sick right now but still works. I want her
    to be healthy. Our son is in elementary school; he corrects our English and does his homework.
- speaker: Interviewer
  text: Can you tell me about your religious beliefs and practices?
- speaker: Respondent
  text: My parents were Muslim and so am I. They taught me the values of Islam, respecting humanity and doing good work. Islam
    does not condone killing innocents. I served the US army to help my country. I still pray but understand that God knows
    if you cannot fast when sick or when work needs to be done. Some things take priority at certain times. I ask for God's
    forgiveness. I try to teach my son to be a good person, to respect others and let them speak. My whole family believes
    in God.
- speaker: Interviewer
  text: Do you attend a place of worship here?
- speaker: Respondent
  text: There are mosques in Alexandria, but sometimes we have also been invited to pray in a church.
- speaker: Interviewer
  text: What are your hopes for the future?
- speaker: Respondent
  text: I think of the US as my country now, and my son is the future of the US. I am grateful for the soldiers and police
    who keep the peace. I work hard and see a bright future for myself and my family. I advise others who came like me to
    work hard and study. I am happy and proud to be here. I want to eventually pass the citizenship test with my wife. I want
    to keep having goals and keep moving forward.
