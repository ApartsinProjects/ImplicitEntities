turns:
- speaker: Interviewer
  text: Okay. This is Amna Amin interviewing Abdul Nazari on July 2, 2019, and the interview is taking place in Raleigh, North
    Carolina. So I was wondering if you could start by telling me where you lived before coming to the United States.
- speaker: Respondent
  text: Yes, I come from Mazar Sharif, Afghanistan and come to Charlotte, October 2017. Until January 2018 I was in Charlotte.
    But that is happen my daughter is sick and she had liver problem. And the doctor said you have to move to Durham to university
    hospital. That's why I came here last, like six months maybe.
- speaker: Interviewer
  text: And what was your life? What was your life like in Afghanistan? Growing up?
- speaker: Respondent
  text: Afghanistan, my life was in Afghanistan. Okay, you know, in Afghanistan a lot of war. Yeah.
- speaker: Interviewer
  text: And what made you decide to move to the United States?
- speaker: Respondent
  text: Yeah, he says you know (in discernible talking) after he was they were after him. And they said, you know, like, his
    life was in danger...family. That's why he just came to United States. The people supported him...for his own life. Saved,
    his life is saved.
- speaker: Interviewer
  text: So he was working with Americans?
- speaker: Interviewer
  text: I'm just going to repeat the translation into the microphone. But so he was living in Afghanistan and working with
    Americans. And the Taliban found out and his life is under threat. So then he decided to move to America with the help
    of the Americans he was helping. And then do you know, how is it moving to the United States? How is Charlotte?
- speaker: Respondent
  text: Charlotte was okay, when I came Charlotte, they give me for uh three months to make house free, and everything's free.
    It was excellent.
- speaker: Interviewer
  text: Yeah. Do you know the organization or agency that helped you when you came to the United States?
- speaker: Respondent
  text: Yeah but one is has name then it was ARO something like that. They're helping me, yeah.
- speaker: Interviewer
  text: How were they with helping you?
- speaker: Respondent
  text: They're helping me with a lot. They worry about my house and my doctor appointment everything. Beautiful.
- speaker: Interviewer
  text: That's good yeah. And did your entire family come over at the same time?
- speaker: Respondent
  text: No. I went with my kids and my wife that's all.
- speaker: Interviewer
  text: Okay. Do you still have family in Afghanistan?
- speaker: Respondent
  text: Yeah in Afghanistan, I have my three sister in Afghanistan lives with my mother and brother is in Afghanistan...
- speaker: Interviewer
  text: Okay. And then how was how did how was your treatment in the United States?
- speaker: Respondent
  text: They a revery good very good, they are helping mevery nicely.
- speaker: Interviewer
  text: Okay. Yeah. And then do you have a job in the United States?
- speaker: Respondent
  text: For at the moment, no. I had before job in Charlotte. But it was...and I was working in a lot food truck
- speaker: Interviewer
  text: Yeah. How was it?
- speaker: Respondent
  text: It was good.
- speaker: Interviewer
  text: Yeah, what how is the food in the food truck?
- speaker: Respondent
  text: The food truck like is was very hard work. And well then a very busy place in Charlotte downtown. Was like, some Friday,
    Saturday, they're like 700 customers, 600 customers were served.
- speaker: Interviewer
  text: Yeah. And were you taking any classes while you were in Charlotte?
- speaker: Respondent
  text: No, but I wanted to go for English class. I had no time because I was working at nighttime and daytime...and my kids
    appointment me and my wife with uh I got one little daughter she when she come out of appointment with my wife, she was
    pregnant with the yeah I was very busy and yeah.
- speaker: Interviewer
  text: Do you have a lot of medical appointments when you came to the US?
- speaker: Interviewer
  text: Oh, why did you have the medical appointments?
- speaker: Respondent
  text: Because they make uh checkup all of my family and dentist and the medical checkup and the vaccination for my kids.
    My wife was pregnant, every first month every month. Then after six months, a week, a month, a week one appointment. Every
    week appointment. After my daughter's born, a lot of appointments because she getting sick all the time to go to hospital.
- speaker: Interviewer
  text: Why is she getting sick?
- speaker: Respondent
  text: I don'tknow. When she born after one week, two weeks she made came to her eyes yellow and I took her to the hospital.
    And then the doctor said this is normal. After one month she cannot move. Yellow face and all the body everything. And
    then doctors make an hospital one two weeks. In hospital she was, after they're released her from hospital to go home.
    Especially getting day by day getting back up. Doctors said my daughters said it was too good to….she need to have a liver
    transplant.
- speaker: Interviewer
  text: Has she already had the liver trans...?
- speaker: Respondent
  text: Yeah, she had like three months ago.
- speaker: Interviewer
  text: Okay. Is she doing better?
- speaker: Respondent
  text: She much better
- speaker: Interviewer
  text: Good. And how was how was the move from Charlotte to Durham?
- speaker: Respondent
  text: The first time I bring my daughter all my family on one night or two night in a little bit hopefully late on with
    her for me and must go after that the (in discernible) sisters come helping me out. Everything for my kids. I say thank
    you thank you from the Islamic Relief. Thanks for the World Relief, they are helping me out a lot. There are other brothers
    come here helping man of Muslim people and American people. Mr. Bill is passed away. He died. He was...he was helping
    me a lot.
- speaker: Interviewer
  text: Yeah. How did you find these people who helped you?
- speaker: Interviewer
  text: And how has the rest of your family, like your wife and your sons, found the United States?
- speaker: Respondent
  text: Yeah its good. I'm sorry if I'm boring.
- speaker: Interviewer
  text: No no no, it's perfect, it's great. And, You're Muslim?
- speaker: Interviewer
  text: So how is being Muslim and Islam important to you?
- speaker: Respondent
  text: This Muslim is my religion. Is very important for me to keep, follow my religion.
- speaker: Interviewer
  text: Did Islam and being a Muslim help you when you were struggling?
- speaker: Respondent
  text: Yeah, I think so. I believe. I believe.
- speaker: Interviewer
  text: And how have you, have you met a lot of other Muslims here in the United States?
- speaker: Respondent
  text: There was, I met a lot of Muslim...they was very good for calling me, what do you need, and come, sometimes bring
    food, some thought for my kids. It was really really good.
- speaker: Interviewer
  text: Do you like the community here and the people here?
- speaker: Respondent
  text: Yes, I do like it. I do. I like that they are helping, I like it.
- speaker: Interviewer
  text: Oh, yeah. So like for your daughter's liver transplant when that happened, how did that happen? Like, who helps you
    through that?
- speaker: Respondent
  text: First time, one lady came to me in Charlotte. That was, name is Nastreem. Helping me a lot, she come with me. After
    that I come here, there's the World Relief helping me a lot. Other Muslim brothers with a career. Mr. Bill, he is, was
    in charge of church. I saw her forget the another sister was Sargua, our sister Sakina is with me to welcome to keep,
    take care of my kids. When I was my daughter hospital with my wife and I go to hospital for five or six hours to care
    of my kids that came to stay with my kids go to a hospital until I come back. The sister must Sargua and sister Sakina.
    I think is that was sister Joan called my….introduced me to the...
- speaker: Respondent
  text: We have a big Muslim community here. So first we are we connect with Nathreem. Nathreem is one of the volunteer from
    the Muslim community in Toronto and she moved with the family here to hospital then she called me and told me about the
    situation with a family and then we have a Facebook page called Client getting Muslim. We have all the volunteers on this
    page so I wrote about the situation of the family here because they didn'thave a house to live in, like apartment or any
    house here. They didn'thave the power, they didn'thave food, anything. They just moved here from Charlotte hospital to
    the hospital by the ambulance. Yeah. So I connected I contacted the World Relief and church here because I know that they
    have a guest house and this way it was great the $100 bill helps a lot in cleaning and preparing the house for the family
    to move and then our Muslim volunteers start coming bringing food many items from their homes. Sister said well one of
    the issues from day one till now.
- speaker: Respondent
  text: Yes, and then he said, you know the first time I came here with they kids, they have no room for us and the kids weren'tallowed
    to go inside the hospital even on the waiting area, you know, in the hallway. And I don'tknow what to do with one side
    you know, like my kid is sick and I can see my two sons you know, they're lying down and how we have their hospital. They
    had nowhere to go away. You know, no one I know. It's true. We don'tknow nobody. And then the other like that introduces
    the sister Joan to her. We got to know a lot of people in community through that and then I found out I'm not I don'tfeel
    lonely anymore. And I feel for everybody to be there for me. And I remember the night of surgery we all there, we all
    sitting next to them and we spent the night through all night all of as we sit there with them you know and let him to
    sleep at least take a rest. Which is, it's nice you know to at least you know you guys if you feel like he's home now
    because it's hard to come from different states in the new place and you don'tknow, Alhamdulillah everything is worked
    out and he's very happy for that and he is grateful for everything.
- speaker: Respondent
  text: He said that I'm really thankful for the community. In the name, by name Rob here, she was from Parkistan, and she
    came to me and she said whatever you need, just ask for it. She did a lot of help you know like many ways oh you know
    like clothing, anything food anything you know, like she been very very helpful. I'm really thankful for that. I didn'treally
    know community Pakistani, Indian Pakistan, or Indian Muslim. All of them, they come to me and they helped me a lot and
    really lucky to have them around. I feel like a lot there's like sister and brothers to me and my family.
- speaker: Respondent
  text: And also you know Samiha whenever there's a woman you know she was very helping them you know pay, pay for the people
    to sit and babysit the kids while they're out for appointment or staying at a hospital and they were helping me. I'm really
    thankful for that you know like you know a lot of you like everything I need you just, she keep calling - what else you
    need, what else you need? She keeps helping she, keeps helping me and it means a lot to me I'm really thankful for having
    her on my side. And also she said the other day in the lobby, she could save some money, collected some money for me to
    finally I can purchase a car for myself. And with that money, it's really this is something that I stopped my life…(in
    discernible)...and I'm really grateful for everything done for me.
- speaker: Interviewer
  text: Just one question like, what like now that you're here in the United States, now what hopes and dreams do you have
    for your future for your family and for your kids?
- speaker: Respondent
  text: And he said I had another opportunity in Afghanistan to go to school and finish his diploma to get to high education
    because he the oldest in the family and he has to support his family and that was you know one of his dream to go back
    to school and study and be so mebody. He wanted to get kids future Inshallah to be good. He just wants to working hard
    for them to continue their education and my dream you know to come through with them you know. I wanted to see my future
    in both of them Inshallah, so I can continue my education and be with them whenever I wanted to be. And the same thing
    would be the future by my three kids Inshallah so they go to the right way, the right directions and be educated.
- speaker: Respondent
  text: Inshallanah and also he saying my wife never go to school before in Afghanistan you know, most of the girls that they
    couldn't go to school. But now she's here, they want her to go to school. And be educated continue or did you too because
    I'm sure she has a lot of really, I'm really grateful for that to see, you know, the mentors coming from that side of
    the world. You know, they had open minded about the wife, you know, we're going to school and learn how to drive and he's
    really talking to me, I'm really proud of him when he's talking about his wife like it's, it's, it's wonderful. It's wonderful.
- speaker: Interviewer
  text: Is there like, is there a particular memory you have from when you moved here that you could talk about?
- speaker: Respondent
  text: He saying like one memory which is it bothered me at night was still, you know, as I can keep me so metimes you know,
    be upset about the night I came from Charlotte to hospital for Marianne to you know, be attended in the hospital. And
    they told me your kids not allowed to be inside the hospital. I told them what do you want me to do with my kids? You
    want me to throw them away? Outside, I can't do that. They have to be with me. Because they don'tknow no one in here.
    Just me. And they said, this is not the rule and the regulation of your hospital. We cannot allow you to bring the kids
    in. In that time you know, I get very upset. I get very sad. Because you know, like, if you are in my position like the
    doctor in my position. What do you do with your kids? And your wife is there...She doesn'tknow how to talk English and
    I have to be next to her and I supported her and I have to be there to support her. Because it's emotional time for us.
    In the meantime, I don'tknow what to do with my kids. This is the worst memory I have here. I know this is the rule and
    they're right about your rules. They have to follow that. But for me in that night, it's hard to accept.
- speaker: Respondent
  text: And also yeah one more you know like like he said, it's not I'm not gonna say it's bad memory but something you know
    has bothered him and because he just got his driver's license, the day I guess we went there on Thursday, we got a driver
    license in like two days later, he just wanted to bring the kids and wife from the hospital to home and he got into an
    accident. And, you know, like because this is the worst thing that's happening to me because you know, like, I wasn'tready
    for that. And I was like, shocked. I was shocked and you k
