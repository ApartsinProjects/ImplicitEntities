collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you just start out by telling me about where you're from?
- speaker: Respondent
  text: My name is Ifrah Ahmed, and I was born and raised in Kenya. I lived in a refugee camp before I came to the U. S. I
    was first resettled in Kansas City, Missouri.
- speaker: Interviewer
  text: Can you tell me about some of your earliest memories, or the earliest things people have told you about -- about growing
    up in Kenya?
- speaker: Respondent
  text: I remember as a child, I loved it. I loved it, and we played outside more than we were inside, which was fun, and
    a lot of times we'd make our own toys, make our own little dolls and make [in decipherable] and stuff like that, and it
    was more like a -- almost everybody in your neighborhood was kind of like your family. I remember we would stay outside
    until almost 7, I would say almost 6:30 when the sun was setting, and, yeah.
- speaker: Interviewer
  text: And, I know you mentioned in our previous call too, you spent some time in Uganda as well? Could you talk a little
    bit about that?
- speaker: Respondent
  text: I was in Uganda -- my family moved to Uganda -- and the refugee camp. I liked it, too. I really liked it. I enjoyed
    it. It was beautiful, and things were very simple. Yeah, there wasn't a lot of luxury, or anything of that, but it was
    more about family, and connection, and I got my first job in Uganda, and I was working for the U.N., but I was working
    as an interpreter, which was pretty interesting. Then, I ended up learning that everybody had -- working with a lot of
    refugees, everybody had a story that was worse than mine. I ended up learning how to appreciate every single day as it
    came, being that there's always somebody who has -- who's in worse of a situation than you are.
- speaker: Interviewer
  text: And what year was it when you went to Uganda?
- speaker: Respondent
  text: Many moons ago. I believe it was somewhere close to 2 -- it was a little bit after 2005. No -- yeah. There. When I
    first moved there.
- speaker: Interviewer
  text: And how old were you at that point?
- speaker: Respondent
  text: When we first moved there -- barely finishing -- I was actually in high school. Then I finished high school, and went
    to a college there. Got a scholarship to go to a college, so then I got a scholarship to go to university, and then came
    back to Uganda after earning my anthropology degree, and started working -- then I realized, there wasn't much you could
    do with anthropology, unless you earned a PhD or something, and you were teaching, or if you had the resources -- mind
    you, I was a refugee girl so there's no way I had the resources for that. And, so, I started working as an interpreter,
    it was also -- very much fulfilling because I was able to work with different cultures, be exposed to different people,
    be exposed to different stories, which was the reason why -- in the first place -- I wanted to be -- to study anthropology.
    To understand different cultures and people. So, yeah. And then, in 2012, we finally had our resettlement accepted, but
    unfortunately my mother was not accepted, so it was just me. My sisters went to different countries. My sisters were in
    Europe. They were sent to Europe. So, I came to the U.S., and I remember that when I first -- after your health, physical
    health, you have to go through this process, where you get interviewed, and get vetted, and it's a very long process --
    mind you, that I was pretty much on the refugee camp. And so, by the time I came here, I was almost 20 something. I was
    in my twenties. My early twenties. We got posted. First you had to go through the health screening. After you passed through
    the interview and everything, and go through the health screening, then you have another waiting period. So, finally when
    the period came and we were posted, I was posted, my mother wasn't posted. So, it was just me coming to the U.S., and,
    I could think, it was like -- because I've never heard of Kansas, and I was coming to Kansas. And I was like, "Okay. Wait.
    What is going on? I don't know." And I'm like, "Where is Kansas?" So, I go to my -- to this -- the guy who was helping
    me with my health screening, he was from the U.S., so I was like, "What do you know about Kansas?" And he looks at me,
    and he says, "I think that's where Dorothy's from." And, I'm thinking, "Who's Dorothy?" I have no idea who is this lady.
    I'm like, "Okay," and he's like, "Oh, I think they have really good barbecue." And I'm like, "I don't know what a barbecue
    is, either." He's like, "Well, I think they're famous for their tornadoes." And I'm like, "Okay. That doesn't sound like
    fun." But -- so I went back home, and I prayed, and it said -- so it's like, it says Kansas City, Missouri. Where are
    you getting just the Kansas from? I'm like, "Okay." And I'm like, "Missouri. So it has to be nice, Mama, because, if you
    think about it --" Missouri, in my language means good. Like, literally. Missouri means good. And, so she's like, "Definitely.
    It is -- anything is better than here. You will be okay." So, long story short, I flew in -- came to the U.S., and it
    was fall. February, it was February. And I don't think I was dressed appropriately, because, mind you, I have never seen
    winter. It never snows. I'm freezing. We get to the airport and our case worker and comes and picks us up, and there was
    me, and seven other women who were from different backgrounds and everything. Different countries. So, we were -- he came
    and he picked us up. And, I remember I looked out the window, and I could see all the trees were dead. Like, the fall.
    And I have never seen anything like that in my life! And so, I asked the guy now, "So, do you mind if I ask you a question?"
    He's like, "Yeah, go ahead, ask me," and I'm like, "Did the tornado happen?" And he's like, "What?" I'm like, "Did the
    tornado happen? Is that why the trees have fallen? Is that why the leaves are dead but the tree's still standing?" And
    he's like, "No, no, no, no, no, no, that's what we get in different seasons. It's fall. It wasn't fall, it was winter."
    And I'm like, "Oh, okay, I guess." And I'm like, "I've never seen anything like this." I thought it was a big disaster,
    and yet, it's so beautiful.
- speaker: Respondent
  text: So, and, that's how -- he took us to our home and he put us in the house, this small house, with seven women who speak
    different languages from different perspectives, from different cultures. It was very fun, and a very interesting experience.
    So, do you have any --
- speaker: Interviewer
  text: Yeah, I wanted to backtrack a little bit. You mentioned that when you moved into Uganda, you were still in high school.
    So, could you talk a little bit about what it was like moving like that at a relatively young age? And what it was like
    to finish out your high school in a different context?
- speaker: Respondent
  text: I think once you're born in a refugee, you kind of detach yourself from belonging somewhere, because you never seem
    to belong anywhere, so being born in Kenya, I never belonged. You know? So, the Kenyan children would always look at me
    and be like, "Oh, but your parents are Somalian, which means you are Somalian," and they're like, "You're not Kenyan."
    And then, you can't call Somali your home because it's such an unstable situation, and I've never been there, so I didn't
    know enough to be able to call it home, other than my parents. And so, I always had this -- I guess, this uncertainty
    of where you belong. Not being able to completely say that this is where I belong, this is where I'm supposed to be. And,
    I think the first time that I ever felt like I belonged anywhere was when I first became a citizen. For the first time,
    I was officially accepted somewhere. And, in the same way, in Uganda, you're a refugee. And so, a lot of my friends were
    refugees, a lot of the people that I hang around were refugees, so I didn't really specifically get attached to the country
    or the people. However, you -- you get to -- it was an easy transition, because I was finally in school. And in primary
    school, mostly I was home schooled by my mother, and so I was finally going to school. I was making friends, and then
    all of sudden we had to move, because Kenya was unsafe all of a sudden for us, or Kenya wasn't being the best choice for
    us, so my mother had to pack up and leave. So, we then came to Uganda, which was -- it was a new transition. I had to
    do it again -- Finally get to establish another friendship, get to know the people, and it was like, this thing that you
    just worked hard for was taken away from you. It wasn't hard -- it wasn't easy, but at the same time it had its moments.
- speaker: Interviewer
  text: And what about going to university there? What was that like?
- speaker: Respondent
  text: It was incredible. It was good. It was just like a regular university here. It was -- it was really just pretty much
    similar to here. We had lectures, we had professors, we had different groups and different clubs, and yeah. I loved my
    uni time. Being in the uni was incredible because it was the first time that I felt like I was finally independent, I
    was staying -- I wasn't at home. I was in the uni, being -- I thought I was an adult. I get to make my own decisions now.
- speaker: Interviewer
  text: And I also wanted to ask about -- you mentioned when you got resettled to the U.S., it seems like your family was
    split up. Could you talk a little bit about what that was like?
- speaker: Respondent
  text: It was heartbreaking. And -- well, because my family has always been together, and then, all of a sudden, it was like,
    we had to go different paths. Which was not very popular with a lot of refugees. Most of the time, they put families together.
    They like -- the idea of being separated was very -- most people would be like, "Well, I think they usually put them together,"
    but, in our case, that was not what happened to us. And I have always been with family, and then all of a sudden, I had
    to be by myself. It wasn't even just me because the person who got affected the most was my mother. Because she lost all
    of her children at once. They all left. And it's like, oh. I guess it -- all three of her daughters went away, every one
    in a different continent, knowing -- not knowing where they are, what they're doing, what is going on, not being able
    to hold your children or hug your children. I think that was the hardest part. And for us, the hardest part was that --
    knowing that you were alone. It's a foreign country, you were new, you have no idea the cultural shock there, there is
    -- what do you do? Do you do this, do you not do this? How do you talk, like, if you come home today -- how do I tell
    -- how do I -- I can't share with my sisters how my day was, because I don't know these people well enough to share that.
    And, it was -- I was homesick. I remember I used to come home almost every single night -- I would cry myself to bed.
    But at the end of the day, I knew that this was a better opportunity -- I can be who I want to be, I can be the person
    that I choose to be. There's no opportunity in my country, regardless of how educated you might be or how much education
    you might get. At the end of the day, it's who you know, not what you know, pretty much. And it's really -- it really
    is about who you have a good relationship with, or, the person who is a native born who is not a refugee is more likely
    to get a job than you, so, opportunity was very slim, very, very slim. And, so, I came to the U.S. with a dream in my
    heart like every other American. And I'm still working on that American dream.
- speaker: Interviewer
  text: Could you talk a little bit about your religious experience in the two camps?
- speaker: Respondent
  text: In the camps, there's sections. They put different sections of it. So, where we lived was mostly where the Somalian
    people would live. And, in those areas, the major religion was Islam. The majority of the people were Islam. So, there
    wasn't a big religious difference. However, we had exposure to other religion, and it wasn't just Islamic. Because, I
    remember that -- I remember that in school, we would also study CRE, which meant Christian Religion Education. It would
    go with our -- they just to call it GHD, which was, Geography, History and Religion. So we started the Christian religion,
    and so, my mother didn't have a problem with that, because, at the end of the day, when we would come home, we would study
    the Islamic religion, and at school, we would study the -- the school was mostly Catholic. And so, we would study the
    Bible, and get to know more about the religion, the Bible, the Christianity, the religion, Catholicism, and what it was.
    Stuff like that. Growing up, I always had an understanding of the Christian religion, just as much as I have it over Islamic
    religion. And, I think, because of that, it kind of made me assimilate easier, when I came to the U.S., with my Christian
    friends, and the exposure that I would get with the people that I met. And so, if I needed to talk to the Bible, I knew
    something about the bible that I could talk about. If I -- if there were Muslims, I could talk about the Islamic religion.
    It was a lot easier. I also had an interest in the Hinduism, so I -- in the uni, I studied a little bit. I took a course
    of the world religions, so I had an exposure of different kind of religions. So, yeah. But I grew up as a Muslim and that's
    my religion.
- speaker: Interviewer
  text: And what was the community of Muslims like in the camps? Like, how was it organized -- that sort of thing.
- speaker: Respondent
  text: Just like every other religion -- we had a religious leader, we had the imam, we had the sheikhs, and we -- there
    was an adhan -- we prayed five times a day. There was the adhan, there was the mosques, and we studied the Qu'ran. Have
    you been in an Islamic nation?
- speaker: Interviewer
  text: Sorry, say that again?
- speaker: Respondent
  text: Have you ever been in an Islamic region?
- speaker: Interviewer
  text: Yeah, yeah, when I lived in Indonesia, I was in Jogja.
- speaker: Respondent
  text: Yeah, it's -- it was very Islamic. We had a lot of Islam related -- everything was mostly halal, and you'd hear the
    adhan every morning when you woke up. And everybody was pretty much the same religion as you, and then you'd celebrate
    Ramadhan together, you'd fast together, you had your friends who were also fasting. Eid was celebrated with everybody,
    celebrating the religions, the religious Eid. So yeah, it was as Islamic as it could get.
