source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about where you're from?
- speaker: Respondent
  text: Yes, I was born in Kazakhstan and I lived there for my first three years of life and then I moved to Syria and that's
    where I was raised.
- speaker: Interviewer
  text: So you said you moved to Syria. Do you have any memories of growing up with your family, with your sisters, or any
    friends, and how has that impacted you as a person today?
- speaker: Respondent
  text: I definitely have a lot of memories, uh, a-, I have a photographic memory so I do remember a lot of instances from
    a fairly young age and growing up was very fun [laughter]. I have an older sister and a younger sister, so we always,
    we have about seven years between each one of us, so we have big age gaps and growing up was very interesting.
- speaker: Interviewer
  text: And can you tell me about how the civil war was kind of introduced to your area and, you know, you were very young,
    you said, uhm, how—
- speaker: Interviewer
  text: How did you feel, do you have any memories about the first time you heard about it?
- speaker: Respondent
  text: Definitely.
- speaker: Interviewer
  text: What your reaction was, what your family's reaction was?
- speaker: Respondent
  text: So I was eleven years old and we were watching the news and the first thing that ever happened or how we heard about
    the start, we kind of didn't give it much-, we were like 'oh, okay', you know? Everybody always thinks that 'oh, a couple
    of months and it will die down', you know, 'it will be fine' and so the first thing that happened is a young gentleman
    was, his body was found tortured and he was mutilated very badly and all of that was because he did some childish graffiti
    on the wall, saying basically like 'f- the President' or something like that, you know, it was literally, it wasn't anything
    serious enough to deserve any of what he got and then his family started marching for justice and of course, everybody
    else followed and from there, the, the light was, kind of pointed at basically police brutality and governments that are
    more of, have more of a dictatorship style, that kind of don't allow you to express your opinion without consequences,
    even though that's not how its technically supposed to be seen, how it's-, we're not supposed to be a dictatorship technically,
    by the books.
- speaker: Interviewer
  text: I see. And although you expected it to kind of slow down after a few months, like you said, it didn't. Can you walk
    me through how it progressed and worsened?
- speaker: Respondent
  text: It started off further away, so Syria is not that big, but it started off more in the rural areas, so if it's like,
    if I had to compare it to Texas, it would be me living in Dallas but it started in Austin or Houston, so that's kind of
    like distance-wise of like, it started off kind of far away. You know, we're like, okay, it'll stay there will die down,
    you know, it's gonna get better. But then it started slowly, just shifting and getting closer and closer, closer on the
    grid. And then when things started popping up in the capital, that's when tension started rising. And that's where things
    started getting worse. Because before we would watch things in the news and see the protests, and the gunshots and the
    bombs and X, Y, and Z, we would see that on the news, and now I'm seeing it outside of my window. So, and we happen to
    live right next to the Russian Embassy in Syria. And with Russia's involvement, and the whole Syria situation, that wasn't
    very good. That wasn't a very good location to be at because bombs were thrown from them towards people, and then from
    people towards them. So we have actually had a bomb that hit a floor underneath us, that was meant to be thrown at the
    building next to us, but they missed. So there were a lot of there were a lot of attempts were the biggest thing that
    happened is, which is I like one of the surprise that nothing really happened to me or my mom or sister is we were at
    the park, which was across the street from my house. And my sister was playing in the playground and we were kind of sitting
    further away at the benches with my mom. And my sister came to grab some water. And we started hearing gunshots. So my
    mom was like, Okay, let's go. So we started walking in, my mom was like, I hear the gunshots coming from this direction.
    So she was like, let's go to the opposite side of the street. She tried to tell my mom that that was not very true, because
    I think they were actually coming towards us. But as we were crossing the street, my mom was actually behind me because
    she dropped my sister scooter. And I was in the middle of the of the street. And I saw this some black car and it dropped
    something off at the trash cans in the corner. And- and the guy that was in the car, he opened and slammed his door in
    front of me. So I looked at him I saw him and then they sped off. But I it was just so much going on at the same time
    that I was like, Okay, I don't know what's happening. And then we're walking. And you hear this like loud bang. And we
    went inside of the hallway of the building. And then after that chaos was gone was over. We realized that both me and
    my mom were hit. It wasn't gunshots, so we were confused. But apparently what these gentleman's dropped off was a handmade
    bomb with nails inside of it. So it exploded right as we were walking by. So the only thing that protected us were the
    cars that were parked on the sidewalk because they were pierced through. And the gunshots were actually coming towards
    us because there are a bunch of shell casings on the floor. So we were actually supposed to be on the other side to protect
    ourselves, but we were on the wrong side. But that was like an example of like literally being like outside with no protection.
    Nothing.
- speaker: Interviewer
  text: Wow. How did you and your family persevered through these times? Was it just you know having your family around? Was
    it like maybe your faith or another form of community will help you push through these traumatic times?
- speaker: Respondent
  text: I think it's a combination. For me personally, I really don't like freaking out. And like, during that, literally
    that instance, my mom was like freaking out. And I was like, Mom calm down. Like, because I know that you can't think
    clearly when you're panicking. And I don't like that. And I was like, we need to be like calm to be able to, like, get
    out of here. And for me, it was a lot of like, I really do truly think that being in that situation, and in that environment
    did force me to grow up a lot faster than what I would normally be as a regular child. And I think faith was definitely
    a part of it. Where you just kind of hope that everything will be okay. And without God's help, you wouldn't be here and
    a live and actually trying to build a new life in a different country. But also, I mean, we were all it's, it's a, I think
    it's also has a lot to do with the community. Because just like with the COVID situation, we're kind of all in the same
    mess together. But at the same time, there's a lot of division, because there's a clear division between half of the community
    is with the government, the other half is with the rebels. So when you have your side of the community kind of with you
    and supporting you, it's makes it a little easier to get through certain situations.
- speaker: Interviewer
  text: Right. And I know that so you, you're the second eldest in your family, correct?
- speaker: Interviewer
  text: So that means you were, you know, a role model for a few of your sisters. How, how was that responsibility, like growing
    up? And I mean, it could be from the time you were in Syria, and now throughout your resettlement process. Yeah. Can you
    speak a bit to that?
- speaker: Respondent
  text: I think I've struggled a lot with it. Because I think the situation that I was put in has made me over protective.
    And I do have like, anger issues. So for me, I like try to protect them and they view it as me being super mean. But they're
    kids so I mean, I guess they will get it later on. In life, I hope. But also, I realized that like my parents are getting
    older, and they can't really discipline them or tell them like what to do, or blah blah blah, the way they did with me
    and my older sister. So it kind of leaves everything on me in a way. Because my older sister is not with us, she's in
    Dubai. And she had to go there by herself because she couldn't come with us to the US. Because she was [INDECIPHERABLE]
    in the United States. So that meant that she needed her own case, which she didn't really have cause she's always been
    with us. So, for instance, my youngest sister, our youngest sister, she is six. And she's never met our older sister ever.
    Because I tried to invite her to my high school graduation. They didn't give her a visa because they said that "Oh your
    family is a family of refugees in the United States. If you go there, you're going to try to stay," but that really wasn't
    the case. I sent her an invitation for my December graduation but the way- the way life is set up, COVID is here so I
    don't know if the borders are going to be open or not, If they will give her a visa or not. I don't really know. But we
    haven't seen her in a long time. She got married two months ago, we couldn't even go to her wedding. We had to watch it
    over video. So yeah. It's a lot.
- speaker: Interviewer
  text: Your sisters are very lucky to have you, I'm sure you know that. But I want to reaffirm that someone who just kind
    of met you virtually a few minutes ago. And I was wondering if you could speak a little bit about you know, why your family
    had to resettle? And just, if you can walk me through that process, and how that has led to where you are today?
- speaker: Respondent
  text: What do you mean? Why do we have to resettle?
- speaker: Interviewer
  text: So in our pre interview us, you were talking about, you broke down the tension between the government and the rebels
    and how your family was, you know, looped into that. And then essentially, that, meaning that you had to get out, just
    briefly walk through that, that would be amazing.
- speaker: Respondent
  text: So pretty much it goes down to if you're not with the government, then if you're not with us, you're against, basically
    and having your name on the blacklist. That means every postal stuff that when if you are, you're most likely getting
    going to get taken. So that's kind of your life on the line every time that car stops, every time you get checked. And
    that happened that happened with my with my uncle that got killed. And he got killed after we left. And he got beaten
    up to death. They didn't know that he actually was a cancer survivor. And he's gone through chemotherapy multiple times
    in his life and he had heart problems. So when they beat him up, they hit his heart too hard and that caused him to --
    his, all of his internal organs to swell up, because his heart was beating in the speed of a 60 year old man when he was
    a 20 year old young guy. And he suffered a very painful death. That was because just- just because they felt like it,
    just because they felt like he looked at them maybe sideways. They didn't like what he said or how he looked or how he-
    I don't know. It's just it's kind of like fun for them. Because they have the power. And that power has no consequences.
    So you abuse the power when there aren't any consequences.
- speaker: Interviewer
  text: Can you recall any sensory memories or evocative moments from your journey leaving Syria?
- speaker: Respondent
  text: Definitely, yeah.
- speaker: Interviewer
  text: Is there any one that stands out?
- speaker: Respondent
  text: It was- it was tiring. I've always been a very chubby child. And walking for a long distance was not fun. It was hot.
    It was kind of scary. It was just, there's just a lot. And I didn't know, but at the time my mom was pregnant. So the
    only people that knew was my dad and my older sister, but nobody told me. But yeah, I found out after.
- speaker: Interviewer
  text: Okay, so just to back up a little bit. Could you speak about what your religious practice was as a child and if it
    shifted at all with, you know, the external pressures of, you know, the Civil War? Yeah. Have you ever doubted your faith
    in any way? You said that it kind of helped you push through the harder times, but sometimes with, you know, the trauma
    and the chaos beyond your- your circle, that might impact people's experience. But what is your experience like?
- speaker: Respondent
  text: Oh, well, we're Muslims. I would say, to me personally, I think no matter what religion you are, there are times when
    you doubt God, because sometimes you're like, 'Why? Why, like, why is this happening to me?' And there are definitely
    times where I've asked like, 'why?' If we're here, and we're trying our best to do x,y, and z, then why is this happening
    to us? Because you look around and you see all those people on their living like their life, and everything's fine, and
    they have the money, the cars, they are happy, and everything is going smoothly. And then you see hard working people,
    and they're getting dragged through hell and back. And it's like, 'Why? Why is this happening?' But at that times where
    you're the most vulnerable and the most alone, the only one that you can go back to is God. Because that's the only thing
    that's there for you, when no one else is. So you kind of always circle back to God, no matter how much you, I wouldn't
    say doubt, but question, of why things happen. And at one point, I have realized that everything happens for a reason.
    And if certain things didn't have happened, we wouldn't be here, nothing would be happening. So you and what I've always
    like stuck by is that God gives the hardest challenges to the strongest warriors. So maybe that's what it is [laughter].
    But God needs to stop, because I'm tired [laughter].
- speaker: Interviewer
  text: You are very strong. I want you to know that. And you were kind of talking about this towards the end. But how were
    you able to sustain your faith during all that turmoil, it was such a significant period of your life. Yet, you know,
    you still you still find that resorting to God and speaking to God is very helpful for you.
- speaker: Respondent
  text: I think when, when you feel alone, you always want someone to talk to, and you would hope somebody is listening, so
    your last resort is God. And
