collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Tell me about where you're from.
- speaker: Respondent
  text: I am originally from Iraq. I am Chaldean Catholic. We left Iraq when I was 13 years of age, along with my family -
    my three younger siblings - brothers. Around 1981, we had witnessed - 1980, we had witnessed one year and a half of the
    war between Iran and Iraq. My father was very concerned about drafting my brothers because, at that time, they didn't
    know when the war will end. So he started to get rumors. He used to work for the Department of Human Services, so things
    will get really - rumors will travel really fast at that time. He was pretty concerned for about a year. Around June -
    around June time - we arrived in Greece, where my uncle used to be there. We applied for the - I believe it was the UNHCR
    - however, at that time it was the Red Cross. So, I remember my dad always speaking about the Red Cross, the Red Cross,
    so that's where we registered in 1981. At that time, we were about 250 or 300 families that attempting to settle in the
    US as refugees due to persecution. My father, at that time, was, due to religion and due to - they wanted him to join
    Saddam's party, he was not interested. So, things were getting very unsettled. They were unsettled, there was fear. So,
    that's when he decided to leave. We arrived to Greece in 1981. We stayed there for four-and-a-half years. During that
    time, I was the oldest - I had to work, along with my two youngest brothers. The youngest one was about two years old.
    He was just an infant at that time. However, we had to work to support the family. We lost our school times, until 1985.
    Whatever the Trump administration is doing right now for refugees and blocking, putting so many restrictions and policies
    in the immigration arena - it was the same thing when Ronald Reagan was. That's why we got stuck there for four-and-a-half
    years. When we arrived here in 1985, which was in Michigan, and we've been here ever since.
- speaker: Interviewer
  text: Awesome, thank you. So you talked about the four-and-a-half years where you were stuck, between the time before you
    could come to the United States. What were you thinking during that time? Were you expecting to come much sooner? How
    was that time period for you all?
- speaker: Respondent
  text: Well, I was too young. I didn't know. I was a kid - I was 13 years old. Now that I look back, we had lost a lot of
    time. We had lost schooling, we had lost high school, we had lost time to make friends, which is where people in this
    age - that's where they develop their social skills, their friendships with others. We never had that opportunity. Our
    job was us just working and just doing things at home. So, basically, I used to feel a sense of loss, not being like everybody,
    since we had to work at an early age. I had to be an adult at age 13. And for most refugees, this is what it is. They
    are forced to be adults - children are forced to be adults - due to their circumstances. My parents were not able to work;
    however, they were helping in different areas. Me and my two brothers - we were working to support the family throughout
    that four-and-a-half years. When I arrived here, my only intention was just to compensate for that time that I lost -
    we lost. So, going picking up school, we were running out of time, like we were running against time. I had to be - I
    was 17-and-a-half, and I was in the ninth grade. So, it was a struggle. We couldn't speak English. We didn't have the
    technology that people have now. We didn't have phones. We didn't have - all we had is basically a dictionary - just a
    normal dictionary. My mom, at the time, was better in English. So, we used to have a hard time reading. And learning -
    like we were learning a language, at the same time, we were required to perform like everybody else in the school. We
    had to do homework. If homework was not - a test, we had to get a grade. They don't care. I remember an incident - she's
    one of my favorite biology teacher, Ms. David. It was our first or second week that we had to give - we started in September,
    so we were like - she wanted to know how well people know about the human body. So, I was sitting right next to my brother
    and I'm like, what is this? Like, I haven't seen human body. And I'm like, is this for real? She wants us to write it?
    And it was an ESL class. I still see her until now, I love her. And my brother was like, hey, just write it in Arabic.
    So, knowing her, she can read Arabic. We wrote not like everybody - we wrote it in Arabic and we just gave her our papers,
    like, it was some kind of quiz. She wanted to know the level of everybody in that class. Until now, about 35 years later,
    I see her, I know her family - and she still remembers - she was like, remember when you gave me the letter? You know,
    the form? I still have that written in Arabic. But that was the struggle of refugees. And it doesn't matter then with
    services and now -- not having - not being able to speak the language - that right there is a struggle.
- speaker: Interviewer
  text: Absolutely. So, going back to when you were 17, when you first came to the US - was that the first time you were in
    the United States? And how was that experience compared to what you expected? How did the resettlement services also help
    you with that?
- speaker: Respondent
  text: Well, when we arrived here, I remember, that was 1985 in Michigan. Even though there was a lot of Chaldeans, there
    was not services. We didn't have any services. Some of, like, what we have right now is tremendous - a lot of people who
    have. 1985 Iraqis were not considered refugees, so until 2008, they started to become refugees. So, services for them
    was not - there was a couple of agencies that, they would provide social services, but we didn't know any. We had only
    one car. We didn't have a case manager. I don't remember whether we had a case manager from the IOM, I believe. The only
    thing I recall is us, when we arrived here, because we had my uncle as a sponsor, so we didn't get that many services.
    What happened is, because my uncle was our sponsor, they just took us to have our physical - when every refugee arrives,
    they're supposed to have physicals - that's when it is. I was overwhelmed. We were lost, let's put it that way. Now I
    remember - I go back sometimes and I think when I see somebody that reminds me of me. We didn't have anyone to teach us.
    We didn't have anybody to let us know that you can do this, you cannot do this. We didn't have options. So, for me, to
    take me and my brother, who is a year younger than me, and to put us in a high school, in the ninth grade - that was not
    an option for us. We had to follow that. Looking back right now, we didn't have a lot of options and opportunities like
    refugees have right now in Michigan. So, it was something that we have to learn by trial and error. Like, we had to make
    a mistake, we have to pay for it, and then we learn. So this is how we learned, like, sometimes I tell my daughter - right
    now, she was born here - she has a different mindset. She'll be like, let me make that mistake. I'll be like, no. If you
    follow this path, you're going to make that mistake. I've done it, and I'm trying to make her avoid it. Then I learned,
    she has to make her own mistakes as well, but my mistakes are different. I wish we had somebody to guide us. I wish we
    had an opportunity for people to let us - to lay down the options for us. To let us know that you have this, you have
    that, you have - no. So, I could've been in a different spot, you know. Things happened. I was delayed already, four-and-a-half
    years. When I got here, somebody had told me, you can take English classes in a community college for your age, and then
    you can enter college. I could've been in a different set. I could've been in a different - I don't know. Probably my
    life could've been different. But because I already lost four-and-a-half years due to policies - immigration policies
    of the government, at that time - I come here with not that many options. I lost another three years in high school, so
    when I graduated, I was twenty-one years old. And Detroit Public Schools - there's not that much education. We had to
    go to ESL classes. So basically, when I went to college, when I went to Wayne State, and I remember one of my professors
    - a biology professor - I was telling him how difficult it was for me to read. And he said to me, well, if you graduated
    with a 3.7 average GPA, and you are admitted here, then you are qualified to be here. He didn't care if I didn't speak
    English. He didn't care if I held the book and I spend an entire day just reading a few pages because I have to literally
    translate every paragraph to get the best out of it.
- speaker: Interviewer
  text: Definitely, that makes a lot of sense. So when we talk about home and community, what do you think of? What do those
    words mean to you?
- speaker: Respondent
  text: Michigan and US is my home. Comparing, I cannot see myself living anywhere else. Like I have freedom of speech. I
    learned, because I came young, I picked up. I can walk with my cross on. I can go to church. I can pray. I can object,
    you know. I can -- Like my daughter was going to a Catholic school. Her and I, when she was in the ninth grade, we went
    to Pro-Life March of Life. To me, that's a privilege. To see that, to advocate that. I don't see myself that I can live
    anywhere else because of the politics. I have two centers in Iraq, in the northern of Iraq, and I worked with one of the
    priests - a good friend of mine - we established mental health clinics in the northern of Iraq after the invasion of ISIS.
    When I went there twice, the first time I was really all excited, because it's - oh my god, I'm going to see my homeland,
    I'm going to see my village, which I've never seen after literally 35 years of me leaving Iraq. It was the excitement
    of the moment. The second I was, no - because I started to pick up on things. I couldn't drive, I couldn't go get stuff,
    I was not free. I did not - there was a lot of restrictions. Here - there's not. Here, it's like, it's freedom. If you
    can excel, in school. Probably, if I was in Iraq, or any other, I could have not finished school. But here, I was given
    an opportunity - despite my age, despite of difficulties, despite the struggles, we managed. We failed, we had to repeat
    classes, we had to disconnect from school and go back. So the doors always open here, for people to come in and start
    over. And I cannot see this anywhere else. I don't see it in Europe, I don't see it anywhere else here. You can start
    over. I have a good friend of mine who I just met about a year ago, and he's a neurophysiologist, and he just came from
    Iraq. Sometimes, like, we were working in the yard the other day, and he said, I'm thinking to go back. And I'm like,
    no. That's not an option. Which is - he's hurt. His best friend betrayed him. And my friend and I helped him. And now
    he works from a neurophysiologist to a nursing aid. Look at the difference. But he's putting, like, literally, he's working
    twelve hours. He worked twenty days straight - twenty days, twelve hour shifts, okay. He's living on the minimum right
    now. But I told him, you have an option. Here, you can excel. You have to start studying. And I asked him - I said to
    him, did you lose motivation? He was like, no. I'm like, okay! So, if he's an MD, neurophysiologist, he knows everything
    about here, the brain, they don't lose interest. I said to him, then let's get on it, you know. He was like, I'm 47. And
    I'm like, that's fine. I said to him, I was 21 when I graduated from high school. I said to him, here, there's no time
    limit. This is the beautiful thing that everybody loves here. That doesn't mean we don't have struggles. But the next
    morning, it's a new day, the sun shines, and you start over again. Other places, there's fear. You don't know if you're
    going to get up in the morning. You don't know if somebody's going to go and come in inside and kill you, or people are
    watching you. I don't think of these things, you know. When I went to Iraq, and I was walking with a priest, you know,
    so the priest has his collar. And I said to him - I was walking, like, literally in the northern of Iraq, and I said to
    him - do I need to hide my cross? And he was like, nope, you better not hide the cross. So, to me, he was trying to tell
    me, do not be afraid. Because I was in a Muslim country, I was afraid to keep my cross in. And there's like Turkey - Turkey,
    if you go visit, you cannot have your cross out, because then you're going to be discriminated against. Here, it's home.
    It gives me a sense of security, sense of hope. It gives me - everyday, I'm not going to be afraid. I know my daughter
    will leave, she can come back, like she travels with her friends. I know nothing's going to happen. She's going to come
    back. You know, it's just that sense of comfort with everybody.
- speaker: Interviewer
  text: Absolutely, that's so meaningful. So you talk about how fear - there's such a lack of fear here. Can you talk a little
    bit about - I know you were very young when you were in Iraq - were there any fears that you had in your mind even at
    that young age, and how did they change when you came?
- speaker: Respondent
  text: Well, yeah, of course. Remember, I said we lived one year - I remember one incident, actually, when my dad decided
    to leave. The year prior to that, we had a house. So, my dad had to sell the house. I was, like, about twelve years old
    at that time. I remember our house had a huge lot that's separated, like - my house, like, you'd go from west side and
    this side. So, the backside of the house was a huge lot that leads you to a different alley and different route of the
    street. I remember at that time, my dad did not sleep all night. My parents were rotating back and forth, and he was -
    I remembered, it was - when was it? It was around this time, around fall time, and my dad was like, somebody needs to
    be up all night. And all of a sudden, I heard dogs barking, and my dad was downstairs. He noticed people - because there
    was people who knew that we sold the house - they knew there was money in the house. They were about to rob us. Because
    there is no banks, no wiring, all that good stuff that we have here. My dad was really, like, strong and very - you can
    - he's not a timid person. So he just went outside and - that was about 40 years ago, he had a rifle - and he started
    hitting with the rifle. That was, like, some kind of signal to the thieves, that we have a gun here. So, immediately,
    within a week or so, we had to move to a different city, and then we lived in that different city.
