collection: refugee_archive
source_url: https://rfmi.princeton.edu/
turns:
- speaker: Interviewer
  text: Can you tell me about your Muslim identity and your homeland of Sindh?
- speaker: Respondent
  text: I am from Sindh, a region in modern Pakistan. My Muslim identity is deeply connected to the culture and history of
    Sindh. It is a place with a rich tradition of Sufi poetry and spirituality.
- speaker: Interviewer
  text: What was your experience with the Pakistani government?
- speaker: Respondent
  text: I was blacklisted by the Pakistani government because of my activism and efforts to spread awareness about religious
    tolerance. This forced me to go into hiding, and I was under threat of arrest and even death. The government also intimidated
    my family.
- speaker: Interviewer
  text: What made you decide to move to the United States?
- speaker: Respondent
  text: I realized I could no longer live safely in Pakistan. I wanted to do something meaningful, so I decided to move to
    the US. I met with a lawyer, and my case was expedited. In 1994, I had my immigration interview, which was difficult because
    of language barriers, but with help, I became a citizen.
- speaker: Interviewer
  text: What was it like when you first arrived in the US?
- speaker: Respondent
  text: It felt like a second birth. I had only $13 in my pocket and was working odd jobs. I used that money to make a phone
    call to a friend who promised to help me. It was a relief to be here legally, and it started to feel like home.
- speaker: Interviewer
  text: How did you manage to persevere through these challenges?
- speaker: Respondent
  text: 'Two things helped me: the example set by my mother and the poetry my father gave me. My mother was a strong woman,
    not traditionally educated but very aware. She wanted her children to be educated and helped other children, especially
    girls, to get an education. The poetry gave me strength and hope.'
- speaker: Interviewer
  text: How did your family cope with the situation back home?
- speaker: Respondent
  text: I communicated with my parents through letters, sometimes not sent directly to keep them safe. When they visited me
    in the US, I realized they had been harassed monthly by the military. My mother had cancer during her visit in 2008 and
    died shortly after returning home. My brother was murdered in 2015, likely in retaliation for my activism.
- speaker: Interviewer
  text: What was your experience with the asylum process and citizenship?
- speaker: Respondent
  text: I continuously applied for asylum after arriving in 1994. It took a long time, especially after 9/11, but I finally
    got citizenship in 2006. I was unemployed and uninsured when my parents visited, but I received help from Catholic Charities.
- speaker: Interviewer
  text: How did you get involved in activism and community work in the US?
- speaker: Respondent
  text: I looked to the NY Tibet Center to see how they operated. I wanted to create a newsletter to bring awareness to the
    persecution of Sindhis while working multiple jobs. With support from a friend, we started a business, but my focus remained
    on raising awareness.
- speaker: Interviewer
  text: How did you establish your organization and adjust culturally?
- speaker: Respondent
  text: I reached out to the executive director of a Kurdish organization who advised me to move to Washington DC to start
    my organization. With support from friends, I moved and was helped by a Quaker neighbor. I adjusted to American slang
    and culture but still consider my friend very close.
- speaker: Interviewer
  text: What are your thoughts on freedom and innovation in America?
- speaker: Respondent
  text: America offers freedom, creativity, and innovation. Before coming here, I only knew about it from reading. Seeing
    it with my own eyes was different. I've visited other countries to see different examples of capitalism and socialism.
    Here, I can bring attention to truths and make a difference.
- speaker: Interviewer
  text: How do you feel about America as your home?
- speaker: Respondent
  text: America feels like home to me. One unique aspect is how everyone greets each other warmly. The ideals of life, liberty,
    and the pursuit of happiness resonate deeply with me.
- speaker: Interviewer
  text: What message do you want future listeners to take from your interview?
- speaker: Respondent
  text: I want them to remember a saying by Confucius and the letter Lincoln wrote to his son, which is still passed down.
    I also recall a Clinton speech about America being for everyone, no matter when they came. If I could leave them with
    one word, it would be 'beautiful.' I want to touch their hearts with authenticity and truth that never grows stale.
- speaker: Interviewer
  text: How has your activism impacted awareness about Sindh?
- speaker: Respondent
  text: When I started, no one knew about Sindh. Now, there is a Congressional Sindh Caucus, Sindhis have been hired in the
    consulate and embassy, and there was a research report on human rights in Sindh. I've testified at the UN, Congress, and
    in the media. I see universities as the fifth pillar of America and want to reach them too.
- speaker: Interviewer
  text: Can you tell me about the role of Sufi poetry in your life?
- speaker: Respondent
  text: Sufi poetry is about pure love. It was taught to me by my father and has been a way to communicate with him. The poetry
    encourages connecting with infidels and tells stories about love's importance, even justifying an unfaithful wife if she
    doesn't feel true love. Women are often the heroines in this poetry, capable of overcoming any obstacle.
