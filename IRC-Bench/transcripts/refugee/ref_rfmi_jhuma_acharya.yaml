turns:
- speaker: Interviewer
  text: Can you please tell me where you're from?
- speaker: Respondent
  text: I'm originally from Bhutan, but I live in Columbus, Ohio.
- speaker: Interviewer
  text: What was it like growing up in Bhutan?
- speaker: Respondent
  text: Growing up in Bhutan, I don't know that much of reflect uh recollection of my childhood. Although I spent early 13
    years of my life, 13-14 years of my life in Bhutan, I grew up in a very small countryside. My parents were farmers, I
    went to a local private school, government school, walking almost two hours from my home to the school. And two hours
    back from the school, so it was kind of life urban, very very, I mean, very, very rural life where I think it was it was
    a different life than what I see today. Because we didn't have any locomotive where you can take buses or anything like
    that. So we have to walk all the way. But it was growing in a very beautiful environment, had a very good family support
    of educating me.
- speaker: Respondent
  text: Being a son of a farmer, I have to work help my parents and my and my everyday life course. So, it was, it was not
    a bad memory. It was good growing up together with parents and my siblings.
- speaker: Interviewer
  text: So like you said, you walked two hours to school every day. So was that like, five days a week? You would walk?
- speaker: Respondent
  text: Five days a week yes, five days a week. Monday to Saturday. So our Sundays were off, Saturdays were half days. So
    every day.
- speaker: Interviewer
  text: Wow. Did you have any siblings growing up ?
- speaker: Respondent
  text: Uh, yeah, I am the fourth son of my parents. We were all together five siblings. I was the fourth one. My youngest
    is five years difference to me. So we didn't go school together. But I have other cousins who went school together with
    me. And we also have a lot of students from the village we all, we all walk together to the school and came back.
- speaker: Interviewer
  text: So did you have a big family like with um like cousins and other relatives growing up?
- speaker: Respondent
  text: Yeah, we, right now is biggest. We are very big family because we grew up exponentially. But back growing up in my
    childhood, my, my dad has only one brother, so we were...I mean, we were five siblings, and my uncle had four kids. So
    we were all nine together altogether. But we grew up in a very close, kind of single family home, living together. And
    we all grew up together.
- speaker: Interviewer
  text: And what kind of impact did religion have on your childhood?
- speaker: Respondent
  text: Religion plays a very important role in my life and most of our families life, because I, I am a...Brahman which is
    which I hate to say but that is the real reality. Our community - society is divided into strata like Kshatriyas,, Brahmins,
    Shudras. And also, fortunately, and unfortunately, at 1.4 g...unfortunately, I'm in from the Brahmin family. So my parents
    would prefer to teach most of the religious part of the life at home. So we sit with my dad early in the morning, recite
    Gita together with siblings and my cousins. And once everything is being done, then I have to follow what other religious
    rituals are there in the family to go up. So those were very important part of my everyday growing, including my siblings,
    so that actually has a real life to me. And today what I see religion is so much different than what I learned in childhood,
    but it is not a negatively it is more like positive aspects. I see in modernization of religion, but at the same time,
    it was very essential component of growing together, learning about life, what humanity is, how can you serve in many
    things better as you go or. So those were all the gifts that my parents and grandparents gave me.
- speaker: Interviewer
  text: So from Bhutan, where did you end up going?
- speaker: Respondent
  text: So I grew up I was born raised for my early 13-14 years of my life in Bhutan. During that time, Bhutan, I did not
    know at that time, because I was too young to know Bhutan was undergoing a lot of political turmoil inside, there was
    a plan by the king to do our ethnic cleansing, where they would like to eliminate all the Nepali speaking people inside
    the country because the king thought that these are the people from foreign land from Nepal. So they got to go back to
    Nepal or else if they want to live in Bhutan, they have to act like Bhutanese, dress like Bhutanese, have a fate like
    Bhutanese, like follow Buddhism. Wear their dresses, follow their culture norms, forget all Nepali or Hindu cultures and
    things like that. Those were going on when I grew up but I didn't know the reality because I was too young to know. And
    and the other part was I was in the central part of the country where I went for my schooling. So I did not uh after,
    when I was in my seventh grade, we heard a little bit because there were no TVs. There, there was one single newspaper
    that was circulated around the country, but our school would get a late news like last week newsletter we get this week
    so you don't know what happened currently. So we got we used to get but the school banned all newspaper in this school
    building. So we didn't get any news. There were no TV, no news. Later, after we I knew that there was the disturbance
    was going on in South Bhutan where we live. And the government was planning to, like, close all the schools at the southern
    border and send all students should not inside mix in this school where they don't have any Nepali speakers, things like
    that. So that I knew early when I was in eighth grade, which was I think I was 14-15 years old. So there after, we were
    very badly, very differently treated in this school, like because we speak Nepali. So we were always considered always
    told, like we were the, we were the children of terrorist, childrens of Milopses, which means like people who do not belong
    to the country. And they always suspect us for any simple reason. So one evening, the principal invited all the Nepali
    students in a.. in a dining hall and gave a lecture saying that our parents are planning to leave the country. So we were
    supposed to join them. So the next day I was called to the office, it was asked to leave the school. So I left the school.
    I didn't know what was going on in reality, because we could hardly understand what was going on.
- speaker: Respondent
  text: And maybe because I was too young to understand those that climate. So I left. I took a bus, I went back to my hometown.
    After the bus dropped me, I have to walk around another two half, two and a half hours to reach my village. When I walked
    to my village on the way I was interrogated by police lot of time because they were asking me where I was going, where
    I was coming from, why I was walking by myself, things like that. And I keep telling them I'm from school, I'm going back
    to the village because my parents want me to back back home. And sometimes I was told "Well, your parents may not be there
    because they might have already left the country". I was just 15 years old. You can just think how was a 15 year old can
    catch those kind of torture when I realized later on. When I went home, things were so different. I my I asked my dad
    what how things are going on. He hesitated to tell me because he doesn't want to torture young brain. But I live in a
    village for next two months. Within the two months, I have witnessed a lot of killing of people, like the army from the
    government used to come to the village and burn house, burn people a live. We have witnessed that several times. And because
    of that fear, we left the village. We were actually asked to leave the village time and again. So we left the village,
    we went to a little easier part of the town. And we were even asked to leave there. So thereafter we left for Nepal. And
    that was in 1992, June.
- speaker: Interviewer
  text: So you said you were stopped by the police on your way home from school. Did that happen often or did it - was it
    just a couple of times?
- speaker: Respondent
  text: That was often, I think that happened to pretty much all the people in the village. That was the intention of the
    military force in the village. There are a couple of cops and there are a couple of reason why they are deployed in the
    village. One was to create a fearful life for the citizens, so that they will feel themselves that they cannot live anymore
    and they will get out of village by themselves. The other one was our Bhutanese armies. At that time, were allowed to
    do anything they like. You [Bhutanese soldiers] can come to your house, kill your animal and eat. You can they can come
    to your house, destroy anything they have. You have they can come to your house, rape your...like a sister, Sister in
    law's mother in front of your eyes, they're allowed to do anything they like. That was the order from the government,
    they will say all the time, this is what we're supposed to do. So that the people there is there is a create our own sense
    of environment of fear. And people will not overstand that and live by themselves. So there's a kind of policy they would
    like to make so that people are not forcefully evicted, but they are living by themselves so but the reason behind living
    themselves. This is all in the background like so, even though come multiple attempts are made to rape my mother, my grandmother,
    and my sister in law - whose husband was put to jail. So these are all the various reasons why people are leaving. So
    I left with my parents. I was the only English speaking person my family because my youngest brother was in his school
    in Northern Bhutan. My another elder brother was a school teacher, was not even a ware of what was going on because he
    was northern most part of the country. So then we left, we left around midnight. And we reached Nepal the next day.
- speaker: Interviewer
  text: What was your journey like, traveling to Nepal?
- speaker: Respondent
  text: So one of the Indian merchant was kind enough to rent us a truck, a big, we used to call Punjab-bhole truck. I don't
    know how much you understand. They are more like a trailer truck. So these are the trucks that have the high bar so people
    all can get inside. So five families, five now Bhutanese, Nepali speaking families, we all mounted the same truck. You
    can just imagine there were 27 people all together. So we took that bus and we took that truck early in the morning from
    uh bordering Indian state. Then they drove us all the way to West Bengal - Assam, West Bengal - then finally came to India
    and then Nepal. The journey was, for me, it was one of the longest journey I've ever taken. And especially with parents,
    my grandma was probably seventy years by then. So, it was a different experience, uh a experience of unknown, where you
    are going, like there was no destiny. Well, there was a destiny as we're going to Nepal, but we were not sure what is
    life going to be? How are we going to make up our life there? And how can we survive without even having anything with
    us? Because we left pretty much everything in terms of property, land, belongings, everything. We just ran away. So I
    was, although I was young, but I was constantly thinking of what's going to happen. What, how are we going to make life
    because we have never been to Nepal before, though we speak same language, everything was common. But still we were...the
    journey of unspecific, you know, in tense and where to go. And the other thing was I was exciting also because we were
    the big group of people together. So well, if something happens to me, there are people who can support me. Things like
    that were in the mind. So that was the part of my journey. That is what I still remember.
- speaker: Interviewer
  text: When you reached Nepal, how did your family get settled in?
- speaker: Respondent
  text: So at that time, that was early 1992. Since 1990, UNHCR started sponsoring refugees in the refugee camp. So there
    were already pre-established refugee camps, people were already in the refugee camp. When we entered the border checkpost
    of India, Nepal, we were taken to a registration post where you register as a refugee - Bhutanese refugee. That memory
    is still very vivid in my mind and very much torturing to me every time when I talk about refugee refugee issues. How
    a person can become a refugee in a split second. A second before I was Bhutanese in a truck with my parents still thinking,
    I belong to Bhutan. I have a land. I have a home and a place to call home. But once again, after I cross Nepali border
    to Indian border and cross to Nepal, then we were registered as refugee. We were given a number. Okay, this is your refugee
    registration number. That was so most painful, and it's still painful. That became like a lifelong password for me that
    I will never forget. You know. So we registered. There all family members registered. We were 27 - 28 people in the same
    truck. But there were lots of people coming at that time. The in flux was very high, Bhutan was sending, kicking people,
    so many at that time. So the in flux was very high, we have to wait six hours in the line to get registered. And after
    getting registered there at Calculetta, which are the checkpost. Jhapa at West Bengal in India, West Bengal and Nepal
    border, then we have to take another, an hour long drive to go to a refuge nearby refugee camp where we will be then given
    a small hut to live in there after for the rest of the life. So we went to the refugee camp after registration, that was
    late evening. And that was the day Nepal received the heaviest number of refugees. So there were around 59-60 trucks like
    ours. Some were bringing multiple families in the same truck. We were like five families in our truck. There were trucks
    with carrying 10 families together of small size. So that's how I register as a young refugee boy in Nepal in 1992.
- speaker: Interviewer
  text: What was your experience like growing up in the refugee camp?
- speaker: Respondent
  text: Refugee camp happened to be a common home for people like me. Like we grew up together. There are lots of people that
    I know before because some of them were from the same village where they...we went to the same schools but there's so
    many strangers. So we grew up in a group of strangers and non people together. Growing up in refugee camp was very much
    challenging. Challenging at the beginning, because like it was to adopt to a new place. Although the culture, climate,
    everything was pretty much the same, but the way you live, because you used to live in a house, but now you're going to
    live in a six by six square foot tent. You know, for the rest of your life, there could hardly be a bed for you to sleep.
    You have to sleep on the muddy floor, just put a blanket at the top of the floor and sleep. Or like have your brother
