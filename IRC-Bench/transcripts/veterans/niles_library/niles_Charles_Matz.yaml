collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: When did you enter the Service?
- speaker: Respondent
  text: I entered Saturday, December 6th, 1941.
- speaker: Interviewer
  text: Where were you living at that time?
- speaker: Respondent
  text: I was at 4726 West Schubert in Chicago.
- speaker: Interviewer
  text: So, that would be around?
- speaker: Respondent
  text: Diversey and Cicero. Cicero Avenue is 4800 west.
- speaker: Interviewer
  text: What were you doing at that time in your life?
- speaker: Respondent
  text: I think I worked for Chicago Rotoprint at that time.
- speaker: Interviewer
  text: So you already had completed high school?
- speaker: Respondent
  text: No. I had to get out in my second year. We had a large family, and my dad said, "You know how to read and write. You
    go to work." So, you go to work. It was the Depression-- we had six people in the family, four boys, two girls. It was
    hard for my dad to support us almost. So, soon as you were old enough, I was selling newspapers when I was only six, seven
    years old. I worked with a peddler in vegetables. Everybody had to work in the family. It was rough in the Depression.
- speaker: Interviewer
  text: What high school did you attend?
- speaker: Respondent
  text: Foreman High School.
- speaker: Interviewer
  text: You learned a lot there?
- speaker: Respondent
  text: Well, first, I went to Lloyd School. I graduated from sixth grade -middle-school. I went to Kelvyn Park the next two
    years, and then I was going to go to high school. I went to Lane Tech. They just opened up, and I was only about two months
    there, and they says, "You're out of our territory. You can not be here in Lane Tech." So, I was transferred to Forman
    High School. So I used to walk all the time. Forman High School is on Belmont and Leclaire, about 4900 block on west Belmont.
    I walked back and forth both ways.
- speaker: Interviewer
  text: So did you enjoy working for the Rotoprint--
- speaker: Respondent
  text: That's associated with W. Hall Printing Company. They did telephone books. Well, the Rotoprint is a big press with
    big rollers, and it goes real fast. And we printed mostly catalogs for Wards and Sears, stuff like that. And it was a
    really rough job there. But what are you going to do? Depression time.
- speaker: Interviewer
  text: So then, when the war breaks out in 1941, for the United States--
- speaker: Respondent
  text: Yes, it was December 7th.
- speaker: Interviewer
  text: So were you drafted, or did you enlist?
- speaker: Respondent
  text: No, the ruling at that time was that, if you got drafted, you had to go into the Army. Well, I didn't want to go into
    the Army. So, it was on a Saturday afternoon, I went downtown, the city of Chicago, by the U.S. Court building. And there
    was a Marine in there. And he looked sharp with those dress blues. I said, "I want to go--I want to join the Marines."
    I go upstairs there and go into the Navy Department. I says, "I don't want the Navy. I want to be a Marine." He says,
    "You go with the Navy because we don't have doctors. The Navy takes care of the Marines." So, we go up there, and you
    got to strip, you strip. And he marks 17 on my chest with Mercurochrome or Methylene, whatever you want to call it. 17.
    I says, "What the heck is that for, now?" "He marks all your papers 17," he says, "That's so, you're all naked, the doctor
    knows one from the other, so you can't put the paper with somebody else's and switch papers." They were very smart. So
    we had to go through six or eight doctors, getting examined. Then I come home that night, and we all talk. Our family,
    we're talkers. We talk like oh, heck! My ma says, "How come you're so quiet? You're not saying nothing." I says, "I'm
    leaving." I said, "I joined the Marines." She says, "You can't go in the Marines. They want great big guys, not a little
    guy like you." I open up my shirt. "See, it says 17." Oh, then, my mother starts crying. "You're going to die. You're
    going to die. All the Marines, that's all they do! They all die!" So, what are you going to do?
- speaker: Interviewer
  text: So you--the war broke out on--
- speaker: Interviewer
  text: December 7, 1941, and then at the end--
- speaker: Respondent
  text: The next day, the very next day.
- speaker: Interviewer
  text: Then later that month, December the 30th--that's when you decided to go in, right?
- speaker: Respondent
  text: No, I was already in there, but they said, "When do you want to leave?" I says, "I want to stay home until the day
    after Christmas."
- speaker: Interviewer
  text: So what day did you actually go down and sign up?
- speaker: Respondent
  text: I went in there December the 6th.
- speaker: Interviewer
  text: The day before.
- speaker: Respondent
  text: The day before. When we were downtown, celebrating with my buddies, we didn't even hear about that. We were all bar
    hopping. One guy was in the Army already. And one guy just came out of boot camp in the Navy. And they said, "Oh, they
    bombed Pearl Harbor." "So what?" I says. I didn't know what Pearl Harbor was. They said, "We're at war." We didn't know
    that.
- speaker: Interviewer
  text: So you actually went in before?
- speaker: Respondent
  text: The day before. I knew I was going to be drafted, and I didn't want to go in the Army.
- speaker: Interviewer
  text: So why did you know--why did you think you would be drafted?
- speaker: Respondent
  text: Oh, they were drafting, numbers would go up in the paper. They would publish in the papers your number when you were
    ready to be drafted. I was 22 years old, and not married, and I was in prime condition, so I knew I was going to be drafted
    pretty soon. My numbers were going to come up, and I didn't want to go in the Army, so I joined the Marine Corps.
- speaker: Interviewer
  text: So, it seemed to you and your buddies, at that time, that the country was getting ready for war?
- speaker: Respondent
  text: Oh, yes. We were all getting ready. They were sending everybody all over out there. It was coming. It was coming.
    Everybody knew that. Everybody knew that.
- speaker: Interviewer
  text: So did your parents mind you going in the Service?
- speaker: Respondent
  text: No, they didn't mind. Well, you have to go. You have to go. I said, "I'm going to be called up anyway, any minute."
    And I was fortunate. Normally, when you're east of the Mississippi, you go to Paris Island, South Carolina. They call
    it P.I. The boot camp west of the Mississippi, you go to San Diego. But the camps were so full, they sent me to San Diego.
    Thank God, I went to San Diego! I went to San Diego in the Marine Corps boot camp there.
- speaker: Interviewer
  text: Why do you say--is it easier or different?
- speaker: Respondent
  text: No, but the climate is altogether different. It was like in the movies. They called me a Hollywood Marine. See, a
    P.I. Marine is Parris Island. And you go to San Diego, you're a Hollywood Marine. It's like saying the Chicago Cubs and
    the Chicago White Sox. You're just a little something like that.
- speaker: Interviewer
  text: Were you the eldest son?
- speaker: Respondent
  text: No. I'm the baby of the family. I'm the youngest.
- speaker: Interviewer
  text: Had any of your brothers had to go in?
- speaker: Respondent
  text: No. Well, my brother, Art, later on, he went into the Army. They drafted him. They were drafting everybody. He had
    one thumb off. He was working on a print press. He was working. Everybody had to work. He was only a kid. The machinery
    didn't have any guards. He put his finger in there and his thumb came off. So, they said he couldn't use it, but, later
    on, the Army drafted him. They made him an MP up and down the east coast of Florida, back and forth. He was an MP on a
    train for the Army.
- speaker: Interviewer
  text: Even without a thumb, they still took him? Wow!
- speaker: Respondent
  text: Yes. Later on, towards the end, they were using--we were using people like you wouldn't believe. We started with hardly
    anybody. We wound up with 10 million men under arms.
- speaker: Interviewer
  text: So you got into the Marines. You didn't want to go in the Army.
- speaker: Interviewer
  text: You see this guy looking good in his dress blues.
- speaker: Respondent
  text: Oh, awfully sharp.
- speaker: Interviewer
  text: Okay. I'll be a Marine! So, you were, what, inducted downtown then, and they sent you by train out there?
- speaker: Respondent
  text: Yes. By train there. Yes.
- speaker: Interviewer
  text: So was that the first time you ever were out of Chicago for any length of time?
- speaker: Respondent
  text: Yes. We never travelled. We had no money. We had nothing to do. Coming out of the Depression.
- speaker: Interviewer
  text: So what was basic training like?
- speaker: Respondent
  text: Oh, it was really rough. You had to do, first, you go to the quartermaster, and they throw, just throw, clothes at
    you. I tell them my right size. "Don't worry about it. You'll grow into it." This sergeant, he says, "I know what the
    size is, that's the size you're going to have." That was it. Now, we go to boot camp. It was rough. No, you couldn't eat
    no pogey bait. Pogey bait is candy. You can't do this, can't do that. You get up at five o'clock in the morning. You don't
    go to bed at taps at 10 o'clock. You really work right around the clock. So, we were getting to the end of boot camp.
    I think it was twelve or fourteen weeks. And I had about three more days to boot camp before we all graduate out of boot
    camp. And the last thing we were doing was on a firing range. So I figured I shot expert, and I wanted to shoot sharpshooter.
    If you're sharpshooter, you get two dollars more a month. That's a lot of money. If you're a sharpshooter, you get a telescopic
    sight, and you're special. And I was on a range. I shot expert already. I was going to shoot for sharpshooter. My rifle
    started going all over the place. The gunnery sergeant grabbed me, said, "What's the matter with you? Hold that rifle!"
    And he looked at me. "Corpsman, Corpsman, come over here!" He looked at me, put a thermometer in my mouth. "You've got
    104, 105 fever. You've got cat fever." They call it cat fever when you get all these shots, diphtheria, and tetanus, and
    yellow fever, all kinds of shots, you have a reaction. So, then they put me, the corpsman called an ambulance, I went
    in a hospital there in San Diego. Was it beautiful in there! All the nurses wore nice white uniforms, all pretty. The
    corpsman, all white. They were all pretty. I was there for five days.
- speaker: Respondent
  text: I come down, my seabag, somebody packed my seabag when my platoon graduated. They all went to different places, some
    to Infantry, Board of Transportation, communications, and what not. Where they all went, I don't know. I had my seabag,
    was up there, and four other Marines. We don't know each other, but we were all boots. They say--there was a truck out
    there, "Get in the truck. You're going up to Camp Elliot." It's about thirty miles outside of San Diego. We go to Camp
    Elliot. We report to the first sergeant there. He's going topside. All the barracks on, first and second floor you say
    in civilian life, but in the Navy and Marine Corps, it's first deck, upper deck. "Go up the upper deck," he says. "There's
    some officers will interview you guys." So we went up there. A little while, about four officers come. Oh, we jump up
    to attention! We're boots. We've never seen anybody. But a Major! It was like the pope. We jump up! "Oh, relax. Sit down.
    My name is John. This is Frank." Holy God! We shook hands. You don't call an officer by his first name! So, the officer
    says, "Now, let's get this straight. All you's are 21 years of age, right?" "Yes." "None of you's are married, right."
    Right." "Okay, so you're all going to take a physical." Take a physical? Hey, we came out of boot camp. We're hard as
    a rock! "You all got to sign papers, since you volunteered," One guy says, "Volunteered? We didn't volunteer!" In the
    Marine Corps, you learn you never volunteer for anything. He says, "You volunteered for the Carlson's Raiders." The Carlson's
    Raiders are like a copy of the British Commandos. Like now, you go in the Navy SEALs and stuff like that. And it is a
    special group. We said, "We didn't volunteer." "What do you mean, you didn't volunteer!" "None of us volunteered." "You
    want to volunteer?" "No." We turned it down. "So, then, no use talking to you guys!" They left. Then, I got put in the
    2nd Marine Division, 10th Marines Artillery. That's in San Diego. We're training. Well, skip that. We've got along way
    to go, so--
- speaker: Interviewer
  text: Did you ever go back and retake the test to become a sharpshooter?
- speaker: Respondent
  text: No, no, that's over with. You are out of boot camp. You go out of the range. You're through with that. I qualified
    as an expert. I got a medal for expert. That's it, now.
- speaker: Respondent
  text: We're training there in San Diego. Now, they split us. They keep expanding so fast. Everybody's expanding. Now, the
    war is on; they're drafting like mad. Now, they say, "You go to the East Coast." Now, we train, we split the whole outfit,
    and we went to the East Coast, Camp Lejeune. It's in North Carolina. I get there, and in the artillery outfit there. And
    we're training. I really knew artillery. I really studied all kinds of books I could get on it. Most people don't do that.
    I'm a reader. That's why I come to the library. I love reading. And I study everything in there, and now I made corporal.
    I'm a big shot now! Boy, I'm an NCO. I'm going to be in charge of the working party instead of being in the working party!
    He said, "Get up. Go up there. The first sergeant wants to see you." Oh, I come up, and I says, "Boy, I'm going to have
    my first shot of taking charge of somebody!" The first sergeant says, "Pack your seabags. You're going into the Army."
    I says, "What! I don't like the Army! I'm a Marine!" "You go where the Marine Corps sends you. There's thirty-three of
    you all picked. I don't know how they picked you all guys, but you are all going to Aberdeen, Maryland, the Chemical Warfare
    Center of the United States. They think the Japs may be using gas, and you thirty-three guys are going, got to go on a
    crash course up there." And, oh, the Army, they treated us like God! These guys were cooks on a train, these colored guys,
    they were, oh, the best cooks! There were--they made us liver and onions. They made us anything we wanted. For the Marines,
    anything. Oh, but we had a real hard training there! We came out of there, the thirty-three of us, and we had special
    papers. Nobody could touch us. We were going to go right to Australia and meet the 1st Marine Division. They were coming
    off of Australia, off of Guadalcanal. Now from there, we graduated. We all advanced one grade. And I get to be a sergeant.
    Now, that's unheard of in the Marine Corps. It takes you ten years to be a sergeant. First, I'm a corporal, and, two or
    three weeks later, I'm a sergeant! So, okay. Now, we're going to go--we travel by train to the West Coast. And, oh, the
    ship we went on, it wasn't even an American ship. It was a Dutch ship. I don't think you want to go into that.
- speaker: Interviewer
  text: What was the name of the ship?
- speaker: Respondent
  text: I don't know. I don't know the name of the ship. It was a prison ship. Years ago, they had the colored, they had prison
    cages down there. That's what we slept on under the Dutch flag. We weren't in the convoy even.
- speaker: Interviewer
  text: So you sailed from San Francisco?
- speaker: Interviewer
  text: Was it San Francisco?
- speaker: Respondent
  text: Yes. We're going towards Australia.
- speaker: Interviewer
  text: And it was a Dutch flag-- are you heading for Australia?
- speaker: Interviewer
  text: Did you get seasick?
- speaker: Respondent
  text: No, but this was a rotten ship! And we had thirty-three of us Marines on there. There was about forty aircraft, I
