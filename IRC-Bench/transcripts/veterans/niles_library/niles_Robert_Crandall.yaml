turns:
- speaker: Interviewer
  text: How come you had to remember it?
- speaker: Respondent
  text: Just drilled into me.
- speaker: Interviewer
  text: Did people ask?
- speaker: Respondent
  text: Well, they used to ask because in the arrangement that I was in in NAG, we used to have to go, when we were paid,
    we went into various ports. We had a card, a pay card, and you had to give your service number. And then they would process
    that. They didn't have computers, but they'd hand you a check. That way, you would get your monthly pay, whatever amount.
- speaker: Interviewer
  text: So, did they only pay you when you were in port, then?
- speaker: Respondent
  text: Yeah, yeah, there was a lot of times I'd be out—when I was out in the Pacific for several months, I didn't get any
    pay at all because, well, there was no place to go, you know. There was nothing to spend your money on, anyway.
- speaker: Interviewer
  text: Which brought up an interesting point because the difference between which—I really honored the Merchant Marine—they
    were good people, and we worked together although we were separate in the Navy unit. They were Merchant Marine. But, in
    that period of time, I remember I came back, I forget how long they were there, but I got like a couple of hundred dollars
    because I was gone for several months. And I got them all in singles because I wanted to have a big—
- speaker: Respondent
  text: I remember the radioman who turned out to be a good friend of mine, was at my wedding when we came to Chicago, but
    he was a civilian, and they considered as an officer in the Merchant Marine. He collected eight thousand dollars.
- speaker: Interviewer
  text: Oh, my gosh. Just like today then, huh?
- speaker: Respondent
  text: There was a big disparity and difference between the Merchant Marine, well, the thing of it is that the Navy went
    in to serve, not necessarily to earn money, but just goes to show you the difference. That's why we used to have all them—pay
    cards. Wherever you went, if you needed any money, you had to go into present that card to a specific location wherever
    you were at.
- speaker: Interviewer
  text: So, did you have things to spend money on when you were ashore? Did you find stuff to spend money on?
- speaker: Respondent
  text: Oh, yeah, sure, we'd go to bars, you know, went to bullfights out in Peru, and, you know, go to movies, see plays
    in New York. Wherever we were in port, yeah, we'd want to do things.
- speaker: Interviewer
  text: But when you were at sea was there anything to?
- speaker: Respondent
  text: We gambled.
- speaker: Respondent
  text: Shoot dice and play cards. All nice wholesome activities. But, well, I didn't lose a lot, because I didn't have a
    lot to bet with, but, I mean, we'd keep ourselves busy. Otherwise, in between your watches or when things were slow, we'd
    go crazy.
- speaker: Interviewer
  text: You remember the film Mister Roberts?
- speaker: Respondent
  text: It was quite a show. You ought to see that. That was during the War where the Navy was like the Armed Guard except
    that was the Navy guarding ships, doing such long hauls between the islands and stuff. You'd go nuts. There was nothing
    else to do. Unless there was any action, I mean, you'd go crazy. So, guys would play cards. We did the same thing. We
    used to play pinochle, and bridge, and cribbage, and everything else you could think of. In fact, I used to spend hours
    upon the bridge with the Navy radioman then when we were going into Africa and those places. And, sure, we had the lookouts
    watching things, and I'd be upon the bridge, which was my post, and we'd play cribbage, play chess.... We did a lot of
    things. Otherwise, you'd go nuts. Also, I found on one ship I was on, they had another book on mathematics. So, I learned
    my own mathematics and so forth. I have since forgotten since I got out of the Navy and into the telephone company. But
    a lot of it helped me out even when I got in the telephone company. But I taught myself. Fortunately, that time on that
    trip, we had a good lieutenant junior grade who was interested in teaching and he would help me through the mathematics
    and stuff.
- speaker: Interviewer
  text: That's wonderful. Do you remember his name?
- speaker: Interviewer
  text: I always ask because I think, you know, if you remember somebody's name then they end up in the Library of Congress.
    How nice is that!
- speaker: Respondent
  text: He was Polish, I remember that.
- speaker: Interviewer
  text: Well, there you go! Close enough. You know, those Polacks, they're everywhere! The first captain I had on ship was
    Polish. Nice guy.
- speaker: Interviewer
  text: Did you see—now, you were from Battle Creek, so you were from a pretty big place in Michigan. Did you—
- speaker: Respondent
  text: I actually lived in Battle Creek and then my—I was raised in Marshall, which was about ten miles outside of Battle
    Creek—with my grandmother. My mother and father were divorced. My mother got remarried. That's how I happened to end up
    going up to Montague, because my mother had been remarried. And, so, I left Battle Creek to go up there.
- speaker: Interviewer
  text: So, then you were—that's where you enlisted, right?
- speaker: Respondent
  text: Right. I was a senior at high school at the time. And I wasn't setting the world on fire either, I don't think. But
    my stepfather was the superintendent of the Montague Casting Company which was a gray iron foundry up there. At that time,
    it was rather small, but, yet, for foundries, it was a pretty good size. He employed probably 150 to 200 people. But he
    was being transferred down to Tecumseh, Michigan, which was down near Adrian, from another bigger place. So, that was
    during just about the beginning of the year around December or January. But Montague was just a small burg of about 2000
    people. Across the lake, on White Lake, was Whitehall. It was all resort areas and stuff except for the foundry. That
    town was about 3200 at the time. But I didn't know a soul up there, because I had just moved—my folks had only been up
    there about a year and a half and I knew that if he was transferred, if I had to go down to Tecumseh and start school
    all over again, it was going to be a little difficult, because it was during midyear. So, as I said in my notes, we went
    to Muskegon, which was about twenty miles away, every once in a while on Sundays. You know, we'd save up our money working
    on the foundry and stuff. And two of my friends and I—they had the car, we would drive down to Muskegon and go bowling.
    And there wasn't any bowling alleys in Montague. Nothing. Two gas stations, about fifteen saloons.
- speaker: Respondent
  text: We'd turned on the car radio coming home. That was December 7th and we heard that—we thought, oh, my God, can't believe
    it! But whoever the broadcaster was at that time was very, very specific and, of course, it was all over the radio at
    that time. Well, naturally, you know, we were all young and hot-blooded and all of that—so really upset about the whole
    thing. And that was shortly after Germany had sunk the battleship Hood and there was a lot of hard feelings. There was
    a lot of German people there, too. On both sides, nobody was really fighting, but there was just a lot of emotion. And,
    so, I knew I was going to be transferred and I had nobody to stay with and I thought, I don't want to leave at this point
    in time because—frankly, I was about a C student, which I could have been A, but I mean, I wasn't—so, in the meantime,
    I'm going to sign up. But, of course, my mother had a fit. You know, no way you are going to do it! Because I was seventeen,
    but I don't know why things were just not too good in the family for me. But the superintendent of the school and the
    principal, two men, very nice—very nice people, and I was very active up there in social activities—
- speaker: Interviewer
  text: Oh, you were too busy to be studying, that was what it was.
- speaker: Respondent
  text: Yeah. I was in plays and all that. Well, you had to make up your own, so I did all those things. And Mr. Early was
    the superintendent, nice guy, and his daughter was a friend of mine. We weren't boyfriend and girlfriend, but he realized
    my situation. And some of them were not too favorable to my lifestyle, what was going on there in the family, so they
    waited about three or four weeks and everybody was—but, anyway, they realized that I was having some difficulty, so they
    said to me that if you'll take some examinations, we'll give you your diploma ahead of time. Well, fine. So, I don't remember
    taking the test, but I guess I did, because they said, well, if your mother will sign, you can go.
- speaker: Interviewer
  text: Well, if your mother will sign, you can go.
- speaker: Respondent
  text: Well, as it happened—unfortunately, as I said, I don't want to say too much about my stepfather who was kind of tough
    at that time—and, so, my mother said, well, yes,
