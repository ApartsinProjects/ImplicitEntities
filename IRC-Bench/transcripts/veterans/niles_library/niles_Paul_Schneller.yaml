turns:
- speaker: Respondent
  text: First of all, I didn't realize I had forgotten so much. And then when I started thinking about it, I remembered more
    than I'd thought. So, it's a good thing for an old person to recall!
- speaker: Interviewer
  text: Right. I assume you will edit some of this because--
- speaker: Respondent
  text: Yeah, well, you know.
- speaker: Respondent
  text: If you don't want us to tell--
- speaker: Respondent
  text: Then we hide it. Yeah. Sssh, it's a secret. What I'm going to do is tell you what happened, and the influences it
    had on me directly, and on my children, and then, since I became a teacher for most of my life, all of my teachers. And
    I'll end with the very interesting thing about Arlington Cemetery, and my first cousin who married a Marine. So, it will
    be washed in Marine Corps things!
- speaker: Respondent
  text: I enlisted. The war was over, but it was still on. And I was a senior in high school in 1948, so I enlisted because
    my person of interest was my cousin who married a Marine. And he was a big, tall Marine, about six foot five. And he's
    from the Mize family. And if you know your sports, his cousin was Johnny Mize, the first baseman on the New York Yankees,
    so that's kind of a connection.
- speaker: Respondent
  text: Marines were being recruited still, for the cleaning up of the war, as you call a war of occupation. It's really the
    occupation always comes after. We are still in areas of occupation, since I was in the Service. So, this is not a new
    idea. It's an old one. And it's because some of the losers are poor—they're poor sports. They will not accept that they
    lost. And they're opportunists that see a chance to blossom in a particular field.
- speaker: Respondent
  text: So, I was sent to Parris Island, South Carolina, to the boot camp. I passed my physical. And the first physical is
    in Chicago, if you're going east to Parris Island. If you're going west past the Mississippi, you go to San Diego.
- speaker: Respondent
  text: And the word "boot" means a camp. So, when the Corps was founded, and when soldiers had to live in the fields, they
    wore boots. Leather ones, if they were high enough, or they were wrapped with various kinds of leathers, things like that
    to keep their feet. And in areas of what we call beaches and, to keep the beach sand out. And then if they rode horses,
    my dad—just to reference this, I didn't bring pictures of him, he was a military policeman in the First World War. And
    I have a picture of him with a squad. And there he's standing on the end with the boots on. So, boot camp is an introduction
    to a life.
- speaker: Respondent
  text: Okay, the first thing that I can talk about here, because it all fits, is orientation and de-orientation. And that's
    the first two weeks when you go down there. And the de-orientation is to separate all your family, and friends, and ideas,
    and behaviors, because you're going to become a Marine. And that's, for a lot of people, very difficult. More so, even
    today.
- speaker: Respondent
  text: And it's the first week of training. And you have medical and dental exams. You have issued clothing and an M1 rifle
    which follows you everywhere, okay. And then you say a little prayer. I'll read that to you in a minute. And you format
    that first period, two or three days, platoons. That's a platoon. This is my platoon. And you, then I suspect, are retold,
    I don't know why I got the note, but that the British in 1948 were still rationing bread and they were still rationing
    clothes up until '49. So, while I didn't get into the fighting, (my mother said thank you,) I still got into the field.
- speaker: Respondent
  text: Okay, and I had some interesting things. What we did in the first two weeks was we marched and drilled close order
    and what they call lank ones, two miles and three, and we had calisthenics every morning before breakfast on the main
    parade ground. And the Marine band was there to play live music. And a model stood upon a post and did all the exercises
    you had to do.
- speaker: Interviewer
  text: How did they pick that person?
- speaker: Respondent
  text: I imagine he was a model of calisthenics. No doubt he's a professor of calisthenics. Because he had a natural—he had
    the greatest moves from one to the next. So, I thought, well, another guy knows what he's doing.
- speaker: Respondent
  text: And then we went marching and we would sing. And we would sing the Marine Corps hymn, and every Marine has to learn
    this by heart. And I will start my talk eventually on what I did, with the lines from here, because the Marines have an
    esprit de corps that changes them from the nice, comfortable life they went through to a terrible life, just dreadful,
    because that is not pleasant. And, you know, you got to go from my mother and her nice attitude, to my sergeant's saying
    you got to kill, this real dichotomy. So, we were told about the washouts, this is the first three days, that many of
    you will not make it even if you want to be in the Corps. The dropout rate is about 18% of the recruits. And then I will
    tell you a story about one of them.
- speaker: Interviewer
  text: So, where did they end up if they dropped out?
- speaker: Respondent
  text: Well, they were given a discharge based on medical advice from the doctors, psychiatrists, or the regular doctor.
    They found something wrong with the person, maybe one eye, or this, or something—ear. And he would be a danger to the
    squad if he's in need of supporting. The weakest link is the weakest link. And everybody in the military knows about it.
    So, it's nothing personal. It's got nothing to do with, what you would say, his political correctness or multiculturalism.
    It's survival of the fittest. So, they tell you about it, and they'll tell you why. It maybe we cannot use you, you do
    not like it, or you failed. Something like, we have, I think I've got some of the marks somewhere, but on the cards, because
    they're watching you all the time.
- speaker: Respondent
  text: And, so, they then say, alright, you're going in this platoon. And they say we're going to build muscles and confidence.
    Some days, confidence and muscles, but back and forth. And we build esprit de corps. We build into the training a spirit
    about comradeship, being a band of brothers.
- speaker: Interviewer
  text: What does that really mean besides just talking? What does it mean when they are shooting at you? And things like
    that. Longer marches, they keep you crazy. And recruits must learn to sing and they're all singing there. Now, you see
    it in the movies, they have these little talking games like rapping. That's okay, and we did a lot of them, but that doesn't
    build esprit de corps. Then we had lectures.
- speaker: Respondent
  text: Only singing does that.
- speaker: Respondent
  text: Only the singing does that, yeah.
- speaker: Respondent
  text: Right. It does. Because, I'll tell you why—but lectures about the Marines and the history. And, so, one of the things
    they very cleverly do, they weave in human values based on former Marines who did really interesting things. And they
    start that from the very beginning. And it gets them in a lot of trouble with newspaper people. The oldest Service—we
    have a big, big birthday party every year, November the 10th, because it was the oldest Service, established in 1775.
- speaker: Interviewer
  text: Okay, now, I want to talk about the reference to the first two lines, so you get a little esprit de corps. This is
    very good, yeah.
- speaker: Interviewer
  text: '"From the Halls of Montezuma to the Shores of Tripoli," okay?'
- speaker: Interviewer
  text: Are those just words?
- speaker: Interviewer
  text: They're not.
- speaker: Respondent
  text: They are shores of Tripoli. So that's Libya today. So when Jefferson was president, this took place. And Jefferson
    is a little toward the left in terms of modern days, and now wars, no wars of aggression, no fighting, just talk and diplomatic.
    So when the Barbary pirates started taking our trade merchants and holding them for ransom, killing them when necessary,
    and making them slaves until you paid tribute, and the French sent a letter that, you know, we ought to do it too, that
    encouraged the Barbary pirates to do more. So, as you can imagine, Jefferson had to change his mind. So, here commissioned
    ten ships that he had put in mothballs. And he was listening to people who were going to say this is what we can do about
    it.
- speaker: Respondent
  text: Diplomacy wouldn't work. The man was the Shah of Tripoli, all he wanted was money, for his life. They don't have natural
    wealth in those countries. The ground is very inhospitable to farming, so steal and fight.
- speaker: Respondent
  text: So, a guy came in, and Eaton, his name is, and he was an Army officer. And he had this idea. Not too many people liked
    it, but he says, let him go over there and take some Marines with him. And he says, we'll recruit some other people. And
    he says, then, like Rommel, (well, he didn't, I said Rommel,) I'll march from Egypt along the North African coast to where
    the pirates are. And he collected Greek mercenaries, who are wonderful fighters, by the way, Hitler will tell you that,
    and some Arab cavalry who are not trained, but who see an opportunity to make some money, and these little Marines, you
    know, we had a couple of squads. And they went, and they went left, and when they got to the city of Darren, I think it
    was, here was the Shah. And he left for another place, and told his men to fight off the Americans. It didn't work. The
    Americans stormed the place. They had artillery, and the Navy bombed it. And everybody in the city ran.
- speaker: Respondent
  text: And they went in, and went out, and raised the flag on the shores of Tripoli. So the song now means something to every
    Marine, that they were real Marines, and they were in a real battle, and I even think I wrote down how many survived,
    they did a pretty good job, so men numbers.
- speaker: Respondent
  text: Let's see now, this is Montezuma. That's the next one coming up.
- speaker: Respondent
  text: So, anyway, what happened was the Arabs were upset. They didn't know what to do. Jefferson sent a diplomat over there,
    and then here did everything like it was before. That's the way it works. And, so, they decided not to pick on America
    anymore, anyway.
- speaker: Respondent
  text: So that's, let's see, continue reducing civilian life things, and, so, you see in this first story, a difference.
    You see a president who is a wonderful person with a flaw, in the reality of leading and supporting the country. He's
    one of my favorite persons, but he was wrong on this. Okay, now, adding Marine philosophy and physical activities every
    day, so they're working on it. And, so then, we talk about that. And everybody—we have what we call training sheds, and
    when the flag is up, and we can't drill, because it is too hot, then we go into the training sheds. And we hear different
    people talk. This is one of them that I heard.
- speaker: Respondent
  text: Now, the next one was the "Halls of Montezuma." Where is the hall of Montezuma? Montezuma was the Aztec emperor, and
    he lived in this palace. And the Americans were being put in a very, very awkward position, because of the West picking
    away New Mexico and all of that. So, they sent Scott with the Army and a contingent of Marines; again, smallest, little
    group, but the best trained. So, off they go, and they get to Mexico City, and they attack this palace. And I wish I could
    pronounce it. What's it called? I've got it here, Katpultec, Katputatlic, I don't know. If I ever do it seriously, I'd
    better look it up. But, anyway, they landed on Veracruz. They went across the state of Florida. And when the castle fell,
    the insurrectionists ran. They took away, and the Americans put up the flag there, took Mexico City, and then eventually
    they left. They left. I got a little note here, they left, and they eventually went back into civilian life. So, that's
    the encounter with Mexico in that period.
- speaker: Respondent
  text: There are others. The Marines have been involved in over a hundred and some landings like this. They're sort of the
    policemen of the world, for good or bad.
- speaker: Respondent
  text: Now, let's see, we'll skip over here to the qualifying—oh, we had one more. I want to do this one later. Here are
    the training days for the Marines, okay, which I was an instructor eventually.
- speaker: Respondent
  text: And, so you go through the basics, mental, physical training schedule, hardness. Weeks one and two, you spend leaving
    part of yourself away and taking on a new self, okay. Then week three and four culminates in those first two weeks being
    put together, like if you read a dancer for a show. You actually do it, and practice it, and each time you do it, you
    had a burden on someone.
- speaker: Respondent
  text: And, so, by the end of the second week, certainly the third, 18% of the fellows are given a release. And they've had
    their heads all shaven, and they go home, and, to them, they're—some like it. They didn't want to go, even though they
    enlisted. They didn't know what they were getting into. Because the Marines are not drafting like the Army was. They were
    still getting people.
- speaker: Respondent
  text: So, then, the mental tests came. I had one. I remember all the physical ones you had to do, so many sit-ups, you had
    to run this way, then you had to come in and take an IQ test.
- speaker: Interviewer
  text: Did you have to do it all in the same day or in the—
- speaker: Respondent
  text: No, in the week. It was a week.
- speaker: Interviewer
  text: A hard week.
- speaker: Respondent
  text: Oh, yeah, every week got tougher. And then weeks five and six, you went to the rifle range.
- speaker: Respondent
  text: That's where I ended up an instructor, but when we went through it, we had the thing that you call snapping in or
    grass period where you just use the rifle, you sleep with it at times, and you know how to put on the belts and all of
    that. And you'll see why in a minute. Then you actually go on a firing line. That's you use live ammunition. And on the
    last day of that, you fire for qualification. And if you don't qualify, you are never put in a platoon that's going to
    be involved in shooting.
- speaker: Respondent
  text: So, you have to be—you have to be—
- speaker: Respondent
  text: Every Marine that's in is a marksman. And I am, too. And you could be counted on to protect other people. That's their
    philosophy. So, you could say the rifle is the dividing device of the Marines. So that—we'll see later on.
- speaker: Interviewer
  text: You could say that.
- speaker: Respondent
  text: Yeah. Yes, because I was there. I went through it and I taught it, so I did both.
- speaker: Respondent
  text: So, week seven and eight is warrior week, and that's where you start getting into the actual physical dimensions of
    it. And you have the best equipment that you can do. You wear helmets and you do all that. And it's rough. And if you
    make it a game, that's the way you can get away. You can pretend you're playing basketball or something, you know. And
    then week seven and eight, that's warrior week, week nine and ten, return to the rifle range for advanced training, shooting
    at moving targets, shooting with limited lights, all of that. And then you get to expand your knowledge and, not skill,
    but awareness, of weapons. You get to fire a Browning Automatic Rifle, which is a machine gun, and you just square it,
    just to feel it, because you're not going to be trained for it, because you maybe assigned to cook, so they're not going
    to waste that training. The basic training is bayonet and rifle. That's what you got to master. And then you got ready.
- speaker: Respondent
  text: Oh, this thing had a little bit of a problem.
- speaker: Respondent
  text: It's not nearly-running.
- speaker: Respondent
  text: What they're doing as they go ahead, and I got involved with some of it later, because of some of the things I would
    do, and by the 12th week, you are going to be sent to an advanced station.
- speaker: Respondent
  text: And, so, what the Marines tried to do is like a lot of colleges, tell you a little bit about chemistry, tell you a
    little bit about biology, and you get an idea of what you might want to do. I ended up being a weapons specialist. I never
    had a weapon in my life. My mother wouldn't let me have a BB gun. So, this is, you see, so, and they stressed the family
    values in this last thing. And then they had, I wrote down some of the things I remember, pilots, technicians, military
    police, special forces, flamethrowers, communication, that's the—
- speaker: Interviewer
  text: Flamethrowers?
- speaker: Respondent
  text: Huh. Oh, yeah, they had.
- speaker: Interviewer
  text: Flamethrowers.
- speaker: Respondent
  text: When they got to Japan, the Japanese would not give up, and they'd stay buried in their—the Marines would see "Are
    you there?"—they'd get shot! So, they developed this machine that they carried, all the petroleum that was the mix for
    the flame, and then a big hose with a nozzle, and then they'd fire heavily. And then the guy would go up to them, and
    turn on the flame. And it did two things. It burned almost everybody to death and/or it withdrew all the oxygen. And they
    strangled. Because they were built that way, Japanese were dishonored to—
- speaker: Respondent
  text: To—and, so, I figured I saw a movie, and maybe I saw this, I don't know.
- speaker: Respondent
  text: And then communication, that's really kind of cute. Here, let me tell you this story. Now, this is the Navajo code
    breakers, so when they saw what they were dealing with with the Japanese, they made an adjustment. And they said go out
    and recruit. And so they all went out to the Window Rock Reservation. That's funny, I go back there forty years later
    as a consultant on reading. So, the Navajos had two conditions. They had to be healthy enough to become a Marine, and
    they had to know English and Navajo fluently. No time to write it down, they had to do instant translation. So the Marines
    took these people, and I have a picture of them.
