collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So Mr. McCann, Do you recall when you entered the service of the United States Navy?
- speaker: Respondent
  text: 'Well I was going to DePaul University, and luckily I had gotten a deferment until June of ''43. Then my number came
    up in the draft. I went down with a friend, another fellow who lived down the street. At the time you didn''t get your
    choice of service. Whatever they needed: Army, Navy or Marines -- that''s what happens. So we went down and one of the
    guys told me "Kid, I''ll give you a tip, get behind the biggest, strongest guy you can find and get up near the front
    of the line." So, ok, I found a guy and he looked like Dick Butkus. He got up in front of me. He was 2nd I think, I was
    3rd. And they asked him: "Army, Navy or Marines?" And he said "Navy!" Marines he got! And I thought aw-oh. So I''m next
    - puny, little 150-pound me. And they said "Army, Navy, or Marines?" I said (squeakily), "Navy." And I got Navy. So that
    was a lucky day for me.'
- speaker: Respondent
  text: So we went home that night. We were supposed to report the next morning. This friend of mine and I, we got back the
    next day, and they told us to go home. They didn't need us for another day. So I went home. My mother was hanging the
    wash in the backyard. I told my mother that the Navy didn't want me. I said that I was only kidding and that I had to
    go back tomorrow. So we go back the next day.
- speaker: Respondent
  text: It is July of 1943. Hot, humid days, I got a t-shirt on and a toothbrush. I don't even know if I was even shaving
    then or not and that was it. So we get on the North Shore train. We're going to Great Lakes. That's wonderful. So we're
    on the train for 3 hours. And somebody said "What the heck, we been on this train for 3 hours and Great Lakes is only
    25 miles away." Then someone says "You're not going to Great Lakes, Lads." So old John McCann, expert on topography, I
    look out the window and I says "Good, we're going southwest. We're going to San Diego - couldn't get a better spot." So
    we get to Colorado and all of sudden we're going Northwest. So I said, "What the heck is this?" So four days later, no
    clothes, no toilet articles, nothing, we all stink. We end up in Spokane, Washington. We spend overnight in Spokane because
    they weren't ready for us. We were going to a place 30 miles away, called Farragut, Idaho.
- speaker: Respondent
  text: Farragut, Idaho was a piece of land that Eleanor Roosevelt's family owned and sold it to the government. It was a
    naval base up there, 30 miles south of the Canadian Border. The next day, a bus took us over there. We got our clothes,
    our shots, the whole bit, and we were all set to start on the following day.
- speaker: Respondent
  text: Boot camp took about 8 weeks. Beautiful countryside and the only thing I knew about it was that Bing Crosby had a
    house on Lake Pend Oreille. He used to come and do trout fishing. We had a tough, commanding CPO, Chief Petty Officer.
    His name was Dotson, and he really put us through a terrific amount of drilling. Every once in a while he would be stuck
    with the midnight to 4-shift - to supervise the area. What he would do we found out later, he would come in around ten
    after 12 and scatter papers on the floor. Then, he would turn the lights on and say "Alright, what the hell is this stuff
    all on the floor? That's terrible so everybody out on the grinder" (the parade ground or drill field.) He probably couldn't
    stay awake. And he'd take us to the grinder and run us for an hour or so! That was one thing he always did, but he was
    a very good instructor. We learned a lot about the Navy.
- speaker: Respondent
  text: When it came time to leave, we were entitled to an 18-day furlough. I had already applied for radar school. First,
    I wanted to be an Aerographer's Mate that would be a weatherman, but I didn't get that. I got radar school so I went home.
    It was an 1850 mile train ride.
- speaker: Respondent
  text: When I came back, we headed for San Diego and I went to radar school in San Diego for four or five weeks in a place
    called Point Loma, beautiful. I fell in love with San Diego; the weather was great. On the train going there, I met a
    fellow from St. Paul, Minnesota. Jack McMonagel and we were together then until the end of war, just happened to be lucky.
    We went to radar school together and when we finished radar school we were sent up to San Francisco to get our ship.
- speaker: Respondent
  text: Well, what you would do is, there was this big room and a big bulletin board, listing all the ships and the names
    of different people and you would look to see your name on a ship. So we had a few nights that we were free for liberty.
    So one night, he came and told me "We're on the same ship! We're on the USS Case." I said "How'd you find out?" "I looked
    at the bulletin board and there's our names." So lo and behold we went over to the Case, a 1938-commissioned destroyer,
    1850 tons. It was being repaired. It had gone to Alaska in November. It had suffered damage from high waves. They wanted
    to get us out as quickly as possible. We spent time there and we left just before Christmas of 1943, heading for the Hawaiian
    Islands.
- speaker: Respondent
  text: I remember going to Mass in the Hawaiian Islands and hearing the Hawaiian choir of kids singing, terrific. They were
    really good. While we were there, we would go out during the daytime and practice firing. We would shoot at air targets.
    They would tow a sleeve, and we would fire at the sleeve. They would tell you how well you did. Then all of a sudden,
    we get the word, we're shipping out.
- speaker: Respondent
  text: On the way to the Hawaiian Islands, we passed underneath the Golden Gate Bridge. Every one of the new recruits were
    sicker than dogs - sea sick. And the more seasick we were, the regular crew guys would say "I'll tell you what to do,
    rookie, eat." "I can't eat." "Force the food down." So we listened to them. Here we are forcing our meals down and it
    is coming up and over the side, and they are there laughing like heck. That's the only time I was seasick in my 30 months
    in the Navy even during typhoons and bad storms. I never had another siege of seasickness.
- speaker: Respondent
  text: So we head out in January of 1944 for the Marshall Islands invasion. We went out there and Eniwetok was one of the
    islands we encountered and Majuro. Another one was Kwajalein, the biggest of the three and it was an important Japanese
    base. I remember that the Marines had gone in there and everything was pretty much laid to waste. And we would go through
    there and the Marines would swim out from the island, selling Japanese flags, tokens you know, but we didn't fool with
    that because we were moving all the time.
- speaker: Respondent
  text: We headed out to sea again. We had a captain. He was an old navy man, Commander Howe, terrific, he treated everybody
    well, he knew his stuff, and suddenly he got transferred out. And this young whippersnapper, Commander Wiley, he comes
    in to take over the captaincy - real cocky. And I said "Aw-oh, we're going to have trouble with this guy." And sure enough
    we did.
- speaker: Respondent
  text: We're heading down for New Guinea, and on the way down, we cross the Equator and we had to go through being inducted
    into King Neptune's Court. And the advice that guy gave me about being up in the front line, paid off again for a 2nd
    time. I got up behind the biggest, strongest guy.
- speaker: Respondent
  text: They always brought up charges against you in King Neptune's Court, and one of my charges was that I knew more about
    basketball than one of the shellbacks. Another charge was that I was a "boon sissie" or a "cow sissie" and things they
    would make up and so on. They would force you drink the most distasteful concoction of diesel oil plus many other things.
    You would drink it and when it hit bottom, it would come right up again. And you're sitting in a chair and there is a
    canvas pool behind you. "Guilty" or "Not Guilty." And naturally you're guilty. So then they push a button, the chair is
    charged and you go over backward into the pool. And they're pushing you up and down in the water, yelling "Pollywog."
    And you're yelling back "Shellback" - that's what you want to be. And the pollywog is the lowest form of life, lower than
    a whale's belly, they say.
- speaker: Respondent
  text: So the good part was that I was number 3 in line. Once you finish all the initiation, now prior to the court date
    with King Neptune, they had you doing all kind of things - like going down to the engine room in winter clothes -- running
    up to keep warm. It was about 180 degrees in the engine room. They had you looking with two coke bottles over the side
    to see if there were any Japanese ships. To make a long story short, after I finished I got in line. And once you're in
    line - I knew ahead of time, you could paddle anybody who was behind you. There was a long line as I went through and
    they paddled my backside pretty good. But then I got to the end of the line and I got my paddle out. And there were a
    few guys that I wanted to paddle. Well this new captain, he got his ass tanned pretty well because they couldn't do anything
    to him legally but in his introduction to Neptune's Court they let it go.
- speaker: Respondent
  text: We went down to Hollandia, New Guinea and while down there we were involved with a Japanese midget submarine that
    had sunk a tanker. We came across the Japanese midget sub and the Quartermaster was the one who did all the work; he went
    and they split the sub in half, but the Captain took the credit for it. The captain was the one who did this and he did
    that. And the Captain got the awards and that's the way it happens.
- speaker: Respondent
  text: Later on then we went back north to the Marianas Operations that was Tinian, Guam and Saipan - that was pretty tough,
    had a lot of Japanese planes. Then after the Marianas they went over to the Philippines and the invasion of those islands.
- speaker: Respondent
  text: While there, that was the famous "Great Marianas Turkey Shoot" (June 19-20, 1944) when our planes shot down most of
    the Japanese air force as well as sinking much of the Japanese fleet. They were coming in and most of the destroyers were
    assigned torpedo attack on the Japanese battleships. We were scared stiff because the largest battleship afloat, the Yamato,
    was supposed to be one of the battle ships. As luck would have it, they went so far through the Surigao Straits, and they
    decided it wasn't going to work out and they turned back and went south. That was the Battle of the Philippines Sea (October
    24-25, 1944).
- speaker: Respondent
  text: Next we go up to the Iwo Jima invasion. The surprising thing about that invasion, our Task Force 58 bombarded Iwo
    Jima five different times from one end of the island to the other end. And at the same time the Air Force dropped bombs
    65 straight days. And afterwards we found out, it only killed 100 Japs out of the 20,000 that were on the island. Then
    comes the invasion of Iwo and there was a terrible slaughter for our men. Now we were out in the water so we were pretty
    well safe.
- speaker: Respondent
  text: And the Japs at this time started using the Kamikazes. Japanese planes with pilots who were willing to sacrifice themselves
    as they would try to run right into your ship. At this time Okinawa was the hot spot but we were over by Iwo, by the Bonin
    Islands.
- speaker: Respondent
  text: One night I'm on the radar and I see a contact far away, and I said to one of the guys next to me, "Take over the
    set I want to go out." I look and I see lights in the distance. I told the Captain about the comm and I said, "Captain,
    facetiously, 'Captain, it's either a gambling ship or a hospital ship.'" "There are no hospital ships out here." he said.
    "Well, that's what it looks like." So lo and behold he checks the books if there is a hospital ship, so he wants to board
    the hospital ship with an armed crew. He contacted the Commander of our Task Force, and the Commander told him, "Absolutely
    not. No." We found out afterwards that they were going into Chichi Jima, which is the island north of Iwo with troops
    and ammunition and other military goods. Had we boarded it, it would have been a real coup for the captain. That was right,
    just before the atomic bomb was dropped on Hiroshima. Then we went over to Chichi Jima and we brought back all kinds of
    guns, Japanese rifles. Everybody on the ship got a Japanese rifle.
- speaker: Respondent
  text: So this Captain of ours, I was telling you the story about the time he didn't think it was a hospital ship. One time
    we got a message. And all ships had code names, and the code names were changed periodically. And one night about 9-9:30,
    "Tulagi this is Stagehand, Nancy Hanks." The Captain calls down, "What was that? What was that? Dancing Tanks?" I said,
    "No, I think he said 'Nancy Hanks.'" All of our code books were named for different people. And he said, "I never heard
    of Nancy Hanks," and I said, "That was Abe Lincoln's mother's maiden name." So they looked in the book and the book said
    man your night signal center. They had a special deal for night; they wanted to send a message. And they finally did that.
    So after that I was in pretty good paper with the captain.
- speaker: Respondent
  text: He would call down and he would say, "My radio frequency is not too clear. Can you do something about it? Let McCann
    handle it." So I'd go over to the table and there was a jar - nothing in the jar -- just a jar we used to put stuff in.
    And I would twist it around twice. "How is it now, Captain?" "Much better, thanks a lot, Mac."
- speaker: Respondent
  text: So we go back. We were waiting for our orders to go back to the states for Navy Day. We were lucky to be sent to New
    York City for Navy Day in October of 1945. We go through the Panama Canal which was a great experience, went around through
    Panama, Colon, up the Atlantic. And I thought we were going to go down off Cape Hatteras. It was the roughest water we
    had endured. You could see North Carolina in the distance, but it was rougher than heck but luckily we got by. We got
    to New York, and so were on the Hudson River and Truman was going to come by and review the fleet.
- speaker: Respondent
  text: We were staying in a hotel in New York, the Dixie Hotel. We had free liberty. We had a wonderful deal. We were there
    for like 5 or 6 days. After that we went down to Norfolk, Virginia to decommission. And decommissioning - I thought they
    would take inventory of all the stuff on the ship. "Take what you want." "What!" "Take what you want." Guys were taking
    radio sets and everything. We had all kinds of things to inventory. "Inventory - Nothing! Deep six it. Throw it over the
    side of the ship." And I couldn't believe it so we did all that stuff and we end up in Norfolk, Virginia and we got the
    word - we had to wait for our discharge.
- speaker: Respondent
  text: And my friend McMonagel and in order to stay out of working parties, a guy told me, "Keep moving. Don't stand too
    long in one spot." So we'd be going, moving. They had these military films. Reagan was in a lot of them. There was one
    film. It was about getting the V.D. and so on. So McMonagel is in there. He tells me, he's looking up at the screen and
    he had put it up there.
