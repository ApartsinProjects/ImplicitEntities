source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: When did you enter the service?
- speaker: Respondent
  text: I was drafted in January. I went in on January 30 of 1968.
- speaker: Interviewer
  text: Did that come as a big surprise?
- speaker: Respondent
  text: No, I knew I was getting drafted. I was 1-A, just waiting to go. Everybody was going at that time. Everybody was getting
    their draft notice, waiting, waiting on the mail. I got my letter on January 4th, 1968. There it was and they told me
    to come down there on the 30th of January to 615 West Van Buren St. and start the process.
- speaker: Interviewer
  text: And how old were you at the time you went in?
- speaker: Respondent
  text: I was 20 years old.
- speaker: Interviewer
  text: What had you been doing before you were drafted?
- speaker: Respondent
  text: I was a printer, working as a printer at a print shop in the neighborhood, just learning how to do the printing stuff,
    getting a start on my job career.
- speaker: Interviewer
  text: What high school did you attend?
- speaker: Respondent
  text: I went to Schurz High School.
- speaker: Respondent
  text: Yes, I went to DePaul Academy for a year and then I transferred over to Schurz and finished my high school education
    at Schurz and graduated in January of 1967 and then got drafted in January of 1968.
- speaker: Interviewer
  text: Were you an only child?
- speaker: Respondent
  text: No, I have a twin sister and a younger sister and a younger brother. I was the only one involved with the military.
- speaker: Interviewer
  text: Was there a tradition of military service in your family?
- speaker: Respondent
  text: My dad served in World War II and my uncles.
- speaker: Interviewer
  text: So they would have understood.
- speaker: Respondent
  text: Yes, oh yes.
- speaker: Interviewer
  text: And were they also Army people?
- speaker: Respondent
  text: I did have an uncle who was in the Navy but most of them were all Army.
- speaker: Interviewer
  text: So if you knew you were being drafted, and you were, you didn't mind being drafted in the Army?
- speaker: Respondent
  text: No, I knew I was going to go. It was "let's just get it over with." Get it over with and get two years done with and
    continue on with your life.
- speaker: Interviewer
  text: So what were your first days like in the Army?
- speaker: Respondent
  text: The first day I got down there My dad kept telling me, "Don't worry about it. There's nothing to it." We left the
    house in Logan Square at 5 o'clock in the morning. I was supposed to be down there at 6 and we pull in front of the Induction
    Center about 5:30. My dad didn't say anything on the way down there. And I looked over to him, and he was crying. It kind
    of took me as a shock. Have you been lying to me? What am I getting myself into? And he said, "Just go ahead and do it
    and don't volunteer for anything. Just do your job." Those were his words to me. I got out of the car and went into the
    induction center. I got into the Induction Center; my last name began with "A." I was processed right away. From 6 o'clock
    in the morning until 7 o'clock that night I dumped the urine samples in the sink all day long. That was my first day in
    the Army and I'm going, "Boy, this is not a good start for my first day. I don't like this already." But it was quite
    a day. At this time, things are hot in Vietnam. Tet was just starting up. There were no cellphones. I didn't hear any
    news about it. We left the Induction Center that night. We all got on a bus. January 30, it was not real cold, rainy and
    overcast. They took us out to O'Hare and we got on an airplane and flew to St. Louis, which was an hour and 45-minute
    flight. Then we got on a bus that took us to Fort Leonard Wood, Missouri. You check in there and stay with your little
    group. They mess around with you all night long. You got play the Army stuff, harassing you, getting you ready for Army
    life. And then the following morning you went to the Mess Hall. They fed you. Then you got into your groups and then you
    met your Drill Instructor. You're going to your company and...
- speaker: Interviewer
  text: Was he a nice guy?
- speaker: Respondent
  text: He got off the bus. He was a character. He came up. He was pretty "shaped (well-turned-out)" He got up there and said,
    "Gentleman, I want you to know my name is Sergeant Bernard Heistan. Right now there are maybe approximately, anywhere
    between 45 to 60,000 troops here at Fort Leonard Wood, Missouri I am the baddest mother-fucker here."
- speaker: Interviewer
  text: Was that true?
- speaker: Respondent
  text: It was true. That was the first thing he said to us. And then he introduced himself to us and then we went to our
    barracks and he told us what he expected of us. How we were going to work things. We were in the new back barracks which
    was pretty nice. We had rooms of, with I believe, eight guys to a room. And it was all alphabetical order. So I was with
    Aplanack, Anders and a couple of more A's and couple of B's. But there were eight guys in our room in Basic Training.
    So you kind of "Well, you're here and so you might as well make the best of it". You started meeting the guys, "Where
    you from?" "What neighborhood?" "Where's that?" Mostly from Chicago?
- speaker: Interviewer
  text: Yes, mostly Chicago.
- speaker: Interviewer
  text: Was that the first time you were ever away from home for a lengthy period of time?
- speaker: Respondent
  text: Yes. Everybody got to know each other and it took maybe a couple of days and then you went down and took some tests.
    Then they fitted for your clothes and you started getting to know the guys. And then on the third day, they took everybody
    down to get haircuts. They cut all your hair off. And everybody looked different so nobody knew who was who. You had to
    learn everybody all over all again. They broke you down first of all. They wanted to let you know you know that they were
    in charge and your feelings did not mean a thing. But they got ready you for the discipline, and it was all games as I
    look back on it.
- speaker: Interviewer
  text: So you were in pretty good shape?
- speaker: Respondent
  text: I was in great shape. I could run all day long. There were some kids there who weren't. They got picked on. They were
    scorned and pulled out of line, picked on. They were the road guards. Every time you would go in formation and walk along
    and march. And every time you came to an intersecting street, the sergeant would call out "Road Guards, Posts!" The Road
    Guards would go out with signs and stop traffic so you could go through the intersection and it was always the fat guys
    because they had to do all the extra running all time. But you learned to live with it. The weather was, Missouri was
    cool, not as cold as Chicago in January but it was cool.
- speaker: Interviewer
  text: Was the Basic Training six weeks?
- speaker: Respondent
  text: Yes, six weeks and that was just to get you used to Army life. It had nothing to do with what you were going to later
    on. Then after Basic Training you were picked on. I don't know how they picked you - if you are going to go to Artillery,
    Infantry or Signals Corps...
- speaker: Interviewer
  text: I've always wondered about that.
- speaker: Respondent
  text: It was a random crap shoot I guess. I'll never forget the night it came down when we were getting ready to find out
    what our MOS was - Military Occupational Service. First thing, they read off the guys going in the Infantry. I wasn't
    on the list.
- speaker: Interviewer
  text: Did that feel good?
- speaker: Respondent
  text: Oh, my God, I was in heaven. I was, "Holy Smokes." I went down to the PX and stood in line for an hour to use the
    telephone and I called home. I told my mom and dad, "I didn't get picked for the Infantry. I missed it. They didn't call
    my name." The next morning, we had another formation. My name was in Infantry, going down to Ft Polk, Louisiana. "Andres."
    I was number one on the list. It was kind of disheartening. But when I got drafted in January of '68. World War II didn't
    last that long. They were already talking about downsizing Vietnam, Peace Talks and that. And thought I'll never get to
    Vietnam. It will be over before I even get there. That was my attitude so I got the Infantry MOS. I went down to Ft. Polk,
    Louisiana which was worse than Vietnam to tell you the truth.
- speaker: Respondent
  text: It was terrible, down in the swamps of Louisiana. It was hot and humid and bugs. And they were constantly harassing
    you. The officers, sergeants and your NCO's (Non-commissioned officers), your drill instructors. You would go through
    your training and you were taught your basic infantry tactics. Nobody knew what they were doing. It was six weeks of bullshit.
    They were teaching the basic stuff. If you didn't know it before, you didn't learn anything down there. It was time to
    graduate from ATT (Advanced Infantry Training). And I thought Vietnam is right around the corner and I'm not trained well
    enough to go to Vietnam.
- speaker: Interviewer
  text: It hit you then?
- speaker: Respondent
  text: It hit me then, you know; I'm probably going to go there. So I went to my 1st Sergeant and I said, "I'm not well trained
    enough to go to Vietnam. Is there anything else I can do to get more training?"
- speaker: Interviewer
  text: What was the reaction to that judgment you were rendering on the quality of your training?
- speaker: Respondent
  text: I just told them the truth, and he says, "Well this is the way we do it here." This is the way it is. You go to Basic
    Training. You go to AIT and you go to Vietnam." And that's what these guys were doing. They were going six weeks of Basic,
    six weeks of AIT and then you were off to Vietnam. You got a 30-day leave and you were off to Vietnam with just that much
    training. So I went to my first Sergeant and told him, "You know, I don't think I'm well-trained enough to go to Vietnam.
    What recourse do I have?" And he told me, "I'm looking at your records here you did pretty good on the aptitude test so
    you qualify if you want, you can go to NCO School" The only thing was if you went to NCO school, you had to volunteer
    to go to Vietnam. I was going to Vietnam anyway so I might as well get the extra training and go over there as a Sergeant
    rather than a PFC.
- speaker: Interviewer
  text: If you hadn't asked...?
- speaker: Respondent
  text: I wouldn't have known that option existed. So I signed up to go to NCO School, went to NCO School which turned out
    to be the best thing that I ever did. It probably saved my life. It was intense training. I learned a 100 times more than
    I did at ATT. ATT was just fun and games; it was just stupid, little run around and play Army just like you did when you
    were a kid. NCO School, I went to classes during the day. You sat there for eight hours. It was drummed into your head.
    You got to know, got the feeling how an infantry squad worked. What they wanted you to do. I learned how to read maps;
    that saved my life, ten times. I was a pretty good map reader. You had to call in artillery. You had to know where you
    were at all the time. It was really beneficial to learn how to read a map.
- speaker: Interviewer
  text: Was that also in Louisiana?
- speaker: Respondent
  text: That was at Ft. Benning, Georgia. I went to Ft. Benning for NCO School. NCO School was 12 weeks. And then, the training
    was excellent. They covered everything. They showed you what to do. Everybody took their turns taking the squad out. And
    you ran the squad for the day. You had to go out, and they would have mock battles and you would have to perform and you
    were in charge of the squad. It taught you how to survive fire fights, how to call in fire strikes, when had to call in
    artillery. It was intense training. I think that if everybody would have had that much training, there wouldn't be 58,000
    names on that wall.
- speaker: Interviewer
  text: The thought occurs to me that if you could have taken some lessons you received in NCO training and built them into
    Basic Training whether it would have improved performance.
- speaker: Respondent
  text: Kids were going over there not knowing anything. And when you got to Vietnam. You were nothing, an "FNG," (f*****
    new guy) They cared about if you got killed the first two, three days You were lucky you got out of Vietnam. That's the
    way everybody felt. Nobody came up to really be your friend.
- speaker: Interviewer
  text: So you complete your 3 months in Fort Benning; is that where you got assigned to the Airborne?
- speaker: Respondent
  text: The day we graduated from NCO School which was 50 years ago yesterday. We had a formation out there, and the guys
    in Airborne School were standing out there. And a guy came up there and said, "OK, this it. Anybody want to go to jump
    school? Then stand in this line over there. If not this is your last chance." So I'm standing there and a couple of guys
    came up, "Come on Andres, let's go to jump school." I said, "Are you guys crazy? Are you nuts?" "Come on; let's go to
    jump school. We've been together this long you're not going to turn your back on us now. Let's go to jump school." My
    first thought was, well maybe I can luck out, break an ankle, break a leg, that will keep me out of Vietnam even longer.
    I was only in it for two years and I've already spent a year in training. So the longer I could put Vietnam off, the better,
    but it never worked out.
- speaker: Interviewer
  text: By now Vietnam is looming larger...
- speaker: Respondent
  text: Vietnam is right there. I'm on my way to Vietnam. I knew then, the Tet Offensive. The war was picking up.
- speaker: Interviewer
  text: This idea that you're "Jhg." Did you know that before you got to Vietnam?
- speaker: Respondent
  text: No, that was afterward. But that wasn't so much the case in the unit I was assigned to.
- speaker: Interviewer
  text: We finished NCO School. Then we went to jump school which was three weeks. That was in Ft Benning, Georgia. Jump School
    was a mile away from NCO School. And at that time you got travel pay - six cents a mile from where you are going jumping.
    This is a U.S Treasury Department check for six cents! That was my travel pay to go from NCO School to Jump School. I
    never cashed it. That's why the economy is so screwed up.
- speaker: Respondent
  text: 'So I got to my jump unit and again we were all together. Jump school was a little tougher. The physical training
    was intense. The first week was ground week. First week was PT (Physical Training), running, and PT and running and PT
    and running - that''s all you did. That was it. The second week was tower week. They had mock towers. They showed you
    to exit an airplane, how to fall and roll, do plfs, parachute landing falls. Taught how to use your 5 points of contact.
    You hit with the balls of your feet, your calf, roll onto your hip, up your side, and up to your shoulder and up on your
    feet again. That was your plf: five points of contact. They drummed that into you; you practiced that all day long. And
    then in tower week also you went up the 34-foot tower and there was a mock airplane door. You''d hook up to this airplane
    door with the cables going out the airplane door. And you would jump out with your parachute harness on and you would
    slide down the cables to get your body position right.'
