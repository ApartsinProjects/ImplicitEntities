source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: I'm wondering, yesterday was Memorial Day. Right. So maybe a lot of memories are a little bit more current than they
    might otherwise be, but anyway, Mr. Zapel, let me begin by asking you when did you enter the Service?
- speaker: Respondent
  text: I entered the Service in May, May 14th of 1943.
- speaker: Interviewer
  text: And what were you--where were you living at that time?
- speaker: Respondent
  text: I was living in Chicago—Chicago, Illinois. And after I graduated from high school in February of 1943, well, I worked
    a short time for Simpson Electric, but then, when I reached my eighteenth birthday in March, I went over to the draft
    board rather than wait to be drafted. I volunteered as a selective volunteer and—because I was told that if you were a
    selective volunteer, you could quote unquote pick your service, which wasn't quite true. But it worked out. My father
    had helped, being a World War I veteran, had told me, "Do not go in the Army. Do not go in the Marines. Go in the Navy.
    You've always got a clean sheet and a pillow to sleep on." So, I followed his advice.
- speaker: Interviewer
  text: Now, sometimes, the vets who choose the Navy, or they don't choose the Navy, it seems to be related to whether they
    can swim or not, is that—
- speaker: Respondent
  text: No. That didn't bother me.
- speaker: Interviewer
  text: That didn't bother you.
- speaker: Respondent
  text: I swam, so it wouldn't have made any difference anyway.
- speaker: Interviewer
  text: So what area of Chicago did you live in?
- speaker: Respondent
  text: I lived in Austin.
- speaker: Interviewer
  text: Oh, yeah, west side. Austin area.
- speaker: Respondent
  text: And did you go to Austin High School or—
- speaker: Interviewer
  text: I went to Austin High School.
- speaker: Respondent
  text: The Tigers, right?
- speaker: Interviewer
  text: The Tigers.
- speaker: Interviewer
  text: Oh, you know it.
- speaker: Respondent
  text: A little bit, yeah.
- speaker: Interviewer
  text: Okay. And graduated in the February class, so—
- speaker: Respondent
  text: Does that mean, in effect, you graduated in three and a half years, or?
- speaker: Respondent
  text: It's still four. In those days, you had two graduating classes, one in February and one in June, depending on when
    you started. You had the full four years.
- speaker: Interviewer
  text: Wow. Now you and your friends at the school, you must have been aware that there was a war going on?
- speaker: Respondent
  text: Yes. We were all very much aware of it.
- speaker: Respondent
  text: And we all went in about the same time, because we were all that age.
- speaker: Interviewer
  text: So, did any of your friends choose your strategy of trying to volunteer as selective?
- speaker: Respondent
  text: No, they went in as draftees, but one of them ended up in the Navy, the other ended up in the 9th Division in the
    Army over in Europe, which wasn't too good. But he survived.
- speaker: Interviewer
  text: Yeah, the—it's just amazing to think of being sixteen or seventeen years of age and knowing that, you know, you're
    going to get your diploma in a short time. And then you're going overseas.
- speaker: Respondent
  text: Well, that was on every young person's mind from the day the war broke out. I don't think any of us believed it was
    going to be over by Christmas. We knew it was going to last a long time. And my father, all of our fathers, were veterans
    of World War I. We were involved with the Melin Roemer Legion Post because they sponsored a Boy Scout troop which had
    a drum and bugle corps and a drill team. And we were very much involved with—
- speaker: Interviewer
  text: Where, if I may ask, where was that VFW—
- speaker: Respondent
  text: No. American Legion.
- speaker: Interviewer
  text: American Legion. Where was that located? Where was that at?
- speaker: Respondent
  text: On Division and Laramie Avenue in Austin. It was a very—it was—the Boy Scout troop was so large that they had to make
    two troops with one scoutmaster. It was—and everybody came to it. Just, it was incredible! We were all well aware of what
    was happening, you know, because we were surrounded by World War I veterans. When you figure those days, they were—it
    was 20 years after they got out.
- speaker: Respondent
  text: You know, they were still very young.
- speaker: Interviewer
  text: Did—so, I don't know, like at the holidays that year in December, and the New Year, did it affect one's ability to
    enjoy the holidays knowing that—
- speaker: Respondent
  text: That didn't—
- speaker: Interviewer
  text: Or, you're just young, and you don't even think of it, or?
- speaker: Respondent
  text: When the war broke out in '41?
- speaker: Respondent
  text: No, I was still a little bit too young.
- speaker: Respondent
  text: You knew you had a couple of years to go yet.
- speaker: Respondent
  text: It didn't seem to affect anything.
- speaker: Interviewer
  text: And that last holiday in the winter of '42, or whatever, that you were still able to enjoy it?
- speaker: Respondent
  text: No, because I was looking forward to graduation next.
- speaker: Interviewer
  text: You were looking to get—
- speaker: Respondent
  text: Next month and a half down the road.
- speaker: Interviewer
  text: Oh, right, okay. So, you handled it okay. So, you chose the Navy then, is that right?
- speaker: Respondent
  text: I chose—I asked for the Navy.
- speaker: Interviewer
  text: You asked for the Navy.
- speaker: Respondent
  text: Because they said you could pick your branch of Service, but, as I said earlier, that wasn't quite true, because when
    you got down there it was all those in the Navy stand in this line, the Marines stand in that line, the Army stand in
    that line, which was a big lie! It was a lucky break that I got in the line for the Navy.
- speaker: Interviewer
  text: Wow. Almost one in three, or something, huh?
- speaker: Respondent
  text: Yeah, it was.
- speaker: Interviewer
  text: That was downtown somewhere?
- speaker: Respondent
  text: It was downtown on Plymouth Court in Van Buren.
- speaker: Respondent
  text: Where the induction center was, yeah.
- speaker: Interviewer
  text: So, there wasn't any like a test or an interview? It was where you stood.
- speaker: Respondent
  text: Right. It all depended on where you stood. And you had to—you had to kind of keep your eyes and ears open to see what
    was happening to these guys and hope that you picked the right line.
- speaker: Interviewer
  text: Yeah, so then from that day until they—did you go up to Great Lakes then?
- speaker: Respondent
  text: Yes, I did.
- speaker: Interviewer
  text: So how long of a gap or space there, did you have between there, going downtown?
- speaker: Respondent
  text: About three days.
- speaker: Interviewer
  text: Three days to get your affairs in order, or whatever?
- speaker: Interviewer
  text: And then did you have any other brothers or sisters that were affected in the war, or?
- speaker: Respondent
  text: No, I had two sisters younger than me.
- speaker: Interviewer
  text: Yeah, younger than you. And your dad, he had been in World War I, and he had been in the Army, was he?
- speaker: Respondent
  text: No, he was in the Navy.
- speaker: Interviewer
  text: He was in the Navy in World War I.
- speaker: Respondent
  text: He was in the North Sea Mine Force.
- speaker: Interviewer
  text: North Sea Mine Force.
- speaker: Respondent
  text: That's where I got my good advice.
- speaker: Interviewer
  text: 'Then was there some kind of a World War II song: "The Army gets the gravy, but the Navy gets the beans," or something,
    some song.'
- speaker: Respondent
  text: Well, I suppose. Or the girls!
- speaker: Interviewer
  text: Yeah. Yeah!
- speaker: Respondent
  text: So, you have three days, and then you're up at the Great Lakes then?
- speaker: Interviewer
  text: That's right, sent to Great Lakes on the old North Shore Railroad.
- speaker: Interviewer
  text: And how long were you up there?
- speaker: Respondent
  text: We were up there until the first part of July for boot camp. And then we were sent home on a short leave. And then
    we were—had to go back to Great Lakes. Then we were put aboard, then we were sent back downtown again, and put aboard
    a train, and we didn't know where we were going. And I ended up in Norfolk, Virginia—
- speaker: Interviewer
  text: You went east.
- speaker: Respondent
  text: at the Naval Operating Base.
- speaker: Interviewer
  text: Yeah. Were there any interesting experiences at Great Lakes? Did you have to learn how to sleep in a bunk or something,
    or?
- speaker: Respondent
  text: I had to learn how to sleep in a hammock for a few nights, because the Navy hadn't given up the hammocks yet. But
    then we got bunks later on. I liked it. I was prepared for it. A lot of people didn't, but I enjoyed it. Well, as best
    you could (chuckle).
- speaker: Interviewer
  text: So, does the Navy—do they have drill instructors like in the Army?
- speaker: Respondent
  text: Oh, yeah. They were—each company in the boot camp had chief petty officers, which was the equivalent to the drill
    sergeant in the Army, not as mean and nasty as you see in the movies. But they were, all of them that I knew of, were
    World War I veterans that went back in and took this job and were given chief ratings. It was a little looser than the
    Army.
- speaker: Interviewer
  text: How was the food at that point? Not too bad?
- speaker: Respondent
  text: Great. Navy food is good.
- speaker: Interviewer
  text: Navy food is good, yeah? So, then you are in boot camp, and then you're shipped via train to Norfolk?
- speaker: Respondent
  text: Troop train.
- speaker: Respondent
  text: To Norfolk, Virginia. The troop train consisted of converted boxcars with wooden benches in them. And you sat there
    for three or four days going through.
- speaker: Interviewer
  text: This was August or something, was it, or September?
- speaker: Interviewer
  text: It was kind of warm, I bet.
- speaker: Respondent
  text: Yeah, it was. Not air conditioned.
- speaker: Interviewer
  text: Well, you open the big sliding doors on the side. It was a slow trip because it was steam engines. And you had to
    go through those West Virginia and Maryland mountains.
- speaker: Respondent
  text: We didn't know where we were going. We just knew we were going east.
- speaker: Interviewer
  text: Yeah. So when you get to Norfolk, what happens there? That's another big camp or Naval base?
- speaker: Respondent
  text: It's a big collection center. And they decide what they're going to do with you. They put you in a fenced-in enclosure
    and decide what they're going to do with you. For a few days, we loaded supplies aboard a carrier that was in port. And
    then I was sent over, somebody was looking after me, I was sent over to the Naval Air Station at Norfolk. And I was assigned
    to a "headron" outfit which was headquarters squadron. And one of the squadrons in that headquarters squadron happened
    to be VP-74, which was what I eventually ended up with.
- speaker: Interviewer
  text: Does VP stand for something? VP or—
- speaker: Respondent
  text: V in the Navy means heavier than aircraft, and P means patrol, and then they were changed to VPB, which means patrol
    bombing.
- speaker: Interviewer
  text: Patrol bombing.
- speaker: Respondent
  text: And then it went back to VP again. And 74 was just a squadron number.
- speaker: Interviewer
  text: And then the FAW on your—
- speaker: Respondent
  text: That was Fleet Air Wing.
- speaker: Interviewer
  text: Fleet Air Wing.
- speaker: Respondent
  text: That covers many, many headron outfits.
- speaker: Interviewer
  text: So when you were chosen for this, somebody was looking out for you?
- speaker: Respondent
  text: Well, they weren't looking out for me. I was just in the right place.
- speaker: Interviewer
  text: At the right time. Did you take any tests, or aptitude tests, or—
- speaker: Respondent
  text: No. I was just—
- speaker: Interviewer
  text: Background, or high school courses, nothing?
- speaker: Respondent
  text: No. I was sent over there and we were assigned to the headron outfit. And you did, because we were just boots, and
    we were second class seamen, we swept out the hangars, and washed down the oil and exhaust smudges on the sides of the
    fuselages, and that kind of thing, until you worked your way up.
- speaker: Interviewer
  text: So those planes that you were cleaning, those were Navy planes?
- speaker: Respondent
  text: Those were Navy.
- speaker: Interviewer
  text: Were they on training missions, or on patrol, or on reconnaissance?
- speaker: Respondent
  text: No. They were on patrol. It was an operating squadron.
- speaker: Interviewer
  text: So they had a range of a couple hundred, three hundred, miles?
- speaker: Respondent
  text: Oh, way, way out there.
- speaker: Interviewer
  text: So they were looking for German submarines or anything going on?
- speaker: Respondent
  text: That and escorting.
- speaker: Interviewer
  text: Convoys or?
- speaker: Respondent
  text: Escorting convoys as far as their range, and then they had to, you know, come back.
- speaker: Interviewer
  text: So that becomes your unit for the rest of the war then, this—
- speaker: Respondent
  text: After a while, I managed to work myself, well, not at Norfolk—from Norfolk, the squadron was moved to Elizabeth City,
    North Carolina, which was right at the Virginia/North Carolina Border.
- speaker: Interviewer
  text: Still kind of on the ocean?
- speaker: Respondent
  text: Oh, on the ocean. It was on Albemarle Sound. And then we just operated there. The Navy moved their squadrons constantly,
    and that's where I worked my way into the squadron and into the ordnance part of it.
- speaker: Interviewer
  text: Ordnance, of course, is ammunition or artillery?
- speaker: Respondent
  text: Ammunition, guns, and bombs.
- speaker: Interviewer
  text: Yeah. Yeah.
- speaker: Respondent
  text: Cleaning guns mostly, when you're first starting out. I never did go to school. A lot of the guys did, because they
    were, from boot camp, they were sent to Aviation Ordnance School. So I just got the book, and on at my bunk at night,
    and passed my tests that way.
- speaker: Interviewer
  text: So, at this time, you're still enjoying the food, you're?
- speaker: Respondent
  text: Yep. I enjoyed my life.
- speaker: Interviewer
  text: Sleeping pretty well?
- speaker: Respondent
  text: Sleeping very well.
- speaker: Interviewer
  text: Getting along well with your—
- speaker: Interviewer
  text: The buddies, your friends, or whatever, playing cards, or whatever.
- speaker: Respondent
  text: I was used to camping and being out away from home because of the Boy Scouts.
- speaker: Interviewer
  text: So how long were you in the Boy Scouts?
- speaker: Respondent
  text: From the time I was twelve until I was drafted, and then I went back after I came home.
- speaker: Interviewer
  text: And that Boy Scout training was—
- speaker: Respondent
  text: It was fabulous.
- speaker: Interviewer
  text: Prepared you well for the Army, then?
- speaker: Respondent
  text: It was fabulous.
- speaker: Interviewer
  text: Fabulous. You're the first veteran to speak of the Scouting background. That's interesting.
- speaker: Respondent
  text: It was fabulous.
- speaker: Respondent
  text: My friends, my best friends now, are still Scouts. And we get together.
- speaker: Interviewer
  text: So, those were friends that you made before the war?
- speaker: Respondent
  text: From the time I was twelve.
- speaker: Interviewer
  text: Yeah. In Austin.
- speaker: Respondent
  text: And I still see them.
- speaker: Interviewer
  text: Yeah, cool.
- speaker: Interviewer
  text: Alright, so did you have any troubles staying in touch with your family? Did you write a letter a week, or?
- speaker: Respondent
  text: No. I wrote a letter every day.
- speaker: Respondent
  text: Never missed.
- speaker: Interviewer
  text: Never missed.
- speaker: Respondent
  text: My mother wrote about every third day. My dad wrote every week.
- speaker: Interviewer
  text: Did you have to worry about censoring in letters, or what you could say or couldn't say, or?
- speaker: Respondent
  text: Yeah. Once we got assigned to a squadron and we left the states, then the letters were—my mother would say the letters
    were censored.
- speaker: Interviewer
  text: Yeah, so when did you—
- speaker: Respondent
  text: As to where we were.
- speaker: Interviewer
  text: Yeah, locations seem to be what they would—so where did you, so when you leave the States, mainland, where did you
    go? And how did you go?
- speaker: Respondent
  text: When we left Elizabeth City, we went to Coco Sola Naval Air Station in Panama. And we flew patrol out of there.
- speaker: Interviewer
  text: To protect the Canal or something?
- speaker: Respondent
  text: The Canal and that part of the sea lanes.
- speaker: Interviewer
  text: So, were you up in the plane, or you served as—
- speaker: Interviewer
  text: What was that like?
- speaker: Respondent
  text: I was flying by that time, yeah. I was a crew member.
- speaker: Interviewer
  text: So that time you're in the air, you're operating the guns, or?
- speaker: Respondent
  text: Well, I was in charge of the ordnance, and your job, basically, as an ordnance man on a flight in case of enemy action,
    was to make sure those guns were supplied with ammunition or to take over one if needed, and to make sure the turrets
    worked, because they were, like all things mechanical, subject to breakdown. So, you worked constantly. That's what you
    did. And you loaded the depth charges and the torpedoes, and you, when you landed, you took them down unless you used
    them.
- speaker: Interviewer
  text: So, what kind of boats were those, or planes that they were flying?
- speaker: Interviewer
  text: And that stands for?
- speaker: Respondent
  text: Patrol Bomber, Martin.
- speaker: Interviewer
  text: Patrol Bomber, Martin.
- speaker: Respondent
  text: The nickname—it was a nickname. The name of it was Mariner.
- speaker: Interviewer
  text: Mariner. Were they good planes?
- speaker: Respondent
  text: Very good. They were very big. When they got rid of the old Wright engine and put Pratt and Whitneys on, they became
    very dependable. They weren't too great on open sea landings if the water was rough, because, that aluminum, it wasn't
    much different from flying inside of a beer can. You know, it was pretty light stuff. You didn't want them slamming into
    things.
- speaker: Interviewer
  text: Yeah, and was that a picture you had of—
- speaker: Interviewer
  text: Now, dumb question, this plane only lands on water, is that right?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Yeah. It only lands on water. And the crew of that is probably—
- speaker: Respondent
  text: Thirteen, fourteen people.
- speaker: Interviewer
  text: Thirteen, fourteen, and your rank here, ADM, does that stand for aviation ordnance?
- speaker: Respondent
  text: Man. Aviation Ordnance Man, Second Class. So, how long were you in the Panama region?
- speaker: Respondent
  text: We were in Panama, by the time I got down to Panama, it was, boy, the dates aren't—it was the end of '44, beginning
    of '45. We were there for about six months. And by that time, by the time of March of '45, the German Wolfpack problem
    in the Atlantic was pretty well under control, and they were thinning out squadrons, moving them around, because there
    was a lot of them out in the area. And we were moved over to the Galapagos Islands.
- speaker: Respondent
  text: Guarding the other side of the Canal against the Japanese submarines. I don't think there was a Japanese submarine
    anywhere near it. But that was what we were there for.
- speaker: Interviewer
  text: And were you—you were happy with that assignment?
- speaker: Respondent
  text: Yes, and how! It was better than Europe and it was better than South Pacific.
- speaker: Interviewer
  text: So you were—so you would sleep on the Galapagos Islands then.
- speaker: Respondent
  text: We would stay there.
- speaker: Interviewer
  text: Stay there. That's an interesting area, I think.
- speaker: Respondent
  text: A particular island which had an airfield. The Army was on one side with B-24s and we were on the other side with
    the seaplane ramps. It was called BaHra.
- speaker: Interviewer
  text: Baltra. So what would be the range of one of those seaplanes?
- speaker: Respondent
  text: The actual range—well, many times we were in the air for fourteen hours.
- speaker: Respondent
  text: Just cruising back and forth watching. Looking for radar contact. And radar was pretty primitive in those days.
- speaker: Interviewer
  text: Was it boring?
- speaker: Respondent
  text: Yeah. Yeah. But they had bunks on them, and they had a galley on them. You could eat. And it was pretty boring, especially
    at night. If you were up at night, it was.
- speaker: Interviewer
  text: Yeah. So, did you go out on patrol every day, then?
- speaker: Respondent
  text: No. About every other day.
- speaker: Interviewer
  text: Every other day. And that could be for fourteen hours.
- speaker: Respondent
  text: It could be. It could be as short as six to eight. It could be fourteen.
- speaker: Interviewer
  text: Did you find the time was slow to pass? Was it hard to pass the time, or it gets boring, the routine, and you—
- speaker: Respondent
  text: No. You could—you had a job, it sounds corny, but you had a job to do. You had a watch station. And you could move
    around. You didn't fly that high that you had to wear anything special. You flew maybe 8000 feet, something like that.
    And if it was cloudy, you came down below them. And you stood in the waste hatches, or the bow of the airplane opened
    up like a fan and there was a big window there, and you could lay there and look out that. Or you could lay in the tunnel
    by the tail turret and look out there. There was a lot of things to do. Or you could walk up to the flight deck if you
    weren't on watch, and—
- speaker: Interviewer
  text: Did you ever—
- speaker: Respondent
  text: watch the pilot.
- speaker: Interviewer
  text: Did you ever have to go into like an "Oh, oh! Something's happening!"
- speaker: Interviewer
  text: '"Take your battle stations!" Or whatever they say.'
- speaker: Respondent
  text: A lot of contacts. The particular time I flew, the flights I was on, we sighted some subs. We never dropped a charge
    on them, because they were too far submerged by the time we
