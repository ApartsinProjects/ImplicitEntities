collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So, Dennis, do you recall when you entered the service?
- speaker: Respondent
  text: It was September of 1967.
- speaker: Interviewer
  text: And in September of 1967 were you living in Chicago at that time?
- speaker: Respondent
  text: Yes, I was, on the Northwest Side.
- speaker: Interviewer
  text: Oh. Any particular neighborhood?
- speaker: Respondent
  text: The Humboldt Park area.
- speaker: Interviewer
  text: Humboldt Park. Can I ask what high school you attended?
- speaker: Respondent
  text: I went to St. Philip Basilica High School on Jackson and Kedzie on the West Side of the city.
- speaker: Interviewer
  text: Oh yes. I interviewed a World War II Vet who lives in Niles, Mr. Kenneth Lee. He also attended St. Philip's back in
    the early 40s. So what were you doing at the time, were you drafted?
- speaker: Interviewer
  text: And what were you doing at the time you were drafted?
- speaker: Respondent
  text: I was in school. It was the summer between classes, but I had to drop out in the spring class because I got sick.
    So, I dropped out of school and about August 26th I came home one Saturday afternoon (I was driving a truck for Ruby Dry
    Cleaners in Chicago) and my draft notice was sitting on the table where my parents left my mail for us. I told my parents,
    "I'm going to go into the Army because this war isn't ending anytime soon and I could stay in college for four years and
    still get drafted" so I decided to go in.
- speaker: Interviewer
  text: So what school had you been attending when you had to leave, to take a break from your studies?
- speaker: Respondent
  text: St. Procopius College in Lisle, IL.
- speaker: Interviewer
  text: So as long, at that time then, as long as you were in college you would've been able to be awarded a deferment until
    you completed?
- speaker: Respondent
  text: Yes, it was an S-2 deferment.
- speaker: Interviewer
  text: S-2. Now that wasn’t the time when people got draft numbers was it?
- speaker: Respondent
  text: No, that was before.
- speaker: Interviewer
  text: Before. So, did you pick the Army to go into?
- speaker: Respondent
  text: No, they picked it for me.
- speaker: Interviewer
  text: They picked it for you. Was there a tradition of military service in your family?
- speaker: Respondent
  text: No. My oldest brother went into the Coast Guard. My father was born and raised in Ireland, became a citizen here but
    was never drafted or inducted into World War II.
- speaker: Interviewer
  text: And then where were you inducted?
- speaker: Respondent
  text: In Chicago, it was on Van Buren St. It was the Selective Service Headquarters, and that's where you would go down
    and report for a physical. And then a few weeks after you passed your physical, you'd get your draft date.
- speaker: Interviewer
  text: And do you then report to Fort Sheridan or some?
- speaker: Respondent
  text: You report to the building on Van Buren, which is still there. From there they took us to Union Station. At Union
    Station, we were put on trains to St. Louis. Then in St. Louis we were met by buses and they bused us to Fort Leonard
    Wood.
- speaker: Interviewer
  text: So that's where you had your basic training then at Fort Leonard Wood?
- speaker: Interviewer
  text: So, had you been away from home for a length of time in your life before this Army service?
- speaker: Respondent
  text: Not at all.
- speaker: Interviewer
  text: So, this is kind of a new experience?
- speaker: Interviewer
  text: What was it like being away from home and drill instructors and living conditions or lifestyle adjustments?
- speaker: Respondent
  text: It was a new adventure. It didn't bother me one way or the other. Basic training, the physical agility part of it
    was relatively easy for me. I played football in high school. So, in the Chicago Catholic League, at that time it was
    one of the most powerful football leagues in the country. And I felt that the physical agility was not very taxing in
    the Army.
- speaker: Interviewer
  text: And you didn’t mind the food?
- speaker: Respondent
  text: No, the food was ok.
- speaker: Interviewer
  text: And I imagine you're meeting lots of people from different parts of the country? Everybody was kind of a good guy,
    no problems?
- speaker: Respondent
  text: No problems to speak of, there were incidents once in a while, something would pop up. But it wasn't something that
    was systemic.
- speaker: Interviewer
  text: Of course, when you're young, you're kind of naturally optimistic and you know it's all kind of an adventure. It's
    fun, but the war in Vietnam in this time is getting a little hot, right? I mean there's casualties, were you worried?
    Or were you aware you were going to Vietnam, not necessarily?
- speaker: Respondent
  text: We pretty much knew we were going to Vietnam. Very few, when our orders came in after advanced individual training,
    very few of us were sent to any other place but Vietnam. A couple of guys went to Germany. Some went to other bases in
    the United States.
- speaker: Interviewer
  text: Do they all think they were lucky to have got those assignments?
- speaker: Respondent
  text: Oh yeah. Nobody wants to go to a real war. It is scary, but it was an adventure.
- speaker: Interviewer
  text: So, you wound up in, you complete the six weeks?
- speaker: Respondent
  text: Eight weeks of basic.
- speaker: Interviewer
  text: Eight weeks of basic. And then you're assigned to the 25 Infantry Division?
- speaker: Respondent
  text: No, then I went to eight more weeks of advanced individual training, called AIT. And that was to be a combat engineer.
    And that was, I didn't leave Fort Leonard Wood. That's where they train the engineers.
- speaker: Respondent
  text: So, I did my basic training at Fort Leonard Wood, followed up by eight more weeks of AIT training. And then from there,
    went home for two weeks on leave and then went to Vietnam.
- speaker: Interviewer
  text: Were there any buddies from the old neighborhood that were along, drafted at the same time as you were?
- speaker: Respondent
  text: No, by myself.
- speaker: Interviewer
  text: You were by yourself, yeah. And were you chosen or selected for the advanced individual training? I mean everybody
    didn’t get it, right?
- speaker: Respondent
  text: Everybody gets some training after basic training. It's called an MOS, Military Occupational Specialty. You take a
    battery test when you first get into the Army, and that's how they kinda select you for your advanced training. So, I,
    instead of getting infantry training, which probably 90% of the people in my basic training company went to the infantry,
    I went to the engineers.
- speaker: Interviewer
  text: That was, and the engineers in the Army, they build things or they... ?
- speaker: Respondent
  text: You build, there's construction engineers, there's heavy earth moving engineers, there's combat engineers which kind
    of tells you that they're not just building buildings, they're doing fighting. Combat engineer fills in as infantry if
    needed. We'll do land clearing, we'll build bridges, we mine sweep, we do explosives. We work right alongside the infantry.
- speaker: Interviewer
  text: So, when you were at St Procopius were you like a freshman or a sophomore?
- speaker: Respondent
  text: I was a sophomore.
- speaker: Interviewer
  text: A sophomore. And what was your major? What is it going to be in science or math or technology?
- speaker: Interviewer
  text: History, ok. So, after you successfully complete the combat engineering advanced individual training at Fort Leonard
    Wood, and you get a time to come home and you said it gave you two weeks?
- speaker: Respondent
  text: Yes, two weeks leave.
- speaker: Interviewer
  text: And then you, and then where do you go? Where do you join the unit?
- speaker: Respondent
  text: From there I went to Oakland, California.
- speaker: Interviewer
  text: Is that by plane?
- speaker: Respondent
  text: Right, I flew to Oakland, went into the reception center in Oakland and then they started processing you into, you
    get a number and you get a flight number and they call your number and you go get on a plane and you go. But you're there
    for about two days.
- speaker: Interviewer
  text: The plane from Chicago to Oakland, that left from Midway?
- speaker: Respondent
  text: No, O'Hare.
- speaker: Interviewer
  text: Oh O'Hare. And was it a military transport?
- speaker: Respondent
  text: No, it was a common carrier.
- speaker: Interviewer
  text: Oh. And were you, did you have to be in uniform for that trip?
- speaker: Respondent
  text: Yes, because I had to pay for that trip. So, you would go by what was called military standby, and you would get a
    heavily discounted airfare. They would get you out to Oakland.
- speaker: Interviewer
  text: And then from Oakland you would fly to Hawaii or?
- speaker: Respondent
  text: We went up over the top, instead of going around Hawaii. Going from Los Angeles or California to Hawaii is going around
    the world. Instead we went over the top, it's a shorter route. And we went from Travis Army Air Force Base in California;
    we went from Oakland to Travis, Travis to Anchorage, Anchorage to Yukusko, Japan, Yukusko into Tan Son Nhut Air Base or
    Saigon Airport.
- speaker: Interviewer
  text: Quite a few miles.
- speaker: Respondent
  text: About 23 hours.
- speaker: Interviewer
  text: Wow. So, you got to help me here, so you landed at Tan Son Nhut Air Base. Is that near Saigon?
- speaker: Respondent
  text: That's Saigon's international airport.
- speaker: Interviewer
  text: Saigon's international airport.
- speaker: Respondent
  text: Or as today they call it, Ho Chi Minh's international airport.
- speaker: Interviewer
  text: Yes, so were there other men on the plane like yourself who were on a flight from Travis and Japan?
- speaker: Respondent
  text: The plane was filled with us. There were no classes of like first class, business class. It was just one, all the
    seats were the same.
- speaker: Interviewer
  text: And were those other soldiers, were they people you remembered from basic training who had become friends or companions
    or no?
- speaker: Respondent
  text: No, none of them.
- speaker: Interviewer
  text: So, then you get off the plane at Tan Son Nhut and what's the weather like? Does it make an impression on you?
- speaker: Respondent
  text: It's a little hazy. Not real hazy. You can see the sun. Landed at 5:30 in the afternoon on February the 29th, 1968.
    And it was raining. There weren't clouds up there, it was a haze. But the air was so wet, so full of moisture, it was
    actually like little raindrops were falling. And I remember looking up at the sky thinking "where's the clouds?" but the
    humidity was just, it took your breath away when you stepped off the plane.
- speaker: Interviewer
  text: And then from Tan Son Nhut then, you get into a bus?
- speaker: Respondent
  text: A bus, with screens on the outside of the bus so that nobody could throw a hand grenade at the bus or rocks or anything
    that would break the windows and injure the occupants of the bus. So, you were put on these buses and transported to,
    I can't think of the name of the base where they process you in the country.
- speaker: Interviewer
  text: And you stayed there that night where they processed you?
- speaker: Respondent
  text: You stayed there for, again it was a couple days to process you in do the paperwork and that. You had to stand at
    formation every morning, the afternoon and the evening. And they would just call off the list of names and they would
    say "Nilsson, Dennis L. 25th Infantry Division" and they did that to me and they said, "Nilsson Dennis L. 25th Infantry
    Division" there were hundreds of soldiers there so they didn't know but I just yelled out "I'm an engineer" because they
    were telling me I was going to the infantry. What I didn't know was that the 25th Infantry Division had its own battalion
    of combat engineers. So, they didn't have to wait for other engineers if they needed them.
- speaker: Interviewer
  text: And then you, and then where was the base of these combat engineers and the 25th? Was that another place?
- speaker: Respondent
  text: Yes, that was in Cu Chi.
- speaker: Interviewer
  text: That's also in South Vietnam and—
- speaker: Respondent
  text: South Vietnam and about oh, I have to guess, it's probably about 20-25 miles from Saigon. The 25th Infantry Division
    was positioned between Saigon and the Cambodian border in an area called the Parrot's Beak, at the Cambodian border where
    the border comes south and then it goes east and then back west and it looks like the beak of a parrot. And that put Saigon
    within 60 km of Cambodia. And that was the shortest route. They would come down the Ho Chi Minh Trail to the Parrot's
    Beak, to the tip of the Parrot's Beak and then they would start infiltrating into the Vietnam, South Vietnam.
- speaker: Interviewer
  text: So, then the Army food is still pretty good?
- speaker: Respondent
  text: Yes, it was still fine.
- speaker: Interviewer
  text: At that base you were assigned, how long were you there for?
- speaker: Respondent
  text: I was there from February, the end of February until sometime in June and then we were moved. My company was moved
    to another major base of the 25th Infantry Division in Tay Ninh.
- speaker: Respondent
  text: That was right on the Cambodian Border. Tay Ninh province was, that was the border with Cambodia and Ho Chi Minh trail.
- speaker: Interviewer
  text: So, what would've been, maybe I don't know, a typical day that you would expect?
- speaker: Respondent
  text: There were quiet days. Days you would get a little relaxed. But there were more than a few of those. It got very repetitive,
    kinda like "Groundhog Day" sometimes. You would get the same assignment every day.
- speaker: Interviewer
  text: What would that be to patrol or look for... ?
- speaker: Respondent
  text: There would be mine sweeps in the morning. We'd go out with the infantry in the morning and mine sweep a section of
    road for the convoys to come through. And then after we were minesweeping the road, we'd pull security on the road so
    that nobody could sneak up and attack the convoy. And for, I don't know how long, it was a month, two months maybe, I
    mine swept the same stretch of road every morning.
- speaker: Interviewer
  text: Did you learn how to operate a minesweeper at Fort Leonard Wood?
- speaker: Respondent
  text: Yes. I have to say one thing about the military training. They have training down to a science. The training that
    I received at Fort Leonard Wood to be a combat engineer prepared me very well to become part of a unit of combat engineers
    that I'd fit in. All that I needed was the guidance from somebody that had been there for a while and knew the ropes and
    what to look for. As far as operating equipment, we were well trained.
- speaker: Interviewer
  text: Did your schedule, your sleep schedule change a lot, or was there night duty or not necessarily? Or was it daylight
    operations at this time?
- speaker: Respondent
  text: Daylight operations, you know the old saying was we had South Vietnam during the day and the VC or the ARVNs, or not
    the ARVNs, the Army from the North had the country at night.
- speaker: Interviewer
  text: Did you have to worry about, the weather was it very, very hot and was it hard to sleep at night or gotta worry about
    bugs or insects or malaria? You got mosquito screens?
- speaker: Respondent
  text: All of it, all of the above. Malaria, the mosquitos at night were ferocious. Sleep was pretty much, we slept at night
    unless you had guard duty and then you would do two hours on, four hours off, two hours on, four hours off. So, if you
    got guard duty and you pick the straws or flip the coin, you could get guard duty from 6 in the evening til 8 o'clock
    and then you'd be off until midnight and then you'd have midnight until 2 o'clock and the other two-hour segments were
    eight 'til ten and ten 'til midnight.
- speaker: Interviewer
  text: So, if you pulled guard duty at night, you wouldn’t be expected to go out on patrol the next morning, or would you?
- speaker: Interviewer
  text: You would just have to recover. Were there fans, was there electricity for fans there?
- speaker: Respondent
  text: There was electricity in my company area, we had a generator and they would run the generator from six in the evening
    until ten I believe. And that was pretty much it, then they'd shut it down.
- speaker: Interviewer
  text: Then every day there would, the base would have trucks going in and out?
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: You didn’t have planes or helicopters coming in?
- speaker: Interviewer
  text: You had that also?
- speaker: Respondent
  text: There were airstrips. These were big bases. They were like small cities, Cu Chi and Tay Ninh. And they had airports,
    helicopter airports, they had everything. Everything you needed, they had a big PX there.
