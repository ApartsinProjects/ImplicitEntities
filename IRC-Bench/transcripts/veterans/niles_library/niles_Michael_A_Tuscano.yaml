source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Do you meet all the time there?
- speaker: Respondent
  text: Yes, every Tuesday at 9 o'clock.
- speaker: Interviewer
  text: How long have you been meeting there?
- speaker: Respondent
  text: I've been there probably about two years.
- speaker: Interviewer
  text: So, Mr. Tuscano, do you recall when you entered the service?
- speaker: Respondent
  text: Yes, do you want to know the—
- speaker: Interviewer
  text: Sure, sure, if it comes to mind.
- speaker: Respondent
  text: I remember more about the military than I do about anything else. In 1965 I graduated. Later on, they had the buddy
    system. You went, like Neil, you and I went down and signed up for the buddy system. I am not going to give his last name,
    but George was his name. He and I signed up for August 20, I think it was August 22nd, I can't remember. When I went in,
    it was '66.
- speaker: Interviewer
  text: Yes, 22nd of August 1966.
- speaker: Respondent
  text: See, I remembered that.
- speaker: Interviewer
  text: Very good. So, may I ask what high school you attended?
- speaker: Respondent
  text: Niles West.
- speaker: Interviewer
  text: Niles West, you were a local man all the way.
- speaker: Respondent
  text: I was in Niles, right.
- speaker: Interviewer
  text: And, at that time you didn't have a draft number. They didn't have numbers at that time.
- speaker: Respondent
  text: No, I probably would not have gone in. As I said I went on the buddy program and my buddy didn't show up.
- speaker: Interviewer
  text: So, were there a lot of your friends that enlisted?
- speaker: Respondent
  text: Yes, I had, that I went to high school with, I want to say four of them never made it back, that I graduated with.
- speaker: Interviewer
  text: So, you graduated in 1965 and then a year later you decided?
- speaker: Respondent
  text: Well I just thought, you know I was only 17, and yes, I'll join the Marine Corps. And George talked me into it but
    he didn't show up! And I just said, "Oh, well."
- speaker: Interviewer
  text: Was there a tradition of military service in your family?
- speaker: Respondent
  text: My dad was Army Air Corps in World War II.
- speaker: Interviewer
  text: How did he feel, Okinawa, did you say?
- speaker: Interviewer
  text: How did he feel about you joining up?
- speaker: Respondent
  text: He didn't really, you know.
- speaker: Interviewer
  text: Were you an only child?
- speaker: Respondent
  text: Yes, so was my dad.
- speaker: Interviewer
  text: So, after you graduated from high school were you working or considering going into a line of work?
- speaker: Respondent
  text: I was working off and on. I just got out of high school and I wasn't sure I wanted to do this and that.
- speaker: Interviewer
  text: There wasn't ROTC in high school or anything like that?
- speaker: Interviewer
  text: So, you enlisted, you choose the Marines?
- speaker: Respondent
  text: Yes, well you know I was 17 and I thought the Army, nah, the Navy, nah. I don't know why, I can't remember why George
    and I—
- speaker: Respondent
  text: Yes, I remember when I was younger, hearing exciting, inspiring stories of World War II and a lot of times they were
    Marines. And I thought the Marine Corps Hymn sounded so good.
- speaker: Respondent
  text: I really can't remember why, you know it wasn't like the movies that brought me in. I just thought, and plus it was
    only two years. See everybody else they were buying the Army and all of them trying to talk you into four years. And I
    go, "No." The one guy goes, "four years" and I go "No, I won't go to the Army." And then one guy says, "We have a two-year
    program," so I went in for two years.
- speaker: Interviewer
  text: And then you were inducted down on, I think down on LaSalle.
- speaker: Respondent
  text: And then did they send you?
- speaker: Interviewer
  text: To San Diego.
- speaker: Interviewer
  text: You went straight to San Diego?
- speaker: Respondent
  text: Straight to San Diego.
- speaker: Interviewer
  text: Was that by train or plane or?
- speaker: Respondent
  text: It was plane. It was a plane. I think it was Continental.
- speaker: Interviewer
  text: Was that your first time away from home for any length of time?
- speaker: Respondent
  text: Yes. It was.
- speaker: Interviewer
  text: A great adventure.
- speaker: Respondent
  text: It was not what I thought it would be, and it was—
- speaker: Interviewer
  text: So, was basic training—
- speaker: Respondent
  text: That was at San Diego.
- speaker: Interviewer
  text: Was it that difficult as they sometimes say?
- speaker: Respondent
  text: Yes it was, when you're 17 and you're away from home. These guys they didn't let, because Vietnam was going on, they
    didn't let any slack. And it was pretty nasty.
- speaker: Interviewer
  text: Were you in pretty good shape when you went in?
- speaker: Respondent
  text: Yes. Oh yes. I was in real good shape, I was in even better shape when you know.
- speaker: Interviewer
  text: Were there any famous drill instructors or?
- speaker: Respondent
  text: No, they were just nasty. They were bad. Well you're going to, you were probably getting shipped to Vietnam. At that
    time, you wouldn't know.
- speaker: Interviewer
  text: But you probably had an idea you might be going to Vietnam?
- speaker: Respondent
  text: No, you had to go through all the tests. You know, like—
- speaker: Interviewer
  text: So that lasts for about 6 weeks?
- speaker: Respondent
  text: I think it was. It was probably in there, probably in that one piece. The second sheet you have, the other one. That's
    the one I think.
- speaker: Interviewer
  text: Oh, this one.
- speaker: Respondent
  text: Yes, it'll tell you right there at the top. I think it was—
- speaker: Interviewer
  text: Oh, San Diego, yes you went out there on the 23rd of August and it says on the 22nd of October you're transferred.
- speaker: Respondent
  text: Well see you had to go to ITR (Infantry Regiment Training). When you got your MOS—
- speaker: Interviewer
  text: That was your mode of specialty?
- speaker: Respondent
  text: Your MOS was, your—I was artillery.
- speaker: Interviewer
  text: So, did they, when did you get assigned to artillery?
- speaker: Respondent
  text: You got that when you left boot camp. After boot camp you went to Camp Pendleton. Well, I was fu-edirectional confa-ol
    and I'm going, you know it's like looking like a grid map like that map and you had to do algebra and calculus. And I
    don't know how I passed everything. I was a good C+ student in Algebra. So, we ended up getting on the guns and that's
    how we got trained on artillery. They gave you like there's mortars and 105s and 55s and there's 55 self-propelleds.
- speaker: Respondent
  text: And that October, that October date is probably right as it was 6 weeks. And I forgot it was short, if you were infantry
    you stayed there longer.
- speaker: Interviewer
  text: So, the basic training and the infantry and the artillery training that all took place at—
- speaker: Respondent
  text: Camp Pendleton.
- speaker: Interviewer
  text: Camp Pendleton.
- speaker: Respondent
  text: We did some infantry. They had a VC village. They had, you know, a jungle set up and all that, where you had to crawl
    through the barbed wire. They would let off real—they were like sandbags, and I would say from you to here, from me to
    you, they would blow it up to make it realistic. It was real dynamite and that is what they used to shoot over you, until
    a guy stood up once.
- speaker: Interviewer
  text: Yes. So, you, did everybody make it through basic training?
- speaker: Respondent
  text: Not really, especially when you went to, you had to get your M-14. You get your certification.
- speaker: Respondent
  text: One guy, it was like—I forgot the distance, it was like a tunnel that went to the targets, all of the sudden we heard
    a bang. The guy put a—because he didn't qualify. And a couple of guys, you know—
- speaker: Interviewer
  text: Was he injured?
- speaker: Respondent
  text: He was killed.
- speaker: Interviewer
  text: He killed himself?
- speaker: Respondent
  text: Yes, he put a gun to his head.
- speaker: Interviewer
  text: Oh, he did it to himself. Because he didn't make it?
- speaker: Respondent
  text: Yes, there was some guys that wanted to get out. And they were taking pills. You know, not a lot.
- speaker: Interviewer
  text: When you said the M-14?
- speaker: Respondent
  text: That's the one right there, you could see it in there I think.
- speaker: Interviewer
  text: That picture right here that's the M-14?
- speaker: Respondent
  text: No that's the AK.
- speaker: Interviewer
  text: And this one that in training?
- speaker: Respondent
  text: Let's see. Yes, that's a 14 that they got right there.
- speaker: Interviewer
  text: So, did you, when you complete your Camp Pendleton experience did you go anywhere else for additional training?
- speaker: Respondent
  text: When I went to Camp Lejeune from Camp Pendleton, my dad and Arlen got married on November 26, 1966 so I stopped at
    home because she would not get married unless I was there.
- speaker: Interviewer
  text: On the other side of the country?
- speaker: Respondent
  text: Yes. That's where we got trained some more. And that's where they would send you. When you left Camp Pendleton, your
    next duty station was Camp Lejeune. From there they decided, "Well you're going here; you're going there."
- speaker: Interviewer
  text: When you went to Camp Lejeune, did you fly there?
- speaker: Interviewer
  text: And when you get to Camp Lejeune how long did you stay at Camp Lejeune? A long time?
- speaker: Respondent
  text: Well, they took me there, I can't remember—
- speaker: Interviewer
  text: Did you get more training at Camp Lejeune?
- speaker: Respondent
  text: Yes, right.
- speaker: Respondent
  text: I think it's the 2nd Marine Division.
- speaker: Interviewer
  text: Right, I think it's 3 or 4 months. It probably would say I left there in May.
- speaker: Interviewer
  text: It should say, do you see it in there? I know sometimes it's—
- speaker: Respondent
  text: That abbreviation— Yes there is an 18th of May '67.
- speaker: Interviewer
  text: Yes that's when I left, I think.
- speaker: Interviewer
  text: See, when I got there, you got your next duty station or they said I was going go to Cuba.
- speaker: Interviewer
  text: Now me, I was only 17 years old and I, and everybody says, "No, don't go to Cuba. First, you gotta go by ship. The
    second thing is it's spit shine." I'm in artillery so 10 to 1 you're going to be doing guard duty and you're not going
    to be doing anything except—
- speaker: Respondent
  text: So, if you could go Guantanamo—
- speaker: Interviewer
  text: Yes Gitmo. And at that time, you probably just clean the gun, clean this. You don't do anything.
- speaker: Respondent
  text: And the guys talked me out of it and I go, "What else you got?" And they say Vietnam and I say, "Ok." I was 17, you
    know, that's in May, that's got to be the May date I left for Vietnam. I know it's May, the 18th.
- speaker: Interviewer
  text: So, was that when you become part of Battery C?
- speaker: Respondent
  text: I was in Charlie Battery, right. When I got to Vietnam, yes.
- speaker: Interviewer
  text: So, for the purposes of the interview we'll have to identify the unit with which you spent most of your time. And
    that would have been Charlie?
- speaker: Interviewer
  text: That's coming up?
- speaker: Respondent
  text: I was in— When I got to Vietnam, I was with Charlie battery. I think I was in Phu Bai for about a month. I don't know
    if it's in that one there or there. This one might be there at the top of my operations.
- speaker: Interviewer
  text: Yes, participated in the Defense of Hue, in Phu Bai. Yes.
- speaker: Respondent
  text: Ok then, we went to Khe Sanh I think in June. I think. Is that in—
- speaker: Interviewer
  text: Participated in Operation Crockett, 14 of June.
- speaker: Respondent
  text: That's probably when I went to Khe Sanh, June 14th. Then ok, when I got to Khe Sanh, you probably see it in there
    somewhere, they transferred me to Alpha Battery. That's on— here I'll show you. Ok, I remember it. This is where Charlie,
    this is where the ammo dump was. They put me down here we have one 105 mm and I was in 05 battery. I can't remember if
    it was a week or two weeks but they transferred me to Alpha battery.
- speaker: Interviewer
  text: So Alpha Battery is where would've been your main unit?
- speaker: Respondent
  text: Yes, that was my—from June to April to the day I left. I can't remember the date that I left.
- speaker: Interviewer
  text: So that was Alpha Battery, 1st Platoon?
- speaker: Interviewer
  text: 3rd Marine Division. So Alpha Battery—
- speaker: Interviewer
  text: Right, Alpha Battery 113 and that's 3rd Marine Division? 1st Battalion?
- speaker: Interviewer
  text: 3rd Marine division?
- speaker: Interviewer
  text: So, when you're at Camp Lejeune, were there any difficult or demanding officers there?
- speaker: Respondent
  text: No, it was pretty nice. Even in Camp Pendleton it wasn't that bad. You know we were being trained. And then we went
    there and that was like nothing and Camp Lejeune - we had a movie theatre out there and I think we even had a, something
    like a health club.
- speaker: Interviewer
  text: Yes, yes. So, you went in the service then in August, 1966 and then your next year you're in February, March and May
    in at Camp Lejeune. You're starting to wonder where am I going, what's happening, and you don't want to go to Guantanamo,
    you want to go to Vietnam.
- speaker: Respondent
  text: Then I got off the plane—
- speaker: Interviewer
  text: Yes what was that first day in Vietnam like?
- speaker: Respondent
  text: The airplane took a couple rounds and then they opened the door because you know, on the C-130 they put that down,
    and it was hotter than hell. You just stood there and would sweat because it was so hot.
- speaker: Interviewer
  text: Far worse than any of the jungle climates that they expose you to in the United States?
- speaker: Respondent
  text: It was really, you just stood still and just be—
- speaker: Interviewer
  text: And you landed at?
- speaker: Respondent
  text: Da Nang. You went from, it was from California, I think it was Travis Air Force Base in California if I remember.
    And then you went to Hawaii, and then you went from there to Okinawa, and then you got your jungle fatigues and your dress
    clothes, put it in a c-bag and then left there in Okinawa what you didn't need. And they just gave you socks and jungle
    fatigues and then they sent you off going to so-and-so Charlie battery from there.
- speaker: Interviewer
  text: So, to get to Da Nang from Khe Sanh—
- speaker: Respondent
  text: No. that was Phu Bai.
- speaker: Interviewer
  text: Phu Bai first?
- speaker: Respondent
  text: Yes, it was Phu Bai first. It wasn't that long. Might've been a couple weeks, might've been a month it wasn't that
    long.
- speaker: Interviewer
  text: Was that by truck or helicopter or?
- speaker: Respondent
  text: It was by truck. And from Phu Bai to Khe Sanh was by truck. I think it was Highway 1. I can't really—
- speaker: Interviewer
  text: So, at this time you were holding up pretty well. The climate's tough but you're young and you're a Marine—
- speaker: Respondent
  text: And you were in artillery so you didn't really have to do a lot of guard duty. In Phu Bai, it was very little, off
    and on doing something. We had to do a couple of patrols but in Khe Sanh it was ARVNs, Marines, infantry out there that
    were around the home base.
- speaker: Interviewer
  text: So, being in artillery, you had to be able to operate a certain number of guns or types of guns?
- speaker: Respondent
  text: It was a 105 mm howitzer and we had one 55 gun, artillery piece. It was a 155 mm. We had one of those that we had.
    This one shows there's a battery but there was no battery, we only had one 55 mm. It's like an 8 inch, it's almost the
    size of an 8-inch gun on a ship.
- speaker: Interviewer
  text: So, life on Khe Sanh Base, was that, did that take some getting used to?
- speaker: Respondent
  text: It wasn't that bad at the beginning when we got up there in June. Like I said, you know. We were called Pardee's Pirates.
- speaker: Interviewer
  text: Pardee's Pirates, who was Pardee?
- speaker: Respondent
  text: He was our captain.
- speaker: Interviewer
  text: Was he a good guy?
- speaker: Respondent
  text: He was a little weird. We'd always get, you know it's like you ever watch M.A.S.H? the original M.A.S.H., you would
    always have one guy to get you something?
- speaker: Interviewer
  text: Oh yes, yes.
- speaker: Respondent
  text: And we built a club out of ammo boxes and airstrip matting. And I go where did you get this from? The SeeBees or whatever
    the guy did, or you know and we got this and we got that. And that was like June, July, August, September and I think
    that was October, 1967 that I met Robert Stack. And all of the sudden we had a big party.
- speaker: Interviewer
  text: Yes, that's one of the questions, is did you, were there any USO shows or famous entertainers.
- speaker: Respondent
  text: No, that was the one. All of the sudden, like I said, we were called Pardee's Pirates and our first sergeant, he was
    a heck of a nice guy, or captain was da-da-da and I still think I remember we had a big party. Because somebody took a
    cake, that was supposed to go up because we were on a plateau and it was a radio station, and it wasn't us but somebody
    stole the cake. And the first sergeant goes "You'd steal Jesus Christ off the cross," and I can't say the word "and you
    would come back for the nails!" And I go, we're all sitting there saying. We didn't do it, and we turn around and there
    was Robert Stack all of sudden. I think it was like October, because we didn't start getting hit, because there was nothing
    going on at that time, until I think it was like November or December and they started. In Laos, they had 152 mms, like
    the Japanese they would bury themselves in the hill. We had a 155, but even with a 155 gun we couldn't get the right trajectory
    to hit them. They could hit us, but we couldn't hit them because we couldn't get the right—
- speaker: Interviewer
  text: So, you would have to call in airstrikes?
- speaker: Respondent
  text: They would call 'em in, but even then. Somebody would, it wasn't up to us. I don't know somebody would.
- speaker: Interviewer
  text: So, you started getting shelled on?
- speaker: Respondent
  text: Somewhere, I want to say, I'm trying to remember—
- speaker: Interviewer
  text: So how many miles were you from the Laotian border here do you think?
