collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Mr. Horstman, do you recall when you entered the service?
- speaker: Respondent
  text: Against my father's wishes, I was 19. I was sent to the Cavalry.
- speaker: Interviewer
  text: So they still had horses then?
- speaker: Respondent
  text: Yes, they still had horses and I rode the same horse for 2 years.
- speaker: Interviewer
  text: I'm just curious what was the horse's name?
- speaker: Interviewer
  text: Good horse?
- speaker: Respondent
  text: Good horse. I enjoyed taking care of him at the end of each day's ride. I had to - before I could go and take care
    of myself.
- speaker: Interviewer
  text: You had chosen to enlist in the Army on your own, then?
- speaker: Interviewer
  text: So you were already serving in the Army when the war broke out?
- speaker: Respondent
  text: No, I had been in the Philippines before the war broke out. I was discharged just before the war broke out and then
    I re-enlisted again.
- speaker: Interviewer
  text: Did you have the opportunity then to get back into the Cavalry?
- speaker: Respondent
  text: No, there was no Cavalry then. It was all mechanical.
- speaker: Interviewer
  text: At that time were you still living in Nebraska?
- speaker: Respondent
  text: No, I was then at Fort Meade, South Dakota, Troop F of the 4th Cavalry.
- speaker: Interviewer
  text: Did you have an occupation at that time when you came out of the service that first time or were you able to secure
    employment or a job somewhere?
- speaker: Respondent
  text: No. I didn't have a job.
- speaker: Interviewer
  text: When you re-enlisted was that in South Dakota?
- speaker: Respondent
  text: No that was Nebraska. Now, my father was proud of me; taking me into town and introducing me to everyone, as his son
    in the Cavalry.
- speaker: Interviewer
  text: Did you choose the Army?
- speaker: Interviewer
  text: That was what you wanted to do?
- speaker: Interviewer
  text: So you were inducted in Omaha?
- speaker: Respondent
  text: That's where I finally went to get sworn in.
- speaker: Interviewer
  text: Did you find that the Army had changed much going from a peace-time outfit to a war-time outfit?
- speaker: Respondent
  text: Yes, quite a bit. Men had different goals and many resented the army.
- speaker: Interviewer
  text: Now even though you had already been in the Army did you have to go through basic training again?
- speaker: Respondent
  text: No, in fact I was a Private. I was sent to Ft. Sheridan where I helped train the new recruits.
- speaker: Interviewer
  text: So then from Nebraska you wind up at Ft Sheridan...
- speaker: Respondent
  text: When I enlisted they told me, I could have three choices. I could have everything I want. So I said, "Why do I have
    to give you three choices? I want to go back to the Philippines." They sent me to Ft Sheridan which I didn't want. I was
    in a Kentucky National Guard Unit which I didn't want.
- speaker: Interviewer
  text: So was that interesting, working with the gentlemen from Kentucky, a change of pace?
- speaker: Respondent
  text: It was fine. It finally turned out they were alright.
- speaker: Interviewer
  text: After Ft Sheridan did you have to go anywhere else for training?
- speaker: Respondent
  text: Well, I went overseas in 1942.
- speaker: Interviewer
  text: So was that North Africa?
- speaker: Respondent
  text: No, we went into Northern Ireland first. We didn't go to North Africa until November. I went over in April, 1942,
    so from April until November we were doing more or less training all the time in Northern Ireland.
- speaker: Interviewer
  text: Was it a dangerous crossing at that time, going over in the troop ship?
- speaker: Respondent
  text: Yes, the U-Boats were out looking for us. I went over in the Aquitania, which at that time was the fourth largest
    ship.
- speaker: Interviewer
  text: Did you get sea-sick?
- speaker: Respondent
  text: No, not that time.
- speaker: Interviewer
  text: When you were in Northern Ireland doing the training, did it seem that the time passed slowly?
- speaker: Respondent
  text: No, actually it kind of went kind of fast.
- speaker: Interviewer
  text: Do you recall where you were stationed in Northern Ireland at that time?
- speaker: Respondent
  text: We were at Stonnont Palace in Northern Ireland - that was the Prime Minister of Northern Ireland's estate. And that's
    where I learned to play golf. I also played later at the Old Course, St. Andrews.
- speaker: Interviewer
  text: Yes, they have excellent golf courses.
- speaker: Respondent
  text: We could get a pass to go to the golf course but we couldn't get a pass to go into Belfast so we went over to the
    golf course and there were old gentlemen who let us use their clubs.
- speaker: Interviewer
  text: That wasn't the Royal Down Golf Club?
- speaker: Interviewer
  text: A beautiful golf course, they didn't use lawn mowers to keep the grass down; they used sheep.
- speaker: Respondent
  text: So you enjoyed your time in the Northern Ireland.
- speaker: Interviewer
  text: Yes, so we were there in 1942 from April until November and then we went to North Africa.
- speaker: Interviewer
  text: And at this time do you recall what unit you were in?
- speaker: Respondent
  text: 103rd Antiaircraft Battalion, Special Weapons. And don't ask me how I remember that.
- speaker: Interviewer
  text: Now Special Weapons, does that suggest that you received special training?
- speaker: Respondent
  text: After we got through training in Ireland, I had a 20-man unit with a half-track with a 40mm Bofors and a half-track
    with quadruple 50 caliber machine guns and a single machine gun.
- speaker: Interviewer
  text: From Northern Ireland then did you go to England?
- speaker: Respondent
  text: No, we went to Sicily.
- speaker: Interviewer
  text: So you were in the invasion of Sicily, wow.
- speaker: Respondent
  text: That was the first invasion, I don't know how long.
- speaker: Interviewer
  text: At D-Day we went four days after D-Day. When we went in Sicily, we went in at H-Hour plus 20 minutes - we were 20
    minutes after the first wave.
- speaker: Interviewer
  text: Were you under the leadership of General Patton at that time?
- speaker: Respondent
  text: I was sometimes which I didn't like. I didn't like him.
- speaker: Respondent
  text: Well, one reason was when he slapped that man in a hospital.
- speaker: Interviewer
  text: You heard all about that.
- speaker: Respondent
  text: And then when we were in Sicily. After the campaign was over, I was walking out to my gun and I was carrying my leggings
    in my hand. The car stopped on the road and Patton fined me for being out of uniform. Then we had to do close-order drill.
    He was something else.
- speaker: Interviewer
  text: At that time what would a fine be, that would be a deduction from your army pay?
- speaker: Respondent
  text: Yes, 15 bucks - that was a lot of money. If there were 3 men in the cab of a truck, he gave a fine.
- speaker: Interviewer
  text: So $15 that might be what you would make in a week?
- speaker: Respondent
  text: Well, a Sergeant made $54 a month.
- speaker: Interviewer
  text: So you were a Sergeant at this time. Were you promoted when you were in England or Northern Ireland?
- speaker: Respondent
  text: No, we took the train from Ft. Sheridan, when we left, we went to Indiangap Town, Pennsylvania, and then on the train
    to New York and they made me from Private to Sergeant.
- speaker: Interviewer
  text: Mr. Horstman, you're wearing a Bronze Star cap today. Where did you receive your Bronze Star?
- speaker: Respondent
  text: In Germany.
- speaker: Interviewer
  text: So the Allies take Sicily and then from Sicily do you sail to France or Italy?
- speaker: Respondent
  text: We went back to France to re-organize.
- speaker: Interviewer
  text: On D-Day I went in 4 days later, 4 days later after the first wave. It was still something.
- speaker: Interviewer
  text: So you're probably going through those hedgerows in mechanized vehicles.
- speaker: Respondent
  text: You talk about hedgerows, and some of the people here think it's a group of hedges. Some of those hedgerows were 20
    feet across where they kept building dirt and up.
- speaker: Interviewer
  text: I recently interviewed a veteran who came in after you did. He went through France but he didn't think the French
    people were that nice.
- speaker: Respondent
  text: I thought they were nice but the best people that I was treated by were the Belgians. But the French treated us nice.
- speaker: Interviewer
  text: Perhaps, this a stupid question, were there many times when you were really frightened?
- speaker: Respondent
  text: Yes, you all do. You're human.
- speaker: Interviewer
  text: So when you're progressing across Northern France and Belgium, were you involved in the Battle of the Bulge, in the
    Ardennes Forest?
- speaker: Respondent
  text: No, I got out before then. I was wounded in November, the 11th, of 1944, just before the Battle of Bulge so I missed
    that.
- speaker: Interviewer
  text: Where were you wounded?
- speaker: Respondent
  text: In Germany.
- speaker: Interviewer
  text: Was it bullet?
- speaker: Respondent
  text: No, it was a concussion, a back injury from the bomb blast. I was blown on to a hedgerow.
- speaker: Interviewer
  text: So then were you sent to the Military Field Hospital?
- speaker: Respondent
  text: First, I went to the field hospital, lying on a stretcher strapped to a jeep. I went to a hospital in Paris that we
    had taken over. It was a maternity hospital that the government had taken over. Then I went to one, La Haye-du-Puits that's
    on the French peninsula, then to England, then Long Island and from Long Island I went to Texas. I was in the hospital
    almost 8 months.
- speaker: Interviewer
  text: Now, 8 months to recover from that severe back trauma that was caused by the concussion. That concussion was caused
    by a bomb or shell?
- speaker: Respondent
  text: A shell. We were having heavy shelling and I was going up to the gun and that's the last I remember.
- speaker: Interviewer
  text: Was the shell an 88?
- speaker: Respondent
  text: Yes. To me that was the best gun in the war. You could use that for anti-aircraft, anti-tank, infantry they'd use
    it for everything. All you have to do is to change the shell.
- speaker: Interviewer
  text: So you came out of the service in 1945?
- speaker: Interviewer
  text: Were you released in Chicago?
- speaker: Respondent
  text: No, I was released at Ft. Sam Houston in San Antonio, Texas.
- speaker: Interviewer
  text: They probably gave you a railway pass or fare to get back.
- speaker: Respondent
  text: They give you travel money to get back home.
- speaker: Interviewer
  text: Were you able to stay in touch with some of your buddies from the Army?
- speaker: Respondent
  text: We did, stayed in pretty close touch. We had 3 reunions. The last one was 1970. The man who was responsible for the
    reunions passed away, and nobody took over so 1970 was the last reunion. We had one here in Chicago, one in Pittsburgh
    and one in New York.
- speaker: Interviewer
  text: And this was the 103rd Anti-aircraft, special weapons?
- speaker: Interviewer
  text: Pardon me for hopping around; do you recall where in Germany you were injured?
- speaker: Respondent
  text: Yes, just right before we got to Cologne between Aachen and Cologne.
- speaker: Interviewer
  text: When you came out of the Army, was it hard for you to get a job?
- speaker: Respondent
  text: I didn't try right away. I was getting 60% disability.
- speaker: Interviewer
  text: So you always remember World War II, everyday.
- speaker: Respondent
  text: One of things I remember in Germany before we took Aachen. They were dive-bombing, our planes, you could see the bombs
    going right over our heads. We were that close to Aachen.
- speaker: Interviewer
  text: Were there any other incidents or experiences that stand out in your mind, any situations that were funny or unusual?
- speaker: Respondent
  text: I don't remember them, but when we had the reunions all the funny incidents used to come up. You forget about the
    other ones. You might remember somebody that was killed.
- speaker: Interviewer
  text: So you saw a lot of combat. Is there anything general description you could make about being in combat that people
    might not realize or understand.
- speaker: Respondent
  text: It is hell. But you do what you have to. That's the way it goes.
- speaker: Interviewer
  text: One veteran told me that it is just chaos, completely chaos.
- speaker: Respondent
  text: One time when we were in Sicily, we were on a ridge just beyond the beach and we had our gun position there. One day
    looking out, we could see the two plains. There were only 2 plains in Sicily. Medina and Gela. We were at plain of Gela.
    All our troops, we could see them; they were coming back. It was so funny. We had to take our quarter millimeters. Usually
    we had a nonpiercing, weren't detonating and tracers in it so we had to take everything out but the armor piercing and
    load our gun with armor piercing. All the shell which we couldn't have knocked off one of those tanks anyway. But it was
    just funny, all at once they started going back again.
- speaker: Interviewer
  text: Were you impressed by any of your officers?
- speaker: Respondent
  text: Yes, I had some real good ones and I had some lousy ones too. I think the best officer I had was out in the cavalry
    because they were all outdoor men, the officers, rode the horses and everything. They were the best officers. At the end
    of the war officers would go to Officer Candidate School. They'd send them over there and they didn't know from shinola.
- speaker: Interviewer
  text: So when you're back home and feeling a little better, did you join any of the veterans organizations?
- speaker: Respondent
  text: I've been a member of the American Legion for 69 years. I also belong to the VFW and the Disabled American Veterans.
- speaker: Interviewer
  text: You made an Honor Flight.
- speaker: Respondent
  text: Yes, in May, 2010.
- speaker: Interviewer
  text: That must have been a wonderful experience.
- speaker: Respondent
  text: That was the best day of my life. It made you feel like you really did something. When I got discharged from Texas,
    I got the bus and went back to Nebraska. It was nothing. It was like you went to the store or something and came back.
    That trip really made you realize what you had done.
- speaker: Interviewer
  text: It is amazing the debt that the United States and the world owes to your generation because you had to fight on two
    fronts and project American power across all the distance. I don't know what the world would like be without "the Greatest
    Generation."
- speaker: Respondent
  text: The other fact, it seems to me, is that all these vets, most of them, had a good high school education.
- speaker: Interviewer
  text: I had 9th grade.
- speaker: Respondent
  text: Well, you had a good 9 years of education. It seems that the American army went from almost nothing to millions of
    men from all over the country. The Sergeants in the American army made the army. When I went in, there were 180,000 men
    in the Army. We got more than that scattered around the world today. It was the Sergeants who did the training. When I
    got in, I trained the 52nd Training Battalion - which is Torrey Pines Golf Course now, up on the mountain right out of
    La Jolla and after the 52nd- I organized the 57th Hell, I didn't do it alone. I helped organize the 57th and trained Selective
    Service there. We were training Selective Service and after the training period, we were making the best men Corporals.
    They didn't know enough to be Corporals, but you had to have them to keep the lid on. I had a Captain, Captain ..., I
    can't think of his name, he was writing a book, "Blundering to Victory" and I wish he had finished it. Teddy Poe! He taught
    school at Millersberg Military Institute. I think it was in Kentucky, 'course he was a Kentuckian. Some of the Kentucky
    men were good fighters. I had never any trouble after they adopted me I guess. I'll give you a good example. When we went
    to Ft. Sheridan, on the top floor they had a '22 rifle range. And if you weren't from Kentucky, I never fired anything.
- speaker: Interviewer
  text: I think we might be coming to the end of the interview, and there are always two questions that they recommend that
    we ask the veterans. And in your case, you've already anticipated this a little bit. Mr. Horstman how do you think your
    service and military experiences affected your life?
- speaker: Respondent
  text: I don't know. I think you learn a lot. It sure as heck doesn't hurt anybody to serve. If you're going to be a bad
    person, you're going to be a bad person whether you're in the service or not. You can't blame the service for anything.
    And I enjoyed it.
- speaker: Interviewer
  text: You must have it because you were in '36.
- speaker: Respondent
  text: If I hadn't had the medical discharge, I probably would have stayed in.
- speaker: Interviewer
  text: I wonder if you would have wound up in Korea.
- speaker: Respondent
  text: Probably. Or if I had stayed in, I might have wound up in Viet Nam.
- speaker: Interviewer
  text: And then Mr. Horstman, has your military experience influenced your thinking about war?
- speaker: Respondent
  text: Yes, I think there is a lot of us.
