collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So, Mr. Potoczek, when did you enter the Service?
- speaker: Respondent
  text: That was in 1944, April.
- speaker: Interviewer
  text: April of '44. And were you living--?
- speaker: Respondent
  text: In Chicago.
- speaker: Interviewer
  text: Northside? Southside?
- speaker: Respondent
  text: Northside. I went to Lane Technical High School. I was eighteen when they--I wanted to join at seventeen, but my mother
    and father says, "No. Finish high school." So, I finished high school. And I went right into the Army.
- speaker: Interviewer
  text: Were you an only child?
- speaker: Respondent
  text: No. I had 3 brothers and one sister, Virginia. Stanley went into the Coast Guard. Walter was deferred because he was
    working on lenses, the Norden Bombsight, the lenses, so he was exempt from joining the Army because he was doing military
    work on lenses, making these bombsights. Ted was too young, so, he didn't have to go.
- speaker: Interviewer
  text: So where did you live in the city?
- speaker: Respondent
  text: Milwaukee, Armitage, and Western. 2440 West Courtland Street.
- speaker: Interviewer
  text: Lane Tech, that is a mighty high school, the Indians!
- speaker: Respondent
  text: Oh, I loved Lane Tech. Oh, I played basketball there, football, baseball! I really enjoyed high school. It had beautiful
    athletic teachers. And all our teachers were just wonderful.
- speaker: Interviewer
  text: So, you were in pretty good shape then physically?
- speaker: Respondent
  text: Oh, I was physically good.
- speaker: Interviewer
  text: You know, when I went in the Army, I was about 140 pounds. When I got out, I was 95.
- speaker: Respondent
  text: We'll have to--That will be interesting to hear how you lost the fifty pounds, yes.
- speaker: Interviewer
  text: I lost that because we didn't eat half--, you know, our air supply, the parachutes, missed us, so we couldn't get--the
    Japanese got our food.
- speaker: Interviewer
  text: So were you afraid the war would be over before you would get into the war?
- speaker: Respondent
  text: Well, I was hoping the war would end before I got in.
- speaker: Interviewer
  text: Oh, you were.
- speaker: Respondent
  text: Yes, because my parents, they came from Poland, and my Uncle Andrew was killed by the Nazis, the SS, he had a farm
    there. And my mother cried. And I wanted to join the Army right away, you know, and go to Europe. But it didn't work that
    way. And I went to the Pacific. Like they say, when you join the Army, they put you where they wanted.
- speaker: Interviewer
  text: So you wanted to, if the war was on, you wanted to go.
- speaker: Respondent
  text: I wanted to go to Germany.
- speaker: Interviewer
  text: To go to Germany, but if the war was over, that was okay.
- speaker: Respondent
  text: Yes. Well, I was hoping the war would end, but it lasted, you know, quite a while. until 1945, you know.
- speaker: Interviewer
  text: Yes. So you joined the service then in 1940--?
- speaker: Respondent
  text: April, 1944.
- speaker: Interviewer
  text: And you had graduated in?
- speaker: Respondent
  text: In January.
- speaker: Interviewer
  text: Oh, you could graduate in midyear in those days, right?
- speaker: Respondent
  text: In 1944, I graduated.
- speaker: Interviewer
  text: Yes. So you got drafted then.
- speaker: Respondent
  text: Yes. I wanted to, really, I wanted to enlist, but my mother and father says no. So, you're at home, you listen to
    your mother and father. So I signed up for the draft, and then I was drafted.
- speaker: Interviewer
  text: Very quickly, yes.
- speaker: Respondent
  text: Yes. Took me right away.
- speaker: Interviewer
  text: Yes. So you didn't worry about what branch of service, or Coast Guards, or Marines, or Navy?
- speaker: Interviewer
  text: Or Army Air Corps?
- speaker: Respondent
  text: No, if they need me, I'll go.
- speaker: Respondent
  text: I thought I was going to go to Europe because a lot of my friends went to Europe from Lane Tech. And Howard Wadell
    and I went back to Lane Tech to find out where all my friends were, and I went to visit. Howard Wadell was killed in Germany.
    We graduated together. So some went to Germany and some went to the CBI.
- speaker: Interviewer
  text: Yes. So you get inducted downtown somewhere, do you?
- speaker: Respondent
  text: I got inducted at the post office.
- speaker: Interviewer
  text: At the post office. And then they put you on a--
- speaker: Respondent
  text: The 'L' and we went to Fort Sheridan. And from Fort Sheridan, we went to Fort Riley, Kansas.
- speaker: Interviewer
  text: Was that by train, or bus, or truck?
- speaker: Interviewer
  text: Was that the first time you were ever--?
- speaker: Respondent
  text: Away from home.
- speaker: Respondent
  text: The first time. I'd never been away. Never.
- speaker: Interviewer
  text: Did you have a hard time adjusting to the Army?
- speaker: Respondent
  text: Yes. It was strange. I wasn't used to that kind of a life.
- speaker: Interviewer
  text: But you were used to being on sports teams.
- speaker: Interviewer
  text: And having coaches and stuff like that.
- speaker: Interviewer
  text: And teamwork, and I suppose that helped?
- speaker: Respondent
  text: Yes, it helped, but I adjusted; you miss home; you miss your mother, you miss your brothers, you miss your sisters,
    but I adjusted, you know, and then when I went overseas, it was even worse.
- speaker: Interviewer
  text: Yes. Now, you said basic training was pretty tough?
- speaker: Respondent
  text: Oh, yes, very tough, yes. You know, forced marches, getting up early in the morning, on the go at the rifle range,
    shooting down the planes that they shot up there. We had the 30 caliber machine guns, and we had to--we had the horses
    then. We had mules then. We had the 30 caliber machine guns, we had to mount them on the mules. And, of course, they used
    those mules, they brought them overseas with us.
- speaker: Respondent
  text: Yes. To carry all our equipment.
- speaker: Interviewer
  text: Did--You had a tough drill sergeant, did you mention?
- speaker: Respondent
  text: Yes. Sergeant Porter.
- speaker: Interviewer
  text: Sergeant Porter.
- speaker: Respondent
  text: Oh, was he tough! He never let you up. "Get up, get walking!" He says, "Don't straggle! Get in there!" We had the
    forced marches.
- speaker: Interviewer
  text: I wonder where he was from, Sergeant Porter?
- speaker: Respondent
  text: Sergeant Porter was from Texas.
- speaker: Interviewer
  text: You probably met servicemen from all over the country there, did you?
- speaker: Respondent
  text: Yes. Mmm-hmm.
- speaker: Interviewer
  text: And you got along with most types of people?
- speaker: Respondent
  text: Oh, yes. From New York, Kentucky, California, Salt Lake City, Utah. My friend Dick Miller says, "Oh," he says, "Oh,
    you're from Chicago." I'm Catholic. He's a Mormon. He says, "You threw us out of Illinois!" You know, the Mormons--.
- speaker: Respondent
  text: I says, "Dick, I don't know about this. I wasn't born! My mother and father were in Poland!"
- speaker: Respondent
  text: We didn't know nothing about, that religion, the Mormons ..
- speaker: Respondent
  text: And he says, "Yes, you Catholics threw us out. We had tough years in Salt Lake City, Utah!" But we're still good friends
    to this day. He's still alive. He and I spent time in a foxhole. We became the best of friends to this day.
- speaker: Interviewer
  text: Does he live in Utah?
- speaker: Respondent
  text: And he lives in Utah. He's retired, so he's got two homes. He's got a home in Beaver Dam, Arizona. I've been there.
    It's beautiful. We went to visit him and his wife. But they, his mother and father had a factory. He was the richest guy
    in our outfit. They had--all the rest of us were not poor, but we didn't have the money he had. He had--their parents
    had a lot of money.
- speaker: Respondent
  text: Nice cars, beautiful home. And, in Kentucky, Clay, we called him Clay, we went to visit him. But they had dirt floors
    for their house.
- speaker: Respondent
  text: And they had a well out there, an outhouse. He was the poorest of all of them, but we all became very close friends,
    very, very close.
- speaker: Interviewer
  text: And you all worked, you all followed Sergeant Porter's commands?
- speaker: Respondent
  text: Oh, yes. Yes, we listened to him. He was strict, but--
- speaker: Interviewer
  text: Yes. So you mentioned you were in a Cavalry outfit?
- speaker: Interviewer
  text: 124th Cavalry, but you didn't know anything about horses, or mules, or?
- speaker: Interviewer
  text: Before then?
- speaker: Respondent
  text: But I loved horses. When I was a little kid, who could afford a horse? I was born in the Depression. I was lucky.
    My mother would send me to school. She would put cardboard in my shoes, because the leather wore out.
- speaker: Respondent
  text: And that's how bad things were. During the Depression, there were people in the neighborhood committed suicide. I
    remember Mr. Berkowitz. He lost his job, he lost his house, and he committed suicide. They were very bad times.
- speaker: Respondent
  text: Heating, and food, and clothing. There was no work. Absolutely.
- speaker: Interviewer
  text: So, at least in the Army, you got food and clothing of some kind.
- speaker: Respondent
  text: The Army was beautiful. They gave you nice clothes and plenty to eat. The only thing, Sergeant Porter was real strict.
    He made sure you did your beds right, the corners had to be squared off. And those shoes shined! Oh, he kept you going
    night and day! You know, you were on the go. He never let up.
- speaker: Interviewer
  text: So there was nothing, there wasn't anything in basic training you had a problem with, though? I mean--
- speaker: Interviewer
  text: You handled it.
- speaker: Respondent
  text: We handled it.
- speaker: Interviewer
  text: And the training, or the--
- speaker: Interviewer
  text: Sharpshooting, or the working with the horses?
- speaker: Respondent
  text: Yes, well--.
- speaker: Interviewer
  text: And the mules? Everything was fine.
- speaker: Respondent
  text: When we were on the range, he said, "You got to hit the target!," He says, "Hit the target!," he used to say.
- speaker: Interviewer
  text: You got to get used to that kick or something, I suppose, right?
- speaker: Respondent
  text: He told me how to hold the rifle. I never had a rifle.
- speaker: Respondent
  text: But then he says, after a while, he says, then he nicknamed me Potsi. I got a nickname of Potsi, because he--, so
    in the Army they called me, when I was overseas, they called me, and then that name stuck.
- speaker: Interviewer
  text: The name follows you, yes.
- speaker: Respondent
  text: Nickname Potsi. Then Sergeant Potsi. When I was in the post office, Potsi, and then that name stuck with me.
- speaker: Interviewer
  text: Yes. Potsi.
- speaker: Respondent
  text: Yes. I worked in the--when I got home from the Service, well, I'd never had a job.
- speaker: Respondent
  text: So, a friend of mine from, Walter Stovick, he was a captain, and he was overseas in Germany there. And he told me
    to get in the post office. So, I got a job in the post office.
- speaker: Respondent
  text: And I was real happy there.
- speaker: Interviewer
  text: Did--so when did you realize that they were going to send you overseas to the Pacific and not Europe?
- speaker: Respondent
  text: Oh, the Pacific. When we finished our basic training, we had leave. I had to tell my mother, and father, and my brothers
    and sisters, that, I got a, I think it was two weeks leave, then I had to report back to Fort Riley, Kansas. I says, "I
    don't know what's going to happen after that. I have no idea." Then we got orders that we're going. We got on the train.
    We're going to California.
- speaker: Interviewer
  text: That's a clue.
- speaker: Respondent
  text: Yes. So, we went to Riverside, California. And then they gave us all new equipment, all Ml rifles, 45 sidearms, all
    new boots, everything, new. You know, packs, everything, canteens. They said, "This is your equipment. Take care of it!"
    Then we--but they wouldn't tell us where we were going, what we're--then they took us to Los Angeles and then we got on
    the ship, 5000 soldiers on that ship!
- speaker: Interviewer
  text: Do you remember the name of the ship?
- speaker: Respondent
  text: I can't--I think it's in the report.
- speaker: Interviewer
  text: In the report that, yes. Mr. Potoczek was very kind to bring us a history of his unit that was written by this Major,
    Major Stadler.
- speaker: Respondent
  text: Yes, he wrote it all. My memory isn't that good anymore.
- speaker: Interviewer
  text: So we'll add this to the interview.
- speaker: Respondent
  text: But I remember there was a troop transport ship. I can't think of the name of it, but then it took us thirty days
    because the submarines, the Japanese submarines, were there, and no smoking, no lights because at night. If you had a
    light there, the submarines would sink the ship, so--
- speaker: Interviewer
  text: Was it hard to pass the time on the ship?
- speaker: Respondent
  text: Oh, we were down in the hold there. Four bunks, and we slept on top of each other, four guys. one, two, three, four.
- speaker: Interviewer
  text: Nobody went crazy down there.
- speaker: Respondent
  text: No, no, no.
- speaker: Respondent
  text: It was kind of lonesome.
- speaker: Respondent
  text: No lights, nothing.
- speaker: Interviewer
  text: During the day, you were allowed to go on deck a little bit?
- speaker: Respondent
  text: During the day, we could go up on the deck, and then when it came to eating for 5000 troops. We had to stand in line,
    but we only ate, I think, it was twice a day, breakfast and one meal in the evening, and that was it.
- speaker: Interviewer
  text: A lot of cards. Play cards or--.
- speaker: Respondent
  text: Yes, then we'd play cards.
- speaker: Respondent
  text: We had a lot of time.
- speaker: Interviewer
  text: Were the horses and the mules, were they on the ship?
- speaker: Respondent
  text: No, they had another ship for them. We weren't on that.
- speaker: Interviewer
  text: But they shipped American mules overseas?
- speaker: Respondent
  text: Yes, just the troops, and the--I think the Merchant Marines brought them over, the mules and the horses.
- speaker: Respondent
  text: Then we--it took us quite a few days, weeks, and then we stopped at Melbourne, Australia. So they said we could get
    off the ship, and then we went walking around in Melbourne, Australia.
- speaker: Interviewer
  text: Oh, you had to go down under Australia and around?
- speaker: Interviewer
  text: Wow, no wonder it was so long, yes.
- speaker: Respondent
  text: And then-- Down under. We rented bicycles there. We met some girls over there. We went bicycle riding. Oh, you know,
    you're eighteen years old, they brought us to their home, and they talked to us, fed us. It was real pleasant in Australia.
    I says, "Oh, this is nice."
- speaker: Interviewer
  text: And then we had to report back to the ship, and then, after that, we got some more supplies. Then we headed for Bombay,
    India. And then Bombay was terrible. They says, "Okay, you can go to shore," for maybe so many hours, but it was so bad
    in Bombay.
- speaker: Respondent
  text: Hot, a lot of poverty.
- speaker: Respondent
  text: Nothing, nothing. People didn't even have food. It was so bad. We said it was better on the ship than it was in Bombay.
    I'd never have believed that. We had the Depression in 1929, but it wasn't as bad as Bombay was.
- speaker: Respondent
  text: This was terrible. These people were skinny, rags and bones, in India. I said this was too bad. And then they'd be
    begging. I had a little money. I would give it to them.
- speaker: Respondent
  text: I felt sorry for these people. They had children there. They were begging. That was horrible. I felt that depressed
    me to see.
- speaker: Respondent
  text: You know, how people lived. I said--
- speaker: Interviewer
  text: So, Bombay, you were on the west coast of India?
- speaker: Interviewer
  text: Did you go by train then to--
- speaker: Respondent
  text: Then we took--We got onto a train, I remember, and then, from there, we engaged the enemy. The Japanese were all the
    way into India.
- speaker: Interviewer
  text: Yes. You went to the other side to Calcutta then, or something, probably, or--
- speaker: Respondent
  text: I think it was Assam, India, where we engaged.
- speaker: Interviewer
  text: Assam, yes.
- speaker: Respondent
  text: And then I remember the Merrill Marauders, they called themselves the Merrill--. We were the replacements for them.
    They were all beat up. They were fighting there first, and we looked at them, we were healthy, they were beat. Oh, I mean
    terrible, in terrible condition!
- speaker: Interviewer
  text: So this would have been late '44?
- speaker: Respondent
  text: Yes, it was in '44.
- speaker: Interviewer
  text: Like November or October?
- speaker: Respondent
  text: Somewhere around there, let's see, October, yes, somewhere.
- speaker: Respondent
  text: I'm losing track of the time.
- speaker: Interviewer
  text: No, no. Yes.
- speaker: Respondent
  text: But we were the replacements for them. I mean, they were ragged, their uniforms, their shoes, everything. We had all
    brand new stuff, all nice clothes, everything. Good boots, brand new. Theirs were ragged. So, we were the replacements
    for them. Then we engaged the Japanese. We fought the Japanese.
- speaker: Interviewer
  text: In Burma or--
- speaker: Respondent
  text: In this--in India.
- speaker: Respondent
  text: But we were doing good, because we were well-trained.
- speaker: Interviewer
  text: What was the terrain like there?
- speaker: Respondent
  text: Oh, rugged. It was--
- speaker: Interviewer
  text: Kind of Mountainy? Hilly?
- speaker: Interviewer
  text: Oh, jungle.
- speaker: Respondent
  text: Jungle. Then we went into--
- speaker: Interviewer
  text: But you hadn't trained for jungle fighting, though, did you?
- speaker: Respondent
  text: No, I didn't train.
- speaker: Respondent
  text: Not in Fort Riley, Kansas.
- speaker: Respondent
  text: So then we replaced the Merrill Marauders. I remember them. Then we had the mules come in later, but we were in combat.
    We pushed forward. Then the rest of the fellows, they were loading up the mules with supplies, put the howitzers on there.
    I think they were the 105, they called them Howitzers. That was for backup. And then we engaged the Japanese. W
