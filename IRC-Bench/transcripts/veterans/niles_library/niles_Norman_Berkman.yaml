collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Now, when your dad entered the Service, was he living in Chicago?
- speaker: Respondent
  text: Yes, he was. 817 West Cornelia.
- speaker: Interviewer
  text: That would be Lake View or--
- speaker: Respondent
  text: He was still married to my mother. Yes, Lake View.
- speaker: Interviewer
  text: Do you know where he went to high school or--
- speaker: Respondent
  text: Actually, no, I do not, but I can find that if you want me to bring that.
- speaker: Respondent
  text: I'll just call my uncle.
- speaker: Respondent
  text: He knows the school. Actually, his discharge papers show he went to Marshall.
- speaker: Interviewer
  text: It is interesting to see the neighborhoods and where people came from. And do you know what he was doing at the time
    he was joined up?
- speaker: Respondent
  text: Oh, yes. He was a musician and he was also teaching music at the Wurlitzer Piano Company downtown.
- speaker: Interviewer
  text: Yes. So, he was, having been born in 1917 and then entering the Army in 1945, he would have been, I think, almost
    28. He was 27 years of age?
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: Yes. He had a wife and a child, so he was too--he was not eligible to be drafted. That's why he was drafted to enlist.
- speaker: Interviewer
  text: On the recommendation of this friend of his.
- speaker: Respondent
  text: Of his friend. I do not know the friend's name.
- speaker: Interviewer
  text: Do you know if the friend was skilled in languages, also?
- speaker: Respondent
  text: Yes. He said that that was why, because they used to speak a little Russian with each other and a lot of Yiddish.
    The friend was also Jewish.
- speaker: Interviewer
  text: Yes. So, in Germany at that time after the war, with the Russians and the allies sharing the occupation of Germany
    and Berlin, his language skills must have been very--must have been needed?
- speaker: Respondent
  text: They were very much needed.
- speaker: Interviewer
  text: So did your dad ever talk about boot camp, or anything like that, or training experiences, or adjusting to life in
    the Army?
- speaker: Respondent
  text: Basically, he said his boot camp went by so quickly that he didn't even notice it. Apparently, because he was basically
    going almost directly into eIe.
- speaker: Interviewer
  text: Yes. I mean, he got the training,
- speaker: Respondent
  text: The training, and then when he comes out in 1947, he's already -he comes out as a staff sergeant.
- speaker: Respondent
  text: Yes. So do you know where he went for his basic training or anything like that?
- speaker: Interviewer
  text: Both times, Fort Riley.
- speaker: Respondent
  text: Fort Riley, Kansas.
- speaker: Interviewer
  text: From what I understand, yes.
- speaker: Respondent
  text: In fact, I remember telling him, one of my grandsons lives in Kansas, and when I told my father, I says, "Hey, one
    of your great-grandsons lives in Kansas!" He says, "Oh, Kansas," he says, "Fort Riley. Both times." That's all he said!
- speaker: Interviewer
  text: And then he's posted to Germany?
- speaker: Interviewer
  text: I wonder if he went over on a ship or a plane?
- speaker: Respondent
  text: He did go over on a ship. He said the ship came out of, I think he said Maryland or Maine, I'm not too positive of
    that. He took a train, I know, east, because he tried calling my mother from the train station when he was being deployed
    and she didn't answer. And, of course, we now know why.
- speaker: Interviewer
  text: Yes. So he was posted to the--or his unit was the 970th Counter Intelligence Corps.
- speaker: Respondent
  text: Counter Intelligence Corps, that's their battalion badge.
- speaker: Interviewer
  text: And that was in, which we will add to this transcript, it looks like it's a sleeping lion or something like that.
- speaker: Respondent
  text: To me, it looks like a lion.
- speaker: Interviewer
  text: Yes. Kind of--
- speaker: Respondent
  text: In fact, his license plate in Florida, okay, was that. They only demand a rear license plate, so his front license
    plate was a copy of that. That's how proud he was.
- speaker: Interviewer
  text: I was going to say that indicates that it was something he was proud of, wasn't it?
- speaker: Interviewer
  text: Oh, very much so.
- speaker: Respondent
  text: Yes, and not too many people could have done that job either, I suspect. So, then his initial mission in Germany,
    so he was posted to Berlin, I suppose?
- speaker: Interviewer
  text: Yes, started out there.
- speaker: Respondent
  text: His initial mission was to kind of go undercover with these identification papers?
- speaker: Respondent
  text: And see if he can sniff out any German who--
- speaker: Interviewer
  text: Sniff out any Germans and sniff out any--
- speaker: Respondent
  text: Nazis who are--
- speaker: Interviewer
  text: He did say traitor Russians, but Russians aren't traitors, so I don't know.
- speaker: Respondent
  text: Oh, Russians who might have collaborated?
- speaker: Interviewer
  text: Well, remember-- right, collaborators.
- speaker: Respondent
  text: Or, yes, yes.
- speaker: Interviewer
  text: But, of course, he would never believe there were any. I mean, you know, Russian background himself. At that time,
    according to him, Russians were wonderful and Germans were horrible across the board, but I can't blame him.
- speaker: Respondent
  text: So when he's on duty then in his first tour, he's in civilian clothes, right?
- speaker: Interviewer
  text: Yes, he is, even up to and through the retrieval of the crown jewels.
- speaker: Respondent
  text: Yes, so I wonder, does he, for example, have an apartment or does he--
- speaker: Interviewer
  text: He did have an apartment. He said it was in a half bombed out--
- speaker: Respondent
  text: Probably a lot of those places--
- speaker: Interviewer
  text: Oh, yes. Three stories, no running water. And that was at the time Olga was covering as his wife. Okay, he was out
    in the nightclubs playing music. He played music on the street. My father played the accordion.
- speaker: Respondent
  text: So he used his musicianship as part of his cover?
- speaker: Interviewer
  text: As part of his cover., very, very definitely.
- speaker: Respondent
  text: So, Olga, did she have an interesting history in Germany? Had she lost her family during the war and needed to protect
    herself with the Americans or something?
- speaker: Interviewer
  text: No Her mother was alive. They were, oh, from what Olga told me at one time, but this was many years ago, her mother
    escaped. Her brother was SS. She did not like the fact that her brother was SS, and she went over to the American side.
    She did not like what the Nazis were doing. And, of course, this would bear fruit in the fact that she married an American
    Jewish GI.
- speaker: Respondent
  text: Yes. So she was not from a Jewish background?
- speaker: Interviewer
  text: Oh, absolutely not.
- speaker: Respondent
  text: Yes. And then did the brother survive the war, the SS man?
- speaker: Interviewer
  text: No, he did not. He did not survive the war.
- speaker: Respondent
  text: The--so, we mentioned it, the, your dad had described--
- speaker: Interviewer
  text: By the way, her mother survived the war, but the brother did not.
- speaker: Respondent
  text: But she remained in Germany, did she?
- speaker: Interviewer
  text: She remained in Germany. She came for a visit. It was an interesting visit, I will say that.
- speaker: Respondent
  text: You remember it?
- speaker: Respondent
  text: What year would that have been?
- speaker: Interviewer
  text: Oh, I don't know, but I do remember my grandmother, my father's mother, being introduced to her. And she spoke enough
    English to get across, and they were talking about their sons, my father, and, of course, my stepmother's brother who
    was SS, and the old lady was so proud, she showed a picture to my grandmother of her son in his SS uniform. I give my
    grandmother credit. My grandmother looked and said, "He's a handsome boy," went to the bathroom, and threw up.
- speaker: Respondent
  text: So I don't think that my stepmother's mother was an American collaborator. I think she just survived the war. Now,
    whether she survived the war because her daughter was an American collaborator, I have no idea.
- speaker: Respondent
  text: But I did meet the woman. She gave me the chills -that should be off the record.
- speaker: Respondent
  text: So the highlight, I think your dad used the expression or described it as such, and you did too, the highlight, probably,
    of this first tour of duty was this recovery of the crown jewels?
- speaker: Respondent
  text: How did that come about?
- speaker: Interviewer
  text: What happened was he was apparently stationed at the border, okay, as he called it, "the correct side of the divide."
    And the, that account, kind of, okay, we're not sure. Well, he's sure. Correct.
- speaker: Respondent
  text: So these were the crown jewels?
- speaker: Interviewer
  text: Those were the crown jewels of Duchess Theodora of Saxony-Weimar-Eisenach.
- speaker: Interviewer
  text: Okay, apparently the duchess had hired a mercenary, a smuggler or whatever, to come and get her crown jewels. He got
    caught at the border.
- speaker: Respondent
  text: Bringing them out to her?
- speaker: Interviewer
  text: Bringing them out to her.
- speaker: Respondent
  text: She had fled the zone?
- speaker: Interviewer
  text: She had fled the zone. He got caught by the Americans and the Russians coming out. And he told them what was going
    on. And my father said that the Russian command right there and the American command said, you know, "She got out. She
    really didn't do anything. Why don't we get them to her?" That was done without, really, the permission of my father's
    commanding officer, whose name I do not know. Apparently, someone said, "Okay, we're going to do this," and since the
    Russians said, "Naw, we don't want to do it", "Why don't one of you Americans go?" So one of the Americans went back with
    the smuggler, because he already knew where everything was. And they got them all out.
- speaker: Respondent
  text: My father alluded to the fact that he was the one. A newspaper account doesn't name who and a book in which there
    is a chapter regarding Weimar crown jewels also does not name the actual person. I don't know. However, in my entire life,
    my dad died when I was 66, I'm now 68, I've never known him to tell a lie. So, I don't know, but it is possible, because
    that was the type of adventurous thing my father would have done.
- speaker: Interviewer
  text: '"We''re going back. Let''s go get them," Yes. (The exciting episode is described in Chapter 29 "Bribes and Crown
    Jewels" of the 1995 book, Dear God, I''m Only a Boy by Menno Duerksen.'
- speaker: Respondent
  text: He had the language skills to do it.
- speaker: Interviewer
  text: And he had the language skills to do it.
- speaker: Interviewer
  text: You know, and, as you can see from the pictures on his German passport, or German identity papers, he also had, you
    know, he could look Russian, he could look German, he could look American.
- speaker: Interviewer
  text: So they managed to get out. And they did get all the crown jewels. He said it took three trips, the original smuggler
    who was caught, and then two more trips with whomever went back with the smuggler to get them out. And they did get them
    all out, according to the duchess.
- speaker: Respondent
  text: I wonder how far it was, whether it was an overnight kind of--
- speaker: Interviewer
  text: Yes, it was.
- speaker: Respondent
  text: It was overnight.
- speaker: Interviewer
  text: Yes. He said it took them about six hours, seven hours, to get into the, whatever small town, I imagine -she was the
