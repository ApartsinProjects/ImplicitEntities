collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So, Gus, you entered the Service in 1942?
- speaker: Respondent
  text: Yes, I think it was April, April the 5th.
- speaker: Interviewer
  text: So, at that time, you were living in?
- speaker: Respondent
  text: Baltimore, Maryland.
- speaker: Interviewer
  text: What were you doing before you went in the Service?
- speaker: Respondent
  text: Well, I was going to school. I was going to be a, at least I hoped to be, in the medical field somehow. Johns Hopkins
    is in Baltimore, of course. But I was working in a food company, Kraft Foods, at that time. And it led to my, what do
    you call it, I can't think of the term.
- speaker: Interviewer
  text: A deferment or a--
- speaker: Respondent
  text: No. No. No. Where they put you in a number, you're a certain area. I was a medical technician. That was what I was
    put down as because of my work with Kraft, in the food industry.
- speaker: Interviewer
  text: So you had graduated high school by then?
- speaker: Respondent
  text: Not yet, no. No. I finished school after I got out of the Service.
- speaker: Interviewer
  text: So, but, even though you were still in high school, you had an idea that you wanted to work in the medical field?
- speaker: Respondent
  text: Yes. Yes, that was my goal. My mother was a nurse. My daughter is now a nurse. And I was a nurse. I graduated as a
    nurse in 1943 in Walter Reed Hospital in Maryland. In Bethesda, Maryland, I think it is, if I'm not mistaken.
- speaker: Interviewer
  text: And you were employed by Kraft, the famous food company?
- speaker: Respondent
  text: Yes. I worked there for twenty-five years, but anyhow--
- speaker: Interviewer
  text: So were you drafted?
- speaker: Respondent
  text: Yes. Well, I went to enlist right after Pearl Harbor. And I wanted to go in the Navy, because my cousin was in the
    Navy and he was traveling all over the world. And I wanted to see the world. And when I went down, they wouldn't take
    me, because I wore glasses. And they said I had an umbilical hernia. And the Army said, "We'll take you, and we'll give
    you glasses, and we'll take care of your hernia." Well, they gave me glasses, but they never took care of my hernia. But
    I was very fortunate. Being in the Air Corps, I did get to get all over the world. And if I'd been in the Navy, I'd of
    been probably stuck up at Great Lakes or something for the whole duration. So no qualms.
- speaker: Interviewer
  text: You were a good swimmer? You weren't worried about the water?
- speaker: Respondent
  text: Not really. I'm not that crazy about the water.
- speaker: Respondent
  text: But I would do anything.
- speaker: Interviewer
  text: Yes. So you were--how did your, well, I guess your mother was kind of sad or understood the situation?
- speaker: Respondent
  text: I was an only child.
- speaker: Interviewer
  text: An only child.
- speaker: Respondent
  text: I was not supposed to go, because I was supporting my mother and my grandmother. But I said, "Eventually, I've got
    to go anyhow." And she says, "Well, you won't be, you won't pass the physical, because you have a hearing problem." I
    was born with something wrong with one of my ears, but I had extensive lip-reading as a young child in school. I had a
    very sharp teacher that noticed I wasn't hearing. And she sent me to lip-reading. And when it came time for the hearing
    tests, if somebody put their hand over their mouth, I said, "Put your hand down. I can't read your lips." But I passed
    my tests that way. I falsified it. But I've had hearing aids ever since.
- speaker: Interviewer
  text: So if you had declared your hearing deficiency--
- speaker: Respondent
  text: I probably would not have been 4F.
- speaker: Interviewer
  text: You would have been 4F, most likely.
- speaker: Respondent
  text: I'm guessing.
- speaker: Respondent
  text: And, even with your hearing deficiency, you were still a capable, alert--
- speaker: Respondent
  text: I didn't get hearing aids right away, of course.
- speaker: Respondent
  text: I got them later on. But the ability, and as I say the smart teacher that sent me to lip-reading class, in those days,
    you know, what, sixty, seventy, years ago, I picked up that lip-reading. And it helped me. It's always helped me all my
    life.
- speaker: Interviewer
  text: I just want to say I can't tell that you have a hearing deficiency at all. And we've been talking for almost an hour
    now. So it was a wonderful teacher.
- speaker: Respondent
  text: Sometimes the batteries go down. It doesn't make any difference at all.
- speaker: Interviewer
  text: What a wonderful teacher!
- speaker: Respondent
  text: So what were your first days like in the military? Was it a shock?
- speaker: Interviewer
  text: Yes. Very naive. I was brought up by parents in the Depression years, of course. We had--we were poor, but we were
    healthy. And I had no brothers and sisters. And my father died. He was seventy-two when I was born. And he died while
    he was eighty-eight. And I took care of him for four or five years, dressed him, fed him, because he couldn't manipulate.
    And my mother was a double amputee. She had diabetes. And I didn't think I would ever go in the Service. But I did. But
    I sent home my pay, of course. It had to be done. But I felt I had to give something. Because we were--my patriotism,
    I guess, was on top of everything else. It's just that I couldn't stand it. I will never forget Pearl Harbor. I will just
    never forget it, never forget it.
- speaker: Interviewer
  text: The--so where was your boot camp or training?
- speaker: Respondent
  text: Fort Meade, Maryland.
- speaker: Interviewer
  text: Oh, not too far away.
- speaker: Respondent
  text: No. No. But that was like introductory. I wasn't there very long. They sent me to Tampa, Florida, for Air Corps training,
    and then they sent me up to Walter Reed Hospital for the medical training. And I had extensive medical training, as I
    said. I graduated as a male nurse, registered male nurse anywhere in the United States at that time. And I went for further
    training for flight surgeon's assistant. I worked in an operating room.
- speaker: Interviewer
  text: So they made the decision? So the Army Air Corps made the decision? You were drafted into the Army and then, somehow,
    you wind up in the medical--?
- speaker: Respondent
  text: Well, see, I had to make a decision, because of my MOS - Military Occupational Specialty. I had to make a decision,
    did I want to go to medical school and graduate, whatever it was, and go on further? Or do I want to go to officers' training
    to be a second lieutenant? If I went to Officers' Training School, and I'd failed, I couldn't go to medical school, but
    if I went to medical school and passed, I could still go on to officers' training. So, I chose the medical, because I
    wanted to go on further, but I never got there because they sent me overseas.
- speaker: Interviewer
  text: So the Army realized your abilities and inclinations?
- speaker: Respondent
  text: Apparently.
- speaker: Interviewer
  text: With other veterans, they say they wind up doing exactly the opposite of what they might have been skilled at.
- speaker: Respondent
  text: No, I was very fortunate.
- speaker: Respondent
  text: Very fortunate. I thought I would get in, what do they call it, the Aberdeen, Maryland, the facility had to do with
    poison gases and things like that.
- speaker: Interviewer
  text: Yes. Toxic weapons.
- speaker: Respondent
  text: I was afraid I was going to get into that.
- speaker: Respondent
  text: I didn't want to kill. I wanted to help. And I did.
- speaker: Interviewer
  text: Did you have to tell the Army that you didn't want to be in a situation where you would be killing people?
- speaker: Respondent
  text: No. No. It never came up.
- speaker: Interviewer
  text: So what were the other people like in the boot camp? They must have been-- was that your first time away from home
    for any length of time?
- speaker: Respondent
  text: Oh, yes, it was.
- speaker: Interviewer
  text: You must have met all kinds of different people?
- speaker: Respondent
  text: It was rough because, in Baltimore, we're right on the Mason-Dixon line and, at that time, the negro people were in
    the back of the bus and in another part of town completely. Of course, it's different now, of course, but I was in the
    barracks taking my basic training with colored people, which was new to me. But, to me, it was fascinating. I mean, it
    was interesting, because I'm a people person. I like people. And I was scared to death I was going to do something wrong.
    But I got through it. I got through it.
- speaker: Interviewer
  text: So then, after boot camp, then you got some more medical training?
- speaker: Respondent
  text: Yes. Yes, as I said, I went up to Walter Reed, finished that. I was getting ready to go to OCS. They sent me back
    down to Drew Field, Florida, which is right adjacent to Tampa, Florida, to the Air Force--I took more training in the
    Air Corps. And I got sent right overseas, so it was quick, it was fast. All in a few months. See, we were originally going
    to Sicily, the invasion of Sicily, and we left from Hampton Roads, Virginia, in a Liberty ship to go to Sicily. And we
    got sunk by two ships in the Atlantic. It was awful.
- speaker: Interviewer
  text: The German submarine?
- speaker: Respondent
  text: Yes. And just-- we were picked up. We were full of oil, and it was horrible. Anyhow, they picked us up, and took us
    to Oran, North Africa to the hospital. And we never got to Sicily. Our orders were changed. After being in the hospital
    recuperating, they said our orders were to go to India, and we went around, as I said, through the Suez Canal.
- speaker: Interviewer
  text: The Suez Canal? The Red Sea?
- speaker: Respondent
  text: Yes. Yes, different Air Force, this time. See, a different Air Corps, because they kept changing our--I was in several
    Air Corps in a short time.
- speaker: Interviewer
  text: So you were a valuable man. I mean--
- speaker: Respondent
  text: Well, I don't know about that. No, no. It was just coincidence.
- speaker: Interviewer
  text: So, at this time, are you a private or a corporal?
- speaker: Respondent
  text: I might have been a corporal by then. I know you come out as a sergeant. I was going in, as a matter of fact, it's
    immaterial now, but I understand I was up for, in those days, they called it a battlefield commission for a second lieutenant
    when I was captured. It never went through. My papers never went through. And it never materialized. But I had that honor
    bestowed on me. So I ended up as a sergeant, which was fine. Ninety-six dollars a month.
- speaker: Interviewer
  text: So your final, the mission that you, the outfit that you served most of your time with, that was the?
- speaker: Respondent
  text: 225th Medical Dispensary Aviation, yes.
- speaker: Interviewer
  text: And that group and that meant that you were in Calcutta, was it Calcutta then, or?
- speaker: Respondent
  text: Well, we were formed in India, in Bombay, and then we went to Calcutta, working as a unit, and then, excuse me, excuse
    me, Bombay is on the west coast. Calcutta is on the east coast.
- speaker: Interviewer
  text: Was that a train ride from Bombay?
- speaker: Respondent
  text: Train. Troop train. Then we drove Burma Road from Ledo, which was in Burma, to Kunming into China. And that was our
    introduction into China. And we came, we flew back, I drove it twice. And the last time we stayed in Chengtu, now I hope
    I get this continuity right, Kunming is the end point of the Burma Road, but I was in Chengtu which was north a little
    bit in the center of the city, the center of the country.
- speaker: Interviewer
  text: Was that also reached by truck at night, Chengtu?
- speaker: Respondent
  text: No, I think we flew in.
- speaker: Interviewer
  text: Flew in there?
- speaker: Respondent
  text: I think we flew in. Incidentally, the big weapons carriers and the ambulances, Neil, they had to be flown in, and
    they were taken, cut them apart in Bombay and Calcutta, weld them, cut them apart, put them in a plane, fly them into
    China, weld them back together again, because they were so heavy, they couldn't fly over the Himalayas.
- speaker: Interviewer
  text: And you were saying everything in that war zone in western central China that was all-- everything in there had to
    be driven in or flown in?
- speaker: Respondent
  text: Well mostly flown.
- speaker: Interviewer
  text: Flown in, because the Japanese?
- speaker: Respondent
  text: Yes. Mostly flown. The Burma road was really nothing, really, I mean for materials. And we lost a lot of men even
    driving over the precipices. The precipices were so high. The roads were narrow. I've seen them go down 10,000 feet, jeep
    and everything, right over the side, right down, right down, horrible, horrible. It's an experience of its own.
- speaker: Interviewer
  text: So, learning, did you learn to drive? Was that also--
- speaker: Respondent
  text: I never learned to drive in my life! They put me in a jeep, and I said, "I don't know how to drive." "You'll learn."
    I did.
- speaker: Interviewer
  text: So you're driving stick and all that?
- speaker: Respondent
  text: Oh, yes. Oh, yes. We had to have the oil changed and everything, of course, maintenance, and you've got to go up a
    ramp to get your jeep up there. I went off it, because I didn't know how to drive, but that's a long time ago. I drove
    ambulances. I drove everything after that. When push comes to shove.
- speaker: Respondent
  text: How was the Army food? Pretty good?
- speaker: Interviewer
  text: Yes, well, yes, it was all right. It was all right. Of course, I'm a food person. And it was all right. We survived.
    When we were in China, it was bad. It was reverse lend-lease in those days. I don't know whether you've heard of that
    term or not? Reverse lend-lease. Roosevelt would give so much money to pay for food, and to pay for billeting, and so
    forth, for us, for GIs, and if the Chinese, if the indigenous crop was, say, cabbage, everybody ate cabbage. If it were
    peanuts, everybody ate peanuts. It was just what was available locally. And, sometimes, it was just eggs. You had eggs
    that would come out of your eyes! But we ate. We lived.
- speaker: Interviewer
  text: So, most of the time, you were stationed in China?
- speaker: Respondent
  text: Most of the time in China.
- speaker: Interviewer
  text: Did you have one particular base?
- speaker: Respondent
  text: We stayed in the Chengtu area. Oh, yes. Oh, yes.
- speaker: Interviewer
  text: And so in Chengtu--?
- speaker: Respondent
  text: We built our hospital right there. We had our slit trenches. That was where I was hurt during a bombing. I was in
    a slit trench, and I had a bad--my head and my ears were concussioned. See, we had to evacuate our people in the hospital.
    When there was an air raid, we took them out on stretchers. And we had sick trenches, and we put them in slit trenches.
    We had one raid--I had malaria very bad, and a high fever, and I was out of my mind. And that was, also, you contracted
    that in China, yes?
- speaker: Interviewer
  text: But malaria was very prevalent.
- speaker: Respondent
  text: Anyhow, they told me this. They put me in a slit trench. And I'm out of my mind. I didn't know what was going on.
    And the raid was over. It was all quiet. I woke up, and I see stars, and I don't know where I am. And I went, My God,
    they thought I was dead and they're burying me! Oh, dear. I had that horrible feeling. But those things happen. My buddy
    that I told you about, we were walking back from a raid. You know what a P-38 is?
- speaker: Interviewer
  text: Yes, mustang.
- speaker: Respondent
  text: They were over there using strafing. And you could get, in fact, I know the sounds of the engines. As we were walking
    back one night, there was a raid, and a small road, and I said, "Dick, drop!" He went to one side, and I went to the other
    side of the road. And this "B-R-R-R" came down. This just strikes right between us. We both could have been killed.
- speaker: Interviewer
  text: That was a Japanese zero or something?
- speaker: Respondent
  text: No. It was a P-38.
- speaker: Interviewer
  text: An American.
- speaker: Interviewer
  text: Why would a mistake like that happen?
- speaker: Respondent
  text: Oh, a lot happened.
- speaker: Interviewer
  text: That was you and Mr. Dick--
- speaker: Respondent
  text: Silviera Yes, Dick Silviera, yes.
- speaker: Interviewer
  text: So what was a typical--was there such a thing as a typical day when you were in Chengtu?
- speaker: Respondent
  text: No. It was anticipating the next run, planes coming in, going over, coming back, we were active. And we, it is awful
    to say, but there weren't enough serious cases for us. They were all--mostly, they were either dead or they were not very
    serious, except this one chap I said was so bad that I tripped over his-- And I was walking in the mud at night looking
    for bodies and I tripped over his ankle, foot, his foot, we finally found his body later. He wasn't dead, but he was burned
    very badly, very badly, and he was burned so badly we could not take care of him completely, because he nee
