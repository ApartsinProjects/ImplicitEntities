collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: He still lives in Chicago, Illinois. He learned of the Veterans History Project, did you learn from another veteran?
    Is that where you heard about it?
- speaker: Interviewer
  text: Where did you hear about it?
- speaker: Respondent
  text: About the Coast Guard?
- speaker: Interviewer
  text: No, about the Veterans History Project.
- speaker: Respondent
  text: Oh, yeah. I saw—I came here to see that demonstration you have up there now.
- speaker: Interviewer
  text: Oh, you came to see the photo display.
- speaker: Respondent
  text: Yeah. Mr. DeCecco's photo display. One of the fellows told me about it, and he said, "Oh, you should see it. They've
    got ships and everything," you know.
- speaker: Respondent
  text: So, I come to see the ships, and there was no ships there.
- speaker: Interviewer
  text: Yeah, not so much ships.
- speaker: Respondent
  text: So many of these people running around.
- speaker: Interviewer
  text: Well, he's kindly consented to be interviewed for the Project. Here is his story. You go. Speak.
- speaker: Interviewer
  text: Tell me whatever you want to tell me.
- speaker: Respondent
  text: 'Okay. Well, to begin with, I enlisted as an apprentice seaman on October 27th of 1942 in Chicago, for a three year
    period, and duration of the war. And I was born on August 15, 1921. You said that. And my rating I held—as an apprentice
    seaman, seaman second class, machinist mate second class, and machinist mate first class. Yeah. Service schools, I went
    to steam machinists mate training on a ferry boat in Brooklyn, New York, on 5/8/43, and then I was transferred to the
    captain of the port in Newport, Rhode Island. And then from that point, I went onto an 83-footer boat just, you know,
    it was a patrol boat. And then I went to the Constitution Pier. And I got on a ship called Wakefield. And I was trained
    at Manhattan Beach Training Station when I first went in. And the separation center was at #9 Detroit, Michigan. I had
    active duty from November 12th, 1942, to the 16th of October 1945. That was two years, eleven months, and twenty days.
    I had ten days to go, and I could have got a good conduct medal, but I was anxious to get home. And that was it. And,
    of course, I think I told you that on the phone.'
- speaker: Interviewer
  text: Yeah, I got married, and I got an honorable discharge, the button and all the rest that goes with it. Did you get
    married before you finished your service or did you—
- speaker: Respondent
  text: No. I got married in the Service.
- speaker: Interviewer
  text: I didn't know people did that.
- speaker: Respondent
  text: Well, we were engaged, so to speak, and for a couple of years. And then I had to go to the Service.
- speaker: Interviewer
  text: And I tried to get into the Air Corps and they refused me on account of my eyes. I went to the Marines. It was the
    same reason. And I said, "Why are you"—you know, I had glasses on. They said, "What happens if you lose your glasses?
    You won't know where you are at, what you are doing, or anything else! You'd be shooting somebody that is," you know,
    "your own"—what do you call them, mate, or something. But, anyway. And that's how it ended up that I tried that Service,
    and then I tried, all I had left was the Army, or the Air Corps. I think I said the Air Corps, didn't I?
- speaker: Interviewer
  text: Yeah, the Army, and I tried the Navy, and the Navy wouldn't accept me either on account of my eyes, so I was almost
    down to nothing, and knew I'd have to be drafted in the Army. And one of the friends I had told me, he said, "Why don't
    you try the Coast Guard?" "Coast Guard! What the hell are they doing?" He said, "Well, you know, they guard the coast
    and everything else." And I thought, well, I'll see what it's like. "Just like a Navy man," they told me then, "just like
    a Navy man." So, I went down there to get in to enlist, and the doctor that examined me, he said, "Oh, you've got high
    blood pressure." And I said, "I have?" He didn't say nothing about the eyes. He said high blood pressure. He said, "I'll
    tell you what, why don't you go out in the hall there and sit out there for about a half hour or so, and I'll call you
    back when I'm ready for you. And we'll see what your blood pressure is, you know, whether it will come down or not in
    the meantime." I heard somebody say they needed forty-five men or something like that. And then, of course, I didn't know
    where it was coming from or who was saying it. And it ended up that the doctor came out, and he called me over, and he
    checked me over again. And he says, "Fine. You're okay. It went down. How did you get it down?" And I says, "I don't know,"
    you know. "That's it," he says, "You're in." So, okay. And then next morning—Well, that night, I went home and told my
    mother and dad I was in it. And then, of course, they didn't even know what the Coast Guard was. I didn't either. But
    the next morning, I got a call about six o'clock in the morning about coming down to the Army draftees—where all the draftees
    were being, you know, had to report. And I was supposed to report that morning. But I'd joined the Coast Guard. So, I
    told them, I said, well, I said, "I enlisted in the Coast Guard yesterday. They were supposed to let you know." He said,
    "They didn't let us know, but good luck to you. Have a good, long life." "Well, I'll try." And it ended up that that's
    how I got into the Coast Guard, and I got out of the Army. I didn't want to be in the Army, mostly because I'd seen a
    lot of stuff that happens there, you know, you sleep in the mud and everything else. That's not for me. But, anyway, you
    can't be—beggars can't be choosers! They got to take what they get. And that's it. And then, after that, I ended up there.
    I just explained to you about being in—I had to go to boot camp. I went to boot camp. I got to tell you that, yeah. Oh,
    I told you that, didn't I?
- speaker: Respondent
  text: Yeah, I think I told you that.
- speaker: Interviewer
  text: What was it like?
- speaker: Respondent
  text: Well, it's a school, you know, it's like a school. They teach you all about the Navy. And they told us right off,
    the Navy and the Coast Guard are, you know, the same, except that one's got Coast Guard, and one's got—we have a little
    shield over here.
- speaker: Interviewer
  text: On your sleeve.
- speaker: Respondent
  text: On the sleeve, yeah, that shows it was the Coast Guard. And the Army, I mean the Navy just has rings around there.
    We had rings around there, too, but we still had the little shield on there, sewed on there. And I was in the Coast Guard.
    There, they teach you how to tie knots. They teach you how to read semaphore, you know, flag stuff. You got to know how
    to read that. And they don't do that teletype anymore, because it's obsolete, you know. They don't do that anymore. And
    things like that. So, they said, "We don't know where you're going to go in the Service, but we're sending you out to
    this training station." You know, well, that's where I was. I was in this training station, Chatham, not Chatham, Manhattan
    Beach. And then from there, after you spend thirty—forty days, whatever it was, then you got transferred out of there.
    And I got transferred out and I ended up in Chatham Lifeboat Station in Massachusetts, Cape Cod.
- speaker: Interviewer
  text: So what were you doing there?
- speaker: Respondent
  text: Well, we walked the beach. We had to walk the beach. Yeah, really! We had to walk the beach for five miles. And at
    the end of the five miles, there was a clock—there was a clock up there. And you had to carry a clock. So, you went over
    there, and when you got to that thing, you took the key out, put it on, you know, punched the clock, put the key back,
    and then go back. And that's what you did. And, of course, in the meantime, you'd be looking out in the water to see if
    there was any boats or anything that you could see that was not, you know, supposed to be there, or whatever. It was—there
    was no way you could tell them it. You got to run to the station to tell them, hey, there's somebody out there, or something
    like that. So, it's kind of a—something, just something to do, I think, walk five miles, really.
- speaker: Interviewer
  text: Did you have—How do you walk on the beach for five miles? Don't you get—doesn't it take a long time on the beach,
    or is it like a rock beach?
- speaker: Respondent
  text: Well, here's the story, you know, when the tide is out, you can walk on the sand like a sidewalk. You know what I
    mean. The tide's going to be out.
- speaker: Respondent
  text: 'And that''s one of the things you had to—And then if the tide was in, then you had to walk farther up where the sand
    was hard. And, of course, when it got hot and dry, and everything else, then it was—but it was never hot, I got there
    in the winter time. And from there, I didn''t want to stay doing that, so I went to the Naval Station, and I complained
    over there, that I didn''t want to do what I was doing. And they asked me what I wanted to do. And I says, "Well, I wanted
    to be, you know, a machinist''s mate." And they said, "What do you know about machines?" And I told them I was learning
    to be a tool and die maker, and soon, and so forth. And then they said, you know, "Thank you." Well, about two weeks later,
    maybe three weeks later, I got a letter from the District, District #1 out there in Boston. And they told me that I should
    report to New York at the training station at a certain hotel, Sutton Hotel. And I would be going to school there, machinist''s
    mate school. And that''s down there. Now, see, I told you about that—it’s, what is it? I don''t know what that says. It
    says odcg03nd.'
- speaker: Interviewer
  text: Yeah, I don't know what that is either.
- speaker: Respondent
  text: And then it says Rexsta, Boston, Mass.
- speaker: Interviewer
  text: Yeah, that's where I had to go to—I don't know, a receiving station, that's what that is. That's a receiving station.
    And then I went to Boston, and then from there, I went to New York. Anyway, I went to New York, and I was on a ferry boat,
    you know, the ferry boats—have you been in New York?
- speaker: Respondent
  text: Oh. Well, they've got ferry boats that run between Staten Island and the city, Staten Island and Manhattan, and they
    go back and forth, you know. And some of those have been run out. And they have the monthside like a senior, you know,
    so they put the monthside there. Nothing to do anymore. And they teach you all about the steam engines, which was a very
    good thing there. And you had to work on different things. And they tell you about the water pressures, and they tell
    you about steam pressures, and they gave us a good training on that little ferry boat, and that was the way it was. So,
    then, when I went back to, I had to go back to the receiving station, because I was through with the walk on the beach.
    So they, and then all of a sudden, this ship came into being, and then they had to have men for that. So that's where
    I got—I got put on there.
- speaker: Interviewer
  text: On the Wakefield.
- speaker: Respondent
  text: Yeah. On the Wakefield, and I got put on that ship, and as a steam machinist.
- speaker: Interviewer
  text: So, what were you doing on the ship?
- speaker: Respondent
  text: Well, on the ship,
- speaker: Interviewer
  text: As a steam machinist?
- speaker: Respondent
  text: I had to watch the gauges, you know, the steam gauges, because they carried 200 pounds, or 400 pounds, of superheated
    steel and that. You had to be careful, because if anything went wrong, and that steam could just cut you right in half!
    You know, that's how powerful it was. And different things about steam engines, and they had, oh, I can't even think of
    names of some of that stuff. Anyway, that's what I did. And then I was what they called a throttleman. A throttleman is
    a fellow that goes up to, you know, how they get the wheel turning. I mean, not turning but for the engine room.
- speaker: Respondent
  text: For the engine room. Of course, then, the engine room, the bridge, would send a signal down to the engine room, and
    then the engine room would have to answer, and then you'd open this valve accordingly. And when you open that valve, you
    can't do that [open it wide], you got to go a little at a time. And you look at your gauges, and they'll tell you how
    much you want to go, and how slow you want to go, or how fast you want to go. And that was where the job I had, I was
    a throttleman, and, of course, I was a counterman, too. I forgot how this all works. But, anyway, every time that thing
    made a revolution, the shaft made a revolution, it would register on the counter. And as it registered on the counter,
    you'd know how far you went in an hour or whatever, you know, how far you went in the water, in miles, you know, depending
    on how fast you were going and things like that. But that was figured out by the bridge. I didn't have to do all that
    stuff, just get the numbers is all I had to do, and that's what I did. And I did that. They called a throttleman, was
    me and another fellow, one fellow had what they called a port engine, and the other fellow had the starboard engine. They
    had two engines on the ship, and they had to be run by two people. And, of course, we had a lieutenant that was in charge
    of the group, and he made sure you were doing what they called for, and that was what happened there.
- speaker: Interviewer
  text: And I'm trying to think of what else might have happened, not much, I mean one, during the storm, we had one time,
    not a storm, a night shift, or something like that. It ended up that there was an emergency call, you know, they wanted
    a quick stop, because there was something out there. And they didn't want to run into it, and then you have to start closing
    the valves, but you can't close them too fast, because you had 400 pounds of superheated steam, you know. If you did that,
    you'd blow up the ship. And that's how that worked out. That was pretty nice. So did you stop then?
- speaker: Interviewer
  text: Did it work?
- speaker: Respondent
  text: No. No, we didn't stop. They swerved to the side a little bit, because what I heard later on, I don't know how true
    it is—it was a fishing boat that was in our way. But, then, they said, well, it wasn't a fishing boat, maybe it wasn't
    a fishing boat, maybe it was the Germans came over and put a boat over there, so our ship would slow down. And if it slowed
    down, then the submarines had a good shot at us. So, you see, you hear all kinds of things. It was what they called scuttlebutt.
    It was—it was scuttlebutt, you know, it's like you hear—you hear rumors. The rumors in the Service was scuttlebutt.
- speaker: Respondent
  text: Did you ever hear that?
- speaker: Interviewer
  text: Yeah, I have.
- speaker: Interviewer
  text: So where you going—where was the Wakefield going, or was it just patrolling?
- speaker: Respondent
  text: Oh, we were going to—oh, no. No patrolling on the Wakefield. We carried troops.
- speaker: Interviewer
  text: Oh, it was a troop ship.
- speaker: Respondent
  text: Yeah, it was a troop ship. Yeah, they used to carry, I don't know, 14,000 to 16,000 men, or something, soldiers, yeah.
- speaker: Interviewer
  text: So, where were you taking them? You were taking them from Boston or from—
- speaker: Respondent
  text: We were taking them to Italy.
- speaker: Respondent
  text: Yeah. We went to—I think it was—we went to England first and left off some troops over there, and then we got back,
    and then, you know, we had to leave right away, and we headed down towards near Portugal, you know, and Spain, and all
    that. It was in that area, and whatever happened there, I don't remember what happened other than the fact that you had
    to answer the bells right away. If you didn't answer the bells right away, they gave you hell. You wouldn't believe how
    much they gave you, but, anyway, from there, I got on this thing here [the Wakefield], and I spent, oh, it must have been
    a couple years on this thing, eighteen months. I've got it down here someplace. I can't... it's hell when you can't see,
    you know, really it's terrible.
- speaker: Interviewer
  text: I know the feeling.
- speaker: Respondent
  text: It's terrible when you can't see. I must—It was almost 17 or 18 months that I spent on there.
- speaker: Respondent
  text: It was nice. It was good service, good food.
- speaker: Respondent
  text: Beds to sleep in, not a hammock, we had springs on the bed there.
- speaker: Interviewer
  text: So were you separated from the troops that you were moving?
- speaker: Interviewer
  text: Did you eat with them, or did you just—
- speaker: Respondent
  text: No, we ate by ourselves, you know, the Army had their own kitchen crew, and we had our own kitchen crew. We had our
    own meals, and everything else, and whoever made it all, I don't know, that's between the cooks, you know, I didn't have
    nothing to do with that. And what else?
- speaker: Interviewer
  text: Did you meet anybody interesting? I mean, you were from Chicago, so that's a pretty diverse place, did you meet people
    that were a lot different from you?
- speaker: Respondent
  text: No, not in a way when I was in the Service. When I went in, I met, because the group I went with was all Chicago,
    you know, we were all from Chicago, we all went out there. They all went to the boot camp where I went, what they call
    boot camp. And then after you got through with the boot camp, they say, "Ten go over here, and ten go over there, and
    twenty go over there." And that's how I ended up at this surf station, you know. I was in a group that got called to go
    over there. And I spent about three months over there, I think three or four months in the winter time. And, of course,
    I complained to a couple of guys that was there. They'd been there for a few years. And I said, "Jeez, this is a hell
    of a place! Isn't it like a hellhole!" Nothing to do, you know, and you're out on the ocean there, partly like an island.
    And they tell you, "Listen, just wait until the summer comes! That's when you have a good time out here!" "Is that right?"
    "Yeah." So, I told you, in the meantime, I went to find out about going, getting a different position, and then, of course,
    when springtime came, I was shipped out.
- speaker: Interviewer
  text: So you missed all the girls!
- speaker: Respondent
  text: I did, but what would I do with them? What would I do with them? I couldn't do much with them. But I never tried either,
    no. They had some movies when you were in boot camp that showed you about being careful going out to town. You know, you
    get liberty, you go to town, and then they show you a woman that's, well,
