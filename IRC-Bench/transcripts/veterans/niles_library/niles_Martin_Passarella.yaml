source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So Marty, when did you enter the service?
- speaker: Respondent
  text: I got my draft notice, my induction notice, and I entered the service on the 22nd of July, 1966, left from Chicago,
    Illinois, by a train to St. Louis, and I went for my basic training at Fort Leonard Wood, Missouri.
- speaker: Interviewer
  text: Marty, where were you living at the time?
- speaker: Respondent
  text: I was still living at home with my mother; I was 22 years old.
- speaker: Interviewer
  text: In Chicago?
- speaker: Interviewer
  text: Did you attend high school in Chicago?
- speaker: Respondent
  text: No I didn't, I actually have a different background. My father passed away when I was seven. My mother when I was
    growing up, to prevent me from growing up a juvenile delinquent sent me to a school called Glenwood School for Boys in
    Glenwood, Illinois. It was for a school for boys from broken homes by death or divorce. It just so happened to have a
    military background. So when I went into service, I knew close order drill. I knew everything about a rifle, how to drill
    with a rifle, I could disassemble a M1 rifle when I was 12 years old. So when I got the basic training, I adapted more
    readily than someone who did not have a military background. While everyone else was learning how to be a soldier, I was
    doing construction stuff for the drill instructors. What they were learning, I already knew and I didn't need a refresher
    course. It's like a bicycle, once you get on...
- speaker: Interviewer
  text: Marty, did you live in any particular neighborhood of the city?
- speaker: Respondent
  text: I lived in the Humboldt Park neighborhood. We lived on Iowa Street, north of Chicago Avenue, and Wood Street.
- speaker: Interviewer
  text: So, did you say you were drafted at the age of 22?
- speaker: Interviewer
  text: And you had a draft number?
- speaker: Respondent
  text: There was no lottery number at that time. You registered at 18, and were called when needed. "We need you, maybe 40,000
    this month," and off we went.
- speaker: Interviewer
  text: And when you were drafted, what were you doing? Were you working?
- speaker: Respondent
  text: I was an apprentice auto mechanic.
- speaker: Interviewer
  text: Were some of your friends, some of the people from the neighborhood also drafted at the same time?
- speaker: Respondent
  text: They were in. I don't know exactly at what time. From my neighborhood, I only know of two other guys who served in
    the Vietnam, one was killed in Vietnam and the other one had a totally different type of experience than I did.
- speaker: Interviewer
  text: So you wound up in the Army, so that was because you were drafted. You didn't choose the army.
- speaker: Respondent
  text: I didn't choose the army. Of course when you are drafted, you didn't get to choose the service neither, they could
    have said "Marty, you're going to the Army, Neil, you're going to the Marine Corps." They split it up like that.
- speaker: Interviewer
  text: The fact you had a background in the auto mechanics, that didn't affect the army's decision of how to, where to direct
    you?
- speaker: Respondent
  text: That's what I ended up being in the army. Trying to expand this a little bit. I finished my Basic Training, normally
    you'd go through your AIT (Advanced Individual Training), but I was assigned to a permanent party unit in Fort Bliss,
    Texas. I had no AIT, no additional training at that time. As a member of this light right direct support maintenance company,
    they were sending people to the Aberdeen Proving Ground, Maryland, wheel and track school. I was in the first group that
    went to Wheel and Track School; but when I got out of Wheel and Track, my Military Occupational Specialty was a 63 Charlie
    20, which was a wheel and track mechanic.
- speaker: Interviewer
  text: 63 Charlie 20?
- speaker: Respondent
  text: 63C20 or 63Charlie20.
- speaker: Interviewer
  text: Sixty-three C Twenty?
- speaker: Respondent
  text: So I became a wheel and track mechanic, I returned to my stateside unit, but I was not in my stateside unit, I was
    put in a holding company with a signal company was right next to my old unit. My old unit was on orders for Vietnam. So
    the people they had out there, in school, were being replaced in the company so when we came back from Aberdeen, Maryland;
    there wasn't a slot for us. We were, you know, just excess until we received our orders. We knew we were going to Vietnam,
    just didn't know exactly when.
- speaker: Interviewer
  text: Were you an only child?
- speaker: Respondent
  text: Yes, I'm an only child.
- speaker: Interviewer
  text: Only child, so unless you were—
- speaker: Respondent
  text: I shouldn't have been there to start with, if you really want to think about it.
- speaker: Interviewer
  text: Yes, you couldn't have been a—
- speaker: Respondent
  text: I mean you don't see two brothers at the same time, and I never really thought about it or made a stink about it or
    when you think about it, it was just; I went.
- speaker: Interviewer
  text: It must've been a hardship for your mom.
- speaker: Respondent
  text: Oh, I'm sure it was.
- speaker: Respondent
  text: It was just my mom; my dad had passed away.
- speaker: Interviewer
  text: So, the fact you were prepared in a way for the military, because of your high school experience, did you find—
- speaker: Respondent
  text: Grammar school too.
- speaker: Interviewer
  text: Grade school too?
- speaker: Respondent
  text: Oh, Wo-w. I started in 6th grade right through - for six years.
- speaker: Interviewer
  text: You were ready-made. So did it seem like a big adjustment to this; being in the army?
- speaker: Respondent
  text: Just the fact it was military all day long, you would go to school and you still had your parade formations and your
    inspections and your drill stuff. It was military 24 hours.
- speaker: Interviewer
  text: So you were in Fort Leonard?
- speaker: Respondent
  text: Fort Leonard was for basic training; Fort Bliss, Texas, at El Paso was my permanent party assignment.
- speaker: Interviewer
  text: Was that the first time you were away, of course, it wasn't the first time you were away from home for a significant
    period of time, so—
- speaker: Respondent
  text: Well, the first time I was away from home was when I went from Chicago to Basic Training and I said we went via train,
    but when I came home for leave after basic, that was the first time I was ever in an airplane. So I sat there with my
    mouth open with the air conditioning on my face to calm my nerves. Flying was quite different at that time; you got lunch
    on the plane, and you could smoke on the plane. And you were meeting people from all different parts of the country and
    walks of life.
- speaker: Interviewer
  text: Sure, there was an Italian guy, from New Jersey, there were two of them in my company. I remember one, Bernard Pelligrino.
    He was a KIA in Vietnam. You know, he got killed in Vietnam. You leave from here and you know a lot of people from Chicago,
    and when you go to someplace else, you meet people from all over. Were you able to get along with almost everybody?
- speaker: Respondent
  text: Just about. Yes, I'm sure there was some racial tension, but I didn't feel it, I just wanted to get along with everybody.
    Vietnam was a different story. I'm sure there was, maybe after my period there, there was more racial tension, but when
    the guy next to you is black and the guy next to you is Hispanic, it doesn't matter if he was black or Hispanic, you're
    all brothers, you all bleed the same.
- speaker: Interviewer
  text: Do you recall when you departed for overseas territory?
- speaker: Respondent
  text: It was in July; it was July of 1967, but if I was to give you a specific date, I don't recall.
- speaker: Interviewer
  text: And did you know from the beginning when you were drafted, that you were most likely going to Vietnam?
- speaker: Respondent
  text: No, not really.
- speaker: Interviewer
  text: When you got the news that you were going to Vietnam, did that have any impact?
- speaker: Respondent
  text: Was I ready to go to Canada? No. But I suppose some people got to go to Germany or the DMZ or Japan. People did. But
    it was a different time in this country. Years later, it was nobody wanted to go. It was a different time in the country.
    You were still living with the death of President Kennedy, and what can you do for your country and not ask what your
    country can do for you. So you did it as blind patriotism. Okay, it's not that "Yes, we should've been there" or "No,
    we shouldn't have been there", and you did it because it was blind patriotism. You really at that period of time, if you
    didn't get drafted, as a male individual; you owed the country six years of your life. If you went into the military for
    three years, you had three years of reserve. People got out of the military other than the protests and the running, they
    went into the Peace Corps. You can do that instead of going into the military, the Peace Corps. You can serve time in
    another country, some impoverished African nation and you know; helping the people, Peace Corps.
- speaker: Interviewer
  text: So Marty, how did you make the journey to Vietnam. Was it by boat or by plane?
- speaker: Respondent
  text: I flew over on TWA, but I flew out of Travis Airbase in San Francisco, California. It was a night flight, and I swear
    to God, it seemed like all we did was sleep. Sleep and eat the whole time. It was dark, we had a one-hour layover in Honolulu,
    because the flight couldn't have made it all the way and we had another one-hour layover in Kadena, Okinawa before we
    landed at Bien Hoa Airbase in Vietnam. Coming back, it was in reverse, but I flew PanAm coming back and that 20 some hour
    flight was daylight the whole time because you're crossing the date line. I left Vietnam at 1:00 in the afternoon and
    landed in San Francisco at 6:00 on the same day and we were 20 some hours in the air.
- speaker: Interviewer
  text: So when you landed in Vietnam, was there a particular camp or—
- speaker: Respondent
  text: We landed at the airbase, we got on these buses.
- speaker: Interviewer
  text: Is that near Saigon or North?
- speaker: Respondent
  text: Ton Son Nhut airbase was in Saigon, and Bien Hoa was a little further up, a different airbase. You know, you could
    probably have flown into either one Bien Hoa, earlier the flights were going to Ton Son Nhut. We flew into Bien Hoa, we
    got on these big buses. They had heavy metal screens over the windows so they couldn't throw hand grenades inside the
    bus, and we went out to Long Binh Post, which was the largest post in Vietnam. We went to the 90th Replacement Battalion-Camp
    Alpha. We got there in the afternoon and all you had to do was to make the formations. So the evening formation, they
    were going to have people do kitchen police, KP, right all night. So this one guy I was stationed with back in Texas,
    he says, "We'll go to the back of the formation to hide." What do they do? They pull the back of the formation for KP.
    My first day in Vietnam all day long and I'm on an all-night detail. Next day, because of all the KP, was to make daily
    formations. First morning formation, gone, I was sent to II Field Force. II Field Force then sent me to my unit. That
    was day one and two in Vietnam.
- speaker: Interviewer
  text: What was the weather like?
- speaker: Respondent
  text: It's a strange - even in a letter I wrote to my mother - this country just smelled like crap. It really did; it had
    that stench to it. The fertilizer.
- speaker: Interviewer
  text: Human fertilizer?
- speaker: Respondent
  text: Yes. It had that stench. It's a tropical climate, you had a monsoon season and I got there in the wet season. Ironically,
    people think when you hear monsoon, it's pouring like hell. It starts at 3:00 in the afternoon, rains like hell, at the
    same time every day, you know. And it is six months of rain, six months of dry.
- speaker: Interviewer
  text: When you, after you had the first day of the KP duty, then they sent you out two or three days later?
- speaker: Respondent
  text: No, it was the next day. From the 90th Replacement Battalion, you were sent to Field Force. II Field Force took in
    a lot of units; in that area of Vietnam we were all under II Field Force. And then II Field Force sent me to the 2,34th
    Armor which, at that time, was detached from the 4th Infantry Division and Headquarters Company was attached to II Field
    Force. So I was still in the Bien Hoa area in August of that year. What they did was they took my battalion, which came
    over with the 4th Infantry Division, and changed us with the Armor Battalion that came with the 25th. So 1,69th Armor
    went to the 4th Infantry Division, 2,34th Armor went to the 25th Infantry Division. Only thing was 2,34th never worked
    as a complete battalion. Alpha Company was at Cu Chi; Bravo Company was with the 1st Infantry Division at Lai Khe, and
    Charlie Company was up in the DMZ. We were never as one solid battalion unit.
- speaker: Interviewer
  text: Were you at one particular location?
- speaker: Respondent
  text: Well, after we left, after we got flipped, we left Camp Ashley in the Bien Hoa area, we went via convoy through Saigon,
    went up Highway One, QL 1 turns into QL 22, it splits. We were up near Cambodia, at Tay-Ninh. Alpha Company was at Cu
    Chi.
- speaker: Interviewer
  text: So when you were near Cambodia, at night; did you sleep in a barracks?
- speaker: Respondent
  text: We had regular, a barracks; that's the "hooch" in that photograph. When we initially got there, because we came in
    the dark, there was no roof, we had to pull military tents over the top the first night so it was covered. And then when
    I went to the field and when I came back; they were done like this. I was in the Battalion Maintenance Platoon when I
    got there, but I was sick and tired of fixing trucks. I didn't want anything to do with it so I schemed my way into being
    assigned to a Model 88 VTR which is Tank Recovery Vehicle. It is a 54-ton tracked vehicle tank recovery with four crew
    members. So I was on that August, September, October, November, and December of 1967.
- speaker: Interviewer
  text: So you are out in the field, recovering tanks?
- speaker: Respondent
  text: Oh yes. We supported Alpha Company, so I worked with Alpha Company. I worked with Charlie Company, worked on all the
    operations I listed on the Biographical Data Form. In December, 1967, Charlie Company came back down from the DMZ to Tay-Ninh
    Base Camp hooked up with the Battalion Headquarters and Headquarters Company. We had to give them our tank recovery vehicle;
    the battalion had two of them because they lost their VTR in a river. The Tet offensive started on January 31st, '68 and,
    I had heard a friend of mine from Alpha Company got killed. Our Scout Platoon, Recon Platoon, took casualties and needed
    some replacements. I volunteered for combat, finished my tour of duty in the recon platoon; and it turned out that Skip
    who I thought was killed wasn't. What I got, maybe stupidly or however you would put it, I asked for it, I can't complain
    about the outcome.
- speaker: Interviewer
  text: So you list the battles and campaigns you were involved in; was Kunia?
- speaker: Respondent
  text: Kunia, that was a land-clearing operation to take away the hiding areas for the Viet Cong. Kole Kole was a lot of
    that stuff was search and destroy. You look for them and you know.
- speaker: Interviewer
  text: So when you were in those campaigns or actions there; was that when you were in the vehicle recovery unit or was it
    after you volunteered?
- speaker: Respondent
  text: I was in Battalion Maintenance...
