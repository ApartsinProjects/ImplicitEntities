turns:
- speaker: Interviewer
  text: Mr. Abramson, when did you enter the Service?
- speaker: Respondent
  text: In August of 1943, I enlisted at the age of seventeen.
- speaker: Interviewer
  text: Had you completed high school at that time or--
- speaker: Respondent
  text: I had completed high school and had started college. I was going to Illinois Institute of Technology at that time.
- speaker: Interviewer
  text: Were you on a science, or technical, or an engineering--
- speaker: Respondent
  text: I was an engineering student. Mechanical engineering was my major.
- speaker: Interviewer
  text: And you chose to enlist rather than wait to be drafted, is that--
- speaker: Respondent
  text: Well, what had happened was that the Army came into many of the colleges and gave an aptitude test, I think, it was
    especially to the engineering students. And if you, if the student scored high enough in that test, the Army offered to
    send that person to college at the government expense until graduating. And then that person would become out of college
    as a second lieutenant in the Army. And the only thing that the Army wanted was a promise for the student or soldier to
    stay in the Service for three years. In that the tuition was very high at that time, although probably negligible compared
    to today, it sounded very appealing. I spoke to my parents about it. And they were, of course, dead set against their
    seventeen-year-old joining the Army, enlisting, but, after three days of argument, they finally consented. And I indeed
    enlisted in the Army Reserve, because I couldn't be in the Army until eighteen. And they did, at that time, follow their
    promise and sent me to the University of Wisconsin in Madison. And I continued my engineering education there for a short
    time. I believe it was for two terms. At the end of that, I had become eighteen, and, unfortunately, the Army had decided
    to disband that program. The program was called Army Specialized Training Program. And the war had become hot and heavy,
    and they decided they needed soldiers more than engineers, so they disbanded the program. I got notice to discontinue
    my student time at U.W. and report to Fort Sheridan in Illinois for induction into the Army.
- speaker: Interviewer
  text: And were you--you must have had probably mixed feelings at that time, or did you?
- speaker: Respondent
  text: I was very disappointed in that the Army did not follow up with their promise. And I think all of us, there was a
    large number of us that were in the same program. And we all felt very cheated at the time, because we very well might
    have continued our college education where we were and possibly gotten a deferment for being in an engineering school,
    which many of the engineering students had at that time. It was questionable, and I didn't worry about it too much. I
    wasn't really thrilled about being ushered into the Infantry.
- speaker: Interviewer
  text: I'm sure your parents weren't, either.
- speaker: Respondent
  text: No. No. No. No. They, of course, hated to say I told you so.
- speaker: Interviewer
  text: Yes, I bet. And, at that time, your family lived in Chicago?
- speaker: Respondent
  text: They, at that time, were in Chicago. My father was in business in Albany Park at that moment, so that's where I went
    to the Army from.
- speaker: Interviewer
  text: And you had attended Lane Technical High School?
- speaker: Respondent
  text: Yes, early. I had gone all four years of my high school education at Lane Tech - very wonderful school at that time.
- speaker: Interviewer
  text: So you come down to Fort Sheridan, then?
- speaker: Interviewer
  text: So then you had to have a basic training experience, then?
- speaker: Interviewer
  text: And where did that take place?
- speaker: Respondent
  text: I was sent at that time to North Carolina. It was a basic training camp in North Carolina. And I spent my initial
    military training there. Right after that, we were given a pass to go home and wait for further assignment. I shortly,
    thereafter, received an assignment to join the 100th Infantry Division, which was also based in Georgia. And I trained
    with them for a short period and then from there we went to Europe.
- speaker: Interviewer
  text: Was--was that, your training camp experience in North Carolina, was that the first time you'd been--of course, you'd
    been away at University of Wisconsin in Madison, so that wasn't your first time away from home?
- speaker: Respondent
  text: Right. Well, the trip to Wisconsin was the first time, really, away from home.
- speaker: Interviewer
  text: And then was it an interesting experience being in a camp away from home with people from all over the country and
    all different backgrounds?
- speaker: Respondent
  text: Oh, yes. I imagine it was a real insight into what America was becoming.
- speaker: Respondent
  text: Really. Really. It was not only a melting pot of nations, but a melting pot of different parts of the country. And
    meeting people from Appalachia and all over the United States was an interesting experience.
- speaker: Interviewer
  text: So then you were assigned to the, did you mention the 100--
- speaker: Respondent
  text: Yes. The 100th Infantry Division was known as the Century Division.
- speaker: Interviewer
  text: And then you set sail for Europe then from a particular--
- speaker: Respondent
  text: From our camp in Georgia, we were sent to New York where most of the troops were being sent to Europe, and that's
    where we debarked from. We left from the ports in New York and zigzagged across the Atlantic to Europe.
- speaker: Interviewer
  text: So you were in this tech training path, as it were, and then the Army discontinued this engineering preparation programming
    or whatever?
- speaker: Interviewer
  text: And then when they placed you in the Army, what your aptitudes were or your academic training were had no bearing
    on where they placed you in the--
- speaker: Respondent
  text: Unfortunately.
- speaker: Interviewer
  text: Army, you were Regular Infantry, is that right?
- speaker: Respondent
  text: That is correct. Unfortunately, nothing in my past experience meant anything. I had been an excellent photographer,
    and that had been my hobby for some years. And I tried to tell them about that, because they needed photographers. And
    I talked about my engineering training. But nothing mattered. They needed infantry, and that was the bottom line.
- speaker: Interviewer
  text: So when you zigzagged to avoid German submarines, I suppose--
- speaker: Respondent
  text: That was the story, yes.
- speaker: Interviewer
  text: You were in a convoy, I suppose?
- speaker: Interviewer
  text: Did you land in Scotland or--
- speaker: Respondent
  text: No. No. We zigzagged across the Atlantic and landed finally in Marseilles, France.
- speaker: Respondent
  text: And that was a big port. We, the Americans, had already made their initial landing in France and had already gotten
    a pretty good foothold by the time we arrived. And so we arrived in Marseilles and started our march through France and
    Germany from there.
- speaker: Interviewer
  text: And was that difficult going?
- speaker: Respondent
  text: Well, by then, we had pretty well been hardened by our military training and knew what to expect in terms of effort
    required. The sounds, the first sounds, of exploding artillery and gunfire when we got near the front were a bit shocking
    and, very frankly, scary. So we were introduced to that within a short time after landing.
- speaker: Interviewer
  text: And that was still in France?
- speaker: Respondent
  text: That was, yes. We were in the eastern part of France just before going into Germany.
- speaker: Interviewer
  text: And how was Army food at that time? Did you feel like you were well looked after in the field or--
- speaker: Respondent
  text: No. All during basic training and training with the Century Division, we were treated to Army Camp food. And it was
    strictly institutional food preparation. But, at that time, we were working very hard and training very hard and any moment
    to relax and have a meal was not a time to complain about anything that was served us. Once in Europe, we were given rations,
    and each of us carried rations. There were a couple different kinds. There were C rations and K rations. The C rations
    were prepared canned foods which could be heated over a Bunsen burner or any kind of heat that you could get going. And
    the K rations were dried food that came in a box similar to a Cracker Jack box. And it contained crackers, cheese, a chocolate
    bar, stuff of that nature. The canned stuff was corned beef hash, and stew, and that type of food.
- speaker: Interviewer
  text: Was it either one or the other or--
- speaker: Respondent
  text: No. We were equipped with both.
- speaker: Interviewer
  text: So you put them both together, you had a pretty good meal?
- speaker: Respondent
  text: You could do that, but we usually didn't do that. We didn't eat too much at any one time. And we would either choose
    one or the other at any one moment when we decided to stop and partake of some food.
- speaker: Interviewer
  text: And were you able to write home to your parents and family at this time?
- speaker: Respondent
  text: Yes. During the period of training, especially back in the U.S., much of the contact was having V mails with the family
    and friends. Once in Europe, it became a little more difficult for the mail to get to us, especially once we had gone
    into the battlefield and up at the front lines. Every once in a while, I would say possibly every few weeks, we would
    stop at a rest area, and mail would catch up to us, but it was not too often.
- speaker: Interviewer
  text: I'm guessing that as you work your way north, the 100th division from Marseilles up to East-Central France and closer
    to Germany, I imagine that it's getting hotter.
- speaker: Respondent
  text: Hotter by virtue of the action?
- speaker: Respondent
  text: Very much so. Temperature-wise, it was quite cold. And we were there during the winter, and it was cold, and many
    a night was spent in a foxhole with rain coming down. And I, at one point, was in a foxhole for about eight or ten hours
    with freezing water up to my ankles. And in the morning, when we decided, when our commanders decided, to move out, I
    couldn't move. I couldn't walk. And they took me back to a rest and recuperation area where I stayed for about 48 hours.
    And, fortunately, I did not have frostbite. But close to it. And so the weather was very cold, and it snowed, and, so,
    we were subject to that kind of thing.
- speaker: Interviewer
  text: This is November, December?
- speaker: Respondent
  text: Correct. Correct.
- speaker: Interviewer
  text: And then all the time you are getting closer to the, I'm imagining, to the Battle of the Bulge Area?
- speaker: Respondent
  text: That is right.
- speaker: Interviewer
  text: That you mentioned on your form.
- speaker: Respondent
  text: That is correct. As we approached Germany, we were pushing the Germans back, of course, into their own land, and the
    action became quite heavy. And we were subject to a tremendous amount of artillery attacks more than anything. We did
    have a number of front-line rifle skirmishes with German troops. And that was always scary and dangerous. But the big
    danger was from the artillery. The Germans were very adept at their artillery attacks. They had artillery equipment that
    they could zoom in. And the soldiers would say they could put a shell in your hip pocket if they wanted to. And, of course,
    as I say, the artillery attacks became more numerous as we approached Germany. Finally, in the end, that's where I was
    wounded on December 11th, 1944. We were in the Black Forest. And we had dug in into foxholes and the shells began to fly.
    And the bombardment lasted it seemed like for hours, but I'm sure it probably wasn't more than 30 or 45 minutes. But,
    during that time, shells came, were exploding all around us. I was in a foxhole. We had just begun to dig in. The foxhole
    that I was in with two of my buddies was only about a foot deep. When the shells began flying, and we could no longer
    stand up or kneel down and dig, we just lied down flat in this one foot deep foxhole. There was a soldier on either side
    of me. I was in the middle. And we just lied there while the shells exploded all around us. Of course, the rest of my
    outfit was spread around the area as well. At dusk, the shells started about dusk. And, in the morning, all I remember
    is waking up to daylight. And there were aid men, first aid men, standing above me and helping me up. And I found out
    later that the two other soldiers, one on each side of me, were killed. It was quite shocking.
- speaker: Interviewer
  text: So did you recall when exactly you were hit?
- speaker: Respondent
  text: No, I do not. I do not recall it.
- speaker: Interviewer
  text: You were lying on the ground with--
- speaker: Interviewer
  text: And then through the night and then--
- speaker: Respondent
  text: Through the night.
- speaker: Interviewer
  text: And then morning came and--
- speaker: Respondent
  text: As a matter of fact, during the night, I had already been wounded unbeknownst to myself. And I could not understand
    later on why I did not feel pain. And the doctors explained that your body is traumatized and, I guess, going into shock.
    You just don't feel the pain. There are other things involved, some physiological thing that I will not ever understand.
    But at any rate--
- speaker: Interviewer
  text: So you were hit in the back? In the back?
- speaker: Respondent
  text: No, the shell that got me, and I think I was lying on my right side with my left side exposed, and somebody said,
    later on, that the shell might have hit a tree and the shrapnel bounced off the tree and hit my left side, my entire left
    side had been torn up by fragments, artillery fragments. My left leg was broken. Both bones of my lower left leg and tibia
    were broken in half. My chest was punctured. I have, today, I have a six-inch scar in my chest where shells, where part
    of a shell, entered, punctured my chest and punctured my lung. How I ever survived all of this, I don't know. It was a
    miracle.
- speaker: Interviewer
  text: Miraculous. Do you think it was the--I don't know if this is an appropriate question. Do you think that the same shell
    that so injured you also was responsible for taking the lives of the two soldiers?
- speaker: Respondent
  text: Very likely. Very likely. It was hard to tell, because there were so many shells landing at that time, but certainly--
- speaker: Interviewer
  text: Were you taken back to a hospital or medical area?
- speaker: Respondent
  text: Yes. Many people are familiar with the program M*A*S*H. This was a First Aid hospital right behind the lines of any
    battlefield. And the program well describes what these hospitals were like. And they were, the purpose was to immediately
    save the soldier's life rather than try to heal up the wounds, necessarily. And I was taken back to a MASH hospital. I
    was unconscious for three days. Whether it was the drugs, or the shock, or what it was, I don't know. But I woke up three
    days later. And there were nurses around. And I was still in a haze. They had given me a considerable amount of morphine
    to counteract the pain, so I wasn't entirely with it. But slow but sure, my head began to clear. And I was aware that
    the Army, with all injured soldiers, immediately sent notification to the family by way of a Western Union telegram. The
    first thing that hit me was if my parents saw that telegram, they would be frightened to death, and I had to try to contact
    them prior to that telegram. I didn't know how fast the telegram went out. I was encased in a cast from my toes up to
    my waist. My chest was bandaged with pressure bandages. And I couldn't really move. I was flat on my back, so I couldn't,
    of course, write. My first thought was to write my parents a letter saying that I was okay. One of the nurses came by.
