source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So, Mr. Murnane, you were born on October the 9th, 1926?
- speaker: Respondent
  text: Right in Chicago, Illinois.
- speaker: Interviewer
  text: In Chicago, Illinois. So, you were a young man at the time of the--
- speaker: Respondent
  text: Oh, what, 19ish, yeah.
- speaker: Interviewer
  text: Yeah. So, how did you come to enter the Service at that time?
- speaker: Respondent
  text: This is probably the easiest question in the world to answer, Neil. I was drafted.
- speaker: Interviewer
  text: You were drafted?
- speaker: Respondent
  text: That's right. I was in high school. And, at that time, the laws permitted kids who were in their senior year in high
    school, I went to St. Rita High School in Chicago, the laws permitted you to finish your high school year, but as soon
    as you graduated, you were immediately drafted. And that's what happened to me. I graduated from high school. They called
    it the draftee class in December of '44. Yeah, okay, and then I was drafted in January, '45. I was at Fort Sheridan about,
    what, fifteen days after I graduated out of high school.
- speaker: Interviewer
  text: Yeah. So, St. Rita, they were known as the Mustangs, were they?
- speaker: Respondent
  text: Yeah. Oh, what a memory! You are a Southsider.
- speaker: Interviewer
  text: And what's interesting is that you graduated at midyear. Did you--you didn't wait until, it wasn't a June graduation.
    It was a December graduation?
- speaker: Respondent
  text: Yeah, they did that, so they could get us graduated before we went into the Service, so I guess they figured out let's
    get them graduated, because if they get killed overseas, then at least we'll have that for information. See, we all of
    us who graduated or went into the Service at that point trained for the invasion of Japan. And that's what I trained for
    as an infantryman initially.
- speaker: Interviewer
  text: So, you knew the draft was coming for you?
- speaker: Interviewer
  text: And you figured it was going to be the Army? You didn't have a preference for the Navy or the Coast Guard?
- speaker: Respondent
  text: Oh, I had a preference, sure.
- speaker: Interviewer
  text: What was your preference?
- speaker: Respondent
  text: I would have liked to be in the Navy, because it's hot water, and clean, and all that stuff. But, you know, I went
    up to an officer much like yourself, and he looked at my paper, and he had a big stamp. Boom! "Infantry." I trained for
    the invasion of Japan.
- speaker: Interviewer
  text: Is that down--is that induction center in downtown Chicago, somewhere?
- speaker: Respondent
  text: Yes, an induction center in Chicago, and then I was sent to Fort Sheridan, Illinois, for initial processing. And then
    from that point, I was shipped to Camp Fannin, F-a-n-n-i-n, Texas, in East Texas for initial infantry training. It was
    located near present day Tyler, Texas, "The Rose Capital of the World." I could go on with my stops, if you want; from
    Camp Fannin I finished seventeen weeks of infantry training, was sent home for a furlough, then sent back to Texas, Camp
    Maxie, M-a-x-i-e, still in east Texas. That was training for invasion to Japan, infantry training, and then from there,
    I was sent to a camp in Oregon. I'm quite--not sure of the name of that one, but more infantry training. Finally sent
    to a camp in Washington State, from there, more training, and, from that point, we went overseas from Camp Lawton, Washington.
- speaker: Respondent
  text: That was a long time ago.
- speaker: Interviewer
  text: Yeah. So you had your boot camp in down in Camp Fannin, was it--
- speaker: Respondent
  text: Yeah, a boot camp in two Texas camps, Camp Fannin, and Camp Maxie, Texas.
- speaker: Interviewer
  text: Was that a pleasant experience, or unpleasant, or it was what it was?
- speaker: Respondent
  text: Well, it was an adventure. It was pleasant. I was in good health. I was nineteen years old. And you've got to remember
    that World War II was a very popular war. And if I didn't get into the Service, I would have been crushed.
- speaker: Interviewer
  text: So, you and all your friends, you were looking forward to going in?
- speaker: Respondent
  text: Oh, yeah, absolutely.
- speaker: Interviewer
  text: And doing your part.
- speaker: Respondent
  text: Absolutely.
- speaker: Interviewer
  text: No question.
- speaker: Respondent
  text: Well, yeah, because, again, we were attacked, and everybody felt that way. So much so, if you didn't get into the
    Army, you were called a draft dodger, and that was a very negative type of thing.
- speaker: Interviewer
  text: So, was that the first time you had done a lot of traveling in the United States?
- speaker: Interviewer
  text: So, you must have met all different kinds of people?
- speaker: Interviewer
  text: And seen all different kinds of places?
- speaker: Respondent
  text: Oh, sure was. As a kid, I wouldn't have had the opportunity to travel anywhere. Remember, this was just at the end
    of the Depression. And I was from a poor family. My father was a streetcar conductor, streetcars, and, so, we didn't have
    any money. And he died early. So, there was no money to go anywhere, put it that way.
- speaker: Respondent
  text: Until the Service, and, all of a sudden, the world was open.
- speaker: Interviewer
  text: And did you find it interesting to meet all these different kinds of people?
- speaker: Respondent
  text: Fascinating.
- speaker: Interviewer
  text: And you got on well pretty well with all of them?
- speaker: Interviewer
  text: And you got on very well with most of the people?
- speaker: Respondent
  text: Yeah, see, during high school years, I fell in love with the Spanish language. I found that I had an ear for that,
    so I developed pretty good language ability. And, so when I was in the Philippines, the alternate language to English
    and Tagalog - the native language, was Spanish, because of the Spanish educational system prior to the Spanish-American
    War. So, I got along well, because I spoke the language.
- speaker: Interviewer
  text: So, you were trained in the infantry?
- speaker: Interviewer
  text: As part of the--but then you wound up in the--then you were assigned to the Army Air Corps?
- speaker: Respondent
  text: Yeah, as you remember, as I was on the ship going over to the Philippines, VJ-Day, the atom bomb was dropped. VJ occurred,
    and World War II was over. So, by the time I stepped off the ship in the Philippines, first on Leyte Island, L-e-y-t-e,
    and then L-u-z-o-n Island, Luzon, the war was over.
- speaker: Interviewer
  text: So were you actually on the ship when they dropped the bomb?
- speaker: Interviewer
  text: So how did you feel about them dropping the bomb?
- speaker: Respondent
  text: Well, we didn't hear about it until we got to Leyte. And we were ecstatic, for one reason only. We would live. Because
    the odds predicted for the invasion of Japan were at least one million casualties. So that was the insurance proof that
    we were going to live through World War II.
- speaker: Respondent
  text: Fascinating experience. Oddly enough, I saw the figure, you asked me how--it was the first thing I remember in getting
    off the ship, not in Leyte, because we didn't get off the boat there, but in Luzon, where I was stationed, this is the
    big island where Manila is, the first thing I noticed was the smell. Not an unpleasant smell; a greenhouse smell, a fetid,
    growing, green, humid type of thing. I'll never forget that. I don't forget it now.
- speaker: Respondent
  text: Yeah. And from their end, and everything was a fascinating experience, because I was open. I loved geography and European
    history. And I knew I would live.
- speaker: Interviewer
  text: So you sailed from the United States on a ship?
- speaker: Respondent
  text: Yeah I sailed-- Probably from-- Yeah. The USS Bolivar. B-o-l-i-v-a-r, APA-34. APA means an Armed Naval Transport.
    And I sailed from Vancouver, Washington, to Leyte, L-e-y-t-e at the Philippines. From there, new orders were received,
    and the ship took us to Luzon, Luzon in the northern Philippines. This is the big island where the capital of Manila is
    located.
- speaker: Interviewer
  text: And when you got on the ship, you thought you were going to be in the infantry invading Japan.
- speaker: Respondent
  text: And when you get to the Philippines, you're no longer going to invade Japan, and is that when the decision was made
    to put you in the Army Air Corps?
- speaker: Interviewer
  text: I guess so. You never know.
- speaker: Respondent
  text: Yeah. The first thing they put me in, because I was a drummer in St. Rita band, they put me in an Air Corps band.
    That didn't work out, so they sent me off, so, finally, sent me up to Clark, C-l-a-r-k Field in the Northern Philippines,
    which was the big air base for the Thirteenth Air Guard. That was the Air Corps. See, various Army Air Corps were divided
    during World War II. The Fifth was in Europe, and the Thirteenth was in the Philippines, Saipan, Tinian, the Western Marianas
    Islands.
- speaker: Interviewer
  text: During this time, how did you find the Army food or the food in the Philippines? Did you--were you interested in it
    at all? Did you gain weight? Did you lose weight?
- speaker: Respondent
  text: Okay, did I lose weight? Yeah. I don't know. I wasn't even conscious of weight. How did I like the Army food? Remember,
    I was in the Army for almost nine months. At that point, I was used to it. It wasn't a question of liking. It was a question
    of getting enough.
- speaker: Interviewer
  text: Getting enough of it.
- speaker: Respondent
  text: Sure. It was okay. It kept you alive. No, I'm not a big food person. I wasn't then, so probably this was just as well.
- speaker: Interviewer
  text: The--you were-So, you spent most of your time at the Philippines then at Clark Air Force Base?
- speaker: Respondent
  text: Yes, most of my time at Clark Air Force Base. And Clark, of course, was on the island of Luzon, L-u-z-o-n. I split
    my time between Clark Field and Manila. I got to know Manila very well. I still do.
- speaker: Interviewer
  text: So, what were your duties then while you were at Clark then?
- speaker: Respondent
  text: At Clark Field, I was a supply sergeant. I was a corporal, but they called me sergeant. I literally passed out supplies,
    uniforms, underwear, that type of thing. And, also, I was able to develop a friendship with the sergeant in charge of
    the motor pool, a very good liaison to make, because then he came into the supply depot for white T-shirts which were
    very, very much in demand. He could borrow firearms, that type of thing. In return, he would let me borrow jeeps and motor
    pool stuff, so I could go all over. Let's say, mutual advantage society. We helped each other.
- speaker: Interviewer
  text: And was it hard work at that time?
- speaker: Respondent
  text: Nah, nothing. The war was over, and it was difficult to stay busy -- there was nothing to do. We were just waiting
    to go home, very unbusy, sitting.
- speaker: Interviewer
  text: Did you have a lot of time to write letters home to people, or did you do that, or did you have to stay in touch?
- speaker: Respondent
  text: Yeah, a lot of time to write letters home, a lot of time to go into the local towns to get drunk, all that kind of
    stuff, a lot of recreational time, put it that way.
- speaker: Interviewer
  text: Did you play, like, baseball or football or--
- speaker: Respondent
  text: Yeah, baseball, I think. I wasn't much for sports, but I was very much for borrowing jeeps from the motor pool.
- speaker: Interviewer
  text: And driving them around.
- speaker: Respondent
  text: Geography all over the area, because I loved geography. I got maps, that type of thing. So, I became very interested
    in the local geography, flora, fauna, the whole nine yards. I still remember it, and I also picked up some Filipino language.
- speaker: Interviewer
  text: It must be beautiful country.
- speaker: Respondent
  text: Yes, I thought so, and, oddly enough, what I'm doing now ties into that after all these years, because I worked in
    a local hospital with a lot of Filipino nurses.
- speaker: Respondent
  text: And I still remember some of the language. And a lot of the nurses are from the area that I was in the Philippines,
    so we had a great time reminiscing. I liberated their pieces, parents.
- speaker: Interviewer
  text: Yeah. Clark Air Force Base, is that still there, or did the United States close that down?
- speaker: Respondent
  text: I'm not sure. I heard that it was being closed down as far as a military base was concerned, but kept open as a terminus
    for UPS air and that type of thing. I'm not quite sure on that point, though. I've heard that from some of the Filipino
    people that I worked with, and I wouldn't be surprised, because a huge base of a lot of runways and that type of thing,
    yeah.
- speaker: Interviewer
  text: American soldiers must have been--were they fairly popular among the Filipino people?
- speaker: Respondent
  text: Yeah, because we liberated them from the Japanese. And anybody who wore an American uniform was a hero, and that lasted
    all through my time in the Philippines and, of course, lasted when I came home. It was not at all like the Vietnam experience
    where they wore the same uniform that I wore; I came home a hero, a Vietnam person came home a bum, and they were spit
    on.
- speaker: Interviewer
  text: Yeah. Did you mention that you had to spend some time in the hospital when you were in the Philippines?
- speaker: Respondent
  text: Yes, when I was a patient in Clark Field, probably sometime in early 1946, I'm guessing there. I contracted tropical
    encephalitis, which is a tropical sleeping sickness. It can be very fatal. Two, or three, or four people in my base got
    it. They died; I lived. I was in Clark Base Hospital for, I don't know, maybe two or three weeks, something like that.
    But then I was sent up to the mountain capital of the Philippines, Baguio. B-a-g-u-i-o, which was a cool area and a recuperation
    center, and I stayed there, I guess, for about, let's say, two or three weeks, but I'm not sure. The memory gets a little
    hazy at that point.
- speaker: Interviewer
  text: Yeah, do you contract that disease from a germ, or an insect, or--
- speaker: Interviewer
  text: And were you worried at that time about your--
- speaker: Respondent
  text: No, because I was asleep.
- speaker: Respondent
  text: I went to the hospital with a big headache. I fell over, and I woke up three weeks later in the hospital with them
    shooting me with, I guess, what was penicillin. At that point, they say that I lived.
- speaker: Interviewer
  text: You were maybe sleeping for a couple of weeks then?
- speaker: Respondent
  text: Oh, yeah. I had no idea.
- speaker: Respondent
  text: See, they didn't show you medical records in those days at all, but they told me what happened to me, and said that
    I was okay. I was cured. And they were going to send me up to the recuperation center, which is cool, you know, rather
    than the lowlands, which was tropical. So, that's what happened. But I had no idea what had happened to me, until I woke
    up, and they told me, you know, sort of a post-trauma type of thing.
- speaker: Interviewer
  text: Yeah, so you were able to return to your regular duties then?
- speaker: Respondent
  text: After a while, yeah. They sent me back to the supply department at the Thirteenth Air Corps, and I stayed there and,
    I think, for six months or more, something like that, until I went back to Manila for discharge, and returned to the United
    States. This is probably not worth talking about, virtually the end of 1946. I have the exact dates somewhere, but my
    memory says this.
- speaker: Interviewer
  text: Sure. When you came back, did you find it difficult to move back into civilian life? Did you have to look for a career?
    Did you ever think of making a career of the Army or anything like that?
- speaker: Respondent
  text: Oh, hell, no. No. They wanted us all to re-up, spelled re-up, reenlist, but forget it! Two years was enough! But during
    the war, I'm sorry, during my hospital experience, I came to know a chaplain, a Father Carpenter, who got me interested
    in the old GI Bill of education at that point and told me that I could have four years of university for nothing. So,
    I couldn't pass that up, and when I got home I looked into that and enlisted, I should say, enrolled, at Northwestern
    University. And I first went to two years of junior college back then, and, from there, I switched to Northwestern in
    Chicago, in Evanston, and graduated from Northwestern.
- speaker: Interviewer
  text: Where did you go--to your two years of community or junior college?
- speaker: Respondent
  text: Oh, just general stuff.
- speaker: Interviewer
  text: Where did you attend?
- speaker: Respondent
  text: Oh, where. Crane, or?
- speaker: Interviewer
  text: No, it was in the Southside. It was the old Lindblom High School, but I can
