collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: So Mr. Lee when did you enter the service, that would have been in World War II?
- speaker: Respondent
  text: I enlisted in April of 1944 and I was called up as of July 1, 1944. I was in until June 28th of 1946.
- speaker: Interviewer
  text: Where were you living at the time you were called up?
- speaker: Respondent
  text: When I enlisted? I was living in Brookfield, Illinois.
- speaker: Interviewer
  text: Had you completed high school at that time?
- speaker: Respondent
  text: Yes, because of the war we got out of high school the end of February and that was to permit us to go to college because
    the draft wasn't until you were 18 years of age. But I chose to enlist in April. It was a chance that I could get some
    college education because of enlisting at that time.
- speaker: Interviewer
  text: So you were actually 17 when you enlisted?
- speaker: Interviewer
  text: There was a great feeling of patriotism in the country at that time.
- speaker: Respondent
  text: Yes, I was a member of the Sons of the American Legion. As a result, unbeknownst to me, immediately, I became a member
    of the American Legion when I enlisted and that was forwarded on later on in my pay grades. They gave me credit from the
    time I was enlisted and the time I went into the service.
- speaker: Interviewer
  text: Being a young person at that time it must have been an unusual environment to be in, you're finishing up your last
    semester in high school and then you're thinking about what you are going to do and there's a war on ...
- speaker: Respondent
  text: I was thinking about it earlier than that. I was at a basketball game on December 7th with my father. They stopped
    the game and announced that Pearl Harbor had been bombed and attacked. I turned to my Dad and I said, "Where's Pearl Harbor?"
    And he didn't know. Nobody knew, I don't think anyone knew at that time. It prepared me for the fact that my uncle was
    going in. My other uncle was going into the service. As a result I knew that I was going into the service because it was
    pretty bad at that time.
- speaker: Interviewer
  text: So there was a general acceptance in the family that you would be going in.
- speaker: Respondent
  text: Yes, I had the idea, in fact, I am doing some memoirs and everything and I'm toying with different titles. I felt
    that really that I was born to die. Then things turned different, then I was born to live. I've got a lot of material
    that I've written. I was a good letter-writer and I took notes. Some of which I brought here today. It was one of those
    things. I knew that I was going to go in.
- speaker: Interviewer
  text: May I ask what high school you attended?
- speaker: Respondent
  text: I attended St. Philip High School. It is now called St. Philip Basilica High School and closed down in the late 1960s.
    They still have a reunion, the first weekend in May, an all-class reunion and I go to that. I was the class of 1944 and
    there aren't too many people who are showing up at the table.
- speaker: Interviewer
  text: So was that a west side high school in Chicago?
- speaker: Respondent
  text: It was roughly at Kedzie Avenue and Jackson Boulevard.
- speaker: Interviewer
  text: Was it the Servites who taught there?
- speaker: Respondent
  text: The Servites and the Viatorian Fathers, the Servite Brothers part of their education was to teach in the school and
    they attended Loyola. A lot of the Brothers who taught me became priests. I kept in contact with a lot of them after I
    got out of the service and I traveled with my company.
- speaker: Interviewer
  text: So when you enlisted you chose the Navy, then?
- speaker: Interviewer
  text: Could you swim or you weren't afraid of water?
- speaker: Respondent
  text: I couldn't swim very well. I had an accident as a youngster at a pool in which I dove too deep and I hit the bottom
    of the pool and that frightened me a little bit. We used to take vacations up to Lake Geneva and I was not really a good
    swimmer.
- speaker: Interviewer
  text: But you chose the Navy.
- speaker: Interviewer
  text: Had any of your uncles, anyone in the family gone into the Navy or your friends?
- speaker: Respondent
  text: My one uncle had gone into the Navy. He was at the upper part of the draft. He was close to 38 years old when he went
    in. My other uncle was only 9 years older than I. He was in the Army. He was an officer in the Army Transportation Corps,
    throughout, later on, different cousins of mine went in. Neighbors where I lived—we lost a close neighbor in 1942; his
    plane was shot down in the Pacific. It was very tragic at that time.
- speaker: Interviewer
  text: Mr. Lee when you were inducted would that have been downtown Chicago?
- speaker: Interviewer
  text: And then you took a train to Great Lakes?
- speaker: Respondent
  text: No. We were in the Insurance and Exchange Building as I recall. They took us right down to the train station and put
    us on a train to DePauw University in Greencastle, Indiana. We were to study there and take all our Boot Camp, Physical
    Education down there and we took anywhere from 18 to 20 credit hours in classes, basic classes. And the reason for it,
    coming out of high school, they had used up all the young men that were in college and they had started that program to
    get officers for the Navy. This was going to be the addition to it because they were running out of officers because of
    the battles that were occurring in the Pacific. And the way it worked out is that we went 3 trimesters in a calendar year
    and after 4 trimesters, 2 years of college, at that point we would become a midshipman in preparation to become an ensign.
- speaker: Interviewer
  text: So you were on an officer track, then?
- speaker: Interviewer
  text: And that was because of an aptitude test or education?
- speaker: Respondent
  text: I had good grades in high school, and as a result I continued with my education.
- speaker: Interviewer
  text: Was that the first time you were ever away from home for an extended period of time?
- speaker: Respondent
  text: Other than visits to my grandparents in Indiana. But mostly I had only traveled between Indiana and Wisconsin. I hadn't
    traveled around much at all.
- speaker: Interviewer
  text: There must have been a lot of different types of people there from different parts of the country?
- speaker: Respondent
  text: Oh yes. A lot of the men who were overseas had qualified to join that program. They came off their ships and were
    brought in with us and, of course, we were 17 and 18 years old and they were 22 or 23 years old. They hadn't been to college
    but they got the opportunity to go to college. They already had sea duty. As a result, I was fortunate enough to room
    with some of the individuals. In most cases I kept track of them throughout and even to this day. I still know people
    that go back to the middle forties.
- speaker: Interviewer
  text: There can be quite a bit of difference between a 17 and 18-year old and a 22 and 23 year old, especially when they
    been overseas already.
- speaker: Respondent
  text: 'It was an interesting thing because a lot of us were athletes in high school and I never smoked in my life. I was
    given the choice: "Do you want to smoke or do you want to play basketball?" I wanted to play basketball so I never smoked
    and it carried on with the people I associated with at 17 and 18 years of age and one fellow was a very close friend.
    His dad was a coach of basketball. He never smoked. It was natural for us to be together.'
- speaker: Interviewer
  text: Did you have a chance to play basketball when you were down at Greencastle?
- speaker: Respondent
  text: I played in a kind of intramural arrangement at college. I didn't make the varsity. I was too short. I was 5' 8".
    I played basketball for all four years of high school on the junior team.
- speaker: Interviewer
  text: Was that 5'9" and under?
- speaker: Respondent
  text: 5'8" and under.
- speaker: Interviewer
  text: Your service history states your unit was the V-12. What did that signify?
- speaker: Respondent
  text: They had various groups. They had a V-5 which were Navy people going into the Navy Air Corps. They had different names,
    letters. These were basically volunteer—the V. It might be "Volunteer" or might be "Victory" We did have some Army. They
    had an Army contingent at that school also for Army officers. They were doing the same thing as the Navy. And they would
    go on to their officer training and V-5 would go on to their flight training and the V-12 would go on either to supply
    or to engineering, or pre-dental, or pre-medical also that were in the V-12.
- speaker: Interviewer
  text: During the two years you were in Navy, most of the time was spent going to school, developing as an officer?
- speaker: Respondent
  text: Yes, as we got into the program more, after 16 months, we started getting more military training. I was transferred
    to Purdue University. Because the war was turning in our favor—but they didn't know what to do with us; they might not
    need us. In 1945 the European war was over and everything shifted to the Pacific. As a result of that, at Purdue I was
    taking courses in seamanship, damage control, communication, celestial navigation, which I didn't have at DePauw in Greencastle.
- speaker: Interviewer
  text: Did you ever get on the water when you were in Indiana?
- speaker: Respondent
  text: No, we never got out on the water, other than cooling my feet in the river in the summertime. It was hot down there.
    After, when we went to Purdue, I was not going to be an engineer and you could only get B.S. at that time, a Bachelor
    of Science at Purdue you couldn't get a Bachelor of Arts. Because of that, they separated us, after one semester there.
    There were 12 of us who were transferred to the University of Pennsylvania, the Wharton School of Business and we got
    more classes in regard to economics and accounting.
- speaker: Interviewer
  text: It is a wonderful school.
- speaker: Respondent
  text: It was a very big school, even in those days.
- speaker: Interviewer
  text: At DePauw, without the Navy there they would have very few. They had a dormitory for people who were possibly unable
    to be in the service or young enough. There were less than 200 men so they had a lot of girls who joined the crowd down
    there. It was a situation there were a lot of men there but very few girls if you wanted to have a date. I can remember
    asking a girl for a date; it would be about 2 and 'l2 months before she was open for a date. When we went to Pennsylvania,
    we did things in water like how to abandon ship, using cargo nets.
- speaker: Respondent
  text: That must have felt—
- speaker: Interviewer
  text: Yeah, we had to jump in the water with a lot of debris in the pool, as a result, to simulate putting your arms to
    protect your face but you could still hit your elbows with debris floating.
- speaker: Respondent
  text: You weren't thinking about the time you hit your head in the pool.
- speaker: Interviewer
  text: No, I didn't think of that. That's the situation we were in. They didn't know what to do with us the war was coming
    to an end. And they made the decision because we had signed up when I was 17. I was going to be in there until I was 21.
    It was what they called a minority situation. And the only way could get out was at the convenience of the government,
    a COG. That's what they chose. They gave us an option we could stay in and continue on with the peacetime program, which
    is the Naval ROTC program, which is still in existence now, but you had to complete a peacetime course and then you would
    have to serve another eighteen months in the Navy after that; that was the requirement. At that point, I chose to get
    out. I had the GI Bill I could finish up my education and go on with my life or what I thought was going to happen. I
    was classified 1 C in the draft.
- speaker: Interviewer
  text: But at that time your heart wasn't set on being a navy officer and having a ship and sailing the seas?
- speaker: Respondent
  text: No, at that point I decided the schools were 3 different patterns of enrollment, less than 2,000 at DePauw. I went
    to Purdue at that time where it was about 7,000. I went to Pennsylvania and it was about 15,000. As soon I got to Pennsylvania
    and the Wharton School of Business when you're in a lecture hall, they say number "315" - they didn't know your name.
    They just knew a number for you. I immediately applied to go back to DePauw and transfer whatever credits I earned, but
    all the military credits, couldn't transfer. They didn't want that. So a lot of us went back there to graduate - that
    was the easiest. So that DePauw set up a program for the military that were coming back. I had to learn a language. That
    was a requirement of DePauw and I was able to take a course at Purdue in Spanish. It was an open class that I could take,
    I had one 3-hour class that I could take so I said, and "I'll take that." I also took Business Law course there—I took
    two of them there and that was able to be transferred down. I don't think I transferred anything from the Wharton School
    of Business down there. When I got back to the school in September '46, back to DePauw, they had arranged they would have
    special language courses for the military only. In fact, I think there were maybe one or two girls that qualified for
    it that were in the class. We had it five days a week, 2 hours a day. Plus the following year we had another 3-hour class
    - so that was 8 hours of Spanish. But I still had to get my mathematics courses in. I was taking Math and Spanish my senior
    year. I had the qualifications for everything, 128 credit hours. But of all the schooling I had. I had 168 or 169 credit
    hours, but those were all Navy courses. I couldn't do anything with so I graduated when I was 20 years old from college.
- speaker: Interviewer
  text: Wow. From DePauw with your Bachelor of Arts in Mathematics.
- speaker: Respondent
  text: Now the fun began. I got a job in industrial statistics, right in my line of business. I worked for Western Electric
    in the Hawthorne Plant.
- speaker: Interviewer
  text: You had worked hard but it sounds like you secured a wonderful education, kind of matched your abilities and aptitudes.
    You didn't have any difficulty when finishing your college education in securing a job?
- speaker: Respondent
  text: No. I got the job—very interesting. I went to night school that they provided for industrial statistics. I got course
    recognition for that. That was first in my mind so now I'm turning 21 and I said to myself, "I'm going to go back and
    do graduate work." I worked for 14 months at Western Electric, and I gave notice and I said, "I'm going back to school."
    And there was no problem. But two months later, they had a cut-back at the Western Electric and anybody who didn't have
    two years of service was going to be laid off. Well, I would have been laid off 2 months later and it would have been
    in the middle of the semester at school. I did it in August and at the end of September was the cut-off date—I would have
    been out of a job! And I wouldn't have been able to get into school because it would have been too late because they had
    gone to September; they had gone to 2 semesters.
- speaker: Interviewer
  text: So at what school did you take your graduate courses?
- speaker: Respondent
  text: I took graduate courses at DePauw in Mathematics.
- speaker: Interviewer
  text: Back at DePauw?
- speaker: Respondent
  text: Yes, I was taking the classroom courses and about to start on my thesis and I had a health problem. In December, it
    was either cut back on something or quit altogether. I talked to my counselor, Professor Eddington, who suggested that
    I delay the thesis and just get the coursework in and then make a decision. I did that for the entire year so I had all
    the coursework done but I still had the medical problem.
- speaker: Interviewer
  text: Were you still able to use GI Bill for the Master's?
- speaker: Respondent
  text: Yes. The tuition was unbelievably low, compared to what it is now.
- speaker: Interviewer
  text: You must have liked Greencastle, Indiana.
- speaker: Respondent
  text: I did; it was small but a lot of interesting things happened in that town that people don't know. John Dillinger robbed
