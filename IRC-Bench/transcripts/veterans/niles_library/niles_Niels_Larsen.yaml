turns:
- speaker: Respondent
  text: I joined the Army Reserves in October, 1949, just after I turned eighteen. I was a student at Purdue University, West
    Lafayette, Indiana, and in the Army ROTC. I was also a member of the rifle team. The Army Reserve Unit in Lafayette recruited
    a number of us from the ROTC. We became members of the 393rd Field Artillery Battalion (155 self-propelled howitzers).
    A number of us joined the Reserves because it would be interesting, and a chance to make a little extra money. Also things
    were sort of quiet in the world at that time. And, so, we would meet in a building in Lafayette every two weeks for our
    training. It worked out very well. As a Freshman at Purdue, I was studying Forestry. In the Summer of 1950, I worked for
    the Forest Service in Coeur d' Alene National Forest in Idaho. Our job was to pull weeds that were affecting and killing
    a lot of trees. We lived in tents and maybe once a week we would get into Coeur d' Alene. There were other teams of workers
    who were farther into the woods and only got into town about once a month. Occasionally, we'd get together and have a
    beer party out in the woods.
- speaker: Respondent
  text: Then on Sunday, the 25th of June, 1950, I will always remember we were taking it easy, and sitting in a tent, and
    then they announced on the radio that South Korea had been invaded by North Korea. Most of us, we didn't know where that
    was located. I had a hunch, I don't know why, that our unit was going to be activated. I talked to my boss who had been
    in the Second World War, and told him of my hunch. He said, "Well, if you feel that way, go, because I did the same thing
    in the Second World War." I then decided to hitchhike home to Chicago.
- speaker: Interviewer
  text: How long did that take?
- speaker: Respondent
  text: I think it took about four days. I did it in like thirteen rides. I got the first ride out of Coeur d' Alene with
    a couple of kids. They had a big keg of beer on the back seat of the car, and I thought, Uh! Oh! I rode with them for
    a while and then said "Just let me off here." I didn't want to go with them. I got to the west entrance of Yellowstone
    National Park. You are not supposed to hitchhike there. However, a man and his son stopped and said they lived in Billings,
    Montana and were spending the day in the Park. They said, "If you'd like to come with us you can." So, I said, "Fine."
    They were very nice. They offered to put me up for the night, but when we got to Billings, I told them I wanted to keep
    going. I was standing by the highway thumbing a ride when a police car came by. He came by again, stopped and asked me
    for my identification. I had all my clothing, logging boots, and such in my duffel bag.
- speaker: Interviewer
  text: You weren't wearing a uniform?
- speaker: Respondent
  text: No, just Levi's, and such. I told him where I had been working and that I felt that I would be called for active duty
    and was heading home. I had the money and could have taken a bus, but I wanted to try and hitchhike home. He said, "Well,
    you won't get a ride here." He said, "Get in the car." I did, and he took me to a gas station where the truckers often
    stop. He went into the station there and told the attendant "Get this guy a ride." I did get a ride. The last ride I got
    was at a gas station by the Wisconsin Dells. The attendant there said, "I'll see if I can find someone going to Chicago,"
    He did, and this trucker and his brother had a farm in Wisconsin. They would bring eggs to the market on Water Street
    in Chicago. The brother I rode with lived in Bensenville, IL. He said, "Well, I can give you a ride if you want to give
    me a hand loading eggs." "I have to stop in Bensenville and then I'll drop you off." I said, "That's fine." He dropped
    me off within a couple of blocks from my home. It was about six or seven in the morning, and my folks they were eating
    breakfast when I walked into the house. Later that day, they announced on the radio that our Reserve Unit and three other
    units were being called to active duty. We were supposed to go to Camp McCoy for two weeks in September, but I received
    a telegram stating that summer camp was cancelled and to report for active duty.
- speaker: Interviewer
  text: Camp McCoy was located in?
- speaker: Respondent
  text: Near Tomah, Wisconsin. We were activated in Lafayette, Indiana, September 11, 1950. We were the cadre and most of
    the fellows were World War II vets. We stayed in a hotel in Lafayette for about two weeks. Double and triple-deck bunks
    were set up in the rooms. There were maybe four or five of these bunks in a room. At first the people were very happy
    for us, but then some of the fellows would get into trouble and people would ask, "When are you leaving?" If someone got
    into trouble, they would be restricted to the hotel. They weren't supposed to go out. It was funny! The Monon rail line
    ran right alongside the hotel, and we would hold our formations and drills on that street. We had to move when the train
    was coming through. We took a lot of razzing from students at Purdue.
- speaker: Respondent
  text: But, then, finally, we took a train to Camp Rucker, Alabama. The Army Camp had been closed since 1945, and, together
    with other units we reopened the Camp. When we arrived, we found snakes and all sorts of things in the building when we
    were getting set up. We did not have our weapons at the time for proper training. We would go into town and purchase lots
    of firecrackers for simulation when holding our field exercises. The Minnesota National Guard, the 40th Division, arrived
    at the camp, as well as many draftees. Units were being brought up to strength. Equipment began arriving and training
    progressed.
- speaker: Interviewer
  text: Would anybody drafted during this time in Chicago possibly end up at Camp Rucker?
- speaker: Respondent
  text: Possibly. A lot of them went to Fort Leonard Wood, Missouri. A number of draftees filled up our Units to bring us
    up to full strength. It took us some time to get the personnel uniformed and equipped.
- speaker: Interviewer
  text: Did you have a boot camp or a basic training experience in Camp Rucker?
- speaker: Respondent
  text: I didn't have a lot, because I had some training already. We had to help with the new draftees with their training,
    and this is how I also received more training ...
- speaker: Interviewer
  text: So, at Camp Rucker, you had the draftees and the Reservists and the National Guard all coming together?
- speaker: Respondent
  text: That's correct.
- speaker: Respondent
  text: Early in January of 1951, I was sent to supply school, for about two weeks at Fort Jackson, South Carolina. During
    that time, our Battalion moved from Camp Rucker, Alabama to Camp Polk, Louisiana. Other activated units arrived at Fort
    Polk, among them the Oklahoma National Guard 45th Division.
- speaker: Respondent
  text: The 424th Field Artillery Battalion, 8-inch Howitzers (tractor drawn), was across the road from 393rd Field Artillery
    Battalion, which was my Unit. They were an Indianapolis, Indiana Reserve Unit, which had been activated in September,
    1950. They received their orders for Korea and needed fillers to complete their table of organization. I believe about
    seventy of us were transferred to the 424th Field Artillery Battalion. During this time in Korea, individuals with certain
    specialties in Artillery, and so forth, were needed quickly and individuals were pulled from various Units and flown to
    Korea, where they might go right into combat.
- speaker: Respondent
  text: One experience I would like to relate is about a fellow Purdue student and Reservist. He was pulled from our Unit
    and shipped to Korea. We didn't know what happened to him. My old Unit, the 393rd, received orders for Germany a week
    after we had been transferred to the 424th Field Artillery Battalion. When I was in Korea, I heard from one of the fellows
    that our buddy had been wounded the first day in Korea and was sent back to the States, where he was discharged and returned
    as a student to Purdue University. When the army moves you individually anywhere, you carry your personal record, 201
    File with you. When my friend landed in Pusan, everything was in turmoil and he was told "Go in that tent over there and
    find a bunk." It so happened that the tent was full of wounded. The next day someone came into the tent and said, "Alright,
    come on now. We're going now." They took all the wounded out, and my friend followed right along. They boarded a ship,
    which took them to Hawaii. The hula girls welcomed them when they arrived in Pearl Harbor. He just followed along and
    ended back in Camp Stoneman, California, being processed for release from active service. The last person to review his
    file was a Major who said, "We can keep you in for another year!" since he hadn't completed two years of service. My friend
    said, "Please don't." The Major said, 'If you made this far, I am not going to stop you." So he was released from active
    duty. That was a one-in-a-million occurrence!
- speaker: Interviewer
  text: Yeah. That wasn't your experience.
- speaker: Respondent
  text: No. No. No.
- speaker: Interviewer
  text: So you saw--I don't know how much you had traveled before you went to Purdue in this country, but you'd been out in
    Idaho?
- speaker: Interviewer
  text: And now then you're in the Army and you're down in Alabama and Louisiana and South Carolina?
- speaker: Interviewer
  text: And you're learning a lot?
- speaker: Respondent
  text: Yes, and seeing a lot of the country.
- speaker: Respondent
  text: Our Battalion went by troop train from Camp Polk, Louisiana to Camp Stoneman, California, where we spent about two
    weeks being processed for shipment overseas. We received all of our shots, and went to the theatre just about every day
    to see combat films from Korea and received lectures of what to expect. We did have some leave time.
- speaker: Interviewer
  text: Speaking of the guns, the eight-inch howitzer -a piece of field artillery?
- speaker: Respondent
  text: Yes, in artillery, you have guns and howitzers. Guns fire a flat trajectory, and the howitzer fires usually a lofted
    trajectory. The 8-inch howitzer shell weighs about 200 pounds and stands almost to your waist. The weapon has a range
    of about seventeen plus miles. There is a loading tray to carry the shell, which has had the fuse put on it, to the breech,
    where it is pushed into the barrel. Increments of powder charges, depending on the range to the target, are placed in
    the barrel and breech is then closed and ready to fire ...
- speaker: Interviewer
  text: Do you cover your ears when you fire it or anything?
- speaker: Respondent
  text: Yes. You would put your hands over your ears. Many fellows lost part of their hearing, and some lost most of their
    hearing.
- speaker: Interviewer
  text: No special equipment, no plugs, or anything at all.
- speaker: Respondent
  text: No, no, there was nothing like that.
- speaker: Interviewer
  text: So this is 1951-1952, you're heading overseas, and World War II was still on people 's minds. They'd remember a great
    war and the great victory. Now, all of sudden, the troops are saddling up and riding off, as it were. What was the mood
    of the other soldiers or did you get a sense--
- speaker: Respondent
  text: Some of us looked upon it as an adventure. Some, who had fought in WWII, and knew what war is, weren't too happy,
    but they didn't hesitate to go. There were also those individuals who had been caught up in the peace time draft at the
    end of WWII who ended up serving. At the end of WWII, our military was cut to the bone, so when the Korean War began,
    it meant having to quickly rebuild. The troops who had fought in the Pacific and were in Japan when the war ended were
    rotated back to the States. Their replacements were mostly inexperienced troops who led a comfortable life on occupation
    duty in Japan. These were the men who were first sent to Korea to hold back the overwhelming enemy forces until sufficient
    help could arrive. Many Reservists from the various branches of service were activated and often sent very quickly into
    combat.
- speaker: Interviewer
  text: So, you departed from California, Camp Stoneman, and for Korea.
- speaker: Interviewer
  text: On a ship or a plane?
- speaker: Respondent
  text: On November 6, 1951 we boarded the troop ship U.S.S. General Mann bound for Korea. All our equipment and guns were
    on board. We arrived in Yokohama, Japan on November 18th and boarded a troop train to Sasebo, Japan. Arriving in Sasebo,
    on November 20th, we boarded a Japanese ship, which took us to Pusan, Korea, where we arrived on November 21st. The Japanese
    ship had mats on the floor, which we slept on. The weather was cold and dreary and it was very depressing to see the Koreans
    living in buildings that had been damaged and open to the elements. Children ran about with no shoes, scrounging for whatever
    they could find. We were placed in tents. A few days after our arrival, the ammunition dump blew up during the night.
    I don't know if it was an accident or guerillas were responsible. It blew many of us out of our bunks.
- speaker: Respondent
  text: It scared the hell out of us. Everybody was running around to get ammunition for our weapons as only the guards had
    loaded weapons. The explosions went on through the night. That was really something to see!
- speaker: Respondent
  text: On December 1st our Battalion left Pusan by train to Chunchon. The cars we rode in were shot full of holes and were
    very uncomfortable as the sleeping cars were made for the shorter people. It was very cold and we used heat tables to
    warm our C rations.
- speaker: Interviewer
  text: That must have been overnight or a couple of days?
- speaker: Respondent
  text: We arrived in Chunchon during the night of December 2nd. That same night we boarded trucks loaded with our equipment
    and headed in convoy to the front lines. A river runs through the mountains by Chunchon and the road is alongside of it.
- speaker: Respondent
  text: I was assigned to ride shotgun to the driver. We had on our parkas and steel helmets. I had my carbine. Our truck
    carried our Battery's small arms ammunition plus a number of duffel bags belonging to individuals. Three of the fellows
    rode in the back of the truck, and they crawled between the duffel bags for warmth. Trucks drove with blackout lights
    on because of the danger of guerilla attacks.
