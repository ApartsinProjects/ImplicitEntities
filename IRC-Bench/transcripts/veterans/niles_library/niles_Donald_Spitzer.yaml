turns:
- speaker: Interviewer
  text: So, we usually start at the beginning chronologically, but don't feel tied to it. So, I always start by asking when
    you entered the Service. Do you remember?
- speaker: Respondent
  text: I know I enlisted in January of '42.
- speaker: Interviewer
  text: And how come?
- speaker: Respondent
  text: The war was on. I enlisted--I wanted to be a cadet, a flyer, so let's see, yeah, January 6th-19, no, that was when
    I was discharged, 18th of March '42.
- speaker: Interviewer
  text: Was when you were official?
- speaker: Respondent
  text: When I enlisted and I left--when did I leave, oh? Oh, you have a paper. No, no, it's not here. This is my overseas
    thing. It's not that important. You don't have to be exact. January It was about April or May. I'm not sure exactly.
- speaker: Interviewer
  text: Where were you--you were living in Chicago before that?
- speaker: Interviewer
  text: Did you live at home with your parents or did you--
- speaker: Interviewer
  text: And what you were doing? What work did you do before then?
- speaker: Respondent
  text: What was I doing? I don't think I worked at that time--I was an order picker for Montgomery Ward on Chicago Avenue.
- speaker: Respondent
  text: And then I went in Service. I came back, and I worked as, let's see, first in a men's store after I came back, and
    then I worked in another men's store for a number of years on Lawrence Avenue, if you know where that is. And then I got
    married, 1950, and I worked for--I was an accountant. I worked for Mount Sinai Hospital as an accountant. I went into
    public accounting, and then I started working for the government. I worked in the IRS for twenty-five years.
- speaker: Respondent
  text: And I used to do a lot of public relations work for them.
- speaker: Interviewer
  text: They could use you now, I think.
- speaker: Respondent
  text: Well, I had my radio show for five years. I did a lot of coordinating of careers for the government, all the agencies
    that represented this, and we gave talks to the high schools and grammar schools in Chicago.
- speaker: Interviewer
  text: That's amazing.
- speaker: Respondent
  text: And I retired in 1987, long time ago.
- speaker: Interviewer
  text: Yeah. So, you chose the Air Force, or was it the Army Air Force, or is it
- speaker: Respondent
  text: Army Air Force. US Air Force now.
- speaker: Interviewer
  text: Was there a reason you did that?
- speaker: Respondent
  text: Well, I wanted to fly.
- speaker: Interviewer
  text: So, did you get to fly?
- speaker: Respondent
  text: Well, I got about a hundred hours of flying and then I was eliminated from the program. And the reason why is because,
    in California, for two weeks, we did not fly. It was foggy every morning, so we didn't have any flying. And I lost my
    touch of the plane, that's all. That's all I can attribute it to.
- speaker: Respondent
  text: And then I went to--I was stationed in Hobbs, New Mexico, and then sent overseas.
- speaker: Interviewer
  text: So, when you first enlisted-- when you were first inducted, what was it like when you first started out? Do you remember?
- speaker: Respondent
  text: Well, we had to go to--we went from Chicago, of course, to Santa Ana, California. And I went through a basic training
    course. I think it was eight weeks, something like that. And then we went into cadets--started flying, and I know I started
    flying here--started flying July 30th, 1942.
- speaker: Interviewer
  text: Did you--had you ever flown before? Had you ever been in a plane before?
- speaker: Respondent
  text: Well, yeah, been in a plane, but not flying.
- speaker: Interviewer
  text: Well, a lot of people hadn't been in a plane. How did you get from Chicago to Santa Ana?
- speaker: Interviewer
  text: By train? Was it a nice train or a crowded train?
- speaker: Respondent
  text: It was a passenger train, yeah.
- speaker: Interviewer
  text: Some guys tell me, you know, they had a big luxury train. Sometimes, they were on a train, it was like just packed
    full of people.
- speaker: Respondent
  text: No, it was a passenger train because this was early in the war, you know. This was about April or May of 1942.
- speaker: Interviewer
  text: Yeah. That's early. So, were there a lot of people, well, there were other guys, other new cadets?
- speaker: Interviewer
  text: Did you meet a lot of people?
- speaker: Interviewer
  text: Were they from all over or were they mostly
- speaker: Respondent
  text: All over from Chicago?
- speaker: Interviewer
  text: No. Well, the ones that I started off with were from Chicago and I think these fellows were mostly from Chicago. This
    was in Santa Ana, in Santa Ana, May 1942, and these were from Chicago.
- speaker: Interviewer
  text: So, were they people-- did you meet people--
- speaker: Respondent
  text: I never knew them.
- speaker: Interviewer
  text: Yeah. They were just other people.
- speaker: Respondent
  text: Yeah. Just people who did the same as I did. We signed up for cadets, and that's where we went, Santa Ana, California.
- speaker: Interviewer
  text: So, how did your family feel about you going into Service?
- speaker: Respondent
  text: Well, how would you feel if your son or daughter went into Service? They weren't happy about it, but it was a civic
    thing to do, you know. We had to do it.
- speaker: Interviewer
  text: Were there a lot of people going that early, do you think?
- speaker: Respondent
  text: Not many enlisted. Here this is all--
- speaker: Respondent
  text: There was something up on top there. We're just writing your name. I-something here. Well, I could make up a name
    for you. No. But we could put in your own. Okay. That works. And this is yours, I'm sure. That's mine. Sorry about that.
- speaker: Interviewer
  text: No. We --I decided that the war was important. And not many people enlisted, believe me. They were all conscripted,
    drafted, to go into-that's why they had no choice. I wanted a choice.
- speaker: Respondent
  text: That's what a lot of guys have said. A lot of people I talked to who were in the Navy said, you know, they enlisted
    because they wanted to be in the Navy. They didn't want to be in the Army.
- speaker: Interviewer
  text: Yeah, you see the one on the serial number indicates that you're enlisted.
- speaker: Respondent
  text: Oh, I didn't know that.
- speaker: Interviewer
  text: The three is, I believe, was drafted.
- speaker: Interviewer
  text: So you--what did you learn in basic training?
- speaker: Respondent
  text: How to be a soldier, how to shoot a gun.
- speaker: Interviewer
  text: Did you think it was going to be useful later?
- speaker: Respondent
  text: Well, no, but it was, you know, necessary for at least to get soldiering, the activities of a soldier, and that's
    often--all that kind of stuff, and camaraderie, more or less, to learn more about the fellows that you were with and where
    they ended up. And, as I said, most of them were killed in training, or I lost track of them during the war. But I survived.
- speaker: Interviewer
  text: You said there was somebody that--you said you had a picture of some guys that were killed during training.
- speaker: Respondent
  text: Yeah, there were--both of them were.
- speaker: Interviewer
  text: Was that common that people got killed while they were training?
- speaker: Respondent
  text: No, no, they--Yeah, these guys, this is 1944, no, it couldn't have been.
- speaker: Interviewer
  text: Maybe it's just marked that way on the back of the picture.
- speaker: Respondent
  text: No, because '44, I was overseas.
- speaker: Interviewer
  text: Yeah, so then after your basic training, where did you--you were in Santa Ana to learn to fly?
- speaker: Respondent
  text: No, Santa Ana was just basic training.
- speaker: Respondent
  text: And then I went to Santa Maria, California.
- speaker: Interviewer
  text: Oh, that's why--had my saints mixed up.
- speaker: Respondent
  text: Yeah, and I was there for about, well, from July 30th to September 26.
- speaker: Interviewer
  text: And you were in a Stearman, you said.
- speaker: Respondent
  text: Stearman. Yeah. That's--We flew open cockpit, two passenger, with the helmets, and the goggles, and all kinds of stuff.
    And my instructor taught me combat maneuvers. He showed me how to get on the ground from about 10,000 feet up in about
    10 seconds, just zoom down.
- speaker: Respondent
  text: And when I first went up where they showed me that we were going to have loop to loops today, I didn't eat breakfast
    or lunch, but I didn't throw up-I never threw up. And it worked And it was fun. And the instructors, as I say, taught
    me all kinds of maneuvers for When you were in Upside down, and loop to loops. And I enjoyed it.
- speaker: Interviewer
  text: But then the next plane was a closed cockpit with two people in it, one low wing, what they call a monoplane. And
    I couldn't control it too much. One fellow almost killed me, though, and he had previous instruction. He was a flight,
    not instructor, but he had flight training. And it was what we call a buddy system where he would take the plane off and
    land it. And when I was up there, I'd have a, well, a screen around me, and I'd fly just on. And when he came in--
- speaker: Respondent
  text: That must have been scary.
- speaker: Interviewer
  text: No, it was-- You felt like you knew what you were doing.
- speaker: Respondent
  text: Yeah, it was interesting. But he, coming down, this kind of plane, if you came up too high, landed, you had to come
    out this way, and then go down-well, he came in too high, and one of the wings ripped, dropped. And if it hits the wing,
    you're gone. And, luckily, somehow or other, he was able to straighten it out before-- and I told the instructor about
    that. And he took him up for a flight training and, you know, they eliminated him because he could not--he didn't have
    depth perception, even though he had flown before.
- speaker: Interviewer
  text: Did they do a lot of medical testing to see what you could--to see how well you could see and that?
- speaker: Respondent
  text: Oh, yeah, always, and we also had the training-- trainers where you go into a cockpit on the ground and you fly just
    by using visual contact, very interesting.
- speaker: Interviewer
  text: It sounds like it.
- speaker: Respondent
  text: Yeah, and I learned a lot there.
- speaker: Interviewer
  text: Was it hard going from being--I mean, you were a grown man, was it hard going from being, you know, rather independent
    to having to follow orders?
- speaker: Interviewer
  text: It didn't bother you.
- speaker: Respondent
  text: No. No, when I was in Hobbs, New Mexico, I did a lot of air control. I--the flights coming in, I managed the planes--telling
    them where to land and what runway and all that stuff.
- speaker: Interviewer
  text: That's supposed to be a very stressful job. Is it?
- speaker: Respondent
  text: It is, but I managed.
- speaker: Interviewer
  text: So, then, when you--so you were eliminated--
- speaker: Respondent
  text: From flying.
- speaker: Interviewer
  text: From flying.
- speaker: Respondent
  text: And went to Hobbs, New Mexico.
- speaker: Interviewer
  text: And then what did you do?
- speaker: Respondent
  text: Well, that's what I say, I did air control Air traffic and just general things until I was shipped out.
- speaker: Interviewer
  text: So, where did you end up when you were shipped out?
- speaker: Respondent
  text: Well, that's when I ended up in China and India.
- speaker: Interviewer
  text: Oh, tell me about it.
- speaker: Respondent
  text: Well, this is these--here I left Hobbs, May 23rd, 1943. I went to Chicago. They gave you a pass, I you know, a-- I""
    So, did you get to visit your family?
- speaker: Respondent
  text: Was it nice?
- speaker: Interviewer
  text: Well Or was it harder because you got to see them?
- speaker: Respondent
  text: Well, it wasn't hard, but you were happy to see your family, you know, before going overseas. You don't know what's
    going to happen.
- speaker: Respondent
  text: So, I left Chicago. I went to Greensboro, North Carolina. Then I left--I was there from May to August.
- speaker: Interviewer
  text: What were you doing there?
- speaker: Respondent
  text: Just nothing.
- speaker: Respondent
  text: Nothing. Just waiting for overseas assignment.
- speaker: Interviewer
  text: Wow. So what did you do all day when you were doing nothing? Do you remember? Did you visit Greensboro or?
- speaker: Respondent
  text: Yeah, we went traveling around there, and we did a lot of sports. We played baseball, and football, and what not.
    And then I went to Newport News, Virginia, on August 21st and I was there for eight days, and got on the troop transport
    at about 9:30 at night,
- speaker: Respondent
  text: August 29th. We left the U.S. in the morning. We arrived at Panama, September 3rd, about four days, and I went ashore,
    and I brought boxes of candy at the PX there because I knew that they didn't feed you very well, you know, because I knew
    already what I needed. But when I was next to the mess hall, several of us would-I'd go in, put Kleenex in my pockets,
    line them, and go in, and take cans of food. I remember, particularly, little hotdogs, things like that that you could
    eat, you know. And I had my pockets lined, and we fed ourselves very well. And in order to go in there, you had to put
    your watch in a lapel, so they knew you're on what they call KP, Kitchen Police.
- speaker: Respondent
  text: So we'd do that, and walk in, and scavenge around, and then walk out, take the--that's all. And you never got in trouble
    for doing that, huh?
- speaker: Interviewer
  text: No, they never caught us. Let's put it that way. Okay, then, we arrived in Panama, as I say, I brought candy, boxes
    of candy. I had some money at the time.
- speaker: Interviewer
  text: Was it from somebody else, or did you have money because they actually paid you?
- speaker: Respondent
  text: They paid. They had it. Yeah, I had some. It wasn't expensive, you know, because you're in a PX, which is the Army
    store, more or less.
- speaker: Respondent
  text: And then we went through the Canal on September 4th. On September 6th, crossed the equator. I'm now a shellback, they
    call it.
- speaker: Interviewer
  text: Did they do--was there any ceremony when you crossed the equator?
- speaker: Respondent
  text: Yes. Oh, yeah.
- speaker: Interviewer
  text: What was it like, do you remember?
- speaker: Respondent
  text: It was--they had a pool on the thing, and they put a board across it, and you had to walk across the board. Several,
    you know, represented it. I didn't do it. And a lot of them fell in.
- speaker: Interviewer
  text: And September 12th, very rough seas.
- speaker: Interviewer
  text: And extremely rough seas.
- speaker: Respondent
  text: Was it bad?
- speaker: Respondent
  text: Had you been on a ship before, when you went?
- speaker: Interviewer
  text: No. I tell you, I never got sick!
- speaker: Interviewer
  text: But a lot of people did. They were in the latrine throwing up, or on the side of the ship throwing up, or what not.
    But when we left the U.S. from the Canal, we had escorts because there were 15,000 troops on board.
- speaker: Interviewer
  text: We had heavy cruiser, we had an aircraft carrier, we had four destroyers, and a light cruiser escorting us. It was
    very interesting. And then they said our next stop would be Melbourne, Australia. And then we crossed the International
    Date Line, and I lost a day.
- speaker: Respondent
  text: Oh. That's terrible.
- speaker: Interviewer
  text: Well, so what. I got it back later.
- speaker: Respondent
  text: And then we sighted New Zealand, and I changed time for the eighth time. Arrived at Melbourne, Australia, we only
    got on shore, changed time again for the ninth time. And I started taking Atabrine, which was for malaria.
- speaker: Interviewer
  text: Because you were going to India.
- speaker: Interviewer
  text: And crossed the 180th meridian and, now, I'm in the Order of the Golden Dragon.
- speaker: Respondent
  text: So it was another one, huh?
- speaker: Interviewer
  text: I forgot-I've got those papers showing-- I have them in a different place. I forgot to bring them.
- speaker: Respondent
  text: 'Arrived at Bombay, India, on October 4th, yeah, no, the 1st, and arrived at Lake Beale 126 miles north of Bombay.
    That''s when I won 1200 rupees in a crap game. Left Lake Beale for Calcutta: destination Kunming, China. We left on a
    train. The train was so bad. There were no seats. There were benches, and we were so afraid of getting malaria that we
    slept with like a netting around us.'
- speaker: Interviewer
  text: Uh huh, mosquito.
- speaker: Respondent
  text: And we had to sleep on the benches, and they were slat benches.
- speaker: Respondent
  text: No blankets. Nothing.
- speaker: Interviewer
  text: Was it hot in India?
- speaker: Interviewer
  text: And you were there for a couple weeks it looks like?
- speaker: Respondent
  text: Yeah, Bombay.
- speaker: Interviewer
  text: Did you get to see any of India?
- speaker: Respondent
  text: When we were in Bombay, we had some experiences! There's a lot of snakes in India, and we had cots with, you know,
    and they had mattresses. They had--the cots had straps, and then we had a mattress, a very thin mattress on it. And one
    of the fellows, one night, his mattress got soaked or something, and he didn't have a mattress. So, he had to sleep just
    on the slats. And we found he was harboring-- a snake came up underneath and bit him! And we had to examine him to see
    if it was a poisonous snake. Luckily, it wasn't! But we used to walk around the camp in Bombay, India, with boots up to
    he
