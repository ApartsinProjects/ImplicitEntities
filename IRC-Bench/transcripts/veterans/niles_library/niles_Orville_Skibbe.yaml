collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: The first thing we usually ask is when did you enter the service - when did you start?
- speaker: Respondent
  text: I went in the first month, the twelfth day of '44, and I got out of the service the first month, the twelfth day of
    '46. I was in the Seabees, I was in the 81st Seabees and the 94th Seabees. And our job was to go over to Normandy, it
    was called Sugar Red Beach at the time, and we built a chow hall and an Army rest camp. And after a few months of staying
    there, I really don't know how long we stayed there, but then we were ordered to ship out, back to the States, and we
    wound up at the South Pacific. I went to Inoito [?], Okinawa, and we were stationed on Okinawa with Admiral Nimitz's outfit.
    And we built an Army rest camp up there and chow halls. And that's about all, like I say.
- speaker: Interviewer
  text: So what were you doing before you were in the service?
- speaker: Respondent
  text: I was in construction work, mostly. Whatever job I could hold, that's the job I took. But most of my jobs were always
    on the outside. Then, when I returned from the Seabees, I got a job with construction again, and then I applied for Civil
    Service job, and I went in when Mayor Daley went in, [Daley] Senior, and I had been with them ever since. [Then] I retired,
    I was a tree trimmer.
- speaker: Interviewer
  text: Were you drafted, or did you enlist?
- speaker: Respondent
  text: I went in just before, I would [have been drafted], because my brother told me, if you want to go in the Navy, you
    better enlist, because when they draft you they usually draft you right into the Army. So I went down just before I was
    drafted, and I enlisted into the Navy, but I heard about the Seabees, so we got transferred over to the Seabees. And that's
    how I became a Seabee.
- speaker: Interviewer
  text: Just by accident?
- speaker: Respondent
  text: Well, yeah, actually it was just by accident.
- speaker: Interviewer
  text: So there wasn't a reason that you chose that.
- speaker: Respondent
  text: No, no. But our outfit was made up with a lot of older fellas because they were experienced in building and construction
    work. And me and a few other ones were the youngest guys in our outfit, because most of them were a lot older than we
    were, you know. And, uh, we, I learned a lot in the Seabees. We used to wash our clothes in the helmet until we decided,
    so me of the fellows decided, "Let's make a wash machine." So we made a wash machine out of a 55-gallon drum, a stick
    with a windmill. And when the windmill would blow, the stick would go down with a plunger on it, and we'd throw our clothes
    in, that's how we'd wash their clothes. Yeah. Then we decided, taking a bath, just with a helmet or anything, we decided
    to make a shower. So we got a 55-gallon drum, we had a shower head put on it, and we filled the thing with the warm water,
    the sun would warm the water, and we'd stand there, pull the chain and we had our showers.
- speaker: Interviewer
  text: So did you do that, you were... the Seabees were part of the Navy?
- speaker: Respondent
  text: Yeah, first there were, when we first went in, not me but when the Seabees were connected with the Marines because
    one of our outfits got almost 90% of them got killed because they had no weapons. Then they decided "we'd better arm these
    people," you know, so the Marines took us and they trained us, and they gave us weapons. They gave us carbines. And [then]
    they had something to defend ourselves with, you know. And then after, I forget how long it was afterwards, they said
    the Navy was going to take us over, so then we went into the Navy. The Navy branch took us over, and that's why we'd be
    called the Navy Seabees.
- speaker: Interviewer
  text: That's interesting. So what was it like at the beginning? What were your first days like, do you remember?
- speaker: Respondent
  text: Yeah, I was all excited about getting in there, but after I got in there I really wasn't in love with it, because
    I figure, "what did I do?" you know. I was scared, you know, just turned 18, and we had our air raid every night, coming
    over, but it turned out to be pretty good. I met a bunch of nice fellows in there, got closer than brothers, after a while.
    In the old saying, they used to say, "Never hit a Seabee, 'cause you might have a son in the Marines." But it was mostly
    an older outfit that were in with me.
- speaker: Interviewer
  text: And obviously you had a lot of engineering experience.
- speaker: Respondent
  text: Oh yeah. Most of my time was spent either in guard duty or I wound up in the kitchen. I love to cook, and to this
    day I enjoy cooking.
- speaker: Interviewer
  text: So was it an accident that you wound up in the kitchen, or were you on some kind of rotation?
- speaker: Respondent
  text: No, the first I was on the, what do you call it, Mess Duty, and then I started making salads and stuff there, I never
    turned out to be a top chef or anything, but I used to work in the kitchen, most of the time I was there. But it was a
    good experience because I still love to do it today.
- speaker: Interviewer
  text: So when you went over... Did you do any training in the United States?
- speaker: Respondent
  text: Oh yeah. We went to Great Lakes for our Naval training, and from there we went to Camp Perry, VA, and then it was
    Northlake, VA, and we shipped out from there, Camp Perry.
- speaker: Interviewer
  text: So at first you went across...
- speaker: Interviewer
  text: And where'd you end up?
- speaker: Respondent
  text: We went to Normandy. When we went over, we went to England, I think it was England first, and then from there we went
    to Normandy. And I had a chance to ride on the Queen Mary. It was a troop ship they made out of the Queen Mary, and when
    I come back I returned back on the USS Hornet, the aircraft carrier. That was an experience.
- speaker: Respondent
  text: Because the troops were all coming back, and they used that for a supply ship coming back, we came back on that.
- speaker: Interviewer
  text: There were a lot of people?
- speaker: Respondent
  text: Oh, yeah, a nawful lot of people on there. It looked like a football field upon the deck, there.
- speaker: Interviewer
  text: So you were from Chicago, which was a pretty diverse place. Did you meet a lot of different kinds of people?
- speaker: Respondent
  text: Oh yeah, yeah. There was one fellow that kind of took me underneath his wings, because he used to find out I could
    never get, I wasn't getting no mail back and forth. And he asked me the reason why, and I said I had a trouble with writing,
    you know, and he said, "How about if we get together" he said, "on a weekend," and he said "we'll send a letter off to
    your mother or your friends." And he said, "When you get 'em," he said, "call me and I'll help you with 'em." And I never
    forgot the man's name. His name was Cuppetti. And that's the only thing I remember. I don't have his first name because
    I've been trying to look him up to see if he's still alive. If not, God bless him, you know.
- speaker: Interviewer
  text: We can take a look and see if someone put him in the World War II memorial registry.
- speaker: Respondent
  text: But I'd have to know the full name on him, you know, and the only thing I remember, we used to call him Cuppetti.
    It was an oddball name.
- speaker: Interviewer
  text: Did people call you anything?
- speaker: Respondent
  text: Yeah, they called me Skip.
- speaker: Respondent
  text: Nobody liked their first names. I was named after Orville Wilbur, but I was Orville Wilbur Skibbe instead of Orville
    Wilbur Wright. My mother always used to name us after famous people. You know.
- speaker: Interviewer
  text: So you ended up being named "Skip." After the famous Skip.
- speaker: Respondent
  text: Yep, you know, all four-five brothers were called Skip. Nobody liked their first names so they took the name of Skip.
    And I did wind up at one of the major airports. Chicago O'Hare field. I was a foreman out there.
- speaker: Interviewer
  text: Wait, all your brothers were called Skip too?
- speaker: Interviewer
  text: How did you keep track of who somebody was asking for?
- speaker: Respondent
  text: Well, we really didn't need any names. My father used to just point at us and we knew who he was talking about.
- speaker: Interviewer
  text: Had you ever been away from home before?
- speaker: Respondent
  text: No, that was the first time away from home.
- speaker: Interviewer
  text: What was it like?
- speaker: Respondent
  text: Like I say, it was a little scary, but I got acquainted pretty quickly.
- speaker: Interviewer
  text: So you had five brothers?
- speaker: Respondent
  text: Yeah, five brothers and four sisters.
- speaker: Interviewer
  text: Oh my goodness.
- speaker: Respondent
  text: Four sisters and five brothers, yeah.
- speaker: Interviewer
  text: So were any of your brothers and sisters in the service?
- speaker: Respondent
  text: Yeah, my first brother Charles, he was in the Pearl Harbor, on the Pearl Harbor attack, and I was in the Seabees,
    and I had a brother, he was in the Army, but he was stationed in Alaska, in the fire department. And I had an older brother,
    was too old for the service, but he was in the CC camp, I don't know if you remember [hearing about] that? He was in the
    CCs. So that was the experience for the boys.
- speaker: Interviewer
  text: Any of your sisters involved in the war effort?
- speaker: Respondent
  text: No, they were all housewives.
- speaker: Interviewer
  text: Do you remember, did you have any - boy, somebody put in here "drill instructors" - did you have anybody pushing you
    around?
- speaker: Respondent
  text: No, no, not really, they were all pretty good. They did what they had to do and I did what I had to do.
- speaker: Interviewer
  text: You said the Marines taught you how to shoot?
- speaker: Respondent
  text: No, we had all that practice at Great Lakes when we went in, but the Marines were the ones that gave us the weapons
    and stuff. I forget what outfit it was, they were building an airstrip, and the Japanese came in there and they killed
    so many of them, because they had nothing to defend themselves with. And that's when they decided to give us weapons.
- speaker: Interviewer
  text: Do you remember, did you, at Great Lakes or when you were training... where were you staying? Were you in barracks,
    were you in tents, or...
- speaker: Respondent
  text: Oh no, we were in barracks. At Great Lakes we were in barracks.
- speaker: Interviewer
  text: So what was it like?
- speaker: Respondent
  text: It was alright. I enjoyed that part, and to this day I don't swim, that's another thing I have to do before I pass
    away is learn how to swim because there's a few things I want to do in my life before I go on, and that's one of them.
    The reason why I never learned how to swim in the Navy (everybody can't understand, "How'd you go through the Navy without
    swimming?") well, we were going through a Commando course, and we were going up a line 25 or 30 feet in the air, hand
    over hand, and by the time I'm coming down, another guy started up the rope, and I let go, and when I fell, I broke my
    ankle. I was in Sick Bay for I don't know how many weeks, and I figure, well, my outfit's gonna be moved out, I probably
    won't go with them. But no, they took me out, they carried me with them, and when I was on the ship over there, I made
    sure I stayed right by the lifeboat, in case anything happened.
- speaker: Interviewer
  text: Did you have to do anything when you were on the ship?
- speaker: Respondent
  text: Yeah, we had chores, but I got away from it quite a bit because I was laid up, you know. But it was a good experience,
    and I learned an awful lot from the service.
- speaker: Interviewer
  text: So what did you learn?
- speaker: Respondent
  text: Well, for one thing, how to take care of ourselves. Cause fresh out of the young age that I was in, there was not
    much we did know. Until we got in the Service, and we knew what we had to do, and you had to do it when they told you,
    you know. But that's about all.
- speaker: Interviewer
  text: So you left for overseas, and you went on a boat... a ship, sorry... and how did you travel once you were on land?
- speaker: Respondent
  text: We had our own equipment.
- speaker: Interviewer
  text: Were you on trucks, or jeeps, or...
- speaker: Respondent
  text: We were on trucks, they transferred us on trucks.
- speaker: Interviewer
  text: I interviewed one gentleman who was in the Army and he said they moved them always at night, they were...
- speaker: Respondent
  text: Most of the time everything was moved at night, yeah. But we didn't, it wasn't too far off of Normandy that we set
    up this camp. I don't know how many miles from the shore it was, but it was in a cow pasture, I remember that, it was
    a cow pasture that we set up the base. We set up our field kitchen first, we had tents, and when we left, we were building
    Quonset huts and everything like that, for the wounded, you know.
- speaker: Interviewer
  text: Did you stay once you'd built things, or did you move on pretty quickly?
- speaker: Respondent
  text: No, we stayed there for, I don't know how many months we were there. But then from there we got seven days of leave
    at home, and then they sent us back to the South Pacific.
- speaker: Interviewer
  text: So did you actually get all the way home for your leave?
- speaker: Respondent
  text: Oh yeah, we got home.
- speaker: Interviewer
  text: So what did you do?
- speaker: Respondent
  text: Well, not much in seven days, you couldn't do much in seven days.
- speaker: Interviewer
  text: Where were you?
- speaker: Respondent
  text: I was in Chicago, I was living in Chicago then.
- speaker: Interviewer
  text: Oh! So you came all the way back to Chicago.
- speaker: Interviewer
  text: And then went all the way back out.
- speaker: Respondent
  text: And then went back again.
- speaker: Interviewer
  text: So you just hung out?
- speaker: Respondent
  text: Just hung out. I was too young to do anything else, so...
- speaker: Interviewer
  text: Couldn't make any trouble.
- speaker: Interviewer
  text: What did you eat?
- speaker: Respondent
  text: What did I eat? Well, believe it or not, I used to like that stuff they called "dried beef." And on Sundays, I used
    to enjoy a meal on Sunday, because it was pork and beans on Sunday breakfast, and then we used to have cold cuts in the
    afternoon. And then one day we all got sick over in Guam, we all got sick, the whole base, we got some bad lunch meat
    and we all got ptomaine poisoning. It was a mess. We were all sitting in the outdoor theater, and all of a sudden we all
    started running for the head, and were all vomiting and everything. They found out we all had a touch of ptomaine poisoning.
- speaker: Interviewer
  text: Goodness. So you were, I'm trying to figure this out. You were back in the United States and then you went to the
    Pacific Theatre. Where were you?
- speaker: Respondent
  text: I was, well we went to a couple islands like Tinea, Saipan, and then we wound up on Guam. That's where our main base
    was, in Guam.
- speaker: Interviewer
  text: What were you building in Guam?
- speaker: Respondent
  text: Well, they were building, putting up huts, Quonset huts, and my job was guarding a mine, there was a mine there with
    all kinds of dynamite and everything and that was my job. I used to stand guard duty there.
- speaker: Interviewer
  text: Did you do that by yourself, or were there more guards?
- speaker: Respondent
  text: No, every three, four hours you'd get relieved. You stood there by the front cave, by the opening of the cave, with
    your weapons, and just guarded the materiel in there, that's all.
- speaker: Interviewer
  text: So what did you do? What did you think about? Or did you just chat?
- speaker: Respondent
  text: There was not much to think about, when you, to be honest with you, so... I just did what I had to do, that's all.
- speaker: Interviewer
  text: What did it look like?
- speaker: Respondent
  text: Guam was a beautiful place, it was beautiful. I used to watch them down there, the people down in Guam, they had not
    many horses, they used to use water buffaloes to plow up their fields and that, they used to use, they didn't have a lot
    of fertilizer so they used to, I think it was human waste they used to use for fertilizer in Guam. That's why I didn't
    eat too many vegetables. But, like I say, then from there, we just served our time out there, and then I went back, in
    1946 I got discharged. And then I think it was six months later I married, a wonderful woman, and [had] four beautiful
    kids. And I've got two grandchildren, two grandkids right now, a granddaughter and a grandson.
- speaker: Interviewer
  text: You've got a pair. You said about staying in touch with your family, right, did they send you letters?
- speaker: Respondent
  text: Oh yeah, they sent me letters and this one fellow I referred to he used to read the letters and help me answer them
    back because, like I say, I had not much schooling when I went in.
- speaker: Interviewer
  text: Did you stop going to school? Or did you...
- speaker: Respondent
  text: No, I just went as long as I could, until it was time for me to just walk away, and that's what I did.
- speaker: Interviewer
  text: Do you know how old you were when you stopped?
- speaker: Respondent
  text: Oh, I had to be around 16, 17. I did any kind of job I could do - whatever I could hold I held. To be honest or not,
    I have never got fired from a job, all the while I worked. And I had whatever job it was - I don't care what it was, from
    garbage to sewer or anything, I did, because I knew I had a family to support. And then when I went on later in years
    and life, it just got away from me, and busy making payments on my mortgage, so I had to make sure I had a job. All I
    got to say is, if there's any kids out there today, make sure you go to school. Because you're going to need it today.
- speaker: Interviewer
  text: Well, you're a legend in the literacy program here.
- speaker: Interviewer
  text: Everybody knows your name.
- speaker: Respondent
  text: I'll tell you, I have met so many wonderful people. Wonderful people.
- speaker: Interviewer
  text: So you didn't go to school when you came back, you got married right away. Did you know your wife before you were
    in the service?
- speaker: Respondent
  text: Yeah. I knew... No, I'm sorry, I didn't. We went to school together, we started Kindergarten together, but she went
    on and I just fell down, I fell out. And then six months after I got out of the service, I met her at a bowling banquet.
    And a few weeks later, we got married. We did go to school together in Kindergarten. I knew her, it's almost, well, I
    would say 75 years I know her. I'm 80 and June 29th of this year we'll be married sixty years.
- speaker: Interviewer
  text: A long time. I asked you what you did when you were on leave, I want to know, did you have any USO shows any place
    you were?
- speaker: Respondent
  text: 'Yeah, they had a few, but I never bothered with them. I was too shy. I used to stay by myself quite a bit, until
    later on in life. My father passed away when he was young, but I remember when I was a kid, he used to always tell us:
    "If you''re going to do something, do it right, or leave it alone." And I always remember that.'
- speaker: Interviewer
  text: Hard to get anything done then, isn't it. So, you didn't go, what did you do instead? Did you... obviously you didn't
    read, but did you play games with other...
- speaker: Respondent
  text: No, we went out, the fellows went out. We'd see whatever we could see over in England, when we were stationed in England.
    I was in London, and what was it, I can't remember the towns in [England.] 'Cause we weren't there that long.
- speaker: Interviewer
  text: So did you go dancing? Did you make trouble?
- speaker: Respondent
  text: No, I was no ballroom [dancer]. No, I never got in trouble. I can honestly sa
