collection: niles_library
source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Do you recall when you entered the Service?
- speaker: Respondent
  text: Yes. May 15th, 1945.
- speaker: Interviewer
  text: May 15th, 1945, so World War II was still--
- speaker: Respondent
  text: World War II was still in action. We had just declared VE Day in Germany in early May. And I was on a train to California
    for boot camp training while Japan was still an active combatant nation.
- speaker: Interviewer
  text: Had you completed high school?
- speaker: Respondent
  text: Yes. I left high school early. If seniors in high school would join the service, they would allow them to leave early
    and get their diploma sent to their homes in the mail.
- speaker: Interviewer
  text: What high school did you attend?
- speaker: Respondent
  text: Roosevelt High School in Chicago, Illinois.
- speaker: Interviewer
  text: So, you were a Rough Rider, then?
- speaker: Respondent
  text: Yes. I was a Rough Rider.
- speaker: Interviewer
  text: That school is over on Kimball--
- speaker: Respondent
  text: It's on Wilson and Kimball Avenue.
- speaker: Interviewer
  text: I interviewed another veteran, a Mr. Aronson who went to Roosevelt. So, why didn't you just stay home and get your
    degree? I mean, the war was almost over. What did you want to go in for?
- speaker: Respondent
  text: Well, the war wasn't over.
- speaker: Interviewer
  text: It wasn't over. Well, it was going--no, you didn't know that.
- speaker: Respondent
  text: We didn't know that.
- speaker: Interviewer
  text: That's right.
- speaker: Respondent
  text: In 1941, I was fourteen years old. And right after Pearl Harbor I joined the National Guard. And they found out I
    was underage, in order to expedite my getting out of the National Guard, they gave me an honorable discharge. So, I had
    an honorable discharge from the National Guard at fourteen years old.
- speaker: Interviewer
  text: How did your parents feel about your interest in things military?
- speaker: Respondent
  text: My father was very much in favor of it. And my mother was very much against it. So when she found out what had happened,
    she went down to the National Guard Armory and made such a complaint that they finally decided that the best thing to
    do would be to issue me a discharge.
- speaker: Respondent
  text: Then I tried to join up with various services, and she said that if I would prove to her that I could get a high school
    diploma that she would sign off and let me go wherever I wanted to go. And I had tried to join the Marine Corps. I also
    tried to join the Royal Canadian Air Force because they were accepting recruits at sixteen. The Merchant Marine was accepting
    applicants sixteen years old.
- speaker: Respondent
  text: But the reason I joined the United States Merchant Marine Academy was that it was officer training. And we were going
    to get a commission in the Maritime Service and a commission in the Navy simultaneously. So it was one of the last programs
    in which you could get an officer's commission within a reasonable time. And the chance to go to sea was almost immediate
    because the Merchant Marine Academy was the only federal academy in the United States that allowed midshipmen to go into
    wartime duty before they finished their classroom work.
- speaker: Respondent
  text: So I went to San Mateo, California, which was their boot camp training for United States Merchant Marine Academy at
    Kings Point. We were given six weeks training and then we were sent aboard a ship as a cadet midshipman. And then we were
    expected to serve a year at sea as a midshipman. The correct term is cadet midshipman.
- speaker: Interviewer
  text: So you were determined to enter the Service then!
- speaker: Interviewer
  text: You didn't mind if it was on land or sea?
- speaker: Respondent
  text: I didn't care. I just wanted to serve somewhere. Or the air.
- speaker: Interviewer
  text: Even in the air, wow!
- speaker: Respondent
  text: Yes. I was trying to get into the Royal Canadian Air Force. They were taking applicants at sixteen.
- speaker: Interviewer
  text: Was there a tradition of military service in your family?
- speaker: Respondent
  text: My father had joined the Army when he was sixteen years old. He came from Poland, and he was in New York. As soon
    as World War I started, he joined the Army and was a frontline soldier for the entire war.
- speaker: Interviewer
  text: So he was part of the American Expeditionary Force, 1917.
- speaker: Respondent
  text: We were the only federal academy in the United States that had battle flags. We lost men as midshipmen. We had two
    titles. We were cadets in the Merchant Marine Academy, and we were midshipmen in the Naval Reserve. It was a dual rank
    in all cases, so we were Naval Reserve and Merchant Marine at the same time. And I will have to explain what Merchant
    Marine means.
- speaker: Respondent
  text: Merchant Marine is just a general term that's applied anywhere in the world where someone has a fleet. A nation has
    a fleet of ships; they all sail under a certain flag. So when a ship is sailing, normally, it is a ship that is ocean-going
    and it's considered part of the nation's Merchant Marine. They could sail the Liberian flag, the Panamanian flag.
- speaker: Respondent
  text: But at our time, we had the largest Merchant fleet in the world. We had close to ten thousand ships under the American
    flag. And then in order to work the situation out in terms of handling the wartime service, the United States government
    set up the War Shipping Administration (1942) to direct the Maritime Service. So it was expedient to leave these ships
    under house flags.
- speaker: Respondent
  text: So these flags were American President Lines, Lykes Brothers - these were the companies that operated the ships normally
    during peacetime. But during wartime, they all agreed to be part of the War Shipping Administration and take their orders
    through the War Shipping Administration out of Washington so we could be a coordinated effort. They didn't want one ship
    taking off and going to China, another ship going to the Mediterranean, another ship going here. They went wherever the
    United States government told them they had to go. So the War Shipping Administration administered all the ships at sea.
    And then they had the U.S. Maritime Commission which was involved in training seamen and also had oversight for the officer
    training program at the United States Merchant Marine Academy.
- speaker: Respondent
  text: Now, the United States Merchant Marine Academy is a federal academy that has the same status as West Point or Annapolis.
    As a matter of fact, it was established prior to the Air Force Academy. So there's the United States West Point Army Academy.
    Annapolis is the Naval Academy. The Coast Guard Academy in New London, Connecticut and United States Merchant Marine Academy
    at Kings Point, Long Island, New York. And there's the Air Force Academy in Colorado. Those are the five established Service
    Academies. Now, when we were cadet midshipmen at the Academy, we also retained the rank of a midshipmen as well. So we
    were midshipmen in the Naval Reserve and we were cadets in the Merchant Marine Academy at the same time. We had simultaneous
    commissions when we graduated. We got commissions as an ensign in the United States Maritime Service and in the United
    States Naval Reserve. We got commissions simultaneously from both services. And we had a choice to go wherever we wanted.
    We could go into the Navy. We could go into the Merchant Marine.
- speaker: Interviewer
  text: The role of the Merchant Marine is different than the Coast Guard or the Navy, right? You actually are--the role of
    the Merchant Marine, say, in the North Atlantic, how is that different from--
- speaker: Respondent
  text: The Merchant Marine, any ocean.
- speaker: Respondent
  text: The Merchant Marine is simply a ship that is engaged in commerce for a particular service.
- speaker: Respondent
  text: 'Mr. Maladocian: The Merchant Marine is not a military operation. The Merchant Marines are civilians in maritime operations.'
- speaker: Respondent
  text: But the thing is that many of the ships carry Naval Reserve status, too.
- speaker: Respondent
  text: If a ship had Naval Reserve status, they could make a phone call, and every member of the ship's crew would automatically
    become a member of the Navy simultaneously. So that was their position in case there was some particular problem that
    had to be taken care of right away. Also, almost all of the ships in World War II were armed. And the ships carried, usually,
    four inch to five inch cannons on the stern, 3.5 inch cannons on the bow and 40 or 20 millimeter automatic cannons and
    machine guns. Now, sometime, those armaments were manned by U.S. Naval gun crews. They would come aboard separately; they
    were really part of the crew, but they were usually under command of a Naval officer. But, almost exclusively, all the
    ships that were running under the American flag, were armed with heavy cannons and with automatic antiaircraft weapons,
    and we were trained in that when we went to basic training as midshipmen.
- speaker: Respondent
  text: We became familiar with firing cannons, automatic weapons, machine guns.
- speaker: Interviewer
  text: Was that in San Mateo?
- speaker: Respondent
  text: Yes. It was right outside of San Francisco, and we always took Naval Science classes. And with the Naval Science classes
    we took, we were given almost the same type of course that they were getting in Annapolis, but in an expedited form in
    San Mateo because we were told to get on board ship within six weeks. So one of the very interesting aspects of that is
    that we were under fire in the North Atlantic, and all over, while we were still cadet midshipmen. So we were the only
    academy that was in the war zone before we even got out of school. And we had one midshipman, O'Hara. Actually, there
    was a ship, the Johns Hopkins, that was fired on by a German raider. And the German raider was very heavily armed, and
    most of the ship's crew from our Liberty ship was under fire and abandoned the ship. But this midshipman, O'Hara, manned
    the five inch gun on the stern by himself and almost sank the German raider and was ultimately killed. But he so damaged
    the raider that it was caught by a British cruiser and sunk.
- speaker: Interviewer
  text: Wow. That was in the North Atlantic?
- speaker: Respondent
  text: North Atlantic.
- speaker: Interviewer
  text: Did you find that you were anxious to enter the Service?
- speaker: Interviewer
  text: You didn't have any trouble adjusting to life in the Service or?
- speaker: Interviewer
  text: Discipline?
- speaker: Interviewer
  text: Or training, food, clothes, being away from home?
- speaker: Respondent
  text: I liked it all.
- speaker: Interviewer
  text: You liked it all?
- speaker: Respondent
  text: Yes. I felt it was something I wanted to do. And I wanted to get into the invasion of Germany and Normandy. But I
    just missed it because I was on the train when I was getting in formation on the capitulation of Germany. But I got into
    California, and we were planning the invasion of Japan.
- speaker: Interviewer
  text: It would have been the biggest armada in the world.
- speaker: Interviewer
  text: And we had eight thousand ships being readied on the West Coast. So at every port that you went to, if you could go
    into San Francisco and you could see the fleet there, you could almost walk across San Francisco to Oakland on the ships.
- speaker: Interviewer
  text: Because they were just rafted up stem to stem and bow to bow and port to port.
- speaker: Respondent
  text: We just had a program here at the Library on the 65th anniversary of the Okinawa campaign. And, of course, the whole
    point of Okinawa was to conquer the island and then use it as a staging point for the invasion of Japan. And, as you say,
    they--Okinawa, the invasion, began the first of April and wasn't complete until June 23rd. So this period of May, June,
    there, everybody was thinking it's probably going to be on to Japan.
- speaker: Interviewer
  text: Oh, the ship, yes. That's exactly what we thought. The ammunition ship that I was going to be sent on was scheduled
    to go to Okinawa.
- speaker: Interviewer
  text: Do you remember the name of the ship?
- speaker: Respondent
  text: Yes. Petersburg Victory.
- speaker: Interviewer
  text: Petersburg Victory.
- speaker: Respondent
  text: Yes. And that ship was laid up after the war. We were all told we were going to be part of the invasion fleet. If
    my memory serves me correctly, just the Merchant vessels alone were eight thousand ships, which was enormous. I mean,
    if you think about it. And most of them were all set to sail from West Coast ports. So the whole West Coast was being
    set up for the invasion and everything. And we didn't know anything until we all got word that the atomic bomb had been
    dropped and that Japan had capitulated.
- speaker: Interviewer
  text: That must have been quite a day! Were you disappointed or celebrating?
- speaker: Respondent
  text: Well, just half and half. I, myself, was angry because I wanted to see the invasion. I was prepared to go.
- speaker: Respondent
  text: But, again, there was jubilation that we figured that a million men were going to be saved.
- speaker: Respondent
  text: We didn't have the complete word, but we knew there was a huge Kamikaze fleet that was sheltered in the mountains
    and airfields in Japan that was set up so that they could try to obliterate this fleet that was coming towards them. So
    Japan had stored fuel and ammunition and bombs.
- speaker: Respondent
  text: And hid these Kamikaze planes in anticipation of the invasion.
- speaker: Interviewer
  text: So did you eventually set sail from--
- speaker: Respondent
  text: I set sail from San Pedro, California.
- speaker: Interviewer
  text: On the Petersburg Victory?
- speaker: Respondent
  text: The Petersburg Victory.
- speaker: Interviewer
  text: And your rank then was--
- speaker: Respondent
  text: Cadet midshipman.
- speaker: Interviewer
  text: Cadet midshipman.
- speaker: Respondent
  text: Yes. I spent six weeks in San Mateo and then I was sent to Petersburg Victory. There were always two midshipmen for
    each ship. And I was sent to the ship but I couldn't find it. I couldn't find the ship! And I found out that the ship
    didn't exist. So I found out that it was in a shipyard being built. So I had to go over and find some quarters over in
    Long Beach, California until the ship was finally built. And then we set sail for the South Pacific. And they changed
    our orders, and they sent us to the Panama Canal. And then they sent us up to Baltimore. And in Baltimore, the ship was
    declared not necessary for any service. The Petersburg Victory never sailed to Japan, but it was mothballed. However,
    it was taken out of mothballs for the Korean War. And a very good friend of ours, Admiral King, was their captain. And
    he became the captain of the Petersburg Victory while it was engaged in the Korean War.
- speaker: Interviewer
  text: And the Petersburg Victory, that was a Liberty ship, or a destroyer?
- speaker: Respondent
  text: It was a Victory ship.
- speaker: Interviewer
  text: A Victory ship?
- speaker: Respondent
  text: Yes. The Liberty ships were the original ships that were mass produced for the war. And then, right after that, they
    built the Victory ship, which was a little faster and had different types of propulsion and what not. See, we figured
    the war in Japan was going to last another two years.
- speaker: Respondent
  text: We figured the invasion would last almost eight months, and then it would be another year and a half before we could
    subdue Japan. That was the general consensus of opinion at the time. So we were all preparing for that.
- speaker: Respondent
  text: And then when I got to New York, I reported to the Academy. We had an office on 90 Church Street with the
