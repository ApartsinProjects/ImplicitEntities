source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: When did you enter the service?
- speaker: Respondent
  text: May 20, 1943.
- speaker: Interviewer
  text: Where were you living at the time?
- speaker: Respondent
  text: In Chicago, on the border of South Shore.
- speaker: Interviewer
  text: What were you doing before; were you in high school?
- speaker: Respondent
  text: I graduated in January and entered the Army in May.
- speaker: Interviewer
  text: Was that Hyde Park High School?
- speaker: Interviewer
  text: Were you drafted or did you enlist?
- speaker: Respondent
  text: I was drafted. I went to a junior college during that period for about 10 weeks. I went to OC Wilson on the South
    Side. I was going into the service in May and I graduated in January. But I didn't want to stay home so I went to Wilson
    Junior College for about three months.
- speaker: Interviewer
  text: When did you graduate high school?
- speaker: Respondent
  text: I graduated in January, 1943. And I left junior college on May 1, 1943.
- speaker: Interviewer
  text: That was in South Shore?
- speaker: Respondent
  text: No, that was in Englewood.
- speaker: Interviewer
  text: And how long were you there?
- speaker: Respondent
  text: About 3 months.
- speaker: Interviewer
  text: And then you were drafted? Did you go in the Army?
- speaker: Interviewer
  text: Did you pick the service branch you joined?
- speaker: Respondent
  text: No, I was drafted. They wanted me to go into the Navy. The day I was drafted I think they had about an 80% draft for
    the Navy, and I had a problem, I couldn't swim. I told them 'no way.' That's how I went into the Army.
- speaker: Interviewer
  text: Where were you inducted?
- speaker: Respondent
  text: In Chicago really. Camp Grant was the first place we went to.
- speaker: Interviewer
  text: How long did you spend there?
- speaker: Respondent
  text: Just a few days.
- speaker: Interviewer
  text: What were your first few days like there?
- speaker: Respondent
  text: Nothing significant, I don't even remember.
- speaker: Interviewer
  text: And where did you go from there?
- speaker: Respondent
  text: From there, I went to Pennsylvania, about 40 miles from Harrisburg.
- speaker: Interviewer
  text: How long did you spend there?
- speaker: Respondent
  text: About 13 weeks.
- speaker: Respondent
  text: And then I enlisted in the Air Corps. I was in the Air Cadet Program.
- speaker: Interviewer
  text: Oh, really. And then those 13 weeks what was that like?
- speaker: Respondent
  text: It was just Basic Training. It was really a pretty good program. The old people in the outfit were about 24 years
    old. I was 18; most of us were 18. And the 24 year olds were running it. They were quite well-disciplined, and they were
    very good military people.
- speaker: Interviewer
  text: Did you know the people when you went to?
- speaker: Respondent
  text: No. I met two or three that I went to Camp Grant with.
- speaker: Interviewer
  text: Then you enlisted in the Air Corps. How long was that for?
- speaker: Respondent
  text: About nine or ten months. Because it was near the end of the war, they eliminated just about all of us. I think there
    were about 120 in our outfit, and about 105 of us went back to the Army because it was near the end of the war. We only
    had about a year to go and they probably figured they didn't need any more pilots. They had enough.
- speaker: Interviewer
  text: So that was nine or ten months, and where did you go from there?
- speaker: Respondent
  text: We went to Santa Ana, California, which is an air base. From Santa Ana we went to Monterey for four weeks. And then
    we went to Carrabelle, Florida. It's about 60 miles south of Tallahassee. We were there for about three months. We trained
    with an amphibious group - an amphibious boat outfit.
- speaker: Interviewer
  text: What were your duties as part of the Air Corps?
- speaker: Respondent
  text: I was training as an Air Cadet. We were learning to fly.
- speaker: Interviewer
  text: Really, so you flew a plane?
- speaker: Respondent
  text: We flew briefly, not very long.
- speaker: Interviewer
  text: What kinds of planes did you fly?
- speaker: Respondent
  text: They were Piper Cubs.
- speaker: Interviewer
  text: I don't know much about Piper Cubs. What was the purpose of the flight and how many people could fit in the plane?
- speaker: Respondent
  text: It wasn't very mechanical. It was a very basic plane. It seated two people, one behind the other. The instructor sat
    in the front seat; I sat in the back - one cadet and one instructor to a plane.
- speaker: Interviewer
  text: So when training was done, you had learned to fly?
- speaker: Respondent
  text: Our next step was to go to a primary plane. I forget what it is called. And then from a primary, you went to a secondary
    plane. And from there you went to the last plane for training. We went overseas in August, 1944.
- speaker: Interviewer
  text: Did you fly then?
- speaker: Respondent
  text: No, when we went to Santa Ana, California, they eliminated most of us from the cadet program, and we just went back
    into the Army which we had been in before. We went overseas in the Army. We were stationed in England when we first went
    there. We were stationed in England for about four months. From England we went over by boat to the continent. We landed
    in Le Havre, France, close to Normandy. The invasion was June 6, 1944. We didn't get over there until about six months
    later.
- speaker: Interviewer
  text: So then perhaps around August, 1944?
- speaker: Interviewer
  text: Did you land on a beach?
- speaker: Respondent
  text: No, by that time, the advance troops went all the way to Paris. I don't remember the name of the outfits. I was in
    so many. We walked halfway to the Rhine River, which is on the Belgian-German border. We were briefly in Patton's Army,
    and we went through Luxembourg on the way to Germany and we went to the Rhine River just before the end of the war. I
    was 19 years old, I think, at the time. The teenagers were sent back to Paris, France. We went back to France and retrained
    because we were heading for Japan. Because it was the end of the European War, they took the guys who hadn't been overseas
    too long and that included me because I had only been over eight months at the time; they were intending we go to Japan.
    At the time the United States dropped the two nuclear bombs. The war was over.
- speaker: Respondent
  text: In Basic Training I did some bookkeeping training and instead of sending me to Japan I was sent to Berlin. I was among
    the first American troops in Berlin. It was sheer anarchy. We went there. It was the first time in six years they had
    ever been at peace and the Generals didn't know what to do.
- speaker: Respondent
  text: Berlin was divided into four areas run by the British, the Russians, the French and the United States. And Germany
    was also divided into four sections.
- speaker: Respondent
  text: After being in a while, I was thoroughly bored. They sent us out for reveille at six o'clock in the morning and that
    was the end of our day. There was nothing to do because they weren't organized very well. And I did it for about four
    weeks and decided I wanted to find something to do so I volunteered. I went up to General Clay's office. I was in his
    Public Relations Department and I was there only three or four months. And then I came back to the United States. In between
    I was in Berlin and I was in General Clay's office but I still was not very active so I volunteered to go to school and
    I went back to London for three or four weeks. And then I came back to Berlin again. I came home in February, 1946.
- speaker: Interviewer
  text: You traveled a lot and had a lot of experiences.
- speaker: Interviewer
  text: You mentioned to London, to get training in London?
- speaker: Respondent
  text: It was a school of no consequence. It was supposed to be business training, civilian business training for our future.
    And I got there two weeks late because I decided I wanted to go to Paris instead of London. I had a friend of mine in
    Templehof Airport in Berlin I called him up and I said, 'I don't have the right tickets. But can you get me on a plane
    to go to Paris?' He said, 'Sure.' And because by this time I had been overseas about a year. And we didn't get paid because
    we were on the move all the time. There was no point in it, we didn't have any money to use but we didn't need it. Finally,
    after a year we got paid for the whole year. So I had quite a bit of money in my pocket. I was 19 years old and I wanted
    to go to Paris where I had one heck of a good time.
- speaker: Interviewer
  text: What did you do while you were there?
- speaker: Respondent
  text: Pursued girls.
- speaker: Respondent
  text: What did I do there? Talking about jazz, there was a famous musician covered in a book I had back when I was about
    17, 18 years old. And I found out that he was in Paris at the time so I looked him up and I went up to his apartment to
    see him and I told him that I was a writer for a jazz magazine in the United States, which I wasn't. And he said, 'Come
    in and watch what we're doing.' And he was teaching piano, to about a half a dozen kids, jazz piano. This was just after
    the war. The European War was over August 8 and this might have been the end of the August when I was in France for the
    first time.
- speaker: Respondent
  text: The second time when I went to Paris, I went up to see him he was teaching the kids piano and I was amazed. I went
    to quite a few night clubs that had jazz programs, including a couple of very famous jazz musicians whom I don't remember
    either. There was one that came from Belgium. He had a strange background, but he was a very famous guitar player. And
    if you ask jazz fans to this day, they talk about this musician, 'Django' Reinhardt. So I went to see him and when I went
    in to the jazz club, it said 'No GI's Allowed.' They didn't want any American GIs there.
- speaker: Respondent
  text: There were a lot of problems in this club, fights and so forth. But I wanted to go see him. So I went in and I was
    told that the MPs came in and they came in everyday and they would pull you out if you were in there. Now this guitar
    player was playing with a small band of four members. And I went behind the band and sat in back of them. So if anyone
    came in, they wouldn't see me. And sure enough an MP came in, looked around and didn't see me and went back out and I
    stayed and heard the jazz program. I liked the music very much.
- speaker: Interviewer
  text: It must have been a vibrant atmosphere, the end of the war...
- speaker: Respondent
  text: It was quite different. Some of the French were hostile to us. Many of the French had allied with the Germans. And
    the streets were free to wander around and I went to one club once and they were very hostile to me. They wouldn't talk
    to me. And I was in uniform. It was because the French, I think, were not too happy with the fact that the Americans were
    there. Now that doesn't apply to all the French but there was a large core who felt that way.
- speaker: Interviewer
  text: And at that time, what did the city look like?
- speaker: Respondent
  text: Paris wasn't bombed. I think it was because Hitler wanted to bomb it like he bombed other cities, but someone in the
    German High Staff said, 'No.' They have so many museums, so many outstanding things through history that 'We are not going
    to bomb Paris.' So they didn't with the result that Paris recovered civilian life quite rapidly although they didn't have
    a lot of food to eat.
- speaker: Interviewer
  text: I was going to ask about that. I wondered if they had lines to get food.
- speaker: Respondent
  text: We had a military camp that I was in for a short time and we were eating outdoors. And as all the GIs would do we'd
    often throw out half our food in the garbage can. There was a line of French people waiting, so we left, so they could
    go in the garbage cans and get the food for their meals. You really felt sorry for them.
- speaker: Respondent
  text: When I was in Berlin, and even though the Germans suffered probably worse than most people, the people that were in
    the upper classes probably didn't feel too badly when the war ended. I remember the subway was still in existence in Berlin
    and often while we were waiting for the train to come, you'd be standing in the subway and here would be a man wearing
    a beautiful coat with a velvet neckline and fur on it and a fur hat and he dressed like somebody who was quite substantial.
    He had a long stick with a nail on the end of it and what he did, he walked around the station, and I believe he would
    have been a wealthy man. When he saw cigarettes the American had thrown on the ground without finishing, there would still
    be tobacco inside the paper. He would stick it with the nail, stick in the cigarettes and open up the paper and throw
    the tobacco in a little package they acquired so they could get cigarettes to smoke - but that's the way it was.
- speaker: Interviewer
  text: We learn to save what you can.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Talking about Berlin, could you move among the four sections when it was divided up?
- speaker: Respondent
  text: No, but because I was a private and I went in the Public Relations Department and I was the only one who wasn't an
    officer. As a result, I had a really high position. I was a 'go-fer' who would go from France to Russia to England, the
    Zones, to pick up papers for the officers in our organization and return.
- speaker: Interviewer
  text: You said your job was essentially as a 'go-for.' Were you doing that every day?
- speaker: Respondent
  text: No, I was in a public relations department and wrote home public relations releases about the soldiers who were in
    Berlin. If somebody was from Chicago, they would ask me to write a news release and then send it to the press in Chicago.
- speaker: Respondent
  text: It was the first time I really did much writing. The first time I did any writing in the service, which wasn't very
    much, on the ship I was going overseas with. It was called the Mariposa, I believe, and it was a sister ship of a very
    famous ship, a civilian ship before World War II, the Mauritania. There were 5,000 of us who went over on the ship and
    we didn't have an escort because the ship could go faster than a submarine. The submarines were underwater so it slowed
    them down. They figured we didn't need an escort. There was a good chance we would be able to get across to Europe without
    getting hurt by submarines. And so we slept on the deck, all of us slept on the deck, there were 5,000 of us on the ship;
    it was a huge ship and the second day I was on the deck, there was a call that said that we were going to have a newsletter
    aboard the ship and anybody who has any background in news writing should come downstairs and you can be on the paper
    so I ran downstairs and they gave me one page to myself and I could write down anything I wanted.
- speaker: Interviewer
  text: What did you write?
- speaker: Respondent
  text: About what goes on aboard, on deck, I wrote about a crap game. Most of the guys played it aboard ship. It was a silly
    thing for me to do but I didn't have anything else to write about.
- speaker: Respondent
  text: That's what happens, these things, the in-between stuff.
- speaker: Respondent
  text: So here I was again on the deck, again one of the lowest ranking men, most of the fellows were non-commissioned. They
    weren't officers. There were sergeants and corporals. My First Sergeant was probably the most important man in the company
    and he was aboard and he had to lie on the deck too for the seven days it took to go overseas. And after I worked on the
    paper for the day, they gave me a suite all by myself. I ate with the officers for seven days. I lived like a king. The
    First Sergeant was angry that I didn't have any rank and hadn't been in the service that long and here I was eating with
    the officers and living in a suite by myself while he was sleeping aboard the deck for the whole seven days.
- speaker: Interviewer
  text: Had you worked on a newspaper in high school?
- speaker: Respondent
  text: I had worked in junior college fo
