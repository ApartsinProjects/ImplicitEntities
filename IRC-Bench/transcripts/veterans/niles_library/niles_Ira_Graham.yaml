source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Interviewer
  text: Ira, can I ask you -when did you enter the service?
- speaker: Respondent
  text: August, 1944.
- speaker: Interviewer
  text: And where were you living in Chicago at that time?
- speaker: Respondent
  text: 64th and California, 6415 S. California in Chicago.
- speaker: Interviewer
  text: And had you completed high school at that time?
- speaker: Respondent
  text: Lindblom High School.
- speaker: Interviewer
  text: You graduated from Lindblom High School. When you were at Lindblom, did they have an ROTC program?
- speaker: Respondent
  text: Yes, I was in the ROTC.
- speaker: Respondent
  text: And my goal was to at least get out of it as a commissioned officer. I think I was a first Lieutenant.
- speaker: Interviewer
  text: So you probably started high school around the time the war was beginning, or shortly before?
- speaker: Respondent
  text: They the war started in '39, so I was 13 years old then. I remember going to a bazaar at the temple I belonged to
    with my parents, and it was on a Sunday. It happened to be December 7, and we heard that Pearl Harbor had been attacked.
    And the people my father's age said, "I'll give those Japanese a week, it'll be over, you know. Who do they think they
    are?" And it wasn't over in a week. But, so.
- speaker: Interviewer
  text: Do you think the fact that war was in the offing affected your decision to participate in the ROTC, or the
- speaker: Respondent
  text: First of all, I was in Boy Scouts, and I joined the troop, and it folded in six months or something like that. But
    before that, my parents, one Sunday morning, the bell rang, and somebody was at the door, and it turned out to be a salesman
    for a summer camp. And I hadn't heard that they were planning to do that, and when this guy started to show me pictures
    of the camp, and all that stuff, I just felt I was being sold down the river. So I just got up and ran to the back to
    the house and locked the bathroom door, and I said through the locked door, when I'm 12 years old, I'll go to Scout Camp.
    It seemed to be long enough in advance. But when I was 12, I joined the troop that just lasted six months, but I was interested
    enough in scouting that I went on a provisional basis for individuals that didn't have a troop. And so we did that, and
    I got my Eagle Scout in scouting.
- speaker: Interviewer
  text: In those days, did they do an Eagle Scout project?
- speaker: Respondent
  text: Yes, we did the project. I can't really remember what the project was. I think it was a park or something like that.
- speaker: Interviewer
  text: So did you graduate from Lindblom in May or June of 1944, and you fully expected to be, to be drafted?
- speaker: Respondent
  text: 'Yes, but this friend of mine, Alan Milach, I''m really not sure whether he was a semester ahead of me or a year,
    he was somewhat ahead, and he qualified for military program Army A-12. There was an equivalent to the Navy. I took the
    test, but whether the war was winding down, or I didn''t get as good a score as he did, he got into the program and I
    did not. So he was in the program and he was sent to Hunter College in New York City, and he wrote me, we communicated
    a lot, but he wrote me and said: "Please join the Navy before you''re drafted." He really made it a strong advice. Whether
    he didn''t like the Army or whether, I don''t know what motivated him to do that, but he saved my life in a sense, because
    he went in and they washed out the whole program, as described in the DVD "Patton," as a companion disc, that showed how
    the movie was made, in addition to the movie itself, and they mentioned in that the educational programs of early commissioning
    were discontinued by Patton''s request, that he needed troops for that final version of the ...'
- speaker: Interviewer
  text: So, so then you, you enlisted in the Navy then as a result of this, what proved to be wonderful advice from Mr. Milach.
- speaker: Respondent
  text: I had asthma as a younger child, it was not active at this, by this time, but I didn't tell the Navy about that, I
    really wanted to get in, and I didn't want to be a 4F or anything like that.
- speaker: Interviewer
  text: So you shared, that wish on the part of so many men of your generation, you -wanted to get in and contribute to the
    effort.
- speaker: Respondent
  text: Yes, that was just a natural thing. I mean, that's, that's what, you know, I
- speaker: Interviewer
  text: And your parents just accepted that.
- speaker: Respondent
  text: Oh yes, they were proud and everything.
- speaker: Interviewer
  text: Where you an only child?
- speaker: Respondent
  text: No, I had a brother four years younger.
- speaker: Interviewer
  text: So he was spared that, probably.
- speaker: Interviewer
  text: So you were inducted and you went through Great Lakes?
- speaker: Respondent
  text: Great Lakes. I can't explain to you how the Navy worked. But it was fantastic. At Great Lakes, they gave us a one-on-one
    interview, prior to that they showed us the movies of all the duties of Navy people, so we knew what the sections were
    and what the occupations were, and this one-on-one interview would be equivalent to being interviewed for Abbot Labs or
    something like that, I mean, they wanted to know what I wanted to do when I got out of the Navy, and I said I was interested
    in going to college and being a chemist or a chemical engineer, and they said the thing they would think about would be
    like a lab tech or something like that, so I said OK, and they said your grades were good in math and we'll put down a
    second choice, how about a Quartermaster, that would be in the bridge of the ship with navigation and things like that,
    so it sounded like a pretty good deal. In the boot camp, you start talking to your fellow Navy guys, and when I told them
    what my first choice was, they said, [laughing] it may be a good choice, but you're not going to be a lab tech, you're
    going to be in the corps bringing blood to the invasion. And so, I wanted to be in service, but I'm not sure I was that
    strong of a person, motivated to carrying blood on an invasion. Because Iwo Jima and Okinawa were there. So they said
    we'll give you a second choice. My chief was a hard-ass guy, I mean, he was really by the book, but when I told him I
    wanted to change the classification, he told me how to get to the other side of Great Lakes, to where I could do that,
    and I followed his directions, went over there, they pulled out that punch card, and said, we'll just give you that second
    choice if you prefer to do that, and that's how I got to be a Quartermaster in the Navy, a quartermaster is not a store
    keeper, it's on the bridge of the ship.
- speaker: Interviewer
  text: But you didn't have any difficulties adjusting to life in the military.
- speaker: Respondent
  text: No. No. I could swim, you had to jump off a tower in case you ... I suppose the Boy Scout and the ROTC training it
    sort of gets used to that, you accept that there's authority, and ...
- speaker: Respondent
  text: In service school, after I finished Great Lakes, I mean after I finished boot camp, as I said, I qualified for the
    service school, and a short time into that program I came down like many other people at the Great Lakes at the time,
    with Scarlet Fever, there was an epidemic. And so I was pulled out of that company that I was in, for the treatment, I
    don't know if it was a week or 10 days, and the doctor in charge of the program, was on to the idea of Vitamin C as a
    recovery thing, so they brought in grapefruit and oranges, and we could eat all those, that we wanted, and I got over
    it without any heart damage or anything like that.
- speaker: Interviewer
  text: Well so far it sounds like the Navy's taking care of you.
- speaker: Interviewer
  text: Did you have to, did you receive advanced training, beyond the ...
- speaker: Interviewer
  text: The service school.
- speaker: Respondent
  text: The service school. That was also at Great Lakes.
- speaker: Interviewer
  text: From Great Lakes, then, you were assigned to a ship that you picked up on the West Coast.
- speaker: Respondent
  text: 'Right, yes, but, in preparation for this, I was just thinking about this, like, my story is like in three parts.
    They are not necessarily equal parts. But one-third was at Great Lakes: Boot camp and service school. The second third
    of the thing was being transported from Great Lakes to San Francisco on a troop ship, and the problem of finding my ship.
    It was not at Samar where we landed, although we stopped at Pearl Harbor, we heard there was a V-E Day, and then Samar
    wasn''t there. I was transferred to Leyte on another ship, and then from Leyte through the Admiralty Islands and to Hollandia,
    New Guinea. Each of these things were smaller ships that I was being transported in. And when I got to Hollandia, I saw
    the ship, I recognized it, I had seen pictures of it, and it was called the US SAPc 4, the USS APC, A is Auxiliary, P
    is Transport Personnel, and T is transport, or C was I guess the equivalent of that. APC 4. It was leaving Hollandia,
    so I got off the ship with a few other people who were on it, and worked my way to the port office, told them that I think
    I saw my ship, you know, "Where is it now?" and they checked it and they said it''s on its way to the Philippines. So,
    I really pleaded with them to get me to my ship, I wanted to get a rating, I wanted to do what I was trained to do, and
    I think for a kid that was just a little over 18 years old, I think they thought I was ambitious to do that, and so they
    got me on a DC-3, I was the only passenger, it was like building materials. We got on a jet to Manila, and eventually
    to Subic Bay, where my ship was.'
- speaker: Interviewer
  text: Did any of your friends in the Navy that you met at Great Lakes, did they go west with you but then everybody went
    to different ships?
- speaker: Respondent
  text: Different ships, yes.
- speaker: Interviewer
  text: And then, what was the hardest part of quartermaster training? Was that ...
- speaker: Respondent
  text: It was very academic. You kept a log of the ship every day, weather conditions and things. The ship was, did not move
    very much, so we were in Great Lakes, I mean, in Subic Bay, rarely got off the ship although it was tied up. I know on
    one occasion we walked into the town and got some ice cream and brought some of it back.
- speaker: Interviewer
  text: Subic Bay, that was a huge base, right? So you took the train from Chicago to San Francisco.
- speaker: Interviewer
  text: And then you tried to catch onto the right ship. We always have to ask, like did you get sea sick on the sailing?
- speaker: Respondent
  text: No. My experience was, as long as I had something to do, I wouldn't get sea sick. If it was just sitting or standing,
    being a passenger or something like that, my stomach would, I never vomited or anything like that.
- speaker: Interviewer
  text: And the food wasn’t so bad on the ship?
- speaker: Respondent
  text: No. On my little ship. The ship was only thing like 103 feet long, made of wood. It was made in Maine. But it was
    an unusual ship as you can see.
- speaker: Interviewer
  text: Wow. Yes. And um. So, uh. This is the ship. And this is the ship that you journeyed in from San Francisco.
- speaker: Respondent
  text: No, no, not a huge army.....
- speaker: Interviewer
  text: Oh, this is in the Philippines.
- speaker: Respondent
  text: Yes, in the Philippines.
- speaker: Interviewer
  text: 'Now I have to ask you this: Were you subjected to any rites of passage as it were when you went over the equator
    or anything?'
- speaker: Respondent
  text: Yes, I got that at my office. It's framed as crossing the equator, and then, the dateline, I have one for that. And
    I saved all those things and framed them. But it wasn’t too unpleasant or ...
- speaker: Interviewer
  text: No, it was kind of a joke.
- speaker: Respondent
  text: It wasn’t hazing gone wild or anything. Yes, shellbacks, or something. Yes. I think that's the equator, I think.
- speaker: Interviewer
  text: Yes. So, um, was it difficult to stay in touch with your family when you were in the Pacific?
- speaker: Respondent
  text: No, there was the forerunner of email that was called V-mail, and I communicated with them. And I took the liberty
    of doing some sketches on the thing so I could tell them something that might not ordinarily be transmitted that went
    through the V-mail so I was able to do that. And, one experience, several years before I went into the service, we lived
    on the south side, and some of the other branch of the family were north. We were kind of like the south side people,
    they're not, the north side was a little higher class, they thought, I think. And we were driving down a main street in
    Chicago on an icy winter, and it was very slippery, and my dad had trouble avoiding an accident. But he strained to avoid
    it and got some sort of a swelling in his neck. And, the doctor didn't think it was any problem or anything like that,
    but it apparently got worse. And so when I was in the Philippines and in communicating, they wrote me and they said your
    father is going to have surgery now, and we are talking to a Congressman to get you home for the surgery. And I was very
    annoyed that they would do that, I didn't want to come back until I was finished regularly, so I did.
- speaker: Interviewer
  text: I don't know if this would have been a question. Did you have a preference if you did your naval service in the Atlantic
    or the Pacific? I mean, I know at the time ...
- speaker: Respondent
  text: I wasn't given a choice.
- speaker: Interviewer
  text: You weren't given the choice, yes. So, at this time, I'm thinking back, when some of the gentlemen said it would be
    short, but the Japanese would be taken care of in a short time. But when you were going to the Philippines, and you were
    out there in Subic Bay, you really felt the war was coming to an end, and the United States was going to be victorious.
- speaker: Respondent
  text: Well, as I said, when we landed in Pearl Harbor on the way over, we heard the V-E Day, so it was like gradually happening.
    But we got word of an atomic bomb being dropped in Japan when I was in New Guinea.
- speaker: Interviewer
  text: So you got the news of the bomb when you were in New Guinea which was where you went from the Philippines.
- speaker: Respondent
  text: Yes, so you know everything seemed like it was being wrapped up, but you really didn't, you know, there was no television
    or anything like that.
- speaker: Interviewer
  text: So at this stage of the war, did you feel pressure or stress or anything, or ... ?
- speaker: Respondent
  text: 'No. My stress was, I was on this ship, and they had a quartermaster on it, and the ship would only have one quartermaster.
    So I wanted to get on, become a quartermaster of that ship. And so when a bigger ship came into port, I would, quartermaster
    is a joint rate with signalman, they work together, so I would signal with the flashing light: Do you need a quartermaster?
    And no one needed one. So I mean, that was pressure to try get my rating.'
- speaker: Interviewer
  text: When you say rating, is that a promotion?
- speaker: Respondent
  text: Yes, I was like equivalent to a private when I got out of, I mean the Army equivalent to a seaman, it was called,
    in the Navy. But you did rise to quartermaster third class?
- speaker: Respondent
  text: My friend, no third class. When my quartermaster got out of the service because of points, you know there was a point
    system. He got out, and I was left on the ship and, got my rating Quartermaster 3rd Class.
- speaker: Interviewer
  text: Do you recall the name of the ship on which you got your rating?
- speaker: Respondent
  text: Yes, it was USS APC 4.
- speaker: Interviewer
  text: But this isn’t the APC.
- speaker: Interviewer
  text: That's it, there. So did you learn Morse Code or signaling?
- speaker: Respondent
  text: Yes, that would be part of it.
- speaker: Interviewer
  text: Did you, in terms of relaxation or entertainment, were there any USO shows, or did you get any interesting leaves
    in Manila? Getting the ice cream, was that it? I mean ...
