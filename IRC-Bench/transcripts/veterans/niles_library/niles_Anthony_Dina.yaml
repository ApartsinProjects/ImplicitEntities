source_url: https://www.nileslibrary.org/research-learn/more-resources/veterans-history-project
turns:
- speaker: Respondent
  text: It's time for the beginning? Okay. My name is Anthony J. Dina and I live at 7450 Waukegan Rd., Niles, Illinois. Previously
    I lived in the Logan Square area in Chicago. Prior to that, I lived at 2217 N. Seminary Ave., Chicago, Illinois. My wife
    is assisting me with this report. Before joining the service, I worked for the Chicago Mailers Union. I was living on
    Seminary Avenue in Chicago with my parents as most of us did in those days.
- speaker: Respondent
  text: I enlisted in the Army Air Corps in January, 1942, after a sneak attack on Pearl Harbor. I chose Air Corps because
    that was my preference. My father told me I had a high draft number, I should wait to be drafted. But I chose to enlist.
    I will never forget the day of my induction. My father came with me to the induction center in Chicago and didn't want
    to go home until I said, "Pa, you have to go home now." I was sent to Jefferson Barracks in Missouri and after one week
    my father and 14-year-old sister came to visit me. They found me peeling a mountain of potatoes. Lucky me, I got out of
    that detail. From Jefferson Barracks I went to Kentucky, Jackson, Mississippi, and then Columbia, South Carolina for one
    year. In 1943, we sailed from Camp Kilmer, NJ. We didn't know where we were going, but we knew we were dodging German
    boats. We finally arrived in Casablanca, Africa and found we were in the European-African-Middle Eastern Campaign.
- speaker: Respondent
  text: I was an Armorer on the B-25 bomber. We invaded Casablanca, Tunisia, Sicily, Naples-Foggia, Rome, Arno, North Apennines,
    Po Valley, & Southern France. I was lucky to have lived through all that. There were many casualties. At one time, I heard
    explosions and started running, hit the ground & covered my neck, but before I knew it, I had received shrapnel in my
    buttocks. We slept on the ground in tents outdoors. The food was not like "mamma used to make." There were times we traded
    cigarettes & candy for eggs. One family in Sicily made a few of us soldiers a spaghetti dinner after we bought the food.
    (I could talk Italian to them.)
- speaker: Respondent
  text: We enjoyed Bob Hope's Christmas Shows and other entertainers ... listened to the radio and 'Axis Sally'. Axis Sally,
    she was an American, and we called her Axis Sally. We played some softball when everything was quiet. Holidays were sad.
    I was fortunate to visit my Italian grandparents during the invasion of Sicily. When we reached Rome, many of us soldiers
    went to the Vatican and received a blessing from Pope Pius. I wrote to my parents regularly and received v-mails sporadically.
    War was over with Germany in March 1945. In August 1945, we were on a ship coming home to America when we heard Japan
    had surrendered. If Japan hadn't surrendered, we would have been sent to the South Pacific.
- speaker: Respondent
  text: 'I was discharged September 23, 1945 and soon met my lifelong partner, Phyllis. We have been married 58 years and
    are blessed to have four devoted children and nine grandchildren. We have attended many 57th Bomb Wing Reunions with many
    of my army buddies who I still correspond with at Christmas. Many of my friends have passed away. So I belong to the VFW
    Post #3579 in Park Ridge, Illinois, but I am no longer active due to Alzheimer''s and Parkinson''s disease which slows
    me down. That''s all.'
- speaker: Interviewer
  text: Oh, I think so. I think that was a very concise statement. You were an Armorer on a B-25 bomber. What does the Armorer
    do?
- speaker: Respondent
  text: I was loading the bombs.
- speaker: Interviewer
  text: You load the bombs. So did your, so your unit, your air unit had to support the advance of the infantry on the ground
    kind of?
- speaker: Interviewer
  text: So, did your planes support the infantry that was on the ground?
- speaker: Respondent
  text: I was assigned to that...
- speaker: Interviewer
  text: I mean your planes. Where did your planes go? In front of the infantry, is that what you mean?
- speaker: Interviewer
  text: Where were your planes headed? When they were loaded, they took off, where did they go?
- speaker: Respondent
  text: Well, we didn't know. We didn't know where we were going. We didn't know where we were going to land. We landed at
    the Pacific.
- speaker: Interviewer
  text: You didn't know where the planes were going when they took off from the air bases over there in Africa.
- speaker: Respondent
  text: Yeah, we weren't told. But when we got there, then we knew.
- speaker: Interviewer
  text: But I'm talking about when you loaded the planes, once you were there. You loaded the planes. Where did the planes
    go when they took off? Were they with the infantry?
- speaker: Respondent
  text: No, we would catch up with them. They... we don't know where they went. We loaded the planes and we took off... we
    had to be there in the area there.
- speaker: Interviewer
  text: So they would assign targets to the group and then you did hit them and then-- You were assigned bombing targets probably,
    or something.
- speaker: Interviewer
  text: The planes were assigned bombing targets. The captains'--
- speaker: Respondent
  text: Yeah. Oh, yeah.
- speaker: Interviewer
  text: He always says how the formation would be so pretty taking off, but coming back, there was always maybe two or one
    missing, you know how they go in threes.
- speaker: Interviewer
  text: I think I was reading recently that the fighting in Italy was very, very difficult and that maybe it hasn't gotten
    as much coverage as it should because it was hard going. And Monte Cassino was some famous battle and...
- speaker: Interviewer
  text: Well, yeah, Tony talks about some battles. What was it that you said....
- speaker: Respondent
  text: Kasserine Pass that was the beginning.
- speaker: Interviewer
  text: That was the beginning 'cause if they hadn't held the line... we'd
- speaker: Respondent
  text: We'd all be back in the ocean.
- speaker: Interviewer
  text: Kasserine Pass, was that in Sicily?
- speaker: Respondent
  text: Kasserine Pass.
- speaker: Interviewer
  text: Was that in Africa or Sicily?
- speaker: Respondent
  text: North Africa. We didn't get to Sicily... that was afterwards. Invaded Sicily. When we were in Sicily, my grandpa said,
    "So this is my grandson, go this uniform on." My goodness.
- speaker: Respondent
  text: And my cousins...
- speaker: Interviewer
  text: And Italy hadn't capitulated yet.
- speaker: Respondent
  text: My cousins were prisoners of war. And I told my aunt and uncle, we treat them good, the door was open for them, but
    I still had to go on. But we treated them good, the soldiers. Fact, I think we had some of them on the payroll.
- speaker: Interviewer
  text: Do you know what town that was in Sicily? The grandparents' --?
- speaker: Interviewer
  text: It was Palermo.
- speaker: Respondent
  text: Oh, Palermo. We invaded Palermo and then we went to... I made my way to where my grandparents lived.
- speaker: Interviewer
  text: They were in a village right outside of Palermo.
- speaker: Interviewer
  text: I wonder what your dad said, or your mom. That was really quite a story.
- speaker: Respondent
  text: I told my father he had to go home now.
- speaker: Interviewer
  text: This was when you were in the States, he wasn't in Sicily. But he knew the captain, was it? And, so, how all the letters
    all had to be censored. Well, this captain didn't censor his mail that was going to your folks, wasn't that it? That captain,
    I forgot what his name was, he didn't censor your mail that went to your folks. You got to send things to your folks.
- speaker: Respondent
  text: Yeah. I don't want them to be looking at my mail.
- speaker: Interviewer
  text: Well, I mean--
- speaker: Respondent
  text: I know, but they didn't.
- speaker: Interviewer
  text: I forget who that captain was that you were friends with. That you could write letters to your folks, and they didn't
    cut out a lot of the stuff.
- speaker: Respondent
  text: No, they didn't cut out nothing. No.
- speaker: Interviewer
  text: But they should have, maybe.
- speaker: Interviewer
  text: I think they were particular about people writing home and telling them where the troops were and where they were
    going next. So, Tony, you got a lot of medals over there, right?
- speaker: Interviewer
  text: Well, you know what you got, don't you remember? Well, I mean all those.
- speaker: Interviewer
  text: Is that a Silver Star?
- speaker: Interviewer
  text: That's pretty good, isn't it?
- speaker: Respondent
  text: I think so. You should have worn your campaign hats so he could have seen. Yeah, he's got quite a few ribbons. You
    know, some of them, I guess, were considered smaller battles. There's a few. Maybe you can read these into the record.
- speaker: Interviewer
  text: The European-African-Middle Eastern Theater Ribbon with one Silver and two Bronze Battle Stars. One service stripe,
    a good conduct medal, five overseas service bars; battles were Tunisia, Sicily, Naples, Foggia, Rome, Arno, North Appenines,
    Po Valley, and Southern France.
- speaker: Interviewer
  text: Yeah, so they really covered a lot of territory.
- speaker: Respondent
  text: A lot of people fell and we kept walking.... Did you make a complete recovery from the shrapnel injury?
- speaker: Interviewer
  text: Did you make a complete recovery from the shrapnel?
- speaker: Respondent
  text: Yeah. I had a lot of visitors and pretty nurses.
- speaker: Interviewer
  text: And when he was in the hospital, he says all the captains, and everybody, came to see the nurses. They came to see
    him, but it was really the nurses.
- speaker: Respondent
  text: They came to see the nurses.
- speaker: Interviewer
  text: Was that in Italy or...
- speaker: Interviewer
  text: Where were you for the hospital, was that in Sicily or Italy?
- speaker: Respondent
  text: Sicily, Palermo, It's all the same.
- speaker: Interviewer
  text: The hospital was in Sicily?
- speaker: Respondent
  text: We went to the GI hospital. My grandpa. He's an Italian. He says, "This is my grandson."
- speaker: Interviewer
  text: And his grandma said, "First you come and bomb me, and now you come and visit me." Tough lady! Did you go back and
    visit her after the war?
- speaker: Interviewer
  text: She was gone, but we did go back.... On our twenty-fifth wedding anniversary. A lot of his cousins, and everything,
    they were very happy to see him. They had been just little guys when he was over there.
- speaker: Respondent
  text: Well, you couldn't understand Italian, so my Uncle Mike says, "Why don't you teach her how to speak Italian?" But
    they took care of my wife, I tell you. Everybody said, "That's Tony's wife."
- speaker: Interviewer
  text: We went Sweden first on our twenty-fifth.
- speaker: Respondent
  text: But we got there.
- speaker: Interviewer
  text: Yeah. So, in the Danes-- Swedish and Danish. My mother came from Sweden. My father was born in this country, but his
    parents came from Denmark.
- speaker: Respondent
  text: We went into France, and we got into Sicily, too, and Germany.
- speaker: Interviewer
  text: Yeah, I mean, those countries are so close there. I didn't realize that.
- speaker: Interviewer
  text: France almost butted up against Italy, or something, there. I thought Spain was there right below France, but I mean--
- speaker: Respondent
  text: I used to call them frogs. Didn't like that - "Men of frog!" Ah, poor guys. My cousins were prisoners. We were fighting
    against my cousins-- Italian Army. I said, well, if we got them as prisoners we'd treat them good, but if the English
    get them or if the others get them, we're not responsible, but we treated them good. The war was over--
- speaker: Interviewer
  text: Yeah. So, you must have been glad to get back home to Chicago.
- speaker: Respondent
  text: Oh, my father was glad. He came with me to Fort Dix and I says, "Pa, you've got to go home, now." You know, he didn't
    want
- speaker: Interviewer
  text: He didn't go to Fort Dix.
- speaker: Interviewer
  text: No. Were you glad when you got home to Chicago after the war was over?
- speaker: Respondent
  text: Oh, after the war.
- speaker: Respondent
  text: Yeah, well, sure, I was glad.
- speaker: Interviewer
  text: But you had been away for three years.
- speaker: Respondent
  text: Yeah. He was in a long time.
- speaker: Respondent
  text: My grandpa, my grandfather in Italy, we had a welcome with them. I had an American uniform on and he's saying in Italian,
    "This is my grandson, my grandson," and my cousins were prisoners of war. I was fighting against my cousins.
- speaker: Respondent
  text: And then I told them the war was over. We treated them good.
- speaker: Interviewer
  text: Ok. You said that already.
- speaker: Respondent
  text: Yeah. Yeah.
- speaker: Interviewer
  text: So did you have any difficulty adjusting to life back in peacetime in Chicago? Was it hard to get used to not being
    in the army? Were you just so happy to get home?
- speaker: Interviewer
  text: When you came back from after the war, was it hard to get back in the swing of things or did you get a job right away,
    or what?
- speaker: Respondent
  text: No, I didn't. I just went along with the flow, you know. I knew how to get a job. My father he wanted me to-- I don't
    know what he wanted me to do. I says--
- speaker: Interviewer
  text: Your uncle wanted you to join the police force.
- speaker: Interviewer
  text: Your father didn't want that. He wanted him to take the exam for the post office. So he retired from the Postal Service
    in 1972. He had fifty-five years of service.
- speaker: Interviewer
  text: With his service, was it fifty-five years? It wasn't fifty-five years of service. Let's see.
- speaker: Interviewer
  text: You went in '45, but what was it? Twenty-five years of service when you retired from the post office in 1955, how
    long had you worked for the post office?
- speaker: Respondent
  text: About thirty years.
- speaker: Respondent
  text: Easy. Yeah, that was the only job. I didn't want nothing else.
- speaker: Interviewer
  text: Yeah, that's right. That- Yes, it would have been 1942 because he got credit for his years in Service because he retired
    in '72.
- speaker: Interviewer
  text: So did you ever see Tony in uniform? Did--
- speaker: Interviewer
  text: Did it make a good impression upon you?
- speaker: Interviewer
  text: Just in pictures.
- speaker: Interviewer
  text: And we met right after he came out of Service. September, he was out, discharged in September, and we met in September
    of '45.
- speaker: Respondent
  text: My father and mother-- my father and my uncle, they said, "Watch her!" They said,
- speaker: Interviewer
  text: Well, I took Catechism in the Catholic Church and his uncle-- the church that I was going to was in the old neighborhood,
    the old Italian neighborhood, I don't know if you
- speaker: Interviewer
  text: Around Cabrini-Green.
- speaker: Interviewer
  text: Oh, yes. Yes.
- speaker: Interviewer
  text: Yeah. So his aunt and uncle lived there, and the uncle would take me to and from, and get me on the streetcar, because,
    like I told you, I'm from Iowa, you know, and I didn't know much about the city, but they were-- how come you've got so
    many computers in here?
- speaker: Respondent
  text: That's another interview.
- speaker: Respondent
  text: Well, this interview is taking place in our computer room.
- speaker: Interviewer
  text: Oh and it's always it took me a while to figure out where to have the interviews, because we had them in one room,
    but everybody could see in, and it was kind of noisy. And then I had it in a bigger room, but there was too much competition
    with other departments for the use of the room. And then the lady that's on the team here, on the Veterans History Project
    team, Kate Wolicki, Kate said, "Neil, you should use the computer room because it's quieter in there, and it's near the
    front door, and you can see the people when they come in." So, this is the nicest space that we have that's usually available,
    and it has a good wall for taking pictures. I'm glad you asked that, because I should have mentioned that at the beginning
    of the interview. They like you to say where the interview is taking place. Thanks. Good thing you're here, Phyllis.
- speaker: Interviewer
  text: I just realized-- I mean, look at all these computers!
- speaker: Respondent
  text: Yeah, and, of course, all of this computer technology is going to help us with this history project because that picture
    that I took can be digitized and shown on a computer. And then we can send that to the Library of Congress in Washington.
    And then, theoretically, it's supposed to work out that everybody-- they've got maybe thousands upon thousands of interviews
    -- but they're all going to wind up on the Internet so people can, you know, have like a living memory on the Internet.
    It's all because of, you know, computers and technologies. That's one nice thing about the computers.
- speaker: Interviewer
  text: Sure. Sure.
- speaker: Interviewer
  text: So, it's sort of appropriate that we're using this as an interview room today.
- speaker: Respondent
  text: Yeah, I tell you, computers are something.
- speaker: Interviewer
  text: Changing the world. Yeah.
- speaker: Respondent
  text: Yeah. Yeah.
- speaker: Interviewer
  text: Well I think we've-- Tony, when you were- I'm just trying to think if we've got all the important points covered for
    the interview. What was the highest rank you attained in the
- speaker: Interviewer
  text: You were Corporal--
- speaker: Interviewer
  text: in the Army Air Corps.
- speaker: Interviewer
  text: He always kind of resented that.
- speaker: Respondent
  text: Yeah, because a lot of these guys came from the States and they already had rank, see, in for the war.
- speaker: Interviewer
  text: And there was no room for him to move up because they already had sergeants and so forth.
- speaker: Interviewer
  text: Yeah, I was interviewing on eve and he said he was really lucky because he was only a private first class, but they
    wanted him because he could type. And then the master sergeant would be sent home. Then he'd have to move up to tech sergeant,
    then some other sergeant, and he got a couple of promotions that way.
- speaker: Interviewer
  text: Oh, really?
- speaker: Interviewer
  text: Completely different situation from Tony, maybe.
- speaker: Interviewer
  text: Dh-huh. Dh-huh. Dh-huh. But, I mean, most all the guys that went over, I mean, they went over right-- they were some
    of the first ones to land in Africa. And, in fact, his outfit is the 379th. From then on, there was the 380th, the 429th,
    the 489th, but they were all groups that would come afterward. But here these guys that were coming had already attained--
- speaker: Interviewer
  text: stateside rank.
- speaker: Interviewer
  text: Yeah. Yeah. Sergeant and so forth, and they did n't move these other guys, the old-timers.
- speaker: Interviewer
  text: The 57th Bomb Wing Reunions, are they in Chicago, or?
- speaker: Interviewer
  text: No, they're all over. Different- we've been to Orlando, we've been to Boston, we've been to Philadelphia. We've been
    to, oh, South Carolina. We've been to Colorado. They've had them in Phoenix. We've missed some, you know. We've
