turns:
- speaker: Interviewer
  text: Mr. Wachtenheim, how did it come about that, or may I call you Sy?
- speaker: Respondent
  text: Call me Sy. Most of my friends call me Sy.
- speaker: Interviewer
  text: Thank you. How did you come to enter the service?
- speaker: Respondent
  text: I'm a dentist and I was 4-F all the while. After I turned eighteen, and I thought I'd be 4-F forever, but they had
    at that time something called the 'doctors' draft.' As soon as I graduated I was no longer a 4-F. Their theory was that
    if I could practice in an office, I could practice in the service. I got a letter from my draft board that said we're
    calling you up. I called them up. I had just opened up a new office. I said, 'You made a terrible mistake. I'm 4-F.' They
    said, 'No, you're not anymore, because you're a dentist now and under this special doctors' draft we can take you anytime
    we want so you either go down to enlist at Fifth Army headquarters on the South Side or we're going to draft you as a
    private.' I went down to Fifth Army Headquarters, which is the old Chicago Beach Hotel that the Fifth Army had taken over
    at the time, I think it's around 55th Street and Lake Shore Drive. I enlisted. Strangely enough, enlistees in the Officer
    Corps were classified in strange ways. I was category 2, and the description for category 2 was 'Involuntary Volunteer.'
- speaker: Interviewer
  text: So you went from 4-F to 'A-1'! You had to put your career on hold.
- speaker: Respondent
  text: Yes. I had to put my career on hold. I just bought all new equipment. I turned it all back to the dental supply company.
    I closed up the office and went into the service.
- speaker: Interviewer
  text: You were envisioning practicing on the North Side of Chicago?
- speaker: Respondent
  text: Yes, the tri-corner of Sheridan Road, Broadway and Devon. They had the Arcade Building on the southeast corner and
    I practiced in there for the few months I practiced.
- speaker: Interviewer
  text: Did you find that there were other medical professionals in the same boat as you were?
- speaker: Respondent
  text: Yes, a large majority of my training class were 'retreads.' They had been in the service as dentists or physicians
    before. They had served a full term. They grabbed them back. At that time they were eligible under the Doctors' Draft.
- speaker: Interviewer
  text: Is there still a Doctors' Draft to this day?
- speaker: Respondent
  text: No, that ended some years ago. They give them huge bonuses to enlist. When you're a dental or medical student, they'll
    pay your way through medical or dental school. They have all kinds of programs, and it's not a bad career. It all depends
    what kind of person you are. If you are an independent type person and you don't like taking orders, why the service isn't
    for you as it wasn't for me. But some people thrive at that.
- speaker: Interviewer
  text: So you enlisted in the Army, that branch of service, and did you ship out from Chicago somewhere then?
- speaker: Respondent
  text: Yes, they paid my way to Ft. Sam Houston, Texas, which is the Brooke Army Medical Center. That's in San Antonio or
    just outside San Antonio although San Antonio may have enveloped it by now. That was the medical headquarters of the service
    at that time. Now they're making it the medical headquarters of all the services—like the people who are being transferred
    out of Great Lakes now, are going to Brooke Army Medical Center in San Antonio. The people from Walter Reed Hospital,
    many of them will go there. That will be the Center for medical training for all of the services now as they're consolidating.
- speaker: Interviewer
  text: The training that you received in the Army was more orientation?
- speaker: Respondent
  text: Right. As I recall there was a 12-week orientation period. We had some field training. We learned how to read maps;
    how to lead groups on patrol. There was some medical training there, how to do a tracheotomy, but mostly it was army lore.
- speaker: Interviewer
  text: Did you have to learn to use a gun?
- speaker: Respondent
  text: We carried unloaded guns there. We did go on the firing line at some time and shot a few rounds. Medical and dental
    officers were supposed to be non-combatants although it didn't always work out that way. You couldn't waive your Red Cross
    Card and people wouldn't fire at you.
- speaker: Interviewer
  text: There was that nice set of equipment that you left back in Chicago. Did you find the same type of equipment in the
    Army?
- speaker: Respondent
  text: 'In Korea we used what was called the Army Dental Field Kit #1 which had a pedal-operated drill. Your dental assistant
    was operating generally the foot pedal like an old sewing machine at very low speed. They had a light in the kit, an electric
    light. But we didn''t have electricity at first. But I became an expert at what we called ''midnight requisition.'' Our
    training group from Ft. Sam came over to Korea, and were placed essentially all the medical and dental officers that went
    over there originally so I knew somebody in every outfit—either a physician or a dentist or a medical service officer
    who I had gone to school with in Texas. Soon my commanding officer found out I knew all these people, he assigned me the
    task of getting us stuff that we needed off what''s called the table of organization. Every unit is allowed ''X'' number
    of item X and X number of item Y. We had usually a lot more of everything that we wanted but some things we were looking
    for and I was assigned to go out and hustle it up. If it was a Quartermaster item, I''d go to a quartermaster outfit.
    If it was an Ordnance item, I''d go to an ordnance outfit and soon. Anyway I liberated a little generator, a gasoline-operated
    generator, so we didn''t have to use the foot-pedal anymore. It was still at slow speed. The equipment was designed for
    World War I, and we were using it in Korea.'
- speaker: Interviewer
  text: One of the Korean War veterans I interviewed said that sometimes they had old artillery and the shells wouldn't fire.
    It's like we weren't ready.
- speaker: Respondent
  text: Right, exactly. The newest stuff, actually, was from World War II which was at that time 7 years old at least.
- speaker: Interviewer
  text: So just to get us onto the dates, you enlisted in December of 1951 so you get to Korea in maybe April 1, 1952?
- speaker: Respondent
  text: I had only been in the army actively for 3 months because I reported to Ft. Sam in January, and I did my 12 weeks.
    I came home for a week or two of leave and then I got shipped out to Korea.
- speaker: Interviewer
  text: Was that by boat or plane?
- speaker: Respondent
  text: I flew over.
- speaker: Respondent
  text: To Japan. From Japan they flew me over to Pusan, Korea. Then I took a train up to Chunchon, which is probably less
    than a hundred miles; it took 2 days for the train to get to Chunchon.
- speaker: Interviewer
  text: It was in bad shape, I would imagine.
- speaker: Respondent
  text: 'We stopped a lot. And they gave us carbines when we got on the train—with no ammunition for the carbines. The rumors
    were flying: ''We''re going to get attacked,'' and there was nothing of the enemy in that area at all. Then from Chunchon
    I arrived there about nightfall at the Air Base in Chunchon which was called, I believe, K-5, was the code for it. I had
    orders to the 555 FABN. I was so new in the Army that I didn''t know what FABN meant. It meant the Field Artillery Battalion.
    But someone in Seoul had told me, FA meant Forward Artillery! Anyway I called the outfit on a crank phone in the airport
    there. I finally got a hold of somebody, and they didn''t pick me up until the following morning so I slept in my clothes
    on a wooden bench in the K-5 airport which was pretty well unheated. In April it''s cold there—not a comfortable night.
    And then the next morning they came and got me. At that time the Triple Nickel which was the outfit I was officially signed
    to, was the Artillery Battalion of the Fifth Regimental Combat Team. A combat team is a regiment of infantry, and all
    the ancillary things which go with a combat unit like artillery. They had a Medical company. They had an Engineering platoon.
    They had an Ordnance platoon and soon. It was a self-contained thing; we weren''t part of a division. They kept attaching
    us to different divisions. We would stay on-line all the time, and the division we were attached to would rotate back
    to the rear and they would bring up another division. We stayed on-line. The whole year I was there we were on-line.'
- speaker: Interviewer
  text: And when you say 'on-line' you don't mean on the internet? You mean on the frontline!
- speaker: Respondent
  text: Yes, actually it was called the 'MLR,' it was called the Main Line of Resistance although I wasn't on the actual main
    line of resistance. We were back maybe a quarter of a mile, half mile.
- speaker: Interviewer
  text: Were days typical at all?
- speaker: Respondent
  text: Yes, there were typical days. I did dentistry in the daytime. At first before I moved in with the medical company,
    I was in the area of the headquarters of the artillery battalion. We had a tent in which I did dentistry. We were in the
    Mundungnee Valley. We were attached at that time to the 25th Infantry Division, I think. Then after we were there about
    three months, they moved us into the Punch Bowl Area. In the Punch Bowl they said, 'Why don't you go live with all the
    other dentists in the medical company,' and the last nine months I lived with the medical company of the infantry regiment
    of the regimental combat team.
- speaker: Interviewer
  text: What did you think of the television show, 'M*A*S*H'?
- speaker: Respondent
  text: I knew those people. The MASH Unit was probably 20 miles away, but it took at least half a day to get there on those
    roads. It was mountainous. Where we were was toward the east in the north part of Korea. We were above the 38th Parallel
    because the line went north as it went west. We'd go back to the MASH Unit every once in a while. The dentist who was
    portrayed in MASH, his real name was Joe George. He was from Connecticut, and he was a red-headed Assyrian, which you
    don't find too often. He was woman-crazy just as he was portrayed on there. Hawkeye and his buddy were a couple of surgeons.
    One of them was Andy Ivey, a junior, who was the son of Andrew Ivey, a big-shot at Cook County Hospital in Chicago, but
    he wasn't talking to his father because his father started backing a cancer treatment called Krebiozen which turned out
    to be a phony deal so they weren't on speaking terms. The characters were all the same. The gal they called, I forget
    what they called her on M*A*S*H, but we called her 'Old Iron-Pants,' the Chief Nurse. But that was the parallel to what
    they called her in M*A*S*H. Yes, they were quite a bunch of characters. When they got casualties, they worked very hard
    and under pretty primitive conditions.
- speaker: Interviewer
  text: Did you find yourself watching the show?
- speaker: Respondent
  text: No, just to get away from the usual thing.
- speaker: Interviewer
  text: You mentioned casualties.
- speaker: Respondent
  text: The casualties came in at night. Almost all of the fighting was done at night. We were in stable positions basically.
    One side would take a hill, and then a month later the other side would come back and take the hill but basically we were
    in one position. We lived in bunkers. We built a log cabin ourselves, the medical officers and dental officers. We piled
    sandbags around there.
- speaker: Interviewer
  text: Did you have plans to do that?
- speaker: Respondent
  text: Well, we had an engineering officer from the motor pool who had been a builder, and we notched the logs. It's not
    terribly difficult. It's not high-tech stuff. We notched the logs, and then we piled sandbags around it and over the roof.
    And it was fairly comfortable in the winter and the summer, because it was insulated well. And we had a little potbellied
    stove in our bunker. And we slept on cots, folding cots, Army cots. And this is what it was like. Now, we actually did
    our dentistry in what were called Jamesway tents, which looked like Quonset huts, but they're insulated canvas, and they're
    barrel shaped. And we had, I recall, four chairs in the Quonset hut where I was working. And one day, we had a dentist
    from Texas, I forget his name, but, a saw a waiting room, we had another Jamesway tent adjoining us. And, all of a sudden,
    we heard a bang, and this guy falls down screaming. He got shot in the behind. One of the soldiers who had come down off
    the hill for dental work was playing with his trigger, and the gun went off. And it got this guy in the behind. They evacuated
    him to Japan, and he got a Purple Heart for the experience.
- speaker: Interviewer
  text: The dentist from Texas, yeah.
- speaker: Respondent
  text: So the dental care situations that you were, where you were administering to these soldiers, were they the result
    of combat?
- speaker: Interviewer
  text: No. No. Not the dental work, but I helped with the casualties at night when they got overwhelmed. They'd call, and
    wake me, and I could do certain things. I could learn how to do a cutdown. When the blood vessels collapsed, I could do
    a cutdown in the ankle here, and get a vein, and put an IV in—things like that, I learned just off the cuff. And I took—and,
    while we were in the Mundungnee Valley, I took sick call a few times instead of the physician, because our physician,
    when a few rounds came over, he would disappear.
- speaker: Interviewer
  text: Where'd he go?
- speaker: Respondent
  text: I don't know, but he would disappear, and, so, if he wasn't around, I took sick call on occasion. So, I learned a
    little medicine.
- speaker: Interviewer
  text: Did you have supplies of—ample supplies of anesthetics?
- speaker: Respondent
  text: Yeah, anesthetics, we had, yeah. A local anesthetic was all I used. We had ample supplies of that. I was a hero one
    time, also, in the Mundungnee Valley. This kid had a belly ache. He's lying on his cot moaning, and I started questioning
    him. You know, I had a certain amount of medical training. I took some internal medicine in dental school, and it sounded
    like appendicitis. And there's a classic test for appendicitis which is called rebound tenderness. If you press in the
    area of the appendix, it doesn't hurt. But when you let go, it hurts like hell. And I used that test, and he had rebound
    tenderness, so we sent him back in an ambulance to MASH hospital. And I was a hero, because I'd diagnosed a case of appendicitis.
- speaker: Interviewer
  text: Could have saved his life if it burst, right?
- speaker: Respondent
  text: Yeah, probably, although they would have shipped him back anyway, and they would have figured it out back in MASH.
- speaker: Interviewer
  text: How was the food? Did you get better food as medical personnel than as the troops?
- speaker: Respondent
  text: No, no, we ate the same thing. They had a little PX somewhere around, I remember, and I used to buy cans of smoked
    oysters when I just couldn't handle the food there anymore. But, generally, we ate the same food.
- speaker: Interviewer
  text: Did you lose weight while you were in the Service?
- speaker: Respondent
  text: No, I gained weight when I went in the Service. I was as tall as I am now, and I weighed 115 pounds. I was a quarter
    of an inch under six feet, and I weighed 115 pounds. When I came out of the Service, I probably weighed 135 pounds, and
    I was all muscle, because I had done physical activity, obviously. And I wish I was back at 135 pounds now, obviously.
- speaker: Interviewer
  text: Was it hard to stay in touch with your family or anything, letters, or?
- speaker: Respondent
  text: Well, they would keep asking me if I was in a combat situation. And I would just ignore the questions, because I did
    not want them to worry. My mother and father were, of course, worried about me. And then the doctor who used to disappear,
    who came from Pennsylvania, passed through Chicago on his way home. He rotated, and he stopped at Chicago to change planes
    or trains. And he called my parents, and he fed them all kinds of war stories. So, they found out I was in a combat situation
    that way. Not that I ever told them.
- speaker: Interviewer
  text: So while you were there, the frontline didn't shift too much? You were in a permanent position?
- speaker: Respondent
  text: No, very little. We were—If you are old enough to remember, the Punch Bowl was there. Sandbag Castle just out of the
    Punch Bowl. Going north was Sandbag Castle which they went back and forth a couple of times while I was there.
- speaker: Interviewer
  text: So, you were never—they never shelled your bunker there, or your?
- speaker: Respondent
  text: No, that's not true. Most of the real fighting happened at night, and I wasn't there at night, although I would go
    up on-line on occasion to visit friends and soon. I'd even go out to the OPs, the outposts which were between our lines
    and the enemy lines in the daytime, and there was very little danger.
- speaker: Interviewer
  text: Were you allowed to do that or did they let you?
- speaker: Respondent
  text: Well, nobody—
- speaker: Interviewer
  text: Nobody said you couldn't, yeah.
- speaker: Respondent
  text: You know, they figured, I guess, he is young and stupid. Let him do what he wants. And I was young and stupid! But
    they would lob over occasional mortars and artilleries in the daytime. Of course, we got rocketed once by our own Air
    Force, which was the loudest noise I ever heard in my life! The Navy and Marine flyers were very good at close combat
    operation, so they could tell who was American and who was not American, and they fired, generally, only on the enemy.
    The Air Force was not that great at that. So, once in a while, we got some rockets from them, a round from them. And,
    of course, there was always the famous short round. The artillery fired over us, and if the artillery shell didn't have
    enough bags of powder behind it, it fell short of the enemy and landed among us. That happened a couple of times, too,
    but I was not in danger most of the time.
