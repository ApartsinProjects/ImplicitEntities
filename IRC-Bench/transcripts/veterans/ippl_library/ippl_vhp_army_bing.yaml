turns:
- speaker: Interviewer
  text: Bruce, could you give me your date of birth and where you were born, please.
- speaker: Respondent
  text: I was born December 3, 1931, in Chicago, Illinois, at St. Luke's Hospital.
- speaker: Interviewer
  text: Bruce, what were you doing at the time? Were you inducted? Were you drafted into the Army?
- speaker: Respondent
  text: Yes. I was a draftee into the United States Army. I was attending school at the time, and the draft notice came and
    there wasn't much you could do.
- speaker: Interviewer
  text: What year was this?
- speaker: Respondent
  text: This was 1953.
- speaker: Respondent
  text: We had been married nine months. Bruce was drafted and I was older than Bruce. I had had a year of teaching in Cleveland,
    Ohio, and a half-year teaching in Chicago Public Schools. So when he was drafted I continued with the Chicago Public Schools
    until he went to basic training. At basic training in Ft. Leonard Wood - I actually went there each weekend and stayed
    with him for the weekends. My girlfriend and I - her husband was in the same position - we traveled together down to St.
    Louis, Missouri, stayed with our husbands, came back on Monday and went to our jobs.
- speaker: Interviewer
  text: Bruce, what was basic training like?
- speaker: Respondent
  text: Basic training, I guess, was typical Army basic training. I don't think anybody that was there really wanted to be
    there at the time. But it was what you could survive on in the field, and any type of training with the M1 rifle, with
    pistols - about every bit of Army equipment that a normal soldier would be equipped with.
- speaker: Interviewer
  text: And after basic training, where were you sent?
- speaker: Respondent
  text: After basic training I was sent to San Marcus Air Force Base in Texas for training in aircraft mechanics.
- speaker: Interviewer
  text: Did you have any experience in aircraft mechanics?
- speaker: Respondent
  text: I had absolutely no experience in any type of mechanical training, but I had a very high interest and probably tested
    out very well in mechanics.
- speaker: Interviewer
  text: And after that you were sent ..?
- speaker: Respondent
  text: After that I was sent to Mannheim, Germany, to Coleman Barracks - it was an Army Air Force base in Mannheim, and that's
    where I did my work.
- speaker: Interviewer
  text: Pat, how did you enter the service?
- speaker: Respondent
  text: I also followed Bruce to San Marcus, Texas. I was very much in love and just couldn't leave him. So I went to Texas
    hoping to get a teaching job. They didn't need teachers. My avocation is that I'm a florist. I have a license for knowing
    how to do floral work, so I worked with a floral shop in San Antonio and Austin, Texas, at the time that he was there.
    And I lived in a home rented with Bruce until he was transferred overseas.
- speaker: Interviewer
  text: Now, had you entered the Army?
- speaker: Respondent
  text: No, at that time I was still working as a florist, as a married person hoping to get a teaching job and did not get
    one. I did as many odd jobs as I could.
- speaker: Interviewer
  text: So when did you enter the Army - were you in the Army?
- speaker: Respondent
  text: At Christmas, 1953, I came to Chicago, missed the boat to Germany and was then flown from somewhere on the east coast
    over to Frankfort, Germany, where I landed on New Year's Eve. Which was rather interesting, because I was given a three
    day pass to do whatever I wanted to do. As soon as I got over to Germany and got stationed at Coleman Barracks in Mannheim,
    I contacted Pat and said this is too good to be true, come on over.
- speaker: Respondent
  text: Well at that time, after leaving Texas, I returned to my parents' home. My father owned a flower shop and I once again
    stepped into flowers, because I realized I needed part-time jobs. When Bruce was flown overseas to Germany, I once again
    became very lonely, and I said I didn't want to remain in the United States, I wanted to go with him. My parents were
    very much against the idea. I, being a headstrong person at the time, said no, I was going over. I was going to take whatever
    money I had, pay for my own fare on the Liberte Ship, the French line, and go over. So I did it! On the ship it was most
    unusual. I was on the ship seven days and I began to sit at a table where there were a lot of people, and I happened to
    be talking that I had been a teacher previously in Cleveland, Ohio and Chicago Public Schools, and this gentleman, Cal
    Lancaster, introduced himself to me - he and his wife. He was returning from the States. His mother had passed away and
    he had attended the funeral, and he was returning to Germany. He said I just happen to be going back, I'm superintendent
    of the USA Europe School. I said, You are the very person I'm looking to meet! He said, Strange as it may be, I'm on the
    same ship you are. And also, strange as it may be, I happen to need several teachers - I have some vacancies. Do you have
    experience? And I said, Yes, and told him of my experience. He said of course he would need authenticity to this experience,
    and said temporarily he would hire me if my authenticity reached him in time to assure him that I was what I said I was.
    Well, that's exactly what happened. I reassured me I was who I was, that I had the experience, and he said when my papers
    arrived he would enroll me in the Army and I would become an Army school teacher at that time and he would start me to
    work immediately. I arrived in Germany around the beginning of February. My papers arrived around February 14. And at
    that time he enrolled me and I started work. And I have the papers that you will see.
- speaker: Interviewer
  text: So you did not have to go through basic training?
- speaker: Respondent
  text: No. It was not that kind of a position. When you are part of the Army and are already qualified you become a warrant
    officer. I didn't need basic training. I was a person, what they called a Department of Army Civilian employee. And you
    become a warrant officer. But you don't go through basic training because you are a graduate of college and you are becoming
    a teacher.
- speaker: Interviewer
  text: Did you have to wear a uniform - a military uniform?
- speaker: Respondent
  text: No. I was a civilian employee of the Army.
- speaker: Interviewer
  text: Bruce, what was your daily routine like?
- speaker: Respondent
  text: Daily routine was interesting because I was living off base, which was a great privilege that they allowed me over
    there. Because Pat was coming over I was able to locate an apartment in a small town called Blumenau, Germany. One of
    the people that was rotating back to the United States had an apartment. I was able to get that apartment, and immediately
    I let Pat know the apartment was available we got it and we had a place to live. So I never had to live in the barracks
    in Germany. Our assignment, as what was left of the Army Air Force, was a very loose assignment. We did not have all the
    Army disciplines that would normally go along with the military.
- speaker: Respondent
  text: The very fact that I was an officer, I had privileges over and above because of that fact, and because of the fact
    that I was married. Therefore, I requested that my husband live with me off barracks when it was possible. And they honored
    my request. They also honored my request that I live off-base, and not in the billets with the other personnel who were
    employed. Both of these things - they recognized that we were an unusual situation, and they went along with it. I told
    me that I had prior experience with schools - Cleveland Public Schools, Chicago Public Schools. They recognized that I
    was older than Bruce, and that I was needed. I spoke with Cal Lancaster, the Superintendent. I explained my position and
    with that he said, Pat, we will oblige you and let your husband live with you on weekends and other times.
- speaker: Interviewer
  text: How were you able to get to the same town where Bruce was?
- speaker: Respondent
  text: 'When I spoke with Cal Lancaster, the Superintendent, I said, What schools are you superintendent of. He said, Mannheim
    School #1 and Mannheim School #2. I said, My husband is closest to Mannheim School #1. I knew that much. I asked what
    positions he had available there, and he said kindergarten. I said I was more experienced in junior high, but because
    I had a broad degree, and at that time I was able to teach from kindergarten through eighth grade, then also into junior
    high. He said, I can see from your credentials that come from the previous places that you have this ability to teach
    at these various grades, so I will take you into kindergarten because that''s the grade that''s available within your
    husband''s barracks.'
- speaker: Interviewer
  text: How many children were in your class?
- speaker: Respondent
  text: I'd say about 28. I had morning and afternoon - so I had a.m. and p.m. kindergarten.
- speaker: Interviewer
  text: These were children of servicemen stationed in Germany.
- speaker: Respondent
  text: Correct. And the children were, shall we say, as children will act. They would immediately come into the classroom
    and say, My father is a sergeant - I just want you to know who he is. And I would say, Oh, that's very nice, please be
    seated.
- speaker: Interviewer
  text: So these were children of officers, not just normal enlisted people.
- speaker: Respondent
  text: Yes. But some were enlisted, also.
- speaker: Interviewer
  text: So they could bring their families over to Germany?
- speaker: Respondent
  text: In some cases. It depended on the work type of that particular father. If the father's work type was needed, then
    he could bring his family. At that time they were looking for experience from the veterans.
- speaker: Interviewer
  text: What was your life like together living in Germany and you teaching school and you going to repair aircraft.
- speaker: Respondent
  text: It was interesting. It was sort of like a 9-to-5 job. I would leave sometimes in the morning around 7:30 a.m. I think
    we had roll call around 8:00 in the morning, and we would then go to our individual areas wherever they were on the base.
    Mine happened to be in the area where the salvage shop was and the repair shop. And I would go over there and do my thing
    for the day, and at 4:30 p.m. the work day was over and we could leave. So it was very unlike normal Army life in that
    we did have the privilege of sort of a 9-to-5 job. And the only time that would be interrupted would be if there were
    alerts. Suddenly there was going to be an alert, and the Russian Army was besieging the east part of Germany, everybody
    reports to their position, take their assigned arms and meet - get ready to get on a truck and go wherever it was necessary.
    With the aircraft group, we were more important that we were there to service the aircraft and have them ready to fly.
    So we stayed back. Some of our troops would go off to the different fronts, wherever they were needed. Usually it lasted
    a day or two and they came back. And it was like a vacation.
- speaker: Interviewer
  text: So you never really had to march or do any drills.
- speaker: Respondent
  text: Only in basic training. Our group was a group of technicians. There were no demands put upon us for standing specific
    formations, other than being there in the morning for the morning formation. At the end of the day they used to have a
    formation, but it got diluted and we were able to leave at a specific time.
- speaker: Interviewer
  text: Exactly what was your job?
- speaker: Respondent
  text: My job was to be able to repair any of the Army light aircraft. These would be the L19's, the L17's, the H21 helicopters,
    and I had skills in repairing all of them. And that included rebuilding engines - whatever needed to be done.
- speaker: Interviewer
  text: So, from somebody that never knew anything about engines, you learned an awful lot.
- speaker: Respondent
  text: Well, as most kids in those years, we tore apart more cars and we could put them back together. But it was more if
    you had the ability through your interest and then your training. And the Army training was very specific. There were
    ways of doing things. It was sort of like the right way, the wrong way and the Army way.
- speaker: Interviewer
  text: I've heard that before.
- speaker: Respondent
  text: And the Army had a certain way of doing things. And we had the luxury, if we could find a better way to do it, to
    talk to our head officer who was a colonel - there were a bunch of flying warrant officers at our field - and they had
    a wonderful quality control. If you had worked on an aircraft and the pilot who was most likely a warrant officer would
    ask you if you'd worked on that aircraft and you certified that the work was done properly, he'd say, Get a parachute;
    we'll go find out. And it was good. Because you got some flying time in. It let you know if they were putting their life
    on the line, you're going to do the same thing.
- speaker: Interviewer
  text: What was your rank?
- speaker: Respondent
  text: I had a Specialist 4 with the Army, which at that point when I went in the Army it went from the PFC's, the corporals,
    the sergeants, to the specialist ranks - Specialist 1, 2, 3, 4 - and different ranks that way.
- speaker: Interviewer
  text: Was your rank above sergeant?
- speaker: Respondent
  text: No. I did not get that. I was a peon in the Army! No rank at all. But I had a responsibility and a technology that
    they had to respect, because if I said this plane is not taking off I could ground - I don't care if the captain came
    and said that plane is going - I could ground it. Unlikely at times, but then you would explain why you grounded an aircraft.
- speaker: Interviewer
  text: Now Pat, you were an officer.
- speaker: Respondent
  text: 'Yes. I was a school teacher. We had parent-teacher meetings, and I was in charge of them. The parents - the fathers
    of course being officers, some of them being sergeants, some of them up to a colonel - they would come to the parent-teacher
    conferences and I would speak to them about their child and the progress their child was making. We also had different
    projects that we would put on with the students so that the parents could see the progress the child was making. I also
    worked with the teachers and the other principals of the school itself - not only Mannheim #1, but Mannheim #2. And we
    formed what you might call a teachers'' group where we would put on - shall I use the word, plays - performances to the
    parents to show them, with their students, different things that we were doing in the classroom. So when the father and
    the mother - the officers - came to see what they were doing, we in turn would show them: "Kindergarten class come out,
    let''s show them what we''re doing now." Then first grade, second grade and so on. I was kind of the coordinator of that
    because I had been a recreational director and we did a lot of marching with the students. The parents liked to see their
    little child marching as they had done in basic training, so the children learned the basic steps of marching and tumbling
    and things of that nature for the PTA meetings that we would be doing - as they do within the States. And they seemed
    to enjoy that very much. Also report cards - I didn''t bring a report card with me tonight, I''m sorry I didn''t - we
    did have report cards for the parents that showed them that we were doing things that would be applicable to the States,
    so when they returned with their child to the States their child would be able to fit into the curriculum immediately,
    no matter what State they were going into, because most States, though they seem to differ from a southern education to
    a northern education, to a Los Angeles, California type to an eastern state - they seem to differ to the person who is
    not aware of it, but for reality sake the curriculum of the United States for children was basically very similar.'
- speaker: Interviewer
  text: Were the children taught German in class?
- speaker: Respondent
  text: Yes. It was most interesting. May I quickly say that in Kindergarten - I'm very surprised at this - the teacher would
    come in, in the morning,
