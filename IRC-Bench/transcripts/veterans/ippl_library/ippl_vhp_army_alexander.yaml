turns:
- speaker: Interviewer
  text: Coy, just before you entered the service, where were you living? What was your life like at the time?
- speaker: Respondent
  text: I was living in Alabama, in Talladega County where Childersburg is. Most of it was I was farming helping my father
    on his farm and a neighbor on his farm.
- speaker: Interviewer
  text: What kind of farm was it?
- speaker: Respondent
  text: Mostly cotton, corn, other stuff, soybean. It was mostly just regular farming stuff. I would help with the cattle.
- speaker: Interviewer
  text: Were you in school at all or was this after?
- speaker: Respondent
  text: After school, I finished school and I started to work at Bonnet. It was a textile place and unfortunately after I
    started, they closed the plant. In other words, I wasn't going back to farming. I didn't think there was any future in
    that so I joined the service.
- speaker: Interviewer
  text: So you enlisted?
- speaker: Interviewer
  text: You enlisted in which branch?
- speaker: Interviewer
  text: Why did you choose the Army?
- speaker: Respondent
  text: They had the career path I really wanted to go into; the education I wanted to go through, mechanics.
- speaker: Interviewer
  text: How old were you when you enlisted?
- speaker: Respondent
  text: I was 20 years old when I enlisted.
- speaker: Interviewer
  text: How did your parents feel about you going in? Was it commonplace for boys in your situation?
- speaker: Respondent
  text: No. My mother didn't like it at all. She was not real thrilled about it. But at that time, there was no war and nothing
    going on so she was comfortable with it after I explained it to her.
- speaker: Interviewer
  text: You saw it as a path to education and she thought that was probably O.K.?
- speaker: Interviewer
  text: Where were you inducted? Do you remember what that whole situation was like?
- speaker: Respondent
  text: I was inducted in Atlanta, Georgia. I took basic training at Ft. Jackson, South Carolina.
- speaker: Interviewer
  text: What was your induction like?
- speaker: Respondent
  text: I went with a group of guys that were joining the service. Most of them were joining because they figured if they
    didn't join, they would be drafted anyway. They were at draft age and at various stages of their lives.
- speaker: Interviewer
  text: How far was it from where you were in Alabama to Atlanta?
- speaker: Interviewer
  text: Did you drive there?
- speaker: Respondent
  text: No. They bused us there from Childersburg. I joined up in Childersburg but when you were inducted, they bused you
    to Atlanta and actually it was pretty close to the bus station in Atlanta at the time. That's where the induction took
    place. The physical and everything took place.
- speaker: Interviewer
  text: They picked you up at the recruiting station? It was all military?
- speaker: Interviewer
  text: When you got to the induction center, what was it like? How many men were there? Was there a big group of men there?
- speaker: Respondent
  text: If I remember correctly, there was about 50 of us. It was a fairly big group.
- speaker: Interviewer
  text: You went through a physical, got assigned, got your gear?
- speaker: Interviewer
  text: What happened to all your civilian gear? Did they tell you what not to bring or did they just send it all back home?
- speaker: Respondent
  text: They sent it all back home. It was all packaged right there at the place. They gave you a package you could put it
    in, addressed it and it was sent back home.
- speaker: Interviewer
  text: Were you allowed to keep anything?
- speaker: Interviewer
  text: Watch, anything?
- speaker: Respondent
  text: Watch, yes. Anything you wore around your neck, like crosses and stuff like that, they didn't take. If you wore watches
    or if you had rings, you could keep those. Other than that, they sent most of it back home.
- speaker: Interviewer
  text: Were any of your buddies with you when you were inducted?
- speaker: Respondent
  text: No, just me.
- speaker: Interviewer
  text: How long did the whole induction take?
- speaker: Respondent
  text: Actually, it went pretty fast. One day was spent with just physical and stuff like that. You went through a physical
    whether you would qualify for service or not. The next day, that was it. They swore you in. They put you in a room and
    swore you into the service. That was it. How they did it, I don't know, but they had orders for you by the time you came
    out of the room. So I figured they always knew who was going to go in. I didn't think much of it until afterward, but
    I always figured they knew who was going to go.
- speaker: Interviewer
  text: Your orders were for Basic Training?
- speaker: Respondent
  text: Right and that was at Fort Jackson, South Carolina.
- speaker: Interviewer
  text: So you went a little further north?
- speaker: Respondent
  text: Yes. Kept going north for some reason, couldn't figure that out.
- speaker: Interviewer
  text: How did you get there?
- speaker: Respondent
  text: Bus. They took us on a bus.
- speaker: Interviewer
  text: Short trip?
- speaker: Respondent
  text: It wasn't that long.
- speaker: Respondent
  text: It was less than a day, really. It wasn't that far away.
- speaker: Interviewer
  text: You went to Fort Jackson. How were you greeted when you got there?
- speaker: Respondent
  text: When you got off the bus, you had most of your gear with you and you took it. They put you in these… I don't know
    how they assigned these companies, I never figured that out, but they put you in a company and you were with a group of
    guys. They put you with a group of guys. Then they marched you off to your barracks.
- speaker: Interviewer
  text: What were your barracks like?
- speaker: Respondent
  text: One building with a big…the building we were in, if I remember correctly, had two floors. You had an upstairs and
    a downstairs. I would say maybe 30, not even 30, maybe 25 to a floor.
- speaker: Interviewer
  text: Was it bunk beds or was it single beds?
- speaker: Interviewer
  text: Were you on the top or the bottom?
- speaker: Respondent
  text: Always on the bottom. I didn't like the top. I always figured I'd roll off. I wasn't used to sleeping in a bunk bed.
- speaker: Interviewer
  text: And you had some rules you had to follow in the barracks.
- speaker: Respondent
  text: You maintained your footlocker. I mean, it had to be a certain way. Your bed had to be made a certain way. If it wasn't
    clean then you went back and cleaned it again. You had to wax the floor. It had to be waxed once a week. Everything had
    to be clean and it had to be in a certain order.
- speaker: Interviewer
  text: If it wasn't?
- speaker: Respondent
  text: If it wasn't, you did it over and if there were weekend passes, they didn't give them to you. It was sort of a discipline…
    It was kind of a disciplinary action they used to get people to do things the way they wanted them to do. And you kept
    the shower clean. There were details on how… It was lined out… You know, you had a certain person who took orders from
    the Sergeant in charge of your barracks. He delegated the power to one person who was in there. Most likely an OTC guy
    who had prior military in school. He told him what he wanted to do and how to split up. You had certain things that you
    did. Certain people waxed the floor; certain people cleaned the bathrooms.
- speaker: Interviewer
  text: What did you do?
- speaker: Respondent
  text: Mostly the barracks itself, the floor, stuff like that. But they switched it around. They had K.P. They had to assign
    certain people to K.P. That's just the way things were. They assigned certain things and you'd get them. Other than training,
    you did all this before training. You fell out for inspection. They had an inspection every morning. Your boots had to
    be shined and your clothes had to be a certain way and they didn't vary from it either.
- speaker: Interviewer
  text: What time did you have to get up? You were gently awakened, right?
- speaker: Respondent
  text: Oh yeah, by somebody yelling every morning. I always remember that one. It was generally either five o'clock or six
    o'clock. Sometimes they'd let you sleep to six. If you had a real hard day the day before, they'd let you sleep an extra
    hour. But usually five o'clock. You got up, you went outside, you exercised, you know calisthenics and then you did a
    run. I always call it "Sand Hill" because it was nothing but sand. Then you came back to the barracks, you showered and
    then you went to eat breakfast.
- speaker: Interviewer
  text: How much time did you have to shower and eat breakfast?
- speaker: Respondent
  text: Probably an hour.
- speaker: Interviewer
  text: Did you eat as a Company?
- speaker: Interviewer
  text: Everything as a Unit.
- speaker: Respondent
  text: Everything as a Unit and if you weren't there, guess what?
- speaker: Interviewer
  text: You missed it.
- speaker: Respondent
  text: You missed it. That was it.
- speaker: Interviewer
  text: And when you went to eat, what type of food did you get? Could you have as much as you wanted?
- speaker: Respondent
  text: Yeah, you could go back for seconds if they had extra, only if they had extra. But most of the times, the first time,
    believe me, you had enough. This was the funny part. I always laughed about it. They gave you clothes that were two sizes
    too big for you and I wondered why. After you got out of basic training, you found out why. The food was very calorie
    oriented.
- speaker: Interviewer
  text: Calorie intensive.
- speaker: Respondent
  text: Yes. You fit the clothes when you got out.
- speaker: Interviewer
  text: What was the typical breakfast like?
- speaker: Respondent
  text: You had bacon, eggs, just like you would have normal. Sometimes they would have… The one I didn't like, they had K
    rations. Because you were going to eat them out in field, they would serve them sometimes.
- speaker: Interviewer
  text: They wanted you to get used to it.
- speaker: Respondent
  text: K rations were the worst, C rations were O.K.
- speaker: Interviewer
  text: What was the difference between the K rations and the C rations?
- speaker: Respondent
  text: A lot. I think K rations were made back in World War I. They tasted like it. It was god-awful food. C rations weren't
    that bad.
- speaker: Interviewer
  text: Was one hot and one cold or was it…?
- speaker: Respondent
  text: Most of it was cold. They did heat it up because it was in a barracks but if you were out in the field, most of it
    was cold.
- speaker: Interviewer
  text: What was the K or the C? What did it stand for? Do you know?
- speaker: Respondent
  text: I have no idea. I never even really thought about it.
- speaker: Interviewer
  text: What was the difference between what you would get in a K ration package?
- speaker: Respondent
  text: K rations were more dried food than anything else. I mean, it was… Like I said, I think it was packaged back in World
    War I. I'm not sure but it tasted like it. But C rations were food. It was high calorie and it was packaged right. It
    was in cans. It was very high calorie food, believe me. What I never understood about it is people who were heavy at the
    time lost weight; people who weren't heavy, gained it. I could never figure that one out. I mean, one guy that was in
    with us was a pretty heavy guy and he lost weight like mad. It was the reverse for me. I weighed 135 lbs. when I went
    in and when I came out of basic training, I almost weighed 148 which is huge for me, at that time. I could never figure
    that one out. You couldn't figure out their logic, but it worked.
- speaker: Interviewer
  text: After breakfast, what did you do?
- speaker: Interviewer
  text: What was your training like?
- speaker: Respondent
  text: You went to rifle training. You went through all the basic training.
- speaker: Interviewer
  text: Were some in the classroom and some in the field or was it all in the field?
- speaker: Respondent
  text: All in the field. It was all field training.
- speaker: Interviewer
  text: Had you learned to shoot before this? Had you been a hunter?
- speaker: Respondent
  text: I was raised with guns. That was amateurs for me as far as the rifle range was, that was nothing. I was used to using
    a .22 rifle and shooting at some of the distances they were…
- speaker: Interviewer
  text: What type of rifle did they give you?
- speaker: Respondent
  text: M-14. Trust me, at 500 yards that was nothing for me. I wasn't used to shooting that good of a gun, really. Shooting
    was not a problem for me. I grew up in the country so you hunted all the time. So it was not really a big thing for me.
- speaker: Interviewer
  text: What other types of things did they include in your training?
- speaker: Respondent
  text: How to shoot mortars, some explosives. They didn't teach you a lot because that was the second phase of training.
    But they taught you tactics, combat tactics. How to fight as a unit and night fighting, the difference between night and
    day. Basically, the basics, fighting as a unit, fighting together. They taught you hand to hand combat and bayonet training,
    which I never thought worth teaching because I wasn't going to get that close to him. If I was that close, I was way too
    close. But they taught it anyway. They taught you throwing grenades and stuff like that. That's basically what they taught
    you in basic.
- speaker: Interviewer
  text: How long was your basic?
- speaker: Interviewer
  text: Were you able to communicate with everybody back home during that time?
- speaker: Respondent
  text: Yes. In fact, they required you to, at least let your family know what's going on.
- speaker: Interviewer
  text: So that was the first 6 weeks. Did you have a graduation at that point?
- speaker: Respondent
  text: Yes. They graduated you; they gave you a certificate of completion which was a piece of paper, really.
- speaker: Interviewer
  text: Did you have a ceremony?
- speaker: Respondent
  text: Yes. They had a ceremony where all the people who started together, graduated together. I don't think we lost anybody
    in our platoon. I think everybody graduated at the same time; they had this ceremony where the company commander came
    out and talked to everybody, gave us the pep talk, as I call it and that's it.
- speaker: Interviewer
  text: Did your family come to see your graduation?
- speaker: Respondent
  text: No. They wouldn't. In fact, there were no families that I know that were there.
- speaker: Interviewer
  text: It was just all internal?
- speaker: Respondent
  text: Yes, it was all internal.
- speaker: Interviewer
  text: After your 6 weeks you got orders for your…
- speaker: Respondent
  text: Next phase. It was advanced infantry training in Fort Dix, New Jersey.
- speaker: Interviewer
  text: Up north again, huh?
- speaker: Respondent
  text: A little, yes. Outside of Trenton.
- speaker: Interviewer
  text: What year was this?
- speaker: Respondent
  text: I want to say it was '65 when I went to Fort Dix, probably in May, June or July.
- speaker: Interviewer
  text: Starting to hear more about Vietnam at that point?
- speaker: Respondent
  text: Yes. It started up. The buildup started around that time. We heard about it but we weren't really concerned about
    it at the time. Advanced infantry training was mostly heavy guns, explosives, how to use a 105 howitzer and mortars and
    stuff like that. That was advanced and that was 6 weeks.
- speaker: Interviewer
  text: So how did you get to New Jersey?
- speaker: Interviewer
  text: Bus again? Other guys from your platoon go up there with you?
- speaker: Respondent
  text: 'Yes. There was three, four other guys: Richard Leitner, Larry Liebeck, Mike McCormack and Pete Konecky, New Jersey
    guy; he loved it. Like he said, he could throw a rock and hit his house from the base. He was real happy about it. I always
    called him the mischief one of the group. He got into more trouble than anybody. He was kind of a fun person, too.'
- speaker: Interviewer
  text: What time of year was this?
- speaker: Respondent
  text: It was mostly in the fall, late summer, early fall. It was a 6 week class and we went through all that together and
    then we split up. I went to airborne training in Fort Benning.
- speaker: Interviewer
  text: Back South.
- speaker: Respondent
  text: Back South, Columbus, Georgia. Trained there for 3 weeks in the airborne training. Graduated from there and I really
    don't know how I got from there to Fort Campbell but I went there, Fort Campbell to the 801st.
- speaker: Interviewer
  text: Fort Campbell, Kentucky?
- speaker: Respondent
  text: Fort Campbell, Kentucky. I was in Maintenance there for about, oh, I'd say 2 or 3 months. Then from there, I went
    to Vietnam.
- speaker: Interviewer
  text: How long was your training altogether between all these different…?
- speaker: Respondent
  text: 6 weeks in Fort Dix, New Jersey, 3 weeks in Fort Benning, and I can't really… I was at Fort Campbell…
- speaker: Interviewer
  text: Was it about 6 months of training?
- speaker: Respondent
  text: Yea, 6 months training. I was in a maintenance company at Fort Campbell and from there I went to Vietnam.
- speaker: Interviewer
  text: How much warning did you have that you were going to Vietnam?
- speaker: Interviewer
  text: Were you able to contact your parents and let them know?
- speaker: Respondent
  text: Oh, yeah. I can remember my mother having a fit. She was not happy about it.
- speaker: Interviewer
  text: That was on the New already at this point?
- speaker: Respondent
  text: Oh, yeah, the buildup had already started. When I got to Vietnam, I landed in Can Tho.
- speaker: Interviewer
  text: How did you get to Vietnam?
- speaker: Interviewer
  text: You flew there? An army plane.
- speaker: Respondent
  text: No, it was a commercial plane.
- speaker: Interviewer
  text: It was a commercial plane?
- speaker: Respondent
  text: It was Pan Am.
- speaker: Interviewer
  text: Really? It wasn't all military.
- speaker: Respondent
  text: No, it was all military. It was a flight that the military…
- speaker: Interviewer
  text: Had bought.
- speaker: Respondent
  text: Had bought.
- speaker: Interviewer
  text: What was the mood like on the flight?
- speaker: Respondent
  text: Mostly, content. I don't think anybody was celebrating. It was kind of quiet. You were on the flight for 18 hours
    so. We landed in Alaska and Guam. I'm pretty sure it was Guam. Not Guam, anyway, we landed twice and we never got off
    the plane. I k
