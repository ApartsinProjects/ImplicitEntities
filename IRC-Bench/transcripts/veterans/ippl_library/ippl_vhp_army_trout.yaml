source_url: https://ippl.info/learn-research/veterans-history
turns:
- speaker: Interviewer
  text: So, Frank, where were you living when you entered the service? What was your life like at that time, just before you
    went in?
- speaker: Respondent
  text: At the time I was working construction. I was living in the Village of Westmont. A friend of mine and I had been considering
    going into the military. Vietnam was starting to cook up.
- speaker: Interviewer
  text: What year was this?
- speaker: Respondent
  text: This was 1965.
- speaker: Interviewer
  text: And how old were you at the time?
- speaker: Respondent
  text: At that time I was 20 years old. My friend and I said Vietnam was starting to cook, and I told my friend, "Hey, I'm
    going to join the Army. Do you want to come along?" And he said,
- speaker: Interviewer
  text: What prompted you to want to join the Army?
- speaker: Respondent
  text: Another friend of mine was a paratrooper. We talked about it. I really respected the man. He was about ten years older
    than me. I thought, that is pretty cool and if you're going to be in something try and be the best. At the same time,
    Special Forces were starting to become known - the Green Berets. And I thought that would be cool, too. So I joined the
    Army to get into the paratroopers and then go into Special Forces.
- speaker: Interviewer
  text: Was there military history in your family?
- speaker: Respondent
  text: My uncle served in World War II. My father was a railroad engineer during World War II and had already had a family
    so he was bypassed for the military. So nothing other than my uncle in World War II.
- speaker: Interviewer
  text: How did your family react to your decision?
- speaker: Respondent
  text: My father was concerned because of Vietnam, as was my mother. But they also knew that when I set my mind to do something
    I'm going to do it.
- speaker: Interviewer
  text: So you were 20 years old, you enlisted in the Army. Where were you inducted?
- speaker: Respondent
  text: I was inducted in Chicago. I can remember my friends and I leaving Chicago for Fort Knox, Kentucky, for basic training.
    We left on a train at night.
- speaker: Interviewer
  text: Let me go back. Where in Chicago was your induction?
- speaker: Respondent
  text: I can't remember - Dearborn Street wants to jump in my mind; I don't know why. Anyway, there was an induction center
    in downtown Chicago.
- speaker: Interviewer
  text: What happened when you got to your induction? What was it like?
- speaker: Respondent
  text: Well, it was just a bunch of guys standing around. Most of them were draftees, and I was RA - regular army, because
    we joined for three years.
- speaker: Interviewer
  text: And draftees got two years?
- speaker: Respondent
  text: Yes, draftees got two. I heard a lot of moaning and groaning. But to me, this was the great adventure! I was all hopped
    up about it, along with serving our country. I looked at it as like another Korea - Vietnam would be over in about two-and-a-half
    to three years, just like Korea. And we were stopping the Communists from taking over another country. So it was my turn
    to step up and do my duty. So that's why, besides being the great adventure, that's what we decided to do - my buddy and
    I.
- speaker: Interviewer
  text: So how adventurous was the induction itself?
- speaker: Respondent
  text: I had men putting their hands where they never put them before - the doctors. And you stand around naked with a bunch
    of other people in your BVD's. This was the Army, now.
- speaker: Interviewer
  text: So you went through …
- speaker: Respondent
  text: A bunch of medical tests and everything. They said I was okay to go. I think it took like one or two days to do this.
- speaker: Interviewer
  text: Did you get your supplies then, or did you just get a basic uniform?
- speaker: Respondent
  text: We got nothing other than the physical. Then, after we were approved for service, we were hustled into a room. We
    raised our right hand. It was a great thing to be able to serve. I get emotional over it. But a lot of people have lost
    the honor of serving your country. And even draftees I talked to later, said it was probably one of the best things they'd
    ever done in their life - even though then went kicking and screaming. And now they could stand proud. They weren't a
    chicken-shit that ran off to Kalamazoo or Canada, or wherever they were going to hide out at. They were man enough to
    man-up and do their duty. As for ones who didn't, I have mixed feelings. Because I have a lot of friends of mine who evaded
    the draft through getting married and cranked out a kid or whatever it was. Because, to this day you can see that they
    lost honor - they lost their honor by doing that. Some of them will cover up by saying it was a stupid war and what-not.
    It didn't really matter if it was smart or stupid. You're standing up and doing the right thing at the right time. You
    believed. And if you weren't willing to do that, then you should have enough honor and integrity to say, okay, I don't
    believe in this and I'm going to burn my draft card or whatever and refuse to go, but then go to jail for it. Don't run
    off like a punk and hide out. If you truly believe something is wrong, then be honorable enough to pay the consequences
    - which most people aren't. So that's what I believe.
- speaker: Interviewer
  text: So you were at the induction center. You swore the oath. And then …
- speaker: Respondent
  text: Then later that evening we were herded onto buses. We were told just to bring a set of underwear with and something
    else, and don't worry about anything because the Army was going to take care of everything from that point on.
- speaker: Interviewer
  text: Did they give you a list of things you were not supposed to bring with you to induction?
- speaker: Respondent
  text: If they did I can't remember it.
- speaker: Interviewer
  text: What happened to the things you had when you got there?
- speaker: Respondent
  text: I believe the sergeant did tell us no alcohol, no drugs, no guns - nothing to get you in trouble with. If you need
    something the Army would give it to you.
- speaker: Interviewer
  text: So when you got on these buses you were in uniform?
- speaker: Respondent
  text: No, we were in our civilian clothes. They told us just to wear something casual, that we weren't going to be going
    anywhere. And if we were going to be going somewhere the Army would supply it. As a matter of fact, I even think a little
    kit we took with us with a toothbrush and everything was issued by the government. So we didn't really bring everything
    from home. The little kit was from the government or the Red Cross.
- speaker: Interviewer
  text: So you got on the buses.
- speaker: Respondent
  text: We got on the buses and went to the railroad depot.
- speaker: Interviewer
  text: Was it Union Station?
- speaker: Respondent
  text: Union Station, and then we boarded a train for Fort Campbell, Kentucky, so we were going to Louisville, Kentucky.
    So onto the train we go.
- speaker: Interviewer
  text: And this was a civilian train.
- speaker: Respondent
  text: It was a civilian train.
- speaker: Interviewer
  text: Were you just mixed with everyone or did you have separate cars?
- speaker: Respondent
  text: 'We had a car loaded full of Army guys. If there were civilians on board, that''s possible. I don''t remember. I just
    remember a bunch of our guys. I remember pulling out of the station and I was so excited: Yes, we''re really going! And
    I remember pulling out of Chicago and looking into the car and seeing all these grown men crying. Even my buddy was crying
    because he was leaving home. And for a lot of people, maybe other than Boy Scout camp, this was their first time they''d
    be separated from their parents, I guess. But for me it was "woo-hoo," a great adventure.'
- speaker: Interviewer
  text: How much had people heard about what was going on in Vietnam at this point?
- speaker: Respondent
  text: It was on TV every night.
- speaker: Interviewer
  text: So you knew what waiting for you.
- speaker: Respondent
  text: Right. Well, I thought we would go out and fight a battle all day, then go back to Saigon and party all night. I don't
    know why I was thinking that!
- speaker: Interviewer
  text: Probably because you were 20!
- speaker: Respondent
  text: Yes. I thought you went out and kicked ass all day. Then you got cleaned up at night and partied in Saigon. Because
    I kind of like saw that on TV. Surprise, surprise!
- speaker: Interviewer
  text: Reality! So you got to Fort Campbell - probably about six hours?
- speaker: Respondent
  text: Yes, something like that. We got there and it was dark out. We got into the train station in Louisville, got off the
    train. And I remember this was my first time I got involved with segregation. I saw the white washrooms and the black
    washrooms, the white water fountains and the black water fountains. And I thought, what's that all about.
- speaker: Interviewer
  text: Were the guys who came down with you all white?
- speaker: Respondent
  text: They were mixed. There were more white than black, and Hispanic and everything else. So I thought what's this all
    about, even there was all the racial stuff going on in the 60's. You watch it on TV, but until you actually see it in
    real life, now you see it. Anyway, I'll always remember that in the railroad depot in Louisville. Then they herded us
    onto Greyhound buses, and from Louisville we went off to Fort Knox.
- speaker: Interviewer
  text: Were you going to Fort Knox or Fort Campbell?
- speaker: Respondent
  text: Fort Knox, Kentucky. So we were off to Fort Knox for our basic training. We got off the buses, were greeted by our
    friendly sergeant.
- speaker: Interviewer
  text: And how did he greet you?
- speaker: Respondent
  text: He greeted us, told us he would be our mother, our father - he was God. And if we needed to talk to God, that he'd
    be available. And just this is what we did and this is how we were going to change from being a civilian to being a military
    man. Everybody was treated the same. You got your clothing, where you were going to sleep; they took you to the barracks.
    Everywhere we went we either marched or we ran. And everything was at double-timed. They double-timed us to chow and gave
    us something to eat. They double-timed us to get all of our clothes. They double-timed us to where everybody went in and
    got a haircut - everybody got the same haircut. And everybody was made the same. We had college kids, we had high school
    drop-outs, we had low-lifes. We had everything. We were all together, and the Army didn't care, because we all were going
    to become soldiers. That was the important thing.
- speaker: Interviewer
  text: So you got your supplies when you got down to Fort Knox.
- speaker: Interviewer
  text: What was in your …
- speaker: Respondent
  text: We have everything from shaving devices, soap - everything you'd need. We had underwear, socks, shoes - and they tried
    to fit you; they tried. They threw you clothing and you put it on and that was it. But they did try to get small, medium,
    large or whatever. And that was it. And everybody got dressed. We had a standard which you had to meet.
- speaker: Interviewer
  text: A standard what?
- speaker: Respondent
  text: 'A standard dress code: You got dressed in your fatigues, your belt buckle was on, you had your gig-line, which was
    your button line that had to go down to meet your belt buckle. And you can see everything is still that way today.'
- speaker: Interviewer
  text: Everything had to line up.
- speaker: Respondent
  text: That's right - everything had to line up, to be precise, even in your fatigues.
- speaker: Interviewer
  text: Where did you store your stuff? Did you have a foot locker?
- speaker: Respondent
  text: We had a foot locker and a wall locker. But most of the stuff was in the foot locker.
- speaker: Interviewer
  text: Did it have to be in a certain order?
- speaker: Respondent
  text: Everything had to be in a certain order. They showed us how to make a bed. I was a head of the game there, because
    my mother showed me since I was a kid how to make a bed with the military corners and everything like that. And that's
    how I made my bed as a kid - it had to be pulled tight and everything. So I did that with no problem. I remember the sergeant
    would come through every day and look at everything. And if he saw something out of line - and he always found something
    wrong, whether it was wrong or not he always found something. I remember he'd reach up and pull the whole mattress and
    everything off the bed and throw it on the floor, and tell the people to do it over again. So for any little thing you
    had to make sure that you were all right.
- speaker: Interviewer
  text: What were the barracks like? Was it single beds?
- speaker: Respondent
  text: 'It was a World War II barracks: upstairs, downstairs. They had a furnace that was fed by coal. You had people were
    assigned to be ''firemen.'' But they didn''t put out the fire, they started the fire. It was August when we were there
    at Fort Knox. It was hot. It was two-stories. The sergeant had a talk with everybody and told us that everyone had to
    take a shower every day. He said, "You take care of it. If someone doesn''t take a shower, I expect you to take care of
    it. Here''s a scrub brush and here''s a bar of soap. Take him in there and scrub him. I don''t care if you get down to
    bone." So everybody knew if they didn''t take a shower - if they didn''t keep clean …'
- speaker: Interviewer
  text: They were going to be taken of.
- speaker: Respondent
  text: Also, to take care of any thieves - any barrack thief.
- speaker: Interviewer
  text: Were there any?
- speaker: Respondent
  text: There were! People were thrown out of the second story window.
- speaker: Interviewer
  text: What did people take?
- speaker: Respondent
  text: They would steal money from those who'd leave out their wallet. People would steal a bar of soap. So if people were
    thieves he told us to take care of them. So they just left it up to us to take care of them.
- speaker: Interviewer
  text: And you did. How many men were in your barracks?
- speaker: Respondent
  text: 'Fifty people were in a bay: 50 upstairs and 50 downstairs.'
- speaker: Interviewer
  text: Were they bunk beds?
- speaker: Respondent
  text: They were bunk beds. And everything had to be clean. We had butt cans, which were old coffee cans turned into butt
    cans.
- speaker: Interviewer
  text: For cigarettes?
- speaker: Respondent
  text: For cigarettes, but you weren't allowed to put any cigarettes in them. If you wanted to smoke you had to go outside.
    This was just one more thing to keep everybody in line. And everything had to be all lined up. You were allowed to smoke
    outside, and you had to field-strip your cigarette - open it up and strip it down, blow all the tobacco away and roll
    it up and put it in your pocket. You weren't allowed to throw it away unless you took and put it in the garbage. There
    were people who broke the rules, of course, and then we'd have to police the area, which means we had to get on our hands
    and knees and go through the grass and clean up any butts or anything on the ground - anything that was on the ground;
    chewing gum wrappers or anything it might be. We had to clean up the whole company area outside, anywhere around there,
    they had us doing that. If the sergeant came around and found something and it was 12:00 at night, he'd call out the whole
    barracks and we'd be out there cleaning.
- speaker: Interviewer
  text: So everybody paid the price.
- speaker: Respondent
  text: Everybody paid the price. But that brought everybody together and made us a unit. And that's basically how basic training
    was going. It was changing us from a civilian point of view to a military point of view.
- speaker: Interviewer
  text: Tell me what a typical day was like. What time did you get up? How were you awakened?
- speaker: Respondent
  text: Usually the sergeant would come in and throw a garbage can down the middle of the room, beat on things, tip over bunks.
    That's how he woke us up. We jumped out of bed, usually around four in the morning. They took us out for a run.
- speaker: Interviewer
  text: How much time did you have from the time he came barreling in to the time you had to be dressed?
- speaker: Respondent
  text: 'It was within minutes. You had to be going, everybody outside and ready for the run: your pants, your boots, a tee-shirt
    and your baseball cap. And he''d take us for the run. We''d do the run. I remember myself throwing up from the runs.'
- speaker: Interviewer
  text: How long would the run be?
- speaker: Respondent
  text: At least a mile. It was around the company area - the training area. And, of course, there were other companies doing
    the same thing. They'd get us out there and get us in shape. They'd tell us to drop down and do push-ups and all that
    kind of stuff.
- speaker: Interviewer
  text: So a lot of heavy physical stuff right at the beginning. They were out to break you so they could re-mold you, and
    also to get you into physical shape.
- speaker: Interviewer
  text: How long did you do the running and calisthenics? Was it before breakfast?
- speaker: Respondent
  text: We did this for about 45 minutes to an hour in the morning before we went off to breakfast. Well, we went inside and
    cleaned up the place, showered and they'd run us off to breakfast.
- speaker: Interviewer
  text: Everybody together?
- speaker: Respondent
  text: Yes, everybody together - everybody doing what you had
