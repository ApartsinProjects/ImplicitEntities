collection: ippl_library
source_url: https://ippl.info/learn-research/veterans-history
turns:
- speaker: Interviewer
  text: John, when you went to the service the first time, where were you living? What was your life like at that time?
- speaker: Respondent
  text: I lived in Chicago and I worked as an assistant theater manager at that time.
- speaker: Interviewer
  text: Were you living at home with your parents? Were you on your own?
- speaker: Respondent
  text: I was living at home with my parents.
- speaker: Interviewer
  text: Were you in school at all, or a full time manager?
- speaker: Respondent
  text: I was a full time theater manager.
- speaker: Interviewer
  text: When did you go into the service? How old were you?
- speaker: Respondent
  text: It was 1941. I was drafted.
- speaker: Interviewer
  text: You were drafted in 1941. You were 25 years old - you were an old man going in (both chuckle)!
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: When you were drafted, did you have any choice as to what branch you were going into, or was it automatically into
    the Army?
- speaker: Respondent
  text: There was no choice.
- speaker: Interviewer
  text: Where were you inducted, and what were your first days like? What do you remember from that time?
- speaker: Respondent
  text: I went for basic training to Camp Pickett, Virginia. It was 16 weeks, but I'm not sure.
- speaker: Interviewer
  text: What did you do during that time? What do you remember?
- speaker: Respondent
  text: I was in all the getting together of learning the basic military, of course. Everybody got it, so it worked out just
    fine.
- speaker: Interviewer
  text: You were one of the older men in your unit. How did the younger guys react to that? Did they get along with you? Did
    they tease you about it?
- speaker: Respondent
  text: We got along well. There was no teasing. It was never an issue. We were all draftees. We all did the same thing.
- speaker: Interviewer
  text: What was your first introduction to Army life when you were inducted? You went down and got a physical? You got all
    your new clothes? What do you remember them telling you?
- speaker: Respondent
  text: We all got our uniforms. We went through the basic training. Everybody got the same thing - the same treatment. There
    was no problem.
- speaker: Interviewer
  text: Do you remember your Sergeant from then? Do you remember how he introduced you to military life?
- speaker: Respondent
  text: No. I remember the Sergeant's name. He was Sergeant Shaughnessy. He was a very fine young man. He put us all through
    the same maneuvering, and we all lived in the barracks.
- speaker: Interviewer
  text: What was the barracks like?
- speaker: Respondent
  text: The barracks was a two-story frame building. We were all lined up there in a row, we had our beds. We hopped up early
    in the morning. That was a change for me, because I worked in theaters and started work at noon. Here we used to get up
    at 5:30 in the morning.
- speaker: Interviewer
  text: And they woke you up gently, right (chuckles)?
- speaker: Respondent
  text: Yeah. And we went through some exercises and we were on the go all day long. It was a very active life.
- speaker: Interviewer
  text: You did calisthenics, you learned about military life, you did rifle training - arms training?
- speaker: Respondent
  text: Oh, yes. We went through the calisthenics, the same every day. It was a very, very active life.
- speaker: Interviewer
  text: Did you feel yourself getting stronger as a result of all that activity? Were you becoming more capable as a soldier?
- speaker: Respondent
  text: Yes, I think so. I put on a little weight, eating three big meals a day. I had no problem with the basic training.
- speaker: Interviewer
  text: What sort of meals did you have?
- speaker: Respondent
  text: It was very strenuous. We had eggs in the morning, meat at lunch and dinner. I don't remember anything much about
    the meals. They were okay. I had no problem with them.
- speaker: Interviewer
  text: What do you remember about any classroom training you had, or any exercises you had? Is there anything that stands
    out in your memory - any incidents that were memorable?
- speaker: Respondent
  text: No. I just can't think of anything. It was all the same military routine. There was no problem. Everybody went through
    it. It was very strenuous. But that was part of the training.
- speaker: Interviewer
  text: Did anyone ever play any jokes? Did you have fun? What did you do for entertainment?
- speaker: Respondent
  text: I can't remember any entertainment.
- speaker: Interviewer
  text: I know you don't have a lot of free time in basic, but what did you do with the little free time you had?
- speaker: Respondent
  text: I can't think of anything.
- speaker: Interviewer
  text: So your basic training lasted 16 weeks. And at the end of that basic training, what happened?
- speaker: Respondent
  text: We got reassigned for our next assignment. But I was kept there at Fort Meade. I became a part of the permanent training
    party there.
- speaker: Interviewer
  text: What was your role in the training?
- speaker: Respondent
  text: Each person was assigned to a barracks, and we'd have supervision over all the inhabitants of the barracks.
- speaker: Interviewer
  text: And what did that supervision entail?
- speaker: Respondent
  text: Just supervising the training of the new inductees that came in. They went through the same routine I went through.
    There was no problem.
- speaker: Interviewer
  text: John, you mentioned you were at Fort Meade. But you took basic at Pickett. So you were transferred?
- speaker: Respondent
  text: Thanks for bringing that up. I was retained at Fort Pickett. I didn't go to Fort Meade until I got my commission.
- speaker: Interviewer
  text: So you were at Fort Pickett and you were supervising the new inductees just as you had been.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: And your rank was?
- speaker: Respondent
  text: I was a Private then.
- speaker: Interviewer
  text: A Private First Class?
- speaker: Respondent
  text: Just a Private. I was a Private when I went to OCS - Officer Candidate School - and that was at some place in Texas.
- speaker: Interviewer
  text: You were at Fort Pickett - you said they kept you there - and you were helping with the training. How long were you
    there in that capacity?
- speaker: Respondent
  text: I think that was about six months.
- speaker: Interviewer
  text: And at the end of the six months what happened?
- speaker: Respondent
  text: I was shipped off to Officer Candidate School in Fort Barkeley, Texas.
- speaker: Interviewer
  text: Fort Barkeley. How did they select you for Officer Candidate School?
- speaker: Respondent
  text: I don't know. I guess it was a result of my work - my training in basic, and as a hold-over as part of the training
    corps at the training center.
- speaker: Interviewer
  text: Was there any sort of test you had to take, or was it simply that they liked what they saw and how you acted as a
    supervisor?
- speaker: Respondent
  text: There was nothing exceptional I accomplished. As you say, I measured up to the standards - the qualifications - for
    officer training.
- speaker: Interviewer
  text: So they sent you to Fort Barkeley, Texas. Did you have any time off between?
- speaker: Interviewer
  text: So it was straight to Fort Barkeley. How did you get to Fort Barkeley? Did you drive? Did you go by Army transportation?
- speaker: Respondent
  text: They shipped us by train.
- speaker: Interviewer
  text: There was more than just you.
- speaker: Interviewer
  text: Was this a troop train of some sort, or was this a regular passenger train that some of the men from the Army were
    on as well?
- speaker: Respondent
  text: It was a troop train.
- speaker: Interviewer
  text: How long did the trip take you? Do you remember?
- speaker: Respondent
  text: Just a couple of days.
- speaker: Interviewer
  text: What did you do on the train for those couple of days?
- speaker: Respondent
  text: Just sat there - couldn't do much, I'll tell you!
- speaker: Interviewer
  text: So you learned something in the Army! (Both chuckle) Did you read? Were there people playing card games? What did
    you do for lunch? You lived for three days on the train - what did you do for those three days?
- speaker: Respondent
  text: We didn't do anything. It was all troops. We weren't travelers. It was a troop train, so you did what those in charge
    told us to do. You just sat there on the train. That's all.
- speaker: Interviewer
  text: So you got to Texas - Fort Barkeley. Did they take you by bus to the base?
- speaker: Respondent
  text: Yes, we went by bus.
- speaker: Interviewer
  text: And when you got there, what happened?
- speaker: Respondent
  text: I forget the length of training, but I think it was very common - I think it was thirteen weeks for officer training.
- speaker: Interviewer
  text: What did they teach you in Officer Candidate School?
- speaker: Respondent
  text: They taught us what our responsibilities would be, what action we would take. It was basic officer training. I just
    can't remember any more. It was certain responsibilities for what we would be charged with. It was always high caliber;
    high level - do what you're supposed to do with a responsible measure.
- speaker: Interviewer
  text: Was your training all in a classroom situation?
- speaker: Respondent
  text: There was a lot of field work - staying out for a few nights. Everything you would be doing as a military man.
- speaker: Interviewer
  text: Did you take turns leading the group so you could get experience leading the group and making decisions in the field
    exercises; or was there someone always in charge of you?
- speaker: Respondent
  text: There was always someone in charge - always.
- speaker: Interviewer
  text: Where is Fort Barkeley, John? Is it near some big city in Texas?
- speaker: Respondent
  text: I'm trying to think of the name of the city it was near, but I can't think of it.
- speaker: Interviewer
  text: Do you remember what part of the state - the eastern, western or southern?
- speaker: Respondent
  text: It will come back to me some time, but I just can't remember it now. It will come back before I mail these letters
    to you, I'm sure.
- speaker: Interviewer
  text: So it was thirteen weeks of officer candidate school, where you had a lot of field work; exercises learning how the
    military leads. And at the end of those thirteen weeks you had a graduation of some sort?
- speaker: Interviewer
  text: What was the graduation like?
- speaker: Respondent
  text: It was just a mass kind of a thing where we were told what we were, where we were going.
- speaker: Interviewer
  text: And what was your rank when you finished Officer Candidate School?
- speaker: Respondent
  text: It was Second Lieutenant. We all became the same rank.
- speaker: Interviewer
  text: So as a newly minted Second Lieutenant, what was your first assignment? Where were you sent?
- speaker: Respondent
  text: Did I mention earlier …
- speaker: Interviewer
  text: Was that Fort Meade?
- speaker: Respondent
  text: Fort Meade.
- speaker: Interviewer
  text: What were your responsibilities at Fort Meade? Do you remember the type of groups you led?
- speaker: Respondent
  text: I think I stayed at Fort Barkeley and became part of the training group.
- speaker: Interviewer
  text: So you stayed at Fort Barkeley like you had stayed at Fort Pickett.
- speaker: Interviewer
  text: So you became part of the training there.
- speaker: Respondent
  text: Yes, part of the training for the Officer Candidate School. It was not basic training.
- speaker: Interviewer
  text: You must have had good training skills since they kept keeping you on board after you finished something so that you
    could help.
- speaker: Respondent
  text: I don't know about that, but I guess it helped and it worked out that way.
- speaker: Interviewer
  text: So you were a Second Lieutenant and you had been in the Army how long at this point - six months?
- speaker: Respondent
  text: Yes, approximately.
- speaker: Interviewer
  text: So you were 25 and you had been in about six months. Did you have an opportunity to communicate with your family during
    this time?
- speaker: Respondent
  text: Just by writing. That was the only form of communication.
- speaker: Interviewer
  text: Did you get any chance - like for a furlough - did you get to go home?
- speaker: Respondent
  text: I think after we got our commission I got a furlough and went home.
- speaker: Interviewer
  text: So for a week or two weeks?
- speaker: Respondent
  text: Two weeks, no longer than that.
- speaker: Interviewer
  text: Home was back here, so you had to get back here to Chicago and go back when your furlough was over. I didn't ask you
    this before, but had any members of your family been in the military, or was this something new to them?
- speaker: Respondent
  text: My brother was in. He did not get a commission, but he had a full term until the war was over like I did.
- speaker: Interviewer
  text: He was also in the Army?
- speaker: Respondent
  text: Yes, he was also in the Army.
- speaker: Interviewer
  text: So you had your furlough, you went back to Camp Barkeley and you helped with the training. How long do you think you
    were there?
- speaker: Respondent
  text: I was there until I went overseas.
- speaker: Interviewer
  text: When you got the orders to go overseas, where were you headed?
- speaker: Respondent
  text: Three or four months after I got out of OCS, after I got my commission, I was shipped to North Africa, in the Algiers
    area. After there I was there about six or eight months I was shipped to Italy.
- speaker: Interviewer
  text: So they sent you from Camp Barkeley. Did you go to the east coast to go to Africa?
- speaker: Interviewer
  text: By troop train?
- speaker: Interviewer
  text: And you all knew you were going to Africa, which meant you were getting closer to being involved in the fighting on
    the European front.
- speaker: Interviewer
  text: When you went across did you go on a Navy ship? I know there were some cruise ships that had been converted. What
    was the ship that you went on?
- speaker: Respondent
  text: I went on a ship that had been converted. Yes, it was all troops.
- speaker: Interviewer
  text: Do you remember the name of the ship?
- speaker: Interviewer
  text: Do you know about how many men were aboard the ship?
- speaker: Respondent
  text: No, but certainly a couple of hundred.
- speaker: Interviewer
  text: What was the mood like on the ship - the mood of the men?
- speaker: Respondent
  text: It was okay. We were all wondering where we were going to go. They didn't tell us that. I remember going through the
    Straights of Gibraltar, and that was a very narrow area. You had Europe on one side and Africa on the other. Thank God
    there was no German outpost there, because as I say, it was very narrow. It was nice to get through there and into the
    Mediterranean. We got out at a place called Bizerte, but I'm sure it has a different name now. It was at the far end of
    North Africa.
- speaker: Interviewer
  text: When you came across, how long did it take you on the ship - do you remember?
- speaker: Respondent
  text: Yes. It took fourteen days. I remember that.
- speaker: Interviewer
  text: Did you have any special precautions or things to take, since you were going toward Europe, to avoid German submarines?
    Were the ships sailing like a zig-zag pattern, or did they do anything you were aware of?
- speaker: Respondent
  text: I don't recall.
- speaker: Interviewer
  text: What were your sleeping arrangements like? Were you a couple of men per cabin? I know on the Navy ships they had the
    hammocks. Is that what you had?
- speaker: Respondent
  text: That was what we had.
- speaker: Interviewer
  text: You had the rows of hammocks that you hung in.
- speaker: Respondent
  text: Yes, upper and lower.
- speaker: Interviewer
  text: Were you upper or lower?
- speaker: Respondent
  text: I was upper.
- speaker: Interviewer
  text: Was it a smooth sail?
- speaker: Respondent
  text: Yes. Everybody had a berth - there was no private room or anything like that (chuckles).
- speaker: Interviewer
  text: Had you been on a ship before?
- speaker: Interviewer
  text: So this is your first experience.
- speaker: Interviewer
  text: What did you think of your first experience?
- speaker: Respondent
  text: I didn't think anything of it, because we were all the same and just wanted to know where we were going. There was
    no attack or anything during the trip going overseas.
- speaker: Interviewer
  text: How did you pass time for your two weeks? Did you have training drills or did they let you do basically whatever you
    chose - just eat your meals?
- speaker: Respondent
  text: We had a little training and a little indoctrination on the way, but not much. We were pretty much left to just stand
    around.
- speaker: Interviewer
  text: So you were left to entertain yourselves a little bit.
- speaker: Respondent
  text: Yes, that's right.
- speaker: Interviewer
  text: And how did you entertain yourselves?
- speaker: Respondent
  text: Just looked overboard and stared at the rails. I didn't do anything.
- speaker: Interviewer
  text: Were there any card games? Did you read?
- speaker: Respondent
  text: No. We may have had some drills - I think we had a couple of drill sessions a day, each day. But other than that we
    all just sat around.
- speaker: Interviewer
  text: When you got to North Africa - first of all, did your family know where you were headed?
- speaker: Interviewer
  text: They just knew that you had left the country.
- speaker: Respondent
  text: Yes, that's right. When we got there I wrote back. We all did that.
- speaker: Interviewer
  text: When you landed you wrote back. Were you able to tell them where you were?
- speaker: Interviewer
  text: When you got to North Africa, what were your responsibilities going to be as a Second Lieutenant? What type of group
    were you in charge of?
- speaker: Respondent
  text: I wasn't in charge of anything. They set us up there in a military medical facility. It wasn't a hospital. It was
    like an examination facility. You could get checked out there for whatever reasons. When I got to Italy, I was a part
    of a military medical facility of officers - field officers. I worked under a Major there. I did whatever the command
    of the area determined. I can't remember anything outstanding that we did.
- speaker: Interviewer
  text: So you were in North Africa for how long before going on to Italy?
- speaker: Respondent
  text: Just three months.
- speaker: Interviewer
  text: How did you get put into this medical area? It seems like that's where you spent your time? How
