collection: ippl_library
source_url: https://ippl.info/learn-research/veterans-history
turns:
- speaker: Interviewer
  text: So, Rutch, where were you living before you entered the service? What was your life like just before then? How old
    were you?
- speaker: Respondent
  text: I was in LaGrange and had just finished high school. I knew I was going into the service in the fall, so that summer
    I didn't do much of anything with some of my other boyfriends. So I went into the service with two of my high school teammates.
- speaker: Interviewer
  text: So you were 18 at the time?
- speaker: Interviewer
  text: And you enlisted.
- speaker: Respondent
  text: I was drafted.
- speaker: Interviewer
  text: You were drafted while you were still in high school?
- speaker: Interviewer
  text: Had anybody in your family been in the service before?
- speaker: Respondent
  text: My immediate family? No.
- speaker: Interviewer
  text: So what was their feeling when you got your draft notice?
- speaker: Respondent
  text: Well, it was expected.
- speaker: Interviewer
  text: They were probably worried for you.
- speaker: Respondent
  text: They probably were, but I didn't hear about it really. My dad was on the draft board!
- speaker: Interviewer
  text: And you were drafted anyway! So you graduated high school in June.
- speaker: Respondent
  text: Yes. And I went into the service in September.
- speaker: Interviewer
  text: Which branch of the service? Did you go into the Army?
- speaker: Interviewer
  text: And where were you inducted?
- speaker: Respondent
  text: Fort Sheridan.
- speaker: Interviewer
  text: Right in Chicago.
- speaker: Interviewer
  text: What were those first days like when you were inducted? What was the process like?
- speaker: Respondent
  text: It was just mainly medical interviews and testing. That's what I remember.
- speaker: Interviewer
  text: Were a lot of guys being tested?
- speaker: Interviewer
  text: Tell us, was it a big room?
- speaker: Respondent
  text: It was a big room and a lot of men, yes.
- speaker: Interviewer
  text: Lots of lines?
- speaker: Interviewer
  text: You didn't have far to go for your induction.
- speaker: Respondent
  text: I went with two of my teammates.
- speaker: Interviewer
  text: High school friends?
- speaker: Respondent
  text: Yes. They were teammates from my baseball team. That helped a lot.
- speaker: Interviewer
  text: It gave you a little extra courage?
- speaker: Respondent
  text: Yes. We supported each other.
- speaker: Interviewer
  text: So all three of you ended up going into the Army. So you got your supplies. You got your medical exam, your shots.
    What kind of testing did they do?
- speaker: Respondent
  text: I have no idea.
- speaker: Interviewer
  text: Was it medical testing?
- speaker: Respondent
  text: Yes, it was just medical testing. It was just medical that I remember.
- speaker: Interviewer
  text: And obviously you passed.
- speaker: Respondent
  text: '[Shirley adds: You wanted to go into the Navy, didn''t you? But you were color blind, so you had to go to the Army.]
    The Army didn''t care, but the Navy did. And that was because of the signal flags, right? You had to be able to see the
    colors.'
- speaker: Interviewer
  text: So you were in Fort Sheridan for your induction. Where were you sent for your basic training?
- speaker: Respondent
  text: I went to Arkansas, near Little Rock. I forget the name.
- speaker: Interviewer
  text: How did you get there?
- speaker: Interviewer
  text: Was it a troop train or a passenger train that were you on?
- speaker: Respondent
  text: Troop train.
- speaker: Interviewer
  text: So everybody on there was going.
- speaker: Interviewer
  text: How long did it take you to get to Little Rock?
- speaker: Respondent
  text: Probably a day, a day-and-a-half. I don't know.
- speaker: Interviewer
  text: What did you do on the train?
- speaker: Interviewer
  text: Did you play cards or read?
- speaker: Respondent
  text: Just talked, mainly.
- speaker: Interviewer
  text: Your two buddies were on the train with you?
- speaker: Interviewer
  text: Anybody else you knew?
- speaker: Interviewer
  text: So the three of you kind of hung together.
- speaker: Interviewer
  text: So you got to Arkansas, the camp near Little Rock. I can't remember the name either right now.
- speaker: Respondent
  text: Well, I can look it up in a book if you want.
- speaker: Interviewer
  text: So you got there. And how did you get from the train to the camp? Or did the train go right into the camp?
- speaker: Respondent
  text: No, I think there were trucks that took us to the camp as I remember.
- speaker: Interviewer
  text: While you were on the train were there any sergeants or anyone like that talking to you?
- speaker: Respondent
  text: I don't remember that that was true, no.
- speaker: Interviewer
  text: So you got to the camp. You got onto the trucks. How far did you have to go to the camp? Was it just a short ride?
- speaker: Respondent
  text: It could have been as much as twenty miles.
- speaker: Interviewer
  text: How were you received at the camp? What happened when you got there?
- speaker: Respondent
  text: I don't remember too much about that. It was just to go through, get your Army uniform, clothes, your combat boots
    and were assigned to a barracks.
- speaker: Interviewer
  text: Do you remember what your barracks looked like?
- speaker: Respondent
  text: It was a typical barren barracks.
- speaker: Interviewer
  text: Rows of bunk beds, and rows and rows of bunks?
- speaker: Respondent
  text: No, I think they were just one.
- speaker: Interviewer
  text: Single beds?
- speaker: Respondent
  text: Yes. That's what I remember it was.
- speaker: Interviewer
  text: Do you remember about how many men?
- speaker: Respondent
  text: Maybe thirty.
- speaker: Interviewer
  text: Where did you store your stuff?
- speaker: Respondent
  text: They had a locker in front of your bed.
- speaker: Interviewer
  text: Like a foot locker?
- speaker: Respondent
  text: Yes. That was it as far as I remember.
- speaker: Interviewer
  text: So you got there, you stored your stuff. Tell me what a typical day was like. When were you awakened and how were
    you awakened?
- speaker: Respondent
  text: 'We were awakened early for field exercise every morning. Then we went to eat, and then we had training after that
    - different types of training: marching and other things such as that.'
- speaker: Interviewer
  text: So you were awakened by somebody coming in and letting you know it was time to get up.
- speaker: Respondent
  text: Well, the sergeant would come in and blast his voice.
- speaker: Interviewer
  text: He didn't gently wake you! So the sergeant would come in and tell you to get out of bed. How much time did you have
    to get up and get ready?
- speaker: Respondent
  text: I don't remember. It depended on how fast you got up. You had to go to the washroom and shave and whatever.
- speaker: Interviewer
  text: Were there inspections in your barracks?
- speaker: Respondent
  text: Yes, quite often. They were very particular about that.
- speaker: Interviewer
  text: And what were they particular about?
- speaker: Respondent
  text: Your bed blanket had to be so tight that if you dropped a quarter on it, it would bounce.
- speaker: Interviewer
  text: And if it didn't bounce?
- speaker: Respondent
  text: You had to do it over.
- speaker: Interviewer
  text: Did you go to breakfast together? Did you exercise before breakfast?
- speaker: Respondent
  text: We exercised before breakfast.
- speaker: Interviewer
  text: And what kind of exercise did you do?
- speaker: Respondent
  text: With the rifle we had to run in place.
- speaker: Interviewer
  text: Calisthenics.
- speaker: Respondent
  text: Yes, calisthenics - we had to do that, too.
- speaker: Interviewer
  text: So you did calisthenics and then went to breakfast.
- speaker: Interviewer
  text: Did you go to breakfast as a group?
- speaker: Interviewer
  text: What kind of breakfast did you have? Was the food good?
- speaker: Respondent
  text: I don't remember that too much. There usually wasn't enough. There was always a battle over the milk - a pitcher of
    milk or a bottle. And then we all sat around a table when we all got there. And we had to pass around the milk for your
    cereal. You tried to be careful so you didn't take it all. You wanted to be sure everybody had some.
- speaker: Respondent
  text: '[Shirley adds: And that''s all you got?]'
- speaker: Respondent
  text: Well, I don't remember. I just remember the milk thing.
- speaker: Interviewer
  text: So you had cereal. Were there eggs and that sort of thing?
- speaker: Interviewer
  text: Could you get as much as you wanted?
- speaker: Interviewer
  text: Was it one time through?
- speaker: Interviewer
  text: Did they just automatically put the food on your plate, or did you tell them what you wanted?
- speaker: Respondent
  text: No, they put it on automatically.
- speaker: Interviewer
  text: So you basically got a tray, and a "Here's your food for breakfast."
- speaker: Interviewer
  text: Do you remember how long you had for breakfast?
- speaker: Respondent
  text: No. Probably about a half-hour.
- speaker: Interviewer
  text: And after breakfast, then what?
- speaker: Respondent
  text: Well, I don't remember if I went back to my barracks and then from there we would reform and go out and do our training.
    And I remember very little about that. The only time I remember was when they took us out to a barren place and had us
    dig a foxhole. They wanted to make sure you dug it deep enough, and then they'd run a tank over the top of it.
- speaker: Interviewer
  text: So it better be deep enough!
- speaker: Respondent
  text: '[Shirley adds: You were in it?]'
- speaker: Interviewer
  text: So they gave you very practical skills.
- speaker: Respondent
  text: Yes. And another one was going underneath a barbed wire and they shot bullets over the top of you.
- speaker: Interviewer
  text: It was live ammo.
- speaker: Interviewer
  text: Did anyone get hurt?
- speaker: Respondent
  text: I don't remember.
- speaker: Interviewer
  text: So they were giving you very practical skills. Now, having a tank drive over you and having the barbed wire with live
    ammo made the war seem a lot closer. What do you remember talking with your buddies about?
- speaker: Respondent
  text: I don't remember talking to them too much about that. We just took it for granted, I think.
- speaker: Interviewer
  text: Had you handled a gun or rifle before you went in the service?
- speaker: Respondent
  text: No, just a bb gun.
- speaker: Interviewer
  text: So you had a bb gun. So you had to take classes in shooting.
- speaker: Respondent
  text: Yes. I won a sharp-shooting medal.
- speaker: Interviewer
  text: Do you remember what kind of gun you had?
- speaker: Respondent
  text: It was an M1 - the regular Army rifle, whatever it was.
- speaker: Interviewer
  text: Did you have classroom work also?
- speaker: Respondent
  text: I don't remember, but we probably did - how to take it apart and clean it and things like that; how to maintain it.
- speaker: Interviewer
  text: Did you keep it at your side at all times?
- speaker: Respondent
  text: Most of the time.
- speaker: Interviewer
  text: How long was your base camp?
- speaker: Respondent
  text: Seventeen weeks.
- speaker: Interviewer
  text: Seventeen weeks of learning all the basic things you'd need.
- speaker: Respondent
  text: One time they had a race for anybody who wanted to be involved in a 3 mile race - I forget if it was three or five
    miles. I didn't win, but I won a $25 war bond!
- speaker: Interviewer
  text: Well, that was something. Did you have any free time?
- speaker: Respondent
  text: Not a whole lot. I know one time on a weekend we went into the city, Little Rock, on a Sunday and went to church there
    - two guys. We probably went around, got something to eat and took the bus back to camp. We had the day off.
- speaker: Interviewer
  text: Were you able to contact your family and friends back home?
- speaker: Respondent
  text: We just wrote letters. I don't remember calling on the phone or anything.
- speaker: Interviewer
  text: While you were in base camp, boot camp, were you able to get packages from home?
- speaker: Respondent
  text: I don't remember getting any packages.
- speaker: Interviewer
  text: So your seventeen weeks were all these specific skills. And you said you won a sharp-shooter medal. Any other awards?
- speaker: Respondent
  text: Not that I know of.
- speaker: Interviewer
  text: So when those seventeen weeks were up you had some sort of graduation?
- speaker: Respondent
  text: Yes - a 25 mile hike, all night long! That was the last day. And just before that I had trouble with my boots. So
    I went to the commissary and got some new boots.
- speaker: Respondent
  text: Just before that.
- speaker: Respondent
  text: Big, big mistake! Because the boots were not broken in. So, on the 25 mile hike one of them started rubbing on the
    back of my leg. It was very, very painful rubbing on the back of my leg. But I made it through. That was the last day.
- speaker: Interviewer
  text: When you finished boot camp did you get any leave?
- speaker: Respondent
  text: Yes. We went home for two weeks.
- speaker: Interviewer
  text: How was the reception at home from your friends and family?
- speaker: Respondent
  text: They were probably happy to see us.
- speaker: Interviewer
  text: How did you get home from Little Rock?
- speaker: Interviewer
  text: Troop train again?
- speaker: Respondent
  text: I don't know if it was a troop train or regular train. I'm not sure which.
- speaker: Interviewer
  text: So you got home and relaxed a little bit. Then where did you go?
- speaker: Respondent
  text: Got on another train with my two buddies and we went to San Francisco, California. That was not a troop train. It
    was a regular train. It was a long ride.
- speaker: Interviewer
  text: A couple of days?
- speaker: Respondent
  text: Yes. And when we got to San Francisco we went to a resort on the Pacific Ocean - some resort that was being used by
    the Army to oversee the men who were going through. We were only there a few days - maybe five days at the most. Then
    one of the friends with me, Jim and, went on a train going to Portland, Oregon. The other fellow went on a different route
    and ended up in the Philippines, and ended up involved in a battle in the Philippines.
- speaker: Interviewer
  text: So you were just a few days in San Francisco, then went up to Portland. Do you remember the camp in Portland?
- speaker: Respondent
  text: No. We were just a couple of days there.
- speaker: Interviewer
  text: Then you were ready to ship out.
- speaker: Respondent
  text: We got on an old Javanese ship crew. The conditions were not very good. And the minute we got out to sea with the
    waves I got seasick.
- speaker: Interviewer
  text: Do you remember the name of this boat?
- speaker: Respondent
  text: I didn't want to remember that!
- speaker: Interviewer
  text: Was this the first time you were on a ship?
- speaker: Interviewer
  text: I'm guessing you were not the only one to get sick.
- speaker: Respondent
  text: No, there were a few. Because there are rough waters right off of Portland in the ocean, as soon as you got out of
    the river. And then the winter storms.
- speaker: Interviewer
  text: This was winter?
- speaker: Respondent
  text: Yes. By the time we got there it was February or March - somewhere in there.
- speaker: Interviewer
  text: So you had already gone through the Christmas holidays. And in February the ocean can get kind of rough. Do you remember
    about how many men were on the boat?
- speaker: Respondent
  text: No, but I'd guess 1,500 maybe.
- speaker: Interviewer
  text: Did your family have any idea where you were going?
- speaker: Interviewer
  text: And you were not allowed to tell them where you were going. Did they know you'd left the States?
- speaker: Interviewer
  text: So the last they knew, you had headed to San Francisco?
- speaker: Respondent
  text: I wrote something from San Francisco.
- speaker: Interviewer
  text: And that was it.
- speaker: Interviewer
  text: So you shipped out, and from Portland where did you stop?
- speaker: Respondent
  text: Hawaii - Oahu.
- speaker: Interviewer
  text: And how long were you there?
- speaker: Interviewer
  text: What did you do in Oahu?
- speaker: Respondent
  text: We enjoyed the nice weather during the winter from back home!
- speaker: Interviewer
  text: You probably welcomed it after that rough voyage!
- speaker: Respondent
  text: We had more training there - jungle training and landing craft training; things like that.
- speaker: Interviewer
  text: So how to get on and off the landing craft?
- speaker: Interviewer
  text: What did the jungle training consist of?
- speaker: Respondent
  text: I don't remember what the jungle training was. But the landing crafts were very painful. We'd get on a landing craft,
    go out in the ocean a couple of miles or so, then turn around and come back. And it was wavy. And by the time I got to
    shore I was so seasick I just stumbled out of the landing craft, laid on the sand to recover. And they said, "Get back
    in." And we'd get in, go out and do it all over again. We did that three or four or five times - I don't know how many
    times - for a couple of days.
- speaker: Interviewer
  text: To make sure you could do it.
- speaker: Respondent
  text: That was nothing new for people to go out and get seasick on those flat-bottomed boats.
- speaker: Interviewer
  text: So you were with your full pack and everything, get off the landing craft, head for the shore and then turn around
    and do it again.
- speaker: Interviewer
  text: Was your one buddy still with you?
- speaker: Interviewer
  text: Were you assigned to the same unit?
- speaker: Respondent
  text: There weren't any assignments there. It was still a group for work. We weren't assigned to anything. That didn't happen
    until I got to Okinawa.
- speaker: Interviewer
  text: What were your living conditions like in Hawaii?
- speaker: Respondent
  text: We had barracks there near the air field. They were nice barracks.
- speaker: Interviewer
  text: Kind of like the ones you had …
- speaker: Respondent
  text: No, better than that.
- speaker: Interviewer
  text: What was different about it?
- speaker: Respondent
  text: It was more permanent buildings.
- speaker: Interviewer
  text: You got to enjoy some of the local food?
- speaker: Respondent
  text: I think we got one pass. I remember we went to Honolulu with a couple guys. I got a haircut. It was the first time
    I got a haircut from a Hawaiian girl. It was a big deal!
- speaker: Interviewer
  text: Let's see. You were in the Army. How much hair did you have to cut?
- speaker: Respondent
  text: I don't know, but I did.
- speaker: Interviewer
  text: Did you have any downtime - any recreational time - while you were there?
- speaker: Respondent
  text: I don't remember if I did.
- speaker: Interviewer
  text: So you were there for about a month and then shipped out to Okinawa.
- speaker: Respondent
  text: Yes, eventually.
- speaker: Interviewer
  text: Where did you go from Hawaii?
- speaker: Respondent
  text: We got on a ship and stopped at Eniwetok. It's an island in the middle of the Pacific. We were able to get off the
    ship and go to the beach and swim and things for a few days. And more ships arrived until we had maybe eight ships. Then
    a couple of destroyer escorts came and we had a small convoy. We left and farther southwest to the island of Saipan.
- speaker: Interviewer
  text: When you left Hawaii, you knew you were headed into combat.
- speaker: Interviewer
  text: What was the mood like on the ship? Was it quiet?
- speaker: Respondent
  text: No, no. The ship to Saipan was like riding on a cruise ship. The water was calm and you lived daily. You had two meals
    a day. You could go out on deck and take a sunbath.
- speaker: Interviewer
  text: Just kind of relax a little bit.
- speaker: Respondent
  text: Yes. One interesting experience on the ship, about 15 of us were sitting on the front of the ship and could see something
    in the water. We couldn't spot what it was, but it got bigger as we got closer. Pretty soon we could see it wa
