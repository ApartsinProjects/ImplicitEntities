turns:
- speaker: Interviewer
  text: Mr. Hemzy, how would you preferred to be addressed during this interview?
- speaker: Respondent
  text: Just call me Ed, that'll be fine.
- speaker: Interviewer
  text: Thank you, Ed. And before we went on record, going through your documents, I noticed on your discharge papers and
    on your immunization record that you served in the military under a different name. What is that name?
- speaker: Respondent
  text: The name, the Czech pronunciation is Hemzacek, it's pronounced Hemzācheck and Hem'zacheck, but those are variations
    and then…
- speaker: Interviewer
  text: How's that spelled?
- speaker: Respondent
  text: H-E-M-Z-A-C-E-K.
- speaker: Interviewer
  text: O.K. And we'll want to make sure that the record reflects that so that the Library of Congress can cross reference
    it to the name you used today and also to your service records.
- speaker: Respondent
  text: Just quickly, how did you happen to have your name changed?
- speaker: Respondent
  text: Well after I was married to my wife, Eleanor, of 58 years, we had two daughters, and we thought that the name was
    kind of a long handle to carry through life, and so I talked to my Dad about changing the name and shortening it to Hemzy,
    and he had no problem with it. He thought about doing it himself but said he's too late in years to do it. So, my wife
    Ellie and I engaged a lawyer, went down to see Judge Miner in Circuit Court, and we had the name changed from Hemzacek
    to Hemzy.
- speaker: Interviewer
  text: You did mention this to me off record before the interview. You mentioned that your son has changed his name …
- speaker: Respondent
  text: He's changed it back to the full family name, and I told him his grandfather was smiling from his grave. (Laughing.)
    Yes, that's our son, Wayne Hemzacek, and he now has a son, Noah, who's going to carry the family name even further.
- speaker: Interviewer
  text: Well, getting into your military story, Ed, when did you enter the service?
- speaker: Respondent
  text: I entered the service in August of 1944.
- speaker: Interviewer
  text: August, 1944. Where were you living at that time?
- speaker: Respondent
  text: I was living on the Southwest side of Chicago at 5133 South Whipple Street.
- speaker: Interviewer
  text: And that was the Southwestern part of the city?
- speaker: Respondent
  text: Yes. Right.
- speaker: Interviewer
  text: And what were you doing before you entered the military?
- speaker: Respondent
  text: I had finished my degree at Illinois Institute of Technology in Mechanical Engineering, and I was working at Bendix
    Aviation in South Bend, Indiana.
- speaker: Interviewer
  text: I'll be darned. (explains off record after interview that the soldier that General Patton slapped ended up working
    there after the war).
- speaker: Respondent
  text: And I was in the carburetor division with Bendix.
- speaker: Interviewer
  text: Were you, let's see, how old were you at the time then, about 22?
- speaker: Respondent
  text: 22, right, in 1944. Well, actually, I turned 21 while I was working at Bendix and turned 22 the year I was inducted.
- speaker: Interviewer
  text: Ed, were you drafted or did you enlist?
- speaker: Respondent
  text: I was drafted.
- speaker: Interviewer
  text: And you went into the Army?
- speaker: Respondent
  text: Yes. That's an interesting story, too, if I can just digress for a moment, Marty.
- speaker: Interviewer
  text: Sure, please do.
- speaker: Respondent
  text: When I went down to the induction center on Van Buren Street, they ask you what service do you want to be in, and
    I said, "Navy." So, the guy puts down Navy, Navy, stamped it all over my papers when I got to the desk of the guy who
    was gonna make my branch of service, he looked down at some kind of list and said, "Sorry, we don't have any openings
    for you." And so he just overstamped it with Army, so I wound up going into the Army.
- speaker: Interviewer
  text: The gentleman who did that to you, was he wearing a uniform?
- speaker: Interviewer
  text: Which branch?
- speaker: Respondent
  text: He was Army if I remember right.
- speaker: Interviewer
  text: What a surprise. (Laughter) So, you were inducted. What happened next?
- speaker: Respondent
  text: From there I went to Fort Sheridan and …
- speaker: Interviewer
  text: Immediately?
- speaker: Respondent
  text: Yes. We were put on a bus and shipped out to Fort Sheridan, and we spent just enough time there to get our hair cut
    and GI issue of clothing, and then we were put on a train, and I don't remember the time period, but it was a couple of
    days, maybe. And headed down, never telling us where we were going, and we finally wound up at Camp Fannin, Texas. It
    was located between Tyler and Kilgore, Texas.
- speaker: Interviewer
  text: How do you spell Fannin?
- speaker: Respondent
  text: F-A-N-N-I-N.
- speaker: Interviewer
  text: Thank you. And what did you do at Camp Fannin?
- speaker: Respondent
  text: That was basic training in the infantry, and I spent, what was it, I don't know, 13, 16 weeks. At any rate while I
    was down in Camp Fannin, after the basic training, during which I even applied for OCS, which is Officers Candidate School,
    and also for ASTP which is Army Specialized Training Program.
- speaker: Interviewer
  text: You applied for this while you were at Camp Fannin?
- speaker: Interviewer
  text: While you were at Camp Fannin, now, this is Boot Camp, was this your first time away from home for any length of time?
- speaker: Respondent
  text: No. I had spent my summers out in Iowa on a farm with a family who were friends. It's a long story, but anyhow, I
    spent my summers out there living and working on the farm and really appreciating getting to know what rural life was
    all about. And so, I spent the time for oh, probably, maybe four summers out in Iowa while I was in high school.
- speaker: Interviewer
  text: So your background before going into the service wasn't one where you'd never strayed from home …?
- speaker: Respondent
  text: Yes, right.
- speaker: Interviewer
  text: Or never been away from home? And you did have a degree in Mechanical Engineering at IIT. Was that a Bachelor's Degree?
- speaker: Interviewer
  text: O.K. So now you're in Boot Camp with people from all walks of life. What was Boot Camp like for you?
- speaker: Respondent
  text: Boot Camp was really interesting 'cause I'd been in the ROTC in high school, so I spent three years under Sergeant
    Moore in Tilden Tech and did get an idea of what military could be in some ways, very briefly, anyhow. And so the training
    was, of course, Army training which a little lot deeper and, of course, we eventually wound up on bivouac and field exercises
    in our last two weeks. And it was there that I got my orders to report to Ohio State University for this ASTP Program.
- speaker: Interviewer
  text: Now you said that you'd applied for both OSC and the ASTP. Would, did you have to make a choice between those two,
    or did they make it for you?
- speaker: Respondent
  text: They made it for me, because actually my orders were cut to go to ASTP and then as soon as I got back to base, the
    clerk of the company there said, "Oh, by the way, your orders came through for OCS today, but you're already going to
    ASTP." So that's the way it goes; they have a pecking order.
- speaker: Interviewer
  text: So, anything else you want to tell me about Boot Camp before we move on to ASTP?
- speaker: Respondent
  text: I met some real interesting people down in Boot Camp with, of course, people from all over the country. And, one guy,
    Obie, I remember just his first name. But Obie had a "pet dog," and he was bucking for a Section 8, and interestingly
    enough, he did get it. I heard that he had gotten his Section 8 before I left the camp. And he had this "pet dog" that
    he always took care of all day long and into the night and so forth. That was an interesting guy. He would keep this imaginary
    dog in his footlocker and talk to it while he was in barracks.
- speaker: Interviewer
  text: Did it seem like he was deliberately trying to get a Section 8?
- speaker: Respondent
  text: Oh, yeah, it was definitely there. But he, he was very serious, or acted very serious about the whole thing. That
    was a kind of comical thing. Beyond that, the experiences down in Camp Fannin, I know, one of the guys joked, he says,
    it's a place where you could be up to your back side in mud and breathing dust. (Laughter)
- speaker: Interviewer
  text: At the same time! (Laughing)
- speaker: Respondent
  text: That's a funny one. And interestingly enough, all the fellas I went through basic with, I found out later on that
    they wound up in the Battle of the Bulge. So, I was a very fortunate guy in that respect that I wound up going to ASTP
    which was an engineering pool of people at Ohio State. And we took courses to refresh our skills in that regard.
- speaker: Interviewer
  text: And you say this was at Ohio State?
- speaker: Respondent
  text: Ohio State. We were bivouacked or barracked in the football stadium at Ohio State University in Columbus, Ohio.
- speaker: Interviewer
  text: So they had tents pitched out on the …?
- speaker: Respondent
  text: No. We were right in the, in the stadium. They put bunks in the stadium back in underneath the seats. They had quarters
    in there. And so that's where we were living while we were at Ohio State.
- speaker: Interviewer
  text: During this time did they actually have football games, I mean?
- speaker: Respondent
  text: No. (Laughing) We were there at a bad time unfortunately. We were there after the football season.
- speaker: Respondent
  text: And 'cause I had finished up my basic and got into Ohio State sometime in, what, December maybe?
- speaker: Interviewer
  text: (Unintelligible)
- speaker: Respondent
  text: Yeah, I think, I know. I said sixteen weeks of basic, but maybe it was more like three months, I don't know, can't
    remember.
- speaker: Interviewer
  text: Well, what was, what was the living, what were the living conditions like there?
- speaker: Respondent
  text: At Ohio State it was like night and day between basic and Ohio State. We had a cafeteria line of absolute wonderful
    food. They had professional cooks, and the diet was great! We had choices in the morning for breakfast of about four or
    five items. It was like heaven after basic, (Laughing) believe me.
- speaker: Interviewer
  text: (Laughing) These quarters under the stands, were they…how many people to a room?
- speaker: Respondent
  text: Oh, gosh, I can't recall just, right now, Marty, how it was. We were in bunks, you know, the usual thing. And they
    were lined up, and so we probably had a whole bunch of guys in this area that we were staying in.
- speaker: Interviewer
  text: And how many day…excuse me, how many hours a day, on average, would you be in class?
- speaker: Respondent
  text: We would be in class from six to eight hours.
- speaker: Interviewer
  text: And these were refresher courses?
- speaker: Respondent
  text: Refresher Engineering courses that we took. And I forgot just exactly what the subjects were at that time, but probably
    math and physics.
- speaker: Interviewer
  text: Were any of them geared in application towards military type subjects?
- speaker: Respondent
  text: No. They were really more basic, basic courses that were much like I had in college.
- speaker: Interviewer
  text: And so, were they still specialized? I mean, were you strictly mechanical engineering oriented at OSU?
- speaker: Respondent
  text: Well we were in classes, and some of the fellas had different classes that they went through.
- speaker: Interviewer
  text: Did this result in any advanced degree for you?
- speaker: Interviewer
  text: Just refresher courses.
- speaker: Respondent
  text: Yes, it was just refresher courses.
- speaker: Interviewer
  text: And how long did that last?
- speaker: Respondent
  text: That had to have lasted until what, maybe, February of '45.
- speaker: Interviewer
  text: Anything else of particular interest about your experience there that you'd like to have put in the record?
- speaker: Respondent
  text: No. We had a lot of free time that we put to good use, lookin' around and travelling and… I had a friend that I made
    acquaintance with, and he had lived in Zanesville, Ohio, so he was well acquainted with Columbus. And so he was a good
    guy to have as a friend to get around.
- speaker: Interviewer
  text: And after ASTP, what happened next?
- speaker: Respondent
  text: Oh, after, in, after ASTP, I was one of seventy-eight people who were chosen to go to Portland, Oregon, and join the
    29th Engineers in a training program in photo mapping, photo topography, actually. And so we trained in there for probably
    three months and then, typical Army, they took twice as many people than they really needed, so thirty-nine of us were
    separated and sent to Fort Lewis, Washington.
- speaker: Interviewer
  text: So, of the seventy-eight, none were dropped out for cause?
- speaker: Interviewer
  text: They all made it through.
- speaker: Respondent
  text: We were probably classified by the time we completed the training. We took tests for our skills and ability, but that
    didn't mean that we were necessarily dropped because we didn't do well. It was just that they had to make choices.
- speaker: Interviewer
  text: Now, at Portland, was that a military base?
- speaker: Respondent
  text: No. We were in Holman School. It had been an elementary school, formerly, before we got there.
- speaker: Interviewer
  text: How do you spell that?
- speaker: Respondent
  text: Holman was H-O-L-M-A-N, to the best of my knowledge.
- speaker: Interviewer
  text: And were your instructors military?
- speaker: Interviewer
  text: Military instructors. Just for the record, what was photo topography at that time? How long had that existed as a
    science, and what did you do?
- speaker: Respondent
  text: Well, I don't know how long it existed. It was my first experience at it. And basically, what it was is, we worked
    with a little mobile platform that could be elevated and dropped, and we worked with two, with aerial photographs that
    were projected in red and green lights, and we wore red and green glasses. It then separated the different rays that were
    projected, and we could intersect that on this little table platform and get elevations out of it for drawing contours,
    for drawing any natural, man-made objects like railroads, roads, buildings, things of that type. That's the way they developed
    maps.
- speaker: Interviewer
  text: You mentioned the red and green rays. It sort of sounds like, like the forerunner of 3-D movies. Did you actually
    see in three dimension or …?
- speaker: Respondent
  text: It was three dimension.
- speaker: Interviewer
  text: Yes, but you could see the image apparently rising, or did you just have to measure the distance between the red and
    the green line?
- speaker: Respondent
  text: You could, those of us that had 3-D vision, we could visualize like the slopes of the mountains and the grades and
    so forth. But there were some fellas whose vision was such that they got an inverse. So, instead of a mountain, they saw
    a valley.
- speaker: Interviewer
  text: Valley (Laughing)
- speaker: Respondent
  text: That was kind of interesting, and besides the photo mapping of that type, we did mosaics by taking aerial photographs
    and matching them and making an aerial photograph of areas by tearing and pasting these photographs into a big collage.
    And then they would print that. So that, so that was another phase of the photo mapping that took place.
- speaker: Interviewer
  text: Well, the first technique that you mentioned, I know that existed later, and the Army started calling it Image Interpretation.
- speaker: Interviewer
  text: And it sounds like you must have been at the pioneering stage of the technique, would be my guess.
- speaker: Respondent
  text: Yes, could have been.
- speaker: Interviewer
  text: After your training at Portland, what happened next?
- speaker: Respondent
  text: Well, after, after training at Portland, and I was separated with the other 38, and we went up to Fort Lewis, Washington.
    And we were put in a, well, it was a fort, and it was barracks, and we waited our time. We had no idea what was going
    on. We were given leave at one time, and then when we got back, we had our shipping orders to go overseas. And we wound
    up going to Camp Stoneman near San Francisco which was a port of embarkation, because we were shipping out. And we wound
    up being attached to the outfit, 29th Engineers, we trained with in photo mapping and went over to Manila in a convoy.
- speaker: Interviewer
  text: And so what unit were you with when you went to Manila?
- speaker: Respondent
  text: We were attached to the 29th Engineers, but unattached. 'Cause we wound up, when we did get to Manila, going
