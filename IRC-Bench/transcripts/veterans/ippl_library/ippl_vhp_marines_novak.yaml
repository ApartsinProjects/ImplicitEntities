collection: ippl_library
source_url: https://ippl.info/learn-research/veterans-history
turns:
- speaker: Interviewer
  text: LaVergne, could you start us off with what your branch in the military was, why you decided to enlist, and that sort
    of information, and your years of service.
- speaker: Respondent
  text: I was in the Marine Corps. I enlisted August 3, 1943. I enlisted because the entire country was at war, in the middle
    of World War II. Everybody did something, either in defense plants or even saving grease for the armaments. And so, I
    chose to join the Marine Corps.
- speaker: Interviewer
  text: Why did you decide on the Marines?
- speaker: Respondent
  text: They were the last ones to take women into them, and it was the one I waited for. The Marines had always made an impression
    on me. In grade school we sang the Marines Hymn, and I thought that was wonderful. So, it was the Marine Corps. They organized
    them in February of 1943, and I wasn't old enough at that time - I had to wait until my 20th birthday, which was in May.
    I believe it was summertime. I decided I would wait until I enjoyed summer a little bit, and then I actually enlisted
    in August and was called to boot camp in October.
- speaker: Interviewer
  text: Where did you go to boot camp?
- speaker: Respondent
  text: At Camp Lejeune, North Carolina.
- speaker: Interviewer
  text: What was that like for you on the first day? How did you arrive there?
- speaker: Respondent
  text: Well, as I said, women were new to the Marine Corps. They didn't want us in the first place.
- speaker: Interviewer
  text: So you were the wave of women Marines, literally.
- speaker: Respondent
  text: Not the very first. I was in the 17th training battalion, so I guess there were 16 battalions ahead of me. They didn't
    have many facilities for women at Camp Lejeune. In fact they didn't even have any uniforms for us. The first week or so
    that we were there we wore civilian clothes. They told us to bring clothes along with us and they would ship them home
    for us. So we were Marines, but we were in civilian clothes for at least a week before boot camp started. Boot camp consisted
    of learning to close order drill - learning to take orders, mostly. And just becoming familiar with the Marine Corps.
    We studied Marine Corps history.
- speaker: Interviewer
  text: Were the instructors male or female at that time?
- speaker: Respondent
  text: Our drill sergeant was a female. She was like our shepherdess. She got us from one place to another. Our drill instructor
    was actually male. And he wasn't too fond of his job! (chuckles) But we brought him around. We were all friends by the
    end of time there.
- speaker: Interviewer
  text: So he sort of got used to it.
- speaker: Respondent
  text: Oh, yeah. All the men Marines were kind of - they didn't know any more about the Marine Corps than we did, most of
    them down there. But they were men and that made a difference. But, anyway, it was a lot of fun - a lot of hard work and
    a lot of fun.
- speaker: Interviewer
  text: Was there much association between the male and the female?
- speaker: Respondent
  text: No, but as our training progressed - I think our boot camp was six weeks - as we got to the last couple of weeks,
    we had a dance. We mixed. We had to walk guard duty every night, and they always had a male and a female guard together,
    and a dog usually accompanied us - not an official dog, just more like to tag along. He was a big collie, and he was very
    nice company.
- speaker: Interviewer
  text: What was the mood in boot camp at that time in 1943?
- speaker: Respondent
  text: Oh! We were eager to do what we could. I was 20 years old, and I was just starting out. I had just graduated from
    high school a couple of years before. We were all eager to be Marines, and we thought that was great. We were very proud
    of the fact that when we graduated boot camp they finally gave us emblems to put on our lapels, and that was big deal
    to get those emblems. Then we knew we were Marines.
- speaker: Interviewer
  text: Was the training a little different for the male and the female recruits?
- speaker: Respondent
  text: Oh, sure. At that time the Marines - all through World War II - the Marines did not send their women overseas. We
    got to watch the men in their training. We watched them with the armaments that they used, and we went to see the war
    dogs.
- speaker: Respondent
  text: No, the war dogs - the canines. They called them Marine war dogs, I think. And we watched them in action and their
    training. But, otherwise we went to classes most of the time, and did drilling, exercising - physical exercise. They kept
    us busy.
- speaker: Interviewer
  text: You were selected for advance training of some type, and how was that selection done - everybody was given the same
    thing, or different women were given different roles?
- speaker: Respondent
  text: In boot camp we all did the same thing. After that we all went in different directions. When I was interviewed - when
    I enlisted - they asked what you knew, what was your background like. I had been in an organization that sent us to radio
    school, so I knew Morse Code. I asked for radio school, and believe it or not, I got it! Usually it didn't work that way.
    You might ask for radio school - and this actually happened - some of them got to be cooks and bakers, and they were mad
    at us who were waiting to go to radio school. (chuckles)
- speaker: Interviewer
  text: Where did you go to radio school?
- speaker: Respondent
  text: In the Marine Corps, you mean? First I went to Cherry Point to wait transfer to radio school, because new classes
    wouldn't start until after the first of the year and our boot camp was over in November. So they sent me to Cherry Point
    Marine Corps Air Station, at Cherry Point, North Carolina - just a short bus ride from Camp Lejeune. I was there for about
    six weeks. While there, mostly I did nothing. We were supposed to fall out for drill every morning. I discovered they
    didn't take roll, so I quit doing that after a while (chuckles). To pass the time I went to a bible class, which was worthwhile.
    And then they gave me mess duty. And I was on mess duty from the day before Thanksgiving until the day after New Years.
    So that kept me very busy - I got up at 4:00 in the morning to get things ready. That was not the best time of my life
    in the Marine Corps - after a while I thought, "What am I doing here?"
- speaker: Interviewer
  text: Then you went on to radio school.
- speaker: Respondent
  text: I went on to radio school at Miami University. It was a United States Naval Station radio at Miami University in Oxford,
    Ohio. I was there until May when I graduated as a radio operator. We studied Morse Code and typing. I had had three years
    of typing in high school, and they gave us each a goal to reach at this school. I told them that after three years of
    typing in high school I could type about 55 words a minute fairly accurately. They said, "Okay, we'll set your goal at
    75." I said, "75?" They said, yes. Well, at the end of the training I was typing 90. They had a wonderful way of teaching
    it. Anyway, after our graduation a group of us were sent to radio material school in Omaha, Nebraska, where we lived in
    the Fontanelle Hotel. We took our meals in the hotel dining room and went to work at a little lab a few blocks away. We
    marched close order down there - down the streets - in our dungarees. And that lasted until September or October, I think.
    Our mission was to learn to repair and maintain radios. Our group of women was a small group, and there were a lot of
    men in our class - some of whom had been in combat already and were back, and they had to do something with them. They
    were getting treatments. So they sent them to radio school. These men mostly slept through the class, and the women were
    all eager, taking notes. And the men got all better grades than we did, because they were more inclined to be good with
    their hands and making things, and doing mechanical things than we were. But we all managed to get through it. One of
    the things we had to do was learn to solder in the dark, like field conditions. They had a closet where you had to go
    in and solder. I still have a scar on my finger from where I soldered my finger by accident (chuckles).
- speaker: Interviewer
  text: Did anybody talk about what was going on in the Pacific? I mean, you were actually with people who were back from
    combat.
- speaker: Respondent
  text: Oh, yes. They did. You mean the men who were back from combat. Although we didn't get a lot of time to associate with
    the men. In class we didn't get the chance to talk, and they lived in a different facility. I mean, they didn't live in
    the same hotel we did. I think they lived in the YMCA. So we didn't see a lot of them. In the evenings we had to study
    and get our clothes ready, shine our shoes - which was an every night deal. We had to have our shoes shined. For graduation
    our project was to make a radio from scratch. They furnished all the resistors, screws, wires, switches and everything
    we needed. But we had to put them together into a radio. It was a vacuum tube era then, there were no transistors. So
    we had, I don't remember how many vacuum tubes we had in it. And our radio had to play when it was finished. When I first
    turned mine on I was amazed that it actually worked! (chuckles) There was music coming out of it!
- speaker: Interviewer
  text: And this was an individual project.
- speaker: Respondent
  text: Every single one of us had to make a radio. Yes. Then, when they checked all our radios, and they all worked, they
    said we could either tear our radio apart and give the parts back so the next class could use them. Or, we could keep
    them, and I think it would cost us $7 or something like that to pay for them. There was a carpenter in the area who would
    build a cabinet - just a little square box - and put cloth on them for the speakers, if you wanted to keep it. Well, of
    course we all did. As far as I know everybody did. And so I had a radio to take with me to San Francisco.
- speaker: Interviewer
  text: Okay. Now how much advance notice would you get on a transfer? You went across country now to San Francisco.
- speaker: Respondent
  text: Yes. I spent the rest of the war in San Francisco at that job. We traveled by train. They didn't put you on airplanes
    then - you traveled by train. And I was there until December of 1945. I actually could have gotten out - I had enough
    points; they gave points for your time in the service. And I had enough points to get out at the end of the war in September;
    actually, September 2 was the end of the war. But in our warehouse, equipment started to come back from the Pacific. Somebody
    had to be there to receive it and record it, and do the opposite of when we sent it out. So I was kept there - most of
    us were - until December. Then they had a change of heart and let us go home for Christmas.
- speaker: Interviewer
  text: So, what were your duties during the war?
- speaker: Respondent
  text: In San Francisco? They were maintaining … We received requisitions from the field. We didn't know where they came
    from, because every installation overseas had a code name. They didn't tell you this came from Okinawa, or this is going
    to Guam. They usually had four-letter code names. We would get requisitions in and then we'd have to check our records,
    which were all maintained on file cards because there were no computers back then. And we would check them off and write
    in which unit the item went to on such-and-such a date. And when we'd get a list of things all going to that one code
    name we would send it out to the warehouse. They would gather the things from the warehouse and get them off to the ships.
    That was about what I did for most of World War II.
- speaker: Interviewer
  text: Okay. So what was the mood when the war finally ended, at the camp?
- speaker: Respondent
  text: It was strange. When the war was over in Europe, it was just another work day for us. We heard it on the radio and
    thought that was great, it was wonderful. But our war was still going great guns out in the Pacific, so we just went right
    back to work. But when the bombs fell on ...
- speaker: Interviewer
  text: You were just discussing the end of the war.
- speaker: Respondent
  text: I heard on the radio that I had next to my desk that we had dropped an atom bomb equal to 10,000 tons of TNT on Hiroshima.
    So I went out of the office and told people that, and they all thought I was fooling. They said there was no such bomb.
    Then they came in and listened to the radio and realized that it was true. And I guess a few days later we dropped another
    bomb on Nagasaki. They said they expected the war to be over in a day or two. And it was.
- speaker: Respondent
  text: I should have mentioned earlier that the Marine Corps did not have any barracks in San Francisco for either the men
    or the women Marines. We all - thousands of us - lived in the city wherever we could find a place to live. I managed to
    find a fairly nice room with my roommate in a boarding house. We lived on the third floor and looked out - we were up
    on a hill, it's called - I don't remember the name of it - but we were looking toward the Golden Gate Bridge. And we could
    see that there were submarine nets underwater that would close off the bay so no submarines could get into San Francisco
    Bay. If one of our ships was coming in, they would open the submarine nets and the ship would come in, and the nets would
    close again. And there were blimps flying overhead all the time watching for any foreign ships. So we were very close
    to the war. We didn't know how close it was going to get to us. And I was there for almost a year and a half. So that
    was our war in the Pacific. And the day it ended, the Colonel called our office and all the other offices at the Depot
    of Supplies at Islais Creek and said, "Get your people home. Let them all go home right now." They said they did n't know
    what was going to happen in San Francisco. Of course, everybody was out celebrating - you've seen the pictures in newspapers.
    I went home, and my roommate said, "I'm going to stay home." I said I was going to go downtown and see what was going
    on, because I could walk downtown from where we lived. And they had taken all the cable cars off the streets because they
    were a treasure to San Francisco, and they didn't want any of them damaged. But one somehow got left on the turntable
    at the end of Market Street - it was a turntable that the cable car would roll onto, and everybody would get off the cable
    car and they would switch it around so it could go back the way it came. Well, all of the servicemen commandeered this
    - they were on the top of it, and the sides of it, and it was going round and round like a merry-go-round. But I don't
    think it got damaged at all. But everybody was in such a good mood - there was no looting, no damage, no vandalism. They
    were just happy. So, it was a great time. That was on the first of September - the day was in the middle of August, but
    the actual treaty was signed on September 2 aboard the Missouri.
- speaker: Interviewer
  text: Did you actually see that in news reports at the time, or soon after - the signing of the treaty?
- speaker: Respondent
  text: Well, we didn't see it because there was no television then. We heard it on the radio all the time. Yes.
- speaker: Interviewer
  text: How was that for everybody?
- speaker: Respondent
  text: That was great. We were all counting our points to see if we had enough to go home. But they didn't let us go home
    right away. Anyway, the shooting had stopped.
- speaker: Interviewer
  text: After the war you decided to remain in the Marine Corps - after World War II.
- speaker: Respondent
  text: There was no place for me to remain. I was discharged, and there was no reserve unit for any women, so there was a
    two year period when
