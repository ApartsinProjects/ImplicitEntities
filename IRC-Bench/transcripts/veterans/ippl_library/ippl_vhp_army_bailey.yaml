collection: ippl_library
source_url: https://ippl.info/learn-research/veterans-history
turns:
- speaker: Interviewer
  text: Mr. Bailey, when did you enter the service?
- speaker: Interviewer
  text: What time of year was it?
- speaker: Interviewer
  text: Where were you living at the time?
- speaker: Respondent
  text: In Chicago.
- speaker: Interviewer
  text: What were you doing before you went in?
- speaker: Respondent
  text: Well, I worked for the Crane Company. I was assembling valves for ships. I was a blueprint machine operator and was
    transferred to the shop when the war broke out. And then they drafted me into the service.
- speaker: Interviewer
  text: You were drafted. Into the army?
- speaker: Interviewer
  text: Where were you inducted?
- speaker: Respondent
  text: Camp Grant, IL.
- speaker: Interviewer
  text: What were your first days like, after you were inducted?
- speaker: Respondent
  text: Well, they inducted me and sent me home for two week furlough, and then I went to Camp Walters, TX for basic training.
- speaker: Interviewer
  text: How did you get down to Camp Walters?
- speaker: Interviewer
  text: How long a ride was that?
- speaker: Interviewer
  text: And once you got to Camp Walters, what then?
- speaker: Respondent
  text: Took basic training. And, boy, they made a man out of you. They built you up.
- speaker: Interviewer
  text: What were some of the training regimens that you did?
- speaker: Respondent
  text: Calisthenics, every morning. Every morning before breakfast.
- speaker: Interviewer
  text: About how long did the calisthenics last each day?
- speaker: Respondent
  text: Oh, maybe 20 minutes. I would say about 20 minutes. Yes.
- speaker: Interviewer
  text: What else besides calisthenics?
- speaker: Respondent
  text: Hand-to-hand combat, rifle range and marches. We would go on a 12 mile forced march. And a 26 mile march.
- speaker: Interviewer
  text: What does forced march mean?
- speaker: Respondent
  text: Well, your pace is much faster than a 26 mile march.
- speaker: Interviewer
  text: Are you carrying a pack?
- speaker: Respondent
  text: Full field pack, rifle, everything.
- speaker: Interviewer
  text: How much weight would you be carrying? Do you have any estimate?
- speaker: Respondent
  text: I have no idea. I was a young kid and never weighed it. [laughs] Just go ahead and carry it.
- speaker: Interviewer
  text: What kind of shape were you in before you went in?
- speaker: Respondent
  text: 169 pounds. Nothing like when I finished that basic training. I weighed 180 pounds.
- speaker: Interviewer
  text: So, what happened after basic training?
- speaker: Respondent
  text: Well, we were shipped to Fairfield, CA.
- speaker: Interviewer
  text: How did you get to Fairfield?
- speaker: Interviewer
  text: What did you do at Fairfield?
- speaker: Respondent
  text: Got on the boat and sailed over the Pacific Ocean.
- speaker: Interviewer
  text: So Fairfield was the debarkation point?
- speaker: Respondent
  text: Debarkation point.
- speaker: Interviewer
  text: What kind of ship did they put you on?
- speaker: Respondent
  text: The USS Bliss. I can remember that.
- speaker: Interviewer
  text: Was that a troop transport ship? Designed as such?
- speaker: Respondent
  text: Yes. They dropped us off and went around, and it was sunk on the other side, going to Europe. They went all the way
    around. They went to New Guinea, and then they went all the way around, and in the Europe theater they were sunk.
- speaker: Interviewer
  text: Were they carrying troops at the time they were sunk?
- speaker: Respondent
  text: Well, we were off. That's what I heard, that they had been sunk. Later recalled that all troops were off.
- speaker: Interviewer
  text: What kind of attack sunk them? Was it a plane? Or a submarine attack?
- speaker: Respondent
  text: I have no idea. We just heard that it was sunk. It could be wrong. There would be records, I'm sure, about the USS
    Bliss.
- speaker: Interviewer
  text: How long did your trip take, from Fairfield to New Guinea?
- speaker: Respondent
  text: Twenty-three days. Because they have to go this way and change course, every so many minutes.
- speaker: Interviewer
  text: You said "23 days" like it was a memorable time. What was that like?
- speaker: Respondent
  text: Beautiful. You know how the Pacific Ocean is. We passed New Caledonia Island. That's where there was a leper colony
    on that one portion. They were all waving to us.
- speaker: Interviewer
  text: Do you have any estimate as to how many troops were on that ship?
- speaker: Respondent
  text: I have no idea.
- speaker: Interviewer
  text: Was it crowded?
- speaker: Respondent
  text: No. Not to me. You know what I did? They asked for volunteers to work in the butcher shop. I volunteered right away.
    That was the best place to be. Everybody was sick on topside, and on the bottom the boat is steady. We were on the bottom
    level. That's where the refrigerators are, and rooms for cutting meat.
- speaker: Interviewer
  text: Did you have any experience in butchering?
- speaker: Respondent
  text: No. There was a man in charge, a Navy man, and he had us cutting meat and whatever.
- speaker: Interviewer
  text: How many hours a day would you be doing that?
- speaker: Respondent
  text: Oh, three or four. I didn't join right away. I was about a third of the way over when I joined, got into the butcher
    shop. And, boy, that was great. We started 7:00 AM in the morning. After work we were allowed to stay and play cards and
    eat whatever they had.
- speaker: Interviewer
  text: What was great about it, besides the fact...?
- speaker: Respondent
  text: They fed you well. [both laugh] For the work we did.
- speaker: Interviewer
  text: You said you heard that the USS Bliss was sunk later in the European theater. Did you have any problems on your trip
    over, as far as enemy attacks?
- speaker: Respondent
  text: No, nothing. Never saw a thing but beautiful islands.
- speaker: Interviewer
  text: You mentioned New Caledonia. Any other islands that you saw?
- speaker: Respondent
  text: I don't know, there was a little island with three palm trees on it. I'd like to go back there and stay [laughs].
    Real small island. We passed right by it.
- speaker: Interviewer
  text: Did you stop anywhere on the way to New Guinea?
- speaker: Respondent
  text: No. No, we didn't even stop at Hawaii, I don't think.
- speaker: Interviewer
  text: Where did you land in New Guinea?
- speaker: Respondent
  text: It was at Buna. Buna Mission.
- speaker: Interviewer
  text: Was that area secure? At Buna Mission?
- speaker: Respondent
  text: They had just secured Buna. Right. They sent my platoon to guard duty by a river north of Buna Mission. We were there
    about a month.
- speaker: Interviewer
  text: How did you get off the ship onto shore, then?
- speaker: Respondent
  text: Well, they had those ducks. They called them "ducks."
- speaker: Interviewer
  text: Were you already assigned to an outfit before you landed?
- speaker: Interviewer
  text: What happened to you after you landed?
- speaker: Respondent
  text: They just attached us to the 32nd. Because they needed replacements, because they had lost so many men at the battle
    of Buna Mission.
- speaker: Interviewer
  text: What month and year would that have been?
- speaker: Respondent
  text: Hmm. Dates are real tough. Late June or early July, 1944.
- speaker: Interviewer
  text: Well, you went in the service in August of 1943. About how many months later was it that you actually landed in Buna
    Mission?
- speaker: Respondent
  text: Well, it was on my birthday, June 4th. I can remember it was two days after we landed it was June 4th, so that would
    be about June 2nd that we landed there.
- speaker: Interviewer
  text: And you went in August of '43, so would this have been June of '44?
- speaker: Respondent
  text: Mmmm, August? After basic training, yes. Because it was 17 weeks of basic training and then they shipped us to Jacksonville,
    FL, and from there I went to Fairfield, CA.
- speaker: Interviewer
  text: So this would have been about ten months after you went in the service?
- speaker: Respondent
  text: Yeah, about.
- speaker: Interviewer
  text: You said you were assigned to the 32nd to fill in for losses.
- speaker: Respondent
  text: Yes, Red Arrow.
- speaker: Interviewer
  text: How did it get the name "Red Arrow"?
- speaker: Respondent
  text: From World War I.
- speaker: Interviewer
  text: Do you know any of the history of what happened that it got that name?
- speaker: Respondent
  text: The division that would be, see, the arrow that is piercing a wall. So they would go in and pierce the enemy's lines.
    So that's how they got the name "Red Arrow."
- speaker: Interviewer
  text: Were there other divisions fighting in the same area with you, besides the 32nd?
- speaker: Respondent
  text: The 7th Cavalry. 33rd Division.
- speaker: Interviewer
  text: That was a division also?
- speaker: Interviewer
  text: What was the mission of the 32nd Division?
- speaker: Respondent
  text: Just take the area.
- speaker: Interviewer
  text: Where was your unit assigned?
- speaker: Respondent
  text: Well, in the beginning my platoon, we were guarding a river north of Buna, so any Japs coming out of the jungle, we
    would capture or, you know, kill. But we never saw any come out. None of them came out.
- speaker: Interviewer
  text: About how long were you there?
- speaker: Respondent
  text: Month. Because our division went forward into and fought at Aitape, Saidor, Finchaven, and Hollandia. Different companies
    went in and fought at these areas. I was at Buna, on the river, and they went into Aitape, and went in and fought the
    Japs, and Saidor, and Finchaven, and then Hollandia, and I picked up the rest of the 32nd Division at Hollandia. They
    had fought all these battles along the New Guinea coast. That's the eastern coast.
- speaker: Interviewer
  text: You say you picked up the division. You were already assigned to them?
- speaker: Respondent
  text: On the duty on the river.
- speaker: Interviewer
  text: And then what happened when you met up with the division at Hollandia?
- speaker: Respondent
  text: We all took off for Moratai Island.
- speaker: Interviewer
  text: You were done with Buna Mission?
- speaker: Respondent
  text: Well we were done with New Guinea. It had been secured. So then we went on to Moratai Island.
- speaker: Interviewer
  text: And that's where MacArthur, he landed there.
- speaker: Respondent
  text: While we were there, MacArthur landed. At Moratai Island. That was his first landing going back to the Philippines.
- speaker: Interviewer
  text: Moratai Island is part of the Dutch East Indies?
- speaker: Respondent
  text: Dutch East Indies, yes. It's a very small island.
- speaker: Interviewer
  text: How long were you on Moratai?
- speaker: Respondent
  text: About three weeks.
- speaker: Interviewer
  text: What did you do while you were there?
- speaker: Respondent
  text: Well, we just rested.
- speaker: Interviewer
  text: There was no combat for you there?
- speaker: Respondent
  text: 'No combat. The Japanese gave no resistance: we destroyed all their food and ammunition with incendiary grenades;
    a real fireworks show and they went up into the mountains. And they would come out, one by one, you know. There were not
    that many on that island. It was very small. We held them up there, in the mountains.'
- speaker: Interviewer
  text: You say they came out one by one. To do what?
- speaker: Respondent
  text: To surrender. They were starving. They didn't have no food.
- speaker: Interviewer
  text: Were they coming out to surrender?
- speaker: Respondent
  text: Surrender, right.
- speaker: Interviewer
  text: Then after three weeks you left Moratai?
- speaker: Respondent
  text: And then went on to Leyte, in the Philippines.
- speaker: Interviewer
  text: How did you travel to get there?
- speaker: Respondent
  text: Boat. Those LCI's.
- speaker: Interviewer
  text: Landing Craft, Invasion?
- speaker: Respondent
  text: Landing Craft, Infantry.
- speaker: Interviewer
  text: Oh, OK. Somebody else told me it was Landing Craft, Invasion, but it's probably Landing Craft, Infantry.
- speaker: Respondent
  text: Infantry, right.
- speaker: Interviewer
  text: What happened after you got to Leyte?
- speaker: Respondent
  text: Well, it was already secured. The beachhead was secure, and we went up into the mountains.
- speaker: Interviewer
  text: You say "we." Was it just your platoon?
- speaker: Interviewer
  text: Do you remember the number of the regiment?
- speaker: Respondent
  text: Oh, 126th. Co. K, 126th Infantry.
- speaker: Interviewer
  text: And this was still with the 32nd. So you headed up into the hills. What was your job at that time?
- speaker: Respondent
  text: Well, I volunteered to become reconnaissance. I'm trying to think. That was a platoon for reconnaissance and patrol
    behind the Jap lines. I volunteered for that.
- speaker: Interviewer
  text: Did they ask for volunteers?
- speaker: Respondent
  text: Yes. There was two platoons.
- speaker: Interviewer
  text: They were forming these platoons up to do reconnaissance?
- speaker: Respondent
  text: Yes. To go behind the Jap lines, and seek them out, see where they were at.
- speaker: Interviewer
  text: John, what prompted you to volunteer?
- speaker: Respondent
  text: I volunteered for everything. Because I didn't want to tell anybody to go someplace and be killed. So I volunteered.
    For all. On the river in New Guinea I was called in to the officers' tent; they announced that I was to be a corporal
    of a platoon. I told them I could not tell a man to do something that might him killed.
- speaker: Interviewer
  text: You told me earlier that you had volunteered to work in the butcher shop on the ship. Were there other things that
    you volunteered for before volunteering for this reconnaissance patrol?
- speaker: Respondent
  text: No. No, that was the second. The big one.
- speaker: Interviewer
  text: Did they tell you when they were asking for volunteers that this was going to be a dangerous assignment?
- speaker: Respondent
  text: Oh, yes. Because you live behind the Jap lines, really.
- speaker: Interviewer
  text: How many volunteers did they get?
- speaker: Respondent
  text: Well, one platoon, which is about 15 or 16 men.
- speaker: Interviewer
  text: They formed this platoon of volunteers from other platoons, is that right?
- speaker: Respondent
  text: Right. Anybody who volunteered into that.
- speaker: Interviewer
  text: So there were 15 of you that volunteered?
- speaker: Respondent
  text: Yes. And there were two of these units. The other platoon was ambushed and they were all killed. The other platoon,
    15 men. But we were lucky. We had a first scout, I was the second scout, first scout was from Kentucky, and he was a dead
    shot. Shoot from the hip, bang bang. Two Japs stuck their heads up on the side of a big tree. Picked them off, bang bang,
    before I even knew they were there. Amazing, right through the head. And from the hip!
- speaker: Interviewer
  text: What was his name?
- speaker: Respondent
  text: I have no idea. He was from Kentucky, and they can really shoot.
- speaker: Interviewer
  text: Did both of these reconnaissance patrols go out at the same time, yours and the one that was ambushed?
- speaker: Interviewer
  text: Which one went out first?
- speaker: Respondent
  text: I think what we did was, we replaced that first reconnaissance platoon.
- speaker: Interviewer
  text: When you volunteered, did you know you were replacing a platoon that had been wiped out?
- speaker: Respondent
  text: Oh, yes. They told us so.
- speaker: Interviewer
  text: No survivors?
- speaker: Interviewer
  text: Were they able to determine how they were ambushed? What went wrong?
- speaker: Respondent
  text: Who knows? I don't think anybody ever knew. They might have, but I have my doubts.
- speaker: Interviewer
  text: Had the bodies been discovered before your platoon went out?
- speaker: Respondent
  text: I really don't know.
- speaker: Interviewer
  text: I was just wondering if they were just missing, or if they already knew that they'd been killed.
- speaker: Respondent
  text: Well, they didn't return. To the regimental headquarters. Because that's where you had to report, regimental. Of where
    there Japs were and how many.
- speaker: Interviewer
  text: Was part of your mission to avoid contact? Avoid detection?
- speaker: Respondent
  text: We never fired a shot. In the jungle it's pretty easy to hide. Total silence. No talking, no smoking.
- speaker: Interviewer
  text: How long did you expect to be out on this patrol?
- speaker: Respondent
  text: Well, we would leave early in the morning. Come back in the evening.
- speaker: Interviewer
  text: Oh. I see. So you didn't have to transport a lot of food. What type of equipment did you personally carry?
- speaker: Respondent
  text: I had a carbine. M1 carbine.
- speaker: Interviewer
  text: That was it?
- speaker: Respondent
  text: M1 carbine. Hand grenades.
- speaker: Interviewer
  text: So these patrols would go out in the morning and be back by nightfall?
- speaker: Respondent
  text: Yes. Remembered later off record that they did not always come back by nightfall.
- speaker: Interviewer
  text: How many patrols would you say you did, altogether?
- speaker: Respondent
  text: Oh. [long pause]
- speaker: Interviewer
  text: Were you going out everyday?
- speaker: Respondent
  text: No, not everyday, but just about, you know. Just about. If we would contact the Japs, the regiment would go out and
    have contact with the Japanese, where they were. We had quite some battles with them. They had crossfire, machine guns
    and, oh boy. We lost 84 killed or wounded one day.
- speaker: Interviewer
  text: When you found enemy, how did you communicate that information back to your headquarters?
- speaker: Respondent
  text: Keep it in your head, and the sergeant was a great guy, too. He knew terrain and, well they had maps with them too,
    terrain maps, and they could pinpoint where they were at.
- speaker: Interviewer
  text: Did you have any type of radio communication?
- speaker: Respondent
  text: No. No communication whatsoever. We hardly ever talked. Had to be quiet.
- speaker: Interviewer
  text: Were you ever discovered on any of your patrols?
- speaker: Respondent
  text: Yes, the two Japs that we killed, that were hiding behind the tree. One Jap had a hand grenade. He was going to hit
    it on his helmet and throw it, and he didn't make it. Didn't get rid of the hand grenade. I was second scout. Good thing.
    Being first scout and from Chicago would have been bad. Being first scout and from the hills of Kentucky was much better.
- speaker: Interviewer
  text: Did it go off?
- speaker: Respondent
  text: No. He didn't hit it. He had to hit it on his helmet. To arm it.
- speaker: Interviewer
  text: Were there any other incidents where you were detected by the enemy?
- speaker: Respondent
  text: Well, let's see. I'm trying to think. There was one more, but that was after I got out of that intelligence and reconnaissance.
    I became a bazooka man. There was a pair; my partner carried the tube and I carried the shells, because I was big and
    strong.
- speaker: Interviewer
  text: Did you volunteer for this also?
- speaker: Respondent
  text: Yes. I volunteered for that. And we used it and, boy, that's one weapon! Fantastic!
- speaker: Interviewer
  text: Had you had any training?
- speaker: Respondent
  text: No. That was something that they just brought in and said, "Here, this is all you do. You hook the wires on this way
    and put the shell in and let her go, pull the trigger."
- speaker: Interviewer
  text: No training in aiming it?
- speaker: Respondent
  text: No. My partner did th
