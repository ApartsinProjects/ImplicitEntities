turns:
- speaker: Interviewer
  text: Okay. Company E, 116th Infantry, 29th Infantry Division?
- speaker: Interviewer
  text: You were born in 1925?
- speaker: Respondent
  text: That's right.
- speaker: Respondent
  text: Minneapolis, Minnesota.
- speaker: Interviewer
  text: How long did you live in Minneapolis?
- speaker: Respondent
  text: I lived in Minneapolis until I was a junior in high school at which time my father was a practicing attorney in Minneapolis
    and his office was located right overlooking Nicollet Park which is pronounced Nicollet [nick-o-let] in Minneapolis which
    is pronounced Nicollet [nick-o-lay] every place else where I could look out of the window and I was about ten feet away
    from the wall and I got to know all the left fielders, including Ted Williams and so forth that probably accounts for
    my obsession with baseball. Anyway, we moved to I also was on the Wisconsin baseball team anyway we moved to Milwaukee
    in the summer of '42, that would be, yes. I went to Shorewood High School, which was a good high school, and then I knew
    I was going to go into the Army, and when I got to be 18, was May 7th, and I went down to the local draft board, as I
    was instructed to do, and registered. And they said, "Well, you'll have two weeks, you'll be inducted." I think they said,
    "You'll take a physical and then you will be given two weeks to get your affairs in order." And I said, "Well, I haven't
    graduated from high school." And they said, "When do you graduate from high school?" And I said, "Well, I graduate on
    June 6th, 1943." And they said "Well, we'll give you a deferment." So they gave me a high school deferment to finish out
    the month. And I went in the Army on June 6th and on June 7th they didn't give me the two weeks because they had already
    given me a deferment on June 7th I was inducted in the Army. I was inducted at the Buffalo Street Induction Center in
    Milwaukee and got on a train for Rockford where Camp Grant was and was in the company of a bunch of inmates from Green
    Bay Reformatory—
- speaker: Interviewer
  text: Real inmates?
- speaker: Respondent
  text: Yeah, and there were these men standing around with these snap brim hats and overcoats and I noticed one of them opened
    up his coat and he had a revolver or something and they were actually guards and these guys were telling—they stripped
    us all naked and they put me in with this bunch because we had inmates from the Green Bay Reformatory because I presume
    they were people who were about to be released or something, anyway, and most of them by the way were white, that just
    occurred to me, I have clients up in Green Bay now and that place is just about 70% Black. But anyway, because I was slated
    to be inducted in the Army right away and not to get the customary two weeks they put me in with these prisoners—I pieced
    two and two together—they made us strip naked and they wrote a number on our chest in mercurochrome and then we walked
    around this huge warehouse—it was not on the ground floor—went from stations, they had a number on the posts, they had
    a doctor sitting at a card table with a number, number 21, that meant you had to examine your ears, and then you'd go
    to number 22 and that meant he's was going to examine your eyes and so forth. Then we passed the physical and I was terrified
    of not passing the physical because at one time I was told I had a heart murmur and I didn't know what that meant and
    I told the doctor and he said, "Your heart seems fine to me, son." I said, "Don't I have a heart murmur?" He said, "Well,
    you do but it's functional one," which I didn't know what that meant, still don't. Anyway, then—
- speaker: Interviewer
  text: To interrupt you for a second. That was important for you, to pass the physical?
- speaker: Interviewer
  text: Like you wanted to be—
- speaker: Respondent
  text: I wanted to be inducted and I was dreadfully afraid of not passing my physical. I was terribly anxious to go in the
    Army.
- speaker: Interviewer
  text: What sort of apprehensions did you have? What's sort of fears?
- speaker: Respondent
  text: I was afraid they might find something. I knew I was in good shape and I said somewhere along the line I'd heard I
    had a heart murmur and I was afraid that might disqualify me. And then I thought perhaps they might find me psychologically—something
    that I didn't know about—because I knew I was in good physical condition, but I didn't have any problem. I think we put
    on our clothes and we were put in another room that probably had a flag on the wall and about 200 of us raised our hands,
    and repeat after me, and whatever the oath of office was, and—
- speaker: Interviewer
  text: And, you were in.
- speaker: Respondent
  text: And I was in.
- speaker: Interviewer
  text: So, your induction physical then took place at Camp Grant?
- speaker: Respondent
  text: No, our induction was on Buffalo Street in Milwaukee—that was on the south of Wisconsin Avenue, I think it was about
    five blocks south of Wisconsin Avenue. In a warehouse district. The other day I drove past that big warehouse and it's
    still there. It's a warehouse again now.
- speaker: Interviewer
  text: So, after the physical you went to Camp Grant?
- speaker: Respondent
  text: Yep, we went to Camp Grant which was a medical training center but it was also an induction center for Milwaukee and
    as I recall, well the Milwaukee Selective Service Examining Station was for all of Wisconsin and the upper peninsula of
    Michigan, anyway, then we went, there were some non-prisoners too, after we were sworn in the guards left. Then we changed
    trains, it was such a long trip from Milwaukee to Rockford, that we changed trains at Beloit and I sat in the train. And
    in the train there was a little smoking room at one end of the thing with a bunch of these guys from Green Bay and they
    all left the train and went into this liquor store and bought pints of whiskey, and they said, "Have a drink kid," and
    I said, I was a lot younger than they were. They were in their 20's and I said, "I'd never had a drink before, I've drank
    beer but not—" to make a long story short, when we got to Camp Grant I was sick as a dog and prior to my induction, towards
    the end of my senior year they had offered, the military had come to the high school and offered courses in V-5 and V-7
    or something like that, those were Navy courses to become Navy pilots and was a college training course, because they
    wanted to keep certain, some people in college so that when the war was over they wouldn't have a country full of dumbbells,
    non-educated people. So, it was in the interest of the country, they had an Army specialized training course, I was a
    little bit nearsighted so I couldn't go into the Navy, and I had passed the test with flying colors and was given a little
    card from the Adjutant General, I remember I carried it around, a guy named Julio, that was the Adjutant General of the
    Army, wrote me a letter saying, "Show this and you'll go to college, show this at your induction station," and you had
    to have, you had to pass this qualification test and it was a lengthy thing, the test took all day, and I passed it and
    with no problem, then I got to Camp Grant and took the Army General Classification Test—the IQ test again, and about every
    two minutes I'd go outside this mess hall, where they had the test, and throw up and I would just get back in and they
    would say, "Now turn to the next section," so as a consequence I flunked the IQ test that would even give me a minimal—that
    would even let me in the Army, I think you had to have 100-110 or something, the Army in its characteristic way said,
    "There is something wrong, in one hand this guy is a genius from his high school test, this Army General Classification
    Test, and this other one he is barely literate," so instead of doing anything about it they just kept me there, at Camp
    Grant, everyone else went off to various places and I think I spent two or three weeks there. And I got dressed up in
    my khakis and went home on weekends, back to Milwaukee, it was kind of exciting to see, going home in uniform, and then
    finally they got around to giving me another IQ test, and—
- speaker: Interviewer
  text: You did better I assume?
- speaker: Respondent
  text: Well, they didn't, no they sent me to Ft. Hamilton, Brooklyn, which was the 113th Infantry, composed of New York and
    New Jersey National Guard, and they were all Italian, and I stood about a foot taller than everybody and I was the only
    guy in the unit whose name didn't end in I, A, or O. Then I got to be friends with two guys named, Eddie Lasioni and Johnny
    Lataraca, and Lansioni was from, I don't know how he got in that unit, was from Wadeka, Illinois, and he could, they all
    could speak Italian, and he translated for me, they say things in Italian, and half the time I didn't know what they were
    talking about, we were out on Long Island walking the beach with a BAR and a dog, I had never seen a gun, much less fire
    one, I guess I had fired 22's and stuff, and that went on for a couple weeks and finally the Company I was in, we were
    in an empty lot out there in—these guys would break into the cottages and steal stuff and the dog, the dog's name was
    Rex, he didn't like me, well it wasn't that he did like me he liked to go swimming, he was a Doberman Pincher, and he
    liked to go out on the surf and swim and I didn't let him, so I'd make him heel, because that's what they told me to do,
    just a few weeks in the Army, the dog would bite me where the top of my pants would fit into leggings, and I'd come back
    and my pants would be in shreds and they'd say, "Flaten, what the hell are you doing out there? Your pants are always
    torn," well it was the damn dog, anyway, after I was there about three weeks, they decided the duty was too tough, the
    word went out that we were going to have a strike [laughs]. This is the Army, and they, we didn't go down to the kennels
    to get the dogs, they had some sort of a court martial thing and they were going to send everyone to prison, Eastern Coastal
    Penal Colony at Camp Upton, New York, including me, and I didn't know anything about it. I went to the chaplain and I
    said, "I don't know what all this is about, half the time they are not even talking English" and he is the guy that got
    me another IQ test, and got me transferred to Deland, Florida, John W. Stetson University and I came in with my barracks
    bags and set it on the floor of this college campus where there was a first sergeant, and he said, "What are you doing
    here?" I said, "I'm ready to go to college." He said, "Well, they have closed down the program they don't have it anymore,"
    I said, "Well how come they sent me here," and he said, "Well, the Army is a little slow about picking up on the information,
    the newspapers had known about it for weeks." So, I went to class, we had to march to class, and I had no idea, it was
    the middle of the semester, and we'd go marching from class to class but this Deland, Florida had classrooms with two
    doors, so I learned get in and sit near the back door and then I could go out the back door when they took role, and then
    I could sneak out and go watch the girls play tennis. Finally, the semester ended and everybody was shipped out to various
    places and they shipped me to the nearest place, which was Camp Blanding, Florida, just up the road from Deland between
    St. Augustine and Jacksonville, that was an infantry replacement training center and it was on—I heard and I think it
    was probably correct, that it was an old farm belonging to Claude Pepper, who later became a Congressman, or a Senator,
    maybe a vice-president, but I remember there was a couple of slight raises of about 5 feet elevation, it was flat as a
    pancake and we had to attack a hill and it would be Pepper Hill and Pepper Farm, everything was Pepper. So, if it wasn't
    Claude Pepper it was some relative of his. But, Camp Blanding was a huge camp, IRTC Infantry Replacement Training Center.
- speaker: Interviewer
  text: This is what they call the "Repple Depple," is that right?
- speaker: Respondent
  text: No, this was an Infantry Replacement Training Center and we trained we had 17 weeks of basic training I think we hung
    around a—it might have been a few days before we started our cycle, throughout the post there were hundreds of training
    battalions, they were over strength infantry battalions. Our squads were 12 men each instead of 9, we had four squads
    to a company instead of three, we were a bigger group, we were a company, I remember I was in C Company in the 190th Training
    Battalion and they had training cycles constantly going on at this camp. Some of them were in the first week, some of
    them in their second and so forth, and so it was a very efficient use of the training time and the terrain and the ranges
    and so forth, so that when one unit was in the first week of their training cycle they wouldn't be interfering with the
    people who were on the firing range and so forth, or the mortar range or the machine gun range. It took 17 weeks of training
    it was great training and it was through training we fired everything, we fired rifles, we were trained to be riflemen,
    some guys, I think—. No, we were all trained to do everything, we could fire machine guns, mortars, 60's, we could fire
    all the weapons but I don't think we were assigned, they don't have advanced individual training like they do now, where
    they give you a specialized thing. But we were all MOS (Military Occupational Specialty) Number 745, later, that's an
    infantry assignment for even when I was a platoon sergeant, a tech sergeant, sergeant first class, that was a 745, we
    had an armed rifleman leader or something. Later on, we all used to joke, "We'll be glad when we get home and 745 means
    quarter to eight." We took intensive training and the officers, the training was conducted by Non-coms, corporals and
    sergeants and officers, lieutenants, the company commander was a captain, and the battalion commander was a light colonel,
    and it was a regular Infantry Battalion but instead of the whole work being shipped off at the end of the training cycle
    they just took in a new batch of privates. After completing 17 weeks of training, as I said we fired everything and I
    later on appreciated how good the training was, because I had to fire everything, you shot what you shot, water-cooled
    machine guns, 81 mortars and so forth. Then they still didn't know what to do about that ASTP assignment after I finished
    basic training, so they kept me around a couple of weeks, but that wasn't very important, and then, the most intense thing
    I can—
- speaker: Respondent
  text: remember about basic training outside of the fact that we went from Camp Grant with a bunch of guys from Dickson,
    Illinois, that's where Ronald Reagan is born, farmers mostly, they weren't too literate, they hadn't gone too far in school,
    I had attended Shorewood High School and I would bet that 90% of the kids that I had gone to school with were destined
    to go to college and had taken college training. I had just gone to my 50th anniversary, recently, and they gave us some
    figures, like 90% of the graduates from Shorewood High School go to college and it's the best high school in the state.
    And they have more kids go and more successful graduates in college than any other school in the state. So, it was a
