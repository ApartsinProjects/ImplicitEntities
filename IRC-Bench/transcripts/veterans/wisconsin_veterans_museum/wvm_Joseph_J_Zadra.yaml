collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: Okay, so we can start at the beginning, and you can tell me when and where you were born.
- speaker: Respondent
  text: Okay. I was born in [in audible], Michigan - that's up near Ironwood, Michigan - July 22, 1922.
- speaker: Interviewer
  text: And did you grow up, up there?
- speaker: Respondent
  text: I grew up about, until age seven, then moved to Schofield, Wisconsin, which is near Wausau, mid-central Wisconsin,
    on a little farm. My father was a miner, and the mines were closed, so then he went and moved down south next to my grandma's
    large farm.
- speaker: Interviewer
  text: And did you have any siblings?
- speaker: Respondent
  text: Yes, I have a brother and two sisters, a brother and a sister still living.
- speaker: Interviewer
  text: And where did you fall in the line of siblings?
- speaker: Respondent
  text: Oh, I was number one.
- speaker: Respondent
  text: '[Laughs] She was.'
- speaker: Interviewer
  text: You thought like you were number one.
- speaker: Respondent
  text: Yeah, she's one year older, yeah, my sister. I'm number two.
- speaker: Interviewer
  text: Okay. So you had one older sister and two younger siblings.
- speaker: Respondent
  text: Yeah, right.
- speaker: Interviewer
  text: Okay. And what kind of kid were you growing up?
- speaker: Respondent
  text: Very disciplined kid, because my father and mother were immigrants, and it was close family tie, a very close family.
    Father was a rather industrious type individual and commanded a lot of effort on the part of his children. So I was assigned
    a lot of tasks. Didn't have too much freedom to become mischievous. [Laughs]
- speaker: Interviewer
  text: And where were your parents immigrated from?
- speaker: Respondent
  text: From Tyrol, Austria. Today it's Italy, near Trento, top of the mountains. It's a very lovely area. We were just there
    several years ago.
- speaker: Interviewer
  text: Oh, that's great. So then what were you doing before you went into service?
- speaker: Respondent
  text: I graduated from high school in 1940, then enrolled in the University of Wisconsin, without financial support from
    my parents. My father entered a filling station and tavern business, and he thought I should be staying home and assisting
    in the business. And then I entered the University of Wisconsin in 1941. I got my first taste of military by joining the
    Reserve Officers Training, ROTC. Since I had financing my own way, I stayed out another year and worked in a defense factory.
    Thereafter I enlisted in 1943, yes.
- speaker: Respondent
  text: In 1942 - I should have written that down - in October, and went to Fort Sheridan, and from there - should I go on?
- speaker: Interviewer
  text: Well, tell me why did you decide to enlist?
- speaker: Respondent
  text: To enlist? Well, I wanted to be a pilot. One of my friends at the university was from my hometown, Ram tel Diggins
    [sp??], and he was accepted in Air Corps. I was a rather thin boy, about 145, 150 pounds. I fitted all the requirements,
    but failed the physical, because I had arrhythmia. So then they decided I - my brother preceded me, enlisting in the Navy,
    so I thought I would enlist also, in October 2, I believe it was, and went to Fort Sheridan.
- speaker: Interviewer
  text: Can you tell me what you remember from December 7, 1941, and hearing about Pearl Harbor?
- speaker: Respondent
  text: Yes. Yes, I do remember that. The feeling was that I certainly wanted to defend my country, because we were invaded,
    so to speak, in Hawaii, and yet I, as a soldier I would not like to fight in the Pacific area. I just, that was a strong
    feeling I had, cause I had a lot of the old feelings at that time at the Japanese, just a strong ill feeling.
- speaker: Interviewer
  text: So then you enlisted in 1942.
- speaker: Interviewer
  text: Went to Fort Sheridan, and that was for basic training?
- speaker: Respondent
  text: Fort Riley, and then at that time the unit was a cavalry unit, dating back to the 7th Cavalry, it was General Custer,
    of years back. That was converted to an armored unit, and I was assigned to the 19th Tank Battalion. I trained as a tank
    driver, and I loved driving a tank. It's interesting, and it came back into maintenance area. The sergeant gave me a toothbrush.
    It was very windy out in Kansas. There's a lot of - he gave me a toothbrush, he said, "Brush out the dust." The colonel
    came by, Colonel Karstetter. He was just reviewing the area. He said, "Young man, what are you doing?" And I said, "The
    sergeant told me to do this," and he said, "Can you do other things beside that?" just conversation and so forth. But
    then they continued training. I think sometime later we were transferred to Camp Ibis, California - that's near Needles,
    California - for desert warfare training. In that period of time there, my company commander, Captain Birada [sp??], said
    to me, "Joe, the qualifications you have, having some college education, some ROTC training, and so forth," he said, "what
    would you like to do as a soldier?" And I said, "I would like to somehow learn to drive a tank," and he said, "No, that's
    why I'm masking you. I think you can do other things than driving a tank." And he said, "I would like for you to join
    our office staff. It's the duties of a draftsman," he said, "draw maps and all these kind of things." I said, "Fine, I'll
    do that." It was near the end of the training. Colonel Karstetter said to Captain Birada, he said, "This young man I met
    sometime earlier." He said, "I would like to think that we would elevate him to the intelligence division." So I became
    a staff sergeant in no time. From unit training, as the African war wound down, we were transferred to Camp Ibis - not
    Camp Ibis - Camp Polk, Louisiana, for training for overseas. And that weather there, didn't have winter weather, but we
    trained under very adverse conditions, a lot of rain, swamps, and training and so forth, more fitting to the European
    warfare. After training at Camp Polk we were sent to embarkation, Camp Kilmer, New Jersey. It was in, let's see now, October,
    yeah, it was October 1943.
- speaker: Respondent
  text: Good. Boy, my memory.
- speaker: Interviewer
  text: Yeah, that makes sense.
- speaker: Respondent
  text: Yeah, 1943 or '44. Let's see here. I know I wrote it down.
- speaker: Respondent
  text: August 1944 we embarked. Yeah, it was Camp Kilmer, right.
- speaker: Interviewer
  text: So you were training for almost two years then.
- speaker: Respondent
  text: Yeah, that's right.
- speaker: Interviewer
  text: Yeah, because you went around a few places.
- speaker: Respondent
  text: Yes. We were well training for warfare, there's no question about it. There were a few armored divisions before us
    - that fought in Africa and so forth. From there we went on the Queen Mary. That was about 20,000 people, about 16,000
    soldiers. There were other units on there, plus, and naturally the large crew. We went to Greenock, Scotland, unescorted,
    because the Queen Mary could outrun any submarine. I thought it was five days and something, but I looked it up, and it
    was near seven days. But it's still a very short trip over there - seven, eight. Greenock, Scotland, and from there we
    went south to England and the train, to Tidworth Barracks. That was the equivalent of our training sites for armored divisions
    and for a period of time could be equipped for overseas battle. I was sent to London for two weeks for training in German
    warfare, identifications and so forth, and chemical warfare. When I came back I was assigned those duties, along with
    intelligence, of training our troops on chemical warfare I know, so - and communications, and another part of it was communications
    and orientation as to the progress of the war and that kind of thing. We boarded - the last part of the September we boarded
    nineteen ship tanks for Utah Beach, and we landed in Utah Beach. The name of the town, Saint, Sainte-Marie-du-Mont, D-U-M-A-O-T.
    There we march. We were there for a couple of days and bivouacked, and then marched down through France, bypassing Paris,
    so to speak. We were there momentarily. We went down to the route World War I, the site of the Verdun. Then from there
    we went to Mersch. That's that point I made on the map there, and they cornered - that was an initial area, station. We
    were put in the reserve with the 9th Army, with the 1st Army initially, and then before we got into battle we were assigned
    to the 9th Army. Our assignment there was protecting the southern flank of Luxembourg and Belgium, on that ninety-mile
    front, three Divisions and our only armored Division was protecting that front. We didn't have much - incidents, except
    after being there several days maybe, a good week or so. I was preparing situation maps with those two unit for initial
    engagement, but it would be north, along the German borderline. By the way, that's right along the German borderline,
    and the initial engagement was more or less harassment firing at Scheidgen, S-C-H-E-I-D-G-E-N, the town of Scheidgen,
    which was vacated, but the troops were along that area. Eventually we moved up into Scheidgen, and we were housed - fortunately,
    it was the first housing, otherwise we were outdoors - and built it, a sitting area there. My first involvement in war,
    I thought it was being a patrol man, guarding and patrolling at night. Even though I was a staff sergeant, and looking
    for the enemy, where they were situated, trying to find that. I wasn't alone, I was with a group of course. I headed the
    group. In that area we began to have some engagements, sporadic engagements, and I delivered some maps. The colonel had
    an interpreter who was fluent in German. Naturally he was always along with me, because I didn't speak German. We were
    in an American jeep, and he told the driver we had to turn right. He was wrong, and he came upon a German sentry, sentinel.
    Usually you use a password, you know, but the German, he talked to the German quite a bit, and he got - kept the attention,
    so we drove up there, in an American jeep naturally, we were Americans, but they already had captured some American jeeps
    earlier, and so we took the sentinel prisoner, and we went back the right way and then dropped him off, telling him that
    he better not say anything, because they would probably do something with him. [Laughs] So anyway, that's my first engagement
    with an enemy. [Laughs] Then the sixteenth of December, hell broke loose up in the Hürtgen Forest area, up further. That's
    when the three infantry Divisions were practically annihilated. Of course, then the Germans advanced very rapidly. Not
    as rapidly as they wanted to, because it was winter and a lot of snow. When they went through the Hürtgen Forest years
    ago, 1939, 1940, and captured the whole area to the English Channel, they didn't encounter winter conditions, so that
    impeded their advance. But on the other hand, just telling you briefly, I was not involved, just telling briefly, I'm
    sure it's been said already that what really caused the Americans not to be able to retaliate or defend was the fact that
    overnight they had sent a lot of artillery fire. They changed signs, and soldiers were completely lost, as I understand.
    Of course, then as they started progressing, then we began to enter into Germany, into the center of Luxembourg, in towns
    of Medernach - what's the other town? Oh, let's see. I think then. Maybe I wrote it down here. Yeah, in Medernach, Ermsdorf,
    and Eppeldorf. There were a lot of engagements there with our tank units. We were assigned to combat A. The 9th Armored
    Division broke them down into three combats, A, B, and R, and we were assigned to combat A. And a lot of our units, tank
    companies, were assigned to R. They were engaged in a lot of activities around these two towns, there are three towns.
    Christmas Eve, this is advancing quite quickly up to - a lot of engagements were involved before that, but we were not
    as engaged as a lot of other units that were fighting Germans up through the Hürtgen Forest. But our engagement there
    was that we had to repel any thrusts of the Germans to Bastogne, which was a key town to besiege because they had tremendous
    roadwork going to the English Channel through Bastogne. Of course, their goal was to reach Antwerp upon the English Channel,
    because that was a distribution point. All our supplies came through Antwerp, and they would cut us off. Christmas Eve
    - Major Philbeck - I didn't report directly to him, but I did work with him, he was the chief executive officer outside
    the commander, Colonel Karstetter - was going to take a position that evening so they could advance beyond Eppeldorf,
    I know that's the furthest, the town north, to engage the Germans and to repel them so that these other areas would be
    protected. The Colonel begged him not to go that evening, he should wait till morning. But Tommy was a very aggressive
    young, West Point graduate, in his thirties, but a tremendous individual. He mounted a tank with a crew, and they went
    along the street up there, along the road. Nobody knows for sure. The driver didn't remember himself what happened. But
    the commander sits up in the turret of the tank. He gives the command by his foot, and the driver, what he should be doing,
    supposedly he, instead of turning right, he commanded left, and there's a creek running there, and the tank overturned.
    He was in a position that all the explosive shells, thirty of them, they were mounted along the side, inside the tank,
    they came upon him, and he was wedged. Where the others could escape through the escape hatch, that was down under water,
    only six or eight inches of water, but enough to water - his head was down there and he drowned. They couldn't evacuate
    him. So he came back in a jeep that night. This was early, maybe four or five o'clock in the afternoon. And naturally,
    I never saw the Colonel cry before, but this was early. But we lost a very key officer, and particularly when he gave
    him the command to stay till morning. But anyway, that same evening, Christmas Eve, we had just passed Medernach, which
    was maybe 300, 300 -400 yards south of the little town of Ermsdorf. There's a lot of little towns, little community, farming
    communities. Being Christmas Eve our chaplain was assigned to one of the other combat commands, so I said I'd like to
    - we saw that little church we went by, "I'd like to go to that church." I was very religious. I was a Catholic, brought
    up as a Catholic. I took eleven soldiers and went to this little church. The minister was difficult to understand. I think
    he spoke Flemish, which is Belgium, Luxembourg, whatever it is. But there were very few person
