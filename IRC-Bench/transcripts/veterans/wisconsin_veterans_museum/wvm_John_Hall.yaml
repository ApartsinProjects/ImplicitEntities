collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: Let's just start from the top. Tell me a little bit about where you were born and your upbringing and what you were
    doing prior to the attack on Pearl Harbor in 1941.
- speaker: Respondent
  text: I was born in Madison, WI on January 3, 1924. Pearl Harbor in December 7, 1941 I was 17 years old, graduated from
    Madison West High School in June of 1941.
- speaker: Interviewer
  text: After Pearl Harbor?
- speaker: Respondent
  text: Let's see, no, before Pearl Harbor. I was working, I believe, at J. H. Findorff and Sons in the Fall of 1941, for
    the big pay of $10 a week as an apprentice carpenter.
- speaker: Interviewer
  text: Did you consider going to school or were you just going to pursue things--
- speaker: Respondent
  text: No. I did not consider going to school. I took college preparatory in high school because I didn't like shop courses.
    It was easier. But 1941 jobs were hard to get so I took a job as an apprentice carpenter. At that time I got a check of
    $9.90. Social Security was 1% so they took ten cents off and I went home, my dad took $5 for room and board. I got $4.90
    for working 40 hours a week. Slave pay today, but it was part of the learning process.
- speaker: Interviewer
  text: Did you grow up on the east side or the west side of town?
- speaker: Respondent
  text: South Madison. We lived on every street in Madison because it was cheaper to move than to pay the rent during the
    30's. Basically, I started in grade school at Franklin and finished in grade school at Franklin. I started West and did
    not graduate from West. I graduated from South High in Salt Lake City the last year my dad had a job in Utah in a copper
    mine, so we moved to Utah. After working for Findorff's, I worked there till probably until April of '42 and went to work
    at Truax Field building the barracks. I worked there for three months, working 7 days a week, 8 hours a day, making big
    money. Now I go from $10 a week, I think at the time at Findorff I was probably getting 14 bucks a week or something,
    I go from there to over $100. This was '42.
- speaker: Interviewer
  text: Now this was war work. This was something that happened after Pearl Harbor.
- speaker: Interviewer
  text: Was this typical do you think? Did a lot of jobs come after the war started?
- speaker: Respondent
  text: Oh, yah, a lot of jobs. People were tooling up and they were looking for viable bodies. I could have gone to Oscar
    Mayer; Madison Kipp was a big employer, 'cause of war related--
- speaker: Interviewer
  text: Madison Kipp? I don't know what that is.
- speaker: Respondent
  text: It's a big manufacturing place out on the east side, Atwood Avenue. It's still there. Run by the Coleman family. Reed
    Coleman. Are you familiar with that Coleman as the collector for all those charity drives in Madison?
- speaker: Interviewer
  text: Sounds vaguely familiar. I've been in town about seven years now.
- speaker: Respondent
  text: She's in the paper every other day. They take in a fund where they only start with a million bucks and I think they've
    got about 30 million in that fund, but that's neither here nor there. So I quit working at Truax Field and went and worked
    at Farragut Naval Reservation in Coeur d'Alene, Idaho, as an apprentice carpenter. My dad went out there as a timekeeper
    and I went out there. So, I'm pounding nails, building out there. Now I'm working ten hours a day, seven days a week.
    Get up in the morning, go to work, have a box lunch there, drive home, take a bath and go to bed and get up and do the
    same thing. So, November of '42, I came home from Coeur d'Alene and joined the Army in December of '42.
- speaker: Interviewer
  text: I'm interested in your decision to join the Army. You were making good money. You weren't starving to death by any
    means. Now what makes a fairly well paid, just after the Depression, what makes you join the Army for about $10 a week?
- speaker: Respondent
  text: Yeah, it went from $10. At Coeur d'Alene I was making, so I'm making $70 a week. I'm getting 35 hours overtime, so
    that's a 105 hours times $1.25 per hour. And guys when I went in service, they didn't believe what I was making. Why did
    I come home and join? Got tired of working and I guess the spirit, it's time to move on. So we, I came home, three of
    us guys from South Madison, all went to West, decided to join the Marine Corps. We had passed the first physical for the
    Marine Corps. In December of '42, Roosevelt froze all enlistments starting in January of '43 they were going to allocate
    the man power wherever they needed it. So we would have to wait until January of '43. This one friend of mine's brother-in-law
    was a recruiting sergeant for the Army in Madison, so he fixed up fraudulent enlistment papers so we went to the Army.
    Now there was about 50 of us from Madison, all went on the same troop train. In fact, my CPA, who graduated from high
    school, he was on the same troop train. So now we were all going in the Marine Corps, so where are we going to go in service?
    Wanted to go into tankers, one guy wanted to go to the Air Corps ground crew, and I said, "You guys want to go in the
    Marine Corps, the infantry is the same as the Marines." So I talked them into joining the infantry. So now we get to Fort
    Sheridan, some wise ass sergeant says to us, let's see, I'm still, 1942, I'm still 18 years old. He says, "I been here
    six years and I had three volunteers for the infantry, one, two, three." [laughs]. Then we knew it was not standing in
    line and reading comic books. Of the three, I'm the only one still living. One got killed exactly the same way I got hit
    in Germany. The other one got captured in Anzio and wounds and--
- speaker: Interviewer
  text: I got to interrupt a second. Okay, I'm sorry. I'm really sorry to interrupt.
- speaker: Respondent
  text: Let's see, Fort Sheridan.
- speaker: Interviewer
  text: You were one of three guys to ever volunteer for the infantry.
- speaker: Respondent
  text: Yeah, right. One, two, three. So we get our GI haircuts and they shipped us to Salina, Kansas.
- speaker: Interviewer
  text: That's Fort Riley?
- speaker: Respondent
  text: Near Fort Riley. It's about 95 miles away from Fort Riley. To keep this in chronological sequence, we get to Fort
    Riley and we see the big stars on the trucks and we don't know where we are going and this guy says, "Geeze, it looks
    like we're in the Air Force" cause they got this big Air Force base at Salina too. It was right about the middle of the
    country and they used it for stopping off and for a B17 base and they ended up with B24's and B26's - that whole base,
    a big Air Force base. We soon found out we were in the infantry. They put me in I Company, 301st Infantry, the other two
    guys went into K Company, no L Company of the 301st Infantry which was right across the ditch, some barracks. So we take
    basic training there from December of '42 through, well, whatever 13 or 14 weeks, and then we go on.
- speaker: Interviewer
  text: What sort of training?
- speaker: Respondent
  text: Infantry basic training. Physical conditioning and, was the training good? I thought, Army was excellent.
- speaker: Interviewer
  text: What about the equipment? Now this was fairly early yet?
- speaker: Respondent
  text: Yeah, a lot of time we didn't all have M1 rifles, we used old Springfield rifles from World War I. Earlier those guys
    even used wooden rifles. We were later than that. And I think we had gone in, and our pay when we went in was higher,
    I think at 30 bucks a month. And then during the first couple of months they raised it to $50. So we took training and
    the Army was excellent trainers, through repetition, you know, hard work. They prepared you. Got you in good physical
    shape, camaraderie, closeness, and you know, whatever you have to do when you get in combat.
- speaker: Interviewer
  text: Now, I'm sure in basic training you got the opportunity to mingle with people from a lot of different regions of the
    country.
- speaker: Interviewer
  text: I got the impression that you had traveled, so perhaps this wasn't new to you for a lot of guys.
- speaker: Respondent
  text: No, I just, our travel was moving from Madison, Wisconsin basically to Jeepoche in Utah where my dad had some relatives.
    So, no we were always on the lower economic elements, so we never did much traveling. If you ever rode a train as a kid,
    that was a big treat. So, we had, but one thing it did teach me was that I was fortunate that I went to a school system
    like Madison, Wisconsin, okay. When I looked at all those guys in service, I no longer was in a class like Macintosh.
    He was on the upper for echelon work, I was in the middle of the road. As I say, I took college preparatory because it
    was easier than going to shop and I had no desire to go to school. Did that after the war. But, you could see the competition
    that was spread out across the big country. There was a lot of people that are below you. If you get an education in Madison,
    Wisconsin. You know, doctors, lawyers, state professors. If you throw that all into that mix, it just lifts the boat,
    you know.
- speaker: Interviewer
  text: Were there people who were illiterate and just not as bright?
- speaker: Respondent
  text: See, when we went, we were all the same age bracket, 18 or 19. Most of the draftees were 19 probably and the guys
    that volunteered, and I was probably one out of 50 volunteered. So, 18-20 in that age bracket and then 39-42. Everybody
    else was gone. So, they'd have maybe in a company, platoon, two guys and the rest were all in the same age group. And
    they, some of them would last. One of them was the head chef at the Waldorf Astoria in New York. 39 years old, Cuban.
    And they wanted him to cook in the Army. And he says, I'm not going to cook. You guys drafted me, so get me in shape.
    He was husky and they got him in shape. And I don't know what ever happened to him because I left that Division. To keep
    on moving, we went from infantry basic, we went to Tennessee for maneuvers. And then by that time, I'm a corporal, one
    other guy's a corporal and the other guy is a PFC. And, so we take maneuvers. Probably in August, September 43, they asked
    for volunteers to go overseas. So, the three of us all volunteered. They took two of us. Kid, by the name of Lindy. The
    other kid's name was Rostrum. Lindy and I went, so we went from there, we ended up going to, I think we went to Fort Meade,
    Maryland. Lindy-- we both got there the same time, but I somehow talked the Army into giving me a furlough. And so I got
    a ten day furlough and he didn't get one. So, he went overseas quicker than I did. So, when he got to Italy, he joined
    the Rangers, got captured in Anzio. And, I've got to be careful about how I'm going to say this next part. This kid, Lindy,
    was from a staunch German family. His dad was a shoe maker on Monroe Street, believed that we were fighting the wrong
    enemy. That we should have been fighting England and whatever was related with England. But yet, he was an American, that
    threw out whatever his whole life was taught. Joined the service. Volunteered for overseas. Volunteered for the Rangers.
    Got hit at Anzio. Got captured. Came back after the war. Went to the university. Got a-- smart kid. Went to the university,
    got an English class and a lot of people that he didn't like, he sees them right there were he left his bringing. He told
    them, his quiz instructor one day, "Hitler had the right idea. He should have killed all of you." So, he quit school.
    Worked two jobs the rest of his life with shrapnel in his liver. Now he goes down to Wood and they, he gets a doctor,
    and he says, "You got a drinking problem." He's got, it looks like yellow jaundice. "I can't drink,
