collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: So why did you have such a long name? Was it just the tradition?
- speaker: Respondent
  text: Well, my real name is Maximilian, but the two grandfathers, Franz-Frank and Josef-Joseph, so those are given names,
    but I generally go by Max.
- speaker: Interviewer
  text: So why did you share that same similar first name? Is it for a reason?
- speaker: Respondent
  text: It's a European tradition I think.
- speaker: Interviewer
  text: Okay, so my question for you is you went in in '45, were you drafted? Did you enlist?
- speaker: Respondent
  text: No, I enlisted.
- speaker: Respondent
  text: Well, I knew I would be going in sooner or later. This was July of 1944 so I enlisted in the Navy before my eighteenth
    birthday which was July 23rd. I was eighteen in 1944, and I wanted to go into the submarines. But as I went into the submarine
    I reported to Great Lakes they had their quota. Then I was actually assigned to the amphibious group, and I was in the
    amphibious throughout the five years.
- speaker: Interviewer
  text: Why did you want to go into submarines?
- speaker: Respondent
  text: I don't know. It looked -
- speaker: Interviewer
  text: Looked fun?
- speaker: Interviewer
  text: Okay, how did your family feel about you enlisting?
- speaker: Respondent
  text: Oh, my dad, he was a soldier, too. He was a soldier, and he was always proud of being a soldier, but he was a soldier
    in World War I but with the German Army, and my both parents are from Germany so he felt very strongly that a person should
    serve his country. My mother didn't like it too well. You know, she missed me very much.
- speaker: Interviewer
  text: But that was typical.
- speaker: Interviewer
  text: Your father was a prisoner of war?
- speaker: Respondent
  text: Over during World War I.
- speaker: Interviewer
  text: He was a prisoner of war in France, wasn't he?
- speaker: Respondent
  text: Yeah, he was a prisoner of France for two years.
- speaker: Interviewer
  text: So when you went in, and I have heard this from some of the other World War II era veterans, were you sent to the
    South Pacific because of your heritage? Did they address that at all?
- speaker: Respondent
  text: I don't think so. I don't think so, but I thought about that a lot because my cousin was over in the Battle of the
    Bulge, and he died on his twenty-first birthday, January 20th 1945. And when I was in the service I said, "I hope I don't
    go to Germany, you know, you're fighting your own."
- speaker: Interviewer
  text: Was he an American soldier or a German soldier?
- speaker: Respondent
  text: American. He was born here, and he was my cousin. He was my dad's sister's boy. They had one son only. They took it
    so hard.
- speaker: Interviewer
  text: What was his name? That way we can remember him.
- speaker: Respondent
  text: Eugene Fallier.
- speaker: Interviewer
  text: How do you spell that?
- speaker: Respondent
  text: F-A-L-L-I-E-R.
- speaker: Interviewer
  text: I always try and do that so that people will remember beyond you.
- speaker: Respondent
  text: I never met my grandfather, but he was in the Austrian Army also. I have a picture of him in uniform.
- speaker: Interviewer
  text: Oh, how neat.
- speaker: Respondent
  text: This is only his - he was in the 75th Infantry Division.
- speaker: Interviewer
  text: So that happened before you enlisted, correct?
- speaker: Respondent
  text: Yes, he was older than I was.
- speaker: Interviewer
  text: So that was something that had gone through their minds? Okay, fine.
- speaker: Respondent
  text: Later on I thought I just wonder how Eugene felt, you know, being at the battlefield there against his - he might
    have shot his own cousins because we had cousins - our both sides of the family had a lot of relation.
- speaker: Interviewer
  text: Okay, are you from here?
- speaker: Respondent
  text: Yes, I was born here in Milwaukee. And Eugene took me out of the house on Easter Day, 1941. He took me out of the
    house to go at 8:00 o'clock at night to go to Mercy Hospital for emergency ruptured appendicitis and that was a good thing
    otherwise the doctor said it would have been over before the night was be over.
- speaker: Interviewer
  text: My brother-in-law ruptured his appendix on Christmas, and he was just sitting at the table, and we didn't know what
    was wrong with him so they took him to the hospital. So, okay, you got to Great Lakes, and you ended up in the amphibious
    group. Were you disappointed? Were you in different?
- speaker: Respondent
  text: No, I thought - well, we took twelve weeks of basic boot camp at Great Lakes. Then in October our group went down
    to Fort Pierce, Florida where they had an amphibious base for training, and we trained there for two months. You know,
    making landings with the boats I showed you with the landing craft.
- speaker: Interviewer
  text: Tell me about your job again because we don't have it on tape. You were an engineer, correct?
- speaker: Respondent
  text: No, I was called the engineer of that boat. I took care of the engine of this small landing craft.
- speaker: Interviewer
  text: Were you mechanically inclined at all?
- speaker: Interviewer
  text: So you enjoyed what you did?
- speaker: Respondent
  text: I became a diesel mechanic.
- speaker: Interviewer
  text: What did you think of your training? Was it adequate? Was it good?
- speaker: Respondent
  text: It was good, and we stayed down there in Fort Pierce, Florida for basically the landing, and then when we went up
    to Newport, Rhode Island to the base there where the ship's company was assembled. All the people that were ready ranked
    to go on the USS Hanover, a brand new ship that was being built, commissioned in Pascagoula, Mississippi. So we stayed
    up two months at Newport, and basically there we took other training, firefighting and duties that do you would have normal,
    you know, in battle.
- speaker: Interviewer
  text: Did anything interesting, do you have any good stories from your training? Any humorous stories? You had mentioned
    those two guys - had you met them at that point?
- speaker: Respondent
  text: No, I met them at the second time when I was called back in for the Korean War. That's when I met them. They were
    both from Jersey, and they were both clam lovers.
- speaker: Respondent
  text: We could not pass a stand out in New Jersey without them stopping.
- speaker: Interviewer
  text: Was that Stan?
- speaker: Respondent
  text: Stan and John Bundschuh.
- speaker: Interviewer
  text: So when you were in the first time were the people you served with from all over the country, or did you find that
    they were people from the Midwest?
- speaker: Respondent
  text: No, they were from all over the country the first time. The second time, here now the 1950 to 1952 Korean War, they
    were mostly from the East Coast, but when I first went in now they were basically from all over the country.
- speaker: Interviewer
  text: Had you ever been exposed to people from other parts of the country?
- speaker: Respondent
  text: No, not really. Actually, that was the first time I ever probably when I went from Great Lakes to Fort Pierce, Florida
    it was the first time probably out of the, no, not the -
- speaker: Interviewer
  text: Out of the Midwest?
- speaker: Respondent
  text: No, really out of Wisconsin. The only place I was to was Michigan when I was four years old.
- speaker: Respondent
  text: And now in the service I've been in every state but two.
- speaker: Respondent
  text: Yeah. Alaska and Oklahoma, and it's funny that I never hit Oklahoma, always skirted around it.
- speaker: Interviewer
  text: Well, we have to do something about that.
- speaker: Respondent
  text: That happens. Well, that goes back a while, and I think of some of some of things I don't remember certain parts of
    the Navy portion. I wish I would have paid more attention to it.
- speaker: Interviewer
  text: Well, he has bluebirds on his chest, and he has a skunk on his arm because he has a gaseous problem, but anyway he
    woke up the next morning, and he went, "Oh". His chest was burning, and he - you know, he did -
- speaker: Respondent
  text: Well, I saw many, many sailors that got tattooed, and you know - you saw those scabs that developed down there, aww!
- speaker: Interviewer
  text: Oh, it feels like a rug burn, too, for a while. It's just oww!
- speaker: Interviewer
  text: When did you get into the drum?
- speaker: Respondent
  text: I was in the Drum & Bugle Corps at Great Lakes. Well, I played the trumpet so I joined there and played the bugle.
    One day they needed somebody - we were going down to Northwestern. The Drum & Bugle Corps was invited to march there.
    So they needed a bass drummer. I never did that in my life. I volunteered, but I think we walked about four miles in that
    parade, and I played that bass drum. I had it out in front of me - boom, boom, boom, you know, just to keep cadence.
- speaker: Interviewer
  text: And then you went back to bugle after that?
- speaker: Respondent
  text: Well, I was there, but later on - when I'll tell you about the Hanover episode happened there that it's still in my
    mind.
- speaker: Interviewer
  text: Did you just join the Drum & Bugle Corps because you played the trumpet?
- speaker: Interviewer
  text: Or did it get you out of anything else, or it was just part of your day?
- speaker: Respondent
  text: It was just part of the day, yeah.
- speaker: Interviewer
  text: What was your role? Did you play every day? Were you part of a parade?
- speaker: Respondent
  text: We had parades right on base, you know, and practice marching and that so that in case they did want somebody in exhibition
    or something, you know, they would be available.
- speaker: Interviewer
  text: But you did have like a daily parade around the base -
- speaker: Interviewer
  text: Or anything 'cause they have like that quad area down there.
- speaker: Interviewer
  text: Then it was later you became the ship's bugler.
- speaker: Respondent
  text: I'm getting to that, Aggie.
- speaker: Interviewer
  text: Okay, good. And you just did that at Great Lakes, you didn't do that at Fort Pierce, did you?
- speaker: Interviewer
  text: Or at Rhode Island or anything like that?
- speaker: Interviewer
  text: When you were in training like this did you just have a normal day? You know, train during the day, have your nights
    off? Or how did that work for you? Do you remember?
- speaker: Respondent
  text: Well, at Fort Pierce, Florida I remember we had some night maneuvers to do because doing things at night is certainly
    different than the daytime, and the amphibious group might be called at anytime to deploy and hit the beach. So we did
    have some night training. But basically you had reveille was generally at 6:00 o'clock or so and then knock off free time
    at 4:30 or so.
- speaker: Interviewer
  text: Did you live in barracks?
- speaker: Respondent
  text: In barracks at Fort Pierce.
- speaker: Interviewer
  text: The open bay barracks?
- speaker: Respondent
  text: They were enclosed except they were screened in Florida 'cause it never got that cold but we used blankets it, you
    know, sometimes dropped to about forty degrees, and you had your blanket, but they were open sides. Then at Newport, Rhode
    Island that was during December, January, and February, and there was a lot of snow up there, but we were in regular barracks,
    you know, enclosed with heat.
- speaker: Interviewer
  text: So when you were up there did you do actual training on the boats?
- speaker: Respondent
  text: No, we did more of the - like I was in diesel -
- speaker: Interviewer
  text: More classroom stuff.
- speaker: Respondent
  text: More specific classroom things, yeah, and again firefighting type things.
- speaker: Interviewer
  text: When you finished training where were you sent? You mentioned you were going to the USS Hanover?
- speaker: Respondent
  text: Yeah, from Newport our group that had assembled, a ship's company, the whole ship's company we
