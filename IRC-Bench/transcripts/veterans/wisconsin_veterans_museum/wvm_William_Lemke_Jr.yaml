collection: wisconsin_veterans_museum
source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: Bill, why don't you tell us about your life before you joined the Marine Corps, at least the year or so before you
    went into the Marine Corps.
- speaker: Respondent
  text: Well, the year before I chummed around - most the people I chummed around with were older than I was and they were
    all in the service. Like, for instance, the class that I came out of Cleveland school with; there was eight people in
    there, four boys and four girls. So that was small right there, that generation. Well, anyway, nobody to hang around with
    really and you just felt lost, and I decided to join the Marine Corps. My brother was in the Army and I figured well,
    being in the Marine Corps - I didn't want to be in the Army and I didn't want to be in the Navy, and I thought that would
    be better, which, I mean. And, anyway, I joined up with another kid that I used to play ball with, Arnie Martin, and we
    went down there together and joined up and went in. And, actually, the last year I quit school. I was supposed to go in
    my senior year but I didn't; and I talked to a guy and he says, what do you want to be in the Marine Corps, and I said
    I'd like to be - I was fascinated by guns and everything; I'd like to be armor or something like that, like your dad was.
- speaker: Respondent
  text: 'And I thought that would be a good deal: you work on guns and everything; later on in life maybe get to be a gunsmith
    or something, you know, that would be leading up to something.'
- speaker: Interviewer
  text: So you were in vocational school for a year then?
- speaker: Respondent
  text: For a year.
- speaker: Interviewer
  text: Before you went in. So when did you ship out for boot camp?
- speaker: Respondent
  text: It was - like I think it was in August in '44.
- speaker: Interviewer
  text: '''44. And when you joined, was there a recruiting depot in Fond du Lac or something like that, was that where you
    signed up basically?'
- speaker: Respondent
  text: You have to go down to Milwaukee.
- speaker: Interviewer
  text: Milwaukee, sure. You took a physical there and everything.
- speaker: Interviewer
  text: Did you leave directly from Milwaukee for boot camp or did you come back -
- speaker: Respondent
  text: No, there was a delay in there, see. They didn't call you up right away. Now, the kid that I joined up with, he was
    sent to Camp Lejune and I was sent to San Diego, California. That just showed you how it worked, you know, at that time.
- speaker: Interviewer
  text: Yeah, okay, he would have went to Paris Island.
- speaker: Respondent
  text: Paris Island, right. So anyway, here's the deal. I went in and spent boot camp in there. And then you had what they
    called a ten-day furlough transfer. They'd give you ten days to go from San Diego to Fond du Lac and then you had to be
    back on the tenth day. Well, to begin with, when we went into - we left Milwaukee and then down to Chicago to go to boot
    camp on -
- speaker: Interviewer
  text: You took a train I assume.
- speaker: Respondent
  text: You took a train. But they had four or five regular troop transports, you know, they're troop cars. They were rougher
    than hell; they were like from World War I, you know. They hooked those on, any train that was going they'd hook you on
    the back train or anything. And with that group, we took the southern route. We went down south and through Texas and
    went that way. When I came home on the furlough on that transfer, we came, on that one, came right across. No, on that
    one I went on the northern route, got hooked up in the north and they sent us around. But that was a regular train. But
    there was so much train traffic at that time that they just put you on anything that was running from coast to coast.
    So that's okay, I got home. Really, we went on the northern route, that took longer than that direct shot, see.
- speaker: Interviewer
  text: I had a couple questions about prior to that. Did you know any of your buddies who went into the Marine Corps prior
    to that?
- speaker: Respondent
  text: No, I had no idea. The only kid I knew, Trainer[?], was when I joined up with, and I say he went to - and I don't
    even know if he went that same time as I did or not, they just call you up.
- speaker: Interviewer
  text: 'The other question I had: I was curious about your parents. They had to sign, didn''t they? And were they reluctant?'
- speaker: Respondent
  text: They were reluctant; they didn't want to sign.
- speaker: Interviewer
  text: But Marv, your brother, was already in the Army.
- speaker: Respondent
  text: He was drafted right away out of high school. He like graduated now, a week after his graduation he was called up.
    But, he was lucky. He would have been in there when it was really rough. To begin with, he went in Signal Corps. He had
    a good IQ and everything. He went in the Signal Corps and from the signal corps they put them in the Tank, at that time
    he went in Tank. And then they took him out; he had a good officer, and the officer said to him one day, why don't you
    - he said, you've got a high enough IQ or whatever, he said, get in the Air Corps. He said, the Tanks, he said, isn't
    a good place to be. So, he got in the Air Corps then, and he went to Rock Island, Illinois; he had like a year or two
    of college down there. Then they sent him down to Texas for airplane and he washed out at the time because by the time
    he was going through this deal, they were in North Africa fighting and they go back through the things - he still would
    have been in the Air Corps and maybe he wouldn't have been a pilot, he'd maybe been a copilot or a navigator or something;
    like, for a pursuit pilot, he wasn't good enough. Well, anyway, that lull in between there they got the hell shot out
    of the Army; they'd go back through the records, this guy was in the Air Corps, Signal Corps; put them back in the Tanks.
    And he was sent out in Tank. He ended up with Patton's Army. But at the same time, if he had been in North Africa, they
    got the shit shot out of them. Those Sherman tanks - they were like tin cans, you know.
- speaker: Interviewer
  text: Well, then, you were on a train; you got to boot camp. Anything you want to tell us about boot camp? I know it was
    rough, everybody knows that.
- speaker: Respondent
  text: It was rough, but I expected that. Where we lived down there, we lived a rough life. It wasn't that bad to me, so.
    But then, coming home from boot camp, I was going to tell you, actually, I would have been had two and a half days home,
    that was in September. And, boy, oh boy, that was - my Uncle Herman that lived a side of us, he died, you know right when
    I was home. And my folks - I used to plant potatoes for him and everything. So, my mother, especially, she said, I'll
    call up the Red Cross and that and your uncle died - see if you can't get a three-day extension to go to the funeral.
    Gets back; gets on the train in Milwaukee; the minute you get on the train they had SP's on the train I had; SP, he was
    a sailor you know.
- speaker: Interviewer
  text: Shore patrol.
- speaker: Respondent
  text: 'Yeah. And I went up and told him, I said I need traveler''s orders, I said, I''m three days over. Sure, he said,
    you know. I told him about that. He writes out an order: this man is going back to the thing and he reported to me. No
    other SP. Just like orders, they can''t touch you then until you get back. Well, at the time there''s maybe three training
    battalions on the West Coast - 27th, 31st and 34th, you know. Everybody''s out on ten-day furlough transfers, the officers
    aren''t even there, everybody''s off. So, this telegram comes in there saying that I''m going to be, and the Red Cross
    okayed it, you know, the telegram come in there, where the hell would they send it, they don''t even know what outfit
    - (blank part of the tape) - said have you got record of the telegram, you know, who in the hell. I said no, no. He said
    I''ve got to take your word for it, he said. And, he said, if I did word all of you characters coming in here with sad
    stories, he said, well. He said, I''ll tell you, you''re going to be in the Marine Corps a while, and he said, I don''t
    want you to get in trouble anymore, he said, I''m going to give you five days confinement. It isn''t going to be - like
    they call a deck court-martial, he said, you go here, put a guard - there was other guys there, put a guard on us, send
    us out in the boondocks. There they''ve got a group of tents, barbwire around, they didn''t have any (in audible) put
    a double barbwire fence. And there you go. Take off your uniform. They give you fatigues, you know, top and bottom; no
    underwear; two shoes, without strings in them; then they give you three shoestrings this long, once for each shoe and
    one for your belt to pull on. And then on the back of this thing is written a number. Mine was 556 in red letters across
    there, 556 was my number. And, then, there you are. So, the first day you''re in there there''s a lot of guys - boy, they''re
    tough cookies - they were in two, three campaigns, and they don''t want to go out there anymore, you know what I mean.
    And then they had in there summary court-martials, and then like these deck court-martials [for minor offenses]. See,
    the court-martial I had wasn''t really a court-martial, it was just the officer, no hearing or anything, you know. So,
    that''s okay. There you are. So my job with another guy - to begin with, in the morning they''d get you up at 4:30, and
    there was four guys to a tent, roll-up sides; and then they had a plywood floor in there, and they had four cots in there,
    one blanket for each cot, and there you were. Every morning, 4:30, first thing, you get up you''d take your cot, fold
    it up, roll up your blanket, put all the cots in the corner, you know. Then you go out for roll call; they call it. One
    morning they might call out "Lemke!", and you''d holler "556!", if he said, otherwise he might say "556!", and then you
    holler, "Lemke!", you know; they''d pull crap like that. Every time you come near any of the guards around there - a lot
    of them were just PFC''s and corporals - you put your hands like this. If you came within, like, three, four feet of them,
    you''d have to walk by them with your pants up like that so you wouldn''t hit them or anything like that.'
