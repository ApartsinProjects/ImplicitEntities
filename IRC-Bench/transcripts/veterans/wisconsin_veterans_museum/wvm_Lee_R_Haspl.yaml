source_url: https://wisvetsmuseum.com/learning-research/oral-history/
turns:
- speaker: Interviewer
  text: Tell me where--
- speaker: Respondent
  text: Where it all began?
- speaker: Respondent
  text: Well, I tell you, it began, I hate to tell you the year. Before I tell you how old I am, I ran into a guy last week
    in Las Vegas and he was about the same age as I am. And I asked him, how old are you? Must be about the same age. He said,
    "I tell you, I'm somewhere between forty and death." I thought that was pretty good, so, I'll leave that at that. But
    anyhow, it started for me in Prague, which is now the Czech Republic. That's where I was born. And my mother who was also
    born in Europe, but came to the United States when she was a little girl, and spoke English, or American English without
    an accent. So she spoke to me in English and my father spoke to me in Czech and I became bilingual. And that's why I,
    I do have an accent, but perhaps not as bad as some others--Kissinger, for example. But anyhow, that's where it started
    and she always told me about the United States, she was just homesick for the United States. This was in the '30s and
    of course then the war started and we were stuck there. And so I planned on going to the United States at my earliest
    opportunity, which finally came about after the war in 1946. And I, as a matter of fact, the whole family came to the
    United States, but then they returned, unfortunately. And two years later in '48, the Communists took over. I stayed here,
    and they were over there. So I was on my own from age fourteen on. I went to high school in New York, in Tarrytown, New
    York. And after finishing high school, 1950, I applied to two universities, University of California, which was my first
    choice, that's where my parents went to school--but nothing happened. The second one was the University of Wisconsin.
    They accepted me, so off I went to Madison, Wisconsin. And ah--
- speaker: Interviewer
  text: How did you happen to even know about Wisconsin?
- speaker: Respondent
  text: Well, there was another fellow in school, in high school that was from Illinois and he was kinda thinking of Wisconsin,
    so. It was Wisconsin or Minnesota, didn't make a darn bit of difference, but ok. So I was accepted.
- speaker: Interviewer
  text: Did your parents meet in college?
- speaker: Respondent
  text: My parents met in Europe, and my mother had a scholarship, the University of California, and so she was gonna go there
    and then my father somehow got in there too and that's where they married and actually, I should've been born in California
    and I could've been the next president of the United States, but now, they really goofed. And I told them that, now I
    cannot be president. Anyway, that's--
- speaker: Interviewer
  text: Did you have any experience during World War II? Was there conflict right around you?
- speaker: Respondent
  text: We still have a short wave radio, was in those days, were against the law. Punishable by death, and we had to have
    a little card on our radio, no televisions in those days. And the card--if you are listening to something like BBC, which
    would be on short wave, it's punishable by death. Mind you we were occupied by Germany during that time. So it was kinda
    scary. And one memorable thing I remember, I saw a dog fight, I was on the roof of our house and I saw an American plane
    and a German one was on his tail and the German shot him down and I saw him go down and I went over there to see if, it
    just, it made me so sad to see this poor American, a young fellow die. And but anyway that, that's not. My grandfather,
    I mentioned that radio, the Gestapo kind of suspected him and he, he was a Unitarian minister in Prague. And he was one
    of these people who liked to talk, saying, ya know, the sun will come back, ya know, right now we have clouds, but the
    sun will come back. Well, these, the Gestapo use to come over and listen to him and they kind of suspected he is not of
    the right sort of a fellow. Make a long story short, one morning at 7:00 in the morning, they broke into his home and
    they caught him listening to BBC. Seven o'clock was the time to listen to the news. Well, he immediately turned it, but
    it was too late. They took him away, they also took one of my aunts away. My aunt ended up in a forced labor camp. He
    ended up in Dachau where they killed him. So that was, that was, it was a sad time. I saw some horrible things, during
    those days. And it sort of made me a little older perhaps than my cousins when I came to the United States, my own age,
    they seem to me like they were about ten years younger than I am. Six years of war kind of ages you. So I say, well, that
    was the end of wars for me, no more wars; it's over with.
- speaker: Respondent
  text: Five years later, I get this letter from my friends and neighbors and I was being drafted. So I asked, when I went
    down there, I asked the Sergeant who was interviewing us, "Hey look, you know, I'm not a citizen." He said, "Well, if
    you don't take that one step forward--." Oh, they asked us, "Now if you agree with everything, you take one step forward
    and now you're in the United States Army. You don't take that first step, then it'll be very difficult for you to become
    an American citizen later on." Well, I just asked just to be sure. I had no intention of pulling out of this thing. So
    I went. And I was in the US Army. And, ah, it was kind of exciting at first. Ended up at Camp Chaffee, Arkansas for basic
    training; which was 105 millimeter artillery. And I tried to, I thought maybe I could get to Europe. I do have a facility
    for languages, so I took some language exams in the Army. I thought, well, maybe I'll end up in something to do with translation
    or what not. And after basic training, there was another course to take, leadership course, which I took because that
    put you another two, three weeks of not going overseas. Then they decided, well, you took all these language tests and
    one experience you don't have, that's Korea. So maybe that's what you should do, go to Korea and learn a little Korean.
    And I sort of got sort of a butterfly in my stomach. Fear, really fear. But anyway--
- speaker: Interviewer
  text: How much did you know about Korea when you were drafted? Were you very familiar with the war?
- speaker: Respondent
  text: 'Nothing. I was--my first semester here, that''s when the Korean War just started and I had a roommate who, one morning
    he had a telephone call and it was his brother who was killed in Korea. So I knew what was going on. That was about the
    last place on earth I wanted to go to. I thought, "Europe would be about where I should go to with my background." Anyhow,
    got to Japan and we ended up at some old Japanese Army base, World War II base. And this was interesting, it was Japanese
    who took M1 rifles out of the crates, was still cosmoline. They dismantled the rifles, cleaned them up, my god, they knew
    more about those M1s than what I learned in basic training. Went out had to test them at a rifle range. And then the next
    day, this was very fast. Next day, we were in a big area, like a football field and they started calling names. And they
    would announce the outfit and where people were going. And some were ending up in Japan. I thought, "Well, gee, this would
    be pretty good duty." You know, occupation. I could stand that. And then my name came up: 25th Infantry Division, Korea.
    And that''s when I got that butterfly again. I was scared. Next day or two--on a boat again to Inchon where we got off,
    and then they put us on a train, and then on a Jeep. I was a replacement into my outfit and actually, I felt pretty good.
    I got into my outfit with bag and baggage. And who comes to the Jeep but a first lieutenant. Nowhere I was a buck private,
    and he welcomed me, he was so glad to see a human being coming into the outfit. He took that duffle bag, he said, "C''mon,
    I''ll show you where to go." My god, this is unbelievable, a lieutenant helping a private. So, that made me feel really
    good. The spit and polish was not there, not in Korea--not on the line. And so everybody made me feel at home, and I adjusted
    and that was it for almost a year. Yeah, a year.'
- speaker: Interviewer
  text: What was your job in the--
- speaker: Respondent
  text: The first job was putting gun powder bags in a shell. In a 105 millimeter Howitzer shell. Depending on how far we
    had to shoot or what we have to shoot, it was either number five, number six, whatever. And then you cut off the rest
    of the bags, you put 'em in. Excuse me. And then they would announce what kind of fuse to put on. So have to put that
    fuse on. If we had to shoot at personnel, they used to call that cabotage, and that thing would explode about twenty feet
    before it hit the ground. And spread out. Or if we were just shooting at the ground, that was a different kind of a fuse.
    So, that was my job and after that, learn how to use the Howitzer and shoot that. Actually, I went from the lowest job
    in that outfit to being in charge of all six units in our battery and I left there as a Sergeant First Class in one year.
    So I was in the right, not that I was smart, I was in the right place at the right time. They ask me now, if you, a job
    call for a Master Sergeant, if you'd stay one more month, we'll give you that extra stripe. And I said, "Uh uh, that's
    it, I want out of this man's Army." [laughs].
- speaker: Interviewer
  text: So where were you in that when you first join the 25th?
- speaker: Respondent
  text: When I landed at the Punch Bowl, which is some place in North Korea. And that's where I started and they moved us
    around and if you were being shelled or shot
