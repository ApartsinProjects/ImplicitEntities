turns:
- speaker: Respondent
  text: Jose Alvarez, Jr.
- speaker: Interviewer
  text: And Mr. Alvarez, where do you live exactly? And that is in what City? Okay. And where were you born? San Benito, Texas?
    And your date of birth?
- speaker: Respondent
  text: October the 16th, 1923.
- speaker: Interviewer
  text: And the names of your parents, please?
- speaker: Respondent
  text: Benita Casarez and Jose Alvarez.
- speaker: Interviewer
  text: Do you have any brothers? Do you have any sisters? You were an only child. And did you grow up in San Benito?
- speaker: Respondent
  text: Yes, more or less.
- speaker: Interviewer
  text: Okay. And you enlisted, is that correct?
- speaker: Respondent
  text: Yes, in Brownsville.
- speaker: Interviewer
  text: Okay. And you were living at the time in San Bentio? Why did you enlist?
- speaker: Respondent
  text: To serve my country, I guess. (Brief pause in proceedings)
- speaker: Interviewer
  text: Now, Mr. Alvarez, I understand that when you were seventeen, you were in the Civil Conservation Corps.
- speaker: Interviewer
  text: And that was under President Roosevelt. Okay. And from the Civil Conservation Corps, you enlisted in the Navy? Okay.
    And why did you pick the Navy?
- speaker: Respondent
  text: I don'tknow, I guess I was just born for it.
- speaker: Interviewer
  text: Was your family in the Navy or -- And you just liked boats. Do you recall your first days in the Navy? What was that
    like?
- speaker: Respondent
  text: Naval Training Center.
- speaker: Interviewer
  text: The Naval Training Center. Where was that at? Here in Brownsville. That was in San Diego, wasn't it, Honey? No. No,
    it was in Brownsville. Okay. And do you remember your boot camp experience? That was in San Diego.
- speaker: Interviewer
  text: You did boot camp in San Diego? Okay. Do you remember any of your instructors? How did you get through it? Was it
    tough? Yeah? Any problems getting through it? Which wars did you serve in? The second World War, the Korean War and Vietnam,
    two tours.
- speaker: Interviewer
  text: Two tours in Vietnam, okay. When you were serving in the second World War, where exactly did you go? All over, if
    I was on the USS Tennessee for, I don'tknow -- So from '41 to '46, you were in Tennessee doing what? Oh, the USS Tennessee.
    The USS Tennessee. And so the USS Tennessee traveled through the Pacific Theater? Yes, the whole Pacific Theater.
- speaker: Respondent
  text: Okay. And just for my purposes because I am not real good on geography, when we say the Pacific Theater, give me an
    idea of what kinds of places that covered.
- speaker: Interviewer
  text: From the Philippines -- from the Philippine Sea to the -- what's the one up there in Alaska Aleutians?
- speaker: Interviewer
  text: And then down the Suarez, as far as the tip of South America. And Japan, and the whole Pacific. He was in 13 major
    battles.
- speaker: Interviewer
  text: 13 major battles in World War II? And you were never a prisoner of war, correct? And you were a Boatswain's Mate,
    First Class, right?
- speaker: Respondent
  text: So you saw a lot of combat. You saw a lot of combat. I would imagine quite a few casualties.
- speaker: Interviewer
  text: Yes. We had burials at sea practically every day. Burials at sea, the ones the kamikaze took out, a show of batteries,
    hit us a couple of times, so it was just very, very interesting.
- speaker: Respondent
  text: Tell me about a couple of your most memorable experiences during World War II.
- speaker: Interviewer
  text: My most memorable, serving a board the Tennessee, you got to see the world. You went to port to port to port, and
    battled the battle whatever. The Aleutian battle was the toughest one because they were pretty well entrenched in there
    and it took a lot of fire power to blast them out, to take them, the Aleutians. And do you recall your medals or the a
    wards that you received in World War II?
- speaker: Interviewer
  text: No, I know all the regular ones. Okay. Mrs. Alvarez is going to provide us with a list for that, is that right?
- speaker: Interviewer
  text: And how did you stay in touch with your family during that period, Mr. Alvarez? Stay in touch with your family. By
    trying the email -- V-mail. What was V-mail? Communications --
- speaker: Interviewer
  text: It was little pieces of a letter with a lot of black ink on it. Oh, they censored a lot of what you wrote, Mr. Alvarez?
- speaker: Interviewer
  text: Okay. And what was the food like? Really? Aboard the Tennessee, it was pretty good? Aboard the Tennessee it was pretty
    good? It was very fine.
- speaker: Respondent
  text: You had plenty of supplies.
- speaker: Interviewer
  text: Plenty. We supplied -- we took supplies on every time we went to sea. We replenished everything, and took on the stores,
    sea stores, whatever you want to call them.
- speaker: Interviewer
  text: Did you feel any stress or pressure during that time? Was there anything special you did for good luck? Keep out of
    the fire power, away. How did -- what did y'all do for entertainment on the Tennessee? Oh, we had entertainers from different
    places come out.
- speaker: Respondent
  text: Tell them about J.D. Wilson.
- speaker: Interviewer
  text: Oh, J.D. Wilson, he was a character, and he imitated people. He was an imitator, and then he did the shuffle, bounced
    up and down and cart wheels and everything.
- speaker: Interviewer
  text: And this J.D. Wilson, he was a fellow shipmate? Okay. Do you know where he was from? No, I think he said he was from
    Tacoma.
- speaker: Interviewer
  text: Okay. Other than J.D., were there any other entertainers that visited the boat that you can remember? And what did
    you do when you went on leave? There was no leave in the second World War.
- speaker: Interviewer
  text: Do you recall any particularly funny event other than J.D. Wilson? Tell them about the gun locker. Tell them about
    the gun locker.
- speaker: Interviewer
  text: Oh, ha, ha, ha, we got hit on the gun locker, and it blew it up, more or less, to pieces, and we had to scrape and
    get all the faulty ammunition -- well, they we had to shove it overboard. It was pretty scary there for a while.
- speaker: Respondent
  text: Yeah, well, I wouldn'tthink that would bevery funny, because then you lost all your guns.
- speaker: Interviewer
  text: I wasn'ttalking about that one. I was talking about J.D. Wilson making home brew in the gun locker.
- speaker: Respondent
  text: Oh, this guy, he got a bunch of juice, and he wanted to make -- it fermented on him. And he was on deck when it blew
    a part and it went all over, and he was out there with a swab trying to swab it out to get rid of it, and the officer
    exec looked by and says, what's going on down there? He said, Nothing, sir. This is recall fluid that I'm swabbing up.
    And it wasn't, it was the home brew that blew up.
- speaker: Interviewer
  text: Oh, my goodness. Did you keep a personal diary? And you've given us a couple of photographs, correct?
- speaker: Interviewer
  text: 'You''ve given us a couple of photographs, correct? And in one photograph that you''re pictured in, you''re pictured
    on the right. Do you recall the gentlemen on the left by name? No. COURT REPORTER: He is on the left? Oh, I''m sorry,
    you''re on the left in the photograph?'
- speaker: Interviewer
  text: No, he is on the right. If you looked at that long enough, do you think you could remember who it was? No, I don'tbelieve
    so. And when did your service end? He was formally discharged in 1972. 1972. And where were you at the time you were discharged?
    Okay. And what did you do in the days following your discharge?
- speaker: Respondent
  text: Try to get adjusted to the civilian life.
- speaker: Interviewer
  text: In San Diego, there's Harbor Drive. The ships are all at the 32nd Street Naval Station. He walked out of the 32nd
    Street Naval Station, walked down to 28th Street, walked into National Steel and went to work building ships.
- speaker: Interviewer
  text: Okay. You didn'twant to bevery far from the boats. And that was working for who? National Steel and Ship Building
    Company.
- speaker: Interviewer
  text: National Steel and Ship Building in San Diego. Okay. Did you use any of the GI Bill for educational purposes? Did
    you make any close friendships while you were in the Navy?
- speaker: Interviewer
  text: Marty Martinez was a Boatswain Mate also. He shared the bunk above me, and I was below him. And we relieved each other
    on duty.
- speaker: Respondent
  text: Marty got killed in Vietnam.
- speaker: Interviewer
  text: Yeah, he got transferred from the ship that we were on and went to Vietnam, and he walked a board ship, and the following
    day he got blasted out of the water by the Vietcong.
- speaker: Interviewer
  text: Are there any other friendships that you made while in the Navy that you still maintain close connection with?
- speaker: Interviewer
  text: Oh, yeah, the whole ship, the whole USS Tennessee. We have a reunion every year. Where do you have a reunion at?
- speaker: Respondent
  text: All over. The members host it in -- we hosted one here back in 80 -- wait a minute and I'll think of it -- '84, '85,
    I can'tremember right now. Anyway, we hosted; we had 400 people here for a week. We took over the Fort Brown.
- speaker: Interviewer
  text: So when is this reunion, every year? The date changes?
- speaker: Respondent
  text: Yes, the date changes, the place changes. We just -- they go all over the United States.
- speaker: Interviewer
  text: Have you had it yet for 2011?
- speaker: Respondent
  text: No, it's going to be -- it was last month. It was in New Orleans.
- speaker: Interviewer
  text: In New Orleans. Did you go to that one?
- speaker: Respondent
  text: No, we haven'tbeen able to go for the last ten years. He has been quite ill.
- speaker: Interviewer
  text: How are you ill, Mr. Alvarez?
- speaker: Respondent
  text: In 2000 -- in 1999, they discovered that he needed a valve replaced in his heart. On the 4th of January 2000, they
    replaced it. That night, he coughed and the wires came through his chest and he lost all his blood and he died. The doctor
    was standing right beside him in the CCR at Valley Regional. He reached in and pumped his heart. And Gracie, the night
    nurse, came in and plugged up the holes that she could, they got an operating room open, they got him in there, and they
    brought him back. When he came back, he was in a coma for nineteen days.
- speaker: Interviewer
  text: Oh, my goodness.
- speaker: Respondent
  text: During that time, he caught an in fection, staff -- this antibiotic-resistant staff infection. He had a stroke. He
    had pneumonia. They had opened him up again to clean him out, but that was the third time, of course, that he had been
    opened and they couldn't get him closed. So they had to air lift him up to Methodist Hospital in Houston, and they did
    the skin graft and they got him closed. They brought him back. He was in the hospital ninety days all together. The following
    year, they discovered he had colon cancer. They operated on that and got rid of that. Then they gave him some medicine
    that was recalled after that, but that medicine almost killed him.
- speaker: Interviewer
  text: Oh, my goodness.
- speaker: Respondent
  text: He just swelled up like -- his stomach just kept getting -- I said, Honey, you can'tfasten your pants, and he just
    kept -- and he passed out on the floor, and they took him -- and this was the result of that Statin drugs, and they recalled
    them. And then he has been getting better ever since, but it's just we don'tleave home. We stay here because the doctors
    are here. We never know.
- speaker: Interviewer
  text: Uh-huh. Earlier, Mr. Alvarez, Ms. Alvarez referred to the possibility that you were exposed to Agent Orange. That
    would have been in the Vietnam War? Do you recall where?
- speaker: Respondent
  text: I was on the Mekong River. I was man-handling a salvage boat to get the small craft off of the beach to get them back
    to the base to repair them, the ones that had been blown up by the Vietcong. So it was quite an experience. I didn'tthink
    I was going to live through it, but I did.
- speaker: Interviewer
  text: And how exactly were you exposed to the Agent Orange?
- speaker: Respondent
  text: Out in the open. The planes come by and bombarded the foliage to get it out of the way, and that's what contaminated
    the rest of the stuff.
- speaker: Interviewer
  text: And then you just breathed it in and got it all over you? Now, Mr. Alvarez, you were also in the Korean War, correct?
    And where were you serving in the Korean War? No, you were in France.
- speaker: Interviewer
  text: I thought you went to France. And that was to build some boat yards or some air fields? No, we built an air base there.
    An air base, okay. Okay. And your job then at that time?
- speaker: Interviewer
  text: Strictly maintenance. With whatever happened there, I could do it. Yes, but they also had him as the military police
    -- -- because he could speak the language.
- speaker: Respondent
  text: Oh, okay. You spoke French.
- speaker: Interviewer
  text: Yeah, a little bit. What other languages do you speak? English and French -- And a little bit of Sangiric. A little
    bit of what?
- speaker: Respondent
  text: Philippine language. And a little bit of the different dialects from South America. A little bit of this and a little
    bit of that, because he speaks --
- speaker: Respondent
  text: No, I couldn'tunderstand them and they couldn'tunderstand me. To this date, I don'ttrust them.
- speaker: Interviewer
  text: When you were in the Korean War, did you see any combat over there at that air field? And there were no casualties
    then?
- speaker: Respondent
  text: No, but what was there -- and it's pretty interesting to talk about, the communists, of course, were in charge of
    the town practically, and they would hold these big dances and everything. And being in the military police, he would
    have to go and make sure that his guys didn't get into fights and all that. And. And his counterpart in the communist
    part, he would stand there and they wouldn't say nothing. They would watch. Pretty soon this communist guy turned to him
    and he says, You are not trying to convert me to democracy, and all that stuff. And Jose says, No, you believe what you
    believe and I believe what I believe. And he got along very well with everybody. And when he got transferred, the town
    took up a petition and they all signed -- all the store owners and everything signed this petition and took it to the
    base to keep him there because he was very popular over there.
- speaker: Respondent
  text: What did you eat when you -- what town is it that we were talking about that this --
- speaker: Interviewer
  text: Chateauroux. Chateauroux, France. Chateauroux, France. And so you were there from when to when? I would have to look
    on his DD-214 to tell you that.
- speaker: Interviewer
  text: About how many years? Okay. And what was the food like when you were there at Chateauroux? Okay. Do you remember anything
    in particular? You could tell them about getting the guys out of jail.
- speaker: Respondent
  text: Yeah, I had to get a couple of bottles of Cognac and take them with me, and go to the jail and bail these guys out.
    They got into trouble with the locales there. So, that was pretty interesting.
- speaker: Respondent
  text: He told me that he would take a big loaf of bread and two bottles of wine, and he would go and he -- the French officials
    would be sitting at a table playing cards in the front part of the jail, and he would just go and put the bread and the
    wine on the table and go over in the corner and sit down, and wouldn'ttalk. And they would continue playing cards, and
    they would eat the bread and they'd drink the wine. And then one of them would say, Here is the keys, go get your guys
    and get out of here. I'd take them home with me.
- speaker: Interviewer
  text: Did the guys pay you back for the bread and the wine?
- speaker: Respondent
  text: No, they werevery ungrateful. The kept fouling up, as a rule.
- speaker: Interviewer
  text: What did you do for entertainment in Chateauroux?
- speaker: Respondent
  text: Oh, nothing much to do. There wasn't any entertainment at all.
- speaker: Interviewer
  text: Okay. I thought there were dances that you had to make sure the boys behaved.
- speaker: Respondent
  text: Yes, we had a couple of dances.
- speaker: Interviewer
  text: But you were always security? You didn'tever get to attend any?
- speaker: Respondent
  text: He attended them, but he didn'tparticipate.
- speaker: Interviewer
  text: He also had to go to the whorehouse and get his guys out there. He tells me that he sat in the kitchen and played
    poker with the madam's husband.
- speaker: Respondent
  text: Yeah. He liked to play poker.
- speaker: Interviewer
  text: Well, you know, I choose to believe what I choose to believe. It's okay by me. Did you join a veterans organization?
- speaker: Interviewer
  text: He belongs to all of them. He belongs to the American Legion, the VFW, the Retired Enlisted Men's Association, the
    National Association of Uniformed Services. There is another one too, I keep forgetting. Oh, the VFW.
- speaker: Respondent
  text: VFW, the main one.
- speaker: Interviewer
  text: And Vietnam, you did two tours. Do you remember when that was?
- speaker: Respondent
  text: That was in '66 to '68.
- speaker: Interviewer
  text: Wow, the tail end of it. Well, not really. It went on until what, '73? But '68 -- I was there in '68. My dad was working
    in Saigon, working at the base installations as a mechanical and architectural engineer. Other than the boat going up
    the Mekong, what else -- was that what you did in both tours?
- speaker: Respondent
  text: Yes, that's the main thing that we did over there, to retrieve the small craft that had been damaged by the Vietcong
    and bring them back to the base, and I'd float them and start repairing them.
- speaker: Interviewer
  text: And your ship at that time was still the Tennessee? What was your ship during the first tour in Vietnam?
- speaker: Interviewer
  text: The Lenoway? L-E-N-O-W-A-Y? L-E-N-A-W-E-E. Okay. And was that the same ship during both tours? Okay. And you saw a
    lot of combat.
- speaker: Interviewer
  text: And a lot of casualties. Would you say more casualties than World War II or less? Well, a little bit more.
- speaker: Respondent
  text: And before we started our interview, Mr. Alvarez, Mrs. Alvarez was telling us about a boat-to-boat high line rescue
    --
- speaker: Respondent
  text: -- that you did because a fellow serviceman on another boat was injured and required emergency medical attention that
    could only be given on the boat you were on. Don'tcall them boats.
- speaker: Interviewer
  text: I'm sorry, ship. Ship. I'm sorry, Mr. Alvarez.
- speaker: Respondent
  text: A boat is something that's carried on a ship.
- speaker: Interviewer
  text: A boat is something that's carried on a ship.
- speaker: Respondent
  text: Right, and they salvaged boats that he ran up to work on that were carried on the Lenawee.
- speaker: Interviewer
  text: Okay. I apologize. That ship-to-ship rescue, do you remember the name of the serviceman that you brought across the
    high line?
- speaker: Interviewer
  text: Was that a very scary experience? How exactly did you bring him across? Did you rig some kind of a basket?
- speaker: Respondent
  text: Yes, we had a basket for him, and we high-lined him from the one boat to the other.
- speaker: Interviewer
  text: How many -- what was the distance you think it was? Across the boat, how far? Ship.
- speaker: Respondent
  text: The high line was passed from one ship to another, and we used the same line --
- speaker: Interviewer
  text: How far was it, Honey? How far were the two ships? They couldn't get together too close -- -- so they were, I would
    say, 250 feet.
- speaker: Respondent
  text: Wow. And of course, the sea wasn'tcalm while would were doing this.
- speaker: Interviewer
  text: No, it was pretty rough. So, you would say that was a very stressful experience? After you were doing ship building
    in San Diego, what did you do after that? I retired from there.
- speaker: Respondent
  text: Okay. And then took it easy. We went traveling. We had a 5th wheel and we went traveling so I could go so mewhere.
- speaker: Interviewer
  text: Where all did you travel to in the 5th wheel, Mr. Alvarez?
- speaker: Respondent
  text: Well, going up and down the coast and --
- speaker: Interviewer
  text: We went as far as -- in the 5th wheel we went -- we did the Grand Canyon. We did Reno. We did Las Vegas. We did Texas.
    We did Washington and Oregon and California and all of that. We went down to a little bit in Baja. And we came here and
    his momma was sick, so we left and took care of her for a while, and then she died. But by that time we bought a lot,
    so we just stayed.
- speaker: Interviewer
  text: And Mr. Alvarez, for the record, you have been married to Ms. Alvarez for 61 years? Yeah, that's quite a bit, along
    time. A long time. And how do you think your naval service affected your life?
- speaker: Interviewer
  text: It just made a better man out of me. In my way of thinking, and my way of expressing myself. Can you be more specific?
- speaker: Interviewer
  text: Well, I was more or less like a mediator, sort of, between the groups, the different people that came a board ship
    at a different area.
- speaker: Interviewer
  text: Okay. And you think that your experience in the Navy caused you to be able to in fluence people to compromise?
- speaker: Respondent
  text: He learned to like a myriad of different people. He found out that people are great, and that shows in everything
    he does and everything he says.
- speaker: Interviewer
  text: You would a gree with that, Mr. Alvarez, that your exposure to all the different people and all the different cultures
    -- -- caused you to be more likeable of people in general.
- speaker: Respondent
  text: I was NCO-IC of town patrol in Chateauroux, France. Noncommissioned Officer.
- speaker: Interviewer
  text: Noncommissioned Officer, responsible for the group. And I had to go get the guys, like she said, with a couple of
    bottles of Cognac or something and a loaf of bread or some cheese or something.
- speaker: Respondent
  text: So the guys didn'tever resist you. They would just cause some problems in the locals' -- They would get drunk and
    loud.
- speaker: Interviewer
  text: Is there anything that we have not covered in this interview, Mr. Alvarez, that you would like to cover? Mr. Alvarez,
    thank you very, very much. Why don't you ask him what he thinks of the United States of America? Okay. What do you think
    of the United States of the America, Mr. Alvarez?
- speaker: Respondent
  text: The best country in the world, but I don'tlike the way it's going.
- speaker: Interviewer
  text: What don't you like about it?
- speaker: Respondent
  text: I don'tlike the intrusion in other people's lives, that we have created this mess, which is more or less a misinterpretation
    of things that happen. In other words, when we did something for the people on land and they took it backwards. They always
    took it backwards. They thought we were taking advantage of them every time. And we weren't. So we were trying to, more
    or less, democracize them, teaching them the right way to live.
- speaker: Interviewer
  text: In both World War II and the Korean War and the Vietnam War? But the people were resistant to that.
- speaker: Respondent
  text: There were people that were --
- speaker: Interviewer
  text: Were resistant to democracy. But you feel that today we --
- speaker: Respondent
  text: They weren'tresistant to democracy. They were resistant to being forced into democracy.
- speaker: Interviewer
  text: You feel, though, that today we are headed down the wrong road because we are interfering where we shouldn't be? And
    that that's not a good thing?
- speaker: Respondent
  text: No. I still think the same way.
- speaker: Interviewer
  text: Would you say we need to be paying more attention to what is going on here at home? Is that what you would like to
    see?
- speaker: Interviewer
  text: Mr. and Mrs. Alvarez, thank you so much for your time. The Library of Congress thanks you. I personally thank you.
- speaker: Respondent
  text: We thank you for what you're doing and --
- speaker: Interviewer
  text: It's coming a little bit late, we think, but yes, it definitely has to be done.
- speaker: Respondent
  text: I keep calling the President and telling him what to do, and he doesn't do it. Makes me mad. I've got his number in
    my book. You never get to talk to him, you talk to some lady that answers the phone. But I keep telling them, Stop being
    such a wimp. Do something. Just bang the gavel down and do it. And I know that there is things he can do. You know, Roosevelt
    did it. Truman did it. So I don't see why he can't do it. Maybe he'll listen.
- speaker: Respondent
  text: I told them last week, you know, and I still think it's a good idea, to take all the wires and the electricity carriers
    and all of that on the East Coast, when they were worried about this hurricane coming -- it's too late now, it was too
    late then, but do it now for the next time. Put them all underground. You dig big trenches, you put it in conduit so it
    don't get wet, and then you bury it. Okay? That puts lots of people to work. And I can'teven see the Tea Party saying,
    No, we don'twant our people to be with electricity, we want our people to have blackouts with no food and no refrigeration.
    I can'teven -- I don'tbelieve they can say that. And so that would be something that they would a gree with, and then
    they could do it and put all these people to work doing that. And then they can just sort of sneak it across the country
    and do it everywhere, because it's a damn good idea. And very needed.
- speaker: Interviewer
  text: I told them that.
- speaker: Respondent
  text: Thank you very much. I exercise my right to call him up.
- speaker: Interviewer
  text: I certainly understand that, Mrs. Alvarez. (End of History)
