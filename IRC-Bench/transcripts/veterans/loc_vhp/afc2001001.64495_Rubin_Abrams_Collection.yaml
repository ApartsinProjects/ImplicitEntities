collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Were you drafted or did you enlist into the war?
- speaker: Respondent
  text: I enlisted. I enlisted on July 7th, I think, or July 2nd, 1944 1942.
- speaker: Interviewer
  text: Where were you living at the time?
- speaker: Respondent
  text: In Brooklyn, New York.
- speaker: Interviewer
  text: Why did you join?
- speaker: Respondent
  text: Most of my friends went into the were drafted into the service and it was getting... I couldn't live with my family
    anymore. I had three sisters and myself living in the same apartment. I said, well, everybody's going, I'm going to go,
    but I didn't want to go into the army. I was working at the Navy Yard, Brooklyn Navy Yard, civil service job, and I saw
    how the sailors always got their food, worked on clean ships. So I decided to try the Navy and the Coast Guard.
- speaker: Interviewer
  text: Which wars did you serve in?
- speaker: Respondent
  text: World War II.
- speaker: Interviewer
  text: Did you make any close friendships while you were in the service?
- speaker: Respondent
  text: Well, we were close in the service, but after we got home, we all went different ways.
- speaker: Interviewer
  text: You didn't keep in touch?
- speaker: Respondent
  text: I didn't keep in touch with any of them, although I have that book I showed you with about 20 or 30 guys I used to
    hang around with on the ship.
- speaker: Interviewer
  text: Was there you said you were 20 when you joined?
- speaker: Interviewer
  text: Was there an age requirement, like, would they say, no, you are too young to join or you are too old to join?
- speaker: Interviewer
  text: They would take anybody?
- speaker: Respondent
  text: If you had the draft number, they would take you, unless you couldn't see, you couldn't hear, or you had flat feet.
    Generally, everybody that was called went.
- speaker: Interviewer
  text: Okay. How long were you serving for?
- speaker: Respondent
  text: Four years.
- speaker: Interviewer
  text: Did you want to stay why only four? Were you done?
- speaker: Respondent
  text: No. The enlisted was for four years. Although the war was over in 1945, August '45, I was in until June of '46 basically
    after we left Attu, Alaska, in the Aleutians. We turned our ship over to the Russians. In those days it was a lendlease
    plan. The US gave the Russians a lot of material and stuff.
- speaker: Interviewer
  text: Why did you decide to keep your diary? Just for
- speaker: Respondent
  text: I had nothing to do. So I kept a diary.
- speaker: Interviewer
  text: You kept a diary.
- speaker: Respondent
  text: I had a little office and generally I was usually off by myself and I had a typewriter and I used to sit and write.
- speaker: Interviewer
  text: Did you find yourself in any life or death situations ever?
- speaker: Respondent
  text: Oh, yeah, yes.
- speaker: Respondent
  text: There was planes, couple of planes dropped bombs at us, a submarine that put shot a torpedo at us but missed us. The
    bombs didn't hit the ship either. So we were very lucky.
- speaker: Interviewer
  text: Were you awarded any medals or citations?
- speaker: Respondent
  text: Citations, I guess.
- speaker: Interviewer
  text: Do you have them
- speaker: Respondent
  text: That's the thing that didn't I have that in here? Oh, you want the medals.
- speaker: Interviewer
  text: Just lift them up and show them.
- speaker: Respondent
  text: Want to hang it up?
- speaker: Interviewer
  text: What did you get that medal for?
- speaker: Respondent
  text: Here, it's let me see. I have to remember. This is a medal for the American Theater.
- speaker: Respondent
  text: When we did work around with the US Atlantic or Pacific. So most everybody got this. I think this is a Philippine
    medal, I believe, yeah, medal for the Philippine, Asiatic Pacific campaign. This is good conduct medal.
- speaker: Respondent
  text: I was a good boy in the service. I didn't get into any trouble. So they give you a medal.
- speaker: Interviewer
  text: So you were a US Coast Guard?
- speaker: Interviewer
  text: And what were your responsibilities and your duties? What did you have to do?
- speaker: Respondent
  text: I was a Storekeeper. I took care of all the supplies on the ship, the payroll, stuff like that. Most of the guys liked
    me because I always got the payroll ready on time.
- speaker: Interviewer
  text: How much did you guys get paid?
- speaker: Respondent
  text: How much did we get paid, I don't know. I think we started with, like, 36 dollars a month. I don't know what my last
    pay was as a chief. It was under a hundred dollars a month. We didn't get paid by the week. I don't remember, really,
    the amount of money.
- speaker: Interviewer
  text: What was your most memorable experience?
- speaker: Respondent
  text: Leyte Gulf in the Philippines.
- speaker: Interviewer
  text: And what happened?
- speaker: Respondent
  text: There was a big battle among all the big battleships and we were sort of, I'd say 10 miles from it, at the entrance
    to the Gulf, and we were watching the battle. It was just as if you were sitting in a movie and watching one of those
    scenes with the shells flying from one to another. The Japanese shells going to the Americans, the American shells going
    to the Japanese, very large battle. And then there were hundreds and hundreds of airplanes. Well, some tried to attack
    us but they missed, luckily, but I don't think they bothered with us because we were a very small ship.
- speaker: Interviewer
  text: What exactly was the name of your ship?
- speaker: Respondent
  text: Bisbee, USS Bisbee.
- speaker: Interviewer
  text: What was your mental state during the war? Did you think you were going to, like, make it through easily and, like,
    survive?
- speaker: Respondent
  text: I don't think we gave it any thought whether we were going to make it or not. We just tried to be comfortable. That's
    all.
- speaker: Interviewer
  text: What was your were you optimistic or pessimistic about the whole thing?
- speaker: Respondent
  text: I'm always optimistic.
- speaker: Respondent
  text: Even today I'm very optimistic.
- speaker: Interviewer
  text: What was your feelings toward, like, the opposition? Were you very angry with them all the time or did you just do
- speaker: Respondent
  text: We used to have some we used to drop off some marines on various beaches, not big ones, you know, eight to 10 or 12
    guys. They would go in and we would strafe the beaches. They would go in, look around, and come back. Now sometimes they
    come back, we had some Australian soldiers and they brought back Japanese ears to show that they killed a couple.
- speaker: Interviewer
  text: That's horrible. And this is a picture of your wife?
- speaker: Respondent
  text: Oh, she'll kill me.
- speaker: Interviewer
  text: And you met her while you were in the war?
- speaker: Respondent
  text: Yeah. We met when I was after we gave our ship to the Germans we got to Seattle, Washington, stayed there for a week,
    two, and then I was transferred to... made a chief, I was made a chief storekeeper and they transferred me to Coast Guard
    headquarters, and that's where Joan was in cryptography. She was in a naval office. I was in the Coast Guard office. Even
    though she was in the Coast Guard she was part of a group that was in the naval department and they used to send out,
    what do you call them, codes to all the ships at sea and her job was it was IBM machines. Let's see. I met her, I met
    her about January 1945, or February, and she was discharged also somewhere around January or February of '45 and I was
    discharged... no, '46. Sorry. 1946. I went to Washington, D.C. in December of January, January of '46, and she was discharged,
    I think, in February and I was discharged in June.
- speaker: Interviewer
  text: Did you get married during the war?
- speaker: Respondent
  text: No. No. But I'll tell you a story, take us two seconds. When I got home, I had three sisters, a brother-in-law, my
    mother and father living in a small apartment, and I just couldn't take living there. And after staying about a month
    I called up Joan and I said, if you don't get married with me I'm going to go back into the service. So September 28th
    we got married.
- speaker: Interviewer
  text: How did you entertain yourselves? What did you do for fun?
- speaker: Respondent
  text: I don't know. We played cards, listened to the radio. There's really no fun because once in that area you're just
    sitting tight because you could be called any time. We were at one point I think we stayed in general quarters for two
    or three days, and if we had to rest we just took a nap where we were in our general quarters station.
- speaker: Interviewer
  text: So is it a lot of just waiting around for
- speaker: Respondent
  text: Things to happen.
- speaker: Interviewer
  text: And then as soon as you were told something you went
- speaker: Interviewer
  text: Well, that's scary.
- speaker: Respondent
  text: Yeah, on occasion it gets scary when we were attacked by a couple of planes. Of course it's scary. My general quarter
    job was up at the range finder operator, way at the top. And the reason I was there is because I had the best vision for
    a range finder. That's how they picked the guy to run it. Someone would yell out the distance between the target and your
    guns and that was me.
- speaker: Interviewer
  text: Do you recall the last day of your service, like, what your last day was like?
- speaker: Respondent
  text: Do I remember my last day, I was probably happy. I don't really I don't even know where Joan was at that time. This
    was around the end of June. I don't even remember how I got home from Washington, probably train and then the subway.
- speaker: Interviewer
  text: But your service ended after the war was finished?
- speaker: Interviewer
  text: How come you had to keep serving if the war was finished?
- speaker: Respondent
  text: I was enlisted for four years. I wasn't drafted. Most of the draftees got out as soon as the war was over. But I enlisted
    July 1942.
- speaker: Respondent
  text: So my four years was up in July 1946. So I got out.
- speaker: Interviewer
  text: Was that frustrating that the war was over and you had to stay two summers?
- speaker: Respondent
  text: Oh, yeah, yeah. When you see most of the guys going and you are hanging around you feel a little bad, but girls always
    keep you company.
- speaker: Interviewer
  text: What was the food like? What did you eat?
- speaker: Respondent
  text: Oh, food was good.
- speaker: Interviewer
  text: It was good?
- speaker: Respondent
  text: Another thing just reminded me. There was another thing. I was on the chow line and before I got to the chow line
    I was reading a book on the fantail, the back of the ship, and the sun was very bright, and I think from the time I went
    into the interior of the ship from that bright sunlight, the interior's always dark, red lights, stuff like that, I got
    on the chow line and while I was waiting to be served I fainted, and to this day I don't know why, they used to call me
    Abe on the ship, and they said, look, Abe took a look at the food and he passed out.
- speaker: Interviewer
  text: All right. You told us that after the war you went into the furniture business which is not where you wanted to go
    and you told us that you were kind of part of the veterans organization. Do you attend any reunions?
- speaker: Respondent
  text: No. We have never had a reunion.
- speaker: Interviewer
  text: No. Do you watch
- speaker: Respondent
  text: You know, I know what that might be. We gave the ship away to the Russians and everybody went different ways.
- speaker: Interviewer
  text: You keep saying that we gave our ship away to the Russians. We gave it to the Germans.
- speaker: Respondent
  text: At least, no
- speaker: Interviewer
  text: Why did we have to give it away?
- speaker: Respondent
  text: We made a deal. The US made a deal with Russia to give them X amount of ships.
- speaker: Interviewer
  text: In return for?
- speaker: Respondent
  text: In return for nothing, just because they lost a lot of people. I don't think the US ever got the money for it. However,
    this little article, look at this, which I forgot, see the USS Bisbee, there it is here, returned by Russia in Yokosuka,
    Japan. Found way with the Bisbee. They were talking about the Gallup, which was PF47, the Bisbee was PF46, and look at
    this. This was in 1950. So it must have been during the Korean war and the ship was still around.
- speaker: Respondent
  text: We had it and gave it to the Russians. Look at this. We gave it to them in 1945 and this is in 1950.
- speaker: Interviewer
  text: Did you see combat?
- speaker: Respondent
  text: Leyte Gulf well, the combat started actually in New Guinea, the islands. New Guinea is a big island just above Australia,
    and there is a lot of small islands past New Guinea all the way up to the Philippines, and that was almost a whole year,
    not really a whole year, maybe about three quarters of a year, seven months.
- speaker: Interviewer
  text: Were you and everyone else on your ship aware of the Holocaust and what was going on?
- speaker: Respondent
  text: No, I wasn't.
- speaker: Interviewer
  text: You didn't know about it?
- speaker: Interviewer
  text: When did you find out about it?
- speaker: Respondent
  text: When I got home.
- speaker: Interviewer
  text: Were you horrified?
- speaker: Respondent
  text: Of course. We all were horrified.
- speaker: Interviewer
  text: So you go home long after the war. So you didn't find out about everything that was going until after?
- speaker: Respondent
  text: Well, you knew somethings, but
- speaker: Interviewer
  text: But you didn't know the
- speaker: Respondent
  text: We didn't have newspapers or anything like that like you have today. There was no TV like you have today.
- speaker: Interviewer
  text: Where were you when Pearl Harbor was bombed?
- speaker: Interviewer
  text: I know. So how was...
- speaker: Respondent
  text: That was 1941, right, December 7, 1941. Actually, seven months later I went into the service.
