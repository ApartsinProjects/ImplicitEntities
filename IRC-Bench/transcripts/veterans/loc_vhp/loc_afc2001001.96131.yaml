collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: I was born in Denver, Colorado, ah, 1926.
- speaker: Interviewer
  text: Harold A. Bradley and Helen M. Bradley.
- speaker: Interviewer
  text: And my dad worked for ACME, ah, ACME Fast Freight.
- speaker: Interviewer
  text: No, he worked at the, at the, what they called the docks.
- speaker: Interviewer
  text: Okay, I had three brothers, three brothers?
- speaker: Interviewer
  text: No, four brothers [laughter] and three sisters.
- speaker: Interviewer
  text: My brother’s name was Hal was the oldest, than Bob John, who passed away, and Dick.
- speaker: Interviewer
  text: My sisters were Ruth and Dottie.
- speaker: Interviewer
  text: Uh-huh, really.
- speaker: Interviewer
  text: No, what am I sayin’ wrong? I have two sisters, two sisters.
- speaker: Interviewer
  text: And, she was on my mother’s side.
- speaker: Interviewer
  text: My grandmother was the best grandma there ever was, yeah.
- speaker: Interviewer
  text: She took us everywhere and did everything with us, she, ah -
- speaker: Interviewer
  text: Nana was, I think, she was, ah, had her own car and we went up and picked peaches and we did, we did everything.
- speaker: Interviewer
  text: My elementary school was, ah, I can’t think of the name of the elementary school, Barnum, no, I didn’t go to Barnum,
    went to Lincoln.
- speaker: Interviewer
  text: Lincoln, yeah.
- speaker: Interviewer
  text: Lincoln one through six and then junior high was, ah, Byers Junior High.
- speaker: Interviewer
  text: I skipped one grade.
- speaker: Interviewer
  text: You know, I don’t remember doing that but maybe, I don’t remember doin’ that. But I remember I skipped a grade because
    I -
- speaker: Interviewer
  text: Yeah, I graduated.
- speaker: Interviewer
  text: Oh, I loved school.
- speaker: Interviewer
  text: An art teacher was Nicetrom [sp?], she was great. The, ah, English teacher I didn’t like at all, and of course, at
    that time they would, you didn’t step on the grass and you didn’t chew gum and you couldn’t do a lot of those things.
    Ah, chewing gum was one thing that I did one time and my teacher, Mrs. Putnam [sp?] put my under her desk [laughter] I’ll
    never forget it. I set under her desk because I chewed gum. [laughter]
- speaker: Interviewer
  text: I only walked to school.
- speaker: Interviewer
  text: Oh my goodness, ah, elementary school probably about 6 blocks.
- speaker: Interviewer
  text: We always had a big doings at Christmas time and I always remember my dad with his rolled-up cigar, you know how they
    used to roll them up. And he’d sit there and smoke that cigar [laughter] my dad would. My mom did nothing but cook, boy
    she did a lot of cooking and she could cook!
- speaker: Interviewer
  text: Oh, 4th of July we would buy firecrackers, daddy would go to the store and he’d buy all these firecrackers in a box
    and we’d set off. We went to Denver Country Club and they had fireworks there that were oh, fabulous. Denver Country Club
    was Speer Blvd and, where was it, University, I believe at that time. And, we’d always go there and celebrate 4th of July
    and the fireworks.
- speaker: Interviewer
  text: And Halloween, yeah, we would go, we would go along, ah, oh, gosh what was that street, ah isn’t that funny I can’t
    remember the street.
- speaker: Interviewer
  text: For trick or treating and we always went to these well-to-do houses and I can remember they had, ah, a whole box of
    things in the front and you could take, you could take, ah, big candy bars or you could take, they had all these things
    that you could take and they were the well-to-do in that, now where was it? It was down, ah, 6th Avenue, seemed to me
    it was 6th Avenue. I don’t remember.
- speaker: Interviewer
  text: Well, car trips with my grandma, of course, she always took us, I’ll never forget one time she took us up to Grand
    Junction to help a friend pick peaches. And if you’ve ever picked peaches, you have that fuzz all over you, it was terrible,
    terrible, but we was helpin’ this friend pick these peaches and my brother, Hal, and who else went Hal and my brother
    Hal and my brother I don’t remember Bob doin’ that. I don’t remember.
- speaker: Interviewer
  text: Byers, Byers Junior High.
- speaker: Interviewer
  text: Well, yeah, it was walkin’ distance [laughter] it was along way but -
- speaker: Interviewer
  text: Well, it was, ah, it was whole, it wasn’t a whole grade that you skipped, you skipped a half grade so it was let me
    see, how did we do that? I do know that when I went to high school which was South High School I went to because all my
    family went to South High School. South High School was at, ah, University, I used to remember those streets so well and
    I don’t remember 'um now. South High?
- speaker: Interviewer
  text: No, I don’t remember that, ah, all I remember is that, ah, rationing, they did a lot of rationing of, ah, meat, ah
    -
- speaker: Interviewer
  text: Oh, well that must have been -
- speaker: Interviewer
  text: That was the war, you didn’t do any -
- speaker: Interviewer
  text: Not the depression, I don’t think I remember any of that.
- speaker: Interviewer
  text: You know; I don’t know that I had any favorites other than math, I loved my math, I always liked math. Ah,
- speaker: Interviewer
  text: Oh no! They let you take math.
- speaker: Interviewer
  text: And, some science though I didn’t particularly like science.
- speaker: Interviewer
  text: Maybe I didn’t like the teacher or something.
- speaker: Interviewer
  text: It must have been, yeah.
- speaker: Interviewer
  text: But then I went to the Emily Griffith during school year because I was taking welding.
- speaker: Interviewer
  text: Yeah, actually, and I was taking welding and what else did I take there isn’t that funny?
- speaker: Interviewer
  text: I know it isn’t, I know it isn’t.
- speaker: Interviewer
  text: But it was during the war.
- speaker: Interviewer
  text: And, so you did anything like that that you could better yourself during the war.
- speaker: Interviewer
  text: Not necessarily to become a welder but become, what they called at the machine shop, was ah, spot welding. Ah, I did
    some, I can remember welding, I did some welding but, ah -
- speaker: Interviewer
  text: At Emily Griffith, yeah.
- speaker: Interviewer
  text: Right, right.
- speaker: Interviewer
  text: That’s it, they did and that’s why they hired me, I think in the first place.
- speaker: Interviewer
  text: I was only sixteen at the time and he wouldn’t, he couldn’t let me do some of the things on the machines and so-forth
    until I got, what eighteen, no sixteen you had to be at least seventeen I think before you could do some of those things.
- speaker: Interviewer
  text: We went to the movies on South Broadway and Weber Theater and, also, and Mayan Theater was both on South Broadway
    in about the 200 block and Mayan was First Avenue, I think. And, ah, I remember my brother won a bicycle and we all thought
    that was great except they didn’t let us ride, the girls couldn’t ride the bicycle, just the boys.
- speaker: Interviewer
  text: Mayan [pronounced "may on"] and Weber.
- speaker: Interviewer
  text: Weber, un-huh.
- speaker: Interviewer
  text: That’s what we did to be able to go to the movies, we would deliver these flyers that they had and we’d run up and
    down, up and down the block, ah, from Alameda to 1st Avenue and deliver these flyers, I’ll never forget that. And, then
    we’d get a ticket, a free ticket to the theater for something, you know, for a movie.
- speaker: Interviewer
  text: I won a Shirley Temple Doll at one of the theaters, they always gave away prizes at the theater and I won a Shirley
    Temple Doll once that I dearly loved and I don’t even remember what happened to that Shirley Temple Doll. But then, my
    brother won ah, bicycle, which of course to us kids, we were poor. We weren’t very wealthy, I’ll tell you and he won this
    bicycle.
- speaker: Interviewer
  text: And I worked, yeah, and I can still do them, I think.
- speaker: Interviewer
  text: Yeah, [laughter] I think I could ah, ah, "Roll Out the Barrel" I used to do that "Rollin’ Out the Barrel" and what
    was some of the other things we did? No I don’t remember.
- speaker: Interviewer
  text: Wasn’t long after I graduated that I started and, of course, Hurt and Company was just a half a block away from where
    I lived.
- speaker: Interviewer
  text: Yeah, on, it was on Kalamath Street and, ah, let’s see I lived at 283 South Kalamath Street and, and the Hurt and
    Company was at 218, I think, South Kalamath Street? Yeah, ah, and I started there.
- speaker: Interviewer
  text: I couldn’t weld, I didn’t weld but I did
