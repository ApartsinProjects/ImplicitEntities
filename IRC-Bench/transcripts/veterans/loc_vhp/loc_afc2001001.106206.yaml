turns:
- speaker: Respondent
  text: Oh well, I will tell you what, this was, this was quite a life. I was born and raised in the small town in the Midwest
    by the name of Waurika, Oklahoma, and I was raised on a farm, with a large family. And living on the farm, we learned
    to work, we learned to be conservative, and with a large family, we learned to share.
- speaker: Respondent
  text: Well, my parents are, hardworking farmer and my mother was a very hardworking woman, not only raised seven children,
    but her role in life was a housewife and preparing the food for that many.
- speaker: Respondent
  text: Well, I was right in the middle of the order. I had three older and three younger, we were a total of seven children
    in our family.
- speaker: Respondent
  text: Yeah, there were six boys and one girl. Like I said, the boys were, the oldest was a boy, then my sister was number
    two, then I was, then I had a brother that is number three, and I was right in the middle at number four. I had three
    older and three younger siblings.
- speaker: Respondent
  text: Well this is...
- speaker: Respondent
  text: Well the farm was primarily row cropping, we were growing vegetables, we were growing cotton, we were growing corn,
    and always had livestock. We had a livestock dairy and some dairy cattle and at that time period, we did not sell the
    whole milk, we sold the butterfat from the milk. We would take the butterfat milk and that was sold to make butter.
- speaker: Respondent
  text: Come into part ____.
- speaker: Respondent
  text: I have one brother that served in the Marine Corps in World War II, but no it was not, you see there is a little story
    that goes with the way I become a soldier. And what it amounted to, I began college and I will tell you what ____. Real
    good-looking girls in college and I was more interested in the good-looking girls than the academic work. And so I had
    a little problem they call probation. Yup, I come out on probation and my father told me, he said “you know son I maybe
    wasting my money on you, sending you to college, so we will try it one more time.” The second time probation came, he
    said “I think it is time for you to go to work.” So, what I did not realize at that time, that there was a state law that
    if you dropped out of college, you went immediately to the head of the draft list. So I dropped out of college and went
    to work and shortly there while, I was drafted in to the military. Well, as entering the military, I found rapidly that
    it was not a real bad profession, even though this was the year 1956 and 1957, which was post Korea days. I was rapidly
    promoted to Sergeant E5, and this happened within the first 20 months so I said, well, would make this a career. I said
    the military is not a real bad profession so without changing my mind too often, I said I will just re-enlist at 6 years
    at the time. So I did the essay and then they said I was administrative-type of an individual. And I said this administration
    is not for me, I said I want to be a little more active unit, so I was transferred from Germany back to Fort Benning Georgia,
    that even the infantry unit back at Fort Benning Georgia said this is not quite enough activity for me. So I started studying
    just a little about the army special forces. And I said, I think I will apply for the Special Forces. I applied for Special
    Forces and was accepted and transferred to Special Forces in 1961. And in 1961 after about a year and a half in the special
    forces training, they finally said, you know I am qualified to be Special Forces in to be duly and at that time period,
    they said you get to wear the full green beret. This was something that was a prestige symbol for us even to the point
    at that time period. The president of the United States authorized the green beret for the army Special Forces, and I
    was even selected to be the honor guard at the ceremony that officially authorized the official use of the green beret
    to Special Forces. So like I said, this was, this was an honor, which I did not realize at that time period that it would
    become an honor, but I thought it was just another detail to do, so...
- speaker: Respondent
  text: This is President Kennedy.
- speaker: Respondent
  text: I have decided since I wanted to be in military career, that I wanted to be the best that I could possibly be. And
    at this timeframe, I felt that the Army Special Forces was the absolute most elite unit in the military and I was fortunate
    enough not only to be accepted, but to fully qualify for all the provisions of training for that unit.
- speaker: Respondent
  text: They really, really felt, I felt like there was some pride, but there was also some apprehension on the dangers involved,
    yes. They were away, we live at a longer, greater distance apart, and I do not think that they really knew the type of
    training and the dangers and so forth involved with the training.
- speaker: Respondent
  text: Absolutely. That is uh, that is my understanding, sir.
- speaker: Respondent
  text: No. I did not have knowledge of this based upon the fact that the majority of our family food was raised on the family
    farm to not only to include the vegetables, but to include the animals and so we are, no, we did not uh, as children we
    did not realize that the country was in a depression.
- speaker: Respondent
  text: The Special Forces training was trained at that time period toward the Middle East and my initial reaction was I was
    training to go to an organization in Laos and this was changed right at the last minute and the Special Forces 18 that
    I was assigned to instead in Laos was reverted to Vietnam and this was in early, the training was in the latter part of
    1962 and my first trip in Vietnam was, began in February 1963 and at that time I went into the country in civilian clothes.
- speaker: Respondent
  text: Uh, yes we were and the mission that we had at that time period was what was called the Civilian Irregular Defense
    Group and what this was, was with the Vietnamese Special Forces and we were advisors to the Vietnamese Special Forces
    and we are training the civilian forces to protect their own villages and our primary mission was to go in and to train
    a group then move to another area and repeat the training process.
- speaker: Respondent
  text: That uh, that would kind of be a tough question. First of all it is absolutely a different country and a different
    culture.
- speaker: Respondent
  text: Okay. When I first got to Vietnam, I felt that it was absolutely a different culture. The different way of thinking
    and we were working with some minority groups in the country itself and really made it more difficult based upon the fact
    that sometimes we were having to work with two or three interpreters to get to the group of people that we were working
    with.
- speaker: Respondent
  text: Uh, I do not think complex would be quite enough. Huh, I believe it, let us say a new world.
- speaker: Respondent
  text: A Shau Valley and A Shau Valley was a valley that was in the northern part of the area of South Vietnam and right
    near and bordered the Laotian Border and some of the valley did run into the country of Laos, which made it a little more
    difficult because the southern country of Laos was not an enemy of the U.S. or an enemy of either the North Vietnamese
    or the South Vietnamese government at that time.
- speaker: Respondent
  text: Number one the location of the Special Forces Team A102 was right in the A Shau Valley. The A Shau Valley was in an
    area of a jungle, mountainous area with triple canopy vegetation and what it become known is right in the middle of the
    Ho Chi Minh trail. The team that I was assigned to and there is a little story goes with the way that I was assigned to
    this team, I was sent to Vietnam on my second tour and this was a second tour that I was there and the side major come
    after me and said, “Hey Bennie I want you to be my intelligent sergeant at the C team.” Now keep in mind that the C team
    are the real A Shauan people. Today, you know, maybe I am going to finally get a good assignment and so I arrived on the
    site and the sergeant major said “hey Ben I have got bad news. He said the intelligent sergeant at A102 was mid evac’d
    yesterday. He said Sergeant Earl Beatty was hit and had to go back to the States. He said I am going to have to divert
    you and send you there.” Well, I was on the site in this camp for about a little better than 100 days before we were attacked
    and everyday there it seemed like I was fired on by the North Vietnamese. This is the way they liked to zero their weapons
    so this was a super hot area and come to find out we had some indigenous soldiers there that were training and many of
    those soldiers had been taken from the Saigon jails and sent there because as a form of punishment because there were
    no place to go. The only way that you could get to that location was by air because they, the North Vietnamese and the
    Viet Cong owned the roads and owned the jungle so they were sent there and this in itself will show a little later that
    one of the companies during the battle decided to switch sides and fight with the North Vietnamese during the battle.
- speaker: Respondent
  text: Yes. The number one was that was a major infiltration route not only for personnel from North Vietnam, but more to
    supply the North Vietnamese armies that was in the South Vietnam area. There was a major re-supply route.
- speaker: Respondent
  text: It’s the Ho Chi Minh Trail, yes, and like I say, it was such at a point that it would be bombed everyday and they
    have had thousands of night rebuilding, and yes we, you know that was my job. I had large numbers of North Vietnamese
    units located to the point that we knew that we were eventually going to be attacked and the reason that we knew this
    is that we had some North Vietnamese soldiers give up, come in, and surrender to us prior to this. My interrogation with
    them revealed that a large part of the 325 Bravo Division was going to attack us in the bad weather, which it did happen
    as defectors indicated.
- speaker: Respondent
  text: The beginning of the attack was we could hear the digging in foxhole-type positions outside the camp in large numbers
    and we were in a situation where the illumination that we had was strictly from mortars because the weather was so bad,
    we could not get air support, and then on 9 March 1966, the battle began where we were receiving heavy mortar fires from
    82-mm mortars and 120mm mortars and receiving heavy fire from RPGs, and this developed in into a full scale battle where
    units were assembled and we were assaulting the complex itself.
- speaker: Respondent
  text: The structure of the camp...Well, I guess you would say the structure of the camp was a triangle with an airstrip
    at the wide part of the triangle. Airstrip was built with pierced planking the PSP-type metal for the strip and that run
    right to the front gate of the camp, and we had dug entrenchments all the way around the triangle, and they were attempting
    to rebuild the camp prior to the attack.
- speaker: Respondent
  text: No, the landing strip would be on let’s see...Yes, it would be only on the east side of the strip. The wide part was
    facing the east. The landing strip actually were on the north and south, as the A Shau valley were north and south, yes.
- speaker: Respondent
  text: The first attack with the mortars, they were super accurate. They destroyed most of the positions. The only positions
    that were not destroyed in the initial attack was the positions that had enough overhead cover to withstand the mortar
    fire and our team house, the American’s team house, the Vietnamese special forces team house, our ____ and all was destroyed
    immediately in the initial attack and what we found in this initial attack, then they would lit up and then a unit would
    come in, normally a company-sized unit, and this unit would get in place. There would be a heavy barrage of artillery
    fire placed on the camp and a mass assault through this and most of the minefield had been destroyed that was surrounding
    the camp had been destroyed by the artillery fire to such a point that the minefield was very ineffective against the
    mass assault, and there was a couple of things with the mass assault that needs to be noted and one was the company-sized
    unit of the North Vietnamese would assemble then get ready to assault and you would hear the soldiers chanting and so
    forth, and the first time or two their commander would pop off a little green star cluster and they will going to be a
    mass assault, and many of them knew they were going to be killed, but they were required to make the assault and first
    two to three of those, we were able to stop the mass assault and one in particular that I enjoyed myself and this was
    one of the before the assault, there would be a heavy amount of mortar fire thrown on our camp, and at one time, we heard
    the soldiers outside start chanting again and that the mortar fire just began so I happen to have a little green star
    cluster, and I popped this cluster off and hear the whole company of North Vietnamese soldiers come right in to their
    own fire. So they destroyed one of their own companies for us just based upon utilizing their own way of assaulting. So
    this ____ repelled this particular attack.
- speaker: Respondent
  text: A green star cluster is just a little handheld type of device that would just pop up in the air in short distance
    and some type of signaling what might have to be the best definition of it, yes.
- speaker: Respondent
  text: That is correct. It is a visual type of signal that was utilized at a time or two before to start the attacks, so
    I thought we would just try it again, and it did. They attacked right into their own overhead fire.
- speaker: Respondent
  text: Oh yes, that’s correct. That’s both day and night. It continued and they had just about the shelling and just about
    destroyed all of our mortar positions except in some way mine and I was fortunate that my alert position was an 81mm mortar
