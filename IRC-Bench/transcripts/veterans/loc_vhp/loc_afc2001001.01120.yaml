collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Mr. Adams, tell me, please, how did you happen to enlist? Where were you living at the time?
- speaker: Respondent
  text: I grew up in Ogdensburg, New York up on the St. Lawrence River. I graduated from high school in 1947 and had a scholarship
    to go to a two year forestry school in the Adirondack Mountains. I graduated from there in May of 1949 and in spite of
    having a two year degree, so-called associate degree in forestry, I really didn't know if I wanted to become a forester
    or not, so I got interested in the army and just enlisted in Syracuse, New York on July the 1st?
- speaker: Interviewer
  text: Now, what was going on in Korea at that time?
- speaker: Interviewer
  text: There was no whimper of any military action ahead?
- speaker: Respondent
  text: No, not that I knew about.
- speaker: Interviewer
  text: Okay. So it was really peace time for the United States at that time?
- speaker: Respondent
  text: Yes. It was a good time to go in the army I thought. Within a week or two I was sent to Fort Dix, New Jersey, and
    I almost changed my mind about the army after we met our first sergeant who called us you ratcruits. He was very firm
    and very forward, but there was one advantage you might say with our first sergeant. I can still remember him. I can't
    remember his name. When we went in the orderly room there was a TV in there, black and white, very small, but it was the
    first TV that I had ever seen. Fort Dix, New Jersey.
- speaker: Interviewer
  text: Do you recall what you were seeing on TV? What was the image on the screen? Do you remember?
- speaker: Respondent
  text: I don't remember anything. I don't remember now, but it was the summer of '49, whatever.
- speaker: Interviewer
  text: So what was it like for you to go through basic? What was the basic experience like?
- speaker: Respondent
  text: It was I guess pretty much what we expected. It was hard work but we did have time off I think after the first six
    weeks and I was able with friends to get into New York city and spend a weekend there and travel back and forth and --
- speaker: Interviewer
  text: So you got to see the sights a little bit of New York?
- speaker: Respondent
  text: Of New York, yes.
- speaker: Interviewer
  text: What was that like now? Had you been there before to the city?
- speaker: Respondent
  text: Only when I was a child. We went to the New York World's Fair in 1940. But New York was, I think what I remember most
    about New York City in those days was Sunday mornings peaceful and quiet and birds sweeping back and forth in the canyons
    and I was over awed when I saw the Empire State Building. So tall. I just got a crick in the neck looking at it. We, I
    guess we enjoyed ourselves on the weekend, and then went down to Grand Central Station and hopped on the train to go back
    to Princeton, New Jersey and then back to Fort Dix.
- speaker: Interviewer
  text: How long were you at Fort Dix?
- speaker: Respondent
  text: From July to September. Our training was three months, 12 weeks, 14 weeks I believe. And then I was assigned to Fort
    Lewis, Washington and again that train ride was quite an event going across country.
- speaker: Interviewer
  text: Did you have an inkling where you were going? Did they tell you where you were headed?
- speaker: Respondent
  text: Yes, they did. We had no conception of what it was like or where it was.
- speaker: Interviewer
  text: And that was a long train ride, wasn't it?
- speaker: Respondent
  text: That was a long train ride. We went to Chicago, had a chance to stay there for half a day, so I remember leaving the
    train yard and going down to the lake and looking, walking along or looking at the museums in Chicago and a few other
    things and getting back on the train. And we were so kind of over awed by the service we received on the train, white
    coated waiters just served us fine meals, linen tablecloths and the finest settings. I mean you could hardly cope with
    it. But it was nice. I can remember, oh, I can remember back at Fort Dix during the basic training one weekend I went
    to see some relatives of mine, my mother's on Staten Island, and I'll never forget this, it was just a little act of kindness
    but it loomed so big in my mind. You went through turnstiles to I guess go where you wanted to in and out of the stations,
    and for a ferry ride, and I started to go through the turnstile, and a little old lady said, soldier, she said, I pay
    your way to Staten Island. Here is a nickel. And I almost cried. I put the nickel in the slot and went through and went
    on over to Staten Island. I've never forgotten that. And even in 1949 wherever we traveled we were well treated and looked
    at with respect by all people. You could talk to anybody in those days. I guess my --
- speaker: Interviewer
  text: And of course coming off World War II there was, that was still very fresh in everyone's mind?
- speaker: Respondent
  text: I think it was, yes. Yeah, because the army was still in occupying Japan under General MacArthur. He was the Supreme
    Commander or Pacific Commander or something and he was pretty much in charge of everything there at that time.
- speaker: Interviewer
  text: When you went to Fort Lewis then did you have a specialty school that you were sent to?
- speaker: Respondent
  text: Yes. I was assigned to the 36th field, and we simply trained in field artillery areas.
- speaker: Interviewer
  text: Is that something that you were just assigned to? Did you have any --
- speaker: Respondent
  text: No, I had a choice.
- speaker: Interviewer
  text: You had a choice. What was the other choice? Do you remember?
- speaker: Respondent
  text: Infantry or engineers I guess, whatever, but I chose artillery. I had a sneaking feeling that the artillery might
    stay further behind the front lines in case anything happened and that was true. Made a good choice.
- speaker: Interviewer
  text: Where were you when the U.S., or I should say where were you when things started happening in Korea and you had then
    assurance that the U.S. was going to be involved in that situation?
- speaker: Respondent
  text: I was at Fort Lewis and we received the word on a Sunday morning to the best of my knowledge, and I know this sounds
    odd, but our greatest regret at the time was that we would have to get up and get dressed and go on duty on Sunday morning.
    No more Sunday mornings off to read the Sunday paper. We just had to go to work. And things picked up greatly. As time
    went on we, well I can remember this, you can ask somebody this, but when the National Guard and U.S. army reserves were
    activated Fort Lewis was one of the activation stations or points and for a while I was assigned to sit at the table and
    register in national guardsmen and U.S. army or reserve forces, and the area was critical because men 50 and 60 years
    old were called up and their wives, their children, their grandchildren were with them screaming and crying and carrying
    on, don't take him, don't take him, he's too old to go to war. That kind of thing got me for a while, although the young
    men were of course called up too.
- speaker: Interviewer
  text: Do you think anybody had any inkling at all what this conflict was going to turn into?
- speaker: Respondent
  text: I don't think so. No. We started getting news releases and everything and of course the North Koreans were moving
    steadily down toward Kaesong and they formed the Kaesong perimeter, but I don't think anyone realized the ramifications
    or implications or how big it would get back when I was at Fort Lewis in the artillery force that summer of 1950 but we
    would listen and different units would get activated and move out. I was assigned to go, as I mentioned, to Fort Sill,
    Oklahoma for survey school and it became Christmas and my turn came. My brother came down from Ogdensburg, 16 years old,
    on a bus, to spend Christmas with me. He brought two suitcases, one of them with his underwear in and one of them with
    presents, and when he reached the bus station I had already gotten telegrams from Fort Lewis, report to the 204th Field
    Artillery Battalion for overseas shipment. So when he came we just sat in the barracks at Fort Sill. I found out later
    I could have gone home and spent about a week or two with my, what do you call it, my loss, you know, everything because
    when I finally got out to Fort Lewis I found out that the 204th field everybody was home at Christmas down in Logan, Utah
    and other places in Utah. They were a Mormon outfit and I never encountered any better men than those, than the commander,
    Colonel Joseph --
- speaker: Interviewer
  text: You said it was a Mormon outfit? Was that --
- speaker: Respondent
  text: Mormon unit.
- speaker: Interviewer
  text: Was that by design, that it was Mormons?
- speaker: Respondent
  text: Not necessarily by design but mainly because everybody in the outfit was Mormons. They were from Logan, Utah and from
    around that area. So that was really in my favor, but the thing is when I got there I spent the time packing, packing,
    packing, putting stuff together and grumble, grumble, grumble, growl, growl, I could have gone home. I'm trying to remember,
    we shipped out in mid to late January and it's funny how you remember the little things because we got ready to go and
    got on the buses and got up to the embarkation point in Seattle, and the ship was there, I forgot her name, I have pictures
    of her here somewhere, and we were, I was sitting second row seat second seat back on the right hand side of the bus,
    and the first sergeant came aboard and yelled we need some help in the dining hall meal before we get on the ship, and
    I want you, you, you, you, you, you, you. Okay. KP. Well, from nice starched clean good smelling soldiers we came back
    on that bus a wreck and went on that ship stinking and greasy, so damn tired, I'll never forget it. And I used to say
    that I hated the navy because all the way across your kidneys I guess get activated and all and everything and whenever
    I had to go to the, what do they call the bathroom on a ship?
- speaker: Respondent
  text: The head. They were always being cleaned, they were always being locked. You couldn't get in. I hated the navy. Boy,
    that's funny. There's been little effects of that through the years too. But as far as washing things we could wash our
    clothes by tying along rope to them that was tied to the stern of the ship, throwing them overboard and watching them
    bounce in the wake way back there somewhere. They were salty, but they were clean. I guess you remember little things
    too. The Pacific can be kind and it can be wavy, and our stomachs weren't too strong at times and I can still remember
    the bunks that we had were like cots they folded up into the wall the bulkhead about four high. I could never begin to
    even get in the lowest one now. But one morning the ship rolled and we were in our bunks looking at this companion way
    coming down and well what do you call where you eat?
- speaker: Interviewer
  text: I'm not sure what you call it on a ship.
- speaker: Respondent
  text: Dining room or kitchen or whatever. But as we looked out to the right here comes a kid, soldier, sailor or soldier
    somebody carrying a huge pan of something. Just as the ship took a roll he was about even with that stairway, companionway
    and it tilted, pancake batter came dripping down that thing and we took one look and everybody just heaved. How you remember
    little things like that. We got used to the utensils and things at our meals sliding back and forth.
- speaker: Interviewer
  text: What was the food like on that ship?
- speaker: Respondent
  text: It was okay. Yeah, we were happy to get it. The ship, it was the USS General Anderson. I remember her name now. She
    had different classes you might say of people aboard. We were the lowest, so we were the common soldiers, and then up
    above were officers and nurses, there was a battalion of nurses up there, and I remember until our officers got after
    us we liked to do nothing better than tease the nurses, come on down, we'll have a party. Well, anyway, and then to show
    you how the services work the ship arrived at Sansapaul (ph), Japan, and it was quiet and everything, and all of a sudden
    you heard a great rumbling, hatches opening, and some of us went up on deck and took a look and they were swinging about
    two limousines over the side onto the dock, and here comes the captain and officers all in their dress blues, grays, greens
    and whatever and went ashore for a meeting. Korea, of course, tried to stage a riot and it was to have a summit or something
    I guess. Is this still taping?
- speaker: Respondent
  text: Okay. Well, we figured, well, wouldn't you know, our dream did come to an end in Kaesong Harbor though. I think that
    was January of 1951, January, '51.
- speaker: Interviewer
  text: What was it like just knowing you were, you had arrived and it was a new culture and this was going to be another
    shock for adjustments or what was that like? What were your thoughts like when you got there? You were in a boat before
    with a lot of other people going through the same situation?
- speaker: Respondent
  text: Yeah. I guess we were kind of resigning ourselves to the fact that we were going into a country where fighting was
    taking place.
- speaker: Interviewer
  text: Did you have a sense of really what the scope of the mission was there? Did you know that you were really I guess
    fighting under a U.N. --
- speaker: Respondent
  text: Yes, we realized that although we hadn't seen any other troops from anywhere. Ours was just tied up in harbor, unload,
    go ashore, get on trucks, go through Kaesong and go north where a campsite had been selected. We had very little time
    to talk with anybody else until we had been in camp for I would say a week or two. Then we were given some leave so that
    we could go down through Kaesong and you could mix and mingle if you wanted to. We were waiting in camp I think about
    three or four miles north of Kaesong for our equipment to come over. We used 155 millimeter self propelled guns and it
    took a while. Here's what it looked like right there.
- speaker: Respondent
  text: I have a lot of pictures of them there. So that took I guess the better part of a month. I got it. It's all detailed
    in a little book here. That was written by our commander. That was years after. Our camp, however and there was, this
    brought home to us the reality of war I guess, was directly opposite an island in the river that was a prisoner of war
    camp. It wasn't too close, it wasn't too far either, and we could see densely packed figures moving around in that camp,
    and so we kind of kept to ourself a distance from it. And then finally when our equipment came.
- speaker: Interviewer
  text: Who was, who commanded that camp? Was that a U.S. controlled?
- speaker: Interviewer
  text: Well, was it --
- speaker: Respondent
  text: I guess it was sort of what you call Republic of Korea controlled camp. North Koreans at that time controlled the
    camp. Of course this was all after the debacle at Chosen had already happened and Inchon (Ph) had just been taken by General
    MacArthur and the attack on Seoul had just taken place, and the North Koreans were bei
