collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: I volunteered for the Aviation Cadets in 1941.
- speaker: Interviewer
  text: And where --
- speaker: Respondent
  text: No, in 1942, sorry.
- speaker: Interviewer
  text: And where were you living at the time?
- speaker: Respondent
  text: I was in Knox College in Galesburg, Illinois.
- speaker: Interviewer
  text: And you joined because the war had already started?
- speaker: Respondent
  text: It started in September '41 or, no, December '41, two months after I started to college.
- speaker: Interviewer
  text: And why did you pick the service branch that --
- speaker: Respondent
  text: Oh, I think because it was a flying service [laughter].
- speaker: Interviewer
  text: Okay. And what do you recall about the first days of going into service? Did you wait a while, or did you go in?
- speaker: Respondent
  text: Oh, I went to Chicago and took the test for aviation cadets. And they directed me to go back to college until they
    called me, which didn't happen until March of 1943.
- speaker: Interviewer
  text: Uh-huh. So they called you in March of '43, and your first days in the service were where?
- speaker: Respondent
  text: First station was the old San Antonio Aviation Cadet Classification Center not unlike the Air Force Base.
- speaker: Interviewer
  text: Oh, okay. Were you -- as a military person you were stationed, right? Do you remember any of your instructors?
- speaker: Respondent
  text: Not by name. I don't remember anybody in basic training by name, but I remember the training very well [laughter].
- speaker: Interviewer
  text: Okay. And that lasted how long? Was it a nine month program?
- speaker: Respondent
  text: No. No. It was about six weeks, I think. We learned the Manual of Arms and to march without tripping the fellow in
    front of you and physical training --
- speaker: Interviewer
  text: And then where did you become --
- speaker: Respondent
  text: -- and a bunch of psychomotor tests to determine your ability to cope with flight training and sort out which branch
    -- navigation, bombardier, or pilot that you would go to when a school -- or when a class was available for it.
- speaker: Interviewer
  text: And so you were set for navigation then?
- speaker: Respondent
  text: Well, I qualified for all three, but the counselor at the end of the sorting session said that I had done best in
    the navigation section and recommended that I go that way because they were backed up for two years for pilot training
    anyway. And so I elected navigation.
- speaker: Interviewer
  text: And where were you -- where were you sent for the navigation program?
- speaker: Respondent
  text: Well, they were backed up for several months. The navigation course was 18 weeks long. So we were sent -- my class
    was sent to Arlington, Texas, to gunnery school for about six weeks to learn everything they had to teach us there [laughter]
    and then, finally, back to Harville, Texas, to navigation school which was, like I say, was 18 weeks long.
- speaker: Interviewer
  text: After you graduated from navigation school, did you go overseas immediately or was there --
- speaker: Respondent
  text: No. We went -- we graduated the 24th of December in 1943, and then went to Alexandria, Louisiana, to join the rest
    of the combat crew which was already assembled waiting for their navigators. And then we were there for about three weeks,
    I think, and flew some practice missions with our own crews. And then we were sent off to Grand Island, Nebraska, to pick
    up a new V17G and fly it to England.
- speaker: Interviewer
  text: Okay. And that took place in --
- speaker: Respondent
  text: That would have been in the winter of 1944 of Grand Island about February, and Newfoundland about a week later, and
    then on to England to first get briefed by crews that had completed their missions at Burlington, Fairgrove just outside
    London. And there after a couple of weeks of briefings to appoint us with navigational leads. We went on to our own bases
    where we were assigned as replacement crews. And I went to the 95th -- 95th bomb group and the 13th Wing in the 1st Division
    -- or, in the 3rd Division of the 8th Air force in East Anglia near a town called Eye, e-y-e. And the nearby town of any
    size was Diss, D-i-s-s.
- speaker: Interviewer
  text: Okay. And you've told me you had how many combat missions?
- speaker: Respondent
  text: Thirty-five. They kept raising the ante. It was twenty-five when I got there. And halfway through, they raised it
    to thirty. And then before I could finish thirty, they raised it to thirty-five [laughter].
- speaker: Interviewer
  text: Okay. And most of those missions were over Germany?
- speaker: Respondent
  text: Most of them were. Some to -- Czechoslovakia, one mission to Czechoslovakia, two in the Falklands, Arab, Romania,
    I remember one, and supplies to the Polish/British Resistance on one occasion, and after the invasion, we flew several
    missions to interfere with the German replacement troops trying -- interfering with their rail transportation.
- speaker: Interviewer
  text: Right. Now I've had you write two of your stories which I will include in the archives, but I wonder if you could
    tell me one or two of your most memorable experiences in that period where you had to fight combat missions?
- speaker: Respondent
  text: Completing the 35th mission [laughter].
- speaker: Interviewer
  text: That was the memorable [laughter] --
- speaker: Respondent
  text: It was -- the crews that completed missions had a special table in the mess line.
- speaker: Interviewer
  text: And what did that consist of?
- speaker: Respondent
  text: A steak dinner.
- speaker: Interviewer
  text: Oh, that --
- speaker: Respondent
  text: They called it the Lucky Bastards' table.
- speaker: Interviewer
  text: I've never heard that one.
- speaker: Respondent
  text: They had a sign on the table, "Lucky Bastards".
- speaker: Interviewer
  text: Oh, that's --
- speaker: Respondent
  text: And every crew that finished [laughter] --
- speaker: Interviewer
  text: -- got to sit at that table? Tell me -- you didn't lose any of your crew; is that right?
- speaker: Interviewer
  text: One person got a bit of shrapnel?
- speaker: Respondent
  text: The bombardier got a little sliver of shrapnel on the leg on a mission to the North Shore of Lake Constance.
- speaker: Interviewer
  text: Uh huh. -- awarded some medals or citations?
- speaker: Respondent
  text: I think I got the Air Medal five times.
- speaker: Respondent
  text: Which flying cross?
- speaker: Interviewer
  text: Okay. And I have a picture of you getting that from -- who is the Colonel?
- speaker: Respondent
  text: Colonel Witten, W-i-t-t-e-n, I believe.
- speaker: Interviewer
  text: Okay. Say a little bit about how you stayed in touch with your family? Did you use those, those --
- speaker: Respondent
  text: Well, the -- what do they call the -- the lower --
- speaker: Interviewer
  text: Yeah. Okay. That's the way you stayed in touch?
- speaker: Respondent
  text: And the officers on each crew had to censor the enlisted personnel's mail.
- speaker: Interviewer
  text: Oh my goodness. When you went on leave, was it mostly down to London?
- speaker: Respondent
  text: No, the routine in the Air Force in England at that time was somewhere in the middle of your tour, you were sent for
    a week of flak leave to report on the west coast of England between Liverpool and Blackpool which was normally a resort
    area, and they had taken over the main hotel for Air Force personnel.
- speaker: Interviewer
  text: Oh, I didn't know that.
- speaker: Respondent
  text: Practically every night the local girls came in to dance and get acquainted with the Yanks.
- speaker: Interviewer
  text: That was your entertainment, okay. Now it asks about photographs, and we'll record -- well, we have four or five good
    ones. And one of your crew, right, and can you name any people that you can recall that are in those pictures?
- speaker: Respondent
  text: Yeah. The people in the graduating class of navigation school, we lived together in the same barracks for -- and in
    the same classroom for 18 weeks so I knew them all by name. But I didn't -- I had -- it worked out mostly alphabetically
    the people who I knew better, but --
- speaker: Interviewer
  text: In the A's?
- speaker: Respondent
  text: Yeah. Mostly the A's, well, the whole classroom was A's and B's.
- speaker: Interviewer
  text: Right. I see. Okay. Did you keep a personal diary or just the letters that went home?
- speaker: Respondent
  text: I just wrote home whenever I had the time and the inclination.
- speaker: Interviewer
  text: Right. Now, do you recall when service ended?
- speaker: Respondent
  text: When the service ended?
- speaker: Interviewer
  text: Yeah, the day your service ended?
- speaker: Respondent
  text: Oh, yes. I was --
- speaker: Interviewer
  text: When did you get sent back from England?
- speaker: Respondent
  text: Oh, I came back from England about the 7th or 8th of August in 1944.
- speaker: Interviewer
  text: Yeah. And then stayed in the service a while longer?
- speaker: Respondent
  text: Oh, yes. I stayed in until after VJ Day.
- speaker: Interviewer
  text: Okay. And were you an instructor or what --
- speaker: Respondent
  text: I went from, well, within a week or so in harsh hotels in Miami Beach.
- speaker: Interviewer
  text: Oh, really?
- speaker: Respondent
  text: And were then assigned to active bases around the country. I went to Rapid City, South Dakota, as a navigation instructor
    to what quote, check out, unquote the navigators who had graduated but had not yet been overseas. And so I was there during
    the winter of '44 and into January '45 with the -- they had introduced the policy that returning navigators and bombardiers
    if they remained qualified for pilot training could then go to pilot training as an additional position. So I went in
    about March of '45 back to the Classification Center and qualified again for pilot training.
- speaker: Interviewer
  text: So then did you fly a bit?
- speaker: Respondent
  text: Well, from -- from the Classification Center I went to Arcadia, Florida, to a civilian base and for quote primary
    pilot school in the old Stillman primary trainer and completed that course and then went to Montgomery, Alabama, for basic
    training. And I didn't care about flying the AT6 and so after a week of, of --
- speaker: Interviewer
  text: Basic training?
- speaker: Respondent
  text: Well, it was -- yeah, I guess it was basic pilot school. I opted out and volunteered for tour [laughter] went into
    the service as a navigator.
- speaker: Interviewer
  text: Oh, no, yeah, but, fortunately, the war ended when they sent you there?
- speaker: Respondent
  text: Well, then I went to Arlington Field to get briefed and brought up to speed on celestial navigation which was much
    more important in the Pacific than it had been in Europe and was in that retraining period when V-E Day occurred in '45.
    And I decided it was time to get back to the civilian school after -- oh, when V-J Day came in August, why, I -- the course
    essentially dried up. And anybody who wanted to stay in had to volunteer for a long period, and I wanted to go back to
    college so I opted out of the Air Force. But I stayed in the Reserve from then on until I retired in 1970.
- speaker: Interviewer
  text: So I want to ask a few questions about that. I know you used the G.I. Bill carefully to finish college to go to medical
    school?
- speaker: Interviewer
  text: And you also had the G.I. Bill plus scholarship?
- speaker: Interviewer
  text: And got through med school. And when did you rejoin the Air Force? I mean I know you stayed in the Reserves, but then
    you rejoined the Air force.
- speaker: Respondent
  text: When I graduated from medical school in 1953, I went back on active duty but did my internship and residency at Cleveland
    City Hospital Civilian Institution but on active duty with the Air Force.
- speaker: Interviewer
  text: As a 1st Lieutenant at the time, right?
- speaker: Respondent
  text: I went back on active duty as the same 1st Lieutenant that I had been when I got out so [laughter].
- speaker: Interviewer
  text: And then they switched so that doctors became captains?
- speaker: Respondent
  text: Oh, they -- yes. The promotion schedule became very favorable after I was passed for it -- the time that I could benefit
    from it.
- speaker: Interviewer
  text: And so then as you were a physician you were stationed at the Air Force Academy, twice?
- speaker: Respondent
  text: I was at Scott Air Force Base first, then in the Air Force Academy, and then back to school in Rochester, New York,
    at the University in biology, and then back to Scott -- the headquarters job as the nuclear safety officer for the transport
    command.
- speaker: Respondent
  text: And then to -- it was all of us in the education department --
- speaker: Interviewer
  text: At Lackland, no not Lackland --
- speaker: Respondent
  text: In the personnel center.
- speaker: Interviewer
  text: Yeah, the center --
- speaker: Respondent
  text: Outside of San Antonio, Texas.
- speaker: Interviewer
  text: And then you had three years running a hospital in Lackland/London --
- speaker: Respondent
  text: From the four years at the -- in the surgeon general's office, and then my final assignment was the hospital commander
    and 3rd Air Force surgeon in -- just outside of London in England.
- speaker: Interviewer
  text: Until they closed that hospital, didn't they?
- speaker: Respondent
  text: They closed it in -- like the small dispensary operation there -- and moved the main clinical -- oh, what clinical
    facility we had had up to Lincoln D.
- speaker: Interviewer
  text: Okay. While we are summarizing your later years, and in closing, how would you say your military experience influenced
    your thinking about war or military in general or life in general? I know so much of your years have been --
- speaker: Respondent
  text: Well, I think there is such a thing as a justifiable war and, in such, I was willing to go to Vietnam as a physician
    and did, in fact, offer to volunteer for the job. But they didn't accept my -- (tape cutoff). So I had no active duty
    there, and I was in school during the Korean Conflict which was --
- speaker: Interviewer
  text: Because your 80, yeah, okay. And then you had five children who had -- who traveled a lot in military base, and they
    were actively -- one of your children was actively involved in the military also for a few years. And so they had -- they
    had a lot of the experience of being in the family of a military?
- speaker: Interviewer
  text: They learned to travel.
- speaker: Respondent
  text: Learned to travel.
- speaker: Interviewer
  text: I can't thank you enough for sharing as a Veteran your experiences. I know your family will appreciate having this
    recorded.
- speaker: Respondent
  text: You're welcome.
