collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: You were in World War II and you were in the United States Army Air Force; correct?
- speaker: Interviewer
  text: And your rank was?
- speaker: Respondent
  text: At the beginning, well, Aviation Cadet -- at the end, Major.
- speaker: Interviewer
  text: And where did you serve?
- speaker: Respondent
  text: Well, all through World War II itself, I was in the Continental Limits Training Command, Western Flying Training Command.
- speaker: Interviewer
  text: In the United States?
- speaker: Respondent
  text: In the United States, yeah.
- speaker: Interviewer
  text: Were you drafted or did you enlist?
- speaker: Respondent
  text: Well, I enlisted. I was deferred for several months to finish my college education, get my degree, and then I enlisted
    immediately upon graduation.
- speaker: Interviewer
  text: Where were you living at that time?
- speaker: Respondent
  text: Mt. Pleasant.
- speaker: Interviewer
  text: And why did you join?
- speaker: Respondent
  text: Well, they needed me.
- speaker: Interviewer
  text: Why did you pick the service branch you chose?
- speaker: Respondent
  text: I was always interested in aviation. I had my private license through the civil pilot training. It was offered by
    CMU and the local airport and it was just kind of a natural transition.
- speaker: Interviewer
  text: Do you recall your first days in the service?
- speaker: Respondent
  text: Well, I recall the first night. We arrived in the middle of the night and they put us in a big room and Master Sergeant
    told us what was expected of us and told us some things we didn't like and said everybody had better try to go over the
    wall or be shot, and we halfway believed him.
- speaker: Interviewer
  text: Tell me about your boot camp or training experiences.
- speaker: Respondent
  text: Well, the first few months it was at Santa Ana, California and it was a classification center for aviation cadets,
    and we were classified as pilot, navigator, bombardier, fighter pilot, or washed out. So we spent the first couple months
    there at that, and then plus the drill and KP and latrine duty and all the other things that you get in basic training.
    It was a new base and there was a lot of landscaping to do and so we did a lot of raking and carrying dirt back and forth
    from one place to another.
- speaker: Interviewer
  text: Do you remember your instructors?
- speaker: Respondent
  text: Well, my first flight instructor was a civilian pilot. His name was Peterson. I can't think of his first name right
    now but he was from Grand Rapids originally. He was a civilian pilot.
- speaker: Interviewer
  text: How did you get through your training?
- speaker: Respondent
  text: Well, everything was not bad. I didn't have any trouble. We got through it in good shape.
- speaker: Interviewer
  text: You served in World War II?
- speaker: Interviewer
  text: Did you serve during the Korean War?
- speaker: Respondent
  text: I was in the service during the Korean War. I didn't go to Korea but I had the opportunity. I had the choice of going
    to Korea or Bermuda and naturally I took Bermuda.
- speaker: Interviewer
  text: Where exactly did you go during your stay in the U.S. during the war?
- speaker: Respondent
  text: Well, we lived at whatever air base I was stationed at.
- speaker: Interviewer
  text: In Phoenix I spent two, primary flight training in Phoenix and also advanced training in Phoenix.
- speaker: Interviewer
  text: Do you remember arriving there and what it was like?
- speaker: Respondent
  text: At Phoenix, I got sick with the flu just at the time we were transferring from Santa Ana to Phoenix so when I arrived
    there, I didn't really know much of what I was doing. They put me in the hospital and then I stayed in the hospital for
    six weeks.
- speaker: Interviewer
  text: Did you see combat?
- speaker: Interviewer
  text: Tell me a couple of your most memorable experiences.
- speaker: Respondent
  text: Well, I don't know. This was not during World War II but during the Korean War, we were flying out of Bermuda one
    night between Bermuda and Dover, Delaware. We were hit by lightning three times. It damaged the airplane, welded the pitot
    tube, one of them shut and blew the other one off, and it went all through the tail, blew the ends off the elevator and
    poles up through the rudder.
- speaker: Interviewer
  text: Were you awarded any medals or citations?
- speaker: Respondent
  text: Not much more than the Good Conduct Medal and the Flying Safety Medal. I guess I was lucky at least.
- speaker: Interviewer
  text: Did you do any battle planning?
- speaker: Interviewer
  text: Did you sustain any injuries?
- speaker: Interviewer
  text: How did you stay in touch with your family?
- speaker: Respondent
  text: Well, by mail, U.S. mail and telephone. My wife and my children were with me after my graduation from flying school
    and all the time when we were stationed in the United States we were stationed in various places.
- speaker: Interviewer
  text: What was the food like?
- speaker: Respondent
  text: The food was good.
- speaker: Interviewer
  text: Did you have plenty of supplies?
- speaker: Respondent
  text: I would say so, yeah. We didn't have a problem with that.
- speaker: Interviewer
  text: Did you feel pressure or stress?
- speaker: Respondent
  text: Well, occasionally, yeah.
- speaker: Interviewer
  text: Is there anything special you did for good luck?
- speaker: Respondent
  text: No, I never worried about that. I guess I've always had somebody there protecting me.
- speaker: Interviewer
  text: How did people entertain themselves?
- speaker: Respondent
  text: Well, we just being stateside, we were able to use entertainment facilities, movies, theater.
- speaker: Interviewer
  text: What did you do when you were on leave?
- speaker: Respondent
  text: Well, I guess when I was in Germany after the war, we spent six months TDY there during the Airlift and went down
    to Garmisch, the Armed Forces recreational center where we went skiing and enjoyed the other activities that were available.
- speaker: Interviewer
  text: Where did you travel while you were in the service?
- speaker: Respondent
  text: Well, I was assigned to MATS, Military Air Transport Service in the Atlantic division and we traveled to all the islands
    and all the lands surrounding the Atlantic area, and that included England, Europe and France and North Africa, as far
    east as Tripoli.
- speaker: Interviewer
  text: Do you recall any particularly humorous or unusual events?
- speaker: Respondent
  text: Well, my memory isn't that good, I guess. I do remember one of my friends during the Airlift -- Frankfurt or Rhine-Main
    and Wiesbaden were air fields that were quite close together. There was a beacon which we had to check in at prior to
    departing for Rhine-Main or Wiesbaden. Well, after that, after the checking in there, you were identified as Rhine-Main
    or Wiesbaden. Well, this fella, he checked in but there was a screwup between the GCA and the area and the pilot, I guess.
    He was supposed to be going in to Rhine-Main and he landed at Wiesbaden. And there's no communication after you're identified.
    You're listening for GCA so all you do is follow their instructions. If you're misidentified and sent to the wrong place,
    you won't know it until you get there.
- speaker: Interviewer
  text: Were there some pranks that you or others would pull?
- speaker: Respondent
  text: I don't recall. I guess we had our share.
- speaker: Interviewer
  text: Do you have photographs?
- speaker: Respondent
  text: Well, I have a few but not too well organized. I don't have them with me.
- speaker: Interviewer
  text: What did you think of officers and/or fellow soldiers?
- speaker: Respondent
  text: We got along real well. I enjoyed their companionship. In fact, we had some quite close relations with roommates.
    I roomed in Frankfort. We had an apartment there and we flew together and so we got to know each other pretty well.
- speaker: Interviewer
  text: Do you recall the day your service ended?
- speaker: Respondent
  text: I do. I can't remember what day it was but I remember they came around and it was after the war and we were not very
    busy. We were flying continuation program with officers who already graduated but getting additional time and they came
    around and asked who would like to get out, who would like to -- so I volunteered.
- speaker: Interviewer
  text: Do you remember where you were?
- speaker: Respondent
  text: Yeah, Lincoln, Nebraska.
- speaker: Interviewer
  text: What did you do in the days and weeks afterwards?
- speaker: Respondent
  text: Well, we came home to Mt. Pleasant which was the home of my parents and my wife's parents, and within a month or so
    I accepted a job teaching over at Remus.
- speaker: Interviewer
  text: Did you go back to school at all?
- speaker: Respondent
  text: I'd already graduated and I didn't go back to school then. Later on I finished up my master's degree at MSU and I
    was teaching at Okemus.
- speaker: Interviewer
  text: Was your education supported by the GI bill?
- speaker: Respondent
  text: Master's degree was.
- speaker: Interviewer
  text: Did you make any close friendships while you were in the service?
- speaker: Respondent
  text: Yeah, yeah, we did, several.
- speaker: Interviewer
  text: Did you continue any of those friendships?
- speaker: Respondent
  text: Up until the '90s, probably, mid '90s. Most of them are dead now.
- speaker: Interviewer
  text: Did you join a Veterans organization?
- speaker: Respondent
  text: Yeah, I joined the American Legion.
- speaker: Interviewer
  text: Your career after the war, you were a school teacher?
- speaker: Respondent
  text: Yeah, and then a school administrator the last seven or eight years.
- speaker: Interviewer
  text: Did your military experience influence your thinking about war or about the military in general?
- speaker: Respondent
  text: Well, I don't know. I had a good experience in the military and as far as military life, I enjoyed it pretty much.
- speaker: Interviewer
  text: One of your children served in the military?
- speaker: Respondent
  text: Yes, I have three boys, all of them experienced service in the military. One graduated from the Air Force Academy,
    served in Vietnam.
- speaker: Interviewer
  text: If in a veterans organization, what kind of activities does your post or association have?
- speaker: Respondent
  text: To tell the truth, I haven't been very active as far as American Legion is concerned but they have get-togethers and
    dinners and things like that.
- speaker: Interviewer
  text: Do you attend reunions?
- speaker: Respondent
  text: Some. I attended the last one in Charleston, South Carolina. The squadron that I served with in Bermuda was stationed
    there and we all got together for a reunion.
- speaker: Interviewer
  text: How did your service and experiences affect your life?
- speaker: Respondent
  text: Well, I think that it helped me grow up, become more confident in my own abilities.
- speaker: Interviewer
  text: Is there anything you would like to add that we haven't covered in this interview?
- speaker: Respondent
  text: Well, I guess not. I don't know. I don't think that I have anything in particular that I need to add.
