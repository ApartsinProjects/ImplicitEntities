turns:
- speaker: Interviewer
  text: Mr. Abell, for the record, please tell us what war and branch of service you served in, what your rank was and where
    you served?
- speaker: Respondent
  text: Well, I was in the US Army, and I was in the-- during the war I was with the 80th Infantry Division and that's-- I
    stayed there, you know, all during the war.
- speaker: Interviewer
  text: Were you drafted or did you enlist in the service?
- speaker: Respondent
  text: I enlisted in the Marine Corps when I was 17 very early in my senior year in high school. And when I was examined,
    I went to be examined, everything was fine until I got to the eye examination and they determined that I was color blind
    and they wouldn't let me go in the Marines, but the man that was giving the test, he said, you would make a fine infantry
    man. So I went in the army.
- speaker: Interviewer
  text: Why did you join or why did you decide to go into the service?
- speaker: Respondent
  text: I think basically it's because everybody else was going, and I was so afraid that I would not pass the physical because
    I wasn't very big. I weighed 115 pounds, and so I was a little bit concerned but I never had a mark against me other than
    my color blindness.
- speaker: Interviewer
  text: Well, you mentioned that you were in your senior year in high school and you apparently didn't you would just have
    went directly into the service without graduating with your class at that time?
- speaker: Respondent
  text: Well, I had taken extra courses prior to this and I had enough to graduate. So when the time came for the graduation
    they had my cap and gown there, but I was on the front in Europe.
- speaker: Interviewer
  text: I see. Can you tell us a little bit about your first days in the service, your experiences in boot camp and the training
    you had.
- speaker: Respondent
  text: Well, I can even tell you going there, leading up to that. You know, I was very young and back in those days we didn't
    do any traveling. We had, you know, had no car, and I hadn't been 30 miles away from home up until this time. So I went
    in and everything was quite strange naturally and they sent me first to Camp Atterbury, Indiana and I was there, I don't
    know, maybe four days. Then I was sent to Camp Joseph T. Robinson in Arkansas. There were 79,000 of us there at the time
    when we got there. It was a relatively new place. It was tar paper shacks and there was a stove in each end of these shanties
    and we had to get up every morning. We were assigned dates to build a fire. We would have to build our own fire to heat
    the tarp black. It was all black and the smoke just hung down over it. I can recall that. But there was a sergeant that
    really impressed me. Of course we were all kind of young and he recognized this and he just buoyed up our spirits like
    you wouldn't believe, you know, he had such a way about him of making you feel easy and we really enjoyed having him as
    an NCO.
- speaker: Interviewer
  text: Did you have any trouble getting through this basic training as far as, oh, rifle training or just physical combat?
- speaker: Respondent
  text: I had no problem at all. I was expert marksman. I went through all of the training without any problems. The last
    two weeks of course when we first started they was just conditioning us but I was in good condition because I played three
    years of basketball and I was in really good physical shape, didn't tire me out. Went through all that type training.
    And the last two weeks of training was live ammunition. They took us out and they put us under live artillery fire. We
    crawled under machine gun fire, and actually used M1 rifles just like we were fighting in a war. But we thought that would
    prepare us pretty well but it really didn't, you know, you can't get prepared for it. And when I graduated from basic
    training. They gave us what they called a delay in route. We got to stop off at home for seven days. I went from Kentucky
    to Fort--Meade, Maryland, from Fort Meade, Maryland to Camp Kilmer, New--Jersey and then into Camp Shanks, New--York,
    and at that time everything was very secret. One night, oh, late at night they fell us out to leave, it was after midnight,
    and we got a board ship. It was the US-- I mean Her Majesty Ship Aquitania. 10,000 of us were on it, and they were very--
    it's understandable then there was a lot of German Uboats. And we started across the Atlantic and one night we passed
    a ship burning that they had hit and they gave us instructions how to behave in case we were torpedoed. It was in the
    North Atlantic and it was pretty chilly and they said if we got in the water we wouldn't live 15 minutes. And also they
    said if you fall overboard, we will not slow down. We will leave you there, and, you know, to be sure we understood. And
    the 10,000 of us ate out of one mess hall and you can imagine what that was like and especially British cooks and the
    Brits have a, you know, it was different, put it that way. But they were nice, good guys to know, and we would fall out
    two or three times a day to prepare to abandon ship and all that, you know, training. We crossed the Atlantic, I think
    it took us seven days but we went alone. They said that this ship is fast, and it was. It was a big four stacker, and
    we landed in Scotland and then they put us on a train to go into southern England. We got into London at night and the
    night we got there they bombed it. Well, that kindly put me off of London and we went into the southern part of England
    and we weren't there very long until we prepared to hit-- go into France. We got a board an open metal boat. I don't remember
    how many-- it wasn't big enough to haul too many but there were several of us on it. And we moved out and you could lay
    and look up and you could see all of these planes circling overhead and everything, you know, was going on, really active.
    We got just a little bit off shore and they didn't warn us at all. All at once it sounded like the side of that boat had
    been torpedoed. They had dropped anchor, and the chain dragging through that hole, it really got us all excited there
    for a minute. Of course we went on from there and we got to France and it was totally destroyed. The shore was totally
    destroyed. I wasn't there for DDay. They had pushed in land and we went a shore and then we started moving to the front.
    I'm not going to be talking much about the war but I'll let you in on my first day in combat. That really was an eye awakening
    thing. When I got to the front, they picked me and another fellow to guard a Jeep to another unit, and when we got there
    that Jeep had just left, but they said, "Come on. We'll put you in this one and you can follow them." And we would go
    into wherever it was, I don't remember where it was. But that Jeep ran into a roadblock and killed everything in it. That
    was my Jeep, the one I was supposed to be on. Well, that will sober you up. That will make you start thinking. So we stopped
    there and that night, when it got dark and it was a heavy forest there, we started to move forward and we got up to just
    about where that roadblock was and it was so dark you could move your hand like this {gesturing with his hand} you couldn't
    see your hand. And we were marching single file and we had our hand on the man's pack in front of us so we wouldn't get
    separated and we were walking along. All at once it sounded like there was about 20 guns cocked right in our ear and a
    man hollered "Halt." When he did it was just as if somebody hit you in the face with, I don't know what. Everyone hit
    the ground and fortunately it was an American unit that had come and taken that German roadblock. We went on through it
    and when we got out the other edge of that forest the moon had come up and we were walking along and there was bodies
    laying along that road and we went forward a little bit and stopped and stayed that night. And then, you know, after that
    it was-- things were really, every day was the same thing over and over.
- speaker: Interviewer
  text: Can you recall where it was you landed in France and were there any cities nearby or a territory name that
- speaker: Respondent
  text: I, you know, they never told us where we were unless we just happened to see a sign.
- speaker: Respondent
  text: We never got you know, I was a private and nobody gave privates any information. Anyway, no. I don't recall. It was
    on one of the beaches, but I don't know-- I can't recall which one. It was-- I don't know, I think it was not far from
    Le--Havre.
- speaker: Interviewer
  text: Le Havre. Okay. When you were in combat in an area what was the food like? Did you get good food?
- speaker: Respondent
  text: Oh, well, I'll tell you what we ate. Every day we ate Krations. They came in a little box like a Cracker Jack box.
    For breakfast they had a can of eggs and bacon and then you always had some kind of a sweet candy bar or like a candy
    bar, hardtack and also you got four or six cigarettes in each ration. Then when we moved up during the fight when we would
    move we usually carried three days with us of rations and during that time, of course, eating that day after day you got
    kindly tired of it, as you can well imagine, and we would have what they call a 10in1s. They would pull us back and one
    box fed ten men, and it was really good. But, like I say, for breakfast we had eggs and bacon. For lunch we had the best
    cheese, a can of cheese, it was very good, and a cracker and another candy bar and six more four or six, I forget which,
    cigarettes. And then for supper they had one they called corned beef and apple flakes and that was hard to take. It was
    terrible. But, you know, you get hungry enough you will eat it. But an experience that I had and I can still recall it
    well, the first-- my first three days in combat I had a knot in my stomach and I know I didn't swallow a bite for three
    days. Of course, after that they couldn't fill me up and I got to asking the other guys and everybody had the same thing.
    You know, you just get so tense that that's the way you feel. It's an experience, of course, that you just never get over.
    I think most of our fighting now, we did it in the daytime. Seldom did you fight at night. Of course there were exceptions
    to that rule, but every night on the front there was two men to a foxhole and we slept an hour and guarded an hour all
    night every night, and during the hour-- during the night we smoked all day and all night. In addition to those cigarettes
    that I told you about in the rations, they gave us two to three packs a day every day, and we smoked them all. We had
    the foxhole at night we would two of us, like I said, would be in it. We would put a raincoat or something over the foxhole
    and we'd stick our head under that raincoat and get a puff and then bring it out because you would smother under it there
    was so much smoke. So that's the way we ate and kind of the way we lived.
- speaker: Interviewer
  text: What time of year was this when you were
- speaker: Respondent
  text: This was winter '44.
- speaker: Interviewer
  text: Winter of '44. Now, did you pass from France into Belgium and then on into Germany?
- speaker: Respondent
  text: Into Germany, Luxembourg, Germany.
- speaker: Interviewer
  text: Was it cold in Luxembourg at that time in the wintertime? Did they issue you the right gear?
- speaker: Respondent
  text: Let me tell you what we were wearing and I'll start at the head and go down. We had a steel helmet. Then the helmet
    liner under that and then a wool knit cap under that we pulled down over our ears and we had a wool scarf and then next
    we had on a wool OD uniform. Beneath that I had a wool knit sweater and then very heavy long handled underwear and, of
    course, we had wool socks and combat boots. Even so and then over all of that we had a field jacket with a liner and we
    had a raincoat which we carried in our combat bag, if you can get, you know, just drenched and that's about the way it
    was. During the winter of '44, of course that was the Bulge, and I have a picture here that I could show you that the
    magazine, somebody sent me, that it shows and that's my division there {displaying photograph}. Bitter cold and I remember
    one day it was in the snow we got up early in the morning. We are moving up, and we started hiking. We had a combat pack,
    ammunition belt with eight or ten clips of M1 ammunition, canteen hanging on that. We had an entrenching tool. We had
    three to four bandoliers of ammunition around our shoulders. I had an M1 rifle. I had three rounds of bazooka ammunition
    because I was an assistant bazooka man. I had to do the loading and, let's see, what else was it that we had? Anyway,
    that gives you some idea of what kind of load we were carrying. We started early that morning and we hiked all day long,
    from morning until night, and they wouldn't let us sit down to eat. We ate walking. They said if we stopped you will never
    get up because it was cold and they said you will stiffen up. You won't be able to go on. So we marched straight through
    to just about night when we got there and there was one vehicle following us and we ask him how far are we going, he said
    about 35 miles in the snow. Now, you know, you can do more than you think you can do. We didn't dream we could make it
    but we did. Another interesting place that I'll mention to you was the Seigfried Line, I'm sure you heard of the Seigfried
    Line. It was a very impressive thing. As far as you could see there was what they called dragon's teeth and it went for,
    they said, I forgot how many miles. It went up to Belgium and we were in southern Germany at that time and then behind
    those dragon's teeth were pillboxes and the one that you were heading toward didn't shoot at you. It was the one next
    to him that would shoot, you know, crossfire so you couldn't get through it, see. But I read, and here it is, I'll show
    you a magazine here and here is a book. I don't know where this came from but I'm sure somebody sent it to me. There is
    the Seigfried Line. This is the pillboxes I'm telling you about and the dragon's teeth, but you couldn't see the pillboxes.
    They were so camouflaged you couldn't see them hardly at all.
- speaker: Interviewer
  text: That was from World War I, was it not?
- speaker: Respondent
  text: Well, Hitler built it, Hitler built this line.
- speaker: Respondent
  text: And there was 100,000 lost on the Seigfried Line.
- speaker: Interviewer
  text: Oh, boy. Did you have any problems with sleeping while you were in combat?
- speaker: Respondent
  text: No. I slept. You get so tired, you just fall a sleep. That was all there was to it. You just couldn't stay awake.
- speaker: Respondent
  text: We made a river crossing, I even forget which river it was, and we fought it, some at night, we got across late. So
    we had to fight at night to establish the bridge head. We stopped and sat down and I know I hadn't more than hit the ground
    and I was a sleep. You were just wore out. During the night I woke up and there was not a soul with me. That whole unit
    had pulled out and I didn't know it and I started moving to try to find them and I found a barn and I went in that barn
    and dug down in the hey and stayed all night. And I got up the next morning and it was a horrible sight, you know, what
