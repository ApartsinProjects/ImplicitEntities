collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Were you drafted or did you enlist in the service?
- speaker: Interviewer
  text: Where were you living at the time?
- speaker: Respondent
  text: New Carlisle, Ohio. My parents' house.
- speaker: Interviewer
  text: And why did you join the service?
- speaker: Respondent
  text: There are a number of members in my family who have been in the military. I would say that the biggest influence would
    be my father was a United States Marine. He was drafted for Vietnam. It's just kind of been something I think I've always
    known that I was going to do from day one.
- speaker: Interviewer
  text: And why did you pick that particular branch of service?
- speaker: Respondent
  text: I wanted to be the best.
- speaker: Interviewer
  text: Do you remember your first days in the service?
- speaker: Respondent
  text: Very vividly, yes.
- speaker: Interviewer
  text: Can you tell us a little about that?
- speaker: Respondent
  text: It sounds cliche to say the first thing you remember about boot camp is the yellow footprints and a drill instructor
    coming onto the bus and not softly saying or gently saying please step off the bus and meander over here to this wall.
    It is a shock and awe campaign of yelling and forceful movement into disciplined straight lines. I think that that is
    every recruit, every Marine's first memory of boot camp and hours up, not sleeping, getting everything ready, just to
    get ready. I remember quite a bit about it actually, yeah.
- speaker: Interviewer
  text: But what were the yellow footprints?
- speaker: Respondent
  text: When you arrive at Paris Island or San Diego, respectively, the yellow footprints are the footprints that you line
    up on where you are told exactly how things are going to be moving forward. The footprints are set at a perfect forty-five
    degree angle and painted on the ground, from which you do not move.
- speaker: Interviewer
  text: What did that feel like, I mean, coming from the civilian world into something like that?
- speaker: Respondent
  text: It's intimidating. Never seen anything like that outside of other than what you see in the movies, things like that,
    you know. It's intimidating. It is a bit stressful, to say the least.
- speaker: Respondent
  text: But exhilarating. Sorry. It's exciting as well.
- speaker: Interviewer
  text: Tell me about your boot camp experience. Just kind of relive some of that.
- speaker: Respondent
  text: I didn't have too much trouble with boot camp. I went in there physically fit. I had a pretty sound mind. I was, you
    know -- I didn't have any real issues with the mental or physical challenge of it. It is rough that, you know, you are
    -- you are running constantly, it is a constant workout that you are -- I personally eat a ridiculous amount of food,
    and for the amount of work that we were doing day in and day out for the long hours, I didn't think I was eating nearly
    enough. I actually went in and lost weight. So those -- those are some of the things I remember. I'm not a very big runner.
    I don't like to run. But I would say that, you know, that was one of the things I got better at and we did a lot of it.
    It was challenging, challenging.
- speaker: Interviewer
  text: Do you remember your drill instructors?
- speaker: Respondent
  text: I do. All of them. Senior Drill Instructor Staff Sergeant Pree. Staff Sergeant Mejia was his right hand. Drill Instructor
    Sergeant Tschung was another. We had a drill instructor who got into a bit of trouble in the middle of boot camp who actually
    had to leave.
- speaker: Interviewer
  text: Do you remember what happened there?
- speaker: Respondent
  text: Yes, I do. There was -- there was a recruit, Harris, in Platoon 1017 and this particular drill instructor was white,
    the recruit was not. There was some racial epithets thrown, unfortunately, in private, as I understand it, and they got
    into a bit of an altercation on the floor, and he was asked to leave the platoon to go to another platoon due to that.
    So -- yeah, something, you don't often see, I'll tell you. It was very surprising. But, yeah, I remember all of them very
    well.
- speaker: Interviewer
  text: How did you get through all of it? I know it's stressful.
- speaker: Respondent
  text: Successfully. You know, I got letters, not as regularly as I would say that I would have expected. I did get quite
    a few from my family. I did get quite a few from my friends. You know, but it wasn't -- it wasn't so much being away that
    was challenging. I just kind of pictured it as another step that I needed to take. It really was not the overly arduous
    time that everybody says that it was for them, that it was the worst time in their life or it was the hardest thing they've
    ever done. I didn't see that. I didn't picture that.
- speaker: Interviewer
  text: What was the hardest thing you had to do?
- speaker: Respondent
  text: I don't know. I couldn't say.
- speaker: Respondent
  text: Crucible was tough but, again, it's just another physical challenge. I like crawling around in the mud, and I like,
    you know -- I like the operations that they were training you for. I liked the live fire ranges. I enjoyed all of that
    stuff. It was just another -- again, it was just another step. I really enjoyed all of it, looking back. Probably not
    at the time, but, you know, looking back, yeah, I definitely enjoyed it. I don't think that it was -- I could designate
    one thing as the hardest thing I did.
- speaker: Interviewer
  text: Well, let's move on with which wars or war did you serve in?
- speaker: Respondent
  text: I served in a part -- I served my first time in Operation Iraqi Freedom One and then Iraqi -- Operation Iraq Freedom
    Four.
- speaker: Interviewer
  text: So you went two times?
- speaker: Respondent
  text: Two times. Volunteered for a third but was unable to go.
- speaker: Interviewer
  text: And where exactly did you serve in these -- I mean, what areas or first and the second time or whatever?
- speaker: Respondent
  text: The very first tour, Operation Iraqi Freedom One, we started out in Kuwait, in a place called Mutalla Ranch, which
    was a very loose term for a ranch. It's nothing but a desert. And then we moved to the border of Kuwait and Iraq, and
    actually the date would be eight years ago today. In fact, it just hit me that we went through the breach from Kuwait
    into Iraq on the main MSR to Baghdad. That would be my first tour all the way to Baghdad, Iraq.
- speaker: Interviewer
  text: And the second tour?
- speaker: Respondent
  text: Second tour, we served at a place called Al Asad, Iraq, which was in the northern Al Anbar Province, not terribly
    far from Syria. So it was northern Iraq, northeastern Iraq, or western Iraq. Served in a place called Haqlaniyah, Iraq,
    as well for a short -- for a short stint. Those would be the three biggest places.
- speaker: Interviewer
  text: Do you remember when you first got there and how was that experience?
- speaker: Respondent
  text: Yes. Yes, I do. I remember when I first got to Kuwait the Syrian temperature -- it's like nothing I've ever seen before.
    Iraq was not as bad. The temperature in Kuwait was, upon arrival, a hundred and ten to a hundred and fifteen degrees,
    and it only got hotter as our time -- as the summer went on. Iraq is a little bit more of a temperate climate, the further
    you get into it. Kuwait is not. The second time that I was in Iraq was, being further north, you experienced more climate
    changes more comparable to what we have here, I would say. We have a winter; we had a winter there. We had a summer. We
    had a fall. The winters are brutal. The summers are brutal as well, but there are seasonal -- there are seasonal changes,
    so, yeah, as far as that is concerned.
- speaker: Interviewer
  text: What was your job in the service when you were there the whole time?
- speaker: Respondent
  text: My primary MOS is 0311 infantry -- infantry, which is what I wanted to do, which is what I signed up to do, first
    and foremost. I went to an MP company, Military Police Company Charlie, and was attached to an infantry platoon there.
    We were then augmented to do mortuary affairs, which during the time of Vietnam and before the Marine Corps, noted this
    platoon or this company as Graves Registration. It has not been used or had not been used since Vietnam in any altercation
    or police action since the end of that war until operation Iraqi Freedom in 2003. So my MOS as a BMOS was changed to mortuary
    affairs, and that was that I did.
- speaker: Interviewer
  text: And did you see combat?
- speaker: Respondent
  text: I did. Not anything worth bragging about, not by any means.
- speaker: Interviewer
  text: Were there many casualties in your unit? Did anybody get hurt?
- speaker: Respondent
  text: None in my unit, no. We -- I'm sorry. We had a few -- they were not attached with me directly, with my particular
    platoon, but we did have some casualties that happened throughout the various tours that they did, yes.
- speaker: Interviewer
  text: Tell me about a couple of your most memorable experiences while you were over there or any other time, but specifically
    probably while you were there.
- speaker: Respondent
  text: I saw -- let's see. Coming from a small -- smaller rural area like -- like where I'm from here in the Dayton area,
    Springfield, Ohio, I saw lands that I've never even dreamt of before. I saw sand. I saw people that I've never even considered
    seeing before. It's not at all like you see on TV, I would say. Iraq in certain areas can be a very beautiful, beautiful
    place. It is the cradle of civilization. I would say seeing the Tigris and the Euphrates is a beautiful sight to see.
    I saw some terrible things as well. We saw things done to people that, you know, you would never ever wish to talk about
    with, you know, most others so, you know, outside of people who have been in the Marine Corps or have seen those types
    of things as well, things that you just can't forget, stuff along those lines. Would you like details on either or --
    I don't know.
- speaker: Interviewer
  text: That's up to you.
- speaker: Respondent
  text: Doesn't matter.
- speaker: Interviewer
  text: Well, you were never a prisoner of war or captured or anything?
- speaker: Interviewer
  text: What about were you awarded any medals or citations or anything like that? Can you tell me what they were?
- speaker: Respondent
  text: Awarded -- the ones that stand out to me most notably would be a PUC, which is a Presidential Unit Citation, awarded
    to mortuary -- the mortuary affairs platoon there, our company, I'm sorry. For doing mortuary affairs this would have
    been the first time it was used since Vietnam, and we were -- I believe that was the reason that we were awarded the Presidential
    Unit Citation for doing this reverent job. I believe the Marine Corps got rid of Graves Registration for some time, and
    then this is the first time that it was brought back and reinstated. So that's the most notable. I have a combat action
    ribbon, though. You know, what, though, our unit received it. Personally I don't know that I necessarily rated as much
    as some of the other gentlemen.
- speaker: Interviewer
  text: How did you stay in touch with your family and friends?
- speaker: Respondent
  text: The first tour through letter writing mostly. I did have limited e-mail access from time to time. It was very scarce.
    But letters for the most part. That would be the big thing. I did make my first tour, the entire time there, I would probably
    say a few phone calls, three or four or five phone calls home during that time, whenever I could. But letter writing was
    the big thing.
- speaker: Interviewer
  text: What about the food? How was the food?
- speaker: Respondent
  text: First tour, ate a lot of MREs, the packages that the military issues to service members, a Meal Ready to Eat is what
    that stands for. MREs, to tell you the truth, I enjoyed them. I liked the MREs. Not bad. It's a big bag of food and has
    a shelf life of fifteen years. It's pretty good.
- speaker: Interviewer
  text: And did you have plenty of food and other supplies?
- speaker: Respondent
  text: Yes. Water was very -- was plentiful. Bottled water was plentiful. The pallets were brought in. Water bowls were brought
    in, water buffalo, little trucks, you know. Tons of water.
- speaker: Interviewer
  text: Did you feel pressure or stress at any times?
- speaker: Respondent
  text: Not so much, no. I can't say that I necessarily was -- no. Not that I -- not that I recall stuff in my head really.
- speaker: Interviewer
  text: Did you do anything special or for good luck or anything like that?
- speaker: Respondent
  text: I took with me a pocket Bible, fits in your right -- or in your left breast pocket right over your heart. It has a
    metal shield in the front of it. It was my father's that he gave me to take with me. I took it both tours, and I kept
    it with me the entire time. I have to say that, you know, my faith and that as good luck as well is definitely something
    that, yeah, I kept with me at all times.
- speaker: Interviewer
  text: How did you and the other guys in your unit entertain themselves?
- speaker: Respondent
  text: As only Marines can. I would say that, you know, I am closer with people -- some people in the Marine Corps who I
    served with overseas than with some individuals that I have known all of my life, some of my friends. There's a camaraderie
    and a brotherhood that is established from day one that if you are not a part of it, it cannot be explained to you. It
    is a feeling. It's a -- it's a sensation. It's in explainable. So, you know, the entertainment that we had as just --
    as just a bunch of boys being boys, I would say, you know.
- speaker: Interviewer
  text: How about other entertainment? Were there any entertainers like, I guess, USO shows or anything like that? Did you
    have anything?
- speaker: Respondent
  text: No, none that -- no. We had -- the second tour we had some people come on base in Al Asad. I think Al Franken came
    once. I didn't get to see him, didn't care to see him. Montgomery Gentry, the country singers, came to Al Asad, but I
    believe we were leaving at the time and unable to make it. We were mobilizing to get out and get home.
- speaker: Interviewer
  text: See any other notable entertainers?
- speaker: Respondent
  text: I'm sorry. I did meet the Marines' Marine, Gunnery Sergeant R. Lee Ermey, in Kuwait when we got back from Iraq in
    the first tour. One of -- every Marine dreams of meeting the drill instructor from Full Metal Jacket, and I did. Shook
    his hand, got my picture taken with him. He was shooting an episode of Mail Call, which is his show on the History Channel.
    It was a nuclear biological and chemical warfare episode. It was wonderful.
- speaker: Interviewer
  text: What did you do if and when you ever had any leave?
- speaker: Respondent
  text: We had no leave so didn't do anything. I had no leave while we were overseas.
- speaker: Interviewer
  text: In the whole service, where did you get to travel to?
- speaker: Respondent
  text: I've traveled to a number of different places in the Marine Corps, some wonderful places. Shortly after I joined the
    Marine Corps in 1999, I would say, in probably 2000, right after graduation from the School of Infantry, we went down
    to Curacal to train with the Dutch Royal Marines.
- speaker: Interviewer
  text: Where was this?
- speaker: Respondent
  text: Curacel. Island of Curacel. It's about thirty miles off the coast of Venezuela. To train with the Dutch Royal Marines
    down there.
