collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: What war were you in?
- speaker: Respondent
  text: I was in World War II in the European Theatre.
- speaker: Interviewer
  text: Are you from Philadelphia?
- speaker: Respondent
  text: No, I was born in Mckeesport, Pennsylvania. I was drafted from New York City. And wound up in Philadelphia about 1957-'58.
- speaker: Interviewer
  text: When you were drafted, where did you go for your boot camp?
- speaker: Respondent
  text: Camp Kilmer.
- speaker: Interviewer
  text: Camp Kilmer. Where's that at?
- speaker: Respondent
  text: Oh, no. My boot camp, you mean where I spent time?
- speaker: Respondent
  text: Okay. We went to Camp -- we were taken to Camp Campbell, Kentucky.
- speaker: Respondent
  text: Okay. Camp Campbell, Kentucky, is where we spent time. We were assigned to the 537th Armored Infantry Battalion which
    was sort of experimental that we found out later. They build battalions like that to be thrusted through places and spent,
    oh, till about December there. Oh, we went in May, June and then we -- December we left there and we went to Fort Sill,
    Oklahoma.
- speaker: Interviewer
  text: Okay. You said that you were drafted --
- speaker: Interviewer
  text: -- into the Service. Would you have enlisted if you weren't drafted?
- speaker: Respondent
  text: Well, it was practically enlistment.
- speaker: Respondent
  text: I wanted to go in and my draft board was slow and, like, they told me the following month, the following month. And
    then my mother was trying to get me exempt. So I finally went to the draft board and told them, "Look, I'm ready to go,
    you know. You keep passing me up." So they -- the next call they called me.
- speaker: Interviewer
  text: So when did you -- when did you enlist? What year was that?
- speaker: Respondent
  text: 1945. No, wait a minute. 1943.
- speaker: Interviewer
  text: 1943, so the war had been going on for two years at that point.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: Okay. When Pearl Harbor happened, were you too young to enlist at that time?
- speaker: Interviewer
  text: Okay. So you waited till you were old enough and then
- speaker: Interviewer
  text: You were in basic training and then where did they send you from there?
- speaker: Respondent
  text: We went from Camp Campbell -- it was Camp Campbell at that time. We went to Fort Sill, Oklahoma, and we went into
    regular Army barracks and we became scout troops for the artillery. Fort Sill was an artillery camp, really. And we became
    scout troops and we'd run up and down the Wichita Mountains in the mornings and they -- they used us as we were bait for
    them to do their practices and always hoped that when they were shooting -- when the planes flew over with tails showing
    with the, you know, where to shoot at, we were always hopeful they wouldn't be aiming at us.
- speaker: Interviewer
  text: What did you know about the war, the progress of the war and that type of thing, when you joined the Service?
- speaker: Respondent
  text: Well, I, from even before the war started, I was for, you know -- you want my personal opinions, right?
- speaker: Respondent
  text: Well, I came from a family which was very strongly anti-Nazi, anti-fascist. So as a boy I grew up that way. My first
    encounter was in 1935 when they were protesting the invasion -- Italy was getting ready to invade Ethiopia. And then from
    that, the Spanish Civil War came along and we had moved to New York by then, and I was just, you know, a little kid running
    around, really, 15, 16, and I belonged -- my parents belonged to a Greek club which had a restaurant and a hall and so
    on. So there they had activities for young people and do plays and learned how to fence, you know, that kind of stuff.
    Good stuff. And they had a library on the third floor. So I spent a lot of my time there because I was new in the neighborhood.
    There was a group of young men who at that time were out of work, they were 17, 18. I was 14. And they all hung together.
    Some of them belonged to a wrestling group. Others belonged to a mandolin group. So they made their own entertainment.
    And in the summer they used to take me with them to Orchard Beach up in, past the Bronx, or some place there where later
    on it changed names, but it was an open beach, no lifeguards or anything. They used to take me there and, you know, I
    had a good time out there. And then, almost all of them enlisted in the Abraham Lincoln Brigade and they were what were
    called Pre-Freedom Fighters or something, you know. They enlisted and they all went off. So I lost, you know, my mentors,
    you know, my guides.
- speaker: Interviewer
  text: And they went to fight in the Spanish -- in the -- war.
- speaker: Respondent
  text: Yeah, the Spanish War, yeah. You know, that lasted a couple of years and then -- things I found out later on and I
    have a book home, it was printed at the end of 1937, which was -- it's in Greek. And all the -- and it had most of the
    Greek-American youth who volunteered to go there. And already, by 1938, they had pictures of the ones that died there
    or disappeared. Now, the man closest to me, the one who was like my big brother, he disappeared and they never found him,
    you know, in that battle and so. So that -- that gave me my mental, my thought process into being against what was happening
    with Hitler and so on. So we went on like that. And when the invasion finally took place -- when we finally entered the
    war, you know, it was at that time, although my parents were real peace-loving and they -- my mother sort of instilled
    in me, you know, more is accompanied by peaceful means. You know, she'd say, "Boys," she didn't want me fighting and so
    on. And that -- but as much as I felt that, you know, against war was, you know, against war-like, I knew it was my duty
    to go. And I could have gotten exempt through my company who was -- I worked in microfilming at that time. And I didn't
    want it. I wanted to go. And I went into the infantry or that's where they put me, but that's where I ended up.
- speaker: Interviewer
  text: Prior to 1941, would you have said that you were a person who thought America should have entered the war sooner?
- speaker: Respondent
  text: I really don't know. I -- I just -- I think they -- they should have been more active, okay?
- speaker: Respondent
  text: I thought they should have been more active in -- around the Spanish Civil War. That I remember, that, you know, the
    embargo that the United States and England and France put on the -- legitimately like the government were blocked in.
    They couldn't get help from anybody. And I think Russia gave them some help, but they didn't get any help from anybody.
    They fought with the arms and captured there.
- speaker: Interviewer
  text: What did you know about the holocaust before you went into the Service?
- speaker: Respondent
  text: Very little. Very little. I just -- I don't know that, you know, that we got much feedback into it. I know a lot of
    what was happening to my -- no, I didn't know a lot, but I knew that we couldn't, by 1935-'36, we lost contact with our
    relatives in Greece and the little island off the coast of Turkey. And, you know, once we -- my mother during the war,
    once we got into it, during the war and before, she always sent care packages. She worked in places where they make care
    packages up for their -- for different countries and she sent care packages to her relatives continuously.
- speaker: Interviewer
  text: So you said that you entered the military in 1943.
- speaker: Interviewer
  text: You went to basic training.
- speaker: Interviewer
  text: And then you were shipped to the European Theatre?
- speaker: Respondent
  text: Yeah. We arrived there January 1945. Right at the end of the Battle of the Bulge. And then from there -- no, we left
    the States in January. We arrived in February. Our camp -- I remember being in near St. Laurent where I think the National
    Cemetery is there now. And we were there for a while. I remember -- General Eisenhower's son, John, was in our company,
    our division, but really in our company. Yeah. Yeah, he was there and we remember, our food supply was very skimpy at
    that time to us. We were always moaning and bitching about. One time a lieutenant threw a piece of meat into the trash,
    he didn't eat it, you know, and we were all raising holy murder, you know, we're starving and he's not eating it. But
    that was a private thing. Well, we were there and the day before we were to move out and move up to the combat zone, which
    already had reached -- it was on this side of the Maginot Line, we, General Eisenhower visited us. And he visited the
    division and all and at the end of his visit, his son went with him. So, of course, you know, there's the moaning again.
    He put him on his staff. Later on, as I got to thinking more about it, and thought about these things, I think he did
    a good thing because there was plenty of cannon fodder there, as I would say, and he had one son and why shouldn't he,
    if he had the ability to keep him, you know, back -- he didn't send him home or anything, he stayed with him and, you
    know, he took an active part in the war.
- speaker: Interviewer
  text: Already you said you walked through the, you walked past the Maginot Line, the Siegfried line?
- speaker: Respondent
  text: 'Well, we, you know, we -- our first place that we went into combat was in Alsace-Lorraine. I don''t remember the
    town. I guess I can go look it up. I don''t remember the town, but we -- the first night we slept in a glass factory.
    We went there at night and how we knew it was a glass factory, there was all broken glass on the floor. So I remember
    we were afraid to move around. So we slept there the night; in the morning they got us up and we moved up to the lines.
    And we were -- I was a heavy -- heavy weapons platoon. So we were always just behind the infantry. And the first action
    I remember myself and a fellow from Kentucky, Willie Thibeault, we used to call him, a strapping young man, you know.
    And he and I were set up. We set up our machine gun in a certain place to look over the ridge. Well, we had to dig in
    there and we had to, you know, what we did is to get logs to put in front to protect us. So, of course, I had an ax and
    I went to start chopping a tree down. Well, being a city boy from New York, I could have been there for the next three
    years chopping. So Willie came over and he said, "Sit down, John." He got the ax and in about ten minutes he had two tree
    trunks chopped down, sliced them up, they were two big ones. He gave me the ax and a little log and he said, "Here, you
    carry this." He carried these two big logs, we went back and dug in and we were there. And that night was the first night
    of combat. And it was pretty scary. Scary in terms of we''re on a ledge here, like, little road there and there''s a valley
    in front of us and trees over there. We''re just sitting there watching. Your imagination goes wild. The trees start moving
    towards us, right, we were thinking they were people, you know. Well, Willie was -- he was really scared. As strong as
    he was, he was shaking, you know. Now, I had to be the big brother with him. But we work well at getting it and he --
    and we were to take turns on watching: one would sleep two hours and then the other one would. I stayed awake through
    the whole night although he sat up there and I was the backup, because he was deathly afraid. Finally, they got us up
    in the morning and we went and they sent us out and they sent myself and another person out, put us on the road where
    we could just see the road down, you know, see the road there. And they said, "When you see a tank coming, as soon as
    you see it, just push this lever." And it was all -- went up. So we went early in the morning, they said that somebody
    would be up to give you lunch and so on. Well, we got there early in the morning. We didn''t see anyone besides the two
    of us till later that afternoon. No --'
- speaker: Interviewer
  text: Including tanks.
- speaker: Respondent
  text: Including tanks. Including nothing. Including food. So we were there and that was our first night and then we started
    to move on there and then go to get engaged. But engagements were really small because by that time the Germans were on
    the run, right? And then they -- and now I remember, we took a train through France to get to that point Alsace-Lorraine.
    Then we got to the -- we get into the Maginot Line and it -- it was abandoned. We sort of climbed over it, you know, we
    could see the armaments and the way it was, but it was abandoned. And then we crossed the Rhine. I can't remember. I guess
    the Siegfried Line was behind the Rhine on the other side. Well, we were camped in some little -- we were housed in a
    town there. What's funny about it -- oh, they gave us our first ration of beer, they gave us two cans of beer.
- speaker: Interviewer
  text: In Germany at this point?
- speaker: Respondent
  text: Well, before we crossed the Rhine. So we had two cans of beer. We sat there and drank them and then the next morning,
    we crossed -- the day that Roosevelt died, April 12th. That date sticks in my mind for many reasons. But that's when we
    crossed, you know, and it was pretty sad thinking about him. But we crossed the Rhine and we had no opposition but we
    had -- we had nobody really opposing us and we crossed over and then dug in. And from there we just kept moving from one
    tree to the other. At times -- and then we were fighting really.
- speaker: Interviewer
  text: When you crossed the Rhine, the Germans had destroyed a lot of the bridges. How did you guys get across?
- speaker: Respondent
  text: They -- we -- there was, from what I understand, there was a bridge that was still up, but they still hadn't taken
    the mines off or something. And since they were on the run, I guess at that time we were in the Third -- we were in the
    Third Army, in Patton's Army. And you know, he had the game, they're running, keep moving no matter what, right? So they
    wanted to get as many troops across the river and the strategy was to get as many across before any real -- they stopped,
    had any real opposition, right? So we were able to get across with little, very little gunfire against us.
- speaker: Interviewer
  text: So at this point you're working with General Patton's Third Army?
- speaker: Respondent
  text: Yeah, that's where we were, yeah.
- speaker: Interviewer
  text: Now, would you say that General Patton lived up to his nickname?
- speaker: Respondent
  text: Well, from what we had heard, we were afraid to say anything [laughter]. In fact, one day they said, later on sometime,
    you know, we were -- we got a break, our part of the division was with the -- you know how you -- I don't know if you
    know how they work, they, you know, the troops go -- certain battalions go forward, certain companies, and then certain
    point you relieve each other when you can instead of all being thrown into it. So one time we were relieved and we were
    just taking it easy and they said, "General Patton's going to come to visit us today, so you'd better get cleaned up."
    So I remember standing in a stream, cold, no place, trying to shave. So that was my experience with that.
- speaker: Interviewer
  text: Did he visit after that?
- speaker: Respondent
  text: I never saw him. Never, never saw him.
- speaker: Interviewer
  text: So it was a cold shave for nothing.
- speaker: Respondent
  text: No, I needed a shave.
