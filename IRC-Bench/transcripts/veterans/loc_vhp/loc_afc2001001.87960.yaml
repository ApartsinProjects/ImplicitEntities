collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Can you tell us some basic biographical information first? So what -- what day were you born?
- speaker: Respondent
  text: I was born March the 21st in 1934 at Lubbock, Texas.
- speaker: Interviewer
  text: Okay. And did you grow up in Lubbock?
- speaker: Respondent
  text: No. We -- at that time we lived in West Texas, near Plains, east of Plains, and then we moved to New Mexico; and I
    lived in New Mexico the rest of my life, until about 15 years ago, when I moved to Conroe.
- speaker: Interviewer
  text: How old were you when you moved to New Mexico?
- speaker: Respondent
  text: Probably two. I'd just got my first haircut at Plains.
- speaker: Interviewer
  text: So you lived in New Mexico -- what? About 75 years? Is that right?
- speaker: Respondent
  text: No. It'd probably be about 45 or so --
- speaker: Interviewer
  text: Forty-five years.
- speaker: Respondent
  text: -- before I moved to Texas.
- speaker: Interviewer
  text: Okay. And --
- speaker: Respondent
  text: My people were all sharecroppers, and we lived on farms for the first four years of my life. And then we -- my dad
    also was a cement finisher. He also worked outside and did most of the farming at night. We didn't have a pickup. We just
    had a car to pull cotton to the gin in those West Texas sands. My mother would drive. My dad and I would get out and push.
    I was just two or three. I wasn't very big.
- speaker: Interviewer
  text: Boy, that's -- that's a load. Have that cotton packed in a big old trailer or something?
- speaker: Interviewer
  text: Man, that's tough.
- speaker: Respondent
  text: I think it took about a year to pick all that cotton at night.
- speaker: Interviewer
  text: Wow. That's a -- that's a task.
- speaker: Respondent
  text: We went to the gin. It just sucked my -- well, feet out from under me, and my little hat fell off, a little soggie,
    they called it; and I never saw it again. It just went up in the air --
- speaker: Respondent
  text: -- up the pipe.
- speaker: Interviewer
  text: Up the pipe. Man, you're lucky it didn't suck you up there, too, I guess. That's something else. Well, what did your
    -- what did your dad do when you moved to New Mexico?
- speaker: Respondent
  text: Well, my father was always a cement finisher. He had started in the Southern California area and had worked in the
    Seattle area and then had worked for a good many years in the Minnesota area, throughout St. Paul, and then he worked
    pretty well all over Texas; and then we were just in New Mexico working, except in Texas. During World War II he had to
    leave Lovington, where we lived, and go to the shipyards in Houston to work during the war.
- speaker: Respondent
  text: And he wasn't drafted because he had already served in World War I in -- in Germany; and he had a real eventful life
    there, wrecks and -- motorcycle driver and ambulance driver and --
- speaker: Respondent
  text: He was in the Air Force. They wanted him to be a parachutist, but he didn't think that was too fun.
- speaker: Interviewer
  text: I would guess being a parachutist when they're barely inventing airplanes -- that'd be pretty -- pretty scary.
- speaker: Respondent
  text: Yeah. It was to him, anyway.
- speaker: Interviewer
  text: Yeah. Well, that's interesting.
- speaker: Respondent
  text: But then after I got to be older -- I went to the same school all my life; and when I graduated I had two full-page
    pictures in the annual, one for being elected by the students most courteous and one for being elected by the faculty
    the most -- best citizenship.
- speaker: Interviewer
  text: Well, that's wonderful.
- speaker: Respondent
  text: I got a medal for that. A pretty girl got -- I don't even know who it was.
- speaker: Interviewer
  text: That's wonderful. What was the name of your high school?
- speaker: Respondent
  text: Lovington High School.
- speaker: Interviewer
  text: Lovington. And that was in Lovington, New Mexico?
- speaker: Respondent
  text: It's in Lovington, New Mexico.
- speaker: Interviewer
  text: And whereabouts is Lovington?
- speaker: Respondent
  text: Well, it's between Hobbs and Clovis, on the east side.
- speaker: Respondent
  text: My -- my grandfather, my mother's daddy, Monster Lewis -- he and his wife used to live in Roswell. They worked for
    the Chisholm Cattle Company.
- speaker: Respondent
  text: And the Chisholms had been drivers of herds up north, but they had a beautiful place south of Roswell, and they had
    a place north of Lovington at -- northeast of Tatum, and that was where the last 3,000 buffalo were slain in the United
    States --
- speaker: Respondent
  text: -- by a fellow named Causey, and he has a town named after him in New Mexico.
- speaker: Interviewer
  text: Now, what -- what all did your father do in Lovington after World War II ended in --
- speaker: Respondent
  text: Well, we did plastering and cement finishing, set jobs up, a lot of dirt work, and we mixed our concrete with mixers
    that didn't have any motors. They just had a -- had an old Model A truck that we had to sand the gravel on. We'd jack
    that wheel up, put a big ole flat belt on that, and it would turn the mixer; and you could transmission any speed you
    wanted the mixer to turn. It was a pretty cute little --
- speaker: Respondent
  text: And then we just keep getting bigger and bigger mixers, until we had to get into the ready-mix concrete business,
    and we finally had 14 different concrete plants in different towns --
- speaker: Respondent
  text: -- in West Texas and Eastern New Mexico. And we got so big that we nearly lost everything, and -- but what -- we were
    able to pay all the debts and -- and hold on to a lot of the land. Still have quite a bit of the plants and land.
- speaker: Interviewer
  text: Are -- are the plants still operating?
- speaker: Respondent
  text: No, no. When my dad died at 93, he -- he was operating the Fort Sumner plant; and he drove 80 miles -- a load of --
    10-yard load of concrete 80 miles the day before he got sick, and -- he -- he was quite -- quite a horse.
- speaker: Respondent
  text: He was the best cement finisher that most people I talked to ever saw. He was -- he was invited to do the steps on
    the Empire State, but he wanted to come to Texas.
- speaker: Interviewer
  text: Wow. So he was well in his 90s when he passed away?
- speaker: Respondent
  text: 93. Uh-huh.
- speaker: Interviewer
  text: And what was the name of the company?
- speaker: Respondent
  text: Adams Concrete, Lovington Ready Mix, and Potash Sand & Gravel.
- speaker: Interviewer
  text: And did you work in that company --
- speaker: Interviewer
  text: -- pretty much your whole career?
- speaker: Respondent
  text: Yes. I worked my whole life, from just very early days, say, four, holding the light at night. He'd work during the
    day pouring -- or setting it up and then pouring it, and then the men would go home, and he'd finish it all night, you
    know, and go home and get a little dab of sleep and come back, you know, three or four times during the night. We -- we
    did that pretty well all -- all my growing years. And even if we were stuccoing, we would come back at night and float
    it because it was too wet in the wintertime. You had to let it set up, you know, and it'd have to set several hours before
    you get -- throw water on it and float it.
- speaker: Interviewer
  text: So you were doing this all up through the time you finished high school?
- speaker: Respondent
  text: Yeah. I sure did.
- speaker: Respondent
  text: And even when I went to Tech. When I first left for college, I went to Pasadena and -- California and had a wonderful
    time there for a couple of years at that school, beautiful school in Pasadena. And then, because my grandfather had such
    a love for Tech, my mother prevailed on me to go there. He had already died in '39, and I started going to Tech in '54.
    And after I got out of Tech I found out that he had donated the land there in Lubbock for the college, he had helped set
    the town --
- speaker: Respondent
  text: -- lights up, because he had come from Tennessee -- Knoxville, Tennessee, on horseback. Took he and his 9-year-old
    brother two years to get to Midland, Texas, and one of them went west to El Paso to work, and the other went north to
    Lubbock, to the LFD store. And then after that, he started working for Chisholm.
- speaker: Respondent
  text: But they called him back after -- he -- he left the Chisholms in the 1800s and moved to -- to the north part of Lea
    County because they had fired him, and he liked that country up there. He was a windmill man up there --
- speaker: Respondent
  text: -- for the Chisholm Ranch, and he just started using 20 sections in New Mexico and 20 sections in West Texas, had
    a nice-sized ranch. And he never did really try to buy a whole lot because it was cheaper for him not to pay taxes, but
    just -- just to use it, you know, and --
- speaker: Respondent
  text: -- not -- not pay anything.
- speaker: Interviewer
  text: Now, what did you study at Tech?
- speaker: Respondent
  text: Oh, I was -- studied civil engineering and business administration. The degree was a bachelor of business administration,
    with a major in management and minor in civil engineering.
- speaker: Interviewer
  text: And then did you go back and work for the family company?
- speaker: Respondent
  text: I did for a few days, but I -- I got married and tried to have a job so I wouldn't have to go to the Army, and then
    I was drafted even though I didn't know that I wouldn't have had to.
- speaker: Interviewer
  text: Oh, you would -- you would've been exempt?
- speaker: Respondent
  text: Yeah, if I'd have known she was expecting a baby.
- speaker: Interviewer
  text: Oh, wow. So that -- that pulled you out of -- out of the business for --
- speaker: Interviewer
  text: -- a couple of years, huh?
- speaker: Respondent
  text: Yes, it did, and it made it really bad because we -- we were operating in all these different towns. And my mother's
    heart was real bad. My dad's -- he had sugar diabetes, and they were trying to run all that by themselves. And I finally
    did get a 90-day executive leave to -- to go help them out when their health -- health both failed.
- speaker: Respondent
  text: I didn't get paid, you know --
- speaker: Respondent
  text: -- for those 90 days, but it was sort of the compassionate thing --
- speaker: Respondent
  text: -- to go help.
- speaker: Interviewer
  text: Right. Now, when you got drafted into the military -- can you tell me about that? Where'd they have you report, and
    --
- speaker: Respondent
  text: Well, I reported in my little town, the local draft board there at the county seat, and we went to the courthouse,
    and they put us on the bus to go to El Paso. Let me just digress a moment and tell about some soldier boys --
- speaker: Respondent
  text: -- before the war started. The New Mexico National Guard was called up to go to the Philippines to stave off the Japanese
    attacks.
- speaker: Interviewer
  text: This is before World War II?
- speaker: Respondent
  text: Just before World War II. And the day they were leaving on a bus, probably going to El Paso, they couldn't get through
    because it had come such a flood that the railroad -- the water was between the railroad track and -- and the road. They
    had to -- I guess they put them in little boats and they paddled across to the bus waiting on the other side. And, of
    course, we never saw many of those boys again because they were mostly all killed. They were prisoners of war --
- speaker: Respondent
  text: -- you know, if they weren't killed, for five or -- years or so, or six, and very few made it.
- speaker: Interviewer
  text: So they were caught in the --
- speaker: Interviewer
  text: -- in the Japanese invasion --
- speaker: Interviewer
  text: -- in the Philippines?
- speaker: Respondent
  text: Yeah. The Japanese weren't very nice to them.
- speaker: Interviewer
  text: Oh, terrible.
- speaker: Respondent
  text: They had the death march and everything.
- speaker: Interviewer
  text: Did you get to know any of the ones that did make it back?
- speaker: Respondent
  text: Well, yes. I was commissioned there in Lovington, and we had -- one of the boys that was there one time -- one of
    their plants had a fire. And he was a volunteer fireman, and his mother was a schoolteacher in the old -- old-timey days.
    And he got so excited, he drove right out between the two double doors that had a big ole concrete pilaster. He just took
    it with him --
- speaker: Interviewer
  text: Oh, my gosh.
- speaker: Respondent
  text: -- and he put the fire out, but they had to rebuild the fire station.
- speaker: Interviewer
  text: Oh, man. Man. Did -- I mean, did -- did he kind of carry any of the -- the physical or emotional scars of being in
    the Philippines with him --
- speaker: Interviewer
  text: -- after he got back?
- speaker: Respondent
  text: He had a lovely, lovely mother, and he -- you know, she helped get him rehabilitated, and he married and had -- had
    a child or two, and he -- he retired from the city there. You know?
- speaker: Respondent
  text: He never could really do anything physical, but the town was so delighted he came home that they gave him a job for
    life. So --
- speaker: Interviewer
  text: So everybody in the town wanted to pitch in and support him when he got back?
- speaker: Respondent
  text: Oh, yeah. Yeah. They -- they really felt bad about those ole boys all getting taken.
- speaker: Interviewer
  text: And then it was -- a town that small, when you lose a bunch of people -- that's really like losing part of your family.
- speaker: Respondent
  text: Oh, yeah. It's -- it's really hard on everybody during a war. Of course, there's -- the first time's pretty rough
    out there where we were, you know, being sharecroppers, and we didn't -- didn't have a whole lot. I remember Mother saying
    she didn't have nylons for -- I believe it was three or four years before she had a pair of socks. So it -- it was tough,
    but World War II was probably tougher in many ways because you couldn't get anything. There wasn't anything to buy, and
    if there was something to buy and you were to have money, you couldn't buy it without stamps. You couldn't get stamps
    because they just issued them for people that were doing the war effort. You know, it was rough.
- speaker: Interviewer
  text: And your dad was away in Houston, working in the shipyard?
- speaker: Respondent
  text: Yeah. He was working in the shipyards.
- speaker: Interviewer
  text: So it was you and your mom?
- speaker: Interviewer
  text: Did you have any brothers and sisters?
- speaker: Respondent
  text: No. I didn't have any siblings. We had a lot of chickens and cattle and pigs and a big garden during that time that
    she and I took care of.
- speaker: Interviewer
  text: Did -- now, during World War II, when things were in short supply, did the people in the town help each other out
    in -- in, you know, getting everybody some food or what they needed --
- speaker: Respondent
  text: Well, they did.
- speaker: Respondent
  text: They'd -- they'd trade stamps and different things. You know, my grandmother had a sick headache from not having coffee.
    She was raised on that Chisholm Ranch and had coffee every day of her life, until they didn't have any more coffee, and
    everybody in town would help send coffee out to her so she wouldn't have those vicious headaches. One time -- you know,
    there weren't any doctors left in -- in town. Wasn't much of anything left, and we'd have to go to Lubbock. And one time
    we all -- about 30 of us piled in a school bus because the school bus had gas tickets. They -- so he took us all to Lubbock.
    We stopped at Brownfield, and -- I guess to go to the bathroom, and this one ole boy went over to Bandy's Produce. And
    they didn't have any produce there, but they
