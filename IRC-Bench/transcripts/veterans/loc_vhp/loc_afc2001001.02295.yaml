collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Right after Pearl Harbor, about a year after Pearl Harbor, I enlisted.
- speaker: Respondent
  text: Okay. And your age was?
- speaker: Respondent
  text: Eighteen. And why did you select the United States Navy?
- speaker: Interviewer
  text: I didn't, I selected Marine Corps.
- speaker: Respondent
  text: Oh, that's right. You did say-- you told me that, the Marine Corps.
- speaker: Interviewer
  text: -- looked to me like a pretty good branch of the service to be in.
- speaker: Respondent
  text: Turned out to be too.
- speaker: Interviewer
  text: Yeah. After you get through boot camp, boot camp was rough. Went down to Parris Island.
- speaker: Respondent
  text: Parris Island? How many weeks?
- speaker: Interviewer
  text: Well, I went in there in November '41, and come out just April-- or February '42, and then we was sent to the Navy
    out there in Virginia, Norfolk. Fortunate really, went to sea school there. And then in March of '43, I went aboard the
    South Dakota. See, I just came back from the Santa Cruz. Just been beat up pretty bad. And after the repair that's-- that's
    when I got on it. I wasn't there for the Santa Cruz.
- speaker: Respondent
  text: I think there was a bomb-- bomb dropped on one of the turrets.
- speaker: Interviewer
  text: Oh yeah, quite a-- I think it got hit several times from what I understand.
- speaker: Interviewer
  text: Even had one Marine killed there.
- speaker: Respondent
  text: And wounded I think-- I think wounded the captain pretty badly?
- speaker: Interviewer
  text: Oh yeah -+ got wounded pretty bad.
- speaker: Respondent
  text: But he came back later as I remember.
- speaker: Respondent
  text: Okay. And what was your rating, what was your specification?
- speaker: Interviewer
  text: We was on the 20-millimeter anti-aircraft.
- speaker: Respondent
  text: Oh, yeah. Okay.
- speaker: Interviewer
  text: Well, when I first went aboard when we was one of the five-inch mounts. And, then we got transferred out of the mounts
    up on top side to all the 20 millimeters.
- speaker: Respondent
  text: Yep. The USS South Dakota when it first was commissioned and went into service didn't have that full complement of
    anti-aircraft.
- speaker: Interviewer
  text: No, it didn't, after they come back-- this time when I got on it they had--
- speaker: Respondent
  text: Loaded up--
- speaker: Interviewer
  text: -- yeah, they had quite a few guns on it.
- speaker: Respondent
  text: Yeah. And it really made a difference. But it would have been another-- would have helped a lot that a-- in the earlier
    battle too.
- speaker: Interviewer
  text: Yeah, probably would have. Of course, what I understand that was a nighttime thing and South Dakota got her electrical
    units all shot up.
- speaker: Respondent
  text: It was-- it was a miracle that we had radar for the-- for the Saddle Island battle. You were in on that one?
- speaker: Respondent
  text: No, you weren't.
- speaker: Interviewer
  text: No, I got in '43.
- speaker: Respondent
  text: Oh, that's right. You said that. Okay.
- speaker: Interviewer
  text: One of the incidents you talk about radar, they took individual people and put them out as lookouts. Give you sunglasses
    and look out. And I thought that was kind of wasted time to be a lookout when they got that radar going up there. And
    when them two Japs come in under that radar, almost hit us, I thought, boy, somebody reported them coming-- a visual.
    That's a constant. Not that radar, but the visual.
- speaker: Respondent
  text: Yeah, yeah. Not such a bad idea.
- speaker: Interviewer
  text: No. Changed my mind then, I thought, well, they must know what they're doing.
- speaker: Respondent
  text: Let's see, you said how you got assigned--or do-- how did you get assigned to the USS South Dakota?
- speaker: Interviewer
  text: I don't know. They just pulled a-- I went-- when I went through boot camp, I was the only one out of my platoon that
    went to--
- speaker: Respondent
  text: Onboard ship?
- speaker: Interviewer
  text: Sea school, yeah. The rest of them went to the June and other places and ended up in the 5th Division Marines. But
    I don't know how I got-- I was the only one out of my--
- speaker: Respondent
  text: What-- what percentage-- I mean was there a large percentage of Marines on the USS South Dakota?
- speaker: Interviewer
  text: Yeah, we had about 92.
- speaker: Respondent
  text: Compared with the Navy--
- speaker: Interviewer
  text: Yeah, there was 2200 all together, and 92 of them was Marines--
- speaker: Respondent
  text: Was Marines?
- speaker: Respondent
  text: Let's see. And where did you board the US--
- speaker: Interviewer
  text: In Norfolk, Virginia.
- speaker: Respondent
  text: Norfolk, Virginia.
- speaker: Respondent
  text: Okay. And then while you were on board you were anti-aircraft most of the time?
- speaker: Interviewer
  text: Not at that time, we was five-inch-- I say the aircraft but the five-inch--
- speaker: Respondent
  text: Five-inch-- five-inch mounts.
- speaker: Interviewer
  text: --__+ 20 millimeter.
- speaker: Respondent
  text: Then you went to-- what was the make of those, do you remember?
- speaker: Interviewer
  text: The five-inch?
- speaker: Interviewer
  text: They're five inches.
- speaker: Respondent
  text: Yeah, but I mean some of them had names, like, they used the Bofors for a while for anti-aircraft--
- speaker: Interviewer
  text: I don't know--
- speaker: Respondent
  text: -- those, those ones--
- speaker: Interviewer
  text: Those were 40 millimeter. That was pom-pom, but-- we was five-inch.
- speaker: Interviewer
  text: And then we went, like I said, to 20 millimeter. But, at that time they was going out for shake-down crews-- because
    of the repairs. We went to-- in and out. Got in to Portland, Maine and all them, and then we went to Newfoundland, and
    then from Newfoundland we went to Scotland, Scapa Flow. Made up a-- well they had a lot of troop ships were empty, but
    they filled them full of water and we made a faint at Norway.
- speaker: Respondent
  text: Oh. Is that right?
- speaker: Interviewer
  text: And they brought a bunch of Germans. And that's when they went in to Africa-- the invasion of Africa. But in the meanwhile,
    when he was in the Atlantic, though, we ended up in the Arctic Circle. That makes you the Royal Order of Blue Nose. When
    you get to the Arctic Circle. And we was up there, I suppose, four or five months then we come back and had a few more
    repairs made and then they went back through the canal, and out to the Pacific. We went from there to Pearl and-- I mentioned
    it a while ago, every time we went past the Arizona everybody had to stand at attention--
- speaker: Respondent
  text: Stand at attention.
- speaker: Interviewer
  text: -- and we was in and out of Pearl I suppose three times. Every time you had to-- of course, they didn't have that
    memorial there then. They just had the flags standing up.
- speaker: Respondent
  text: And they raised some of those old battleships and got them all reconditioned.
- speaker: Interviewer
  text: They got them all, yeah, all back-- it's amazing what they done in that short of time.
- speaker: Respondent
  text: Got them into that Battle of the Philippines Sea where the-- was it Admiral Oldendorf, who knocked off one of the
    three Japanese fleets, just blew them-- blew them to pieces with the old battleships.
- speaker: Interviewer
  text: One of the old cruisers too got in on that too from what I understand.
- speaker: Respondent
  text: That's poetic justice.
- speaker: Interviewer
  text: Yeah. We went-- we hit all the islands. Ulithi was our base and even there we got attacked. We was sitting there one
    night watching movies, they show the movies on the fantail, and we heard these two planes over go and the next thing you
    know, the Randolphs, they dove right into the aircraft carrier.
- speaker: Respondent
  text: Oh my God. Oh, the-- kamikaze thing?
- speaker: Interviewer
  text: Yeah. Right.
- speaker: Respondent
  text: When was that, what year? '44 I suppose.
- speaker: Interviewer
  text: '''43 or early part of ''44. And then, you know, ''44, of course, we had that big typhoon. And the battleship-- one
    more degree of lift and it would have been capsized.'
- speaker: Respondent
  text: Over all the way.
- speaker: Interviewer
  text: Man, that lasted three days and I'm telling you it was a-- and they, they blamed Nimitz for not knowing that storm
    was coming. Of course, you know,--
- speaker: Respondent
  text: Well, yeah, today we'd know that from the satellites.
- speaker: Interviewer
  text: Oh, yeah. But they had no idea-- they knew it was coming. They finally fig-- enough to pull up anchor and go out to
    sea, because you didn't want to be caught in a typhoon at anchor.
- speaker: Respondent
  text: We lost a couple ships down there.
- speaker: Interviewer
  text: Yeah. Destroyer turned upside down. They didn't have time to fill up with oil which were their ballasts. They just
    turned over. But them destroyer sailors were real sailors. I mean that destroyer was a-- when they come along side to
    refuel, we'd be sitting there like, just like that. That destroyer would be going up and down.
- speaker: Respondent
  text: --+ sea sick on a destroyer.
- speaker: Interviewer
  text: But the funny thing-- I don't know if I should mention this our not, but the Marines aboard ship had charge of the
    brig. Now, they used the brig when they were at anchor. They'd go to sea, you'd turn her loose. I had-- at that time,
    the colored guys on our ship were segregated. They had their own head. And the Marines were in charge of the brig, and
    I was in there the first time. I had six colored guys-- there were six brigs, three on either side, I mean six cells.
    And I had to take them to their head, which was their own, and I turned them loose, and there must have been 30 colored
    guys in there. And I had no idea who I turned loose.
- speaker: Respondent
  text: You just hope you got the right ones back up there.
- speaker: Interviewer
  text: I sit there and, you know, a shower house-- how hot that would be. I'm sitting there sweating, I'm standing at attention.
    Of course your underarms, your --+, what in the world am I going to do?
- speaker: Respondent
  text: They finally came up?
- speaker: Interviewer
  text: Six guys come back and I put them in the cell and I don't know if you can mention that or not.
- speaker: Respondent
  text: Well, it's already mentioned, what the heck. Too late for you to get in trouble now. That must have been tough to
    have a segregated set up like that and still run a ship.
- speaker: Interviewer
  text: I still asked the question-- at one time we was bombarding Formosa, the whole fleet, and we left the Indian Ocean
    and come into the Pacific Ocean, was as smooth as this table, and we went dead in the water. And there goes the fleet,
    out of sight. All we had was our four destroyers it made this complete-- we sit there two and a half hours. The only answer
    I got one time was somebody said they turned saltwater into the fuel lines, turned the wrong valve, and they had to take
    the time to clean all that out.
- speaker: Respondent
  text: Clean that out, yeah.
- speaker: Interviewer
  text: There was-- that was funny to see that fleet going over the horizon.
- speaker: Respondent
  text: You're still sitting there.
- speaker: Interviewer
  text: They wasn't waiting for ya, they couldn't.
- speaker: Respondent
  text: Well, let's see. The most hazardous action of your experience onboard?
- speaker: Interviewer
  text: Well, there was a couple of them. One-- the first time we got hit, Saipan. We got a 500-pounder went through the deck
    and down below and exploded. Right underneath where we was up--
- speaker: Respondent
  text: Five-hundred pounder.
- speaker: Interviewer
  text: When they went through, it took out a 40-millimeter pom-pom gun. And that was manned by the colored people. Like I
    say, they was still segregated. They took mostly care of the officers and officers' mess, and they didn't hardly ever
    come down to the ship, parts where we were. But they was-- must have been three or four of them killed right there when
    that thing hit. And then we had to go back again, get repaired. And then the next time, we was taking on ammunition from
    the Liberty ship and when the ammunition got down below it exploded, started exploding, exploding, exploding.
- speaker: Respondent
  text: Yeah, I heard about that one.
- speaker: Interviewer
  text: And the captain-- I forget who the captain was then, we had about four different-- he said one more explosion he would
    have had to abandon ship. But he had to make-- he had to give the order to flood that compartment even though there was
    guys in there. Why-- they didn't have to do that. But he had to flood that compartment and--
- speaker: Respondent
  text: I read in the count by one of the guys who was there who said that it was his-- it would have been-- it would be his
    job to flood the compartment, but the first thing he did was open the hatch and here were a bunch of guys down there.
    And he let them out, then he flooded the compartment. Because if hadn't let them out, that'd been down there and drowned.
- speaker: Interviewer
  text: And they was all midnight, the next day getting out-- pulling out bodies. I remember one incident I was walking--
    everything-- every time you open up a hatch, the lights go out so that at nighttime you don't--. Well, I went by this
    hatch and you could see four or five decks below, and I could hear them down there in the water and bringing up, and at
    that point an electric line let loose and started sparking across that water and I thought it was exploding again, and
    I took off and run right into a bulkhead because it was dark. But all it was was electric--
- speaker: Respondent
  text: Loose electric line.
- speaker: Interviewer
  text: Yeah. Then we went all the way to-- all in through the Philippines, Lady Gulf. And took that one time when the Japanese
    fooled us and we took out after them. And that's when the old battleships come in and took over. We had Halsey. Halsey
    was aboard for awhile. He brought his whole staff.
- speaker: Respondent
  text: On the South Dakota? She was equipped to be a, what do you call it, ship. You know the headquarter ship.
- speaker: Respondent
  text: Flagship, yeah.
- speaker: Interviewer
  text: They had-- this is just hearsay, but the South Dakota was the most decorated battleship. Now, Washington won't agree
    with me, battleship Washington--
- speaker: Respondent
  text: Oh, well. They're not here.
- speaker: Interviewer
  text: We were supposed to have the signing on the South Dakota, but Roosevelt died and Truman took over and Truman's from
    Missouri. And that's the rest of the story.
- speaker: Respondent
  text: Well, if it'd been today we'd have Dashiell taking care of us.
- speaker: Interviewer
  text: I suppose. But like I say we went all the way-- we bombarded Japan-- we was the first ship to bombard Japan. You could
    see the B-29s going over. And then one time we got orders to pull out. We was out about 100 miles from Japan and heard
    this explosion and it was like thunder, but it lasted a long time and it got real still. And the next day, like, you know,
    you could feel something. And the next day they announced they dropped the bomb.
- speaker: Respondent
  text: On Hiroshima?
- speaker: Respondent
  text: You were about 100 miles out?
- speaker: Interviewer
  text: A hundred miles out.
- speaker: Respondent
  text: Did you have some kamikaze planes attack you?
- speaker: Interviewer
  text: We had them all-- every time, I mean at Iwo Jima and Formosa, Okinawa. You could sit there-- what the hard part was
    to watch them dive down on the Franklin, there was four of them went right down on the Franklin. And they took the --+.
    And then a couple of them went after us. But one of them was shot down before he got there, and the other one, I don't
    know whether he changed his mind or what but he--
