collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Where were you born and raised?
- speaker: Respondent
  text: Oh, I was born in South Dakota.
- speaker: Interviewer
  text: And you were raised there too?
- speaker: Respondent
  text: Pardon? No, no.
- speaker: Interviewer
  text: You grew up there?
- speaker: Respondent
  text: No. I -- my folks moved back to -- to Underwood. We -- I had to work.
- speaker: Interviewer
  text: Okay. And what were your parents' names?
- speaker: Respondent
  text: Henry and Tillie Aanden.
- speaker: Interviewer
  text: And did you have brothers and sisters?
- speaker: Respondent
  text: Yeah. I had eight of them.
- speaker: Respondent
  text: I was the oldest.
- speaker: Respondent
  text: And -- but three -- three of them are already dead.
- speaker: Interviewer
  text: Okay. Do you remember Pearl Harbor being bombed?
- speaker: Interviewer
  text: Where were you at?
- speaker: Respondent
  text: I was on the -- on the west coast, Camp Cooke.
- speaker: Interviewer
  text: Oh, you were already in the service?
- speaker: Interviewer
  text: Oh. They had the draft before?
- speaker: Respondent
  text: Yeah. I can't think, you know.
- speaker: Interviewer
  text: Weren't you home at that time?
- speaker: Respondent
  text: Yeah, I guess I was home. I don't know.
- speaker: Interviewer
  text: Okay. What did you think when Pearl Harbor was bombed?
- speaker: Respondent
  text: Oh, I was -- I was working at a farm --
- speaker: Respondent
  text: -- in Underwood there at that time.
- speaker: Interviewer
  text: And what did you think? What were you thinking?
- speaker: Respondent
  text: (Provides document.) There you go.
- speaker: Interviewer
  text: Do you remember any thoughts of when the -- Pearl Harbor was bombed?
- speaker: Respondent
  text: No. I don't know.
- speaker: Interviewer
  text: And you were drafted, you said, in 1942?
- speaker: Interviewer
  text: And you were in the army. What did your parents think when -- about you being drafted?
- speaker: Respondent
  text: Well, there's nothing they could do about it.
- speaker: Interviewer
  text: Okay. Where did you go to basic training?
- speaker: Respondent
  text: Camp Cooke.
- speaker: Interviewer
  text: And where is that?
- speaker: Respondent
  text: California.
- speaker: Interviewer
  text: Okay. And what unit were you assigned to?
- speaker: Respondent
  text: 5th Armored Division.
- speaker: Interviewer
  text: Do you remember what your first days were like?
- speaker: Respondent
  text: Yeah. Jump -- para jumped there.
- speaker: Interviewer
  text: And do what they told you?
- speaker: Interviewer
  text: Okay. Do you remember your instructors?
- speaker: Respondent
  text: Oh, yeah, I remember some of them. Some I didn't like very good.
- speaker: Interviewer
  text: Yeah. What helped you get through that?
- speaker: Respondent
  text: I don't know. You knew you had to go through it.
- speaker: Interviewer
  text: Okay. And what happened when you finished boot camp?
- speaker: Respondent
  text: Well, then we went -- from California, we went to Tennessee.
- speaker: Respondent
  text: We went on maneuvers down in Tennessee.
- speaker: Interviewer
  text: Okay. And then how about from there? Where did you go?
- speaker: Respondent
  text: From there, we went to New York. Oh --
- speaker: Interviewer
  text: And then shipped out?
- speaker: Respondent
  text: Yeah, we shipped out of -- I can't think, you know. My head gets mixed up.
- speaker: Interviewer
  text: Uh-huh. Did you ship out to England then?
- speaker: Interviewer
  text: From New York, you went to England.
- speaker: Respondent
  text: Why don't you come and sit with us too. He'd probably like that better.
- speaker: Interviewer
  text: Yeah. But, you know, Thorvald -- this comes kind of fast, you know -- you went to New York.
- speaker: Respondent
  text: Yeah, we went to --
- speaker: Interviewer
  text: New York, and then you went to England on that ship, you know.
- speaker: Interviewer
  text: And tell her about what kind of food you had.
- speaker: Respondent
  text: Yeah. Gave us junk in the service. You got two meals a day in there, but you couldn't hardly eat anyway because you
    were sick to your stomach.
- speaker: Interviewer
  text: From the ship?
- speaker: Respondent
  text: Yeah, from -- from the --
- speaker: Respondent
  text: -- service.
- speaker: Interviewer
  text: Do you remember how many days you had to be on the ship?
- speaker: Respondent
  text: Yeah. It was 20 -- 21 days, I think it was. We went from Pennsylvania up to the -- Newfoundland and went the long
    way. And there was -- I can't give -- pretty near maybe over a hundred ships that went over at that time.
- speaker: Interviewer
  text: Wow. What did you do on the ship for entertainment?
- speaker: Respondent
  text: You were so sick, you didn't need any entertainment.
- speaker: Interviewer
  text: Okay. How did your parents react to you leaving for the war? Did they --
- speaker: Respondent
  text: Well, they -- they didn't like it, but there's nothing they could do about it.
- speaker: Interviewer
  text: Did you have any other brothers in the war?
- speaker: Respondent
  text: Yeah, one brother.
- speaker: Interviewer
  text: Okay. What do you remember about arriving in England?
- speaker: Respondent
  text: Oh, the fog. It was foggy. And they had us in these tin Quonsets, you know; colder than the dickens. And we'd go to
    the motor pool and get some -- get gas and put it in the can and light that to keep warm.
- speaker: Interviewer
  text: Okay. What were your duties like while you were there? What did you do?
- speaker: Respondent
  text: Oh, they kept us busy anyway. I don't know. I can't --
- speaker: Interviewer
  text: Washing dishes?
- speaker: Interviewer
  text: Washing dishes?
- speaker: Respondent
  text: Well, standing guard and all that kind of stuff.
- speaker: Interviewer
  text: Um-hmm. What was the morale like in your unit?
- speaker: Respondent
  text: I don't know. Not too bad, I guess.
- speaker: Interviewer
  text: Did you all get along pretty good?
- speaker: Interviewer
  text: Yeah? And how did you stay in touch with your family?
- speaker: Respondent
  text: Oh, we had airmail.
- speaker: Interviewer
  text: Um-hmm. Were you married at the time?
- speaker: Interviewer
  text: No? Did you have a girlfriend at the time?
- speaker: Interviewer
  text: Okay. What did you do for recreation?
- speaker: Respondent
  text: Oh, they had movies and stuff like that on the ship.
- speaker: Interviewer
  text: Um-hmm. How about in England?
- speaker: Interviewer
  text: How about in England? Did you get to have any free time?
- speaker: Respondent
  text: Oh, yeah. We had -- you could go take -- get a pass and go, you know.
- speaker: Interviewer
  text: Did you -- did you ever go anywhere?
- speaker: Respondent
  text: Oh, I went to town a couple times.
- speaker: Interviewer
  text: And what did you do in town?
- speaker: Respondent
  text: I don't know. Drank, I guess.
- speaker: Interviewer
  text: Oh. So you said you only got to eat twice a day on the ship?
- speaker: Interviewer
  text: How about once you landed? Did you get to eat better?
- speaker: Respondent
  text: Well, of course, then they had three meals after you landed in England again.
- speaker: Interviewer
  text: Oh, okay. Was the food any better?
- speaker: Respondent
  text: No, it wasn't good.
- speaker: Respondent
  text: Tell them what you had; fish and chips.
- speaker: Respondent
  text: You had fish and chips.
- speaker: Interviewer
  text: Well, you bought those.
- speaker: Respondent
  text: Oh, okay. So what did the army feed you? Do you remember?
- speaker: Respondent
  text: Oh, I don't know. Stuff that you could hardly eat.
- speaker: Interviewer
  text: Uh-huh. Did you have enough to eat even though it was bad?
- speaker: Respondent
  text: Oh, yeah. There was plenty to eat.
- speaker: Interviewer
  text: Oh, okay. Did you have enough supplies?
- speaker: Interviewer
  text: Yeah? And what were your living conditions like?
- speaker: Interviewer
  text: What were your living conditions like?
- speaker: Respondent
  text: Oh, we lived in these tin Quonsets.
- speaker: Interviewer
  text: Did they build them, or were they there before?
- speaker: Respondent
  text: They were there before we got there.
- speaker: Interviewer
  text: Okay. And how about once you were out in the battlefield? What did you sleep in then?
- speaker: Respondent
  text: We had sleeping bags. And you didn't hardly dare to go to sleep because you'd figure somebody's going to get you while
    you were sleeping.
- speaker: Interviewer
  text: Oh. Did you ever receive care packages from home?
- speaker: Interviewer
  text: No? Do you remember Christmas away from home?
- speaker: Respondent
  text: We had a -- we had a big Christmas dinner.
- speaker: Respondent
  text: And while we was eating, the Germans come over and strafed us.
- speaker: Interviewer
  text: Oh, gosh. Was there something special you did for good luck?
- speaker: Interviewer
  text: Was there something special you did for good luck?
- speaker: Respondent
  text: For good luck?
- speaker: Respondent
  text: I don't know. We just hoped it wouldn't get hit.
- speaker: Interviewer
  text: Yeah. Do you recall any unusual event?
- speaker: Respondent
  text: We had a lot of those.
- speaker: Interviewer
  text: Can you think of any one?
- speaker: Respondent
  text: Well, I don't know. I was shot at so many times. I don't know.
- speaker: Interviewer
  text: How about any humorous event? Can you think of anything that was really funny?
- speaker: Respondent
  text: No, it wasn't very funny. We knew we were going to die.
- speaker: Respondent
  text: No, but you should tell them about this here quartermaster unit, when the bombs came down.
- speaker: Interviewer
  text: Oh, yeah. We had a -- in supply, we had quartermasters guys, and they were colored guys. And when they were bombing
    us, one of the colored guys said, "Oh, Lord, oh, Lord, oh, Lord, save me."
- speaker: Interviewer
  text: Was he saved?
- speaker: Respondent
  text: Well, he -- he lived through.
- speaker: Interviewer
  text: That's good.
- speaker: Respondent
  text: But those colored guys, boy, they sure were scared.
- speaker: Interviewer
  text: Yeah. And they -- I suppose they expressed it more than the white guys.
- speaker: Interviewer
  text: Well, you see, you could see those whites of their eyes, you know.
- speaker: Interviewer
  text: I mean, it isn't funny but --
- speaker: Interviewer
  text: But it's something.
- speaker: Respondent
  text: Yeah. Were you going to share something about --
- speaker: Interviewer
  text: Well, you can read that. I don't know if you want to. This here, he -- this is Christmas in 1943. I don't know if
    you want that on.
- speaker: Interviewer
  text: Can I read it?
- speaker: Interviewer
  text: '"Thorvald was reminiscing about Christmas in 1943. His outfit was first on German soil. He and another soldier were
    in a foxhole. For some reason he was called out. Another soldier jumped into the foxhole. The Germans fired a mortar shell
    and blew them all to pieces. For some reason he was saved, he said." And that was Mrs. Overland''s --'
- speaker: Respondent
  text: No, that was '43.
- speaker: Interviewer
  text: Oh, okay. The Lord was watching over you.
- speaker: Interviewer
  text: Yes, he was.
- speaker: Interviewer
  text: Did you keep a personal diary?
- speaker: Interviewer
  text: Do you remember what kind of pay you got?
- speaker: Respondent
  text: Yeah. We got $21 a month.
- speaker: Interviewer
  text: Did you keep it, or what did you do with it?
- speaker: Respondent
  text: Well, they took it. Most of it they took out for laundry and stuff.
- speaker: Respondent
  text: We didn't get -- what we got didn't amount to much.
- speaker: Interviewer
  text: They charged you for laundry?
- speaker: Interviewer
  text: That doesn't seem right, does it.
- speaker: Respondent
  text: No, it isn't right. But that's the way it was.
- speaker: Interviewer
  text: Oh. Did you have encounters with the local people?
- speaker: Respondent
  text: Well, the farmers over there.
- speaker: Respondent
  text: Farmers in France and Germany.
- speaker: Interviewer
  text: Oh, yeah. We -- we used to -- When we went into France there, then we got in with the farmers there and asked -- wanted
    to get some eggs, you know, get eggs so we could have something to eat but --
- speaker: Respondent
  text: You tell them about that lieutenant. He knew how to speak German, and they wouldn't give up eggs and ham, so he fired
    a shot.
- speaker: Respondent
  text: We -- we went up to a farmer, wanted to get the eggs. And he wouldn't give it to us, so he -- he just shot, shot by
    their toes. And then they come across with the eggs pretty quick.
- speaker: Interviewer
  text: Um-hmm, okay. Were they not -- how did they view the -- you guys? How did those local people -- Did they think of
    you as a hero or --
- speaker: Respondent
  text: No, no, no. They didn't like us because we was always -- figuring we got better stuff than they did, stuff like that,
    you know.
- speaker: Interviewer
  text: So you would think they would have been happy to have you there.
- speaker: Respondent
  text: Oh, I guess they were, some of them.
- speaker: Interviewer
  text: Um-hmm. But some weren't, huh?
- speaker: Interviewer
  text: Do any particular people stand out in your memory of the locals?
- speaker: Respondent
  text: Not of the local people.
- speaker: Interviewer
  text: Those people in Holland.
- speaker: Respondent
  text: No, that's good. I want you to do that. What about the people in Holland?
- speaker: Respondent
  text: Well, we -- we --
- speaker: Interviewer
  text: Rest period.
- speaker: Interviewer
  text: You got a rest period.
- speaker: Respondent
  text: Yeah. But I mean, we went -- heard something down in the basement. We took and threw a grenade down in there, all
    of us. There was a couple of old people, and we killed those two old people. That was so --
- speaker: Interviewer
  text: Yeah, but that wasn't in Holland, was it?
- speaker: Interviewer
  text: That wasn't in Holland.
- speaker: Respondent
  text: No. That was in Germany.
- speaker: Interviewer
  text: Yeah. But when you were in Holland, those people were so good to you. And they took you down in the mines and showed
    you.
- speaker: Interviewer
  text: You got to think about them.
- speaker: Respondent
  text: We had -- they had coal mines down there. And the guy where we stayed, he took us down in the coal mine, and we crawled
    on our hands and knees down in there.
- speaker: Interviewer
  text: Was that something -- Why did they want you to see the coal mines?
- speaker: Respondent
  text: I don't know. We just -- we were just down there, you know.
- speaker: Interviewer
  text: Did you trust them?
- speaker: Interviewer
  text: Did you trust them?
- speaker: Respondent
  text: Oh, yeah, I trusted those.
- speaker: Interviewer
  text: Okay. Were you in combat?
- speaker: Interviewer
  text: Were you in combat?
- speaker: Interviewer
  text: Many, many; he was in five campaigns.
- speaker: Respondent
  text: Um-hmm. Ask about the paper.
- speaker: Interviewer
  text: He was in Normandy, northern France, Rhineland, Ardennes, central Europe.
- speaker: Respondent
  text: Um-hmm. ____ the time.
- speaker: Interviewer
  text: He got the Bronze Star medal, Good Conduct medal, the European-African-Middle Eastern Theater service medal, three
    overseas service bars, no time lost under AW 107, whatever that means.
- speaker: Respondent
  text: Over the hill.
- speaker: Respondent
  text: You didn't go over the hill.
- speaker: Interviewer
  text: No, I -- I didn't go over the hill.
- speaker: Respondent
  text: What's that mean?
- speaker: Interviewer
  text: Well, they -- some -- some guys took off, you know, and -- and they got into trouble.
- speaker: Interviewer
  text: AWL, isn't it?
- speaker: Interviewer
  text: Hmm, okay. When you were out on combat, what was a typical day like? You know, it said here you were, like, 17 days
    in combat?
- speaker: Interviewer
  text: How did you even sleep?
- speaker: Respondent
  text: We didn't sleep much.
- speaker: Interviewer
  text: How -- but when you did, how could you? Did you just --
- speaker: Respondent
  text: Oh, you got so tired, you couldn't stay awake.
- speaker: Interviewer
  text: But did you have foxholes or --
- speaker: Respondent
  text: But then you got to -- didn't hardly dare to go to sleep because you figured you wouldn't wake up.
- speaker: Respondent
  text: Somebody stick a knife in you or something.
- speaker: Interviewer
  text: Hmm. So you wouldn't have one person sleep and one person guard?
- speaker: Interviewer
  text: No? I want to just check my camera, make sure it's working.
- speaker: Respondent
  text: Maybe we're keeping it going too long.
- speaker: Interviewer
  text: No, it's fine. I'm always scared I'm going to find that it's not working and we get all this in formation. Okay. Were
    there any casualties in your unit?
- speaker: Respondent
  text: Lot of them.
- speaker: Interviewer
  text: Lot of them? Did you lose any close friends?
- speaker: Respondent
  text: Several of them.
- speaker: Interviewer
  text: Yep. Were you wounded?
- speaker: Respondent
  text: No, I wasn't wounded. I had a bullet hole through my pants leg, but it didn't touch me.
- speaker: Interviewer
  text: Oh, okay. And we named his medals. How did you get your medals? Did they come after the war or --
- speaker: Respondent
  text: Well, they -- they had us -- called us out and -- and we stood in -- in line, and then they give you the medals and
    stuff.
- speaker: Interviewer
  text: Okay. What information about the war did you have while on duty? Did you get much information?
- speaker: Respondent
  text: Oh, not too much.
- speaker: Interviewer
  text: No? Did you get much news?
- speaker: Interviewer
  text: Did you know of any conscientious objectors?
- speaker: Respondent
  text: I think I knew one.
- speaker: Interviewer
  text: Um-hmm. What did you think about him?
- speaker: Respondent
  text: Well, he was a guy from -- I don't know what country he was from. But they drafted him into the service anyway. But
    he was a conscientious objector. He -- he could hardly speak English, you know.
- speaker: Respondent
  text: But he -- he shouldn't have been called out anyway.
- speaker: Interviewer
  text: Hmm. Can you tell me anything about your commanders?
- speaker: Respondent
  text: Oh, some of them I liked. Some of them I didn't.
- speaker: Respondent
  text: You were under Patton.
- speaker: Respondent
  text: You were under Patton.
- speaker: Respondent
  text: That was General Patton?
- speaker: Respondent
  text: Did you ever see him?
- speaker: Respondent
  text: Really? Wow.
- speaker: Interviewer
  text: You have to tell her about that there one time when this -- I don't know; was he an officer? He says, "Which way did
    Patton go?" "This way." Well, he went the opposite way.
- speaker: Respondent
  text: He was pretty tough, huh?
- speaker: Respondent
  text: Blood and Guts.
- speaker: Interviewer
  text: Hmm. Did you witness any acts of heroism that you would like to describe?
- speaker: Respondent
  text: I don't know.
- speaker: Interviewer
  text: Oh, Thorvald, you got to tell about this here Catholic priest that crawled over the German lines to this wounded soldier.
- speaker: Interviewer
  text: Gave him the last rites.
- speaker: Interviewer
  text: Gave him -- gave him the communion.
- speaker: Interviewer
  text: And that was an enemy soldier he did it to.
- speaker: Respondent
  text: Oh. And did the -- did the priest make it back?
- speaker: Interviewer
  text: What was a priest doing out on combat?
- speaker: Respondent
  text: Well, they went along with the unit.
- speaker: Interviewer
  text: You know, they have no fear, those Catholic priests.
- speaker: Respondent
  text: Yeah. Yeah.
- speaker: Interviewer
  text: Yeah. I had a lot of respect for him because he was out there where the bullets were.
- speaker: Respondent
  text: Yep. Do you have any photographs or souvenirs?
- speaker: Interviewer
  text: Oh, I had quite a few souvenirs and pictures.
- speaker: Respondent
  text: You brought back a gun, didn't you?
- speaker: Respondent
  text: Didn't you get to bring back a gun, you said?
- speaker: Respondent
  text: What was that again?
- speaker: Respondent
  text: That would be in this one.
- speaker: Interviewer
  text: This one? Okay.
- speaker: Respondent
  text: Yeah, um-hmm. It was a German Luger. There it is, in the back.
- speaker: Interviewer
  text: A Luger pistol.
- speaker: Interviewer
  text: It was a German one. And German binoculars.
- speaker: Interviewer
  text: And who has those now?
- speaker: Interviewer
  text: Your sons have that?
- speaker: Respondent
  text: Yeah, the boys have it.
- speaker: Interviewer
  text: Chester and --
- speaker: Interviewer
  text: Harry. Okay, and let's see. Were you able to correspond to people at home?
- speaker: Respondent
  text: Wrote letters, but your letters and stuff were censored.
- speaker: Respondent
  text: They -- you wasn't allowed to give out any information, you know.
- speaker: Interviewer
  text: Um-hmm. So you couldn't really say too much then.
- speaker: Interviewer
  text: Did you keep any of your letters?
- speaker: Interviewer
  text: No? What did you like least about your service?
- speaker: Respondent
  text: Some stuff I didn't like very good.
- speaker: Respondent
  text: Well, they could tell you to go -- to go, and you didn't have no say. If they told you to go out and get a German
    soldier, a German prisoner, you went out and got it.
- speaker: Interviewer
  text: Um-hmm. Did you see -- did you have German prisoners in your --
- speaker: Respondent
  text: Yeah, we captured quite a few.
- speaker: Interviewer
  text: And what do you do with them?
- speaker: Respondent
  text: They took -- they took them back to the -- away,
