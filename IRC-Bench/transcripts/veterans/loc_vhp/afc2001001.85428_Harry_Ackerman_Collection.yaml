collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Congratulations. And what war did you serve in?
- speaker: Respondent
  text: I served in World War II, U.S. Air Force.
- speaker: Interviewer
  text: U.S. Air Force. And what was your highest rank?
- speaker: Respondent
  text: Highest rank, I reached the rank of major and turned down the rank of lieutenant colonel and went home.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Van Nuys, California.
- speaker: Interviewer
  text: Tell us about your parents.
- speaker: Respondent
  text: My mother was American born. She was raised in Chicago, Illinois. My dad was born in Germany, and he ran away from
    home when he was about, I think, around 14. He ran off to Russia, and he lived in Russia for a number of years and made
    his way to England. And he stayed there until he around the end of the 1890s. He made his way to the U.S., finally made
    it down to St. Louis, and then moved up to Chicago, where he met my mother-to-be.
- speaker: Interviewer
  text: What was his occupation?
- speaker: Respondent
  text: At that time, I don't know what he was doing. After I was born, he had his own store in Van Nuys, basically a men's
    store. Later, he had a military type store when we moved to San Diego. Then he moved to Culver City in California.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I only had one brother after the first boy passed away.
- speaker: Interviewer
  text: How old were you when you entered the Service?
- speaker: Respondent
  text: I was in college at the time. I was taking engineering at the University of Nevada. I heard the Air Corps was looking
    for people with engineering background to join the Air Force to become navigators or teach navigation.
- speaker: Interviewer
  text: When did you enlist?
- speaker: Respondent
  text: I went in January of 1942. I was interviewed by an Air Force team in Reno and was one of five accepted.
- speaker: Interviewer
  text: Can you tell us about your training once you were enlisted, and what type of training did you have?
- speaker: Respondent
  text: The military part of the training involved learning military activities. Then I started learning special duties assigned
    to me. I was sent to Mather Field in California for navigation courses. I had been through pilot training and could fly
    Stearman BT-13s. Then we went to a school in the south teaching navigation, then transferred north, and finally back to
    Sacramento where I started teaching navigation.
- speaker: Interviewer
  text: What were some of your special duties?
- speaker: Respondent
  text: I became an instructor teaching navigation classes in California.
- speaker: Respondent
  text: One funny thing happened. A classmate and I were sent to Louisiana to evaluate a navigation school and do a show-and-tell
    program for returning airmen. At noon, we decided to show how to make a dry martini. During the class, a man left and
    came back saying the colonel wanted to see me. The colonel was very angry because I had brought liquor into the room,
    which was illegal on the base. He said I violated the law and would be court-martialed. I promised God I would never set
    foot in Texas again if I got out of there. The next day I was sent home. When I got back to Blythe, California, the colonel
    was laughing and said the only thing I did wrong was the liquor business and told me to go back to work.
- speaker: Interviewer
  text: Were the people you were teaching other Americans or allies?
- speaker: Respondent
  text: They were American military personnel who had been sent down to be brought up-to-date on different radio programs
    and procedures.
- speaker: Interviewer
  text: From there, you wound up in England?
- speaker: Respondent
  text: Yes, after being relieved as an instructor, I was sent to Sacramento and joined the 91st Bomb Group preparing for
    overseas deployment.
- speaker: Interviewer
  text: Tell us about your experiences in World War II and what you did.
- speaker: Respondent
  text: We were assigned to fly with Jimmy Doolittle's group for training flights. Later, we joined the 91st Bomb Group, which
    was formed in Florida. We flew to Walla Walla, Washington, then headed to Europe via Florida and across the Pacific.
- speaker: Interviewer
  text: Do you remember what year that was?
- speaker: Respondent
  text: October 13, 1942.
- speaker: Respondent
  text: On October 13, 1942, the 91st Bomb Group was ordered to England and assigned to the 8th Air Force. During the operational
    tour from October 13, 1942, until July 17, 1943, I flew three missions as lead navigator, six as wing leader, ten as group
    leader, and six as squadron leader. On my 22nd mission on May 22, 1943, to Wilhelmshaven, Germany, I was wounded by a
    German fighter plane along with other crew members. We returned to base, and I was hospitalized until June 9, 1943. I
    returned to the 91st Bomb Group on June 28, flew my 23rd mission, and completed my 25th mission and operational tour on
    June 29, 1943. On July 1, 1943, I received orders to return to the U.S. via Glasgow, Scotland, where I boarded the Queen
    Elizabeth.
