source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: Prior to the service of military. Of course, I have been working for the Department of Justice since 1992 as an instructor
    and that is what I am doing now. I am an instructor for the U.S. Department of Justice.
- speaker: Interviewer
  text: You were in the National Guard?
- speaker: Interviewer
  text: Then you were drafted, then you were sent on short notice to go to Iraq.
- speaker: Respondent
  text: Right. We were given deployment orders in early 2003, January 2003. Basically, what happens in that type of situation
    is that the National Guard Unit is activated. It is called activation and then from there you go into a deployment status.
    We did our prep or logistics and then we were sent to Fort Stewart for basically certification if you will. So that we
    can get accredited, that is when they check our various type of situations of chemical capabilities, weapons and medical
    and all of these types of things, then given training, preparing us for deployment, you know our shots and all these type
    of things, preparing us for our flight out to Southwest Asia, to Kuwait, and then on to Iraq.
- speaker: Interviewer
  text: Do you remember arriving and what it was like?
- speaker: Interviewer
  text: Deployment to Fort Stewart.
- speaker: Respondent
  text: 'Fort Stewart. What happens there, is again, we get all of our logistics, our personnel, and all of our rosters, all
    that type of stuff hooked up and we basically take buses to Fort Stewart and then go to the reception center there, and
    that is really hectic, once you arrive in that type of environment it is shots, medical clearing, uniform issues, you
    know getting cleared, getting all the things that you require, clothing, tactical types of things and then you go through
    various types of training: getting operationally cleared, you have to make sure that your equipment does work and then
    you actually go through some type of training. Different - various types like weapons if you will - preparing. We were
    combat heavy, combat heavy engineer battalion, so we had an idea of what we were going to do as far as that and making
    sure that we have multiple capabilities - horizontal, vertical, different type of things, but understanding it is a dynamic
    battlefield, so even that given that we are combat engineers, at any time you could be basically placed in a security
    role, military police, or if you will, an infantry type of role. See, you have to be multitasker. It was pretty hectic.
    Uh, it was pretty hectic. A lot of these guys were young soldiers, had never been deployed before, rather than their annual
    training. So, this was quite a shock. Even the vast majority of our NCO''s, even Senior NCO''s had never seen anything
    like this. As I recall in my unit there were only two, myself and one other soldier, that was prior service combat, and
    that would be Sergeant Blackwell.'
- speaker: Interviewer
  text: What was your job assignment at Iraq?
- speaker: Respondent
  text: I am a Company First Sergeant for Bravo Company 890th. Um, my main job normally under, I guess, sanitary circumstances,
    is logistics and rudimentary planning. That is what a First Sergeant does. So I support the commanders logistics making
    sure, basically that the beans and the bullets are provided and so on, so forth. However, we were kind of put in a bad
    circumstance. I would say that we were short on officers, drastically short. One officer was not physically capable of
    performing. So, we were basically down. In country we had one executive officer and one platoon leader, so that changed
    the leadership dynamics. No one had prior active military time, myself, you know I had two combat tours prior as an infantryman,
    and so, I kind of had an idea on that mission part. So, what happens instead of just being in the logistic standpoint,
    of what happens is an executive officer basically plans the missions and I was the executing on the end. I actually led
    the soldiers as a platoon leader, if you will, in the field. Multitasking, we did have some humanitarian missions initially
    that were planned. We were deployed initially into Balad, which is north somewhat of Baghdad, near the Tigris, Euphrates
    River, a branch off, Anaconda was our base name, and Balad is an old Iraqi air base. We became a fully operational base;
    it was a prior Iraqi air base. We actually were the first ones into the base. We had to clear it. There was a little bit
    of resistance there, not a lot. Some resistance getting the buildings squared away and establishing a perimeter, so on
    and so forth. We were tasked to the 5th Corps, then eventually we were tasked back to the 82nd airborne division. 3rd
    ID had operational control, so we were kind of passed around a little bit. Initially, at Balad we set up a logistics base
    to support various types of missions. They put a field hospital in there, so on and so forth. We initially had to man
    the perimeter if you will, and we linked up with various different units in our sector, so that was basically establishing
    that at Balad. From there they wanted to do CA, Civil Affair, missions where they would actually go out in the community,
    fostering a good benefit and good rapport with the civilians in the area. Unfortunately, Baath headquarters area and there
    was a lot of Pro-Sunni type of elements there. So, they weren't really happy about us being there as such, so we found
    out going on some of these civil affair missions, we were hit immediately, time and time again. We were trying to build
    schools and a field hospital out there in the community and every time we would go in a certain sector of town we were
    hit, engaged with under fire, small arms of some type and, so it made it pretty hectic. The civil affair missions were
    never able to get off of the ground. We just found ourselves clearing buildings continuously and trying to protect the
    engineers that were actually trying to do their job. At that time I realized that we were going to have to form a permanent
    quick reaction force to react to these types of missions, and I was in charge of manning that, and then actually fielding
    that team. They actually did very well. The vast majority of the training was done under fire and they did very, very
    well. We did not sustain any significant injuries or casualties during those deployments in Balad, fortunately for us.
    But it was also, you know, prior planning, good training. The U.S. Army is the best schooled army in the world, training
    doctrine, you can't beat it. So, we had the best equipment and definitely were tenacious, pretty aggressive doing our
    jobs, so we did well there. We stayed in Balad for about 2 - 2-1/2 months. Then it was decided that we were going to be
    then tasked to the 82nd Airborne and sent to a place called Habbaniyah, which is near the town of Al Khalidiyah, in Iraq.
    It is roughly between Ramadi and Fallujah. That is basically where Habbaniyah is. It used to be a British base at one
    point. That was going to be where we were stationed. We were on one side of the road, and then the other side we had an
    armored unit, which is really a wonderful thing to have. Armor is a wonderful thing. There we did again, various types
    of what we call sustainment missions. The Core Engineers themselves, they were actually there to build the base itself,
    to prepare for the 82nd airborne main body, and then later on the marines would be handed over. It was interesting. We
    were outside of the wire if you will. We established our own perimeters and there we had to take care of that mission
    on one side of the road. And on the other side we had to also get the buildings up for the army units in the on coming
    years that were going to come into play. We were hit in Balad and in what was Ridgeway, called Ridgeway by the 82nd airborne.
    We were hit out of the 380 days, approximately in country, we were probably hit with some direct or indirect fire, probably
    320-330 days. I am saying that one way or the other. It was pretty interesting. You know, in direct fire is something
    that you can only account for so much, because it was random. They would typically drive around the perimeter, if you
    will, in the back of pick up trucks or whatever with mortar tubes and they would basically randomly launch these mortar
    rounds in. We were so close to the wire, we were pretty unscathed, and everything pretty much went over us and landed
    in the 82nd main area. Had a couple of close calls. We would have just sporadic fire and so on and so forth. Very interesting.
    A lot of time we would go back and forth between Balad and Ridgeway and we had to go to Falluja, bringing convoys through
    Falluja on any given day is an adventure in itself. It is imperative that you maintain your road speed and that you are
    deploying your forces properly; you have to react to every contingency. We were hit quite a bit going through there. Lacking
    armor for the vehicles and things like that. Well, you know you just do the best you can. You sand bag and armor your
    vehicles as best as you can under the circumstances. We were very fortunate and we did well. Um, not really any big incidents
    where we lost a few soldiers here and there on various types of convoys. Again, very much was there. The biggest action,
    um, I am sure that you are going to ask more questions but the biggest; I guess my most significant day, if you will,
    happened on September 11, 2003. We were in Ridgeway, Habbaniyah. The other teams were out. I had three QRF teams, if you
    will, operating out of Habbaniyah, approximately 24 personnel, that was including medics, and I only had six soldiers,
    that is myself and five that were not out on some type of security mission when a call came into our battalion stating
    that elements of the 489th combat engineers, out of Arkansas, good unit, real good guys, they had been ambushed coming
    back from Ramadi and that they had been hit and they were wounded and their equipment had been destroyed. They were trapped
    downtown. They were asking for assistance. That came down and there was really no one available, so my executive officer,
    Lt. Holmes said, "First Sergeant do you have a team ready." I said, "Yeah, myself and my alpha team, if you will." He
    said that you need to get ready; these guys are caught and can't get back. So, we were always ready anyway, so we loaded
    our gear up and the teams from the 489th were meeting us back at the post by then, and they said that they had to go back
    down, that some there assets, and they needed some back up. At that point we linked up with them. We rolled back into
    town, secured the vehicles, and then I guess the ambush, if you will, that - we assumed that they were kind of baiting,
    hoping someone would react to. Of course we handled that. We got our stuff, people and equipment, and right after that
    we were hit. It was unbelievable. They estimated 75-100 enemy combatants were close, and we were catching fire from everywhere,
    left and right, the street, from building tops, and we did the best we could. The First Sergeant from the 489th team was
    able to secure his perimeter section to link up with the tank. There was one battle tank, one that was down the road,
    he was signaling for us. He had taken an RPG hit, to no avail, and a RPG shot over him, and he was signaling us up to
    support him. Understand, infantry supports sometimes so we rolled up, myself, Sergeant Hernoun, and Sergeant Blackwell.
    I left Specialist Myrick and Specialist Taylor at the mid point. Basically, kept our vehicle in case we had to get out
    hastily, and Specialist Scott was left in the rear. He, Scott did a wonderful job arranging security when the Iraqi forces
    tried to compromise our rear, and he took care of that right off of the bat. It became pretty heavy. Ultimately, the firefight
    lasted approximately eight hours. I was wounded during the firefight in the face with bullet and debris shrapnel. I was
    hit in the chest and in the hands. Sergeant Hernoun caught one in the leg and Sergeant Blackwell caught one in the upper
    leg, but we were able to maintain the fighting effectiveness. We secured the perimeter, and it was stalled. At that point,
    additional armor arrived on the scene and we were able to help redirect some of the fire. Once that was done and we were
    able to pull back, we were able to get our forces together and we were actually able to turn back to Ridgeway under our
    own power, so we were able to do that. It was a wonderful thing, to be honest with you. But at my vehicle, the vehicle
    that I left at the mid point, had over 200 holes an RPG had gone through the right rear quarter panel and took a 90 degree
    turn and went out the rear of the vehicle and about 20 feet spiraled up and blew up, so that was kind of a saving grace.
    It is amazing, God's grace, that we were able to survive that. The bullets were like rain drops, all around us. It was
    the most amazing thing. You know the team reacted very well, you react to your training and they taught us in training,
    we trained as we were going to fight, so we were taught very well. You always think about things after. You know that
    is when you contemplate, well could you have done better, or you know that is when I guess anybody that says there not,
    you know, you do not react with fear while you're doing it, you just do your job and you react to that. You do not think.
    Afterwards, you think, wow, that was pretty scary but you do not have time to think about being scared during it. You
    always have time to think of that later. I thought about it, it was pretty emotional. We sat down and talked about it
    and it brought tears, and you know we were able to go to the next day, we did, matter of fact the very next day our alpha
    company had been hit going back to Falluja and they were hit and we reacted to them the very next day. You know you have
    bandages already, you do what you have to do, but if you are not taken for you are still going to be combat effective.
    I did very well. So that was probably one of the many incidents, there were a lot of good things that we did during deployment.
    You know I hear everybody likes to expand on the negative part of the war; the loss of life is a terrible thing. It is
    a terrible thing, and even when one American dies it is a terrible thing, it is a tragedy. But you know I have to firmly
    believe in our Chief Executive, the President of the United States and he deploys his forces as best as he sees fit, with
    the intelligence that he has and you know a soldier's job is not to question.
- speaker: Respondent
  text: The authority of this or that, or get caught in the politics. We do not have that luxury. I would say this, unless
    you have been on the ground, and unless you have been there, seen it, and seen the good things that we have done to help
    the Iraqi people. You know unless you have a dog in the race I would pretty much stay out of the race. You know it is
    easy for these people to say this or that, or that or this, you know unless you have been there, and if you are not wearing
    the boots and you are not in the fight, you really don't know what you are talking about.
