collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: I was in Operation Desert Shield/Desert Storm while I was in the Army Reserves, and then I was active duty Navy during
    Operation Enduring Freedom and Iraqi Freedom.
- speaker: Interviewer
  text: I was in the Reserves from December of 1988 until February of 1992, and then I was active duty Navy from February
    of '92 until May of 2007.
- speaker: Interviewer
  text: I was an E-3 when I got out of the Reserves and then I was an E-6 when I was medically retired in 2007 from the Navy.
- speaker: Interviewer
  text: Well, I was a junior in high school at the time and I was out running around with a friend of mine, and he had to
    go check in with his recruiter. He was a senior in high school and he had already signed up to go active duty Army, and
    we went in to check in. I was just talking to his recruiter, and they had a program back then where you could go to --
    if you went into the Reserves you could go to basic training in between your junior and senior year of high school, and
    then after your senior year of high school do your advanced training, and then just be a Reservist from there. And so
    that's how I got into the Reserves. And after I got home from my advanced training I wanted to go active duty Army, and
    I went in to talk to the recruiter and at that time Kuwait had already been invaded. This was late 1990. And he made a
    couple phone calls and he told me that I couldn't because my reserve unit was on the list to be activated to deploy in
    support of Operation -- at that time Desert Shield. And then the first week of December of 1990 we received a phone call
    that said we were activated for Desert Shield, and we went to our reserve unit, which at that time was in Wood River,
    Illinois. And four days later we went down to Fort Leonard Wood, Missouri. We were down there for, I don't know, about
    a month, month and a half, and then we flew over to the Gulf for about five months in support of Desert Shield and --
    which turned into Desert Storm, and then when I came home from the Gulf a couple weeks later I went in to talk to my recruiter,
    who was still there, to see if I could, you know, switch over, you know, to active duty. And like at the end of any conflict,
    we were in drawdown at that time. So he said, "You have too much active duty time, so I can't" -- "at this point just
    keep checking in with me." And probably for about the next six months or so I was calling him weekly and he was telling
    me the same thing. And I went in to see him in the summer of '91 and got the same story. And I was walking out, and I
    was sitting outside waiting for a friend of mine to come pick me up and a Navy recruiter walked -- he was walking in,
    and I guess I had a look on my face or something. He asked me what was wrong. I told him. He said, "Come on in and let's
    talk." And the next thing I know I was signed up to go in the Navy. So I went to Navy basic training in Great Lakes, Illinois,
    and then down to Meridian, Mississippi for my advanced training, and from there I went to Puerto Rico and started my career
    for the next fifteen years in the Navy.
- speaker: Interviewer
  text: Fort Polk, Louisiana, and then my advanced training was in Aberdeen Proving Ground in Maryland.
- speaker: Interviewer
  text: I was a 45 Bravo, which is a small arms repairman. Basically all of the handguns and all of the machine guns and pretty
    much anything that any of the soldiers carried with them, my job was to do maintenance on them and repairs that could
    not be done by just the average everyday soldier.
- speaker: Interviewer
  text: When we first deployed over there, we went to Saudi Arabia, and we had to wait for our equipment and stuff to get
    there. And then once it got there, we moved up north right off, because at that time the air war was going on, but the
    ground war had not started yet. And we moved up north right off the Saudi Arabia, Iraq, Kuwait border. It makes kind of
    a little point right there. We moved up there and we weren't sure if we were going to do anything or if, you know, we
    were just going to -- we had no clue what we were going to do. And then a couple of days before the ground war began,
    they -- my platoon sergeant asked me if I'd be interested in driving -- volunteering to drive a fuel truck. I didn't know,
    you know, what it was for or anything, so I said, "Sure, why not." You know, we'd been basically sitting there for a month
    and a half doing nothing -- a whole lot of nothing, anyway. So I was bored. And there were about eight of us and we went
    over to the battalion to -- basically to be briefed, and they told us that we would be driving 55-gallon -- not 55-gallon,
    I'm sorry, the huge tanker trucks full of diesel fuel and we'd be rolling with the units as they went into Iraq. And,
    you know, at 19 I'm like, hey, this is kind of cool, but then I was thinking about it -- the morning that we moved into
    Iraq, we were about -- I was about four or five vehicles back and the lead vehicle came over the radios and told all of
    us that he's getting ready to cross into Iraq, it's time to go. And at that point it kind of hit me. I'm like, "Oh, crap,
    I'm sitting on I don't know how many thousands of gallons of gas -- diesel fuel that I'm sitting on." But, you know, nothing
    happened with that. And we proceeded up into Iraq. Basically we were just -- well, you know, we were probably fairly protected
    because we had the gas and they knew they would need the gas at some point. And we came, you know -- came up and around
    and there was a unit in front of us that was doing the bulk of the fighting, and they were -- got to the airport in Kuwait.
    We were right outside the airport and the unit that was in front of us that we were doing the bulk of the supporting for,
    they were doing all the actual fighting there and -- it wasn't long, you know, looking back on it, but at the time it
    felt like we were sitting there for days. I know it wasn't that long. And then once that got all cleared up, you know,
    three and a half, four days later, the ground war was over and we were driving -- you know, they still had us doing some
    other support stuff, because they were still sending units further up into Kuwait to make sure everything was okay and
    all the Iraqis were out of there. And the road that we took going back and forth every day we couldn't actually take the
    road. We had to drive on the outside of the road because it was -- the main highway. I can't remember what the number
    of the highway was, but it was the one the media here in America deemed "The Highway To Hell," and I was 19 at the time
    and I saw stuff on that road that I still remember to this day and it's, you know, just -- I don't know. Just, you know,
    all the stuff blown up and, you know, everything when the Iraqis was trying to get out of there. Well, anyway, we stayed
    there for probably about a month doing different things with that unit that they needed us to help them with, and then
    we went back to our unit, and then a couple of months later -- we just stayed in the area and just did our regular jobs,
    maintenance, and, you know, we also -- in my unit there were guys that worked on trucks. So as the units were pulling
    out of Kuwait and out of northern Saudi Arabia, if they needed the work done on them they came to us. And a few months
    later we ended up coming back. We left Saudi Arabia and went back to Fort Leonard Wood, Missouri, for about two weeks
    to get demobilized, and then we came back home and were sent on our way.
- speaker: Interviewer
  text: My unit had, I want to say, probably about a hundred. We weren't that -- we weren't that large. And we did have both
    men and women in our unit.
- speaker: Interviewer
  text: No, not while I was over there. No, I did not.
- speaker: Interviewer
  text: A lot of maintenance on equipment and guns. A lot of playing cards. A lot of, you know, just sitting around shooting
    the breeze, trying to figure out something to make the time go. I mean, we only had a couple of months of down time. I
    can't imagine what it was like for the guys that got over there the middle of August of 1990 and didn't see anything happening
    until, you know, early 1991. I couldn't even imagine sitting over there that long just in a sandbox for days on end.
- speaker: Interviewer
  text: It was probably in the mid to upper nineties during the day, and then it -- actually, I don't know how cold it got
    at night. I remember it always felt really cold because the temperature dropped and you could -- you know, you'd go from
    sweating during the day to an hour after the sun went down having to put on the coat that we wore back at Fort Leonard
    Wood, Missouri in January, you know, because it went from just extremes. From, like I said, mid to upper nineties to what
    felt like freezing cold at night. I mean, it may have only been down to, like, the forties or fifties, but it felt really,
    really cold.
- speaker: Interviewer
  text: You stayed on the compound unless you had a reason to go somewhere, and we very rarely had reasons to go somewhere.
    So, yeah, once we got up north and got settled into our compound, you pretty much stayed there the entire time.
- speaker: Interviewer
  text: Well, we had -- we always had a hot breakfast and then our lunch and dinner would be MREs, the meals ready to eat.
    I mean, we always had enough to eat, but, you know, you eat out of a bag twice a day for months on end. You know, you'd
    get home -- I remember when we got back to Fort Leonard Wood, that first day back a bunch of us went to Burger King on
    base and ate because we wanted some real food. That was a mistake. We were all sick for hours after that and, you know,
    we went to the medics, and they said, "It's just because you ate" -- "you ate real food and your system is not used to
    real food."
- speaker: Interviewer
  text: Uh-huh. And all got sick.
- speaker: Interviewer
  text: They probably should have, but, I mean, nobody thinks -- you know, you don't think about that. You think, oh, yeah,
    you'll be fine -- but no.
- speaker: Interviewer
  text: The Liberation of Kuwait Medal, the Southwest Asia Service Medal, which was the one that was issued out for Desert
    Shield/Desert Storm, and then a Army Commendation Medal, and that was for volunteering to do the driving of the fuel trucks.
    Because we were -- actually, the eight of us that volunteered for it, we were presented that medal in -- still in country.
    We were in Saudi Arabia and General Schwarzkopf actually presented all of us that medal, and he told us -- he said, "I
    never heard of you guys before, but when I read these orders, you guys were eight of the craziest" fill-in-the-blank "individuals
    that I can think of," he said. And he asked all of us, "Why did you volunteer to drive a truck full of fuel?" And we all
    basically said the same thing, we were bored. We wanted something to do. Again, he told us we were crazy individuals.
- speaker: Interviewer
  text: In a way it was surreal, but then he was kind of -- he was almost like a grandfather figure. I mean, you know, he's
    a four-star general, he's the man that just, you know, led a four-day, you know, ground campaign and got it all done;
    but he came across, at least to me, as the type of individual if you take off the uniform, he could be anybody's grandfather
    you'd see walking his granddaughter through, you know, a store back home. He was not -- he didn't come across as, you
    know, "I'm a four-star general, I'm better than you." He just was an everyday -- everyday guy.
- speaker: Interviewer
  text: No, they were all men. I'm not sure if any of the women volunteered for it, but at that time the female soldiers were
    not allowed in combat. So being in those fuel trucks driving across the border into Iraq, not knowing what was going to
    happen, that was considered combat, so they were not -- even if they would have volunteered, they would not have been
    allowed to do it.
- speaker: Interviewer
  text: Yeah. No, they were treated differently in the sense that more opportunities opened up for them to be able to serve.
    I mean, just recently they were -- legislation was changed to where they could actually start serving in combat now. But
    they did serve more roles -- you know, I've heard -- read of where there were female soldiers doing the job that, you
    know, I did back in, you know, 1991. They were driving fuel vehicles or other support vehicles or whatnot, actually in
    harm's -- harm's way. There were -- they are actually combat pilots now, both for airplanes and helicopters. So, yeah,
    it's -- a lot has changed in that 20 years.
