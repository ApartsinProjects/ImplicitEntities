collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: What branch of service did you serve in?
- speaker: Respondent
  text: I was in the Army.
- speaker: Interviewer
  text: During which war?
- speaker: Respondent
  text: World War II and Korea.
- speaker: Interviewer
  text: And the rank that you achieved?
- speaker: Respondent
  text: Well, when I was discharged, I was a captain. But I stayed in the Reserve, and I retired as lieutenant colonel.
- speaker: Interviewer
  text: Can you tell me where and when you were born?
- speaker: Respondent
  text: I was born in Reading in St. Joseph's Hospital, grew up in Wyomissing, graduated from Wyomissing High School.
- speaker: Interviewer
  text: Tell me about your early military training.
- speaker: Respondent
  text: I went to the University of Cincinnati where I was in the ROTC. In March of '43, they took us down to the induction
    station, put us through the whole thing and then put us in the Enlisted Reserve Corps and let us finish out the year of
    college. Then, on July 5th, I reported for active duty at Fort Thomas, Kentucky, where we went through all the vital rigmarole
    and got our uniforms and so forth. We were there for a couple days. Then we were sent to Camp Perry, Ohio, and we had
    a sergeant who took us through basic training. He was one of the president's hundred, sharp shooters at that time, and
    he taught us riflery and so forth. When we finished our basic training, we were sent to Camp Davis in North Carolina where
    I was in the aircraft officers candidate school. Went through 18 weeks of that and was commissioned a second lieutenant.
- speaker: Interviewer
  text: What happened after you were commissioned?
- speaker: Respondent
  text: I was sent to Camp Edwards, Massachusetts on Cape Cod where I was officer number 14 in the unit that was only supposed
    to have six. At that time the U.S. had gotten an air of superiority and they were phasing out the anti-aircraft, and since
    I had been to engineering school they sent me down to Fort Belvoir where we went through basically the same training that
    the officer candidates had except we didn't have any of the baloney, just engineering subjects. Then I was sent to Fort
    Leonard Wood, Missouri, where I joined the 97th Division, 322nd Engineers, and we were in small unit training. We ran
    on a reservation. They sent us out for three days with a platoon. Theoretically, we were in the jungles of the South Pacific,
    and we were given areas to go to and there was food for the next day and items that we needed. Theoretically, they were
    being dropped by air. We did three days of that. After that, we were sent to San Luis Obispo where we received amphibious
    training. The engineers go in with the boats and we laid wire on the beaches so the trucks could drive across, made sure
    there were no mines and so on. When we finished that, we ended up at Camp Cooke in California. While we were there, the
    Bulge hit in Europe and we turned in all the equipment we had for the South Pacific and drew new equipment for Europe.
    We left there about the 17th of February and landed in Le Havre around 22nd or 23rd of February. They moved us pretty
    quick.
- speaker: Interviewer
  text: Tell me about your time in Europe.
- speaker: Respondent
  text: We went to a place called Old Cold, a staging camp in Fecamp near where the Benedictine monks are. They make B and
    B. We found out they sold bottles of B and B but wouldn't sell you any unless you had an empty to bring back. They stored
    them out back so we'd go back and get the old one and bring it. Then I was sent up to Belgium to Brussels where we drew
    trucks and heavy equipment. After we got settled, we loaded up and went through Offen to Julich and on to the Rhine River.
    We sent a couple of combat patrols across the river. The engineers battled the boats, the infantry rides. We sent several
    combat patrols across the Rhine. When the boys came back from the other side, they would pull the boats up on the shore
    but wouldn't take them any further, and three engineers can't lift them. The Germans would shoot them full of holes. The
    captain sent me down to talk to the regimental commander to get help pulling them up because we were running out of boats.
- speaker: Interviewer
  text: How did that go? Did they cooperate?
- speaker: Respondent
  text: Oh, yeah. I went down to headquarters and explained our situation. A fellow said, 'Lieutenant, those boys are tired
    when they come back.' I said, 'I realize that. So are our men, and three of them can't carry the boats. We need help.'
    I looked at him and saw he had a star on him. He was division commander. So, after a couple days there, we went to a place
    called Esslar on the southern end of the Ruhr. I was then administrative officer, so that evening I came down with hot
    food for the men who were working. The captain said I could take over the third platoon because the platoon leader had
    taken off. We finished a footbridge, big things that float and you put walks across, and we spanned the river. When we
    finished and got across the Sieg River, the infantry was just coming down the hill ready to cross at the Ruhr Rohr. We
    maintained the bridge and so on.
- speaker: Interviewer
  text: What happened next?
- speaker: Respondent
  text: One day the captain told me to report to a place where the 87th infantry regiment commander was. He told us that tomorrow
    morning we were going to go into the Ruhr, get ourselves surrounded, and then fight our way out to where the others were
    coming in. While I was on my way there, I had the whole platoon plus a bulldozer and a 20-ton trailer. We came to a place
    where they had knocked out the bridge over a railroad. We went down along the railroad to find a place to cross. The 20-ton
    trailer and truck couldn't make the U-turn. I took the bulldozer off the trailer, unhitched the truck, and pulled the
    trailer with the bulldozer. While I was doing this, someone came up behind me and asked how long it would take. I turned
    around and saw two stars. I saluted and started to report. He said, 'Forget that, just get your work done.' That was General
    Rose, a tank commander who was killed two days later at Paderborn when they surrounded and closed off the Ruhr.
- speaker: Interviewer
  text: Did you have any other notable experiences during that time?
- speaker: Respondent
  text: Yes. There was a big apartment house where we stayed overnight. Across the way was a big warehouse with all our ammunition.
    During the night, someone set fire to it. All the ammunition cooked off. One of the men woke me up and said the place
    was on fire. I got dressed and got out. The men were all out, so I was the last one out. When we lost all our ammunition
    and supplies, I called it off. Then the infantry closed off the Ruhr and had a big field full of German prisoners. After
    that, we loaded up in trucks and headed down to the Czech border to a place called Eger or Cheb. We cleared roads where
    obstacles had been put in. I had an adventure trying to get to a certain railroad bridge amid a lot of shooting. I called
    up on a tank and talked on the radio. While leaning in talking, I got off the tank and ended up in a ditch. I still don't
    know how I got there.
- speaker: Interviewer
  text: That sounds dangerous. What happened next?
- speaker: Respondent
  text: Then we went on to another town where I was supposed to check on another railroad bridge. I was stopped and told not
    to go down there. I looked down the road and saw about 10 or 12 Jeeps stopped by the side. One of my men went down, got
    in the lead Jeep, turned it around, and brought it back. I went in the ditch and was shot at by a sniper every time I
    stuck my head out. I got out of there and we went on into Czechoslovakia, ending up in Pilsen where the war ended. We
    had a German regiment surrounded in the woods. We told them the war was over but they didn't believe us because their
    radios were out. My division was credited with firing the last shots in Europe because we were still fighting with these
    guys. Two days later, it ended.
- speaker: Interviewer
  text: What did you do after the war ended in Europe?
- speaker: Respondent
  text: We camped there for a while and then went back to Old Cold, another staging camp. I was put in charge of a box factory
    making boxes for all the equipment to box it up and bring it back. One day my colonel said the division commander was
    coming. We lined up and the general wandered through the box factory still wearing his steel helmet while all our men
    wore overseas caps because the helmets were boxed up. The colonel asked if we noticed anything odd. We said no. The colonel
    said the general was still wearing his helmet because he didn't have a box to put it in. It was humorous. We had German
    prisoners building the boxes and we were in charge of them. We boxed up everything and then were sent back to the States.
- speaker: Interviewer
  text: What happened when you returned to the States?
- speaker: Respondent
  text: We went to Fort Dix. I was given a 10-day leave, went home to Norristown, then reported to Fort Bragg, North Carolina.
    There they assembled a division, put us on a train, and sent us to Camp Lawton in Washington. There they put us on a boat
    and we went to the Pacific. We went to Honolulu and sat in the harbor on the boats for a couple days. The war ended while
    we were on the way to Cebu. We were supposed to make the invasion of Japan. Later I saw the plans; our division was supposed
    to go in the Chiba Peninsula on Tokyo Bay. They called it off after the surrender. We sailed directly into Tokyo and then
    went up to Mitsugahara Airfield. I became company commander while still a first lieutenant. We were like post engineers,
    keeping the dirt roads oiled to keep dust down.
- speaker: Interviewer
  text: What was your role during the occupation of Japan?
- speaker: Respondent
  text: When the division broke up, I was sent to the first cavalry division to the eighth engineers, then later to eighth
    Army headquarters engineers. I was given a pass signed by General Eichelberger, head of I Corps, authorizing me to go
    anywhere in his command and gather in formation with all the help I could get. We inventoried what was available for the
    occupation units coming over. I got to go down to Yokosuka and the Chiba Peninsula. When they said we would lose a million
    men going in there, we would have. They had guns in caves all pointed down at Tokyo Bay. The captain I went to see to
    get permission said he had to let me in but wouldn't give me any help. I had a Japanese interpreter who knew the place
    and took me around. Later I was in charge of ranges and refrigerators the Japanese were building for us. I met a lot of
    interesting people and found some Kearny and Trecker milling machines that were Japanese-made copies, even copying a cracked
    base welded shut. I worked with a batch of factories, mostly Mitsubishi, which were bombed out. One job was to get machinery
    from one factory to another. Everything in Japan was controlled by the government. I had to get permission to move a milling
    machine motor from the government. Once my interpreter was ill, so I went alone. Most could understand English, but I
    found a man who couldn't speak English but understood German and spoke French. The Japanese spoke French, I spoke German,
    and we got the job done. It was an interesting sideline.
