collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: What branch of the service were you in?
- speaker: Respondent
  text: I finished with the Army 4th Division.
- speaker: Interviewer
  text: Where were you living at the time?
- speaker: Respondent
  text: Anniston, Alabama.
- speaker: Interviewer
  text: Is that where you were from?
- speaker: Respondent
  text: No, my folks were living in Oklahoma City.
- speaker: Interviewer
  text: Did you pick the service branch you joined?
- speaker: Respondent
  text: Yes, in college you picked. I picked infantry. That's what I chose.
- speaker: Interviewer
  text: Do you recall your first days in the service?
- speaker: Respondent
  text: Ma'am, I recall everything I ever did in the service.
- speaker: Interviewer
  text: Would you like to tell us about your boot camp/training experience.
- speaker: Respondent
  text: On active duty, I was a basket case. You were not a seasoned -- anyhow, we had in 1940 the old Army. For instance,
    my mess sergeant, my platoon sergeant, they knew how to train for an officer. I learned more from my first sergeant. He
    taught me without letting me know he was teaching me. This sounds kind of silly, all those people are -- salute you. Then
    I went to infantry school for three months. The school was located in Fort Benning, Georgia. That's where you learned
    how to be a lieutenant.
- speaker: Interviewer
  text: Did you serve in any wars?
- speaker: Respondent
  text: I was in the Second World War three and a half years.
- speaker: Interviewer
  text: Where exactly did you go?
- speaker: Respondent
  text: I was at Fort Benning, and then was sent to Philippines, General MacArthur. I was sent there to train troops.
- speaker: Interviewer
  text: Do you remember arriving there?
- speaker: Respondent
  text: Oh, yes. It was exciting. I hadn't ever been to Mexico or Canada. It was hard to describe. I was on active duty with
    the Army for the regular Army. Here's the reason for it. A second lieutenant was making $140 a month. I'm 93 years old;
    forgive me. How long do I have for it to come back now when this happened. I was a prisoner of war. Man, your mind can
    go blank while you're talking. I used to laugh about my sister. She was 86. She was talking to her brother, and her subjects
    would change all of a sudden, crazy, and here I do the same thing.
- speaker: Interviewer
  text: Do you remember arriving, and what was it like?
- speaker: Respondent
  text: Oh, yes. The Filipinos came onto the ship in Manila. I was on the ship with 1500 troops. People going to the Philippines
    like I was, we had 12 nurses on board, dances every night. The boat trip was very exciting. I think we had 2300 officers,
    too. So we had a ball. Everybody got seasick, except for old Bill. I'm the only one on that whole boat who did not get
    seasick. We were trying to dance, had a jukebox, record player, and all of a sudden the jukebox went across the room.
    But everyone fought seasickness.
- speaker: Interviewer
  text: What was your job or assignment on board ship when you arrived?
- speaker: Respondent
  text: I was assigned -- no one went overboard. I did not have an assignment until I got to the Philippines. They assigned
    me to the 2nd Philippines Scouts. They were the trained troops. We'd never seen a gun, and we had to train them.
- speaker: Interviewer
  text: Were there casualties in your unit?
- speaker: Respondent
  text: Hell, yeah.
- speaker: Interviewer
  text: Did you see combat?
- speaker: Respondent
  text: Yes. I was there training troops for weeks. We had to train. We finally got enough trained. The war started before
    we could train them to shoot guns. This was on Guyana Bay. The war had started. We had coconuts set up, put these boys
    back with five rounds of ammunition. That's all the training they had before we went into battle. We had no ammunition
    until the war started. That's how much training they had.
- speaker: Respondent
  text: That was your training in shooting guns. Rifles, automatic rifles, anything an enlisted man fired, we had to learn
    how to fire. So I -- that's what I was sent to the Philippines for, to train enlisted men. The sergeants and corporals
    trained. To train these Filipinos, we had four corporals from our regular Army, Philippine scouts, the regular Army, I
    had one man, the other month comes.
- speaker: Interviewer
  text: Were you a prisoner of war? You said you were.
- speaker: Respondent
  text: I can talk for a month on that.
- speaker: Interviewer
  text: Tell me about your experience.
- speaker: Respondent
  text: I was on Bataan, April 9, General King in charge surrendered to the Japanese. We were starving to death, walked down
    and killed almost all of us in two weeks or ten days, 16,000 Americans. And then have you heard of the Death March. That's
    covered in this book. That is going down in history as the worst thing any country did. They were fanatics. The Death
    March, how they treated us. Anything you read -- you can believe anything you read about it. Trust me, it happened. I...
    you cannot believe -- I am very fortunate to be alive. In my camp for three and a half years. We had 14 captains in one
    room. I'm the only one left. That's not typical, but not -- I think if you find 15 percent left, but that Death March
    caused most of it.
- speaker: Interviewer
  text: Tell me about when you became free --
- speaker: Respondent
  text: Oh, boy. That, I like to talk about. We were up in the mountains on the mainland of Japan, spent three and a half
    years in Japan. We were up in the mountains. The Japanese learned we hadn't been there for six weeks when the war was
    over. We went crazy. Here's a good example of how nutty we got. They sent two nurses, about six people in a truck. They
    didn't know where we were. We were the last ones to be released. These people came in -- they came in with the nurses
    and doctors to make sure we were able to travel. When they got through, they were worn out. One of the doctors came to
    me, I was, captain, not in charge, the food finally, they dropped by parachute, couldn't land, had to drop us food to
    keep us from starving. One of the doctors came to me, can you get us food being dropped? Set free the day, we were on
    top of a mountain the Japanese had left the camp, no one knew where we were. This was September 6. The war was over August
    6.
- speaker: Interviewer
  text: Tell me about the day you were freed.
- speaker: Respondent
  text: They had two doctors, two nurses, and a news reporter, and wanted to check us to make sure we were able to travel.
    So one of the doctors came in. The B-29's dropped food and juice to take care of us. One of the doctors came in and asked
    for some juice. He wanted to get the nurses drunk on alcohol. My point is, after we gave him fruit juice, he gave us just
    two or three drops, got everyone drunk. We were all drunk. I was skunk-drunk. Somebody decided we needed to have a war
    dance like the Indians have, so I go down to the commanding colonel, say we want to build a bonfire. We could use the
    pole if we wanted to so we decided to hang a Japanese officer in effigy. He nearly had a heart attack. We got some of
    his clothes and stuffed them, hanged him up in this bonfire. Anyhow, that was one of the ...
- speaker: Interviewer
  text: Were you awarded any medals or citation?
- speaker: Respondent
  text: I was awarded the Bronze Star for making the Death March, for surviving the Death March. Congress decided we needed
    a medal for making the Death March.
- speaker: Interviewer
  text: How did you stay in touch with your family?
- speaker: Respondent
  text: There was not much staying in touch. I was single. They got two or three letters from me. They didn't know for eight
    months if I was alive.
- speaker: Interviewer
  text: What was the food like?
- speaker: Respondent
  text: What food? Honey, we didn't have anything but rice for three and a half years. We had a soup, water, carrot-top vegetable.
    And don't say, How did you live? We didn't even have enough rice.
- speaker: Interviewer
  text: Did you have plenty of supplies?
- speaker: Respondent
  text: What kind of supplies? Clothes?
- speaker: Interviewer
  text: I guess previous to being -- did you feel pressure or stress? What type of stress did you feel while you were a prisoner?
- speaker: Respondent
  text: 'I didn''t have any stress. Stress, I think, died. People gave up. Here''s an example. The first camp after the Death
    March, a guy got down and out, wouldn''t eat. If you didn''t eat for two or three days, you died. He just gave up. I talked
    to him: You can''t do that; you''re going to die. But he just could not. He lost his desire to live. It was that bad.'
- speaker: Interviewer
  text: Was there anything you did that kept the stress away?
- speaker: Respondent
  text: Glad you asked. Ready for this? I played poker. We read books, forced into... they wanted to volunteer us, but anyhow,
    we didn't... I lost my train of thought.
- speaker: Interviewer
  text: Do you recall any particularly unusual event?
- speaker: Respondent
  text: If you lost your sense of humor, you died. We had a good building. We were pretty good for prisoners of war, but still
    better than some people, I keep.
- speaker: Interviewer
  text: That's okay.
- speaker: Respondent
  text: (Humorous) On Sunday, in this camp they let us put on a play of some sort. We had about 600 British. Those people
    put on shows that you would not believe. We had nothing to dress up in, but the Red Cross would send some stuff, make
    them look different from men, but anyhow, to us it was funny. Here's an example. One man did a Peter Sellers, Deadpan.
    This man was an excellent actor. Guess what. He became after the war. Each and every Sunday, one of the Americans put
    on the show, then the British some kind of entertainment. That kept us from dying. It helped a lot.
- speaker: Interviewer
  text: What did you think of your officers or fellow soldiers?
- speaker: Respondent
  text: What did I think of them? Everything; lives over in prison camp.
- speaker: Interviewer
  text: Did you keep a personal diary?
- speaker: Respondent
  text: No. Lots of guys did. Lots of guys did. A lot of camps burned them. They didn't want a chance.
- speaker: Interviewer
  text: Do you recall the day your service ended?
- speaker: Respondent
  text: Very well, I was in seven years in the service. In 1947, I was discharged in July. I thought very seriously of regular
    Army.
- speaker: Interviewer
  text: What did you do in the days and weeks after the war?
- speaker: Respondent
  text: Though I already had a college education, I was offered a job. I went down to check it out. I was 29 years, 30 by
    then. Young people in that school were so young to a 30-year-old, not a normal. I couldn't take the youth again. I was
    only a kid myself.
- speaker: Interviewer
  text: Did you continue any of your relationships in the Army?
- speaker: Respondent
  text: Oh, yes. My wife and I decided to have a reunion, and we had a list of people. We ended up with 62 couples in Dallas,
    and from then on.
- speaker: Interviewer
  text: Wonderful. Are you a disabled veteran?
- speaker: Interviewer
  text: Would you like to tell me about your disability.
- speaker: Respondent
  text: Congress in 1982 passed a law that all prisoners of war were 100 percent disabled if the D.A.V. were prisoners and
    could prove of what happened to us. I could have had two arms took off, so that law made us all 100 percent disabled.
- speaker: Interviewer
  text: How did your military experience affect your life?
- speaker: Respondent
  text: I am a flag-waver.
- speaker: Interviewer
  text: What kinds of activities does your association have?
- speaker: Respondent
  text: It's not a meeting place. It's an organization that takes care of all the veterans. Here's an example. When they wanted
    me to have an examination in 1982, to be disabled, so I went to the D.A.V., and they took care of us, and they had me
    100 percent within two months. I had a buddy who took 15 years, but he finally got to 100 percent.
- speaker: Interviewer
  text: Is there anything that you would like our younger generation to know about World War II that you served in?
- speaker: Respondent
  text: Believe anything that you read about the Death March. We were in a school talking about it. Those kids had not even
    heard about the Death March, and it hasn't been put in our history books. It's a shame, because our people should know.
- speaker: Interviewer
  text: Is there anything else you would like to add that we haven't covered?
