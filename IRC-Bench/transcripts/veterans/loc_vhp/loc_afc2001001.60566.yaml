collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: I was born in Rockford Illinois at Saint Anthony Hospital, April 25th, 1920.
- speaker: Interviewer
  text: My mother was Jenny Johnson and she had worked in the family store; but at the time of my meeting my father, she was
    working at a rooming house where he had a room. My father was John Elof Anderson. He was an immigrant from Sweden. When
    he reached Ellis Island, he was told he should go by his middle name because there were too many John Andersons coming
    over from Sweden. My father was a furniture-maker. He made furniture for the Union Furniture Company and he did a lot
    of work in our home after they were married.
- speaker: Interviewer
  text: I had three sisters and two brothers. I was the third pregnancy, but I was the only baby that my mother brought home
    from the hospital.
- speaker: Interviewer
  text: My mother was the last with the last pregnancy my mother had a cesarean section. And when my father went to the hospital
    to bring her home, she threw an embolism and died when I was seven years old; so she and my brother that was born at that
    time were buried together.
- speaker: Interviewer
  text: My mother's sister, who had never married, was living with him at the time and she stayed and kept house for my father
    and I; so she was really like a mother to me.
- speaker: Interviewer
  text: I had always wanted to be a nurse. All my dolls had bandages and broken legs and arms; and my aunt had also wanted
    to be a nurse, so she encouraged it. When I was 14 after the Depression, my father had just gotten a job again. He died
    of an illness that was only ten days, but my aunt stayed with me and she and I lived together. When I graduated from Rockford
    High School in 1937. At the time I would have liked to started nurse's training, but I had to be 18. So I went to work
    at Burson Knitting Company in the office there. Their slack season was the summer. So the following spring when I was
    18, I was laid off, everyone in the office. Only the old older employees were kept. Then my aunt encouraged me that I
    should go in nurse's training, but I had at 25 cents an hour, my wages at the knitting company, I hadn't saved enough
    to go in nurse's training; but my aunt said I should cash in the little life insurance policy I had. And from that I got
    either 90- or $100 and it paid my tuition fee at Saint Anthony Hospital and I entered nurse's training there in August
    of 1938. I loved nurse's training. I had two roommates from Michigan who became my friends and we were friends the rest
    of our lives. I was fortunate to be able to get a job at the hospital, even when I was in training at the laboratory,
    and became acquainted with a laboratory doctor there. When I graduated from nurse's training, he asked me if I would like
    to start a blood bank and I decided, yes, that would be something different; and I started the blood bank with Dr. Matthews
    at Saint Anthony Hospital. By this time World War II was on all our minds. The sisters at the hospital were originally
    from Germany and they were sending care packages to relatives and friends in Germany; and so we heard a lot about things
    that were going on over there, which we didn't understand at the time. Some of my classmates joined the Army immediately
    and came back with wonderful tales, of course. Also friends that we were with, their brothers and the fellows we were
    dating, were being called into the service. And the bug gradually bit my two roommates and I, and a recruiter came out
    from Chicago and we decided we would sign up. So we enlisted at Camp Grant in Rockford. We went through a whole day of
    examination and answering a lot of questions and signing a lot of papers. Then went home thinking we had all gotten in.
    But I got a phone call saying I had not made it because I was five pounds underweight. They wouldn't take anyone at my
    weight. But they said if I came out and signed a release paper that I would accept responsibility for this, they would
    accept that. So I got on a bus and went out and signed the papers and three of us waited for orders. It didn't take very
    long and we got orders to go together to Percy Jones Hospital in Battle Creek, Michigan.
- speaker: Interviewer
  text: It was in July of 1943. Percy Jones Hospital had been the Kellogg Sanitarium. It was a beautiful building, wonderful
    facilities, and we were very impressed when we got there. We were assigned rooms in the barracks. The three of us had
    decided we would sign to stay in the States at that time. You could sign for that. Well, when we got to the barracks they
    were having a party for the girls that were leaving to go overseas. And when we told them we weren't going overseas, we
    were laughed at; because they said when they call for certain number of nurses, you go. Well, we waited and waited and
    nothing happened, so we felt very secure. I was at Percy Jones Hospital for a year and a half. I was first assigned to
    an orthopedic ward and that was a shock to go into a ward of probably 100 to 150 men, all with amputations, one or two.
    It didn't take me long to realize that to them they were just glad to be back. They were willing to sacrifice their limbs
    and they made light of the whole thing, so I did, too. After a while I was assigned to a neuromuscular ward where there
    were spine injuries. That was difficult, fellows who would never walk again; but they were wonderful patients.
- speaker: Interviewer
  text: Oh, yes. We had a lot of patients coming from Africa. That's where the campaign was really active at that time. And
    they brought trainloads of men from Africa, hundreds of them. They had been put in casts and bandages in Africa in the
    heat there. They came from on ships across the Atlantic. And when they got to us, we had to remove their casts; and they
    were absolutely all in such bad shape because of being in casts that length of time. But it was amazing how they recovered.
    Because of my experience in the laboratory and the blood bank at Saint Anthony, which was on my record, I was asked if
    I would like to work in penicillin research. Penicillin was the wonder drug of the time. We had a ward of probably 15
    or 20 men. The worst infections in the hospital were all brought to one place. We measured all their food in and out.
    We measured every bit of sleep they had. We had very detailed records, and we had to give them injections of penicillin
    every two hours around-the-clock. We had to use small veins in their hands because the big veins were saved for the lab
    tests. It was very, very interesting and I saw some miraculous cures there. Time was going on and we realized there wasn't
    anyone older that had been there longer than we had and we were almost doomed to go overseas next, so we waited for the
    next list on the board. One of my roommates decided to take a course in anesthesia; but my friend Marge and I were on
    the list, and that was in the fall of 1944. We were given a 15-day leave and that was over Christmas. So I got to see
    my family and friends again and then we waited at Percy Jones for our orders. They came through in January, and she and
    I were both assigned to the 86th Field Hospital, which was going to form in Chicago, all meet in Chicago. We left Percy
    Jones, flew by train and flew from Chicago to Seattle, Washington.
- speaker: Interviewer
  text: That's right. We were given all kinds of warm clothes, flannel pajamas and long underwear, so we were sure we were
    going to Europe; but our plane didn't go east, it went west. And when we got to Seattle, we found that we were going to
    the Pacific; so we had to turn in all our warm clothes and exchange them for summer weights. Our medical records had gotten
    lost in the transfer, so we had all our shots over again in Seattle. And nobody got a reaction. Nobody seemed to worry
    about the fact we had had double shots. There we had shots for all the Pacific diseases.
- speaker: Interviewer
  text: Well, the strange part was when we entered the Army we had no basic training. We had had no basic training. We had
    some marching and, of course, we were told the rules and regulations of the hospital and regulations regarding enlisted
    men and officers and saluting, but we had never had any basic training. But when we got to Fort Lawton, we learned it
    in a hurry. We climbed the rope ladders, which we would have to use getting on and off a ship, and we crawled through
    the obstacle courses and did a lot of marching. While we were there, we met the officers and dentists and administration
    officers for the 86th Field Hospital. We did not meet the corpsmen that would be with us, just the officers. We had many
    enjoyment enjoying times in Seattle and waited for our orders to go further. Finally I believe it was in February, middle
    of February, we received our orders that we would be embarking the next day from Seattle. So we left Fort Lawton and went
    to the docks in Seattle. We hit the Pacific at a particularly rough time. The seas were very rough and most of the girls
    in our outfit were seasick. I happened to only have a headache, but I never was really seasick. After a few days, of course,
    the dining room filled up again and people began to enjoy the trip. The ocean calmed down as we neared Hawaii, and we
    landed in Oahu at Honolulu. We were based there at Koko Head, which was a medical training place in Hawaii. We had very
    comfortable tents and facilities. We dressed in fatigues and did many, many days of marching. We would take three- and
    five-mile hikes with full backpacks and pitched tents down on the shore of the island and then pack up again and go back
    the next day. We had courses in target practice, at which I was very poor, and also plane identification, which I knew
    then but could never tell you one now. We also were allowed tours of the island, so we did see quite a bit of Oahu. We
    also visited Pearl Harbor, while at the time was not as famous as it is now, and Hickam Field and all the big installations
    there. We were often invited to dinners and dances, and on the whole we had an enjoyable time at Hawaii. It was beautiful,
    not touristy at all. April 1st, 1945, was Easter Sunday. We were in chapel when we got they interrupted everything to
    tell us that Okinawa had been invaded that day. The men, of course, were very chagrined because it meant they would be
    leaving immediately. We waited for our orders, and they came about a week later when we were told we would be boarding
    ship to go to for Okinawa.
- speaker: Interviewer
  text: We went in a zigzag pattern because of submarines in the area. There were many submarines near Hawaii at that time,
    and we also had accompanying gun ships to protect us. Our ship, by the way, was called the Florence Nightingale, which
    I thought was interesting. It was full of us and another two or three other groups of nurses that were going to be at
    Okinawa or an island they would be dropped on the way. The corpsmen were there, too.
- speaker: Interviewer
  text: We stopped at Ulithi and Kwajalein, two islands that we were allowed to get out and swim; and, of course, a couple
    people got sunburned and suffered a great deal from that. But the islands had been shelled, so there wasn't a standing
    palm tree. They were just devastated. But there were men stationed there, just as on both islands there were men stationed.
    They were beautiful sand beaches. The nights were getting cool, but the daytimes were very, very hot. At night we were
    in complete blackout and we could not sleep inside in our bunks, so we were allowed to sleep on deck because of the heat
    in the ship.
- speaker: Interviewer
  text: Yes. It was announced over the loudspeaker that Roosevelt had died while we were on the ship going to Okinawa. There
    was a lot of speculation as to what this would do to the war, and we had never heard of Truman but he was now our president.
    Of course, there were rumors all the time about the war and the Japanese and Okinawa; and you just had to figure out what
    was true and what wasn't true. On the whole we had a nice trip. We played cards in the evening when it wasn't too hot
    and I read a lot of books. We had drilled on ship in case of having to abandon ship. We drilled almost every other day
    for that, how we would escape and which life boats would be ours, and but we never had any occasion to have to use any
    of it. Then about the 1st or the end of oh, yes. I must say I celebrated my 25th birthday on board ship on the way to
    Okinawa. I don't think I had a cake. About the 1st of May we began to hear faint sounds in the distance and they said
    we were nearing Okinawa. The sky was full of smoke and the rumble of guns was constant. And finally, I think it was, the
    2nd or 3rd of May we sighted land that we knew was Okinawa. The Navy ships we saw all the Navy ships in the harbor there
    shelling the island and then, of course, the enemy was shooting back. We finally got to the beach where we were to land.
    The noise of the shelling was tremendous. You couldn't hear the person next to you. We got into landing gear and landing
    crafts and got to shore. Well, the officers that met us were chagrined because there were not supposed to be any nurses
    allowed until the island was secure. They anticipated a very short battle, but it turned out to be otherwise. We got onto
    trucks with our backpacks and were to be taken to the 76th Field Hospital, which would be our temporary location until
    our hospital had been set up. The driver got on a wrong road and the shelling and the fighting became louder and louder.
    Finally, an MP came riding up to us and said we were wrong and we'd better turn around because the enemy was within a
    block or two of us. So we turned around, and it was night before we got to the 76th Field Hospital. We were glad to get
    a cup of hot chocolate there; because the days may be a hundred degrees on Okinawa, but the nights, the winds
