turns:
- speaker: Interviewer
  text: J.C. Alston.
- speaker: Interviewer
  text: South Pacific.
- speaker: Interviewer
  text: I enlisted.
- speaker: Interviewer
  text: Oh, besides a little schooling, I did delivery for a drug store.
- speaker: Interviewer
  text: Well, the boys in our group, three of us, we decided that we would join the Navy. We decided we didn't want none of
    that walking; we wanted to ride. (Laughter) So we went to Dallas for our examination, and they accepted us and we went
    to San Diego for boot camp.
- speaker: Interviewer
  text: I wasn't related to them.
- speaker: Interviewer
  text: Oh, it's been so many years. I don't know if I can tell you. Well, we were a little bit excited. They accepted us,
    so. They told us not to bring any clothes or anything, because when we got there, the clothes we had would be given away
    to the Salvation Army, and we'd get our uniforms from the Navy. So, we got on that train and went to San Diego.
- speaker: Interviewer
  text: Uh, I'm the first one in our family who went into the service. During World War II, my brothers, they served, two
    of them. I guess they went like I did.
- speaker: Interviewer
  text: Oh, it wasn't too bad. Of course, I was one of the lucky ones. I didn't have to do KP.
- speaker: Interviewer
  text: That's where you go to the chow hall and work. (Laughter)
- speaker: Interviewer
  text: No. (Laughter)
- speaker: Interviewer
  text: No, no. If we got in a little trouble, we'd have to get out on the grounds and walk for a few hours.
- speaker: Interviewer
  text: Yeah, I got out of that. I behaved. (Laughter)
- speaker: Interviewer
  text: Eight weeks.
- speaker: Interviewer
  text: Well, they wanted to give us examinations. So we decided that we wanted to go aboard a ship. So we decided we would
    miss some of the questions so that they wouldn't send us to school. (Laughter) But uh, they took one of them anyway. He
    might not have did that, I don't know, but I did. But he didn't get on the same ship I did. To get on the California,
    from San Diego, we had to go up to Long Beach.
- speaker: Interviewer
  text: Well, shots. Clothes issued.
- speaker: Interviewer
  text: Nah, not too much paperwork. See the Navy was a little different than the other branches. We got thirty-six dollars
    a month; they got twenty-one. So the first four months, we didn't get but twenty-one, and we paid for all our uniforms.
    After that, we got thirty-six a month, but we bought our own clothes. In the Army, they were issued theirs. Anything we
    got, we bought.
- speaker: Interviewer
  text: About a month.
- speaker: Interviewer
  text: We left October the 1st to go to Hawaii.
- speaker: Interviewer
  text: Well, we were assigned gun mounts. We'd had training on loading them. After we got over there, we'd leave on Monday,
    and we'd come in Friday, spend the weekend in port. One section would have the duty. We had four sections on the ship.
    One would be the duty section. And uh, so, we would do the watches on the ship. Of course, there were a lot of divisions.
    The admiral would come by, with the speaker, announcing for them to stand at attention. We didn't have to salute him every
    time we saw him, we'd just salute him one time in the morning. The deck forces, they kind of did the maintenance on top.
    They'd clean, sweep it down every so often. We had a good deal, all ships didn't do that but ours. We paid a guy to take
    care of the chow. We had two tables, and he'd bring the food to the table, and we'd sit down just like at home and then
    get up and leave. And each man, there were twenty of them, would pay him a dollar a piece on payday, which was twice a
    month. But he made more money there than his regular salary.
- speaker: Interviewer
  text: Yeah, if we weren't the duty section.
- speaker: Interviewer
  text: So, you were in Pearl Harbor for about two months prior to December 7th, correct? Can you walk us through the attack
    that day on December 7th? What it was like for you?
- speaker: Interviewer
  text: Yeah. Our section was duty section, and I had 4-8 watch in the afternoon. And the only aircraft we had in their pulled
    out about sundown and left. And I had 4-8 watch, and well I had 4-8 watch the next morning. Well, the PD takes long patrols,
    but they can fly along ways. The water was so slick that morning. They were on pontoons. So he tried to take off and he
    couldn't make it. So he made three of four runs. When it was so slick, it made a vacuum on them pontoons. So they got
    a PT boat out there to run across. So, they had come out to raise the flag, and I was fixing to get relieved so I could
    go eat. I hadn't eaten breakfast when it started. We got three torpedoes and one bomb hit. One torpedo didn't hit the
    hub, it hit the rudder. They flooded the opposite side to keep it from rolling over like the Oklahoma. We evacuated the
    ship and went to the Island over to our stations. That's where all the planes landed. We were the closest ones to the
    island. Maybe from like here to the street is how far we had to go to the island. So we evacuated, then we went back aboard.
    That was the first wave. We got back aboard. We was sunk, but we was up. We still had some anti-aircraft guns that were
    still above water. We went aboard and we still thought it was going to roll over. About that time, the second wave come
    in. The Nevada was the only one that got in the way. They had come by about that time, so I know it saved some lives on
    the California because they looked after her. She run in the ground about two or three hundred yards from where we were,
    to keep it from blocking the channel. Of course it sunk. And we abandoned ship again the second time, went over to the
    Island. So, they were fighting the fire on the water and the ship, and they finally got the anchor chain around where
    we tied up, so it stayed upright. We went back aboard that night. Somebody shot, and when they did, well everybody started
    shooting. They shot down a couple of planes, didn't kill the pilots. They bailed out. They were mad as a hornet. Then,
    the next day, West Virginia was tied up out port, and the Maryland was in port. Well the Maryland got one bomb hit, but
    you couldn't hit it with a torpedo. So they pulled her out there, course they was trying to find places for everybody,
    so I went aboard the Maryland. And they blew the quay up, took the Tennessee out. It got a bomb hit. The bomb hit the
    middle gun on the Tennessee, and the shrapnel killed the captain over on the West Virginia. We came out, I didn't see
    it, I heard it, when the Arizona blew up. Course I didn't know that was what happened at the time, but it wasn't long
    before we figured it out. But it was a tanker. Pulled up in there right behind us, between us and the Maryland and the
    West Virginia. Now early that morning, 'course I didn't hear this until later, a destroyer out there started fighting
    with a sub, and they sank it. They never could find it until a few years ago. It wasn't where they thought it was, but
    they finally found it. And that was the first Japanese prison of war. It was one of them two-man subs. They didn't have
    much of a navigation system, because they followed a big one, the mother ship. And they run it up on the beach. So they
    didn't know where they was going. I stayed on the Maryland until it came back to the states in January to get repairs
    and put different guns on it. At that time we had 50s and 20 millimeters, but we didn't have no 40 millimeters. It's got
    40 millimeters in a quad, that's 4 guns in a quad. Here is a picture of it.
- speaker: Interviewer
  text: No, that's the USS West Virginia, after they redone it. I got transferred to it, and I stayed on it until the end
    of the war.
- speaker: Interviewer
  text: No, it was '43.
- speaker: Interviewer
  text: Oh, when they were working on that one, I got transferred to it. They kept most of the people over there as these
    ships come in when they were damaged. They use their personnel to build a crew back up, so they didn't have to bring people
    from the States all the way out there. And then some of the guys who'd been along time, they'd come back and get new construction.
    Of course they'd have to test it before they left, all the guns and everything. See if they needed to do any more work
    on it before they went back out to the war zone. But, when we went to the Philippines. We could stand up on deck, and
    any direction you looked, you couldn't see nothing but ships. About 1:00, all these Japanese planes come out, all them
    radars on all their ships, we dove down through the deck of one of those converter jetters. We took some of the people
    on our ship, from different ones. Of course they sink it, there couldn't be no fire on the__(??) after dark. But that
    was the only plane come out. That was the only hit that was made. After we made the landings, we were up in___(??)gulf,
    and they brought General Doug in there. They sent him ashore, you know, taking the news reel with reporters, and all that.
    Well the first time, they didn't think it was good enough so they had to go back and do it over. We use those 16-inch
    guns to support the army, so if they needed a target, said they needed to take it out, so we'd take it out. Different
    ships that have their duty, that would be their duty for the day, whatever the army called for. Fire, why the ship would
    take it. The third day, we had to get kamikazes, and we finally had to go back up the straits a ways. We finally shot
    down the first four, the next one caught us. But we were still lucky, the plane crashed and the gasoline stuff only killed
    9 people. The bomb went down on the third deck, and it split in two like a watermelon.
- speaker: Interviewer
  text: Uh-huh. And, uh, and then that storm came in. and we all went out in the China Sea. Of course there was a couple of
    destroyers, and they ran out of fuel. We all seen them, because we couldn't control them, nobody could rescue them. So
    we lost them. That's when I decided I didn't want on one of them destroyers, get me on one of them little ones. (Laughter)
    All those waves coming up to the number two turret on there, about a forty to fifty foot wave. Them little ones, you just
    see the top of them every once in a while.
- speaker: Interviewer
  text: Oh, no. We just go to our battle stations where we're assigned. And of course, they get down below first. And they
    said "this is not a drill," so we went to our stations. As far as I was concerned, I didn't expect, nobody expected anything.
    So until it hit the ship, you know well — anybody that says they weren't scared, well they're just not quite telling the
    truth. Of course it hits them after it's over more than it did at the time. The army had put up a radar, and they just
    missed training on it. And this guy told them that there was a bunch of planes coming in. They said "oh, we've got some
    big 17s coming in from the States, don't worry about it." He says, "There weren't any 17 planes in this bunch." And they
    just dismissed it. Of course they was in a different place than I was. They was a few minutes from hitting us whenever
    that happened. And they shot down some of the 17s because they weren't armed. They just ran them over there where they
    had bases for them at the time. Yeah. Lot of them, they got burned from the burning on top of the water. And they take
    em over on the dock and they buried them. Of course every time they talk, someone always adds to or takes away from the
    numbers of how many was killed, but around 2,600 roughly.
- speaker: Interviewer
  text: Yeah, I did. See we had what you call a peace time crew. After the war come along, we was carrying about 1,600 on
    a battleship. But the Pennsylvania was in dry dock when the bomb hit. There was two smaller ships in dry dock in front
    of it, and it destroyed them. And where the carriers were tied up, they sunk both of them, because they had maps and had
