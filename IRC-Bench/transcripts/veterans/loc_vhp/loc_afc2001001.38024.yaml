source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Were you drafted or did you enlist?
- speaker: Respondent
  text: You know, let me just give you a quick... 1943, I turned 18. Three months later, I got my notice draft to report a
    certain day to go be examined to be inducted into the services. And we went to Fort Ogelthorp, Georgia, and we were there
    for about a week, physicals and everything else. And they released us in seven days, and we returned back to be inducted
    into the Army. That was March of '43.
- speaker: Interviewer
  text: Were you living in Memphis at the time?
- speaker: Respondent
  text: Yes. I've been living in Memphis my whole life, yes.
- speaker: Interviewer
  text: What was the first day in service like?
- speaker: Respondent
  text: First, first day in service? It was a completely different life from being a civilian, I'll tell you. They, I remember
    when we first went into the service early in the morning, 5:30. They wake you up to get up, go out and police up the area,
    pick up all, anything you see that's not supposed to be there. It was a different world. You had to get used to it. Believe
    me.
- speaker: Interviewer
  text: What was your experience during boot camp or training?
- speaker: Respondent
  text: Training? Well, we actually, we were, we went to Camp Butner, North Carolina, and we were there for six months, and
    we trained hard. We were actually in...I was in 277th field artillery with 105 millimeter Howitzers. And we trained real
    good. We had a good outfit. And then, we moved to Fort Bragg, North Carolina, and they switched us over from the 105 Howitzer
    which used a sixty pound shell. They moved us to a 240 millimeter Howitzer which had a 360 pound shell. The big guns,
    the biggest gun that was in the service. We were on it.
- speaker: Interviewer
  text: After training, where did they send you to begin combat, or to enter combat?
- speaker: Respondent
  text: Ok. After we got, after three months of training in Fort Bragg, we got word down that the Alpha was being shipped
    overseas, and we didn't know whether or not we were going to Japan or whether we were going to Germany. And we got notice,
    and it was all secret. They wouldn't tell you anything actually. When we were on a train going to the New York to get
    on the boat, they had all the window shades pulled on the train. It was top secret. I don't know why, but that's the way
    it was. And then we found out we were going to Germany, the ETO, the European Theater of Operations. We left New Rochelle,
    New York, and on the Queen Elizabeth I. And on that ship they had 19,000 soldiers, a ship that's built for 1,500 to 1,800
    people. And my cabin which was ordinarily a two people, two person cabin, there were 19 soldiers with all their gear and
    everything. So it was crowded and a lot of them had to sleep in shifts, sleep so much. Then they'd get out and let somebody
    else go to sleep. That's how crowded we shipped. And we ate twice a day I remember, 9:30, 4:30. And but the crossing was
    very fast. It was four and half days Queen Elisabeth hit about 40 knots, and nothing could keep up with it, so we really
    weren't concerned much about submarines.
- speaker: Interviewer
  text: What was it like arriving in the European Theater?
- speaker: Respondent
  text: As first time we went over to, well actually, land in Glasgow, Scotland. And then we caught a train, and we went to
    Birmingham, England. And right outside of Birmingham, we were bivouacked at camps. I had a camp there, and we stayed there
    until the invasion started. Uh, that part was pretty neat. There was nothing too bad about that. We went on maneuvers
    in Wales, Cardiff, and um, then we got aboard to go to France, and we went to France. We landed in France, D-Day plus
    ten.
- speaker: Interviewer
  text: What was your job in your unit?
- speaker: Respondent
  text: I had two or three jobs. One job, I was FO which was a Forward Observer. Go with the Lieutenant. We'd go up there
    to front to direct fire back to the guns. I used, I operated the radio, Lieutenant would give me commands. I would transmit
    them back to the guns and observe fire. If we had to adjust our fire, one way or the other, up or down. That's one job.
    Another job I had was a Cannoneer which means there was two guys on a tray. We'd load that 360 pound shell. We'd pick
    it up and then we had a couple guys just ram it into the barrel. And you really didn't have one job. You had to do everything
    what you wanted, but what, what's called for.
- speaker: Interviewer
  text: What was it like having to be responsible for the next fire of a gun?
- speaker: Respondent
  text: Pretty, pretty...well, on that gun we had where we have a Gun Sergeant who looked at all the mechanical parts of the
    gun, and the Lieutenant was always there. We had a crew of about 15 around that gun. The gun was real big. The barrel
    was thirty feet long. The gun weighed 32 tons. We had tanks to transport that gun. Um, and you could stand.. .when we
    fired, uh, you stand behind it. It makes a loud noise, but if you stand on the side of it, it would knock you down. The
    concussion would knock you down. So it was a big noise, yeah.
- speaker: Interviewer
  text: When did you first see combat?
- speaker: Respondent
  text: We saw combat. We landed in France, and we actually set up guns two days after we landed, and it was about the 12th
    or 13th. We were right outside of um, I remember St. Mere Eglise, a little town in France there, and um, I'm trying to
    think back. That was the first time, that's when we first set up. And as landed off, we came on an LST which was Landing
    Ship Tanks. And we rode off. When we got there, it was like 3:00 in the morning, and we, we, stood still on the water.
    All the water receded. The tide went out, and when we rode, we were actually on the land. Then we rode our tanks off.
    And I never forget as we got into our tanks and got into the countryside there a couple miles, you could, you know, you
    could hear machine guns everything going off. And it was a German, it was French, a French man that probably owned that
    land over there. He was out plowing his field with the war going on around him. He was oblivious to what was around him.
    He was just going about his business. We was just talking how, how could he be doing that, but that's the way it went.
- speaker: Interviewer
  text: What all happened in your service during combat?
- speaker: Respondent
  text: In respect to what now?
- speaker: Interviewer
  text: What operations or what assignments were y'all given during...?
- speaker: Respondent
  text: Well, we started off in France, and we went on through to Paris, and when we got to Paris, we were, the whole outfit,
    the whole Army, they put us on hold for a month, a solid month. We went to, before that, let me tell you. Back in Avranches,
    France, I got hurt. And I, they sent me back to the hospital in England. And then I met up with my outfit again right
    before we went into Germany, but as I was seeing in, uh, September. In September, we reached to outside of Paris, and
    then we went on to, oh, I can't remember the name of, we were there for a month. And they say we ran out of gas. But actually,
    everybody said they was, they were waiting for Russia to get closer to Berlin all the time, so they put us on hold. But
    we enjoyed that month stay. You know, it was like a vacation, actually. We had good beds, good showers, had a bed to sleep
    in. So it was really good.
- speaker: Interviewer
  text: Were there many casualties in your unit?
- speaker: Respondent
  text: We had, being in an artillery unit, we were not on the front line, but yes, we had several men killed. I remember
    one time, we were in a bombed out house, and headquarters was a bombed out house and Germany, actually in Germany. And
    I went outside for a reason. I forget what it was. And so I went outside. I was going to one of the tanks or something.
    The Germans started shelling with the 88 Millimeter guns. I mean they were popping them in there just as fast. And I was
    caught outside. I was stood upside, just crouched up beside one of my tanks and just held on for about ten minutes, and
    but when I got back into the house which was about 75 feet, one of my buddies in the house...a shell had come into the
    room where he was, blew half of his face off. That was a terrible thing to see. But as we were going through France, we
    shelled a German Calvary unit which was horse drawn artillery. They would draw on the artillery with horses, and we had
    shelled them, and as we were advancing up, we saw all these dead Germans. They were stacked up with the horse and everything
    else. It was a pitiful sight, pitiful sight, but that's war. It's either them or us.
- speaker: Interviewer
  text: What were some of the most memorable experiences during your service?
- speaker: Respondent
  text: Well, the most, one of the most, most Battle of the Bulge which was in December of '44. We were really advancing all
    through France. Everything was at a standstill, and all the sudden, the Germans broke through the lines. And uh, they
    started advancing pretty good. Now we were in a little town called St. Vith which is about 15 miles, this was in Belgium,
    15 miles from Bastogne. And we got caught there in the Bulge. And one day during the heavy fighting, we got words down
    to destroy our guns because they were expected to break through, and they wanted our guns destroyed. And we were with
    destroy the guns. We had what we called a phosphorous grenade. We'd open up the breach block, pull the pin on the grenade,
    put it in there, close it. It would melt steel to steel so you couldn't use it. And after another hour, we got another
    order down, don't destroy them. Just hold off for further orders. And actually, they didn't have the breakthrough. They
    broke through another line and captured an artillery battalion which we always traveled with, and the Germans captured
    them. It was approximately 110, 115 men. And they took them in trucks to a little town called Malmedy, and whether you
    ever heard of Malmedy, that's where the Malmedy massacre was concerned, was, was took place. With the German dead, they'd
    march these soldiers out, and let me just say this. The weather was the worst weather, the worst winter they had in Germany
    in 35 years, snow on the ground, 10 below zero. They marched these soldiers out there in St. Vith and Malmedy, and a German
    truck pulled up his awning and machine gun, killed, they killed every, all of them except maybe seven or eight. They escaped
    through the woods, and they, and that was called the Malmedy massacre. And my wife and I made a trip back to Germany where
    I was during the war. I think it was in '85, and they had built a big round wall, circular wall out of fieldstone, and
    each soldier's name is inserted into the wall, and on that exact spot is where they killed them. It was, and when we,
    everybody heard about that, when they captured a German, they didn't show him too much mercy either. Yep, but one of the
    most touching things I ever...I got frozen feet during World War II in the Bulge. My feet froze up overnight, and they
    had turned, they had almost doubled in size, had turned real red. And they sent me back to little evacuation hospital,
    and tent hostile actually. And all they could do for me was put my legs up straight the seven days I was there. But what
    was so sad, one day as I was laying there with nothing to do, a Lieutenant, Captain walks in, and he wanted to see the
    doctor. The doctor came out, and he says, "I understand my brother got wounded and he's here," and the captain looked
    at him very sad (starts crying)... and he said, your brother just died.
- speaker: Interviewer
  text: Do you want to pause for a second?
- speaker: Respondent
  text: I'll never forget that. I'll never forget that. I had many experiences. I got hurt, hit with shrapnel here once, uh,
    frozen feet, and then we had a weapons carrier that was truck that overturned, hit a mine and overturned, and I was very
    lucky though. I mean some of the guys got gangrene, talking about gangrene is something in the hospital there (clears
    throat). Their feet had turned black, black as your hair, and the gangrene set up in the feet, all they do is crack the
    toes off. It's just, they were bad shaped. Luckily, I was very lucky. I caught mine in time. Thank God for that. Uh. Go
    ahead. I'm sorry.
- speaker: Respondent
  text: Ok, Um. Was there any medals or citations that you or your unit...?
- speaker: Interviewer
  text: Yeah. I've got some here that I'm proud of. Can you see this in the camera? Do you want me to lift it a little higher.
    That's good, alright. This is me when I was, this is right after the World War, after the war ended. I was 20, 20 years
    old. '46, I was 20 years old, yeah. But anyhow, they call this ETO medal, European Theater of Operation. I have five bronze
    stars, five little bronze stars which is five major battles. And of course, this is a good conduct medal. This is the
    Battle of the Bulge medal. [Continues to show medals] I was in General Patton's Army, Third Army and the Seventh Army.
    This triangle has steps on it, and it's called seven steps to hell. That was the Seventh Army. We were, actually, they
    would send us to different outfits when they needed support, real support. Ok, what else?
- speaker: Interviewer
  text: During the war, did you stay in touch with your family?
- speaker: Respondent
  text: During the war? Oh yes, I usually wrote letter all the time. I have one letter, but I don't know exactly where it's
    at.
- speaker: Interviewer
  text: What all did you write to them about?
- speaker: Respondent
  text: Well, you know, you could only write, nothing...your mail was censored. It, uh. It, whoever censored the mail saw
    something we shouldn't talk about. Where we were, where we visited at. They would cut it out. But I would write a letter,
    at least two times a week. Yeah, I had a bunch of letters. I used to write when I was basic training, I used to write
    a letter just about every day, and I'd write home sometime, tell them to send me something to eat. You know, you get tired
    of eating K-rations. But then they made what we called a C-ration. It was a can that would warm up in our steel helmets,
    and we'd go into a German house we raided and find potatoes there, and we'd sit up there all night long making fried,
    French fried potatoes you know. Uh, things like that.
- speaker: Interviewer
  text: Did you receive many letters or was it hard?
- speaker: Respondent
  text: Yeah. The one thing my mother used, my mother during the Battle of the Bulge, was during the Battle of the Bulge,
    My mother, I got a package from my mother. It was big baked bread, and inside that bread, there was a canteen of wine
    that she made. She had to hide it because it was against the law to send bread through the mail, I mean liquor through
    the mail. And it happened to come to us during the Battle of the Bulge when we were really cold. And all my guys, all
    of my friends, we gathered around. We had one drink, and that's about all you could get about one drink when you pass
    it around like that. But I'll never forget that ever. It was good timing.
- speaker: Interviewer
  text: What was, you said you didn't really like the K-rations?
