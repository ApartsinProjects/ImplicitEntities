turns:
- speaker: Respondent
  text: '...are about this big in size. Okay. About that thick. They had a little rod sticking up from the top. And what happened
    is that rod is the detonator, and we hit the rod and that detonated the mine and it blew us up pretty good. No one got
    hurt in there, but as you can see, it caused some serious damage to the tank. And then on the back it showed us working
    on it, trying to -- See, as you can see, there is nothing but desert out there. No -- hardly any rocks at all. But we
    were able to pull our track out and fix it and then catch back up with our unit. And after we caught back up with them,
    that''s where we got into combat. But whenever we were stuck in the mud deal, we were stuck. And whenever we were stuck,
    all these Iraqis, they started popping up out of these bunkers, you know, and raising their little white flags and surrendering,
    because they were scared to death. You know, they saw all of us there and they were scared to death because they didn''t
    want to die. So they just started popping up out of every place. We were able to get hundreds of prisoners of war and
    we just circled them up and put them inside a little fence and give them some food and they were happy. They were hungry,
    thirsty. They just looked pretty pathetic. They didn''t look ready to fight. But we were able to get all that stuff ready.
    Now, the tanks over there just on the other side of the second mud deal, they had a lot of tanks that were buried as you
    can see, halfway buried in the sand. And that was called camouflage neck covering. And what that helps to do is obviously
    help to camouflage them and helps to sort of deter the radar as other planes flew over to try to camouflage their position.
    So what would happen was, see, they were buried in there, they were there to stay. Those mines were not -- Those tanks
    were not going to move away from them. So what we did we just started having target practice with them. And we were just
    shooting, blowing them up. This is one here, okay, that we just blew up. I don''t think anybody was in there at the time.
    If they were, as you can see, they''re not going to live. But we were able to make it through okay. Nobody got killed
    in my particular unit. It was pretty fun. Here we are at the end, this was a day after the war, and, you know, we''re
    just playing cards. We dug a little table in the dirt and just having a little fun that way. And this was all for our
    unit. Because we were just a select few, okay, that were chosen, you know, to make these roads, these paths with the mine
    fields so that everyone else, you know, that was going to fight in Kuwait could get through there. So we had a very important
    job, okay, to make the lanes so that we can go in there and clear Kuwait of the bad guys, so to speak. So it was quite
    an issue. In these pictures here, this is a friend of mine, we went to boot camp and tank school and everything together,
    he is from Florida. But this is Kuwait -- Kuwait City is extremely modern. It is like Columbia. Okay. You''ve got highrise
    buildings, but their culture is even -- is very modernized. But there are some cultures who still take part in the veils,
    you know, in covering their face, but then you''ve got other people in Kuwait City that are, you know, just like you would
    see in downtown Columbia, wear pants, dresses and things like that. Any other questions you want to ask?'
- speaker: Interviewer
  text: So these are friends of like your whole unit?
- speaker: Respondent
  text: Yeah. We became -- we became good friends, especially the guys that were on my tank with me, when I got there, you
    know, we had never met. And when you're that close everyday for 24 hours a day, you know, you learn a lot about -- you
    become real good friends, friends for life.
- speaker: Interviewer
  text: Did you keep in touch with your friends --
- speaker: Respondent
  text: You know, I haven't talked to them in a few years. We sort of, you know, gotten out of touch. But you know, I don't
    know if they are still -- I'm sure they are, but I don't know, but I'm sure they are. They are all around my age. Some
    are younger than me. They are in their, you know, late 20s or early 30s.
- speaker: Interviewer
  text: So like basically, y'all used machine guns and tanks?
- speaker: Respondent
  text: Yeah. In our tank we had the main gun is 105 millimeters, then we had a machine -- two machine guns. We had a 50 caliber
    machine gun, which the tank commander used, and an M16 machine gun, which was attached. It was to the side of the main
    gun tube, but it was fired from the inside, okay? And then we had just a regular rifle, an M16 rifle, and then I had a
    nine millimeter pistol. And those were the weapons that we used in that particular tank.
- speaker: Interviewer
  text: What did you do with prisoners of war?
- speaker: Respondent
  text: We just herded them into an area and we just put a little hasty fence around them. And there were -- as other units
    came through, MPs, military police, they stood guard. And you know, I don't know what happened to them, because we just
    continued on, you know, with our mission into Kuwait. So I don't know what happened to those prisoners of war. I just
    know that we just put them in a herding area, so to speak, herded them up like cattle.
- speaker: Interviewer
  text: What did you think about like war, when you went to fight?
- speaker: Respondent
  text: I was -- When I first got the call to go over there, you know, it's a little nervous, you know, a little nervous,
    but excited at the same time. You know, because you -- when I joined the military, you know, I didn't really think of
    a war at the time. You know, you don't really think of that. But in the Marine Corps, the Marine Corps, we're always considered
    the first to go. Just like right now in Afganistan, you know, who were the first people that they put on the ground over
    there? You know, they put the Marines on the ground, sort of, you know to get things started. Yeah, I was nervous at first,
    then I got used to it and whenever artillery started dropping around you, you're just nervous again, especially the day
    that we were going in, okay, the day the ground war started. And obviously you are nervous because you are of the unexpected.
    You know, you don't know what's going to happen to you. And luckily, you know, luckily we made it through unscathed, because
    after it was all over with, we were told that our particular unit, they were expecting 80 percent casualties. Okay. Eighty
    percent of us were expected to die. So we were -- we were very lucky to come back a live.
- speaker: Interviewer
  text: Did you have any wives or --
- speaker: Respondent
  text: No, I was single at the time. No wife. Didn't have a girlfriend, you know, so that's one reason why we were chosen.
    Because these guys that you see in that picture, we were all single. Yep, we were all single. And you know, that's one
    reason why they chose us, because they thought, hey, you don't have any family back home, you know, I mean, as far as
    a wife and a child is concerned.
- speaker: Interviewer
  text: How did you relax? What did you do?
- speaker: Respondent
  text: Relax? We played cards. Yeah, we played spades and hearts. We -- One of my buddies had a frisbee, you know, played
    frisbee. There was a lot of down time, because we did most of our training at night because that's when we were told we
    were going to enter, you know, was at night. So we did all of our training at night and you do it with no lights, okay,
    because if you have lights on, they're going to see you coming. So we did everything with no lights. We had night vision
    goggles, you know, you had to look through the goggles, comes up green, and in those you have no depth perception. You
    know, you can't, you know, tell where things are. You can see out of them, but you can't really tell a whole lot. So there
    was a lot of down time there.
- speaker: Interviewer
  text: Were you like particularly nervous or anything about your certain mission, like what you had to do?
- speaker: Respondent
  text: Yeah, we were nervous because of just being in a mine plow tank, because you knew you had to go through mind fields.
    And if you think of mine fields, you think of something that could happen to you, something that's pretty bad. Even though
    we did have plows on them, supposedly plow them out of the way, you know, those don't necessarily work all the time.
- speaker: Interviewer
  text: So like the plows, you wouldn't actually hit the mines, if the mines blow up --
- speaker: Respondent
  text: Yeah. There were different types of mines. You had antipersonnel mines, you know, obviously didn't do anything to
    the tank. They would just blow up and make a lot of sand, just blow a lot of sand up. But if a person actually stepped
    on those, then obviously it would, you know, get rid of a leg, an arm, because they're anti personnel. But then the anti
    tank mines, you know, obviously they can do a lot of damage. Luckily it didn't hit us underneath the tank. If it would
    have hit us underneath the tank, it would have caused a lot more damage, because underneath the armor is not very thick.
    You know, it is thicker obviously on the outside, you know, because that's where the rails are going to hit you, so it
    needs to be thicker, so that they do not penetrate the armor. But you know, I was pretty nervous. I would be lying to
    you if I said I wasn't.
- speaker: Interviewer
  text: Were the NVGs, like the Air Forces, are they all the same?
- speaker: Respondent
  text: I'm sure. These were ones that we used as far as outside, they were just, you know, binoculars. You know, just stuck
    them out there to your head. I'm sure they're all the same. Then as the driver, I had something that I would slide into
    one of my sights. Okay. In the M60 tank that I drove, there were three little windows that I looked out of. One up front,
    one to the right side, one to the left. And with the night vision site, I would pop out the window, pop that site in there,
    and it was like a periscope. Look out this way, come down and have a big green screen right here, that I had to put my
    face to it, you know, and drive like that. So I only saw, you know, right in front of me. I couldn't see anything to the
    sides, okay, when I had those sites in at night. So I'm sure they're similar to what the Air Forces are.
- speaker: Interviewer
  text: Would you have rather been like another part of the tanker or did you like being the driver?
- speaker: Respondent
  text: I loved being the driver. Yeah. It was a lot of fun. You know, as the more years I spent in the Marine Corps, you
    know, you move up.
- speaker: Interviewer
  text: It is based --
- speaker: Respondent
  text: On rank, basically. You start out as a loader. The loader is usually your privates, you know, your private first class.
    And then as you get to a Lance Corporal, you know, you move up to the driver. Then your next step would be the gunner,
    and then the next step up would be the tank commander. And that's where I ended up, as the tank commander.
- speaker: Interviewer
  text: Did you like feel lots of responsibility being the commander?
- speaker: Respondent
  text: Yes. Because I'm responsible for the crew. You know, I've got to tell the driver where to go, because a lot of times
    when they're down there, their vision is only so much, you know. So you've got to know what commands to tell the driver,
    you got to make quick decisions. You've got to make decisions about target acquisition, what type of round to put in,
    so it is a lot of responsibility to be a tank commander, a lot. But you know, you learn as you go. As you're in the tank,
    if you have good commander, you know, while you are out there, there is other levels and you learn from them. It just
    makes the transition easier, you know, when you have good commanders out there.
- speaker: Interviewer
  text: What was your most memorable moment when you were over there?
- speaker: Respondent
  text: It was when we were -- It was after the war, actually. We were just outside of Kuwait City and the Kuwaitis, a lot
    of them came to where we were parked, okay, where we were camped. And they came up and they were so excited. They were
    thanking us and hugging us and giving us all kinds of things and just thanking us that, you know, for giving them their
    city back, you know. And that really sticks in my mind, hey, you know, we did something good here, you know, we gave these
    people back, you know, what was theirs. And that's one of my most memorable moments.
- speaker: Interviewer
  text: Was it all like civilians?
- speaker: Respondent
  text: Yeah. They were civilians, yeah. We didn't -- I didn't see any -- I mean, I saw Kuwaiti soldiers there, but the ones
    that came to us were the civilians, yeah.
- speaker: Interviewer
  text: Did you have a lot of interaction with the Kuwaiti people?
- speaker: Respondent
  text: No. Not at all. Well, we had just very little interaction. We were in Kuwait. Once we, you know, liberated -- liberated
    the city, our camp was, you know, right there at the city, outside the city, and we were there for a month, you know.
    But we didn't have a whole lot of interaction with the Kuwaiti people themselves. Our commanders did, you know. They interacted
    with them a little bit more than we did. But we just sat around and played cards, you know, because there wasn't anything
    else to do, but just to play cards.
- speaker: Interviewer
  text: So like how long did the war last?
- speaker: Respondent
  text: The war lasted about, I think it was two or three days. I think it may have been three days at the max, as far as
    the ground war is concerned. You know, the air war started in -- I believe it started in January, but the actual ground
    war was just a few days. And we just got a lot accomplished. We got a lot accomplished during that time. Because we had
    been training so much, we knew exactly what we had to do, and we just got the job done and they just started -- the Iraquis
    started fleeing Kuwait. Whatever they could find, motorcycles, cars, trucks, military vehicles, and then we just started
    bombing them, you know, as they left. And that was a pretty gruesome sight. Because afterwards, I mean, we would go --
    we went and looked at it. And all it was, just imagine clips of road, full of cars that had been blown up, and there were
    a lot of bodies, you know, all over the place and obviously loose -- you know, missing heads and limbs and things like
    that. That was pretty -- pretty gruesome.
- speaker: Interviewer
  text: Do you think like the war changed you or anything, seeing all those dead people?
- speaker: Respondent
  text: Not really. I wasn't really changed as far as seeing those people like that. It was just, you know, just an experience,
    just an experience.
- speaker: Interviewer
  text: What kind of stuff did you wear like -- just wear?
- speaker: Respondent
  text: We had to wear our -- We had to have our gas mask at our side all times, okay? Because at anytime the threat of chemical
    warfare was there. Gas. We always had to have that. If we didn't have that, we were going to be in some serious trouble.
    Okay. You were going to die. We wore what is called an NBC -- well, not an NBC, CBC suit, which is just a -- it's like
    a jumpsuit, just a green jumpsuit, which was -- it was fire retardant. It would repel fire. Because you are in a tank,
    you know, around it is just -- obviously, it is going to catch on fire, and that was going to give you a chance, you know,
    to get out before you burned up by wearing that suit. I always had my nine millimeter with me, you know, just in case.
