collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Where and when were you born?
- speaker: Respondent
  text: Seward, Nebraska.
- speaker: Interviewer
  text: Who were your parents and what were their occupation?
- speaker: Respondent
  text: Let's see. It was William Adams and Laura Adams and they were farmers. They owned their own farm.
- speaker: Interviewer
  text: Who are your siblings?
- speaker: Respondent
  text: I have two brothers, both of which are still alive. Older brother Jerry is still a farmer. And my younger brother
    is Ryan, and he is currently a retired pharmacist.
- speaker: Interviewer
  text: Did they serve in the military as well?
- speaker: Respondent
  text: My older brother was in the National Guard in Nebraska. My younger brother did not do anything.
- speaker: Interviewer
  text: What were you doing before you entered the service?
- speaker: Respondent
  text: I was a pharmacist. I had graduated and was married for one year, and then I received my draft notice and I was drafted.
- speaker: Interviewer
  text: In which branch of the military did you serve?
- speaker: Respondent
  text: U.S. Army, Medical Corps.
- speaker: Interviewer
  text: So, you were drafted into the military?
- speaker: Respondent
  text: I was drafted, yes. This is -- this was prior to the lottery system, and it was during the Vietnam War and each county
    had a certain requirement to provide a certain number of individuals for the service as a draft. And I chose - rather
    than taking a commission, I chose to just do the two years as a draftee.
- speaker: Interviewer
  text: What happened when you were departed for training camp and during your early days of training?
- speaker: Respondent
  text: Oh, when I went; okay. I -- let's see. This was in July of 1968, I believe. I'll have to double-check that, but I
    think that's right. And I was sent to -- and I happen to have my draft book where I served and I graduated from this particular
    training service in Fort Bliss, Texas. I was living at the time in Bentondorf, Iowa. We had moved from Nebraska to Iowa
    and I was drafted out of the Iowa Draft Center, and I was sent to Fort Bliss, Texas. And this is -- I've got my picture
    in here.
- speaker: Respondent
  text: Interesting, anyway. But that was Fort Bliss. That was eight weeks of training in July in Texas. And I told my wife
    after I got that service completed, I said, we're never going to go to Texas again. Don't even want to go there for vacation.
    Never moving to Texas. Where did I end up? Texas. For 40 years now.
- speaker: Interviewer
  text: Have you adjusted to living in Texas?
- speaker: Respondent
  text: Oh, yeah, yeah. This is home now.
- speaker: Interviewer
  text: Do you recall your instructors?
- speaker: Respondent
  text: As a matter of fact, I ran across his name in here, and he was the drill instructor. And can I pause just a minute?
    I need to look up --
- speaker: Respondent
  text: My drill sergeant's name was Sergeant Ray Kerr, K-e-r-r, and he was a difficult person.
- speaker: Interviewer
  text: Can you describe more about him? Are you trying to forget?
- speaker: Respondent
  text: Well, like I said, I was trying to forget him, you're right. However, he treated us fairly. His job was to prepare
    us for possible going into combat. He couldn't be real gentle to us, and he did the best he could to get us prepared.
- speaker: Interviewer
  text: So, the training was really vigorous?
- speaker: Respondent
  text: Oh, yes, yes. You have to remember that I had graduated from college at that time, and I was 21 years old, almost
    22, and I was up against 16-, 17-year-old guys in the training. So, I had to try and keep up with them. And there's a
    picture of me, by the way.
- speaker: Interviewer
  text: Oh, nice. You were 21 at that time?
- speaker: Respondent
  text: Yes, 21. Yeah, married and 21, yup.
- speaker: Interviewer
  text: And graduated?
- speaker: Respondent
  text: And had graduated from college, yeah.
- speaker: Respondent
  text: So I was up against high school kids, you know, people like -- our age, yeah.
- speaker: Interviewer
  text: How did you adapt to the military life including the physical regime, barracks, food and social life?
- speaker: Respondent
  text: Having gone through college and being in a fraternity, I was used to being able to follow orders and do the routine
    things, so I really didn't have any major problems. One problem I had with the drill sergeant was since I was so much
    older than everybody else, my beard kept coming in real quick. And so, I tried one day to do it the night before, and
    during inspection the following morning, Sergeant Kerr came up to me and he said, Recruit Adams, you will proceed to go
    in the hut and shave again. You cannot be presented with that beard. So, I was pulled out and I had to go shave.
- speaker: Interviewer
  text: So, you shaved every day in the military?
- speaker: Respondent
  text: You had to shave and they only -- the reason I tried it in the morning was I wanted to get it done before -- you know,
    we were all fighting time to get in to do the shaving and all our physical activities, so I thought I'd get a head start,
    but it didn't work. So, anyhow.
- speaker: Interviewer
  text: What was the food like?
- speaker: Respondent
  text: Food was -- this was in basic training; it wasn't too bad. In Vietnam, at the 8th Field Hospital, it was not real
    good. And I found that I craved and enjoyed eating liver, and the reason was that was the only thing that had any real
    flavor, so that's -- I haven't had any since, but that's --
- speaker: Interviewer
  text: How was the social life?
- speaker: Respondent
  text: Social life was -- in the Army, we went -- after I got drafted and finished basic here in Fort Bliss, we were transferred.
    And I say "we" because my wife went with me. We were transferred to Fort Benning, Georgia. And that's a -- that's basically
    a tank training area. And infantry. And we were able to -- since I was married, we were able to live off base, so we had
    it pretty decent because we could -- we had a small apartment and that was pretty reasonable. So, the living conditions
    there were not bad. In Vietnam, we were -- since all the enlisted people were in a Quonset hut, which about 30 or 40 different
    bunks there and it was kind of congested, but the conditions weren't too bad. It was not air-conditioned in Vietnam, that
    was a bad deal, but -- it got pretty warm.
- speaker: Interviewer
  text: So where did you serve?
- speaker: Respondent
  text: Let's see. Fort Benning, Georgia for about nine, ten months, and then I was transferred to South Vietnam. I was in
    the 8th Field Hospital there in Nha Trang, which is about halfway down Vietnam. And I was assigned to the pharmacy there
    in 8th Field Hospital.
- speaker: Interviewer
  text: What memories do you have of going in Vietnam?
- speaker: Respondent
  text: The -- well, just, you know, we had -- it was basically a medevac area and we had helicopters coming in all the time
    with wounded soldiers. The pharmacy that I was involved in serviced a lot of getting -- once the soldiers were fairly
    well recovered, they were able to transfer out, and we would fill prescriptions for them, we would fill prescriptions
    for the employees of -- all the staff and also a lot of the Vietnamese people that worked there at the field hospital.
- speaker: Interviewer
  text: If you were on the front lines, what combat action did you witness?
- speaker: Respondent
  text: Combat action is -- not a whole lot, thank goodness. The worst thing we had was one instance where we had a first
    sergeant that kind of rubbed one of the soldiers the wrong way and somehow that soldier got a hold of a rifle and he shot
    and killed that first sergeant. That was within our area. Towards the end of my tour, we came under mortar attacks quite
    often from the Viet Cong and North Vietnamese. It was kind of hairy in there. We were forced to be behind a lot of sand
    bags and all that kind of stuff. And the worst thing that came out of there, I didn't ever suffer any injuries, but one
    of our x-ray technicians was hit with a mortar and he lost both of his legs. And that was pretty traumatic for everybody,
    yeah.
- speaker: Interviewer
  text: When you were not on the front lines, what were your duties?
- speaker: Respondent
  text: Guard duty, we all had had to serve guard duty. KP, we had to do KP. But we worked a normal shift during -- in the
    pharmacy hours, and other than that, we didn't have any extra requirements except that guard duty and various KP and/or
    policing areas that we had to do.
- speaker: Interviewer
  text: What kind of friendships and commanderies did you form while serving and with whom?
- speaker: Respondent
  text: Mike McCrae was an enlisted pharmacy technician with me that I worked in Vietnam. And he and I have maintained contact
    throughout. He lives up in Ohio, I believe, somewhere. He's come down to visit us once with his family, and so we enjoyed
    getting together with him again. So, I don't know if this is the place to talk about this, though. There was -- I'm going
    to throw it in there because I don't know where this would fit in your -- you may be able to edit this. During my tour
    in Vietnam, I volunteered and was involved in a choir. Real terrifying. That's a picture, and now that picture of that
    gentleman right there -- yeah, that one, that gentleman right here -- he was a chaplain for the whole compound. I was
    contacted by his son just recently. This was -- I'm not sure when; about a year ago. He contacted me and he said his father
    had died and he had talked about his service in the 8th Field Hospital and he did this choir. He had this choir and he
    was really proud of it. And he sent me these pictures. That's where these pictures came from. And, as you can see, we're
    kind of a motley-looking crew there. We even had one of the recovering soldiers there.
- speaker: Interviewer
  text: Are you in this picture?
- speaker: Respondent
  text: Oh, yeah. That's me right there.
- speaker: Interviewer
  text: Oh, that's you?
- speaker: Respondent
  text: Yeah, that's the soldier that's recovering.
- speaker: Interviewer
  text: You would all sing together?
- speaker: Respondent
  text: Yeah, well -- well, and the reason I'm telling you that story is because his name was -- I need to get his name involved
    here. His name was David Fuller. The chaplain's name was David Fuller. And his son contacted me, and he wanted me to know
    that he -- David had received a bronze star medal for bravery for meritorious service because of his activities in our
    8th Field Hospital area. Yup, yup, so that was -- I'm glad he contacted me and let me know about that.
- speaker: Interviewer
  text: He still has the pictures. That's really good. What other activities did you do other than singing and choir?
- speaker: Respondent
  text: While I was there, I worked on a model boat. And when I had -- the one year I was out of college I had time and I
    started a model sailing ship called a tall ship, real tall one with all the sails on it. And this was from a kit. And
    so, I had a little spare time so I started building one from memory in the 8th Field Hospital Quonset hut there. And I
    made a few friends with some of the Vietnamese workers there, and I would tell them I needed -- they were -- the local
    Vietnamese that worked there were pretty good with English so they were able to communicate quite well. I would tell them
    I'm looking for something that might work as a framework for a boat. Well, this -- and I'll -- I don't think this is a
    slang word, but papasan they called them, the gentlemen that were working around and working there. He came up with an
    old bamboo shade and it had a lot of slats on it. So, I could use that for the framework for the bulk of the boat, and
    I just started working on that. I had my wife send me various things like glue and pins and old handkerchiefs that I used
    for the sails and it just -- it just helped occupy the time while I was there.
- speaker: Interviewer
  text: So, you were able to make boats?
- speaker: Respondent
  text: I was able to get it done and -- by the time I was discharged. And I had gotten a slight early out to go to graduate
    school. I wanted to get an MBA, so I was working on that while I was there too, and I got, I think, a few weeks early
    out to go back to hit the -- I went back to Nebraska, Lincoln, to go to MBA school. And I was able to have that ship shipped
    back here, and I still have it in my house.
- speaker: Interviewer
  text: Oh, the model?
- speaker: Respondent
  text: I do, yeah.
- speaker: Interviewer
  text: So, there was no communication barriers or not a lot of them?
- speaker: Respondent
  text: Well, we were fortunate. We had a lady that was very proficient in English, and if we had problems or needed to go
    to an individual that didn't talk or speak English real well, we would go through her, kind of an interpreter-type thing.
- speaker: Interviewer
  text: Were you able to learn any Vietnamese while you were there?
- speaker: Respondent
  text: I didn't. You know, some slang words that -- not going to use those. But we did have to type -- for the Vietnamese,
    we did have to type the prescription labels in Vietnamese. So, we had a little chart there that we converted, one tablet
    is --
- speaker: Interviewer
  text: So, you translated?
- speaker: Respondent
  text: So, we would type.
- speaker: Interviewer
  text: That's very impressive.
- speaker: Respondent
  text: So, we had -- we typed it so they could understand what -- how they had to take the medicine properly.
- speaker: Interviewer
  text: Like, you said you played golf. Did you play that during your service?
- speaker: Respondent
  text: No, no, no. No time for that kind of recreation. Only thing we got with you served overseas Vietnam particularly you
    had a two-week -- what did they call it? It's a rest period. You can go -- you're allowed to fly anywhere to meet a spouse
    or a friend or something like that. And I met my wife in Vietnam -- or in Hawaii.
- speaker: Respondent
  text: So that was nice.
- speaker: Interviewer
  text: So, the two weeks?
- speaker: Respondent
  text: About seven to ten days, yeah. That was -- you know, after a few months in the jungle, it's nice to get out.
- speaker: Interviewer
  text: Yes, and see your wife?
- speaker: Respondent
  text: See the wife.
- speaker: Interviewer
  text: In Hawaii, that's the place.
- speaker: Respondent
  text: Not bad, that's right.
- speaker: Interviewer
  text: Did you feel pressure or stress from this?
