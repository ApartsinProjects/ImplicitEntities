collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: On August the 3rd, 1913, Monroe County, Georgia, out in the country, not in the hospital. I grew up -- first six years
    of my life I lived in the country. Then we moved to town to -- my dad bought a grocery store and I was brought up in a
    grocery store. So I -- my dad died at age 46 and my mother had to raise all six of us children from that time on.
- speaker: Interviewer
  text: Was she running the grocery store?
- speaker: Respondent
  text: Oh, yes, ma'am, we all helped. I was 13 years old at the time he died and my sister -- oldest sister was 14 so she
    had some help. We went to school every day and graduated from high school, all of us did. During this period of time the
    Depression came -- well, in fact the Depression was on when he died; and so during that period of time in order to get
    a few dollars, I joined the National Guard in 1929 and served in the Georgia National Guard until 1932 in September. In
    September '32, 19th of September, I joined the US Marine Corps, was sent to Parris Island, South Carolina, went to boot
    camp there. After boot camp, I got assigned to the fire department at Parris Island; stayed there for about eight months;
    went to Norfolk, Virginia, to -- supposedly to go to China but Batista in 1933 took over Cuba, so they took all the Marines
    from all the different organizations, us included, that was supposedly going to China, sent us to Quantico, Virginia,
    and we formed the First and Second -- reformed, all right, the First and Second Battalion Fifth Marine Regiment. And sometime
    about the first of October 1939 my battalion, Second Battalion Fifth Marines, were sent to Cuba and -- we went aboard
    the USS Romain and sailed for Cuba and anchored right in the middle of the harbor in Havana, Cuba. And we were there to
    protect any American lives in case because of the rebellion Batista took over as a rebellion, but, fortunately, they finally
    resolved their difficulties by electing a president, not Batista; and he became, if I remember, equivalent of a Secretary
    of Army. Later on we know he became president, but at that time he -- and so we finally got even to go ashore to Havana,
    Cuba, and spent a few liberty days there.
- speaker: Interviewer
  text: As a young man in a country like Havana -- and I know how exciting that was -- what did you think of that?
- speaker: Respondent
  text: Well, we -- it was just something different. I never been acquainted with that kind of environment before. Of course,
    I was 19 years old when I joined.
- speaker: Respondent
  text: In fact, I was 20 years old in '33 and -- but then we left there, went on maneuver trip down to Vieques, Puerto Rico,
    not Vieques but -- anyhow, near Vieques, it was part of Puerto Rico. Culebra. Culebra was the name of the island we used
    there for maneuvers. And then finally in May 1934 we finally arrived back at Quantico. That would be '34. It was sometime
    during that time I made Private First Class, made first striper; and we made many different reenactment of battles out
    throughout Virginia and -- Civil War battles along with VMI, VPI. In other words, they were one -- they were our opponents,
    of course, US Marines, and we had to -- First and Second Battle of Bull Run, we made those. Then we went back on maneuvers
    again down to Culebra, spent about two-and-a-half months during that time. That takes care of '34. In '35, in somewhat
    of a repeat, I guess, we did most of our training through the woods and swamps and so forth at Quantico, Virginia. Of
    course then it wasn't nearly as populated as it is now.
- speaker: Interviewer
  text: Did you have a specialty? Were you infantry or what were you?
- speaker: Respondent
  text: I was in the H Company which was the machine gun company of the Second Battalion and I was in -- not even in the machine
    guns, I was in a mortar platoon, 81 millimeter mortar, 37 millimeter Howitzer weapon. They don't use that but they still
    use the 81 millimeter mortar and the 60 now. And during that period of time, '35 or '36, we're in '35, I was sent over
    to detach duty with reserve units a couple weeks at a time. One was Camp Beauregard, Louisiana, one was Seagate, New Jersey.
    Then to come back, 1936 was almost a repeat of '35, just go on maneuvers; and during '36 I was sent on detach duty with
    a group of Second Lieutenants up in Philadelphia to begin with and then finally went to Ohio to a National Guard camp
    in Ohio for them to finish up their training.
- speaker: Respondent
  text: So -- and then in 1937 -- well, we made another maneuver, of course.
- speaker: Respondent
  text: But I left there in September '37, went to sea school in Norfolk, Virginia.
- speaker: Interviewer
  text: What kind of school was that?
- speaker: Respondent
  text: It's a sea school, it's supposed to teach you about knots and about the ships and --
- speaker: Respondent
  text: Nautical stuff. But I had already had nine months aboard ship so they needed a -- and I already made Corporal during
    that period of time; and they needed a Corporal aboard the USS Brooklyn which was a brand-new ship going into commission,
    and so I was sent up to be a part of the sea-going detachment on the USS Brooklyn. I spent the next 22 months aboard that
    ship.
- speaker: Interviewer
  text: Where all did you -- where were some of the places you went?
- speaker: Respondent
  text: Well, we went to Galveston, Texas, with a shakedown crew.
- speaker: Respondent
  text: And then we come back after we left Galveston, we stopped by New Orleans and put in there for, oh, about a week, I
    guess. And then we made a trip to Guantanamo Bay.
- speaker: Respondent
  text: And back to Brooklyn, and then we went on another trip with -- with the fleet we made -- that's when I made Haiti
    and Virgin Islands, Panama, Trinidad. I was only there for liberty time, I was never stationed there. I think we did spend
    about two weeks in Panama. And then we come back to Brooklyn Navy Yard. We came back and forth to Brooklyn Navy Yard in
    all these because Brooklyn was the home port of the USS Brooklyn. And during that time I met my future wife in Brooklyn.
    She was a --
- speaker: Interviewer
  text: What year was that?
- speaker: Interviewer
  text: Mmmm. So Hitler was on the move then?
- speaker: Respondent
  text: Oh, yeah, he was on the move then. And so we finally -- in fact, we got married and we had a child about to be born
    and she went back to Florida, her home state.
- speaker: Respondent
  text: And my time was up in September of '40. Eight years I spent active duty.
- speaker: Respondent
  text: So I went in reserves as the same rank I had. I was a Sergeant then.
- speaker: Respondent
  text: Went in ranked as a Sergeant and stayed and went in civilian life and got a job with Georgia Power Company, worked
    for them as an apprentice linesman. Never did stay long enough to make linesman. And a grunt, too. That's what they called
    a grunt, help give the people the other -- the stuff they need that's on the pole. And then in January 1942 I got called
    back to active duty, Parris Island, South Carolina, as a drill instructor. I stayed there until -- and made Staff Sergeant,
    Gunnery Sergeant, Master Sergeant, all three ranks there during a period --
- speaker: Interviewer
  text: Still as a drill instructor?
- speaker: Respondent
  text: Well, after -- when I made Master Sergeant, I was actually a First Sergeant, I was First Sergeant in one of the companies
    but still in Crew D, yes, I was not a drill instructor actually but up through Gunnery Sergeant I was a drill instructor.
- speaker: Respondent
  text: And eventually I got -- my wife came to Parris Island, I got quarters there and everything, and stayed about probably
    14 months with me and I got orders to go overseas. And so I went from Parris Island to Camp Lejeune, North Carolina, and
    became part of a -- what they call a replacement battalion; in other words, people going to fill in for people who lost
    their lives and got wounded and so forth. And I spent, oh, probably eight weeks in what they call intensive training,
    all kinds of simulations of combat and finally went to California, waiting for a ship. Finally got a ship. This is somewhere
    around the later part of '45. We actually went by ship from Norfolk, Virginia, to San Diego and got another -- a transport
    from there and finally wound up in Okinawa in the Battle of Okinawa.
- speaker: Interviewer
  text: Oh, you were in the battle?
- speaker: Respondent
  text: Yes, ma'am. I spent about a month and a half of the battle there.
- speaker: Interviewer
  text: Were you in the first wave?
- speaker: Respondent
  text: No, ma'am, no, ma'am, no, ma'am, I was a replacement battalion, that's why C, that means replacement.
- speaker: Respondent
  text: I got assigned as a First Sergeant to an engineer company, so it was strange to me being an infantryman all my time
    I wound up -- of course, I guess in all service, in the Marine Corps anyhow, if you're a First Sergeant or a Sergeant-Major
    you can get transferred to any unit because the duties are the same for those duties no matter what your area is; and
    our job was to build bridges, keep the roads up, build these pads for light planes to land; and we got shot at but not
    -- we wasn't actually fighting them.
- speaker: Interviewer
  text: But they were shooting at you?
- speaker: Respondent
  text: Oh, yes, ma'am, they -- sporadically. Not --
- speaker: Interviewer
  text: So you never knew when it was coming?
- speaker: Respondent
  text: Well, no, you never knew when it was coming, no.
- speaker: Interviewer
  text: Were you frightened?
- speaker: Respondent
  text: No, it didn't bother me. I mean, it's -- that was part of life as far as I was concerned. I mean, it was something
    I trained for all that time. I mean, yeah, in some ways I was scared, I don't think anybody gets shot at that's not scared,
    but we had -- we had that job to do so we had to keep on doing what we was doing. Of course, we had weapons so if we got
    -- actually had to shoot back, in other words, we could get -- man a line but --
- speaker: Interviewer
  text: This is still on Okinawa?
- speaker: Respondent
  text: Okinawa, yes, ma'am. And I stayed there until the battle ended and moved up away from the battle area to a more secure
    place and pitched tents; and we had these parameter tents, not just pup tents and 8, 10, 12 people I think in each one
    of them and get ready preparing for the next invasion, which we knew, everybody knew would be Japan but the war ended
    while we were there.
- speaker: Interviewer
  text: Where were you the day they dropped the bomb, the big bomb?
- speaker: Respondent
  text: Okinawa somewhere, I don't remember.
- speaker: Interviewer
  text: Do you remember how you heard about it or anything?
- speaker: Respondent
  text: We heard about it by radio, TV -- I mean, not TV, excuse me, radio. We had --
- speaker: Interviewer
  text: Shortwave radios?
- speaker: Respondent
  text: Shortwave, yes, ma'am. We didn't, but, I mean, other organizations did. They told us all about it. And I can remember
    when the -- I was in my tent doing some of my First Sergeant's work and -- at the time that the war ended and they even
    had a movie going on back in one of the hills there, they had kind of carved out a place and put up a screen. It wasn't
    a regular theater --
- speaker: Interviewer
  text: No, that's for sure.
- speaker: Respondent
  text: -- but they were seeing a movie. And I heard shouting, a hhhhh, a hhhhhh, a hhhhh, and I didn't hear anything over,
    but somebody had announced the war was over.
- speaker: Respondent
  text: And so many guns up around, up top of the -- up above us anyhow, the airport, boom, boom, boom.
- speaker: Interviewer
  text: Everybody shouting.
- speaker: Respondent
  text: Everybody shouting and hollering.
- speaker: Respondent
  text: And I stayed there then after that until --
- speaker: Interviewer
  text: Were there still Japanese on the island at that time?
- speaker: Respondent
  text: Yes, ma'am. Well, I'm sure there were because even after we moved up to our secure location, we had to sometimes go
    out on reconnaissance patrol because they were slipping down getting food and so forth from the garbage cans, anything.
    Of course, naturally, they didn't want to give up. They didn't cause any trouble, but they -- they was trying to survive.
- speaker: Interviewer
  text: Yeah, I -- just to interject here, remember that the story was -- I think it was a story or a rumor, that some of
    the Japanese stayed on the island for four or five years and didn't know the war was over?
- speaker: Respondent
  text: Yeah. I don't know about Okinawa, but I heard that said of Guam.
- speaker: Respondent
  text: Yes, ma'am.
- speaker: Interviewer
  text: Yeah. So after then -- what happened after the war then?
- speaker: Respondent
  text: Well, from the -- sometime -- about the last part of September, we -- my division was assigned to China. So I finally
    got to China.
- speaker: Interviewer
  text: Oh, you finally got to China.
- speaker: Respondent
  text: And I still was with my engineering outfit and we -- my outfit, because we were engineers, we went in on LSTs, landing
    ship things, because we had heavy equipment, dozers and graders and all that kind of material; and we went up the Haiho
    River and went into Tan Son. Most of the division had -- or the -- went up by train to different locations. Of course
    the division was not closely connected. I mean, we had part of it there. Besides my engineer battalion, had the first
    aircraft wing there, too. Had a good airport there at Tan Son. At first we had -- at Tan Son our job over was there to
    -- the full scale job was to repatriate the Japanese on behalf of the Chinese government. You know what we did? We did
    it. But when the Japanese gave up, they completely gave up. We -- they put them in compounds by themselves under their
    own officers, own NCOs, and they came to work for us and other organizations but we got a group of them to help us in
    our engineering duties; and they always would send either a warrant officer or an officer, maybe a top NCO with them and
    usually they were very -- could speak English very well and you could communicate with them, tell them whatever you wanted
    them to do and they were good workers and they gave up. In other words, there was no fight. In other words, when the emperor
    says the war is over, that was it. So they mentioned they finally kept getting -- back to Japan and --
- speaker: Interviewer
  text: How did you of the Marine Corps feel about having them as workers because the roles were all of a sudden reversed?
- speaker: Respondent
  text: Well, yeah, if they had given any trouble I think it would probably -- but they were very, very kind and docile and
    didn't -- no trouble whatsoever. Of course, they give up. I mean, they -- the emperor says this is it. Now, of course
    those people back in the hills of Okinawa and Guam and other places, they probably --
- speaker: Interviewer
  text: They didn't know.
- speaker: Respondent
  text: They didn't know. But we had -- I got to visit while I was in Tan Son and my company had a group of people at Peking,
    which is now Beijing, and a group at Sing Tao which is down south of Tan Son; and I got to visit -- because of administrative
    duties, I got to visit both places for several days. I had more than one trip to Sing Tao because we had quite a group
    down there; but, anyhow, I finally got to see China. Stayed there until the latter part of March 1947. So '45 to '47,
    about 17-and-a-half months.
- speaker: Interviewer
  text: Were you impressed with post-war China?
- speaker: Respondent
  text: I'm not impressed -- I'm not impressed either way. In other words, I doubt I'd be impressed now, except in the cities.
- speaker: Respondent
  text: And China was -- at that time and now of course -- the communism did them a lot of good as far as get them on their
    feet and everything, but they had to do it by force, which is not good.
- speaker: Respondent
  text: But I've seen people laying up in streets during the wintertime, no place, no home, no nothing. I've seen them haul
    off some of those people in carts the next day, maybe not every day but a few days I've seen some of them; and it's --
    and they -- they were very poor people but -- very nice people but poor, had nothing but -- and they had -- and they had
    -- sometimes they had some bad characters; that is, people who'd steal a lot of stuff and so forth. But then that was
    because they was in need. We got to visit downtown most every day if we wanted to. And at that time I guess Tan Son was
    probably close to a million people and so -- and there was some strange things. They had the French quarter
