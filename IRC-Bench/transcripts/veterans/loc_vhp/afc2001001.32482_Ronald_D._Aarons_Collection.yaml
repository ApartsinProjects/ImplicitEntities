turns:
- speaker: Interviewer
  text: How old were you when you went to war?
- speaker: Respondent
  text: When I joined the Air Force, I was 19 and a half years old.
- speaker: Interviewer
  text: Which branch of the service did you join in?
- speaker: Respondent
  text: I went into the Air Force March 29th, 1961. And I was there in the Air Force for a total of 22 and a half years and
    retired as a major on September 30th or October 1st of 1983.
- speaker: Interviewer
  text: When you went into the service into the Air Force, were you scared at all or were you so young being 19 and a half
    that you glamorized it?
- speaker: Respondent
  text: Well, I went in for several reasons. Number 1, my dad had served in World War II, and he was in for three or four
    years in the Army, was over in Okinawa, primarily, if I remember correctly. And, unfortunately, in 1959, when I was just
    graduated from high school, a week before, he died in an automobile accident here in town. And so after about a year,
    year and a half, of helping my mother and the rest of the family -- there were five children. I'm the oldest -- get things
    under control, I decided I wanted to go into the military for several reasons. Number 1, I felt it was an obligation that
    I was willing to accept serving the country. And, Number 2, for a more selfish reason if you want to call it, I was looking
    to build my GI Bill benefits so that when I got out of the service, I would be able to go to school full time and get
    my education. We didn't have a lot of money, and there wasn't a lot of money available through either insurance or the
    accident settlement. He died as a result of a traffic accident in Pottsgrove here in Norwalk. And so that's what I did.
    And I went in the service, enlisted, and went through basic - excuse me -- basic training and training in Ohio -- in Illinois
    at the Chanute Air Force Base to work on compass systems and automatic pilots on airplanes. And then my first duty assignment
    was up at Pease Air Force base which is outside of Portsmouth, New Hampshire, and was stationed up there starting in,
    I think, late October of 1961. And while I was there, I started to attend classes on the base from the University of New
    Hampshire as well as some in-house Air Force courses that they offered on their own, and then was selected to go to school
    full time. And they gave me the opportunity to go to school at their expense. I would be a full-time student, and that's
    what I did at Syracuse University. I was there for 24 months but did three-years' college work, 91 credit hours of college
    work. And so in 1966 -- from 1964 -- that's when I went to school -- to 1966, I was a full-time student and then got my
    commission September 13th of 1966 down in Texas again and became an officer, second lieutenant. When I was at school,
    they gave you some choices as far as curriculum goes, but I was going into the accounting area. And so I got my bachelor's
    degree in accounting. And then after graduation and commissioning, when I was stationed up in Maine then, Bangor, Maine,
    I got my MBA degree from the University of Maine. And so every one of those things brought on an additional commitment
    when I went to school for 24 months, I owed them four years. When I got my commission, I owed them a little more time.
    After I was up in Maine and they let me go to school for nine months to get my master's degree, I owed them 18 more months
    afterwards. And by the time I was done with all of my commitments. I had close to 13 years, 13 and a half years, in the
    service. And I said, you know, there's no way I was going to get out because I enjoyed the work I was doing as an auditor.
    And I only had six and a half years, seven years, to go until I would be eligible for retirement, and so that was the
    plans. When I was in the service, I was managing audits both on the base level, things of supply, transportation, accounting
    and finance, all those different areas. And then when I was overseas in the Far East during the Vietnam War, we were stationed
    in the Philippines. But then we did all of our work either there or in Thailand, did all the number of bases that we had.
    And we had other people in-country, as it's called, and Vietnam Proper, and so that's how the work was kind of divided
    up. And while I was over there, I was selected to become a regular officer, which meant that I was guaranteed retirement
    tenure, and so that - that ensured that I was planning to stay in the service. When I came back to the United States,
    I was stationed at Wright-Patterson Air Force Base in Ohio. And at that point in time, I started to get involved with
    the large acquisition audits of weapon systems. In Ohio, it was aircraft systems like the F-15 and the F-16 aircraft.
    And then up in Massachusetts, it was the acquisition of communications and radar systems. And then when we were there
    -- and I say we, my wife and I. We had our daughter. And in 1975, I was selected to go overseas again. And this time,
    because the last tour in the Far East was what we call unaccompanied, by myself. Then the tour to Alaska, where we volunteered
    to go and were happy to go, was with the entire family. And we spent three years up in Fairbanks -- outside of Fairbanks
    at Eielson Air Force Base, Alaska, where I was what's called the residence auditor. And that gave me audit responsibility
    for the upper half of the state, up to the Arctic Ocean, and all the way out to the end of the Aleutians where we did,
    and maybe still have it, a large base there that was listening to things that were being done by the Russian and the Chinese
    - excuse me. At that time it was somewhat classified, but similar to the work that was done by the Navy plane that was
    shot down by the Chinese that was listening to their telemetry and so forth. And when we came back from Alaska in '78,
    it was back to Wright-Patterson again where I went back into the acquisition auditing. And I stayed with that from '78
    until I retired in '83, and like I say, the end of September, first of October. When you look back on it, it was a very
    fast 22 and a half years, but that was my service time.
- speaker: Interviewer
  text: What was it like to be Jewish while you were in the service? Was it different than people who are Christian or Muslim
    or anything else?
- speaker: Respondent
  text: Well, when I went in, in basic training, I remember the training instructors, the TI's, who are very gruff and rough,
    and that's part of what they're supposed to do to kind of give -- instill the fear of God in them -- in you. They were
    very cautious of the people who were non-Christian by the Catholic or Protestant because they knew that we had services
    on Friday night or Saturday morning. And I remember the TI would come into the barracks -- and maybe it's their upbringing.
    And a lot of these guys were from the deep south, it seemed like, because they sure as hell talked funny as far as I was
    concerned. I remember them coming in, and the one guy yelled out, Where are my Jew boys? And, you know, it wasn't exactly
    something I -- and the two or three of us in the barracks, Yes, sir. He says, You have services tonight. So-and-so told
    us where we're supposed to go. We said, Yes, sir, can we go? Well, you have to go. One of the responsibilities that I
    have is to make sure you have the opportunity to go to services each week whether it's Jewish or any of the other faith.
    And they were very good about it. I didn't have any problem when I was -- when I became -- after I became an officer,
    I became involved as a Jewish lay leader, especially up in Alaska where we had a small group of people on the base. There
    was us at the Air Force base, and in Fairbanks itself there was Wainwright Army Base. And between those two locations,
    there were probably 30 or 40 Jewish military personnel. And the Jewish Welfare Board in New York was very good about trying
    to supply us as best they could with things for the major holidays, and they were very good in terms of working with us
    and the bases. Absolutely no problem in terms of giving us the support that they could to the extent that even though
    we might have only been 30 people, say, between military and family members, we had a Jewish Chaplains fund. And we may
    not have had a Jewish chaplain, might have been just with a lay leader, but they tried to support us as best we could.
    And when we needed supplies for Passover or things particular for Hanukkah, we sometimes could get those shipped up on
    the airplanes, military airplanes, as part of official airlift because of the morale aspect to it. So it was very good.
    Did I run into any prejudice? No. I don't think there was anything there that I saw that I would consider discriminatory
    towards -- towards being a Jewish member of the military.
- speaker: Interviewer
  text: While you're serving your time, did you ever worry that you might not come back home one day?
- speaker: Respondent
  text: Well, I think we all worry about that. But, frankly, no, I really didn't because I was in what's called the Air Force
    Audit Agency, and I was not a frontline person. So even though I was over in the Far East, we were the support element,
    among a lot of others, that supported the fighter pilots and the people who were active at the military bases. My responsibility,
    my job, as far as auditing in a wartime environment was to make sure that they were properly recording things like the
    consumption of assets because when they put that into that supply system, then that would generate the need for renewal
    and spare parts. And that's how we served. But as far as being out there on the frontline, no. If you talk to somebody
    who was actively stationed at the base in Vietnam, and our people in Vietnam were stationed at the headquarters which
    I believe was Tan Son Nhut Air Force Base, and then they again went out to the various bases around the country to do
    the work that needed to be done, they can tell you something different. Only once in the time I was over in the Far East
    did I have to wear a flat jacket, a helmet, and a sidearm, a gun, and that's when we were going out to audit at a little
    communication site that was located literally across the Mekong River from Laos. And they did get attacked by either sappers
    who would come in and try and destroy part of the base or rocket fire, and so that was a concern. And so in order to travel
    in that area, they insisted that everybody at least have the helmets and flat jackets and a sidearm if we needed it to
    use.
- speaker: Interviewer
  text: Did you have any time to yourself while you served? And if you did, how did you pass it?
- speaker: Respondent
  text: Well, one thing I enjoyed when I was in the service was taking pictures, photography, a lot of slides, and travel.
    So when I was overseas -- now other than -- other than the 13 months that I spent over in the Far East in '69, '70 and
    the three years that I spent with my family up in Alaska from '75 to '78, all the rest of my 22-and-a-half-year service
    was in the United States. And so even though that's fine, I - I enjoyed those aspects of it. You know, the two highlights
    of my career would be the overseas tours because it got me into places where I don't think I'd be going as easily. But
    I enjoyed photography. And what I would do when we would go over to Vie- -- to Thailand to audit, is the first opportunity
    I had that day or the second day we were there, I would go over to the service club on the base because they usually ran
    guided tours out to different local sites of interest and different things that were there that people wanted to see,
    and I was always curious as to what -- what there was to do and to visit and would go off on these trips. And they were
    safe because there'd be, you know, ten, 15, 20 of us on a bus or something that would go off on these half-day or all-day
    tours on usually a Saturday afternoon or a Sunday. When we were there, we worked the five-and-a-half-day week Monday morning
    to Saturday afternoon. And then Saturday afternoon to Sunday night, Monday morning, it was our own time, so if we could
    work something into that schedule, that was fine. It was up to us. When I was up Alaska, you know, we had the same opportunity
    to do a lot of traveling. Wherever I went to the different sites, whether along the Arctic Ocean or out at the end of
    the Aleutians, I always carried my camera with me. And even here in the states up in Maine, in New Hampshire, in Ohio,
    those different places where I was stationed, I always enjoyed seeing what was unique to that area in terms of photography
    and the people and the food and the different things that were of interest. I got to attend services in different local
    synagogues, and that was fun and interesting. And we were always welcome. If there was a militarily installation nearby,
    the local communities were very happy to have you come and join them with services, so I always felt welcomed.
- speaker: Interviewer
  text: Tell me about your -- did you have any best friends during the service? Or if so, just friends? And how you got along
    with them? Have any of them unfortunately passed away so far? What happened?
- speaker: Respondent
  text: Well, I had friends from a couple of different times in my military career. When I was young and enlisted, there were
    three of us that all ended up going to the school out in Illinois that ended up being stationed up in Portsmouth, New
    Hampshire. And I was from Norwalk, Connecticut. Another fellow was from the middle of Connecticut, I think the water barrier
    or somewhere in that area. And the third fellow happened to be from right around there, and he was -- he was interesting
    and interested in showing us around to the different areas. And his family owned a restaurant, and so when he was off,
    he would always go down there to help them because it was like ten miles from the base. And occasionally some of us would
    go down and help, and we would eat there. We wouldn't always want to eat for free because that was taking advantage. But
    a few times I know some of the people if they were short of help, they became instant waiters or bus boys or dish washers
    or something like that. And they had a nice business. And I stayed with friends, especially the fellow who owned the restaurant
    for years and years. And one of his sisters who was married and lived in the area even after I had left there and gotten
    my education at Syracuse a number of years, I came back and looked her up because she was the only one I could find of
    that family. And, you know, we had a nice meeting. And I had a chance to see her and her kids and the family and talk
    about what else is going on. The other group of people that I got to know after I was commissioned and went to -- well,
    three of us at school at Syracuse lived together in an apartment. And one of them went his way, but another fellow and
    I remained fairly close. And after I got married -- and he was the best man in our wedding, and we got married in Massachusetts.
    And he got married some time in his career. And when we crossed paths again down in D.C. years later, he -- he had me
