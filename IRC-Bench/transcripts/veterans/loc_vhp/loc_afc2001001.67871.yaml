turns:
- speaker: Interviewer
  text: What branch of service were you in?
- speaker: Respondent
  text: United States Army.
- speaker: Interviewer
  text: And what was your rank?
- speaker: Interviewer
  text: And where did you serve?
- speaker: Respondent
  text: I served -- my combat duty was in Vietnam, An Khe.
- speaker: Interviewer
  text: Were you drafted or did you enlist?
- speaker: Interviewer
  text: Where were you living at the time?
- speaker: Respondent
  text: I was living in Sacramento, California.
- speaker: Interviewer
  text: When did you join?
- speaker: Respondent
  text: December 15, 1965.
- speaker: Interviewer
  text: Why did you pick the service branch you joined?
- speaker: Respondent
  text: It picked me.
- speaker: Interviewer
  text: Do you recall your first day in the service?
- speaker: Interviewer
  text: Tell me about your boot camp training experiences.
- speaker: Respondent
  text: Well, they trained us like officers. And midway through the point they said most majority was -- we're going to go
    to Vietnam. So the ones that did have orders, we trained from 5:00 in the morning or when we got up in the morning until
    9:00 o'clock at night. And most of that night was night classes or books and -- you know, things -- other lectures and
    things like that about the enemy and -- I think my experience was -- I think it was a guidon. He's the one that carries
    the flag. He got sick, and I had the opportunity to do it for him for about a week. That started to change my life in
    boot camp right there. And upon graduating, then I know I completed something more than I expected. You know, I was --
    you would say, you didn't know what -- you knew -- at that time we didn't know what we were going to get -- get into,
    but we were willing to go and die for our country.
- speaker: Interviewer
  text: Do you remember your instructors?
- speaker: Interviewer
  text: How did you get through it?
- speaker: Respondent
  text: Mostly by being -- obedience and -- me myself, listening and -- listen to my instructors.
- speaker: Interviewer
  text: Which war did you serve in?
- speaker: Respondent
  text: Vietnam War.
- speaker: Interviewer
  text: Where exactly did you go?
- speaker: Respondent
  text: I went to An Khe North Highlands Vietnam, 1st Cavalry Division, went in the outfit with Garry Owens.
- speaker: Interviewer
  text: Do you remember arriving and what it was like?
- speaker: Respondent
  text: Yes. We arrived, and we just about landed. I think they bombed the field. We had to stay and circled the field and
    then we -- when we did land, we kind of swerved and bumped and went this way and then he made a big old turn and stopped
    right at the end of the __. And we're going in there and I remember a gentleman yelling out the door, he says, "You'll
    be sorry." And then the sign says, "Welcome -- oh, Welcome -- the sign said, "I know I'm going to heaven because I spent
    my time in hell." And __.
- speaker: Interviewer
  text: What was your job assignment?
- speaker: Respondent
  text: My job? It was mostly delivering ammo, 105 Howitzers or whatever infantry, you know. There was other job -- mostly
    -- and then the part of it was going with the infantry, carry on __, you know. We all picked everybody to go or what --
    usually come pick five or six of us a day. And then we travel by helicopter to different places, mostly to Cambodia and
    -- where our troops were, and then also to no man's land. And sometimes I didn't even know where I was at.
- speaker: Interviewer
  text: Did you see combat?
- speaker: Respondent
  text: Yes. I took a hill. I defended the hill and I met Charlie two or three times out in the open, face to face. And I
    remember when I took the mountain, I remembered we had infiltrated and infantry red or whatever it is in the spotlight
    and -- you know, phones hooked -- you could hear them. And I remember they were coming, and I opened fire on them. And
    then I got a call back and he says, "Who's doing the shooting?" And I says, "I was" and I gave him my name. And he says,
    "Good shooting. You got all of them." And at the same -- he says, "And now --" He says, "Now, I want you to take a look
    and see what's out there." I looked out there, and I could see bodies. And he says -- and then he says, "Okay." He says,
    "I want you to get the grenades and throw grenades." And we threw the grenades, and when I was getting the grenades, I
    could look and I -- I know I seen three -- two pillars that were empty. They were full loaded, so that's how much ammo
    I used. The pill box -- the pill box, I don't know how many rounds are in there. And when I looked again -- he told me
    to go look again, and I looked, and every -- they all disappeared, vanished. He says, "We dropped them. We buried them."
    That was our way of burying them. And I came down, and when I got even with where -- where we got them at and the people
    from the village, they were cussing us out. And we went our way. And they're from the home village. And I was -- I think
    I was just there a week. And I became a big shot at the home base. And the other times -- there's more -- every day was
    something different. I wasn't a hero, but -- or he wanted to be a hero. It just happened accidentally sometimes, just
    happened. There's more -- there's a lot more, I -- I could go, but I have to -- I can't -- that one -- that one was --
    there's other ones that I like to tell about maybe later on. Any more questions?
- speaker: Interviewer
  text: Were there many casualties in your unit?
- speaker: Interviewer
  text: Were there many casualties in your unit?
- speaker: Respondent
  text: They stated that -- I seen a couple, maybe another 30 or 40. But they said that I was the only one that came home.
    So far. I don't know. I don't have the records. But they said that -- they said that -- what they call it, they got overrun
    or they got chopped up or butchered or whatever. But I -- I stated that they had to have what? 98.9 percent of their infantry
    gone, and that's probably 30 or 40 people that survived. So I have to take it -- they said -- I asked the helicopter pilots,
    ground crew that I met here in the United States, and they said no one did come back from the helicopters.
- speaker: Interviewer
  text: Tell me about a couple of your most memorable --
- speaker: Respondent
  text: I gotta state this. There was a hundred helicopters __+.
- speaker: Interviewer
  text: Tell me about the most memorable__.
- speaker: Interviewer
  text: Most memorable experience?
- speaker: Respondent
  text: The worse or the better? I could say my better.
- speaker: Interviewer
  text: Whichever one --
- speaker: Respondent
  text: It would have to be the last operation, is the big one. I don't -- to be a big shot would be getting all those people
    off -- my first week there. Was my -- tried to be __+. I can pat on my shoulder. How they know, I find out real quick,
    but you know, some of the various things -- how you say I would say, gift of life of some of the soldiers, I want to mention
    one -- a couple boys that were in my squad are -- it was their squad. They were -- they were -- fought -- there at the
    same time __+. And I was there. I spent about three or four months. They wouldn't -- they wouldn't hardly talk to me or
    nothing, you know. I -- you know, like that. And -- anyhow, we had -- we had to go out and -- we had to go out and --
    with the infantry and they told them that chances are they wouldn't make it back. We weren't going to make it back. And
    my name was on the list. And I was going to get ready to go, and those three guys, they -- they says, "Well, if you want
    --" they says -- they says, "We came together and we're going to die together." One of them had KP. I had KP. Maybe I
    don't seem like that or -- like that -- it wasn't my call or nothing. I did what I had to do. So me and him exchanged.
    I went to KP and they went -- I wasn't going to argue with him. He says you -- he says you -- he says you were a big shot
    two weeks ago -- last week it was. That's right. It was right after. It was about the second week. And he says, "You're
    --" and then -- he says -- Well I says, okay. You know, and it was the sergeant's call and I stayed back and did KP while
    they went out and they didn't come back. They were both -- all three of them were killed. And that was my second week
    there or third week, somewhere that -- in between. So I learned, as I deep down look into these faces, into their little
    blue eyes, I figured that they were only 17, 18, 19 years old now. I was 20. It was their outfit, and I ended up taking
    it over for them, a promotion. There's a couple more, but I -- I'm a little bit choked up, as I -- went along. It didn't
    get worse -- I mean, it didn't get better, it got worse. And I know, from this day on, we're in '66 to all the way to
    '73, we didn't -- they didn't move and the United States didn't move a inch, and the soldiers were doing the same jobs
    that I was doing back then. The jungle just kept on growing.
- speaker: Interviewer
  text: Were you a prisoner of war?
- speaker: Interviewer
  text: Tell me about your experiences in captivity and when freed.
- speaker: Respondent
  text: I'm sorry. You don't have to answer that one. Sorry. I read it before I really read it.
- speaker: Interviewer
  text: Were you awarded any medals or citations?
- speaker: Respondent
  text: I got the Vietnamese Campaign Medal, defense medal and then another Vietnamese medal, and then I got the honorable
    -- the honorable medal. And I got a sharpshooter, I think -- I believe, or one of them -- one of those rifle medals. And
    I got about four or five. But I feel like I came home naked because I didn't receive the Purple Heart or infantry badge.
    I mean, there's -- I -- some of those guys, as I started out, I -- I started -- just do your job and get out, you know.
    But as you get involved in it, it carries on for the rest of your life. It scars you and scares you, you know, what other
    countries are -- how they do. That's why -- that's why we have congress. They decide. We just do our jobs. Where we come
    from, how we do it, it's just -- it's -- good parents.
- speaker: Interviewer
  text: How did you get your medals or citations?
- speaker: Respondent
  text: I received them by mail after -- after -- about ten years ago, I just got them about ten, twelve years ago. I sent
    in for them.
- speaker: Interviewer
  text: How did you stay in touch with your family?
- speaker: Interviewer
  text: What was the food like?
- speaker: Respondent
  text: The sergeant, the CO said that I had to have -- in order to get through this war, I had to have a stomach like cast
    iron. So he said -- he marched me down to have a cup of coffee, and he said -- and he __+ -- be like hard nails in your
    stomach, you need to __+ your nails. Make sure you get some food in your stomach and -- cast-iron -- and so it won't bother
    you. You have to have a cast-iron stomach to endure what you're going to go through. So -- and I think there was one guy
    -- I was leaving and he's an officer, and I think he bought everybody a steak. He ordered from the United States. And
    other times there was eggs there, there were fresh eggs that we ate. But we had to eat them quick because we couldn't
    store them. Powder -- powder eggs, powder milk, whatever -- I was always -- I was underweight. I think I came home I was
    hundred and -- 119 pounds.
- speaker: Interviewer
  text: Did you have plenty of supplies?
- speaker: Interviewer
  text: Did you feel pressure or stress?
- speaker: Respondent
  text: Oh yes. Yes.
- speaker: Interviewer
  text: Was there something special you did for good luck?
- speaker: Respondent
  text: Say my prayers.
- speaker: Interviewer
  text: How did people entertain themselves?
- speaker: Respondent
  text: Like I said, we had music or something like that. They had a -- USO was there. One time they blew up our EM club,
    and so out -- out in -- built a little place so we could have. And we put on a show ourselves. I sang. I did a couple
    of skits and then we sang some more and we got the audience to sing. We sing -- we're -- My Country 'Tis of Thee and Going
    to the Chapel and -- they were there and -- we -- it was just -- I did -- like we did that Who's on first? What's on second?
    I don't know on third. We did that. And we dressed up as girls one time -- well, almost like girls anyhow. We just roll
    up our sleeves and got some mops and put them over our -- all over our legs and then we sang the song and -- and we sang
    the infantry -- 1st Cavalry Division song, She Wore a Yellow Ribbon, and things like that.
- speaker: Interviewer
  text: Were there entertainers?
- speaker: Respondent
  text: Yes. They did have entertainers come by there once in a while. But they stopped us from having entertainment because
    some of the guys, they got kind of rowdy or they -- they wouldn't sit still, you know. And we had so much room and --
    it was very small, you know, like a room like, you know, almost. So it's kind of hard to get a entertainer to skate around
    or whatever, but we did have a couple come in there. Maybe some of the bigger -- bigger places they did, but mostly we
    listened to the radio, jukebox.
- speaker: Interviewer
  text: What did you do when you __? What did you do when __?
- speaker: Respondent
  text: When I went on leave? Stayed home and celebrate, yes. Try and catch my -- I tried to tell myself I -- that I'm the
    same person that I was when I left.
- speaker: Interviewer
  text: Where did you travel while in the service?
- speaker: Respondent
  text: Where did I travel? I went to Fort Benning, Georgia Boot. We went to Oklahoma, Fort Sill, Oklahoma, Artillery, and
    I went to Vietnam. And then from Vietnam, when I got hit or mortared, rocket, whatever, I -- they said I went to China
    Beach. It's Cam Ranh Bay or whatever it is out there or -- Da Nang, yeah. And from there I got lost and they -- I -- I
    believe I went to Hawaii where they -- or some where they might have did my face. And then I ended up in the Philippines.
    And that's where they found me. Red Cross came -- a guy came up to me and told me who I was. What -- they had me down
    there -- they had me listed as a six foot one officer, an Anglo-Saxon and -- the reason why they recognized who I was
    because of my right-hand finger is missing, the middle one, and that's how they knew I was Peter Acosta. And it was 45
    days later. I -- I saw myself in Da Nang China Beach. That's where I came to. When I come to, they were -- they were taking
    shrapnel out of my face and I my eyes. I remember them digging into my eyeballs, and that freaks me a little bit. And
    I remember the lady telling me, she says, "This soldier's a live." And when they were picking on my face, she says, "Go
    get the doctor." And the next thing I knew, I -- I got up. I seen the -- I p
