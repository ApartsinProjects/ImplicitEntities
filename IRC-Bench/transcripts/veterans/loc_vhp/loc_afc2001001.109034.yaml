collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: I was born in Rochester, NY, and I had three children. I was 32 years of age when we departed into the Army for my
    residency. I did my internship and residency in Rochester, NY in internal medicine. And I was granted the privilege of
    getting into the Berry Plan, which gave me a full deferment until I finished my training. And therefore I went into the
    Army fully trained as an internist, internal medicine--therefore avoiding field work in the field as some of my friends
    that I went to medical school with and interned with ended up in the field, firebases and stuff like that. So I had the
    privilege at least to be able not to have to do that; a more sophisticated medicine, if you will.
- speaker: Interviewer
  text: In Phu Bai at the 85th Evac. That's the only place.
- speaker: Interviewer
  text: Well, I arrived there in August of 1970 and departed a year later.
- speaker: Interviewer
  text: I went to San Antonio I think the first part of July. And we did basic training for six weeks there and then shipped
    out from there after that.
- speaker: Interviewer
  text: I was a captain initially, and then shortly after getting to Vietnam I was major.
- speaker: Interviewer
  text: Well, that's excellent that your experience and your credentials afforded you that rank. And the military was blessed
    to have your skills. What were some of the sights, sounds, and smells--your first impressions upon arriving in Vietnam?
- speaker: Respondent
  text: I wasn't sure I was in the right place. We went into Tan Son Nhut [Air Base], and the smell and the odors of that
    area were very pungent at that time. And again it was mid-August--so it was pretty hot. And finally after messing around
    a little bit there, waiting for transportation, we then flew to Da Nang, and from Da Nang to Phu Bai.
- speaker: Interviewer
  text: Can you describe daily life at the 85th? What were your daily routines?
- speaker: Respondent
  text: I was-- there were three other-- two other medical physicians, and we were in charge of the medical wards in the medical
    clinic. That basically was treating the GIs for the usual infections and pneumonias and that type of thing, without any
    surgical intervention obviously. But we took care of three different wards, and then had a clinic that we would see GIs.
    And we supported other units around, such as the 101st [Airborne], and some other areas too, that had other problems they
    couldn't solve. So they didn't have any issues, they'd send them to us to sort out the problems.
- speaker: Interviewer
  text: How many-- You mentioned three wards and a clinic. Was there an average census of patients?
- speaker: Respondent
  text: Probably about 25 patients per ward.
- speaker: Interviewer
  text: So you guys were busy if it was just the three of you.
- speaker: Respondent
  text: The three of us. We were busy, but we also then-- if our surgical colleagues needed some expertise in some of the
    medical portions of their patient care, then we would chip in on that as well, and see patients with them in their intensive
    care unit and stuff like that, too.
- speaker: Interviewer
  text: What kind of diseases did you see there?
- speaker: Respondent
  text: Well, we saw a fair amount of malaria, hepatitis; unfortunately a lot of venereal disease, and also a lot of issues
    regarding alcohol and drug use. Two of my associates-- one of my associates, Mike Grossman, and another person started
    a drug rehabilitation type of situation, where they would see these young guys who were having a lot of drug problems
    and issues regarding that. And they would have control of that. I think they treated over a thousand guys in the time
    we were there.
- speaker: Interviewer
  text: That's kind of a cutting edge thing that they did, that you all did.
- speaker: Respondent
  text: Yes, that was something new because unfortunately I think the Army negated that there was a problem with drugs. And
    we would see--on payday--many overdoses. That was the other thing that we got pulled in on for medical things is to treat
    overdoses and that type of stuff.
- speaker: Interviewer
  text: Was there a drug of choice? Or was there something that you'd see?
- speaker: Respondent
  text: No. It was crack and cocaine and everything else. But that was the type of thing we were dealing with.
- speaker: Interviewer
  text: Kind of the exotic drugs used in the late '60s, early '70s?
- speaker: Respondent
  text: Yeah, but not many. It was straightforward stuff; mostly crack and coke.
- speaker: Interviewer
  text: What was it like working with the Vietnamese people? Did you see any civilians, or did you just treat?
- speaker: Respondent
  text: We did not see many of the civilians. We went a couple times up to the hospital up in Hue, and just to visit the clinics
    up there. And some of the guys went up-- the surgeons more than we did, but some of the medical people went up just to
    give some expertise and saw some of the patients up there. A couple of the patients we saw up there had TB and some other
    things like that as well. But not much--we didn't do much of that.
- speaker: Interviewer
  text: Did you do MEDCAP [medical civic action program] missions...
- speaker: Interviewer
  text: which is the?
- speaker: Interviewer
  text: Can you explain a little about MEDCAP?
- speaker: Respondent
  text: Well, I-- I'm not sure what the MEDCAP is, what you're talking about. I think you're talking about going into the
    villages to administer care to them. Some of the other corpsmen, and other medical people did that. We didn't get an opportunity
    to do that too much. I think some of the people from the firebases did a lot of that material too, as well-- some of the
    battalion surgeons and that type of thing. But we didn't interface too much with the Vietnamese people. There were sometimes
    Vietnamese who would come into the clinic, but not very often. It wasn't like an open clinic, if you will. It was just
    closed basically to the base--to our Eagle Base personnel type of thing, more so than anything else.
- speaker: Interviewer
  text: Describe your friendships with your fellow 85th Evacuation personnel.
- speaker: Respondent
  text: Well obviously we were a pretty well knit group. Initially it started out a little slow, but as the ball got rolling
    it got-- we got pretty friendly. We had an officer's club, and we basically-- everybody would gather there all the time
    when we had different types of social functions. We had a baseball team; we had a football team; we had those types of
    things that would defer some of the stress and stuff of the everyday things.
- speaker: Interviewer
  text: That's excellent. While you were there from 1970 to 1971, what were some of the operations that you all supported
    as far as the soldiers coming in from the field? Were there some?
- speaker: Respondent
  text: Well, basically-- usually when I heard-- and I was so busy that I heard MASCAL [Mass Casualty], or some other-- if
    I heard a chopper, I would go over to the emergency room.
- speaker: Interviewer
  text: And MASCAL means?
- speaker: Respondent
  text: Well, more than--
- speaker: Interviewer
  text: Mass Casualties?
- speaker: Respondent
  text: Mass casualties, I'm sorry.
- speaker: Respondent
  text: And when they brought them in they needed people to triage, and to start IVs, to help clean up. And several times
    I remember, when we first got in country, I was doing-- somebody got burned by JP4 fuel, and I helped breathing them,
    even though that wasn't my field I was helping the other docs do all that stuff as well. So we would pitch in and help
    everybody. Everybody was pretty supportive of everybody else. When someone needed help they would say something, or sometimes
    not even say anything, but people would just show up.
- speaker: Interviewer
  text: Oh, that's wonderful.
- speaker: Respondent
  text: Yeah, yeah, yeah. But unfortunately some of the mass casualty things-- one night I think it occurred that we had a
    Christmas party going, we had a friendly-fire mass casualty. I think there were twenty-five people they brought in. And
    obviously everybody scrambled out, took care, and everybody was working all night on that. But those are the kinds of
    things that you just-- you could hear the chopper coming in and you knew there was a problem.
- speaker: Interviewer
  text: You brought up the chopper. We were talking as far as some of the medical advances that came out of the Vietnam War,
    that dustoff was one of those things that made such a difference.
- speaker: Interviewer
  text: So when you would hear the chopper, then you all would know just
- speaker: Respondent
  text: There was something coming
- speaker: Interviewer
  text: There was nothing ever coming in by chopper that was just for a visit! But you knew there was something; and unfortunately
    sometimes there were body bags and stuff too coming in that way--but not too often, fortunately.
- speaker: Interviewer
  text: Would you say that there was a high survivor-- because of the helicopter? The golden hour of trauma?
- speaker: Respondent
  text: Oh absolutely. They would pick up people in the firebases 20 or 30 minutes out, and there was no way they would have
    been able to get them by ground anywhere near where we were that quickly. They had battalion aid stations, but they couldn't
    do anything like we could do. They didn't have the facilities or the manpower to take care of them that quickly. Absolutely.
    No question about that. And it even improved even more and more and more, each encounter they've gotten faster and faster.
- speaker: Interviewer
  text: It's remarkable. How would you describe your emotions during these kinds of events? Was there like an ebb and flow?
- speaker: Respondent
  text: Yeah, absolutely. Some days you were ok and then other days you were just, "What are we doing? What are we doing?
    Why are we here? Why are we doing this?"-type of thing. And it's just a natural thing to feel that way and to let that
    run through your head. We had plenty of diversions around it, so we made up for that.
- speaker: Interviewer
  text: Did you get to take R&R?
- speaker: Respondent
  text: Yeah, I did. I went to Hawaii. We also had medevacs we took to Japan periodically. There were pretty injured people
    that needed accompaniment to Okinawa and Japan. So I went on a couple of those, and escaped for a couple of days.
- speaker: Interviewer
  text: So if the patients couldn't be returned to duty-- in other words, back to their line unit--then they would go back
    to the 6th Convalescent hospital? Or would they then go on?
- speaker: Interviewer
  text: Sometimes they would go beyond that. They would go back to the States, depending on how serious the injury was, etc.
    But that was sort of a staging area if you will to go back. They didn't go directly from Vietnam.
- speaker: Respondent
  text: 'So it was kind of from the theater: Vietnam to Japan or the Philippines?'
- speaker: Interviewer
  text: Usually Japan. Japan, Okinawa type thing--and then over.
- speaker: Respondent
  text: Was Tripler used? Tripler Army Medical Center in Hawaii, was that just straight back to the States?
- speaker: Interviewer
  text: No. They may have gone that way, but I think they flew them directly back. I don't think they went jumping around
    like that.
- speaker: Respondent
  text: And did you go on any of those?
- speaker: Interviewer
  text: No, I just went to Japan.
- speaker: Respondent
  text: What were the aircraft that you guys would?
- speaker: Interviewer
  text: 140s, 141s-- C141s.
- speaker: Respondent
  text: And that was-- were they outfitted for medical, or was it?
- speaker: Interviewer
  text: Yeah, they were sort of improvised. They really weren't-- I've seen pictures of the new ones, how they're outlined
    for the recent things. No, nothing like that. They were pretty much improvised and rigged up, so that you would have an
    IV thing, and an oxygen arrangement and tanks and stuff, but nothing elaborate like the present system is now.
- speaker: Respondent
  text: So the planes were like transport planes that were then reconfigured to be
- speaker: Interviewer
  text: for med/ambulance type of thing ... Right, so kind of like an ambulance that was an airplane
- speaker: Respondent
  text: Right. Exactly.
- speaker: Interviewer
  text: to get the patients either to Japan or back to the United States? And now that--as you've elaborated--has been advanced
    with each other-- you know, subsequent conflict--that technology's been advanced. They're like floating ICUs (intensive
    care units) now.
- speaker: Respondent
  text: Absolutely. I've seen pictures of even the operating rooms in both Iraq and Afghanistan, and you wouldn't know them
    from a modern day hospital basically, and stateside. You would not know where it was. If you looked at our-- what we were
    dealing with, you're talking about two centuries earlier. And that's how quickly it advanced.
- speaker: Interviewer
  text: We had quite a large medical footprint in Vietnam with the war going over an 11 year period. I believe there was over
    24 Army medical facilities, ranging from the surgical units to the evacuation-size hospitals to the convalescent hospital.
    How did having that quality of care so close to the battlefield-- how was that?
- speaker: Respondent
  text: It has to impact them very positively. There's just no question that again, like I said before, when you had the battalion
    stations if you will trying to treat somebody that was pretty badly injured, they could not handle that very quickly at
    all or professionally. And by getting them back by chopper much quicker to us, it was much more efficacious to do that
    than it was the other way. No question about it.
- speaker: Interviewer
  text: 'Some of the things that I''ve read: the survivability rate of a soldier--if he got to an Army or Department of Defense
    medical treatment facility in theater within an hour, it was over a 97.4% survivability rate, and it''s just remarkable.'
- speaker: Respondent
  text: Absolutely. Absolutely. The faster the better. That's what they're talking about basically. And I think some of the
    surgical people will tell you the same thing. I know that my roommate Gus Kappler really perfected a lot of techniques
    and types of procedures, because Gus was a vascular surgeon in real life (if you will) and some of the stuff he was doing
    in Vietnam had not been done before, and stuff like that. And just the amount of stuff that they were doing, and what
    fluids they used to resuscitate them, and what they needed to do to get them and that type of thing, that's-- no question
    in my mind that that's--that was advancing technology if you will and helping survival rates. There's no question about
    that.
- speaker: Interviewer
  text: Oh, that's excellent. Sir, would you share with us your best day during the tour, and then your worst day during your
    tour?
- speaker: Respondent
  text: It's hard to say, it's hard to say. Best day. One of my best days-- my mother used to spoil me. She'd send me over--
    I never went to the mess hall. Never once.
- speaker: Interviewer
  text: Really? No Army chow?
- speaker: Respondent
  text: No Army chow. She used to send me-- she sent me an electric fry pan, and she sent me over salami, pepperoni, and stuff
    to make pizzas. And we had our own cook. And we'd cook all the time. And Gus would come over--my roommate in the hooch--and
    we'd eat off of that, or we'd go to the officer's club. I never once went to the mess hall. Never once.
- speaker: Interviewer
  text: So you got to-- I bet your colleagues would be really friendly when your mom sent those care packages.
- speaker: Respondent
  text: Oh yeah. Absolutely. I used to get them every week.
