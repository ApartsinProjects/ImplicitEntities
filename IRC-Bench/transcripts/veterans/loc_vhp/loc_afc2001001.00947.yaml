collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: Mountain Falls.
- speaker: Interviewer
  text: In Frederick County?
- speaker: Respondent
  text: In Frederick County, yes.
- speaker: Interviewer
  text: Would you want to tell us the year or is that private?
- speaker: Respondent
  text: I was born October the 30th of 1917.
- speaker: Respondent
  text: Yes. And when did you move to Winchester?
- speaker: Interviewer
  text: Well, I came to town -- I had -- my oldest sister was living here, and when I was -- I had a private teacher. I had
    had a surgery on my leg and I couldn't walk to a country school. I never went to a country school. And I came -- I had
    a private teacher for four years. Then I came to Handley, I started out in the fourth grade at Handley.
- speaker: Interviewer
  text: Did you graduate from Handley?
- speaker: Interviewer
  text: Where were you when Pearl Harbor happened?
- speaker: Respondent
  text: I was -- I was in my house. It was about noon -- about two o'clock, I believe, and my girlfriend, one of my girl --
    that I graduated from high school with was there visiting me. Her husband was a Marine and she -- he was in Quantico,
    stationed in Quantico, and he was up -- she stayed with her parents and he was there for the day -- I mean for the weekend.
- speaker: Respondent
  text: And she was in my house when we heard it over radio. We didn't have TV, you know, we had a radio. And my goodness,
    everybody was just -- couldn't believe it, you know. And she left immediately because she knew her husband was going to
    have to go and he did too. And he was shipped out not too long after that to the West Coast.
- speaker: Interviewer
  text: Were you married at the time?
- speaker: Respondent
  text: Yes, I was married. I had a little boy, six months old.
- speaker: Interviewer
  text: Oh, six months.
- speaker: Respondent
  text: To that very day.
- speaker: Interviewer
  text: To that day. December the 7th.
- speaker: Respondent
  text: Uh-huh, uh-huh.
- speaker: Interviewer
  text: How about that. What was the mood like with neighbors and people around you?
- speaker: Respondent
  text: My goodness, everybody was just talking -- you had such a terrible feeling over you, like a dread or something, you
    know. My goodness, we were in war. We were in war. And it just was -- and Pearl Harbor was just terrible.
- speaker: Respondent
  text: I knew a boy that was in the ship Arizona that went down. From Frederick County.
- speaker: Interviewer
  text: Did you know at the time he was on board that ship?
- speaker: Respondent
  text: Shortly after, yes. Yes, I did. But it was just real bad. I mean it was -- the whole town -- you know, we just couldn't
    believe it.
- speaker: Interviewer
  text: Did the radio play the news all the time after that?
- speaker: Respondent
  text: Oh, yes, yes. Yes.
- speaker: Interviewer
  text: Continuous. And how about the Winchester Star, did they --
- speaker: Respondent
  text: Oh, my goodness, it was in the paper. Everything.
- speaker: Interviewer
  text: Did they have an extra edition? I think I remember something about an extra paper coming out.
- speaker: Respondent
  text: I'm sure we did at that time. We took the Star. You know, we took the Star.
- speaker: Respondent
  text: But I -- I probably have that Star too because I've always saved a lot of the papers for things like that.
- speaker: Interviewer
  text: Yeah, I remember as a kid we used to get the paper in the afternoon and we got the Monday paper in the morning so
    I think it was an extra edition.
- speaker: Respondent
  text: Yeah, it was. Yeah, it was. Just everybody, you know, just -- and then when they started drafting all the boys it
    was -- I had two members of my class were killed during the war.
- speaker: Interviewer
  text: Of your class?
- speaker: Respondent
  text: My class. Colin Haley, he was a twin. And he was a copilot in -- a copilot and his plane went down over Germany. And
    then Paul Freese was killed in the camp where he was trained, in boot camp. I think it was like Kansas or Iowa. I don't
    know -- you know, in those states.
- speaker: Respondent
  text: But yeah, due to an accident during boot camp, you know.
- speaker: Interviewer
  text: Didn't Handley have a corps of cadets at that time?
- speaker: Respondent
  text: Yes, they did.
- speaker: Interviewer
  text: Did you ever watch them?
- speaker: Respondent
  text: Well, yes, not much. I was married then, you know --
- speaker: Respondent
  text: -- and I had a family. But yes, they did.
- speaker: Interviewer
  text: Drilled up on the parade ground?
- speaker: Respondent
  text: Right, right. Yes, they did.
- speaker: Interviewer
  text: What was your husband's occupation, what was he --
- speaker: Respondent
  text: He worked at American Viscose.
- speaker: Interviewer
  text: In Front Royal?
- speaker: Respondent
  text: In Front Royal, and that was a war plant because they made parachutes, you know.
- speaker: Respondent
  text: Made the material for parachutes, yes. His mother was real ill. He wasn't called then and because he was in a war
    plant the little boy didn't keep him out. And she died -- she had cancer. When she died he got his greeting papers about
    a week afterward. (Laughter) And he went for his physical and this Navy man kept following him around and asking how he
    would like to be in the Navy. And he said, "Well, it looks like I'm going to be, doesn't it." (Laughter) But don't you
    know, the Japanese surrendered and he didn't have to go.
- speaker: Interviewer
  text: He didn't have to go.
- speaker: Interviewer
  text: That's great, yeah. What was life like in Winchester then. How did it change after the war started?
- speaker: Respondent
  text: My goodness. All the boys were being drafted and it was a terrible feeling. I mean, you know, you just -- and you
    just wait for the news to hear what was next and, you know, it was such a terrible feeling about -- you felt like -- well,
    you just didn't know who you would hear that was killed of the boys that were gone, you know.
- speaker: Interviewer
  text: Yeah. What kind of preparations did Winchester -- the city make for the war? Did they have air raids?
- speaker: Respondent
  text: Oh, they certainly did have air raids. Blackouts, yes, they did. My husband was an air raid warden and he worked shift
    work at American Viscose, and it seemed to me like every time we had a blackout it was my -- I had to take his place.
    So you had to go with a flashlight and you had to see that every house was dark. And I had about six to eight blocks to
    go and sometimes you had a little problem getting people to get their light out, have their lights out.
- speaker: Interviewer
  text: What did you have to do, knock on their door or something?
- speaker: Respondent
  text: Yes, you knocked on the door and told them it had to be out. I mean out. It had to be black. Now, I had a flashlight
    that I carried.
- speaker: Interviewer
  text: Did you have a red shield over the flashlight or just --
- speaker: Respondent
  text: No, I didn't. No, I didn't. I could have the flashlight, but they couldn't have the flashlight, not in the house,
    you know. So I have to tell you this. One night when I went out -- I worked. I worked for Roy Cather's cold storage out
    on Valley Avenue?
- speaker: Respondent
  text: I don't know whether you remember it was there?
- speaker: Respondent
  text: I worked for Mr. Cather. Well, I had to work that day and I came home and I didn't look at the paper, the Evening
    Star. My mother-in-law did, she read it. And she meant to tell me something that was in the paper and she forgot about
    it, but then we heard the sirens after it got dark, you know, and I had to go with my flashlight and she watched my little
    boy. And I went out the steps and down on the walk and all of a sudden it was just red, the sky was just red. It just
    looked like it was on fire. And it frightened me, I thought it was the end of time it frightened me so. I ran back in
    the house and I said, "Hope, come out here and look at the sky, I'm scared to death," and she said, "Oh, I forgot to tell
    you." She said, "The Northern Lights are tonight." She said it was in the paper and said they would be unusually bright.
    And it was just this red was right down over you. I will never forget that.
- speaker: Interviewer
  text: And that just happened that night --
- speaker: Respondent
  text: That night. That night. I had no idea of such a thing. I had no -- when the sirens went off you went. I mean I had
    to go right then, you know. And I had to walk -- I was on Bond Street, those apartments, and I had to go on -- well, it
    was Main Street then.
- speaker: Respondent
  text: It's Loudoun now, and I had to go clear up to Gaunt's drugstore and all around Sanitary Dairy and I had about eight
    blocks, six to eight blocks.
- speaker: Interviewer
  text: How did they get the streetlights off?
- speaker: Respondent
  text: Well, they cut them off.
- speaker: Interviewer
  text: Did they? All over the --
- speaker: Respondent
  text: Yeah, yes indeed, they went off. All the streetlights went off. It went dark. It was dark.
- speaker: Interviewer
  text: Yeah. How about traffic, automobile traffic. Did they have to stop?
- speaker: Respondent
  text: Well, they were supposed to, yes. Nobody was supposed to be out either, you know.
- speaker: Respondent
  text: Not out. Not out on the streets, you know.
- speaker: Respondent
  text: I had a little problem sometimes on that.
- speaker: Interviewer
  text: Yeah. And how often did this happen?
- speaker: Respondent
  text: Oh, once a month. At least about every six weeks, I think.
- speaker: Respondent
  text: And you never knew. So you didn't know. When you heard the sirens, that was when the lights -- right, right. But I
    did have trouble -- well, I never had to call anybody else to help me, but people didn't want to turn their lights out,
    you know. Especially if they had little children. I could understand that, you know. That was frightening to them, you
    know. But it was something. I was so glad when it was over.
- speaker: Interviewer
  text: Was there anything else like that that the city did?
- speaker: Respondent
  text: Well, we had a USO, you know.
- speaker: Interviewer
  text: Tell me about that.
- speaker: Respondent
  text: Well, of course I couldn't go, I was married, but a lot of my friends did. Went to entertain the soldiers when they
    came back, you know. Be on leave and would come -- a lot of the kids that I knew.
- speaker: Interviewer
  text: Where was it?
- speaker: Respondent
  text: Down on Main Street.
- speaker: Interviewer
  text: A building that they had?
- speaker: Interviewer
  text: And what did they have, dance bands?
- speaker: Respondent
  text: Uh-huh, uh-huh.
- speaker: Interviewer
  text: Oh, that's really nice.
- speaker: Respondent
  text: And served food. We served, you know, cakes and -- well, sandwiches and something to drink.
- speaker: Interviewer
  text: And any serviceman that would want to --
- speaker: Respondent
  text: It was free for everybody to come in.
- speaker: Interviewer
  text: Did they have anything like troop trains? Did they ever take a large group of men from the city by train or anything
    like that?
- speaker: Respondent
  text: I don't think so. I don't remember that if they did, no. But it was so -- we just hated to -- well, you just wondered
    what boy next would be missing, you know, and...
- speaker: Interviewer
  text: When did they start restricting the sale of sugar and foods, the rationing and stuff like that?
- speaker: Respondent
  text: Not very long afterwards. After -- that was after Pearl Harbor now, understand, not before that.
- speaker: Interviewer
  text: Yeah. What was rationed?
- speaker: Respondent
  text: Well, sugar. The main thing was sugar -- and coffee.
- speaker: Interviewer
  text: Coffee too?
- speaker: Respondent
  text: Coffee, yes indeed. And shoes, two pair of leather shoes a year. Tires for automobiles because the automobile companies
    stopped making cars.
- speaker: Respondent
  text: Stopped. And then the tires were rationed. Gasoline was rationed. Now, my husband rode in a carpool. They did -- you
    know, they were five men that rode and it helped. Everybody helped on the gasoline, you know.
- speaker: Interviewer
  text: Did you get so many gallons of gas depending upon how much you drove, do you remember?
- speaker: Respondent
  text: Yes, yes. Yes, it was that way.
- speaker: Interviewer
  text: And were things hard to find? Were they hard to come by?
- speaker: Interviewer
  text: In addition to being rationed?
- speaker: Respondent
  text: Yeah. Everybody just -- you know, as soon as the sugar -- as soon as things were out, you would rush to get it, you
    know, real quickly. The sugar thing was -- because that was for people canning. You couldn't can very many -- not with
    fruit. A lot of people, a lot of churches, made apple butter. Well, it takes a lot of apple -- sugar for apple butter,
    you know. So my father and my mother, he made cider. We sold vinegar. And he made cider and then she took the sweet cider
    and boiled it down to make like a syrup to start her apple butter with in the kettle.
- speaker: Interviewer
  text: Yeah, that's right.
- speaker: Interviewer
  text: I didn't think about that.
- speaker: Respondent
  text: And -- but everybody just waited when the sugar came. It was so funny. I know after the war was over my father bought
    a hundred pound bag. (Laughter)
- speaker: Interviewer
  text: Just because he knew that he could, huh? (Laughter)
- speaker: Respondent
  text: Never going without sugar again. I know that coffee -- my mother had to use Sanka coffee. So everybody drank Sanka
    coffee. (Laughter)
- speaker: Interviewer
  text: What about victory gardens. Did they push that much here? Victory gardens? Little plots of land?
- speaker: Respondent
  text: Well, I reckon so. Everybody had a little plot of land. (Laughter) I know we did, you know, yeah. But then I got things
    from home, from the farm, you know. We all did. My sisters and things like that. But another thing, my father needed a
    lot of help to pick apples. We had orchards and had corn, it was a big farm, and he needed help. Well, you know, all the
    boys in the county were drafted, 18 years. So we had a prisoner of war camp here.
- speaker: Interviewer
  text: In the city.
- speaker: Respondent
  text: In the city, yes. And they were -- the farmers were allowed to get some of these prisoners to help on the farm. Well,
    my brother came for them. We had five. I think there were five. And he had -- he was a cripple with rheumatoid arthritis
    but he could drive a car, and he would come to town and get them and they were just as nice to him as they could be. You
    didn't have to have a guard or anything.
- speaker: Respondent
  text: No guard, uh-uh.
- speaker: Interviewer
  text: And he would just drive --
- speaker: Respondent
  text: He would drive in -- I'll have to tell you something funny about that. Yes. And they helped to cut corn and helped
    to pick apples and -- they were given a sandwich when they left. They said they would have their own lunch. Well, it was
    like two slices of bread and it was like a little tank or something that had a spigot on it, and they would hold those
    two slices of bread under that and that was when margarine first came out and you had to mix the color in it.
- speaker: Respondent
  text: Do you remember? Well, they didn't mix the color in it and it just looked like lard that came out on their sandwiches.
    (Laughter) And my father thought that was terrible and that's all they had was one sandwich.
- speaker: Interviewer
  text: For the day's work.
- speaker: Respondent
  text: Right. So he gave them -- we had a wash house that was real nice and it had a fireplace in it, and he would make a
    fire in there and there was benches and a table in there and he would bring them in to get warm during lunchtime, you
    know?
- speaker: Respondent
  text: Well, he said one of those sandwiches wasn't enough for them so my mother started giving them another sandwich. He
    never brought them in the house but up in the wash house.
