source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: I was born in Dinuba, California, and never lived there. I was raised in Reedley, California. That's not too far away.
- speaker: Interviewer
  text: And what about your family background? Tell me something about your folks.
- speaker: Respondent
  text: My folks were both came out from -- to California, from Oklahoma. My dad's family were farmers, and my wife's family
    were farm workers, and they met when she was working for my grandfather.
- speaker: Interviewer
  text: And something about their and your educational background.
- speaker: Respondent
  text: Both my parents were high school dropouts. My dad dropped out of the tenth grade and joined the Merchant Marines,
    during--right at the end of World War II. And my wife-- or my mother dropped out just right after that. And then when
    he came back, they got married and went on from there.
- speaker: Interviewer
  text: And yourself, what's your educational background.
- speaker: Respondent
  text: I graduated high school Somar High school, which is in L.A. and junior college at College of the Canyons, which is
    down there. And then college at Fresno State.
- speaker: Interviewer
  text: Okay, and what do you do now for a living.
- speaker: Respondent
  text: I teach at Kalinga High School.
- speaker: Interviewer
  text: And you also live in that same city, right.
- speaker: Interviewer
  text: Okay. I'd like to turn our attention to the reason that we are here which, of course, is your military service. Tell
    me, were you drafted, or did you enlist.
- speaker: Respondent
  text: I enlisted.
- speaker: Interviewer
  text: And where were you living at the time.
- speaker: Respondent
  text: San Fernando, California.
- speaker: Interviewer
  text: Why did you join.
- speaker: Respondent
  text: Well, I graduated high school in 1967, right in the middle of the Vietnam War, and at that point it looked like it
    was either hope I can keep a college deferment, or get drafted. And I knew if I get drafted, I was going to have no choice
    of school or anything else.
- speaker: Interviewer
  text: Which service branch did you choose.
- speaker: Respondent
  text: The Marine Corps.
- speaker: Respondent
  text: I really never thought of any other. I--my mom to this day thinks I was mistaken. I thought-- my dad was in the Marines,
    I knew he was in the Merchant Marines, and I just, you know, the Marines were the only one I even gave choice of.
- speaker: Interviewer
  text: Do you recall your first days in the service.
- speaker: Respondent
  text: Scary. {Laughing.}.
- speaker: Interviewer
  text: Tell me more.
- speaker: Respondent
  text: Well, you're free, and then all of a sudden you get on that bus and you come down there, and immediately get off the
    bus and someone starts yelling at you, and telling you what to do. You can't move, you can't talk, you can't look around,
    and the first though through your mind is, what the hell have I got myself into? {Laughing}.
- speaker: Interviewer
  text: So what did that feel like.
- speaker: Interviewer
  text: Scary. Tell me a little bit more about your boot camp and your training experience.
- speaker: Respondent
  text: Boot camp was--it wasn't as tough as I thought it would be because, you know, I was always an athlete in high school,
    so the physical part wasn't bad, once you get over the fact that you were doing what you were told 24 hours a day, and
    so on. Really boot camp turned out to be a big game. It was just what makes it easier. You have four platoons in the company,
    and each one's a team and they compete against each other for everything, from the schooling we went to and the tests,
    to the drill to the rifle range, and so it was always a big game.
- speaker: Interviewer
  text: Do you remember any of your instructors.
- speaker: Respondent
  text: Platoon commander was Gunnery Sergeant Estrada, that's the only one I remember.
- speaker: Interviewer
  text: And you said you made a game out of this. Is that how you basically got through it.
- speaker: Respondent
  text: Well, that's how they get--they make a game out of it for everybody because it's competition, and at that time, every
    time you would--if you placed highest say, on the rifle range, you get a streamer that went on your guide arm, which is
    the platoon number you carry any time you go anyplace. Well, we ended up boot camp with every streamer.
- speaker: Interviewer
  text: (Laughing).
- speaker: Respondent
  text: The other three platoons didn't get a one.
- speaker: Interviewer
  text: I guess they had a force to contend with there, didn't he.
- speaker: Interviewer
  text: Let's turn our attention to the after boot camp experiences. Which war or campaign did you serve in.
- speaker: Interviewer
  text: Vietnam. And where exactly did you go.
- speaker: Respondent
  text: In Vietnam, I was stationed initially at what they called the Four Corners area of Danang, which is right next to
    the airport, and later on they were in the process of moving the entire battalion out to a new facility out there, what
    they called Red Beach.
- speaker: Interviewer
  text: Do you remember arriving there? What was that like.
- speaker: Respondent
  text: First thing I can remember getting off the airplane was the smell. It literally stinks.
- speaker: Interviewer
  text: Stinks like what.
- speaker: Respondent
  text: Well, number one, they use human excrement for fertilizer, so that is part of it. But it's like rotting because I
    mean, it's very damp and very moist, so it's like you're coming into a lot of rotten vegetation, and after you're there
    a while you get used to it, but the first impression was, it just stank.
- speaker: Interviewer
  text: What was your job or your assignment there.
- speaker: Respondent
  text: I was an electronic technician. After boot camp I went to school at San Diego for almost a year, in electronics. I
    learned to repair radios, and my main job in Vietnam was doing that, repairing different types of radios.
- speaker: Interviewer
  text: Did you go from San Diego to Vietnam directly.
- speaker: Interviewer
  text: What was in between.
- speaker: Respondent
  text: I was at Camp Pendleton with Fifth Four Service Regiment, Electronics Maintenance Company for probably about three
    or four months, and then I got orders for Vietnam. I went through what they call _____ which gets you ready for their--which
    is and you run around the hills and play war games, which I always thought was fun.
- speaker: Interviewer
  text: Did you actually see combat.
- speaker: Respondent
  text: I saw some, which is funny- officially the Marines never made parachute jumps, but I got parachute wings and I made
    three jumps when I was in Vietnam. Never fired a shot, they were just practice jumps with First Force Recon.
- speaker: Interviewer
  text: Were there any casualties in your unit.
- speaker: Respondent
  text: Not in that. I also led security patrols everybody gets tabbed for security at one time. As the Marines you provide
    your own security, even though you're technicians. And we had some guys slightly wounded when going out on just perimeter
    patrols, but nobody hurt seriously. I was lucky.
- speaker: Interviewer
  text: Do you have any most memorable experiences.
- speaker: Respondent
  text: Probably the most memorable would have been Christmas time in 1970--first 1969.
- speaker: Respondent
  text: Number one, it was really the first Christmas I was away from home, so you kind of felt lonely, or whatever. But on
    the other hand, I was getting gift packages from people in the States I didn't even know who they were. I remember one
    guy from New York, a farmer, he had a farm in New York and one down around Shreveport, Louisiana. He used to send me letters
    and packages, and I didn't know who the guy was, but they got there and that made you feel better. But I think the most
    important thing was, our company, we formed a choir, and we went around to all the orphanages in Danang and we would sing
    to the kids. And it's really enjoyable when you're standing up there and you're in camouflage fatigues, and you're singing
    to these kids and we'd finish a Christmas carol and they would sing it back to us
- speaker: Interviewer
  text: '{Laughing.} That''s great.'
- speaker: Respondent
  text: And then, of course we'd get to visit with the kids and everything afterwards. And, well, we'd go to the orphanages
    and then we went to this one that was in this old brick building, it looked like it was probably built by the French,
    it was a Catholic orphanage, and we went to visit and ended up going through the hospital and seeing the kids that were
    hurt and everything else. But that's really important to me that we did in Vietnam.
- speaker: Interviewer
  text: Anything else come to mind that way? Any other experiences stand out.
- speaker: Respondent
  text: Probably most scariest time was two nights before going home. I'm sleeping and all of a sudden wide a wake, and I
    hear boom boom boom. It was three grenades going of and the shrapnel was actually hitting the sand bags of the hut I was
    in. And, never got dressed so fast, I probably left a hole in that sand about two foot deep, getting out of there going
    to a bunker. Because I didn't want to get blown away two days before going home.
- speaker: Interviewer
  text: Where was this bunker at? Where were you.
- speaker: Respondent
  text: It was on the south side of Vietnam, down by what we called Monkey Mountain. Not quite there, there was a camp that
    they had taken--I had transferred from Electronic Maintenance Company to Seventh Motor Transport Battalion, and I was
    a battalion communications chief, and we were loading everything up in the battalion, the whole battalion was being pulled
    out. We were one of the first units to be pulled out after Nixon took office and said that he was going to start pulling
    troops out. So we had to load everything, box everything up, all the equipment, and we came home on two LSDs. Everybody
    else was put on an airplane and got home in five days. After processing in Okinawa, it took us thirty days by ship.
- speaker: Interviewer
  text: What is an LSD exactly.
- speaker: Respondent
  text: It's a landing ship dock, it's a ship that has a big hold in the middle and it's got a door on the back end that can
    open up, and normally they can take landing craft and put it in there, and what they do is they can flood it and and it'll
    go in about three or four feet of water and instead of the landing craft going out and plopping in the water, they just
    sail right out of the hold in the ship. Well, in our case they didn't do that, we just put the trucks, all of our trucks
    and stuff in there, and all other equipment.
- speaker: Interviewer
  text: And you rode this LSD--T.
- speaker: Respondent
  text: Well, we ended up going from Vietnam to the Phillipines, and stopped in Phillipines for a couple of days, over Washington's
    birthday, by the way, which was funny because the Navy on Washington's birthday has to fire a 21-gun salute when they
    raised the flag at eight in the morning. Well, eight in the morning, we're going to shore. And we're going over this gang
    plank between two ships and over here is the colors, so we're standing there saluting the colors and then these guns go
    off with three hundred Marines that are a little over 24 hours away from Vietnam, so immediately we hit the deck. Well,
    fortunately this guy behind me was as big as I am. He caught my legs or I would have hit the water forty feet down.
- speaker: Interviewer
  text: '{Laughing.} While you were in the military, were you a warded any particular medals or citations.'
- speaker: Respondent
  text: Other than being there long enough to get a good conduct medal, no. Nothing else. Well, except the service medals
    for Vietnam, the normal ones there.
- speaker: Interviewer
  text: Did you stay in touch with your family while you were overseas.
- speaker: Interviewer
  text: And how did you do that.
- speaker: Respondent
  text: Mainly letters. It was very hard to make a phone call or anything.
- speaker: Interviewer
  text: What was the food like.
- speaker: Respondent
  text: Actually, I thought the food was very good. The problem in the military is, you go to a base, you first get there,
    oh that's the best food you have had, at any base. And then it gets boring because it's the same food and you get it--it's
    almost like at same menu every week. In fact, in Okinawa, we'd have every Saturday night, we'd have steaks, Well, the
    next morning we always went to breakfast because we'd get the leftover steaks and eggs. One day a week, same day of the
    week, we'd always get the chicken, and things like that.
- speaker: Interviewer
  text: Did you have plenty of supplies.
- speaker: Respondent
  text: Yeah, we did pretty good for supplies over there. Marine Corps typically gets hand-me-downs from the Navy and the
    army and everything else. But over in Vietnam we had to get some brand new stuff.
- speaker: Interviewer
  text: Did you feel pressure or stress during this time.
- speaker: Respondent
  text: Well, there's always stress when-- in Vietnam typically even if you're in what's roughly considered a rural area,
    like I was in most of the time, they like to harass you, they like to keep you a wake. Typically they'll lob a couple
    rockets in the base, somewhere in the base, like one, two o'clock in the morning, just to wake everybody up, because it's
    that loud everybody gets up, goes to the bunker, and is there for half hour, forty-five minutes, and then they can go
    back to sleep. It didn't bother me too much because I worked night shift! I worked five at night till three in the morning,
    so all it did was disrupt my work.
- speaker: Interviewer
  text: Did you -- while you were there, did you become the kind of person that would do something, some ritual or something,
    for good luck.
- speaker: Respondent
  text: No, I never did develop that habit.
- speaker: Interviewer
  text: And other than your story of the choir for the orphanage, what other sorts of things did people over there do to entertain
    themselves.
- speaker: Respondent
  text: We had a big volleyball tournament. Fortunately we didn't have to follow all the rules, it was more like--it's supposed
    to be legal volleyball, but it was a kind of mix between that and the jungle ball.
- speaker: Interviewer
  text: What's jungle ball.
- speaker: Respondent
  text: Which had no rules. {Laughing.} But we'd try to use the rules and play volleyball, and we almost went to the championship,
    but we lost our very last game and-- but it was fun. I mean, we'd be out there in the pouring rain. Of course when it's
    raining in Vietnam it's probably ninety degrees so it was like taking a warm shower. You're out there the rain is just
    pouring, and you're playing volleyball. Usually, I think once a month or so we'd have a company party. They'd fry hamburgers
    and stuff, and they'd take a trailer they pulled behind a Jeep, and just fill it full of ice and soda and a beer and everything
    else. Of course we were limited. You could only have two beers a day.
- speaker: Interviewer
  text: Was that a rule that everybody had to follow.
- speaker: Interviewer
  text: Yes. That is the military rule. That's all you could have. Enlisted men, we could not go buy any alcohol and bring
    back to our huts, for instance. Even though I had a refrigerator, but I couldn't go buy beer. I could buy all the sodas
    I wanted, but you had to be, I think it was an E6 staff sergeant on up, to be able to buy some.
- speaker: Interviewer
  text: While you were there, did you see any of the big name entertainers of the big shows that came through.
- speaker: Respondent
  text: I had a chance to go see Bob Hope. He was in there at Christmas time, but I figured it was going to be so crowded.
    Unfortunately most of the enlisted men get to be way in the back, you know, three, four hundred yards away you can hardly
    see 'em, and I kind of missed not being there because in this particular one-- well, the reason I respect Bob hope so
    much is he walked out on stage and all he could see was officers. He walked back and told them--and I was watching this
    on T.V.--and he told them, nope, you get rid of the officers, you put enlisted men up there, or I'm not going back on
    stag
