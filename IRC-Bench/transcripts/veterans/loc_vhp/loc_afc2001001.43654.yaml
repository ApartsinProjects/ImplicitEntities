collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Ray Alcon, LCPL Lance Corporal, USMC.
- speaker: Interviewer
  text: I enlisted.
- speaker: Interviewer
  text: I was living in Pueblo, Colorado.
- speaker: Interviewer
  text: I needed a job and the military provided that.
- speaker: Interviewer
  text: I decided I just wanted to be a Marine.
- speaker: Interviewer
  text: It was scary. I wondered what I got myself into.
- speaker: Interviewer
  text: It was pretty standard stuff. I liked boot camp.
- speaker: Interviewer
  text: Yes. Two of my instructors were Sgt. Flatter and Sgt. Brooks.
- speaker: Interviewer
  text: It was easy. You did what you were told and put up with the mind games. Experiences . . .
- speaker: Interviewer
  text: I served in the Persian Gulf War.
- speaker: Interviewer
  text: I was sent to Kuwait.
- speaker: Interviewer
  text: We arrived at a port. The scenery was beautiful. The temperature was extremely hot.
- speaker: Interviewer
  text: I was assigned to protect nuclear weapons on the U.S.S. Missouri.
- speaker: Interviewer
  text: One image that still stands out vividly is that went 112 days without seeing land.
- speaker: Interviewer
  text: Primarily through writing letters.
- speaker: Interviewer
  text: Gross. Don't believe anyone who said it was good.
- speaker: Interviewer
  text: Yes, at the beginning. The longer we were there, the harder it became to get supplies.
- speaker: Interviewer
  text: Not really.
- speaker: Interviewer
  text: We read a lot or watched television.
- speaker: Interviewer
  text: Only one thing to do-relax.
- speaker: Interviewer
  text: I went to Spain, Italy, Portugal, Egypt, Panama, and Australia.
- speaker: Interviewer
  text: We didn't pull any pranks.
- speaker: Interviewer
  text: We were unified. We watched out for each other. Unity is part of being a Marine.
- speaker: Interviewer
  text: At home port in California.
- speaker: Interviewer
  text: I went to work at the United States Postal Service.
- speaker: Interviewer
  text: We lost touch after my enlistment ended.
- speaker: Interviewer
  text: I continued working for the United States Postal Service.
- speaker: Interviewer
  text: Not much in terms of my day to day life.
