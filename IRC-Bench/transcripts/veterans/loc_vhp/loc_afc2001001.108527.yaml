turns:
- speaker: Interviewer
  text: I was born in Los Angeles, California. And as I've been told, I was born on a Saturday in April at noon when the sun
    was shining, so I was a California type of kid. I lived there 'til I was nine years old. I've got an older brother, two
    years. And when I was nine I moved to London, England and grew up in London until I was 15. And then I moved back to the
    states to finish high school in Washington, D.C.
- speaker: Interviewer
  text: Georgetown Day School.
- speaker: Interviewer
  text: I decided to join in high school, but I wanted to do ROTC. And so when I -- or I applied to all the colleges and the
    two that I got into that were the most appealing to me were the Naval Academy and Tufts. And I decided to go the ROTC
    route at Tufts mainly because I knew I wanted to be a Marine. And if you went into ROTC they would guarantee you that
    you would wind up in the Marine Corps; whereas, if you went into the Naval Academy, there was always a chance that you
    could wind up in the Navy based off of service selection.
- speaker: Interviewer
  text: I went to Tufts and I actually thought I wanted to study International Affairs, but then when I went and started looking
    at the curriculum and the requirements, they were extensive. And I sort of felt like this is the one time in my life I'll
    be able to really just study whatever I'm interested in, so I kind of -- I pursued an academic course load that was pretty
    random, kind of with the faith that at the end of it I'd be able to mold into some type of a major, and I wound up with
    a major in history and literature; but then in my junior year got into a dual degree program with the Fletcher School
    at Tufts, which is their graduate school for International Affairs, and was able to in five years do this bachelor's/master's
    program. So I kind of wound up getting the degree in International Relations anyway. And throughout that time I was also
    doing ROTC. And one of the real benefits of doing ROTC at Tufts was it allowed for a little more freedom in sort of how
    you went about building your military education, so to say. So one of the things I was very fortunate in happening was
    the Marine officer instructor who was a captain at BU, because there was six schools in a consortium, he was really supportive
    of my trying to do like extra training in the summer, and I was a very enthusiastic ROTC-man/shipman, and so he supported
    me by giving me no-cost orders to any school that I could talk my way into. So basically, if I would buy the plane ticket
    to the school, he would write me orders that didn't charge our unit anything but would have me down there in an official
    capacity, you know; which in retrospect was sort of a real act of faith on his part because he probably could have got
    in trouble if I had done anything wrong or gotten hurt, for instance. But sort of under that program I was able to, in
    the summers, in addition to the regular mandated summer training, I was able to go to jump school at Fort Benning; I was
    able to go to the Special Forces combatant diver course; I was able to go to the amphibious reconnaissance school, all
    before I graduated college. And when I went into the Marine Corps having those qualifications, it managed to really give
    me a leg up, as I had the ambition at that point to try to get into Special Operations.
- speaker: Interviewer
  text: Not specifically. It depended a little bit on the course. Like, for instance, jump school, there are lots of cadets
    there, so there wouldn't be Naval ROTC-men/shipmen, but there were always cadets every summer from West Point. So they
    just sort of looked at you, didn't understand exactly what you were, and they're just like, oh, you're just a cadet, and
    just lumped you in with the cadets, so there was really -- that was pretty seamless. When I went through the Special Forces
    combatant diver school, there were also a few West Point cadets there, so they sort of understood; but even so, as a cadet,
    they kind of would give you a ribbing. Actually, when I went to the amphibious reconnaissance school was the most interesting
    one to get an early slot to because they had never seen an ROTC-man/shipman or even understood what that was. And the
    way I was able to get that slot was the Marine officer instructor at a nearby school at Holy Cross was a captain, who
    was a force reconnaissance Marine who I became friendly with, and I -- I at the time had this ambition to try to go to
    Ranger school and I was doing everything I could, talking to anyone I can trying to get a seat to Ranger school and it
    wasn't working out. He basically said, you know, what do you want to go to Ranger school for? That's not going to help
    you in the Marine Corps. He said, you need to try to go to amphibious reconnaissance school if you want to become a force
    reconnaissance Marine. He said, listen, I know the guy who's the XO at the amphibious reconnaissance school right now;
    we were at Second Force Recon together. He was like, I'll call him up and see if he'll let you come down to the course.
    So he called that guy up. He basically said, okay. You know, what if we -- if we have a seat, which we usually do after
    the first few days because it's very high attrition, you know, we'll let Ackerman come down and go through the course.
    And I remember that summer was my last summer in college and the way the timing worked out was I left school in May, early
    May, went straight to Special Forces combatant diver course for eight weeks, graduated from that on a Friday, and literally
    the next Monday amphibious reconnaissance school started and was, you know, for the rest of the summer. But the XO down
    there was a guy named Doug Zembat, who became a very good friend and mentor years later. He was unfortunately killed in
    Iraq in 2007.
- speaker: Interviewer
  text: Ate a lot, stretched, drank water.
- speaker: Interviewer
  text: Yeah. This is my last -- this was my last -- my last summer.
- speaker: Interviewer
  text: My last summer. So it was between my fourth and fifth year, basically.
- speaker: Interviewer
  text: So when I finished, I went back for my fifth year. I got my master's degree and bachelor's degree on the same day
    and was commissioned a second lieutenant. And this was May 2003.
- speaker: Interviewer
  text: So I then went to the basics school, like all newly minted Marine officers. And I went down to basics school; I checked
    in there June of 2003. And, you know, this was right that spring the Iraq invasion had occurred, so it was sort of an
    interesting time to be down at the basics school. And there was a real sense down there, or at least the, you know, what
    people were saying was there was this aura, kind of, of, you know, as though it had been the Persian Gulf War. You know,
    hey, the invasion was this past March and April. It's now June. Hey, you guys -- a bunch of instructors were, hey, you
    guys missed it, but we all missed it, too, and the war is sort of over. And then that summer, I remember you would see
    these first lieutenants and brand-new captains were coming back and checking into Quantico as instructors and they were
    some of the junior officers who had been in the invasion, so they were starting to filter in as instructors. And that
    summer in August, I remember there was a story in the Marine Corps Times, it was the front page and it was "The Marines
    Back to Iraq." And everyone was sort of scratching their head saying what are we going to do in Iraq? Marines, we don't
    do occupation duty and all that's going on there now is occupation duty. And that Christmas I graduated the basic school.
    I had been designated infantry officer. And from December 2003 to April 2004, I was at the infantry officer course. And
    I remember while I was there -- this was probably -- this is early March 2003 -- I was in Twentynine Palms training and
    I got an e-mail from a friend of mine I'd been in college with. And he was also a Marine and had just done the very first
    deploying of Marines over to Iraq, which was four months. And he was in Al Anbar Province. And he sent an e-mail and the
    e-mail was basically to the effect of, you know, it's so boring here. We just turned over with the 82nd Airborne. You
    know, we went on our first patrol. All of my guys were patrolling kind of all ninja-like. And we frequently realized when
    the kids came out, you know, we were kicking soccer balls with them. You know, I think this is going to be a pretty boring
    few months. And literally ten days after he sent that e-mail, the Blackwater contractors were strung up on the Fallujah
    bridge. His battalion was sent into the city to fight for a month. And this was all while I was at the infantry officer
    course. I remember right after that fighting started, all the instructors at the course one day went out, there was about
    80 of us in the class, they bought 80 copies of the Washington Post and on the front page there was two Marines carrying
    another Marine in a body bag through the streets of Ramadi. They left a copy on each of our doorsteps and made the point
    of telling us that this was the first time since Vietnam that Marine officers were graduating from this course knowing
    they were going into combat. I remember there was a guy from the class before us, a guy named Reblowski, who'd been killed.
    A friend of mine who was in that class named Paul Felsberg, he was a prior enlisted Marine, they graduated Felsberg early
    to go serve as a combat replacement for Reblowski. And Felsberg was actually killed that October in Ramadi. So from the
    time I started the basic school, the attitude was, well, you guys sort of missed the war, to the time I left, which was
    you guys are all heading right to Iraq for what likely looks like a pretty intense counter-insurgency campaign, it was
    sort of a complete 180 in tone.
- speaker: Interviewer
  text: Not really. You sort of knew. I mean, after September 11th -- and I was in college when September 11th happened. And
    I remember, you know, I had a roommate at school, he was -- I lived with my brother when I was in college; he was a wrestler.
    And this was a friend of his from the wrestling team. And this was my older brother. And he would see me waking up early
    every morning to go to my ROTC workouts. And he sort of said, you know, why are you doing this, Elliot? He was like, you're
    never going to fight a war. I mean, you know, we -- you know, that's never going to happen. You're just going to be sitting
    around stateside. Then I remember September 11th happened and everybody sort of knew that we'd all been kind of put on
    notice that things were going on. So suddenly, the potential that you would be seeing direct combat really increased exponentially.
    And then -- and then it just kept becoming more and more and more and more of a certainty.
- speaker: Interviewer
  text: I think I was -- I felt like many people, ready to go do the thing that I had trained to do. I think like, you know,
    most 20-something-year-old lieutenants, you know, there was apprehension, but there was also this desire to, you know,
    to prove yourself.
- speaker: Interviewer
  text: Interesting, I -- I went to the infantry officer course and there were basically kind of two things everybody wanted.
    Everyone wanted to go and be stationed in San Diego, as opposed to like Camp Lejeune, you know, San Diego, live the good
    life, and everyone wanted to go to Iraq. And I remember there was this brief window, it was like a 48-hour window where
    our instructors, we all got assigned our infantry battalions and they said, all right, for 48 hours if you guys want to
    swap amongst one another infantry battalions, you're allowed to, but you've got 48 hours to let us know and then everything's
    set. So I originally had orders to go to 1st Battalion, 1st Marines out of Camp Pendleton in California. But the only
    problem is 1st Battalion, 1st Marines wasn't going to Iraq. They're going on a Marine Expeditionary Unit to go, you know,
    sail, cruise around the Pacific, and I really wanted to go to Iraq. And there was a guy in my class whose whole family
    lived in San Diego. All he wanted to do was go to San Diego, and he had orders to go to 1st Battalion, 8th Marines, which
    is in Camp Lejeune, North Carolina, which is not where I wanted to be. So I sort of did a night of searching of the soul
    and he was willing to trade with me, and so I decided to trade. And I remember there was this, in Mitchell Hall, which
    is where the infantry officer course is, it's like the building for it, there was this wall and it's got all the different
    infantry battalion crests, and there's 26 battalions. You know, 1st Battalion, 1st Marines, they're the First of the First.
    They've got like an amazing cool crest with, I don't know, like a dragon wrapped in a dagger. It was, you know, really
    alluring. And I remember, you know, I made the commitment, okay, I was going to go to 1A. And I sort of walked down all
    the infantry battalions and there was sort of this like sad little crest. It was like an old piece of wood kind of hanging
    from one nail, and I looked at their motto and it was The Foul Weather Warriors. And I was like, oh, God, what did I get
    myself into. But 1st Battalion, 8th Marines was literally on the next thing going to Iraq. We graduated in April and
