collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: How old are you right now?
- speaker: Respondent
  text: Ninety-one.
- speaker: Interviewer
  text: And where were you born?
- speaker: Respondent
  text: Wagner, South Dakota.
- speaker: Interviewer
  text: And how long did you live there?
- speaker: Respondent
  text: I left there in 1942. I was 17 years old.
- speaker: Interviewer
  text: And was that to join the Marine Corps?
- speaker: Interviewer
  text: Where did you go?
- speaker: Respondent
  text: I went to work for a defense plant to make some money in the Depression days.
- speaker: Interviewer
  text: And how long did you stay there?
- speaker: Respondent
  text: Till 1948. I joined the Marines.
- speaker: Interviewer
  text: Your great-grandfather, who was that?
- speaker: Respondent
  text: Running Bull, Chief Running Bull.
- speaker: Interviewer
  text: What tribe was that?
- speaker: Respondent
  text: Yankton Sioux tribe.
- speaker: Interviewer
  text: And it's Y-a-n-k-t-o-n?
- speaker: Interviewer
  text: Where is that tribe located?
- speaker: Respondent
  text: Southeast corner of South Dakota.
- speaker: Interviewer
  text: Do you remember if he was alive when you were?
- speaker: Interviewer
  text: Do you remember when he died?
- speaker: Respondent
  text: He died in 1900.
- speaker: Interviewer
  text: That's your great-grandfather?
- speaker: Interviewer
  text: And you were 17 when you joined the Marine Corps?
- speaker: Respondent
  text: I was 18 when I joined the Marine Corps.
- speaker: Interviewer
  text: Do you recall where you went to boot camp, East Coast or West Coast?
- speaker: Respondent
  text: West Coast, Camp Elliott, San Diego, California.
- speaker: Interviewer
  text: How many months did you spend there training?
- speaker: Respondent
  text: Till March, four, five months.
- speaker: Interviewer
  text: You were trained as an infantryman and machine gunner?
- speaker: Interviewer
  text: What was the first unit you reported to?
- speaker: Respondent
  text: When I first went overseas, I went with the Fourth Marine Raider Battalion, but they had been disbanded in February
    of 1944. I didn't get there till March of 1944, but I still joined the Fourth Raider Battalion.
- speaker: Interviewer
  text: Did they then transfer you to another unit?
- speaker: Respondent
  text: Yes, to Chesty Puller's A Company.
- speaker: Interviewer
  text: Did you stay with that unit throughout the Marine Corps?
- speaker: Respondent
  text: Throughout the Marine Corps.
- speaker: Interviewer
  text: What was your initial position with that unit when you first got there?
- speaker: Respondent
  text: I was a private, First Class.
- speaker: Interviewer
  text: Were you just a rifleman or a machine gunner?
- speaker: Respondent
  text: A rifleman.
- speaker: Interviewer
  text: Did you join them in the United States or overseas?
- speaker: Respondent
  text: I joined them here in Omaha, Nebraska.
- speaker: Interviewer
  text: How were you transported over to the Pacific?
- speaker: Respondent
  text: We went by Pullman train to the West Coast, San Diego, and then I shipped out of there with the Fourth Marine Raider
    Battalion in New Caledonia.
- speaker: Interviewer
  text: How were you trained? Did you get on a ship or what did you do when you went overseas?
- speaker: Respondent
  text: I went on board the U.S.S. Polk, a troop carrier.
- speaker: Interviewer
  text: With Bill Veeck?
- speaker: Respondent
  text: Yes, we slept under a Higgins boat and shared the same blanket.
- speaker: Interviewer
  text: Did Bill Veeck lose a leg?
- speaker: Respondent
  text: Yes, he did.
- speaker: Interviewer
  text: When they transported you, did you go to Hawaii or where did you go?
- speaker: Respondent
  text: I went to New Caledonia first, then to the Russell Islands, Pavuvu.
- speaker: Interviewer
  text: When you were raised, did you have brothers and sisters?
- speaker: Interviewer
  text: Do you remember the first battle you partook in?
- speaker: Interviewer
  text: How long after you left San Diego by ship did you go into combat?
- speaker: Respondent
  text: Went over in March. I went into combat September 15th, 1944.
- speaker: Interviewer
  text: How old were you at that time?
- speaker: Interviewer
  text: Did you make an opposed landing? Was it a landing on a craft from the ship?
- speaker: Respondent
  text: Yes, landing craft.
- speaker: Interviewer
  text: Approximately how many of you were on the landing craft?
- speaker: Respondent
  text: Probably 50 guys.
- speaker: Interviewer
  text: Did you know ahead of time exactly where you were landing?
- speaker: Interviewer
  text: What did they tell you you were going to do?
- speaker: Respondent
  text: Just look after your fanny.
- speaker: Interviewer
  text: At the time you landed, were you an infantryman or a squad leader?
- speaker: Respondent
  text: Infantryman.
- speaker: Interviewer
  text: Were you part of a squad, which was part of a platoon?
- speaker: Respondent
  text: Right, First Squad or Third.
- speaker: Interviewer
  text: Was there heavy opposition when you landed?
- speaker: Respondent
  text: Heavy, very heavy opposition. Men were dropping like flies.
- speaker: Interviewer
  text: Do you remember what wave you were when you went in?
- speaker: Respondent
  text: I'm not sure.
- speaker: Interviewer
  text: How long were you floating in the water before landing?
- speaker: Respondent
  text: Not a long time, maybe a couple hours.
- speaker: Interviewer
  text: Was the water rough?
- speaker: Interviewer
  text: Were a lot of guys seasick?
- speaker: Respondent
  text: I don't think there was any who got sick.
- speaker: Interviewer
  text: Were they shooting at you out in the boats?
- speaker: Interviewer
  text: Were there explosions or just bullet rounds?
- speaker: Respondent
  text: Both, explosions and machine gunfire.
- speaker: Interviewer
  text: Did any fire hit the boat before you hit the beach?
- speaker: Respondent
  text: Not that I know of.
- speaker: Interviewer
  text: Could you see over the edge of the boat?
- speaker: Respondent
  text: No, it was above your head.
- speaker: Interviewer
  text: When you hit the beach, what was the first thing you observed?
- speaker: Respondent
  text: A big coral wall and Marines stacked around it, laying flat dead.
- speaker: Interviewer
  text: Were there already a lot of dead Marines there?
- speaker: Respondent
  text: Almost everybody that hit the beach.
- speaker: Interviewer
  text: Were you actually on the beach or wading in the water?
- speaker: Respondent
  text: The beach was maybe 12 feet of wall. We hit the peak.
- speaker: Interviewer
  text: How tall was the coral wall? Could you hide behind it?
- speaker: Respondent
  text: Yes, you could hide behind it. It was almost straight vertical with a small plateau in the middle.
- speaker: Interviewer
  text: Did your entire platoon spread out along that wall?
- speaker: Interviewer
  text: Were some of your own troops being hit with enemy fire as you approached?
- speaker: Respondent
  text: Only one was Case, a Mohawk Indian, who was in front of me and was laying there dead.
- speaker: Interviewer
  text: Were Corpsmen busy attending to the wounded?
- speaker: Respondent
  text: Yes, they were busy right from the start.
- speaker: Interviewer
  text: How long were you held up at the coral wall before moving forward?
- speaker: Respondent
  text: Not very long. I dove in a foxhole, then moved out into the swamp by myself and spent the whole night alone.
- speaker: Interviewer
  text: How far inland did you move before nightfall?
- speaker: Respondent
  text: Probably 75 feet.
- speaker: Interviewer
  text: How long did it take to take the island?
- speaker: Respondent
  text: About fifty-some days before it was secured completely.
- speaker: Interviewer
  text: Did you get into a foxhole and stay there the night?
- speaker: Respondent
  text: No, I moved too far ahead into a swamp by myself, surrounded by Japanese on three sides and Marines behind me. I didn't
    dare move.
- speaker: Interviewer
  text: How far ahead of the other Marines were you?
- speaker: Respondent
  text: Maybe 20 to 25 feet.
- speaker: Interviewer
  text: What time of day was it when you hit the beach?
- speaker: Interviewer
  text: Did more waves land behind you?
- speaker: Interviewer
  text: Were they stuck on the beach?
- speaker: Respondent
  text: Yes, they were stacked up on the beach.
- speaker: Interviewer
  text: When the ship came up to the island, when was the first time you saw the island?
- speaker: Respondent
  text: On the ship looking at it before we went down on the landing craft rope.
- speaker: Interviewer
  text: Before getting in the landing craft, did they give you any instructions or maps?
- speaker: Interviewer
  text: Were your airplanes or ships bombarding the beach?
- speaker: Respondent
  text: Not the landing craft, but the backup ships were bombarding the island.
- speaker: Interviewer
  text: How many ships were bombarding?
- speaker: Respondent
  text: Five thousand.
- speaker: Interviewer
  text: How long was the bombardment before you hit the beach?
- speaker: Respondent
  text: They quit bombarding 24 hours before we hit the beach.
- speaker: Interviewer
  text: Do you know why they stopped?
- speaker: Respondent
  text: They ran out of targets.
- speaker: Interviewer
  text: Did the Japanese dig caves and holes to wait for the artillery?
- speaker: Respondent
  text: Yes, they dug in and waited for the artillery.
- speaker: Interviewer
  text: Was there airplane bombing?
- speaker: Interviewer
  text: Was there any air cover?
- speaker: Respondent
  text: No cover at all.
- speaker: Interviewer
  text: Did the naval gunfire hold up for 24 hours before the landing?
- speaker: Respondent
  text: Yes, all fire stopped 24 hours before we hit the beach.
- speaker: Interviewer
  text: Were they firing at you all night?
- speaker: Respondent
  text: They were firing around me all night.
- speaker: Interviewer
  text: Was there movement of the Japanese at night?
- speaker: Interviewer
  text: Did a tank come into the swamp near you?
- speaker: Respondent
  text: Yes, one tank came directly into the swamp to my right. When the man sat on the turret, I shot him three times and
    he fell back into the tank.
- speaker: Interviewer
  text: Did the tank back up and leave?
- speaker: Respondent
  text: No, it stayed right there and I didn't move because I thought there might be another one on board.
- speaker: Interviewer
  text: What did you do after that?
- speaker: Respondent
  text: I waited till morning, crawled back yelling 'A Company, A Company.' Finally, I heard 'Over here,' and there was F
    Company. So I fell in with them and found my company.
- speaker: Respondent
  text: I was doing the low crawl back.
