collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Congratulations. And what war did you serve in?
- speaker: Respondent
  text: I served in World War II, U.S. Air Force.
- speaker: Interviewer
  text: U.S. Air Force. And what was your highest rank?
- speaker: Respondent
  text: Highest rank, I reached the rank of major and turned down the rank of lieutenant colonel and went home.
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: I was born in Van Nuys, California.
- speaker: Respondent
  text: My parents -- my mother was American born. She was raised in Chicago, Illinois. My dad was born in Germany, and he
    ran away from home when he was about, I think, around 14. He ran off to Russia, and he lived in Russia for a number of
    years and made his way to England. And he stayed there until he around -- let's see, I was born 1919. My brothers were
    born ten years -- five and ten years ahead of me. So if he came to the -- he ran away from England probably right around
    the end of the, of the 1890s.
- speaker: Respondent
  text: And made his way to, got on one of those, I guess, ships with other people going to the U.S.
- speaker: Respondent
  text: He finally made it down to St. Louis.
- speaker: Respondent
  text: And he was down there for quite a while. And then he finally got himself moved up to Chicago, and that's where he
    met my mother-to-be.
- speaker: Interviewer
  text: Fantastic. What was his occupation?
- speaker: Respondent
  text: Well, at that time, he was -- I don't know what he was doing at that time. That was before I was born.
- speaker: Interviewer
  text: And after you were born, what was he -
- speaker: Respondent
  text: He became a -- had his own store most of his life. When I was born he had his own store in Van Nuys.
- speaker: Interviewer
  text: Like a general store?
- speaker: Respondent
  text: Yeah. It was a -- well, basically a men's store.
- speaker: Respondent
  text: And then he decided after I was born -- the -- he and his wife, my mother-to-be, they had one boy who was born and
    he passed away when he was five years old. My brother -- my brother then was born, and he remained to be for the rest
    of his life five years older than me.
- speaker: Respondent
  text: And so we moved down to San Diego, and he had a military type more -- military type of store than anything else.
- speaker: Respondent
  text: We were there several years until finally he decided that best thing he could do would be to move out of there. So
    he moved to Culver City in California.
- speaker: Interviewer
  text: Okay. How many --
- speaker: Respondent
  text: Right on the border of Culver City and Palms.
- speaker: Respondent
  text: And settled down there. Got old enough to finally go to grade school. I went to Palms Grammar School. My brother went
    on through grammar school and made it to Venus High School and became a football player and did all those things.
- speaker: Interviewer
  text: How many brothers and sisters --
- speaker: Respondent
  text: Well, I only had the one after the first boy passed away.
- speaker: Interviewer
  text: Number of children -- how old were you when you entered the Service?
- speaker: Interviewer
  text: How old were you entered the Service, when you went into the Air Force?
- speaker: Respondent
  text: I was -- let's see, I was in college at the time. And I had heard that the -- I had worked summers for the U.S. Land
    Office, and I was taking engineering. I was in the -- at the University of Nevada.
- speaker: Respondent
  text: We had moved up to Reno and my brother had already graduated from the University of Nevada. Had gone into the -- he
    had been in the, what you call --
- speaker: Interviewer
  text: The Corps. He was in the Corps during the war.
- speaker: Respondent
  text: Well, first he joined the -- what is it they have -- a home -- the home guard --
- speaker: Interviewer
  text: National Guard?
- speaker: Respondent
  text: National Guard.
- speaker: Respondent
  text: And then when he got out of college, he joined the -- in fact, he turned down an appointment to West Point and went
    into the, joined the Army and got his commission as a second lieutenant.
- speaker: Respondent
  text: And he did surveying all around the countryside, and then finally they sent him down to Brazil.
- speaker: Interviewer
  text: So you enlisted?
- speaker: Respondent
  text: But I was growing up. And when I got out of -- into college, I had heard that -- I was taking engineering. I heard
    that the Air Corps was looking for people with engineering background to join the Air Force, because what they were looking
    for was those who could go on and become navigators or learn to teach navigation. They didn't have enough aerial navigators,
    and -- but engineers could be flipped over in, you know, a very short time.
- speaker: Interviewer
  text: This is when you went in Dad, 1942. You went in, in 1942. January of 1942.
- speaker: Interviewer
  text: Yeah, 1942. So I wound up at -- being as I was interviewed, they sent Air Force team to Reno. And I was interviewed
    and out of -- I think there were 15 or so of us. I was the first one to pass the thing, and there were five of us ultimately
    that were accepted as being capable of joining the Air Force.
- speaker: Interviewer
  text: And can you tell us something about your training once you were enlisted, and what type of training did you have?
- speaker: Respondent
  text: Well, it -- in the military part of the training --
- speaker: Respondent
  text: Yeah, well, that took learning military activities, first of all. It didn't matter which branch of the Service you
    were in; you had to learn what they were all about.
- speaker: Respondent
  text: And then just started learning the special duties that would be assigned to you.
- speaker: Interviewer
  text: What were some of your special duties?
- speaker: Respondent
  text: Well, I was sent down to Mather Field in California, and there I went to that was my first attendance at anything
    close to a navigation course. And they had a bunch of us there. So I had already been through pilot training, cadet training,
    and basic pilot knowledge, and could fly Stearman BT-13s. Other than that, I couldn't fly anything. And -- excuse me.
    I'll have a sip.
- speaker: Respondent
  text: But they sent us to -- from Mather, we were sent down to -- down in the south, and to a school down there that taught
    -- they were teaching navigation.
- speaker: Respondent
  text: And we went through that course. Then we got transferred to another one north someplace. Finally got back to Sacramento
    where we started.
- speaker: Respondent
  text: And I was assigned to teach there in California to the navigation class. I became the instructor there.
- speaker: Respondent
  text: Was getting along fine with that when -- well, tell you one funny thing that happened. One of my classmates was a
    -- he had been in cadet pilot school with me. Had done the same thing I did.
- speaker: Respondent
  text: He took up this navigation business. And we got sent down to Louisiana to evaluate a navigation school down there.
    Actually, it was a little more than that, because what they were doing were taking returning airmen from the far east
    and middle east that had a whole lot of different rules and different processes than what we had as being flying around
    in Europe and whatnot. And so we called it a show-and-tell program. And this one day we had to show and tell and my buddy,
    Pete, my classmate, we had the class from 1 o'clock to 3 o'clock. And at noon he said -- he asked me, he says, Hey, Ache,
    what are we going to show and tell? And I said, Well, I thought you were going to decide that today. He said, No, you
    got to do that. I said, Well, I don't know. I thought a minute. I said, Well, it's lunch time. Let's go downtown and get
    a dry martini, and then we can show and tell how to make a dry martini. He said, That sounds good. So we went downtown.
    We got some vermouth and a bottle of gin. Went on back out to the branch -- to the school and proceeded to tell the class.
    Now we're going to have a show-and-tell here, and -- but what we're going to do, we're going to show you how to make a
    dry martini. And you get a sip of it so you know that it was a martini. And so I was about halfway through the thing when
    a guy got up about the first row of seats in front of me and walked out of the class. I didn't ask him where he was going
    or anything. But about ten minutes he came back and he said, Ackerman, the colonel wants to see you right now. And I said,
    Well, I haven't finished my course here. He said, No, he wants you right now. I said, Okay, so Pete take over. So I went
    down the hall -- got down the hall about 50 feet, and the door had a glass window in it. And I looked through there and
    here's this guy sitting at his desk and he's -- his face was about as red as my hair was in those days. He was just tearing
    up paper. Just -- you could tell he was madder than hell. And I tapped on the door again and he looked up. He said, Come
    in. I got about halfway to him and he says, Ackerman, what in the hell were you doing in that classroom? And I said, I
    don't know. I do what I was told to do, showing and telling. He says, But what were you showing and telling? I said, Well,
    we were showing and telling how to make a martini. He said, Well, you know you broke the law?
- speaker: Interviewer
  text: I said, Well, no, I don't. What did I do? He said, Well, you brought liquor into the room, and that is illegal in
    this base.
- speaker: Respondent
  text: Now, what were you supposed to be showing and telling?
- speaker: Interviewer
  text: Well, how to operate a radio, or you know, how to take -- do things that were military, but we had been through most
    of that. We didn't think it was going to hurt.
- speaker: Respondent
  text: Something really practical.
- speaker: Interviewer
  text: As the colonel says, Well, he says you violated the law. He said, We're going to have you court marshalled. He said,
    Get back to your barracks. And he said, We'll send you home tomorrow and the colonel at your base will take care of you.
    And I said, Well, that's fine. Whatever you got to say you've got to do, we'll do it. So that night I did something I
    hadn't done before. I got down on my hands and knees -- and this was in Texas at this time -- and I said, got down on
    my hands and knees before I went to bed and I said, Good Lord, if you let me out of Texas tomorrow morning, I promise
    you I will never set foot in Texas again.
- speaker: Respondent
  text: And here you are.
- speaker: Interviewer
  text: This is how many years now being here?
- speaker: Respondent
  text: Long time later. 30.
- speaker: Interviewer
  text: So anyway, the next day I went home. When I got back to Blythe -- I had been stationed in Blythe, California then.
    I got to Blythe and the sergeant met me down at the foot of the aircraft and he said, The colonel wants to see you right
    now. He said, I'll take you over there in my car. So he picked up my bags and he took me over to the office. And I walked
    down the hall there again, pounded on the glass window, and he was sitting there tearing up paper and laughing. Like he
    couldn't believe. Finally, he waved me in, and he said the same thing. He said, What the hell were you doing down there?
    I said, Well, we were doing what we were sent there. We evaluate the program and show them how to do things, and we thought
    we were doing okay. And he said, Well, you know, the only thing you did wrong was make that liquor business. I said, Well,
    it wasn't really that much anyway. All we did give them a better taste of it. He says, Well, anything you were supposed
    to do -- but he said, Well, go on back to the office and go to work. And so that was the end of that episode.
- speaker: Respondent
  text: Now I got a question. Were the people that you were teaching in this situation, were they other Americans or were
    they our Asian allies or --
- speaker: Interviewer
  text: No, no, these were American military personnel.
- speaker: Respondent
  text: Okay. Okay.
- speaker: Interviewer
  text: They had been sent down here to be brought up-to-date. Like, they had entirely different radio programs --
- speaker: Respondent
  text: Oh, okay. Okay.
- speaker: Interviewer
  text: -- and that they would transmit, you know, to transmit in formation where they were, whatever. And we had a lot of
    trouble following it, quite frankly. But they were in there for a reason there.
- speaker: Respondent
  text: From there, you wound up in England.
- speaker: Interviewer
  text: After I got finished there at Blythe, I got sent back overseas.
- speaker: Respondent
  text: Okay. Well, talk to us --
- speaker: Interviewer
  text: He wasn't court-martialed.
- speaker: Respondent
  text: Oh, okay. Good. Talk to us about your experiences in World War II and where you were and what you did and just what
    was going on.
- speaker: Interviewer
  text: Well, when I got relieved of being an instructor, I was sent to Sacramento. There was a team of -- well, it was most
    popular --
- speaker: Respondent
  text: Are you talking about the man who flew the missions in Japan? You became part of the 91st Bomb Group. Is that what
    you were trying to tell them?
- speaker: Interviewer
  text: Well, that was leading up to it, yeah. But I -- they wanted me to join this crew, this army crew that was there at
    Sacramento. They were getting their aircraft overhauled and all checked out. They didn't say where they were going, but
    we knew pretty well it was --
- speaker: Respondent
  text: You mean Jimmy Doolittle? You're trying to think of Jimmy Doolittle.
- speaker: Interviewer
  text: Yeah, Jimmy Doolittle. And he was taking his group.
- speaker: Respondent
  text: Was that the bombing raid they made?
- speaker: Interviewer
  text: Yeah. So what we were assigned to do while he was there, they wanted to fly so -- they hadn't been around Sacramento
    or anywhere, so we became their navigators for the day and took them up north to the state line and then down south into
    Southern California and then back. And he took his crews over to the other side of Oakland, and he still didn't say where
    he was going or anything. We didn't know it was -- he said he was headed to Japan. And couple days later, we heard about
    Japan being bombed. It was Jimmy Doolittle and his group. And he lost some of his boys there. But that was kind of the
    thing we were doing there. Well, then finally our -- well, we got invited to join what turned out to be the 91st Bomb
    Group, and they were getting ready to -- they had been formed down in Florida originally, and flown in the states. They
    hadn't been anywhere else. So we joined the 91st Bomb Group, and we made our way up to Washington D.C. -- not Washington
    -- Walla Walla, Washington. And then we flew around up there for a while trying to -- a few days, and trying to get everybody
    loosened up and ready to tackle this overseas trip. Then we left W
