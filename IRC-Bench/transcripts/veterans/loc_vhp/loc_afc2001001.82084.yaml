- speaker: Interviewer
  text: In Brownsville.
- speaker: Interviewer
  text: San Benito.
- speaker: Interviewer
  text: October the 16th, 1923.
- speaker: Interviewer
  text: Benita Casarez and Jose Alvarez.
- speaker: Interviewer
  text: Yes, more or less.
- speaker: Interviewer
  text: Yes, in Brownsville.
- speaker: Interviewer
  text: San Benito.
- speaker: Interviewer
  text: To serve my country, I guess.
- speaker: Interviewer
  text: That's right.
- speaker: Interviewer
  text: I don't know, I guess I was just born for it.
- speaker: Interviewer
  text: That's right.
- speaker: Interviewer
  text: Well, sort of.
- speaker: Interviewer
  text: At the NTC.
- speaker: Interviewer
  text: Naval Training Center.
- speaker: Interviewer
  text: That was in San Diego, wasn't it, Honey?
- speaker: Interviewer
  text: No. No, it was in Brownsville.
- speaker: Interviewer
  text: Okay. And do you remember your boot camp experience?
- speaker: Interviewer
  text: That was in San Diego.
- speaker: Interviewer
  text: You did boot camp in San Diego?
- speaker: Interviewer
  text: Okay. Do you remember any of your instructors?
- speaker: Interviewer
  text: How did you get through it? Was it tough?
- speaker: Interviewer
  text: Yeah? Any problems getting through it?
- speaker: Interviewer
  text: Which wars did you serve in?
- speaker: Interviewer
  text: The second World War, the Korean War and Vietnam, two tours.
- speaker: Interviewer
  text: Two tours in Vietnam, okay. When you were serving in the second World War, where exactly did you go?
- speaker: Interviewer
  text: All over, if I was on the USS Tennessee for, I don't know --
- speaker: Interviewer
  text: From '41 to '46.
- speaker: Interviewer
  text: Yes, '41 to '46.
- speaker: Interviewer
  text: So from '41 to '46, you were in Tennessee doing what?
- speaker: Interviewer
  text: USS Tennessee.
- speaker: Interviewer
  text: Oh, the USS Tennessee.
- speaker: Interviewer
  text: The USS Tennessee.
- speaker: Interviewer
  text: A battleship.
- speaker: Interviewer
  text: And so the USS Tennessee traveled through the Pacific Theater?
- speaker: Interviewer
  text: Yes, the whole Pacific Theater.
- speaker: Interviewer
  text: Okay. And just for my purposes because I am not real good on geography, when we say the Pacific Theater, give me an
    idea of what kinds of places that covered.
- speaker: Interviewer
  text: From the Philippines -- from the Philippine Sea to the -- what's the one up there in Alaska Aleutians?
- speaker: Interviewer
  text: And then down the Suarez, as far as the tip of South America.
- speaker: Interviewer
  text: And Japan, and the whole Pacific. He was in 13 major battles.
- speaker: Interviewer
  text: 13 major battles in World War II?
- speaker: Interviewer
  text: And you were never a prisoner of war, correct?
- speaker: Interviewer
  text: And you were a Boatswain's Mate, First Class, right?
- speaker: Interviewer
  text: So you saw a lot of combat. You saw a lot of combat.
- speaker: Interviewer
  text: I would imagine quite a few casualties.
- speaker: Interviewer
  text: Yes. We had burials at sea practically every day. Burials at sea, the ones the kamikaze took out, a show of batteries,
    hit us a couple of times, so it was just very, very interesting.
- speaker: Interviewer
  text: Tell me about a couple of your most memorable experiences during World War II.
- speaker: Interviewer
  text: My most memorable, serving aboard the Tennessee, you got to see the world. You went to port to port to port, and battled
    the battle whatever. The Aleutian battle was the toughest one because they were pretty well entrenched in there and it
    took a lot of fire power to blast them out, to take them, the Aleutians.
- speaker: Interviewer
  text: And do you recall your medals or the awards that you received in World War II?
- speaker: Interviewer
  text: No, I know all the regular ones.
- speaker: Interviewer
  text: I have a list.
- speaker: Interviewer
  text: Okay. Mrs. Alvarez is going to provide us with a list for that, is that right?
- speaker: Interviewer
  text: And how did you stay in touch with your family during that period, Mr. Alvarez?
- speaker: Interviewer
  text: How did I what?
- speaker: Interviewer
  text: Stay in touch with your family.
- speaker: Interviewer
  text: By trying the email --
- speaker: Interviewer
  text: What was V-mail?
- speaker: Interviewer
  text: Communications --
- speaker: Interviewer
  text: It was little pieces of a letter with a lot of black ink on it.
- speaker: Interviewer
  text: Oh, they censored a lot of what you wrote, Mr. Alvarez?
- speaker: Interviewer
  text: Okay. And what was the food like?
- speaker: Interviewer
  text: Really? Aboard the Tennessee, it was pretty good? Aboard the Tennessee it was pretty good?
- speaker: Interviewer
  text: It was very fine.
- speaker: Interviewer
  text: You had plenty of supplies.
- speaker: Interviewer
  text: Plenty. We supplied -- we took supplies on every time we went to sea. We replenished everything, and took on the stores,
    sea stores, whatever you want to call them.
- speaker: Interviewer
  text: Did you feel any stress or pressure during that time?
- speaker: Interviewer
  text: Was there anything special you did for good luck?
- speaker: Interviewer
  text: Keep out of the fire power, away.
- speaker: Interviewer
  text: How did -- what did y'all do for entertainment on the Tennessee?
- speaker: Interviewer
  text: Oh, we had entertainers from different places come out.
- speaker: Interviewer
  text: Tell them about J.D. Wilson.
- speaker: Interviewer
  text: Oh, J.D. Wilson, he was a character, and he imitated people. He was an imitator, and then he did the shuffle, bounced
    up and down and cart wheels and everything.
- speaker: Interviewer
  text: And this J.D. Wilson, he was a fellow shipmate?
- speaker: Interviewer
  text: Okay. Do you know where he was from?
- speaker: Interviewer
  text: No, I think he said he was from Tacoma.
- speaker: Interviewer
  text: Washington.
- speaker: Interviewer
  text: Washington.
- speaker: Interviewer
  text: Okay. Other than J.D., were there any other entertainers that visited the boat that you can remember?
- speaker: Interviewer
  text: But some came.
- speaker: Interviewer
  text: And what did you do when you went on leave?
- speaker: Interviewer
  text: There was no leave in the second World War.
- speaker: Interviewer
  text: Do you recall any particularly funny event other than J.D. Wilson?
- speaker: Interviewer
  text: Tell them about the gun locker.
- speaker: Interviewer
  text: Tell them about the gun locker.
- speaker: Interviewer
  text: Oh, ha, ha, ha, we got hit on the gun locker, and it blew it up, more or less, to pieces, and we had to scrape and
    get all the faulty ammunition -- well, they we had to shove it overboard.
- speaker: Interviewer
  text: It was pretty scary there for a while.
- speaker: Interviewer
  text: Yeah, well, I wouldn't think that would be very funny, because then you lost all your guns.
- speaker: Interviewer
  text: I wasn't talking about that one. I was talking about J.D. Wilson making home brew in the gun locker.
- speaker: Interviewer
  text: Oh, this guy, he got a bunch of juice, and he wanted to make -- it fermented on him. And he was on deck when it blew
    apart and it went all over, and he was out there with a swab trying to swab it out to get rid of it, and the officer exec
    looked by and says, what's going on down there? He said, Nothing, sir. This is recall fluid that I'm swabbing up. And
    it wasn't, it was the home brew that blew up.
- speaker: Interviewer
  text: Oh, my goodness. Did you keep a personal diary?
- speaker: Interviewer
  text: No, never did.
- speaker: Interviewer
  text: And you've given us a couple of photographs, correct?
- speaker: Interviewer
  text: You've given us a couple of photographs, correct?
- speaker: Interviewer
  text: And in one photograph that you're pictured in, you're pictured on the right. Do you recall the gentlemen on the left
    by name?
- speaker: Interviewer
  text: He is on the left?
- speaker: Interviewer
  text: Oh, I'm sorry, you're on the left in the photograph?
- speaker: Interviewer
  text: No, he is on the right. If you looked at that long enough, do you think you could remember who it was?
- speaker: Interviewer
  text: No, I don't believe so.
- speaker: Interviewer
  text: And when did your service end?
- speaker: Interviewer
  text: He was formally discharged in 1972.
- speaker: Interviewer
  text: 1972. And where were you at the time you were discharged?
- speaker: Interviewer
  text: Okay. And what did you do in the days following your discharge?
- speaker: Interviewer
  text: Try to get adjusted to the civilian life.
- speaker: Interviewer
  text: In San Diego, there's Harbor Drive. The ships are all at the 32nd Street Naval Station. He walked out of the 32nd
    Street Naval Station, walked down to 28th Street, walked into National Steel and went to work building ships.
- speaker: Interviewer
  text: Okay. You didn't want to be very far from the boats.
- speaker: Interviewer
  text: And that was working for who?
- speaker: Interviewer
  text: National Steel and Ship Building Company.
- speaker: Interviewer
  text: National Steel and Ship Building in San Diego. Okay. Did you use any of the GI Bill for educational purposes?
- speaker: Interviewer
  text: Did you make any close friendships while you were in the Navy?
- speaker: Interviewer
  text: Marty Martinez was a Boatswain Mate also. He shared the bunk above me, and I was below him.
- speaker: Interviewer
  text: And we relieved each other on duty.
- speaker: Interviewer
  text: Marty got killed in Vietnam.
- speaker: Interviewer
  text: Yeah, he got transferred from the ship that we were on and went to Vietnam, and he walked aboard ship, and the following
    day he got blasted out of the water by the Vietcong.
- speaker: Interviewer
  text: Are there any other friendships that you made while in the Navy that you still maintain close connection with?
- speaker: Interviewer
  text: Oh, yeah, the whole ship, the whole USS Tennessee. We have a reunion every year.
- speaker: Interviewer
  text: Where do you have a reunion at?
- speaker: Interviewer
  text: All over. The members host it in -- we hosted one here back in 80 -- wait a minute and I'll think of it -- '84, '85,
    I can't remember right now. Anyway, we hosted; we had 400 people here for a week.
- speaker: Interviewer
  text: So when is this reunion, every year?
- speaker: Interviewer
  text: It changes.
- speaker: Interviewer
  text: The date changes?
- speaker: Interviewer
  text: Yes, the date changes, the place changes. We just -- they go all over the United States.
- speaker: Interviewer
  text: Have you had it yet for 2011?
- speaker: Interviewer
  text: No, it's going to be -- it was last month. It was in New Orleans.
- speaker: Interviewer
  text: In New Orleans. Did you go to that one?
- speaker: Interviewer
  text: No, we haven't been able to go for the last ten years.
- speaker: Interviewer
  text: Oh, why not?
- speaker: Interviewer
  text: He has been quite ill.
- speaker: Interviewer
  text: How are you ill, Mr. Alvarez?
- speaker: Interviewer
  text: Can I tell you?
- speaker: Interviewer
  text: In 2000 -- in 1999, they discovered that he needed a valve replaced in his heart. On the 4th of January 2000, they
    replaced it. That night, he coughed and the wires came through his chest and he lost all his blood and he died. The doctor
    was standing right beside him in the CCR at Valley Regional. He reached in and pumped his heart. And Gracie, the night
    nurse, came in and plugged up the holes that she could, they got an operating room open, they got him in there, and they
    brought him back. When he came back, he was in a coma for nineteen days.
- speaker: Interviewer
  text: Oh, my goodness.
- speaker: Interviewer
  text: During that time, he caught an infection, staff -- this antibiotic-resistant staff infection. He had a stroke. He
    had pneumonia. They had opened him up again to clean him out, but that was the third time, of course, that he had been
    opened and they couldn't get him closed. So they had to air lift him up to Methodist Hospital in Houston, and they did
    the skin graft and they got him closed. They brought him back. He was in the hospital ninety days all together. The following
    year, they discovered he had colon cancer. They operated on that and got rid of that. Then they gave him some medicine
    that was recalled after that, but that medicine almost killed him.
- speaker: Interviewer
  text: Oh, my goodness.
- speaker: Interviewer
  text: He just swelled up like -- his stomach just kept getting -- I said, Honey, you can't fasten your pants, and he just
    kept -- and he passed out on the floor, and they took him -- and this was the result of that Statin drugs, and they recalled
    them. And then he has been getting better ever since, but it's just we don't leave home. We stay here because the doctors
    are here. We never know.
- speaker: Interviewer
  text: Uh-huh. Earlier, Mr. Alvarez, Ms. Alvarez referred to the possibility that you were exposed to Agent Orange.
- speaker: Interviewer
  text: That would have been in the Vietnam War?
- speaker: Interviewer
  text: Do you recall where?
- speaker: Interviewer
  text: I was on the Mekong River. I was man-handling a salvage boat to get the small craft off of the beach to get them back
    to the base to repair them, the ones that had been blown up by the Vietcong. So it was quite an experience. I didn't think
    I was going to live through it, but I did.
- speaker: Interviewer
  text: And how exactly were you exposed to the Agent Orange?
- speaker: Interviewer
  text: Out in the open. The planes come by and bombarded the foliage to get it out of the way, and that's what contaminated
    the rest of the stuff.
- speaker: Interviewer
  text: And then you just breathed it in and got it all over you?
- speaker: Interviewer
  text: Now, Mr. Alvarez, you were also in the Korean War, correct?
- speaker: Interviewer
  text: And where were you serving in the Korean War?
- speaker: Interviewer
  text: In the Pacific.
- speaker: Interviewer
  text: No, you were in France.
- speaker: Interviewer
  text: I thought you went to France.
- speaker: Interviewer
  text: And that was to build some boat yards or some air fields?
- speaker: Interviewer
  text: No, we built an air base there.
- speaker: Interviewer
  text: An air base, okay.
- speaker: Interviewer
  text: Okay. And your job then at that time?
- speaker: Interviewer
  text: Strictly maintenance. With whatever happened there, I could do it.
- speaker: Interviewer
  text: Yes, but they also had him as the military police --
- speaker: Interviewer
  text: Yeah, I did.
- speaker: Interviewer
  text: -- because he could speak the language.
- speaker: Interviewer
  text: Oh, okay. You spoke French.
- speaker: Interviewer
  text: Yeah, a little bit.
- speaker: Interviewer
  text: What other languages do you speak?
- speaker: Interviewer
  text: That's all.
- speaker: Interviewer
  text: English and French --
- speaker: Interviewer
  text: And Spanish.
- speaker: Interviewer
  text: And Spanish.
- speaker: Interviewer
  text: And French.
- speaker: Interviewer
  text: And a little bit of Sangiric.
- speaker: Interviewer
  text: A little bit of what?
- speaker: Interviewer
  text: Philippine language.
- speaker: Interviewer
  text: And a little bit of the different dialects from South America. A little bit of this and a little bit of that, because
    he
