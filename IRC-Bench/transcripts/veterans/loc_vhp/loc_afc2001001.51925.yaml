collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: Yes. I was in the Navy from 1941 to 1945. Then I went in the Reserve in -- I went back to school, and then in 1957
    I received a commission, second lieutenant in the Army.
- speaker: Interviewer
  text: Was that your highest ranking?
- speaker: Respondent
  text: I retired as a major.
- speaker: Interviewer
  text: Oh, okay. Okay. Do you remember your serial number?
- speaker: Respondent
  text: Which one? You know, your social security number -- is this -- this is something you don't give out. Is this --
- speaker: Interviewer
  text: No. It says serial number for service. It's different than social security number. Okay. That's fine. What battalion,
    regiment or division were you in?
- speaker: Respondent
  text: I was in the Navy. The first -- I was in the Navy. And I was stationed at the Naval Academy in Annapolis, Maryland
    in 1941 to 1942. And I was in Europe from '43 to '45.
- speaker: Respondent
  text: Stationed in Europe. I was with the 7th Beach Battalion.
- speaker: Respondent
  text: 7th Beach Battalion.
- speaker: Interviewer
  text: Okay. And which war was this you served in?
- speaker: Respondent
  text: That's World War II --
- speaker: Respondent
  text: -- first. I was in the Vietnam War.
- speaker: Interviewer
  text: Did you sustain any service-related injuries while you were in the service?
- speaker: Respondent
  text: Well, yeah. I got disability now.
- speaker: Interviewer
  text: You were not a prisoner of war.
- speaker: Interviewer
  text: Do you have medals, awards and things that you could share?
- speaker: Respondent
  text: Yeah. Well, that's a big question; that I should have received the Bronze Star, but for some reason they gave me the
    ARCOM. So, in fact, I have, you know, sent a letter to the effect, you know, why I didn't receive the Bronze Star.
- speaker: Respondent
  text: Because everyone in my unit, you know, received a Bronze Star.
- speaker: Respondent
  text: And all -- also the unit received.
- speaker: Interviewer
  text: Okay. And you did receive -- what medal was that?
- speaker: Interviewer
  text: What's that?
- speaker: Respondent
  text: Yeah, that's a lower, one lower down from the Bronze Star.
- speaker: Interviewer
  text: Okay. Just a couple of things. They wanted to kind of see what your service was like. Were you drafted or did you
    enlist?
- speaker: Interviewer
  text: Okay. Where were you living at the time that you went in the service?
- speaker: Respondent
  text: Well, I went in the Navy from Little Rock, Arkansas, and I went in the Army from Chicago, Illinois.
- speaker: Interviewer
  text: And did you pick the branch of service that you went in, or was that chosen for you?
- speaker: Respondent
  text: Yeah, I picked the branch of service in the Army.
- speaker: Respondent
  text: In the Navy I was a steward. But it's a funny thing. I was sent to Maryland and I was part of the staff on the USS
    Cumberland, which was a company ship next to the university. And what it was, the fellows on the Cumberland, they worked
    in the dining hall, the Vandercroft Hall, but when I went there they put me on the deck force. So I -- instead of going
    to the dining hall, I went and worked on the ship in the deck force. And then I went to school, and after I finished the
    course in school I was shipped overseas to England. I was in World War II and went to a place called Salcombe, South Devon.
    So I was there, you know, until the war was over.
- speaker: Interviewer
  text: What would be your most memorable experience in your service?
- speaker: Respondent
  text: Kind of a lot of memorable experiences, but in the Navy I guess I was just a young man and, you know, right out of
    high school and, you know, never experienced being away from home. And I guess that's -- you know, I always think about
    that, but I never -- got my home training, so I never was -- got with bad company. You know, I was just fortunate enough
    to be accepted in the civilian area, you know. And I just enjoyed it because I was, you know, a young man.
- speaker: Respondent
  text: I spent -- well, it was two years in Europe and two years here. And I guess one of the most memorable things after
    I got a commission, and my family, we went to Italy. We was in Italy for three years. And I was able to take my wife back
    to England where I was stationed in the Navy and visit some of the people that I met there. That was really something.
    And my last daughter, she was born in Italy, and I have a granddaughter who was born in Italy.
- speaker: Interviewer
  text: Okay. Have you joined any veterans' organizations since the end of the war?
- speaker: Interviewer
  text: Okay. What was your career after the war? What did you do after the war?
- speaker: Respondent
  text: I was a nurse in the operating room.
- speaker: Interviewer
  text: Okay. Is there anything else you would like to share that you think would be interesting about your career there or
    after your service?
- speaker: Respondent
  text: Well, the only thing, I never had a bad moment. You know, I had a pretty good assignment. Even when I was -- you know,
    during the war in Vietnam. When I came back and was assigned to Fitzsimons, and then from Fitzsimons to Fort Benjamin
    Harrison where I retired.
- speaker: Respondent
  text: And I was able to enjoy it because I had my family with me. And we decided to stay here in Indianapolis after I retired.
