collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: I went to a lot of places. I started out in California though for boot camp.
- speaker: Interviewer
  text: Were you drafted or did you enlist?
- speaker: Respondent
  text: Me and a bunch of buddies decided to enlist one day. We wanted to do something exciting.
- speaker: Interviewer
  text: Why did you choose the Marines over any other branch?
- speaker: Respondent
  text: I needed the discipline. I thought they would be the one to give me the discipline and straighten me out.
- speaker: Interviewer
  text: So, you went in on January 4, 1954.
- speaker: Respondent
  text: Yeah, just a day or so after my birthday.
- speaker: Interviewer
  text: How did your family react to your coming home and saying "I joined the Marines?" I know you have older sisters. How
    did they feel about their baby brother leaving?
- speaker: Respondent
  text: Everyone was ok with it.
- speaker: Interviewer
  text: What was your first day like as a Marine?
- speaker: Respondent
  text: Well, we went to Chicago to do our physicals. We came home to get ready and took the bus back in to go to California.
- speaker: Interviewer
  text: What happened when you got to California?
- speaker: Respondent
  text: As soon as we got off the bus, they were in our faces screaming at us.
- speaker: Interviewer
  text: Were you scared and think what in the world did I get myself into?
- speaker: Respondent
  text: No, I just figured they were screaming at us to start the discipline.
- speaker: Interviewer
  text: What happened next?
- speaker: Respondent
  text: We were sent to get our supplies, uniforms and things, all the while screaming at us. We were up until around midnight
    or so then went to bed. Wow. that was a long day. Then they came in and woke us up around 4:30 am. That is when it hit
    me, "Oh what did I get myself into?"
- speaker: Interviewer
  text: During boot camp, did you guys get nicknames?
- speaker: Respondent
  text: Well, we got nicknames from the drill instructors but they weren't very nice nicknames. Some people get OK nicknames.
    Not at that particular time, we got not too good nicknames, too good nicknames. Like what kinds of birds don't fly...and
    they're S birds? That is what we ended up being called. It was all for discipline, that's a good thing, I think they did
    some of the stuff they do kind of push your pressure point to see if you are going to crack or not if you are going to
    crack there you aren't going to make it anywhere else outside of that you know, in case you get into combat or captured
    or come up as a POW or something. They really put you through the paces, because they want to see how much pressure you
    can take.
- speaker: Interviewer
  text: Is there anybody that didn't make it?
- speaker: Respondent
  text: Yeah, there were some.
- speaker: Interviewer
  text: How about any of your buddies?
- speaker: Respondent
  text: No, my buddies all made it. There is only one guy in my platoon. The rest of them all got different platoons. They
    had one guy I think he killed himself.
- speaker: Interviewer
  text: During basic training?
- speaker: Interviewer
  text: Was he in your platoon?
- speaker: Respondent
  text: No he was in a different platoon.
- speaker: Respondent
  text: He couldn't handle it I guess. That's really I guess when you feel like you're not going to go anywhere with no place
    to go. I had one lady tell me that someone tried to jump out of a second story window and landed in the bushes trying
    to kill herself.
- speaker: Interviewer
  text: She didn't do too well did she?
- speaker: Respondent
  text: No. You can't expect to hurt yourself after falling two stories into a bush. The bush will break your fall somewhat
    so.
- speaker: Interviewer
  text: She just tried to get out.
- speaker: Respondent
  text: Yeah, some of them didn't make it either. This one guy he was sort of odd, he got a section eight. They let him out
    he was different. They had to weed them out somehow.
- speaker: Interviewer
  text: Did you have to deal with that did the 72 hour swamp thing like they do in Parris Island they did that.
- speaker: Respondent
  text: Yeah, in Parris Island they did that. No we never did anything like that at camp, San Diego, do basically boot camp
    is all. It was rigorous, real rigorous, they put you through your paces there, and it's something else. Like the first
    night there you woke up only having four and half hours of sleep.
- speaker: Interviewer
  text: When did you get finally get a decent bedtime?
- speaker: Interviewer
  text: You were ready...
- speaker: Respondent
  text: I don't know, I can't remember exactly when lights were out... maybe eight o'clock at night. Eight or nine, one of
    the two, I can't remember just when exactly it was cause you know you got into a routine finally. And, when you hit the
    sack you were out. And I mean you were out. You were running all day doing different stuff.
- speaker: Interviewer
  text: How was it to learn to march?
- speaker: Respondent
  text: It's kind of, well different, especially when you are standing and you're in the chow line, cause you march up to
    the chow line and mark time, you mark time by cadence, stand there, standing still just moving your feet up and down.
    I didn't get it one time, and the drill instructor came up and said you got the wrong foot and kept kicking me in the
    shin and ankle. And the more he kicked the more upset you get and he kept kicking me and I couldn't get back in step to
    save my soul. He was kicking my shin, O boy that was something else. You laugh at it now, but it wasn't too funny then.
    Then he would catch guys smoking, and you're not supposed to smoke unless they tell you that you could smoke. You know
    smoking lamp on or smoking lamp out, or something to that nature. And guys would go hide somewhere, or try to hide somewhere
    and smoke. And they would get caught, then they would put a cigarette in your mouth and light it up, then a bucket over
    their head, and then a blanket over the bucket and then they would smoke them out. They got smoked out all right. One
    poor soul got some candy in the mail, and the drill instructor had him laying on the floor and he said open your mouth
    he kept throwing pieces of candy into his mouth and what are you ... you are the scum of the earth. Yes Sir, I'm the scum
    of the earth and kept throwing candy into this guy's mouth. Another guy got some gum in the mail and he thought he could
    get away with gum, you know one stick, and the drill instructor felt and he felt that gum in there. He told them to swallow
    it. You write home and tell them not to send you anything in the mail. Don't send nothing in the mail - no candy, gum,
    cookies or nothing.
- speaker: Interviewer
  text: Did you write home a lot?
- speaker: Respondent
  text: Yeah, I wrote home quite often. That's for sure.
- speaker: Interviewer
  text: How long is it before you actually get your mail?
- speaker: Respondent
  text: Oh, geez I don't know. It wasn't too fast back then, like it is today. Maybe a week or so, before you get a letter,
    over a week or so.
- speaker: Interviewer
  text: Did they censor your mail?
- speaker: Respondent
  text: No, they would look for like gum and stuff or candy or something sent, some kind of thing like that. No they didn't
    my niece said that sometimes when they censored your mail to make sure that there is nothing going on.
- speaker: Interviewer
  text: Wasn't she in Iraq time wasn't she?
- speaker: Respondent
  text: No, well she was, she wasn't in basic training during that time, she was living and working in California when 9/11
    happened and she was eight months pregnant too so she wasn't going to go anywhere. Definitely wouldn't be going to a combat
    situation being pregnant for sure. You didn't have to go to combat, missed the Korean War totally. I was right there in
    Japan though. Right across the bay there, right across the Sea of Japan there.
- speaker: Interviewer
  text: When did you go there?
- speaker: Respondent
  text: Oh, let's see, the summer of 1954 right after basic we went to combat training. And then we went from combat training
    took a, it was a merchant ship, we took over. I forget how many personnel that ship carried, carried a lot of Marines
    though. It had like 11 racks going up that everyone slept in and I didn't get the bottom rack, because I did so good if
    you get sick, you know. We were fortunate that we didn't have duty on the ship, so just lie around. Then we would run
    into a storm and I was going to down and have some food, you know chow, before that wave hit me, and the smell of that
    food, I got back up and ran upstairs and stuck my head over that railing there, but I didn't do anything. I stayed outside
    as much as I could all the way on that trip, cause of that storm man it was rocking back and forth, making you seasick.
    A lot of the guys going to the head you know, the whole this full of vomit, everyone just vomiting you know. I wonder
    why they didn't give you anything for seasickness. I don't know. From what I have heard, a lot people get seasick. We
    were on a cruise once and we were rocking back and forth, but I didn't get sick, but I can imagine how.
- speaker: Interviewer
  text: So where did you go in Japan?
- speaker: Respondent
  text: It was a little place called Gotemba. The base was outside of Gotemba, you know over by Mount Fuji. I spent 7 months
    there.
- speaker: Interviewer
  text: Did you get any leave time over there?
- speaker: Respondent
  text: No, I mean you got, if you wanted to go out on liberty, you could go out. Go ahead and meet with the people, but you
    couldn't understand them anyways.
- speaker: Interviewer
  text: What was it like there?
- speaker: Respondent
  text: It wasn't the best.
- speaker: Interviewer
  text: It wasn't the best?
- speaker: Respondent
  text: No not really, I didn't care much for Japan. The base was all right; they had pretty good food there. We had nice,
    halfway decent barracks and stuff there. And we just went out on maneuvers and training around on the countryside.
- speaker: Interviewer
  text: Did you see the way they lived over there?
- speaker: Respondent
  text: Different life style. Little square houses?
- speaker: Interviewer
  text: Yeah, it was different.
- speaker: Respondent
  text: So what did you do in Japan?
- speaker: Interviewer
  text: Just went on maneuvers, trained a lot of training.
- speaker: Respondent
  text: What are maneuvers?
- speaker: Interviewer
  text: Well that is where you go out and train.
- speaker: Respondent
  text: Ok, I didn't know that is what that word was used for. When you have different simulated combat situations when you
    go into the simulated combat situations. And there you did what you had to do. Live firing exercise and stuff.
- speaker: Interviewer
  text: Since you were in the artillery -
- speaker: Respondent
  text: I wasn't in the artillery, infantry. I was shooting them up. Shooting up the countryside, they had some dummies out
    there popping up on you. You had some kind of course you run, but the pops up like the enemy pop up in front of you and
    then you shoot them. A lot of fun.
- speaker: Interviewer
  text: Yeah, it was fun.
- speaker: Respondent
  text: I wouldn't want to do it. Spend overnight, cause a lot of overnight things in the wintertime it was fun too. In your
    sleeping bag, that's all you had, just a sleeping and your bag back and stuff. And the snow would be like a foot of snow
    and you wake up and then you see guys popping out, their heads popping out of their sleeping bags. Cause you couldn't
    see nothing, cause it was all full of snow.
- speaker: Interviewer
  text: Didn't know it snowed in Japan.
- speaker: Respondent
  text: Oh yeah, I have had a kid from California that never seen snow. Went kind of crazy when he first seen his first snowfall.
- speaker: Interviewer
  text: How long were you in Japan?
- speaker: Respondent
  text: Seven months.
- speaker: Interviewer
  text: Where did you go after that?
- speaker: Respondent
  text: Back to Camp Pendleton. I come back with the first marine division from Korea. Come back in convoy. It was a fun trip,
    thirty days at sea. And you run out of fresh water showers.
- speaker: Respondent
  text: Ever take a saltwater shower?
- speaker: Respondent
  text: Haven't lived then. I wasn't complaining, just had it more rough there than what we had it, the guys in Korea. 10
    times worse than what we had it, but it was just an experience. Come back in convoy, about 30 ships.
- speaker: Interviewer
  text: What did you do when you got back?
- speaker: Respondent
  text: Same thing I did over in Japan.
- speaker: Interviewer
  text: Same thing?
- speaker: Respondent
  text: Maneuvers, training a lot of ships to shore, landings.
- speaker: Interviewer
  text: And they pay you for that?
- speaker: Respondent
  text: Oh yeah, oh yeah, it wasn't easy I will tell you that. Twenty mile hike and go pack in 117 degrees outside.
- speaker: Interviewer
  text: You did your little training maneuvers there. Were you awarded any medals?
- speaker: Respondent
  text: Just a National Defense and Good Conduct Medal.
- speaker: Interviewer
  text: How do you get those?
- speaker: Respondent
  text: Just National Defense is just a National Defense ribbon. And the conduct just for being a good boy.
- speaker: Interviewer
  text: Where do you keep those, I have never seen them?
- speaker: Respondent
  text: I don't even have them.
- speaker: Interviewer
  text: You don't have them?
- speaker: Respondent
  text: I don't even know where they are.
- speaker: Interviewer
  text: Do you still have your uniform?
- speaker: Interviewer
  text: There is a picture of your guys. Is this the first days?
- speaker: Respondent
  text: Oh I don't know, I couldn't even tell you. We had been there for a while. That guy sitting down there is the platoon
    sergeant. That is not all the platoon that is just part of us. There are usually around thirty guys to a platoon I think
    it was.
- speaker: Interviewer
  text: So that guy sitting down here?
- speaker: Respondent
  text: Yeah he was a platoon leader, sergeant.
- speaker: Interviewer
  text: And it looks like that guy is pretending that he is choking him.
- speaker: Respondent
  text: No he is just messing around.
- speaker: Interviewer
  text: That looks funny.
- speaker: Respondent
  text: He might have been the medical corpsman, but I can't remember if it was him or this other guy. We have a medical corpsman
    with you, in case you get hurt. A bunch of young looking lil guys there, gosh.
- speaker: Interviewer
  text: Yes that was '54. Any woman running around the boot camps?
- speaker: Respondent
  text: No, I mean there were woman marines but they were in different areas. You wouldn't see them. A friend of mine was
    in the air force they had, they were together, but when they went to the kitchen, or wherever to eat she said the woman
    were not even allowed to look at the men.
- speaker: Interviewer
  text: Yeah we were completely separated from them.
- speaker: Respondent
  text: There was no contact with them I guess if they wanted to eat and sit down at your table then you had to get up, or
    she had to get up.
- speaker: Interviewer
  text: And then, your rank, you ended up being discharged as a sergeant, and you were there for almost three years. How long
    did it take you to get sergeant?
- speaker: Respondent
  text: Well I went from private, to PFC when I finished boot camp and then I think when I got back to the states I made corporal.
    And then just before I got out I made sergeant. I went to non-commissioned officers' school for a month I think it was.
- speaker: Interviewer
  text: Oh, I didn't know that.
- speaker: Respondent
  text: Yeah, it's on there, on my DD214. No they just call it leadership school.
- speaker: Interviewer
  text: Oh I see it, they call it leadership school on this thing, the way I see it MCO School, not commissioned officer school.
- speaker: Respondent
  text: Atomic biological chemical war. Yeah I went to that course too. Had to get myself a shot in the leg.
- speaker: Interviewer
  text: Shot in the leg, for what?
- speaker: Respondent
  text: This anti virus thing, whatever it is, had to simulate that you got this virus or something that put biological warfare.
    Then you had to give yourself a shot, shot in the leg.
- speaker: Interviewer
  text: Then you finished high school.
- speaker: Respondent
  text: Yeah, there.
- speaker: Interviewer
  text: Wow, ok, what is this say? Pay one hundred dollars MOP. Mustering Out Pay. Ok, recommended for reenlistment, they
    wanted you back?
- speaker: Respondent
  text: Yeah, they didn't want to let me go, no. I have never seen that on a DD214. Now I will have to look at them, I have
    never seen that, looking at them. Yeah they wrote, the commanding officer, wrote me a nice letter of recommendation. They
    don't do that very often either, I don't think anymore, they could I suppose. If I could find it I would show it to you.
- speaker: Interviewer
  text: Yeah, get me a copy of it.
- speaker: Respondent
  text: If I can find it, I don't know where it is, might be in - somewhere - in a box somewhere, God only knows where though.
    Yeah.
- speaker: Interviewer
  text: Did you do anything special to help you get thru basic training?
- speaker: Respondent
  text: Prayed a lot.
- speaker: Interviewer
  text: Prayed a lot?
- speaker: Respondent
  text: Get kind of religious during that time.
- speaker: Interviewer
  text: Yeah, my son, he is in the air force, he prayed a lot too.
- speaker: Respondent
  text: He turned to God, of course that's nothing new compared to the Marine Corps. Basic, they put you thru your paces.
    Going in a civilian, and then coming out a marine, man its, whew, they put you thru your paces.
- speaker: Interviewer
  text: You wrote letter to home. Did you make any phone calls?
- speaker: Respondent
  text: Oh yeah. Whenever I could. I remember my brother when he was in the air force he would tell us when he was going to
    call. I will be there.
- speaker: Interviewer
  text: I will be there for the phone call, yeah.
- speaker: Respondent
  text: He didn't make it thru the whole six weeks.
