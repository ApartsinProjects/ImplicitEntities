source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: So tell me how you came to be a Marine?
- speaker: Respondent
  text: In high school I joined the local Marine Corps Reserves and I joined basically to play basketball for the Marine Corps
    Reserve, and from then on -- I joined in March of 1950. The Korean War started June 1950. And our unit was activated in
    July, I think around July 15, 1950, and we were called to active duty for the Korean War. I was 17 at the time.
- speaker: Interviewer
  text: So being a 17 year old, what made you decide to enroll? What made you get into it in high school. Let's go back just
    a little bit?
- speaker: Respondent
  text: Well, basically I just -- maybe I just wasn't good enough to play high school basketball but the Marine Corps would
    let me play basketball. And truly it was about six of us in my class that joined this reserve unit. And we -- consequently
    we all got called to active duty and since then our high school won't even allow a recruiter in there.
- speaker: Interviewer
  text: Oh, really?
- speaker: Respondent
  text: No, they won't allow a recruiter there because all these boys were all called to active duty.
- speaker: Respondent
  text: We were very fortunate. Out of all of us that went none of us were wounded, nobody killed.
- speaker: Interviewer
  text: Wow, that's incredible.
- speaker: Respondent
  text: We had one Army -- one soldier friend of ours that was killed but other than that we were very fortunate.
- speaker: Interviewer
  text: My goodness. That is fortunate. How long were you in Korea?
- speaker: Respondent
  text: I was there 11 months.
- speaker: Interviewer
  text: Okay. And tell me a little bit about what you saw in Korea for 11 months?
- speaker: Respondent
  text: Okay. I was in a heavy weapons company.
- speaker: Interviewer
  text: Is that where you started?
- speaker: Respondent
  text: Yes, in Korea. That's what I trained in. I was trained in 3.5 rockets, anti-tank assault. And when we got to Korea
    there was virtually no enemy tanks and so they changed us and put us on machine guns, trained us all on machine guns,
    how to be attached to infantry companies, rifle companies. And in the whole time I was in Korea I fired three rockets
    and that was all in practice for familiarization. The rest of the time it was all carrying machine guns.
- speaker: Interviewer
  text: Yeah. How long did it take them to decide that you would switch over, that your whole company would switch over?
- speaker: Respondent
  text: Instantaneous.
- speaker: Respondent
  text: The minute I got to Korea because we were on the east central front of Korea. It was all mountains. Basically there
    is no tanks. There's no flat ground whatsoever. So that's -- that was the reason for training us in the machine guns and
    being -- we would reinforce rifle companies.
- speaker: Respondent
  text: So that was the reason for that.
- speaker: Respondent
  text: We always had the 3.5 rockets now. We had them but we never used them in combat.
- speaker: Interviewer
  text: The three that you used for training was that in Korea or was that here?
- speaker: Respondent
  text: Yeah, familiarization, just to make sure we didn't forget what we learned.
- speaker: Interviewer
  text: Okay, okay. Good. So what was it like being in a very mountainous place there?
- speaker: Respondent
  text: What was it?
- speaker: Interviewer
  text: What was it like?
- speaker: Respondent
  text: Oh, the hills. They called them hills. You're talking 800 meters, 700 meters, and we were in the assault phase. And
    I was very fortunate because I was never attached to a rifle company per se. If they were in the assault we were delivering
    overhead fire to them, in support of them. I wasn't in the actual part of going up this hill, mountain. It ain't no hill.
    They're mountains. And these poor fellas were crawling in everything they could to get to the top of this hill. So we
    would support them with our heavy machine guns and fire overhead to keep the enemy's head down. We never knew what we
    were shooting at. We were all being directed by forward observers.
- speaker: Respondent
  text: So like I say, kill ratio, I couldn't tell you if I killed anybody or not because you never saw what you were doing,
    where it was hitting.
- speaker: Interviewer
  text: So how was it dealing with that? It's one thing if you know that you killed somebody. How is it dealing with the fact
    that you may or may not have?
- speaker: Respondent
  text: It doesn't bother me one bit. He would have killed me if he got a hold of me. It didn't bother me. You don't like
    to see your own dead. Now that has a very bad effect on morale when one of your own -- when I say "one of our own," when
    I see a Marine that has been killed, it's something that you will never forget and it's always there in the back of your
    head.
- speaker: Interviewer
  text: Is it still with you today?
- speaker: Respondent
  text: Oh, sure. I don't like to see any -- I don't like to see a Marine dead, even this Iraqi war I don't, I don't like
    to see any of it; but it happens and you have to face it. It's going to be there.
- speaker: Interviewer
  text: How do you face up to it? What do you do?
- speaker: Respondent
  text: Accept it. You just accept it. You have to. Same with the wounded. You know, the wounded -- walking wounded are fine.
    You know those guys are a going to most likely -- it's the ones that are in a stretcher that got terrible wounds and --
    they're the ones you worry about. And eventually if you were close enough to these people the word would get back. They
    make sure that you're told how his survival was, if he survived or if he died from wounds.
- speaker: Interviewer
  text: So just by word of mouth?
- speaker: Respondent
  text: It comes back to us through our commanding officers.
- speaker: Interviewer
  text: Oh, really?
- speaker: Respondent
  text: Yes. We have these what they call a little critique and we sit down and it passes right on down from the non-commissioned
    officers right down to us on a squad level and we know. They keep the word going. Keep us informed; that's what it is
    really.
- speaker: Interviewer
  text: Okay. So when you say that you have to accept it, were there certain things that the troops used to do that -- did
    everybody go out for a drink, was it okay to cry?
- speaker: Respondent
  text: Oh, yeah, you could. If you wanted to pull back -- say if a fellow is real close to you -- I'm going to use the term
    "foxhole buddy" or something like that, inseparable, the impact of that is trying; it's very trying. And I was -- I had
    lost two that were killed to artillery mortar fire. And you just don't get over it right away. You put it in the back
    of your head and it's there. He's replaced right away so you move up the ladder. The chain of command comes up and your
    last ammunition carrier moves up to third ammunition carrier and the third moves to second and so on and so forth. That's
    how the replacement is. And so in this case it was assistant gunner, and my first ammunition carrier moved up to assistant
    gunner. And he replaced the plan who was killed. And it was all due to shrapnel.
- speaker: Interviewer
  text: So did both -- did both of these losses occur during the Korean War for you?
- speaker: Respondent
  text: Oh, yes, yes.
- speaker: Interviewer
  text: Okay. And let's see -- so one was an assistant gunner?
- speaker: Interviewer
  text: What was the other one?
- speaker: Respondent
  text: First ammunition carrier.
- speaker: Interviewer
  text: First ammunition carrier. Okay. And what role were you playing at the time? What was your rank at the time?
- speaker: Respondent
  text: I was a gunner.
- speaker: Interviewer
  text: Gunner. Okay. Tell me what it's like to be a gunner?
- speaker: Interviewer
  text: What it's like to be a gunner?
- speaker: Respondent
  text: You work up to it, see. It's -- well, how can I say, it's a prestigious title. I didn't get the rank that went with
    it. It's supposed to be a corporal and I was a private first class. I went to Korea as a private first class. I came home
    as a private first class. And we weren't screw-ups. We were a good bunch of boys but we were still anti-tank assaults,
    3.5 rockets. They never considered us machine gunners even they though they attached us out.
- speaker: Interviewer
  text: So let me clarify that and make sure I understand. So you were supposed to go in as the 3.5 rocket troop?
- speaker: Interviewer
  text: And because of that, had you continued in that role you would have stayed a private first class but what happened
    was they changed what your responsibilities were and then you grew based on these new responsibilities, but they didn't
    give you the rank that they would normally assign to those responsibilities?
- speaker: Respondent
  text: Right, that's very true.
- speaker: Interviewer
  text: Oh, my goodness.
- speaker: Respondent
  text: We never got the rank. None of us were ever promoted to corporal.
- speaker: Respondent
  text: And our squad leader at the time was a PFC also and they just automatically when they found out about this boosted
    him right to sergeant. He skipped corporal and went to sergeant. But they passed us all over. I didn't care. I wanted
    to go home. It didn't make a difference to me. I was getting close to the time to go home, so I didn't really care. I
    was still doing a corporal's job and not getting paid for it.
- speaker: Interviewer
  text: Well, oh, boy. So what was the job like? What was it like to be a gunner? I know you had to grow into it.
- speaker: Respondent
  text: Well, okay, what I'm doing is I'll bring you up to when everything stopped. We had the peace talks going on at Panmunjom.
    And our line, our front lines were statics. We never moved. Winter came in, winter was coming in on us so we just dug
    in on a ridge. That's where we stayed. And the only thing that we would do, we would go out maybe on patrol. And we would
    be attached out to rifle companies. A rifle platoon would go out and they would send us out with them for extra fire power.
    We would ambush them. They would ambush us. It was a waste of time as far as I think. There was a lot of intelligence
    that we had to pick up. Try to capture them. They tried to capture us. So that's all it was like patrol action. Defensive.
    And you would dig your guns in, your machine guns that were all dug in. Fields of fire were cleared for you, in the event
    they come after us; and we were -- the guns were locked. See, we were in the water-cooled machine gun and you could lock
    so it wouldn't come up, you could lock side to side. And all you had to do is just move it, pull the trigger. And we had
    stakes set out, wooden stakes so that you could only traverse so far because you would be firing into our own lines, see;
    that's what they call fields of fire. So that's what that was. But that's how it ended up in the winter. We were stuck
    on a ridge.
- speaker: Interviewer
  text: Was it very cold there?
- speaker: Respondent
  text: Very cold, very cold. I was on the line, let me see, the day it snowed and that was in early -- late, late October
    and I was on line, let's see, Marine Corps birthday, Thanksgiving, Christmas and New Year's, we were all on line. And
    they relieved us some time, I'm going to say in the latter part of January they pulled us back. The Army troops, the Army
    personnel relieved us. But I saw every one of them holidays on the front line. And snow, snow like you can't believe,
    blizzards; and if we're just as miserable, they're miserable too. I don't forget those things.
- speaker: Interviewer
  text: So Thanksgiving and Christmas up on the line there?
- speaker: Respondent
  text: Yeah, they flew up turkey to us.
- speaker: Interviewer
  text: Oh, they did?
- speaker: Respondent
  text: Oh, sure. How they would do this is I had a seven man squad, so two men at a time, they set up a tent on the back
    side, the reverse slope of the ridge. And they flew in all this turkey for Thanksgiving and they had a warm up tent where
    you could sit down and eat. Only two at a time could go. Two could go eat and when they came back two more would go. Well,
    nine times out of ten the guys that went to eat would bring back their food just so it would speed things up. And it was
    snowing terrible. And I was very fortunate because when my turn came, the assistant gunner and myself, we went down there,
    got our food and came back, and a mortar round landed right on the tent. They just hit us, 120-millimeter mortar. Just
    tore that place apart, got all these guys in that tent. And God was with us. I don't know why we did but none of my people
    sat in that tent and ate that Thanksgiving dinner. They all came back.
- speaker: Respondent
  text: Very fortunate.
- speaker: Respondent
  text: But it wounded a lot of Marines in there.
- speaker: Interviewer
  text: You're talking to somebody who has never been in the service and lots of other people who will hear these interviews
    as well, what does a mortar look like? You gave me the size of it, 120 millimeters?
- speaker: Respondent
  text: Yeah, it's almost four inches around and it's, I'd say maybe two feet, maybe two and a half feet long and it goes
    into a tube, and it's a high angle, high angle weapon. And they can -- the Chinese were good. They could drop that --
    well, how can I say? They were good. They were really good. It's all done with mathematics.
- speaker: Interviewer
  text: Oh, really?
- speaker: Respondent
  text: Yeah. Now it's different but in those days they did it with mathematics. And the Chinese were the best. Boy, they
    could lock that thing right in your lap. They were scary. It was really scary. There is an old saying that they say, the
    round that gets you you never hear. And if you hear them coming in, well, you know it's going to miss you. And you can
    actually, you get used to them. You can tell if it's going to go over your head or if it's going to drop short; but the
    closer it comes to you, you don't have that much time to hear it. It just shh and that's it. And that's close. That's
    real close.
- speaker: Interviewer
  text: How many times did it come close to you?
- speaker: Respondent
  text: It came so close it knocked me right in the hole.
- speaker: Respondent
  text: I was sitting right up on the parapet, my assistant gunner and me, and it was quiet, nothing going on, and we had
    a deck of cards and we were playing a game called Crazy Eight. And it was beautiful. Nothing going on. Nothing. All of
    a sudden around came in. We didn't even hear it. And that round landed so close that the concussion knocked us into a
    hole and wounded all these Marines in back of us. And we never got a scratch.
- speaker: Interviewer
  text: How many people were there in your unit?
- speaker: Respondent
  text: In my company?
- speaker: Interviewer
  text: Well, tell me a little bit about that actually. What's the difference between a company and a battalion and a division?
- speaker: Respondent
  text: Okay. All right. Now, I was in a heavy weapons company, so in that company you have, you have anti-tank assault which
    is the 3.5 rockets; you have heavy machine guns which are all water-cooled guns; you have 81-millimeter mortars; and you
    have demolition and flame thrower. Now, that's four platoons in that company, heavy weapons. And we comprise about, I'm
    going to say mayb
