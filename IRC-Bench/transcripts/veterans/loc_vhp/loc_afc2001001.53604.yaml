collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: Okay. My name is Alfred Charles Anderson. Nobody calls me Alfred. I never forgive my mother for that. To my family,
    I'm Al. To the military, I'm Andy or chief.
- speaker: Interviewer
  text: Now, tell me where you were born.
- speaker: Respondent
  text: I was born in Philadelphia. I don't let that out very often. I claim Wilmington primarily as my home because I lived
    in and around the Wilmington area from the time I was 5, until the time I was 14. At which time, my family moved to a
    little town of Viola, Delaware. Population 105. My dad wanted to know if my mother would be happy there. And she was sure
    she would. We had to keep a roster of people who wanted to visit us to go crabbing at Barkers Landing or be down in the
    country. We had what we called a house with a path, a path to the outhouse and a pump on the porch, and a cook stove in
    the kitchen which heated the whole house. We didn't open the living room in the winter, unless we had company coming.
- speaker: Interviewer
  text: Do you remember Pearl Harbor Day?
- speaker: Respondent
  text: Do I remember Pearl Harbor Day? Very vividly. I was at home in Viola, and as it happens, both my brothers were there,
    and we were stunned and shocked. I think we found out about 1:30, 2:00 in the afternoon is my recollection, and we hung
    on the radio for the rest of the evening and into the night. Very upset. Very alarmed. Of course, the general consensus
    was that them little runt, blind suckers, we're going to clean their clock. So I remember Pearl Harbor Day very well.
    I was 16, I believe. Maybe 17.
- speaker: Interviewer
  text: How soon after that did you go in or --
- speaker: Respondent
  text: Well, from December the 7th, I didn't go in until February 19th, 1943. In the interim, I had brilliantly left my senior
    class in high school to go join the Navy. The Navy turned me down for being colorblind, and I decided the hell with them.
    I would wait until they drafted me. Having worked in the shipyard as a tack welder, one rainy day, sleet and rain coming
    down, every time I struck an arc with my welding rod, I was getting knocked down. So I threw it down, shut off the machine,
    went and looked for my brother, and said, I don't believe the Army can be this bad. He said, boy, we better check out.
    We have to discuss this. You and I, we've done many things together, but I have to tell you, this I'm not going to do
    with you. I am not going in the damned Army. So we promptly went up to the draft board. I went up and demanded to be drafted
    forthwith, and they didn't take me for about four months. I quit the yard that day, drove my parents crazy for about four
    months with my drinking, carousing and general misbehavior. Finally, they caught me, and I was grateful to go. I left
    from Harrington, Delaware, went to Philadelphia, then caught a bus across the river to Camden. The day before, some Delaware
    boys from Wilmington had torn up the bus on the way over to Camden. So the next day, they had cops escort us across the
    river because Delaware boys had a bad reputation. At that time, you were given 21 days after induction to straighten up
    your affairs. I told them I didn't want any 21 days. I want to go now, today. I thought it was pretty audacious of the
    Marine Corps and the Navy to have men there to ask if I wanted to join the Navy. I politely informed them no, they had
    their opportunity and missed it, and I was going all Army. I went to Fort Dix for a few days, then shipped out with the
    blinds drawn. The train was going to Wilmington. We were guessing what was going to happen, but the guy said the regular
    Army guys had their Air Force patches off. You think we are going to the Air Force? I said no, but I sure hope so. The
    train headed south for about two days, and we wound up in Miami Beach. I didn't know Miami and Miami Beach were two different
    places. I went with some Wilmington boys, but most were from North Jersey and New York City. They were a tough bunch.
- speaker: Interviewer
  text: Go ahead. Just take your time. Have another drink.
- speaker: Respondent
  text: Yeah, have another drink.
- speaker: Interviewer
  text: You want another cigarette? Get him another cigarette.
- speaker: Respondent
  text: I was 18 at the time, and we were jubilant, clowns and had a good time. The funny part is, I only did 18 days in basic
    training in Miami Beach. They put out a notice that anybody who would volunteer to be an aerial gunner would be sent to
    Buckley Field, Colorado, and Denver, Colorado, to attend armament school, then gunnery school, and be made sergeants right
    away. My older brother, old Army, told me don't volunteer for anything, just pull your duty as posted. But being 18, going
    to be a sergeant in six months, leather jacket, helmet, goggles, white scarf and wings, too much for my ego. Most of us
    at that age wonder if we have the guts to fight in a war. I succumbed and went to aerial gunnery school. Got my leather
    jacket, sunglasses, goggles, wings, became a sergeant, but I knew I was going to pay dearly for that leather jacket and
    goggles, and I did pay, in spades.
- speaker: Interviewer
  text: When did you, from there, ship out to?
- speaker: Respondent
  text: Shipped out to Replacement Depot in Salt Lake City, Utah. From there assigned to different training bases. Sent to
    Moses Lake, Washington. I didn't know there was a desert in Washington until I got there. Black sand, rocks, tar paper
    shacks to live in. We assembled into crews, met our pilot and copilot one at a time until we got a crew. One night we
    got our copilot, Walter Krohl from Wilmington, who became our copilot. Weather stayed too bad to get flying, so transferred
    to Drew Field, Tampa, Florida. Rode a train from Washington to Tampa. Only time I slept with another man in the military
    because of the pullman bunks. Trained in Tampa, then went to Langley Field, Virginia, to be radio trained. Called the
    4th Sea Search. Flew up and down the coast for two months. First time I came home in 10 months. Family didn't have a telephone.
    Brought some crew members home to Viola to meet my parents. Many nights flew cross-country training from Langley to Harrisburg,
    Pittsburgh, Philadelphia, down the coast. Flew over my own home at 8 or 9,000 feet, liked to get in the tail, turn on
    the radio, listen to music, study the coastline. Sometimes day, sometimes night. Then shipped out from Langley to Grenier,
    New Hampshire, then Goose Bay, Labrador. Snow was 12 to 14 feet high on either side of the aircraft. Flew individual flights
    to Meeks Field, Iceland, got lost, had weather. Two engines stopped from fuel starvation, nearly out of gas. Spent the
    night, fueled up, then flew into Nutts Corner, Ireland. Split up and went to Bovingdon for lectures from guys who had
    been flying and British bomber crews. My radio operator made a friend named Counts who told him to shoot himself in the
    foot because chances of living were nil. There were different eras flying out of the 8th Air Force over Europe. Boys who
    flew in 1943 caught hell, no fighter escort, untrained for 50, 60 below zero weather, lost a lot of aircraft. When I started,
    we were just beginning to get fighter escort. Bombers alone couldn't defend themselves despite 12 or 13 guns on each plane.
    After the invasion, enemy pushed back, antiaircraft guns were mobile and fire became more intense. I rarely fired my guns,
    was more a tense passenger, witnessed aircraft going down. Saw one of the first ME-262 German fighters come through our
    formation so fast pilots wondered what it was. Rate of closure of aircraft was so fast you had to pay close attention
    or die tensed up. It was scary as hell.
- speaker: Interviewer
  text: How many missions did you do?
- speaker: Respondent
  text: I did 26. On the way over, my pilot became ill. I wasn't conscious of it, dumb, young. He had blinding headaches,
    which I learned later were migraines linked to fear. My pilot was relatively wealthy, had a $5,000 Pate violin, a gentleman's
    gentleman. It took guts to ground yourself and face your crew after training for almost a year. He was grounded and never
    flew a mission. We became spares. They didn't call for spares until they found out the target. I may have flown with four
    strange crews. Not pleasant flying with a strange crew, not that they weren't accommodating, but they didn't know you
    and didn't want to know you. The potential for danger was great.
