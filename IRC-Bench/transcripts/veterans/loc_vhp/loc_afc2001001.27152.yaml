source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: I enlisted in the Army. Before the military--there wasn't any--the Korean War hadn't started yet. I mean not--not
    it had started or was getting ready to start like that but then I had not been alerted for overseas shipment until about--about
    1951.
- speaker: Interviewer
  text: Yeah. How did you feel about going over to the war? I mean not to the war--when you enlisted how did you feel about
    enlisting--like if a war actually did start were you--
- speaker: Respondent
  text: Well, at a young man at that age my attitude was it was a new experience, and I really don't know what to be afraid
    of. Until I got there and seen what was going on, you know. I mean there was a bunch of guys, Haha. Yeah, we're going
    over, you know and nobody really knows what to be afraid of until you get there and you see what occurred to the guys
    that were there already, and then you begin to take--a get a little comprehensive.
- speaker: Interviewer
  text: How were--when you did get over there how was everybody's--what was everybody's kind of like mind set on after they
    did get over there they did see well what happened was everybody ready for what was getting ready to go? Was everybody
    scared--was everybody--
- speaker: Respondent
  text: No. Nobody was really scared. I can't say I ever knew anybody that was really scared. I really can't. When we went
    over, we shipped out from San Francisco and then when we docked we docked at Yokohama, Japan and we stayed there for--processed
    there for a week or so and then we shipped on to Korea.
- speaker: Interviewer
  text: To Korea. What were--what were kind of your like your sleeping habits? Did you--were you--did you sleep? Did you get
    a lot of rest? Did you get a lot of sleep or were you--
- speaker: Respondent
  text: Oh yeah. As a rule they kept you kind of busy and all that. You didn't--as a rule you were pretty tired. Ready to
    hit the sack when the time came.
- speaker: Interviewer
  text: Yeah. About chow time, did you get any kind of--was there a certain time that you ate?
- speaker: Respondent
  text: When you're not around where you snack all the time believe me when chow time comes you're ready to eat.
- speaker: Interviewer
  text: Yeah. What was your first kind of like war time experience? Like when you first went into combat?
- speaker: Respondent
  text: Well, when I first got to Korea we landed at________ Korea, North--or South Korea and your first experience--I mean
    you're assigned to an outfit first. I was assigned to the 3rd Infantry Division 7th Regiment and then once you're in your
    outfit like that and before prior to going to the front you're assigned a duty. you're assigned either as a rifleman or
    whatever like that. Well, I got the word that I was probably going to be the lead scout and to myself I thought, 'Lead
    scout. Gee, that sounds pretty good,' you know. Until you find out what the lead scout is.
- speaker: Interviewer
  text: Yeah. A And believe me its not what it's all cracked up to be. The lead scout goes--leads the squad. When you're on
    patrol that's why they call you a scout. you're the head of them like that you know and believe me it's not fun.
- speaker: Respondent
  text: Why were you a sound-assigned lead scout? Was there any kind of reason why you were assigned to it?
- speaker: Interviewer
  text: Because it--it was available and they had to have one. So me being the new--a new replacement as it were they assigned
    me that job, you know.
- speaker: Interviewer
  text: And I had it for a while and then after a while the bazooka gunner rotated and I was given the job of being the bazooka
    man.
- speaker: Respondent
  text: How was that? Did you like that better than being lead scout?
- speaker: Interviewer
  text: Believe me I did. I liked it much better then being the point man.
- speaker: Interviewer
  text: you're either called the point man or a lead scout and they call you a lead scout to make it so und exciting, you
    know, but actually you're the point man. you're the first man in the squad when you go on patrol like that you're--you're
    a head of the squad leader even.
- speaker: Interviewer
  text: And that's what that was all about. Then I got the job of being the bazooka man.
- speaker: Respondent
  text: Is the bazooka man kind of like in the back?
- speaker: Interviewer
  text: you're used for some times if you're--give you a firing mission. it's usually a enemy position or enemy bunker or
    whatever. They see maybe enemy vehicles or something like that you know and you're given a mission to fire on that and
    destroy it, you know.
- speaker: Interviewer
  text: And let's see that pretty well covers that
- speaker: Respondent
  text: Did you like your squad leader? Did you like him--
- speaker: Interviewer
  text: I had no problem with any--with any of the squad leaders or any of the guys in the squad. No problem at all. We all
    got along pretty good and first time in combat you're--of course, you don't know really how to react, you know, you don't
    know what to do like that.
- speaker: Interviewer
  text: There was a particular time, I forget where it was, what part it was at, but we were on the front lines and from my
    position, like that, I could see tiny bunkers not in the not too far away, like that, in enemy position, like that.
- speaker: Interviewer
  text: that's why you had to keep your head down all the time. So, I got to thinking to myself I wonder if anybody is in
    that bunker. So I proceeded to opened fire on it, like that you know. Well, I fired on that bunker like that and the first
    thing you know mortar shells start dropping in around me, like that you know, and the platoon leader called me on the
    sound power phone like that and he told me to cease fire because I was drawing enemy fire in on us, you know .
- speaker: Interviewer
  text: I had to quit firing on the bunker and when I did that then the Chinese quit firing mortar shells on us.
- speaker: Respondent
  text: What kind of things did you see as a scout? Did you see--were you ever to actually find where the enemy was and you
    had to tell everybody?
- speaker: Interviewer
  text: Well, that's what we go out there for and we have a goal and if by the time we got to the certain point if we haven't
    encountered any enemy positions or any enemy fire or anything like then we draw back to our own position. If were satisfied
    then this particular area is clear.
- speaker: Respondent
  text: Being a scout did you ever get caught--did the enemy ever actually catch you?
- speaker: Respondent
  text: Never did that. Did they ever come close to actually catching--were you ever injured in the war?
- speaker: Interviewer
  text: No. I was lucky. A lot of guys weren't that lucky but I was fortunate and I never received any wound of any kind.
- speaker: Respondent
  text: Did you during the war--did you ever send letters back home? Did you ever write back home?
- speaker: Respondent
  text: To parents, did ya?
- speaker: Interviewer
  text: Absolutely. Write back home all the time cuz at that time I was single, you know, and before I went in the service
    I was still living at home, like that you know. So, I wrote readily or steadily to mom and dad so they would have an idea
    that I was okay over there, you know, and I tried to write as often as I could. Sometimes you were in a place where you
    couldn't--
- speaker: Interviewer
  text: Couldn't write letters, you know, but then at that particular time they had a system of rotation. Your outfit would
    stay so long on the front lines then you would be replaced by another outfit. They would come up and when they came up
    you'd withdraw to the rear and you'd be back there. that's what they your back there at the ______ you get to take a shower
    or bath, you're given clean clothes, and what have you like that, you know.
- speaker: Interviewer
  text: And then when your time back there is up then you in turn are sent to another part of the line to replace another
    outfit. Pull back like that and they had that sort of a rotation system.
- speaker: Respondent
  text: Yeah. Were you ever--during combat were you ever like by somebody when they got shot or were you ever right around
    somebody and you actually seen someone--
- speaker: Interviewer
  text: Not--not particularly but I did have a friend that I didn't see it happen but I was beginning to wonder where he was.
    I come to find out that he had caught one right to the heart and it was just one of them power-fire--fire-power things,
    you know, just a fire fight they called it.
- speaker: Interviewer
  text: And he caught one right to the chest and but I didn't see it happen.
- speaker: Respondent
  text: Yeah. Did you--did you ever know of when you were firing your gun--did you know of anybody that you actually killed
    over there--not know personally but I mean you know--did you ever actually see yourself kill someone when you were over
    there like another Korean soldier or anything?
- speaker: Interviewer
  text: No. Not really. I mean a lot of people have the idea as far as combat goes and I can't speak about other wars but
    a lot of people think that combat is like a Hollywood movie. I mean fighting, you know, all the time and stuff like that
    .
- speaker: Interviewer
  text: But that is not the case. I mean if you--if you open fire on the enemy I mean that enemy soldier really doesn't want
    to get hit any more than you do, so you may be firing at enemy soldier like that but he's staying down and you never know
    actually unless your in an all out assault or something like that you never know really if you hit anybody or not because
    like I said it's not a Hollywood war.
- speaker: Interviewer
  text: You know what I mean it's just a shoot out. I mean you're shooting at them. They're shooting at you.
- speaker: Interviewer
  text: that's what that a mounts to. But there's cases where in an assault, I mean, you're overtaking a position, like that
    you know, but in our particular outfit we didn't encounter too much of that most of our moving up was done at nighttime.
- speaker: Interviewer
  text: And we'd always call in a lot of cover fire. We call in artillery fire. We call in--it was artillery fire. We'd call
    into that they'd give us cover fire I mean bomb an enemy like that when the artillery shells are bursting all around the
    enemy they're gonna stay down.
- speaker: Interviewer
  text: And that gives us a chance to move up so far.
- speaker: Respondent
  text: How long--how long were you in combat?
- speaker: Interviewer
  text: Let's see. I got--I was in there for the last part of '51 and then most of '52 and yeah--yeah from that point on until
    about most of '52.
- speaker: Respondent
  text: Why you guys were in combat did you feel that--that you guys were able to not know the outcome of the war but the--like
    a victory--were you guys pretty--I don't know like the mind set was on you guys could win the war
- speaker: Interviewer
  text: It could of if there was a certain point in the Korean War prior to my getting there the American forces had pushed
    the Chinese clear back up to the Chinese boarder.
- speaker: Interviewer
  text: But then in the order for--they were beginning to negotiating for peace so therefore our forces had to withdraw to
    the 38th parallel.
- speaker: Interviewer
  text: They call it like that you know.
- speaker: Interviewer
  text: And that-that sort of a kind of a moral buster you might say cuz a lot of guys died pushing the Chinese back like
    that you know and they made us withdraw to the 38th parallel and sit there and it was sort of a moral buster but--
- speaker: Respondent
  text: Is that what time you came in the war was after the retreat or were you--
- speaker: Interviewer
  text: No. I was there when all that happened I was there until--I didn't get out of the army until December 08 of 1952.
- speaker: Respondent
  text: So, you were part of actually pushing to the Chinese Boarder?
- speaker: Interviewer
  text: No. We got there--when we got there our outfit then came to front was the 38th parallel and that was the place where
    you're shooting back and forth at each other. Like I said a while ago, you know.
- speaker: Respondent
  text: Yeah. Yeah.
- speaker: Interviewer
  text: They don't want to get hurt anymore than you do so they're not going to stand up there and charge all that kind of
    crap like a Hollywood show, you know.
- speaker: Interviewer
  text: They're going to stay down. You see a clear shot, boom, you let it go. Nine times out of ten or not that much odds
    you're gonna--you're just gonna waste you lead as a matter of fact.
- speaker: Interviewer
  text: But the greatest--the greatest sentence I ever heard when I was there, let's see I forget now, we were on a holding
    position--no we was on outpost--we were on outpost between our lines and the Chinese line. We were on outpost on a hill.
    We would hold that hill, you know like that you know. Well, when the supply patrol came out to us we replenish our ammunition
    all that like that you know.
- speaker: Interviewer
  text: I heard a voice say, 'Ader.' I thought oh now what. I said, 'Yo.' He said, 'Get your stuff together. you're going
    home.' And I could of grabbed that guy and kissed him when he said that because, buddy, I'm telling you I was awestruck
    there for a while. I was going home. I thought, gee, I forgot what that's like going home you know but I had to get my
    stuff together and go back to our lines with the supply patrol. Go back to the line. From that point on it was processing
    and doing this, doing that all the time until you--until you stepped on the ship and sent home, you know.
- speaker: Respondent
  text: What was the reasoning behind--how--why you were able to leave? Did you--
- speaker: Interviewer
  text: At point you had the point system, you know, and after you spent so much time on the front so much time on reserve
    and so much time doing this doing that you accumulated so many points and right off hand right now I can not remember
    how many but once you accumulate enough points then your rotated home. you're rotated out of combat. you're sent home,
    you know and that's the end of the line right there. And let's see you process in Korea and then you process--when you
    get to Japan and your processed more. When you get to our ship coming home we docked in Seattle, Washington and there
    was Camp Carson--there was Fort Loft at that time and we processed there and they sent us on to Camp Carson, Colorado
    where we processed there and at that point I was discharged at Camp Carson, Colorado, December 08, 1952, and from there
    they give you a one way ticket home. I went from there to Chicago and then from Chicago the train. I came down to Indianapolis,
    you know, and mom and dad met me at the depot down there. They knew I was going to be there like that you know.
- speaker: Interviewer
  text: How was that coming home?
- speaker: Respondent
  text: It was fantastic. It was fantastic. You had such a feeling of relief you know and you feel relief until your ship
    hits some rough weather and, boy, when that ship hits some rough weather--I mean if you haven't got a stop stomach then
    you're in trouble, you know.
- speaker: Respondent
  text: I can remember the day that ship we was on--on the way to Seattle. It was rough and I mean that ship was nosediving
    like this and coming up again and nosediving, coming up again like that you know and I saw more than one guy at the rail,
    you know.
- speaker: Respondent
  text: And at that particular time I smoked but all the time I was on shipboard I could not smoke a cigarette. I mean, as
    soon as I smelled smoke or something, I'd get nauseous, you know.
