turns:
- speaker: Interviewer
  text: Yes. They were originally born in Dominican Republic.
- speaker: Interviewer
  text: For work. My dad got work up there and then he went back to Dominican Republic, married my mom and then brought her
    back.
- speaker: Interviewer
  text: He was like a master electrician and he worked at like vocational schools and prisons, in the prison system.
- speaker: Interviewer
  text: So like when prisoners were about to be released, he would teach them a trade --
- speaker: Interviewer
  text: Yeah, that's right.
- speaker: Interviewer
  text: She did a little bit of work with like Shaklee vitamins. She -- we set up an office in our house and so she sold Shaklee
    vitamins through there.
- speaker: Interviewer
  text: She still pretty much does that more on a part-time basis now.
- speaker: Interviewer
  text: No. My only other was my grandfather served in the Dominican Army.
- speaker: Interviewer
  text: I went straight out of high school. I graduated June of 1987. I was in the Navy July of '87.
- speaker: Interviewer
  text: I went to boot camp in Orlando.
- speaker: Interviewer
  text: Yeah. Then I did air cruise school in Pensacola, Florida.
- speaker: Interviewer
  text: And then I went to like my job training in Memphis, Tennessee, and then finalized it in Jacksonville, and then I went
    to my regular squadron from there.
- speaker: Interviewer
  text: Did you have any specialized training?
- speaker: Interviewer
  text: Was there any particular reason you chose the Navy in place of any of the other?
- speaker: Interviewer
  text: Okay. And why did you want to go into aviation?
- speaker: Interviewer
  text: So the Air Force had required a college diploma or something?
- speaker: Interviewer
  text: So you attended boot camp in Orlando, you said?
- speaker: Interviewer
  text: Okay. Let me see. Specialized training. You mentioned that before. What was boot camp like?
- speaker: Interviewer
  text: What do you think -- what do you think made you suitable for that duty? Like why do you think you were made that?
- speaker: Interviewer
  text: Nowhere's a question for before all this happened.
- speaker: Interviewer
  text: Why did you join the service at all? I mean, not the Navy specifically, but what made you?
- speaker: Interviewer
  text: Did you end up attending college after your service?
- speaker: Interviewer
  text: Okay. What did you major in?
- speaker: Interviewer
  text: Do you have something, Jacob?
- speaker: Interviewer
  text: In the Navy what you -- I was assigned to logs and records, which is more of an office job; that what you do is you
    record all the flight paperwork that comes in. There was a lot of pilots that wanted all their records put down and what
    their qualifications were, because a lot of them would go fly for like United or, you know, Delta or something like that.
    So then a lot of them would call me and say, hey, you know, we want to see who in the next six months is getting out and
    has this, you know, instrument qualification and all that stuff. Because the airlines, they love military pilots because
    they have minimal training to do. So that's what I did when I didn't fly. But I pretty much flew almost every day. So
    when I didn't fly, then I went and did the logs and records job. And then we also had like training that we had to do
    in order to make rank, in order to do our jobs. So when we weren't flying we were doing like classwork stuff to try to
    qualify for our wings and certain things, so...
- speaker: Interviewer
  text: Not really, and not during the week. That's why you probably, you know, hear stories of military guys just going bananas
    on weekends because we had to work so hard during the week that the weekend was just a release. You know, we would just
    go out and, you know, party. You know, party really hard. And it was because we worked so hard, you know, during the week
    that, you know, you just needed some time off just to maintain your sanity.
- speaker: Interviewer
  text: Yeah. There's -- you kind find friends that are -- you're doing a lot of similar stuff. So you obviously naturally
    become like a unit.
- speaker: Interviewer
  text: You use always -- you know, I hung out with the same like seven or eight guys, and we would like -- in Pensacola,
    for in stance, they had this thing called the boardwalk where we would go down and they had a bunch of restaurants and
    bars and arcades. And so we would just go and we'd go to bowling alleys, movie theaters.
- speaker: Interviewer
  text: You know, just go out and do stuff, go to the malls.
- speaker: Interviewer
  text: Yeah. I mean, just to do something else outside of the military. Because, I mean, it was so strict.
- speaker: Interviewer
  text: Yeah, and you kind of needed some time to do something else.
- speaker: Interviewer
  text: No, no. Pensacola, I went to -- the base is called Millington. It was in Millington, Tennessee, which is right outside
    of Memphis. And that's when we pretty much -- like the job that I was doing, the acoustic operator on a P3, that's when
    we specialized in that equipment. So the equipment that we saw on the plane, all the screens and all the -- we started
    working on how to operate those. And so the air cruise school was pretty much more on the plane itself, you know. So we
    did devices and stuff on the plane, and then we went to -- it's called buttonology and stuff like that. So that's what
    we did there. And then after Tennessee then I went to Jacksonville to kind of put it together, and then Jacksonville was
    more where you did more the secret stuff.
- speaker: Interviewer
  text: And so a lot of the -- we had a lot of classified stuff that we had to do and go through. And so then that's when
    we actually started flying on the plane.
- speaker: Interviewer
  text: And then you had to do -- I believe back then it was like 40 or 45 hours on the plane before you got graduated and
    went into your regular squadron. So Sicily was more like a deployment after I was put into my permanent squadron, which
    they were based out of Brunswick, Maine.
- speaker: Interviewer
  text: Pretty much we were pre-opped before we went out on what we needed to do. A lot of the crews had to prequalify for
    like torpedo exercises and all that stuff, just in case we needed it in war. Your crew, when you got assigned a crew,
    had to be qualified to do all kinds of stuff like that. So in Brunswick we pretty much trained for that. In Sicily we
    -- it depended on, you know, what the ops boss needed, what the President was asking and just following up on what they
    wanted us to do. So in the late '80s we pretty much followed a lot of the submarines that were coming into the Med and
    just making sure they weren't doing anything, staying outside the limits of our allies and, you know, just kind of keeping
    an eye on them, playing so-called war games with them.
- speaker: Interviewer
  text: For the most part, yeah. Reconnaissance, surveillance, that's correct.
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Interviewer
  text: Not really sure. Well, what it was like was more specifics, like ranges of certain missiles.
- speaker: Interviewer
  text: Yeah. And we studied a lot on Soviet submarines because they were the majority of what we worked with. And then we
    also had to classify and detect American subs. And like their ranges, their depth stuff and their weaponology, all of
    that is classified.
- speaker: Interviewer
  text: Yeah, by certain signatures and stuff.
- speaker: Interviewer
  text: That's correct.
- speaker: Interviewer
  text: Through the P-3 Orion. The range on that plane was massive. We did missions that were up to 12, 13 hours.
- speaker: Interviewer
  text: And so, yeah, the range on those were phenomenal.
- speaker: Interviewer
  text: So we just flew on our squadron planes.
- speaker: Interviewer
  text: I believe so.
