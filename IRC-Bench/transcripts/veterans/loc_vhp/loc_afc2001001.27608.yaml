collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Mr. Adams, can you tell me -- give me the date of your birth and where you were born?
- speaker: Respondent
  text: October the 4th, 1922 Paris, Texas.
- speaker: Interviewer
  text: And your father and mother, can you give me their names?
- speaker: Respondent
  text: My Dad is Ruben Alexander Adams and my Mothers name is Betty. His nickname was Rick. When he was a pitcher he used
    Rick?
- speaker: Interviewer
  text: So you're saying he's a baseball player?
- speaker: Respondent
  text: He's a baseball player
- speaker: Interviewer
  text: Can you give me an idea, a little bit about his background, a very short synopsis of it?
- speaker: Respondent
  text: Well, he played -- I was born in '22 and he played ball in 1905 for Washington, he played for Washington and Philadelphia,
    and the Yankees one year. Then he went to Texas later.
- speaker: Interviewer
  text: So you went to school then in Paris?
- speaker: Respondent
  text: Yes, my dad bought a farm in Paris, and he moved us all down there.
- speaker: Interviewer
  text: How many brothers and sisters did you have?
- speaker: Respondent
  text: I have two brothers and one sister, and they're all deceased.
- speaker: Interviewer
  text: What -- tell me about -- did you finish school? Did you finish high school?
- speaker: Respondent
  text: I didn't finish high school.
- speaker: Interviewer
  text: What grade did you go to?
- speaker: Respondent
  text: I was a junior when I joined the Navy.
- speaker: Interviewer
  text: How old were you?
- speaker: Respondent
  text: 18 pardon me.
- speaker: Interviewer
  text: And that was in what year?
- speaker: Interviewer
  text: Were did you go to boot -- tell me a little bit about boot camp.
- speaker: Respondent
  text: I -- well I went to boot camp in San Diego. Of course I served in the most unusual place in the world, real nice.
    It was a good _ of it. I went to radio school there.
- speaker: Interviewer
  text: And then when you got out -- how long was boot camp?
- speaker: Respondent
  text: Well, boot camp was about let's see. I think about four weeks and then I went to radio school for about two more weeks.
- speaker: Interviewer
  text: Did you go to radio school in San Diego?
- speaker: Respondent
  text: Yeah, San Diego.
- speaker: Interviewer
  text: Then what happened?
- speaker: Respondent
  text: Then I went to Long Beach and caught the Phoenix, the S. S. Phoenix, Sail 46. And they took us to Pearl Harbor.
- speaker: Interviewer
  text: Were you the original crew on the Phoenix?
- speaker: Respondent
  text: No, I wasn't the original crew.
- speaker: Interviewer
  text: So take me on from Pearl Harbor.
- speaker: Respondent
  text: Okay, we went to Pearl Harbor and we drove around there and drilled and stuff, getting under way from boot camp. We
    got to Hawaii in March 1941, training cruises and then they sent us on to world tour the Philippines. And we went to Cebu,
    Edoweebo(ph), and Vanbooden(ph) in the Philippines.
- speaker: Interviewer
  text: All in the Philippines?
- speaker: Respondent
  text: We stayed there a while and then we came back to Pearl again. It was kind of unusual; my Mother got a letter from
    me from the Philippines when Pearl Harbor was attacked. She said, "Oh, my son's safe. He's in Manila".
- speaker: Interviewer
  text: And there you were in Hawaii?
- speaker: Respondent
  text: I was in Hawaii.
- speaker: Interviewer
  text: Tell me about the Pearl Harbor attack; tell me what you were doing.
- speaker: Respondent
  text: Well it was unusual. I just got off the mid- watch and they sent us all to General Porter. So I slowly put on my shoes
    and pants and went topside. Just as I stuck my head out the door, the Oklahoma turned over.
- speaker: Interviewer
  text: You had heard the bombing? You heard the bombing or the planes or something?
- speaker: Respondent
  text: I heard the shooting and the bombings and stuff. I still didn't realize what happened.
- speaker: Interviewer
  text: What did you think? Was just a drill?
- speaker: Respondent
  text: I was too -- I couldn't think. I just went on to battle station, you know, went to the emergency radio three decks
    below the water arm. I remember now I shouldn't have went down there. But I remember us getting under way.
- speaker: Interviewer
  text: Tell me about that how you got under way?
- speaker: Respondent
  text: Well, when we first got under way there was about four or five of us.
- speaker: Interviewer
  text: Four or five ships?
- speaker: Respondent
  text: Destroyers, couple of destroyers, couple of cruisers. We had a captain named Carmen Fisher, and the signal man told
    him, "Skipper, they're getting ready to close the sub-gate". He said, "Well tell them to go a head and close it. I'll
    take it with me as I go out". He wanted to get out of there and I don't blame him. But we had seen the boys off the sunken
    ships on the beach waving at us and stuff covered with oil. Other than that it was exciting.
- speaker: Interviewer
  text: You weren't frightened?
- speaker: Respondent
  text: No I wasn't frightened. Too -- you know
- speaker: Interviewer
  text: So there's about four or five of the ships took off then after the bombing?
- speaker: Respondent
  text: Yeah we went up and searched for them. Well, I got this message I was radioed, says get on the way immediately and
    engage the enemy 'cause that's what we tried to do but we couldn't find them.
- speaker: Interviewer
  text: Did you think there were submarines out there or what?
- speaker: Respondent
  text: We knew there were submarines because one of them come in the harbor. And the destroyer, they already sunk one, I
    can't think of the name of the destroyer?
- speaker: Interviewer
  text: The Arizona?
- speaker: Respondent
  text: No it was a destroyer, that was a battle ship.
- speaker: Respondent
  text: He sunk one, an unidentified submarine so he sunk it. Actually, it was the first shot of the war but we didn't know
    it at the time.
- speaker: Interviewer
  text: So you went out to sea and then where did you head for or --
- speaker: Respondent
  text: We just went around looking for about two weeks.
- speaker: Interviewer
  text: In the islands?
- speaker: Respondent
  text: Around Honolulu, and then we came back in and then we started convoying civilians back to the states, two trips, and
    then they sent us to Sidney. And then from Sidney -- no, we went to Melvin first, then we went to Pearl _. There we --
    what did we do there? Oh, and we picked up the U.S.S. Langley. That's an aircraft carrier. She was loaded with P-40 airplanes.
    And we were escorting her and we got a message from the Houston, a heavy cruiser. They wanted us to come help her. They
    were getting beat up pretty badly in the Java Sea, so we went to help them and told the Langley we were leaving we were
    going to help the Houston. And immediately after we left her they sunk the Langley.
- speaker: Interviewer
  text: Oh my goodness. How did you feel about that?
- speaker: Respondent
  text: Well, we thought that -- I didn't feel nothing then. She was on her way with those airplanes to the Netherlands, East
    Indies, and army of P-40's. We had to lose all those airplanes.
- speaker: Interviewer
  text: What about the people?
- speaker: Respondent
  text: They got off.
- speaker: Interviewer
  text: They got off?
- speaker: Respondent
  text: Yeah. Japanese aircraft destroyed -- didn't destroy them; hurt them enough where they had to abandon ship. But they
    had destroyers along with them and they picked up the crew and sank the Langley.
- speaker: Interviewer
  text: Meanwhile you're up at the Houston?
- speaker: Respondent
  text: Then we went towards the Houston and the Java Sea, and we get about half way up to and they send us a message to get
    out of here, now. Then went back to _ Pearl, and stayed there for three months.
- speaker: Respondent
  text: And then we went to --
- speaker: Interviewer
  text: What were you doing there the three months?
- speaker: Respondent
  text: We were just there, wasn't doing nothing. Then they sent us around to the western side of Australia, to the bridge
    vain (ph). Then we got ready for the Guadalcanal fight then.
- speaker: Respondent
  text: Invasion and we protected them.
- speaker: Interviewer
  text: Tell me about that
- speaker: Respondent
  text: That was -- well, we didn't do much. The Marines and the soldiers did all -- the Marines mainly.
- speaker: Interviewer
  text: But you took them in there?
- speaker: Respondent
  text: We took them in there and stood out there and watched.
- speaker: Interviewer
  text: How close did you get?
- speaker: Respondent
  text: Oh, well we could see the Guadalcanal. We didn't get very close. And then we went to --
- speaker: Interviewer
  text: You go in and pick them up any of them up then or what about the injured?
- speaker: Respondent
  text: No we didn't go close to the beach at all. And then we -- what did we do then? Oh, after Guadalcanal, then they sent
    us to Philadelphia.
- speaker: Interviewer
  text: Like Philadelphia, Pennsylvania?
- speaker: Respondent
  text: Yeah to get an overhaul.
- speaker: Respondent
  text: And we got there and we got overhauled, and we got radar and satellite, and then they sent us to Casablanca with Cordell
    Hull. I don't know why, they wouldn't tell us their secret
- speaker: Interviewer
  text: So he was a board your ship?
- speaker: Respondent
  text: He was a board the ship; I guess he didn't like to fly on old aircraft. And we got back --
- speaker: Interviewer
  text: Was that pretty exciting to have him a board?
- speaker: Respondent
  text: Oh yeah, celebrity kind of, Secretary of State. And then we came back to Philadelphia and then they sent us back to
    SIG Fleet?
- speaker: Interviewer
  text: Did you -- when you came back from Casablanca was he coming back with you or he was over there?
- speaker: Respondent
  text: No he came back with us. They didn't let us know too much, some kind of secret.
- speaker: Interviewer
  text: But there must have been a lot of scuttle bug?
- speaker: Respondent
  text: It was 1943 so we didn't really know then. Now, we brought him home they sent us back to the SIG Fleet we went into
    the Seventh Fleet.
- speaker: Interviewer
  text: That was under Nimitz? Or who was that under?
- speaker: Respondent
  text: We were MacArthur's Navy.
- speaker: Interviewer
  text: MacArthur, okay?
- speaker: Respondent
  text: That's what they called us MacArthur's Navy, he was a soldier.
- speaker: Interviewer
  text: Who was your admiral though, was it Nimitz or something?
- speaker: Respondent
  text: No, I was on the staff of Admiral Cooper. He was a board the Phoenix. We worked with the admiral and a couple of Australian
    Navy cruisers, HMAS, Australia.
- speaker: Interviewer
  text: So where did you pick up -- where did you pick up the Seventh fleet? Where were you when you picked them up?
- speaker: Respondent
  text: I think we made an in vasion in Cape Gloucester, in New Guinea.
- speaker: Interviewer
  text: Again carrying the Marines in or what, equipment?
- speaker: Respondent
  text: We had some Army soldiers with us that time I think. Mostly we had Marines. Then we went to New Guinea. That's where
    I learned now to cook an Emu. Do you know what an Emu is?
- speaker: Respondent
  text: And they eat them. They said you take a big pot of boiling water, put the Emu in there, put a huge rock in there,
    when the rock gets soft its done. (Laughter)
- speaker: Interviewer
  text: So you were the radio man on board the Phoenix then -- so you're in New Guinea? That's a pretty wild country down
    there.
- speaker: Respondent
  text: Hey, they're head hunters and cannibals.
- speaker: Respondent
  text: And they don't like white people. They're too salty, or that's what they told me. I didn't want to find out.
- speaker: Interviewer
  text: So then where did you go after that?
- speaker: Respondent
  text: Then we started making all these little bombardments and landings, we would land soldiers and Marines and stuff.
- speaker: Interviewer
  text: Kind of tell us what that is since we can't read it.
- speaker: Interviewer
  text: No just tell us where some of the places are?
- speaker: Respondent
  text: The landing was Cape Gloucester, Madang Bombardment, Los Negros landing, Seeadler Harbor, Hollandia landing, Biak,
    aircraft action off of Biak, and then we went to the biggest battle we had was the Surigao Strait battle.
- speaker: Interviewer
  text: Where is that located?
- speaker: Respondent
  text: That's in Leyte Gulf. That's where we got -- almost got hit by a suicide plane.
- speaker: Interviewer
  text: Tell us about that.
- speaker: Respondent
  text: Matter of fact, I was the flight radio which is three decks above the bridge on the bridge, and I'm watching them
    shoot at this plane coming in. We were under attack. Other than that I had no signal, I had my headphones on. Wasn't a
    signal coming so I'm watching him. And he was about 150 yards out when I fired these 25 shell heeds (ph) right in the
    middle. And I just think how stupid I was for standing there. He was coming right at me.
- speaker: Interviewer
  text: So he was headed for the ship, right?
- speaker: Respondent
  text: He was headed for the supper structure.
- speaker: Interviewer
  text: Was that the biggest battle you were in?
- speaker: Respondent
  text: No, well the Surigao Straights battle was the biggest one, besides Pearl Harbor --
- speaker: Interviewer
  text: Tell me about that.
- speaker: Respondent
  text: The Japanese was sending a fleet up from Singapore. We just landed at Leyte, we took MacArther into shore, he waded
    to shore in Leyte. But we knew they were coming because he had our PV wires out and they saw him coming. So we what they
    call crossing the T. We were -- we had all the old battle ships righthere.
- speaker: Respondent
  text: We were in front of them the cruisers, none of the destroyers were on their side, and we were circling and they were
    coming straight at us.
- speaker: Respondent
  text: And that's what you call cross the T and they haven't got a chance, we wore them out and we won.
- speaker: Interviewer
  text: How many ships?
- speaker: Respondent
  text: There was a hundred ships that time.
- speaker: Interviewer
  text: How many did the United States lose then, anybody?
- speaker: Respondent
  text: We didn't lose any; we just sunk all of theirs.
- speaker: Interviewer
  text: We just sank all of theirs, and how many do you think they had?
- speaker: Respondent
  text: They had -- we sunk one battle ship.
- speaker: Respondent
  text: Well we didn't sink it, we hit her first. The _ 'cause you had them zeroed in.
- speaker: Interviewer
  text: That's right.
- speaker: Respondent
  text: They were sitting there waiting for us.
- speaker: Interviewer
  text: That's right. Were there prisoners off of that, did you get prisoners off of that?
- speaker: Respondent
  text: No we got one prisoner I think one time. They didn't like to be captured.
- speaker: Interviewer
  text: Yeah, I know that.
- speaker: Respondent
  text: And then --
- speaker: Interviewer
  text: So then where -- tell me more about some of your battle trips.
- speaker: Respondent
  text: Okay, well after Surigao Straights and then I told you about the aircraft action.
- speaker: Respondent
  text: Oh, and then when we took Manila in the Philippines we went up to Corregidor.
- speaker: Respondent
  text: And there were still Japanese on the Corregidor.
- speaker: Respondent
  text: So we bombed them every morning to start the battle.
- speaker: Interviewer
  text: Kind of get them softened up right?
- speaker: Respondent
  text: For three days.
- speaker: Respondent
  text: And then --
- speaker: Interviewer
  text: We lost a lot of boys on Corredidor.
- speaker: Interviewer
  text: Was that Marines or Army?
- speaker: Respondent
  text: They were Army.
- speaker: Respondent
  text: They had death marked the head of the baton.
- speaker: Interviewer
  text: Yeah, I remember that.
- speaker: Respondent
  text: I still got my coal.
- speaker: Interviewer
  text: Okay. So anyway, you were softening up Corregador for the invasion?
- speaker: Respondent
  text: Yeah, well when we got through they surrendered.
- speaker: Interviewer
  text: How long that take?
- speaker: Respondent
  text: Took about a week.
- speaker: Respondent
  text: We went over and they let us have liberty in Manila, and we'd go by one of these big banks and there was money laying
    all over the street and wasn't any good, pesos, that blew up. And then what happened? I think we were --
- speaker: Interviewer
  text: So after Corregidor so where were you on VJ Day?
- speaker: Respondent
  text: I was in Treasure Island waiting for a ship.
- speaker: Interviewer
  text: Well, let's take you from Corregador and get you back to Treasure Island here. How did --
- speaker: Respondent
  text: Right after -- right after we finished with the Philippines, they transferred me to _. And I was back in TI _ was
    a war zone waiting for the U.S.S. Pergy (ph) 741. I think I have got it, yeah.
- speaker: Interviewer
  text: What rate were you then, were you a T?
- speaker: Respondent
  text: I was a T-6 First Class.
- speaker: Interviewer
  text: First Class Radio One?
