collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: Yeah, I was commissioned a second lieutenant and then was made a captain in 1953.
- speaker: Interviewer
  text: In Korea, and I'm going from memory now, it was either eleven or twelve months. Depending on the draft, it was either
    the -- I think it was the April '52 draft, the replacement draft that went over, and then I came back in May of -- late
    April or early May of '53.
- speaker: Interviewer
  text: Well, I went in the NROTC. In the NROTC, in your first year, you got naval history and so forth; and then I believe
    in the sophomore year you have to make a decision as to whether you want to go in the Marine Corps or stay in the Navy.
    And I chose the Marine Corps. I had served for 90 days on the USS Macon, and they had the ships there where you're eight
    hours on and four hours off, and it was all time night. And they put us over the side chipping paint on the ships --
- speaker: Interviewer
  text: During the summer. 1948, summer; the summer of '48.
- speaker: Interviewer
  text: I was attending Harvard University. And under the Holloway program, which was the NROTC program, you had to serve
    every summer between your freshman/sophomore, sophomore/junior, junior/ senior. And so you go for 90 days on active duty,
    and you go as a midshipman. And it was really great. We went to the Mediterranean. And my job was up on top of the mast
    up there where we -- there was a fellow beside me that turned the cranks that moved the 8-inch gun sideways, and I was
    the pointer that moved them up and down. And we'd get our orders, and we'd go out and we'd practice. And those 8-inch
    guns would go off broadside, and that whole ship would go 30, 40 feet sideways.
- speaker: Interviewer
  text: I could not. We could not have afforded it. And even though I had scholarships from -- I went to a school called Roxbury
    Latin School, which was founded in 1645.
- speaker: Interviewer
  text: In West Roxbury, Massachusetts.
- speaker: Interviewer
  text: That was my secondary school. And it's the oldest continuously functioning secondary school in the country.
- speaker: Interviewer
  text: My mother came from Lebanon in 1920, but my father was born here.
- speaker: Interviewer
  text: He went to MIT, and he also was the beneficiary of somebody who provided a scholarship there. And so he graduated
    from MIT in 1922.
- speaker: Interviewer
  text: Yeah; I was on the wrestling team both as a freshman and varsity, and wrestled varsity -- freshman one year and varsity
    three years.
- speaker: Interviewer
  text: And I played football, too.
- speaker: Interviewer
  text: Yeah, the second year we went to Pensacola, Florida -- I believe it was the second year -- to Pensacola, Florida,
    for naval aviation.
- speaker: Interviewer
  text: Exposed to naval aviation and how it could be integrated fundamentally both at sea and on land. And then, having chosen
    the Marines Corps, in between the junior and senior years, I went to Little Creek, Virginia, where we did amphibious training.
- speaker: Interviewer
  text: No, no, when you graduated. That's what that picture is in the book.
- speaker: Interviewer
  text: Thank you. This is a beautiful memorabilia here, this lovely coin, red white and blue. God bless those colors.
- speaker: Interviewer
  text: And it's an honor to be here, I've got to tell you, it's an honor to be here with all of those veterans. I mean, that's
    what makes America great. I mean, I am always in awe of the veterans and those who served in every period of our history.
    And I'm only sorry now that we don't have a draft so that everybody can participate or should participate.
- speaker: Interviewer
  text: Absolutely. And do public service. I mean, go to the Peace Corps, go do medical help, or hospital --
- speaker: Interviewer
  text: -- in neighborhoods that need it.
- speaker: Interviewer
  text: And community service or something. But you should -- to be a shareholder in this country, you should do service.
- speaker: Interviewer
  text: No, no, we graduated, and in Harvard, in those days, we graduated in uniform.
- speaker: Interviewer
  text: And you got -- you walked over to the professor of naval operations, and they pin the bars on you, and then you go
    and you have two weeks --
- speaker: Interviewer
  text: -- leave, and you report immediately to Quantico.
- speaker: Interviewer
  text: So you go to Quantico, and I forget the number of days, but maybe it was 60 days or 90 days; and then from there I
    was assigned out to Pendleton.
- speaker: Interviewer
  text: To the Marine -- basic school.
- speaker: Interviewer
  text: As a platoon leader. And then to Pendleton, and where you would do -- had combat training.
- speaker: Interviewer
  text: And this is 1951.
- speaker: Interviewer
  text: And this is the fall of '51. You go to Pendleton. And then, while at Pendleton, you go for two weeks up to your place,
    Pickel Meadows.
- speaker: Interviewer
  text: That was in the Sierra Nevada Mountains. And the snow was eight feet deep.
- speaker: Interviewer
  text: Right. And at that time, the combat in Korea was that the North Koreans would come and attack in the middle of the
    night during the cold weather, and you had to learn to rip open -- they had these fast open sleeping bags -- and you had
    to rip them open, you had to sleep with your piece, your weapon with you, and so that you could do it. So at Pickel Meadows
    we practiced that where they would come in the middle of the night blowing their -- you're out there sleeping in the snow,
    and they blow the horns --
- speaker: Interviewer
  text: -- and they'd come out and bang on the bells and stuff, and so forth. You have to jump up and do it. And so we were
    trained.
- speaker: Interviewer
  text: Yeah, we had eight foot of snow. And it was cold; it was wet. And at that time we did not have the insulated boots.
- speaker: Interviewer
  text: The Mickey Mouse boots, we didn't have those.
- speaker: Interviewer
  text: They were warm. We had the old leather boots. And you had basically two pair of socks, and that, you know, as you
    sweat and they got wet, and you took them off, and you put them in under your uniform next to your chest to dry while
    you wore the dry ones, because otherwise -- and everybody was getting frostbite when we were in Korea because we had leather
    boots and wet socks.
- speaker: Interviewer
  text: Yeah. No, then they went down, and you joined the replacement draft April 1st or something of '52, and you sail. And
    it took about a week to go across the ocean. Of course, you were assigned a platoon on the ship.
- speaker: Interviewer
  text: No, no. No, this was different. They just put together people who were going, because we were all different things.
- speaker: Interviewer
  text: But on the ship. And then we'd do drills on the ship. We'd get out on the deck, and you put your poncho out, and you
    field strip your M-1 and you put it together, and you field strip the machine guns and so forth. And you did training.
    We did get -- some of the officers that had served in Korea came there and began talking to us about the terrain and about
    the characteristics of the enemy and what to expect and so forth. We landed in Japan I think overnight.
- speaker: Interviewer
  text: It was in --
- speaker: Interviewer
  text: Yeah, Yokosuka. And that I think we had leave for overnight or something like that; we went out and raised hell. And
    then we got on and went up to Pusan.
- speaker: Interviewer
  text: Took us up to Pusan. And then you got your orders, and my orders were to go up the line. And Pat Robertson was there
    with me, and his father was a congressman, so he got orders to stay in Pusan. But --
- speaker: Interviewer
  text: But I went up. And so you go up, and you join -- you go to a division, and then you go to regiment, and then you go
    to battalion, and then you get assigned down to your company. And I remember walking up on line to join the company, and
    the captain was there, they were in the middle of a firefight. And, of course, as a young brand new shave-tail, Lieutenant
    Abboud reporting. He said, Get over in the corner and sit on that crate, and don't get shot.
- speaker: Interviewer
  text: Yeah, they were there. Incoming was coming in, and he was there with his man, you know, calling in orders and stuff.
    So he said, Here, here's Sergeant Vergopia, who was a tech sergeant. He's your platoon sergeant. He'll take you out to
    your platoon along the ridge line there. So we get out, and Vergopia is about 6 foot 4, and I was at that time 5 foot
    6, you know, and he's like this. And we get out there and we're walking, he shoved me down into a trench. He said, If
    I were the lieutenant, I would stay out of the way of incoming. I said, I think that's a good idea.
- speaker: Interviewer
  text: Oh, he knew. He was an old -- you know, he was an old veteran with a big handlebar mustache and so forth. So then
    we got out to where our platoon was, third platoon, and he said, If I were the lieutenant, I would put the machine guns
    up on that draw. I said, Sounds good to me, Sergeant. He said, If I were the lieutenant, I'd put the second squad over
    here. I said, Sounds good to me, Sergeant.
- speaker: Interviewer
  text: Oh, listen, those guys run the place. And they were terrific. And then we --
- speaker: Interviewer
  text: Yeah, I forgot. I did know, but I've forgotten the name.
- speaker: Interviewer
  text: It was the First Battalion, Fifth Marines, and it was Baker Company, B Company. And we were the third platoon of Baker
    Company, First Battalion, Fifth Marines.
- speaker: Interviewer
  text: Well, I think -- because, you know, what we'd do would spend 60 days on line, and 30 days in reserve. And, you know,
    the Marine Corps is always two up and one back.
- speaker: Interviewer
  text: And so we'd be up 60 days. And we were up, and I can't remember, it was during that 60-day period that the company
    was on line. Now, whether we had 30 more days to go or 40 more days to go or whatever. But, anyway, it was during that
    period. And then --
- speaker: Interviewer
  text: Yeah. We were moving up -- well, I got the --
- speaker: Interviewer
  text: Yeah, let's do that.
- speaker: Interviewer
  text: Yeah, right.
- speaker: Interviewer
  text: No, no, that was 1951. That's just as I got my bars graduating.
