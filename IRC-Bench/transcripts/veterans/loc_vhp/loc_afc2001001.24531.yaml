collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Interviewer
  text: So, you were born in 1950. And how old were you when the war --
- speaker: Interviewer
  text: Yeah, began.
- speaker: Respondent
  text: Well, Vietnam War began, I don't know, sometime in the 1960s, but I entered in 1970.
- speaker: Interviewer
  text: And you were in the Air Force?
- speaker: Respondent
  text: United States Air Force. Yes.
- speaker: Interviewer
  text: And what was your position or ___+
- speaker: Respondent
  text: I was an aircraft structural repair technician, sheet metal mechanic on the aircraft.
- speaker: Interviewer
  text: All right. Why did you pick the service branch that you joined?
- speaker: Respondent
  text: To avoid being drafted into the Army. I had a lot of friends that were drafted into the Army and immediately got sent
    to the front lines.
- speaker: Respondent
  text: And I wanted to look for a -- some -- a training situation.
- speaker: Interviewer
  text: Do you remember your instructors?
- speaker: Respondent
  text: Instructor?
- speaker: Interviewer
  text: Did you have instructors to --
- speaker: Interviewer
  text: -- tell you --
- speaker: Respondent
  text: -- I went through basic training, technician training. I don't remember any of the instructors. I do remember my first
    duty station was in England Air Force Base, Louisiana, and I remember my first shop chief, an old -- old veteran.
- speaker: Interviewer
  text: Was it -- was the war -- so you didn't want to be in the war ___+
- speaker: Respondent
  text: I didn't want to be -- to shoot people or be shot at, so --
- speaker: Respondent
  text: -- and a lot of my friends had already came back wounded, mentally wounded, so I chose to go into the Air Force.
- speaker: Interviewer
  text: That's a good idea.
- speaker: Interviewer
  text: So where -- what were some like other places that you were -- or you were stationed ___
- speaker: Respondent
  text: I was stationed -- from Louisiana, I got stationed in Taiwan, and the outfit I was in was the 374th Tactical Airlift
    Wing, and our main mission was to support the Vietnam War with our airplanes, cargo C-130 aircraft.
- speaker: Interviewer
  text: All right. Do you remember arriving and what was it like?
- speaker: Respondent
  text: Yeah. Mostly we were in the main base. Our planes were in forward operating locations, mostly in Thailand and Vietnam.
    And a few times I went TDY to Thailand and worked on the planes as they were flying their missions.
- speaker: Interviewer
  text: Did you repair planes or --
- speaker: Respondent
  text: Uh-huh. Yes. And I still do.
- speaker: Respondent
  text: It was a good training for a -- a lifetime occupation.
- speaker: Interviewer
  text: Uh-huh. Was it fun going to all those places? ___+
- speaker: Respondent
  text: Yeah, it was fun at times. It was a lot of work --
- speaker: Respondent
  text: -- seven days a week, 12 to 14 hours. But it was also fun.
- speaker: Interviewer
  text: Uh-huh. Did you meet like a lot of close friends or --
- speaker: Interviewer
  text: -- did you make a lot of --
- speaker: Interviewer
  text: -- friends that you're still friends with?
- speaker: Respondent
  text: Not still friends with, but --
- speaker: Respondent
  text: -- but a lot of friends at the time, yeah.
- speaker: Interviewer
  text: Uh-huh. Did you ever see any combat?
- speaker: Respondent
  text: Only once did I fly into the combat area. And, actually, the war was going on in -- in Cambodia, probably five miles
    away, and we had to go in and fix a -- an airplane that had problems on landing. It blew a tire and blew out part of the
    structure.
- speaker: Interviewer
  text: And that's the closest I got to combat.
- speaker: Respondent
  text: Was it scary?
- speaker: Interviewer
  text: Yes. Very. The whomph that you hear when the motors are landing is very scary. Yeah.
- speaker: Respondent
  text: Do you have any memorable experiences?
- speaker: Interviewer
  text: Not really. No.
- speaker: Respondent
  text: All right. How did your parents feel about you leaving or ___
- speaker: Interviewer
  text: My -- my father, who was a World War II veteran, advised me to join the Air Force other than be drafted, because I
    had a low -- are you familiar with the lottery draft that went on --
- speaker: Interviewer
  text: -- in the late '60s?
- speaker: Interviewer
  text: I had number 13.
- speaker: Respondent
  text: But I had a deferment going to school, but as soon as I was finished with school --
- speaker: Respondent
  text: -- my number was up. So my father advised me, because of his experiences in World War II where he was in France, he
    says I don't want to be -- you don't want to shoot at people, you don't want to get shot at --
- speaker: Respondent
  text: -- so. Is this a lounge of some sort of teacher's thing?
- speaker: Interviewer
  text: We don't know.
- speaker: Interviewer
  text: So, did you have any like close friends that were in -- on like the front lines or --
- speaker: Respondent
  text: Yes. One -- one of the fellows that I went to high school with and was a very good friend of mine, Danny Bowling,
    got drafted. He dropped out of school --
- speaker: Respondent
  text: -- prior to me and he got drafted, went in the Army, came back without his left hand, and a lot of psychological scars.
- speaker: Respondent
  text: He wasn't gone more than a year. From the time he entered the Army, went through his training, went to Vietnam, got
    shot, got hurt, got discharged, he was back within a year. A lot of mental scars, so.
- speaker: Interviewer
  text: How did you stay in touch with your family?
- speaker: Respondent
  text: By letters.
- speaker: Interviewer
  text: Do you remember like how -- what the like hospitality was like or how like the food was or the --
- speaker: Interviewer
  text: -- sleeping areas? Where did you --
- speaker: Respondent
  text: -- stay at?
- speaker: Interviewer
  text: In Thailand, it was -- there was a base called Utapao Thailand that I was at twice. It was 12,000 U.S. GI's were assigned
    there --
- speaker: Interviewer
  text: -- during the height of the war. I went back afterwards, in '75, after the war was over --
- speaker: Interviewer
  text: -- and there was 300 U.S. GI's there. That was recovering aircraft after the war was over.
- speaker: Interviewer
  text: And it -- it was -- it was strange. The -- the people -- the first few times I were over there, it was -- they were
    very hospitable. They wanted our money. After we left, they -- their economy went pretty bad, so.
- speaker: Respondent
  text: Uh-huh. Uh-huh. Did you get awarded any medals or --
- speaker: Interviewer
  text: Yes. Air Force accommodation medal is the main one. Also, a few from small arms training. Just longevity medals, being
    in the good conduct.
- speaker: Interviewer
  text: Those kind of things are almost automatic, but the Air Force accommodation medal was one of the main ones. You get
    awarded that for doing above and beyond.
- speaker: Respondent
  text: Oh. So, how many people were in your -- or did you work with? Like --
- speaker: Interviewer
  text: Okay. During the -- when I was supporting the war in the 374th, we had probably a shop of 70 mechanics --
- speaker: Interviewer
  text: -- and supervisors supporting anywhere from 80 to 120 aircraft.
- speaker: Interviewer
  text: Did you -- were you -- before you went there, were you already like a good mechanic or did you have to learn?
- speaker: Respondent
  text: I -- I felt like I was a good mechanic. I got promoted quickly.
- speaker: Respondent
  text: I ran a crew in Korat, Thailand when I was just an airman first class --
- speaker: Respondent
  text: -- so. We did not have that many experienced people assigned, so I --
- speaker: Respondent
  text: -- took over.
- speaker: Interviewer
  text: So you were in charge of --
- speaker: Respondent
  text: Just -- just a shift crew --
- speaker: Interviewer
  text: -- dispatching the work and -- the work was pretty hectic, because the planes were needed. They took small arms fire.
    They took -- had to -- to land in unapproved runways, got beat up pretty bad --
- speaker: Respondent
  text: -- so we had to fix them quick and get them turned again to go back out.
- speaker: Interviewer
  text: How long did it usually take you to repair a plane?
- speaker: Respondent
  text: Depended on the damage.
- speaker: Interviewer
  text: Was it stressful? Did you ever have to like get a plane done in a certain amount of time?
- speaker: Respondent
  text: Yes. One of the temporary duties I was on, we were at Utapao, Thailand, and Phnom Penh, Cambodia was under siege by
    the rebel forces. We were supporting the government at the airport, and we had 17 aircraft flying two-hour sorties, bringing
    supplies and foods to the Cambodian government forces.
- speaker: Interviewer
  text: Was there enough supplies ___+
- speaker: Respondent
  text: It seemed to be. I -- I don't know. I --
- speaker: Respondent
  text: I mostly was on the flight line and --
- speaker: Respondent
  text: -- just moving the airplanes.
- speaker: Respondent
  text: So, I -- I really didn't get into the politics --
- speaker: Respondent
  text: -- of the war.
- speaker: Interviewer
  text: Did you have anything special for good luck or anything? I guess you didn't really.
- speaker: Respondent
  text: How -- did you have a lot of like spare -- did you ever have spare time?
- speaker: Interviewer
  text: Yeah. You -- you worked 12 hours a day. At the time, I was single, young, the bars were downtown, so --
- speaker: Interviewer
  text: -- there was a lot of spare time, but not much sleeping.
- speaker: Respondent
  text: Was there a lot of like drinking and stuff --
- speaker: Respondent
  text: -- going on ___
- speaker: Interviewer
  text: Yes. Oh, yes. More than -- more than -- than we should have.
- speaker: Respondent
  text: Do you recall any particular ___ humorous or unusual events?
- speaker: Interviewer
  text: No, except for just the -- the people that -- that I was assigned with.
- speaker: Interviewer
  text: We had some characters. Yeah.
- speaker: Respondent
  text: Bet that was nice.
- speaker: Interviewer
  text: And it was just a different time.
- speaker: Interviewer
  text: Yeah. The -- the politics at home here was antiwar in the later part of the war.
- speaker: Respondent
  text: So how did you feel, like knowing that everybody -- like you weren't really like supported as much as like --
- speaker: Interviewer
  text: Well, I -- I didn't see it as much as the -- the ground troops did.
- speaker: Interviewer
  text: But just wearing my uniform through the public places when -- when I came back, it was -- you know, the antiwar people
    were not very kind.
- speaker: Interviewer
  text: But they weren't bad with the Air Force people --
- speaker: Interviewer
  text: Was there a lot of --
- speaker: Respondent
  text: -- ___ Marines and the Army.
- speaker: Interviewer
  text: Was there a lot of hatred and --
- speaker: Respondent
  text: Just mostly from what I read in the paper.
- speaker: Respondent
  text: Yeah. It wasn't a popular war. It wasn't a popular time to be in the military.
- speaker: Interviewer
  text: All right. Let's see. How did people entertain themselves? I mean ___ going out to the bars, like you said.
- speaker: Respondent
  text: There wasn't a whole lot else to do. There was movie theaters at the Air Force bases. A lot of the -- the -- the combat
    troops would be coming through our Air Force base from the front lines. A lot of them didn't have any kind of things to
    keep them occupied, so.
- speaker: Interviewer
  text: Uh-huh. Yeah. Did -- how did it -- did you ever like talk to them, or what did they ___
- speaker: Respondent
  text: A few times. Yeah.
- speaker: Interviewer
  text: Were they -- how -- what -- how -- what did they say?
- speaker: Respondent
  text: They -- they seemed to be very quiet, very subdued, or in the reverse of that, they were very wild and crazy and angry
    --
- speaker: Interviewer
  text: -- and want to fight all the time, especially the Marines.
- speaker: Respondent
  text: Did you -- did you have any friends that were in the combat that got like psychologically hurt a lot, like they just
    were a completely different person when they came back?
- speaker: Interviewer
  text: Yeah. I'd mentioned earlier my friend Danny Bowling never was the same.
- speaker: Respondent
  text: Uh-huh. Yeah.
- speaker: Interviewer
  text: He became just -- just a shell and -- and a alcoholic.
- speaker: Interviewer
  text: The last time I seen him was probably five years after he got wounded, and he was just in the bar --
- speaker: Interviewer
  text: -- a complete alcoholic at 23 years old.
- speaker: Respondent
  text: So, how -- how old were you when you joined the war?
- speaker: Interviewer
  text: I was 20 years old, almost. 19. ___ but I -- I had dropped out of high school and reen -- reenrolled after being out
    a year and a half, so, by the time I -- that's why I had a deferment for my draft notice --
- speaker: Interviewer
  text: -- because I was still going to high school.
- speaker: Respondent
  text: Did you keep a personal diary or anything?
- speaker: Respondent
  text: Do you have any photographs by any chance?
- speaker: Interviewer
  text: I had some, but I don't have anymore, through time and over the time. Yeah.
- speaker: Respondent
  text: Was anybody in your unit, were they ever like assigned to the combat or reassigned?
- speaker: Interviewer
  text: Not really. No.
- speaker: Interviewer
  text: The -- some of the pilots and the flight status people seen a lot more than -- than the maintenance people --
- speaker: Interviewer
  text: -- in my outfits.
- speaker: Respondent
  text: So there weren't very many casualties or anything?
- speaker: Interviewer
  text: We lost a few airplanes, all hands --
- speaker: Interviewer
  text: -- from crashing. Yeah.
- speaker: Respondent
  text: Did you -- did you ever get to know the pilots? Like --
- speaker: Interviewer
  text: No, not really.
- speaker: Respondent
  text: Not really?
- speaker: Interviewer
  text: At the time, in our off hours, there was no fraternization. They had their officer's clubs; we had our NCO and our
    airmen's clubs on bases. Off base, you still didn't.
- speaker: Respondent
  text: Uh-huh. Were they jealous of you?
- speaker: Interviewer
  text: No. I don't think so. But I wouldn't know that.
- speaker: Respondent
  text: Yeah. Did you --
- speaker: Respondent
  text: No, go ahead.
- speaker: Interviewer
  text: No, I was going to say -- ask if you were jealous of them? Like, did you want to go out and fight, but you answered
    that already.
- speaker: Interviewer
  text: Were the bases, were there ever in like -- were you -- when you were in like Thailand and stuff, did you ever go out
    into like the streets and see the Thailand people?
- speaker: Interviewer
  text: And how did they treat you?
- speaker: Respondent
  text: Okay. The -- mostly the places that the GI's visited were the bar bills. It -- it -- that wasn't the real Thai people.
- speaker: Respondent
  text: It was the people that were living off of the -- the GI's and their -- their money. But I did get out into the countryside
    and the people were a lot more polite.
- speaker: Interviewer
  text: Not really helpful, because the language barrier.
- speaker: Interviewer
  text: Right. But they didn't -- they weren't like angry at you or -- or --
- speaker: Respondent
  text: Not in Thailand, no.
- speaker: Respondent
  text: No. It didn't seem to be.
- speaker: Interviewer
  text: Were they anywhere else or --
- speaker: Respondent
  text: Not that I was at.
- speaker: Respondent
  text: I was stationed on Taiwan, which is -- until we -- we moved there -- from there to the Philippines, and the Taiwanese
    people were very trustworthy.
- speaker: Interviewer
  text: Very good industrial people.
- speaker: Respondent
  text: Uh-huh. That's good.
- speaker: Respondent
  text: Did you guys stay in like tents or was it houses?
- speaker: Interviewer
  text: Only -- well, at Korat Air Base, I was TDY there for 60 days or so, and we had what they called hooches, which are
    -- they're soft-sided structures, put up very quickly, and then they have -- during the rains, you would drop the canvas,
    and during the -- because it's so humid and hot over there, you have to roll it up and get some air movement.
