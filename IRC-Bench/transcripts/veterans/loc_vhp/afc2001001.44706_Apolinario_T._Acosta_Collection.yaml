collection: loc_vhp
source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: I was in the Philippines. I was recruited in the Philippines.
- speaker: Interviewer
  text: Why did you join?
- speaker: Respondent
  text: Well, at the time it seems that joining the service seems to be very good opportunity for come to the United States.
- speaker: Interviewer
  text: Why did you pick the service branch you joined?
- speaker: Respondent
  text: Because it's the only one that's available in the Philippines at the time that recruiting Filipino citizens.
- speaker: Interviewer
  text: Do you recall your first days in service?
- speaker: Respondent
  text: Yeah. I have a -- look like a dreams to me because it's been too long. It was in 1962.
- speaker: Interviewer
  text: Do you remember what you felt like? Were you nervous or anything?
- speaker: Respondent
  text: Yeah. It's kind of a too much pressure because it's -- they are very strict and you have to take a very strict examination,
    mental and physical. You have to be physically and mentally fit to join the service at the time.
- speaker: Interviewer
  text: What was boot camp like?
- speaker: Respondent
  text: Well, boot camp is -- entire life that's where you learn all the basic procedures and how life will be in the service.
- speaker: Interviewer
  text: Do you remember your instructors at all?
- speaker: Respondent
  text: That was too long ago for -- I don't think I would remember.
- speaker: Interviewer
  text: How did you get through it? Was it tough at all?
- speaker: Respondent
  text: Well, it was tough. It was hard. But I was able to __ and make it through.
- speaker: Interviewer
  text: Which wars did you serve in?
- speaker: Respondent
  text: Oh, which war? The Vietnam. I was -- I was in the service during the Vietnam conflict.
- speaker: Interviewer
  text: Where exactly did you go?
- speaker: Respondent
  text: I was assigned to Cameron Bay in Vietnam. We were in Support Unit P-3, patrol squadron.
- speaker: Interviewer
  text: Do you remember arriving? And what was it like?
- speaker: Respondent
  text: We take rotation -- we take rotation, our home port was then in __. And every two weeks we rotate going to Cameron
    Bay.
- speaker: Interviewer
  text: What was your job assignment?
- speaker: Respondent
  text: We were support. We were ship serviceman -- I'm a ship serviceman.
- speaker: Interviewer
  text: Did you see combat?
- speaker: Respondent
  text: Actually it's not -- we were in combat area but actually we were not -- we were not engaged. We were being attacked
    several times during night. You know, the mortar was coming in and coming far, but actually we never had actual fire fight
    within -
- speaker: Interviewer
  text: Were there any casualties in your unit from a --
- speaker: Respondent
  text: No. In my unit while we were in Vietnam luckily we didn't have any casualty.
- speaker: Interviewer
  text: Tell me about a couple of your most memorable experiences in the war?
- speaker: Respondent
  text: I think one time -- one night when we were in Cameron Bay when we were taking incoming fire in the middle of the night,
    we have to jump off our bed and go under __.
- speaker: Interviewer
  text: Were you a prisoner of war?
- speaker: Interviewer
  text: Were you awarded any medals or citations?
- speaker: Respondent
  text: Yeah. I was awarded four good conduct medals, Vietnam medals and national defense.
- speaker: Interviewer
  text: How did you get them?
- speaker: Respondent
  text: It's an -- the good conduct award is -- it's a -- it's just like it says. It's good conduct. You have to be no records,
    bad records for four years, for four consecutive years to get one award. And Vietnam, once you were assigned in Vietnam,
    it's a kind of automatic that you will get the Vietnam medal.
- speaker: Interviewer
  text: How did you stay in touch with your family while you were in service?
- speaker: Respondent
  text: Well, mostly during just writing letters and sometimes long distance telephone if we are -- if there's some available
    telephone.
- speaker: Interviewer
  text: Did you feel lonely at all during the war?
- speaker: Respondent
  text: It's -- yeah, of course. There's always loneliness when you're out away with your family. But if you are with your
    buddies, you know, shipment, you forget it, you know.
- speaker: Interviewer
  text: What was the food like?
- speaker: Respondent
  text: It's always good. Food is always good in the Navy.
- speaker: Interviewer
  text: Did you have plenty of supplies while you served?
- speaker: Respondent
  text: Oh yeah. Our ship was __ every two weeks that we -- in port and different places, we had have supplies.
- speaker: Interviewer
  text: Did you feel pressure or stress?
- speaker: Respondent
  text: There are times when you're being pressured, you know, not all the time. It's part of the service.
- speaker: Interviewer
  text: Was there something special you did for good luck or anything during your service?
- speaker: Interviewer
  text: How did people entertain themselves?
- speaker: Respondent
  text: Well, at night -- we are aboard a ship. We are out in the sea. We have a movie every night. And there are times when
    -- Bob Hope -- do you remember Bob Hope? He used to come aboard the ships and entertain the servicemen with all his show
    girls.
- speaker: Interviewer
  text: What did you do when you left -- or on leave? Sorry. What did you do on leave?
- speaker: Respondent
  text: Oh, I just go home and be with my family, spend time with my family and -- you know, vacation is just not -- just
    probably takes a week or so, you have to go back again.
- speaker: Interviewer
  text: How often were you on leave while in the service?
- speaker: Respondent
  text: It's been very open also because every year you get a lot of the 30 days vacation, 30 days leave, and sometimes you
    cannot take it at one time but you have to take it sometimes two weeks and one week. It depends on the situation and where
    you are.
- speaker: Interviewer
  text: Where did you travel while in the service?
- speaker: Respondent
  text: Oh, I was stationed in Iceland and traveled from place to place, from San Diego, Florida and Great Lakes. It's a lot
    of travel when you are in the service if you are in the Navy because every -- every two years if you are assigned a ship
    duty, you have to move again and -- to -- to a ship.
- speaker: Interviewer
  text: Do you recall any particular humorous or unusual events while you were in the war?
- speaker: Interviewer
  text: Do you have any photographs?
- speaker: Respondent
  text: Yeah. I got lots of photographs, but so -- I don't have them with me right now.
- speaker: Interviewer
  text: What did you think of officers or fellow soldiers?
- speaker: Respondent
  text: Well, officers, sometimes there is a -- there's some friction with the enlisted men and the officers, and sometimes
    all the orders are not -- what you call this -- just. And -- but you have to do it anyway.
- speaker: Respondent
  text: It's the part of the service, if you -- if they give you order, you have to do it first before you complain.
- speaker: Interviewer
  text: Did you meet a lot of friends while you were in the war, make friends with a lot of the soldiers?
- speaker: Respondent
  text: Oh yeah. I made lots of friends and they are lot of shipmates. You know, almost every six months you get a different
    shipmate coming in and getting out, and also you were being transferred all the time so you meet lots of people.
- speaker: Interviewer
  text: Do you keep in touch with any of those people?
- speaker: Respondent
  text: Not now, not anymore.
- speaker: Interviewer
  text: Did you keep a personal diary while you served?
- speaker: Respondent
  text: Yeah. I have my own diary at the time but I don't have that anymore. After I get out, I forgot all about it.
- speaker: Interviewer
  text: Do you recall the day your service ended?
- speaker: Respondent
  text: Yeah. There was a little ceremony when I get out of the service. They pipe me out, you know, they whistle the ship.
    They announce your name that you're departing from the service.
- speaker: Interviewer
  text: Where were you?
- speaker: Respondent
  text: I was aboard U.S.S. Meyerkord in San Diego, California, U.S. Naval Station.
- speaker: Interviewer
  text: What did you do in the days and weeks afterwards?
- speaker: Respondent
  text: After I get out? Well, after I get out, I took a rest and a vacation I think with the family, and then I start looking
    for a job, civilian jobs.
- speaker: Interviewer
  text: Did you join a veterans organization afterwards?
- speaker: Respondent
  text: Not particular veterans, but I was still -- you know, from time to time I contact with the veterans if I need something
    or there is some news about it.
- speaker: Interviewer
  text: What did you go on to do as a career after the war?
- speaker: Respondent
  text: Well, I work in the post office as civilian, after I retired.
- speaker: Interviewer
  text: Did your military experience influence your thinking about war or about the military in general?
- speaker: Respondent
  text: No, not really. No. It didn't influence me, no.
- speaker: Interviewer
  text: So you don't think differently about the military than before you enlisted?
- speaker: Respondent
  text: I think joining the military is a good career for some people. It depends on how you take it. It's an opportunity
    if you want to have pictures. It's a good opportunity for you to see the world. Just like they say, join the Navy and
    see the world, join the Army and be all you can be.
- speaker: Interviewer
  text: And how did your service and experience affect your life?
- speaker: Respondent
  text: It kind of bad and good because right now it helps me out in my financial -- I'm having -- receiving money from the
    government, and -- it helps.
- speaker: Interviewer
  text: So there's good benefits in joining a war?
- speaker: Respondent
  text: Not in joining the war, but joining the service, yeah. You get the benefits, a lot of benefits, especially now they
    got -- you have the -- they provide you -- after you get out, they send you to school and pay all your tuition fees. They
    give you lots of money nowadays.
- speaker: Interviewer
  text: Is there anything else you want to add that we didn't cover in the interview, about your service?
- speaker: Respondent
  text: Well, if I will do it all over again, I think I'd join the service again.
- speaker: Interviewer
  text: You wouldn't change anything you've done?
