source_url: https://www.loc.gov/collections/veterans-history-project/
turns:
- speaker: Respondent
  text: My name is Loyal G. Adams, Jr., corporal, United States Marine Corps. While y'all are writing, I'll tell a little
    something about -- I might answer some of the questions. I got out of high school in 1943 during World War II. And I got
    out in June and I was in the Marine Corps in July, 1943. Was sent to San Diego, California, for boot camp from Chattanooga,
    Tennessee, and took boot camp there. I left boot camp and was sent to Miramar, California, at which time I was then transferred
    to the Naval Air Training Station in Norman, Oklahoma, which is at the University of Oklahoma. And I got through there,
    I was sent to El Toro, California and then out in the desert to El Centro. And from there I was sent overseas.
- speaker: Interviewer
  text: Did you enlist in the Army -- or the Marine Corps?
- speaker: Respondent
  text: I enlisted in the Marine Corps.
- speaker: Interviewer
  text: And how long were you in service?
- speaker: Respondent
  text: It was just short of three years.
- speaker: Interviewer
  text: What -- what did you do in the Marine Corps, like?
- speaker: Respondent
  text: My responsibility, I was aircraft mechanic on Marine transport planes. Started out on fighter planes and then ended
    up on Marine transport planes.
- speaker: Interviewer
  text: Were you in combat?
- speaker: Respondent
  text: Yes, I was in combat on Okinawa.
- speaker: Interviewer
  text: Which war was that?
- speaker: Respondent
  text: World War II.
- speaker: Interviewer
  text: And how long were you there? Or how long were you in combat?
- speaker: Respondent
  text: Well, I was in the Pacific about a year. I went first to Pearl Harbor, Kwajalein Island and Guam. And then we moved
    up to Okinawa, and we were there at Okinawa until the war was over. And, incidentally, Okinawa had the fiercest battle
    of all the battles in the Pacific.
- speaker: Interviewer
  text: Oki- -- what was it?
- speaker: Interviewer
  text: Can you spell --
- speaker: Respondent
  text: No, I just pronounce them. (Laughter.) You got a map there. Maybe it will show. I don't know. I doubt it.
- speaker: Interviewer
  text: Not on there.
- speaker: Respondent
  text: Where's Japan? That's Japan. Okinawa is one of the islands just south of Japan. I don't know whether it will show.
- speaker: Interviewer
  text: Well, about how many years, like, estimated -- about an estimated how many years were you in World War II, like fighting?
- speaker: Respondent
  text: Well, I was in for three years and I was in the Pacific for a year.
- speaker: Interviewer
  text: That's four years?
- speaker: Respondent
  text: No, three years total.
- speaker: Interviewer
  text: Okay. What was your mission? Like what was your job -- like what were you set up to do?
- speaker: Respondent
  text: Well, we had transport. What we did is we flew in supplies and flew out wounded.
- speaker: Interviewer
  text: How did you feel about your mission?
- speaker: Respondent
  text: Well, when you're 18, 19 years old, you didn't really think too much about it. All you did was do it. Although you
    do think about it some time when a plane is over nothing but ocean, nothing around, and you have engine problems. You
    do give it a little thought then. But other than that, you're just so busy doing the job you have to do, you don't think
    too much about it.
- speaker: Interviewer
  text: Were you scared? So basically you were scared while you were _____________?
- speaker: Respondent
  text: Oh, yeah. I think everybody has fear. That's what makes you more alert. And especially when you're on guard duty.
- speaker: Interviewer
  text: Did you have guard duty?
- speaker: Respondent
  text: Oh, yeah. When you're on guard duty, say guarding something like an ammunition supply dump or something, you get a
    little nervous at night. Not as bad during the day, but.
- speaker: Interviewer
  text: So what technology did y'all use?
- speaker: Respondent
  text: Well, we had the M-1 rifle. The main thing we had to use was our mechanical skills to keep everything running smoothly.
- speaker: Respondent
  text: One unique thing that might interest you is while we were on Okinawa, we were hit with a tremendous typhoon. And it
    threw big ships up on the shore. If I'm talking too fast, then I'll slow down.
- speaker: Interviewer
  text: No, that's okay.
- speaker: Respondent
  text: And it started blowing everything away. And the only place we could find shelter was the Okinawans had tombs in the
    side of hills where they buried people, they took them in when they died. And we would go up and stay in those tombs for
    about four or five days until the storm died down. And it was quite an experience. And if you look in some of your history
    books you might find some pictures of those tombs. And the stories we heard, that when the elderlies died, they put them
    up in the tombs and it was supposed to be a privilege for the young girls to go up and care for the dead and polish their
    bones. Tombs, if you notice, have a certain shape and they said you came into the world from that shape and you go back
    into the ground in that shape. So that was quite interesting.
- speaker: Interviewer
  text: So were the living conditions bad?
- speaker: Respondent
  text: The living conditions were pretty bad. When it rained, it really rained. Especially on Guam, which was set in the
    tropics. When it rained it was a gully-washer. The weather in Okinawa, it was a little bit better because it was further
    up in the northern Pacific towards Japan and the weather was a little better there. The facilities were a little better,
    especially near the end of the war. And then finally when the Japanese surrendered, we were ordered to fly the troops
    and everything into Japan to occupy Japan. We flew in and landed there in Tokyo Bay and spent about six months in the
    Army of Occupation of Japan and saw the devastation there. Saw the City of Yokohama and Tokyo flattened almost to the
    ground, hardly anything standing. And that was because of the B-29s that dropped fire bombs. The houses were so flimsy
    in Japan, fire would start and would sweep through everything.
- speaker: Interviewer
  text: Did all the people you -- did you all make it, the people you were with? Not the whole Army, but like your friends,
    I guess, did they all make it?
- speaker: Respondent
  text: Yeah, most of us made it that I was associated with.
- speaker: Interviewer
  text: What were you -- what thoughts do you have on war?
- speaker: Respondent
  text: Well, a war is a horrible thing. Anybody who has ever been to war hopes nobody else ever has to go to war. Sometimes
    you have no choice. When the Japanese bombed Pearl Harbor, it was an unprovoked attack and they had a sneak attack on
    us and sank almost all our battleships and killed thousands of people, so we had no choice but to go to war. It was either
    go to war or surrender to the Japanese and later on to the Germans. Very similar to what happened, only it was worse this
    time, when those two planes hit the twin towers. At least the Japanese, their sneak attack was on the military in Pearl
    Harbor. These attacks in New York City on the twin towers were against civilians. Men, women, child -- children, that
    had nothing to do with the military. So in a way it was even more dastardly than the attack on Pearl Harbor. And when
    circumstances like that come up, you have no choice. You either defend yourself or your freedoms as we know it are all
    gone. Basically, that's what has happened with the wars that we've fought, we've been defending our freedoms and our people
    against people who were trying to destroy us.
- speaker: Interviewer
  text: How did you relax during your time in the Marine Corps?
- speaker: Respondent
  text: Well, as I say, it's -- there wasn't any relaxing. You were on -- basically on duty 24 hours a day, 7 days a week.
    They had church services on Sunday for a short period of time, but basically you were on duty all the time.
- speaker: Interviewer
  text: Now, what about your family? Did you have a family? Like your wife and kids, anything?
- speaker: Interviewer
  text: A girlfriend or something?
- speaker: Respondent
  text: I was real young. I went in the Marine Corps right out of high school, so I wasn't married. The family I had was my
    mom and dad. And my dad had been in the Marine Corps too in World War I. So I was the second Marine in our family.
- speaker: Interviewer
  text: What was the impact on your mom and dad while you were at war?
- speaker: Respondent
  text: Well, of course, I'm sure my mother was extremely worried, as mothers are prone to be. And I'm sure my dad was concerned,
    having been in France in World War I and had been wounded and earned a Silver Star. So he had a firsthand knowledge of
    what war was all about.
- speaker: Interviewer
  text: All right. Did war change you?
- speaker: Respondent
  text: Well, oh, I'm sure it did. Because when you go in just a little older than y'all are right now, and you come out and
    you're going on 22 years old, I'm sure I matured some. And most of us came back, went back to college.
- speaker: Interviewer
  text: I just had to ask that.
- speaker: Respondent
  text: Well, then, one thing anything about in Japan, we lived in a barracks. It had the picture of the rising sun. And you
    know that's on the Japanese flag. And they had a picture of the rising sun, but they had tentacles going out all over
    the world showing what they intended to take over through their war. And from the top of the barracks there you could
    see Mount Fujiyama, the famous mountain over there. And we got to go down to a city called Kamakura, which is where the
    Great Buddha is. And so we got to see a lot of unusual things when we got to Japan and -- which made it very interesting.
- speaker: Interviewer
  text: What was your moment memorable moment?
- speaker: Respondent
  text: I guess the most memorable moment was when they told us the war was over.
- speaker: Interviewer
  text: Okay. Now that we are done -- are we done with all the questions? Now that we are done with all the questions, you
    can just tell us some interesting stuff. Anybody -- y'all want to know anything?
- speaker: Respondent
  text: 'Well, I can tell you some interesting things that happened to me. One time for the Christmas holidays, we were flown
    to Los Angeles, California, and Hollywood, and our pilot was Tyrone Power, the movie star. Y''all aren''t going to know
    who he was, but he was a good looking fellow who played in all of the adventure pictures and the bull fighting. So if
    you ever watch an old movie and see a real good looking guy, that was Tyrone Power. And I also went through boot camp
    with another actor named Bill Witney. And I never will forget when we come back from the rifle range which is up the coast
    in California and we were riding on these trucks and here he comes riding by with Marguerite Chapman, another movie actress,
    and they were driving a convertible Lincoln Continental. And you can imagine what we thought about them, us sitting on
    that truck all dirty and steamy and dusty. But let me see -- also when I was in boot camp, two guys who wrote songs for
    a living. And I can remember a little bit of their song they sang. We were in an amphitheater watching a little stage
    play that they had for the people from Hollywood. So these guys just made up a song as we were sitting there. And it was:
    "Oh, you march, march, march in the boot Marines, From the dawn to the rays of setting sun. And you work, work, work,
    in the boot Marines, For they say a leatherneck''s work is never done. Oh, you''re up in the morning at the break of day
    To pick up butts and clean up huts, And then you''re on your way. ''Cause it''s work, work, work in the boot Marines,
    For they say a leatherneck''s work is never done..." That''s all I remember, but they wrote that. It''s funny. I don''t
    know why I remember the words. I only heard them one time, and that''s when they sang it to us in that theater at the
    rifle range in California. But let me tell you, if you ever get a chance to ever go to San Diego, California -- or you
    ever go to Washington, D.C., with your family, go to the Marine Corps barracks. And if you''re ever in San Diego, you
    want to go to the San Diego Marine Corps base there. They''ve got a parade ground that looks like it''s about a mile long.
    And after we''d been there for a while, we''d march out there for what they called Colors. And the Marine Corps band would
    start at one end of that parade ground and come marching up playing the Marine Corps hymn. Now, we didn''t have any hair;
    they''d shaved it all off. But if we''d have had any it would have stood up on the back of our necks. And they''d perform
    and they''d put the flag up and they''d play the "Star Spangled Banner." And I''m telling you fellows, that''s one of
    the most inspirational things you''d ever want to see in your life. So if you ever go to Washington, ask your parents
    to take you out to the Marine Corps barracks and watch them strike the colors and take it down at night. That''s all right,
    ask.'
- speaker: Interviewer
  text: I was -- I was -- I was living at the ____________ in Washington, D.C. -- I don't know if they're there now, but I
    saw -- I went to Arlington and they showed the -- I went to the World War II -- and we also saw the change of the guard.
- speaker: Respondent
  text: Yeah, that's --
- speaker: Interviewer
  text: That was cool.
- speaker: Respondent
  text: Yeah, I've been there. Did you see the raising of the -- the statue of the Marines raising the flag on Iwo Jima?
- speaker: Interviewer
  text: Yeah, yeah.
- speaker: Respondent
  text: Well, I flew into Iwo. And when you see that from the air, when you think of all the men that were fighting down there
    on that little piece of land, you can't imagine. It's mind boggling. And if you ever get a chance, when you get a little
    older, read the book "Flags of Our Father", and that's about the battle of Iwo Jima. And if you read that, you'll know
    why no one ever wants to go to war.
- speaker: Interviewer
  text: _____________ like "Saving Private Ryan".
- speaker: Interviewer
  text: Well, that's the same --
- speaker: Interviewer
  text: Was that like -- was that like how war was? Or was that like kind of over exaggerated, that movie?
- speaker: Respondent
  text: Yeah, none of them can make it the real truth. Actually, some of the camera work that was actually taken over there
    like on Tarawa and these kind of places, but it's not -- it wouldn't sell in any theaters because in the movies you've
    got to have a little glamour to it. But -- you got something else you want to talk about?
- speaker: Interviewer
  text: Not really.
- speaker: Interviewer
  text: Band? Music band? Was there like a band?
- speaker: Respondent
  text: 'The last band I saw was in boot camp. And that''s the last band. I don''t -- another thing of interest, another thing
    of interest that might interest -- I was in boot camp when they were making a movie. And I''d never seen anything like
    a movie being made, being from Chattanooga, Tennessee. And it was so funny. It was about the Marine WAVES, in fact I saw
    it too not long ago on Turner Classic Movies. And the funny thing about it is, the actors -- you know how you see a movie
    that goes: One, one, one, but the actors come up and they''d step on a hatch mark and they''d say something like, "Yes,
    sir. Thank you, sir." And they''d say "Cut," and that would be the end of it. And they keep doing things like that and
    then they put it all together and it flows. And I thought, I never knew they made movies like that. I think I thought
    you just went -- started at the beginning and went -- but if you get a chance to see Marine WAVES, I got to see -- I got
    to see it being made in San Diego. What else you got? Anything? (Bell sounding.)'
- speaker: Interviewer
  text: Are the Japanese bayonets different from the bayonets that you were carrying?
- speaker: Respondent
  text: Well, they were little different there. There is a Japanese bayonet had a little hook on the bottom. And so they would
    parry and thrust with the bayonet and they were hoping to take that little hook on the bottom and twist it, twist the
    rifle and the bayonet out of whoever they were fighting. So it was a unique -- unique bayonet. You're right there?
- speaker: Interviewer
  text: Were there like any other advanced technology that the Japanese used?
- speaker: Respondent
  text: They flew a lot of Kamikaze aircraft at us in Okinawa, if you know what a Kamikaze was. A Kamikaze was a guy who his
    only mission was to die and crash into a battleship or --
- speaker: Interviewer
  text: Like a terrorist?
- speaker: Respondent
  text: -- or aircraft carrier or anything he can. So they are on a one-way mission. The Kamikazes were really active on Okinawa.
    You see, we were getting to their homeland and the closer we got, the fiercer the fighting. Like on Iwo Jima and Okinawa.
    Because they considered that their homeland and they knew the next sort of invasion would be the invasion of Japan itself.
    In fact, we were ready to go, b
