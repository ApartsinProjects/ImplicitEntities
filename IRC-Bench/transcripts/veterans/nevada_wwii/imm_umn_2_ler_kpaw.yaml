  text: UMN Immigrant Stories Collection ['United States'] Ler Kpaw was born in the Karen State, Burma in 2000. He and his
    family lived in the Mae La Oo refugee camp in Thailand. In 2011, his family resettled in the United States. He lives in
    St. Paul, Minnesota and is a student at Washington Technology Magnet School. My name is Ler. I was born in Karen State
    in the year 2000. I was a refugee in Thailand Mae La Oo camp. In Thailand it was hard for my parents to get a job. My
    dad found a job in Thailand outside of the camp with his close friends, and he got caught by Thai police and they had
    to stayed in a jail for one month. In dingy early morning my dad had to work for Thai police and he also smelled the burning
    like a mouse or squirrel. In 2010 my family applied to America and I was so excited and couldn'twait for it. In 2011 my
    family came to the U.S and they had a lot of worries on our way travel to Mae Sot Thailand to the United States. I saw
    the faint of my little younger brother in the car because the smell on the dirt road. In Bangkok, Thailand I didn'tknow
    that security had to take away our stuff in the airport, and I noticed that the stuff might be sent to United States before
    us. When we were in the plane I didn'tlike any food because it didn'ttaste like what we used to eat in the refugee camp.
    There was no vinegar for me in the plane and just only snack or drink. Those food smell and taste salty to me. I didn't
    eat for 2 days in the plane. We arrived to Hong Kong, and I was lost in the airport 1 or 2 hours. My mom was worried,
    and she cried. When we were in the United States, it was hard in the first time. I didn'twant to checked in to the clinic
    because we always had to. In 2012 my dad found his first job which was in a shampoo company, but he was only Karen guy
    and he was treated unfairly because they said my dad works slow and the kicked my dad out of the work. It was hard that
    you didn'tunderstand English. After that my dad didn'twant to find a job in a company. My dad had to find a way to go
    to school to get better English. If you came as immigrant from refugee camp and didn'tknow English you will need a helper
    to apply for an easy job for you. In Thailand the air smells different from United State and in U.S I had a lot of smell
    from a car, in the house, building, or people everywhere. The difference between U.S and Thailand refugee camp was not
    enough food in Karen refugee. In U.S I live closed by the highway road. Right now I feel safe and comfortable living in
    the U.S.
