  text: Memories concerning various situations - happy experiences, sad experiences, funny ones, bad ones and etc. Obazawa;
    At the time of my arrival in US, I suffered mentally. In Japan the menfolk do no laundry. when I went as a schoolboy here
    in the US, they told me to do laundry. In Japan the boy never do laundry and weren'teven allowed in the kitchen. I hated
    kitchen work. Later on, I had another schoolboy job where I milked two cows, picked up two dozen eggs daily before attending
    school. One day when I wes milking the cow, the cow put his foot in the bucket and spilled the milk. Thereupon, I became
    angry and hit the cow, when I told the employer this, he asked me if I had hit the cow. The answer being in the a ffirmitive
    I never milked that cow again. Every tine I went near that animal she used to kick me.
