collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: -- Jose Alvarado. I use a B -- they used -- in the Army they used my middle initial, but I never used it.
- speaker: Interviewer
  text: When were you born, Jose?
- speaker: Respondent
  text: I was born in June 17th, 1919. That's when I came here.
- speaker: Interviewer
  text: And we're here in your home at 633 --
- speaker: Respondent
  text: -- 633 South Street.
- speaker: Interviewer
  text: -- South Street in Munster. Your phone number -- I believe I have that somewhere.
- speaker: Respondent
  text: 836-0008; three zeroes and an 8.
- speaker: Interviewer
  text: Where were you born? You said --
- speaker: Respondent
  text: I was born in El Paso.
- speaker: Interviewer
  text: How did you come to Northwest Indiana from El Paso?
- speaker: Respondent
  text: I came over here looking for work.
- speaker: Interviewer
  text: And that would have been about what time? 1936. A lot of people were looking for work around the country.
- speaker: Respondent
  text: Well, it was right after The Depression. I was in the CC camps, too, you know, before.
- speaker: Interviewer
  text: I see. And what branch of service were you in? You went into the Army? Army infantry. You were living here in Northwest
    Indiana?
- speaker: Interviewer
  text: And where did you go when you enlisted or were you drafted? You were drafted. And when was that? Do you recall?
- speaker: Respondent
  text: I was drafted in -- let me -- I got it. I got my discharge. I know I should know, but, you know, a lot of times whenever
    you . . . It's in my discharge.
- speaker: Interviewer
  text: Uh-huh, sure. All those in formation.
- speaker: Respondent
  text: Yeah, I'm trying to get -- April -- on April the 12th, 1941.
- speaker: Interviewer
  text: April 12th of '41. All right. And you would have been about how old at that time? Okay. And you were an Army infantry.
    What division --
- speaker: Respondent
  text: I was in the 38th division. 152nd infantry. K company, they were 152nd infantry.
- speaker: Interviewer
  text: K company. And you -- where did you go from here? You went to --
- speaker: Respondent
  text: Fort Benjamin Harrison.
- speaker: Interviewer
  text: So you went to Indianapolis and that's probably where you were sworn in and everything. Your training, was that down
    there?
- speaker: Respondent
  text: In Camp Shelby, Mississippi.
- speaker: Interviewer
  text: So they took you from there to Mississippi?
- speaker: Respondent
  text: Camp Shelby. They sent us to -- they sent us with Indiana National Guard.
- speaker: Interviewer
  text: Okay. And you were -- you went directly into infantry.
- speaker: Respondent
  text: Into the infantry, right. I was never -- I was in same company every day that I was in the service.
- speaker: Interviewer
  text: The whole time. What was it like in Mississippi?
- speaker: Respondent
  text: Oh, it was -- the training, it was good because it was real hot, you know. And we trained in the swamps and then we
    went on maneuvers, you know, to different places.
- speaker: Respondent
  text: Went to Louisiana and Texas. And then we went -- oh, we went to Florida too. We went for amphibious training in Florida,
    Tallahassee. And then -- I told you Louisiana and Texas too.
- speaker: Interviewer
  text: Yes. So you -- and how long were you then in training in Mississippi before you went --
- speaker: Respondent
  text: We were there for along time. We were -- we didn'tleave -- we were in Mississippi training and then on maneuvers and
    all that. And then we left on -- well, you know what? I have a diary from --
- speaker: Respondent
  text: -- my, my captain. He used this. See, his name is -- oh -- Vince Kimberland (ph). He's talking about when we left.
    I don'tknow when he got there to our outfit, you know, but we were there till Christmas Day of 1943.
- speaker: Interviewer
  text: And in Christmas of '43 --
- speaker: Respondent
  text: -- we went overseas.
- speaker: Interviewer
  text: -- you flew -- you went overseas?
- speaker: Respondent
  text: Yeah. We went through New Orleans and went through the Canal Zone and then we went -- on a boat, you know, to Hawaii.
- speaker: Interviewer
  text: Oh, okay. So you went -- you went to Japan rather than the other way around?
- speaker: Respondent
  text: We went to Hawaii. We didn't go to -- we didn't get that far. We went to Hawaii and then we went to New Guinea. And
    from New Guinea, went to the Philippines. And that's where we stayed.
- speaker: Interviewer
  text: And you were in the Philippines?
- speaker: Respondent
  text: That's where we fought, yeah.
- speaker: Interviewer
  text: And what was -- the trip over was on a troop ship?
- speaker: Respondent
  text: A troop ship, yeah.
- speaker: Interviewer
  text: Were you with a group of ships or was it just a --
- speaker: Respondent
  text: From Hawaii over there -- from New Orleans to Hawaii, we didn'thave -- very little, you know, boats, you know, to
    --
- speaker: Respondent
  text: -- I guess, they could call them fast. At that time there wasn'tanything going over there. But then from Hawaii to
    New Guinea, we had escort, you know.
- speaker: Interviewer
  text: You left at Christmas Day and that was of '42, right? To Hawaii, to -- and to the Philippines? All right. And when
    you got to the Philippines, where did you land? Manila?
- speaker: Interviewer
  text: We ended up in -- yeah, in Manila. We ended up in Fort -- what the hell was the name of that? No, we weren't in Clark
    -- that was . . .
- speaker: Respondent
  text: Subic Bay was in Philippines. Yeah, no this -- in Hawaii we went to . . .
- speaker: Interviewer
  text: Hickam? Could it have been Hickam?
- speaker: Respondent
  text: No, no, that was --
- speaker: Interviewer
  text: That was Air Force.
- speaker: Respondent
  text: We went to the -- let's see. It's here. I'll get to it. You know, this guy wanted medals, you know. And that's why
    he --
- speaker: Interviewer
  text: Oh, he kept a pretty good diary.
- speaker: Respondent
  text: I don'tknow how he could keep a diary but he lies a lot. You know, pats himself on the back. He wasn't -- you know,
    he claimed several things that I did, he took --
- speaker: Respondent
  text: He wrote them, but, you know, well, he's a dead man, he can't . . . Let's see. We left -- New Orleans was the port
    of embarkation. On December the 30th, 1943, we left.
- speaker: Respondent
  text: And then -- it's all here. See, I could tell you everything. Oh, that's the trip from -- from New Orleans to Panama,
    I guess, is -- (mumbling) and I'll tell you the truth. Even has the hour we left.
- speaker: Interviewer
  text: You left at 9 --
- speaker: Respondent
  text: Oh, that's when we got to -- to where the Panama Canal was. Took 11 hours, he said.
- speaker: Interviewer
  text: To go through the canal?
- speaker: Respondent
  text: No, no. To get from New Orleans to Panama. We spent a while -- I gave you the wrong in formation there. We went --
    oh, that's where we left from, New Orleans, you know.
- speaker: Respondent
  text: We were alongside the docks and began to unload. But that was when we got to -- that's when we got to New Orleans.
    I must have messed it up. There was a band playing "Indiana" -- that was New Orleans. We got to New Orleans.
- speaker: Respondent
  text: Now, just give me a little time, and then I can start and we can go right through.
- speaker: Interviewer
  text: No problem. Take your time.
- speaker: Respondent
  text: We were all wondering what kind of a ship we would be sailing on, you know. That was on -- try to give you a date,
    the right date -- the 30th of December. That's when we loaded the boat.
- speaker: Respondent
  text: And then -- oh, he said he was wondering what kind of a ship we were going to go on, you know, so . . .
- speaker: Respondent
  text: Oh, the trip that we left on was the SS Manta Ray, was a former medicine liner. He's talking about who he shared his
    room with, you know.
- speaker: Interviewer
  text: Okay. And you were on that same ship all the way to Hawaii?
- speaker: Respondent
  text: Right, to Hawaii, yeah. Took us -- I'm not sure if it -- 17 days, I think. And he said the food on the ship was the
    best he had ever eaten.
- speaker: Interviewer
  text: Now, this was your captain?
- speaker: Respondent
  text: He was just another officer but he was with battalion, see? He was with the -- that's why he's talking -- and then
    he talks about the guy that he roomed with, you know.
- speaker: Respondent
  text: '"On January the 1st, 1944, New Year''s Day, we sailed down the Mississippi River and out of the Gulf of Mexico, still
    not knowing our final destination." We didn''tknow where we were going to.'
- speaker: Respondent
  text: '"We had woolen uniforms and we found out that they were too hot, so we didn''tknow where we were going." And he said
    that''s when we found out that we were going to -- since we were going -- "they gave us a San Francisco post office, we
    found out that we were going to the Pacific."'
- speaker: Respondent
  text: '"Some of the men thought we were going to Hawaii, and some Australia. Some said New Guinea or New Caledonia." It
    just -- we were going to Hawaii; we went to Hawaii. He talks about the trip, you know, how the flying fish followed the
    boat.'
- speaker: Interviewer
  text: Were you in the service too? What were you in? I was in the Air Force.
- speaker: Respondent
  text: Okay. See, we started -- let's see. Doesn'thave the dates every time, you know. He's just talking about the whole
    trip as a whole. We were on the boat from New Orleans and we were going to Hawaii.
- speaker: Interviewer
  text: How long were you -- did you stay in Hawaii? Do you recall?
- speaker: Respondent
  text: Oh, yeah. We stayed along time because we were doing guard duty. And we -- every month we'd transfer all the way around
    -- all around like -- we were on the main island, you know, the island of Maui.
- speaker: Respondent
  text: So every month we changed all around. Our division was security for the whole island. See, the division was three
    -- three different regiments.
- speaker: Respondent
  text: Used to be four and then they triangularized them and they left three -- they sent 149 infantry to the canal before,
    way before. And then there was three, and we did all the security.
- speaker: Interviewer
  text: Okay. I see. So you were on Hawaii for along time. Then pretty soon you boarded your ship and took off for the Philippines.
- speaker: Respondent
  text: Yeah. Now, here it says, you know, in January the 6th we could see the island of Hawaii. So that explains how we got
    --
- speaker: Interviewer
  text: It took you, like you said, 17 days to get there.
- speaker: Respondent
  text: Here it says we could see the Aloha Tower and all that. And then it tells you -- it tells us where we got, you know.
    From there we went to Hickam Field -- oh, no, we passed through Hickam Hill.
- speaker: Respondent
  text: And Pearl Harbor. And it was big, you know. It was -- We reached the -- we are now sector of the island and that's
    where we -- oh, we relieved the 20th Infantry of the 6th Division there.
- speaker: Respondent
  text: And we started training. We were -- he's talking about how we went swimming and all that. He said -- oh, he went on
    a transport to -- on June the 17th (mumbling). He's talking now about when we left.
- speaker: Interviewer
  text: Would have been about June sometime, probably? Let's see. Not all the time. Well, we got there -- I told you what
    day did we get there? January 16th, I think it was.
- speaker: Respondent
  text: Okay. On June the 27th we left Hawaii.
- speaker: Interviewer
  text: Okay. So you were there about six months? And then you left for the Philippines.
- speaker: Respondent
  text: Maybe longer. Yeah, we went to -- we left for New Guinea. And we were on an Army transport then. We were on the --
    he hasn't got the name of it. Just -- he said he went to load the -- he was in charge of loading the transport, you know.
    And again we left on the 10th -- no, no. We left the 1st of July and crossed the equator on the 6th, and by the 10th we
    reached the Island of Funafuti.
- speaker: Interviewer
  text: And that would have been July of forty . . .
- speaker: Respondent
  text: Yeah. I remember that because that's when we were in New Guinea. And then we went -- we were -- then we start patrolling,
    you know.
- speaker: Interviewer
  text: All right. What was the status of the island at the time? Was it under occupation? Did the Japanese have --
- speaker: Respondent
  text: No, we had already -- they had already --
- speaker: Interviewer
  text: They had already taken --
- speaker: Respondent
  text: -- they took off.
- speaker: Interviewer
  text: Okay, all right.
- speaker: Respondent
  text: There was very little action there. And when we got there, we patrolled a lot, you know. Went on patrols. And that's
    what we were doing.
- speaker: Interviewer
  text: Okay. And do you -- about how long were you at -- were you on New Guinea?
- speaker: Respondent
  text: New Guinea, let's see. That's what I'm trying to find it. All this talking here about Hawaii. We sailed again on the
    11th. See this. Then let me get it right. It was on July the 1st -- we sailed for New Guinea on July the 1st.
- speaker: Respondent
  text: We crossed the equator on the 6th, and by the 10th we reached the Island of Funafuti, like I told you.
- speaker: Interviewer
  text: And you were there for --
- speaker: Respondent
  text: Well, we just crossed it. We went by it, so. We didn'tland anymore till we got -- we passed New Hebrides.
- speaker: Interviewer
  text: Okay, yeah. New Hebrides, sure.
- speaker: Respondent
  text: Yeah. And then we got to -- finally Oro -- at New Guinea we reached Oro Bay. From Oro Bay, we -- on July the 17th
    we got to Oro Bay. We unloaded the troops but he said it took him three days to get the supplies off. Then we -- "It was
    here that we began to shape up into a fighting unit, bringing up the fighting strength" -- oh, we started getting reserves,
    you know, new men.
- speaker: Interviewer
  text: Okay, getting --
- speaker: Respondent
  text: Because we were down, you know, we didn'thave a pool.
- speaker: Interviewer
  text: Okay, so you started to get replacements -- or not replacements, but new troops were coming in, right?
- speaker: Respondent
  text: Yeah, right. On the 1st of December we were in a boat, the cargo ship, Austin Daly (ph) to sale for the Island of
    Leyte.
- speaker: Interviewer
  text: Okay. So you headed for Leyte. So that would have been December of '43?
- speaker: Respondent
  text: Because this was on the 1st of December, we went a board the cargo ship, yeah.
- speaker: Interviewer
  text: Okay. And it would have taken you probably five, 10 days, something like that, to get to --
- speaker: Respondent
  text: Oh, we'll get to it because he's got to be over there when we got -- see, he had been assigned to S-2, you know. I
    don'tknow if that was him -- I mean, one of the department they had, you know, S-2 and S-3 and S-4, you know, different.
- speaker: Respondent
  text: See, he was -- he never did any really training. He was just -- Yeah, he was an officer.
- speaker: Interviewer
  text: He was a lieutenant at the time?
- speaker: Respondent
  text: He was a lieutenant at the time. See, I never knew him, you know. I hardly ever had an officer. See, I was always
    --
- speaker: Interviewer
  text: And you were a private at the time?
- speaker: Respondent
  text: I was -- well, I was a sergeant by that time.
- speaker: Interviewer
  text: Okay, you were a sergeant.
- speaker: Respondent
  text: I went -- I was a private, corporal, buck sergeant, staff sergeant, and tech sergeant. I was -- so I was always in
    charge of something, you know.
- speaker: Respondent
  text: Let's see, he said when we got -- we got to Leyte. He said -- we didn'thave any air raids but we certainly did some
    dodging to miss them. That's on the boat -- on the trip. That's when he said he was assigned to be Battalion S-2.
- speaker: Interviewer
  text: And when you -- where did you land when you went to -- In the Philippines, okay.
- speaker: Respondent
  text: Yeah, in the Phili- -- in Leyte. Now I'll find out to what -- if it's got a town or what. And then he said that they
    were rumors that there were a lot of Japs there.
- speaker: Interviewer
  text: Did you get into any action at that point with the --
- speaker: Respondent
  text: I did but he didn't.
- speaker: Interviewer
  text: He didn't. What happened -- I'm not interested in him.
- speaker: Respondent
  text: We just went in a -- we went in patrol, you know -- -- looking -- because they had been there, you know.
- speaker: Respondent
  text: And by that time, you know -- oh, when we got to the port there, it was full of bodies and all that; blood and all
    that.
- speaker: Respondent
  text: So when we got off, that's -- now we -- he said it rained all the time in Leyte.
- speaker: Interviewer
  text: And you were on patrols at that point.
- speaker: Respondent
  text: Yeah. There were rumors that natives, you -- about -- from the natives of a large force of Japs there.
- speaker: Respondent
  text: It was just a handful, you know. That was in San Miguel, Leyte. We patrolled -- I patrolled. I know I did, you know.
- speaker: Interviewer
  text: How many people were on your patrols with you when you went out?
- speaker: Respondent
  text: I think I only used to take a squad or two. I didn'ttake the whole platoon, you know. You know, this was -- the natives
    gave you that in formation! From the natives, you know.
- speaker: Interviewer
  text: I see. So you -- so you went on patrols. What was your -- what were your living conditions like there? Where you had
    tents?
- speaker: Respondent
  text: It was ____________ -- no, we had small tents, pup tents.
- speaker: Interviewer
  text: Okay, you had pup tents at the time.
- speaker: Respondent
  text: Had to dig a hole every night.
- speaker: Interviewer
  text: And were you moving or were you stationed --
- speaker: Respondent
  text: Yeah, we kept moving.
- speaker: Interviewer
  text: Okay, so you weren'tstationed --
- speaker: Respondent
  text: Well, they -- we had a camp. And then we used to go on patrols.
- speaker: Interviewer
  text: Okay, but you went back to the same place every night?
- speaker: Respondent
  text: Went back every night. Unless it was a big patrol, well, you had to stay away, you know. Maybe -- sometimes we had
    to stay a couple of days, you know.
- speaker: Interviewer
  text: How many Japanese do you think were on the island at the time?
- speaker: Respondent
  text: Well, you know, he's saying here that the "patrols I had been sending" -- he was sending them. See, he made himself
    a hero, according -- he wanted the Congressional Medal of Honor, see.
- speaker: Interviewer
  text: Well . . . Did --
- speaker: Respondent
  text: He said -- let me tell you. He called me -- oh, he said the colonel called him in and told him -- he told him to go,
    you know, himself. So he said he was the only man he could find. So he went out to find the Jap camp.
- speaker: Respondent
  text: He was sent a lone, he said. He's lying. He's lying all of the way. "On New Year's Eve, 1944, we started out" -- oh,
    yeah, that's -- he went on the patrol -- oh, he went by himself, he said.
- speaker: Respondent
  text: He said he carried three units of ration. He had a guerilla with a rifle, but he said the bolo -- the native only
    had a bolo knife.
- speaker: Interviewer
  text: So he took somebody -- he had a native go with him and -- -- and show him around, okay.
- speaker: Respondent
  text: He said he went through the rice paddies and all that.
- speaker: Interviewer
  text: About how long were you on Leyte? Do you recall?
- speaker: Respondent
  text: No, not too long. Not too long. But it will probably say over here. See, this is his diary. I don'tknow why in the
    hell -- how he could keep a diary. We couldn't do nothing.
- speaker: Interviewer
  text: You didn'thave any . . . And you think that some of this was probably made up a little bit.
- speaker: Respondent
  text: Well, yeah, I know he did. Because I went on patrols. The colonel -- whenever it was a big one, he always sent --
    I had some tough guys. I had some good -- I had a lot of guys from the South, you know.
- speaker: Respondent
  text: Georgia, North Carolina, South Carolina. I had some good hillbillies. He said the Filipinos were no help at night.
    Now we go -- you know, he's talking about that patrol.
- speaker: Interviewer
  text: From Leyte when you left there, where did you go?
- speaker: Respondent
  text: We went to the island of --
- speaker: Interviewer
  text: Okay, all right.
- speaker: Respondent
  text: From there we went to Luzon.
- speaker: Interviewer
  text: Okay. And from that -- that wouldn'thave taken you very long to get there. And how -- what was the reception there
    like? Were there --
- speaker: Respondent
  text: When we went on a -- we went on ships, you know -- -- that had those -- to make -- make a landing, you know.
- speaker: Respondent
  text: We were on a boat, a big boat. Funny, he hasn'teven got the name of the boat 'cause it was a big boat.
- speaker: Respondent
  text: But we didn'thave any beds or nothing, you know. It was just a boat. And we were piled up like crap, you know.
- speaker: Respondent
  text: So then -- he's still talking about that. He was disappointed. We made -- well, we better go now to where we're going,
    you know. We made it back to headquarters; he made it. Let's see, on January the -- we loaded the USS Baxter.
- speaker: Respondent
  text: On January the 26th and landed on January the 29th of '44. '45. It was the '44 already. On January the 29th we --
    our landing was unopposed without casualties.
- speaker: Interviewer
  text: That was 1-29 of '44, right?
- speaker: Respondent
  text: Okay. See, the worst part about that, when we were on the boat, you know, we got off the boat at midnight. And we
    didn'tmake a landing till daylight, at about 7. And everybody was sick on the boat, you know. And then we didn'tknow what
    the hell we were gonna meet, you know.
- speaker: Interviewer
  text: Yeah, that's right.
- speaker: Respondent
  text: And then they started that bombing, you know, for the beach. And that was the first landing that we made. And -- there
    was no opposition; they took off.
- speaker: Interviewer
  text: So the Japanese took off but they were bombing anyway.
- speaker: Respondent
  text: Yeah, they were bombing. Then on the third day we marched to the town of Olongapo. That's in Subic Bay.
- speaker: Respondent
  text: Olongapo in Subic Bay. We moved east of Olongapo and were -- we were fired by mortars and machine gun fire. That's
    when we started seeing action, see
- speaker: Interviewer
  text: Okay. Now, so that would have been probably early February of '44. You started to receive some mortar fire --
- speaker: Respondent
  text: Yeah, it was February the -- we landed on the 29th. I think it was the third day after that. It was still in January.
- speaker: Interviewer
  text: What would have been the -- it was hot, probably, and humid.
- speaker: Respondent
  text: It wasn't too bad, you know.
- speaker: Interviewer
  text: Okay, all right.
- speaker: Respondent
  text: We were used to it because we were in the South. But some people always complain.
- speaker: Interviewer
  text: And what was the Japanese resistance like at the time?
- speaker: Respondent
  text: We didn't get -- we didn't get -- they took off, so we went after them. And then we got to Subic Bay.
- speaker: Respondent
  text: And there was no opposition. Subic Bay was almost deserted then, you know. That was where the submarines used to come.
    See, so it was deserted then 'cause it was -- they still -- the Japs still had it, you know, but they weren'tthere anymore.
- speaker: Respondent
  text: Okay, well, then he said the next day we hiked 15 miles to Subic Bay, still no opposition. On the third day after
    we got there, we reached the town of Olongapo.
- speaker: Respondent
  text: That's in Subic Bay. And we moved east of Olongapo. We were fired then, you know. We started getting up at 6 in there.
    But none of us were hurt badly enough to require treatment. That night we dug in in a rice paddy in Zig Zag Pass. That's
    where we had a lot of -- that's where we start -- they said it was known as Death Valley.
- speaker: Interviewer
  text: It was known as the what?
- speaker: Respondent
  text: Everyone was talking about it, you see. Then -- well, he's talking now -- you know, that's when we start -- we start
    getting -- we start getting the hell knocked out of us.
- speaker: Respondent
  text: We camped right outside of Subic -- Zig Zag Pass. That's just outside of Subic Bay. That's what he called it, Death
    Valley. He said he was the battalion SD then.
- speaker: Interviewer
  text: So there was fighting at that point between you and the Japanese.
- speaker: Respondent
  text: Yeah, there we started.
- speaker: Interviewer
  text: And were you trying to push them out or push them north?
- speaker: Respondent
  text: Kill them. That's all.
- speaker: Interviewer
  text: Just kill them all.
- speaker: Respondent
  text: We didn'ttake prisoners. We had orders not to take prisoners. Don'tbring any prisoners. But then they were attacking
    us.
- speaker: Respondent
  text: Then it was on -- let's see. Now, this is where we start getting the hell knocked out of us. Oh, that's when we start
    getting mortar fire. We didn'tknow if they were mortar fire or artillery, you know. And our captain was -- our captain
    and one of my boys was the first one that got -- they had -- they were in an area -- they were already ____________. One
    of my boys, I could touch him. You know, his hole was next to me. His head was blown off.
- speaker: Respondent
  text: And that's on -- well, that's when they were challenge; see, they were challenge us. And that was on the -- I guess
    it was the 3rd.
- speaker: Interviewer
  text: Okay, of February.
- speaker: Respondent
  text: Yeah. He talks here about Dr. Yotun (ph). He's talking about how we were getting a lot of mortar --
- speaker: Interviewer
  text: Yeah. Now, were you getting air support at the time? No air support.
- speaker: Respondent
  text: We never got air support. And we never had tanks until it was almost over. And we never had artillery. That's what
    messed us up.
- speaker: Interviewer
  text: Okay. So you had machine guns or rifles?
- speaker: Respondent
  text: Well, we had -- well, just -- we had a heavy weapons platoon. They had machine guns and they had mortars.
- speaker: Respondent
  text: Fourth platoon, you know. First, second, third, and then the heavy weapons. They had machine guns and mortars, smoke
    mortars.
- speaker: Interviewer
  text: And you had rifles?
- speaker: Respondent
  text: Right. We had Tommy guns and carbines.
- speaker: Interviewer
  text: Okay. How long, then, was the fighting -- it was kind of in tense.
- speaker: Respondent
  text: Oh, we couldn't -- we couldn't get out of the hole. This happened at night. They hit us at night. See. Here's -- this
    is Private Jacobs. He was one of my boys.
- speaker: Respondent
  text: That's the one that got his head blown off. However that's when they start -- you know, they start firing on us. And
    we didn'tknow where it was coming from, you know. We were right on the road and we bivouac right there, you know. That's
    where we parked. My boy was the first one that got his -- killed. And there was a kid with him, Little Tongue, and another
    one. There was three of them. And Lee. So, you know, he was blown out of his hole, you know, without a head. Lee and --
    he was in the same hole with him but he only had wounds. He was wounded.
- speaker: Respondent
  text: And he said that Lee kept saying "Jake's gone!" Jake's gone!" You know. He had everything, you know. I don'tknow how
    in the hell he kept a diary. Then he talked about how another sergeant from another company -- oh, he was a medic.
- speaker: Respondent
  text: He crawled out. He got killed. He was killed -- he will killed by one of our own men.
- speaker: Interviewer
  text: How long was the fighting, then, before you had a chance to --
- speaker: Respondent
  text: That night and then the next morning we moved back -- we went to look for them. But we couldn'tfind them. Oh, we start
    finding them, but they were all dug in and, you know, it was just -- that was all jungle and it was a little road, you
    know, and we didn't -- we didn'thave any -- we were all walking. But then that night we went back there because over there
    we had water and we had a kitchen. And I think we ate. We cooked. So . . .
- speaker: Interviewer
  text: Did they fire on you again the next night?
- speaker: Respondent
  text: Yeah, that next night they gave us hell. You know, he's talking about how he saw --
- speaker: Interviewer
  text: So you would go after them during the day -- -- and then pull back and then they'd come after you at night.
- speaker: Respondent
  text: Yeah. See, now, he says, "The next day we sat around waiting for the first battalion to knock out the resistance a
    head." See, we changed from one battalion to another battalion. And company, you know.
- speaker: Interviewer
  text: Well, how did that finally -- how did that finally end?
- speaker: Respondent
  text: Oh, we -- we -- they kept running. They kept moving, moving.
- speaker: Interviewer
  text: Okay. And you got them and --
- speaker: Respondent
  text: See, it was just like hand-to-hand fighting. You had walked on -- walked on in the holes, you know. Before you knew
    it, they were firing at you.
- speaker: Respondent
  text: I had a boy from just from just on this side of Lafayette. He was shot in the neck and he was one of my sergeants.
    See, then we getting outhere where we started hitting the strong opposition.
- speaker: Respondent
  text: And that's where the top of the mountains were then. From there it was all downhill. But they wanted us to take it.
    Now, he starts talking here about our captain, you know.
- speaker: Respondent
  text: Captain Yassum (ph) was our company commander. And -- Yassum. He was from Illinois. Then we start getting a lot of
    artillery. We start getting heavy stuff, you know. And Captain Yassum was killed, you know. He says there how Captain
    Yassum -- he said he was with Captain Yassum. He was lying.
- speaker: Respondent
  text: He was with the battalion! He was over there with the colonel. And we had a tough colonel, you know. But he said Captain
    Yassum was moaning and crying out. Somehow he said he could tell that he was dying. The captain had been hit by the same
    shell that Jim was, some guy who was with him. And then he felt -- he said that he felt that Jim's leg -- that Jim was
    bloody. That was Cunningham; that was another officer.
- speaker: Interviewer
  text: Now, you started them -- you got them running finally and got them moving up and you chased them up a hill?
- speaker: Respondent
  text: We -- we -- the next day we start -- we didn'tmove at night. Because at night, you know, they was there already.
- speaker: Interviewer
  text: Yeah. You'd be walking into a trap?
- speaker: Respondent
  text: They could see us, yeah. So he said he took the telephone over where Captain Yassum died and he said that the colonel
    told him to, you know -- how Captain Yassum was and he said that -- he told him that Captain Yassum had died about half
    an hour before. Now, he's talking _________. Now he's going where we started moving. He said he put a band on that guy,
    you know, because our doctor -- our medic was killed too. We didn'thave a medic. Okay.
- speaker: Interviewer
  text: So you're chasing the Japanese -- -- and how long did that go on before you finally got some peace --
- speaker: Respondent
  text: Now we come to that because here he said, "Things were quieter and I checked again with the men of Company K" -- that
    was my company. And he said it wasn't as bad as they first thought, you know. Now we start moving again. And the rest
    of the night was quiet after they -- after we got all that mortar and artillery.
- speaker: Respondent
  text: It was quiet, you know. Then in the morning he said that Captain Yassum looked like a wax man -- a wax dummy, you
    know. Talking about . . . He said that he took over the job of S-3.
- speaker: Interviewer
  text: How far were you from Subic Bay at the time?
- speaker: Respondent
  text: Not too far; just a few miles. Maybe I'd say about 10 miles. Maybe not even that far.
- speaker: Interviewer
  text: Okay. And you were chasing the Japanese?
- speaker: Respondent
  text: We were running after their ass, yeah. But chasing -- they kept moving but they had already made their holes and they
    had machine gun nests. And you couldn't -- in the jungle it's hard to find.
- speaker: Respondent
  text: I wasn't a hero, but I had -- I saw a big part of it. In fact, you know, I used to get pissed off because they always
    -- the colonel always said "Send Joe," you know. And I was company commander a lot of times because we didn'thave any
    officers left.
- speaker: Respondent
  text: I was second lieutenant. I was in charge of the company. And I said -- oh -- this -- this is another guy who got hit.
    He said he took over in another job.
- speaker: Respondent
  text: He was very important. He said they -- oh, when we were -- we start moving and they kept spraying -- you know, they
    kept spraying us from the holes. They were dug in, you know. And he said he was with our company but he wasn'twith our
    band.
- speaker: Interviewer
  text: Were you getting any support from the Philippines at all? Were the Filipinos not doing --
- speaker: Respondent
  text: No. It was just us. Later on we got them. We used to get a -- if we needed a guide, you know -- they could climb trees.
    We couldn'tclimb trees. You know, they'd give you one or two or whatever you ask for. And you tell them "Go out there
    and see -- see if you see anything."
- speaker: Interviewer
  text: Okay. All right.
- speaker: Respondent
  text: And they did, you know. We could understand them, you know. He said -- oh, he said that he was -- he said he took
    two shots into a hole and he said that the Jap had an explosive and it blew up. He said that the only thing that was left
    of him was -- he said that the flies were -- that he was with the flies. I don'tknow.
- speaker: Interviewer
  text: How long did this last, then, that you were chasing them across Luzon?
- speaker: Respondent
  text: Well, let's see. Let's see. Oh, we were in this area; on the 7th we cleared it. We got up to the top. February the
    7th.
- speaker: Respondent
  text: That's when we took it over. See, cuz that's -- that's the first time I got wounded. I was wounded before, you know,
    but it was just a -- I got phosphorus on my back, you know.
- speaker: Respondent
  text: And that's when this doctor -- this captain, a doctor that -- my friend -- -- that's when he joined us here. He came
    over and he said -- I didn'tknow him. That's the first time I ever saw him.
- speaker: Interviewer
  text: Okay. When did you get the phosphorus? Do you recall?
- speaker: Respondent
  text: That night. You know, the phosphorus.
- speaker: Interviewer
  text: Well, then when did you get wounded?
- speaker: Respondent
  text: Okay. We're gonna get into -- see, this was February the 2nd and then the next day, February the 3rd. It was quiet
    and then that's when we start moving then. He said the Japs slipped in and threw grenades at us. They used to throw them
    at each other themselves. They were scared. Anything moved they --
- speaker: Interviewer
  text: -- throw a grenade.
- speaker: Respondent
  text: Yeah. He said on February the 4th, the colonel put him in command of Company K. That's when he came over to --
- speaker: Respondent
  text: And that's when he said that he -- oh, he went and killed a Jap right now. He was -- he couldn'teven talk to me. No,
    he -- I had a bad reputation. No, the next day we moved up the pass again.
- speaker: Respondent
  text: Company L leading and Company K behind them. As Company M moved up to occupy lower ridges, there was some -- you know,
    we were seeing fire from all sides. And that's when we really start meeting a lot of --
- speaker: Respondent
  text: He said Company K was ordered with -- up with stretchers to help evacuate the dead and wounded. And then we had to
    leave the dead only, you know.
- speaker: Respondent
  text: Yeah, we -- we -- that's when we started getting a lot of action. And Company K moved in to help Company L, you know.
    That's what he said.
- speaker: Interviewer
  text: When you finally got to the top of the hill --
- speaker: Respondent
  text: We're coming to that.
- speaker: Interviewer
  text: Oh, okay. All right.
- speaker: Respondent
  text: See, we hit that -- I hit it three times. See, it was -- it was quite a bit of area, you know. And we -- they were
    shooting from this side and then they stop and the guys from this side, they had a machine gun nest, you know. And then
    in the middle they had some more, you know. So we were trying to get that -- take that hill and -- that's, you know, we
    start getting a lot of people -- a lot of kids killed, you know.
- speaker: Respondent
  text: So the sergeant -- February the 7th was a date never to be forgotten. Colonel Manguel (ph) ordered Company K to attack
    and finish taking that hill that -- and he said that was gonna be a tough job, you know.
- speaker: Respondent
  text: But he said -- I know the colonel said, you know, we got to take that hill today. Gotta take it and there's no --
    no ifs -- you know, ifs or nots. We're gonna take it. So we -- they sent a patrol, you know. They sent me on the right
    and another squad in the middle -- another platoon in the middle and another platoon on the left.
- speaker: Respondent
  text: So I went over there and we couldn'tmove, you know. We were right in between a lot of fire. We couldn'tmove. So I
    told my -- I had a runner, you know. He had a radio. I told him "Tell the captain, you know, that we can'tmove over here."
    So the colonel -- the captain got to Colonel Manguel again. And he said he knew it was gonna be a tough job, but we got
    to take it today, he said. So -- yeah. He said -- he went -- "He sent Sergeant Taft (ph) with his platoon to the left,
    and I went with Sergeant Alvarado on the right." I don'tknow where in the hell he was; I never saw him. And then a Jap
    machine gun open up on us and cut my gun in half.
- speaker: Interviewer
  text: Cut his gun in half? Oh, cut your gun in half.
- speaker: Respondent
  text: Yeah, my gun was cut in half! I didn'thave a gun, you know. I was -- and right next to me was my best friend, Sergeant
    Gibson. He was shot, you know, right on the side, you know. I could see the -- see, I was -- we were on the hill, and
    I was a little bit lower than him. They cut my gun in half. And Pat Gibson, he got -- I don'tknow how many bullets, you
    know.
- speaker: Respondent
  text: I could see that -- you know, I could see him because I could touch him. I could see the [interviewee taking breath
    in and blowing out]. You know, he just -- he did that about three or four times then he died, you know.
- speaker: Respondent
  text: And we -- I went to pull him, but I -- we couldn't. If we -- if you stood up, we'd get shot too. So -- then we --
    he talks about Gibson, how he was killed. He had never even saw him.
- speaker: Interviewer
  text: Well, you finally, though, made it to the top of the hill.
- speaker: Respondent
  text: Yeah, no, we went back. We went back. The first attack failed. About noon we tried again. First attack failed. About
    noon we tried again.
- speaker: Respondent
  text: Captain Manguel came up and he was raising hell, you know. "We gotta take it," you know. Yeah, we gotta take it, but
    he was in the back.
- speaker: Respondent
  text: And so we went again, you know. But I took a different squad, you know. The first time I took a Mexican kid that used
    to be with us. I'd sent him the first time, you know. And they got -- hell, you know, they got fire from -- so the second
    time I took this kid from -- I told you from Lafayette.
- speaker: Respondent
  text: Yeah. I took him. I told him your squad next, you know, but I had to go with him. So I took him and then we -- first
    attack failed. Then we went -- oh, they asked for artillery. He said they had asked for artillery but could not get it.
    And I knew that we couldn'ttake the hill without knocking out the Japs.
- speaker: Interviewer
  text: Well, at least you wanted to knock out those machine gun nests? Is that what you're talking about?
- speaker: Respondent
  text: Yeah, that's what we wanted. But see, we order -- we asked for mortar fire, you know. Mortar, because that's all we
    had. And they were off. And then they run out of ammunition. So he said he was on the radio with Colonel Manguel for along
    time. And we went back again. We had to take it, so we went back again. We went back again. And -- let's see. See, I remember
    all this because I went there three times. I had to go there three times because, you know, all three companies, three
    -- three squads, we all, you know -- the guy in charge, you know -- we didn'thavevery many officers then. I think we had
    one or two besides the captain.
- speaker: Interviewer
  text: So every time they went up -- how many times did you charge the hill or did you go for it --
- speaker: Respondent
  text: Three or four. I think it was -- it might have been four. But then the third time we went and that's when we took
    it.
- speaker: Respondent
  text: But then after we took it, we -- oh, we -- that's -- we took it that time. We stay there. That -- see, I was wounded,
    you know. This guy from Lafayette was wounded real bad. He was shot through the neck. And he was bleeding on both sides,
    so I took out my -- we had a little packet, you know. So I used mine and his, and I put one in front and one in the back
    to stop the bleeding.
- speaker: Respondent
  text: And you know, when I was doing that, some Jap threw a grenade right between us. I picked it up and I threw it, but
    when I threw it, it exploded. So we got some more of that crap.
- speaker: Interviewer
  text: So you got some shrapnel from that.
- speaker: Respondent
  text: Yeah. We got shrapnel from that. END OF SIDE ONE, TAPE ONE; BEGIN SIDE TWO, TAPE ONE
- speaker: Interviewer
  text: All right. So on your third time, you finally -- -- got to the top of the hill and stayed there then.
- speaker: Respondent
  text: Yeah. See, he says here "the Jap snipers were picking men off right and left, but they kept digging." It was Lieutenant
    Windler (ph), Sergeant O'Neill, and Private Herriot were killed right there. They were right next to him.
- speaker: Respondent
  text: You know. (Mumbling.) Yeah, it wasn'tthat I called myself brave. I was there -- just there, you know. The other lieutenant,
    the older one was shot. Oh, he was killed. He was shot through the chest.
- speaker: Respondent
  text: Company L was behind us. And let's see. Now we -- there were eight men from my company killed.
- speaker: Interviewer
  text: On taking that hill?
- speaker: Respondent
  text: Yeah. Taking that hill.
- speaker: Interviewer
  text: When you got to the top then, you stayed there --
- speaker: Respondent
  text: Yeah, we -- well, we stayed there till we, you know -- they were supposed to come up with some food.
- speaker: Respondent
  text: We hadn't had any food. So we ________ had to eat that shit, with Japs there all over, flies and shit. But they ate
    -- we ate.
- speaker: Interviewer
  text: Sure. You had to. Well, anyway. I was already wounded, see. But I had shrapnel in both my hands. And my feet. See,
    my fingernails?
- speaker: Respondent
  text: My feet are all -- I never got a dime for 54 years before I got -- And, well, anyway, I had to go. I had to go because
    I was bleeding quite a bit.
- speaker: Respondent
  text: And see I had shrapnel in both shoulders and my hands. But it was the grenade that I threw.
- speaker: Interviewer
  text: Well, if you hadn'tdone that --
- speaker: Respondent
  text: But you know what, I won -- let's see, that was 1945. -- 57 years of life. That other guy came back -- the other guy
    was single. He didn'thave a family; a mother and father. That's how much life we bought just by throwing it, you know.
- speaker: Respondent
  text: Because it would have killed us both. But we both got shrapnel -- you know, he was already shot and then I was looking
    at him because I was, you know, he was --
- speaker: Interviewer
  text: Now, this was the guy that you put the -- was shot in the neck?
- speaker: Respondent
  text: Yeah, and he was in shock, you know. I tried to send him back to the rear to go, but he won'tstay -- and he was a
    big guy. He was about 6-3, a big redhead. He had arms on him, bigger than my thighs. And -- but he was shot, you know,
    and he didn'twant to go. He was afraid. So some guys were going down. I told him, "You go with those guys. Goddammit,
    get your ass out of here." I was wounded, but I was still getting around, you know. I could get around. I wasn'tlike him,
    you know.
- speaker: Interviewer
  text: Yeah, he was hurt.
- speaker: Respondent
  text: He was hurt bad. So anyway, he went back, you know. He went to the -- wherever they had the aid station. If they had
    one doctor -- we didn'thave any medics. They got killed before we did.
- speaker: Interviewer
  text: The medics got killed, sure. Well, you got to -- when you were at the top of the hill then, you -- did you start to
    get some reinforcements or some people come up to help you out, then -- -- at that point to take your place?
- speaker: Respondent
  text: No. We just hold the ground. See, not till the -- after that, I left. But it was a couple of days -- see, here it
    mentions all the guys that were killed, you know.
- speaker: Interviewer
  text: Okay. Well, then when you left, you went back to the aid station to --
- speaker: Respondent
  text: I went to the aid station.
- speaker: Interviewer
  text: Okay. And what happened to you there?
- speaker: Respondent
  text: Well, they -- you know, they didn'thave any more morphine. And they said -- you know, they stopped doing like shrapnel
    wounds. They said you got to wait till in the morning when we can get some morphine. Just the bad cases, you know, they
    were using the morphine. They said, you know, we can take it out and they give you a stick to bite on. They dug it out,
    you know, they -- with tweezers.
- speaker: Respondent
  text: They dug it out. It hurt at first but, you know, I wanted, you know, to get -- you didn'twant to get infection.
- speaker: Respondent
  text: So, "Well, go a head," you know. You know, I go to the VA over here. And they did surgery on me over there faster
    than these son of a bitches do to give me a shot of B-12. I go there and wait three or four hours sometimes for a shot.
- speaker: Respondent
  text: Over there they -- I had surgery, you know. They pulled it out from my hands, and I told the doctor -- he's a nurse
    that I told. You know what, on February the 7th, 1945, I had surgery. I had surgery. And took him about 10 minutes.
- speaker: Respondent
  text: Takes you three hours to give me a B-12 shot. I told him "One of these days some guy's gonna come in here with a machine
    gun and blow your ass up." No, but it can happen. I -- sometimes we sit there and, you know --
- speaker: Interviewer
  text: Well, after you got patched up, then where -- did they send you back in or --
- speaker: Respondent
  text: Yeah. I went to the hospital. And I went to a hospital. They had a tent hospital. I went over there and then they
    had to -- it was already taken, that hill was taken.
- speaker: Respondent
  text: That was our mission there. So he said they dug in and they were in good -- you know, in good shape. They had water
    and chow. And there was only -- oh, well, then the rest of it was patrolling there.
- speaker: Respondent
  text: Just short patrols. But I wasn'tthere. I was gone for -- for a few days and then they send my ass back.
- speaker: Respondent
  text: You know, if you weren'thurt bad enough that you had to stay -- oh, he said that the Japs wanted the hill back. So
    they start coming back. See, I wasn'tthere then.
- speaker: Interviewer
  text: Okay. You were away from the hill for just a couple of days --
- speaker: Respondent
  text: Yeah, a few days.
- speaker: Interviewer
  text: -- and then when you went back, did you go back to the top of the hill?
- speaker: Respondent
  text: I went back, but no. I didn't go back -- when I went back the Japs took off. They took off, see. But then we start
    chasing them.
- speaker: Respondent
  text: So he said he saw a Jap the next morning laying with his hands hanging over the hole. See, I never -- I was never
    close to the captain too much because I didn'thave much use for him because they brought him from somewhere else, you
    know, to -- and made -- see, it was that old bullshit, you know. Friends take care of friends.
- speaker: Respondent
  text: They made him company commander. I was a tech sergeant, yeah. See, later on they send me -- they gave me my commission.
- speaker: Interviewer
  text: What is the -- so you were chasing the Japs across Luzon.
- speaker: Respondent
  text: Yeah. Yeah. Well, just -- not too far. Because then once you got out of the mountains, it was flat road, you know.
    So they had trucks coming and going from Manila to all over.
- speaker: Interviewer
  text: Okay. All right. Now, do we have Manila at the time? Were -- The Japanese did?
- speaker: Respondent
  text: That came later. But see, we were too far from them. We didn't get to go there. We went, but later on we went there
    and we -- my company was lucky when we got to go through the leper colony.
- speaker: Respondent
  text: We see them, you know. And those sisters and nuns taking care of them. But, you know, they never mention anything
    about that. So he's talking about the next day. They went -- they saw -- there were a lot of dead people there, you know.
    But a lot of them were ours. We had -- I think on that hill, we must have had -- between K Company and L Company, we must
    have had about 25 guys dead too --
- speaker: Respondent
  text: -- besides the wounded, the wounded that, you know, that we could walk or they could carry. Now, let's see. He said
    they moved back several miles to a creek in Santa Rita.
- speaker: Interviewer
  text: Okay. Santa Rita?
- speaker: Respondent
  text: They were eating hot meals and all that. I was in the hospital then. And then he said -- you know, he talks about
    how the company looks different, you know.
- speaker: Respondent
  text: We had already -- went through battle and we was all beat up and -- He said we lost 12 men, our company did.
- speaker: Interviewer
  text: And the other company probably lost about the same, so yeah.
- speaker: Respondent
  text: But we had a lot of guys wounded, a lot of them. Now let's see. "The fighting had moved from Bloody Ridge, but the
    hill was taken." That's what it was called, Bloody Ridge. There was a lot of blood there. A lot of blood spilled there.
    On the 12th they ran into some, like, sniper fire. That's what he said there.
- speaker: Interviewer
  text: Now, you were still in the hospital --
- speaker: Respondent
  text: I was in the hospital, yeah.
- speaker: Interviewer
  text: All right. About when did you get back to the unit?
- speaker: Respondent
  text: About -- I'm not sure if it was eight or 10 days.
- speaker: Interviewer
  text: Okay, all right.
- speaker: Respondent
  text: They send my ass back. See, they used to use penicillin -- -- but in liquid. You know, not a shot. They wash it and
    they healed fast.
- speaker: Interviewer
  text: Okay. All right.
- speaker: Respondent
  text: So I went back about eight or 10 days. And the only reason they didn'tsend me back was because they weren'tdoing any
    fighting. They were just getting ready to go out -- you know, go look for some more.
- speaker: Respondent
  text: He said on February the 13th -- see, I wasn'tthere then. On the 13th, he said was -- "Company K was to make fame and
    history for itself." He said the colonel sent him to move forward with Company K on the right next to the road. Captain
    Sandefur (ph) was on the left. They hit sniper fire and he said Sergeant Snyder (ph) and Private ___________ were killed
    and they were held up -- I went back and I -- and we did some more fighting.
- speaker: Respondent
  text: See, I just didn'tremember. I went back and they -- I went right up there again. That's when we got to Zig Zag Pass,
    you know. It was in the mountains.
- speaker: Interviewer
  text: When did the fighting finally end? I guess --
- speaker: Respondent
  text: That's what I'm trying to find out. See, when I left -- we never had any idea of what day that it was. He said over
    here before. Let's see what date. When I first got this -- he sent it to some guy, a friend of his, and gave me -- he
    gave me --
- speaker: Respondent
  text: -- one and I went and got copies. I had copies made for my outfit. We meet yet. Five of us got together last week.
- speaker: Respondent
  text: In -- over in Butler, Indiana. They had a post there, but they went out of business now. So we go over there and we'll
    stay in a motel and we get together because a couple of the guys that -- one of the guys that always go in, you know,
    the paperwork, he lives there in Butler, somewhere in that area. Last year was only five of us left.
- speaker: Respondent
  text: Because we were an Indiana outfit. We got a lot of guys from out of state, but they couldn'tcome. February the 13th,
    that's when they said they made history. So I must have come back on the -- if I was gone on the 7th, I came back the
    day after they went through that. So I didn'thave anything to do with that part.
- speaker: Respondent
  text: But then when I came back, the colonel told me, "Better get your ass out there. They need you." So, you know, I had
    to go back with my company.
- speaker: Respondent
  text: And then we started down the road, you know. Oh, yeah. Here's where he lied a lot again. There were Japs on both sides
    of the road. See, the road was real small. Company L was on one side and Company K on the other. So we were moving real
    good because, you know, guys on that side could fire across us, you know, because they knew -- and we could fire, you
    know -- -- we weren'tshooting into each other. And that's when we finally won the pass.
- speaker: Interviewer
  text: What was the -- what was the -- was it grass or rice or what were you going through? Just a jungle, okay.
- speaker: Interviewer
  text: Jungle through -- a narrow road through a jungle. And where were you going at the time? You were --
- speaker: Respondent
  text: We were just trying to get them out on the flat land so that they could get them from the other side.
- speaker: Interviewer
  text: All right. And there were U.S. troops on the other side -- -- that were trying to squeeze them.
- speaker: Respondent
  text: A different unit, but we didn'tknow what company they were. You never knew who in the hell was next to you.
- speaker: Respondent
  text: Except when -- when -- we got help from the 1st Cavalry and then we got help from the ____________ division. We used
    to alternate.
- speaker: Respondent
  text: We'd be up there and then they'd come. See, this one I wasn'tthere. They had quite a few, quite a few guys killed
    that time.
- speaker: Interviewer
  text: When you were in the hospital? So you got back and you said you weren't in the hospital very long. And you finally
    got them down onto the flat and you're pushing them toward our friends.
- speaker: Respondent
  text: Yeah. And so we went back to Zig Zag Pass. We went to take care of the town. See, we went back to Olongapo.
- speaker: Respondent
  text: And we made bivouac there. And then we had to have patrol -- we had to have groups, you know, at every bridge and
    everything, you know, so the Japs wouldn'tcome and blow them up.
- speaker: Respondent
  text: So that's what we -- we came back. We were there, but I don'tknow how long we were there. And then, see . . .
- speaker: Interviewer
  text: What was your rank at this time? You were still a tech sergeant?
- speaker: Respondent
  text: Yeah, I was a tech sergeant. See, this one I -- I really don'tremember much about this.
- speaker: Interviewer
  text: But you did go back --
- speaker: Respondent
  text: Yeah, I went back.
- speaker: Interviewer
  text: -- and were guarding the town and the bridges and keeping everything secure.
- speaker: Respondent
  text: I was -- see, I worked with the Japs -- with the Filipinos. They made me a captain in their outfit. They gave me a
    diploma or something. I have it.
- speaker: Respondent
  text: Yeah, I was a captain in the Filipino guerrillas. These other guys made me second lieutenant. They made me a captain.
- speaker: Respondent
  text: Yeah, they liked me, you know, because I used to go on patrol and they used to give me hell. We didn'thave too many
    men. We were short. We were real short then.
- speaker: Interviewer
  text: Right. When you were guarding the town, were there Japanese in the area that you --
- speaker: Respondent
  text: No -- yeah -- out of town.
- speaker: Interviewer
  text: You cleared them out pretty well.
- speaker: Respondent
  text: Yeah, they were gone.
- speaker: Interviewer
  text: Okay, good. Good.
- speaker: Respondent
  text: But they were afraid that there could be some left. There were stragglers.
- speaker: Interviewer
  text: Okay. Sure. Be safe.
- speaker: Respondent
  text: He said they were close to the road and they were all -- they all took off their clothes and were swimming. They were
    -- oh, no, they were just resting.
- speaker: Respondent
  text: And cleaning their guns. Clean your gun every day. Didn'tgive a damn what you were doing, you clean your gun every
    day. Let's see now. See, then -- then they moved us.
- speaker: Respondent
  text: I can't see here when they -- they moved us. But I know there was a -- while I was gone, they got hell too. They were
    hitting -- bullets were hitting all over, all around them.
- speaker: Interviewer
  text: Right. But that's still back when you were in the hospital?
- speaker: Respondent
  text: But no -- "No one right near me had been killed then," he says. The radio operator was shot, but the -- "I was still
    trying to get the radio to work."
- speaker: Respondent
  text: See, I wasn'tthere then. He said he lost his rifle and helmet in the confusion, the captain. He said he found a Browning
    automatic rifle, and he had 200 rounds of ammunition "on the ground near me. I picked it up and loaded it, loaded a clip
    and start spraying the brush again." See, they hid.
- speaker: Interviewer
  text: Okay, all right, I see. Well, how long -- you guarded the town, you said, for a while.
- speaker: Respondent
  text: Yeah, we stayed there for a while. And we rested. See, because there wasn't any action any more on that part of the
    island.
- speaker: Respondent
  text: It was over. They were all going towards Manila then. And then we -- that's where they sent us. But we went on the
    other side of Manila. See, the -- Manila was right on -- you know, not too far from the ocean. So they sent us around,
    you know.
- speaker: Interviewer
  text: Okay. Around the other side of Manila to come in from that side.
- speaker: Respondent
  text: And we got over there and there was mountains too, you know, but different kind of mountains. Bare mountains, but
    hills. So -- but I want to get to there so I can make sure that I let you know what happened, you know. He said we were
    down to 40 men in Company K.
- speaker: Respondent
  text: When we started we had over a hundred. Had a lot of men -- oh, we had a lot of guys killed. You know, if you tell
    people, they -- you know, maybe this guy's crazy. Oh, we had so many killed -- kids killed, you know.
- speaker: Respondent
  text: We were -- hand-to-hand, you know. We didn't use the bayonets. Hell, it's too dirty. And you know, they were in the
    holes and we would get close to them. You know, the dirt that they threw out, you know, they were hiding. Shoveled dirt
    in the holes, suffocate them.
- speaker: Interviewer
  text: Sure. Whatever it took.
- speaker: Respondent
  text: Yeah. See, we had orders not to take prisoners. Now he's talking about another captain that we had, __________ +.
    See, I wasn'tthere then. The next day we got orders to push a short distance.
- speaker: Interviewer
  text: Well, I'm interested now in Manila. Can you tell me --
- speaker: Respondent
  text: Yeah. Before we get to manila, we went through a dam, Wawa Dam. That's what we took. See, we didn't -- we didn't --
    we were not in Manila. We went to Wawa. There was a dam that used -- they used to get the water from there. And it was
    full of Japs, you know.
- speaker: Interviewer
  text: Was this the water source for Manila?
- speaker: Respondent
  text: Evidently it was.
- speaker: Interviewer
  text: And you took that -- you took that --
- speaker: Respondent
  text: We went that way. But some of us didn'teven get close to the dam because that's when we really start getting -- it
    was tough there.
- speaker: Respondent
  text: And it was hills and mountains and no cover, you know. So it was bad. But we had them on the run then, see. They didn't
    put up much of a . . .
- speaker: Interviewer
  text: And you still had no air support or were you getting any air support?
- speaker: Respondent
  text: We never got air support.
- speaker: Interviewer
  text: You never got any air support, okay. Okay. So you got the Japs on the run around the dam -- -- and got them out of
    there.
- speaker: Respondent
  text: That's where we went, you know. I want to -- if I can see what happened, I'll remember. Zig Zag Pass was open already,
    see.
- speaker: Respondent
  text: So we played a vital role in opening it to Manila, you know, and the battle of Manila was not taking place.
- speaker: Respondent
  text: See, we didn't go straight to Manila. They sent us another way. And then that's when I got wounded again. 20 men had
    been killed.
- speaker: Interviewer
  text: How many times were you wounded? Twice and once was --
- speaker: Respondent
  text: See, the captain said, you know, he said in that paper, in that letter that I was wounded three times. But over here,
    he put a patch on it because I had a phosphorus burn.
- speaker: Interviewer
  text: Phosphorus burn.
- speaker: Respondent
  text: But I didn'thave to go to the hospital, you know. But he said I should have gotten -- you only get one Purple Heart,
    that's all.
- speaker: Respondent
  text: You don't get two, you know. You get what you call a -- what the hell they call it? Oak leaf. I wasn'tworried about
    -- I didn'twant any of that. I'd show you my ribbons.
- speaker: Interviewer
  text: I'd like to see them.
- speaker: Respondent
  text: We pulled back to Olongapo to guard the ammunition dump and hospital. See, neither those things -- I didn't go on
    those, you know.
- speaker: Respondent
  text: But he knew everything because the colonel would tell him, you know. Let's see. Where we come -- oh, he -- he got
    his promotion here now. Got promoted from first lieutenant to captain. See, he said that the natives gave us parties and
    all that but -- in Olongapo. See, I wasn't -- I -- I wasn'tinvited.
- speaker: Respondent
  text: Then on the 14th of February, we hadn't had any casualties since the 8th through the 14th. He said we stayed there
    a short time, and then we got orders to move into the Zambales Mountains. That's what I was trying to remember.
- speaker: Respondent
  text: It was on the other side of Manila. See, I told you it was bare, you know, just rocks. We went to block the ___________
    Trail that leads from Clark Field west to the coast.
- speaker: Interviewer
  text: Okay. So you're taking -- you're going --
- speaker: Respondent
  text: Yeah, they gave us the transportation ___________+. We didn'thave to walk there. We went to -- he said we passed through,
    oh, Pumbatu (ph).
- speaker: Respondent
  text: Pumbatu and then to the village of Mawgeesawgees (ph). He said they were not -- those black -- little negritos, you
    know. We got those too. We couldn't see anything. Get them up at 3 and they get up and they tell you. Japs. And then they
    didn'tknow whether they were Japs or their own men.
- speaker: Respondent
  text: That's when we -- we found a lot of guns and all that and ammunition, Japanese. They left them; you know, they couldn'tcarry
    it any more.
- speaker: Respondent
  text: What they wanted to do was get the hell out of there. But they couldn't go anywhere. Go out to sea. Oh, yeah, I remember
    this spot now. We got to a place where clear stream and set up camp.
- speaker: Respondent
  text: We were there -- this is where I got -- no, I got hurt again later on. He said we had fresh meat for dinner because
    they killed one of those -- those -- I don'tknow what the hell they call them, like -- they weren'tcows.
- speaker: Interviewer
  text: Whatever it was.
- speaker: Respondent
  text: See, now over here he comes to Sergeant Hernandez. He was another boy from the harbor. We went together. But I had
    him changed because he was a little bit too, you know, rough, you know.
- speaker: Respondent
  text: He beat up one of the boys, you know. And I went, I told him, "How come you beat him up?" "Oh, I didn'tlike the son
    of a bitch." So I busted his ass from sergeant to private again and moved him to another -- not a company, to another
    platoon, you know. But then later on I got him again. He was good, you know. But I didn'tlike what he did. He killed one
    of the bravest guys that we had, some Italian kid from New York City. Yeah, you know, they -- he didn'tlike him for some
    reason and kicked his ass. He used to fight. You know, he used to fight.
- speaker: Interviewer
  text: Is he still around?
- speaker: Respondent
  text: No, he died along time ago. There were -- oh, we -- this -- on this -- when we got over there to those towns, we got
    out of there and we started going -- we meet a little assistance, you know.
- speaker: Respondent
  text: Because they were trying -- they were trying to join forces with the guys that were in Manila. And so we went looking
    for them.
- speaker: Interviewer
  text: You were cutting them off?
- speaker: Respondent
  text: Yeah, we were looking for them. He said here that he shot -- he did a lot of firing. He said his pistol was empty,
    so he took a rifle that he found. Let's see.
- speaker: Interviewer
  text: And is this where you got wounded again?
- speaker: Respondent
  text: We were on our way over here. That's when I got wounded.
- speaker: Interviewer
  text: Okay. How did that happen?
- speaker: Respondent
  text: Well, we were looking for them -- we knew where they were but, see, we couldn'tstand up. We were crawling.
- speaker: Respondent
  text: We did a lot of crawling. See, we couldn'tstand up. And then it was open and we were moving -- you know, I moved with
    my men all the time. This guy said he moved with the men, but he didn't. I knew the guys that moved with the -- you know.
    You could get along with -- the men would do anything for you. See, over here -- see, that area didn'thave a name. We
    were just wide open.
- speaker: Respondent
  text: And then we got -- wherever it was, he said a lot of Japs came up and they were cooking, the mess -- the kitchen was
    there and they were cooking. And some Japs came and even the cooks got guns and they killed them. Yeah. But see that's
    when we found a real good spot. It was like on the mountains and there was like a spring.
- speaker: Respondent
  text: And gave a lot of water. You know. And we could bathe. We couldn'tswim, but we could drink it. You know, it was real
    good. And that's when -- that's when I -- we were there and I had -- that's when I went on a patrol then. I went -- I
    didn't go on a patrol. I was the front.
- speaker: Respondent
  text: See, there was -- see, he was -- you know, there was mountains. They were sliding, you know. It was steep mountains
    and it was hell. No cover and you were -- you know, the guys were waiting for you.
- speaker: Interviewer
  text: The Japanese were up above you on the mountain?
- speaker: Respondent
  text: They were down there already. They could see you.
- speaker: Interviewer
  text: Oh, okay. I see.
- speaker: Respondent
  text: He said they got relieved again from over there. He said -- oh, here he comes again with me. We were there in that
    area where the water was. He said, "Company L came up to relieve us. I warned the company to bevery careful that night
    and not to fight unless they had to. I want to get out of this area without any more casualties. We had some booby traps
    set -- set out. And the order was -- the orders were that no one could leave the company area in the morning." See, I
    had those done. I didn't do it; my men.
- speaker: Respondent
  text: I had a guy, Gonsi (ph), he used to be from here. He was good about that, you know, he liked to mess around with autos
    and all that. And so he went and put the booby traps; they were booby traps. "During the night a Jap patrol hit us with
    some firing and some firing took place. Things were quiet at daylight, so I a woke Sergeant Alvarado and told him to take
    his detail out to disarm the booby traps." We got some guys killed here too. Sergeant Traheyda (ph) was our first sergeant.
    We got him from the regular Army. And the runner, the captain's runner, Pearson, they went out to look for souvenirs.
    We had set those traps and told everybody not to move. The colonel was sleeping with me that night. Every time he'd come,
    he'd always bunk with me. And he was bunking with me. So these guys went out to find souvenirs, and he started out yelling
    for them. He said he started. "I heard the explosion," he said. But I had already hollered at the other guys, you know,
    "Stop those guys." They were going -- they went out to look for souvenirs. And they both -- you know, one of them died
    right away and the other one went to the hospital, you know. They -- you know, they set up -- they set them up all night
    long. The Japs set some of them. But there were some left. And we had to go take them because --
- speaker: Interviewer
  text: -- you knew where they were.
- speaker: Respondent
  text: -- Gonsi knew where they were -- -- and he could disarm them easy. So anyway, he said I called back -- I called them
    back, but Peterson -- Pearson was dead and Traheyda was hurt. We had to bring them back and then we sent them to the hospital
    because we were -- we had a truck then. I don'tknow how in the hell we got it but we had a truck -- oh, the colonel.
- speaker: Interviewer
  text: Sure. It was the colonel's truck.
- speaker: Respondent
  text: Oh, yeah, he came up. And he doesn'tmention the colonel. The colonel was there that night. Company K moved on -- we
    moved on that day to Olongapo.
- speaker: Respondent
  text: We had a nice time there for about a week. We got drunk and checked on the girls. He didn't. He didn't do nothing.
    He was -- evidently he was a religious guy, but, you know, most of us -- my life -- you could float a couple of battleships,
    the beer that I drank. "We were into plenty of Japs and some of them were tough. Sergeant Alvarado was wounded for the
    second time on this trip." That's on this trip. Yeah. So they sent me to the hospital, you know. They sent me back and,
    you know, it was nothing but mountains. And so we had to -- they had to carry me out, but the guys that were going to
    carry me were sicker than I was. I was shot in the leg, but, you know, I had pain but --
- speaker: Respondent
  text: -- you know, I'd take a shot of morphine and I could stand it. But I couldn'twalk on it. I walked for a little while
    so they had to carry me. So they would carry me for a little while and we'd stop and I'd crawl, you know, to give them
    a rest.
- speaker: Respondent
  text: Till we got out in a flat area and they landed -- they were landing a small plane. And they carried out, you know,
    on the sides --
- speaker: Respondent
  text: -- one of those little shitty-ass planes. What the hell -- I don'tknow what they call -- plane, little ones, you know.
- speaker: Respondent
  text: And they took me out. But those guys that carried me over there, that helped me over there was sicker than I was.
    The only thing I -- you know, I could -- I could --
- speaker: Interviewer
  text: You couldn'twalk and they could walk.
- speaker: Respondent
  text: They were sick -- yeah, yeah.
- speaker: Interviewer
  text: Sure. So then now the plane took you where then?
- speaker: Respondent
  text: Took me to a hospital.
- speaker: Interviewer
  text: In Manila or -- no, no, you --
- speaker: Respondent
  text: No. In Clark Field. In Clark Field.
- speaker: Interviewer
  text: In Clark Field, okay. And how long were you there?
- speaker: Respondent
  text: Let me see how long. I had it in the -- that's the -- maybe I have it there, but I wasn'ttherevery long.
- speaker: Respondent
  text: See, my captain told me, "You going home now, Joe." He told me, "You're going home now. I won't see you anymore till
    -- if I get back to the States, I'll see you," he told me. And god, you know, over there they -- they x-rayed me and the
    doctor said -- oh, I stayed there 10 days.
- speaker: Respondent
  text: So he said stay off your feet for 10 days. They send my ass back up. And you know what, they closed that hospital,
    they never told us anything. They knew they were moving but they didn'ttell us. So during the night, you know, we went
    to sleep; got up in the morning and looking for the kitchen, for the chow. And there was no kitchen, nothing.
- speaker: Respondent
  text: And no transportation. So we were -- there was quite a few of us. And I could walk then, you know, but, you know,
    the damn thing was still bleeding, you know. So we had to go back to my outfit. We got back on the road and we could see
    trucks going, so I was looking for a 38th Division truck. And one was coming and I stopped it, you know. I was by myself.
    The other guys were looking for trucks, you know, from their own --
- speaker: Respondent
  text: -- division. So I -- I got back to my outfit. When I got there, there was one officer left, and when he saw me --
    I went first to division, you know, because that's where the truck was going. When I got there, I said -- you know, I
    reported there to some colonel. I'm looking for my outfit, Company K. He said, "Oh, we're gonna send a truck over that
    way. Wait a little while." So I waited there a while. Then I went -- I joined my battalion again.
- speaker: Interviewer
  text: You were going back to your --
- speaker: Respondent
  text: And that's when we went back and -- oh, that's when we went to Manila, see.
- speaker: Interviewer
  text: Now, when you got to Manila, was most of the fighting over then at --
- speaker: Respondent
  text: They were fighting but they were going out to sea. They shoved them out into the ocean. Japs were laying all over.
    They killed a lot of them.
- speaker: Interviewer
  text: What did you do in Manila, then?
- speaker: Respondent
  text: We went through it, you know. The guys that were in front of us were taking care of it. We didn'thave to shoot any
    more.
- speaker: Respondent
  text: So then we went and we went got to -- we went to a place -- I don'tremember what the hell the name of it -- and we
    made a camp, you know.
- speaker: Respondent
  text: The division -- well, we were so short of men, you know. But each unit was assigned a spot and we had tents and close
    to town. That's all we wanted.
- speaker: Respondent
  text: And -- but there were a lot of Japs killed in that area. Stuff. So the hard fighting was over there, see.
- speaker: Respondent
  text: And, well, he's talking about how it was -- but I don'tknow how Andy he wrote this. This one, he wasn'teven there
    then.
- speaker: Interviewer
  text: How long did you stay in Manila?
- speaker: Respondent
  text: We didn'tstay in Manila, just outside.
- speaker: Interviewer
  text: Just outside of town. How long were you there in that camp?
- speaker: Respondent
  text: Well, till we came back.
- speaker: Interviewer
  text: Okay. And when did you leave the Philippines, about?
- speaker: Respondent
  text: The Philippines, it's in -- what in the hell --
- speaker: Interviewer
  text: Because that would have been --
- speaker: Respondent
  text: It's got to be here in -- see, I never had a record. I had a discharge with a -- I was at the 36th Evac Hospital,
    see.
- speaker: Interviewer
  text: Right. On February 7th, right, I've got that. And then you went back. And then -- but I'm trying to figure out when
    did you leave the Philippines?
- speaker: Respondent
  text: Well, it will be here somewhere.
- speaker: Interviewer
  text: Oh, okay. All right.
- speaker: Respondent
  text: See, I don't -- I really never got a record of -- see this.
- speaker: Interviewer
  text: January 10th of '46 you got out of the service.
- speaker: Respondent
  text: Yeah, well, that's -- you know, but I had some time, you know. We were on that boat, that Marine Cardinal. Let me
    check and see if I --
- speaker: Interviewer
  text: Do you have anything there but the Marine Cardinal? The hospital ship? It's a Navy ship, you know. They put you on
    a hospital ship to come back?
- speaker: Respondent
  text: No, the whole -- The whole -- well, my battalion came on that one and we had a lot of nurses. See, before we got on
    that boat, I was the billeting officer. The colonel told me, "You go -- you're in charge for the billeting for the women,"
    you know.
- speaker: Respondent
  text: The women, he meant the nurses, the Red Cross women and -- a lot of women that we had. So I worked my ass off all
    day. And I was through at about 11:00 at night. So I went to my -- I had to go find out where in the hell I was gonna
    stay, with the other guy that was -- that -- we were both commissioned --
- speaker: Respondent
  text: -- him and I. When I got there, I told him, you know, "I feel sick. I got a" -- I had a, you know, pain in my chest.
    So I told him, "Is the doctor on?" He said, "Yeah." I told him, "Well, why don't you call him." So the doctor came and
    he saw me. He said, "Joe, I can't do anything for you now. You're under the Navy's" -- I told him, "Well, what the hell
    am I gonna do?" He said, "I'll go and tell the Navy" --
- speaker: Respondent
  text: -- "doctor." The Navy -- the Navy doctor came and he said, "I got to operate on you, but I can'to perate on you right
    now; in the morning, at daylight."
- speaker: Respondent
  text: In the morning I -- and I stayed on the boat, in the hole all the time back. And no son of a bitch ever came to see
    me. They were busy.
- speaker: Interviewer
  text: What was the matter with you?
- speaker: Respondent
  text: Well, I had appendicitis.
- speaker: Interviewer
  text: You had appendicitis. Oh, man.
- speaker: Respondent
  text: Had an appendicitis attack.
- speaker: Interviewer
  text: Did he operate and take it out?
- speaker: Respondent
  text: Yeah, he operate. He operated on me. And then he saw my feet and he said, "What the hell you been doing with your
    feet?" I told him, "Well, I was shot in that leg." He could see the, you know -- I still had infection on it. And he said,
    "What's the matter with your toes?" I told him, "Nothing. I had a little jungle rot when we were in New Guinea." So, you
    know, he pulled my nails out.
- speaker: Respondent
  text: He pulled the nails off and I couldn'twalk for nothing for -- you know. But anyway, that's when we start coming back.
    But I'd like to find the --
- speaker: Interviewer
  text: And you came back and you finally got out in '46.
- speaker: Respondent
  text: Yeah, '46. I was -- see, I had a few days coming, but I was by myself. See, I didn'thave anybody from my division.
- speaker: Respondent
  text: I was a bastard out there by myself in that hospital. And, you know, I had morphine needles, you know.
- speaker: Respondent
  text: They gave them to us in case somebody got hurt, you know, to stop the pain. And when we were in the hospital, they
    saw them and they said, "Where in the hell did you get those" -- I told them, "Well, hell, every -- every -- leader, you
    know, had them, you know. Sergeants and" -- we had them, they come to find out when we got on the Marine Cardinal.
- speaker: Interviewer
  text: Yeah, you got out March 15th of '45.
- speaker: Respondent
  text: Yeah -- well, that's when my time that I had --
- speaker: Interviewer
  text: Yeah. And your serial number was 35158004.
- speaker: Respondent
  text: That was as an enlisted man.
- speaker: Interviewer
  text: That was your --
- speaker: Respondent
  text: As an officer I had another number.
- speaker: Interviewer
  text: Okay. And what was your --
- speaker: Respondent
  text: Second lieutenant.
- speaker: Interviewer
  text: That was your highest rank.
- speaker: Respondent
  text: Yeah. See, that's my number here.
- speaker: Interviewer
  text: Okay. And this is -- and your lieutenant number is -- -- 259. All right. And now when you came back, where did you
    land? You came to --
- speaker: Respondent
  text: And they took me to a hospital there. And I had to stay there till they released me. I'm by myself. The only good
    thing about it is my family was living in California, in LA, and my wife was there.
- speaker: Interviewer
  text: Okay. So you got a chance to see --
- speaker: Respondent
  text: Yeah. Oh, that's my -- That's what's his name's --
- speaker: Interviewer
  text: That's his wife. Now, so you -- you were in LA. Is that where you were discharged finally?
- speaker: Respondent
  text: No. My wife was living in Texas -- -- when I was in the war, you know. She had a sister over there and her husband
    was in the --
- speaker: Respondent
  text: -- Air Force, so she went to live with her sister over there; they could share expenses, you know. Because I -- you
    know, I was only an officer from -- I think it was April.
- speaker: Interviewer
  text: Just a little while. Wasn'tvery long. But where were you then when you did get discharged finally?
- speaker: Respondent
  text: From Fort Bliss in El Paso.
- speaker: Interviewer
  text: Okay. You got -- from El Paso.
- speaker: Respondent
  text: Yeah, from there. On my own. And I went and had a physical there. And those bastards said, "You see that Mexican.
    He's an officer." You know -- but, you know, I never saw an officer in my -- in my division. I was trying to find out
    if there's a way that I could get any of that in formation.
- speaker: Interviewer
  text: I think we can find some of that out for you when we --
- speaker: Respondent
  text: The 38th Division is in Indiana.
- speaker: Interviewer
  text: We ought to be able to help you.
- speaker: Respondent
  text: That's from the National Guard.
- speaker: Interviewer
  text: Well, then after you were discharged, did you come back here to Indiana?
- speaker: Respondent
  text: I came back here. I had my job over here.
- speaker: Interviewer
  text: You had your job still?
- speaker: Respondent
  text: I came back and --
- speaker: Interviewer
  text: Where were you working at the time? In the steel, in the open hearth. Do you know anything about the mill? Did you
    work in the mill? No, but I know I've been through them many times.
- speaker: Respondent
