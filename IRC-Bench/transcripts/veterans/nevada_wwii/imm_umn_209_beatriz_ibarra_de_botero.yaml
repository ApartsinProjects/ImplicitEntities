  text: UMN Immigrant Stories Collection Beatriz Ibarra de Botero ['Ibarra de Botero, Beatriz'] ['United States']
- speaker: Respondent
  text: 'Beatriz Ibarra de Botero was born in Colombia in 1948. She came to the United States to join several of her children
    who were already living in the United States. She is currently working and studying English. Beatriz Ibarra Transcription
    Mi nombre es Beatriz Ibarra de Botero. Yo nací en Colombia en una ciudad que se llama Garzón, Huila, yluego me llevaron
    a Bogotá. Mi mama se enfermó y se vino para Cali y de ahí yo quedé sola con mis hermanos pequeños. Luego mi mama regresó
    allá a Huila yentonces me dijeron que me devolviera para cuidar a mi mama porque a ella le dio cáncer. Y pues mi mama
    se agravó, siguió más enferma, yhasta que falleció. Entonces me fui para Cali y allá en Cali me puse a trabajar. Luego
    conocí al papa de mis hijos. Nos enamoramos y con el tiempo nos casamos. Y tuvimos cinco hijos. Mi hija, una de las menores
    se vino para acá pa Estados Unidos ya después de ella se vino la otra hija mayor, ypoco a poco se fueron viniendo to das.
    Y la menor pues está en Canadá y la menor está estudiando, está haciendo un doctorado. Ya tenemos más de cinco años de
    estar aquí, entonces mi hija dice que ya podemos a plicar para la ciudadanía. Estamos en eso estudiando inglés pero es
    muy difícil. Dios quiera que a prenda rápido porque es estresante estar uno en el trabajo y la mayoría, casi to dos saben
    inglés, los latinos. Entonces uno se siente mal porque se siente como discriminado. Ellos saben dos idiomas y uno no ha
    podido a prender el segundo idioma. Mi hija dijo que para donde queríamos estar nosotros los últimos años, que si queríamos
    estar aquí en Minnesota o en Canadá o en Colombia, oadonde… o en la otra hija que tenemos en Dallas, Texas, que si queríamos
    estar allá, entonces yo le dije que no a mí me gustaba más aquí en Minnesota, me gustaba todo: el clima, las estaciones,
    la gente, to dos muy a mables. Me gusta el modo de vivir que es muy bien, el transporte, la gente respeta mucho los peatones.
    Uno puede estar tranquilo, pasa uno una calle y las personas esperan a que uno pase. Me ha gustado mucho eso. Mucha cultura,
    muy buena cultura aquí. No es como Colombia, que en Colombia la gente maneja, se violan los semáforos y por eso es que
    hay mucho a ccidente, en cambio aquí no, aquí respetan mucho eso. Y no, todo me ha gustado. Me ha gustado mucho aquí.
    Nosotros, yo con mi esposo ya llevamos 46 años de casados. Pues todavía estamos juntos. No hay problemas de nada. Estamos
    bien, nos queremos. Feliz de la vida, yo amo mucho la vida, la naturaleza, todo. Estoy contenta por todo, y le pido mucho
    a Dios que nos de mucha salud…y que los hijos gocen también de la vida y que vivan tranquilos yfelices. Translation My
    name is Beatriz Ibarra de Botero. I was born in Colombia, in a city called Garzón, Huila. Later I was taken to Bogotá.
    My mother got sick and went to Cali, and from that point on, I was left a lone with my younger brothers. My mom later
    returned to Huila, and they told me to go back and take care of her because she had cancer. My mom got sicker and eventually
    died. So I went to Cali and started working. Then I met my children''s father. We fell in love, and after some time, we
    got married. I had 5 children. The youngest, she came to the United States. After she came, little by little, all of them
    came. The youngest is now in Canada doing her PhD. We''ve been here more than 5 years now, and my daughter says that now
    we can apply for citizenship. We are working on learning English, but it is really hard. Hopefully I can learn quickly
    because it is very stressful to be at work where almost all Latinos know a second language. You feel bad because you feel
    discriminated against because they know a second language and you don''t. My daughter asked us where we would like to
    be for our final years, if we wanted to stay here in Minnesota, or in Canada, or in Colombia, or with my other daughter
    who lives in Dallas, Texas. She asked us if we wanted to be there, but I said that I liked Minnesota better. I liked everything:
    the weather, the different seasons, the people a revery kind. I like the way of life, it''s very good: transportation,
    people have a lot of respect for pedestrians, you can be assured that if you cross a street, the cars are going to wait
    for you. I liked that a lot. There''s a lot of culture, a very good level of culture. It''s not like in Colombia where
    people go at red lights and there are a lot of accidents. Here, they follow rules a lot. I like that. My husband and I
    have been together 46 years. We are still together. There haven''tbeen any problems. We''re fine and we love each other.
    I''m very happy with life. I love life, nature, everything. I pray to God that we have good health and that our children
    also can enjoy life and live peaceful and happy.'
