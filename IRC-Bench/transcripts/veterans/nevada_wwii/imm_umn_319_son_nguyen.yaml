  text: UMN Immigrant Stories Collection ['United States'] Song Nguyen was born in 1996 in Hue, Vietnam. In 2013 Song moved
    from his life in Vietnam to the United States. While in the US, Song originally struggled with English, but has since
    learned a lot, in part do to his job with Genesy Works. Moving to a new country could be a hard thing to do. About 4 years
    ago, my family of 5 moved to the US to start a new life. At that time, my life in Vietnam was great. School was going
    well; I played for my school basketball team; I had friends to hang out all the times. I enjoyed every day of my life.
    All of a sudden, I lost everything. I moved to a place that people spoke something that I could barely understood and
    did things that I had never seen in my country. After many unsuccessful attempts to talk to people, I felt terrible and
    lost my confidence. I went to one of the top schools in Vietnam, and there I was, couldn'teven say a simple sentence clearly.
    One week after my arrive, I went to Richfield High School and studied 11th grade again to have enough time to prepare
    for the ACT. It was hard for me to blend in with other students because I couldn'tspeak English well. I hated group assignments
    or class discussions because I had to talk during those activities. Phone call, on the other hand, was a whole new level
    of struggle. Things like "Can you say that again" or "I'm sorry, I don'tunderstand that" appeared in the conversations
    more than the actual things I wanted to say. It was a disaster for me. But my brother and I had to handle almost everything
    relating English for the family, so it was my duty to make those phone calls. Being able to make money while in high school
    was new to me. I applied for some places but got rejected. That was when Genesys Works came to my school to recruit new
    students. I was silly to apply and go to an in terview, but didn'texpect much. Somehow magically, they accepted me for
    some reason. But anyway, working there for a year rewarded me more than just money. I improved my speaking and listening
    quite a lot by talking to my coworkers every day. It also made me feel less shy when talking to people. And for the first
    time, I had enough money to buy a pair of shoes for my mom which made me feel like I'm rich man. I also managed to save
    enough money to travel back to Vietnam twice. After four years, I still have no friend. Even though I can speak English
    quite well now, I still find myself hopeless at making new friends. It is sad, but I'm used to it now. During these 4
    years, I've grown a lot, I've become more in dependent and more mature. I am now close to graduation, and everything else
    works out just fine for me. After all, I survive and I know that there are a lot more waiting for me in the future.
