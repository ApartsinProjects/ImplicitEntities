    as they wish." It wasn'tlong before the employers came and said, "We got a problem. We get money for training from Ottawa,
    and, if we take this, it's going to screw that up." It was their suggestion that they put it in with ours and use it all
    as a subsidiary pension. Last year we did something like 2.6 million. $10 a head.
- speaker: Respondent
  text: '[01:32:50] HARVEY: And that all goes into the pension fund? [01:32:55] LES: It''s a separate pension plan. We didn''t
    put ours out to bid, as a lot of unions do. We set up this trusteeship of three from each side. We set up an office to
    handle pensions and welfare benefits to be funded 50% by either side. Nothing could be taken out of pension and welfare
    money. Nobody''s making a profit off of ours. Like I say, we hit over a billion dollars last year in the fund. They were
    able to give us $10 per month per year of service.'
- speaker: Respondent
  text: '[01:33:52] HARVEY: Let me roll you back a little bit. You say you started getting active in the 1960s. Why did you
    pick to get active? Was it safety that drove you to get active?'
- speaker: Respondent
  text: '[01:34:07] LES: I''ve never really thought of why. Safety, plus the employers will do anything to boost production.
    A lot of times they do things to speed it up that aren''tunsafe, but they put a strain on the workers. I think just the
    combination of my natural opposition to authority. I know why. My parents, both of them. I was the middle child of three
    boys, and they a bused me both mentally and physically terribly when I look back on it.'
- speaker: Respondent
  text: '[01:35:14] HARVEY: Yes, sure. And other things that came up in your life, too, probably added to it. The Navy experience
    and so on.'
- speaker: Respondent
  text: You were president of Local 501, as I recall, during 1966. Then the famous situation developed with Victoria Day.
    Can you fill us in on that and your experience being arrested, and all the rest of it? Might as well get to that story.
    Mostly your part in it.
- speaker: Respondent
  text: '[01:36:07] LES: We had an elected executive board, and most locals elected their president. I was elected as a member
    of the area board as well as president. The Ist of January ''66 the federal government put in statutory holidays. You
    had to have 15 of the previous 30 days'' wages from one company. Of course, most of our'
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | les copan of local 500 members can'tmeet that. So
    they weren'tgetting paid for the holidays. We went to our employers, and they wouldn'thelp us. We went to the federal
    government, and they said, "Tough. That's the way the law was written."
- speaker: Respondent
  text: There is a clause in the elected agreement that says there will be no strikes, lockouts, or slow-downs during the
    term of the agreement. That restricts you. But a holiday is yours, and Good Friday was coming up. We asked our people
    not to work on Good Friday. Not a thing moved. Employers were not happy with that. As we approached the Queen's Birthday
    in June, they went to the Supreme Court and got an in junction to tell us to go to work.
- speaker: Respondent
  text: There was actually two issues here in BC. One was overall labor; they kept going and getting ex parte in junctions.
    You can't get public support for that. Most people say, "What the hell is an in junction?" There was also the statutory
    holiday thing. That, people understand. So we decided on Good Friday there would be no work, period. We knew that there
    would be contempt. We discussed it lengthy, and with our lawyer. He told us all the things that could happen, bad and
    good by not obeying the in junction. Our decision was that we would disobey the in junction, and, if they offered us a
    fine, we would not pay it - which meant we would go to jail. If you pay the fine, you've lost the fight.
- speaker: Respondent
  text: Come Good Friday, not a thing moved. We went along to the Queen's birthday in June, and they went and got the in junction.
    It said, "We think the officers of the union are thinking of telling their members not to work on the holiday. If they're
    thinking that, they' re not to do it, they're to tell their workers . . ." and all the paraphernalia that goes with it.
    Of course, we just ignored it. So then they started issuing - they want to see you, whatever you call that. We were dodging
    them because we still had work to do! There were so many interesting things. My two boys were delivering the morning newspaper
    at that time. The sheriff that they put on to deliver the notice to me lived in the next block. Every morning he was out
    there about 4:30am, sitting in his car in front of my garage. Of course, my boys would come in and say, "Mr. McKay is
    sitting out back." Fine, I'd phone a friend and he'd come to the front and pick me up and away we'd go. To show you how
    petty some people can be, I had a daughter in Grade 1| at that time, and he had a daughter in Grade 1. They were the best
    of friends because they're blocks a part. He forbid her to play with my daughter because of the dispute. Christ! Six-year-olds!
- speaker: Respondent
  text: '[01:42:20] HARVEY: Very petty, yes. [01:42:23] LES: Of course, eventually, we decided it''s time so we phoned them
    one morning and said, "We''ll be down to the courthouse en masse at 10 o''clock to turn ourselves in." We went, and then
    they issued notices and told us to go to court. We went through all of that. That''s what we went through.'
- speaker: Respondent
  text: 'The first day, actually, when we came out of court, our lawyer was there with a law book. I think I mentioned the
    requirements in the book. The delay was so much that finally he went up to the judge''s office to see what was going on.
    He came back, laughing again. He said, "There are seven lawyers in there trying to get the judge to change it to criminal
    contempt." But, remember what he said: "I no longer have jurisdiction." Couldn''t do it. They finally took us to the city
    jail on Friday night. I can tell you the food there isn''t fit to eat. Saturday morning, they took us to Oakalla, which
    is the provincial prison. The change room and the laundry are one huge, huge room. They drive the van right in, take the
    prisoners out of the van inside. Across one wall there was a big banner that said, "Oakalla Laundry Workers Local 1 Welcomes
    ILWU."'
- speaker: Respondent
  text: '[01:44:29] HARVEY: Really! That''s wonderful! I never heard that. Ilwu pacific coast pensioners association oral
    history project | les copan of local 500'
- speaker: Respondent
  text: '[01:44:37] LES: The guards are mostly only people. They were getting a big kick out of this because we''re defying
    authority. That''s what most prisoners are in for, defying authority in one way or another. You break into a house, you''re
    . .. Then Roy Smith, the president of the Canadian area [ILWU Local 501 president] , he weighed about 300 pounds. They
    couldn''tfind a shirt to fit him there. They had to go out and buy a shirt for him.'
- speaker: Respondent
  text: Wherever we went in the prison, we were treated differently from the prisoners. One guard said to me, "In all the
    years I've been here, I've never seen more than one prisoner talk with his lawyer at any time. There's two of you guys
    in there talking with him." We had a full-scale board meeting in the dining room. Our people from outside came in. That's
    when they came to us and asked us if we would go up to the Chilliwack River [the Vedder River] . They did a selling job
    - it was so much better because you were in a cabin. More freedom to move about.
- speaker: Respondent
  text: We a greed, but Roy laid down the conditions. All ten of us would be in one camp. We could meet at any time. We could
    meet with our people from outside in the evening any night they wanted to come up. There would be a telephone available
    to us for union business. He emphasized that there would be no social calls on that; it would be strictly union business.
    They a greed, mostly I think to get us out of their hair. We went up there, and we counted heads, and there was only eight
    of us. "Where's the other two?" "Oh, they're in the camp up the river." Roy, you can imagine, 300 pounds, sits down and
    says, "We will do this." Or else was implied. So they said, "Ok, we'll go up there in the morning and bring them back."
    They gave all eight of us a bus ride up to the next camp, and we picked up our friends and came back. They were right
    in that you have a lot more freedom there. We went in there, and the sporting equipment they had was terrible. We told
    our people what we wanted. They went out and spent over $100 - remember this was 1966! - on sporting goods. We resupplied
    the prison.
- speaker: Respondent
  text: When you're restricted to how much tobacco and so on that you can have, when you're moving they put all of your possessions
    in one bag. We're up there, and they would call us in one by one. This guard had your bag. He took my bag and he dumped
    it out, and he says, "That's. . .'- - staring at it! There was a half a pound of to bacco, four or five packs of to bacco,
    three or four books of papers, a deck of cards, and a crib [cribbage] board, and a few other things. He sat and looked
    at it, and he said, "What am I gonna do with this? Here, you're not supposed to have it, but take it anyway." He pushed
    it across the desk. Of course, I spread that amongst; we all did.
- speaker: Respondent
  text: '[01:50:14] HARVEY: Besides getting you guys out of their hair, why else were they willing to give into your demands?
    The guards and the prison system and so on. Is there another reason that they were willing to give in to what you guys
    asked for, what Smith asked for?'
- speaker: Respondent
  text: '[01:50:30] LES: They could not order us to do anything. They could ask us if we would do it. They came to us and
    said, "Would you guys consider going up to the camp on the river?" And then they gave us a selling job as to all the good
    points.'
- speaker: Interviewer
  text: '[01:50:51] HARVEY: Why were they treating you relatively well? Were they afraid of public opinion? What were they
    afraid of?'
- speaker: Respondent
  text: '[01:50:59] LES: No, they were afraid of the other convicts. The federal prison was in New Westminster, and they rioted
    in there. They put holes through cement walls that thick - that a man can walk through. Now, how in the hell can they
    do that? They tore all the plumbing out. Government gave in; they built another prison. When they closed this one, I gave
    tours. So I went out with Ivy, and, while we were going through there, they have a library. They have a section wired
    off with the legal books in it. Ivy and I were standing and looking at that, and'
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | les copan of local 500 I said to her, "It was never
    like that when I was in." We went outside, and she said, "I gotta rest for a minute." So we sat down on a low stone wall.
    This guy come over and he says to me, "I overheard you say that you were in there." So I have to explain, "No, I was in
    Dorchester." Suddenly he says to me, "You're Les Copan." "Yes." He said he was a writer, writing for The Prophet [Latter
    Day Saints newspaper] . He's a real good writer. I liked his stuff. His son was a coin collector, and he used to bring
    his son to the coin club meetings. That's where he [recognized] me from.
- speaker: Respondent
  text: '[01:53:24] HARVEY: When you''re there with Ivy, this is later than ''66. Am I right about that? [01:53:30] LES: Oh
    yes, that was when they closed the prison. [01:53:36] HARVEY: So that was way later?'
- speaker: Respondent
  text: '[01:53:37] LES: Oh yes. I''d have to look up the date on that. They let us out in ''66 after three weeks. The Minister
    of Labor came outhere and he made us an offer. They kept their word. They put an act through. Not only me but anybody
    who worked for multiple employers are covered.'
- speaker: Respondent
  text: Incidentally, a graduate student at Simon Fraser [University] did his thesis on that incident, and it's 32 pages.
    His conclusion was that we were not only good for the longshoremen; it's good for anybody in Canada. You haven'tseen that?
- speaker: Respondent
  text: '[01:54:58] HARVEY: No, but this is also part of the Pensioners'' Association Oral History project to get your story
    down.'
- speaker: Respondent
  text: '[01:55:09] LES: This is, but that wasn''t. He was a graduate student. A great deal of the in formation that he used
