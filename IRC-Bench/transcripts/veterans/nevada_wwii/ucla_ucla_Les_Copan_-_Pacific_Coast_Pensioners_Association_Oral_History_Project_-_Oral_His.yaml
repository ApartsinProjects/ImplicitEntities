- speaker: Respondent
  text: '[01:56:25] LES: [Making notes on a notepad.] With this one eye, I''ve got macular degeneration. On top of that, I''ve
    got a massive cataract. It''s going to come off soon now. We put it off because of . . .'
- speaker: Respondent
  text: '[01:57:09] HARVEY: Les, what other big issues did you get involved in when you were active in the union? What other
    major things have we missed, in terms of your experience inside the longshore union? Have we missed any major issues?'
- speaker: Respondent
  text: '[01:57:29] LES: A lot of small stuff. The employers had an iron hand here until the mid-forties when the ILWU came
    in. They did everything they could to keep us from getting in the union. They spent a lot of money on anti-union propaganda.
    Nothing major, a lot of small stuff.'
- speaker: Respondent
  text: 'Ilwu pacific coast pensioners association oral history project | les copan of local 500 [01:58:28] HARVEY: Well,
    you covered pensions, containerization, the Victoria Day situation. I''m just looking for any major thing we missed. Not
    so much the small stuff, although that can be illustrative.'
- speaker: Interviewer
  text: '[01:58:44] LES: A lot of the small stuff, but, offhand, a major issue, I can''treally think of anything. [01:58:57]
    HARVEY: When did you retire?'
- speaker: Respondent
  text: '[01:58:59] LES: ''88. 26 years. As a matter of fact, September 30th. Nowadays, they would put down the guy retired
    October Ist. We have a man that interviews anybody that''s retiring. I went in, and I said, "I''m gonna retire on the
    first of October." He said, "No, you''re not. If you retire on the first of the October, you have worked one day that
    month. You don''t get a pension check. But if you retired on September 30, you get your October pension payment." Whether
    they have changed it, I don''tknow. They keep putting down October Ist.'
- speaker: Respondent
  text: '[02:00:13] HARVEY: Let me ask you another question. How active have you been in the Pensioners'' Association? Have
    you come to the meetings a lot? Can you talk about that a little bit, what it''s meant to you? Why are you here now, today?'
- speaker: Respondent
  text: '[02:00:31] LES: Because I''m still a longshoreman, and I believe in unionism. I''ve had some real vicious arguments.
    My grandson and my daughter in Alberta don''tseem to be talking to mevery often because I''m opposed to the [Keystone]
    Pipeline.'
- speaker: Respondent
  text: But, union-wise, the big thing is getting sworn in. I guess maybe it still is; the casual finally get sworn in. I
    had the privilege of swearing my son into the local in Vancouver. But you see, those are the small stuff we're talking
    about it.
- speaker: Respondent
  text: '[02:01:31] HARVEY: But that''s kind of good to know, that you swore your son in, that your son is in the local.'
- speaker: Respondent
  text: '[02:01:40] LES: I''m the guy who speaks up. I guess you would call it a sidewinder''s compliment. One of our guys
    who was on the executive when I wasn''t, he came to me. He named a person on the other side and said, "We don''ttrust
    that president of the local at the moment, but that Les Copan, we know that his word is good."'
- speaker: Respondent
  text: Training became a big issue with me. They would send somebody to teach you how to drive a winch, but, when it came
    to the railway, they sent you over two weeks. It was up to the guys who were working there to show you what you had to
    do. They started two week periods for the engineers. Guy by the name of Joe LeBrun; he's a Maltese [from Malta] . He died
    earlier this year, and he hated the British. He was a loose cannon. He applied for engineer training. He got his switch
    ticket. And they wouldn'ttrain him. They weren'ttraining. This went on for the longest time. Finally, it clicked with
    me. I went to the business a gent that handled that, and I said, "Look, I have more seniority than Joe." I also had a
    switching rating. I said, "Put my name down for engineer training. If they accept me, it's an in dication that they're
    holding Joe back so they'll have to train him. But tell them that I will guarantee that Joe will never pass the test."
    He went in, sure enough; next week I was over there training.
- speaker: Respondent
  text: Air on a locomotive is very important. I had a guy showing me all the first week. I said to him, "How do we work the
    air?" He said, "We'll look at that next week." So I come in on Monday morning, "Where's Joe?" - this guy was also named
    Joe - "He's on holiday. He started his vacation time today." He had no idea how to use the air. I then had to learn by
    trial and error.
- speaker: Respondent
  text: At the potash dock, you'll get usually 86 cars of potash [potassium fertilizer] . You're supposed to put one in the
    dumper; they dump it; you move over and put the next one in. But the guys don'tlike that. You come in slowly,
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | les copan of local 500 and they start opening up.
    By the time they get to the other end, the car is empty. Of course, you've got to bring that in on the air brake. I was
    forever dynamiting it. That's when you pull the lever, and every brake on the train snaps into place. I'd get sworn at
    quite a bit, but eventually I learned.
- speaker: Interviewer
  text: '[02:06:26] HARVEY: Now, this is part of longshore jurisdiction? I''m not familiar with moving an engine as part of
    longshore jurisdiction.'
- speaker: Respondent
  text: '[02:06:37] LES: Vancouver Wharves, Neptune Terminals, the chip dock, and Port Moody are 500''s jurisdiction. Westminster
    have a couple of places over there that they have jurisdiction of.'
- speaker: Respondent
  text: '[02:07:06] HARVEY: Moving these trains up to the dock to be unloaded? [02:07:11] LES: Vancouver Wharves, to get the
    rails in there, the CN [Canadian National Railway] , what they do is they bring them up and they push them so they''re
    just in. Our lokie [? locomotive?] can go out on their track, come down, then push them in.'
- speaker: Respondent
  text: Now, remember, I'm talking 25 years ago. At Neptune, they left the lokie hooked on to it, and they hooked onto the
    other end. We to wed their engine in with the loads, so that when it's empty we could push it out to where the CN was
