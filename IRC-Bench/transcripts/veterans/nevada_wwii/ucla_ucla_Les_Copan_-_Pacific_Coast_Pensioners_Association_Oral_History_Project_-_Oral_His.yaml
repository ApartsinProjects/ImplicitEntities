    The dude''s in there; he drives through the engine tariff and then onto the Indian territory. They work out an average,
    and they have a formula that they use so that they''re not charging the Indian tax.'
- speaker: Interviewer
  text: '[02:09:31] HARVEY: Anything we''ve forgotten? I think we''ve kind of covered what we needed to cover. You want to
