- speaker: Respondent
  text: '[02:09:41] LES: Well, in safety, when you''re working in the yard, there''s an engineer, a man that rides the front
    of the lokie, a man on the ground, and another man - we call him the head man. You maybe have 15 cars. He goes to the
    other end, and he signals what you want done at that end.'
- speaker: Respondent
  text: We finally got rid of the red lantern; now we have a radio. When you're dumping sulfur, you push a car in. Switchman
    goes over and pulls the pin and backs him out. The dumper turns upside down and dumps the sulfur. You bring him up, but
    you close the knuckle so that, when the locomotive comes up, he just pushes against the car. He doesn'thook onto him.
    It goes out the other side of the dumper, goes down, up, and then back down on another track.
- speaker: Respondent
  text: They started giving the foreman a little radio that he pinned on here, and he could send and receive. I kept after
    them at the Wharves. "Why don't you give them to the switchmen?" "Oh, they're special for the foremen." Until the day
    that one of our guys was running to jump up on the car, and he dropped his radio. He jumped on a moving car, and he went
    with it. Pushed one car through. It went through and up. The engine kept pushing the
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | les copan of local 500 next car; it went through
    and tore everything all to hell. Surprisingly, the next week all the switchmen had little radios.
- speaker: Interviewer
  text: '[02:12:27] HARVEY: Did he die? Was he killed? [02:12:30] LES: No, he got off before they got that kind of stuff.'
- speaker: Respondent
  text: At Neptune, they run the dumper car in, and there's four gates underneath the car that they open, and the potash pours
    out. But the shed is so narrow that there's a sign up, "Do not ride a car in here." One of our guys, whether he forgot
