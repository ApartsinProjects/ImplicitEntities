- speaker: Respondent
  text: '[00:00:00] HARVEY SCHWARTZ: This is Harvey Schwartz, and I''m in Vancouver, British Columbia. Today is the 14th of
    September 2014. This is part of the Pacific Coast Pensioners Association ILWU Oral History Project. I''m with Les Copan.
    Les, it''s spelled C-O-P-A-N?'
- speaker: Respondent
  text: '[00:00:31] HARVEY: Can you tell me when were you born and where you were born? [00:00:35] LES: I was born in Victoria,
    British Columbia on July 22, 1926.'
- speaker: Respondent
  text: 'Ilwu pacific coast pensioners association oral history project | les copan of local 500 [00:00:47] HARVEY: Where
    were your parents from? What country did they come from?'
- speaker: Respondent
  text: '[00:00:51] LES: My father was born in the Ukraine. He was brought to Canada at two years of age in 1899. My mother
    was born in Arbroath, Scotland. She came to Canada - she was 18 - around 1921. One of those things that happened. They
    were married on March 17, 1924. ''Course, they told us kids for years that they were married in 1923. For obvious reasons!'
- speaker: Respondent
  text: '[00:01:44] HARVEY: Sure. Now what did your dad do for work? [00:01:49] LES: He was a laborer. He grew up on a wheat
    farm in Saskatchewan, and he went overseas with the army in the First World War. He was fortunate; when he was a child,
    he lost the first two joints of these two fingers. And so, he couldn''tpull the trigger of a rifle. He was in the headquarters
    branch. When he came back to Canada, he applied and he became postmaster in Insinger, Saskatchewan. He joined the Naval
    Reserve, and they came out to Victoria for their annual training. He did what sailors do. And so, he resigned from the
    post office and came out and married my mother. He was working in construction, and he was in Oregon. One day the immigration
    [a gent] came and said to my mother, "You''re illegal here. Back to Canada." So they came back to Canada. My brother was
    born in Oregon. And we grew up [in Canada] .'
- speaker: Respondent
  text: One of the warts in my life is that we moved to Vancouver in 1935. My father was a scab in that lengthy strike. As
    they say, don'tblame the son for the father's transgressions.
- speaker: Interviewer
  text: '[00:04:00] HARVEY: Of course! Well, what did your dad tell you about the strike? You were about ten years old at
    the time. You were a youngster.'
- speaker: Respondent
  text: '[00:04:09] LES: I remember the machine guns on the docks and so on. But he never talked about it. My younger brother
    married the daughter of a longshoreman. Now, her father scabbed in ''35. In the ''23 strike, his job was to sit in the
    field across from the president of the union''s home with a rifle.'
- speaker: Respondent
  text: '[00:04:53] HARVEY: Jeez. What was he supposed to do with the rifle? Was he supposed to take a shot at him? Or was
    he just supposed to watch him, or what was he supposed to do?'
- speaker: Respondent
  text: '[00:04:58] LES: If anybody came after him, they would have shot them. He would have shot them in those days. Anybody
    that came after the president, you see. He was protecting the president of the union.'
- speaker: Respondent
  text: '[00:05:14] LES: Yes. Then we come to 1935. He had a wife and child. And you think of the pressure that must be on
    them. People like he and my father and many others. You can''tcondone it, but you can understand it.'
- speaker: Respondent
  text: '[00:05:41] HARVEY: Now, what pressure do you mean? You mean the pressure of the Depression? [00:05:46] LES: Yes,
    there''s no other work. So, if they went out on strike and got blackballed, they had a problem. Even as late as 1966,
    I was fighting to get some of these guys'' time reinstated. And we were successful in it.'
- speaker: Interviewer
  text: '[00:06:12] HARVEY: You''re talking about guys who scabbed in ''35? [00:06:15] LES: That were blacklisted. Yes.'
- speaker: Respondent
  text: 'Ilwu pacific coast pensioners association oral history project | les copan of local 500 [00:06:16] HARVEY: Yes. I
    thought I remembered there was an effort to kind of forgive and - if not forget, forgive - in 1959, when the Canadian
    area was consolidated. After they won the ''58 strike. Everyone was going to get pensions. Are you saying that wasn''tquite
    the case at that time?'
- speaker: Respondent
  text: '[00:06:40] LES: No, it did change. There was nothing officially said. But times change, you see. By ''58, I had five
    years on the waterfront. I walked the picket lines in that ''58 strike.'
- speaker: Respondent
  text: '[00:07:07] HARVEY: Right. Let me roll you back a little bit to your youth. Is there anything else you remember of
    the 1935 strike? You mentioned you saw the machine guns.'
- speaker: Respondent
  text: '[00:07:20] LES: We moved here in October of ''35. We went to live up in the Dunbar area of Vancouver, which is a
    little higher class than the working people. I''m not sure why I had to fight, whether it was the strike or my Ukrainian
    background. For the three months we lived up there, I had more than one fight.'
- speaker: Respondent
  text: '[00:07:56] HARVEY: And you''re not sure whether it was because your dad had scabbed in ''35, or whether it was because
    you were Ukrainian? Do I understand you to say that?'
- speaker: Respondent
  text: '[00:08:03] LES: That''s right. Because in those days, the word "honky" indicated Ukrainian. We were honkies. [00:08:20]
    HARVEY: Did your dad speak - well, he came here young. He spoke English, didn''t he? [00:08:27] LES: Oh yes.'
- speaker: Respondent
  text: '[00:08:27] HARVEY: But it didn''tmatter? [00:08:30] LES: I didn''tknow that he had an accent until I was an adult.
    I heard him on the phone one day, and I realized that there was a little accent in there. But Ukrainian was not mentioned
    in our household. My mother insisted we were Scottish. [laughs] You know, for all those obvious reasons. Forced marriage,
    and it wasn''t a good one. They persevered. Oh, they fought like cats and dogs when we were kids, but they kind of mellowed
    as the years went by.'
- speaker: Interviewer
  text: 'But, you see, my life up to that point makes a whole book in itself, I think. [00:09:29] HARVEY: In what sense?'
- speaker: Respondent
  text: '[00:09:29] LES: Well, in 1942 on the first of February, my buddy and I went up to City Hall, put our hands on the
    Bible, and swore that this was our 16th birthday. Because in Canada during the war you had to have a registration card
    if you were 16 and older. So we got our registered card, which means we could work legally. I put it in my wallet, and
    after a couple of weeks I noticed that the bend in the wallet was fraying the edge of the card. The "2" of 1942 disappeared.
    So I went down and I joined the Navy. They called me in and I was sworn into the Navy on March 25th, 1942.'
- speaker: Interviewer
  text: '[00:10:30] HARVEY: How old were you at that moment? Ilwu pacific coast pensioners association oral history project
    | les copan of local 500'
- speaker: Respondent
  text: '[00:10:31] LES: 15 years and 8 months. I knew that they would phone my mother, and she would be happy to get rid
    of me. It was one less mouth to feed.'
- speaker: Respondent
  text: I'd been in a week, and I get called up to the commanding officer's office. He's sitting therevery grim. He looks
    up and he says, "How old are you, Copan?" Well, I knew that he knew. So I just said the truth, "Pll be 16 in July." "What
    do you think of the Navy?" I'd been in a week. "Looks good to me." "Ok, get outta here and keep your mouth shut." And
    so I was in the Navy. There was only one problem. I couldn't go to sea.
- speaker: Respondent
  text: '[00:11:30] LES: You had to be 19 to go to sea. And even my Navy age, I was only 18. They shipped me up to Prince
    Rupert [Island] , and it took me about six months to figure it out. I applied for a gunner''s course. Came down to Esquimalt
    [British Colombia] , took the course, went east with my class, and wound up on a minesweeper. Most Canadian minesweepers
    at that point were doing escort work. What we called the triangle run: Newfoundland, Halifax, the eastern U.S.'
- speaker: Respondent
  text: Some interesting things there. In September of '43, we went into Curtis Bay, which is a suburb of Baltimore, for a
    refit. Now, they kept six seamen and six stokers on the ship. We worked 4 on, 8 off, and 24 off. Well, in a situation
    like that, you can work things out. We had two days times in Washington, DC. Another time we had three days in New York
    City. As I say to many Americans, I say, "Did you ever walk up the steps of the Senate building? I did!"
- speaker: Respondent
  text: I hooked up one night with a bunch of American sailors. Around midnight one guys says, "You know, my ambition always
    has been to go up the steps and knock on the door of the Senate building. I'm gonna do it right now." So we all went up
    and knocked on the door. Then we walked down, of course. But, we have done it.
- speaker: Respondent
  text: '[00:13:49] HARVEY: Yes, yes. What did you see on the minesweeper? What was happening on the minesweeper? Any action,
    activity? Junior vessels, or any of that?'
- speaker: Respondent
  text: '[00:14:04] LES: By then, they were staying away from the east coast of the U.S. In early ''42, it was a turkey shoot.
    They never thought to dim the lights of the cities. The ships were silhouetted, and the torpedoes were - But then they
    put blimps up, and that made a world of difference. If we were going in a convoy, the moment we crossed that line, we
    knew the blimps were up there. We felt different.'
- speaker: Respondent
  text: '[00:14:44] HARVEY: You felt safer? [00:14:46] LES: Oh, yes. We had two rescue operations. One of our stokers fell
    overboard. You wonder how an engine room guy can fall overboard.'
- speaker: Respondent
  text: '[00:15:09] HARVEY: That''s quite a trick! [00:15:10] LES: What happened - there was a leak in the engine, drip, drip,
    drip. So they put a bucket under it. We changed watch at twelve o''clock. So the guy going off watch would take the bucket
    up, go back and dump it over the stern, put the empty bucket at the top of the ladder, and the guy going on watch would
    take it down. There isn''t a hard railing around the stern of a minesweeper. There''s just a post with wires. They lean
    them down when you''re in port so they can work. Then they''re supposed to put them up when you go to sea. Somebody forgot.
    This guy went to dump the bucket of oil, and he followed it. He came up, and he hollered.'
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | les copan of local 500 The fellows on the bridge
    said that they actually heard him holler. The officer of the watch was real sharp. He immediately said, "Stop engines.
    Hard a port. Call the captain. Away lifeboats."
- speaker: Respondent
  text: I came up. It just happened that a signalman who was closer to the boat had jumped into the lifeboat. He said, "Copan,
    you understand this more than I do. Get in here." He jumped out, and I got in. We couldn'tfind him. We could hear him.
    He was getting desperate, and the skipper - he gambled. He turned the searchlight on, and spotted him. We went 'round.
    Being the bow oar, I shipped my oar. [mimes placing an oar in rowlocks] And I reached for him. He grabbed my arm, and
    I'll tell you, you couldn't get tighter with a vice. But he was all slimy with oil. Fortunately, it was summer, and I
    was just in trousers. I was bare this [gestures to his torso] , but I was smeared with oil getting him into the boat.
- speaker: Respondent
  text: The other incident, when we came out of Curtis Bay, we were escorting a single tanker up to New York City. We were
    going to have four days in New York City. About three o'clock on Wednesday morning, I was a sleep. But the bosun piped,
    "Away, lifeboats crew!" Well, I knew what that was. [claps] I was up there, and I jumped in the boat. There was a - the
    Americans called them "patrol boats." They were made, in Canada, of wood. They ran on gasoline. There was a storm building
    up. He ran out of gas, and the wind had taken his aerials off. He was putting up flares. So we went around, and we never
    did put the lifeboat in the water. Skipper figured it was too rough. So we fired a line and put a tow line on him. As
    we were going into the mouth of the Hudson, a big Navy tug came out and took over the tow.
- speaker: Respondent
  text: Instead of us getting four days, we were told to go to Halifax. One of these southern storms that build up 35, 40
    foot waves. We came up to Halifax on Friday morning. We were supposed to pick up Sambro Light [Sambro Island Lighthouse]
    , which is the guide to go into the minefield. [mimes moving around mines] We couldn't find it. We spent from 10 in the
    morning to 11 at night, and that storm was building. You see those pictures of 35 foot waves? I hung to a stanchion and
    watched them and more or less prayed, "Turn back, turn back!"
- speaker: Respondent
  text: But they finally, in Halifax, decided we couldn'tmake it through the night. They opened the gate. You knew that there
    was a gate over every harbor? It turns out that's the only time the whole Second World War that the gate to Halifax was
    opened to let a ship in. We made history on that one.
- speaker: Respondent
  text: The Germans mined the course through our minefield. The assumption is that they submarined in after a merchant ship.
    Then they sent in a mine-layer, and on his way out they laid 65 mines. Two ships hit mines.
- speaker: Respondent
  text: Here again, we got screwed. We were in Boston. We were supposed to be there for three days. I was on the watch from
    midnight to 4 a.m., on deck watch. I pulled one of my little things as I tend to do. I was on watch on the ship, and the
    old man had to be on the shore. Along about 12:30am, I hear footsteps coming down. Here's the skipper with a girl on his
    arm and another couple. You pipe, "Admiral support." [holds hands up to mouth as though playing a pipe] For some reason,
    I walked over, and, as soon as he came a board, I saluted and piped him a board [laughing] And I thought, 'I'll hear about
    that.' Well, I did, but not in the way I expected. About 20 minutes later, the captain's steward came out. He's got a
    little glass like this, and he said, "The old man said not to put too much rum in it because you're still on watch, but
    he said, 'Give this to Copan.'"
- speaker: Respondent
  text: '[00:22:59] HARVEY: [laughs] That was a funny way to hear. Not what you expected. [00:23:02] LES: Yes, and about an
    hour later a fueling barge came by. The officer on it hollers up, "Get your officer of the watch. You guys are sailing
    at 11 o''clock." I said, "We''re not sailing. We''re here for three days." "Get the officer of the watch." "Yes, sir!"
    [laughs] Turned out we were, because that''s when the Germans had mined their way in, and we were one of the few minesweepers
    that had the minesweeping gear. That was'
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | les copan of local 500 because the Royal Navy ordered
    twelve minesweepers from North Vancouver, BC [British Colombia] . When they got them, they felt they had too many, so
    they loaned them to the Canadian Navy. The Canadians took most of the minesweeping gear off so they could put on additional
    depth charges. But they couldn'ttouch the British ones. So we had minesweeping gear, and they said, "Get back to Halifax
    as quickly as you can." We were steaming at full speed.
- speaker: Respondent
  text: In the dark of the night, I was on watch again. Of course, you have to be on watch to see things. But I was lookout
    on the starboard wing. First, I had thought I saw a spot of light on the horizon. I called the officer over. He had night
    glasses and he looked. Finally, he says, "You're right, but keep an eye on it." After a while I see him run over, out
    on the port wing. Then he hollers, "Copan, do you see anything over there?" "No, sir." Then there it was, a merchant ship
    travelling in the other direction, and close. We were running up the channel of a convoy.
- speaker: Respondent
  text: '[00:25:30] LES: Oh, yes. A small change of course and there would have been a collision. But that''s when we went
    into Halifax. We swept the channel. We were two weeks sweeping, and we brought up 63 mines total.'
- speaker: Interviewer
  text: '[00:25:49] HARVEY: You brought up almost all the German mines. How''s that done? How is it actually done?'
- speaker: Respondent
  text: '[00:25:59] LES: Well, you have a cigar-shaped pontoon, and it''s got fins on it you can set to any depth you want.
    The special cable connects to the ship, and a set of shears on like that. So, you hit the chain of a mine, it runs up,
    and when it gets to the shears it snaps off. The mine comes to the surface. On those particular mines, they managed to
    take one to shore. They had an officer and a petty officer take it a part. They were each given a medal - probably the
    lowest a ward you can get -'
- speaker: Interviewer
  text: '[00:27:16] HARVEY: Because it was dangerous? [00:27:19] LES: It was a brand new mine. Sure, trying to take a mine
    anytime is dangerous.'
- speaker: Respondent
  text: '[00:27:26] HARVEY: Sure, sure. So they figured out what made it work. [00:27:32] LES: They put it on the beach, and
    had these two guys go down and take it a part. Because it was so dangerous, they were a warded a Distinguished Service
    Medal [DSM] . I finally got it! They were a warded a DSM.'
- speaker: Respondent
  text: '[00:27:53] HARVEY: Did that in formation allow you guys to figure out how to deactivate those mines? [00:27:59] LES:
    No, there''s only one way. You see that guy with the rifle in the movies? Ping! That''s an impossibility. To hit a thing
    that small anywhere - but on the ship and a mine, they both are moving - we wasted 1500 rounds of ammunition to sink it.
    That''s what you did to most mines. You shot them until they sank. [00:28:35] HARVEY: They didn''texplode?'
- speaker: Respondent
  text: '[00:28:36] LES: No. They sank. They''re still down there somewhere. Ilwu pacific coast pensioners association oral
    history project | les copan of local 500'
- speaker: Respondent
  text: '[00:28:44] LES: You know, they''re still a warding corvettes [small warships] for sinking German submarines. Just
    a couple of years ago, I saw they a warded one, a corvette sank a submarine. Now, how they do it. [Grand Admiral Karl]
    D6nitz, the admiral of the German Navy, he had every submarine report to him once a day. He would string them out on the
    Atlantic miles a part. If one spotted a convoy, they wired him. He figured out where the convoy would be two days from
    now, ordered all his submarines to that area. Once he got them there, he told them where they should position themselves
    and try to sink ships.'
- speaker: Respondent
  text: If our Navy ship went after them with depth charges, they wired [Grand Admiral Karl] Doénitz, "I am under attack."
    And that's the last you've heard of them. After the war, they have gone through the millions and millions of signals until
    they found that one. Ok, we know that ship was sunk on such-and-such a day, at such-and-such time. Now they've got to
    go through all the signals on our side to find what ship was attacking at that particular time. They put them together
    and give the corvette credit for sinking a submarine.
- speaker: Respondent
  text: '[00:31:00] HARVEY: So it''s credit that goes for deeds done way back. I see what you''re saying, ok. [00:31:06] LES:
    A couple of years ago, they a warded for sinking a submarine back in 1943. [00:31:17] HARVEY: When did you get out of
    the Navy? What time did you get out of the Navy?'
- speaker: Respondent
  text: '[00:31:22] LES: That''s another story. I was on a different ship. I was on the [HMCS] Algoma, that we refitted in
    Liverpool, Nova Scotia. We had a big party one night. I was pissed out of my mind, make no mistake. Three of us decided
    that we needed some money. So we broke into a house. There was a woman there. One of those other two guys hit her. She
    couldn''tidentify them, but she was able for some reason to put a finger on me. I don''tknow if you were a ware of the
    code in those days. Never rat on a friend. They wanted desperately to know who those two guys were. I wouldn''ttell them.
    My lawyer told me straight out. He said, "Tell them who they were, and you''ll get six months. If not, it''Il be more."
    Turns out, they sentenced me to five years in the penitentiary in Dorchester. I was 17 when I went in. I didn''tworry
    much. I did the time.'
- speaker: Respondent
  text: '[00:33:05] HARVEY: You did five years? [00:33:07] LES: Well, I did three years, eleven months, and seventeen days,
    to be exact! No, I just went on with my life after I got out. But it''s a wart that there.'
- speaker: Interviewer
  text: '[00:33:26] HARVEY: Any particular story you remember of being in jail that illustrated what it was like?'
- speaker: Respondent
  text: '[00:33:40] LES: There''s a couple. I refused to work once. I had a guy bugging me all the time. He was a homosexual.
    I got pissed off with him. One day, it was in mid-December, and we were sitting down for smoke break. He said something,
    and I said, "You cocksucker!" I nailed him, and the fight was on. Of course, we got 21 days in the hole. On about the
    20th of December.'
- speaker: Respondent
  text: To understand, you don'tlook out a window in a prison. There's two rows of cells like this, one opening this way,
    one opening this way. Then there's a good 12-15 feet, and then the outer wall of the building. There's a space between
    for maintenance. He was on one side; I was on the other side. There was nobody else there. Christmas Day we were approaching,
    and then, on Christmas Eve, the warden sent word down that they were letting us out.
- speaker: Respondent
  text: '[00:35:07] HARVEY: They let you out. Ilwu pacific coast pensioners association oral history project | les copan of
    local 500'
- speaker: Respondent
  text: '[00:35:11] HARVEY: My god. When you say you went on with your life, what do you mean by that, after you got out?
    We''re looking about in the range of 19 -'
- speaker: Respondent
  text: '[00:35:25] LES: °48. Well, I came home. I had a little bit of money left over from the Navy. In prison, you automatically
    got $0.50 a month. If you''re working, you got $0.05 a day. It''s not if you were working; it''s when. Once a week, you
    could buy a package of to bacco and a book of papers if you need them. That was the maximum. You could have somebody on
    the outside send you a magazine subscription. But that was it. We got a magazine about four times a week. Then we got
    a novel two or three times a week.'
- speaker: Respondent
  text: '[00:36:37] HARVEY: When you say work, what work did they have you doing in prison? [00:36:44] LES: Course there''s
    prison maintenance, but the first job they said to me, "You have a Grade 9 education. You'' ll be the bookkeeper in the
    tinsmith''s shop." We went out to work out on the roof, and I said, "I''m the bookkeeper. I don''thave to work." "No."
    So I got three days in the hole for that.'
- speaker: Respondent
  text: That's when I went to the boiler room. I was firing boilers to heat the place. That lasted quite a while. The ignorance
    of those people, it's terrible. This guy, he was spreading an untrue story about me. And he went to a screw - the guards
    are screws in the prison. Remind me later to tell you a story about that. I was told, "Don't do this, and don't do that."
    I said, "What the hell is going on?" One of the other guys told me. You have to come in and go down a flight of stairs
    to get to the boiler room. I waited there when he came back from lunch. When he got to the bottom of the stairs, I grabbed
    his shoulder and said, "I hear you're telling stories about me." "Yes." Boom! [laughs] He went down, and I grabbed him.
    I was pounding his head on the cement. I think I would have killed him if the guard - he hit me hard enough to stop me.
    They pulled me off of him. But then I got transferred to the stone shed.
- speaker: Respondent
  text: 'They had trained stone cutters. One guy I know, he got out, he was offered a job with a stone cutting company. Oh,
    incidentally, this was in Dorchester Prison, in Dorchester, New Brunswick. They did a lot of stonework down there. He
    actually got a job. I got so that I could do a sill - right smooth, it has to be dead even. Then a guy came to work there.
    He was a cook, one of these guys doing life on the installment plan. Nobody would talk to him, for some reason, from previous
    experiences. But it didn''tbother me. I used to talk to him. The first opportunity, they''d put him in the kitchen as
    the cook. A few days later, they came over and said to me, "You''re going to work in the kitchen." Ok, you do what you''re
    told. Turned out he had asked to have me as his second cook. There''s three cooks: first, second, and third. First cook
    does the cooking; the second cook assists him; the third cook washes the pots. So, I had it real nice.'
- speaker: Interviewer
  text: 'Now, do you know who [Gerneralmajor der Waffen-SS] Kurt Meyer is? [00:41:05] HARVEY: No, I''m not sure who that is.'
- speaker: Respondent
  text: '[00:41:07] LES: He was a German general whose troops murdered something like 20-odd Canadian soldiers. He was sentenced
    to hang after the war. Then they reduced that to life in prison. Then they decided that they would bring him to Canada.
    When we heard that he was coming to Canada, "He''ll never get past the first barber shop." They used straight razors.
    He [the barber] said, "I''ll have him!" Everybody was, "What we'' ll do to him when he gets here. . ." You know what they
    did? Nothing!'
- speaker: Respondent
  text: Ilwu pacific coast pensioners association oral history project | les copan of local 500 The south wing - the new wing
    - had five stories. The lower story, there was cells the length of it, and then there was an extension, which was the
    hospital. On the top floor, the extension on the end was the library. They housed him in the hospital, and he worked in
    the library. I was working in the kitchen. Exercise period, you go out. There was a rectangle that you could walk. Or
    there was a volleyball net. You could get 20 guys on each side trying to hit the ball. So I used to walk around. This
    Kurt Meyer - the library and the kitchen exercised at the same time. I went over and talked to him, and I got to be quite
    friendly with him. One day he said, "I like jam." I said, "Well, I guess I can get you jam." He said, "You like to read?
    Tell me what you like to read." At noon, I would take a small container of jam, and I'd put it where he could reach through
    the bars and get it out. He came down at the end of the day from the library to the hospital, and, as he went by, he'd
