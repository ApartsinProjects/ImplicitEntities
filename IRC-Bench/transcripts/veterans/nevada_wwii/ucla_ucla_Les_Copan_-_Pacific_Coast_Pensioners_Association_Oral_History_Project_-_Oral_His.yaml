- speaker: Interviewer
  text: '[01:55:33] LES: See if we can get the secretary to bring you a copy. [01:55:39] HARVEY: You have copies at the local?'
- speaker: Respondent
  text: '[01:55:41] LES: They have it on a disk. They get it every time I ask. [01:55:48] HARVEY: Oh, ok. We'' ll put it in
