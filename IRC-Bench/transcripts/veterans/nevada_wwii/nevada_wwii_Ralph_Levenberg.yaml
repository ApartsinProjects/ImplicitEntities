collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: 'My third day of basic training was my last, when the first sergeant said, "I need a typist." I never thought there
    might come a time when I would need a gun instead of a typewriter. In fact, I had fired a gun only once in my whole life
    before entering the service: When we were kids, a friend of mine had a .410 shotgun, and we went hunting. I brought home
    a dead rabbit, and my mother explained that unless we were going to eat the rabbit, it was against our religion to kill
    it.'
- speaker: Respondent
  text: In October 1940 I was transferred to the 17th Pursuit Squadron and headed to Manila in the Philippine Islands. We
    were loaded on railroad trains, and the shades were kept drawn from Detroit to San Francisco, because the military did
    not want to alert people along the route that carloads of soldiers were going somewhere. I recall that in Reno we were
    allowed to get off the train and stretch, but I think we lost three people there, [laughter] With the help of the military
    police, they finally rejoined us.
- speaker: Respondent
  text: When we got to Hawaii, only the officers and some of the non-coms were allowed to go into Honolulu. All day long,
    nothing but ammunition was loaded on our ship. Our destination was Nichols Field, which was a suburb of Manila.
- speaker: Respondent
  text: Then from June to October of 1941, we were stationed at Iba for air-to-ground gunnery maneuvers. There we got the
    first P-40s, and our pilots were just like kids with toys in these state-of-the-art fighter airplanes. By the time we
    returned to Nichols Field, we were getting war nerves because of the constant air raid warning tests and the training
    to man machine guns.
- speaker: Respondent
  text: On the 8th of December (we were across the international dateline) we were told Pearl Harbor had been bombed. Two
    nights later a lone Japanese bomber hit one of our hangars on the flight line, which was quite a distance from our barracks.
    The next day, as a group of our airplanes were landing to refuel, here came the Japanese dive bombers and Zeros. They
    caught six or seven of our airplanes right in their landing patterns. This was my first actual experience of a war situation,
    and every bomb and every bullet sounded like it had my name on it! We were out in the fields, wherever we could hide,
    but no matter where you are, you're in the wrong place. It was a harrowing situation; it scared the hell out of me. They
    strafed and bombed for a good thirty minutes, but it seemed like a whole day. [laughter]
- speaker: Respondent
  text: When the attack was over, our brand new barracks were ruined, and all of our uniforms hanging in the lockers were
    full of bullet holes. I didn't get anything out of there other than the clothing I had on my back. We had lost almost
    all of our airplanes, and those that were left were dispersed to other airfields throughout the Philippine Islands. Our
    commanding officer - Boyd "Buzz" Wagner, a West Point graduate and one of the first aces in World War II - had been blinded
    when a shell hit his cockpit in a dog fight over Manila, and he had to be talked down by radio to land safely. Dependents
    and those who were severely injured were loaded onto a mercy ship, and the Japanese allowed that one ship to get out.
- speaker: Respondent
  text: On Christmas Eve we were evacuated from Manila by inter-island steamer to an airfield on the Bataan Peninsula about
    thirty-five kilometers south of where the main fighting was going on. We had one airplane, a P-35, and our mechanics were
    like a bunch of tailors sewing up a wounded thing in order to keep it flying. Our one pilot who stayed with us flew up
    and down the coast getting whatever in formation he could for us and for the command. Then we joined the 71st Philippine
    Provisional Group, and everybody - quartermasters, infantry, finance, cooks and bakers, signal corps, medics - was formed
    into infantry companies and issued weapons, [laughter] I was issued a .30 caliber Springfield Rifle, made in 1918, and
    a bandolier of ammunition. We heard that the Japs had landed some eighty troop transports filled with soldiers.
- speaker: Respondent
  text: As we lined up to go into the jungle and locate snipers, I spotted this .45 caliber Tommy gun and grabbed it. I didn't
    know what the hell I had or how to operate it, but I had seen in the movies how these things could mow down anybody. The
    jungle had no pathways; we were making our own paths, and it was more like a tiger hunt where you're making all kinds
    of noise to find what you're looking for. We went all the way to the sea and never found a thing. We were resting in this
    ravine, trying to figure out whether to return, when one of our guys thought he spotted something, so he put his rifle
    in a fork of a little tree and fired. The whole ravine opened up! The Japs had been just sitting there watching us.
- speaker: Respondent
  text: I ate sand for five hours. I mean, we dug ... we, oh God! It was just terrible. They had us pinned and darkness came,
    and we had a major who had absolutely no idea what he was there for. Fortunately we had two ex-infantry guys who knew
    what the hell to do. They sent out point people and told them how to signal us. After about three hours of crawling on
    our bellies, and not making any sound, we could hear the Japs having a good time, because they figured they got us. We
    got out of there, and I didn't even get to use my guns. They were left behind. One guy got nicked, but I am amazed we
    didn't lose half of our people.
- speaker: Respondent
  text: 'We were on Bataan on beach defense when, on the eighth of April 1942, we got a message from Corregidor: The next
    morning we were to turn our rifle barrels down, get any kind of white cloth we could to show that we were surrendering,
    and go to this one point at Cabcaben Air Field and turn our weapons over. We were being surrendered to the enemy and I
    guess at that moment we all felt some sense of relief. I had one .30 caliber bullet left and nowhere to get anything else;
    we had been on one-quarter rations and less since the middle of March; we were emaciated; and we had just quinine and
    aspirin left for medical supplies. We knew that the Japanese were winning this war. No American airplanes were flying
    around us anymore; everything we could hear was Japanese. Our ships ... we didn''t have any ships. It was a period of
    desperation.'
- speaker: Respondent
  text: You think, "Jesus, if you surrender, at least you're not going to get shot at anymore, and maybe you're going to get
    fed. Then maybe this thing will be over real quick." But after it sinks in, and you really figure out what's happening,
    it seems like the world crashes in on you. It's the most difficult thing to describe .... There is a feeling of emptiness.
    Everything was gone. Grown men cried, especially the older men who had had some experience in the world. But I was twenty-one
    years old, and just felt nervous. I had never even seen a Jap - seen them out in the water, seen dead ones, but didn't
    know what they were like.
- speaker: Respondent
  text: Very few of us slept at all that night. In the morning, we were told to line up and march, and as we were marching
    away, we took the bolts out of our rifles and threw them into the sea, so they weren't any good. "Well, hey, let's not
    make it easy for these guys!"
- speaker: Respondent
  text: We arrived at Cabcaben Air Field, which was a great large space on Bataan. Many other squadrons and other companies
    arrived, and we were all putting our weapons in piles. We had nothing. You could see it in the faces of the infantry guys,
    who had been up on the line fighting for two and a half months. They looked so gaunt - they looked like they were prisoners
    already. It was mass confusion. Nobody, the Japs or the Americans, knew what the hell to do next.
- speaker: Respondent
  text: After a while, we were formed into groups of one hundred, four a breast, and we were marched off. We had maybe three
    guards marching with us. We hadn't gone very far when a Jap soldier pulled me out of line. I had a pair of rimless prescription
    eyeglasses tinted for the sun that I used to wear to play golf. He reached for these glasses, and I said, "No, no." He
    slapped me, tried them on, realized he couldn't see and was going to smash them, when this big Jap officer yelled, "Ku-doh!"
    The guy just froze at attention. The officer handed my glasses back to me and said in perfect English, "You best put these
    away, because you are going to need them for a long time." Well, I was breathing more easily. Then he turned around, unbuckled
    a short saber in a leather sheath, and he started to beat that guy in the face. He beat him until he knocked him unconscious.
    Then he turned right around to me and very gruffly told me to get back in line, and said, "You know, we do have discipline,"
    and walked away. But it was discipline to those people.
- speaker: Respondent
  text: We walked for that whole day, and the guards would change about every three or four hours. One guard group made us
    take off anything we had on our head. This was our first experience with the heinous atrocities. It was terribly hot.
    April is one of the hottest and driest months in the Philippines - 110, 120 degrees in the shade. Our guys started to
    drop. Those of us who could keep going tried to help those who couldn't. If you got a decent guard, he would allow you
    to put a soldier against a tree trunk, or he would stop a truck and load all of those that were sick onto the truck. But
    you didn't have guards like that all the time. At nightfall we were pulled off the road to an area where one of our squadrons
    had bivouacked before. They let us sleep for a couple of hours ....
- speaker: Respondent
  text: By morning, everybody's running out of water, but Bataan has many artesian wells just spewing out of the ground. We
    were thirst-crazed, and some of the prisoners would just break ranks and go after the water. Well, that's the best way
    to get shot or beheaded or bayonetted, because the Japanese were on edge all the time and wouldn't let us get to that
    water. We finally stopped where we could fill our canteens from a creek. The creek was full of dead bodies and horses.
    This is where some chlorine vials I had found before we surrendered came in handy, but a lot of guys got dysentery and
    all kinds of diseases from that.
- speaker: Respondent
  text: We met this group of rotten, terrible bastards - horse cavalry - on trucks that were coming down Bataan. One of their
    favorite things was to take their big, black snake whips and try to get somebody around the neck and drag them. They got
    plenty of them. They'd take pot shots at guys, or they'd take pot shots at the Filipinos lined up along the road watching
    us going by.
- speaker: Respondent
  text: We were given nothing to eat; the only food we got was slipped to us by Filipinos along the road, or it was food we
    had on us when we surrendered. I was lucky - one night we slept in a former American bivouac area, and I found hundreds
    of squares of chocolate that had been discarded out of old C-rations. I just picked them up and put them in my gas mask
    carrier. That was food for me. (We also marched through various barrios where Filipinos watched as we marched by. When
    they had the opportunity, they would throw food wrapped in banana leaves to us. If they got caught by the Japanese, they
    were severely punished and most of the time shot.)
- speaker: Respondent
  text: The second night there another guy and I were pulled out by the Japanese guard and taken into a barrio. The Japs had
    taken all the people in these little villages and moved them into the small central parks that each village had. The guard
    took us to a hut where a girl, who looked about eighteen years old, was in the throes of having a baby. He made motions
    for us to take her out where the other people were, and we figured, "Well, that's good. The people can help her." We made
    a makeshift hammock and took her out.
- speaker: Respondent
  text: This gal was ready have her baby, and women moved around her and tried to help her. A Japanese sergeant was walking
    around, hitting men with the butt of his rifle. He was drunk and just making sure that everybody knew he was "the big
    man." This sergeant just pushed the women all away. He found a piece of wire and tied the gal's legs together at her thighs.
    She was screaming at the top of her voice, and then he takes his bayonet out and hits her right between the breasts and
    cuts her open in front of everybody. Now, this other American and I were not about to stand around and see what the Japs
    might do to us, so we slowly made our way back into the line of march. I know those two Japs didn't last very long, because
    you could see it in the eyes of the Filipinos. They probably followed them wherever they went and made sure that they
    got them.
- speaker: Respondent
  text: That was the first atrocious crime that we saw, other than the beheading of our own people. That happened all along
    the march, not just with our group. You could see bodies strewn all over. Nothing in my life had prepared me for this
    kind of brutality. You had to shut it off, and just get through one day at a time. You had to, because ... it was almost
    like a dream, like you were going to wake up one of these days and none of this happened. But we made it through, through
    one thing and another.
- speaker: Respondent
  text: The most memorable thing of the march was ... as we were walking, all of a sudden the group spread as if there was
    something in the road. It was a body that had been run over many times by tanks and trucks, but still retained the full
    imprint of a soldier with his arms spread out. Even the Japanese respected it, and would not cause the troops to walk
    over it. That image seemed to be reaching out to everybody that walked by. Everybody who was on the march will tell you
    of that particular thing. They did not remove it, as far as I know, during the whole march.
- speaker: Respondent
  text: 'I had a will to live and to return to my folks. I wanted to survive. I didn''t want to die. I had taken care of myself,
    didn''t smoke or drink much, and was very athletic from playing golf and swimming: and that''s why I survived. As a Boy
    Scout, I had learned to put a clean little pebble under my tongue to ward off thirst, and that really worked. With a full
    canteen of water . . . when you don''t know when you will get more, you sip and you preserve everything you can. We would
    buddy with someone for survival. We were not an army anymore, just people bunched together to survive.'
- speaker: Respondent
  text: I thought about scrambled eggs and toast, dreamed about things like that. I was also praying - you find yourself praying
    to a god that you never thought about before. I kept the images of my folks and my brother and sister in mind . . . it
    was as if in the next hour or so, I was going to see them. We were all delirious in some manner or other. After marching
    almost ninety-five kilometers in six days, we ended up in San Fernando where there was a railhead. There, we were crowded
    into a penned area, and the Japs gave us our first meal - a dirty, cold ball of rice. Then they loaded us on steel boxcars
    for a two-hour drive to Capas. It was hot in there,
