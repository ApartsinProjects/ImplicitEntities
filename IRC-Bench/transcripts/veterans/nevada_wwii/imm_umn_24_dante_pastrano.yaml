- speaker: Respondent
  text: 'UMN Immigrant Stories Collection [''Pastrano, Dante''] [''United States''] Dante Candelario Pastrano was born in
    Santo Domingo, Dominican Republic. His family moved to San Juan, Puerto Rico, in 1966. He grew up and went to school there.
    He moved to Sioux City, IA, in 1987, where he worked in a meat-packing plant and computer manufacturing company. He moved
    to Minneapolis in 1996, where he worked at a computer company and a communication company. He is a self-defense instructor
    and co-owner of Krav Maga Minneapolis, a local gym. Dante Pastrano Transcription "My Immigration Story" I was born in
    Santo Domingo, Dominican Republic, but my family moved to San Juan, Puerto Rico in 1966. I was 2. I went to school and
    attended college there. In 1987, I moved to the continental USA. I arrived in Sioux City, IA one cool August afternoon
    some 27 years ago. The main reason for me to move away from the land that I grew up was to search for a better future
    in the land of opportunities. I needed to get a job, settle down, and start school. However, my life had not gone as I
    planned it, but still, the decision I made almost three decades ago was the right one for me. Here, is the United States
    I was able to become an in dependent person and do the things I wanted to do. I have accomplished some of my dreams and
    still working on others. Here in the US, I had been able to be part of the workforce despite of not having a college degree.
    I had been fortunate for the many relationships with friends who welcomed me into their country and into their lives.
    Many of these friends werevery supportive and encouraging to me. I lived in Sioux City for nine years. I worked in a meat
    packing plant for four years and four more years in a computer manufacturing company, Gateway 2000 Inc. I have an adult
    daughter, Tiffany, who was born in 1989. Tiffany grew up with her mon and siblings in various places around the Midwest.
    She currently lives in Omaha NE. In 1996, I moved to Minneapolis, MN where I met my second wife Ikuko. We spent fives
    years all together. Here in the Twin Cities, I worked for another computer company, Micron PC. I stayed with Micron for
    four years. Now, I''ve been at my current job almost fourteen years. I work for Century Link, formerly Qwest Communications.
    No exactly the job of my dreams but one that I have been happy with. In 2006, I met my girlfriend Gail Boxrud. We met
    at a martial arts studio in Uptown Minneapolis, Training for Life. There, I was a kickboxing student and also an in structor.
    But it was Gail who introduced me to Krav Maga, an Israeli self-defense system. Gail became a certified instructor in
    Krav Maga, in 2007. In 2008, I followed her footstep by becoming an in structor as well. I started to teach Krav Maga
    with Gail and eventually joined her as her business partner and started Krav Maga Minneapolis. This has been one of the
    best things I''ve accomplished so far. Teaching others to defense themselves or any other person they care about is very
    rewarding to me. Gail and I had accomplished a major goal within the organization we represent: IKMF (the International
    Krav Maga Federation). We have become Expert 1. So, as you can see, I consider myself some sort of Jack-of-all-trades,
    master at none.'
