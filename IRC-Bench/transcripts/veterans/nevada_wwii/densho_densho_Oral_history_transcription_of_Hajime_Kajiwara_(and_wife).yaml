    home. Fortunately his brother was in the hospital, and I was there to have the baby, so lonely as he was he had us beside
    him when he passed'
- speaker: Respondent
  text: 'away. We took out the suits we had put away, and wore them for'' the Mr. Narita: I don''tknow how they made the arrangement,
    but I'
- speaker: Interviewer
  text: 'remember driving Mr. Baba''s car for the funeral. It was a nice red car, De Soto or something. : Did your father
    get well?'
- speaker: Respondent
  text: ': No, he died, but my brother-in-law got well and went to Amache.'
- speaker: Interviewer
  text: Who came from Los Angeles?
- speaker: Respondent
  text: ': No, her husband died before evacuation, and then my father-in law died in Merced.'
- speaker: Interviewer
  text: 'Were there 3 sick people? : Yes, there were. I was not ill, but I was left behind to have : Where was the baby born?
    : In Merced. After I got strong, they took me to camp. Which camp did you go to? How did you feel when you went to Amache?'
- speaker: Respondent
  text: I thought Cortez was is the hill, but Amache was worse, and strong wind blew there once in a while. I did not have
    ithere, but since I went to Amache I got the hayfever, and had a hard time. Some Catholic priests from Los Angeles tried
    hard for the release of my husband. They said that the best way was to have children write letters. Our oldest daughter
    was 11 years old then, so I had her write letters.
- speaker: Interviewer
  text: Was he released because of that? Maryknoll Meo Ke Avi oe father 'camento see.me and told me that he
- speaker: Interviewer
  text: 'investigated my papers and found nothing wrong, sp he thought IT could be released. ¢''2 Q: What isMaryknoll?'
- speaker: Respondent
  text: It is a Catholic school. My sister attended this school for a while, so my oldest daughter wrote to a father there.
    Then a father visited us in Amache, and after asking about the condition of our family visited my husband in Roseburg,
    New Mexico.
- speaker: Respondent
  text: 'Mr. Kajiwara: My friend and my sister''s family were members oni Maryknoll, so I think that is why they helped me.
    I think his'
- speaker: Respondent
  text: 'name was Father Lovely. : Mrs. Kajiwara, could you recuperate well after you had the baby in the camp? They took
    good care of me. I was worried, but they took better care of me than I expected. They werevery careful about the'
- speaker: Interviewer
  text: 'food I ate as a woman in childbed. I was very thankful for that. : Did you wait for a year in Amache until your husband
    was released?'
- speaker: Respondent
  text: ': It was about a year and a half. : Wasn''t it hard to get along without your husband? People did not have much to
    do in the camp. so they were good to US. Narita: Mr. Kajiwara''s mother was with them and was well, so'
- speaker: Interviewer
  text: 'she took care of the children. : Was your sister-in-law with you? : What kind of worries did you have in the camp?'
- speaker: Respondent
  text: ': We didn''thave much worrie€, but as we had many children and a baby, I was worried when we did not have enough
    sugar or milk.'
- speaker: Respondent
  text: But they gave us special rations for the children, so it was not as bad as it was rumored.
- speaker: Interviewer
  text: What kind of rumors were there?
- speaker: Respondent
  text: There was not enough milk or not enough room in the hospital. I don'tthink it was true, but the rumors were started
    as | people had nothing to talk about, and they were spread around. Then the ones who were sickly or those who had little
    children were worried.
- speaker: Respondent
  text: The hardest thing for me in Amache was that I had to take our 5 year-old son to the women's bathroom as we did not
    have any men in our family. Then the children around his age teased him calling him a sissy for going to the women's bathroom.
    He cried everyday, and couldn'teven go to the toilet. Then I asked Mr. Koike who helped us carry luggages to Amache to
    take him to ments bathroom with him. He asked me why, but when I told him that my son cried and would not go to bathroom
    as other boys tease him, he a greed to take him to bathroom with him.
- speaker: Respondent
  text: 'Mr. Narita: It was lucky that Mr. Koike lived nearby in Merced. Mrs. K: Around that time my father-in-law came back
    to camp from the hospital as he was getting better. As Mr. Koike was from Yamaguchi Prefecture also, he used to visit
    my father-in-law and sat on the porch with him. When they were talking about going to Amache, my father-in-law must have
    asked Mr. Koike to take care of us as we did not have men in our family. Whenever I said, "I am sorry for giming you so
    much trouble", he used to say, "Your father asked me to take care of you, and'
- speaker: Respondent
  text: he passed away, so I have to take care of you." As my father-in law asked him, he sympathized with us and took good
    care of us.
- speaker: Respondent
  text: 'Mrs.K: That was the worst time in my life. My father-in-law and my brother-in-law were hospitalized. My husband was
    taken away, and my sister''s husband died. I think bad thing comes one after another in one''s life.'
- speaker: Interviewer
  text: Mr. Kajiwara, how did you spend your days at Santa Fe? We did not have anything special to do, so we played baseball.
- speaker: Interviewer
  text: Could you correspond with your family? I think we were allowed to write once a month.
- speaker: Respondent
  text: 'Mrs. K: They opened the mail although we did not write anything dangerous. Mr. K; We didn''thave anything much to
    write about except to tell each other how we were.'
- speaker: Interviewer
  text: Is that why you played baseball every day? We did not play baseball every day. There were many religious leaders,
    Tenrikyo, Buddhists and Christians and preached ther. religion. I think it was good for me in some respect to be able
- speaker: Respondent
  text: to listen to all kinds of sermons a mong prominent people.
- speaker: Interviewer
  text: Were you there for a year and a half? Did you belong to the Heimusha Kai here? About how many members were there?
    There was no definite number of members. Only young men belonged Ola bs
- speaker: Respondent
  text: 'Mr. N: Heimusha Kai was made of people who had military obligation; men from 21 years old to about 43 years old.
    People around. Mr. Kajiwara and my age and some Kibeis belonged to it. Mr. K: It was like exemption from the military
    draft.'
- speaker: Interviewer
  text: Did you collect contributions and send them to Japan? About how much#id you collect? Was it a large a mount?
- speaker: Respondent
  text: Mr. N:We collected the membership fee, and as we did not spend it we sent it to the headquarter in San Francisco.
    Sometimes we collected aluminum foil and sent it, too.
- speaker: Respondent
  text: 'Mr. K: We donated a wash basin in front of Yasukuni Shrine, or sent money to the surviving families of the war dead.'
- speaker: Respondent
  text: 'Mr.N: We do not know what the headquarter did with the money. They told us that they wanted us to donate a certain
    a mount of money'
- speaker: Respondent
  text: 'to buy a wash'' basin in fron'' of Yasukuni Shrine. Mr. K: We collected donations for that. I only went to the meetings
    in San Francisco a couple of times.'
- speaker: Interviewer
  text: What else did you do in Santa Fe and in Roseberg?
- speaker: Respondent
  text: Did you get up in the morning, have 3 meals and went to bed? Yes, but we had some pastime such as playing shogi (Japanese
    chess) or learning utai (chanting of a noh text). While I was in Roseburg some Japanese sailors came. They were rescued
    by Americans when they were unconscious on boats without food nor water after Hiryu was sunk. A man who went to Hawaii
    on a one-man submarine was captured and.came to Roseburg, also. He wrote a book titled, "Prisoner of War Number One."
    The submarine was supposed to have exploded when it hit something, but I think it did not explode because of some maifunction.
    He was captured when he was unconscious.
- speaker: Interviewer
  text: Was there any other incident in the camp'? We heard news in the camp every day that Japan was winning a sweeping victory.
- speaker: Respondent
  text: 'Mrs. K: Where did such news come from? Mr. K: I don''tknow wheee they came from.There were newsmen who could write.
    A man who published a paper called the "Town Crier" after he came back, told me the news every day. We enjoyed listening
    to the news. Some people recited utai, some played go or shogi. There were all kinds of recreation.'
- speaker: Respondent
  text: 'Mrs.K: Where did those go and shogi come from? Mr. K: They came from somewhere. Mrs. K: They treated the enemy a
    liens well, didn''tthey. Beside being separated from the families you were not treated bad,'
- speaker: Respondent
  text: 'Mr. Kz: I don''tthink it would have hurt to have families with us. Mrs. K: There was a rumor that they might let
    them unite with their families.'
- speaker: Respondent
  text: 'Mr. K: There was no sense letting innocent people stay in a place like that, but they called us dangerous enemy a
    liens.'
- speaker: Respondent
  text: 'Mr. N: Some families went to Crystal City from the camp to unite with the husbands. Mrs. K: There was such a rumor
    in Amache, too, It was nice to be united with my husband, but at that time I did not want to go there taking all the children
    with me.'
- speaker: Respondent
  text: 'Mr. N: At that time the biggest complaints were that the families were separated as the Kajiwaras, and that the people
    were put in camps as enemy a liens like animals in cages and received spiritual contempt. As for the treatment, it was
    not bad. Japanese : in America were better off than Japanese who were repatriated from Manchuria, Korea or China.'
- speaker: Respondent
  text: As most Japanese were Isseis, they were not used to the Western food that, served in the camp so there were complaints.
    There was plenty of food. Milk might have been short one day, but there was enough the next day. They gave milk and cookies
    in between meals to children. People complained about being put in such a place, but looking back I think it was good
    that
- speaker: Respondent
  text: we learned all kinds of things such as flower making, utai, shigin (recitation of Chinese poems), caligraphy, painting
    and
- speaker: Respondent
  text: sculpture. I think the reason shigin is so popular now is because people learned it in camps. Before the war shigin
    was not so popular as today. The other reason is that Isseis are getting old and have reached the retiring age. I think
    most women learned how to make flowers or how to knit in the camp.
- speaker: Respondent
  text: 'Mrs. K: They did not have anything else to do in the camp. Mr. N: Mrs. Kajiwara and my wife who had little children
    spent the days taking care of them _ washing clothes, taking them to school and picking them up, so they did not have
    time to go to school. But those whose children were bigger learned those'
- speaker: Interviewer
  text: Were you happy when you came back? Of course I was happy to join the family. How about you, (Mrs. Kajiwara)?
- speaker: Respondent
  text: I was relieved. I was worried as there was a rumor that they might kill the enemy a liens. At one time I was very
    worried. One person who went home from Merced came back to the camp and said, "I heard that Mr. Kajiwara was killed."
    I received a letter from my husband a week before then, but he could
- speaker: Respondent
  text: have been killed as he was an enemy a lien. I cannot describe how surprised I was. I had my children write a letter
    to him.
- speaker: Respondent
  text: We could write to him often, but he could write to us only once a month. I was worried until I received his answer.
    This man
- speaker: Respondent
  text: said, "When I went home a Filippino told me that Mr. Kajiwara was killed." He could say that casually as it didn'tconcern
- speaker: Respondent
  text: 'him, but I was surprised. In the meantime we received a.letter from him telling us that he was well. We cannot believe
    in hearsay. Mr. N: In any camp there were all kinds of rumors. In Amache people'
- speaker: Respondent
  text: printed extras reporting that Japanese Navy won victory at Midway. some people distributed the extras to every block,
    and those who
- speaker: Respondent
  text: recieved the extras gathered and talked about it. The same thing , too, they printed news ane Japan occupied such
    and such places, but they were lies. Japanese radio station broadcasted lies, and the Imperial headquarter reported lies
    until the end to encourage Japanese soldiers. By the end of the war, some people who believed Japan won the war argued
    with those who said Japan last the war.
- speaker: Interviewer
  text: 'Which was better, the internment camp or Amache? A: The days felt shorter in Amache because of the family atmosphere.
    After I came to Amache I had to do some work, so I became a tofu Q: Did you make tofu? Yes, I made tofu in the camp.'
- speaker: Respondent
  text: 'Mrs. K: He worked for $18.'
- speaker: Interviewer
  text: Did you do that every day? Yes, I made tofu every day. From around what time did you work? I worked half a day from
    early in the morning. Did you continue that for along time? Q:About_how many months did you stay in the camp?
- speaker: Interviewer
  text: 'I stayed in Amache for about a year. What kind of hobby did you have while you were there? I played go (Japanese
    checker) every day. Did you do anything else? Q: Didi you go Tishing?'
- speaker: Interviewer
  text: We could not go out. If we had a permit we could go as far as the town of Amache. People who worked in ranches could
    go places by trucks.
- speaker: Respondent
  text: 'Mr. N: At first we were told that they would not let us go out if we did not behave ourselves, but by the end they
    told us that'
- speaker: Respondent
  text: 'that they would kick us out if we complained. Things reversed. Mr. N: In those days our children were small, but
    many people'
- speaker: Respondent
  text: went to Chicago area to work. Some people went to the East early, and are still doing business around Seabrook.
- speaker: Interviewer
  text: Do you have any recollections of the camp; happy or hard times? I don'thave any. spec&al recollection to talk about.
- speaker: Respondent
  text: What about you?(Mrs. Kajiwara) It is. like a dream. When the bell rang, a crowd of people went to the mess hall. It
    was pleasant in a way. We didn'thave to cook, but just went to the mess hall and ate and came back. in
- speaker: Interviewer
  text: 'a way it was pleasant, and on the other hand it was distressing. : When did you leave the camp? Was it after the
    war ended? : Did you come straight back here? : We were sent back here. What about your house?'
- speaker: Respondent
  text: 'Mrs. K: Some houses were empty, but some houses had people Stab living in them. Mr. K: Mr. Mambock of Merced took
    care of all the #a panese ranches around here, and leased them to the white sharecroppers. That is why until the crops
    were harvested we had to pitch tents at the Buddhist church or the Christian church and live in them for about 4 to 5
    months.'
- speaker: Respondent
  text: 'Mrs.K: We left the camp in August. Mr. N: No, we came here in early part of September as the schools were going to
    start.'
- speaker: Respondent
  text: 'Mrs. K: that is why we came here by the end of August. We wanted to get in the house before the year was over, and
    we finally moved in before before the end of the year.'
- speaker: Respondent
  text: 'Mr.N: We went to Merced on May 13th, went to Amache on September 13th and came back here on Spptember 13th. We put
    up a tent in the or chard where JACL is standing now. It was summar so it was hard to pound the stakes into the ground.'
- speaker: Interviewer
  text: 'What did you do? (Kajiwaras) We put up a tent, too. Where was the tent at? Mr.K: WRA loaned us tents and utensils.'
- speaker: Respondent
  text: 'Mrs. K: We went to Merced to borrow tents. Mr. Ke We went to borrow the tools we used in relocation centers.'
- speaker: Interviewer
  text: 'Did you live in tents in Merced? A: No, we did not live in tents in Merced, but we borrowed the tents until we could
    build our own houses. Qa°Did you Live: in tenb?'
- speaker: Interviewer
  text: 'How big were the tents? Mr.N: They were quite big, bigger than this room. We could put 4 or r'
- speaker: Respondent
  text: 5 Amy cots in them. We had many children so we used two tents.
- speaker: Interviewer
  text: Did you (Mr. N.) have 9 children, and you (Mr.K) had 6 children?
- speaker: Respondent
  text: 'Mr.K: We had 7 children.'
- speaker: Interviewer
  text: 'How long did you live in the tents? From August till the end of the year. Q: Wasn''t it cold in the tent? A: It was
    not too cold, but it became cold by the end so we bought'
- speaker: Respondent
  text: stoves. Many people went back to their homes by that time.
- speaker: Interviewer
  text: What did you do about cooking? Did you cook together? Yes. Like the time we were in the relocation camp, we took turns
    in cooking. We all chipped in, and Mr. Taniguchi and I (Mr.K.) went to town to buy food.
- speaker: Respondent
  text: 'Mr. N: Mr. Kajiwara went shopping on a growers'' truck whick was returned to us. We went out to work, so women got
    up early and took turns in cooking. We came home for lunch. We were still young and full of energy then, so we worked
    hard.'
- speaker: Respondent
  text: 'Mr.K: When we came back here we slept in tthe old::school. . The police came and saw it, and thought it was not good,
    so they loaned us'
- speaker: Respondent
  text: 'Mrs. N: The first night at school we all slept together _in the floor:in rows. The school was :packed: with: people.
    After they loaned us the tents we were divided into families. Mr.N: We put up tents and made toilets.'
- speaker: Interviewer
  text: Could you come back to your own house by the end of the year? In what shape was your house?
- speaker: Respondent
  text: 'Mr.K: People were still living there, so we _moved.in vafter My. Mombock told us we..could. People had moved out
    and the house was cleaned.'
- speaker: Respondent
  text: 'Mrs. K: You must have forgotten. The house was far from.being clean. Mr. K: Things that we left there were not there.'
- speaker: Respondent
  text: 'Mrs. K: Men do not notice, but when I went in the house I noticed that the wallpaper was torn. The kitchen was so
    Cartyirbia ue L wondered how I could work in it. ee not notice it, but women had to cook there.'
- speaker: Respondent
  text: 'Mr.K: We had our works divided: men work in the field and women work in the house. Mr.N: What Mr. Kajiwara calls
    "clean" means that they took everything and did not leave anything behind.'
- speaker: Interviewer
  text: 'Mr. K: It was not clean, but they took everything that belonged to us. Q: How was the ranch?'
- speaker: Interviewer
  text: It was pretty well taken care of. Did things go well since you came back here? Yes, it went smoothly, but we had to
    watch the market conditions, and do the ranch all over again, so our troubles started. Gradually we built up our ranches.
- speaker: Respondent
  text: 'Mrs. K: I heard that things were going good while we were in the camp. Mr. N: When we came back from the camp we
    had to start all over again. Some ranches where sharecroppers worked were pretty well taken care'
- speaker: Respondent
  text: of, but a rhar pancher were Hull of weeds. Our ranch was so full of weeds that we couldn'teven walk, so we sprayed
    oil.and burned them.
- speaker: Respondent
  text: 'Mr. K: As Mr. Narita said, those who had good sharecroppers were lucky. After I came back from Amache I picked grapes
    for a while which I have never done before. At one time there were so much'
- speaker: Respondent
  text: Pokeyvine that we could not walk, and stick to me. so Te a tctos grapes standing in a 50 pound box. We had a hard
    time for a while after we came home .Today's living condition is like a dream.
- speaker: Respondent
  text: 'Mr. K: Our place, too, the white people were farming on this side, and the Filippinos were farming on the other side.
    The white people took the tractors and put them in one place and lent . them out. We could not borrow the tractors. so
    we used horses. We could not farm well, so we could not make much money. Some shrewd white farmers used as many tracters
    as they wanted and made money, but some white farmers did not know how to use tools So they could not make much money.'
- speaker: Respondent
  text: 'Mr. N: The price of grape was good, so those who had much grapes were better off. Our place, too, half was empty
    ranch, but the other half was grape, so it was good.'
