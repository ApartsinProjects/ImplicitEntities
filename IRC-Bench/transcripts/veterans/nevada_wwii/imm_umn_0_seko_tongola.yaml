  text: UMN Immigrant Stories Collection ['Tongola, Seko'] ['United States'] Filbert Seko Tongola was born in Dar-es-Salaam,
    Tanzania in 1970. He studied at Tambaza Secondary School and the Dar-es-Salaam Maritime Institute (DMI). He worked as
    an Able Bodied (AB) at Sea Express while also working as a research assistant to American and European Ph.D. students
    doing research in Tanzania. He met his first wife, an American doctoral student, while helping her with her work. They
    married in 1994/1995 and he moved to the United States while she finished her dissertation. Since 1997, Seko has been
    a personal trainer, boxing, and kickboxing trainer in the Twin Cities and runs his own business, the Warrior Inside. Seko
    Tongola Transcription I'm Filbert Seko Tongola. I am a fitness instructor. I own my own company, the Warrior Inside, and
    I'm a father of two. I was born 1970, April 21, 1970 in a city, it's called Dar-es-Salaam, in Tanzania. It's East Africa.
    After secondary school, I went to DMI, which is Dar-es-Salaam Maritime Institute, and in that Institute is where I learned
    about working on the ocean, working on the ship. Since I was a kid, I really wanted to be a sailor so that's why I chose
    to go there. And I really loved it. I worked with a company, it's called Sea Express. So a lot of ships when they used
    to come there, I used to work for them to get ready for another departure, or if there's cargo, take the cargo out. So
    it was things I really enjoyed, especially when I worked with the Sea Express. I started to meet a lot of to urists and
    a lot of students. Somebody told one of the researchers, if you're going to Tanzania, you gonna try to contact this guy.
    So, one day I go the phone call from somebody named James Harrison. So he gave me to read his proposal, what you wanna
    do, so I helped him to put paperwork together there because I grew up in a big city, so you got connections with a lot
    of people. Then, he was on his way to do research. So every time he'd get to know someone coming to Tanzania, he'd try
    to them you're gonna contact this guy. And that's how I end up- met- the girl which [was] my first wife. She emailed me
    what she wanna do. So we started to work together, so then more work together, then we were in the same city. I don'tknow,
    but it was one of those things. We built that connection. So in time I enjoyed to work with her more than to do other
    work. One day we sit, she took me out and we sit and talk, she asked me what do you think you wanna do next. I said, I
    don'tknow. She said I think I'm gonna change I'm going to stay a bit longer, because what do you think? We can get married
    and maybe you come with me so you can help me. So it was kind of heavy thinking, so it was like, ok, it so unds good.
    So I wasn'tlike eager I didn'twant to come to America big time because I didn'tknow what I'm gonna do, because I just
    wanted to build everything from foundation. But I figured that since now she wanna to focus on her education and I'm in
    love, so I decided I'm in love. I just changed my mind. So after we got married that's the only thing to move up here.
    I move here. It used to be a labor of love. We had arguments in fact because when I move up here a lot of the time she
    was focusing withn her Ph.D. and I feel like I was left behind. I had to find friends. So it was so difficult and sometimes
    we had arguments and quarrels and you feel like, ok, you moved me there from a big family- I'm one of the nine kids- all
    of the sudden I'm by myself. So then, we had that rough time. But one thing I loved, the mission we had [her Ph.D.], we
    accomplished it. So from there, everything kinda fall down a little bit, but everything's ended now, it's peaceful. She's
    the best friend I have still. Oh, training. I started to train since I was six years old. Actually My dad used to be my
    first trainer. My dad he did boxing, he did judo. He trained me so after he trained, I started to fall in love with this,
    because more than that, there were Chinese- at that time we used to live in the area of Dar-es-Salaam it's called Kurasini,
    that's where there were a lot of Chinese. Between 11 and 15, that was my best time because then I hooked up myself with
    this Chinese guy. His name was Iduo [?], so he started to teach me a lot of stuff. Not only like martial arts and only
    training, just to understand body work. And then I picked up for myself and I started to expand from there. So everything
    involved in martial arts, I started to become addicted to it. And I competed to all of them too. And after competing I
    figured ok, now I'm old. So I worked so hard, I saved every penny, and then I decided I'm gonna be a trainer. So, do I
    like training? No, myself I don'tjust like training, I feel like training is my life. Because I'm zero stress, but because
    as long as my body's moving I'm ok, but I'm depressed if my body's not moving. So, because I figured every time I come
    to the gym, I don'tfeel like I'm going to work, I feel like I'm going to hang out with my friends. And so everything since
    then is going in my way. So, here I am. People, they say that America's the land of opportunity, I think I proved it.
    I don'twant to be a millionaire, but I just want to be happy. And it's free.
