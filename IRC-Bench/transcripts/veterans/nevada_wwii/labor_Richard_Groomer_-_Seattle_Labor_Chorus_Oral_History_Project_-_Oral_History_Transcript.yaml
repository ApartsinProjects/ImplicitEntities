- speaker: Respondent
  text: '[00:29:10] RICHARD: I''m not much of a joiner, but, as I told you, I realized that music had a particular edge that
    it can lend to something, where we have to explain a lot of things to people. We have to tell people about what their
    history is. We have to tell people that you need to stand up for yourself. And the best way of doing that is to tell them
    the stories of how this has happened before, and to give them a song that they can sing.'
- speaker: Respondent
  text: At one of our strike assemblies, I remember telling them, "Make sure when you're kicking their ass, you do it with
    a song in your heart." [laughter]
- speaker: Respondent
  text: I had seen the chorus on occasions and always thought, well, that's something I could do. But I'm actually a shy person
