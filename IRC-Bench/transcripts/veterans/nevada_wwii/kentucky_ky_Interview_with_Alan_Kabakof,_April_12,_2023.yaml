  text: STEINERT:And did you grow up going to Temple there? KABAKOFF:I did. I went to Golf Manor Synagogue there.
- speaker: Respondent
  text: KABAKOFF:And, um, it was a neat little neighborhood experience. It was sort of like a, um, a Mayberry. And in many,
