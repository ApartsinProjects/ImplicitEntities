- speaker: Respondent
  text: address. Yeah. So, did you get to go into his house at all, or-- KABAKOFF:I was just shocked at--it was so cold, and,
    um, I, uh--there was not a
- speaker: Respondent
  text: lot of love between my father and Meyer. And, um, I remember my dad just gave him the necessary in formation. And
    I, I felt bad, I don'twant to leave--Meyer
- speaker: Respondent
  text: was very upset when he heard Herman had passed. And I remember he was weeping. And, um, I wanted to stay there and,
    uh, make sure he was all right. My dad was
- speaker: Respondent
  text: very abrupt, and he was like, "We're going. Let's go, now." (laughs) KABAKOFF:And he, uh, that's the way my, my mother
