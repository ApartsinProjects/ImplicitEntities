- speaker: Interviewer
  text: anything about that? STEINERT:Or does that resonate with anything you've, you know about him or the family.
- speaker: Respondent
  text: KABAKOFF:No. Not at all. STEINERT:Yeah. Okay. KABAKOFF:I mean, I, I, never knew that. STEINERT:I mean, it could have
