- speaker: Respondent
  text: KABAKOFF:Yeah, I don'tremember. STEINERT:Because I know that Solomon, who owned the building, um, moved to
- speaker: Respondent
  text: Avondale, um, when he moved out, just directly when he moved out of the building. Um, and I have always wondered,
