- speaker: Respondent
  text: STEINERT:Hi, thanks so much for coming. This is awesome. STEINERT:So, will you start out by just telling us your name
    and spelling it
- speaker: Respondent
  text: for us so we have it right in all of our documents. KABAKOFF:Sure. My name is Alan R. Kabakoff. Uh, A-l-a-n, uh, middle
    initial is
- speaker: Respondent
  text: R, stands for Richard, and last name Kabakoff, K-a-b-a-k-o-f-f. STEINERT:Awesome. Okay, so we invited you to come
    here today because your
- speaker: Respondent
  text: family lived in the building that is now owned by the Over-the-Rhine Museum, and we have plans to in terpret an apartment
    that will be as if it were your
- speaker: Respondent
  text: grandparents apartment, um, where you dad also grew up. So, I'm--we're, you know, curious about, um, things that you
    remember or, um, family history or
- speaker: Respondent
  text: things that will help us do that interpretation. So, let's just start by, um, working backward in the genealogy, like,
    um, who was your dad, who was you mom,
- speaker: Respondent
  text: how was your dad related to Rebecca and Solomon Kabakoff. Let's just go back from there and get that established.
- speaker: Respondent
  text: KABAKOFF:Okay. Um, my dad was Abraham Albert Kabakoff. And, um, my mom was Evelyn J. Kabakoff, her maiden name was
    Gellman.
- speaker: Respondent
  text: And, um, my dad was one of five children, and, um, he was right in the middle. And so he had an older brother named
    Herman, and another brother named Meyer,
- speaker: Respondent
  text: um, a sister named Ida, then himself, and then a younger brother named Max. And they all grew up on that, uh, I believe
    it's 3 West McMicken. And, um, they, uh,
- speaker: Respondent
  text: my grandfather owned the building with my grandmother, Rebecca. And my grandfather was Solomon, and, um, I never got
    to meet my grandparents. They all
- speaker: Respondent
  text: passed prior to me being born. Almost--in my family, we like skipped a generation. My dad was born in 1914, and, um,
    I was born in 1961. So, huge,
- speaker: Interviewer
  text: STEINERT:Why did your dad wait so long, you think? KABAKOFF:You know, I, I, I think World War II had a profound effect
    on him.
- speaker: Respondent
  text: And, um, he was in combat in the Pacific, and he was in, um, battles in, uh, New Guinea, and he also was, saw McArthur's
    return on Leyte Island, the Philippines.
- speaker: Respondent
  text: And, um, he just, uh, waited until later in life to get married. And there was a sixteen year age difference between
    my mom and my dad.
- speaker: Respondent
  text: STEINERT:So did he ever talk about the war? Did--when you say it had a profound effect on him, do you feel like it,
    um, caused, like, traumatic issues?
- speaker: Respondent
  text: KABAKOFF:He, um, would talk about the war. But it was always with my uncles. And I, I guess you could say I grew up
    in a little bit of a sexist type of
- speaker: Respondent
  text: family. Um, whenever we had family get to gethers, all the men would congregate in the living room and they'd have
    football on. And all the women would
- speaker: Respondent
  text: congregate in the dining room or kitchen And I just never dug the conversation that the women were having. (laughing)
    It
- speaker: Respondent
  text: just didn'tinterest me. But, um, with, um, my uncles and my father, they would talk about when they were growing up,
    they were talking about, um, World War II
- speaker: Respondent
  text: had a impact on all of them. And then, you know, every once in a while they would start talking about, um, Nixon,
    and, uh, you know, and current events. And--
- speaker: Interviewer
  text: STEINERT:And you have siblings, right? STEINERT:One or two? KABAKOFF:No, I actually have two, and then my mom raised
    my cousin, um, Melody,
- speaker: Respondent
  text: and she's, like thirty-one days younger than I am. STEINERT:Oh wow. So, would, can you run me through, I know you
    have a sister
- speaker: Respondent
  text: named Sandy, who's just recently passed away. KABAKOFF:Yes. Sandy, um, passed away recently at the age of sixty-four.
    Yeah,
- speaker: Respondent
  text: STEINERT:Such as shame. KABAKOFF:And then, I have my oldest sister Diane. And she's married to Fred,
- speaker: Respondent
  text: and, his name's Fred Smith. And they live down in Florida together, and they've carved out a very nice life for themselves.
- speaker: Respondent
  text: STEINERT:Great. And do you think she would have other memories of, um, did she ever get, get to meet your
- speaker: Respondent
  text: grandparents, you think, or-- KABAKOFF:No. She never got--now she was born, she's almost nine years older
- speaker: Respondent
  text: than I am. And so, when she was born, um, from what I understand, my, um, grandmother on my mother's side, was a live
    for a week, but she wouldn'thave any
- speaker: Respondent
  text: memories of that. But she may have in formation that I don'thave. STEINERT:Awesome. Okay, thank you.
- speaker: Interviewer
  text: STEINERT:Okay, so, do--you never got to meet your grandparents. STEINERT:Um, where did you grow up, in Avondale?
- speaker: Respondent
  text: KABAKOFF:No, I actually grew up in Golf Manor. KABAKOFF:And, um, we had a nice little Cape Cod house, and it was a,
    a great
- speaker: Respondent
  text: community to grow up in. STEINERT:So, when I think of Golf Major, I think of it as largely a Jewish community, where
