- speaker: Respondent
  text: Carter from Gomer Pyle. That, that he was a no nonsense guy. And, um, according to my dad, he, he had, he was a, a,
    really good tailor, and not only a tailor he
- speaker: Respondent
  text: was a furrier. And that he could've gone to work for Pogue's, which was a major department store, but he, he didn't,
