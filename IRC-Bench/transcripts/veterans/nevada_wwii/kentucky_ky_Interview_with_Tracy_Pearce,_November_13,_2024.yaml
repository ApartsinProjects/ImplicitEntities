turns:
- speaker: Respondent
  text: PRATHER:Today is Wednesday, November 13th, 2024. My name is Liz Prather and I'm interviewing Tracy Pearce, the director
    of Tourism at Mount Sterling, Montgomery County Tourism Commission. This interview takes place in her office in Mount
    Sterling, Kentucky, and is part of Mount Sterling's Court Day Oral History project. Hello, Tracy.
- speaker: Respondent
  text: PRATHER:Tell me a little bit about yourself. So a little bit about your background, your childhood. Tell us who Tracy
    Pearce is.
- speaker: Respondent
  text: PEARCE:Okay. Well, I was born in Middletown, Ohio, so my mom is from Bath County, actually. Preston.
- speaker: Respondent
  text: PEARCE:And my dad is from Menifee County. My dad's deceased. So when they met, he was-- had been in the army. And
    when he got back, he met my mother. And so they got married and moved to Middletown because that's where the work was.
    So there really wasn'tmuch to offer as far as employment in Eastern Kentucky. So he went to Armco Steel and worked there.
    And so I was born there. And so he took an early retirement to move me back here where-- all my family was still here,
    but moved me back here. And so I was 13 at the time when I moved back here. And so I went to Bath County High School and
    graduated there. He wanted me to go to high school here, so instead of Middletown, and they wanted to come home, you know,
    because they'd been waiting all these, apparently, according to my mom and dad, it was-- they waited 25 years to get back
    home, you know, so everybody wants to come home.
- speaker: Respondent
  text: PEARCE:So at first, I wasn'thappy about that. You know, PRATHER:13 years old. PEARCE:I was 13 years old, all my friends
    and everything. And, um, but I definitely settled in, and I loved, you know, just the people here made just made it great.
    And so I've, you know, been here pretty much ever since. I went to--graduated Bath County High School--went to Morehead
    State University, had a Radio, Television and Public Relations Advertising degree. And then when I graduated, I went to
    work in Lexington for basically the cable company selling TV commercials. So it would be like ESPN, CNN, things like that.
    So now we would know it as Spectrum around here. But, at the time, it was TCI is what it was called. So I did that. And
    then they offered me a position in Dallas, Texas. So I did that. So I went-- I moved to Dallas and worked in the TV market
    there. And then after about a year, I basically didn'teven recognize I was homesick, but apparently I was. It's just all
    pretty much flat and concrete.
- speaker: Respondent
  text: PEARCE:Pretty much, you know, in Dallas. And I was used to, of course, beautiful Kentucky. So I called home one Sunday,
    talked to my dad, and my dad said, "I got an idea. Pack your clothes, leave your furniture, and come home." And I was
    like, "I can'tcome home. What are you talking about?" So I did, though. I went the next day to my-- on that Monday, and
    I was Rookie of the Year there, you know. But I went in there and I said, "I want to go home." And he said, "Listen, you
    can go home, but you're not going to leave the company." So they found me a position in Lexington. So I stayed there for
    another--selling TV commercials and other--probably six years. And then I went into radio, which is always my passion.
    So went into radio and started selling radio advertising and did some on-air work as well, which is what is now called
    iHeartRadio. But, at the time, we were bought and sold probably three or four times during that time. So did that for
    six years. And then that was right when the real estate market was hitting hard. I mean, like everyone was selling. It
    was just amazing. That's where the money was, I guess. So I went to-- and sold real estate and went to work for a builder.
    So, at one time, I had probably 50 houses under construction.
- speaker: Respondent
  text: PEARCE:It was [a] busy time. Things were great, that's for sure. But then the market crashed and, um, or, you know,
    the real estate market anyway. But it crashed. And so when it crashed, I was like, okay, now what do I want to do? And
    my dad was not, not well, um, and, you know, lived in Preston still. And so I just knew, you know, with my mom and everything,
    I needed to come home, you know. Again from Lexington. But, you know, actually come home.
- speaker: Respondent
  text: PEARCE:So I found a house on High Streethere in Mount Sterling, bought it, and kept my real estate license, and sold
    real estate for a while. But within a year, I worked for the radio station. I went to work at the radio station here locally.
    I walked in and said, "Do you have a job? I got to pay a mortgage so I can move home."
- speaker: Respondent
  text: PRATHER:This is WMST? PEARCE:WMST radio, right downtown. And so-- and they knew me from Bath County and they said,
    "Absolutely. Come on." And so I started working there. And then after a year, the tourism position opened up, and I was
    able to get this-- the tourism position, which I love. And so I went to turn in my resignation and-- to the radio--and
    the Tourism Commission said, "No, no, no, we want you to stay on the radio because it really helps with everything marketing
    and tourism." And it keeps me in the know. And plus, I love it. That's my passion is radio really, and so I did that.
    And so that's what I've been doing now over 15 years. That was January 2009. I started as the Tourism Director, so I've
    been doing it 15 years almost. It'll be 16 come January. Um, but I love it because it encompasses everything that I like.
    Um, it encompasses marketing, which is a passion. But the radio, the television, the print, the people, the or ganising
    events and and just trying to make the community better. You know, a better place or fun, you know, fun, you know, energetic,
    probably bring more people here. So I love it. Yeah.
- speaker: Interviewer
  text: PRATHER:Let's back up just a bit. What year did you graduate from Bath? PRATHER:And what year did you move to Dallas?
- speaker: Respondent
  text: PEARCE:It would have been--I graduated Morehead in December of 91, so it would have been right--probably--we'll say
    I worked for three months after that, and then I got--and then I got the offer. So it would be this maybe, let's say the
    summer of 92. Yeah. Yeah.
- speaker: Interviewer
  text: PRATHER:And when did you move back here? PEARCE:Um, to Mount Sterling? PRATHER:No. Back to Kentucky.
- speaker: Respondent
  text: PEARCE:Oh, back to Kentucky? A year after. Yeah. Yeah. PRATHER:So you came back in '93 and then moved from radio to
    real estate and then back to radio.
- speaker: Interviewer
  text: PEARCE:That's right. PRATHER:Yeah. So, um, what is it about radio that kind of checks all your boxes? Pushes all your
    buttons? What is it?
- speaker: Respondent
  text: PEARCE:Completely checks all the boxes. PRATHER:Yeah. What is it? PEARCE:Well, I just remember being, well, music.
    Deep down, it's music. But I just remember being as-- when I could barely walk.,I always carried a radio AM radio. Definitely
    showing my age, but I'd carry an AM radio everywhere I went. So all I did was listen to music. And I'm talking sleep with
    it on. And at one time I had the battery operated one, so I'd have to keep batteries going, but I'd sleep with. I mean,
    I carry it everywhere I go.
- speaker: Respondent
  text: PEARCE:And so. And I always did. And I just always loved the music. I just loved the whole idea that there was a box
    that has all this in formation and all this music, and it's just fascinating to me. And I love music. I sing, you know,
    not much, but I used to perform more. I used to be in a band and things like that too.
- speaker: Respondent
  text: PRATHER:You were in a band? PEARCE:This was- well, we named ourselves several different things because if we were
    asked to be playing country, we would be- I think it was-Thunder Run or something kind of- I don'tremember the name now.
    And then when it was, rock nroll was considered another name. Um, but I was always--always around musicians. I mean, that's
    always-- I have a passion for that. Um, I grew up, my dad would have bluegrass musicians all come sit in our living room.
    Mom would cook for them, and they would just sit in the living room and play all night long.
- speaker: Respondent
  text: PRATHER:Now, was this in Middletown? PEARCE:Yeah, this was in Middletown. PRATHER:Because there's a strong, huge cultural
    shift right from eastern Kentucky to that Ohio.
- speaker: Respondent
  text: PEARCE:A lot of people don'trecognize that. And I-- and even with the marketing I do today, there's a lot of that.
- speaker: Respondent
  text: PEARCE:And people--when I market to the area of Middletown, Dayton, that area--some, some people are like, oh well,
    would they really drive [to] us? Like one thing, it's easy to gethere from there
- speaker: Respondent
  text: PEARCE:And that's so even if they don'tknow anything about Kentucky, which they would, but if they don't, it's still
    such an easy drive. We can get them to come here and long enough where they could spend the night, which is what we want
    to. But there is that connection because so many people from eastern Kentucky, that's where they went. And really, I'll
    say it, Armco even, you know, but if not Armco, that area.
- speaker: Respondent
  text: PRATHER:Or another steel mill or another... PEARCE:So, and when we lived there, my dad had lots and lots of friends
    from eastern Kentucky.
- speaker: Respondent
  text: PEARCE:So it's basically like, yeah, we just transport, you know, just got transported there. And so it was a neat
    thing. And I love bluegrass music too. Um, so, you know, I grew up with Paul Mullins, which is a really famous, you know,
    bluegrass musician actually. Um, Tom T Hall. I'm not- I don'tremember if he was ever at my house, but I know that-- that
    he was around, um, a lot of times, you know, we would talk about Tom T Hall all the time, but anyway, just that background
    of music. So in high school, we had a Radio Club at Bath County High School.
- speaker: Respondent
  text: PEARCE:Yes. And WMST here, even though there is a station in Owingsville. PEARCE:But we would ride up here. Um, and
    we would do a radio showevery Saturday morning.
- speaker: Respondent
  text: PEARCE:And so all my friends in high school and everything, and of course, we would do dedications and everything.
- speaker: Respondent
  text: PRATHER:Yes. Oh. That's great. PEARCE:So-and-so liked so-and-so, and so-and-so wants to know if so-and-so will go
    to prom or whatever it is. But also we there was a real--we called it really famous, but JoJo's Jam Session. I don'tknow
    if this rings a bell.
- speaker: Respondent
  text: PEARCE:But very popular when I was, let's say 15 or 16, you know, about that age. Um, but that was something. Now,
    that was at night, and it really was like when, um, kind of the rap music was new. It was, it was soft rap, you know what
    I mean? But to us, it was like, so great. We just. You wouldn'thear it anywhere else.
- speaker: Respondent
  text: PEARCE:So that we all were glued to the radio. So that kind of came back around so WMST, and that's when I was in
    high school. So really, the first thing I thought of when I was looking at that transition of coming home is like, I would
    love to work at WMST, you know, for lots of reasons, but one of them is just I've got a bond there. And so and I've been
    there. Well, now that'll be almost 17 years now.
- speaker: Respondent
  text: PRATHER:And tell us what you do there. PEARCE:Oh yeah. Well I used to do the morning show, so I would be there at
    5 a.m. in the morning and would go until about 12. Um, so Dan Manley, who is a mainstay, um, announcer you know, DJ, everything
    you can think of, he, um, he would take off because he writes for the sports for the newspaper here. So somebody would
    have to do his morning show because he was doing the newspaper. So I would do that. And then also I would come in in the
    afternoons and do just, you know, weather and commercials and things like that. But the morning show, you actually play
    music. It makes sense. You play music, you talk about community events. And really most importantly was the news though.
    So a half hour newscast on the top of every hour, it was a challenge.
- speaker: Respondent
  text: PEARCE:And I was really, uh, thinking I was pretty, you know, used to radio, been on the radio a lot in Lexington
    and things like that. So I wasn't, like, intimidated necessarily. But when you're the only person in the studio at five
    in the morning and at 6 a.m., you have to have a full newscast. And that includes sports, you know, actually news of the
    day, obituaries, which a revery difficult names and things like that. So, um, it was a challenge and I did it. And so
    now it's funny where we've got Chris Irwin, who is an absolute the best radio guy in the world. I mean, he grew up in
    it, loves it. It's his passion. And so he is able to do that role now. And so and and frankly I'm happy that he does.
- speaker: Respondent
  text: PEARCE:So now I'm there from 4 to 6 every day. So I basically end my day at the radio station. PEARCE:Which is two
    blocks from the tourism office, which is two blocks from my house, and two, you know, everything's righthere. So I enjoy
    it so much because I stay connected to it. And also, you know, I mean, it's work. I mean, I go in there, finish my day.
    I do have a little time where I can look at the computer and answer some emails and make some phone calls if necessary,
    but, um, I do that every day, 4 to 6. So. Yeah, I love it. I mean, it's just part of what I do, and I don'tthink of it
    as work
- speaker: Respondent
  text: PEARCE:00 at night and I'm on a computer working on a new graphic for a new something publication or something for
    an ad for our, you know, our advertising. You know, I don'tthink about it like, oh, I'm not supposed to be working right
    now. You know, it's a 24--I'll just say it--It's pretty much 24 hour job for me all the time.
- speaker: Respondent
  text: PEARCE:I don'tthink of--I don'tbreak down it like that. I don't say 9 to 5 or or whatever it is. 8 to 4. I just work
    all the time. But I mean, but and it so unds like I'm being a martyr or something, but what I'm actually saying is that
    I like it that way. That's what I like about it, is that if for some reason my mind is just not on that for some reason
    right this minute, I can go do something else. I'm not a clock in, clock out person. Never have been, we'll never be able
    to be. And that's just how that is.
- speaker: Respondent
  text: PRATHER:That's great. Well, I mean, it suits you. PEARCE:It does suit me. PRATHER:It suits the life that you have
    here.
- speaker: Respondent
  text: PEARCE:Thank goodness everyone seems to. It suits them too. Thank goodness. You know, because it is hard when I watch
    people 9 to 5 jobs. And like I said, I've just never been. That's just not something that's ever been in my blood to do.
    And I get restless and I like to think about something else or go do something else or. But when I see people that do
    that 9 to 5 business, I'm like, I don'tknow how they do it. But then they also don'tcarry their work home with them.
- speaker: Respondent
  text: PRATHER:Right, right. PEARCE:They clock out. PRATHER:But it so unds like your work really isn'twork. It's something
    you really enjoy.
- speaker: Respondent
  text: PEARCE:Absolutely. And nothing's perfect. You know, I mean, there's ups and downs for sure. And disappointments, but
    fun celebrations too. So it is an absolute life. Um, lifestyle for me is what it is, really.
- speaker: Respondent
  text: PRATHER:Well, let's talk about one of those celebrations. Let's talk about Court Day. So how did first of all, I tell
    you, let's not talk about Court Day first.
- speaker: Respondent
  text: PRATHER:The field of to urism. So tell me, because I am - I don'tknow anything about the field of to urism. And it
    is a booming business in Kentucky right now.
- speaker: Respondent
  text: PRATHER:Yes. Um, tell me a little bit about what tourism is about. Is it just about hyping the place or what is it
    like? Tell me the parameters of that.
- speaker: Respondent
  text: PEARCE:Well, it's changed even in the 15 years I've been a part of the tourism industry, I've seen a huge shift, and
    I'm very happy with that. Um, it's always been an exciting position or in dustry, but basically you have -- I consider
    it as --I'm kind of the marketing director of the town, even though, you know, again, you can'treally put a title on that.
    But pretty much I mean, I try to position ourselves that we are an enticing place to visit and more than that, almost
    visit for sure, because that's really my role, but also is to get people to fall in love with the place, to want to bring
    their business here and to want to live here. And tourism really with other tourism offices and places like you're talking
    about Louisville and Lexington, some of the larger northern Kentucky, some of the larger places, their focus is completely
    on attractions really.
- speaker: Interviewer
  text: PEARCE:Because it really is trying to get--they call it heads and beds, right? They call it because we are--
- speaker: Interviewer
  text: PRATHER:What is heads and beds? PEARCE:It means people coming to spend the night in your hotel. So your job--
- speaker: Respondent
  text: PRATHER:So that's one metric of-- PEARCE:Really it is the only metric actually. I mean, there's lots of different
    ones. But as far as proof in the pudding, how many people come and stay the night in your town is really what tourism
    initially is, um, but the thing is, you know, a place like Mount Sterling, you know, we do have a nice convention center,
    you know, convention center. I'll say Clay Center. But I mean, it is. And we do have wonderful places that people can
    hold conventions and things like that as far as meetings. But when you're talking about the scale, I'm talking about,
    like in Louisville and Lexington, some of that we're talking about thousands of people, we don'thave, we can'taccommodate
    that. You know, we don'thave enough hotels here. And also we don'thave any huge attractions. We have wonderful attractions.
    And a lot of times, the reason people do like to come here is because it's charming, it's laid back, but we still have
    really interesting things like our Art Center, our beautiful historic downtown. Um, Ruth Hunt candy. You know, we do have
    top attractions for a town our size, so. But with tourism, at least in my perspective, at first, I focused like everyone
    else did, when I first got the position because I just was taught, you know, trained. You know, here's, you know, your
    main focus is to get people to come to Mount Sterling and spend the night. So I really did try to focus more on that.
    But what I have learned is that really, there's so much more than somebody coming to spend the night. There's a lot of
    factors involved in that, and being off the interstate is a benefit to us. Um, and so that does help a lot just where
    we're located, the central location and everything else. But what I really have kind of shifted into more the longer I've
    been here, is that really whether they come for an afternoon, a day trip, they'll spend money on a day trip, they'll eat,
    they'll shop with our local businesses. So I focus more on just getting people here, um, whether they spend the night
    or not, just getting them to come to our town. Because most of the time, and this is from every time I meet visitors,
    most of the time, when they come here, they love it,
- speaker: Respondent
  text: PEARCE:It's just getting them here. PRATHER:Getting them here. PEARCE:And then some of that is also the community
    is so friendly. They love visitors. People here love visitors. I mean, it's one thing that you cannot buy. You cannot
    make happen. It is. Either it is or it isn't.
- speaker: Respondent
  text: PEARCE:And I've found pretty early on that some, some people, like tourism directors, deal with a community that doesn'treally
    want new people.
- speaker: Respondent
  text: PRATHER:Right. Yeah. PEARCE:How about that? PEARCE:That sounds crazy to me because Mount Sterling has always been
    an attraction for people. We had bars and taverns and we've just always been a melting pot and always kind of, you know,
    been an economic hub for the eastern Kentucky region. And that's just been since the beginning, really.
- speaker: Respondent
  text: PRATHER:Okay. So the community is friendly and you can'tmanufacture that. PEARCE:You cannot. It's authentic, very
    authentic. Yes.
- speaker: Respondent
  text: PRATHER:So when people do come here then and they have the things that are kind of embedded in our community, you
    also, though, in addition to those things, are responsible for several festivals of the year, one of which, of course
    is Court Day. But let's, before we go there, what are the other festivals that we have in the town that brings people
    and introduces Mount Sterling to them?
- speaker: Respondent
  text: PEARCE:It is amazing. And I'll say, I keep saying, for a town our size, we are growing, but we're still a small a
    small place, you know, I mean, we have 7000 people in the city, I think 36,000 in the county now. So that's that'sgrowing.
    But, um, you know, for a town of our size, we always have something going on, and I love it. I mean, it is, um, it actually
    is part of what makes us kind of special and vibrant is almost all the time. So we just started two years ago, the Nancy
    Green Pancake Queen Spring Festival. So a lot of people, even in this community, did not know that Aunt Jemima was born
    here.
- speaker: Respondent
  text: PEARCE:Nancy Green is her name. And, um, so that is something that was new. So besides all the festivals that we've
    had forever, like October Court Day 230th year this year, um, we also have a lot of others and even new ones that keep,
    that just kind of come online. And we've had some where we've started a festival and didn'tfeel like it just took flight,
    let's say. And so we said, well, you know, we don'thave to do that one again. So we're always open to ideas and everything.
    So when this came about, about the Nancy Green Festival, I was excited about that because I was always wanting to find
    a way to let everyone know that Aunt Jemima was from Mount Sterling, but I wanted it to be done the right way, and I didn'twant
    it to be top down where the tourism director wants to have a festival, you know? And so I'm so grateful that there's several
    people that came a board on that. But the black community, the Dubois Center, um, and then other people in the community
    started it really. They were like, okay, we would be in terested in doing this, but it needs to be presented the correct
    way. And so that's what you want, you know? And so I'm thrilled about that now. So we're going to have our third one this
    year. We have a historical marker that was put right in the center of downtown. The school system has pancakes on her
    birthday. And I mean, it's just, it's wrapping your arms around that history and not being, you know, afraid of, you know,
    basically saying that, you know, yes, she was born into slavery. But look what an amazing woman and how she was able to
    overcome so many obstacles. And so it's a really wonderful story and it's our history. So that's part of I love history
    too.
- speaker: Respondent
  text: PRATHER:Yeah, I can tell. PEARCE:I'm a history person too. I mean, I don'thave all the, you know, I don't do all the
    research and that kind of history stuff, but I just love to be in the middle of a town that was established in 1792.
- speaker: Respondent
  text: PEARCE:You know, it's just amazing. Like you walk down the street and it's not made up. It's true. You know, this
    is all real buildings that really were here back then and all that. So I love that. So I love that festival. It's new.
    And anytime you have a new festival, it's more work because, you know, you got to get-- there's things you have to get
    going. The Small Town America Festival is another great festival we have. It's always on the second Saturday of August.
    And it is going on- it's been at least 15 years because it started when I was-
- speaker: Respondent
  text: PRATHER:Wow, that's amazing PEARCE:Yeah, yeah, so 15 years and it's wonderful. It is some people will say kind of
    a mini version of Court Day, but it really isn't. We do have vendors, you know, we'll have 60 vendors or so and we have
    food, but this is around the courthouse square. Um, and we really do focus on what makes Mount Sterling special. All handmade
    crafts. Um, and, you know, it's just-everyone loves it. There's a million different things that go on. There's a 5K, there's
    a cornhole tournament. There's a paint the small town, which is amazing, where you have these artists that sit and paint
    in plein air, looks around your town that maybe you hadn'teven noticed before. I love it, I love it. That's one of my
    favorites. We have a talent show and the talent showevery year, we have the most amazing talent, and we've had years where,
    like Corey Hedge is one that comes to mind like two years ago. But he went on to American Idol and got the golden ticket,
    you know. But we've had that several times in the past 15 years. So I love that festival too. That's one of my favorites.
    And then we have the First Friday markets. Now that's the first Friday of August. Oh see I'm sorry. June, July and August.
    Yeah. So the first Friday, June, July and August, it is at night. This is definitely even though we do get people from
    other places, this one is almost, almost like a little homecoming once a month, you know.
- speaker: Respondent
  text: PRATHER:It is. It is. Yeah. PEARCE:And that's really has a special place. It's for some reason- it really brings out
    our own citizens. Okay. More than just visitors. And so I like that. Yeah. And everyone wants to see who's here and what's
    going on, and it's good because it's at night. And we don'thave a lot of things at night, you know. Um, as far as festivals
    go. And so this is one time, you know, once a month in the summertime where everybody comes out, great live music, great
    food
- speaker: Respondent
  text: PRATHER:Where is the First Friday? PEARCE:And we do First Friday in our, um, next to our Farmer's Market, which is
    on South Maysville. And it basically the road kind of ends there. And it used to be that that area was only used during
    October Court Day festival, because when you're talking about over 500 vendors, you know, you got to have space for all
    that. So really nothing has been done in that area since the train depot. If the train depot is there. But since the train
    stopped coming, and I guess it was the 80s, really? Um, since then nothing was ever done there. And so it just was kind
    of vacant land and unused land. And so now we built the Farmer's Market there and moved them from the bypass, which was
    great. Yeah, I mean, it it took some doing, but it got that done. So got that done and then kind of have a little bit
    of a trail there. And it's pretty now where no one would have believed it. It backs up to a Hinkston Creek, which is,
    you know, I mean, it's a waterway, but we've never even recognized it was there. Pretty much. So now First Fridays, I
    really think that helped with that, um, bringing people to that area. And so now and that's been going on, it's been like
    eight years now, we've been doing the first Friday. So it's actually we're starting to get some long, long term on it
    too. But we've been doing that for a while now. And so now that whole area is being looked at differently, and even ideas
    about making it into a real park where you have art installation, playground, amphitheater, all these different things.
    So in the big picture, we're hoping that these baby steps and and having these events bring us to a real entertainment
    area now. So we're looking forward to that. I am
- speaker: Respondent
  text: PRATHER:I am too. And and we'll I want to talk a little bit about the grant later on about the development grant.
    But let's talk about Court Day for a few minutes. Um, the biggest festival, the oldest festival in the Commonwealth of
    Kentucky. Um, describe the role-I guess it's such a big, big festival, first of all- describe the role of to urism. Let's
    say before Court Day begins, let's the last day of Court Day is over, what do you start doing thevery next day? Monday
    is the last day of Court Day. What do you do on Tuesday?
- speaker: Respondent
  text: PEARCE:Well, I will say this. And that's true. Rest. Maybe a little bit anyway. But really, go a head and start thinking
    about what did we think went well, what did not. Maybe what could it be improved things like that. Um. Thanking everyone.
