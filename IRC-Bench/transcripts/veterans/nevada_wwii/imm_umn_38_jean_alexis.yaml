- speaker: Respondent
  text: 'UMN Immigrant Stories Collection [''Alexis, Jean''] [''United States''] Jean Alexis was born in Cap-Ha Jean Alexis
    Transcription "The Story of the Important Thing in My Life" My name is Jean Alexis and I come from Haiti. Going back and
    forth from a place to another I didn''thave a safekeeping for any concrete object. But I do have a story to tell about
    something very important to me in life. My mom is the most important thing I miss in life. She is like a foreign matter
    stuck inside of me which I feel every day. I grew up without her affection. I don''teven know what she looked like, but
    I feel her presence every day, every minute, and every second more than anything. They called her Marie Thérèse Blot,
    and Cap-Haïtien, Haiti, located on the Caribbean Sea, is the place she gave birth to me. Being denied by her family because
    of her relationship with my father, and her struggle in life before I was born and even worse while she was pregnant after
    the death of my father, let me know how strong she was and kind to still keep sharing love with people who hurt her. I
    almost grew up by myself, overcoming adversity, and facing the dangers of a wild life. That''s how I know how important
    she is to me. The emotion I feel about her becomes real by association with everything I touch in life. Things such as
    school, sports, work, art, music (especially my guitar), the air I breathe, people, my thoughts, time, my life to notice
    only those words. The fact she gave me life already proved her love and patience for me. But even after her death, she
    makes me who I am today. One day while I carried on my back all the problems of the world, she came to help me in my dreams.
    Once, I had a crazy project to write her a letter, "Lettre à ma mere" because my lack of knowledge of her. I wrote her
    to ask questions such as Why did she go so early? Why did she do that to me? Will I see her one day? Why, if I don''teven
    know her, do I miss her so much? But mostly I wrote to complain about things I had been going through that time, asking
    why and begging for her help. I know she will always be missing. But her legacy won''tever be finished. Conscientious,
    not too late, of her, I turned the letter into a song because I realized all the help I got in my life mysteriously came
    from her. The helpers always told me it was because of her kindness. Without blasphemy, if God was a woman, he would be
    my mother. I''m very grateful she never leaves me and even gave me an hymn to understand the valuable meaning of the struggles
    in life. I can always sing this song when I fall just to get up stronger. This is the chorus and a verse of the song:
    Lyrics "Lettre à ma mère" Je ne crois pas mes yeux ce qui m''est arrivé J''ai vu briller dans les cieux la lumière du
    passé Que l''âme de mes yeux ne soit pas prête d''oublier or Il danse avec le feu. J''ai perdu dans l''espace que j''aie.
    Comme chaque jour de ma vie je so igne une plaie. Qu''il soit la perte de ma mère, mon père, l''une de mes deux so eurs,
    mon frère, Rien ne peut me compenser l''a bsence que je pleure. Je comprends le fond mais pas la forme sur la plage. Les
    grains de sable qui forment le cote ne viennent pas tous du meme rivage. J''ai pleuré ma mère plus que la famille. Manquant
    trop l''air je rampais comme une chenille. J''a vais de la crampe qui me crève le coeur. Voyant ce qui m''a rrive au fond
    de la lueur. Ma vision se pâlit quand elle m''a dit que c''est fini. Je ne l''ai pas bien compris du fait que j''étais
    trop petit. En so nge je l''ai vu so uvent à la lumière elle vole au vent. Jour et nuit dans ma vie elle est là. Dès que
    je viens quand je pars, elle suit ma trace à chaque pas. Dans mes rêves j''ai sa so uplesse au-delà de ma vision perforée
    de milles prouesses. J''encaisse tout sans ouvrir mes sens aux injures des traitements dans la so uffrance et en silence.
    Mais en revenant chaque fois je la vois qui me dit malgré tout ALEXIS ne lâche pas. Je ne crois pas mes yeux ce qui m''est
    arrivé J''ai vu briller dans les cieux la lumière du passé Que l''âme de mes yeux ne soit pas prêt d''oublier Il danse
    avec le feu.'
