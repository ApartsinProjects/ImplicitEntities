    with him. She stayed with him for 3 years. She went a lone because he didn'thave a wife, yet. While she was in Korea,
    she went around and to ught farmers how to make "mino" and "Mushiro" in the nearby villages. When I visited her, she showed
    me a newspaper article about her. It described about 60 years old woman serving Korean villages. They used to dry red
    beans on the bridges, and pebbles got into the beans. When I brought "a zuki" (red beans) the sand used to be mixed in
