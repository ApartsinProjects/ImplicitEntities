- speaker: Respondent
  text: 'CONOR 00:54:39: Did you play a broader role in your community: your friends or the community that you''re you''re
    part of, in understanding the pandemic or helping them understand?'
- speaker: Respondent
  text: 'KATY 00:54:51: I think I try to educate when I can just being a healthcare worker. I balance with that not trying
    to be too forceful with what - and respecting other people''s opinions about things, but do try to share what I''ve been
    experiencing, that this is serious, especially for some that I know don''twant to take it seriously.'
- speaker: Respondent
  text: 'CONOR 00:55:24: There were a wave of protests of a new resurgent civil rights movement came out at the same time
    as COVID, spring or early summer. I wonder if you can observe any your experiences of the movement and whether your union
    or you had any - were impacted or had any participation in the Black Lives Matter movement?'
- speaker: Respondent
  text: 'Working in the Time of COVID-19 Oral History Project | Kathryn "Katy" Brehe of SEIU 1199 KATY 00:55:49: Yeah, I totally
    a gree with you, there''s been a resurgence, and a lot of attention in general to racial in equities. I will say, unfortunately,
    this is not anything new. Even when we bargain in the summer of 2019. I think people think bargaining has to do with wages,
    money, but one of the big things we bargained for during our normal contract bargaining was language around equity, diversity
    and inclusion, systemic racism in the workplace which, I''m glad that was highlighted during this pandemic time, because
    it''s really important work. And what I''ve seen at Harborview - I think people think racism is is a certain thing, maybe
    overtly a racial slur. But what we know in the workplace, are these what we call microaggressions, [tone policing], where
    someone may say, I feel like you''re being disrespectful by the tone, you''re you''re using, you''re really loud. And
    they''re targeting certain people of color. So that''s something that we''ll refer to as a tonal policing. So I think
    there''s been a lot more work and then use for people to talk about this now, which I think is really positive. But unfortunately,
    it was a problem before COVID and I think it will continue to be, but I''m glad that there''s actually work - a little
    bit more highlight on work to be done around this. And then the other thing we''ve seen is some of the racial in equities
    in patients that are positive with COVID, definitely more people of color have been affected by this. Again, that''s not
    new. People of color have had certain worse healthcare outcomes. And then that''s also healthcare workers of color have
    had more higher rates of COVID. More deaths. So that''s also something just from like healthcare worker standpoint. This
    was from some CDC data back in September, but healthcare personnel that have died of COVID tend to be older, male, black
    and Asian, and underlying health conditions. So even for healthcare workers, there is some racial in equities.'
- speaker: Respondent
  text: 'CONOR 00:58:37: Wow, this is. You''ve given me a whole group of other questions I want to ask you. So in relation
    to the contract language, and in your bargaining goals relating to EDI, you mentioned that you were already doing it as
    a union in 2019 when you were bargaining. What were some of your goals? And what was some of the contract language that
    you won?'
- speaker: Respondent
  text: 'KATY 00:58:57: Sure, I think some of the goals were really education around this and to make sure that workers felt
    supported and could find a way to flag if there was certain issues, or they were experiencing certain levels of racism.
    And not only with the education on that, that there were safe, what felt like safe spaces, so maybe there''d be some education
    with everybody. But then there was also a venue for just maybe people of color to meet and talk about some of these issues.
    Or if you''re Black to talk about these issues separately from someone that may be white, or if you''re white, to have
    that separate space to feel safe to talk about issues of racism, not in front of people of color. And to also just even
    say that we do know this is an issue and this is something as in stitution we want to work on rather than that denial
    like, "This doesn''thappen here. You know, we''re a very racially diverse workplace," because I don''tthink there''s any
    workplace that this does not happen at some level. So even that recognition that this is work that needs to be done, and
    we''re willing to do that work, rather than that doesn''thappen here.'
- speaker: Respondent
  text: 'CONOR 01:00:22: Yeah, and I really appreciate you putting into context that, you know, the new wave of Black Lives
    Matter, not only is it not new, these structural - these issues of structural racism, but it''s'
- speaker: Respondent
  text: Working in the Time of COVID-19 Oral History Project | Kathryn "Katy" Brehe of SEIU 1199 not even the first wave of
    Black Lives Matter. But in terms of the most recent activism, can you think of any actions that you or the union took
    in relation to the most recent campaign?
- speaker: Respondent
  text: 'KATY 01:00:48: I would say we''ve reached out again, to administration about really wanting to partner with them
    with some of this education, we''d won this contract language to have a committee to look at equity, diversity inclusion.
    And then there were some seminars going out through different educators throughout the University of Washington, but some
    of the union members on the committee they did not include. So we''re kind of saying to them, "Hey, we brought this forward,
    back in 2019. Please include us on - I''m glad that some education is going around and some seminars and are being offered.
    But please include us because we''ve been really pushing this work since last year, to be in our contract, we don''t want
    to be left out of this mess, things move forward." And then I think the other area that I personally worked on is, again,
    with the ECMO patients, a lot of those patients we''ve seen are people of color, and just really partnering with the whole
    ECMO team, you know, our physicians, our respiratory therapists, other operators that let''s make sure we''re giving good
    equitable care, because there are going to be different challenges. Again, like I was saying, some of our patients - Because
    their families were either working or didn''thave access, easy access to in ternet, communication was an issue. And just
    saying, we need to be making sure we''re communicating with those families, just as much as other families that have maybe
    a little bit more resources.'
- speaker: Respondent
  text: 'CONOR 01:02:35: So these next questions are more like his sort of, like big picture ones. And I wonder if you can,
    just how do you think life will be different After all, this?'
- speaker: Respondent
  text: 'KATY 01:02:48: It''s hard to say. I think everyone, including myself, is really just wanting things to be back to
    normal. It''s early to tell, but I know me and my co-workers have said, we wouldn''t be surprised moving forward, if all
    healthcare workers, if we have to just be masked at work, if we have to have eye protection at work. I''m hoping through
    the hardship that somethings like this patient advocacy staffing will continue. And that, as a result, we''ll be better
    because these resources were stretched so thin. So that''s the hope overall, but I think there does feel like there''s
    going to be a lot of reckoning when we look back and say, Wow, there were so many so many deaths. What can we do better
    next time? So this can can never happen again.'
- speaker: Respondent
  text: 'CONOR 01:03:47 What do you think is surprised you the most about the this period of time? KATY 01:03:56: These are
    some of the hardest working conditions that I''ve ever worked through. I think it just shows that you know, healthcare
    workers are asked to do more and more and more and more and we can do it. But it showed me that our employer does have
    a responsibility. They''re asking us to do a lot we have the right to ask our employer to do more and more to to help
    us support through this time. But yeah, this has been, definitely, I think looking back will be a very unique period that
    when you''re in it, you maybe don''trealize it, but I''ve heard from older co-workers that said early on, Wow, this is
    like'
- speaker: Respondent
  text: Working in the Time of COVID-19 Oral History Project | Kathryn "Katy" Brehe of SEIU 1199 when HIV, we didn'tknow anything
    about it at first, kind of came about because there's just this fear, anxiety, this unknown. So I think very unique times.
- speaker: Respondent
  text: 'CONOR 01:04:53: Have you had any positive experiences? KATY 01:05:00: I would say some of my personal positive experiences
    have been a sense of to getherness within my co-workers. In the past, like I said, I''ve worked on the trauma, surgical
    ICU. Those are the co-workers I''m most exposed to. But a lot of us have been floating to different areas, working to
    different areas, working with a lot of different union members, not only SEIU, so just kind of that sense of community
    and those connections have been a really positive experience.'
- speaker: Interviewer
  text: 'CONOR 01:05:31: Do you have any other thoughts that you want to share? Or is there anything I missed that you feel
    like it''s important to talk about?'
- speaker: Respondent
  text: 'KATY 01:05:40: I would say the one thing I didn''tmention that I should because I think it''s only right is, this
    has been a burden on everybody - COVID, but, like I said, there was no COVID unit before COVID. They had to turn the neuro
    ICU and the the medicine a cute care units at Harborview into COVID units. Those workers have literally taken care of
    more COVID positive patients than anyone else in the whole entire hospital. Even the physicians sometimes won''talways
    go into the rooms. We''re literally on the phone, speakerphone, telling them what''s going on in the room. So really,
    it''s health - It''s nurses and respiratory therapists that''ve had the most direct exposure. And I feel like those workers
    are really under-recognized. And our ED [Emergency Department] staff, I would say, because you''re the front line, and
    you don''tknow what''s walking in your front door. And there''s a lot of people down there, it can be chaotic. And one
    thing that we are wanting to recognize for that staff is they''re not in their home unit anymore. Their home unit doesn''texist.
    They really deserve a float premium and they still have not gotten this. And we don''t get hazard pay. There''s been multiple
    workers from other industries, and they totally deserve it. I know some Starbucks workers got hazard pay for a while.
    And it''s totally deserved. But even the healthcare workers that are working directly with these patients, we haven''t
    got any hazard pay, especially those nurses. And I just don''tthink it''s right. It''s something that union continues
    to fight for. And we''ve gone through our grievance process and now we''re on our arbitration process. But I do want to
    recognize that group has really taken the brunt of this burden. And I think it''s very unrecognized.'
- speaker: Respondent
  text: 'CONOR 01:07:46: Thank you. That was one thing I meant to ask you about hazard pay and I missed it. Thank you so much
    for covering that.'
- speaker: Respondent
  text: 'CONOR 01:07:54: Well, thank you so much for making time to be interviewed. If you don''thave any other, anything
    to add and you feel like we''ve covered everything, I wanted to thank you so much for'
- speaker: Respondent
  text: Working in the Time of COVID-19 Oral History Project | Kathryn "Katy" Brehe of SEIU 1199 your time. And if it's okay
