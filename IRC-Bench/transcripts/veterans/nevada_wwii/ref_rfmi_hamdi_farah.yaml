collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Interviewer
  text: Okay, so we're here in Syracuse with Hamdi Farah, and she will share her settlement story. Thank you so much for your
    time and your willingness to share with us a part of your life if you want.
- speaker: Respondent
  text: Okay, so like, when I was, when I was a kid in the camp, I didn't like really thought of it much about it. Like, to
    me, that was the only world that I knew. I didn't have TV to see the other side of the world. I didn't have other girls
    to like, look up to that were in school, or that were - what's it called - motivated about working and making living for
    themselves. Like, I was just a kid who wakes up. We did have food. I never like slept hungry. But like, it didn't have
    opportunities. And we were dependent on what my father makes and brings, and what my uncle makes and brings for our family.
    It was...it was like, we didn't have like streets and stuff. We had like sand. I don't know what they call like the street
    floor over here outside. Yeah, we didn't have pavements, we had sand. We didn't have like floors, we had like houses that's
    just built on the floor. I mean, like, we didn't have stairs and stuff. To me, like at that time, like that was the best
    life I could have. I had friends, I had my grandma, I had my uncle, I had my whole family around me. I was raised with
    so much love. So I didn't really thought that I was missing much about the world. I was living my best life. And I just
    thought that you know, it was just me. And you know, I have everything I could ever ask for. And the camp that I lived
    in, I lived in like where there was like a lot of Somali people there. And there wasn't like other kinds of like other
    people from other countries. So I like I was seeing white people. I will see different people for example, white. And
    like it used to fascinate me but like I did not used to see a lot of the Kenyans cause they lived in the cities and stuff.
    I didn't see like other people from like other countries. I never like saw Asian people. I didn't saw any Arab Muslims,
    like I just thought like, you know, at that time, I felt like we were the only Muslim existing people. I mean, it's kind
    of weird, but yeah, that's just what I saw. And that's just what I believed in. I wasn't attending school as well, like
    I would, my grandma would force me to go to like school and I would pretend for like two days and then I would stop attending.
    So yeah, that was, that's what I remember.
- speaker: Interviewer
  text: So I just want to understand something better. You said you felt it was best life without TV and video games?
- speaker: Respondent
  text: Yeah, like, without TV without games. Like there wasn't like nothing to like waste my time at and like people be like,
    "Oh,
- speaker: Interviewer
  text: Did you know that it exists?
- speaker: Respondent
  text: No, I didn't...I mean I did. But like I did knew that there was such a thing as TV because we had, they, in the camp,
    they had like a movie theater. It wasn't like compared to America, the ones that we have now. But there was such a thing
    as a movie theater. But as a young girl you're not allowed to attend especially as a girl as a Muslim. You're not allowed
    to attend movie theaters, because it's usually like a bunch of boys watching soccer games or like watching movies that
    are translated into Somali so like, I would get a peep of it, but like, it wasn't nothing that you know, I was asking
    for, like, it was like, I need to watch this, I need to watch that. It was nothing like that.
- speaker: Interviewer
  text: Okay, so it wasn't allowed by family?
- speaker: Respondent
  text: It wasn't allowed by family; it was taboo. Like you won't see girls around the movie theater.
- speaker: Respondent
  text: Because like, it's just like, you know, there's a bunch of guys there. It just looked at, I don't know how to say
    like, it was kind of embarrassment. Yeah. So like, we weren't, like I wasn't allowed to, like, be around that area at
    all. And I had uncles, so they're, like, make you...they're like, "You can't be there." And I wasn't actually interested
    in it. Maybe it's because I wasn't exposed to it either. So and, like, I get people that come to, that come up to me,
    and it's like, "Oh, my God, you lived in a camp" and it must have been this and that, and it's like, not really, because
    to me, like, at that time, that was what I was exposed to. So it was the best for me, like I had a good childhood. Maybe
    if I go back, and I have to live there. I think it would be completely different.
- speaker: Interviewer
  text: Now, when you experience life in America
- speaker: Respondent
  text: Yeah, now that I experience life in America or like, now that I've seen the other side of the world, it would be completely
    different.
- speaker: Interviewer
  text: So you mentioned nine kids, right?
- speaker: Respondent
  text: Yeah, we were nine kids. Now we're eleven kids. But back when I lived in Kenya, and I was the third oldest, but I
    was raised with my grandma. And my mother, I remember in like 2006, she started the process of like, applying to come
    to America and stuff. And I used to live with my grandma. But my dad was like, my mother wanted to leave me with there
    cause she took me when I was like, really young. And she said, I'll raise her, I'll take care of her. And my mom wanted
    me to leave with my grandma. But my dad was like, "I don't want to leave any child behind. I want all my childrens to
    have the same opportunities, since she's already hard headed and not going to school. I think she'll give her grandma
    a really hard time. So I think it's best that we take her with us." So that's how I was able to come to America, but there
    was also slightly chances that I could have stayed with my grandma and stayed back in the camp.
- speaker: Interviewer
  text: Okay. So do you remember how that process was of applying and then
- speaker: Respondent
  text: Little bit. Okay. So I remember it that, I just remember that my mom would be like, "Oh, we have an interview; we
    gotta go to sleep early" and stuff like that. And we would wake up in the morning, we would take, we would take a bus.
    It was a couple of minutes away. Like it wasn't an hour, it was like a 45 minute like a 15 minute away. And it would be
    like so much questions for my mom. Like they'll take her to a room. They didn't really ask me much, maybe because I was
    young. But yeah, that's about that's what I remember. And my mom used to like cook food at night and prepare food, because
    it will be like a whole day thing. Like literally the whole day - God - like we will leave early in the morning and come
    back like around sunset. So yeah, that's
- speaker: Interviewer
  text: Okay and anyone have that same opportunity to apply in camp or it was selective, somehow, or was it any limitations
    who can apply?
- speaker: Respondent
  text: I think it was anyone. Anyone could apply to the camp. So I remember we, there was this family that I used to live
    next to, and they had this they were applying with us and we used to go to the same interviews and everything. And at
    the end we were chosen to come and they were not and they still live in the camp. So yeah, that's pretty sad. But I think
    it's anyone that's not a citizen of Kenya could apply.
- speaker: Interviewer
  text: Okay. And what is approximate time do people stay in camp?
- speaker: Respondent
  text: Okay, so my mother came to the camp in like 1991, 1992. She came here when she was like, a really young person, like
    she was like 13 years old, and then she lived there until 2009 until we were able to come to America. There were friends
    that came with her. And there were people that she ran away with from Somalia that came to the camp with her and they
    still live there till this day. Yeah. So it's like you don't have nowhere to go to. You just kind of stuck there.
