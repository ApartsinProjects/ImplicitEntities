- speaker: Interviewer
  text: ': What is your name? : My name is Gen Goto. : Where were you born? I was born in Fukushima Prefecture.'
- speaker: Interviewer
  text: ': When were you born? I was born in 1899. I am 76 years old now. : What did your father do in Japan?'
- speaker: Respondent
  text: I was born in February, and father came to America in July of that year. Before I graduated from junior high school
    mother came to America by a ship to join her husband. She was separated from father for 13 years. I went to Tokyo to attend
    Iwakuni Railroad School, but as that school was not recognized by the Mtnistry of Education I could not go to a higher
    school, so I attended a high school. When I graduated from high school and was thinking about going to college, my father's
    farming partner came back to Japan
- speaker: Interviewer
  text: 'and asked me to come to America. That is how I came to America. : How old were you then? : I was 18 years old.'
- speaker: Interviewer
  text: ': How was the life in Japan without your father? I was 5 months old when he left home so I did not know his face,'
- speaker: Respondent
  text: but my grandparents took good care of me, so the life was good.
- speaker: Interviewer
  text: What kind of a person was your mother?
- speaker: Respondent
  text: She was such a model woman that she was written up in the newspaper. What did the newspaper write about her? She was
    a virtuour woman who took good care of her in laws, and also worked tike a man in the field as grandfather was old. When
    her story came out in the paper, our neighbor send a copy to my father, In those days many Isseis in America gambled,
    and so did my father, but when he read that paper he thought he was wrong, and he quit gambling right away. I heard that
    it is hard to quit gambling, but as my father quit it completely I admire him for that. I came to America not to farm
    but to study. When I went to school they put me in the 4th grade of a grade school. I had
- speaker: Respondent
  text: studied calculus in Japan, but as girls said, "NO talk, no talk" to me I got angry and quit school after 5 days. It
    was the time
- speaker: Respondent
  text: the World War started and the business was getting brisk, so I thought I would make a fortune and started working
    as my father's
- speaker: Respondent
  text: ': Was your mother a gentle person? She was a stouthearted woman. I was an only child but she did not spoil me. Neighbors
    used to say, "Oshin-san, why don''t you treat'
- speaker: Respondent
  text: Kenchan km with more love." But my grandparents spoit me. When mother came to America 4 children were born in 4 years
    one after another. I thought my parents were doing well in America, but with 4 children and father changing land he leased
    year after year it was not easy.
- speaker: Respondent
  text: Yet they kept on sending me school expenses. I still shed tears of gratitude when I think about that. I thought my
    parents made
- speaker: Respondent
  text: good money in America, so I thought nothing about my parents sending me school expenses, but when I came here I was
    thankful
- speaker: Respondent
  text: 'to them for the first time. : Your father was a man of strong character, too, wasn''t he? : He was a very scroupulous
    and.fastidious man. I did not want'
- speaker: Respondent
  text: to farm but father forced me to do it, so it was very hard. In those days there were many yobiyose youth like me.
    As there was not much parental a ffectaon, 7 Or 8 out of 10 youths left
- speaker: Interviewer
  text: ': Where did you get on board the ship to come to America? From Yokohama. In those days there were strict examinations
    of'
- speaker: Respondent
  text: Trachoma and roundworms. I had Trachoma before, so I failed the examination twice. If I failed one more time I was
    going to give
- speaker: Interviewer
  text: 'up coming to America, but I passed. I came to San Francisco on : Do you remember things that happened on board the
    ship?'
- speaker: Respondent
  text: ': Nothing much but I remember landing ,. Hawaii and bought banana. As banana was cheap another young man and I bought
    a big bunch'
- speaker: Respondent
  text: of banana, took them back to the ship and ate them all before we arrived at San Francisco. I drank soda water for
    the first time in Honolulu. I cannot forget how good it tasted. When I was a student a bowl of noodle was 2 sen but I
    could not afford it, so
- speaker: Interviewer
  text: I bought 1 sen worth of baked potatoe and shared it with friends What kind of people were on board the ship?
- speaker: Respondent
  text: There were many yobiyose people.
- speaker: Interviewer
  text: Were there many brides on board the ship?
- speaker: Respondent
  text: ': Yes, there were some. I came to Madera in 1920. In 1921 the picture brides could not come here any more, so my
    father told me to go back to Japan to find a bride. In those days there were Nisei women of marrying age but they were
    not suitable for us. We'
- speaker: Respondent
  text: could stay in Japan only 2 weeks and had to find brides during that time. As I could not find one I was disappointed
    and was coming back when I found one. When I was coming back with my wife,
- speaker: Interviewer
  text: 'Yokohama was full of young couples. : You married quite young, didn''t you? :; I was not going to get married until
    I was 30, but I married at 25.'
- speaker: Respondent
  text: ': What year did you come to America? Who found a bride for you in Japan? : My grandmother did. : When you met your
    father for the first time in San Francisco, did'
- speaker: Respondent
  text: you recognize him rent way? IT had seen his photograph before so I could recognize him. Later my father told me that
    when he took me a rouds san Francisco Signtseeing, I was not a bit impressed. As I lived in Tokyo, Marunouchi district
    was not much different from San Francisco
- speaker: Respondent
  text: so I was not surprised. My father used to tell his friends, "I showed my son around San Francisco thinking he would
    like it,
- speaker: Interviewer
  text: 'but he was not impressed." : Did you call your husband, "Otosan" (Dad) then? : I called him "Otosan"" but not with
    affection. I don''tthink we'
- speaker: Respondent
  text: should send away our children. In those days many Isseis sent their children back to Japan to get Japanese education.
    Dzgctor Okonogi of Fresno used to tell me, "People send their children
- speaker: Respondent
  text: to Japan, but that is out of the question. They may become great, but there is nothing worse than losing affection
    between parents
- speaker: Respondent
  text: and children, so don'tsend your childen to Japan." As the years went felt go by we feei more affection towards the
    parents.
- speaker: Interviewer
  text: ': When you came to America, where did you go first? : I went to Selma first. Father was leasing land there, but as
    he'
- speaker: Respondent
  text: did not good results there we moved to Parlier. Grape and peach. At Parlier he farmed 80 acres. When the World War
    I broke out he made profit. In those days we could not buy
- speaker: Respondent
  text: land because of the anti-Japanese land act, but he took all kinds of measures to evade the law and bought the land
    here. Many Japanese
- speaker: Interviewer
  text: came to Madera in 1918 and 1919. Did you come here then? We came here in 1920. How many acres did you buy?
- speaker: Respondent
  text: Mr. Ishizaki and my father bought 100 acres as partners. There was no trouble for 7 years. but as children were growing
    older they decided to divide the land in two to a void any trouble in the future, and each got 50 acres. Then the Depression
    came. Our side was all right as we had grape and my brothers helped, but
- speaker: Respondent
  text: Mr. Ishizaki could not manage it so he was going to abandon the land. If he abandon the land we had to abandon the
    land or take
- speaker: Respondent
  text: over his land as there was one deed. One night our whole family got together and discussed what to do. With tears
    in his eyes my father said, "I came here after experiencing hardship in Hawaii,
- speaker: Respondent
  text: and built it up to what it is today. If we abandon this land I came to America for nothing. I am going to turn back
    the clock
- speaker: Respondent
  text: 10 years and try hard, so I want you to hold out." My brothers and sisters all a greed to do so, and gradually things
    got better.
- speaker: Interviewer
  text: Didn't you have a hard time during the Depression?
- speaker: Respondent
  text: ': Of course. Many people sold their land and moved to Los Angeles area as they could not make a living. We planted
    the grape saying, "Grape cost at least 3.5 cents a pound. We hope it will not go under 3 cents. If it is 3 cents we can
    barely manage to live.'
- speaker: Respondent
  text: The price of the grape tumbled down to 35 dollara a ton at the lowest time. We could make a living because we did
    not hire people,
- speaker: Respondent
  text: but if we hired people we could not have made it. My brothers used to go to work as soon as they came home from school.
- speaker: Interviewer
  text: What was growing on the other half of the land?
- speaker: Respondent
  text: 'and A: They had grape and a ppricot and other small things, The soil was not too good, so we put higher price on
    this half. We drew lots in front of a lawyer to decide which half to get, so there was no complaint. Most partners quarrelled
    and split, but we were partners'
- speaker: Respondent
  text: for 7 years and we did not quarred and split. We are still associating with each other.
- speaker: Interviewer
  text: 'What other problems were there besides the price of grape dropped? A: I could not make a living with grape, so I
    grew vegetables and took them to the market for 4 years.One brother went to U.C. Berkeley,'
- speaker: Respondent
  text: and the other brother helped, so I gave him half of the land. We could not make a living on grape ao we grew vegetables
    for 4 years. I picked vegetables and took them to the market at midnight. In summer we were stung my mosquitoes. If we
    could not sell all the vegetables I went around stores im Fresno selling the left overs. Women were not in good mood if
    we didn'tsell all, but they were in good mood if we sold all the vegetables. After I slept for about an hour it was time
    to get vegetables ready for the market.
- speaker: Respondent
  text: I did this for 4 years. When I think back on that time I am amazed how I could do that.
- speaker: Interviewer
  text: 'What kind of vegetables did you grow? to matoe A: Cucumber, burdock, on ion and most any kind of vegetable.'
- speaker: Interviewer
  text: ': What time did you get up in the morning? : I didn''thardly sleep. In those days people from stores came to'
- speaker: Respondent
  text: market around 1 a.em., so we had to be there before then. I stayed in the market till around 8 a.m., and if there
    were any left overs
- speaker: Respondent
  text: I went to town to sell them. Sometimes I did not get home till 2 p.m. Then I slept about an hour. Of course the market
    is closed on
- speaker: Respondent
  text: Sundays so I slept, but I had to take care of vegetables even on Sundays. Not only vegetable but I had to take care
    of grape.
- speaker: Interviewer
  text: Q:Then you didn'thardly sleep, didn't you? Yes, I am amazed at myself for working so hard as small as I am.
- speaker: Interviewer
  text: 'I was young and strong then. : How many children did you have? : I had 3 children. One son lives here and two of
    them live in Los'
- speaker: Interviewer
  text: ': Did things gradually get better? : What did you do about grape when you were growing vegetable? : I was growing
    gape, too.'
- speaker: Interviewer
  text: ': But you couldn''tsell grape, couldn''t you? : Yes, we could. At grape harvest time we did not sell much vegetable'
- speaker: Interviewer
  text: 'You couldn''tlive just on grape as the price was low, couldn''t you? A: No, we couldn''t. There were 10 people in
    my family. In those days'
- speaker: Respondent
  text: they sold rice cheap before the New Years, so we bought 20 to 30 sacks of rice for the whole year. In those days we
    ate just rice. After we went to camp we learned to eat bread and drink coffee.
- speaker: Respondent
  text: Before the war people use to give us tea and coffee as return for obituary gifts. We had a shelf full of coffee, so
    we used to give them away. Now I eat rice only for supper.
- speaker: Interviewer
  text: Things became better, didn'tthey?
- speaker: Respondent
  text: Yes, it did. In 1921 Shinwa Kai was organized in Madera, and celebrated the New Years in the storage room. In 1923
    the Japanese Language School was founded. When I was 26 years old I was recommended as one of 3 directors of Fresno Japanese
    Association.
- speaker: Respondent
  text: Three young men from Central California were recommended for the post and I was one of them.
- speaker: Interviewer
  text: 'What kind of work did you do? | took care of A: Fresno Japanese Association * the work of the consulate, such as
    death and marriage reports. Also made efforts at the time of the Land Act, and worked as a mediator if there were trouble
    a mong Japanese. Since I was 26 until the war broke out I served as a'
- speaker: Respondent
  text: direetor of the Fresno Japanese Association, president of the Shinwa Kai and principal of the Japanese Language School.
- speaker: Interviewer
  text: Were you the only director? There were two directors. What kind of work did you do as a director?
- speaker: Respondent
  text: When the anti-Japanese Land Act came up in California Assembly we needed money to lobby in order to stop the passage
    of the bill. We also needed money to hire secretaries to do the work. When some prefectures in Japan had disaster we had
    to collect money to send to them. We had to collect donations for all kinds of things. We had 3 teachers for the Japanese
    Language School. When one of them quits we had to meet and discuss what to do. Before the war I used to attend meetings
    every night.
- speaker: Interviewer
  text: 'What other work did the Japanese Association do? and A: We had to report the death, marriages as we were all Japanese
    citigens. We also had to buy land and make a Japanese cemetery. We'
- speaker: Respondent
  text: had meetings all the time, but but moreover we had to collect donation. At the time I came here Mr. Nakatsuchi was
    working hard for the Japanese Association. Whenever we saw him we used to say, "Mr. Nakatsuchi must have come to ask for
    donation again." Later
- speaker: Respondent
  text: I used to say, "You must be saying Goto must have come for donation." I don't kno how much I walked collecting donation.
    Last year I received the Sixth Order of Merit.
- speaker: Interviewer
  text: How did you feel when Pearl Harbor was attacked?
- speaker: Respondent
  text: I thought, "They did it!" Before the war started Dr. Okonogi was angry at America for not selling oil to Japan." We
    thought, "Well done!" We shouldn'thave felt that way as we owe to America, but we could not help feeling that way. Three
    days later the stand
- speaker: Respondent
  text: still order was out and it was posted on telephone poles. In May we were taken to the Assembly Center in Fresno and
    then sent to Jerome Arkansas.
- speaker: Interviewer
  text: 'What were you doing on December 7, 1941? I don''tremember what I was doing. Did you find out about the war that Sunday
    for the first time? A: I forgot, but when I found out about the attack I thought, "They did it!" and I felt good. It took
    5 days and 4 nights to go from'
- speaker: Respondent
  text: Fresno to Arkansas by a slow train. I thought the war would end in no time. When the train climbed to the top of Rocky
    Mountain I saw hundreds of people were gathered there. I found out that they were going to be trained for the winter flights.
    Then I realized that the war would last along time. America started training soldiers after the war broke out.
- speaker: Interviewer
  text: Did you think the war would not last long because you thought Japan would lose the war?
- speaker: Respondent
  text: As No, I thought Japan would win the war. I didn'tthink Japan would lose the war. I thought the Marines would run
    away, but I found out that Americans have American spirit just as Japanese have Japanese
- speaker: Interviewer
  text: What did you do with your land when you went to camp?
- speaker: Respondent
  text: I leased it to our neighbor. with the agreement that I would receive one fourth of the profit. Fortunately, he was
    a good man, but when we came back our land was confiscated due to the Land Act. After we came back from the camp I worked
    7 years to kill the Land Act, but what helped dissove the problem was the distinguished service
- speaker: Respondent
  text: of the 442 Battalion, so I am very grateful to those who died. Without them the land problem could not have been solved.
- speaker: Interviewer
  text: 'What did you do with your furnitures and belongings? A: I put in one room and Mexicans were living here, and a white
    man was taking care of my ranch. I was very fortunate because he was Were everything here when you came back?'
- speaker: Respondent
  text: May be one or two items were missing. When we came back a white man asked me what we ate in the camp. I told him that
    we were given enough sugar, chicken, bacon, apple and everything else. He told me that he did not have enough sugar nor
    bacon. The camp was ran
- speaker: Respondent
  text: by the Army so we had plenty of food. I think America treated us well because there were some American citizens in
    the camp. I do not think they would have treated us that well is there were only
- speaker: Interviewer
  text: 'You were lucky, weren''t you? A: Yes, I was. When I look back on my life I am very thankful that I was very fortunate.
    My children are all getting along well with'
- speaker: Respondent
  text: each other, so I am very fortunate.
- speaker: Interviewer
  text: How did you feel when you saw the camp for the first time?
- speaker: Respondent
  text: Fresno Assembly Center was built on the Fairground where I used to go, but when we went to Arkansas thousands of carpenters
    were still building the barracks. It was as cold as in my hometown in Fukushima, but there was a big iron stove in the
    room and there were plenty of
- speaker: Respondent
  text: 'logs. Sometimes it was so hot that we cuuld not stay in the room : Did you work in the camp? s 1 did not work at
    first, but as the government let young people'
- speaker: Respondent
  text: work outside there was a shortage of workers, so they asked me to work. We were paid $16 a month, and some professional
    people received $19. They gave us clothes and overcoats. Children recieved $3.50 a month for clothing allowance. There
    was a family with about 15 children. They received a big a mount of money. Some thrifty people brought home a big check
    from the camp.
- speaker: Interviewer
  text: What kind of work did you do?
- speaker: Respondent
  text: ': I farmed but it was like playing. The soil was red and there were snakes. We grew some vegetables to eat in the
    camp and put them in sacks. We worked for a couple of hours and then we picked mushrooms and knots of trees to make all
    kinds of things. During the war Japanese in America were the luckiest. My wife had to escape from the incendiary bombs
    every night in Japan.'
- speaker: Respondent
  text: An American said, "We gave Japanese rest." That was true. Before the war we worked hard, but durhg the war we led
    easy lives. Everyday we heard false rumor that Japan was winning the war, so
- speaker: Interviewer
  text: Did someone have a shortwave radio?
- speaker: Respondent
  text: ': Everyday a friend of mine came from the far end of the camp to tell me what kind of news he heard that day. I think
    the news'
- speaker: Respondent
  text: 'came from Brazil or so mewhere in South America. : Were there many happenings in the camp? : Yes, there were. First
    of all we were asked which side we would'
- speaker: Respondent
  text: be loyal to, Japan or America. There were two Buddhist priests in Jerome who were loyal to Japan. Every morning while
    it was still dark they ran around the camp wearing headbands and shouting. I did not go out to see but I heard that they
    did calisthenics and shouted, "Banzai". My partner Mr. Ishizaki was in that group. Those who created disturbance were
    sent to Tule Lake. Mr. Ishizaki came to me and told me that he was going to Tule Lake to render devoted service to Japan.
    When I asked him, "How can you render devoted service to Japan in Tule Lake?" he could not answer me. I said to him, "We
    are living in luxury here although we are enenmy a liens. I don'tthink the war will last long, so why don't you sit tight
    and waithere," He then said he would cancel his transfer to Tule Lake. Next morning on his office to cancell his transfer
    he met a friend who asked him where he was going. When Mr. Ishizaki told him that he decided not to go to Tule Lake as
- speaker: Interviewer
  text: 'T ''talked him out of it, his: friend said, "That is: out of the question. Aren''t you a Japanese?" Mr. Ishizaki
    was a timid man'
- speaker: Respondent
  text: so he went to Japan.
- speaker: Interviewer
  text: Did he go to Japan on an exchange ship?
- speaker: Respondent
  text: ': He sent his wife and children back to Japan, and he came back here as he had the land here. He told me that he
    had rendered service to Japan and came back, but what he did was creating disturbance revolting against America. I was
    very angry and wanted to tell him'
- speaker: Respondent
  text: off but I didn't as he was a timid man. He told me that his wife went to Japan on an exchange ship but transfered
    to a Japanese ship
- speaker: Respondent
  text: on the way. They thought Japan had won the war. Mr. Ishizaki's sons also went to Japan. When they went to Yokohama
    they were served steamed barley but they could not eat it. They did not eat for 3 days but they became hungry so they
    ate it. At that time
- speaker: Respondent
  text: they realized that Japan had lost the war. They all came back here after all. Mr. Ishizaki wrote to me saying, "I
    want to go back to America, but I am afraid people in Madera will laugh at me." I wrote back to him saying, "During the
    war everybody in the camp was out of his mind although they did not think so. You are a
- speaker: Respondent
  text: 'a good man so poeple in Madera will not laugh at you. Come back : Were you asked if you wold be loyal to America
    or not in the camp? : I don''tremember, but that question caused trouble. Some people said we should be loyal to Japan
    and others said since we live in this country why don''t we say we would be loyal to America. I'
- speaker: Respondent
  text: 'think I was in the latter group. : What did you think about Niseis going into military service? : At first some young
    men volunteered for service, but since then young men were drafted little by little, and my son was drafted,'
- speaker: Respondent
  text: 'too. When he got on board a ship in Maryland the war ended. : That was the time before the 442nd Bn. did distinguished
    service,'
- speaker: Respondent
  text: ': We did not know the existance of such battalion. If we mentioned about volunteering we would have been beaten up,
    so Nisei leaders'
- speaker: Interviewer
  text: ': Your sons were were not of draft age, weren''tthey? : One of my sons was drafted. When the boys were drafted into
    service'
- speaker: Respondent
  text: we held send-off parties in the camp. I could not help crying when I thought how their parents felt sending their
    sons from the camp.
- speaker: Interviewer
  text: 'Niseis are American citizens, aren''tthey? : Yes, that is true. They are citizens so it is natural that they go'
- speaker: Respondent
  text: to war, and the parents had te let them go. That is Bushido. We in cried, those occasions, but after a while we forgot
    the sorrow
- speaker: Respondent
  text: and we gathered and passed.the time chatting. We did nothing for 4 years. When we went into the camp we were not allowed
    to take long knoves nor money. Three days after we came home, a big truck brought us all the things my father made with
    tree knots and boxes he made
- speaker: Respondent
  text: in the camp free of charge. I was moved by the greatness of thés country. I went back to Japan six times after the
    war and told
- speaker: Respondent
  text: young people that it was good that Japan lost the war to America, had because if it,lost the war to Russia the country
    would have been
- speaker: Interviewer
  text: 'divided into two like Korea. : Do you have any other recollection of the life in the camp? : I don''thave much recollection.
    I just led an easy life.'
- speaker: Respondent
  text: ': Don''t you like to go fishing? : When I was little in Japan there wasn''tanything to do so fishing was the only
    thing I did. I cuaght loach, carp and other fish. Before the dam was built I could catch a and Dass. 1 dorm t'
- speaker: Respondent
  text: know how many thousand of fish I killed. Since then I decided to In olden days when a horse walked slowly in summertime,
    I used to whip the horse shouting, "Giddy up! Giddy up!". Then the hose looked at me with a reproachful eyes. When I think
    about it I don'tthink I can go to heaven but will go to hell. Looking back, I think I did cruel things. People ask me
    to go fishing but I
- speaker: Respondent
  text: 'don''t go. I do not tell them why I would not go. : Did you come back here straight from the camp? : Yes, I did.
    The lease of the land was going to expire on November l.'
- speaker: Respondent
  text: My landlord told me that he would get the Mexicans out so come back by November 1. As I was the last one to come back,
    other Americans
- speaker: Interviewer
  text: 'seemed to have said Goto could not come back. I came back by Nov. l. : Did you come back after the war ended?'
- speaker: Respondent
  text: ': Yes, I did. I was fortunate to have a good landlord. I don''tknow how the future will be, but looking back, I had
    a very good life.'
- speaker: Interviewer
  text: ': Did the land belong to you? : Didn''t you pay off the loan yet? : No, not yet. In those days the interest of the
    Federal Loan was'
- speaker: Respondent
  text: only 3% for 20 years. Now we have bought 80 acres here, and my brother bought 80 acres, so we own 160 acres.
- speaker: Respondent
  text: Was the Land Act enacted? I think the land bought before 1913 was all right. Since then the Anti-Japanese Land Act
    was established. When we came back some lawyers said that the parents cannot live with the child in whose name the land
    belonged. At first we established a land
- speaker: Respondent
  text: corporation with two white people and Mr. Ishizaki. Then we had to hold a meeting every month in fromt of a lawyer,
    so it was too much trouble. After that we borrowed names of Niseis who had American citizenship. Meanwhile, my brother
    who is a citizen became of age so we put the land in his name, and then my son's
- speaker: Interviewer
  text: 'Was there any problem when you came back? : Two families had their land confiscated. : Was your land confiscated,
    too? : No, not then but the following time oursand and two other people''s'
- speaker: Respondent
  text: 'land were going to be confiscated but I compromised by paying. much money..: However, the money was refunded later.
    There was Oyama case.'
- speaker: Respondent
  text: Then we worked hard for 7 years to kill the Land Act spending a lot of money, and finally we won so now we can sell
    or buy land.
- speaker: Interviewer
  text: 'Did you work to kill the Land Act with people in Stockton, too? : Yes, all the Japanese in America worked towards
    it. Mr. Koda was Did Mr. Asano of San Francisco work for it, too?'
- speaker: Respondent
  text: Yes, he did. He was a great man. Japanese sce plabattes a newspaper but we could not start it as we did not have money,
    so they sold bonds. Mr. Asano came to my house so I bought $500 worth of bonds. With the money from the sale of bonds
    Mr. Asano started the Nichi-Bei newspaper after the war. I still get 4% interest as it is the law.
- speaker: Interviewer
  text: Did things became better after you won victory over the Land Act? Yes. As we won I acquired the American citizenship.
    Did you experience any hardship after you came back?
- speaker: Respondent
  text: No, we didn't. The work was good, grape was good, and workers were good. Before the war I bought a new car. My lawyer
    told me to store it in a garage as it is too good to sell. After I came back I took it out of the garage and drove it
    around. I was stopped 3 times, not by traffic police but by private citizens who asked, "You have a nice car. Won't you
    sell it to me?" Nobody had a nice car like mine in those days.
- speaker: Interviewer
  text: 'Looking back, when was the hardest time for you? A: It was when my former wife died of cancer. When my father and'
- speaker: Respondent
  text: mother were ill for along time, my present wife took care of them.
- speaker: Interviewer
  text: 'When was that? A: It was 13 years ago. My wife took care of both of them. The period I was growing vegetables was
    plesant rather than hard.'
- speaker: Respondent
  text: At that time it was hard but when I look back it makes me smile. After my parents passed away my wife became nervous
    for about 3 years.
- speaker: Interviewer
  text: 'She was exhausted from taking care of the sick, wasn''t she? A: She went to a psychiatrist who asked her life story.
    She is a very unfortunate woman. Her father died when she was 3, and her mother remarried, but her husband was not a good
    man so she had a My wife hard life. had many step brothers and sisters so she took care'
- speaker: Respondent
  text: of them and hakd a hard time. That kind of thing was affecting her health.
- speaker: Interviewer
  text: 'I think spiritual hardship is worse than physical hardship. Yes, worry is the worst thing. How long have you been
    living here? A: Since 1920, so it has been 53 years. Fortunately, I went back to'
- speaker: Respondent
  text: Japan 6 times after the war.
- speaker: Interviewer
  text: As an Issei who overcame all kinds of hardships what do you want to teach young Sanseis and Yonseis?
- speaker: Respondent
  text: Japan should not forget etiquette. I tell young people that if Japanese do not ettiquette they will be the same as
    Mexicans. Now they are getting like that. Niseis are still good, but Sanseis are not the same. If I tell them such thing
    they say I am behind the times. We fought hard against anti-Japanese sentiment to own land, but I am afraid only 2 or
    3 out of 10 Sanseis would like to farm. That is my worry. One Nisei leader told me the other day that Sanseis and Yonseis
    want to become salarymen doing easy work
- speaker: Respondent
  text: but it is best to own land. Not many people in town have $100,000 in cash even though they own houses, put if you
    own 40 acres of
- speaker: Respondent
  text: grape it will be worth $100,000 and the price of land never goes down. That is why he tells Sanseis and Yonseis to
    become farmers and own land. I a gree with him, but I cannot say that because my English is not good. I am afraid Sanseis
    and Yonseis are going to leave the land. That is what I regret.
- speaker: Interviewer
  text: 'Sanseis in San Francisco have organized Kimochi Kai and working hard to serve the Isseis. G: I think it is a very
    good thing, but we don''thave thathere.'
- speaker: Respondent
  text: We don'thave the leaders here.
- speaker: Interviewer
  text: What was your impression of Isseis when you came here as a Yobiyose? I don'tthink any Issei left Japan thinking they
    would go to America to drink and gamble. Like my father, they came here with determination of making money and go back
    to Japan in 3 years. When they
- speaker: Respondent
  text: came here they were young and had friends so they could not work all the time. They played pool, drank, gambled and
    went to restaurants. They could not help doing that as they were human. I do not condemn them for gambling or doing other
    things. I admire them for bringing up Niseis and giving them education even though they gambled or drank. Before the war
    some sales women did not serve
- speaker: Respondent
  text: us when we went shopping. But when we came back they werevery good to Japanese. I think that was due to the distingusished
- speaker: Respondent
  text: service of the 442nd Battalion. I am very grateful to them. In those days women who graduated from high school came
    here as picture brides, and they had to work in the field. They could not get divorced as chiddren were born. Issel men
    who used to drink and gamble became settled down after they were married. Issei men experienced hardships, but I think
    Issei women had harder lives. They had to raise 5 to 6 children and work in the field from morning till night. At night
    they washed clothes till late. I think women's unselfish service was greater than men's. The fact that now New, we see
    many fine Niseis ,is due to Issei parents who gave them education. As we Isseis did not have education in Japan we wanted
    to give our children education. When I was the principal of a Japanese Language School I told people around here to send
    their children to school. When our children went to high school almost all Japanese sent children to high school but most
    Mexicans did not go to high school. Mexicans who owned land sent their children to high school but rest of them remained
    as farm laborers for generations
- speaker: Interviewer
  text: How did Japanese start owning land?
- speaker: Respondent
  text: :; Japanese were farm laborers at first. Then they leased land and became sharecroppers. When world War I started
    things got better
- speaker: Respondent
  text: 'so Japanese bought land with the money they saved. : Did Mexicans buy land when they made money? : They do not save
    money. Mexicans spend money as soon as they earn'
- speaker: Respondent
  text: it. When they work they complain about 3 or 5 cents more an hour, put when they go to stores they buy expensive items
    from left to right. Japanese save money for the future, but Mexicans live one
- speaker: Respondent
  text: day at a time. Sometimes they borrow money in advance. That is why they cannot own land but work as farm laborers
    for generations.
- speaker: Interviewer
  text: ': What is the difference between Japanese and Mexicans? : One is the education. The other is the custom. Japanese
    saved'
- speaker: Respondent
  text: money from olden days. They came to this country to make a furtune and go home in about 3 years, so they saved.
- speaker: Interviewer
  text: When did you decide to settle down here?
- speaker: Respondent
  text: ': After the war ended. I wanted to go back to Japan as I did not want to live here because of the anti-Japanese sentiment.
    When the war ended and Japan was defeated I heard that Japan had shortages of food, so I did not want to consume their
    food. Since then I decided to settle down here. About 8 out of 10 Japanese wanted to go back'
- speaker: Interviewer
  text: to Japan after they made a fortune. I was the the same way. Do you belong to the Buddhist Church here in Fresno?
- speaker: Interviewer
  text: ': Are you serving as an officer? : I am not a devout Buddhist, but when they start a project I am elected as a vice-chairman
    to collect donation. Did most picture marriages got along well?'
- speaker: Respondent
  text: ': I think there were one or two women who eloped with other men, but most of them around here are getting along well.'
- speaker: Respondent
  text: ': Are you glad you_@ame to America? : Yes, I do. My grammer school was a unique school in Fukushima Prefecttre. It
    was a very small school with only one teacher'
- speaker: Respondent
  text: who taught from the lst to the 6th grade. This teacher told us that he had never taught a class like ours. as there
    were many bright students in our class. One of them became a Doctor of Medicine when he was 35 years old. I was not a
    bright student
- speaker: Respondent
  text: so I wanted to become rich. When I went back to Japan I went to visit this classmate in Tokyo. His wife told me to
    go upstairs
- speaker: Respondent
  text: as he was with the patient. As I want up the squeaking stairs I thought I was better off than he was. After you lived
    in America
- speaker: Respondent
  text: 'you cannot live in Japan. I think Isseis worked hard. : Yes, we did. I think all the first immigrants had hard times.'
- speaker: Respondent
  text: We should be thankful to them. I am afraid young people will gradually lose that kind of idea. That is why a_ leader
    like you should keep the record of their footsteps.
- speaker: Interviewer
  text: Don't you think the Sanseis are spoilt?
- speaker: Respondent
  text: ': Yes, they are, but grandfather cannot say that to them as we do not want them to hate us. I decided not to say
    anything to them. Some Nisei say, "Our parents did not buy us enough toys so we buy our chil@en enough toys." I tell them
    it is good to buy toys but there is a limit. I say, "It is natural that parents want to buy toys for their children, but
    we could not afford them. Didn''t that do you good?" Qhildren nowadays have too many toys so they'
- speaker: Respondent
  text: throw them around and they are spoilt. They are too extravagant. In olden days we barely made a living so we could
    not afford them.
- speaker: Interviewer
  text: ': Do you think a person should experience hardships? : Yes, of course a person should experience hardships. Young
    people'
- speaker: Respondent
  text: do not understand that. If a person grows up without any care, he will not be happy because he does not know what
    gratitude is. A
- speaker: Respondent
  text: 'person should have a feeling of gratitude. : To labor and experience hardships will make that persan proud of'
- speaker: Respondent
  text: himself and gives him self-respect, doesn't it? Yes, that's true. In olden iyi people used to say, " The young should
    struggle with adversity." That is the truth. Nobody wants to experience hardships, but if you were put in a circunstance
    that you have to experience hardships it will make you a
- speaker: Interviewer
  text: ': About how many Japanese live in Madera now? : I think there are about 40 families. : About how many people were
    there before the Depression?'
- speaker: Interviewer
  text: ': I think there were 42 or 43 families then. : Did people who left there during Depression time come back?'
- speaker: Respondent
  text: ': No, they didn''t, but some people came from other places leasing or buying land after the war. Many people from
    Sacramento and Florin area moved to Central California.'
- speaker: Interviewer
  text: 'Are there many people from Fukui Prefecture around here? : There are many people from Hiroshima Prefecture in Central
    California. There are not many people from Fukui Prefecture, aren''tthere?'
- speaker: Respondent
  text: 'Is Shinwa-.. Kai still in Madera? : Yes, it is. I think the name has been changed to Kyowa Kai or something. I took
    care of it before the war, but after the war they held a meeting to reestablish it. I told the members that Isseis are
    old now , so I want young people to run it. Then they said, "We do not have experience", so I said, "What are you talking
    about? Now that you have children, you should be able to run it." They asked me to become an adviser, so 1 served as an
    adviser for 3 years, but now I am retired from the post.'
- speaker: Interviewer
  text: 'About how many people gather - for a meeting? : About 30 to 40 people. I am glad young people are taking it seriously,
    : Was the Japanese Language School established after you came back?'
- speaker: Respondent
  text: ''' : No, because if I mention I have to do it. When I was 26 years old I became a director of the Japanese Association,
    the principal of the Japanese Language School and was associated with the Shinwa Kai. When I told what I was going to
    do Isseis never opposed me, and they donated money generously even though they were poor. But now'
- speaker: Respondent
  text: we cannot do that because Niseis are not like Isseis. What do you think is the reason for that? They are selfish and
    do not know the debt of gratitude to the society.
- speaker: Respondent
  text: I went to a man's house and asked for a donation. He said, "Mr. Goto, I feed and bring up my children, so I do not
    trouble anyone." I said, "Is that so? You send your children to a public school, don't you? Do you pay tuition for the
    school?" He answered that it is a public school. So I said, "Then you owd "your society, don't you?" He didn't say a word.
    A person who does not know
- speaker: Respondent
  text: 'the obligation to his society is no good. I think we should do whatever we can for the society. : Don''t you think
    it is to Niseis'' disadvantage to be selfish?'
- speaker: Respondent
  text: I wanted to establish a Japanese Language School after the war but I didn't, as it wauld have given me too much headache.
    If they were Isseis I would have done it, but now they are all Niseis and children are Sanseis. I would not do it as I
    am short-tempered. I always had the peace of the community in mind.
- speaker: Interviewer
  text: Were there any trouble in Madera?
- speaker: Respondent
  text: There were some trouble between individuals. Some people quarrelled after drinking at picnics. In those days there
    were trouble between
- speaker: Respondent
  text: 'Christians and Buddhists? : What kind of troubles were there? : Before I came here a pastor of a Christian church
    said something about the Emperor and the Buddhists called him an unpatriotic man. People raised an uproar as the lese-Majesty
    case of Central California and took it over to the Japanese Consul but he did not take it up. Before the war Buddhist
    priests spoke ill of Christians and'
- speaker: Respondent
  text: once in a while I heard Christian pastors speak ill of Buddhists, but after the war I did not hear anything like that.
- speaker: Interviewer
  text: When you came here were there Buddhist priests? Yes, of course. I think Rev. Asaeda came here around 1913. He
- speaker: Respondent
  text: seemed to have been a man of ability.
