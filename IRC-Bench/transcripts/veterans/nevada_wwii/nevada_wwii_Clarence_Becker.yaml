collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: Our F-10s (reconnaissance versions of B-25s) had names painted on them, and mine was the "Quivering Queen" - a brand
    new plane. In November, 1943, just two days before we were to leave, my plane had its five-man emergency life raft replaced
    with a seven-man raft, which was stowed above the bomb bay in the upper part of the left side of the fuselage. My entire
    crew plus all of our equipment and special cameras were on board for the flight across the Atlantic. At 20,000 feet over
    the Gulf just west of Fort Myers, Florida, up above an overcast, the life raft popped out and caught on the left side
    of the tail, right where the vertical and horizontal stabilizers meet. This so upset the aerodynamics that the airplane
    began to shake. I asked my navigator to give me a course back to MacDill, and we started letting down through about 7,000
    feet of overcast, with the airplane vibrating heavily.
- speaker: Respondent
  text: 'By the time we broke out of the overcast, I could see MacDill Field way off to the left, but I could also see that
    the engines were moving about a foot in their mounts and pouring black oil. I was convinced they wouldn''t be with the
    airplane when it hit the ground. Because of the noisy vibration, we did not have any communications from the cockpit to
    the people in the back, so I sent my co-pilot back and told him to make sure everybody was out of the rear before he went.
    Everybody bailed out at about twelve thousand feet - pretty high, because we didn''t know how soon the airplane would
    come apart. Once left on its own, it moved violently and actually turned in a great, wide circle. Then about fifteen hundred
    to two thousand feet from the ground, it just came apart in three pieces: the nose section; the wings and the bomb bay
    together; and the tail section.'
- speaker: Respondent
  text: My co-pilot wound up in a tree, but the rest of us landed in good shape - I got a little bruise from hitting the aircraft
    on the way out. Somebody picked me up close to where Busch Gardens is now, and we went over to the wrecked front end of
    the airplane, where I found my little "fifty-mission" crusher hat, put it on, and headed back to MacDill. I called my
    wife and said, "I'll be a little late for dinner tonight. I had to bail out of the Queen." [laughter]
- speaker: Respondent
  text: We returned from India in March, 1944, and we were sent to Salina, Kansas to train on F-13s, reconnaissance versions
    of B-29s, in early August. We really had problems with the first ones. They would overheat all four engines; the cylinder
    head temperatures would be in the red. We would go through an absolute minimum pre-flight checklist, tow the airplane
    to the end of the runway, start the engines and be airborne within a minute or two after starting the fourth engine; and
    still, all four engines would be in the danger area before we ever got off the ground. We would be flying across the wheat
    fields of Kansas at about a hundred feet, wondering, "Well, should I just leave the power on and climb, or shall I power
    back and scoot across the wheat fields?" We finally got to the point where we would just go ahead and leave the power
    on, and then when we got some altitude, throttle her back.
- speaker: Respondent
  text: We trained sixteen crews in F-13s to begin with, of which four went back to India. With eleven other crews, mine flew
    out to Saipan in November of 1944. We were flying missions over Japan, but things weren't going too well. Soon I was sent
    down to Guam, close to General Curtis LeMay's headquarters to build our squadron quarters and to organize reconnaissance
    for him. The first of General LeMay's briefings that I attended, he asked, "What's the matter with reconnaissance on Saipan?"
    He looked at my squadron commander, and my squadron commander looked at me to answer the question.
- speaker: Respondent
  text: On Saipan, we were under "Possum" Hansell, a headstrong general with whom I didn't get along very well. He had been
    considered a great planner in the Pentagon, and he liked to tell you how to do things. I told General LeMay, "General,
    I think we've got an outfit that knows its job, but right now we're being told not only what to do, but how to do it.
    And what we're being told isn't right."
- speaker: Respondent
  text: General LeMay reached in his pocket and took out a list and handed it to me and said, "Here's a list of one hundred
    cities. I want full coverage on them within seven days. You show me you can do your job, and you and I'll get along fine."
    We had them for him in five days, and I got along with him very well after that.
- speaker: Respondent
  text: I attended General LeMay's briefings to report on reconnaissance, normally meeting first in the morning with intelligence
    staff as to priorities so we'd already have planned what we were going to do the next day. We'd be taking off anywhere
    from midnight to three in the morning, so by noon we had radio reports from our airplanes using a very simple code to
    tell us whether we got target A, B, C, or D, or we didn't get anything. After General LeMay received his weather reading,
    and we gave our reconnaissance report, we left while they went into what the bombers were going to do.
- speaker: Respondent
  text: To be close to General LeMay on Guam, they put us on Harmon Field, which was a relatively short runway - maximum six
    thousand-foot runway, with a gradual three-hundred-foot climb out of this little valley. On our missions, we needed a
    longer field to take off from because we were heavily loaded. Although we carried no bombs, we did have guns and ammunition
    and three extra gasoline tanks that filled the front bomb bay to increase our range. So we used North Field (now called
    Anderson Air Force Base) at the north end of Guam, where there were two parallel ten-thousand-foot runways with about
    two hundred to three hundred feet off the end of the runway down to the water. That's where we staged in the afternoon,
    which means the crew would fly light - not be fully gassed. It was like a check flight, just a short flight over to North
    Field, every day, on every airplane. Then we would bus our crews back, put them to bed, get them up at about midnight,
    feed them, and bus them up to North Field; and they took off from there in their fully loaded and fueled airplanes.
- speaker: Respondent
  text: 'Ours were the first B-29s in sight while driving up the island highway from the docks. Everybody always wanted to
    ride in them, and we were able to give many Navy people and others a hop on these little staging flights. My Uncle Clarence
    was a Navy officer, and when his ship came to Guam I took him, his skipper, and his executive officer on one of these
    flights up to North Field. It turned out to be a profitable flight for my unit:'
- speaker: Respondent
  text: When we had first got down to Saipan, we had obtained three walk-in iceboxes from the Navy and the Seabees in trade
    for a few cases of booze. Of course, our justification was that we needed to have controlled, cool temperatures to store
    our film. That's the only excuse we could legally use for getting them, [laughter] On the flight to North Field, my uncle
    asked, "How much freezer storage space do you have?" His ship had orders to return to Pearl, and they had a fifty percent
    emergency ration that they had to leave behind. They were going to turn it over to Navy headquarters unless they could
    find someone else who had the cold storage space. We came back with sides of beef and hams and turkeys, and we wound up
    eating like kings for months, [laughter]
- speaker: Respondent
  text: Before we left the states, the officers club at our base at Smoky Hill (Salina, Kansas) gave us a check for $1,300
    - proceeds from the club's slot machines. With this, we bought three hundred dollars worth of power tools and a thousand
    dollars worth of whiskey, and took them in our bomb bays with us to Saipan. We didn't tap into them in Saipan, but when
    we went down to Guam we used the power tools to build a tent city in two weeks by setting up this little production line
    to build the foundations and the frames.
- speaker: Respondent
  text: Then the whiskey really started to come in handy. First of all, it took three cases to get us those three walk-in
    iceboxes. Then we were between the docks and the Corps of Engineers lumber yard, so trucks had to pass us leaving. Every
    time we'd start running low on lumber, we had somebody wave a bottle of booze at a lumber truck, and we'd have what we
    needed the next day. For our flight commanders, for a case of booze, we got five Frigidairs to put into our tents. And
    we had gadgets we could use for making soda water ... so it was quite a set-up. The Seabees (construction battalions),
    and the Navy seemed to control all the goodies, but we swapped our booze for the good things of life, if you will. Quid
    pro quo. [laughter]
- speaker: Respondent
  text: For every flight, there were four or five days of crew rest in between. The men needed places to relax, so we put
    up a couple of clubs. We built our enlisted club before we built the officer's club - we thought it just made good sense.
    There was a beautiful bay, where we could swim within the reefs, with lots of sand beaches and coconut trees. There weren't
    any gals, but it was still something to do. We would write letters home, go to movies - had lots of movies - and the USO
    brought in troupes with some famous entertainers.
- speaker: Respondent
  text: 'By now our unit had completely changed its role, from a strategic role in the United States to true reconnaissance,
    a tactical role. And the crews had gotten bigger. When we started in South America in 1942, flying twin-engined Beechcraft
    F-2s, we''d take a crew chief, photographer, and the pilot - just three of us. When we got into B-25s, we had a five-man
    crew. In the B-29, we had mostly eleven-man crews: we had four gunners, including a central fire control gunner, two pilots,
    a radar navigator, a flight engineer, a radio operator, and a photographer.'
- speaker: Respondent
  text: My first mission out of Saipan was flown to divert attention from our bombers. We arrived thirty minutes ahead of
    the bomber force southeast of Tokyo. At thirty-two thousand feet, we dropped chaff to confuse the enemy radar. Drawn to
    our chaff, the Japanese planes came up, and we could see they were all single-engined fighters that were stalling out
    at around thirty to thirty-one thousand feet. Japanese flak could reach us, but they didn't have many planes that could
    go to thirty-three thousand feet, and we were just a couple of thousand feet above them. Our diversion was effective,
    and the bomber force didn't have any fighter opposition till they were practically to the target. Instead, we had the
    fighters on our tails for about a hundred miles.
- speaker: Respondent
  text: We took a lot of hits on a mission where I wound up with a twenty-millimeter incendiary round in one gas tank. The
    airplane that did it was one that could stay with us at any altitude, a twin-engined fighter. He picked us up before we
    ever got to Osaka, and he closed in on us. Our gunners fired back, and he backed off. We went on with our mission to Nagoya
    and Tokyo, and were coasting out southeast of Tokyo when he made a second pass at us. We had pulled the power back considerably,
    because once we were off the coast, unless we had fighters in sight, we had to conserve fuel. All of a sudden I heard
    guns firing. Now, sometimes when we finished a mission we'd cook off around or two from our guns, but the CFC gunner called
    and said, "Captain, it's not a cook-off. Some gook is making a second pass at us." [laughter] He snuck up under us. He
    finally gave up, but not before he had hit us many times - fortunately he hadn't damaged much except the skin. He hit
    one gas tank with an incendiary round that should have blown up, but didn't. Otherwise, we would have been history [laughter].
    After we landed, we found forty or fifty holes in the airplane.
- speaker: Respondent
  text: 'My role changed: I went from being a flight commander and pilot to the one planning the operations. My job was concentrated
    on the mission, period. One of the things that was most important at the altitudes we were flying was the jet stream.
    You would have a hundred to a hundred-and-fifty mile an hour wind, almost west to east, constant, so there was a big difference
    between coming in from the west and coming in from the east. We''d plan our mission to start out heading for Kyushu, then
    climb to high altitude on a northeast heading, and then fly roughly west to east to the target. When you had to, you turned,
    and then came out southeast and gradually let down, which gave you many miles over Japan. If you had flown the mission
    from east to west, you would have had a very small portion of those miles over Japan. This way you had the opportunity
    to get three or four times as many targets photographed.'
- speaker: Respondent
  text: In the bombing campaign against Japan, the initial thrust was against industrial targets, especially airplane manufacturers.
    Our B-29s were trying to bomb from high altitude, but because of the jet stream and problems with their bombing equipment,
    we needed to bring them down lower to do the kind of damage we wanted. General LeMay brought them down to five thousand
    feet to bomb. Even though the losses were heavier, the results warranted it.
- speaker: Respondent
  text: My squadron flew pre-strike and post-strike photo reconnaissance missions - pre-strikes so the bombers would know
    where the targets were, and then follow-ups to record the results of their bombing. When we flew post-strikes, sometimes
    we went in right after the bombers. Our squadron would be over every target at least twice; often, several times more
    than that. Then the incendiary bombing campaign started the ninth of March with a raid which burned out thirteen-and-a-half
    square miles of Tokyo in one night. Several missions after that, we burned out roughly the same amount again, so by the
    end of the war about twenty-seven square miles of Tokyo had gone up in flames. After Tokyo came Nagoya, Yokohama, Osaka,
    Kobe. Those were the main population centers. We and the bombers were flying every day. Many times it would be a maximum
    strength thing; other times, against certain targets, it might be just a wing or a group from Tinian or Saipan.
- speaker: Respondent
  text: 'The first week of August, 1945, I was asked to submit the names of two crews to fly a special mission out of Tinian.
    I wasn''t told what the mission was, but I knew it must be important, because this was such an unusual request: I wasn''t
    allowed to change any of the names of the crew members, even a few days before the mission when somebody got sick. I suspected
    they were going to photograph the results of a bigger bomb, maybe a twenty-thousand pound bomb; but those crews wound
    up as trailer crews, flying over the target about fifteen minutes after the Enola Gay dropped an atomic bomb on Hiroshima.
    Another airplane flew closer to the Enola Gay, monitoring what went on with the bomb - just individuals with hand-held
    cameras.'
