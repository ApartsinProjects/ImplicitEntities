- speaker: Respondent
  text: 'We were not persecuted, but there was exclusion. I was surprised that some Japanese were not admitted to a meeting.
    But Japanese were exploited by capitalists and landlords, weren''t they? Yes, we were. The capitalists bought up lettuce
