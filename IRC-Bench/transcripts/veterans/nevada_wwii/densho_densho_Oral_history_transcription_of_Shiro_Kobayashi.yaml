- speaker: Respondent
  text: 'Most young men from Watsonville worked there. Our sons stayed ata goverment camp and commuted there to work. for
    about a year. The head man of the camp was very kind to Japanese. Where did you live in Utah? We went to Ogden, and then
    we went to Honeyville which is about 40 miles north of Ogden to work. When we arrived there, people had a welcome party
    for us. There were wells, but we could not drink the water, so we had to go to town to fetch water. As we expected such
    difficulties, my wife never complained. We became friends with neighbors. What kind of a house did you live in? It was
    an old house under a tree. Rev. Takeda visited us and stayed there, too. Was it in Brigham City? It was north of Brigham
    City. It was a small town called Bear River near Honeyville. About how many years did you live there? : We lived there
    about 3 years. > Q: Ud Sah What did you grow there? I raised sugar beets. Was it fun? I did not go there to make money;
    I just wanted to make a living, so the life was carefree. When we were there Rev. Chapman was ahe minister of a Presbyterian
    church in Ogden.after coming back from Japan. He visited us once in a while. After we came back here, he went to Salinas,
    but he came here to deliver sermons on Sundays. He was a good man. Was your wife staying in an Army camp while you were
    growing sugar beets? She was staying at the boss*shouse which we were renting. She had never labored in Japan, nor was
    she strong enough. Didn''t she work at an Army colonel''s house? That was while we were a taying near Honeyville. My wife
    went to a place 80 miles from there to conk. I lived near Honeyville with my second son. Then my son went into service,
    so I was a lone. At that time a few Christians were there, so we held meetings at a place about 10 miles north of Honeyville.
    Some churches let us hold meetings, and some didn''t. The Presbyterian church didn''t. Here, and also in Bear River, the
    Presbyterian ministers did not come, just the Methodist pastor did. As the Methodist pastor was kind to Japanese, he was
    transfered somewhere after the war.'
- speaker: Respondent
  text: 'fT: There are thoughtless people in churches; too, aren''tthere? K: Not that I criticize the Presbyterian church,
    but I regret to say there are. One more thing, when Rev. Takeda. came back here after the war, a restaurant refused to
