    In a Buddhist country Christianity is often minunderstood, and theipastors are partly to blame. because the actions of
    pastors cause misunderstanding. Q: What kind of mistakes did they make? A: Q: A: Ministers have to make a living, too.
    I know another Buddhist who -is:a:landowner near Fresno. His daughter married a Buddhist minister who was a professor
