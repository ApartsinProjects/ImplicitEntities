- speaker: Respondent
  text: When I was a student I felt home sick once and a while because I took life so easy and I was so care free, but on
    the otherhand when I stabted to feel the urge to succeed and make something of myself I stopped having any homesickness
    ,
- speaker: Interviewer
  text: What kind of suffering did you experience in getting used to American life? I didn'thave so much suffering in adjusting
    to American life. 7
- speaker: Interviewer
  text: Do you have any discrimination experience or any act of pre = judice thrown against you? I can't pin point any specific
    experience as such, but rg
- speaker: Respondent
  text: I don'trember anything special at this time. I would like to ask you about how you felt after you have settled in
