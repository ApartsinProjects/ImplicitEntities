- speaker: Respondent
  text: 'I think it was taught by God. Sanseis are a ware of being Japanese. Some high school students in Sacramento and San
    Francisco like Japanese flags. How would you feel when you see them? I would not be impressed. I don''tthink it is a good
    idea. Why? It has to be based on human love. From human point to view we say wpome people are tall, or have black hair,
    but from God''s eyes everyone is the same. To hate all the biack people because gome of them stole or were violent is
    wrong. We are Japanese, and we have our moral, but people from other countries have their moral, so we do not have to
    be proud. Q: What do you think about Sanseis learning about Japanese culture and moral such as respect and debt of gratitude?
    A: I think it is good to learn such things. Japanese virtues should not be a handoned. When President Ford visited Japan
    a while ago, he notice that Japanese are extraordinary people. Japanese virtues and customs are generally not bad. I thmnk
    it is good to kearn from it. To promote is good, but if we stress it too much, we may get a harmful effect of getting
    prejudiced. Q: Isseis experienced all kinds of hardships.. Do you think it is good for people to experience hardships?
    A: Not that because I experienced hardships, but I think it is good to experience hardship. People who had never experienced
    hardships may be wise and have something they inherited from their parents, but they lack something. Q: So, do you think
    it is necessary to experience hardship? A: I think it is good to experience hardship, or people would not have compassion
    towards others. Niseis who experienced hardships with their parents have different attitudes towards us. Those who were
    born later and went to camp just for a little while did not experience hardshops, so they are different. When we meet
    or talk with them I do not feel humanness. Niseis never walk by Isseis without saying "hellol" or something, but Sanseis
    would walk by without saying a word. I think they should recognize the contributions of older people to the society and
    to the church.'
- speaker: Respondent
  text: Young people nowadays do not know gratitude, but I hear that they are getting better. I read in a Christian newspaper
