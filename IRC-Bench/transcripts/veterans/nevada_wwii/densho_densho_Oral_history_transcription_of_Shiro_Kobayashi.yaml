- speaker: Respondent
  text: 'I think if young members of the church are not taught the fundamentals from the pastors, they will become the anguish
    of the church life. I am one of the oldest church members along with Nr. Zentaro Yamamoto and Nr. Kiguka. As a survived
    old soldier, I would like to let others know,when I have a chance, that Christians in olden days supported the church
    and were led by the church. 9: Was strawberry srowing successful? A: I started it because I thought it was a steady work.
    In those days things were not good. Even Mr. Shikuma failed at Expo time. I never was successful in strawberry growing.
    All the produce were cheap. As 1 was resigned that they were cheap, I was not surprised. I thought I would naturally be
    poor if I raised strawberry. I was satisfied s# I could make a living and give religious education to my children, so
    l did not regret for not making money. However, 1 deplored capitalism. Capitalists get richer and richer, and if they
    go bankrupt they look unconcerned. Strawberry growers risked their lives for work, but few .2became rich. Among those."
    who have been growing strawberry for many years only a few became rich:.. You. will be disappointed if you grow strawberry
    thinking that you would make a profit. We became old working, but our children, Niseis and Sanseis went to school and
    studied hard, and they went °" their own way. 1 thdink that was God''s blessing. At the time of evacuation I went to Utah
    as I did not want to be rectiricted within the pobwire fence. At first I went to Dinuba sn Central California, but as
    Japanese in Dinuba had to evacuate T went to Utah and lived freely there. Since then, my wife and my oldest son and myself
