    that Rev. Takeda was no good because of his book, "Japanese Christians and Japanese Spirit." This book caused trouble
    in Ogden, also, during the war. They said Rev. Takeda is gight wing, and people decided not to let Rev. Takeda come back
    to Watsonville. Rev. Takeda''s sermon here caused a trouble. I regret that the one who said the right thing was rejected.
    It was like that in the Presbyterian church, but not in the Methodist church. The Presbyterian church has good system
    and much money, but they should examine themselves on such points. : It has been 50 years since I came to this church,
    but during that time 7 pastors, starting from. Rev. Koga,:Sr. to Rev. Ito took care of me. Amonng the church members there
    were some who did not like the idea of : Q: Did you associate with Japanese in Utah? A: Where were only 5 or 6 Japanese
    there. I still associate with some of then. Q: Did you make friends with any Japanese who had been farming in Utah before
