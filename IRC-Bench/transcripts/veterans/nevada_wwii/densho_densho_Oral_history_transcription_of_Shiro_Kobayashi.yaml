- speaker: Respondent
  text: 'Her father went back to the country and started a branch office of a newspaper. At that time I went back to Japan.
    I think she came to America to satisfy her resentment. Yet she never uttered a word of complaint about the poverty or
    adversity. I respect her for that. I think it was due to her religious education. Most people would complain, quarrel
    or get a divoree, but my wife never complained. She is.very: fastidieus, so she does not like dirty things. She believes
    that God always prepares for us. I was 7 years older than her, but I was enlightened by my wife''s faith. This ts my true
    confession. She always relies on Jesus. I am 88 years old and she is 82. We had all kinds of hardships, but I a msthankful
    that we never quarelled but lived a carefree liv¥ei:.relying on God. I am thankful that by was God''s blessing that we
    bought graves in Watsonville. Q: A: Were you here in Watsonville in 1933? I think I was. How was it during the Depression?
    : I came here in 1929. When the Depression came, people in Watsonville had a hard time. Fortunately, I rented 9 acres
    of strawberry ranch by Mr. Shikuma''ts help and in his son Kenji''s name. I withdrew my life insurance money ta pay the
    rent, and I farmed there for 10 years. The landlord built a house for us on a hill, and we stayed there for 10 years.
    It was on a high ground where we could see Pinto Lake below us. After 5 years Mr. Kobayashi suggested us to quit, but
    my wife did not want to quit. She said that we could not make money there, but we could see the moon''s reflection on
    the lake, and could wee two moons on a moonlit night. She is an idealist and a dreamer who would not be moved by material
    or money. She did not want to move from there even though we were poor, so we stayed there for ten years. Mr. Shikuma
    and Mr. Sakata helped us in many ways, but we became penniless. In the meantime the war broke out and our youngest son
    en- Listed in the service. I thought the boys had finally grown up so they would help the family.'
- speaker: Respondent
  text: 'Our oldest son was around 20 and had started suruihe., ie second son had graduated from a college in Salinas when
    the war broke out. We sold everything except two cars and moved to Dinuba. After we stayed there for a while we had to
    evacuate from there, so we went to Utah. We stayed in Utah for 3 years and farmed there. Q: Did you suffer hardships while
    you were growing strawberry during the Depression? A: Yes, we did, but we could make a living, so I was never absent from
    church, and gave offering although it was not much. We were not the only ones who were poor, but everyone was poor. However,
    other people were sharecroppers, so by the end of the year they got their shares and could live on that. As I was on my
    own I had a hard time. By the end of each year I went to the bank with Mr. Shikuma and borrowed money and lived on it.
    I was poor a}} the time, but my wife never complained. If didn''thave enough she managed somehow. Siete OD Tell me about
    the white people during the Depression. S: In those days the Depression was at the bottom, and we raised as much money
    as we could to make a living. The whole nation was in Depression then, so there were no jobs and we feared a revolution
    might start. President Hoover established a public service then. Many young men lived together and repaired roads and
    parks, and got paid. In Watsonville, too, people had hard times, but fortunately, as strawberry growing is steady we did
    not find it difficult to make a living. Bosses like Mr. Shikuma did not mate any profit. In those days the churches were
    in financial difficulties. Church members did not have money to pay the pastor, so we paid him little at a time. As the
    offering was not enough to support the church, the elders went around the church members homes at the end of the. year
    collecting money to settle the account. Q: Ls ~) You managed to live through the Depression, didn''t you? : Yes, we managed
    to live through it without anybody moving out. Strawberry growers don''tthink about marking big profit, and nobody become
    too rich.'
- speaker: Respondent
  text: 'It is a steady work. How did you feel whan Pearl Harbor was attacked? On that day we had a worship service and Rev.
    Takeda pay a sermon. I don''tknow why, but some whitéchurch members came that day, and the church is full. Rev. Takeda*ssermon
    was from the Old Testament about a big building falling down killing many people under it. He asked whose sin caused it.
    He suggested that it was not the fault of Japanese, but it was caused by the sin of the human beings. The sermon was not
    taken well by the white people. Since then the atmosphere in Watsonville became bad, and when Rev. Takeda came back here
    after the war, the members of the white Presbyterian church would not accept him. As our church was on this side of the
    street we could not have meeting there, so a white missionary who was in Japan before came from the East and took care
    of the church. As we did not have a place to hold a worship service we asked a white Presbyterian church if we could use
    their church, but we were rejected. Later we found out that it was not the pastor but two elders did not want th rent
    the church to Japanese. We werevery disappointed, but we held our meetings upstairs of Dr. Ito''s office. I heard that
    later we rented the Salvation Army''s building for meetings. At the time of evacuation some people wnet to Denver, Imperial
    Valley or Fresno, but most people went to Poston, Arizona around July. Q: Were you at the church when you heard Peark
    Harbor was attacked? A: It was on Sunday. When we went to church we heard about Pearl Harbor, and the pastor''s sermon
    was as I described before. At that time we were not allowed to sty on one side of the street, so the pastors from Salinas
    and Monterey came and discussed what to do about it. Japanese people moved temporarily to the other side of the street.
    Couldn''t Japanese stay on the other side of the street? eo A: No Japanese oould stay on this side of the Main Street.
    Only Niseis could, but there was no pastor so they could not have a church service.'
- speaker: Interviewer
  text: 'How did you feel about the situation? A: At that time my third son who had enlisted in the Army was at Fort Ord.
    That morning he called and said that he was coming home as the war broke out. My oldest son picked him up and brought
    him home. Since I became a Christian I was against the military power. Even before that, I was a ginst the Japanese military
    which wielded power over Japanese government. In Watsonville there were quite a few Japanese right wing people. American
    authorities knew about them, and they were arrested and taken wway to detamtion camps. Before then, when my oldest son
    became 19, the right wing people came and induced him to join the Hoshi- Kai to help the Japanese Army. My son joined
    it, but later I went down and had his membership cancelled. They were all arrested except Mr. Shikuma, Mr. Sakata and
    the president of the Japanese Association. Mr. Shikuma was not arrested because he was a Christian. Mr. Sakata was taken
    ya a cation and was questioned, but when he said, "Those who stand by the sword will be destroyed by the sword", they
    let him go. Mr. Sakata was an in fluential man and donated money to Japan, so he was watched by the American authorities.
    He was questioned because he was taping the shortwave radio braodcast, but after all he was released bs he was a Christian.
    Mr. Shikuma, Mr. Sakata and Mr. Motogi were spared, but most Buddhist leaders were arrested and taken away. I thought
    Japan had made a big mistake like digging a hole to burry itself. Were you surprised? Yes, I was. Mr. Shikuma came back
    from the camp before I came back from Utah. One day when Mr. Shikuma and I wae tshopping on Main Street, the white people
    just glared at us. Not all the Americans are Christians, and some had hostility towards Japanese. When my wife went grocery
