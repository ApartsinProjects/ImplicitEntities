    I had breakfast. - ~D When I saw older Japanese worship the sun and present offerings to the gods before they had breakfast
    I thought they were devout, but I was not impressed. I considered Biaanieneas a kind of custom and not a deed of love.
    They held all kinds of meetings, and they hat enthusiasm. My mother was a devout Buddhist, but my father and the rest
    of the family members were in different to religion. I think now that all Japanese were like that because their. action
    did not from their faith, but from their custom. I think their moral was not based on their faith. 1 .:: Japanese race
    which I belong to is smart, good at making money and push others to succeed, but I think we are fundamentally wrong. :
    Did you finish highschool in Japan? I attended grade school for 8 years, and highschool for 5 years. : What kind of subjects
    did you like in highschool? I did not have any special subject that I liked, but since the members of my family are all
