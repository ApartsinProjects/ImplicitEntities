- speaker: Respondent
  text: What kind of wedding did you hold and how did you get married? I come from Buddhist family so the wedding was a Buddhist
    Style wedding , but since they do not hold in the temple it was held at my home. We had our relatives and friends over
    and held it there, |
- speaker: Interviewer
  text: Do you have any idea about Picture marriage? No, I don'thave any idea, Can you tell us about you home sickness after
