- speaker: Respondent
  text: 'I did not come to America to become rich, but as I was going to study in America, I took a passport good for staying
    in America for 9 years. At that time I came to America to study, but once I came here it was not so easy. I was young
    compared to other Japanese men in America. Q: How old were you then? A: I was 19. There werevery few young men. The passage
    of immigrants was prohibited, and we were the last ones. When I came to America most Japanese men were young. FB) : What
    year did you come here? A: In 1907, the year after the big earthquake in San Francisco. At that time Q: What kind of a
    country did you think America was? A: I thought Am@rica was a very nice country. It should be, because there ware no automobiles
    like today, and the tempo of the society was not fast. There were no big factories to pollute the air, and the people
    were not in a hurry. In those days we went places on : < 4 '' : he buggies or carraages dwn by big fine horses like in
    Europe. as In the cities people were not in a hurry, but they walked leisurely. There fas no struggle for existence as
    in today. There might have been a little exclusion of foreigners, but we did not feel it, so I thought America was a wonderful
    place, and I was not sorry I came to America. : What was your opinion on. America before you left Japan? I came to America
    thinking it was a nice place because I read various books which encouraged people to go to America. They described about
    the leisurely life in America and its wide open space. When I read the stories and looked at the pictures I thought it
    was a nice spacious place compared to small, crowded Japan. I came to America where 1 longed to come. During 70 years
    I lived in America I missed a chance to go +oschool because all the Japanese trying to make money went into farming, so
    I decided to go into farming. That year I travelled from Canada to Los Angeles working my way, and trying to find out
    where I shauld farm, and finally settled at Brawley in Imperial Valley.'
- speaker: Respondent
  text: 'I could farm there without much capital, so I started farming there and farmed for 9 years. : Where is Brawley? It
    igs in Imperial Valley. I spent the prime of my life farming In a wav in Imperial Valley. , iti:might have been a mistake
    in my life. Jo Q: Why was it? I could not make money. In my eighth year of farming there, a Christian church was opened
    there for the first time. The pastor was Rev. Arima who was studying some other course at the University of California
    in Los Angeles, but by the influence of his teacher he changed his mind and became a pastor. Rev. Arima came to a place
    where there was no Christians and opened a church. A few years later I was led there and was baptized by Bishop Hiraiwa
    of the Methodist church. Since then my idea has changed, and I started to walk on the right path. : Going back, what kind
    of passengers were there on the ship? : When I came here most of the passengers were young men. The ones who were in the
    same cabin all had highschool education. There were some passengers who were going back to America, or who were going
    there as immigrants. We held speech meetings on board the ship, and young men spoke eloquently, but there were no speeches
    on Christianity. My memory is not too good, but at that time a young man talked big saying that he was going to tread
    down all h8 states. My roommate talked about his true hope. He stayed in Vancouver with me for a while, and later became
    a newspaper man. He went back to Japan, attended Waseda University and became a journalist. : Were there any women passengers?
    There werevery féw women. I hardly remember any woman on board the ship. I don''tthink there were any because yobiyose
    by picture marriage was over by then. Q: Was it before the great earthquake? A: It was after the earthquake. : Where did
    the ship arrive at? Tt arrived at Victoria, where the physical examination was not too strict. We landed at Victoria,
