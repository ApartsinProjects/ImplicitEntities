    from Monterey every Sunday and helped us. I was sorry we could give him only the busfare. In the meantime Rev. Howard
    Toriumi came to our church. Q e e What kind of work did you do after you came home? When 3i:-came back local people would
    not give ns jobs I was not the only one, but nobody could get any job. In the meantime we heard that a German in Santa
