- speaker: Respondent
  text: 'What kind of contributions did you make during WWI? As You mean WWI? Q: Yes, during WWI. A: Well, I don''tremember
    anything about that. Q: Do you remember anything about segregated schools? nv When I came to Watsonville, there were segregated
    schools, but soon they were together and became integrated schools, Q: When did you come into santuet with Christianity?
    As In 1920, I was farming then, we came in contact with a minister whose name was Reverend Arima, He had a small office,
    He was operating from there to a vandalized area, There was a man who was called Hiraura Kantoku and I was baptized from
    him, Q: Now, I would like to ask you about the Depression period, What kind of hardship did you experience during the
    Depression period? As At that time, I had just come to Watsonville and had begun farming there, At that time, farm products''
    prices went down, and I remember a time when I didinot have a feeling of restfulness,'
- speaker: Respondent
  text: 'When did you decide to stay here permanently? A: Soon after I came to the United States, I began to feel that I should
    stay here permanently. Q: Now I would like to ask you about your experiences during WWII, What kind of attitudes did whites
    have toward Japanese? As Well, there were not that many harsh things. There were not too many harsh events against Japanese
    because we were called the enemy race, and were looked at through the corner of people''s eyes and we felt isolated, Q:
    When Japan attacked Pearl Harbor, what did you think first of all? ." How did you feel? A: At that time, we were in Watsonville
    when that attack took place. We were at the church, after the service, | A huge event had taken place and we worried a
    lot, From the point of Christian faith, Japan did something wrong. Because they say when you stand by the sword, you die
    by the sword, And the surprise attack against Pearl Harbor was not a good thing, I thought. And my predecessors and the
    people I respected all said the same thing at the meeting places, Q: How did you come to know the notice of relocation?
    What were you doing at that time? As At that time, I was farming and I got. to know about the relocation when I went to
    church, Q: When you got to know about the evacuation, how did you feel about the coming events? A: Well, I was not shocked
    by the news at all, Q: How did you go to the assembly centers and the relocation camps? As We had relatives in the middle
    of California, so we evacuated voluntarily, Q: How did your white friends feel about this? A: TI saw in their eyes very
    complex things, but I also saw, "Boy, you people brought upon us a huge event." Q: How did you take care of your house,
    possessions, and businesses? As We sold all the furniture and other things. Q: How old were your children when you evacuated?
    A: TI have three children and the first one was a young man already, fhe second one had graduated from high school and
    they were now legally ready to buy land so we were looking forward to this time, But then it wa quite a shock that we
    were not able to do these things as we had planned,'
- speaker: Respondent
  text: 'How did white churches react to this evacuation? At There was no direct attack from white churches to Japanese people.
    The one thing I regret is our church was located on the other side of the street that was blocked out, so we could not
    go to church and hold worship there, And we asked the churches to do something about this, but we were refused and though
    these people were also Presbyterian, they could not help us and we werevery angry about this, Q:. I will ask you now about
    assembly centers and relocation centers, To which a ssemby and relocation centers did you go? As Because I ak Goluatace
    evacuee, I did not have to go to a relocation camp or an assembly center, Qy What did you think about the problem of loyalty?
    A: TI did not know too much about the loyalty problems but as we watched from outside, we felt very sorry for these people,
    Q: What did you think about Niseis volunteering for the army? A: Well, those of us who were American citizens, it was
    a natural thing to go into the army. | Q: What kind of entertainments, hobbies and enjoyments did you have in the camp?
    As Well, I did not have anything to talk about, Q¥ Now I would like to ask you a question of resettlement, reconstuction
    after the war, When did you come back to this area? A: The year after the end of the war we came back to Watsonville,
    When we came back to Watsonville, our Christian, friend Mr, Sakuma found us a house to live in, We borrowed this house,
    Q: When you left this area, where did you go first? } y''s é : 10 As We went to binuba first. The Pinubaspeople had to
    move out also, so we went to Ogden, Utah. Q: What was the reason you moved out of here voluntarily? A: The main reason
    was that I did not want to be cooped up, I wanted to have the freedom to move around, I didn*twant to be put behind barbed
    wire, Q: What kind of job did you find? As I found farming ta do with daikon, Q: Do you remember anything about a hostile
    period when you came back? As No, Q: What kind of help did white citizens provide for you? A: I''m sorry to say, even
    Presbyterians, Presbyterian churches, ministers. and congregations did not really welcome us back, But the methodist minister
    and congregation werevvery kind to us, They allowed us to worship there, Q: How did Japanese churches reconstruct themselves?
    A: Are you talking about Watsonville churches? When the church members game back to Watsonville, there werevery few people
    so we got together and worshiped together, That was the beginning of the reconstruction of the Watsonville churches, Q:
    How was the attitude of whites toward you after the war? As The things that we felt most after we came back to Watsonville,
    was that their attitude toward us was very cold and that was the most prominent thing that we felt, For in stance, when
    we tried to find jobs with our friends, they did not give us any jobs. The only persons who would provide jobs for us
    were Italians and Germans but not other people.'
- speaker: Respondent
  text: 'How was the process of education of your children? A: My attitude was that they had to become Americans, and I had
    to raise them with a religious education, so I was very eager and enthusiastic about the church, , I \?Q: How did you
    find jobs? Who helped you to find them? As After the war, we came to Watsonville. There was a lady who felt so sorry for
    us, She opened up her place and to ldvus to come and live there and she said that the money could wait, Q: What was the
    most difficult experience that you had during this time? As There were not that many difficult things, but I think for
    everyone, every Japanese felt the coldness of the general population and we felt that for the continental American people,
    it was too bad, (Their respect for Americans was lost, as a. continental people. ''They had quite a bit of respect for
    them before, ) Q: As a Christian, what is your hope for the future? A: As a@ Christian, I have lived in America for fifty
    years, I have been in this country for 64 years, During this time, I felt that, American people lived on the principle
    of equality and justice, Because we were ;'' a lien, we could not live equally with the other people, we could not see
    the justice done for our people. Because of these unfortunate circumstances, I found salvation in the-church, Though it
    was a very difficult | time, I felt hope in life in the person of Christ, and I was able to live : up to this time, Our
    Presbyterian church has come to a time when the isseis have dwindled and the Niseis have in creased in number, and. the
    world has come so that there are people who are living without God, I hope that the niseis and sanseis would live through
    this world with faith in Christ and attend church, That is my hope for Niseis and Sanseis, OL fee F a 7 Lt Ceri eA Suna
