- speaker: Respondent
  text: 'I stayed there about a week. : What did you do after that? IT went to Vancouver and worked in the Canadian forrest
    for 2 while. : What kind of work did you do? It was building railroad. I labored for the first time in my life. About
    15 men were taken deep in the mountain and built railroads. In those days the laborers slept on the straw in tents. Our
    tent was on the mountain, so we had to go down to the valley to fetch water. Among our group waS a peer named Matsudaira
    who worked with us. The reason I found out that he was a peer was because of his name, and he talked about the Imperial
    court where his parents were. Later he went to San Francisco and did housework. I read in a newspaper that while he was
    cleaning a window on the second or third floor he fell and died. A oe en Eow long did you stay in Vancouver? I stayed
    there about 2 days. Do you have any other recollections of the time you worked on the railroad? It was just a short period,
    so I don''thave any recollection. What kind of food did you eat? We cooked our own meal and had very simple meals, and
    lived in the tent. I think we could do that because we were young men with dreams of success. What kind of food did you
    eat? We ate regular Japanese food. There was a small store which sold rice and other stuff, so we bought food there and
    cooked it ourselves. Nobody complained. I think when we have hopes and ambitions we don''tcomplain. It was the first time
    others labofgred but they did well, so I was impressed. Was it a hard work? We laid down rails on crossties. The leader
    was a Japanese professional man, and there was a foreman over him who made sure that there was no mistake. HWacn''t 1
    a hard worse Noy iets wae neta hard work: : Where did you go after about 2 months? I worked in a sawmill which was in
    a park in Vancouver for a while. When I saved enough money to travel I came to America. : How long did you work in the
    Sawmill? I worked there a Month! : How was the work at the sawmill? The owner of the Sawmill was a white man, and all
    the workers were Japanese.'
- speaker: Respondent
  text: 'We piled up the lumber : Were they all Japanese? : They were all Japanese, and there were no young men. They were
    settlers there and had their houses and ate good food. : What did you do after that? I had physical examination at Vancouver,
    and then went to seattle. I looked around the town of seattle and then went to Portmand . I went to the country outside
    Portland and worked there for a while. Q: What did you do in Los Angeles? A: I worked there for a while, and then went
    to Imperial Valley at the time of melon season. I spent the prime of my life there, and that period influenced my whole
    life. Q: How did you start farming there? A: We could grow cantaloupes there without having much money. The rent was cheap,
    and we could live in tents. We could not grow cantaloupes at one place for many years; 3 years at the most. It was easy
    to start farming there. As I had a chance, I rent a small piece of land and started growing cantaloupes. Q: Wds it sharecropping?
    A: No, it wasn''t. Unfortunately I never had a chance to sharecrop since I came to America. The reason is that I did not
    like to be controlled by Landlords phy,-sharecropping. I could not stand having a boss over me, SO I farmed on my own
    even if I did not get rich. I stayed poor. Q: Did you succeed? As'' No, td: dian'' t. > At one +ime I farmed in large
    scale. At that time my older brother was working with me. As things looked good we raised 180 acres of cantaloupe, but
    the Depression came and we took a big loss, and we went back to small farming. aiid During the Depression Japanese Issei_farmers
    became the victims of the white capitalists and enterprisers, who #éxed the price and paid Japanese farmers whataver they
    wanted to at the harvest time. Japanese farmers in Brawley were not ignorant people. In fact, many of them were well-educated
