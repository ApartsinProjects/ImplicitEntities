- speaker: Respondent
  text: 'He has plenty of money, and never yields to anyone. My third son is a foreman in lettuce business. He flies all over
    California as a left arm of his boss who owns over 50,000 acres of land. He is well trusted, but he does not have money.
    He is living a leisurely life. As I told you before, he went to Mexico and spent one Christmas with poor children where
    there was no electricity nor gas. He caught fish and ate them. I don''tthink he wodid not have done it if. ne-did not
    know Christianity. Q: You told me that you experienced hardships, but your wife never complained. What was the hardest
    thing? A: As we were poor we could not eat as much as we wanted to, He ae out and buy food. I think it was the hardest
    thing for her, but she never complained. She sacrificed everything to satisgy the children. I could not have done that.
    She was given the spirit. of sacrifice from God. She loved others, and spoke and acted as a Christian. I am older, but
    I can never be like her. Q: What was ''the hardship? A: To be poor. all the time. Q: Are you glad you came to America?
    A: I am glad I came to America. My wife who lived in luxury at the time her grandmother owned a store in Tokyo, came to
    America although her relations who were upper-bracker taxpayers laughed at her for coming to America. We had 57 years
    of married life together, but she still says she is glad she came to America. I am glad she does not say that she is sorry
    she came here. To be saved by Christ, she read the Bible many times. Even now she cannot live without the Bible. There
    is no use telling this to others. Uther people emphasize, too, that if we ignore the confession of sin and the Holy Ghost,
    the church will decline. My wife has the quality I don''thave. It was given by Christ. Q: Your son enlisted in the Army,
    but didn''tpeople in the camp, and pro-Japanese hate the Niseis going into service? A: There was nothing like thathere.
    Three church members went into service from here. They were my son, Mr. Shikuma''s son Charlie and Mr.'
- speaker: Respondent
  text: 'Nakamoto*s son. Q: WerefA''tpeople in camps asked if they take American side or Japanese side? A: I did not hear
