- speaker: Respondent
  text: 'You were lucky, weren''t you? Didn''tmany people stay at this:church? : Yes, there were. Some Buddhists stayed here,
    too, so I don''tthink the Christians could hold worship service there. I did not have any trouble with housing. As an
    Issei, do you have anything you want to teach Sanseis? I am not qualified to teach them anything. I have a grandchild
    who is stationed in Germany..I practically brought him up because in those days my oldest son who was married and was
    farming 6n 10 acres failed and- became: poor. My wife knew his personality, so she brought him up with Christian spirit.
    We are watching him now, but we cannot say anything to him. We just give advice to his mother. He is in the Army now,
    and he reads a lot, so he is very knowledgeable. If we say something carelessly he would laugh at us. I think Sansei:
    should respect such Japanese morals as humility, and.a debt of gratitude. Tam planning to let him: know that "ne is ©
    a live by parental love, benefits of the society and love of Christ. Otherwise he will think that he is great. He was
    a football champion but was injured because he is strongwilled and would not quit. I am teaching Niseis, my children,
    tacitly about the debt of gratitude. From my point of view they lack those spirits, and it is against Christ''s spirit.
    No matter what the Univarian Church or Soka Gakkai of Japan teach, I do not a gree with then. Each of my grandchildren
    have their own talent, so I never tall them what to do. I hope they will learn lessons from our action. That is love.
    My wife acts with love, and lI think it works. After all, all we have to do is to teach love. I do not have much love,
    but we have to treat others and our children with love that was given by Christ. My son and his wife are married for 25
