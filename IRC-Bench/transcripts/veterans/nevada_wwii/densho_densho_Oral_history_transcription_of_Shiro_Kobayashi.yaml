- speaker: Respondent
  text: 'Therefore they had to let the capitalists and enterprisers profit as much as they wanted to. This kind of condition
    continued for about ten years. Q: About what year did you go to Imperial Valley? A: It was about 2 years after I came
    to America. Q: Was it around 1908 or 1909? Ai ee") Laas, Q: Did you farm there for 10 years? Asyes, #1020. Q: Couldn''t
    you do anything about the exploitation of the commissioner? as AeoNo, we couldn''t, We didn''thave the right to say anything.
    Yet we didn''t go out and work as we speculated that we would make money if we were lucky. The condition changed after
    the war, and some people made money. But as young people grew older, most families moved out of such a hot place after
    the war, and only a few fami- . bo ae ffs pa PS thn AmMnN WATT io.) Q: Did Japanese knew that they were exploited? A:
    Yes, they did, but they could not do anything about it. They could not point out the wrong doing and correct it, so they
    just let them exploit them helplessly wishing for the happiness by any chance. Q: About what time did you start working?
    Ae Et was a not piace, so, we started working early in the morning. Young people nowadays would not ba able to stand iG.
    2) What time did you get up in the morning''? p> We got up around 4 otclock when it was still dark. We worked only bh.
    in the morhing. We could not work in the daytime. In those days Japanese farmers in Fresno or Imperial Valley had to fight
