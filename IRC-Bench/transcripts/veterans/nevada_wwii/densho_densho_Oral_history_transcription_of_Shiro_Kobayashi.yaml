- speaker: Respondent
  text: About halfiavear after 1 came 'to Watsonville I moved to Aromas about ten miles north of Watsonville. With Mr. Sakata's
    help I rent gome land there and farmed. For 5 years since then I attended Bible study, Sunday School, worship serviceand
    Kyorei-Kai at night, prayer meeting and home meetings ee the week. In those days people considered church lifevery important
    and everybody attended church. Sometimes the church members lined up, and everybody said prayers or described their feelings.
    Those who didn't do that read the Bible. es acl different from today. That continued for a while. During my 50 years of
    church 16fe there were a few big problems. They were nothing like financial problems, but they were problems of faith.
    An old Japanese pastor who came from the South went into Santa Cruz mountain, and living in a tent prayed all night. Some
    devout members of Watsonville church went there and prayed without eating. These people started saying that the pastor
    who is not inspired by the Holy Chost is not qualified to be a pastor. That caused problems in the church, and at last
    seven families from Santa Cruz area left the church. We prayed and discussed so that they would not leave the church,
    but they finally left the church. At that time the church members as well as the pastor suffered. - , - ~ | oN the Another
    big happening wa the church was tha an evangelist named Takiji Akiyama who is not known to young people nowadays came
    tO our church and gave lectures on the Bible. On the last night he said, "Did you all repent? Those who has not repented
    come here." He called people one by one in a room and told them to repent, and emphasized on the Holy Ghost. Everyone
    was surprised, but there was no troble. He taught us that the Holy Ghost is important, and everyone should read the Bible.
    Nowadays people go to church without reading shécBible. There is a great difference in the since quality of church between
    now and then.,f1l1 the churches in the world are declining now, when the Unitarian Church from Korea and Soka Gakkai or
