- speaker: Respondent
  text: 'Did Japanese organizations such as the JACL, Kenjinkai, churches, _ Japanese counsels, and farm organizations help
    you in any way? At No, they really didn''thelp us at all. Q: What do you remember about rearing children? A: TI tried
