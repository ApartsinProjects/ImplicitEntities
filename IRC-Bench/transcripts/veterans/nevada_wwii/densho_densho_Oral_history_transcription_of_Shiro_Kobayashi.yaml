- speaker: Respondent
  text: 'Five to ten Bee laborers came to each camp from Los Angeles and labored. What other difficulties did you have besides
    being poor in Imperial Valley'' We suffered from heat. In summer +ime laborers from Los Angeles area worked for us, but
    we did not have a place to stay when it We just had ice. was hot., After we harvested the crop I took them to Los Angeles
    and rested on the beach for a while. What did you in the daytime when it was hot? . a: We did not have a place to go so
    we had to endure the heat. A Did you go under the trees? It was hot even under the trees. When the thermometer reach 120
    degrees we tell the laborers to stop working.as they might get sick. Then the laborers used to jump in the ditch with
    their clothes on. It was that hot. Isseis suffered hardships. Did mamy people die from heat? Hardly anybody die from heat
    in Imperial Valley, but in Fresno many people died from the heat or may be from illness. In Imperial Valley people took
    time in putting cantaloupe in sacks, but in Fresno they were paid by the crates so they would not make much money if they
    were idle. That is why the people worked hard, and with the?money they earned they went to Chinese gambling house and
    drank unsanitary wine. That is why many died of malaria. Fresno was the place where most Japanese immigrants died. > 0
    Were the laborers paid by the hour in Imperial Valley? Yes, they were. Was cantaloupe the only product of Imperial Varley?
    In those days it was cantaloupe, put later, because of the change in climate cantaloupe business was not too promising,
    so we gradually changed to alfalfa. But germs get on alfalfa, and unless we spray it, we could not sell it. Later we heard
