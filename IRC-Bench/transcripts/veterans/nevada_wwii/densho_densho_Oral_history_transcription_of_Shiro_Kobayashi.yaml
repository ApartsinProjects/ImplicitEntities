- speaker: Respondent
  text: Mrs. Katsumi Hiura, Elder of Westview United Presbyterian Church Watsonville,California This is Kimiko Hiura . It
    is November 21, 1970 Through this interview we like to learn about the life of Mr. Shuro Kobayashi. Well, Mr. Kobayashi,
    I would like to ask you about your personal history. Where were you born? ; Kobayashi; Iwas born in the center of Japan
    within the Kwanto plain called Ibaragi-ken.
- speaker: Respondent
  text: When were# you born? I was born in 1886, Meiji 19th year. Do you remember anything about the wars ? I don'tremember
    everything about the wars, but I remember quite a fewwanrs.
- speaker: Respondent
  text: 'Please tell us something about them. Well, As far as I know, when I was a child there was a war called SinoJapanese
    War. I have just a little recollection of the event, but I am not able to tell about them because I was so young. Then,
    next one was the Russo Japanese War. This happened when I was a young man and I was then living in Tokyo. At that time
    I was th grade in Middle School, so I remember the event quite #clearly in my mind. aks are quite few things I rembmber.
    but I don''tthink it is worth while telling you at this time. Then the next event was the World War I. I was living in
    the United States already so I was a ware of the involvement of America in this struggle and I too responded to the call
    of service and received the Physical examination. since I was young and became a draftee. ##### Then there was a war called
    "Manshi jihen(Manchurian Incident)" This was a war which extended Japan into Manchuria as being the life line of the nation.
    Japan extended her sphere ef in fluence by sending her army to this foreign ''Soil. Some of the representatives from Japan
    who advocated the fact that Manchuria is their nation''s life line came to this country and made speaches, which I listened
    bat being a Christian already ab that time I felt it was in excusable to claim that part of the world as their own life
    line.'
- speaker: Respondent
  text: Do you recall any sad , joyful, ar painful experiences you had in Japan? I was in Japan until conscription and so
    I knew very little about a real struggle in the world. The time when I had lots of fun was when I was young under the
    protection of loving mother. Japan was at peace and I had very little experience of suffering in those days.
- speaker: Interviewer
  text: Do you remember the make earthquake of "Kyan-to" or any tidal waves that hit the island? I havevery little recollection
    of thee catastrophies.
- speaker: Respondent
  text: What was your family's religion? In general our folks belong to the "Jo-do sect" of the Buddhism. Have you heard anything
    about Christianity while you were still in Japan?
- speaker: Respondent
  text: Since I was so young I thought about going to school but I was very aloof about religion on those days. family and
    count
- speaker: Respondent
  text: How was the social condition of the ¢#A when you migprated to this country ? A Our common people were influenced by
    the principle of practicality introduced by the late feudal Lord Mito, who himself was practical in facing life. So, my
    home and parents believed in the pratical way of life.
- speaker: Interviewer
  text: How much education did you get while in Japan? When I finished grammer school I attended Kyusei "Chyugakko" (Middle
    School) in Tokyo.
- speaker: Respondent
  text: What was your reason for coming to the U.S.A, VU ear I came to U.S.A. for study. Primarily I was interested in learning
    Something in America.
- speaker: Interviewer
  text: I want you to tell us about your experience on the ship coming to America. When did you come to America?
- speaker: Respondent
  text: Icame to America in 1907. I have many recollections about that experience First of all, thinking about the people
    who were a board the ship, they were mostly young people and some were those who were reentering. In those days there
    was a streik immigration law prohibiting Orientals to enter America , so ordinary people no longer were able to come to
    U.S.A. Young people were raising Cain and it was a live.
- speaker: Respondent
  text: What was the name of the ship? It was "Shinano-maru" of "Yusenkaishya,." What kind of country did you think America
    was? And what did you want to do in the U.S.A.?
- speaker: Respondent
  text: I thought I could study better in America because it is a democratic nation and wealthy. This was my primary. reason
    for coming.
- speaker: Respondent
  text: As the impression of this countryt what were some of your first reaction after seeing the country? America is a big
    place and wide open, I thought, but I have very little recollections about that experience.
- speaker: Interviewer
  text: Do you have any impression about the immigration officers? > What did you do first as you come to America?
- speaker: Interviewer
  text: First I did "Hyomin" for about a month. How did the white people treat you and how did you think about them?
- speaker: Respondent
  text: I didn" tfeel any prejudice at that time, Tell us about something that was aad, happy, angry, hard, and ag#on izing
    when you you first came to United States. t
- speaker: Respondent
  text: I don'tremember anything special at this time, I would like to ask you about how you felt after you have settled in
    United States, How did you fina you wife?
- speaker: Respondent
  text: I Spent nine years in America - When I came I had Study visa which was for 10 years, At that time I received a letter
    Saying that my father was ill I returned to Japan. When I returned they said it twas time for marriage, so I married my
