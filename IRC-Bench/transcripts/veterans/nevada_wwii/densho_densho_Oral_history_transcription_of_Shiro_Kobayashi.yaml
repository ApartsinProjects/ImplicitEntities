  text: 'as If deceased, Gate place and age | ear tie: of death: y Galey a y) Name of in terviewer: Takarabe Date: 2/9/75
    Plate Watoont ite PenilitA : Vhathel Net? Please tell me your name first. K: My name is Shiro Kobayashi. Q: When were
    you born? A: I was born in 1886. iy AP: a Q: How old are you now? A: I am 88 years old. They_celebrated my 88th birthday
    at church for me. Q: Where are you from? A: I am from Ibaragi Prefecture. Q: What kind of a person was your father? A:
    He was born before Meiji, so his idea was not like that of today, but he had a reformative idea. He did not have knowledge
    about foreign countries, but he travelled well around Japan and was well in formed about Japan. He was in a manufacturing
    business, and went to Osaka often. In those days there were no trains, so he went to Osaka by a steamship. He did not
    know about Christianity but he was a serious man. Q: What do you remember about your father? A: He had stronger personality
    than most people, and he had a reformative spirit. That is, he had a spirit that would not be opp- Yessed by-the power
    from above. When a child saw his picture on the wall, he asked, "Was the grandfather a samurai?". He had that kind of
    appearance. Q: What kind of a person was your mother? A:She was an ordinary housewife, but was a gentle and loving person.
    My mother did not know anything about Christ, but she was a devout Buddhist. Maybe because of that, she was known as a
    hady of love in the town. Watching her, I thought she liked to give to others. After I became a Christian, I found out
    that it was love that came from the Buddhist belief, but it was different from the love of Christ. She was a good Japanese
    wife. Q: What do you remember about your parents? A+ In those days they did not discuss about the problems between husband.and
    wife like they do today. The wife obeyed everything the husband said. In my memory my mother was an obedient wife, and
    my father was a man of quick decision. He was a typical Japanese man. He had an appearance of a samurai.'
- speaker: Interviewer
  text: 'What ware: happy memories of the days you spent with your parents? A: I do not have many happy memories. My father
    used to call me to Yokohama and take me to watch Sumo wrestling. In those days I was in school in Tokyo. As my family
    was not rich, I was a sélfboarding student. since I was 14. When I was home there was a maid and a servant. When my father
    saw me cooking for myself, he cooked all kinds of vegetables I liked, and brought them to Tokyo travelling 30 miles. felt
    my father''s love then. I don''tremember much about my mother, but I received an impression that she represented virtues
    of Japanese woman. When I got older, I think Japanese women are virtuous. Q: How was your grammar school days? A: I went
    to junior highschool for 2 years, and then went to Tokyo As to study. I wanted to become a doetor, but when I saw all
    my relations are doctore, I lost interest, and decided to go to America. : What school did you atténd. in Tokyo? Taihei
    Highschool In Kanda, Tokyo. In those days there was enthusiasm for overseas in Japan, and there was an or ganization that
    took care of people who were going overseas. With their help I came to America. : What do you remember about your grammar
    school days? IT do not have much memories of my grammar school days. In Japan there were not many teachers, and the teacher
    in charge of pupils taught them everything. That is why the love between the teacher and pupils is not like that of today.
    : Do you have any sad memories? : Yes, I have a sad memory. When I was coming to America after graduating from school,
    I had to qualify financially and pass a physical test. They gave us eye test, and if we had red eyes even though we did
    not have tradoma we could not pass the test. I failed the physical because I had red eyes although I did not have tradbma.
    I did not want to go back home after given a farewell party, sow decided to go to Manchuria where my clder brother was.
    When I said it good-bye to my father at Yokohama, my father looked as,ne was sorry for me.'
- speaker: Respondent
  text: 'I still cry when I think about that time. : How many brothers and sisters do you have? iT nave 3" Grotnerse.) s uee
    . L. am the fourth one, so I was named Shiro. Q: Are they all boys? : There are 4 boys and two girls. : Are you the youngest?
    aio ete Lem : Were you loved by everybody? I think I was loved. Although there were four boys in our family my father
    adopted a son, and my brothers were adopted into other families. The adopted son came from a samurai family. He had a
    democratic and reformative idea. In those days Japanese people looked down upon etta tribes, but this man who was adopted
    into our family was democratic man, so he made all kinds of reforms in our small town. That is why he was hated by some
    people. After I parted with my father in Yokohama, I went to Manchuria. It was the time Russo-Japanese War had just ended,
    and Japanese troops had not returned to.homeland yet. I saw with my eyes how Japanese troops lived and what kind of idea
    they had, and found out the wrong doings of Japanese. Q: As Q: What kind of thing did you find out? Japanese fought the
    war in China, and after the war they occupied the land and stationed the troops there, and planned to make ita Japanese
    territory. When I saw Japanese look down upon Chinese, I thought it was merciless, and at the same time I sympathized
    with Chinese. I still think it was wrong that Japanese bullied the weak, and it was long before the Pacific War broke
    out, As a Matter of course it led to destruction of Japan. Once in a while I think about that time, and I think Japan
    made a big mistake. : Have-you seen Japanese oppress Chinese? : Yes, I did''everyday. ''iWhatwudtd they do? hiost of all,
    Japanese disregarded Chinese. Japanese had military government in cities and villages. Later, as the situation became
    more peaceful it became civil government. Cheinese who lived there could not do anything unless they got permission from
    the government. Japanese fought with Russia, but as - victors they also looked down upon -.'
- speaker: Respondent
  text: 'Chinese, and oppressed them. I saw it with my own eyes for about half a year. Then I went back to Japan, and came
    to America. Whereabouts in Manchuria were you? A: I went..all over Manchuria. I started from Port Arthur and saw mG a
    Q: Weren''t you disappointed when you saw such thing? A: I felt sorry for Chinese. Teachings of Confucious and Mencius
    is criticised now, but they are not bad. From the standpoint of Pytnink gentleness,, they are better than the ideas of
    Japanese. Q: How did Japanese mistreat Chinese? A: Japanese beat Ghinese for a little thing. Sometimes thég-do not pay
    the busfare Chinese demanded. On the other hand, prostitutes practiced prostitution hoisting Japanese flags on the buildings.
    There were such disgraceful acts everywhere. I hate to say such a thing, but''1t was the: Tact. Q: Were you a Buddhist
    then? A: My family''s religion was Buddhism, but I was not a Buddhist, and I did not know anything about Christianity.
    Before I came to America I went to Fujimicho Church in Kudan to be baptized because I thought I had better be baptized
    as I was going to a Christian country. When I told a decon that I wanted to be baptized without any preparation, he said,"Baptism
    is nothing like that." I was embarrased. While I was in Tokyo I heard lectures by presidents of Waseda and Keio Universities
    about their studies a broad, but there were hardly any lectures on Christianity. Once in a while there were lectures on
    Christianity at the YMCA at Mitoshiro-cho, but unfortunately 1 did not have a chance to hear them. ss "an, When I came
    to America I went to a church in Vancouver for the first time. Rev. Kaburagi was the pastor of the Methodist Church. I
    attended a worship service for the first time and listened to a sermon. I understood about Christianity a little, but
    as I was young I had an ambition to be successful, so I did not think about the spiritual side. : You werevery angry about
    Japanese doing bad things. Where did that kind of feeling come from? I did not get it from anybody.'
- speaker: Respondent
  text: 'In olden days Japanese called Chinese, "chankoro". In Ueno Park during the Sino-Japanese War there was "Panorama"
    which showed pictures of the war. One of them was a picture of a Japanese holding the long hair of a Chinese and trying
    to cut it. I was a VourIs mean O17, Or 1 osu Ulre I thouget. some of the.pictures were not good. There must have been
    some people who did not like the pictures, for some of them were removed later. Generally Chinese seldom. came to the
    country in Japan. When they did, they came to sell pretty clothes. When they Ores children ran after them, calling them
    "chankoro" and threw mud at them. The grown-ups just told them not to do such actually a thing. When I went to China and,
    saw thenChinese there mistreated by people who came from outside, I wondered why such good Chinese were mistreated like
    that. Especially Manchurians a revery obedient. Seen from Japanese they are a bit. Stow and stupid, bubwactually they
    a revery obedient. Even when many Chinese watch a Japanese beat up a Chinese, Inhave never seen them beat up the Japanese.
    They are obedient, for sure. F-) > £6 : Did you feel a shamed to see such a scene? Yes, I was a shamed. When I see Chinese
    in America I get good impression from them. There was a Chinese dry cleaner in Aromas, but they gave me warmer feeling
    than Japanese, because they do not mistreat the weak. : Do you feel that way about Chinese? : Yes, I do. I do not know
    where such idea comes from, but when Chinese fight they never bring out weapons and kill each other. They fight for a
    while, but they quit after a while. They do not have violence. : Do you remember about the Russo-Japanese War and the
    World War I? I remember the Sino-Japanese War and the Russo-Japanese War well. During athe Russo-Japanese War i was in
    Tokyo as a student. Some people entered the military academy from the fourth grade in highschool when they passed the
    entrance examination. There was the mood of war, but the students attended schools. Q: Were you parents religious people?'
- speaker: Respondent
  text: 'As I told you before, my faith was Buddhism which was handed down Las to me from my parents. I @ not think what Buddhism
