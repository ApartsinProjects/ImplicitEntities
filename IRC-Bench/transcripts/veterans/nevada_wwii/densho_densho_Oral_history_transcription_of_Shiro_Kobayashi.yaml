- speaker: Respondent
  text: 'My third son is married to non-Christian, but he says he believes in God. He was supposed to have come home for Christmas,
    but he didn''t. I found out later that he had taken a Christmas tree and some Christmas presents to a Mexican village
    and spent a week of Christmas with poor Mexican children. People there werevery happy. He does such a thing once in a
    while. This is because he used to go to Sunday school when he was young and listened to Rev. Takeda''s sermonjtwith Hiroshi
    Shikuma. That helped him, and although he does et go to church, he does not deny Ghristianity. I am glad he acts according
    to Christian love. When did you get married? A: I got married when I went back to Japan. Q: When did you go back to Japan?
    > > I went back to Japan in end of 1915 after 9 years. Was it when you were in Imperial Valley? A: I went back to Japan
    from there te:visit:my parents. As they told me to get married, 1 did. Q: Who arranged the match? A: As a Japanese custom
    there was a4 matchmaker. People must have wondered why she decided to come to America. My wné@''suncle was a psstor. He
    was a newspaperman in Tokyo, but after listending to Rev. Kanzo Uyemura''s sermon he decided to become a minister. He
    was a pastor at Kofu in Yamanashi Prefecture for uver 20 years. Later when he ministered in Tokyo my wife''s family was
    living near him. I don''tknow if he ministered to my wife''s family or not, but they knew about Christianity. I think
    that is why she decided to come to America. Rev. Eizumi''s oldest daughter is the wife of Rev. Keiichi Imai of Dinuba.
    She is my wife''s cousin. When we were in Florin we met Rev. Imai, and he ministered there. As my wife came from such
    a family I think whe had a little understanding of Christianity. We were married, and I came back here a lone. My wife
    joined me by the end of that year. She shared the poos farmer''s life with me for over 50 years. Her family used to be
