- speaker: Respondent
  text: 'Name of in terviewer: - Takarabe Date :1/23/77 Place: San_Francisco | Q: When were you born: A: I was born in 1900.'
- speaker: Interviewer
  text: 'Are you 77 years old now? Yes, I am 77 years old this year. Q: Are you from Osaka?'
- speaker: Interviewer
  text: 'Are there many people from Osaka here? A: No, I don''thear about people from Osaka. There are many people'
- speaker: Respondent
  text: from Hiroshima and Wakayama, mut not too many people from Osaka.
- speaker: Interviewer
  text: What was the occupation of your family? My father was in printing business in Osaka. He did the printing for churches.
    Of course both my parents were members of Temma Church in Osaka, and my father served as a decon for many years.
- speaker: Respondent
  text: He was in printing business hiring young apprentices in his shop. We were not rich. I had 2 older brothers and an
    older sister, and
- speaker: Respondent
  text: I was the lyoungest of the four. When my brother was around 12 or 13, my father got in finanacial difficulties, so
    he sent my brother out to Tokyo to work as a shopboy at a bookstore. My father continued his business, but as he was a
    serious man and was not good at
- speaker: Respondent
  text: business he finally closed the shop and moved to a small place, and worked as a foreman in a printing company.
- speaker: Respondent
  text: When I graduated from the grammar school I was ready to go to a girls' highschool, but my father told me that he could
    not let me go to a girls' highschool after sending out my brother to
- speaker: Respondent
  text: apprenticeship, so I went to a junior highschool thinking I could go to a highschool after graduating from the junior
    highschool. However, when I graduated from the junior hishgschool my brother wanted me to go to Tokyo and help him as
    his wife was ill. I went
- speaker: Respondent
  text: 'to Tokyo when I was 16 years old. Since then I lived in Tokyo. Q: Did you stay home? Yes, I stayed at my brother''s
    home. 1 wanted to go to school very badly. In those days there was a correspondence course, SO ut studied it to get ready
    for the girts* highschool, but L030 not have a chance to g0 to school, and 1 was asked in marriage. My mother''s cousin
    was a pastor of Bancho Church in Kojimachi, Tokyo for many years. He used to come to America often as a peace representative
    pefore the war, and he told me about my husband.'
- speaker: Respondent
  text: I could not have come to America after 1924, so in fall of 1923 my husband went back to Japan, and we were married
    in my uncle's church in Tokyo. Then we came to America together. I have been a
- speaker: Respondent
  text: Bongregational Congregational member of the Methodist church. An old member of the M st church here is the one who
    took my husband back to Japan to look for a bride. He was going to in troduce his niece as a wife, but
- speaker: Respondent
  text: she was already married, so he asked my uncle who was 4 pastor if he knew someone who would go to America as a bride,
    and they started talking about me, and we were married.
- speaker: Interviewer
  text: How old was your husband when you got married?
- speaker: Respondent
  text: He was 29 and I was 23. My husband was a tailor in Berkeley. I did housework in a white family for about a month ve
    I wanted to see a white family. Before I came to America I learned English from my aunt who was a highschool teacher so
    I could understand English a little. That was the only time I worked in a white family. After my husband quit the tailoring
    business he started a dry cleaning business.
- speaker: Interviewer
  text: 'It was from around 1930 till the war broke out. Q: Did the Depression come when he was in tailor business? A: No,
    he was in ary cleaning business then. He started the dry'
- speaker: Respondent
  text: cleaning business in 1929, and the Depression started around 1930.
- speaker: Interviewer
  text: Were you badly off then?
- speaker: Respondent
  text: Yes, we were, but we got some installment money back, so we had some spending money. We could take only what we could
    carry with our hands when we went to camp. We left everything in the store, pressers and customers' clothes and everything
    else.
- speaker: Interviewer
  text: Couldn't you sell them?
- speaker: Respondent
  text: No, we couldn'tsell them.
- speaker: Interviewer
  text: 'Was it because they knew you were leaving? A: Yes, but nobody wanted to buy them, and even if they did they'
- speaker: Respondent
  text: 'would pay almost nothing, so it was better to leave them there. : Did you go to Tanforan first? Yes, we did. We had
    3 daughters, so we gould live in a new barracks and not in the stable. The floor was made of coarse'' boards so weeds
    and in sects crawled through the cracks in the floors and it was unpleasant, but we were better off than those'
- speaker: Interviewer
  text: Why did your husband quit the tailoring business?
- speaker: Respondent
  text: I think he could not make the ends meet by tailoring business. The other reason was that he was asked to buy a dry
    cleaning business from a man who was going back to Japan. As he did not have any experience in the dry cleaning business
    he could not make money, and we lived from hand to mouth.
- speaker: Interviewer
  text: 'Was there any big incident in your family? A: Yes. When our oldest son was 2 years old he had convulsion from high
    fever and died. We called a doctor, who put the baby'
- speaker: Respondent
  text: in a tub of hot water and then in cold water, but he died. It was a heart-breaking experience. When was that? Tt was
    in 1925. At that time I was pregnant with a daughter. About 4 months after our son died, the daughter was born. She
- speaker: Interviewer
  text: 'is 51 years old and is married to a man who owns a hardware store : How many children do you have altogether?'
- speaker: Interviewer
  text: 'I have 3 daughters who were born after I lost my Sone : Are they all girls? ; Yes, they are. They were born 5 years
    a part. The oldest daughter'
- speaker: Respondent
  text: 'is in: pan francisco, and the second daughter is in San Jose. The third daughter is married and lives in Los Angeles.'
- speaker: Interviewer
  text: ': Do you have any recollection of the time you went to Tanforan Center? : At Tanforan there was a regulation that
    one member of the family'
- speaker: Respondent
  text: had to work/ My husband was in the hospital with heart trouble, and I had stomach trouble, so our daughter worked
    in the kitchen
- speaker: Interviewer
  text: When there were so many Japanese together, didn'tsome people become rough? Yes. There was a group of people who believed
    Japan was winning
- speaker: Respondent
  text: the war. When a eroplanes flew overhead they said Japanese are coming. Those people were sent to Tule Lake
- speaker: Interviewer
  text: Did you go to Topaz from the beginning? Yes, we did. We went from Tanforan to Topaz. Wasn't Topaz a sandy place?
- speaker: Interviewer
  text: Yes, it was in the desert. It was desert as far as we could see. After about 3 days train ride they let us off in
    the middle of the desert. I was scared when I saw such a big desert in America.
- speaker: Respondent
  text: They pulled the shades on the windows and did not let us see outside when the trains went through cities. We could
    see out
- speaker: Interviewer
  text: Did you think your life was in danger in the camp?
- speaker: Respondent
  text: Yes, not only when we went to the camp, put when the war broke out, truckloads of so ldiers passed by, and there was
    uneasy feeling. l thought Japan had started a terrible thing. My husband came here as a yobiyose since his father was
    in America. He was like a Nisei rather than an Issei, so he did not think that Japan was going to win the war, put he
    did not say that because he could have got in
- speaker: Interviewer
  text: Didn't you think Japan would win the war'?
- speaker: Respondent
  text: IT am a woman but I knew 4 Little about America, so lI thought Japan had done a reckless thging. As I was brought
    up alk a eae) Christian family 1 knew about America a little better than other people. After the war my husband died,
    so I bought a ary
- speaker: Respondent
  text: 'cleaning business from Mr. Takahashi and managed @talone for When was the hardest time for you''? : It was when 1
    was operating a dry cleaning store a lone. Il felt'
- speaker: Interviewer
  text: 'Were your daughters all grown up when you came home from the camp? : Yes, the oldest daughter was married, but the
    youngest one was'
- speaker: Respondent
  text: '15 years old when my husband died. : Then you brought her up a lone, didn''t you? Yes. After graduating from highschool
    she got a scholarship from an art school in Oakland, and studied there. Her teacher said she had talent for art, and she
    liked art, so she went to the'
- speaker: Interviewer
  text: Were you an a gent' in cleaning business?
- speaker: Respondent
  text: Yes, I was. When the customers bring clothes, I tag them and leave them in bundles. Ten Mr. Takahashi's cleaner pick
    them up, clean them and bring them back. I do alteration if needed,
- speaker: Respondent
  text: check the clothes and give them to the customers. ; Wasn't Mr. Takahashi not in cleaning business after he came back
- speaker: Respondent
  text: ; No, he wasn't, but his son was. His son was going into something else, so I bought the business. We have been associating
    with the
- speaker: Respondent
  text: Takahashis for over 50 years. How many years did you contunue the cleaning business? Nearly 10 years. Then I got gallstone.
    After an operation I e e * Wa § quit the business. As my daughter was married and,living in San Francisco, I moved to
    San Francisco and rented an apartment.
- speaker: Interviewer
  text: Did you retire since then? What year did you come back from the camp? We left the camp as soon as the war was over.
- speaker: Interviewer
  text: Did you come back right away? The war ended on August 15, and we left there the following month, As our older daughter
    got a scholarship in a college in Cleveland, Ohio, we wondered. if we should go there or €0 back to East Bay.
- speaker: Respondent
  text: As the weather was not good in the East, and as my husband's health was not good we thought it was better to go back
    to East Bay rather than going to a strange place. We went back to Oakland and stayed at the dormitory of a church. My
    husband got a job at a white tailor shop, and I did some domestic work at a white family.
- speaker: Interviewer
  text: Was your husband still a live then? He died when he was 4g and I was 42 then. Many people had hard time
- speaker: Respondent
  text: during the war. I think people in Japan had harder times. Dia you start the dry cleaning business after your husband
    die? Yes, I did. The pastor of the church told me that Mr. Takahashi was looking for someone to take over his business,
    and since I was in dry cleaning business before, asked me sf I would like to try. I bought the right to the business and
    started st. I worked from 8 in the morning +ill 6 in the afternoon, Mondays through
- speaker: Respondent
  text: Saturday without any rest. Were you engaged py the time your husband went back to Japan to i Noy Ll didn' vo enow
    him. I wanted to come to America. The daughter
- speaker: Respondent
  text: of the pastor who arranged the marriage for me was married and lived in Los Angeles, so I knew about America and liked
    America better than Japan. lI think that is why my uncle brought the marriage
- speaker: Interviewer
  text: proposal from America to me. ; Are you glad you came to America? ; I wanted to come here, sO IT think it was good
    that I came here.
- speaker: Respondent
  text: I went back to Japan after 39 years, then 4h years ago and again last month. I went back to Japan 3 times. I am glad
    1 lived in To pnank America. ,The life in America suits me better.
- speaker: Interviewer
  text: ; Have you ever had any unpleasant experience with the white people? > As my father was in printing business when
    I was little, foreign
- speaker: Respondent
  text: teachers from mission schools used to come to our shop. I used to call their names and greeted them, SO I guess I
    was used to the
- speaker: Respondent
  text: white people. I never had ill feeling toward the white people. Did you think it was unfair that you had to be evacuated
    or did
- speaker: Interviewer
  text: 'you think it was right? 1% think (it.was unfair. I thought Japan''s action was reasonable. : Why did you think so?'
- speaker: Respondent
  text: At that time I was excited and could not think rationally, but later I thought America challenged Japan to fight and
    Japan was forced to fight.
- speaker: Respondent
  text: What did you think about being put in a camp? They fed us rice and other food suitable for Japanese. We were given
    plenty of food which was hard to get outside, so lL think
- speaker: Interviewer
  text: 'we were better off in the camp than outside. : What was your opinion on loyalty? : I a cquieged the American citizenship
    and became an American, but'
- speaker: Respondent
  text: I don'tthink a Japanese canot become completely an American. Of course, we have +o do our duty as a citizen in our
    daily lives.
- speaker: Interviewer
  text: 'T am a Japanese so I have a Japanese spirit. Were you questioned on the loyalty: in the camp? How did your feel about
    it then?'
- speaker: Respondent
  text: 'I had a lonely feeling, but as long as we live in America I thought we had to be loyal to America. : Did your children
    have dual citizenship, or were they Americans?'
- speaker: Respondent
  text: ': Of course they were Americans. They "are girls, so l don''tthink they have troubles like boys do. : Were the& many
    people in the camp who caused troubles?'
- speaker: Respondent
  text: '> Yes, there were. They were transfered to Tule Lake to go back to Japan, but they are back here. Recently there
    is a dispute going on concerning Iva Toguri''s American citizenship. 1 think citizenship is a very important issue.'
- speaker: Interviewer
  text: ': Were there many books at your house? { think there.were. As my father closed his store when I was in'
- speaker: Interviewer
  text: my teens, I didn't see too many books. Did you study about Ninomiya Kinjiro when you were in school?
- speaker: Interviewer
  text: '; Was your father the first generation Christian? : Yes, but my mother was the second generation Christian. Mother''s'
- speaker: Respondent
  text: mother was a Christian. I think my father became a Christian after he married mother. I didn'tknow about it until
    Mr. Uchida brought
- speaker: Respondent
  text: back from Japan a book about 100 Japanese Christians Vyasa (e Reka found my grandmother's name AN Libs
- speaker: Interviewer
  text: Was America a ifferent from what you were jmagining when you were
- speaker: Respondent
  text: I did not feel any amazing difference. As I was born and raised in the city, the buildings and customs were not like
    those in the country. I was amazed by the spaciousness in America, but otherwise I dia not feel too much difference from
    Tokyo. As Ai was brought up as a Christian since my Sunday school days I did
- speaker: Respondent
  text: not have strong faith as those who have converted to Christianity from Buddhism, but I have a strong feeling which
    cannot be extinguished deep in my heart. Last October and November I went to Kyushu with a church group and visited where
    26 saits were matyred and other historical sites of early Chritianity. When
- speaker: Respondent
  text: I thought about the strong faith of olden day Christians Il felt pain deep in my heart.
- speaker: Interviewer
  text: Did you stop ,at Hawaii on your way here?
- speaker: Respondent
  text: Yes, we did, and we went a shore there. The name of the ship was Senyo Maru and it took 17 days. 1 was seasick and
    could not get up until we reached Hawaii. Japanese food was served only to the first class passengers, and the second
    and the third passengers were served Western-style food. As I could not get up, My husband brought some Japanese food
    from the first class dinning
- speaker: Respondent
  text: room-to me. Funny thing is that as soon as you stand on the ground, your seasick is gone. Most Isseis had a hard time
    did as we not understand the Language +
- speaker: Interviewer
  text: Do you beong to any organizations such as Japanese Association?
- speaker: Respondent
  text: No. As my husband was like a Nisei, he did not send our children to a Japanese language school, but had a tutor teach
    them Japanese. He did not belong to any organization such as kenjin-kai. He belonged just to the church and no other organization.
- speaker: Interviewer
  text: 'Did you belong to the kenjin-kai, Mrs. Takahashi? Awen''tthere kenjin-kai around here? A: Yes, there are. There are
    Hiroshima Kenjin-kai, Wakayama kenjin-kai'
- speaker: Interviewer
  text: 'Are they very popular? A: Yes. I read in newspaper that they hold New Years party and other Christians do not g0
    to such places too much, 1 think.'
- speaker: Interviewer
  text: 'I don''tthink they do. I guess there 4s no need for them. M: I think so. We do some social work at our church. Most
    of the members are Buddhists.'
- speaker: Respondent
  text: 'Mrs. Takahashi: lthink we should join those organizations and teitit~". them about Christianity.'
- speaker: Interviewer
  text: There wasn't any segregated school around here, wasn'tthere? Ai No, there wasn't. Our children attended public schools.
    There
- speaker: Respondent
  text: might have been one long time ago.
- speaker: Interviewer
  text: Have many Japanese been living in El Cerito and Albany since olden days? No, there were no Japanese around here. Many
    Japanese live here now. Where did they live before?
- speaker: Respondent
  text: They lived around 6th and 7th Streets in Oakland, and San Francisco,
- speaker: Interviewer
  text: Where did you have your business in Oakland?
- speaker: Respondent
  text: 'A: On the 7th Street.'
- speaker: Interviewer
  text: When did your husband quit the tailor business? Soon after we got married. Did he start the dry cleaning business
    right after that'
- speaker: Interviewer
  text: 'How long did he continue the business? For 15 years until the war started. What kind of headaches did you have in
    dry cleaning, business? A: Pressing was hard. Men''s suits had a certain ways of pressing, but there are different styles
    of deresses. In those days pleats'
- speaker: Respondent
  text: were popular. We had to pin each pleat and press them, so it
- speaker: Interviewer
  text: Nowadays Niseis can work in banks and offices, but in olden days Japanese could not get into those places so there
    was nothing for
- speaker: Respondent
  text: them to do except domestic work.
- speaker: Interviewer
  text: 'Have you ever make any mistakes while you were in cleaning business? A: We did not make any special mistake. When
    I was operating a dry cleaning agency a lone I was asked to dye a jacket. so I sent: it out to a dye house. There is no
    guarantee when you send clothes out to dye as they might shrink. When the jacket came back from the dye house it was shrunk,
    so the customer was angry. As my husband was a tailor and I knew how to sew, I bought some material'
- speaker: Respondent
  text: and sewed a jacket to make up for his loss.
- speaker: Interviewer
  text: 'Didn''t the customer pay you? Of course he didn''t. 1 had a hard time then, and was very angry. At -one time a case
    was brought before the court, and I had to ask Mrs. Takahashi''s son to go to the court with me. That was the first time
    I went to a court. Q: What happened then? It ended without losing too much money.'
- speaker: Respondent
  text: Adal thank "Los. something. The customer wouldn'tlisten to my excuse. I think that is how I got the gallstone. I had
    to do the bookkeeping and everything else all by myself. I went to church on Sundays, and sometimes there were meeting
    in the afternoon. I worked hard from
- speaker: Interviewer
  text: 'Monday to Saturday. I dia it for almost 10 years without any rest, : Did you have an operation on the gallstone?'
- speaker: Interviewer
  text: Yes, I did. Since then I became well. Of course I retired since ; Then 'it has been only a few years since you retired,
    hasn't it?
- speaker: Respondent
  text: ': No, it wasn''t 1972. Anyway it was 10 years after I started the dry cleaning business that I became ill.'
- speaker: Interviewer
  text: When did you retire? When I was 62 years old. I like sewing, SO I sew dresses for my friends.at home. I live.in San
