  text: UMN Immigrant Stories Collection Cesar Emilio Mendez ['Mendez, Cesar'] ['United States'] Cesar was born in Venezuela
    and moved to the U.S. with his mother with just a single bag of personal items. Though the transition was difficult, he
    is proud of who he is today. I'm from Venezuela, a South American country with a lot of natural resources, beautiful beaches,
    delicious food and beautiful women. Besides all these good things, my country has a really big economic and social crisis
    which causes a lot of Venezuelans to leave their homes and find how to live a better life in other countries, starting
    over from zero. My mother got involved in a move by really bad people, to escape from that problem we went to the US for
    "vacations" or that's what my mom told me before leaving. We came, just me and my mom. I left everything in my country.
    I brought just one bag with all my life in there, important papers, some clothes, my computer and my video games. I just
    bring that things to here not only because they was important for me, they also distract me about the reality of leaving
    my room where I grew up, the important people that was with me and I will love in my life. All those things don't fit
    in one bag. Leaving all in less than a week is not easy. It was a lot of emotions to process. My brain turned off to a
    void these problems, lying to myself and that we were going to go back after the summer vacation ends and everything will
    be back to normal again, something that never happens. Besides this, I learned a new language in less than a year. I have
    a bed, things that I will never think I will have back in my country and new opportunities. It was hard to get used to
    all of this changes, but I did it. I met in credible people at school, what I can call my friends now, and I really achieved
    a lot of my goals here. My family, and especially my mom, is proud of me. I thought I was going to fall into a deep void,
    but after all I just go up, up, and up and do my best all the time, learn from the past and be a better me tomorrow. I'm
    very proud of what I am today, and I will be proud of who I'm gonna be tomorrow.
