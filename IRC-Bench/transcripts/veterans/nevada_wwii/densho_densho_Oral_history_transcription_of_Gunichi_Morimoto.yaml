  text: 'If deceased, date, place and age at time of death: Name of in terviewer: '' Takarabe Date:12/2/77 Place:'
- speaker: Interviewer
  text: Where were you born?
- speaker: Respondent
  text: s I was born in Hiroshima Prefecture as the first son of a poor farmer My father had been in Hawaii as an immigrant
    to grow. isugar beets. After he went back to Japan he married my mother and TI was born as
- speaker: Interviewer
  text: When did your father go to Hawaii? It was before I was born in 1897, so I think i+ was around 1895 or
- speaker: Respondent
  text: before. In those days the contract of immigrants was 3 years, SO after 3 years was up he went back to Japan and married
    my mother and I was born. As it was a poor farming family, no matter how he tried the living was hard, so before ft could
    sit up he changed his mind and went to Canada. I did not hear how he entered America from there but after a year or two
    he came to America. I hear the tain those days a mong the immigrants with 3-year contract to grow sugar beets those who
    were the heirs of their families or those who had
- speaker: Respondent
  text: +osupport their parents returned to Japan, and those who dis not have much savings came to America.
- speaker: Interviewer
  text: What kind of a man was your father?
- speaker: Respondent
  text: My father was an {lliterate farmer who just made his living by working. Although he was the oldest son he did not
    have enough money to become an heir besause aie family was poore His mother was a step-mother and had complicated relationship
    with his surroundings. I think he had no other way but to go a broad to work.
- speaker: Respondent
  text: About how much land did he own? He owned a little less than an acre. As it was a hilly countryside we did not produce
    as much crop as the sunny place.
- speaker: Respondent
  text: Mostly rice, and during the winter he grew wheat. Did your grandmother (father's mother) die? Yes, she did. My father
    went to Hawaii with his wife, but they were separated there. I hear that in those days young men who immigrated to Hawaii
    lived together in a big camp where there was no order.
- speaker: Respondent
  text: When my father went back to Japan a lone he remarried and I was born. Father was already 42 years old then. In those
    days there were no women around his age available in Japan so he married my mother who was 20 years younger. That is why
    the family was complicated. When father was 42 years old he went to Canda leaving his 21 or 22 year-old wife and his son
    behind. The life of Japanese farmers during the Sino-Japanese War (1894-1895) was very poor although the rich péple and
    landowners were well-off. Because of long war Japan had to spend money on armaments so the government had to collect tax
    accordingly. That is why the common people had hard times. I think my father left home because of that. But when he came
    here he found out that the immigrants, especially the Asian immigrants met with strong rejection. In those days most Japanese
    immigrants who went overseas to work
- speaker: Respondent
  text: were poor and did not have education, but when they came to America they did not have time to learn English.
- speaker: Interviewer
  text: About how many years did you live with your father? When my father's brother who was in Hawaii on sugar beets contract
- speaker: Respondent
  text: went back to Japan and married, my father left home and went to Canana. From Canada he came to America and 5 years
    later, around
- speaker: Respondent
  text: 1904 he called my mother. I was " years old then. I lived with my uncle and his wife and my grandmother,
- speaker: Respondent
  text: 'As the living was hard my uncle wanted to come to America, but in those days it was hard to come to America as too
    many immigrants moved from Hawaii to America. Therefore my uncle went to Hawaii as a contract immigrant and from there
    he came to America. Then his wife, grandmother and I were left behind in Japan. After my mother came to America in 1904
    she gavecbérth: to rtwo daughters. Trst910 my grandmother died, and my uncle called him wife to America so I had'
- speaker: Respondent
  text: nowhere to go to. Fortunately I had finished my compulsory education so IT came to America.
- speaker: Interviewer
  text: You were brought up by your grandmother, weren't you? Yes, I was brought up mostly by my grandmother. She loved mevery
    much Was your grandmother a nice person?
- speaker: Respondent
  text: She was a very nice person. It was the second marriage for both my grandfather and grandmother. My grandfather's first
    wife died after my father was born, so my father was the step son to to. my grandmother. My grandfather's second wife
    gave birth to a son and two daughters.
- speaker: Interviewer
  text: 'Were you ever scolded by your grandmother? A: Yes, I was, but she loved mevery much. She told me old stories and'
- speaker: Interviewer
  text: 'Do you remember what kind of stories she told you? A: She said, "I hear 2 +ime will come when a man can fly, and
    by that time there will be many people. Also, a time will come when delicious'
- speaker: Respondent
  text: fruit will grow on 3 feet tall trees, but the people will not be able to pick the fruits and eat them. T heard that
    kind of stories.
- speaker: Respondent
  text: Now that I am 80 years old I think a boout what she told me and wonder how people in her days thought about a eroplanes
    which they did not have in those days in their village and predicted the hard living condition in the future. When I walked
    hitting grass by the roadside grandmother used to say; "It is said that a child 7 or 8 years old hate grass by the roadside.
    I saw you hitting the grass by the roadside as you walked. If you do that you will be cursed by the grass. I was brought
    up listening to such stories by my
- speaker: Interviewer
  text: 'You you remember anything else your grandmother taught you? > She gaid,"Don''t : pick all the persimmons from the
    trees but leave'
- speaker: Respondent
  text: one for the birds to feed on. Even though you grew them yourself they are not all yours." She always warned me not
    to waste rice
- speaker: Respondent
  text: 'as it takes long time to grow them. You were influenced by your grandmother, weren''t you? : My father left me before
    I could sit up and my mother left me when'
- speaker: Respondent
  text: I was 7, so I depended on grandmother until I came to America when I was 13 years old. Since I was 11 or 12 years
    old I ran errands
- speaker: Respondent
  text: for the family. I also went out to sell rice and barley. How did you go about selling them? TI put them in a basket
    and carried the basket on my back. I took
- speaker: Respondent
  text: them to a store and exchanged them for things we needed such as shoyu and tofu. We did not have to buy vegetables
    as we grew them.
- speaker: Interviewer
  text: Do you remember about your mother before she left you when you were 7? As my mother was busy farming outside and grandmother
    stayed home and took care of the household, I don'tremember about mother well. Most
- speaker: Respondent
  text: children are brought up by their mothers, but I wasn't.
- speaker: Interviewer
  text: How many years did you go to school? T came here as soon as I finished 6 years of compulsory education.
- speaker: Interviewer
  text: 'What do you remember about your schooldays? A: My schooldays went smoothly. In those days there was no uniform, so
    I went to school in kimono with other children of the village. The moral setenceé. . was most important subject in those
    days. Also the physical education was very strict. When boys become soldiers by teachers'
- speaker: Respondent
  text: they cannot dilly-dally, so since .we were school kidswe were scolded, if we were slow and lazy. We were lucky if
    we were not beaten.
- speaker: Interviewer
  text: 'What subject did you like best in school? A: I did not have any special subject I liked. As there was no men in my
    family I had to run errands after I came home from school, so l'
- speaker: Respondent
  text: did not have much time to study. I think my school record was average
- speaker: Interviewer
  text: What did you enjoy most at school? I enjoyed the excursion and the athletic meet the most. Were there school trips
    in those days? I think our excursion was the same as the school trip now.
- speaker: Respondent
  text: 'The 6th graders go on 2 to 3 days trip nowadays. Did you have that kind of a trip in those days? : We made only a
    one-day trip in those days. We just went to to urs'
- speaker: Respondent
  text: for study. We were not in condition to make trips in those days. What did you play after school? After boys came home
    from school they were told to go in the wood and
- speaker: Respondent
  text: gather firewood, or go out and cut the grass or bring in the hay. The girls had to baby-sit. The only time we played
    with friends were on
- speaker: Respondent
  text: 'holidays or at festival time. I remember the following song: "Don''t cry baby when the evening comes For the fire
    in the stove will die out.'
- speaker: Respondent
  text: The meaning of the song is; The méher is cooking supper and the baby is crying. If she tends to the baby, the fire
    in the stove will die
- speaker: Respondent
  text: out. It sings about her predicament. In those days there ware no gas or electricity to cook with. They burned brushwood
    in the stove.
- speaker: Respondent
  text: They did not cook rice, but barley which took 2 to 3 hours to cook. The little child followed mother or grandmother
    around all day so
- speaker: Respondent
  text: she is tired and want to go to bed, but mother has to cook supper. If she tends to the child the fire in the stove
    will die out. This
- speaker: Interviewer
  text: is a song about a farmer's wife'spredicament. Did anything happen in your village such as earthquake or war when you
    were little?
- speaker: Respondent
  text: I don'tremember anything happening before IT was 7 years old. I remember when I was 7 or 8 years old I visited my
    neighbor who was wounded in Russo-Japanese War and was in an Army hospital in Hiroshima
- speaker: Respondent
  text: On the way home I strayed from my grandmother and cried. We wakiked about 5 miles to Hiroshima and walked back home.
- speaker: Respondent
  text: Were there any horse or ox at your house? As we did not have any men in the family we did not have horse or ox. We
    had a neighbor bring an ox and help us. We did not use horses in those days. When A count 10 years old I was sent out
    to get
- speaker: Respondent
  text: grass for the ox after school. Children in those days did not have time to play after school. What else do you remember
    about your childhood in Japan? IT don'tremember much about my childhood.
- speaker: Interviewer
  text: Were you lonely or were you happy?
- speaker: Respondent
  text: I did not feel lonely or happy. I had friends in the neighborhood so I was not lonely, but in those days the life
    was hard for my friends and neighbors so we lived in small way. We did not buy much
- speaker: Interviewer
  text: food, and there were only a few stores that sold food. Did you have enough to eat when you were little?
- speaker: Respondent
  text: ': We had enough to eat, and I went to school with packed lunch. Did you come to America all a lone? I was told to
    come to America in Spring of 1910. I had just finished 6 years of compulsory education then. In those days we could not
    come to America if we had eye disease. In Japan in those days we burnt firewood in the house to cook rice and barley and
    burnt wood in the fireplace to get warm, That is why the house was filled with smoke'
- speaker: Respondent
  text: which was bad for eyes. When I had my eyes examined I was told that IT had trachoma, so I failed the examination.
- speaker: Respondent
  text: A year before that my grandmother died leaving my uncle's wife and her two daughters and myself behind. Then my uncle
    summonded his wife, so she left her two children in the care of her relations and came to America. She did not have trachoma,
    but I Olds Asso had to have my trachoma cured I stayed in Hiroshima and went to a doctor's office for treatment. When
    my eyes were almost cured, Il caught another eye disease from other patients. As it eke taking so long I thought about
    giving up going to America, but I was told to take my time and get it cured. Finally I came to America in
- speaker: Respondent
  text: os <2 December of 1910. In those days there was no pier in Kobe, so we took a row boat to the ship. It was a small
    sWap about 6,000 ton. In those days I did not know how things were in America as the letters IT recieved from America
    were written in classic Japanese style which I could not read. I was told to go to Seattle as the physical examination
    at the Immigration office in San Francisco was stricter, so I went to Seattle. It took two weeks to get there.
- speaker: Interviewer
  text: How were it on board the ship?
- speaker: Respondent
  text: The ocean was not too rough, but the air in the ship smelled bad with the smell of disinfectant and food as I was
    used to living in fresh air. As I was used to eating fresh vegetables and fish, the two weeks on the ship was hard for
    me.
- speaker: Respondent
  text: In those days we could not send a cable telling people to pick me up until the ship came within 300 miles from the
    shore. That reminds me that when I was in Japan only 3 or 4 houses on the main
- speaker: Respondent
  text: street in Hiroshima had electricity. Even after I came to America only the main street in Woodland had electricity.
- speaker: Interviewer
  text: Were you a lone on the ship? Yes, I was, but I was with other passengers. In those days the picture marriage had started
    but only a few people came. It became popular after 1913 or 1914. Most passengers were married people who
- speaker: Respondent
  text: had wife and children in Japan.
- speaker: Interviewer
  text: What did you do on board the ship? I stagd in bed most of the time because I didn'thave anything to do. Did you have
    good appetite?
- speaker: Respondent
  text: I ate 3 meals a day but just to stay a live as they were not tasty as our home cooked meal. A week before I got on
    board the ship I had to stay at a temporary residence. During that stay they examined my eyes and passport.
- speaker: Interviewer
  text: 'Weren''t you lonely? A: No, I wasn''t as I was excited. I was lonely after I came to America'
- speaker: Respondent
  text: as I did not have friends.
- speaker: Interviewer
  text: Did you make friends on board the ship?
- speaker: Respondent
  text: I became friend with a young man from Kyushu and two other young men from the same county. The ship left from Kobe,
    stopped at Yokkaichi and went to Yokohama, where it stayed for 2 days to load the cargo.
- speaker: Respondent
  text: We 3 young men landed at Yokohama and walking down the street we Saw ° a rickshawman say something to a white man.
    Then this white man said
- speaker: Respondent
  text: ®°No" shaking his hand. A man who was about 3 years older than I said As I grew up in a family with no men, lI had
    to do a man's job such as selling and buying things. In those days rice was 12 sen, wheat was 8 sen, barley was 6 sen
    and sake (rice wine) was 24 sen for 1 sho
- speaker: Respondent
  text: (about 14 quart). At the age of 13 I already knew how things were. What kind of country did you think America was
    before uou came here? After I landed at Seattle I stayed at Fujii Hotel. My father had his money robbed, so he borrowed
    money from a Chinese neighbor and came to meet me. The master of the house where he worked as a gardener told him that
    he would help my father if he got in trouble, so father was confident. The immigration officer did not say anything to
    him, but he told the man who came to pick up the passenger who came with me that he would let the man land if he paid
    him $50. This man went back home and borrowed $50 to pay the immigration officer.
- speaker: Respondent
  text: 'Tt was like that in those days. : Did you take a physical examination when you arrived at Seattle? Yes, I had an
    eye examination and had my passport checked at the'
- speaker: Respondent
  text: ; How many days did you stay there? I stayed there for about a week until my father came to pick me up. While I was
    there, a Japanese man who did something illegal was arrested and was waiting to be sent back to Japan. He explained
- speaker: Interviewer
  text: to us how things were in America. I felt sorry for him, but we were fortunate to have met him. What did this man do?
- speaker: Respondent
  text: T don'tknow what he did as I was still a child. I think he had some relationship with a woman or something.
- speaker: Respondent
  text: Did you know about America when you were in Japan? When I was coming to America there were 3 or 4 people who went
    back to my village from America. Those people must have been engaged in hard labor in America because they could not live
    long after they
- speaker: Interviewer
  text: 'went home. I saw some people who went back to Japan because they : Then you didn''tthink America was too good of
    a place, didn''t you?'
- speaker: Respondent
  text: ': I had an ambition to come to America. I didn''tthink America was a bad place, but I didn''tthink it was too £000
    Of ''a place. 21 heard that it was a civilized country, but what I learned from my'
- speaker: Respondent
  text: teacher and the reality was different. What was your first impression of Seattle when you arrived there? My first
    impression was that it was a beautiful place with many green Poses iynie houses with red and green roofs. Now I know that
    it was Victoria Island. The ship stopped at Vancouver and then at Tacoma
- speaker: Respondent
  text: before it arrived at Seattle to unload the cargo. When I saw Victoria Island I thought America was a beautiful place.
- speaker: Respondent
  text: How did you feel when you saw the white people for the first time? On board the ship A:,A Japanese who was coming
    back to America said something to a white
- speaker: Respondent
  text: man, and then asked us to guess this white man's age. Ali'3 of us could not guess his age. That was the first time
    I saw a white man.
- speaker: Respondent
  text: I ate bread for the first time at the Immigration office. How did it taste like to you? It was light and dry and didn'ttaste
    good. I heard that Westerners
- speaker: Respondent
  text: eat bread, but I had never seen it nor tasted it. At the Immigratobnn office they served us Chinese rice, and it did
    not taste good either.
- speaker: Interviewer
  text: Did your father go to Seattle to meet you? How did you feel when you saw your father for the first time?
- speaker: Respondent
  text: '- I didn''thave any special feeling. I just thought he looks like'
- speaker: Interviewer
  text: Could you call him "Papa" right away?
- speaker: Respondent
  text: ': I could never call him "Papa.'
- speaker: Interviewer
  text: Did you hesitate to do so?
- speaker: Respondent
  text: ': Yes, I think so. I was never scolded except once, and I never clinged to him calling him W Pane. From Seattle we
    went to San Francisco by a small boat. When we arrived in San Francisco, half of the city Wdé# still remained burnt from
    the Great Barthquake. From San Francisco we came to Woodland. When we arrived there mother welcomed me with tears. As
    we lived a part I did not have any feeling of dependency on my parents. tf listened when they consulted me, but I felt
    in dependent. I think we should never send away our children if we dia not:havé:to. TI had a chance to send my son to
    his grandmother in Japan, but I did'
- speaker: Respondent
  text: What was your father doing at Woodland? He was working as a gardener. At first he did farming but he failed in it
    so he became a gardener. My mother managed a Japanese bathhouse and manufactured tofu. Before 1910 Woodland was the producing
- speaker: Respondent
  text: district of sugar beets so there were many laborers. How big was the bathtun? It was big enough for 5 6 6 people to
    get in at once. I heard that in those days a tier of firewood was about $3.50, a gardener's
- speaker: Respondent
  text: 'labor was $1.50, tofu was 10¢ and bath fee was 5¢. : I was sent,a school for about a year, and after that I worked
    as a'
- speaker: Respondent
  text: 'Where did you do that? : In Woodland. When I came to Woodland I was the only Japanese boy there. Befoe I went there
    Mr. Iwanaga had a son who was born there and could speak English well. He lived in Yolo. I heard that when he jumped on
    a train which had started moving he fell and was ran over by the train. If he was a live he could have taught me English,
    but I was a lone, so Mr. Shimizu who was doing domestic work had his master make arrangement to put me in a school. When
    TI first started school I did not even know the alphabet, so it took along time to learn it. In the meantime, a sugar
    beets growers boss who lived next door taught me some English grammar for about 3 months. After that I became a schoolboy
    and worked for nearly 4 years. Finally I was able to get along well.'
- speaker: Interviewer
  text: What kind of mistake did you make as a schoolboy?
- speaker: Respondent
  text: ': At one time I turned on the oven but did not tight it for along time so it exploded. I jumped outside then. After
    that I did not'
- speaker: Respondent
  text: 'They say America is a free country and does not discriminate whether people are Negro or Chinese, but when I went
    to school they made fun of me. After a year or two when I became used to the school I played foothall. If my side won,
    the children from the opposing Side hit me. What surprised me was there were children older than I in my class. The reason
    for that is this. In those days there was no compulsory education in America, so migrant laborers did not send their children
    to school. But when they came to California they started sending their children to school. T was 13 and was ina class
    with 10-year olds, but there were children around: 15 years old. There were only 2 schools in Woodland in those days.
    as there were not too many children.'
- speaker: Interviewer
  text: About how many Japaese families were there then?
- speaker: Respondent
  text: ': I think there were about 20 families, and counting the ones in the country there were about 30 families.'
- speaker: Respondent
  text: 'Did you enjoy being a schoolboy? : I didn''tenjoy it, but the grandmother of the house where I lived taught me the
    words I didn''tknow when I went to their place and read books at night. She was a very kind lady.'
- speaker: Respondent
  text: 'Miss Maxwell was my first teacher. The old lady named Mrs. Faulkner was very kind, wasn''t she? : She was a devout
    Christian. She gave me 5¢ every Sunday so that'
- speaker: Interviewer
  text: I would go to the Congregational Church. Did you stay there for 3 years? No, I stayed there for 2 years. I forgot
    what I did after that.
- speaker: Interviewer
  text: ': What did you do after schoolboy? I forgot byt I think I went to work in the country. Then I came back to town and
    worked as a cook.'
- speaker: Respondent
  text: When I went to school my teacher used to tell us that Abraham Lincoln became a president without going to school.
    We should follow his example and study hard. She also used to say, "This is a public school so anyone can come whether
    rich or DOOM LO) TOL tell you to wear nice clothes to school, but I want you to wear clean clothes that are washed and
    ironed." She used to wear a long dress with a high collar, and if we were noisy she would strike the desk with a whip.
    We werevery obedient.
- speaker: Respondent
  text: 'In those days the wages were 15¢ an hour and $1.50 a day. When I first came here I used to go a cress the street
    with 5¢ to buy a loaf of bread. A blue shirt was 50¢, shoes were $2 and a Dar: oT trousers were $1.50. The wages were
    low but we could live on it without starving because things were cheap. During the summer vacation I used to go to the
    country and worked. Mr. Kotoura in Marysville was the first one who gave me work in the cuuntry. In the country we worked
    from 6 a.m. to 6 p.m., llhours a day with one hour off for lunch. The outside work was very hard. Many people overworked
    and became ill. I heard that before I came here the only work for Japanese was chopping wood. In summertime there were
    some work picking fruits around Vacaville, but in winter time the only work for farmers was chopping wood. which was a
    hard work. Even my'
- speaker: Respondent
  text: parents chopped wood, They had a 6-feet saw until they went back to I was born when my father was 42 years old, so
    when I came here at the age of 13 my father was 55 years old. At the end of every year my father used to go to Sacramento
    to buy beans to make tofu, and rice and shoyu for the whole year at Aki Company on 4th Street. One day after I came here
    I went to Sacramento with my father to do the shopping. On the way back we stopped at a Chinese restaurant on 3rd Street
    and had dinner for 10¢ a person. As things were so cheap
- speaker: Interviewer
  text: my parents and 3 children could live on making only $1.50 a day. Did you go home once in a while while you were a
    schoolboy?
- speaker: Respondent
  text: ': Yes, I went home once in a while and went to the bathhouse. In those days there was a bookstore named Kaishun-do
    in Sacramento. As my.fatherndid-hotchavVe education he let me buy books I wanted. When we stopped at Kaishundo to buy
    my dictionaries a man who went by the store heard my father stutter and said, "That old man had better go back to Tenor
    he will die in America." When I heard that it stuck me that it was no time for me to go to school. In those days there
    was no Social Security fn a did not have money his friends donated money and sent him back to Japan. Since that time I
    started working in the country. I was about 16 years old then. I worked in the country during the summer, and in the winter
    I went back to Woodland and worked cook; , cleaning house and washing clothes for about $35 to $40 a month. With the money
    I saved working during the summer I sent my parents back to Japan in 1915. Before that time my mother had a gallstone
    removed at a hospital in Woodland and stayed'
- speaker: Respondent
  text: there for a week with a special nurse attending. It cost much money so I helped pay the bill. When my parents went
    back to Japan I paid
- speaker: Respondent
  text: 'How old were you then? : I was 18 years old then. I took them to the 1915 Panama Exposition before they went back
    to Japan. I spent about $500 then. TI had'
- speaker: Interviewer
  text: 'saved that much money when I was 18 years old. Did you save that much money by earning $1.50 a day? : By that time
    the wages were $2 a day.'
- speaker: Interviewer
  text: '; Yet $500 in those days was a lot of money wasn''t it? : It is worth more than $5,000 now. I paid the hospital bill,
    passage'
- speaker: Respondent
  text: and gave them some spending money. My father did not have much money as he had to feed a big family. As father had
    a house and some land in Japan I thought they could live on it after they go back to Japan. Within two years after they
    went back to Japan there was inflation and by 1917 the wages became $4 a day. The life in Japan was not
- speaker: Respondent
  text: too easy for my parents so I helped them. After my parents went back to Japan I worked hard and saved money, and in
    1919 I went back to
- speaker: Interviewer
  text: 'What kind of work did you do till then? ; L worked as a cook at different homes. How much did you receive as a cook?
    : I received between $35 and $40.a month. Did you work at restaurants?'
- speaker: Respondent
  text: ': No, at families. In those days the electricity was only on the main street in Woodland, and other places used gas
    lamps. They cooked'
- speaker: Interviewer
  text: 'with wood stove and only rich families had gas stoves. : Were those white families? : Yes, they were. Japanese homes
    did not have such thing.'
- speaker: Interviewer
  text: About what time did you get up in the morning? I started working around 7 O'clock as people in the families usually
- speaker: Interviewer
  text: 'went to work at 8 O''clock. Did you cook three meals a day? Yes, I did. .T had about: two hours free time in the
    afternoon:'
- speaker: Interviewer
  text: 'I could study during that time, but by the end I was too tired to study : Where did you learn how to cook?'
- speaker: Respondent
  text: There were 3 or 4 Japanese cooks so we exchanged recf¢ipes or cooked according to book books.
- speaker: Interviewer
  text: 'Did the white masters tell you what to cook? What did you do if you didn''tknow how to cook certain food? : In those
    days the cooking was plain so it was easy. They had feast'
- speaker: Respondent
  text: only on Thanksgiving Day or Christmas, and sometimes they invited guests. I had to do everything including gardening
    and laundering.
- speaker: Interviewer
  text: 'like Iti: was}a maid''s work. r\ Did you contiue that work till you were 19? : I did it till 1919. After I married
    in 1919 there were no such jobs'
- speaker: Respondent
  text: so we went to the country. How did you meet your wife? In Japan young men used to visit young girls at home till around
    il O" clotk at night. Families with daughters of marrying age allowed young men to visit their daughters.
- speaker: Interviewer
  text: Did you marry your wife when you went back to Japan at age 21?
- speaker: Respondent
  text: ¢ Yes, Idi. I went to visit her with my childhood friend.
- speaker: Interviewer
  text: Did you know your wife before?
- speaker: Respondent
