    up to the Rabbithole and met all these others who came in with a guide to in vestigate this tin deposit that this prospector
    had. Sure enough, in the various canyons at the bottom of the canyon .... I n the olden days, there were quite a few little
    mines around; there were still cabins here and cabins there and cabins up here. The two geologists from the Bureau of
    Mines had somebody with them who was an expert at determining whether this gravel had tin and how much, by some kind of
