- speaker: Interviewer
  text: had shut down. Everybody went into Pioche for Labor Day, and he said, "Do you know anything about fireworks? "
- speaker: Respondent
  text: I says, "No, not really." He says, "I promised the girls. We couldn'tstay in town for the fireworks, and I bought
