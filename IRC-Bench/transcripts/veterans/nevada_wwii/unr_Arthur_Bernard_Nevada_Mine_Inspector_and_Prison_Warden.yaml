- speaker: Respondent
  text: '"Well," he says, "that leaves me no alternative." He says, "I''m going to have to beat the hell out of you."'
- speaker: Respondent
  text: '"Well," I says, "all right." I started taking my coat off, because the first thing I thought of was this nice white
