- speaker: Respondent
  text: loaded it, and took it out, and dumped it in the other one. The fellow that did it the fastest won the prize.
- speaker: Respondent
  text: 'So I registered in the mucking contest, and the entrance fee was five dollars, a day''s wages. All the entrance fees
