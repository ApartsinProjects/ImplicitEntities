- speaker: Respondent
  text: Well, I was state mine inspector. When the war started ... tin is an essential product in whatever tin is used in,
    in war. And during the war effort, they needed tin. Our sources in South America were gone, and they were looking for
    tin. Someone learned that there was a deposit up in Rabbithole, that they'd found tin.
- speaker: Respondent
  text: Now where is that, Rabbithole? Here's Lovelock, there's Gerlach, here's Winnemucca, and Rabbithole is right in the
    middle of that triangle. It's a desert. It actually could be called part of the Black Rock Desert. There was some gold
    mining and some mercury mining in that area - quite a bit of small stuff. So, naturally, the government was looking for
    tin, and Senator Scrugham, J ames Scrugham, and I had been friends for many years. He was one of the first men I met when
    I came to this state, and he was campaigning for reelec-
- speaker: Respondent
  text: Inspecting the Mines tion as governor - he was governor at that time. In those days, the various candidates traveled
    in groups. All the Democrats got together, the governor, or the mine inspector, the state treasurer, and everybody, they'd
    have a big group, and they'd travel the state campaigning. They'd try to make every mine, and I was real new at the Bristol
    Mine yet at that time, and it was built on a dump. The bigger the dump got, the bigger the camp got. So the candidates
    would come up there. They had their envoys from every county who were familiar with the county politics and knew where
    to take them, be their guide. And they'd come up, so the county chairman of the Democrats would get all the state officials
    and bringthem up to the mine in the evening when they could meet most of the miners and other people, if there were any
    around. At that time, it was during prohibition, and all the candidates had their particular lackey that stayed with them.
    They'd have a box of cigars and a gallon of whiskey, and they'd meet the potential voter, and they'd give him a cigar,
