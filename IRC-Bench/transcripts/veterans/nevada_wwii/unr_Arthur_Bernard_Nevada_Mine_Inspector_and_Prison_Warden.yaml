- speaker: Respondent
  text: I finally did get Red, and when I put him in the chair, he said, "Warden, gee, you've been a good guy." He said,
- speaker: Respondent
  text: '"I like you." He said, "I''m going to come and see you tonight at midnight." I said, "I''ll be waiting for you, Red."'
- speaker: Respondent
  text: Well, Red never showed up. One of the things I wanted to ask you is, to give a little perspective, what was happening
