    everything. They'd cleaned that out. I'd got a little suspicious, and so had the guards. "What the hell are they doing?"
    Bought all the crackers, all the candy bars, everything, you know. They figured they were going to go out in the bull
    pen. They had plenty to eat and plenty to drink, and they were going to beat me. So, when they didn't go in, I locked
    the doors, and they're out. They went to the bull pen, where it was going to be nice and warm, and the heat was turned
    off. It was late in the fall - no heat. I didn'tturn the water off, because I didn't want a mess in the bathrooms, but
    there's no heat.
- speaker: Respondent
  text: Of course, the press had already been ... I mean, they knew it within five minutes, and they were there,
- speaker: Respondent
  text: Well, I said, "They didn'twant to go in, so they're not going in." I said, "That's just what I mean. They're going
    to stay out and cool their heels, until they decide to go in, and it's going to get pretty goddamned cold pretty quick.
    And they don'thave any heat. They got water. If I could turn off the drinking water, I'd turn that off, but I can'tturn
    just the drinking water off."
- speaker: Respondent
  text: I says, "Hell, I don'tknow what the governor says. I don'tknow where the governor is. He ain'there."
- speaker: Respondent
  text: '"Hell, no! I''m not going to call him. I''m running this prison. The governor isn''trunning the prison. He sent me
    down here to do it."'
- speaker: Respondent
  text: So, pretty soon I get word from the news media, "The governor is in Las Vegas." I said, "So, he's in Las Vegas."
- speaker: Respondent
  text: I says, "I'm not goingto do anything. I'm runningthis prison, and I'm keeping those convicts out. They're not going
    in."
- speaker: Interviewer
  text: So, the press was tel ling you where the governor was. They said, "He's in Las Vegas. What are you goingto do?"
- speaker: Respondent
  text: I said, "Be my guest." Thefirst thing I did, when I told theguardsto lock up the doors and keep the prisoners out,
    I called my friend Bob Clark, chief of the highway patrol. Bob was a good man. We werevery close, and very good friends.
    I explained what had happened. "Bob," I said, "I've got a riot started down here. My students don'twant to go in to their
    rooms. I don'tknow what's goingto happen, but I'd like you to send several men down here, if you can spare them, and put
    them up on top of the cell block, looking down into the yard, because that's where they're going to be."
- speaker: Respondent
  text: He said, "How many do you want?" I said, "Oh, four or five is enough, one on each corner." And they came down, all
    armed with their rifles and everything, and I had the guards take four or five or six mattresses up on top of the roof,
    and blankets, because it was goingto get chilly that night, and I wanted them to be comfortable. My in structionswere,
    "J ust pay no attention to them. Let them do anything they want, unless they try to go over the wall," which I knew they
    weren't
- speaker: Respondent
  text: going to try to do. They couldn't. It was too high. We'd gone through that before. About twelve feet and wire on top.
    I'd gone through that with the doctor with the dope. He said, "They'll go over the walls!"
- speaker: Respondent
  text: I said, "By God, if they do, I'm going to get some new marksmen around here." But I said, "The sight of those patrolmen
    up there are going to keep those guys pretty well controlled."
- speaker: Respondent
  text: Bob changed the men every once in a while. And the second day came. By then, my three wise men are coming in pretty
    often. "Warden, a lot of the guys want to go in."
- speaker: Respondent
  text: I said, "They can't go in. They either all go in or none. I told you that before." Because I'd told them, I says,
    "Anybody that wants to go in, can go in. If they don't go in, they're not going in. And tell them that."
- speaker: Respondent
  text: So, they said, "What are we going to do?" They're telling me about the older men that this was beginning to get to
    them. They was cold and miserable, and they really didn'twant to riot. They were happy. They always had been happy.
- speaker: Respondent
  text: I said, "They had a chance to go in. They didn't. You're all going in, or nobody's going in. Take a vote out there.
    When they all want to go, they go. And until they all want to go, don'tbother me. They're staying out."
- speaker: Respondent
  text: I knew, as the other guards knew, that there was a core in there of troublemakers, and we knew who the main was one
    - young man about in his late twenties or early thirties, handsome, good-looking, big, strong man, six feet, 190 pounds,
    and a typical bully. He bullied every-
- speaker: Respondent
  text: body. As long as he didn'thurt them, we didn'tbother him too much, although he had been in cell detention two or three
    times. But we knew he was, if not the main instigator, one of them. Let's say this is our prison yard, and here's where
    they went in the cell block. Over here was the bull pen. And over here was a graveled walkway there and there. In the
    center, with the crosswalk in here, was all lawn. We didn'twant anybody to go on the lawn. That was part of our beautification
    of the yard. On each corner of the lawn I had a piece of a half-inch pipe about that longwith a point and a sign welded
    on, "Do not trespass on grass," and they were stuck down one in each of thefour corners. Alongwith thistypical bully that
    everybody has, we had the typical mouse that's always picked on, and this guy was about five foot five, a hundred and
    twenty, thirty pounds, kind of young, nineteen or twenty, and he could be pushed around. And by God, this big bully was
    pushing him.
- speaker: Respondent
  text: About thethird day, there was an in cident in theyard. From what I gather, the little guy just couldn'tcontain himself,
    and he went up and he told this big bully type, who was the instigator, "God damn you! On account of you, we're outhere
    freezing to death!"
- speaker: Respondent
  text: So, hetook after him. Hesays, "I'll wringyour neck!" or words to that effect. What he said, I don'tknow, but the little
    guy started running, and the bully started chasing him. The little guy came around, cut off a corner of the lawn, and
    slipped, and grabbed one of these pieces of iron with the "Keep off the grass" metal sign to hold himself, and it came
    out of the ground, and here he is with this thing in his hand, that's a lethal weapon. He got up, and here's the guy right
    on him, and I guess he felt like I did when I was pushed into the ringwith Iron J aw Slade. He went crazy, and he just
    started beating, just started
- speaker: Respondent
  text: whipping, and he was hitting the guy every time. Pretty soon, he's chasingthe big guy. And he never quit. I guess,
    from what the guards told me later, he was screaming every foot of the way after him and beating him. And the big bully
    just took it. Hejust ran. Finally, one of the guards called down - they all had foghorns - and told them to stop. So,
    they stopped, and they went in, and they picked up this big guy and took him to the hospital. He was beat up. And the
    next day, the riot was all over. The three wise men came in and said, "Everybody will go in. They want to know what the
    repercussions are."
- speaker: Respondent
  text: I says, "I don'tknow yet. They're going to lose a lot of privileges. How many, I don'tknow till I see how they react,
    because this isn'to ver yet, until everything smooths out."
- speaker: Respondent
  text: By God, we never had another... we never had a blurb. They went in. And this made national news - all over.
- speaker: Respondent
  text: Because they didn T get to see the governor? Oh, I forgot to tell you. The press went to the governor, and they caught
    him in Las Vegas. They said, "There's a prison riot! What are you going to do?"
- speaker: Respondent
  text: He said, "Prisoners are rioting? What am I going to do? Hell," he says, "I don'tknow whether I'm goingto do anything.
    I got a warden up there is taking care of that."
- speaker: Respondent
  text: '"Well, aren''tyou goingto tell thewarden . .. . ? Aren''t you goingto meet with them?" "Hell, no! I''m not going
    to meet with them. I''m not runningthe prison. Thewarden is runningthe prison."'
- speaker: Respondent
  text: He says, "Nobody tells Art what to do. He's running that prison." This came out in the Nevada paper and papers all
    over.
- speaker: Interviewer
  text: What you're showing me here is a big blown-up picture of a cartoon, an editorial cartoon, is that right?
- speaker: Respondent
  text: This was in the Omaha World Herald. And it was titled, "A Setback to the Cause." It says, "Carson City, Nevada, prisoners
    give up, returning to their cells."
- speaker: Respondent
  text: And the prisoner is sitting there saying, 'This is an outrage. They just undone months of painstakin' campaignin'."
- speaker: Respondent
  text: And then, I guess, down here, underneath that prisoner, it says, "Society for the Advancement of Comfort for J ail
    birds. "And they wrotean a rticleto go with this?
- speaker: Respondent
  text: Oh, a big, long article. And it went on to tell about how it took a little state like Nevada to show the prisons around
    the country how to conduct themselves. H.C. Barrow was the cartoonist that made this, and he sent me the original that
    he gave to the paper.
- speaker: Respondent
  text: And he signed it, "Congratulations to Warden Bernard, by H.C. Barrow." So, that was the two riots that I almost had.
- speaker: Interviewer
  text: / wanted to talk to you a little bit about the work program that you started at the prison. Would you describe how
    that came to be?
- speaker: Respondent
  text: With all the skilled labor that we had at the institution and all the work that needed to be done - I noted that one
    of our main problems was lack of anything for the in mates to do. With time on their hands, they had nothing to do but
    plan and scheme how to thwart the guards, escape, and whatever you can think of. I decided that one of the best things
    I could do was get as many as possible to work, so I started the rock program in the quarry. The prison is in a natural
    rock mountain, and getting stone is no problem at all. In fact, years back they quarried stone there for, I believe, the
    State Capitol, as well as many other buildings in Carson City. So, I started what we called "the rock gang."
- speaker: Respondent
  text: Every in coming in mate was held for a week or ten days in what we called the "fish tank" till we got a result of
    their health problems, whether they had this disease or that, or so we could train them. When they were clean and well
    fed, they came out, and their second day out, they had to go to their work on the quarry gang. It could only take so many
    men, so they had to take their turn. I kept them there until they completed an xamount of rocks - finished building stone.
    I can'tremember now how many it was. But it was not much problem. It would take them probably two weeks to make this a
    mount of stone. Then they would come back into the yard. In the meantime, we had an idea what kind of temperament the
    particular in mate had - whether he was trustworthy, whether he was a problem, a troublemaker or whatnot - and hewas replaced
    with anew fish.That's theincoming in mate. All of them were actually, I think, anxious to get to work, to get out of the
    yard, but some of them just refused to work. They said, "I wasn'tsenthere to work. I was senthere to do time."
- speaker: Respondent
  text: I said, "Well, that's fine. You can do your time. If you don'twant to work, I'll see that you rest," and I put them
    in cell detention. They were there all a lone, and all they had to do was rest. Some of them never got tired of resting,
    but most of them did. And so, therethey are back in the rock quarry making stone after stone after stone, and the stones
    are building up, and I wondered what I was goingtodo with them, eventually. We had so many things to build, and I wracked
    my brain what to build and how to build, because we had no money for material. So, as the stones were stacking up, and
    a sweweremakingthese finished stones, we naturally got a lot of excess rock and material. I talked it over with some of
    my in mates who had experience in stonework, and who were anxious to
- speaker: Respondent
  text: work, and who knew howto make stone walls. Before we started a building program, we used this crud stuff to make dry
    walls. Eventually, we had that prison property surrounded with dry wall, and they were nice. We capped them off with pieces
    of concrete that I gathered up wherever they were tearing up a concrete highway or building or floor or anything. We squared
    off these blocks of concrete, and that topped off our wall, and that wall would bestandingtoday in perfect condition,
    if they had maintained it, but they didn't. So in many places it's just crumbled and disappeared, and some places it's
    still the way it was constructed.
- speaker: Respondent
  text: We needed a lot of buildings built out at the ranch, like machine sheds, pig pens. Anything that could be built with
    wood, we could build with stone a lot cheaper and a lot better. A stone corral is something that no animal could go through,
    so I can'tbegin to tell you how much building we did. I went through my crew, and through their records, and found out
    who was a good stonemason, who was a good carpenter, who was a plumber; and I got started. I decided to build nice, modern
    cottages for the guards. I thought that would be a better way to keep a good person on the payroll, and I started buildingthem
    on the west end of the prison. We had a two or threeacre space there. I happened to havea black in mate who was one of
    the best bricklayers I've ever seen and a very good stonemason. He had a record of getting out of one prison and into
    another. His record didn'tshow any problems or anything. He was just habitual in mate, nothing serious in any of his crimes
    - oh, bum checks, small burglary, anything - usually to get money for whiskey. His name was Bell. After he did a little
    work, I realized how good he was. I asked him where he learned his trade. He spent most of his life in prison. He was
    then about forty,
- speaker: Respondent
  text: in his early forties. He says, "I learned it from my uncle. I worked for him when I was a kid." Well, I said, "You
    couldn'thave learned everything you know when you were a kid with your uncle." I said,
- speaker: Respondent
  text: '"Yes," he says, "and usually when I get out, I do that for a week or two, and then something happens."'
- speaker: Respondent
  text: Anyway, he was really a good stonemason, a good bricklayer, a good concrete man. So I had him in charge of the building
    crew. I learned early that if I sent trustees out with guards, they did everything they could to figure out how to get
    away from that bunch and escape. If they were out with an in mate watching them, they didn't go. They were more afraid
    of being brought back to face the in mates than they were of being brought backtofacethe guards that they'd escaped from.
    So, I had him in charge of a crew. We started building, and things were going along fine. We had to have materials, so
    I put out the word throughout the territory, you might say, that anybody that had a buildingthatthey wanted destroyed
    or a barn or whatever, get in touch with me, and I'd do the work for the material. I couldn'timagine how many buildings
    there were that people were glad to get rid of. At the Stewart Agency [Stewart Indian School] they had entire buildings.
    One was a hospital. They were glad to get rid of them. They just didn'thave the money to destroy them. They weren'tinterested
    in the material. And there I had everything. I had plumbing, kitchen stoves - everything that you needed for my project.
    The manager and I were very good friends, and he was more than cooperative. So, in a small way with a small crew I started
    salvaging material from here and there. Tore down big barns. I got
- speaker: Respondent
  text: all kinds of big timber material, any kind of planks I wanted, as well as finishing lumber. And to think, while I
    was campaigning for mine inspector I was defeated by or ganized labor! They worked real, real hard. In fact, a group of
    these ladies visited my mother-in-law. They didn'tknow, of course. They just were going house to house. And they told
    her why they were there and what a good man my opponent was and how much better he was than the incumbent. She listened
    to them and said, "Well, you know, I'm sorry. I'm not going to vote for that good man of yours, because the incumbent
    mine inspector is my son-in-law." She says, "I never saw anybody move so fast to get out of that house." [laughter]
- speaker: Respondent
  text: One of the unions was holdingtheir annual meeting in Ely, and one of the members of the commission, the labor representative
    of the commission, wanted me to speak at this meeting. I said, "Oh, hell. What's the use? They're supporting my opponent,
    and I don'twant to embarrass anybody, and I don'twant to be embarrassed myself."
- speaker: Respondent
  text: '"No," he said, "I think you should." And he said, "It might surprise you. There''s just a lot of these labor men,
    union members, that are not going to vote the way they''re told." And that was true as far as the mining unions were concerned.
    I carried all those myself, all a lone.'
- speaker: Respondent
  text: But anyway, I a greed to meet at this union meeting and give my little spiel. And after the dinner meeting, my friend,
    Baciagalupi from Reno, the commission labor member, said, "Well, there's a fellow I want you to meet." He took me over
    to a man about medium sized, but very husky, and he said, "Art, I want you to meet Ralph Alsup. Ralph, this is Art Bernard,
    the mine inspector."
- speaker: Respondent
  text: Alsup said, "Yes, that's the man we're going to defeat." I said, "Well, thank you very much." When I was introduced
    to him, I remembered then, that I'd read all about him. He was the crack labor leader in Las Vegas, and always making
    the headlines. He was tough on in dustry. He was a feared labor leader. And so, the election came, and they worked, and
    they did their stuff, and they defeated me. In the meantime, I went down and became warden of the prison.
- speaker: Respondent
  text: Along about a year or two after I was appointed, but when my program was just getting going good, we had big headlines
    from Las Vegas, big shooting scrape. Ralph Alsupwasin charge of the plumbers' section of the union. There was a lot of
    plumbers down there. He'd got in a scrape with the man in charge of one of the other sections of the union. The man pulled
    a knife on him, and he pulled out a gun and shot the man. Didn'tkill him. They tried to quieten it down, and nobody wanted
    to bring any charges. The fellow that pulled the knife and got shot didn'twant to prefer any charges. They wanted to keep
    harmony in the unions and not get any bad vibes, but the district attorney was in censed. They didn'tlike Ralph Alsup
    anyway, so they prosecuted him for assault with a deadly weapon, and he got one to five years. And that made the news
    all over. Of course, all the news media remembered the past campaign, when organized labor beat the state mine inspector.
    Now, the state mine inspector was the prison warden, and Alsup was on his way to prison. What was going to happen? One
    newsman would write an a rticlethat Alsup was goingtocome to the prison and organize the prisoners. Another one would
    concoct a story that Alsup was going to come to prison, and the warden was going to throw him in so litary confinement
    and leave him there. Then, they wondered if he would have a special car take him to
- speaker: Respondent
  text: prison, or whether he'd have to ride like the ordinary criminals. In fact, the guards were a little worried about
    this coming up. They heard all this, and they knew my personality by now, and they thought they knew Ralph Alsup's personality.
    They figured this is going to blow; it's got to blow. So, when it came time to bring him up, the captain said, "What are
    you going to do with Alsup."
- speaker: Respondent
  text: I said, "What do you mean?" He said, "Well, we got to bring him up here." I says, "Well, what the hell. They're all
    coming up here. Bring him along with them."
- speaker: Respondent
  text: He says, "You want to just send him in the regular paddy wagon?" I says, "Who the hell does he think he is? Or who
    do you think he is? Of course, he's coming in the paddy wagon."
- speaker: Respondent
  text: So, he came up with the paddy wagon. That got headlines. "Ralph Alsup goes to prison in the regular paddy wagon."
    Now, what's going to happen when he gets to prison? So this was on the mind of the captain and all the guards. What are
    we going to do with Alsup? What's going to happen?
- speaker: Respondent
  text: The captain says, "How do you want to handle Alsup?" I said, "Like you handle all the . . . he's an in mate here.
    That's all. Handlehim likeyou do the rest of them."
- speaker: Respondent
  text: Well, hesaid, "Goingto send him out in thequarry?" I says, "Of course! He ain'tgoing to get no special favors. He's
    going out to the quarry just like everybody else."
- speaker: Respondent
  text: So, they put him out in the quarry, and they watched him, and they kept me advised. I said, "You don'thave to report
    on Ralph Alsup. J ust treat him like anybody else. He does his rocks, and he's through."
- speaker: Respondent
  text: Well, they had to tell me that he was a very industrious worker. He didn'tspeak to anybody. He just put his head down,
    went to work, and he was making more rocks and better-looking rocks than anybody else.
- speaker: Respondent
  text: '"Well," I said, "That''s fine. When he gets his quota, put him in the yard." So, they did. After a while they begin
    going back to do rocks - we were running out of fish. The old-timers were goi ng back. Alsup went back, and the same old
    story. He did more rocks, and better than anybody else. I''d been thinking about Alsup. I knew by now that he was a natural
    leader of men, that he had to be to get where he''d been in this union. I could tell that people didn''t give Alsup any
    guff. Like when the new fish comes in, they try you out. Nobody tried Alsup out. I needed somebody in charge of all these
    crews I had, taking care of everything, because it was quite a job. It''s like an in stitution, you know. I didn''thave
    time to go around and take careoftheplumbingand everything else. I needed somebody that was a natural leader and who knew
    what he was doing, so I thought, "That''s my man."'
- speaker: Respondent
  text: I'd never talked to Alsup. So, I had him brought in, and he thought, of course, he was heading for solitary or so
    mewhere. But he came in, stood at attention, and I asked him to have a seat. He sat down. I made a few trivial remarks
    about this and whatnot, and then I said, "The reason I asked you to come in Ralph," and I said, "I know you, and I don'thave
    a deep friendship from years gone by, but I've been watching you, and I know that you're a very skilled man. You're a
    natural leader of men. I'd like you to take over a very important job."
- speaker: Respondent
  text: He says, "I'll do my time in the rocks like everybody else. I don'twant any special privileges at all. Forget it."
- speaker: Respondent
  text: '"No," I said, "That isn''t it. I don''twant you to have any special privileges, but I need somebody to take care
    of everything in this institution. The boiler room, the cell blocks - everything needs work. I want you to be in charge
    of everybody - the electricians - just take it over as if you were superintendent. And if you''ll do that, it''ll be a
    special favor to me. You don''t owe me a favor, but it''ll be a damn sight more pleasant than having nothing to do and
    making rocks."'
- speaker: Respondent
  text: Well, he said, "Under those conditions, I'll take it." But he says, "I don'twant any special privileges from you now
    or at any other time. I was senthere to do my time, and I'm going to do it. And I'm not going to foul up."
- speaker: Respondent
  text: I said, "That's fine." So I said, "Now, you're going to be in charge of a lot of men, and I'm not going to pick them
    for you. You've been out in that yard. You know men probably better than I do. You pick your own crew. If you have any
    doubt about any of them, come in and talk to me about it. Otherwise, you pick them yourself. You know more about those
    men out there than I do."
- speaker: Respondent
  text: Well, to make along story short, it wasn'tlong till Ralph was practically running that prison. He was efficient as
    he was as president of the plumbers union. I put him in charge of all thecrews that were out tearing down buildings. I
    couldn'thave hired a better man if I'd had unlimited resources and access to the best workers around the country. He never
    did take advantage of me, and I never took advantage of him. Every day I went out and watched his crew. He was the one
    that dismantled the hospital out at Stewart, as well as many other buildings. When he wrecked a building, every salvageable
    board was saved. There was nothing broken, nothing. The furniture was saved, and I just don'tknow how to
- speaker: Respondent
  text: describe the value of that man. He built the six houses. They're still down there. They're just as nice as anything
    built during those days, and a damn sight better construction. The best labor you can imagine went in there.
- speaker: Respondent
  text: Ralph just took over everything. Anybody that went with him, worked. They didn'tfool around. If they didn't do what
    he figured was their utmost and the best they could do, they were off. They were replaced. Then, they soon knew to be
    in Ralph's crew is the A-l, but you better work. You better not cross him up. So, that went on till he was ... he did
    his time. He didn'twant any parole. He didn'twant any supervision or anything. He did his time, and with good credits
    and everything, he did something like two years. Before he left, he sent word he'd like to talk to me. He come in.
- speaker: Respondent
  text: He said, "You know, I hate to go myself." He says, "This has been some of the most pleasant time I've had. I've enjoyed
    my work." He says, "I've enjoyed doing it for you. And I want to tell you, I thought many a time of the first time you
    and I met, and what I said. I could have cut my throat. I wish I'd known you before I said that." He says, "You're a hell
    of a man." He says, "I hope you stay herefrom now on. And if you ever come to Las Vegas, don't you fail to call me. I
    want to repay some of this."
- speaker: Respondent
  text: '"Now," I said, "Ralph, hell, I''ll call you when I come to Las Vegas. You''re a good man, and you''re a hell of a
    good worker."'
- speaker: Respondent
  text: So, Ralph left. Sometime after that I had to goto Las Vegas, and I took my son with me. He was just eighteen. And
    I called Ralph. In the meantime he'd married. He married a woman he'd been going with for some time and hadn'tmarried.
    She was some wheel in or ganized
- speaker: Respondent
  text: labor, too. Nice lady. I called him. I said, "I just thought I'd call and say hello and see how you're doing."
- speaker: Respondent
  text: In the meantime he'd got back and was president of the plumbers'union again. Hesaid, "Whereareyou staying?" I told
    him. Hesays, "Tonight I wanttotakeyou out to dinner." He said, "I want you to be my guest." And he said, "Where would
    you like to go?"
- speaker: Respondent
  text: I said, "Well, if you're taking me out to dinner, you decide where you want to go. You know these clubs better than
    I do." I says, "I got a problem. I have an eighteen-year-old son, and he's not going to be allowed in any of the gambling
    casinos."
- speaker: Respondent
  text: He says, "Have no fear. We'll pick you up." And sure enough, he and his lady, his wife, showed up, and I forget where
    we went, but he had a choice table. Anywhere he went in those clubs, he had choice whatever. As we were having dinner
    one of the security men came up, and he didn'tknow who was at this table, but he saw an underage person, and he wanted
    to know who he was, his age, and we didn't lie. We told him.
- speaker: Respondent
  text: Hesays, "Well, I'm sorry, but he'll have to leave." Alsup never said a word till that point. He says, "You go get
    so-and-so," whatever his name was, "and tell him that Ralph Alsup is at this table, and he wants to see him."
- speaker: Respondent
  text: When he said Ralph Alsup, it rang a bell for the guy and for the security guard, too. So he left, and pretty soon
    the manger came up.
- speaker: Respondent
  text: They shook hands. Ralph said, "This is Art Bernard, the warden of the prison. That's his son. They're my guests, and
    they want to seethe show and have dinner."
- speaker: Respondent
  text: He says, "That's fine. That's fine." And he said, "Nobody will bother you anymore." So, I came back and ran the prison.
- speaker: Respondent
  text: The prisoners were working out in the community, is that correct? All over the country. I told you about the building.
    But I had farm hands. Anybody that wanted a farm hand could come and get them, tell me what they wanted. I had good workers
    and dependable workers. I never lost one. I never lost anybody out of one of these work programs.
- speaker: Respondent
  text: They never tried to leave? They took off from the ranch. They weren't my trustees that were out. They were regular
    ranch hands - in mates under the jurisdiction of the ranch foreman. I had them take off from guards, but I never lost
    one from a work crew, never. Ralph wasn't the only in mate that I had in charge. If we have time, I'll tell you about
    others that were in charge of in mates. I had others. Butthefarmers I sent to the farms - they wanted some hay-bale buckers,
    I furnished them. And they paid me. They gave me credit for whatever the going rate was. They were just glad to get the
    men. They weren'ttrying to save money. They wanted dependable help. And I sure as hell had it. If they were paying hay
    buckers five dollars a day,
- speaker: Respondent
  text: I got five dollars a day worth of credit, and I took it in hay. They delivered the hay. If they were digging potatoes,
    I took potatoes. If it was something else, I took something else. I maintained our ranch. I got all the hay we needed.
    Potatoes, I got by the hundreds of tons. Growing potatoes in those days was quite profitable. They had big potato farms
    in Dayton, big potato farms in Carson Valley, and on down into Yerington and Smith Valley. They raised potatoes by the
    carloads. They needed to
- speaker: Respondent
  text: pick these potatoes, and they couldn'thave any potato pickers. I had the potato pickers. They needed to cull these
    potatoes. They had no potato cullers. I had them. This was during the time that they were picking them in the fall. Then,
    as the season went on, all these potatoes in these big potato cellars needed care, because some of them were rotting.
    They had to be moved. I had the potato movers. And I had trucks with potatoes coming to our prison farm. We fed our hogs
    cooked potatoes continually, and we had so many potatoes, I even started cooking them for the milk cows. They loved them.
    And I just don'tknow how many millions of dollars we saved, but I suppose, practically, we didn't buy any meat. We didn't
    buy any milk.
- speaker: Respondent
  text: I took their wages in trade. If I had sixty dollars coming from this rancher for so much work, I took sixty dollars
    worth of hay at the prevailing price, so we both gained. And the farmers were just tickled to death. They came to the
    prison in the morning, got the man, and brought him back at night. J ust tickled to death to get them.
- speaker: Respondent
  text: Did the prisoners get extra credit for doing this kind of work? They got work time. They didn't get any money, but
    they got, I forget, how many days a month work time. Between the work time and their good conduct time, they could do
    a year in about seven or eight months. They were all anxious to get out. And I had very, very few shirkers.
- speaker: Respondent
  text: I'm going to finish on Alsup. I never saw him again from the time that he took us to dinner. I went back to Vegas,
    but I didn'tcall him anymore. In the meantime,
- speaker: Respondent
  text: he got to be president of the plumbers union again, and he was having problems again. Paul Laxalt ran for governor,
    and Bill Sinett, his campaign manager, was an FBI man that Charlie Russell brought in when he in stituted the gambling
    commission. But anyway, Bill . . . God, I'd see him. He was a very good friend of mine. Tall, lank fellow. Came to me,
    and he said, "Do you know Ralph Alsup?"
- speaker: Respondent
  text: I says, "I surely do." He says, "Well, he's killing us in Las Vegas." I said, "Let me see what I can do."
- speaker: Respondent
  text: So, I found some business to do in Las Vegas. By now, I wasn't the warden anymore. I was in private business. I was
    a real estate broker and building contractor for a couple years. Anyway, I took time off, and I went to Las Vegas and
    called Ralph. Ralph wasn'tin. Hewas out hunting deer. I said, "When can I expect him?"
- speaker: Respondent
  text: Gee, I hated to wait till somebody gets a deer. Sometimes it takes all season. But I thought I'd wait a day or two,
    because I have sisters that got married down there and family. Fortunately, I can'tremember whether he got a deer or just
    decided to come back, but he came back early. I broached the subject, and I said, "I gather you're campaigning against
    Laxalt."
- speaker: Respondent
  text: '"Well," I said, "I thought that was it, but I just thought I''d mention it. Paul''s one of my best friends, and he''s
    a good man, one of the best. I sure wish you were supporting him instead of his opponent."'
- speaker: Respondent
  text: He says, "Art, if you want me to support Paul Laxalt, consider it done." Hesaid, "You tell Laxaltthat I'm in his corner.
    And you can almost depend on the plumbers' vote."
- speaker: Interviewer
  text: Well, I said, "Why don't you come up and tell him? It would sound better coming from you." He says, "I will. When
    should I come up?"
- speaker: Respondent
  text: I said, "Any time you want." He says, "I'll be up Friday." So, I got hold of Paul, and I told him that Ralph Alsup
    was coming up to talk to him Friday, and I said, "Arrange a lunch somewhere."
- speaker: Respondent
  text: So, hedid. Ralph came up. Wewentto lunch, and he told Paul, he said, "Art came down and asked me to support you, so
    I decided to come up and tell you I was going to support you. You can depend on the plumbers' vote."
- speaker: Respondent
  text: Well, Paul wasn't... he was surprised, but not disappointed, and we depended on Alsup's support. But about a week
    later, somebody walked up, rang Alsup's doorbell. He opened the door, and they poked a shotgun in his chest and pulled
    the trigger. They never did find out who shot him. But he didn't get to work for Paul.
- speaker: Respondent
  text: The unions were that violent in the 1950s? They were violent. Yes. They played rough. And I think they still do. Maybe
    not as flagrant as they were during that era, but if you read the papers, they're getting in trouble.
- speaker: Respondent
  text: Well, to get back to our building now. Ralph left before the buildings were finished, so I putthisfellow Bell, the
    black one, in charge.
- speaker: Respondent
  text: Long before that, shortly after I had taken over the prison, we had a burglary in Reno, and you may have heard about
    it. It was the number one burglary of the century - the Redfield burglary. Did you ever hear of LaVere Redfield? He was
    a very famous man. He had millions of dollars. He owned the whole east side of Mt. Rose. Hundreds of acres of timber in
    there. He had a nice home on Mt. Rose Street in Reno. He had a basement, and in this basement he had a safe, and he kept
    hundreds of millions of dollars - between silver and diamonds and rubies and jewels - in his safe. He loved to gamble.
    He'd go to the Riverside or the Mapes in those days, and anybody that would see him, would think he was just a farm roustabout.
    He wore old Levis, faded, patched, and he looked just likeatwo-dollar-a-day handyman. He had millions. Anyway, he had
    a wife. And he had a woman that did something with him, and she was his girlfriend. She knew everything about that house.
    She knew where everything was.
- speaker: Respondent
  text: All at once, this safe was robbed. The safe was carted away! Nobody know's how they got this heavy safe out of the
    basement. News pictures showed this narrow, steep stairway going down into the basement where he kept the safe with all
    this fantastic loot in it. How they got it out of there. . . there were no marks on the stairs of dragging or anything.
- speaker: Respondent
  text: So, they caught three of them. There were six of them involved, and one was the girlfriend. She masterminded the whole
    thing. She was a crook from a way back, with a good head on her. And she got a fellow from Reno, who was a bartender,
    and he in volved his brother, who was as in nocent as could be. And she imported three gangsters from Wisconsin. One of
    these gangsters was named J ohn something, and I forget it. He was a dandy from a way
- speaker: Respondent
  text: 'back. He was about five foot eight or nine, and weighed a hundred and fifty-five, sixty pounds, well built, dark
    complexion, handsome, conceited. He was accustomed to having everything he wanted and giving the orders. The three I got
    for the state prison were: the bartender, his brother, and one of the guys from Wisconsin. The others were caught across
    the state line. They were fleeing east. The girlfriend got caught over the state border. She and the other two went to
    federal prison. One of the three from Wisconsin had served on a murder charge back there, and while he was doing time
    here, they had a recap of his crime. Anyway, he''d been working on it when he got caughthere, and he was found not guilty
    on that. They reversed the decision. So, when he did his time here, he was going out. He was free. The other two came
    here to Nevada, and I''m walking through the yard after they were all sentenced. God, who do I walk into? Young Firpo,
    for God''s sake! A light heavyweight that was fighting when I was fighting. He was from Idaho, and he was a big middle
    weighter, light heavyweight. He was around 170 pounds. He was too big to be a middle weight, and too light to be a light
    heavyweight, but he was good. He was a contender. He won the Pacific Coast light heavyweight title, and I knew him, not
    too well, but I knew who he was, and he sure knew who I was. And do I come face to face with Young Firpo? I''m not going
    to tell you his name, because his brothers might still be in Reno. I don''tknow. But Young Firpo will do it. He fought
    under the name "Young Firpo." Many fighters took the name of so mebody that was famous, and Louis Firpo was a heavyweight
    who knocked Jack Dempsey clear out of a ring. Sothisguy wasfightingas Young Firpo. YoungFirpo now is not any taller than
    he was, but he was square, and he weighed around two hundred and two or three pounds,'
- speaker: Interviewer
  text: and he was all muscle, all man, strong as a bull, and just as friendly as he ever was. I said, "What the hell did
    you do?"
- speaker: Respondent
  text: He says, "I carried the safe. Don't you read the papers?" Firpo was nottoo smart. Hewasn'tdumb. Hewasjust naive. And
    when they were planning this burglary they had to figure out how to get this safe out of his basement. He said, "I got
    a brother could carry that safe." They made a harness for him. They got him down there, and they got that safe on his
    back. That safe had to weigh 300 pounds, and Firpo staggered up those stairs with that safe on his back, and they put
    it in a car, and they went somewhere north of Reno, some old minethat they found up there, and they blasted the safe open,
    got everything out of it, and shot the safe down in the hole. They recovered most of thejewelry and money. Anyway, that's
    how I got Young Firpo, and more about Firpo later.
- speaker: Respondent
  text: We'll get on to the building program again. We were on J ohn from Wisconsin, who was one of the three robbers that
    came to my prison. He refused to go out in the quarry and work. He says, "I wasn'tsenthere to work."
- speaker: Respondent
  text: Well, the warden will decide, so I told John, I said, "Everybody makes rocks here when they come. You'll make rocks.
    If you want to rest, I'll put you where you can rest. Nobody will disturb you."
- speaker: Respondent
  text: He says, "That's all right with me. I'm doing no rocks. I'm not going to get my hands blistered." So, I put him in
    detention. I said, "When you decide to go make rocks, send word."
- speaker: Respondent
  text: It was the next day he sent word. So, he went out, but before he went out, he says, "I can'twork. I've never worked
    in my life." He says, "I don'tknow how to work.
- speaker: Respondent
  text: I have no in tentions of working." "Well," I said, "you'll find out how it is there. They'll give you a hammer out
    there and chisel, and you'll see how the boys are doing. You'll learn."
- speaker: Respondent
  text: Well, he went out. Some of them couldn't do a very good job, but they had to do their work, so they'd buy rocks from
    somebody that was good at it, and they'd pay them five cents or ten cents a rock. This guy would do his rocks, also four
    or five extra, or six, whatever he needed, for this other guy who would pay him. Fifty cents was a lot of money to these
    guys, so he'd make five rocks and get fifty cents, took care of J ohn. He started hiring his rocks built, and he had plenty
    of money. He could call for whatever a mount he wanted. He had access back in Wisconsin. So, I heard about that. I called
    him in, and I said, "You're going to have to make your own rocks. You just can't buy them. I don'tmind somebody buying
    a few rocks, if they're hurt, or for whatever reason, but I'm not going to stand for somebody buying all their rocks.
    Now you're going to learn to make rocks."
- speaker: Respondent
  text: So, he went out, and then I had them watch him very carefully, and he started making rocks, but not very good. So
    the next time he took a turn out there he was a little bit better, and they told me, "J ohn's doing pretty good. He's
    making passable rocks. They're not as good as the others, but they can be used to fill in."
- speaker: Respondent
  text: So, he never complained again, and he went on making rocks, and then he asked if he could get a job as a trustee.
    Well, they came and asked me. The guards said, "His conduct's been good, and he's been doing the best he can. He'd like
    to get out of there and be a trustee."
- speaker: Respondent
  text: I said, "It's all right. He's earned it." So, we put him out on the lawn detail, cutting lawn and whatnot.
- speaker: Respondent
  text: Getting on Ralph Alsup's crew, as I told you, was the epitome of success. One day John came in and said,
- speaker: Respondent
  text: I says, "I don't put anybody on Ralph's crew. He picks hisown men. Ifyou can talk him in to takingyou, you're welcome."
- speaker: Respondent
  text: Well, hedid it. I don'tknow what he . . . maybeRalph decided to give him a chance, a crack, or something, but he took
    him. And that J ohn became a dedicated worker. He'd never had so much fun as he did when he learned to build. So, he got
    on the plastering crew, when they were building these six houses. They were all lath and plaster - no sheet rock there.
    Thevery best was none too good for us. When they were about halfway through the plaster job, the plasterer quit. He was
    released.
- speaker: Respondent
  text: So, I put J ohn in charge of the plastering. That was better for him than robbing a bank back in Wisconsin, if that's
    what they did. He got his parole date. His parole request came up, and he was granted parole and release on a certain
    day, and there was a house they hadn'tfinished. So, he came to me, says, "That house isn't finished."
- speaker: Interviewer
  text: Well, I said, "Some of the other guys will finish it." He says, "Nobody can do it right." He said, "Can I stay and
    finish the job?"
- speaker: Respondent
  text: I says, "How long will it take?" He says, "A good week, if I work hard." I says, "You spent I don'tknow how much money
    trying. . . ." When they first came in, he had lawyers from all over hell trying to get the sentence reduced. I says,
    "I don'tknow how much money you spent trying to get out of here. Now you want to stay?"
- speaker: Respondent
  text: He says, "I don'twant anybody to ruin my plaster job." I says, "All right, John, you can stay." He stayed six days,
    finished his plaster, and took off again for Wisconsin and the gangs.
- speaker: Respondent
  text: You're talking about people who really made changes in their lives by being allowed to work and being trusted to work.
    What kind of public response did you get to this program, to having the trustees out?
- speaker: Respondent
  text: Well, the only way I could answer that was if you'd have been here and read all the news media I have, and the report
    from the senate and assembly committee that came down. They couldn'tbelieve what I was doing. When I started building
    these houses, I wanted to build five houses. I built six, because I had extra material - sinks, and stoves, and everything
    - and I wanted to use them. Five was the original. And there were somethings I just couldn't buy, so I asked the senate
    committee for $15,000 to build five houses. They came down. They were all prominent men in those days. Some of them were
    good friends of mine. Some I'd never met. They came down, and I showed them plans of what I in tended to do, and they
    said, "You want fifteen thousand dollars for that?"
- speaker: Respondent
  text: '"My God, you can''t get started for $15,000. That''s a project!" I says, "I know it is, but I''ll do it for $15,000."'
- speaker: Respondent
  text: '"You can''t do it. You just can''t do it. No matter how good you are, you can''t do it." Well, I said, "Give me the
    fifteen thousand."'
- speaker: Respondent
  text: '"Well, we''ll give you more. You just need more money. We''ll give you more money than that." So, they gave me the
    fifteen thousand, and by the time I had the five houses practically constructed, and I had the rest of the material, I
    built another one. So, I built six, and I still hadn''tspent the fifteen thousand. They knew that. They came down, and
    it was not only publicized, but... . If you had time to read all these letters of what the warden''s doing. I just read
    one now about when Sawyer was defeated, they wondered .... I submitted my resignation, and Sawyer didn''taccept it, so
    some newsman wrote an account, a nice little column there. I can''ttell you what it is. You''d have to read it. It''s
    not very long, if you want to read it.'
- speaker: Interviewer
  text: You were getting positive publicity from the newspapers? Oh, yes, and from the people, from the legislature.
- speaker: Respondent
  text: I have a question about the guards and their relationship to the in mates. You talked about how, when they wereouton
    thework crews, the in mates wouldn't try to getaway from each other, but they would try everything to getaway from theguards.
    I'm just curious about what the relationship was.
- speaker: Respondent
  text: It wasn'tthat they didn'tlike the guards. It was the fact that the guards were watching them and guarding them, and
    it was a challenge to get away from them. Any time you challenge an in mate... or when you challenge somebody like with
    all these shootings, school shootings, and guys going a muck with a gun, and passing more gun laws, more gun laws, more
    gun laws. It's these gun laws that are creating the problem, because you're
- speaker: Respondent
  text: challenging somebody, telling them that they can't do that. "Well pass a law. You can't do that." They'll show you
    they can, and that's what these convicts would show that guard that they could get away, could outwit him. They could
    get away with it. They didn'twant to do that from one of their own, because they were on their honor to work there. If
    they violated that, they were violating the trust that one convict who was in charge of the crew had over the other men.
    They just didn'twant to violate that trust, because they weren'tgetting away from the establishment, so to speak. They
    were violating a code of their own.
- speaker: Respondent
  text: I never lost one, out of those. And I had hundreds and hundreds over the years. I don'tknow how many men went out.
    Never lost one.
- speaker: Respondent
  text: Did you ever have any cases where you saw the guards being unfair to the convicts? Never. Never. I watched that very
    carefully. I never had a guard that would deliberately torture anybody. There were guards that just had no use for the
    in mates, and the in mates knew it. There were guards that were friendly with the in mates, and that led to some problems,
    more problems than those that weren'tfriendly with the in mates, because any timethe guard got friendly with an in mate
    or two, they started taking advantage of him, of the guard. But I never had any sadistic guards. I had some that were
    more pleasant than others, but I never had a case where a guard was abusive to an in mate.
- speaker: Respondent
  text: Court of Last Resort / 'dlike to have you explain who Erie Stanley Gardner was. Let's talk about some of his articles
    and your relationship with him.
- speaker: Respondent
  text: Well, Erie Stanley Gardner was one of the most prolific and famous mystery writers of all time. I can't remember all
    the millions of books he sold and what countries they were sold in, but he was the tops in his field, and probably still
    is. I was an avid reader of Erie Stanley Gardner, because he wrote the kind of stories I like. And then he started this
    "Court of Last Resort."
- speaker: Respondent
  text: Tell me, was he trained as a writer? No, no. Erie never graduated from high school. He learned his law, so to speak,
    working in a lawyer's office. And when he passed the bar and got his license, he started working in Ventura, California.
- speaker: Respondent
  text: So, he was a qualified attorney? And developed into one of the most true. In those days a young attorney didn't get
    many cases, and the only cases he got were the when the judge appointed an attorney to so mebody that couldn'tafford it.
    He was a court-appointed attorney. Or somebody that could afford a little bit and might not pay it. So, he started getting
    all these cases, and a lot of them were Chinese. It got to the point where he was winning every case. He was likeJ ake
    Erlich. In fact, I'll have to talk to you about J ake Erlich.
- speaker: Respondent
  text: J ake Erlich wrote a book, A/ever Plead Guilty. It was a bestseller.] ake Erlich was the most prominent, famous criminal
    attorney in the San Francisco area for many years, in fact, till his death.
- speaker: Respondent
  text: And so, Erie would win these cases, but he never got any money, so he decided . . . some of them werevery, very interesting,
    these cases and how he got them off, so he started writing these stories. In order to eat, so to speak, he decided he'd
    have to write up some of these interesting cases and see if he could sell them. Well, he sold one or two, but it wasn'tanything
    that was going to go over too big, but he got interested in writingthen, and he started creating fictional characters.
    He concocted an apparatus that is now called an RV. A self-contained trailer, camper. He built this on the back of a pick-up
    truck, big enough to maintain a stove, a little table, a typewriter. And he'd head for the desert, so that nobody could
    bother him. He'd get no telephone. Out in this desert country, all over southern California, it wasn't populated like
    it is now. A lot of places that are cities now were nothing but wildernesses in those days. And he got acquainted with
    a lot of characters, who later got in trouble, committed, not murders, but killings, most of
- speaker: Respondent
  text: Court of Last Resort them in self defense, and were sent to prison. They didn't have any money to hire a lawyer, and
    if they did, they never got a good one. But they happened to be friends of Erie's, and when he heard that they were in
    prison, he'd investigate, find out that they had been railroaded, so to speak, and he'd give of his time, and eventually,
    I think, he never missed one. He got them all out.
- speaker: Respondent
  text: He was a great friend of Harry Steeger, who was the editor of Argosy magazine. Well, Erie was getting a lot of requests
    that he couldn'thandle, so hetalked it over with Steeger, and they decided that between Erie's legal work and Steeger's
    magazine, they'd start something, and they called it the Court of Last Resort.
- speaker: Respondent
  text: On a trip to southern Baja California on a camping trip, they discussed all these innocently incarcerated men and
    decided that, if they could get a group of men together who would work, who would donate their time, and pay their own
    expenses, they'd take as many of these cases as they could, and they called it the Court of Last Resort.
- speaker: Respondent
  text: 'And who were these volunteers? Were they experts of some type? Oh, yes. They were doctors and attorneys and investigators,
    who were so good that they could afford to work for nothing on special cases. And right at this minute, all the men that
    were involved don''tcometo my mind. Some of them do: Dr. LeMoyne Snyder, famous pathologist; Marshall Houts, former FBI
    a gent; Alex Gregory, world famous polygraph expert; Park Street, legal specialist from Texas; and, in later years, Art
    Bernard, penologist.'
- speaker: Respondent
  text: Steeger publicized this in the Argosy magazine, and then they began getting requests from near and far, and
- speaker: Respondent
  text: they had to bevery careful. The only failures they had were where they could get absolutely no cooperation from the
    state officials. For in stance, on on efamouscase back in the Midwest not only would the prison not cooperate with them
    and gave them absolutely nothing, but the governor sent word for them that they better leave the state, that they weren'twanted.
    Aside from that, some cases were not quite that bad, but no cooperation. Everywhere where they got cooperation from the
    state institutions, they got the man off, and it's along, long story. They put out two issues of the Court of Last Resort,
    and in one of them he tells of many of these cases.
- speaker: Respondent
  text: Did they approach you to work with them? Well, they did eventually. After I got with Gardner, I served on the court.
    I was responsible for getting a couple of guys off. Also, in working with Gardner, while at the prison, I started interviewing
    murderers on why they committed the murder they did and why they hid the body where they did, because they would commit
    a murder in a place and take the body three or four hundred miles away. I had a hunch why they were doingthat, but I wanted
    it right from the horse's mouth. And sure enough, when they committed a murder, it happened to be wherever it happened
    to be. Then, they had a body to dispose of, and they didn'tknow what to do or where to put it. They'd wrack their brain,
    and they werevery familiar with some out-of-the-way place, and they'd go there and hide that body. Almost inevitably,
    that's what happened.
- speaker: Respondent
  text: There was a journalist with one of the big papers in San Francisco. Ed Montgomery was his name. He and I werevery
    friendly, and he was very friendly with Erie Stanley Gardner. I made tapes of all these interviews -
- speaker: Respondent
  text: Court of Last Resort hundreds of them. I'd send them to Gardner, and Montgomery was one who read every one of them.
    He used my material to find a body that had been hidden in Northern California. Everything that I had in these records
    led him to this body hidden in a grave on a side hill where no one would have suspected, because the girl weighed 115
    pounds, and this suspect weighed 135. He was a veteran, and he'd had various illnesses and no strength - he almost couldn'tcarry
    his own pants. After they found the body, following my recommendations and interviews, then they had to prove that he
    could do this - whoever had murdered thegirl. They found thegirl buried on the side hill. Whilethepress were describingthis
    story, they had her buried on a side hill that was full of downed timber and trees - impenetrable. In fact, some of them
    said it's hardly possible for a deer to get through there, let a lone a man carrying a body. That he kept up, kept trying
    and trying and trying . . . and hetold me later, he says, "I think it was those interviews with you. I knew that had to
    be there."
- speaker: Respondent
  text: He finally traced him by his gasoline trail up there. Hisfolkshad a summer cabin up there on this creek that was good
    fishing. And he'd go up there and stay all night and think. One night he was there, and he thought he smelled something
    that reminded him of a dead body, but he couldn'ttell where it was coming from. There was a trapper lived down the canyon,
    and he knew where he was, who was a bear hunter, and he had some blood hounds that he used to track bears. At one o'clock
    in the morning, he went down and hired this fellow, got him out of bed, and said, "There's a smell. There's a body smell,
    and I want to find it."
- speaker: Respondent
  text: This guy came up with his dogs, and they circled around there, and just about daylight the dogs found . . .
- speaker: Respondent
  text: there was one little foot sticking out of the ground. They found it. He hadn'tburied her too deep. And naturally he
    couldn't. He was up there probably without tools. Anyway, in the passing of three or four months, the ground had settled,
    and there was one foot sticking up, and just that little foot made the smell that he smelled and that the dogs smelled
    later.
- speaker: Interviewer
  text: So, at this point, when you were doing these interviews, did you already know Gardner at that point?
- speaker: Respondent
  text: Oh, yes. I was doing these interviews and sending h i m the tape. M on tgomery and oth ers h ad access to th ese tapes.
    Gardner, any friend that he knew that was an in vestigator, he'd say, "Come, listen to these tapes." And they did. Those
    tapes are now in the University of Texas, in the Erie Stanley Gardner Room. Before he died, Erie Stanley Gardner willed
    his office, in tact, with everything in it, to the University of Texas, and when he died they moved everything. They rebuilt
    his office down there, and everything that he had in that office went to the University of Texas, except that rocking
