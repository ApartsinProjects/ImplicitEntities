- speaker: Respondent
  text: '"Oh," he says, "that''s my boss." He says, "I work at the Bristol Mine. Sure," he said, "he''s coming in."'
- speaker: Interviewer
  text: I said, "Will you see that I meet him?" "Oh, yes," he says, "No problem." He said, "Let's go watch the fights."
- speaker: Respondent
  text: The crowd was gathering around the ring built in a sort of an amphitheater behind the Standard Service Station, and
    here was this ring, and the ring was surrounded with people. Up in the ring was a man walking around. He had on a pair
    of pants, but no shirt. He was the meanest looking thing I've ever seen. J ust to look at him frightened me, and he was
    just a mass of tattoos all over his body. You couldn'ttell where his nose started or where it ended. His eyebrows were
    masses of scar. He had a flat nose and mean-looking eyes. And this guy's name was Iron J aw Slade. He was one of the principal,
    main-event fighters, and he was pacing around this ring all by himself. They soon learned that his opponent, whatever
    his name may have been, didn'tshow up. So they didn'thave anybody to fight, and after the crowd was getting exasperated,
    the announcer said whatever his name was is not going to show. "Iron J aw will meet
- speaker: Respondent
  text: Mining, Mucking, and Boxing anybody in the crowd. Anyone that can stay with him for two rounds gets twenty dollars."
- speaker: Interviewer
  text: There was a lot of excited talk around, going back and forth, and my friend Tony said, "You a fighter?" Tony was an
    Italian and spoke with an accent.
- speaker: Respondent
  text: '"No," I said, "I wrestle, but I don''tknow a thing about fighting." Asa kid around thisfarmingcommunity, wrestling
    was the sport of everybody, and I was pretty good. I could throw anybody my age and size and could even handle a lot of
    the older teenagers and men. But I didn''t think I was really in the condition to wrestle with anybody, so I just told
    him that I was not a boxer, but I knew a little bit about wrestling.'
- speaker: Respondent
  text: And he started to push me up into the ring, and he got three or four fellows around him. They all helped him, and
    I found myself up in this ring. Here was this brute of a man. I didn'tknow what to do or what to say, and I don'tremember
    if I said anything, or anything else, but the people who were promotingthisfight, or running it, came over with a pair
    of boxing gloves and put them on my hands, and I was so frightened, I didn'tknow ... I couldn'tresist. They gave me all
    the instructions about what I was supposed to do, which didn'tmean a thing.
- speaker: Respondent
  text: They took me over to the center of the ring, and here came Iron J aw. He didn't say anything; he just looked at me.
    And then I was told to go to my corner, which was strange to me at the time, but I know now what they meant. "Come out
    at the bell!" The referee had given us a lot of in structions, which I didn't pay any attention to. My mind wasn'tthere.
    Nothing was there. From the corner, the bell rang, and here came Iron J aw right across the ring, looking at me and his
    hands in a fighting position. When he got near me, I was so frightened, I don't
- speaker: Respondent
  text: know what I did, except I jumped all over him, and I screamed and scratched and probably kicked and bit. I don'tknow
