- speaker: Respondent
  text: While we were there, a lady came up, and she called me every name she could think of. She says, "You pick on my brother!"
    By the way, this J igs Keele was bigger than I was. He was bigger than Ed. She said, "You pick on
- speaker: Respondent
  text: them. You're a big bully." I weighed 170 pounds. I was smaller than any one of these. She says, "I've got one brother
