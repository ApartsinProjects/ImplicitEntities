    Oh, they made quite a to-do about it.
- speaker: Respondent
  text: I don'tknow what they thought of me, but everybody was trying to help. The barber was there, and he says, "Come on.
    I'll open the shop and clean you up." My shirt was full of blood. My coat was all right. Bill Adir had that. Blood didn't
