    as hell, and I was happy with Finnegan. I just thought, 'Well, hell, just on edrink.'" So hesaid, "I said, 'Finnegan,
    let's have one drink.'"
- speaker: Interviewer
  text: Hesaid, "Finnegan says, 'No. I promised the warden.' I says, 'What the hell? One drink won'thurt you.'"
- speaker: Respondent
  text: And I says, "That's it. One drink wouldn'thurt you? One drink sent Finnegan off." Anyway, I had Finnegan back. So,
    first chance I got, when the cook I had was paroled, I got Finnegan back. It was like a homecoming. He was good for quite
