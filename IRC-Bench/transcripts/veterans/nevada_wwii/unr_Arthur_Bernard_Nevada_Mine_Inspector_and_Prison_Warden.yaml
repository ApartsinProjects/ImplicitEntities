- speaker: Interviewer
  text: He says, "Are you Art Bernard?" I said, "Yes, I am." He says, "I gather you had some problems with my brothers."
- speaker: Respondent
  text: '"And I gather you told my sister that she''d have to bring the whole family along to take care of you."'
- speaker: Respondent
  text: I said, "I think I madethat remark," and I knew I was in for the beating of my life. "Well," he said, "step outhere
