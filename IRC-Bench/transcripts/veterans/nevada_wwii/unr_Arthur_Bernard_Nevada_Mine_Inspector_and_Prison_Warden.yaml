    He had all the money hewanted. His brothers sent him enough money to bankroll a game in a regular gambling casino, if
    necessary, if he'd had the opportunity. He did a good job. He never violated his trust.
- speaker: Respondent
  text: I was the sort of a warden that every morning, everyday, I went through my yard, and I knew who the troublemakers
