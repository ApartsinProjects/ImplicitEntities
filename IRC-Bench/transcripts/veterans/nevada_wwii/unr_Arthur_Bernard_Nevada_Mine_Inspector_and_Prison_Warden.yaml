    hadn't given me that one drink. Damn it! Spoiled everything."
- speaker: Respondent
  text: Finally, he'd served enough time, and he promised faithfully that if he ever got out, he sure as hell wasn't going
    to take that one drink from anybody, so I got him paroled again. I forget now where I paroled him to, but it was out of
    town. The next thing I knew, I got a letter from Finnegan, and he was in the Wyoming State Prison, and he told me the
