- speaker: Respondent
  text: S ince 1965 the University of Nevada Oral History Program (UNOHP) has been collecting an eyewitness account of Nevada's
    remembered past. While there is no standard chronicler profile nor rigid approach to in terviewing, each oral history
    plumbs human memory to gain a better understanding of the past. Following the precedent established by Allan Nevins at
    Columbia University in 1948 (and perpetuated since by academic programs such as ours throughout the English-speaking world)
    these manuscripts are called oral histories. Some confusion surrounds the meaning of the term. To the extent that these
    "oral" histories can be read, they are not oral, and while they are useful historical sources, they are not themselves
    history. Still, custom is a powerful force; historical and cultural recordsthat originate in tape-recorded interviews
    are almost uniformly labeled "oral histories," and our program follows that usage.
- speaker: Respondent
  text: This transcript has been lightly edited for readability. The UNOHP uses certain editorial conventionsto add
- speaker: Respondent
  text: context to written representations of the spoken word. Amusement or laughter is represented with [laughter] at the
    end of the sentence; and ellipses are used, not to in dicate that material has been deleted, but to in dicate that a statement
    has been interrupted or is in complete . .. or there is a pause for dramatic effect. For readers who are interested in
    examining the unaltered records, copies of the tape-recorded interviews can be accessed by appointment at the UNOHP's
    reading room in Reno.
- speaker: Respondent
  text: As with all oral history projects, it should be noted that Art Bernard has recorded his remembered past, and whilethe
    program can vouch that this is a true representation of his recollections as provided to the interviewer, memory is never
    flawless. Readers should exercise the same caution used when consultinggovernment records, newspaper accounts, diaries,
    and other primary sources of historical in formation.
- speaker: Respondent
  text: A rt Bernard's ability to learn a variety of languages early in his childhood predicted two important character traits
    of a westerner - a quick mind and a willingness to meet challenges head-on. Born in Italy to American parents, his father
    deserted the family soon after Art was born. Art first came to the Un ited States at the age of five, in 1915, and lived
    with his mother and stepfather in Utah. By the age of eleven, he decided to strike out on his own and work in a sheep
    camp, but without mentioning it to his mother.
- speaker: Respondent
  text: From then on, Art's life is the story of Nevada during the 1900s. He worked in several of Nevada's major industries,
    starting as a camp tender for a sheepherder, and then served a stint as a ranch hand. When he discovered that mining paid
    more than ranching, and even though he was still underage, he finagled a job in the Bristol underground mine at Pioche,
    Nevada. Along the way he became a prizefighter with a reputation as the
- speaker: Respondent
  text: Nevada boxer to beat - in or out of the ring. Later he traveled the state, first as a deputy inspector of mines and
    later as the head of the agency charged with overseeing mining safety.
- speaker: Respondent
  text: Art rubbed shoulders - or more accurately hunted, fished and mined - with some of the top political figures in the
    state. Most became his friends. When his friend Charlie Russell was elected governor, Art accepted an appointment as warden
    of the Nevada State Prison. Although the position started out as a temporary favor for a friend, the prison's problems
    proved to be an in teresting challenge, but no match for the Nevada miner with a common sense approach to finding solutions.
- speaker: Respondent
  text: Art Bernard and I first met at his ranch-style home in Carson City in August 1999. He a greed to give his oral history
    in mining as part of the university's statewide mining oral history project. Tall, trim, and alert at 89, Art's life covered
    so much more of Nevada's history beyond miningthat we spent many pleasant afternoons on the sun porch at his home taping
    his first-hand experiences of Nevada from nearly nine decades of living here. Art proved to be an experienced storyteller,
    and his descriptions of various small town mining characters at Pioche are laced with humor and compassion. Bar-room brawls,
    mucking contests, and miningaccidents without nearby medical aid - all gave way to stories about some of the inner workings
    of Nevada politics in the 1950s and 1960s.
- speaker: Respondent
  text: Ifthereisastereotypeofatruewestern gentleman in Nevada, Art fits the mold. He is an in dependent thinker, aman of
    courage who still meets life straight on and learns from every experience. He was the Nevadan who hunted deer and ducks,
    taking along his dogs and friends every autumn. He measured other men by his own high stan-
- speaker: Respondent
  text: dardsof hard work and honesty. Art is also a family man, who is devoted to his wife, children, and grandchildren.
    This oral history is his story.
- speaker: Respondent
  text: 'VICTORIA FORD December 2003 1 /ictoria ford: Today is August 16,1999. My name w is Victoria Ford. I ''mhere with
    Art Bernard in his home in Carson City. Art, let''s start and have you tell mejusta littlebitaboutyour background. Tell
    me where you were born and raised.'
- speaker: Interviewer
  text: I was born in Italy on April 27, 1910.
- speaker: Respondent
  text: And how did you come to be in Italy? Well, my mother and father were married in a place called Delzell, Illinois,
    and his folks lived in an area not far from a place called Rocca Corneta, which is about fifty mi les from Bologna. They
    werevery wealthy people. They owned practically all the countryside. It was on the Reno River in Italy, and I'm tryingto
    figure out what the name of that little town is.
- speaker: Respondent
  text: Well, it might come back to you, then. But they owned a lot of land in that area? Oh, much land. Much land. There
    were six boys and two girls in the family, and none of them ever worked. I don'tknow which ones were the last to die,
    because I was never close to the family. My dad left my mother. I was born shortly after they went to Italy and visited
    with his folks. And then he got a cockamamie excuse that he had to come back, that he was called into the service, and
    she never saw him again. He left her there, and we were there until I was five before we could make arrangements to get
    back. When we got back to Illinois in this same town, Delzell, she divorced my father.
- speaker: Respondent
  text: 'So, if you were there until you werefive, Italian must be your native language, then? I spoke Italian fluently. When
    my mother married my stepfather in Salt Lake City, Utah, we were continually moving from one mining camp to another, and
    most of the miners were foreigners: Italian, Mexican, Serbian, Swedes, Cousin J acks, Englishmen - every nationality.
    I naturally went to school and associated with all these foreign kids, and we visited from home to home. Most of these
    kids didn''twant to speak their parents'' tongue, for some reason. Never bothered me. I used to like to talk with their
    parents, and in their language. And I got so I knew practically every one of these foreign languages. Today, I can still
    remember a few words in various languages, but not too well.'
- speaker: Respondent
  text: There were Italians. In fact, my folks - after my mother married my stepfather who was also Italian - spoke Italian
    in the home amongst themselves. I got so I
- speaker: Respondent
  text: could speak Italian as well as they could. After I began working in the mines, everywhere I went, there were Italians
    as well as Swedes and all the other nationalities. I spoke Italian with these Italians, and they were so impressed with
    the fact that I could speak Italian that they helped me all they could. I mean, getting fluent in Italian, again, was
    nothing. I got to the point where I not only spoke Italian - the fluent Italian language - but I knew every dialect of
    the Italians in Italy, and there's a lot of them. People in those days, from a town ten miles or so away from where they
    lived - they all spoke Italian, but a different dialect. Some of the people in this one particular town had never been
    as far as the other town, and when they left, they came to America or to Australia or to South America, wherever they
    were going.
- speaker: Interviewer
  text: I got to where I enjoyed speaking Italian. I knew every dialect. You learned it from the other miners?
- speaker: Respondent
  text: From the other miners. From the Tuscans, the Bergamasks, the Venitians, every dialect I knew. And they so enjoyed
    me speaking their dialect with them. They really thought this was something; they'd laugh and laugh. And I learned every
    song. I could sing it, I could read it, I could write it, I knew every dirty joke, [laughter] I thoroughly enjoyed speaking,
    not only Italian, but the other languages that I learned, particularly when I was in Bingham, Utah, during World War I
    and going to school there. Most of the foreigners there were Serbians and Austrians, and I got pretty good at those languages,
    but I can'tremember any of that anymore. As I say, I can speak a few words in one or another.
- speaker: Respondent
  text: In 1920, my stepfather, who was a mechanic and a miner, got a contract to drill an irrigation tunnel from a place
    known as Sanpete County. A man there, a rancher named Chris Larson, had thousands of acres of land but no water - I mean,
    not enough water to irrigate them. He somehow obtained water rights on the other side of the mountain and almost to the
    top of the mountain where .... Oh, I couldn'tthink now. The vertical distance from one valley to the side that came down
    into this valley. But the tunnel length was .... I couldn't remember that exactly, either, but it was about a mile. He
    got a contract to drill a tunnel through there to pick up the water on one side and bring it into the other side.
- speaker: Respondent
  text: I think it took him better than a year to do that. By then he had made so many friends, and he was quite a mechanic
    on anything. Automobiles were coming along about then, and he was interested in working on automobiles. He got a job as
    a mechanic in the Hupmobile garage. That is not the name of the garage, but they had the Hupmobile agency.
- speaker: Respondent
  text: Did they sell Hupmobiles, too? Yes, they did. That and Model-T Fords. I grew up with the people there in Ephraim.
    We were the only gentiles in town. The rest were all Mormons, solid Mormons. I associated with those kids, whose families
    were either Swede or Danes or Norwegians. There, again, in visiting in their homes, the old folks spoke their language.
    The kids didn'twant to. I would speak with their parents and enjoyed it, and 11 earned those languages. But in thistown
    of Ephraim, there was very little work. The only work was ranching, and I got into it. The kids there, when they were
    big enough to sit on a plow or drive a team of
- speaker: Respondent
  text: horses, they worked. Seeing a seven or eight or nineyear-old boy out drivingateam plowingwasnothing.The horses knew
    what to do, and all the boy had to do was sit on the plow, and the horses took care of the rest. But everyone had to work.
- speaker: Interviewer
  text: And where did your mom and stepdad get married? They married in Salt Lake City. But they met in a mining town?
- speaker: Interviewer
  text: They met at the mining camp of Ophir, Utah. How old were you when you started working on the ranches?
- speaker: Respondent
  text: I was about ten. When I was eleven, I decided to leave home, and I got a job as a camp tender at a sheep camp.
- speaker: Respondent
  text: I forgot to tell my mother that I was leaving, and I left and went up to this sheep camp. I had quite an experience.
    If you read my book, I described that. I was going upthere with a stringof seven pack horses. Oneold mare had a colt,
    and he was scurrying around and bothering her. We were going up a steep side hill at an elevation of about ten thousand
    feet, and he pushed his mother off balance, and she rolled down the mountain. Well, the horses were tied nose to tail,
    and I had a whole mess of horses scrambling around trying to get up, and all the rock salt and groceries I had on those
    horses was scattered around the mountain. I was eleven years old. I was riding a very, very cool, calm horse, and he saved
    the day. I gathered what I could and packed up. I found this sheep camp where I was goingto, and I don'tknow how,
- speaker: Respondent
  text: but I managed it. I was there that time, I think, eleven days, and I got a spot of dysentery, and I had to go home.
    And that's the first time my mother knew where I'd been.
- speaker: Respondent
  text: I did some awful things to my mother when I was a kid. You were adventuring, yes? Yes. Anyway, I worked every summer
    on ranches. I herded sheep. When I was thirteen, I had an entire band of sheep, and I lambed it all a lone while living
    in the camp wagon. I was the help. The boss's son was supposed to stay there and do the work, but he was busy chasing
    girls. He found out I could do the work, and I practically lambed a thousand head of sheep. I had sheep in the camp wagon,
    under the bed, in the bed, in the oven, a nythingto keep them from freezingto death - for the lambs that the mother died.
    They were called "beeter" lambs. I don'tknow what that ever meant. I never tried to figure that out. But I did that, and
    I followed threshing machines. I pitched hay. I did everything in connection with ranching, but the pay was not much -
    if you got paid. They didn'talways pay, the farmers you worked for. If you worked in the spring, they paid you when they
    sold the crops in the fall. If you worked in the fall, they paid you when they sold the lambs in the spring. It was kind
    of a vicious circle. And we, of course, knew that there were ranchers who were working in the mining towns, and they'd
    come back with fabulous stories about gettingfour and five dollars a day, and all of them with a new Model-T Ford.
- speaker: Respondent
  text: And how much were you making on the ranches? Oh, I got as high as thirty dollars a month as a camp tender, but the
    sheepherders themselves made from fifty to seventy-five. Labor around the farms was two to two dollars and a half a day
    for grown men.
- speaker: Respondent
  text: Mining, Mucking, and Boxing S o you could make almost twice as much in the mines as at farming? Oh, yes. At least
    twice as much. But they couldn't all leave and go to the mines. Most of the men got married when they werevery young,
    and they started having their children right away. They couldn'tleave the farms. But myfriend Ray Nielson, whom we called
    Swede - his father was the town constable - and I sold our bicycles. I think we got ten dollars a piece, and we hitchhiked
    back to where I'd started school and where my mother met my stepfather. And we went there because I remembered the town
    and how to get there.
- speaker: Respondent
  text: So, Swede and I hitchhiked, and it was pretty tough in those days. There werevery, very few automobiles and very,
    very few roads. Roads in those days were mostly just wagon roads. Cars weren'tvery plentiful at that time. But we made
    it, and we finally got to Ophir, Utah. And
- speaker: Respondent
  text: we went to the collar of the mines in the morning. That's where they do the hiring. And to make it short, they told
    us to come back in about five years. So we had to leave Ophir, and we didn'thave much money left. We'd been subsisting
    on stale donuts - we could get three or four or five for a nickel - for some time. And we got back to Stockton, Utah.
    There was one big mine there called the Honerein. From Ophir to Stockton was about fourteen miles. We walked it all. Never
    got a ride that time, and we got thereabout dusk. We were cold, very cold - it was in October. So we wound up down to
    the mine, and they had a big stable with horses and mules - they used horses and mules to draw their ore cars back and
    forth into the mines.
- speaker: Interviewer
  text: Even though there were cars at this point, there were not engines and rails underneath in the mines yet? They were
    still using horses and mules?
- speaker: Respondent
  text: In many mines. Not all mines. Only in mines where they could get the animals into. Some mines, they did takethem underground
    and put them on a skip, which is a mine elevator, and takethem down to lower levels, but most of the animals were used
    on tunnels that started at the surface some place.
- speaker: Respondent
  text: So, about dark, we wound up . . . we knew that it was taboo to go into a barn, but we were cold. We had to do something,
    and we went in, got behind the mangers, and covered ourselves with hay. And we spent a very unrestful night. About five
    o'clock in the morning, an employee came in to feed the horses, and he found us. Naturally, he told us we were not supposed
    to be in there. It was strictly prohibited for anybody to be in the barnsfor fear of fire. In those days, hobos did a
    lot of traveling, and
- speaker: Respondent
  text: Mining, Mucking, and Boxing they slept wherever they could, and they all smoked. Many a barn went up in smokethen.
    So this was frowned upon. We told him of our problems, being short of funds, very short of funds, hungry, cold. He was
    an understanding young man, and he said, "Well, I'll tell you, I won't report you. You just stay here. And at seven o'clock,
    the boarding house will open." And at seven o'clock it was still pretty dark. He said, "You just walk in with all the
    miners. Don't act like you're a stranger. J ust go in with them, sit down. Nobody will notice you or pay any attention
    to you. Get yourself a good breakfast." So we did that. Then he said, "And then, when you go to the office to rustle,
    don'ttell them that you had breakfast." So we did that. We went in, and when they started bringing out the food, we thought
    this was our first trip to heaven. There was bacon, eggs, sausage, hot cakes, potatoes, big vats of coffee; and we loaded
    up.
- speaker: Respondent
  text: T h en after breakfast, we were goi n g to the offi ce, and I said, "The fellow told us not to tell them that we had
    breakfast, but I think we ought to thank these people, whether they knew we were having breakfast or not."
- speaker: Respondent
  text: Swede says, "No," he said, "let's do what we were advised and not get in trouble." We went into the office, and I
    assume it was the mine foreman sitting at his desk. There was a very handsome, big man talkingto him. He had English riding
    breeches, English riding boots. He was a man who I later knew. He was six feet high and weighed 190 pounds, had a black
    moustache. Very handsome man. We asked thisforeman, or whatever his title may have been, about a job, and he smiled and
    told us the same thing that they told us up in Ophir, "Come back in about five years. You kids are too young." I was fifteen
    and Swede was seventeen, but I
- speaker: Respondent
  text: looked the oldest, and I was the biggest. So he said, "We just couldn'thire you, but come back when you're older."
- speaker: Respondent
  text: We thanked him, and I said, "And I'd like to thank you for breakfast. We were hungry, and we went in with the miners,
    and we had breakfast. We can't pay you, but we might do you a favor some time."
- speaker: Respondent
  text: He said, "Think nothing of it, son." He said, "Glad to feed you." And as we were going out, this tall young man tapped
    me on the shoulder.
- speaker: Respondent
  text: He said, "J ust a minute." And he asked why I wanted to go to work in the mine, and before too long, he had my history.
    He said, "Well, I can't do any good for you now, but if you're still in the mood to work in a mine a year from now, and
    if you ever happen to be around Pioche, Nevada," he says, "you look me up. My name is J ack Beuhler." And he got a piece
    of paper and wrote it down. Hesays, "I'm goingdown thereto takeover a mine. I'll give you a job."
- speaker: Respondent
  text: So the foil owing year, I didn'tfool around with Swede. I accumulated what money I could, and I finally hitchhiked
    and made it to Caliente, Nevada, between automobiles, walking, and side-door Pullmans. And I got to Caliente, and it was
    the day before Labor Day, which didn'tmean a thingto me at that time. I learned that the train from there went to Pioche
    the following day, and I thought, "I don'tknow what I'll do here tonight. Maybe somebody's going to drive there. You can'ttell."
    So I went into a saloon, one of the biggest ones I could see. It was called the Buckaroo Saloon, and it happened to belong
    to the county sheriff, a man named Charlie Culverwell. So, when I got up nerve enough to go up to the bar and ask the
    bartender, I explained my predicament, and I says, "I'm tryingto get to Pioche, and I was wondering if
- speaker: Respondent
  text: Mining, Mucking, and Boxing you know of anyone that's going to Piochethat I could go with." "Well," he says, "you're
    lucky." He said, "There's a fellow righthere now, standing over there, and he has a cleaning department. And he comes
    down here and gets clothes and takes them back to Pioche and cleans them, delivers them back here. He'll begoingback pretty
    soon." The bartender called the man over, says, "Hey, there's a young fellowhere looking for a ride to Pioche."
- speaker: Respondent
  text: '"Sure," he says, "I''ll take him." So, he turned to me and said, "I''m goingto be a few minutes yet gettingthings
    ready and getting these clothes piled up, and then we''ll take off and go to Pioche." So we did, and he had a Star automobile,
    Star Touring. In those days, they were known as "High Gear, All Year." Snappy little car. It was so snappy that over this
    wavy, winding, dirt road to Pioche, I had to push it most of thetime up the grade. It didn''thave power. It wasn''trunning
    very good. This car, if it had been in good workingcondition, would have sailed up those I ittle grades, but it didn''t.
    Took us a longtimeto get to Pioche, and in the meantime, he was a man about thirty-five or so, and he got all my history,
    too. He said, "Tomorrow is Labor Day." He said, "You can''t get a place to stay in town. There''s absolutely no rooms,
    and it would be even hard for you to get in a restaurant to get something to eat. I''ll see that you get something to
    eat, and I''ve got a room in the hotel there. If you want, you can sleep with me."'
- speaker: Respondent
  text: '"Well," I said, "that''s fine." So when wegotto Pioche, he told me where his room was in the Wyoming Hotel.'
- speaker: Respondent
  text: And what was this fellow's name? His name was Pete Wadzagar. They called him Haywire Pete, and he was a character.
    I didn'tknow it yet, but I learned in years to come. His cleaning establishment was a little corner in the Sagebrush Saloon,
    owned by a fellow named J ohnny Valente, with whom I becamevery well acquainted in years to come and had business dealings
    with. His cleaning outfit was a fivegallon can of some kind of fluid, and he'd dip the clothes in there, shake them around
    a little bit, wringthem out, hang them up to dry, and press them. He had a wood stove there with a big iron and an ironing
    board. Very primitive, but he did a pretty good job. But anyway, he says, "I'll be busy here. You go on down to the Wyoming
    Hotel." He showed me where it was, and he said, "My room is number eleven. You just go on up there, and I'll be down after
    a while when I get time, and I'll see that you get something to eat."
- speaker: Respondent
  text: So I went to the Wyoming Hotel. It was a big frame building, as all of the hotels in Pioche were and in most mining
    camps. I found the stairway - all the rooms were upstairs. I went up, and I found room number eleven, and I opened the
    door and went in, and I'd hardly got in there when someone else came in the room, and it happened to be the landlady.
    She wanted to know what the hell I was doing in that room, and I told her that the fellow that rented the room told me
    that I could sleep with him that night until I could make arrangements to go to work. I was looking for a man who had
    promised me a job in a mine. She exploded. She says, "That bum hasn'tpaid his room rent for weeks and weeks! I should
    have kicked him out a longtime ago." I could tell by her accent that she was Italian. She was a woman, at that time about
    thirty-five, a very plain-lookingwoman, a very efficient-looking woman. I started talking Italian with her,
- speaker: Respondent
  text: Mining, Mucking, and Boxing and she sat and looked at me with her mouth open for a while. I gave her my history, and
    I told her that I had been promised a job, and that I needed a place to sleep, so Pete Wadzagar - I didn'tknow his name,
    but I knew it was Pete; the Wadzagar and Haywire Pete, I hadn'tlearned yet - had told methat I could sleep with him. I
    explained that I'd come to Piochewith him, hitchhiked with him. She says, "Well, you can'tsleep with that guy. He's no
    good. I'll give you a room to yourself."
- speaker: Respondent
  text: I says, "I can't pay for a room." She says, "Nobody asked you to pay for it. You just come, and I'll show you where
    you're goingto sleep." All I had was a little kind of a knapsack bag in which I had what few things I had with me.
- speaker: Respondent
  text: When I saw Pete later on, I told him what had happened, and I said, "I may have got you in trouble. I don't know."
- speaker: Respondent
  text: He says, "Oh, don't pay any attention to her. It's just her bark isworsethan her bite. She'sa good woman. She isn'tgoing
    to throw me out," and she didn't.
- speaker: Respondent
  text: So I found out then that her name was Amelia Meselod, and that she and her husband owned and ran this so-called hotel.
    Her husband, at thetime, was in jail in Carson City. He had been caught bootlegging. Every once in a while, the bootleggers
    were expected to get caught and do a littletimeto makethe sheriff look good, who always advised them when the Prohies
    [Prohibition Agents] were coming, so there would be no booze around. But in order to allay suspicion, they all had to
    take their turns doing six months in jail. So her husband, at the time, was in jail. She had two daughters. The next morning,
    I went uptown to explore. The town was just bulging with people.
- speaker: Respondent
  text: How many were there at that time? Do you know ? The population? I have no idea. There were probably 2,000 people running
    around there, but not just from Pioche, from the surrounding country. They all came to Piochefor the celebration. This
    was Labor Day, and Labor Day is the day in mining camps. They have boxing contests or races, tug-of-war, a nythingyou
    can think of. The two big events are the mucking contest, the drilling contest, and the prize fights. So I went in, kind
    of slithered along with the population into the Sagebrush Saloon, and I found a place to sit in conspicuously on a bench
    along one of the walls. In fact, all the walls were lined with benches. In the back of the place was Pete Wadzagar's cleaning
    establishment and a restaurant. I sat down at this bench trying to figure out what all the hullabaloo was about, and what
    I was going to do, and when I was going to do it, and how I was going to do it. A little bit of a man camecripplingover
    - helooked likehehad a spring in his one leg. And he says, "Hello, kid." He said, "You hungry?"
- speaker: Respondent
  text: So I said, "No, not really." "Well," hesaid, "I'm Sport Watkins, and I've got cattle in the bank and money on the
    range, and if you need anything, you just call old Sport." He says, "Let me buy you a drink."
- speaker: Respondent
  text: And he grabbed me. He looked like my little bit of a brother, and he had this little springy step. He took me over
    to the bar and says, "Give this kid a drink."
- speaker: Interviewer
  text: The bartender says, "What will you have?" Mining, Mucking, and Boxing I says, "I don'tknow." I didn'tdare ask for
    an or ange or something.
- speaker: Respondent
  text: '"Yes," he said, "try some of this." He got out a bottle of home brew, poured some in a glass for me.'
- speaker: Respondent
  text: Sport says, "Put that on my tab." The guy says, "OK, Sport, no problem." Sport left, and this bartender told me, he
