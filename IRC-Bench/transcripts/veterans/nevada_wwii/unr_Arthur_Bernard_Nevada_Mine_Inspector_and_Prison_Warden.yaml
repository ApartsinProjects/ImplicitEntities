    than anybody else, I always did more work, and I got quite a reputation.
- speaker: Respondent
  text: So, the following year when I was eighteen, somebody suggested I should enter the mucking contest in Pioche. I says,
    "Oh, God, no. I couldn't. I couldn'tcompete with those. Those guys are good! The best in the country!"
- speaker: Respondent
  text: '"Oh, hell," one of those old miners says, "I''ve seen them all." He says, "Nobody can beat you with a shovel." There
    was one guy, and hisfirst name was Frank - I can''t remember his last name. He was about thirty-five, a husky man from
