  text: 'Drunk and Disorderly Time went on, and he served out his one to two years for a burglary, and he was paroled. All
    he had was the clothes he came in: an old, dirty pair of pants and a Hawaiian sports shirt. We cleaned whatever clothes
    they came in with. We laundered them and ironed them and whatever, but that''s all they had at that time. Then they were
    given twenty-five dollars. So, he asked if he could see me, and came in, and he had this. He said, "Warden, I''ve got
    something, and I''d like you to have it."'
- speaker: Respondent
  text: I said, "What have you got?" "Well," he says, "It's a diary that I've kept all the time I've been in here." He says,
    "You may not like some of it, but you're a pretty broad-minded guy, and I don'tknow what to do with this, so I thought
    I'd just give it to you, and you could do what you wanted with it."
- speaker: Respondent
  text: '"Well," I said, "J oe, that''s something maybe you ought to take with you, so you "No." He said, "I''m going to forget
    everything that''s in that diary."'
- speaker: Respondent
  text: I looked at his clothes. He didn'tlook very good. I says, "J oe, would you be embarrassed if I gave you some better
    looking clothes than those to wear out?"
- speaker: Respondent
  text: We had given him his twenty-five dollars. He had bought a ticket out of his twenty-five dollars to Salt Lake City,
    and then he was going to take it from there. "No," he said, "I'm just going to take a bus, and this is what I came in
    on. That's all right."
- speaker: Respondent
  text: '"Naw." I says, "Aw, let me get you something." So I got him a better pair of pants and a shirt. He said, "I''m not
    proud of the fact that I came to prison, although it wasn''t all that bad." He says, "But there''s one thing that I''m
    never going to have to live down." He says, "I had never stolen a penny in my life." He said, "I know I''ll be branded
    an ex-convict, but I hate'
- speaker: Respondent
  text: to be called an ex-thief. I've just never stolen anything in my life." "Well," I said, "I know what you came in, J
    oe. I read the transcript of your trial. What you did was took a half a gal Ion of wine. It was white wine." I said, "You
    drank it. You drank it right on the premises. So, I don'tthink you took anything away. I'll tell you what you do. You're
    going to Salt Lake City, and you're going to go through Winnemucca. You stop in Winnemucca and go up to the Eagle Drugstore.
    You tell them who you are, and they'll remember you, or so mebody will remember you, because it hasn'tbeen that long -
    probably the same man still owns it - and tell him that you bought a half a gallon of wine on credit, and they charged
    it, and that you've come back to pay it. You pay him for that wine, and you're absolutely free of debt. You are not an
    ex-thief. You never stole anything."
- speaker: Respondent
  text: He just looked at me, and he started to smile. He says, I says," And make them give you a receipt." He says, "I'll
    do that."
- speaker: Respondent
  text: 'I thought no more of it. J oe left. Couple of days later, I got a letter in the mail with the receipt from the drugstore.
    And here it is. Here''s the letter he wrote me. He says, "Warden A. Bernard: Sir, I am not much for words .... Having
    had a few beers, but sir, I wish to say that I did stop in at the Eagle Drugstore and pay for the half gallon of wine
    I stole from them nineteen months ago. I feel clean. I feel square. I will always look upon you as a good guy." And he
    signed it, and enclosed the bill of sale, [laughter] "Paid cash for winetaken in 1952. One dollar and seventy-three cents."
    For that he served pretty near two years in prison.'
- speaker: Respondent
  text: Drunk and Disorderly He probably was lucky that he came to prison with me, instead of so mewhere else where he wouldn'thave
    had the opportunity and the trust that he had at the Nevada State Prison.
- speaker: Respondent
  text: ou mentioned Fitch Shampoo and theClearys. Do you want to tell me those stories now? While I was still mine inspector,
    it was in all the newspapers about a murder in Las Vegas by a scion of a famous family - Fitch shampoo. Richard Fitch
    had murdered someone who he caught in bed with his wife and was sent to prison - a life sentence. It was discussed at
    great length, that a famous character like that be in volved in a murder. When he came to prison, he didn'twait very long
    till hewanted an in terview, and hecamein. Hewas a very handsome, young man, six foot three or four, two hundred pounds,
    well built, and very, very intelligent. He'd been in the army, and I'm going to try and figure what that department is.
    I think they were probably draftsmen, and their business was to draw war tanks and war planes - design them. I saw some
    of his work. It was real brilliant. And after he'd got into prison, shortly after,
- speaker: Respondent
  text: hetook up painting. Naturally, he wanted every privilege that he couldn'thave, but we got along pretty good. What
    had happened was he was in the service and living in some town on the Pacific Coast somewhere. It wasn't Santa Barbara,
    but it was near a military installation. His wife was having an affair with some other man, and finally she took off with
    this guy. The husband made the mistake of bragging that he was going to find the guy and kill him, and that they could
    do nothingto him, because . . . what do they call that, when you kill somebody that's having an affair with your wife?
    There's a nice term, nicer term than I'm thinking of. Anyway, this has been going on for years and years, and when a husband
    caught somebody in bed with his wife, and he killed the pair of them, that was....
- speaker: Respondent
  text: Oh, a crime of passion or something like that? A crime of passion, but he was entitled to do it. And they had a term
    for it that I can'tthink of. But this happens on the spur of the moment. When you find your wife in bed with some other
    guy, you lose all control of yourself. You pull out a gun, if you have it. You shoot him. Or, if you don'thave a gun,
    there's a hatchet handy, you scalp him. He'd made the mistake of telling all his friends, "I'm goingtofind him. I'm goingto
    kill him." Kill him, not the wife. "And they're not goingto do anything to me," on this legal term that I can'tthink of.
    He bragged about it.
- speaker: Respondent
  text: So, it wasn'tspur of the moment anymore. It wasn'tspur of the moment. He located them in a motel, and it was somewhere
    out of Las Vegas, maybe
- speaker: Respondent
  text: 'Henderson. The place had just started growing. He just shot him. And he didn''t try to escape or anything. He just
    figured he was home free. But they fouled him up. They got the witnesses that testified that he said, "I''m going to kill
    him, and they''re not going to do anything to me on account of it." So, they sent him to jail with a life sentence. And
    there he was. He''d drafted a line .... I guess to stay in tune with the time or his vocation, he had pictures, stacks
    of them, of various model planes that we hadn''tseen yet: tanks, futuristic tanks, and all things connected with battlefields
    and wars. As I say, he''d taken up painting, and he was famous. Every once in a while, some woman would come and visit,
    and he just had something they couldn''tresist. He had a corps of women coming in that had no business visiting. They
    weren''trelatives or even friends. They were just curious. The officials didn''tlike that. It was a bother to have all
    these women come in and identify themselves, and they couldn''tgive a reason why they wanted to see him. So I stopped
    it. I told Richard, I said, "Anybody that comes in that has a reason to see you, that''s fine - male or female - but I''m
    going to stop this curiosity. This has got to end.'
- speaker: Respondent
  text: '"Well", he said, "I don''tsend for them. I don''tknow who they are. They''re just curious. And they all want to get
    familiar."'
- speaker: Respondent
  text: His conduct was always good, and he had paintings, Western scenes. I've seen a lot of Western paintings from the best.
    And I won't say that he was a Remington, but I've seen a lot of fairly expensive Western scenes that weren't as good as
    his. He had no place to work. He'd make a frame out of whatever material he could find, and they looked pretty good. And
    time went on. He never
- speaker: Respondent
  text: did think that I was fair with him and gave him the privileges that hethought heshould have. On theother hand, he
    realized that I wasn't all that bad, either. When he got paroled . . . and I was responsible for getting him paroled,
    because he was not going to be dangerous to anybody else. If he just hadn'tsaid, "When I kill him, they're not going to
    be able to do anything to me." He never had a traffic ticket before or anything. So, when he'd served his minimum, I began
    talking to the parole board, and after a year of so, we turned him loose, back to his family, and there was no danger
    of him being a burden to the public anymore, because he had a lot on the ball. Richard Fitch was a very intelligent man.
    But he brought all his pictures in, and he said, "I don'tknow whether you can use these, or whether you want them, but
    I'd like you to have my pictures."
- speaker: Respondent
  text: I says, "Well, I'll take them." All his paintings. Quite a few. There were at least twenty. I have only one left.
    I've given all the rest away. I had eight or ten left in the valley before we moved here six, seven months ago. I gave
    the remainder to my grandson.
- speaker: Respondent
  text: Shortly after I took over as warden, we had a very vicious murder in Reno. The lady that was operatingthe Western
    Union in Reno was viciously murdered. She was stabbed seventeen times. The murder weapon was never found, but it was ascertained
    that it must be along screw driver. At the desk where she was sitting, the paper described it, and it resembled an abattoir.
    There was just blood all over the floor, blood all over everything. Pools of blood. Blood spattered everywhere.
- speaker: Respondent
  text: There were some people coming by that place at the approximate time of the murder, and they said they saw a well-dressed
    man run out and get into a white Lincoln
- speaker: Respondent
  text: 'convertible, and make a U-turn and head back east toward Fourth Street. There happened to be a policeman right close,
    and he got on his radio, and they described the automobile and the general direction, and sure enough, a couple of cars
    up on Fourth Street picked him up and gave him the siren. He didn''tstop. I forget the name of the streets now, although
    I was familiar with all of them at the time. You go east on Fourth Street to a certain place, and you turn right. It takes
    you down to the railroad tracks, and you can either cross the tracks, or you can go up on the north side of the track,
    where you can cross thetracks and go up on the south sideofthetracks a couple of blocks, and then you can turn left and
    cross the tracks again, and get up on Fourth Street. They followed him and got up on Fourth Street, and they cornered
    him in Sparks someplace, and there he was. There was a white Lincoln convertible, and there was this driver all a lone
    - handsome man, and he was about thirty, thirtyone years old, with a dark blue suit on, patent leather black shoes, silk
    cuffs on his shirt, out from under his coat sleeve - nattily dressed. His name was Cleary. They picked him up and took
    him to court, and they took all his clothes: suit, shirt, cuffs, socks, underwear. Every bit of clothing he had on, they
    sent to the FBI. And they built up a case, and they tried him. The FBI a gent who was the witness said that they''d gone
    through everything that they''d sent: the white silk shirt, cuffs, the suit, the black tie, and the patent leather shoes.
    They never found a spot of blood anywhere, not on the shoes, not on the sole. Nowhere did they find a spot of blood. And
    here this woman was killed, and the place looked like an abattoir. Somebody had stabbed her seventeen times. And not a
    spot of blood!'
- speaker: Respondent
  text: My friend Bill Raggio was a deputy district attorney, and he prosecuted Cleary's case. They never found a murder weapon.
    The evidence they had when they convicted him was the fact that somebody had seen him come out and get in a white Lincoln
    convertible and drive away, and the patrol had picked him up immediately and eventually stopped him. He admitted he'd
    been in the Western Union, and he'd come out. He was from some town in Illinois, and he owned a tavern, and he'd come
    to Reno with his fiancee and her son, who was about six years old at the time, to get married. While he was here, he had
    her parked in a hotel, and he was gambling, and he lost his money. So he'd gone back to Western Union to wire somebody
    for money, and he'd gone back there to see if the money came, and when he walked in, he saw thiswoman lyingin a pool of
    blood, dead. Hesaid, "I just decided to get the hell out of there." And he left. This made sense to me. And it must have
    made sense to six of the jury, because the first counti ng of the votes it was six for guilty and six not guilty. They
    voted again and again and again. This went on. Finally, they got nine for conviction and three for not guilty. They were
    going to stay there, I guess, till they starved to death, so they all voted guilty, but no death sentence. So that's why
    he wasn't sentenced to death over a brutal murder like that. Six of those jury men never were convinced that he was guilty,
    even though they did votethat hewasguilty. So, hecame to prison. He was a very handsome man, over six feet, two hundred
    pounds, handsome, and no dumbbell - well educated, well spoken.
- speaker: Respondent
  text: At the time I had a female dietitian who didn'twork out. She just couldn'thandle being around a bunch of prisoners.
    She wanted to feed them fruit salads and all the little tea biscuits. Itjust didn'tfitwith a penitentiary.
- speaker: Respondent
  text: But I liked her. She finally decided she'd leave, and I decided that I was going to operate the kitchens with in mates.
    I had peoplethat were good cooks, and we were getting along fine, and I had good butchers.
- speaker: Respondent
  text: Cleary came in, and it wasn't longtiII he asked to see me. Hetold me how innocent hewas, and wasthereanything I could
    do for him? How could I help him?
- speaker: Interviewer
  text: I said, "I gather you owned a business in which you served food?" I says, "I'll just let you run the mainline kitchen."
- speaker: Respondent
  text: And he did. I couldn'thave hired anybody better. I just couldn't. He was efficient, frugal. Nobody tried a nythingon
    him, nobody. Of course, we kept in close contact. Every week or two he'd come in and report what he might need and what
    improvements we could make. In the meantime, between the fact that I was raising my own meat and getting my own potatoes
    and everything, and with the good help that I was getting from Cleary, my expenses werevery low. I appreciated him and
    did the best I could for him, and we discussed his case many times. "Warden," he says, "I'm just not guilty."
- speaker: Respondent
  text: I says, "Did you go near that body?" He says, "I didn't go near it." I could believe it, because he never had a speck
    of blood anywhere on him or around him or anything. I've dressed enough wild game to know that, even if I just cut something's
    throat, I get full of blood, let a lone stab him seventeen times. By then, I got into the Court of Last Resort. He wanted
    me to get the Court of Last Resort to come in and take his case, which was no problem. I knew I could do it. But I wasn'tgoing
    to bother anybody until he knew exactly what he was facing. I told him, I said, "I
- speaker: Respondent
  text: can get the Court of Last Resort in. First, I want you to tell me if you killed that woman, or if you're in nocent."
- speaker: Respondent
  text: He says, "Warden, before God, I'm innocent." I says, "I'll get the Court in." One of the members of the court, who
    runs a polygraph, is one of the best in the world. They send for him from Europe. He's gone all over - Alex Gregory from
    Detroit. He was an ex-officer from the Detroit Police Department, and he was their polygraph expert.
- speaker: Respondent
  text: I says, "If you're lying, he'll know it. You can'tbeat him. And Joe, if you're lying to me, and you're guilty, you
    will never get out of this prison as long as I'm here. I doubt if you ever get out after I leave, if you're guilty. So
    be sure you know what you're doing. If you're in nocent, you've got a damn good chance of getting out. If you're guilty,
    Alex will tell me."
- speaker: Respondent
  text: He says, "I'm innocent." So, I got Gardner, and we went through his case. They a greed to come. I n the meantime,
    we started getting publicity, and Raggio found out about it. And oh, God, he was not happy. He was the district attorney.
    He wasn't happy with me for getting the Court in. But they came, and with great fanfare and publicity. And present were
    Marshall Houts, an ex-FBI man; Park Street, one of the most expensive attorneys in Texas; Alex Gregory, polygraph; Erie
    Stanley Gardner. So, we set up the polygraph test in my office. Everybody got out, and I said to Alex,
- speaker: Respondent
  text: He says, "If he's innocent, I'll tell you." So, we all waited outside, waitingfor the verdict, and finally somebody
    rapped on the door, and Alex said, "I'd like to see Mr. Bernard."
- speaker: Respondent
  text: 'I went in. Alex said, "Your friend is guilty." Joe didn''t bat an eye. So they took Joe away, and the word went out:
    he was guilty. I talked later to the D.A. I said to Raggio, "Well, it turned out pretty good for you. Now you don''thave
    to worry about sending an in nocent man to prison," I said, "because he had me fooled, and that''s going some. I just
    can''tunderstand how anybody could commit that and not have a speck of blood."'
- speaker: Respondent
  text: And I'd got Joe. I'd called him in, and I says, "You remember what I told you?" I says, "As long as I'm in this prison,
    you're not going to leave. You'll still be the cook." I said, "You're not going to lose any privileges. I don'tknow whether
    to feel bad about you lying or not. I told you what was going to happen. Why did you want to take that test?"
- speaker: Respondent
  text: He says, "I thought I could beat it. I really thought I could beat it. I've heard people beat that."
- speaker: Interviewer
  text: I says, "They don'tbeat with Gregory. I told you that. He's the best there is. Where did you throw that screwdriver?
    And was it a screwdriver?"
- speaker: Respondent
  text: He says, "Yes, it was." He described how he made the first turn and crossed the railroad tracks. He says, "I threw
    it out when we were crossing the tracks."
- speaker: Respondent
  text: I said, "They were right behind you, and they didn't see it." He says, "I can'thelp it. That's where I threw it out."
- speaker: Respondent
  text: I said, "Where did you get the screwdriver?" I knew where he got the screwdriver, because, though the screwdriver
    couldn't be found, the wounds had to be made by a screwdriver, because they werejust thin, deep holes. A workman had been
    in to fixaslotmachinethey had there,
- speaker: Respondent
  text: and he'd had this long screwdriver, and he'd forgotten it and left it there. Joe come in, and this developed over
    testimony, that this is not the first time he'd been in there. He'd sent for money, went in and got it, then lost it.
    He came back and wired another friend for money. The friend sent the money. He got it. He lost it. Every time he'd come
    in to get his money, she'd open the drawer where she kept the money, and there was a whole mess of cash in there that
    she used to pay off all these. So, he came back, wired for some money. This time it was longer coming, but he finally
    got it, and he went back and lost it, too. The last time he sent for money, it didn'tcome. And he kept going back and
    forth, back and forth. She finally got irked, and she said .. . I assume that she said, "Don'tcome back here anymore."
    He didn'ttell me that, but he told me that she said, "Now, don'tbother me anymore."
- speaker: Respondent
  text: He says, "I'd seen that money there," he said, "so all I wanted was the money, and I went back to get it. She just
    jumped on me and attacked me. And there was this screwdriver, and I just... I picked it up unconsciously, and I stabbed
    her. Once I'd stabbed her once, I couldn't leave her a live." He says, "I killed her." He says, "You don'tknow how sorry
    I am."
- speaker: Respondent
  text: But anyway, naturally his fiancee didn'tmarry him. And if I'd have been in prison yet, he'd still be there, but shortly
    after I left, they paroled him. He stayed here, and he went to work for J oe Conforte. J oe Conforte started a fancy restaurant
    up in Gold Hill. He called it the Cabin in the Sky. All the important people went up there to eat. I had invitations to
    come up and eat on the house, and I never did go up. I never went to see Joe. I just didn'twant to see him anymore. But
    he was there enjoying prosperity and fame as a chef for a considerable length
- speaker: Respondent
  text: of time, and he finally disappeared. I don'tknow if he stayed there until they closed the Cabin in the Sky, or not.
- speaker: Interviewer
  text: You had a pretty good sen seabout your prisoners. Were you surprised that this one could fool you about his innocence?
- speaker: Respondent
  text: I was surprised, because he didn'thave a speck of blood anywhere, and it made sense to me. He admitted that he was
    in there to get money, and he said, "I saw her. She was layingthere in a pool of blood. I figured I'd better get the hell
    out of here." I would have felt the same way. Or I might have . . . being who I was, I would have called the police or
    so mebody immediately. But he was a stranger. And for a stranger, a tourist, to get caught there with a dead person just
    might not be so good. So he figured I better get out of here. "Nobody knows I've been in here." And if he'd have walked
    out of there normally and got in that white Lincoln, even though it was a white Lincoln, nobody would have probably paid
    any attention to it, but he came out of there running and jumped in the car and made a U-turn. He attracted all the attention
    he could, or that would have been an unsolved crime. And that's how he had me fooled was, no blood. What he told me, if
    there'd have been a speck of blood on him anywhere, I'd have known he was guilty. But I felt, and so did six jury men
    feel, they just couldn'tfigure it, and I couldn't, either.
- speaker: Respondent
  text: Y ou've talked about your three wise men and that group thatworked with you. Did theother prisoners consider them
    stool pigeons? Or was that a whole different thing?
- speaker: Respondent
  text: No, no. They were not stool pigeons. No, they were well liked and well trusted, and they never went back with any
    misinformation, and they never gave me any misinformation.
- speaker: Respondent
  text: Did you have stool pigeons that worked with you? Oh, I had stool pigeons coming out of my ears, but nobody knew who
    they were, not even my guards. That's why I knew everything that went on, as much as I did.
- speaker: Respondent
  text: You really protected their identity, all the way around? Oh, hell, yes. And they weren'tdoing it to get mean to anybody
    or report them or anything. They just didn't want any trouble, and they figured if I could stop anything, they were all
    better off, including the agitators. And none of them ever asked for anything special or nothing. We got along fine. And,
    in fact, there were people,
- speaker: Respondent
  text: I'm sure, that hated my guts there, especially these queers that I socked away, because I was pretty tough on them.
    When they violated any rules, they knew ... I wastough on them.
- speaker: Respondent
  text: One time my wife and I went somewhere, and we were gone all day, and we left our girls at home, and I think Emma J
    otook care of the girls that time. We had four or five women in mates who were nice. One was a prostitute, and she didn't
    get out too much, but even she wasn't bad. But the others were just check kiters.
- speaker: Respondent
  text: I got to tell you about Don's Roving Mike, a young Labrador that I had. My youngest daughter Patti, was about seven
    or eight years old. I told you about Wingfield getting the prize bitch and breeding her to my Blue of Arden. And Mike
    was the progeny. He just grew up with Patti. Wherever Patti went, Mikewaswith her. And I don't know if I told you, but
    I made a swimming pool at the prison, and my kids and their friends would come down and swim. Patti would get out in the
    middle of the pool, and I'd tell Mike to fetch her. Mike would smash in. She wore braidsthen. He'd grab a mouthful of
    braids and tow her to shore. They just had a ball - that dog and Patti.
- speaker: Respondent
  text: One day, this day that we left, they got playing kind of recklessly. All the outside trustees were almost like a family.
    They liked my kids. They liked my dog. They were all interested in watching the dog grow up. They'd ask me how he was
    doing with the ducks. And Patti was running on this particular day. I never did get the details
- speaker: Respondent
  text: why she was running, but Mike came up and grabbed her. We'd just bought her a brand new coat, and my wife was very
    particular about this coat and looked for it and picked it out carefully. The dog grabbed the coat, and he just tore it
    off of her. And there she is. And there's the warden and his wife gone. There's Patti with a torn coat, and there's Mike
    - he's going to get the blame.
- speaker: Respondent
  text: The convicts and the guards began conspiring. They found an old fellow who was a queer, but he was old; he wasn't
    an active one, and he was a tailor. We had a tailor shop, but at that time we didn'thave a tailor, but the word got out.
    He heard what had happened. He asked the captain. He said, "If you let me out, and get me the material," he says, "I guarantee
    I'll make that coat look like new. They'll never know the difference."
- speaker: Respondent
  text: Well, they'd do anything, so they took him out, and he needed a certain colored thread. They sent uptown, sent him
    uptown with a guard, and went through all the stores. He found what he wanted. He went back. And we didn'tknow about this.
    We didn'thear about it for months and months. Nobody told us. They just absolutely . . . none of the in mates squawked,
    none of the guards, nothing. We didn'tknow that Patti had had that coat torn.
- speaker: Respondent
  text: That old tailor stayed there till I left. He was still there when I left. He was a good one. In fact, he made two
    or three suits for me while he was there. I'd get the material. He was good, very good. And here we had a tailor shop
    and no tailor, because nobody bothered to get a tailor, and here we had the best in the business just in the yard.
- speaker: Respondent
  text: I devised a huntingjacket, and I had him maketwo of them for me, and I've kicked my rear end ever since. I should
    have patented that jacket. I've never seen any-
- speaker: Interviewer
  text: thing like it, and everybody for years and years that saw my hunting jacket, "Where did you get that?"
- speaker: Respondent
  text: God, I should have patented that thing, and I'd have been a multi-millionaire. The remnants . . . my son wore his
    out and threw it away. I wore mine out, and it's still hanging up in the duck shack down at Stillwater at the Canvasback
    Gun Club.
- speaker: Respondent
  text: Sometime after I took over, a fellow by the name of Mark Donnelly was serving on a murder charge. He had a lot of
    ability, and he was a guitar player. He'd play us the Hawaiian guitar, you know. I liked those Hawaiian guitars, electric
    guitars. He said, "Warden, a group of the boys have asked me to see you and see if we couldn't have music here again.
- speaker: Interviewer
  text: I says, "Hell, music here again? Why the hell, you can have all the music you want, as far as I'm concerned. What's
    been holding you up?"
- speaker: Respondent
  text: Well, he said, "They won'tallow anybody to have an in strument or even a harmonica or anything. It's absolutely taboo
    in this place."
- speaker: Respondent
  text: I says, "I can'tbelieve it!" So, I said, "Well, you can sure as hell have music, and I'll find out why you can't."
- speaker: Respondent
  text: So, I asked one of the guards that had been there a longtime. I says, "Why can'tthese boys have music and play guitars,
    sing, whatever they want. We've got plenty of places for them."
- speaker: Respondent
  text: '"Well," he said, "Warden, at one time they had an or chestra, and they had a piano player. And one day they went
    up, and they were all drunk. Somebody had brought'
- speaker: Respondent
  text: a bottle of whiskey in, and they hid it in the piano. And the warden said, this is the end of all music, orchestras,
    and everything else. So, the piano was put away, and they have never been a bleto singor play any instrument or anything
    since."
- speaker: Interviewer
  text: I said, "Where's the piano?" Because I'd go around and I'd never seen it. They said, "It's up there in the day room."
- speaker: Respondent
  text: We found the piano, and it was just covered with the accumulation of crapthatyou find. You havetofind some place to
    put it, so you put it on the piano. We had to dig this out. And so, it was naturally out of tune - hadn'tbeen used for
    years. I got a piano tuner to come in, and when he got back in there to tune the piano, there was the bottle of liquor
    - that was empty now - but they'd hid it back in the piano, and the authorities had found it, and didn'teven remove it.
    They left it. The bottle was Old Fiddler whiskey. I'd never heard of Old Fiddler. So, we got the piano out, and the bottle
    was a funny-shaped bottle. It was shaped like a fiddle. I took it down in my office, and there it sat. It didn'tmean a
    hell of a lot to me. It was just another bottle of whiskey. There was various shapes. Anyway, so we went from there.
- speaker: Respondent
  text: This Donnelly concocted an or chestra with trumpet players. We put out a plea for instruments from anybody that wanted
    to donate, because we didn'thave money to buy them, and they didn'thave money. We got everythingwe wanted. We had fiddles.
    We had guitars. We had trumpets. We had trombones. We had drums. We had everything. And we had a hell of a good orchestra.
    I used to takethem out and play for peopleall around thecountry. They were good. This Mark was exceptionally good. So,
    this orchestra got famous. And they were really good.
- speaker: Respondent
  text: I'm not just bragging, because they were my or chestra. They were good, as well as, we had a baseball team that weregood,
    and they beat everythingaround thecountry.
- speaker: Respondent
  text: One day, Erie Stanley Gardner came up and was in my office, and he happened to see this whiskey bottle.
- speaker: Respondent
  text: I told him about it. He says, "You've got a . . . you don't know what you've got there!" He says, "That whiskey's
    been out of manufacture for years and years, and a bottle, an Old Fiddler bottle, is worth a fortune."
- speaker: Respondent
  text: '"Well," I said, "my friend, you''ve got a fortune, because if that bottle''s that good, it''s yours." And I gave
    it to Gardner.'
- speaker: Respondent
  text: He hated to take it. He says, "You don'tknow what you're giving me." So, he got Old Fiddler. I don'tknow whatever
    happened to that bottle.
- speaker: Respondent
  text: You've talked a lot about building trust with theinmates. It sounds like there may have been some who disliked you,
    but that you had the trust of quite a number of them.
- speaker: Respondent
  text: Most of them trusted me. Even those that didn'tlike me, trusted me. They knew I wasn'tgoingto lie to them. In fact,
    they admitted it. In fact, I told you what they said about the warden, "If he told you a piss ant could pull a plow, hook
    it up and start plowing." They didn't like me, but it wasn'tbecause I wasn'tfair and square with them. I had a great advantage
    over most of the war-
- speaker: Respondent
  text: dens. One was my personality and nature. One was my fearlessness, because I was never afraid to go in that yard with
    anybody. My guards were scared to death until they got accustomed to me. A lot of the other wardens, when I told them
    what I did, they just couldn'tbelieve it, "You're just takingtoo many chances." But it's because my prison was so small
    that it was like a family. I knew most of them. And with the exception of the two-bit thieves that just burglarized this
    or that, I knew what their crime was. It just made a big difference. Association ... I don't know what term I'd like to
    use, but I associated with them, not because I was trying to get friendly or anything, but just to know them. The better
    I knew them, the better I could run that prison, because I knew who might be dangerous, who might want to start something.
    And if I didn'tfigure it out myself, one of my stoolies did. Hetold me. I had that, because of the number of in mates
    I had, which were so few that I could get acquainted with them.
- speaker: Respondent
  text: What was the population? It would run from 300 to 550. And the parole board met twice a year. The prison was way overcrowded
    at 550, way overcrowded. It would hold comfortably 400. So, anyone that was safe to turn loose, we turned loose and got
    down to 250, which wasa minimum. We wouldn't start to get crowded agai n ti 11 al most the next parole board meeting.
    Now the parole board meets continually. They're always in session.
- speaker: Respondent
  text: Your family lived right there. Were you ever afraid for your family? Never. Never. I think that's the safest place.
    It's the safest place I could raise a family, because nobody was goingto bother my children. There were enough in mates
    there in strategic places that if anybody ever tried to bother one of my kids, they were dead.
- speaker: Respondent
  text: W hen itook over the prison, my predecessor explained what I could expect. I had a cook and a houseboy and chamber
    maids and whatever - car washers. I had personal attention. One fellow took care of my cars - damn near wore him out,
    you know, just keeping them shined up. He says, "You got a good cook, Finnegan, and he's an old con, and he's very particular,
    and he told me that he wasn'tgoing to work for any new warden. So you'll have to get a new cook."
- speaker: Respondent
  text: Well, I said, "I imagine however you got a cook, I'll get one, too." So the day my predecessor left and I moved in,
    I went in, and I says, "Well, you're Finnegan, the cook."
- speaker: Respondent
  text: I says, "I gather that you'd like to terminate your service as a cook." "No. I didn't say that. I told Dick that I
    might not want to work for anybody else, but I'll stay, if you want me."
- speaker: Respondent
  text: 'I said, "If you want to stay, you''ve got good recommendations." So, that was our start with Finnegan. He was a tall
    man, typically Irish. Typical convict - he''d been in every prison you can think of, and he was a good cook. So, naturally,
    he started telling me about why he was in prison and what he''d do if he ever got out again. He was never going to touch
    liquor again, and that was his problem, alcohol. When he got drunk and went broke he did anything he could to get money,
    short of murder or mayhem or harming anybody. He got it. And he had a personality that few people have. With his personality
    he could have been successful at anything. And my kids - I think they thought a lot more of Finnegan than they did about
    their dad. He''d regale them by the hour about his experience. He''d tell them, he said, "Your dad''s a damn sissy. Take
    it from me. I know. He don''tknow how to run a prison. He don''tknow how to treat a convict." He said, "The only way you
    can treat convicts: be tough, tougher than they are. Why," he says, "I''ve hung up by my thumbs with water dripping on
    my head, my big feet barely touching the floor, for days and days at a time, but I never broke.'
- speaker: Respondent
  text: I never broke." And he'd concoct these stories, and they'd just eat them up. He was just the toughest convict, and
    he went through more tortures. He got beat up, beat out. He thought the world of those kids. And he's one, if anybody'd
    ever tried to take advantage of one of my kids, they had Finnegan on, and he was no cream puff. There was many others
    I could name - Firpo, Bull, and others - many that I can name. They'd like to have had an opportunity to do that. My wife
    just thought he was . . .
- speaker: Respondent
  text: she knew he was a convict, but she believed him. And went on. I had his history. He just couldn'tstay out of prison,
    but he promised me faithfully that if he ever got out, he'd never fall again, never. Never fall again.
- speaker: Respondent
  text: In the meantime, I bought him several things. We didn't pay anybody, but any trustee that did a nythingfor me, like
    the car washers and everything, I'd slip them a dollar or two worth of brass. You couldn'tgive them cash. We had prison
    brass that they could buy things from the commissary with. So, I was pretty good to Finnegan. I'd got him radios. I got
    him all fixed up with pretty near everything. We kept talking about when he'd get paroled, when he'd get paroled, and
    I was going to help him. So, finally, I recall when I was pleading my case for Finnegan to the parole board, and one of
    them mentioned, "God, with that record, how do you ever expect him to stay out?"
- speaker: Respondent
  text: I says, "Well, I think he's turned over a new leaf, and I'm goingto help him." I had a friend in the construction
    business named J ohn Savage, Savage Construction. When I went to prison, hetried to talk me into going into the construction
    business with him. He said, "If you'll come in with me, I'll give you a better salary than you're getting now and put
    you on a partnership basis. And all the profits you make will buy into your half of the construction company." He thought
    I was probably a better engineer and surveyor than I was, but anyhow, I didn't go in with him. I went to prison instead.
    But we were good hunting partners. We shacked together. We had a house together down in Stillwater. And he had this construction
    company, and he had a job going on down in Yerington, a road job. He told me several times he had a conveyancethathehauled
    around with his crew, and it was a kitchen. He could
- speaker: Respondent
  text: feed eight or ten or fifteen men, whatever he had, in this moveable kitchen. And he says, "I'd just love to have a
    cook that could handle that."
- speaker: Respondent
  text: I says, "I've got a cook that can handle it. He can't stand liquor. Hejust can'tstand alcohol. If he gets a drink,
    he's done, and you're done. If you'll just absolutely keep that alcohol away from him, you'll have a hell of a man there.
    He's a good cook. He's conscientious, and he's honest. He won'tsteal from you. He won'tfudge on any bills or anything."
- speaker: Respondent
  text: He says, "Boy, I'll do it." So, I told Finnegan, I says, "I got a job for you with a good friend of mine, and don'tfoul
    me up." I told him what the job was, and I says, "I told him not to give you any whiskey, and don't you put him on the
    spot or anything. This is a friendship between me and him that he trusts me and I trust him, and now I'm trusting you."
- speaker: Respondent
  text: He says, "Warden, I won't let you down." So, weturned Finnegan loose, and beside the twentyfive dollars that the state
    gave him, I gave Finnegan a hundred dollars. He'd get a payday within a week anyway. So we turned him loose. I kept track
    of him with J ohn. Every time I'd see him, and we'd go hunting every weekend, "God, Art, that's the best thing you've
    ever done for me. That man is . . . ." And he'd tell me what a hell of a man Finnegan was. "God, hejust is such a good
    cook and such a nice guy and such a nice personality. All the men like him."
- speaker: Respondent
  text: '"Well," I said, "By God, maybe Finnegan had finally made it." And a couple of nights later, about four o''clock in
    the morning, I got a telephone call from the sheriff in Lyon County, one of my best friends. He says, "Art, I got a guy
    in jail, and his name is Finnegan. He''s been cooking for'
- speaker: Respondent
  text: J ohn Savage." He says, "I thought I'd call you before I do anything. In case you want me to cover this up, well do
    it."
- speaker: Respondent
  text: Well, I said, "What happened? What the hell's the scoop?" "Well," he said, "I got a call this morning. There was a
    rumpus down on the line. I went down, and this guy - he says he's your cook - was just tearing up everything and drunk
    as a skunk. When I brought him in, he said, 'Please get in touch with Mr. Bernard.'" The sheriff's name was Clyde.
- speaker: Respondent
  text: I says, "I'll be right down. I'll be in Yerington within a couple hours." And I was. I said, "What have you got against
    him? What? Did he cause any damage or anything? Did he hurt anybody?"
- speaker: Respondent
  text: '"No." He says, "He''s just drunk. I''ve got him in on drunk and disorderly, but I don''twantto charge him with anything,
    because it''s not serious. And the way he talks, he''s something special."'
- speaker: Respondent
  text: '"Well," I said, "He''s special to this point. If you don''t wantto prefer any charges against him, turn him back
    to me, and I''ll take him back to prison, and we''ll just figure he violated his parole, because that''s what he did,
    and we don''thave to go any further."'
- speaker: Respondent
  text: He says, "You go a head." He says, "Take him with you." So, I put Finnegan in the car. By then, he'd kind of so bered
    up, not quite yet. And he didn'thave anything. He'd hocked his radio, and he'd hocked everything I'd given him. I took
