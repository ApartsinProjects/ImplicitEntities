- speaker: Respondent
  text: I'd bought some acreage out in the Washoe Valley, and I had plansof buildinga nice big home out there. I'd done a
    lot of building in my time, and I was very familiar with tools. I knew this was going to cost a lot of money, maybe more
    than I had. I started buildinga guest house at the home that I had in Carson City, and I started buy-
- speaker: Respondent
  text: ing a lot of lumber at one of the lumber yards. I found out that an employee of the lumber yard got material at cost,
