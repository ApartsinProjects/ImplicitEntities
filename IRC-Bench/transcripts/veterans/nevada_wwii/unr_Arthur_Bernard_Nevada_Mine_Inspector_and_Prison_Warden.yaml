- speaker: Respondent
  text: When I went to work as a deputy inspector of mines in 1940, and we had the episode at Pearl Harbor in 1941, gold mining
    as such came to a stop in Nevada. They passed a law in the Congress to eliminate the mining of gold, because the gold
    was not necessary. Strategic minerals were, and the material was unavailable. The gold mines couldn't get anything. Labor
    became scarce. Everybody that could be called to the army went to the army.
- speaker: Respondent
  text: When theJ a panese attacked Pearl Harbor and L-208 came out of Washington, and the materials for mining became not
    only scarce, but practically unattainable, gold mines ceased to operate. The few that were still limping along on the
    Comstock had to close down. But mining copper got a shot in the arm, which started a boom in the Rio Tinto at Mountain
    City and, of course, in Ely, which was a large copper deposit anyway. My job, then, was just to in spect mines to the
    best of my ability and see that the mining laws were not violated due to loss of material that may have been necessary
    for safety reasons.
- speaker: Interviewer
  text: So all your inspections were focused on safety, were they? Yes, but I got along good with all the mine operators.
- speaker: Respondent
  text: I gave them a lot of good advice in my inspections. When I'd find something in a mine that was more or less detrimental
    to the safety of the men, that may not have been in the mining laws, I'd make suggestions. I found that every mine operator
    in the state was most cooperative. They were as in terested in the safety of their men as . . . in fact, much more so
    than the men were themselves. Practically every accident that occurred was due to miners themsel ves bei n gcarel ess
    and n ot observi n g the I aws that were enacted to protect them.
- speaker: Respondent
  text: What were some of the safety measures that you looked for back then ? We talked about how some of the early hats were
