    make rocks. Everybody that came in, had to go out on this rock quarry and make a certain number of rocks, and then they
    were replaced by in coming "fish," as we called the new prisoners. I'd go out and check that. And, as I say, I'd go in
    the bull pen to show them that I was interested, and I was going to keep track of that, too.
- speaker: Respondent
  text: During my years in Pioche, I had a very good hunting partner named Bill Garvey. A very nicefellow, and a good hunting
