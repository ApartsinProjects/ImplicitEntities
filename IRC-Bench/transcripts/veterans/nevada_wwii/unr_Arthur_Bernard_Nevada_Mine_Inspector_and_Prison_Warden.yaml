- speaker: Interviewer
  text: warden, and I was warden longer than any man before or after. It's usually a short-term job. Is that right?
- speaker: Respondent
  text: They change politically. You can almost bet on it. That's one plum that an in coming governor has to put out.
- speaker: Respondent
  text: It hardly seems I ike a plum, [laughter] I mean, it's such a hard job. I don'tknow how to express it, but you're either
