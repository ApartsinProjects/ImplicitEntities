- speaker: Respondent
  text: 'We had one complication: this was during the Depression, and married women were not hired to teach. If a single teacher
    married during her school year, they let her go. J obs were too scarce to have a married woman doing the teaching. So
    we thought we''d better get married, because things were getting serious, but nobody must know about it. So one morning,
    bright and early, we got in my car, and we drove over to Parowan, Utah, which was a distance of about 130 miles. We went
    to the courthouse - by then it was late in the morning - and I bought a marriage license, and we asked for whoever did
    the marrying, I can''tremember. If I could remember the justice of the peace .... I found out where his office was, and
    I went in, and this justice of the peace was also the county assessor. He had a couple in there with him, and they were
    in an argumentative mood. They were talking loudly back and forth to each other, and we stood in the doorway there kind
    of lost. He finally looked out and says, "What do you want?"'
- speaker: Interviewer
  text: I said, "Well, we want to get married." He says, "I'm busy." He says, "Do you have a license?" I says, "Yes, we do."
- speaker: Respondent
  text: '"Well, come on in." We went in, and he says, "Let''s get this over with." He introduced this couple. I can''t remember
