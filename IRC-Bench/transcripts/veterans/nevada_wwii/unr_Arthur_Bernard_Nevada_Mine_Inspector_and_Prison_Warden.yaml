- speaker: Respondent
  text: So, I went in and saw the chairman, whom I'd known for along time, and I said, "I need about three months work."
- speaker: Respondent
  text: '"God," hesays, "I''m glad you camein." Hesays, "You know what?" He says, "We''ve got a hell of a problem. We''re
