- speaker: Interviewer
  text: I says, "I've watched them. I can do it." How old were you by now? Mining, Mucking, and Boxing I was now about seventeen.
- speaker: Respondent
  text: So you went through these jobs pretty fast, right? Oh, yes. So I talked myself into being a miner, and I became probably
