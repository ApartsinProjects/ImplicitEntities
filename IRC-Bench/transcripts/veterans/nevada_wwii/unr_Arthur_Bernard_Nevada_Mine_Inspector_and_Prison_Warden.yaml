- speaker: Respondent
  text: One of the guys that was trying to get you to hire organized labor? Speed Hutchings, the commissioner, started in
    troducingme, and when hecametoJ ohn,J ohn says, "Hell," he says, "I knew him before you did." He says, "I had quite an
    experience with him. And I'm tickled to death he's coming to work for us." He said, "By God, he'll do the job." And I
    did. And it didn'ttake long, and I found out what was going on.
- speaker: Respondent
  text: In my in vestigations, I found that there was a lot of skulduggery going on a mong families. The check would be made
    out to a certain woman, and her cousin, or one of her relatives, would get the check. With the payee's permission, they
    would endorse it. They knew her signature, or his signature, very well, and they traced it. They got by with it. Then,
    they cashed the check. They had the money. She reported, or he reported, that they didn't get the check, and they were
    sent a duplicate. They cashed it. Both checks were cashed. And so, this solved the whole thing. They took care of that
    right away.
- speaker: Respondent
  text: I almost had my time in. And I'd told them when I went to work - I think it was in April - that I was going to quit
    by September 1, when the hunting season opened. I said, "Nothing can interfere with my hunting season. And the dove season
    opens September first, so I'm going September first." Well, this was supposed to be along, drawn-out job, but it came
    so easy and so simple that I finished it in late J une or early J uly. So, I jokingly mentioned to Keith McKay, the chairman
    of claims, who was my boss, that I was going to have to go look for someone else to finish out my time.
- speaker: Respondent
  text: He said, "My God, you're a miner." He says, "We've got a claim down in Hawthorne for a mining company,
- speaker: Respondent
  text: and it's going to cost us a million dollars." He said, "Our investigators have accepted it. It bothers me. There's
    something that don'tseem right, but I'm not a miner, and I don'tknow what the hell is going on. But let me give you the
    reports herefrom our investigator." He gave me the report of these two investigators, who, as I went on working there,
    I found out were not absolutely honest themselves, either, and damn poor investigators. I read these reports. Something
    didn'tclick to me, either, but the claimant was working for a mining company that. . . two guys owned this mining company,
    and I knew them well from years gone by. So, I went down. The minute I went in their office, I smelled something wrong.
    They knew who I was, but they didn'tknow I was working for the N.I.C. till I told them, because I was investigating a
    claim and told them which one. To make a long story short, this fellow was on their payroll as their employee working
    for the Industrial Commission. But he was moonlighting, and hewasdrivingatruckfor somebody else, and he was loading in
    Mina. He loaded this truck in Mina from a loading ramp, and the stuff was chalk coming from Mount Montgomery, an operation
    up there. I forget what this chicken scratch was . . . material is what it was. As he was loading a truck, somebody appeared
    mysteriously, just beat him to death, almost to death, and stole his money, and just beat him up seriously. And his eyes
    . . . they blinded him. He was blind. He couldn't see any more, and he had brain damage, and he had just been really worked
    over. I started digging into that, and it was really comical. What had really happened, there was a fellow from - I think
    it was either Arkansas or Oklahoma. I can'tremember which, but he was an Okie, anyway. He had a sixteen-year-old daughter,
    and he was having intercourse with her. She was a
- speaker: Respondent
  text: good-looking girl, and she got a boyfriend, and shestarted goingout with theboyfriend, and I suppose she was doing
    naughty-naughty with him, too. The father that got robbed and beat up told this guy, her boyfriend, that if he showed
    up again, he was going to shoot him, and he locked the girl up. Well, sometime after dark, the boyfriend came to the window,
    and she opened the window, and the old man was waiting. He barged out there with a gun, and, naturally, he scared the
    kid. The kid was twenty years old - big, husky, young fellow, good-looking - I found out later, and he took off. The old
    man jerked the girl back in the house. Either that night or the next night, the father drove down and was loading his
    truck again, when this young man showed up. He was wearing gymnasium shoes, because his tracks were all over. I guess
    he just damn-near beat this guy to death. He didn't rob him. He just worked him over.
- speaker: Respondent
  text: Well, he turned in the claim to his employers, who were carrying him on the N.I.C. and getting paid from the chicken-scratch
    company for their portion of the N.I.C. They were all violating the laws. That's why my two miner friends were worried
    as hell when I started investigating, and they found out what.... Anyhow, naturally, it was reported to the sheriff. The
    sheriff was Hefty Sanderson. I'd known Hefty all the years I was prison warden. He was sheriff. Well, Hefty was quite
    a con artist. And so, I thought, "I'll go to the sheriff's office and get a report of the investigation, because when
    a man is almost beat to death, and he's lost his eyesight, and brain damaged, and everything else, he's got to have a
    report.
- speaker: Respondent
  text: So, I went up to the office, and Hefty wasn'tthere, but the woman at the desk was a deputy sheriff. I forget her name.
    I introduced myself, and I told her what I
- speaker: Respondent
  text: wanted. I wanted a report of this various incident. She went through everything and says, "I can'tfind it."
- speaker: Respondent
  text: I could tell that she knew where it was, but I wasn't going to get it. I said, "Well, you can'tvery well lose that
    in the sheriff's office. I mean, who was the deputy that investigated it?"
- speaker: Interviewer
  text: '"Well," I said, "who is he, and where does he live? I''ll contact him." I said, "We better get together here on this.
    I want to see that report."'
- speaker: Respondent
  text: She just didn'tknow what the hell to do or what to say, and just then, Hefty Sanderson walked in. If he'd known I
    was in there, he'd have never showed up, because even if he didn'tknow what I was there for, he'd have got suspicious,
    but he was trapped there. So, I turned around, and I said, "I'm here trying to get a copy of a report," and I told him
    what. I said, "Seemed like it got lost or misplaced someplace, but I want it."
- speaker: Respondent
  text: '"Well," he said, "I think we did investigate that. Didn''t a mount to anything." "You mean to tell methattheguy was
    beat up, and he lost the sight of both eyes and brain damaged, and it didn''tamounttoanything?" I said, "Hefty, youthinkthis
    is a little, old school teacher from Santa Barbara? This is the old warden talking to you." I said, "I want that report.
    I hope, the hell, I don''thave to go get a court order to get it."'
- speaker: Respondent
  text: He says, "Come on. Let me talk to you." He went on. He says, "Now look, Art." He says, "That thing is all done and
    past." And he told me the story. He
- speaker: Respondent
  text: says, "The kid's from a good family. Some of our most prominent people. We just don'twant.... The old son of a bitch
    got what was coming to him, so why don't we just forget it?"
- speaker: Respondent
  text: I said, "We're not going to forget it, because this is going to cost the taxpayers in one way or another. It's going
    to cost the Nevada Industrial Commission, from what I can gather, maybe a million dollars. And we just can'tafford that."
- speaker: Respondent
  text: Well, he said, "I really don'tthink we've got a report on it, to be honest with you. I'll give you all the in formation
    to settle it."
- speaker: Respondent
  text: I said, "That'll do." So, I went back with the in formation, and we called this fellow into a hearing, and everything
    was ready to pay for all these medical bills and everything. We told him what we'd found out, and we said, "We'd like
    you to withdraw this claim," which would be the easiest way to go. He withdrew his claim.
- speaker: Respondent
  text: So, that took me two or three weeks, and I'm getting pretty close to September 1. By God, we got another mining accident.
- speaker: Respondent
  text: When I went to work for the Nevada Industrial Commission, it was a temporary job. I needed three or four months for
    my retirement. I had to work up until J uly, and by the time that came along, I'd finished the job I was hired for, and
    I'd accidentally got into investigations.
- speaker: Respondent
  text: I investigated that case down in Hawthorne that saved them half a million dollars. And the minute that was over, they
    had one up in Gerlach - a mine explosion. They had a man in the hospital that's supposed to be all blasted to pieces,
    and the N.I.C. investigators had investigated, and it was a valid claim, and this was goingto cost them. The man's eyes
    were blown out. His brain was gone. This
- speaker: Interviewer
  text: was going to cost them half a million dollars or more. She says, "Will you go up and check that out?"
- speaker: Respondent
  text: I said, "Yes, I will." And I went up. To make along story short... oh, first I went to the hospital. The man was still
    in the hospital at St. Mary's, and I looked at his face, and I knew he'd never been in a mine blast, if he'd been in a
    mine at all. So, I barreled up to Gerlach, and I had a few acquaintances around there. I found out that he got drunk at
    one of the joints, and at four o'clock in the morning somebody beat the hell out of him and threw him out in the gutter.
    The N.I.C. investigators that had been up there investigating before, had only talked to his friends, nobody else. And
    so, there again, I can't imagine how much money I saved there.
- speaker: Respondent
  text: He had an attorney named J im. He was district attorney in Churchill County, one of my very good friends. He was now
    in private practice. And he came over to represent this guy. When he talked to me, he went over to his client, and he
    said, "You need a new attorney. I'm quitting."
- speaker: Interviewer
  text: The man said, "Why?" He says, "I talked to Bernard, and he told me what happened." Well, he said, "Aren't we going
    to have a meeting."
- speaker: Respondent
  text: He said, "No. If Bernard said that happened, that's what happened. I don'twant any part of it." So he didn't either.
- speaker: Respondent
  text: So, now September the first was just around the corner, and that's when the hunting season starts. That's the dove
    season. So, I went to Keith McKay, the claims manager, and I says, "Well, Keith, it's been nice working with you guys.
    I've enjoyed it. I've enjoyed the type of work I had, and I enjoyed being successful at it, but I've got to leave. I've
    got my time in."
- speaker: Respondent
  text: '"Oh," he says, "you can''tquit." He says, "You just stay righthere with us." I says, "No. Nothing is goingto interfere
    with my hunting and fishing. And I don''tneed the money. I don''tneed a job."'
- speaker: Respondent
  text: He says, "You've earned your money for the next fifty years. Your salary is . . . you've earned it for the next fifty
    years."
- speaker: Respondent
  text: I says, "Send me a check every month." He says, "No, you've got to be on the payroll to get it." Well, I said, "I
    just can't do it. And nothing's going to in terfere with my hunting."
- speaker: Respondent
  text: Hesays, "You can go huntingand fishinganytimeyou want. We'll put your dog on per diem. You won'thave to feed your
    dog." He says, "You're smart enough to know that you're going to be an in vestigator. You're going to have a certain a
    mount of claims to in vestigate. You can do them any time you want, as you want them or where you want them. They're going
    to be all over the state. You're goingto be in duck country. You're goingto be in fishing country. You just as well be
    doing it on salary and on per diem and on expenses."
- speaker: Respondent
  text: I says, "I don'tknow how anybody could turn that down." So, I stayed on, and I had more interesting cases and saved
    them millions more. Guys that just - nobody but me could have done it. They had one casein Pocatello, Idaho, where a man
    was working for Harolds Club and went around and fixed up all these Harolds signs. They had "HaroldsClubor Bust" signsall
    over the country. He had a crew of men driving a well-equipped truck all around doingthis repair work. Harolds gave this
    lead man a whole chunk of money, four or five thousand dollars, however much he'd need to make the circle back, and
- speaker: Respondent
  text: they'd be gonefor a month. He got in thistown in Idaho, and every night he used to have to call and give a report,
    so he got on a pay phone to call, and while he was in there, a big African American, six foot six, 250 pounds, came in
    there, beat him, almost killed him, broke both jaws, and stole all his money - Harolds' money. Naturally, they hauled
    him to the hospital. Harolds was insured for this money. I mean, they had insurance that would cover this money loss,
    the stolen money. So, they sent an in vestigator up there, and they couldn'tcome out with anything. They couldn'tlearn
    anything that had happened. In the meantime, this guy's got broken jaws. They're healing, and his claim is coming up before
    the N.I.C., and this is going to bean expensive one. The insurance company hired some investigators from Reno, and I can'tthink
    of their name now. They're both ex-sheriff's officers, and they went up, and they couldn'tfind out anything, and we're
    stuck with it. McKay - he called himself McKigh - is pretty well acquainted with my method of operation. He says, "Why
    don't you go up there and look into that. See what the hell you can find out."
- speaker: Respondent
  text: So, I went up, and I took my wife - she insisted on going, because we'd heard about this not being able to in vestigate
    anything. She wanted to go along and protect me, and to keep her quiet I said, "All right, you can come along for the
    ride."
- speaker: Respondent
  text: We got up there, and I got all the history I could, first. I found out what motel he was staying at, and he had his
    helper. So, I went up, and I started at the motel, and the in formation I got from there led me to his helper. The in
    formation I got from there was that, he didn'tknow what had happened, but he had all this money, and he wanted to go to
    a whorehouse, a black whorehouse. He was in the mood for a change, I guess. And he never saw
- speaker: Respondent
  text: him again. He said that night he was all beat up. So, I went from there. Well, a man beat up that bad, we've got to
    have a police report. So, I went to the police department. It was a pretty good sized police department. I told them who
    I was and what I was there for. He says, "You're wasting your breath. We can't get a thing. We can't get a thing." They've
    got a big black district down there, and there's a big mafioso running it. I mean, the big black - you can't get anything
    out of him. The cops had gone down there, and they'd run into nothing but stone walls. Nobody would tell them anything.
    Well, but they did know that this big black had been arrested, but he'd never been tried.
- speaker: Respondent
  text: And I said, "Well, I'll go down there and smell around myself." "Oh, you can't go down there. You can't go down there.
    It's dangerous."
- speaker: Respondent
  text: '"Oh," I says, "Hell, I don''tknow why it would be dangerous." "Our men go down there in pairs. We''ll send somebody
    with you, but you can''t go down a lone."'
- speaker: Respondent
  text: I says, "I'm going down. I'm going down a lone. That's the only way I can investigate." So, I told my wife where I
    was going to go, and she had a fit. She wanted to go along.
- speaker: Respondent
  text: I said, "You can't go into a black whorehouse!" I finally a greed that she could stay in the car outside while I went
    in. "Lock the doors and don'to pen them for hell or high water." I knew that I had to find this black mafioso boss.
- speaker: Respondent
  text: I went in, and in my days as mine inspector, mine operator, I always referred to anybody as "boy." A group of them,
    "How you doing, boys?" I didn'tknow that you
- speaker: Respondent
  text: didn't say, "How you doing, boys?" to blacks, as much as I'd been around blacks and had black friends. But anyway,
    I parked my wife in this new Chevrolet out there by the curb, walked across the street, walked in, and there was a whole
    group of young blacks at a bar. I said, "Howdy, boys," as friendly as I could be. You could have heard a pin drop. I said,
    "I'm lookingfor the man who isthe proprietor of this building, and one of them pointed that way, and I went in, and I
    saw an office with a black girl, and I could see a big man through a window in another office. And so, I told this lady
    that I wanted to see the manager, and I was talking loud. I know this guy is listening. I told her who I was, and I told
    her that I was investigating a claim, and I told her what the claim was, and I said, "It don'tmake sense to me, and I'd
    really like to find out what happened. I think that this man could tell me. What is his name?"
- speaker: Interviewer
  text: She said what it was, and she said, "He's there. "He's in there." And he's already on his way out. He says, "What
    can I do for you?"
- speaker: Respondent
  text: I told him what I wanted and why I wanted it, and that I didn'tthink that he'd been beaten up by a black man, but
    I wanted to know for sure.
- speaker: Respondent
  text: He says, "I wasn'there when it happened, but," he says, "I know exactly what happened. He came in here with a lot
    of money. He started throwing his weight around. He started buying drinks for everybody in the bar. He started horsing
    around with the boys." And he named their names. I had the name of this guy that broke his jaws. "And he wanted black
    girls."
- speaker: Respondent
  text: He took me upstairs, talked to one of the black girls, and shesaid, "Hecamein, and he had all thismoney. He just kept
    throwing it around, and he was too drunk to do
- speaker: Respondent
  text: anything anyway, but he left. By the time he left, he left all his money." He'd been trading hats back and forth with
    one of these big blacks, and he got away with the black's hat when he left. The black followed him, because he wanted
    his hat. He went up to a pay phone and went in, and the black went in there and told him, "I want my hat."
- speaker: Respondent
  text: He says, "Get out of here, you goddamned expletive deleted. We made our trade." "And he started punching me," he says,
    "I just put out a fist, just to protect myself. I caught him right on the chin, and his jaw just broke."
- speaker: Respondent
  text: So, I had all this, but I talked to several people, and I found out that the judge was suspicious of this whole thing,
    and that's why he didn'thold a trial. I went up to the hospital to get a report on the man, because he had to go to the
    hospital, and they wouldn'tgive me the records. I said, "If I've got to go get a court order to get those records, I'm
    goingto get them. I want to know what the hell happened and what condition he was in when he come in here." So I got the
    records. He was maudlin drunk. They couldn't do anything but set his jaws. And anyway, I came back. I settled that.
- speaker: Respondent
  text: Thetwo insurance companies whose investigators had gone up there to in vestigate this, wanted a copy of my report,
    because they didn'thave anything. And for their own benefit. McKay wouldn't let them have a copy of my report. He said,
    "By God, if they haven't got good enough investigators to do what you did, they're not entitled to it."
- speaker: Respondent
  text: That's just another exampleofhow you were not afraid of any kind of situation, which is whatmadeyou a good
- speaker: Respondent
