    everything. But I took him out in the yard, and he and I became quite friendly, and at that time we had what we called
    the bull pen, where our gambling tables were. Gambling was legal in Nevada, so I assumed for that reason, they considered
    it was legal in prison. Whether they could do it openly or not, gambling goes on in every prison, as much as was going
    on in the state of Nevada, only it was illegal. They bet on a nythingthey could. They had places where they gambled -
    I know from experience after I started visiting the other prisons. They all had gambling, except it wasn't legalized,
    and they couldn'tcontrol it. I could control mine, because once I went in there, I changed the rules. Before I took over,
    whoever was the strongest, had the most clout or the most money, or could hire the most help, controlled the gambling.
