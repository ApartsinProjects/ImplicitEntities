- speaker: Respondent
  text: Not much at the time. There was the usual hullabaloo in the press about the antis and the pros, and, in fact,
- speaker: Respondent
  text: I was called to a panel on the death penalty. I can'tremember the date. I was the pro capital punishment, and they
