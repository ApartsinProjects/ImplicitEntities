    there was a grove of cottonwood trees there in this seep, which made a pretty good puddle of water. The stage from Piocheto
    Ely and back would stop at this Pony Springs to water the horses, but there was no facilities there at all. Sport had
    been caught rustling horses, and they took him to Pony Springs there. They happened to be near there, and they took him
    over there to hang him. They brought him on his own horse; they tied his legs under the horse, put him under a tree and
    were getting the rope ready to put around his neck, and they made the mistake of leaving Sport with his own horse. He
    was a phenomenal horseman, according to history, at the time, and he knew his horse just like he knew people, and he got
    away. He got that horse in a lope, in a gallop, and by the time they got their horses, he had a little distance. They
    started shooting at him, and they hit him in the knee, but he got away. However he got his hands and feet untied, no one
    will know, and he never told. But somebody must have found him and helped him. His knee had rotted without medical care,
