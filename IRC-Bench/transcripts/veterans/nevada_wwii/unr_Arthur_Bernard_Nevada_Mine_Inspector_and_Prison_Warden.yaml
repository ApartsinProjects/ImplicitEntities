    recommendations and tell him how good .... He says, "I'd like to get out to that ranch and cook." And he says, "But there's
    so damn many a head of me."
- speaker: Respondent
  text: Well, I wrote him. I said, "I'll write to the warden and tell him what a good man and a good cook you are. I don'tknow
    what I'm going to do with all those guys that are a head of you."
- speaker: Respondent
  text: Now, I knew the warden. I knew all the wardens. We got along fine. The fact that my wife was a pianist, that very
    few professionals can touch her - when we'd go to these conventions, she and I were the life of the party. We played the
