  text: Inspecting the Mines So I told her, I said, "Don'tshoot anything over that mud flat, because we can't get them." And
    jokingly, I said, "If you drop a duck over there, you go get it." The first thing she did was drop a duck over there.
    I said, "Go get it." It was a big bull sprig.
- speaker: Respondent
  text: 'She says, "Oh, well, you''ll get it." I says, "No." And I didn''t. "I told you don''tdrop a duck over there, or you''ll
    go get it. You''re going to go get it. I don''tkill ducks for anything else and leave them. If I shoot it, I''ll eat it."
    She finally went and got that duck. She was pretty muddy when she got back, and she was pretty aggravated, too. Before
    we left, I''d bought a pint of rum, and the brand was Lazy Bones Rum. After we got through hunting, during which we didn''tspeak
    too often - she didn''t get over that, having to retrieve that duck - we got in the car, and I had a brand new Dodge sport
    coupe, and we had a few drinks. I''d taken lunch: sardines, crackers, whatnot. And we stopped by the side of the road
