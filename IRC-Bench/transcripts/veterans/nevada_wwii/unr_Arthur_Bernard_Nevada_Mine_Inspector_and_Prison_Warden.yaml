- speaker: Respondent
  text: He told me, he says, "Savage asked me to take a drink. He says, 'J ust one drink won'thurt you, Finnegan. J ust take
    one.'" He says, "I just took one, and then I saw where he put the bottle."
- speaker: Respondent
  text: Then I got a hold of John. I says, "What the hell? I told you not to give him a drink!" "Art," he says, "I couldn'thelp
    it." He said, "Some buyer or so mebody came through late at night - after hours anyway - and they couldn't get anything
