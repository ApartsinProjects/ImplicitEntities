- speaker: Respondent
  text: So, I wrote him a letter, and I told him about Finnegan. And I said, "He can'ttake liquor, but he is a hell of a cook.
    He's economical. He'll do you a good job, and anything you can do, I'd appreciate."
- speaker: Respondent
  text: I got a letter back from the warden within a week. He says, "I sent your cook out to the prison. He's doinggood."
- speaker: Respondent
  text: And pretty soon I got a letter from Finnegan telling me how much he appreciated it. He was sure I was the best warden
    he'd ever served under. This guy that he was under now was a pretty good guy, too, but he sure appreciated what I did
