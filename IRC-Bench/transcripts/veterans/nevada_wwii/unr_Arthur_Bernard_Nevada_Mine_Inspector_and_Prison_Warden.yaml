- speaker: Respondent
  text: He said, "I know. I a gree with you. I just can'thelp it." Anyway, I told Bill that he was to be executed.
- speaker: Respondent
  text: '"God," he said, "you can''t do that!" He said, "You got to let him out and send him to me. We need him in Las Vegas."'
- speaker: Respondent
  text: Everybody laughed, because they could all hear it, and they all knew that I joshed with Red every time I came in about,
