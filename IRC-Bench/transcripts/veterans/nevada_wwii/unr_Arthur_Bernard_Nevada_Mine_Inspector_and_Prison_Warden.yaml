- speaker: Respondent
  text: Mining, Mucking, and Boxing They said, "You're big enough. If you're big enough, you're old enough." And that's the
    way it was working in the mine.
- speaker: Respondent
  text: What's the first job that he put you on, then ? I was a top-car man. That is the hoist. The skip, loaded with minerals,
    comes up out of thetop, and it dumps into an ore chute. There's two ore chutes, or a big ore chute separated in two. There's
    a wingthat separates the two chutes. When they bring up the ore, they swing the gate one way, and it goes into one chute,
    and when they bring up the waste, they shift the door, and it goes into another chute. So, at this particular mine - and
    mostmines of that size at that time - they have a man who runs the top car. He has a steel car that holds a yard of material.
    That's anywhere from a ton to a little more to a little less, depending on what the material is. The top-car man, when
    he's loading, when he's taking ore out of the ore bin, takes it over and dumps it over a grizzly where two men - or one
    man, depending on how much work there is to do - sort the ore. They throw the waste out of there, and the ore goes down
    into another bin, which, in this particular in stance, was put into tram cars and hauled over a mountain to a place called
    J a ckrabbit, where the train from Pioche, a little dinky narrow gauge, took it from there to Pioche. When they had the
    waste all out, he trammed the waste, and he put that over the dump. The dump, at this particulartime, was hundreds of
    feet deep, and if you weren't careful, you could dump the ore. If you didn'to pen the
- speaker: Respondent
  text: gate in time on the ore car, it went over the dump. And getting it back up was quite a job, because it had to be taken
    down to the bottom, put into a truck, and hauled up around the mountain. Top-car men were not supposed to let that ore
    car get away from them. It's one of the first things that happened to me. I was in a big rush, and I lost the ore car.
- speaker: Respondent
  text: But anyway, make along story shorter, I became, probably, the champion top-car man in history there. God, before that,
    they'd oftentimes had to put someone on the night shift, because the top-car man couldn't handle it. I never had enough
    to keep me busy, and I made quite a reputation as a top-car man. I stayed with that as long as I had to, but I got twenty-five
    cents a day less than the muckers in the mine, and they got twentyfive cents a day less than the miners. The miners, at
    that particular time, were getting five dollars a day, the muckers $4.75, and being on top in the fresh air - I was the
    top-car man - I only got $4.50. I wanted to get into that big money, and I was very popular with all the bosses, because
    I was a hard worker. I asked if I could go down in the mine and be a mucker. "No. God, no. You stay on this top car. This
    is the best job."
- speaker: Respondent
  text: '"I need that twenty-five cents a day." I chiseled and chiseled till they finally put me down there mucking, and I
