- speaker: Respondent
  text: Bythistime, all those things were coming into effect. In practically every mine, by then, the miners wore hard hats.
    Not as good as they are today, but they were an improvement over the soft hats.
- speaker: Respondent
  text: Any other equipment that was for safety? Well, I can'tremember anything in particular. Wejust looked for safety measures,
    like make sure that there were cables and ropes around ore bins where the miner had to tie himself, so that he couldn't
    be sucked into the ore chute. Various things, just common sense.
- speaker: Interviewer
  text: 'Now explain that to me a little bit: tie himself so he wouldn''t be sucked in. How does that work? Inspecting the
    Mines'
- speaker: Respondent
  text: Well, around every mine or mill, there are chutes - and in the mines too - that are full of muck. Muck is the substance,
    the dirt, that the ore and everything is in. It is pulled out of a chute down below and either on belts or by car somewhere
    and taken to the mill or the smelter. And this material, being packed together, creates a little hole up through the center
    and hangs up. Somebody has to get up on top and start it down with a bar or however they have to do it. Many ways that
    they can getthismuck started again. And when they do, it caves in, and if a man is on there without protection, he's sucked
    right into the middle of this mass of muck and ore.
- speaker: Respondent
  text: Like a funnel , pulled down with it? Right. And I'll bet you that 50 percent of the fatalities in the state are due
    to men being sucked into these caveins in the chute. So the law requires that there be a cable with a harness attached,
    and the cable attached to some safety measure. The guy that's doing the work is supposed to put on this harness, tietherope
    safely, so that if the muck goes out beneath him, the rope will stop him, and the harness will stop him before he gets
    into this maelstrom that's going out. If they do that, they're safe. But most men - and I myself did the same thing when
    I was mining - think, "Well, I'll watch it." Fortunately, I never got caught. Some of my friends did. But various little
    things like that and being careful with dynamite and blasting and making sure that ladders were safe and in good condition,
    checking the ground and the stopes and the areas where they were getti n g out the ores to see that they were well timbered
    and that. There's just so many things that an in spector looks for. It isn'talways
- speaker: Interviewer
  text: necessarily a law that is written, but common sense. And years of experience. What was it about the job that interested
    you?
- speaker: Respondent
  text: Oh, it was very interesting. Mining is one of the most interesting methods of making a living I've ever found. I never
    thought I'd ever want to get out of mining.
- speaker: Respondent
  text: 'When you inspected , you lived in Ely. Did you inspect only a certain area, or all over the state? I had half of
