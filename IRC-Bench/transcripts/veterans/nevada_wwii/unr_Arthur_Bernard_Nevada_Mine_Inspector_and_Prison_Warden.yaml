    finally got up to a certain elevation, there was no sign of tin at all. Go over to the next canyon, find the same thing.
    In the next canyon, find the same thing. Spent all day there.
- speaker: Respondent
  text: The crew was supposed to break up, and Scrugham was going back to Washington, the two engineers were
- speaker: Respondent
  text: going back to Washington, all the old prospectors were going back to their cabin, and I was going to take Scrugham
