  text: UMN Immigrant Stories Collection ['United States'] Rody Say was born in Mea La Oon refugee camp in Thailand in 2000.
    Her family later resettled in the United States. file:///F/Immigrant%20Stories%20Transfer/Say,%20Rody/Rody%20Say%20Transcription.txt[7/6/2017
    3:46:06 PM] "Difficult Life in Burma" When my family was in Burma, they had a difficult time. They grew food on their
    farm, but they didn'thave enough food. Each day they had to share food and ate together in the kitchen. When the war started,
    my family had to run away from the Burmese soldiers. Otherwise they would get killed by Burmese soldiers. During the war,
    Burmese soldiers killed more than a hundred Karen people, destroyed the people's houses and their farms because they wanted
    to take over our land. But my family found a way to escape. Before they escaped, they needed money so they sold the food
    that they grew. After they escaped, they moved to the Mae La Oon camp. When they moved in Mae La Oon camp, they started
    getting food for free because people who worked in Mae La Oon camp gave them a note which allowed them to get food every
    month. If they lost it, they would not get food anymore. When my family moved to Mae La Oon camp, they said it was easier
    than Burma because they didn'thave to plant a lot and work early every morning. They got free food in Mae La Oon camp,
    but if they wanted more food, they had to work to get money to buy more. In Mae La Oon camp, the a mount of food you get
    depends on how many people are in your family. Then, 16 years later, my family heard that American people were going to
    help refugee people fill out a form to go to America. Before my family went to sign up, they try to find out about America.
    After they found out about America, they starting to apply to go to America. One year later, Americans started to in terview
    my family and check out health problems at Mae Sot. A few months later we got to go to America. When my family moved to
    America, they started a new life. My family had a good life in America because they got food that they wanted to eat and
    free education. Life in America is easier than Thailand. They thank God a lot for blessing them to get to come to America.
    America had freedom so it was good for them to start a new life. If they were still in Thailand right now, they wouldn't
    get enough food and freedom like America. Also they would still have to run away from Burmese soldiers. So they were really
    lucky!!
