- speaker: Respondent
  text: 'DATE OF INTERVIEW: October (LO, E975 PLACE OF INTERVIEW: Sacramento INTERVIEWER: Heihachiro Takarabe'
- speaker: Respondent
  text: 'Yasuka Akamatsu Mrs. Tsuya Imaoka, Sacramento, Calif. Age: 90 Interviewed by Rev. H. Takarabe on 10-l0-75'
- speaker: Interviewer
  text: 'Please tell me your: name. My name is Tsuya Imaoka (maiden name Tsuya Tanaka). Q@: What part of Japan are you from?'
- speaker: Interviewer
  text: I was born in Meiji 18 (1885) and I am 90 years old now.
- speaker: Respondent
  text: 'Q@: You a revery healthy, aren''t you? A: Yes, I am. I was using reading glasses until last year but I found out
    that I could ready without glasses and also thread a needle. I sew or knit everyday.'
- speaker: Interviewer
  text: 'Did you attend school while you were in Japan? A: I had some education in Japan. My father was a calligrapher and
    he also wrote poems. Many village people came to study'
- speaker: Interviewer
  text: 'under him. I learned from him also. @: Was your father a very stern person? A: Yes, old timers were pretty stern.
    He served under the'
- speaker: Interviewer
  text: 'Saga area feudal lord. My grandfather nn my mother''s side also served the lordship. Q@: How was your mother?'
- speaker: Interviewer
  text: She was the daughter of a person who served the lordship. She was a very gentle person but strict in her teachings.
- speaker: Interviewer
  text: 'How many brothers and sisters did you have? A: There were four of us. I had an elder brother and two'
- speaker: Respondent
  text: 'elder sisters. I was the youngest child. Q@: Do you remember anything about your family? My father was a village
    master and didn''thelp the farm at all. I remember that my mother had to worry about the farm I was young and didn''tknow
    well but I think they had other people operating the farm on the sharecrop basis. My father was'
- speaker: Interviewer
  text: Did you have fun as a child? Did you play with other We didn'tmingle with other children. We played with our
- speaker: Respondent
  text: 'cousins and relatives. When I think about it now, I feel embarrassed. (Note: Families who served the feudal lord
    were considered in the higher society.)'
- speaker: Interviewer
  text: What you have learned from your parents, has it helped you
- speaker: Respondent
  text: I am thankful of the education I received from them. My parents werevery strict. My brother went to another town to
    attend school. My father would get very upset if my brother wrote letters to my parents carelessly or without respect."
    My mother intervened and asked my father to forgive him because my brother was probably very busy and had to write in
    a hurry so
- speaker: Interviewer
  text: 'he made some mistakes, Q@: When you were young, did you learn about Sontoku Ninomiya (a scholar)? I probably did
    but recently my memory is not good.'
- speaker: Respondent
  text: 'Q@: What was your parents! religion? A: They were "Zenshu''! Buddhists. My father went outside every morning and
    prayed toward all directions (east, west, north and'
- speaker: Respondent
  text: south). Next, he went to the well and prayed to the God of Water and then he came inside the house and worshipped.
    When I was 16
- speaker: Respondent
  text: years old, a friend came and asked me to go to the Buddhist Temple with her. I went to my parents for permission but
    my father
- speaker: Respondent
  text: said I was still a young girl and I owed my life to God and that I did not have to go to the tanple to worship the
    dead. I had to tell my friend I had something to do and could not gO with
- speaker: Respondent
  text: her. My father's word made me ponder about religion. I thought at the time, the most important God was the "God of
    Air,'!
- speaker: Respondent
  text: '[I could not find "God of Air" so I didn''tbelieve in any religion until I was 47 years old. My husband passed away
    when I was 47 years old leaving 5 children with me. I was born as the youngest child of the family and I was physically
    weak. I never thought I could come to America. My grandfather was a doctor and there were many doctors a mong the relatives.
    They told me if I took it easy I could live any place and they thought coming to America was alright. After my husband
    passed away, a friend told me that I had to take care of myself and stay healthy to raise my 5 children. She told me there
    was a class on nutrition. Since I had small children and could not go out in the evenings, she arranged to have the lecturer
    come to my home. The person that came was he Rev. Nagaki. He is a Seventh Day Adventist minister and has a church in Mt.
    View now. He taught me the Bible and I became a Seventh Day Adventist. Since then I have becomevery'
- speaker: Respondent
  text: 'healthy and am still living. Q@: I want to go back to the time you were in Japan. Was there any special happenings
    in your village while you were there?'
- speaker: Interviewer
  text: I-can'tt think of any special happening. Were you in school at 16? There weren'tmany attending school then, were there?
    The school just opened about that time and very few attended,
- speaker: Interviewer
  text: Do you remember how many years there were in the grade school? I think it was 4 years and I went 4 years of high school.
    I learned more from my father. More students came to my father
- speaker: Respondent
  text: than Lo ucne scnools
- speaker: Interviewer
  text: What did you like the most in school? I don'tthink I had any preference. When I first attended the school, the teacher
    asked if anyone could count up to one sen (one cent). I told him I could so he made me start counting.
- speaker: Respondent
  text: I started ichi-rin, ni-rin, san-rin, yorin (4/10 of a sen). The teacher interrupted and said I snould say shi-rin
    instead of yorerine JI went hone that day and said to my father "tadaima" (means I have come home. We had to say this
    as a courtesy).
- speaker: Respondent
  text: He asked me what I learned that day. I mentioned about the shi-rin. He scolded and hit me so hard I started crying.
    My mother wondered what had happened and started calming down my father. I was swollen but the next day, my father took
    me to school, met the principal and another teacher and he mentioned to them that there is no shi-rin. Since then they
    started to say yo-rin instead of shi-rin. My father was not a person to
- speaker: Interviewer
  text: 'hold back. He taught us the way to live our lives. Q@: Do you remember the Japanese=-Chinese War or the Japanese-
    Russian War? I remember the Japanese=-Chinese War. I was still young then. Q@: How did you come to America? I was married
    in Japan and my eldest son was born there. My'
- speaker: Respondent
  text: husband was in America working for the government. Since it was hard for him to make many trips to Japan to see us,
    he made
- speaker: Respondent
  text: 'arrangements for us to come to America. Q@: Was your husband a representative of the Japanese Government? A: No,
    he worked for the U.S. Government. He came to America earlier to study and later got this job. He returned to Japan'
- speaker: Respondent
  text: 'to get married then came back to the U.S.A. again. Q@: Did you know him? A: No, I didn''t. My elder sister was in
    the city of Nagasaki and she is the one who made arrangements to have him meet me. Later we got married and my eldest
    son was born in Japan.'
- speaker: Interviewer
  text: 'Were your parents against your marriage to a man who was working in a foreign country? No, they weren''tbecause they
    thought he had a good position. Q@: Was the marriage done with the understanding of the parents of both sides? No, his
    parents were deceased, What part of Japan was he from? He was from "Iyot (Shikoku Island), Where was he working in the
    United States?'
- speaker: Interviewer
  text: 'He was in Seattle, Washington. He must have had a good knowledge of English. A: Yes, he was very efficient with the
    English language. He'
- speaker: Interviewer
  text: 'graduated from a school in this countrye Q@: What school did he graduate? I do not know what school it was. When
    did you come to Seattle? A: I came in 1915, How old were you then?'
- speaker: Interviewer
  text: I must have been close to Ke How old were you when you got married? I think I was 25. My eldest son is 65 years old
    now.
- speaker: Interviewer
  text: 'Q@: What did you think America was like? A: I didn''tthink much about it. T was teaching sewing at home'
- speaker: Interviewer
  text: 'before I came to America. Q@: When you first saw Mr. Imaoka, what did you think of him?'
- speaker: Interviewer
  text: 'I didn''thave any comments. Was he handsome? A: No, he wasn''thandsome. TI had heard of America and wanted to come
    if my parents approved. We didn''t do anything against our'
- speaker: Respondent
  text: parents wishes those days. I think it was because we learned this in our moral training lessons. I worried about my
    health
- speaker: Respondent
  text: but I am still living at this age. I owe it to God. He gave me everything I needed. God sustains all living creatures
    and I
- speaker: Interviewer
  text: 'thank God for everything. Q@: Did you live in Seattle when you first came to America?'
- speaker: Interviewer
  text: Yes, all of my children except the eldest were born there, What was your impression of Seattle? I thought it was a
    nice place. I owe it to my husband.
- speaker: Interviewer
  text: 'How did you feel when you first saw caucasians and black people? A: In those days, I didn''t see any black people.'
- speaker: Interviewer
  text: 'Q@: How did you feel toward caucasians? A: I didn''tfeel any difference from other people. There were'
- speaker: Interviewer
  text: 'many Japanese immigrants. [I tried to be nice to them. Q@: While you were traveling on the ship to Seattle, do you
    remember of anything?'
- speaker: Interviewer
  text: 'I was seasick all the way and stayed in a hospital room. Q: Did you feel any in convenience when you came to Seattle?
    Did you have any hardship? I didn''t. have such a hard: time. Q@: How was your English?'
- speaker: Interviewer
  text: 'I couldn''tspeak English at all and I still can''tspeak it. Wasn''t it in convenient when you went shopping? A: There
    were many Japanese stores and I didn''thave trouble'
- speaker: Interviewer
  text: 'shopping. When English was necessary my husband was there. Did you have any financial difficulty? Q@: Where did your
    husband pass away?'
- speaker: Respondent
  text: Tn Mt, View, Calif. Cin 195))..
- speaker: Interviewer
  text: 'How long did you live in Seattle? A: We left Seattle in 1924. We lived in Mt. View until 1938'
- speaker: Respondent
  text: and then moved to Oakland.
- speaker: Interviewer
  text: After your husband passed away, how did you make a The older children worked as school boy and school girls and attended
    school. They did all sorts of jobs. Husband had a
- speaker: Respondent
  text: life insurance but that wasn'tmuch. The children did without many things they wanted. My brother in Japan (Kyoto)
    wrote and told me to return to Japan with the children as he wanted to help us. However, after discussing the matter with
    the children, we decided to stay in America. All my children worked their way through schoolfa daughte helped answer some
    questions).
- speaker: Interviewer
  text: You must have had a hard time then, did you not? Yes, we went through quite a hardship. What did your husband do in
    Mt. View?
- speaker: Interviewer
  text: He passed away soon after we came there. He was 5e years old. When we were in Seattle, he often took the children
    to fishing, sailing, and etc. I have 31 or 32 grandchildren and
- speaker: Respondent
  text: 'great-grandchildren now. @: Where were you when Pearl Harbor was attacked? A: I don''tremember well anymore. My memory
    was pretty good until a few years ago (a daughter says Mrs. Imaoka and a son moved to Sacramento when the war broke out).'
- speaker: Interviewer
  text: 'What camp did you evacuate to? A: My son and I went to Walerga Assembly Center and then to Tule'
- speaker: Respondent
  text: Lake War Relocation Center.
- speaker: Interviewer
  text: 'Did your son go into service from Tule Lake? A: Yes, he did. That was before the Tule Lake Center became a segregated
    center. After it became a segregated center, I went'
- speaker: Interviewer
  text: 'to Topaz W.R.A. Center, Q@: When you were asked about your loyalty, did you say you were loyal to America?'
- speaker: Interviewer
  text: Yes, my children were born over here. Did youthink it was alright for your son to serve in the 2 thought he should
    go if he was taken in.
- speaker: Interviewer
  text: 'Q@: Did your neighbors say anything? As: Noy they didn''tt, Q@: Were you a Seventh Day Adventist then? Yes, I was.
    I have been a member almost 45 years. Q@: Were church members close together as a group? No, we were scattered.'
- speaker: Interviewer
  text: 'Q@: Were there any trouble in Tule Lake ? A: There probably was but I stayed out of it and didn''teven'
- speaker: Respondent
  text: 'Q@: You were in Topaz for a while, How long? Q@: (To the daughter) Were you with your mother? A: The daughter was
    married and her family was sent to Minidoka'
- speaker: Respondent
  text: 'Were you over 60 at the time of the evacuation? Q@: Did you have a hard time during the war? A: I may have but I
    don''tremember. Her daughter says the hardest time was right after her father passed away and right'
- speaker: Respondent
  text: after they came out of the relocation centers. While in camp, her mother was active visiting people and doing evangelistic
    work.
- speaker: Interviewer
  text: What did your husband die of? He died of a hemmorrhage, You must have been shocked. Yes, I was. My brothersent me
    some money from Japan.
- speaker: Interviewer
  text: Your children were quite grown when your husband died, weren'tthey? The youngest was 9. I forgot all the hardships
    and I thank God for now. I just hope I stay well enough so that I will not
- speaker: Respondent
  text: be a burden to my children,
- speaker: Interviewer
  text: Do you remember any other old-time stories? Az' f don'tthink' too much about..the past. I try to be faithful
- speaker: Interviewer
  text: The Sanseis are now interested in their Japanese background. Do you think it is a good thing? AD enn Doe tes ao good
    Tiaine .
- speaker: Interviewer
  text: 'Q@: Do you want to convey anything to the future generations? A: I think they should learn good manners and etiquette.
    We'
- speaker: Respondent
  text: 'were taught very strictly about our manners. Q@: Do you think manners and etiquette are important? @: Anything else?
    The old-timers say it is good for a person to go through hardship.'
- speaker: Interviewer
  text: I think persons who went through hardship have endurance. Children's education have to start when they a revery young.
    We must learn how to get along with people and etcs. I am old and
- speaker: Interviewer
  text: I don'thave much to say anymore. i. Where did you return to when you left camp (W.R.A.)?
- speaker: Interviewer
  text: The daughter says her husband, a chiropracter, couldn't find office space in Sacramento so they went to Los Angeles,
    Mrse Imaoka has been living with them since. They are in
- speaker: Interviewer
  text: 'Q@: Have you worked outdoors since you came to U.S.A.? A: No, I haventt because I have a weak heart. You can''ttell'
- speaker: Interviewer
  text: 'from outside whether I have a weak heart or not. ; Were your parents tall? A: No, not that tall. (Daughter says her
    mother was 5 ft. 11/2'
- speaker: Interviewer
  text: 'Q@: If anyone wants to hear this tape, is it alright to let them haar this? Ay Yes, its all about myself and not
    about others.'
- speaker: Interviewer
  text: 'Q@: We want to summarize the Issei stories and publish books. Can we have literary rights to these tapes? Do you
    want us'
- speaker: Respondent
