- speaker: Respondent
  text: American Legion Auxiliary, American Legion hall (Boulder City), 77-78 American Red Cross, 89, Anderson mess hall,
    64,
- speaker: Respondent
  text: 65-66, 76, 81 Animus River, 26 Animus River Canyon, Anvil Mountain, 18 Arizona, 6, 95 Army Engine Babcock and Wilcox
