turns:
- speaker: Respondent
  text: 'Interviewed by Chesley Chan Transcribed by Kenza Benazzouz, 3/17/21 (00:33) Aya Al Mzayen: Yes, I was born in Kazakhstan
    and I lived there for my first three years of life and then I moved to Syria and that''s where I was raised.'
- speaker: Respondent
  text: '(00:51) Chesley Chan: I see. So you said you moved to Syria. Do you have any memories of growing up with your family,
    with your sisters, or any friends, and how has that impacted you as a person today?'
- speaker: Respondent
  text: '(01:08) Aya Al Mzayen: I definitely have a lot of memories, uh, a-, I have a photographic memory so I do remember
    a lot of in stances from a fairly young age and growing up was very fun [laughter]. I have an older sister and a younger
    sister, so we always, we have about seven years between each one of us, so we have big age gaps and growing up was very
    interesting.'
- speaker: Respondent
  text: '(01:50) Chesley Chan: And can you tell me about how the civil war was kind of in troduced to your area and, you know,
    you werevery young, you said, uhm, how-'
- speaker: Interviewer
  text: '(02:05) Aya Al Mzayen: Yes. (02:05) Chesley Chan: How did you feel, do you have any memories about the first time
    you heard about it?'
- speaker: Interviewer
  text: '(02:12) Aya Al Mzayen: Definitely. (02:12) Chesley Chan: What your reaction was, what your family''s reaction was?'
- speaker: Respondent
  text: '(02:17) Aya Al Mzayen: So I was eleven years old and we were watching the news and the first thing that ever happened
    or how we heard about the start, we kind of didn''tgive it much-, we were like ''oh, okay'', you know? Everybody always
    thinks that ''oh, a couple of months and it will die down'', you know, ''it will be fine'' and so the first thing that
    happened is a young gentleman was, his body was found tortured and he was mutilated very badly and all of that was because
    he did some childish graffiti on the wall, saying basically like ''f- the President'' or something like that, you know,
    it was literally, it wasn''tanything serious enough to deserve any of what he got and then his family started marching
    for justice and of course, everybody else followed and from there, the, the light was, kind of pointed at basically police
    brutality and governments that are more of, have more of a dictatorship style, that kind of don''tallow you to express
    your opinion without consequences, even though that''s not how its technically supposed to be seen, how it''s-, we''re
    not supposed to be a dictatorship technically, by the books.'
- speaker: Respondent
  text: '(04:13) Chesley Chan: I see. And although you expected it to kind of slow down after a few months, like you said,
    it didn''t. Can you walk me through how it progressed and worsened?'
- speaker: Respondent
  text: '(04:31) Aya Al Mzayen: It started off further away, so Syria is not that big, but it started off more in the rural
    areas, so if it''s like, if I had to compare it to Texas, it would be me living in Dallas but it started in Austin or
    Houston, so that''s kind of like distance-wise of like, it started off kind of far away. You know, we''re like, okay,
    it''ll stay there will die down, you know, it''s gonna get better. But then it started slowly, just shifting and getting
    closer and closer, closer on the grid. And then when things started popping up in the capital, that''s when tension started
    rising. And that''s where things started getting worse. Because before we would watch things in the news and see the protests,
    and the gunshots and the bombs and X, Y, and Z, we would see that on the news, and now I''m seeing it outside of my window.
    So, and we happen to live right next to the Russian Embassy in Syria. And with Russia''s involvement, and the whole Syria
    situation, that wasn''tvery good. That wasn''t a very good location to be at because bombs were thrown from them towards
    people, and then from people towards them. So we have actually had a bomb that hit a floor underneath us, that was meant
    to be thrown at the building next to us, but they missed. So there were a lot of there were a lot of attempts were the
    biggest thing that happened is, which is I like one of the surprise that nothing really happened to me or my mom or sister
    is we were at the park, which was across the street from my house. And my sister was playing in the playground and we
    were kind of sitting further away at the benches with my mom. And my sister came to grab some water. And we started hearing
    gunshots. So my mom was like, Okay, let''s go. So we started walking in, my mom was like, I hear the gunshots coming from
    this direction. So she was like, let''s go to the opposite side of the street. She tried to tell my mom that that was
    not very true, because I think they were actually coming towards us. But as we were crossing the street, my mom was actually
    behind me because she dropped my sister scooter. And I was in the middle of the of the street. And I saw this some black
    car and it dropped something off at the trash cans in the corner. And- and the guy that was in the car, he opened and
    slammed his door in front of me. So I looked at him I saw him and then they sped off. But I it was just so much going
    on at the same time that I was like, Okay, I don''tknow what''s happening. And then we''re walking. And you hear this
    like loud bang. And we went inside of the hallway of the building. And then after that chaos was gone was over. We realized
    that both me and my mom were hit. It wasn''tgunshots, so we were confused. But apparently what these gentleman''s dropped
    off was a handmade bomb with nails inside of it. So it exploded right as we were walking by. So the only thing that protected
    us were the cars that were parked on the sidewalk because they were pierced through. And the gunshots were actually coming
    towards us because there are a bunch of shell casings on the floor. So we were actually supposed to be on the other side
    to protect ourselves, but we were on the wrong side. But that was like an example of like literally being like outside
    with no protection. Nothing.'
- speaker: Respondent
  text: '(09:39) Chesley Chan: Wow. How did you and your family persevered through these times? Was it just you know having
    your family around? Was it like maybe your faith or another form of community will help you push through these traumatic
    times?'
- speaker: Respondent
  text: '(10:01) Aya Al Mzayen: I think it''s a combination. For me personally, I really don''tlike freaking out. And like,
    during that, literally that in stance, my mom was like freaking out. And I was like, Mom calm down. Like, because I know
    that you can''tthink clearly when you''re panicking. And I don''tlike that. And I was like, we need to be like calm to
    be able to, like, get out of here. And for me, it was a lot of like, I really do truly think that being in that situation,
    and in that environment did force me to grow up a lot faster than what I would normally be as a regular child. And I think
    faith was definitely a part of it. Where you just kind of hope that everything will be okay. And without God''s help,
    you wouldn''t be here and a live and actually trying to build a new life in a different country. But also, I mean, we
    were all it''s, it''s a, I think it''s also has a lot to do with the community. Because just like with the COVID situation,
    we''re kind of all in the same mess together. But at the same time, there''s a lot of division, because there''s a clear
    division between half of the community is with the government, the other half is with the rebels. So when you have your
    side of the community kind of with you and supporting you, it''s makes it a little easier to get through certain situations.
    (12:07)'
- speaker: Interviewer
  text: '(12:09) Chesley Chan: Right. And I know that so you, you''re the second eldest in your family, correct?'
- speaker: Respondent
  text: '(12:19) Aya Al Mzayen: Yeah. (12:20) Chesley Chan: So that means you were, you know, a role model for a few of your
    sisters. How, how was that responsibility, like growing up? And I mean, it could be from the time you were in Syria, and
    now throughout your resettlement process. Yeah. Can you speak a bit to that?'
- speaker: Respondent
  text: '(12:43) Aya Al Mzayen: I think I''ve struggled a lot with it. Because I think the situation that I was put in has
    made me over protective. And I do have like, anger issues. So for me, I like try to protect them and they view it as me
    being super mean. But they''re kids so I mean, I guess they will get it later on. In life, I hope. But also, I realized
    that like my parents are getting older, and they can''treally discipline them or tell them like what to do, or blah blah
    blah, the way they did with me and my older sister. So it kind of leaves everything on me in a way. Because my older sister
    is not with us, she''s in Dubai. And she had to go there by herself because she couldn''tcome with us to the US. Because
    she was [INDECIPHERABLE] in the United States. So that meant that she needed her own case, which she didn''treally have
    cause she''s always been with us. So, for in stance, my youngest sister, our youngest sister, she is six. And she''s never
    met our older sister ever. Because I tried to in vite her to my high school graduation. They didn''tgive her a visa because
    they said that "Oh your family is a family of refugees in the United States. If you go there, you''re going to try to
    stay," but that really wasn''t the case. I sent her an in vitation for my December graduation but the way- the way life
    is set up, COVID is here so I don''tknow if the borders are going to be open or not, If they will give her a visa or not.
    I don''treally know. But we haven''tseen her in along time. She got married two months ago, we couldn''teven go to her
    wedding. We had to watch it over video. So yeah. It''s a lot.'
- speaker: Respondent
  text: '(15:20) Chesley Chan: Your sisters a revery lucky to have you, I''m sure you know that. But I want to reaffirm that
    someone who just kind of met you virtually a few minutes ago. And I was wondering if you could speak a little bit about
    you know, why your family had to resettle? And just, if you can walk me through that process, and how that has led to
    where you are today?'
- speaker: Respondent
  text: '(15:52) Aya Al Mzayen: What do you mean? Why do we have to resettle? (15:58) Chesley Chan: So in our pre interview
    us, you were talking about, you broke down the tension between the government and the rebels and how your family was,
    you know, looped into that. And then essentially, that, meaning that you had to get out, just briefly walk through that,
    that would be amazing.'
- speaker: Respondent
  text: '(16:18) Aya Al Mzayen: So pretty much it goes down to if you''re not with the government, then if you''re not with
    us, you''re against, basically and having your name on the blacklist. That means every postal stuff that when if you are,
    you''re most likely getting going to get taken. So that''s kind of your life on the line every time that car stops, every
    time you get checked. And that happened that happened with my with my uncle that got killed. And he got killed after we
    left. And he got beaten up to death. They didn''tknow that he actually was a cancer survivor. And he''s gone through chemotherapy
    multiple times in his life and he had heart problems. So when they beat him up, they hit his heart too hard and that caused
    him to -- his, all of his internal organs to swell up, because his heart was beating in the speed of a 60 year old man
    when he was a 20 year old young guy. And he suffered a very painful death. That was because just- just because they felt
    like it, just because they felt like he looked at them maybe sideways. They didn''tlike what he said or how he looked
    or how he- I don''tknow. It''s just it''s kind of like fun for them. Because they have the power. And that power has no
    consequences. So you abuse the power when there aren''t any consequences. (18:29)'
- speaker: Interviewer
  text: '(18:39) Chesley Chan: Can you recall any sensory memories or evocative moments from your journey leaving Syria?'
- speaker: Respondent
  text: '(18:50) Aya Al Mzayen: Definitely, yeah. (18:53) Chesley Chan: Is there any one that stands out? (18:58) Aya Al Mzayen:
    It was- it was tiring. I''ve always been a very chubby child. And walking for along distance was not fun. It was hot.
    It was kind of scary. It was just, there''s just a lot. And I didn''tknow, but at the time my mom was pregnant. So the
    only people that knew was my dad and my older sister, but nobody told me. But yeah, I found out after.'
- speaker: Respondent
  text: '(19:46) Chesley Chan: Okay, so just to back up a little bit. Could you speak about what your religious practice was
    as a child and if it shifted at all with, you know, the external pressures of, you know, the Civil War? Yeah. Have you
    ever doubted your faith in any way? You said that it kind of helped you push through the harder times, but sometimes with,
    you know, the trauma and the chaos beyond your- your circle, that might impact people''s experience. But what is your
    experience like?'
- speaker: Respondent
  text: '(20:27) Aya Al Mzayen: Oh, well, we''re Muslims. I would say, to me personally, I think no matter what religion you
    are, there are times when you doubt God, because sometimes you''re like, ''Why? Why, like, why is this happening to me?''
    And there are definitely times where I''ve asked like, ''why?'' If we''re here, and we''re trying our best to do x,y,
    and z, then why is this happening to us? Because you look around and you see all those people on their living like their
    life, and everything''s fine, and they have the money, the cars, they are happy, and everything is going smoothly. And
    then you see hard working people, and they''re getting dragged through hell and back. And it''s like, ''Why? Why is this
    happening?'' But at that times where you''re the most vulnerable and the most a lone, the only one that you can go back
    to is God. Because that''s the only thing that''s there for you, when no one else is. So you kind of always circle back
    to God, no matter how much you, I wouldn''t say doubt, but question, of why things happen. And at one point, I have realized
    that everything happens for a reason. And if certain things didn''thave happened, we wouldn''t be here, nothing would
    be happening. So you and what I''ve always like stuck by is that God gives the hardest challenges to the strongest warriors.
    So maybe that''s what it is [laughter]. But God needs to stop, because I''m tired [laughter]. (22:43)'
- speaker: Respondent
  text: '(22:45) Chesley Chan: You a revery strong. I want you to know that. And you were kind of talking about this towards
    the end. But how were you able to sustain your faith during all that turmoil, it was such a significant period of your
    life. Yet, you know, you still you still find that resorting to God and speaking to God is very helpful for you.'
- speaker: Respondent
  text: '(23:21) Aya Al Mzayen: I think when, when you feel a lone, you always want someone to talk to, and you would hope
    somebody is listening, so your last resort is God. And you just pray and ask that things get better and just hope it works.
    There''s not much else, because I like, I have faith that a higher power exists. I know that God is there, but the only
    thing that is challenging is a lot of times we expect our prayers to just be answered in like three, two, one and here
    it is. And I think the hardest part of it is being patient and I''m not a very patient person. So that becomes an issue
    when you''re like sitting and waiting for something, but I realized that when you stop waiting, it actually comes. (24:39)'
- speaker: Interviewer
  text: '(24:44) Chesley Chan: And were there any particular Muslim prayers that were specially resonant for you during that
    time?'
- speaker: Respondent
  text: '(24:54) Aya Al Mzayen: Uhm, I don''tthink so. I mean, I used to constantly say a prayer, before going to sleep. Just
    so, just in case I pass away in my sleep. That''s what I got used to doing.'
- speaker: Respondent
  text: '(25:26) Chesley Chan: And, you know, looking at how your life is today, and, you know, reflecting, what does your
    religion mean to you today? And how has that meaning changed? If it has at all over the course of your life, whether that
    be in the war or resettlement, just what, what does your faith means- mean to you?'
- speaker: Respondent
  text: '(25:52) Aya Al Mzayen: Uhm, I''ve been through a huge rollercoaster with my faith, personally, because coming to
    the US where everybody is very much against you, especially being a Muslim refugee. In America, I might look very pale,
    with blue eyes, so I can pass off, but the second I say my name, then it''s very obvious what I am. And that''s definitely
    not a white, Christian American. And being different in America is kind of like a curse. Because you''re not very accepted.
    And it doesn''tmatter what kind of different you are, just any kind of different is just not very accepted, even though
    it''s supposed to be the land of the opportunities and the land of the free, and all of that, but there''s so much more
    in the closet, so many skeletons that it''s-, you feel it when you live here, but you don''t see it when you''re looking
    from the outside in. But I don''tknow, there are a lot of things here, acclimating here, that I felt like, I needed to
    do certain things that I didn''tquite a gree with, to fit in. And then it took me a while to realize that I shouldn''thave
    to fit in. Because if so mebody likes me the way I am, then they should like me the way I am, I shouldn''thave to please
    somebody to be a part of a group or whatnot. So that was, that was hard. But like I said, I always kind of, even when
    I strayed away from religion, at the end of the day, I''m always back. And I think that was my saving grace, which I''m
    very thankful for. (28:12)'
- speaker: Respondent
  text: '(28:17) Chesley Chan: And earlier, you were talking about having a community and, you know, the Civil War period,
    as a child, and how that helped you kind of persevere through that. Were you able to find a new community in America in
    Dallas?'
- speaker: Respondent
  text: '(28:38) Aya Al Mzayen: Oh, that''s hard [laughter]. Um, I tried. Um, it came with a lot of trouble and a lot of fighting.
    I honestly, honestly, I wouldn''t say I found a community. I found some people, yes. I''m a part of a sorority, Sigma
    Gamma Rho Sorority Incorporated. So I''m trying, that was my way of trying to be a part of a group that is striving for
    change and like feel that I belong and part of a some sort of a community. But the problem is my skin color, my skin color
    doesn''tallow me to fit in with the Arab community because I''m too ''Americanized'' or I''m too ''light'' or I''m too
    ''different'' and then the Russian community, I don''treally associate with them. And then the white community never really
    accepted me because I was so different. Hispanic communities, it was more of -- they''re very family-oriented and they
    stick together. So it was, it''s a lot harder to like, get closer to them. Asian communities, I''ve never been like surrounded
    with anyone until I got to UTD, which is my university and has a very large percent of Asian population. But they also
    tend to stick together. Because you know, we''re naturally drawn to people that look like us or are from wherever we are,
    because that''s where we feel comfortable with. And then the African-American community was the one that was kind of closer
    to home. So if you look at my friends, it''s mostly African-Americans, so mevery small portion of Arabs. And then there''s
    like, random friends here and there from like, different communities. But I have a group of my little Afghan friends I
    have, but it still doesn''tfeel like home. Because here, it feels so divided. But home, like there was never like, oh,
    you''re this color. You''re this color, oh, you''re Christian, you''re Muslim. You''re this, you''re that. It was never
    like, I''ve never felt division when I was there. Buthere, I have to watch out on what I''m doing, what I''m saying. And
    I have to, I had to learn a lot of things the hard way, when, like making certain comments that I really did not mean
    in any type of way, but then they turned out to be somehow offensive to specific culture, specific race, specific kinds
    of people. And then like, in America, everybody knows this. But as a foreign person coming in, you''re like, what did
    I say that was wrong? And then like, you realize that like, ''oh, okay, I guess like, you can''t say this, or you can''t
    do this or whatnot.'' And that was that was a big and very difficult part, because I didn''trealize how much research
    you needed to do before moving to another place in life, another location, because everything is different.'
- speaker: Respondent
  text: '(32:39) Chesley Chan: And to just build off of that, can you- let me rephrase this- (33:05) Aya Al Mzayen: Just a
    heads up, I have five minutes.'
- speaker: Respondent
  text: '(34:42) Chesley Chan: Oh, yes. Yes, yes. I was just wondering if you could reflect on any surprises about you know,
    American culture, the language [INDECIPHERABLE].'
- speaker: Respondent
  text: '(33:05) Aya Al Mzayen: There''s a lot of surprises. For me, when I thought of America, I like, you know, I used to
    watch Home Alone, and stuff like that. So when I thought of America, I thought it was only white people. When I came here,
    I realized that America is a melting pot of so many people. And like that was a big shock. Because I was like, ''What?
    Like, it''s not just white people?'' Because that''s what I thought I like truly like, because that''s what I saw in all
    the movies that I used to watch. And it was like, really, really confusing because I was like, ''there''s everyone here.''
    And like even races that I haven''tseen in my own home country that like I know of them, but I''ve never like lived with
    them or communicated with them. And it was like, ''wow, okay, that''s crazy.'' Language wise, there- there wasn''tmuch
    shock there. I just, I just kind of had to learn the language the fastest that I could and the best that I could at the
    time. I''m still not good at it, Okay. I don''tknow punctuation to save my life, but I''m trying slowly.'
- speaker: Respondent
  text: '(34:42) Chesley Chan: I see. I mean, I think your English is great, for what that''s worth. But just before-'
- speaker: Respondent
  text: '(34:49) Aya Al Mzayen: That''s speaking [laughter], don''tread any of my papers. (34:55) Chesley Chan: I''m sure
    they''re great. Before we go, I was wondering if you can talk about how COVID has impacted you, your circumstances as
    a college student at UTD, your family. And maybe if you want to talk about other current events, like the protests, feel
    free to.'
- speaker: Respondent
  text: '(35:15) Aya Al Mzayen: Uhm, just the general situation in the country at the moment has been very crazy. I''m not
    used to being home this much. I am very used to just being outside the house, I would go in the morning and like leave
    for college. And then after that I have work and then I wouldn''tcome back until later at night. And being at home is
    like, very, I don''tknow, draining, I hate it. I can''t be at home for this long. And I need socializing, I need humans
    in my life. And it''s really hard like being home and like, yes, family time is important. But I think I''ve had enough
    family time for a couple of years now. Like, it''s a lot, it''s a lot to handle. And with all of the protesting it just
    gives you a whole other look at America as a whole and brings up a lot more skeletons from that same closet. And then
    it kind of gave me flashbacks to the way everything started in Syria, to be honest, because it also started from one person
    being mistreated by the government, and then cascaded down to protests, and then something bigger. And that''s kind of
    what''s going on. But also on top of all of that, like, if we would have had like, a better person in power then maybe
    there would have been a way to make that better, or fix it or find a compromise or actually have a solution. But that''s
    not what''s happening. We have a person that''s just fueling the fire all the time, not getting to any resolutions. And
    it''s just not- not a good person to be in power in a time of crisis where the whole country is being affected with something
    that''s terrible for all of us.'
- speaker: Respondent
  text: '(37:40) Chesley Chan: I a gree. Okay, well thank you so much, Aya. I''m going to end the recording.'
