  text: UMN Immigrant Stories Collection ['United States'] Yubin Sun was born in South Korea, went to college in Japan, and
    is now an in ternational student at the University of Minnesota. Her journey was delayed because of Covid-19, but she
    is grateful for her experiences. When I have participated in in ternational student events at UMN, the most frequently
    asked question has been "Where are you from?," and I always smile and say "Well, listen carefully. It's quite complicated.
    I'm an exchange studenthere from a Japanese university, but I'm Korean though." In this video, I would like to talk about
    my long immigration story from Korea to Japan and to the US. I was born in a city called Seongnam which is very close
    to Seoul and lived there for 19 years. Seongnam is a planned city, so all the buildings and roads a revery organized,
    and every neighborhood seemed very similar to each other. And I felt bored of living in that kind of uniformized environment.
    I always wanted to go out and have an adventure like living in other countries and meeting people with different backgrounds.
    When I went to Tokyo for the first time at the age of 16, my desire to live in different culture got bigger and bigger.
    I was fascinated by the beautiful night views of Tokyo and calm and peaceful atmosphere of Japan, so I decided to go to
    a Japanese university to make my dream come true. After 2 years from my first Tokyo trip, I got an acceptance letter from
    one university in Tokyo, and I moved to Japan to attend college. I remembered the day I went to the airport a lone to
    take a flight to Tokyo; I was a little bit nervous and sad about leaving my family, but more excited to live in Japan
    and go to college. Although my freshmen year was full of a lot of new experiences, I can't say all of them werevery enjoyable.
    As a freshman, I had to attend the classes and make a new connection meeting with a lot of people, and as I started to
    live a lone, I had to do all of the stuffs like laundry and cooking by myself. Also, during the first semester, it was
    difficult to make Japanese friends because I was not confident enough speaking in Japanese and did not get used to Japanese
    culture yet. However, the time passed, and I got more confident with speaking Japanese and my life in Tokyo seemed to
    get stable, until the pandemic happened, and every class turned to online. I had to return to Korea and took online classes
    for 1 year and a half, and I felt it was a waste of time. In 2021 January, I got the email that the university was going
    to resume the exchange student program, and I thought it could be my last chance to spend my college time more meaningfully
    so I applied for it. In August 2021, I arrived in Minnesota and started my exchange student life at UMN. At first, I felt
    very awkward having a small talk with strangers because Korea or Japan don'thave that kind of culture, but now I understand
    it is a very important part of US culture and the way that Americans socialize in so ciety. Now, I'm getting ready to
    go back to Korea, but I'm sure my experiences in both two cultures, has made my eyes broadened, and I'm happy to share
    my story as a part of immigration stories project. Thank you for watching my video!
