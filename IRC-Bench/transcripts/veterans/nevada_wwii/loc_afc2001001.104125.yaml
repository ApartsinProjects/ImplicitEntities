collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Interviewer
  text: What are the names of your parents and what were their occupations?
- speaker: Respondent
  text: My mother, Maria Teresa Altamirano, she was a housewife. My father, Miguel Angel Altamirano, as well -- that would
    make me senior -- and he was an electrician by trade.
- speaker: Interviewer
  text: And do you have any brothers and sisters?
- speaker: Respondent
  text: I do. I have two brothers and two sisters. And in chronological order of birth, a sister, Maria Teresa; a brother,
    Jorge Alberto; and another sister, Angelica; and, finally, the last sibling, Javier Altamirano.
- speaker: Interviewer
  text: Did any of them serve in the military as well? Were you the first in your family to serve in the military? And what
    branch of the military did you serve in?
- speaker: Respondent
  text: I joined the Marine Corps.
- speaker: Interviewer
  text: What were you doing before you joined the Marine Corps?
- speaker: Respondent
  text: I was in high school.
- speaker: Interviewer
  text: Oh, okay. So straight out of high school you joined the Marine Corps? And what high school did you attend?
- speaker: Respondent
  text: Hanna High School.
- speaker: Interviewer
  text: Hanna High School. What year did you graduate? Did you enlist or were you drafted?
- speaker: Respondent
  text: I did enlist. I voluntarily enlisted.
- speaker: Interviewer
  text: What was the process there of you enlisting? What motivated you to join?
- speaker: Respondent
  text: I think that the motivation was a visit from military recruiters to our high school and I was just impressed by that.
    And I wanted friends of mine to see if they were interested in joining me and looking into it. I couldn't find anybody
    to join me and even entertaining the thought. So I did go on my own and, for some reason, I was only drawn to the Marine
    Corps, and, eventually, I was shipped out. I did qualify as far as the aptitude test, the physical screening and so forth,
    and that's how I did that.
- speaker: Interviewer
  text: Now, give me an idea of how it was back in -- what year did you graduate? In '76. Give me an idea of, I guess, the
    atmosphere as far as people's -- what would you say, I guess, attitude towards the military and --
- speaker: Respondent
  text: Thank you. Yes. The attitude in general was that of discontent and/or displeasure with the whole thought of the very,
    very recent Vietnam conflict. So there was a general dissatisfaction with the government's intervention so far away in
    Asia and there was, I think, a resentment and an overwhelming bitter taste in the mouths of the population, of the citizens
    in general to have anything to do with the military. So I think that they -- it was a time when it was hard for recruiters
    to do their job and to maintain the quotas that they had to get because of the unpopular conflict that had just occurred.
    And, of course, you had your people who disregarded all the politics and the casualties and the injured veterans and people
    who were just wanting to genuinely serve. But I think it was not the best of times for the military to reach out to people
    to consider joining.
- speaker: Interviewer
  text: Do you remember the name of your recruiter?
- speaker: Respondent
  text: Staff Sergeant Watson, Anglo, tall, poster board marine. And back in 1976 in South Texas and Brownsville, as you can
    imagine, there is not much diversity. For the most part, we're all Latinos. And if anything stands out in my military
    service, it is my indoctrination to the diversity that our country is. Our country is one of diversity in general. And
    I did bring a little bit of visual aids to illustrate the fact that South Texas and the Lower Rio Grande Valley has a
    minimal influence by diversity. It has for the longest time, it continues to have it today, and projections are that in
    another 30 or 40 years, this is one of those parts of the country that will continue to be the least affected by diversity
    in the country, which is really strange. Which is to say that if one is raised here in Brownsville or the McAllen area
    per se, we will have a minimal contact with other ethnicities, more so than the general population.
- speaker: Interviewer
  text: And what are these visual aids that you have?
