collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: December 16, early in the morning I heard a huge explosion. I had no idea what it was, and I leapt out of bed and
    looked and there was a big crater in our back yard. Then there was another explosion, and I thought, "My God, what's going
    on here?" I got dressed and hurried over to Headquarters Company, and they were as confused as we were. They had lost
    radio contact with two regiments in the division - they were gone, no contact, and we had no idea what had happened. A
    third regiment had retreated and was helping guard the entrance to St. Vith.
- speaker: Respondent
  text: All day long it was total confusion. I was sent to 1st Army headquarters to try to get some information. I carried
    a letter from a general, and I felt relieved to get away from St. Vith. As I was driving to headquarters down a narrow
    road, I heard an explosion behind a farmhouse. This was supposed to be a safe area, so I turned off the road and went
    into the back yard to investigate, and there was what was left of a swing and a little girl about four years old. There
    was no one else there. She was limp like a rag doll - the concussion from the explosions had shattered just about every
    bone in her body. She had been killed by a V-l "buzz bomb" that had strayed off course. Seeing this dead child .... All
    the great minds and scientists had created this weapon to go down and kill a little Belgian girl in her swing. What was
    mankind doing? I was very depressed.
- speaker: Respondent
  text: I got back in the jeep and drove on to headquarters. There I learned that the Germans had parachuted in men who spoke
    English like Americans and were dressed as American soldiers. They had set up checkpoints along the roads, and as Americans
    would stop at these checkpoints in trucks and jeeps, the Germans would gun them down and kill them. I was lucky that every
    checkpoint I had hit was legitimate, but you couldn't trust anybody.
- speaker: Respondent
  text: I got back to my unit before nightfall. The general had decided that we were going to retreat to a town called Vielsalm,
    which is about ten miles from St. Vith. That night we moved out in a convoy and the sky was lighted with explosions all
    around us. We ended up in a deserted Belgian military camp, where about all we could do was sit and wait to see what was
    going to happen to us.
- speaker: Respondent
  text: For the next two days we just huddled and waited, because we weren't really combat soldiers; we were headquarters
    soldiers. We just waited to learn our destiny, and we expected to be captured.
- speaker: Respondent
  text: 'Fortunately, we were rescued by the 82nd Airborne, who came in through the flank and made an opening that let us
    get out of the combat area. I was safe, but I had lost personal friends that were captured or killed - each was an individual,
    each one had a family and a dream of a future. As we later learned, our division had suffered the biggest loss of any
    division in American military history: in twenty-four hours we lost nine thousand men either captured, killed or wounded,
    leaving us as no military threat to the Germans.'
- speaker: Respondent
  text: This was the Wehrmacht's last gasp in the west. Their destination was the Belgian coast, their objective being to
    split the Allied forces. Germany's strategy was to keep moving so fast that before we could destroy our fuel dumps they
    would capture them and refuel their tanks. But they were thrown off from the very start when it took two days for them
    to capture St. Vith, which sat astride a lot of alternate roadway networks - it was a key to their traffic flow. That
    held up things long enough for our troops to destroy the fuel dumps, so their tanks ran out of fuel.
- speaker: Respondent
  text: They had also counted on a nine-day fog projection, where we wouldn't be able to send our bombers up because there
    was no visibility. And I remember that on the 24th, Christmas Eve, the sky lifted and the sun came out, and there had
    to be thousands of planes in the air coming over from England. It was the greatest Christmas present ever to see them.
    They absolutely wiped out the German tanks, which were sitting ducks, most of them stalled with no fuel. That took the
    last gasp out of the Germans. From then on it was retreating into Germany until they surrendered.
- speaker: Respondent
  text: Because our division was destroyed, I was reassigned to the 1st Army press camp. I couldn't adjust to the war correspondents.
    When we had our briefings, if it had been a slow day for casualties, they were disappointed - they knew that their bylines
    and their front-page stories were going to get more attention when there were higher casualties. Ernie Pyle was the only
    one of the group who actually went to the front lines and did stories at the risk of his own life, and the other correspondents
    resented him for making them look less than brave, [laughter] I had no respect for most of the correspondents. The war
    to them was their ride to fame - they were going to do books and speaking tours and make a lot of money and get promoted
    as correspondents when the war was over. To them the war was their personal stage. The more active the theatre, the better
    for them.
- speaker: Respondent
  text: We kept moving into Germany, across the Remagen Bridge and through Cologne. Finally, one night we came to a town called
    Weimar, the birthplace of the German democracy prior to Hitler. It was untouched because the Germans had not offered any
    resistance there. I had been up for thirty-six hours, and I was dead tired and got to my room after midnight. Early in
    the morning there was a knock at my door. There stood two war correspondents who wanted me to drive them out to a nearby
    concentration camp named Buchenwald. I knew nothing about it, and all I wanted to do was sleep; but I was responsible
    for transporting correspondents to their requested assignments. I told them I'd be with them as soon as I could get dressed.
- speaker: Respondent
  text: 'It was April, and I remember driving out through a beautiful German forest; absolutely breathtaking. It was one of
    those rare spring days that was probably about seventy degrees. I had survived, and I was going to go home and have a
    career and a family, and I was just full of myself. I hadn''t felt that good since arriving overseas. We finally came
    to the stockade, which looked like something out of a Western movie. Over the gate there was a sign that said, "Our Fatherland,
    Right or Wrong." We drove through the gate, and .... Usually you see something or you hear something or you smell something;
    your senses are not all attacked at once. At Buchenwald mine were. I heard the moaning of the dying, and I saw naked bodies
    piled up like logs: rotting bodies. The odor of death totally encompassed everything.'
- speaker: Respondent
  text: 'Up to then I had thought that war was ridiculous: "I''m not mad at anybody; why am I here?" But this was so inhumane,
    so beyond anything I had thought one human being could do to another that I felt guilty about being a member of the human
    race. For the first time I knew why I was there, and why the rest of us were there, and I was ashamed of my thoughts and
    actions up to this point.'
- speaker: Respondent
  text: 'I had treated the whole war as if it was just an imposition and inconvenience to me; all I had thought was that it
    had taken five years out of my life. I was going to have to start all over again, and I''d never make up those five years.
    That was all gone the moment I entered Buchenwald. I had to share this with someone, and the closest people I could share
    this with were my parents: "I''m not going to be the same person who left home when I get back, and I''m not going to
    be tolerant of prejudice. Things which I took for granted are going to irritate me now." I tried to put it down on paper.
    I wrote letter after letter, but you can''t experience something like that and transfer it to another person.'
- speaker: Respondent
  text: Overnight, I was a totally different person, and the loneliest feeling you can experience is to become a stranger
    to yourself. You don't know who you are, and you've got to go out at twenty-eight years of age and try to find out. You've
    been some other person all these years, and now you can't be that person any more.
