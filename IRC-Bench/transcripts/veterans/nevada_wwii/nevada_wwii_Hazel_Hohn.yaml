collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: The two women pilots I was aware of as a child were Amelia Earhart and Anne Lindbergh, and both of them had rich husbands.
    When I'd see them in photos at the end of a flight with great big flying clothes on, they always looked sort of haggard.
    I thought you had to be masculine and have a lot of money to be a woman pilot! [laughter] Then when I was around twelve
    years old, I met Amelia Earhart at a junior high school program, and from then on, that was it. I wanted to fly.
- speaker: Respondent
  text: As opposed to what we saw in the newspapers, Amelia Earhart was very feminine, and that made me think flying was something
    I could do. She was also very modest. They praised her during the introduction, and the whole time she kept her head in
    her hands and looked down. She described the beauty and poetry and adventure of flight, while telling us her experiences.
    After her talk, we ran out after her, and she told us about her plans for a flight around the world. That would become
    her last flight. We asked for her autograph; and she said if we would cut a picture of her out of the paper and send it
    to her, she would autograph it and send it back. Well, before I could do that, she was gone, but now I had a role model.
- speaker: Respondent
  text: I made scrapbooks of airplanes, and I'd hike out to the airport and bum rides. I was too young to actually take lessons,
    but anytime someone had an extra seat, they'd take me up with them. I was scared to death on my first flight, because
    I had seen pictures of airplanes crashing, [laughter] The slightest bank scared me, but when I landed, I still wanted
    to fly.
- speaker: Respondent
  text: I didn't see or hear from my dad until I was seventeen years old. He wanted me to go to business college, but I didn't
    want to become a secretary. He said, "Girls should be secretaries or teachers. All girls should know how to type and take
    shorthand." But I said, "No, I want to go to Aeronautical School." That wasn't very practical, since I was only sixteen
    when I graduated from high school in 1939. Since I was still young, he thought I could go to business college first, because
    I could always get a job with those skills. So I went to business college like he wanted, but I deliberately flunked the
    whole year so I could get out of it!
- speaker: Respondent
  text: After that I went to work at the Prudential Insurance Company, and I took flying lessons at Newark airport. I didn't
    have any practical ideas about what I was going to do with flying. There wasn't much in the way of flying jobs for women
    in those days, but I still wanted to do it. When I started flying planes at Newark airport, I was making eighteen dollars
    a week, and it was costing eleven dollars an hour to fly duo. I got in about one hour of flying time in a month, [laughter]
    I went without new clothes, and I'd walk to the airport, which was ten miles, if I didn't have the money for a bus; or
    I'd dust the office for five minutes of flying time!
- speaker: Respondent
  text: After Pearl Harbor they closed all the airports on the coast, and everyone had to go two hundred miles inland to fly.
    I had no idea how I was going to keep flying, but one day I picked up Look magazine, and it had a picture of a girl with
    an airplane. She was a test pilot making a parachute jump. There was also a story about Lock Haven, Pennsylvania, where
    Piper Cubs were made. The magazine said that there were welding jobs available at Lock Haven, so I wrote and got a job
    through the mail. When I arrived I found that a lot of the workers there were biding their time. The women were waiting
    to go into the WASPs, and the men were waiting to get into the Air Force. This was a lot of fun, because we were all flying.
    We could fly for about a dollar an hour, instead of eleven dollars an hour, so I worked the swing shift and the graveyard
    shift in order to fly during the day.
- speaker: Respondent
  text: When all my friends joined the WASPs, I didn't want to stay in Lock Haven, so I moved to California and again worked
    for Prudential Insurance. Initially, you had to have something like two hundred hours of flying time to be in the WASPs,
    but this was eventually lowered to thirty-five hours. I had enough time by March of 1943 to join, but I was still too
    young; I had to wait till October, when I turned twenty-one.
- speaker: Respondent
  text: We went to Sweetwater, Texas for seven months of combined primary, basic, and advanced training. I felt like I was
    on a high all the time, because I was flying and doing what I wanted to do. But some of the instructors did not want women
    to fly - they would tell you to your face that they didn't want you. A few flight instructors would sexually harass you,
    and you would just try to avoid them. At Lock Haven we had called one instructor "Handy Andy." He would sit in the back
    seat and grab us on the chest when he wanted to pull himself forward. We didn't even think of protesting any of this.
    Who would you protest to? It was all male at the top! Civilian life was the same. In those days, you didn't have the women's
    movement, but we just kept going; we didn't let anyone stop us.
- speaker: Respondent
  text: We were trained to do a variety of jobs - to ferry, tow targets, test, teach, and fly big brass around. Towing targets
    was one of the most dangerous. We would fly a B-26 Martin Marauder, and they'd be shooting at the target that we towed
    behind, but as often as not they'd shoot the tow-plane. They'd shoot from an airplane that was flying alongside us, and
    there were guns firing from the ground, too. I don't know of anyone being shot down while towing a target, but the WASPs
    lost women to accidents and other causes. We had thirty-eight people killed out of the whole group, and there was no hospitalization,
    no death benefits, no anything. You had to pass the hat to get enough money to ship the body home. There was just nothing
    for us, you know.
- speaker: Respondent
  text: To test engineering, they liked women to be the pilots. When a man would get discouraged and think of quitting, he'd
    see us going up as test pilots, and he'd think, "Well, if a woman can do it, so can I!" We were a challenge to them. Anytime
    there was something wrong with a plane they'd redline it, and no man could fly it until we tested it. If they put a new
    wing on, we'd take it up for an hour of aerobatics to see if the wing would stay on. The only time testing is really dangerous
    is if you have a new engine. We tested engines by slow time - that means flying slow and then ramming it forward. Right
    there, a lot of engines would quit, so we stayed pretty near the field. We always knew there was danger, but we couldn't
    think about it.
- speaker: Respondent
  text: When Nancy Love started the WASPs, it was strictly to do ferrying, because she didn't think women could do anything
    else. Ferrying meant getting the planes out of the factory, and flying them to various locations. This would be the first
    time those planes were flown. There was no testing in advance, so you had no idea if they checked out and everything worked
    or not.
- speaker: Respondent
  text: Ferrying was an important mission, but a lot of women wanted to be in combat. Jacqueline Cochran, our leader, was
    very much against that. She didn't think we'd make good mothers after the war if we went to combat; it would make us hardened,
    [laughter] She was a pretty tough cookie, herself, and was probably the best woman pilot in the world. She still holds
    more records than any man or woman, both speed and racing records.
- speaker: Respondent
  text: After we graduated and got our wings in May, 1944, I was sent to the Air Transport Command, Ferrying Command, Romulus,
    Michigan. I wanted to fly fighter planes, and being at Air Transport Command was the way to fly them. I went through transition
    on a Norseman, which is a Canadian plane, and a twin-engine Cessna, and from there I went directly to a B-24 as a copilot.
    The B-24 was the largest bomber in the world. We picked them up right from the factory; nobody had ever flown these planes
    before, so we were really production test pilots. Mainly we flew them to points of embarkation to be sent to Europe.
- speaker: Respondent
  text: When we got up in the morning, we never knew what we were going to fly or where we were going to be that night. We
    never knew until we got there how we were going to get back. SNAFU, which was an Army airline, went around picking ferry
    pilots up, but that wasn't always the way we got back. We also hitchhiked on Army vehicles, or returned by train or by
    commercial airline. (We had top priority and could bump anyone but the president.) And then we'd go right back out the
    next morning again. Just a constant... seven days a week. We got six dollars a day per diem for expenses any day we were
    away from base, which paid for hotels and meals. The men got seven dollars.
- speaker: Respondent
  text: I liked flying to Canada, because I could buy things there without rationing coupons. One friend had bought some Limoges,
    very expensive china. She didn't have enough room for it in her baggage compartment and wanted to know if I would take
    it. I was so scared that I was going to crash and destroy all this china, that I wasn't worried about getting killed,
    [laughter] I thought if I got forced down on the border, I'd be smuggling.
- speaker: Respondent
  text: We flew with different crews. Most of the time, I had never met the crew before the flight. In a B-24, the seat on
    the right was the copilot's, and the seat on the left was for the pilot or first pilot. During the flight, the pilot and
    the engineer would often go back and play cards, and I would slide over to the left seat and do all the flying. I actually
    got more left seat flying time in than the pilot.
- speaker: Respondent
  text: One time the pilot was this guy who had been a big shot in combat, and he didn't want to be doing this boring ferrying.
    He wanted the real stuff as in Europe, and he was the type that wasn't going to let anyone tell him what to do. We were
    supposed to take off at dawn every day, but on this day we took off about ten, because he wasn't about to get up early.
    We came to a squall line of thunderstorms, so he came up front to take over. He flew right into that squall line. That
    was a real exciting experience. I just sat there and looked out the window. It was absolutely awesome - these big thunderheads
    right off our wing. But he had a very difficult time. He almost lost it. He was almost out of control - nearer than he
    expected - and we came out sixty miles off course and landed at a closed field. He was pretty scared, but I was enjoying
    the sight out the window, [laughter] I trusted him to get us out of it, because he had been a combat pilot.
- speaker: Respondent
  text: When I was testing in Greenwood, Mississippi, we tested eight hours a day, six, maybe seven days a week. I didn't
    like Mississippi, because of the racial problems there, and I got in trouble for that. I used to take pre-flight cadets
    in the back seat. They were allowed to go and I'd fly aerobatics with them. One day this black soldier - who was a mechanic
    - wanted to know if I'd teach him to fly. I said sure, because I had taken the other guys up. First, I gave him some ground
    school, and we were walking around together, and then I took him up. I let him fly. He was a very good student, and he
    really wanted to fly. When we were coming in, the tower called and said, "Stamper (my maiden name), report to the tower
    when you get down." I was told in no uncertain terms what would happen to me if I ever associated with a black man again.
    They told me I'd probably be killed, and him too. White girls did not do that in Mississippi. There were a lot of lynchings
    in those days, but I didn't like anyone telling me who I could associate with. I was just rebellious enough that I would
    have done it again. I used to sit in the back of the bus when I wasn't supposed to and go in black waiting rooms. Anyway,
    I was transferred the next week, so nothing happened. I've never been back in Mississippi since.
- speaker: Respondent
  text: 'Initially, there weren''t enough male pilots for combat, so they had women fly all the stateside jobs. We were ferrying
    all the fighters. Eighty percent of all fighters built during WWII were ferried by women, and 100 percent of the P-47s
    in 1944. They promised us that if we proved we could fly military planes, after two years we would be fully militarized.
    But at the end of the two years, men had started coming back from Europe. We were still flying while they were waiting
    on tables. That was a bad scene. There were only a thousand of us, and there were something like thirteen thousand of
    them, and they wanted our jobs. There was sabotage: they put sugar in my gas tanks and cut cables. Then they went to Washington
    and lobbied Congress, and Congress and got rid of us. At the time, Eisenhower and General Arnold were in Europe planning
    for the D-day invasion. They couldn''t come back to support us, which they had wanted to do. These different men''s groups
    just got rid of us, and by only eleven votes.'
- speaker: Respondent
  text: We kept on doing our jobs, even though we knew the end was coming. I went to Florida and was taking transitional on
    the B-26, which was a Marauder. It was called the "widow maker," or they would say, "One a day in Tampa Bay." Some men
    refused to fly the B-26 because it was so dangerous. A lot of them were killed, so they put the WASPs on it, which is
    what they did with the B-29s and everything else. We loved it, and I don't think there was ever an accident. And because
    it landed faster than any other plane, I finally felt like I was close to flying a fighter, a hot plane, [laughter]
- speaker: Respondent
  text: The end of the WASPs came December 20, 1944. We hadn't done anything wrong - it was just that most of the men didn't
    want women flying. It's the same with any new thing that women are doing... there's a reaction. Going back to civilian
    life was a big nothing, [laughter] It was boring compared to what we had been doing, and suddenly we're just in civilian
    clothes again. A uniform does make a difference. Civilian life just wasn't as crisp, and it was hard getting used to it
    again. It took a year.
- speaker: Respondent
  text: Even though we were on the cutting edge of women flying, we didn't think of it that way. In fact, I was rather disappointed.
    I hadn't done all that I had wanted to do. I wanted to be like Amelia Earhart; I wanted to be a pioneer. I wanted to be
    a fighter pilot, so I felt I had failed, [laughter] Now, of course, people think that what the WASPs did was really great,
    and within the last five or six years everything has changed. Recognition was long overdue.
