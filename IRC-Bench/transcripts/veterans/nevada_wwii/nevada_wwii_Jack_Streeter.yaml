collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: About twenty of us entered the service immediately after graduation and went to OCS at Fort Benning, Georgia for ninety
    days. After we received our commissions as second lieutenants, Gene Francovich, Mario Recanzone, and I came back home
    on leave, and Mario got married. Then the three of us and Mario's bride drove in Francovich's car from Reno to Fort McClellan,
    Alabama. It took about three days, driving day and night, so we spent the Recanzone honeymoon on the highway.
- speaker: Respondent
  text: 'At Ft. McClellan I served as a training officer for a while, but I was anxious to get overseas. Finally I got my
    orders, and soon boarded a troop ship that was part of a convoy going from the east coast to Northern Ireland. The crossing
    took about two and a half weeks, because we had to dodge U-boats all the way - they sank five or six ships from our convoy.
    And the weather was very bad, pitching our ship around: from the deck you''d sometimes look down a hundred feet, then
    all of a sudden you were looking up at a hundred-foot wall of water. Many of the soldiers on board were seasick, and we
    were cramped and crowded, so it got kind of sloppy.'
- speaker: Respondent
  text: From Northern Ireland I went into the 18th Infantry Regiment, First Infantry Division, commanding a platoon. Six months
    training followed. We knew we were preparing for an invasion of Europe, but we didn't know where, and we didn't know when
    it would come until they moved us from our barracks to the seashore to board the boats two or three days before the invasion.
    There they had a huge room with a sponge rubber map of the Normandy beaches built to scale - you could walk around on
    the map, it was so large. They brought in the officers and some of the noncoms so we could get a feel for where we were
    going to be. They said, "Here's where you're landing; and here's where the cliffs, the pill boxes, the trenches, and the
    German gun emplacements are." We were going in on Easy Red, Omaha Beach.
- speaker: Respondent
  text: The 16th was the assault regiment, and they hit the beach on June 6 at 6:30 a.m. My battalion was supposed to be in
    reserve, but things were so messed up that we went in right after the 16th. They brought us right up to the beach in the
    assault craft and dropped us off in shallow water. We were being fired on all the way in, and the boat on our right got
    blown out and went down a hundred feet from shore. The boat on our left beached just before us, and when they dropped
    the ramp, tracers came in on it from all over and nobody got off alive.
- speaker: Respondent
  text: We landed on a rocky stretch of beach, which made the shells worse than if we had landed in sand. When the shells
    came in, they made twice the shrapnel, because they broke up the rocks. Some of the guys in my platoon already had combat
    experience - they had landed in North Africa and Sicily - and when we waded ashore, they forged ahead. Of course, it didn't
    take any brains to realize that if you're on a beach where shells are landing and blowing everybody apart, you have to
    get off that beach! You can't go back in the water, so you must go forward.
- speaker: Respondent
  text: Right ahead of us was a field rising from the beach toward a mountain - it was 150 yards across, with barbed wire
    and trenches and Germans. And then the pill boxes started on up this hill - concrete gun emplacements. We blew Germans
    out of their pill boxes with bangalore torpedoes, which we stuck through the gun slits. By dark we had gotten to the top
    of the hill, but a third of the men in my platoon had been wounded.
- speaker: Respondent
  text: Once the Army secured the beach, we had to fight through hedgerow country to get further inland, and then our First
    Division led the Saint Lo breakthrough. The morning of the breakthrough there was a huge bombing raid against the German
    positions. What a mess! Behind our lines I saw the pathfinder bomber drop a smoke bomb, and I yelled, "Boys, head for
    the trenches." On a hill a mile in back of us were General McNair and his entourage. They killed some of them; bombed
    them because of a mistake. Started bombing way back, and then went right through us and then on to the Germans.
- speaker: Respondent
  text: We didn't pay much attention to news of the war. We knew if we won a battle, but the specifics we didn't pay that
    much attention to, because you're really only concerned about what you and the little outfit that you're connected with
    are going to do for the next day or two. We got Stars and Stripes once a month, but that didn't mean much - the people
    in the rear were the only ones who had time to read and digest it. Like those USO shows... that was for them, not for
    us. What we were going to do the next day was what was important; nothing else makes any difference. If you started worrying
    about something outside of doing your duty, then you would have problems, and I always felt it was the responsibility
    of the officers to make sure that the men did their duty. I think some of the men would have shot themselves through the
    foot to get sent to the rear and avoid combat. You'd have to say, "The first guy who shoots himself through the foot,
    shoot him through the head!" That takes care of that problem.
- speaker: Respondent
  text: When we were outside of Aachen, I took a couple of soldiers with me through the German lines. We were in the area
    where the professors and doctors lived, and they had terrific wine cellars. The boys from the regimental headquarters
    said, "Jack, if you get a chance, get some wine." So I picked up some wine, but being in front-line infantry, the thought
    of drinking it didn't even cross my mind. You had to keep alert. Make sure your clips are full and you have enough to
    eat, but you don't party. No time for souvenir hunting, like the guys in the back.
- speaker: Respondent
  text: We were fighting Germans who were trying to get out of Aachen, and fighting more Germans trying to break through with
    tanks to rescue them or to bolster their defenses. After about a week, Aachen fell, and we were pulled out of the line
    for a brief rest. Then we went into combat again in the Huertgen Forest, which was probably the bloodiest battleground
    for the First Division in the whole war. The Huertgen Forest is a small area, maybe ten miles by six miles. When the artillery
    would hit, it would cause tree bursts, and there was no protection for the infantry. No trenches.
- speaker: Respondent
  text: We had cold weather and snow and rain and mud and freezing temperatures in the Huertgen Forest. Made it a miserable
    place to fight. And we were soaking wet because of the rain. At least we had plenty of C-rations and ammunition, but outside
    of war and food, we didn't have too much. We were fighting in the Huertgen Forest on Thanksgiving Day. The brass told
    us, "The front-line troops are all going to get turkey sandwiches and pumpkin pie for Thanksgiving." Well, ours came in
    one great big bag, so when you reached down, you got a soggy mixture of turkey sandwich and pumpkin pie by the handful,
    [laughter].
- speaker: Respondent
  text: I went into the Huertgen Forest with 110 men and came out with 35 - the rest were either dead or wounded. That's a
    great turnover, but that's front-line infantry for you. And many of those casualties occurred in one day, from shelling
    by our own artillery. Morale got a little low when our artillery zeroed in on us with tree bursts. Bitterly as I complained
    about this tragedy to the rear echelon, they just said, "It was a mistake in map coordinates. Forget it and get on with
    the war." I wrote to some of the families, but when you have a lot of casualties, you can't be writing everybody; you
    don't have enough time.
- speaker: Respondent
  text: I was a company commander by this point, but still just a first lieutenant, and I had been in combat since June 6th.
    It continues; it becomes a job, mainly. And you realize that the soldiers on the other side are doing the same thing you're
    doing, under orders the same as you are, so getting mad doesn't solve anything.
- speaker: Respondent
  text: After the Huertgen Forest, we pushed our way up further toward the German border. On December 15th they said the First
    Division deserved a rest, because we had been in the front line for over six months, since D-day. But the next day the
    Battle of the Bulge started, and they put us right in. They had to, because they needed combat-wise troops. They put us
    on the northern border of the Bulge.
- speaker: Respondent
  text: During that forty-five days from the beginning of the Bulge, we were living out in snow, two or three feet deep, often
    in zero weather. I rarely got any hot food. I ate K-rations, and we got one cup of coffee a day if we could make hot water.
    There were no houses or basements to crawl into. We were just out in the middle of nowhere. Our uniforms and boots were
    never meant for that kind of cold, and our feet got wet and cold, and a lot of people got trench foot. Others got sick,
    but it's a poor place to get sick, out living in the snow, [laughter].
- speaker: Respondent
  text: 'We were doing a lot of patrol work, and when we stopped, the Germans were not far away. I had picked up a Thompson
    submachine gun somewhere along the way. The weapon of issue was a lousy M-1 carbine. It wasn''t worth anything: wasn''t
    accurate; didn''t have any power. A lot of enlisted men picked up Lugers or P-38s, but my Thompson had firepower. You
    could clean out a trench with it. [laughter] If you hit somebody with a .45, it was like you threw a bucket of lead at
    them, but the Thompson would take an arm off. It had awful, awesome firepower. One night we had to go out on patrol when
    the weather was so cold that my Thompson was the only gun that would fire, but those German burp guns (machine pistols),
    they seemed to work all the time.'
- speaker: Respondent
  text: Throughout 1944-45, enemy resistance depended on the outfit. Regular German army outfits were really tough, but new,
    untried outfits that wished the war was over were fairly easy. They were often willing to give up and become prisoners.
    As always, much depended on leadership, who was leading them. I think my size and boxing experience helped me be a leader.
    Boxing teaches you not only to protect yourself, but to take advantage of an opening when you see it - when you see the
    other guy drop his left hand, whack him! Call it killer instinct, but it's just taking advantage of opportunities.
- speaker: Respondent
  text: I was wounded five times, but none was serious, [laughter] On D-day I got a piece of shrapnel in my leg which is still
    in there, but I put sulfa powder on the wound and forgot it. I was shot through the foot once, but the bullet didn't even
    hit a bone. I just put sulfa on it and wrapped it up and limped around for a couple of days and was all right. I was shot
    with a spent bullet - went in, hit the bone and stopped in there. The medic pulled the bullet out and wrapped the wound.
    If you wanted to, you could go back behind the lines or you could stay with your unit; that was an individual decision.
    I stayed.
- speaker: Respondent
  text: When I was wounded after Remagen, that was different.... I was walking down a country road that was raised maybe eight
    or ten feet when I heard Screaming Mimis being launched. They were German rocket-propelled mortars, like fifty-gallon
    drums of dynamite, and they screamed like ripping metal when they were fired from their launchers. I looked up, and I
    saw two of them coming. They were screaming, and then they started to drop. I just hit the deck, and they exploded, one
    on each side of me. The concussion lifted me off the road, but I didn't think too much of it until I started passing a
    lot of blood a couple of days later. So I went to the medic, and he said, "You got to get back to the hospital. There's
    no holes in you, so there's something dramatically wrong."
- speaker: Respondent
  text: At the hospital in Paris, they found that the insides of my kidneys had been blasted in, and that's what caused the
    bleeding. So every morning, the doctors would take something about as big as a pencil and run it up through my bladder
    and into my kidneys. They'd look around through that thing and make sure that blood clots weren't forming, because then
    they'd have to take out a kidney. Eventually everything cleared up, but that was the worst wound I had. It was really
    painful. Every day, for about ten days or two weeks, they'd pull that thing out of me, and the blood would squirt. It
    was pretty bad. Oh yes, send me back! [laughter] But then I got hepatitis - I assume from the needles with which they
    gave me penicillin shots - and that delayed my return for about a month. I turned yellow, and my eyes turned yellow.
- speaker: Respondent
  text: I was in Paris, just out of the hospital, on VE day. When I rejoined my unit in Czechoslovakia, in order to get to
    division headquarters I had to drive through forty miles of Russian-held territory, where I met various officers and stopped
    and partied with them. It was fun. One Russian officer wanted to give me a suitcase full of Russian invasion scrip, German
    marks, about three or four million dollars worth at face value; but we didn't recognize the scrip as legal currency, so
    I didn't take it. About a month later, we recognized it. [laughter] I didn't capitalize on that one.
- speaker: Respondent
  text: 'The Russians were really tough. Their attitude was that we should fight now: "We''re here. You''re here. Let''s get
    it on!" One Russian tanker had an arm blown off, but he was still in the tank; another had an eye out with a patch over
    the socket, and he was still in there. Really tough soldiers - not the sharpest troops in town, but tough and crude.'
- speaker: Respondent
  text: We were in Czechoslovakia for almost two months, and then we occupied central Germany. Morale was good, and we were
    getting ready to be sent home when they came through waving the flag again and saying, "We want volunteers with combat
    experience and invasion experience to make the invasion of Japan." Some of us volunteered, and I was one of them. So my
    war wasn't over on July 7. [laughter] But on the twelfth and thirteenth of August, we dropped the atomic bombs, and we
    knew that the Japanese would surrender. I had enough points to come home, so I went from Germany to Antwerp, boarded a
    victory ship and went across to New York.
- speaker: Respondent
  text: I told them that I wanted out of the service, but they said, "You're still in, because you volunteered to stay." I
    said, "No, I volunteered to make the invasion of Japan." We had kind of a misunderstanding, but eventually I got it straightened
    out, and I was formally discharged in December of 1945. There was no more shooting, no more carrying guns or going out
    looking for enemy soldiers. That was all finished. I just went back home and got into the civilian routine.
- speaker: Respondent
  text: When I got back to Reno in December, Gordon Rice convinced me I should go to law school. I heard about Hastings, which
    is a fine school, and they had a new course starting in January of 1946 that went straight through the summer months -
    you'd graduate in 1948 rather than going the usual route.
