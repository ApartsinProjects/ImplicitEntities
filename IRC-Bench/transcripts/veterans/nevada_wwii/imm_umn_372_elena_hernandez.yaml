  text: UMN Immigrant Stories Collection ['Hernandez, Sinai'] ['United States'] Elena Hernandez in Mexico in 1977. At the
    age of 19 she gave birth to her first daughter and travelled to the United States to live with her father using a relative's
    documents. Elena's story is told by her daughter and details the dangers that migrants can face when crossing the U.S.-Mexico
    border. 13846_Sinai_Trejo _23__export_script.txt[7/29/21, 3:09:33 PM] Migrants are human beings. They are people with
    lives, stories, pasts, and futures. And a lot of people forget that. I think that is why it is so difficult for people
    in the United States to understand why migrants cross the Southern border so much. They want to seek a new, different
    life than the one back home. They are simply seeking happiness. And I don'tthink that is any different from the aspirations
    and dreams of people that happen to have the proper documents and can call themselves "legal." This is a piece my mother's
    story. Elena Hernandez was born in March 1977. She was the fifth daughter of twelve children. Her father was a teacher,
    while her mother stayed at home and took on jobs whilst also taking care of her kids. She had a relatively happy childhood,
    one filled with occasional vacations to Acapulco, Guerrero, thanks to her father's stable job that provided economic stability.
    When she was seventeen, her parents separated and her father left for the United States. My mother's mom was the one who
    wanted to separate, something that was in comprehensible to her. After all, her father treated her mother with love and
    affection, provided for his big family, and was always faithful to her. My grandfather left my grandmother their two story
    house and made sure to provide for his children and let them know that they were loved. When my mother was 19 years old
    she became pregnant with my older sister Maria. However, Maria's father did not want to be a father and told my mother
    to get an abortion. Her father heard about this and told her to come with him to the United States. Using a relative's
    documents she passed through Ciudad Juarez into El Paso and went with her father to Denver, Colorado. There she briefly
    lived with two of her older sisters. She decided to return to Mexico a few months after giving birth because she was not
    happy living with her sisters, especially since one treated her as a housekeeper. When she returned to Mexico with her
    mother, she got two jobs to support herself and Maria. In the morning, she worked at Burger King and in the afternoon
    job she worked for her aunt who ran a food stand. At leasthere, she could take care of Maria. Soon, she decided to return
    to the United States after getting into a disagreement with her mother and got in contact with her father. Two months
    later, she arrived at her father's hometown to wait for her father to bring her to the United States. Her father came
    and took Maria with him legally across the border, since both had legal documents. He arranged for her to cross with a
    coyote. It was a frightening experience to cross the desert with complete strangers in the dark of the night. She and
    her group were robbed on this journey, but she had made holes in her belt as a precaution to hide her bills and was only
    robbed of coins. When they reached Arizona, they arrived at a shelter house where they were fed and rested. Then each
    migrant went their own way to reach their destination. My mother was taken to Albuquerque, NM so that she could get a
    flight to Dallas, TX. From there my grandfather picked her up and took her to Arkansas, where he worked and had a home.
    She got a job at a local plant so that she could support herself and Maria. It was here where she met my father. My mom
    admits that when my father asked her to marry him after a very short courtship, her first thought was that she could get
    papers through him. She accepted because of her uncertain status in this country and her desire to provide a stable life
    for Maria. This is where she chooses to end her story.
