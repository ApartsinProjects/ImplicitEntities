- speaker: Respondent
  text: FRANK:I'll let you go first, young lady. TONYA:Okay, so I am a general dentist. I was born in Hopkinsville, Kentucky.
    My dad was in the military for the first five years of my life, so we moved around a bit. But moved back to Georgia when
    I was five. I went to dental school at the Medical College of Georgia. Picked a place to live. That was Charlotte, North
    Carolina. We lived there, I lived there twenty-four years? Yeah, twenty-four years. Um, we decided to sell the practices,
    slow down a little bit, moved back here in August and we're trying to consider what we were going to do. And two houses
    down, a guy named Dan said, Hey, you want to come and see The Post Clinic? Came and we did a tour and next thing you know
    we were hooked up wanting to help out and give back to the community. So I work here on Mondays and Tuesdays, um, but
    I usually will come by here three or four times when I'm not working just because this is like family to us, um, all the
    volunteers and the staff here are just wonderful, and that sense of community and giving back is just, is just perfect.
    And so I leave here every day after seeing patients and just feel so rewarded and fulfilled that I have this purpose that
    I'm, I'm doing something that matters to people, and it just--it's so um--it just makes me feel great (laughs).
- speaker: Respondent
  text: FRANK:I am born and raised in Lexington, Kentucky. I was born, and I, I lived on all the, quote, bad sides of town
    and went to the worst schools, appa--supposedly, but I graduated from Bryan Station High School in Lexington and I went
    to college because I had an engineering scholarship. So I--that's the only way I was going to go is if I could get a scholarship,
    so I was an electrical engineer, for a few years as a major. And then I decided that I absolutely hated it, and I wanted
    to kind of follow my dreams some. And my dreams were to do something in medicine. I would either want to do something
    with surgery or working with kids. And so I decided that what would fit for me best lifestyle-wise was not going to be
    a surgeon's life. It was (laughs) it was not going to be working with sick people all the time. So I opted not for medicine
    from the physician's standpoint and got into dentistry. And then I, uh, so I dropped my--I didn'tdrop my engineering,
    but I left that behind. It took about twenty-five hours a semester to get the credentials for getting into dental school,
    and then I got into dental school without my engineering degree. So I got accepted early to dental school. Finished at
    the University of Kentucky. I did a residency program for two years doing hospital dentistry at the University of Kentucky.
    So I've seen lots of sick people, people that are infectious disease department. A lot of the kids and--are adults that
    were recently transplanted with bone marrow transplants for the most part and, uh, seen a lot of bleeding disorder patients
    and so that was my primary, um, area of focus while I was doing the hospital dentistry sort of thing and through that
    I decided I hated to work with adults and I wanted to do only working with the pediatric because I had more fun and I
    thought if I'm gonna do this for thirty or forty years I need to have as much fun as I can get away with, and so, so I
    applied to a few, um, graduate schools and selected Ohio State I went there and did my master's degree and my specialty
    in pediatric dentistry. Uh, I came after that joined the faculty at the University of Kentucky but because of the tenure
    structure I was tenure locked meaning I had no place to go to be tenured because the other faculty had those positions
    that were tenure positions so I had to decide, um, either I'm going to go into private practice in Lexington or look for
    a place to go to teach in another university, or just if I'm going to be looking at other universities, I'll just look
    at other private practice opportunities in those cities where I go to look at job opportunities for, you know, for collegiately
    for the faculty positions. And I decided that, um, when I got to Charlotte, North Carolina, it was just, it was just growing
    so fast. I thought University of Kentucky had, um, graduate school for pediatric dentists. They had thirteen pediatric
    dentists living in the city. They were, um, you know, there was dental school here and Charlotte had eleven or twelve
    pediatric dentists and the city is four or five times bigger and I thought, there's no way I can fail here. So I selected
    that over Richmond, Virginia, Indiana. There was just, um, a few places, um, across the southeast. Georgia was in the
    Atlanta area. I went to Texas and Baylor and a few areas, but I selected Charlotte. It's where I met my wife, um, I hired
    her as an associate, and then a year or so later--
- speaker: Respondent
  text: TONYA:I asked him to marry me (laughs). FRANK:And apparently I said yes, and so--but nonetheless, we had, uh, two
    pediatric dentistry practices in North Carolina, and as we were, as we were considering the exit strategy, there's always
    the entrance strategy, going to school and [?? WORD UNCLEAR] and doing a bunch of stuff and owning a business, you've
