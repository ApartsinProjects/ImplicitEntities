- speaker: Respondent
  text: TONYA:It's very difficult being out in practices. I, I worked in a health department in the Charlotte area for a few
    years working with children and then I was used to commuting an hour one way to go and work in areas that didn'thave,
    where people, the kids didn'thave access to care. And it was worth it for me to do that drive because I knew if I didn't
    go do that, then those children, like, some of them were walking with their families to the appointments, you know, or
    waiting on a cab to try to get them to appointments. But coming here, after being out in the real world with, um, insurance
    and all the hoops and things with insurance now, even if you have insurance, it still doesn'tmean that you're going to
    get coverage. You know, especially in the dental world, the deductible is like... 1,000 dollars and the max is like 1,000
    dollars. And for one crown, that, that does it. So--and people pay like 300 dollars a month for this, this care. But a
    lot of the patients that we see here had care with insurance, with jobs, up until I've heard a lot of stories with COVID.
    Losing their jobs, losing insurance, losing access to that care. And they haven'tbeen to the dentist since COVID. And
    It's just really tough nowadays with the insurance, is the way that they make it on the providers, that a lot of private
    entities don'teven accept the insurances anymore just because of all the red tape and the hassle. And so then if the,
    if a patient has that insurance, now they're looking for somebody who's in their network, and it's getting, you know,
    it may be ninety miles before you have somebody that's in that network. And so it's the access to care, I think, is just
    a huge hurdle, and unfortunately, there's not a lot of places like The Post Clinic that's out there that will help people.
    I, you know, I wish that we could help everybody. And that's why we want to get the word out there so that those people
    can get the care. What about for you?
- speaker: Respondent
  text: FRANK:Access to care is a huge problem. I mean, you know, as I, as I was stating earlier, just being able to have
    the ability to know I can call this number and someone can guide me on how I can help myself. I mean, what do I need to
    do? Where do I need to go? The public? I mean, right now, I think in COVID, probably put a lot of this into place, the
    Teladoc or the, the, the doctor's appointments you can get either with the video or via the telephone, so it gives you
    some access, but you pay in sur--you have to pay an in surance premium to get that access. I think that's kind of crazy.
    I mean, you know, that's, a--and the big problem for me with most of it is greed. I think insurance companies, they would
    not be doing what they're doing if they weren'tmaking money. But there's no cap put on an insurance company to say, okay,
    if you're making more than, uh, thirty percent profit greater than you did last year, that--enough is enough. I mean you
    gotta--you can'tkeep raising your costs for the next year. Somebody is just being greedy. I think in this country, we,
    we look at the economy and we look at this, the stock market and we look at these folks that are telling us over and over
    about how we can save for retirement and having money that's there. And not everybody has the same privilege for that.
    There's some people that just don't, I mean, I don't, who doesn'thave enough money to put 10,000 dollars in the stock
    market right now while the stocks are really low compared to what the market was, you know, a month ago in hopes that
    it's going to grow and their money is going to be, uh, 12,622 dollars? Who? And the people that, that have the least access
    to care do not have an opportunity for growing money and getting wealth. And so they're not gonna get more money to help
    them be able to find the care in the, the means of people that do have money. But nonetheless, the point is that insurance
    companies really run the gamut on control. Who gets the care. And, you know, some of the government agencies try to make
    attempts to help with that, but there's always political conflict that's beating that down so that the persons that, I
    guess there's an illusion that everybody that needs some help from the public or from the government is lazy and not willing
    to do enough on their own, which is, is, it breaks my heart because we see so many people in this clinic that are trying.
    They're really trying. They need a break.
