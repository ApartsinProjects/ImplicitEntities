    It's just like dream now.
- speaker: Respondent
  text: Nisei raise their children in air conditioned houses, but we could not even think about these things at that time.
    Our house was built by 1X12 and it was just like those for
- speaker: Respondent
  text: horses. When the wind blew sand used to fall inside of the house and we had to cover everything so that the sand would
