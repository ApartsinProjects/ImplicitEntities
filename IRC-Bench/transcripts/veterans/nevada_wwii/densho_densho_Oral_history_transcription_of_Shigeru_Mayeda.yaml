    age, they must change schools all over the place. One month in this school and next month that school. We don'tmake much
    money now. Even if we have to work harder, we will do so to save money and settle down in some place so that we can send
    kids to school to the same school all the year around." This was my husband's wish. That's why we came here and settle
    down.
- speaker: Respondent
  text: Well, it was alright to come here, but it was very hard. The only thing which kept us going waS our wine grapes. When
    spring came, we planted on ions and strawberries and all kinds of things.
- speaker: Respondent
  text: You know that Livingston was started as a colony. Was a the same with Cortez? There was no relationship between Livingston
    and Cortez. Though it was through different procedures, both groups were promoted by Mr. Abiko and Mr. Shimanouchi. Mr.
    Shimanouchi was a newSpaper writer. My husband used to know him well.
- speaker: Respondent
  text: Well, by the time we came here Livingston Colony was al~ ready in progress. Livingston Colony was started in 1913,
    so we got started
- speaker: Interviewer
  text: The World War I was in 1918, wasn't it? When you got started here, America waS in a good economic condition.
- speaker: Respondent
  text: ANS. When they (Japanese farmers in Cortez) came here they had a little money. You see they made money during the
    war, and that's why they were able to buy land here. Though I was nothere in the beginning, I heard many stories a~ bout
    this. These people who made money during the war did not go back to Japan. Instead, they were advised by Mr. Abiko to
    buy land in Cortez-Livingston Area. So they came here, instead of going back to Japan. There were those who did go back
    to Japan. But people here are those who wanted to settle down and send kids to the same school, so that they did not have
    to keep changing schools every year. Kids would have to change schools every so often if you were share-croppers. So they
    bought their own land here and settled down.
- speaker: Respondent
  text: However, when they came here and settled down, they faced Depression. It was the time when they were ready to produce
    grapes. It took just about that long to cultivate this wilderness.
- speaker: Respondent
  text: Q. What happened during the time of Depression? ANS, We grew strawberries, eggplants, vegetables, aS much as we could,
    as far as water could reach. We had grapes, but we had to live till grapes were ready. So we had to have these vegetables
    and others which grew fast. You see, when we bought the land, we could not pay it off all at once. We had to make payments
    every month.
- speaker: Respondent
  text: ANH. We took a mortgage. But before we could pay it all off, we had to go to Fresno and make new contract to extend
- speaker: Respondent
  text: the mortgage. My father had to go down there 3 times to change the contract. Mr. Yoneyama, Mr. Yoshida, and my father-in-law
    had to go down to Fresno many more times than that. You see, I came here 13 years after the colony was established and
    they were still struggling with the same mortgage. It was 7% and was very expensive. We could not pay the principle. We
    had to pay interest on the interest. So it was very difficult. It was the time of President Hoover, and the time of prohibition.
    So we could not sell wine grapes. That's why it was very difficult.
- speaker: Respondent
  text: Cn top of that we could not sell anything. For example, Mr. Kono sold grapes for juice, but he could not collect money
    from the company. Early that year, some of the grapes froze, so people brought something to eat for us. But by the end
    of the year those people who tried to help us earlier had to be helped.
- speaker: Respondent
  text: We had to cut off ripe grapes in order to trim the vines. We also sent grapes to the East, but they could not sell
    chem either. So they charged us $400 to dump them. We really suffered a lot to pay this $400 off.
- speaker: Respondent
  text: Why is it that you had to pay $400? Well, you know, we were asking them to sell grapes for us. So when the grapes
    were not sold, we had to pay for the shipping and dumping costs. It was the same story with everyone around here. The
    time was 1930, 31, and 32.
- speaker: Interviewer
  text: Banks were closed and money could not be withdrawn. I would like to go back a bit. You could not buy land could you?
- speaker: Respondent
  text: Well, the late Mr. Calding, a lawyer made a suggestion that if we buy a land in the name of Nisei children then it
    was possible for us to buy land. Nisei were citizens and they had a right to do so. So each family became a cooperation
    and each children owned stocks of the family land, and parents were workers for them. We had to show these things on the
    paper. They say there were loopholes in law and this family cooperation was legally acceptable. So that's how we were
    able to buy land. Parents were just consultants and caretakers.
- speaker: Respondent
  text: When you came back from the camp, a law was passed which in effect said that since Nisei were too small to earn enough
    money to buy land and in fact was bought for them by a lien parents who bought the land. So it was against the spirit
    of the a lien land law. So Nisei were not to in herit the land. Did you have any problems in regard to this law? It must
    have taken place around 1948 years in San Diego. One Nisei owned land was being taken away from him. Do you remember anything
    like that?
- speaker: Respondent
  text: Yes. I kind of remember that. It was a test case. It also happen to Fujita brothers in Petaluma. They won the ease
    though. Their parents bought the land in their name. Fortunately they won the case. So there was no more problem afterwards.
- speaker: Respondent
  text: You must suffer a lot before the depression, about the time you began to cultivate Cortez. What do you remember
- speaker: Respondent
  text: ANS. I remember the year when my father died. It was 1931. In the fall grapevine must be trimmed and we had to cut
    off ripe grapes from the vine. I remember that well. It was so tragic, because we lost our father that year. I was the
    first of 7 girls. I had to quit going high school because I had to help my mother. I was 2nd year in high school. The
    other girls were able to graduate from high schools. It was a very difficult year for us. We could not sell even half
    of grapes the year after. The rest were wasted.
- speaker: Respondent
  text: '@. You must feel really bad about the fact that you had to quit school. ANH. Oh yes. But we had to eat before we
    were able to go to SChOO] SOse-'
- speaker: Respondent
  text: Q. Your father passed away leaving wife and 7 daughters. Q. How were you able to make living? ANH. Well, even if we
    were girls, we all worked in the field, worked with a horse and plowed the soil. We did everything that man did.
- speaker: Respondent
  text: ANS. Well, they did everything, got a horse ready to plow, made ditches to draw water, I came here two years after
    (her father died). It was a sandy land and even if I pulled a horse and plow to make ditches, the small banks collapsed.
    On top of that it was very hot.
- speaker: Respondent
  text: ANH. My husband came from a very cool place, so it was very hard ANS. During the summer I used to have a towel ...
    around my neck. I could not eat lunch because it was so hot. However, I came here during winter, so I got used to it gradually.
    I was in Alameda County, and it was a very cool place. I did not know what it means to be in a hot weather there. It never
    went up over 80°. Buthere it was over 100°. We used to use 8 - 10 inch pipes to lead water. They got so hot and even if
    I handled them with gloves, I burned my hands and shoulders. We don't use these pipes any more though. I was able to work
    continuously because I was young.
- speaker: Respondent
  text: AK. The thing I cannot forget was the whirlwind. It used to come to Cortez. One day I was weeding a whirlwind came
    and if I did not grab onto something I would have been thrown up in the air. So I hung onto the root of grapevine. I remember
    well. There are anymore of these things anymore. Wind was very bad here. Even if you lay down a child in a house, we had
    to put up a mosquito net. Otherwise sand would fall on the child. If you had a nice and sturdy house, then it would be
    a different story. Our house was such a bad house. It was a rebuild barn, so the things werevery bad. I felt very sorry
    for children. Now, there is no whirlwind or sandy wind. So it's like a paradise now.
- speaker: Respondent
  text: ANS. When I came here there were lots of uncultivated land and there were not very many trees. They planted lots of
    rye
- speaker: Respondent
  text: in this area. But again there were lots of wilderness in this area. The wind was so bad that the land I had plowed
    turned flat. I had to repeat it all over again. The strong wind blows in March. They used to say that sand buried chickens
    when the wind blew. It really was a desert.
- speaker: Respondent
  text: AK. Yes, in deed. When it got hot one could make a hard boiled eggs in the sand. These things happened many times.
- speaker: Respondent
  text: AYO. The wind blew so hard that if you put down boxes of grapes you could not find them later, be moving sand covered
