- speaker: Respondent
  text: A few minutes ago someone said that Cortez was started by 1p Pamisies, No. It was 11 families in thevery beginning.
    I always carry that in formation, but I seem to left it at home today (laughs). 1919 was the beginning year. Do you remember
    who they were?
- speaker: Respondent
  text: They were Kubo's, Grandpa Kajioka and his sons, Murofuji's, Naritas, Yuges, Kuwahara's, Nakamura's. What was the reason
    why they came to settle in Cortez? You see we were in Watsonville and Hollister a few years before we came here. Anyway
