turns:
- speaker: Interviewer
  text: Hello, Jane, and thank you very much for taking the time to speak with me today. This is Wendi Zhou interviewing Jane
    Hopkins on Tuesday, December 28, 2021 for the Working in the Time of COVID-19 Oral History Project. This is a remote interview,
    and I am in Miami, Florida, and Jane is in Snohomish, Washington. So Jane, can you tell me your full name? And please
    spell out your first and last name?
- speaker: Respondent
  text: JANE HOPKINS 00:00:51 Jane Hopkins. My first name is spelled J-A-N-E. My last name is H-O-P-K-I-N-S.
- speaker: Interviewer
  text: WENDI 00:01:01 And how old are you? WENDI 00:01:07 What is your birth date? And where were you born?
- speaker: Respondent
  text: JANE 00:01:13 December 4, 1969. And I was born in Sierra Leone. Working in the Time of COVID-19 Oral History Project
    | Jane Hopkins of SEIU Healthcare 1199 NW
- speaker: Interviewer
  text: What gender if any, do you identify as and what are your pronouns? JANE 00:01:25 I'm a female. And she/her.
- speaker: Interviewer
  text: WENDI 00:01:30 What race or ethnicity do you identify as and how important is your racial ethnic background to you?
- speaker: Respondent
  text: JANE 00:01:38 I am Black. And it's very important to me because I am a woman of color. And that's who I am. So I can't
    - you know - That's just who I am.
- speaker: Interviewer
  text: WENDI 00:01:56 Can you talk about what social, political, ethnic, racial or religious communities you regularly connect
    with or participate in?
- speaker: Respondent
  text: JANE 00:02:06 I work a lot in the labor movement, as well. And I spend a lot of time with my African family.
- speaker: Respondent
  text: WENDI 00:02:16 Where do you live now? JANE 00:02:19 Snohomish, Washington. WENDI 00:02:21 Now we'll move on to questions
    about occupational in formation. So what is your occupation or profession?
- speaker: Interviewer
  text: JANE 00:02:33 Could you repeat that again? Sorry. WENDI 00:02:35 What is your occupation or profession?
- speaker: Respondent
  text: JANE 00:02:41 The Executive Vice President of SEIU [Service Employees International Union] Healthcare 1199 Northwest.
    I am also a registered nurse.
- speaker: Interviewer
  text: WENDI 00:02:49 How long have you been employed as a registered nurse? And how long have you been employed in SEIU
    1199 Northwest?
- speaker: Respondent
  text: JANE 00:03:00 I have been a nurse for 21 years, and I have been employed at SEIU 1199 since 2000. WENDI 00:03:13 How
    long have you been a member of SEIU 1199 Northwest?
- speaker: Respondent
  text: Working in the Time of COVID-19 Oral History Project | Jane Hopkins of SEIU Healthcare 1199 NW So can you run me through
    a typical day in your life before the pandemic from the time you woke up to the time you went to bed?
- speaker: Respondent
  text: Well, I spent a lot of time in meetings, but I spent a lot of time really working on what our members need, as we
    are a union and really working with different members of the union to make life better for our members, whether it is
    to address grievances, whether it's really meeting with members that work directly with organizers that work directly
    with members to make sure that they have what they need every day. So it's really what I do all day, every day.
- speaker: Respondent
  text: WENDI 00:04:28 And how has your work been impacted or disrupted by the pandemic? I would say it's not been disrupted,
    what it's done is just - I'm just doing more and during the pandemic, our members need more research, more resources,
    more in formation, what is needed for them so that they can safely look after patients every day. So I would say the work
    is just multiplied since the pandemic, especially at the beginning, when COVID started, because our members didn'tknow
    what was going to happen to them, did not know what was going to happen to their jobs, did not know what's going to happen
    to how to care for patients, did not know if they're going to have the equipment they needed to be able to give good care.
    And how they're going to look after people knowing that they might get COVID and have to take that home to their families
    every day. So it was a very stressful time for members and,as a union, needed to be there to help them navigate through
    this horrible time that they've had to go through in the two years.
- speaker: Respondent
  text: WENDI 00:05:44 Would you mind elaborating a bit more on the specific resources or needs of the union members, which
    has been really influenced by the toll the pandemic has taken on health care workers?
- speaker: Respondent
  text: It has, at the beginning of the pandemic, there was the CDC [Centers for Disease Control and Prevention] was the body
    that really told healthcare workers the standards that needed to happen, and it was really difficult at the beginning
    of the pandemic, when all of a sudden we knew as a union, we knew that our members knew that this virus was airborne.
    And there was a lot of - We're being told by employers, we're being told by government entities, we're being told by the
    CDC that it was droplets. And if that was the case, the way that was needed for us, for the members, for our members was
    different. It was a droplet, there was a different treatment, if there was aerosol, there was different treatmentWe continued
    to fight them, push and tell everyone that we believe that this was aerosol, and that our members needed to wear masks,and
    that was the highest standard, that it didn'tmatter, that even if it was droplets, like they said, even though we believed
    and knew that it was aerosol, that we always needed to give the best protection to every worker. And that meant that every
    worker needed to have [an n95 mask]. So there was literally this hierarchical environment, in hospitals, and in healthcare
    fields where people that made the most got the best protection and people that made the least got the least protection.
    Our union represents [healthcare workers] wall-to-wall in a hospital, whether you're a nurse, a nurse practitioner, or
    you are a housekeeper that's cleaning the rooms, all these jobs were important, and everybody needed to be protected the
    same. And we were pushing very hard that everyone that worked in a hospital needed to get n95. That was the biggest piece
    of work that we did at the beginning. And also what happened if our members got COVID? Are they going to be protected?
    Are they going to be given time off so that they can actually stay home and they're going to, or one employer is going
    to force them to come in when we knew that they were going to, when we knew that they were going to have to stay home?
    Is the employer going to pay for them to stay home, or they have to use all through the benefit time for them to stay
    home. So when there is a catastrophe in their family's life, they could not take time off. Because they've used it all
    on this pandemic. So we worked a lot on that. We worked with government entities to see if we can get hotels, for people
    that are really worried about taking this illness home. Can we get hotel rooms for healthcare workers, so that they can
    go home? They can stay the night, they don'thave to worry about taking their families home while working on transportation,
    making sure that they get free transportation, making sure that they have free parking. We thought we worked on making
    sure that everybody knew the in formation that we had like, immediately, right didn'twait. You know, it was like live
    yielding in formation about all the things that we knew about the pandemic, all the resources that we had, all
- speaker: Respondent
  text: Working in the Time of COVID-19 Oral History Project | Jane Hopkins of SEIU Healthcare 1199 NW the places that people
    can go for help when they needed a pandemic, you know, when they needed help. We knew that staffing was going to be an
    issue. So we have been fighting and working really hard to make sure that hospitals are going to be well staffed. So there
    are a lot of things that we need to do even after two years to make sure that workers are safe, that workers are being
    heard in this pandemic so that they can have what they need. We worked a lot in the past few months, we'll be working
    on mental health. Our members are traumatized. They've got PTSD, watching people die every day. And what are we doing?
    What are employers doing? What is the government doing to help them feel so that they can deal so that they can deal with
    the trauma that this pandemic is causing to their mental health? That's a lot.
- speaker: Interviewer
  text: WENDI 00:10:44 If you're comfortable sharing more, are there any specific actions that you or your union took to address
    the issue of mental health?
- speaker: Respondent
  text: 'We had a couple of town halls where we talked about where we had experts come in, and tried and worked with-, tell
    people what they needed to do. We also have worked with our members to work with employers to make it easier for people
    to have access to counseling. It''s still a problem, still an issue. And also, we really wanted to make sure that employers
    gave people rest days so that they can take vacation days, and that has still been - That''s been a biggest problem: because
    of short staffing people have never been able to take time off. So although we''ve done some work, there''s still so much
    more to do to help with the mental health of our healthcare workers, and all they''ve done and how we can make sure that
    they can survive this pandemic and continue to stay in the healthcare field after this is over.'
- speaker: Respondent
  text: WENDI 00:12:00 Earlier, you also mentioned that your employer did not provide n95 masks at first. So I would like
    to know more about how you and your union organized to work toward healthier workers having n95 masks for even the lowest
    paid workers.
- speaker: Respondent
  text: We took several a venues because we knew that it was going to take a lot for the public to be a ware, and to get our
    members the right masks that they needed. So we went to the legislature, we talked to the governor, we talked to all these
    political people. We had Joint Labor Management [Committee meetings] with employers and asked for n95s. We then had to
    take actions as workers. So there were a lot of times where,right at the beginning, we're doing massive actions when workers
    will do actions outside the workplace where they say, "I need my n95s."
- speaker: Respondent
  text: So we did all that. And also, we were able to get mask donations from the public. But mainly, it was really the workers
    standing together as a union making this huge cry, that, you want us to look up to you? We need to be safe, and we need
    to make sure that we have the right masks."
- speaker: Respondent
  text: So the workers were out there outside of the facility saying ""we need masks." And the public had to hear.I know that
    there wasn'tenough and they had to really work very hard to in crease the production for masks,but if our members hadn'tstood
    up as unions, and we didn'thave the a venues that we had, more healthcare workers would have died from this virus.
- speaker: Respondent
  text: Another thing that I was really proud of for this work is the fact that racial justice was so important that we could
    see that this pandemic had really shown that people of color, especially people of color that had low paying jobs, were
    the ones that got the resources last. And we were able, as a union, to really bring to the surface and let people see
    how racism are showing up even at this time of the pandemic and where they would say, "The housekeeper who goes in a room
    to clean the room does not know need an n95, but a nurse does."
- speaker: Interviewer
  text: Right? And that all the in formation on this virus was only done in English, and it was not done in different languages
    in
- speaker: Respondent
  text: the hospital. That was not the right thing to do. And our members really fought very, very hard to really raise the
    issue of racism and how we can reduce that by really asking the employees to really remember the people that are not being
    seen,
- speaker: Respondent
  text: Working in the Time of COVID-19 Oral History Project | Jane Hopkins of SEIU Healthcare 1199 NW right? To make sure
    that in formation has been translated so that everyone understands the risks for this illness, and what people need to
    do to protect themselves.
- speaker: Respondent
  text: WENDI 00:15:44 Can you elaborate more on how your union took action to address issues of racial justice or language
    justice in the context of the pandemic?
- speaker: Respondent
  text: We needed to be everywhere,right? We did everything that we did as a union, including our members, because our members,
    this has been for SEIU 1199. And a huge issue was about really working to make every member understand that affects the
    intellect, that racial justice is the only way that we're going to have the best to be able to give the best care to everyone.
    And the way that we could have better unions, right? And so every conversation we had, we were really looking at it through
    that lens, right? Whether we're talking about PPE, whether we're talking about time off, whether we're talking about childcare,
    whether we're talking about in formation, what are we doing to make sure that we are looking at everything through that
    lens. And I think because we're able to do that, you see that the conversations are really hard, whether it's about people
    getting vaccinated, whether it was about getting masks, it was really who was what are we not looking at? What lens are
    we looking at and what lens - What is that default lens? And how can we make sure that we're not looking through that
    default lens, that we're looking through this racial justice lens, equity lens, so that everybody can have what they need?
- speaker: Respondent
  text: A wave of protests for the Black Lives Matter Movement emerged during the spring of 2020. And it really serves to
    highlight the racial disparities and people's experience of COVID-19. So what are your thoughts and observations regarding
    this movement?
- speaker: Respondent
  text: I think the Black Lives Matter Movement has been around for along time. I'm really glad that, you know, it's now a
    slogan that everybody uses. But you know, I think then it became a thing that even corporations that are saying we believe
    in Black Lives Matter, really. But the policies have not changed, right? So I think, yes, it's good that we're talking
    about Black Lives Matter. But the only time that black lives are really going to matter is when we see changes in policy,
    when we see every policy that people are looking at and making sure that we are looking through the lens of black lives.
    I always say to people - because being a black woman having to experience racism, and even being a leader now in the union,
    knowing that our union itself is built on in stitutional racism. How can we dismantle that, that every institution has
    to dismantle that racism, and every institution needs to dismantle white supremacy.Every. It's all built on that. Even
    the little things that we do, the everyday decisions that we make, are influenced by white supremacy. How, When we look
    at things through the lens of a black person, a black woman, all decisions are better. Because if we look after the people
    that are getting the least, the people that are getting the most will get what they need as well.
- speaker: Respondent
  text: WENDI 00:19:29 I wanted to know a bit more of your role as a registered nurse. So I'm assuming you were designated
    an essential worker by the Washington governor's "Stay at Home, Stay Healthy" order. Is this correct?
- speaker: Respondent
  text: Yes, we were but not because just as a registered nurse. Even as unions we were classed as essential workers because
    the workers needed us at that moment. You know, it's not a time for youto just not be around. Right? And so the governor,
    And we pushed hard to also make sure that it was very important that unions, especially health care unions, were seen
    as essential workers, because we're essential in helping our members navigate this pandemic. For all the reasons why,
    because our members couldn'tstay home.
- speaker: Interviewer
  text: WENDI 00:20:34 And did you ever feel in danger or that your health was threatened on the job as a result of the pandemic?
- speaker: Respondent
  text: Working in the Time of COVID-19 Oral History Project | Jane Hopkins of SEIU Healthcare 1199 NW I mean, I think a lot
    of our organizers felt, because if you have to meet with a member, right? You always have - You're gonna have to risk
    that you are going to get exposed, right? But mostly, I think as the union, what we try to do is we've figured out different
    ways to make sure that we're there for our members, whether it was through Zoom. Yay, thank goodness for Zoom! whether
    it was town halls, whether it was sending emails out and in different languages, and directing our members and letting
    them know, through text messaging to say "this is in formation you need to know."
- speaker: Respondent
  text: So I think, as a union and the union administrative office itself, we try to minimize the danger as much as possible.
    There were times when our members really needed to see somebody, talk to so mebody, and so we're there. But that was,
    you know, we really try to minimize the risk as much as possible. But you know - And I know family members that work in
    the healthcare field that guess their lives were at risk, every single day, not just their lives, the lives of their families
    were put at risk every single day. Because what if you get COVID and you bring it home? Somebody stayed home all the time?
    What if it's an immunocompromised family? A Lot of our members are immigrants, right? And so they live in big families,
    you go to work, because you have to work, you got to feed your families, you have to work, right? And then you come home,
    and you go to your grandma's home- there were no vaccines - and risk that they're going to get sick. Members of color
    and immigrants were dying at a higher rate. So yes, their lives were put at risk every single day.
- speaker: Respondent
  text: You also brought up the notion of using technology as a means to keep workers safe. Then there also has been issues
    of in equities and access to technology. Some people have more access to technology than others. So can you please describe
    your experience around the issue of in equities in access technology in your role?
- speaker: Respondent
  text: That is what breaks my heart the most! Right? You know, it's knowing that being a woman of color, being an immigrant,
    having family members that do struggle with technology, that it didn'tmatter how we really tried as a union, to make sure
    that our members have what they needed. We knew there were people that we could not reach because of technology equity
    issues. You know, when you look at your town hall, and you look at the screen, you see more white people on the screen,
    you see more educated people, white people, well educated people on the screen, and less people of color. You see, the
    people of color, you know, we're using cell phones, because they don'thave a computer. You could see that on Zoom. All
    those things were things that we knew that you know all you see the kids in the background, trying to tell them what we're
    doing. Didn't do translation very well, right. You know, so everything was done in English mostly, right? That was not
    - Although we were shouting out there and saying, "Hey! We need to do this!"
- speaker: Respondent
  text: We could have done better, right? You know, just like everybody else could have done better. But we did the most for
    what we had, and that's why we have to continue to work on equity. And we have to continue to look at things through that
    lens, so that we don'tlose those members who need us the most, because I would say they needed us the most because they
    were the ones walking around in a fog because they didn'tknow what was going on because there was nowhere to get that
    in formation. And when you think about vaccinations, the first people that go vaccinated, we're older people. Right? I
    understand that. But they're all older white people mostly,right? Although we tried really hard on the equity pieces,
    we
- speaker: Respondent
  text: still have so much more to go, we still need to continue to work on Black Lives Matter, we still need to work on equity,
    we still need to work on making sure that if English is not your first language, that you still deserve to have the same
    resources to get what you need for you to be safe in this country.
- speaker: Respondent
  text: So it definitely seems as if your work has changed a lot, and you have to address a lot of more issues, including
    equity related issues when the pandemic occurred. So can you walk me through a typical day in your life during the pandemic,
    from the time you wake up to the time you go to sleep?
- speaker: Respondent
  text: I woke up earlier, I went to sleep later. That is pretty much what it is. I spent a lot of time instead of time working
    with organizers. But I would say I also spent a lot of time as the Executive Vice President, working with other entities
    where they're working with other unions work to make sure there's consistency between the unions, which is also one thing
    that
- speaker: Respondent
  text: Working in the Time of COVID-19 Oral History Project | Jane Hopkins of SEIU Healthcare 1199 NW the pandemic has really
    done is where unions are beginning to realize that they have to work together for them to win for working families, that
    you have to work together to win for workers, right? You have to work together to win on immigration, you have to work
    together to win on health care. And so that's one of the things that unions have really done. And I think I spent a lot
    of time working with other unions, I spent a lot of time working with the governor, I was on the governor's safe start
    and task force. Last year, I was on the [Biden-Harris Transition Team COVID-19 Advisory Board]. So I spent a lot of time
    working with other entities to really make sure that the voices of the healthcare worker were at the forefront when decisions
    were made. I was in those rooms really fighting for those people, fighting for PPE, fighting for vaccinations, and all
    that. So I worked more, I think I worked twice as much as I did before. Which is nothing compared to what our workers,
    the members are going through the health care workers every day, slowly started to happen.
- speaker: Respondent
  text: WENDI 00:27:54 I'm really curious about the kind of partnerships your Union made with other unions. So can you tell
    me a bit more about that, and were there I guess any obstacles or challenges to, you know, building solidarity between
    these different entities?
- speaker: Respondent
  text: You know, unions have been under attack for so long. Whether it's the Janus decision, or even within industries, you
    have the same unions, and what the Janus decision did is really make people start thinking about "how do we build more,
    how do we get bigger, so that more workers can have voices?",
- speaker: Respondent
  text: But that also brought competition, right. And so it's like, which union is better and which is not? And we just have
    to learn to understand that we are all working for the same thing, that we need to make sure that we are on the same page,
    because organizations, governments, and people will use that competition to divide us. We needed to be on the same page.
    We don'talways have to a gree on everything,but we a gree on the same values, values that workers deserve to have what
    they need for them to do the best job. Workers deserve to have good benefits. Workers deserve to be safe. And if we believe
    in that, then we've got to work together and have one voice in working for those things so we're able to do that. I think
    we want better standards, because we're able to do that for everyone.
- speaker: Interviewer
  text: WENDI 00:29:28 In general, what do you think are the major impacts that the pandemic has brought on the labor movement?
- speaker: Respondent
  text: The biggest impact, I think, is so lidarity. I think it's brought a lot of so lidarity to the labor movement. I think
    every labor union now understands that to have economic justice, environmental justice, immigration justice, you have
    to have racial justice. Without racial justice, all of the other things that we'll be working so hard for as the labor
    movement, we will not win as well. It has to be rooted in racial justice, for us to win on all the values and all the
    issues that we want as a labor movement. And I think there is a need, and there's an understanding that we need to figure
    that out, we need to figure out where black brown and white people can sit in the room as workers and see how they fit
    in. I think what this pandemic has shown us is that we want to be stronger unions, and want to build a bigger and better
    labor movement, that it has to be centered on racial justice. To me, I think that's the biggest thing that we have discovered
    as the labor movement.
- speaker: Interviewer
  text: WENDI 00:32:13 What has been the most challenging part or parts of life during the pandemic for you personally?
- speaker: Respondent
  text: I'm a people person. I like talking to people, I like meeting people, and I am scared of the virus. I'm scared. I
    don'twant it. Nobody wants to die,so that's been the most difficult part. And I think also trying to convince people that
    there is a way out of this pandemic, they have to do things differently, and people don'twant to change.
- speaker: Respondent
  text: Working in the Time of COVID-19 Oral History Project | Jane Hopkins of SEIU Healthcare 1199 NW And related to that,
    the pandemic has really changed a lot of people's social lives. So I was wondering, how has the pandemic changed your
    social life? For in stance, have there been a lot of previously in person events moved online? Or how has your social
    life changed?
- speaker: Respondent
  text: For work, especially, we don'thave any in person meetings. Hopefully we'll start doing that this year, so we haven't
    had any in person meetings. Personally, I used to have a huge Thanksgiving, family dinner every year, we don'thave that
    anymore. One good thing about the pandemic that is different is we relied a lot on it, we were not efficient with time.
    You will travel for an hour for a meeting for now and then travel and now back home you have three hours of your time.
    Right? And now you can do a zoom meeting. Maybe you're not getting the full interaction, but pretty close if you know,
    especially people, in an hour, and you still have two more hours to do other things. Of course, that means that we do
    more work that we weren'tbefore, because all of a sudden. I don'thave an hour's drive anymore. I have an hour of extra
    work. That's okay. We're doing more with the same a mount of time. So those are the things that I think have been different
    for me. I don'tknow, I used to fly a lot to a lot of meetings. That's not happening a lot. A lot of family vacations are
    not happening. Life has changed a lot but it's made us appreciate the people that we are close to, if more.
- speaker: Respondent
  text: WENDI 00:35:03 Following up on that, have any family, friends, neighbors, or even strangers helped you in any way
    as a result of the pandemic.
- speaker: Respondent
  text: I think it was the other way around. I've helped a lot of people, my kids and who I grant babies to, looking after
    kids, mainly it's people who have helped me or more people that have given me a lot of knowledge to pass on to other people.
    And that's been really amazing. Though I knew a lot about health care. But when it came to the science of how this virus
    works, it's been really essential in giving me direction on how to lead our union, in different ways.
- speaker: Interviewer
  text: WENDI 00:36:04 And you also mentioned, like your kids, if it's relevant, how has childcare and school changed?
- speaker: Respondent
  text: A lot. For along time, it was closed, so people had to go to work. I became the childcare worker for a little bit
    because I could stay home. So | think it was very difficult. And we also as a union worked really hard to make sure that
    the essential workers were prioritized, which are care, that the places that were open, we're open to children to essential
    workers, so that they can go to work. I still think that childcare is if we want people to work, we're going to think
    about a different solution. We'll have childcare. So it was just, it was just very difficult. It was just really difficult
    to meet the expectations of my daughter being a single parent. And so there was nobody to stay home with the child. So
    I had to do it. But what if I didn't, if what if I couldn't do it. And she was still expected to be at work. Because she
    was classed as an essential worker. So what would have happened, and I think about that a lot about those people that
    are in that situation that had nobody. And not having understanding employers to help them navigate their life so that
    they can do their work as well. Because I think there were a lot of employers that werevery reluctant to work to get people
    to work from home, even though we all know that good workers who are probably more efficient working from home know that
    they instead of traveling all over the place. Anyway, it just took a while.
- speaker: Respondent
  text: WENDI 00:38:15 Overall, how has the pandemic impacted your sense of personal well being? A lot, because I think you're
    like I just mentioned earlier that I work twice as much as I did before. And I don'tknow how to turn it off. So gotta
    learn how to do that. How do we have a real vacation in two years? So it's hard to switch off because I want to know that
    other people can't get the time to switch off. And I want to be there for people when they need us, because that's what
    we do as a union. We need to be there to help them navigate their lives to help them understand what their role is and
    how they can create more power in the workplace. Because of this pandemic, people are realizing
- speaker: Respondent
  text: Working in the Time of COVID-19 Oral History Project | Jane Hopkins of SEIU Healthcare 1199 NW that they do have the
    power in the workplace. We have to be there at this time to let them understand how they can have that power.
- speaker: Respondent
  text: WENDI 00:39:21 And going off of your mention of the workplace. I was wondering what hospital or workplace Do you work
    in? And can you describe any general impressions you have of your workplace during the pandemic?
- speaker: Respondent
  text: We have 32,000 members. And we work all over West all over Washington. So whether it's in Spokane, or whether it's
    in the Yakima hospital or the University of Washington, Harborview northwest valley Swedish, multi care. We have a lot
    of employers, and employers care about patients. But they will always put profits before pay before workers. And this
    pandemic is not any different. They know in their hearts what's right, but they will still continue to do the wrong thing
    to make more profits. And that is why people need unions. That's why the labor movement is so important. Because we need
    to have that counterbalance to push back on the employer when they are putting people's lives at risk. So they can make
    a buck. And that has not changed. We fought harder, the fight for the PPE was the hardest, because I believe that they
    knew it was wrong. But they would gaslight the workers and let the workers think that they were wrong. Without unions
    to push back, like I said, I do believe more healthcare workers would die, and their families.
- speaker: Respondent
  text: WENDI 00:41:28 And following up on that, I was wondering whether you or anyone you know lose housing or have the housing
    situation feel threatened by the pandemic.
- speaker: Respondent
