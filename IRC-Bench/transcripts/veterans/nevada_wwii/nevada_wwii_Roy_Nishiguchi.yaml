collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: On December 7 I was pitching a game for the Letterman General Hospital baseball team in the San Francisco Winter League.
    A fellow came running on to the field in the third inning, shouting, "Pearl Harbor has been bombed!" He was drunk, so
    nobody paid any attention to him, and the umpire hustled him off. But when we finished the game and went to a bar for
    a beer, the radio was blaring out the news that indeed, Pearl Harbor had been bombed.
- speaker: Respondent
  text: Gaydos, my catcher, said to hop in his car; he would drive me to the barracks to pick up my personal gear, and then
    to the bus depot so I could get a bus back to Fort Ord. Gaydos's girlfriend was with us, and she was hanging back. He
    told her, "Come on, get in the car. I got to get Nish to the depot."
- speaker: Respondent
  text: '"No," she said, "I''m not getting into a car with a goddamned Jap." Oh, that hit me hard.'
- speaker: Respondent
  text: '"You bitch," said Gaydos, and he slapped her ... left her on the sidewalk. "Come on," he said to me, "let''s go."
    We drove to the bus depot and it was bedlam there. A huge crowd was trying to board the buses, but they wouldn''t let
    civilians get on; the military had to go first.'
- speaker: Respondent
  text: When I arrived back at Fort Ord, I found the entire area blacked out. They thought Japan was right offshore, I guess.
    My company was in formation in the street, ready to move out, so I got into my fatigues and put on my equipment and joined
    them. We marched two miles away to East Garrison.
- speaker: Respondent
  text: Many years before the war my dad was carving a toy boat for me, whittling away and talking about war. He said, "Roy,
    if Japan and America fight, who you going to fight for?"
- speaker: Respondent
  text: I said, "Japan."
- speaker: Respondent
  text: He said, "Baka! You were born in this country; you are an American. You fight for your country."
- speaker: Respondent
  text: I was about twelve or thirteen. "You told me how Japanese would fight to the death for their country," I said. "I'm
    Japanese, so I'll fight for them."
- speaker: Respondent
  text: He said, "You are American. This is your country - you fight for this country."
- speaker: Respondent
  text: Dad wanted to be an American so bad that he even adopted "Sam" for his first name; but because of his race, he was
    out - immigration law prevented those born in Japan from being naturalized. Even though he was bitter about this, he studied
    American history and read American literature. "I'm going to keep on reading," he told me. "Everything I read is for me.
    Whether anybody else wants it or not doesn't matter."
- speaker: Respondent
  text: 'My dad loved his job and thought that being a section foreman for the railroad was all a man could want. He had tried
    to persuade me to follow in his footsteps: "You have your house furnished; you have your coal, and your kerosene for lighting,"
    he had said. "What more could you ask? You can''t get that anywhere else." The railroad was his life.'
- speaker: Respondent
  text: In January following Pearl Harbor, the Western Pacific kicked my father out - took his job away, claiming he was a
    security risk. He and Mom were ordered to leave their house and get off railroad property, and since the railroad practically
    owned Gerlach, they didn't know what to do. Their other son, Art, had been inducted into the Army the week before, but
    one of my friends who hadn't yet been drafted helped them. He got a bunch of fellows together and rented a little trailer
    for Mom and Dad. It was just big enough to hold a double bed, and they moved it to a site that was off railroad property,
    which meant it was out in the desert, out in the sagebrush. Stuck out there in the boondocks... that's what my mother
    and dad lived in through the winter. No toilet facilities, no nothing.
- speaker: Respondent
  text: 'My sister Mary and her husband, Chad Chadwell, journeyed from Tennessee to care for my pre-teen sisters, who had
    been separated from Mom and Dad. When Mary wrote to me and told me about the situation, I borrowed money from Army buddies
    and made my way back to Gerlach. I walked out to the trailer and knocked on the door. At first there was no response:
    Mom and Dad were scared! They were afraid that someone had come out there to blast them. I called out, "It''s Roy," and
    my dad finally opened the door.'
- speaker: Respondent
  text: Well, there wasn't a thing I could do for them. I only had a seven-day furlough, and no money. What could I do? I
    didn't know anything. My friend Paul Wayne told me, "Go back to Fort Ord. We'll look out for your mom and dad."
- speaker: Respondent
  text: So I went back to Fort Ord, and eventually Mary was able to rent a house in Reno and move our family into it.
- speaker: Respondent
  text: The Army pulled all the Nisei off the west coast and transferred us to inland units. Although we didn't know where
    we were going, I, for one, thought that I would soon be in combat. Boy, was I wrong! We Nisei were Americans, soldiers
    in the United States Army; but for a year following Pearl Harbor, my group was given only the kinds of jobs that had been
    performed by work details from the stockade. I ended up assigned to the 1851st Service Unit at Camp Wolters, Texas, a
    trained medic serving the Army by emptying garbage cans. We Nisei were denied promotion. When I was transferred from Fort
    Ord to Camp Wolters I was a PFC, 5th class specialist; and when I was discharged almost three years later, I was still
    the same rank.
- speaker: Respondent
  text: After the Hawaiian Nisei, the 100th Battalion, made such a good showing in Europe, things got better for us. I was
    sent to Camp Barkley, Texas, for an unforgettable six month "no-time-off" tour as a male nurse, and then to Military Intelligence
    Language School to learn Japanese, which I couldn't speak very well. English was my language. I had always gone to public
    schools, and my dad was so gung ho on being an American that he had told Mom, "No use spending money to send the kids
    to Japanese school. We're in America."
- speaker: Respondent
  text: Language School was tough for me, but to flunk out would be disgraceful, so I studied hard. Then, just before my group
    was sent overseas, a lump was found on my neck. I had severely infected lymph glands. Sergeant Nakajima and the rest of
    the guys left for the Pacific without me, and some time later, while I was still in the hospital, word came back that
    he and his twelve interrogators and interpreters were all dead. In fog over Okinawa, their C-47 had crashed into a peak.
    Perhaps God was with me.
- speaker: Respondent
  text: With my unit wiped out, and me carrying some sort of bad infection, the Army wanted to give me a medical discharge.
    How could they? I had spent years in uniform, and all my friends were in the Army.
- speaker: Respondent
  text: '"You can''t send me home," I said.'
- speaker: Respondent
  text: I made every possible plea. I told them, "You can't discharge me. What will my folks live on?" See, every month forty-five
    dollars out of my fifty-two dollars pay was put into a fund. Uncle Sam would match this, and my folks would then get ninety
    dollars.
- speaker: Respondent
  text: '"Well, we''ll give you a 100 percent disability, which is worth one hundred and fifteen dollars."'
- speaker: Respondent
  text: '"No," I said, "I don''t want to go home, there''s nobody there. All my buddies are in the service."'
- speaker: Respondent
  text: But they wouldn't listen. I was discharged, and I went back to Nevada.
- speaker: Respondent
  text: Following the war, Roy Nishiguchi attended the University of Nevada on the G. I. Bill. He went on to become Materiel
    Facilities Officer at Stead Air Force Base, worked for Lear Enterprises, and was a warehouse supervisor for K-Mart in
    Reno, from which position he retired in 1986.
