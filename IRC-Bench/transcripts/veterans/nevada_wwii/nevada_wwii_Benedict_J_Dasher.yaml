collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: 'Now we had purpose, so morale was up. Military life can be very numbing to the mind, because it''s so unimaginative,
    but this was so very different: we knew we would land on a foreign beach that would be defended with the devices we were
    learning to disable.'
- speaker: Respondent
  text: The evening of the fourth of June, 1944, we moved to our assembly area, gathering in a large forest which shielded
    us from enemy observation. The Germans still did not know when or where we were coming. That night, there was a lot of
    standing in line and singing in an attempt to keep our courage up.
- speaker: Respondent
  text: On June the fifth, bad weather postponed our landing until the next day. When we finally embarked on June 6, everybody
    got seasick - the channel was a miserable body of water, and it was raining heavily. Some guys were sitting in corners
    of the ship just thinking, reflecting; some were playing poker. Each had his own way of coping with what faced him. As
    an officer with a command, I had little time to think about myself... and that was probably the last time for quite a
    while that I really felt in command, [laughter]
- speaker: Respondent
  text: We went in at Omaha Beach, but I don't know how I got off my ship and into a landing craft; I must have clambered
    down a net - time and again I've tried to pluck that memory out of my mind. It was totally dark, and I saw a great ring
    of fire on shore. Behind us our battleships were sending their big cannonades over us onto the shore - the salvoes just
    shook you out of your shoes. I thought the fire I saw was our shells landing on the beach, but as I got closer, I realized
    it was muzzle flashes from enemy fire, which was quite a surprise. Darkness enhances all that.
- speaker: Respondent
  text: The ensign in command of our landing craft was afraid, and he stopped too soon in water that was too deep. Everybody
    jumped off with full field packs, their rifles held above their heads. Our company carpenter, a short man, was beside
    me. Together we disembarked in high waves, and he went under. I reached out and got him by the straps, and we tried to
    make our way toward shore.
- speaker: Respondent
  text: Omaha Beach was a crescent. On the two ends of the crescent, at the corners of the cliffs, there were German 88mm
    gun emplacements. They were cross-firing and giving us a bad, bad time. Every time I would hear an explosion I would duck
    by reflex and dunk the carpenter. He would come up sputtering, [laughter]
- speaker: Respondent
  text: The water was over our heads, and we couldn't defend ourselves, but we were fortunate - many of the landing craft
    were blown up, just WHAM!... awful. But we didn't get hit, and we managed to make it to shore where there was a large
    vessel that was damaged and tilted over on its side. From there, I ran up on the sand and jumped into a shell hole that
    was already seeping water. I caught my breath. On the other side lay a young soldier - blue-eyed, pink-cheeked, blond
    - and he just stared at me, obviously badly hurt. I managed to get a medic over to examine him, but he looked at me and
    just shook his head. If you would picture an all-American boy, this is the way that kid looked. He's never left me ....
- speaker: Respondent
  text: From there I ran up to the sea wall. We all crouched behind it, stuck there as the shelling continued. There was a
    chateau built right down on the beach, and a lieutenant colonel and I went in to make sure that no enemy occupied it.
    In front of it was a maze, the French garden type, and we worked that thing over to make sure that it was clear. Then
    there were some obstacles to be destroyed, and a lot of ammunition was wasted by shooting into hillsides to clear mines,
    which is not the way to do it because you don't have any record that it's truly cleared.
- speaker: Respondent
  text: Nobody had landed where they were supposed to. We had all kinds of snafus - nobody knew where they were or where they
    were supposed to be. The so called "well-planned" landings went all to hell. Communications broke down, and there was
    a failure to do the things we were trained to do, such as marking the trails that were cleared. But we attempted to find
    ourselves and establish communications. My unit's situation was complicated by the fact that our commanding officer got
    shot through the lower jaw and was immediately evacuated. He was quickly replaced. I was standing at the sea wall when
    somebody walked up and said, "Lieutenant, this is your new commanding officer."
- speaker: Respondent
  text: I turned and had to look down, down, until I found the man, who was very short. As a Regular Army officer, he took
    offense at my slow take. He ordered, "Assemble your men and police the beach," which meant pick up bodies - not our mission
    at all. It may have had to be done, but not by us or at that time. However, in his judgement it was appropriate, because
    troops were coming in all the time, and they should not see severed arms and legs and corpses in the surf and on the beach.
- speaker: Respondent
  text: We got out of that detail when a general officer said, "We have to get the hell off this beach!" That kind of voice
    and that kind instruction and that kind of sentiment made sense, [laughter] Across a field to our front was high ground.
    The regular combat engineers had cleared a path on the left that was sufficiently protected on both sides so that you
    could snake up there. Ultimately, all of us got up on top of the rise late that night, fourteen or fifteen hours after
    we had waded ashore.
- speaker: Respondent
  text: From our hilltop, when the town of Caen was bombed, we could see wave after wave of British Lancaster bombers going
    over, just making a tremendous bomb fire. Our pathway up the beach became a major highway, and the dust on the road was
    so deep that it was just like marching through our dry lakes in Nevada. Some wise guys put on their gas masks, starting
    a hysteria - some men thought there must have been a gas attack. Then everybody's gas mask came out, and it was said there
    were deaths when guys forgot to take the clip off and suffocated.
- speaker: Respondent
  text: Sometime on the third or fourth day there was only scattered fire in front of us. Our orders were to advance. We came
    across a French dairy, and I had the most overwhelming desire for a glass of milk. I went to the loading platform, which
    surrounded the building completely like a veranda. A Frenchman looked out, and I took my canteen and motioned to him.
    He ran out and filled my canteen with milk. I drank it down and it was heavenly! But even though I was in relatively mortal
    danger from combat, I became worried that the milk was not pasteurized... really worried! [laughter]
- speaker: Respondent
  text: Four days after the invasion, I got hit with just a flick of magnesium from a bursting shell, and by morning my head
    was the size of a basketball. My eyes and ears were closed, my mouth swollen shut. I was placed on a stretcher and put
    in the back of an ambulance - pushed into one of those six slots. Next thing I knew, I was on the deck of a Liberty ship
    surrounded by terribly wounded GIs... hard to believe - legs, arms. We all went back across the Channel, and I spent about
    two months in a hospital. Evidently that magnesium was poisonous in some way. I was asked to fill out the papers for a
    Purple Heart, but I refused. With me were guys who were horribly wounded, and what did I have?
- speaker: Respondent
  text: The hospital was close to London, with buzz bombs going over. One landed close enough to flatten the roof of the Quonset
    hut we were in, so I was billeted for a few days in a room in a London home. During a total blackout when an attack came,
    everybody ran to the shelters. I didn't. It was nothing compared to what I had seen.
- speaker: Respondent
  text: When I recovered I was given my sidearm, a .45, and put in command of 150 deserters to take back to the French shore.
    I was scared. They were bad, bad guys, [laughter] I just found the highest point on that deck and sat there with the .45.
    I was very happy to get rid of them.
- speaker: Respondent
  text: At the replacement depot, I set up a pup tent and dug a shallow ditch around it, because it rained for three or four
    weeks. I had very big feet, size fifteen, and no boots, and winter was coming. But General Mark Clark was due through
    and everything was muddy, so a tent was erected in the middle of the depot, and since they didn't know Gen. Clark's size,
    they put all sizes of galoshes in it. I went in at dusk when there was nobody around, and I found a pair of size fifteen
    galoshes that fit me. [laughter] I'm sure that Mark Clark didn't wear size fifteens. I brought them back from the war
    with me, and just a few years ago I threw them away.
- speaker: Respondent
  text: A colonel in my unit, a West Pointer, was reassigned to prepare for evacuation of troops back to the states. He managed
    to issue orders making me his assistant, and we went to Brussels, where I was stationed when the war ended. I had about
    eight months before my points were sufficient to leave, during which I set up the procedures for the evacuation of American
    troops back to the states. While stationed in Brussels my living standards changed considerably.
- speaker: Respondent
  text: Oh Christ, I was in heaven! I stayed with a Belgian family in a loft in their house.
- speaker: Respondent
  text: I was in Brussels when the atom bombs were dropped on Japan, and I said, "Thank God!" I thought this was the greatest
    thing ever. The location could have been better thought out, without so many innocent lives being forfeited, but war is
    a big blunt instrument. It has no mind. It has no feeling. It's just a bad, bad thing.
- speaker: Respondent
  text: I got back to the states on the last day of 1945, and was in Times Square on New Year's Eve. My transition to civilian
    life was difficult. I had no place to live, so I enrolled at Northwestern, which enabled me to live in university housing.
    I lived there for quite a while, and had a terrible time. Didn't know how to conduct myself, but I made it.
- speaker: Respondent
  text: At the fortieth anniversary of World War II, I had an urge to go back to Omaha Beach. Those four or five days in June
    of 1944 had been the biggest event of my life. After that, there wasn't anything.
- speaker: Respondent
  text: I went back with my wife. She just left me alone, and I relived a lot of my feelings. There are graves on the hill
    we occupied, in a beautiful cemetery - ten thousand white crosses. And all the gun emplacements are still on those crescents.
    It was a tremendously emotional experience. Only then did I realize the Germans were there that day on that bloody beach
    purely by chance. I could look out to that horizon and just see all those ships, the noise, the disembarkment, the confusion,
    the death all around, people shooting, you shooting ....
- speaker: Respondent
  text: I felt better after I'd been there, although I don't want to go again. I used to have nightmares; I don't know what
    going back did, but I haven't had any for a long time. In my worst nightmare, I was in a foxhole with railroad ties over
    the top, and then sandbags over that. There was a small sleeping bag, and I was in it... and I had one of those horrible
    episodes. I dreamed I couldn't get out. I got all tangled up inside the bag, and didn't know which way to go. [laughter]
    We were hit by night air raids, and guys died from stuff like that, you know.
- speaker: Respondent
  text: I do not believe that there will ever be another situation in this country in which we come together with such unified
    purpose and true patriotism. That's a word you can scoff at so easily, but it accomplished tremendous things that I don't
    believe can ever happen again because of today's cynicism. Our generation had a major test, and we stood up to the test,
    and we succeeded. It put iron in me. Exercise builds muscle; experience builds iron.
