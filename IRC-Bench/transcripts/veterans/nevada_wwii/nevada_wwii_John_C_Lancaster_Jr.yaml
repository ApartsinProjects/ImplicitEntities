collection: nevada_wwii
source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: We used the old hickory skis, and the rest of our equipment was equally primitive - nothing compared to what they
    have today. I can remember the first rope tow was just a motor down below and a big wheel about halfway up the side of
    the hill where Sky Tavern is now located. We also used to ski on Grass Lake and down at Galena Creek where they had a
    ski tow. As we progressed, we went further up the hill, then skied down to where the Christmas Tree Inn is now located.
    The road used to come back around through there, and it was a lot more narrow than it is now. When we came down the trail
    through the trees, we used to jump that road and go down the fire break. People still don't believe that we used to ski
    from the top of Mount Rose Highway all the way down through Galena Creek and all the way to Highway 395.
- speaker: Respondent
  text: After graduating from officer's school in January of 1943, I volunteered for the 10th Mountain Division ski troops
    and went for training at Camp Hale, Colorado. As I was leaving Ft. Benning, I saw one of my friends, Pat Mooney, who had
    gone to school with me in Reno and had also been accepted into infantry school. After I was at Camp Hale about three months,
    Pat Mooney arrived and we became roommates. I went on into Company B, 85th Mountain Infantry, First Battalion, and Pat
    went into the Second Battalion. I became the executive officer of Company B, and was directly responsible for administration
    - seeing that all the supplies were ordered and distributed properly through the chain of command.
- speaker: Respondent
  text: At Camp Hale, we skied in company strength with four platoons. We began by training the troops in special conditioning
    exercises for the legs, arms and shoulders. Then, on a slope called Carroll Summit, we taught them how to walk on skis,
    how to herringbone and sidestep up the hill, and how to kick-turn to change direction. Then we started them downhill with
    a snowplow and gradually worked into more advanced skiing. We all carried our seven-foot hickory skis, a pair of ski poles,
    a rifle, and ammunition. You also carried a pack with all your own equipment and food for yourself, and every pair of
    men had a mountain stove that was used to boil water and cook during field maneuvers.
- speaker: Respondent
  text: Part of our job was to test equipment in deep snow and extreme cold. We had different types of clothing, like parkas,
    insulated gloves and a shoe pack, which was used instead of the combat boot. A face mask was used for skiing downhill
    to keep the cold air from grazing your face. Our sleeping bags were what they call a mummy bag. On the inside, it goes
    around your shoulders and all the way down your back, and it zips up on the inside. Then they had what they called an
    outer bag; it had a zipper from one corner all the way around, so you could enclose it completely on three sides. These
    were all down bags, and you could roll both bags up into a small roll about eight to ten inches in diameter. We also had
    an insulating pad that kept you off the snow. At night you would slide the mummy bag inside the outer bag, climb in and
    get yourself settled down with all your equipment, then zip the outer bag all the way to where you wanted it so you could
    still get some air. Then you would zip the mummy bag up until you were comfortable, and you could turn on the inside with
    the mummy bag around you all the time and stay warm. That's the kind of thing that would save your life.
- speaker: Respondent
  text: You took all your equipment to bed with you - your rifle, your shoes. You always had three pairs of socks; you wore
    one pair, and the others were always drying out. At night, you put them on the inside of your sleeping bag, next to your
    body, and they would dry out; so you always put on dry socks every morning, whether they were clean or not.
- speaker: Respondent
  text: A rucksack's a complex piece of equipment. It has a frame and a pretty good-sized bag with additional pockets all
    the way around to put equipment in. Rucksacks had the strap across the front of them, which we snugged up to keep it from
    sliding around and swaying and causing you to lose your balance on skis. The straps on your shoulders were tightened down
    a little, too. The rucksack itself probably weighs about eight pounds, empty. The down sleeping bags were pretty light
    and they were carried inside the rucksack with all your extra clothing and food. We carried the insulated sleeping pad
    strapped underneath our rucksacks, a small stove, and then the canteen cup, mess kit, and whatnot. On certain patrols
    you could make hot chocolate from the very dense bar of chocolate in K-rations. A K-ration was one meal, and we usually
    carried two for each day out in the field. You had cheese and bacon and crackers and cigarettes in a package about eight
    inches long. We carried seventy to eighty pounds of equipment with us.
- speaker: Respondent
  text: Your ability to manage being out in the cold for five days was based on cooperation and caution. You had be very careful.
    Everybody watched out for everybody else, and the only time that rank came into play was during decision making. We all
    went along, no matter whether you were an officer or a noncom or an enlisted man.
- speaker: Respondent
  text: After some hot weather training at Camp Swift, Texas, just outside of Austin, we were sent to Europe in January of
    1945 and went into combat just outside the walled city of Lucca, Italy. We established quite a reputation for ourselves
    over there by breaking through the Germans' Gothic Line, which had stalemated our forces for quite a while. From there
    we moved pretty fast all the way through the Po Valley, past the Po River and up into northern Italy. There I was wounded
    on the fifth day of a reconnaissance patrol.
- speaker: Respondent
  text: On patrols we usually found what we wanted to find - where troop concentrations, artillery formations and positions
    were. On a map we would do coordinates and radio the particular position back to headquarters, and they would give it
    to our artillery. We would move in the daytime with everybody dispersed, but keeping in contact with one another - you
    moved a certain distance or a certain period of time, then you gathered together again. You have to be constantly alert,
    and you become very attuned to noises, especially something that's out of the ordinary. When I would raise one hand, everybody
    would freeze in place or get down out of sight. At night we would put out our perimeter, and then we didn't move very
    far. We couldn't build fires or have illumination of any kind, and all the food was eaten cold - there was no coffee for
    breakfast. [laughter]
- speaker: Respondent
  text: We were coming back from behind enemy lines and were resting on a mountainside, when for some unknown reason I stood
    up, and a sniper picked me off. I was the commander of thirteen men on that patrol, and I'm sure that's what the sniper
    was looking for - someone in authority. He aimed just a little too low, and I was shot in the leg. The aid man bound me
    up pretty well, and I walked quite a ways. With the help of the troops, we got back. At the battalion aid station they
    dressed my wound and then sent me back to the regimental hospital for about six weeks. The hospital was still a combat
    zone.
- speaker: Respondent
  text: In April, I was still with the division and regimental headquarters, because I wasn't quite fit to get back into line
    duty. We had gotten stalled on the west side of Lake Garda - the Germans had a battery of 88mm cannons, a very wicked
    weapon, centered on the mouth of a tunnel where we had to exit to go north. They held us for almost a week until we got
    troops over the hill and back around to where they could knock out that battery.
- speaker: Respondent
  text: While we were on the west side of Lake Garda, we heard that Mussolini was on the other side in his villa. I took a
    patrol across the lake in what we called a Duck - those big, amphibious trucks that could only go through water very slowly,
    about two knots an hour. Once on the other side, we scattered out and went into the villa, only to find we were just four
    hours behind Mussolini and his girlfriend. When I radioed headquarters to tell them, they said, "Well, don't worry about
    it. The partisans already have him." That's when they caught up with him at the north end of Lake Garda, and strung him
    up.
- speaker: Respondent
  text: In Mussolini's villa, I found some of those gold filigree emblems that he wore on his cap, and I brought back a couple
    as souvenirs. Some of those villas were just absolutely gorgeous - very high class and well kept, and not damaged by the
    war. We were tromping through them with our muddy boots and looking around like tourists on a vacation. The bedrooms were
    later used as a barracks for officers with three and four officers to a bedroom.
- speaker: Respondent
  text: After Germany surrendered we remained in Italy. Then in the summer the 10th Mountain Division received orders to go
    back to the United States for reorganization, regrouping, and retraining, to join a Marine division for an amphibious
    assault on the main island of Japan. That really scared me. I thought, "I don't know whether I'm going to get by again
    or not." We boarded the USS Marine Fox, and we were off the Azores Islands when it came over the ship's radio that they
    had dropped the first atomic bomb on Hiroshima. Nobody could believe that there was anything like that and that it could
    do so much devastation. Two or three days later, they dropped the next bomb on Nagasaki and it was over. The 10th Mountain
    wouldn't be needed.
- speaker: Respondent
  text: 'I got out in November of 1945. Overseas, we''d heard about all these jobs in the States that were paying pretty money,
    but it was a rude awakening when you got back. These jobs were not there, not even the ones we had left. When we went
    into the service, our jobs were supposed to be guaranteed when we got out, but that was not the case. About three months
    after my discharge, I just up and left Sacramento, where my wife was, because it was not... not good at all. I borrowed
    twenty dollars to get back to Reno where I lived with my parents for a while. One day I found myself down at the Riverside
    Hotel in the bar quietly having a drink, and all of a sudden it just hit me: "What in the world are you doing here all
    by yourself having a drink when there''s no reason? Just get your act together and get out of here and do something with
    your life."'
- speaker: Respondent
  text: I took myself into a corner and talked to myself and got myself organized. That's when I decided to get a job and
    went to work for Johnson Chevrolet. Marsh Johnson offered me the job if I would go under the GI Bill and take a correspondence
    course. I studied accounting for three years and graduated, and I'm proud of myself - I got straight As all the way through.
- speaker: Respondent
  text: Returning to civilian life, one of things that bothered me was loud noises. For quite a while I'd practically jump
    right out of my skin. In fact, I had a little set-to with the service manager at Johnson Chevrolet one time. I had gone
    down to the body shop on East Fourth Street, and somebody set off an air hammer next to me. It sounded just like a .50
    caliber going off right in my ear. I tried to dig my way through the floor, and the service manager, Gene Ford, decided
    that was real funny. I was so angry that I chased him clear across the body shop, until I came to my senses - knocking
    him on his ass was not going to solve anything! [laughter]
- speaker: Respondent
  text: 'In the military, you''re used to telling somebody to jump, and they ask, "How far?" You''re used to having somebody
    answer you and say, "Yes, sir!" But in civilian life it didn''t work that way. You had to be a little more diplomatic.
    That was one of the things that I found rather difficult: You tell somebody to do something, and they might do it, and
    they might not.'
- speaker: Respondent
  text: 'My first day at Ft. Douglas, Utah, was traumatic. They put us in a barracks and got us up very early, and we stood
    in line with nothing on but our shorts. Then they ran us through the traditional preliminaries: "What is your size? Here''s
    a pair of pants; here''s some underwear; here''s a uniform and a hat." I stacked up piles of stuff and carried it back
    to my dormitory, where there was a steel bed with a mattress and a footlocker.'
- speaker: Respondent
  text: Next - still in our shorts - outside we went, stood in line, and had all the kinds of physical examinations that anybody
    wanted to effect. Some things are not appropriate for me to tell here. It was very invasive. You're naked, while standing
    in line with everybody. You see an eye doctor, an ear doctor, a nose doctor and a dentist, and receive all the immunizations.
    I had a couple of cavities, but instead of filling them, they just pulled my teeth out. That's the most expeditious way
    when you're running soldiers through.
- speaker: Respondent
  text: After two weeks we were given the right to go home. My friend Leo and I went back to Sparks. Our uniforms were a little
    big, because they weren't tailored yet, but we walked up and down the streets of Sparks and met some of our old girlfriends,
    very proud to say, "We're in the Army!"
