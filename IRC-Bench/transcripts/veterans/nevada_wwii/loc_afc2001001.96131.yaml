source_url: https://archive.org/details/nevadawwiioralhistories
turns:
- speaker: Respondent
  text: I was born in Denver, Colorado, ah, 1926.
- speaker: Interviewer
  text: Were you born at home or in a hospital? Yeah, I guess that was customary in those days.
- speaker: Respondent
  text: It was customary then, right.
- speaker: Interviewer
  text: What were the names of your parents?
- speaker: Respondent
  text: Harold A. Bradley and Helen M. Bradley.
- speaker: Interviewer
  text: What were their occupations?
- speaker: Respondent
  text: And my dad worked for ACME, ah, ACME Fast Freight. And, my mother was just a home maker.
- speaker: Interviewer
  text: Did your dad drive the freight trucks or did he work at the, did your dad?
- speaker: Respondent
  text: No, he worked at the, at the, what they called the docks.
- speaker: Interviewer
  text: Okay where they brought in and shipped out various things. What about brothers and sisters? Okay, I had three (3)
    brothers, three (3) brothers? What were their names?
- speaker: Respondent
  text: No, four (4) brothers [laughter] and three (3) sisters.
- speaker: Interviewer
  text: Oh, four (4) brothers and three (3) sisters?
- speaker: Respondent
  text: And three (3) sisters.
- speaker: Interviewer
  text: "What are your brother\x92snames?"
- speaker: Respondent
  text: "My brother\x92sname was Hal was the oldest, than Bob John, who passed away, and Dick."
- speaker: Interviewer
  text: And, Dick. What about the names of your sisters?
- speaker: Respondent
  text: My sisters were Ruth and Dottie.
- speaker: Interviewer
  text: "Wow that was quite a family. Eight (8) of you in all. Three (3) sisters and four (4) sons, brothers plus you that\
    \ makes eight (8) in your family. No, what am I sayin\x92 wrong? I have two (2) sisters, two (2) sisters."
- speaker: Interviewer
  text: Okay, two (2) sisters. Okay, two (2) sisters, right, so there were seven (7) in your family. What about grand-parents,
    I noticed in your memoirs, you talk about your grandmother, Nana.
- speaker: Respondent
  text: My Grandma Nana lived us off and on.
- speaker: Interviewer
  text: "Was she on your mother\x92sside or your dad\x92sside?"
- speaker: Respondent
  text: "And, she was on my mother\x92sside."
- speaker: Interviewer
  text: "Can you tell us a little bit about your grandmother because you talked about her a lot in your memoirs. She\x92s\
    \ an important person in your life."
- speaker: Respondent
  text: My grandmother was the best grandma there ever was, yeah. She took us everywhere and did everything with us, she,
    ah -
- speaker: Respondent
  text: Nana was, I think, she was, ah, had her own car and we went up and picked peaches and we did, we did everything.
- speaker: Interviewer
  text: "What was it like growing up in Denver; let\x92stalk about your elementary school, where was the elementary school\
    \ located?"
- speaker: Respondent
  text: "My elementary school was, ah, I can\x92tthink of the name of the elementary school, Barnum, no, I didn\x92t go to\
    \ Barnum, went to Lincoln."
- speaker: Interviewer
  text: "Oh, Lincoln, that\x92sright in your memoirs, I remember Lincoln. Did you go through grades one (1) through six (6)\
    \ at Lincoln?"
- speaker: Respondent
  text: Lincoln one (1) through six (6) and then junior high was, ah, Byers Junior High.
- speaker: Interviewer
  text: And, I noticed you graduated at age 16 (sixteen), did you skip any grades?
- speaker: Respondent
  text: I skipped one (1) grade.
- speaker: Interviewer
  text: In elementary school?
- speaker: Respondent
  text: Yeah, in elementary school.
- speaker: Interviewer
  text: Was that customary in those days to advance students, to skip a grade, did you have to take a test to skip a grade?
- speaker: Respondent
  text: "You know, I don\x92tremember doing that but maybe, I don\x92tremember doin\x92 that. But I remember I skipped a grade\
    \ because I -"
- speaker: Interviewer
  text: You did graduate early.
- speaker: Respondent
  text: Yeah, I graduated.
- speaker: Interviewer
  text: Did you like school, elementary school?
- speaker: Respondent
  text: Oh, I loved school.
- speaker: Interviewer
  text: Okay, did you have some favorite teachers?
- speaker: Respondent
  text: "An art teacher was Nicetrom [sp?], she was great. The, ah, English teacher I didn\x92tlike at all, and of course,\
    \ at that time they would, you didn\x92tstep on the grass and you didn\x92tchew gum and you couldn\x92t do a lot of those\
    \ things. Ah, chewing gum was one thing that I did one time and my teacher, Mrs. Putnam [sp?] put my under her desk [laughter]\
    \ I\x92ll never forget it. I set under her desk because I chewed gum. [laughter]"
- speaker: Interviewer
  text: Did you have, you walked to school in those days?
- speaker: Respondent
  text: I only walked to school.
- speaker: Interviewer
  text: How far did you have to walk to school?
- speaker: Respondent
  text: Oh my goodness, ah, elementary school probably about 6 (six) blocks.
- speaker: Interviewer
  text: "Okay, that wasn\x92t too bad."
- speaker: Respondent
  text: "And it wasn\x92t too bad."
- speaker: Interviewer
  text: What about activities outside of school, holidays, what were some of your favorite holidays and how did you celebrate
    the holidays when you were a young child like that?
- speaker: Respondent
  text: "We always had a big doings at Christmas time and I always remember my dad with his rolled-up cigar, you know how\
    \ they used to roll them up. And he\x92d sit there and smoke that cigar [laughter] my dad would. My mom did nothing but\
    \ cook, boy she did a lot of cooking and she could cook!"
- speaker: Interviewer
  text: What about some of the other holidays, like 4th of July?
- speaker: Respondent
  text: "Oh, 4th of July we would buy firecrackers, daddy would go to the store and he\x92d buy all these firecrackers in\
    \ a box and we\x92d set off. We went to Denver Country Club and they had fireworks there that were oh, fabulous. Denver\
    \ Country Club was Speer Blvd and, where was it, University, I believe at that time. And, we\x92dalways go there and celebrate\
    \ 4th of July and the fireworks."
- speaker: Interviewer
  text: What about Halloween?
- speaker: Respondent
  text: "And Halloween, yeah, we would go, we would go along, ah, oh, gosh what was that street, ah isn\x92tthat funny I can\x92\
    tremember the street."
- speaker: Interviewer
  text: For trick or treating?
- speaker: Respondent
  text: "For trick or treating and we always went to these well-to-do houses and I can remember they had, ah, a whole box\
    \ of things in the front and you could take, you could take, ah, big candy bars or you could take, they had all these\
    \ things that you could take and they were the well-to-do in that, now where was it? It was down, ah, 6th Avenue, seemed\
    \ to me it was 6th Avenue. I don\x92tremember."
- speaker: Interviewer
  text: "That\x92so kay. What about some of the other things you did, you mentioned camping trips, horseback riding, car trips\
    \ with your grandmother?"
- speaker: Respondent
  text: "Well, car trips with my grandma, of course, she always took us, I\x92ll never forget one time she took us up to Grand\
    \ Junction to help a friend pick peaches. And if you\x92ve ever picked peaches, you have that fuzz all over you, it was\
    \ terrible, terrible, but we was helpin\x92 this friend pick these peaches and my brother, Hal, and who else went Hal\
    \ and my brother Hal and my brother I don\x92tremember Bob doin\x92 that. I don\x92tremember."
- speaker: Interviewer
  text: "Okay, well let\x92smove on to your middle school, what was it called, junior high?"
- speaker: Respondent
  text: Byers, Byers Junior High.
- speaker: Interviewer
  text: Byers Junior High? And, was that within walking distance, too?
- speaker: Respondent
  text: "Well, yeah, it was walkin\x92 distance [laughter] it was along way but -"
- speaker: Interviewer
  text: "You didn\x92ttake the bus? Okay, did you like junior high school?"
- speaker: Respondent
  text: I liked junior high.
- speaker: Interviewer
  text: Now, by that time you were in ah, you had skipped a grade, I guess.
- speaker: Respondent
  text: I had skipped a grade.
- speaker: Interviewer
  text: You were younger than most of the students in your - Did you notice that or did it matter?
- speaker: Respondent
  text: "Well, it was, ah, it was whole, it wasn\x92t a whole grade that you skipped, you skipped a half grade so it was let\
    \ me see, how did we do that? I do know that when I went to high school which was South High School I went to because\
    \ all my family went to South High School. South High School was at, ah, University, I used to remember those streets\
    \ so well and I don\x92tremember 'um now. South High?"
- speaker: Interviewer
  text: "That\x92so kay, now, around that time, I think the depression was happening in this country, do you remember anything\
    \ about the depression years?"
- speaker: Respondent
  text: "No, I don\x92tremember that, ah, all I remember is that, ah, rationing, they did a lot of rationing of, ah, meat,\
    \ ah -"
- speaker: Interviewer
  text: Was that during the depression or during the war that came later.
- speaker: Respondent
  text: Oh, well that must have been -
- speaker: Interviewer
  text: "That was the war, you didn\x92t do any -"
- speaker: Respondent
  text: "Not the depression, I don\x92tthink I remember any of that."
- speaker: Interviewer
  text: "Okay, you don\x92tremember the depression, yeah, okay."
- speaker: Respondent
  text: Because I was pretty young then.
- speaker: Interviewer
  text: "And your dad was still working, he didn\x92tlose his job during the depression years? Okay so the depression didn\x92\
    treally affect you. Okay let\x92s go to the high school years, this was South High School. What were your favorite subjects\
    \ in high school?"
- speaker: Respondent
  text: "You know; I don\x92tknow that I had any favorites other than math, I loved my math, I always liked math. Ah,"
- speaker: Interviewer
  text: "But I understand, I thought I understood that they didn\x92t let you take math because you were a girl, is that right?"
- speaker: Respondent
  text: Oh no! They let you take math.
- speaker: Interviewer
  text: Okay they let you take math?
- speaker: Respondent
  text: They let you take math.
- speaker: Interviewer
  text: Did you take science courses?
- speaker: Respondent
  text: "And, some science though I didn\x92tparticularly like science."
- speaker: Interviewer
  text: "You didn\x92tlike science?"
- speaker: Respondent
  text: "Maybe I didn\x92tlike the teacher or something."
- speaker: Interviewer
  text: Okay that often matters, yeah.
- speaker: Respondent
  text: Then, then, in high school I went to what they called Opportunity School at that time and it was at on 14th Street.
- speaker: Interviewer
  text: Was that Emily Griffith School, Emily Griffith Opportunity School?
- speaker: Respondent
  text: It must have been, yeah.
- speaker: Interviewer
  text: "Let\x92sunderstand, you went to South High School?"
- speaker: Respondent
  text: But then I went to the Emily Griffith during school year because I was taking welding.
- speaker: Interviewer
  text: "Okay, so you went to two (2) schools? Yeah, actually, and I was taking welding and what else did I take there isn\x92\
    tthat funny? Why did you take welding, it\x92s not common for a girl to -"
- speaker: Respondent
  text: "I know it isn\x92t, I know it isn\x92t."
- speaker: Interviewer
  text: Why did you take it?
- speaker: Respondent
  text: But it was during the war. And, so you did anything like that that you could better yourself during the war.
- speaker: Interviewer
  text: So you were preparing for graduations to become a welder, was it necessary to -
- speaker: Respondent
  text: Not necessarily to become a welder but become, what they called at the machine shop, was ah, spot welding. Ah, I did
    some, I can remember welding, I did some welding but, ah -
- speaker: Interviewer
  text: At, at Emily Griffith?
- speaker: Respondent
  text: At Emily Griffith, yeah.
- speaker: Interviewer
  text: Yeah, that was before you worked for the Hurt Company back - You probably valued you because you knew how to weld.
- speaker: Respondent
  text: "That\x92s it, they did and that\x92s why they hired me, I think in the first place."
- speaker: Interviewer
  text: Well, before, go a head.
- speaker: Respondent
  text: "I was only sixteen (16) at the time and he wouldn\x92t, he couldn\x92t let me do some of the things on the machines\
    \ and so-forth until I got, what eighteen (18), no sixteen (16) you had to be at least seventeen (17) I think before you\
    \ could do some of those things."
- speaker: Interviewer
  text: "Okay, okay before you graduate from high school, let\x92stalk a little bit about some of the fun things you did while\
    \ you were in high school, did you go to the movies?"
- speaker: Respondent
  text: "We went to the movies on South Broadway and Weber Theater and, also, and Mayan Theater was both on South Broadway\
    \ in about the 200 block and Mayan was First Avenue, I think. And, ah, I remember my brother won a bicycle and we all\
    \ thought that was great except they didn\x92t let us ride, the girls couldn\x92tride the bicycle, just the boys."
- speaker: Interviewer
  text: What was, what was the other theater you mentioned, you mentioned the Mayan, what was the other theater?
- speaker: Respondent
  text: Mayan [pronounced "may on"] and Weber.
- speaker: Interviewer
  text: Okay, and, ah, you mentioned in your memoirs that you used to distribute movie theater flyers around the neighborhood.
- speaker: Respondent
  text: "That\x92swhat we did to be able to go to the movies, we would deliver these flyers that they had and we\x92d run\
    \ up and down, up and down the block, ah, from Alameda to 1st Avenue and deliver these flyers, I\x92ll never forget that.\
    \ And, then we\x92d get a ticket, a free ticket to the theater for something, you know, for a movie."
- speaker: Interviewer
  text: "Now, didn\x92t you also win prizes, you mentioned in your memoirs you had a what, a Shirley Temple Doll?"
- speaker: Respondent
  text: "I won a Shirley Temple Doll at one of the theaters, they always gave away prizes at the theater and I won a Shirley\
    \ Temple Doll once that I dearly loved and I don\x92teven remember what happened to that Shirley Temple Doll. But then,\
    \ my brother won ah, bicycle, which of course to us kids, we were poor. We weren\x92tvery wealthy, I\x92ll tell you and\
    \ he won this bicycle."
- speaker: Interviewer
  text: Did you, also, win tap dancing lessons?
- speaker: Respondent
  text: And I worked, yeah, and I can still do them, I think.
- speaker: Interviewer
  text: You can still tap dance?
- speaker: Respondent
  text: "Yeah, [laughter] I think I could ah, ah, \"Roll Out the Barrel\" I used to do that \"Rollin\x92 Out the Barrel\"\
    \ and what was some of the other things we did? No I don\x92tremember."
- speaker: Interviewer
  text: "Okay, so now you\x92ve graduated from high school, you were sixteen (16) graduation was in what year, 1942?"
- speaker: Interviewer
  text: "I was looking at the \"bio\", okay, \x9243. And, again, you skipped a grade that\x92s why you were able to graduate\
    \ -"
- speaker: Interviewer
  text: "When you, at a younger age. And, so the war was going on and you\x92ve already been trained in welding and now you\x92\
    re going to work at Arthur Hart, Arthur Hurt? Okay, did you start right away after you graduated?"
- speaker: Respondent
  text: "Wasn\x92tlong after I graduated that I started and, of course, Hurt and Company was just a half a block away from\
    \ where I lived."
- speaker: Respondent
  text: "Yeah, on, it was on Kalamath Street and, ah, let\x92s see I lived at 283 South Kalamath Street and, and the Hurt\
    \ and Company was at 218, I think, South Kalamath Street? Yeah, ah, and I started there."
- speaker: Interviewer
  text: What did you start doing, were you welding right away or did you have to wait until you were eighteen (18) to do welding?
- speaker: Respondent
  text: "I couldn\x92tweld, I didn\x92tweld but I did run, ah, lathes, drill presses, spot welding, spot welding I did do.\
    \ 'Cause we worked, ah, for things for Boeing Aircraft so we did a lot of, ah, a lot of things."
- speaker: Interviewer
  text: Do you know what parts you made for the Boeing Aircraft Company; did you make parts for the B-17 Flying Fortress?
- speaker: Respondent
  text: "For the B-17 and I, I worked on, ah, drill, not a drill, it was, ah, it was, ah, gosh what were they called? They\
    \ were bolts and they were five (5) they werevery precise silver, I\x92ll never forget that, silver, ah, on these bolts\
    \ just about, ah, about a half inch or, of the silver and it was, you what did you do? You, ah, I can\x92tremember."
- speaker: Interviewer
  text: Do you know what, how they were used on the B-17?
- speaker: Respondent
  text: "And I don\x92thave it."
- speaker: Interviewer
  text: "The wings or the tail, you don\x92thave it?"
- speaker: Respondent
  text: "I don\x92thave any idea. I do know that Art Hurt knew a lot of the Boeing Aircraft people would come in and, I\x92\
    ll never forget, Nitta Downing, Nitta Downing and I went with Art to Elitches to swim what did we do that for? We just\
    \ went swimming there, I guess. What was it that Elitches had ah, swimming pool or something 'cause it was at 39th and\
    \ well, that\x92swhere Art lived. 39th and Tennyson! Yeah. And, we, ah, took some of his friends from the Boeing Aircraft\
    \ and we went swimming."
- speaker: Interviewer
  text: During the work week?
- speaker: Respondent
  text: "During the war, yeah, it was, ah, Nitta and I went together, gosh, isn\x92tthat funny I can\x92tremember."
- speaker: Interviewer
  text: Do you know if you made any parts for the B-29 Super Fortress?
- speaker: Respondent
  text: "Oh, we made, we made parts for, of course, and a lot of things you didn\x92tknow what you were making 'um for."
- speaker: Interviewer
  text: Was it kind of secret?
- speaker: Respondent
  text: Everything, secret.
- speaker: Interviewer
  text: Could you talk to your friends outside of work what you were doing? Okay, so every time you went to work you had to
    go kind of through security, nobody else could go in, you had a badge?
- speaker: Respondent
  text: "Ah, didn\x92thave a badge isn\x92tthat funny that you mentioned it but I don\x92tremember havin\x92 a badge."
- speaker: Interviewer
  text: "But it was secret you couldn\x92ttell your friends what you were doing? Okay, yeah. Were there a lot of posters around\
    \ where you worked, like \"support the war, your boys are at work, at war\" overseas?"
- speaker: Interviewer
  text: "Oh yeah, and if you had, ah, if you had brothers in the war, you had those flags that you put in your window that\
    \ said, what did they say on there? They weren\x92tstars, they were flags, is that right?"
- speaker: Respondent
  text: "Maybe they were stars, isn\x92tthat funny, I can\x92tremember; seemed like they were flags."
- speaker: Interviewer
  text: But back at work there were posters on the wall. Warning you to keep a secret. Any posters like that? That the enemy
    is listening?
- speaker: Respondent
  text: Right and always all that stuff.
- speaker: Interviewer
  text: So you were a "Rosie the Riveter"?
- speaker: Respondent
  text: Yeah, what you would call.
- speaker: Interviewer
  text: I think you would, did you have a "Rosie the Riveter" poster on the wall?
- speaker: Respondent
  text: "We may have at Art\x92s; but isn\x92tthat funny I don\x92tremember."
- speaker: Interviewer
  text: Now were most of the employee women at Arthur Hurt?
- speaker: Respondent
  text: No, there were some men and the funny part of it was the men always got, even if they ran the same machine as you
    did, they got paid more than you did.
- speaker: Interviewer
  text: Now a lot of men had been drafted to go off to fight the war so were there, there were fewer men there than usual?
- speaker: Respondent
  text: There was men there, though.
- speaker: Interviewer
  text: Were there more women than men? More women than men, okay well that makes sense.
- speaker: Respondent
  text: "The women ran machines like the drills [unclear] drill presses and, ah there wasn\x92tmany women that would run the\
    \ lathes or anything. I think I was probably one of the first that started runnin\x92 the lathe. And, Art taught me how\
    \ sharpen my own tools to set up the lathe for work, ah, I did a lot of things with Art Hurt, he taught me a lot."
- speaker: Interviewer
  text: How many hours a day did you work and how many days a week did you work?
- speaker: Respondent
  text: And we worked six (6) days a week ten (10) hours a day sometimes which was along day [laughter] now that I think about
    it.
- speaker: Interviewer
  text: So you were, end of the day you were pretty tired, I guess?
- speaker: Respondent
  text: "Yeah, ah, there for a while I worked the swing the shift, what they called the swing shift and that was, ah, from\
    \ 4 o\x92clock to midnight would that be right? Yeah, 4 (four) 'til midnight and when I worked the swing shift we\x92\
    dwork different shifts because you couldn\x92t, you just couldn\x92t do that all the time. Ah, and I would work there,\
    \ come home, and we\x92dhave puzzles set up, my mother would help me with those puzzles, workin\x92 those puzzles until\
    \ she\x92d say; \"I think you better go to bed.\""
- speaker: Interviewer
  text: While you were working there did you have the patriotic spirit that you were helping to win the war with [ Oh, yeah]
    the work you did?
- speaker: Interviewer
  text: "I definitely did and, ah, that was one thing when I went to South High School they had a scrap drive and all metal\
    \ and everything they would set out on the front lawn at the high school. I\x92ll never forget the scrap drives and everybody\
    \ brought everything you could imagine. What, the students would bring in scrap? Bring in scrap and then they\x92dpick\
    \ it up in big trucks."
- speaker: Respondent
  text: Now, I understand that, ah, Arthur Hurt sponsored a soft ball team [
- speaker: Interviewer
  text: Oh yeah.] for girls? Yeah, yeah and he sponsored a soft ball team and we were we were pretty good, I must say. Ah,
    what was it called? What positions did you play on the team?
- speaker: Respondent
  text: I played catch, catcher and and I also played first baseman. Kind of ah "jack of all trades" when it came to it to
    the baseball team.
- speaker: Interviewer
  text: Were you a good hitter?
- speaker: Respondent
  text: And I thought I was pretty good hitter [laughter]. Yeah, I thought I was pretty good. Ah,--
- speaker: Interviewer
  text: "Arthur Hurt, also sponsor a men\x92steam?"
- speaker: Respondent
  text: "No, he didn\x92t, but we won the State in the softball and then we were beat by Utah in the Regional for the Regional."
- speaker: Interviewer
  text: "Okay, now I assume there were not a lot of men\x92sbaseball teams? Because they were off to war ["
- speaker: Respondent
  text: Yeah.] and so mostly women played softball or baseball.
- speaker: Interviewer
  text: Most of 'um were women. And I know there was National but you played in the State of Colorado?
- speaker: Interviewer
  text: "Yeah, and there was, ah, down on Broadway there was what they used to call \"Merchants Park\" I don\x92tremember\
    \ what it\x92scalled now. But, we would play before the Denver Bears games which attracted a lot of people. We would,\
    \ the Arthur J. Hurt would play there and we would play at Center, City Park I don\x92teven remember how we got there.\
    \ You had uniforms, softball uniforms?"
- speaker: Interviewer
  text: "And we had uniforms, yeah, was black and white, I\x92ll never forget, black and white what the heck, I don\x92tremember\
    \ what they said. Now, you mentioned in your memoirs that you actually played German POW\x92s?"
- speaker: Interviewer
  text: "We did play, they had, ah, ah, a German POW, we transported, that wasn\x92t, that wasn\x92tduring [unclear] but we\
    \ played the German POW\x92s and they were the nicest guys. Where was the prison camp?"
- speaker: Interviewer
  text: And the prison camp was down on, ah, Cherry Creek, Cherry Creek and, ah, was it Broadway, or-- So, it was actually
    inside the City of Denver? Was it, fences around high wire? Oh they had, they had, yeah, they had barbed wire? Barbed
    wire fences? Now, did you go inside the camp to play softball? We would go inside, yeah. And did you talk with 'um, did
    you understand each other, did they speak?
- speaker: Interviewer
  text: "Well, we didn\x92tunderstand that much. But some of 'um could speak English, but a lot of 'um couldn\x92t. How many\
    \ times did you play against the German POW\x92s? Oh, and I don\x92tremember how many times. But it was more than once?\
    \ Oh yeah, it was more than once. And did you win?"
- speaker: Interviewer
  text: "You know, and at that time I don\x92teven remember but I know that they were thrilled to be able to do that. And,\
    \ I think they were what they called 'um, trustees or so methin\x92 were the only ones that really got to play with you.\
    \ Oh, not all of them could? Yeah, not all of 'um could."
- speaker: Interviewer
  text: "So you felt comfortable with them? Did they seem like the enemy or did they seem like normal human beings? No, they\
    \ didn\x92tseem like the enemy to me, not at all."
- speaker: Interviewer
  text: "Okay, let\x92s go on to meeting and the courtship with Rosco \"Mick\" Amick and we\x92ll call him \"Mick\". Okay,\
    \ when and where did you meet Mick?"
- speaker: Interviewer
  text: "I met Mick, ah, I was babysitting his friend\x92s, ah, Roxie and, ah, Roxie and Milt Baldwin. And they lived just\
    \ down the block from me, about, probably probably a half a block or so. And, I was babysitting them when I met Mick at\
    \ that time. I\x92ve got a picture, I think, of me on, at Baldwin\x92s. What attracted you to Mick? I don\x92tknow, I\
    \ don\x92tknow."
- speaker: Respondent
  text: But you liked him right away.
- speaker: Interviewer
  text: "Oh yeah, yeah, I did. When did you start dating? Ah, we he went into the service just right away and so we really\
    \ didn\x92t do a lot of dating. We used to go to dancing, a lot of dancing at Lakeside Ballroom and at Trocadero, which\
    \ was Elitch\x92s Ballroom, we did a lot of dancing there."
- speaker: Interviewer
  text: How long was it from the time you met Mick until he went into the service, was it several months or weeks? It must
    have been several months, yeah.
- speaker: Interviewer
  text: Okay, you did, you went dancing? You, also, mentioned Glenn Miller came to one of those dances? Glenn Miller was there,
    right. So you actually saw Glenn Miller? And Tommy Dorsey was there.
- speaker: Interviewer
  text: Was Glenn Miller in military uniform at that time, 'cause I know he went overseas to play for the troops?
- speaker: Interviewer
  text: "He wasn\x92t at that time when I was there, but he was when Mick was there, ah, on the, what did they call that--heck;\
    \ I don\x92tremember what they called that."
- speaker: Interviewer
  text: "You don\x92tmean leave when he came back - Did he come back on leave from the service?"
- speaker: Interviewer
  text: "Oh well, he\x92s, he in one of his letters he sent me ah was it a poster or something that said that they were there,\
    \ that they that Glenn Miller and - So Glenn Miller came to visit the troops in the Pacific? Yeah, the troops."
- speaker: Respondent
  text: Okay, the troops in the Pacific is what they did.
- speaker: Interviewer
  text: Okay, but you and Mick danced to Glenn Miller back here in Denver?
- speaker: Respondent
  text: Oh, we did, yeah, later on.
- speaker: Interviewer
  text: Oh, after the war?
- speaker: Respondent
  text: Yeah, after the war.
- speaker: Interviewer
  text: Okay, but not during the war? Okay, okay and, ah, did Mick volunteer to join the Marines?
- speaker: Respondent
  text: "Yeah, he and Gaylan who was a very good friend decided to join the Marines. You know they were drafting a lot people\
    \ in the Army and they didn\x92twant to go to the Army so they both enlisted in the Marines."
- speaker: Interviewer
  text: Right, I guess the Marines did not draft soldiers you had to volunteer [
- speaker: Respondent
  text: You had to volunteer] to be a Marine. And so, in spite the risk, he wanted to join the Marines because [
- speaker: Interviewer
  text: Yeah] they were always on the front line in the, in the Pacific Theater.
- speaker: Respondent
  text: Yeah, they really were in the Pacific.
- speaker: Interviewer
  text: Well, when he left what were your feelings, did you feel that you would marry him when he came back from the service,
    did you, were you that romantically attached to Mick at that time?
- speaker: Respondent
  text: I was romantically attached. And, I thought that I would, probably marry, if he came back, you know, you always wondered.
- speaker: Interviewer
  text: Okay, well did he go to training some place in California or elsewhere before he was shipped over to the Pacific?
- speaker: Interviewer
  text: Oh yeah, he was at, ah what was the name, San Diego? San Diego, yeah, he was at San Diego. And did you get to see
    him before he left Denver?
- speaker: Respondent
  text: "My mother wouldn\x92t let me go [laughter] I was only 16 (sixteen) and she wouldn\x92t let me go."
- speaker: Interviewer
  text: Well, she let you, well you saw him off from Denver?
- speaker: Respondent
  text: I saw, I, yeah, I saw him off from Denver.
- speaker: Interviewer
  text: But not from San Diego?
- speaker: Respondent
  text: "No, but I couldn\x92t go to San Diego."
- speaker: Interviewer
  text: "Okay, well let\x92sjust back-track a little bit, where were you when you learned that the Japanese had bombed Pearl\
    \ Harbor? That was 1941 and you would have been, ah,"
- speaker: Respondent
  text: I must have been in that was before I graduated. It was before I graduated.
- speaker: Interviewer
  text: Do you remember hearing it on the news and you remember what your feelings were when you heard that the Japanese -
- speaker: Respondent
  text: "Of course I don\x92tthink we had, ah, maybe we had radio."
- speaker: Interviewer
  text: Okay. I assume they talked about it at school because you were in school at the time.
- speaker: Respondent
  text: "Somebody, yeah, they must have announced it at school, at the time. That they\x92dbombed Pearl Harbor."
- speaker: Interviewer
  text: "And then about, so that was 1941 and you graduated in ah, 1943? And, when did you meet Mick, 1943 or \x9242?"
- speaker: Respondent
  text: "Oh, I had--don\x92tremember."
- speaker: Interviewer
  text: But any rate after Pearl Harbor; is that when Mick decided to join the Marines?
- speaker: Respondent
  text: Join the Marine Corp along with Gaylan, yeah.
- speaker: Interviewer
  text: Okay, I guess a lot of boys were inspired or motivated to do - After Pearl Harbor.
- speaker: Respondent
  text: "And they wanted to go they didn\x92twant to be drafted."
- speaker: Interviewer
  text: So you and Mick exchanged letters during the war?
- speaker: Respondent
  text: Un-huh, yes we wrote letters.
- speaker: Interviewer
  text: How often did you write?
- speaker: Respondent
  text: I would write, probably, every day and he would write whenever he could, which was not very often.
- speaker: Interviewer
  text: Yeah, yeah, did you save any of the letters? Do you wish you had?
- speaker: Respondent
  text: "I, I wish I had now, yeah, most of 'um were just \"love letter\" nothin\x92 -"
- speaker: Interviewer
  text: "Well, I guess he couldn\x92ttalk too much about what he was doing."
- speaker: Respondent
  text: "No, no he couldn\x92t -"
- speaker: Interviewer
  text: "What could he write about that wasn\x92tcensored, just kind of a love letter again, he really couldn\x92ttalk about\
    \ -"
- speaker: Respondent
  text: "That\x92s all it was, it wasn\x92t -"
- speaker: Interviewer
  text: "He couldn\x92t say where he was located or ["
- speaker: Respondent
  text: No] or what he was doing.
- speaker: Interviewer
  text: Or where he was going or anything. Were some of the letters censored, where they blacked out, or cut out, did they
    cut out words?
- speaker: Interviewer
  text: "No, he just wouldn\x92teven, he didn\x92twrite 'um. I don\x92tremember 'um bein\x92 blacked out."
- speaker: Respondent
  text: I imagine you were worried and fearful about -
- speaker: Interviewer
  text: "And always wonderin\x92 and, of course, that time you didn\x92thear very often, you didn\x92t, you didn\x92t get\
    \ a letter from him."
- speaker: Interviewer
  text: Well, did you follow the war in the newspapers? And the battles, especially in the Pacific, where, where Mick was.
    And so you got the newspaper every day to see what was happening?
- speaker: Interviewer
  text: "Well, I don\x92tknow if we got one every day. I don\x92tremember if we got one delivered every day, ah - Well, did\
    \ you listen to the news on the radio about the war?"
- speaker: Interviewer
  text: "Yeah, you\x92d all just sit around the radio, you know, and hear what was going on, what they were allowed to say."
- speaker: Respondent
  text: "What about movies? Did they have newsreels at the movies about the war? They didn\x92t, okay. Okay and you said they\
    \ gathered around the radio to, to hear the news about the war. Did you ever hear FDR in one of his \"fireside chats\"\
    \ during the war?"
- speaker: Interviewer
  text: Yes, one time we did maybe more once but FDR was a very favorite of ours. I think he was of a lot of people.
- speaker: Interviewer
  text: Yea, so you do remember listening to him on the radio? Tell me about rationing, what was rationed during the war years?
- speaker: Interviewer
  text: Well, what I remember is meat ah, butter, things like that, ah what else was rationed? What about gasoline and cars
    and tires?
- speaker: Interviewer
  text: And gasoline, of course, you, you would get so many gallon and my dad worked just down, down town and there would
    be, ah, there would be two (2) or three (3) of 'um riding in one car, you know, so you could use your gasoline stamps
    for several of 'um.
- speaker: Respondent
  text: "I remember in your memoirs you talk about, I don\x92tknow if it was your Dad or someone else who would get a lot\
    \ of flat tires and he\x92dhave to repair the tires 'cause you couldn\x92t buy new ones."
- speaker: Respondent
  text: "Oh yeah, my Dad did. [laughter] I even remember and once in a while we\x92dtake a ride on Sunday up to the hills\
    \ and he would, you\x92dnever go anywhere that you wouldn\x92thave a flat tire. You know, they had those bladders in the\
    \ tires and you and you scraped 'um off and they put, ah, rubber, or patches on 'um, I guess is what they called 'um and\
    \ then pump up the tire. Get in and away we\x92d go for a little while."
- speaker: Interviewer
  text: "So you dad wasn\x92table to buy any new tires while the war was going on? No, not at all so you really made do."
- speaker: Interviewer
  text: Where did you get your ration stamps from, did they mail them to you or did you go to the post office to pick them
    up?
- speaker: Interviewer
  text: "I, you know, what did we do? They must of mailed 'um to us, I don\x92tremember goin\x92 to get any? You\x92d get\
    \ them once a week or once a month, or?"
- speaker: Interviewer
  text: "Somethin\x92 like that, once a week, probably, but of course there was 7 (seven) of us kids so, you know we, at that\
    \ time, we probably got a few more grocery stamps and things than most people but I don\x92tremember the stamps, isn\x92\
    tthat funny, I thought that I\x92dnever forget that."
- speaker: Interviewer
  text: Now, I believe your brothers Hal and Bob also served in the military. Could you tell us about where they were?
- speaker: Interviewer
  text: "Hal was in the Army and he was the oldest in the Army and he was fightin\x92 the Germans over in Germany he was at\
    \ the battle, what they called \"The Battle of the Bulge\" which was one of the worst battles in Germany. Did he write\
    \ home about his experiences? Well, he couldn\x92t."
- speaker: Respondent
  text: Again, it was censored.
- speaker: Interviewer
  text: "Censored, everything was censored, you don\x92t, you didn\x92twrite about any of that. Do you know if he was on the\
    \ front lines during the \"Battle of the Bulge\"?"
- speaker: Interviewer
  text: "We knew he was up there somewhere but didn\x92tknow where. Yeah, and I know, ah, what the, see Hal started at Italy,\
    \ I think he went up Italy and then went on up to Germany and fought. But \"The Battle of the Bulge\" was at Germany and,\
    \ ah -"
- speaker: Respondent
  text: "Did he stay in Europe until the war was over, he didn\x92tcome home on leave, I guess, he stayed there."
- speaker: Interviewer
  text: "No, he didn\x92t get leave [laughter], at all. What about your other brother, what was his name? Bob, where did he\
    \ serve?"
- speaker: Interviewer
  text: "Bob was in the, ah, Merchant Marines, which, which protected the mostly the, ah, clear up to Alaska. Mostly the,\
    \ what do I want to call it, Pacific what was it, the Pacific, ah goin\x92 up to Alaska? But he was in the Merchant Marines.\
    \ Did he write letters home?"
- speaker: Interviewer
  text: "And he would write, too, but not, like I say everything was censored so you didn\x92t get the -"
- speaker: Interviewer
  text: So, I assume, he wrote the letters to his mother, not to you, or to the whole family? No, yeah, to the family, not
    to his mother, probably.
- speaker: Respondent
  text: "Okay, let\x92s go on to the end of World War II, how did you hear about the end of the war in Europe, did you hear\
    \ about it in school, oh, you were out of school by then. Did you hear it on the radio?"
- speaker: Interviewer
  text: "My brother, we had it on the radio 'cause, I\x92ll never forget, we lived on Kalamath Street, my brother was home\
    \ on leave - From Europe, which brother? From, no, not the one in Europe the one on the coast."
- speaker: Respondent
  text: "Okay, in the Merchant Marines. Merchant Marines and he was home on leave and we lived, Kalamath Street was the thorough\
    \ street that most everybody took from say downtown Denver to South Denver, there. And, I\x92ll never forget when the\
    \ war was over, Daddy bought a bottle and every car that came down Kalamath Street, cause that\x92s the only way they\
    \ had goin\x92 down to South Denver there where we lived would stop and everybody have a drink. And my brother, Bob, who\
    \ doesn\x92tdrink at all now, at that time got polluted along with my dad."
- speaker: Interviewer
  text: Now was this after the war in Europe ended or after the war in Japan, in the Pacific ended? Europe, yeah, yeah, and,
    ah How did you celebrate the end of the war?
- speaker: Interviewer
  text: "Takin\x92 care of my brother and my dad who was both so polluted [laughter] I think that\x92s all we did my mother\
    \ and us girls were just takin\x92 care of Daddy."
- speaker: Respondent
  text: Well; how did you hear about the end of the war in the Pacific about the atomic bombings of Hiroshima and Nagasaki,
    you remember the days that that happened, did they, they reported on the radio, I assume.
- speaker: Interviewer
  text: "It was on radio and, but I was workin\x92 at the machine shop at the time."
- speaker: Respondent
  text: "That\x92sright you were still working even after the war, you worked until 19 -"
- speaker: Interviewer
  text: Yeah, yeah, that was before I got sick.
- speaker: Respondent
  text: Now, when the boys came home from the war, from the Pacific or from Europe they all, they kind of bumped a lot of
    the women out of the war plants. But you were able to keep your job?
- speaker: Interviewer
  text: I did keep my job. Did you, a lot of ladies that you worked with lose their job?
- speaker: Interviewer
  text: Some of the ladies were still there, I can remember Mary Hamilton; she lived right there on Kalamath where I did and
    she worked, she did the drill presses.
- speaker: Interviewer
  text: So if you had some special abilities they kept you? But a lot of the other women, they were replaced. Well, they glad
    just to get out of there. I guess they were. Okay, the war is over and, ah, when did you get married?
- speaker: Interviewer
  text: We got married February 15th and we chose the 15th because we had 3 (three) days off with the 15th.
- speaker: Respondent
  text: "See Mick didn\x92tcome back from the Pacific -"
- speaker: Interviewer
  text: "Yeah, \x9246, it must have been. Until like September of 1945 and then you got married in September - Februray of\
    \ \x9250 - February of \x9246?"
- speaker: Interviewer
  text: "At Redeemer Luthern Church, I\x92ll never forget it. On Mississippi and where was it? I don\x92tremember now. Where\
    \ did you and Mick live after you were married?"
- speaker: Interviewer
  text: "And he wasn\x92teven workin\x92 at the time we were married. I was and he wasn\x92t but he got a job as ah, where\
    \ did he get that first job? Guess at Martin Marrietta, did he, no--"
- speaker: Interviewer
  text: Where did you work, now how long did you continue working for Arthur Hurt, you stayed there for a number of years?
- speaker: Interviewer
  text: Oh, I stayed there for a number of years, until I got sick and then I was off because I had a brain tumor and-- So
    you were out of work for some time?
- speaker: Interviewer
  text: I was out of work for some time and, of course, when I got back Art hired me again at the machine shop and I worked
    upstairs, I remember, doing what, what did I do up there?
- speaker: Respondent
  text: "Now I don\x92tassume you weren\x92tmaking parts for Boeing Aircraft - Anymore, no military."
- speaker: Interviewer
  text: No, not any more. No more war time effort? No more war time. But you eventually left Arthur Hurt and you worked somewhere
    else? You became a realtor, I believe?
- speaker: Interviewer
  text: "Oh, well, yeah I was a realtor when I came back, we moved out to Castle Rock. 'Cause we lived in Denver at that time\
    \ and then we moved to Castle Rock oh, we lived at Castle Rock when I still worked at Art\x92s, didn\x92t we?"
- speaker: Respondent
  text: That was along commute.
- speaker: Interviewer
  text: "Yes I did, too funny. Anything you\x92dlike tell us about your children during their growing-up years?"
- speaker: Interviewer
  text: I had David and Jim and David was, ah, oh always kind of the mild-mannered one. Jim was a little bit, ah, what do
    I say, Jim was in dependent more or less. Ah,
- speaker: Respondent
  text: "Well is there anything else you\x92d -"
- speaker: Interviewer
  text: "David went to college at Northern, no CSU at CSU, David went college. But Jim didn\x92twant to go to college, he--\
    \ So how long were you a realtor, several years? I was a realtor several years, yeah. Did you enjoy that?"
- speaker: Interviewer
  text: And I did enjoy it, yeah, I really enjoyed it and I--I knew a lot of, as a matter of fact I just met a lady that I
    had known down in Perry Park which was when I was realtor and Perry Park was just beginning to develop at that time. Perry
    Park and then most of Castle Rock area I worked with Metro Brokers.
- speaker: Respondent
  text: "Well, let\x92s see, let\x92s we\x92re going to close pretty soon now. Is there anything you\x92dlike to tell us about\
    \ your experiences on the home front during WWII, anything else that we can talk about?"
- speaker: Interviewer
  text: "You know, at the present time, I can\x92t. I remember I have, ah, what, your annual, you know where my annual is--do\
    \ you have it?"
- speaker: Respondent
  text: "Well that\x92so kay, let\x92sclose. I want to thank you for sharing your story; it will be archived at the Library\
    \ of Congress and at the Douglas County History Research Center for use by future generations to help them understand\
    \ what it was like experiencing the war years. Thank you very much."
- speaker: Interviewer
  text: Thank you. [END OF INTERVIEW]
