- speaker: Respondent
  text: save 25 dollars a month. That's quite something, wasn't eh ery Yes, it was. I got one dollar a day, working 10¢
- speaker: Respondent
  text: 'an hour, and earned 30 dollars a month! We cooked our own meals, and the Oriental Tradings Co. supplied us food.
