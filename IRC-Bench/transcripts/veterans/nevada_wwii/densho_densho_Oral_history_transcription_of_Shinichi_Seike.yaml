    in this camp, if you want to, because
- speaker: Respondent
  text: I am going to treat you special. I'll have my wife teach you English. So stay here." "I'll stay here
- speaker: Respondent
  text: then." I said, and I stayed. while everybody else left. At that time, Italian immigrants were rapidly coming in, all
    the jobs in the section were taken by then, and everybody had to leave. The foreman said, "You may stay here if you work
