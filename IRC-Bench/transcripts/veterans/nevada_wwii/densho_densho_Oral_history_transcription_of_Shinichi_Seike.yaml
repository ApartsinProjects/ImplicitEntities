    He asked me some questions such as what I was going to do in the U.S.. Mr. Yoshioka interpreted for me conveniently, and
    I just a greed, saying, "Yes, that's
- speaker: Respondent
  text: Thus I was able to go through the Immigration office without any problems. There was a chapter of Rikkokai in Seattle,
