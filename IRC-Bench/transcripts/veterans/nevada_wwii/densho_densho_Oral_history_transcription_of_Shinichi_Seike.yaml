    (See IOHP Deed of Gift Oral History: Transcripts to CSUS Library, January 8, 2001). Oral and written releases of in formation
    were obtained from respondents who a greed to have the tapes translated into English for research'
- speaker: Respondent
  text: purposes. These legal releases are on file at SAMCC. Iv. Notes on the use of translated oral histories.
- speaker: Respondent
  text: Use of translated oral histories of elderly Issei for research purposes requires special consideration in terms of
    historical or experiential accuracy. Linguistic issues a rise when a translator more fluent in Japanese than English,
    may misinterpret what is reported. Also, an Issei respondent is likely to use English terms or place names with Japanese
    pronunciation and a translator unfamiliar with such a term may compound the error. For example, as there is no "L" sound
    in Japanese, Walerga Assembly Center may be
- speaker: Respondent
  text: translated as Waraga, and Melrose Avenue is translated as "Mary Rose" Avenue. Oral histories may be viewed more appropriately
    as "memoirs " or remembered events rather than reportage of what "really happened." Individuals tend to be selective about
    what they remember and things are reported from one's own perspective. In addition, memories may dim over the years. Issei
    respondents reflect values, attitudes and behavior of Japan's Meiji era, 1867-191g. More than 100 years of cross-cultural
    differences exist between Issei respondents and Western researchers of the twenty-first century. Some respondents refer
    to experiences so "embarrassing" or "shameful" that they have never revealed them to anyone, even family members, until
    they revealed them to an interviewer. Readers of the oral histories, therefore, may fail to view a reported
- speaker: Respondent
  text: event in kind or degree as expressed by a respondent. V. SCOPE OF THE COLLECTION A. The collection consists of two
    sets of documents.
