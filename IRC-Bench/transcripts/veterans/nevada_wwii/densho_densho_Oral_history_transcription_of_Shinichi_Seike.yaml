- speaker: Respondent
  text: year. Then I said, "I am not going to work on railroads any more. I am going out to Seattle and work either
- speaker: Interviewer
  text: on farms or in a store. Anyway I am going to Seattle." "Why are you leaving here?" they asked. I still
- speaker: Respondent
  text: remember that I saved 25 dollars a month working 10¢ an hour. I still can'tguess how I managed it. Every two months
    when I went to work near the town where
- speaker: Respondent
  text: a big post office was, lused to send the money of 50 dollars or so to Japan, because only big post offices could send
