    But my mother strongly believed that she had to send me to high school at any cost. At that time, we were
- speaker: Respondent
  text: suffering from poverty because my father had faiied in a big project and gone bankruptcy. She thought
- speaker: Respondent
  text: that she had to send me to the school only because of being poor, and insisted, "I am going to send Shinichi to the
    school by all means even if I have to eat nothing." There was a rich family living in our neighborhood that happened to
    be our relative. Every time she went to the house to apologize that we
- speaker: Respondent
  text: could not make a Peonene for the debt, she took me with her. I still remember that she used to apologize, saying,
    "We cannot make a payment now, so please
- speaker: Respondent
  text: give us some more time," putting her hands) ang forehead on tatami floor, crying. I could imagine that
- speaker: Respondent
  text: my parents were greatly suffering from poverty, but they thought they had to have me educated. They went to one of
    their relatives, very rich and some business successfully, to borrow the money for my education. Even they, being rich,
    were not sending their
- speaker: Respondent
  text: children to high school. Being in the country, it was 14 to 15 ri away from the town, that was almost the same distance
