- speaker: Respondent
  text: were swollen badly, and I cried by myself then. Yes, I was hithere..., although my arm wasn'tbroken, everyone coming
    back from work at night, asked me
- speaker: Respondent
  text: how I was. Some suggested that I had better go to see a doctor, some said that I didn'thave to. I applied to my arm
    an ointment of flour and water, thinking that I would be able to work again in a few days. After a while, I became able
    to work again. I still
- speaker: Respondent
  text: remember that I cried by myself at that time, not knowing what was going to happen to my arm in the Situation that
    I hadn'tgotten used to the new
- speaker: Respondent
  text: environment--America. Well, I didn't get injured any other time except that time, and everybody treated me nice. Anyway,
    I must have worked sincerely, because the foreman said to
- speaker: Respondent
  text: me who had just come from Japan,"You stay here. My wife who is coming pretty soon will teach you English." I stayed
