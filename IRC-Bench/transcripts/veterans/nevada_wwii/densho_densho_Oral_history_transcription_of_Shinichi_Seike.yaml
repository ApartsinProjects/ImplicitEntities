    I tried it this way, in vain. My father wanted me to go to America to make money to pay the debt off. I tried so hard
    in various ways to ge the visa, but Il couldn't. So I applied for an immigrant visa to Hawaii, since it was also popular
    then. But the policeman who came to my house to research about myself reported that he did not admit me as an immigrant.
    I was having a hard time in obtaining the visa. When I was going to the high school, I had the English teacher from Sendai
- speaker: Respondent
  text: named Ouchi. He became the manager of the Rikko-Kai Assouezakion in Tokyo whose president was Kihei Shimazaki.
- speaker: Respondent
  text: Quite a few members of the Rikko-Kai were going to America. I wrote hima letter and said,"I would like to go to America.
    What would you think of this idea?"
- speaker: Respondent
  text: 'He told me to come to Tokyo, so I went to Tokyo at once. At that time, jt cost quite a bit to go to Tokyo, and Iv-hesitatédsfor-a
    moment. But I managed to berrow: money to go to Tokyo, and began to board'
- speaker: Respondent
  text: at Mr. Ouchi's house. At that time, there was an Association called Rikko-Kai and they were sending quite a few people
    to the U.S. and South America.
- speaker: Respondent
  text: The president, Mr. Shimazaki was quite a man in Japan equal to Mr. Gunpei Yamamura. He was from Sendai, and founded
    the Rikko-kai whose purpose was to send immigrants to overseas. He thought that the Christian education had to be given
    to them before going a broad, he had a big, fine hall built and advertised the association loudly. Quite a few youth gathered
    to his place. He didn'thave any money when he had the big hall built, but he believed that with the religious faith he
    could solve the money problem anyway because of the mercy of God. I heard that he had had a hard time being accused by
    the contractors of the building. He was suffering from T.B. and often coughed out blood, I heard. He was a great man in
    educating the youth, and sending them not only to the U.S. but South America. Quite a few of them are still living in
    those places. I, myself, went to Tokyo, looking to Mr. Ouchi for help. There were various homes such as the Betania Home,
    where
- speaker: Respondent
  text: 5 to8 people boarded. They did their cooking or the landlady cooked for them. I,myself, was boarding
- speaker: Respondent
  text: at Mr. Ouchi's house and attending the Rikko-kai. I was in the association about one year and a half to
- speaker: Respondent
  text: almost two years. We had a five minute private interview with Mr. Shimazaki in the morning. A List of order of the
    interviews was made up. This interview should be only for 5 minutes. I had
- speaker: Respondent
  text: '''seen him twice during my stay there. He encouraged me saying,"How are you doing?" He was a minister of Nihon Kiristo
    Kyodan (Japnese United Church of Christ). Of course there was a church in Rikko-kali, but it was not the real one since
    Rikko-kai was an association. It had English teachers. Various subjects were set to be taught. Quite a few youth from
    all around Japan gathered. One time, when I was there, about 150 to 200 people gathered. There was a big hall for them.
    The purpose of the Kai was to encourage and lead the youth to Christianity and'
- speaker: Respondent
  text: send them to overseas. For brides, a special system to educate them was arranged. These were the intentions of Mr.
    Shimazaki, and I was arranged. These were the in terntions of Mr. Shimazaki, and I was one of those who were trained and
    educated
- speaker: Respondent
  text: by him. I heard that he had coughed out blood some times, but he said, "I won't die even I cought out
- speaker: Respondent
  text: blood, because I believe in Christianity. I'll keep on going to the end." He was quite a spirited man. During the
    interview, he said, "I heard that you would like to go to America. Do you know anybody helpful?"
- speaker: Interviewer
  text: I said, "Yes, I do." He said, "What kind of acquaintance is he?" I had a relative who was a member of the Diet.
- speaker: Respondent
  text: When I was in the Kai the Diet was convoked and he happened to be in Tokyo. His name was Mr. Watanabe. So I said,
    "He has come to Tokyo from my prefecture." He said, "That's very good. Go to see hinc There was a discount cable-car running
    around 7 O'clock
- speaker: Respondent
  text: in the morning. I got up really early in 'the morning to take it. The Dietman was Sstaying.at ia big hotel, and wasn'tgetting
    up before 10 O'clock in the morning. I put on hakama took the cable-car, got to the hotel early in the morning, and waited
    for him. I explained my idea and said that I would
- speaker: Respondent
  text: like to go to America. He said, "I see. I know the governor of Ehime ken very well." He was elected a member of the
    Diet from the Ken (prefecture. Also my high school mate was a secretary for the governor, Mr. Saionji. He said, "I am
    writing a letter to Saionji at once. Send in the application that you would like to go to America. I'll write and ask
    him to issue a passport to you. Send in the application at once." In those days, the conditions to issue
- speaker: Respondent
  text: the passports to America werevery strict. You had to have a guarantor in the U.S. to take care of you when you got
    sick. They were investigating very closely into these conditions, and if you didn't
- speaker: Respondent
  text: meet the conditions, you could not go to the U.S.. Fortunately, Mr. Watanabe, the Dietman became the
- speaker: Respondent
  text: guarantor of myself. Also the father of one of my friends, Mr. Shiba, who was a dealer in wine and very rich, became
    my guarantor. With these two guarantors I sent in the application. I was enrolled at the Meiji University in Tokyo, because
    they would not issue a passport to those who were not going to school. In case they came to in vestigate my situation,
    I had to be boarding at quite a place. Mr. Shimazaki asked the elder of his church to let me board at his house. He said,
    "You don'thave to iave in his house. It will do if we have his maid tell the policeman that the person named Shinichi
    Seike is boarding at the house in case he came to in vestigate." Thus, I was enrolled at the Meiji University, started
    to go to
- speaker: Respondent
  text: the University, arranged to look like I was boarding at this influential man and elder, and sent in the
- speaker: Respondent
  text: application for the passport. Less than one month, the passport was issued to me. I wrote to my home that 7 bbtained
    the passport. They didn't do any investigation on me, since I applied
- speaker: Respondent
  text: for it with the Dietman's recommendation. I those days it cost quite a bit of money to go back to my home from Tokyo
    about 30 .-to 50 Yen, although I
- speaker: Respondent
  text: don'tremember exactly. I wrote to my father and said, "T finally got my passport. I am leaving for America
- speaker: Interviewer
  text: on this day. Shall I come back home to say farewell or not?" My mother wrote to me and taold me to come
- speaker: Respondent
  text: to come home, but it cost a lot of money to go back home, so I decided to leave Japan for America without going back
    home. Everybody that was studying at Rikko-kai in Tokyo worked, his way through school, delivering newspapers or milk,
    working as a navvy
- speaker: Respondent
  text: to earn money for lodging and personal expenses. I, myself, worked as a navvy riding on a water wheel
- speaker: Respondent
  text: when a bridge was being thrown in Ochamomizu area. Since it was costly for those who had come from the country to
    live in Tokyo, everybody worked this way to earn his own expenses. < stayed there for
- speaker: Respondent
  text: one and a half year, working and earning my personal expenses. It was in 1908 that I came to America.
- speaker: Respondent
  text: In the church in Kanda, they used to have a service in the morning and in the evening, and I earnestly attended the
    services since I was trying very hard
- speaker: Respondent
  text: to go to America. Before leaving for the U.S., 1 was baptized by Mr. Shimazaki at the Nihon Church of Christ in Mitatsuji-Cho,
    Kanda. A group of 16 people
- speaker: Respondent
  text: or so including myself came to the U.S. together. Weres they also from the Kai? Yes, 16 people from Rikko-Kai came
    to America together. At that time, the members of Rikko-kai used to go to various places to preach Christianity,
- speaker: Respondent
  text: beating a drum like the Salvation Army does. We talked the people about Christianity. Some strongly opposed to us.
    When we, a group of 20 to 30 people, visited a place to preach, carrying a big lantern on which the letters of Rikko-kai
    were drawn, beating a drum, some people threw stones to us, disparaging roundly. We, realizing that it was too dangerous,
    ran ~away from the place and got back. This happened two, or three times. Thus, was living in Tokyo, receiving lessons
    from Mr. Shimazaki, being engaged in mission, helping some office works. In April of 1908, we, a group of 16 people, left
    for the U.S. by the small boat named Iyo-Maru. Lt. cook 17 to 18 days to gethere in thoseg days. When we got together
    on deck and were holding a service, singing hymns, quite a few Christians a mong the
- speaker: Respondent
  text: 300 people on board began to gather to join us from nowhere, made a circle, and we could hold such a splended service
    every morning. Being young, We © were spiritful. Since I was the oldest-timer of
- speaker: Respondent
  text: the group, I became the chairman. We successfully held services, sang hymns, and visited the people to talk about
    Christianity on
- speaker: Respondent
  text: the boat. It was the time that I was 21 years old. Thus, I came to America. Having been trained very
- speaker: Respondent
  text: hard by Mr. Shimazaki in Tokyo, having been able to understand Christianity to some degree, I did my best even on
    the boat. In 1907, a severe depression attacked
- speaker: Respondent
  text: the U.S., and the people were having a hard time to make a living. The year we came to the U.S., in 1908 jobs started
    to be available again gradually.
- speaker: Interviewer
  text: Did you come to Seattle directly?
- speaker: Respondent
  text: Aso Yeo eT dids wed. Landes ae Seattle. Mr. Yoshioka interpreted for me when I was checked by Immigration officers
