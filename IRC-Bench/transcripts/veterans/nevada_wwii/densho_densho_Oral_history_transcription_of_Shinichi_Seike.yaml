- speaker: Respondent
  text: if they had a job for me. They said, "Yes, we do. Go to this place to work." We, the group OfW7 2, COs8
- speaker: Respondent
  text: who had just come to the U.S., decided to take the job--working for a railroad company. Tt was the time that a job
