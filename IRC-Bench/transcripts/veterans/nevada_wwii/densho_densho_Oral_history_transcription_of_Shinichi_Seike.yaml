    I went to Seattle and
- speaker: Respondent
  text: Were there any other people who got injured or killed working on the railroads? No, there wasn't. Recently, I got
    on a train sometimes and passed the places where I used to work before since the trains run the same places as before.
    I worked in a swamp where wild roses were on both Sides of railroads. There were so many mosquitoes that we had to put
    a net over our face while we were working. It is still a swamp, today when I saw it
- speaker: Respondent
  text: on the train recently. But nobody got injured. Did anybody get sick? No, nobody got sick, either. I was at the age
    of 22 strong and healthy, when I left for Seattle. I started to work on farms. I have my family about 15 miles away from
    here. There is a town called South Park below my place. I once worked with one -of my friends for Italians in the town.
    I those days, they didn'tserve us coffee. They served us wine instead. A grandmother cooked. She baked this big Italian
    bread. For lunce, plenty of meat was served with big slices of bread and wine. At the end, my nose started to bleed. I
    thought,"This isn't too good for me." They had us sleep in a barn where horses were put. I woke up at night when they
    made noises. I stayed there for a while, although I don'tremember how many months. Then I started to work for a Japanese
    farmer. I had been in America for only one year then. There were some co-workers who had been in America longer. One of
    them was talking about green houses, "In America, they have so called greenhouses where they keep the room temprature
    warm in the winter time. In the winter time when products are scarce, they can grow things earlier in the greenhouses
    by keeping fire going on to keep inside warm. Indeed greenhouses are good." I heard this, and
- speaker: Respondent
  text: thought, "1s 'that so z.94..don" t -know, though." I continued to listen to him silently. One Sunday,
- speaker: Respondent
  text: since we didn'twork on Sundays, I went to a greenhouse near by owned by hakujin (a whiteman). I said, "I am now working
    such-and-such place. Could I get a job here?" He said,"Where are you working now?" -I said, "I am working for a Japanese
    farmer near here." He said, "Why do you want:-to work here?" I said, "Because I would like to work in greenhouses." "I
    see. Please write your address here so that I can let ;you know when I got a job opening," he said. After this, I heard
    another news about greenhouses from co-workers' conversation. There used to be a big company named Furuya in Seattle.
    It went into bankrupcy recently,
- speaker: Respondent
  text: though, but it owned a bank, too. Anyway, this rich man, Mr. Furuya, owned two big greenhouses, 150 feet x 25 feet,
    in an island where his villa was. They were talking that there was sometimes a job opening there. Hearing this, I wrote
    a letter to Mr. Masajiro Furuya as soon as
- speaker: Respondent
  text: I got home from work and said, "I am at present working such-and such a place. They say that you have greenhouse and
    sometimes need a worker. If you need one, please hire me." A few days later, I received a reply from him which said, "I
    have an opening,
- speaker: Respondent
  text: so please come seeme." I had been working for this Japanese farmer for 3 months or so. He said to me, "Since you are
    a ee worker, I would like you to
- speaker: Respondent
  text: work at our market." He, Mr. Higashi, owned the market jointly with Mr. Yoneyama. Mr. Yoneyama was was taking their
    products to public markets and farmers' markets. Mr. Higashi was my boss. My foreman was Mr. Ishizaka who so wed seeds
    or so. I said, "For this reason, I got a job in Seattle and I am leaving here. Thank you for your hospitality." "Oh, Mr.
    Seike, are you leaving us? Please stay here. I would like you to help us at our market with a salary of 35 dollars, so
