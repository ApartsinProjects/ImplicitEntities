- speaker: Respondent
  text: and they, as a gang, moved around from place to place to work to build new railroads. The roadmaster as
- speaker: Respondent
  text: well as my correpondent in Naples recommended me to join the gang, so I joined it and started to work for laying a
    railway. At first, I could not do the work as well, but I must have worked very hard. Because at the end, I became an
    expert of driving in
- speaker: Respondent
  text: At that time, they switched to use bigger railroads from small. ones, and we were changing the old railroads into
