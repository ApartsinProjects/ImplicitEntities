  text: 'UMN Immigrant Stories Collection Yesenia Moran Flores [''Moran Flores, Yesenia''] [''United States''] Yesenia Moran
    Flores was born in St. Paul, Minnesota. Her parents migrated from central Mexico to Minnesota when her mother was pregnant.
    Her parents owned a restaurant in Maplewood, Minnesota from 2004 to 2008. Yesenia is a student at St. Paul College. Yesenia
    Moran Flores Transcription Mexico to Minnesota…By Damian Jones and Yesenia Moran (YF) Slide: I interviewed my friend Yesenia
    about her parents'' journey from Mexico to the United States. YF: My parents'' journey starts in 1995 in central Mexico.
    My parents down there were financially stable. Everything was going great. Slide: Why did your parents want to move to
    the United States? YF: One of the decisions that made my parents move to the U.S. was because my mom was pregnant with
    me. With that being said, my mom did not want to leave Mexico. She wanted to stay and be home with her mother in order
    for her to help throughout the pregnancy. My dad on the other hand did not want to stay. He wanted me to be born in the
    United States. He wanted a new and better life for us. He wanted us to get some sort of education and not have that typical
    farmer-worker in the state of Mexico. Slide: How did your parents gethere? YF: From central Mexico my parents did have
    to consider a coyote. A coyote would be the one to take them from Mexico to the border, roughly around Texas. My parents
    had to lose land, a lot of it, had to sell it, buy money, in whatever possible way they could. Even though they were financially
    ok, a coyote does not come as cheaply as people would consider, especially with Mexican currency. Slide: What is a coyote?
    YF: Personall,y I don''tknow too much about what a coyote is because I never had to go through that, but according to
    my parents a coyote is just a regular person who helps immigrants travel from one country to the United States. With that,
    they don''tcare for you or they don''tanything, they just do it for the money. Regardless if you die on the border or
    if you survive, you have to pay them. If not, the family that ordered the coyote still has to pay them regardless. If
    not, usually death falls on them. Slide: What were some of the challenges your parents faced? YF: From Texas to our journey
    to Minnesota a lot of it was really hard and different. My parents did not know English to start off with, so making transportation
    from Texas to Minnesota would be already one challenge they faced. Currency was another one. From there, from my knowledge,
    from what my parents said, they took a bus, they came from Texas to Minnesota knowing that my mom had a brother up here.
    From there, a couple months later, I was born, and that''s where everything started to change as well. Slide: What happened
    in Minnesota? YF: In ''95 my parents were here in Minnesota. My mom didn''thave her mom with her so she was all a lone.
    She had nobody to help her, nobody to assist her with the pregnancy. With not being familiar around the area, my parents
    had to take a bus to the hospital where I was born at Regions. From there my dad got a job. It was one of those minimum
    wage immigrant jobs that everybody talks about currently now. My mom, obviously, still didn''thave a job - just me, my
    uncle, my dad in the house. Slide: What happened after you were born? YF: My parents got their residency around 2003,
    2004. My dad decided that he wanted to get a restaurant. In 2004 we roughly got the restaurant in Maplewood, which decided
    our family''s impact to move there. For a couple years we moved to Maplewood and then we moved to White Bear. White Bear
    is where we currently still have the restaurant all the way until 2008. In 2008 was roughly when the recession happened
    and that''s when we lost it. From there, we haven''t had any new businesses, but my dad is still trying to figure out
    a way that we can still do that. Slide: How are you now? YF: I''m currently a student at St. Paul College. I''m the first
    one to go to college right away after high school. My parents still are currently working on that as well. Next year,
    my sister will be graduating--again, from the White Bear district, while the other two are still in their elementary and
    pre-school.'
