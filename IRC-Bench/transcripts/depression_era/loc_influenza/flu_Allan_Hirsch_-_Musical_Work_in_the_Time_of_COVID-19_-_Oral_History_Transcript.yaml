source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: So this is chiefly a project focused on music and musical work that I'm--for which I'm interviewing you currently.
    But you've spoken several times about the - I think you see yourself not just as a musician, but also you mentioned you're
    a storyteller as well. Right. So I don't want to downplay that aspect of the work that you do here. But I am interested
    in knowing about how you first came to a career in music. And perhaps you could also tell us about how you became a storyteller,
    too.
- speaker: Respondent
  text: Oh, well I, as a child, my parents gave me a stack of Classical 45's. You don't know what a 45 is I'm guessing it's
    a little records, you know? And they were all classical marches you know, and you know, William Tell Overtures and stuff
    like that. And, and so I would build blocks is when I was like five years old. I'd build blocks by listening to those
    and, and then, of course, I got into Elvis when Elvis came out, and I was singing Elvis Presley songs. And my mom always
    said to me, you're gonna do something with your voice someday. And all the way through elementary school, I sang because
    that was part of school, then. We sang all the time. Even in high school, we kept singing. Part of it was, you know, I
    went to Catholic school. So it was church and singing was a big part of reality, and football games, just sang. And then,
    when--I hadn't really learned any musical instrument up until that point in time, I wanted to be a drummer. My father
    always said to me, "You make too much noise already. I'm not letting you play the drums." Always tapping. (taps feet)
    My feet are always moving. (laughs) And so I drove them crazy, anyway. And then my sister had given me one of her Castaway
    little guitars, which was terrible to play, but I messed around with it, but I really didn't learn anything. And then
    I went to college. And in college, I started hanging out with people who actually played music all the time. Piano players,
    guitar players, and I sang with them and eventually took voice classes in college, and played the drums for a while. And
    then I did that for a few years after college, kept playing the drums. And then I picked up guitar, started learning guitar
    and learning--I started writing songs and collecting folk material. Let's see I'm into the 70's here already so--And I
    was in a group of people called the Love Family, which is a big commune. It was on Queen Anne Hill. And there were lots
    of guitars and lots of players, and so I started learning how to play guitar and learning old time folk songs. And because
    I worked with kids, I started learning folk material. And it was kind of by happenstance, somebody says, "Oh, do you know
    that song with Tom Paxton song, The Marvelous Toy", I said, "I've heard that before." And so somebody would teach me one
    song, Puff the Magic Dragon. And I started accumulating those songs. And then I started teaching the kids those songs.
    When I was already familiar with Woody Guthrie's music, and Pete Seeger, things you heard on the radio. And so I started
    singing with kids and teaching kids singing. I was in a choir at that time, where we learned something that I still use
    today called the Italian opera chants. They're these vocal exercises using the five vowels. "Oo, Eh, Ee, Oh, Ah" and you
    learn to sing scales and thirds. And, you know, it's for breath control, as well as tone matching, you know, and you learn
    to sing along with the piano or the xylophone or something. And then I started doing those with kids, And I've been doing
    those with children ever since. My daughter went into the Seattle girls choir. And at one point, they wanted to know what
    I did with young kids, because rumor was out there that I had three, four and five year olds singing. And so I said, "Well,
    you got to come see me, what I do." And the director of the Seattle girls choir sat in on one of my classes, and he couldn't
    believe that I got three year olds doing these Italian opera chants (laughs) and other things, you know. So I started
    working for them a little bit, doing some classes for them. (pauses) And the guy that taught me that his name was Bill
    Craig, he's a musician down in the Bay Area now, he's a composer. I contacted him recently, I said, "You know, I'm still
    using those opera chants you taught us back in the 70's." And he said, "Really?" Because he learned them when he was in
    college from his professor, and he didn't know anybody still did that. I just found it so easy to get a three year old
    to sing or a four year old to sing. It has to be simple. You're just singing, (sings) "Oooo." You sing it in a scale and
    it's--In my Montessori training, I learned that what Maria Montessori did was she took every idea and whittled it down
    to its core. And so you learn a concept long and short, and then you learn a concept broad and narrow, and every piece
    of equipment was one of those things. And so I feel like that's what I did for children, was I took the voice, teaching
    voice down to the just sounds, and the facial expressions you make when you make those sounds helped form the larynx correctly.
    This is all things I've learned since then through voice therapists and people that I've talked to. You might know more
    about this than you're letting on. And so I continue to do that to this day. And in the process, I've collected hundreds
    of things to do, vocally, with kids. I met a Swedish Montessori teacher who taught me a poem that's set to the musical
    scale. So you go up and down the scale and recite the poem. And it's cute, it has some action, physical action for these
    little three, four, or five and six year olds. And that was the first one and then I found another one, then I made up
    a few. And then I kept going until I made a little book about it for teachers. I call it "Xylophoni Macaroni." It's all
    little things you can do with an eighth note xylophone. Anybody can do it. Even a non musical person can play that xylophone
    and sing, "Oo" up and down that scale, and "Ee" and "Oh," and so on. So and then of course, y
