turns:
- speaker: Respondent
  text: I was born in Coosa County Alabama, October 7th, 1862. My father was Pr 3aeon B. Wood, a practicing physician and
    slave owner and plantation operator in Alabama. My mother was Miss Sarah Barrett, a daughter of James Barrett and wife.
    James Barrett died and my grandmother came to Texas with her sons Frank, Reneau and Thomas. Mother died in 1899, at the
    age of fifty years and at er, raiggpnZife ember of 1907. Their children were.
- speaker: Respondent
  text: My father prepared for his medical profession in Jefferson Medical College, in Philadelphia, graduating in 1856. He
    practiced in Coosa County only abandoning his profession when he retired to his farm because of ill health, after coming
    to Texas. During the war between the states he served in the eastern Department of the Confederacy as captain, was captured
    and sent a prisoner to Johnson's Island, Lake Erie. He was interested in education and belonged to the Baptist church,
    of which he was an active member.
- speaker: Respondent
  text: I was a small boy when we left Alabama but I can remember crossing the Mississippi river at Vicksburg, and as we reached
    the opposite side, who should be standing there but one of our former slaves, on seeing us he cried out 'Hello Massa,
    die de fast time I is see any of you lns sPie I lef' fur de war wid Mars Henry, I wuz wid Mars Henry Wen de yankee's kill
    him, an' I see him pat away, jes 4as I promise him I would'.
- speaker: Respondent
  text: When we left Alabama we came by wagon train driving oxen and mules, there were twenty-five families in the train.
    We reached the Trinity river in about sixty days after crossing the Mississippi, the whole country was under water and
    we had to wait for the water to recede before we could cross and made camp where we remained for about two weeks. Then
    we drove into Athens Texas, where we lived on a rented farm for two years.
- speaker: Respondent
  text: My father practiced medicine here with a Dr Gardner and my mother secured the country school and taught for a time.
- speaker: Respondent
  text: About this time my father decided to leave the timber country and moved to Hill county and bought a farm of two hundred
    acres, six miles east of Mount Calm Texas. We children attended the school at Hubbard which was also near us until we
    were old enough to attend college. Our father's brother-in-law Mr Barrett also bought two hundred acres and lived near
    us.
- speaker: Respondent
  text: While we lived in the Navasota bottom Ben Wallace homesteaded land, and no better man ever lived, he had such a noble
    wife, we called her Aunt Mary Jane. Now they are all gone, but we cherish their memory, the children also.
- speaker: Respondent
  text: While living there and making a crop the men went to the prairie and built three log houses, split rails and improved
    their homes on the prairie.
- speaker: Respondent
  text: I can remember how it began to snow while we were in camp before our homes were built, and how one of the oxen froze
    to death in the night, and the next day when we went back to our home in the bottom we rigged up sleds and teams and sharpened
    our knives ready to skin dead cattle, we dressed them for a week, skinned them and sold the hides for a good price and
    it enabled us to purchase rations and supplies which were so much needed.
- speaker: Respondent
  text: Turkeys were wild but were plentiful everywhere. Grandmother Barrett's grandmother took a string and fastened it to
    a crib door where she could see it, and when forty six wild turkeys went into the crib for feed she closed the door on
    them and we had plenty of turkeys to eat for some time.
- speaker: Respondent
  text: I recall my uncle building a turkey pen of rails with a tunnel leading into it, he baited the roads leading to the
    pen and caught a pen full, I can remember how in his haste he hurried into the trench and the turkeys gave him quite a
    lash.
- speaker: Respondent
  text: When we went back to work on the prairie houses we left a servant girl to sprout the ground ready for planting, she
    heard the dogs barking at something, and they had a deer cornered in the creek bed. She took the wooden rake and helped
    the dogs to kill the deer. This goes to show that we reached Texas in time for the wild turkeys and deer.
- speaker: Respondent
  text: Another incident of my youth which impressed me was my father sending me to Waco to purchase a cog for our sorghum
    mill. He had given me a pony and I rode him over to Waco, good ride. The foundry was located on the bank of the Brazos
    river and I spent the night in a hotel on Franklin street, I can remember how a live oak tree grew up through the porch
    of the hotel, and have often wondered what became of this place. When I went back home I tied the cog to the saddle, and
    the motion of the horse ruined the cog as well as blistering the horse's shoulder.
- speaker: Respondent
  text: In 1879 father sent me and myself down to Waco to place me in Baylor University, paying my tuition with a load of
    bacon we took with us. I went home for the holidays, so happy with so much to tell, then I returned.
- speaker: Respondent
  text: The first of January I rode horseback to Waco and on arriving I turned the horse loose with a note pinned to the saddle
    saying 'Please let this horse with saddle pass to farm of Air B.B. Wood unmolested'. Three weeks later father came down
    and said the horse had not returned and on making inquiry we found him in East Waco, just as he had left.
- speaker: Respondent
  text: In the summer father sent me to Indiana with horses we had bought in Mexico, we had 117 head. We went down Jackson's
    trail and came to a house where we camped that night. I had some corn for the horses, and found an old man just returning
    from a drive with a big back. I traded the corn for a whole ham of the back, carried this to camp and with a long pole
    passed through the tent-string, I barbecued it and today I can say it was the best barbecue I ever ate.
- speaker: Respondent
  text: We cooked at the camp and made clothes out of wagon sheets that served us well, but they sometimes became so full
    of grease and dust they almost stood on end after being removed. I recall the night after the heavy snow I mentioned when
    the cattle froze. I could not find my socks and shoes while trying to make the fire so had to proceed to a neighbor, by
    name Jane, barefooted. When we returned home Jane made me wear her stockings and shoes, after giving us a lovely dinner.
    Long afterward when I was practicing medicine I often reminded her of her kindness in lending me her footwear.
- speaker: Respondent
  text: This also reminds me of the fate of our stock of oxen which brought all from Alabama. We would hobble them at night
    together so they could not stray far from camp. One morning when we found them they were both dead from eating frozen
    mustard. Oh, how sad we were and lonely with Buck and Bill gone, what shall we do was our cry.
- speaker: Respondent
  text: Father made the best of our hard luck and said 'we will skin them and buy coffee' which we did, and things took a
    turn for the better.
- speaker: Respondent
  text: Another time my father was out of town, it was 25 miles to the nearest market, Mexia, I had instruction to start to
    town but if I met anyone who had any tobacco to ask for some, I met another old-timer and neighbor, Bill Powell, and secured
    an abundant supply and thus through the neighborly kindness was saved the trip.
- speaker: Respondent
  text: Time passed on and I completed my course at Baylor University at Waco Texas, taught a year then attended my father's
    Alma Mater, the Jefferson Medical College and completed my course there in 1887. I graduated from Baylor in 1885. Afterwards
    took postgraduate work in the New York Polyclinic, in the New Orleans Polyclinic and two courses in the Chicago Institute
    of that class.
- speaker: Respondent
  text: In January of 1910 our firm of Wood and Wood purchased the property of the Hubbard Hot Well and sanitarium, which
    represented the investment of thirty-five thousand dollars, and at the time was one of the leading health resorts of the
    state. As all of the medical profession, I have stored in my memory many a missing incidents connected with my profession.
    One of the most impressive incidents was when I first commenced the practice of medicine and meeting an older doctor in
    consultation, a man whom I loved honored and respected.
- speaker: Respondent
  text: After discussing the case before as he said 'I would give him this and that', remedies for the particular case, to
    which I consented; then I suggested something else to meet another symptom. The old doctor said 'No, we have given him
    enough let's give him a chance to get well'.
- speaker: Respondent
  text: 'I recall another instance which impressed me in one of my patients. He had a malignant type of trouble and I told
    him so also that it was unnecessary for me to call every day, but he insisted and his good wife always had the best of
    eats, snob fritters, chicken, steak, peas and cakes, with something hot to drink. The minute she entered with a platter
    of these eatables he would begin: ''Mollie I am a very sick man your immunity takes my appetite''; then I would try to
    go and he would say ''I do love to see you come and to see you go'', but I thought it time to go.'
- speaker: Respondent
  text: One day he said 'Bring your bill tomorrow, I want to see you paid before the triggers fall, you know I have some sons-in-law!'
    I knew them and decided to present my bill as requested. Once before he insisted on paying me with twenty-seven pigs and
    said 'You know that a man with twenty-seven pigs and nothing to feed them is broke', and convinced me it was my duty to
    accept the pigs.
- speaker: Respondent
  text: I married on the 4th of April 1888, Miss Nina Lynn Jameson, a daughter of Dr James who came to Texas from Georgia.
    We lived at Hubbard, where I practiced medicine with my father until our children were ready to enter college. It was
    with a feeling of sadness that we left this little town of good people which had been our home for so long.
- speaker: Respondent
  text: Our children are Nina Lynn Wood Friley (deceased). She died of Influenza at College Station, Bryan, Texas in 1918.
    Her husband was Chas. E. Friley, who is now President of Iowa State University at Ames Iowa. Our other daughter was Sallie
    Byrd who died at the age of four years.
- speaker: Respondent
  text: My sons are William Maxwell who is in the livestock business at Gallup New Mexico. James Kenneth Wood and family of
    two children, Kenneth and Lydia Lynn, live at Corsicana, he is in the investment business. David Eason Wood and wife Cecil
    live at Shiro and both are teachers. Eugene Carroll Wood lives in Seattle Washington and is a lawyer. Walter Putnam Wood
    lives in Waco and is in the investment business.
- speaker: Respondent
  text: In 1904 to lessen my expenses and place my children in Baylor University I sold out my Sanitarium and other holdings
    at Hubbard and moved to Waco, Texas, where I am now living. When the World War included our country and the army camp
    and base hospital were located at Waco, there were around fifty thousand soldiers at one time. During the winter the influenza
    epidemic was raging and civilians and soldiers alike were dying like sheep.
- speaker: Respondent
  text: We held a medical convention and discussed what steps could be taken to reduce the death rate. We had a regime prescribed
    by one of the army men, but it did not stop the epidemic.
- speaker: Respondent
  text: At the meeting I could not keep silent and arose and said 'It is not customary to digress from the visiting doctors
    prescribed treatment, but if I am allowed the privilege of speaking, if you will open the doors and windows and give them
    plenty of fresh air, I will be responsible for the reduction of the death rate.' There were cries from all over the house
    of 'Amen, Amen'. The suggestion was adopted and after the treatment was changed in favor of fresh air, the death rate
    began to subside.
- speaker: Respondent
  text: In the year 1914 I attended the American Surgical Convention which met in London, my wife accompanying me. We boarded
    the Celtic, leaving New York and arrived at Cherbourg France our first stop. I had a peculiar experience on the vessel.
    My friends had filled my valise with good cigars to enjoy on the trip before arriving in France we were advised that we
    should pass our smokes around to our friends on the boat because the duty on that was so great that it would be prohibitive
    to smoke American tobacco abroad. I did not like the European tobacco so I quit smoking and have not done so since.
- speaker: Respondent
  text: When we arrived in Paris the mail carrier at our hotel brought our mail and said; 'I bring you greetings from home,
    I hope it is good news'. We later learned that this was the only English that he could speak.
- speaker: Respondent
  text: After seeing France we went to Vienna, and in crossing the Danube river, a man with a megaphone called out to us to
    look to our left and see the Sarcophagus that tomorrow would contain the remains of Ferdinand and Sophie who were murdered
    at Sarajevo. And this is said to be the cause of the world war.
- speaker: Respondent
  text: The next day we proceeded to Vienna to the hotel, after driving for some time in a taxi, I inquired of the driver
    as to the extent of the trip. He advised me that he was making a circuitous route of fifteen miles to avoid contacting
    the Royal Funeral, to be held at midnight. I told him not to carry us to the hotel but let us see the funeral. He drove
    us on and put us out just in front of the procession which contained two hearses, one for Ferdinand and the other for
    Sophie, followed by Francis Joseph, the Emperor.
- speaker: Respondent
  text: This was the first time we realized that war was impending, for Francis Joseph constantly remarked to his subjects
    on either side, 'I was in hopes that I would be spared seeing my people thrown into another war'. The city was in total
    darkness, as was the custom at Royal Funerals. Only long torches were carried by the footmen who were guarding the two
    hearses. The Americans were restless and of course began to whisper, but were hushed immediately by the crowd.
- speaker: Respondent
  text: It was not long thereafter until someone else began to whisper and again the crowd signaled to us to hush. We were
    so impressed by their loyalty that we remained silent from then on during the procession, it was so quiet that one could
    almost have heard a pin fall. We could not but respect them for their loyalty. Much the Americans could learn from them.
    We stood for three hours as the procession passed by. After it was over the lights were turned on and one.
