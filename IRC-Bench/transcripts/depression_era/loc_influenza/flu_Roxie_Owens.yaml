collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Howdy. Patty Rose, go get ass Smith a glass of cool buttermilk. It's just been a-churning and the milk is good and
    fresh. I guess I'll be making butter the rest of my life for my family is so big I have to keep all that cream I can to
    keep children in butter. Bess is a good cow and I don't know what I'd done without her, for many times we'd only have
    bread and milk gravy for our meals. Patty Rose here is one of the smaller ones. Yes, ma'am, we have 15 children but with
    all of my troubles, the Good Lord has blessed me too.
- speaker: Respondent
  text: I went to work in a hosiery mill in Winston when I was 14 years old. Lo and my sister, who was eleven then, went to
    work and we made pretty good money too. I got paid every two weeks and I remember I was paid a $10.00 gold piece, some
    old ones and some silver in it. I wanted to keep it so much for it was so pretty but had to give it up for my board and
    keep. Sister is still working at the same mill. She has been there 51 years now.
- speaker: Respondent
  text: We used to walk to work, and one day we missed a gang of men working on some electric line. There was a real good
    looking boy in that gang and every morning we passed them he would sort of smile like. I wished I could meet him and sure
    enough I did, for one of the girls who worked next to me in the mill knew him and she introduced us. I believe John and
    I fell in love all at once, for we started going together really at the first.
- speaker: Respondent
  text: Pa's birthday was soon, and we children wanted to give him a party on a Sunday, so I invited John to go along with
    Sister and I to home. That Sunday was the happiest day, I shall never forget it. Thirteen months later we were married.
- speaker: Respondent
  text: John was a fireman and made about $2.00 a day. That was good money then. We found us a little cottage and furnished
    it with new furniture. I worked till we got the furniture paid for, and then I quit for my baby was coming along then.
    Little Julie was born nine months after we were married. John and I was so happy in our little home and with our new baby.
- speaker: Respondent
  text: One day when our baby was a few months old, I heard a car stop out in front of the house. I got up and went on the
    porch. There were two strange men in the car and it looked like somebody was lying on the back seat. One of the men got
    out and opened the back car door. I was so scared I couldn't speak. I saw them take John out of the car. I just knew he
    was dead. They brought him in the house and helped him in there bad. Then the doctor came. He was there for the company
    sent after John fell. The doctor said he was hurt right bad but he'd be all right soon. You see, he pulled a ligament
    in his back and it bothered him up till their time of death.
- speaker: Respondent
  text: After John got up we wanted to move to the country. John's mother had a big farm about 30 miles from Winston. We helped
    her farm for six years. Van, almost, and Harvey was born at John's mother's. Van had scarlet fever and was mighty sick
    and bright disease for two years after.
- speaker: Respondent
  text: We wanted a place of our own as the little ones was coming fast, so John went in debt for this place. It has 40 acres.
    My husband cut and sawed the lumber for their house and built it only with a little help from us at that time. I aimed
    to add on to the house but it just soon like we never could do it because of sickness and one thing and another. Clarence
    was born that spring. He was a good baby. John started our crop and plowed up our garden for I was going to take care
    of that. I planted some cabbage and wanted to plant some onions too. I went over to a neighbor's house and she sold me
    some onion sets.
- speaker: Respondent
  text: He measured them out of an old bucket that was under a cart inside. I took them home and started setting them out.
    Sometimes Harvey was a-walking around. I went after four for some onions to eat. I gave them some and went on to my planting.
    Shortly soon, two boys was sick and vomiting something awful and nothing I did could stop them. I sent Julie to get the
    doctor in a short time he was at their house. Dr. White got that. I was most scared to death for Harvey stiffened out
    and I thought he was dead. The doctor had to prise this in the boy's mouth to give him some medicine. He said he had to
    get there in time or else Harvey would have died in about 30 minutes. You see, the boys pawned by the parts green left
    in the farm the year before. My neighbor was awfully upset over the children being sick but she said she didn't think
    about her young ones eating those onions.
- speaker: Respondent
  text: I guess you remember the flu epidemic back in 1918, I believe. That's one thing that just fell here about that time
    and everybody was so afraid of it they would not come in the house but would call out in the yard and put food on the
    porch for us. Virgil was born that year and I took the flu when he was three days old. There were two oldest children
    didn't have it but they were too small to do anything. All was awful sick but I managed to make it up and did as much
    for the children as I could. It's a wonder I didn't die and I've been not strong ever since. John had it worse than the
    rest of us and I wasn't able to work any at all the next year.
- speaker: Respondent
  text: Dale was born near Virgil and I was sick a long spell. Rheumatism set in so bad I couldn't walk for a long time. Soon
    I was better but I had a nervous breakdown. It was fall then before it was time to be up and about. It wasn't long before
    I knew I was big again and Pearl was born the next winter. Before I quit nursing her, Winnie Ruth came along and I had
    to have a doctor with me at that time. I always had a midwife but my health was bad and I didn't get along so well with
    her either.
- speaker: Respondent
  text: Then Pearl was two or three years old we went to see my brother. Brother Joe lived on a farm like us and he dug herbs
    to sell. There was always a bunch of them drying around their place. He made good money those days selling herbs but you
    can't make much selling them nowadays.
- speaker: Respondent
  text: The second day we were there about dinner time, Pearl and Dale came in and said they were sick. They were vomiting
    and acting just like the time Ernest and Harvey got poisoned. Both of them were too sick to tell me what they had been
    eating. John went after the doctor as fast as he could and when he came he had to work over them for a long time. When
    they got better, so as to talk, Pearl said they had chewed some of Uncle Joe's tobacco which was lying out there on the
    table in the yard. Brother Joe had dug up some poke root and was drying it to sell. Thinking it was tobacco the children
    took a chew of it. They got well in a few days though and I was mighty happy to see them running and playing again.
- speaker: Respondent
  text: When Billy was a wee baby, Julie was about grown and she took off one day and got married. I hated to see her leave
    me for she was so much help, helping me with the baby.
- speaker: Respondent
  text: Billy was two years old when Betty was born. Our house was so crowded with all the babies coming so fast. We just
    couldn't get enough money ahead to pay off our debts and build onto our house.
- speaker: Respondent
  text: Well it seemed like something was always happening to our family. It was just one thing or another. Ernest was a big
    boy and he kept fussing for a gun but John, my husband, wouldn't let him have one and then we didn't have no money to
    buy one. But Ernest was so anxious for it, that he got some parts from old guns that other boys let him have and made
    him one for himself. It would shoot real good, too, and he kept us in rabbits and squirrels. One morning just before Thanksgiving
    he went off to the woods to get rabbits. He wasn't gone so long before he was back again and when he was coming up the
    path I noticed he was holding himself like he was carrying something awful heavy. I couldn't understand what it was he
    had killed that was making him walk like that but when he got closer to the house I saw he was dragging his foot and his
    side was all covered with blood. I got there as fast as I could and put him to bed. One of the children ran to my neighbor's
    and got him to go for the doctor in his car. Ernest was so weak because he lost so much blood that when the doctor came,
    he put him in his car and took him to the hospital in Elkin. I went, too, and stayed at the hospital while they took pictures
    to find where the bullet was. They said they had to operate to get it out. The doctors cut in his side, but when they
    got inside, they couldn't find it. Then they operated on his back, and still they couldn't find it, but it's there yet
    because I saw it in the picture.
- speaker: Respondent
  text: We had a little money saved up then, but it took all we had to pay the hospital and doctors, and then there wasn't
    enough. We've never been able to pay it yet.
- speaker: Respondent
  text: John got sick right after that. He had high blood pressure and a large heart and kidney trouble. He couldn't work
    much but would tell the boys what to do. That was in the winter of 1932 and 1933.
- speaker: Respondent
  text: We had twelve children to home and with so many mouths to feed and sickness and all, we got in debt good and plenty.
    We were afraid to ask for more credit and we didn't have a cent to run us either. Our wheat and corn had given out and
    of course, that meant we couldn't have bread. Somebody told us about the Relief people in Yadkinville and I went down
    there and asked for some help till we could get on our feet again. They were mighty fine to us and sure did provide that
    fact. The farm didn't have nothing at all. We couldn't even send the children to school for they didn't have clothes to
    wear. That was a terrible winter and then I was getting big again. Ruby was born the next spring. My health was bad and
    John was still unable to work.
- speaker: Respondent
  text: 1934, we lost them. Lord only knows. He was the only one of our boys that gave us any trouble. He went to running
    around with some of the boys that were tough and didn't have a good name. John tried to make him stay to work but boys
    his age wouldn't listen to their Pa's word. They thought they knew better than anyone. So one night this gang broke in
    a house. Van stood on the outside and watched. The whole bunch of boys got caught, none had any car to get him out of
    jail, so he had to go on the roads. He had to take a gun and all made a man out of him. They let him off after he stayed
    on the roads four months, cause he was a good boy. He had six months. He learned his lesson because then he was only in
    trouble.
- speaker: Respondent
  text: When he was old 22, he went to serve and stayed there till their money ran out. He had an honorable discharge.
- speaker: Respondent
  text: Patty Rose was born next and Glen Vera.
- speaker: Respondent
  text: It was when Patty Rose was born, you was our caseworker. You remember giving me that order for bad clothes and dishes.
    We didn't have snuff plates so we could all eat at once. I'll never forget what you and the relief did for us.
- speaker: Respondent
  text: I was sick a long spell after Patty Rose was born. John was good to me. He was one of the best men anywhere. Every
    morning he went out and prayed before he went to work to the Baptist or Pentecostal Holiness church. I still see them
    every Sunday I go.
- speaker: Respondent
  text: When Verdie, our baby, was 11 months old John was taken bad sick and had to go to the hospital. Fourteen days later
    he died. He didn't have any insurance but burial insurance and it wasn't enough to pay all the expenses. I owed them $44.00
    after. I put John away nice and quarter hurt lost flowers. He had been so good to me and the young ones felt like they
    couldn't do enough for him. We had his funeral at the church and the friends were all there. The choir sung lots of hymns
    and the preacher talked so nice about my John. It was a funeral.
- speaker: Respondent
  text: People wanted me to put the young ones in a 'sylum but I couldn't give them up. Me, I had to give up John.
- speaker: Respondent
  text: John had three good fox hounds so I sold them for $30.00 and gave every penny for the undertaker. I aimed to pay over
    the cent I owed for John's funeral and I did. I don't owe them worth a cent at all now.
- speaker: Respondent
  text: We had a good crop last year. The best we ever had I believe. I nearly got out of debt. After paying the fertilizer
    bill, I had $44.00 left. If I have a good crop this year I can get out of debt but I'm afraid their crop ain't going to
    be so good.
- speaker: Respondent
  text: Clarence was at the army 11 months. He is the best one of my boys I ever took on any kind of work before anyone else.
    Once when he was in New Jersey his Lieutenant wrote and sent alarm money for his bus fare. I sent him a dollar but Clarence
    came home before he got the money. When he got us to camp he sent the $41.00 back to me.
- speaker: Respondent
  text: Harvest period soon after John died. He went to Virginia and got a job in a week making $25.00 a week. Van sees his
    site are living there too, and he works at the same place where Ernest does. He makes $480.00 a year. He has one little
    baby and I wish I could see her. She's real cute and smart too. Last week Clarence went to Virginia for they had a job
    for him too. He is coming back home Sunday after his automobile. He isn't married yet but I guess he'll be soon as he
    makes enough money to make a wife. John taught all their boys how to work on cars. We had an old one here for a long time
    and they were forever tinkering with it.
- speaker: Respondent
  text: The older children didn't get much learning when they were little, but I make their younger ones go every day unless
    the weather's too rough. I tell them education means a lot to people nowadays. Only my third through fifth grade. John
    didn't go at all. When we were married he couldn't even write his name or count. I taught him all I could. He was real
    intelligent and learned good.
- speaker: Respondent
  text: Yes, ma'am. Paul and Harvey are married but Paul ain't living with his wife. He's a sweet little thing but Paul is
    sort of hernmsomwuk like and ain't amenable to settle down.
- speaker: Respondent
  text: There ain't but nine children to home now. But when Dale comes there'll be ten of us here. I get fifteen dollars a
    month for the little ones under 16, that's six of them. It helps a lot for it keeps my grocery bill paid up most of the
    time and sometimes I manage to get a dress for myself or for one of the young ones.
- speaker: Respondent
  text: My health ain't any too good now. I have gall bladder trouble and I'm having all my teeth pulled out.
