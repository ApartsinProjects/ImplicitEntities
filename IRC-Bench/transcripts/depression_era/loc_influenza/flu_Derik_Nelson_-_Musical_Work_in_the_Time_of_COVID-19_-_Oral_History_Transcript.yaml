turns:
- speaker: Interviewer
  text: Derik, where are you at?
- speaker: Respondent
  text: I am actually, coincidentally, also in Olympia, Washington. We got some hometown love here.
- speaker: Interviewer
  text: Nice. That's awesome. Are you just up visiting, or are you actually hunkered down here for a little while?
- speaker: Respondent
  text: No, I'm hunkered down here. I moved back here about three and a half years ago from LA to start a touring project.
    My family's based up here, so it made sense to move my company and work from here in Olympia. I love it up here.
- speaker: Interviewer
  text: Nice. Me too. Great city. Sweet. So, basically, today we're going to be talking about being a musician, being a musician
    pre COVID-19, what you're currently doing, and what you think the music scene is gonna be like or things that we can maybe
    expect post COVID-19. We're making an oral history for the future ages to look back and be able to hear what - what musicians
    that were doing. So, tell me a little bit about yourself. Just tell me when and what got you into music.
- speaker: Respondent
  text: I have always loved music. I was always singing and wanting to be on stage as a - as a little kid, as early as seven
    or eight years old. I started playing saxophone in fifth grade, took private lessons with none other than Mr. Brad Schrandt.
    (Brad laughs) And that really opened up a new - a new layer of music for me, and, especially early on, in those formative
    years, that was really pivotal. The thing was I loved playing saxophone, but I also love to sing and you can't do both
    at once. So I started - I started playing guitar and was self taught on guitar. That led to piano. I was self-taught on
    piano and guitar and started trying to wrap my ears and hands and body around as many instruments as I could as my love
    for music grew. By the time I was fourteen, I - for my fourteenth birthday my parents got me an all-in-one sixteen track
    digital recorder.
- speaker: Interviewer
  text: Oooh, nice.
- speaker: Respondent
  text: It came with a CD burner in it so you could mix your entire song and then burn it straight to CD. That was like -
    that was my world. Some kids would come home and play Nintendo and play video games and watch TV. I came home from school
    and disappeared into my headphones trying to figure out how I could layer all of these different sounds that were in my
    head on top of themselves. That was like - that was my thing. That is what made me tick.
- speaker: Interviewer
  text: Oh, right on. That's awesome.
- speaker: Respondent
  text: That really encouraged me to have some - like a color palette, if you will; a blank canvas to write songs from. There
    were these stories that I was telling, being these characters and musicals and stuff on stage. We grew up as kids doing
    musical theater in the local community. I loved it, but what I loved most about it was just the storytelling aspect of
    being on stage. When I really started to analyze that I was way more excited about figuring out how I could write and
    tell my own stories and that delved directly into songwriting. So these chords that you were showing me on guitar and
    that I was learning from Kenny Loggins books, you know - suddenly trying to figure out how to play these chords would
    turn into alternate ways of hearing things and using my limited vocabulary at the time of different guitar chords and
    piano chords to develop my own writing style. My earliest songs were written at fourteen about how I viewed my life and
    the world around me and my crushes on girls in my eighth grade math class. I did my very first CD in my bedroom. That's
    how everything got started for me.
- speaker: Interviewer
  text: Nice. That is awesome. When did you start thinking that being - maybe being a professional musician was something
    that you could pursue and wanted to pursue?
- speaker: Respondent
  text: I was - let's see. So that inspired both - or, not inspired, but occupied - most of my high school experience was
    learning how to navigate this whole persona of wanting to be a singer-songwriter. There was obviously a lot of influence
    from musical theater and from jazz and from all of these different pieces of - of music inspiration that I was surrounded
    by. That was kind of a process in trying to find myself, and the thing that I kept coming back to was this - this love
    and this passion for wanting to write music and perform music, and I loved singing. It seemed like playing these different
    instruments, having my own voice as a singer, and as a writer, was the thing that was tying it all together. So that's
    what I wanted to pursue as far as considering college. At the time, being 17 - I have a very close relationship with both
    of my siblings, my older sister and my younger brother. My sister, Riana, was at the University of Michigan at the time
    for musical theater. I knew that I didn't want to study musical theater, but I also knew that I didn't want to be away
    from her. At the time, I just don't think I was really honestly ready to be on my own and leave that feeling of home.
    So, that felt like a safe choice to say, Oh, I'll look at the University of Michigan and see what sort of programs they
    have, and found the Performing Arts Technology program, which included a lot of computer programming, sound design, recording
    arts, and, it felt like, If I'm going to study something and get a college degree in something, I want it to be something
    that's going to challenge me further than just vocal performance. So I applied, was accepted, did a minor in jazz studies
    as a singer and went to Michigan. It was the only school I applied to and - primarily because I think deep down I wasn't
    ready to let go of this idea of home and it felt like a safe choice to go be with my sister at Michigan. So now I'm in
    my first - my first semester and realizing that part of the curriculum dictates that freshmen and sophomores need a certain
    amount of training in the lab first before you're doing any sort of classes in the recording studios. And when I toured
    the school and seeing all of these amazing recording facilities, I was so eager and so excited about, When can I get into
    those. Now getting there and being like, Wait - two years until I have to - go plug stuff in and record stuff and - ?
    So that was - it just felt a little bit anticipatory in a way that I was - my eagerness overshadowed my willingness to
    be patient and learn the things that the curriculum dictated I learn. So it was an amazing first year. I took music theory,
    musicology, basic music classes, basic recording arts classes. But there was most of my time that was being spent behind
    a computer, programming music instead of on stage performing music or in a studio writing music. And that's where I really
    wanted to be. So, by the end of the first semester, I was really feeling this disconnect. Because I was also involved
    in a lot of jazz classes, I had the opportunity to study with the late great Geri Allen - incredible pianist. She really
    opened my eyes to improvisation and - especially coming in as a singer, young singers notoriously have a reputation for
    not being able to count, not knowing where one is, not real behavior changes (Brad laughs), all of which I was extremely
    guilty of (laughs). So, she really opened my eyes to improvisation and, especially as a singer, that - something clicked
    in me where that was yet another layer that was added to my - my canvas. My canvas just got even bigger for the kind of
    music that I wanted to play and write and be a part of. So I traveled with the jazz band to New York City for the IAJE
    conference back when that was in existence. Unfortunately, it's no longer but - the International Association for Jazz
    Education, I believe. That was yet another pivotal moment where it was my first time really in a - in a major city that
    wasn't Seattle. I was performing at open mics, and casuals, and jam sessions, and meeting talented musicians from all
    over the city and major guys that were in the jazz world. That really was - it lit a fire in me, and I came away from
    that weekend - long weekend with business cards and connections and ideas and motivation and this urgency and this momentum.
    I felt like, Wait a minute. My parents are generously helping pay for this education in Ann Arbor, Michigan, a small,
    wonderful little small town. I just went to New York for a weekend outside the confines of any sort of university setting
    and was able to rapid-fire make connections, build momentum towards a career. That really caused me to - I kind of shut
    down, to be honest with you. I shut down and was like, What am I doing with my life? I'm eighteen, I don't know if I did
    the right thing. I think I played it too safe by following my sister to college, and I'm in a program that I don't think
    is right for me. I think I need to do something different. That was the scariest situation because I felt like I was letting
    my family down. I felt like I was letting my parents down who had just generously provided this opportunity for me to
    be in my first year of college. So, on my own, I was researching other universities and other programs in major cities
    that might be a better fit to be able to hit the ground running and not wait until I had graduated from college in order
    to start my career. I wanted to give it all I had and go all in on this dream of writing music, playing music, singer-songwriter
    guy, and not wait. So, that's what I did, and luckily my family and my friends and my instructors and teachers - they
    supported me in that. I transferred to the University of Southern California in Los Angeles, and, no disrespect to Michigan,
    other than football, of course (laughs), but it was the best decision I ever made and a decision that changed my life,
    and that was the pivotal - the pinnacle pivotal moment that I knew that I was going all in on this - on this dream.
- speaker: Interviewer
  text: 'Nice. Then let me ask you this: what did you do, or what was your first experience where you were like, I think I''m
    making it - I''ve made it? I guess I''d say, what did you do or when did you feel like a professional musician?'
- speaker: Interviewer
  text: 'The question is: what or when or what did you do that made you feel like, "I think I''ve made it I''m - I feel professional"?
    You know, there''s always that - I guess, the level of like, Oh, this is working for me. My decisions have paid off and
    now I''m doing it. I got my theater gig, or I got my paycheck coming in, or what did you - What was that like for you?'
- speaker: Respondent
  text: It's interesting. It's always a series of steps and I think no matter who you ask in the art or music community, when
    you ask the question of like, So when did you know that you were, like, successful? It's like - I am? (/a ughs) So, there
    was a lot of little moments along the way and us, being creative types and goal-oriented artists who always want to continue
    pushing ourselves and our boundaries of what we're capable of, that ceiling is always increasing. That's been a trend
    in my life, for sure, but I would say there was a moment during my collegiate career at USC, that I was seated at a table
    wearing a tuxedo next to Brian Wilson of the Beach Boys and Lamont Dozier - great, incredible songwriter. And I was about
    to be honored with the Brian Wilson songwriting scholarship. That was like a "Pinch me" moment, where I'm having - I'm
    having dinner with Brian Wilson and Lamont Dozier and talking about songwriting. To feel included by heroes of mine in
    my field in that way was like, Oh my god. I couldn't even believe it. So that gave me some validation that, Okay, maybe
    I - maybe I have the talent, maybe I have the tenacity, and now, do I have the creativity to figure out how to - not rely
    on how hard working and how talented I am, but how creative I can be, how flexible I can be, to be able to adapt and follow
    this path of - of independence towards combining helping others and doing the things that I want to do? How does that
    path - how does that converge?
- speaker: Interviewer
  text: 'That''s good - the "pinch me" moment, for sure. Sweet. Let me ask you this: what was the music scene like when you
    first started playing professionally? I mean, when you''re like, Okay, I''m working I''m at work - what was the scene
    like or the environment in which you were participating in?'
- speaker: Respondent
  text: Especially moving to moving to LA, we - I put a band together, and that was the first time I ever really played with
    a band. We started playing all over campus and built up some notoriety around the - the USC community. We were playing
    campus festivals and events and fairs and some of the major venues and stuff on campus. Then we gradually were able to
    bridge the gap out into LA and Hollywood. We played downtown. We played the Sunset Strip, sold out the Troubadour - that
    was like a major validating feather in our cap as far as being in college in a band, and you get to play the Troubadour,
    and people actually show up, and on top of that, there's a ton of people there!
- speaker: Interviewer
  text: That's it, right? That's, like, I've made it.
- speaker: Respondent
  text: Yeah. Again, we're talking about "pinch me" moments that feel like what is your definition of success and making it
    and there were these - these little moments along the way that just fueled the fire and kept me inspired and - and objectively
    held me accountable towards continuing on this path. As far as what the music scene was, like -
- speaker: Interviewer
  text: Was it competitive?
- speaker: Respondent
  text: It was very competitive, and especially these - these LA venues. I'll tell you an embarrassing story because we have
    to talk about the mistakes that we've learned along the way. My very first gig I ever played in Hollywood was at the Key
    Club, a famous venue on the Sunset Strip. I was working with a promoter that one of my classmates was doing an internship
