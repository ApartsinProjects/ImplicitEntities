collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Can you tell me about your father's background and how he came to Old Town?
- speaker: Respondent
  text: My father lived on a farm in Canada. He came to Old Town from St. Herbert, Quebec, in 1865. The first place he worked
    was in a sawmill in East, that was owned by an American, Samuel Yeasts, who built the old Veasie Railroad between Nor
    and Old Town.
- speaker: Interviewer
  text: What was the area like when your father arrived?
- speaker: Respondent
  text: The railroad ran along what is now Perkins Avenue. The road was about twenty feet higher than it is now when the railroad
    ran there. It was much narrower at the top and wide enough only for the rails. The rails in those days were known as strap
    rails, made of wooden timbers with strips of iron nailed to the tops. After the rails were taken up, they cut down the
    roadbed to its present level and filled in around that part of town where you live, south Brunswick Street. That used
    to be low and swampy. Down where my father lived on Pine Street, it was practically in the woods. There used to be drifts
    down here some winters fifteen feet high, and the only way they could get uptown was to use skis or snowshoes.
- speaker: Interviewer
  text: Did your father speak English when he arrived?
- speaker: Respondent
  text: Father couldn't speak English very well when he landed in Old Town. The French Canadians never had any trouble getting
    jobs around here, though. There were a lot of French to talk to then, and a lot of the bosses were French. They got $1.50
    a day in the mills in those days, and they had to work fifteen hours a day.
- speaker: Interviewer
  text: Were there any labor organizations or societies for the workers?
- speaker: Respondent
  text: There weren't any lodges or societies around here then, not for the French anyway. After a man had worked fifteen
    hours a day, all he felt like joining was a mattress. There was no labor saving machinery in sawmills then; all the work
    was manual.
- speaker: Interviewer
  text: How did the sawmills operate back then?
- speaker: Respondent
  text: Nowadays logs are fed to the saws by automatic feed rolls, but in the old time sawmills they had to be pushed by hand.
    To save effort, they had to set their sleds against the spuds and push for all they were worth. They used rotary saws
    to cut dimension lumber like 2x4s and 4x4s, and gang and single saws to cut boards. The single saws were also known as
    muleys. The gang saws and the muleys were vertical saws that ran up and down. They were moved by a wooden arm and crank
    arrangement that got its power from a water wheel.
- speaker: Interviewer
  text: What kind of lumber did they produce?
- speaker: Respondent
  text: The lumber they sawed in those mills might have been used anywhere across the road or across the ocean. It was sold
    to anyone who wanted to buy it, no matter where he was located.
- speaker: Interviewer
  text: What was life like for the workers in terms of wages and living expenses?
- speaker: Respondent
  text: The people who worked fifteen hours a day in those sawmills had little time or inclination to plant gardens, as you
    can well imagine. Twenty-five or thirty years later, when they had to work only ten or twelve hours, they began to mine
    small garden stuff. Wages were low then, but so were living expenses. You could rent for from three to five dollars a
    month. $2.25 paid for a cord of four-foot wood, or you could go out and cut stumpage for 35 cents a cord. You could get
    a barrel of flour for three or three and a half dollars, and a quarter of beef pork at four and a half cents a pound.
    The way those fellows did was to buy a lot of provisions to last them through the winter, and if they didn't want to go
    to the woods, they could sit back and smoke their pipe until spring with the chance they could go to a job.
- speaker: Interviewer
  text: What about health and diseases in those days?
- speaker: Respondent
  text: The diseases they had in those days were about the same as we have now, but the doctors had different names for them.
    Appendicitis used to be called inflammation of the bowels, and if you got that there was little chance for you. Doctors
    have more knowledge now than they formerly had, and we don't have the severe epidemics of cholera and black diphtheria
    that used to carry away so many. For instance, Mortier, who used to live over here, lost six children in a week because
    of black diphtheria. There was an epidemic of smallpox in Old Town forty years ago. They had a pithouse out where the
    old trotting park used to be. The last epidemics of contagious diseases that we had here occurred about the time of the
    influenza epidemic during the World War. There weren't a great many deaths then, but it's safe to say that if it had happened
    sixty years ago, ten times as many people would have died.
- speaker: Interviewer
  text: Can you tell me about the church and religious life?
- speaker: Respondent
  text: That church on Water Street was moved up there from Great Works in 1870, and that was all of ten years before Father
    Trudel arrived. Father O'Brien was the priest in northern Maine. Father Oullette said he thought there was an Irish priest
    there about that time. Nicoll and Aspet were two other early priests. Old Town had more than one parish to look after.
    Sometimes they had to go as far as Houlton. Father Trudel did it, too. It was Trudel who built the piece on the front
    end of that church. He christened me, too.
- speaker: Interviewer
  text: What about your schooling?
- speaker: Respondent
  text: If that convent had been there when I started to go to school, my parents would probably have sent me there, but that
    place was put up only fifty-four years ago. I was one of the first scholars there, but I attended it only two years. By
    that time I had graduated from the grammar grades.
- speaker: Interviewer
  text: What did you do after leaving school?
- speaker: Respondent
  text: After I left school I worked on the boom until it closed in the fall. That was in 1887. I rafted logs all summer for
    fifty cents a day. A boom is a long line of logs tied or chained securely together end to end. The ends of such a boom
    may be tied to piers or to some point on the shore. A boom like this might have fifty different uses. It could be used
    to guide logs toward a mill pond, or to keep them from drifting away after they got there. However, when people used to
    talk of working on the boom, they didn't mean a line of logs like that. By the way, a 'main boom,' or double boom, was
    made of two lines of logs wedged together so that a man wouldn't have to be an expert to be able to walk along it. A boom
    that ran along the shore was called a shore boom or short logs.
- speaker: Interviewer
  text: How did the boom operate?
- speaker: Respondent
  text: The boom at Pea Cove was operated by the Penobscot Log Driving Association. Logs were floated downstream from the
    woods during the spring drives and trapped in a jam at Pea Cove. Those logs were all marked with the owners' special marks,
    and the job at the boom was to sort out those logs and raft the different marks together. The small joints were obtained
    in long rafts and floated down from the boom to the mills of the various owners. You might start downriver to Bangor with
    a long raft, but if some of the logs were for mills in Old Town or Orono, all you had to do was cut out the logs and shove
    them to the proper area to where they were supposed to rise.
- speaker: Interviewer
  text: What was a dingle?
- speaker: Respondent
  text: A dingle is a storehouse of meats and provisions. You start thinking about the hovel. The dingle was a kind of little
    store where tobacco, socks, mittens, thread, and stuff like that was sold. The storekeeper was also the clerk of the venoms
    and slept there, and there was always a sparse bank for the main boss. The clothes and the cookery had bunked in the cook
    room where the crew ate their meals. The blacksmith, the new filer, the sawyer, the head chopper, the storekeeper, and
    the sealer felt superior to the common woodsmen but if they were good fellows they tried not to show it. If a man was
    a good fellow, he was always respected no matter what he worked at.
