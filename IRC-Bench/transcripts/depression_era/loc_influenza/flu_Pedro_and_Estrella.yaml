source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: In another hour it will be 1939. After an all-day drive from Zacksaavill, Witte and I have arrived on the outskirts
    of Tampa's Latin settlement, Irks City. A fat red-faced man in overalls is standing in front of a bar, and I ask him to
    direct me to the address of wife’s relatives. He has imbibed too much to even understand my questions, so I thank him
    and drive on.
- speaker: Respondent
  text: We are on a dog track, which has drawn a large crowd. Two young Negro men are standing on the curbing, and I ask them
    for directions. Although well into intoxicated, they seem anxious to please and the directions they offer are so errant.
- speaker: Respondent
  text: Edith is impatient; she wants to reach her sister's house in time to celebrate the New Year with her. We soon locate
    the house, a dilapidated, unpainted two-story frame building, divided into raw apartments.
- speaker: Respondent
  text: A barrage of Spanish greets Edith as we go up to the porch, and there is much hugging. I am introduced amid vigorous
    handshaking. Children gather in front of the house, and in Spanish, I am told I am American. I sure look it, too. You
    can tell by looking at me. Estrella and her husband Pedro reside and have four children, two girls and two boys.
- speaker: Respondent
  text: We are ushered into the front room, which is furnished with a modern dresser, and an old iron bed neatly covered and
    topped with a feathered carnival doll. There is a calendar made well, and a framed card proclaims a message.
- speaker: Respondent
  text: There are no chairs, so we sit on the bed. We are not invited to make up after our trip.
- speaker: Respondent
  text: '''You still have to forgive our poor house,'' says Estrella. ''We used to have a nice place and fine furniture but
    it all got busted up. That one dresser is the only thing we saved out of the whole house.'''
- speaker: Respondent
  text: '''It just made us sick. Pedro was at work, the kids in school, and I was visiting with a friend. Then I came home
    and it was all burned. All our clothes and everything was gone and that''s why we haven''t got hardly anything now. Zeman
    who owned the house built it back again because he had insurance, but we didn''t have none because it cost too much.'''
- speaker: Respondent
  text: '''I know you used to have the nicest things,'' says Edith. ''Fine lace and tablecloths, everything handmade and just
    beautiful. Then I saw this house and furniture I couldn''t believe it. We were very well lived.'''
- speaker: Respondent
  text: '''I know. We had to have nice things I had been making and saving for a long time. After the fire Pedro went to his
    boss at the cigar box factory and told him how it was with us and asked him if he could borrow some money. His boss asked
    him how much and Pedro asked for twenty dollars and his boss gave it to him. That was nice of him, right.'''
- speaker: Respondent
  text: '''I worked for him a long time,'' says Pedro, ''he knows I pay him back all right. You want some wine? You like a
    sweet wine? I go get some wine, we celebrate the New Year.'''
- speaker: Respondent
  text: He leaps on his bicycle and disappears down the street. Estrella hesitantly puts on Edith's new fur coat. She stands
    before the dresser and turns at various angles, running her fingers slowly through the fur. 'It's sure is soft,' she says,
    'I don't guess I'm ever going to have no coat like this one. It seems that what you haven't got is what you always want.'
- speaker: Respondent
  text: '''You don''t need a heavy coat in Tampa,'' replies Edith, ''It''s too warm to wear a coat like that here.'''
- speaker: Respondent
  text: '''I sure would like to go to Key West to see mama,'' says Estrella. ''I haven''t seen mom in nine years. You know,
    when I''m working I can''t leave, and when I''m not working I haven''t got any money to go, so you see I don''t get to
    see her. How is mom now? I guess she is getting fatter than ever. I sent her a right pretty little lamp, like you set
    on the table, for Christmas. I wish I could have sent her something better.'''
- speaker: Respondent
  text: '''I think that was a nice present,'' Edith says. ''We wanted to send her a Beautyrest mattress for Christmas, but
    we just couldn''t afford it. Beautyrests cost thirty-nine dollars and ninety-five cents; we can get them for wholesale
    price, about twenty-five dollars, but we still can''t afford it this year. So I sent her three sheets instead. I know
    she needs sheets bad. I sure wish we could have sent her the mattress, because you know a mom is getting old and it would
    be nice if she could have a good mattress to sleep on. The Beautyrest company advertises "Spend one-third of your life
    like a millionaire." It''s too late for me to do that, but I wish she could at least sleep good for once in her life before
    she dies. I know it would make her feel a lot better.'''
- speaker: Respondent
  text: Mom needs teeth and glasses but it doesn't look like Mom ever saved up enough to get either one. She tries all her
    best to save enough to get them, but something always comes up and she has to spend the money. Nobody gets a break or
    another work stops, or something always happens. She has to eat soup and everything soft. Mom always liked to eat good
    food, too. And she liked to read all the time, but now she can't read or even listen to the news from Cuba over the radio.
    They say good news from home; they say everything by saying double meaning and everybody understands but the government
    met atop the broadcast rooms. They say everything double warning.'
- speaker: Respondent
  text: '''My kids would all like to live in New York, because of the headwall,'' says Estrella. ''In New York City there
    is no place for them to play and have a good time.'''
- speaker: Respondent
  text: '''You said that right,'' says one of the boys. ''When I was in 7th grade I try to the beach every day, but I like
    the schools here better; I have all good numbers except one. The score is tough. She told us: "If you don''t sit down
    I''ll knock you out of your seat." She''s tough all right. I have to walk twelve blocks to school every day, but I''m
    used to it by now.'''
- speaker: Respondent
  text: Pedro returns, leaving a loft on an unlabelled quart bottle half filled with wine. 'Come back to the kitchen,' he
    says.
- speaker: Respondent
  text: I pass through the second room, which is furnished with two iron beds, a straight chair without a back, and some old
    laundry. Clothes are hung on a cord behind the door. The kitchen is equipped with a three-burner oil stove, two unpainted
    wooden tables, and four chairs.
- speaker: Respondent
  text: Pedro pours the wine into glasses and drinks what is left from the bottle. 'You like some coffee?' he asks. We nod.
    The strong black Cuban coffee is soon made, and served in glasses with evaporated milk. A long loaf of Cuban bread is
    broken into pieces and buttered.
- speaker: Respondent
  text: '''You see I keep the bread basket up over the stove,'' Pedro explains. ''I throw little bits of bread over in there
    and then some weeks when money is scarce we take out those stale breads and warm them in the oven. This is good fresh
    bread; I got it this afternoon.'''
- speaker: Respondent
  text: '''We will have to hurry,'' says Estrella. ''In a few minutes it will be twelve o''clock and we have to go out in
    the street to see the New Year in.'''
- speaker: Respondent
  text: We finish hurriedly and go out to the porch. The greatest noise is made by the children who fill the street; some
    of them shout in English, Spanish, Italian, or in all three languages. Several firecrackers.
- speaker: Respondent
  text: '''Just a few more minutes,'' says Pedro.'
- speaker: Respondent
  text: Two blocks down the street the upper balconies of the Italian Club are visible and the orchestra can be heard playing
    "Chan and American dance music." Suddenly we hear five shots, and see a policeman silhouetted on the balcony of the Italian
    Club. He reloads his revolver and fires five more times into the sky.
- speaker: Respondent
  text: '''It''s 1939!'' shouts a neighbor. Everyone yells and laughs; only the children do not sound famed and artificial.
    They race about the street, shooting a few firecrackers. There is a barrage of shotgun fire from several sectors. Soon
    the shots spatter back upon the roofs.'
- speaker: Respondent
  text: The small boys in front of the house are trying to use the lead out of 100 shotgun shells, so they can fire the caps.
- speaker: Respondent
  text: My fingers split by the exploding firecrackers run down the street wailing.
- speaker: Respondent
  text: A ten cent Timm candle is also sharped from the house. The height of the display, it is admired by everyone. It was
    not long before the limited supply of firecrackers was exhausted. Estrella dances to her music; usually she gives up calling,
    and dances then in the street. She catches each one, holds them against me, while she kisses them on the cheek.
- speaker: Respondent
  text: Suddenly it is oppressively quiet. Pedro moves while I sneeze that too. It's 1939 and it doesn't feel any different
    to me.
- speaker: Respondent
  text: '''Hey!'' yells a neighbor in Spanish.'
- speaker: Respondent
  text: Someone calls the funeral home next door to come pick up the dead coal.
- speaker: Respondent
  text: '''Dead one,'' says Pedro.'
- speaker: Respondent
  text: '''1933,'' says Raul laughing. ''You got to fix time all right. I hit right on that one.'''
- speaker: Interviewer
  text: Would you like to go somewhere tonight?
- speaker: Respondent
  text: A sort of a joint - New Year let on dance and buy drinks.
- speaker: Interviewer
  text: You don't have a jook joint, do you?
- speaker: Respondent
  text: Smoking is for unmarried people.
- speaker: Respondent
  text: Matter what you think, plenty married swim poly.
- speaker: Respondent
  text: I know they do, but that's got to.
- speaker: Respondent
  text: You don't know what looking means. Looking means having a good time anywhere, drinking and dancing. We go somewhere
    nice. We leave the kids with my brother. He don't mind to stay with them; we give him a little a line and he be alright.
- speaker: Respondent
  text: '''Then put on your tie,'' Estrella tells Pedro. He doesn''t seem to like the idea, but goes into the larger bedroom
    and emerges with a tie under the collar of his polo shirt.'
- speaker: Respondent
  text: '''Pedro, can''t you wear a shirt tonight? That tie doesn''t look good without a real shirt.'' Pedro grumbles as he
    puts on a heavily starched white shirt.'
- speaker: Respondent
  text: One of the children appears with Pedro's brother, who is rubbing his eyes sleepily.
- speaker: Respondent
  text: '''This is my brother, Thomas,'' says Pedro.'
- speaker: Interviewer
  text: I'm very pleased to meet you. We were meeting you to come yesterday or earlier today.
- speaker: Respondent
  text: '''Madre de Dios!'' suddenly cries Estrella. ''Pre torn my stockings on this rough old furniture, the only pair I''ve
    got decent that I can wear out. I just bought them for Christmas. Oh, this makes me sick. My only pair: I just paid sixty-nine
    cents for them and now they are torn and lame. When can I buy me another pair? Well, no use to cry over it. But it makes
    me feel terrible; I wanted to take such good care of them so they would last me a long time but now just look at them,
    ruined.'''
- speaker: Respondent
  text: '''Well, you all better get started,'' says Thomas. ''I wish I could go with you, but I guess somebody has to stay
    with these kids. Maybe I can go with you before you leave. Don''t forget to send one of the kids after some wine.'''
- speaker: Respondent
  text: They send one of the children for the wine; he can get the empty bottle half filled again for fifteen minutes. Our
    driving off attracts the attention of everyone in sight.
- speaker: Respondent
  text: '''We can drive up and down Seventh Avenue,'' says Estrella. ''That is the only lighted-up street in the city. If
    there is anything to see, I guess you will want to drive over to Ybor City.'''
- speaker: Respondent
  text: I assure her that we would prefer to stay in our city, and we drive along Seventh Avenue. Narrow, and with a streetcar
    track down the center, it is well lighted with neon signs. Most of the shops have Italian and Spanish names. The bars,
    barrooms, and restaurants are thronged with people, many of them dressed in tuxedos and maniac gowns. The restaurants
    are being heavily patronized by Americans from Tampa.
- speaker: Respondent
  text: '''Let''s drive by the Cuban Club and the Spanish Club,'' suggests Estrella. ''They have big dances at all the clubs
    tonight; New Year''s is the time for the best dances.'''
- speaker: Respondent
  text: Both the Cuban and Spanish Clubs, impressive structures of some architectural beauty, are surrounded by many parked
    automobiles.
- speaker: Respondent
  text: '''I have made a model of the Cuban Club,'' says Pedro. ''I show it to you when we go home. You blow. I like to make
    it pretty; I have nothing else to do so I make a model of the club. After I paint it, if it looks good I take it and put
    it in the club.'''
- speaker: Respondent
  text: '''The Spanish Club has a social medicine society that has its own club, nurses, doctors, everything,'' says Estrella.
    ''It sure is a big help to poor people like us. They have individual and family policies; we have a family policy for
    sixty cents a week. Not long ago I had to have an operation and I went to the clinic and had it, and it didn''t cost me
    a cent. Whenever anybody really gets sick and needs medicine or a doctor, the insurance pays for it.'''
- speaker: Respondent
  text: We drive back to Seventh Avenue, park the car, and walk along the sidewalk looking at the shops.
- speaker: Respondent
  text: Remarks Edith, 'Dresses, shoes, hats, everything... everything costs twice this much in Jacksonville.'
- speaker: Respondent
  text: '''Grub is plenty cheap in this city, too,'' says Pedro.'
- speaker: Respondent
  text: 'Almost every shop has a poster in its window, labeled: AID THE SPANISH VICTIMS OF FASCIST AGGRESSION. The posters
    show a small child crying amid ruins, and bombing planes flying overhead.'
- speaker: Respondent
  text: Pedro says, 'The Cubans, Spaniards, and Italians here are all feeling sorry for the Spanish people. Even the Italians
    boo Mussolini when he comes on the screen. The Italians here sure hate Mussolini all right.'
- speaker: Respondent
  text: We pass a newsstand, which includes in its display a number of magazines printed in Spanish. A series is called 'Cousins,
    Mug' and has on its cover a group of Spanish women and children with their arms up, stretched in horror, while overhead
    are pictured bombers with the Italian fascist insignia and the Nazi swastika. The cover is labeled, in Spanish, 'Glory
    to God in the Highest' and 'Peace on earth to men of good will.' I open the cover and see that the magazine is published
    by the University of Lehor in Italy. The editor is Lambardo Toledano.
- speaker: Respondent
  text: We spend several hours in small cafes, eating sandwiches and drinking malted milks with Romulo and Guadalupe. There
    is a jukebox (a telekoldien) which offers a selection of eight sorts of Cuban music, and ten more of American music. There
    are couples present who dance the rumba gala and salsa. Isabella and Pedro dance the rumba also. Apparently they are both
    enjoying themselves.
- speaker: Respondent
  text: '''We need to go out and have a good time with your husband,'' says Estrella.'
- speaker: Respondent
  text: '''I like to go to dances and all that but Pedro don''t take me much. I don''t care so much about showrooms, kids
    are more snug about them, and they go two or three times every week. The kids can see two shows for ten cents.'''
- speaker: Respondent
  text: It is five-thirty in the morning when we finally decide to go home.
- speaker: Respondent
  text: '''This is the latest I ever stayed out in my life!'' Estrella exclaims.'
- speaker: Respondent
  text: We are offered the front room; the four children are all sleeping in beds in the back rooms, and Estrella and Pedro
    will sleep in the other bed.
- speaker: Respondent
  text: '''You want some coffee before you go to sleep?'' asks Pedro.'
- speaker: Respondent
  text: '''If I drink coffee now I won''t be able to sleep,'' I reply.'
- speaker: Respondent
  text: '''Make a little swallow coffee before you go to bed, make you sleep good. Our coffee doesn''t keep you awake like
    American coffee.'''
- speaker: Respondent
  text: I insist that I do not want coffee. I try to pull down the paper shades over the windows, but they will not roll.
    There is nothing to do but turn out the lights and get dressed.
