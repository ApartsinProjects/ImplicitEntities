turns:
- speaker: Interviewer
  text: So can you talk about what social, political, ethnic, racial, or religious communities you regularly connect with
    or participate in?
- speaker: Respondent
  text: Okay, that is a big list. Well, I think it is different right now, in the time of pandemic, because of - kind of the
    quarantine and shelter in place. So I'll start by saying, I feel that in this past year, my interactions with communities
    have been much, much diminished. But in a general way, I would say that my - through my workplace, I'm quite involved
    in my union. And that union is American Federation of Teachers [AFT]. And so there's a lot of the - political work that
    has to do with our working conditions. And there's my state federation, AFT Washington, in this last year, has been undergoing
    a process to become anti-racist as a union. And so that's, well, we're trying to imagine something very differently. I
    think that socially, it's - it's hard to kind of separate everything. A lot of my - kind of my longtime friendships are
    also through union related work, but more through the Asian Pacific American Labor Alliance [APALA], which is a national
    organization that is multi-union and has members from many different Asian and Pacific Islander ethnicities. And I'm active
    in our Seattle chapter, as well as serving as a national officer. So you spend a lot of time doing those things. And so
    for me, that's part of my social support and additional other interaction. And then there's family (/aughs) and there's
    friends and so through that, you're kind of connecting to the other, your other - your relations, other involvements,
    in whatever form they might take.
- speaker: Interviewer
  text: And where do you live now?
- speaker: Respondent
  text: Oh, I live on Beacon Hill and I've lived here in this particular location for over 30 years.
- speaker: Interviewer
  text: Alright, thanks for sharing your answers. Now we will move on to questions about your occupation. So what is your
    occupation or profession?
- speaker: Respondent
  text: I'm a community college instructor. And I am tenured as a historian at Seattle Central College. So that means I'm
    a full time instructor. In addition to teaching the History classes, I also teach American Ethnic Studies, Women's Studies
    and a few International Studies classes. In the recent years, maybe the last 10 years or so, I've become increasingly
    involved in Asian Studies and issues pertaining to globalization.
- speaker: Interviewer
  text: How long have you been employed in that job?
- speaker: Respondent
  text: I have taught at Seattle Central as a full time instructor since 1992. And I was an adjunct instructor eight years
    before that. So you could say my professional career has been largely shaped at this one institution, although in the
    early nineties, I also taught in women's studies at the University of Washington.
- speaker: Interviewer
  text: Oh, wow. So how long have you been a member of the union you're currently a part of?
- speaker: Respondent
  text: I've been a member very shortly after I began to teach as a part time instructor. And it was because other colleagues
    encouraged me to become a member and explained to me what our union was about. One of the first meetings I ever went to
    was a caucus for part time instructors. And it was really helpful to meet other people who were in a similar category
    as I because it was very mysterious. You'll - you seem to only get a contract every three months, and I just - I couldn't
    understand how, how does this work? How do you plan your life three months at a time, and you never know exactly how many
    classes you might be offered to teach? And so the caucus was really helpful in explaining some of the politics of that,
    and also some steps that I could take to be more proactive for myself.
- speaker: Interviewer
  text: Yeah. And what offices have you served within this union?
- speaker: Respondent
  text: Oh, well, so Seattle Central is part of a three campus district and so collectively, it's the largest local [union].
    In the best economic times there's over 1,000 faculty among the three campuses. So what that means is that our local has
    a lot of different roles that people can take up. You can represent your division in the faculty senate, and serve as
    a senator. So that's something I've done. That Senate has a president, and I've served in that capacity. I've been Secretary
    because you need to document, always, the decisions that the group has made, leave a record so people understand what
    the process was. And then in addition to campus level offices, we have a district wide executive board, and I've served
    on that level as well, both as a Secretary and then in 2013, I was a Co-president, with my colleague. And I think we made
    a little bit of history because she's African American and I'm pretty sure it was the first time there had been presidents,
    much less Co-presidents who were both women of color.
- speaker: Interviewer
  text: So now we will go through questions about your work. So can you run me through a typical day at work before the pandemic,
    from the time you woke up to the time you went to bed?
- speaker: Respondent
  text: Okay, so Seattle Central had - still uses the structure of many face to face classes that met daily in those fifty-minute
    blocks, so Monday through Friday, you meet for fifty minutes. And history classes were largely arranged that way. A full
    time load for faculty is three five-credit classes. So typically, I might be teaching from nine to nine fifty, and then
    ten to ten fifty, and then maybe twelve to twelve fifty. Every [day], Monday through Friday, so - so that's kind of the
    in-class structure. In addition, you're expected to have office hours so that you can be available to meet in person with
    students. And so I would just try to arrange those sort of close to when I was also teaching. And then you make appointments
    if students are unable to come at that time. In the afternoon, there are often meetings that full time faculty are expected
    to serve on, they could be tenure committee meetings, where you're trying to help mentor and support a new hire. It's
    - it's approximately a three year process. There are committees that pertain to curriculum, and assessment, accreditation...
    You know, a variety of committees. Probably some of my favorite committees had more to do with things like - we would
    have an annual Day of Remembrance to remember Japanese American incarceration during World War Two. And we had developed
    a campaign to save a fountain that's located on our main floor, a fountain that was sculpted by George Tsutakawa, who's
    actually an internationally renowned sculptor. It happens that George Tsutakawa was a high school student at Broadway
    Edison High School, which is the site of Seattle Central, and he donated this fountain to the - what became the college,
    but it also had become expensive to maintain this piece of artwork. So our Day of Remembrance kind of folded all of that
    in. And what I valued about working on that is that students were part of it, staff were part of it, I really enjoyed
    being able to work with other college community members, because the other committees I described are very, centered on
    just faculty or faculty and administration. And, it's important work, but I find events like Day of Remembrance also really
    fulfilling.
- speaker: Interviewer
  text: Just to clarify, does Seattle Central College run on a quarter or semester system?
- speaker: Respondent
  text: We are still a quarter system.
- speaker: Interviewer
  text: Yeah. So it seems like you're busy. And I was wondering how your work has been impacted or disrupted by the pandemic?
- speaker: Respondent
  text: Well, as you might recall, the announcement or declaration of pandemic came rather suddenly. And I remember we were
    still towards the end of Winter Quarter in 2020. And we learned over the weekend that the college would be closed, and
    that we just would have to finish everything online. And it felt very abrupt because there were still about two, two and
    a half weeks left in the quarter. So I think - as many educators would say, pandemic really upended what we had been doing.
    And all of my classes in that Winter Quarter had been face to face and we had a website but it was - students did not
    enroll in the class, because it was largely online instruction. And so it was a bumpy transition, well, for everyone,
    because it felt - it felt in some ways disconnected, you know, so that if on Friday, we had a discussion that we thought
    we were going to be continuing the following week, you couldn't necessarily have assumed that you could just pick up the
    conversation. And now in this environment, and I do remember the first Zooms that we tried to do, and it was pretty difficult
    because it was so new to everyone. And I think for many students, the technology needs were suddenly, they were - it probably
    felt kind of extreme that you really needed to have the working camera, and internet that was stable, and all of that.
    So I think most of the people in my classes were able to wrap up, but I know that some students, just - it was too much,
    it was just really overwhelming. And they were just not able to complete the course. In the college overall, we had a
    big discussion about, what does no harm grading look like? Because it just felt really wrong to fail people in the midst
    of a pandemic, and so the traditional assumptions about who passes and who fails, we just had to set that aside and talk
    through what could be fair, and what to do for the students who just kind of drifted away, because they just couldn't
    - there were so many other things going on. Answering email about a class was at the bottom of any list we might be keeping.
    And we still wanted to - we didn't want to further harm that individual.
- speaker: Interviewer
  text: And around this time, were you designated a frontline or essential worker by the Washington Governor's "Stay Home,
    Stay Healthy" order?
- speaker: Respondent
  text: Well, since we were teaching online, we were not classified as frontline.
- speaker: Interviewer
  text: Did you ever feel in danger or that your health was threatened on the job as a result of the pandemic?
- speaker: Respondent
  text: Well, let's see. So, since I was in a category of instructors, who did not have labs or clinics, where you might have
    to actually interact directly, I didn't have that kind of concern. And at the same time like everyone else, in a general
    way, there was that constant anxiety about exposure to COVID and potentially catching it or spreading it - just to me,
    it was a constant level of anxiety. Just that - that's been hard for everyone.
- speaker: Interviewer
  text: So I'm going to ask a related question. How did your work responsibilities change with COVID?
- speaker: Respondent
  text: Well, let's see. I think the change - one change is that because we were now online, boundaries between work and anything
    else that you needed or wanted to do in your life, we're - we're more blurred because it might be related to student needs.
    You know, so that if the only time that a student could interact with you, and they really, really needed support, but
    they needed to have an appointment in the evening, which in pre-pandemic times, I'm not usually an evening instructor.
    So we would just figure out a daytime way of interacting. And then, so the kind of boundaries between what, when are you
    supposed to be available? I think because now, so much of the communication is through email, I think there's a little
    bit of a sense of, I've already emailed, so now I'm waiting for you to hurry up and respond. So I try not, I mean, I tried
    to - we suggested ways of framing, most replies will be through Monday through Friday, or whatever days, you designate
    an hour so that students or other colleagues won't take offense that you didn't reply within two hours. This was really
    important, except that they might have emailed at 6 p.m., because that's - that's when it happened. And then they're waiting,
    waiting, waiting, and they're frustrated that you haven't replied, but that might be your only block during the entire
    day, that was actually, Sorry, it's family time, or it's personal care time or something like that. So I do think it -
    it is harder to designate and just sort of let something wait - it will get done, and it might need to wait a little bit
    so that it can also fit into what is more reasonable for me. Unlike my other colleagues who are also caring for children,
    or other people, just other people in a household, I don't have to balance that additional responsibility. But I do also
    have other needs and other projects and other things that I've committed to doing and they should - they could have, in
    a pre-pandemic world - fit in. So I think those things are really challenging as well. I find that the technology of teaching
    from home effectively has also kind of raised the - either expectations, or just kind of raised the bar - on how to go
    about the online instruction. You know, and I haven't bought an additional monitor so that I can do the dual screen thing.
