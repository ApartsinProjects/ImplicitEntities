collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: The yellow house on Quarry Hill had seen better days. Two tiers of kitchen porches sagged beneath the weight of iceboxes
    and chairs. The woman spoke from behind the screen door of the lower porch. She fumbled with her apron, and wiped her
    red hands dry. "Sure, come in." A good natured smile wrinkled the corners of her blue eyes and wide, firm mouth. "Alex
    said you would be coming today. Come in.
- speaker: Respondent
  text: This used to be a rooming and boarding house for quarrymen. My mother-in-law ran it when she came from Scotland. She
    did well. Her husband worked in the quarries. They worked full time those days, and what with the board-and-room money
    and being thrifty, and having only one child--that was my husband, Johnny - they were able to buy the house for their
    own. No, I was born in Barre. Me and Johnny, we came here to live after his folks died. There aren't so many single quarry
    workers as there were years back so we did away with most of the roomers. We've made it into two apartments. The family
    upstairs have no roomers at all. I've taken in two since Johnny died, that was three years ago. Lots of the single fellows
    have cars now, they'd rather ride back and forth to work, and live in Barre where there's more going on.
- speaker: Respondent
  text: They haven't been very busy in the quarries this spring. My roomer Alex is working only three days a week now. And
    pretty soon there'll be a two week rest. There always is after Memorial Day.
- speaker: Respondent
  text: My husband didn't die of stonecutters' t.b. but I've seen it take plenty around here. It was an accident he had, right
    here in our yard. It was the fall of the year and the kitchen steps were slippery with the first snow. He slipped and
    cut his arm on the axe he'd been chopping kindling with. He got infection, and on top of that he had to have an operation.
    It was too much for him. All those times he climbed up and down the quarries, with me worrying and begging him to be careful,
    and he never got any more than a crushed finger. And then to have it happen on his own doorstep, it seemed more than I
    could bear. Of course, there're accidents in those holes, there's bound to be. One fellow was killed last year. Have you
    ever watched a good quarryman climb up and down those granite walls? It's worth your time. I used to hold my breath watching
    them; I still do. I know one old man, a Frenchman, who's been here, he says, since 1892. He swings a couple of 5-ft. iron
    bars across a shoulder, and steps down those dangerous walls without so much as laying a finger to the granite for support.
    He works in a small quarry. Sometimes his hat, face and clothes are so grey with dust that he looks like a loosened piece
    of the stone wall, rolling to the bottom.
- speaker: Respondent
  text: Most of the quarrymen are Union men. Both my roomers are. It pays to belong. They've got a quarry life ahead of them
    and they might as well enjoy the Union benefits. Some of the older ones don't seem to earn any more, they slip up on their
    dues.
- speaker: Respondent
  text: I have two sons. Good boys they are too. They didn't want to work here after they left school nor did I want them
    to. Their father always said it was like burying yourself in a stone grim and hardly knowing there was a world and sun
    around you and what pay do you get? Good enough by the day, but there's always a month or two you lose in the winter when
    the snow's bad, and the ice. Then there are seasons when the business is slow like now. It doesn't pay, there's no future
    for a young fellow. I was glad my boys got working jobs in Barre.
- speaker: Respondent
  text: They're both married. John, the oldest, married an Irish girl, a neighbor. Her father'd had a small quarry way up
    back there. It wasn't good granite, he didn't do well so he stopped working it. The other boy married a Scotch girl.
- speaker: Respondent
  text: The oldest boy doesn't make much money. He was thinking of coming back here and taking the upstairs apartment. It
    would cost him less than living in Barre. But much as I would like to have him here with me, I advised him against it.
    It's no place to bring up lively children. I had my hands full when John and Pete were little ones and always that desire
    to explore those hills of waste granite and the quarries. And high up as we are here with always a little breeze, I can't
    help feeling that the air is full of dust. Sometimes when the wind is strong you'll see whole clouds of grey up there
    almost as if a storm was rolling up. Now me, he'd like me to live with him in Barre but I'm still capable of taking care
    of myself. So I don't mind the worry noises. I've been born so long.
- speaker: Respondent
  text: If I awake at night, I sort of miss them. And days when they don't work I miss them. Looking at those piles of waste
    granite isn't a pretty sight, but I can look out my window at night and see the lights of Barre. It's a nice picture.
    And day thus I can look for miles around, I can see hills that are goose, and fields that in the spring are just brown,
    upturned earth. I can watch them through the summer getting green with growth. It seems good to look at green hills that
    aren't spoiled with quarry holes and those gray waste piles.
- speaker: Respondent
  text: The woodbine shaded perch overlooked the cement highway and the river taboos which lay the long gray string of Barre's
    stone sheds. Brew Lachance sat in a rocker peeling potatoes. "You will excuse me if I go right on and peel," she said.
    "I have just so much time before supper, and so many things to be done. Potatoes! I have to cook mountains of them to
    satisfy the men. Ten of them here, and all but one are stone cutters.
- speaker: Respondent
  text: I have had as many as eight sons boarding here, but with that number I have to take on an extra girl. With only ten,
    my daughter and myself manage. If my daughter happens to want the evening we hire a girl from next door to help with the
    dishes.
- speaker: Respondent
  text: I haven't always taken in boarders. It is only since my husband died nine years ago. Before that, I didn't have to.
    He made enough for us to get along well. He was a letter carver. Seventeen years he'd worked at it. Most of the time in
    Barre, but one year in Montpelier.
- speaker: Respondent
  text: I don't take roomers, you can see the house isn't big enough for that. Since two of the girls were married we've given
    one upstairs bedroom to the family on the other side. My youngest girl graduates from high school next year. There was
    an older boy, he died at the time of the 'flu'. He was just a baby.
- speaker: Respondent
  text: I was born here in Barre. My husband came down from Chambly, Canada, with his folks when he was a boy. They were a
    farming family. He started working in the sheds when he was eighteen. Doing odd labor, but he worked up to letter carver.
    He made good money, but I wasn't happy having him in the sheds. It's bad, especially for a man with a family, and most
    of the French stonecutters around here have large families. Sometimes I think granite isn't worth all the sorrow it brings,
    but it's there in the earth, it's worth money to the owners, and if a man works there, well-- there's no one to blame
    but himself.
- speaker: Respondent
  text: My husband used to say so, he still said so when he was flat on his back. You'd think it would have made him bitter.
    It didn't. He was resigned to it. He accepted it as something he had expected all along. He didn't mind talking to me
    about it, but when his friends visited him--other stonecutters-- neither he nor they would mention the sickness that takes
    so many of them. Perhaps they are all like that. They'll talk about it only to those who are dear to them or, sometimes,
    to a stranger they never expect to see again.
- speaker: Respondent
  text: Mrs. Lachance paused to give orders concerning the supper to her daughter who had appeared at the kitchen door. She
    was a small girl with her mother's red cheeks, and an abundance of black, wavy hair. Underneath the apron she wore a black-and-white
    checked taffeta dress.
- speaker: Respondent
  text: 'When she had disappeared into the kitchen, the mother confided in a low voice, "She''s going to a dance tonight at
    Joe''s Pond. That''s why she''s all dressed for going out. She goes with a French boy." She hesitated as if undecided
    to continue. "Well, I guess I don''t mind your knowing it. She goes with that boy I was telling you about, the one who
    lost his father and two brothers from t.b. He''s a fine boy, I like him, but I can''t help wish that it was someone else.
    Someone strong and well. I''d hate to think of her losing her husband as I did. Usually they are sick for a long time.
    And afterwards, to be left alone with your children. To struggle the best you can. Ah, yes, it''s a hard life. Sometimes
    I''ve wanted to speak to her, but then I think: she knows the story as well as I do. It won''t do any good, she''ll do
    what she wants, and it''s her life to live.'
- speaker: Respondent
  text: The potatoes were piling up. She smiled. "Almost enough. Now my other two daughters have married well. One with a
    French boy from Chambly. Looked at him when she was visiting her father's people. They're living there now with her grandparents.
    My father-in-law didn't like stonecutting. He went back to the farm in Canada after a few years. The other girl is married
    to an Italian. He sells insurance here in Barre.
- speaker: Respondent
  text: I've lived here all my life. I could have moved to Quincy when I married. My husband had an offer from a shed down
    there.
- speaker: Respondent
  text: But I was satisfied with Barre. It's just large enough, the stores are good, and it's always been lively enough for
    the children. The only fault I find with Barre is that there aren't enough jobs in town for the young people when they
    get out of high school. Many of them get office jobs in Montpelier, the rest have to go to larger cities. Not many of
    the high school boys go into the sheds. You can't blame them. There's no future for them there now.
- speaker: Respondent
  text: I don't know much about the big strike. I used to. My husband struck along with the rest of them. I used to hear him
    talk about it a lot, but you hear so little about it now that I've forgotten. I do remember my husband saying that some
    of the unskilled French who came in to break the strike could be excused. That was quite a statement from my husband -
    he was as much against them as anybody. One of those strike breakers was a friend of his. They'd grown up together in
    Chambly, good friends. He hadn't seen or heard from him for years, then all of a sudden he sees him parading through town
    with the rest of them. My husband was dazed, he could hardly believe it. That friend, Pete was his name, came up to the
    house to see my husband the next day.
- speaker: Respondent
  text: Perhaps Pete's story is the same as many of those strangers who came into Barre. I don't know. Pete was badly in need
    of money. His farm, like so many other French farms that year, wasn't paying. The crops amounted to nothing. He had a
    wife and three children to feed. He could see no signs of work for him in Chambly. Not for months. Then this opportunity
    for work in Barre came to him. Work meant keeping his family together. Can you blame him for accepting it? I don't. He'd
    never worked in granite. He'd heard, of course, of Barre and the granite workers. But he knew of them vaguely, just as
    he knew of miners and steel workers. I mean, how hard the work was, and dangerous. But he had to be amongst the workers,
    live with them and do their work, before he could really appreciate the fact that they needed a strike to better their
    conditions.
- speaker: Respondent
  text: I haven't seen much of him since my husband died. But I know he's a Union man now, and a good one.
- speaker: Respondent
  text: Mrs. Lachance called to her daughter that the potatoes were ready. She leaned back in her chair and began to rock
    lazily, comfortably. "You know," she said, "the longer you live in this world the better you realize there are always
    two sides to a question. And it isn't fair to judge until you study both sides. I wasn't thinking only of the Strike.
    Right now I'm thinking of an Italian woman who lives down the street. She sells beer and wine. She's had to pay a fine
    twice for selling without a license. She still sells. Some of the neighbors look down on her. They don't want their children
    to play with hers. Her husband died a few years ago. His lungs. He was a stonecutter. She has six children. None of them
    big enough to be working. Her hip was badly crushed the year after her husband died. What could she do? It's hard for
    her to get around. There aren't many kinds of work she can do. The easiest way-- so it seemed to her--was to sell liquor
    in her own house. That way she could be at home all the time to look after her children. It's illegal. But there's her
    side, too. She wants her children. She's proud. She doesn't want charity.
- speaker: Respondent
  text: She does Italian baking, too. That brings in a little money," Mrs. Lachance sighed. "I don't blame her."
- speaker: Respondent
  text: She was a large, swarthy-faced woman. Heavy black hair was drawn to a shiny coil low on her neck. Today she was crocheting
    an edge for a linen tablecloth.
- speaker: Respondent
  text: '"I have crocheted for so long now that I can make my own patterns." Mrs. Vialez held up her work for inspection.
    "Not this one. This one I make for a woman on Barclay Hill. A rich woman. She showed me the pattern from the book and
    she said, ''Go ahead and make this one, I will pay what you ask.'' She pays good. I''d do work for her for twenty years.
    My husband used to cut stone for her husband. Me, I used to clean her house once a week. After my husband died, this lady
    did not forget me. I used to take my crocheted work from house to house to try to sell it. She bought some.'
- speaker: Respondent
  text: I had three children. She said it was too hard for me to go from house to house. Sometimes I had to take the youngest
    baby with me. She said I would make more money if I stay home, and if people want the crocheted work they would come and
    order it. She spoke the truth. I have made enough to raise the three children. The two girls are married. The boy is working
    in the woods in Bakersfield, near the lumber mills.
- speaker: Respondent
  text: I have been in America twenty-seven years this August. Me and my husband are both born in Biesca, Spain. On the Ebro
    River. That is a pretty river for you. Near our town the river is narrow and deep. It flows past rocks that are a little
    like granite, but not good enough to work. They got big streaks of yellow, red, and orange. From far away they look pretty.
    But you get close and you see that they are dirty from the years that water has run over them. All summer small blue flowers
    grow between the rocks. I never see anything like them in America. They are shaped like daisies and very, very blue, but
    in the center where the daisies are yellow, these are pure white.
- speaker: Respondent
  text: I lived just three hours' carriage ride from Saragossa. That is where my husband learned to cut granite. A large city
    with many beautiful buildings, it makes ten or twelve of Barre. He cut stone from the day he was seventeen. We were married
    sixteen months when we decided to come to America.
