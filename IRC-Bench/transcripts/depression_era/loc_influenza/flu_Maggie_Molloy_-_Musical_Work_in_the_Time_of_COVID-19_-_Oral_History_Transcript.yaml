turns:
- speaker: Interviewer
  text: Awesome. And, I guess just to start out, if you could just share what it is that you do.
- speaker: Respondent
  text: I'm a radio host at Classical King Fm 98.1. I'm a weekend host. I curate and host a contemporary and experimental
    music show that airs on Saturday nights at 9pm, called Second Inversion. And then I also host, on Sundays, from 11am to
    4pm, just straight ahead, classical music.
- speaker: Interviewer
  text: Awesome, and could you just walk us through what a typical day looks like, pre COVID?
- speaker: Respondent
  text: Oh (laugh) - so, my job is kind of a combination of reviewing new releases of contemporary works. I curate the contemporary
    music library at King FM. So, I decide what types of pieces we want to keep, and what things we might play on the air
    and what things are not a good fit for our format. And then I - each week, I curate a show that highlights contemporary
    music. So, I put together an hour playlist of music, always around a different theme. So, I come up with a different theme
    every week that could be - recently, well, this week's theme is music for healing. So, it's all music that's rooted in
    healing ceremonies or different - different ways that artists view music as a healing presence in their lives. Next week's
    theme is, Love New York. It's all music that is from New York, or kind of traces cultural moments in New York City. We've
    also done themes such as folk music episodes, contemporary music that's inspired by folk traditions from around the world.
    We've done musical postcards, pieces that composers wrote home about, from different places that they traveled or different
    places that they're from. So that is - a fair amount of my work every week is around contemporary music and curating that
    show, and hosting it. And then, I also research and host straight ahead classical music every week, too. So, I guess there's
    not a - my typical day is a combination of listening, recording, editing, and producing.
- speaker: Interviewer
  text: Awesome. And then - I guess, since a lot of your work happens from within the studio, and I guess in a way is kind
    of semi-remote on a typical type of basis, how do you feel that COVID has affected that day to day?
- speaker: Respondent
  text: The radio station is kind of an interesting microcosm of the pandemic, because there are some people at the station
    who can work from home full time, and that is the safest thing that they can do. So, they've been working from home, remotely,
    the entire year, basically. For me, I do kind of a combination of going into the station, and doing some work from home.
    So, Zoom meetings and that sort of thing I'll usually do at home, and then I'll go into the station to have access to
    the music library and have access to recording equipment, and all of that stuff editing equipment. Though, for me, that's
    - the pandemic has allowed a little bit more flexibility for me to have the option to work from home sometimes. But, then
    I do still need to go into the station most days. That has presented some unique challenges at the station with staggering
    people's work schedules, and also just upping the sanitation measures around the office to make sure that everybody's
    been safe this whole time. Wearing masks, sanitizing everything you touch, we have HVAC machines all over the office.
    So, we have a pretty small staff, but there have been a lot of extra measures taken this year to make sure that everybody's
    safe.
- speaker: Interviewer
  text: With all those extra measures that you mentioned, and the fact that there's - kind of like an in and out of people
    working from home and working in the station, have you felt generally safe?
- speaker: Respondent
  text: Yeah, I felt very safe. Honestly, I have been really amazed at the leadership during this whole pandemic time at the
    station. Our CEO, Brenda Barnes, keeps really up to date on all of the COVID protocols. She's been in meetings every week
    with people from UW Medicine and different places about workplace safety. So, yeah, the managers have, in particular,
    really set clear instructions and guidelines to make sure that everybody's safe, and they've been really open to any concerns
    people have, as well about coming in. One unique thing that I didn't - I didn't necessarily think about before there was
    a global pandemic is that being a nonprofit public radio station, we have to stay on the air, there's no option to just
    shut down for a couple of weeks or something, and it's important that the radio station is going twenty four/seven in
    case there is some type of catastrophic emergency in which everybody loses power and doesn't have access to the outside
    world. They could still tune in, and they wouldn't probably hear classical music in that moment, but we would have to
    transfer to you, right? To a different news station or something that has - can get people the information that they need
    to survive a catastrophic emergency.
- speaker: Interviewer
  text: I love that (laugh). Do you think - do you think the fact that you guys have to stay open, essentially, has added
    to that type of stress that was already present in the situation?
- speaker: Respondent
  text: (Pause) I think that, (pause) yeah, it's an interesting thing, because for some radio stations, like a news format,
    for instance, they're just like talking about COVID all day, every day. For us, I mean, for me, it's been definitely very
    present in all the HVAC machines and all the sanitizing, and masks, and stuff. But, it's nice that in the world of classical
    music, like at the beginning of the pandemic, King FM kind of took - the programming leadership said, "People are not
    coming to King FM to hear more about COVID, so let's not talk about it." And so having it - I mean, there's - yeah, we
    found unique ways to connect the community through radio during this time, but we don't like to talk a lot about COVID
    on the air. So, it's kind of nice as an escape from this crazy reality.
- speaker: Interviewer
  text: I - I noticed that you mentioned how you guys limited talk about COVID, mostly due to listenership, and like, you
    know, just so they can have like, I guess a type of safe haven to come to, a refuge where it's not like - at this point,
    like we all know that we're living in COVID. They see it everywhere. Y'all see it everywhere. Do you feel like it created
    a positive environment for y'all, as the radio hosts, as the people working at Classical King FM, to avoid this COVID
    talk?
- speaker: Respondent
  text: Yeah, I think that it's been nice for me too. I feel grateful - especially in the early days of the pandemic, when
    things were especially scary, I felt glad to have something to focus on. And that I was glad that my work was - the specific
    work that I'm going into the office and doing everyday, like audio editing, and recording and stuff, that none of that
    had anything to do with COVID. So, I didn't just spiral into an anxious circle about the world. So, that's nice. But,
    I think, like, behind the scenes, right, we're all still talking about COVID at the station, and we're all very present
    in the safety measures that are taking place at the station. But, I think that there was a sense of camaraderie that,
    like, this is an especially unique service that can keep people feeling connected, even when they were isolated at home.
    Not even seeing their friends at all. FaceTime, happy hour-ing or whatever (laugh) - having a - having some company on
    the radio and something that is just like a break from this chaos of the news. I think - we heard from a lot of listeners
    that that was really helpful and that - that it was just a nice escape sometimes.
- speaker: Interviewer
  text: That's, you know, that's really good to hear. Because, like, when I think that I also tune into Classical King Fm.
    I play violin and I have to be up at U Dub about twice a week to play with the symphony, and having that on, and (laugh)
    kind of like - because even being able to play any type of in person music takes you out of the COVID nightmare we've
    been living in and being able to tune into like Classical King FM and also not have to live in the COVID nightmare, it
    has honestly been incredibly helpful. Also, along with that, you mentioned that you do producing work. Is that just in
    the studio was also your own individual work?
- speaker: Respondent
  text: No, just producing the show in the studio. And yeah, making sure all the elements come together.
- speaker: Interviewer
  text: How did you get into that? If you don't mind me asking.
- speaker: Respondent
  text: Into radio? I studied music and, and also journalism in college, at Seattle University. And - I - my - yeah, one time
    (pause) I was at (laughs). Well, I had one of my music and spirituality classes, one of my courses that I had to take
    in my junior year, and we had a substitute teacher one day, and she - she turned out to be Dave Beck's partner, Dave back
    on King FM. And I had never met him. I mean, I knew who he was from listening to the radio, but when his wife was teaching
    this class, she asked us each about what we're interested in, and I said I was doing music journalism. I worked on a school
    newspaper at that time, I was the arts and entertainment editor. And she said, Oh, well, you should talk to my partner,
    Dave Beck. He works at King FM. So, she gave me his email address, and I just reached out and he was so kind and helpful.
    He offered to show me around the station, and I just went to King FM for a day and met everybody. And it turned out that
    the timing of that was that I was going to be doing a contemporary experimental music composition program that summer
    in Paris. I was studying abroad, and that was the same time that there were - that the Second Inversion project at King
    FM for contemporary music was getting started. So, he introduced me to the people who were running Second Inversion at
    that time, and then I ended up getting an internship there after I finished my composition program in Paris.
- speaker: Interviewer
  text: That's so exciting. I love stories where everything just ends up coming together.
- speaker: Respondent
  text: Never, you know, sent him an email or had not been in class that day (laughs), life could have gone in a very different
    direction (pause). So yeah, I've worked now at King FM for just about six years full time, and before that I did an internship
    for one year. So, almost seven years total involvement.
- speaker: Interviewer
  text: That's awesome. So, in these seven years, and I guess, with this past one year being the COVID year, what would you
    say have been the biggest challenges that you faced?
- speaker: Respondent
  text: Well, prior to this year, Second Inversion, as a project, looked a lot different. I was still managing it, but it
    was - it was a twenty four/seven online stream of music, and it wasn't a specifically curated show that aired on the main
    channel. And actually, the Second Inversion show, as a show that launched - it launched in February of last year. So,
    that meant that second version had a bigger audience on King FM, it aired once a week, and it was a smaller format, but
    a lot more concentrated in terms of curation and storytelling, to try to make classical music accessible - contemporary
    classical music accessible to a wider audience. And that - the show launched early February of last year. We had, like,
    the listening party at The Rendezvous in Belltown at the beginning of February, like, had a party, everybody was there.
    And then (laugh), weeks later everything was shutting down. And, so actually, this past year is like - this show has grown
    a lot, as I've grown with it, to shape what is in and what it - like what role it plays week to week in the King FM programming.
    I think that the show itself has grown a lot this year. I feel like I've grown a lot as a host, now having a regular time
    slot on the air. I've gotten a lot more training and practice every week doing hosting. So, I think that I've gained some
    new professional skills that are really helpful for me, and I'm grateful that I have like - had a chance to zero in on
    this project that I can stay focused on during the pandemic, and feel like I've seen some growth. Especially when I know
    so many other people working in the arts felt like this was just an enormous setback for them.
- speaker: Interviewer
  text: Yes. Do you feel like this period of growth - do you feel like this would have been different had it not been during
    COVID?
- speaker: Respondent
  text: Yeah, I think that it would have been different because - especially in the early days of COVID - I really felt like
    work was the only thing that I - the only consistent thing in my life that I could really focus time and energy into.
    And so, I think prior to the pandemic, there were a lot more outside distractions, and also just a lot more hobbies that
    I did. Like, I played music in a band here in Seattle, that I used to go to band practice once or twice a week, we recorded
    an album together - I had all these other projects outside of work that I also did often, and then during the pandemic
    it was like, Well, now it's like, Work at home, work at home, work at home.
- speaker: Interviewer
  text: So, do you still play with that band now?
- speaker: Respondent
  text: We're - we've just started talking about meeting back up for band practice again, because we actually recorded an
    entire album, just finished recording. And we're just like finishing the mixing and mastering process when the pandemic
    hits. And so, we actually haven't released the album, even though it's been r
