turns:
- speaker: Interviewer
  text: What you call the average man?
- speaker: Respondent
  text: Loan so particular. I'll pick up the menu, glom at it a moment or so, and then say, 'Give me a roast beef dinner,'
    or something like that. He never tells you what vegetables he wants with his dinner. That's the average man. But there
    are some like old maids that want everything just right.
- speaker: Interviewer
  text: Which do you find the hardest to please, George, men or women?
- speaker: Respondent
  text: What you call the average man.
- speaker: Interviewer
  text: Tell me about the 'Tramp Mark' you mentioned.
- speaker: Respondent
  text: A few years ago, a tramp came into my place and wanted something to eat. He said he had not had anything to eat for
    three days. He asked if he could wash the dishes or do anything I wanted him to do if I would give him something to eat.
    I gave him a meal and some small change I had in my pocket. The next day, about nine men came in with hard luck stories.
    Every day after that, a bunch of men would come in and ask for something to eat. I told a friend one day that I couldn't
    figure out where all the hoboes were coming from. He said I must have a 'Tramp Mark' on my building. I had never heard
    of a 'Tramp Mark' before. He said that when hoboes found a place where they could get a meal for nothing, they would put
    a mark on the building so that other tramps would know that the place was a place to get a free meal. I went back to my
    place and looked around the back door. I saw the mark. It was a circle that somebody had put there in chalk. It was about
    as big around as a saucer, and it had something in it like a cross. I rubbed it out. From then on, I looked over the building
    every day to see if there were any marks. Those were hard times. We had about as much out at a good time of business.
    There were a lot of hoboes then. Don't find so many now.
- speaker: Interviewer
  text: Tell me about your experience with the stock market.
- speaker: Respondent
  text: My business picked up fast, and we had to hire extra people to take care of the trade. We were open day and night.
    That was when the stock market boomed, silk—or should I say tilt. He had the sickness that killed my brothers. He decided
    to take her to Arizona for her health, and he waited to move out to see. I bought it and was broke in less than six months.
    I couldn't get it out of my head that I wanted the best restaurant fixtures that now could buy. I was making good money
    but it seemed enough to meet the expenses of new fixtures. And I was also playing the stock market. All day, some of my
    customers showed me how much more he was making in the market. I had never even thought about the stock market before.
    For a while, I looked at the market page in the newspapers. It looked good to me, and I bit with what you folks call 'hook,
    line and sinker.' All the money I took in, I put into stocks. The first days of October in 1929 made me feel like I was
    rich. The stocks I bought had gone up and up. I sold some of that and bought others. I often thought about what my mother
    had said and that was 'You'll get rich in America someday.' I should have paid for my fixtures, but I figured I could
    play that anytime. You might think I would have known better, but I didn't. I figured I could pay my debts anytime, and
    I just lost them ride.
- speaker: Interviewer
  text: How did you handle the stock market crash?
- speaker: Respondent
  text: Trouble hit me hard during the last day of October of that year. I had become so interested with the market that I
    let my own business go down. I wasn't there half the time, and I lost my own place of business as a place to hang around
    in. Business dropped off, but I didn't see it because I was making plenty of money in the market. In the last days of
    October, my stocks began to drop. I was trading on the margin. My broker called me and told me I would have to put up
    more cash. I went to the bank and put up all the cash I had in the bank with my broker. It seemed to me that things would
    soon get better. I sent a telegram to my brother and he sent me one thousand dollars. I had about five thousand dollars
    invested. At that day of October 29, they told me I needed more cash to cover up. I couldn't get it. I was wiped out that
    day. I guess disappointment was mild to some people, but that almost killed me. My brother lost in the market like me,
    and he couldn't help me out. I considered killing myself. I had nothing left. I found out what a fool I had been. I did
    manage to pay my debts by selling my café at rock bottom prices. I learned a lesson then. It almost killed me to see my
    café go at such a dump price. It taught me that you've got to pay your debts to get along.
- speaker: Interviewer
  text: Tell me about your family and personal life after the war.
- speaker: Respondent
  text: A long time after my café was sold, I met a nice Greek girl named Penelope. Same as that of my mother. Had a seemed
    what you all matched for each other. She lived in Charlotte and came here to see her brother whom I met her. We started
    going together. We decided to get married, but I didn't have much to get married on. So I got married anyway and struggled
    a lot on almost nothing. The flu took her after we had been together about six months. The doctor said it was 'flu' but
    I think it was pneumonia. Talk about 'omitting guide,' I felt like it then some enough. Just before she died, she asked
    me to look out for her brother. He was always getting into some kind of trouble. His name was Nick. I lived with him.
    I got Nick a job in Greenville. He stole money from his bosses when he was working there. I told Gus I would pay everything
    back if he would have him arrested. Gus turned Nick over to me. I went into Greenville. He made good, thank God. I have
    a small interest in one of the best restaurants in that town. I paid him back every cent I ever spent on him. The root
    of my life—there's nothing much to it. I have been working and saving my money. I am an interest in this café. I am pretty
    well fixed on. I learn to have a lot of friends and I'm happy here.
- speaker: Interviewer
  text: Tell me about your military service during the war.
- speaker: Respondent
  text: Nothing much else happened to me till the War. I enlisted in New York and came to Spartanburg with the 17th Division.
    When I enlisted, the officer told me I would be used as an interpreter. He said there were a lot of Greeks in the division
    who didn't understand English. Then we got to Camp Wadsworth, they put me to cooking in Company C, 106th Infantry, and
    there wasn't a Greek in the whole company. I was never used as an interpreter. Do you remember that big snow we had when
    the camp was here? I don't remember the exact date, but anyhow, I slipped on the snow and fell from the back of the mess
    truck. I broke my ankle. It was a bad break. They took me to the hospital and operated. They took two bones out of my
    foot. Then they told me I could never walk again without limping. Six long weeks I stayed in the hospital.
- speaker: Interviewer
  text: How did you feel about your injury and recovery?
- speaker: Respondent
  text: The officers came around to see me. They said I could get honorable discharge. I didn't want to go. I begged them
    let me stay when I get well. Mr. Cornelius Vanderbilt, Jr., came to the hospital. I told him my troubles, and he went
    to see his father, Colonel Vanderbilt. Two or three days later, officers told me I could stay after doctors let me out
    of hospital. I went back to the mess shack on crutches. They told me I didn't have to go back yet. I wanted to. I sat
    in the kitchen and supervised all cooking. Meats, pies, everything. Soon word started around that we move out any day
    for France. I was still crippled. I wanted to go with the boys, but Captain Cline told me I can't go. The boys in the
    company heard I ain't going. They signed paper asking officers to let me go with them and do the cooking. I went back
    to hospital for another examination, but they said no use. It almost breaks my heart to see the boys go. I cried lots.
- speaker: Interviewer
  text: What happened after the 17th Division left for France?
- speaker: Respondent
  text: After the boys left, I went back to the mess shack on crutches. I got rid of them as soon as possible. I went to this
    officer and that officer and asked them what company I was to work with. They said they would take it up with headquarters,
    but I guess they were too busy with other things because nothing happened. For about two months, I was just loafing around.
    Slept on a cot in my old mess shack. I folded it up every morning and packed it away. I ate with the new men that came
    in. They were from Indians and belonged to the 91st Division. They were swell fellows. By this time, I could walk almost
    without a limp. My pay stopped coming. The captain told me to go to headquarters to see about it. I hung around there
    about three days before I could get any attention. Then an officer heard my story. He told me to go back to my mess shack
    and stay there until something was done. I went back and began to work in the kitchen. The boys liked to have me there
    because it made less work for them. Inspection day came along, and the officers wanted to know what I was doing there.
    They said my name was not on the company list. For about the hundredth time, I told my story. About a week later, a major
    came in the mess shack and told me to go with headquarters. When I got there, some officers told me that a mistake had
    been made in the reports. They said that the records showed I had been discharged about two months before. They told me
    that the paper had got lost in a muddle. They had the doctors at the hospital look me over again. Then they shoved a lot
    of papers at me to sign. I don't know how much sense in that but I didn't care. I was glad that somebody was paying some
    attention to me. They told me to go back to the mess shack and start to work. A few days after that, Captain Johnson came
    in and told me that I had been assigned to the company. On top of that, I got paid for the two months and did that money
    look good. I guess for these two months, I was just lost to the United States Army.
- speaker: Interviewer
  text: What was the Armistice day like for you?
- speaker: Respondent
  text: Armistice day was a great day at the camp. Our company had not used up its allotment of food for the period. The quartermaster
    mailed to put us a spread. We went to Spartanburg and bought turkey. It took us all day, even with an extra detail to
    get results. But we had a swell dinner that night.
- speaker: Interviewer
  text: What did you do after your discharge from the army?
- speaker: Respondent
  text: After my discharge from the army, I found myself, like many other soldiers, without a job. For a while, I worked in
    a restaurant owned by my brother, who had not gone to war, and who had profited during the period when some men amassed
    fortunes. My brother and I decided that it would be necessary for one of us to go to Greece to look after the property
    that Uncle Louis had left us. My brother said I was freer to go than he was. The trip was my second trip home. In May
    1924, to get it because the immigration officials told me I would have a hard time getting back. When they found out I
    was an American citizen and that I served during the war, I didn't have any trouble at all. I stayed in Greece about three
    months, and then came back home.
- speaker: Interviewer
  text: What did you do when you returned to Spartanburg?
- speaker: Respondent
  text: I stayed in New York for a while, and then came back to Spartanburg. I had always wanted to come back here. I lived
    here with some Greek friends for a while. I took up school teaching again while I was looking around for something better.
    Two of my brothers in Greece died within ten days of each other. They left me about three hundred dollars in their money.
- speaker: Interviewer
  text: What did you do with the money your brothers left you?
- speaker: Respondent
  text: Well, Bob, it was like this. I found an owner of a small restaurant here—not mentioning any names—that needed some
    capital. With what I had and what I borrowed from my brother, I went into business with him. Our business picked up fast,
    and we had to hire extra people to take care of the trade. We were open day and night. That was when the stock market
    boomed.
