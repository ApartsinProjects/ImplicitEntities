collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Can you give a little bit of an elevator pitch? What were you doing either music related or non-music related for
    work? Let's say in 2019 before COVID was in the US.
- speaker: Respondent
  text: So, I make my living by being a voice and piano teacher, primarily. So at the time, before COVID all went down, I
    worked for Annie Wright Schools in Tacoma, as well as this music academy called Cappella Music Academy. Lots of things
    to say about them. But we'll leave that for another interview. But, I work as a voice and piano teacher. I had about -
    I think before COVID kind of went down, I was up to - 45 students between the two schools, and then I also was a regular
    performer with Symphony Tacoma Voices as well as Tacoma Opera. And, I had just done a recital actually in November 2019.
    So, I had just done a stand-a-lone recital with a colleague of mine. And, we celebrated women composers. It was really
    great actually. So I was - I was active, right when this all went down, all day, every day, music.
- speaker: Interviewer
  text: And, then thinking back to let's say - late February, early March 2020, when things, especially in Washington state,
    started to really close down; Can you walk me through what you remember happening? What your initial feelings and reactions
    were?
- speaker: Respondent
  text: Yeah actually, I mean now that I think about it, so prior to all of this as an opera singer, as a soprano, right,
    it's really competitive for that particular voice type - specifically, but I had kind of been working my way up to side
    roles and potentially getting a main role, and working my way towards solos with orchestras, rather than just being in
    the choir. Right before everything shut down, I had actually just gotten my first main role, my biggest contract with
    Tacoma Opera. Again, it was - it was like a side main role, but it was named, right? And that's kind of the distinction
    in - in opera and musical theater. Are you part of the ensemble? Or do you get a name for your character? And I was supposed
    to play Fleta or Fleta, people say it differently, in Iolanthe which is Gilbert and Sullivan. And yeah, I was super excited
    about it, who doesn't want to be a fairy on stage? I was hyped, they were gonna let me keep my pink hair. And that never
    happened. So anyway, I was - just had gotten that. And then again, I had gotten my first solo singing with Symphony Tacoma
    Voices in a commissioned work that also didn't get to be premiered for that poor composer I forget - what was it called?
    No, The Bleeding Pines was something else we did. I forget the title at this point. But it was only - it was like a four
    or five bar solo. But again, it was - it was that first - and I wasn't getting paid for it or anything. But again, it
    was that moment where like, okay, this is a solo voice and an orchestra. So, I was really excited about that. But, so,
    that week, when it all kind of went down, we were still having rehearsals with Symphony Tacoma. We were literally just
    about to start rehearsals for Iolanthe with Tacoma Opera, I think they had - they were scheduled to start next week. And,
    then that week of St. Paddy's Day is when everything kind of shuts down; especially particularly singing, of course, is
    what is unfortunately, something that spreads COVID very easily. And, we know that locally in Washington, too. And I remember
    we found out about the Skagit Valley Chorale, and what happened there. There's a CDC study on it now, but there was a
    super spreading event that made national news and two thirds of that choir got infected. And, I think two of them died.
    And it was just very surreal, because - again, I had been rehearsing with our Symphony chorus. And, that could have been
    us, you know, like, we were still rehearsing that week, too. So, it was a very kind of heavy realization in the choir,
    like how lucky we were that it didn't happen to us. And then of course, also, I mean, I'm even getting emotional thinking
    about it. But of course - the tragedy of what happened to the people it did happen to, because you never expect to go
    into choir rehearsal, and then - dying, right? That is - it's pretty crazy. I keep saying to my students - it's pretty
    cool that this universe has made singing, which is one of the most beautiful things in the universe, one of the most dangerous
    things in the universe right now. So, anyway, that's kind of what was going on when it all went down. I had come off this
    - I was getting there. I got off this high of like, oh, I got a role, I got a solo, it's happening, and everything's gonna
    be great. And then it all just completely shut off. So really kind of a big emotional roller coaster there for sure.
- speaker: Interviewer
  text: And, that incident in Skagit - Skagit Valley that you mentioned, that was just one person who had COVID right?
- speaker: Respondent
  text: Yes, that they know of. One person didn't realize they were infected, and they went to choir rehearsal, like any of
    us would. And yeah, the - I think it was sixty out of eighty people, something like that. Forty out of sixty, those kinds
    of numbers that got infected, and two of them passed away. And of course, the demographics of Symphony choruses tend to
    lean older, but that doesn't take away from the tragedy or the risk that it would present to younger singers, too. So,
    yeah.
- speaker: Interviewer
  text: So, as this is happening, as rehearsals are canceled, as things are closing - did you experience any financial disruptions?
    Can you talk a little bit about that?
- speaker: Respondent
  text: Yeah. Well, luckily, because I'm - I shouldn't say - I'm primarily a teacher. But I make my living mostly from teaching
    and that - although we had to have the quick transition to online and that was kind of chaotic, I didn't lose that many
    students honestly. And if anything, actually, as we get further in this conversation, I'm sure we'll discuss, I've actually
    gained some students and kind of gained some different demographics that maybe wouldn't have been possible if we continued
    live instruction. But - Yeah, financially I did okay, but I did lose. Like I said, I got my largest contract with Tacoma
    Opera. And you know, I did lose $600 from not getting to do that as well as just the sting of it in general. I will say
    Tacoma Opera did - about a month or two after this all went down, they set up an Artists Relief Fund, and sent us a little
    something. Again, was it the same? No, but they set up a fund and they distributed funds to people who missed out on that
    opportunity. Also, there was a Seattle area musicians relief fund that I also got to take advantage of. I'm not sure if
    that's what they called it, but I saw it posted on one of the Facebook forums. Then you had to reach - fill out a Google
    form and then send an email and then they sent me - kind of just an honor system, how much did you lose? I sent a copy
    of that contract. It was asked how much did you lose? And then how much - What's the minimum you would need to get by,
    so I kind of just said a number and they sent it over. So that was really helpful. Other than just the unpredictability
    of online instruction and everything going forward, I didn't lose too, too much money, because I don't make a lot of my
    money performing because that is the classical singing world, unfortunately.
- speaker: Interviewer
  text: 'And, you had also mentioned these experiences in a choir, in opera. Can you talk a little bit about how vocalists
    are affected by COVID as opposed to maybe different kinds of instrumentalists: string players or brass players or wind
    players?'
- speaker: Respondent
  text: Yeah, so vocalists are kind of their own separate category, right?, when it comes to COVID and spreading disease,
    because we are - I mean, we can't say we're all super spreaders. But, I think we're more likely to be super spreaders.
    It's just the nature of the instrument and how we're constantly exhaling that steady stream of air. And the particles
    - the mucosal - these aerosols that everyone talks about, they come off the vocal folds. That's the mucus and the stuff
    that's getting vibrated while you're singing. That's why we're so efficient at spreading disease when we sing because
    again, it's literally coming from the source. Whereas, when we're speaking, it's a little bit more sporadic, or an offhand
    cough or sneeze, of course, that's like a burst. But singing is literally constantly breathing. And together, we all inhale
    together, and we all exhale together. So it just - it fills the room with aerosols, in a way that brass instruments and
    wind instruments don't. I mean, they do, but to a lesser extent, because it goes through another physical instrument outside
    the body. Whereas for us, it gets emitted straight from our face. So lucky us. Yeah, it's a special risk to singers healthwise
    - well, again - to anybody, obviously. Wind players need their lungs too obviously, but for singing, our body is our instrument.
    So, it's really important that we keep our instrument in working order, as much as you wouldn't just bend your trumpet
    in half or just bash it against the wall, right? You want to be careful to it. So, I think singers in particular are really
    sensitive to changes in their instrument, because we have to be, we have to be able to perceive those micro - differences
    in our instrument, because our instrument is micro size. Our vocal folds are only about the size - for females, they're
    about the same width as our pinky finger, they're teeny tiny. We're talking about millimeters that we're working with.
    So any kind of inflammation or mucus or build up of anything is obviously not an advantage to singing. And then of course,
    there's the whole issue of lung damage and the decreased capacity to breathe. And the decreased - I imagine the fatigue
    would decrease your awareness with your body. It just really - I've heard of some colleagues, no one I know personally,
    but friends of friends who know people who have had COVID as singers, and they - it's along rehabilitation process to
    get back to the level that they were before COVID. And unfortunately, some still haven't. If you have long COVID there's
    long term implications for that. And I mean, I was - I was horrified and terrified for a really long time about it. Yeah,
    so singing I think is a special case, like I said earlier, where now something that's so human and so emotional and so
    beautiful, has been turned into this, like, do not do that in public, you will spread a disease and it's just such an
    interesting dichotomy between those two things.
- speaker: Interviewer
  text: And - You're vaccinated now, right?
- speaker: Respondent
  text: Yes, yes. I have had both vaccines.
- speaker: Interviewer
  text: So, let's think back to before you were vaccinated, maybe even before vaccines were as widely accessible. Can you
    talk a little bit about your reaction to COVID and the precautions that you took with the pandemic?
- speaker: Respondent
  text: Okay, well, I am probably tier one paranoid when it comes to these kinds of things. Again, I think singers in general
    are kind of - there's all those - since this is a music interview, right? - there's all those singer memes, with the scarves
    and the tea and the cough drops and that's totally true. We're all like that. I actually literally - I don't have it here
    right now,
