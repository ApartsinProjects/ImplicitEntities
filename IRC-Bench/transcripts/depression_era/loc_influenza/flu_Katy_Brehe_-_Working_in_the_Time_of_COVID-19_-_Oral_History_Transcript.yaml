source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: 'I wonder whether we can talk about: what are your broader community contexts? Like, can you talk about what social,
    political, ethnic, racial or religious communities you originally - you regularly connect with? Or you identify with,
    if any?'
- speaker: Respondent
  text: Sure. Yeah, I would probably categorize myself as a gnostic. So I don't really have a strong religious background.
    I grew up going to church, I went to a Catholic college. I very much have respect for religion, but that's not something
    I personally identify with. So I'd say some of my close - I'm close with my family. And I'd say working at Harborview
    and working as a nurse the last 13 years, a lot - a big part of my community is my coworkers just because it's someone
    that understands exactly what we go through, which is a unique experience. And we do have to work weekends and holidays.
    So that essentially becomes a second family that you celebrate those milestones with, with that group of people as well.
- speaker: Interviewer
  text: Yeah, thank you. And where do you live now, Katy?
- speaker: Respondent
  text: I live in Seattle, Washington. On North Beacon Hill.
- speaker: Interviewer
  text: Okay, thanks. Um, so you touched on this, but I wonder if you could just talk about what your occupation or profession
    is.
- speaker: Respondent
  text: 'Sure. I''m a registered nurse. I work at Harborview Medical Center. My background is: I''ve worked there since 2007.
    I started out for three years on an acute care unit that was trauma surgical. I''ve, since then been in the trauma, surgical
    intensive care units. I also am an ECMO specialist. So that''s a person that basically helps run a machine that - it''s
    advanced form of life support extracorporeal membrane oxygenation is what it''s called, but two versions, essentially,
    lung bypass or heart lung bypass.'
- speaker: Interviewer
  text: Thank you. And so am I correct that - Are you saying that your first job in the industry was at Harborview and that
    was 13 years ago in 2007?
- speaker: Respondent
  text: Yes, correct.
- speaker: Interviewer
  text: Okay. And have you been working at Harborview the whole time?
- speaker: Respondent
  text: Yes, Harborview is my first job as a registered nurse. When I was in college, I worked at assisted living home and
    another hospital as a hospital assistant. But yeah, Harborview's been my place of employment since I've gotten my license.
    I also, at the hospital, am a union delegate for SEIU 1199.
- speaker: Interviewer
  text: And so have you been a member of 1199 since you started at Harborview?
- speaker: Respondent
  text: Yes, I've been a member, although I would say I wasn't very active in the Union until about two years ago. I did my
    bargaining of the first - We do bargaining for contracts every two years, and 2019 was the first year I ever participated
    in that.
- speaker: Interviewer
  text: I wonder if - You've mentioned a couple different capacities that you've served in, offices that you've served in
    the Union. I wonder if you could kind of run through the different ones that you've been - Could you talk, could you list
    the different committees or offices that you happen to serve in the Union?
- speaker: Respondent
  text: Yeah, sure. So my title is a union delegate for SEIU 1199. But this last year, I've been interim co-chair for the
    nurse staffing committee. Unfortunately, the other co chair, contracted COVID-19, and was out for several months. And
    then I've been chairing our joint labor management JLM meetings as well. And then, since COVID, we've been actively bargaining.
    Sometimes as frequent as once a week, over different issues such as COVID and PPE protections, we've had to bargain over
    furloughs, redeployment of employees. So there's a lot that we've been actively bargaining even though this isn't a normal
    bargaining year.
- speaker: Interviewer
  text: And I wonder whether you can run me through a typical day, which I know is kind of a loaded question because probably
    you don't have a typical day. Could you run me through a typical day of work before the pandemic, from the time you woke
    up to the time you went to bed.
- speaker: Respondent
  text: Sure, um, I work night shifts. So usually I wake up at 4pm. drink my coffee, eat dinner, head to work. Before the
    pandemic, I would mostly be on my unit of the trauma surgical intensive care units. We are most busy in that summer season
    where people are out and about. We see a lot of motor vehicle accidents, some what we call penetrating trauma, such as
    gunshot wounds, stab wounds. I'd say, in the Pacific Northwest, it's a very active community. So we do see some outdoor
    accidents. And then we also see patients, as the only level one trauma center in the four state area, from Alaska, Idaho,
    and Montana. So usually, coming on shift, our patient ratios are one to one or two to one. If they're acute care status,
    we may take three, but usually at night is when we do a lot of admitting. So we'll empty out some of our beds and be admitting
    traumas throughout the night. Which can be - you'd think people are sleeping at night, but that's not always the case.
    (laughs) Where I work, we're busy throughout the whole 24 hour period. Go home at 7:30 typically, and, if I work the next
    day, go immediately to bed and start the day over or the night over, I should say.
- speaker: Interviewer
  text: And how has your work been disrupted by the pandemic?
- speaker: Respondent
  text: Sure. Ever since the pandemic, now I've mostly been working in the COVID intensive care units. This type of unit did
    not exist before the pandemic. They had to convert two separate units into a COVID ICU and a COVID acute care. Like I
    said earlier, I'm an ECMO specialist. That has been one of the most intense therapies that we can offer COVID patients.
    And we've seen much higher volumes since COVID has happened than we've ever seen before. This is not the only therapy
    for COVID patients, and we use this therapy for many different other types of patients. But because of that, I've spent
    very little time on my home units. Go into work now and we have to dress very specifically, we can't bring our badge in
    our the room, our phone, we've been wearing these long socks to either tuck our scrubs in or roll up the scrub bottoms,
    so they're not dragging on the floor, really shouldn't be wearing any sort of undershirts. We'll have pieces of tape that
    we'll write our name on, and then gear up in our personal protective equipment. When I'm doing ECMO, we can't leave that
    machine, we have to be with a patient and watch that machine the whole time. So we'll be sitting there for pretty much
    a 12 hour shift. We will get break coverage for lunch and then I leave, go home, change into new scrubs. But when I go
    home, I immediately shower. And that's been very much my time this summer. And it's not only COVID positive patients,
    if we have patients come in that we don't know their COVID status, and they can't tell us, like if they have a breathing
    tube, we have to assume that they have COVID until we test them and they roll out. And so this can be any type of patient.
    We've had multiple trauma patients where we've transfused over 100 units of blood in a night than surgery at the bedside.
    And you have to do that in full personal protective equipment. And so this has made it extraordinarily difficult even
    in patients if you don't have COVID. So this has wide-reaching effects on all types of patients.
- speaker: Interviewer
  text: And can I just confirm that you were designated frontline or essential worker by the governor's order that healthcare
    workers were?
- speaker: Respondent
  text: Yes, correct. And I've also been designated because I have such frequent contact with COVID positive patients in tier
    one. So I'll be getting my vaccine later today.
- speaker: Interviewer
  text: I don't know if you're supposed to say congratulations. Congratulations! It's such a bleak time, you know?
- speaker: Respondent
  text: No, thank you. It is something to celebrate. I feel very fortunate actually, that I do qualify for that tier one.
    Um, so yeah, I do feel very lucky. Because I know there's a limited amount of vaccines. So yeah, I'm very fortunate.
- speaker: Interviewer
  text: And I wonder if you can talk about the ways in which you felt impacted about your health being threatened, or if you
    felt like your health was being threatened on the job as a result of the pandemic?
- speaker: Respondent
  text: Sure, I think that's multifactorial. Of course, there's a lot of fear, especially early on, because there's a lot
    that we didn't know. I'd say that subsided a little bit, because we know so much more about the vaccine. And we actually
    do have a lot more research that if you're wearing the personal protective equipment correctly, we are protected. I've
    literally sat next to a COVID positive patient now for months and months. I've been tested three times and I've had my
    antibodies tested and I've been negative the whole time. So that's reassuring. I think a lot of - some of the difficulties
    is mentally, I don't think any of us realized how long this was going to go. So just - it's mentally exhausting, emotionally
    exhausting. We have - I have seen a lot of patients suffering. We limit visitors. So usually when family support, which
    is so important, that we're normally meeting the families, close relationship with the families - that's all done over
    the internet. And we have to remember, too, a lot of our patients don't have access to a phone or the internet. And so
    some of these disparities have been really highlighted even more throughout this pandemic. Or maybe they do have the internet
    but they're working because they have to work to support their families so they're not - they don't have the luxury of
    being at home, waiting for the phone call from the healthcare worker for a status update. And then I think there's been
    a level of frustration with the response from the federal government. Being an Asian-American, when I hear, you know,
    my own president use the term "Chinese virus," that's a huge level of frustration. And then even differing opinions, and,
    you know, my own family about not my immediate family, but you know, aunts, uncles that may have differing opinions about
    the seriousness of the virus, or friends, close friends. It's been really controversial. And I do want to respect other
    people's feelings about the virus and - but that's been really difficult when we're seeing firsthand some of the suffering
    and you also hear in the news, people believe it's fake, or even trying to break into hospitals to get footage to really
    see if hospitals are truly full. So that's been, I think, a level of frustration for healthcare workers. Or when they
    see other healthcare workers saying they think it's fake. I personally, you know, take offense to that, because I think
    it's - we're not on a united front and united message about the seriousness of this pandemic.
- speaker: Interviewer
  text: Did you all at Harborview, always have enough personal protective equipment throughout the pandemic?
- speaker: Respondent
  text: I feel very fortunate, I think U dub [University of Washington] and Harborview's response has been a lot better than
    other hospitals. Working directly with the COVID positive patients, I have felt like I've had access to the proper protective,
    personal protective equipment. I will say I think a lot of this has been driven because we are unionized. And throughout
    this whole pandemic, we've had conversations currently, even now, we have weekly meetings with administration and management
    on issues like access to PPE, accurate counts of what the hospital has for PPE. So I think that is largely in part with
    direct care workers, talking with administration, letting them know what we need and getting that. There are some areas
    I do have concerns. It's so controlled in the inpatient setting, but there are different outlets of Harborview where people
