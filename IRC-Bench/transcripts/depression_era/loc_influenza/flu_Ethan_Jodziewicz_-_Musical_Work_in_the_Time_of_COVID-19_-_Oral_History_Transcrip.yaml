turns:
- speaker: Interviewer
  text: Tell me a little bit about yourself like when and what kind of got you into music.
- speaker: Respondent
  text: So I, I mean, I, I felt a connection to music at a really young age. My mom would probably say that she gave it to
    me because she was singing in a choir when she was pregnant with me, but we just listened to a lot of records at the house,
    and I've always found myself really moved by it, but especially drawn to the bass part in different things. And I'd just
    be running around the house or the yard like improvising, based on what we just heard, you know, maybe listen to some
    Joni Mitchell or we listened to some Johann Strauss like Viennese waltzes or something. Anyway, so I just - I always felt
    like I wanted to play music. And at a certain point, you know, in the public school system, you can in Olympia it was,
    if you're in fourth grade, you can start playing a stringed instrument. My sister is two years older. When she was in
    fourth grade, my mom suggested that she pick up an instrument and she kind of sort of wanted to do it, but wasn't - didn't
    totally have her heart in it and I wanted to play the bass so badly. (Brad laughs) So I was just like, "I know I'm not
    in fourth grade yet, but like if she gets to, you know, rent a viola like I get to rent a bass."
- speaker: Respondent
  text: So, it just, it always felt like I just had to do it, you know, type of thing. And so I started on bass. I mean, I
    started on a cello with bass strings, and eventually got tall enough that I could play real bass.
- speaker: Respondent
  text: And basically was convinced that I wanted to be a classical musician. Like when I was seven years old, I was like,
    you know, I'm gonna be in a symphony full-time. Like, that time of my life couldn't come soon enough. And kind of felt
    a little closed off to other things, and then I went to when I entered middle school, Brad, the interviewer here, was
    just helping start a jazz band program at our school. And I was like, Alright, well, I think I could do that, like, you
    could read the book, and it had written out basslines and stuff and I sort of grudgingly did it because I was, like, I
    just want to play classical music. And lo and behold, the first rehearsal in, I was like, Oh, dang, this is cool, too.
    This is really fun, and, also, you don't have to play what's written in the book. Like, you can hear the changes and you
    can start making up your own thing and that was encouraged. And that was so exciting to me. And so that that sort of -
    Brad and Drew, the other teacher, like [were] giving a lot of recordings that we could check out and I was just getting
    turned on all this stuff. Heard like Jaco Pastorius for the first time, heard Weather Report for the first time. It was
    like brain explosion, and then at the same time I learned about this guy Edgar Meyer, who turned into a huge bass hero
    of mine too, and got turned on to his music, which a lot of it is in the realm of like fiddle tunes and American more
    like American folk traditional, I guess, type of thing, or at least related to it. And so that turned me on to this whole
    world of contra dance music and stuff like that to begin with. So, I basically went from feeling like I had - knew exactly
    what I wanted to do when I was seven to being like, I want to play every possible music (Brad laughs) possible as best
    as I can, if it's feeling good at the moment, and just like try it all and, you know.
- speaker: Interviewer
  text: Nice. I totally remember asking you like, "Hey, do you know Jaco Pastorius is? And you were like, "No." And I said,
    "Okay," (Jaughs). Next week I came back like, "Here (laughs) (gestures handing something to Ethan), go listen to this."
- speaker: Respondent
  text: Totally. I probably still have that compilation CD somewhere. (Brad laughs) It was like that and the Maceo Parker
    version of The Chicken and stuff like - (laughs)
- speaker: Interviewer
  text: 'That''s funny. So let me ask you this: so, you''re into music, you''re liking it, What or when was the first time
    you felt like Wow, I think I''m going to be a professional musician, that''s what I''m going for, and what was like the
    first "Oh, wow, I''m a pro" - the feeling of, be it the first paycheck or the first real gig, or the first - that feeling
    of like, yeah, I''m in it. What was that experience about?'
- speaker: Respondent
  text: That's a really - I love that question because, like I said, when I was seven, the day I brought my first instrument
    home, I knew I wanted to be a professional musician, but I had no idea, actually, what that meant. At that point, (/a
    ughs) I had an idea about - I don't know. So the first - (sighs) I'm trying to remember what came first. There were two
    Basically, like, first moments that happened when I was in middle school. So, I guess that's - how old are you, like 13
    or 14 or something like that?
- speaker: Interviewer
  text: Something like that, yeah.
- speaker: Respondent
  text: So one was - also Brad Schrandt had a gig at the Capitol Theater in Olympia, and we'd had - I'd probably been to four
    jazz band rehearsals or something, and Brad and Drew, the teachers, were like, "Hey, kid, you can play. Want to come do
    a tune with us on this gig? Just pick a tune." And so I picked Moondance, a Van Morrison tune, and learned the bassline
    on it, and showed up to rehearsal at your house and play - -sat in with the band and it was these pro musicians, and then
    the real bass player who was on the gig came in and he had a fretless electric and I'd never seen that before. And it
    was so cool. So I went and got to do that gig at a real theater and there was a real audience there and the lights were
    on and (Brad laughs) you couldn't even see the audience, and I just remember having so much fun doing that and being being
    so excited that these other people - Because you know how it goes - in a school orchestra or a band, it's lovely that
    everybody is involved and everybody - anybody who wants to play can. But the feeling of actually going with people who
    really know what they're doing, and - I had a decent idea of what I was doing for that age, and so felt so boosted by
    that. You know, you put a bunch of beginners together, and you feel like a beginner, but you take someone who's an intermediate
    beginner and you put them with a bunch of pros and you feel like you're a pro for a second. (Brad laughs) So that was
    a really cool feeling. That wasn't a paid gig, that was just sit in and check it out. The first paid gig I did was for
    the Capitol Playhouse in Olympia. I got called. Somebody recommended me to sub a couple shows for this musical Forever
    Plaid, which was, like, four dudes in plaid coats singing doo-wop songs for the whole musical and the whole - the band
    was just piano and bass and they stood on a pedestal in the back of the stage. And I was little, you know, I was like
    a little kid. I was like 13 years old, and it was these grown men in the cast and the pianist was this also fully-grown
    woman, and I didn't even perform the show. I did two rehearsals and they called and said, "Another guy who has played
    to us before popped into town, and we decided we're going to have him do the shows." And they said, It doesn't have anything
    to do with your playing, you were playing great. But that was all they left it at, and I just figured that I didn't look
    the part like that. I was like - I looked out of place there because I was this young kid.
- speaker: Interviewer
  text: Who's that little kid in the back? Yeah (/a ughs)
- speaker: Respondent
  text: So I probably made like 30 or 50 bucks or something from doing those rehearsals. But I remember sitting at the ping
    pong table at break in middle school and someone was like, What are you doing tonight? And I said, Oh, I'm going to work
    (Brad laughs) and I said it like that because it actually felt like work because it was like you go to these specific
    times and you get a check at the end, you know?
- speaker: Respondent
  text: So that was the first experience with that and sort of feeling what that was like.
- speaker: Interviewer
  text: 'Nice. That''s awesome. (Ethan laughs) Well that leads into this next question. So let me ask you this, What was the
    music scene like when you started as to where? Well, what am I saying here? So what was the music scene like when you
    started playing professionally, when - and being a part of the scene like, Okay, I''m in the scene, I''m gigging professionally,
    what was it like, as far as: What kind of venues? What kind of other bands? What kind of pay? What kind of experience
    was the beginnings of your professional career?'
- speaker: Respondent
  text: So I would say there was kind of two sides to the working part of my thing in Olympia. One was that I got really involved
    with the contra dance scene. So, contra dancing is a social dance that originated from New England, but also has ties
    to English country dancing, and it's sort of an all-inclusive - Anybody can dance, you can learn the dances on the spot,
    there's a caller, everything like that. I had in - also in middle school - apparently we're dwelling on that part of my
    life quite a bit, but honestly - I mean, that's when a lot of stuff really felt like it started happening. For my eighth
    grade project, I had written music for a play that we were doing at school, it was not a musical and I wrote background
    music to it. And I asked this guy, Andrew Foster, who had also gone to the middle school and was now in high school, who
    was a really talented violin player - asked if he'd come play the violin part. And I had heard that he was also a fiddle
    player, and I'd recently got turned on to the idea of what fiddle music was, and I'd also just recently gone to my first
    contra dance and just for three hours danced to this stuff that was just these repetitive fiddle tunes that was just really
    groovy, 32 bars, and then it repeats, and it just - By the end of those three hours, I was smiling so much my face hurt,
    and so then I "hired" Andrew for this gig at the middle school, and I learned that he played contra dance fiddle tunes,
    too. And his stepsister also did, and then they had another friend who lived down in Centralia named Scotty who played
    piano, and they were trying to start a contra dance band because all their parents played, too, and they were like, We
    want to do this now. And they said, "We could use a bass player. So what do you say? Want to try it out? And we even have
    a gig booked."
- speaker: Respondent
  text: And I think it was probably at the South Bay Grange in Olympia. Maybe it was our first gig. I forget. It might have
    been at Evergreen [State College] too. So we had a rehearsal, you know, and I played - I was playing, like, jazzy basslines
    under the stuff and they're like, "Whoa, whoa, whoa. (Brad laughs) Can you just go like, boom, boom, boom, boom?" And
    I was like, Yeah, I can do that. I didn't think that's what the job was. But that's what the job was, and that - it opened
    up that world to me, too, of playing simple - that is really meaningful in a bassline. So, that scene was basically -
    Like I said, it's very inclusive, so many people who dance also play instruments and also have bands, and it's not a performance
    so nobody's standing there, like sitting in their chair, you know, checking out your stuff. They're just dancing to you,
    and they might take a break for a minute, but it was this amazing feeling of being able to be experimental within the
    genre without any risk of - if you screw up something or you missed a lick or played out of tune or something, nobody's
    really paying attention that close, and so that - I was always interested in playing fiddle tunes on the bass, learning
    how to actually learn their bowings, learn how to move all over the instrument to make these tunes work, and so I was
    able to start experimenting with that during the dances, too, where it felt a little more free and learn some other instruments,
    too. But those - anyway, to not get too off-topic to exactly the question you asked, those gigs at that time, as far as
    you asked about what stuff was paying? I would say a good gig then was, like, if you came home with 150 bucks you were
    stoked. (Brad laughs) And that would be, like, pretty decent. I mean, you could easily go play a contra dance and come
    home with 50 bucks, but either way it was something, you know?
- speaker: Respondent
  text: And it was a lot more than the nothing I was making playing music before that, you know?
- speaker: Interviewer
  text: Yeah (laughs)
- speaker: Respondent
  text: And so that was cool and so we would do - Our band, The Retrospectacles, it was called - we would do the West Coast
    circuit. So we do like Olympia, Seattle, Portland, Bellingham, occ
