collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: What is your name, and can you please spell out your first and last name?
- speaker: Respondent
  text: Sure. My name is Tashia. T-A-S-H-I-A. Last name, Smith, S-M-I-T-H hyphen H-A-N-K-E-R-S-O-N, properly known as Tashia
    Hankerson.
- speaker: Interviewer
  text: Wonderful, and how old are you? What is your birthdate? And where were you born?
- speaker: Respondent
  text: Oh, wow. Um, you never ask for an age, right? I'm over fifty. I was born in San Diego, California. Is that, is that
    gon' work?
- speaker: Interviewer
  text: Yeah. And what gender, if any, do you identify with along with your pronouns?
- speaker: Respondent
  text: I am a female, and my pronouns are she, her, his.
- speaker: Interviewer
  text: What race or ethnicity do you identify as? And how important is your racial or ethnic background to you?
- speaker: Respondent
  text: I am African American and American Indian. However, in Oklahoma, they don't necessarily recognize that combination.
    So I have had to live life as an African American.
- speaker: Interviewer
  text: Can you talk about what social, political, ethnic, racial, or religious communities that you regularly connect with
    or participate in?
- speaker: Respondent
  text: So I regularly participate in what some would call the Pentecostal faith or denomination, however, I am non-denominational.
    In my heritage - mine, which my mother was grateful enough to allow me to choose, separate from my family's background,
    but incorporated all of them. So in our history is Catholicism, there is a strong Protestant background there, and a church
    of living God background. But luckily, I had the ability to make my own choices, and not everyone in my age group did.
    I also identify very heavily with the labor movement. I'm active on a daily basis with that and I have been for twenty-plus
    years. I'm also very connected to other social groups that foster community involvement, irrespective of race or religion
    - that like to partner with various organizations. So it allows me to pull from different communities at a larger communities
    and then just participate in quite a few other community groups around the state and region nationally as well.
- speaker: Interviewer
  text: If I may ask, would you mind expanding upon those other groups that aren't necessarily affiliated racially or politically,
    but that you are a part of?
- speaker: Respondent
  text: I can mention a few. I can't mention all of them. But yes. My local union, which is Local 3488, is out of Harborview
    Medical Center here in Seattle, Washington. It's part of the Washington Federation of State County Municipal Employees
    [WFSCME]. To which at present time I am the Vice President-Acting President at the present. I also sit on that statewide
    Executive Committee for the council. I represent the AFSCME, which is the American Federation of State County Municipal
    Employees. I represent the Coalition of Black Trade Unionists [CBTU]. I represent - Jesus, let me go down the list here.
    In the region, at the national level for the CBTU, I also sit on their women's committee for CBTU nationally. I can't
    even go through all of these things - acronyms I have in my head. Geez, those are a couple of the predominant ones. But
    I couldn't name them all if I had to. I really couldn't. I'm sorry. There are quite a few. The people of color coalition
    in the state of Washington, I mean, it just goes on and on and on. So I really am where I'm needed most and I try to be
    present.
- speaker: Interviewer
  text: Yeah, of course. No worries. Thank you so much for listing some of them that you do remember. And just to go on to
    the next demographic question, where is it that you live now?
- speaker: Respondent
  text: You can say Puyallup, Washington is a dominant, but also in Seattle proper. And just within the past year, I also
    had another residence in Tacoma, Washington, so about the sound.
- speaker: Interviewer
  text: Great. Now I'll be moving on to some occupational information about you, starting with what is your occupation or
    profession?
- speaker: Respondent
  text: Thank you. I am a Patient Service Specialist at Harborview Medical Center's Emergency Room at present time. I own
    a few businesses on the side.
- speaker: Interviewer
  text: And how long have you been employed in your job, your primary job?
- speaker: Respondent
  text: I've been there for, well, in a few - two weeks, it'll be twenty-two years.
- speaker: Interviewer
  text: Wow. And that just answered my next question about how long you're in that same place of employment. And I know earlier,
    you did mention that you were in a union, or I think a couple. How long have you been a part of those unions?
- speaker: Respondent
  text: Yes, thank you. That's a great question. So initially, when I started employment at the University of Washington,
    I was an SEIU [Service Employees International Union] member. I stayed with SEIU, maybe four or five years, and I was
    an SEIU prior - SEIU member prior to that at Swedish Medical Center as well. And then when I came to Harborview, I switched
    positions and became a WFSE [Washington Federation of State Employees] employee. And I've been there, I think sixteen-plus
    years.
- speaker: Interviewer
  text: Earlier, I know you did also mention offices within your union as well. But do you mind actually kind of just repeating
    what positions you were within those unions?
- speaker: Respondent
  text: Yeah. So I started out at the bottom, the average member, involved member, then I kind of got pulled in by Ms. Juanita.
    I'm trying to think of her last name at this moment, it's going to elude me, but back in the days of Althea Lew. So Althea
    was a close friend of Ms. Juanita and Berlin Chicana. So some of these strong women - John Frazier was there from my very
    first beginnings. So I mean I had - oh God I'm trying to think of that older - there was an older African American activist
    at University of Washington when I was still there. These members were like founding members of the movement, probably
    from the eighties forward. When I came along, they were still active. And they grabbed hold to me, and pulled me in. When
    I got to go through my local, I held every position, so secretary, treasurer, E-board member, Vice President, et cetera.
    It just kind of went from there, policy groups, executive boards, and it just never stopped. The desire to learn was always
    there once I got involved, and especially when they sent me to different meetings. So it would start with a women's -
    a National Women's Convention, or they had national education things. One of my best experiences ever, believe it or not,
    was when my local sent me to my very first - What do you call it here? In this state affiliate, AFL-CIO [American Federation
    of Labor and Congress of Industrial Organizations] meeting, I think that was back in Cleveland. And the national president
    at that time was a lady and she was so powerful. She just reached out to me, never let go, and I was like, I can do this.
    And she so much as said to me, "You can do this." I remember she took me to lunch with her. I was like, Okay, you can
    do this and never stopped. Never stopped. I was so - I mean, you're talking about women who raised their children in the
    movement. When I finally had my last son, and he was a child, I would bring him to those same meetings with me in my arms.
    My - anyone who knows me, they've watched my children grow with me. Because yeah, union all the way, and it's only because
    of the example of those who came before me.
- speaker: Interviewer
  text: That's a really amazing story, and I can't imagine being a part of something just so powerful as these unions that
    you've experienced. Just one clarifying question, you mentioned AFL-CIO. Do you mind expanding, or not expanding but clarifying
    what it is that is?
- speaker: Respondent
  text: It's another acronym, excuse me, for the American Federation of Labor Organizations. It's an umbrella for labor, much
    like AFSCME, much like SEIU. However, in the AFL-CIO, most of those heads will partner with other heads around the nation
    and the one of those heads, so to speak, one of those major umbrellas to the labor movement is the AFL-CIO. The history
    in the AFL-CIO is quite powerful. I would suggest anyone go back, do a history study on it, on its involvement in the
    welfare and the well-being of organized structured labor, at its very roots, at its very origin, in terms of how we learn
    to organize for better health care benefits, for better housing, for better - anything that wasn't necessarily employment-related
    came out of AFL-CIO. So if you can recall back to the sixties with Martin Luther King Jr. and them marching for labor,
    that was for the benefit of having work, right? That was for the benefit of having working wages and things like that.
    But it became necessary very quickly, to not just improve the ability to maintain work, so that families could exist,
    but to - and to maintain working wages - it became important for those laborers to have sustaining forces behind them
    so that they could maintain long-term employment. Those benefits extend to their families, so some of those benefits are
    direct, some of them are indirect. And the coordination of a lot of that is the result of the AFL-CIO, nationally. Now
    very proudly in the state of Washington, for the first time that I'm aware of, we have an African American in a head position
    for the state of Washington, and the AFL-CIO, Ms. April Sims.
- speaker: Interviewer
  text: That's really, really, amazing. Thank you so much for running me through that. As for your next question, going back
    to your occupation. Can you run me through a typical day at work before the pandemic, from the time you woke up to the
    time that you went to bed?
- speaker: Respondent
  text: So, on a daily recap, I would wake most days between 3:30 and 4:00 AM. I have a two to two and a half hour commute,
    and I'm at work by 7:00 AM every morning. At 7 AM it depends on where I start my day. I might start my day at the pre-registration
    desk area. I can be at the registration desk area. I'll be in the back of the ED greeting medics, AMRs [American Medical
    Response], air lifts as they come in off the ramp. Normally, I'm at that first point of contact when patients come in,
    if they were making it into the hospital at all. So if they were being transferred from other hospitals, we were sitting
    there coordinating that to make sure everything is in place. And if something's missing with patients, I'm trying to identify
    them, I'm trying to fill the gaps, I'm trying to locate next of kin, I'm working with social work to do so, trying to
    find funding for them to ensure that the bills get paid so that they are able to get the care that they receive without
    the stresses of those issues of the day. In a typical day, it might start off slow, probably but geared up. And by the
    time you get to the end of my shift, which is - they're twelve-hour days, yeah - that emergency room is in full swing.
    It's the only level one trauma center for seven states, and that's the seven greater states, but we still get transfers
    from all over the world. And you're coordinating care to make it happen, I got to make it happen for you and I got to
    make it happen quick. You're encountering a whole host of things. You're there for families when they walk in to see about
    their loved ones. You're picking up the pieces for people and trying to make sure that the holes get closed before they
    leave before their visit, so they know how to stay connected, so they get the help that they need. You're prepared to
    point them in the right direction because many times they're placed in circumstances that are new to them that they're
    unfamiliar with. Or their realities have changed and they don't know how to really move forward. More often than not,
    you're meeting people who do not have a healthcare system or a healthcare team in place to make these changes. And so
    me, I can't speak for the rest of my team, but I do come, I think, with a pretty strong understanding of the medical navigations.
    I have a heart and a passion to see people well. I want to see good outcomes in them, and I'm there to help people, to
    direct them. I think I'm a big huge resource to others. I often see in my days - I see people who come through for the
    first time. I see people who come back with their grandchildren, with their great-grandchildren. I've seen people come
    back after having been to prison for twenty years. And sometimes they just stopped by to say hi, because I'm a constant
    to them, I think, in that community. I've seen - I've seen a lot being where I am. And I'm glad that - I'm glad to be
    there as a resource for so many people.
- speaker: Interviewer
  text: Wow, that's very moving. I think having that type of community is really important, especially with the type of work
    that you do, primarily in the emergency room. I feel like that it's very great that you recognize how important that your
    work is being that community and feeling that community from others. And kinda to 180 this, how has your work been impacted
    or disrupted by the pandemic?
- speaker: Respondent
  text: Yes. I guess I can mention something that we talked about last week. So before the pandemic, I had a greater ability
    to help others. I had - I could walk you through it if I were able to. I could guide you through resources or I was able
    to intervene in circumstances more freely to prevent breakdowns in communication and systemic failures. I was able to
    go out on that ramp when the car pulled up with GSWs [gun shot wounds] and pull you in. I was able to go out to
