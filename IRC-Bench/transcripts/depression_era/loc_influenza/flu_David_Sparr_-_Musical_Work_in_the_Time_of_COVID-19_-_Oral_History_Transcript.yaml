collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Do you think, to start off, you could tell me a little bit about what sort of gigs and musical work you were doing
    right before the pandemic started?
- speaker: Respondent
  text: Sure. Well, like many musicians, I sort of cobble together a number of different aspects of ways of making income
    in order to come up with a really monetary compensation that supports a lifestyle. I could divide my stuff into maybe
    four parts. First of all, I have a part-time salaried position as music director at a synagogue in Brookline, Massachusetts,
    which involves doing things like choir direction and accompanying services, and basically keeping their whole audio systems
    running and up and running and working. That's one component. Second component is actually going out and playing gigs,
    concerts, recitals, things like that. The third aspect is I own a small recording studio, where I record other musicians'
    projects, original composers, and songwriters, and bands, and everything pretty much from classical to gospel and everything
    in between. Then the fourth component is sort of writing/arranging/composition stuff, and doing music transcriptions of
    creating printed music for people to use. A lot of singers need stuff in weird keys, and that kind of thing. They need
    the chord changes fixed so that they're a little hipper. So that's kind of the four components of what I was doing beforehand.
    Some of that, the percentage is, I'm still doing some of those things. But the percentages have drastically changed in
    terms of what percentage of each of those makes up what I'm doing.
- speaker: Interviewer
  text: Can you talk about that some? How they've changed?
- speaker: Respondent
  text: Sure. Well, I'm fortunate in that my part-time side position still exists. It's a unique situation to these times,
    because the building of the synagogue that I work for is actually closed to the public. So there are no live participation
    by congregation members. Actually, I had a distinct possibility that I would be completely out of work; that they wouldn't
    want me. But in fact, what we're doing is we're doing a lot of live streaming broadcasting of services. I don't so much
    participate in playing and performing live on these video streaming. But what I do is I prepare music pieces, either just
    audio or sometimes audio with video, that they then plug into these various situations. They can be instrumental, you
    know, where we have an amateur congregational band that can system as many as nine players and for instance, I created
    something where you can see all twelve of them across the screen playing to recording actually in their home with their
    iPhones or tablets to a reference track that I previously recorded, and then I edit it all together so that it sounds
    like they're all playing together simultaneously, like a lot of people do. I'm sure everybody's seen those kinds of things.
    So that kind of thing, where sometimes it's just audio only where I'll send a track to a singer or whatever and it'll
    just be like a duet. But anyway, they're keeping me somewhat busy and they're paying me so that's good. So that component
    still exists. The studio, I still haven't had anybody come in. I'm still at the point where I'm not comfortable having
    people come in and perform in close quarters because it's not a huge space. People would be mixing their exhalations,
    inhalations, whatever, in my space. I still work in the studio, but I'm doing things like mixing projects that have either
    been previously recorded or doing things I can do by myself. The things like writing and arranging and transcriptions,
    that's not, that hasn't been affected that much, actually, because that's something that I always did on my own. Some
    of that I don't even have to go to the studio for. I can just work on a laptop at home, so that's convenient, too. But
    the biggest hit would be the live performances. I think since March, the last live gig I did before everything got shut
    down was, I think, something like March twelfth. Ironically, it was in an old age home. Kind of, which is sort of the
    highest risk place to be, but at that time, we didn't know. I survived, it seems.
- speaker: Interviewer
  text: So far, so good
- speaker: Respondent
  text: At least, at least I'm asymptomatic. I haven't been tested but my wife, who I am in pretty close quarters with, one
    could say, was tested recently, and she's clean, so I probably am too. Anyway, so the only live thing I've done in terms
    of performance was I did a senior level recital at for a master's vocalist doing a master's degree, where I was quite
    a bit behind the piano. Because singing is, I imagine singing and flute playing are probably the most dangerous things
    to be near in terms of the force of exhaling. You're probably a lot safer with a cello or something like that. But even
    other woodwinds are probably not as dangerous as a flute, I would imagine. I'm just guessing, I'm not an expert. But I
    haven't done a flute. But I did this one vocal recital that was videoed and it was actually they're, they had been waiting
    for months to do it and they finally said, "Look, I've just gotta, I want to get my degree." And I was willing to take
    the chance. We tried to be as careful as possible in terms of how we set up the geometry of the performance. But that's
    the only live thing I've done. That's sort of the biggest contrast in terms of before and after. You can't rehearse, you
    can't have choirs, obviously, you can't be in the same room with a bunch of other musicians.
- speaker: Interviewer
  text: You've mentioned the four components that make up your most of what you do. Have you been exploring, or do you know
    other musicians who are branching, trying to find new revenue streams during this time?
- speaker: Respondent
  text: Yeah, I think a lot of first, a lot of people, I don't know if this is considered new revenue streams, but a lot of
    people, I don't do, I don't really teach, but many, many, if not the majority of musicians probably have some sort of
    teaching component as part of their repertoire of income. Almost all of them are doing remote teaching now. If they hadn't
    been doing it before they're learning whatever tech stuff they have to do to make that work. In my case, I'm actually,
    I'm actually just bought Final Cut Pro, which is an apple, video editing, high end video editing software, because I don't
    really have a lot of experience with video. The video that I've done so far, for instance, for the synagogue, we have
    another guy there, who's, Jay, you know him, Josh Cohen, who's actually really good with tech stuff. I've just been sending
    him all the raw files and he puts the videos together. I do the audio mixing, but I'd like to be able to do some of that
    myself to take the load off of him because he's pretty busy and also just in terms of for future, like you said, for future
    revenue stream kind of things, to be able to do video editing. I figure I have a lot of extra free time now to learn software.
    That's for me that would be my new development.
- speaker: Interviewer
  text: Do you imagine that, if you're spending time learning software now, that's something that you would continue to use
    more coming out of the pandemic?
- speaker: Interviewer
  text: If, say, the other things come back to the way they were before?
- speaker: Respondent
  text: Yeah, I mean, video will always be with us, with or without a pandemic. And more and more, I'm thinking back, for
    instance, like when I played in, when I used to play in wedding bands as a primary source of income. Back in the day,
    you gave people an audio, a cassette of your demo. Now everybody wants, everybody wants to see a video. And I imagine
    that other kinds of areas of music are like that too. People want to see more and more visuals in their consumer products.
- speaker: Interviewer
  text: Yup. You mentioned back in the day. Just to give me a sense of how you got to where you are, could you talk a little
    bit about your career trajectory?
- speaker: Respondent
  text: It's a little unusual in that nothing in my career has been planned. It's been a continual flow of random serendipitous
    events that led me to where I am. I didn't go to music school. I had no original intention of being a professional musician.
    I played piano as a kid, took lessons from the neighborhood teacher, that kind of thing. Never considered applying to
    on a college level for music. I did a liberal arts kind of education. I played for fun on my own, not even in bands or
    anything, just listening to records, and just played. One day, it was raining and I couldn't do my house painting job
    and I was in the basement of a bar passing the time and just fooling around the piano. When I turned around, there was
    somebody sitting on the steps behind me and he said, "That sounds pretty good. You wanna join a band?" And that's how
    I became a musician. Sort of everything since then has been a similar story. The recording studio thing was another situation
    where somebody said, "Hey, you've got a little four track cassette player there and the piano. I need to come over and
    make a recording." I said, "Well, I don't really know how to do it, but you're welcome to try," and pretty soon I was
    buying equipment and became a recording studio. The synagogue job, same thing. Somebody said to me, "Hey, this guy needs,
    their company's just quit. You want to do it?" And I said, "Wow, you mean I have to get up early on Saturday mornings
    and go to services? I don't know if I want to do that, but I'll try it for a year." Twenty years later, I'm still there.
    So, it's kind of everything, directing a choir, anything I've done, I've done by teaching myself without any kind of formal
    training and writing arrangements, everything pretty much. I probably break all the rules. There're probably huge holes
    in my techniques, but -
- speaker: Interviewer
  text: I've heard your arrangements. They sound pretty great.
- speaker: Respondent
  text: Well, thank you.
- speaker: Interviewer
  text: You say your case is a little unusual. Do you come across other musicians, though, who have similar career paths?
- speaker: Respondent
  text: I'm sure there are. The thing is, I'm in Boston, the Boston area. There're so many music schools here, with the New
    England Conservatory, and Boston Conservatory, and Berklee College of Music, and then those music schools that are in
    the larger universities like at BU, which you know about, and Harvard, and whatever. There's all these fantastic musicians
    that are that start off young in this area, and many of them stay here. And they're all really highly trained. I often
    find that when I'm playing in an ensemble or working in studio with people or whatever, that they're, to a large extent,
    conservatory trained musicians or otherwise that had much more formal music education than I have had. But there are always
    people who learned on the street, you know. I'm not saying I'm unique. Back in the real back in the day, Duke Ellington
    probably didn't go to a music school, I'm pretty sure. The jazz musicians, Charlie Parker, whatever, they learned by doing,
    by playing with people that were better than they were. That's maybe it's a good, maybe you could say a throwback in that
    sense, although I'm not putting myself in the category of Charlie Parker or Duke Ellington.
- speaker: Interviewer
  text: I'm curious, since you're in an area that has so many higher education institutions, do you, if you were recommending
    a career in music to musicians now, especially given the sorts of careers we're seeing, where people are wearing lots
    of different hats as musicians, what do you think about higher education versus the route that you took?
- speaker: Respondent
  text: I think it's great. I wish in retrospect, I wish I had done it. Look, by teaching myself everything, I probably, I've
    probably come up with a composite product in myself that is probably different in some ways than if I had gone through
    the same training as everybody else. But I probably could have gotten to where I am a lot faster if I had had a more organized
    way of learning. I think, for me, part of it was when I was younger I was pretty undisciplined about academic kind of
    stuff. So, maybe for me, I had to take a path that allowed me to take more time and work at my own pace. Now, it's not
    so much like that, now that it's, now that I'm older, I can focus on things that may excite me and then I can really go
    and learn them in an efficient way. But when I was twenty years old, I would rather party and play soccer and do anything
    else except go to the library and read a book or whatever, or sit for three hours and practice the piano. For me, my journey
    maybe worked for me, but I think that if anybody's really serious about music, and has the opportunity to avail themselves
    of the educational resources that are out there, and when I say those educational resources go beyond just music schools.
    I mean, just take something like YouTube. If I wanted to learn something, I had to go out, like a song, I had to go out
    and go to a record store and find it on a record somewhere and find and sit there and try to listen to it and write it
    out bar by bar. Now, there's YouTube and you can find almost any performance of any piece. And there's all these fantastic
    like, How to do this, How to do that, step by step kinds of things. Obviously, there's a lot of junk out there too that
    you have to weed through.
