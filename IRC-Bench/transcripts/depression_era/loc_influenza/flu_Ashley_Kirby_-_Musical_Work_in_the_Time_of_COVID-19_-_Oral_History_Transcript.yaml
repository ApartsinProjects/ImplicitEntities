turns:
- speaker: Interviewer
  text: So - can you say and spell your first and last name for me?
- speaker: Respondent
  text: Yes, my first name is Ashley. AS H LE Y. And my performance name includes my middle name Rose R O S E. And my legal
    name is actually Kirby K IR B Y, but I am known commonly on the internet by my maiden name Smith. S M IT H, if that answers
    all the identity questions.
- speaker: Interviewer
  text: And so what's your date of birth? And where were you born?
- speaker: Respondent
  text: My date of birth is 2/2/1987. And I was born in Logan, Utah.
- speaker: Interviewer
  text: And - what's your preferred gender, if you have any, and pronouns?
- speaker: Respondent
  text: Yeah - I identify as female, she, her pronouns are great.
- speaker: Interviewer
  text: What race or ethnicity, if any, do you identify with, and how important is that to your background?
- speaker: Respondent
  text: You know, my family history does impact me. Think I can be generalized as Caucasian. But I'm a blend of Eastern European
    ancestry. French. A lot of my family grew up in the French Creole region of the United States, a few generations back
    and Czech Swedish, Danish. A whole lot of things.
- speaker: Interviewer
  text: Lots of stuff in there. Yeah, absolutely. Do you participate in any kind of social, political, ethnic, racial, religious
    communities that are important to your sense of identity?
- speaker: Respondent
  text: Cool. That's a cool question. Um, I suppose that culturally I was raised LDS. I do not identify as a Christian, or
    a Mormon, any longer. I say my ethno and religious identity is closer to paganism and humanist a theist.
- speaker: Interviewer
  text: Awesome. Yeah that's great. And where do you live now?
- speaker: Respondent
  text: I live in Boise, Idaho.
- speaker: Interviewer
  text: Awesome. Okay, so that's kind of our demographic information that can help, you know, future researchers to understand
    a little context about you. And, now we'll go on to talk about some occupational stuff. So - without too much context,
    I'll just jump into some of these things. So what is your current occupation or profession?
- speaker: Respondent
  text: Yeah, currently, I am self-employed as a working musician. And I function in that role primarily as a vocalist, guitarist,
    performer. I also work as a studio musician. And from time to time, I get to play a little bit of percussion and piano
    and rhythm guitar. I also teach and study. I'm always studying ethnic dances of the world. And that's part of my musical
    background as well. So I kind of blend the two often. There's no dancing without music. So I'm a dance teacher, music
    performer, music teacher. Additionally, in the slow winter months, I also work as a medical assistant in a dermatology
    practice. So I've got one foot in the world of medical and mostly Creative Arts, I would say about 80% of my income comes
    from music.
- speaker: Interviewer
  text: Wow, that's awesome.
- speaker: Respondent
  text: Yeah, it is awesome [laugh].
- speaker: Interviewer
  text: And how long have you been on doing that, how long have you been employed that way?
- speaker: Respondent
  text: Yeah, so I started performing professionally when I was 18 - (17 / 18). I'm 34 now. I've been lucky to be able to
    sustain most of my life via music and teaching dance and performing as a professional belly dancer. Probably the last
    five years or so I would say that the scale started to tip to where music and dancing - was sustaining me rather than
    me throwing money at the process of training and exploring there. So - five years full time. But you know, it's been a
    slow steady burn of getting to that point for a lot of years.
- speaker: Interviewer
  text: Yeah, it sounds like maybe - 15 or 20 years of kind of preparing for this arrival.
- speaker: Respondent
  text: Absolutely. And moving into full time for sure.
- speaker: Interviewer
  text: Wow. So how did you feel about your career at the beginning of the pandemic?
- speaker: Respondent
  text: Oh, gosh, yeah. You know, at the beginning of the pandemic, I have this - I have this annual ritual where I turn over
    my calendar, and I examine the year prior. I work with a paper calendar, I'm a bit of a grandmother, as you can see by
    my cable knit sweater. [laugh] And I look at my calendar, and I kind of examine the year prior and I compare it to the
    year before that. Mostly - for moments of inner personal reflection, but also monetary. There's an inescapable aspect
    of business, when you're working in the arts, that's, if you're clever, you will pay attention to.
- speaker: Respondent
  text: And at the beginning of this year, near the pandemic, I was feeling really hopeful. Everything seemed to be getting
    easier, and better and - all the footwork I've done in years prior connecting with venues and forming relationships with
    my peers, all of that was paying off and it was just getting easier. I was getting phone calls, instead of making cold
    calls and going to venues and trying to prove myself and getting hazed by the local good old boys, [laugh] you know? It
    was suddenly I was being recognized as a peer amongst these wonderful, wonderful musicians in my area. And, I was so humbled
    by that, and also feeling proud of myself, that I was making my living and supporting myself, supporting my very old and
    sick dog and feeling really - the community aspect of that was really apparent to me. So, I was feeling very good; [off
    camera noise [laugh]] feeling really good about the coming year - felt like a lot of good things were coming.
- speaker: Interviewer
  text: And - I'm going to go to the next one that is on the list here. But I've - There's something I want to remember the
    key on here. Actually, no, I'll call an audible. So, you use the heavy word there, you use the word hazed, (pause) and
    this idea of the "good old boys" network. So - you're talking about kind of your development there and that you felt like
    that was a big part of getting to where you are now. Can you expand on that a little bit? Or is that, was that a big deal?
    Or, or what do you think?
- speaker: Respondent
  text: I think that mostly - it was a series of small - but cutting deals. You know, I'm a sensitive person. And I present
    as female, I am female, I walk in this world as a woman. And so apart from being a musician, I experience - that sort
    of intersection of life. And there is a specific kind of microcosm of sexism within the music industry. You know, from
    moments of - you know, auditions gone bad that were kind of doomed from the start; conversationally observing social dynamics
    and getting shut down in those conversations; assumptions made about my experience and intelligence, or abilities - as
    a woman, but also as a vocalist. There, there are more layers and intersections there too - the human voice.
- speaker: Respondent
  text: If you even just observe within academia, the way the human voice is trained, compared to, for example, a wind instrument,
    which the voice is. [a wind instrument]. And, you know, if you're a horn player, you're going to get a teacher that one
    on one is going to give you a set of curriculum that includes rhythm, training and scales and a lot of theory. And a vocalist
    gets a lot of - well we get some anatomy training, which is great, but mostly repertoire. So [laugh] lists of songs, caricatures,
    masks that you can put on, but never within my training, and I have to admit, I do not have a degree, I dipped my toe
    into the classical world, but I have enough knowledge to know that my peers in that world who did go full power into opera,
    they didn't get - they weren't sitting in practice rooms, running scales or arpeggios. You know, they weren't practicing
    aural skills in the way that other harmonic wind instruments get to do. And it really wasn't until really the last two
    years on my own seeking private tutorship that I experienced what I've always wanted, and that was to be treated like
    an instrument. One of my projects, Tambalka, is a set of original music that I front and I sing in a syllabic language.
    It's all - not scat singing, it's not improvised, it's melodies that are sung with just a human voice as if it were an
    instrument.
- speaker: Respondent
  text: And, so back to what I was saying, Jeff Baker, one of my mentors, finally sat me down and started running scales with
    me, you know - and doing improvisation within changes and learning about the modes. And - never have I ever - met a musician
    or had the opportunity to train within an academic setting, my experience is limited, obviously, where the human voice
    was treated like an instrument that needed that kind of training, which I think is a great disservice, and which adds
    to the sort of stereotypes that well, vocalists can't read music, vocalists can't improvise. And to this day, when I'm
    working with a band, rock band, jazz band, it doesn't matter what the setting is, if I look those players in the eye and
    say, I'm going to take one, just like any other player would take a solo, I really have to fight for it. I have to pause
    and tell them to lay back, I have to make space for myself, and that - [sigh] really gets me so frustrated, because I've
    worked really hard to be able to hold my own in those settings [laugh] you know, and it just doesn't stop. It doesn't
    stop, and I'm not alone in that, and I know that, that is just also a part of the jazz world. I think that people like
    to say, "Oh, you think, you, you think you got this? Show us." You know, you really do have to prove yourself? Yeah,
- speaker: Interviewer
  text: But the best solo that I've heard in the last five years was a vocalist. So -
- speaker: Respondent
  text: oh, I've gotta know who that is. You got to send that to me.
- speaker: Interviewer
  text: I will. Yeah, yeah, yeah. Ok, good. Cool. Okay, so but it sounds like you've done a great job of or you feel like
    you've you feel empowered, you've done a great job of advocating for yourself, like you're alluding to here at the end
    over time to - like, you felt like you had maybe even begun to reach a point of arrival.
- speaker: Interviewer
  text: Where you're, you're fielding phone calls, you're in projects you care about, is that accurate? Do you think?
- speaker: Interviewer
  text: And do you still feel that way now, as we're working through the pandemic? Or has it changed a bunch? You know, throughout
    it?
- speaker: Respondent
  text: Good question. Yeah, I do feel there's - a special kind of momentum and energy in this revivalist moment. And a lot
    of it is like picking up where we left off. Some of it has dwindled - some connections and sort of storylines that I thought
    I would follow into festival season and 2020 projects, I really imagined I'd be in deep and beneficial - lucrative work
    that are not there and other opportunities have opened up. But it is very much positive. And it started very quickly.
    And yeah, the work is good, and it's frequent for me right now. I'm getting - my calendar's full. I'm really grateful.
    It's awesome.
- speaker: Interviewer
  text: That's awesome. Yeah.
- speaker: Interviewer
  text: So let me ask you this then, at the beginning of the pandemic, did you have to supplement your income with some other
    kind of employment or other work apart from your musical work?
- speaker: Respondent
  text: 'Yes. Yeah, at the beginning of the pandemic, my performance calendar was completely wiped. Like, completely blank
    from March, April, May, and at that time, I still had my foot in the door from the winter season, in a medical clinic.
    That clinic also closed. I was teaching dance at the time. So the bottom dropped out pretty dramatically. What did I do?
    There were a number of, sort of grassroots - unconditional grant opportunities that I pursued. One was the Treefort Music
    Fund. The Treefort Music Fund supported me, probably six or seven months of the pandemic. I had a monthly stipend from
    them that, that was very supportive and essential to me at that time. I also live streamed a few shows. This was a really
    interesting aspect of receiving and asking and then connecting with community that way, we were no longer interacting
    face to face. And so there was this sense of disconnect, and live streaming shifted my perception of relationship, and
    how someone can still be there for you. Yeah, so that''s how I made ends meet: Treefort Music Fund, a little bit of live
    streaming, and one sort of "Wild West" venue that wanted to keep booking music throughout the whole pandemic, this unsuspecting
    dive-bar. [sigh] - that that wanted - They were following the rules. But they were also culturally a little on the edge
    in that they were a bar but they served food, and they had live music, and I performed there conditionally. They built
    me this little barricade for each show. They built tables around the stage, so they had this greater than six feet amount
    of space around me. And they contributed to my livelihood a lot. They booked me every other week, throughout a lot of
    the pandemic. So that was one, one live gig I had ongoing when most of my peers would not, could not, were not working
    at all. So those were the pieces keeping me afloat.'
- speaker: Interviewer
  text: That's really interesting. So I'm aware of the Treefort Music Festival out of Boise, but I wasn't aware of the music
    fund. Was that, is that always a thing? Or was that something that the festival kind of pivoted to, to support musicians
    through the pandemic specifically?
- speaker: Respondent
  text: The festival pivoted and gathered donations, opened applications to, you know, I'm not sure how broad the reach was
    if it was specifically for local musicians or musicians who had performed at Treefort, I'm actually not sure. But yeah,
    it was a response to the pandemic and kind of grassroots effort led by the festival itself. It is recently closed now
    that things are opening up again.
- speaker: Interviewer
  text: Wow, but what a beautiful thing to have done?
- speaker: Respondent
  text: I know, god bless Treefort
- speaker: Interviewer
  text: So, what was a typical working day or week like, before the pandemic for you?
