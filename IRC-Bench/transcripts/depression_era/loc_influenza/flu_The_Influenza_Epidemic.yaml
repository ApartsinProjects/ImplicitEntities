collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I never seen the like of all the pneumonia there has been. And most anybody that you see on the streets got a cold.
- speaker: Respondent
  text: But at that, it ain't so bad like I knew it to be many times in Lynn since I come here. Do you remember the flu that
    came the time of the war? Always a war brings something and I always thought that flu wasn't just the flu. It was more
    like the bubonic plague. Anyways, a lot of them that died of it turned black, just like they were said to have turned
    black in Ireland in '46 and '47 when they had the bubonic plague there.
- speaker: Respondent
  text: Three months the rage of it was here in this city. Down in Philadelphia and around that way, I heard it was a lot
    worse. There I guess they were.
- speaker: Respondent
  text: The people were scared everywhere. Most everybody wore a bag with something in it to prevent themselves from getting
    it. Something like moth balls they were that were in that bag. I wore one like all the rest.
- speaker: Respondent
  text: Everybody was drinking whiskey too to prevent it. I believe that helped too. Anyway, it did me.
- speaker: Respondent
  text: I was in Boston when I felt it coming on me. I took a couple drinks and you know I hardly felt them at all. My other
    times I'd be feeling good from the drinks I took, but then I didn't feel a bit.
- speaker: Respondent
  text: When I got to Inn, I took a couple more, and then I didn't feel either. Just like I never had one.
- speaker: Respondent
  text: When I got home, I said to my wife, 'I got the flu,' and when I got in bed, I went to give me some more of this whiskey
    to drink.
- speaker: Respondent
  text: And did I sweat! I had to keep changing my nightclothes two, three times. But you know, it done the trick all right.
    I was a lot better in the morning.
- speaker: Respondent
  text: I had to keep away from the shop for about a week though, and sure felt weak for about a month. But I didn't die like
    a lot of others did. I think it was that whiskey that staved me.
- speaker: Respondent
  text: When I went back to work, there was only about four men in the ranks with me when there should have been around fifteen.
    They were all sick with the flu.
- speaker: Respondent
  text: Then they that were there looked at me when I came in and said, 'You're as pale as a ghost.'
- speaker: Respondent
  text: In the old days there was an awful lot of consumption in the shops. Then, the doctors said that disease ran in families.
    And I believe it does. Anyways then, they didn't do nothing about it, for there wasn't the hospitals and the like to take
    care of them. So most of them fellas that had it just kept right on working just as long as they could. Many's the one
    to would spit up blood sometimes, but they kept on working.
- speaker: Respondent
  text: I knew one fella that worked at the bench with me, that had it and had it bad. But he didn't pay no special attention
    to it. He was always cheerful.
- speaker: Respondent
  text: Well, one day he had a hemorrhage right there before us. They took him home and the next day he died.
- speaker: Respondent
  text: Yes, there was a lot like that. A body that didn't have it, didn't think there was much hope at all for anybody that
    had the consumption. But the one that had it was always cheerful and told to try to make believe he didn't have it at
    all.
- speaker: Respondent
  text: That's the way with them. But I believe it runs in families. Don't you?
