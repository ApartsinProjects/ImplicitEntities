collection: loc_influenza
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: How has the quarantine and social distancing affected your work?
- speaker: Respondent
  text: That's a big question. Well, my symphony work has, as we know, it has come to a complete halt. The management came
    down to our rehearsal on March 11, right in the middle of rehearsal and sent us home, and we have not been back since
    then. At this point, the earliest possible date is to go back in the fall. Normally, we resume the week after Labor Day,
    but as far as currently, as far as symphony goes, what I am, and a lot of musicians have been doing, is we've been very
    active on social media, doing things to support the Seattle Symphony, like making these series of morning notes that are
    supposed to be about ninety seconds long of you just playing in your house. We've produced a bunch of those. I'm about
    to be in a duet recording with Jeffrey Barker that was used as part of a fundraising drive for the Symphony. One of our
    musicians has taken over doing the tiny tots concerts, which is for babies through about three years old, introducing
    them to instruments and stuff. We're working on one now for the flute section that will involve recording various pieces.
    So, that's what I've done from the symphony standpoint. Should we stop there for now, or do you want me to talk about
    other things?
- speaker: Interviewer
  text: You can talk about other things. I know you also have your own private studio.
- speaker: Respondent
  text: Right. I'm teaching between six to eight students per week on Zoom. One or two I have to do on Skype because they
    don't have the right technology. Those lessons are going well. Basically, I haven't had anybody drop out. One student
    moved back to Korea, but otherwise, I'm seeing my normal assortment of students, some weekly, some every other week. I'm
    hoping this summer to do some outdoor teaching—at least do some duet playing from me standing in my backyard on my upper
    deck and the other flutist standing on the lower deck. That'll be helpful. One of my biggest sorrows has been that there's
    not a way to play duets in real time right now because of the latency issue. I've also been doing master classes for the
    Seattle Youth Symphony flute section once a week with Geoffrey Barker. We did it for seven weeks and did a different major
    excerpt for flute every week with the kids playing for us, or if they have bad Zoom connections, they submitted a recording
    ahead of time and we'd listen and watch it as part of the session. Early on, I recorded a part for the National Flute
    Association. Did you see the Amanda Harberg thing the other day?
- speaker: Interviewer
  text: Yeah, was that the thing JoAnn Falletta conducted?
- speaker: Interviewer
  text: Oh, that was so great.
- speaker: Respondent
  text: Yeah, so I recorded a part to that. Ninety-four flutes from seventeen countries or something like that, a specially
    written piece called The Prayer Project. That was a long time ago. It was fun to finally see it in its full form and I
    thought they did a great job on putting that together, not just having blocks of people, but going back and forth between
    different people. That was very cool. Nicola Mazzanti, who's a piccolo player in Florence, Italy, started doing some master
    classes on livestream Facebook. Then he got several of his colleagues from around the world to do them. I did one of those
    a couple of weeks ago. It's been a wide array of things, not anything that I would have normally done, but it's kind of
    interesting and stretches you a little bit.
- speaker: Interviewer
  text: It sounds like you already kind of touched on it, but because you mentioned how you had all of these other opportunities
    now, would you say that you've had more— I don't want to say fulfilling, but are there opportunities besides the ones
    you've mentioned that have arisen because of our technology now?
- speaker: Respondent
  text: Oh, well, of course. All of this wouldn't have been possible, say, ten years ago. None of this would have been possible,
    pretty much. So, yeah, technology has made a huge difference. Does it replace live? No. I really still miss playing live.
    I feel like things like the lessons and all these things keep you busy and they're something to keep in touch with people.
    Even like you and me, we wouldn't be doing this otherwise. I think keeping in touch with people has been good for both
    sides. Especially my high school students that are a little bit isolated, I think they probably are glad to see somebody
    besides their parents. The adults that I teach more have families and have things going on, but it's still nice to touch
    base with them. I consider myself really lucky because even though we stopped working on March 11, we were fully paid
    through the middle of April, our full regular salary. Then, the symphony got the payroll protection plan money and now
    we're all getting base scale. It's a reduction for most people, but it's still pretty decent. That's going to run out
    and shrink, but we've been pretty well paid through now, and I know I'm really lucky in that way because so many freelance
    musicians are really, really struggling. Even the Pacific Northwest Ballet orchestra, they don't know when they're going
    to come back. They're getting paid some, but a lot of other people are not. Like the Youth Symphony sectional I did for
    free, and all the symphony stuff I'm doing for free, although I'm getting paid my salary. My private lessons, I reduced
    my fee by a third because I figured it's just not as effective and people have more limited resources right now. So, anyway,
    technology has made a lot more things possible than they would have ever done before me. If this had happened ten years
    ago, we wouldn't have had nearly these outlets to do this kind of stuff.
- speaker: Interviewer
  text: I really appreciate how you cover so many things too, because I don't know anything about being a symphony musician.
    I've been hearing so much hurt about because a lot of people my age depend on gigs, but they don't have that overarching
    protection. So I'm glad that many musicians still do.
- speaker: Respondent
  text: But it's tough. It's really terrible. I feel terrible for all the people, and I'm glad that there are various funds
    that have been set up, but I know it's not the same. So, I know it's really difficult.
- speaker: Interviewer
  text: Aside from that, do you feel like you're more busy now because of having to fill in all the time? You mentioned that
    you're doing master classes, sectionals, and then you still teach, but then you're also recording a lot more for the symphony.
- speaker: Respondent
  text: And I get out and walk for an hour every day also, which is really important for my mental health. But, yeah, I do
    feel more busy. My husband is working totally from home, but I think he feels more busy than ever before. I definitely
    do a lot every day. Some of it is spending time online trying to research what they really think about how far the flute
    spray comes out or what the current numbers in King County are. A lot of my time goes into that, answering emails, or
    trying to take care of projects that have been on the back burner for a while. It actually feels busier. I feel very busy
    every day. I have not been bored. Sometimes it's just a matter of getting myself going and doing whatever I need to do.
- speaker: Interviewer
  text: Our University of Washington Wind Ensemble has been having chats with professional musicians and composers, and there's
    something Professor Tim Salzman always asks. I know he asked Mr. John DiCesare—the tuba player—he tends to ask all of
    our guests where they feel the future of music is going. I think he does it in a way just thinking that we won't be able
    to get back into music. Do you have any thoughts on that question?
- speaker: Respondent
  text: Well, the immediate future is going to be difficult. I think the long-term future will be fine in the end. I don't
    know how long that will take, but I think it will be fine. The world has gone through things like this before, and eventually
    things get back. The 1918 flu that people talk about all the time—things were terrible and shut down, but eventually things
    got back. I do think it will expand possibilities for more digital streaming of concerts. But I think eventually it will
    be on top of the normal concert experience. It'll just expand our audiences across the country and the world rather than
    replacing live music here. I don't think anything compares to live music. Thinking about movies instead, it's hard for
    me to think about movie theaters ever really coming back. They were already kind of not like they used to be, even when
    I was a kid, with all these neighborhood theaters. They've become conglomerate things now, but even then, if you can watch
    pretty much anything you want from the comfort of your own home in your pajamas, there's not much incentive to go out.
    Some people would argue the big screen is comparable to live music, but I don't think it's the same. I'm hoping, and I'm
    always an optimist, that it will be back like it was but enhanced by these other things that we now know are possible.
    I really hope somebody figures out the latency issue so you can play duets with people in real time. I'm curious; what
    did John DiCesare have to say?
- speaker: Interviewer
  text: I think he was mainly talking about how he thinks it'll be fine, but then he was also talking about how, if it's not,
    then he'd probably be okay. I think he went into that thinking more because he was also a former band director and a symphony
    musician. He more went at it like if the symphony's gone, then he can still teach music than if music is gone in general.
- speaker: Respondent
  text: Interesting, because I would think it might be the other way around. I think that symphonic music by the Seattle Symphony
    could happen sooner than music at a university ensembles. Just to give you a little thing, John DiCesare has been very
    active in all of these electronic things, and I think he really knows a lot about putting all these things together. He's
    been one of the standout musicians as far as our presence online.
- speaker: Interviewer
  text: The Seattle Symphony has been doing so much.
- speaker: Respondent
  text: We have been doing a lot, which I think everybody feels really good about. It's something that you can do that hopefully
    helps.
- speaker: Interviewer
  text: Aside from music, have you been able—or maybe not aside from music in general, but in your own personal life—I know
    you said you go on walks every day for an hour. Have you been able to pick up things that you haven't been able to because
    you're so busy?
- speaker: Respondent
  text: I keep thinking that I am going to, but I haven't gotten there yet. I have a list of all these things. People are
    putting so many things online now. I have a long list of things I want to listen to or watch, like Dennis Bouriakov's
    stuff online. Have you watched any of his stuff? His Prokofiev Sonata is amazing. There are all these things that come
    up and I want to watch that or read about that. So, it's probably been more along those lines. Oh! I have made a lot of
    cookies. Made four huge batches of chocolate chip cookies. I have bought but not done a thing about a little kit to make
    a yarn llama for my granddaughter. Actually, that's the thing—I FaceTime my daughter and her husband and my granddaughter
    who live in Boston probably four or five times a week, and many of those times I read books to Mimi. I had saved a bunch
    of my kids' books, but I also went online and bought a couple of the real classics that you normally just tell to kids,
    but I had the books so I could show her pictures; Little Red Riding Hood and the Three Bears and stuff. So I often have
    an hour, an hour and a half storytime with her.
