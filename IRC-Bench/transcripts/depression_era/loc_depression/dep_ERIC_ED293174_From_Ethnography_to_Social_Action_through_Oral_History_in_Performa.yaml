collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: It seems like we're one of the first to go, and so we could not handle the situation. There were not the farm coalition
    groups that are around now, getting the publicity that you need I think to help the people. He just, he just talked to
    friends. But he didn't have anybody really to talk to about the financial situation that he was in. And I think it would
    have been a big help to him if there had been somebody around at the time. Just happened to be one of the first to go.
- speaker: Interviewer
  text: Were you aware of how bad things were?
- speaker: Respondent
  text: Yes. But he had managed to turn things around up to the fall of 1981. Then he could see, starting into the new year,
    that money was not going to be there to get the ground farmed again, you know, financing that it takes to get things planted.
    Always had managed to make payments and keep things current until that black fall, one way or another, but he could see
    that it was not there from that point on.
- speaker: Interviewer
  text: Did you feel the stress as he did or was some of it concealed from you?
- speaker: Respondent
  text: He did not conceal anything. He shared it with all of us. It was a nightmare for months. He'd walk the floor at night,
    he could not sleep. Of course, no one else did either. I was trying to work and take care of my mother. She was dying
    of cancer at the time. And our sixteen year old boy was smitten with a, only determination they come up with was a viral
    inflammation, left him without function of his lower extremities that same December.
- speaker: Interviewer
  text: How did you deal with all this stress yourself?
- speaker: Respondent
  text: I would say to me (I'd go to bed and I'd just be zonked out) and he said 'how can you sleep when you got so many problems'
    and 'I can't sleep,' and I said 'somebody's got to, I don't know what makes me but somebody's got to' and I think that's
    all there is to it. I don't know why.
