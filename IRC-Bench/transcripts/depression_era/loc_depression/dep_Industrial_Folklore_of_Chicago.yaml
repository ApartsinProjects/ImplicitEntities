collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: You're from that newspaper I guess? I always come down for a newspaper man - I guess there's a story in this alright.
    Ain't there?
- speaker: Respondent
  text: Yep, I'm him, Davey Day, that fast-stepping Newboy on his way up, all fight and fancy footwork. And nothin' wrong
    with the old heart, I guess you know, was you listenin' Monday night.
- speaker: Respondent
  text: 'Well, that one''s over now, but Pian (Cosemanager) is going to get him again for me at the ball park. I''ll beat
    him (Henry) strong there, this is my lucky town. Dropped just one pro fight in my life here, that was in 1931, my fourth
    fight. I''ve licked everybody you want to name right around this town: Frankie Segni, Roger Bernard, Bobby Paoli, and
    I guess maybe a hundred others. And you can bet that Armstrong will go on that list, too, ''cause little Davey is on his
    way up and he got that old confidence.'
- speaker: Respondent
  text: I licked Lou Ambers too, but that was in N.Y. and he was the champ, so they tossed him the duke. Wait'll I'm the champ
    though - I'll keep it right here in my old home town, and they'll be tossing the duke at no like that too. I'll be the
    houseman then.
- speaker: Respondent
  text: Reason I lost to Armstrong was I couldn't see him 20 more. I was real handicapped. Wasn't for not bein' able to see
    him I could have gone twenty rounds 'cause I got determination, I got that old confidence.
- speaker: Respondent
  text: I never got a cut eye in my life, but in that twelfth round I was prayin' Armstrong'd slice that eye side open on
    me then I'd a been able to see through it, I might have gone on to win even, but I couldn't see at all, that's the reason
    the ref called it. It swollen up tight as a drumstick on me.
- speaker: Respondent
  text: Yoh, his eye was out up a right too. They looked at it in the eighth and I guess if that was a white guy they would
    have stopped it on a two and give it to no. But you know how it is with a burc-head, they'd let him get killed in there
    'cause that's how it is. He didn't have no lip left when he was through fightin' Ambers, but he got the duke just the
    same. You think they'd let a white guy go on in that shape? Say, you know how many stitches they took in that lip Ambers
    give him? Fourteen, that's how many Armstrong told me hisself, he swallowed so much blood he was sick for two days after.
- speaker: Respondent
  text: I don't know where they get the idea Armstrong hurt me though. He certainly disappointed me with the power he showed,
    I'll say that much for myself. But you got to give that jig credit for one thing, he never quits swinging. If you'd of
    brought a windmill into that ring and turned it so fast that it got me too dizzy to stand up any longer, and I toppled,
    that would have been nearly the same effect as Armstrong beating me. In that twelfth, for instance, I was covering my
    right eye, and waiting for him to let up for a second so I could open up again, but he kept swinging so often that it
    got me a little dazed, and that gave him the opening for the punch that knocked me down.
- speaker: Respondent
  text: No, I wasn't hurt. I even wanted to put up an argument for Fitzpatrick calling the fight, but Pian stopped me. I wanted
    to take nine counts and then get up after him again, I could easily have finished the round. He can't hit. He wasn't throwing
    nothin' but hands.
- speaker: Respondent
  text: 'How did I feel? Never better in my life. I went in there in the pink. I live right, I guess you know. Armstrong found
    that out. He started getting sour toward the eighth. I could almost hear him saying: ''What''s wrong with this guy? Why
    doesn''t he go down like the others?'' But I stayed up just in spite. And he felt darn lucky when he seen me bend in in
    that twelfth, and even luckier when they stopped it.'
- speaker: Respondent
  text: But Armstrong's a right. He never said a word to me either before or after the fight, but next day he come up to my
    hotel where I was stayin' and said he was sorry he swelled up my eye. Well, I'm sorry he didn't rip that thing wide open.
    He'd have given me a chance to see that way. But he's an intelligent man, he ain't like lots of fighters. You know, reads
    books and things, real bright, you can tell that when you talk to him, he's a smart jig.
- speaker: Interviewer
  text: In listening to the match over the radio, the announcer had said that, going back to his own corner between the fifth
    and sixth rounds, Armstrong had been muttering to himself. The announcer said he had done this between rounds of several
    recent fights, and had questioned Armstrong about the habit. Armstrong had then replied that when he felt that he was
    certain to win, he began memorizing his radio announcement at the close of the bout. When I know I'm going to win I start
    thinking up something to say, Armstrong had explained. Was Armstrong's confidence really so substantial as this might
    indicate?
- speaker: Respondent
  text: Don't let nobody kid you, fella. He talks to hisself cause he's gettin' punchy. He done that first in the Ambers fight
    and he wasn't figuring on no radio announcement then - if you seen that one. It was Ambers should have been talkin' to
    hisself if that was the case, an' same thing with me. Say, when you see a fighter goin' back to his corner talkin' to
    hisself it means just one thing, that his heels is beginning to click. You can take my word on that one, that burrhead's
    heels is getting rounder every out. Why don't he fight Angott then?
- speaker: Respondent
  text: Say, you come around when I fight Mantanos. That one'll be in the ball-park too I hope. Then they'll give me another
    crack at that Armstrong. If they do, Pian is going to make them let me have him here. I'll beat him all right the next
    out, less'n Angott gets him first. Angott got that old confidence. I got it too, that old determination, that's why I
    get along. Any time you want a story for your newspaper you just drop in here an' tell the call man you want it an' I'll
    come down. I don't live in this neighborhood of course, I live in a hotel up on the northside. But I'll come over all
    right. Every little bit helps you know. Say, a dame wrote me a fan letter. I looked like George Raft she said. He used
    to be a pug too. I guess somebody must have told her I was punchy already, I would believe anything. Say, I don't look
    like no George Raft. Be got an interest in Angott though.
