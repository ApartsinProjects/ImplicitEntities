collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Used to row down Bayou Bartholomew long Free Nigger Bend. Only negro families farming the land thereabouts, reason
    'twuz so named. They was an old house 'bout ready to go to pieces, way on back in the bend there. One of the farmers had
    it fixed to store cotton in. Weeds so thick and heavy, growing eight feet high, looked like a swamp, and mighty hard to
    get through.
- speaker: Respondent
  text: Reason me and John would go there, well, 'cause a sugar cane patch nearabouts that old shack, you see. We'd go there
    and get us some sugar cane and go on in the old place. We'd lay around on the cotton bales, eating cane and stories, ghost
    stories, you know.
- speaker: Respondent
  text: Listen, one time we was laying around like that. Well, we heard somebody beating in the back wall. Noise sounded like
    somebody'd got a hammer and was beating it on the wall. First beat on the wall John raised up. Said, "Whut's that!"
- speaker: Respondent
  text: We listened, and there it went again. Looked like somebody trying to scare us. Seen the back wall boards trembling
    on dust a settling, been hit such a hard lick. Must be a ghost, didn't like what John he had been telling a tale, you
    know.
- speaker: Respondent
  text: Well, he got to get scared and started to go on home. Wanted me to come on with him, but I said no, unless he come
    with me around back and find out who doing that knocking. I said when he left, wouldn't do it nohow, said it was mighty
    still and scary and all. But I did mean to see if it was really a ghost chasing us out there or otherwise.
- speaker: Respondent
  text: Went on out the front door and stole around the side. Peeked around the corner and seen a big black snake, looked
    like a moccasin, shape of its head, banging away at the wall with his tail. Just banging away, and don't know why to this
    day. Ten feet long if he was an inch.
- speaker: Respondent
  text: Well, I felt some better, yet and still I left there in a hurry, and unbeknownst to that big old snake banging at
    the cabin. Didn't have no stick or such for to take on a bugger like that.
- speaker: Respondent
  text: Well, knew it was no ghost and told John so, but just the same we ain't never gone back to the old house to tell stories
    and eat sugar cane after that happened. I'm scared of ghosts, but never did care to tangle with a snake size of that one.
- speaker: Respondent
  text: Well, they was an old man, an old slave, you know. Old Master never would give him any kind of meat except old salt
    pork. Never gave none of his slaves fresh meat.
- speaker: Respondent
  text: Old Master he had a great lot of hogs. For that reason he used to keep a watching eye on his pens, against the time
    one of the slaves might get so he try to make away with a pig of his.
- speaker: Respondent
  text: Old slave Flowers, he used to get him fresh meat, just the same. Way he could slip past old Master was a crying shame.
- speaker: Respondent
  text: Said one time, old slave Flowers he got mighty hungry. He spit in his hands, picked up his axe and stole on out to
    the hog pen. Hit a big old hog on its head with the blunt side of his axe, chunk like that, and slung him over his shoulder.
    Just as he was coming out to take that pig on home he see old Master walking down the road coming his way.
- speaker: Respondent
  text: Well, poor old Flowers. Ain't nothing he could do, no place he could hide, then. Had to stand there and wait for the
    judgement, sure he was to catch fifty lashes in the stocks, or have his work doubled in the fields, anyway.
- speaker: Respondent
  text: There he stood, when all of a sudden the hog on his shoulder started twisting and squirming. It had done woke up out
    of its stun, you know, and Flowers he quick to let go his bolt. Hog slid down his back and didn't take him but a bacon
    till he was back in the pen with the rest of the hogs.
- speaker: Respondent
  text: Now you know that was a close call. Old Master didn't see nothing of that hog, it being dusk and him too far up the
    road. Flowers he just walked up and passed old Master, innocent as the Lamb of God, pretending like he just out to chop
    him some cordwood.
- speaker: Respondent
  text: Now that must have been God, Flowers say. The Lord was with me that day.
- speaker: Respondent
  text: Yet and still, thought of the Lord couldn't seem to help old Flowers did he get his appetite wet too long.
- speaker: Respondent
  text: One dark night he got mighty, mighty hungry. Went on out and brought a hog back with him, spite of all.
- speaker: Respondent
  text: Got him about a peck of sweet potatoes. Old Master's hog, old Master's sweet potatoes.
- speaker: Respondent
  text: It was two or three o'clock, somewhere abouts. Pot was a boiling, taters baking in the ashes.
- speaker: Respondent
  text: Time taters got done, good and hot, he picked them out of the ashes, brushed them off good and laid them along the
    rafter, saying, "Cool off now. Ain't fixing to be long."
- speaker: Respondent
  text: Old slave Flowers bawling mighty good. Sitting up there, so happy he got singing soft and patting his feet. Potatoes
    they ready, and meat near about done.
- speaker: Respondent
  text: Well, he heard feet a scuffling. Somebody knocking at his door. Said he could tell the way his heart jumped it was
    Master. Said listen he really felt bad. Still he answered, being he had to, you know. Said, "Who dat!"
- speaker: Respondent
  text: '"It''s me, come to pay you a little visit." Old Master sure enough.'
- speaker: Respondent
  text: '"Well, come in, do come in, Master. Make yourself at home. Here, take the chair and sit." Slave got up and made for
    to give him his chair.'
- speaker: Respondent
  text: Master waved it away, said he'd rather keep his feet and not sit. Old Master stood and looked around the cabin, sniffing
    away. Seen the pot.
- speaker: Respondent
  text: Said, "Flowers, what's that you got a cooking?" "Peas, smell like that? First I ever know peas to smell so good!"
- speaker: Respondent
  text: '"They just peas. Just measly black eye peas, don''t amount to nothing, Master."'
- speaker: Respondent
  text: '"Sure would like to taste them peas. Nights like this I get hungry walking around, Flowers." Old slave getting scared,
    getting weak as water.'
- speaker: Respondent
  text: But he said, "Master, they're just peas. You don't want no mealy peas without no kind of seasoning to them oven. I
    know you don't like no cow peas. They are rightly fitten for you to eat."
- speaker: Respondent
  text: '"That''s all right, I am so particular just now. Dish of them peas would suit me fine if I had them."'
- speaker: Respondent
  text: Old Master got walking here and there, sniffing and snooping like a hound dog on the trail. Looked up and spied them
    sweet potatoes on the rafter, long row of them, sitting up there and smelling sweet. Master said, "What's all this up
    here? Look to me like you been scrabbling at my sweet potatoes, look like."
- speaker: Respondent
  text: Well! Old Master he knew he had him caught and couldn't get loose.
- speaker: Respondent
  text: '"Yes, Master, I''m a stumper: Master, I got so I just had to have me a couple of taters, I had such a great hankering
    after a little bit of sweet potato." Old slave ain''t know nothing more to say, just waited to what sure to come.'
- speaker: Respondent
  text: '"Oh, that''s all right, I don''t mind. You can enjoy yourself mid these." Old Master tended like he don''t care much
    about them sweet potatoes. Then he said, "But if you got other than just that of mine, it won''t be none of my fault.
    Listen to the devil, started to get.'
- speaker: Respondent
  text: He stood there a while, watching old slave Flowers, playing cat and mouse with old slave Flowers.
- speaker: Respondent
  text: Finally he said, "I'm curious about what I smell in the pot, never smelled nothing so good. Bound to have me a dish,
    whatever."
- speaker: Respondent
  text: '"Them peas, Master. But though." Old slave kept on saying.'
- speaker: Respondent
  text: '"Gonna have a look at them, see what kind of peas smell so sweet, then." Old Master went on over and lifted the cover
    off quick. Said, Flowers come and look in the pot, looked at Master and flung up his hands. Said, "Lord have mercy, them
    peas done turned to fresh meat."'
- speaker: Respondent
  text: No, now, he didn't get away that time, he never.
- speaker: Respondent
  text: Took him and gave him fifty lashes.
- speaker: Respondent
  text: Old Master said, "Now you can have you some of that fresh meat and taters if you still want them, unless maybe they
    done turned back into black eye peas, Flowers."
- speaker: Respondent
  text: Flowers he was hurt too bad to be thinking about eating that night yet a while. Tell you though, next night he sure
    flew into.
- speaker: Respondent
  text: Said almost paid to the beating he got. Yes, he did.
