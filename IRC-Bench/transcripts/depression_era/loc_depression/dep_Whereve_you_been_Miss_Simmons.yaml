collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Where've you been Miss Simmons? Haven't had any luck or have you been ill?
- speaker: Respondent
  text: Both. My rheumatics has had me down, and of course all this wet weather ain't doing me no good. Guess I'll play my
    same gig, 16-29-39, about as good as any; play it in the North and South, then put it in the one leg book. Ten cents on
    the first two and a nickel on the other one. That's a quarter.
- speaker: Interviewer
  text: Hope you're lucky this time. Be careful about your rheumatism. Did you ever try rubbing with coal-oil and salt? My
    mother used to use it. See you this afternoon. Goodbye.
- speaker: Respondent
  text: No, I ain't. Have you got yours today? I've been looking for it the past two days.
- speaker: Interviewer
  text: Here's mine, got it this morning. Ever play the numbers on your check? Caught me ten dollars last month. Didn't I,
    Miss Blackburn?
- speaker: Respondent
  text: Now that's something new. I ain't never heard that. I'll watch the numbers on my check from now on.
- speaker: Interviewer
  text: Hello Daisy, what's all the excitement?
- speaker: Respondent
  text: I had a dream about a jitterbug and I can't find it in the gig book. What'll I play? It was a good dream, I know.
- speaker: Interviewer
  text: Guess jitterbug's too new to be in the book. Let's see. Here's dancer that plays for 15-17-19. Would you want to try
    that?
- speaker: Respondent
  text: No, that won't get it. What's close to jitterbug? They've got to do something about these new words—jitterbug, jitterbug.
- speaker: Interviewer
  text: Dancer, dancing, oh look, here's jittery, meaning nervous. How about that?
- speaker: Respondent
  text: Let's see, jittery plus dancing. But how'd you figure out your gig? Can't have but three numbers.
- speaker: Interviewer
  text: Let's fix it this way. Play ten cents on 15-17-19, then put fifteen cents on 17-19-29 in the first sixes and a dime
    to saddle.
