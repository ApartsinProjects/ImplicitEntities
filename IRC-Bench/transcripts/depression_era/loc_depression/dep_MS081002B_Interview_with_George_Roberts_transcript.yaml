source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Could you say a little background about when you were born, and where, who your parents were, who you married.
- speaker: Respondent
  text: I was born March 12, 1911 at 21 Girdwood Street down in the west end of the city. My mother was Addie Edwards Roberts,
    my father was Alonzo L. Roberts. He was a railroad engineer. I was one of six boys. I went to Park Avenue School, which
    was right up the street from 21 Girdwood, now a historic neighborhood, you might say of the western part of the city -
    as having a lot of notoriety. When people refer to West End and Chicken Hill - I remember Chicken Hill. Those houses were
    owned by the little cotton mill.
- speaker: Interviewer
  text: Was it called Chicken Hill then?
- speaker: Respondent
  text: Yes, called Chicken Hill - called Factory Hill. There were two sections there. The officials lived on Girdwood Street.
    The officials were George Murphy was the head of it; A.H. Nance, and J.B. Grice. Now Grice, later on, was a Baptist minister
    - a lay minister. And the Logan family, a very prominent family in West Asheville, wanted to build a Baptist church. So
    they got him to be the minister of Calvary Baptist Church. He stayed there thirty some years. And as the story goes, well
    he married us in 1944.
- speaker: Interviewer
  text: And your wife's maiden name was?
- speaker: Respondent
  text: Agnes Rogers Roberts. But Mr. Grice had several daughters. I think two daughters and two sons. But he stayed at Calvary
    for about thirty years or so, and he lost his wife, she passed away. And I'm told a couple or three years later, he married
    one of the members of the congregation, who'd been divorced. And they ran him out of the church. Staying there that long.
    (Well, this is kind of smutty stuff.) But they built the West Asheville Baptist Church and the Gace Baptist Church - they
    came out of that church.
- speaker: Interviewer
  text: Would you mind saying what you said earlier about Park Avenue and class?
- speaker: Respondent
  text: No, well, Park Avenue was one of the better classes then. My father was a railroad engineer, and of course that was
    close to his works. The old railroad shop was down where the passenger depot was, across the tracks, of course that's
    not there on Depot Street. But the midwesterners and the northeastern manufacturers came down and started mills, cotton
    mills and various things. And they built these gorgeous homes, cause they get this view in the afternoon, unobstructed
    view of the French Broad River. Only river I know of, or maybe the only second one that flows north.
- speaker: Interviewer
  text: Did they have a view of the mountains, too?
- speaker: Respondent
  text: Yeah, Pisgah. Pisgah and the Rat - you know everybody talks about Pisgah and the Rat. Yeah, they had a perfect view
    of Pisgah and the Rat. Some of the people that lived on Park Avenue at that time was Fred Felmet, they ran the Felmet
    Brother's Grocery; Sam Brice, he ran a market down on the corner of Robert's street and Buxton street.
- speaker: Interviewer
  text: So are talking about the turn of the century?
- speaker: Respondent
  text: This was in 1911 and that area. And there was the Davis family, ran the Slayden and Fakes, the big wholesale company
    out in Biltmore. Many prominent people in that section. Earl Eller, that used to be mayor of the city of Asheville, lived
    up on the corner Milk Street and Patton Avenue - West Haywood, it was at that time. Ah, Sam Brice, I mentioned him, he
    ran a market down. H.P. May, worked in Biltmore Industries. His son went on to become a dentist, one of them, one of them
    was John May that run a market in West Asheville.
- speaker: Interviewer
  text: What is the last name?
- speaker: Respondent
  text: M-A-Y, May's Market in West Asheville. Hugh May was the dentist. Ross May worked on a railroad. My father got him
    a job on a railroad. My father was a railroad engineer and was with the Southern Railway for fifty-some years. Started
    at the railroad in 1892. He was born in 1878, he was 12 years old when he started with the railroad. The Spanish American
    War came along. He was a call boy. He went in the Spanish American War and he came out. Railroad had nothing for him to
    do so he started to learn the plumbing trade. They opened up the railroad--it came up from South Carolina. Breaking new
    ground, and they needed more workers so he got a job as a fire man on the railroad.
- speaker: Interviewer
  text: Do you know if he built the house you were born in?
- speaker: Respondent
  text: No, he did not. He bought it from a man by the name of Grant who came down here from Chicago. I don't know whether
    Grant built it or not. But it's an interesting thing, Grant later had the Asheville Baking Company. He owned the baking
    company at that time on the corner of Ashland Avenue, called Asheville Steam Bakery. And it was located at the corner
    of Ashland Avenue and Patton Avenue. And he bought that bakery from a fellow, Zindel. Zindel's Bakery. Mr. Zindell went
    down onto Hilliard Avenue, down on the corner of Hilliard Avenue and Clingman Avenue and built another bakery and went
    into the wholesale bakery business. Had trucks and all of that. They had owned Roger Grant, who had bought the bakery
    from the initial owner and built the Asheville Baking Company on Choctow Street, across from St. Joseph's Hospital, where
    the doctors are in that building now, the one he built. But a lot has taken place along the West End section. It's run
    down, but it's making some progress now, I think. There's some talk of building houses on what is known as Chicken Hill.
    And I often wondered how Chicken Hill got its name, but it's not difficult to see because all the people then had chickens.
    At 21 Girdwood Street - we had a cow and chickens.
- speaker: Respondent
  text: We did, we had to have milk. And a garden. It was all fenced in with a board fence. And all the factory workers down
    there would have a little plot around the factory house and they'd have chickens out there, lay eggs. They didn't have
    any room for a garden. But I can see those women coming out of the mill, men as well. They worked 12 hour shifts. Six
    in the morning to six at night, and 12 at night to six in the morning. That whistle would blow - six in the morning, 12:00
    for lunch, six in the evening, same thing at midnight. But the women would come out and lint would be four inches deep
    on top of their heads. Lint from the mill, the textile mill. And they called them "lint-heads." Referred to them as "lint-heads."
    And H.J. Olive ran a store down by the railroad track there - Smith's Bridge. It was more-or-less a factory store - if
    you worked in the factories you could buy and charge over there. It was a general store. West End then, if you know down
    by the Chesterfield Mill - if you know where it's burned down--it was a very thriving community. Department Stores. Polly
    Mears ran a department store down there. Two barber shops - the first barber ever cut my hair was Preacher Ball. His son,
    Enoch Ball now is a Methodist Minister with the church in the North End. I saw his son one day at a dental office, and
    I said my first haircut I got from your daddy. I was about five years old and I had curls down to my shoulders.
- speaker: Interviewer
  text: Like Thomas Wolfe.
- speaker: Respondent
  text: I guess. My dad came home one day, and mother wasn't there. She had gone to a GIA meeting, as I remember. He took
    me down and sheared all that wool off. But he saved the curls. Cause he knew he was gonna get in the hall pretty good
    to account to her. She came back and sure enough she got on his case. But in 1918 we moved out near the Bingham School.
    You know where Square D. plant is? Well that was Bingham property. Where the Square D. plant is, that was the old Bingham
    ball field. Bingham School was an old military school that moved out to Asheville from Mebane, N.C. Bingham was an old
    family. One of them operates a newspaper over in Louisville, Kentucky. Barry Bingham. So dad bought 41 acres over on what
    is now North Louisiana Avenue. And the property backed up to Emma School, and over to the brickyard road over on the west.
    It had been a brick mill.
- speaker: Interviewer
  text: On the property?
- speaker: Respondent
  text: On the property. He bought it at a courthouse sale. And we moved over there. Six, five boys I guess were living there
    then. We moved over in 1921. And, no we moved over in 1918, permanently. We moved over the year before and stayed there
    the summer and moved over in 1918. In 1916 we had a big flood in Asheville. We were living on Girdwood Street at that
    time.
- speaker: Interviewer
  text: So you saw it all from right there.
- speaker: Respondent
  text: And my mother took my two brothers, Lee and Roy, and myself and I believe four boys, course she had a baby in her
    arms, and we stood in front of Westmoreland's store on West Haywood Street, and watched the French Broad River take the
    Smith Bridge away.
- speaker: Interviewer
  text: You saw that!
- speaker: Respondent
  text: I saw that thing go to hell. Now the railroad trestle withstood all the flood - it never washed away. And the railroad
    trestle was not too old. By the way, my father ran the first locomotive across that trestle. My uncle was the conductor.
    Charlie Robinson was the conductor, as I'm told, was the conductor on that. But we moved out there in that section.
- speaker: Interviewer
  text: So you watched houses and everything going down that river.
- speaker: Respondent
  text: Oh yeah, the river took everything. The water was five or six feet deep around the depot section.
- speaker: Interviewer
  text: We have photographs of it, but it would be hard to imagine otherwise, as the damage was so great.
- speaker: Respondent
  text: Well, interesting thing, people say well, Lake Toxaway, south of here in Transylvania County. The dam washed away.
    Everybody said, "if it hadn't been for that dam washing away and that water coming down the French Broad River, we never
    would have had this flood." But the water doesn't flow this way from Lake Toxaway - it flows south. Into South Carolina.
    So it wouldn't have had anything to do with it.
- speaker: Interviewer
  text: So that dam broke before it got here?
- speaker: Respondent
  text: During the '16. Yeah, it was district wide.
- speaker: Interviewer
  text: Can I back you up a minute? You mentioned all the business down in the depot area. Was that something that the mill
    workers went to, as well as the more upper class?
- speaker: Respondent
  text: Not necessarily. You know where the Dave Steel Company is on Clingman Avenue? Well all that section down through there
    - Roberts Street and Depot Street from the cotton mill all the way to Biltmore Avenue, as up Depot Street, up Clingman
    Avenue - was all businesses. Manufacturing businesses, mill works, or trade stores, or coal companies, or Sands and Company
    was a store for the railroad, S. Sternberg ran a place down there - they bought hides and junk. Ned Wheeler had a brokerage
    house there. Swift and Sternberg ran a place down there. Armour Company was there. Coming on up Depot Street--Southern
    States Bank, then when you turn on up Southside Avenue was J. A. Grove Grocery. And at the corner of South French Broad
    and Southside was a funeral home. And there was an R.C. Bottling Company, and just right on up. The streetcar ran that
    way.
- speaker: Interviewer
  text: So it was full and active. And I guess with the trains coming in there would have been all that -
- speaker: Respondent
  text: It was full and active. Yeah there was a train coming in - well when I went with the post office in 1936, there was
    about 18 passenger trains coming in and out of Asheville every day.
- speaker: Interviewer
  text: And then you had also said, besides Park Avenue, was a place of early higher class development, there was also -
- speaker: Respondent
  text: Well as it developed, and more people came here and wanted to make Asheville their homes, yeah. It was advertised
    as a health resort, mainly for tuberculosis, E.W. Grove was sent here because they thought it would be beneficial to him
    - though he had hiccups. It never cured the hiccups, but that's what brought him here in 1905. But Montford Avenue, was
    a little better section,
- speaker: Interviewer
  text: But before that, you were saying Park Avenue and South French Broad and...
- speaker: Respondent
  text: South French Broad and Biltmore Avenue - South Main it was called.
- speaker: Interviewer
  text: Anyway, you thought those were early developments of high class neighborhoods.
- speaker: Respondent
  text: Yeah, until Grove came along, and then after that there was Grove Park Inn, I mean the Grove Park section and that
    was developed by Grove. And the streets in the Grove Park section, a lot of them were named for E.W. Grove's children.
    Of course that little park off of Charlotte Street had E.W. Grove's office. And as a messenger boy for the Western Union
    in 1923,
- speaker: Respondent
  text: Yes, that was my first job. And that was the same year that Cornelius Vanderbilt married Cecil. But I remember many
    times, we went out there to E.W. Grove's home, which was on the corner of North Liberty and Broad Street, where the Jewish
    temple is now,
- speaker: Interviewer
  text: So it was raised? We were hunting for where it was the other day.
- speaker: Respondent
  text: That's it. It's no longer there.
- speaker: Interviewer
  text: Did he build that house, do you know?
- speaker: Respondent
  text: Far as I know. Far as I know he did.
- speaker: Interviewer
  text: You'd think that would have gotten saved.
- speaker: Respondent
  text: But that was another nice section.
- speaker: Interviewer
  text: Yeah, it's just hard for me to think of central Asheville, the South French Broad area, and Park Avenue - because
    it's so opposite now - of it being the main upper class neighborhoods,
- speaker: Respondent
  text: What my father used to tell me about Asheville, he says, when Asheville was supposed to be first surveyed as a town,
    two surveyors came in here, and there was - I'm not sure if it was John O'Donnell or not, but on the corner of Lexington
    Avenue, which was Water Street at that time, and there was a saloon. And these two surveyors went over and got them a
    bottle.
