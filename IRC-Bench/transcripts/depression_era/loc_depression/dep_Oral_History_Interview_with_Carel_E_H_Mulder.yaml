collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Let's start this afternoon with a little background information on you. Could you tell me when and where you were
    born, to start with?
- speaker: Respondent
  text: Yes, I was born in Amsterdam, the Netherlands, on May 9, 1914.
- speaker: Interviewer
  text: Did you grow up in Amsterdam?
- speaker: Respondent
  text: Yes, I did. I lived in Amsterdam until 1933, except for three years when I was away in a boarding school in the southern
    part of the Netherlands. In 1933 I came to the United States.
- speaker: Interviewer
  text: Did you study English in school?
- speaker: Respondent
  text: Yes, we were required to study in the fourth grade, French, to which was added in the fifth grade, German, to which
    was added in the sixth grade, English. And they were all mandatory. Not only the grammar and so on, but also literature.
- speaker: Interviewer
  text: Oh, in literature, too.
- speaker: Interviewer
  text: And then when you went to boarding school, did you continue with any of these languages?
- speaker: Respondent
  text: It began when I was in the boarding school. I was in the boarding school for the fifth, sixth, and seventh grades,
    and then I went to high school in Amsterdam, to a Jesuit high school. That was a five-year course, which was the equivalent
    of a junior college education here.
- speaker: Interviewer
  text: I see. Did you specialize in a particular field in that school?
- speaker: Respondent
  text: Mostly the commercial sciences. That means foreign languages and bookkeeping and commercial law, civics. That's about
    it. Oh, and economics.
- speaker: Interviewer
  text: Was that your choice, or was that the curriculum of the school?
- speaker: Respondent
  text: In the Dutch educational system you get broad choices. You cannot just pick and choose subjects. At the high school
    level, there are four choices. One is the Gymnasium B, which is Latin and Greek and then lots of science, and that's preparatory
    to medicine, science, and so on. Or there's Gymnasium A, which also has Latin and Greek, and more of the literature, law,
    and such. And then there is what they call the high school. In German they call it the real Schule. That's divided into
    two—A and B again. The first three years are the same, but the fourth and the fifth year, in A you concentrate more on
    political science, economics, the commercial sciences, and accounting; and in the B more biochemistry and physics and
    so on as a preparation for university studies in that field.
- speaker: Interviewer
  text: So you were in the real Schule A.
- speaker: Respondent
  text: That's right.
- speaker: Interviewer
  text: And how old were you when you graduated, then?
- speaker: Respondent
  text: I was seventeen. I graduated in 1931.
- speaker: Interviewer
  text: And then what did you do?
- speaker: Respondent
  text: Then I went to work for a company that handled future trading in commodities. It was the American Produce Trading
    Corporation. That was purely speculative. Only once did we get word that there was a shipment of grain, and that was because
    somebody had forgotten to cancel the order. [Laughter] It was normal that an order would come in and later would be cancelled
    and the price would be higher, and so on. It's the same as what you have here also—the futures market, they call it. So
    I worked on that for about a year and a half until... I forget the exact date, but it was the date of the great bank holiday
    in the United States. That was March 1933.
- speaker: Interviewer
  text: March '33, that's right.
- speaker: Respondent
  text: March 4, wasn't it?
- speaker: Interviewer
  text: I think it was March 6; I'm not sure of that.
- speaker: Respondent
  text: You're right. It was March 6. Well, anyway, I got to the office very early that morning, and I hadn't listened to
    any radio. When I got there we had the teletype machine, and one of my jobs in the morning was to sort the teletypes and
    glue them on paper and put them on the right desk. The floor was just covered with tape because there were lots of cancellations
    of orders, and some people buying; it was just a mess. By the end of that day the chief accountant had already determined
    that the company was flat broke.
- speaker: Interviewer
  text: Is that right?
- speaker: Respondent
  text: Yes. So I stayed another two weeks and then that was the last paycheck.
- speaker: Interviewer
  text: From the cancellations of all those orders?
- speaker: Respondent
  text: Yes, and no business. They were just bankrupt.
- speaker: Interviewer
  text: So in two weeks you were out of a job. Then what?
- speaker: Respondent
  text: Well, then... My father had already emigrated to the United States in 1927. I had an aunt living here, and when they
    heard I was out of a job, and since the situation in Europe was getting bad—that was the year that Hitler came to power
    in Germany—they said I might come to the United States if I wanted. Which I then did; I applied for a passport and came
    here in July of 1933. I didn't have to wait for immigration quotas and so on because I was born with dual citizenship—Dutch
    citizenship and American citizenship.
- speaker: Interviewer
  text: Was one of your parents American?
- speaker: Respondent
  text: 'Yes. Actually, both my parents were American, although at the time they married and when I was born, my father had
    been in America only a year, for the first time in his life. Here''s the story back of that, if you''re interested: my
    great-grandfather was in the Dutch legal service, and he was a prosecuting attorney in one of the counties in the Netherlands.
    Then he was offered the job to be the prosecuting attorney for the eastern half of Java, which he did. Then he later was
    promoted there, and he ended up on the Dutch Indies Supreme Court. Unfortunately, his son married a lady, a half-caste,
    who was the daughter of a Dutch army officer and a member of the royal house in Surakarta, which is in the south part
    of Java. When they married, they were told to get out of sight and not come back. And they were given money to support
    themselves, so they traveled then, via Australia and South America to the United States.'
- speaker: Interviewer
  text: In San Francisco my father was born, and that made him an American citizen. And then they moved on to Florida and
    there my aunt was born; that made her an American citizen. And then they moved on to the Netherlands.
- speaker: Respondent
  text: That is an interesting story. As a result, since I was born of an American citizen, I was an American citizen. And
    my mother had become an American citizen by marriage to an American citizen. Which is not so easy now, but then that was
    automatic. So anyway, that's how I came to the United States.
- speaker: Interviewer
  text: So where did you end up when you came?
- speaker: Respondent
  text: I went to Santa Barbara and went to college there for two years. When I came back in Los Angeles, I was single and
    I lived with my aunt half time and with my father half time. I did some independent accounting in southern California,
    especially for postprohibition wineries and distilleries.
- speaker: Interviewer
  text: In the Santa Ynez Valley, or out in Los Angeles County?
- speaker: Respondent
  text: No, it was in the Los Angeles area. There are a lot of wineries there, you know; not the best wines, but quite a few
    wines out towards San Bernardino. So I kept books for those wineries and had a regular itinerary, visited them all. But
    I found it a rather dull job, not very interesting, so I applied for a civil service job with the state of California.
    In 1936 I was given the job of field auditor in the Department of Social Welfare, and I did that for four years when I
    was promoted, to be auditor in charge of southern California. Then in 1941—I had that job only one year—I was asked to
    come to Sacramento. You may recall there was at that time the State Relief Administration, but by 1940 the economy had
    improved because of the Lend-Lease airplane industry and so on and the preparations for war. So in 1941 the State Relief
    Administration was abolished overnight by the legislature. All the programs that department had, had to be liquidated.
    So I was asked to come to Sacramento to take the job of liquidating the State Relief Administration.
- speaker: Interviewer
  text: OK, well, let's back up a little bit before we do that. Tell me what it was like to work for the Department of Social
    Welfare.
