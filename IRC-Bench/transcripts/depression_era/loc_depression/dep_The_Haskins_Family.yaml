collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Is Mrs. Haskins at home?
- speaker: Respondent
  text: No, she left, but I'm sure she'll be back within a short time. Won't you come in and wait? I knew you're one of my
    sister's neighbors for I've seen you before, even though we haven't been introduced. I'm her sister Mickey from Key West.
- speaker: Interviewer
  text: Are you visiting Mrs. Haskins?
- speaker: Respondent
  text: Yes, I just came to stay for the summer. I know every minute I'm in the house, I keep that radio going. When I get
    up in the morning, the first thing I do is turn it on. If I come in late at night, I turn it on until the local stations
    sign off, then I get an out of town station. I have to play it low then, suppose Paul must get his sleep, but I like the
    golden oldies played full blast when I'm alone in the house.
- speaker: Interviewer
  text: Tell me about the living room.
- speaker: Respondent
  text: The living room extends across the front of the house. To the left side is an open fireplace showing signs of recent
    use. Nearby is a large overstuffed single chair and matching ottoman upholstered in dark brown cloth. Beside the chair
    is a small table containing magazines, among which are copies of Good Housekeeping and Unlearn, a photography publication.
    A floor lamp with a white shade stands next to the chair. The radio is on a small table in the corner. There is a three-piece
    white and brown painted wicker living room set and a long center table which stands lengthwise. On it are a vase filled
    with cut flowers and photographs of the family. At the other end of the room is another wicker living room set painted
    green; the cushions are covered with orange satin. An empty birdcage stands in the far corner. A worn rug is on the floor
    in the center of the room. The floor around the rug is stained with light varnish. Although not luxuriously furnished,
    the room is orderly and clean. Cream colored ruffled curtains and fringed shades hang at the windows. The stippled walls
    are decorated in harmonious colors. On the wall in a gold frame is a picture of an old church worked out in hand embroidery.
- speaker: Interviewer
  text: What is the significance of the embroidery?
- speaker: Respondent
  text: It was made many years ago by Paul's mother. I treasure it above all else.
- speaker: Interviewer
  text: Can you show me the Seven Dwarfs?
- speaker: Respondent
  text: Come on in and I'll show you the Seven Dwarfs. There's no telling when sis'll get back; she said she wouldn't stay
    long but she is going to stop in and see a precious one. When those two Key West Conchs get together, they don't know
    when to stop talking.
- speaker: Interviewer
  text: Tell me about the bedroom.
- speaker: Respondent
  text: The bedroom loads off the right side of the living room. The furnishings consist of a double iron bed painted green,
    a dresser and chair painted the same color. The bed is neatly made and covered with a green tufted spread. A coney rug
    which looks quite new is on the floor. To the left of the bedroom a door leads into the bathroom, which, like all the
    other rooms, is spotlessly clean. The walls are painted white with blue trimmings; the old fashioned tub is of white porcelain.
    In front of the lavatory there is a throw rug; blue and white linoleum covers the floor. A built-in medicine chest with
    mirror is above the lavatory. The bathroom is not connected with any rooms but the one bedroom.
- speaker: Interviewer
  text: What about the sleeping porch?
- speaker: Respondent
  text: Adjoining the bedroom is a sleeping porch, shaded with wooden awnings. This porch extends along across the back of
    the house. One end is furnished with a double iron bed painted a cream color and an iron set. The neatly made beds are
    covered with crisp white spreads. A 'gangels' rug is on the floor at this end of the porch. Near the bed is a small table
    on which stands a boudoir lamp, a chest of drawers painted cream color and chair to match stand against a wall. A mirror
    hangs over the chest. At the other end of the porch are a Maytag washing machine, another empty bird cage, and a small
    table cluttered with two electric toasters and various odds and ends. A clothespin bag hangs on the wall and a large,
    round basket filled with freshly washed clothes is on the floor. A folding ironing board stands against the wall. The
    varnished floor is bare at this end of the porch.
- speaker: Interviewer
  text: Tell me about the family dog and puppies.
- speaker: Respondent
  text: Here is the increase we've had in the family, says Mickey pointing to a large box on the floor in which lay a beautiful
    long-haired white dog with brown spots. Seven little puppies are scrambling around her, all trying to nurse at the same
    time. All of them are white with spots except one, and it is black. Murdock christened them the 'Seven Dwarfs.' This is
    Lady! Mickey pets the mother dog who is wearing a watchful expression. Mickey picks up one of her puppies and hands it
    to us. You can have one if you like, but it would have to be a girl dog, she says. She only had two males and they're
    already promised, says nobly as she puts the puppy back in the box.
- speaker: Interviewer
  text: Do you have birds?
- speaker: Respondent
  text: I am very fond of birds, but I have no luck with them. I had the prettiest pair of grey love birds before I moved
    here. One of them got sick and died; it was not long before the other one died too, from grief, I reckon.
- speaker: Interviewer
  text: Describe the kitchen.
- speaker: Respondent
  text: From this end of the porch, a door leads into a small kitchen. The furnishings consist of a 5-burner oil stove with
    a stationary oven at the right side, a kerosene motor heater, a good sloped wooden tea-box painted white, a white wooden
    Utah cabinet, built-in dish closet, white porcelain kitchen table and six chairs. The floor is covered with brown and
    white checked linoleum. Crisp white curtains hang at the small windows over the sink. A large aluminum pot containing
    black beans is on the stove.
- speaker: Interviewer
  text: What is Paul’s favorite dish today?
- speaker: Respondent
  text: Paul's favorite dish today is 'frijoles noire' or as well as I do that's yellow rice and black beans, see some pork
    chops in the mood, says Nob as she stirs the beans.
- speaker: Interviewer
  text: Tell me about the dining room.
- speaker: Respondent
  text: Adjoining the kitchen is a small dining room. A round oak table with six matching chairs, an old fashioned sideboard
    with mirror, and a small set of shelves containing knickknacks comprise the furnishings. The sideboard is filled with
    shining glassware and a vase of cut roses is in the center of the lace covered table. There are two windows with curtains
    that match those in the living room.
- speaker: Interviewer
  text: Who just arrived?
- speaker: Respondent
  text: As we reenter the living room a tan Chevrolet van stops in front of the house. There's sis now, says Mickey as Mrs.
    Haskins comes up the walk.
- speaker: Interviewer
  text: Describe Mrs. Haskins.
- speaker: Respondent
  text: Mrs. Haskins does not look her 35 years. Small in stature, she has a very neat appearance. Her freshly laundered print
    dress is becoming and harmonizes with her tan silk hat and brown leather pumps. Her black hair has a boyish bob and she
    wears pearl earrings. She has sharp, brown eyes. Unlike her sister, she is very thin.
- speaker: Interviewer
  text: How often does Mrs. Haskins keep going in and out of the car?
- speaker: Respondent
  text: Who keeps going all day long? I'll bet she shoots in and out of that car 25 times a day, says Mickey.
- speaker: Interviewer
  text: Have you been waiting long, Mrs. Haskins?
- speaker: Respondent
  text: Never you been waiting long? I'll be with you in just a few minutes. She busies herself about the kitchen, telling
    Mickey what to do to prepare lunch.
- speaker: Interviewer
  text: Tell me about Paul’s work.
- speaker: Respondent
  text: Paul comes home to lunch; he likes good hearty meals and he needs them too, for he works very hard. He has been a
    car repairer for the Florida East Coast for the past 14 years. His hours are from seven to four every day with an hour
    for lunch. Of course, he might be called on the job at any hour of the night if necessary and he has to be ready to go
    at a moment's notice in case of accident. If he wants a visitation, he has to take it without pay and that's not so good.
    He has taken only one in all the years he has worked for the railroad. I think he needs a rest and I'm going to make him
    take two weeks off this summer. The men who are paid monthly get two weeks off with pay, but those who are paid semi-monthly
    get none unless they take it without pay. But he has steady work all year round and that's something to be thankful for.
    He could get passes on the railroad but he seldom takes advantage of this, for most of our folks live in Key West and
    if we take a trip we go there in our car.
- speaker: Interviewer
  text: How do you manage your finances?
- speaker: Respondent
  text: Paul gets paid pretty well for his work and we make our income from our moods. He lets us handle the money. I try
    to spend it wisely and put by what I can for a rainy day. I reckon we spend too much on food. Our grocery bills run high,
    for I cook three good meals a day and all of our family have good healthy appetites.
- speaker: Interviewer
  text: What was Paul’s work before the railroad?
- speaker: Respondent
  text: When we were first married, Paul worked for a wholesale house in Key West and we could hardly manage on the salary
    he made there. He was dissatisfied so he studied at night through a correspondence course and learned this trade, train
    mechanic. Then he completed the course, he had no trouble in getting a job with the railroad. He worked in Key West until
    about three years ago, when he was transferred to the shops at Fort Lauderdale, and later to Miami. At first, I didn't
    like it here at all, but now I'm getting used to it. I didn't care much for Lauderdale either, although we have made a
    lot of friends there. We rented this house because it's near the shops and too, the children don't have very far to go
    to school.
- speaker: Interviewer
  text: Tell me about Paul’s character and family views.
- speaker: Respondent
  text: Paul is an exceptionally good man, a real home body. He spends very little time or money on the outside and he is
    extremely fond of children. If he'd have his way, I'd have a baby every year. Now I like Murdock too, but I believe that
    people with a limited income shouldn't have large families. Considering our income, I think two children are sufficient.
- speaker: Interviewer
  text: What are your hopes for your children’s education?
- speaker: Respondent
  text: Paul and I agree that school training is very important and we hope to be able to give the children a better education
    than either of us have. We want Murdock to study electrical engineering and go to college if possible. Celia is so young,
    we haven't made plans for her as yet. I believe in letting a child choose his own trade or profession. Of course, the
    parents should offer suggestions toward their choosing but I believe it is a mistake for them to insist on a certain course
    of study for which their child has no preference. Now, if Celia shows an inclination to be studious, I'll do all within
    my power to send her to college when the time comes.
- speaker: Interviewer
  text: What is your own education background?
- speaker: Respondent
  text: I went through the 10th grade in school and could have gone higher but I didn't like school. Paul went through the
    12th grade. We were both born and raised in Key West. Some people think the city would really grow and amount to something
    if they could bury about 10 people down there who control everything. I find living in Miami higher than Key West. For
    instance, I paid only $10 a month rent there, whereas we pay $30 rent here. We rented this house for one year, furnished,
    although some of the furniture is mine.
- speaker: Interviewer
  text: How do you manage transportation?
- speaker: Respondent
  text: While we lived in Key West we got along nicely without a car but when Paul was transferred to Lauderdale we bought
    this Chevrolet. It would be hard to get along without a car here. Usually, he takes it in the morning, or if I want the
    car, I keep it and call for him at four o'clock. I like to visit around a little in the afternoons or go to town. He said
    he'd walk home to lunch today, the weather is so pleasant.
- speaker: Interviewer
  text: What are your future housing plans?
- speaker: Respondent
  text: We hope someday to own a home of our own, possibly in Key West, that is if they ever build the railroad back and Paul
    can ever get transferred down there again. I just love to 'piddle' around with a flower garden. If I'd have my way I'd
    have a bouquet of freshly cut flowers in every room. To me, it gives a cheerful, homey atmosphere. There is very little
    room for a garden here, we have no back yard to speak of. The space between the two houses is used for clothes lines.
    In Key West, Murdock and I kept a lovely noisy garden and did all the work ourselves.
- speaker: Interviewer
  text: How is your health and medical care?
- speaker: Respondent
  text: I am thankful to say we have good health so we spend very little money for doctors and medicines. Celia did have 'whooping
    cough' last fall and the cough lasted so long I took her to Dr. Nusus. He said one of her lungs was affected and advised
    me to put her to bed for a month. He prescribed cod liver oil and quinine and she got along just fine. She was six years
    old last November and began school this semester.
- speaker: Interviewer
  text: Is Murdock home for lunch?
- speaker: Respondent
  text: Here's Murdock coming home for lunch, is everything ready, Micker? she calls to the kitchen. Bring 'em on sir, everything's
    okay. I set a plate for Mrs. Burnell too, replies Mickey.
- speaker: Interviewer
  text: Describe Murdock.
- speaker: Respondent
  text: Murdock is a fine healthy looking boy, taller and more robust than the average boy of thirteen. Blond haired and blue
    eyed, he is neatly dressed in a light blue shirt and dark trousers. He is well mannered and after a few words, he walks
    into the kitchen.
- speaker: Interviewer
  text: What is your daily routine?
- speaker: Respondent
  text: Paul gets off at 12:30, so Murdock eats and goes on back to school. I keep going all day long. I get up at quarter
    of six and cook a hearty breakfast for Paul. After he leaves, it's time to get the children up for school. Mickey likes
    to sleep late in the morning. I take Celia to school then I tidy up the rooms and plan my marketing, which I do later
    in the morning. Since I bought the washing machine, I do all the laundry at home. I used to send the clothes out to the
    wet wash, but I like this ever so much better. The clothes smell so sweet and fresh when I take them off the line, different
    than when they come back from the laundry.
- speaker: Interviewer
  text: Who just came in?
- speaker: Respondent
  text: Here's Paul coming up the street now, she exclaims.
- speaker: Interviewer
  text: Describe Paul Haskins.
- speaker: Respondent
  text: Paul Haskins looks older than his 35 years. He is tall and well built and his thin black hair is gray at the temples.
    He has a rather prominent nose, large brown eyes and is fairly good looking. He is wearing khaki colored shirt and trousers
    that are neat and clean. As he enters the room, he smiles pleasantly.
