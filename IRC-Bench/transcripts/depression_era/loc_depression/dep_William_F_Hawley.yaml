turns:
- speaker: Respondent
  text: Jacksonville in the 1880s, said Sr. Money. One of those was Sawa, a middle-aged sawed woman who traipsed over the
    streets and up alleys, gathering whatever there was visible of food, cast-off clothing, bottles, or anything she could
    make use of. She carried a large wicker basket on her right arm which was soon filled with odds and ends. Then she held
    her worn skirts, wadded the hem at her waist in the back, thus making a makeshift catch-all of the front portion. She
    was a funny sight as she waddled homeward, with her filled basket and her back bent with the sight of stuff she had gathered
    up in her skirt. Incidentally, she originated what was probably the first short skirt in our city streets.
- speaker: Respondent
  text: 'Another was Uncle Gabriel who waked up and, blowing blasts on a long tin trumpet, after which he would proclaim:
    ''Steals man who ain''t lying won''t steal. Trumpet says so.'' Gabriel was an ex-slave of the past, little off in the
    upper story, but he had entree to the kitchens of local citizens via the back door, and never went hungry. He was harmless,
    but peculiar. People were kind to him, and even the children were not afraid to talk to him, as he was a familiar sight.
    When he thought it was near meal time, he just went through somebody''s yard to the back door, opened it and helped himself
    to any food in sight.'
- speaker: Respondent
  text: There were many of the Kingsley slaves in Duval County, always distinguished by their fine manners and good behavior.
    Some, including Kingsley himself, built their own vessels and boats, risking in the traffic of negroes. On one of his
    trips to Africa, he dealt with an African chief or head man of the tribe, who had a very beautiful daughter. Kingsley
    married her, and she was of great assistance to him, as he would unload these gibbering Africans at his Fort George plants.
    She, called 'Maim Anna', would take them in hand, train them to work, and to talk English. Maim had two very handsome
    daughters, with dark olive skins, and black wavy hair, but showing traces of their negro blood in their hands and dark
    eyes with large whites. Maim had his eight sons educated at the best colleges in the east, and when they became of marriageable
    age, he inserted an advertisement in the New York Times offering a dowry of $10,000 cash to honest and satisfactory young
    men who were willing to marry them, with knowledge of their ancestry. John, a commission from New York, married Martha,
    and the other married a man by the name of Maxton. The Maims lived on the south side, but the other couple boasted in
    the north somewhere, although they stayed for a while near Jacksonville. The estate from Nassau to Cedarwood on the St.
    Johns River was for many years known as Maim's, the spot where their home was.
- speaker: Respondent
  text: Mr. Swale was engaged in the sawmill business, and my custom in handling shipments often took me to his home. Mrs.
    Swale was highly educated, well-mannered, and friendly, but while she looked after the comfort of any visitors in polite
    fashion, she never sat at the table with Mr. Swale and his business associates. As a landowner, he owned a large number
    of slimes. No one protested against Swale, and one day made a Republican speech on the corner of May and Zine Streets.
    Quite a crowd gathered, some booms threatening, so he cut short his speech, made a run for the river where a boat awaited
    him with one of his slaves. With ears in hand, he jumped in, and was rowed to a rate, where he bought a schooner and left
    for the north, just one lap ahead of a highly armed committee who were bent on vengeance.
- speaker: Respondent
  text: In preparation for his journey north, he had deeded his property to a woman named Nosily. In the early 1910s during
    the reconstruction period, he came back, got his land back in his own name, and resumed business at the old stand.
- speaker: Respondent
  text: Kingsley told me before I came to Jacksonville, I used to like to talk to Mrs. Beanie, she was so intelligent, and
    am sorry now I did not make notes of the interviews. As the history would be worthwhile, there are two rows of stately
    palmettos forming a wide avenue from the water to the site of the old plantation home of her other ancestors. She told
    me of helping to set out the Seamless hut two sons who were situated at Heidelberg University in Germany.
- speaker: Respondent
  text: The boys left Jacksonville and made their homes in Washington, D.C., where one of them for thirty years or more had
    a splendid job in the U.S. Department of Agriculture.
- speaker: Respondent
  text: I have been told that Mrs. Swale attended the Centennial Exposition in Philadelphia in 1876 and registered at a different
    hotel every night on account of her color. She was a fine-looking woman, stately, and with charming manners.
- speaker: Respondent
  text: One of the Kingsley negroes used to work about the J. & H. W. R. A. station and one day showed us his manumission
    papers, a manumission document.
- speaker: Respondent
  text: Another funny character was Guy Furman, who was a snake charmer. If anyone heard of a big rattlesnake in the neighborhood,
    they would send for Guy. He would capture it and go up and down the streets giving exhibitions in snake handling. Finally,
    a circus hired him, and he was sent to Atlantic City, New Jersey, where he opened a kind of side show as a snake charmer.
- speaker: Respondent
  text: The city authorities gathered him up with his box of snakes and sent him off to jail for operating without a permit.
    Trouble started among the other city guests who were afraid of snakes and not particularly interested in a colored snake
    charmer, so the police remitted his fine and he picked up his pets and walked out. The snakes would sometimes bite him,
    but he always carried a little bottle of alai mixture, a secret formula he claimed to have received from the Indians and
    would put a few drops on his tongue, seemingly suffering no harm from the reptiles' bites. He would never divulge to anyone
    what this mixture was composed of.
- speaker: Respondent
  text: There were a good many florists in Jacksonville, one of whom, named Robinson, made a specialty of cultivating violets.
    When President Grover Cleveland brought his bride here on their wedding tour in the late 1880s, they stayed at the St.
    James Hotel, and Mr. Robinson, who was a overseer and director of the lovely Mrs. Cleveland, threw a large bouquet of
    perfect purple violets in her lap as their carriage passed along in front of his place of business. She smiled in gracious
    acknowledgment and later wrote him a note of thanks, which he prized very highly. Mr. Robinson, quite elderly, is still
    living somewhere in Jacksonville.
- speaker: Respondent
  text: 'Another familiar character was a little white woman known as ''Hailing''. I never knew her name nor heard her referred
    to in any other manner. She smiled in a friendly way at everyone as she passed along, whether she knew them or not. My
    first contact with her was one hot day messing on the sea-board walk along St. James Kirk to Monroe Street. We were sitting
    flat down on the board, and as I came along, she took off her shoe, and looked up as she pulled out a two-and-a-half-inch
    sliver that had run through the thin sole of her slipper, and holding it up, she said, with a gracious smile: ''Now, I
    ask you, isn''t that an awful waste for a lady to have in her shoe?'' She was small, always dressed very neatly, and the
    smile was never failing.'
- speaker: Respondent
  text: I believe I forgot to say that during the yellow fever epidemic of 1888, when the town was quarantined, the Clyde
    Line steamboats stopped running. They resumed operations, however, on December 16th, and that night there was a welcoming
    reception, the Nilsen battery came out and shot off several salvos, there was a dance, and a good time generally.
- speaker: Respondent
  text: There was usually a good band of some sort available. One of the best known was the Welcome Cornet Band, the leader
    was a blind man who was led always by a little colored boy. Then there was Lucy's band, and there were two or three very
    well trained local companies of colored minstrels. They gave entertainments at the Park Opera House, on the corner where
    the Western Union building now stands at the corner of Laura and Duval Streets.
- speaker: Respondent
  text: In 1901, after the Yark Theatre burned, there was a temporary structure erected, and later on the Duval Opera House
    at Monroe and Main Streets, very well equipped for that period, and everything was held there in the way of receptions,
    entertainments, recitals, etc.
- speaker: Respondent
  text: Sailboats and excursions on the river were popular, and there were often boat races which occasioned great excitement.
    When I came here, the levee was lined with steamboats, both passengers and freighters, and if you came along towards the
    wharf with a suitcase, indicating you were going to board a steamer, the little negroes would almost knock you over in
    the scramble for one to carry your bag aboard for a quarter.
- speaker: Respondent
  text: John Clark and his family were northern people, and when the War between the States occurred, they put their grocery
    stock on a steamer and went away, but returned after peace was declared, opened the store, and did business as usual.
- speaker: Respondent
  text: I am very proud of Jacksonville. It has weathered fires, fevers, storms and other disasters, and progressed right
    along.
- speaker: Respondent
  text: In 1891 there was a big fire which started in the dam store of Mum, Stockton and Knight at the foot of Main and Orange
    Streets. This was a new, five-story structure, and the fire started in a collection of shavings and packing material at
    the elevator shaft. The flames were leaping from the rooftop before the alarm spread. The fire cut on the east side of
    Main to Forsyth, jumped the street, took the Produce Bank Building, and then went out again, sweeping both sides clean
    of buildings to Church Street before it was checked.
- speaker: Respondent
  text: Where the Bindle Hotel is located, stood far Windle Smith, his father, Mr. O. B. Smith had a grocery store. Next was
    a vacant lot with a deep cave where a limited amount of dynamite was always stored. This afternoon, however, some had
    returned, so that a larger quantity than usual was in the case. The main stock was stored outside the city limits in regular
    powder magazines. The U.K. Douglass printing place adjoined the vacant lot, and as Mr. Douglass and I were struggling
    to get his desk through a window, the dynamite went off, the Smith building was lashed to the ground, and we ran for our
    lives. Beyond the vacant lot was the old Savoy Theatre, which was also destroyed in the fire.
- speaker: Respondent
  text: The grocery stores were in long buildings filled with all sorts of supplies in use at that time in addition to groceries;
    the fronts were open, and at night a loud by fastening the shutters. Shelves held the small packages, with barrels behind
    the lens counters for sugars, meal, flours, etc.
- speaker: Respondent
  text: In 1881, Mobori Jones opened a first-class grocery store, very attractive in its white paint, with closet shelves,
    show cases, and a high grade stock. He sold for cash, which was also a novelty, as the old stores did a big credit business.
    The store was on West Bay Street, just off of Laura. He did a fine business until the yellow fever epidemic next year,
    when he was compelled to close his store, which was a loss.
- speaker: Respondent
  text: One thing I will admit in favor of yellow fever. I suffered a streak of typhoid fever twenty-five years ago, which
    was long-drawn out and very debilitating, but I would rather have yellow fever which lasts only a few days than one siege
    of typhoid. By the way, after I had the yellow fever, my health improved, and I seemed immune to all diseases. Yet so
    bad, eh?
