collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Can you tell me about the early days of country schools in western South Dakota?
- speaker: Respondent
  text: White men did not enter western South Dakota in any great numbers until 1876 so the 1880's, 1890's and 1900's were
    frontier times in this area. The land west of the Missouri was opened up to homesteaders in 1904 and people came seeking
    free land and gave no thought to how impossible it would be to make a living by farming on the Great Plains. The early
    days were tough times for the first pioneers in western South Dakota and the hardships they endured are reflected in the
    schools of that era. Over and over one hears or reads about how hard everyone struggled to have a school and to get their
    children there to attend it.
- speaker: Interviewer
  text: How were the first schools established in these communities?
- speaker: Respondent
  text: When enough families had come into a locality to warrant the opening of a school, the district was organized and the
    schoolhouse built, or more likely, for the first years an abandoned dugout, claim shack, or sod or log house was appropriated
    for a school until a regular school could be built. A board of directors was elected and education began. Often times,
    a community would establish a school by providing a building and a supply of fuel and the county furnished the teacher.
- speaker: Interviewer
  text: Can you share any specific stories about early schools or teachers?
- speaker: Respondent
  text: Esther Darling told of her first school, 'A young lady of eighteen years walked across the prairie for two miles with
    two of her pupils to a new frame school building supplied by two of the three patrons so they could keep their children
    home instead of boarding them out. This was in Carlin District No. 92 in Haakon County. Desks, books and supplies had
    been gathered from other schools in the large district and fitted into the little unpainted building.'
- speaker: Interviewer
  text: What were the conditions like in these early school buildings?
- speaker: Respondent
  text: Often the building they provided was not in very good condition. No sod building used then still exists although there
    are people who remember when one still stood in Lawrence county. Few old log buildings still stand unless they have been
    covered and look like a frame building now. Some which did exist were the Bower school which was a log building with a
    dirt roof and the Bakersville school in what is now Custer State Park. John Colman spoke of the first school he attended,
    'I attended school in what was jokingly called Mud College, a log building with a plank roof covered with dirt, it was
    very warm and comfortable.' The first Harrison Flat schoolhouse was built by men of the community. They hauled logs from
    the Black Hills. It was built with notches and holes for guns and during an Indian scare Elvira Gothel and the children
    went with other families to the schoolhouse for protection.
- speaker: Interviewer
  text: Are there any historic school buildings that have been preserved?
- speaker: Respondent
  text: The Cold Spring school in Custer county is one log school building which has been saved and has been put on the National
    Register. It was built in 1887 by the Bowman brothers and Johnny Haver, all of whom lived in the valley where it sits.
    It has been restored and lovingly preserved by the old people who went to school there. Most of them are too old now to
    cope with the problems of its upkeep but because of one man's devotion to his neighbors it is preserved. Den Heed and
    his wife, Gladys, spend several days a year building fence, organizing picnics and dinners, making sure the grass is cut
    and that the building is safe. It was falling down and the Forest Service whose land it is on wanted to pull it down,
    when the Reeds and their neighbors intervened and saved it.
- speaker: Interviewer
  text: What about other log schools that have not been preserved?
- speaker: Respondent
  text: Another historical log school in the Black Hills built at about the same time which has not been saved is the Glen
    Erin school on Hazelrodt road east of Custer. It is tumbling down. The Cold Spring schoolhouse has the typical high ceiling,
    windows on both sides and sits on quite a high foundation. The Glen Erin school was a typical early day log cabin with
    low roof, eaves probably not six feet from the ground, and a few small windows. It did not look much like a schoolhouse
    but must have been cozy and warmer in winter than the high-ceilinged Cold Spring school.
- speaker: Interviewer
  text: Were all log buildings comfortable and warm?
- speaker: Respondent
  text: The Mountain school in Red Canyon school district was a log building which was taken down log by log and set up again
    on the Killer ranch nearby to be used as a machine shop. One of the teachers there, in his end-of-the-year report, answered
    the question, 'How was the school ventilated?' by replying, 'Windows and cracks.' Not all log buildings were cozy and
    warm.
- speaker: Interviewer
  text: What about sod buildings and dugouts used as schools?
- speaker: Respondent
  text: Sod buildings were warm but by necessity had small windows. Some dugouts were comfortable but some were not. Mr. Seppala,
    in talking about his boyhood north of Buffalo in Harding county, mentioned going to school in a dugout which was 12 by
    16 feet. There was a Christmas program that winter and everybody came but he wonders now how they managed to accommodate
    everyone. Pearle Rietmann taught in a dugout in Meade county and remembered how uncomfortably cold it was. The children
    and she had to go to a nearby creek and pick up branches and twigs to burn. She said, 'I don't think we were comfortable
    at any time.'
- speaker: Interviewer
  text: Were schools ever held in private homes?
- speaker: Respondent
  text: On lower French Creek, the community was somewhat isolated. The schoolhouse was located quite a distance from the
    homes of the students so several vacant houses took their turn as a schoolhouse. The old Bower log house was used for
    several terms, then the Art Hedlun house served its turn. Alta Currier said, 'We moved to the homestead six miles southeast
    of Fairburn. Our school days were really an effort. My first school was in the George T. Wagner home on South Fork. The
    second year we had school in Lillian Kimball's homestead house.'
- speaker: Interviewer
  text: What were claim shacks and how were they used as schools?
- speaker: Respondent
  text: Many schools were started in claim shacks, little tar-paper-covered buildings with one window and a door, sometimes
    as small as 10 by 12 feet. They were not built to be permanent dwellings but were built for shelter for the year it took
    to prove up on one's homestead. Once the year was up and the land in possession, the homesteader often sold it to a nearby
    neighbor and left. His claim shack stood unattended. As families moved into the area or moved away, the population shifted
    frequently. Some schools moved from little claim shack to claim shack following the center of population. This went on
    in some places until the early 1920's. It is not surprising that not many really old schoolhouses exist in the West River
    area.
- speaker: Interviewer
  text: What happened to these early buildings as the area became more settled?
- speaker: Respondent
  text: Almost all of these buildings are gone now. As the country became more thickly settled and there was more money, they
    were replaced with frame buildings, uninsulated, high ceilinged, and hard to heat. Many of them were unpainted to keep
    taxes down. Some were stuccoed to make them warmer and to avoid having to paint. The Burdock school in Fall River county
    was stuccoed and never painted. With the years it has turned exactly the color of the gumbo it sits on.
- speaker: Interviewer
  text: Were there disputes about where to locate schoolhouses?
- speaker: Respondent
  text: There was trouble sometimes about where to put more permanent schoolhouses. There was a problem in 1917 about the
    location of the Soper school. The schoolhouse was about three miles from Watson's and less than two miles from Mann's
    ranch. The Watsons complained. In order to settle the matter fairly, Mr. Blaine, school board president, and Mr. Mann
    measured the distance from Mann's house to Watson's house. They tied a rag onto the rear wheel of a spring wagon and counted
    the revolutions. There were 2508 revolutions of the wheel which had a circumference of 4 feet, 10 inches. That made the
    distance 1798 rods when they had computed revolutions times circumference. 1798 rods equaled 5.6 miles. Halfway would
    be 2.8 miles from each. Mann and Blaine, members of the board, and other interested patrons met at the halfway point and
    chose a new location for the school on the S.W. corner, SW 1/4 of SW 1/4 of sec. 2 Tn 5S R 1 E. B. H. M., 2.96 miles from
    Watsons and 2.65 miles from Manns. There it still sits today where the road makes a sharp turn past it. Its name was changed
    from the Soper school to the Lauzon school which it is still called.
- speaker: Interviewer
  text: Did school names change often as well?
- speaker: Respondent
  text: The names of the schools shifted in early days almost as often as the buildings themselves. It was a community joke
    north of Buffalo in Harding county; they moved the schoolhouse so often they kept runners under it.
- speaker: Interviewer
  text: What state regulations affected school buildings?
- speaker: Respondent
  text: South Dakota had state laws and regulations about all manner of things concerning schoolhouses. One State Board of
    Health regulation said that 'the glass area of windows shall equal 1/5 of the floor area of the school room.' Building
    plans for new school houses were to be submitted to the State Department of Public Instruction before construction began.
    In a report by the State Planning Board in 1937, it was reported that half of the common school districts had failed to
    comply with this regulation.
- speaker: Interviewer
  text: Were there regulations about airspace per child in schools?
- speaker: Respondent
  text: Another important ruling was about the amount of airspace per child. That was the reason for the high ceilings. A
    school was to have only a certain number of children living the closest to some one nearest their home and after that
    number was reached, the children had to be taken to another school instead of the one nearest their home. This did not
    happen very often in sparsely settled ranch country. One wonders if they really needed to worry, with the way the wind
    must have blown in around the windows.
- speaker: Interviewer
  text: What was the condition of school buildings in the 1930s?
- speaker: Respondent
  text: In 1937, 19.5 percent of the 422 districts which reported, needed new buildings or additions. That was 824 buildings
    which were needed. At the same time, 38 percent or 161 of the schools reported that they needed additions.
- speaker: Interviewer
  text: What was the age distribution of schoolhouses in the mid-1930s?
- speaker: Respondent
  text: 'In a 1934-35 survey, the ages of the schoolhouses were as follows: 600 schoolhouses less than 5 years old; 1800 schoolhouses
    were 6-20 years old; 400 schoolhouses were 21-25 years old; 300 schoolhouses were 46 years or older; 20 schoolhouses were
    66-70 years old and still in service.'
