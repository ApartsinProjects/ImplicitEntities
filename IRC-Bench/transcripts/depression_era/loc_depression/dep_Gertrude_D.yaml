collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I've worked in Reliable Packing Co. for the last 6 years, mostly in Sliced Bacon. I just wrap up the bacon as it comes
    out of the slicing machine, in those cellophane wrappers, and stack them. I have lots of fun at work, we kid around with
    the guys all the time. Sometimes we fry bacon on a little electric plate that we plug up to one of the machines. A bunch
    of us always eat together. We even make coffee. It's against rules to cook anything, really. You're supposed to use the
    cafeteria. But the boss don't care, he comes around lunch time and we make him eat with us. He likes our gang. Some of
    the old Polish women get sore as heck because he treats us better than them. They don't like to see young girls and fellows
    have a good time, but we don't do anything. We just monkey around a little bit, that's all. They're just jealous 'cause
    they can't.
- speaker: Respondent
  text: I get paid by the hour. It's pretty nice where I work. It gets cold, but I don't mind. I got two weeks vacation with
    pay this winter, I took another week off without pay, the boss let me off, and I went to Florida. Did I have fun! I was
    flat broke when I came back.
- speaker: Respondent
  text: We have a union in our place. It's the Employees Mutual Benefit Association. We have dances and socials, bunco parties,
    things like that. We have our Grievance committee, all that. Of course, the CIO had to come butting in where they weren't
    wanted and lots of people joined but my gang didn't and I'm glad. I'm satisfied with my job and I got no kick with the
    company. Why should I worry about somebody else's troubles on the job? I pay my dues to the Employees Association and
    always will. They're just jealous of anybody with a good job, and they join the CIO and try to get the company to give
    them all the easy work. Some of them in the CIO union won't even talk to us anymore, can you imagine that! We get along
    at work better than any of them, so we don't pay any attention to them.
