turns:
- speaker: Respondent
  text: My husband had left employment in Mississippi paying 30 cents an hour to take a job at the Arsenal for 65 cents an
    hour. We moved into apartment 15F which rented for $32 a month. It was a 2-bedroom apartment heated with a coal furnace.
    The bathroom had a shower, a lavatory and toilet, but no bathtub. We heated the water with a heater connected to a large
    tank. The clothes line was in the front yard and the water so discolored my wash that I was hesitant to hang my laundry
    outside.
- speaker: Respondent
  text: The family was happy and content. We later bought land outside of town and built a home. I still live here with my
    daughter and grandson.
- speaker: Respondent
  text: The Arsenal is still here but obsolete. However, the National Guard has training facilities there and it could be
    made functional if the need should arise, as it was during the Korean War, the Cuban Missile Crisis and Vietnam.
- speaker: Respondent
  text: The population of Windham is now about 3000. Many new homes have been built and a new elementary school. Life goes
    on but at a much slower pace.
- speaker: Respondent
  text: 'In order to understand the magnitude of the effect the Ravenna Army Ammunition Plant had on one small town, some
    background of the Arsenal is needed: The Arsenal consisted of 22,000 acres of farmland and forest when purchased by the
    government in 1940. It was in full operation in 10 months and employed over 18,000 workers.'
- speaker: Respondent
  text: In 1940 Windham Village had a population of 316 with no water system, no sewage system, no gas lines, no police department
    and definitely no extra housing. Then enter the government - building sewage and water systems and 2000 housing units.
    The population grew from 316 to 5000 in a year and was the fastest growing town in the United States.
- speaker: Respondent
  text: 'The Maple Grove Housing Project, as it was called, encompassed 117 acres of land. The housing buildings that were
    built were of six types: A, B, C, D, E, and F. The buildings consisted of the following types of apartments ranging from
    three to six rooms. The buildings were built between 1942 and 1943. They rested on wooden posts which set on concrete
    piers that were below ground. The floors were of varnished oak flooring. There was no insulation in the walls, and the
    units were heated with coal furnaces. The plumbing fixtures consisted of a kitchen sink and the bathroom had a shower,
    lavatory and a toilet - no tub. The pipes were galvanized iron. The rent for a three bedroom unit was $39.50 and for an
    additional $6.00 a month a person could have it furnished. Some of the housing units still exist, but many have been torn
    down. The ones in existence are rented as low cost housing. The unit that rented for $39.50 in 1943 now rents for $340
    unfurnished.'
- speaker: Respondent
  text: The Project also included a community building which had a theatre with a seating capacity of approximately 400, a
    library, doctor and dentist offices and various other rooms. A small shopping center consisting of three stores and a
    gas station was built along with an elementary school. The shopping center no longer exists, but the school is still being
    used today.
- speaker: Respondent
  text: The year 1944 was a turning point for the Chase family. Employment in Panola County, Sardis, Mississippi, was critical.
    Charles Chase's job for the Prisoner of War Camp, Como, Mississippi, was terminated.
- speaker: Respondent
  text: The employment office in Sardis, Mississippi, had a list of employment available in Ravenna, Ohio - the Ravenna Arsenal,
    Inc. Charles and a couple of friends were sent by the employment office to work at the Ravenna Arsenal, Inc.
- speaker: Respondent
  text: They lived in the dormitory on the arsenal site. Later the family moved to Windham, Ohio and rented an apartment known
    as the Windham Project. A three-bedroom apartment rent was $48.00 a month. The apartment was heated with a coal furnace.
    The bathroom consisted of a shower and no bath tub.
- speaker: Respondent
  text: Tragedy came on a Saturday morning. The apartment caught fire. The two youngest children were asleep upstairs.
- speaker: Respondent
  text: Charles broke the rear door to the apartment, cutting his hand, but the children were rescued with minor burns.
- speaker: Respondent
  text: When the Windham Estate Homes were accepting applications to build individual homes, they visited the model home and
    Charles saw the upstairs had no exit door. He never forgot the apartment fire that could have ended in tragedy without
    that exit.
- speaker: Respondent
  text: Later they purchased land out of the Village and built a home. Chase made sure the house plan had a back door.
- speaker: Respondent
  text: I attended Portland Grade School from first grade through the eighth. I then went to Racine High School for one-and-one-half
    years, quitting when I was fifteen years old to go to work in the oil field. My father had always worked in the oil fields,
    and I had helped him. That is where I got some of my experience.
- speaker: Respondent
  text: I also carried the mail across the Ohio River in a row boat. I rowed across and back three times a day for $35.00
    per month, and I was making $35.00 per month in the oil field for a total of $70.00 per month. In 1940 that was good money
    for a sixteen year old boy.
- speaker: Respondent
  text: I bought a motorcycle and my first car. The motorcycle was a 1931 Harley Davidson and I gave $150.00 for it. The car
    was a 1937 Ford. I bought it from my sister for $250.00. Later I bought a 1934 Harley Davidson for another $150.00; I
    had blown up the 1931 cycle.
- speaker: Respondent
  text: After I was married at the age of eighteen, I went to Sistersville, West Virginia, to cook in the oil field. The war
    was going on, so I went to work at the Fifth Service Command Post in Newark, Ohio, repairing army vehicles. After the
    war, I went back to the oil field, working in Sistersville, and then to Alfred, Ohio.
- speaker: Respondent
  text: In 1949 I moved to Somerset, Ohio, and went to work pumping wells for Mideast Oil Co. I have worked for a lot of different
    companies, most of which are not in operation anymore. I have worked in Ohio, Pennsylvania, West Virginia, Kentucky, and
    New York. I have spent better than fifty years in the oil patch. I have roustabouted, pumped, worked on service rigs,
    dressed tools on a spudder, and have been a field representative and production manager. It has been a great life and
    I sure have enjoyed it.
- speaker: Respondent
  text: 'In 1925, in a little coal mining village in West Virginia, there was a baby boom. Five baby boys were born to five
    different families: Homer Casey, Roosevelt Anderson, Rus Moorer, Richard Cunningham, and yours truly, Claude Victor Berl.'
- speaker: Respondent
  text: We were wild, young, and free. We didn't have anything that the world would call wealth, but we were happy with what
    we had.
- speaker: Respondent
  text: As young boys often do, we tried to mimic the men around us. This was during the Depression and jobs were scarce.
    Most of the men around there worked the coal mines two days a week. We all thought it would be fun to work in a mine too.
    When the men would leave for the mines we would head for the hills to dig our own mines. We would leave early in the morning
    and be gone all day. After a while our parents began to wonder what we were doing all day long. We had to come clean and
    tell them. By this time we had tunneled twenty or thirty feet into the side of the mountain.
- speaker: Respondent
  text: In the innocence of youth we had no idea of the risks we had been taking. Our parents were quick to explain to us
    how dangerous what we had been doing was. We never thought about the possibility of a cave-in or of its potentially fatal
    consequences.
- speaker: Respondent
  text: We had only thought of the adventure and excitement of being together.
- speaker: Respondent
  text: Grounded from the 'world of mining' we began to look for new things to do. We loved to build. We built a log cabin
    to play in. We built a beaver dam to swim in and a big swing. The swing was actually a sixty foot cable attached to a
    huge oak tree. You had to grab hold of the end of the cable with both hands and hang on tight while a couple of other
    guys gave you a big push. Fortunately none of us ever fell. If we had, we would have fallen about one hundred feet down
    the mountainside.
- speaker: Respondent
  text: We never worried about the many different kinds of snakes in the mountains around our homes. Neither did we worry
    about the swift rapids in the rivers nor the high rocky cliffs in the mountains. To us it was a paradise.
- speaker: Respondent
  text: The mountains gave us life. There was one spot especially. It was about a quarter of a mile in size. It was like a
    Garden of Eden to us. It was beautiful. In the midst of it, and a mountain stream brimming with nice mountain trout. There
    were all kinds of nuts and berries for us to eat as well. And, oh, yes, I cannot forget the frog pond at the foot of a
    huge beechnut tree whose branches always seemed to be reaching up to the heavens in praise to God.
- speaker: Respondent
  text: You might be wondering what ever happened to all of us. Well Homer became a track star in school, and then lost his
    life serving his country. Roosevelt also lost his life in the service. Rush was in the war, but he made it back. Richard
    never went into the service. I also was in the war and God smiled on me and I also made it back.
- speaker: Respondent
  text: It has been many years since the five of us roamed the hills together. I will never forget the joy of growing up in
    the mountains of West Virginia. To me, it wasn't 'almost heaven' - it was heaven.
- speaker: Respondent
  text: As a youngster growing up, I remember being very happy and looking forward to the many wonderful things life had to
    offer. It was my step-mother, Michi Bias, who gave me this outlook. She was truly a mother figure to me who gave me such
    strength and courage. She was a real inspiration to me and I wanted to be just like her.
- speaker: Respondent
  text: One special thing she did for us (my brother, Dewayne, and I) was to take us on a camping trip every summer. It gave
    us something to look forward to every year.
- speaker: Respondent
  text: In the summer of 1978, it was very hot and humid when we got out of school for summer break. There were about ten
    of us going camping that year - three adults and seven children. We were all very excited and more than a little anxious
    to get to the camp site. We were all very excited and more than a little anxious to get to the camp site. But little did
    I know that we were about to embark on a journey that would take us to the edge of survival.
- speaker: Respondent
  text: Upon arriving at the camp site, I remember looking around and thinking about how beautiful and peaceful it was. There
    were tall green trees everywhere. The trails were a jogger's paradise and there were numerous campers of all sizes and
    shapes around us. The river's water was so peaceful, it was so pleasant to just gaze upon it. A feeling of excitement
    overtook us all. We immediately set up our sleeping tents, our miniature stove, and other miscellaneous items for the
    trip.
- speaker: Respondent
  text: The next day, while the adults sat chatting, all the kids decided to explore the park. However, we were not aware
