collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: They're mostly old people in this hotel. They bother hell out of you every time you bring in the mail, as if it's
    your fault they don't get anything. There was one old goat at the hotel who didn't have nothing to do but sit around waiting
    for bedtime all day, and he was always concerning himself with the temperature and the calendar--he'd come down early
    to the lobby some mornings and he'd just chortle with glee if the last day's sheet hadn't been pulled off the calendar;
    he'd rush over to the calendar and pull off the sheet and he'd tell everyone who'd listen about it for hours. He had scads
    of money. Lots of people, and especially old people, rich old people like the ones around this hotel, are always trying
    to raise trouble for the carrier. But I bullcrap them to a million, and they never know it; I've been on a long time,
    long enough so I really have a neat way of handling them. I can't describe how I do it, I do it, that's all; the trick's
    mostly to keep agreeing with them and keep twisting their statements inside out as you go along--after a while they think
    you're a goof, and a goof can get away with anything, almost. You've got to know how to laugh a bit, too, at their jokes.
    It's the guys who're smart, smart and aggressive, who get in dutch.
- speaker: Respondent
  text: But this old goat-- I'm glad you reminded me--he'd just chortle with glee when the calendar wasn't changed; he was
    normal in most respects, but he had scads of dough. One week I was off for three days, and when I came back on the route
    he wasn't around; he'd fallen from his bedroom window and killed himself. There was one case where there wasn't any question
    of suicide. He'd just leaned too far out of the window to read the thermometer, and he'd slipped off the ledge while doing
    it, got dizzy or something. But the funny thing was that everybody in the place was glad he was gone. You could see the
    smirks on their faces when they talked about it. Most people ought to die before they get a chance to grow old, by God.
- speaker: Respondent
  text: Three times I've been asked why I'd hanged a INTA check (leaving it hanging over box instead of handing it to addressee
    in person)-- But I don't hang them, I never do. I ring the bell where it says the guy's name and someone comes out and
    says he's that guy. But he's not, and he takes the check. Then he figures he can't get away with nothin' and puts it in
    the box. I get a kickback on it.
- speaker: Respondent
  text: I had a funny one happen to me the other day. You know how the Negroes live. You'll find a family in a room and a
    whole colony in a flat. And they're always movin' or havin' to move. Some of them haven't any toilets and some of them
    don't even have any water. The halls are dark, and even if they weren't you wouldn't be able to tell who lives there from
    the names over the mail boxes--you ought to see it. You can ride through the neighborhood or even walk around it and never
    have a hint of the way they actually live, of the kind of dirt and misery they have. I feel honest to God sorry for the
    poor bastards, honest to God, I do.
- speaker: Respondent
  text: I've got a check to deliver to a guy named H. G. His name's not up, but I sort of remembered that an H. G. id lived
    on the first floor so I ring the bells for the first floor. A guy comes out and says he's not H. G. but H. G's brother-in-law;
    H. G. lives with him, he'll take the check. I give it to him, and while I'm distributing the rest of the mail for the
    building H. G. himself comes down from upstairs and asks for his check. I tell him I'd already given it to his brother-in-law.
    "I got no brother-in-law," he says, so I had to go in with him and get the check. This other guy was standing there--you
    could see his lips moving spelling out letter by letter what was on the check. All H. G. had done was move from the first
    floor to the third.
- speaker: Respondent
  text: Talkin' about kickbacks, I get lots of them from dames on my route who don't have enough to do to fill in their day.
    One day I got a kickback on an open letter. I'd hung it in the wrong box-- I was responsible, I guess, I don't know--and
    the dame called the station. Well, the person I'd give the letter to, she'd opened it, but she claimed she didn't read
    it, and I took it myself to the dame who should have got it in the first place and explained what had happened and asked
    if everything was all right. She read the letter and said sure, everything was all right. When I got back to the station,
    she'd called up about it and made a complaint. I told the super, "If she has a beef, let her come in." If we listened
    to all the complaints we'd go screwier than we do; I always say for them to come in if they've got a beef.
- speaker: Respondent
  text: Lots more carriers want to transfer to clerks right now than the other way around. That's because they're being ridden.
    And there's no chance for promotion. Take an inspector's job, for instance. They never take a carrier. Clerks want to
    transfer usually only when the weather's getting nice. I was talking only yesterday to B. who transferred to clerk a couple
    weeks ago. The first thing he said was, "Jesus, I'm glad I'm out of that!"
- speaker: Respondent
  text: The fellow he transferred with is starting to notice the length of the working day already. The only thing is, he
    was sent to my station, and my station's the worst station in the city; they send them to this station to get fired. S.
    is getting fired. L. will probably follow. There's been so many guys fired out of that station, T. mentioned a fellow
    to me the other day who'd been working there two years ago I could hardly remember him. They sent N. here to be fired.
    He'd got along so far on a couple reductions, but they finally fired him. I've been trying to transfer for almost a year
    now. Seems you can't even buy a transfer, these days -- I mean, if you're a carrier. It's easy enough if you're clerking.
    And if you're in this station, it's practically useless to try.
- speaker: Respondent
  text: R. got fired out of this station. He's a coal salesman now; anyway he says he is. T. was telling me about him. He's
    called about ten times on T. now, trying to sell him some coal. Finally T. gave him an order for ten tons, but he waited
    and waited and that ten tons never did come. Every time he called on T. he talked about the buck he'd lent S. when he
    was working at the station. S. owed the buck all right, and T. kept after S. Finally, he said, "Do something, anything!
    - Jesus! - give me the buck! - anything to get rid of him." S. wouldn't cheat anyone out of a dime, but about this guy,
    he just wants to see how far he'll go. R. never was a coal salesman; it's just a pretext to call on T. and try to collect
    that buck S. owes him. S. says if he'll call on him he'll pay the buck, but for 1% not to say anything to R. about that.
    Carrying does that to a guy, makes 'em batty.
- speaker: Respondent
  text: C's clerking now; he's detailed down to Donnelly's. There's a sweat shop if there ever was one. I wouldn't want that
    detail. Those girls work piece work and you have to keep up with them. A girl sits at the conveyor and puts one page of
    a catalogue on the piles as they go past, one page, the same page, all day long, millions of 'em. The conveyors go so
    fast that girls don't even have time to talk to one another. I don't see how they can stand it without going nuts. The
    clerks from the p.o., they stick these Sears Roebuck catalogues, put the names of the towns on them, and send 'em out;
    they aren't handled again till they get to that town; it's very economical.
- speaker: Respondent
  text: That old baldheaded bastard, he comes and stands right behind you. That station's as bad as any factory could be.
    It isn't like that in most of the stations. His place's got a rep all over the city - in the service, I mean. They fire
    'em out of there, one after the other, everyone knows that. They say investigators are coming out from Washington to look
    into the situation, especially in that station; but generally because of the new speedup we've got everywhere. But you're
    always hearing things like that, and nothing seems to come of it.
- speaker: Respondent
  text: The carrier's a heel to everyone, the public, the clerks, even to the guys on WPA. There's one fellow I know who quit
    the service because he couldn't stand it any longer. He isn't even making fifty-five dollars a month; he's not on WPA,
    he's on relief. I meet him one day; it's snowing and I'm lugging a full pack around, and you know what he says to me?
    - "Boy, I'd hate to be lugging your bag around" -- he's never been sorry he quit.
- speaker: Respondent
  text: There're about ten-thousand clerks and only about three-thousand carriers. The carriers' union's always been weak,
    the clerk's stronger and more active, too, and that's why they ain't driven like us. They get things done.
- speaker: Respondent
  text: For that matter, a clerk does everything but clerk. He fills sacks, drags them around, throws mail, yes, sometimes
    even cleans up garbage. He does everything but clerk. It's damn few details you ever need a pencil on. I remember when
    I was taking the exams. There was a big burly lad that ought to've been driving a truck or something; he yells out, "Where
    d'you put your name for clerk on this?" I thought, you big goof, you'd be lucky if you got high enough on the list to
    get a job carrying, let alone clerking. We take the same exams, but most fellows put down they want to be clerks and it's
    harder to get high up on the clerk's list. You sign up for carrier and hope after you get on someone'll be goofy enough
    to want to transfer with you.
- speaker: Respondent
  text: I like carrying, only they drive us too much. They really do; they drive us like all hell. My wife comes home with
    a story the other day. D's wife is telling her about her husband being called to work in the post-office not long ago,
    at fifty bucks a week and his pay's going up five a week after six months. She tells me that line of bullcrap and looks
    at me as if to say, "And, why can't you do that, if S's husband can?" Hell. I ask around and find out he's temporary (working
    as a part-time temporary substitute clerk). He's lucky if he's knocking out twenty bucks. What do you suppose he was doing
    before? - working in one of these chain shoe stores. How much could he have made working for one of these outfits? Imagine
    handing out the line of crap they do, especially to mailmen, who know conditions.
- speaker: Respondent
  text: The only time there was life in that damn post office was when them Goddamn temps were there. That was because they
    could tell the boss to go to hell. I've been clerking only a little while now. I finally managed to make it. The thought
    of a uniform is very funny to me now. I was a boy scout. I was an usher in a theater. And then I was a mail carrier. If
    I had to be in uniform again now, I'd quit the service. A fellow in uniform is always stereotyped.
- speaker: Respondent
  text: I'd like to take an exam for one of those Washington jobs. Jesus, when they call you to work on one of those jobs,
    they treat you as if you were a man. When they tell you to report, they tell you by telegram. Here, they herd you around
    like a bunch of cattle. I remember when I was taking the exam. There's a little fellow there, and they line us up at the
    elevator. He gets sore as hell. "Look at them," he says, "look at them; they're regimenting us already." Sure, it's funny,
    but it's pathetically funny, because there's more truth in it than you'd ever guess.
- speaker: Respondent
  text: It takes a congressman and a senator, at least, to make you a field foreman. The opportunities in the service are
    very limited. For example, there's only one field foreman to about thirty men. Policemen have one in ten. And the firemen,
    I think, have a lieutenant to every eight men.
- speaker: Respondent
  text: The guys are always griping about their jobs, but what the hell, I say they're better off than most guys in private
    industry - and look at all the guys who don't have no jobs at all. Sure, they drive us all right, and I don't like it
    no more than the next one, and I'd like to see something done about it. You'd think the government would set an example;
    but it don't; it drives the hell out of you in the service, just like anyone else. But where else can you be sure of a
    job for life long if you keep your nose clean. What would these guys do if they did lose their jobs, quit or get fired
    or something? What are they fitted to do? And even if they're fitted for something, what the hell! - they'd find out soon
    enough there ain't so damn many jobs floating around where they'd make nearly as much. They get around and they know that
    as well as I do; you notice there ain't so many of 'em quitting, don't you? - they're holding on all right, you bet they
    are. If I lost my job today I wouldn't even know where to start looking for a job -- I was thinking of it only the other
    day; I was feeling so damn lousy when I come home.
- speaker: Respondent
  text: This job's sure got me down. All I want to do when I get home at night anymore is take off my shoes and lay around
    till it's time to go to bed. I don't even want to read anymore. The wife says I'm getting old. I ain't thirty yet.
- speaker: Interviewer
  text: Are you in the service?
- speaker: Respondent
  text: No, I didn't think you were. You don't have that beaten down look.
- speaker: Respondent
  text: Most of the fellows are always in debt. Sometimes, of course, it's because they have their share of hard luck. But
    it's so damn easy to get credit when you're in the service.
- speaker: Respondent
  text: That credit union--between the Irish and the Jews, they've got things sewed up; they're out to make money.
- speaker: Respondent
  text: There's one temp in the station now, an Irish lad, who hates Negroes. He's so dark himself, he almost looks like a
    Negro himself. He's always saying something or other that he thinks is funny to the Negroes in the station, things like
    "Move over, it's getting kind of dark around here." We fixed him last Christmas though. We sent him two presents. We went
    down to a butcher shop and bought a big mangy bone and a smoked fish. We sent each one in a separate package. The bone
    was marked "From the Bishops of Forwestville Ave.," and the fish "From the Chamber of Commerce of Vincennes Ave." But
    the best one was the one the little Negro newskid pulled on him outside the station. The kid said, "Hey,
