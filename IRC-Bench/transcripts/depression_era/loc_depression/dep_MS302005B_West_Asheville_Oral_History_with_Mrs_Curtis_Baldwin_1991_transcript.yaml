turns:
- speaker: Interviewer
  text: Maybe you could tell us a little about what your impressions were about West Asheville when you moved there.
- speaker: Respondent
  text: Well, it was quite a contrast from where I grew up in Indiana. Of course, we had rolling hills around our home, but
    nothing compared to the mountains here. My husband came here with the Highway Commission. We had been living in the Raleigh
    area. We lived in a number of towns down there. The last one was Warrenton, which was a delightful place. When we came
    to Asheville, first my husband was assigned to Marshall, which was a great contrast from Warrenton. We moved in on Monday
    afternoon, and Wednesday morning we had to get up because there was one of the floods they have periodically down there.
    My husband had to get the highway Ford and bring it up the porch. Two men made a chair with their arms. By the time we
    got ready to leave at seven o'clock, the water was up to the porch. So they carried me out to the car. And my little boy
    was not quite two, and they took us up the side hill behind the Madison County Courthouse, and said, "Just get out, and
    I'll come back when I can." We were on the side hill, you know, and I'd only been in town since Monday afternoon. I had
    the suitcase with the boy in the back with some graham crackers. Then I saw a woman that looked like she might be affable
    and she let us sit on her porch. We had to stay up there several days. We found an apartment there in a private home,
    and as soon as we found the apartment, he was transferred back to Asheville. So he had to come to Asheville, and he stayed
    over on Brevard Road, and then he'd come home out to Marshall because we didn't know whether he'd be sent back there or
    not because they were working on the road to Knoxville.
- speaker: Interviewer
  text: He was transferred to Asheville working for...
- speaker: Respondent
  text: The State Highway Commission. The program was dying down somewhat because the funds for the highway had diminished
    greatly. So he thought he'd better find something else. And he had a friend, believe it or not, that he had worked with
    in Montana. This man had been City Engineer, and my husband worked for him during college vacations out in Montana. But
    that chap had come here to help build Oteen. Some of those buildings were under construction at that time. I don't know
    how they found each other, but they did. So he was going to help with the construction of the American Enka plant. So
    my husband decided to get his application in there because that would be a sure thing. The Highway Commission labor forces
    were a little bit dubious. I mean, their prospect. So he'd been out there from the very beginning when they started the
    pile driving.
- speaker: Interviewer
  text: This company was what?
- speaker: Respondent
  text: Ferguson Company. It was a company out of--I think it was out of Baltimore. And my husband stayed with him--he was
    the last man on the payroll. The last thing he did was ship the superintendent's belongings back to the next place he
    was going to be located. But on the pile driving, they had shifts. Then one night, he didn't come home, and I was worried.
    I thought something had happened. And I couldn't get a line call out there until daybreak. I got hold of this George C.
    Douglas, the man from Montana. And he said, "Nothing happened. When the shift was over," he said, "I hadn't seen him."
    But my husband said it was running so late, he'd miss his ride back to town. So he said he thought I wouldn't know the
    difference, and he'd call me about time for me to wake up. But you'd know the difference! I was really put out with that
    situation. It never happened again. When we first went to West Asheville, we just had an apartment. Then we were able
    to rent a furnished house. And then we started buying the house on "Majestic. We moved in there in July of '30. Our little
    boy was four then. He was four that Fall, in September. Our little girl was born in October. They were just four years
    apart. Well, then that Fall we started in the kindergarten down at Aycock School because that was going to be the last
    year the City could support the kindergarten program. We had a neighbor, we would take turns taking the children, walking
    them down to Aycock. Then, he [Helen's son] was home a year because then you had to be six to start to school. And when
    he went to school, then we went to Vance. Some of his playmates were going to Vance. He could walk to school with them
    part of the time.
- speaker: Interviewer
  text: When you first moved in 1928 into West Asheville...?
- speaker: Respondent
  text: In '28, we moved over on Covington Street. We just had an apartment.
- speaker: Interviewer
  text: You were in an apartment for two years.
- speaker: Respondent
  text: And then rented a house on Langwell, that's down off of Virginia Avenue.
- speaker: Interviewer
  text: And then you moved into a house, you said on Majestic.
- speaker: Respondent
  text: In '30. In July.
- speaker: Interviewer
  text: It seems like throughout your life you were very involved in civic affairs. How did the community first accept you
    or respond to you?
- speaker: Respondent
  text: Well, I think it was the PTA, mostly.
- speaker: Interviewer
  text: The PTA immediately embraced you or put out feelers toward you?
- speaker: Respondent
  text: Well, of course, they always need all the support they can get in school. And, as I told you, my son started the first
    grade, and there were sixty-six children on roll. And so I'd go down there and take my little girl and stay there a while
    because the children were restless and they didn't all have a regular seat. You know, it depends on who was there that
    day. And no teacher's assistants like they have now.
- speaker: Interviewer
  text: One teacher and sixty-six children?
- speaker: Respondent
  text: On roll, but they weren't ever all there. So I started right in helping with what I could.
- speaker: Interviewer
  text: Why weren't some of the children there?
- speaker: Respondent
  text: They'd be sick.
- speaker: Interviewer
  text: I thought maybe they had to work on the farm or something like that.
- speaker: Respondent
  text: Oh, no, not in West Asheville. None of those children. Some of them might have helped in the garden in the summertime,
    but it never kept them out of school on that score. And then we had grade mothers. Of course, the first thing you do--they
    need volunteers as grade mothers. And, of course, they helped in so many ways. They'd come to school and help put on special
    programs for the children. Then the PTA as a whole always had money-raising projects. The school needed so much, and the
    school city could not in most instances furnish it. Later on our parent-teacher association raised money for a motion
    picture machine. And then we raised money for a curtain for the stage. We had a group of mother singers.
- speaker: Interviewer
  text: Mother singers?
- speaker: Respondent
  text: Mother signers, and that carried on until high school. We had it even in the high school. And they had father Singers
    too. And they'd help with the program from time to time. I think it's in some of these West Asheville papers. Another
    thing the PTA did then, we operated the lunch room, which was a tremendous undertaking. It took so much help. We hired
    a dietician. The lunchroom committee was made up of the principal, the president of the PTA and then a lunchroom chairman.
    But we were down there every day.
- speaker: Interviewer
  text: Making lunch for all those children.
- speaker: Respondent
  text: Well, we had the dietician, but there had to be help. And we had a small room, and the children didn't have enough
    chairs to sit on to eat. So one summer, the principal was out of town. He'd always said the school board wouldn't just
    give us the money, and we just couldn't do it. So we got the business manager to come out. We took him in the lunch room
    and we told him the children were standing to eat. We didn't have enough tables. Could he give us a couple extra tables
    and some more chairs? He gave us the tables and he gave us the chairs, and I said the room is crowded. Could we have the
    former kindergarten room next door. I said, "Could you cut a door through there?" He said, "We could take out the whole
    wall if the supports are in the right condition." A big portion of the wall came out and more tables were put in. Then
    I asked him about painting it. He said, "Well, all we've got is gray paint." They had used that other places in the building,
    but we didn't want the same in the lunch room. So I went down to Fortune's Hardware Store and got some blue pigment--good
    old PTA blue, and put (laughs) it in the gray paint, and the lunch room was beautiful when we got through. We got curtains
    and so on. And then we went down to Rockamoors (?) and bought a steam pail so the food would be hotter for the children.
    When the principal got back, here that lunch room was all made over (laughs), and you know the first thing he did was
    invite the school board out to his new lunch room.
- speaker: Respondent
  text: 'And then when I went in as President, he hadn''t been happy with the dietician we had had formerly. She kept a cat
    in there: and she was always serving the children these moon pies (laughs), and the children would get upset. Even the
    janitor was getting upset about the children (laughs).'
- speaker: Interviewer
  text: Because they were so wired or something?
- speaker: Respondent
  text: That moon pie was just too rich for some of the children. So we got a new dietician lined up. She had been superintendent
    of the hospital up in Maynor in the northeast at one time, and several of us knew her because she had been the dietician
    at Calvary Baptist Church. So, we had the two names, and of course all the Board was primed, and everybody voted for this...Mrs
    Garner. The only negative vote was from the principal. And then, afterwards, he said, "Let's make it unanimous," so we
    had a good dietician, and she was an excellent person and made the whole lunch room situation very much better than it
    had been. PTAs really worked in those days. Then we had a welfare program, and we cooperated with the Needlework Guild
    because they would knit sweaters. It was a Biltmore Branch, but then we had a West Asheville section, too. So we'd give
    these children who needed it a sweater, and we'd get underwear for them and maybe a skirt to go with the sweater and jeans
    for the boys or something like that.
- speaker: Interviewer
  text: Well, now, were there a lot of children who needed those things?
- speaker: Respondent
  text: There were quite a few at that time. Of course, Enka made a big difference as far as employment was concerned. But
    then, you see, we ran into the Depression, too. That made it difficult because people lost their jobs or their wages were
    cut and they got so little. I know one woman told me she worked in the plant and only got eight dollars a week.
- speaker: Interviewer
  text: Eight dollars a week?
- speaker: Respondent
  text: Yes. The PTA was--well, it was almost a full-time job because you'd go down there every day, and some of the mothers
    were very helpful. Then we'd bake things, you know, to have a bake sale, and we were always having money-raising projects.
    We just had to keep going.
- speaker: Interviewer
  text: Mrs. Baldwin, you say there were sixty-six children in...
- speaker: Respondent
  text: In the first grade.
- speaker: Interviewer
  text: In the first grade. And that was which school--Vance? So there were six grades. So, in your managing of the lunch
    room, you saw all six grades, didn't you?
- speaker: Respondent
  text: 'Oh, yes, all the children were in there. Because see, after my boy went on, my daughter was born in October. She
    couldn''t start in school in September. So I sent her down to the Logans. They had a nursery school and they had first
    grade in their home down on Logan Avenue. So she had gone down there when she was three to their nursery school. Because,
    you see, Mrs. Logan''s daughter, she had...John married Myrtle Logan--John Lawrence, but there was Irene and Grace. Then
    Katherine later became Dean of Women at Mars Hill College. They were all the Logan girls. And there were three Logan boys:
    Harry and Carl; and Bill is the one I showed you the picture of. He taught here and then he taught at that college in
    Florida.'
- speaker: Interviewer
  text: And what did their father do?
- speaker: Respondent
  text: I don't know. He was gone before I ever knew him. It might be in that article I gave you about Mrs. Logan. There's
    quite a little information. I haven't tried to re-read all these things because I'm having problems with my eyes. I've
    had implants in both eyes, but I'm still having difficulty.
- speaker: Interviewer
  text: You must have seen about four hundred children in any one year going from first through sixth grade. Were they all
    in the lunch room at the same time or did they come in shifts?
- speaker: Respondent
  text: They had a couple of shifts.
- speaker: Interviewer
  text: And did you get to know some of the kids pretty well?
- speaker: Respondent
  text: I did through their mothers because we worked with the mothers and we knew some of the children, and of course some
    of them lived in the neighborhood.
- speaker: Interviewer
  text: You worked with the mothers. How did that...?
- speaker: Respondent
  text: They were members of the PTA, too. And some of the same people belonged to this community club, and it was very active.
    It made a great contribution.
- speaker: Interviewer
  text: What did the community club do. What were some of their projects?
- speaker: Respondent
  text: Well, there used to be a clubhouse, and we were always working to improve this clubhouse. It was down there off of
    Brevard Road. I don't know what ever happened to it. Probably, they had to remove it when they made the mistake of selling
    the land to the Aston Park Nursing Home. It's where we had a park, and we used to go out there for picnics and that sort
    of thing. It's a beautiful site.
- speaker: Interviewer
  text: Now the clubhouse, I imagine, is different from the clubhouse I built as a boy. It wasn't just some sticks put together.
    This was like a community center?
- speaker: Respondent
  text: This had been a house at one time, and they worked it over for this club. At one time, the hostess and her husband
    lived there. The Junior Rhododendron Club met there, and you see we all belonged to the Federation of Women's Clubs. So
    we worked on some of their goals too for various programs. Some of the same women--like in that picture I can pick out
    the PTA people who also belonged to the club. It's changed so now. When we moved there, part of Louisiana was not paved
    down the hill, and in the winter time the children used to coast. And my husband and I went with another couple, and we
    borrowed a sled and we coasted down. You got down to what was the bottom of the Louisiana hill, on the left side there
    was a creek and a pasture, it belonged to Dr. Orr. And the children used to like to go down there and take their lunch.
    I remember, one day my son went down. He was about five. I didn't want him to drink the water out of the creek for his
    lunch, so I gave him a pail. I didn't have a thermos bottle. I gave him a pail of water to take along for the two boys.
    Well, it started to rain, so they decided to come home, and I looked up from where I lived on Majestic--I could look down
