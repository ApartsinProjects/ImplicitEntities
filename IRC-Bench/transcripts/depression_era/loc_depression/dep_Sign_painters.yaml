collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Well, I'll tell you. There aren't very many of us. Maybe seven-eight hundred altogether in the city. About seven-hundred-fifty
    in the union, I guess. No, everybody ain't in the union. But we got things pretty well tied up. The others snap a job
    on the sly once in a while, but it don't amount to much. Shops don't hire them and we pull them off the jobs they get
    themselves when we catch them. The good ones? Yoh, practically all of them are signed up. What the others get don't amount
    to much.
- speaker: Respondent
  text: I'll tell you one thing about Chicago though. Detroit's tops when it comes to bulletins, and so's Los Angeles, I guess—that's
    what they tell me anyway—but for all around sign work you won't find any town that beats Chicago. I got good men here.
    Sure, we have palookas too, who ain't worth a damn, but not very many.
- speaker: Respondent
  text: Fifteen a mackeroos. But if we get ten we're lucky. Sure, the book calls for fifteen, and if anyone asks, we're getting
    fifteen, see; only damn few get it. I get it sometimes. Depends on who I work for. I lose too goddamn much time. I figure,
    the year round we average maybe eight-hundred to a thousand bucks a year. The sign game's just about done. Too much neon
    work for one thing. But that's about reached its limit too. What keeps us going now are these beer joints. They fold up
    so goddamn fast, you wonder why anyone else starts up. The breweries pay for the sign work, so the saloon keepers want
    a lot of it. They think they're getting something for nothing. There ain't no one harder to work for.
- speaker: Respondent
  text: And I'll tell you something funny, while I'm thinking of it. I don't give a goddamn where you go in these damn saloons—and
    these fellows that run the joints are just one step removed from hoodlums, as rotten a tribe as you want to meet, don't
    let anybody tell you different—but there we'll be, working away, never stopping except to look over some swell job passing
    in front of the window—say, I was working at Division and State last week, and the girls up there beat anything I've seen,
    Jesus. But around these joints, well, there's always at least one drunk who comes along with a story of a signpainter
    he knew once, and Christ Jesus was he a good maid—paint like nobody's business! But, you know what? He had to be drunk.
    Yep, couldn't lay out a word unless he was drunk as a lord. Never knew it to fail, you always get that story. But I've
    got to inset that signpainter yet. These jags! You wonder where the hell they come from!
- speaker: Respondent
  text: You're right, there's something for you, the way the people look at us. Now take the average, I'd say it's with admiration.
- speaker: Interviewer
  text: How do we react?
- speaker: Respondent
  text: Well, Jesus! We're normal, aren't we? We feed it to 'em. Like the time I was on a bulletin out south on Halsted. Some
    guys are standing around watching us. Ever notice how a guy's mouth comes open sometime when he forgets himself watching
    something? Well, there're these jags gaping like a bunch of kids when the old lady's about through making the candy, and
    one of them pipes up with, 'Say, that's a pretty big sign you guys are painting, ain't it?'
- speaker: Respondent
  text: So we get to jibber-jabberin', and you know me, old Anmaniaa himself, I say, 'You guys ain't seen nothin'. You remember
    that big one we did outside the New York airport for the airplane passengers to read, don't you, Lou?' Lou was the helper
    on that job. He's a pretty good man. But he's too mechanical, his work doesn't have any swing. (The word is not taken
    from the current musical craze. It refers to style and individuality in work. A signpainter can walk about the streets,
    look at signs, tell who did the work, what shop and what man. This applies particularly to gold leaf jobs.) So most of
    the time he's a helper. He says, 'You mean the one where we used a washtub of black for the eyelashes?' 'Hell, no,' I
    said. 'That was a small one. Don't you remember that job where we used ten tons of lead just for the period?' I couldn't
    keep from laughing, the way they ate it up.
- speaker: Respondent
  text: But these saloon-keepers, they're the ones that are the real phonies. No one likes to work for them. Of course, we
    work for the breweries, not for them, but they're getting something for nix, so they want a lot. When we give extras to
    a saloon keeper, like putting his name on or something like that, we say, 'Okay, here's the egg in your beer.' When one
    guy sees a saloonkeeper coming, he does this (gestures, spreads arms wide, brings right hand to front, brings tips of
    thumb and index finger to indicate a mace of about half an inch). That means, 'big sign, small letters.' Then we stop
    shooting the s--- and keep quiet till he's out of earshot. We don't like to talk to them unless we can help it. We do
    that, by the way, whenever anyone we don't like comes along. It means freeze him out, ignore him, don't give the bastard
    any encouragement.
- speaker: Respondent
  text: Talking about this 'egg in the beer' gag, reminds me of something I pulled last year about this time. A saloonkeeper
    kept bothering, and thinking, and I couldn't think how to get out of it. Then I get a bright idea. I said, 'Look, I'm
    mixing the two coats in this pail, I'm giving you your extra coat; what're you griping about?' He didn't catch on till
    about six months later. The jerk... But at the same time you have to keep them in good humor, because you don't find jobs
    hanging on trees these days. Anyway, after about six months or so, he comes bellyaching for that extra coat of paint.
    Did I give it to him? Hell, no. I told him to go s----- up a straight stick. They don't pull that kind of crap on me.
- speaker: Respondent
  text: 'The signpainters are always grousing. No work, some guys are too good and too hungry at the same time, like S who
    works for A. That bastard will work till maybe two o''clock and finish a job and then call up all the shops trying to
    get in an extra two hours so he''ll get a full day. But you can''t take anything away from him, he''s tops, and not only
    that, he''s fast: me, better than average, if I do say so myself, but compared to S I''m just another punk trying to get
    along. Aren''t we all?'
- speaker: Respondent
  text: The HSU? Sure it's against the rules. No, he's not supposed to do it, and if anyone reported it he wouldn't get away
    with it. Every trade has someone who's known as tops, I guess. And every trade has someone who's got a rep for being hungry
    for do-re-me. We've got both in one man.
- speaker: Respondent
  text: And seems he is dumb when it comes to anything else but painting signs. He's as dumb as the guy who was looking over
    my shoulder one day when I was working in his shop last winter. You know how we lay out with chalk without measuring or
    anything, and I guess it looks pretty good to someone who doesn't do it himself. Well, this guy's looking over my shoulder,
    I'm painting away, and pretty soon I come to the end of the sign and I've got everything worked in, good as if I'd laid
    every letter out with a rule before starting. That jerk looks and says, 'Gee, you're lucky.' 'Yoh?' I says. I notice his
    mouth is open and he's admiring as hell. He nods his head. 'You sure was lucky,' he says, 'that sign was just long enough.'
    It was a pretty big sign. I had to lay it on the floor to work on it. I just about busted a gut. R. says, 'Some folks
    sure do things funny.' Jesus.
- speaker: Respondent
  text: Now this guy, R. Is he a screwball? He's taking singing lessons. One day we're all standing around. It's a Saturday.
    We don't work Saturdays, but we came down to get our money. R., he's always screwing around trying to pay off B.B. late
    as possible, always singing the blues. But this time is the payoff, he's singing songs for us—that jerk. So in comes a
    collector with a summons for R. He didn't pay a bill, and they were suing him. I say, 'Why don't you sing for him, R.?
    He's the guy you ought to be singing for.' R. didn't feel so good.
- speaker: Respondent
  text: But you take R., now, just as an example. He's got him a shop, a few guys working for him when he's got the work,
    and for all he knows he'll be out on his ass tomorrow or the day after. I lost my shop in 1932. That was my own fault
    though. The nice thing about having a shop, though, is that you're your own boss. That's why I contract most of my work;
    I get along about as good as average. Signpainting? Well, today, it ain't an occupation, it's an occupational disease.
    That's what I call it.
- speaker: Respondent
  text: No, I don't want to be tied up to any one shop. Because I've got contacts and accounts from the time I had my own
    shop. Snapping like this, I make more than if I only worked for someone else. Of course, a job like one with the Daily
    News, say, would be regular and you'd make more out of it, day in and day out. But then you do the same sign over and
    over again, all day, every day, and you lose your touch and can't do anything else. Working with General Outdoor has its
    gripe too; first sign of slack and out you go. One day I'll be working on a bulletin, the next on a wall, the next on
    a window, the next on a truck, or on showboard, or what the hell.
- speaker: Respondent
  text: Did I ever tell you the story of the signpainter who sold two-three kits a day, because he couldn't find work? You
    know what a kit is. A signpainter's kit is a high, rather wide, relatively narrow box, about 19 6" to 2' x 1' to 1'6"
    x 6" to 9", with a sliding rollaway front, containing small compartments of various sizes and shapes in which are stored
    the essential items for every possible type of job the signpainter may be called upon to do. With good materials, gold
    leaf, and silver, paint, brushes, etc., it may easily be worth as much as two-hundred dollars, seldom less than seventy-five.
    Well, this guy—I don't know how old this story is; I heard it when I first started as an apprentice, and I still hear
    it every once in a while—this guy, he can't find no job. So he gets him some boxes. You know the kind that beer comes
    in, the bottles. And he cuts them down and fixes them up and paints them black, so they look just like a kit. Then he
    goes around to the saloons. He's broke, he ain't got a pot to spit in, his wife is in rags and starving and so desperate
    she's even threatening to go out Benin' it, and the kids, Jesus the kids! So he spreads it on, thick. He even cries when
    it comes time. So this kit he's carrying around. It's all he has left in the world. It's his bread, if he ever should
    maybe get him a job. And it's worth dough. He doesn't want very much, only a couple of bucks, that's all. And he sells
    the kit, if he can't borrow on it, two-three of them a day. Now it don't sound so damn funny, but you want to hear what
    kind of stories we tell, and we tell that one—as long back as I can remember.
- speaker: Respondent
  text: And there's the one about the guy who's out of work and thinks he'll maybe do better for himself if he starts beating
    around the country. So he goes down to the union and gets him a traveling card, throws his kit in the old jalopy and away
    he goes. Well, he goes plenty far and what he finds is pretty damn small pickin's. Finally he gets him a job, a good one.
    It's a big job, and he wants it like right now. I'd like to lay that dame across the street. Look at that! Boy, she's
    good enough to eat. Ain't that something? Well, the job's for a big garage man. This here garage man, he sees how things
    are, gets the lay of the land quick, and jaws down the price to practically nothing at all. So, all right, the guy goes
    to work on it. He gets enough dough to buy him paint and such, and doesn't even have enough left over to eat on. Pretty
    soon he gets hungry. The sun's hot as a bitch in heat. It's close, the guy can hardly breathe; he's been on bread and
    water for days. Naturally, he's a little nervous and forgetful and liable to make mistakes. The big spot in the sign is
    for the word 'vulcanizing.' And damn if he doesn't leave the z out of vulcanizing. He's got to think fast. He wants to
    let the garage man look at the sign, got his d
