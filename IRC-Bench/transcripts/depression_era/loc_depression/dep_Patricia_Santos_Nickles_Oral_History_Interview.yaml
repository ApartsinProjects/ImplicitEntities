collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I remember my father getting, working to get jobs his brothers and he got, I know he got work for his brother Roger
    as a federal meat inspector. He got work for his brother Freddie working as a meat cutter, at Fort Devens, okay. Eddie,
    couple of different, I think he got him some work in one of the post offices. And then they decided that Kenny would be
    able to run the slaughter house for another meat company, which I couldn't tell you, but he ran that for a while. Then
    Kenny has some tough luck with health and had to let go of that. And that's kind of how it wound up. And my father was
    postmaster and went on with his own career.
- speaker: Interviewer
  text: So did your father do, obviously your father supported the Kennedys, and there was a nice bonus for him to get these
    benefits. Did he have a first federal position before he became postmaster of Lowell?
- speaker: Respondent
  text: Yah, he worked for General Service Administration in Boston as the liaison officer. That was the job title, Liaison
    Officer, GSA.
- speaker: Interviewer
  text: And when did that job come?
- speaker: Respondent
  text: That would have been ( - )
- speaker: Interviewer
  text: After JFK elected or before?
- speaker: Respondent
  text: I think a little after. It was during Kennedy's administration. He certainly wasn't president for a whole long time,
    but it was while JFK was president he worked for GSA. And my mother didn't deal well with it because he had to travel
    a lot. He was away from home a lot. And it didn't sit well with her. She wasn't one that happy living that way. So he
    started looking around at other possibilities, and some of his friends told him that there was going to be a turnover
    for the postmastership of Lowell.
- speaker: Interviewer
  text: Who was the ( - ) Was it Charlie Gallagher was the postmaster?
- speaker: Respondent
  text: Yes, prior to him, prior to him, yup. So it, you know, he put in for that and he had very solid administrative background
    between running my grandfather's business, which boy, I'm telling you, talk about a ball of wax that thing, for all the
    problems they ran into. Oh my god it never ended. I can even remember one night as a kid seeing him come home drenched,
    soaking rain, and he and his brothers were out in the woods in Tewksbury because some burglars had stolen my grandfather's
    entire safe, and got it on to a truck, and they broke it open in the woods in Tewksbury. The cops located it. And my father,
    they got the cash, but my father was concerned about all the wet business papers out in the woods. And the business papers
    were very important to them, contracts and this and that. So he and his brothers were out in the soaking ( - ) I don't
    know how many brothers. It could have been just one brother and poor dad, but they were all soaked and the muck and the
    mire gathering the papers up. And I mean the number of diverse miseries that went on with that job, and the things he
    had to be accountable for. He really, between the coop program at Northeastern University, all the diverse problems that
    went with the meat business, the hard times, the helping his brothers out with jobs, working for General Service Administration,
    he really had quite a wealth of background and was a people person, you know, just really thoroughly enjoyed people; got
    a lot of satisfaction out of making a difference with people's lives. So you know, as a relative when you brag about your
    own, people are going to say you're prejudice. Well you're in good company. People are prejudice about your relatives,
    but at least you know, Daniel Patrick Moynihan who said, "Everyone is entitled to an opinion, but they're not entitled
    to their facts." I think I have facts to back my opinion. So, yah, he did, he had quite a lot of life's experience.
- speaker: Interviewer
  text: So when was your father sworn in as [Lowell] postmaster?
- speaker: Respondent
  text: Let me see, 1967, St. Patrick's Day. And Ted Kennedy swore him in.
- speaker: Respondent
  text: And I'll never forget my, they didn't know it till the last minute, my parents made out all the invitations at home
    by hand and then my father got a call from Prank O'Connor's aide, Prank O'Connor who was an aide to Ted, and a good friend
    of my father, he said, "Charlie, you might want to order another set of invitations, Ted's coming to swear you in." You
    would not believe it. You would think it was a coronation. I wish you could have been a fly on the wall. They let kids
    out of school to attend. You would not believe the masses, and it was in the Old Post Office near the Lowell Memorial
    Auditorium. It's the Brad Morse Building now.
- speaker: Respondent
  text: Yah. Well anyway, there he was on the staircase with Ted Kennedy giving a big speech about him. You know the Kennedy
    humor and charm, "On St. Patrick's Day it's my privilege to introduce to you Ruth Cassidy's husband," you know, in fine
    form. This was Ted all over. And then he told my father that he hoped it was a scandal-free administration, and by that
    I mean I don't want to hear that mail is getting delivered in Santos and Sons beef trucks. You know, he just, he made
    sure he got the drift to create the humor. But that's where we got the pictures. And I remember it snowed that day. Oh
    what a snowy St. Patrick's Day it was, but it was, it was amazing. It was just an amazing event. Being sworn in as a postmaster
    was a big deal back then. Lyndon Baines Johnson was president at the time. And I remember when my father got his big appointment
    certificate it was the Lyndon Baines Johnson signature at the bottom. So that would have been 1967.
- speaker: Respondent
  text: And then he continually got promotions. He was the only Lowell postmaster who was ever the Middlesex district manager.
    He kept going up the ranks. He was in a precarious situation. He didn't get into government until he was forty. So even
    though he made good money he wasn't in it long enough to have a really secure retirement that would benefit my mother
    if something happen to him. So he felt a little extra pressure to keep advancing himself so that my mother would be secure
    should something happen to him. So that's one of the things that got him looking for a promotion like Honolulu, Hawaii,
    because it was so significant.
- speaker: Interviewer
  text: And the job in Honolulu was for what exactly?
- speaker: Respondent
  text: He would have been District Manager Postmaster of the South Pacific, of not south, of the Pacific Area; District Manager
    Postmaster of the Pacific Area. So that meant the Hawaiian Islands, Guam, all those other. Actually, ironically he came
    full circle. They were the islands he was on when he was in combat in the Marine Corps. And they all full circle at the
    end of his life came under his jurisdiction at the Postmaster District Manager. And what's kind of strange is when he
    came back from war one of the things he used to always talk about was how absolutely gorgeous the Pacific was. And he
    said, you know, it's my dream to return in peacetime. He never thought that those would be the circumstances. So it was
    just a funny, funny kind of thing the way it worked. And then he and his friend Nick Tsapatsaris, who was a Marine as
    well, the two of them went ( - )
- speaker: Interviewer
  text: Pete. Pete ah ( - )
- speaker: Respondent
  text: Oh Nick was his son. Peter. Peter Tsapatsaris.
- speaker: Interviewer
  text: Peter. Peter, "Red" they called him.
- speaker: Respondent
  text: '"Red" Tsapatsaris, you''re right. Nick was his son. He and Mr. Tsapatsaris went to I think it was the 45th Anniversary
    of the Liberation of Guam. The Governor put the Marines, the returning Marines on floats in parades. They spoke to all
    these young Marines who were in these great big gathering places. He said, "Oh my god, it reminded you of one of these
    old Roman films where the conquerors who returned were worshipped." He said, "It was an incredible experience." Now you
    know that happened the year before he died. And I always thanked God that he had that before he left the earth. That was
    quite a gift before he departed.'
- speaker: Interviewer
  text: That's good. Well Pat, any final thoughts or stories about your, the Portuguese side of your family?
- speaker: Respondent
  text: Urn, I think they're a community that the city rightfully should be proud of. It's a great generalization, but I don't
    think it's in appropriate. I think in a quiet way they're not egotistical, they don't show off, they don't brag, but I
    think they recognize the goodness within their own community. They're people of values. They see the values amongst themselves.
    They know it, they feel good about it. There's something very, very special about the community. Again, in the book Comunidade
    so many, there are so many pieces of information that seemed to confirm that. They're contributors. As a community they're
    not takers. They were not takers, they were contributors. And frank, no nonsense, hard-working, family oriented, very
    supportive, not clannish, very receptive, very receptive to other kinds of people. I'm sure there are exceptions to the
    rule. You'll always find an exception to the rule. But I did find them very welcoming as long as they respected you as
    a person for all the things that mattered, and a lot of warmth without gushy sentimentality. I think that goes back to
    the practicality. But I just, I just always felt very, very, very fortunate to have had that part of the family. I love
    the Irish part of my family, but there was something a little extra special about the Portuguese part of the family. One
    other thought I'll share. My mother's sisters, she was one of nine kids, five girls. One married a gentleman who was of
    French background, the rest Portuguese. And a lot of people thought that was kind of funny, all these Cassidy girls marrying
    Portuguese guys. But my grandmother who worked in the mill, okay, she was not an educated woman as so many people were
    not at that time; simple woman with a lot of sense. When she worked in the mills she had the opportunity to observe all
    kinds of people and she admired the Portuguese people. Knew they worked hard, close to family, had a lot of respect for
    them. So she really was very approving of her daughters marrying Portuguese men. She knew that good bread winners, good
    family men, she was fine with it. So I thought that was kind of interesting. Even she was not slotted into that little
    ethnic circle where they must marry Irish, not at all. It was about the person and she saw so much good in the community.
    I read one time a book, St. Patrick's Cemetery, about a little incompatibility between the Irish and the French. I thought
    that that was kind of interesting considering how well the Irish and the Portuguese got along. They got along very well.
    So I suppose you know, days can go on and I'd think of other little things, but these, these would be the things that
    come to mind first, yup.
- speaker: Interviewer
  text: Okay. Well this was great. Thanks again Pat.
- speaker: Respondent
  text: And the values have stayed. I have to say the values have stayed as the generations have gone on. Thank you!
