turns:
- speaker: Respondent
  text: The indolence of those two men was notorious. Either could sleep at a moment's notice. They had been known to sleep
    three times on a three stretch wall. At the end of each working they would, to use Dippy's own words, 'take a rest' and
    be down on the stage and go to sleep. Subconscious had been known to go to the tee to 'tie off' and go to sleep on the
    roof, leaving Dippy down below holding the pull ropes unable to do anything about it until Sub chose to wake up. It was
    common to see Dippy asleep in the warm sun perched precariously on a box behind some store's plate glass window. Mouth
    open, completely relaxed. Doubtless many a nervous person, passing, has wished for that ability of complete relaxation.
- speaker: Respondent
  text: This ability to relax had saved Dippy from serious injuries from falls. He had fallen quite a number of times, with
    slight injuries, for it is said that to relax or to keep one's joints loose while falling saves injuries. Go tense and
    break a leg. Dippy had fallen 16 feet onto a concrete sidewalk, but up went back on the stage and finished the job. He
    had fallen from a 40-feet stack, thrust one leg through a roof and was up and around the next day. One time one of the
    woks parted the loose bricks of a fire wall and let the stage drop a foot. Dippy didn't even lose his balance, but a brick
    hit him in the only place he couldn't relax (his head all bone) and he was in the hospital two weeks with pneumonia, which
    later developed into fallen arches.
- speaker: Respondent
  text: 'Hippy Flinn and Subconscious Connors slouched to a spot along the tracks, best suited to the catching of the train
    and where the grade slowed said train to a minimum of speed. Where the least amount of energy should be expended by these
    two components of commodious comfort. Come aboard and in a luxurious box car of ancient vintage they proceeded to inspect
    with a view to creature comforts their prison of the next few hours. Dippy of course, had first choice and chose the South
    by southeast corner for the southern exposure and the pile of straw attached thereto. Subconscious had the choice of three
    lovely corners it would have been easy but with his usual care he took his time and stood pondering as to the direction
    his ruminations may have gone something like this: ''Let''s see now, let''s see, Dip says he''s in the south by southeast
    corner, if the train was going south the engine would be there, the caboose is now but it ain''t it''s on the other end
    so we must be going north if we''re going north how can Dip be in the south southeast corner they ain''t no south in the
    north or is there I never heard so anyway.. Dippy says see and Hippy''s always right, but I ain''t see, I think I''ll
    sit down here and see if I can figure it out. If this end of the car is south then the other end must be north but they
    ought to be shade on one side or the other and they ain''t so what? Hey Dip which way we going. MZZZ. He''s asleep maybe,
    better not wake him.'' ''Oh Pippy whatcha want? A which way we going? East, you''d turn focal.'' Puzzled, Subconscious
    slowly took off his coat and balled it up for a pillow, squirmed into as comfortable a position as the hard near allowed
    and was himself soon fast asleep. The freight rattled along at a pretty good pace eating up the miles and it was not long
    before Subconscious was rudely awakened, literally with a bang, for with his usual lack of foresight he had fallen asleep
    with his head too close to the end of the car and the bump caused by the engineer''s sudden release of the throttle jerked
    his head against the end.'
- speaker: Respondent
  text: His howl awoke his majesty the journeyman, who with many grunts and groans, got up to see where they were. 'Looks
    like fair sized burg, seems to me I've been here before, but they all look alike from the railroad track, dirty and dingy.
    Looks like these small towns would have a little civic pride and clean up what the cities can't, seems as the railroads
    the only thing that keeps them on the map.' With this remark, the train having come to a stop, the two climbed from their
    journeying juggernaut and ambled towards the depot and perhaps the main street.
- speaker: Respondent
  text: One of Sub's many accomplishments was his habit of being hungry, being the salesman of the partnership was always
    apt to solicit bakers and grocers first with his offers of good signs cheap. Here often then not the remuneration was
    taken out in trade and the numerous packages carried to the jungles there to be concocted into a 'Mulligan.' Zippy and
    Subconscious were always noisome in the jungles by the ever present buzzards who were always ready to help gather fuel
    and cooking utensils, in order to share in the feast. The Mulligan, made by the pair was a bona fide hobo stew - everything
    in it but the railroad track. Potatoes, onions, turnips, cabbage, sweet potatoes, corn, peas etc. were put in indiscriminately
    with the meat.
- speaker: Respondent
  text: There had been times when the stew was not so perfect like the time in Hutchinson, Kansas, which town had been 'bummed
    out' and the hobos in the jungles were hungry and in a quandary when Hippy had hit upon the idea of assigning each man
    to a certain kind of shop, one to the butcher, one to the baker, etc. Each was to bum a specific item, but to take what
    he could get. When after a time, they gathered again in the jungle and looked over the spoils it was found that butchers
    had donated one link of liver sausage, the grocers a quantity of lettuce, potatoes, parsnips and some slightly damaged
    tomatoes, the bakers, stale bread and buns. A mulligan was made, the skin of the sausage burst and was never again recognized
    as such, the other ingredients were cooked into a mash. Hunger is not discriminating, so all thought the stew was good
    which was all that was necessary.
- speaker: Respondent
  text: They filled up and were satisfied, until the sheriff came down from the village and ordered them to get out on the
    next train. The concerted onslaught on the stores of the good citizens had caused a protest against knights of the road
    and their absence was urgently requested.
- speaker: Respondent
  text: As the tee neared the depot, the place seemed more familiar to friend Dippy and soon he caught sight of a tall grain
    elevator and recognized a sign. He had completed several years before high up on the side of it. He remembered the layout
    now. Remembered the picture of a clown head, the biggest picture he had ever painted the pupils of the eyes being eight
    feet in diameter. He had cause to remember that particular sign, existed lost a good helper while working on it. The job
    was almost completed, they had swung over for the last stretch and had pulled the stage about half way up, when, suddenly
    the rope slipped through the helper's hands (in some way part of the pull rope had come in contact with grease - some
    had adhered to it and caused it to slip.) he had caught it before it came down very far but the damage was done the color
    all slid to that end over him and the pots came down on his head. To give him credit he held on to the rope through the
    rain of paint and pots but he refused to go up on the stage and Dippy had to finish the stretch by himself. The helper
    had lost his nerve and was of a consequence useless to a journeyman. Dippy had to break in another helper - was a small
    job.
- speaker: Respondent
  text: Every workman has his idiosyncrasies and it is sometime before a helper becomes accustomed to them. For instance,
    one journeyman may be a (p.15) about his brushes and have the helper go through a series of use lessons on the handling
    and care of brushes, another may expect his color to be just right, another may expect every crack in the wall fitted
    with paint. There are many things a helper is supposed to know or to conjure out of thin air at a moment's notice. As
    they passed the depot they lingered long enough to get information as to the freight schedules in case they found no work,
    and then sauntered down the main.
- speaker: Respondent
  text: The town seemed dead no one on the street. Dippy paused to get his bearings he remembered the sign shop but couldn't
    remember just where it's located he finally decided to send his partner down one street and he mistimed down main meeting
    the side streets as he went along. Subconscious found the shop and came back for Dippy who followed him a short distance
    off main street. There it was with the word signs 3 foot high painted on a board over the front which by the way, had
    it been painted since Moses had his shoes half-soled. The average small shop advocates the painting of signs but seldom
    paint their own. He peered into the dim interior.
- speaker: Respondent
  text: What little light filtered through the dusty window was not adequate to good sight. He stopped inside and gradually
    his eyes became accustomed to the dim light and things began to take shape. He made out the paint bench with its litter
    of empty cans, paint paddles and what not, a block and falls carelessly on the floor, a half empty keg of white lead and
    other apparatus common to the trade. He ventured farther into the paint laden atmosphere and let out a tentative 'Hello.'
- speaker: Respondent
  text: He noticed now farther back along the wall something that looked human. It was folded into a chair tipped back against
    what appeared to be a desk in the last stages of decay. On closer examination it proved to be the prop, an old timer whom
    Hippy had known long ago in another and better environment. He had worked with him at one of the best shops in the middle
    west. He had had a bad fall and one leg had remained stiff and as his stage career was ended he had hid himself to a small
    town and built up a little business of his own. As the years went by he had became more and more careless. His ambition
    was limited now to 'getting by' until he was called to the big shop where all signpainters are sketch artists and the
    angels are their helpers. Hippy stepped back and yelled, 'Hill. Happy!'
- speaker: Respondent
  text: Web came the chair with a bang spilling its contents in a heap, language unfit for the ears of polite society. The
    heap jerked itself into an upright position the eyes assuming their natural focus and after a time recognized the disturbing
    element and greeted him with enthusiasm. 'Hippy Flinn! Just the boy I wanted to see. I been thinking about you the last
    few days. I got a job for you. Remember the big elevator down by the tracks? You did it once before. Remember?' 'Yes,
    I remember. That's the last time I saw Pats! What ever happened to him?' 'Patsy? Oh yes, I remember now that was the helper
    you had then. He stayed around here a while, then got himself a job with a farmer out of town a ways. Stops in every once
    in a while to say hello. He'll be in one of these days.'
- speaker: Respondent
  text: '''I like to see old Patsy he was a pretty good man while he lasted.'' Dippy looked around for ''Sub'' and saw him
    fast asleep in the chair that had just erupted with Happy. It was back in the original position against the desk but with
    an added feature. Sub had found a box placed it in front of the chair and placed his heels thereon. The sight of ''Sub''
    in this comfortable position reminded Dippy that he had been on his feet all day two hours and he also must need rest.
    He spied a dilapidated overstuffed armchair edged over to it and sank down with a sigh of content. ''Happy'' found himself
    a box and placed himself in front of Dippy and continued to keep him awake with reminiscences of the good old days.'
- speaker: Respondent
  text: Dippy in the meantime bethought himself of the desire to eat and mentioned that desire to Happy. At the mention of
    food Subconscious' nose began to twitch but he kept his eyes tightly closed in the hope that he would not be required
    to get out of his comfortable position and repair to the store for it. But Happy had other ideas, his eyes searched the
    rear of the shop for his 'shop punk' and shouted 'Doeskin' and for the first time since he came in Dippy noticed the shapeless
    bundle ensconced on a box in the shadows of the shop. The shape entangled himself from the darkness and came forward his
    eyes wide in admiration of the boomer of whom he had heard so much. In his eyes Dippy was a hero, a God. The one whom
    Happy always used to express perfection in signpainters. Dippy could do this, Dippy could do that, Dippy would do it this
    way and so forth had been drummed in his ears until his imagination was imbued with the magic of Dippy, the super sign
    painter.
- speaker: Respondent
  text: Happy introduced him as 'Dumbfounded Doeskin' and then instructed him what to get and where to get it and that on
    the way he could deliver that show-card to Devine the dry-good merchant and not to forget to ask the grocer for a little
    salt. The talk lapsed into the good old days. Of the time Patsy was elected door man at the union hall and made his boss
    stand outside because he couldn't give the password and Patsy wouldn't apprise the chair of his presence and how the boss
    had ranted and raved about it so much that Patsy had to quit and get another job, he wasn't forced to but he did and the
    boss tried to get him back 'cause he was a good man. How Charlie Obst and 'Dash' Fogarty when painting a big Maxwell sign
    on a building high up on the bluff facing the drive the wind came up blew the planks off one of the stages they were using
    and how they scrambled to get off and how 'Dash' brought a quart of his grandma's balsam and whiskey one morning and they
    weren't any good the rest of the day. How Maxie G 25 had flirted with a girl in a window of the house they were working
    on and married her two weeks later, that he had three kids now and that one was apprentice in the Outdoor shop, and so
    throughout the afternoon.
- speaker: Respondent
  text: Dumbfounded Doeskin had been listening with eyes open and ears wide for he had made record time in his trip to get
    groceries not willing to miss a word of conversation. Talk finally around to the job and the elevator, Happy had been
    unable to get anyone to do it on account of the height. 'The signpainters they put out nowadays are afraid to go high,'
    says he. 'You tell me what you need Dippy and I'll get it for you.'
- speaker: Respondent
  text: '''What about falls. I''ll need 200 footers on that wall if I remember right!'' and here with hidden wink at Happy
    he said ''What about sky hooks you still got that pair I brought you the last time I came through here?'' Happy maintained
    a straight face and solemnly pondered his answer. ''Now let me see who did I lend them to? Oh yes, I lent them to th-'
