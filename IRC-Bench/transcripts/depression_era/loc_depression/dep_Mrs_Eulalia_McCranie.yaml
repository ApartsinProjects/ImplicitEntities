collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Mrs. MoCranie, is it true that you are a descendant of the Indian Princess, Uleleik, whose romantic interest in Juan
    Ortiz four hundred years ago gave rise to one of the earliest historical love stories of Florida?
- speaker: Respondent
  text: No, but I was named for a Spanish Princess of the early days, Ulalia. She later became queen of Spain. My father,
    R. S. Williams, brought my mother to Florida from South Carolina just before the War between the States, locating near
    the present town of Melrose, where I was born in November, 1866. This is about sixty miles from Jacksonville.
- speaker: Respondent
  text: When I was four or five years old, a colony of South Carolinians settled in Columbia County, between Gainesville and
    Lake City, and we moved there. In this section and all around Lake Santa Fe were beautiful, well-producing orange groves
    at that time, and my father operated one of these groves.
- speaker: Respondent
  text: I grew up in that section. Melrose, Waldo, Hawthorne, and Starke were popular tourist towns. Canals were being constructed
    connecting Waldo with the towns mentioned and others located in Lake Santa Fe, etc. A steamer made regular daily trips
    between these points. This was the only easy way of transportation, as there were no railroads in that section.
- speaker: Respondent
  text: At Carlton, home of the Harle family of early settlers on the Santa Fe River, there was a popular old hotel called
    the Carlton. It accommodated many famous travellers to Florida in the early days. I saw the wreckage of this old hostelry
    when I was a very small child, just after the war, but our fortunes were so disastrously affected by the aftermath of
    the war that I have tried to forget everything concerning it, so do not remember the names of any of those travellers
    or who operated the hotel.
- speaker: Respondent
  text: Sixty years ago, Waldo was probably a better tourist town than Jacksonville. South Florida, of course, had not then
    been developed. There were no small fruits or vegetables grown in that vicinity then. Strawberries came in commercially
    in the Starke section about forty-eight years ago. They were grown and shipped from there for many years before the Plant
    City region was developed.
- speaker: Respondent
  text: The 'great freeze' in 1889 destroyed the fine orange groves around Lake Santa Fe and on down to Dade City. Grove owners
    did not understand cultivation, propagation, caring for with fertilisation, smudging in bad weather, and other things
    like they do now, and the destruction of the citrus groves was complete.
- speaker: Respondent
  text: I was educated in the early Florida schools. I went to a girls' school in Columbia, South Carolina, where I was graduated
    in 1886.
- speaker: Respondent
  text: I met my husband, Hugh J. MoCranie, and we were married in 1884. My husband was a native of Georgia, and we boarded
    at war-towns, where we lived for fourteen years. He was in the lumber business and became associated with Mr. George Drew,
    one of the early governors of Florida, and they operated a sawmill at New Branford, on the Suwannee River, near the present
    town of Alachua in 1887 and 1888. G. B. Porter had charge of the planing mills.
- speaker: Respondent
  text: By this time the railroads were being developed in Florida. The early H. B. Plant System came in by way of DuPont
    and Live Oak, and went on to Gainesville, then down further south. My husband became an auditor for the railroad company.
- speaker: Respondent
  text: In 1898, during the Spanish American War period, he was transferred to Tampa, taking charge of the office there. At
    that time we had just one paved street in the city of Tampa, and that was Franklin Street, which was paved with cypress
    blocks. Two or three streets later were paved with these heavy blocks, but the loaded drays and the constant tramping
    of the horses to the delivery wagons broke up the blocks and wore them down, so that they were very unsatisfactory. Then
    during heavy rains they would wash out and would have to be replaced.
- speaker: Respondent
  text: It was after the Spanish American War that Plant Avenue, Hyde Park, and the older sections were paved.
- speaker: Respondent
  text: While we were living in Waldo, my husband purchased a beautiful bay saddle horse, which he enjoyed riding. After we
    moved to Tampa he had little use for riding and wished to sell the animal. Learning that Col. Theodore Roosevelt was desirous
    of securing a mount, Mr. Spottswood, father of our local commercial photographer, Jack Spottswood, relayed the information
    to Mr. MoCranie, who got in touch with the popular Teddy, with the result that the sale was consummated, and it was this
    horse which led the popular hero up San Juan Hill.
- speaker: Respondent
  text: Yes, I am a firm believer in the Word and I do not believe its influence is waning. It is just that there are so many
    people in the world nowadays and there are diversified interests, so that they do not devote the time to religious observances
    so much as in former years.
- speaker: Respondent
  text: Do I vote? Yes, I have voted as it has been permissible. I felt a little strong at first, but now that so many women
    vote and serve as clerks and tellers at the polls, one feels right at home. It is a privilege to express one's preference
    by voting, and I believe everyone should avail themselves of this privilege and duty.
- speaker: Respondent
  text: I am heartily in favor of the New Deal, and its results are apparent even in my neighborhood. In former years, my
    pastor who lives across the street, adjoining the Springfield Methodist Church, was often hard put to take care of some
    of his flock. But the work furnished and the wages paid to those in our neighborhood on the WPA are apparent, and if it
    is so in this small section, what must its accomplishments and rehabilitative effects be throughout the United States?
