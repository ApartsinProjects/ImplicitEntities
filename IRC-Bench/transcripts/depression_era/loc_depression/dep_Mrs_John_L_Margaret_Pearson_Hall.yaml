source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I was born there in 1883, and lived there until I was about eight years of age.
- speaker: Respondent
  text: My grandfather, Arthur N. Reed, settled there in the latter part of the War between the States, at a time when there
    was danger of bombardment by the Federal gunboats then in the harbor.
- speaker: Respondent
  text: My grandfather was a native of Connecticut, and my grandmother Harriet Douglas Reed was a daughter of ZUdlie Thomas
    Douglas, also a native of Connecticut, who settled in St. Augustine in 1826.
- speaker: Respondent
  text: My great-grandfather Douglas was appointed as Judge of the Supreme Court of Florida in 1826 by John Quincy Adams,
    then President of the United States, and served in this office for nineteen years, being reappointed by three successive
    Presidents.
- speaker: Respondent
  text: In addition to the bank, grandfather Reed also operated a mercantile establishment, but I do not know just where it
    was located.
- speaker: Respondent
  text: He felt that his family were in imminent danger when the Federal gunboats arrived in the harbor at Jacksonville in
    1862, and retired to this old plantation with his family, out of the war zone.
- speaker: Respondent
  text: I have a Colonel or Captain Hicks mentioned as the immediate predecessor, and before him the land was part of the
    Nointosh grant. It comprised considerably more than fourteen hundred acres. It was a grand old place as I remember it
    during my early childhood.
- speaker: Respondent
  text: The large house faced east along the St. Johns River, which runs almost due south to north there. It was a frame,
    two-story structure, painted white with a red roof. A long wide porch ran the full length of the front, and around to
    the south.
- speaker: Respondent
  text: A wide hall ran through the middle of the house. On one side was a large living room, a dining room, also a smaller
    room used as a sitting room. On the other side, were two large bedrooms and a bathroom. There was an artesian well on
    the place, which furnished running water in the bathroom.
- speaker: Respondent
  text: The wide stairs ran up in the center of the hall, and there were two lovely bedrooms on this second floor, the back
    part being a storage room and attic.
- speaker: Respondent
  text: There was a door out of the dining room leading into a side hall, off which was a locker or pantry, where supplies
    and linens were kept. The hall continued to the back of the house where was my grandfather's large library, off which
    was a back porch with steps leading down to a brick walk that ran to the little brick kitchen where the family cooking
    was done. There was never work done in the house, nor meals cooked.
- speaker: Respondent
  text: Late one evening when my grandfather had first located on the place, two middle-aged Negroes with two little pickaninnies
    came drifting down the river in a rowboat and tied up at the landing. They were free Negroes, as the result of the Emancipation
    Act, and had no place to live.
- speaker: Respondent
  text: 'Grandfather Reed promptly hired them, and they became an integral part of the plantation life—Uncle George and Aunt
    Nancy Races—as we knew them. The little boys were named Abram and Nick. Afterwards four more were born on the place: Frank,
    Pete, Ike and Sam. They were all grown when I could first remember them.'
- speaker: Respondent
  text: Frank came into Jacksonville and learned the carpenter's trade, and he did all the building and kept up the repairs
    on the place.
- speaker: Respondent
  text: Abram attended to the cattle, attending to the milking and looking after the herd of beef cattle, which was rather
    large.
- speaker: Respondent
  text: Frank and Ike worked in the fields, in season, and Ike and Sam were house boys. They brought up the food from the
    kitchen on big trays and waited on table at all meals.
- speaker: Respondent
  text: Afterwards Aunt Remay, sister, Clifford Brown and her husband, Cornelius Brown, came to live on the place. Clifford
    was the laundress. Cornelius had charge of the stables, about a block west of the big house, in which were kept about
    ten horses and the mules used to do the farming.
- speaker: Respondent
  text: He also acted as coachman, driving the family carriage. I remember the first team was bays, then there was a perfectly
    matched pair of blacks, of which Cornelius took great care, brushing and currying them until their coats shone like black
    satin.
- speaker: Respondent
  text: Then there was Maria Lyles, a house servant for many years, and my grandmother's personal maid. When grandmother became
    old and feeble, Maria slept on a cot at the foot of her bed, and was with her day and night. Abram performed the same
    personal service for my grandfather Reed.
- speaker: Respondent
  text: The darkies were punished if we scolded them wrongly. They were all paid for their work. I do not know how much, but
    I know they were well taken care of. Some of the neighbors said they were spoiled and made pets of, but they all worked
    hard and certainly deserved the pay they were given.
- speaker: Respondent
  text: There was a two-room frame laundry away from the kitchen, and here, Eliza, who was Abram's wife and had only one eye,
    did the family laundry, assisted by Clifford. They had only old fashioned tubs and washboards, but they did wonderful
    work.
- speaker: Respondent
  text: In one of the rooms was a stove where they heated the water and boiled the clothes in the old time manner. The men's
    shirts were snowy white, the bosoms, some of which were tucked, and the attached collars and cuffs starched stiff and
    highly polished with their hot irons, heated on top of the stove.
- speaker: Respondent
  text: The women's and children's clothes were adorned with many ruffles, and these they fluted. It was fun to watch as they
    heated the rods red hot, ran them in the fluting-iron which was turned with a crank and the ruffle passed through.
- speaker: Respondent
  text: To the south of the house was a large flower garden, where there were many roses, geraniums, and the usual perennials
    of that time. My mother took care of the flowers. Another brick walk led down to the greenhouse, with its glass top, its
    bins for bulbs, and shelves for the geraniums and more tender plants.
- speaker: Respondent
  text: From the front porch along an avenue flanked by large oaks, intertwining overhead, and carpeted with St. Augustine
    grass led to the river about three hundred feet away. There were a few old mulberry trees scattered around, the remains
    of the silk-worm industry started many years before at St. Augustine. I presume this gave the name of the Old Mulberry
    Grove Plantation to the place, as it bore that name when my grandfather settled there.
- speaker: Respondent
  text: On the river at the end of the oak avenue was a long dock. River traffic was heavy then, and the boats used to land
    if we put up the flag for the purpose of shipping freight into Jacksonville, and they would deliver orders of food.
- speaker: Respondent
  text: Among these river boats were the 'Crescent City,' the 'Mary Draper,' the 'Manatee,' and sometimes the 'Three Friends,'
    would tie up at the dock. I remember one day, my brother, Reed Pearson, told me I might blow the whistle of the 'Three
    Friends.' I was hardly eight, but I climbed aboard importantly, and seized the rope, giving it a stout yank. The whistle
    shrieked, and the rope came clanging down behind me with a thump that nearly scared the life out of me.
- speaker: Respondent
  text: In the boathouse under the docks my grandfather kept two boats—the 'John Perry' and the 'Fanny Perry'—four-oared rowboats
    in which he used to come to Jacksonville. In later years, when telephones came into use, there was a telephone in the
    house and also in the boathouse, and we used to telephone around over the place and the neighborhood, where phones had
    been installed.
- speaker: Respondent
  text: The brick walk ran around the house from the front door to the back yard, divided—one walk going to the greenhouse
    and the other to the kitchen, where old Aunt Vinnie held sway. She did the cooking for everybody, the white folks at the
    big house, as well as for the darkies and field hands.
- speaker: Respondent
  text: There was another frame kitchen beyond the little brick kitchen, which was the quarters of the Reeds.
- speaker: Respondent
  text: There was a stone smokehouse in the back yard, where a kind of commissary was kept. You see it was away out in the
    country and it was a cooled room upstairs where the dried peas for the family use were kept.
- speaker: Respondent
  text: I remember having great fun and running up and down the stairs of the old cotton house—it was alive with rats—and
    sometimes we would stage battles with them.
- speaker: Respondent
  text: There were chickens raised in great numbers, as well as other fowl—turkeys, ducks, geese, guineas—trotting around—and
    later my brother had a few peafowls. Aunt Nancy used to pull the down from the breasts of geese and make down quilts.
    This process did not hurt the geese, as they shed the down anyway.
- speaker: Respondent
  text: Orange trees surrounded the place, and these took a lot of attention. Finally in the late 1930s a freeze killed the
    trees right down to the ground, and they were not replanted. In the early days quantities of oranges were gathered, packed
    and shipped from the old place. There were other fruit trees, too; pears, peaches, plums, also strawberries, and blackberries.
- speaker: Respondent
  text: Under the old kitchen where Uncle George and Aunt Nancy and their family lived was a big cellar, and here was stored
    the surplus fruits which had been canned, or made into preserves and jellies. This was not locked at all times.
- speaker: Respondent
  text: Enormous trees were all around—live oaks, water oaks, tall pines and palms, and the few mulberry trees, too, were
    immense. They were filled with birds—mockingbirds, redbirds, jays, sparrows—their chirping was constant, and nobody thought
    of harming them or shooting them.
- speaker: Respondent
  text: Beyond the mulberry trees and 19 in the oats field was a large Indian camp and burying ground, quite large and high
    and overlooking the river. A representative of the Smithsonian Institution did some excavating there and found twenty-four
    bodies down deep in the ground.
- speaker: Respondent
  text: There was the remains of the old sort of fireplace deep underground, and the skeletons were all around that, arranged
    in a circle with their heads towards the hearth. The skeletons, as I remember, were of enormous size.
- speaker: Respondent
  text: We had great fun with the Negroes, the pickaninnies of Clifford and Cornelius, Eliza and Abram, and I never remember
    having been punished for associating with them. They all loved us and we loved them just as if they were a part of the
    family.
- speaker: Respondent
  text: After supper we used to tear down to the old kitchen, where Aunt Nancy and Uncle George would play with us. I never
    remember them telling us any stories of any kind. They seldom sang any songs, but they did hum a great deal, suiting the
    rhythm to their work.
- speaker: Respondent
  text: Old Uncle George died in that old kitchen, and after Aunt Nancy got too feeble to work, she went to live with one
    of her sons who had married and lived in a cabin in the woods nearby.
- speaker: Respondent
  text: Grandfather and grandmother were great souls, and were wonderfully good to us. We led a happy life at old Mulberry
    Grove Plantation.
- speaker: Respondent
  text: After grandfather passed on the plantation descended to my oldest brother, Reed Pearson, who was named for him, and
    then we moved to Jacksonville.
