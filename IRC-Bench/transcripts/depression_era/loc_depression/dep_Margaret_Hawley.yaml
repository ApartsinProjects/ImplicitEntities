collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I work in Armour's sausage department. They make all different kinds of sausages. Making capriola, that's a hot Italian
    sausage, lots of spices and garlic in it, well, it has to be skivered. That lets the excess water out of it so that it
    won't spoil. Well, I do the skivering. I get all wet and greasy and sloppy. Everybody does, working on sausage.
- speaker: Respondent
  text: They have sausage that they treat specially so it will have a green, fuzzy mold all over it. I don't know how anybody
    could want to eat it but it's made specially for Italian stores, so I guess people order it.
- speaker: Respondent
  text: One thing, we're supposed to have trucks that we load the capricola in when it's ready for a different part of the
    floor, but they never have enough trucks, and we'll have our work tables stacked a mile high with finished work without
    being able to get rid of it. Then they come around and yell at us because we can't put the work out. It's us girls who
    lose time and pay, and they act like it's our fault that the company don't furnish the department with enough trucks to
    keep the place going.
- speaker: Respondent
  text: They have the old women hauling on the trucks. The young ones wouldn't do that heavy work, most of them aren't even
    strong enough to do it if they wanted to, and they sure don't want to.
- speaker: Respondent
  text: I worked in there where they put up pressed ham in cans. I packed pressed ham that was full of worms. They knew. But
    I once said something about it to the boss and just got bawled out for not minding my own job better and talking too much.
    So I shut up. I was glad when they transferred me to sausages again, though. That wormy stuff made me sick through. Sure,
    it's dirtier and wet there where I work now, but there's norms in the sausage meat. Or if there is, at least I don't have
    to see them, and then pretend I don't.
