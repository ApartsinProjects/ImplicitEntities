collection: loc_depression
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Time ah went to the yards they put me on as a laborer on the Killing floor. That was in Beef Kill but they soon had
    me transferred to Sheep Kill. Ah used to try handling a knife, try to do some of the butcher jobs, you know, when the
    foreman wasn't around. Well, that's a trade and ah wanted to learn it so ah'd have a better chance to keep a job there.
    Time ah started there was lots of Negro workers there, you know, had been in the yards since they were brought from the
    South to help break the big strike, well, they'd let me pick up the trade, helping them on the job. Foreman, he came over
    once and see ah know how to handle a knife so ah got a butchering job as soon as there was call for that. What ah do is
    out off sheep's head after it's been dressed. Ah been doing that particular job more than 12 years now. Ah know fellows,
    told me when they started in the yards, and tried to learn to butcher, white men on the floor didn't like to see it. They'd
    do almost anything to keep them from learning, throw anything they could lay hands on at them, knives, sheep fat cups,
    punches, (that's tools we work with) anything. The white butchers, they hated the Negroes because they figured they would
    scab on them when trouble came and then get good paying, skilled jobs besides. Well, that was a long time back, with the
    CIO in, all that's like a bad dream gone. Oh, we still have a hard work but this time the white men are with us and we're
    with them.
- speaker: Respondent
  text: You take pork packing. Jobs like that, they're clean, easy, light. You won't find Negroes working there. They won't
    give them such jobs. When they 'raise a gang', (that's a term they use in the yards when there's new men being hired,)
    you can bet you won't see any Negroes coming in. Like in '33, they were hiring young white boys, 16 and 18 years old,
    raw kids, didn't know a thing, but there were plenty of colored boys waiting for the same chance who never got it. Hank
    Johnson, just the other night said he'd bet there hadn't been a Negro hired in Armour's in 7 years. He knows what he's
    talking about. Of course, they lay off Negroes who later are rehired. But if they haven't worked there before they don't
    stand a chance. Ah remember one time ah was fired. Ah was doing my job and the work was coming too fast so ah had to let
    some of it go on by. Well, ah know the boss was drunk and he came by, asked me why ah didn't keep up and ah told him.
    He was too drunk to listen, just got mad and said 'get to hell out of here.' Ah see there was no use arguing with him
    like he was. Just picked up my mat and hat and walked out. Three days later they called me back to work. Ah thought they'd
    take away my vacation time for that, but they didn't. Never will know why they didn't break my seniority on account of
    it.
- speaker: Respondent
  text: Guys would tell about when they 'worked for the church'. A man would finish his work and go punch time clock. Then
    he'd have to come back and work without being paid for the time he was putting in. Never had to do that myself, but sometimes
    the foremen would make us work five, ten minutes overtime, and finally we stopped that. At that time they had those big
    sheep fat cups hanging on the chains. We'd see they were working us past supper hour. Man farthest away from the foreman
    would whistle and all the guys at work would start hollering 's-o-u-pl' and whistling and banging the cups around, working
    all the time, you know. So they couldn't fire us all and we made so much racket they quit that particular chiseling after
    the first few times.
- speaker: Respondent
  text: There's an old man, he pulls hog fat. Pulls hog fat off the carcass and stows it in the fat cups. He's been on the
    killing floor for thirty years, and been stone blind for twenty years. He can get around on that floor as well as anyone
    of us with eyesight. Knows every man on the floor by the sound of his voice. He does his full share of work, and better
    than most, at that. Ah was working with him 6 months before ah found out he was blind, he gets around that good. Don't
    know how he lost his sight. He don't need but a man to take him home at night and bring him to work mornings. Guess after
    you been working thirty years at one job you don't need much else except habit to keep going. Some guys come to work drunk,
    so drunk that they can hardly walk, but they can do their work. They've been doing the same thing for so many years, they
    can do it sleeping.
- speaker: Respondent
  text: They have a union in Armour's, keep a lot of people out of the CIO. If you want a loan from them you have to have
    a good record. Well, some fellow, colored fellow, he tried to get a loan. They knew he was a Union man, so they made it
    hard for him. Told him to get some worker with a bank account in the credit union to vouch for him. Fellow went and got
    Charlie. Charlie had been in the yards a long time and he happened to have some money there. He walked into the office
    and signed them papers, and them in charge of the loans with their eyes popping like a fish out of water. Manager asked
    Charlie to step into his private office, he was so upset. He said to him, 'You really mean you want to sign for that man,
    and he a colored man? I hate to think of a white man would want to take on that responsibility.' Charlie, he's Irish,
    and he looked at this manager and grinned. He said, 'Well, sure now, I do appreciate that bit of advice, man, you ain't
    charging nothing for it. But that black boy's my friend. He works with me. He's a union brother and I guess maybe you're
    surprised to hear that I'm with the union, too! So just save that advice of yours for somebody who don't know no better.'
    Walked out of there and slammed the door. You think that colored fellow didn't get his loan? He got it. Manager couldn't
    do a thing. He really spoke his piece out of turn that time. Got a union man mad, that time, and got himself told.
