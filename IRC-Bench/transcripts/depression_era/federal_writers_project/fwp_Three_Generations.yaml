collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: On the last street within the corporate limits of South Jacksonville stands "Red Bank," an old plantation manor house
    formerly centering a land grant with a seven-mile frontage on the St. Johns River and a history of continuous ownership
    of over one hundred years by a family long identified with Duval County. But an enterprising real estate promoter persuaded
    the eighty-five year old judge, to whom the property had at last descended, that it would make a fine subdivision. The
    burden of years resting heavily upon the owner and the price offered being satisfactory, he reluctantly parted with his
    inheritance, his lifelong home. Thus "Colonial Manor," named for the old house, came into being. This magnificent old
    estate was parcelled off into building lots, and, profiting by experience acquired in marketing a previous development
    on the southside, the real estate company brought modern machinery and dredging apparatus into the picture, sand and silt
    was pumped up from the river bed, and the property line frontage was extended more than a hundred feet into the river.
- speaker: Respondent
  text: The "Red Bank" manor house which in the early days was within a stone's throw of the high bank giving the plantation
    its distinctive name and protecting it from erosion, is now six blocks from the St. Johns. "Colonial Manor" was popular
    from the beginning with those wishing to establish themselves as far as possible from the "madding crowd" and yet near
    the city facilities of running water, electric light, easy transportation and convenient access to local schools. A distance
    which in the old days was a three-hour journey on horseback or by wagon or buggy is now covered by automobile in twenty
    minutes.
- speaker: Respondent
  text: 'New homes sprang up throughout the subdivision: bungalows, modern and more pretentious domiciles, yet nobody wanted
    the old house which stood alone, dignified, massive and substantial representative of an age of construction when a house
    was a home, and built with even future generations in consideration. A little over a year ago, Mrs. Thomas Irvington realized
    its possibilities. Having spent her childhood in just such a home on a Georgia plantation, an inheritance of considerable
    proportions enabled her to justify a longing to again live in a house with twelve foot ceilings, thick walls, deep fireplaces,
    and spacious rooms. The purchase was made, the deed recorded, and restoration commenced.'
- speaker: Respondent
  text: The old house has not had its face lifted, however. It still presents the same solid square front to Ridgewood Road
    as it did in yesteryears to the sand trail which led to the front porch, a popular meeting place for neighboring plantation
    owners. Just the weatherboarding has been renewed, the old colonial door replaced by a new one with a brass knocker, and
    now sash in the twelve-light windows that "four-square" the front with narrow green shutters framing the sides. The eighty-four
    year old brick made by slaves on the plantation are retained in the partitions, foundations, fireplaces and chimneys.
- speaker: Respondent
  text: A double cement driveway leads to the entrance of a two-car garage adjoining the east side of the house. Age-old live
    oaks, with here and there a magnolia tree form a guardian-like protection. Three generations over the house and grounds.
    Assorted bright blooming annuals are scattered over the lawn, with red and pink roses blooming profusely in their formal
    beds, outlined with some of the old bricks.
- speaker: Respondent
  text: It is 10 o'clock and I am rather surprised to see Mrs. Irvington, broom in hand, sweeping away small branches, fallen
    leaves and strands of Spanish moss from the walk and garage door so early in the morning. "If you don't mind, we'll just
    go in through the kitchen. It's more convenient." This seemed a practical aside, since we were now in the garage, and
    there was no reason for journeying up through the yard to make a formal entrance through the front door.
- speaker: Respondent
  text: Up a few wooden steps and we are in the kitchen, a room twenty-five feet square, in the southwest corner of which
    is a modern oil-burning furnace, automatically smoking and registered, the delightful warmth that pervades the interior
    on this February morning, a little chilly even for Florida. This feature, of course, is an important part of the rejuvenation
    of the old place.
- speaker: Respondent
  text: You know it has been raining, but the sun is so bright this morning, I just had to get out of doors, besides old Janis
    who lives a mile to the east of Ridgewood Road is not able to come help me today. She has not been well for some time
    you know. I brought her down from Georgia when I was married, now nearly twenty years ago. By the way, her grandfather
    and grandmother were some of the old family leaves. So the sweeping of the driveway gave me an excuse to get out. In the
    meantime, my sink full of dishes just stands. But I'll have to wash some more later on, so I'll just get them all done
    up at one time.
- speaker: Respondent
  text: Invited to sit down, I avail myself of the only vacant chair one of our breakfast set the others being occupied by
    parcels of greenery and cut flowers from the florist's. "I forgot to tell you that the Story Tellers League, of which
    I am a member, is giving a tea here this afternoon at 4:00, and if it is convenient, I hope you will stay you'll enjoy
    it.
- speaker: Respondent
  text: How many are expected? Well, it is a public affair for the purpose of raising funds for our national convention which
    is to be held in Jacksonville next fall, so there will probably be around a hundred, or possibly more. The decorating
    committee from the league will be here in a short time, until they will place the flowers and greenery around through
    the lower rooms.
- speaker: Respondent
  text: By this time she had started on the dishes, rushing, rinsing and dexterously stacking them on the drainboard. The
    telephone rang. Across the kitchen, into the hall this is Mrs. Irvington, I heard her tell the party at the end of the
    phone. "No, I will use paper napkins, you do not have to bring linen ones. Yes, everything is in readiness. I see the
    efficient decorating committee is just coming in the back door. Yes, the refreshment committee has taken care of their
    part, the tea service is on the table, the tea has been delivered, and the cakes will arrive later. Now you do not need
    to worry about anything. Yes. Thank you. Goodbye." Back to the sink she goes. "That was Miss Monillans, the president
    of the league. She was worrying about napkins. I have about ninety, of different sets, most of them hand-embroidered and
    many of them years old that I inherited from mother. But Janie does not do hand embroidery very well, and I just cannot
    see myself pressing out ninety napkins this morning. Besides, who is there to care or criticize, I like for people to
    come and enjoy my home the same as I do myself and I am sure these modern women would not want to fool there had been
    a lot of preparation made for their entertainment, which occasioned extra work.
- speaker: Respondent
  text: A climax came last week, however, when a woman called, saying she was entertaining some out of town friends with a
    cocktail party, and would I loan her my house, which seemed so well adapted to parties? I never drank a cocktail in my
    life, never went to a cocktail party, and I am still wondering whether it was ignorance or nerve that prompted this woman
    to ask me such a question. Of course, I promptly declined, telling her that my house was for my friends and their friends
    only.
- speaker: Respondent
  text: 'The telephone again. "Yes, Mr. Finkelstein. Oh, I''m so glad. Yes, we''ll pick it up. Thank you so much." A young
    boy came down the back stairs into the hall and then on into the kitchen. Mrs. Irvington returning, says: "This is Sonny,
    or otherwise, Thomas, Jr. He is getting ready to go on a tramping trip with members of his Boy Scout Troop." Sonny starts
    fortifying himself with a cup of steaming hot soup and a handful of cookies.'
- speaker: Respondent
  text: Sonny, you'll have to hurry, so as to be back by 1 o'clock. Daddy will be home by then, to pick you up and go down
    to Mr. Finkelstein's. "It's cool! The French horn is here! Gosh! I never saw such a long three weeks." Sonny has a musical
    regalia says Mrs. Irvington. "There's his violin and bugle in those cases by the door, and now he is getting a Welsh horn.
    I believe he must have an ambition to be one-man band.
- speaker: Respondent
  text: He belongs to the American Legion band, and this gives him splendid training. There was need of a French horn to round
    out the musical equipment, and Sonny volunteered to fill the vacancy. We could not obtain such an instrument in Jacksonville,
    so Mr. Finkelstein ordered it three weeks ago from a New York dealer.
- speaker: Respondent
  text: Sonny looks to be about twelve years of age, but his mother explained he was only eleven, and was in Junior High.
    He plays the piano a little, not an expert. I taught him, she answered, when I asked if he was a pianist also. "John,
    my oldest boy, is sixteen, and graduates from Landon High next June. He is more sedate than Thomas, wants to be a business
    man, but we are quite proud of him, too.
- speaker: Respondent
  text: Sonny, you'll have to rush now, or you'll miss the boys. Stay off the main highway, and watch out for automobiles,"
    she cautioned. He half runs, half jumps to the back door, and is off through the woods to meet the other Scouts. Back
    to the sink. "I feel that on Saturday I can relax. You know through the week I am busy with my twenty kindergartners until
    noon-time, so the mornings are always busy times with me.
- speaker: Interviewer
  text: You had better let me help you with the dishes, and as we work, we can talk.
- speaker: Respondent
  text: How that is very kind of you. Here is the towel," she takes it off the drying rack by the furnace. "I'll wash, and
    you can dry." The decorating committee were asking for yarn and bowls, low containers, so as not to accentuate the long
    wall spaces and high ceilings. "Here is the laundry closet, what you wish." Everything was in orderly rows and the committee
    easily made their selections.
- speaker: Respondent
  text: My kindergarten class, eight boys and twelve little girls all of pre-school age, comes at 9 o'clock each morning and
    they stay until noon. Their parents bring them over and call for them when they are ready to go home. I charge $4.50 per
    month per pupil.
- speaker: Respondent
  text: You see, when I married the man of my choice, neither of us had much money. Mr. Irvington is a sales representative,
    and often is out of town for a greater part of the week. I started my work twelve years ago; it was necessary, as my husband
    works on a part salary - part commission basis and we needed the money for financial reasons, as we both have plans for
    special education of our two boys, development along the line of their most pronounced talents and how the work has become
    a habit. But I enjoy it, I have a lot of idle time, so why not put it to good use - yes, the money still comes in handy,
    as I put most of my inheritance from my mother into this house.
- speaker: Respondent
  text: 'We soon disposed of the dishes and they were arranged in neat piles on the serving table, small plates, cups and
    saucers for the tea party. A glance from a different angle of the room enabled me to observe the careful orderliness of
    the big kitchen. There is no gas for household use on the southside. The Jacksonville Gas Co. has found it too expensive
    to negotiate the use of conduits for piping gas under the St. Johns'' broad expanse, and building an auxiliary plant,
    too, would be an expensive undertaking. Hence, all the kitchen equipment was electrical: a modern range, and beside it
    an electrical fireless cooker. This makes it easy for this modern wife and mother to cook the meals for a family of four,
    with the assistance, when able, of old Janis to do the heavy cleaning and laundry work. She is transported back and forth
    night and morning in a car by some member of the family, to and from her home with another negro family living in a four-room
    cottage on the old St. Augustine road, about a mile away, where she has a room at a dollar a week. Mrs. Irvington pays
    her 60 cents per week, with Thursdays and Sundays off, and gives her most of her food and clothing.'
- speaker: Respondent
  text: The color scheme of the kitchen is barn and dining red; the linoleum floor covering a combination of these two colors,
    the curtains of buff, the breakfast table and chairs the same shades. All chairs have cushions and backs covered with
    cretonne of buff and red, with a tracery of green. The wide windows with their deep old fashioned seats at least eighteen
    inches wide, permitted the light from the east and south to enter, making the room cheerful indeed.
- speaker: Respondent
  text: On one window seat, near the fireless cooker, was a well-thumbed bible, mute evidence of the old southern custom of
    morning prayers. "Notes," said Mrs. Irvington, "We always start the day with prayer and a reading from the scriptures.
    I have been used to it all my life, and it seems better so.
- speaker: Respondent
  text: I'll take those bowls into the dining room, and if you will, you may fill the coffeepot with water and carry it into
    the germinator to fill the vases and bowls when they put the flowers in so they'll stay fresh for the afternoon. It is
    easier that way, and less danger of spilling water on the tables; this old furniture spots very easily.
- speaker: Respondent
  text: We had now passed the pantry space with its voluminous shelves holding linen and dishes, the racks on the wall holding
    the family plate; some of which must be very old, and sailed on into the dining room.
- speaker: Respondent
  text: 'The vista presented was breathtaking. The stairway ran to the second floor from the middle of the house, where the
    walls had been removed, a wide brick arch installed between the dining room and hall, and another on the other side between
    the living room and hall, throwing the whole lower floor into one long room seventy-five feet by thirty feet wide. The
    matching burgundy rugs covered the three floor spaces, with matching draperies at the long windows. The fillers were of
    highly polished oak. Throughout with excellent taste was distributed the family furniture, heirlooms from the old Georgian
    plantation here: a mahogany dining table covered with a hand-made Swiss lace cover; there against the wall a drop-leaf
    table one hundred and fifty years old; an Italian hand-carved bookcase, centered with a low bowl of red sweet peas and
    ferns; comfortable old chairs, with several of modern type all blending into a harmonious whole. In the living room and
    dining room were deep fireplaces, not in use now, of course, as the modern system of heating with its batteries of ventilators
    distributes the heat evenly and comfortably.'
- speaker: Respondent
  text: Most of this furniture belonged to my mother, who died about two years ago at the age of ninety. She inherited the
    plantation near Dalton, Georgia from her parents, together with a great deal of this furniture. There my two brothers,
    four sisters and I were born. I was the youngest of the seven.
