collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I went out one morning to get a Negro woman to do some washing for me. I wanted a certain Negress who had formerly
    worked for my mother. So I went to the address where she used to live. Lil was at home. She lived on a steep, rocky street
    in a very dilapidated house, and in the side yard smoke was rising from the fire around the wash pot.
- speaker: Respondent
  text: Goodness me, Miss, I sho' is glad to see you, I ain't seen you in so long! Come on in, chile, ain't you cold? I had
    a good fire inside.
- speaker: Respondent
  text: Lil offered me the most comfortable chair in the house. Sit down here, Miss, she said. I wants to talk to you a while.
- speaker: Respondent
  text: I really haven't much time, I said, but I do want you to do some washing for me this week, will you?
- speaker: Respondent
  text: Why, yes, chile, you knows I'll do anything for you, but first let's talk about old times. You know, I've been kinder
    worried and seen a lot since I worked for you. I sho' was sorry you let me go, but does you remember the first time I
    ever saw you, chile?
- speaker: Respondent
  text: Well, I seen you come 'cross the hill one evenin' with a big basket. I was wonderin' if you was comin' to my house
    and oh my, you walked up to me and said, 'Here, Lil, this is something my mother sent you and your babies. She said for
    you to feed them and eat some yourself, that she was tired of hearing them babies cry.' Then, next day I washed them dishes
    and went to your ma and worked all that week for your ma, 'cause she was good to me and you too.
- speaker: Respondent
  text: Honey, but she died. Well, course, it is like this; we lose track of people like us did. I thought I had a hard time
    too.
- speaker: Respondent
  text: I got jobs anywhere I could, serving as scrubwoman, washwoman, or maid, earning no certain amount, ma had five children
    to I stopped. My husband, Sam, was a smart man and he was good to me a long time, but as my children got older he got
    to where he stopped giving us money. You know, I couldn't feed five chilluns on a little fifty cent a week washing. Two
    dollars a month for washing don't buy such, girls, and I had to pay $1.50 a month house rent on top of that.
- speaker: Respondent
  text: Sam stayed on at home with us. You remember how things was sometimes. You give us some meat and corn meal to help
    us out some, just like your ma did. Miss, I stood that treatment long as I could then I just got me a man named Ike to
    help me out with my wantons. Well, Ike did help me, but we got to drinking a lot together. That didn't do; me took money
    the children needed and so the first thing I knowed we was fighting. Then Sam got to staying out more and more and he
    got him a woman too. Well, it was all right for me to have a man, I thought, but when he got that woman I flew up and
    got a divorce. My children didn't like that so much, but I just went on living with Ike then, but I was worried about
    Sam. I stayed broke all the time till Ike and I got worse and worse.
- speaker: Respondent
  text: Well, I tell you this much, I knew I just had to do something. Well, I kinder think God took about in my affairs about
    then; my ma and two of my sisters got sick. Well, I went to see them every two weeks. Sam come 'round more than and helped
    me some with the children. My pa, ma, dad, and my sisters and brothers would not help me with the expenses, even my only
    aunt had insurance on her, but would not give a cent to bury her. I'm still paying on that funeral. My sister died after
    several months and the county had to pay that; I couldn't.
- speaker: Respondent
  text: 'My oldest daughter got married, too, about then and went to Atlanta to live. Honey, she married a real man: he don''t
    mistreat her one bit. Up to now they have got two children. One little boy died, but she has got two left. She helped
    us a lot after he married and let one of the children come to see her and stay so I wouldn''t have such a hard time supporting
    them that stayed with us. She put Joe in school there and he got some learning.'
- speaker: Respondent
  text: This man Ike I took up with was still hanging around all the time. Sam, he didn't know much about this, but I knew
    he was wondering all this time where I was getting help.
- speaker: Respondent
  text: The other children was growing up now and Ruth, next to the oldest girl, got sick, so I had to stay at home after
    that and wash and iron. I could not leave home to work out any. Sam began to go out again with this woman of his. I sure
    did hate that, it too, 'cause I loves that nigger till the day I die.
- speaker: Respondent
  text: My man Ike then began to help me a little more 'cause Ruth was getting worse, and only one of the boys was big enough
    to help me at all, and he worked at a small grocery store. He didn't make much and half the time he took up all he made
    by Saturday night in groceries and we couldn't draw a cent. Well, Sam got to coming home drunk and busting down the doors
    and raving and pitching all night. Sometimes he would run Ruth's fever up so high till I would have to hold her on the
    bed.
- speaker: Respondent
  text: One day Sam come in drunk and was cussing me about Ike. I told him he didn't have no business 'round here at all;
    I paid half my rent and wanted him to get out, but he would not do it. About this time Sam lost his job and I don't know
    where he went for three months. He and Ike, though, made it fine for a while. We bought us some new things as you see.
- speaker: Respondent
  text: One day my oldest boy that was working come home. Ike was in the other room talking to him very loud and I wondered
    what in the world was the matter. Well, I went in and Ike was demanding my boy to bring home all his pay that night and
    Frank, my boy, was trying to tell him that he had brought groceries home for us to eat and he couldn't bring any money
    home.
- speaker: Respondent
  text: Ike jumped on Frank and I thought he would kill him before I could stop him. I quit Ike then and took in all the washing
    I could get. I had four washings that brought us $4.00 a week. At night I would be so tired till I could not sleep. I
    thought Sam was coming back to take my furniture away from me every day, but I see now he was waiting to work his way
    back in.
- speaker: Respondent
  text: I got in with another man one day about a month after I quit Ike. His name was Harry, but, Honey, I could not stand
    him. He come in one day and said he heard I had another man on the string and he was going to kill us. Of course I did
    not think Harry meant it, but I want you to know he didn't do a thing but draw a knife on me and cut my throat. I got
    a scar on my throat that never will go away. Sam got home that night from Tennessee and I was in bed. He said, 'Gal, what
    ails you?' I told him. Lord chile, that nigger went out of this door and went to look for Harry. Sam found him all right
    and put Harry's insides out; I mean all of them. Well, Sam left for a while, but they caught him and turned him loose.
- speaker: Respondent
  text: Ruth got well and went out and got married, I guess. I never did see no man though, but she sure had this baby. She
    was sick all the time after this baby come. Finally I had a doctor with her and he said she had a 'leakage of the heart'
    and would not live long. I found out later that someone gave her some whiskey when she was a baby. That's what caused
    her to be sickly all her life. Well, Ruth died with this awful diarrhea. Oh, she swelled up till she liked to bust before
    she died.
- speaker: Respondent
  text: Now this time my oldest boy had left home. He said he just could not stand things like that no longer. My next boy,
    his name is John, got a job on a beer truck helping out.
- speaker: Respondent
  text: Well, I just didn't know what to do because about this time all the men had left us and this grandchild had to have
    milk. I could not go out anywhere and leave her. I didn't dream about Ike, that had the trouble with Frank, coming back.
    But, bless your soul one day Ike came walking up behind me while I was washing.
- speaker: Respondent
  text: You know, after all that happened between the family, Ike had done a lot for me and he also did look good, too. But
    I was going to play off stubborn and make out like I was still mad at him, but he said, 'Now, Miss, put that washing aside
    for a while, gal. I's got something to say to you'.
- speaker: Respondent
  text: Well, I put everything aside and we went in the house and sat down. Ike began to tell me that he wanted to come home
    and he would be good to my children and especially to the little baby girl of Ruth's. Ike had already bought things for
    the house to make it more comfortable, so I took him back and he has been with me now seven years, and I haven't seen
    Sam. My children is all growing fast and is healthy, 'cause I wash and iron so I can stay at home. Ike is smart and works
    hard and brings us money home every Saturday.
- speaker: Respondent
  text: He sure has stuck to his promise to me. Come on, Miss, and let's look at the other part of the house. I just want
    you to see what people can do when they want to.
- speaker: Respondent
  text: Oh, yes, she said, while getting up, we still has our little parties sometimes, but not rough ones like we used to,
    'cause we found out it won't do.
- speaker: Respondent
  text: I walked into the next room which was a bedroom too. It had an iron bed with a pretty bright silk spread on it, lace
    curtains at the window, a vanity dresser, and a small table with a lamp on it, a rocker, a straight chair, and a neat
    small grass rug on the floor. Then in the kitchen there was a small green and orange colored range in one corner, a home-made
    cabinet and breakfast set against the wall, green curtains at the windows, and a worn rug on the floor.
- speaker: Respondent
  text: Now, I and Ike is paying down on the little shack, which ain't so much to look at, but by stinting ourself of the
    things we feels we is got to have, we is paid a nice little sum of money on this place and soon we is going to own the
    little old house and lot. Now you see, Miss, I am proud I did stay with Ike after all. The funny part of it is Ike come
    from the same county I did.
- speaker: Interviewer
  text: What county did you come from, Lil?
- speaker: Respondent
  text: We both come from Oglethorpe County. And we was both farmers. My childhood days was very happy and Ike says his was,
    too. We didn't either one of us have much schooling, but we can write our names. Well, Miss, I will be over to get the
    clothes after while.
