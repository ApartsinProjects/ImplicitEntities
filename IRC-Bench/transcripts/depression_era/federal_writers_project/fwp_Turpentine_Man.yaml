collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Yeah, man. I was born in a turpentine camp near about forty years in the business, and would have been in it yet if
    the bottom hadn't dropped out of it. I've soaked up so much turpentine in my life that if you run us through a still right
    now, I reckon you'd get about ten gallons out of me.
- speaker: Respondent
  text: Men I say I was born in a turpentine camp I mean just that. My father was manager of a 20-crop naval stores place,
    as we lived in the camp near Eastman, Georgia, and I was born right in that camp in 1899. There was six children of us,
    and as soon as us boys was old enough we sure had to work, helping around the still or the commissary, or work as water
    boys. When I was about two years old my folks moved to another camp at Bay Lake, Florida.
- speaker: Respondent
  text: I started to school there when I was six, in a little one-room log schoolhouse in the woods. I started in the turpentine
    business as a water boy when I was eight, and finally worked myself up to manager of eight camps at $250 a month.
- speaker: Respondent
  text: My folks believed in education, and I was sent to school regular when I was a boy, but worked in the summers. When
    I was about ten years old we moved to a camp at Martin, seven miles from Ocala, and I was promoted to tally man—keeping
    tally on the number of trees boxed or streaked by each nigger. Niggers do all the labor in the woods, and most of the
    work around the still.
- speaker: Respondent
  text: The manager, foreman, commissary men and woods riders are all white men. At each camp there will be from 50 to 200
    niggers, according to the number of crops worked. A crop is about 10,000 trees.
- speaker: Respondent
  text: The white folks live in fairly good homes at one side of the camp, and the niggers in their quarters at the other
    side in two or three-room cabins or board houses. We always aimed to have separate quarters for the single niggers to
    keep them from messing up with the married men's wives. But this didn't always work, and there was many a fight on account
    of them mixing at night in the woods.
- speaker: Respondent
  text: By the time I was 12 years old I begun to learn how to make boxes and streaks, and do everything else in the woods
    and at the still. A box is a deep cut in the tree to catch the gum, and streaks are shallow gutters cut in the trunk of
    the tree to lead the gum down into the box. In late years most turpentine men use cups attached to the tree to catch the
    sap or gum, instead of the deep boxes they used to cut. The cup system makes the trees last longer.
- speaker: Respondent
  text: The dip squad travels through the woods with a team or truck loaded with barrels into which they collect the gum,
    and then haul it to the still to be refined into spirits of turpentine. The gum is about as thick as thick syrup, and
    when heated the rosin settles to the bottom of the still, and is drawn off hot into barrels.
- speaker: Respondent
  text: When I was about 13 years old I started to ride the woods and was foreman of the dipping squad. I rode three crops,
    and that was a man's work. About 1914, when I was around 15, we moved to Loraine, Manatee County, about 12 miles from
    Bradenton. At this camp the boss thought I was too young to ride, so he gave me a job as tally man and inspector of box
    men. By this time I was an expert box cutter myself, and could tell the niggers how to do it right. If a box ain't cut
    exactly right it's no good at all.
- speaker: Respondent
  text: I worked part of a year there, and then got a job guarding convicts in a turpentine place at Punta Gorda. All this
    time I was going to school in the winter, and when I was 16 years old I graduated from high school at Ocala.
- speaker: Respondent
  text: Next I got a job as manager for Mr. Hamp Lowther who had a 30-crop place at Verna, Florida. There I worked in the
    commissary some, and worked as woodsman, riding one ride, besides acting as manager. I worked there and at other camps
    till I joined the army and went to France in 1917. After the armistice I came to Tampa.
- speaker: Respondent
  text: Then in 1919 I got the idea I could get rich raising cantaloupes, so went to Ocala and tried it a year and lost $4500
    I had saved. My cantaloupe crop was a plum failure. So I decided I'd better stick to turpentine.
- speaker: Respondent
  text: In 1920 I went to work as over-rider over eight woodsmen on a 100-crop job at Nalaca, Florida, but there came a blimp
    in the price of turpentine and the force at this place was out to about nothing, including me; so I left there and the
    next year when the market picked up a little I got another job, as foreman of a 40-crop place at Miakka.
- speaker: Respondent
  text: Another drop in the price of turps laid me off there in 1922. Up to then I hadn't had much time to think about getting
    married, but now, with nothing else to do, I remembered a nice gal I'd met in Polk County, so I went a-courtin' up there
    and married her. Then I got a job as manager at Camp Four in Polk County, for Mr. W. O. French.
- speaker: Respondent
  text: In 1922, I think it was, I was offered a better job, as manager of eight camps owned by a New York concern at Opal,
    Okeechobee County. This was a big virgin woods in low, swampy country, and the outfit was a big one of 120 crops. There
    I had charge of 400 niggers and nine woodsmen (riders). I got $250 a month and held that job for two years.
- speaker: Respondent
  text: Then came the damndest rainy season I ever saw in Florida. It poured down for weeks, and water stood knee deep all
    over the woods. We had to sit around in camp and do nothing. There were 400 head of niggers and 30 head of horses and
    mules eating up rations, and besides the wet weather made the horses and mules' backs all sore so we couldn't work them
    anyhow. I sure had a mess of trouble on my hands.
- speaker: Respondent
  text: And to make everything worse the big bosses in New York kept telegraphing me and wanting to know why no production.
    Finally I got mad and told them to go to hell and get somebody else, and I walked and waded off the job.
- speaker: Respondent
  text: Next I worked a while as manager of a 30-crop job at Camp Cook, near Panama City. All this time, remember, the price
    of turpentine kept going down, and that was mostly the reason I changed jobs so much. Whenever the demand for naval stores
    got slack the operators would shut down or cut wages.
- speaker: Respondent
  text: Substitutes for turps and rosin were common on the market, and besides many plants had begun to distill the product
    from stumps and lightered knots. This cheap stuff made it almost impossible to operate a regular turpentine business at
    a profit.
- speaker: Respondent
  text: By the latter part of 1924 I had some money saved, so I went to Spring Park, Harlon County, and bought me a 10-crop
    turpentine place of my own, and 200 acres of farm land. Then the Florida boom began, and my laborers all left and went
    to the cities or up North where they could get higher wages.
- speaker: Respondent
  text: I couldn't make a living on my place, so I quit and went to road contracting for a while. Then from 1926 to the latter
    part of 1932 I worked for Aycock Lindsay, big Florida turpentine men, as manager and later as top rider over all their
    camps in Dixon County.
- speaker: Respondent
  text: In 1934 the price of naval stores again hit bottom, and I went to Venus, Florida, as superintendent of a logging camp.
- speaker: Respondent
  text: In 1937 I heard that the government of Haiti wanted an experienced turpentine and timber man to survey the pine forests
    of that country for possible sources of turpentine and lumber, and I sent in my application along with fine letters of
    recommendation I had from the leading turpentine and lumber companies of Florida.
- speaker: Respondent
  text: There were a lot of other applicants, but I got the job and went to Haiti in 1937 to take up that work.
- speaker: Respondent
  text: When I got to Port-au-Prince, the capital, the government furnished me with a military escort, guides, camping equipment,
    laborers, and everything necessary to explore and survey the immense forests there. The timber resources there were practically
    undiscovered and undeveloped.
- speaker: Respondent
  text: In two trips I spent about two years there in all, and discovered approximately 22,000,000 acres of good turpentine
    producing timber, absolutely virgin, and of such growth that most of the trees will cut 12x12 timbers 50 to 70 feet long.
    I established a turpentine still there and it is now in commercial production.
- speaker: Respondent
  text: They don't know what they've got down there. There's millions of dollars in the finest virgin timber, and with labor
    at 20 cents a day they can produce naval stores to compete even with the cheap synthetic substitutes.
- speaker: Interviewer
  text: When asked about the home life of the Negroes in the Florida turpentine camps, can you describe it?
- speaker: Respondent
  text: Turpentine niggers are a class by themselves. They are different from town niggers, farm laborers or any other kind.
    Mostly they are born and raised in the camps, and don't know much about anything else. They seldom go to town, and few
    of them ever saw the inside of a school house.
- speaker: Respondent
  text: In nearly every camp there is a jack-leg preacher who also works in the woods, and they usually have church services
    on Sunday at one or another of their houses.
- speaker: Respondent
  text: And every camp has its 'jook', as they are now called, but the original name of this kind of a joint was a 'tusk'.
    This is a house where the men and women gather on Saturday nights to dance, drink moonshine, gamble and fight. Between
    dances or drinks, young couples stroll off into the woods and make love.
- speaker: Respondent
  text: The supreme authority in a camp is the foreman. To the niggers he is the law, the judge, jury and executioner. He
    even ranks ahead of God to these people. In speaking to him they all call him 'Capple'. Among themselves they call him
    'The Man'.
- speaker: Respondent
  text: And believe me, he better be a man from the ground up. If he ever stands for any back talk or shows a streak of yellow
    he's through, and might as well quit. For they lose all respect for him and won't mind him. Even though they keep up a
    pretense of respect to his face, they'll laugh at him behind his back and gang up to make his life so miserable he'll
    soon have to leave. They like to be ruled by an iron hand and no velvet glove.
- speaker: Respondent
  text: Seems like I always had a knack of handling labor. Being born and raised with turpentine niggers I learned their nature.
    They all liked me because I was fair and firm, and they'd do anything for me. If I quit a job and went to another, every
    last nigger on the place would follow me if I told them to.
- speaker: Respondent
  text: Most camps are so deep in the woods that law officers don't bother them much. Outside of murder, the officers usually
    leave it up to the camp foreman to make and enforce his own laws. At least that's the way it used to be.
- speaker: Respondent
  text: In the old days there were very few legal marriages or divorces. For the sake of good camp government and economy
    in housing, it was to the interest of the foreman to see that all unattached men and women got 'married' to each other.
- speaker: Respondent
  text: This was done by what the workers called a commissary wedding. The foreman was a pretty good match maker, and when
    it was decided between him and a couple that they should 'marry up with each other', they simply went to the commissary
    and were assigned a house, and an account for rations and clothing was opened for the pair.
- speaker: Respondent
  text: Then they took their supplies to the house given them and began housekeeping together. This was a 'commissary marriage'.
    Once in a great while, when a couple had some extra money and wanted to put on would style, they'd have a 'courthouse
    marriage'. That is, they would go to the courthouse at the county seat, get what they call a 'pair of licenses', and be
    legally married.
- speaker: Respondent
  text: An incident brought to mind by this account was told the writer in 1916 by J. A. Stevens, foreman of a turpentine
    camp in the backwoods of Manatee County. About fifty Negro couples in the camp had long lived together there without benefit
    of courthouse or clergy.
- speaker: Respondent
  text: One aged pair had been married by commissary wedlock and lived together happily for more than fifty years, and had
    raised a large family of grown children. Somehow a white preacher from the North heard of this unholy state at the camp
    and made such loud complaint that county officials finally, and perhaps reluctantly, issued orders that the Negro couples
    must be legally married or cease living together.
- speaker: Respondent
  text: As a result, Mr. Stevens said, he had to pay for some fifty marriage licenses in a bunch and hold a 'mass wedding'
    in which all the commissary-wed couples were legally united in one grand ceremony. To the Negroes it meant nothing but
    a big adventure and a gay holiday, he said.
- speaker: Interviewer
  text: What about feuds between bosses at different camps over recruiting each other's labor?
- speaker: Respondent
  text: Sure, we was always trying to steal laborers from each other. All of us did it; sometimes just for fun, and sometimes
    because we needed them. We got right mad sometimes, but there was never any shooting.
- speaker: Respondent
  text: I remember one time when I was foreman of a camp in Polk County. You see, the great pastime of all turpentine niggers
    is gambling, mostly playing 'skin'. This is purely a nigger's game, played with ordinary cards.
- speaker: Respondent
  text: Well, one Saturday night after pay day forty of my men was playing skin, when one of the owners of our outfit, a northern
    man, came to camp and saw them. He said nothing to me, but next day in Bartow he told the sheriff to come out to camp
    and arrest them for gambling.
- speaker: Respondent
  text: They were all taken to town, fined $35 each and jailed. My boss refused to pay their fines, so they sent one of my
    niggers to a rival camp to indirectly drop a hint that the foreman could get these 40 men by paying their fines and taking
    on.
- speaker: Respondent
  text: He fell for it, and hurried to town where he paid them all out and started them to his camp. It was Christmas time,
    and he stayed in town and went on a big spree for several days.
- speaker: Respondent
  text: 'I met the gang on their way to his camp, and said: ''Only you niggers, come on back home and go to work.'''
