collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: My father was a good businessman, a judge for that district which included much larger section than just Nassau County,
    but he was very kind.
- speaker: Respondent
  text: I never remember any instance of the whipping of slaves, except on one occasion. There were ninety-one altogether.
    We had family prayers each morning, but there were no churches especially for the negroes, although they had their own
    celebrations and gatherings of different kinds when not at work, and one relaxation was dancing.
- speaker: Respondent
  text: There were many buildings on the plantation, the barns, and storage cribs, and the big lofts for hoar, with puncheon
    floors that is, split logs laid close together with the smooth side up.
- speaker: Respondent
  text: My oldest brother, Jamie I. O'Neill, born August 1834, was the overseer.
- speaker: Respondent
  text: One Thanksgiving night there had been a big celebration among the negroes and a dance at night. Two young girls, Lily
    and Fannie, both about sixteen, fell out about which was the most popular among the belles of the ball. Sully had two
    dresses and Fannie had three, and in between dances they would rush to their cabins and change quickly, hoping after each
    switch of costume, the change would add to their sometimes early popularity with the young negro bucks present.
- speaker: Respondent
  text: The quarrel lasted into the following day, until while they were busy in their assigned task not to fighting, pulling
    each other's hair, and scratching faces, and biting each other's flesh whenever opportunity offered.
- speaker: Respondent
  text: Word was sent to father to hear of the melee, and he took my brother, James, and went to the scene. He spoke to them
    but they kept right on, evidently intending to fight to a finish, when father told James to whip them all later. The old
    man did not permit fighting among the slaves. This was the only instance of whipping.
- speaker: Respondent
  text: I was only about six months of age at the time, and did not witness the whipping, of course, as such matters were
    not for the eyes of the 'womenfolk at the 'big house' but overheard the conversation father told mother about it.
- speaker: Respondent
  text: Father never sold his slaves. They were kept and trained to their various duties and considered an essential and necessary
    part of the plantation in fact, such vast tract of land could not have been handled without their labor.
- speaker: Respondent
  text: Each one was given a task to do, in the field, the vineyard, in the orchards, around the barns, the chicken houses,
    or with the livestock pigs, horses, cattle, sheep, and so on.
- speaker: Respondent
  text: Some of the more intelligent negro men, brother John broke in and trained his helpers. Each slave in the early morning
    was assigned a task, generally enough to keep him busy until the end of the day; but if they were smart and learned to
    work fast, they often completed their task early, sometimes by two o'clock in the afternoon.
- speaker: Respondent
  text: Then the rest of the day they had for themselves. There were about twenty of the negro cabins around the cove just
    beyond the house on Lanoeford Giglio, each with its own garden, where the families raised garden truck, and if they had
    more than they wanted, they could sell the surplus.
- speaker: Respondent
  text: Some had a few chickens of their own. The women often baked homemade bread, salt-rising or yeast bread and gingerbread
    and cookies, and on Saturdays they could take these to Fernandina and sell them.
- speaker: Respondent
  text: Saturday was generally regarded, that is, from noon on as a holiday when the slaves, except those needed around the
    house, or for the milking or other chores, but they could not leave the plantation, or visit other plantations in the
    section without passes from brother James.
- speaker: Respondent
  text: I remember only one instance where a slave was sold and that was not for profit. Father owned one man, a valuable
    field hand, whose wife belonged to Mrs. Bacon, and when the Bacons moved to Georgia, father sold Dr. Bacon the negro,
    too, so that he could be on the same plantation with his wife.
- speaker: Respondent
  text: Father never separated families, wives and husbands, or children from their parents. As I remember, they were a very
    happy lot, and so were we.
- speaker: Respondent
  text: Another time father threatened to sell a negro, Wallace, who had been the property of my mother before she and father
    were married. Wallace was a thief. It seemed impossible to correct him of this bad habit.
- speaker: Respondent
  text: One night Wallace had broken into the sugar-house. The door was locked, as it contained the fall harvest of sugar
    and barrels of syrup but Wallace dug a hole under the back side of the sugar house, lifting one of the large log puncheons.
    It was a heavy piece two feet wide with his strong back, moving it enough to permit him to crawl through this upshot in
    the floor.
- speaker: Respondent
  text: He was caught with several buckets of syrup and a quantity of the brown sugar, and father was so provoked.
- speaker: Respondent
  text: Wallace came to the house and asked for my mother. I remember my mother came out of the porch and Wallace knelt before
    her, begging her as 'Miss Mary, 'fore God, I won't do it again I won't steal any more. So please, Missue, don't let Marse
    Henry sell me.' Evidently, mother's pleas in Wallace's behalf influenced the 'court' and Wallace stayed right on.
- speaker: Respondent
  text: When the war between the states came on, the slaves of course, knew about it, heard talk by the Abolitionists, that
    would be considered vile propaganda now, and they were much distressed.
- speaker: Respondent
  text: By father's a lawon, however, seemed to have faith they would be taken care of, and they used to sing the following
    song to calm their care of those who were weak-hearted in contemplation of having to shift for themselves;
- speaker: Respondent
  text: We hab a jest Gawd to plead our cause, Fur we are de chillun of Lawd. Come along, my people, don't be ashamed, Fur
    we are de chillun of God.
- speaker: Respondent
  text: I could not jaw the lines original, but heard them singing it in 1860 and 1861, and never heard it where else, so
    they probably made it up.
- speaker: Respondent
  text: When my brother John, who was born July 1, 1844, brought word from his visit to the Harrison Plantation up the Lanoeford
    Creek north of us that the Federal gunboats were in Fernandina Harbor in 1861, we had about fifteen women guests and relatives
    visiting us. Father took charge and ordered a hurried departure.
- speaker: Respondent
  text: Slaves were ordered to the 'big house' and told of the peril we were in from Federal invasion and possible loss of
    life from shelling of the vicinity by guns of the fleet.
- speaker: Respondent
  text: Only six of the ninety-one deserted to join the Federal forces.
- speaker: Respondent
  text: Farm machinery and supplies were hastily gotten together, and in four hours New Hope Plantation was deserted by its
    human inhabitants both white and black, and all livestock on the road to the west.
- speaker: Respondent
  text: The family, with what few belongings and a lot later together in such a short space of time, were driven in buggies
    with wagons to the railroad yards, delayed on flats.
- speaker: Respondent
  text: I had a precious lured box and one lone doll. The box held its clothing and I remember my mother telling the ladies
    my two sisters and guests to form a ring at the flat-car, placing me in the middle, so I would not roll off when the engine
    started.
- speaker: Respondent
  text: We went to Hamilton County. A friend, Mr. Mason, took us all in, sheltering us for five months. In the meantime, my
    father purchased a thousand acres of land near Olito Springs, and there we lived for the duration of the war in the greatest
    plenty and without molestation.
- speaker: Respondent
  text: 'My four brothers joined the Confederate troops: James N., John Colton O''Neilly, Ambrose, who was born December 1,
    1846, and my youngest brother, Isodor E. O''Neill, who was born on the 19th of January in 1848. They were with Lee in
    the Army of Virginia.'
- speaker: Respondent
  text: 'I had three sisters: Annie Maria, born November 12, 1837; Mary Alberta, October 8, 1839; Florence Elizabeth, May
    28, 1844, all of whom were married, and their husbands were also with the Confederate troops.'
- speaker: Respondent
  text: When we came back to New Hope in the summer of 1865, it was almost completely wrecked. The house had been occupied
    as headquarters by the Federal troops. It was in bad repair and all of the furniture had been removed, even the grand
    piano, which was not lost, as we were all fond of music, played and sang a great deal.
- speaker: Respondent
  text: The handsome row-boat, which had only been in use about six months, was also alone. We were never able to keep any
    trace of our belongings.
- speaker: Respondent
  text: The negroes had all been freed on the plantation in Hamilton County. Some remained and worked for us, supporting themselves,
    but others left and we never heard of them again.
