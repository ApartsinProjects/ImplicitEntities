collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Bud Freeman was born April 13, 1906 in Chicago. He lived in Austin practically all his life. So did the MacPartland
    brothers, Jim Lannigan, and Frank Teschmaker. Bud played sax, Jimmy MacPartland cornet, Rich MacPartland banjo and later
    guitar, Lannigan piano, and Teschmaker hot violin and later sax and clarinet. These men became the nucleus of the critic-termed
    Chicago style. They just played and did not think of themselves as revolutionaries or creators of a style.
- speaker: Respondent
  text: Bud used to hear Earl Fuller's Negro band at Navy Pier when he was nine years old. There was a cornet player in the
    band who was his idol. He pulled a stunt of having his feet and body tied to a chair and played his cornet so loud it
    seemed like he blew himself right out of those knots. Bud was always crazy about music. His mother played piano and Bud
    played drums. His sixth-grade teacher saw his talent and gave him a ukulele and encouraged him.
- speaker: Respondent
  text: Bud met Jimmy MacPartland at Austin High School. Jimmy's father was a music teacher and Bud began taking lessons from
    him on a C melody sax, but he wouldn't study and played more his own way. Two days after he got the horn, he heard Paul
    Biese on a recording of Rose and played the whole piece with his own improvisations right back.
- speaker: Respondent
  text: Teschmaker also went to Austin High with Bud. He was a serious violinist playing in the school orchestra. When the
    boys organized their first band to play at school dances, Teach played hot fiddle. He probably played about the first
    hot fiddle. But Teach got the idea that a fiddle was a joky instrument, so he got an alto sax and played along with Bud.
    None of the others knew much about their instruments. They just played pretty good but were all bad readers. Teach was
    the only one who could really read music on sight.
- speaker: Respondent
  text: Bud was a bad reader and had to improvise from memory or feel his way through. Maybe that and his talent gave him
    originality so that when he finally learned to read notes on sight, he became one of the greatest white tenor sax men
    in the business. Teach would improvise around the notes and give banal tunes something. He was a very frustrated guy,
    like Bix Beiderbecke, and you could sometimes feel that frustration in his instrument. It wasn't sexual frustration but
    maybe because he knew so much more about music than the others and wanted to get at the impossible like Bix.
- speaker: Respondent
  text: By the time Bud quit school, Jimmy MacPartland was a Western Union boy, Rich worked in a bank, and Teach was still
    going to school. Teach had a lot of trouble with his parents about his music, as did everyone else except the MacPartland
    brothers, maybe because others came from middle-class families. Teach's father said if he didn't buckle down at school,
    he'd throw the horn out the window, and Teach said he might as well be thrown out with it because he'd jump out after
    it anyhow.
- speaker: Respondent
  text: Rich got a banjo but later switched to guitar. Lannigan played piano and was pretty well grounded musically but wasn't
    very hot, then later switched to bass horn. Dave North, a printer's apprentice, took Lannigan's place at piano. Dave Tough
    somehow got together with the Austin gang, although he lived in Oak Park. He was playing dance jobs when he was still
    in knee pants. At night going to work, Dave would put on his long pants. This was the nucleus of the Chicago style. They
    called themselves the Blue Friars, which played about 1924.
- speaker: Respondent
  text: Later Floyd O'Brien, a trombone player from the south side who had been playing on jobs when he met the kids, joined
    them. After that, others identified with Chicago style brought their influence and had them sifted through the Blue Friars,
    and the style was developed and furthered. The original bunch was influenced by records of King Oliver, McKenzie's Mound
    City Blue Blowers, Frankie Trambauer, and the Wolverines with Bix Beiderbecke. They used to go to the Spoon and Straw,
    a little ice cream parlor where most high school kids congregated, and listen to those records. That was their only way
    of knowing what good jazz was.
- speaker: Respondent
  text: The big white band at the time was Dick Voynos's Wolverines, and in that band was Bix, who became the greatest influence
    at the time. Then they started to hit night spots on the south side. There was a club called the Apex where the great
    Bessie Smith sang; Joe Smith, who influenced Bix a lot, played trumpet; and they had a guitar player, Saint Cyr, who played
    boogie woogie. They also went to the Sunset club where they heard Armstrong, Earl Hines, and Carol Dickerson.
- speaker: Respondent
  text: The first to get a job of importance was Alley MacPartland. He probably had the most guts and best personality and
    was always sort of the leader of the band. He took an audition with the Bamboo Inn orchestra on Madison and Kedzie and
    landed a job there. Later, the whole outfit, including Jimmy, went up to Lost Lake in Wisconsin and played there all summer.
    All this time they were creating the so-called Chicago style.
- speaker: Respondent
  text: Each guy was an individualist with deep respect for each other, necessary for good jazz playing. When one took off
    a solo improvisation, he knew he couldn't get lost from the solid background and would be inspired to better playing and
    more originality. Despite influences, all they did was learn from great musicians of the day but couldn't copy. That's
    why they drove Red Nichols nuts later when some played and recorded for him because they thought Nichols was joky, a copyist
    with no originality. Nichols was a big name then.
- speaker: Respondent
  text: The first big break among the Austin gang was when Bix left the Wolverines and Jimmy MacPartland replaced him. That's
    why you can see the close resemblance between Jimmy's playing and Bix's. The boys in the Wolverines must have influenced
    Jimmy a lot and Bix had influenced them. But Bix was great and nobody could have a better influence.
- speaker: Respondent
  text: The original outfit got together again playing for Husk O'Hare on WET. After that, they played at the White City ballroom
    where Milt Nessrow came in on sax. They were all about twenty-one years old then. Beiderbecke had heard about a kid band
    knocking them dead at White City and came in once from Hudson Lake with Trambauer, where they were performing, to hear
    them. He stood listening to these crazy kids blowing their heads off with his eyes and mouth wide open. The gang was thrilled
    knowing Bix came down specially to hear them.
- speaker: Respondent
  text: After that, they began to work for Thelma Terry at the Golden Pumpkin on Madison and Hamlin. Krupa came in then on
    drums and Bud Jacobson on sax. After that, they began to separate, sometimes working, most times not. Eddie Condon came
    up from a small town in southern Illinois and got the guys together to make recordings, which are now famous.
