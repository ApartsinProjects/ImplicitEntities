collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: How you ever eaten any fish like that?
- speaker: Respondent
  text: We are hard working folks. Lucinda is getting my dinner. Done you smell them good fish cooking? We will have some
    good old King fish. Lucinda knows how to cook them good and brown too, just crisp, and the bones and all go with the fish
    when he cooks them.
- speaker: Respondent
  text: I was born in Singleton County, Georgia, May 6, 1866. I practically lived there all of my life. My parents were Josh
    and Susan Robinson. Father has been dead eighteen years, and mother twenty years. There were sixteen children in all in
    the family. Only five of us are still living. Boyers he lives in Sandersville, Georgia, and Reser, I don't know where
    they are. I haven't heard from them in years. My sister Anna lives in Warthen, Georgia.
- speaker: Respondent
  text: The older a fellow gets the more forgetful he is. I used to have good memory, but I have to set and study now. Plenty
    happened when I lived in Georgia, I have to dig it up bit by bit. I used to cut wood and attend cows. I remembered when
    I would help ma'bi every Wednesday with her work. When I was twenty years old, I left home and went to Davisboro, Georgia,
    to live with a father's sister. I only stayed there three weeks. I was always considered a mother's boy because I loved
    my mother, and would often listen to her talking about slavery.
- speaker: Respondent
  text: She said that she was fourteen years old when freedom was declared. She would tell how they sold and whipped the slaves
    and how she had to sleep on moss placed on the hard clay floors. I imagine those were some hard times. And just well,
    she lived through it all. Until my mother died I would send her part of my earnings.
- speaker: Respondent
  text: I had to work to make a living because my parents were poor and I didn't have such time to go to school. I only went
    to school three weeks in my life. My first wife taught me how to read and write. Somehow or another she was smarter than
    I was. Last year I went to the WPA Adult school in the Peace Casena. I didn't learn very much because the young ones who
    taught me were not too far advanced themselves. So I quit this school.
- speaker: Respondent
  text: I think education is much needed. If it was not so, one could not get into big jobs. In fact, I believe mother wit
    is good, but give me education. Children and grown people are not taking advantage of education today. Now that they have
    the privilege to do these things, they won't accept it. We have teachers to say who really are not fit, who are not taking
    care of the children.
- speaker: Respondent
  text: If we could learn to be obedient to one another we could get along alright. My old mule must listen to me. I use my
    old Model T Ford. Sometimes, it has to be kept right to run. It is like people who if they are right, can make the grade.
    When a man gets his education, he must refresh himself.
- speaker: Respondent
  text: I make good use of that old Ford. I use it to pull out stumps. I recall the first money I made back in Georgia was
    75 cents a day. That was way back in 1919. I worked too for the Southern Railroad Company at Mitchell, Georgia, for three
    years.
- speaker: Respondent
  text: I guess I went around nearly three or four years old. The next job I had was with the Grit L at Warthen, Georgia.
    On this job I made $7.50 a week. I held this job until I got tired of it. After that I went to sawing wood. I worked up
    to $14.50 a day.
- speaker: Respondent
  text: When I came to Florida, I worked for Cummer Lumber Company at McClenny, Florida. The work I did was piece work making
    ties at 10 cents a tie. Some days I made as high as $5.00. I followed that work until I came to Lakeland. I worked for
    the American Express Company for five years making $40 a month.
- speaker: Respondent
  text: Afterwards I worked for the Atlantic Coast Line packing boxes and later they transferred me from there to the road
    house with the machinist as a helper at 40 cents an hour. Later I was promoted to a fireman at $210 a month. I fired until
    they rolled me off. Rolling means to be cut off from your work. That's what they call it on the railroad. And I have been
    rolled every since.
- speaker: Respondent
  text: They kept me on the extra board for a long time. They have a board where they list your name for turns out on a run.
    I never did get many turns out after that. I had to do something so I began to handling horses and mules. Today I am satisfied
    behind my old mule Beck. With Beck I make a living somehow. I manage to average around eight and ten dollars a week owing
    up lots for a scale. I like it very well. I am my own boss.
- speaker: Respondent
  text: My trusty mule Beck is fourteen years old and a good worker. If people obeyed like Beck, they would be okay. You have
    to watch a mule though. They will stop on you when you least expect. If you work a horse against a mule the horse will
    fag out.
- speaker: Respondent
  text: The mule, if you will notice sometimes have wider nostrils than a horse, and can pull more due to having greater wind.
    I used to be a better shot. Today I was near the place where they slaughter cows. The white man out there called me over
    to the pen and said, 'Uncle, can you shoot a rifle?'
- speaker: Respondent
  text: He didn't know I was once considered good back in Georgia. They used to bar me at some of the shooting matches around
    home. I kicked up the rifle and walked back about thirty feet and shot the bull right in the middle of his head. He rushed
    up and stuck his knife soon as he fell. He said, 'Uncle you are a good shot, too good for words.'
- speaker: Respondent
  text: I learned that from hunting when I was a boy. I used to roam the woods and could bring home game any time. They don't
    hunt down here in Florida like they did in Georgia. During my days, most anyone of any size could shoot a rifle. What
    they call sport down here is skin and shoot crew. They don't know what the woods is.
- speaker: Respondent
  text: If I believe in decency. I was carried away with that speech Iagoose Bethune made. He said, you have to be decent,
    be clean, and have a clean place to live. I take bath every day I live. I believe a person should be decent in everything.
    In religion more so.
- speaker: Respondent
  text: I belong to the Freewill Baptist Church, pastored by Rev. Williams, over on Fourth Street. A whole lot of fogyism
    is going on amongst our people. I feel if I leave Jesus Christ out I will do the wrong thing. I don't believe in gutting
    the monkey with religion, it can weigh you down.
- speaker: Respondent
  text: You can get so far down you can't rise. If I know a thing wrong, I shouldn't do it. A man or a woman ought to use
    common sense. Many people don't believe in religion. A man ought to be strong and go on his way like David. I feel like
    the Lord is my shepherd and I shall not want.
- speaker: Respondent
  text: I have never voted in my life. I always figured if I cast a vote for a man that is worthwhile he ought to do the right
    thing. I have seen times when things were better. In my father's time, if a man did what he said, he would be kept in
    office. Things have changed now.
- speaker: Respondent
  text: A farmer, back in my father's time, would go to the next farm and believe the other farmer. If they killed a hog or
    corn they would give some of it to their neighbors. You see if they do that now, no. There has been so many changes. I
    think our present form of government is good, except one thing, that community part.
- speaker: Respondent
  text: I believe if the people were given money it would help out better. Some people I know get so much of the same thing
    they exchange it with other folks. Maybe I am talking too much, but that's the truth. Everybody is not like me. I like
    to work, and will work. Work is honorable. A man lives long when he works hard.
- speaker: Respondent
  text: I am happy with what little I get now. When I look around and see how some people live, I am thankful too. I have
    a good age, that's something to be thankful for.
- speaker: Respondent
  text: I married in Lakeland, Florida, 1927. My first wife I was telling you about died in Sandersville, Georgia. She was
    a Kattie Jackson. One child was born and died three weeks after childbirth.
- speaker: Interviewer
  text: What is all of this for?
- speaker: Respondent
  text: Never mind, he is taking census of us. I have nothing to hide about my life. I mean to tell all I know about myself
    to you too.
- speaker: Respondent
  text: I like to eat most anything, but can't do so on account of some of my teeth being out. Lucinda said, 'If I can eat
    anything. I like to cook, and after I get through cooking for white folks, I have to come home and cook for Charlie.'
    Charlie likes to drink his coffee out of large bowl, and soon calls for another fill up of the bowl.
- speaker: Respondent
  text: We both enjoy good health. We hardly ever have a doctor to come to our house. Lucinda stated that she works every
    day and never lay off on account of illness. Charlie said, 'I work hard and eat good, that will keep you fit.'
- speaker: Respondent
  text: After Charlie had finished his dinner and called again for another bowl of coffee, he said, 'This is part of my life,
    to drink coffee. Good coffee is the life of you.' He retired to the front room where he lit the lamp, as it was getting
    dark.
- speaker: Respondent
  text: He has no electricity in his home. Lamps was the only source of light. He stated that a gallon of kerosene would run
    him all the week for his lamps. He said that he wanted to improve his home when he has finished paying for it.
- speaker: Respondent
  text: This worker-built house consists of four rooms. It is unpainted with a small porch extending the width of the front.
    On the porch turned against the house were two delapidated wicker chairs. Another wicker chair was under one of the orange
    trees in the front yard.
- speaker: Respondent
  text: A mail box was nailed to a large post standing in front of the house, that was shaded by a tall cedar tree that towered
    over the building. There are five medium sized orange trees on his lot, filled with oranges. On the east side of the yard
    lies a pile of long logs to be cut for firewood.
- speaker: Respondent
  text: There are five crudely built out houses raised off the ground on wooden legs used for his pets and chickens. In one
    were two large rabbits. Part of back yard is given over to garden space where he has adapted collards, mustards, corn,
    and onions.
- speaker: Respondent
  text: A small calf is fenced in beside the shed used for his mule Beck. In front of his shed is a pile of hay. Outside is
    a wired enclosure for his few chickens. A jet black cat roams around and occasionally rubs her fur against you. Beck stands
    perfectly still and flickers her ears now and then.
- speaker: Respondent
  text: Beck is chestnut light brown in color and very large in size. The wagon is home built and crude. He used it to carry
    his farm implements back and forth to his jobs. Under one of the orange trees is a bench on which were three large wash
    tubs.
- speaker: Respondent
  text: Near this is a trunk with a sink placed on legs, very rusty from outdoor exposure. The outhouse sits far back in the
    yard. Charlie has no sewer connection to his property. Wood and oil burner, ice box, and goods and cans are stacked on
    the porch.
- speaker: Respondent
  text: Entering the kitchen from this porch, there is a large round table sitting in the center of the floor, a foot stove
    in the southwest corner, a large new ice refrigerator, and china closet where the dishes and kitchen utensils are stored.
    The floor is bare of covering.
- speaker: Respondent
  text: There is a wide partition over which hangs two white curtains. This room is used for the front room and bedroom. A
    fireplace is on the east side. In one corner there is a small table, two old trunks, and a two deck book rack filled with
    old books.
- speaker: Respondent
  text: A three quarter bed was near the partition with clean covering on it. A few chairs and an old rug made the rest of
    the furnishing. The next room on the east side of the house was their bedroom, where a curtain hung over the door.
- speaker: Respondent
  text: In this room was a double bed, a dresser, a wash stand, and two chairs. On the floor was an old rug. All of the windows
    had shades to them, some were worn with a few holes in them, and the walls in the two front rooms were coiled.
- speaker: Respondent
  text: Charlie was inclined to talk more about his work. I am now cleaning up a large tract of land for a white man from
    the north. He has a large orange grove in the south section of Lakeland. My white folks are good to me. They give me plenty
    of work.
- speaker: Respondent
  text: I have a bargain to know a ten acre tract for half of what I raise, with Seathas the grocery man in North Florida.
    I have considered it, but will have to wait until I finish the present contract. I have asked the owner for several lots
    near me which I will plow up and put in sweet potatoes.
- speaker: Respondent
  text: There is plenty of planting space around in this section. If folks would only get out into the unplanted and raise
    something we would be better off. The soil is getting just right for spring planting. I have worked the soil so long that
    I know when it is right to plant seeds.
- speaker: Respondent
  text: Turn the soil over now and let it lay for about a week to take the souring out of it. If you follow the Ladies Birthday
    Almanac you will never go wrong. Beck home will be busy getting Almanac's the first of the year. That was their Bible
    through crook times.
- speaker: Respondent
  text: When you are fooling with gardens and doing a little farming, you have to know what to do, when to plant, any old
    time will not do. I always tell my white folks when to put their seed in the soil, lest they knew I balk.
