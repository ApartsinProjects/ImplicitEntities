collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: You'll have to come up on the porch and set down whilst I washes if you wants to talk to me, Mamie announced, when
    I found her in the backyard tending the fire around the boiling washpot. I meant to wash outdoors in the sunshine, but
    my husband and daughter got off before I had a chance to get 'am to move my wash bench off of the porch for me.
- speaker: Interviewer
  text: I'm surprised to find you at home, Mamie. I was just taking a chance when I strolled around to the back after there
    was no answer to my raps on your front door. Have you given up nursing in favor of taking in washing now?
- speaker: Respondent
  text: No, main, I ain't had no nussin' job in going on a month now. I'se just doin' my own fambly washin', least I is this
    mornin'. I does have two small washin's. I means I calls myself havin' two, but the folks didn't bring 'em last week,
    and they ain't brung 'em so far this week.
- speaker: Interviewer
  text: That's true, Mamie, I surely don't know of a job you could get right now, but the National Reemployment Service will
    help you to get work if you'll register in their office.
- speaker: Respondent
  text: 'I did try at that place. They axed me a hundred and one questions and then some: ''What did you make? What did you
    spend your money for? Well, why didn''t you save some of it while you was makin'' it?'' They took all them questions and
    washed my face with ''em. I''ll bet not a one of them folks that asks them questions saves none of their own wages, yet
    they goes right on a skin'' other folks questions they wouldn''t wants answer for nobody else. I told the one that axed
    me them things that the reason I couldn''t save none of my money was that me and my fambly had to eat, buy clothes, and
    pay rent, let alone having to holp my people when they needed it. There''ve been a heap of colored folks gone hungry at
    times in these last several years, when they own folks didn''t have nothing to provide with ''em no more.'
- speaker: Respondent
  text: I sho don't know what us poor Negroes is gwine do. When I first started to work I got more to do than I could keep
    up with. Now, folks goes to the hospital, but when they gets back home some of they folks comes and stays with 'em 'til
    they's up and about a bit. I reckon folks just has to do that way to out 'spenses.
- speaker: Interviewer
  text: How long have you been a nurse?
- speaker: Respondent
  text: Lemme see now, since 1924. You know I ain't no midwife; I'se a practical nurse. I'se helped doctors and midwives,
    and I'se maided and cooked. Lord, have mercy, I had to spend my money fast as I could get it feedin' my fambly, payin'
    house rent, and for all the things I told that man what asked so many questions at the Employment Office. I got my 'stinticate
    to do practical nursin' in 1926. It took me 2 years to get it. It used to be anybody could welt on a 'omen havin' a baby;
    they could go ahead and cut the cord and tie it if they knowed how. Now, that's all changed. If you don't have that 'stifioate
    they'll put you in the penitentiary for life. I hopes to git my next 'stificate in 'bout another year, and then I can
    call myself a midwife and pull down 435 a week. Then I won't have to worry 'bout my meat and bread no more, leastwise
    not long as 'omens keeps on havin' babies. I means to save up for a rainy day when I does git to makin' what a midwife
    should.
- speaker: Respondent
  text: I don't know when I was born 'cause I didn't know nothin' t'all 'bout my ma. I remembers seein' my pa all right enough.
    I can guess at my age, but I really don't know just how old I is. I tells everybody that. I expect I will be 'most forty-nine
    my next birthday. I was born on a farm down here in Clarke County, and all I ever done in my younger days mostly was work
    in the field. I'se just been in town 'bout sixteen years. I used to have time and money to go see my folks, but I don't
    no more. Like I done told you, my ma died when I was a baby. My sister raised me part of the way, then some white people
    took me up and I lived with 'em years and years. I lived and worked in the house with them white folks 'til I rearranged.
- speaker: Respondent
  text: The first real nurse I ever seed was a white woman what they called in to nurse one of the children that was took
    bad sick out in the country. One day that nurse went out in the yard to the lavatory. Folks didn't have them places in
    the house to set on in the country. The lavatory was hid back of a grape arbor. She was passing under the arbor on her
    way back to the house when a bug got in her ear. She went to the kitchen, twisted a little white something 'round on a
    match stem, got some warm water and worked with her ear a long time. I thought that was fine doin's. I said to myself,
    'If she can do things like that, I can too.' Right then and there I decided to be a nurse.
- speaker: Respondent
  text: Getting my first case come so easy that I thought nursing was going to be a regular job. My husband's sister that
    was nursing a white woman took sick and give me the job. I went there and liked the work and the white folks liked me.
    It at $8 a week they paid me. It was a whole lots more'n I coulda made cookin', or maidin', or takin' in washin'. That
    was a good lady what I nursed. Her aunt said that shaking disease she had was caused by her being a stenographer. She
    had done worked her fingers so long on a typewriter that she 'most lost use of her hands and arms, and that condition
    spread over her whole body. 'Oh, please rub my legs,' she would say. 'Oh, please scratch my head. If you will only rub
    my back; I'm so nervous.' I had to be doing something for her all the time, day and night.
- speaker: Interviewer
  text: Why do you spit in the clothes?
- speaker: Respondent
  text: They tell me if you spit on dirty clothes it'll take the spots out when nothin' else will. So every time I sees a
    bad dirty spot I just up and spits on it, and it 'most always comes out without no more trouble.
- speaker: Respondent
  text: This nursing business brings you up against all sorts of folks and things. Why, I even lost one job I had 'cause the
    sick women told the doctor I said her pulse was too fast. 'Well, if she has to go 'round tellin' sick folks such things,
    we'll let her go,' he allowed.
- speaker: Respondent
  text: I ain't never told no other sick folks 'bout theyselfs no no'. I couldn't get my 'stificate to do practical nursin'
    'til I observed at least one operation, and so I got my chartist when a white woman what lived in the country come to
    her sister's house in town to have a tumor cut out. The colored nurse what was to help the doctors and the white nurse
    got to poutin' so I had to take a hand, and not having done nothin' of the sort before I emptied out the water with the
    gauzes in it and they couldn't count 'em right.
- speaker: Respondent
  text: That sure learned me a lesson for when that patient didn't get well like they thought she oughta, they made a examination
    and discovered that gauze was sewed up in her. Cutting her open again and takin' it out never amounted to nothin', so
    they done that hut in the country in her own house, and she got well fast enough then. Now don't you go blamin' them doctors.
    Them was grand doctors, but that little old room was too dark, in spite of that big old flashlight 'most long as my arm
    what her husband had bought when the doctors were fussin' 'cause they wasn't no electric lights in that house where they
    done the first operation. Besides there was so much discharge they couldn't half see, and it was my fault for pouring
    out the water before them pieces of gauze could be counted. That colored nurse that pouted and didn't do her part on that
    case lost out with the doctors and they don't never call on her no no'.
- speaker: Respondent
  text: Another time I helped one of them doctors remove a big tumor from a colored woman that I had been suffering with it
    30 years. It weighed nearly forty pounds on the cotton steelyards. I have worked for that doctor many times since. He
    is a good man and a fine doctor, but you better watch out and not like him.
- speaker: Respondent
  text: A maternity cases accounted for at least ninety percent of her patients, and her vivid descriptions ranged from the
    poor white folks and Negroes who knelt on the floor to give birth to their children, to the complications of a Cesarean
    birth, wide necessary by a fall that injured the mother three months before the baby was due. She had tended mothers and
    babies in the poorest of colored families, and in the homes of uppity white folks, who were able to employ a maid and
    a cook, in addition to a nurse to tend the mother and baby after they returned from the hospital. Patients with bladder
    disorders, cancers, nervous diseases come what might they were all accounted for in Mamie's story which came to an abrupt
    halt as she dropped the last wet bundle into her clothes basket.
- speaker: Respondent
  text: Well, I'se done got these clothes washed, now I'se got to hang 'em out. Good Lord, lies, it's done twelve-thirty.
    When do you eat?
- speaker: Interviewer
  text: Oh, not as long as you are willing to talk.
- speaker: Respondent
  text: 'She went out in the yard and began to sing: ''Come to Jesus Now.'' Looking at me, she said: ''You can talk. I can
    hear you and ain''t nobody else gwine to hear you.'' I assured her I did not mind waiting until her work was finished.'
- speaker: Respondent
  text: 'Just as soon as I hang these clothes out, I''se got to go down town, so you''d better ask me what you wants to know
    now. So it''s my schoolin'' you wants to know ''bout now. I got as far as the second grade. That''s ''ncome I can''t talk
    proper now: I didn''t have ''nough schoolin''. I went to school in Morton''s chapel. It was a church house. Us chillun
    went to school there during the week, and to church and Sunday school there on Sundays. That''s the way colored folks
    done in them days. Now they''s got a regular schoolhouse.'
- speaker: Respondent
  text: A blind woman come through here once and give a music singin' at that church. She paid 100 a heed to neer her sing.
    That was the way she had to make her livin'. She said her ma had fourteen chillun, seven born with sight, and seven blind.
    She was one of them blind ones. After her singing was over she said the church was a great big quarton and a little bitty
    chapel, and that was sure what it was. Mr. Morton that give that chapel was one grand fine man.
- speaker: Respondent
  text: I don't hardly know when I met him he was with his prettiest and I ever seed, and he told me I had the prettiest legs;
    they was so big. I was just a little low squat. I never seed him no more in 'bout four years. Then he was separated from
    his wife. When I seed him he was on the job. I knowed his face and he knowed mine. We went together 'bout a year before
    our marriage. Us got married all right but there wasn't no big weddin'; just a crowd of folks come to the house to see
    and hear the preacher say a little something over us. Two of our four chillun is girls and the other two is boys.
- speaker: Respondent
  text: Mamie had finished hanging out the clothes and started in the house when a large German police dog came out of a dog
    house and barked at her. I just hates this big old dog. I wish my son-in-law would come and hit 'im, she complained. I
    has to keep 'im chained up so he can't run off. She spoke to the snarling animal, 'Now you just go on back, 'cause you
    ain't gwine to git none of this somethin' treat I'se got for my dog.' Picking up a basket of bread scraps from the yard
    she sat it on the porch.
- speaker: Respondent
  text: Miss, if you wants to talk to you, you'll have to come with me in my bedroom. I followed her through the kitchen.
    Come in here first. I wants you to see my daughter's room. She lives in Atlanta and she's gwine move her furniture when
    she gets a room there.
- speaker: Respondent
  text: The room and its contents seemed clean but revealed no attempt at orderly arrangement. The conglomeration of its furnishings
    included a walnut bedroom suite which was crowded against chairs and tables of various kinds. A pink bedspread clashed
    with the red drapes that framed the dingy scrim curtains at the windows, wide and cheap rug, of red rose pattern, added
    another splash of color.
- speaker: Respondent
  text: We went to the kitchen where around table, surrounded by chairs in the center of the room, was easily accessible to
    a small wood-burning cookstove. Pots, pans, dishes, and cutlery, as well as food, were scattered around, apparently at
    random.
- speaker: Respondent
  text: Passing through a narrow hall, we entered a bathroom which we completed with tub and other conveniences. The fixtures
    were cheap and crude, but there were a source of pride to Mamie. She lives in a house with a bath and an indoor lavatory.
    'Us nurses knows the necessity of these things and I can do without other things, but us has to have our bathrooms,' she
    declared.
- speaker: Respondent
  text: The small hall ale due to room barely large enough for a bedstead and an old oak dresser. 'I stripped this bed this
    am,' she declared, 'and I ain't time to make it yet.' The mattress tick was split its full length, exposing lumps of dingy
    cotton. She opened another door, saying, 'Come in here. This is my bedroom.' The two iron beds in her room had evidently
    seen much use and many coats of paint, which was flecking off now and revealed more than one color. There was no attempt
    at orderly arrangement of the oak dresser, many center table and its coal oil lamp, two rockers, and several split bottom
    chairs that were scattered about at a respected distance from the small heater.
- speaker: Respondent
  text: Have a beer, was her attempt at hospitality, and 'scuse me whilst I fixes my hair.' After several moments of vigorous
    wielding of the comb, she began replaiting her hair in tight braids that meandered at random about her head until the
    last lock of hair had been securely fastened in the braids. Few, if any, hairpins were necessary, for the hair was gathered
    up in such a manner that the braids did not form incipient 'pigtails' but lay close against the scalp. This chore finished,
    Mamie put on a black hair, and said, 'I'm going to git me somethin' to eat; I can't do without food as long as you can.'
    She returned in a short time with a plate of biscuits and stewed fruit. 'I would ask you to have some of these peaches
    and biscuits but I knows you wouldn't eat nothin' like this. This here fruit ain't got a bit of sugar in it 'cause I
