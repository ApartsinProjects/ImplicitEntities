collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Did you plan for supper?
- speaker: Respondent
  text: I haven't thought about it.
- speaker: Interviewer
  text: For supper you kill that big little bloke, cook some tomatoes and some cornbread or biscuits, and a little rice.
- speaker: Interviewer
  text: Would you like to have a bathroom inside the house?
- speaker: Respondent
  text: We have no bathroom so we use two tubs; our outhouse is about 50 yards away from the house, too. No, would like to
    have a bathroom inside. If it was my property I would have one built by the government.
- speaker: Interviewer
  text: Can you tell me about your family history?
- speaker: Respondent
  text: I was born in Kingston, Jamaica, practically 44 years. My parents were Daniel and Ann Derrick. He is dead but my mother
    still lives in Kingston. She has never been to this country. I lived in the islands until I was 15 years old. Then I came
    to the States, landing in New York City. Later I came south to Florida, where I got work at a sawmill in a place called
    Haywood Falls from McFarland, Georgia. It took no long time to get used to this country's customs. I was so used to the
    weather we had in Kingston, Jamaica. You have to live to see it. I understand it is better now. You know I've been here
    a long time. When I first came to Florida, I had a hard time. Folks thought I was a speechee from South Carolina, but
    some they learned me. I just worked hard and did my work well, and I got along. I knew how to farm before I came to the
    States. We do lots of farming in Jamaica. The climate is a little warmer than you will find here. In some motions where
    it is bitter, it is cooler. I like the experience more than the climate. It wasn't as cold for me as here, but my wife
    likes it here.
- speaker: Interviewer
  text: When did you move to Plant City?
- speaker: Respondent
  text: In 1924 we moved our family to Plant City. Bernie, who is 33 years old, and Albert were all born in Cowes. Elizabeth's
    family was born here in Plant City.
- speaker: Interviewer
  text: What about your education?
- speaker: Respondent
  text: I attended school in the West Indies at Kingston up to the 4th grade but I've picked up a great deal since I've been
    in the States. I tried to keep my children in school. They sent me for the 11th grade here in Plant City. I realize now
    the advantage of education. It is something everyone should have, especially where you have to buy and sell wage. You
    got to be behind folks nowadays. I closed out shame when I mine others; I had to look elsewhere. I didn't have a means
    to help as.
- speaker: Interviewer
  text: How do you manage your house and farm?
- speaker: Respondent
  text: I am renting a small house. I eat hardly, take care of my family now, it would look like hell at a automobile. The
    best I can do is to keep some food on the table. If we have a good season we live nice. If not, we fare pretty hard. When
    I came to this place it was all some open weeds, and I managed myself right down to business and started to clean up.
    All the outhouses I built myself. The wood did not cost me any such. The boards are the ends of the timber out at the
    sawmills and the bark is still on them. A little rough, but it was the best I could do. I don't do any worthless things
    these hard times but I try to keep something special on my 3 acres all the time. One thing you see selling everything
    you raise is this nation. After I get through with strawberries I hope to have tomatoes easing in. I expect to plant some
    pepper also. Yes, I raise strawberries, beans, cantaloupe, and sugarcane. During the summer I grow some green beans, sweet
    potatoes, and many more things needed for the house. Did you see the fine coleus near the pig pens when you came in? Beans
    are large as a golf ball. I expect to get more hogs at home. We kill the one in the back yard. I made a mistake by putting
    too much fertilizer on my strawberries. It burned one of them. They are coming along alone now since we have had a little
    rain. I expect to pick some of them tomorrow. Berries are low today in prices. The folks said they only get 60 a plate
    today. They say so. You can see for yourself there is plenty of land around here to farm on.
- speaker: Interviewer
  text: Do you think you can make a go of farming on this place?
- speaker: Respondent
  text: If I want to swim some vegetables on this place I believe I made a go of it. With the help of Albert and what little
    I make off of these 3 acres, even sometimes about $40, I have to pay Mr. Marshall $45 a year for the land. I pay as long
    as it won't be so hard on us at the end of the year. He is very close to us. In fact, I think all of the tenants like
    him. Any fertilizer costs me $5 a year. Sometimes I am able to get great. The strawberry plants cost about $10.50, but
    next year I hope to raise my own plants. I believe I can send out better. When I was in Georgia working at the sawmill
    camp I made about $1.10 a week. I did better than that when I first came to Florida. I worked up to $1.34 for the planters'
    farming. I made $1.25.
- speaker: Interviewer
  text: How about your son George Jr.?
- speaker: Respondent
  text: George Jr. does better, he makes $1.50 a day. I fully believe we are better off farming.
- speaker: Interviewer
  text: How do you feel about farming?
- speaker: Respondent
  text: I love to farm. I can stay out same in the field all day long. We are very lucky to hire our land clear; it took some
    work to do it, too. We have to put fertilizer to it if we want to push our crops fast. After all, you get out of work
    what you put into it. That's why we work so hard on this little farm. To sir, there is not a lazy bone in my body. You
    own that fat hog out there in the pen. Well, we'll soon kill it and smoke the meat down. That beats going to the store
    for everything you want. We keep him in that small pen to keep him fat. If he had larger space he would be thin from running
    so much. My daddy taught me how to raise hogs back in Georgia. Some people think they want to have a whole field for them
    to run in, and bless goodness they'll eat up all the corn slop you'll carry them. They're like people, the more they run
    the more they eat.
- speaker: Interviewer
  text: Do you use fertilizer on your crops?
- speaker: Respondent
  text: They tell me down on the small coast they do not have to use fertilizer to make crops from, but I believe I would
    rather be on this side.
- speaker: Interviewer
  text: Is Albert in the CCC camp?
- speaker: Respondent
  text: Did I tell you that Albert is in the CCC Camp at Olustee, Florida? He's been there since 1936 and is very good about
    having part of his pay sent home every month. George Jr. was in the army too, but he works on the big Poinciana grove
    now.
- speaker: Respondent
  text: I was in the army for a time in Tarpon Springs, but I was transferred to the camp at Olustee. I stayed there nearly
    two years and liked it. I took on weight while I was there. I weigh 185 pounds now and run a football.
- speaker: Interviewer
  text: How do you feel about your family?
- speaker: Respondent
  text: I am devoted to them and try as a whole to be social, although the father is inclined to be more serious than the
    rest. The family is not noticeable.
- speaker: Interviewer
  text: Bernie, how do you feel about working on the farm?
- speaker: Respondent
  text: I don't like to work on the farm. I was raised on a farm and that may be the cause of my dislike. Only Monday I picked
    strawberries, and just look at my hands. It's sore back here when you first start, too. I have only been home two weeks
    and I intend to stay several weeks longer. I've been working in a grocery store. I can do most kinds of work, like running
    an elevator, pastry cook, housemaid, and if laundry girl like working in a larger place. I don't like it city, it's too
    dead for me. There's no place to go. Theaters, we can't see a good picture. We see some of our boy friends to the movies
    as to make friends. I don't think I will marry soon, that sort of thing in my family.
- speaker: Interviewer
  text: George, what do you think about marriage?
- speaker: Respondent
  text: It's time for you to marry. People like to wear clothes in their own money. If you're not married sometimes you have
    other things. There are also a few toys in this place. Sometimes boys will come around to sit and look at us.
- speaker: Interviewer
  text: Tell me about Elizabeth.
- speaker: Respondent
  text: Elizabeth, the day worker, would come around, stay around the house. She had on a red silk homemade dress, sandals
    on her feet, and a straw hat on her head. She waited for a moment, then said she has a house to raise. 'I've got a cold.'
    Basuto came out and went to the store. Town was a moment of quiet as we matched. She ran down the road. This lassie knows
    lots of people that we know in Progress. I use there every weekend to do our shopping. We would go to the colored grocery
    store supplied by our florist. We had a dry goods department next door to his place. I bought all of my groceries from
    there. Luckily, there were missing people and Dr. Marries' wife was so kind to start his times in Georgia. I like it as
    there are little girls ease into the yard.
- speaker: Interviewer
  text: What did you say to Elizabeth when she stopped in front of you?
- speaker: Respondent
  text: Mama wants to know if you are going to church.
- speaker: Interviewer
  text: What did you answer?
- speaker: Respondent
  text: Tell your mother I'll be ready as soon as I eat my supper.
- speaker: Interviewer
  text: I thought you were so tired.
- speaker: Respondent
  text: No, I am never too tired to serve God.
- speaker: Interviewer
  text: How often do you attend church?
- speaker: Respondent
  text: We have sped use and sometimes worship until eleven o'clock. We sanctified talks serve God all the time, sir, all
    except George Jr. and Saralee, who has to teach at the church.
- speaker: Interviewer
  text: Do you belong to any church organizations?
- speaker: Respondent
  text: I don't belong but many others do. Some are members of the missionary society. I have looked a foot.
- speaker: Interviewer
  text: How do the children behave?
- speaker: Respondent
  text: The children tried to persuade their mother to stay clothed but she refused, put on her hat and identified friends
    and walked by, left with her.
- speaker: Interviewer
  text: What happens after Bessie leaves?
- speaker: Respondent
  text: 'After Bessie leaves, Bernie called the rest of the family to be sure. The walls, with its red clothes, in the kitchen.
    That only little from the top sack is taken off chimney but scattered at one end of the table. Perspiration on the forehead
    throughout the blessing, devoutly: ''Lord, live us and strengthen us, give us thankful or ordinary food.'''
- speaker: Interviewer
  text: What does Bessie say when she is hungry?
- speaker: Respondent
  text: Bessie said, 'May I help more please? I'm hungry.'
- speaker: Interviewer
  text: What does Bernie do then?
- speaker: Respondent
  text: Bernie asked she helped to get little biscuits too.
- speaker: Interviewer
  text: What do they eat for meals?
- speaker: Respondent
  text: Since I have a chief cook and lot, I try to love good meals for the family. They are good often. They come mostly
    from lots of vegetables. In 63 of the overalls, home-cooked food is set up by mother. She puts them in that big pot near
    the corner of the house. Tomatoes, ears, okra, English peas, peaches, orange marmalade, strawberries, cabbages, beans,
    and pickles. They keep fine if you know how to properly can them. Did you notice the hills in the yard when you came in?
    We have sweet potatoes in one of these and in the other we have sugarcane. We keep them covered over to keep the bugs
    from them.
- speaker: Interviewer
  text: How is your health?
- speaker: Respondent
  text: All of us have good health. We never had a looter. When the kids were born we had midwives to mama. There are plenty
    of things growing out there in the field that will cure anything. Back in my country we used lots of herb medicine. I
    believe we know more about herbs than the folks over here. We didn't know about the kind of medicine that they use here
    in this country.
- speaker: Interviewer
  text: What do you eat to keep healthy?
- speaker: Respondent
  text: We keep healthy because we have plenty of good food. We like 'blokes' and eat plenty of them. Sometimes we get two
    dozen eggs a day when they lay.
- speaker: Respondent
  text: He rose from the table, 'Come out and I will show you where I keep them.'
