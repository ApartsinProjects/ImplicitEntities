collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Do you know that we have lived right here in this same house ever since we came to St. Augustine thirty years ago?
    We rented for several years and then when we felt that this city would probably be our permanent home, we decided to buy
    it. It is so much more satisfactory in every way, not only from an economic standpoint, but for the feeling of security,
    and also too, knowing that any improvements made are for our own benefit and comfort.
- speaker: Respondent
  text: Mr. Marshall's early boyhood was in a small place called Candler, a few miles from Ocala. During the Spanish-American
    War, he enlisted for service and was in training at Fort Anderson, Alabama. He was under age, so his mother procured his
    discharge. His first insurance experience was with the Metropolitan Insurance Co., being in their employ for five years
    in Augusta, Georgia, where he went and married. Augusta was Mr. Marshall's home town.
- speaker: Respondent
  text: The Marshall family is affiliated with the Methodist Church, interested in the church work carried on by the members
    and different organizations connected with the church. Mr. Marshall's talent as a violinist is greatly appreciated by
    the choir and congregation. It is easy to see, however, that Mr. Marshall's chief interest is his insurance business.
- speaker: Respondent
  text: Can I tell you something about insurance? I should know something about it. See this button? It stands for thirty-six
    years with the Peninsular Insurance Co., and a rating of senior agent. I was quite a young man when I first entered the
    insurance business, but you know, thirty-six years is a long time with one firm. You come down to my office tomorrow,
    and I'll take you on a collection tour through a section of the colored settlement, and show you the work of a small payment
    insurance collector.
- speaker: Respondent
  text: You have to run this thing like clockwork. In this section a regular collecting day has been established and the calls
    at each house are made just about the same time each week so most of them know just about when to expect us. If you don't
    run things this way and be prompt in collections, the people won't be prompt in their payments. As it is, I have had very
    little trouble in collecting.
- speaker: Respondent
  text: You won't find much romance in this business—just hard work. It seems just routine to me, but I guess that is because
    I have done it for so long.
- speaker: Respondent
  text: While we were driving to the field, Mr. Marshall explained some of the rudiments of the small collection policy. We
    are now going on what we call 'debit calls.' A debit list is the record of the amount of insurance policy, amount and
    date of premium due, and date of payment for every client. By carrying this list, with the complete records, I can tell
    at a glance the status of each insured individual. My company has a large debit list considering the population of the
    town. All the publicity given about the value of insurance and sick benefits is having its effect.
- speaker: Respondent
  text: The average premium among the Negro clients of the firm runs about twenty cents weekly or straight life, or 'payment
    at death' policies, and policies ranging from one to over six hundred dollars, with their corresponding ranges in premium.
- speaker: Interviewer
  text: Do very many Negroes carry 'sick benefit' policies?
- speaker: Respondent
  text: Yes. A good many of my debits carry a little policy with a small premium weekly. This will insure an income in case
    of sickness or an accident, that ranges from two and three dollars weekly to seven dollars, this being the highest sick
    benefit paid by company on this sort of arrangement. The premium on this amount is thirty-five cents weekly. These policies
    have been a blessing to many a family whose breadwinner has been laid up by accident. You know that, due to the hazardous
    employment of many of the Negroes, sickness or accidents occur quite often.
- speaker: Respondent
  text: The auto was now turning down a sandy street which marked the eastern boundary of that day's territory for collections.
    I ventured one more remark before Mr. Marshall set about the routine of collection. I said, 'Don't some of the Negro burial
    contracts seem a little peculiar?'
- speaker: Respondent
  text: The agent smiled, as he cut off the ignition switch and took his debit book in hand. 'I know what you are thinking
    about—the Over the River Burial Society and other humorous references to colored burial societies. It is true that some
    contracts used to call for, say, two Cadillacs, two Dodges, and so forth, for the funeral procession. I have even seen
    some provision made for loaners and rental of black coats for pallbearers, but you read more about that fiction than you
    see in actual life.
- speaker: Respondent
  text: About three years ago, the Florida legislature passed a law that practically outlawed or abolished the system of burial
    contracts. Now the amount of the claim is paid directly to the named beneficiary and the responsibility of the insurance
    agency ends when the claim is presented and paid. Those who had carried the weird burial insurance policies before the
    state law went into effect, serve in most cases re-insured with the local agents, without any specific clause or condition
    pertaining to the actual burial or funeral.
- speaker: Respondent
  text: By this time we had walked to the first house on the route, number 15 Central Avenue. The small yard and porch contained
    easy well-cared-for plants, and the blaze of the red geraniums made an attractive picture against the background of green
    cans. Although the house was rather shabby, the stage above a belligerent pride of home.
- speaker: Respondent
  text: The woman came to the door with an expansive smile, saying, 'Good morning.' She said, 'You have to see me, I've got
    clothes on to boil.' She disappeared into the house, and I got a glimpse of a neatly and comfortably furnished front room,
    a piano with an opened hymn book on the rack, reed furniture, and rose-colored damask draperies. Throughout the trip,
    it was noticed that draperies of varying shades of rose or rose-red represented the choice of this section.
- speaker: Respondent
  text: The next step was at a small cottage covered with faded green shingles, and porch rails that at some time had been
    painted yellow. A crumbly cement walk led from the gate, through sandy yard, to wooden steps badly in need of repairs.
    A short, fat woman came to the door, wearing a very full white cotton dress, and on her head was a violet-colored silk
    ruffled cap of the boudoir vintage.
- speaker: Respondent
  text: Holding her coins in her hand, she eyed me with suspicion. 'What you doing with Mr. Marshall?' she queried. 'Are you
    going to take his job?' Hastily I assured the old woman that I was merely visiting with Mr. Marshall and immediately her
    attitude changed. She smiled and without further parley, handed out her twenty-five cents.
- speaker: Respondent
  text: That's the mother of a 'debit' of mine. The old girl didn't seem to like the idea of anyone getting my job. These
    Negroes can be very loyal to ones they trust.
- speaker: Respondent
  text: 'And now we turned down a short side street and I heard a juvenile voice crying: ''Insurance man! Insurance man!''
    No medieval herald could have been more vociferous or more effective, for as we reached the next house, a smiling Negro
    was at the door showing an expanse of white teeth.'
- speaker: Respondent
  text: '''Now, much worth do I owe you this week?'' she said. Just as the agent handed the money, the sun burst through the
    clouds and a strong breeze blew in from the river. Mary hastily turned and sealed the books. ''Zug leave the book on the
    porch, I got to hurry and get my clothes out in this good sun.'' Under the welcome sunshine, her flower beds of hibiscus,
    Mexican daisies, and calendulas lifted.'
- speaker: Respondent
  text: Down the sand road again, and thence to 133 South Street, where a small shabby clapboard house struggled unsuccessfully
    to depress the brilliant array of flowers planted in sand, pots, wooden boxes, and even in broken dishes. Some sixth sense
    must have warned the woman of this house of the coming of the 'Insurance Man' for she had laid down her iron and paddled
    to the door, money in hand, her old carpet slippers making her footsteps almost noiseless as she crossed the bare floor.
- speaker: Respondent
  text: We were now on Riberia Street, almost on the east bank of the San Sebastian River, and there on the river was a small
    three-room house. A young woman, daughter of the insured, invited us into the room so that we could see her mother who
    was ill. The invalid was a woman of about sixty and had been at one time very vigorous and energetic. A long illness had
    wasted her but she kept up a pretense of being cheerful. It was obvious that her daughter had given her all the care within
    her power. The sick woman was propped up in bed by snowy white pillows, and covered by an immaculate fringed bedspread.
    Voided morose at the foot of the bed was a silk patchwork quilt which I admired.
- speaker: Respondent
  text: '''Yassum,'' she said, ''The lady folks I worked for fifteen years ago gave it to me on my birthday, and there it
    still is, just as good as when I got it.'' In a lower voice of resentment she continued: ''I am sick of being sick. I
    want to hurry up and get well and get out in the sunshine. I don''t like this laying in bed.'''
- speaker: Respondent
  text: After a few encouraging words, Mr. Marshall and I continued on our round. 'That is one of the oldest policy holders
    I have,' stated Mr. Marshall. 'She draws a weekly sick benefit of seven dollars; more than sufficient to supply the neat,
    cleanly food and medicine, yet she is very unhappy and refuses to accept the fact that her working days are over. We are
    now going to the home of the principal of the Negro high school. You will find him very intelligent.'
- speaker: Respondent
  text: The principal's house is a two-story place, greatly in need of paint, yet well kept within the limitations of his
    means. At our arrival, the principal's wife, also a teacher, came out with book and money in hand. He greeted us pleasantly,
    and asked us to come in. Time was pressing, however, and we declined. As we were leaving, the man smiled at me, saying
    'Insurance is a wonderful thing. It is something that we pay for, cheerfully and willingly.'
- speaker: Respondent
  text: After climbing a winding outside stairway at the rear of a two-story frame home on Central Avenue, we found Matilda,
    a young neatly dressed dressmaker. She was sitting at her sewing machine, and she produced immediately the fifteen cents
    for her premium.
- speaker: Respondent
  text: A few doors away, a girl inquired if she was sitting in for a while. The agent was making change from the bill presented.
    Her shining gold teeth and cheerful answer attracted attention. Long we were in a deal, color flowering, the garden, and
    the state of insurance.
- speaker: Respondent
  text: For hours we tramped through the streets. In our small collection, further that afternoon had resulted in 50-54 knock-tracking
    or repeat calls. At last—twenty-one calls had been made and we were ready to head for the car.
- speaker: Respondent
  text: 'I overtly studied Mr. Marshall in hopes of finding a fellow admirer, but his steps seemed as jaunty as when we started
    out. But the day''s work was not yet ended: a few of his clients leave their money with neighbors, while some others send
    to the office. In two cases, particularly among the domestic workers who do not return home from their work until evening,
    it is necessary for collections to be made after work. Usually, if the late calls had been trouble, oh, he said, ''Of
    course I am carrying money with me, but have never yet been molested nor any attempt of robbery been made. Although it
    is true that in many of the big cities, open season has been declared on collectors of all kinds and frequent robberies
    occur, but so far, we have not had any of that in St. Augustine.'''
- speaker: Respondent
  text: These houses and people that you have seen today are typical of the general rule of small ten to thirty cents a week
    policy holders. You see that their homes are generally neat and well kept, and how thrifty they manage their affairs.
    If ours, we have seen the best type Negro today, for jail birds don't bother to carry insurance. You also see that in
    most instances the women are the policy holders, assisting in, or entirely supporting the family, and generally managing
    to hold things together.
- speaker: Respondent
  text: This Negro section visited lies within the corporate limits of the city, so all of the houses have sewerage facilities,
    and many of them have bathrooms, also electric lights, and radios. The Negro's love of music is well known and most of
    the houses were provided with some type of stove, some with pianos, but radios predominated.
- speaker: Respondent
  text: Driving homeward, I remarked, 'I think you have a most interesting job,' but Mr. Marshall answered, 'It is nothing
    but routine, we do the same thing day in and day out, and year in and year out.'
