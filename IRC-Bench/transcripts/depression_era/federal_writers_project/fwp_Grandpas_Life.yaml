collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: In the small hours of August 7th, 1840, the family were awakened by the Indian warwhoop, the discharge of guns and
    the falling of window glass. Mrs. Perrino and the three children, in their night garments, hastily went through the trap
    door, down into the water beneath their house, secreting themselves in the turtle crawl, where the water was cold and
    even with their necks. Dr. Perrino would not follow them thinking that by his remaining behind, in the house, he could
    pacify the savages by speaking to them in Spanish as their grievance seemed to be only against Americans and telling them
    that he was a physician. This he did, from the upper piazza, but of no avail. Their yelling ceased temporarily however,
    and they went away. In the meantime Dr. Perrino drew a chest of seed across the trap door concealing his family in the
    cellar from the savage eyes, and ascended into the cupola, only to be found, later, by the bloodthirsty Indians, who forced
    their way to him and finished their work with horrible howls of satisfaction, heard by the trembling, fearful, grieving
    family below.
- speaker: Respondent
  text: Very soon afterward the smoke and terrible heat in the watery cellar acquainted the refugees of their burning home,
    which would cave in upon them. They kept their faces to the water, plastered their heads with marl and threw the water
    over them constantly to keep the air in motion, and to cool it, in order that they might breathe, at the same time throwing
    marl upon the burning planks above their heads.
- speaker: Respondent
  text: Henry decided that he would rather be killed by the Indians than to be burned to death, following his decision with
    his marvelous escape by forcing aside a palmetto post, which made an opening only large enough for him to barely go through.
    With a sorrowful glance backward toward his mother and sisters, he passed through the turtle crawl out into the open space.
    As though inspired, Mrs. Perrino then delved into the marl with her fingers finally drawing out a few posts from the bottom,
    which enabled all to pass from their prison into the water near the wharf.
- speaker: Respondent
  text: Emerging from the hole at the end of the wharf they discovered a launch, its bow resting on the shore. The boat belonged
    to six Indians who were at that moment in a store nearby preparing to bring their loot to this launch. Henry, his mother
    and sisters were quick to enter the boat, and although only thirteen, skillfully handled the craft, with his sister's
    aid, until they were out of rifle shot distance. From this boat they were taken to the schooner, Medium, where they found
    Mr. Howe and his family, also Captain Houseman.
- speaker: Respondent
  text: Intelligence of the massacre was sent to Cape Florida, about seventy miles up the coast, by a small boat, and shortly
    there came to assist them, the U.S.S. Flirt, commanded by Lieutenant McLaughlin. From the Flirt they boarded the government
    steamer, Santee, which took them to St. Augustine, where they were supplied with adequate necessities; the citizens calling
    upon them and offering generous assistance.
- speaker: Respondent
  text: From St. Augustine, the Perrino family, trusting that by some happy miracle Dr. Perrino was still alive, secured,
    through the kindness of Dr. Edward Worrell, U.S.A., free passage on the water and on the railroad to Auburn, New York,
    from which place they rode for half-fare in a carriage to Palmyra, New York, their former home.
- speaker: Respondent
  text: Many of the inhabitants of Indian Key, like the Perrines, effected marvelous escape from the Indians, but the island
    was reduced to dust. Many were brutally slain. Among those who escaped were Mr. Henry Goodyear, of the Goodyear Rubber
    Company.
- speaker: Respondent
  text: The interior of the lighthouse at Cape Florida was burned while the keeper was upon the summit of the high wall. He
    was rescued by flying a kite and dropping the line where he could reach it, by which means he was able to draw up a cord
    sufficiently strong to bear his weight. By fastening it at the top he let himself down, hand over hand, until he reached
    the ground.
- speaker: Respondent
  text: While in New York Henry studies law and is admitted to the Bar. He later concludes he should have chosen the study
    of medicine instead, becomes discouraged, and after trying various odd jobs and positions is induced by uncle and cousins
    to join the procession of 1849 to California.
- speaker: Respondent
  text: He sails in the Bustin G. Owens, around Cape Horn. Full complement of the ship was 169 passengers; passage fare in
    the cabin was $250 each. Before entering the tropics they saw large schools of porpoises, which were different from the
    unwieldy monsters seen near the Florida Keys.
- speaker: Respondent
  text: These were only four or five feet long, leaping their entire length out of the water. There were also visible Portuguese
    Men-of-War, beautiful red, purple and blue curiosities of the sea. They have upon their backs a sort of sail by means
    of which they are wafted over the waves. As the rays of light strike them they are radiant at times, with rosy hues changing
    from pink and violet to the deepest blue. Here the author compares the scene to that of Indian Key.
- speaker: Respondent
  text: 'June 1st: A number of passengers rowed over to the barque, Simlar, bound for London, to send letters home.'
- speaker: Respondent
  text: 'June 2nd: Running along now about four knots an hour. Spoke with Norwegian barque, Antelope, coming from California,
    bound for Gottenburg. Monotony of the voyage again broken by a word with the French barque, Sophie Cesar, from the Mozambique,
    bound for the Harve-deo-Grace. During a heavy shower caught several casks of delicious drinking water.'
- speaker: Respondent
  text: 'June 3rd: A shark, four and a half feet long, was caught during the night and served for breakfast. Henry compares
    the vessel and the sea to that mentioned in The Ancient Mariner. It is the Sabbath and Henry retires to the quarter deck
    during the religious service, preferring solitude and his thoughts to a service read by a grey-haired sinner who deals
    out liquor during the week to the passengers, and who took a horn before service.'
- speaker: Respondent
  text: 'June 13th: Saw many fish called Albicares, around the bow. They were in pursuit of the flying fish which were constantly
    starting by thousands from the water, and skimming over the surface like swallows.'
- speaker: Respondent
  text: 'June 14th: Crossed the Equator. A species of shark called the dog-fish was caught today.'
- speaker: Respondent
  text: 'June 16th: We will pass the dreaded Cape St. Roque today. We now feel the full force of the southeast trade winds
    and hope to reach Rio by a week from tomorrow.'
- speaker: Respondent
  text: 'June 24th: Instead of reaching Rio we are now becalmed about 30 miles from Cape Frio, whose lighthouse is visible.
    Saw a bird called the marline spike. It resembles the frigate bird of Florida.'
- speaker: Respondent
  text: 'June 25th: I am really gazing upon the coast of South America, and right before me is Brazil. As we near the entrance
    to the harbor we behold a scene of grandeur and beauty. On the left is a peak about 900 feet high, called the Sugar Loaf.
    One can imagine a loaf of sugar which had had its base partially melted.'
- speaker: Respondent
  text: 'June 25th: We enter this wondrously beautiful harbor and drop anchor. The city of Rio Janeiro is about three miles
    farther in. The passengers hired a boat to take them into the city. Boats are moving in every direction, rowed by negro
    slaves. The roofs of all the buildings are tiled, resembling long rows of flower-pots cut in half lengthwise, and laid
    side-by-side and fitted into each other in reverse order. In the markets are varieties of fruits, vegetables, fish, poultry,
    birds and monkeys. Crowds of half-naked negro women are washing clothes.'
