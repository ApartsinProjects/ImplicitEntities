source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Today he is followed by two youngsters one about ten and the other twelve darting here and there like a couple of
    flat-footed deckers. The third generation of hat-blockers, shoe-repairers, shoe-shiners of the Pelee dynasty adapting
    themselves to American methods.
- speaker: Respondent
  text: Old Gus, that is, my uncle, is my father's brother, and his health not so good, either, so he thought young man like
    me would be help in the business, and here I am.
- speaker: Interviewer
  text: Where did you come from originally?
- speaker: Respondent
  text: I've been here, right here in Jacksonville, twenty-five years. My home in Leontavo, a small country village in the
    province of Amalie, near the seaport of parts, in Peloponnese.
- speaker: Interviewer
  text: What was your education like?
- speaker: Respondent
  text: I started to school when I was six and graduated when I was fifteen, that is from high school. I had to walk along
    main roads, took an hour to go and come. But I was glad because I liked to go to school. I learned reading and writing,
    and to figure in grammar and arithmetic. All children go, boys and girls, together but in high school the boys and girls
    go separate, have different rooms and different teachers, all men teachers here, though, and very strict.
- speaker: Interviewer
  text: What languages did you study?
- speaker: Respondent
  text: In high school I studied geometry, algebra, calculus, Homer, among the Greek classics. For languages we took up Latin,
    Spanish, French, German, Greek, and ancient Greek. The ancient Greek you know like the time of Christ. It is itinerant,
    just like pure English, and English mixed with American along but like Homer wrote the poems. I called it Vidivighme.
- speaker: Interviewer
  text: Did you have any hobbies or interests?
- speaker: Respondent
  text: I love stars. Just the stars. I liked astronomy. You know, in a place there are such lovely blue skies at night, and
    the stars so close you can almost reach out and touch them. It is like that here sometimes when there is no fog. But I
    won't go on more, I find nobody interested to talk to me about the stars. I have my books, yes, but one gets tired trying
    to figure things out by himself. No telescope, but very good old glass. It is perfect. I make my charts and watch the
    changes in the evening and normal stars, the rising Asia's minor constellations but it is all so wonderful, a never-ending
    study.
- speaker: Interviewer
  text: When did you come to America?
- speaker: Respondent
  text: I finished school in 1914. My father was very old and not long to live, and when my cousin Gus in the door, winter
    there and no one in the house of 1914, my father said 'You go back to American Athens. You have better chances there.
    Germany, Italy, the big powerful nations of Europe will soon swallow up the smaller countries and Greece, the great Greece
    of olden times, of Pericles, Olores, Homer, Pythagoras will be no more just target for bullets, or willa for the big war
    machine.' Young Gus went on to the old village and visited a while with us, and on January 26, 1914, we sailed from the
    port of Piraeus on the English S.S. Tyrannosia. We were about ten days crossing the Atlantic. We landed in New York City,
    and came right to Jacksonville. That was in February, 1914.
- speaker: Interviewer
  text: How was life back home?
- speaker: Respondent
  text: Where I come from the people lead a very simple life. The farmers, my father was a farmer, he died long ago, raised
    most of their foodstuff. Wonderful beans, okra, carrots, cabbages, potatoes all grew nice in the fertile valley of the
    Daphne River. There was always plenty to eat. Black bread, no low-vegetability white bread like the Americans use so much.
    Mush melons they had, like this (he measured off two feet with his hands and fingers far apart) but big and round like
    your watermelon. They taste like the honeydew, but are larger, twenty-five to forty-five pounds. They ship them to nearby
    countries, where they are greatly relished. We did not have much meat, but it was freshly killed twice a week. Usual pork.
    But plenty fish and greens. Lots of fruit. The climate in the valley is warm, like here, but not so much rain. There were
    oranges, lemons, limes, and on the hillsides, large vineyards of grapes. Everybody drank wine, mostly sour wine you would
    probably say vinegar but it was more healthy than water. There were no sewer systems, no sanitary net much concentration.
    It was not possible, on account of the floods when the mountain snows melted in the spring and the Daphne rushed all over
    the valley. It would have torn out sewers. The country people had wells and mountain springs, the water cold but good,
    but they did not drink it. My water in Greece for drinking, only wine. The water used for bathing and washing. The Grecian
    women did their own washing. We have no blacks there and cooked good meals for their families, seasoned with the green
    peppers, garlic, leeks, and nice big sweet onions. They did the family washing, too, sometimes beating the clothes on
    the flat rocks at the mountain streams they were all about. There are no laundries there, and stiff, starched collars.
    The farmer raised sheep, cut the wool, which the women washed snow white and carded and spun into yarn, weaving it into
    clothing for the men and boys, with cottons like you say, prints for the women and girls.
- speaker: Interviewer
  text: Can you tell me about your work here?
- speaker: Respondent
  text: At four o'clock William Pelee had finished his work for the day. With the early edition of the Jacksonville Journal
    spread out before him on the glass-topped case, near a line of its smear of shoe polish, the broom soaked rags, and the
    chamois skin finisher, he was aiming over the spirit.
- speaker: Interviewer
  text: What about the business name 'Gus & Co.'?
- speaker: Respondent
  text: Did you think she had a right to the extra bag? No, it's all right. She wanted that to put the baby pants, the safety
    pins, the buttons and snappers, the can opener, and the new stopper for the bathtub that she had bought at dresses. But
    Virginia will carry one bag, probably the one with the hat, as it is lighter than the other one, and the mother will carry
    the one stuffed with the smaller ladies. One bag in big letters six inches to the other riders in the bus on the outside
    will advertise our business, and when she gets home the neighbors will say 'Just saw Mrs. So-and-so come in with two hats
    from Gus's. I did not know her old man had two summer hats.' He smiled his slow smile, and his grave eyes twinkled at
    the thought of the double advertising.
- speaker: Interviewer
  text: Can you tell me about the Spartan law?
- speaker: Respondent
  text: You want to know about the Spartan law? Well, it is as old as you say, the hills. I do not know when it started.
