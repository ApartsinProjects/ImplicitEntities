collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Yeah, 1911 tell you all about myself, I got plenty of time. I just set right here all day long and hope that somebody
    will come along to talk to.
- speaker: Respondent
  text: Iira from Lithonia; I was born there on a farm. My dad and mother had five children, me and four sisters.
- speaker: Respondent
  text: Yeah, I called 'em Dad and Sather, but I was the only one of the children that called 'em that; the rest called them
    Mama and Papa.
- speaker: Respondent
  text: My dad died about nine years back; my mother died when I was small. I have a sister in Cincinnati and one in Decatur.
    The rest is dead. They said that my mother died with T.B.'s. She was ill just about one year. My dad, he just got sick
    and died. He wasn't sick long and I don't know what he died of, but he didn't die with no T.B.'s. One of my sisters died
    of pneumonia and another one she got shot. She went in a room where another man and woman was fighting and got shot accidentally.
- speaker: Respondent
  text: My other two sisters are married and are getting along right well.
- speaker: Respondent
  text: I worked the farm in Lithonia on farms. The man furnished all the seed, food, mule, tools, and everything; and we
    got half of everything we made. Yeah, we had plenty to eat and I guess I had a right good time when I was growing up.
    I never did get a bicycle though but I had that mule to ride and that was better than a bicycle but I didn't know it then.
    Yeah, my dad could have bought one if he had wanted to because we most always had some money left over after settling
    up. Usually, if we had a good drop we'd have about five or six hundred dollars left after all the bills were paid.
- speaker: Respondent
  text: I never went to school much, just about two years. I can't write none too good and I can read a little bit. My sisters
    went to school a whole lot more than I did. I done most of the work. I don't remember much about that school. We just
    had two numbers and I don't know how many went but there was a good many. Now, we didn't have no playgrounds nor nothing.
    It was less a country school.
- speaker: Respondent
  text: We played marbles most of the time when I was a little boy. Sometimes we played baseball though.
- speaker: Respondent
  text: When I got a pretty good size boy, I used to work here in Atlanta in the winter time. I was a pretty bad one then.
    I got looked up for shooting craps or eyeballing most every Saturday night. Awe, eyeballing, that's when you ain't gambling,
    you is just watching the game. They look you up though just the same. My boss-man he always got us out. Yeah, they had
    that kangaroo mart in that jail. If then you paid them a quarter though you wouldn't get no licks. Yeah, I slowly gave
    them that quarter.
- speaker: Respondent
  text: I went to North Carolina to work at Big Rock quarry when I was about twenty-four years old. I made five twenty a day
    up there drilling rock. Awe, I worked in that rock quarry at Lithonia some and that's where I learned to drill rock. They
    just paid me a dollar and a half a day for working there though. Awe, I just made one dollar and a quarter then I was
    driving teams in Atlanta.
- speaker: Respondent
  text: I didn't stay in North Carolina long, just about six months.
- speaker: Respondent
  text: I went to West Virginia to work in the coal mines. I made eight dollars and one penny a day or driving a mule in the
    mines. Later on, I made ten or twelve dollars a day loading coal. That was hard work but the more you worked the more
    money you made. Awe, I could load about four or five cars a day. They was cars used in the mines, they hold four or five
    tons.
- speaker: Respondent
  text: Now, we had plenty of work to do every day in the week. I never did get laid off none, not one day. I'd work about
    three or four months though and then I'd just stay off a week or two. Now, I wouldn't get tired of working, just tired
    of going to work every day. Now, when I go back they would always put me back to work.
- speaker: Respondent
  text: I still shot craps most of the time when I wasn't at work and I made money when I gambled. Sometimes I'd win two or
    three hundred dollars.
- speaker: Respondent
  text: Now, they don't look you up for gambling up there. They don't pay no attention to you. Now, I wouldn't lose near as
    much as I'd win. Now, I didn't save none of my money. I was a fancy dresser in them days and I spent most of my money
    on women.
- speaker: Respondent
  text: Now, I never did get married. I wouldn't marry no woman pig-in-the-sack. They might be a possum in that sack. I had
    to try them before I married them and when I tried them, well, I just never did marry them. I would have married one though
    but she wanted to get married too quick and we fell out.
- speaker: Respondent
  text: They got me in the army in 1918. I was sent to Camp Lee. Now, I didn't do no fighting. I just stayed at the camp.
    Now, I wasn't scared, I wanted to go to war first. Some of them was scared though but most of them wanted to fight. Now,
    there was nothing but colored men in my company. There was some white officers though. When the war was over they sent
    me down here to Camp Gordon. Then they let me out.
- speaker: Respondent
  text: I stayed around here for a while and then I went to Tom Creek, Virginia.
- speaker: Respondent
  text: I got a job loading coal at the V.I.C. mines. I worked there about four years and that's where I got my legs cut off.
- speaker: Respondent
  text: One Tuesday morning I went to work and there wasn't no empty cars on the tracks to load the coal in. I walked up to
    where the cars was, and when the engine started to pushing down to where we was going to load them I went to swing on
    one to ride down there and my foot slipped and I fell under the saw. The wheels run over me and cut off both my legs up
    above my knees.
- speaker: Respondent
  text: I was in the hospital for seven months. When I got out they sent me to the poor farm. My cousin, Ethel Brown, came
    there and got me and carried me back to West Virginia to live with her.
- speaker: Respondent
  text: Man, they didn't pay me nothing for getting my legs cut off. They ain't never give me one cent. They gave me some
    artificial legs but I ain't never been able to use them. You see when you get both your legs cut off above your knees
    you can't get about on no artificial legs and crutches.
- speaker: Respondent
  text: You see when I get to standing up on them legs and crutches I can throw my legs out in front of me but, with my legs
    like that, how am I gonna get my crutches off the ground then and how am I gonna get mileage back under me again. You
    just don't do it so you just fall down. If I had just one knee joint I could get about on them legs all right.
- speaker: Respondent
  text: I stayed with my cousin for two or three years and then I went to Lynch, Kentucky, and lived with another one of my
    cousins, Doll Hawk, for about two years. Then I went back to West Virginia to live with Allie Hawk. He is another cousin
    of mine.
- speaker: Respondent
  text: I got a truck and sold produce in West Virginia. I made five or six dollars a day. I made my own living for a while
    but then it got so I couldn't sell enough to pay the boy I had driving that truck so I had to quit. That boy wrecked that
    truck a while after that when he had it borrowed and I never did get it fixed up no more. That truck never was no good
    much anyhow.
- speaker: Respondent
  text: The American Legion man got the government to pay me forty dollars a month. Then I could pay some board and the folks
    didn't mind me being around so much.
- speaker: Respondent
  text: When Roosevelt got in office he cut my check down to thirty dollars. I'll still be glad when the Republicans get back
    in, so I'll get my ten dollars a month back again. Yeah, I vote for Republicans. I voted for Hoover and Landon. Now, I
    won't vote next year if it's still the same. I just vote when I'm in West Virginia. I don't vote down here.
- speaker: Respondent
  text: I think in the P.A. there is a whole lot of lazy Negroes. If I had my legs I wouldn't want the government to give
    me no job nor nothing; I could always get one for myself. Well, maybe jobs is harder to get nowadays than twenty years
    ago. I never thought about it like that. You is right, it was about eight or nine years ago when I had to stop selling
    produce.
- speaker: Respondent
  text: Cause I couldn't sell none hardly. I said he had been everywhere for a job and couldn't find none. Guess he is having
    a hard time for paying the rent and the bills. He pays me four dollars a week though for my staying here and his wife,
    she works and makes six dollars a week, but he stays out of a job about half the time and when he does get one he don't
    make nothing much.
- speaker: Respondent
  text: Well I gets tired sitting here all the time. I don't think about nothing much. You see, I done got used to it now.
    I can get down the steps and go down to the store but it's more trouble than it's worth. I have stomach trouble and it
    keeps me feeling bad pretty much all the time now. I have had it ten years. I've been planning to go out to Forty Light
    Hospital and see if I can't get something out for it but I just keep putting it off.
- speaker: Respondent
  text: Now, I don't never go to church; I used to go sometimes before I lost my legs but not very much.
- speaker: Respondent
  text: I'm going back to West Virginia, if I get to feeling better. I believe I like it better up there. Money is easier
    to get up there.
- speaker: Respondent
  text: I guess I'll miss this here when you come back along. I'll talk to you maybe.
