collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: There is not much to life, only hard work from a youngster up to now. You are some time up and some time down. Here
    I have my little family and out of work.
- speaker: Respondent
  text: I was born in Macon, Georgia, October 28, 1912. My parents were Emma and Allen Freeman. My father I do not know very
    much about him. I now have a step-father Sim Keilum, who lives at 637 Silver Street, Lakeland, Florida. We have a pretty
    large family - my sisters Elsie Lee, age 21, Nettie Lee, age 19, and Maudine, age 16; my brothers L.J. McCarthy, a half
    brother. The last time I saw or heard of him was back in 1937. Booker, age 23; Jac, age 26; Melvin, age 28; and Marion,
    age 10. All of my brothers are working at common labor.
- speaker: Respondent
  text: I was born at Cocoa, Florida, June 15, 1915. My parents left there when I was real small and settled in Monticello,
    Florida. My father Jerry and mother Rosa Glenn. Father is nearly sixty-two years old, I don't remember the age of my mother.
    I have two sisters and two brothers. Rosetta Atdte, age 40, she lives at 601 Silver Street, Lakeland, Florida, Elizabeth
    Bells, age 30. My brothers Robert, age 38, he has three children Dorthina, Robbie, Mhe, and Doloris. I don't know their
    ages. Charlie Glenn lives at Healthville, Virginia. I have been away from home nearly five years. Robert and I married
    here in Lakeland, February 16, 1935. Little Robert Jr. was born 5-31-36 and Nelson 3-17-38.
- speaker: Respondent
  text: I didn't stay in Macon, Georgia. My parents moved to Dublin, Georgia. We came to Lakeland in 1925. I think I was twelve
    years old and we have remained here ever since.
- speaker: Respondent
  text: I want my boys to be good men, not like some of the sorry ones I see walking up and down the street.
- speaker: Respondent
  text: Yes, I have started already to give them muscle. I want them to be strong.
- speaker: Respondent
  text: I hope they will learn more than I did in school. I attended the sixth grade in Monticello, Florida.
- speaker: Respondent
  text: I only went as far as the second grade in Dublin, Georgia. When I came to Lakeland I attended the Washington Park
    Elementary School just a few days. I had to stop school to go to work. I always wanted to go to school, now I see what
    I have missed. Well along that time I had to obey my mother, we had to live. Now I see how other people live, they have
    property and own cars. I have neither one.
- speaker: Respondent
  text: I started doing hard work when I was small, that is all I know how to do. I will never forget the first job I had.
    I carried water for the McDonald Construction Company in 1925. I made 9.00 a week. Later I worked for the Atlantic Coast
    Line railroad, on this job I made 15.00 a week. This job I held down until 1932. After that I had to pick up odd jobs
    and later found work at Polk City sawmill. There I was assistant fireman, I made 15.00 a week on this job. When I lost
    out, I caddied for a while at the Cleveland Height Golf Course, until I began cutting fruit for the Highland City Association.
    They are located about eight miles from Lakeland. I have been making good up until a few weeks ago when they cut the crew
    off. I would average from 22.00 to 25.00 a week when we had plenty of fruit to cut.
- speaker: Respondent
  text: No, fruit cutting is not hard after you get used to it. The greatest thing is learning how to handle your ladder and
    cut without harming the fruit, you know they are pretty strict now about cutting fruit. The biggest thing that you have
    to watch is the exposure. It will knock a man out if you follow it down.
- speaker: Respondent
  text: The early morning dew affects you. We pick every day when working and Sunday also. I pick around 120 boxes of grapefruit
    a day, oranges 65 to 70 boxes a day, and tangerines from 25 to 30 boxes a day. They pay us for grapefruit 40 cents a box,
    oranges 60 cents a box, and tangerine 100 cents a box. The price ranges according to the size of fruit you pick. We work
    in crews of 14 or more. There is one foreman to each crew. The section where we pick mostly is the Highland section.
- speaker: Respondent
  text: This section is near Lakeland, and is thickly planted with fruit trees. We pick by the size, color, and grades. We
    are experienced enough to know what to do after instructed by our foreman.
- speaker: Respondent
  text: I have become Holy Sanctified. I am saved like the preacher. I ain't got all of the understanding, but I have to pray
    for wisdom. My mind is on nothing but the Lord. Satan is nothing but a common and evil mind. I fast when I received the
    Holy Ghost, you got to live the life. I go to church every night so far. The first time the Holy Ghost struck me it put
    me on the floor, and I rolled over and over. It is like electricity in the electric iron if you happen to touch the wire,
    it will shock you. You don't know a thing until it is all over. I wish I had a Bible to read, that would help to make
    me stronger.
- speaker: Respondent
  text: I am not anything now in the spiritual affairs but I have a desire to be sanctified like my wife. I once joined the
    Bethel AME Church, on North Dakota Avenue. I didn't attend regular, so sometimes I go now, but not often.
- speaker: Respondent
  text: You know if I was fixed up like some people, maybe I would do better, that is to have nice things like they have.
    Now look I am out of work now. Suppose I wanted things and had to buy them on time, I would lose them now. That causes
    me not to go out as much as I would like to.
- speaker: Respondent
  text: I wish I had a job like I had on the railroad, then I could do more. I have a nice bossman but he can only go so far.
    He is in the same field that I am in. He has no one to boss when we are cut off, so that puts him out of a job.
- speaker: Interviewer
  text: Have you ever voted?
- speaker: Respondent
  text: I never voted, never had the opportunity to vote. I would not know how to vote. I think that we are better off now
    than we was during Hoover's time. Times were tough then, but now we do have something to do. This President believes in
    giving people something to do. So far I have not had to go on relief - with this card I don't think I will ever go on.
- speaker: Respondent
  text: I have never been sick a day in my life, and as long as I keep my good health I don't think I will go on relief. I
    have had a cold, but soon got rid of it. All of our health is good. We never have had a doctor. When the children were
    born we hired a mid-wife.
- speaker: Respondent
  text: We have to take our bath in the tubs that I wash out of, but it is better than nothing. I wouldn't mind it if our
    landlord would turn on the water. It is lots of trouble to carry water for four people to wash with. My husband has to
    have his tub full of water every night when he comes in from work.
- speaker: Respondent
  text: We have to pay 1.00 for our house every week. We rent from Mr. Emory Bryant. If we could afford it we would move to
    some other place, but good houses are hard to find here in Lakeland.
- speaker: Respondent
  text: I like anything except vegetables like green and tomatoes.
- speaker: Respondent
  text: I like greens and plenty of meat. Sometimes I cook corn bread. We are not able to get the food we need. In the summer
    we barely live. Now it is about the same. My children don't get the proper food, but the little rascals they keep fat.
- speaker: Interviewer
  text: Why don't you plant a garden?
- speaker: Respondent
  text: There was no fence around the place, and the neighbors' chickens would destroy everything that you would plant.
- speaker: Respondent
  text: When I am off from work I like to play checker. I like to see them play football, and baseball. I am not swift enough
    to play any of them myself. I like to see other people play games. I would read some if I had books to read. That would
    help me to learn some.
- speaker: Respondent
  text: I get my pleasure in the house of the Lord. After a hard day's work I feel better after going to church.
- speaker: Respondent
  text: In leaving Robert's spirit was much better, and he asked that if there was any place where he could get books, he
    was referred to the Colored Library. The little ones said goodbye.
