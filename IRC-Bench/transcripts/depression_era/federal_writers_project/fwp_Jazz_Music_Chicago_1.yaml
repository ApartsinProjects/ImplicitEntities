collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: At first I started out as a drummer. Those days I used to go down to hear Joe Oliver at the Dreamland Cafe on 36th
    and State. Before that Joe played at the Peek-In Cafe. But I was too young to go inside there. Anyhow, they didn't start
    playing till 12:00 at night. But I used to stand outside and listen, both places. They used to have matinee dances at
    the Dreamland and I'd ditch school and go out there. Joe'd play with that little mute and get some wonderful effects and
    I decided I'd do that too, which I'm still trying to perfect. Then Joe played at the Lincoln Gardens and I followed him
    there. I'd put on my brother's long pants and go there and listen to them and get up early and go to school in the morning.
    I must have been about 13 years old at the time and I was still playing drums. But finally I went to my mother and I told
    her I wanted to play a cornet and she bought me one on time. She paid 0.25 for it. I'll never forget it. It was a real
    pretty thing. When the Dixieland band began to make records I bought all I could get and play them on my victrola and
    play my cornet with the recording. After that Joe'd let me sit in with his band. That was an unheard of thing in those
    days up north here, a white person playing with black musicians.
- speaker: Respondent
  text: Then I met the fellows from the New Orleans Rhythm Kings and I hung around with them. They were at Friar's Inn. Their
    manner, Joe's too, style affected me. It was a different style. Because at the time the rage was sweet music and laughing
    cornets. Tommy Ladnier was another man I admired. The Rhythm Kings was the best band put together at the time. Ladnier
    took Armstrong's place with Oliver and played second trumpet when Armstrong went to New York to join Fletcher Henderson's
    band. There were few white guys they'd let sit in with them but they let some because some couldn't play that way with
    any other band. I met Bix at the Friar's Inn where the New Orleans Rhythm Kings were and we both came down to listen to
    them. We met in a familiar way, sort of unconscious. We'd sit around and listen to the boys and then one day Bix said,
    "I'm a cornet player." And I said, "I'm one, too." After that we went out to the south side together and there was one
    place we dropped in at where there was a piano and a drum and we sat in with our two horns and we played together so well
    we decided we'd be a cornet team. Always we met at Friar's Inn and then we'd knock around together. One time I tried out
    for a job. There was a violin, wax, piano, banjo, and drum, and they needed a cornet. I played one number and the guy
    threw me out. He didn't like what I was doing with a mute. All this time, while I was going to school and couldn't make
    up my mind what to do. You see I was ball. I was a great ball player. When I was a kid on a day job, I was crazy about
    playing during the war the big leaguers were with the Navy team and Jeff Feffer taught me how to pitch. I wanted to be
    a pitcher till I got interested in music.
- speaker: Respondent
  text: Ted was about 19 then. He was a quiet guy, a wonderful guy, never talked much unless he got a couple drinks in him.
    He was a funny guy though. If the band didn't play exactly right he couldn't play. The band had to be perfect. We used
    to make our own arrangements. He never jeered. I never went in for that stuff, jam, bringing your instrument around to
    another spot and sitting in and jamming, we do that ourselves though. We'd go to one of the fellows' houses and have our
    own fun, singing the blues and playing them. Ted and I had a favorite place we liked to go to on 10th and Wabash, a wine
    place, we'd drink our wine then we'd go out and listen to guys like Jimmy Boons and all that. Ted really had an original
    style. I can't describe his style. I just liked him. He could really swing. You know, his favorites were "Peapollo," "Roone,"
    and Johnny Dodds. From the Midway I got a little job in Forest Park, then I went to the Terry Gardens. Jess (Stacey) was
    with Joe Kayser and I tried to get Ted in there but they wouldn't have him and I was pretty sore. After that I went with
    any Miller at the College Inn and then I went with Ted Lewis. Friday night was a big night at the Sunset Cafe where Louie
    (Armstrong) was and Earl Hines and we'd meet down there and listen to them. The only time we'd get together would be there
    or on recording. But we'd try to get together on the same job when we'd be clubbing around. In between the big jobs we'd
    have to depend on weekend jobs. Ted Lewis was a fine guy to work for. He liked hot music even if he couldn't play it.
    Ted used to get guys like Teagarden and Fats Waller and Dorsey and McDonough to make records with him. Boy I used to get
    scared in...
- speaker: Respondent
  text: 'the spot I stand before to eat up there in the spot and play solo. I never went for that stuff. This is a rummy one.
    Timmy plays a corny solo on his clarinet and I''d play a solo too and he''d walk back to the orchestra and say to me,
    ''People still like what I do.'' Ted Lewis wanted my full name when he hired me for a job with him he wanted it when I
    put on the wire: John Francis Joseph Thomas Julian. He wanted my full name. Don Veremy was in the band and he was the
    most underrated musician of the time. He was maybe a band of his time. He was the son of a minister, once came home drunk
    one morning while the old man was watering, the moment when the old man saw him he turned his hose on Don to settle him
    up. Don really knew music. The kid studied harmony for four years. I gave Lewis plenty of headaches. I''ll never forget
    the time I was in the hospital and Louis came and without saying hello or nothing, the first thing he said was, ''I told
    you that stuff (drink) would put you there.'''
- speaker: Respondent
  text: I like to really play second or third cornet. I like the cornet because it's got more body to it. I remember in Los
    Angeles. Lewis said, 'Who's playing lead? You? You? You?' 'Me.' And then the guy goes Pow tulle tulle pow. He's an old
    circus man and you know how those old circus guys are. You ruin your lips on a mute. Muggsy tell him about how the guys
    in Paris'd follow you around. Yeah, all the guys followed me around, Artie Shaw, and guys like that. You need a change
    of pace. You need arrangements. I was listening to the Chicago symphony orchestra one night and the arabesque man took
    up a solo and he hit the most beautiful meatball I ever heard. It splattered all over. I got a request for There'll Be
    Some Changes Made. But he can't play Ted's part. Let him play his own part. But people want to hear it with Ted's part.
    Hell, let the kid play his own way the way he wants.
- speaker: Respondent
  text: 'After the clarinet plays four bars soft... Get it real clean before the bangout... all right, take it from the clarinet...
    boy, that''s bright, boy... go barrelhouse... wanna run it again... yeah, let''s get it in that groove... let''s keep
    it up there... right after that soft clarinet you gotta beat it right out... all right, same place, I''m starting to feel
    it a little bit now... ah hah, that''s it, ah hah... march along now... we gotta get something to keep that rhythm solid,
    see what else you can get out of them drums... now play it, ah hah, now play it... this''ll blend better... how''s that
    a leohol clarinet? Those old timers get in that two step and you can''t get ''em out of it... You know, Chicago is a dance
    town... Ah, that introduction isn''t bad... Well, throw it down an octave... here''s an idea, if you wanna get commercial,
    use the wa..waa... the idea is the guy is talking to the kid and trying to get him to go to sleep and he''s a sly little
    kid and the old man is smiling him around: see, that''s the idea and we gotta get a tune to intro... let''s play it through,
    we''ll get an idea... we gotta get a sleep idea in... Nobody''ll know it''s sleep... I''ll get out and lay down on the
    dance floor... that''s somber though, that''s what you want... when you play these commercial things then you know you''re
    good, everybody knows we can play hot... we can dada bin'' rah da but we got to get the other too... play it again till
    I get the melody (singer)... I like leads (singer) if it''s played soft.'
