collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I could tell you more stories about the taverns than anything else, I guess. They're a crummy bunch of places and
    a crummy lot of people, them tavern keepers I mean. Take all in all, though, the taverns that cater to the Irish are the
    dirtiest of the lot and the ones that cater to the Slavs are the cleanest. Not casting reflections on the Irish, understand,
    and not throwing bouquets at the Slavs. I get around, that's all, and that's the way I've found it. My line, a guy sees
    more than the average, and if he keeps his eyes and ears open he sees and hears a lot the average man don't ever get a
    chance to see. All that ain't nothing to do with this story. But about this guy I was going to tell you about. I was working
    on a saloon window one day and listening to the help jibber jabberin'. One bartender he's sayin' to another, "The way
    to treat this guy" -- they're talking about the boss -- "is to sass right back at 'im when he starts shootin' off." The
    other guy says, "Well, I work two days on that job." While these two guys are talking and I'm painters, another bartender
    is serving the boss who's sittin' at a table with a customer. They're drinking different brands, but each guy's stickin'
    to his own brand, and pretty soon, it's along toward noon, the place gets pretty...
- speaker: Respondent
  text: 'After a while I say to the tavern keeper, "Say, how do you explain this? These dames got class. Jesus!" And they
    got clothes. And you can see they don''t work. How the hell''s a guy gonna work? How do you do it? How do you keep your
    mind on your business?" The tavern keeper and barkeep, they both laugh. And the barkeep cracks: "What d'' you mean?" I
    says. The Tavern Keeper says, "Hell, Phil, these are the kind of high class whores business men will call long distance,
    spendin'' ten, fifteen, twenty, twenty-five dollars just to tell ''em when they''ll be in town, just to phone ''em."'
- speaker: Respondent
  text: 'This one happened in a saloon on Clark street, near north. You know these victrolas, the automatic nickel ones I
    mean. Well a guy''s puttin'' one in. I''m pushin'' away at the brush, and you know me, the open ear kid, always listenin''.
    I''m working and listening and the wife of the owner and the victrola man, they''re talking. The dame, she says: The guy,
    he reads off the list of records he''s put in, and this dame she pipes up with: "Did you put in the one called Now She
    Sells What She Used to Give Away?" Did ya ever hear anything like it? These jerks!'
- speaker: Respondent
  text: I was working in a saloon out south. A big moving van pulls up, and the driver and helper lug a big case into the
    joint. It's a beautiful case, mahogany finish, like a piece of furniture. It was a brand new slot machine, with a sliding
    front like's on my kit there. Lessir, it had a sliding drawer that pulled down and looked when the heat was on. That's
    the feature of it, that's the latest. And tailing the van was the slugger, the syndicate man, in a Lincoln Zephyr, who
    came in and tended to the formalities, how the split was going to be, and if there was any trouble to contact him, and
    all that. I tell you, Abe, there's always some way to beat the rap. It's the goddamnedest thing.
- speaker: Respondent
  text: 'So you wanna know what the saloon keepers are like, in general? Well, now, I''d say it''s like everything else, there''re
    all kinds, only the range''s sort of narrow, good and bad inside of certain limits. I told you before they''re next door
    to hoodlums. But one thing, most of ''em are hard boiled. Anyway, on the surface. Like the guy in this place. Yesterday
    after you left he was out there talkin'' to me. I''d noticed he wouldn''t let no one buy him no drinks and I remarked
    on it. Well, Jesus, the guy had a regular code. He said: "Buy no a drink? No, by Tagus: Let them buy their drinks and
    get their money and kick them out, that''s the way I do business. I don''t stand for that buying no a drink stuff. I won''t
    let the bartenders do it either. They buy you a drink and then you gotta set ''em up for them, and they hang around then
    and clutter up the place so paying customers don''t have room. As long as they have money and settle up among themselves
    that''s all right. But I let ''em buy no a drink, then I''m one of those to get it, and if I kick them out, I lose their
    business altogether. You gotta always kick a man in the ass if you''re a business man, but you can''t do it if you''re
    a member of his club. And I kick ''em out, by Jesus yes, just as soon as I see they don''t mean to spend no more dough.
    You gotta be hard boiled in this business or it''s your ass, that''s all." They''re hard boiled.'
- speaker: Respondent
  text: 'It''s mostly when there''s no customers around that the stories came out. Now in this saloon near 79th. The bartenders
    were talking about the way they connive on change; you know, when somebody gives ''em a big bill and maybe walks away,
    forgetting to pick up his change. Well, one of the guys is telling about it. He says he always puts the dough on the back
    bar, so if the customer should happen to come for it, he couldn''t say he was stealing it. After a few hours, of course,
    the guy pockets it. The customer comes in, and he says, "You see my change?" and the barkeep says, "Yoh, here it is,"
    and that proves he''s honest. If the customer doesn''t come back, it''s gravy. One time, though, a couple of bucks are
    on the back bar, and the boss comes in and sees it. "What''s this?" he says. The barkeeper tells him. The boss wants to
    know what time it was left, and the barkeeper, like a fool, tells him. So the boss puts it in his pocket. But that''s
    not the best one. The best one''s about the dame that called up from the elevated station. Did I tell you that one? A
    big heavy woman comes in and guzzles some beers. She lays a dollar on the bar and she''s tootin'' a line and when she
    walks out she forgets to pick up her change. It was thirty cents out of a buck, so there was seventy cents laying there.
    Well, the barkeep lays it on the back bar, like I said. After a while, there''s a call for the boss, who ain''t in; so
    the barkeep takes it. It''s from the dame who forgot her change. She''s callin'' from the El station on 63rd. "Yeah, I
    got it," the barkeep says, "seventy cents." The dame says, "That''s right." And then she pulls this gag. Listen, it''ll
    knock you off your pins. She says: "Mello just hold it for me. I''ll be in one of these days and trade it off." So the
    barkeeps tellin'' me about it and swearin'', and he says:'
- speaker: Respondent
  text: '"There''s the goddamn seventy cents, gatherin'' dust, no good to me or her or anyone else. If that goddamn -- don''t
    come in pretty goddamn soon and drink it up, I''ll drink it up." I says, "I''ll drink it up, don''t worry, if you want
    to get rid of it." The barkeep says, "Ain''t that a bitch?"'
- speaker: Respondent
  text: 'A lot of fellows, ice men and guys like that, have to spend a certain amount of time and money in the saloons, just
    to hold their trade. Well, I''m working in a place, and in comes a guy, a German or a Swede or something like that. We
    were talking about it afterward, and we sort of agreed he must have been a Swede. The saloon being one of his stops, he
    tries to be sociable. He''s an ice man, sort of big and hulking and dumb as hell. He tries to make talk and blunders at
    it so something awful. But that ain''t the point. The point is, when he goes out, the tavern keeper turns to me and says:
    "I don''t look Jewish, and no one ever takes me for a Jew, so I hear lots of things like that. You''ll find a lot of that
    kind of stuff around these taverns."'
- speaker: Respondent
  text: 'I was working in another place. This wasn''t no window job this time, but on a wall outside. The guy comes out every
    once in a while to watch us work, we see how things go. We get to jibber jabberin'' around — you know me, always askin''
    questions and tryin'' to find things out, and pretty soon we''re talking about Hitler and so on. This bastard, he busts
    out with: "I don''t want no Goddamn shooflies in here," talkin'' about his trade. Maybe I didn''t talk right, forgot myself
    for a minute or something, because he looks at me sort of queer and says, "You ain''t Jewish, are you?" The lad I''m working
    with, he says, "Ain''t we all God''s people," tryin'' to smooth things over. But the guy must''ve had his suspicions all
    the time after that, anyway, because he kept coming out and talking to me, tryin'' to justify himself. He''d say: "Look,
    Phil, you wouldn''t think that a guy who governs millions of people for years and them letting him get away with it, you
    wouldn''t think he could be all wrong, would you?" I ain''t nobody''s dummy exactly, and I know what he''s leading up
    to, and I say, "No, no, I guess not." "Yeah," I say. He says, "If he kicks out the Jews, and all the Germans let him do
    it, them damn Jews must''ve done some pretty goddamn bad things in their time, ain''t that so? You can''t say the guy
    don''t have something on the ball." That''s the sort of thing you gotta contend with.'
- speaker: Respondent
  text: 'I was working at one place where the twenty-six girl was as nice a piece as you''d want to see. I worked three days
    on that job; it was windows and a mall outside, both. We were always kiddin'' back and forth. Well, one day, the second
    morning it was, she gets off the bus. It''s in the summer. Jesus, you could see everything she had. And I''m tellin''
    you, she had plenty. She goes swaggerin'' by us, Red and me. We''re looking and not makin'' no bones about it either.
    That dame knew what the score was, all right. She steps when she gets up to us and just looks at us and laughs. Then off
    she goes, swingin'' that rump of hers — Oh Jesus! And when she gets to the door, she looks around and yells, sort of soft
    and just loud enough for us to hear: It was good enough to eat. We swaggered around like that for weeks, sayin'': Oh,
    Jesus!'
- speaker: Respondent
  text: Did I ever tell you about the two tough broads? It ain't much of a story. It's like this. I was working in a saloon
    on S. State, and the bartender tells it to me. It's about a snippy little waitress. I didn't see her; she wasn't working
    there no more when I was lettering the joint. Two broads come in and order some sandwiches and beer. The waitress is kind
    of slow getting them their orders and they start givin' her the works, remarking on the way she looks, the clothes she
    wears, and pretty much everything else in general, including the fact that she puts it out. Whether she did or not I don't
    know. I don't know anything about her but this that I'm tellin' you. Well, the waitress goes over and tells them where
    to get off. Kind of low. The barkeep didn't hear what she said. The broads sit around, maybe one and a half to two hours,
    just drinkin' beer and eyein' the waitress. After a while the waitress has to go to the can. And damn if the broads don't
    follow her in. Pretty soon there's cursing and bumpin' and hell to pay in general. By the time the barkeep had got help
    and got them out of there, them two tough broads had just about killed that kid, I guess. The bartender was sort of sorry
    about it. She was a good kid, he said, a good kid, but not tough enough. You gotta be tough yourself to talk back to a
    tough broad, he said. But you want them pretty, in the saloons, too, and they don't always go together. The barkeep said
    he was sorry as hell. He shook his head over it for a hell of a while.
- speaker: Respondent
  text: This one happened out south. And the hell of it is, it's in a Jewish neighborhood, figure that. The guy was sayin'
    how much he hated "kikes." "Take, for example," he said, "the two couples that was in here the other night." Me, I always
    say, "Yeah," you know as, get the story Phil. So it's like this. These two couples - they're all dressed up to kill, fur
    coats and evening gowns on the dames, and the lads in tuxes, or evening suits, or whatever the hell, and they're drinkin'
    and eatin' and having fun. The waitress -- I don't know how she come to do it, but she did -- she spilled two cocktails.
    Well, the guy says, the tavern keeper I mean, a little of the stuff got on the clothes. So one of the guys calls the tavern
    keeper over. They want him to look at what's happened and to pay the cleaning bill. But the tavern keeper says that'll
    come to too much, it ain't worth it. Besides, most of the stuff was on the table cloth not the kikes' clothes, and how
    much syrup was there in two cocktails, anyway? "Leave it to them to make a good thing out of something like that," he
    says. So they get sore all around and the tavern keeper calls for the bill. It comes to something like two-sixty, if I
    remember right, and he says, "All right, now this is on the house; that's as much as I'll pay and I won't pay no more."
    Then one of the guys, or maybe it was one of the dames, I don't remember now, says, "Well, we wo..."
