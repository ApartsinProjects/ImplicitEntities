collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Once there was a snowman stood outside the door, thought he'd like to come inside and play upon the floor, thought
    he'd like to warm himself by the firelight red, thought he'd like to climb upon the big white bed. So he called the North
    Wind, 'Help me wind I pray, I am almost frozen, standing here all day.' And so the North Wind came along and blew him
    in the door. And now, there's nothing left but a puddle on the floor.
- speaker: Respondent
  text: This is a circle game; the children all fall to the floor on the last word.
- speaker: Respondent
  text: The elephant's walk is steady and slow. His trunk like a pendulum swings just so, but when there are children with
    peanuts around, he swings it up and he swings it down.
- speaker: Respondent
  text: This is a gymnastic game.
- speaker: Respondent
  text: Ten little squirrels sitting on a tree, the first two said, what do I see? The next two said, a man with a gun. The
    next two said, let's run. The next two said, let's hide in the shade. The last two said, we're not afraid. Bang went the
    gun and away they all ran.
- speaker: Respondent
  text: This is a finger game.
