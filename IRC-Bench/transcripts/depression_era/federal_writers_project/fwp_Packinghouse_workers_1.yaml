collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: The meat specialties, that is about the coldest place in the yards. That's where they prepare medicinal extracts from
    meats, for hospitals, I guess. Anyway, they have a room there that's 60 degrees below zero. Nobody is supposed to be there
    longer than 3 minutes, but some of the men go in there for 15 minutes at a time.
- speaker: Respondent
  text: I used to have to pack the brains in cans. They would be frozen stiff and my nails would lift right up off my fingers
    handling them. It's always wet there and very, very cold. I had to wear two and three pairs of woolen stockings, 2 pairs
    of underwear, a couple of woolen skirts and all the sweaters I had, and on top of that I had to wear a white uniform.
    My own. But I couldn't stand it there, it was so cold. It's easy to get pneumonia in a place like that.
- speaker: Respondent
  text: In cleaning brains you have to keep your hands in ice cold water and pick out the blood clots. They have the most
    sickening odor. Cleaning tripe, though, that's the limit. Rotten, yellow stuff, all decayed, it just stank like hell!
    I did that for a few weeks.
- speaker: Respondent
  text: Then I worked in the sausage department. In the domestic sausage. I'd have to do the pork sausages in the cooler.
    Sometimes we wouldn't be told what kind of sausage we'd have to work on and then when we'd come to work they'd say 'pork
    for you' and we'd have to throw any dirty old rags we could pick up around our shoulders and go to work in that icebox.
    If they had any sense or consideration for the girls they could let them know ahead of time so that girls could come prepared
    with enough clothes.
- speaker: Respondent
  text: In summer sausage, they stuff very big sausages there. That's very heavy work. A stick of sausage weighs 200 pounds,
    five or six sausages on a stick. They have women doing that. It's a strong man's job and no woman should be doing that
    work.
- speaker: Respondent
  text: The young girls just can't, so they have the older ladies, and it's a crime to see the way they struggle with it.
    On that job I lost 27 pounds in three months. That was enough for me. It's a strain on your heart, too. Women get ruptured.
    They pick the strongest women, big husky ones, you should see the muscles on them, but they can't keep it up. It's horses'
    labor.
- speaker: Respondent
  text: In chipped beef the work is much easier. You can make better money, too, but the rate has to be topped, and it's very,
    very fast work.
- speaker: Respondent
  text: First I was in pickled pigs feet, where they pack and prepare only pigs feet. I'd have to bone them, wash them, wash
    the jars the stuff came in, and set them up on a table. I'd handle five jars in one hand, a finger holding each one. Quart
    jars they were, and the girls on that job would rush past each other with ten quarts of glassware stuck on the ends of
    their fingers, looking like a Buck Rogers creation.
- speaker: Respondent
  text: You know how the tops of glass jars are, sharp and jagged edges, and we'd cut ourselves all the time. Then besides
    that, after that we had to take these jars, filled with pigs feet over to the vinegar table where we put in the vinegar
    solution. And when that vinegar juice slops onto the cuts between a girl's fingers, wow! That really hurts!
- speaker: Respondent
  text: We had to argue and talk and fight before they furnished us with rubber gloves on that job. And then they only furnish
    two pairs a week and the girls have to buy at least five pairs because they wear out a couple pairs a day when there's
    a lot of work.
- speaker: Respondent
  text: I got a skin rash working in that vinegar. It splashes in your face and your eyes no matter how careful you are. I
    got big red blotches all over my face and neck and arms from it. It took me six months to get rid of it and I had to quit
    that job. They usually put the colored girls on that vinegar job.
- speaker: Respondent
  text: Me and another girl used to do a lot of talking and they knew we were in the CIO union so they stuck us on that job
    to get on our nerves and maybe make us quit. Well, it worked, but not until all the girls had union cards, so much good
    that one was.
- speaker: Respondent
  text: All the colored girls, they jump at the chance to be in the union as soon as they're asked. It's different with some
    of them. The Polish girls, some of them they'll say, 'Ah, let my husband join. Let my husband go to meetings. Let the
    men do it, it's not for women to do.' But once they get interested, boy, oh boy, they'll get up and talk their hearts
    out and they'll fight like troopers for the union. Once they really get the idea and the feel of the union, you can't
    hold them down. Some of the most religious Polish women in the union are the most surprising. They really go to town when
    they get started with the Union.
- speaker: Respondent
  text: And the Mexican women, they're all fighters. They know their rights and they fight for all they can get, every time.
    A boss can't say boo to them, they'll come right back at him. You know sometimes the foremen try to push them around,
    and call them Negroes. There's nothing makes them so angry and they won't let anybody get away with that, if he's the
    super himself. They're very proud of being Mexican.
- speaker: Respondent
  text: I worked in Cudahy's and Wilson's sausage. Wilson's, that's a wet floor, and greasy. The meat is put in a stuffer,
    a machine and then three girls on each side of the table where the sausages come out, they link it and then at the end
    of the table are the women who hang the sausages on the cages. Those sausages weigh a lot, the smallest is about twenty
    pounds. Then one woman would have to carry a full cage away to a different place. They'd have a Negro woman to do that,
    she'd have to pick up sometimes 200 pounds on a cage, up off the floor and lug it around. I did that for a while and sometimes
    I'd have my finger joints cut to the bone and that's no exaggeration.
- speaker: Respondent
  text: I do all kinds of trimming of meats in the cook room. Like boning tongues, slicing the tongues, things like that.
- speaker: Respondent
  text: There's a conveyor belt that comes down over our tables. It comes from a half floor above us where they work the meat.
    The men up there dump it and it comes down to us steaming hot. We have sort of rakes and we have to rake the meat off
    the conveyor onto our tables every so often and no matter if our tables are full or not. Otherwise we'd clog the line
    and the belt would have to be stopped and then a lot of confusion and bawling out.
- speaker: Respondent
  text: In boning the tongues there's two small bones in a beef tongue near where it's cut off and I have to stick my finger
    in there and sort of work it so I can pull those two little bones out. I have blisters on my fingers from handling that
    hot meat all the time. You don't know how awfully hot that meat is, just boiling. Sometimes nobody could touch it, not
    even the old hands, you know, the old ladies who've been there so long their hands are tough and calloused all over. Then
    the boss would come around and holler at us to get busy and we just had to, whether we could stand it or not. You can't
    protect your fingers in any way because it's a delicate operation and you've got to be able to feel quickly with your
    fingertips. You can't do it when your fingers are taped.
- speaker: Respondent
  text: In lots of the trimming jobs you have to use a knife. I like those jobs better than boning because I hate to have
    my hands looking like red lobsters and all blistered up all the time. Of course, there's plenty of accidents with knives,
    too, but at least if you cut yourself you can get it taped up and it doesn't hamper your work so much as blistered hands
    do.
- speaker: Respondent
  text: I've worked for Armour's two years. Not steady, though. I've been laid off twice, so far.
- speaker: Respondent
  text: I'm in the soup room. That's where they have the vegetables for different kinds of soup made. I peel about every vegetable
    under the sun, slice them up and make them ready for the soup vats.
- speaker: Respondent
  text: I used to peel 90 pounds of potatoes an hour, now they've got a machine they put the potatoes in and they're partially
    peeled so a girl can do 350 pounds in one hour. Nobody likes potato peeling though, because you have to work so fast and
    sometimes you'll get these great big potatoes that weigh a couple of pounds a piece and after you spend your time peeling
    it you slice it and it's all black and rotten inside. You have to throw it away and you don't get paid for the time you
    spent on it and that happens often and cuts into your pay, believe me. They scale all that kind of work.
- speaker: Respondent
  text: I peel onions, too, great big onions, half rotten and they smell so bad, and I sit there with tears just streaming
    while I do that job. You can hardly keep your eyes open on that job, and you keep blinking away the tears to see what
    you're doing with the knife. It doesn't do any good to wipe your eyes, you just have to sit there and cry, and keep working.
    It's really funny to watch, if you don't have to do it yourself.
- speaker: Respondent
  text: That's all I do there. I haven't been in Armour's so very long.
- speaker: Respondent
  text: I can do quite a few jobs. Here's how they work in the stuffing room. I used to be a packer. On that job they usually
    have one scaler to three packers. The scalers weigh the meat and then the packers stuff it in the cans. On the fancy meats
    where the meat has to look nice, like tongues, we don't handle them much with our hands, we have one of those wooden sticks,
    you know, like the doctor uses to look down your throat with, and we pack them in neatly with that. But with most of the
    meat we just stuff it in the cans with our hands, we know just about how much should go in each can.
- speaker: Respondent
  text: It's piece work, and you have to go very fast. You have to handle the rough time and just can't keep from cutting
    yourself all the time. Sometimes girls would have all their finger joints taped up because of so many cuts.
- speaker: Respondent
  text: Then canning hot tamales. That's a dirty job. You know they have to put in a lot of that hot sauce over the tamales.
    You have to scoop it out of a vat with a wooden ladle and if you get any of that hot sauce on your skin it burns like
    fire. You can't touch your eyes with your fingers no matter what happens, unless you want to burn your eyes out. It's
    a sight to see, especially when it's real busy, the girls working with the sweat dripping from their faces and they can't
    take time to wipe themselves with a handkerchief and they don't dare brush the sweat off with a sleeve because that stuff
    splashes on their clothes.
- speaker: Respondent
  text: Whatever they put in that sauce, it's so strong it even eats into the girls' clothes, makes it a part and you can't
    hardly wash it out. It stains everything. Ruins your stockings.
- speaker: Respondent
  text: That job's no good. They had what they call a safety plan. They'd plaster the walls with placards saying 'What's Your
    Hurry?' 'Safety Pays' and things like that. And they know when a girl's on piece work or even on straight rate she's got
    to produce or who. They give you a certain bonus if you produce over your rate for a certain length of time. You can't
    work for a bonus and follow their safety rules at the same time, very well, and they know that.
- speaker: Respondent
  text: What do I do at Armour's? I'm a tractor man, miss. I run one of them tractors that haul out the finished products
    packed and ready for the freights and trucks. They used to have one man doing the checking, and driving a tractor on one
    job. That's what they had me doing a couple of years. Run me ragged. Now they got regular checkers on steady.
- speaker: Respondent
  text: I ain't got a steady job, see. I been working there longer than some of the guys they put on steady checking, guys
    that used to be tractor men alongside of me. The company knew I was a union man so I wasn't in on it when some of these
    other guys got promoted to checkers. I didn't put up a squawk, see, because I didn't want to be a checker at the time.
    I didn't want the job anyway, for the reason, driving a tractor, they don't expect so much from you, the job has less
    responsibility attached to it.
- speaker: Respondent
  text: If you're a checker it's easier for them to get something on you. They're out to get a union guy any time, Armour's
    is, and the way they do it is, a checker can only do so much work and then he's bound to make mistakes because he won't
    be able to handle the volume of orders and all, it'll be coming in so fast. So they'll keep heaping work on him until
    they pin enough mistakes on him to can him. I figure to keep on this job at Armour's so I ain't quitting just now. I got
    a job to do for a while yet.
- speaker: Respondent
  text: And wait till they find out I ain't the only guy in the union. All them checkers are union boys. Most of the tractor
    men are union, too. It won't be long till we get our contract out of Armour's. That's what we're counting on when Lewis
    hits town.
- speaker: Respondent
  text: My address? Not for you? You wouldn't kid me, would you, sister? Oh, sure, I understand! You just tell them Sikora
    Hall, Union headquarters, anybody wants me can see me there, when I'm not working. Sure I got an address, but that ain't
    so hot, sister, coming 'round to union meetings for addresses. Get yourself into trouble doing that. Somebody might get
    the wrong idea about your business here. It ain't healthy for Armour spies and stoolies, I'll tell you that. That's all
    right, I know you're ok, I'm just giving you some good advice about asking union members their addresses that's all.
- speaker: Respondent
  text: I can't talk to you much about work. I guess it's about the same wherever you go, if you have to make a living and
    take care of children and home, it's hard work and there's never no end to it. At Armour's in the canning rooms where
    I worked on the night gang we would go to work.
