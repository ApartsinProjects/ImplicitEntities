collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Well I do think that Christmas was good to you, a nice time working, riding around seeing my friends.
- speaker: Respondent
  text: You see I am just camping in this ranch. Good houses are scarce here in Lakeland, and I don't know when I will be
    able to own one through these hard times.
- speaker: Interviewer
  text: Can you tell me about your background and where you were born?
- speaker: Respondent
  text: I was born in a log cabin near Fort Valley, Georgia. The log cabin only had four rooms. There were five of us in the
    family. My parents were John and Ana. I lived in Georgia until I was twenty years old. My parents were sharecroppers and
    had charge of a thirty-acre farm with fourteen mules on it.
- speaker: Interviewer
  text: What kind of work did you do when you came to Lakeland?
- speaker: Respondent
  text: When I first came to Lakeland, I found a job with the Stone Fruit Company. I stayed with them until July. I was getting
    three dollars and fifty cents a day. Then I went to work for another company and later for Firestone. I have been working
    for Firestone for a long time now.
- speaker: Interviewer
  text: Have you ever voted or been interested in voting?
- speaker: Respondent
  text: I have never voted in my life, but I do think it is halfway right to vote. I would vote for a candidate if I thought
    they were right for the job.
- speaker: Interviewer
  text: Do you attend church or have any religious affiliations?
- speaker: Respondent
  text: I was a member of the Baptist Church in Georgia, but since coming to Florida, I haven't been to church. I live my
    life quietly and don't go to church.
- speaker: Interviewer
  text: Can you tell me about your health and if you have seen a doctor?
- speaker: Respondent
  text: I never saw a doctor in my life until recently. I think doctors charge too much. My wife has rheumatism and sometimes
    gets scratches or bruises from changing tires at work.
- speaker: Interviewer
  text: What can you tell me about your home and how you keep it?
- speaker: Respondent
  text: My house is modest but well kept. The front porch has running vines and pots of flowers. The furniture is old but
    clean and neat. I take pride in keeping my home nice.
- speaker: Interviewer
  text: What are your hopes for the future?
- speaker: Respondent
  text: I would like to own a home someday if I had the money. I work hard and save what I can. I want to see my family do
    well and have a good life.
