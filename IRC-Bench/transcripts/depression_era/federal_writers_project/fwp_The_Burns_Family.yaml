collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Come on back here, I'm busy.
- speaker: Respondent
  text: I'm grating meddie, the root of a plant which looks like the elephant ear.
- speaker: Interviewer
  text: What is a grass piece?
- speaker: Respondent
  text: In the country we left, there was not much grass and when one found a piece of land with grass growing on it, that
    was taken for a home and farming.
- speaker: Interviewer
  text: What do you want to tell me about your family?
- speaker: Respondent
  text: We're just plain folks. All of us five children finished the eighth grade except William; he only went to the sixth.
    We all married young and didn't realize how much a good education would mean to us until it was too late.
- speaker: Interviewer
  text: Do you think a car or a home is more important?
- speaker: Respondent
  text: Sometimes you have to have a car to get enough money to buy a home and then again if you have a car you will spend
    all of your money chasing around in it and will never have enough money to buy a home. I don't know what it would be like
    not to have a home. I have always had one. I think a home is much more important.
- speaker: Interviewer
  text: How do you manage financially?
- speaker: Respondent
  text: We get five dollars a month out of the apartment and that takes care of the light bill. Zthel lends mama a check every
    month, and with what we get from the county, we have about sixty dollars a month. Mama, the three kids, and I live on
    that and we live about as well as most folks. We dress as well as the average and eat just about what we want.
- speaker: Interviewer
  text: What about your meals?
- speaker: Respondent
  text: We have all we want to eat and do have well balanced meals although we do not spend a lot of time studying charts.
    When I get hungry for anything, I eat it. I don't care whether the book says to eat it or not. I get along pretty good.
    My health is better than most people of my age. I eat what I want and ask no questions about it.
- speaker: Interviewer
  text: How do you feel about your life?
- speaker: Respondent
  text: We taste things as they come and don't complain. We aren't completely satisfied with what we have but I guess we don't
    have strong feelings about things like some folks. The main objection to our life is that we don't have enough money to
    do with as we please. If we had a hundred dollars a month we could get along fine—a hundred and fifty would be a lot better.
    We haven't always been poor like we are now. But, even now, we have more than many people who have plenty of money. We
    have our health, we love one another, and get along good together. That's something that money can't buy. There's no disgrace
    in our family and we all serve the Lord although we are not narrow minded.
- speaker: Interviewer
  text: What about keeping the store open on Sunday?
- speaker: Respondent
  text: Leona is talking about keeping the store open on Sunday but I told her I was going to leave if she started that. We
    have to have her at home sometime and not only that, the Lord didn't intend for us to work on Sunday. If we can't make
    a living in six days, one more day won't help much.
- speaker: Interviewer
  text: What are your plans with Henry?
- speaker: Respondent
  text: Henry is Leona's sweetheart. They have been going together for five years and are planning to get married as soon
    as he has a job that will support them. Something permanent. We are getting along alright now on the thirty I get from
    the Social. That's not much but it will stop if I get married and I am not going to take any chances. I would like to
    be married and have a home of my own and I do love Henry but I am not going to take any chances. If it were only Henry
    and I, I would not hesitate but I have these children and they have to be fed, clothed, and educated. I am not going to
    jump out of the frying pan into the fire. Henry has a job now selling insurance, and I believe he is going to make good.
    We are both hoping to be able to get married soon.
- speaker: Interviewer
  text: What about politics?
- speaker: Respondent
  text: We are all Democratic. We may split our vote sometimes but, on the whole, we stick to our party. I only vote if I
    feel like it. One little vote doesn't make no difference nowhere. Lilly, who lives in Miami, don't think it's the woman's
    place to vote. She'll leave voting alone, but we are strong Democrats just the same.
- speaker: Interviewer
  text: What about religion?
- speaker: Respondent
  text: Just like we are Democrats, we are Methodists. We are religious and have our principles but we are not narrow. We
    may not always live up to our standards but, at least, we have them. Religion does not influence my morals at all but
    I believe that it does others. What about it, mama?
- speaker: Interviewer
  text: What about going to shows on Sunday?
- speaker: Respondent
  text: The kids go to shows on Sunday, but they are taking on all of the new-fangled ideas that most folks seem to these
    days and I reckon it's all right for them, but not for me. I just wouldn't feel right about it. I don't mind the kids
    having a good time at anything they want to do as long as it's decent.
- speaker: Interviewer
  text: How much money do you spend for doctor and hospital bills?
- speaker: Respondent
  text: We don't spend no money like that.
