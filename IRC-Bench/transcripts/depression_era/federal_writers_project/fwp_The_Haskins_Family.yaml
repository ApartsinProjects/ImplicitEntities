collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Is Mrs. Haskins at home?
- speaker: Respondent
  text: Not she isn't, but I'm sure she'll be back within a short time. Won't you come in and wait?
- speaker: Interviewer
  text: Are you visiting Mrs. Haskins?
- speaker: Respondent
  text: Yes, I just came to stay for the summer. I know, every minute I'm in the house, I keep that radio going. When I get
    up in the morning, first thing I do is turn it on. If I come in late at night, I turn it on until the stations sign off
    then get an out of town station. I have to play it low then, suppose Paul just gets his sleep, but I like the radio thing
    played full blast when I'm alone in the house.
- speaker: Interviewer
  text: Who keeps going all day long in and out of that car 25 times a day?
- speaker: Respondent
  text: Paul does. He's been a car repairer for the Florida East Coast for the past 14 years. His hours are from seven to
    four every day with an hour for lunch. Of course, he might be called on the job at any hour of the night if necessary
    and he has to be ready to go at a moment's notice in case of accident. If he wants a vacation, he has to take it without
    pay and that's not so good. He has taken only one in all the years he's worked for the railroad. I think he needs a rest
    and I'm going to make him take two weeks off this summer. The men who are paid monthly get two weeks off with pay, but
    those who are paid weekly or monthly get none unless they take it without pay. But he has steady work all year round and
    that's something to be thankful for. He could get passes on the railroad but he seldom takes advantage of this, for most
    of our folks live in town and if we take a trip we go there in our car.
- speaker: Interviewer
  text: What kind of meals does Paul like?
- speaker: Respondent
  text: Paul comes home to lunch; he likes good hearty meals and he needs them too, for he works very hard. I cook his favorite
    dish today, rice and beans with pork chops in the moon.
- speaker: Interviewer
  text: How do you manage your finances?
- speaker: Respondent
  text: Paul gets paid pretty well for his work and we make our income from our moods. He lets us handle the money. I try
    to spend it wisely and put by what I can for a rainy day. I reckon we spend too much on food. Our grocery bills run high,
    for I cook three good meals a day and all of our family have good healthy appetites.
- speaker: Interviewer
  text: What was Paul's work history before the railroad?
- speaker: Respondent
  text: When we were first married, Paul worked for a wholesale house in Key West and we could hardly manage on the salary
    he made there. He was dissatisfied so he studied at night, through a correspondence course, and learned this trade, train
    mechanic. Then he completed the course, he had no trouble in getting a job with the railroad. He worked in Key West until
    about three years ago, when he was transferred to the shops at Fort Lauderdale, and later to Miami. At first, I didn't
    like it here at all, but now I'm getting used to it. I didn't care much for Lauderdale either, although we have made a
    lot of friends there. We rented this house because it's near the shops and too, the children don't have very far to go
    to school.
- speaker: Interviewer
  text: What are your thoughts on family and children?
- speaker: Respondent
  text: Paul is an exceptionally good man, a real home body. He spends very little time or money on the outside and he is
    extremely fond of children. If he'd have his way, I'd have a baby every year. Now I like Waldron too, but I believe that
    people with a limited income shouldn't have large families. Considering our income, I think two children are sufficient.
- speaker: Interviewer
  text: What are your hopes for your children's education?
- speaker: Respondent
  text: Paul and I agree that school training is very important and we hope to be able to give the children a better education
    than either of us have. We want Murdock to study electrical engineering and go to college if possible. Celia is so young,
    we haven't made plans for her as yet. I believe in letting a child choose his own trade or profession. Of course, the
    parents should offer suggestions toward their choosing but I believe it is a mistake for them to insist on a certain course
    of study for which their child has no preference. Now, if Celia shows an inclination to be studious, I will do all within
    my power to send her to college when the time comes.
- speaker: Interviewer
  text: What is your background in education?
- speaker: Respondent
  text: I went through the 10th grade in school and could have gone higher but I didn't like school. Paul went through the
    12th grade. We were both born and raised in Key West.
- speaker: Interviewer
  text: How do you find living in Miami compared to Key West?
- speaker: Respondent
  text: Some people think the city would really grow and amount to something if they could bury about 10 people down there
    who control everything. I find living in Miami higher than Key West. For instance, I paid only $10 a month rent there,
    whereas we pay $30 rent here. We rented this house for one year, furnished, although some of the furniture is mine.
- speaker: Interviewer
  text: How do you manage transportation?
- speaker: Respondent
  text: While we lived in Key West we got along nicely without a car but when Paul was transferred to Lauderdale we bought
    this Chevrolet. It would be hard to get along without a car here. Usually, he takes it in the morning, or if I want the
    car, I keep it and call for him at four o'clock. I like to visit around a little in the afternoons or go to town. He said
    he'd walk home to lunch today, the weather is so pleasant.
- speaker: Interviewer
  text: What are your hopes for owning a home?
- speaker: Respondent
  text: We hope someday to own a home of our own, possibly in Key West, that is if they ever build the railroad back and Paul
    can ever get transferred down there again. I just love to 'piddle' around with a flower garden. If I'd have my way I'd
    have a bouquet of freshly cut flowers in every room. To me, it gives a cheerful, homey atmosphere. There is very little
    room for a garden here, we have no back yard to speak of. The space between the two houses is used for clothes lines.
    In Key West, Murdock and I kept a lovely noisy garden and did all the work ourselves.
- speaker: Interviewer
  text: How is your family's health?
- speaker: Respondent
  text: I am thankful to say we have good health so we spend very little money for doctors and medicines. Celia did have a
    'hooping cough' last fall and the cough lasted so long I took her to Dr. Nusus. He said one of her lungs was affected
    and advised me to put her to bed for a month. He prescribed castor oil and quinine and she got along just fine. She was
    six years old last November and began school this semester.
- speaker: Interviewer
  text: Is Murdock home for lunch?
- speaker: Respondent
  text: Yes, Murdock is coming home for lunch. I keep going all day long. I get up at quarter of six and cook a hearty breakfast
    for Paul. After he leaves, it's time to get the children up for school. Mickey likes to sleep late in the morning. I take
    Celia to school then I tidy up the rooms and plan my marketing, which I do later in the morning. Since I bought the washing
    machine, I do all the laundry at home. I used to send the clothes out to the wet wash, but I like this ever so much better.
    The clothes smell so sweet and fresh when I take them off the line, different than when they come back from the laundry.
- speaker: Interviewer
  text: Here's Paul coming up the street now.
- speaker: Respondent
  text: Paul Haskins looks older than his 35 years. He is tall and well built and his thin black hair is gray at the temples.
    He has a rather prominent nose, large brown eyes and is fairly good looking. He is wearing khaki colored shirt and trousers
    that are neat and clean. As he enters the room, he smiles pleasantly. Genial and attractive, he makes one feel welcome
    the minute he speaks.
