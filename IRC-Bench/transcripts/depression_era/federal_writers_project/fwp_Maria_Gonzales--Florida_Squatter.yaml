collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I was the fifth of seven children, and was raised on a farm and I learnt to do most all the kinds of farm work just
    as good as a man could. I never went to school much for I didn't like it and my Pa he sent me to work on the farm most
    of the time.
- speaker: Respondent
  text: John and I got married about twenty years ago and we have a boy, Jim, he's nineteen now. John came here from a place
    called Carolina. Ma'am, I don't know if it was North or South Carolina is all I ever heard him say. He was a farmer too
    and we started to farm on a little patch of my Pa's farm but we didn't do so well.
- speaker: Respondent
  text: I liked John just didn't take to the ways here and he was kinda queer and never would listen to nobody. My family
    didn't like it much the way he acted but we stayed on there about two years, then John got real mad with my Pa and he
    moved us over here only we lived way out in the woods near a swamp then. I didn't mind living out there, I liked it for
    there didn't nobody bother us, we lived so far out. See, you left the hard road you had to travel the grade for a long
    ways and then walk through a patch of weeds for nigh on a mile, so didn't many people come to visit us. I never was much
    to visit anyway, seems like.
- speaker: Respondent
  text: This here little house it's much better than what we had out yonder. John, he always was queer and he said we didn't
    need no house so he built us a shelter of palmetto leaves and put a floor in it and we lived there. After a while he fenced
    it all round and got some pigs and chickens and we had them all right there with us. Once a man said he would give John
    lumber for a house but that made John awful mad and he wouldn't have it. He said he always lived just like he was then
    and he didn't want to change.
- speaker: Respondent
  text: We lived there for a long long time and it has been at most four years we been a living here now. John he kinda went
    out his head and took his shotgun and said he was a going to kill us all, so I got the youngun together with the little
    one who was just a tiny baby then. And we ran into the woods and hid from him all day. I could hear him waratin and a
    mouse in and sometimes a singing gospel songs and we sure was scared.
- speaker: Respondent
  text: At sundown we had to go to a neighbor and another farm about seven miles off and we all stayed there for the night.
    The next day we got to town and folks that looked after us. They got Jim a place to work on a poultry farm and they fixed
    up this old place for us and here we been ever since.
- speaker: Respondent
  text: I never had no doctor tend us, just a negro woman most the time, but there was times when there wasn't no one there
    with me but John. When he went crazy I had to grab the little baby out the bed and run with it in my arms.
- speaker: Respondent
  text: The family had never had much medical care. All they were on was the Relief and states went to see her and then came
    again and said the whole family must be treated for worms. That made John mad too but the nurses were firm and even came
    out to give the treatments.
- speaker: Respondent
  text: John's eyes got so bad he could hardly see to work so they were treated and glasses fitted. The children are rarely
    ill and castor oil is about all they ever took.
- speaker: Respondent
  text: John went and lost his mind over thinking too much about religion. So he wouldn't work even in the garden and would
    just sit out on the door and not worry whether or not he was saved. I didn't go to church much.
- speaker: Respondent
  text: I say that it's too far to walk. How I go to church sometimes when I take all the children along. Sometimes we walk
    the children, other times somebody comes and picks us up and carries us to town. Jim he gives to the church and sometimes
    he gives the younguns pennies to put in the basket just like the other children do and he always gives me a dime to take.
    I don't know what the church is doing with all that money. The preacher must be powerful rich if they live it all to him.
    But anyway they always ask us for it. I never know just what the preacher is saying, he talks too fast but I like to watch
    him and I sure love to hear the singing.
- speaker: Respondent
  text: I have a Bible but I don't read much on account of my eyes ain't so good. But I used to get the younguns to read it
    sometimes. It's kinda hard for me to read anyway because I never went to school much cause I didn't like to and would
    rather do farm work. What good is schooling for a woman anyway? They get on just as well.
- speaker: Respondent
  text: I want my younguns to learn reading and writing better than I did. They might need it sometime but I don't see much
    use in more than that. These younguns always trying to tell me about some fancy learning they at.
- speaker: Respondent
  text: I don't use this house, I don't live in it. John, our oldest, reads and writes real well and bigger than I, too, so
    no other house is now used but under us.
- speaker: Respondent
  text: What good did it do when John run us off? We didn't have no money, but we never all had any money anyway. When Jim
    got work at the chicken farm he got fifty cents a day, he gave it all to me. I saw a dollar on a court tax and had to
    keep up on it. Jim's growing up now, you know, and got girls on a mind. I used to stay right at the farm all the time
    at first to tend to babies at night until they start light so the babies could get up early.
- speaker: Respondent
  text: Now he don't shoot to work that hard but no, he don't let him do much. Sometimes he works on Saturday and stays over
    Sunday, but most likely he just does a little while on Sunday afternoon. He gets his board on it sometimes and chicken
    on it helps a lot.
- speaker: Respondent
  text: I do farm work too and so do my oldest girls. They don't like to go to school anymore and I guess they got enough
    schooling anyway. When we are to the places I used to carry the baby that little one where in my arms with that no one
    strength along, holding mostly to air or hand, and well, sometimes five miles to a neighbor to work. For women before
    we got to crop I had to carry both these younguns.
- speaker: Respondent
  text: When I did farm work, whatever they told me to do, sometimes I hoed corn, or picked down beans, or shelled beans for
    market. I got my dinner and sometimes to carry that to the other younguns should be at school then, and came tables. Never
    was ration to eat vegetables except collards or collards cooked with side meat, but sometimes we got so hungry and we
    didn't have nothing but vegetables so that I let them eat most all kinds.
- speaker: Respondent
  text: There was a time when John was lost the half. A woman came out from the big town to tell us all what to eat and how
    to cook it. I didn't go to the meeting, but I heard about it. What's the use in that? Life is just life, and vegetables
    just grow and we all can cook them. Seems like that woman didn't want us to boil our greens with lots of side meat for
    a length. They say they ain't fitters to eat if you don't eat them that way. One man said the flour dough fried bread
    wasn't fitten to eat. I guess she never tasted none of it. When it's fried in hog fat they just ain't nothing any better.
- speaker: Respondent
  text: Another time they wanted to give us clothes for the younguns and us too and lunches for the younguns going to school.
    That made John awful mad and he wouldn't take none of it. He said he knew it was a trap of some kind and he would sure
    have to pay for it all sometime, or else go to jail and he always was afraid of jail.
- speaker: Respondent
  text: They was others took all them things and they did have such pretty clothes and this, never had to pay for them or
    go to jail neither.
- speaker: Respondent
  text: How seems to me that I got a lot of younguns. Only eight. I know some folks got a dozen or more. Guess I'd have had
    three or four more some time if John hadn't run us off like he did. I have heard tell of some folks not having younguns
    that they ought to. That's real sinful, I think and it's against nature too, just like taking all that medicine that times
    the nurse made us do. The Lord He don't want us to do all them things; it ain't right.
- speaker: Respondent
  text: I like harder and times getting enough food and clothes for all my younguns. The church, it wanted to help us once,
    but I'm kinda like John that way, I just don't like for people to give me things less I know them real well and then I
    want to work for some. Jim's money don't go so far.
- speaker: Respondent
  text: A bingo do cost an awful lot these days, but people don't have more younguns than they should and they just get to
    take their share.
- speaker: Respondent
  text: Jim, he wants to vote, whatever that means. I don't vote and don't want to. It ain't for women anyway and the lesser
    we know about it the better off we is. Got enough to do to mind my younguns and my garden and working for other farmers
    that mean up in vote.
- speaker: Respondent
  text: We talked of town and city life and she stinted; Jim, he talks some of moving to the city but I won't go. I like this
    life now we got used to it. I guess it's better here than living way out yonder in the swamp, though I ain't never thought
    much about it. But folks in the city.
- speaker: Respondent
  text: I don't pester much. More comes here to see me than what they did when we lived out yonder but I don't go to see them
    less I have work to do there. I don't want folks coming in and telling me what to do, how to run my house, and tend my
    younguns. This way suits me and it's my life.
- speaker: Respondent
  text: Here we don't have much sickness neither like I hear tell they have in town. Seems like someone is always sick there.
    Sometimes one of my younguns has the colic and I give him plenty of castor oil and be sure he gets well. If he is too
    sick I let him suck under my breast and it will stop hurting and he will soon get well.
- speaker: Respondent
  text: Castor oil is good for ear too. If you blow it on an ear, it can't do no good at first but soon it will help. I don't
    want no doctor out yonder wet. I'm satisfied with my way of living. I don't see why folks like to go a traveling round
    from place to place, don't they get a place and stay there?
- speaker: Respondent
  text: Some of the smaller children had gotten out to the yard and were near. I looked at them positively and said, John,
    he never did let no children play not even in the clearing at the swamp. He said when they had time they should sit and
    think and figure if they was saved or not.
- speaker: Respondent
  text: But they don't take no time to that. Maybe it'll come to them. Some like they just got to have a little fun but I
    let them play lots and don't pester them all the time. Ain't no good younguns as any will find and I let the two girls
    go to little parties sometimes. I always make them promise not to dance for that sure is the devil's work.
- speaker: Respondent
  text: I ain't got much say over Jim now, but always petter him about it when I can.
- speaker: Respondent
  text: John, he came here once a long time ago and tried to get us to go out yonder to the swamp with him but I wouldn't
    go. I was sure he looked like he was mad about something.
- speaker: Respondent
  text: The town folks, they told John if he restored me twin they would put him in jail and I guess I scared him pretty bad
    for he pestered me no more and I ain't seen him for a long while now but sometimes he talks to the younguns in to will.
