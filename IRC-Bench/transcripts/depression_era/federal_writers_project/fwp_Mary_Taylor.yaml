collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Size of family three; woman, husband, and daughter in immediate family. Three daughters and one son married and living
    away from home. Effect of family size upon financial status immediate family greatly limits financial status as husband
    is ill and unable to work and daughter is in college. Attitude toward large family woman does not believe in large families
    and showed a slightly resentful attitude toward her family. Attitude toward limitation at family believes in limitation
    of family, feels that life under present day circumstances is so precarious that all families should be limited. Occupational
    background of family agricultural for both man and woman. Families of both were farmers and man has been a farmer and
    stock producer and trader; man had many years experience on farm and was also County Demonstration Agent. Now engaged
    in manufacture of jams etc. Pride of family, including ancestry rather vague as to ancestry, other than immediate family.
    Proud of work and background of farming. Proud of children in spite of slight resentment of fact that they do not help
    her.
- speaker: Respondent
  text: 'Number of years attendance in school twelve for woman; perhaps ten or twelve for man but rather difficult to determine
    as he did not attend a graded school all the time, neither did he attend regularly. Appears well educated however. Children
    all well educated, mostly at college work. Causes of limited education education of couple could hardly be called limited
    though they are not college graduates. Necessity to work perhaps prevented college work, along with limited means, and
    early marriage. Attitudes Toward Education: Educational advantages desired for children very ambitious and made many sacrifices
    in order that children might be well educated. After high school educations, each took some special work; one daughter
    attended business college; another took nurses training; youngest daughter now at Florida State college for women though
    Mrs. Taylor feels the great strain of this and is denying herself greatly in order to keep this child in college. Whether
    worker believes schooling training is of economic advantage - Woman believes greatly in education, and realizes its real
    value. Has educated children, each with some special work or profession in view so that they may take a special place
    in economic and social life. Evaluation of school system feels that school system is filled with a lot of frills and fancies
    but that fundamentally it is sound and of great advantage; promotes self assurance, makes children more able to think
    and plan their lives, fits them to be good citizens. Ambitions, ideals, idea of a good life woman often mourns the loss
    of their fine farm and wishes for a good substantial house and income. At present is renting a small house but owns a
    large one in another part of the State which she rents. Has a small car which is necessary in her work as she delivers
    orders for her jellies and jams to other towns and cities. Woman would want to work in spite of adversity, even if financial
    status was adequate, and would like a position in state or national work of a welfare nature.'
- speaker: Respondent
  text: 'Comparison of present income with first weekly or annual income rather difficult to determine. When woman was married
    at eighteen years of age she entered a home of wealth. Her husband owned a large plantation and stock farm which he later
    lost. The woman undertook to make living as husband''s health failed with financial difficulties. While employed a Home
    Demonstration Agent she had a regular salary which however was not adequate. During busy days in Florida she made plenty
    of money which was expended on family needs. At present income is inadequate and very uncertain as sales have been few
    during season for her products. While at beginning of her married life she lived in wealth and made plenty she now has
    barely enough for feeds, clothes, and other necessities, and even that at times is threatened. Actual needs to be served
    by income: feeds, clothing, rents, medical bills for husband''s upkeep or daughter in college so that she may soon be
    capable of self support, some repairs on property in Gainesville; gas and car upkeep, supplies for manufacture of her
    products. To what extent income covers needs probably barely adequate with expenses pared as closely as possible. Sense
    of relative values in expenditure of income woman had a highly trained and developed sense of values and makes no foolish
    expenditures. What person consulted considers an adequate income rather difficult to determine as woman did not express
    herself definitely upon this. Has lived with less an entirely adequate income for so many years. To live in the style
    to which she was at ease at that time would require perhaps a thousand dollars monthly; for income at present to cover
    all needs without worry probably five hundred dollars monthly. This would provide better living conditions, medical care,
    better care for child in college.'
- speaker: Respondent
  text: Pride or shame in work seems very proud of her work and of the fact that she has originated several jam recipes for
    jellies, etc., yet she owns resentful that she must do this work and that it pays her so little; is also very suspicious,
    feeling that someone is trying to encroach upon her work, original recipes, etc. Influences of outside attitudes very
    susceptible to attitudes of friends, that is she cares a great deal for their approval and is deeply wounded by lack of
    friendship of some people and lack of appreciation of her efforts by some of her close friends. Basis of objections to
    job satisfaction with income woman seemed disgruntled with present conditions; cannot make sufficient to live as she would
    like and yet works so hard. Work requires energy, time, and mental ability yet returns from it are not adequate. Feels
    also that responsibilities of entire family are upon her since husband has been ill and she is slightly resentful of that.
    Attitude of woman is that everyone is antagonistic to her interests; she admits this and says it is probably caused by
    her age and having worked for so long for so very little. Attitude toward owners probably in this case owners of homes
    which she rents, might also show attitude toward purchasers of products feels that she is forced to pay entirely too much
    rent; yearly average is $1440 per year. Also feels that she is doing a great favor to her purchasers of her products in
    letting them have time goods at price she asks, yet does not raise price. Advantages and disadvantages of present life
    in comparison with other types. Present small town life as compared with that of farming woman stated that when they owned
    their large farm they could produce almost everything to supply their needs and always were sure of a living and plenty
    to eat. Such a life was more or less isolated however and she likes friends and entertainment. Would be glad to return
    to farm life if it could be with the wealth they had at one time. Present life would be more agreeable if not so harassed
    with financial matters, for friends call and she attends card parties, etc. Is also able to sell products in law, hotels,
    to tourists and others.
- speaker: Respondent
  text: Present life compared with that in a city woman stated that she was essentially a small town or country woman in her
    preference of a place to live. While city environment would probably in some respects be better for her work in a marketing
    way, and would not offer obstacles in production of her products, yet she shuns it and does not even go to large cities
    to sell her jams and jellies. Does not care for city life at all, and feels that to attempt her work under such a life
    would be a great handicap. Present life compared to that at a larger town woman stated that she would prefer a larger
    town in which to live and pursue her work if it were not for the matter of making adjustments, such as finding suitable
    location for her business, making new friends, new markets, etc. She feels a timidity at present in making any change,
    though feels that if she could locate in one of the larger tourist towns of the Ridge Section it might be to her advantage,
    for much of her trade is with tourists.
- speaker: Respondent
  text: Extent of voting woman's husband is an ardent Democrat and votes at all elections. Woman is also a Democrat but more
    or less indifferent and does not consider voting a privilege. Takes little interest in politics except to criticize present
    way of matters. Degrees of independence in casting ballot both would vote the regular Democratic ticket as have always
    been Democrat, and feel that that party is best for the country. Preference in choice of candidates vote straight Democratic
    ticket feel that the Democratic party choice is best. In small local elections would vote for friends or in lieu of friends
    as candidates, for there considered suited for the office. Party consciousness both proud of being Democrats yet woman
    is critical of present conditions and rather apathetic regarding all politics. Consciousness of changing trends in the
    state woman well aware of changing trends in thought but harps upon the way things were done in her youth, does not accept
    quite gracefully present economic and social trends.
- speaker: Respondent
  text: 'Influence of religion on woman''s family quite moral but doubtful if religion has influenced them much in this respect.
    Husband has bad habits, as a modern trends in religion family are all Presbyterians but do not attend regularly. Attitude
    toward various forms of amusement woman very broad minded in regard to amusements of various kinds and endeavors to see
    that her daughter is such with other children of her age and social position. Woman enjoys seeing pictures, bridge, various
    parties, magazines and other amusements current in town. Is a member of Tourist Club and regularly attends its wartime
    entertainments. Relation to Church: a. Contribution really contribute regularly to Church b. Attitude toward aid from
    Church have never asked nor been the recipient of Church aid; approves of it for the needy and woman has helped Church
    societies in giving this aid to others. c. Attendance family make no fetish of regular attendance at Church but go when
    they want to and feel like it, perhaps are fairly regular and especially when daughter is at home.'
- speaker: Respondent
  text: Money expended for hospital and medical bills husband has been under doctor's care for several months with cost of
    about eight dollars a week until recently when the bill has been slightly reduced as he is now able to be up and about.
    Daughter in college has had some dental work, and another daughter who is unmarried and working needed financial aid to
    have tonsils and appendix removed. Woman needs glasses changed as eyes trouble her but feels unable to do so at present.
    To what extent health has been protected by adequate medical care health has always been provided properly by adequate
    care for entire family, except perhaps for woman. She is at present tired, overworked, and very nervous. What effect has
    work upon health apparently no effect, unless in case of woman. She is overworked and a nervous part of this condition
    she attributes to age and financial worries.
- speaker: Respondent
  text: Knowledge of a balanced diet woman has a thorough knowledge of a balanced diet through her studies and work as County
    Demonstration Agent, and summer courses at college in this work. To what extent is knowledge applied knowledge of a balanced
    diet is applied at all times when woman prepares meals at home, she does not like to cook and is usually too busy for
    it, so family take most of meals in restaurants. To what extent is it possible to have a balanced diet on wage earned
    possible to have a well balanced diet at each meal as family is small and are not heavy eaters.
- speaker: Respondent
  text: Cleanliness and order of house and number of rooms house of seven rooms, all clean and neat with a very comfortable
    homelike appearance. Cleanliness of person woman was very neat and clean, with an attractive house dress and apron of
    good material; silver hair attractively arranged, face and hands clean. Furnishings in house a set of lawn furniture graced
    a corner of the yard and was protected from the sun by a huge gay umbrella; pride, wicker chairs in tan and green were
    upon the large front veranda; living room was comfortably furnished with a matching silver set, chairs, settee, and desk.
    A small wood burning stove added its cheerful warmth, hands' lamps (electric) and a set rug in brown and grey added to
    the pleasing street. Portieres in neutral shades that blended well with both rugs draped the arch between living and dining
    room. A ray linoleum covered the dining room floor, china and glass cleaned in a built-in china closet. A breakfast set
    in pale green centered the room and blooming plants stood in the windows. Kitchen had two three burner oil stoves, lighting
    sink, cupboards and table. Both bedrooms were well furnished, one in mahogany finish with draperies of blues twin beds,
    dresser, and clothes cabinet; the other in ivory with hangings in cream and rills, twin beds vanity dresser and a built
    in clothes closet, both bedrooms connected with the modern bath. Another small room held a table, shelves for books and
    a sink. In possessions woman had many small items, such as a very old lamp, an aged woven basket for sewing of which she
    was proud. She also had a handsome large diamond ring with ear-rings to match, which she said were the family jewelry
    left from more prosperous times. She was also proud of table cloths, draperies and the like which she had made and used
    as demonstrations in her work as Home Agent.
- speaker: Respondent
  text: Use of time routine etc. woman has no established routine for work, that is does not work regularly every day; works
    as demand for products occurs thus insuring fresh articles. Whether working or not she arises early and has no respect
    for those who sleep late no matter what the cause.
