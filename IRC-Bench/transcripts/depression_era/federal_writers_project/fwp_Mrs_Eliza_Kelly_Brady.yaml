collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: No, I am not going out. I just came in. I have every week to visit the old nosquobello Cemetery, this is Wednesday,
    my day to visit the graves of my family who are gone and my friends of earlier days, whom I have outlived. I have spent
    most of the afternoon there, and I'll just keep my hat and coat on, like the fire has gone down and it is rather chilly.
- speaker: Respondent
  text: Yes, I am a native, and have been closely identified with the life of Fernandina for my whole seventy-two years. I
    was the only child of Daniel Kelly and Mary Russell Kelly who settled in Fernandina in 1862. My father came from Sligo,
    Ireland, and my mother from Dublin. My family have been continuous residents since the above date, taking an active part
    in the upbuilding of Fernandina and Nassau County.
- speaker: Respondent
  text: In 1890 I was married to Patrick R. Brady who came from Columbus, Georgia to Fernandina, opening the only exclusive
    furniture store in Nassau County, which he continued to operate until the time of his death.
- speaker: Respondent
  text: We had two children, Patrick Lewis R. Chadwick, residing in Fernandina, and Anthony Rogers Brady.
- speaker: Respondent
  text: I have given you the information about the Spanish-American War and I want to say that my son, Anthony Rogers Brady
    (Rogers was Mr. Brady's mother's name) was born in May, 1898, the year of the Spanish-American War.
- speaker: Respondent
  text: I was considered to have a talent in music, and was given special training, particularly in church music, and was
    organist for many years at St. Michael's Church. Then my baby was so little, and on Sundays, the military high mass we
    so long, the little colored nurse used to wheel him up behind the church, and the band played, and the soldiers sang the
    Star Spangled Banner. I would slip out and nurse little Anthony.
- speaker: Respondent
  text: By a strange coincidence, this boy, the pride of my life, is a soldier of Uncle Sam. He graduated from Annapolis in
    1922. He is now forty-one years of age, and is lieutenant-commander of the aerial squadron in Pearl Harbor at Honolulu,
    Hawaii.
- speaker: Respondent
  text: After his graduation from the U. S. Naval Academy, his first assignment was on the flagship Pittsburgh in European
    waters. He spent four years in Europe. After serving in this capacity, he was assigned to the Huron, flagship of the Asiatic
    Fleet, and was made navigator on the Yangtze-Xiang River between Shanghai and Manila. Then, he was sent to San Juan, and
    made an aerial survey in Nicaragua, when young Theodore Roosevelt was governor-general of Puerto Rico.
- speaker: Respondent
  text: Just previous to being transferred again to the Orient, my son was instructor for six years at Pensacola Station in
    aviation.
- speaker: Respondent
  text: Here is a clipping from a Honolulu paper he sent me recently giving an account of Agent Segerstrom having been awarded
    a Gold medal for rescuing Lt. Comdr. A. R. Brady, U. S. N., from drowning on November 17, 1958, at Midair Base, Pearl
    Harbor, T. H. Segerstrom is attached to the Commander's aircraft scouting force. His gold medal is the first to be awarded
    an enlisted man of the Navy since 1932.
- speaker: Respondent
  text: 'It seems my son will command a squad, represented by three planes: Behind him was another officer, and a man who
    handled the torpedoes in the maneuvering flight. My son was first to see that the torpedo carrier was not connected right,
    and as the plane started to fall, he swiftly put on special suit, a kind of life preserver outfit but the other two officers
    failed to observe this precaution and when the plane hit the water of the bay they were instantly killed. This young Segerstrom
    fished my son out, more dead than alive. He had a bad head injury and was unconscious for some time, but they kept him
    at the post hospital for a month, and upon examination pronounced him all right. The accident was a momentous event.'
- speaker: Respondent
  text: The accident was announced over the radio, and I received letters of inquiry and sympathy from all over the country.
- speaker: Respondent
  text: 'Now about St. Michael''s Church: When my father came here in 1852, he brought his mother. Both of them were Catholics.
    There was no priest, but there was a church in Old Town (old Fernandina). The priests who occasionally officiated were
    mostly from Italy and France. They were called missionaries. There was no way of reaching here only on mules through swamps,
    ditches, and dense shrubbery. There were no roads. St. Augustine has always been the head of this diocese.'
- speaker: Respondent
  text: The first Catholic Bishop in this part of Florida was Augustine Verot, a Frenchman, who is considered a wonderful
    scholar. With him were Father O'Brien, Father Claverie, Father Hugon, and Father DuPau, who was pastor of the church in
    Jacksonville for many years.
- speaker: Respondent
  text: Father Claverie came to Fernandina on a mule, and with a long rope tied the animal to a big live oak tree right across
    the street here on Sixth and Ash. Yes, the tree is still there.
- speaker: Respondent
  text: Then came Father John Batasza, Father Spundari, and Father Sartori, all Italians who spent months of their lives in
    Florida right after the war between the States. The first two named priests are buried in the yard of St. Michaels.
- speaker: Respondent
  text: When the terrible epidemic of yellow fever came in 1877 and lasted till 1888, a young priest, Rev. Father Anthony
    Villooyne came to Fernandina, to serve as pastor at St. Michael's.
- speaker: Respondent
  text: When he first came here he was about 31 years of age. He went about ministering to the stricken, without regard to
    creed or color, and did a lot of good, but at last he was also taken with the malignant fever and died from its effects.
    Then a French priest, rather Hugon, came to relieve the sufferers.
- speaker: Respondent
  text: The Episcopalian minister who stayed here during the yellow fever epidemic was Rev. John Thacker. Aswan a native of
    Fernandina, and stayed right at his post of duty.
- speaker: Respondent
  text: I remember rather Villooyne coming to my mother's home right from a sickroom, with the black vomit on his hands, in
    itself sure sign of death from the plague. Terrible times.
- speaker: Respondent
  text: So Fernandina's history is interwoven with that of the churches.
- speaker: Respondent
  text: After rather Hugon, came Rev. Maurice P. Ailey, D. D., who was pastor of St. Michael's. After spending several years
    in Fernandina, he was made Bishop of Tugugaroe, in the Philippine Islands, near Manila. He was a Boston man, and died
    in the Philippines, where he is buried.
- speaker: Respondent
  text: Another of the Italian priests who was much loved in this section in the early years was rather Hotelueio. The early
    missionaries were of the Jesuit order, and following them were the Franciscans.
- speaker: Respondent
  text: During the War between the States I have often heard my parents and an old lady living in St. Augustine speak of a
    Jesuit priest by the name of Hamilton. Father Hamilton was Irish and was a famous scholar who was much revered and much
    loved. He was located in Jacksonville, and today there are many men in Duval, Nassau, and St. Johns county, who bear the
    name of Hamilton in honor of this much loved priest.
- speaker: Respondent
  text: The Right Reverend Bishop John Moore was the bishop of the Diocese of St. Augustine during the Spanish-American War.
    Then we had Bishop Curley, now Archbishop Curley, and our present Bishop, the Right Reverend Patrick Barry, who has done
    valiant work in Florida for the past forty years. He did a great work during the Spanish-American War.
- speaker: Respondent
  text: I must not forget to tell you that state senator Dan A. Kelly is my nephew. He was born in Fernandina on July 4, 1908,
    the son of Daniel A. Kelly and Dora Kelly. His grandfather, the Hon. Patrick Kelly, rendered valuable service during the
    War Between the States. He was the first Democratic senator from Nassau County and held many responsible positions during
    his long career. His grandmother, Christine Bussaut, of St. Mary's, Georgia, was from an old Southern family. When the
    bell of freedom rung in Fernandina, his grandmother, Christina Bussaut Kelly, freed by her own right, twelve colored men,
    the youngest, Paul Robinson, aged 16. The descendants of these slaves live here in Fernandina, and are well-living people.
- speaker: Respondent
  text: Yes, I still play the organ at St. Michael's, especially at funerals and weddings. It is not unusual for the youngsters
    to say, 'Miss Liza, I want you to play at my wedding,' and I always go, wherever I can serve or do good.
- speaker: Respondent
  text: We went to the door, and as she said good-bye, she pointed to a residence across the street, where Martha Reid, a
    famous 60-thirty nurse and wife of ex-governor Robert Raymond Reid, kept house for her nephew for seventeen years, preceding
    her death.
