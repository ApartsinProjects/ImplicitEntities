source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Miss Annie is his wife. She could give you a much better story than I can with all her experiences as a nurse before
    we married, and then, too, she knows as much about my renting business as I do, if not more. She's had many and varied
    experiences since she's been helping me keep our property rented.
- speaker: Respondent
  text: Oh, Ed! You know how busy I am today. You just go ahead and talk. I'll be glad to help in any way I can though. Just
    call me and I'll be right in.
- speaker: Respondent
  text: You'll find that dining table a good place to write on. That table is what I would call a real antique. My grandfather
    Walcott purchased it in 1800, and it has been in our family ever since. I, myself, have eaten off of it 60 years. It's
    solid mahogany, and we have never had to have a thing done to it. Its construction is remarkable; there's not a nail in
    it. An expert spent 4 hours looking it over with a flashlight, and he declared that it wasn't made in America. He should
    know about good furniture for he was apprenticed as a small boy to a manufacturer of fine furniture, and at the time he
    was in our home he was in his 70th year. Practically all of his life has been spent in the furniture business. Another
    man offered me a complete dining room suite, the best obtainable, for this one table. Of course I refused the offer. That
    was in the days when all of us had plenty of money. I doubt if the man who made that offer could pay cash for a loaf of
    bread now.
- speaker: Respondent
  text: Would you like to know the history of this?
- speaker: Respondent
  text: Sure, it's a real pistol. Take it in your hands and see for yourself.
- speaker: Respondent
  text: Well, this was one of a pair of duelling pistols that my father used to keep in a handsome morocco case in his desk.
    After our home burned in 1885, we found this one in the backyard, but we never did know what became of the other pistol
    and the case. This was the pair of pistols used in the duel between Aaron Burr and Alexander H. Hamilton, and the one
    you see here now was the one fired by Burr to inflict the mortal wound. I suppose you remember reading that Hamilton died
    as the result of that duel. The pistols belonged to Hamilton, and were exactly alike, only the other was for a right-handed
    man. Aaron Burr was left-handed. If you held this one in your right hand the hammer would obstruct your sight and endanger
    your marksmanship, but you can hold it in the left hand and sight from the small piece of steel on the right side of the
    barrel.
- speaker: Respondent
  text: 'Now let me tell you how this pistol is operated. It is first loaded with gunpowder and wadded with cotton, then a
    piece of flint rock, just large enough to fit the seat that''s what that part is called, is placed in it on top of the
    barrel. This piece of steel is then fastened over the flint, and when the trigger is pulled it produces a spark from the
    flint, and that spark ignites the powder and causes the explosion. This pistol is of finest steel, and look at that handle:
    It''s mahogany, I''m sure. Now, look closely and read the name of the manufacturer, ''U. W. RICHARDS.'' You remember,
    no doubt, that Hamilton was an Englishman. These pistols are known as the flint-rock type. How my father came into possession
    of them, I don''t know.'
- speaker: Respondent
  text: Talking of buildings, I was born in New College on the Franklin campus of the university. Grandfather was one of the
    builders of New College, and 30 years after it was completed, while the university was closed because of the war, he and
    his family lived there. My mother was visiting them there when I was born.
- speaker: Respondent
  text: 'There were six of us boys, and we always realized what we missed not having a sister. We boys were into everything.
    In my young days all the houses were enclosed with picket fences, and we had our gateposts named ''twelve'' and ''one.''
    When we had been out at night, next morning at the breakfast table our parents would ask us: ''What time did you boys
    come in last night?'' ''Between twelve and one,'' we always answered.'
- speaker: Respondent
  text: We lived on this same street, down there in front of the church. The street was not laid out straight at that time
    like it is now. It was a part of the old stage route from Athens to Dahlonega, and the coaches wound in and out among
    the trees. The road in front of our house was higher than the yard. Father had let mother choose between the Ben Hill
    house and the Thomas house, and she chose the latter. That was where we were reared.
- speaker: Respondent
  text: You can imagine what life around six boys would be like. One of mother's best friends, a fine woman, taught a private
    school in a building erected for that purpose in her yard. That old house is still standing in the yard of that family's
    home. When it came time for us to enter school mother's friend told her that she simply couldn't have the six of us for
    we were so noisy we would ruin her school.
- speaker: Respondent
  text: Well, that didn't keep us from going to school. Father just built a large one-room building on the side of our yard
    and hired Professor Hudson as tutor. He and father had been in the same company in the Civil War, and so father knew him
    well and was satisfied that he was quite capable of teaching six noisy boys. It wasn't long before there were so many
    parents anxious to send their children to our school that father put a partition in our schoolhouse and employed another
    teacher. He was Professor Orr from Martin Institute. Declamation time, as we called it then, was on Friday afternoons,
    and we invited our parents to attend and hear our speeches. At the closing exercises in June, Professor Hudson awarded
    a gold medal to the pupil who maintained the best average throughout the school year.
- speaker: Respondent
  text: Well, instead of us breaking up the other school with our noise, it broke up because all its pupils came over to our
    school. Mother's friend was a wonderful teacher and a fine person in every respect, and we never had the least idea of
    making any trouble for her.
- speaker: Respondent
  text: My father was one of the instigators of the public school system in Athens. The first public school was on Meigs Street,
    and when that old building was torn down in later years, two houses were built from its timbers.
- speaker: Respondent
  text: Father was a great one for raising Jersey cattle, and gave each of us boys a male calf. We rode those calves all over
    town and probably would have ridden them to Sunday School, but mother wouldn't allow that.
- speaker: Respondent
  text: As far as you could see back of our house was in woods, and in the branch about where Boulevard now is, was 'the old
    swimming hole.' We boys went there every day in summer to swim. Bathing suits were unheard of. We just pulled off our
    brown check pants and blue check blouses and dove in. Every boy in town learned to swim in that old swimming hole. There
    was another one on the old Phinixy branch that we loved to swim in too.
- speaker: Respondent
  text: Speaking of clothes, everybody wore cotton checks made in the old Check Mill, in summer. Even my father wore them.
    However, he had handsome broadcloth suits that he bought on his trips to New York. Winter clothes were of jeans, wool
    and cotton mixed, and this jeans was manufactured in the same old Check Mill.
- speaker: Respondent
  text: Those were happy, carefree days for children. Every need was taken care of, but children didn't have money to waste
    like they do now, no matter how much their parents had.
- speaker: Respondent
  text: 'Dan was the name of one of grandfather''s slaves. When he was about eleven years old he accidentally fell into the
    millrace at grandfather''s cotton factory, and his head was so badly mashed that it never grew back into the right shape.
    When he got old enough to work he became grandfather''s coachman. His wife was named Martha, and every Saturday all six
    of us boys would go out to their house for dinner. Such feasts as Dan and Martha did set before us: fried chicken, ham,
    and ash cakes, all cooked in an open fireplace, and if you have never eaten ash cakes you have missed the treat of your
    life.'
- speaker: Respondent
  text: Grandfather was one of the first to have an interest in gold mining at Dahlonega. It was a two-day trip from Athens
    to Dahlonega then, and grandfather made it about twice each year to see after his interests there. His oldest son was
    up there in charge of the work. When time came to go, two horses were hitched to a spring wagon that was loaded with trunks
    filled with bedding and food, and a trusted servant was sent on with it a day ahead of the family. He spent the first
    night at Jefferson, a distance of about 20 miles, and the second night he was scheduled to be in Sugar Hill. For a week
    before these trips, the coachman was busy shining up the carriage and all the silver on the harness. The family left in
    the carriage the day after the wagon set out, and usually overtook it at Sugar Hill.
- speaker: Respondent
  text: 'Some years ago I took mother to Dahlonega for 4 days. I picked her up at 9 o''clock in the morning, then stopped
    by home for my wife and daughter. We arrived at our destination about noon. At 3 o''clock that same afternoon I told mother
    to get ready as we were leaving for home. ''My, Ed, you must be out of your mind,'' she argued, ''you know this is a two-day
    trip.'' ''Anyway, we''re leaving at 3 o''clock,'' I told her. When we were back in Athens and she got out of my car at
    her home, the sun was still shining. Turning to me, she said: ''Well, I never thought I''d live to see the day when I
    could go to Dahlonega and back in one day.'''
- speaker: Respondent
  text: One of grandfather's sons followed in his footsteps as a builder. He was one of the three commissioners in charge
    of the construction of the State Capitol in Atlanta. Did you know that's the only State Capitol in the United States that
    was built within its appropriation? When that building was completed and all accounts paid up, there was a balance of
    $5.60 left.
- speaker: Respondent
  text: I believe I've already told you of some of our boyish pranks. What the six of us couldn't think of wasn't worth thinking
    of. We used to blacken thick ropes and pull them snake-like across the paths in front of courting couples that passed
    our yard at night. Our thick shrubbery made a grand hiding place for us to crouch in while we manipulated the strings
    that made the 'snakes' look more life-like. Once we stuffed a long black stocking and pulled it across the path in front
    of a young Hebrew couple and frightened them out of their wits. You could have heard them yell blocks away. Our parents
    heard the noise and stopped our fun when they learned that we were causing the racket.
- speaker: Respondent
  text: 'Dr. Billups was a fine old dentist practicing at Watkinsville. After his death father bought his dental kit and gave
    it to me. The mahogany case was well equipped for that day and time, and I was just the proudest boy you ever saw. One
    day I was sitting on our front steps looking through the dental case when a neighbor came by. ''Good morning, son: What
    are you doing?'' he asked. ''Waiting for a patient,'' I told him as I held up the dental case.'
- speaker: Respondent
  text: Good! he exclaimed, Come on down to my house and see what's wrong with this tooth that's hurting so bad right now.
    When we arrived at his house, I had him seated in a chair, and in an exaggerated professional style I took a piece of
    cotton from the kit, saturated it with oil of cloves and put it in the hollow of the aching tooth. My patient said it
    stopped the tooth from hurting and he paid me a nickel. That was the first money I ever earned, and from that time on
    the boys called me 'Doc.'
- speaker: Respondent
  text: The height of my ambition as a boy was to carry water on my head like our old cook, Cindy. Way back of our house,
    near the spring, we had a well dug that was 62 feet deep, and every morning mother sent all six of us down there with
    Cindy and John, the gardener, for water. I tried and tried to carry a pail of water on my head, but was never able to
    accomplish this feat.
- speaker: Respondent
  text: We boys played many a day with the old ram that Mrs. Franklin had installed to pump water into her house. Here were
    the first waterworks we had ever seen. She had a slave that did nothing else but stand at that old ram all day and pump
    the water through the lead pipes to her house and gardens. During the war she had those old lead pipes taken up to be
    made into bullets for the soldiers. That old house has been changed quite a bit since then. At that time the entrance
    was on the west side of the house. There was even a porte-cochere for the carriages to drive under. Three rooms extended
    across the front of the house, and now the entrance is in the middle room. The front porch has been added since then.
    Her porch was on the west side and its columns attracted lots of attention. They were put up just as the trees were when
    they were cut down; that is, the bark and stubs of the branches were still on them.
