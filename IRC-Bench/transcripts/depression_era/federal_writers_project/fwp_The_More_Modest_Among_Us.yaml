source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: My grandfather came from England about a hundred and twenty-five years ago. He stopped in Jamaica for some time on
    his way to the United States. There he met my grandmother. She was of Spanish and French descent. They made their home
    in New Orleans, where my grandfather bought and sold cotton.
- speaker: Respondent
  text: My father was born and educated in New Orleans. I have a baptismal certificate showing that he was baptized in the
    Roman Catholic Church. I guess my grandmother must have been a member, as my grandfather was a Free Mason and could have
    scarcely belonged to that denomination. My father received degrees as an M.D. and also as a D.D. He was ordained as an
    Episcopal minister and served as rector of various Episcopal churches for about fifteen years. He finally gave up the
    ministry and gave his entire attention to practicing medicine in Prairie du Chien, Wisconsin. He also did a good deal
    of surgical work. He had a lot of surgical experience in Jackson's army.
- speaker: Respondent
  text: My mother was born in Michigan and was of German and English descent. She came to Prairie du Chien when she was a
    small girl and was married then, in 1880. I was born at Prairie du Chien or, in English, Dog Prairie, in 1884. It is one
    of the oldest towns in Wisconsin and the site of a fort which was built during the Indian wars.
- speaker: Respondent
  text: I had one sister, no brothers. My sister and my father died with diphtheria when I was about a year and a half old.
    Diphtheria killed them quickly in those days. The first thing I can remember was having my throat swabbed with a carbolic
    solution. The memory was clear enough to cause me to recognize the smell and taste years afterwards. Diphtheria, when
    it took a virulent form, was a much more dangerous disease then than it is now. It was not uncommon for the mortality
    to go as high as fifty percent or more. During such epidemics no public funerals were held for those who died of the disease.
    People were afraid of contracting the disease themselves.
- speaker: Respondent
  text: My father left my mother and me a home and about five thousand dollars in cash, also a library of over ten thousand
    volumes.
- speaker: Respondent
  text: I was almost eight years old when I started to school. The diphtheria had injured me somewhat, and in case of measles
    when I was seven kept me from starting earlier. My mother married again soon after I began school and we moved to the
    country. We had a two-room school and two overworked teachers where I went in the country, but I confess that the opportunity
    to learn was much poorer than it is in an up-to-date school. The discipline was, of course, terrible but, aside from that,
    I have yet to see any educational system in which the student does not have to learn for himself anything that will prove
    of value to him. I was fond of reading and probably spent as much time reading in my library at home as did on my school
    work. At any rate, I found that I had already read most of the books which were used in the high school English courses,
    as well as a great number that are never heard of in the high schools.
- speaker: Respondent
  text: My stepfather and I got along very well, though he thought I was too much of a runt to ever make a farmer. However,
    he used to allow me about half an acre of very fertile ground on which I was supposed to make my spending money. I raised
    about four hundred bushels of onions on the ground. I shipped my crop to Chicago and they netted little over ten cents
    a bushel, though they were quoted as selling at a dollar bushel. After that I did my selling around home. The commission
    man probably made fifty cents a level for himself on that little onion deal, and I have never felt that it was a fair
    division.
- speaker: Respondent
  text: My stepfather sold his farm and retired about 1900. I moved to West Salem, a small town near La Crosse. I went to
    the high school at West Salem and, of course, I spent more time on my own out-of-school reading than I did on my school
    work. During these years I read practically all the standard English literature from Spencer's Faerie Queen to Mark Twain
    and Kipling, as well as most of the European philosophers. I was thoroughly stopped by Hegel. It was many years later
    that I discovered that Hegel probably did not understand himself any too well, as the remark he is said to have made might
    lead one to think, 'I never found but one man who understood all I have written and I am not altogether sure that he understands
    it.'
- speaker: Respondent
  text: Probably of more value than the library was Bernarr Macfadden's magazine, Physical Culture. I bought the second issue
    at a newsstand and for many years did not miss a copy. Macfadden never received the credit he deserved for his work. A
    good many cranks used to contribute, but there was much sound information in his magazine. He also began the fight on
    patent medicine frauds years before Collier's, which is usually given the credit. He also wrote a good deal on the value
    of sunshine and certain vitamin-containing foods. Of course, neither he nor anyone else knew at that time why such things
    were of social value, but he seemed to have an instinct which led him to correct conclusions.
- speaker: Respondent
  text: In 1905 I went to the University of Wisconsin. I majored in mathematics for my first degree, but the truth of the
    matter is that I was not very much of a mathematician, though I did later teach a few courses in elementary college mathematics.
    I later received a degree in physics which suited me better.
- speaker: Respondent
  text: 'My first paying job after getting my bachelor''s degree was that of assistant instructor in the physics department
    of the Louisiana State University at Baton Rouge. My salary was eight hundred per year. Ordinarily an assistant is supposed
    to have from twelve to sixteen teaching hours per week. However, there were only two of us in the department and the head
    was more interested in growing sugar cane on a large plantation he owned than he was in teaching. As a result, I found
    that I was getting about thirty hours of teaching and part of it in classes which my chief took credit for conducting.
    Teaching was not at all pleasant that year for in addition to the rather heavy schedule, I gave failing grades to quite
    a number of men on the athletic teams. They believed they should pass because of athletics and I was innocent enough to
    think that grades were given to everyone for their knowledge of physics. A great relief was felt by all when I left at
    the end of the year to take a research assistantship at the University of Illinois. My old chief in Louisiana became president
    of the university a few years later and served in that position until his death not long ago. He used to be rather fond
    of the quotation from Tennyson: ''Knowledge crimes but wisdom lingers.'' Even though he was not very fond of work, I believe
    he made an excellent president and justified his favorite quotation. He knew how to direct the work of others.'
- speaker: Respondent
  text: My work in Illinois was called research in astronomy, but it consisted principally in making photo-electric cells
    and in trying to improve the sensitivity of such cells so that they would be more useful in measuring the light from variable
    stars. Some of the first cells that were made in the United States were made in Illinois just before I came. The astronomer
    used them in estimating the masses of some double stars as well as other measurements of interest in astronomy.
- speaker: Respondent
  text: While I was there, I took two civil service examinations, one for the Coast and Geodetic Survey and one for the Philippine
    Service. In the first I made the second highest mark and in the second I was pretty well down the list. I received an
    offer of $1,100 a year from the Philippine Service, and I left for the islands with forty-eight other men who were newly
    appointed. Some of the men said there were more than a thousand on the eligible list, so the more modest among us wondered
    who was nodding when the list was made for the appointments. It took twenty-eight days to reach the islands and most of
    us probably gained a better appreciation of the size of the Pacific Ocean.
- speaker: Respondent
  text: My appointment called for two years of high school teaching. I was sent to the northern part of Luzon and made my
    first acquaintance with the Filipino. Some of the teachers had trouble and seemed to think them hard to discipline, and
    I am sure it must have been their own fault. Although I never considered myself a very skilled hand at managing people,
    I had only three cases that called for any action during the entire six years I served on the islands. The teaching of
    course in English had the native ill come well in school ability with American high school and college students. The Filipinos
    are generally very considerate and good-mannered people and sensitive to discourteous treatment. One of the most indignant
    boys that I remember to deal with had been sworn at by an American teacher. It took a great deal of explanation to make
    him understand that the teacher had been so wise.
- speaker: Respondent
  text: My contract called for two years of high school teaching. At the end of the first year I was made principal and given
    a two-hundred-dollar raise. At the conclusion of my two-year contract I decided that I had better return to the states,
    so I resigned and went to Manila to make the trip home. It is not good to 'miss too many boats', as they say of Americans
    who have gone seedy from staying too long.
- speaker: Respondent
  text: However, I was offered an appointment as assistant professor in physics at the university at Manila, and stayed four
    years longer at a salary of $2,200 a year.
- speaker: Respondent
  text: During my six years I made trips to Japan and China as well as a trip of a couple of hundred miles on foot through
    the mountains to central Luzon. It is generally called the wild people's country. The wild people are believed to have
    inhabited the islands before the coming of the Filipinos and to have been driven into the mountains by them. Very few
    of them speak either English or Spanish, so I was unable to talk with those I saw.
- speaker: Respondent
  text: Their villages are always built away from the narrow trails which lead through the mountains so that one could easily
    pass by without seeing a sign of them except for the cultivated terraces. These terraces are the most extensive mountain
    terraces in the world. Sometimes the entire side of a mountain is built up into rice patches if there is a supply of water
    which can be led from one patch to another. The terracing is done with wooden tools, as the people do not work iron, though
    they sometimes beat gold nuggets into rings and other ornaments.
- speaker: Respondent
  text: Their fondness for dog feast seems to be the best known of their habits. They have regular dog markets where the dogs
    are brought for sale, and one will frequently meet party with half a dozen or more dogs. The dogs seem to know that there
    is trouble ahead and are tied with short thongs to wooden lead sticks to prevent them from gnawing the leash and escaping.
    They starve the dogs for a few days, then they give them their fill of rice and sweet potatoes. They are then killed and
    roasted whole, barbecued style. The sausage is already stuffed.
- speaker: Respondent
  text: These Igorotes are a small race, probably averaging about five foot in height, but they are nevertheless sturdy. One
    of them carried a trunk for me on a thirty-five mile mountain trip. I made the trip in a day and was very glad indeed
    to have two days' rest at a constabulary station. The little men came in the next day with the trunk which weighed about
    fifty pounds and he was not nearly as tired as I was, though I had carried only a few meals in a blanket roll.
- speaker: Respondent
  text: While going through the mountains I met a couple of missionaries who were also seeing the sights but I suspect, from
    the way I have heard others of their kind talk, that they later told the home missionary societies about the terrible
    hardships they endured. As a matter of fact, the missionaries fare better than the evil service employees, but the latter
    do not feel that they are martyrs and are in fact glad to get the jobs and a chance to travel a little. I know quite a
    number of mission people who served in the Philippines, China, and Korea. They are likeable people, but I insist that
    many of them could have fared as well in any other line. Those in China seemed to have the softest snaps. Nearly all of
    these are engaged in school work. One fellow used to say he wanted two more babies because of the extra allowance which
    was made for those having larger families. I don't think he has ever quite forgiven me for asking him if he didn't think
    there might be more profit in raising pedigreed puppies.
- speaker: Respondent
  text: I did not get to see much of the Moros, the Mohammedans who occupy parts of the southern islands. Like Kipling's 'Pussy
    who made the Moros' 'A first class fighting man,' they gave the American soldiers a very respectable fight before they
    were subdued, even though they were poorly equipped. The Spaniards and the Filipinos had never been able to meet them
    on equal terms. Possibly, the hostility of the Moro soldiers was due to their belief that the surest road to a ringside
    seat in heaven was to die while killing unbelievers. I saw a half dozen Moros walking down a main street and it was very
    evident that some of the Filipinos they passed were badly frightened. They probably thought that the Moros might suddenly
    decide to run amuck.
- speaker: Respondent
  text: The Filipinos apparently do not take their religion as seriously as do the Mohammedans. The Jesuit Church was great
    political power before the coming of the Americans, but that did not prevent the natives from telling numberless tales
    in which the priests were the heroes. It is impossible that the 'good Fathers' should have been in as many ribald adventures
    or should have been responsible for the number of children assigned to them by their woman parishioners. One tale which
    produced great amusement was of a Spanish employee of a large tobacco company, who wrapped a monkey carefully and carried
    it to the priest for baptism. The 'infant' was supposed to be in a dying condition so the rites were quickly performed
    on the veiled monkey. At the close of the ceremony the girl who was carrying the 'baby' tossed it to the chandelier and
    it quickly climbed to the ceiling to the amusement of the priest. As it happened, the priest made a trip to Manila a few
    weeks later and secured some stationery from the offices of the tobacco company. The gentleman who was responsible for
    the monkey's baptism received a letter on the company's paper soon afterwards. In the letter was an account of some of
    his missionary irregularities and the information that he was without a job and far away from home. The gentleman immediately
    went to Manila, thinking he was fired, and tried to beg off. Such a tale would not be relished in Moro Land and it would
    probably be a very brave or very forgetful man who would tell it a second time.
