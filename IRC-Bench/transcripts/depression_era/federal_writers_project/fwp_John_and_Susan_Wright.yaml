collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: Can you tell me about your life and work here?
- speaker: Respondent
  text: You see I cut plenty of soda to lem And Air they come. He stays on in front so you would not accidentally step on
    his lung traps that he had set out in the underbrush. They had the appearance of a machine gun nest hidden in the wooded
    land. Here I carried on my trapping catching coots, possums rabbits, and anything that gets in the way of the traps. I
    stocked after more than twelve such concealed traps like I read from nowhere. You see there is more ways than one to make
    a living. I use good knowledge of all dis wild land, and wild desert wild animals running around, I fix to catch them.
    You know there is a law about trapping, but it is for those that get caught.
- speaker: Interviewer
  text: What can you tell me about your home and surroundings?
- speaker: Respondent
  text: On returning across the track, one sees shanty crudely built, one story high, weather-boarded, standing on cement
    blocks about one foot off the ground. I cut a ditch around the place the water would cover the floor in the house. It
    was unpainted, and covered with old galvanized tin. There were several windows in the house with glasses in them, the
    rusted board shutters. All around the yard and under the house there was debris of all description. A few banana trees
    were growing near the house. On the side and in front was foliage. There were screen doors to keep out insects which were
    plentiful in this low land.
- speaker: Interviewer
  text: Tell me about your family and children.
- speaker: Respondent
  text: The little boy and girl, who were shabbily dressed were peeking in the front door, trying to see what was going on.
    The boy was clad in overalls, and the little girl had on a red blocked blouse with a white dress that was very soiled.
    They both were barefooted with the black much soil caked on their feet. Suddenly they ran from the door and climbed on
    the old automobile sitting in the rear of the house. On coming out of the house I skied them on the car and yelled at
    them, they scrambled down. I said, you see I do old car over dart I use to come by bits by trading demo two goats I had,
    paid 7.50 difference, but I am still in the hole. The man brought one of demo goats back, the rascal beat the man and
    his whole family. You know they will beat you down. He come pretty nigh whiking me when I was taking them to town. He
    gave me a fit in the ditch between here and Lakeland. I didn't think he would cut up after I sold him. In fact I didn't
    tell them how bad he was. One morning bright and early, he goes and brings back the goat. What has puzzled me is, since
    he brought back the goat, he claims I owe him one third the difference. All the morning I have been figuring in this years
    and if I owe him one third or one fourth. I know the fourth is more than the third, maybe you can help me out.
- speaker: Interviewer
  text: How do you manage your animals and farm work?
- speaker: Respondent
  text: I hardly fool with that car cause it kicks like a mule. It takes the whole family to start it, I has to block these
    hind wheels to keep the fool thing from running away. With this quest he cotted, oh well that's what a feller gets for
    being so big. When I had my goats I didn't have any trouble, only the fool things would run away when it rained. They
    tricked me once in Lakeland, it was raining hard and they ran under a house with vegetables, wagon and all.
- speaker: Interviewer
  text: Can you tell me about your jack and how it helps you?
- speaker: Respondent
  text: All of a sudden a peculiar noise like 'He haw be haw' came from out of the air, I said, shut up. I walked around the
    house near the railroad on the south, and there was a Jack in the pasture. He looked up when we approached him. See mister
    Uncle Sams data my life saver, after all of them jimswingers didn't work I found a Jack that would. He can pull a freight
    train and now I go and come from Lakeland without any trouble. He only balked once but on me when I tried to whip him.
    He likes to kick the piece of wagon to pieces, I haven't whipped him since. You see I must get another again. He can pull
    a plow too, ain't as slow as I look.
- speaker: Interviewer
  text: Tell me about your background and family history.
- speaker: Respondent
  text: I was born in Knoxville, Tenn, May 15th, 1877. My parents were George and a in aie a right. I haven't got no estimation
    how long I lived in Tennessee. I know nothing about a cousin, a nasty, and nobody. I lived in Forsyth, Monroe County,
    Georgia, and picked cotton. Don't know when I came to Florida, only been here thirty eight years. My oldest child is thirty
    nine years old, Lillie Mae, brought her here when she was young. How many children I had, you mean how many children I
    know about. I know about eighteen children was born something like that. Now listen mister Uncle Sam, don't push me too
    close, because we can't give count of all dew children. Some born in the woods. Then that is lawful I use to tell about.
    By my first wife Isabella I had ten children. Four eight stolen, I countin them not lawful. I married Isabelle Rwinut
    Lake ark, Georgia. Don't know what year or nothing if I had to be hung. She shared and born there. I married Susan Green,
    right out of a flat house over there to the north.
- speaker: Interviewer
  text: What can you tell me about your religious life and talents?
- speaker: Respondent
  text: I was such a songster that I was ordained. I didn't want it, but they made me do it. Didn't know a word in the song,
    but I could carry a tune. I would come home and pick it out, and after a while I got to know them all. Come out sometime
    and hear me sing them spirituals. It will do you good. You know I can do a little of everything and do it well.
- speaker: Interviewer
  text: How did you learn and support yourself?
- speaker: Respondent
  text: I didn't have any schooling at all, all I learned, I learned since I was ordained for a deacon. My parents died while
    I was young and I had to work. I make a living selling vegetables to Krause in Lakeland. You see I push little music to
    sell, winter goes around. Here come vegetable won't got them today, collard greens, gophers, and etc. I play to the flute
    when I want to sing. If I had few lazy rascals setting trouble, I use to show them how to. I get and go ten k am well.
- speaker: Interviewer
  text: Can you describe your home and kitchen?
- speaker: Respondent
  text: There were several bunches of collard greens tied up ready to take to town. My wife Susan came out from the kitchen
    with several pieces of coon cut up, showing me how fat he and preparing to cook them. She said their meat was good and
    tender. Susan was very quiet and had very little to say. The kitchen was not as clean as the other part of the house.
    There were signs of soot on the walls from the small wood stove in the corner. The pots and pans were black, and the dishes
    were lying around on the table.
- speaker: Interviewer
  text: Can you tell me about your picture and your jack?
- speaker: Respondent
  text: I was asked the privilege of having my picture taken. Calling, 'Mamma, come and take your picture with the Jack rid
    all, so Uncle Sam can send for us, I am ready to go.' The Jack was hitched to the dilapidated wagon, boarded on the side
    to hold in the vegetables. The harness was mostly made out of ropes with a leather strap running beneath for a belly band.
    The lines were heavy rope. He had a piece of holly with red and green Christmas decoration he had picked up in town with
    which he decorated the head of the Jack. Mamma and the two children climbed in the wagon and tried to look their best.
    I tried to look important and the Jack stood perfectly still acting a comedian. After taking the picture I tied the Jack
    to the fence, and showed my artesian well located near the house. This well is plugged and from it I am able to irrigate
    my little farm during the dry spell. I said if I unplugged it the water would shoot fifty feet or more in the air from
    the force of the well.
- speaker: Interviewer
  text: Do you vote?
- speaker: Respondent
  text: I was asked if I ever voted. I said, what's that? After explaining, I laughed and said, you know this is Polk County,
    and that is white folks' business, not mine.
- speaker: Interviewer
  text: Tell me about your diet and farming.
- speaker: Respondent
  text: I only eat two meats. I buy some time fat bacon in town, most of my meat comes from the wild animals caught in the
    traps. I grow all the vegetables we consume on the place. Such as turnip greens, collards, cabbages, beets, onions, radishes,
    mustards, and peas. I like cornbread and plenty of syrup to go with it. At a distance could be seen my cane patch from
    which I make my syrup. I was considered the best truck grower in this section. I will have good strawberries. There is
    one acre set out with strawberries. People put stuff in the earth but they don't know how to get it out, having been on
    relief since you left some years ago. Later you showed the white to do I have been independent of it. As long as I can
    keep them goats and Jack I will be okay. Besides, that Jack is my best friend, anything that helps you to live is your
    friend. Lots of folks don't look at it that way.
- speaker: Interviewer
  text: What modern conveniences do you have?
- speaker: Respondent
  text: There is no radio, electricity, or any of the modern conveniences. My outhouse is a shacky built place with a burlap
    sack hanging in front. I burn oil lamps at night, and secure my hat from old coal pots. In leaving I still insisted that
    you would come to my church and hear me sing. After I work hard all of the week I enjoy myself going to church. We have
    a good time singing and praying. Please come out and hear us.
