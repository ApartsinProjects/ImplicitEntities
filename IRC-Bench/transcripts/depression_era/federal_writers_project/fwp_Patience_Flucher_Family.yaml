collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: I am trained to talk to government people. Lots of white ladies have called and they asked me everything about my
    life and that of the family. I know it by heart now, I even sent home and got a record of the family's birth dates, I
    have them in my Bible.
- speaker: Interviewer
  text: Can you tell me about your family and where you were born?
- speaker: Respondent
  text: Now I can tell you when everyone was born. My brother Green Johnson, born 1897; Ark Johnson, born 1901; my sister
    Fiat Johnson, April 1901. Aileen has two children, Lauvina, born 1914, and W.J. born 1916. They were all born at Jasper,
    Florida. I was born December 1906 at Jasper, Florida. I lived there until I was twenty-two years old. My parents were
    Sam and Carrie Johnson. My father died January 2, 1966 at the age of sixty-six years old. My mother died December 1918
    at the age of forty-two years old. My parents were sharecroppers near Jasper. I was brought up on the farm. I learned
    how to work and do lots of things. I can do hard work and it don't hurt me. I used to hoe and pick cotton. Before I left
    the farm I learned to work for white folks.
- speaker: Interviewer
  text: What happened after you left the farm?
- speaker: Respondent
  text: When I left the farm I went to see Florida. I remember these until 1919. Coming to Lakeland in December of that year.
- speaker: Interviewer
  text: Can you tell me about your marriages?
- speaker: Respondent
  text: I have been married twice. My first husband was Thomas Roux. We married in Jasper. We have been separated twenty years.
    The last I heard of him he was supposed to be living in Manatee, Florida. I had a white man tell me when I was married
    to Thomas to leave him. At that time he was so cruel to me. He said if I stayed I wouldn't be fit for any man. Gibe was
    young. I have been separated from him for fourteen years. I didn't do any better with him. Men back during those times
    had a habit of beating us. They used to say you have to beat them to make them love you. But I was the wrong woman for
    that. You don't have to beat me to make me love you. Since that time I have tried to make it right for the kids. The road
    has been pretty hard at times, but I have been able to pull through hard times by having my family together. We have been
    able to do the best we knew how.
- speaker: Interviewer
  text: What kind of work did your family members do?
- speaker: Respondent
  text: Ellen worked out in service doing days work. Aiming the same was more doing days work, both time she averages five
    and six dollars a week. Evelyn works out in service so, some laborers make four dollars a week. Brother GT works on the
    bar road. Sometimes that work is not regular. Mark works for the city at Lakeland, caretaker for the Oak Hill Burial Park.
    Mark makes two dollars and fifty cents a day. Loutima goes to high school, she is in the eighth grade. I think W.J. is
    in the fifth grade. That W.J. is troublesome. It is hard to keep him in bed at nights. But he goes just the same. I am
    giving him tutoring and shouting, maybe that will be too little labor something. His teacher said he is a high achiever
    in school.
- speaker: Interviewer
  text: Can you tell me more about W.J. and his behavior?
- speaker: Respondent
  text: It looks like the more you beat him the more he tries to do. The other night he started out with the Scout Boys and
    slipped away. His father went to the park where the boys met and there was no W.J. The next morning I heard his father
    asking him how was the Scout meeting. He twisted round and round. Finally he asked him who made the first flag in the
    United States. W.J. said George Washington. Everybody downstairs screamed. After W.J. lied and lied then his father told
    him he was at the Scout meeting. W.J. was so surprised. Then he tells his father that he left from the boys and went to
    the basketball game. Olen is on the NYA, receives a check every two weeks for five dollars or more. I have never seen
    his check. He secures odd jobs when off duty and likes to wear good clothes. Now and then, he gives me something towards
    the rent and food. That's the way we try to live.
- speaker: Interviewer
  text: What kind of work did you do when you were younger?
- speaker: Respondent
  text: When I was in Manatee I used to work in the celery field picking celery. I made as high as twelve dollars and fifty
    cents a week. When I first moved to Lakeland I worked out in service and the highest I made was eight dollars. The last
    place I worked was at Dr. Sullivan's, who lives at Sal S. Boulevard. He was a good man to work for.
- speaker: Interviewer
  text: Can you tell me about your illness and how it affected your work?
- speaker: Respondent
  text: When I was taken sick I was working for Dr. Sullivan. He did everything in his power to cure me. His nurse and the
    doctor examined me good, took blood tests and gave me medicine of all kinds and that did not do me any good. Finally gave
    up. The sore you see on my leg started from an itch and it would go all over my body. At night I would scratch all over.
    Then it started to spread. All this happened six years ago. I had to stop work and come home. I have used everything that
    people tell me to use, been to root workers. Some of them said that I was rooted by someone. Sometimes I think that my
    old man had me rooted.
- speaker: Interviewer
  text: Are you still receiving treatment?
- speaker: Respondent
  text: 'I have someone working on me now. Patience reached under the pillow and produced a card stating this is the lady
    who sends me treatment for my leg. Quoted as follows: You can win health, love, success, and happiness. Madam Jackson''s
    Palmisters Alabama, R 40s Box On. Is my wife true? Is it best to make a change? Will I have better health? Is my sickness
    natural? Will I travel? Am I being watched? Is there a treatment? Should I gamble? How can I succeed in business? How
    can I make a home happy? How can I conquer enemies? How can I marry the one I love? How soon can I marry? How can I make
    anyone love me? Is my investment safe? How should I invest my money? Will I win or lose my case? Have I any enemy? How
    can I control my friend? What is the cause of my illness? Are my partners honest? Am I in danger? Will I ever have any
    children? The outcome of the courts? Is my husband true? See this palmister at once and have these and many other questions
    answered for you. Look for the large hand on the side of the house, Davis Ave, Altier Lane. Patience said this is the
    treatment that I am getting and it is getting me well. She sends me treatment every week. The big sore you see is healing
    slowly—it still hurts when I walk or stand on it a long time.'
- speaker: Interviewer
  text: How do you feel about the treatment and your condition?
- speaker: Respondent
  text: When you have tried everything you have to believe in somebody. Another root worker put me in touch with Madame Jackson.
- speaker: Interviewer
  text: Can you tell me about your son Olen?
- speaker: Respondent
  text: During this conversation Olen came into the house and came directly to his mother's room. He said, I am cold and the
    lady said it was too cold to work today. I have to go down to the WPA office to see the YA supervisor. He went to his
    room and returned dressed neatly in new trousers with creases on, a double-breasted blue coat with a scarf around his
    neck. I bought my suits from an aid outback company, risked cost as forty-nine estate. They will notice lots of birthmarks
    wearing them around the tourist center. Patience said, white folks wanted to take him North, but he wouldn't go because
    he wanted to stay at home so he could look after me. He attended school there. I only went as far as fourth grade. My
    first teacher was Lish Riley. I will never forget him. Isn't it funny you never forget your first teacher? I went to a
    little one-room school built back in the mines. I will never forget the things I saw, little old wild self running around
    now. The children should be better. They have good schools, good teachers. The teachers are there. There is not where
    to know as much as they do now. It was something to be a teacher then. The whole community taken to bits. I wish I had
    the chances the boys and girls live like. I tell my children they better learn to read and write if they can. They are
    young. They will need it as they grow older. Now all they have on their minds is a good time. I had some girl, Orelyn,
    who won't stay home at night. She goes to a party, don't see where she gets it. It don't run that way in my family. Bad
    no one in the drinking. Since they started this just business, it's hard to tell what these fresh girls will do nowadays.
    She had us miss quitting school. As a mother, I see hard times returning for children now.
- speaker: Interviewer
  text: Do you vote or are you involved in politics?
- speaker: Respondent
  text: No, no one votes in our house. My brothers don't think along that line. Where we come from a colored man better not
    look like he wanted to vote, so naturally they do not think about such a thing down here.
- speaker: Interviewer
  text: Can you tell me about Eliza and her work?
- speaker: Respondent
  text: Eliza came in from her day's work and sat down like she was tired. When questioned about her work, she said, 'Mister
    please let me rest cause I have been through something today.' Finally she said, 'I did not go out today. Every time I
    turned around Ole Miss had something for me to do. Believe me she got all the grease out of me today. I was happy when
    the taxi rolled up. They pay my taxi fare. We wouldn't make very much if they did not pay our fare to work. I mostly get
    two dollars a day at some places. I have regular people to go to. I can get all the work I want. The white people know
    me. I happen to put out a good day's work, so they tell their friends and they try to get me to work for them. If I want,
    they tell me what to do, and I do it. Everybody doesn't know how to clean house. You can't take any old thing and clean
    furniture and rugs. You have to know how, then you don't have trouble holding down your job. White folks are very nice
    to me. Some of them I have been working for nearly three years. They stay here year-round. I don't worry about working
    for tourists. I have to live through the summer.
- speaker: Interviewer
  text: What is your work routine like?
- speaker: Respondent
  text: We have to wear uniforms. I wear this blue uniform trimmed in white. It keeps you from soiling so many clothes. I
    usually go to my work at 7:30 and 2 a.m. I'm through my work on one job by three o'clock. The one that I go to tomorrow
    I don't get off until seven o'clock. Sometimes they bring me home. I like that because you lose lots of time waiting for
    a taxi. They don't come when you call them. Eliza said that she had to go to work for hurt now. I have a work washing
    to cut out.
- speaker: Interviewer
  text: Can you describe the house and living conditions?
- speaker: Respondent
  text: The front room of this house is very gracious. It has a stone fireplace in the northeast corner, an old victrola,
    dresser, set in the southeast corner. One long bench given by some of their white friends, and a couple of wicker chairs
    with a wicker table sitting in the center of the room. There was the floor. Next to this room was the dining room with
    a table in the middle of the floor. A small stand was with books and tennis rackets on it. A bongo was located in the
    dining room. Up a small bedroom next to the dining room which is covering on a large dining next to the without strings
    hanging on the wall. The steps leading to the second floor. They are occupied by Green. In it was a double iron bed, one
    chair, and his clothes hung on nails on the wall. There was no covering on this floor. The kitchen was very small, the
    big stove near.
