source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Now, what can I do for you? After I had explained that I wanted to know something of her life and her business experiences,
    she said, "I don't mind but have to talk as I work, for the orders that came in the morning mail are yet to be gotten
    out. Most of them are for flowers ordered sent to patients in the hospitals here. Just come on back in the workroom with
    me."
- speaker: Interviewer
  text: Do you receive much business of that kind?
- speaker: Respondent
  text: Oh, yes. These orders come in almost daily, and I appreciate mail orders. I'm proud of them, for I make they mean
    that my customers have confidence in me. But sometimes the orders simply state the price, leaving the selection of flowers
    to my taste. For instance, here's an order that came in this morning's mail from a woman in a nearby town that simply
    says for me to send a three dollar order of flowers to a friend in a hospital here. When I receive an order like that
    I do the best I can and send what I would want for myself. On this particular order I think I'll send pink carnations,
    for I think they are lovely in a sick room. Anyway, this order is an easy one for the sick woman is a good friend of mine,
    and I happen to know that carnations are her favorite flower. Very often new customers tell us that some of my old customers
    sent them to me. I try to let them know of my appreciation. One especially nice customer has sent me many new customers
    through her connections with several fraternal organizations, and
- speaker: Respondent
  text: this has meant quite a bit of business for me. I had an opportunity not long ago to show my appreciation when she
    lost her brother in a nearby town. A good many orders came in for that funeral, but when she called me and asked me to
    fix her own offering, I asked her if I might make my own selection of flowers and design. She readily gave her consent
    saying, 'You have never disappointed me yet.' I used all white flowers in the casket spray that I sent, and it seemed
    to me that it was a really lovely offering. I wanted it to be especially so, but I was not expecting the many messages
    I received about those flowers. One was from the undertaker in charge of the funeral. He wrote me that they were often
    asked by the families that they served to order flowers for them. He said that all of the flowers that came from my shop
    had been beautiful and that this particular casket spray was the loveliest they had ever handled. He wanted to know if
    I might fill orders for his firm regularly. That request came from a much larger town than this one. She left me momentarily
    to wait on a customer. As I waited, I looked over the little workroom. High stools were placed around the long work table.
    Built-in cabinets held supplies and accessories. Conveniently at hand on a long rod at one side of the table was waxed
    paper, cellophane, and tissue paper to be used in packing flowers for delivery. A supply of tulle and ribbons in a wide
    variety of shades and colors was in a large cabinet with glass doors. A large and very business-like desk was evidence
    that this room was also used as her office.
- speaker: Respondent
  text: The florist was laughing when she returned to the workroom. "Poor boy," she said, "Labia is the third time he has
    been here today to look at those red roses. Tomorrow is his girlfriend's birthday. She will be 20, and he wants to send
    her 20 red roses. Red roses are rather expensive at this time of the year, but he'll get them yet; he went then so bed.
    Last week I had a large order for corsages for a valentine ball. They wanted sweetheart roses. I did have a time trying
    to get those sweetheart roses, but finally I found one place that said they could send me all I wanted, so I sent them
    a large order. It was delivered on the morning of the very day I was to deliver the corsages in the evening. When I unpacked
    that shipment I found a note saying they were sorry that they did not know they were out of sweetheart roses when they
    accepted my order, but they were sending some fine large roses and hoped I could use them. It was too late to try anywhere
    else, and then too I had already tried everywhere. Well, I just had to make the small roses out of the larger ones. Yes,
    you may be sure it was a job, but in this kind of work you come up against all sorts of difficulties. Our orders have
    to be delivered on the very hour, and to get out large orders we sometimes have to work day and night in order to have
    them ready in time. One thing we have to do is to be prompt in our deliveries. We would not last long in this business
    if we failed in timing a few deliveries."
- speaker: Interviewer
  text: How long have you been in the flower business?
- speaker: Respondent
  text: Most all my life, but I have only been in business for myself 14 years. It was a hard pull but I have advanced from
    a very small beginning to the shop that you see now, and don't you think I'm not proud of it. I am more than proud of
    my establishment, although it still means work all the time. Why, I spent all of this morning writing checks for every
    bill that I owe. I meant to do that yesterday, but was just so busy I didn't have the time. To get back to how I started,
    it all came about through my love of flowers. We always grew lovely ones at our home. Father was not meant you would call
    wealthy, but we had a good living and a large two-story home. There were six of us children and while we were still in
    school father lost most everything he had except our home by going on notes for his friends. That has been a lesson to
    me in my business. We children had to stop school and go to work, and that is when I began to realize that we could make
    money out of our flowers. One of my sisters and I worked with the flowers, and we soon cleared enough to have a large
    greenhouse built for the hothouse plants. We planted every available bit of land around our home in flowers. We had many
    things to learn but we kept at it until we did learn and built up a good business. We were both determined to see it through
    and we are both at it yet, although we no longer work together. A few years after we started, we built a swimming pool
    and a dancing pavilion on our place. This soon became a popular resort in the summer months. In addition to those who
    came for swimming and dancing, many picnic parties patronized our place. We kept the pool cleaned out and had it cemented.
    It filled from a large spring. We were making good with it, as well as with our floral business, but when my sister got
    to where she left most of the hard work for me to do, our partnership was soon dissolved.
- speaker: Respondent
  text: One afternoon she was entertaining the Community Club. The boy that worked for us was helping me clean out the pool
    to make it ready for a social group that had rented it for the evening. When we finished scrubbing the cement bottom of
    that pool I was so tired that I sat down on the bank to rest for a moment. Sister came walking up. "What are you doing?"
    she asked. "Resting, for I'm really tired out," I answered. "Well," she said, "if I hated the country as bad as you do
    I'd get out of it. If you don't like this, why don't you get out and go in business for yourself?" That made me mad. I'd
    worked so hard to build up our business, and it really belonged to both of us together, but that's when I decided to get
    out and see if I couldn't do better. I came to town, rented a small place, and a friend went into business with me. That
    made my sister mad for she hadn't thought I really would take her at her word and get out. She did everything in her power
    to stop me. She even told the telephone company that they couldn't install a phone in my name or in the name of my new
    shop. A lawyer that I consulted asked me if the Smiths knew that was the way sister and I had been listed in the directory
    and were incorporated. I told him it was not. Then he said, 'There's no way in the world that she can legally prevent
    you having a telephone in your own name.' So he called the telephone company and explained it. Pretty soon they were there
    to install my phone.
- speaker: Respondent
  text: No, I tied built a sales large greenhouse together, and we owned a car together that we had been using to deliver
    our flowers. In fact, I had paid more on the car than she had, but, bless your soul, I was went up in the air and wouldn't
    even let me use the car to deliver my orders until I could get another one. I've never detested the idea of giving up
    anything that I had started, so the more she tried to stop me, the harder I tried to get ahead with my new business, but
    it was hard. I had to build a new greenhouse that cost me $2,600 and I had to buy another car, for those were two things
    that I had to have if I was to stay in business. Soon I started building my own residence. I would get a little done and
    then would have to stop and wait until I had more money. The contractor would say, 'Just let me go ahead and finish the
    place, and then you can pay us later.' I wouldn't amount to that for I always went to see where I am, and I didn't know
    then, the way my sister was trying to hinder my business, if I was going to be able to keep my shop going. In the fall
    of that year my partner asked me to use some of his money to finish the house so I could move in it before cold weather,
    for I would need someone there to see that the heat was kept properly regulated in my new greenhouse. Seeing that he meant
    right about it, I did borrow the
- speaker: Respondent
  text: money from him, had my house finished, and moved in before time to beat the greenhouse. But, let me tell you right
    now, I paid him back every cent by the early spring of the next year. Since then I have kept on making improvements on
    my home until now I have a lovely eight-room house, modern in every respect except for gas. Yes, it was tough going, but,
    as my partner said one day when I was unusually blue, 'Remember that old saying, you can't keep a good woman down.' My
    people continue to impose on me since I have waited and made good. In addition to improvements on my residence and its
    grounds, I have built several cottages. This might seem to be a jumbled-up story, but you'll soon see the connection in
    the impositions of my family, my cottages, and my business.
- speaker: Respondent
  text: Two young married men work for me. One of them is my nephew. I provide a house, lights, and water for both of these
    couples, and I guess I furnish their coal too, for my coal bill is not less than $17 every two weeks. I pay them good
    salaries too, for our work is not like most any other kind of business on account of the irregular hours. We are compelled
    to require them to be on duty. There are times when we have to work day and night. My nephew is supposed to help me here
    in the shop when he is not busy out at my greenhouse and garden, and I especially count on him to help with deliveries,
    but half the time I don't even know where he is. His wife helps me in the shop in rush times, but I sure do have to pay
    her. In spite of the fact that I'm always doing
- speaker: Respondent
  text: something for them, they do not offer to do anything for me unless I pay them for it. I'm always buying something
    for this nephew's two little children, but he and his wife don't appreciate what I do for them. I pay bills for things
    that I never see. She and the other young men that I hire to work out at my place just do pretty much as they please.
    Why, just let me get in a big rush here at the store and phone out there for them and what do you suppose I nearly always
    learn? They are usually gone fishing or hunting when I need them. They think because one of them is my own nephew they
    are privileged to do pretty much as they please. They even use my cars to make these pleasure trips in and charge the
    gas to me. I guess I'm just too easy on them. I own my business all by myself now. I started out in a very small place,
    and I have had to move twice because I needed more room for my business, for it has grown from year to year, and now I'm
    getting just about all the trade that I can take care of. That sister of mine thinks that I should do more for my kinfolks
    than I do, but I can't see it that way, and, in fact, I don't see how I could do such more for them. True, I don't keep
    any of them in my own house any more. That just didn't work out well when I tried it; we couldn't get along together,
    but I do provide a house for one of my sisters and one for a brother and his family, and I help to feed them. Father and
    mother are both dead, and I am sure that I do as much for the remaining members of the family as any of them do for each
    other, or for anyone.
- speaker: Respondent
  text: All of them think they are keeping up with what I make through my nephew. What they don't know is that I have learned
    not to let him learn about my financial affairs. He takes no interest in the work and in the problems of the shop and
    greenhouse and just will not look after the shop at all. Right now I need to get out and take a trip or a rest somewhere,
    but bad as I need rest I can't afford to leave my business to run itself.
- speaker: Respondent
  text: I told you so; that boy couldn't resist the red roses for
