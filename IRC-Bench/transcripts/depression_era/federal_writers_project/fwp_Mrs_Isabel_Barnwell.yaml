collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: 'We had an appointment at 2:30, and as I rang the bell I peered through the latched screen door and saw Mrs. Barnwell
    writing in the plain, but comfortably furnished living room. It is unusual for any door to be locked in the bungalow,
    and as she welcomed me after unlatching the door, I said: "Oh, no. I learned not to be afraid years ago. That''s just
    that the wind is blowing rather strong today, and the screen stood half open all the time, so I latched it."'
- speaker: Respondent
  text: Well, it has been a long time since you were here, and I have thought of so many things about the old place. She referred
    to her old family home, a Spanish grant in Nassau County, the deed for which has been in the hands of her family since
    1792.
- speaker: Respondent
  text: She seated herself in a comfortable position on the wicker lounge, arranging the cushions about her back and shoulders,
    with her left leg half on the lounge. Mrs. Barnwell is a cripple. An accident to her left knee resulted in a stiff joint,
    so that the limb does not bend while she sits down. This corner is her favorite resting place when she reads or gives
    an interview.
- speaker: Respondent
  text: '"You take the old black rocker, so you can write, and we''ll have it mood old time," she said, laughing.'
- speaker: Respondent
  text: '"I had an old featherbed—my folks don''t like feathers to sleep on, they would rather have inner springs—so I took
    the feathers, got some red spangled cretonne and made new cushions all around. See in the dining room."'
- speaker: Respondent
  text: Sure enough, all the rockers, and there were three of them in front of the wide fireplace, had fat feather cushions
    in both the seats and backs. The family has grown smaller by one in the past year, a beloved son, Woodward, a government
    aviation instructor, having lost his life in a glider accident on Fernandina beach in May, 1937. The dining table is shoved
    against the wall. Three places are indicated for mother, daughter (a stenographer in public work at the Windsor Hotel),
    and the daughter-in-law, Belle, who makes her home here since being widowed.
- speaker: Respondent
  text: '"Yes, Belle is with us now, and we are glad to have her, it is not so lonesome. She is a receptionist—what a new-fangled
    name for office work—in Dr. Spenuer''s private hospital. The government pays her Woodward''s pension of $10.00 a month,
    and she makes $15.09 a week at the doctor''s. Of course, she cannot contribute much to me, but we manage."'
- speaker: Interviewer
  text: I remarked how well Mrs. Barnwell was looking, her eyes bright, and lighting up so readily.
- speaker: Respondent
  text: '"Yes, I have much to be thankful for. No one has ever heard her complain about her stiff knee, although when she
    goes out she has to lean heavily on a cane. My health is good for one of my age, and I feel fine. My son in California
    just sent me a bottle of yeast pills, of a Tommy and I have been taking them for five months or so. They sure do pep you
    up. Vitamins—everybody had gone vitamin-crazy, you know. My son said they helped him, too, he is an old man now, fifty-five."'
- speaker: Interviewer
  text: I concealed a smile by sneezing, and she went on.
- speaker: Respondent
  text: I came near strangling at this remark, as I told her, I was very sorry; that I had never had the ambition to own or
    drive an automobile, hence had never learned to operate one.
- speaker: Respondent
  text: '"I cannot understand how I have reached the age I have and not learned. An automobile is a handy thing. I had the
    opportunity to buy one at a bargain, you know Woodward left me a little insurance. It''s a V-8, right out there in the
    garage in good condition, and if you could drive it, we''d go over to New Hope (name of her plantation in Nassau County)
    right now. It''s early, and we would have plenty of time. My girls do not drive, although they are learning, but are afraid
    in heavy traffic or on long journeys, so when we do go out in it, I have to run all over the neighborhood to ferret out
    a driver."'
- speaker: Interviewer
  text: I explained I wanted some information about her early experiences as a school-teacher, as a comparison with present-day
    educational matters.
- speaker: Respondent
  text: '"My mother and her people, the Gunbys, were educated in St. Marys, Georgia. There wasn''t any Fernandina then; that
    section was only a plantation, belonging to Don Domingo Fernandes. Later Mr. Fernandes set aside a portion of land for
    a town. It was laid out and called ''Fernandina'' for his family. Stephen Fernandes married my mother''s sister, Eliza
    Gunby. They had four children. Mother went to school to Mr. Charah in St. Marys. Aunt shut died and broke. Stephen gave
    his children to my father and mother to raise, and there were eleven of us.'
- speaker: Respondent
  text: '"Mother was the best speller in Mr. Church''s school. She and my father were married November 8, 1830, in St. Marys.
    They came to Fernandina to live. When the children began to be of an age that they needed instruction other than my mother
    could give, a Miss Matilda Seton, daughter of an early settler of old town, was secured as our teacher.'
- speaker: Respondent
  text: '"My father built a house of logs, two rooms near the ''big house,'' as it was called, and this was our family schoolhouse.'
- speaker: Respondent
  text: '"When the boys became larger, my father thought best to place them under a man teacher, so he wrote Lord and Taylor,
    in New York City, with whom he did a great deal of business, to secure a tutor for his sons. In course of time, they sent
    down a Mr. Lincoln, a cousin of Abraham Lincoln. He stayed until along in the late 1800s, becoming homesick. He returned
    to New York.'
- speaker: Respondent
  text: Then father hired a Mr. Base. He stayed a little over two years, but when it seemed war was imminent, he, too, returned
    to New York, where he expected to join the troops. He was my first teacher.
- speaker: Respondent
  text: '"When Mr. Lincoln and Mr. Seise were teaching us children, some of the neighbors'' boys came to school also: Col.
    Cooper''s son, Walter Ossinhman, General Ansgan''s boy, the sons of the Ogilvies (the family kept the drawbridge at Amelia
    River).'
- speaker: Respondent
  text: When my brother, James, was sufficiently advanced through instruction from Mr. Lincoln and Mr. Seise, he went to Harvard.
    My brother John went to a college in Rochester, N.Y., my study sister, Judy (Mrs. Bacon), went to a girls' school at Milledgeville,
    Georgia; my sister Mary went to Athens, Georgia, to a college there, and my sister Florence attended Troy Female Seminary
    in Troy, New York. Miss Frances Millard was then the principal. She later became famous in the Women's Christian Temperance
    Union. She was a brilliant woman, and her school was considered the finest girls' school in the United States.
- speaker: Respondent
  text: There is no doubt she was in advance of her time, and later became a model as an example of women's rights. My sister
    was a graduate of this school.
- speaker: Respondent
  text: '"When the war came on, John was at school in Rochester, Dye Florence in Troy, Terry (or wife) and Judy (Bacon) were
    married.'
- speaker: Respondent
  text: '"John and Florence were terribly alarmed, as lines were closed and they were fearful of getting back to Fernandina
    safely, and it was necessary for them to make arrangements for their return hurriedly. They got in touch some way with
    Mr. Lincoln, their early teacher, and he provided a way through the west, a long tedious route, by which they finally
    reached home in safety.'
- speaker: Respondent
  text: '"When matters became unsettled in Fernandina, with federal gunboats in the harbor, they father took us and all my
    slaves to Middle Florida, Hamilton County, near White Springs, where we lived in plenty and unmolested all during that
    terrible period.'
- speaker: Respondent
  text: '"I just remember, Col. Cooper''s son was named John; the Slocum boy was young Walter; Gen. Finegan''s son, Woodward,
    and the Ogilvies'' son, Uwe.'
- speaker: Respondent
  text: '"A funny incident about Dave, which gave him a nickname he always bore, was when Ian Johnso asked him one day to
    write a composition. He asked, ''About what?'' Mr. Boise said, ''About some thing you know about. Don''t try to write
    about something way off that you have never seen.'' Well, Dave, who was about fifteen, brought in his essay on the ''Cow.''
    He told all he could think of, and wound up with ''None of nudity''s cows is on the list.'''
- speaker: Respondent
  text: Mr. Boise asked him what he meant, and he answered, 'She's down and can't get up, even if she would.' Everybody laughed,
    and after that Dave was dubbed 'Wouldn't if he could, and couldn't if he would.'
- speaker: Respondent
  text: '"All of these boys boarded with us and we also took care of the teacher. The boys came from across the river, some
    as far away as twenty miles, so they stayed with us until each weekend.'
- speaker: Respondent
  text: My father had his eleven children, the Fernandez' four children, and the four extra boys, and the tutor, it made a
    school, nearly twenty. I was young, just learning my ABCs. I still have four picture cards given me as 'Reward of merit'
    for good scholarship at deportment.
- speaker: Respondent
  text: '"As I said, in April, 1861, we refugees to Hamilton County. Miss Starr also taught us. She was a most wonderful young
    woman, well educated, good looking, aged, intelligent and accomplished. As there were no schools in Hamilton County during
    that period, she felt sorry for other youngsters in that section, she persuaded father to let her have one of the negro
    houses which she had cleaned up, whitewashed and made into a very presentable schoolroom.'
- speaker: Respondent
  text: '"My brother, John O''Neill, was a Colonel in the Confederate Army; Charles acted as a Commissariat; Isador was in
    the artillery and took part in the battle of Olustee, and my brother, Colibar, was with the Army of Virginia, Lee''s troops
    in Virginia. D. R. P., who married to Cousin Evelyn Po and Land Dr. Henry Bacon, my sister Judy''s husband, were also
    with the Confederate troops. Their children were with us and had to be educated, so eventually, Sister Florence had quite
    a school, 32 pupils in all.'
- speaker: Respondent
  text: '"One of the girls, a Miss Mary Messily, came from quite a distance away, and she boarded at my father''s house. She
    had a piano, and brought it along, too, so that Florence could give her music lessons, for which service those who wished
    could have the privilege of also practicing on the piano. You see, we had a lovely grand piano in the old home at Fernandina,
    but we had to flee for our lives, gathering what few personal belongings we could gather and the slaves taking care of
    the farming machinery, and sad to say, when we returned after the War, not a piece of furniture was in the house, piano
    and silver gone. So we were glad to have Miss Mosely''s piano in our new home. Music was a delight to all of us, and we
    four sisters used to sing a great deal. My older sister, Mary, had a voice like a calliope. It was wonderful to hear her
    in solo.'
- speaker: Respondent
  text: We kept up with the music of the times, having quite a stock of sheet music on hand, all of which had been sent from
    the music department of Lord & Taylor's in New York.
- speaker: Respondent
  text: '"My mother took particular care of our music, as it was expensive, and when she had sufficient quantities to make
    a bound volume, this was shipped to New York to the same firm, and returned to us, so that it would be better taken care
    of. I have several of these old volumes now, one composed entirely of Jenny Lind''s repertoire when she made her long-remembered
    American appearance.'
- speaker: Respondent
  text: '"But to get back to schools, Florence would gather the children in the neighborhood each morning and bring them in
    for the day, returning them to their homes at night. She kept this up for the four-year varied of the War, and not a cent
    was charged any of the parents.'
- speaker: Respondent
  text: '"Yes, we had the old blue-back speller, and she taught us to read and write well, and of course, we had spelling
    and arithmetic. When we got older, we also learned algebra, chemistry, and she taught the girls music and French. She
    tried to teach me French, but it didn''t ''take'' for some reason, but I learned to speak French readily. I had philosophy,
    and all the higher branches, as we reached the age to learn such studies. We did not have any blackboards, but each pupil
    had a big slate on which we wrote with slate pencils. These have long gone out in the last few years, being classed as
    ''unsanitary'' and children nowadays write altogether with pencils and pens.'
- speaker: Respondent
  text: '"After the war, when we returned to Fernandina, my sister, area soon and my sister, Florence O''Neill, opened a school
    for young ladies in General Finegan''s old home, and taught quite successfully for one year. Then Bishop Lounge, the Episcopal
    Bishop of this Diocese, realizing the possibilities of a well-established girls'' school in this section, came to Fernandina
    and equipped this same old house, the Finegan home, as a select boarding school for young ladies. It was right where the
    school house is today, on the very same site.'
- speaker: Respondent
  text: '"I was about fourteen then; my sister went to Beaufort, S.C. after she married a cousin of my future husband B. W.
    Barnwell and I went with her and studied two years at Beaufort. They had three children, all of whom are living in New
    York City.'
- speaker: Respondent
  text: '"Later she and Mr. Barnwell moved to Abbeville, S.C., and then to Suwannee, Tennessee, where she still taught coaching
    the young men at the Suwannee University. She educated three boys, by getting them scholarships there. One was my son,
    who now lives in Beverly Hills, California.'
- speaker: Respondent
  text: '"She also educated her own children at Suwannee. When she and Mrs. Mason had the girls school in Fernandina, it was
    full of young ladies of other families, who were glad to avail themselves of high class tuition.'
- speaker: Interviewer
  text: Did you ever try to teach the Negroes on the plantation?
- speaker: Respondent
  text: They, we did. If they were interested, we taught them to read, write and spell, but it had to be done surreptitiously.
    I do not know whether there was a state law, or if it was just not considered the proper thing to do, but it is a fact,
    we taught them on the sly, for fear of being criticized.
- speaker: Respondent
  text: Mr. Barnwell, in South Carolina, used to teach his Negroes, when he had any who would study.
- speaker: Respondent
  text: The young people of that time were raised under strict discipline. I remember one day John Cooper, and his sister,
    sea and daughter of General Cooper, now grown, came over on horseback.
- speaker: Respondent
  text: They were dressed in riding clothes, blouse and knickerbockers, and were lounging on the steps of the wide porch,
    when my father who had been riding around the plantation on his favorite mount 'Adelaide' rode up, and saw them. He said
    'How is this? John, you and your sister mount your horses, go home and get properly dressed, and when you come back we
    will be very happy to see you, and have you stay to dinner.'
- speaker: Respondent
  text: This is quite a contrast to the way in which young people get away with manners and deportment now, running around
    in bathing suits, shorts, and what-not, all half naked, and nobody to object by a word, to our heathenish dressing.
