collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: This here is my thirteenth child and before then never had no trouble but I been sick for some weeks then and ever
    since. I just can't get no strength back. We had a doctor tend us this time too meet always. I just has a nigger woman
    to son in.
- speaker: Respondent
  text: I get quite a family. Can't everybody have that many children and there is some women don't have fleas. I have heard
    men say they just won't have any or not here or two and say they knew how to keep fleas from a child but I don't know
    if that's truth. It's against nature anyway and don't seem right as is. Children is a lot of discomfort and trouble too
    but we have to have them and the Lord gives them according to His will and it ain't no use to complain.
- speaker: Respondent
  text: I may have three or four more but it ain't for me to say, the Lord sends them as He sees fit to do. My mother had
    a whole passel of children and why shouldn't I? It's just life.
- speaker: Respondent
  text: My two eldest boys is out working now, seems like they been away from here a long time. Ike is working in the Citrus
    but he ain't experienced as yet and he don't have steady work or make much money. Ben wants to be a range rider but he
    ain't got no horse yet but anyway he's seen here in Glades County hunting work. When they left they thought they would
    get work right off and send money home to me and their paw but they ain't been able to do it yet. I miss them boys a lot
    too and though they is now feeding themselves and food is sure hard to get for such a rissol of children I'd rather they
    be home with us.
- speaker: Respondent
  text: Thirteen children do seem like a heap to feed and raise up but it wouldn't be so hard somehow most of the time if
    Ed just wouldn't drink as much liquor.
- speaker: Respondent
  text: Seems like when he gets a little money he just can't help spending most of it up set livered up. I told you lot, he
    whispered with a scared look upon her thin face, tell I'd sure would be pampas. He is fishing right now but loves to be
    back most any time. When he's liquored up he ain't always in a good nature and he riles up mighty easy like.
- speaker: Respondent
  text: When we was on the relief seemed like the money seems so regular then, though there never was very much but it sure
    helped us. But then I'd just would take most of that money and buy liquor and he drank a lot but he almost always managed
    to get back to the work the next week.
- speaker: Respondent
  text: One time the County Commissioner here was at to see us and said he were agreeing to work the Relief to let me have
    Ed's money or fix it at the store so I would buy the groceries or fix it some way so Ed couldn't get the money but I was
    sure scared to try that. I didn't know what he was talking about and we was hungry right then but told him we always had
    plenty to eat and he said not to do such a thing with the Relief. My, my. Ed went on rampaging about that and I knew it
    wouldn't do for none of us to mess things up like that.
- speaker: Respondent
  text: I ain't never did the buying that way and I didn't have about a way to get into town and wouldn't know 'Nikko' do
    it all if I could. Well Commissioners didn't seem to like it much but I guess he never did 'cotitis' about it cause the
    Relief they never said a word.
- speaker: Respondent
  text: It do take a lot of feed and clothes to raise a family of thirteen children but we get them somehow. They don't need
    as many clothes way out here in the weeds and the weather don't never get very cold and we have always lived this way
    and like it.
- speaker: Respondent
  text: We have us a little garden but Ed don't take much time with it any more and when he ain't doing anything else Ed hunts
    and fishes a lot. Did I tell you he's a fishing today? This ain't no day for fishing, the wind's too high and they ain't
    no fish but Ed, he's passionate and you can't tell him nothing. Weather is the best fishing time and when the red-birds
    sing in the summer you sure can fish the trout in these here creeks and ponds but it ain't much use to go when the red-birds
    ain't a singing.
- speaker: Respondent
  text: My paw had a big family and Les Paw did too. Yes ma'am, we was both reared right over in Hardee County, near a place
    Okeechobee, right near the Highlands line but it used to be called De Soto County in them days. We knew each other from
    the time we was children and we married right there too and we haven't never been out the State.
- speaker: Respondent
  text: I got married about twenty-two years ago I believe it is but I ain't real sure, I kind of forget the time. I'm thirty-nine
    now but I look older than that. Folks say that's because I had so many children in so short a time that I'm proud of my
    family even if I do look old. My husband is now let me think, he must be nigh on to forty-three but I ain't sure of that
    but I know he's older than me.
- speaker: Respondent
  text: We was both raised on farms and we had some cattle too, my paw did and I thought we would raise cattle and have a
    big farm but he just never would seem to get a start. He would them up every late mass days, guess I knew he drank a lot
    when we married, but nobody never thought much about it then. When all the children started a coming, it seemed so fast
    and times get so bad with us is when his drinking seemed so bad to all of us. Ed had several jobs as a range rider and
    helping on farms in other places around here but somehow he just never got on.
- speaker: Respondent
  text: Neither of us ever been out the State and we don't want to go neither, it might be a different way up yonder. We haven't
    been away from this part of the State but we lived in several counties before we come here. For a while after we married
    we lived at Prowsville but it looked like we just couldn't settle on there, so we went over in De Soto County and lived
    there a long time, guess most of my children was born there.
- speaker: Respondent
  text: We got work on farms around there but we didn't get no better start for ourselves and so after a long time we went
    down to Glades County and I worked on some cattle ranches part of the time. Me was a range rider for a little while but
    his horse died and he just never could get another one and so he just kind of drifted around doing most any kind of work
    and started liquored up most of the time. Then we got over here in this County and here I hope to stay. I like it here
    living way out this way don't no folks pester us much and it's nice and quiet all the time.
- speaker: Respondent
  text: I ain't never heard such talk of where my folks come from, she said, we never thought such about anything like that
    except just being born and raised here in Florida. But my paw did sometimes say he thought his family must have come from
    England because he loved to farm and always wanted a big country farm house with lots of horses and barns and some such
    like. Most all of us was fair with blue eyes and light hair too and meant that like the Mulish people best spoke of farming
    and Alice said with some show of pride.
- speaker: Respondent
  text: My paw was a very good farmer too but he never got within for his crops seemed like. He sure could raise potatoes
    and corn and beans and much but we never cared much for green vegetables ourselves.
- speaker: Respondent
  text: He could be a good farmer if he'd stay off the liquor and work his farm but he don't do much with it.
- speaker: Respondent
  text: We never did neither of us go to school much but we read a little and I can sign my name, she stated proudly. These
    days there aren't so much schooling way out in the weeds like we lived and it wasn't handy to get to the schoolhouse regular
    like. I just went a few weeks at a time when I wanted to, maybe I went as far as what the third grade is now but I ain't
    sure. I didn't take much to it and neither did he.
- speaker: Respondent
  text: When we went to school everybody was in one little room and there wasn't many children either and one lady she learned
    us. We carried any books we had and did the best we could, I guess. Sure is different in these days the schooling is,
    ma'am. Why, in the school over yonder in the village seems like they got a different teacher and an extra teacher for
    every year the children is in school. They learn a lot too that we never was taught in our schooling. Seems like they
    be knowing a lot they never know at home such as skinning and house cleaning and such. If they just learn a child to read
    and write good that's all I want and all they need to know.
- speaker: Respondent
  text: They might not even need that much especially the girls, for why does girls need so much education? I ain't never
    had no use for the reading and writing I learned, I been too busy a raising a family and cooking and a sewing to do any
    reading. There is some people reads books and papers, I seen them in the stores too.
- speaker: Respondent
  text: Well, ma'am, maybe there is a reason why there is teaching some queer things in school these days besides just education,
    but I don't want to make my children take nursing.
- speaker: Respondent
  text: All the children is in school now except Ike and Ben and these here four little Max lugs you know, they all be under
    six years old and don't go yet. Bill there, he'll be six next spring and I seen him start at a term recently, it always
    a rampage to go with the other children because he don't know what it's like yet. I expect when time comes he'll go no
    better than me and his paw did. He seems so much like his paw with a high temper and rampaging and a fuss a lot of the
    time. Ed always was a tad mean in 1946 and he never took such so solemn.
- speaker: Respondent
  text: There was no regular and dependable income and never had been in all her married life as Ed just could not be depended
    upon to work steady and leave liquor alone.
- speaker: Respondent
  text: We been in right good fortune with our health, I guess, remarked Alice when I mentioned how well the little boy looked,
    none of this whole passel been sick much. Sometimes one of us has a hurting tooth and mom's folks say they ought to have
    these teeth tied up but we never did that. When this tooth got loose and ready they come out alright and it do soon. Nature
    is tooled with less. Just pick a hurting tooth with snuff, if it gets a below its bit, or ill it just hurt without no
    bad place. Pick the snuff on the gum and it'll soon stop a hurting. Sometimes showing times, that's been skewed some till
    its kind of set does better.
- speaker: Respondent
  text: I keep swine easier all the times but don't never use it such.
- speaker: Respondent
  text: One of the little sunshine was little then, started eating dirt and dried mud and her stomach would swell up and Ike
    would cry awful. Water didn't seem to do no good neither. There a nurse was with and said she had seen kind of worms,
    I just remember what kind and Ike got a treatment and give Amato and she's been all right since.
- speaker: Respondent
  text: We don't spend no money for doctors for we ain't got none to spend that way. What little doctoring we done the doctors
    don't charge us. I guess they know how poor we is. That little money we get, it all goes for feed whatever. We don't spend
    in getting liquored up.
- speaker: Respondent
  text: I ain't never handled the money and I hardly ever go to a store. Even when we had money for dresses, I did not buy
    it. Having so little all the time I just don't know how much it would take to take good care so I ain't thought much about
    it one way or the other because I don't see no chance of getting any more. Seems like though if we had a dollar a day
    we could be real sure of and none of it went for liquor we could get on fine with the garden and hunting and fishing.
    Maybe we would have some clothes too fit to wear then, but I ain't sure about that.
