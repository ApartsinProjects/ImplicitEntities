collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: If any body's ever knowed the Lord and then went out in sin again they's sure to come back to Him sometime, that's
    what Pa always preached and I believe he was right.
- speaker: Respondent
  text: You take the pitcher shows now, I don't believe there's no sin them, and didn't the Lord make wine, so why do the
    church folks think it's a sin to drink it? I know the Bible says when you drink strong drinks to stay inside your own
    gates but it don't say not to drink it.
- speaker: Respondent
  text: Do you think anyone could be happy without religion?
- speaker: Respondent
  text: No, I don't. I don't see how anybody can go to bed and sleep if they ain't right. I know I couldn't sleep if I weren't
    right with the Lord.
- speaker: Respondent
  text: About sin, the Bible says that he who committeth sin is of the Devil.
- speaker: Respondent
  text: Then we are all servants of the Devil, even you, Mama, and I know that you are going to Heaven if anybody is.
- speaker: Respondent
  text: I try to do the right thing and I hope so.
- speaker: Respondent
  text: I know one thing. I ain't no hypocrite and I don't pretend to be so methin I ain't. Them the kind of people I ain't
    got no use for. Tryin to tell you what to do when they don't do the right thing themselves.
- speaker: Respondent
  text: Yell, Virginia, you would be better satisfied if you went to church more.
- speaker: Respondent
  text: I intend to have some fun before I die and I ain't going to make out like I'm a Christian cause I like to go to dances
    and parties, and I am going to the show whenever I get ready to.
- speaker: Respondent
  text: Why, the people in a certain church here in Princeton don't even use wine for the sacrament.
- speaker: Respondent
  text: If they start using it, tell them to use blackberry cause it's the best.
- speaker: Interviewer
  text: What church do you belong to?
- speaker: Respondent
  text: The Baptist, and I believe they's the only church that reads the Bible right. I always did believe that the Bible
    means just what it says and they don't try to change it around to suit themselves.
- speaker: Respondent
  text: Then the day of reckoning comes, I don't want to have to answer for changing the word of God. I try to do unto others
    like I want to have 'em do to me and I believe that Jesus died to save me from sin. Faith without works ain't worth nothin
    and works without faith ain't no better so I try to have both.
- speaker: Respondent
  text: My younguns don't take to church going much but I reckon if we had a good Baptist church here where we could go it
    would be different. We have to go to the Methodist and Nazarene and they don't like it so I don't make them go.
- speaker: Respondent
  text: Four kids ain't had much chance to go to school, but it don't seem to make much difference nohow cause there's plenty
    of folks that's had good schooling. That's all for as we are. Can't nobody see or get any work to do and times are hard
    with every one. I want John to go on to school, though, as long as he can. It does seem that folks who have been to school
    get along in some ways better than others that ain't had a chance to go. They know how to talk and figure better.
- speaker: Respondent
  text: We eat lots of beans, rice, grits, syrup and biscuits. Beans don't agree with me and the boys buy me vegetables when
    they can, but the beans are good for them and are as cheap as anything we can get. Now, that John is helping in the packing
    house, he brings home tomatoes and we have them stewed. When I can get squash I always eat a lot of them. The doctor told
    me that there weren't nothing as good for high blood pressure as squash. I stew them and then pour milk over them.
- speaker: Interviewer
  text: What do you season them with?
- speaker: Respondent
  text: Nothin, not even salt, but the boys add a little salt to theirs. Salt is bad for me.
- speaker: Respondent
  text: I am a Democrat and vote a straight ticket. I am a Southerner and couldn't do nothing else and feel right about it.
    All of my folks have been Democrats and I have always voted till last year. Somehow or another I just didn't get around
    to it last year.
- speaker: Respondent
  text: At night, Sarah and her family, the neighbor and children, all gather around a huge bonfire in either Sarah's front
    yard or the neighbor's. The older members sit and talk while the children romp and play. The fire burns high every night
    when the weather is cold, and laughter is heard as one drives by.
- speaker: Respondent
  text: I have no time for visiting and such. When I get through with my own work, the week is almost done and I have to rest
    some time. Two days I go to help Minnie Dell, my daughter who married the merchant, I help her with her house work and
    ironing and then it takes me two days to get my own washing and ironing done. I piddle around the house the rest of the
    time and I don't get much time to visit. Virginia ain't helped me much with the house since she started to quilting, I
    been right surprised at her I didn't think she'd stick to it like she does. Why, she's almost got one quilt pieced.
- speaker: Respondent
  text: I don't know what makes him so hateful, says Sarah. He hires other boys to work in the stores all summer long and
    then in the winter when he needs extra help he wants my boys to help him. They've worked for him every winter so far but
    they say they ain't going to do it any more. I don't know what we will do, but I ain't going to make them work for him
    if they don't want to. They're good boys and I ain't going to have anybody treat them so mean. They have to have a little
    pride to get along.
- speaker: Respondent
  text: Columbus tried to get W.P.A. work to do but Bill went and told them that he offered to give him a job and that he
    wouldn't take it so of course Columbus couldn't get on. Bill has all them stores but he low. a nces Minnie Dell. She has
    to make fifteen dollars a week buy their groceries and pay the milk and paper bill as well as buy their clothes. The only
    thing that Bill loves is his money and the baby, Little Minnie Dell. She can make him do anything she wants to.
- speaker: Interviewer
  text: Are you looking forward to a good time for the coming holidays?
- speaker: Respondent
  text: I don't guess we have much of a Christmas this year. If I make a cake that'll be about all the extra we'll have. It
    don't look like boys can both ever it work at the same time. If they could, we could have a little extra but it looks
    like when one of them gets a job the other one always loses his. That's the way it goes.
- speaker: Respondent
  text: When the children's want for so much but he's well and fat as a daddy was able to work, we never had to. He's been
    in the hospital for over a year now and will ever be able to work again. Whole hog but he can't move his legs. No, he
    know what's the matter with him, he's well and eats anything he wants but he just can't walk. I would have him at home
    if I could get a wheelchair and had a house with a bathroom in it.
- speaker: Respondent
  text: Virginia don't want to get married until Sam is out of debt. Bill tells her that Sam ain't never going to marry her
    or he would have done it before now. He thinks that Virginia and Sam have been going together too long.
- speaker: Respondent
  text: Virginia's first husband was in debt when they got married and he never got out the whole time they lived together.
    Sam has just finished paying for his car and he owes a few other little bills that he's going to pay before Virginia'll
    marry him. She says that she wants to use what money he makes for things she wants and that when he is married he won't
    have to pay his mother board and then they will have enough to get along fine. In a way, I think she is right, don't you?
- speaker: Respondent
  text: The boys came in at that time and Sarah had to go warm the food for their supper so I left and Sarah went into her
    dark kitchen. I have been unable to report on the back room off the kitchen. When one of the family entered or left this
    room they always pulled out and closed the door quickly behind them.
