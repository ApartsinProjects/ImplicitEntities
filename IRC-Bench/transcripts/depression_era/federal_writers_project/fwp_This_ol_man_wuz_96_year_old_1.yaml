  text: Lots er folks they don' b'lieve in sech ez speerits. Do say they ail:0 rightly kin see 'em now'd ays. Say well uh,
    nit north, oain' see null hear 'em noways. They ben laid. En do say they cain' travel this a far ways. Do be s' oold en
    yoU know they oain' git used t' that. See'd erplenty on 'em in mah time. Down south, you know. Me'n Jay M. en George en
    Lee Roy we'd be eroomin' home wid er passel o' squirrels er mebbe rabbits 'tmight be en jes' er whoopin' en erhollerin'
    en er raisinfloain. We am' be studyin"bout nuthin en you know we'd be van' pas' er point o' de woods en we hear so methin'
    eroallin' jes ez clear ez er bell. Heard it many a time en called us each by name. Sure wuz er purty soun' en it echo
    er long time. En which we'd er rather ben bit by er snaggletooth rattelsnake than answer call like that. Speerits eroallin'
    like that an 'twould mean we goin' die soon would we answer or pa, it any min'. Yes in deed. Sometimes we come home f'um
    visitin', sr church msetin', you know, en it'd be er starry night an moon bright'n up de, fiel's, en make 'em look like
    er shinin' river. Et it do seem like a body oain'thear nuthin' oep'm still green corn a rustlin'. Say well uh ifin we
    stan' en watch uh time like that or pale white houn' it come out like er ghos' en cross d' fiel's en disappear. 'Twere
    always far away cross de fiel's. You know that er speirit nuthin' but er restless speerit.
