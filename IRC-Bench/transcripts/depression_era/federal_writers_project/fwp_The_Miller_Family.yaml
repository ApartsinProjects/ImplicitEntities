source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Interviewer
  text: How are you today?
- speaker: Respondent
  text: Fine. Bob isn't at home, he went to see a man about painting a picture in his hotel. This time of year is the busiest
    for him and he is gone most of the time.
- speaker: Respondent
  text: Last night Bob and I went to the show. We very seldom go out but Bob did not work last night so we decided to spend
    the evening by taking in a movie. We saw Spencer Tracy in Loy's Call and it surely was good. Both of us like him very
    much. Bob likes to see the Dead End boys play, too, and never misses a picture they play in if he can help it. I like
    to go to the show but, of course, you know I prefer something with more action and exercise than you can get at shows.
    They are too tame for me. I play baseball nearly every Wednesday night, badminton two nights a week, and basketball once
    a week. Every afternoon I go over to the park and play tennis a couple of hours. That keeps my weight down and I have
    to do something all the time so I won't get too fat. Bob says when he was young, fat girls chased him and he had a horror
    of them, and here he has married one.
- speaker: Respondent
  text: If we could only have our own home it would take more of my time to keep house. As it is, I have the apartment all
    cleaned in two or three hours, with too much time on my hands. I would like more than anything to have two children, a
    boy and a girl, but Bob doesn't want any. He says he can easily take care of the two of us, but if we had any children,
    he would be tied down too much. He wants to be able to pack his clothes and leave any time he takes the notion. Of course,
    you can't do that way with children, so he is set on not having any. If I could only persuade him to buy a home, then
    we could soon get it paid for and settle down for good. If I could once get the home, I think after a while he would be
    willing for us to have two children. I don't believe in having them if you can't take care of them properly and give them
    the advantages of a good education and a happy childhood, but I feel that we could do that without any trouble.
- speaker: Respondent
  text: I am the only child in my family and I am 27 years old. When I was fourteen my father died. He left us a home but
    no ready cash so my mother started giving dancing lessons to take care of us. After a while my mother met Mr. Atkins,
    and they got married. He is a contractor, and a very wealthy one, too. I got married not long after they did so don't
    know him very well. For two years Bob and I lived in the northern part of the state, but three years ago Bob decided he
    would get more work to do if he came to Miami, so we moved here.
- speaker: Respondent
  text: Bob has two brothers and two sisters, and he is the oldest. He is quite proud of his ancestry, too, especially the
    artistic ones. His grandmother on his mother's side was a short-story writer. She wrote some of the most weird stories
    I have ever read. All of Bob's people are from the North. His father played around with machinery as a hobby, and has
    made some very valuable inventions, although they were never patented. He used to be an airplane test pilot, too. One
    day he was supposed to go up in a plane, but when it started to take off, he suddenly decided he wouldn't go up this time.
    He said he had a funny feeling he shouldn't. So another pilot took the plane up. It crashed and the pilot was killed instantly.
    Bob's father died right after we got married and we surely did miss him. Everybody was crazy about Bob's mother. She is
    a very fine music teacher. She plays nothing but classical music and for many years she added to the family income by
    teaching. She graduated from high school when she was seventeen years old, went to college two years, and started teaching
    French in a high school in Massachusetts when she was eighteen. She has accompanied several of the outstanding radio stars
    of today.
- speaker: Respondent
  text: Bob is restless here and wants to go back North because he thinks he can make more money there and I think so, too,
    but I don't have the money ahead to leave here now. He makes about $12,000 a year down here, but the work only lasts about
    six months of the year. We have to budget ourselves so this will last a whole year and that's hard to do. It's so easy
    to spend it when you have it and I guess we are not as foresighted as we should be.
- speaker: Respondent
  text: I suppose that should be enough for us but we have just finished paying for our car, and I am glad it is our own now.
    Bob has to have a car in his business so we bought a good one while we were at it. Besides, a Chrysler has always been
    his favorite of all cars. Out of this $2,500 we have to pay rent, which is a big problem here in the winter especially,
    light and gas bills, buy groceries and clothes. We feel that we must have a nice apartment at a good address but sometimes
    during the summer we are so broke, I'd like to have some of the rent money in other things.
- speaker: Interviewer
  text: Where did Bob go to school?
- speaker: Respondent
  text: He graduated from high school up North. His father and mother liked to travel and they came to Florida nearly every
    winter. Of course, all the children had to be taken out of school there and started in down here. Bob says he really got
    his education from practical experience. His great ambition and desire has always been to be a second Rembrandt or Lookwell,
    so he has studied art all of his life. He says that every night for years he sat up until three or four o'clock in the
    morning reading books on art and making sketches. Bob never attended any art school or took any lessons. All he knows
    he has learned by himself for his parents never really helped him but he set his head and nothing could stop him. A friend
    of his, an old man who is also an artist, was very much interested in him and encouraged him to keep at it.
- speaker: Respondent
  text: I graduated from high school myself but didn't go to college. When I was twenty years old, I got married instead.
    I have traveled quite a bit and have been all over the North. I lived up North some when my father was living, but I met
    Bob in Florida. He is a born artist and some day I believe he will really be famous. He is proud of his work and I am,
    too. Unlike most other artists, if his work is slack and he can get something to do in another line, he won't take it.
    He will wait until something in his line comes up, regardless of how badly we need the money.
- speaker: Respondent
  text: Lots of times when Bob is at work I sit home and read or sew. I have a library card and get books from the library
    here at the beach. Then I read magazines, too. I always buy the Lal magazine because Bob uses pictures out of it in his
    work. And I keep up with all the gossip about the movie stars, too. Bob is too serious and ambitious to spend much time
    reading books of that sort. He always reads books on art or mythology, or some such subject.
- speaker: Respondent
  text: Sometimes he reads detective magazines, but usually he spends his time reading books that will teach him something
    and do him some good. Bob doesn't like to go out much when he is working but spends his leisure hours at home reading
    a book or sketching. We go more in the summer time when he doesn't have much work to do, sometimes he plays tennis, his
    favorite outdoor sport, and he likes to go swimming, if the water is rough. When we go out at night, sometimes we go bowling,
    play miniature golf or some other game.
- speaker: Respondent
  text: One of Bob's favorite sports is sailing and he wants a sailboat about as much as anything else. He used to own one
    and he says some day he is going to get another one. I suppose we should save some of the money we spend on good times,
    but we both like to go out so much that it is hard to do.
- speaker: Respondent
  text: Bob is interested in sculpturing, too. He makes a hobby out of this, although he has designed one or two statues and
    made models of them, which he has sold. In fact, his whole life is centered around art of one form or another. He sees
    art in everything, but he doesn't paint portraits much. One or two people have asked him to paint theirs but somehow that
    isn't in his line. He just finished an oil painting for a friend in New York. This friend is a tailor and in return for
    the picture he sent Bob a tailor-made gray suit and for Christmas he sent me a tan one.
- speaker: Respondent
  text: I like to crochet. For Christmas presents, I made five crocheted pocketbooks for my family and friends. Sometimes
    my eyes bother me and I have to stop. I really need new glasses; mine are broken, but I don't have the money to get them
    right now. And I hate to put them on, too. They are such a bother and so unbecoming to me. I have just finished making
    an afghan that I think is very pretty. These chair-back sets on the chairs I crocheted too. Several of the pieces you
    see on the tables I made. Sometimes I embroider but I don't really care for that much.
- speaker: Respondent
  text: Even though we don't have any children, we had a cat we called our child. His name was Tabby. He was just a plain
    cat but unusually large. Bob and I got him right after we were married and both of us had become very attached to him.
    We called him Mutt most of the time. I bought special food for him and never fed him anything I wouldn't eat myself. There
    was one special chair he liked to sleep in, so I made a cover for it and he spent lots of his time in it. On Christmas
    I always gave him a present, the same as I would a person. But a couple of weeks ago he got sick and we took him to the
    doctor. He finally told us there was nothing he could do for the Mutt. I don't know what was wrong with him, but the doctor
    said the only thing to do was put him to sleep. So now our Mutt is gone and we have made a resolution not to have any
    more pets, we become too much attached to them. Bob petted Mutt so much and he misses him as much as I do. Guess it's
    the thwarted parental instinct in both of us. Everywhere we turn we see things to remind us of him, and then we realize
    that he is gone for good.
- speaker: Respondent
  text: The tears start streaming down Hazel's cheeks and I realize how much they did love the cat, as much as if it were
    a human being. In order to get Hazel's mind off of her sorrow, I ask, "Do you like to cook? What kind of foods do you
    eat?"
