collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: At the age of four years he was struck in the eye with a sling-shot stick, the right eye affected the left, and in
    a month or two he was totally blind. This did not prove a hindrance to his education, however. For ten years he went to
    school, stopping only when a nervous breakdown made it imperative.
- speaker: Respondent
  text: His first work was that of an instructor for the blind in Luskow, S.C. He received $45 a month then and in South Carolina
    was as much as $190 now and in Jacksonville. Like the average worker in the middle class, he has had to reduce his scale
    of living.
- speaker: Respondent
  text: He considers $100 a month an adequate income. He added that being blind makes it rather expensive, as he must pay
    for so many things that ordinarily he could do for himself, were he able to see. For example, when he has to go to a part
    of the city that he is not familiar with, he must ride or pay a guide.
- speaker: Respondent
  text: He takes pride in his work, feeling that he is helping his fellowmen. He teaches them to make a livelihood, and at
    the same time, having something to do, prevents them from becoming blue quite so often. He said, 'No matter how long you
    have been blind, you never become quite accustomed to it and you are inclined to be spasmodically blue.'
- speaker: Respondent
  text: He votes and votes a ticket as he chooses.
- speaker: Respondent
  text: He quite naturally feels that religion influences the morals greatly in the right direction, as he is a minister,
    this is to be expected.
- speaker: Respondent
  text: When it comes to amusements, his attitude is rather broad. Although he is unable to do the things we do like dancing
    and the like, he feels that a person is entitled to what he likes and the matter is to be settled between him and his
    God.
- speaker: Respondent
  text: He attends church regularly and does not ask aid from the church ever. His health is very good, so good that luckily,
    diet plays no part, as being unable to do for himself, he eats what is put before him, balanced diet or not.
- speaker: Respondent
  text: The one room that he rents was very clean. He had cleaned it himself, he said.
- speaker: Respondent
  text: Time on his hands is a luxury, when he finishes his work, if he does not go to church to a program or just regular
    services, he has quite a few friends that he visits. They are not all blind, either. Some of the outstanding ministers
    are quite fond of him.
