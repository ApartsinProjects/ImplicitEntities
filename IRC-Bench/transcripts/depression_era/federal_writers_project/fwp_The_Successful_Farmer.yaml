collection: federal_writers_project
source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Mr. McMurray is tall and portly, with white hair, faded blue eyes, and a face which is crease-creased with wrinkles
    and deeply tanned and roughened by the sun, wind, and rain of eighty-three years. His grayish eyebrows hang over his silver-rimmed
    glasses. It was an effort for him to get up from the chair as he is badly crippled in his right leg from the waist down.
    He hobbled to the door saying, "Well morning," and before I had a chance to state my mission he added, "Now if it's something
    you want to sell, young woman, I'm not interested, and don't have the money to invest in anything. I don't need much now,
    for I isn't see good like used to."
- speaker: Respondent
  text: After I had explained the object of my visit, he invited me in. "Come in, won't you, or had you rather sit on the
    porch? But if it's all the same to you we'll sit here in the hall, 'cause the sun hurts my eyes. You'll have to excuse
    the house; the women folks are cleaning house and have everything torn up."
- speaker: Respondent
  text: There was a loud noise in the back of the house, and asking to be excused "a minute," he called out, "Rue, are you
    moving that Frigidaire? You go careful. If you jar some of the electrical parts loose it will cost me several dollars
    to have it fixed." The noise stopped and a Negro boy and an older Negro went into a room down the hall and came out carrying
    an old-fashioned dresser.
- speaker: Respondent
  text: Mr. McMurray said to the woman who made her appearance about that time, "What in tarnation are you going to do with
    that dresser?"
- speaker: Respondent
  text: '"Taking it up the stairs," she replied.'
- speaker: Respondent
  text: '"What for?" he wanted to know.'
- speaker: Respondent
  text: '"I assume there is no sense turning two dressers in one room, and there is nothing as up there." Nothing more was
    said and he resumed his conversation.'
- speaker: Respondent
  text: '"Now, just to tell you the truth, I don''t know anything about legends so noted with Athens or any place nearby.
    All I ever heard connected with Athens was when the Yankees came through. A man who was in the crowd at that time told
    me when the Yankees came through here a band of them began to steal everything they could get their hands on, as well
    as molested the women and children. Our boys caught the ringleader of the gang, hung him up by his thumbs in a clump of
    woods on the other side of town, and the others got away."'
- speaker: Respondent
  text: I heard the one he called Bus sell, "Sister Ruth, have you put your resume cleaner up?"
- speaker: Respondent
  text: '"Well, let no use it for a while."'
- speaker: Respondent
  text: The noise from the cleaner began in the scene the dresser was removed from. Mr. McMurray called in a sharp voice,
    "Rue, cut that blast thing off. I can't hear a word this lady had to say."
- speaker: Respondent
  text: There was no response, and the noise continued. He got up from his chair, hobbled into the room and closed the door.
    The noise within ceased.
- speaker: Respondent
  text: He seemed embarrassed over the condition of the torn-up house, as there was a conglomeration of furniture throughout
    the full length of the hall many old-fashioned chairs, sofas, tables, and what not. Through an open door in what seemed
    to be the dining room, I saw an old square dining table with a lovely crocheted cloth on it.
- speaker: Respondent
  text: My host saturated and sat down in a large rocker, after he had stopped the noise and confusion. "Now, where do you
    want us to begin? Would you like to know about my father first? Well, he was a famous Baptist preacher. He served as pastor
    for a number of churches for years. Some of them he preached at as long as twenty-five years hand running.
- speaker: Respondent
  text: '"I was born at Watkinsville, in Clarke County then but Oconee County now, on June 21, the longest day in the year,
    1857. My father left Watkinsville when I was quite a child. He never out here about a quarter of a mile on Mitchell''s
    Bridge Mill. My father owned a large gin and grist mill. He ginned cotton and ground corn into meal for everybody around
    Athens. I was one thing I did as a boy. I have hauled hundreds of bushels of corn in winter right by this very house in
    those days when the road was a foot deep in mud. The corn was ground between two huge stones pulled around and round by
    mules or horses. Now all that is done by electricity and the meal is ground by wheels pulled by bolts connected to the
    grinder.'
- speaker: Respondent
  text: '"When I was a boy I had to walk four miles to school every day, four there and four back, making eight miles a day.
    Now children can''t walk up here several blocks to college. I went to school here in Athens to a private school for boys,
    taught by Mr. Grudder. The school in recent years has been converted into a dwelling house. It is standing on the original
    spot, next to the First Presbyterian Church. After I finished there, which took me three years, I went to another private
    school taught by Sylvanus Morris and Judge Lumpkin. I went there three years. Among other subjects I took was bookkeeping.
    I have never used it only in my own business. That old school stood where the Fowler house is now, and recently bought
    by a fraternity. The school I went to was a residence converted into a schoolhouse and was known at that time as the Old
    Charbonnie House. Schools weren''t as good in those days as they are now, and that was the last place I went to school.
    I didn''t go to college. It took a heap of money to go to college back in my young days.'
- speaker: Respondent
  text: '"Yes, ma''am, I have been here a long time. Why, I remember when there wasn''t nothing but houses on Clayton Street
    with the exception of where Sun''s Drug Store is now was a blacksmith shop. And I have seen mud half a leg deep on Broad
    Street after a heavy rain, and I remember when the first paving was laid, but of course I don''t remember the year as
    my mind is too short now to recall the exact year.'
- speaker: Respondent
  text: '"I helped my father on the farm and at the cotton gin until I was twenty-one years of age, doing everything that
    came to hand, working on the farm in season and at the cotton gin and grist mill in the fall and winter. When I became
    a free man I married and went to farming for myself. I still farm, but it is run by tenant labor. I''ve been very successful
    handling labor. One Negro family has been on my farm twenty-five years and another has been with me twenty-three. I have
    a twenty-five horse farm; therefore, I have several other families living on it. The cotton gins are quite different now
    from what they were when I was a boy. The old ones were fed by hand.'
- speaker: Respondent
  text: '"After my father died I moved to town. A man had bought and built this house. He also owned two lots next to this
    one. Times got tight with him and he came near losing his property and this house he lived in at the time. I bought this
    property from him, which caused him to get on his feet and start all over again. That was twenty-seven years ago. When
    I moved to town I built a modern gin, grist mill, and shingle mill, also a feed mill. I have ginned as high as three thousand
    bales of cotton in one season, but the Government has cut the cotton acreage down so my boys didn''t gin but a little
    better than six hundred bales last year. The report on cotton is it seems much larger than last year.'
- speaker: Respondent
  text: '"I have been nearly killed several times fooling around the cotton gin. When I was running a meter pipe to the gin,
    I had to connect it with the water main over here at the Coordinate College. Of course I had secured permission from the
    proper authorities. You have to be careful that the pipes are free of dirt, so I picked up a long pipe to knock the dirt
    out before the men working on the main laid it. In doing so I struck that pipe and it knocked me flat on the ground senseless.
    If I had not been standing on grass it was dry I wouldn''t have known what death I died with.'
- speaker: Respondent
  text: '"One day while working around the gin, the cuff of my shirt caught on a line shaft and I was spun around for some
    time before the machinery could be stopped and I was pulled out. Every stitch of clothing was torn from my right side
    except the cuff of my shirt. My hip was badly mangled and it was thought for a long time I would never walk again without
    the aid of crutches. I was about fifty-five years old when that happened.'
- speaker: Respondent
  text: '"I told you that I ran a shingle mill in connection with the cotton. Do you see my hand, with the two fingers gone?
    Well, I''ll tell you how it happened. I had a merry wheel attached to the machinery on my shingle lane. I had just finished
    working a saw. I noticed the shingles were backing up, and very carefully I reached my hand down between the saws to scatter
    the shingles. When I pulled my hand out it was in some way knocked up against the blade. It seemed to finish me off in
    less than a second, and they flew out to ten feet from me.'
- speaker: Respondent
  text: '"Well, it''s like this, what I made on my gin, grist, and shingle mill, has enabled me to buy what property I cared
    to own. I fed, clothed, educated, and gave my children a few opportunities choice times could afford. I have started each
    of my ten children out in business. I think that is evident of what the success the gins and farm has been.'
- speaker: Respondent
  text: I was father of thirteen children, but only eleven of them lived to be grown and married. One of my daughters died
    soon after her first child was born, and the child died a few weeks later, but her husband is dead now. All of my children
    have a high school education, and four or five of them finished college. The rest of them wouldn't go. Ware and I were
    married sixty-one years before her death. She died this past December, and oldest child will be sixty years old his next
    birthday.
- speaker: Respondent
  text: My widowed daughter and her little boy are living with me now, sorter keeping things together for me. But I am going
    to get married again just as soon as I can find some nice lady that will have me. You don't know a nice woman about fifty
    or sixty who would like a nice home and a good husband? If you do, tell them about me. If I married again my children
    would have a fit, but I don't see why, because, as fast as their wives or husbands died they were ready to get them somebody
    else.
- speaker: Respondent
  text: Due to my father being a Baptist preacher, naturally all of us belong to the Baptist church, and so to speak I was
    born in the church. Rain or shine, snow or blow, that is one thing my father demanded of us. My mother made preparations
    on Saturday, and bright and early Sunday morning if it was a country church my father served and it was a good distance
    from home we set forth to be there on time.
- speaker: Respondent
  text: The telephone rang, and the young teen he called Sue answered. Then she called to Mr. McMurray, "Papa, hurry and come
    on. Zora Belle is waiting on us."
- speaker: Respondent
  text: He said to me, "Everything is so torn up here today, one of my daughters has invited us to have dinner with her. I
    am sorry to have to go, but you know when a woman gets a meal ready it makes them mad to keep 'em waiting. Suppose you
    go by the gin on the way to town and look the gin over. But, before you go, I want to show you something I picked up in
    the field on my farm. Here it is. I used it for a paper weight all these years. Some people tell me it looks like a pine
    cone petrified. It does resemble one, but the sections that form the burr are diamond shaped and clear as crystal. Some
    of my flakes took ink and traced around each of the sections that form the burr. I meant to take it downtown and have
    it cleaned, but I have never gotten around to it. Here is a rock I found. It looks like it was shaped by an expert. I
    have found many arrow-beads, pots, and things in days gone by left by the Indians. I have often been sorry my wife or
    the children break them. It has always puzzled me what the Indians used these two stones for. The round one is an inch
    thick and of solid black rock, and the other one is oblong and exactly a half-inch through, and of perfectly white rock."
- speaker: Respondent
  text: The girls called him a gem, and he hobbled to the door with us, saying, "Be sure and go by the gin and ask the boys
    to show you how it is operated."
- speaker: Respondent
  text: Well I reached the McMurray Brothers Gin the next morning there was a middle-aged man sitting on a split-bottom chair
    leaning against the building, holding the reins of the mules standing in front of the mill while their master was unloading
    corn to be ground into meal. I asked the man if he was Mr. McMurray.
- speaker: Respondent
  text: '"No, man, I am past their first cousin, but I hang around here when I don''t have nothing else to do. You will find
    them inside. Let go on in."'
- speaker: Respondent
  text: It's the man who was standing the grinder, galing meal when I entered the building didn't see me at first. Finally
    he looked up and saw toward me. "Good morning. What can I do for you?"
- speaker: Respondent
  text: I explained my visit to him. He nodded his head, pointed his thumb over his shoulder, and said in a gruff voice, "Go
    in the gin house. You will find my brother in there mending a belt. He will tell you what you want to know. I haven't
    got time myself. I have fifty bushels of corn to grind into meal right away."
- speaker: Respondent
  text: As I started to thank him, he said, "Not at all," and, scratching his head vigorously, he returned to his task.
- speaker: Respondent
  text: I followed his motion and found his brother mending the belt. After I had explained what I wanted, he said, "I never
    was a hand to explain things so a person could understand what I'm talking about, but I'll be glad to show you around
    and tell you what I know about it.
- speaker: Respondent
  text: '"My father turned this over to we five boys about twenty years ago. If you like this kind of work it is very interesting.
    There used to be money in this sort of work when we took over. All of us have families and from the proceeds of this we
    have done the best we could by them. Educated our children and have given them a few advantages of life.'
- speaker: Respondent
  text: '"I''ve seen the way, when we ginned cotton day and night, of course in season. And have ginned as high as thirty-three
    hundred bales of cotton in one season. Those were good then, but since that time there has come an awful change. Wash
    year we have ginned less and less cotton. Last year was our shortest year and we only ginned six hundred and thirty bales.
    As a rule,'
- speaker: Respondent
  text: '"A man can pay for his ginning out of his seed from the cotton. It cost around $2.50 to gin a bale, but this year,
    as I see it now, the seed from a bale won''t pay for it, as cotton seed is selling for 74 cents a hundred pounds.'
- speaker: Respondent
  text: '"Do you see that pipe that begins over there by the door? The cotton is hauled here and the people drive on those
    scales in front of the door. After the cotton is weighed, that suction pipe is placed in the wagon of cotton and draws
    the cotton in."'
