source_url: https://www.loc.gov/collections/federal-writers-project/
turns:
- speaker: Respondent
  text: Well, I suppose you would like for me to begin when I was born? I was born July 4, 1907 in a small town in Middle
    Georgia. Both of my parents are living, and are still living in the town in which I was born. My father has his own business.
    A modern machine shop, when he first opened up his business it was known as a blacksmith's shop.
- speaker: Respondent
  text: My sister and I finished high school, but my parents had to sacrifice to send us to college. My mother did her bit
    by selling milk, butter and eggs. I attended Mercer University for a year and stopped to teach school. After a year of
    this being principal in a small country school, I again went to college, this time to the University of Georgia in this
    city. My sister went to college at Bessie Tift. After she left school there, she went in training to be a nurse at St.
    Joseph Infirmary in Atlanta. She worked in that city, in the town we were reared in and was nursing in Gainesville during
    that terrible storm, and continued to work there a while afterwards. Then she went to Washington, D.C. to take a special
    course in nursing. Now she is working in a hospital in Lynchburg, Virginia.
- speaker: Respondent
  text: Before I finished high school, I had determined to be a lawyer, although I did not have the slightest conception of
    what a lawyer was. My only acquaintance with attorneys was confined to the several ones in the town in which I lived as
    a child. However, I believe that the following incident decided me on the career I was eventually to choose.
- speaker: Respondent
  text: When I was in high school I saw an advertisement for some books, stating among other things that they could be ordered
    on trial, and, if the purchaser was not satisfied after inspection, they could be returned within ten days. After they
    came, I found that I was not interested in them and returned them. Shortly after this I had a letter from the seller stating
    that I had made a binding contract with their company, and threatening suit unless I kept them. At first I did not know
    what to do, and had mental visions of being sued. I was so frightened that I did not show the letter to my father or mother.
    Fortunately when it came I met the postman, and they did not know that I received it.
- speaker: Respondent
  text: After worrying about the matter for several days I chanced to see Mr. Simpson, an attorney who had often visited in
    our home. I told him about my trouble. He laughed and told me not to worry any more for I was a minor and could not be
    sued, and just not to answer the letter. However, when I told him that I was afraid that the concern would write me again
    and my parents would find it out, he agreed to write them for me. I suppose that he did, for I never heard any more from
    them.
- speaker: Respondent
  text: This incident cemented my determination to become a lawyer, so when I attended the University of Georgia, I enrolled
    in the Lumpkin Law School. Fortunately, I had a good teacher there and especially one, an old gentleman, who I will call
    Dr. Myers. He was very peculiar, but managed to instill in the minds of his first year pupils the principle of law. This
    he did by stern, incessant reading of cases, and by pure luck in the case of some of us. He was very fond of telling some
    unfortunate pupil who had forgotten to study his lesson that in his opinion the student would make a better farmer than
    a lawyer. Although this professor was not popular with the students of his class while they were in school, yet all of
    those to whom I have talked since they finished and began practicing, now admit that they learned more law in his class
    than in any other.
- speaker: Respondent
  text: Finally, in July of 1929, I received my Bachelor of Laws degree. I was shortly afterward admitted to practice before
    the courts of my State.
- speaker: Respondent
  text: I determined to start practicing law in the city where I finished college, although there were some thirty or forty
    lawyers practicing there when I finished. I therefore rented an office, bought furniture, supplies and books, and put
    out my shingle.
- speaker: Respondent
  text: Unfortunately, I entered into partnership with another young man who was a resident of this city, and whom I had known
    around town when I went to school. Naturally I thought he too had been admitted to the bar to practice in the State, so
    we printed stationery and begun business. At first we handled only collection matters, small claims upon which we usually
    received fifty per cent of the amount that we collected. We were doing fairly well and was making enough to pay expenses
    of our office. However, we had not been in partnership long when someone informed me that my partner did not have a license
    to practice law. Naturally, I did not believe anything of the sort, but asked him about it anyway. Finally he told me
    that he did not, but that he was going to stand the State Bar examination again shortly and was sure that he would pass.
    However, this occurrence led to other misunderstandings and we shortly dissolved our partnership.
- speaker: Respondent
  text: Now, I was on my own and really began practicing in earnest. I had to learn step by step and by experience. I had
    only been practicing a short time, several months, when I got my first big case. The man and woman with whom I was boarding
    had a disagreement which finally led to divorce proceedings. He determined to contest her application for alimony and
    also was determined to gain control and possession of his two children. Since he and I were close friends he employed
    me in the case. I was young and over confident and would not associate an older lawyer with me, when the case first started
    although the wife had employed two of the best lawyers in the city. We had hearing after hearing and trial after trial.
    Finally after months of litigation the judge awarded one child to the wife and one to the husband, so altogether I could
    not say I won my first case of importance. I did not lose it either.
- speaker: Respondent
  text: After ten years of practice, I do not feel that I have accomplished very much. At least I have survived, and have
    now built up a sufficient practice to support myself and family. I married in 1929, soon after I began practicing law
    and now have three children, two girls and a boy.
- speaker: Respondent
  text: Practice in a small town is not confined to any particular branch of law. Small town lawyers do not have either the
    money or the opportunity to specialize in any one particular branch of the law. Criminal and Civil practice has been primarily
    mixed with my practice.
- speaker: Respondent
  text: Summoned by small county courts, I try criminal cases, suits for land, divorce cases and all kinds of collections
    work. Usually when the city and county courts concern several lawyers having business there, we go together. The legal
    profession in small southern cities is a free and congenial body, fraternizing together, as is not the case in larger
    cities and other sections of the country. Then too, procedure and practice in the average country courts is informal,
    free and easy. Of course there are exceptions, but very few. During chamber hearings, which are usually held in the Judge's
    office (Superior Courts) on Saturday in each week, all the lawyers and parties are allowed to smoke, chew tobacco and
    very few rules of procedure are enforced.
- speaker: Respondent
  text: The greatest trouble that lawyers in small courts have to contend with is getting their cases to trial. Usually, if
    one or the other side does not want a case tried, it goes on from term to term and from year to year until it wears out
    parties, die, get together, or is finally dismissed for want of prosecution. The main cause for this is the fact that
    attorneys in small places have to depend upon the good will of fellow attorneys and of the judge in order to make a brotherhood,
    and they do not care, except in exceptional and rare cases, to incur the displeasure of their associates by insisting
    upon a trial in the face of a motion for continuance from the other side. Of course as procedure is being constantly simplified
    and streamlined this objection is being overcome by these reforms.
- speaker: Respondent
  text: I joined church quite young, and I couldn't be anything else but a Baptist, as all of my people are of that denomination.
    I have an uncle who is pastor of one of the largest Baptist churches in South Carolina. Before I finished high school
    and left home I belonged to all the organizations that the boys attended at my church, and taught a Sunday school class.
    Mother thought I could sing so I took voice, and sang in the choir every Sunday. I did this to please my mother. I served
    as deacon in my church in this city and taught a class too. However, I don't go to church as I should now, as I am subject
    to call at anytime and I feel it's my duty to serve my clients whenever they call on me.
- speaker: Respondent
  text: Oh, just to tell you the truth, I have been so busy today I am afraid I can't collect my thoughts on anything that
    would be interesting just now. Let me think a few minutes. Take this one, a like strangest murder case I ever engaged
    in or defended occurred in 1933. I was employed to defend a middle aged Negro man who was indicted by the Grand Jury for
    the murder of a younger Negro. The murder took place at a Negro hot supper. All were drinking, engaged in a free for all
    fight and during the meal the younger Negro was stabbed in the heart with an ice pick.
- speaker: Respondent
  text: My client went on trial, his defense being that although he was present, that he did not commit the crime. Without
    going into all the facts and circumstantial evidence adduced at the trial, he was convicted and sentenced to the electric
    chair. I immediately appealed for a new trial, went to the supreme court where the judgment of the lower court was affirmed.
    Then I appealed to the Governor of the State for executive clemency, and the case was set down before him for a hearing.
- speaker: Respondent
  text: On the morning that I was to appear in Atlanta, I came to my office unusually early so as to have time to drink a
    cup of coffee and read the morning paper. When I opened the paper the first thing that met my eyes was a news item stating
    that a man by the same name as my client was to be electrocuted that morning at the State Farm. I grabbed the telephone
    and tried to get the Governor. Not being able to reach him I called his secretary and in a disjointed manner, for I was
    highly excited, tried to tell his secretary what had happened. Imagine my relief when he laughed and said, "That reporter
    is getting facts for a news article on executive matters. Not knowing that his case had been set before the Governor and
    his Executives automatically stayed until it could be heard."
- speaker: Respondent
  text: So I went to Atlanta, I believe the Governor felt sorry for me since I had already been scared out of my wits, so
    after he had heard the recommendation of my client's character and read the evidence adduced at the first trial, he commuted
    the sentence from death to life imprisonment. So my client was sent to the penitentiary for life. He soon became a trusty
    and was allowed full privileges of the camp.
- speaker: Respondent
  text: His wife after two or three years began asking me to apply for his pardon. I told her that I thought it was a little
    too early. Finally after nearly five years had passed I did apply for a strikingly quick pardon in 1938.
- speaker: Respondent
  text: Just before I could get a hearing before the Crime commission I received word that my client had been killed. After
    I investigated, another prisoner, a trusty, had stabbed him with an ice pick in the heart.
- speaker: Respondent
  text: You know there are two things a Negro will do that is steal and lie. Well, one day two peg leg Negroes from Atlanta
    came here in an old rank filled Chevrolet truck to collect scrap iron. They the case. When I reached the scene I found
    they had half of the truck filled with iron and the other half was bottles of all sorts and description. When the next
    term of City Court came a man was put on the stand who was president and general manager of a plant here who ruma uses
    milk bottles.
- speaker: Respondent
  text: 'Then he was put on the stand, he was asked: ''Are these bottles yours?'' ''Yes,'' he quickly answered. ''Well, how
    do you know they are?'' ''There is nothing to show they are yours.'' Just the same he answered I know they are mine. ''Very
    well, you sell milk don''t you?'' ''I do.'' ''You get 130 cents per quart for your milk, isn''t that true?'' ''Yes, that
    is right.'' ''Well now do you get them back?'' ''I pick them up when the milk is delivered next day.'' ''Very well.''
    ''When anyone goes by your place to buy a quart of milk what do you sell it for?'' ''Thirteen cents for the milk and 5
    cents deposit on the bottle.'' ''That makes 18 cents for it, does it not?'' ''That''s right.'' ''Well do you insist upon
    the person buying the milk returning the bottle?'' ''No, it doesn''t make any difference to me what they do with it as
    I have the money for the bottle.'' ''Well then you don''t have a case against these Negroes unless they went to your place
    and...'
